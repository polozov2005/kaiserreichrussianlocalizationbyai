#changed to British spelling
 armour_folder: "Бронетехника"
 nsb_armour_folder: "Бронетехника"

 infantry_weapons2_desc: "Личное и расчётное оружие пехоты, а также различное дополнительное снаряжение солдата. Улучшенные модели оружия и более специализированное оборудование."
 improved_infantry_weapons_2_desc: "Личное и расчётное оружие пехоты, а также различное дополнительное снаряжение солдата. Улучшенные модели оружия и более специализированное оборудование."
 advanced_infantry_weapons2_desc: "Личное и расчётное оружие пехоты, а также различное дополнительное снаряжение солдата. Дальнейшая модернизация, включающая личные штурмовые винтовки и противотанковые гранатомёты. Улучшена доступность оружия, ранее распределявшегося в ограниченном количестве."
 infantry_at_desc: "Вооружение наших пехотных подразделений противотанковыми ружьями позволит им поражать лёгкую бронетехнику, сохраняя мобильность."
 infantry_at2_desc: "Чтобы пехота могла эффективно бороться с тяжёлой бронетехникой, противотанковые кумулятивные средства нужно сделать меньше и легче."
 paratroopers3_desc: "Обучение адаптации парашютных операций к погодным условиям, стандартизация снаряжения, такого как десантные ботинки, и расширенная специализированная подготовка минимизируют неразбериху и риски, связанные с этими опасными миссиями."
 marines_desc: "Подразделения, специализирующиеся на амфибийных операциях, становятся всё более незаменимыми. Импровизированные методы и снаряжение уходят в прошлое, поскольку наша морская пехота поддерживается специализированными десантными средствами и подготовкой."
 marines2_desc: "Амфибийные операции требуют постоянных инноваций. Улучшенная логистическая поддержка и переносные гавани позволяют нашей морской пехоте проводить высадки, которые иначе были бы невозможны."
 marines3_desc: "Морская пехота может быть не просто амфибийной пехотой. В будущем наши корпуса морской пехоты станут одними из самых дисциплинированных и организованных сил спецназа."
 tech_mountaineers_desc: "Бои в горных районах подвергают войска множеству опасностей, но иногда их невозможно избежать. Мы можем минимизировать эти риски, обеспечив наших солдат специализированной подготовкой для этой среды."
 tech_mountaineers2_desc: "Выходя за рамки выживания, наши войска могут быть обучены использовать горы в своих интересах. С лёгким снаряжением и вьючным транспортом они могут маневрировать на такой местности лучше другой пехоты."
 rangers_tech_desc: "Специализируясь на боях в лесистой местности и обучая нашу лёгкую пехоту адаптироваться к рельефу и растительности, мы можем экономить войска в обороне или даже прорываться сквозь вражеские линии там, где они меньше всего этого ожидают."
 tech_recon4_desc: "Глубокие разведывательные операции, сочетающие шпионаж, партизанские действия и подготовку коммандос, помогут нашему тактическому выбору и позволят быстро адаптировать принятие решений."
 tech_logistics_company_desc: "Наличие специализированных офицеров по логистике в наших рядах обеспечит использование сетей поддержки для минимизации потерь."
 tech_logistics_company3_desc: "Постоянная статистическая оценка потребностей войск в снабжении способствует максимизации полезности наших ресурсов."
 tech_logistics_company4_desc: "Разработка стандартизированных классификаций для снабжения минимизирует путаницу и сделает планирование более эффективным."
 tech_military_police2_desc: "Выполняя регулярные полицейские функции на оккупированных территориях, такие как регулирование движения и поддержание общественного порядка, наша военная полиция может минимизировать хаос и неразбериху, в которых процветают партизанские движения."
 tech_signal_company_desc: "Установление и поддержание связи на поле боя всегда требовало особых навыков. С появлением новых технологий связи и обнаружения в Мировую войну открываются новые возможности для практики."
 tech_signal_company3_desc: "Всё более портативные технологии связи становятся более пригодными для личного ношения в виде рюкзака. Эту повышенную мобильность войск связи необходимо использовать."
 tech_maintenance_company2_desc: "Регулярные процедуры эксплуатационного обслуживания минимизируют риски поломки оборудования и предупреждают войска о необходимости замены до того, как это произойдёт."
 tech_maintenance_company4_desc: "Опыт проектирования с учётом активного резервирования в Мировую войну может быть применён к более современному оборудованию для упрощения обслуживания."
 motorised_infantry: "Мотопехота"
 streamlined_line_desc: "Стандартизация и жёсткая структура сборочной линии — ключи к её эффективности и безопасности. Именно эти аспекты следует развивать в нашем промышленном производстве."
 improved_equipment_conversion: "Котлы на пылевидном угле"
 concentrated_industry5_desc: "Крупные промышленные комплексы теперь объединяют множество частей нашей индустрии, минимизируя затраты на транспортировку и рабочую силу."
 dispersed_industry2_desc: "Дальнейшая децентрализация нашего производства затрудняет нанесение ударов по его отдельным частям."
 construction2_desc: "Модернизация наших инструментов и оборудования дополнительно поможет нашим строительным усилиям."
 construction4_desc: "Более высокая степень механизации и улучшенные процедуры дополнительно повышают скорость строительства."
 construction5_desc: "Будущее эффективного строительства потребует более тщательного планирования отдельных проектов, а также стандартизированных решений там, где это возможно."
 improved_cavity_magnatron_desc: "Использование радаров уже доказало свою важность, но наших дециметровых радарных установок слишком мало для обеспечения хорошего покрытия. Оснащение большего числа подразделений радарами позволит нам максимально использовать наше технологическое преимущество."
 improved_encryption_desc: "Ограничения в рандомизации шифровальных машин могут быть использованы для взлома шифров. Улучшая случайность механики роторов, мы можем затруднить такой криптоанализ."
 basic_decryption_desc: "Криптоанализ всё больше становится продвинутой математической наукой. Системы вроде карточных каталогов и устройства вроде циклометров могут помочь в необходимой работе."
 improved_decryption_desc: "Разработка более сложных компьютеров позволяет применять новые методы криптоанализа, такие как дифференцирование, которые могут использоваться для взлома продвинутых шифров в сочетании с новыми ручными методами взлома кодов."
 rocket_interceptor_2_desc: "Считающиеся чрезвычайно опасными в эксплуатации, ракетные истребители теперь оснащаются автопилотами и буксировкой другими самолётами для максимального использования их экстремальной скорости при коротком окне работы топлива."
 artillery1_desc: "С использованием более современных материалов и механизмов гаубицы и полевые орудия Мировой войны могут быть перекалиброваны и модернизированы для современной войны."
 mountain_gun_desc: "Горный рельеф Северной Индии привёл к разработке артиллерийского орудия, которое можно разобрать и перевозить на вьючных животных туда, где оно необходимо."
 rocket_artillery2_desc: "Самоходная артиллерия с использованием множественных ракет сможет быстро наносить масштабные разрушения, сохраняя мобильность для избежания ответного огня."
 rocket_artillery4_desc: "Стабилизированные вращением ракеты могут увеличить дальность более лёгких артиллерийских батарей."
 antiair4_desc: "Комбинация современных систем радаров, компьютеризации и автоматических заряжающих устройств будет необходима для быстрого реагирования на более быстрые самолёты."
 antitank1_desc: "Важность эффективного противотанкового оружия была установлена в Мировую войну. Внедрение нового поколения этого оружия будет необходимо для борьбы с современными конструкциями танков."
 antitank2_desc: "Большинство противотанковых орудий до сих пор довольно лёгкие. Орудия большего калибра потребуются для борьбы с более тяжёлыми танками с наклонной бронёй."
 antitank4_desc: "Новые универсальные противотанковые орудия, использующие бронебойные подкалиберные снаряды с отделяющимся поддоном, могут пробить броню практически любого танка."
 antitank5_desc: "Комбинируя различные виды новых технологий боеприпасов с орудиями с более высокой начальной скоростью снаряда, мы можем быть готовы к любой новой броне, которую могут разработать наши враги."
 air_defence: "ПВО"
 bomber_ace_initiative_desc: "Официальное признание и поощрение лётчиков-асов бомбардировочной авиации поощряет смелость и инициативу."
 cas_ace_initiative_desc: "Официальное признание и поощрение лётчиков-асов штурмовой авиации поощряет смелость и инициативу."

