#changed to British spelling
 heavy_armor_advice_tt: "\nУстановка лучшего модуля §YБронирования§! на §YТяжёлые корабли§! улучшает их способность выдерживать урон. §YЛинкоры§! и §YЛинейные крейсера§! определяются своими различными §YСхемами бронирования§!, причём линейные крейсера обычно имеют худшее бронирование."
 basic_heavy_armor_scheme: "Схема наклонного поясного бронирования"
 basic_heavy_armor_scheme_desc: "Размещение поясной брони под углом делает броню той же массы и толщины гораздо труднее пробиваемой.\n\nУстановка этого модуля на §YТяжёлые корабли§! улучшает их способность §Yвыдерживать вражеский урон§!. §YЛинкоры§! и §YЛинейные крейсера§! определяются своими различными §YСхемами бронирования§!."
 improved_heavy_armor_scheme: "Схема бронирования «Всё или ничего»"
 improved_heavy_armor_scheme_desc: "Эта схема фокусируется на защите только самых жизненно важных частей корабля, игнорируя неважные части.\n\nУстановка этого модуля на §YТяжёлые корабли§! улучшает их способность §Yвыдерживать вражеский урон§!. §YЛинкоры§! и §YЛинейные крейсера§! определяются своими различными §YСхемами бронирования§!."

 MOUNTAINEERS_DOCTRINE_DESC: "Сильный военный акцент на полках, привыкших к сложному рельефу, даст нам преимущество в обходе и противодействии противнику."
 RANGERS_DOCTRINE_DESC: "Способность действовать крупными силами в густо лесистых районах позволяет нашей армии обходить и переигрывать силы противника."
 special_forces_paratroopers_desc: "Нет ничего более ужасающего, чем небо, темнеющее от тысячи транспортников с войсками. Наша доктринальная философия должна использовать шок и трепет, которые внушают воздушно-десантные войска."
 ski_troops_desc: "Специалисты по холодному климату жизненно важны для нашей боевой тактики. Официально признавая этих экспертов в нашей военной конституции, мы можем высвободить ресурсы и подготовку для их дальнейшего развития."
 mountaineers_combat_1_desc: "Наши элитные силы должны сосредоточить усилия на удержании районов, в которых они специализируются. Сочетание тактики засад и улучшенной полковой организации гарантирует, что наши силы спецназа представляют значительную оборону в глубину против вторгающихся сил."
 mountaineers_combat_2_desc: "Горно-артиллерийские полки — специализированные силы, предназначенные для быстрой поддержки на дальней дистанции наших элитных дивизий, обученных и действующих в сложной местности. Их присутствие значительно усиливает боевые возможности наших сил спецназа."
 mountaineers_keystone_1_desc: "Успех наших элитных сил спецназа требует реорганизации нашей военной философии вокруг их присутствия."
 paras_dispersed_drop_desc: "Природа наших операций требует, чтобы наши воздушно-десантные войска специализировались на сильно рассредоточенных десантированиях, позволяя проводить значительный саботаж до того, как противник осознает наше присутствие."
 SF_PARAS_combat_effect_tt: "Вражеские дивизии в регионах, куда мы §Hдесантируемся§!, получат снижение текущей §HОрганизации§!.\n\n$PARA_EFFECT_TIMER$"
 paras_airborne_light_armor: "Воздушно-десантная бронетехника"
 paras_bonus_1_desc: "Даже лучший десант может пойти не так. Мы должны убедиться, что наши войска хорошо обучены импровизированной навигации."
 rangers_guerilla_doctrine: "Лесные партизаны"
 rangers_backbone_doctrine: "Специализация лёгкой пехоты"

