########################################################
### KEEP THESE IN THE SAME ORDER AS THE VANILLA FILE ###
########################################################

 landmark_statue_of_liberty: "Статуя Свободы"
 landmark_statue_of_liberty_plural: "$landmark_statue_of_liberty$"
 landmark_statue_of_liberty_desc: "§LКолоссальная Статуя Свободы гордо возвышается в Нью-Йоркской гавани, главном пункте въезда в Соединенные Штаты для иммигрантов, стремящихся начать новую жизнь. Таким образом, она стала воплощением американского духа жизни, свободы и стремления к счастью.§!"

 landmark_big_ben: "Биг Бен"
 landmark_big_ben_plural: "$landmark_big_ben$"
 landmark_big_ben_desc: "§LВестминстерская часовая башня, более известная как Биг Бен, является символом британской культуры. Первоначально она была построена в 1859 году в стиле неоготики и является третьей по высоте часовой башней в Великобритании.§!"

 landmark_colosseum: "Колизей"
 landmark_colosseum_plural: "$landmark_colosseum$"
 landmark_colosseum_desc: "§LКолизей расположен в центре Рима. Это самый большой из когда-либо построенных древних амфитеатров, который использовался римлянами, а после падения Римской империи и жителями города, для развлечений с момента его завершения императором Титом.§!"

 landmark_cristo_redentor: "Статуя Христа-Искупителя"
 landmark_cristo_redentor_plural: "$landmark_cristo_redentor$"
 landmark_cristo_redentor_desc: "§LСтатуя Христа-Искупителя возвышается над Рио-де-Жанейро; ее строительство было завершено в 1931 году. Это национальный символ Бразилии, имеющий большое значение для католиков региона.§!"

 landmark_eiffel_tower: "Эйфелева башня"
 landmark_eiffel_tower_plural: "$landmark_eiffel_tower$"
 landmark_eiffel_tower_desc: "§LЭйфелева башня названа в честь своего создателя Гюстава Эйфеля и была завершена в 1889 году. Расположенная на Марсовом поле в Париже, «Железная леди» стала всемирно известной культурной иконой Франции и символом национальной гордости.§!"

 landmark_kremlin: "Кремль"
 landmark_kremlin_plural: "$landmark_kremlin$"
 landmark_kremlin_desc: "§LМосковский Кремль — это укрепленный комплекс. Внутри комплекса находится Большой Кремлевский дворец, бывшая императорская резиденция российского императора и нынешнее здание российского парламента. Кремль возвышается на юге над рекой Москвой, на востоке — над собором Василия Блаженного и Красной площадью, а на западе — над Александровским садом.§!"

 landmark_berlin_reichstag: "Рейхстаг"
 landmark_berlin_reichstag_plural: "$landmark_berlin_reichstag$"
 landmark_berlin_reichstag_desc: "§LЗдание Рейхстага (Plenarbereich Reichstagsgebäude), также известное как просто Рейхстаг, — это историческое здание законодательного органа, расположенное на площади Кёнигсплац в Берлине. Это символическое здание, имеющее огромное значение в сердцах и умах людей.§!"

 landmark_hofburg_palace: "Хофбург"
 landmark_hofburg_palace_plural: "$landmark_hofburg_palace$"
 landmark_hofburg_palace_desc: "§LХофбург — главный императорский дворец династии Габсбургов, выходящий на Хельденплац, Фольксгартен, а за ними — на здание парламента и Венскую ратушу. Окруженный многочисленными парками, он является сердцем Габсбургской монархии.§!"

 landmark_sadabad_complex: "Саадабад"
 landmark_sadabad_complex_plural: "$landmark_sadabad_complex$"
 landmark_sadabad_complex_desc: "§LКомплекс Саадабад на севере Тегерана, построенный династией Каджаров, служил королевской резиденцией и центром власти. Его дворцы и сады отражают меняющийся политический ландшафт Персии, от консерватизма к модернизму.§!"

 landmark_taj_mahal: "Тадж Махал"
 landmark_taj_mahal_plural: "$landmark_taj_mahal$"
 landmark_taj_mahal_desc: "§LТадж-Махал — шедевр могольской архитектуры. Его величественные купола из белого мрамора и изысканные сады делают его одним из самых знаковых символов Индии, свидетельством как имперской мощи, так и непреходящего наследия.§!"

 landmark_hagia_sophia: "Айя-София"
 landmark_hagia_sophia_plural: "$landmark_hagia_sophia$"
 landmark_hagia_sophia_desc: "§LРасположенная на перекрестке империй, Святая София была византийским собором, османской мечетью и символом постоянно меняющихся правителей Константинополя. Ее массивный купол и величественные залы отражают как ее духовное значение, так и амбиции тех, кто считал этот город своим.§!"

 landmark_nanjing_presidential_palace: "Нанкинский Президентский Дворец"
 landmark_nanjing_presidential_palace_plural: "$landmark_nanjing_presidential_palace$"
 landmark_nanjing_presidential_palace_desc: "Президентский дворец в Нанкине — это древний, престижный комплекс, где после падения династии Цин состоялась инаугурация самого великого Сунь Ятсена."

 landmark_forbidden_city: "Запретный Город"
 landmark_forbidden_city_plural: "$landmark_forbidden_city$"
 landmark_forbidden_city_desc: "Запретный город, как древняя резиденция династии Мин, является символом долгой истории гармонии и процветания Китая. Сегодня сокровища и артефакты, хранящиеся в нем, были тайно вывезены из-за опасений нового японского вторжения…"

 landmark_great_wall_section: "Великая Стена"
 landmark_great_wall_section_plural: "$landmark_great_wall_section$"
 landmark_great_wall_section_desc: "Великая Китайская стена, строившаяся на протяжении сотен лет и при десятках правлений, является шедевром логистического искусства. Сегодня можно сказать, что она олицетворяет собой великую храбрость и непокорность китайского народа перед лицом невзгод."

 landmark_tokyo_imperial_palace: "Императорский дворец"
 landmark_tokyo_imperial_palace_plural: "$landmark_tokyo_imperial_palace$"
 landmark_tokyo_imperial_palace_desc: "Императорский дворец в Токио является главной резиденцией императора и остается таковой со времен Реставрации Мэйдзи и свержения последнего сёгуната. Он является символом гордости и почтения для японского народа и вдохновляет его на усердный труд."

 landmark_national_diet: "Здание Национального парламента"
 landmark_national_diet_plural: "$landmark_national_diet$"
 landmark_national_diet_desc: "Здание Коккай-гидзидо — это зал заседаний обеих палат Национального парламента Японии. Завершенное в начале 1936 года, оно построено почти полностью из японских материалов, за редкими исключениями. Его предшественник был разрушен в 1925 году во время очередного пожара, опустошившего этот район. Хотя здание парламента много раз рушилось, на этот раз оно, несомненно, простоит века!"

 landmark_hakko_ichiu: "Памятник Хакко Итиу"
 landmark_hakko_ichiu_plural: "$landmark_hakko_ichiu$"
 landmark_hakko_ichiu_desc: "Башня Хакко Итиу была построена в ознаменование 2600-летия основания Японии и как памятник, символизирующий японскую судьбу — объединение восьми уголков света под одной крышей."

