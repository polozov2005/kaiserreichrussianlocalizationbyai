########################################################
### KEEP THESE IN THE SAME ORDER AS THE VANILLA FILE ###
########################################################

 DESIGNER_ARMORED_LABEL: "Бронетехника"
 DESIGNER_ARMORED_RATIO: "Бронетехника: $VALUE|%Y$"
 DESIGNER_SUPPORT_COLUMN_TITLE: "Роты поддержки. Это вспомогательные войска, действующие за линией фронта и оказывающие поддержку.\n\nМожно выбрать только одну роту каждого типа. Роты поддержки не влияют на §YМаксимальную скорость§! дивизии (за исключением бонусов к местности) и не увеличивают её §YБоевую ширину§!."
 DESIGNER_MAIN_COLUMN_TITLE: "Линейные батальоны — это ваши войска первой линии.\n\nКаждая колонка представляет полк определённого базового типа: §YБронетехника§!, §YПехота§! или §YМотопехота§!. Верхний тип определяет, что ещё можно добавить в эту колонку полка. Чем больше линейных батальонов, тем больше ваша §YБоевая ширина§! и тем меньше таких дивизий поместится в один бой."
