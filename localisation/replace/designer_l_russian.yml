########################################################

 DESIGNER_ARMORED_LABEL: "Бронированный" #NT!
 DESIGNER_ARMORED_RATIO: "Бронированный: $VALUE|%Y$" #NT!
 DESIGNER_SUPPORT_COLUMN_TITLE: "Поддержка компаний. Это войска поддержки, которые держатся за линией фронта и помогают.\n\nВы можете выбрать только по одному каждому типу, и роты поддержки не влияют на §YМаксимальную скорость§! дивизии (кроме бонусов за местность) и не увеличивают ее §YБоевую ширину§!." #NT!
 DESIGNER_MAIN_COLUMN_TITLE: "Линейные батальоны — это ваши войска на передовой.\n\nКаждая колонна — это полк определенного базового типа, например §YArmour§!, §YInfantry§! или §YМоторизованные войска§!. Самый верхний тип решает, что еще вы можете поместить в этот столбец «Полк». Чем больше у вас линейных батальонов, тем больше ваша §YБоевая ширина§! и тем меньше таких дивизий вы сможете вместить в одну битву." #NT!
