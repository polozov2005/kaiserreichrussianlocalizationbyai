#changed to British spelling
 NO_ORG_TO_FIGHT: "Для участия в бою нам нужно как минимум §Y$VAL$§!% ед. организации."
 light_armor_desc: "Танки с легкой броней."
 heavy_armor_desc: "Самые прочные танки с толстой броней и мощными орудиями, но медленные и негибкие в плане тактики."
 motorized: "Моторизированная пехота"
 motorized_desc: "Пехота, оснащенная такими средствами транспортировки, как грузовики и мотоциклы."
 mechanized: "Механизированная пехота"
 mechanized_desc: "Пехота, оснащенная легкобронированными средствами транспортировки."
 modern_armor_desc: "Современные танки способны справиться с любой задачей на поле боя. Мощное оружие и наклонная броня устранили необходимость в специализированных видах танков."
 marine_desc: "Войска, специализирующиеся на морских десантных операциях, становятся все более незаменимыми. Импровизированные тактические приемы и снаряжение уходят в прошлое - наша морская пехота теперь проходит специальную подготовку и оснащена специальными десантными кораблями."
 mountaineers_desc: "Боевые действия в горах сопряжены с высокой опасностью для пехоты, но порой их не избежать. Проведя среди наших солдат специальную подготовку для ведения боя в горах, мы минимизируем риск."
 armored_car_recon: "Легкая бронетанковая рота разведки"
 armored_car_recon_desc: "Оснащенная бронированными машинами, разведывательная рота может принять бой с противником и не дать вражеским разведчикам получить ценную информацию."
 armored_car: "Бронеавтомобиль"
 UNIT_DEMILITARIZED: "$STATE|H$ является демилитаризованной зоной."
 DEMILITARIZED_ZONE: "Демилитаризованная зона: §Rвойскам вход запрещен§!"
 MAX_ORGANIZATION_TITLE: "§HМакс. организация:§!\n"
 NAVAL_COMBAT_SHIP_ORGANIZATION: "Организация: $CUR|0Y$/$MAX|0Y$\n"
 NAVAL_COMBAT_SHIP_ORGANIZATION_DESC: "Организация показывает боевую готовность и организованность корабля. Корабль с нулевой организацией неспособен воевать."
 ORG_LOSS_AT_LOW_ORG_FACTOR: "Потеря организации в бою при уровне ниже $LEVEL|0Y%$ от макс. организации: $VAL|-=%$"
 category_all_armor: "Варианты бронетехники"
 motorized_rocket_brigade: "Моторизированная ракетная артиллерия"
 GOOD_ARMOR_DEFENSE_DESC: "Если атакующая вражеская дивизия не может пробить нашу броню, мы теряем на $ORG|%0G$ меньше организации и получаем на $STR|%0G$ меньше урона.\n"
 GOOD_ARMOR_ATTACK_DESC_STR: "Если мы атакуем вражескую дивизию, которая не может пробить нашу броню, мы наносим на $VAL|%0G$ больше урона.\n"
 GOOD_ARMOR_ATTACK_DESC_ORG: "Если мы атакуем вражескую дивизию, которая не может пробить нашу броню, мы снижаем ее организацию еще на $VAL|%G0$.\n"
 PIERCING_GOOD_DESC: "Дивизия не получит дополнительных бонусов из-за возможности пробить броню вражеской дивизии, но и враг не получит бонусов из-за брони."
 SELECT_COLOR: "Выбрать цвет на карте"
 rangers_support_desc: "Разведчики-рейнджеры — элитные лёгкие войска, специализирующиеся на проникновении, разведке и ближнем бою."
