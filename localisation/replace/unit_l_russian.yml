#missing line breaks
 CURRENT_ORGANIZATION: "Организация: $CUR|0Y$/$MAX|0Y$" #NT!
 UNIT_LEADER_ALREADY_AN_ADVISOR: "\n\n$NAME|Y$ §R уже является советником.§!" #NT!
 UNIT_LEADER_TRAIT_REQUIRES: "\n\n§RТребуется $TRAITNAME|Y$.§!" #NT!
 UNIT_LEADER_TRAIT_ROLE: "\n\n§RГлавные роли назначаются только фельдмаршалам.§!" #NT!
 UNIT_LEADER_IS_COUNTRY_LEADER_ADVISOR: "\n\n$NAME|Y$ является лидером страны и не может стать советником." #NT!

#changed to British spelling
 NO_ORG_TO_FIGHT: "Для борьбы нам нужно как минимум §Y$VAL$§!% организации." #NT!
 light_armor_desc: "Легкобронированные танки." #NT!
 heavy_armor_desc: "Сильнейшие танки с мощной броней и вооружением, но медленные и тактически негибкие." #NT!
 motorized: "Моторизованная пехота" #NT!
 motorized_desc: "Мототранспорт пехоты, например, грузовики и мотоциклы." #NT!
 mechanized: "Механизированная пехота" #NT!
 mechanized_desc: "Легкобронированный пехотный транспорт." #NT!
 modern_armor_desc: "Современные танки эволюционировали, чтобы справляться с большинством боевых ситуаций. Мощные орудия и наклонная броня отменили необходимость в специализированных танках." #NT!
 marine_desc: "Войска, специализирующиеся на десантных операциях, становятся все более незаменимыми. Импровизированные методы и оборудование уходят в прошлое, поскольку нашу морскую пехоту поддерживают специализированные десантные средства и обучение." #NT!
 mountaineers_desc: "Бои в горных хребтах подвергают войска множеству опасностей, но иногда их невозможно избежать. Предоставляя нашим солдатам специальную подготовку для работы в таких условиях, мы можем минимизировать эти риски." #NT!
 armored_car_recon: "Легкая бронетанковая разведывательная рота" #NT!
 armored_car_recon_desc: "Оснащенная броневиками разведывательная рота может вступить в бой с противником и не дать вражеским разведчикам получить ценную информацию." #NT!
 armored_car: "Бронированный автомобиль" #NT!
 UNIT_DEMILITARIZED: "$STATE|H$ — демилитаризованная зона." #NT!
 DEMILITARIZED_ZONE: "Демилитаризованная зона: §Rвойска не могут войти§!" #NT!
 MAX_ORGANIZATION_TITLE: "§HМаксимальная организация:§!\n" #NT!
 NAVAL_COMBAT_SHIP_ORGANIZATION: "Организация: $CUR|0Y$/$MAX|0Y$\n" #NT!
 NAVAL_COMBAT_SHIP_ORGANIZATION_DESC: "Организация указывает на боеготовность и организованность корабля. Корабль без организации не может сражаться" #NT!
 ORG_LOSS_AT_LOW_ORG_FACTOR: "Потери организации в бою, пока организация ниже $LEVEL|0Y%$ от максимальной организации: $VAL|-=%$" #NT!
 category_all_armor: "Танки и варианты брони" #NT!
 motorized_rocket_brigade: "Моторизованная ракетная артиллерия" #NT!
 GOOD_ARMOR_DEFENSE_DESC: "Если атакующая нас вражеская дивизия не сможет пробить нашу броню, мы получим на $ORG|%0G$ меньше урона по организации и силе.\n" #NT!
 GOOD_ARMOR_ATTACK_DESC_STR: "Если мы атакуем вражескую дивизию, которая не может пробить нашу броню, мы нанесем больший урон.\n" #NT!
 GOOD_ARMOR_ATTACK_DESC_ORG: "\nПри атаке вражеской дивизии, способной пробить менее §H50%§! нашей брони мы нанесем дополнительный урон." #NT!
 PIERCING_GOOD_DESC: "Дивизия не получит дополнительных бонусов от возможности проникнуть во вражескую дивизию, но эта дивизия не получит бонусов из-за своей брони." #NT!
 SELECT_COLOR: "Выберите цвет карты" #NT!
 rangers_support_desc: "Разведчики-рейнджеры — это элитные боевые войска, специализирующиеся на проникновении, разведке и ближнем бою." #NT!
