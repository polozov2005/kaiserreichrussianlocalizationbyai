 #country_l_russian
 ARMY_EXPERIENCE_DESC: "Когда ваше снаряжение применяется в бою, вы получаете армейский опыт. Это означает, что вы можете получать армейский опыт, когда ваши §Hдивизии§! вступают в бой, или если вы отправили §H$lend_lease_string_caps$§! союзникам, участвующим в войне.\nВы также получаете опыт за проведение §HАрмейских учений§! с войсками уровня не ниже $UNIT_TRAINING_LEVEL|Y$ и за определённые §HНациональные фокусы§!. Некоторые §HМинистры§! могут увеличивать получаемый опыт.\n\nАрмейский опыт необходим для создания и изменения §Hшаблонов дивизий§!."
 AIR_EXPERIENCE_DESC: "Когда ваши самолёты выполняют боевые задания или участвуют в §HУчениях пилотов§!, вы получаете авиационный опыт. Это означает, что вы можете получать авиационный опыт, когда ваши §Hавиакрылья§! вступают в бой, или если вы отправили §H$lend_lease_string_caps$§! союзникам, участвующим в войне.\nОпределённые §HНациональные фокусы§! дают дополнительный опыт, а некоторые §HМинистры§! могут увеличивать получаемый опыт.\n\nАвиационный опыт используется для разработки улучшенных модификаций существующих самолётов."

