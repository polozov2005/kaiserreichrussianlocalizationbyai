#changed to British spelling
 STAT_COMMON_MAX_ORG: "Организация: "
 STAT_COMMON_MAX_ORG_DESC: "Организация указывает на боеготовность и степень организованности подразделения. Подразделение без организации не может эффективно сражаться или перемещаться."
 STAT_ARMY_DEFAULT_MORALE_DESC: "Насколько больше организации может восстанавливаться в час вне боя."
 STAT_ARMY_DEFENSE: "Оборона: "
 STAT_ARMY_BREAKTHROUGH_DESC: "Сколько вражеских атак подразделение может попытаться избежать при наступлении, эффективно позволяя ему дольше оставаться в атаке."
 STAT_ARMY_HARDNESS_DESC: "§T§HЖёсткость§! показывает, какая часть вашей §Hдивизии§! состоит из бронированных или хотя бы защищённых машин.\n\nПри атаке дивизия суммирует все атаки по мягкой и по твёрдой цели. Дивизия с высокой §Hжесткостью§! получит меньше урона от §Hатак по мягкой цели§! и больше от §Hатак по твёрдой цели§! — и наоборот.§!"
 STAT_NAVY_SHORE_BOMBARDMENT_DESC: "Способность подразделения проводить береговую бомбардировку для помощи в сухопутных боях, соседствующих с его морской провинцией, при выполнении миссии «На позиции»."
 STAT_NAVY_EVASION_DESC: "Способность кораблей уклоняться от вражеского огня за счёт маневрирования. При оценке шансов избежать попадания значение уклонения цели сравнивается с атакующим, поэтому при высоком уклонении вы также будете лучше попадать по уклоняющимся целям."
 STAT_AIR_DEFENCE: "ПВО: "
 STAT_ADJUSTER_DEFENCE: "Оборона: "
 STAT_COMMON_ARMOR: "Бронирование: "
 STAT_COMMON_ARMOR_DESC: "Наличие §Hбронирования§!, превышающего значение §Hпробития§! противника, позволяет получать меньше урона, а также даёт возможность совершать больше атак в бою, так как подразделение имеет больше свободы перемещения."
 STAT_COMMON_PIERCING_DESC: "Наличие §Hпробития§!, равного или превышающего значение §Hбронирования§! цели, позволяет наносить больше урона и эффективнее прижимать их бронетанковые силы."
 STAT_COMMON_ACCLIMATIZATION_HOT_GAIN: "Коэффициент прироста акклиматизации к жаре"
 STAT_COMMON_ACCLIMATIZATION_HOT_GAIN_DESC: "Скорость акклиматизации подразделения в тёплом климате."
 STAT_COMMON_ACCLIMATIZATION_COLD_GAIN: "Коэффициент прироста акклиматизации к холоду"
 STAT_COMMON_ACCLIMATIZATION_COLD_GAIN_DESC: "Скорость акклиматизации подразделения в холодном климате."

#added zero at the end for tooltip clarity
 STAT_CARRIER_SIZE_MOD_DIFF: " $VALUE|=+0$§G0§!"

