 STAT_NAVY_AMPHIBIOUS_DEFENSE: "Амфибийная оборона"
 STAT_NAVY_AMPHIBIOUS_DEFENSE_DESC: "Дополнительная оборона, получаемая подразделениями при проведении амфибийных вторжений."

