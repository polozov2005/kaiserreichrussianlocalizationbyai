#changed to British spelling
 GRAND_DOCTRINE_MOBILE_WARFARE_DESC: "Нанесите удар там, где они не ждут. Доктрина маневренной войны направлена на преодоление окопного застоя Первой мировой войны и включает в себя стремительное передвижение с целью упреждения и дезорганизации действий противника."
 GRAND_DOCTRINE_SUPERIOR_FIREPOWER_DESC: "«Отправляйте снаряды, а не людей» — концепция «Превосходства огневой мощи» делает упор на применение сокрушительных массированных огневых ударов для прокладывания пути маневренным подразделениям, позволяющим продвигаться вперед и захватывать территорию."
 GRAND_DOCTRINE_GRAND_BATTLEPLAN_DESC: "Должная подготовка помогает преодолеть любые преграды. Большой план операции включает в себя взвешенную и тщательную подготовку всех родов войск как в наступлении, так и в обороне."

 large_unit_tactics_motorization_initiative: "Программа моторизации"
 SUBDOCTRINE_ASSAULT_INFANTRY_DESC: "Организуйте армию, применив общевойсковой подход к бою, и интегрируйте средства огневой поддержки вплоть до самых малых тактических подразделений."
 mounted_infantry_anti_mechanized_cavalry_groups: "Противотанковые кавалерийские группы"
 SUBDOCTRINE_IRREGULARS_DESC: "Асимметричный подход к ведению пехотной войны, при котором избегается прямое столкновение с превосходящими силами противника, а применяется партизанская тактика засад, дезориентации и преследования с целью сломить решимость врага."
 irregulars_improvised_officer_groups: "Импровизированные группы офицеров"
 irregulars_standardization_efforts: "Деятельность по стандартизации"
 SUBDOCTRINE_FIRE_CONCENTRATION_DESC: "Благодаря централизации управления средствами огневой поддержки наша армия сможет сосредоточить огневую мощь в критической точке, а не распылять ее по нескольким направлениям."
 fire_concentration_dedicated_air_support: "Централизованная поддержка ПВО"
 SUBDOCTRINE_ANTI_TANK_FRONT_DESC: "Единый подход к противотанковой обороне на всех уровнях тактического звена. Защита флангов своих прорывающихся войск и направление атак бронетехники противника в заранее спланированные зоны поражения."
 SUBDOCTRINE_FLYING_BATTERIES_DESC: "Общеармейская инициатива по повышению мобильности вспомогательных родов войск, чтобы они могли не отставать во время стремительного наступления моторизированных подразделений, быстро вступая в бой для оказания поддержки."
 flying_batteries_ballistics_corrections: "Бронемашины для наводчиков"
 SUBDOCTRINE_MOBILE_RECON_AND_ASSAULT_DESC: "Благодаря общевойсковому подходу с внедрением повсеместной моторизации мы можем обнаруживать противника с помощью разведывательных подразделений, а затем быстро его уничтожать мобильным тяжелым вооружением."
 mobile_recon_and_assault_motorization_support: "Штатный подвоз припасов"
 self_propelled_support_mobile_battery_management_platoons: "Мобильный центр управления огнем"
 SUBDOCTRINE_ARMORED_SPEARHEAD: "Танковый прорыв"
 SUBDOCTRINE_ARMORED_SPEARHEAD_DESC: "С помощью танков можно перейти от войны на истощение к маневренным боевым действиям. В нашей доктрине следует сделать упор на быстрые прорывы с последующим окружением и уничтожением противника."
 SUBDOCTRINE_ARMORED_INFANTRY_SUPPORT: "Поддержка механизированной пехоты"
 armored_infantry_support_armored_cohorts: "Бронекогорты"
 armored_infantry_support_mobile_armored_strongpoints: "Подвижные бронеопорники"
 SUBDOCTRINE_ARMORED_CAVALRY: "Бронекавалерия"
 SUBDOCTRINE_ARMORED_CAVALRY_DESC: "При поддержке быстрых легких танков и бронемашин механизированные войска могут обнаружить слабые места противника и поразить его там, где он наиболее уязвим."
 armored_cavalry_quick_response_force: "Моторизованные войска прикрытия"
 armored_cavalry_speed_as_armour: "Скорость — лучшая броня"
 streamlined_deployment_flexible_armored_battalions: "Инициатива по механизации армии"
 streamlined_deployment_mechanized_wave: "Механизированная волна"
 SUBDOCTRINE_MOBILE_DEFENSE: "Подвижная оборона"
 SUBDOCTRINE_MOBILE_DEFENSE_DESC: "Бронетанковые войска полезны как в обороне, так и в нападении. Благодаря своей мобильности они могут быстро занимать участки с укреплениями или выдвигаться на позиции для отражения прорывов противника."
 mobile_defense_combined_anti_armor: "Объединенные средства ПТО"
 SUBDOCTRINE_TANK_DESTROYER_FORCE_DESC: "Мы не можем рассчитывать, что наша первая линия обороны по умолчанию способна остановить противника, обладающего серьезной бронетанковой мощью, поэтому должны укрепить оборону опытными противотанковыми подразделениями."
 SUBDOCTRINE_LAST_STAND: "Отчаянная оборона"
 SUBDOCTRINE_DEEP_BATTLE_DESC: "Дальность и ударная мощь современного оружия позволяют преодолеть оборону противника, поражая ее на всю глубину одновременно всеми имеющимися в нашем распоряжении видами оружия."
 SUBDOCTRINE_GUERILLA_WAR: "Партизанская война"
 guerilla_war_galvanize_support: "Мобилизация поддержки"
 guerilla_war_defense_of_gained_power: "Защита отвоеванного"
 SUBDOCTRINE_PEOPLES_WAR: "Ополченцы" #NT!
 SUBDOCTRINE_PEOPLES_WAR_DESC: "Воля народа к сопротивлению, мобилизованная и направляемая государством, гарантирует нашу окончательную победу над империализмом и контрреволюцией."
 SUBDOCTRINE_EXPEDITIONARY_WARFARE_DESC: "Вся боевая мощь мира ничего не значит, если ее невозможно применить в бою. Мы сосредоточимся на возможности проецирования нашей силы для достижения стратегических целей."

 DOCTRINE_TRACK_ARMOR: "Бронетехника"
 ADVISOR_DOCTRINE_FAVOR: "$NAME|H$ предпочитает эту доктрину:"
 DOCTRINE_MONTHLY_MASTERY_GAIN_THEATER_COMMANDER: "— $LEADER_NAME|H$ (командующий театром военных действий): $VALUE|+=1$"

 mobile_infantry_cavalry_charge: "Модернизированная кавалерия"
 mobile_infantry_maneuver_warfare: "Маневренная война"

 GRAND_DOCTRINE_FLEET_IN_BEING_DESC: "Клуб любителей больших пушек: традициональный упор на морскую артиллерию и прочную броню с расчетом сокрушить вражеский флот, обрушив на него стальную бурю."

 SUBDOCTRINE_ARMORED_RAIDERS: "Бронированные рейдеры"
 SUBDOCTRINE_ARMORED_RAIDERS_DESC: "Корабли сопровождения конвоев занимаются в основном противолодочной борьбой. Их капитаны сильно удивятся, когда неожиданно увидят в своем строю тяжеловооруженный крупный корабль — он будет подобен волку на пастбище."
 armored_raiders_modernized_officer_education: "Современные поисковые протоколы"
 SUBDOCTRINE_COASTAL_DEFENCE: "Флот береговой обороны"
 SUBDOCTRINE_COASTAL_DEFENCE_DESC: "Небольшие боевые корабли, разработанные с упором на огневую мощь в ущерб дальности и действующие около своих и союзных берегов, — серьезный фактор сдерживания вражеского флота."
 coastal_defence_fleet_aging_navy: "Двигатель прогресса"
 coastal_defence_fleet_casemate_upgrades: "Модернизация вспомогательного вооружения"
 SUBDOCTRINE_NAVAL_GUNFIRE_SUPPORT_DESC: "После нейтрализации вражеского флота наши крупнокалиберные морские орудия обрушат свой гнев на наземные цели, чтобы поддержать высадку войск."
 convoy_escort_escort_reclassification: "Твердая защита конвоев"
 SUBDOCTRINE_SCREEN_INTEGRATED_OPERATIONS_DESC: "Корабли прикрытия не могут похвастать той же огневой мощью, что и крупные корабли, но благодаря высокой скорости они могут быть полезны даже в тяжелом бою."
 SUBDOCTRINE_SCREEN_HUNTER_KILLERS_DESC: "Вражеские подводные лодки — серьезная угроза нашей военной экономике, но мы знаем, как из жертвы стать охотником: нам помогут хорошо организованные и агрессивно действующие группы сопровождения, включающие эсминцы."
 SUBDOCTRINE_SCREEN_TORPEDO_PRIMACY_DESC: "Агрессивные и дерзкие торпедные атаки с участием эсминцев прикрытия способны ослабить вражеские боевые порядки еще до начала основного сражения."
 SUBDOCTRINE_SCREEN_SUPPORT_FOCUS_DESC: "Улучшив подготовку экипажей кораблей поддержки и наладив организацию их действий, мы серьезно (хоть и косвенно) укрепим основной боевой флот."
 SUBDOCTRINE_SCREEN_JEUNE_ECOLE_DESC: "В рамках этой доктрины — ответа устаревшим представлениям о морской войне как состязании калибров — упор делается на удары силами многочисленных малых кораблей, торпедные атаки и непрямую торговую войну."
 SUBDOCTRINE_SCREEN_PATROL_BOATS_DESC: "Дешевые и быстрые ударные корабли, вооруженные торпедами, — действенное средство борьбы с традиционными флотилиями тяжелых кораблей, особенно в прибрежных водах, где можно наносить удары из засады."
 patrol_boats_home_waters_defense: "Оборона территориальных вод"
 SUBDOCTRINE_CARRIER_BATTLEGROUPS_DESC: "Слава крейсеров постепенно уходит в прошлое. Еще немного — и авианосцы станут главным морским оружием современности. Именно авианосец должен быть основным элементом нашего флота."
 escort_carrier_support_evasive_convoy_maneuvers: "Маневры уклонения для конвоев"
 SUBDOCTRINE_BROAD_NAVAL_SUPPORT: "Универсальная поддержка"
 SUBDOCTRINE_BROAD_NAVAL_SUPPORT_DESC: "Авианосцы — это разведка, господство в воздухе и возможность наносить авиаудары. В руках умелых командиров соединений эти универсальные корабли становятся незаменимыми."
 broad_naval_support_carrier_maneuvering: "Маневры авианосцев"
 broad_naval_support_organized_support_protocols: "Планы организованной поддержки"
 light_task_forces_localized_sea_power: "Локализованная военно-морская мощь"
 SUBDOCTRINE_SUBMARINE_WOLFPACKS_DESC: "Охота — раздельно, удары — совместно. Наши подводные лодки будут рассредотачиваться и прочесывать океан; как только одна из них обнаружит добычу, она подаст сигнал остальным, и те соберутся в стаю, чтобы нанести удар."
 wolfpacks_improvisation: "Культура импровизации"
 wolfpacks_wolfpack_coordination: "Централизованное опознание позывных"
 SUBDOCTRINE_SUBMARINE_COASTAL_DEFENSE: "Оборона побережья"
 submarine_coastal_defense_optimized_compartments: "Системы меньшего масштаба"

 SUBDOCTRINE_DESCRIPTION: "Второстепенная доктрина — путь к специализации и совершенству в том или ином подходе к ведению боевых действий."

 SUBDOCTRINE_FIGHTER_HOMELAND_DEFENSE: "Противовоздушная территориальная оборона"
 air_subdoctrine_tactical_flexibility_combat_discipline: "Эффективные поисково-спасательные работы"
 SUBDOCTRINE_FLYING_ARTILLERY_DESC: "Универсальный подход к очерёдности целей: внеплановые цели поражаются повсюду — от линии фронта до оперативной глубины."
 air_subdoctrine_dive_bombers_terrifying_precision: "Систематический террор с воздуха"
 air_subdoctrine_carrier_strikes_optimized_deck_space_usage: "Оптимизация места в ангаре"
 SUBDOCTRINE_NAVAL_STRIKE_TACTICS_DESC: "Палубные самолеты не могут беспрепятственно сбрасывать бомбы на цели: им противостоят истребители и средства ПВО. Мы обучим летчиков упорству и умению сохранять самолеты в целости, чтобы они доводили атаки до конца."
 air_subdoctrine_long_range_escort_mutual_air_cover: "Оборона в круговом строю"
 air_subdoctrine_tactical_battlefield_support_ship_hunters: "Доступность бронебойных бомб"
 air_subdoctrine_theater_interdiction_extended_reach: "Оптимизация летных маршрутов"
 SUBDOCTRINE_COASTAL_AIR_PATROL_DESC: "Оборона побережья непосредственно у воды — неэффективный и затратный метод. Быстрые и подвижные самолеты способны лучше прикрывать берега от захватчиков."
 air_subdoctrine_open_ocean_air_patrol_harbor_raids: "Налеты на гавани"
