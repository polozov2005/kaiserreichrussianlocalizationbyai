#changed to British spelling
 GRAND_DOCTRINE_MOBILE_WARFARE_DESC: "Бей там, где не ждут — доктрина манёвренной войны стремится прорвать окопный тупик Первой мировой войны за счёт агрессивных манёвров, опережающих и дезорганизующих противника."
 GRAND_DOCTRINE_SUPERIOR_FIREPOWER_DESC: "Посылай снаряды, а не людей — «Превосходство огневой мощи» делает акцент на применении сокрушительных масс огня для расчистки пути манёвренным подразделениям, продвигающимся и захватывающим территорию."
 GRAND_DOCTRINE_GRAND_BATTLEPLAN_DESC: "При достаточной подготовке нет непреодолимых препятствий — «Грандиозный боевой план» характеризуется терпеливой, тщательной подготовкой всех родов войск, как в атаке, так и в обороне."

 large_unit_tactics_motorization_initiative: "Инициатива моторизации"
 SUBDOCTRINE_ASSAULT_INFANTRY_DESC: "Организация армии с комбинированным подходом к бою, с органическими средствами огневой поддержки, интегрированными до наименьшего тактического подразделения."
 mounted_infantry_anti_mechanized_cavalry_groups: "Противомеханизированные кавалерийские группы"
 SUBDOCTRINE_IRREGULARS_DESC: "Асимметричный подход к пехотному бою, при котором избегается прямое столкновение с превосходящими силами, с использованием партизанской тактики засад, дезориентации и изматывания для подрыва решимости противника."
 irregulars_improvised_officer_groups: "Импровизированные офицерские группы"
 irregulars_standardization_efforts: "Усилия по стандартизации"
 SUBDOCTRINE_FIRE_CONCENTRATION_DESC: "За счёт централизации управления средствами огневой поддержки наша армия может концентрировать огневую мощь в критической точке, а не распылять её мелкими порциями."
 fire_concentration_dedicated_air_support: "Централизованная противовоздушная поддержка"
 SUBDOCTRINE_ANTI_TANK_FRONT_DESC: "Единый подход к противотанковой обороне на всех тактических уровнях, защищающий фланги дружественных прорывов и направляющий вражеские бронетанковые атаки в заранее спланированные зоны поражения."
 SUBDOCTRINE_FLYING_BATTERIES_DESC: "Общеармейская инициатива по повышению мобильности поддерживающих родов войск, чтобы они могли успевать за быстрыми моторизованными прорывами и быстро вступать в бой для поддержки."
 flying_batteries_ballistics_corrections: "Бронированные машины передовых наблюдателей"
 SUBDOCTRINE_MOBILE_RECON_AND_ASSAULT_DESC: "Благодаря комбинированному подходу, подкреплённому обширной моторизацией, мы можем использовать разведывательные подразделения для обнаружения противника, а мобильное тяжёлое вооружение — для его быстрого уничтожения."
 mobile_recon_and_assault_motorization_support: "Органическое моторизованное снабжение"
 self_propelled_support_mobile_battery_management_platoons: "Мобильный центр управления огнём"
 SUBDOCTRINE_ARMORED_SPEARHEAD: "Бронетанковый клин"
 SUBDOCTRINE_ARMORED_SPEARHEAD_DESC: "Танк даёт возможность вести войну манёвра, а не просто войну на истощение. Наша доктрина должна делать акцент на быстром использовании прорывов для окружения и уничтожения противника."
 SUBDOCTRINE_ARMORED_INFANTRY_SUPPORT: "Поддержка бронепехоты"
 armored_infantry_support_armored_cohorts: "Бронированные когорты"
 armored_infantry_support_mobile_armored_strongpoints: "Мобильные бронированные опорные пункты"
 SUBDOCTRINE_ARMORED_CAVALRY: "Бронетанковая кавалерия"
 SUBDOCTRINE_ARMORED_CAVALRY_DESC: "Механизированные силы, подкреплённые быстрыми лёгкими танками и бронеавтомобилями, могут выявлять слабые места и наносить удары по противнику там, где он наиболее уязвим."
 armored_cavalry_quick_response_force: "Моторизованные силы безопасности"
 armored_cavalry_speed_as_armour: "Скорость как броня"
 streamlined_deployment_flexible_armored_battalions: "Программа механизации армии"
 streamlined_deployment_mechanized_wave: "Механизированная волна"
 SUBDOCTRINE_MOBILE_DEFENSE: "Мобильная оборона"
 SUBDOCTRINE_MOBILE_DEFENSE_DESC: "Бронетанковые силы полезны как в атаке, так и в обороне. Благодаря своей мобильности они могут быстро занимать выгодные оборонительные позиции или перемещаться для отражения вражеских прорывов."
 mobile_defense_combined_anti_armor: "Комбинированная противотанковая оборона"
 SUBDOCTRINE_TANK_DESTROYER_FORCE_DESC: "Сталкиваясь с серьёзной угрозой вражеской бронетехники, мы не можем рассчитывать, что наша первая линия обороны всегда остановит противника. Оборона в глубину с засадами противотанковых подразделений имеет решающее значение."
 SUBDOCTRINE_LAST_STAND: "Отчаянная оборона"
 SUBDOCTRINE_DEEP_BATTLE_DESC: "Дальность и ударная мощь современного оружия позволяют преодолеть систему обороны противника, нанося удары по всей её глубине одновременно всеми имеющимися средствами."
 SUBDOCTRINE_GUERILLA_WAR: "Партизанская война"
 guerilla_war_galvanize_support: "Мобилизация поддержки"
 guerilla_war_defense_of_gained_power: "Защита завоёванной власти"
 SUBDOCTRINE_PEOPLES_WAR: "Ополчение"
 SUBDOCTRINE_PEOPLES_WAR_DESC: "Из века в век простые люди формировали ополчения для защиты своих домов и родины. Даже в эпоху современной войны санкционированные и организованные государством ополчения могут стать мощным сдерживающим фактором против иностранного вторжения."
 SUBDOCTRINE_EXPEDITIONARY_WARFARE_DESC: "Вся боевая мощь мира мало что значит, если её нельзя доставить к месту боя. Мы сделаем организационный акцент на возможности проецирования силы в служении нашим стратегическим целям."

 DOCTRINE_TRACK_ARMOR: "Бронетехника"
 ADVISOR_DOCTRINE_FAVOR: "$NAME|H$ благоприятствует этой доктрине:"
 DOCTRINE_MONTHLY_MASTERY_GAIN_THEATER_COMMANDER: "- $LEADER_NAME|H$ (командующий ТВД): $VALUE|+=1$"

 mobile_infantry_cavalry_charge: "Модернизированная кавалерия"
 mobile_infantry_maneuver_warfare: "Манёвренная война"

 GRAND_DOCTRINE_FLEET_IN_BEING_DESC: "Клуб больших пушек — традиционалистский акцент на военно-морской артиллерии и тяжёлом бронировании, чтобы подавить вражеский флот и потопить его в шторме из стали."

 SUBDOCTRINE_ARMORED_RAIDERS: "Бронированные рейдеры"
 SUBDOCTRINE_ARMORED_RAIDERS_DESC: "Эскорт конвоев в первую очередь ориентирован на противолодочную оборону. Представьте их шок, когда в их рядах появится полностью вооружённый линейный корабль — как волк среди овец."
 armored_raiders_modernized_officer_education: "Модернизированные протоколы поиска"
 SUBDOCTRINE_COASTAL_DEFENCE: "Флот береговой обороны"
 SUBDOCTRINE_COASTAL_DEFENCE_DESC: "Более мелкие военные корабли, делающие акцент на огневой мощи, а не на дальности, и действующие вблизи дружественных берегов, могут стать серьёзным сдерживающим фактором для вражеского флота."
 coastal_defence_fleet_aging_navy: "Программа модернизации"
 coastal_defence_fleet_casemate_upgrades: "Модернизация вспомогательного вооружения"
 SUBDOCTRINE_NAVAL_GUNFIRE_SUPPORT_DESC: "Как только вражеский линейный флот нейтрализован, наши тяжёлые корабельные орудия могут свободно обратить свой гнев на наземные цели, поддерживая наши войска на берегу."
 convoy_escort_escort_reclassification: "Упорная защита конвоев"
 SUBDOCTRINE_SCREEN_INTEGRATED_OPERATIONS_DESC: "Эскортным силам не хватает огневой мощи линейных кораблей, но, используя скорость как броню, они могут оказать ценную услугу даже в генеральном морском сражении."
 SUBDOCTRINE_SCREEN_HUNTER_KILLERS_DESC: "Пока вражеские подлодки угрожают задушить нашу военную экономику, хорошо организованные и агрессивные эскортные эсминцы могут превратить охотника в добычу."
 SUBDOCTRINE_SCREEN_TORPEDO_PRIMACY_DESC: "Акцент на агрессивных, дерзких торпедных атаках эсминцев в ущерб оборонительному эскорту, чтобы измотать вражескую боевую линию перед главным сражением."
 SUBDOCTRINE_SCREEN_SUPPORT_FOCUS_DESC: "Улучшения в подготовке и организации наших вспомогательных кораблей косвенно, но значительно усилят наш основной боевой флот."
 SUBDOCTRINE_SCREEN_JEUNE_ECOLE_DESC: "Доктринальная концепция, делающая акцент на роях малых кораблей, торпедных ударах и непрямой торговой войне как противоядие от старой идеи артиллерийской дуэли больших пушек в открытом море."
 SUBDOCTRINE_SCREEN_PATROL_BOATS_DESC: "Дешёвые быстроходные катера, вооружённые торпедами, — мощное средство против традиционного линейного флота из тяжёлых кораблей, особенно в прибрежных водах, где они могут наносить удары из засады."
 patrol_boats_home_waters_defense: "Оборона внутренних вод"
 SUBDOCTRINE_CARRIER_BATTLEGROUPS_DESC: "Авианосец быстро затмевает линкор как главное военно-морское оружие нашей эпохи. Наши флоты должны строиться вокруг них."
 escort_carrier_support_evasive_convoy_maneuvers: "Уклончивые манёвры конвоев"
 SUBDOCTRINE_BROAD_NAVAL_SUPPORT: "Универсальная поддержка"
 SUBDOCTRINE_BROAD_NAVAL_SUPPORT_DESC: "Объединяя разведку, господство в воздухе и ударные возможности в одном пакете, авианосцы являются бесценным универсальным инструментом в руках командующего оперативным соединением."
 broad_naval_support_carrier_maneuvering: "Манёврирование авианосцев"
 broad_naval_support_organized_support_protocols: "Организованные протоколы поддержки"
 light_task_forces_localized_sea_power: "Локализованное морское господство"
 SUBDOCTRINE_SUBMARINE_WOLFPACKS_DESC: "Охотиться рассредоточенно — бить сообща. Наши подлодки могут рассредоточиться, чтобы охватить огромные просторы океана, а затем подать сигнал друг другу для сближения при обнаружении подходящей добычи."
 wolfpacks_improvisation: "Культура импровизации"
 wolfpacks_wolfpack_coordination: "Централизованная идентификация позывных"
 SUBDOCTRINE_SUBMARINE_COASTAL_DEFENSE: "Береговая оборона"
 submarine_coastal_defense_optimized_compartments: "Миниатюризация систем"

 SUBDOCTRINE_DESCRIPTION: "С помощью поддоктрины мы специализируемся и совершенствуем наш подход к ведению войны в определённой области."

 SUBDOCTRINE_FIGHTER_HOMELAND_DEFENSE: "ПВО метрополии"
 air_subdoctrine_tactical_flexibility_combat_discipline: "Эффективная организация поиска и спасения"
 SUBDOCTRINE_FLYING_ARTILLERY_DESC: "Универсальный подход к приоритетам ударов, поражающий цели возможности от линии фронта до оперативной глубины."
 air_subdoctrine_dive_bombers_terrifying_precision: "Систематическая воздушная терроризация"
 air_subdoctrine_carrier_strikes_optimized_deck_space_usage: "Оптимизация ангарного пространства"
 SUBDOCTRINE_NAVAL_STRIKE_TACTICS_DESC: "Палубной авиации приходится прорываться сквозь строй вражеских истребителей и ПВО, чтобы доставить свой груз. Наша подготовка будет делать акцент на выживаемости и упорстве при нанесении атаки."
 air_subdoctrine_long_range_escort_mutual_air_cover: "Круговая оборона строя"
 air_subdoctrine_tactical_battlefield_support_ship_hunters: "Доступность бронебойных бомб"
 air_subdoctrine_theater_interdiction_extended_reach: "Оптимизация маршрутов полёта"
 SUBDOCTRINE_COASTAL_AIR_PATROL_DESC: "Традиционные прибрежные средства обороны на уровне моря требуют больших затрат людских ресурсов и неэффективны. Воздушная мобильность позволяет нам следить за дружественными берегами и наказывать любого потенциального захватчика."
 air_subdoctrine_open_ocean_air_patrol_harbor_raids: "Рейды на гавани"

