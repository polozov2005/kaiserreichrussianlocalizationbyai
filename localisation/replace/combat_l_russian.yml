#changed to British spelling
 BM_DECRYPTION_DESC: "Боевые единицы с преимуществом в разведданных обладают повышенными уроном и защитой."
 BM_FORT_MODIFIER_DESC: "Укрепления снижают потери защитников и помогают удерживать оборону. Для захвата хорошо укрепленных провинций используйте сверхтяжелые танки или инженеров. Атаки с разных направлений снижают эффект укреплений."
 BM_ENEMY_AIR_SUPERIORITY_DESC: "Трудно организовать эффективную оборону, когда у противника есть превосходство в воздухе."
