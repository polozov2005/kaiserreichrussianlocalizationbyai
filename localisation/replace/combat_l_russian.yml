#changed to British spelling
 BM_DECRYPTION_DESC: "Юниты с преимуществом расшифровки имеют увеличенный урон и защиту." #NT!
 BM_FORT_MODIFIER_DESC: "Форты снижают потери защитников и помогают в обороне. Чтобы взять сильно укрепленные провинции, используйте сверхтяжелые танки или инженеров. Атака с нескольких направлений уменьшит эффект фортов." #NT!
 BM_ENEMY_AIR_SUPERIORITY_DESC: "Трудно организовать эффективную оборону, когда у противника есть превосходство в воздухе." #NT!
 BM_ENEMY_AIR_SUPERIORITY_COUNTER_DESC: "Наличие зенитных батальонов в ваших дивизиях поможет вам противостоять штрафу противника за превосходство в воздухе к обороне/прорыву, а также позволит сбивать самолеты, которые атакуют напрямую." #NT!
 BATTLE_DEFENCE: "Оборона" #NT!
 TACTICS_LOCKED_BY_NOT_HANDLED: "§RЗаблокировано. Чтобы разблокировать игроку необходимо выполнить определенные условия.§!" #NT!
 COMMAND_GROUP_DESC: "Армия необходима для создания планов боевых действий, позволяющих организовать передвижение большого количества подразделений в несколько этапов." #NT!
 COMMAND_ARMY_GROUP_DESC: "Группа армий организует армии с инструкциями и планами высокого уровня." #NT!
 NAVAL_INVASION_COMBAT_PROGRESS_DESC: "Это подразделение осуществляет военно-морское вторжение. Его атака снижается, а защита улучшается за счет брони транспорта." #NT!
 NAVAL_INVASION_DEFEND_SCALE: "Общая защитная способность: $VALUE|=+0%$" #NT!
 LAND_COMBAT_CAS_INFO_TOOLTIP: "Около $NUM|Y$ самолетов поддержки со стороны $SIDE$ недавно смогли помочь в этом бою.\nОни нанесли $ORG|G0$ урона §YOrganisation§!, текущему врагу §YOrganisation§! составляет $ORG_MAX|G0$.\nОни нанесли $STR|G0$ урона §YStrength§!, текущему врагу §YStrength§! составляет $STR_MAX|G0$.\nВражеские дивизии $SIDE$0ПВО$SIDE$1 сбили $SIDE$2 самолётов и при эффективности $SIDE$3 предотвратили $SIDE$4 §YOrganisation§! урон и $SIDE$6 §YStrength§! повреждать." #NT!
 BM_PARADROP_DESC: "Подразделения будут дезорганизованы после десантирования." #NT!
 MISSION_CAS_WIN: "Дивизии противника нейтрализованы: $VAL|0+$" #NT!
 BM_DEFEND_VALUE: "Защита: $VALUE|+=%$" #NT!
 COMBAT_ARMOR_DESC: "$PIERCING|H$ из $TOTAL|H$ дивизий противника могут пробить броню этой дивизии." #NT!
 COMBAT_PIERCING_DESC: "Эта дивизия может пробить $PIERCING|H$ из $TOTAL|H$ бронетанковых дивизий противника." #NT!
 CARRIER_EFFICIENCY_ORG: "Организация: $VAL$" #NT!

