l_russian:

### military spirits ###
 living_off_the_land_army_spirit: "Жизнь за счет земли"
 living_off_the_land_army_spirit_desc: "Хорошо уничтожать врага своим оружием, но еще лучше уничтожать его его же оружием."
 rapid_emplacement_army_spirit: "Быстрое размещение"
 rapid_emplacement_army_spirit_desc: "Вся огневая мощь мира ничего не значит, когда она находится не в том месте."
 direct_fire_support_army_spirit: "Прямая огневая поддержка"
 direct_fire_support_army_spirit_desc: "Установите его на нулевую высоту и вступайте в бой с врагом с открытого прицела!"
 subsidized_contracts_army_spirit: "Субсидируемые контракты"
 subsidized_contracts_army_spirit_desc: "Хотя замена лошади танком желательна в долгосрочной перспективе, это не может быть сделано ценой краха национальной экономики."
 subsidized_contracts_no_lar_army_spirit: "$subsidized_contracts_army_spirit$"
 subsidized_contracts_no_lar_army_spirit_desc: "$subsidized_contracts_army_spirit_desc$"
 all_arms_at_defense_army_spirit: "Общевойсковая противотанковая оборона"
 all_arms_at_defense_army_spirit_desc: "Прорыв бронетехники может произойти в любое время и в любом месте. Бог войны помогает тем, кто помогает себе сам."
 spirit_of_defiance_army_spirit: "Дух неповиновения"
 spirit_of_defiance_army_spirit_desc: "Народ не может быть побежден, пока он не признает, что он побежден."
 proxy_wars_army_spirit: "Специалисты по вмешательству"
 proxy_wars_army_spirit_desc: "Враг моего врага – мой друг."
 naval_tripwire_navy_spirit: "Военно-морская растяжка"
 naval_tripwire_navy_spirit_desc: "Мы не можем полностью остановить приближение врага к нашим берегам, но можем сделать это кровавым и дорогостоящим для него."
 ship_to_shore_navy_spirit: "Обучение на корабле на берегу"
 ship_to_shore_navy_spirit_desc: "Ни одна наземная артиллерия не может рассчитывать на то, чтобы сравниться с огневой мощью десятков тысяч тонн военно-морской стали."
 scouting_force_navy_spirit: "Разведывательная сила"
 scouting_force_navy_spirit_desc: "Море огромное. Победа в бою обычно достаётся той стороне, которая первой обнаружит и нанесёт решительный удар другому."
 fleet_defense_navy_spirit: "Флот обороны"
 fleet_defense_navy_spirit_desc: "Боевой воздушный патруль и легкие корабли существуют для того, чтобы наши тяжелые нападающие могли выполнять свою работу, не отвлекаясь на грубое вмешательство."
 fleet_interoperability_navy_spirit: "Совместимость флота"
 fleet_interoperability_navy_spirit_desc: "Быстрое пополнение материально-технического снабжения и эффективный контроль ущерба сами по себе не позволяют выиграть битву, но они поддерживают огонь победы."
 rapid_concentration_navy_spirit: "Быстрая концентрация"
 rapid_concentration_navy_spirit_desc: "Быстро набросьтесь на врага, словно рой саранчи, стреляя из всех имеющихся в вашем распоряжении видов оружия: самый быстрый путь к победе."
 aa_curtain_navy_spirit: "Зенитная завеса"
 aa_curtain_navy_spirit_desc: "Подобно древней стене щитов, каждый корабль боевого флота несет ответственность не только за собственную защиту, но и за помощь своему соседу."
 stay_at_your_posts_navy_spirit: "Оставайтесь в своих сообщениях"
 stay_at_your_posts_navy_spirit_desc: "Пока один винт вращается и одно орудие остается над ватерлинией, мы все еще в бою."
 selective_engagement_navy_spirit: "Выборочное взаимодействие"
 selective_engagement_navy_spirit_desc: "Дурак стоит на месте перед превосходящим противником и позволяет себя уничтожить. Откажитесь от боя, который вы не можете выиграть."
 sea_lane_denial_navy_spirit: "Запрет морского пути"
 sea_lane_denial_navy_spirit_desc: "Морского ежа ничто не ест, и не зря."
 underdog_mentality_navy_spirit: "Менталитет аутсайдера"
 underdog_mentality_navy_spirit_desc: "Если поначалу у вас не получится, торпедируйте еще раз."
 cult_of_heroism_army_spirit: "Культ героизма"
 cult_of_heroism_army_spirit_desc: "На протяжении всей истории и по сей день солдаты и граждане одинаково чтят жертвы своих товарищей."
