 raid_category_header_air_raids: "Воздушные налеты"
 raid_category_header_nuclear_raids: "Ядерные удары"
 raid_category_header_paratrooper_raids: "Парашютистские рейды"
 raid_category_header_naval_commando_raids: "Морские рейды"
 raid_category_header_land_infiltration_raids: "Наземные рейды"
 tooltip_raid_category_air_raids: "§Налёты воздушных бомбардировок§!\nАвиаудары одного авиакрыла, направленные на поражение конкретной цели."
 tooltip_raid_category_nuclear_raids: "§HЯдерные налеты§!\nУдары, наносимые стратегическими бомбардировщиками или баллистическими ракетами, несущими ядерное оружие."
 tooltip_raid_category_paratrooper_raids: "§HДесантно-десантные рейды§!\nМаломасштабные рейды, выполняемые парашютно-десантным спецназом, высадившимся в тылу врага для проведения опасных диверсионных миссий."
 tooltip_raid_category_naval_commando_raids: "§HРейды морских коммандос§!\nНебольшие рейды, совершаемые морскими пехотинцами на прибрежные районы с использованием небольших скоростных катеров и аналогичного оборудования, чтобы нанести быстрый удар и затем исчезнуть до того, как противник успеет отреагировать."
 tooltip_raid_category_land_infiltration_raids: "§HНаземные рейды§! \nНебольшие рейды, совершаемые сухопутными войсками в тылу врага с использованием скрытности и уловок для применения тактики быстрого удара и бегства."
 tooltip_launch_all_button_first: "§GНажмите§! запустить все готовые рейды"
 tooltip_launch_all_button_second: "$NUM|H$ рейдов готовы к запуску"
 tooltip_launch_button_enabled: "§GНажмите§! начать рейд"
 tooltip_launch_button_disabled: "§RРейд не готов к запуску§!"
 tooltip_for_expand_button: "§GНажмите§! расширять"
 tooltip_for_collapse_button: "§GНажмите§! рухнуть"
 tooltip_for_no_items: "§RНет предметов§!"
 raid_type_facility_strike: "Забастовка по объекту"
 raid_type_facility_strike_desc: "Авиаудар по экспериментальному объекту противника с целью нанесения серьезного ущерба объекту и любому проекту на нем."

 raid_type_lock_bombing_raid: "Бомбардировка замка"
 raid_type_lock_bombing_raid_desc: "Самолеты, оснащенные специальными прыгающими бомбами, пытаются разрушить шлюзы, чтобы воспрепятствовать проходу через канал."
 raid_type_lock_bombing_raid_no_bba: "$raid_type_lock_bombing_raid$"
 raid_type_lock_bombing_raid_no_bba_desc: "$raid_type_lock_bombing_raid_desc$"

 raid_type_dam_bombing_raid: "Бомбардировка плотины"
 raid_type_dam_bombing_raid_desc: "Самолеты, оснащенные специальными прыгающими бомбами, пытаются разрушить дамбу, снижая ее эффективность и затрудняя передвижение противника в этом районе."
 raid_type_dam_bombing_raid_no_bba: "$raid_type_dam_bombing_raid$"
 raid_type_dam_bombing_raid_no_bba_desc: "$raid_type_dam_bombing_raid_desc$"

 raid_type_gun_emplacement_raid: "Удар с огневой точки"
 raid_type_gun_emplacement_raid_desc: "Группа бомбардировщиков, оснащенных бомбой-землетрясом, пытается уничтожить огневую точку $mega_gun_emplacement$."
 raid_type_gun_emplacement_raid_no_bba: "$raid_type_gun_emplacement_raid$"
 raid_type_gun_emplacement_raid_no_bba_desc: "$raid_type_gun_emplacement_raid_desc$"

 raid_type_mega_gun_emplacement_strike: "Удар по огневой точке из мегапушки"
 raid_type_mega_gun_emplacement_strike_desc: "Удар по огневой точке Мега-пушки с использованием бомб «Землетрясение»."
 raid_type_mega_gun_emplacement_strike_no_bba: "$raid_type_mega_gun_emplacement_strike$"
 raid_type_mega_gun_emplacement_strike_no_bba_desc: "$raid_type_mega_gun_emplacement_strike_desc$"

 raid_type_oilfield_raid: "Рейд на нефтяное месторождение"
 raid_type_oilfield_raid_desc: "Авиаудар был направлен на уничтожение крупного нефтяного месторождения и связанных с ним нефтеперерабатывающих заводов, чтобы серьезно нарушить производство топлива противником на длительный период времени."
 raid_type_nuclear_strike: "Ядерный удар"
 raid_type_nuclear_strike_desc: "Стратегический бомбардировщик и его сопровождение полетят к назначенной цели и сбросят атомную бомбу. Затем бомбардировщик попытается покинуть эту зону, чтобы не попасть под взрывную волну."
 raid_type_nuclear_missile_strike: "Ракетно-ядерный удар"
 raid_type_nuclear_missile_strike_desc: "Ракета большой дальности будет двигаться по суборбитальной баллистической траектории от назначенной стартовой площадки к намеченной цели. В нужный момент бортовая боеголовка произведет атомный взрыв."
 raid_type_nuclear_missile_strike_submarine: "Подводная лодка $raid_type_nuclear_missile_strike$"
 raid_type_nuclear_missile_strike_submarine_desc: "$raid_type_nuclear_missile_strike_desc$"
 raid_type_paratrooper_facility_sabotage: "Диверсионный рейд на объект"
 raid_type_paratrooper_facility_sabotage_desc: "Команда десантников высаживается на вражеский объект и пытается уничтожить жизненно важное оборудование с помощью фиксированных зарядов, чтобы сорвать их научный прогресс."
 raid_type_mine_sabotage_raid: "Рейд на минную диверсию"
 raid_type_mine_sabotage_raid_desc: "Группа десантников высаживается на крупный минный комплекс противника и пытается взорвать заряды, которые надолго остановят производство."
 raid_type_pathfinder_raid: "Следопыт Рейд"
 raid_type_pathfinder_raid_desc: "Группа десантников высаживается в тылу врага, чтобы подготовиться к предстоящему вторжению, разрушая важные мосты, устраивая засады и вообще отвлекая внимание."
 raid_type_commando_port_raid: "Рейд в морской порт"
 raid_type_commando_port_raid_desc: "Группа морских пехотинцев отправляется нанести ущерб большой, контролируемой противником $naval_base$. Суда в порту также могут пострадать."
 raid_type_commando_facility_raid: "Рейд на морской объект"
 raid_type_commando_facility_raid_desc: "Группа морских пехотинцев отправляется нанести ущерб экспериментальному комплексу в прибрежной провинции."
 raid_type_airfield_raid: "Рейд на аэродром"
 raid_type_supply_hub_raid: "Рейд на центр снабжения"
 raid_type_demo_dam_raid: "Демо-версия «Убойного рейда»"
 raid_type_thermonuclear_strike: "Термоядерный удар"
 raid_type_thermonuclear_strike_desc: "Стратегический бомбардировщик и его сопровождение подлетят к назначенной цели и сбросят термоядерную бомбу. Затем бомбардировщик попытается покинуть эту зону, чтобы не попасть под взрывную волну."
 raid_type_thermonuclear_missile_strike: "Термоядерный ракетный удар"
 raid_type_thermonuclear_missile_strike_desc: "Ракета большой дальности будет двигаться по суборбитальной баллистической траектории от назначенной стартовой площадки к намеченной цели. В нужный момент бортовая боеголовка произведет термоядерный взрыв."
 raid_type_thermonuclear_missile_strike_submarine: "Подводная лодка $raid_type_thermonuclear_missile_strike$"
 raid_type_thermonuclear_missile_strike_submarine_desc: "$raid_type_thermonuclear_missile_strike_desc$"
 raid_type_CHI_huansheng_raid: "Операция Хуаньшэн"
 raid_type_CHI_huansheng_raid_desc: "Наша разведка сообщает, что, несмотря на ценные цели, сталелитейный завод Явата и военно-морской арсенал Сасебо слишком сложны для наших военно-воздушных сил, чтобы нанести правильный удар в данный момент. Поэтому было решено, что наиболее эффективным способом остановить эту войну было бы поднять сознание японского народа против зверств, совершенных империалистическими японскими поджигателями войны в Китае, путем разбрасывания листовок над такими городами, как Нагасаки, Фукуока, Сага и Осака."
 raid_type_CHI_tokyo_imperial_palace_bombing: "Взрыв Императорского дворца в Токио"
 raid_type_CHI_tokyo_imperial_palace_bombing_desc: "Отправив группу бомбардировщиков для атаки на главный штаб противника и символическое место имперской власти Японии, мы можем поднять моральный дух нашего народа, одновременно нанося удар по моральному духу нашего врага."
 raid_type_CHI_national_diet_bombing: "Бомбардировка национальной диеты"
 raid_type_CHI_national_diet_bombing_desc: "Отправив группу бомбардировщиков для атаки на главный штаб врага и символическое место силы Японии, мы можем поднять моральный дух нашего народа, одновременно нанося удар по моральному духу нашего врага."
 raid_type_CHI_hakko_ichiu_bombing: "Взрыв Хакко Итиу"
 raid_type_CHI_hakko_ichiu_bombing_desc: "Отправив группу бомбардировщиков для атаки на вражеский символ империализма, мы покажем слабость Японии и одновременно поднимем моральный дух нашего народа."
 raid_type_CHI_great_wall_raid_land: "Рейд по проникновению на Великую стену"
 raid_type_CHI_great_wall_raid_land_desc: "Стена не имеет того же защитного статуса, что и раньше, но все же может дать окопавшемуся врагу преимущество. Отправив небольшую группу солдат, мы проникнем в ряды противника и взорвем удачно расположенные заряды, которые могут свести на нет их преимущество."

