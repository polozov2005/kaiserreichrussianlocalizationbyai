 continuous_naval_production: "Кораблестроение"
 continuous_naval_production_desc: "Сосредоточив ресурсы на наших верфях и освободив квалифицированных кораблестроителей от военной службы, мы можем значительно сократить время производства кораблей."
 continuous_air_production: "Авиастроение"
 continuous_air_production_desc: "Мы можем реорганизовать нашу авиационную промышленность, чтобы устранить потери и оптимизировать производство."
 continuous_non_factory_construct: "Строительная инженерия"
 continuous_non_factory_construct_desc: "В нашей строительной отрасли всё ещё есть много резервов. Сосредоточив на ней внимание, мы можем значительно ускорить строительство. К сожалению, производство станков является серьёзным узким местом для расширения нашей тяжёлой промышленности, поэтому они не получат выгоды от этих усилий."
 continuous_reduce_training_time: "Армейская подготовка"
 continuous_reduce_training_time_desc: "Создавая специализированные передовые учебные подразделения в каждой дивизии, мы можем отправлять на фронт даже те дивизии, которые ранее были бы задержаны для завершения обучения."
 continuous_suppression: "Подавление сопротивления"
 continuous_suppression_desc: "Внедряясь в крупные группы сопротивления на оккупированных территориях и переманивая их лидеров, мы можем значительно снизить ущерб, который они могут нанести."
 continuous_repair: "Восстановительное строительство"
 continuous_repair_desc: "Мы сформируем специализированные ремонтные бригады из заводских и строительных рабочих и будем централизованно управлять их размещением, чтобы улучшить восстановление повреждённой инфраструктуры."
 continuous_tech_share: "Обмен технологиями"
 continuous_tech_share_desc: "Мы будем поощрять наши исследовательские институты и университеты налаживать связи с коллегами из союзных стран. Это даст нам бонус к обмену технологиями."
