### Manifest ###
 faction_manifest_anti_imperialist_crusade_name: "Антиимпериалистический крестовый поход"
 faction_manifest_anti_imperialist_crusade_desc: "Западное влияние должно быть устранено из Азии и Тихоокеанского региона. Столетия эксплуатации континента длились достаточно долго, и пришло время нанести последний удар империалистическим державам.\n\nВладеть всеми государствами Восточной Азии, Индии, Центральной Азии и Тихоокеанского региона. Исключая Ближний Восток."

