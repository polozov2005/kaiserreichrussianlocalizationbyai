### Manifest ###
 faction_manifest_secure_the_sinosphere_name: "Защитить синосферу"
 faction_manifest_secure_the_sinosphere_desc: "Если Китай хочет вернуться на мировую арену, ему следует вернуть то, что он потерял от крупных держав сто или более лет назад. В процессе мы будем стремиться защитить широко названную Синосферу.\n\nВладеть всеми государствами Китая (включая все претензии), Кореей, Японией, Индокитаем и Сингапуром."

