l_russian:
 fighter: "Истребитель"
 fighter_equipment_desc: "Бойцы быстрые и ловкие и могут выполнять множество задач. Все: от борьбы за превосходство в воздухе, защиты своих бомбардировщиков и перехвата бомбардировщиков противника."
 cv_fighter: "Истребитель (Авианосец)"
 cv_fighter_equipment_desc: "Бойцы быстрые и ловкие и могут выполнять множество задач. Все: от борьбы за превосходство в воздухе, защиты своих бомбардировщиков и перехвата бомбардировщиков противника."
 jet_fighter: "Реактивный истребитель"
 jet_fighter_equipment: "Реактивный истребитель"
 jet_fighter_equipment_desc: "Бойцы быстрые и ловкие и могут выполнять множество задач. Все: от борьбы за превосходство в воздухе, защиты своих бомбардировщиков и перехвата бомбардировщиков противника."
 cas: "Непосредственная авиационная поддержка"
 CAS_equipment_desc: "Самолеты непосредственной воздушной поддержки предназначены для оказания поддержки в наземных боях."
 cv_cas: "Непосредственная авиационная поддержка (Авианосец)"
 cv_CAS_equipment_desc: "Самолеты непосредственной воздушной поддержки предназначены для оказания поддержки в наземных боях."
 nav_bomber: "Военно-морской бомбардировщик"
 nav_bomber_equipment_desc: "Морские бомбардировщики способны атаковать корабли противника."
 cv_nav_bomber: "Морской бомбардировщик (авианосец)"
 cv_nav_bomber_equipment_desc: "Морские бомбардировщики способны атаковать корабли противника."
 tac_bomber: "Тактический бомбардировщик"
 tac_bomber_equipment_desc: "Тактические бомбардировщики — это быстрые бомбардировщики меньшего размера, которые могут помогать наземным войскам и бомбить вражеские здания."
 jet_tac_bomber: "Реактивный тактический бомбардировщик"
 jet_tac_bomber_equipment: "Реактивный тактический бомбардировщик"
 jet_tac_bomber_equipment_desc: "Тактические бомбардировщики — это быстрые бомбардировщики меньшего размера, которые могут помогать наземным войскам и бомбить вражеские здания."
 heavy_fighter: "Тяжелый истребитель"
 heavy_fighter_equipment_desc: "Тяжелые истребители обладают дальнобойным и мощным вооружением. Они хороши как для защиты бомбардировщиков на расстоянии, так и для перехвата бомбардировщиков противника. Однако их более низкая маневренность означает, что им придется сражаться с обычными бойцами."
 strat_bomber: "Стратегический бомбардировщик"
 strat_bomber_equipment_desc: "Стратегические бомбардировщики атакуют вражеские здания и инфраструктуру, лишая их драгоценной промышленности."
 jet_strat_bomber: "Реактивный стратегический бомбардировщик"
 jet_strat_bomber_equipment: "Реактивный стратегический бомбардировщик"
 jet_strat_bomber_equipment_desc: "Стратегические бомбардировщики атакуют вражеские здания и инфраструктуру, лишая их драгоценной промышленности."
 transport_plane: "Транспорт"
 transport_plane_equipment_desc: "Доставляет десантников к месту назначения."
 guided_missile: "Ракета"
 fighter_equipment: "Истребитель"
 cv_fighter_equipment: "Авианосец Истребитель"
 cv_fighter_equipment_short: "КВ Истребитель"
 strat_bomber_equipment: "Стратегический бомбардировщик"
 rocket_interceptor_equipment: "Ракета-перехватчик"
 rocket_interceptor_equipment_desc: "Перехватчик малой дальности с химическим ракетным двигателем."
 suicide_craft_equipment: "Самоубийственное ремесло"
 suicide_craft_equipment_desc: "Пилотируемая бомба ближнего действия с химическим ракетным двигателем."
 fighter_equipment_0: "Межвоенный истребитель"
 fighter_equipment_0_short: "Истребитель"
 fighter_equipment_0_desc: "Хотя истребительная авиация претерпела множество изменений во время Вельткрига, с тех пор конструкция биплана устаревает. Мы должны начать воплощать достижения гражданских технологий в военное применение."
 early_fighter: "$fighter_equipment_0$"
 early_fighter_desc: "$fighter_equipment_0_desc$"
 fighter_equipment_1: "Истребитель I"
 fighter_equipment_1_short: "Истребитель I"
 fighter_equipment_1_desc: "В легких планерах произошла революция с появлением радиальных двигателей, конструкции моноплана и цельнометаллической конструкции обшивки. Этот дизайн — наша попытка создать наш первый современный истребитель."
 fighter1: "$fighter_equipment_1$"
 fighter1_desc: "$fighter_equipment_1_desc$"
 fighter_equipment_2: "Истребитель II"
 fighter_equipment_2_short: "Истребитель II"
 fighter_equipment_2_desc: "Темпы развития истребителей поразительны, и поэтому мы должны продолжать внедрять эти технологии, а также совершенствовать существующие концепции. Наш новый истребитель должен обладать высокой скоростью, высокими характеристиками на высоте и максимально возможной дальностью полета. Кроме того, он должен быть очень хорошо вооружен."
 fighter2: "$fighter_equipment_2$"
 fighter2_desc: "$fighter_equipment_2_desc$"
 fighter_equipment_3: "Истребитель III"
 fighter_equipment_3_short: "Истребитель III"
 fighter_equipment_3_desc: "Хотя наши предыдущие поколения истребителей доказали свою эффективность, следует использовать любое преимущество, полученное за счет более совершенной конструкции. Этот самолет станет вершиной истребителя с поршневым двигателем, обладающим превосходной мощностью, высокой маневренностью, смертоносным вооружением и хорошей дальностью полета."
 fighter3: "$fighter_equipment_3$"
 fighter3_desc: "$fighter_equipment_3_desc$"
 heavy_fighter_equipment: "Тяжелый истребитель"
 heavy_fighter_equipment_1: "Тяжелый истребитель I"
 heavy_fighter_equipment_1_short: "Тяжелый истребитель I"
 heavy_fighter_equipment_1_desc: "Наши бомбардировочные силы нуждаются в охране сопровождения от истребителей противника на всем пути к цели и обратно. Чтобы обеспечить такое сопровождение, мы должны разработать истребители с бомбардировочной дальностью. По необходимости эти самолеты крупнее, медленнее и менее маневренны, чем легкие истребители, хотя они могут нести значительное вооружение."
 heavy_fighter1: "$heavy_fighter_equipment_1$"
 heavy_fighter1_desc: "$heavy_fighter_equipment_1_desc$"
 heavy_fighter_equipment_2: "Тяжелый истребитель II"
 heavy_fighter_equipment_2_short: "Тяжелый истребитель II"
 heavy_fighter_equipment_2_desc: "Война научила нас тому, что наша конструкция тяжелых истребителей уязвима для более маневренных истребителей, но достаточно хороша в перехвате бомбардировщиков противника за счет тяжелого вооружения. Следующая разработка будет сосредоточена на увеличении возможностей атаки против самолетов противника и даже наземных целей. Его скорость и дальность также будут улучшены."
 heavy_fighter2: "$heavy_fighter_equipment_2$"
 heavy_fighter2_desc: "$heavy_fighter_equipment_2_desc$"
 heavy_fighter_equipment_3: "Тяжелый истребитель III"
 heavy_fighter_equipment_3_short: "Тяжелый истребитель III"
 heavy_fighter_equipment_3_desc: "Хотя наши тяжелые истребители продемонстрировали свои способности в различных ролях, мы должны рассмотреть новую конструкцию, которая повысит их возможности по сравнению с истребителями противника, а также позволит им продолжать перехватывать все более быстрые и лучше защищенные бомбардировщики противника."
 heavy_fighter3: "$heavy_fighter_equipment_3$"
 heavy_fighter3_desc: "$heavy_fighter_equipment_3_desc$"
 strat_bomber_equipment_1: "Стратегический бомбардировщик I"
 strat_bomber_equipment_1_short: "Страт-бомбардировщик I"
 strat_bomber_equipment_1_desc: "Опыт Вельткрига и последующие исследования показывают, что бомбардировка военных объектов и крупных городов противника приведет к победе в следующей войне. По крайней мере, у нас должен быть бомбардировщик, способный нанести такие разрушения. Ему нужно будет летать высоко и на хорошей скорости и нести большую полезную нагрузку. Для этого потребуется большой планер с несколькими двигателями. У него также будет некоторый оборонительный потенциал."
 strategic_bomber1: "$strat_bomber_equipment_1$"
 strategic_bomber1_desc: "$strat_bomber_equipment_1_desc$"
 strat_bomber_equipment_2: "Стратегический бомбардировщик II"
 strat_bomber_equipment_2_short: "Страт-бомбардировщик II"
 strat_bomber_equipment_2_desc: "Бомбардировки доказали свою эффективность в снижении способности противника вести войну. Больше оборонительного вооружения и увеличенная скорость позволят новой конструкции избежать разрушения, а увеличение полезной нагрузки и дальности сделает ее более эффективной."
 strategic_bomber2: "$strat_bomber_equipment_2$"
 strategic_bomber2_desc: "$strat_bomber_equipment_2_desc$"
 strat_bomber_equipment_3: "Стратегический бомбардировщик III"
 strat_bomber_equipment_3_short: "Страт-бомбардировщик III"
 strat_bomber_equipment_3_desc: "Чтобы избежать потерь от истребителей противника и огня с земли, наша следующая конструкция будет летать на большой высоте. Он будет больше по размеру, чтобы нести огромную полезную нагрузку и больше топлива, чтобы увеличить дальность полета."
 strategic_bomber3: "$strat_bomber_equipment_3$"
 strategic_bomber3_desc: "$strat_bomber_equipment_3_desc$"
 jet_strat_bomber_equipment_1: "Реактивный стратегический бомбардировщик I"
 jet_strat_bomber_equipment_1_short: "Реактивный бомбардировщик-страт I"
 jet_strat_bomber_equipment_1_desc: "Несколько реактивных двигателей позволяют новым конструкциям развивать беспрецедентную скорость, сохраняя при этом большую полезную нагрузку и большую дальность полета. Эти самолеты созданы для новой эры оружия массового поражения."
 jet_strategic_bomber1: "$jet_strat_bomber_equipment_1$"
 jet_strategic_bomber1_desc: "$jet_strat_bomber_equipment_1_desc$"
 tac_bomber_equipment: "Тактический бомбардировщик"
 tac_bomber_equipment_0: "Межвоенный бомбардировщик"
 tac_bomber_equipment_0_short: "Бомбардировщик"
 tac_bomber_equipment_0_desc: "Широко распространено мнение, что следующая война будет выиграна полностью за счет бомбардировок противника до полного его уничтожения. Крайне важно начать проектирование собственного бомбардировщика, способного нести тяжелые грузы на адекватной скорости."
 early_bomber: "$tac_bomber_equipment_0$"
 early_bomber_desc: "$tac_bomber_equipment_0_desc$"
 tac_bomber_equipment_1: "Тактический бомбардировщик I"
 tac_bomber_equipment_1_short: "Тактический бомбардировщик I"
 tac_bomber_equipment_1_desc: "Средние бомбардировщики должны быть универсальными и быстрыми, способными выполнять широкий спектр задач. Двухмоторная конструкция, оставаясь относительно легкой, может продолжать использоваться еще многие годы."
 tactical_bomber1: "$tac_bomber_equipment_1$"
 tactical_bomber1_desc: "$tac_bomber_equipment_1_desc$"
 tac_bomber_equipment_2: "Тактический бомбардировщик II"
 tac_bomber_equipment_2_short: "Тактический бомбардировщик II"
 tac_bomber_equipment_2_desc: "Более тяжелые конструкции тактических бомбардировщиков могут увеличить дальность полета, полезную нагрузку и скорость, сохраняя при этом способность самолетов выполнять широкий спектр задач."
 tactical_bomber2: "$tac_bomber_equipment_2$"
 tactical_bomber2_desc: "$tac_bomber_equipment_2_desc$"
 tac_bomber_equipment_3: "Тактический бомбардировщик III"
 tac_bomber_equipment_3_short: "Тактический бомбардировщик III"
 tac_bomber_equipment_3_desc: "Взяв за основу достижения в области истребителей, нетрадиционные материалы и формы могут сделать новые конструкции одними из самых быстрых и эффективных двухмоторных самолетов, когда-либо созданных."
 tactical_bomber3: "$tac_bomber_equipment_3$"
 tactical_bomber3_desc: "$tac_bomber_equipment_3_desc$"
 transport_plane_equipment: "Транспортный самолет"
 transport_plane_equipment_1: "Межвоенный транспортный самолет"
 # transport_plane_equipment_1_short: "Transport I"
 transport_plane_equipment_1_desc: "Самолеты использовались для перевозки войск при парашютных операциях."
 transport_plane_equipment_2: "Улучшенный транспортный самолет"
 # transport_plane_equipment_2_short: "Transport II"
 transport_plane_equipment_2_desc: "Самолеты использовались для перевозки войск при парашютных операциях."
 transport_plane_equipment_3: "Современный транспортный самолет"
 # transport_plane_equipment_3_short: "Transport III"
 transport_plane_equipment_3_desc: "Самолеты использовались для перевозки войск при парашютных операциях."
 nav_bomber_equipment: "Военно-морской бомбардировщик"
 cv_nav_bomber_equipment: "CV военно-морской бомбардировщик"
 cv_nav_bomber_equipment_short: "CV военно-морской бомбардировщик"
 nav_bomber_equipment_1: "Морской бомбардировщик I"
 nav_bomber_equipment_1_short: "НАВ I"
 nav_bomber_equipment_1_desc: "В ближайшее десятилетие военно-морская авиация будет иметь жизненно важное значение для противостояния новым тенденциям в военно-морской войне, таким как возросшая важность подводных лодок. Пригодятся гидросамолеты, способные работать в качестве пикирующих бомбардировщиков и разведывательных машин."
 naval_bomber1: "$nav_bomber_equipment_1$"
 naval_bomber1_desc: "$nav_bomber_equipment_1_desc$"
 nav_bomber_equipment_2: "Военно-морской бомбардировщик II"
 nav_bomber_equipment_2_short: "НАВ II"
 nav_bomber_equipment_2_desc: "Новая технология двигателей и улучшенная аэродинамическая конструкция значительно повысят скорость и возможности пикирования военно-морских самолетов."
 naval_bomber2: "$nav_bomber_equipment_2$"
 naval_bomber2_desc: "$nav_bomber_equipment_2_desc$"
 nav_bomber_equipment_3: "Военно-морской бомбардировщик III"
 nav_bomber_equipment_3_short: "НАВ III"
 nav_bomber_equipment_3_desc: "Цельнометаллическая конструкция и мощные воздушные тормоза позволяют выполнять более сложную морскую авиацию. Однако самолетам будущего потребуется более крупный экипаж для управления этими передовыми системами."
 naval_bomber3: "$nav_bomber_equipment_3$"
 naval_bomber3_desc: "$nav_bomber_equipment_3_desc$"
 CAS_equipment: "Непосредственная авиационная поддержка"
 cv_CAS_equipment: "Перевозчик CAS"
 cv_CAS_equipment_short: "Резюме CAS"
 CAS_equipment_1: "Непосредственная авиационная поддержка I"
 CAS_equipment_1_short: "КАС I"
 CAS_equipment_1_desc: "Наша доктрина CAS требует самолета, способного наносить высокоточные удары по надводным целям. Хотя эти самолеты несут меньшую полезную нагрузку по сравнению с нашими более крупными тактическими бомбардировщиками, они способны атаковать и уничтожать небольшие цели путем обстрела и бомбардировки с пикирования."
 CAS1: "$CAS_equipment_1$"
 CAS1_desc: "$CAS_equipment_1_desc$"
 CAS_equipment_2: "Непосредственная авиационная поддержка II"
 CAS_equipment_2_short: "КАС II"
 CAS_equipment_2_desc: "Опыт ранней войны показал, что повышенная скорость, броня и маневренность необходимы для живучести самолетов CAS против истребителей противника и огня с земли. Это следующее поколение штурмовиков также будет использовать более крупные бомбы, пушки и пулеметы, чтобы наносить больший ущерб своим целям."
 CAS2: "$CAS_equipment_2$"
 CAS2_desc: "$CAS_equipment_2_desc$"
 CAS_equipment_3: "Непосредственная авиационная поддержка III"
 CAS_equipment_3_short: "КАС III"
 CAS_equipment_3_desc: "Постоянно растущие возможности противовоздушной обороны и перехватчиков противника требуют дальнейшего развития наших самолетов CAS. Новая конструкция включает увеличенную мощность двигателя, усовершенствования планера для увеличения возможностей погружения и защиты, а также еще большую полезную нагрузку."
 CAS3: "$CAS_equipment_3$"
 CAS3_desc: "$CAS_equipment_3_desc$"
 jet_fighter_equipment_1: "Реактивный истребитель I"
 jet_fighter_equipment_1_short: "Реактивный истребитель I"
 jet_fighter_equipment_1_desc: "Предыдущее увеличение скорости меркнет по сравнению с появлением первых реактивных истребителей. Хотя нам еще предстоит научиться лучше всего конструировать самолеты для этих двигателей, обычные истребители не могут конкурировать с ними."
 jet_fighter1: "$jet_fighter_equipment_1$"
 jet_fighter1_desc: "$jet_fighter_equipment_1_desc$"
 jet_fighter_equipment_2: "Реактивный истребитель II"
 jet_fighter_equipment_2_short: "Реактивный истребитель II"
 jet_fighter_equipment_2_desc: "Новая конструкция стреловидного крыла и выбор более легких материалов позволят нам еще больше расширить дальность и скорость революционных реактивных истребителей."
 jet_fighter2: "$jet_fighter_equipment_2$"
 jet_fighter2_desc: "$jet_fighter_equipment_2_desc$"
 jet_tac_bomber_equipment_1: "Реактивный тактический бомбардировщик I"
 jet_tac_bomber_equipment_1_short: "Джет Так Бомбардировщик I"
 jet_tac_bomber_equipment_1_desc: "Появление реактивных истребителей требует бомбардировщиков, способных обогнать их или, по крайней мере, сравниться с ними по скорости. Эту роль выполнят средние бомбардировщики и бомбардировщики-истребители первого поколения, оснащенные реактивными двигателями."
 jet_tactical_bomber1: "$jet_tac_bomber_equipment_1$"
