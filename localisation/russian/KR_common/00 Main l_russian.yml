### Events ###
 generic_events.100.t: "Порядок восстановлен в [Root.GetNameDef]"
 generic_events.100.d: "Хотя [Root.GetNameDef] всё ещё находится под контролем [Root.overlord.GetAdjective], [Root.GetAdjective] военные установили достаточный контроль над нашими собственными границами, чтобы теперь можно было проявлять подобие большей автономии. Это не независимость — далеко не так — но это означает, что нам больше не нужно полагаться на [Root.overlord.GetAdjective] войска для защиты наших границ."
 generic_events.100.a: "Отлично"

 generic_events.101.t: "Порядок восстановлен в [From.GetNameDef]"
 generic_events.101.d: "Хотя [From.GetNameDef] всё ещё находится под контролем [Root.GetAdjective], [From.GetAdjective] военные установили достаточный контроль над своими собственными границами, чтобы теперь можно было проявлять подобие автономии. Это не независимость — далеко не так — но это означает, что им больше не нужно полагаться на [Root.GetAdjective] войска для защиты своих границ, и, следовательно, они не так плотно находятся под нашим контролем."
 generic_events.101.a: "Пусть будет так."

 generic_events.102.t: "Большая [Root.GetAdjective] автономия?"
 generic_events.102.d: "[Root.GetNameDefCap] остаётся под контролем [Root.overlord.GetAdjective] правительства, но этот контроль начинает ослабевать по мере того, как наша сила вновь утверждается. [Root.GetAdjective] мощь — это не то, что можно легко сдержать, и уже наши лидеры требуют большего контроля над нашими собственными делами. Наверняка наш [Root.overlord.GetAdjective] сюзерен не сможет долго нам сопротивляться."
 generic_events.102.a: "Да здравствует [Root.GetNameDef]!"

 generic_events.103.t: "Большая [From.GetAdjective] автономия"
 generic_events.103.d: "[From.GetNameDefCap] остаётся под контролем [Root.GetAdjective] правительства, но этот контроль начинает ослабевать по мере того, как их сила вновь утверждается. [From.GetAdjective] мощь — это не то, что можно легко сдержать, и требования их лидеров о большем контроле над своими собственными делами ощущаются по всей стране."
 generic_events.103.a: "Нам нужно внимательно следить за этим"

 generic_events.106.t: "Борьба за независимость"
 generic_events.106.d: "Контроль [Root.overlord.GetAdjective] над [Root.GetAdjective] правительством ослабевает уже некоторое время. Мы слишком сильны, чтобы они могли нас сдержать. Среди [Root.GetAdjective] народа растёт общее требование, чтобы [Root.GetNameDef] стал свободным, и скоро придёт наше время."
 generic_events.106.a: "Да здравствует свободный [Root.GetName]!"
 generic_events.106.b: "Да, мы должны требовать нашей независимости"
 generic_events.106.c: "Нет, лучше не дразнить осиное гнездо"

 generic_events.107.t: "[From.GetNameDefCap] требует независимости"
 generic_events.107.d: "Контроль [Root.GetAdjective] над [From.GetAdjective] правительством ослабевает уже некоторое время. Они слишком сильны, чтобы мы могли их полностью сдержать. Среди [From.GetAdjective] народа растёт общее требование, чтобы [From.GetNameDef] был освобождён, и теперь их правительство официально подало требование о полной независимости."
 generic_events.107.a: "Отпустим их, пока мы ещё друзья"
 generic_events.107.b: "Они шутят? Забудьте об этом"

 generic_events.108.t: "Независимость отклонена"
 generic_events.108.d: "[From.GetAdjective] правительство отклонило наше требование о независимости. Хотя мы лишь номинально находимся под их контролем, ограничения всё ещё стесняют нас."
 generic_events.108.a: "На этом всё не заканчивается"

 KR_fight_for_independence: "Объявить независимость"
 KR_fight_for_independence_desc: "[From.GetNameDefCap], возможно, отклонило наше требование о независимости, но это не конец дела. Мы будем свободны, даже если нам придётся сражаться за это!"

 generic_events.109.t: "[From.GetNameDefCap] объявляет независимость"
 generic_events.109.d: "Похоже, наш отказ предоставить [From.GetNameDef] независимость был для них недостаточен. Они всё равно объявили себя свободными от контроля [Root.GetAdjective]."
 generic_events.109.a: "Ба! Пусть уходят"
 generic_events.109.b: "Ещё посмотрим!"

 generic_events.110.t: "Война за независимость"
 generic_events.110.d: "Похоже, наш бывший сюзерен не может получить чёткую опору в [Root.GetNameDef]... но и мы не можем их победить. Возможно, пришло время призвать к перемирию и покончить с этим?"
 generic_events.110.a: "Да, давайте покончим с этим"
 generic_events.110.b: "Нет! Теперь это больше, чем просто независимость!"

 generic_events.111.t: "[From.GetAdjective] война за независимость"
 generic_events.111.d: "Война с [From.GetNameDef] продолжается уже некоторое время, и ни одна из сторон не может получить явного преимущества. Возможно, пришло время просто признать их независимость и покончить с этим."
 generic_events.111.a: "Да, давайте покончим с этим"
 generic_events.111.b: "Нет! Мы закончим это!"

 generic_events.250.t: "Сделать [marked_country.GetNameDef] марионеткой?"
 generic_events.250.d: "Это превратит [marked_country.GetNameDef] в субъект [to_be_overlord.GetNameDef], используя стандартное автономное состояние «Оккупированная марионетка». Если они находятся в другом альянсе, они покинут его, но это не завершит ни одну из текущих войн, в которых они участвуют. Если вы хотите сделать это, вам следует сделать это отдельно.\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"
 generic_events.250.a: "Сделать"
 generic_events.250.b: "Сделать, но позволить им сохранить их текущее правительство"
 generic_events.250.c: "С другой стороны..."

 generic_events.251.t: "Освободить [marked_country.GetNameDef]?"
 generic_events.251.d: "Это сделает [marked_country.GetNameDef] полностью независимым. Это не изменит их текущее правительство (если только у мода нет контента для автоматического изменения), не удалит [marked_country.GetNameDef] из их альянса, если они в нём состоят, и не выведет их из каких-либо войн.\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"

 generic_events.252.t: "Вступить в [to_be_faction_leader.GetFactionName]?"
 generic_events.252.d: "Это заставит [marked_country.GetNameDef] вступить в [to_be_faction_leader.GetFactionName], распустив их собственный альянс, если они являются лидером альянса, или просто покинув их текущий альянс, если они в нём состоят. Это не изменит какие-либо войны, в которых они в настоящее время участвуют.\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"

 generic_events.253.t: "Возглавить [marked_country.GetFactionName]?"
 generic_events.253.d: "Это сделает [marked_country.GetNameDef] лидером альянса [marked_country.GetFactionName].\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"

 generic_events.254.t: "Покинуть [marked_country.GetFactionName]?"
 generic_events.254.d: "Это заставит [marked_country.GetNameDef] покинуть [marked_country.GetFactionName], распустив альянс, если они являются лидером. Это не повлияет на какие-либо войны, в которых они в настоящее время участвуют.\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"

 generic_events.255.t: "Мир с [peace_target.GetNameDef]?"
 generic_events.255.d: "[marked_country.GetNameDefCap] вместе со всеми своими союзниками заключит сепаратный мир с [peace_target.GetNameDef] и всеми их союзниками.\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"
 generic_events.255.b: "Отделить [marked_country.GetNameDef] от его союзников, затем заключить мир"

 generic_events.256.t: "Выйти из всех войн?"
 generic_events.256.d: "[marked_country.GetNameDefCap] заключит сепаратный мир по всем своим текущим войнам. Если это субъект, он сначала будет освобождён, а если он находится в альянсе, он должен сначала покинуть его.\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"

 generic_events.257.t: "Война с [war_target.GetNameDef]?"
 generic_events.257.d: "[marked_country.GetNameDefCap] объявит войну [war_target.GetNameDef]. Нет проверок, чтобы увидеть, является ли это действительным объявлением, кроме того, что две страны не являются союзниками и не находятся уже в состоянии войны.\n\n§RПРИМЕЧАНИЕ: Это вполне может сломать контент Kaiserreich! Используйте на свой страх и риск!!§!"

### Unit Leader Events ###
 unit_leader.1.t: "[From.GetName] заболевает"
 unit_leader.1.d: "В своей службе нации, похоже, [From.GetRank] [From.GetName] слишком перенапряг [From.GetHerselfHimself]. В результате плохого климата в [From.GetHerHis] оперативной зоне, [From.GetRank] теперь заболел и, вероятно, потребуется некоторое время для восстановления. Пока [From.GetSheHe] не поправится, [From.GetSheHe] не будет работать на своём обычном уровне."
 unit_leader.1.a: "Прискорбно."

 unit_leader.2.t: "[From.GetName] ранен"
 unit_leader.2.d: "В ходе успешного завершения боя, похоже, [From.GetRank] [From.GetName] подверг [From.GetHerselfHimself] слишком большому риску, ведя [From.GetHerHis] людей. [From.GetSheHeCap] был ранен, и, вероятно, потребуется некоторое время для полного заживления ран, до которого времени [From.GetRank] не будет работать на своём обычном уровне."
 unit_leader.2.a: "Прискорбно."

### Government in Exile Events ###
 mtg_exile_leader_added.1.t: "[exile_nation.GetAdjective] лидер в изгнании предлагает услуги"
 mtg_exile_leader_added.1.desc: "После долгого и опасного путешествия через вражескую территорию и несколько нейтральных государств высокопоставленный военный офицер от одного из наших капитулировавших союзников наконец прибыл в столицу. После короткого периода восстановления он предложил свои услуги в нашей общей борьбе."
 mtg_exile_leader_added.1.a: "Ваша борьба ещё не окончена."

 mtg_exile_government.2.title: "[From.GetAdjective] правительство в изгнании"
 mtg_exile_government.2.desc: "[From.GetLeader] официально запросил разрешение у [Root.GetAdjective] правительства вернуться в [From.GetNameDef] и восстановить временный кабинет [From.GetRulingParty] в подготовке к послевоенному миру."
 mtg_exile_government.2.a: "Пришло время им вернуться на свою территорию."
 mtg_exile_government.2.b: "Время ещё не пришло."

 mtg_exile_government.3.title: "[From.GetName] запрашивает военно-морскую интеграцию"
 mtg_exile_government.3.desc: "[From.GetAdjective] военно-морское руководство представило нам план интеграции нашего флота в их флот. Они утверждают, что, позволив [From.GetAdjective] военно-морским планировщикам иметь полный контроль над нашими кораблями, их эффективность резко возрастёт по сравнению с их текущими независимыми действиями."
 mtg_exile_government.3.a: "Мы согласны."
 mtg_exile_government.3.b: "Мы не будем служить под их командованием."

 mtg_exile_government.4.title: "[From.GetName] принимает военно-морскую интеграцию"
 mtg_exile_government.4.desc: "[From.GetAdjective] правительство сообщило нам, что они согласны с нашим предложением, и отныне их корабли будут действовать под нашим командованием."
 mtg_exile_government.4.a: "Отлично."

 mtg_exile_government.5.title: "[From.GetName] отклоняет военно-морскую интеграцию"
 mtg_exile_government.5.desc: "[From.GetAdjective] правительство сообщило нам, что их флот никогда не будет служить под командованием иностранной державы. Они намерены помогать нам, но сделают это независимо."
 mtg_exile_government.5.a: "Они ставят свою гордость выше интересов альянса."

 mtg_generic.1.title: "[From.GetName] навязывает смену правительства"
 mtg_generic.1.desc: "Ссылаясь на явное отсутствие электоральной поддержки нашего текущего правительства, [From.GetNameDef] потребовало смены политики."
 mtg_generic.1.a: "У нас нет выбора, кроме как принять."

