 ## TAB 3 ##
 KR_welcome_splash_tab_3_content: "§YОбратите внимание на следующее:§!\n£white_dot \n£white_dot \n£white_dot \n\n£white_dot \n\n£white_dot \n\n£white_dot \n\n§YСообщение о проблемах:§!\nЭтот мод всё ещё находится в разработке, поэтому возможны ошибки и вылеты. Если вы столкнётесь с какими-либо проблемами, пожалуйста, сообщите о них в наш §Yтрекер проблем на GitHub§!, чтобы помочь нам быстро их исправить. Ссылку можно найти в меню паузы."
 KR_welcome_splash_tab_3_content_0: "Kaiserreich накладывает ограничения на дипломатические действия, такие как §Rранние войны§!, §Rальянсы§! и §Rуровни автономии§!.\nKaiserreich также включает механики §Cлимитов дивизий§! и §Cдемобилизации§! для улучшения игровой производительности на поздних этапах.\nВо время §Yмирных конференций§! обязательно аннексируйте все возможные регионы. Позже вы сможете выпустить страны из аннексированных территорий через §Cрешения§!.\nМеню настройки §Yпользовательских правил игры§! позволяет настроить множество опций, включая §Cпути стран§!, §Cприоритет игрока во время мирных конференций§! и §Cинструмент передачи регионов и стран§!.\n£kr_options_icon  §YМеню внутриигровых опций§! можно открыть, нажав на его значок в правом верхнем углу. Оно позволяет настроить §Cчастоту новостных событий§! и включить §Cдинамическое переименование§! регионов и стратегических точек.\n§YЭто окно§! можно повторно открыть в любое время, нажав на значок £help_button  в правом верхнем углу."

