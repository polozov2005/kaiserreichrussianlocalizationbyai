 SKM_tashi_namgyal_advisor_desc: "§YBorn:§! §L26 октября 1893 года, Тибет, Великий Цин§!\n§YСправочная информация:§! §L$SKM_tashi_namgyal_bio$ бывший Чогьял поселился в Бутане с большей частью своего богатства, надеясь, что в свое время он сможет вернуть себе королевство.§!" #NT!
 SKM_tashi_namgyal_leader_desc: "§YBorn:§! §L26 октября 1893 года, Тибет, Великий Цин§!\n§YСправочная информация:§! §L$SKM_tashi_namgyal_bio$ Чогьял укрылся в Бутане, выжидая момента для возможного возвращения в свое королевство.\n\nВосстановленный в должности Чогьяла, Таши Намгьял планирует мирно править, просто соблаговолив расширению доступа к образованию и здравоохранению для Сиккимский.§!" #NT!
 SKM_tashi_namgyal_bio: "Получив образование в школе Святого Павла в Дарджилинге, а затем в престижном колледже Майо в Аджмере, Таши Намгьял стал преемником своего сводного брата в декабре 1914 года. Он был коронован 13-м Далай-ламой и мирно правил маленьким королевством Сикким более десяти лет после этого. Выгнанный из дома непальцами в 1926 году," #NT!
