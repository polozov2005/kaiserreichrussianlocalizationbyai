l_russian:

### Ideas ###
 SER_reparation_payments: "Военные репарации Болгарии"
 SER_reparation_payments_desc: "Поскольку Сербия проиграла Четвёртую Балканскую войну, она обязана выплачивать военные репарации Болгарии."
 BUL_reparation_payments_from_serbia: "Военные репарации от Сербии"
 BUL_reparation_payments_from_serbia_desc: "Сербия выплачивает военные репарации Болгарии."
 BPL_pact_of_organisation: "Пакт организации"
 BPL_pact_of_organisation_desc: "Подписание Пакта организации помогло интегрировать экономики балканских стран и углубить отношения. Экономический совет Пакта координирует торговлю и экономические связи, и наша страна ощущает выгоды.\n\n§RЕсли мы окажемся в состоянии войны с каким-либо членом этого экономического союза, Совет будет распущен, и мы потеряем все преимущества.§!"
 BP_war_exhaustion: "Балканское военное истощение"
 belgrade_part_arms_embargo: "Международное эмбарго на поставки оружия"
 belgrade_part_arms_embargo_desc: "По решению Австрийской империи и её союзников по всей Европе против нас введено международное эмбарго на поставки оружия. Наши границы закрыты для импорта оружия и боеприпасов, и нам придётся обходиться скудным внутренним производством. Следовательно, мы должны быстро покончить с Болгарией."

### Decisions ###
 Belgrade_Pact_Balkan_War: "Белградский пакт"

 Belgrade_Pact_invite_member: "Пригласить [From.GetNameDef] в Белградский пакт"
 Belgrade_Pact_invite_member_desc: "Армии [From.GetAdjective] будут крайне необходимы, если мы хотим достичь наших целей. Пришло время пригласить их в наш расширенный альянс."

 Belgrade_Pact_Romania_capture_dobrudzha_mission: "Захватить Добруджу"
 Belgrade_Pact_Romania_capture_dobrudzha_mission_desc: "Наконец-то мы можем отомстить болгарам. Наш долг — вернуть Добруджу, украденную у нас Центральными державами после Мировой войны."
 Belgrade_Pact_Serbia_capture_macedonia_mission: "Захватить Македонию"
 Belgrade_Pact_Serbia_capture_macedonia_mission_desc: "Наконец-то мы можем отомстить болгарам. Наш долг — вернуть Македонию, которая по праву принадлежит нам, но была украдена Болгарией после Мировой войны."
 Belgrade_Pact_Greece_capture_southern_macedonia: "Захватить Южную Македонию"
 Belgrade_Pact_Greece_capture_southern_macedonia_desc: "Наконец-то мы можем отомстить болгарам. Наш долг — вернуть Македонию, которая по праву принадлежит нам, но была украдена Болгарией после Мировой войны."
 Belgrade_Pact_race_to_sofia: "Гонка к Софии"
 Belgrade_Pact_race_to_sofia_desc: "Болгарская оборона прорвана, и дорога на Софию открыта. Вопрос времени, когда падёт болгарская столица. Захват этого важного города стал бы большим успехом для нашей страны."

### Opinion Modifiers ###
 Belgrade_Pact_anti_bulgaria: "Против Болгарии"
 Belgrade_Pact_joined_boo: "Присоединился к пакту против Болгарии"
 Belgrade_Pact_did_not_join_yay: "Отказался присоединиться к Белградскому пакту"
 Belgrade_Pact_joined_yay: "Присоединился к Белградскому пакту"
 Belgrade_Pact_refused: "Отказался присоединиться к нашему пакту"
 Belgrade_Pact_joined_against_us: "Присоединился к пакту против нас"

### Flags ###
 BP_working_on_eco_union: "Уже работает над этим проектом"

### Events ###
 belgrade_pact_events.1.t: "Белградский конгресс"
 belgrade_pact_events.1.d: "Сотрудничество балканских стран против общего врага, несмотря на их внутренние разногласия, — путь, уже хорошо проторенный историей. Балканская лига, созданная Сербией, Болгарией и Грецией для разгрома Османской империи на Балканах, была ярким тому примером, хотя и распалась во Вторую Балканскую войну всего через несколько месяцев после победы. Сегодня Сербия, Румыния и Греция противостоят другому гегемону — Болгарскому царству — и у каждой из них есть территории, которые нужно вернуть.\n\nПочти два десятилетия мысль о таком союзе была немыслима. Три балканских государства были разгромлены, ослаблены, разоружены, а взоры великих европейских держав были постоянно прикованы к ним. Однако к 1930-м годам ситуация решительно изменилась. Постоянная слабость Австро-Венгерской империи и, как следствие, отсутствие воли вмешиваться в дела Балкан уже дали балканским младшим государствам шанс перевооружиться, а теперь — и шанс планировать вместе. Двусторонние саммиты и дипломатические переговоры велись между Сербией и Румынией с 1932 года, и Сербией и Грецией с 1934 года, и всё это завершилось Белградским конгрессом.\n\nЧетырнадцатидневный саммит в столице Сербии — это столько же культурное, сколько и политическое событие. Дипломатическое планирование между министрами иностранных дел трёх государств происходит параллельно с диалогом между университетами Белграда и Бухареста по вопросам исследований и студенческих обменов, например.\n\nТак или иначе, к концу Конгресса делегации трёх государств опубликовали резолюцию из 14 пунктов, самым тревожным из которых было «признание того, что только самоопределение народов, согласно их этнической принадлежности, может считаться справедливым путём к суверенитету и территориальным притязаниям», и призыв к «новому порядку на Балканах» для реализации этого принципа, предположительно за счёт Болгарии."
 # Of course, such an event could not take place without controversy. The inclusion of the Romanian delegation, while crucial, has been protested by many representatives in the Skupština, who could not bring themselves to bear [SER.GetLeader] shaking hands with the despised Corneliu Codreanu. - TBA later
 belgrade_pact_events.1.a: "Открыть Конгресс!"

 belgrade_pact_events.2.t: "Белградский конгресс"
 belgrade_pact_events.2.d: "[From.GetNameDefCap] пригласило нас направить дипломата в Белград для участия в Белградском конгрессе, чтобы обсудить политическую и военную ситуацию на Балканах. После победы Болгарии в Мировой войне мы, как и Сербия, имеем виды на земли, которые по праву принадлежат нам. Они предлагают сформировать новый формальный союз под названием Белградский пакт для защиты наших взаимных интересов и сдерживания болгарской угрозы. Однако это может разозлить бывших союзников Болгарии — Германию, Австрию и Османскую империю."
 belgrade_pact_events.2.a: "Объявить о поддержке Белградского пакта."
 belgrade_pact_events.2.b: "Их альянс нас не интересует."

 belgrade_pact_events.3.t: "[From.GetName] присоединяется к Белградскому пакту"
 belgrade_pact_events.3.d: "Правительство [From.GetAdjective] объявило, что примет участие в конгрессе в Белграде и официально присоединится к Белградскому пакту."
 belgrade_pact_events.3.a: "Вместе за мир!"

 belgrade_pact_events.4.t: "[From.GetName] отказывается"
 belgrade_pact_events.4.d: "Правительство [From.GetAdjective] объявило, что в настоящее время не будет участвовать ни в каком формальном альянсе, направленном против Болгарии."
 belgrade_pact_events.4.a: "Они нам не нужны."

 belgrade_pact_events.5.t: "Конец Пакта"
 belgrade_pact_events.5.d: "Хотя мы пытались сформировать альянс для продвижения сербских интересов на Балканах, мы остались одни против большого мира. Пришло время признать, что Белградскому пакту пришёл конец."
 belgrade_pact_events.5.a: "Увы..."

 belgrade_pact_events.6.t: "Белградский конгресс призывает к новому порядку на Балканах"
 belgrade_pact_events.6.d: "По инициативе Сербии представители нескольких стран собрались в Белграде для обсуждения политической и военной ситуации на Балканах. В ходе этого четырнадцатидневного мероприятия сербы, румыны и греки замышляют создать так называемый «новый порядок на Балканах», даже дойдя до принятия резолюции из 14 пунктов, в которой заявляется, что «только самоопределение народов, согласно их этнической принадлежности, может считаться справедливым путём к суверенитету и территориальным притязаниям».\n\nОчевидно, что Балканы снова неспокойны, и резолюции Белградского конгресса, несомненно, будут использованы для оправдания совместной войны против Болгарии и, в конечном счёте, Австрийской империи. Что делать с этой проблемой?"
 belgrade_pact_events.6.a: "Сербы и румыны подумают дважды после эмбарго!"
 belgrade_pact_events.6.b: "Пусть приходят, Балканы не могут нам угрожать."

 belgrade_pact_events.7.t: "[From.GetName] объявляет о поддержке Болгарии"
 belgrade_pact_events.7.d: "Правительство [From.GetAdjective] объявило сегодня, что поддержит Болгарию в любых будущих конфликтах между Белградским пактом и Болгарским царством, а также присоединится к международному эмбарго на поставки оружия, чтобы подорвать наши запасы оружия в рамках подготовки к войне."
 belgrade_pact_events.7.a: "Это нехорошо."

 belgrade_pact_events.8.t: "[From.GetName] объявляет о поддержке Болгарии"
 belgrade_pact_events.8.d: "По инициативе Сербии представители нескольких стран собрались в Белграде для обсуждения политической и военной ситуации на Балканах. В ходе этого четырнадцатидневного мероприятия сербы, румыны и греки замышляют создать так называемый «новый порядок на Балканах», даже дойдя до принятия резолюции из 14 пунктов, в которой заявляется, что «только самоопределение народов, согласно их этнической принадлежности, может считаться справедливым путём к суверенитету и территориальным притязаниям».\n\nОчевидно, что Балканы снова неспокойны, и резолюции Белградского конгресса, несомненно, будут использованы для оправдания совместной войны против Болгарии и, в конечном счёте, Австрийской империи. Австрийцы призвали к международному эмбарго на поставки оружия балканским государствам в поддержку Болгарии. Должны ли мы также объявить о поддержке болгар?"
 belgrade_pact_events.8.a: "Только Болгария сохранит стабильность на Балканах."
 belgrade_pact_events.8.b: "Балканы нас не интересуют."

 belgrade_pact_events.17.t: "Сербский удар!"
 belgrade_pact_events.17.d: "После напряжённого двухнедельного противостояния на реке Морава сербское правительство наконец высказалось снова — они требуют от нас освободить Македонию и регион Ниш в течение 48 часов, фактически передав их под контроль Сербии, чтобы защитить местное сербское население от дальнейшего террора и кровопролития. Последующие ультиматумы были направлены их союзниками по Белградскому пакту, касающиеся этнического конфликта и их опасений на соответствующих территориях.\n\nЕщё до того, как чернила на этих документах высохли, наши силы в Нише уже сообщили о сербских войсках, пересекающих Мораву, о первых стычках и воздушных бомбардировках. У нас остаётся только один вариант."
 belgrade_pact_events.17.a: "К войне! Защитим честь Болгарии!"

 belgrade_pact_events.21.t: "Вопрос Фракии"
 belgrade_pact_events.21.d: "Поскольку Болгария сейчас вовлечена в войну с Белградским пактом, в правительственных кругах встал вопрос: не следует ли и нам вернуть земли, которые по праву принадлежат нам? После окончания Мировой войны Болгария оккупировала земли в Западной Фракии, которые в основном населены мусульманами и турками. Несомненно, они поймут резон, если их старый «союзник» попросит вернуть их?"
 belgrade_pact_events.21.a: "Выдвинуть требование."
 belgrade_pact_events.21.b: "Мы не заинтересованы вмешиваться сейчас."

 belgrade_pact_events.22.t: "Османы требуют Фракию"
 belgrade_pact_events.22.d: "Похоже, наши старые «союзники» в Османской империи хотят извлечь выгоду из нашего нынешнего конфликта с Белградским пактом. Они потребовали возвращения Западной Фракии, области, которая в основном населена мусульманами и турками, но которую мы по праву оккупируем с конца Мировой войны. Если мы откажемся, они могут атаковать нас с тыла — дополнительный фронт в войне, который мы едва ли можем себе позволить."
 belgrade_pact_events.22.a: "Отдать им то, что они хотят..."
 belgrade_pact_events.22.b: "Ни за что! Мы разобьём и их!"

 belgrade_pact_events.23.t: "Болгария соглашается"
 belgrade_pact_events.23.d: "Понимая мудрость избегания войны на два фронта, Болгария согласилась вернуть нам земли в Западной Фракии."
 belgrade_pact_events.23.a: "Весьма мудро."

 belgrade_pact_events.24.t: "Болгария отказывается"
 belgrade_pact_events.24.d: "Упрямое до последнего, болгарское правительство ответило на наши требования только возмущением. Они готовы сражаться и с нами, если потребуется."
 belgrade_pact_events.24.a: "Да будет так."

 belgrade_pact_events.25.t: "Османы в движении"
 belgrade_pact_events.25.d: "Возможно, решив, что наша война против Белградского пакта даёт возможность, османские силы собираются вдоль нашей общей границы. Трудно сказать, выдвинут ли они требования или просто вторгнутся, но мы должны быть готовы к любому исходу."
 belgrade_pact_events.25.a: "Как они смеют!"

 belgrade_pact_events.26.t: "Помощь от [From.GetAdjective] прибывает"
 belgrade_pact_events.26.d: "Как и обещало, правительство [From.GetNameDef] направило нам помощь в продолжающемся конфликте с Белградским пактом. К сожалению, они не могут вмешаться напрямую, но прибыло несколько добровольческих дивизий и некоторое снаряжение."
 belgrade_pact_events.26.a: "Любая помощь приветствуется."
 belgrade_pact_events.26.tt: "Прибывают войска и снаряжение [From.GetAdjective]"

 belgrade_pact_events.27.t: "[BPL.GetName] ведёт переговоры о мире"
 belgrade_pact_events.27.d: "Министерство иностранных дел [BPL.GetAdjective] сообщило нам, что в настоящее время они ведут переговоры о мирном договоре с Болгарией, который положил бы конец войне и удовлетворил щедрые территориальные требования всех членов Пакта. Поскольку война затянулась, такой мир приветствовался бы народом. Однако Болгария останется независимым государством, что вызывает беспокойство у некоторых чиновников в нашем правительстве — это означает, что Болгария теоретически может перевооружиться и нанести ответный удар, как это было во время Мировой войны. Следует ли нам принять этот мир?"
 belgrade_pact_events.27.a: "Давайте закончим войну сейчас, пока издержки не возросли."
 belgrade_pact_events.27.b: "Bulgaria delenda est!"
 BP_temporary_breakaway_tt: "Вы сможете снова присоединиться к Пакту после войны."

 belgrade_pact_events.28.t: "Софийский мир"
 belgrade_pact_events.28.d: "Мирный договор подписан между членами Белградского пакта и Болгарией в Софии, положив конец Четвёртой Балканской войне."
 belgrade_pact_events.28.a: "Победа!"

 belgrade_pact_events.29.t: "Военное истощение"
 belgrade_pact_events.29.d: "Наша страна вступила в Четвёртую Балканскую войну с обещанием, что война будет короткой и приведёт к быстрым территориальным приобретениям, но теперь она зашла в тупик, и население жаждет мира. Ходят слухи, что болгары предложили очень щедрый мирный договор, который удовлетворил бы все наши территориальные претензии, но он был отвергнут, и поэтому ещё больше людей будет отправлено на смерть в войне ни за что. Наши офицеры с трудом мотивируют своих солдат продолжать сражаться, а на внутреннем фронте нарастает беспорядок."
 belgrade_pact_events.29.a: "Чёрт..."

 belgrade_pact_events.30.t: "Повторное приглашение в Белградский пакт"
 belgrade_pact_events.30.d: "Теперь, когда война с Болгарией завершена, сербские чиновники обратились к нам с просьбой восстановить наше членство в Белградском пакте для предстоящей борьбы против Австрии."
 belgrade_pact_events.30.a: "Давайте сделаем это."
 belgrade_pact_events.30.b: "Нет, мы воздержимся от дальнейших иностранных авантюр."

 belgrade_pact_events.35.t: "Мы проигрываем Балканскую войну"
 belgrade_pact_events.35.d: "Силы Белградского пакта уверенно разбили нас в бою и оккупировали значительную часть нашей страны. Мы должны закончить эту войну, пока они не захватили всю нашу родину, иначе Болгария может перестать существовать."
 belgrade_pact_events.35.a: "Просить мира..."
 belgrade_pact_events.35.b: "Мы ещё можем победить!"
 BUL_other_states_may_continue_war_tt: "Мир, если будет принят, вступит в силу через четыре дня. В течение этого времени члены Пакта могут продолжать войну самостоятельно."

 belgrade_pact_events.36.t: "Болгария просит мира"
 belgrade_pact_events.36.d: "Значительная часть их родины оккупирована, а их силы полностью отступают, Болгария попросила у нас мира. Они передадут все спорные территории, но мы должны будем отвести наши войска за новые границы. Независимое болгарское государство продолжит существовать, пока что."
 belgrade_pact_events.36.a: "Белградский пакт торжествует!"
 belgrade_pact_events.36.b: "Нет, они должны быть полностью раздавлены!"
 SER_other_states_may_continue_war_tt: "Мир будет обработан через семь дней. В течение этого времени наши союзники могут покинуть Пакт, чтобы продолжить войну самостоятельно."

 belgrade_pact_events.37.t: "Мир с Белградским пактом"
 belgrade_pact_events.37.d: "Белградский пакт принял наше предложение мира. Мы должны уступить все спорные земли, но они отведут свои силы за новую границу."
 belgrade_pact_events.37.a: "По крайней мере, мы существуем!"

 belgrade_pact_events.38.t: "Болгария капитулирует"
 belgrade_pact_events.38.d: "Объединённые вооружённые силы Белградского пакта сумели исправить несправедливости, навязанные нам после окончания Мировой войны. Болгария уступит все спорные земли Белградскому пакту, но мы должны отвести наши войска за границу. Независимая, но сильно урезанная Болгария продолжит существовать, пока что."
 belgrade_pact_events.38.a: "Белградский пакт торжествует!"
 belgrade_pact_events.38.b: "Отправить поздравления в Белград, мы получили то, за чем пришли."

 belgrade_pact_events.39.t: "Болгария заключает мир"
 belgrade_pact_events.39.d.gained: "Болгария заключила мир с Белградским пактом, и поэтому мы вынуждены также закончить нашу войну. К счастью, мы выйдем из войны, получив любые заявленные штаты, которые мы контролируем, не дав сербам возможности поделить их со своими союзниками."
 belgrade_pact_events.39.d.nogain: "Болгария заключила мир с Белградским пактом. К сожалению, поскольку мы не получили контроль над нашими заявленными штатами, они остаются в руках сербов, чтобы те поделили их по своему усмотрению. Похоже, нам следовало двигаться быстрее."
 belgrade_pact_events.39.a: "Хорошо."
 belgrade_pact_events.39.b: "Тогда мы продолжаем войну!"

 belgrade_pact_events.40.t: "Мы оккупировали Фракию"
 belgrade_pact_events.40.d: "Мы оккупировали Западную Фракию нашими войсками и всё ещё удерживаем линию фронта против Болгарии. Несомненно, они увидят мудрость в заключении мира сейчас?"
 belgrade_pact_events.40.a: "Сделать предложение — давайте покончим с этим."
 belgrade_pact_events.40.b: "Нет — они хотели войны, они её получат!"

 belgrade_pact_events.41.t: "Османы предлагают мир"
 belgrade_pact_events.41.d: "Османы оккупировали свои заявленные штаты и всё ещё удерживают линию фронта против нас. Если мы продолжим войну против них, мы можем полностью пасть. Возможно, нам стоит подумать о том, чтобы дать им то, что они хотят?"
 belgrade_pact_events.41.a: "Ба! Да будет так!"
 belgrade_pact_events.41.b: "Нет, мы продолжаем войну во что бы то ни стало!"

 belgrade_pact_events.42.t: "Мы проигрываем войну"
 belgrade_pact_events.42.t.germany: "Германия требует прекратить войну за Фракию"
 belgrade_pact_events.42.t.austria: "Австрия требует прекратить войну за Фракию"
 belgrade_pact_events.42.t.germanyandaustria: "Германия и Австрия требуют прекратить войну за Фракию"
 belgrade_pact_events.42.t.losing: "Мы проигрываем войну"
 belgrade_pact_events.42.d: "Несмотря на своё тяжёлое положение, Болгария смогла успешно отбиться от наших атак. Маленькая победоносная война обернулась трагедией, и мы потеряли контроль над всей территорией в Европе. Возможно, если мы откажемся от притязаний на Фракию, войне можно будет положить конец?"
 belgrade_pact_events.42.d.germany: "Слишком долго война против Болгарии продолжается без конца. Через два года немцы наконец решили вмешаться в дела Балкан: они потребовали, чтобы мы вместе с Пактом вывели все наши силы из Болгарии, фактически вернув Балканы к статус-кво. Возможно, нам следует отказаться от претензий на Фракию и закончить войну; раздражать Берлин — последнее, что нам нужно, когда мы уже потеряли столько людей в бессмысленном конфликте."
 belgrade_pact_events.42.d.austria: "Слишком долго война против Болгарии продолжается без конца. Через два года австрийцы наконец решили вмешаться в дела Балкан: они потребовали, чтобы мы вместе с Пактом вывели все наши силы из Болгарии, фактически вернув Балканы к статус-кво. Возможно, нам следует отказаться от претензий на Фракию и закончить войну; раздражать Вену — последнее, что нам нужно, когда мы уже потеряли столько людей в бессмысленном конфликте."
 belgrade_pact_events.42.d.germanyandaustria: "Слишком долго война против Болгарии продолжается без конца. Через два года австрийцы и немцы выступили с совместным заявлением, требуя прекращения войны на Балканах, ссылаясь на угрозу европейской безопасности и миру. Возможно, нам следует отказаться от претензий на Фракию и закончить войну; раздражать Берлин и Вену — последнее, что нам нужно, когда мы уже потеряли столько людей в бессмысленном конфликте."
 belgrade_pact_events.42.d.losing: "Несмотря на все шансы против них и то, что мы считали быстрой войной, болгары оттеснили нас назад. Действительно, мы больше не контролируем земли в Европе, и если так продолжится, мы окажемся в очень тяжёлом положении. Возможно, мы можем предложить отказаться от претензий на Фракию и положить конец этой войне сейчас?"
 belgrade_pact_events.42.a: "Да, сделать мирное предложение."
 belgrade_pact_events.42.b: "Нет, мы будем сражаться!"

 belgrade_pact_events.43.t: "Османы призывают к миру"
 belgrade_pact_events.43.d: "Османы, явно сожалея о своём вмешательстве в войну и уже вытесненные из Европы, предложили заключить мир — они откажутся от претензий на Западную Фракию и уйдут туда, откуда пришли."
 belgrade_pact_events.43.a: "Да будет так."

 belgrade_pact_events.46.t: "[From.GetNameDefCap] отвергает мир"
 belgrade_pact_events.46.d: "Хотя мы предложили большие уступки нашему врагу, правительство [From.GetAdjective] отвергло наше мирное предложение, заявив, что мы будем полностью раздавлены."
 belgrade_pact_events.46.a: "Нам нужно переломить ход войны!"

 belgrade_pact_events.47.t: "Мы проигрываем войну"
 belgrade_pact_events.47.t.germany: "Германия требует прекратить Балканскую войну"
 belgrade_pact_events.47.t.austria: "Австрия требует прекратить Балканскую войну"
 belgrade_pact_events.47.t.germanyandaustria: "Германия и Австрия требуют прекратить Балканскую войну"
 belgrade_pact_events.47.t.losing: "Мы проигрываем Балканскую войну"
 belgrade_pact_events.47.d: "Война с Болгарией была абсолютным провалом. Не смотря на наших союзников в Белградском Договоре, Болгария вновь смогла одержать победу над нами, и они уже на подходе к Белграду. Мы можем предложить болгарам роспуск нашего альянса, признаём капитуляцию территории Черногории, демилитаризацию пограничных территорий и выплату репараций на несколько лет. Это большая цена, но альтернативой является полная потеря независимости."
 belgrade_pact_events.47.d.germany: "Война против Болгарии затянулась настолько, что Берлин наконец начал оказывать на нас давление. Дипломатическая нота германского министерства иностранных дел требует, чтобы все силы Пакта покинули болгарскую территорию, фактически вернув Балканы к статус-кво. Невыполнение этого требования будет означать вступление Германии в войну для «стабилизации ситуации на Балканах».\n\nХотя это явно означает наше поражение, безусловно, могло быть и хуже. В конце концов, если мы согласимся, мы сохраним независимость и избежим наказания от Софии."
 belgrade_pact_events.47.d.austria: "Война против Болгарии затянулась настолько, что Вена наконец начала оказывать на нас давление. В резком письме австрийцы потребовали, чтобы Пакт вывел все свои силы с Балкан, иначе Императорская армия вмешается, чтобы «стабилизировать ситуацию на Балканах». Хотя это явно означает наше поражение, безусловно, могло быть и хуже. В конце концов, если мы согласимся, мы сохраним независимость и избежим наказания от Софии."
 belgrade_pact_events.47.d.germanyandaustria: "Совместная декларация Германии и Австрии ясно дала понять одно: продолжающаяся война Пакта против Болгарии больше не будет терпеться, поскольку она представляет «угрозу стабильности на Балканах». Хотя это явно означает наше поражение, безусловно, могло быть и хуже. В конце концов, если мы согласимся, мы сохраним независимость и избежим наказания от Софии."
 belgrade_pact_events.47.d.losing_intro: "Война против Болгарии обернулась полной катастрофой. Несмотря на наших союзников в Белградском пакте, Болгария снова смогла победить нас, и они близки к самому [ROOT.Capital.GetCapitalVictoryPointName]. Мы можем предложить болгарам роспуск нашего альянса"
 belgrade_pact_events.47.d.losing_outro: ", отказ от любых претензий на их территорию и демилитаризацию приграничных провинций. Более того, нам нужно предложить им репарационные выплаты в течение нескольких лет. Это суровые условия, но иначе мы можем полностью потерять независимость."
 belgrade_pact_events.47.d.losing_greece: "$belgrade_pact_events.47.d.losing_intro$, уступить город [989.GetCapitalVictoryPointName]$belgrade_pact_events.47.d.losing_outro$"
 belgrade_pact_events.47.d.losing_serbia: "$belgrade_pact_events.47.d.losing_intro$, капитулировать провинцию Черногория, предоставить албанцам в Косово и Албании автономию$belgrade_pact_events.47.d.losing_outro$"
 belgrade_pact_events.47.d.losing_fallback: "$belgrade_pact_events.47.d.losing_intro$$belgrade_pact_events.47.d.losing_outro$"
 belgrade_pact_events.47.a: "Просить мира..."
 belgrade_pact_events.47.b: "Мы ещё можем победить!"

 belgrade_pact_events.48.t: "Сербия предлагает перемирие"
 belgrade_pact_events.48.t.germany: "Германский ультиматум Белграду"
 belgrade_pact_events.48.t.austria: "Австрийский ультиматум Белграду"
 belgrade_pact_events.48.t.germanyandaustria: "Ультиматум Центральных держав Белграду"
 belgrade_pact_events.48.t.victory: "Сербия просит мира"
 belgrade_pact_events.48.d: "Мы преуспели в Балканской Войне, а Белградский Договор находится на грани капитуляции. Сербия предлагает нам мирный договор, согласно которому они признают капитуляцию территории Черногории, демилитаризируют пограничные территории и распустят свой военный альянс. В обмен, мы позволим им сохранить свою независимость."
 belgrade_pact_events.48.d.germany: "Германский Аусвертигес Амт с беспокойством наблюдает за Четвёртой Балканской войной с момента её начала почти два года назад. Хотя Болгария вышла из германского военного альянса после Мировой войны, правительство Кайзера всё ещё считает царское правительство гораздо лучшей альтернативой, чем побеждённая, радикализованная Болгария и торжествующий реваншистский Белградский пакт. С обеими сторонами, истощёнными войной, посол Кайзеррейха в [GER.Capital.GetCapitalVictoryPointName] сообщил нам, что его правительство предъявило ультиматум сербам, грекам и румынам: четырнадцать дней на прекращение огня и возвращение границ на Балканах к статус-кво, или они столкнутся с германской интервенцией. Белградский пакт, опасаясь германской мощи, согласился, и теперь решение за нами.\n\nМногие в царском правительстве, особенно в Либеральной партии, приветствуют перспективу мира, даже без территориальных приобретений. Однако боевой дух в армии всё ещё высок, и наши генералы верят, что полная победа, даже без перспективы мирных переговоров, уже близка. Германский посол утверждает, что спас нас ультиматумом своей империи, но что это за спасение — мир, в котором погибли тысячи, и нечего показать взамен? Время ли для последнего наступления? Или нам следует приветствовать этот мир как удар по Белграду, который сохранит нашу гегемонию на Балканах?"
 belgrade_pact_events.48.d.austria: "Министерство иностранных дел Австро-Венгрии с беспокойством наблюдает за Четвёртой Балканской войной с момента её начала почти два года назад. Хотя Болгария разорвала австро-германский военный альянс после Мировой войны, имперское правительство всё ещё считает болгарскую гегемонию над Сербией и Грецией гораздо лучшей альтернативой, чем побеждённая, радикализованная Болгария и торжествующий реваншистский Белградский пакт, который может попытаться подстрекать меньшинства в Империи. С обеими сторонами, истощёнными войной, посол Австро-Венгерской империи в [AUS.Capital.GetCapitalVictoryPointName] сообщил нам, что его правительство предъявило ультиматум сербам, грекам и румынам: четырнадцать дней на прекращение огня и возвращение границ на Балканах к статус-кво, или они столкнутся с австро-венгерской интервенцией. Белградский пакт, опасаясь австрийской мощи, согласился, и теперь решение за нами.\n\nМногие в царском правительстве, особенно в Либеральной партии, приветствуют перспективу мира, даже без территориальных приобретений. Однако боевой дух в армии всё ещё высок, и наши генералы верят, что полная победа, даже без перспективы мирных переговоров, уже близка. Высокомерный австрийский посол утверждает, что спас нас ультиматумом своей империи, но что это за спасение — мир, в котором погибли тысячи, и нечего показать взамен? Время ли для последнего наступления? Или нам следует приветствовать этот мир как удар по Белграду, который сохранит нашу гегемонию на Балканах?"
 belgrade_pact_events.48.d.germanyandaustria: "Наши старые союзники в Вене и Берлине с беспокойством наблюдают за Четвёртой Балканской войной с момента её начала почти два года назад. Хотя Болгария разорвала австро-германский военный альянс после Мировой войны, и немецкое, и австрийское правительства всё ещё считают болгарскую гегемонию над Сербией и Грецией гораздо лучшей альтернативой, чем побеждённая, радикализованная Болгария и торжествующий реваншистский Белградский пакт, который может попытаться подстрекать меньшинства в Австро-Венгерской империи. С обеими сторонами, истощёнными войной, посол Кайзеррейха в [GER.Capital.GetCapitalVictoryPointName] сообщил нам, что его и австрийское правительства предъявили ультиматум сербам, грекам и румынам: четырнадцать дней на прекращение огня и возвращение границ на Балканах к статус-кво, или они столкнутся с совместной интервенцией. Белградский пакт, опасаясь тевтонской мощи, согласился, и теперь решение за нами.\n\nМногие в царском правительстве, особенно в Либеральной партии, приветствуют перспективу мира, даже без территориальных приобретений. Однако боевой дух в армии всё ещё высок, и наши генералы верят, что полная победа, даже без перспективы мирных переговоров, уже близка. Высокомерный германский посол утверждает, что спас нас ультиматумом их кайзеррейхов, но что это за спасение — мир, в котором погибли тысячи, и нечего показать взамен? Время ли для последнего наступления? Или нам следует приветствовать этот мир как удар по Белграду, который сохранит нашу гегемонию на Балканах?"
 belgrade_pact_events.48.d.victory: "С нашим успехом в Балканской войне Белградский пакт находится на грани краха. Сербия обратилась к нам с мирным предложением: они уступят территорию Черногории, несколько приграничных провинций будут демилитаризованы, Белградский пакт будет распущен, а Сербия выплатит нам военные репарации. Взамен мы позволим им сохранить независимость."
 belgrade_pact_events.48.d.croyug: "С успехами и болгар, и иллирийцев в Балканской войне Белградский пакт находится на грани краха. Пока иллирийский флаг развевается над Белградом, иллирийцы обратились к нам с интересным предложением, мягко говоря. Вместо Югославии под руководством Сербии они предлагают югославянское государство под руководством Иллирии, которое, возможно, будет держать сербов в узде и гарантирует, что они никогда больше не будут угрожать Болгарии! В дополнение к этому несколько приграничных провинций будут демилитаризованы, а Белградский пакт распущен. Взамен мы позволим Греции и Румынии сохранить независимость."
 belgrade_pact_events.48.a: "Мы торжествуем вновь!"
 belgrade_pact_events.48.a.germany: "Если хозяин Европы говорит, что ты победил, значит, ты победил."
 belgrade_pact_events.48.a.austria: "Австрийцы показали, кто настоящий гегемон Балкан."
 belgrade_pact_events.48.a.germanyandaustria: "Хорошо иметь друзей в высоких местах, когда они выигрывают за тебя войну."
 belgrade_pact_events.48.a.victory: "Мы снова торжествуем."
 belgrade_pact_events.48.b: "Нет, они должны быть раздавлены!"

 belgrade_pact_events.49.t: "Болгария принимает мирное предложение"
 belgrade_pact_events.49.d: "Четвёртая Балканская война прошла не совсем так, как мы надеялись. Болгария смогла успешно перейти в наступление и была на грани взятия Белграда. Они приняли наше мирное предложение, чтобы мы могли сохранить независимость. Однако мы должны передать независимость Черногории, отдать Косово Албании и выплачивать военные репарации в течение следующих лет."
 belgrade_pact_events.49.a: "По крайней мере, мы существуем."

 belgrade_pact_events.50.t: "Болгары побеждают"
 belgrade_pact_events.50.d: "Четвёртая Балканская война прошла не совсем так, как мы надеялись. Болгария смогла успешно перейти в наступление и была на грани взятия Белграда. Переговоры между Сербией и Болгарией привели к мирному соглашению. Мы вынуждены демилитаризовать Олтению и отказаться от претензий на болгарскую территорию, а Белградский пакт будет распущен."
 belgrade_pact_events.50.a: "Они непобедимы?"

 belgrade_pact_events.51.t: "Болгары побеждают"
 belgrade_pact_events.51.d: "Четвёртая Балканская война прошла не совсем так, как мы надеялись. Болгария смогла успешно перейти в наступление и была на грани взятия Белграда. Переговоры между Сербией и Болгарией привели к мирному соглашению. Мы вынуждены демилитаризовать Фессалию, уступить Салоники и отказаться от претензий на болгарскую территорию, а Белградский пакт будет распущен."
 belgrade_pact_events.51.a: "Они непобедимы?"

 belgrade_pact_events.52.t: "Война окончена"
 belgrade_pact_events.52.d: "С завершением Четвёртой Балканской войны солдаты [Root.GetAdjective] наконец возвращаются домой из сельской местности, и жизнь возвращается в нормальное русло."
 belgrade_pact_events.52.a: "Наконец-то."

 belgrade_pact_events.53.t: "Война окончена"
 belgrade_pact_events.53.d: "Война с болгарами подошла к концу, и, наконец, наши северные границы возвращаются к подобию нормальности."
 belgrade_pact_events.53.a: "Наконец-то."

 belgrade_pact_events.54.t: "Потребовать прекращения Балканской войны?"
 belgrade_pact_events.54.d: "Болгария заключила мир с Белградским пактом, и таким образом, у нас есть шанс положить конец нашей войне с ними. Воспользуемся ли мы победой Сербии и добьемся своих требований или продлим войну еще на несколько лет?"
 belgrade_pact_events.54.d.germany: "Прошло два года с тех пор, как Белградский пакт попытался уничтожить нашего союзника на Балканах, [BUL.GetNameDef]. Когда война началась, мы мало что могли сделать, чтобы отговорить Белград от его амбиций, так как в то время мы были сосредоточены на внутренних делах. С тех пор наша экономическая и военная мощь была восстановлена, и конца Балканской войне, кажется, не видно. Мы могли бы наконец использовать наше влияние, чтобы выдвинуть очень простое требование Сербии: прекратить эту дестабилизирующую войну или столкнуться с германской интервенцией. Министерство иностранных дел уверено, что это не приведёт к ещё одной великой войне: западные синдикалисты были в основном не заинтересованы в последних балканских делах, и хотя Россия, несомненно, будет протестовать, она не сможет утверждать, что мы требуем подчинения их союзников в регионе."
 belgrade_pact_events.54.d.austria: "Поскольку Четвёртая Балканская война затянулась безрезультатно, у нас наконец может появиться возможность положить конец экспансионизму Белграда. Наша экономическая и военная мощь восстановлена, а силы Сербии истощены после долгого конфликта, нам не составит труда заставить Белградский пакт прекратить войну с Болгарией. Хотя такие действия могут напомнить о том, что вызвало Первую мировую войну, мы не просим многого, кроме мира, и Россия вряд ли вмешается на стороне Пакта."
 belgrade_pact_events.54.a: "Давно пора! Соедините с Белградом."
 belgrade_pact_events.54.b: "Пусть всё идёт своим чередом — нет нужды вмешиваться."

 belgrade_pact_events.64.t: "Призыв к совместной оккупации Болгарии"
 belgrade_pact_events.64.d: "Болгары побеждены, и мы реабилитировали себя в глазах мира! Однако мы изначально не продумали, что делать с оставшимися землями Болгарии, кроме промышленных репараций. Большинство наших военных офицеров призывают как минимум к временной военной оккупации всей Болгарии, в то время как некоторые утверждают, что оккупация может быть слишком дорогостоящей для нашей уставшей нации."
 belgrade_pact_events.64.a: "Разделить Болгарию на оккупационные зоны!"
 belgrade_pact_events.64.b: "Пусть они сохранят независимость."

 belgrade_pact_events.65.t: "[From.GetName] призывает к совместной оккупации Болгарии"
 belgrade_pact_events.65.d: "Правительство [From.GetAdjective] призвало к совместной оккупации оставшихся земель Болгарии. В будущем из этих территорий может быть выкроено гораздо меньшее болгарское государство. Пока же мы имеем право управлять нашей оккупационной зоной по своему усмотрению, даже грабя её из всего ценного."
 belgrade_pact_events.65.a: "Очень хорошо."
 belgrade_pact_events.65.b: "Нет, мы оставляем себе наши новые земли!"

 belgrade_pact_events.66.t: "[From.GetName] отказывается создавать оккупационные зоны"
 belgrade_pact_events.66.d: "Правительство [From.GetAdjective] отклонило наше требование о создании оккупационных зон на бывших болгарских территориях. Они заявили, что вся земля, которая у них есть, теперь по праву принадлежит им. Отношения с [From.GetName] сильно испорчены, и единственное, что нам остаётся, — разорвать наш военный союз."
 belgrade_pact_events.66.a: "Это возмутительно!"

 belgrade_pact_events.70.t: "Помочь Болгарии?"
 belgrade_pact_events.70.d: "Сербы атаковали Болгарию вместе со своими союзниками по Белградскому пакту. Во время Мировой войны Болгария помогала нам, сражаясь бок о бок с нашими солдатами и отправляя помощь в виде оружия. Некоторые утверждают, что мы должны напрямую вмешаться в пользу Болгарии, но другие говорят, что это нарушит хрупкое равновесие на Балканах и может привести к тому, что некоторые из наших соседей объявят нам войну. Мы, конечно, также можем полностью проигнорировать конфликт, но это будет означать, что мы не поможем нашему бывшему союзнику."
 belgrade_pact_events.70.a: "Отправить помощь."
 belgrade_pact_events.70.b: "Предложить болгарам союз!"
 belgrade_pact_events.70.c: "Мы ничего не можем сделать."

 belgrade_pact_events.71.t: "Албания предлагает нам союз"
 belgrade_pact_events.71.d: "Как ни удивительно, албанцы предложили нам союз, ссылаясь на помощь, которую мы оказали им во время Мировой войны в борьбе с сербами. Хотя это может быть выгодно, они также могут стать помехой в военных усилиях. Что скажем?"
 belgrade_pact_events.71.a: "Отлично!"
 belgrade_pact_events.71.b: "Они нам не нужны."

 belgrade_pact_events.72.t: "Болгария приняла наше предложение о союзе"
 belgrade_pact_events.72.d: "Болгарское правительство с радостью приняло наше предложение о союзе, и наши войска уже движутся на их территорию. Вместе мы сдержим агрессию Белградского пакта и защитим территориальную целостность Болгарии."
 belgrade_pact_events.72.a: "Мы победим сербскую угрозу."

 belgrade_pact_events.73.t: "Болгария отклонила наше предложение о союзе"
 belgrade_pact_events.73.d: "Болгарское правительство отклонило наше предложение о союзе и заявило, что им не нужна наша помощь против Белградского пакта."
 belgrade_pact_events.73.a: "Пусть так."

 belgrade_pact_events.74.t: "Мы проигрываем Балканскую войну"
 belgrade_pact_events.74.d: "Наше вмешательство в Четвёртую Балканскую войну обернулось полной катастрофой. Болгарии больше нет, и часть нашей земли оккупирована Белградским пактом. Мы должны просить мира, пока ещё можем!"
 belgrade_pact_events.74.a: "Просить мира."
 belgrade_pact_events.74.b: "Мы ещё можем победить!"

 belgrade_pact_events.75.t: "Албанцы просят мира"
 belgrade_pact_events.75.d: "Часть их земли оккупирована, а их силы полностью отступают, Албания попросила у нас мира."
 belgrade_pact_events.75.a: "Белградский пакт торжествует."
 belgrade_pact_events.75.b: "Нет, они должны быть раздавлены!"

 belgrade_pact_events.76.t: "Мир с Белградским пактом"
 belgrade_pact_events.76.d: "Белградский пакт принял наше мирное предложение. Мы должны уступить им некоторые спорные земли, но они отведут свои войска."
 belgrade_pact_events.76.a: "По крайней мере, мы всё ещё суверенная нация!"

 belgrade_pact_events.77.t: "Албания капитулировала"
 belgrade_pact_events.77.d: "Объединённые вооружённые силы Белградского пакта сумели победить албанцев. Они капитулировали и уступили часть спорных земель Пакту, но мы должны вернуть им их столицу. Ещё один наш враг повержен."
 belgrade_pact_events.77.a: "Белградский пакт торжествует!"

 belgrade_pact_events.78.t: "Мы проигрываем Балканскую войну"
 belgrade_pact_events.78.d: "Хотя нам больно это признавать, албанское вмешательство переломило ход войны. Мы должны предложить вернуть все их заявленные земли, иначе потеряем независимость."
 belgrade_pact_events.78.a: "Просить мира"
 belgrade_pact_events.78.b: "Мы ещё можем победить!"

 belgrade_pact_events.79.t: "Сербия просит мира"
 belgrade_pact_events.79.d: "Белградский пакт отступает. Теперь Сербия обратилась к нам с мирным предложением. Белградский пакт отдаст все наши заявленные земли, вернувшись к довоенному состоянию. Взамен мы позволим им сохранить независимость."
 belgrade_pact_events.79.a: "Достаточно кровопролития. Закончить эту войну."
 belgrade_pact_events.79.b: "Нет, они должны быть раздавлены!"

 belgrade_pact_events.80.t: "Подписан мир, конец войны"
 belgrade_pact_events.80.d: "Хотя нам больно это признавать, албанцы смогли победить нас на поле боя. Переговоры между Сербией и албанцами привели к мирному соглашению. Мы должны отдать все их заявленные земли."
 belgrade_pact_events.80.a: "Мы этого не забудем!"

 belgrade_pact_events.81.t: "Анти-Белградский пакт"
 belgrade_pact_events.81.d: "Поскольку и мы, и [CRO.GetName] теперь находимся в состоянии войны с подлыми сербами и их приспешниками, [CRO.GetAdjective] предложили более прямое военное сотрудничество между нами до окончания войны, если мы решим принять такое предложение."
 belgrade_pact_events.81.a: "Вместе против Белграда!"
 belgrade_pact_events.81.b: "Они нам не нужны"

 belgrade_pact_events.200.t: "Победа в Балканской войне"
 belgrade_pact_events.200.d: "После лет планирования и подготовки объединённые силы Белградского пакта стоят победоносными над болгарской угрозой! Болгары больше не могут оказывать на нас давление и заставлять выполнять их приказы, потому что теперь мы хозяева Балкан. Наша победа, конечно, далась ценой — многие храбрые люди отдали свои жизни ради достижения нашей давней мечты, и именно их жизни мы будем чествовать в этой ошеломляющей победе.\n\nОднако даже после возвращения наших законных территорий из лап болгар наша миссия не окончена. На севере стоит Австрия, угнетающая своё южнославянское население, заставляя его выполнять волю Габсбургов. Это не может продолжаться. Мы должны исправить несправедливости Мировой войны и наконец отомстить Вене, хотя для обеспечения единства внутри Белградского пакта в ближайшие недели будет проведён второй Белградский конгресс."
 belgrade_pact_events.200.a: "Разослать приглашения!"

 belgrade_pact_events.201.t: "Приглашение от Сербии"
 belgrade_pact_events.201.d: "Сегодня мы получили сообщение из сербского посольства с приглашением принять участие во втором Белградском конгрессе через пару недель. Наши союзники хотят освободить южных славян, оставшихся под австрийским сапогом, и, без сомнения, хотят, чтобы мы помогли в этом начинании. Кроме того, вероятно, есть трофеи, которые мы можем получить от поражения Австрии, поэтому необходимо хотя бы присутствовать на Втором конгрессе, чтобы сформулировать план действий."
 belgrade_pact_events.201.a: "Хорошо, мы примем участие."

 belgrade_pact_events.202.t: "Возможные новые союзники"
 belgrade_pact_events.202.d.ITA: "Балканские государства — не единственные, у кого есть территориальные претензии к империи Габсбургов. Даже если не считать конкурирующие этносы внутри неё, все окружающие страны имеют братьев, которых нужно освободить из этой «тюрьмы народов». Поскольку Австрия гораздо могущественнее, чем все балканские государства вместе взятые, нам нужно рассмотреть возможность привлечения новых союзников.\n\nВо время итальянской гражданской войны австрийцы оторвали кусок Италии и создали марионеточную республику в Милане. Однако они не смогли долго подавлять её, и теперь в [ITA.Capital.GetCapitalVictoryPointName] у власти находится крайне реваншистское правительство во главе с [ITA.GetLeader], которое стремится вернуть все итальянские земли, включая те, что находятся под властью Австрии.\n\nВозможно, их можно убедить присоединиться к нашему делу?"
 belgrade_pact_events.202.a: "Любая помощь приветствуется."
 belgrade_pact_events.202.b: "Не стоит беспокоиться."

 belgrade_pact_events.203.t: "Приглашение в Белград"
 belgrade_pact_events.203.d: "Балканские государства, совместно победив Болгарию и теперь возглавляемые Сербией, обращают свой взор на север, к Австро-Венгерской империи. Поскольку их интересы совпадают с нашими, сербское правительство обратилось к нам с предложением — приглашением в Белград для участия во Втором конгрессе, где делегаты примут решение о совместных действиях против Австрии. Каким должен быть наш ответ?"
 belgrade_pact_events.203.a: "Хорошо, мы примем участие."
 belgrade_pact_events.203.b: "Это пустая трата времени."

 belgrade_pact_events.204.t: "[FROM.GetNameDefCap] соглашается участвовать"
 belgrade_pact_events.204.d: "Министерство иностранных дел [FROM.GetNameDef] ответило нам, сообщив, что они согласны присоединиться к нашему общему делу против Австрии."
 belgrade_pact_events.204.a: "Превосходно."

 belgrade_pact_events.205.t: "Прибытие делегатов"
 belgrade_pact_events.205.d: "Сегодня в Белград прибыла многонациональная толпа дипломатов, наблюдателей и военных чиновников из [GetCongressMembers] для участия в церемонии открытия Второго Белградского конгресса. В краткой речи премьер-министр поблагодарил всех делегатов за присутствие и поднял тост за нашу неизбежную победу над нашими общими врагами в Вене. Завтра начнутся серьёзные обсуждения относительно претензий каждого на территорию Габсбургов и нашего подхода к их решению. Но сегодня — день, чтобы лелеять это редкое торжество паннационального единства!"
 belgrade_pact_events.205.a: "Пусть Конгресс начнётся!"

 CongressMembers_Pact_minus_one: "[?SER_attending_congress^0.GetNameDef]"
 CongressMembers_Pact: "[?SER_attending_congress^0.GetNameDef] и [?SER_attending_congress^1.GetNameDef]"
 CongressMembers_Pact_plus_one: "[?SER_attending_congress^0.GetNameDef], [?SER_attending_congress^1.GetNameDef] и [?SER_attending_congress^2.GetNameDef]"
 CongressMembers_Pact_plus_two: "[?SER_attending_congress^0.GetNameDef], [?SER_attending_congress^1.GetNameDef], [?SER_attending_congress^2.GetNameDef] и [?SER_attending_congress^3.GetNameDef]"

 belgrade_pact_events.206.t: "Определение цели"
 belgrade_pact_events.206.d: "Наша общая цель может быть едина, но есть несколько способов подойти к решению вопроса с Веной. Более радикальные делегаты на Конгрессе призывают к войне, чтобы обескровить австрийцев, в отместку за их действия во время Мировой войны. С другой стороны, умеренные дипломаты отдают предпочтение более дипломатическому подходу, надеясь на переговоры с Веной, а не на чисто воинственное отношение к ним. Мирный подход, вероятно, был бы предпочтительнее, но мало кто оптимистично оценивает шансы Австрии действительно сесть за стол переговоров. В конечном счёте, ведущие сербские делегаты имеют последнее слово в выборе подхода, и после нескольких часов кулуарных встреч они возвращаются на Конгресс со своим решением."
 belgrade_pact_events.206.a: "К войне с Австрией!"
 belgrade_pact_events.206.b: "Принудить их дипломатией!"

 belgrade_pact_events.207.t: "Конгресс решает атаковать Австрию"
 belgrade_pact_events.207.d: "Делегаты в Белграде решили, что теперь, когда болгарская гегемония свергнута, пришло время свергнуть и гегемонию Габсбургов над Центральной Европой. Поскольку у большинства членов Пакта есть обширные претензии к Австро-Венгерской империи, их делегаты горят желанием наконец завершить свои национальные цели, но не все члены так стремятся броситься на прогнившую Империю. В любом случае, пришло время официально объявить о поддержке этого плана действий или покинуть Конгресс."
 belgrade_pact_events.207.a: "Мы поддерживаем эту инициативу."
 belgrade_pact_events.207.b: "Мы присоединимся к Пакту!"
 belgrade_pact_events.207.c: "Что? Нет!"
 belgrade_pact_events.207.e: "Нас никогда не волновала Трансильвания."

 belgrade_pact_events.208.t: "[FROM.GetNameDefCap] покидает Конгресс"
 belgrade_pact_events.208.d.war: "Делегация из [FROM.GetNameDef] покинула Конгресс, либо в знак протеста против нашего согласованного плана действий, либо потому, что не видит выгоды для себя."
 belgrade_pact_events.208.d.diplomacy: "Делегация из [FROM.GetNameDef] покинула Конгресс, по-видимому, не заинтересованная в австрийском вопросе."
 belgrade_pact_events.208.a: "Их потеря."

 belgrade_pact_events.209.t: "Вопрос претензий"
 belgrade_pact_events.209.d: "Согласовав план действий, делегации решили официально оформить свои претензии к Австро-Венгерской империи. Естественно, мы позаботились о том, чтобы сообщить им, что конечная цель нашего правительства — объединить южных славян Австро-Венгрии под нашим флагом, освободив их от многовекового угнетения."
 belgrade_pact_events.209.a: "Мы освободим славян!"

 belgrade_pact_events.210.t: "Вопрос претензий"
 belgrade_pact_events.210.d: "Согласовав план действий, делегации решили официально оформить свои претензии к Австро-Венгерской империи. Естественно, мы позаботились о том, чтобы сообщить им, что конечная цель нашего правительства — освободить земли, населённые этническими румынами, униженные веками угнетения."
 belgrade_pact_events.210.a: "Мы воссоединимся с Трансильванией!"

 belgrade_pact_events.211.t: "Вопрос претензий"
 belgrade_pact_events.211.d: "Согласовав план действий, делегации решили официально оформить свои претензии к Австро-Венгерской империи. Греция, однако, мало что может получить в плане территории напрямую от Габсбургов, но мы верим, что это часть улучшения регионального сотрудничества и укрепления отношений."
 belgrade_pact_events.211.a: "У нас нет претензий."
 belgrade_pact_events.211.b: "Северный Эпир принадлежит нам!"

 belgrade_pact_events.213.t: "Вопрос претензий"
 belgrade_pact_events.213.d: "Согласовав план действий, делегации решили официально оформить свои претензии к Австро-Венгерской империи. Естественно, мы позаботились о том, чтобы сообщить им, что конечная цель нашего правительства — наконец завершить Рисорджименто, освободив итальянцев Австрии от габсбургского ига и отомстив за позор 1919 года!"
 belgrade_pact_events.213.a: "Мы вернём Истрию и Тренто!"

 belgrade_pact_events.214.t: "Конгресс завершён"
 belgrade_pact_events.214.d: "С чёткими планами и намерениями Конгресс подходит к концу. Теперь мы движемся к финальной битве за установление нового порядка на Балканах, где нации свободны от иностранных империй и угнетения."
 belgrade_pact_events.214.a: "Вперёд!"

 belgrade_pact_events.215.t: "Конгресс решает вести переговоры с Австрией"
 belgrade_pact_events.215.d: "Делегаты в Белграде решили, что было бы неразумно безрассудно бросаться на австро-венгерскую армию. Чтобы ясно озвучить наши обиды и завоевать симпатию международного сообщества, мы должны начать переговоры с Веной для достижения заявленной цели Конгресса — исправления исторических несправедливостей и прекращения страданий многих наших соотечественников, проживающих в Австро-Венгрии. Если они откажутся, у нас будут все основания добиваться справедливости силой оружия."
 belgrade_pact_events.215.a: "Мы поддерживаем эту инициативу."
 belgrade_pact_events.215.b: "Что? Нет!"

 belgrade_pact_events.216.t: "Приглашение в Белград?"
 belgrade_pact_events.216.d: "Белградский конгресс направил нам приглашение. Хотя они чётко заявили о своей цели развалить нашу древнюю Монархию, они, похоже, готовы сначала попытаться договориться за столом переговоров. Конечно, мы знаем их условия, и они совершенно неприемлемы; это было бы пустой тратой времени — присутствовать, и вместо этого мы должны готовиться к мобилизации против них."
 belgrade_pact_events.216.a: "Шанс на мир, возможно?"
 belgrade_pact_events.216.b: "Мы отвергаем их нелепое предложение!"

 belgrade_pact_events.217.t: "Австрия отвергает наши усилия"
 belgrade_pact_events.217.d: "Как и ожидалось, Вена отказалась от переговоров. Поскольку они явно хотят войны, которая в конечном итоге положит конец их прогнившей Империи, пришло время нам двинуться к нашей финальной битве за свержение габсбургского ига."
 belgrade_pact_events.217.a: "Тогда да будет война."

 belgrade_pact_events.300.t: "Пакт организации"
 belgrade_pact_events.300.d: "[FROM.GetNameDefCap] предлагает углубить связи между балканскими странами через экономический союз. Если мы подпишем их пакт, будет сформирован Экономический совет для координации торговых и экономических интересов государств-членов. Мы, несомненно, выиграем от этого тесного экономического альянса."
 belgrade_pact_events.300.a: "Конечно, мы все можем от этого выиграть."
 belgrade_pact_events.300.b: "Это приведёт к потере независимости!"

 BP_economic_integration_tt: "§GМы станем членом Пакта организации и получим его экономические выгоды§!."

 belgrade_pact_events.301.t: "[FROM.GetNameDefCap] отказывается"
 belgrade_pact_events.301.d: "Правительство [FROM.GetAdjective] отказалось подписать Пакт организации, не заинтересованное в более тесных экономических связях в балканском регионе."
 belgrade_pact_events.301.a: "Им же хуже."

 belgrade_pact_events.302.t: "Формирование Экономического совета"
 belgrade_pact_events.302.d: "С ратификацией Пакта организации Экономический совет готов начать свою работу по координации торговли и экономических отношений между его членами."
 belgrade_pact_events.302.a: "Более тесные, процветающие Балканы."

 belgrade_pact_events.303.t: "Формирование Экономического совета"
 belgrade_pact_events.303.d: "С ратификацией Пакта организации Экономический совет готов начать свою работу по координации торговли и экономических отношений между его членами."
 belgrade_pact_events.303.a: "Более тесные, процветающие Балканы."

 belgrade_pact_events.304.t: "Отчёт Экономического совета"
 belgrade_pact_events.304.d: "Благодаря усилиям Экономического совета и наших союзников, выгоды, которые мы получаем от дальнейшей региональной интеграции, значительно возросли."
 belgrade_pact_events.304.a: "Превосходно!"

 belgrade_pact_events.305.t: "Выход из Экономического совета"
 belgrade_pact_events.305.d.war: "В связи с актами агрессии против других членов Балканского экономического совета мы были немедленно исключены из Совета. Соответственно, мы больше не будем получать его выгоды."
 belgrade_pact_events.305.d.revolution: "Наш новый социалистический режим объявил все договоры с Балканским экономическим советом недействительными с немедленным вступлением в силу. Соответственно, мы больше не будем получать его выгоды."
 belgrade_pact_events.305.a: "Очень хорошо."

 belgrade_pact_events.306.t: "[FROM.GetNameDefCap] присоединяется к Экономическому совету"
 belgrade_pact_events.306.d: "Правительство [FROM.GetAdjective] подписало Пакт организации, пропустив формирование Совета ранее, и теперь все члены организации пользуются увеличенными выгодами от взаимного экономического сотрудничества."
 belgrade_pact_events.306.a: "Более тесные, процветающие Балканы."

 belgrade_pact_events.307.t: "Будущее Белградского пакта"
 belgrade_pact_events.307.d: "С достижением нашей главной цели — разгрома Австрии — многие задаются вопросом: что теперь? Хотя альянсы на Балканах часто были недолговечными, некоторые более идеалистически настроенные голоса продвигают идею превращения Белградского пакта в долгосрочный альянс не только для защиты Балкан от внешних угроз, но и для экономического сотрудничества и принесения процветания как сербскому, так и румынскому народам. Более пессимистичные голоса указывают на все очевидные проблемы: идеологические разногласия, Западный Банат, неверие в то, что балканские страны действительно могут противостоять таким гигантам, как Германия и Россия, в одиночку. В любом случае, если наше правительство поддержит идею долгосрочного сотрудничества, это значительно повысит шансы на то, что наш альянс сохранится."
 belgrade_pact_events.307.a: "Мы проливали кровь вместе, мы останемся вместе."
 belgrade_pact_events.307.b: "Извините, это было только для одной войны."

 belgrade_pact_events.308.t: "Поддержка от [SER.GetName]"
 belgrade_pact_events.308.d: "Немало людей сомневались в [BUL.GetLeader], когда он направил нашу страну по пути мира с [SER.GetName] сразу после того, как они победили нас в Четвёртой Балканской войне. Сербы, как ни странно, были открыты для идеи примирения с нами, позволив нам присоединиться к Белградскому пакту. Теперь, когда их мечты о единстве южных славян осуществились, они протянули нам руку помощи, признавая нашу поддержку и жертвы в нашей общей борьбе."
 belgrade_pact_events.308.a: "Истинное братство."
