l_russian:

### Tooltips ###
 GER_will_capitulate: "§Y[GER.GetNameDefCap]§! капитулирует"

### Events ###
 capitulation_events.1.t: "Германия завоевана" #NT!
 capitulation_events.1.d: "Мы потерпели поражение от наших жалких врагов, и наши армии терпят крах по всей Европе. Хотя они и захватили Отечество, война еще далека от завершения!" #NT!
 capitulation_events.1.a: "Возьмите под свой контроль Миттелафрику — и оттуда мы будем сражаться." #NT!
 capitulation_events.1.b: "Бежать некуда. Сдаваться!" #NT!

 capitulation_events.2.t: "Милитаристы настаивают на прямом контроле" #NT!
 capitulation_events.2.d: "В результате краха немецких военных усилий в континентальной Европе, Schutztruppen мобилизовались и теперь пытаются захватить власть у ответственных бюрократов. Их руководство постановило, что [MAF.GetLeader] должен немедленно уйти с поста губернатора Миттельафрики и что административные обязанности должны быть переданы должностным лицам Schutztruppen по мере их прибытия в [THIS.Capital.GetCapitalVictoryPointName]. Миттелафрику следует превратить в инструмент освоения Германии, а наш колониальный проект следует приостановить." #NT!
 capitulation_events.2.a: "Неужели эти безумцы думают, что мы еще сможем победить? Мы верны Берлину, кто бы ни владел им." #NT!
 capitulation_events.2.b: "Приветствуйте Schutztruppe и уступайте их требованиям." #NT!

 capitulation_events.3.t: "Бюрократы выиграли борьбу за власть в [MAF.Capital.GetCapitalVictoryPointName]" #NT!
 capitulation_events.3.d: "Колониальные администраторы в Африке не видят причин смягчать ситуацию в этом вопросе; война уже проиграна. Они заявили, что через две недели выслушают того, кто будет руководить [THIS.Capital.GetCapitalVictoryPointName], бросив нас рухнуть перед лицом наших врагов!" #NT!
 capitulation_events.3.a: "Неблагодарные негодяи!" #NT!

 capitulation_events.4.t: "Патриоты контролируют Миттельафрику" #NT!
 capitulation_events.4.d: "Колониальные администраторы уступили место милитаристам; Германия еще будет возвращена!" #NT!
 capitulation_events.4.a: "Мы еще вернемся!" #NT!

 capitulation_events.5.t: "Война с [SIA.GetNameDef]" #NT!
 capitulation_events.5.d: "Похоже, нам нужно разобраться с продолжающейся войной на Дальнем Востоке, где [SIA.GetAdjective] армий все еще сражаются против наших колониальных сил в [GEA.GetNameDef]. Должны ли мы продолжать войну, в которой наши разрозненные и разбитые силы не имеют никакой надежды на победу, или просить мира?" #NT!
 capitulation_events.5.a: "Дайте им все, что они хотят." #NT!
 capitulation_events.5.b: "Мы продолжим войну, если потребуется." #NT!

 capitulation_events.6.t: "[From.GetNameDefCap] Судится за мир" #NT!
 capitulation_events.6.d: "Разрозненные силы Германии, сплотившиеся теперь под импровизированным командованием из Африки, предложили нам большую часть территории, которую они удерживают в [GEA.GetNameDef], если мы только закончим войну сейчас, прежде чем они будут втянуты дальше." #NT!
 capitulation_events.6.a: "Отличный план." #NT!
 capitulation_events.6.b: "Много? Мы хотим ВСЕ." #NT!

 capitulation_events.7.t: "Война с [JAP.GetNameDef]" #NT!
 capitulation_events.7.d: "Похоже, нам нужно разобраться с продолжающейся войной на Дальнем Востоке, где [JAP.GetAdjective] армий все еще сражаются против наших колониальных сил в [GEA.GetNameDef]. Должны ли мы продолжать войну, в которой наши разрозненные и разбитые силы не имеют никакой надежды на победу, или просить мира?" #NT!

 capitulation_events.8.t: "[From.GetNameDefCap] Судится за мир" #NT!
 capitulation_events.8.d: "Разрозненные силы Германии, сплотившиеся теперь под временным командованием из Африки, предложили нам большую часть колониальной территории, которую они удерживают в [GEA.GetNameDef], если мы только закончим войну сейчас, прежде чем они будут втянуты в нее дальше. Учитывая, что отказ от сделки будет означать погоню за немцами в Африке, возможно, нам следует рассмотреть их план." #NT!
 capitulation_events.8.a: "Отличная идея." #NT!
 capitulation_events.8.b: "Мы заберем все, что у них есть." #NT!

 capitulation_events.9.t: "[GEX.GetNameDefCap] Судится за мир" #NT!
 capitulation_events.9.d.siam: "Так называемое правительство Свободной Германии, уже изо всех сил пытающееся продолжить борьбу из Африки, заключило мир с [From.GetNameDef]. Это потребует уступки большей части нашей территории, и кажется мало надежды на продолжение борьбы в одиночку, поскольку так много чиновников Рейха уже покидают свои офисы здесь, в [GEA.GetNameDef]. Хотя местные силы полны решимости продолжать борьбу, без поддержки со стороны родины быстрое поражение, вероятно, неизбежно для этих сопротивляющихся." #NT!
 capitulation_events.9.d.japan: "Так называемое правительство Свободной Германии, уже изо всех сил пытающееся продолжить борьбу из Африки, заключило мир с [From.GetNameDef]. Это повлечет за собой полную аннексию, и, похоже, мало надежды на продолжение борьбы в одиночку, поскольку так много чиновников Рейха уже покидают свои офисы здесь, в [GEA.GetNameDef]. Хотя местные силы полны решимости продолжать борьбу, без поддержки со стороны родины быстрое поражение, вероятно, неизбежно для этих сопротивляющихся." #NT!
 capitulation_events.9.a: "К спасательным шлюпкам! Мы отправляемся в Африку!" #NT!
 capitulation_events.9.b: "Мы будем сражаться до последнего!" #NT!

 capitulation_events.12.t: "Должны ли мы продолжать войну?" #NT!
 capitulation_events.12.d: "Немецкое правительство рухнуло, и его командование перешло в Африку, взяв на себя контроль над своими бывшими колониями здесь. Однако они все еще владеют большей частью колониальной территории, на которую мы претендуем, и находятся в значительном беспорядке. Должны ли мы требовать от них передачи территорий под угрозой продолжения войны или прекратить ее сейчас?" #NT!
 capitulation_events.12.a: "Требуйте колонии." #NT!
 capitulation_events.12.b: "Нам надоела война с немцами." #NT!

 capitulation_events.13.t: "Угроза [NFA.GetAdjective]" #NT!
 capitulation_events.13.d: "[NFA.GetNameDefCap] выступил с угрозой - либо мы сдадим некогда принадлежавшие им колонии, либо они продолжат войну против нас. Учитывая наше нынешнее состояние беспорядка, возможно, было бы разумно принять их требования. В противном случае мы будем бороться с ними здесь, в Африке." #NT!
 capitulation_events.13.a: "Дайте им то, что они хотят, если это положит конец этому." #NT!
 capitulation_events.13.b: "Тогда мы сталкиваемся с ними здесь, в Африке." #NT!

 capitulation_events.15.t: "[transferred_state.GetName] наш" #NT!
 capitulation_events.15.d: "С крахом немецкого правительства их власть над [transferred_state.GetName] стала несостоятельной, и поэтому местная администрация сдалась нашим силам, чтобы предотвратить впадение территории в хаос." #NT!
 capitulation_events.15.a: "Чудесный." #NT!

 capitulation_events.23.t: "Немецкий коллапс" #NT!
 capitulation_events.23.d.nowar: "Хотя последние несколько дней после краха Германии в Европе были неопределенными, опасения, что [Root.GetNameDef] будет предоставлен самому себе, оказались необоснованными. Основная немецкая оппозиция сейчас обосновалась в Миттелафрике, и мы восстановили связь с ее официальными лицами в Дарессаламе. Порядок, по крайней мере на данный момент, восстановлен." #NT!
 capitulation_events.23.d.war: "Поскольку немцы потерпели поражение в Европе и едва удержались в Африке, продолжающаяся война здесь, в [Root.GetNameDef], привела к тому, что многие колониальные чиновники уже бежали в новую столицу в Восточной Африке. Коммуникации пока не восстановлены, и похоже, что на данный момент мы предоставлены сами себе." #NT!
 capitulation_events.23.a: "Это облегчение...?" #NT!
 capitulation_events.23.b: "Нас бросили?!" #NT!

 capitulation_events.30.t: "Мир с Интернационалом?" #NT!
 capitulation_events.30.d.britain: "После успешной оккупации Франции нашими войсками было составлено множество планов вторжения в Британию, но ни один из них не увенчался успехом.\n\nХотя британское правительство ранено, оно успешно сопротивляется нашим попыткам пересечь Ла-Манш, а поскольку защита берегов требует столь необходимых ресурсов, многие в нашем правительстве выступили с предложением заключить мирный договор с остатками Интернационала.\n\nМы получим полный контроль над их владениями в континентальной Европе, ценой признания Правительство [ENG.GetNameDef]. Поскольку антивоенные настроения растут как внутри наших границ, так и в Великобритании, многие полагают, что это может положить конец этой бесполезной войне, по крайней мере временно." #NT!
 capitulation_events.30.d.other: "Уничтожение Третьего Интернационала в Европе завершено, земли Великобритании и Франции перешли к нашим превосходящим силам.\n\nПосле этого многие в нашем правительстве ожидали, что Интернационал рухнет без лидера, но это было неправдой, поскольку [INT.GetNameDef] взял на себя мантию военного руководства и сплотил оставшихся членов. Видя, как далеко эта страна находится от наших границ и линий снабжения, многие в нашем правительстве считают вторжение в нее пустой тратой ресурсов.\n\nТаким образом, от этой фракции правительства поступило предложение об официальном мирном договоре. Наша власть в Европе будет укрепляться, но существование Интернационала как препятствия на пути к нашему мировому могуществу продолжится. Поскольку многие в Империи устали от войны, возможно, в наших интересах сделать это мирное предложение." #NT!
 capitulation_events.30.a: "Настало время перемирия." #NT!
 capitulation_events.30.b: "Единственный мир, который мы примем, — это безоговорочная капитуляция!" #NT!

 capitulation_events.31.t: "Германия предлагает мир" #NT!
 capitulation_events.31.d.britain: "В ходе войны для нашего альянса настали темные времена. Французская Коммуна рухнула, и нам пришлось взять на себя мантию главы революции, а немцы попытались вторгнуться в Британию, но безуспешно из-за упорства нашего народа.\n\nОднако с обеих сторон начинают проявляться шрамы, как на инфраструктуре, так и на нашем народе. Сегодня это дошло до апогея, когда [FROM.GetNameDef] связался с нами и предложил заключить мир. В обмен на признание нашего правительства и продолжение существования Интернационала мы потеряем всех наших союзников в континентальной Европе.\n\nМногие в нашем правительстве считают это оскорблением и призывают продолжать борьбу за революцию, в то время как другие считают, что любая попытка вернуть себе контроль над Европой бесполезна, и мы должны принять этот мир, пока можем, даже ценой нашего унижения. Как нам ответить?" #NT!
 capitulation_events.31.d.other: "Для «Интернационала» настали темные времена. Два главных лидера альянса, Великобритания и Франция, пали в результате немецкого вторжения. Благодаря нашей собственной власти в альянсе, мы взяли на себя мантию лидеров революции.\n\nНо с обеих сторон перспектива полной победы с каждым днем ​​становится все более отдаленной. Наш народ устал от состояния войны, и это, похоже, достигло апогея сегодня, когда Германская империя обратилась к нам с предложением: в свою очередь, если мы откажемся от наших европейских владений и заключим мир с немцами, наше правительство будет признано, и Интернационал как единое целое продолжится под нашим руководством.\n\nХотя это укрепит нас как лидеров мировой революции и завершит войну, такой мирный договор оставит нас униженными и проигравшими во Второй войне. Вельткриг. Многие в нашем правительстве желают окончания войны, в то время как многие другие хотят продолжать борьбу за революцию. Как нам ответить?" #NT!
 capitulation_events.31.a: "Эта война проиграна. Подпишите это." #NT!
 capitulation_events.31.b: "Революция должна бороться! Отвергни это!" #NT!

 capitulation_events.32.t: "«Интернационал» принимает мир" #NT!
 capitulation_events.32.d.britain: "Война окончена. Хотя мы надеялись полностью уничтожить революцию после поражения Франции, эти надежды не оправдались. Великобритания ответила принятием нашего предложения, по-видимому, понеся тот же ущерб, с которым мы сталкиваемся сейчас. Поскольку Британия и Третий Интернационал выжили, многие по всей Империи задаются вопросом, как долго продлится этот мир, пока Европа снова не разразится полномасштабной войной." #NT!
 capitulation_events.32.d.other: "Война окончена. После оккупации европейскими союзниками «Интернационала» оставшиеся члены признали, что так больше продолжаться не может. Они приняли мир, и хотя угроза в Европе устранена, многие задаются вопросом, сколько времени пройдет, прежде чем новый лидер Интернационала сможет нанести нам ответный удар. Но на данный момент мы победили." #NT!
 capitulation_events.32.a: "Европа в мире!" #NT!

 capitulation_events.33.t: "«Интернационал» отказался от мира!" #NT!
 capitulation_events.33.d.britain: "Наше предложение о мире было встречено репрессиями со стороны Великобритании, заявившей, что наше правительство просто желает снова унизить Британию этим миром, а условия неприемлемы. Кажется, что война теперь может закончиться только вторжением в Великобританию или взятием Берлина британскими войсками..." #NT!
 capitulation_events.33.d.other: "Наше предложение о мире не было хорошо воспринято [INT.GetNameDef], и они ответили громким «нет» на нашу просьбу о мире. Похоже, упорные революционеры желают продолжать борьбу, и война закончится лишь безоговорочной капитуляцией одной из сторон. Мы должны подготовиться к вторжению..." #NT!
 capitulation_events.33.a: "Мы закончим то, что начали в 1919 году." #NT!

 capitulation_events.34.t: "Мир с [INT.GetNameDef]?" #NT!
 capitulation_events.34.d: "[GER.GetNameDefCap] заключил мирный договор с [INT.GetNameDef], поскольку очевидно, что [INT.GetAdjective] потеряли желание продолжать войну. Это также может быть для нас шансом положить конец войне с ними. Должны ли мы воспользоваться этой возможностью или продолжить битву?" #NT!
 capitulation_events.34.a: "Давайте покончим с этим сейчас!" #NT!
 capitulation_events.34.b: "Нет, мы продолжаем войну!" #NT!

 capitulation_events.35.t: "Договор [INT.Capital.GetCapitalVictoryPointName]" #NT!
 capitulation_events.35.d.britain: "Сегодня [GER.GetLeader] сделал заявление о подписании мира между Третьим Интернационалом и Рейхспактом. Германия, несмотря на захват Парижа в третий раз за семьдесят лет, не смогла облегчить прибытие в Британию.\nТаким образом, между двумя раздираемыми войной фракциями был подписан мир: Третий Интернационал должен оставаться целостным образованием под руководством [ENG.GetNameDef] за счет своих континентальных союзников под немецким контролем. [ENG.GetLeader] пытается сохранять оптимизм, призывая оставшихся союзников по всему миру, что революция еще не умерла и что Великобритания будет нести факел Франции.\nНо ясно одно: Великобритания и Франция были унижены немцами во второй раз в новейшей истории, и только время покажет, смогут ли они нанести ответный удар." #NT!
 capitulation_events.35.d.america: "Сегодня [GER.GetLeader] объявил, что Вельткриг на Западе завершился. Хотя Германия заявила о своей победе над европейской революцией, за морем остался новый революционный титан [WCA.GetNameDef].\nТаким образом, [WCA.GetNameDef] и [GER.GetNameDef] подписали мирный договор, который позволил Третьему Интернационалу как организации продолжать свое существование под руководством Америки за счет европейских союзников Интернационала по немецкой оккупации. Президент [WCA.GetLeader] пытается сохранять оптимизм, поклявшись своим оставшимся союзникам, что они будут нести европейский факел революции, но многие видят в этом подтверждение немецкой гегемонии в Европе. Только время покажет, сможет ли революция выжить без руководства Франции и Британии." #NT!
 capitulation_events.35.d.other: "Сегодня [GER.GetLeader] объявил, что Вельткриг на Западе завершился. Хотя коммунары потерпели поражение, а Германия заявила о своей победе над европейской революцией, [INT.GetNameDef] все же существует.\nСтолкнувшись с перспективой изнурительной трансконтинентальной войны, [INT.GetNameDef] и [GER.GetNameDef] подписали мирный договор, позволяющий Третьему Интернационалу продолжать свое существование под руководством [INT.GetNonIdeologyName] за счет своих бывших европейских союзников, подвергающихся немецкой оккупации. [INT.GetLeader] поклялись своим оставшимся союзникам, что они будут нести европейский факел революции, но многие видят в этом подтверждение немецкой гегемонии в Европе. Только время покажет, сможет ли революция выжить без руководства Франции и Британии." #NT!
 capitulation_events.35.a: "Неужели история обречена повториться?" #NT!

 capitulation_events.40.t: "Париж пал" #NT!
 capitulation_events.40.d: "Похоже, нам снова придется столкнуться с позорной оккупацией иностранной державы, поскольку Париж перешел под контроль врага. По всей Франции началось сопротивление, но как долго мы сможем его поддерживать? Многие как внутри нашей страны, так и за ее пределами утверждают, что мы с самого начала не были законным правительством. Однако пока люди на нашей стороне, у нас еще есть шанс!" #NT!
 capitulation_events.40.a: "Мы еще не проиграли!" #NT!

 capitulation_events.42.t: "Французское сопротивление потерпело крах" #NT!
 capitulation_events.42.d: "Оккупация Парижа укрепилась, различные очаги сопротивления наконец были побеждены, а легитимность нашего изгнанного правительства была разрушена в клочья. Отказ французов признать, что мы снова потерпели поражение, окончательно рухнул из-за своей неизбежности." #NT!
 capitulation_events.42.a: "Увы." #NT!

 capitulation_events.43.t: "Германия предлагает оккупированную территорию" #NT!
 capitulation_events.43.d: "Возможно, в интересах подорвать легитимность изгнанников-коммунаров, [GER.GetNameDef] сделал предложение правительству [Root.GetAdjective]: контроль над небольшим количеством провинций на юге Франции. Они не дают никаких обещаний на возможной мирной конференции после возможного краха сопротивления коммунаров. Пока они готовы просто передать нам оккупацию." #NT!
 capitulation_events.43.a: "Это хорошая сделка – мы ее примем!" #NT!
 capitulation_events.43.b: "Нет, мы не будем иметь дело с немцами!" #NT!

 capitulation_events.44.t: "Французский отказ" #NT!
 capitulation_events.44.d: "Несмотря на выгоду, которую это принесет им в случае возможной мирной конференции на французской территории, [NFA.GetNameDef] отказался от нашего щедрого предложения." #NT!
 capitulation_events.44.a: "Пусть будет так." #NT!

 capitulation_events.45.t: "Французы согласны" #NT!
 capitulation_events.45.d: "Очевидно, обрадованный нашей щедростью, [NFA.GetNameDef] согласился на наше предложение и уже перебросил войска [NFA.GetAdjective] на некоторые южные территории." #NT!
 capitulation_events.45.a: "Отличный!" #NT!
