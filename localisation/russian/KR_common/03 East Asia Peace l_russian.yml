l_russian:

###Events###
 east_asia_peace_events.1.t: "Поражение на Востоке"
 east_asia_peace_events.1.d: "После продолжительной борьбы за наши владения в Восточной Азии кажется, что мы потеряли нашу последнюю крупную базу в регионе.\n\nПоскольку Восточная Азия заблокирована, а наши противники не могут реально ударить по нам в Европе, лучшим курсом действий кажется подписание мира с ними и уход из Восточной Азии."
 east_asia_peace_events.1.a: "Давайте объединимся ради мира!"
 east_asia_peace_events.1.b: "Мы освободим наши колонии вовремя!"

 east_asia_peace_events.2.t: "[From.GetNameDefCap] капитулирует!"
 east_asia_peace_events.2.d: "После успешного уничтожения баз [From.GetNameDef] в регионе они хотят вести переговоры, стремясь полностью уйти из Восточной Азии, оставив нам возможность пожать плоды победы вместе с другими, кто сражался с Рейхспактом в этом районе."
 east_asia_peace_events.2.a: "Скатертью дорога!"
 east_asia_peace_events.2.b: "Нет, мы не успокоимся, пока не войдем в Берлин!"

 east_asia_peace_events.3.t: "[From.GetNameDefCap] не принимает условия!"
 east_asia_peace_events.3.d: "Несмотря на проявление доброй воли с нашей стороны при эвакуации из района, что, по-видимому, и было их целью, [From.GetNameDef] дали нам знать, что не остановятся, пока не пройдут маршем через нашу столицу.\n\nПохоже, война на востоке еще не окончена."
 east_asia_peace_events.3.a: "Прямое правление из [From.Capital.GetCapitalVictoryPointName] не звучит привлекательно!"

 east_asia_peace_events.4.t: "Поражение на Востоке"
 east_asia_peace_events.4.d: "После продолжительной борьбы за наши владения в Восточной Азии кажется, что мы потеряли нашу последнюю крупную базу в регионе.\n\nПоскольку Восточная Азия заблокирована, а наши противники не могут реально ударить по нам в Европе, лучшим курсом действий кажется подписание мира с ними и уход из Восточной Азии."
 east_asia_peace_events.4.a: "Давайте объединимся ради мира!"
 east_asia_peace_events.4.b: "Мы освободим наши колонии вовремя!"

 east_asia_peace_events.5.t: "[From.GetNameDefCap] капитулирует!"
 east_asia_peace_events.5.d: "После успешного уничтожения баз [From.GetNameDef] в регионе они хотят вести переговоры, стремясь полностью уйти из Восточной Азии, оставив нам возможность пожать плоды победы вместе с другими, кто сражался с Нидерландами в этом районе."
 east_asia_peace_events.5.a: "Скатертью дорога!"
 east_asia_peace_events.5.b: "Нет, мы не успокоимся, пока не войдем в Амстердам!"

 east_asia_peace_events.6.t: "[From.GetNameDefCap] не принимает условия!"
 east_asia_peace_events.6.d: "Несмотря на проявление доброй воли с нашей стороны при эвакуации из района, что, по-видимому, и было их целью, [From.GetNameDef] дали нам знать, что не остановятся, пока не пройдут маршем через нашу столицу.\n\nПохоже, война на востоке еще не окончена."
 east_asia_peace_events.6.a: "Прямое правление из [From.Capital.GetCapitalVictoryPointName] не звучит привлекательно!"

 asian_hol_will_proceed_to_peacedeal_we_white_peace: "Голландские владения в Восточной Азии и их союзники будут включены в мирный договор, а остальные Нидерланды заключат сепаратный мир.\n"
 asian_reichspakt_will_proceed_to_peacedeal_we_white_peace: "Немецкие владения в Восточной Азии и их союзники будут включены в мирный договор, а остальной Рейхспакт заключит сепаратный мир.\n"

