###Events###
 east_asia_peace_events.1.t: "Поражение на Востоке" #NT!
 east_asia_peace_events.1.d: "После длительной борьбы за наши владения в Восточной Азии, похоже, мы потеряли нашу последнюю крупную базу в регионе.\n\nПоскольку Восточная Азия находится в изоляции и неспособность наших противников реально нанести удар по нам в Европе, лучшим вариантом действий, похоже, будет подписать с ними мир и уйти из Восточной Азии." #NT!
 east_asia_peace_events.1.a: "Давайте объединимся ради мира!" #NT!
 east_asia_peace_events.1.b: "Мы вовремя освободим наши колонии!" #NT!

 east_asia_peace_events.2.t: "[From.GetNameDefCap] сдается!" #NT!
 east_asia_peace_events.2.d: "После нашей успешной ликвидации баз [From.GetNameDef] в регионе они хотят вести переговоры, стремясь полностью уйти из Восточной Азии, оставив нас пожинать плоды вместе с другими, кто боролся с Рейхспактом в этом регионе." #NT!
 east_asia_peace_events.2.a: "Скатертью дорога!" #NT!
 east_asia_peace_events.2.b: "Нет, мы не успокоимся, пока не выступим в Берлине!" #NT!

 east_asia_peace_events.3.t: "[From.GetNameDefCap] не принимает!" #NT!
 east_asia_peace_events.3.d: "Несмотря на то, что мы продемонстрировали добрую волю при эвакуации этого района, что, по-видимому, и было их целью, [From.GetNameDef] дал нам понять, что они не остановятся, пока не пройдут через нашу столицу.\n\nПохоже, что война на востоке еще не окончена." #NT!
 east_asia_peace_events.3.a: "Прямое правило от [From.Capital.GetCapitalVictoryPointName] звучит непривлекательно!" #NT!

 east_asia_peace_events.4.t: "Поражение на Востоке" #NT!
 east_asia_peace_events.4.d: "После длительной борьбы за наши владения в Восточной Азии, похоже, мы потеряли нашу последнюю крупную базу в регионе.\n\nПоскольку Восточная Азия находится в изоляции и неспособность наших противников реально нанести удар по нам в Европе, лучшим вариантом действий, похоже, будет подписать с ними мир и уйти из Восточной Азии." #NT!
 east_asia_peace_events.4.a: "Давайте объединимся ради мира!" #NT!
 east_asia_peace_events.4.b: "Мы вовремя освободим наши колонии!" #NT!

 east_asia_peace_events.5.t: "[From.GetNameDefCap] сдается!" #NT!
 east_asia_peace_events.5.d: "После нашей успешной ликвидации баз [From.GetNameDef] в регионе они хотят вести переговоры, стремясь полностью уйти из Восточной Азии, оставив нас пожинать плоды вместе с другими, кто сражался с Нидерландами в этом регионе." #NT!
 east_asia_peace_events.5.a: "Скатертью дорога!" #NT!
 east_asia_peace_events.5.b: "Нет, мы не успокоимся, пока не выступим в Амстердаме!" #NT!

 east_asia_peace_events.6.t: "[From.GetNameDefCap] не принимает!" #NT!
 east_asia_peace_events.6.d: "Несмотря на то, что мы продемонстрировали добрую волю при эвакуации этого района, что, по-видимому, и было их целью, [From.GetNameDef] дал нам понять, что они не остановятся, пока не пройдут через нашу столицу.\n\nПохоже, что война на востоке еще не окончена." #NT!
 east_asia_peace_events.6.a: "Прямое правило от [From.Capital.GetCapitalVictoryPointName] звучит непривлекательно!" #NT!

 asian_hol_will_proceed_to_peacedeal_we_white_peace: "Голландские восточноазиатские владения и союзники будут взяты в мирном соглашении, а остальная часть Нидерландов заключит мир.\n"
 asian_reichspakt_will_proceed_to_peacedeal_we_white_peace: "Германские восточноазиатские владения и союзники будут взяты в мирном соглашении, а остальные часть Рейхспакта заключат мирное соглашение.\n"
