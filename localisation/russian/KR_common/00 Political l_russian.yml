 solidify_control: "Укрепить контроль"
 solidify_control_desc: "Немного тактичного использования политической власти здесь и ресурсов там — и мы устраним наши политические препятствия; возможно, мы не сможем избавиться от всех, но даже избавление от некоторых расчистит нам путь и улучшит нашу политическую власть в долгосрочной перспективе."

