### Subtype Descriptions ###
 totalist_subtype_desc: "Тотализм — это синекдоха для правительств, вдохновлённых различными тоталитарными, авангардистскими или крайне авторитарными ветвями социализма. Названный в честь различных социалистических националистических партий, собравшихся вместе для подписания Тоталистской хартии, с этим течением ассоциируются многие другие авторитарные социалистические движения по всему миру, иногда к их неудовольствию."
 syndicalist_subtype_desc: "Синдикализм — ведущая революционная идеология в мире, эволюция более старых профсоюзных социалистических течений, перешедших от повстанческой формы прямого действия к системе правления. Часто сочетая индустриальный и либертарный социализм, многие современные синдикалистские правительства вдохновляются системами, впервые применёнными во Франции и Британии, хотя многие привносят и свои собственные или местные идеи."
 radical_socialist_subtype_desc: "Радикальный социализм охватывает широкий спектр революционных левых правительств, и эти фракции отвергают политический реформизм внутри реакционных структур как окончательное средство изменения статус-кво. Различные направления радикального социализма могут значительно различаться в убеждениях, но их объединяет общее желание увидеть кардинально иное будущее, чем то, что мог предложить старый порядок."
 social_democrat_subtype_desc: "Социал-демократия представляет различные правительства, возглавляемые реформистскими левыми группами, которые отвергают неотъемлемую необходимость насильственной классовой борьбы для достижения своих целей, иногда вступая в конфликт со своими более радикальными коллегами. Многие вместо этого призывают к переменам через избирательный бюллетень, хотя, если доходит до дела, революционеры этого типа не являются чем-то неслыханным."
 social_liberal_subtype_desc: "Социал-либерализм отражает многие стили правления прогрессивной либеральной традиции, часто стремящейся к изменениям в общественном договоре, чтобы удовлетворить растущие требования народа. Эти правительства обычно сосредоточены на расширении или защите гражданских свобод посредством как политических, так и экономических реформ, хотя их цели варьируются от страны к стране."
 market_liberal_subtype_desc: "Рыночно-либеральные правительства происходят из классического либерализма и уходят корнями в различные философии Просвещения. Исповедуя святость свободы личности и обычно отстаивая представительное правительство и свободное предпринимательство, эта категория представляет широкий спектр групп, включая либералов свободного рынка, национал-либералов и консервативных либералов."
 social_conservative_subtype_desc: "Социал-консерватизм охватывает многие демократические правительства, стремящиеся сохранить, поддержать или укрепить традиционные ценности своего народа перед лицом меняющихся обстоятельств. Его приверженцы не являются жёсткими реакционерами, в целом поддерживая верховенство закона и демократию и будучи готовыми искать взвешенные, постепенные изменения, соответствующие их этосу, в рамках политических систем, в которых они обитают."
 authoritarian_democrat_subtype_desc: "Авторитарная демократия описывает широкий спектр частично представительных правительственных систем, характеризующихся влиятельными фигурами и группами интересов, правящими через видимость свободного законодательного органа. Иногда это продукт идеологической убеждённости или просто прагматизма, а иногда эта политическая структура возникает из-за слабых или переходных выборных институтов."
 paternal_autocrat_subtype_desc: "Патерналистская автократия часто является скорее умонастроением, чем идеологией, и патерналистские автократические правительства иногда прямо осуждают идеологическую пристрастность. Часто призывая к сильному, мудрому лидеру, такому как король, генерал или священнослужитель, который защитит и направит народ, её властная природа не мешала практикующим её иметь влияние на массы."
 national_populist_subtype_desc: "Национал-популизм — продукт слияния правых ультранационалистических движений, возникающих в меняющемся мире, и описывает правительства, стремящиеся использовать энергию народа для часто радикальных целей. Часто питая отвращение к традиционной демократии и обращаясь к массовому недовольству истеблишментом, многие обращаются к эклектичным источникам вдохновения для решения насущных проблем."

