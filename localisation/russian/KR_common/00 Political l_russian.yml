 generic_raise_stability_socialist: "Улучшение условий труда"
 generic_raise_stability_socialist_desc: "Фабричная работа тяжела и сопряжена с множеством опасностей. Улучшение условий для наших фабричных рабочих снизит производительность в краткосрочной перспективе, но долгосрочные выгоды того стоят."

 generic_raise_stability_liberal: "Законодательное закрепление свобод"
 generic_raise_stability_liberal_desc: "Возможно, самый простой способ повысить стабильность в стране — дать людям то, что они хотят. Это потребует некоторых неудобных компромиссов, но в идеале эти меры лишь временны и призваны умиротворить их, пока порядок не будет должным образом восстановлен."

 generic_raise_stability_conservative: "Полицейские репрессии"
 generic_raise_stability_conservative_desc: "Беспорядки стали повсеместными. Мы должны ослабить ограничения для наших полицейских сил и дать им свободу выполнять свою работу по аресту злостных нарушителей."

 generic_raise_stability_authoritarian: "Ввести армию"
 generic_raise_stability_authoritarian_desc: "Способ справиться с беспорядками в нашей стране — ввести армию и полностью подавить их. Не все будут этим довольны, это правда, но иногда военное положение — единственная альтернатива."

