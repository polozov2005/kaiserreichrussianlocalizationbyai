l_russian:

### Generic Faction Joining ###
 generic_events.10.t: "Союз с [FROM.GetNonIdeologyNameDef]?"
 generic_events.10.d: "Международные отношения часто изменчивы, договорённости и союзы быстро сменяются от поколения к поколению. Иногда даже в течение одного поколения пакты подписываются и разрываются, когда меняются интересы. Нестабильность, вызванная Чёрным понедельником и другими политическими событиями по всему миру, усилила страхи во многих слабых государствах перед тем, что великие державы столкнутся, а они окажутся под перекрёстным огнём.\n\nВ то время как одни обращаются к изоляции либо из-за внутренней смуты, либо в надежде, что нейтралитет сделает их не стоящими внимания для разных хищных держав, [FROM.GetNameDefCap] выбрало противоположный подход. Теперь, когда внутренние проблемы улажены, народ [FROM.GetNameDefCap] обращает взгляд вовне, надеясь найти защиту в союзах. Мы, возможно, благодаря нашему лучшему географическому положению, военной мощи или идеологической близости, стали для [ROOT.GetFactionName] желанным союзником.\n\nОстаётся вопрос: согласиться ли нам? Ещё один союзник в нашем пакте означает дополнительные ресурсы для наших объединённых сил, но и любые новые опасности, которые он привнесёт для нашей фракции, станут общей угрозой. Необходимо учесть любые конкурирующие претензии и возможные раздоры между членами фракции. Каким будет наше решение?"
 generic_events.10.srd: "До нас дошло интересное новое сообщение от [ITA.GetNonIdeologyNameDef]: видя нашу общую войну против социализма и общую цель процветания отечества, они решили предложить возведение короля Амедео в качестве главы государства, фактически объединяя наши две страны. Хотя [ITA_GetNatPopLeader] останется главой правительства, наш премьер-министр получил предложение стать старшим членом НФП и обрести значительное влияние на военную политику."
 generic_events.10.a: "Вместе мы сильнее!"
 generic_events.10.b: "Прекрасное предложение, передать его [ROOT.FactionLeader.GetNonIdeologyNameDef]!"
 generic_events.10.c: "Пожалуй, нет..."

 generic_events.11.t: "[FROM.GetNonIdeologyNameDefCap] согласилось!"
 generic_events.11.d: "Получив нашу просьбу о вступлении в их альянс, [FROM.GetNameDef] приняло нашу заявку, и теперь мы станем членом [FROM.GetFactionName]. Это, надеемся, повысит нашу безопасность в эти тревожные времена, пока мы стремимся защитить наш народ от внешних сил и иностранного вмешательства.\n\nОднако это соглашение не бесплатно. Теперь на нас возлагаются определённые ожидания по участию в общей обороне стран [FROM.GetFactionName], и мы, вероятно, будем втянуты в конфликты, связанные с этим пактом. Это включает возможность быть вовлечёнными в войны, начатые членами этого пакта.\n\nТеперь мы вместе идём в будущее, наши судьбы переплетены как словом, так и силой оружия. Если повезёт, мы получим от этого соглашения гораздо больше, чем потеряли в автономии."
 generic_events.11.a: "Превосходно!"

 generic_events.12.t: "[negotiator.GetNonIdeologyNameDefCap] предлагает союз с [potential_ally.GetNonIdeologyNameDef]"
 generic_events.12.d: "Срочное уведомление только что поступило из министерства иностранных дел: [negotiator.GetNonIdeologyNameDef] просит нас рассмотреть возможность приглашения [potential_ally.GetNonIdeologyNameDef] в наш военный альянс. Судя по всему, [potential_ally.GetNonIdeologyNameDef] изначально предложила эту идею [negotiator.GetNonIdeologyNameDef], и та сочла её достаточно весомой, чтобы передать нам.\n\nПреимущества очевидны. В стратегии наличие большего количества сил почти всегда хорошо, и [potential_ally.GetNonIdeologyNameDef] признала, что, вероятно, будет вынуждена участвовать во всех конфликтах, в которых мы окажемся, независимо от их происхождения. Однако идея не лишена риска — мы также будем обязаны участвовать в войнах [potential_ally.GetNonIdeologyNameDef], а вступление в союз с ними может противоречить нашим текущим стратегическим целям. Подобные вопросы всегда нужно учитывать, когда на столе новый альянс.\n\nИтак, каково наше решение?"
 generic_events.12.a: "Пусть присоединяются."
 generic_events.12.b: "Они нам не нужны."

 generic_events.13.t: "[FROM.GetNonIdeologyNameDefCap] согласилось!"
 generic_events.13.d: "Хорошие новости! Рассмотрев предложение [negotiator.GetNonIdeologyNameDef], [FROM.GetNonIdeologyNameDef] приняло нашу просьбу о вступлении в их альянс. С такими друзьями мы точно будем спать спокойнее."
 generic_events.13.a: "Превосходно."

 generic_events.14.t: "[FROM.GetNonIdeologyNameDefCap] согласилось!"
 generic_events.14.d: "Хорошие новости! Рассмотрев наше предложение, [FROM.GetNonIdeologyNameDef] согласилось принять [potential_ally.GetNonIdeologyNameDef] в альянс. Мы оба, несомненно, выиграем от такого соглашения."
 generic_events.14.a: "Превосходно."

 generic_events.15.t: "[FROM.GetNonIdeologyNameDefCap] отказало!"
 generic_events.15.d: "Неприятные новости: несмотря на поддержку [negotiator.GetNonIdeologyNameDef], [FROM.GetNonIdeologyNameDef] отклонило наше предложение вступить в их альянс. Похоже, наши цели не так близки, как казалось ранее."
 generic_events.15.a: "Их потеря."

 generic_events.16.t: "[FROM.GetNonIdeologyNameDefCap] отказало!"
 generic_events.16.d: "Шокирующие новости: несмотря на нашу аргументацию в их пользу, [FROM.GetNonIdeologyNameDef] отказалось принять [potential_ally.GetNonIdeologyNameDef] в альянс. Наше внешнеполитическое ведомство застигнуто врасплох — они считали, что наше стратегическое мышление гораздо ближе, чем оказалось на деле."
 generic_events.16.a: "Что?"

 generic_events.17.t: "[FROM.GetNonIdeologyNameDefCap] отказало!"
 generic_events.17.d: "Несмотря на наши убедительные доводы о том, что мы можем быть эффективным и полезным членом их альянса, к нашему огорчению, [FROM.GetNameDef] отклонило нашу просьбу о вступлении в [FROM.GetFactionName]. В каком-то смысле этого следовало ожидать: альянсы часто хрупки и полны опасностей, и некоторая осторожность при их создании вполне оправдана. Тем не менее, этот отказ ставит нас в неприятное положение. Либо они не намерены нас защищать, либо, что более цинично, видят в нас будущую цель на поле боя.\n\nНам нужно спешно искать действенный способ обеспечить национальную безопасность. Будь то поиск другого альянса для защиты от вторжения, апелляция к нескольким фракциям как доброжелательный нейтральный посредник или обращение внутрь к вооружённой самообороне — мы должны обеспечить безопасность нашего народа. [FROM.GetFactionName], возможно, пожалеет или нет об отказе нам, но важно, чтобы мы сами не пожалели об этом исходе."
 generic_events.17.a: "Их потеря."

 generic_events.18.t: "Союз с [FROM.GetFactionName]?"
 generic_events.18.d.generic: "Международные отношения часто изменчивы, договорённости и союзы быстро сменяются от поколения к поколению. Иногда даже в течение одного поколения пакты подписываются и разрываются, когда меняются интересы. Нестабильность, вызванная Чёрным понедельником и другими политическими событиями по всему миру, усилила страхи во многих слабых государствах перед тем, что великие державы столкнутся, а они окажутся посередине.\n\nСтремясь преследовать общие интересы, [FROM.GetFactionName] объединились в полноценный военный альянс. Они ищут нашего членства, предлагая нам потенциал дополнительной защиты (будь то от внешних угроз или от них самих), и в обмен на углублённые военные и экономические связи мы станем частью более сильного и единого блока.\n\nОднако вступление сопряжено с риском. Мы, вероятно, будем втянуты в любые конфликты, связанные с этим альянсом, и возможно, что наши вложения перевесят выгоды от членства. Нам, как нации, необходимо тщательно взвесить издержки и преимущества такого соглашения."
 generic_events.18.d.INT: "Интернационал, военный альянс ведущих социалистических держав мира, осторожно обратился к нам с предложением вступить в его ряды, считая союз с нашей страной выгодным для всех и большим шагом вперёд в долгой борьбе за освобождение международного пролетариата. Это предложение несёт неоспоримые выгоды: мы, безусловно, можем рассчитывать на огромную поддержку — помощь против наших врагов и в достижении наших военных целей, защиту, если она потребуется, и, что не менее важно, поддержку в развитии наших вооружённых сил и даже экономики через программу Фаланстер. Однако оно сопряжено с, возможно, пугающими обязательствами, ставя нас на путь неизбежного, пусть и отложенного, конфликта с Кайзером и его союзниками. Как нам ответить на их предложение?"
 generic_events.18.a: "Вместе мы сильнее!"
 generic_events.18.b: "Пожалуй, нет..."

 generic_events.19.t: "[FROM.GetNonIdeologyNameDefCap] согласилось!"
 generic_events.19.d.generic: "После некоторых раздумий [FROM.GetNameDefCap] приняло наше приглашение вступить в [ROOT.GetFactionName], как мы искренне надеялись. Новый член нашего альянса в целом приветствуется, обеспечивая дополнительную безопасность друг для друга и, по крайней мере, гарантируя мир между его членами. Их вклад в виде военных сил, финансирования и дипломатического веса, надеемся, продвинет общие интересы [ROOT.GetFactionName], но есть и некоторые опасения впереди.\n\nЕщё один союзник в нашем пакте означает дополнительные ресурсы для наших объединённых сил, но и любые новые опасности, которые он привнесёт для нашей фракции, станут общей угрозой. Необходимо учесть любые конкурирующие претензии и возможные раздоры между членами фракции.\n\nНам придётся усердно работать, чтобы сгладить эти проблемы, дабы альянс работал на благо всех (или, по крайней мере, на наше собственное). Тем не менее, это не должно омрачать дипломатическую победу, одержанную сегодня для всех наших народов."
 generic_events.19.d.INT: "Время ликовать! [From.GetNameDefCap] приняло наше предложение вступить в наш военный альянс, как мы искренне надеялись. Этим решением они обеспечили себе нашу неизменную поддержку как союзников в глобальной борьбе за освобождение рабочего класса, а мы получили ценного союзника против наших, несомненно, могучих врагов. Скоро многие другие последуют за ними: «Интернационал станет родом человеческим»!"
 generic_events.19.a: "Превосходно!"

 generic_events.20.t: "[FROM.GetNonIdeologyNameDefCap] отказало!"
 generic_events.20.d.generic: "После некоторых раздумий, к нашему огорчению, [FROM.GetNameDef] отклонило наше приглашение вступить в [ROOT.GetFactionName]. К сожалению, это нередкое явление при строительстве альянсов. Некоторые государства опасаются потери дипломатической гибкости, которую повлечёт формальное обязательство, надеясь избежать втягивания в проигрышный конфликт или желая присоединиться к более подходящему альянсу. Возможно также, что у них есть замыслы, несовместимые с нашими целями, хотя, надеемся, не антагонистическим образом.\n\nКак бы то ни было, [FROM.GetNameDef] не сделает и не сломает наш альянс. Или, по крайней мере, так должно быть, если наша фракция имеет хоть какой-то вес. Мы продолжим достигать своих целей так или иначе, и если им повезёт, [FROM.GetNameDef] не слишком пожалеет о своём неудачном решении."
 generic_events.20.d.INT: "К нашему огорчению, [From.GetNameDef] отклонило наше предложение вступить в наш военный альянс. Возможно, слишком напугано неоспоримой мощью наших врагов или просто недостаточно привержено борьбе за освобождение пролетариата. В любом случае, хотя это, безусловно, прискорбный результат нашего дипломатического демарша, многие другие присоединятся к нам в этой борьбе: «Интернационал станет родом человеческим»!"
 generic_events.20.a: "Их потеря."

### Incoming War-ning ###
 generic_events.30.t: "Готовьтесь к войне!"
 generic_events.30.d: "Мы получили многочисленные сообщения о том, что войска [From.GetAdjective] в настоящее время сосредотачиваются, и через границу [Root.GetAdjective] ведётся активная разведка. Военные чиновники утверждают, что [From.GetNameDef] явно планирует вторжение в [Root.GetNameDef], которое может начаться в любой момент в течение следующих нескольких недель."
 generic_events.30.a: "Мы должны быть готовы!"
 generic_events.31.d: "Мы получили тревожные известия от [From.GetNameDef] о том, что войска [From.From.GetAdjective] в настоящее время сосредотачиваются, и через границу [From.GetAdjective] ведётся активная разведка. Военные чиновники утверждают, что [From.From.GetNameDef] явно планирует вторжение в [From.GetNameDef], которое может начаться в любой момент в течение следующих нескольких недель."
 generic_events.32.d: "Мы получили известия от наших союзников в [From.GetNameDef] о том, что их войска в настоящее время сосредотачиваются, и через границу [attack_target.GetAdjective] ведётся активная разведка. [From.GetNameDefCap] планирует вторжение в [attack_target.GetNameDef], которое может начаться в любой момент в течение следующих нескольких недель."

### Returning Cores ###
 return_cores_to_ally: "Вернуть земли [From.GetAdjective]"
 return_cores_to_ally_desc: "Правительство [Root.GetAdjective] обсуждает, что делать с землями [From.GetAdjective], которые мы сейчас оккупируем — землями, на которые у нас нет законных прав. Следует ли нам вернуть землю нашим союзникам из [From.GetNameDef]?"
 return_cores_to_subject: "Вернуть земли [From.GetAdjective]"
 return_cores_to_subject_desc: "Правительство [Root.GetAdjective] обсуждает, что делать с землями [From.GetAdjective], которые мы сейчас оккупируем — землями, на которые у нас нет законных прав. Следует ли нам вернуть землю нашим подданным в [From.GetNameDef]?"

 generic_events.75.t: "Земли [From.From.GetAdjective]"
 generic_events.75.d: "Правительство [Root.GetAdjective] обсуждает, что делать с землями [return_to.GetAdjective], которые мы сейчас оккупируем — землями, на которые у нас нет законных прав. Следует ли нам вернуть им эту землю?"
 generic_events.75.a: "Да, вернуть им все земли"
 KR_will_return_all: "Все прибрежные или сопредельные владения, являющиеся ядрами или претензиями [return_to.GetAdjective], будут возвращены §Y[return_to.GetNameDef]§!.\n\nПримечание: это §Rне§! будет включать штаты, являющиеся §Yпретензиями§! или §Yядрами§! [Root.GetAdjective]."
 generic_events.75.b: "Да, вернуть им земли... но оставить самые важные штаты"
 KR_will_return_rest: "Все прибрежные или сопредельные владения, являющиеся ядрами или претензиями [return_to.GetAdjective], будут возвращены §Y[return_to.GetNameDef]§!.\n\nПримечание: это §Rне§! будет включать штаты, являющиеся §Yпретензиями§! или §Yядрами§! [Root.GetAdjective], а также §Yважные§! штаты, такие как каналы."
 generic_events.75.c: "Вернуть только их коренные земли"
 KR_will_return_cores: "Все прибрежные или сопредельные владения, являющиеся ядрами [return_to.GetAdjective], будут возвращены §Y[return_to.GetNameDef]§!.\n\nПримечание: это §Rне§! будет включать штаты, являющиеся §Yпретензиями§! или §Yядрами§! [Root.GetAdjective], а также §Yважные§! штаты, такие как каналы. Любые §Yпретензии§! [return_to.GetAdjective] также будут сохранены."
 generic_events.75.e: "Мы оставим всё себе!"
 KR_will_not_return: "Мы §Rне§! вернём ни одной их земли, и больше нас об этом не попросят."

 generic_events.76.t: "[From.GetNameDefCap] возвращает земли [Root.GetAdjective]"
 generic_events.76.d: "Наши союзники в [From.GetNameDefCap] вернули нам часть наших исконных земель!"
 generic_events.76.a: "Отлично!"

