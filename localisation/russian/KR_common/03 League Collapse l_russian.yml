 league_collapse_events.1.t: "Сунь Чуаньфан встретился с губернаторами" #NT!
 league_collapse_events.1.d: "Сегодня в Нанкине собрались некоторые из самых важных и важных людей Лиги внутри клики Южного Чжили. Подобная сцена, вызванная в Нанкин великодушным Улыбающимся Тигром, является стандартным явлением в руководстве Лиги Восьми Провинций. Как и в новогодней речи президента Цао Куна, Лига сама по себе не является местом для таких легкомысленных действий, как в Пекине. Находясь во дворце маршала, Сунь Чуаньфан обычно проводит такие встречи, чтобы обсудить общую политику Лиги, делегировать задания губернаторам Лиги и укрепить свои позиции в провинциях.\n\nНа встрече присутствовал губернатор Цзянсу Ци Сеюань, возможно, величайший союзник Сунь и одновременно величайший соперник внутри самой Лиги. Накопляя противоречия за годы, прошедшие с момента его повторного принятия в Южном Чжили, Ци, пожалуй, больше всего поддерживает политику злокачественных уступок в этом неформальном совете. На совершенно противоположной стороне спектра, как за столом переговоров, так и в политике, находится губернатор Чэнь Тяоюань, курирующий предприятия в провинции Аньхой. Несмотря на то, что Чэнь был принят сравнительно недавно, он позиционирует себя как антиконцессионист и открыто маневрирует в оппозиции Ци.\n\nКонечно, присутствовали и другие губернаторы, такие как жестокий губернатор провинции Фуцзянь Чжоу Иньжэнь, который редко отпускал свою должность, проводя кампании по окружению против повстанческого движения Мингань. Точно так же губернатор Цзянси Дэн Жучжуо и губернатор провинции Чжэцзян Чэнь И, которого очень высмеивали. Зловещим образом, закончив бойкот Чжили, губернатор Чжао Хэнти и вице-король Лу Юйгуан не прислали никаких заявлений, даже телеграммы об их отсутствии; хотя губернатор Шен отправил символическую телеграмму с указанием своего голоса.\n\nНеважно, это новый процветающий год в Лиге. Хотя губернаторы Чэнь И, Ци Сеюань и Чэнь Тяоюань были явно обеспокоены присутствием ближайших доверенных лиц маршала Лиги, Се Хунсюня, Мэн Чжаоюэ и Ли Баочжана. Возможно, попытка выследить крыс в губернаторстве, поскольку репутация Сана как человека повышенной бдительности привела к тому, что его самые близкие соратники оказались друзьями, врагами, а враги притворялись друзьями." #NT!
 league_collapse_events.1.a: "Кинжалы прячутся за спинами в логове Тигра." #NT!

 league_collapse_events.2.t: "Жеганская железная дорога" #NT!
 league_collapse_events.2.d: "Сегодня состоялось долгожданное открытие Чжэганской железной дороги, предприятие, запланированное между Маршалом Лиги, губернаторами Чэнь И, Дэн Жучжо и Aufsichtsrat der Ostasiatischen Generalverwaltung. Пытаясь продолжить индустриализацию и преодолеть разрывы между разрозненными железнодорожными линиями в пределах границ провинций, железная дорога Чжэган изначально была обязана усилиям династии Цин. Первоначально построенная как железная дорога Чжучжоу-Пинсян, построенная в 1899 году, на ее завершение ушло шесть лет, и она была завершена в 1905 году.\n\nВ 1908 году Чжэцзянская железнодорожная компания начала исследовать выбор железнодорожной линии от Чжэцзяна до Цзянси, сотрудничая с такими компаниями, как Цзянсиская железнодорожная компания. Однако из-за последствий Синьхайской революции его строительство было временно приостановлено на неопределенный срок. Правительство провинции Чжэцзян во главе с Чэнь И, вновь посещенное в 1929 году под эгидой Маршала Лиги, решило собрать собственные средства для модернизации округа Цзяншань, расположенного на границе провинций между Чжэцзяном и Цзянси. Благодаря их усилиям они увидят строительство второстепенной железной дороги, Ханцзянской железной дороги.\n\nПоскольку преимущества Ханцзянской железной дороги приносят огромную прибыль правительству провинции Чжэцзян, собрание пришло к выводу, что крайне необходимо продолжать ремонт железной дороги, соединяющей Чжэцзян и Цзянси. Поскольку строительство началось в 1932 году и завершилось годом позже, правительство провинции модернизировало железную дорогу, отремонтировало 68 мостов и укрепило 16 из них, а также построило станцию ​​и депо Юшань.\n\nНаконец, губернаторы Чэнь и Дэн будут курировать совместное предприятие по соединению ряда второстепенных железных дорог, что, наконец, объединит Наньчан на прямой линии с Шанхаем. Хотя цена строительства Чжэганьской железной дороги была высокой: во время ее строительства погибло более 2000 рабочих, завершение строительства Чжэганской железной дороги стало заслуживающим внимания пропагандистским элементом китайского патриотизма. Общество Цзинсин, активно финансируемое AOG, но использующее китайских инженеров, провозгласило это фантастическим успехом.\n\nХотя те, кто менее оптимистичен, поспешили заявить о новом доступе AOG к богатым месторождениям полезных ископаемых, а также к цзиндэчжэньскому фарфору, который, как говорят, продается в Берлине по высоким ценам. Однако, к счастью, несмотря на опасения об обратном, нападения Гоминьдана на церемонию открытия не произошло." #NT!
 league_collapse_events.2.a: "Железные дороги приносят процветание!" #NT!

 league_collapse_events.3.t: "Неожиданное объявление" #NT!
 league_collapse_events.3.d: "Наслаждаясь свежим воздухом Нанкина, маршал Лиги не мог не представить, какой жизнью он бы жил, если бы не приступил к консолидации Южного Чжили. Возможно, командир армии Ву? Или даже буддийский монах? Такие праздные мысли не могли не танцевать в его голове. Быть Маршалом Лиги — нелегкая работа, особенно когда ваши враги находятся в вашем собственном лагере. Открыв газету, Улыбающийся Тигр не мог не хмуриться. Большим жирным шрифтом: ПРЕДАТЕЛЬ. За ним следует изображение Маршала Лиги.\n\nЕдва успев обдумать подобные вопросы, его спокойствие было нарушено неким Цянь Цзунцзе в сопровождении солдат. Будучи командиром более низкого ранга в своей свите, Цянь отвечает за безопасность железной дороги Чжэцзян и усилия полиции провинции, поэтому для него довольно странное зрелище находиться во дворце маршала, не говоря уже о таком импровизированном обсуждении вопросов. Однако прежде чем Сунь успел задать вопрос, Цянь опередил его.\n\n\"Маршал Сунь, мои глубочайшие извинения, я путешествовал так быстро, как только мог. Я не мог рисковать, чтобы эта информация ускользнула сквозь щели в телеграмме. Губернатор Ци, превысив свои полномочия, заключил соглашение с AOG о публичном приобретении и консолидации ряда восточных железных дорог от имени Schantung-Eisenbahn-Gesellschaft, одного из ее составляющих концернов. Включая и недавнюю Чжеганскую железную дорогу. \"\n\nНахмуренное лицо маршала зарылось глубже, он махнул рукой, чтобы успокоить Цяня, и вернулся к газете. Просматривая его содержание, он подробно описал соглашение между губернатором Ци, его открытую поддержку такой покупки и мстительное возмездие со стороны губернатора Чэнь Тяоюаня. Осудив Ци и, как следствие, Сунь, как предателя китайской нации, он сплотил антиконцессионистское движение. Подливая бензин в огонь, Ци почти постарался разрушить надежды тех, кто считал, что новая железная дорога может обеспечить более равное будущее для немцев и китайцев.\n\nОтдавая приказы, Тигр вышел из своего логова. В последующие дни многие представители Лиги начали разрывать контакты как с губернатором Ци, так и с губернатором Ченом. Точно так же реакция полиции на антиконцессионистские протесты была медленнее, чем обычно. Несомненно, Ци и Чен пожнут то, что посеяли. Маршал будет в этом уверен." #NT!
 league_collapse_events.3.a: "Единственное, чего Тигр терпеть не может. Назвать предателем." #NT!

 league_collapse_events.4.t: "Распространение беспорядков" #NT!
 league_collapse_events.4.d: "Неудивительно, что широко разрекламированная консолидация Центрально-Китайской железной дороги под управлением AOG и последовавший за этим ураган в средствах массовой информации, раздутый Чэнь Тяоюанем и антиконцессионистским движением, вызвали широкую критику. Интеллектуалы из Движения за автономию Чжэцзяна, Федерации национального спасения, Партии молодого Китая и даже Общества «Стремление» осуждают маршала Лиги и губернатора Ци как предателей, предателей, беспринципных предателей. Их столь красноречивые слова печатаются в отечественных газетах, за ними следуют видные англо-американские издания из Шанхая, и им вторят периодические издания китайской синдикалистской партии, которые можно найти в заводских цехах. Хуже того, похоже, что истина была затушена народной яростью.\n\nСмешанный с абсолютным негодяем губернатора Ци, Сунь Чуаньфан получил осуждение со стороны таких, как Торговая Ассоциация Нижней Янцзы, и даже нерешительно со стороны своих друзей из Общества Цзинсин. Поскольку новости быстро распространяются из уст в уста, они переросли в яростную волну возмущения, возможно, даже фантастическую. Обычно способный и искусный Улыбающийся Тигр наконец-то пойман.\n\nРассказы Старых Жен теперь описывают обширную сеть заговоров, исчезновения откровенных людей, предполагаемую передачу миллионов юаней в карманы Маршала Лиги. Общественность, естественно, отреагировала с предсказуемой яростью, и протесты уже распространились из Чжэцзяна и Цзянси в крупные прибрежные города, в том числе в иностранные поселения.\n\nОднако во владениях Суня находится сравнительно сломленный человек. Несмотря на все, что он сделал, было ли это крахом его империи? Не может быть, он был лучше этого. Конечно? Преданный не только крестьянством, о котором он отечески заботился, но одновременно и людьми слова, которых он уважал. Конечно, он не может сидеть сложа руки! Улыбающийся Тигр пережил гораздо худшее, и его амбиции намного превосходят это. Несмотря на это, даже его ближайшие доверенные лица, такие как Се Хунсюнь и Лю Цзунцзи, могут видеть износ легендарного маршала." #NT!
 league_collapse_events.4.a: "Разве они не видят? Я тоже люблю эту страну!" #NT!

 league_collapse_events.5.t: "Нападения на иностранцев" #NT!
 league_collapse_events.5.d: "Пробужденный от беспокойного сна, Маршал Лиги снова был атакован своей всегда послушной разведкой. После того, как мы стали следить за быстро развивающимися в последнее время событиями, стала вырисовываться гораздо более тревожная и поразительная картина. Когда он подошел к своему столу и вручил серию телеграмм, освещенный утренним рассветом, развернулась тревожная история.\n\nНачавшись с нападений на видных немецких граждан и бизнесменов, которые быстро переросли в практически неизбирательные, нападения на иностранцев, воодушевленные так называемыми «патриотическими» гражданами, начали возникать в провинциях Фуцзянь, Цзянси и Аньхой. Хуже того, народные настроения и жажда крови привели к тому, что такие действия распространились со скоростью лесного пожара, практически охватив в ярости целые округа.\n\nВ ответ немецкое консульство в Нанкине посоветовало подданным кайзера вооружиться, и другие европейские правительства советуют то же самое. Из-за предупреждений о том, что иностранцам следует путешествовать только в случае необходимости, похоже, даже ненавистные союзники Маршала Лиги начинают восставать против него.\n\nВлияние этих нападений на бизнес и инвестиции в целом еще предстоит увидеть, но недавняя история показывает, что Шанхайская фондовая биржа не останется незатронутой. Его просвещенное управление было окружено со всех сторон. Тучи сгущаются над Нанкином..." #NT!
 league_collapse_events.5.a: "Карточный домик начинает трещать." #NT!

 league_collapse_events.6.t: "Бойкоты и Пекин" #NT!
 league_collapse_events.6.d: "Губернатор Чэнь Тяоюань, всегда ненадежный и всегда настойчивый, оппортунистический крыса, возможно, самый прародитель преувеличенного возмущения, начал пренебрегать дискуссиями в интеллектуальных и крестьянских кругах о всеобщем бойкоте всех немецких товаров. Поскольку такие разговоры быстро распространялись и сопровождали растущие протесты по всему Восточному Китаю, они еще больше подтолкнули их от первоначального послания губернатора Чэня к полному потоку почти восстания со стороны ряда гоминьдановских агентов Дай Чуньфэна, интеллектуалов и националистических идеологов.\n\nОднако наиболее тревожными являются новости о том, что некоторые из местных гарнизонов в Аньхое, Чжэцзяне и Цзянсу отступили, позволив беспорядкам возобновиться. расти. Не желает рисковать быть заклейменным как «ханьцзянь» или «расовые предатели». Однако всегда лояльные губернаторы Дэн и Чжоу поддерживали маршала Лиги во всех государственных делах, зная за кулисами отвращение, которое Сунь испытывает к уступкам. Вице-король Лу Юйгуан и губернатор Шэнь Хунъин, со своей стороны, хранят молчание по поводу разворачивающейся сцены, хотя Сунь знает их достаточно хорошо, чтобы знать, по крайней мере, о молчаливой поддержке Шэня.\n\nГубернатор Чжао Хэнти, со своей стороны, положительно высказался о бойкоте Ассамблеи провинции Хунань, но одновременно дал заверения, что он по-прежнему привержен нейтралитету Хунани. Что еще хуже, похоже, что разворачивающийся хаос внутри Лиги не остался незамеченным ни Нефритовым Маршалом, ни Королем Баодина. Маршал Сунь получил известие о том, что Северные Чжили, возможно, начинают расследование. В Пекин дошли едва правдивые сообщения, поэтому очевидно, что Нефритовый маршал пытается привлечь своего протеже к четкому ответу.\n\nЧтобы предотвратить вмешательство Пекина, советники в Нанкинской комиссии, а также такие люди, как Чжэн Цзюньянь и Се Хунсюнь, предложили Маршалу Лиги публично и в частном порядке заявить, что ситуация находится под контролем. Если мы оставим нас в изоляции, это помешает губернатору провинции Хубэй Сяо или губернатору провинции Хэнань Ли мобилизовать свои силы. Необычно тихий в отношении подобных событий губернатор Чэнь И, наконец, установил контакт с Сунь, предложив перебросить элементы нескольких своих подразделений, базирующихся в Нанкине и Чжэцзяне, в города, расположенные вдоль нижнего течения Янцзы, где протесты являются самыми масштабными. Одновременно провинциальные гарнизоны запросили зеленый свет на принятие любых мер, которые они сочтут необходимыми для подавления открытого инакомыслия." #NT!
 league_collapse_events.6.a: "Тигр знает, когда нужно опустить молот." #NT!
 league_collapse_events.6.b: "Но у меня также есть сердце, наказывать только тех, кто применяет насилие." #NT!

 league_collapse_events.7.t: "Железнодорожные взрывы" #NT!
 league_collapse_events.7.d: "На провинциальных территориях Лиги раздались дальнейшие тревожные новости. Судя по всему, серия взрывов потрясла несколько станций и железнодорожных линий, которые должны были стать частью Центрально-Китайской железной дороги: одна бомба разорвала вагон на переполненной станции в Ханчжоу, в результате чего десятки людей были убиты и ранены. Поскольку такие новости наиболее ярко потрясли как государственных служащих, бюрократов, так и губернаторов, гибель и задержки оставляют многие семьи безутешными. Однако с прагматической точки зрения такие вопиющие акты анархического разрушения также привели к остановке большей части транспортного сектора во многих районах, что нанесло ущерб быстрому развертыванию маршалом Сунь дополнительных сил, пытающихся подавить растущие беспорядки, и свергнуть губернаторов Чена и Ци.\n\nВина за нападения была возложена на различные цели, а офицеры разведки Суня не смогли разобраться в хаотичной обстановке. Местные бандиты, желающие устроить хаос и беспрепятственно грабить? Гоминьдан надеется подготовить почву для еще большего восстания? Губернатор Ци или Чэнь надеются предотвратить возмездие из Нанкина? Или даже японцы, стремящиеся еще больше посеять семена инакомыслия. Некоторые люди, особенно склонные к заговору, предполагают участие Германии, которая, как они утверждают, нацелена на их собственные владения, чтобы подготовить почву для интервенции." #NT!
 league_collapse_events.7.a: "Невинные снова истекают кровью..." #NT!

 league_collapse_events.8.t: "Репортажи с севера и юга" #NT!
 league_collapse_events.8.d: "Кажется, что каждый новый день приносит плохие новости, год Крысы уже оказывается неконтролируемым бедствием. Кроме того, тревожные сообщения дошли до Маршальского дворца как из Сюйчжоу, так и из Цюаньчжоу. Судя по всему, в зоне повстанцев Мингань партизаны Гоминьдановской национальной революционной армии организовали серию все более смелых рейдов, нанося удары по внутренним городам Юндин и Лунъянь. Губернатор Чжоу Иньжэнь исторически долгое время боролся за установление контроля над своей горной провинцией, при этом его фактический контроль часто ограничивался побережьем и крупными внутренними городами.\n\nТеперь, с растущим упорством и смелостью НРА, железная хватка Чжоу стала еще более слабой. Тем временем на северной границе Цзянсу губернатор Ци, что весьма необычно, отправил сообщения об усилении волнений со стороны сельских бандитов и, по-видимому, о захвате деревень этими кланами. Судя по всему, маршал Сунь не дурак, слишком хорошо знаком с шарадами Ци с так называемыми «бандитскими кланами», которые на самом деле являются его собственными солдатами. Это точка давнего разочарования и раздора между губернатором и маршалом, их возобновление участия вполне может способствовать росту беспорядков.\n\nКак бы благоразумно ни было, маршал Сунь предложил направить ряд дивизий, которые помогали поддерживать порядок в Цзянси и Фуцзянь, двинуться на север, оценивая шансы и предпочитая, чтобы более ценные Цзянсу оставались под железным сапогом. Однако некоторые в его ближайшем окружении высказывают мнение, что Улыбающийся Тигр еще больше затягивает петлю на губернаторах Чене и Ци." #NT!
 league_collapse_events.8.a: "Этот ублюдок что-то замышляет!" #NT!

 league_collapse_events.9.t: "Телеграмма из Пекина" #NT!
 league_collapse_events.9.d: "Несмотря на наши притворства и размахивание руками, всегда настойчивый Нефритовый маршал и король Баодина отправили в Нанкин шквал любопытных телеграмм. Мнимые правители страны со времен Третьей войны Чжифэн, маршал У Пейфу и президент Цао Кунь, имеют непомерное влияние, даже на маршала Лиги. Несмотря на их разногласия, зарождающуюся гонку вооружений между Улыбающимся Тигром и Нефритовым Маршалом, а также многополярный мир Северного и Южного Чжили, У Пейфу, в конце концов, по-прежнему остается наставником Суня, и это несет в себе непоколебимую связь. Точно так же те, кто находится в ближайшем окружении Суня, опасаются военного мастерства У, политических возможностей Цао и всей мощи Северного Чжили, обрушившейся на них.\n\nВ сообщении запрашивается подробный отчет о текущей хаотической ситуации, разворачивающейся на юго-восточных территориях. Красноречивая, непреклонная и требовательная, телеграмма явно сформулирована с намерением заставить маршала Лиги признать какую-то слабость или трудности, чтобы служить предлогом для центральной армии вторжения и «восстановления контроля». Неоднократные попытки спорить, контролировать и расширять свое влияние на юге после образования Лиги в 1928 году были блестяще отклонены Саном.\n\nКак способный государственный деятель, Сан должен быть взвешенным, осторожным и внимательным ко всем величинам, которые он должен сбалансировать. Наставник и протеже, Север и Юг, и стабильность его королевства контрастировала со стабильностью нации. Сотрудничая со своим близким и харизматичным советником Вэй Даофэном, маршал написал..." #NT!
 league_collapse_events.9.a: "«Все под контролем»." #NT!

 league_collapse_events.10.t: "Инцидент в Уху" #NT!
 league_collapse_events.10.d: "Город Уху, расположенный на окраине Нанкина и якобы находящийся под властью губернатора Аньхой Чэнь Тяоюаня, стал особенно ярким очагом инакомыслия и беспорядков. Поскольку Нанкин находился под прямым контролем Маршала Лиги, он оставался довольно странным и стабильным по сравнению с очагами беспорядков, такими как Сямэнь или Сюйчжоу. В результате большинство инакомыслящих в Нанкине, которые желают, чтобы их голоса были услышаны, присоединились к протесту в Уху, действуя вместо каких-либо крупных действий прямо под носом Суня.\n\nБлагодаря поддержке и самоуспокоенности губернатора Чена им удалось действовать относительно беспрепятственно, медленно приводя к тому, что статус города перерос в анархию. При таком ухудшении авторитета развитие последнего инцидента было неизбежным. В рамках регулярно запланированных протестов, ставших теперь слишком обычным явлением в Лиге, прошедших вчера во второй половине дня, похоже, они получили непомерный всплеск активности. Отвергнутые китайской синдикалистской партией, ряд бастующих рабочих с близлежащих немецких заводов поддержали беспорядки, быстро вырвавшись из-под контроля полиции.\n\nГарнизон, усиленный частью недавно прибывших обученных немцами войск из Нанкина, всерьез попытался восстановить порядок, но в беспорядочной схватке группа людей начала стрелять. Виновные остаются неизвестными, но последовавший за этим хаос оказался катастрофическим. Через несколько минут полиция, гарнизон и их подкрепление открыли огонь по толпе, получив ответный огонь. Уже подтверждено, что более двухсот погибших и в четыре раза больше раненых, и возникшее в результате возмущение уже вызвало протесты в прилегающих районах.\n\nСитуация усугубляется наличием небольшого иностранного поселения в городе. Многие уже заявляют, что смертоносная сила использовалась только для защиты этих иностранцев, и что убийства, скорее всего, появятся в международных газетах завтра утром. Более того, губернатор Чэнь использовал ситуацию, чтобы официально потребовать, чтобы все солдаты Лиги восьми провинций вообще покинули провинцию Аньхой, предотвращая его вероятное отделение. Такие действия привели к тому, что Маршал Лиги и его ближайшее окружение поверили, что виноват Чэнь Тяоюань..." #NT!
 league_collapse_events.10.a: "Этот предатель! Да что там выигрывать?!" #NT!

 league_collapse_events.11.t: "Аньцин отказывается от дальнейшего сотрудничества" #NT!
 league_collapse_events.11.d: "Выполняя свое требование, губернатор Чэнь объявил о своем официальном выходе из Лиги, не получив ответа от Маршала Лиги. Ссылаясь на недавний инцидент в Уху, его требование превратилось в ультиматум, призывающий к полному и окончательному выводу всех непровинциальных сил из провинции Аньхой, а также к немедленной передаче офицеров, ответственных за инцидент в Уху. Довольно унизительно Чэнь заверил маршала Лиги, что его собственные солдаты будут продолжать «подавлять распространяющиеся волнения и беспорядки», как будто он вообще сделал что-то из этого.\n\nОтказываясь от дальнейшего сотрудничества с властями Лиги, он, кроме того, осудил создание Центрально-Китайской железной дороги, обвинив ее в том, что она «доводит патриотически настроенных граждан до грани отчаяния». Будучи долгое время занозой на нашем глазу, похоже, что «Дурак» показал свою руку. Помогая и отвергая ад народного протеста и возмущения против Лиги и ее Маршала, стало очевидно, что Чен просто хотел создать casus belli, чтобы обеспечить свою независимость от хватки Улыбающегося Тигра.\n\nПри любых нормальных обстоятельствах такое поведение было бы встречено немедленным, быстрым и жестоким возмездием. Однако позиция губернатора Чена, его связи с антиконцессионистами и кампания в СМИ, превращающая его в своего рода националистического героя, привели к опасениям со стороны маршала Лиги. Решительные действия сейчас вполне могут послужить дальнейшему расколу ныне хрупкой Лиги. Однако маршал Лиги Сунь, не из тех, кто предпринимает такие невыносимые действия сидя, официально потребовал, чтобы его самые верные генералы Се Хунсюнь, Лю Цзунцзи, Мэн Чжаоюэ и Ма Юрэнь подготовили своих солдат к столкновению с армией Аньхой." #NT!
 league_collapse_events.11.a: "Его время придет, но не скоро." #NT!
 league_collapse_events.11.b: "Давайте присоединимся к губернатору Чену! (Играйте за Аньцин)" #NT!

 league_collapse_events.12.t: "Гадюка в логове тигра" #NT!
 league_collapse_events.12.d: "В условиях предательства Чэнь Тяоюаня и неистовства антиконцессионистов на нашем западе, а также мародерского хаоса Гоминьдана на юге, главенство провинции Цзянсу, помимо ее богатства, стало стратегически важным для поведения Лиги в будущих конфликтах. Поскольку он расположен к северу от провинции Чжэцзян и является стержнем морской связи Сингапура с Лигой Солнца, крайне важно, чтобы он оставался стабильным в эти нестабильные времена.\n\nДавно амбициозный губернатор Ци Сеюань когда-то был доминирующим военачальником Чжили в регионе Цзяннань, контролируя Цзянсу, Чжэцзян и Аньхой на вершине своей власти. Когда режим Чжили в Пекине пал перед объединенными силами армии перебежчиков Фэн Юйсяна и клики Фэнтянь, большая часть остатков Цзиньбао оказалась в Цзянсу, что привело к тому, что новое правительство Пекина санкционировало вторжение в провинцию. Вынужденный перебраться в соседний дружественный Чжэцзян, Ци в конце концов вернулся, но обнаружил, что его авторитет в Цзянсу подорван восхождением Сунь в Нанкине. Хотя Ци остается верным союзником Маршала Лиги, Сунь не может не испытывать подозрений к амбициям генерала Ци.\n\nЧтобы проверить своего старшего лейтенанта, Сунь послал Шангуань Юньсяна и Чжэн Цзюняня наблюдать за главнокомандующим Цзянсу и обеспечить его постоянную поддержку первенства Нанкина. Хотя кажется, что другой главный лейтенант Сунь, Чэнь Тяоюань, воспользовался возможностью устроить резню в Уху, Сунь по-прежнему уверен, что Ци Сеюань окажется большей угрозой для его правления. А пока Сунь не нашел причин ожидать предательства со стороны Цзянсу, но он знает, что лучше не оставлять Ци без присмотра." #NT!
 league_collapse_events.12.a: "Я знаю, что он что-то замышляет!" #NT!

 league_collapse_events.13.t: "Напряженность на Янцзы" #NT!
 league_collapse_events.13.d: "На улицах Аньхоя раздается возмущение: «Справедливость для Уху; изгоните иностранцев!» Губернатор Чэнь Тяюань принял вызов, и агентов правительства Нанкина уже высылают из провинции. Практически в одночасье Чэня прозвали защитником народа, но теперь его силы вовлечены в серию противостояний по всей нижней части Янцзы, и возникает вопрос: что дальше? Некоторые призывают к полному свержению режима Нанкина, но более циничные голоса указывают на стратегические возможности.\n\nЧэнь давно известен своей склонностью идти на продуманный риск, и этот момент ничем не отличается." #NT!
 league_collapse_events.13.a: "Да здравствует губернатор!" #NT!

 league_collapse_events.14.t: "Просьба к У Пейфу?" #NT!
 league_collapse_events.14.d: "В условиях хаоса, охватившего Восьми Провинций, Чэнь полностью осознает, что его собственное положение вскоре также может оказаться под угрозой. Поэтому, чтобы избежать немедленного краха или решительных военных действий со стороны одного из наших врагов, нам понадобятся союзники. У Пэйфу, Нефритовый маршал и истинный глава правительства Цин, обладает крупнейшей военной силой в Восточном Китае и может оказаться ценным активом, поскольку, по слухам, он может обладать скрытой лояльностью и желанием помочь нашему антиконцессионистскому делу. Возможно, было бы неразумно сразу просить его о полной поддержке, поэтому вместо этого нам следует просто попросить его помочь обеспечить финансирование наших войск." #NT!
 league_collapse_events.14.a: "Отправьте телеграмму." #NT!

 league_collapse_events.15.t: "Чэнь Тяоюань отправляет телеграмму" #NT!
 league_collapse_events.15.d: "«Выдающемуся президенту Цао Куну и имперскому министру У Пэйфу,\n\nя, губернатор Чэнь Тяоюань, смиренно прошу внесудебного финансирования моих войск. Как указано в конституции нашей великой нации, обязанностью национального правительства является предоставление средств губернаторам провинций для подавления беспорядков. Поскольку ситуация с маршалом Лиги Сунь Чуаньфаном в Нанкине неясна, я взял на себя ответственность за защиту провинции Аньхой против бандитов и левых агитаторов. \"\n\nДоставленный в виде телеграммы Цао Куну и отправленный сегодня утром У Пэйфу, этот тон удивил обоих мужчин своей смелостью, казалось, предлагая Нефритового маршала и короля Баодина, призывая их к достоинствам конституции. Похоже, что Чен восстановил порядок в своей провинции, он явно делает ставку на поддержку центрального правительства, чтобы выйти за пределы провинции Аньхой.\n\nСтолкнувшись с довольно трудным выбором, Чэнь потенциально мог бы убрать шахматную фигуру с доски, стереть ее с лица земли человеком, обязанным его поддержкой, в отличие от довольно неуступчивой Лиги. Однако с багажом последователей-ярых антиконцессионистов поддержка Ву и Цао может привести к долгосрочному отчуждению Германии, что Цао деликатно культивировал в течение многих лет. В то же время поддержка антиконцессионистов позволила бы У и Цао вновь подчиниться мнению народных масс, оседлав волну поддержки, подобную 1922 году." #NT!
 league_collapse_events.15.a: "Отправьте средства, это защитит наши интересы." #NT!
 league_collapse_events.15.b: "Мусор. Никаких средств для повстанцев!" #NT!

 league_collapse_events.16.t: "Ву принимает наш запрос" #NT!
 league_collapse_events.16.d: "Маршал У Пэйфу ответил на нашу последнюю телеграмму, в которой выразил свои глубокие симпатии народу Аньхой и восхищение его преданностью китайской исключительности. Однако в этом грандиозном письме маршал У ни разу не заявил авторитетно, пойдет ли Пекин на помощь Аньцину. Губернатор Чэнь оказался в затруднительном положении и у него мало времени на принятие решения. Стоит ли продолжать сотрудничать с маршалом Ву, или наши драгоценные несколько дней мира лучше потратить на другой план дипломатического выживания?" #NT!
 league_collapse_events.16.a: "Видеть? Что я тебе говорил!" #NT!
 league_collapse_events.16.b: "Нет смысла. Он не более чем немецкая болонка." #NT!

 league_collapse_events.17.t: "Благодарственное письмо от губернатора Чена" #NT!
 league_collapse_events.17.d: "Написав своим самым красноречивым почерком и лучшими чернилами, губернатор Чэнь обратился с письмом, в котором выразил искреннюю благодарность маршалу У Пейфу и президенту Цао, похвалив Кабинет министров и министерства за их преданность делу и укрепление китайской солидарности. Заверив Пекин в своих намерениях сделать защиту китайского суверенитета по-настоящему приоритетной задачей, он объявил о прекращении вмешательства Запада в долину Янцзы, щедро подтвердив веру правительства в объединение Китая и изгнание иностранных империалистических сил, с которыми они сталкиваются.\n\nРеагируя довольно сдержанно в частных кругах, Ву и Цао выразили взаимное удовлетворение по поводу стабилизации ситуации. С появлением популярного губернатора в провинциях Лиги, возможно, новая эра процветания, свободного от империалистического влияния, уже не за горами." #NT!
 league_collapse_events.17.a: "Весьма очарователен, не правда ли?" #NT!

 league_collapse_events.18.t: "Преданный «Дураком»" #NT!
 league_collapse_events.18.d: "В свете попыток центрального правительства уговорить и приветствовать губернатора Чена в лоно Чжили посредством дипломатических маневров на фронте Цао, финансовой помощи банков Ван Кеминя и военной помощи Нефритового маршала, может показаться, что губернатор Чэнь отверг наши попытки вести переговоры. В наших недавних контактах мы становились все более отдаленными и недоступными.\n\nОдин из наших пограничников обнаружил прибывающих в наши земли беженцев с брошюрами печально известного японского военизированного общества «Черный Дракон». Теперь, в вакууме молчания лидеров Аньцина, кажется, что нас ждут новые тревожные впечатления. Губернатор провинции Чжэцзян Чэнь И, печально известный своей связью с «Черными драконами», был замечен в Аньцине другими беженцами. Наши разведчики сильно подозревают, что губернатор пытается предать не только президента Цао, маршала У и императора, но и саму китайскую нацию, устанавливая контакты с разведывательным кругом Японии." #NT!
 league_collapse_events.18.a: "Проклятый японец!" #NT!

 league_collapse_events.19.t: "У отклоняет просьбу Чэнь Тяоюаня" #NT!
 league_collapse_events.19.d: "В другом письме, отправленном маршалом Ву, выясняется, что между ним и губернатором Ченом нарушены какие-либо точки соприкосновения. В письме маршала Ву Чена наказывают за невероятную рискованную игру, на которую он идет с народом Аньхой, и предостерегают его от того, что может означать только смерть Чена через умиротворение Нанкина. Такое развитие событий значительно отодвинуло наши попытки заручиться поддержкой в ​​Пекине, и наше время становится все более ограниченным.\n\nВторая возможность, возможно, открылась в лице скандального генерала Чэнь И, однако, чьи, по слухам, связи с Обществом Черного Дракона могут помочь нам получить аудиенцию у японского посла в Тяньцзине, а через это и у правительства Фэнтяня. [ANQ.GetLeader] полностью осознает, что связь с Фэнтянем может представлять собой риск для целей антиконцессионистского движения, но, поскольку Ву все еще категорически отказывается, у нас мало другого выбора." #NT!
 league_collapse_events.19.a: "Пришло время посетить Фэнтянь." #NT!

 league_collapse_events.20.t: "Чэнь Тяоюань приближается к Чэнь И" #NT!
 league_collapse_events.20.d: "Чэнь И, губернатор могущественной провинции Чжэцзян, все еще входящей в Лигу, обратился к Чэнь Тяоюаню, чтобы обсудить возможное сотрудничество. Убеждая своего коллегу, что истинное будущее Китая зависит от правительства Фэнтянь, а не от Цин, он обещает, что, если Чэнь Тяоюань поклянется Чжан Цзолиню, лидеру Фэнтяня, Чэнь И предложит свою полную поддержку в предстоящей войне.\n\nПоскольку положение Чэнь И в Чжэцзяне действительно обеспечивает ему значительный капитал и силу для поддержки этих обещаний, а У Пэйфу продолжает поддерживать Нанкин, похоже, у нас нет другого выбора, кроме как рискнуть и надеяться на лучшее." #NT!
 league_collapse_events.20.a: "Какой у нас есть выбор?" #NT!

 league_collapse_events.21.t: "Аньцин просит нашей поддержки" #NT!
 league_collapse_events.21.d: "Чэнь Тяоюань, губернатор провинции Аньхой, входящей в Лигу восьми провинций, обратился к нам за поддержкой в ​​предстоящей борьбе против Цин и Лиги. Хотя Чэнь занимает решительную антиконцессионистскую точку зрения и получает большую часть поддержки от этого движения, он также осознает положение, в котором оказался. Либо он будет придерживаться своих идеалов и потеряет свою землю, свою армию и, вероятно, свою жизнь, либо он протянет руку и постучится в дверь единственного другого национального правительства в Китае, независимо от того, с какими иностранными державами они могут сотрудничать. По настоянию губернатора Чжэцзяна Чэнь И установить с нами контакт, похоже, он выбрал последний вариант.\n\nЭто предоставило нам прекрасную возможность обезопасить потенциально мощного союзника в Восточном Китае и нанести ущерб южному флангу центра силы Цин, чем мы должны воспользоваться как можно больше." #NT!
 league_collapse_events.21.a: "Еще одна фигура попала на доску." #NT!

 league_collapse_events.22.t: "Еще одно предложение Чену?" #NT!
 league_collapse_events.22.d: "После нашего отказа в помощи губернатору провинции Аньхой Чэнь Тяоюаню из клики Аньцин начали появляться тревожные сообщения о том, что он связался с Чжан Цзолинем, лидером мошеннического правительства Фэнтянь на северо-востоке. Еще большее беспокойство вызывает то, что он использует японского собеседника для облегчения разговора. Несколько советников Ву предлагают маршалу снова обратиться к Чену с предложением прямой поддержки в его восстании, иначе мы в конечном итоге окажемся с японской болонкой прямо у нашего порога.\n\nОднако, помимо поддержки Чена со стороны Японии, кажется, что невмешательство может привести к широкомасштабным внутренним беспорядкам. Многие как в оппозиционных партиях, так и в самой клике Чжили жаждут возможности расширить наш контроль в хаосе краха, и уже небольшие протесты в пользу антиконцессионной позиции губернатора Чена вспыхнули в городских районах. Молчание может привести к эскалации этих протестов, что еще больше дестабилизирует наш все более нестабильный режим." #NT!
 league_collapse_events.22.a: "Посмотрим, что он скажет." #NT!
 league_collapse_events.22.b: "Это слишком рискованно." #NT!

 league_collapse_events.23.t: "У Пейфу пересматривает свою позицию" #NT!
 league_collapse_events.23.d: "Вероятно, получив известие о наших связях с Шеньяном и Токио, У Пейфу отменил свое первоначальное требование, чтобы мы отступили и сдались Нанкину. Теперь он предлагает свою полную поддержку и хвалит [ANQ.GetLeader] за его решительные действия в трудную для Китая минуту. Чтобы подкрепить свои слова, он также санкционировал передачу золота и оружия в Аньцин, и еще больше будет в пути, если мы примем его предложение и прервем все контакты с правительством Фэнтянь и Токио." #NT!
 league_collapse_events.23.a: "Кто сказал, что он не предаст нас во второй раз?" #NT!
 league_collapse_events.23.b: "Мы благодарны ему за поддержку" #NT!

 league_collapse_events.24.t1: "Чэнь Тяоюань отвергает наше предложение" #NT!
 league_collapse_events.24.t2: "Чэнь Тяоюань пересматривает свою позицию" #NT!
 league_collapse_events.24.d1: "Вероятно, разочарованный нашим предыдущим предательством, губернатор Аньцина отказался удовлетворить его требования и ясно указал, что интересы его народа лежат на стороне правительства Фэнтянь. Чтобы придать силу своим словам, он также передал взятку, которую мы отправили, чтобы привести его в порядок и гарантировать, что у него больше нет никаких обязательств перед Цин." #NT!
 league_collapse_events.24.d2: "Несмотря на все претензии на то, чтобы бросить губернатора Чэня на произвол судьбы, похоже, что быстрое отступление Чжили спасло его от худших интриг Фэнтяня внутри Лиги. Либо под влиянием резких слов Ву, материальных средств и финансирования, либо после почти целого десятилетия предыдущей поддержки и поддержки, губернатор Чэнь предоставил Нефритовому маршалу и королю Баодина зеленый свет для дальнейшего сотрудничества.\n\nНа фоне этого Чжан Чжитань сообщил Лояну, что советников Дунбэя и японских офицеров уже начали вывозить из Аньхоя или задерживать иным образом, подкрепляя Воссоединение Чена со своими истинными хозяевами." #NT!
 league_collapse_events.24.a: "Это прискорбно." #NT!
 league_collapse_events.24.b: "Посмотрим, чем закончится игра." #NT!

 league_collapse_events.25.t: "Предложение от маршала Ци" #NT!
 league_collapse_events.25.d1: "После отказа принять телеграмму губернатора Чена, похоже, амбициозный и оппортунистический Ци Сеюань уловил это опровержение. Почти узурпировав роль Сунь Чуаньфана в Лиге, Ци провозгласил себя новым «Маршалом Лиги восьми провинций», несмотря на то, что Сунь официально не был объявлен общественностью мертвым.\n\nНаправляя цветистое письмо как Цао, так и У, он напрямую просил помощи в подавлении того, что он считал «незначительным восстанием в провинции Аньхой», несмотря на наши разведданные и телеграмму Чена, ясно указывающую на это. иначе. Настаивая на том, что, поскольку мы являемся законной властью в Центральном правительстве, «мы поддерживаем законного Маршала Лиги только надлежащим поведением».\n\nНапыщенный тон заставил Ву и Цао с подозрением относиться к просьбе Ци, учитывая, что какой-то выскочка-военачальник, который уже создал проблемы в 1924 году, будет предъявлять им требования. Еще хуже, что Ци теоретически мог легко подавить Аньхой и восстание Гоминьдана только с помощью Германии. Однако Цао и его советники, в том числе Гао Линвэй, по-прежнему полагают, что сильная Лига и прочные отношения с Германией — это путь вперед к прогрессу." #NT!
 league_collapse_events.25.d2: "После принятия телеграммы губернатора Чена оказалось, что амбициозный и оппортунистический Ци Сеюань не смог узнать об альянсе. Почти узурпировав роль Сунь Чуаньфана в Лиге, Ци провозгласил себя новым «Маршалом Лиги восьми провинций», несмотря на то, что Сунь официально не был объявлен общественностью мертвым.\n\nНаправляя цветистое письмо как Цао, так и У, он напрямую просил помощи в подавлении того, что он считал «незначительным восстанием в провинции Аньхой», несмотря на наши разведданные и телеграмму Чена, ясно указывающую на это. иначе. Настаивая на том, что, поскольку мы являемся законной властью в Центральном правительстве, «мы поддерживаем законного Маршала Лиги только надлежащим поведением».\n\nНапыщенный тон заставил Ву и Цао с подозрением относиться к просьбе Ци, учитывая, что какой-то выскочка-военачальник, который уже создал проблемы в 1924 году, будет предъявлять им требования. Еще хуже, что Ци теоретически мог легко подавить Аньхой и восстание Гоминьдана только с помощью Германии. Однако Цао и его советники, в том числе Гао Линвэй, по-прежнему полагают, что сильная Лига и прочные отношения с Германией — это путь вперед к прогрессу." #NT!
 league_collapse_events.25.a: "Давайте выслушаем его – здесь мы могли бы получить некоторый рычаг воздействия." #NT!
 league_collapse_events.25.b: "Он может справиться с этим самостоятельно." #NT!
 league_collapse_events.25.c: "Жребий уже брошен." #NT!

 league_collapse_events.26.t: "Ву принимает!" #NT!
 league_collapse_events.26.d: "Похоже, на наш призыв к центральному правительству были получены хорошие новости! Приняв нашу, откровенно говоря, скромную просьбу о помощи, У Пэйфу и Цао Кунь косвенно признали нашу власть над Нанкином и остальными провинциями Лиги. С их финансами и вооружением мы, наконец, сможем отважиться захватить еще большую территорию и победить буйных прославленных бандитов, оккупировавших Аньхой. Однако на самом деле это скорее означает, что мы должны на бумаге подчиниться их покровительству, хотя наше правление в провинциях Лиги теперь имеет законную поддержку." #NT!
 league_collapse_events.26.a: "Отличный!" #NT!

 league_collapse_events.27.t: "Ву отказывается!" #NT!
 league_collapse_events.27.d: "Совершенно отвратительно то, что этот жаждущий славы «Нефритовый Маршал» и его вероломный «Президент-подкуп» полностью отклонили нашу просьбу о помощи. Отказываясь удовлетворить нашу потребность в помощи, они прижали нас спиной к стене, и мы снова должны обратиться к нашим немецким благотворителям. Отвернувшись спиной к истинному Южному Чжили, центральное правительство явно имеет планы по созданию более «лояльного» правительства на территории Лиги." #NT!
 league_collapse_events.27.a: "Проклятие!" #NT!

### Section 2 - Black Monday Event Chain and Start of the League War ###
 #Black Monday 2.3.36 February 3rd 1936
 league_collapse_events.50.t: "Черный понедельник достигает Востока" #NT!
 league_collapse_events.50.d: "Полностью окутанная глобальной немецкой экономической державой после интервенции в 1927 году и последующих переговоров между президентом Цао Куном и немецкими эмиссарами, Лига восьми провинций фактически предпочла бы придерживаться курса с центральным правительством в отношении немецкого вопроса. Патриот и антиконцессионист, маршал Лиги Сунь присоединился к немецкому оплоту только после 1928 года. В результате нарастания напряженности между Северным и Южным Чжили «Улыбающийся тигр» достиг своего зенита после создания Лиги восьми провинций в 1928 году и ее дальнейшего расширения в Гуандун, Гуанси и Хунань в следующем году. Игнорируя директивы Пекина о разоружении, Сунь вместо этого увеличил размер своей армии.\n\nЭто, конечно, поставило бы маршала Лиги перед любопытной дилеммой. Будучи категорически против высоких налогов на крестьянство, он был бы загнан в относительный угол. Ци Сеюань и Ли Линьси, которые оба недавно вернулись в Китай, посоветуют маршалу Лиги единственный верный выход из этого затруднительного положения. Взяв значительные кредиты, подкрепленные уступками немцам и дипломатическим миссиям, он получит необходимое финансирование для создания армии, способной конкурировать с армией Нефритового маршала.\n\nПосле усиления притеснения социалистических повстанцев и демократических мыслителей политические маневры в Гуандуне, Гуанси и Хунани приведут к дальнейшему снижению силы Лиги. Так оно и будет, антиконцессионист Сан и дальше бросается в объятия немцев, к его личному неудовольствию.\n\nИ хотя все началось за пределами мира, последствия «Черного понедельника» уже пронзили китайские рынки. Шанхайская биржа резко упала перед закрытием в цифрах, невиданных со времен финансового кризиса 1925 года, и местные учреждения уже мобилизуют все возможное, чтобы смягчить ущерб. К счастью, среднестатистический гражданин Китая и нация в целом вряд ли почувствуют какое-либо немедленное воздействие. Но AOG, уже пошатнувшаяся под обширным ответным бойкотом, сталкивается с тяжелыми финансовыми обстоятельствами.\n\nЕго служащие уже выпустили уведомление о том, что оно, возможно, не сможет платить обычную арендную плату за свои различные концессии в провинциях Лиги, и что окончательный платеж, обещанный за Жеганскую железную дорогу, был «отложен на неопределенный срок». И без того подавленного маршала отправили еще дальше в пропасть тьмы, поскольку без этих запланированных доходов необходимы значительные сокращения бюджета, чтобы остаться на плаву. Ходят даже новости о том, что губернатор Чэнь начал мобилизацию сил, направленных на Нанкин..." #NT!
 league_collapse_events.50.a: "«Чем дольше я иду, тем дальше я тону»." #NT!

 league_collapse_events.51.t: "Разногласия в рядах" #NT!
 league_collapse_events.51.d: "Уже внутри этой миазмы страданий новости распространились довольно быстро. Хотя маршал Лиги не предпринял никаких прямых действий в отношении экономических мер, чтобы предотвратить полную остановку коммерческих предприятий Консорциума Цзяннань, новости о предполагаемых «сокращениях бюджета» и приостановке заработной платы дошли до слуха среди младшего офицерского состава Лиги. Как и ожидалось, их реакция была, мягко говоря, довольно негативной.\n\nДля некоторых это означает конец их порока и расточительности, по крайней мере, на какое-то время, но для многих простых солдат это разница между жизнью и голодом. Точно так же ходят слухи, возможно, распространяемые губернаторами Ци, Чэнем и даже Гоминьданом, о том, что лишение заработной платы будет неравным. Многие из этих слухов намекают на то, что элитные прямые силы Маршала Лиги под командованием Ли Баочжана, Се Хунсюня, Ма Юрэня, Мэн Чжаоюэ и Лю Цзунцзи сохранят большую часть, если не всю, свою зарплату. Точно так же ходят слухи, что обученные в Германии дивизии Ци Сеюаня освобождены от таких трудностей.\n\nВорчание офицеров усугубляется небольшой, но громкой кликой офицеров-националистов во главе с молодой гвардией Тан Эньбо, Го Чаня, Линь Вэя и Гэ Цзинъэня. Они сплачиваются и утверждают, что Лиге вообще не следовало становиться настолько зависимой от немецких «подачек», хотя их риторике противостоят такие люди, как губернатор Ци и, в меньшей степени, Ли Рентао и Сюй Пейгэнь. Втайне, конечно, маршал Лиги согласен с их мнением, но слишком многое было поставлено на ставку на немцев, чтобы сжечь мост сейчас.\n\nЧто еще хуже, наши всегда верные противники в Национальной революционной армии и Лиге десяти Гоминьдана продолжают прятаться в тени, распространяя пропаганду и осуждая «империалистическое сотрудничество». Из этих конкретных действий пока ничего не вышло, но то, что когда-то было обычными беспорядками, теперь угрожает подорвать самые основы Лиги." #NT!
 league_collapse_events.51.a: "«Вокруг меня горит...»" #NT!

 league_collapse_events.52.t: "Чудовищное преступление" #NT!
 league_collapse_events.52.d: "Юность Сунь Чуаньфана была полна трудностей. Поскольку его отец умер вскоре после рождения Сунь, его семья подверглась насилию со стороны его тети, в результате чего Сунь, его мать и три его сестры бежали в Цзинань в поисках какой-то формы скудного счастья. Сунь и его мать попадут под опеку Ван Инкая. При этом Улыбающийся Тигр первым обнажит свои клыки, пополнив ряды Военной академии Баодин. На протяжении всей своей карьеры Сунь встречал и подружился с множеством людей всех форм и цветов, от Янь Сишань до Дэн Яньда.\n\nЛюбимый многими, Улыбающийся Тигр всё равно оставался тигром. Никто не знал этого лучше, чем подчиненный Чжан Цзунчана Ши Цунбинь. Вступив в конфликт с Фэнтянем в 1925 году, подчиненный Сунь Се Хунсюнь уничтожил силы Ши. Пожилой человек, Ши приветствовал Сунь Чуаньфана, когда Улыбающийся Тигр подошел к нему навстречу. Несмотря на это, Сунь постановил, что Ли Баочжан, «генерал гильотины», должен немедленно казнить Ши, чтобы предотвратить возмездие. Жестоко обезглавленный и брошенный гнить, Сан далеко ушел от этого события десятилетней давности. Но некоторые этого не сделали.\n\nНаблюдая за тренировкой возле Дворца маршала, прохладный воздух Нанкина омывал Маршала Лиги. Успокаивает стресс и боль от недавних событий, хотя бы на мгновение. Лениво вспоминая, глядя на небо, Сунь не мог не вернуться к месту, которое он так глубоко держал.\n\nКогда он был подчиненным Ван Чжаньюаня, Сунь совершенно влюбился в служанку жены Вана, Хэ Цзесянь. Сун держал Его глубоко в своем сердце, и так уж сложилась судьба, что они обручились только год спустя.\n\nИ все же судьба — штука непостоянная. Цзесянь заразилась туберкулезом, когда работала горничной, поэтому радостная жизнь мадам Сунь закончилась всего через год после начала. Навсегда преданный своей единственной настоящей любви, Сунь лично похоронил Хэ и навсегда спрятал свой любимый белый носовой платок в кармане его рубашки. Открытая демонстрация того, что он всегда был со своей любимой женой.\n\nВозвращается в настоящее, хотя бы на мгновение. Острая боль пронзила его тело. Крик, беда. Обернувшись, он едва мог видеть служанку и ее пистолет Люгер. Его телохранители поспешили одолеть и заключить женщину в тюрьму, но тело Сан упало. Носовой платок Хэ Цзесаня. Последнее воспоминание о ней, о ее потрясающей чистоте, о ее сияющей белизне. Окрашенный волнами багрового цвета Тигра." #NT!
 league_collapse_events.52.a: "«Я присоединяюсь к тебе, Цзесянь»." #NT!

 league_collapse_events.53.t: "Телеграмма из Нанкина" #NT!
 league_collapse_events.53.d: "Поспешив домой посреди ночи, У Пейфу был разбужен своим секретарем Бай Цзяньу и начальником штаба Чжан Цихуаном, пробуждая Нефритового маршала от беспокойного сна. Проводив Ву к его столу, дуэт передал маршалу отчет о экстренной телеграмме только для его глаз. На вопрос, видел ли президент Цао ту же телеграмму, он узнал, что Ван Юйцзя и Лю Мэнгэн уже объясняют ситуацию президенту. Просматривая лист конфиденциальной телеграммы, с трепетом на лице, он гласил:\n\n'Сунь Чуаньфан застрелен в 8:55 утра. СТОП\nПреступник неизвестен СТОП\nВ коме СТОП\nМаловероятно, что он проснётся СТОП\nБеспорядки повсеместны СТОП\nБегут с золотом и документами СТОП'\n\nДва часа спустя Лоян стал центром бешеной активности. Документы, касающиеся более непристойных отношений Сунь с Пекином, сжигаются в печах, в то время как группы членов Цзиньбао и Лоян Чжили спорят о связях Улыбающегося Тигра. Совершив беспрецедентный шаг, Цао Кунь пригласил нескольких маньчжурских дворян, в частности брата императора Пуцзе, присутствовать при составлении какого-то единого заявления в ответ на убийство, возможно, желая объединиться в эти тревожные времена.\n\nПомимо всего этого, Нефритовый маршал не может не испытывать сожаления по поводу судьбы, постигшей Сунь Чуаньфана. Его протеже, его первоначальный преемник, несмотря на всю их общую идеологию и память, должен быть запятнан таким образом?" #NT!
 league_collapse_events.53.a: "«Прощай, Солнце...»" #NT!

 league_collapse_events.54.t: "Распространение неповиновения" #NT!
 league_collapse_events.54.d: "В отсутствие Маршала Лиги телеграммы начали заваливаться все утро, сопровождаемые звонками телефонов по всему дворцу Маршала Лиги, вместе они объединяются, чтобы нарисовать быстро ухудшающуюся ситуацию на большей части Лиги. При предполагаемых сокращениях или отсутствии обещаний заработной платы солдаты в Сюйчжоу, Наньчане, Цюаньчжоу и ряде других городов либо отказываются действовать, либо напрямую присоединяются к распространяющемуся насилию и грабежам, в то время как полиция и гарнизоны в Ханчжоу и Уси объявили забастовку.\n\nБеспорядки там и в других местах постепенно выходят из-под всякого подобия контроля, что усугубляется недавней недееспособностью Сунь Чуаньфана. Более того, губернатор Чэнь И снова начал отказываться поддерживать контакты с Нанкином, а сотрудники нашей разведки сообщают об увеличении контактов с губернатором Чэнь Тяоюанем. Солдаты, охранявшие северные районы Цзянсу, были отозваны в Нанкин, а губернаторы Дэн и Чжоу сообщили о дезертирстве частей в Гоминьдан.\n\nТревожно, что телеграфные линии к югу от провинции Фуцзянь, похоже, были перерезаны, в результате чего Лига осталась в полном неведении относительно вероятного ухудшения ситуации в Гуанчжоу и Гуанси. Губернатор провинции Хунань Чжао выразил явно неохотные соболезнования в связи с катастрофой, постигшей Сунь Чуаньфана, выразив соболезнования, но отказавшись сказать что-либо близкое к официальной поддержке в эти тревожные времена. Для самого Нанкина? Сейчас страна практически находится в агонии жестокой революции. Ближайшее окружение маршала Лиги пытается создать своего рода регентский совет, но у губернатора Ци могут быть другие идеи..." #NT!
 league_collapse_events.54.a: "Маршал Сан должен скоро проснуться..." #NT!

 league_collapse_events.55.t: "Имперский флот бежит на север!" #NT!
 league_collapse_events.55.d: "Поскольку Шаньдун был захвачен враждебными силами, неистовствующими и разрушающими порт Яньтай, а Циндао находился под официальным де-факто контролем колониального проекта Германии, на территории, непосредственно контролируемой центральным правительством, конкретно не хватает каких-либо подходящих портов для содержания Бэйянского флота. В такой печальной ситуации Бэйянский флот был переброшен в Наньтун, якобы входящий в Лигу, после окончания Войн Чжифэн.\n\nВ условиях беспорядков, гражданских беспорядков и всеобщего хаоса, охватившего город из-за распада Лиги, военно-морскому министру адмиралу Са Чжэньбину было приказано мобилизовать флот для бегства из города, направляясь на север к небольшим портам, окружающим город Тяньцзинь. Падение доков Нанкина привело к тому, что военно-морской флот остался без дома, не имея судостроительных мощностей, чтобы делать что-то большее, чем поддерживать нынешний флот.\n\nВыступая перед Нефритовым маршалом, Са Чжэньбин и Ян Шужуан настаивали на том, что адмиралтейству необходимы порты Шаньдун или, в противном случае, порты Чжэцзян или Фуцзянь, если оно хочет защитить прибрежные воды Китая." #NT!
 league_collapse_events.55.a: "«С этим придется подождать, джентльмены»." #NT!

 league_collapse_events.56.t: "Беспорядки дошли до Маршальского дворца" #NT!
 league_collapse_events.56.d: "Поскольку подчиненные Маршала Лиги изо всех сил пытаются создать какой-либо фронт или власть, напоминающую набор навыков Сунь Чуаньфана, многие местные и провинциальные власти, умоляющие Нанкин об ответе или приказе, остались на плаву и изолированы. Полиция Нанкина, со своей стороны, не смогла сдержать многие беспорядки, распространившиеся по столице, поскольку радикальные офицеры переходят на сторону губернатора Чэнь Тяоюаня или сидят без дела, а зрители присоединяются к хаосу; грабежи и поджоги домов, предприятий, а теперь и правительственных учреждений.\n\nПоспешное прибытие элитных обученных немцами воинских частей под командованием губернатора Ци Сеюаня, который внимательно следил за ситуацией, похоже, спасло Маршальский дворец от превращения в мученика революционеров. Но рев пламени и растущая толпа слышны даже в камере, где Сунь Чуаньфан лежит в глубокой коме. Получая изо дня в день визиты своих ближайших сотрудников, многие были доведены до слез положением вещей, умоляя бессознательное тело Сана проснуться и исправить ситуацию, как он всегда делает.\n\nОднако те, кто менее лоялен, те, кто занимается этим просто ради собственной выгоды, уже начали свой великий побег. Подобно крысам, бегущим с тонущего корабля, недобросовестные чиновники спешат прочь по закоулкам и переулкам с оружием, отягощенным серебряными монетами, бумагами и компрометирующими правительственными секретами." #NT!
 league_collapse_events.56.a: "Что нам делать?" #NT!

 league_collapse_events.57.t: "Иллюзия цинской гегемонии разбивается" #NT!
 league_collapse_events.57.d1: "Фасад китайского единства, просуществовавший почти десять лет, начал рушиться.\n\nРост волнений в Лиге восьми провинций, экономический шок «Черного понедельника», предвещающий сокращение расходов Германии, и неспособность" #NT!
 league_collapse_events.57.d2: "$league_collapse_events.57.d1$ национального правительства, чтобы дать решительный ответ на любой вопрос, прояснил одну вещь; Монополия Пекина на власть разрушена" #NT!
 league_collapse_events.57.d_qie: "$league_collapse_events.57.d1$ нашего правительства по эффективному преодолению кризиса ясно дал понять одну вещь: наша монополия на власть нарушена. Теперь мы должны попытаться справиться с хаосом." #NT!
 league_collapse_events.57.d_fng: "$league_collapse_events.57.d2$.\n\nВозможность нанести удар на юг еще никогда не представлялась столь очевидной, но готов ли Северо-Восток?" #NT!
 league_collapse_events.57.d_anq: "$league_collapse_events.57.d2$.\n\nВозможно, мы сможем превратить эту возможность, которая началась с игры Пекин против Нанкина, в нечто гораздо большее. Пришло время бросить кости." #NT!
 league_collapse_events.57.d_shd: "$league_collapse_events.57.d2$.\n\nВозможно, мы сможем выкупить китайский народ из нашей скромной провинции Шаньдун? Армии и рекруты на Юге, должно быть, устали от своих непостоянных лидеров, и простые китайцы взывают о наших гарантиях." #NT!
 league_collapse_events.57.d_szc: "$league_collapse_events.57.d2$.\n\nСтарый порядок, на котором мы построили наш союз сычуаньских военачальников, разрушен, и будущее действительно неопределенно." #NT!
 league_collapse_events.57.d_sik: "$league_collapse_events.57.d2$.\n\nОднако, пока наше правление надежно, это не имеет большого значения." #NT!
 league_collapse_events.57.d_tib: "$league_collapse_events.57.d2$.\n\nБудущее неопределенно, но время найти нашего Далай-ламу быстро приближается." #NT!
 league_collapse_events.57.d_mon: "$league_collapse_events.57.d2$.\n\nВозможно, пришло время еще раз взглянуть на так называемую «внутреннюю Монголию», где многие монголы все еще живут во власти своих ханьских хозяев." #NT!
 league_collapse_events.57.d_jap: "$league_collapse_events.57.d2$.\n\nСитуация на континенте решительно изменилась в пользу Империи." #NT!
 league_collapse_events.57.d: "$league_collapse_events.57.d2$, и теперь будущее – за мужской игрой." #NT!
 league_collapse_events.57.a: "Это не пойдет на пользу..." #NT!
 league_collapse_events.57.b: "Китай окончательно разделен." #NT!
 league_collapse_events.57.c: "Конец эпохи." #NT!

 league_collapse_events.58.t: "Восстания в провинции Фуцзянь!" #NT!
 league_collapse_events.58.d: "Продолжающееся существование так называемого восстания «МинГан», долгое время являвшегося камнем преткновения для хорошего поведения Лиги, снова и снова доказывало свою раздражающую устойчивость. Первоначально зародившееся в результате изгнания некоего Тан Шэнчжи из Северной экспедиции, когда его 8-я армия присоединилась к остаткам 4-й армии Национальной революционной армии, восстание Минганя превратилось в то, что было практически подлинной властью в некоторых регионах после неудавшегося Шанхайского восстания 1932 года.\n\nНаблюдая, как знаменитый «Красный Наполеон» Дэн Яньда и мадам Сун Цинлин присоединяются к своим братьям в провинции Фуцзянь. и Цзянси. Поддерживая наши кампании по окружению, рекомендованные немцами и осуществленные губернаторами Чжоу Иньреном и Дэн Жучжо, НРА зарекомендовала себя как надежный противник.\n\nВо дворец поступают сообщения о том, что те же гоминьдановские повстанцы, сражающиеся за мечту своего любимого доктора Сунь Ятсена, успешно начали массовое всеобщее восстание и восстание в провинции Фуцзянь. Выйдя из своих гор и укрытий, им удалось захватить ряд деревень в глубине провинции. Зона повстанцев Минган всегда представляла собой известную опасность, но она была изолирована и очень одинока.\n\nОднако, поскольку хаос сейчас охватил Лигу, есть все шансы, что они проложат путь к побережью, открыв путь для помощи от своих союзников-синдикалистов и возвращения Ван Чжаомина из парижского изгнания. В настоящее время известно, что губернатор Чжоу имеет несколько своих дивизий в Цюаньчжоу и его окрестностях, но этого вряд ли будет достаточно, чтобы остановить революционную волну. Одновременно войска, верные Гоминьдану, поднялись вдоль границы с Шанхайской концессией, угрожая сердцу нашей державы. Хотя они, скорее всего, будут уничтожены силами губернатора Ци." #NT!
 league_collapse_events.58.a: "Синдикалистская мразь!" #NT!
 league_collapse_events.58.b: "(Играйте за Гоминьдан)" #NT!

 league_collapse_events.59.t: "Губернатор Ци берет на себя управление" #NT!
 league_collapse_events.59.d: "По-прежнему не имея какой-либо легитимной центральной власти, Лига оказалась в смертельной спирали своих разрозненных частей. Оставшись на произвол судьбы без центрального руководства из Нанкина, яростно сообщают о дикой ситуации в Фуцзянь и Цзянси, о накоплении еще большего количества солдат в провинции Аньхой, о невыносимой ситуации в Шаньдуне и обо всех других вопросах хаоса. Косвенно действуя в роли маршала Лиги после комы Суня, губернатор провинции Цзянсу Ци приложил все усилия, чтобы остановить быстрое кровотечение из Лиги. Не имея возможности командовать другими губернаторами из-за отсутствия полномочий, его действия были притуплены.\n\nВстреча за закрытыми дверями в относительной безопасности Маршальского дворца, губернатор Ци собрал военных в лице Ма Юрэня, Се Хунсюня, Чжэн Цзюняня, Мэн Чжаоюэ, Ван Хаоцзи, Чжоу Фэнци, Ли Баочжана и Лю Цзунцзи. Недалеко от них идут интеллектуалы и бюрократы Тан Эрхэ, Ли Линьси, Дин Вэньцзян, Вэй Даофэн, Ян Вэнькай и, конечно же, правая рука Ци Тянь Вэньбин. Собрав всех наиболее важных и доступных деятелей Лиги в одном зале заседаний, том самом, в котором все губернаторы встречались не так давно, немногие имели какие-либо претензии к тому, что собирался предложить губернатор Ци.\n\nПодготовив официальную петицию к собравшимся, вместо какой-либо формальной преемственности, чтобы объявить Ци исполняющим обязанности маршала Лиги, губернатор Цзянсу наконец показал свою руку. В комнате сразу же воцарился хаос: генералы Се Хунсюнь, Ли Баочжан и Мэн Чжаоюэ обвинили Ци в организации покушения на Сунь. Аналогичным образом Ян Вэнькай указала на то, что преступница имела при себе немецкий пистолет. Повернув голову к Тиану, подчиненный Ци кивнул и на короткое время исчез из комнаты. По его быстрому возвращению его окружала группа китайских солдат с немецким вооружением и снаряжением.\n\nПокинув собрание, чтобы объявить себя исполняющим обязанности маршала Лиги, Ци Сеюань заявил о своих намерениях восстановить порядок в распавшейся Лиге. Его войска уже начали устанавливать контроль над арсеналом Нанкина, военным штабом и основными транспортными магистралями, транслируя его восхождение по мегафону и очищая улицы анфиладным ружейным огнем. Города на большей части Нижней Янцзы уже начали выступать за Ци, и губернаторы Дэн и Чжоу поддержали это. Хотя губернатор Чэнь И колебался в заявлении о поддержке, а Шэнь Хунъин, Лу Юйгуан и Чжао Хэнти отказались признать эту новость." #NT!
 league_collapse_events.59.a: "Переворот во всем, кроме названия?" #NT!

 league_collapse_events.60.t: "Нерешительность и бездействие" #NT!
 league_collapse_events.60.d: "Из-за решения центрального правительства не поддерживать ни Лигу, ни антиконцессионистское восстание в войне Лиги, Хаос, охвативший народные массы страны в последние недели, перерос почти в анархию. После первоначального молчания как маршала, так и президента, в городских центрах начали возникать небольшие протесты, отвергаемые как журналистами, так и интеллектуалами. Требуя антиконцессионистского вмешательства, оглушительное молчание будет продолжаться. В результате несколько собраний переросли в пылающие уличные протесты, ад народного гнева, направленный на кровь, пролитую на Янцзы.\n\nСобираясь за закрытыми дверями в течение многих дней, было решено, что необходим какой-то ответ. Сидя за своим столом с микрофоном, направленным ему в лицо, и сотни тысяч людей по всей стране настраиваются, президент Цао Кунь, очевидно, неохотно объявляет, что правительство не соизволит предоставить какую-либо поддержку ни Ци Сеюаню, ни Чэнь Тяоюаню, ссылаясь на недовольство обоими мужчинами и их поведением.\n\nПо мере того, как протесты превращаются в ад несогласия, Пекин и другие крупные города охвачены беспорядками. совершенно парализован. Поскольку и немцы, и народ настроены против правительства, Ассамблею охватило чувство смятения. Почти полное осуждение нашего правительства уже однажды привело к нашему падению, и вполне возможно, что это произойдет снова. Учитывая, что для обеспечения порядка была отправлена ​​военная полиция под командованием Ван Юйцзя, возможно, осталось всего лишь мгновение, прежде чем ситуация еще больше ухудшится." #NT!
 league_collapse_events.60.a: "И если подумать, мы думали, что усвоили урок..." #NT!

 league_collapse_events.61.t: "Момент истины" #NT!
 league_collapse_events.61.d: "Поскольку напряженность между губернатором Чэнь Тяоюанем и маршалом Ци Сеюанем достигла критической точки, серия регулярных стычек переросла в открытые бои вдоль реки Янцзы на окраине Нанкина. Поскольку первоначальная битва привела к победе армии Лиги, губернатор Чэнь начал полномасштабное наступление, приуроченное к восстаниям в зоне восстания Мингань и перспективе интервенции из провинции Шаньдун.\n\nВойна Лиги в самом разгаре, и пришло время Нефритовому маршалу и президенту Цао выполнить обязательства, данные маршалу Лиги Ци Сеюаню, и поддержать восстановление порядка и власти в провинциях Лиги." #NT!
 league_collapse_events.61.a: "Мы идем восстанавливать порядок!" #NT!

 league_collapse_events.62.t: "Драма в Ассамблее" #NT!
 league_collapse_events.62.d: "Прислушавшись к просьбе Цао Куня и вмешавшись в войну Лиги от имени самой Лиги, многие в собрании и во внутренних кругах Чжили еще больше осознавали, что такой выбор неизбежно будет непопулярным. С учетом того, что широкие массы населения были подняты антиконцессионистскими интеллектуалами, неповиновением Чэнь Тяоюаня и антиимпериалистическими настроениями, которые оставались постоянным скрытым течением в течение многих лет, тем не менее, было решено, что бурю можно выдержать, чтобы сохранить особые отношения с Германией.\n\nПолучив совершенно незавидную работу по донесению новостей об их интервенции до Ассамблеи, Цао довольно неохотно созвал заседание Ассамблеи, чтобы возглавить вмешательство от имени Лиги. Когда рядом с ним стояли министр Гао Линвэй и министр Ван Кэминь, Цао начал: «Мои дорогие друзья, я собрал всех вас здесь сегодня, чтобы сообщить вам весьма важную новость, касающуюся решения правительства в отношении беспорядков на юге». Собравшиеся оживились, затаив дыхание, он продолжил. \"Маршал У, его командный состав и кабинет министров решили поддержать маршала Лиги Ци Сеюаня в его борьбе против мятежной провинции Аньхой и ее предательского губернатора Чэнь Тяоюаня. Учитывая, что наше ограниченное вмешательство продвигается на юг, пока мы говорим, ожидается быстрая, решительная и полная победа-\".\n\nЦао прекратил свою речь, когда члены Партии молодого Китая встали и молча начали маршировать из зала. Вскоре за ними последовали члены Ассоциации реформ Китайской империи, «Независимые» и даже некоторые члены партии Цзунше. С мрачным видом Цао смотрел на немногих оставшихся членов Ассоциации Гармонии и Лиги Процветания, оставшихся в Ассамблее. Ошеломленный, Цао отложил бумаги." #NT!
 league_collapse_events.62.a: "Оглушительная тяжесть давила на его сознание." #NT!

 league_collapse_events.63.t: "Дары Лиги процветания" #NT!
 league_collapse_events.63.d: "Выходя из Зала Ассамблеи, охваченный смесью ярости и ужаса, президент выкрикивал приказы своим помощникам и министру Гао, явно стремясь найти методы, с помощью которых он мог бы сделать выговор протестующим политикам Ассамблеи. Тем не менее, когда он выходил из зала, его окружали репортеры и члены Лиги процветания.\n\nСпеша поздравить президента, они представили различные предметы роскоши из немецкого экономического мира. Рейнское вино, кубинские сигары и другие иностранные деликатесы были предложены Цао и его депутатам. Тем не менее, встречая отстраненные взгляды и даже презрение, немногие участвуют в их «процветающей» доброй воле.\n\nВ отличие от обычных маньчжурских аристократов с суровыми лицами, которые обычно приветствуют президента за пределами здания, немецкие бюрократы и представители клептократии Южной Чжили приветствовали президента с распростертыми объятиями, одетыми в новейшие берлинские наряды и предлагая еще более непомерные подарки законодателям Ассоциации гармонии, таким как Ван Чэнбинь и фракция Цао. внутри вооруженных сил быстро увезли бы президента прочь, позволив ему избежать затруднительного положения." #NT!
 league_collapse_events.63.a: "Презрение со стороны нации, презрение со стороны народа." #NT!

 league_collapse_events.64.t: "Момент истины" #NT!
 league_collapse_events.64.d: "Поскольку напряженность между губернатором Чэнь Тяоюанем и маршалом Ци Сеюанем достигла критической точки, серия регулярных стычек переросла в открытые бои вдоль реки Янцзы на окраине Нанкина. Поскольку первоначальная битва привела к победе Армии Лиги, губернатор Чен начал полномасштабное наступление, приуроченное к восстаниям в зоне восстания Мингань и перспективе интервенции из провинции Шаньдун.\n\nВойна Лиги в самом разгаре, и пришло время Нефритовому маршалу и президенту Цао выполнить обязательства, данные губернатору Чэнь Тяоюаню, и поддержать ограниченное вмешательство в поддержку антиконцессионистского движения." #NT!
 league_collapse_events.64.a: "Наши войска маршируют на юг, чтобы защитить Китай!" #NT!

 league_collapse_events.65.t: "Народная поддержка президента и маршала" #NT!
 league_collapse_events.65.d: "После решения президента Цао и маршала У атаковать Лигу восьми провинций, Цао сам решил выступить публично и заявить о поведении и намерениях правительства, лежащих в основе этого решения. Хотя сам Цао возражает против столь решительного сжигания мостов с Германией, он, тем не менее, стойко выполняет свой президентский долг.\n\nВ трансляции с балкона Запретного города на собравшуюся внизу толпу Цао был отложен императором, братом императора Пуцзе и самим У Пэйфу. Среди многих других выступлений, прозвучавших в том же месте, эта конкретная речь была передана по радио — впервые в Китае.\n\nДержаясь с закалённой энергией, президент Цао призвал граждан Китая сплотиться вместе. «Целый век унижений мы страдали и сокрушались под иностранным гнетом! Слишком долго мы были домашними собачками по капризам британцев, японцев, французов и немцев! Но не более того! Сегодня мы стоим непокорно, сбрасывая оковы империалистов, сделав первый шаг к истинной независимости! Мы больше не будем в железной хватке кайзера! Мы больше не будем терпеть унижения, и китайцы больше не будут второсортными в своих домах! Сказав это раз и навсегда, Китай снова свободен!»\n\nВстречавшись громкими аплодисментами, аплодисментами и звуками горнов, фрагменты речи с лицами Цао и Ву были разклеены по газетам, брошюрам и журналам по всей стране. Точно так же интеллектуальные общества и книжные клубы выразили символическую поддержку нашему режиму." #NT!
 league_collapse_events.65.a: "Свободный Китай, свободный от империализма!" #NT!

 league_collapse_events.66.t: "Пекинская комиссия уходит из Пекина!" #NT!
 league_collapse_events.66.d: "Сразу после зажигательной речи президента Цао на улицах возле посольства Германии и здания Пекинской комиссии начали подниматься клубы дыма. У ворот образовалась огромная толпа, скандирующая антиконцессионные лозунги и сжигающая немецкую одежду, мебель и даже наспех изготовленное изображение кайзера.\n\nПоскольку военная полиция быстро прибыла, чтобы предотвратить превращение сцены в масштабный дипломатический спор, немецкие бюрократы в Пекинской комиссии своими голосами в Лиге процветания объявили Ассамблее о немедленном выходе Комиссии, и довольно неудачные роспуск большинства их программ поддержки правительства.\n\nНанеся серьезный удар по нашим отношениям с Германией и вызвав большую обеспокоенность президента Цао и министра Гао Линвэя, он нанес еще более серьезную атаку на Лигу процветания внутри Ассамблеи. Поскольку политическая группировка практически потеряла своего основного покровителя и источник финансирования, значительная часть членов ее законодательного собрания перешла в клику политологов, испытывая возрождение независимых либеральных членов среднего класса и их поддержки." #NT!
 league_collapse_events.66.a: "Небольшая цена за национальное спасение." #NT!

 league_collapse_events.67.t: "[QIE.GetNameDefCap] обещает свою поддержку" #NT!
 league_collapse_events.67.d: "Лига слаба; Тлеющие руины показывают, что немецкие жирные коты когда-то обедали с нанкинскими чиновниками, армии которых дезорганизованы и ссорятся между собой. Наши войска не только обладают мужеством и преданностью делу, чтобы успешно довести наши цели до конца, но мы также имеем поддержку самого великого У Пейфу, а вместе с ним и Императорской армии. Все части были приведены в движение; пришло время избавить Лигу от страданий. Как феникс, восстающий из пепла, Чэнь будет следить за возрождением Китая!" #NT!
 league_collapse_events.67.a: "Мобилизуйте войска!" #NT!

 league_collapse_events.68.t: "Встреча с Фэнтянем" #NT!
 league_collapse_events.68.d: "Работая в тенистых подсобках и через сеть Общества Черного Дракона, [ANQ.GetLeader] смог установить контакт с [FNG.GetNameDef]. Хотя влияние японцев в делах их правительства грозит вызвать сатиру на антиконцессионистские обещания Чена, он полностью осознает, что у него нет выбора в этом вопросе и что их просьба признать Фэнтянь единственным китайским правительством более чем разумна в обмен на крайне необходимую поддержку.\n\nТеперь, когда в Аньцин прибыла первая партия золота и стрелкового оружия, это показывает, что Фэнтянь готов сдержать свое слово и вместе с военными Нанкина мобилизуясь для вторжения в наши владения, похоже, время ожидания уже полностью прошло. Мы нанесем удар первыми и нанесем сильный удар, гарантируя, что немецкие марионетки на побережье больше не смогут угнетать Китай!" #NT!
 league_collapse_events.68.a: "Объявите войну Лиге!" #NT!

 league_collapse_events.69.t: "Чен встал на сторону Фэнтяня" #NT!
 league_collapse_events.69.d: "Крах Лиги восьми провинций Сунь Чуаньфана вызвал большой беспорядок в Китае, и, поскольку регион быстро скатывается к тотальной войне, похоже, что [ANQ.GetLeader], глава [ANQ.GetNameDef], был вынужден искать помощи за пределами Пекина. Его решение признать Фэнтянь законным правительством Китая означает серьезный удар по немцам и их цинским болонкам. Объединившись с [FNG.GetLeader], [ANQ.GetLeader] стал нашим союзником, однако антиконцессионистская позиция Чена является серьезным препятствием для сотрудничества и ставит под сомнение его полезность в качестве представителя японских интересов. Тем не менее, дискретная поддержка Чена ослабит наших врагов и усилит наших союзников – а это достойная цель." #NT!
 league_collapse_events.69.a: "Будем смотреть с интересом" #NT!

### Section 3 - League War Defections AND beginnings and secessions of HNN and GXC ###

 #league_collapse_events.100 is a hidden event

 league_collapse_events.101.t: "Чжэцзян поддерживает Цзянсу" #NT!
 league_collapse_events.101.d: "Хотя Чэнь И и Лу Сянтин никогда не сходились во взглядах с Ци Сеюанем, кажется, что их еще меньше забавляет восстание Чэнь Тяоюаня на западе. Главнокомандующий армией Чжэцзян Лу Сянтин был ошеломлен, узнав о смерти своего старого друга, а губернатор Чэнь И осудил это как полное предательство в провинции Аньхой. В своем общем горе два правителя провинции Чжэцзян мобилизовали свои силы для подготовки как к кампании Чэнь Тяоюаня за доминирование Лиги, так и к надвигающейся угрозе с юга.\n\nЧэнь И, возможно, когда-то симпатизировал Гоминьдану во время его Северной экспедиции десятилетием ранее, но возбуждающий толпу призрак большевизма сведет на нет всю работу, которую он достиг за десятилетие правления Чжили. гегемония. Будучи давним сторонником экономического этатизма, государственная социалистическая доктрина Чэнь И стала основой восточно-китайской модели развития, черпая вдохновение из немецкой военной экономики, русского свободнического экономического планирования и японского этатизма.\n\nТак называемый праведный антиконцессионистский крестовый поход Чэнь И только принесет нестабильность в некогда процветающий регион Китая, и Гоминьдан сожжет его утопическую модель дотла на службе Потворство рабочим и крестьянам. Выступая перед своими людьми, Чэнь И заявил, что армия Чжэцзян выступает за процветание простых людей и сохранение надлежащего китайского управления перед лицом аньхойских повстанцев и коммунистических бандитов. Маршал Ци, возможно, не разделяет утопического видения Чэня будущего Китая, но он не может не чувствовать расположения чжэцзянского федералиста." #NT!
 league_collapse_events.101.a: "Чэнь И и Лу Сянтин знают, что хорошо, а что плохо!" #NT!

 league_collapse_events.104.t: "«Дурак» объявляет войну" #NT!
 league_collapse_events.104.d: "Восхождение губернатора Ци на должность исполняющего обязанности маршала Лиги, естественно, не было хорошо встречено большинством. Поскольку Пекин воздерживается от комментариев, поскольку он изо всех сил пытается решить свои собственные проблемы, различные провинции варьируются от отказа признать власть Ци до прямого объявления его предателем и диктатором. Некоторые журналы и газеты начали связывать преемственность Ци на посту Маршала Лиги и аналогичную ему непосредственную преемственность губернатора Ли Чуня в 1920-х годах, после «самоубийства» Ли.\n\nТем не менее, Ци, не теряя времени, размахивал своей саблей, требуя верности от тех губернаторов, которые формально не предоставили ее. Угрожая быстрым возмездием всем, кого он считает предателями, он потребовал признания от Хунани, Гуандуна и Гуанси, но безрезультатно. Точно так же он напрямую угрожал Чэнь И идеями вторжения, чтобы обеспечить лояльность внутри провинции Чжэцзян. Однако наиболее насущными являются требования, предъявленные отчужденному губернатору Чэнь Тяоюаню.\n\nПоскольку он милитаризировал границу с Лигой с момента его неофициального отделения, мало кто понимал, в чем заключалась игра Чэня. Ждал ли он удара по Нанкину, когда представилась возможность? Или просто защищает свои владения от волны хаоса. Однако после того, как маршал Лиги Ци потребовал, чтобы Чэнь подчинился властям Лиги, Чэнь ответил собственной забастовкой.\n\nПризвав своих коллег-губернаторов и центральное правительство помочь ему в его деле, Чэнь Тяоюань осудил восхождение маршала Ци как «совершенно незаконное» и «фарс», обвинив его в планировании убийства Суня и его последующем захвате власти заблаговременно. Этот аргумент, которого придерживаются многие новые подчиненные Ци и бывшие начальники, уже оказался убедительным. Ряд молодых офицеров начали дезертировать в его ряды. При этом ряд подразделений армии Аньхой начали переходить границы Цзянси и Цзянсу, намереваясь передать Нанкин под свои владения." #NT!
 league_collapse_events.104.a: "Невыносимая свинья!" #NT!

 league_collapse_events.105.t: "Лянгуан отделяется!" #NT!
 league_collapse_events.105.d: "Зловещим молчанием после недавних событий, Лянгуан долгое время находился в стороне и оторван от более широкой структуры Лиги. Первоначально Южные Чжили и Северные Чжили поссорились из-за введения своих губернаторов в провинции Гуанси и Гуандун. Поскольку клика Старой Гуанси под руководством стареющего Лу Жунтина была неохотно признана Пекином, губернатор провинции Гуандун был свободным для всех Лу, Чэнь Ляньбо и Шэнь Хунъин. Поскольку силы Лиги отступали из провинций Лянгуан после Шанхайского восстания 1932 года, Лига никогда больше не будет распространять какое-либо измеримое влияние в Гуандуне или Гуанси, за исключением номинальной верности и их агента Шэнь Хунъин.\n\nОднако молчание с юга было формально нарушено, поскольку сегодня вечером вторжение Гоминьдана из Гуйчжоу и повстанческой зоны Мингань в Гуанси и Гуандун указало на неформальное выход Гуанси и Гуандуна из Лиги восьми провинций. После вторжения Гоминьдана напряженная ситуация в Лянгуане, существовавшая после кончины Лу Жунтина, переросла в открытый конфликт между Армией Юэ Е Цзюй, кликой Старого Гуанси, Торговым корпусом и Гоминьданом.\n\nПоскольку губернатор Чэнь Тяоюань и его армия Аньхой уже открыто вступили в конфликт с Лигой, такой поворот событий оказался действительно катастрофическим и в большинстве случаев заслуживает ответа. Однако совершенно очевидно, что исполняющий обязанности маршала Лиги Ци в данный момент особенно занят." #NT!
 league_collapse_events.105.a: "Скоро мы погасим их пламя." #NT!

 league_collapse_events.106.t: "Хунань отделяется!" #NT!
 league_collapse_events.106.d: "Хунань, уже самая автономная провинция в Лиге, поджидает в засаде, поскольку события разворачиваются с начала этого года. Губернатор Чжао Хэнти, восстановленный в должности У Пейфу, присоединился к Лиге только для того, чтобы заручиться материальной поддержкой в ​​восстановлении порядка в провинции Хунань. Провинция заметно дистанцировалась в 1932 году после непродолжительной паники, когда силы генерала Е Кайсиня двинулись к границе Цзянси, чтобы не допустить социалистов в Хунань. Благодаря вмешательству Нефритового маршала Хунань обеспечила себе достаточную автономию, чтобы не допускать наших войск в провинцию, и с тех пор наша власть над Хунанью только ослабла.\n\nНо после отделения Лянгуана губернатор Чжао решил, что настало время действовать. Будучи всегда демократом, он представил провинциальному собранию законопроект об официальном выходе из Лиги. Лично поддерживая законопроект, Чжао произнес речь о том, что Хунань больше не может связывать себя с коррупцией Лиги, что она не может обеспечить никакой стабильности и что, если они не порвут с Лигой, пожар войны будет бушевать по всей провинции.\n\nАссамблея, казалось, была тронута этими словами, большинство из них проголосовало за отделение, и губернатор Чжао официально объявил все соглашения, которые Хунань заключил с маршалом Лиги, недействительными и пустота. Хотя мы хотели бы выступить против провинции Хунань за эту непримиримость, армия Чена уже у нашего порога означает, что мы должны терпеть это неповиновение со стороны губернатора Хунани, по крайней мере, на данный момент." #NT!
 league_collapse_events.106.a: "Они могут наслаждаться своей автономией, пока она у них еще есть." #NT!

### Section 4 - Flavour Events About the Collapse ###

 league_collapse_flavour_events.1.t: "Продажа Жеганской железной дороги" #NT!
 league_collapse_flavour_events.1.d: "За последние несколько недель наблюдалась активная экономическая активность в Лиге восьми провинций, южном конгломерате провинций, управляемом нашим номинальным подчиненным Сунь Чуаньфаном. Еще более сильное влияние немецкой экономической поддержки, чем мы, Лига только что завершила строительство главной железной дороги - линии ЖеГань. Хотя он финансировался немцами, он был построен в основном китайскими рабочими, что заставило многих надеяться на более равноправные отношения между немцами и китайцами в Лиге, по крайней мере, в экономических вопросах.\n\nНесколько дней назад AOG неожиданно объявила о своих планах купить и консолидировать ряд восточных железных дорог от имени своей дочерней группы Schantung-Eisenbahn-Gesellschaft, включая этот новый маршрут ЖеГань.\n\nЭтот шаг вызвал возмущение. многие коренные китайцы, проживающие в Лиге, которые рассматривали линию ЧжэГань как потенциальный строительный блок в равных отношениях между европейцами и азиатами. Вспыхнули массовые протесты, разожженные заговорами о мошенничестве и растратах со стороны сторонников Сана." #NT!
 league_collapse_flavour_events.1.a: "Нам нужно следить за этим." #NT!

 league_collapse_flavour_events.2.t: "Широкомасштабные нападения на иностранцев" #NT!
 league_collapse_flavour_events.2.d: "После волнений вокруг Жеганской железной дороги ряд немецких инвесторов и бизнесменов подверглись жестоким нападениям со стороны яростной антииностранной толпы. Что еще хуже, на Юге начались массовые бойкоты немецких товаров, а сегодня утром в Пекин дошли сообщения о взрывах железнодорожных станций в Ханчжоу и других городах Центрально-Китайской железной дороги. Во многих регионах Лиги транспорта остановилось, и гоминьдановские партизаны в Мингане использовали эту возможность для организации все более смелых атак на изолированные гарнизоны Лиги.\n\nПосол Германии в Пекине потребовал ответственности, и хотя Лига в значительной степени независима от нашего контроля, официально она все еще находится под нашей эгидой. Ван Чэнбинь и другие чиновники Чжили уже давно настаивают на усилении контроля над Лигой и призывают Ву использовать этот кризис для усиления влияния на юг. Ву, долгое время искавший предлог для сдерживания Суня, в настоящее время готовит телеграмму, в которой потребует от Суня ответственности и предложит нашу помощь, если она ему понадобится. Разумеется, не сказано о требовании усилить контроль над делами Лиги, если он примет нашу помощь." #NT!
 league_collapse_flavour_events.2.a: "Посмотрим, что скажет Сан..." #NT!

 league_collapse_flavour_events.3.t: "Инцидент в Уху" #NT!
 league_collapse_flavour_events.3.d: "Сегодня утром тревожная информация достигла Лояна и Пекина. Хотя сообщения несколько противоречивы, похоже, что в городе Уху произошла своего рода резня мирных протестующих со стороны Лиги и немецких войск. Некоторые утверждают, что немецкие войска просто расправились с протестующими, в то время как другие утверждают, что группа гоминьдановских радикалов первой атаковала немцев и войска Лиги. Какова бы ни была причина, город погрузился в анархию, и по всей Лиге вспыхнули протесты.\n\nПо иронии судьбы, в то же время, когда мы получили эту информацию, мы получили отчет от Сунь Чуаньфана, в котором утверждалось, что он держит ситуацию под контролем. Некоторые генералы Чжили, такие как Цай Чэнсюнь, настаивают на крупном вмешательстве на юге, если ситуация еще больше ухудшится, но У еще не занял четкую позицию по этому вопросу, опасаясь вмешательства со стороны Чжан Цзолиня.\n\nЕще больше усугубляя наши проблемы, Бай Цзяньу сообщил Нефритовому маршалу, что Ассоциация реформ Китайской империи каким-то образом получила информацию о ситуации, возможно, от контактов в прогрессивных кругах, разбросанных по миссиям. Судя по всему, сегодня они планируют выступить с резкой речью на собрании, критикуя бездействие Чжили. Члены законодательного собрания Ассоциации гармонии Цао Куня быстро сотрудничают с президентом в подготовке ответа, но, похоже, нас застали врасплох." #NT!
 league_collapse_flavour_events.3.a: "«Под контролем» моя задница..." #NT!

 league_collapse_flavour_events.4.t: "Аньхой вырывается на свободу" #NT!
 league_collapse_flavour_events.4.d: "Провинция Аньхой, долгое время раздражавшаяся автократическим правлением Сунь Чуаньфана, на этой неделе, по сути, провозгласила независимость от Лиги. В широко распространенной брошюре губернатор Чэнь Тяоюань заявил, что инцидент в Уху «показывает, что Сунь не может справиться с этим кризисом, и, по сути, освобождает его от любой ответственности в Аньхое».\n\nСяо Яонань, Ван Чэнбинь и Ли Цзичэнь, губернаторы провинций Хубэй, Чжили и Хэнань, в одностороннем порядке начали мобилизацию своих войск против предполагаемого «вторжения Гоминьдана». Чжан Цихуан сообщил Ву, что их истинное намерение, скорее всего, предотвратит наводнение хаоса на Центральные равнины, что потенциально может обострить ситуацию с Ченом, Суном или даже [SHD.GetLeader]. Стремясь лишить их возможности вторжения и развязать еще одну катастрофическую войну, аналогичную конфликту, который предшествовал Второй войне Чжифэн, У объявил сегодня утром «национальное состояние готовности» всему собравшемуся штабу армии Бэйян, он призвал их подготовить свои войска к «любому возможному вооруженному конфликту» и привел гарнизоны на границах Шэньси и Фэнтянь в состояние повышенной боевой готовности. Сбитые с толку войска Чжили в основном выстроились в линию с У, и любая преждевременная атака на юг была фактически прекращена до того, как она началась." #NT!
 league_collapse_flavour_events.4.a: "Будем надеяться, что это удержит их в узде" #NT!

 league_collapse_flavour_events.5.t: "Беженцы бегут от хаоса Лиги" #NT!
 league_collapse_flavour_events.5.d: "В связи с массовыми волнениями, охватившими Лигу восьми провинций, губернатор провинции Хэнань Ли Цзичэнь и Сяо Яонань из провинции Хубэй отправили телеграммы президенту Цао и маршалу У, информируя их обоих о растущем числе беженцев, наводняющих их провинции, с просьбой о любой возможной реакции правительства или помощи. Хотя первоначально все начиналось как капелька, в течение последних нескольких дней поток резко увеличился: целые семьи спасаются от взрывного торнадо насилия и бандитизма.\n\nПосле этого, отправляя туда дополнительные телеграммы, губернаторы указали Кабинету министров, что после отправки своих людей для организации и опроса беженцев окажется, что власть в провинциях Лиги рухнула гораздо больше, чем считалось ранее. Кроме того, они запросили у Пекина дополнительное продовольствие и припасы для размещения всех беженцев. Из-за неэффективности бюрократии, провинциального правительства и нехватки финансов, любая поддержка, которую Кабинет соизволит предоставить, будет иметь огромную цену, даже если это будет гуманный образ действий." #NT!
 league_collapse_flavour_events.5.a: "Ужасные новости. Отправьте припасы." #NT!
 league_collapse_flavour_events.5.b: "С тяжелым сердцем мы должны отказаться." #NT!

 league_collapse_flavour_events.6.t: "Кровавая баня на Янцзы!" #NT!
 league_collapse_flavour_events.6.d: "Несмотря на все усилия, приток беженцев в южные провинции оказался слишком большим, чтобы с ним можно было справиться. Сами губернаторы направили многочисленные телеграммы Кабинету министров и президенту с просьбой о дополнительной помощи, чтобы облегчить работу их перегруженных правительств. После объявления военного положения в провинции Хубэй губернатор Сяо Яонань приказал своим войскам перекрыть все мосты и дороги, ведущие в провинцию с бывшей территории Лиги, запретив въезд всем беженцам. Большое количество из них, иссохших, бездомных и разгневанных, начали собираться у моста через реку Янцзы на окраине Уханя.\n\nНастаивая на въезде в провинцию, это первоначально началось как мирный протест. сплочение за надлежащие ответственные действия правительства. Однако это быстро переросло в полномасштабный бунт, поскольку беженцы начали яростно реагировать на войска Сяо, бросая камни в пограничников. В конце концов группа мужчин, каким-то образом вооружившихся украденным оружием — возможно, из-за неосторожности солдат Сяо — начала стрелять по пограничникам, которые в ответ открыли огонь, сначала предупредительные выстрелы, а затем и по противостоящим боевикам. Те, кто не принимал активного участия в боевых действиях, бежали, давя на других беженцев и оставляя своих друзей и родственников умирать на мосту. Подобные ужасные события повторялись по всей нашей границе с Лигой, Сычуанью и Шаньдуном, поскольку толпы беженцев, спасающихся от гражданской войны и страданий, попадают в еще большее кровопролитие." #NT!
 league_collapse_flavour_events.6.a: "Бедствие! Ужас!" #NT!

 league_collapse_flavour_events.7.t: "Губернаторы Юга прервали контакты" #NT!
 league_collapse_flavour_events.7.d: "Поскольку насилие внутри Лиги растет с каждым днем, губернаторы Юньнани и Гуандуна, [YUN.GetLeader] и [GXC.GetLeader], практически перестали отвечать на официальные запросы правительства о предоставлении информации и отчетов о событиях, происходящих на их территориях. Они уже давно презирают наше правительство, причем оба одинаково настроены против того, что, по их мнению, мелкие военачальники слишком далеко простирают свою власть, а коррумпированные бюрократы слишком глупы, чтобы увидеть свет - даже до такой степени, что губернатор [YUN.GetLeader] не так давно вел войну вместе с Фэнтянем. Хотя это не является неожиданным и на самом деле вполне предсказуемым, учитывая обстоятельства, это, возможно, представляет собой последний гвоздь в гроб их официального поведения по отношению к нашему правительству.\n\nМногие в ближайшем окружении Чжили опасаются, что это предвещает полный крах нашей власти, и новости из провинции Шаньси еще раз подтвердили эти опасения. Предатель Фэн Юйсян, который когда-то сам был неотъемлемым членом клики Чжили, был свергнут из-под своего контроля в Пекине в 1926 году. Сосланный в Шэньси, как только губернаторы Северо-Запада Ма пришли в себя, он официально осудил действия нашего правительства в том, что сейчас на международной арене называют «инцидентом Янцзы» в начале недели. Ссылаясь на недавние события, развернувшиеся между провинциями Хубэй, Хэнань и нашей де-факто землей Шаньдун и Шэньси.\n\nОбъявляя наше правительство совершенно негодным, «не способным управлять Китаем», его номинальный союзник в Тайюане, наш отчужденный губернатор Янь Сишань, осудил насилие как не что иное, как варварство, но не стал осуждать кабинет министров, У или Цао лично. Явно не готов поступиться своим нейтралитетом. Тем не менее, очевидно, что национальный порядок, за который так упорно боролись, серьезно разрушается." #NT!
 league_collapse_flavour_events.7.a: "Огромный ад ярости пожирает нас." #NT!

 #league_collapse_flavour_events.8 uses loc from league_collapse_events.57

 league_collapse_flavour_events.9.t: "Улыбающийся тигр исчезает" #NT!
 league_collapse_flavour_events.9.d: "Тени уже давно нависли над покоями Маршала Лиги. Почти деликатно лежал там Сунь Чуаньфан, когда-то третий по величине человек во всей нации, превратившийся в не что иное, как мертвый груз. По крайней мере, так думают его недоброжелатели. Для других, для тысяч его друзей, их печаль глубока, их горе вечно, а воспоминания проницаемы. Его часто навещали его ближайшие соратники, друзья и, конечно, собственные дети. Плача реками печали, они могли только надеяться на выздоровление Суня, поскольку немецкие врачи круглосуточно работали над реанимацией Тигра, чтобы он снова мог носить свои клыки.\n\nПосреди ночи Нанкина, среди эха перестрелок, взрывов и криков, только одна фигура сидела в комнате с маршалом Лиги Сунь. Играя зажигалкой, одетый в тень комнаты, исполняющий обязанности маршала Лиги Ци Сеюань наблюдал за коматозным телом Сунь Чуаньфана. В его свите, конечно, были немецкие врачи. Он был тем, кто поддерживал робкую хватку Сана в жизни. И он мог так легко погасить его, как пламя своей зажигалки.\n\nЩелкнул зажигалкой, зажег ее и снова закрыл. Ци повторял это движение в течение нескольких часов. Много играл с умом генерала. Сунь и Ци, они были настоящими товарищами. Оба уроженцы Южного Чжили, десять лет воевали на Юго-Востоке. Однако Ци так и не простил Сунь его бездействия в 1925 году. Когда Ци, будучи губернатором Чжэцзяна, больше всего нуждался в помощи, он отчаянно умолял Сунь, губернатора провинции Фуцзянь, о помощи. Вместе они могли бы противостоять натиску Лу Юнсяна и Чжан Цзунчана. И все же Сунь вместо этого наращивал усилия в течение года, вместо того чтобы немедленно контратаковать.\n\nТакое предательство стоило Ци очень дорого! Изо всех сил пытаясь вернуться, он был «милостиво» принят Sun после образования Лиги. Сотворив свое волшебство, Ци сделал за Сун грязную работу, и теперь они здесь. Беспомощное Солнце и всемогущая Ци. Кто мог остановить его? Выдернуть вилку?\n\nНа следующее утро хлынули отчеты. Сунь Чуаньфан в конце концов скончался от ран и скончался посреди ночи. Газеты составили панегирик, вспоминая его в смешанной форме, восхваляя его «подлинность», патриотизм, но порицая его жестокость. Сообщается, что похороны состоятся, как только порядок в Лиге будет восстановлен. Хотя кончина Суна попала на первые полосы утренних заголовков, она была окружена сообщениями о передвижениях войск, студенческих массовых убийствах и полном крахе его империи." #NT!
 league_collapse_flavour_events.9.a: "«В 1000 раз лучше умереть от рук своих соотечественников, чем жить предателем»." #NT!

### Section 5 - League War Events ###
 league_war_events.1.t: "Наши мужчины деградируют!" #NT!
 league_war_events.1.desc: "День за днём наш моральный дух рушится. У нас нет побед, которые мы могли бы показать, никакой славы, которую мы могли бы сохранить, и мы были отправлены в спираль смерти, из которой мы не можем вернуться. Близкие приближенные [THIS.GetLeader] убеждали его бежать в безопасное место, но пока он отказывается и продолжает верить в победу, наши солдаты уже начали таять..." #NT!
 league_war_events.1.a: "Нам просто нужно больше времени!" #NT!

 # league_war_events.2 (hidden event)

 league_war_events.3.t.good: "Мотивированные солдаты" #NT!
 league_war_events.3.t.bad: "Рост дезертирства" #NT!
 league_war_events.3.desc.good: "Часто говорят, что когда человек верит, что победа близка, он будет сражаться сильнее и лучше. Независимо от того, правда это или нет, недавние успехи на поле боя способствовали повышению боевого духа и оказали положительное влияние на военные действия." #NT!
 league_war_events.3.desc.bad: "Череда ошибок, неудач и просто невезения привела к тому, что наши силы не смогли достичь своих целей. Нам не удается добиться значительных успехов, и по мере того, как война затягивается, все больше людей начинают сомневаться в нашей правоте, бросая армию, чтобы вернуться домой или стать бандитами." #NT!
 league_war_events.3.a: "Отличная работа..." #NT!
 league_war_events.3.b: "Ужасный..." #NT!

 league_war_events.4.t.good: "Запасы противника захвачены" #NT!
 league_war_events.4.t.bad: "Потери оборудования" #NT!
 league_war_events.4.desc.good: "Благодаря недавним победам на поле боя, наши люди недавно захватили склад снабжения, полный вражеского оружия! Хотя отступающие силы пытались ничего нам не оставить, скорость нашего продвижения застала их врасплох." #NT!
 league_war_events.4.desc.bad: "После серии поражений на поле боя боевой дух упал до нового минимума. Отступая от наступающих сил противника, группа солдат, отправленная за припасами дальше в сторону столицы, вместо этого дезертировала и забрала припасы с собой. Это представляет собой как нарушение общей дисциплины, так и тяжелую потерю для нашей логистической ситуации." #NT!
 league_war_events.4.a.good: "Отличный!" #NT!
 league_war_events.4.b.bad: "Мошенники, многие из них" #NT!

 league_war_events.5.t.good: "[THIS.GetLeader] похвалили" #NT!
 league_war_events.5.t.bad: "[THIS.GetLeader] атаковано" #NT!
 league_war_events.5.desc.good: "Недавние успехи в войне способствовали укреплению позиций [THIS.GetLeader]. Члены правительства, когда-то критиковавшие его правление, начали замолчать, в то время как голоса поддержки стали громче. Если эта тенденция сохранится, война быстро закончится." #NT!
 league_war_events.5.desc.bad: "Недавние неудачи в войне вызвали растущую критику руководства [THIS.GetLeader]. Голоса против его правления становятся все громче, циркулируют слухи о заговорах с целью его свержения, в то время как обещанные победы, похоже, отодвигаются все дальше и дальше. Если эта тенденция сохранится, [THIS.GetNameDef] может рухнуть из-за внутренних разногласий задолго до того, как вражеская армия возьмет [THIS.Capital.GetCapitalVictoryPointName]." #NT!
 league_war_events.5.a: "Это правильно" #NT!
 league_war_events.5.b: "Они не могут просто заткнуться?" #NT!

 league_war_events.6.t: "Перебежчики из Аньцина" #NT!
 league_war_events.6.desc: "Похоже, что с крахом клики Аньцин ряд военачальников, генералов и мелких деспотов, запятнанных связью Чэнь Тяоюаня с японцами, предпочли сделать ставку на [SHD.GetLeader], а не рисковать возмездием со стороны Гоминьдана. Их навыки, несомненно, пригодятся нам." #NT!
 league_war_events.6.a: "Добро пожаловать!" #NT!

 league_war_events.10.t: "Аньцин побеждает!" #NT!
 league_war_events.10.d: "Отличные новости были отправлены телеграммой президенту Цао и маршалу Ву! Учитывая, что пушки в Нанкине в основном замолчали, похоже, что губернатор, недавно назначенный маршалом Лиги, Чэнь Тяоюань успешно сверг коррумпированное клептократическое правительство Ци Сеюаня, а немецкие инвесторы, бизнесмены и демагоги Южного Чжили либо бежали в дипломатические представительства, немецкую Восточную Азию, либо присоединились к правительствам, более терпимым.\n\nОбеспечение контроля над территориями, которые находятся на периферии Нанкина. В провинции Аньхой наша поддержка в войне, несомненно, сыграла решающую роль в быстрой победе Чена над Лигой. В то время как волнения и боевые действия все еще продолжаются в других частях бывшей территории Лиги, центральное правительство заслужило себе надежного союзника внутри Китая, прочно интегрированного в нашу сферу влияния." #NT!
 league_war_events.10.a: "Фантастическая работа, Чен!" #NT!

 league_war_events.11.t: "Нанкин побеждает!" #NT!
 league_war_events.11.d: "Отличные новости были отправлены телеграммой президенту Цао и маршалу Ву! Поскольку орудия в Нанкине практически замолчали, создается впечатление, что маршал Лиги Ци Сеюань успешно сверг нестабильный, нелегитимный и хаотичный режим Чэнь Тяоюаня, а ярые антиконцессионисты, радикалы и интеллектуалы правительства Чэня бежали в соседние провинции или даже в Гоминьдан.\n\nОбеспечение контроля над территориями, которые находятся на периферии провинции Нанкин, наша поддержка в войне, несомненно, сыграла решающую роль в быстрой победе Ци над мятежными выскочками. В то время как беспорядки и боевые действия все еще продолжаются в других частях бывшей территории Лиги, центральное правительство заработало себе стойкого, хотя и идеологически коррумпированного, союзника внутри Китая, прочно интегрированного в нашу сферу влияния." #NT!
 league_war_events.11.a: "Стабильность обеспечена под руководством Лиги-Маршала!" #NT!

 league_war_events.12.t: "Нанкин побежден!" #NT!
 league_war_events.12.d: "Когда мы почти поставили на карту финансы нашего правительства, национальный авторитет и легитимность под предлогом поддержки продолжения и стабильности надежного правительства в Лиге, похоже, что все это было напрасно. Несмотря на обширную поддержку Ци со стороны как наших бывших немецких союзников, так и наших собственных возможностей, ему удалось свалить все это в яму отчаяния.\n\nПоскольку его махинации, стоящие за его приходом к власти, стали известны, похоже, что амбиции Ци привели к его окончательному падению. Желая создать Лигу себе, он непреднамеренно обрек бы на гибель не только себя, но и своих людей рядом с ним. Поскольку его клептократы бегут в Лигу или к нашим границам, сам Маршал Лиги, как сообщается, пропал без вести и бежит из столицы со всем богатством, которое он и его непосредственное окружение могли унести.\n\nБез Маршала Лиги Ци, который охранял бы наш фланг и возрождал Южный Чжили, Нанкин и провинции Лиги подчиняются только гнусным и враждебным режимам, все с махинациями в отношении Пекина." #NT!
 league_war_events.12.a: "Ты был жуликом, но ты был нашим проклятым жуликом!" #NT!

 league_war_events.13.t: "Аньцин побежден!" #NT!
 league_war_events.13.d: "Несмотря на их антиконцессионистские убеждения, несмотря на их патриотизм, несмотря на их доблесть, кажется, что благородные силы губернатора Чэнь Тяоюаня были полностью разгромлены и изгнаны из своей родной провинции. По слухам, когда его провинциальное правительство было почти уничтожено, «Генерал-дурак» погиб в боях или иным образом скрылся в тени городского преступного мира или даже в тени любого режима, который его примет.\n\nЧто касается его помощников и интеллектуалов, которые его поддерживали, их тоже постигла та же участь, сбежав в Хунань или куда-то еще. Какой бы ни была судьба этих людей, это серьезный, катастрофический день для нашего правительства, поскольку победа антиконцессионистского движения — это то, на что делали ставки многие из наших ведущих офицеров, политиков и интеллектуалов.\n\nБез Чена у нас остаются только потенциально враждебные режимы, которые смогут контролировать некоторые из наиболее прибыльных и хорошо развитых провинций Китая, оставляя серьезную угрозу безопасности на нашей непосредственной периферии." #NT!
 league_war_events.13.a: "Ты был храбрым человеком, Чэнь, побеждённым амбициями." #NT!

 league_war_events.14.t: "Губернатор Чен побежден!" #NT!
 league_war_events.14.d: "Сегодня славный день! Губернатор Чэнь Тяоюань, соответствующий своему прозвищу «Дурак», наконец-то побеждён! Поскольку его Аньхойская армия была совершенно беспомощна перед натиском лучших сил Лиги, его силы рассыпались и бежали во внутренние районы. Ищу работу везде, где только могу. К сожалению, губернатора-предателя нигде не найти, поскольку он бежал из провинции Аньхой из-за вторжения солдат Лиги.\n\nТем не менее, великий прародитель всего этого, тот, кто подлил бензин в огонь, тот, кто, несомненно, привел к выводу из строя великого Сунь Чуаньфана, он был брошен на свалку истории. А вместе с ним обязательно последуют и антиконцессионисты. Однако сейчас мы должны продолжать смотреть в будущее, поскольку маршалу Лиги Ци Сеюаню предстоит реализовать множество амбиций." #NT!
 league_war_events.14.a: "На самом деле это было довольно глупо." #NT!

