### Name and Description ###
 KR_history_title: "Краткая история"
 KR_scenario_name: "Наследие Мировой войны"
 KR_scenario_desc: "С наступлением 1936 года наследие Мировой войны тяжёлым грузом лежит на плечах нового поколения. Германия стоит в центре мира, держава, не имеющая равных, но у её ног — враги старые и новые: от восходящего синдикалистского Интернационала Франции до старой Антанты, от непокорённой России до непримиримой восходящей звезды Японии. В то же время огромная протяжённость Германии оставляет её опасно перенапряжённой, её союзники в Константинополе и Вене отдалились, а за Атлантикой американский колосс колеблется. Семнадцать лет прошло с окончания войны, и немногие ожидают, что новый год станет поворотным моментом; но вскоре одной искры может быть достаточно, чтобы вновь зажечь пороховую бочку..."

### Nation Selection Screen ###
 new_this_patch_title: "НОВОЕ В ЭТОМ ПАТЧЕ"
 new_this_patch_title_b: "§b$new_this_patch_title$§!"

 feature_highlight_icon_0_tt: "§YНовые портреты учёных§!\nЭто обновление добавляет §Y138 новых уникальных учёных§!, которых вы можете назначить на специальные проекты, а также дополнительно §Y134 новых общих портрета§! для учёных, нанимаемых во время игры."
 feature_highlight_icon_1_tt: "§YПолная переработка контента Индии§!\n§tДоминион Индия§!, §9Народная республика Бхарат§! и §7Княжеская федерация§! получили §Yсовершенно новые деревья национальных фокусов§!, §Yсобытия§! и §Yрешения§!, обеспечивающие игровой опыт, более соответствующий современному Kaiserreich."
 feature_highlight_icon_2_tt: "§YСовершенно новая вики§!\nВики Kaiserreich официально переехала на своё новое постоянное место по адресу §4https://kaiserreich.wiki/§!.\n\nНовая вики не содержит рекламы, загружается быстрее и отлично работает во встроенном браузере игры и на мобильных устройствах.\n\nНаходите хронологии, руководства по странам и новости разработки в одном месте, поддерживаемые командой Kaiserreich.\n\nНе забудьте обновить закладки!"

 highlight_major_0_tt: "Вы можете играть за §YСвободную русскую армию§!, начав кампанию за §YРоссию§!, §YГерманию§! или §Yвосточных членов Рейхспакта§!. Событие, позволяющее это сделать, произойдёт вскоре после начала русско-германской войны.\n\n§RРоссией должны управлять Савинков или социалисты, это можно настроить в правилах игры.§!"
 highlight_major_1_tt: "Вы можете играть за §YДальневосточную армию§!, начав кампанию за §YРоссию§!, §YЯпонию§! или §YФэнтянь§!. Событие, позволяющее это сделать, произойдёт вскоре после начала Дальневосточного восстания.\n\n§RРоссией должны управлять Савинков или социалисты, это можно настроить в правилах игры.§!"

 highlight_minor_0_tt: ""
