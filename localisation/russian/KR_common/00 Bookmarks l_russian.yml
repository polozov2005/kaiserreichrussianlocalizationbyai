 highlight_minor_2_tt: ""

### Other ###
 Debug_KR_gathering_storm_desc: "Если вы это видите, пожалуйста, создайте отчёт об ошибке"

 OTHER_KR_gathering_storm_desc: "Нации мира, великие и малые, ждут своего часа, чтобы стать крупными игроками этого мира. От великих держав, пытающихся сохранить свои империи, до многих наций, пытающихся вернуть то, что они потеряли в Мировой войне, — всем придётся принимать трудные решения и сочетать идеалы с прагматизмом, чтобы повлиять на будущее мира..."
