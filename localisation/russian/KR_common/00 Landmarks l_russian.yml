l_russian:
## Europe
 # Denmark
 landmark_christiansborg_palace: "Дворец Кристиансборг" #NT!
 landmark_christiansborg_palace_plural: "$landmark_christiansborg_palace$"
 landmark_christiansborg_palace_desc: "§LДворец Кристиансборг — монументальный дворец в стиле необарокко, стоящий на островке Слотсхольмен в самом сердце Копенгагена. Восстановленный после великого пожара 1884 года и завершенный совсем недавно, дворец теперь служит резиденцией датского государства, в нем размещаются Фолькетинг, Верховный суд и офисы премьер-министра. Кристиансборг, долгое время являвшийся символом королевской власти и управления в Дании, олицетворяет преемственность датской монархии и конституционных традиций.§!" #NT!

 # France
 landmark_arc_de_triomphe: "Триумфальная арка" #NT!
 landmark_arc_de_triomphe_plural: "$landmark_arc_de_triomphe$"
 landmark_arc_de_triomphe_desc: "§LТриумфальная арка — грандиозный триумфальный памятник, возвышающийся над западной оконечностью Елисейских полей в Париже. Созданный Наполеоном в честь побед и солдат Франции, он является свидетельством военной славы и самопожертвования нации. Под его сводом находится Могила Неизвестного солдата, торжественное напоминание о Великой войне и ее неизгладимом следе в истории Французской Республики. Триумфальная арка остается мощным символом французского единства и национальной гордости.§!" #NT!

 landmark_notre_dame: "Нотр-Дам де Пари" #NT!
 landmark_notre_dame_plural: "$landmark_notre_dame$"
 landmark_notre_dame_desc: "§LСобор Парижской Богоматери — готический собор, возвышающийся на острове Сите в историческом центре Парижа. Построенный на протяжении веков, он был свидетелем коронаций, революций и духовной жизни Франции. Известный своими высокими башнями, огромными окнами-розетками и звонкими колоколами, собор выдержал испытания последних десятилетий, став свидетелем веры и истории Франции.§!" #NT!

 # Germany
 landmark_brandenburg_gate: "Бранденбургские ворота" #NT!
 landmark_brandenburg_gate_plural: "$landmark_brandenburg_gate$"
 landmark_brandenburg_gate_desc: "§LБранденбургские ворота — величественный памятник неоклассического стиля, стоящий в самом сердце Берлина. Воздвигнутый в конце восемнадцатого века как символ мира, он с тех пор стал главной эмблемой прусского и немецкого государства. Во времена правления кайзера ворота выходят на парады, церемонии и гражданскую жизнь столицы современной Германии, воплощая как имперские традиции, так и единство немецкой нации.§!" #NT!

 landmark_cologne_cathedral: "Кёльнский собор" #NT!
 landmark_cologne_cathedral_plural: "$landmark_cologne_cathedral$"
 landmark_cologne_cathedral_desc: "§LКёльнский собор — возвышающийся готический шедевр, возвышающийся над горизонтом рейнского города Кёльн. Строительство было начато в средние века и завершено в девятнадцатом веке. Его двойные шпили и обширный интерьер отражают многовековое немецкое мастерство и преданность делу. Собор, долгое время являвшийся местом паломничества и национальной гордости, является символом веры, стойкости и непреходящего культурного наследия Германии.§!" #NT!

 # Italy
 landmark_leaning_tower_of_pisa: "Пизанская башня" #NT!
 landmark_leaning_tower_of_pisa_plural: "$landmark_leaning_tower_of_pisa$"
 landmark_leaning_tower_of_pisa_desc: "§LПизанская башня — характерная романская колокольня, возвышающаяся над площадью Пьяцца деи Мираколи. Построенный в средние века, его непреднамеренный наклон сделал его одной из самых узнаваемых достопримечательностей Италии. Расположенная рядом с собором, для которого она была построена, башня является свидетельством итальянской изобретательности, настойчивости и непреходящего наследия исторических городов-государств полуострова.§!" #NT!

 # Russia
 landmark_saint_basils_cathedral: "Собор Василия Блаженного" #NT!
 landmark_saint_basils_cathedral_plural: "$landmark_saint_basils_cathedral$"
 landmark_saint_basils_cathedral_desc: "§LСобор Василия Блаженного возвышается на Красной площади в Москве, его яркие луковичные купола и узорчатая кирпичная кладка создают доминирующее впечатление рядом с Кремлем. Когда-то он был построен по заказу Ивана IV в ознаменование завоевания Казани, а теперь находится под бдительной властью Российского государства, являясь реликвией царской власти, которая продолжает оставаться свидетелем жизни горожан. В его часовнях до сих пор сохранились отголоски многовекового богослужения, что делает здание свидетельством истории и духовной традиции России.§!" #NT!

 landmark_winter_palace: "Зимний Дворец"
 landmark_winter_palace_plural: "$landmark_winter_palace$"
 landmark_winter_palace_desc: "§LЗимний дворец – великолепный дворец в стиле рококо, служивший официальной резиденцией дома Романовых до 1917 года. Расположенный в самом сердце Петрограда, дворец стал свидетелем многих ключевых событий русских революций. Часть дворца занимает Эрмитаж, а остальная часть представляет собой обширный административный комплекс. Зимний дворец остаётся символом гордости всей России.§!"

 landmark_vozhd_liberator: "Вождь-Освободитель"
 landmark_vozhd_liberator_plural: "$landmark_vozhd_liberator$"
 landmark_vozhd_liberator_desc: "§LПамятник Вождю-Освободителю, возвышающийся на берегу реки Харьков, представляет собой 22-метровую бронзовую скульптуру Бориса Савинкова, восседающего на 29-метровом неоклассическом постаменте. В длинном пальто, сурово глядя на Запад, Вождь, словно герой, возвышается над родным городом. Внутри постамента горит вечный огонь памяти неизвестных солдат, отдавших свои жизни в Великой Отечественной войне.§!"

## Americas
 # United States
 landmark_white_house: "Белый Дом"
 landmark_white_house_plural: "$landmark_white_house$"
 landmark_white_house_desc: "§LБелый дом — резиденция президента США. Расположенный в округе Колумбия, Белый дом стал символом республики с момента завершения его строительства в 1800 году.§!"

 landmark_capitol: "Капитолий" #NT!
 landmark_capitol_plural: "$landmark_capitol$"
 landmark_capitol_desc: "§LКапитолий Соединенных Штатов возвышается на Капитолийском холме в Вашингтоне, округ Колумбия, и является резиденцией национального Конгресса. Начавшийся в конце восемнадцатого века и завершившийся последовательными расширениями, он стал ареной законодательных дебатов и политических перемен. Его купол, палаты и парадные лестницы делают его центром политической жизни и конституционного порядка Соединенных Штатов.§!" #NT!

 landmark_washington_monument: "Монумент Вашингтона" #NT!
 landmark_washington_monument_plural: "$landmark_washington_monument$"
 landmark_washington_monument_desc: "§LПамятник Вашингтону — высокий обелиск на Национальной аллее в Вашингтоне, округ Колумбия, воздвигнутый в честь Джорджа Вашингтона, первого президента страны. Завершенный в 1888 году после десятилетий прерванного строительства, он стал свидетелем роста столицы и гражданской жизни республики. Его огромная высота и внушительное присутствие делают его вечным памятником американскому лидерству и национальной памяти.§!" #NT!

 landmark_pentagon: "Пентагон" #NT!
 landmark_pentagon_plural: "$landmark_pentagon$"
 landmark_pentagon_desc: "§LПентагон — это огромная пятисторонняя штаб-квартира военного министерства США на окраине Вашингтона, округ Колумбия. Созданная для централизации военного управления и консолидации оборонных операций страны, эта структура воплощает в себе современную технику и организационную мощь американских вооруженных сил. Это является свидетельством готовности страны и национальной решимости.§!" #NT!

 landmark_empire_state_building: "Эмпайр Стейт Билдинг" #NT!
 landmark_empire_state_building_plural: "$landmark_empire_state_building$"
 landmark_empire_state_building_desc: "§LЭмпайр-стейт-билдинг возвышается над Манхэттеном и является символом амбиций Нью-Йорка. Построенное в 1931 году, оно считается самым высоким искусственным сооружением в мире. Его фасад и шпиль в стиле ар-деко теперь определяют горизонт города, являясь памятником американской промышленности, предпринимательству и быстрому росту современного мегаполиса.§!" #NT!

 landmark_boulder_dam: "Плотина Боулдер" #NT!
 landmark_boulder_dam_plural: "$landmark_boulder_dam$"
 landmark_boulder_dam_desc: "§LПлотина Боулдер перекрывает реку Колорадо на границе Аризоны и Невады — огромное бетонное сооружение, построенное в начале 1930-х годов. Построенный для борьбы с наводнениями, обеспечения орошения и выработки электроэнергии, он преобразил окружающий регион. Его масштабы и инженерные решения изменили окружающий регион, продемонстрировав промышленный потенциал страны и ее способность управлять природной средой.§!" #NT!

 landmark_golden_gate_bridge: "Мост Золотые Ворота" #NT!
 landmark_golden_gate_bridge_plural: "$landmark_golden_gate_bridge$"
 landmark_golden_gate_bridge_desc: "§LМост Золотые Ворота пересекает вход в залив Сан-Франциско, мощный подвесной мост, соединяющий город с округом Марин. Его башни и широкие тросы создают один из самых длинных и ярких переходов в мире. Мост является свидетельством американской инженерной мысли, амбиций и владения современной инфраструктурой.§!" #NT!

 landmark_hollywood_sign: "Знак Голливудленда" #NT!
 landmark_hollywood_sign_plural: "$landmark_hollywood_sign$"
 landmark_hollywood_sign_desc: "§LЗнак «Голливудленд» возвышается на холмах над Лос-Анджелесом: его большие белые буквы рекламируют жилой комплекс и обозначают растущий район. Возведенный в 1923 году, он стал заметной деталью городского пейзажа. Знак, видимый по всему окрестностям, стал тесно ассоциироваться с киноиндустрией и быстрым расширением Лос-Анджелеса.§!" #NT!

 # Mexico
 landmark_chichen_itza: "Чичен-Ица" #NT!
 landmark_chichen_itza_plural: "$landmark_chichen_itza$"
 landmark_chichen_itza_desc: "§LЧичен-Ица ​​возвышается на полуострове Юкатан и представляет собой остатки великого города майя, его пирамиды, храмы и площадки для игры в мяч отражают столетия доколумбовой цивилизации. В последние годы американские археологи и ученые предприняли обширные исследования и усилия по сохранению, привлекая к этому месту более широкое внимание. Руины свидетельствуют как об изобретательности цивилизации майя, так и о растущей роли Соединенных Штатов в изучении и сохранении древней Америки.§!" #NT!

 # Chile
 landmark_moai: "Моаи" #NT!
 landmark_moai_plural: "$landmark_moai$"
 landmark_moai_desc: "§LСтатуи моаи острова Пасхи возвышаются вдоль берегов и хребтов острова. Их массивные каменные формы были созданы народом Рапа-Нуи много веков назад. Статуи, находившиеся под чилийской администрацией с конца девятнадцатого века, привлекали внимание как ученых, так и посетителей. Они остаются молчаливыми свидетелями изобретательности и культуры коренных жителей острова, отмечая отдаленный уголок Тихого океана, давно созданный руками человека.§!" #NT!

## Asia
 # Burma
 landmark_shwedagon_pagoda: "Пагода Шведагон" #NT!
 landmark_shwedagon_pagoda_plural: "$landmark_shwedagon_pagoda$"
 landmark_shwedagon_pagoda_desc: "§LПагода Шведагон возвышается на склонах холма Шведагон в Янгоне, Бирма, и является одним из самых священных буддийских мест в стране. Его золотой шпиль и древняя архитектура отражают многовековую преданность и культурное наследие. Пагода продолжает привлекать паломников и посетителей со всей Азии, символизируя непреходящее духовное значение буддийских традиций Бирмы.§!" #NT!

 # Japan
 landmark_himeji_castle: "Замок Химэдзи" #NT!
 landmark_himeji_castle_plural: "$landmark_himeji_castle$"
 landmark_himeji_castle_desc: "§LЗамок Химэдзи с видом на город Химедзи является одной из наиболее хорошо сохранившихся феодальных крепостей Японии. Построенный в начале семнадцатого века, его побеленные стены, многоуровневая оборона и высокая крепость служат примером военного дизайна эпохи Токугава. Пережив гражданскую войну, реставрацию и модернизацию, замок продолжает отражать военные традиции Японии и имперское прошлое.§!" #NT!

 landmark_okayama_castle: "Замок Окаяма" #NT!
 landmark_okayama_castle_plural: "$landmark_okayama_castle$"
 landmark_okayama_castle_desc: "§LЗамок Окаяма стоит на берегу реки Асахи, его темный внешний вид и величественная внешность отличают его от других японских крепостей. Построенный в конце шестнадцатого века, он служил региональным центром власти в периоды Сэнгоку и раннего Токугава. Сегодня эта структура напоминает о власти местных владений и наследии класса самураев.§!" #NT!

 # Siam
 landmark_wat_arun: "Ват Арун" #NT!
 landmark_wat_arun_plural: "$landmark_wat_arun$"
 landmark_wat_arun_desc: "§LВат Арун занимает западный берег реки Чао Прайя в Бангкоке и является одним из самых узнаваемых религиозных объектов Сиама. Храмовый комплекс, сосредоточенный на высоком пранге, демонстрирует сильное кхмерское влияние и давние буддийские традиции. Тесно связанный с династией Чакри и столицей, Ват Арун продолжает символизировать тесную связь между религией, монархией и сиамским государством.§!" #NT!

## Middle East
 # Arabia
 landmark_kaaba: "Кааба" #NT!
 landmark_kaaba_plural: "$landmark_kaaba$"
 landmark_kaaba_desc: "§LВ центре Великой мечети в Мекке возвышается Кааба, самое святое место ислама. Его структура с черной драпировкой на протяжении веков определяла направление мусульманских молитв и паломничества. Перестроенная и поддерживаемая на протяжении нескольких поколений, Кааба продолжает формировать духовную жизнь исламского мира и подтверждает превосходство Мекки как священного города.§!" #NT!

 # Egypt
 landmark_pyramids_of_giza: "Пирамиды Гизы" #NT!
 landmark_pyramids_of_giza_plural: "$landmark_pyramids_of_giza$"
 landmark_pyramids_of_giza_desc: "§LНа пустынном плато к западу от Каира пирамиды Гизы доминируют над ландшафтом как монументальные гробницы древних фараонов Египта. Построенные во времена Древнего царства, их огромные масштабы и точная работа свидетельствуют об организации и авторитете ранней египетской цивилизации. Пирамиды, появившиеся на тысячелетия раньше современного государства, являются вечными памятниками человеческим амбициям и изобретательности.§!" #NT!
