l_russian:
## Europe
 # Denmark
 landmark_christiansborg_palace: "Кристиансборг"
 landmark_christiansborg_palace_plural: "$landmark_christiansborg_palace$"
 landmark_christiansborg_palace_desc: "§LДворец Кристиансборг — монументальный необарочный дворец, стоящий на островке Слотсхольмен в самом сердце Копенгагена. Перестроенный после великого пожара 1884 года и завершённый лишь недавно, дворец ныне служит резиденцией датского государства, вмещая Фолькетинг, Верховный суд и канцелярию премьер-министра. Долгое время являясь символом королевской власти и управления в Дании, Кристиансборг воплощает преемственность датской монархии и конституционной традиции.§!"

 # France
 landmark_arc_de_triomphe: "Триумфальная арка"
 landmark_arc_de_triomphe_plural: "$landmark_arc_de_triomphe$"
 landmark_arc_de_triomphe_desc: "§LТриумфальная арка — величественный монумент, доминирующий над западным концом Елисейских Полей в Париже. Воздвигнутая Наполеоном в честь побед и солдат Франции, она стоит как свидетельство военной славы и жертв нации. Под её сводом покоится Могила Неизвестного Солдата — торжественное напоминание о Великой войне и её неизгладимом следе на Французской Республике. Триумфальная арка остаётся мощным символом французского единства и национальной гордости.§!"

 landmark_notre_dame: "Нотр-Дам де Пари"
 landmark_notre_dame_plural: "$landmark_notre_dame$"
 landmark_notre_dame_desc: "§LНотр-Дам де Пари — готический собор, возвышающийся на острове Сите в историческом сердце Парижа. Строившийся на протяжении веков, он стал свидетелем коронаций, революций и духовной жизни Франции. Знаменитый своими парящими башнями, огромными окнами-розами и звучными колоколами, собор пережил потрясения последних десятилетий как свидетель веры и истории Франции.§!"

 # Germany
 landmark_brandenburg_gate: "Бранденбургские ворота"
 landmark_brandenburg_gate_plural: "$landmark_brandenburg_gate$"
 landmark_brandenburg_gate_desc: "§LБранденбургские ворота — величественный неоклассический монумент в самом сердце Берлина. Воздвигнутые в конце восемнадцатого века как символ мира, они с тех пор стали главным символом прусского и германского государства. Под властью кайзера ворота наблюдают за парадами, церемониями и гражданской жизнью в столице современной Германии, воплощая как имперскую традицию, так и единство германской нации.§!"

 landmark_cologne_cathedral: "Кёльнский собор"
 landmark_cologne_cathedral_plural: "$landmark_cologne_cathedral$"
 landmark_cologne_cathedral_desc: "§LКёльнский собор — возвышающийся готический шедевр, доминирующий над горизонтом рейнского города Кёльна. Заложенный в Средние века и завершённый в девятнадцатом веке, его двойные шпили и обширный интерьер отражают века немецкого мастерства и преданности. Долгое время бывшее местом паломничества и национальной гордости, это сооружение стоит как символ веры, стойкости и непреходящего культурного наследия Германии.§!"

 # Italy
 landmark_leaning_tower_of_pisa: "Пизанская башня"
 landmark_leaning_tower_of_pisa_plural: "$landmark_leaning_tower_of_pisa$"
 landmark_leaning_tower_of_pisa_desc: "§LПизанская башня — отличительная романская колокольня, возвышающаяся над Площадью Чудес. Построенная в Средние века, её непреднамеренный наклон сделал её одной из самых узнаваемых достопримечательностей Италии. Стоя рядом с собором, которому она служила, башня стоит как свидетельство итальянской изобретательности, упорства и непреходящего наследия исторических городов-государств полуострова.§!"

 # Russia
 landmark_saint_basils_cathedral: "Собор Василия Блаженного"
 landmark_saint_basils_cathedral_plural: "$landmark_saint_basils_cathedral$"
 landmark_saint_basils_cathedral_desc: "§LСобор Василия Блаженного возвышается на Красной площади в Москве, его яркие луковичные купола и узорчатая кирпичная кладка формируют величественное присутствие рядом с Кремлём. Когда-то воздвигнутый Иваном IV в честь завоевания Казани, он ныне сохраняется под бдительным вниманием российского государства — реликт царской власти, продолжающий свидетельствовать о жизни горожан. В его часовнях сохраняются отголоски веков богослужения, отмечая здание как свидетельство истории и духовной традиции России.§!"

 landmark_winter_palace: "Зимний дворец"
 landmark_winter_palace_plural: "$landmark_winter_palace$"
 landmark_winter_palace_desc: "§LЗимний дворец — великолепный дворец в стиле рококо, служивший официальной резиденцией дома Романовых до 1917 года. В самом сердце Петрограда дворец стал свидетелем многих ключевых событий русских революций. Одна часть дворца вмещает Эрмитаж, тогда как остальная часть представляет собой обширный административный комплекс. Зимний дворец остаётся символом гордости всей России.§!"

 landmark_vozhd_liberator: "Вождь-Освободитель"
 landmark_vozhd_liberator_plural: "$landmark_vozhd_liberator$"
 landmark_vozhd_liberator_desc: "§LВождь-Освободитель стоит на берегу реки Харьков и представляет собой 22-метровую бронзовую фигуру Бориса Савинкова, восседающего на 29-метровом неоклассическом постаменте. Вождь, облачённый в длинное пальто и сурово взирающий на Запад, стоит как героическая фигура над своим родным городом. Внутри постамента горит вечный огонь в память о неизвестных солдатах, отдавших жизни в Великой Отечественной войне.§!"

## Americas
 # United States
 landmark_white_house: "Белый дом"
 landmark_white_house_plural: "$landmark_white_house$"
 landmark_white_house_desc: "§LБелый дом — неоклассический особняк в центре Вашингтона, служащий резиденцией и офисом президента Соединённых Штатов. Построенный в конце восемнадцатого века, он стал свидетелем становления нации, политических кризисов и администраций сменяющих друг друга президентов. Отмеченный своими портиками, парадными залами и неизменным фасадом, Белый дом остаётся главным сидением американской исполнительной власти и маркером национальной преемственности.§!"

 landmark_capitol: "Капитолий"
 landmark_capitol_plural: "$landmark_capitol$"
 landmark_capitol_desc: "§LКапитолий Соединённых Штатов возвышается на Капитолийском холме в Вашингтоне как резиденция национального Конгресса. Заложенный в конце восемнадцатого века и завершённый через последовательные расширения, он был сценой законодательных дебатов и политических перемен. Его купол, залы и величественные лестницы отмечают его как центр политической жизни и конституционного строя Соединённых Штатов.§!"

 landmark_washington_monument: "Монумент Вашингтону"
 landmark_washington_monument_plural: "$landmark_washington_monument$"
 landmark_washington_monument_desc: "§LМонумент Вашингтону — возвышающийся обелиск на Национальной аллее в Вашингтоне, воздвигнутый в честь Джорджа Вашингтона, первого президента нации. Завершённый в 1888 году после десятилетий прерванного строительства, он стал свидетелем роста столицы и гражданской жизни республики. Его строгая высота и величественное присутствие отмечают его как вечный памятник американскому лидерству и национальной памяти.§!"

 landmark_pentagon: "Пентагон"
 landmark_pentagon_plural: "$landmark_pentagon$"
 landmark_pentagon_desc: "§LПентагон — обширное пятиугольное здание штаб-квартиры военного ведомства Соединённых Штатов на окраине Вашингтона. Спроектированный для централизации военного управления и консолидации оборонных операций нации, это сооружение воплощает современную инженерию и организационную силу американских вооружённых сил. Он стоит как свидетельство готовности страны и национальной решимости.§!"

 landmark_empire_state_building: "Эмпайр-стейт-билдинг"
 landmark_empire_state_building_plural: "$landmark_empire_state_building$"
 landmark_empire_state_building_desc: "§LЭмпайр-стейт-билдинг возвышается над Манхэттеном как возвышающийся символ амбиций Нью-Йорка. Завершённый в 1931 году, он стоит как самое высокое созданное человеком сооружение в мире. Его ар-деко фасад и шпиль ныне определяют горизонт города, стоя как памятник американской индустрии, предприимчивости и быстрому росту современного мегаполиса.§!"

 landmark_boulder_dam: "Плотина Боулдер"
 landmark_boulder_dam_plural: "$landmark_boulder_dam$"
 landmark_boulder_dam_desc: "§LПлотина Боулдер пересекает реку Колорадо на границе Аризоны и Невады — огромное бетонное сооружение, завершённое в начале 1930-х годов. Построенная для контроля наводнений, обеспечения ирригации и выработки электроэнергии, она преобразила окружающий регион. Её масштаб и инженерное мастерство преобразили окружающий регион, демонстрируя промышленный потенциал нации и её способность управлять природной средой.§!"

 landmark_golden_gate_bridge: "Мост Золотые Ворота"
 landmark_golden_gate_bridge_plural: "$landmark_golden_gate_bridge$"
 landmark_golden_gate_bridge_desc: "§LМост Золотые Ворота пересекает вход в залив Сан-Франциско — смелый висячий мост, соединяющий город с округом Марин. Его башни и плавные тросы создают один из самых длинных и впечатляющих переходов в мире. Мост стоит как свидетельство американской инженерии, амбиций и мастерства современной инфраструктуры.§!"

 landmark_hollywood_sign: "Знак «Голливудленд»"
 landmark_hollywood_sign_plural: "$landmark_hollywood_sign$"
 landmark_hollywood_sign_desc: "§LЗнак «Голливудленд» возвышается на холмах над Лос-Анджелесом, его крупные белые буквы рекламируют жилой район и отмечают растущий квартал. Воздвигнутый в 1923 году, он стал заметной чертой городского ландшафта. Видимый на окружающей территории, знак стал тесно ассоциироваться с киноиндустрией и быстрым расширением Лос-Анджелеса.§!"

 # Mexico
 landmark_chichen_itza: "Чичен-Ица"
 landmark_chichen_itza_plural: "$landmark_chichen_itza$"
 landmark_chichen_itza_desc: "§LЧичен-Ица возвышается на полуострове Юкатан как остатки великого города майя, её пирамиды, храмы и площадки для игры в мяч отражают века доколумбовой цивилизации. В последние годы американские археологи и учёные предприняли обширные исследования и усилия по сохранению, привлекая к месту более широкое внимание. Руины свидетельствуют как об изобретательности цивилизации майя, так и о расширяющейся роли Соединённых Штатов в изучении и сохранении древних Америк.§!"

 # Chile
 landmark_moai: "Моаи"
 landmark_moai_plural: "$landmark_moai$"
 landmark_moai_desc: "§LСтатуи моаи острова Пасхи возвышаются вдоль берегов и хребтов острова, их массивные каменные формы созданы народом рапа-нуи столетия назад. Под чилийским управлением с конца девятнадцатого века, статуи привлекли внимание учёных и посетителей. Они остаются безмолвными свидетелями изобретательности и культуры коренных жителей острова, отмечая удалённый уголок Тихого океана, давно сформированный человеческими руками.§!"

## Asia
 # Burma
 landmark_shwedagon_pagoda: "Пагода Шведагон"
 landmark_shwedagon_pagoda_plural: "$landmark_shwedagon_pagoda$"
 landmark_shwedagon_pagoda_desc: "§LПагода Шведагон возвышается на склонах холма Шведагон в Янгоне, Бирма, и является одним из самых священных буддийских мест в стране. Её золотой шпиль и древняя архитектура отражают века преданности и культурного наследия. Пагода продолжает привлекать паломников и посетителей со всей Азии, символизируя непреходящее духовное значение буддийских традиций Бирмы.§!"

 # Japan
 landmark_himeji_castle: "Замок Химэдзи"
 landmark_himeji_castle_plural: "$landmark_himeji_castle$"
 landmark_himeji_castle_desc: "§LЗамок Химэдзи возвышается над городом Химэдзи и является одной из наиболее хорошо сохранившихся феодальных крепостей в Японии. Завершённый в начале семнадцатого века, его белёные стены, многоярусная оборона и возвышающаяся башня воплощают военный дизайн эпохи Токугава. Пережив гражданскую войну, реставрацию и модернизацию, замок продолжает отражать воинские традиции Японии и имперское прошлое.§!"

 landmark_okayama_castle: "Замок Окаяма"
 landmark_okayama_castle_plural: "$landmark_okayama_castle$"
 landmark_okayama_castle_desc: "§LЗамок Окаяма стоит у реки Асахи, его тёмный экстерьер и величественная башня отличают его от других японских укреплений. Построенный в конце шестнадцатого века, он служил региональным центром власти в периоды Сэнгоку и раннего Токугава. Сегодня это сооружение напоминает о власти местных уделов и наследии класса самураев.§!"

 # Siam
 landmark_wat_arun: "Ват Арун"
 landmark_wat_arun_plural: "$landmark_wat_arun$"
 landmark_wat_arun_desc: "§LВат Арун занимает западный берег реки Чао Прайя в Бангкоке и образует один из самых узнаваемых религиозных объектов в Сиаме. Центрированный на его возвышающемся пранге, храмовый комплекс показывает сильное кхмерское влияние и давние буддийские традиции. Тесно связанный с династией Чакри и столицей, Ват Арун продолжает означать тесные связи между верой, монархией и сиамским государством.§!"

## Middle East
 # Arabia
 landmark_kaaba: "Кааба"
 landmark_kaaba_plural: "$landmark_kaaba$"
 landmark_kaaba_desc: "§LВ центре Великой мечети в Мекке возвышается Кааба — святейшее место в исламе. Её окутанная чёрным покровом структура на протяжении веков направляла направление мусульманской молитвы и паломничества. Перестраиваемая и поддерживаемая на протяжении последовательных поколений, Кааба продолжает формировать духовную жизнь исламского мира и утверждать первенство Мекки как священного города.§!"

 # Egypt
 landmark_pyramids_of_giza: "Пирамиды Гизы"
 landmark_pyramids_of_giza_plural: "$landmark_pyramids_of_giza$"
 landmark_pyramids_of_giza_desc: "§LНа пустынной возвышенности к западу от Каира пирамиды Гизы доминируют над ландшафтом как монументальные гробницы древних фараонов Египта. Построенные в период Древнего царства, их огромный масштаб и точное мастерство свидетельствуют об организации и власти ранней египетской цивилизации. Предшествуя современному государству на тысячелетия, пирамиды стоят как вечные памятники человеческим амбициям и изобретательности.§!"

