### Missions ###
 EGY_levant_crisis_mission: "Взять инициативу"
 EGY_levant_crisis_mission_desc: "По сравнению с османской империей, наша инфраструктура не готова для ведения длительной войны. Мы должны нанести быстрый и решительный удар, положив конец конфликту, прежде чем враг успеет перегруппироваться и укрепить свою оборону."
 OTT_levant_crisis_mission: "Остановите наступление египтян"
 OTT_levant_crisis_mission_desc: "Генеральный штаб в замешательстве из-за кризиса в Леванте, но ясно одно: египетская армия не сможет вести длительную войну против нас. Стратегия глубокоэшелонированной обороны может измотать их, вынудив чрезмерно растянуть свои позиции, но мы должны переломить ситуацию, прежде чем они начнут угрожать центру страны."

### Ideas ###
 EGY_levant_crisis_initiative_base: "Кризис в Леванте: Мы держим инициативу"
 EGY_levant_crisis_initiative_lost: "Кризис в Леванте: Потеря инициативы"
 OTT_levant_crisis_initiative: "Кризис в Леванте: Контрнаступление"
 EGY_levant_crisis_reparations: "Выплата репараций"

### Dynamic Modifiers ###
 OTT_railway_transport_disrupted: "Деозорганизованный железнодорожный транспорт"

### Operation Abu'l-A'war events
 operation_abul_awar_events.1.t: "Операция Абу'л-А'вар"
 operation_abul_awar_events.1.d: "Столкнувшись с непреодолимым военно-морским превосходством османского флота, военные теоретики в сотрудничестве с атташе Коммуны разработали предложение, позволяющее уравнять шансы. Поскольку тотальная атака на военно-морскую базу Османской империи была бы невозможна, был разработан более радикальный план.\n\nВ первые часы войны, в попытке застать османов врасплох, отряд морских бомбардировщиков должен нанести удар по османскому флоту вблизи его базы в Бейруте. За этим последует быстрое продвижение через Синай и Палестину (при содействии сирийских ячеек). Это смелый план, но, если он сработает, возможно, даже убедит греческое правительство принять чью-либо сторону и отвлечь турок в Эгейском море."
 operation_abul_awar_events.1.a: "Начать операцию!"

 operation_abul_awar_events.2.t: "Блэкберн Баффин"
 operation_abul_awar_events.2.d: "Вершина британской инженерной мысли, "Блэкберн Баффин" - военно-морской бомбардировщик, используемый в Британском союзе. В связи с продолжающейся подготовкой к операции "Абу-ль-А'вар" правительство [ENG.GetLeader] отдало приказ о продаже некоторых из этих самолетов для Королевской армии.\n\nИх надежность само собой разумеется, но многие сомневаются, смогут ли эти самолеты противостоять средствам противовоздушной обороны Османской империи или их собственным современным самолетам."
 operation_abul_awar_events.2.a: "Приобретите 30 таких самолетов"
 operation_abul_awar_events.2.b: "Весь этот план кажется пустой тратой наших ресурсов..."

 operation_abul_awar_events.3.t: "Успешный налет на Бейрут"
 operation_abul_awar_events.3.d: "Вылетев под покровом темноты, 20 "Баффинов" успешно разбомбили османский флот на его базах в Бейруте. Турецкое военное командование было застигнуто врасплох, поскольку не ожидало, что у египетской армии будут военно-морские бомбардировщики, поэтому ущерб был серьезным. Тем не менее, египетская сторона понесла тяжелые потери, поскольку зенитные установки сбили 8 самолетов до того, как они смогли сбросить свои торпеды, а еще 7 не смогли уйти.\n\nКогда утреннее солнце поднялось над гаванью, до всех начала доходить серьезность рейда. Бывший флагман османского военно-морского флота и гордость Вельткрига "Явуз Султан Селим-и-Эввел" получил два прямых попадания и в сочетании с повреждениями, полученными во время последней войны, не смог удержаться на плаву. "Султан Абдулхамид-и-Сани" и "Истанкой также" получили тяжелые удары, выведшие их из строя по меньшей мере на шесть месяцев.\n\nАтака, которую многие сочли заведомо провальной, вместо этого стала колоссальной победой египтян, вызвав большой испуг у греческого правительства и вызвав шокирующее удивление на Кипре."
 operation_abul_awar_events.3.ott: "Мы отомстим за наших павших братьев"
 operation_abul_awar_events.3.egy: "Вперед к окончательной победе!"

 operation_abul_awar_events.4.t: "Провал налета на Бейрут"
 operation_abul_awar_events.4.d: "Шестнадцать "Баффинов" покинули свою базу в Средиземном море ранним утром, и только 1 вернулся невредимым. Катастрофа началась в самом начале, когда вместо запланированных 20 только 16 смогли взлететь. Те, кому удалось успешно отплыть, увидели, что их число еще больше сократилось, когда из-за сильных погодных условий они сбились с курса и направились в палестинскую гавань Хайфы. Приняв немецкое грузовое судно за османский эсминец, турецкая эскадрилья истребителей перехватила еще 5 самолетов, которые были сбиты в небе, не причинив ущерба военным объектам. Оставшиеся 11 быстро повернули на север, пытаясь долететь до Бейрута, но турецким пилотам удалось остановить атаку. Единственный двухместный самолет смог невредимым вернуться на свою базу близ Александрии после того, как он отделился от основной эскадрильи после неудачного налета на Хайфу.\n\Многие ожидали, что успешная атака будет крайне маловероятной, но после такого сокрушительного поражения, нанесенного египетским военно-воздушным силам, моральный дух резко упал. Однако, пока жандармерия в Хайфе проверяет нанесенный ущерб, египетские войска пересекают Суэцкий канал. Война в конце концов началась."
 operation_abul_awar_events.4.ott: "Сегодня вечером мы ужинаем в Каире!"
 operation_abul_awar_events.4.egy: "Мы никогда не забудем эту жертву!"

### Third Arab Congress
 third_arab_congress_events.1.t: "Третий Арабский Конгресс"
 third_arab_congress_events.1.d: "После первого арабского конгресса, состоявшегося в 1913 году в здании Парижского географического общества, арабское националистическое движение начало неуклонно расти. В отличие от первоначально реформистских идей, выдвинутых его основателями, которые хотели решить вопрос о статусе арабов в Османской империи, Второй арабский конгресс 1927 года показал, в каком новом направлении дует ветер. Состоявшийся в Каире сразу после успешной египетской революции и предательства Османской империи в Суэце, диалог теперь контролировался радикалами и более крупными арабскими националистами. Члены "Аль-Фатат", изгнанники-хашимиты, алжирские революционеры, палестинцы - все они пришли сюда, чтобы окончательно изменить идеи арабского национализма. Теперь, когда итальянская угроза была устранена, а британское присутствие на Ближнем Востоке было почти полностью ликвидировано благодаря действиям арабских героев в 1925 году, внимание снова переключилось на турок.\n\nХотя Второй конгресс не продвинулся дальше нескольких писем с резкими формулировками и резолюций, на которые никто не обратил внимания, это уже не так. Крах немецкой экономики и растущая политическая нестабильность в Османской империи вызвали новое ощущение неотложности на всем Ближнем Востоке. Этот Третий арабский конгресс, в конечном счете, будет ничем иным, как плохо замаскированной попыткой объединить все усилия арабов и искоренить турецкое присутствие в Машрике. От Ливии до песков Аравийской пустыни многие с тревогой ожидают, какой курс изберет наш новый король."
 third_arab_congress_events.1.a: "Разошлите приглашения"

 third_arab_congress_events.2.t: "Приглашение на третий арабский конгресс"
 third_arab_congress_events.2.d: "Третий арабский конгресс, организованный египетским правительством в Каире, планирует объединить всю арабскую борьбу и определить направление, в котором она должна развиваться. Учитывая, что большая часть Машрика все еще страдает под властью Блистательной Порты, а арабы Магриба живут во французском рабовладельческом государстве, очевидно, что мы, как единственные независимые арабские державы, должны объединить наши силы и стремиться к освобождению наших братьев."
 third_arab_congress_events.2.a: "Едем в Каир!"

 third_arab_congress_events.3.t: "[FROM.GetName] приняли наше приглашение"
 third_arab_congress_events.3.d: "Поскольку жители единственного другого независимого арабского государства очень заинтересованы в отношениях с Портой, правительство [FROM.GetLeader] направило своих представителей в Каир. Желая посмотреть, превратим ли мы наши слова в действия, они отправили с ними важного представителя династии, чтобы придать обсуждению весомости."
 third_arab_congress_events.3.a: "Добро пожаловать!"

 third_arab_congress_events.4.t: "Йемен прислал своих представителей"
 third_arab_congress_events.4.d: "Несмотря на то, что йеменцы де-юре были частью Блистательной Порты и отказались помогать во время арабского восстания 1916 года, ни для кого не секрет, что они не питают теплых чувств к своему правительству в Константинии. Поэтому имам  [YEM.GetLeader] направил своего собственного представителя в Каир, несмотря на предупреждение Порты не делать этого.\n\nОднако, в отличие от некоторых других наших арабских союзников, Йемен не разделяет наших амбиций и по-прежнему сосредоточен на внутренних делах. Если османское правительство предложит им более выгодную сделку, чем нам, никого не удивит, что имам откажется от наших планов."
 third_arab_congress_events.4.a: "В конце концов они пришли..."

 third_arab_congress_events.5.t: "Иран прислал свою делегацию"
 third_arab_congress_events.5.d: "Несмотря на то, что Иран не получил приглашения на конференцию в знак протеста против обращения с арабами Хузестана при новом правительстве, Иран решил направить делегацию в Каир.\n\nПротест на улицах Каира, организованный иракскими политическими эмигрантами при поддержке партии "Иттихад", не смог остановить короля Фарука I, который подчеркнул важность исламской солидарности в эти трудные времена. После непродолжительной перепалки делегации было предоставлено место за столом в надежде на проведение открытых прений."
 third_arab_congress_events.5.a: "Мы приветствуем достопочтенных джентльменов из Тегерана"
 third_arab_congress_events.5.b: "Мы заслужили это место за столом!"

 third_arab_congress_events.6.t: "Идрис I прибыл в Каир"
 third_arab_congress_events.6.d: "Лидер ордена сенусси и противник поддерживаемого Османской империей Ахмеда Шарифа I, изгнанный Идрис прибыл в Каир. Поддерживая Антанту во время Великой войны в их борьбе на ливийской земле, лидер ордена сенусси был вынужден бежать в Египет, когда рухнул итальянский фронт. Однако многие ливийцы по-прежнему считают его законным правителем своей страны, и на протяжении многих лет он неуклонно готовил ячейки сопротивления к своему возвращению."
 third_arab_congress_events.6.a: "Настоящий герой!"

 third_arab_congress_events.7.t: "Слово берет делегация Сирии"
 third_arab_congress_events.7.d: "Представляющие тайные организации Бейрута и Дамаска, различные политические эмигранты из региона Великой Сирии приняли участие в конференции, чтобы выступить против османских обычаев в своем родном доме. Палестинская проблема занимала наиболее заметное место в их выступлениях, поскольку они рассматривают дальнейшее существование М.О.Д. как пощечину мусульманам по всему миру. Сирия должна быть освобождена от турецкой опеки, которая служит только на благо [ОТТ.GetLeader].\n\nМенее радикально настроенным ораторам также было предоставлено слово, и даже маронитам было позволено высказать свое мнение по этому вопросу. Проповедуя диалог между различными народами Большого Сирийского региона и даже рассматривая возможность заключения соглашения с еврейскими поселенцами, дебаты стали довольно жаркими. После того, как представитель из Яффо бросил сандалей в своего коллегу из Алеппо, был объявлен короткий перерыв, и нарушитель был удален из зала."
 third_arab_congress_events.7.a: "Мы поддерживаем братский народ Сирии!"

 third_arab_congress_events.8.t: "Слово берет делегация Ирака"
 third_arab_congress_events.8.d: "После того, как оратор из Иерусалима закончил свою речь об угрозе, которую сионизм представляет для всех нас, слово было предоставлено делегации из Ирака. Заявив о своей поддержке наших братьев в Палестине, они призвали присутствующих в зале не игнорировать вторую угрозу арабскому народу. Иран, возможно, пытается выставить себя другом арабов, но само собой разумеется, что она делает это только для того, чтобы ослабить своего соперника в Анатолии и эксплуатировать иракских арабов после того, как все уляжется.\n\nОднако, прежде чем представитель Мосула успел закончить свою речь, иранская делегация поднялась с места, протестуя против их обвинений. Не следует ли нам сосредоточиться на наших общих врагах вместо того, чтобы создавать новых, пока не покончено с первым? Поскольку температура в зале во второй раз начала стремительно повышаться, был объявлен еще один короткий перерыв."
 third_arab_congress_events.8.a: "Да здравствует свободный арабский Ирак!"

 third_arab_congress_events.9.t: "Гази ибн Фейсал принимает участие в конференции"
 third_arab_congress_events.9.d: "Сын арабского героя Фейсала ибн Хусейна, который командовал войсками хашимитов во время их восстания в 1916 году, Гази ибн Фейсал был отправлен в Египет в 1920 году своим дедом Шарифом Хусейном, когда османские войска двинулись на Мекку. Взятый под крыло Фуадом I, застенчивый и неопытный мальчик стал объединяющим фактором для сторонников хашимитов, которые бежали из Хиджаза, когда к власти пришел османский вали.\n\nПривыкшие к роскошной жизни при египетском дворе, к публикациям в газетах о его различных выходках, многие хиджази считают его оторванным от политических реалий региона. Его призывы ко второму восстанию в Хиджазе и созданию арабского государства, простирающегося от Мекки до Багдада, хотя и были очень страстными и лишь на короткое время прерваны стихотворением, которое он написал в честь своего отца, были почти полностью проигнорированы другими представителями. Когда его речь, наконец, закончилась, все представители вежливо захлопали."
 third_arab_congress_events.9.a: "Мы уважаем героев-Хашимитов!"

 third_arab_congress_events.10.t: "Фарук I осуждает сионистских поселенцев"
 third_arab_congress_events.10.d: "Услышав трагические рассказы о страданиях палестинских арабов от рук международной жандармерии и ознакомившись с последними "данными" о еврейской иммиграции, король Фарук I, наконец, вышел на сцену. Осудив гнусные деяния, с которыми пришлось столкнуться его братьям по вере, он пообещал сирийской делегации свою полную поддержку и пообещал, что палестинский народ вскоре будет освобожден. Последовали бурные аплодисменты.\n\nЗначительная еврейская община в самом Египте восприняла новость о его выступлении не слишком благосклонно. Эти евреи, которые пользуются довольно хорошими условиями жизни и политической свободой при египетском государстве, теперь опасаются, что эта открытая атака на "еврейскую угрозу" в Палестине может вызвать шок в их сторону."
 third_arab_congress_events.10.a: "Мы поддерживаем народ Палестины!"

 third_arab_congress_events.11.t: "Идрис умоляет о помощи"
 third_arab_congress_events.11.d: "После выступления Фарука I конференция приняла другой оборот. На смену шараде культурной конференции, посвященной чествованию арабского народа, пришло открытое обсуждение действий, которые необходимо предпринять против тех, кто угрожает арабскому народу.\n\nЛивийский лидер Идрис I, находящийся в изгнании, более десяти лет завоевывал поддержку, и, поскольку османские гарнизоны в Ливии теряют бдительность, а в столице разгораются жаркие политические дебаты, он планирует нанести удар в течение года и свергнуть Ахмеда Шарифа I. Услышав все добрые и страстные слова от других представителей, пришло время превратить это в оружие, рабочую силу и пожертвования, чтобы обеспечить успех своей борьбы."
 third_arab_congress_events.11.a: "Мы поддержим Идриса!"
 third_arab_congress_events.11.b: "Не можем ничего гарантировать..."

 third_arab_congress_events.12.t: "Амбиции Египта"
 third_arab_congress_events.12.d: "Поскольку представители всех уголков арабского мира собрались в Каире, пришло время проявить инициативу и определить курс, который мы будем определять. Нам, многочисленным политическим группам и ячейкам сопротивления, на которые опирается наша операция, придется действовать осторожно, если мы хотим сохранить единство арабских государств после их освобождения."
 third_arab_congress_events.12.a: "Египет стремится к присоединению Леванта"
 third_arab_congress_events.12.b: "Египет стремится к освобождению всех арабов!"

 third_arab_congress_events.13.t: "Египет объявляет о своих целях"
 third_arab_congress_events.13.d: "Собрав в Каире представителей со всех уголков арабского мира, Египет, наконец, приоткрыл завесу над своими грандиозными планами. Как некоторые уже опасались, а другие надеялись, [EGY.GetLeader] объявил о своих планах включить Левант в состав своего королевства. Вопрос об Ираке был оставлен открытым, но это намекало на создание дружественного арабского режима в регионе. Кроме того, Хиджаз будет передан их союзникам на полуострове в качестве платы за их помощь в предстоящей войне.\n\nМногие члены сирийской делегации покинули конференцию в гневе, поскольку они утверждают, что это просто переводит Сирию под новое управление вместо того, чтобы предоставить ей самоуправление, которого так явно требует ее народ. Жители Хиджаза также не в восторге от этого плана, поскольку считают своих собратьев по арабской пустыне слаборазвитыми и некультурными варварами, которые принесут больше вреда, чем пользы относительно богатому побережью."
 third_arab_congress_events.13.a: "Будем надеяться, что их высокомерие не приведет нас к краху"

 third_arab_congress_events.14.t: "Египет объявляет о своих целях"
 third_arab_congress_events.14.d: "Собрав в Каире представителей со всех уголков арабского мира, Египет, наконец, приоткрыл завесу над своими грандиозными планами. Продвигая самоуправление среди арабских государств, они будут стремиться сохранить различные составляющие Аравии в качестве отдельных единиц, которые могут самостоятельно решать, присоединяться ли к более большому арабскому государству.\n\nПредставители Ирака, Сирии и Хиджаза довольны тем, что они сохранят за собой право определять свое будущее, но на полуострове энтузиазм гораздо ниже. Они не только не увидят никаких выгод от своего участия в войне, но и, более того, им придется бороться с могущественным государством Хиджази."
 third_arab_congress_events.14.a: "Это будет, мягко говоря, интересно"

 third_arab_congress_events.15.t: "Египет объявляет о своих целях"
 third_arab_congress_events.15.d: "Поскольку итоговая резолюция Конференции, по-видимому, подразумевает создание независимого Ирака, свободного от иранского влияния, иранская делегация в гневе покинула ее. Повлияет ли это на их решение принять участие в войне с Блистательной Портой или, не дай Аллах, встать на сторону Турции, остается неясным, но это оставило неприятный осадок."
 third_arab_congress_events.15.a: "Все равно их не приглашали!"
 third_arab_congress_events.15.b: "Разум - это то, чего арабы не понимают!"

 third_arab_congress_events.17.t: "Создание Каирского Пакта"
 third_arab_congress_events.17.d: "В заключительной резолюции Конференции содержится обещание всех участников объединиться с оружием в руках, если кто-либо из них окажется в состоянии войны с турками. Эта резолюция, закладывающая основу военного союза, получила название "Каирский пакт" и знаменует собой создание первого подобного договора в современной арабской истории.."
 third_arab_congress_events.17.a: "В свое время мы присоединимся к Каирскому пакту"
 third_arab_congress_events.17.b: "Мы воздерживаемся от подписания"
 third_arab_congress_events.17.c: "За процветающую Аравию!"
 third_arab_congress_events.17.e: "Мы присоединимся, как только сможем"

 third_arab_congress_events.18.t: "Конференция подходит к концу"
 third_arab_congress_events.18.d: "Когда солнце садится за Нил, Фарук I завершает конференцию еще одной речью. Поблагодарив всех представителей за их участие, всем стало очевидно, какой впечатляющей демонстрацией египетской мощи это было на самом деле. Арабы из всех групп и социальных слоев пришли в восхищение от богатства Египта и наслаждаются свободой, которую предоставляет это по-настоящему независимое арабское государство. Более того, Египет попытался объединить различные силы в регионе и подтолкнуть их к идеологии, наиболее благоприятной для самого египетского государства."
 third_arab_congress_events.18.a: "Смотрите какой фейерверк!"

 third_arab_congress_events.19.t: "Принять участие в Третьем арабском конгрессе?"
 third_arab_congress_events.19.d: "Принимающей стороной является доминирующая арабская держава, Королевство Египет, и нам уже давно стало ясно, что Каир, как и мы, пытается оценить реакцию Османской империи и ее возможную силу в будущем конфликте.Несмотря на то, что мы не получили приглашения на их большой арабский конгресс, нам, возможно, потребуется принудительно присоединиться к переговорам, если мы хотим иметь право голоса в отношении будущего статуса Ирака и Машрика в целом."
 third_arab_congress_events.19.a: "Отправить делегацию в Каир!"
 third_arab_congress_events.19.b: "Совершенно очевидно, что они не хотят видеть нашего присутствия."

 third_arab_congress_events.20.t: "Каирский конгресс"
 third_arab_congress_events.20.d: "Лидеры многих стран Ближнего Востока, от Персии до Киренаики, собрались в Каире, чтобы обсудить османский вопрос.\n\nМногие предсказывают, что Египет будет доминировать в Конгрессе, поскольку она разработает план для Ближнего Востока без Османской империи. Однако время покажет, посеет ли это семена конфликта или мира."
 third_arab_congress_events.20.a: "Интересно, где я мог видеть это раньше..."

### News Events ###
 levant_crisis_news_events.1.t: "Левантийский кризис" #NT!
 levant_crisis_news_events.1.d: "Арабский национализм и турецкий империализм наконец оказались в противоречии, поскольку переговоры по Синайско-Палестинскому вопросу провалились после того, как Египет провел свою армию через Синайскую пустыню. Номинально объединившись до 1914 года, две ведущие державы на Ближнем Востоке теперь встали на путь решения судьбы региона. Несмотря на то, что египтяне могут рассчитывать на множество союзников в других арабских государствах, многие опасаются, что этого будет недостаточно, поскольку военный и экономический потенциал Турецкой империи на данный момент все еще значительно превосходит потенциал ее соперника.\n\nИностранные инвесторы наблюдают за конфликтом со страхом, поскольку нефтяные месторождения Ближнего Востока стали более важными, чем когда-либо, с падением власти в Соединенных Штатах." #NT!
 levant_crisis_news_events.1.a: "Но что насчет нефти?" #NT!
 levant_crisis_news_events.1.b: "Мы не можем позволить Империи пасть." #NT!

 levant_crisis_news_events.2.t: "Восстание в Йемене" #NT!
 levant_crisis_news_events.2.d: "Вельткриг нанес огромный ущерб Османской империи, и без того испытывающей трудности. Большие участки Аравийского полуострова были на долгие годы отрезаны от власти Блистательной Порты из-за успехов арабского восстания. Тем не менее, благодаря Ганноверскому договору йеменский вилайет был в некоторой степени возвращен под власть Османской империи - по крайней мере, теоретически.\nВ течение многих лет Йемен в основном вел свои собственные дела, а взгляд султана был сосредоточен на его собственных внутренних проблемах. В связи с вспыхнувшим конфликтом в Суэце и по всей Святой Земле Йемен снова оказался отрезанным от основной части османской армии. Воспользовавшись этой возможностью в сочетании с ощутимой слабостью Османского государства, имам публично заявил о создании нового независимого королевства." #NT!
 levant_crisis_news_events.2.a: "Очередной удар по султану." #NT!

 levant_crisis_news_events.3.t: "Кипрское восстание" #NT!
 levant_crisis_news_events.3.d: "Вернувшись под турецкое владычество после краха Британии, остров Кибрис или Кипр, где преобладали греческие православные, никогда не имел хороших отношений с Портой. Их движение за отделение, единственной целью которого является Энозис (воссоединение с Грецией), в течение последних нескольких лет неуклонно набирало поддержку и власть, пока сегодня оно не достигло кульминации с открытым нападением на губернаторские офисы османской администрации.\n\nВо главе с архиепископом Леонтием II, остров потрясен насилием и терроризмом, поскольку агенты греческого правительства начали проникать на остров, чтобы помочь повстанцам." #NT!
 levant_crisis_news_events.3.a: "Сколько еще смогут терпеть османы?" #NT!
 levant_crisis_news_events.3.b: "Эти надоедливые греки." #NT!

 levant_crisis_news_events.4.t: "Второе арабское восстание" #NT!
 levant_crisis_news_events.4.d: "Население Хиджаза, где произошло первое арабское восстание под руководством Шарифа Хусейна ибн Али, снова восстало против своих турецких повелителей. Однако, в отличие от аналогичных движений в Сирии, гораздо менее вероятно, что это восстание увенчается большим успехом, поскольку ястребы из внутренних арабских территорий смотрят на то, что они считают легкой добычей.\n\nПереговоры с Египтом о возможном присоединении к Каирскому пакту уже начаты, но вполне вероятно, что на их вступление наложат вето другие амбициозные арабские полевые командиры." #NT!
 levant_crisis_news_events.4.a: "Будем надеяться, что на этот раз они добьются большего успеха." #NT!
 levant_crisis_news_events.4.b: "Они будут раздавлены!" #NT!

 levant_crisis_news_events.5.t: "Великое сирийское восстание" #NT!
 levant_crisis_news_events.5.d: "Находясь под турецким правлением, арабский народ Великой Сирии наконец решил сбросить иго и присоединился к своим арабским братьям в Каире. Борясь за освобождение Машрика и создание нового, арабского Ближнего Востока, сирийцы всех религий и этнических групп объединяются, чтобы избавиться от турецкого правления.\n\nАмбиции отдельных лидеров и разногласия между различными партнерами по Каирскому пакту, однако, могут привести к проблемам, если общая угроза будет решена, поскольку идеи Великой независимости Сирии несовместимы с проектами Фарука об арабском государстве, управляемом из Каира." #NT!
 levant_crisis_news_events.5.a: "Еще один удар по Блистательной Порте." #NT!
 levant_crisis_news_events.5.b: "Их дело безнадежно." #NT!

 levant_crisis_news_events.6.t: "Война за Хасаб" #NT!
 levant_crisis_news_events.6.d: "Полуостров Хасаб, анклав штата Маскати, является одним из наиболее важных пунктов на Ближнем Востоке. Имея возможность в одиночку полностью отрезать Ормузский пролив, тем самым отрезав Иран и Ирак от мировой экономики, он стал занозой в глазу как [TUR.Capital.GetCapitalVictoryPointName], так и Тегерана.\n\nВоенно-морские маневры персидского флота вокруг пролива привели к росту напряженности, кульминацией которой стала военная оккупация анклава Тегераном, что вызвало ультиматум со стороны Блистательной Порты. Не получив ответа, османский флот рано утром открыл огонь по Хасабу, начав тем самым военные действия между двумя региональными державами." #NT!
 levant_crisis_news_events.6.a: "Ближний Восток все глубже погружается в хаос." #NT!

 levant_crisis_news_events.7.t: "Восстание Барзинджи" #NT!
 levant_crisis_news_events.7.d: "Лидер двух неудачных попыток создания курдского королевства в Сулеймании, печально известный шейх Махмуд Барзинджи еще раз провозгласил независимость своего курдского государства, получив поддержку со стороны различных племен Сулеймании. Хотя между Тегераном и [TUR.Capital.GetCapitalVictoryPointName] было заключено соглашение о прекращении огня, ограничивающее поддержку курдских движений по обе стороны границы, похоже, что Иран вышел из соглашения.\n\nНесмотря на иностранную поддержку, маловероятно, что восстание Махмуда увенчается успехом, поскольку даже среди курдских племен мало кто считает его законным правителем Курдистана." #NT!
 levant_crisis_news_events.7.a: "Удачи!" #NT!
 levant_crisis_news_events.7.b: "Без союзников они потеряны." #NT!

 levant_crisis_news_events.8.t: "Война за Шатт-эль-Араб" #NT!
 levant_crisis_news_events.8.d: "Протокол Шатт-эль-Араб, подписанный в 1913 году под руководством британских и российских атташе в Константинополе и Тегеране, должен был решить многовековой пограничный конфликт между Османской и Персидской империями путем определения границы дельты Тигра и Евфрата.\n\nНазывая договор несправедливым и благоприятствующим османам, Иран предъявил туркам ультиматум, требуя большой участок земли «для обеспечения персидских интересов». [TUR.Capital.GetCapitalVictoryPointName] проигнорировал ультиматум, заявив, что протоколы 1913 года уже были слишком щедрыми. Не получив ответа, персидские войска впоследствии начали бомбардировку крепости Фао, начав открытую войну против турок." #NT!
 levant_crisis_news_events.8.a: "Очередная персидско-османская война для учебников истории..." #NT!

 levant_crisis_news_events.9.t: "Армянское восстание" #NT!
 levant_crisis_news_events.9.d: "Находясь под османской военной оккупацией в течение почти двух десятилетий, армянское сопротивление использовало войну между [TUR.Capital.GetCapitalVictoryPointName] и Тегераном, чтобы восстановить независимость Армении, изгнав османский гарнизон и подняв свой флаг в знак мятежа.\n\nХотя многие сомневаются в жизнеспособности восстания, застрявшего между молотом и наковальней, их мужество и решимость не остались незамеченными за рубежом, и многие страны социалистического блока немедленно признали их независимость." #NT!
 levant_crisis_news_events.9.a: "Удачи!" #NT!
 levant_crisis_news_events.9.b: "Ничего, кроме отвлечения." #NT!
