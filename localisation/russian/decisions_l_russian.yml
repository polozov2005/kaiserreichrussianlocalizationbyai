 seize_some_trains_woo: "Реквизировать гражданские поезда"
 seize_some_trains_woo_desc: "Торговые железнодорожные компании контролируют нашу инфраструктуру. С нависшей угрозой войны мы вполне имеем право реквизировать оборудование для государственных нужд."
 war_propaganda_casualties: "Призывать к героизму"
 war_propaganda_casualties_desc: "Хотя число погибших растёт, наш народ должен усвоить, что только в бою куются герои."
 war_propaganda_convoys: "Поощрять бережливость"
 war_propaganda_convoys_desc: "Даже гражданские могут помочь выиграть войну — заботой и вниманием к использованию материалов каждый грамм стали можно сделать вдвое ценнее для военных усилий."
 war_propaganda_bombing: "Поднимать боевой дух"
 war_propaganda_bombing_desc: "Хотя бомбы падают повсюду вокруг нас, наши храбрые рабочие продолжают трудиться. Именно этим духом мы одержим победу."
 war_support_during_war: "Поддержка войны"
 war_propaganda_radio_industry: "Радиопропаганда"
 war_propaganda_radio_industry_desc: "Технологии развились до того уровня, когда значительная часть нашего населения имеет доступ к домашнему радиоприёмнику. Государственные СМИ — идеальный инструмент для разжигания военных усилий в сердцах нашего народа."
