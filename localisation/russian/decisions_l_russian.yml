 IMPORTED_FILM_INDUSTRY: "Импортировать пропагандистские фильмы союзников"
 DOMESTIC_FILM_INDUSTRY_DESC: "[ROOT.GetAdjective] киноиндустрия значительно развилась за последнее десятилетие. С населением, жаждущим развлечений, мы можем извлечь выгоду из кинематографического производства, предназначенного для пробуждения патриотических чувств."
 IMPORTED_FILM_INDUSTRY_DESC: "Наши покровители и союзники стратегически используют пропагандистские фильмы. При небольших инвестициях мы могли бы демонстрировать эти постановки по всей нашей стране, чтобы разжечь военные усилия среди нашего народа."
