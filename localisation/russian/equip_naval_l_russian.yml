l_russian:
 naval_equipment: "Корабли"

 ship_hull_submarine_1_desc: "Первые подводные военные корабли, действительно способные к эффективным боевым действиям, эти конструкции представляют собой значительное улучшение по сравнению с предшественниками. Замена преимущественно бензо-электрических двигателей первых подлодок на дизель-электрические значительно увеличила дальность и скорость на поверхности. В бою с вражескими кораблями они действуют в основном как погружающиеся лёгкие торпедные катера, но не имеют подводной скорости или выносливости, чтобы оставаться под водой дольше относительно коротких периодов. Именно такие подлодки использовались основными военно-морскими державами во время Мировой войны."
 ship_hull_submarine_2_desc: "Эволюция ранних конструкций подлодок: некоторые из этих кораблей развивали идеи «крейсерских» подлодок с более крупными орудиями и большим акцентом на действия на поверхности, в то время как другие двигались в противоположном направлении, стремясь увеличить подводные характеристики и производительность."
 ship_hull_submarine_3_desc: "Успехи некоторых ранних конструкций в увеличении подводной дальности, скорости и общих возможностей привели к повороту в развитии подлодок от «крейсерских» типов обратно к аппаратам с большим акцентом на подводные характеристики. Значительно улучшенные по сравнению с ранними типами, эти подлодки несут мощные торпедные залпы и представляют законную угрозу почти всем надводным кораблям. Однако они всё ещё ограничены по продолжительности погружения, дальности и скорости, и остаются уязвимыми на поверхности, особенно для авиации."
 ship_hull_submarine_4_desc: "Благодаря значительно увеличенной ёмкости аккумуляторов, передовым системам обновления воздуха в погружённом состоянии и общим усовершенствованным конструкциям, это первые подлодки, предназначенные для пребывания под водой большую часть времени нахождения в море. Таким образом, они ознаменовали massive сдвиг в военно-морской войне и возвышение подлодок до статуса настоящих ужасов. Такие корабли дают возможность доминировать в океанах тем нациям, которые их разработали и развернули."

 ship_hull_light_1_desc: "Мировая война породила новый спрос на эсминцы — они требовались не только для защиты флотов, но и были растянуты тонким слоем для защиты линий снабжения Антанты. Чтобы удовлетворить эту потребность, конструкции эсминцев были оптимизированы и запущены в массовое производство. Корабли этой эпохи обычно имеют водоизмещение 1000 тонн и развивают максимальную скорость 34 узла, неся пару торпед крупнее, чем их предшественники."
 ship_hull_light_2_desc: "К 1935 году, с появлением всё более мощных новых конструкций самолётов и развёртыванием нескольких флотами большего числа авианосцев, хотя всё ещё оставались сомнения о полезности авианосцев в открытом бою, растущая обеспокоенность потенциальной угрозой самолётов для кораблей усиливалась. Немецкие операции авианосцев во время китайской интервенции и продолжающиеся британские учения показали миру, что авианосец имеет свою роль во флоте. В результате эсминцы получили двухцелевое основное вооружение, значительно улучшив их роль в ПВО и вновь повысив их полезность. Эти корабли, водоизмещением до 2500 тонн, часто несут увеличенные торпедные залпы, чтобы компенсировать сниженную торпедную нагрузку на более современных крейсерах."
 ship_hull_light_3_desc: "С началом Второй мировой войны военно-морским силам мира потребовались дешёвые платформы ПВО. Успех в боях авианосцев показал, что они подходят не только для разведки и борьбы с авианосцами, но и необходимы для современной борьбы с капитальными кораблями. Передовые противолодочные технологии также играют ключевую роль в борьбе с главной угрозой для конвоев, они и платформы ПВО усилили спрос на большее число эсминцев. Хотя ранее инвестиции в эсминцы снижались в пользу крейсеров и новых линейных крейсеров, эсминцы начинают возвращаться в авангард как неотъемлемая часть как флота, так и конвойной системы. Часто не крупнее предшественников, они гораздо более технологически продвинуты, преимущественно с гладкопалубной конструкцией и гораздо более мощным торпедным вооружением."
 ship_hull_light_4_desc: "К концу Второй мировой войны флоты мира были вынуждены адаптироваться к новым подлодкам, способным оставаться под водой почти бесконечно, авианосцам, нагруженным самолётами, способными уничтожать капитальные корабли, тогда как крупнокалиберные крейсеры быстро теряли актуальность перед лицом авианосцев и подлодок. Будущая роль эскорта для флота в умах большинства теоретиков почти полностью переходит к эсминцам, с двухцелевыми скорострельными башнями, уничтожающими любые самолёты, осмелившиеся пересечь их курс для пикирующего бомбометания. Водоизмещение этих судов также увеличилось, часто достигая 3000 тонн, поскольку конструкторы нагружают их всё большим числом зенитных орудий, а также более крупными главными орудиями."

 ship_hull_cruiser_1_desc: "Более качественная броня и развитие паротурбинных двигателей привели к появлению лёгких броненосных крейсеров. Более быстрые и лучше защищённые, чем бронепалубные крейсеры, эти конструкции начали вытеснять их в 1910-х годах. Хотя они легче и меньше других современных кораблей, они всё же остаются настоящими крейсерами, сохраняя увеличенный радиус действия и автономность для независимых действий по всему миру."
 ship_hull_cruiser_2_desc: "Межвоенный период принёс усовершенствования более крупных крейсеров, появившихся со времён Дредноутной гонки. Поскольку политика и финансы всё ещё ограничивали многие военно-морские державы, произведённые конструкции лишь незначительно превышали размер предыдущего поколения, вместо этого получая улучшения огневой мощи за счёт использования более крупных орудий или растущего внедрения тройных башен и четырёхтрубных торпедных аппаратов. Растущая важность авиации в морской войне также привела к внедрению высокоугольных двухцелевых установок, дополненных растущим массивом зенитных автоматов."
 ship_hull_cruiser_3_desc: "Благодаря увеличенному доступному финансированию, новые крейсеры, построенные в конце межвоенного периода и в начале Второй мировой войны, снова немного увеличились в размере. Хотя калибр основного вооружения остался без изменений, за редким исключением, их огневая мощь была увеличена добавлением дополнительной башни или увеличением числа орудий в каждой башне. Вспомогательное вооружение было улучшено дополнительными спаренными двухцелевыми орудиями и ещё большим количеством специализированного зенитного вооружения, часто связанного с улучшенными системами управления огнём. В этом поколении также наблюдается растущее внедрение радарных систем на крейсеры."
 ship_hull_cruiser_4_desc: "Крейсеры конца войны и раннего послевоенного периода остаются схожими с ранними, но включают многочисленные извлечённые уроки. Поскольку самолёты подтвердили себя как одна из величайших угроз для кораблей, конструкторы сосредоточились на дальнейшем улучшении возможностей ПВО за счёт лучшего управления огнём, улучшения координации между батареями и радарами. Некоторые флоты также экспериментируют с механизмами автоматической перезарядки для главного вооружения, dramatically повышая их скорострельность."

 ship_hull_heavy_1_desc: "Спроектированные незадолго до начала Мировой войны и завершённые во время её бури, эти классы представляют высший уровень военно-морского развития до начала того конфликта. Они были ведущими кораблями флота во время войны и остаются чрезвычайно мощными ещё долго после её окончания. Хотя они заметно быстрее дредноутов, их наиболее заметной отличительной чертой является усиленное вооружение — они несут от восьми до десяти главных орудий, большинство в двойных башнях, но некоторые в новых тройных. Их разрушительная огневая мощь и тяжёлая броня гарантировали, что они будут в центре боевых флотов в Мировую войну, но эти постоянные улучшения сопровождались стремительно растущими ценами. Ещё больше, чем корабли до них, эти классы требовали огромных инвестиций, хотя они были лишь тенью того, что должно было прийти."
 ship_hull_heavy_2_desc: "Конец Дредноутной гонки привёл к практически полному прекращению крупномасштабного военно-морского строительства, а военно-морское финансирование, выросшее до огромных уровней в период до 1925 года, наконец рухнуло. «Великие державы» потратили следующее десятилетие на медленное завершение кораблей, уже находившихся в строительстве, сосредоточив развитие на более мелких судах, которые было легче провести через военно-морские бюджеты. Лишь в начале 30-х годов великие державы начали экспериментировать с конструкциями быстроходных линкоров. Эти конструкции линкоров гораздо более современны, с улучшенными дальномерами, мощными двигателями на жидком топливе и орудиями калибра 16-18 дюймов, но, как правило, являются итеративными, фокусируясь больше на доставке мощного корабля по лучшей цене, чем на радикальном улучшении по сравнению с предшественниками."
 ship_hull_heavy_3_desc: "С Второй мировой войной на горизонте и международной напряжённостью выше, чем когда-либо, конструкторы стремятся построить новое поколение кораблей для боя в предстоящей войне. В то время как некоторые нации перенесли свои военно-морские надежды на авианосцы, другие по-прежнему настаивают, что авианосец может выполнять только вспомогательную роль, а не заменять основную противокорабельную роль линкора. Эти нации вместо этого пересматривают свои новые конструкции, сосредотачиваясь на улучшенных схемах бронирования, более эффективных орудиях и башнях, а также улучшенных скоростях."
 ship_hull_heavy_4_desc: "К концу Второй мировой войны великие державы начали понимать: военно-морская авиация доказала своё превосходство над всеми артиллерийскими капитальными кораблями. Однако несколько наций продолжают разработку линкоров как платформ для береговой бомбардировки, проектов престижа и поддержки авианосцев в составе флота или даже пытаются возродить их старую роль. Некоторые конструкторы загружают свои линкоры зенитными батареями, чтобы повысить шансы на выживание. Хотя многие из этих линкоров могут продолжать действовать ещё долгие годы, некоторыми нациями они уже считаются устаревшими."

 ship_hull_carrier_conversion_ca_desc: "Изучив опыт использования гидроавиатранспортов, те флоты, у которых были ресурсы, начали работу над следующим поколением кораблей, способных нести самолёты в море. В отличие от предшественников, эти авианосцы спроектированы с полётными палубами, позволяющими самолётам как взлетать с них, так и возвращаться и садиться на них. Переоборудованные из гражданских судов и гидроавиатранспортов, большинство этих кораблей ограничены относительно тесными полётными палубами и ангарами, но они определённо демонстрируют, что корабли способны эффективно эксплуатировать воздушные соединения в море."
 ship_hull_carrier_1_desc: "Разработанные в 30-х годах, эти корабли предназначены для обеспечения воздушной разведки и лёгкого истребительного прикрытия для флотов, ориентированных преимущественно на более «конвенциональные» силы военных кораблей. Их дальность значительно увеличена, и были предприняты усилия, чтобы сделать их достаточно быстрыми для сопровождения флотов, действующих на полной скорости в открытом океане."
 ship_hull_carrier_2_desc: "Поскольку крупные военно-морские боевые операции в эпоху морской авиации продемонстрировали способность самолётов серьёзно влиять на морские сражения, многие державы обнаружили, что отстали в развитии своих авианосных сил. Хотя флотские авианосцы быстро показали себя как самые мощные среди своих собратьев, они также являются massive кораблями, требующими много времени и ресурсов для постройки. В спешке увеличить способность проецировать воздушную мощь в океаны военно-морские державы обратились к таким конструкциям, увеличенным версиям существующих лёгких авианосцев, чтобы попытаться быстро усилить свой потенциал морской авиации."
 ship_hull_carrier_3_desc: "Продолжение развития конструкции авианосцев привело к гораздо более крупным моделям, эти корабли приближаются по размеру к первым флотским авианосцам, одновременно включая все конструктивные улучшения, сделанные за прошедшие годы. Большинство из них имеют значительную броневую защиту и мощную зенитную огневую мощь, оставаясь при этом высоконадёжными механически. Однако они отказались от концепции крупнокалиберного вспомогательного вооружения в пользу меньших двухцелевых орудий."

 ship_hull_super_heavy_1_desc: "Быстрое увеличение ресурсов, выделяемых на военно-морское строительство после окончания крупного сухопутного конфликта во время Мировой войны, первоначально породило эти конструкции, в которых зародились тенденции к внезапному росту размера, огневой мощи, брони, калибра и, конечно, стоимости. Такие суда отделяли ведущих военно-морских держав мира от mere претендентов на величие, но они имеют свои проблемы; их быстрое развитие и спешное строительство привели к конструктивным недостаткам и постоянным механическим проблемам. Эти конструкции вооружены восемью-десятью 18-дюймовыми или эквивалентными главными орудиями и имеют защиту, позволяющую идти в бой с аналогично вооружёнными кораблями. Когда Дредноутная гонка достигла своего пика, были задуманы эти настоящие монстры. Гораздо большие по размеру и огневой мощи, чем всё, что было до них, их стоимость ошеломляет, и немногие нации могут позволить себе даже рассмотреть их постройку."

 ship_hull_light_1: "Межвоенный лёгкий корабль"
 ship_hull_light_2: "Базовый лёгкий корабль"
 ship_hull_light_3: "Улучшенный лёгкий корабль"
 ship_hull_light_4: "Продвинутый лёгкий корабль"

 ship_hull_cruiser: "Крейсер"
 ship_hull_cruiser_desc: "Среднее экранное судно. Его основная задача — защищать капитальные корабли от вражеских лёгких кораблей, но он также может выпускать мощные торпеды, способные повредить более крупные корабли."
 ship_hull_cruiser_1: "Межвоенный крейсер"
 ship_hull_cruiser_2: "Базовый крейсер"
 ship_hull_cruiser_3: "Улучшенный крейсер"
 ship_hull_cruiser_4: "Продвинутый крейсер"

 ship_hull_heavy: "Тяжёлый корабль"
 ship_hull_heavy_desc: "Высший символ военно-морской мощи. Эти massive, heavily бронированные behemoths, такие как линейные крейсеры, линкоры или даже дредноуты, по-прежнему вызывают уважение в открытом море, даже когда некоторые эксперты ставят под вопрос их роль в эпоху авиации и подлодок."
 ship_hull_heavy_1: "Межвоенный тяжёлый корабль"
 ship_hull_heavy_2: "Базовый тяжёлый корабль"
 ship_hull_heavy_3: "Улучшенный тяжёлый корабль"
 ship_hull_heavy_4: "Продвинутый тяжёлый корабль"

 ship_hull_heavy_modern: "Современный линкор"

 ship_hull_carrier: "Авианосец"
 ship_hull_carrier_desc: "Капитальный корабль, способный нести крылья мощных палубных самолётов в бой. Также полезен как плавающий аэродром, который можно разместить у побережья вашего врага."
 ship_hull_carrier_conversion_bb: "Переоборудованный линкор"
 ship_hull_carrier_conversion_bb_desc: "Первые крупные авианосцы, эти корабли в основном построены на корпусах, изначально предназначенных для капитальных военных кораблей, но по разным причинам переоборудованных и завершённых как авианосцы. Лишь несколько флотов строили такие корабли, и их конструкции сильно различались; их авиавместимость варьировалась от шести десятков до более сотни. Однако есть постоянные элементы, такие как сохранённые тяжёлые броневые пояса и другие особенности артиллерийских кораблей. Полуэкспериментальные и ненадёжные, они всё же остаются невероятно грозным оружием и заложили фундамент для следующих поколений флотских авианосцев."
 ship_hull_carrier_conversion_ca: "Переоборудованный крейсер"
 ship_hull_carrier_1: "Базовый авианосец"
 ship_hull_carrier_2: "Улучшенный авианосец"
 ship_hull_carrier_3: "Продвинутый авианосец"

 ship_hull_carrier_modern: "Современный авианосец"
 ship_hull_carrier_modern_desc: "Крупнейшие и самые продвинутые авианосцы, способные использовать новейшие технологии, оборудование и достижения. Они являются воплощением оружия «высшего класса»."

 ship_hull_submarine: "Подводная лодка"
 ship_hull_submarine_desc: "Далеко ушедшие от crude лодок Великой войны, современные подлодки способны как никогда раньше и могут угрожать даже самому большому кораблю за весьма умеренную цену."
 ship_hull_submarine_1: "Межвоенная подлодка"
 ship_hull_submarine_2: "Базовая подлодка"
 ship_hull_submarine_3: "Улучшенная подлодка"
 ship_hull_submarine_4: "Продвинутая подлодка"

 ship_hull_pre_dreadnought: "Преддредноут"
 ship_hull_pre_dreadnought_desc: "Следовали конструкции британского класса «Маджестик» конца 1890-х годов. Дредноуты пришли на смену броненосцам 1870-х и 1880-х годов. Построенные из стали и защищённые закалённой стальной бронёй, преддредноуты несли главную батарею из очень тяжёлых орудий в барбетах, поддерживаемую одной или несколькими вспомогательными батареями более лёгкого вооружения.\n\nПоскольку конструкция «Дредноута» сделала их устаревшими ещё до Мировой войны, а в сочетании с гигантским ростом числа дредноутов за предыдущие три десятилетия, лишь немногие из них всё ещё находятся в строю."
 ship_hull_armoured_cruiser: "Броненосный крейсер"
 ship_hull_armoured_cruiser_desc: "В годы сразу после Мировой войны великие военно-морские державы начали проектирование нового поколения всё более мощных линкоров, в котором линейные крейсеры должны были играть роль «быстроходных линкоров». Их конструкция задумывалась как промежуточный класс, с орудиями и дальностью для боя со старыми линкорами на их условиях, а также скоростью для погони за лёгкими крейсерами и ухода от более современных линкоров, которым они не могли противостоять напрямую. В первых попытках сделать это немецкие инженеры совершили почти невозможное, соединив вооружение уровня почти линкора с корпусом крейсера. Результатом стал корабль, превосходящий по огневой мощи любой другой известный крейсер, но также дорогой, относительно медленный и слабо бронированный. Эти корабли, принятые многими странами как новые «броненосные крейсеры», являются самыми тяжёлыми экранными судами, которые когда-либо видел мир."
 ship_hull_cruiser_coastal_defense_ship: "Корабль береговой обороны"
 ship_hull_cruiser_coastal_defense_ship_desc: "Корабли береговой обороны — небольшие, часто размером с крейсер военные корабли, пожертвовавшие скоростью и дальностью ради брони и вооружения. Они обычно привлекательны для наций, которые либо не могли позволить себе полноразмерные линкоры, либо могли обойтись специально спроектированными судами с малой осадкой, способными к прибрежным операциям у собственных берегов."
 ship_hull_torpedo_cruiser: "Торпедный крейсер"
 ship_hull_torpedo_cruiser_desc: "Основанные на доктрине Jeune École («Молодая школа»), которая утверждала, что небольшие военные корабли, вооружённые торпедами, могут эффективно и дёшево побеждать гораздо более крупные линкоры, эти крейсеры в первую очередь вооружены торпедами. Большинство торпедных крейсеров вышли из фавора в большинстве флотов в 1890-х годах, хотя многие другие флоты продолжали приобретать их до начала 1900-х. Современные торпедные крейсеры спроектированы для использования торпед, которые подлодки не могут нести."
 ship_hull_super_heavy_1: "Дредноут"
 ship_hull_cruiser_submarine: "Крейсерская подлодка"
 ship_hull_cruiser_submarine_desc: "Значительно крупнее предшествующих подлодок, эти конструкции относятся к «крейсерскому» типу, предназначены для дальних независимых операций в commerce raiding и нацелены на лучшую подготовку к бою с вражескими лёгкими военными кораблями на поверхности. В связи с этим они несут более тяжёлое артиллерийское вооружение и имеют улучшенную скорость на поверхности. Однако их подводные характеристики остаются ограниченными."
 ship_hull_midget_submarine: "Малая подлодка"
 ship_hull_midget_submarine_desc: "Подлодка небольшого размера, управляемая малым экипажем. Её сниженная дальность и вместимость вооружения компенсируются высокой скоростью производства."
 ship_hull_fleet_submarine: "Флотская подлодка"
 ship_hull_fleet_submarine_desc: "Подлодки, которые благодаря своей большой операционной дальности могут действовать как эскорт и поддержка надводного флота."
 ship_hull_carrier_submarine: "Подлодка-авианосец"
 ship_hull_carrier_submarine_desc: "Крупный корпус подлодки, способный размещать и запускать самолёты, способные выполнять различные воздушные миссии."
 ship_hull_nuclear_submarine: "Атомная подлодка"
 ship_hull_nuclear_submarine_desc: "Благодаря ядерным реакторам наши подлодки могут действовать под водой очень долго, сохраняя высокую скорость, что делает их чрезвычайно смертоносным инструментом в нашем арсенале."
 ship_hull_mega_carrier: "Ледяной авианосец"
 ship_hull_mega_carrier_desc: "Гигантский авианосец, созданный из экспериментальных ледяных композитов, таких как пайкрит, что позволяет обычным самолётам действовать с него, увеличивая дальность нашей морской авиации."
 support_ship_hull: "Вспомогательное судно"
 support_ship: "Вспомогательное судно"
 support_ship_1: "Вспомогательное судно"
 support_ship_1_desc: "Вспомогательные суда — небоевые корабли, ориентированные на логистическую поддержку боевого флота, продлевающие операционную выносливость за счёт резервных запасов топлива и снабжения."
 support_ship_2: "Улучшенное вспомогательное судно"
 support_ship_2_desc: "Операционный опыт позволяет создать более продвинутое и capable вспомогательное судно, способное поддерживать боевой флот на ещё больших расстояниях."
 repair_ship_hull: "Ремонтное судно"
 repair_ship: "Ремонтное судно"
 repair_ship_1: "Ремонтное судно"
 repair_ship_1_desc: "Ремонтные суда несут тяжёлое аварийно-спасательное оборудование, которое может означать разницу между сильно повреждённым кораблём, способным дотянуть до порта, и затонувшим."
 repair_ship_2: "Улучшенное ремонтное судно"
 repair_ship_2_desc: "Ещё более capable ремонтное судно с оборудованием высшего класса, способное спасти дружественные военные корабли от всех повреждений, кроме самых критических."
 ship_hull_escort_carrier: "Эскортный авианосец"
 ship_hull_escort_carrier_desc: "Меньший и более дешёвый авианосец, обычно используемый для эскорта конвоев и противолодочной войны, а не для прямых флотских действий. Несёт небольшую, но полезную авиагруппу."

 screen_ship: "Экран"
 capital_ship: "Капитальные корабли"
