 ace_promoted.1.t: "Лётчик-ас повышен"
 ace_promoted.2.t: "Появился дикий ас"
 ace_promoted.1.d: "Немногие идут на такие риски, как храбрые пилоты [Root.GetAdjective] военно-воздушных сил. [From.GetName] [From.GetSurname], умелый пилот, известный под позывным [From.GetCallsign], отличился [From.GetHerselfHimself], не только вернувшись живым из недавней миссии над [From.GetMissionRegion], но и одержав значительные победы во многих критических схватках.\n\nПредставленный как яркий пример [Root.GetAdjective] мужества, недавнее повышение [From.GetName] получило широкую огласку. Хотя народ может воспринимать войну скорее как ад, чем славу, многие рады видеть, что всё ещё есть герои, за которыми можно сплотиться."
 ace_promoted.1.d_major: "Немногие идут на такие риски, как храбрые пилоты [Root.GetAdjective] военно-воздушных сил. [From.GetName] [From.GetSurname], умелый пилот, известный под позывным [From.GetCallsign], отличился [From.GetHerselfHimself], не только вернувшись живым, но и пилотируя свой [From.GetWing] с огромным мастерством. Недавно [From.GetName] выполнял миссию над [From.GetMissionRegion] и сыграл ключевую роль в успехе этого критического столкновения.\n\nПредставленный как яркий пример [Root.GetAdjective] мужества, недавнее повышение [From.GetName] получило широкую огласку. Хотя народ может воспринимать войну скорее как ад, чем славу, многие рады видеть, что всё ещё есть герои, за которыми можно сплотиться."
 ace_promoted.1.a: "Кто рискует — побеждает."

 ace_died.1.t: "[From.GetCallsign] сбит над [From.GetMissionRegion]"
 ace_died.1.d: "Один из самых известных [From.GetAceType]-асов [From.Owner.GetName], [From.GetFullName], сгорел в пламени при исполнении служебного долга во время миссии над [From.GetMissionRegion]. К сожалению, поскольку [From.GetSheHe] давно является публичной фигурой, гибель [From.GetCallsign] серьёзно деморализует многих людей, которые смотрели на [From.GetHerHim] как на пример.\n\nХотя мы хотели бы скрыть это событие от народа, отсутствие публичных появлений [From.GetName] вскоре вызвало бы подозрения. В конечном счёте, смерть [From.GetHerHis] — ещё одна часть легенды, которая, будем надеяться, проживёт дольше наших текущих трудностей."
 ace_died.1.d_major: "Один из самых известных [From.GetAceType]-асов [From.Owner.GetName], [From.GetFullName], погиб при исполнении служебного долга. Пилоты, вернувшиеся с миссии, сообщают, что видели, как [From.GetHerHis] [From.GetWingShort] сгорел в пламени над [From.GetMissionRegion] после получения тяжёлого вражеского огня. К сожалению, поскольку [From.GetSheHe] давно является публичной фигурой, гибель [From.GetCallsign] серьёзно деморализует многих людей, которые смотрели на [From.GetHerHim] как на пример.\n\nХотя мы хотели бы скрыть это событие от народа, отсутствие публичных появлений [From.GetName] вскоре вызвало бы подозрения. В конечном счёте, смерть [From.GetHerHis] — ещё одна часть легенды, которая, будем надеяться, проживёт дольше наших текущих трудностей."
 ace_died.1.a: "Живая легенда всё же лучше."

 ace_killed_by_ace.1.t: "[From.GetFullName] сбит [Prev.GetCallsign]"
 ace_killed_by_ace.1.d: "Пилоты, вернувшиеся из [From.GetMissionRegion], сообщают, что эскадрилья [Prev.Owner.GetAdjective] самолётов под командованием печально известного [Prev.GetCallsign] сосредоточилась на преследовании [From.GetCallsign]. После уклонения от нескольких очередей [Prev.Owner.GetAdjective] и сбития ряда вражеских самолётов, [From.GetCallsign] был подавлен [Prev.GetCallsign], который, как сообщается, переиграл [From.GetHerHim] в манёвре и пробил топливные баки точным попаданием. Самолёт [From.GetName] [From.GetSurname] загорелся и ушёл в штопор над [From.GetMissionRegion] в яростном пламени.\n\n[From.GetFullName] проявил великое мужество на протяжении [From.GetHerHis] службы и был примером для многих. Потеря этого национального героя — большой удар для [From.Owner.GetAdjective] ВВС и разрушительный удар для нашей нации в целом. Знание того, что пока мы скорбим, [Prev.Owner.GetName] празднует [Prev.GetFullName] как героя, делает трагедию ещё более тяжёлой."
 ace_killed_by_ace.1.d_major: "Пилоты, вернувшиеся из [From.GetMissionRegion], сообщают, что эскадрилья [Prev.Owner.GetAdjective] самолётов под командованием печально известного [Prev.GetCallsign] сосредоточилась на преследовании [From.GetCallsign]. После сбития ряда вражеских самолётов и уклонения от нескольких очередей [Prev.Owner.GetAdjective], [From.GetCallsign] был подавлен [Prev.GetCallsign] на своём [Prev.GetWingShort], который, как сообщается, переиграл [From.GetHerHim] в манёвре и пробил топливные баки точным попаданием. [From.GetWingShort] [From.GetName] [From.GetSurname] загорелся и ушёл в штопор над [From.GetMissionRegion] в яростном пламени.\n\n[From.GetFullName] проявил великое мужество на протяжении [From.GetHerHis] службы и был примером для многих. Потеря этого национального героя — большой удар для [From.Owner.GetAdjective] ВВС и разрушительный удар для нашей нации в целом. Знание того, что пока мы скорбим, [Prev.Owner.GetName] празднует [Prev.GetFullName] как героя, делает трагедию ещё более тяжёлой."
 ace_killed_by_ace.1.a: "Разрушительная потеря для всех нас"

 ace_killed_other_ace.1.t: "[From.GetFullName] сбил [Prev.GetCallsign]"
 ace_killed_other_ace.1.d: "Наша последняя миссия над [From.GetMissionRegion] стала большим успехом для [From.Owner.GetAdjective] ВВС более чем в одном аспекте. Поступили отчёты, выделяющие героический поступок [From.GetFullName], сумевшего перехитрить [Prev.Owner.GetAdjective] пилота [Prev.GetName] [Prev.GetSurname], известного как [Prev.GetCallsign]. [From.GetCallsign] использовал [From.GetHerselfHimself] как приманку и заманил [Prev.GetCallsign] в ловушку, где [From.Owner.GetAdjective] пилоты смогли пикировать на эскадрилью [Prev.GetCallsign]. [From.GetCallsign] затем переиграл в манёвре [Prev.Owner.GetAdjective] самолёты и одной очередью отправил [Prev.GetCallsign] в штопор с небес [From.GetMissionRegion].\n\n[Prev.GetFullName] был feared пилотом со многими [From.Owner.GetAdjective] жизнями на [Prev.GetHerHis] совести. Это великая победа, показывающая, что когда мы сплочаемся за великими героями, они совершают великие дела."
 ace_killed_other_ace.1.d_major: "Наша последняя миссия над [From.GetMissionRegion] стала большим успехом для [From.Owner.GetAdjective] ВВС более чем в одном аспекте. Поступили отчёты, выделяющие героический поступок [From.GetFullName], сумевшего перехитрить [Prev.Owner.GetAdjective] пилота [Prev.GetName] [Prev.GetSurname], известного как [Prev.GetCallsign]. [From.GetCallsign] использовал [From.GetHerselfHimself] как приманку и заманил [Prev.GetCallsign] в ловушку, где [From.Owner.GetAdjective] пилоты смогли пикировать на эскадрилью [Prev.GetCallsign]. [From.GetCallsign] затем переиграл в манёвре [Prev.Owner.GetAdjective] самолёты и одной очередью отправил [Prev.GetCallsign] в штопор с небес [From.GetMissionRegion].\n\n[Prev.GetFullName] был feared пилотом со многими [From.Owner.GetAdjective] жизнями на [Prev.GetHerHis] совести. Это великая победа, показывающая, что когда мы сплочаемся за великими героями, они совершают великие дела."
 ace_killed_other_ace.1.a: "Победа, которую запомнит весь [From.Owner.GetName]!"

 aces_killed_each_other.1.t: "[From.GetFullName] погиб"
 aces_killed_each_other.1.d: "Во время последней миссии наш знаменитый [From.GetAceType]-ас [From.GetFullname] вступил в затяжной бой с feared асом-пилотом [Prev.GetFullName]. Имея мало боеприпасов и без возможности уйти, [From.GetCallsign] маневрировал под огнём [Prev.Owner.GetAdjective] самолётов и пошёл на таран [Prev.GetCallsign].\nОба самолёта — [From.GetCallsign]'а и [Prev.GetCallsign]'а — были замечены падающими на куски над [From.GetMissionRegion].\n\nХотя это небольшое утешение, что [Prev.Owner.GetAdjective] угроза, [Prev.GetCallsign], больше не будет нам досаждать, мы потеряли ценную публичную фигуру и вдохновение для всех [From.Owner.GetAdjective]."
 aces_killed_each_other.1.d_major: "Во время последней миссии наш знаменитый [From.GetAceType]-ас [From.GetFullname] вступил в затяжной бой с feared асом-пилотом [Prev.GetFullName]. Имея мало боеприпасов и без возможности уйти, [From.GetCallsign] маневрировал своим [From.GetWingShort] под огнём [Prev.Owner.GetAdjective] самолётов и пошёл на таран [Prev.GetCallsign].\nОба [From.GetWingShort] [From.GetCallsign]'а и [Prev.GetWingShort] [Prev.GetCallsign]'а были замечены падающими на куски над [From.GetMissionRegion].\n\nХотя это небольшое утешение, что [Prev.Owner.GetAdjective] угроза, [Prev.GetCallsign], больше не будет нам досаждать, мы потеряли ценную публичную фигуру и вдохновение для всех [From.Owner.GetAdjective]."
 aces_killed_each_other.1.a: "Всё равно великая потеря для нас"

 country_capitulated.0.t: "[Root.GetName] капитулировал"
 country_capitulated.0.d_positive_both_no_faction: "\n[From.From.GetLeader] объявил, что трусливая [Root.GetAdjective] нация больше не могла выдержать давления от подавляющего присутствия [From.From.GetAdjective] сил по всей стране. [Root.GetAdjective] правительство предпочло бежать из страны и ушло в изгнание. Их основные силы капитулировали, и [From.From.GetNameDef] теперь контролирует их домашний регион.\nХотя война продолжается в других местах, это великая победа для [From.From.GetNameDef]."
 country_capitulated.0.d_positive_prev_no_faction: "\n[From.From.GetLeader] объявил, что трусливая [Root.GetAdjective] нация больше не могла выдержать давления от подавляющего присутствия [From.From.GetAdjective] сил по всей стране. [Root.GetAdjective] правительство предпочло бежать из страны и ушло в изгнание. Их основные силы капитулировали, и [From.From.GetNameDef] теперь контролирует их домашний регион.\nХотя война против того, что осталось от [Root.GetFactionName], продолжается в других местах, это великая победа для [From.From.GetNameDef]."
 country_capitulated.0.d_positive_prev_faction: "\n[From.From.GetLeader] объявил, что трусливая [Root.GetAdjective] нация больше не могла выдержать давления от подавляющего присутствия [From.From.GetAdjective] сил по всей стране. [Root.GetAdjective] правительство предпочло бежать из страны и ушло в изгнание. Их основные силы капитулировали, и [From.From.GetNameDef] теперь контролирует их домашний регион.\nХотя война против того, что осталось от [Root.GetFactionName], продолжается в других местах, это великая победа для всего [From.From.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction: "\n[Root.GetLeader] объявил, что [Root.GetAdjective] нация больше не может выдержать давления от оккупирующих [From.From.GetAdjective] сил, совершающих злодеяния по всей стране. [Root.GetAdjective] правительство ушло в изгнание. Их основные силы капитулировали, и [From.From.GetNameDef] теперь контролирует их домашний регион.\nНесмотря на это разрушительное поражение, война против [From.From.GetNameDef] далека от завершения."
 country_capitulated.0.d_negative_prev_no_faction: "\n[Root.GetLeader] объявил, что [Root.GetAdjective] нация больше не может выдержать давления от оккупирующих [From.From.GetAdjective] сил, совершающих злодеяния по всей стране. [Root.GetAdjective] правительство ушло в изгнание. Их основные силы капитулировали, и [From.From.GetNameDef] теперь контролирует их домашний регион.\nХотя война против [From.From.GetNameDef] продолжается, это прискорбная неудача для всего [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction: "\n[Root.GetLeader] объявил, что [Root.GetAdjective] нация больше не может выдержать давления от оккупирующих [From.From.GetAdjective] сил, совершающих злодеяния по всей стране. [Root.GetAdjective] правительство ушло в изгнание. Их основные силы капитулировали, и [From.From.GetNameDef] теперь контролирует их домашний регион.\nХотя война против [From.From.GetNameDef] и остальной части [From.From.GetFactionName] продолжается, это прискорбная неудача для всего [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction: "\n[Root.GetAdjective] правительство ушло в изгнание, и их основные силы капитулировали перед [From.From.GetNameDef], который теперь контролирует их домашний регион.\n\nХотя борьба между [From.From.GetName] и [Root.GetName] закончена, [From.From.GetNameDef] всё ещё ведёт тотальную войну, и бои продолжаются в других местах."
 country_capitulated.0.d_neutral_prev_no_faction: "\n[Root.GetAdjective] правительство ушло в изгнание, и их основные силы капитулировали перед [From.From.GetNameDef], который теперь контролирует их домашний регион.\n\nБорьба в [Root.GetName] была лишь небольшой частью конфликта. Война между [From.From.GetNameDef] и тем, что осталось от [Root.GetFactionName], продолжается в других местах."
 country_capitulated.0.d_neutral_prev_faction: "\n[Root.GetAdjective] правительство ушло в изгнание, и их основные силы капитулировали перед [From.From.GetNameDef], который теперь контролирует их домашний регион.\n\nБорьба между [From.From.GetNameDef] и [Root.GetNameDef] была лишь небольшой частью конфликта. Война между [From.From.GetFactionName] и тем, что осталось от [Root.GetFactionName], продолжается в других местах."
 country_capitulated.0.d_positive_collab_diff_ideology: "\n[Root.GetNameDef] объявил о полной капитуляции перед [From.From.GetNameDef]. [From.From.GetAdjective] силы вместе с рядом независимых [Root.GetAdjective] сторонников [From.From.GetRulingIdeology] вынудили [Root.GetLeader] и его правительство уйти в изгнание, поскольку новое правительство было создано для управления [Root.GetNameDef] в сотрудничестве с [From.From.GetNameDef]. [From.From.GetLeader] заметил, что это взаимное соглашение принесёт новую эру процветания и сотрудничества в [Root.GetNameDef].\n[Root.GetLeader] ответил, заявив, что даже в изгнании он продолжит бороться за [Root.GetNameDef] и поддерживать все усилия сопротивления на своей родине."
 country_capitulated.0.d_positive_collab_invaded_same_ideology: "\n[Root.GetNameDef] объявил о полной капитуляции перед [From.From.GetNameDef]. Ряд [Root.GetAdjective] граждан, недовольных маркой [From.From.GetRulingIdeologyNoun], принесённой в [Root.GetNameDef] [Root.GetLeader], присоединился к [From.From.GetAdjective] солдатам в смещении его с власти и формировании нового правительства под руководством [From.From.GetNameDef]. [From.From.GetLeader] заметил, что это взаимное соглашение принесёт новую эру процветания и сотрудничества в [From.From.GetNameDef].\n[Root.GetLeader] ответил, заявив, что [From.From.GetLeader] не истинный [From.From.GetRulingIdeology], и даже в изгнании он продолжит бороться за [Root.GetNameDef] и поддерживать все усилия сопротивления на своей родине."
 country_capitulated.0.d_negative_collab_diff_ideology: "\n[Root.GetNameDef] объявил о полной капитуляции перед [From.From.GetNameDef]. Очевидно, что снисходительность [Root.GetAdjective] правительства к внутренним симпатизантам [From.From.GetRulingIdeology] способствовала падению [Root.GetName], поскольку [Root.GetFascistLeader] был приведён к власти для управления страной от имени режима [From.From.GetLeader].\n[Root.GetLeader] заявляет, что это не конец [Root.GetAdjective] суверенитета, и что правительство будет поддерживать все усилия сопротивления, даже будучи изгнанным с родины."
 country_capitulated.0.a: "Отличные новости!"
 country_capitulated.0.b: "Тёмные времена"
 country_capitulated.0.c: "Неопределённые времена"
