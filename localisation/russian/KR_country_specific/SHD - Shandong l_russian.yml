### Tooltips
 SHD_tianran_can_reclaim_tooltip: "§GПочтенный Наставник Тяньжань может начать завоёвывать сердца провинций Лиги\n§!"
 SHD_two_zhangs_tooltip: "§MЭтот фокус решит судьбу Шаньдуна и определит его роль в истории Китая§!"

 SHD_xuzhou_garrison: "Рекрутировать из гарнизона Сюйчжоу"
 SHD_xuzhou_garrison_desc: "Вокруг города Сюйчжоу небольшие силы с радостью присоединятся к нашей армии за правильную цену."

 SHD_qu_will_be_mad: "§RГубернатор Цюй будем меньше поддерживать монархию!§!"

### Decisions ###
 SHD_riot_policy_decisions: "Гражданские беспорядки в Шаньдуне"
 SHD_riot_policy_decisions_desc: "Мы должны бороться с теми проявлениями беспорядков, что возникли на фоне нашей борьбы с внутренними врагами. Бунтующие грабят, убивают и подрывают наш авторитет, мы должны избавиться от них."

 SHD_end_Yiguandao_riot: "Покончить с неповиновением Игуаньдао"
 SHD_end_peasant_riot: "Покончить с народными бунтами"
 SHD_end_Zongchang_riot: "Покончить с лоялистами Цзунчана"

 SHD_develop_jiangxi_tungsten_decision: "Разработка вольфрама Цзянси"
 SHD_develop_fujian_aluminium_decision: "Разработка алюминия Фуцзянь"

 SHD_create_LSP: "Создать Лигу Восточно-Китайских Провинций"
 SHD_create_LSP_desc: "Шесть Провинций лежат у ног Чжана Цзунчана. После смерти Суна, Лига распалась на враждующие клики и фракции. Цзунчан, сильно рискуя, провёл свою авантюру и расширил свою вотчину во много раз. Теперь коррупция и моральное разложение будет распространено на весь Юг Китая."

 SHD_internal_decisions: "Внутренние дела Шаньдуна"
 SHD_internal_decisions_desc: "Правительство – это отражение личности того, кто управляет провинцией. Мы должны дать понять миру, что мы из себя представляем и создать почву для иностранных инвестиций."

 SHD_obtain_dockyard_access: "Запросить морской поддержки у Японии"
 SHD_obtain_dockyard_access_desc: "Лучшее в нашем новом союзе с Японии – поддержка их могучего флота. И хотя наши флотилии малочислены, японцы также с радостью позволят нам базировать наши корабли в своих портах."

 SHD_dockyard_count_tt: "Это решение может быть принято до §Y3§! раз. (В настоящее время §Y[?SHD_dockyard_count]/3§!)"

 SHD_assemble_air_squadron: "Запросить авиакрыло у Цин"
 SHD_assemble_air_squadron_desc: "Бравые цинские пилоты горят желанием попробовать себя в бою. Мы могли бы предоставить им такую возможность, запросив у Пекина авиакрыло добровольцев."

 SHD_pull_strings_with_qing_industrialists: "Арендовать заводы у Цин"
 SHD_pull_strings_with_qing_industrialists_desc: "Необходимость борьбы с нашими врагами не оставляет нам выбора, кроме как обратиться к Цин с просьбой выделить некоторые промышленные мощности для нас."

 SHD_industrialist_count: "Это решение может быть принято до §Y3§! раз. (В настоящее время §Y[?SHD_industrialist_count]/3§!)"

 SHD_war_intervention_decisions: "Вторжение в Клики"
 SHD_war_intervention_decisions_desc: "Мы должны использовать фактор неожиданности и ударить по нашим соседям с целью их подчинения. Разбив их армии, мы низложим милитаристов, вставших у нас на пути. На нашем пути мы увидим великие стены Нанкина, богатые порты Гуанчжоу и даже попробуем знаменитые кушанья сычуаньской кухни."

 SHD_intervene_xuzhou: "Захватить Сюйчжоу"
 SHD_intervene_xuzhou_desc: "Город Сюйчжоу - один из наиболее развитых районов Цзянсу и его окрестностей, заслуживающий особого внимания."

 SHD_intervene_jiangsu: "Вторгнуться в Цзянсу"
 SHD_intervene_jiangsu_desc: "Цзянсу отчаянно нуждается в поддержке из вне, коей и станем мы. Завоевав доверие местных, мы прочно укрепим свою власть здесь."

 SHD_intervene_southeast: "Вторгнуться в [From.GetNameDef]"
 SHD_intervene_southeast_desc: "Земли к юго-востоку от нас захвачены хаосом. Если мы хотим пробиться к хлебным местам на Юге, нам необходимо ударить по этим землям."

 SHD_Yantai_Port_Line: "Путь Яньтай – Порт-Артур"
 SHD_Yantai_Port_Line_desc: "Крупнейший порт, который сейчас находится под нашим контролем, £victory_points §GЯньтай§!, позволяет нам получать поставки снаряжения из Фэнтяня и Японии на постоянной основе."

 SHD_Nantong_Port_Line: "Путь Наньтун – Нагасаки"
 SHD_Nantong_Port_Line_desc: "Второй по значимости порт Восточного Китая после Шанхая, £victory_points §GНаньтун§!, является нашей важнейшей артерией, через которую мы получаем поставки оружия от друзей."

 SHD_Hangzhou_Port_Line: "Путь Ханчжоу – Нагасаки"
 SHD_Hangzhou_Port_Line_desc: "Крупный город, £victory_points §GХанчжоу§!, позволит нам получать ещё больше снаряжения от наших друзей из Фэнтяня и Японии."

 SHD_intervene_xuzhou_tt: "Если вы контролирует §YСюйхай§! вы станете их прямым владельцем и получите 2% $MODIFIER_WAR_SUPPORT_FACTOR$."
 SHD_intervene_jiangsu_tt: "Если вы контролирует §YХуайян§! и §YНаньтун§!, вы станете их прямым владельцем и получите 4% $MODIFIER_WAR_SUPPORT_FACTOR$."

 SHD_raise_army: "Создание армии"
 SHD_raise_army_desc: "Наша так называемая армия уступает в технологиях и дисциплине даже самым слабым милитаристам. И хотя у нас нет современных технологий, нашим преимуществом станет храбрость и боевой дух людей. В конечном итоге, не важно, насколько современное у тебя оружие, если его можно закидать трупами...  "

 SHD_raise_division: "Нанять крестьян в [FROM.GetName]"
 SHD_raise_division_desc: "Мы можем нанять крестьян в [FROM.GetName] для поддержки нашей армии"

### Parties ###
 SHD_totalist_party: "ЛСМ"
 SHD_totalist_party_long: "Лига Социалистической Молодёжи\n§gНовейшее социалистическое движение в Шаньдуне, ориентирующееся на молодёжь, знакомую с работами Пан-Тихоокеанского Профсоюзного Секретариата. Состоит, в основном, из студентов. Данная партия не имеет реальной силы и может прийти к власти исключительно под внешним давлением.§!"
 SHD_syndicalist_party: "ОАЯС"
 SHD_syndicalist_party_long: "Общество Анти-Японской Солидарности\n§gРадикальная партия, отколовшаяся от местного отделения Гоминьдана, ОAЯС долгие годы существовала в подолье в Циндао, ожидая удобного случая. Ориентируясь на работы Пан-Тихоокеанского Профсоюзного Секретариата, эта партия не имеет реальной силы и может прийти к власти исключительно под внешним давлением.§!"
 SHD_radical_socialist_party: "Гоминьдан"
 SHD_radical_socialist_party_long: "Национальная Партия\n§gС самого создания Движения за Новый Китай, в Шаньдуне действует подпольное отделение Гоминьдана, которое распространяет идеи Сунь Ятсена. Местные члены Гоминьдана не обладают никакой инициативой и не придут к власти самостоятельно. Без помощи иностранных сил или товарищей по ту сторону Янцзы.§!"
 SHD_social_democrat_party: "ПП"
 SHD_social_democrat_party_long: "Партия Прогресса\n§gОснованная в 1916 великим реформатором Кан Ювэем, Партия Прогресса росла и ширилась за счёт пожертвований её членов и неравнодушной демократической частью китайской диаспоры за рубежом. После реставрации Цин в 1927 году, большая часть местных сторонников этой партии ушли в подполье, потеряв всякую власть.§!"
 SHD_social_liberal_party: "Исследовательская клика"
 SHD_social_liberal_party_long: "Исследовательская клика\n§gВозникшая в 1916 году как ответвление Прогрессивной партии, основанной Кан Ювэем во время правления Юань Шикая, Шаньдунская исследовательская клика с момента восстановления Цин боролась за актуальность в Шаньдуне. Не желая идти на компромисс с интеллектуальным климатом шаньдунской интеллигенции, членство в партии строится в основном на пожертвованиях бывших соотечественников и обращениях к приезжим западным людям.§!\n"
 SHD_market_liberal_party: "ОДЦНП"
 SHD_market_liberal_party_long: "Общество Драконьего Цветка Небесного Пути\n§gОснованное в уезде Цзоупин с целью борьбы с массовой нищетой, данное общество, ведомое Ма Шивэем, позиционирует себя как альтернатива мародёрству и бандитизму, захлестнувшим Шаньдун. В основу общества легли этические воззрения культа Сяньтяньдао. ОДЦНП не является полноценной партией и станет такой лишь в случае иностранного вмешательства.§!"
 SHD_social_conservative_party: "Клика Исследователей"
 SHD_social_conservative_party_long: "Клика Исследователей\n§gОтветвление от Партии Прогресса Кан Ювэя, Шаньдунская Клика Исследователей боролась за существование с самой реставрации Цин. Члены данной партии не согласны с установившимся научным климатом в Шаньдуне. По большей части, партия состоит из мирной интеллигенции, существующей на пожертвования. Эта Клика не придёт к власти самостоятельно, без внешнего давления.§!"
 SHD_authoritarian_democrat_party: "ОВБ"
 SHD_authoritarian_democrat_party_long: "Общество Восстановления Благоденствия\n§gБеспорядки Века Унижений – это лишь очередная страница в истории Шаньдуна. Для многих живущих здесь просвещение стало способом убежать от насущных проблем, а для кого-то -  и способом обрести власть. Традиционалисты, организованные генералом Суном Чжэюанем и герцогом Яньшеном, борются со всеми новомодными веяниями с Запада. Наркотрафик, который пытается крышевать Цзунчан, для многих членов данного общества видится как акт морального разложения и дегенерации. Да и сам образ жизни губернатора вызывает множество вопросов. Иньгуан старается привлечь внимание императора к проблемам маленького Шаньдуна.§!"
 SHD_auth_dem_liu_heding_puppet: "Клика Лю"
 SHD_paternal_autocrat_party: "Клика Цзунчана"
 SHD_paternal_autocrat_party_long: "Клика Цзунчана\n§gЧжан Цзунчан и его клика управляют большей частью Шаньдуна из портового города Цзинань, который является местным торговым центром и местом притяжения власти. Под контролем Цзунчана находятся также и железные дороги, ведущие вглубь Китая. Цзунчан опирается на армию наёмником и элитные части, которые были организованы из остатков Шаньдунской Революционной Армии, которая патрулировала данную провинцию раньше. Имея полный доступ к местным рынкам, Цзунчан тайно занимается покрывательством наркоторговли и контрабанды из Циндао, дань с которой пополняет его казну и даёт возможность жить на широкую ногу.§!"
 SHD_national_populist_party: "Игуаньдао"
 SHD_national_populist_party_long: "Общество Игуаньдао\n§gИгуаньдао – религиозный культ, возникший как часть Общества Белого Лотуса, чьи истоки уходят в XIX-ый век. Как это традиционно для народного культа, в учении Игуаньдао сплелись идеи Конфуцианства, некоторые концепции из буддизма и обширная мифологическая база из Даосизма. Наставник Лю Чжунцзэ был первым лидером Игуаньдао, на тот момент ещё маленькой группки единомышленников. За прошедшие года культ усилил своё влияние и приобрёл обширную народную поддержку. Чжан Тяньжань, духовный наследник Чжунцзэ, смог добиться того, что к культу Игуаньдао причисляло себя уже более 7 миллионов человек, из которых в Шаньдуне было лишь пол миллиона. Крестьянские армии, на вроде Больших Мечей или Красных Копий, видят в Игуаньдао будущее правительство всего Китая, которое принесёт с собой век благочестия и морали.§!"
 SHD_pat_aut_liu_heding_puppet: "Аньцинская Клика"

### Focus Tree ###
 Shandong_Focus: "Дерево фокусов Шаньдун"

### Political focuses ###
 SHD_two_zhangs_enter: "Борьба двух Чжанов"
 SHD_two_zhangs_enter_desc: "Годы трений между Игуаньдао и Чжаном Цзунчаном вылились в открытый конфликт. Расследование Иньгуана по поводу накроторговли и приезд опальной сестры бывшего наставника Игуаньдао лишь подлили масла в огонь. В этой борьбе выживет лишь кто-то один, в чьих руках останется власть над провинцией."

 SHD_announce_revelationary_order: "Объявить о новом порядке"
 SHD_announce_revelationary_order_desc: "Как и все великие Наставники Китая, Чжан Тяньжань явит откровение о новом миропорядке своей пастве во время публичной церемонии. Пока милитаристы угнетают свой народ и выжимают из него все соки, Тяньжань намерен построить в Шаньдуне братство людей, скреплённое общими идеями. Устами Тяньжаня говорят сами Будда, У-Цзыму и Сунь Ятсен."

 SHD_destroy_the_drug_trade: "Уничтожить наркоторговлю"
 SHD_destroy_the_drug_trade_desc: "Поколения китайцев пострадали от дьявольского семени, именуемого опиумом. Опиум – это не лекарство, но яд, с которым боролись благородные Боксёры и Сунь Ятсен. Чжан Тяньжань организовал народные патрули, которые будут делать облавы на наркоторговцев и их схроны, уничтожая товар и продавцов."

 SHD_back_to_the_basics: "Назад к истокам"
 SHD_back_to_the_basics_desc: "Цзинань и вся его бюрократия насквозь погрязли в коррупции и кумовстве. Правительство Цзунчана окончательно прогнило и должно быть распущено. На их место, во избежание подобного, придут члены Игуаньдао, преисполненные духовностью. Гуру и Младшие Наставники займут место чиновников и вернут Шаньдун назад к истокам. "

 SHD_absorb_the_guiyidao: "Поглотить Гуйидао"
 SHD_absorb_the_guiyidao_desc: "Способность Гуйидао вести за собой благочестивый народ может сыграть нам на пользу. К сожалению, большая часть этого Общества покинула Шаньдун и осела в Пекине и Тяньцзине. Мы интегрируем их остатки и распространим идеи щедрости на наших Гуру."

 SHD_benevolence_and_morality: "Мораль и благоденствие"
 SHD_benevolence_and_morality_desc: "Ассоциация Морали и благоденствия Чжан Тяньжаня, была создана в 1930 году как запасной план на случай, если Игуаньдао будет снова запрещена Цин. Теперь, когда руководящая роль Тяньжаня стала достоянием общественности, организация может быть полностью объединена с Игуаньдао. Листовки Тяньжаня о морали можно публично читать как комментарии к классике. "

 SHD_return_to_the_source: "Назад к Пекину"
 SHD_return_to_the_source_desc: "Теперь, когда оба Чжана погибли в борьбе за власть над Шаньдуном, регион может полноценно вернуться под контроль Пекина. В наших же интересах не противостоять объединению Китая и вместе освободить его от иностранного влияния. "

 SHD_story_of_a_bastard: "История об ублюдке"
 SHD_story_of_a_bastard_desc: "Те, кто смеялся на Цзунчаном, когда он бежал из Цзинаня в гробу, теперь сами лежат в них. Губернатор Цзунчан выступил перед своей армией, назвав их ‘ублюдками, среди который он – самый главный и беспринципный ублюдок’. Дальнейшая история Шаньдуна пойдёт по пути ублажения сильных мира сего и удержании власти Цзунчана любой ценой."

 SHD_honoured_teacher_lu_zhongjie: "Заслуженный учитель Лу Чжунцзе"
 SHD_honoured_teacher_lu_zhongjie_desc: "Самый главный урок, который вынес Цзунчан – это то, что народу нужна вера. Вместо того, чтобы подавлять её, веру можно превратить в очередной наркотик, своеобразный опиум для народа. Лю Чжунцзэ, опальная сестра первого Наставника Игуаньдао, займёт место Тяньжаня и будет управлять культом так, как этого хочет Цзунчан, не влезая в его политику."

 SHD_besiege_mount_taishan: "Овладеть горой Тайшань"
 SHD_besiege_mount_taishan_desc: "После разграбления храма Боксёров, Сунь Дяньинь, один из подчинённых Цзунчана, нашёл золото и драгоценности привлекательными для себя. Он хочет разграбить и бывший храм Игуаньдао, где он надеется найти много всего ценного. Оставшихся там изгоев, которые всё ещё верны умершему Тяньжаню, он предлагает просто заморить голодом, взяв в осаду гору Тай."

 SHD_bolster_the_drug_trade: "Усиление наркоторговли"
 SHD_bolster_the_drug_trade_desc: "Угроза быть раскрытым Чжэюанем и Тяньжанем была устранена, и теперь никто не помешает превратить наркоторговлю в официальный прибыльный бизнес. Уничтожив остатки тех, кто пытается бороться с распространением опиума, Цзунчан станет настоящим гением преступного мира, предлагающим вкус свободы за разумную цену."

 SHD_shandong_model_province: "Шаньдунская модель"
 SHD_shandong_model_province_desc: "Образ примерного региона – это то, что может сохранить автономию Шаньдуна ещё на какое-то время. Наше гражданское правительство является объектом для подражания другими, их работа создала благоприятный климат для торговли и иностранных инвестиций."

### Army ###
 SHD_reaffirm_the_northeast_army: "Осмотр Северо-Восточной Армии"
 SHD_reaffirm_the_northeast_army_desc: "Северо-Восточная Армия, расположенная в Шаньдуне, плохо себя показала на последних смотрах, многие иностранные наблюдатели назвали её слишком отсталой. Несмотря на все наши старания, они правы. Мы должны найти нормальных инструкторов для наших солдат. Знамёна Шаньдуна должны вновь реять с гордостью."

 SHD_an_army_of_professionals: "Армия профессионалов"
 SHD_an_army_of_professionals_desc: "Прошлые попытки набрать любое отребье в армию приводили лишь к повальному дезертирству и неподчинению. Нам нужна армия профессиональных солдат, которых мы будем строго отбирать. Подобные солдаты не побегут с поля боя и не оспорят ни один наш приказ."

 SHD_replace_outdated_weapons: "Заменить устаревшее вооружение"
 SHD_replace_outdated_weapons_desc: "Наёмническое прошлое нашей армии напоминает о себе в виде устаревшего вооружения. Если мы хотим сделать из наших солдат настоящую армию, необходимо производить современное вооружение и внедрять его как стандарт."

 SHD_train_with_northern_cavalry: "Тренировки с Северной кавалерией"
 SHD_train_with_northern_cavalry_desc: "Кавалерия наёмников с севера, которые пришли за Чжаном Цзунчаном, ожидают его приказаний. Многие из них имеют опыт фуражирования и избегания вражеских патрулей. Их маневренность нам может сильно пригодиться. Северная Кавалерия должна преподать несколько урокам нашим кавалерийским дивизиям."

 SHD_improve_rail_supply_lines: "Совершенствовать цепи поставок железнодорожного транспорта"
 SHD_improve_rail_supply_lines_desc: "Железные дороги Шаньдуна сыграли свою роль в истории региона, когда Цзунчан ещё был под руководством Фэнтяня. Уроки прошлого, вместе с современным исполнением, могут быть использованы для нашей армии. Расширив железнодорожную сеть, мы сможем создать единую линию снабжения, благодаря которой наши люди не будут испытывать недостаток припасов."

 SHD_an_army_of_fanatics: "Армия фанатиков"
 SHD_an_army_of_fanatics_desc: "Истории из старины рассказывают нам о том, как храбрость солдат позволяла им побеждать любого противника. Не боясь смерти, они смело бежали в бой. Так как мы не имеем доступа к современному оружию, мы должны пробудить в людях их фанатичную храбрость и отвагу. Единственным приказом для наших солдат должен быть приказ идти в бой и умереть за свою страну."

 SHD_request_weapons_from_followers: "Оружие от паствы"
 SHD_request_weapons_from_followers_desc: "Крестьяне Шаньдуна массово закупали оружие или делали самодельное для борьбы с людьми Цзунчана. Теперь, когда гнусные прихвостни Генерала-Псины более не терроризируют народ, крестьяне стали сдавать своё оружие на нужды нашей армии."

 SHD_learn_from_the_chahar_horsemen: "Учимся у всадников Чахара"
 SHD_learn_from_the_chahar_horsemen_desc: "Чахарские конники сыграли свою роль в защите крестьян от беспредела прихвостней Цзунчана. Настало время отплатить им по счетам. Все преступления, повешенные на них прошлой администрацией, будут прощены, а сами они станут частью нашей армии, ведя войска в бой. "

 SHD_fight_for_the_master: "Борьба во имя Наставника"
 SHD_fight_for_the_master_desc: "Солдаты Шаньдуна более не слушают прогнивших милитаристов. Теперь Наставник ведёт их в бой, придавая смелости и мужества. Командный центр, управляемый членами Игуаньдао позволит нам направлять бойцов в бой до последней капли крови."

 SHD_modernise_officer_portfolios: "Совершенствование профессиональных качеств"
 SHD_modernise_officer_portfolios_desc: "Молодое поколение офицеров не имело возможности получить нормальное образование, ни здесь, ни за рубежом. Мы должны подыскать своим офицерам неплохое иностранное училище и отправить их грызть гранит военной науки."

 SHD_novel_military_projects: "Новаторские военные проекты"
 SHD_novel_military_projects_desc: "Мы должны разработать оружие, ещё не виданное никем другим в Китае. У нас есть несколько наработок – осталось лишь выбрать, на чём мы сосредоточимся."

 SHD_modern_military_research: "Современные военные исследования"
 SHD_modern_military_research_desc: "Молодое поколение студентов не имело возможности получить нормальное образование, ни здесь, ни за рубежом. Мы должны подыскать своим студентом неплохое иностранное училище и отправить их грызть гранит науки."

### Industry ###
 SHD_revive_shandongs_industry: "Возродить Шаньдунскую промышленность"
 SHD_revive_shandongs_industry_desc: "И хотя Шаньдун находится вдалеке от кризиса Лиги Восьми Провинций, многие заводы на его территории последовательно разоряются и закрываются. Мы должны приложить усилия с целью восстановить и преумножить нашу промышленность."

 SHD_reopen_mothballed_factories: "Возобновить работу законсервированных заводов"
 SHD_reopen_mothballed_factories_desc: "Попытка Чжана Цзунчана использовать Шаньдунский Горный Картель против Горной Компании Люда привела к тому, что несколько заводов, зависимых от поставок горного сырья, прекратили свою работу. Настало время прекратить бездумную конкуренцию и заново открыть эти заводы."

 SHD_repair_the_jinan_qingdao_railway: "Возобновить ж/д путь Цзинань-Циндао"
 SHD_repair_the_jinan_qingdao_railway_desc: "Железная дорога между Цзинанем и Циндао пришла в негодность от чрезмерного использования и неправильных методов укладки рельс и шпал, многие из которых не менялись уже больше 20 лет. Мы смогли достичь некого согласия с немецкими инвесторами в Циндао и обусловились совместно возобновить этот путь, заменив полотно на более современное."

 SHD_mineral_rights_leases: "Аренда прав на полезные ископаемые"
 SHD_mineral_rights_leases_desc: "Так как цены на уголь оставались неизменными уже долгое время, некоторые из наших дельцов предлагают сдавать права на его добычу в Шаньдуне в аренду другим китайским компаниям. Теперь, когда мы полностью свободны от внутренних дрязг, мы можем воплотить идею в жизнь."

 SHD_empower_the_shandong_mining_cartel: "Усилить Шаньдунский Горный Картель"
 SHD_empower_the_shandong_mining_cartel_desc: "Шаньдунский Горный Картель был создан в 1928 при тайной поддержке Чжана Цзунчана. Его целью стала организация такого уровня труда в Шаньдуне, при котором рабочие местных компаний бы получали такую же заработную плату, что и рабочие иностранных компаний. Теперь, мы можем подключить весь административный аппарат для тайной поддержки картеля."

 SHD_shandong_university: "Шаньдунский университет"
 SHD_shandong_university_desc: "Шаньдунский Университет был закрыт со времён Вельткрига, находясь под немецкой оккупацией в Циндао. Единственным университетом, где хоть как-то можно получить военное образование, остался Сельскохозяйственный Университет в уезде Тайань. Мы должны договориться с немецкой администрацией Циндао, чтобы они передали университет Шаньдуна под наш контроль и разрешили студентам заезжать в город для прохождения обучения."

 SHD_improve_roads_to_beijing: "Расширить дорогу на Пекин"
 SHD_improve_roads_to_beijing_desc: "Дороги, ведущие на Пекин, показали себя более выгодными для торговых перевозок, чем бухта Бохай, за которую ведётся борьба между Цин и Фэнтянем. Принимая во внимание, что на пути в Пекин находится свободная экономическая зона в Тяньцзине, в наших же интересах развивать сообщение со столицей."

 SHD_court_northern_elites: "Придворная северная элита"
 SHD_court_northern_elites_desc: "В Пекине находится множество мелкого дворянства, которое ищет куда бы ему приткнутся. Недостаток в бюрократах побудил нас привлечь их к себе в регион. Пекин дал добро на раздачу части государственных земель под поместья для дворян в обмен на их службы в нашей администрации. Подобный шаг пойдёт на пользу всем нам."

 SHD_purchase_factories_in_tianjin: "Купить заводы в Тяньцзине"
 SHD_purchase_factories_in_tianjin_desc: "Недавний экономический кризис в мире привёл к закрытию многих заводов даже в Тяньцзине. В интересах городской управы сбагрить нам оборудование с этих заводов по привлекательной цене. Станки и чертежи пойдут на расширение нашего ВПК."

### Reclaiming Industry ###
 SHD_reclaim_despoiled_industry: "Прибрать разграбленные земли"
 SHD_reclaim_despoiled_industry_desc: "После многих лет пренебрежительного отношения к Шаньдуну со стороны Южной Чжилийской Клики, мы имеем возможность взять на себя управление южными провинциями. Мы обещали богато одарить всех губернаторов, которые добровольно поддержат нас."

 SHD_victory_in_the_south: "Победа на юге"
 SHD_victory_in_the_south_desc: "Теперь, когда обширные территории на юге находятся под нашим контролем, пришло время услышать мольбы миллионов беженцев и превратить пустоши в цветущий край. Крестьяне, которых мы спасём, станут нашей новой опорой в этом регионе. Обездоленная масса также отлично пойдёт для укомплектования наших заводов и развития промышленности."

 SHD_develop_the_coastline: "Развить побережье"
 SHD_develop_the_coastline_desc: "Район Северной Янцзы до сих пор остаётся полем незримой битвы различных дельцов и пиратов, даже после того, как крупнейший игрок в лице ОАК был разорён. Нам придётся предложить все усилия, чтобы создать зону безопасной морской торговли, но результат будет того стоить."

 SHD_develop_anqing: "Развитие Аньцина"
 SHD_develop_anqing_desc: "Аньцин, столица одноимённой клики, которая пала под нашим натиском, слишком долго не мог развиваться из-за плохого управления. Мы поможем жителям региона в развитии их города и покажем, что мы не какие-то очередные милитаристы-проходимцы."

 SHD_renovate_nanjing: "Реновация Нанкина"
 SHD_renovate_nanjing_desc: "Старый город Нанкин в провинции Цзиньлин пережил сотни лет войн и оккупаций, но при он, наконец-то, станет безопасным местом. Мы готовы сотрудничать с местной администрацией и направить рабочие силы на городские стройки за символическую плату."

 SHD_complete_the_jinan_nanjing_railway: "Завершить ж/д Цзинань-Нанкин"
 SHD_complete_the_jinan_nanjing_railway_desc: "Отсутствие нормально железнодорожного обеспечения привело к тому, что миллионы беженцев шли по грязи и слякоти, массово умирая в дороге. Кроме того, обычные дороги нынче небезопасны. Мы должны создать единую сеть железных дорог и соединить Цзинань с Нанкином, что упрочит наше положение в новозавоёванных провинциях."

 SHD_dayu_tungsten_mines: "Вольфрамовые шахты Дайю"
 SHD_dayu_tungsten_mines_desc: "Издавна известно, что в Дайю, расположенном недалеко от Ганьчжоу в Ганьнане, Цзянси, находится большое количество вольфрама. Однако инфраструктура для фактической добычи этих ресурсов невелика. Мы должны работать над улучшением региона, чтобы вольфрам можно было добывать и экспортировать."

 SHD_connect_fujians_communities: "Соединить общины Фуцзяня"
 SHD_connect_fujians_communities_desc: "Фуцзянь, как и Шаньдун когда-то, представляет из себя россыпь плохо соединённых между собой общин. Тысячи беженцев, прибывших сюда, лишь усугубили транспортную проблему. На нашу долю выпала честь стать первыми, кто соединит общины Фуцзяня в единую дорожную сеть."

 SHD_rebuild_northern_zhejiang: "Восстановить Северный Чжэцзян"
 SHD_rebuild_northern_zhejiang_desc: "Северный Чжэцзян пришёл в запустение после разрушительного восстания Тайпинов. С тех пор, никто из правителей Китая не брал на себя задачу восстановиться эту местности. Никто, кроме нас. Завоевав доверие народа предыдущими проектами, мы можем организовать большую стройку в районе Северного Чжэцзяна и превратить местные пустоши во что-то совершенно новое."

### Navy ###
 SHD_rebuild_the_beiyang_fleet: "Возродить Бейянский флот"
 SHD_rebuild_the_beiyang_fleet_desc: "Шаньдун всегда славился как место, где базировался Бейянский флот, гордость Цин. И хотя Германия отобрала у нас крупные порты, у нас есть возможности для расширения. Мы создадим новый флот, который будет хуже, чем легендарный Бейянский."

 SHD_steal_japanese_designs: "Украсть японские образцы"
 SHD_steal_japanese_designs_desc: "Наша администрация нашла группу лиц, связанных с ИЯН, которая готова предоставить информацию о проектах, используемых для строительства некоторых из их малых судов... за определенную плату."

 SHD_modernise_naval_bases: "Модернизация военно-морских баз"
 SHD_modernise_naval_bases_desc: "Морская база в Янтае не сможет обеспечить наших солдат припасами в случае, если их отрежут от поставок на суше. Нам нужна новая, более крупная морская база."

 SHD_purchase_convoys: "Закупка конвоев"
 SHD_purchase_convoys_desc: "Если мы хотим наладит поставки грузом по морю и не стать жертвой подлодок, нам нужен солидный торговый флот. Мы должны закупить старые корабли в зарубежных странах."

 SHD_obtain_submarine_designs: "Получить проекты подводных лодок"
 SHD_obtain_submarine_designs_desc: "Если мы хотим оставаться первыми на море, нам нужен подводный флот. Мы должны начать секретные разработки моделей подлодок."

 SHD_incorporate_qingdao: "Incorporate Qingdao"
 SHD_incorporate_qingdao_desc: "It is time for us to assume the true home of the Beiyang Fleet, Qingdao. Our grand return will precipitate a revitalisation of Chinese naval industry in Shandong."

### Air Force ###
 SHD_create_an_air_force: "Создать ВВС"
 SHD_create_an_air_force_desc: "Суша и море – не единственные поля битв. Новая война будет вестись и в воздухе. Мы должны основать свои собственные ВВС и создать боеспособные авиакрылья."

 SHD_experimental_fighters: "Экспериментальные истребители"
 SHD_experimental_fighters_desc: "Нам не по карману позволить себе современные истребители, поэтому наши народные умельцы вызвались создать экспериментальные истребители, которые мы могли бы производить. Боеспособность и безопасность таких самолётов остаётся под вопросом, но нам сейчас пойдёт и такое."

 SHD_train_fighter_pilots: "Обучение пилотов"
 SHD_train_fighter_pilots_desc: "Храбрая шаньдунская молодёжь готова попробовать себя в роли покорителей небес. Мы создадим для них условия для обучения, а они уже сослужат нам службу в качестве пилотов."

 SHD_expand_the_jinan_airstrip: "Расширить аэродром Цзинань"
 SHD_expand_the_jinan_airstrip_desc: "Взлётные полосы Цзинаня не подходят для полноценных ВВС. Настало наше время построить в Шаньдуне полноценный аэропорт, на зависть нашим соседям."

 SHD_planes_over_the_bohai_sea: "Самолеты над Бохаем"
 SHD_planes_over_the_bohai_sea_desc: "Если мы сможем запустить самолёты над морем, это увеличит наш контроль на воде. Мы уже набили руку в производстве самолётов, поэтому можем поэкспериментировать с новыми чертежами."

 SHD_airspace_protection: "Защита воздушного пространства"
 SHD_airspace_protection_desc: "Для поддержки наших истребителей и пехоты нужна поддержка в виде штурмовиков. Стоит вложиться в развитие этого вида самолётов."

 SHD_bomber_aircraft: "Бомбардировщики"
 SHD_bomber_aircraft_desc: "Наша мечта о разгроме врагов без помощи сухопутной армии стала явью. Бомбардировщики, вершина развития авиастроения, могут стать решающим фактором в войне с противником."

### Bookmark ###
 SHD_KR_gathering_storm_desc: "Правителю Шаньдуна Чжан Цзунчану предшествует только его бронепоезд и чудовищная репутация. "Генерал псина" известен насилием, пороком и коррупцией, и под его рукой столица Цзинаня неуклонно становилась зеркальным отражением своего хозяина. Однако с вершины горы Тай неуловимый патриарх Чжан Тяньрань избегает греховности внизу. Вместо этого он надеется повернуть часы Китая более чем на столетие назад и направить страну в объятия своей пленительной веры Игуандао. Столкновение этих противоречивых сил может навсегда изменить Китай..."

### Intro Screen ###
 SHD_country_intro_background: "GFX_SHD_intro"
 SHD_country_intro_header: "1936, поворотный момент для Шаньдуна"
 SHD_country_intro_content: "Провинция Шаньдун потеряла свои самые богатые города, отрезанные Германией и Городами-Концессиями. Порт Циндао, разорённый во время Вельткрига, стал густонаселённым торговым центром под влиянием ОАК, в доках которого разместился флот Кайзеррайха. Такое соседство всегда привлекало реальную власть в Шаньдуне, Чжана Цзунчана, который специально перебрался поближе к немцам в Цзинань. Чжан был назначен на пост губернатора в 1911 с целью вести Революционную Армию, но проводил время лишь в кутеже и веселии. С тех пор Цзинань вырос в размерах и превратился в подлинное отражение своего хозяина: грязный, распутный город, наполненный отребьем, наркоманами и проститутками. Но стоит сказать и о другом Чжане. На вершине горы Тай, на которую ведёт 6600 ступеней, расположилась резиденция Чжана Тяньжаня, просветлённого Наставника культа Игуаньдао. Скрытный и экзальтированный человек, Тяньжань почитается своей паствой как святой, стяжающий моральное благочестие. К 1936 оба Чжана представляют из себя серьёзную силу, их незримое противостояние вот-вот выльется в полноценные войны. Народ Китая нищает, толпы беженцев бегут в Шаньдун. Половина из них находит утешение в криминальной вольнице Цзинаня, другая половина – в смирении и молитвах вдали от суеты. В скором времени, прибытие одного поезда навсегда перекроит Шандун…"

 SHD_guide: "§MЧжан Цзунчан выжил§! (§PПатернализм§!)\n£white_dot Когда шпион Игуаньдао будет пойман, заблокируйте дороги.\n£white_dot Когда Игуаньдао придёт в ярость, дождитесь отчаянных писем Тяньжаня.\n\n§MПереворот Игуаньдао§! (§NНационал-популизм§!)\n£white_dot Когда шпион Игуаньдао будет пойман, заблокируйте дороги.\n£white_dot Когда Игуаньдао придёт в ярость, нанесите им визит.\n\n§MЦюй у власти§! (§gАвторитарная демократия§!)\n£white_dot Когда шпион Игуаньдао будет пойман, отправьте людей в дом Иньгуана."

### Events ###

### Political Events###
 shandong_events.2.t: "Лю Чжунцзэ прибыла в Цзинань"
 shandong_events.2.d: "Роковой поезд с Лю Чжунцзэ прибыл сегодня в Цзинань, известив гудком о начале конца. Мало кто уже помнит, но Тяньжань пришёл к власти в культе не совсем честным путём, предав опале сестру своего прежнего Наставника, Лю Чжунъи, и изгнав её. Чжан Цзунчан решил нанести уда по самолюбию своего оппонента, пригласив Лю Чжунцзэ к себе на приём. Одно лишь упоминание её имени заставляет всех этих святош из Игуаньдао недовольно скалить зубы, на что и решил надавить Генерал-Псина. Решив язвить до последнего, Цзунчан поставил во главе приветственной свою престарелую мать, которую он заставил вести колонну из людей. С целью унизить Тяньжаня ещё больше, Цзунчан повелел оставить пышный букет цветов на могиле его предшественника и дать парадный залп из двадцати одной винтовки, из которых, под гогот Генерала-Псины, была расстреляна стена одного из ближайших домов. Таким экстравагантным способом была принята Лю Чжунцзэ."
 shandong_events.2.a: "А хорошая была стенка…"

 shandong_events.970.t: "Цзунчан гуляет и веселится"
 shandong_events.970.d: "После дневного представления, Цзунчан высадил свою мать и гостью у ворот личного поместья, а сам отправился кутить дальше, празднуя свою выходку. Пребывая в хорошем настроении, Генерал-Псина начал раздавать с барского плеча благотворительность для местных бедняков, пока не встретил культистов Игуаньдао, которые последние несколько месяцев тщетно пытались достучаться до его совести. На этот раз они смотрели на него взглядом не миролюбивых проповедников, но яростных врагов. Они кричали на Цзунчана, обещая, что их Наставник придёт и будет судить его погрязшую во грехе душу. Эти угрозы пролетели мимо ушей Генерала-Псины, который уже отправился дальше, тщетно ища свежий опиум. Как оказалось, последняя поставка была накрыта Суном Чжэюанем, который так печётся о соблюдении ‘дурацких законов’, как их называет Цзунчан. Изрядно устав, Генерал-Псина отправился в ночную вылазку в свой любимый бордель с целью взять штурмом местных красоток. Цзунчана приветствовали здесь как своего, сразу же раскупорив тайничок с дурманящим опиумом. Остаток ночи он провёл, забавляясь с наркотиками и распутными девками. Лежа с очередной проституткой, он заметил, как она втихаря украла у него немножко опиума и спешно убежала. Но Цзунчан даже не думал сердиться или печалиться – ведь в его распоряжении все куртизанки и все наркотики города, на остаток ночи ему точно хватит."
 shandong_events.970.a: "Она не знает, от какого жеребца отказалась"

 shandong_events.3.t: "Шпион Иньгуана был пойман Цзунчаном"
 shandong_events.3.d: "После ночи наркотического угара и развлечений с распутными девками, Цзунчан, проснувшись утром, заметил, что в его резиденцию кто-то проник, кто-то, кого он явно не знал. Подняв своих жён и телохранителей по тревоге, Цзунчан быстро схватил нарушителя. Его верный слуга, Сунь Дяньинь, ‘поговорил’ с пленником и выведал информацию, что этот шпион работает на Цюя Иньгуана, который решил копать под Генерала-Псину и его преступную империю. Дяньинь считает, что это лишь формальное объявление войны, а худшее их ещё ждёт впереди. Цзунчан начал чуять неладное с тех самых пор, как Иньгуан стал так рьяно беспокоиться о нормах морали. Генерал Датэ Цзюносукэ предполагает, что Иньгуан собирается написать донос императору и сместить Цзунчана и его Клику. Необходимо перехватить его, пока ещё не поздно. Осталось лишь понять, где искать Иньгуана и его сторонников..."
 shandong_events.3.a: "Перекройте все дороги, Иньгуан уже в пути"
 shandong_events.3.b: "Устройте штурм его поместья, он ещё не успел уйти"

 shandong_events.971.t: "Датэ Цзюнносукэ настиг Иньгуана в Дэчжоу"
 shandong_events.971.d: "Датэ Цзюнносукэ и его отряды кавалерии были отправлены за город, с целью перехватить Иньгуана, который, как предполагалось, спешно бежит в Пекин. Чутьё не подвело Цзунчана и он сделал верную ставку. На пути в столицу, Цзюнносукэ проезжал через маленький городок Дэчжоу. Расспросив местных, он выяснил, что отряд вооружённых людей недавно остановился около храма Хайдо Цзиньшань. Устроив штурм храмовой территории и перебив наружную охрану, Цзюнносукэ обнаружил свою цель молящимся во внутреннем святилище. Как потом оказалось, Иньгуан решил отдать почести своим предкам в местном храме на удачу. Удача, как видно, сыграла с ним злую шутку. Цюй Иньгуан был убит, а храм предан огню вместе с телами всех тех, кто там был и оказал сопротивление. Лишних разрушений можно было бы и избежать, если бы крестьяне не встали на защиту предателя-Иньгуана. С другой стороны, теперь можно всё списать на неповиновение губернатору."
 shandong_events.971.a: "Храм был “скрытой базой повстанцев”"

 shandong_events.972.t: "Сунь Дяньинь не нашёл Иньгуана в Цуфу"
 shandong_events.972.d: "Сунь Дяньинь вместе с отрядом солдат ворвался в Цуфу, личное поместье Иньгуана. Спалив пару домов и побив местную прислуги, Дяньинь смог пробиться во внутреннюю часть поместья. И хотя он прочесал каждый уголок, ни Цюя Иньгуана, ни его друга, герцога Яньшэна, нигде не была. На протяжение ещё нескольких дней поместье и близлежащие кварталы были оцеплены местным гарнизоном. Когда терпения Цзунчана окончательно лопнуло, всё, что он получил – формальное извинение своего подчинённого и награбленные в поместье ценности. Эти дары ничуть не сменили его гнев на милость, он в срочном порядке отправил Датэ Цзюнносукэ прочесать все тракты, ведущие в Пекин, но было уже поздно. Конные отряды смогли найти лишь следы беглеца, но не его самого. Понимая, что здесь уже ничего нельзя поделать, Цзунчан решил сосредоточиться на Игуаньдао."
 shandong_events.972.a: "Ну, хотя бы мы нашли ценные блестяшки"

 shandong_events.4.t: "Цзунчан шлёт своё алиби императору"
 shandong_events.4.d: "Несколько сборников стихов и классических книг, прочитанных когда-то Генералом-Псиной, сослужили ему отличную службу в составлении эмоционального алиби. Письмо, написанное кривым почерком с ужасающими грамматическими ошибками, прибыло в Пекин. Из него стало ясно, что недавнее происшествие в Дэчжоу было лишь маленьким инцидентом, на которое не стоит обращать внимание ни Пу И, ни У Пейфу. Цзунчан обставил ситуацию так, словно он борется с повстанцами и бандитами, не жалея сил. И именно в Дэчжоу он нашёл тайную ячейку агентов Гоминьдана, которые готовили диверсию против императора. Все слухи и рассказы о полном моральном разложении Шаньдуна и его губернатора Цзунчан свёл к морализму культистов Игуаньдао, которые ‘сильно сгущают краски в своих проповедях’. Так или иначе, Цзунчан вышел сухим из воды в этой истории."
 shandong_events.4.a: "У нас всё хорошо, правда-правда"

 shandong_events.5.t: "Представители Пекина арестовали Цзунчана"
 shandong_events.5.d: "Этот дурак Дяньинь всё провалил. Пока он жёг и грабил поместье Иньгуана, тот был уже на пол пути к императору. Несмотря на все его извинения, именно он повинен в том, что отчёт о торговле опиумом в Шаньдуне дошёл до императора. Пу И, разгневанный на нас, отправил карательный батальон в Цзинань, который взял под стражу Чжана Цзунчана и его ближайшее окружение. Все просьбы Цзунчана о том, чтобы разрешить его многочисленной семье видеться с ним, были отклонены. Последнее, что он видел, был один из его сыновей, спрашивает Цюя Иньгуана, переживёт ли его папаша это заключение. Суд Пекина осудил Цзунчана за множество преступлений, вынесенный приговор можно смело рассчитывать, как пожизненное заключение, если только годы курения опиума не приводят к бессмертию."
 shandong_events.5.a: "С папочкой всё будет хорошо…наверное…"

 shandong_events.6.t: "Гнев горы Тай достиг Цзунчана"
 shandong_events.6.d: "Новости о приезде Лю Чжунцзэ быстро достигли Тяньжаня, который был явно в не себя от ярости. Первоначально, он начал просить Цзунчана прибыть к нему для прохождения терапевтических процедур, которые тот посещает уже давно, чтобы подлечить здоровье после очередной бурной ночи. После того, как эти просьбы были проигнорированы, Тяньжань начал слать письма с угрозами, в которых требовал извиниться за подобное унижение пока ‘кара небесная не настигла Цзинань’. Когда и на эти письма не был дан ответ, Тяньжань начал распространять памфлеты, в которых он открыто обвиняет Цзунчана в употреблении и продаже опиума, что официально запрещено законом. Кроме того, Тяньжань готовится нанести удар по поместью Генерала-Псины в Цзинане, если тот сам не явится на гору Тай. Сунь Дяньинь предлагает навестить Наставника и хорошенько наставить ему пока тот ещё не готов нанести удар. Датэ Цзюнносукэ рекомендует не спешить и занять оборонительную позицию, мобилизовав гарнизон Цзинаня."
 shandong_events.6.a: "Пойдём навестим этих святош"
 shandong_events.6.b: "Продолжаем игнорировать угрозы"

 shandong_events.7.t: "’Кара небесная’ настигла Чжана Цзунчана"
 shandong_events.7.d: "Отряд Цзунчана неспешно поднимался на вершину горы Тай. Изрядно подустав, поднимаясь по 6600 ступеням, Цзунчан дал сигнал своим людям готовиться к атаке. Дяньинь предложил пока не светить стволами, спрятав их до поры, до времени под одеждой. Только лишь процессия переступила через врата Дай Миао, Цзунчан был подстрелен насмерть затаившимся стрелком. Его телохранители в спешке попытались достать спрятанное оружие, но их постигла участь своего хозяина. Все, кто сегодня пришёл к Наставнику Тяньжаню, получили обещанную ‘кару небесную’. Собрав свою паству Тяньжань вторгся в Цзинань под новый год, пользуясь анархией, которая началась в городе. На городской площади, перед огромной толпой зевак, он зачитал своё последнее послание Цзунчану и объявил о том, что Шаньдун теперь находится под властью Игуаньдао, чем заслужил овации толпы."
 shandong_events.7.a: "Мы назовём это Днём Кровавого Письма!"

 shandong_events.8.t: "Цзунчан спас город от Игуаньдао"
 shandong_events.8.d: "Последние несколько недель показали, какое обширное влияние имеет Игуаньдао в городе. Перед поместьем Цзунчана то и дело собирались протесты, и даже доверенные друзья начали настаивать на том, что Генерал-Псина должен посетить гору Тай. Наёмники Цзунчана всё чаще и чаще начали ловить агентов Тяньжаня, многие из них имели при себе оружие, письма с проклятиями и яд – всё это предназначалось губернатору. Этим утром Чжан Цзунчан получил последнее письмо, в котором Наставник Игуаньдао объявил войну Генералу-Псине и его режиму. Толпа фанатиков уже ворвалась в город, переполненные гневом и жаждой мести. Единственное, что спасло Цзунчана и Цзинань – совет Цзюнносукэ о мобилизации гарнизона. Подоспевшие отряды открыли огонь по культистам, а японская кавалерия быстро разбила толпу на маленькие разрозненные группы, которые уже не представляли опасности. Все фанатики, атаковавшие Цзинань, были перебиты. Как не пытался скрыть свою лысину Тяньжань, но и ему не удалось уйти живым. Спешно бросая свою паству, он попытался бежать, но был застрелен в спину лично Цзюнносукэ, который преподнёс голову Наставника в качестве подарка своему хозяину."
 shandong_events.8.a: "Наконец-то, люди увидели их истинное лицо"

### Focus tree related events ###
 shandong_events.9.t: "Игуаньдао и народные бунты"
 shandong_events.9.d: "Узнав о смерти Чжана Тяньжаня, тысячи его последователей рванули в Цзинань, в попытках найти останки своего Наставника. Обнаружив, что Тяньжань, как и другие культисты Игуаньдао были наспех закопаны без каких-либо почестей, культисты пришли в ярость. Остатки сектантов нападают на полицейских и сборщиков налогов по всей провинции, в этом им помогают местные крестьяне. Горожане, боясь как Игуаньдао, так и Цзунчана, начали спешно запираться у себя в домах, боясь лишний раз выйти на улицу. Бой был выгран, но война с Игуаньдао в самом разгаре."
 shandong_events.9.a: "Убей одного лысого, и народ как с цепи сорвался!"

 shandong_events.1000.t: "Удар по Нанкину"
 shandong_events.1000.d: "Смерть Суна повергла Восточный Китай в хаос. Пожары, грабежи и бандитизм станут нормой во всем регионе, но в то же время это дает золотую возможность. Гегемония Чжили закончилась, в Китае быстро растет вакуум власти, и если мы сможем воспользоваться своим шансом и взять под контроль Нанкин, мы будем уверены, что сыграем важную роль в предстоящей борьбе за будущее Китая. Лучшие советники [THIS.GetLeader] посоветовали ему двигаться на юг к старой столице и закрепить за нами место одного из крупнейших игроков Китая."
 shandong_events.1000.a: "Нанкин будет наш!"
 shandong_events.1000.b: "Мы должны подождать и посмотреть..."

 shandong_events.11.t: "Военные проекты в Шаньдуне"
 shandong_events.11.d: "Уже ни для кого не секрет, что наша армия безнадёжно отстаёт от западного стандарта. И хотя мы прикладываем все силы, чтобы повысить его, этого явно мало. Нам нужно что-то, что никто другой в Китае не смог бы купить, нам нужен козырь в рукаве. Армейское командование внимательно изучила наработки Ханчеделая, чешского эмигранта, который живёт в Цзинане. Он предлагает обить часть наших Студебеккеров листами стали и сделать из них импровизированные танкетки. Кроме того, мы можем купить оптовую партию велосипедов марки “Flying Pigeon” и выдать их нашей пехоте. И, наконец, третий вариант предложил один профессор из Цзинаньского Университета. Он предлагает закупить альпинистское снаряжение и научить наших бойцов вести сражения глубоко в горах, которых так много в нашей провинции."
 shandong_events.11.a: "Построить танки"
 shandong_events.11.b: "Разработка велосипедных подразделений"
 shandong_events.11.c: "Обучим горнострелков"

 shandong_events.12.t: "Расследование о пропавших грузах"
 shandong_events.12.d: "Последние несколько месяцев оживлённая торговля на маршруте Циндао – Цзинань пришла в упадок. Полицейское расследование установило, что это не леность наших машинистов, а что-то куда более серьёзное. До высших чинов нашего правительства дошли сведения, которые стали настоящим скандалом. Как оказалось, кто-то в наглую ворует товар на пути между двумя городами. Чтобы не распространять лишнюю шумиху, нам рекомендовали не тревожить таможню Циндао расследованием, а сначала проверить основные станции и платформы с нашей стороны. Но что-то нам подсказывает, что товары не могут испариться среди пустынных равнин и малюсеньких перевалочных пунктах. Куда же всё-таки мы направим расследование?"
 shandong_events.12.a: "Проверим станции"
 shandong_events.12.b: "Проверим таможню"

 shandong_events.13.t: "Мы нашли лагерь грабителей?"
 shandong_events.13.d: "Наши догадки были верны. Как оказалось, даже посреди чистого поля можно спрятать лагерь так, чтобы он остался незамеченным. Рядом с одной из станций мы обнаружили несколько подозрительных самостроев в близлежащих кустарниках. Скорее всего, этот импровизированный лагерь служит перевалочным пунктом, откуда товар уходит куда-то ещё. Полиция попросила поддержки военных для штурма данного лагеря и поимки всех его обитателей."
 shandong_events.13.a: "Взять этих наглецов"

 shandong_events.14.t: "Таможня прогнила насквозь"
 shandong_events.14.d: "Наши догадки были верны. Маленькая таможня на границе между Циндао и нашей территорией стала объектом пристального обучения. Небольшое строение, которое с трудом вмещало пятерых, вмещало в себе ещё кое-что интересное. Полиция обнаружила подозрительную полость, которую было предложено вскрыть. Как оказалось, сюда преступники складировали ворованный товар, а сама полость оказалась импровизированным чердаком. Мы были вынуждены арестовать пограничников и устроить им допрос с пристрастием."
 shandong_events.14.a: "Лучше им сознаться"

 shandong_events.15.t: "Атака на бандитов"
 shandong_events.15.d: "Идя по неприглядной дорожке, отряд военных наткнулся на лагерь бандитов, о чём предупредили местного начальника полиции, которому было дано добро взять похитителей живыми или мёртвыми. Завязался бой, который стоил нескольких жизней с обеих сторон. На следующее утро мы получили сообщение о том, что бандиты готовы прекратить борьбу и сдать награбленное добро, если им дадут беспрепятственно исчезнуть вместе со всем их оружием."
 shandong_events.15.a: "Это уже вопрос чести!"
 shandong_events.15.b: "Не нужно лишних жертв"

 shandong_events.16.t: "Пограничники во всём сознались"
 shandong_events.16.d: "Пограничники, который мы поймали с ворованными товарами из Циндао, дли показания и во всём сознались. Они божатся, что на такой шаг их подвигла нищета и бедность и семей. Как они пояснили свои дела они проворачивали под предлогом осмотра поезда. Пока один изображал из себя задумчивого таможенника, отвлекая внимания машиниста, другой подворовывал товар. Ссылаясь на то, что тюрьма Цзинаня слишком переполнена, мы вынесли смертный приговор этим двоим бандитам, после чего приговор был немедленно приведён в исполнение."
 shandong_events.16.a: "Закон суров, но таков закон"

 shandong_events.17.t: "Железные дороги в безопасности"
 shandong_events.17.d: "Когда в Шаньдуне появились новости о том, что [SHD.GetLeader] раскрыл железнодорожных воров, многие в это не поверили. Все проклятия летели в наш адрес, ведь именно наша “прогнившая коррупционная” администрация наживалась на воровстве товара, как все думали. Узнав о том, что мы действительно смогли поймать и разобраться с преступниками, народ нас даже немного зауважал. Товарооборот между Циндао и Цзинанем пришёл в норму, и мы можем с уверенностью заявить, что железные дороги стали безопасными."
 shandong_events.17.a: "Наконец-то, мы можем заняться нашими ж/д путями"

 shandong_events.18.t: "Бандиты убежали в Хэбэй"
 shandong_events.18.d: "Атака на бандитский лагерь провалилась. Наши войска повелись на предложение бандитов сдаться. Пока часть из бандитов обсуждала условия сдача, остальные спешно бежали, спешно бросая ворованное, оружие и даже их одежду. Мы успели поймать лишь парочку самых жадных, который хотели утащить товары с собой. Увидев толпу голых мужчин, спешно убегающих кто куда, бойцы залились смехом и решили не преследовать их. Но и это было ловушкой. Пока солдаты смотрели за этим представлением, основной контингент бандитов уже скрылся в ближайших лесах. Рассвирепев, начальник полиции лично подстрелил одного и убегающих голышей, отобрав винтовку у рядом стоящего солдата. Так или иначе, бандиты скрылись и сейчас, скорее всего, спешного перебираются в Хэбей, подальше от нас."
 shandong_events.18.a: "Ну и фиаско"

 shandong_events.31.t: "Беженцы просят Иньгуана спасти их семьи"
 shandong_events.31.d: "Группа из наиболее активных беженцев, которые переселились к нам с Юга, обратилась к Суну Чжэюаню с просьбой. Они поведали, что на Юге остались их родные и их семьи, изнывающие от того хаоса, который захлестнули регион. Активисты предлагают организовать ограниченную интервенцию на земли бывшей Лиги и скооперироваться с одной из сторон с целью спасти народ от бандитов и ужасов войны. Если мы согласимся, то нам придётся выбирать с умом. Если мы поставим на проигрывающую сторону, то лишь усугубим ситуацию на Юге."
 shandong_events.31.a: "Мы не должны вмешиваться"
 shandong_events.31.b: "Лишь самые храбрые пойдут в бой"

 shandong_events.32.t: "Цин шлёт дополнительную помощь"
 shandong_events.32.d: "Понимая необходимость поддержания порядка и безопасности в своих провинциях, император решил выделить нам дополнительные отряды имперской армии для борьбы с гоминьдановским бандитизмом и протестами. Губернатор [SHD.GetLeader] выразил глубочайшую благодарность за оказанную помощь и пообещал превратить Шаньдун в самое безопасное место во всём Китае. Как говорится, там, где мы нашли гоминьданского ублюдка, там найдётся и второй, не так ли?"
 shandong_events.32.a: "Мы благодарны тебе, Сын Неба"

 shandong_events.33.t: "Фэнтянь поддерживает Чэнь Тяоюаня"
 shandong_events.33.d: "Правительство Фэнтяня, с которым мы находимся в свободном союзе, решило поддержать Чена Тяоюаня из клики Аньцин в его конфликте с Лигой. Репутация Чена намного превосходит [SHD.GetLeader], и наша собственная репутация работает против нас. Хотя это должно улучшить наши шансы против Лиги, это также означает, что из-за поддержки Фэнтяня мы не можем просто затем двигаться против Аньцина."
 shandong_events.33.a: "Хорошо"

 shandong_events.34.t: "Фэнтянь отказывается от вмешательства"
 shandong_events.34.d: "Фэнтянь уведомил нас, что он больше не будет пытаться вмешиваться в наш спор с Аньцином, ссылаясь на то, что мы не сможем договориться. Это прискорбно, так как это также означает, что они не поддержат нас в нашей войне против клики Аньцин, которую мы должны начать немедленно."
 shandong_events.34.a: "Пришло время нанести удар."

 shandong_events.35.t: "Фэнтяньские переговоры терпят неудачу"
 shandong_events.35.d: "Попытка посредничества между нами и кликой Аньцин, Чэнь Тяоюаня, не удалась. Нам нужно двигаться немедленно, прежде чем Чэн сможет ответить."
 shandong_events.35.a: "Пришло время нанести удар."

 shandong_events.36.t: "Сделка с Аньцином заключена"
 shandong_events.36.d: "Мы успешно заключили сделку с Кликой Аньцин. Это означает, что у нас будет время подготовить дальнейшие шаги, пока они имеют дело с Гоминьданом. Важно знать, что эта сделка не является постоянной, и мы будем стремиться изменить ее в нашу пользу, если сможем."
 shandong_events.36.a: "Хрупкий мир."

 shandong_events.37.t: "Прибытие дипломат Аньцина"
 shandong_events.37.d1: "Хотя казалось, что недавнее предложение Фэнтяня не было принято и нами, и Аньцином, скромный дипломат из Аньцина нашел в себе смелость искать аудиенцию у Чжан Цзунчана, чтобы обсудить возможность заключения мирного соглашения без фэнтянского вмешательства. Чжан, который был в нехарактерно хорошем настроении, выслушал дипломата.\n\nВ настоящее время мы занимаем территорию, которую Чэнь Тяоюань считает чрезвычайно важной. По словам дипломата, Аньцин, скорее всего, согласится на мир, если мы откажемся от территории за пределами Цзянсу. Это не может быть плохой идеей, так как этой территорией трудно управлять и она не дает нам много преимуществ, кроме как очень злить Чена. Временный мир также даст нам время для подготовки дальнейших действий."
 shandong_events.37.d2: "Хотя казалось, что недавнее предложение Фэнтяня не было принято и нами, и Аньцином, скромный дипломат из Аньцина нашел в себе смелость искать аудиенцию у Чжан Цзунчана, чтобы обсудить возможность заключения мирного соглашения без фэнтянского вмешательства. Чжан, который был в нехарактерно хорошем настроении, выслушал дипломата.\n\nВ настоящее время мы занимаем территорию только в северной провинции Цзянсу. По словам дипломата, Аньцин, скорее всего, будет готов принять мир, если мы будем держаться только за те территории, которые мы приобрели. Это не может быть плохой идеей, поскольку получение чего-то дополнительного, скорее всего, приведет только к сопротивлению на этой новой территории. Временный мир также даст нам время для подготовки дальнейших действий."
 shandong_events.37.d3: "Хотя казалось, что недавнее предложение Фэнтяня не было принято и нами, и Аньцином, скромный дипломат из Аньцина нашел в себе смелость искать аудиенцию у Чжан Цзунчана, чтобы обсудить возможность заключения мирного соглашения без фэнтянского вмешательства. Чжан, который был в нехарактерно хорошем настроении, выслушал дипломата.\n\nМы не смогли приобрести новую территорию. Дипломат сказал, что Аньцин, скорее всего, готов уступить весь Цзянсу в обмен на мир. Это отличная новость, так как Цзянсу - главная территория, к которой мы стремимся. Временный мир также даст нам время для подготовки дальнейших действий."
 shandong_events.37.d4: "Хотя казалось, что недавнее предложение Фэнтяня не было принято и нами, и Аньцином, скромный дипломат из Аньцина нашел в себе смелость искать аудиенцию у Чжан Цзунчана, чтобы обсудить возможность заключения мирного соглашения без фэнтянского вмешательства. Чжан, который был в нехарактерно хорошем настроении, выслушал дипломата.\n\nМы не смогли приобрести новую территорию. Дипломат сказал, что Аньцин, скорее всего, готов уступить Сюйхуэй, западную часть провинции Цзянсу, в обмен на мир. Это хорошая новость, так как это был бы большой шаг к дальнейшим успехам. Временный мир также даст нам время для подготовки дальнейших действий."
 shandong_events.37.a: "Давай сделаем это."
 shandong_events.37.b: "Бить теперь лучше."

 shandong_events.38.t: "Фэнтянь поддерживает нас"
 shandong_events.38.d: "Конфликт с Аньцином обострился и привел к войне, но к счастью, правительство Фэнтяня решило поддержать нас, а не Чэнь Тяоюаня."
 shandong_events.38.a: "Хорошо."

 shandong_events.39.t: "Фэнтянь поддерживает Аньцин"
 shandong_events.39.d: "Конфликт с Аньцином обострился и привел к войне, но правительство Фэнтяня решило поддержать Чэнь Тяоюаня, а не нас!"
 shandong_events.39.a: "Плохо."

 shandong_events.40.t: "Аньцинская проблема"
 shandong_events.40.d1: "Теперь, когда Гоминьдан потерпел поражение, больше нет необходимости преклоняться перед пожеланиями Чэнь Тяоюаня. Чэнь считает себя лучше других за его поддержку антиконцессионного движения, но мы все знаем, что это просто шоу. Мы больше не можем позволить себе застрять только в Шаньдуне. Мы должны захватить контроль, по крайней мере над Цзянсу (Сюхай, Хуайян, Наньтун). Мы немедленно отправим телеграмму Фэнтянь, чтобы убедиться, что это будет сделано."
 shandong_events.40.d2: "Теперь, когда Гоминьдан потерпел поражение, больше нет необходимости преклоняться перед пожеланиями Чэнь Тяоюаня. Чэнь считает себя лучше других за его поддержку антиконцессионного движения, но мы все знаем, что это просто шоу. Хотя мы взяли под свой контроль по крайней мере часть провинции Цзянсу (штаты Сюхай, Хуайян, Наньтун), теперь мы должны стремиться к отдыху! Мы немедленно отправим телеграмму Фэнтянь, чтобы убедиться, что это будет сделано."
 shandong_events.40.d3: "Теперь, когда Гоминьдан потерпел поражение, больше нет необходимости преклоняться перед пожеланиями Чэнь Тяоюаня. Чэнь считает себя лучше других за его поддержку антиконцессионного движения, но мы все знаем, что это просто шоу. Мы контролируем всю провинцию Цзянсу (штаты Сюхай, Хуайян, Наньтун), но Чэнь Тяоюань из Аньцина определенно не примет это навсегда. Мы немедленно отправим телеграмму в Фэнтянь, чтобы убедиться, что они не передадут ему нашу территорию."
 shandong_events.40.a: "Будем ждать их ответа."

 shandong_events.41.t: "Учебная миссия в Шаньдуне"
 shandong_events.41.d: "Шаньдунская клика остро нуждается в дополнительных войсках, чтобы иметь возможность встретиться с Лигой. Стоит ли нам отправить к ним большую тренировочную миссию? Хотя их победа станет огромным толчком к усилению нашего влияния в Китае, эта учебная миссия ограничит наши собственные возможности по обучению, по крайней мере, на некоторое время."
 shandong_events.41.a: "Давайте сделаем это"
 shandong_events.41.b: "Не стоит затрат"

 shandong_events.42.t: "Учебная миссия Фэнтянь"
 shandong_events.42.d: "Правительство Фэнтяня, поддерживая наши усилия, направило к нам большую учебную миссию, состоящую из китайских и японских сержантов и других офицеров. Это должно помочь нам создать большую армию, необходимую для конфликта с Лигой."
 shandong_events.42.a: "Отличные новости"

 shandong_events.43.t: "[QIE.GetNameDefCap] не отправляет помощь"
 shandong_events.43.d: "Не считая нужным приписывать отправку помощи в Шаньдун, [QIE.GetNameDef] отклонил просьбу [SHD.GetLeader] о прибытии полка армии в Шаньдун в попытке избавить Шаньдун от недавних беспорядков! Губернатор [SHD.GetLeader] выражает свое глубочайшее разочарование [QIE.GetNameDef] за их недальновидное решение, решившее изолировать себя от Шаньдуна и не жалеть ресурсов для помощи нам. Похоже, что пока мы предоставлены сами себе."
 shandong_events.43.a: "Будь они прокляты!"

 shandong_events.100.t: "Инженеров поймали, продавая морские секреты Шаньдуну"
 shandong_events.100.d: "Кэмпэйтай раскрыл заговор нескольких военно-морских инженеров в судостроительной корпорации Кавасаки, которые планируют продавать корабельные проекты Шаньдуну. Кэмпэйтай готов прекратить эту сделку и арестовать этих двоих, но возможно альтернативное решение. Если бы Кэмпэйтай предупредил Корпорацию Кавасаки, что они могут законно продавать корабельные проекты Шаньдуну, они могут сами арестовать предателей, и мы сможем получить прибыль от законной продажи. Это рискованное предложение, но учитывая, что Шаньдун слишком мал, чтобы стать военно-морским конкурентом, ущерб национальной безопасности от продажи минимален."
 shandong_events.100.a: "Оповестите Кавасаки, разрешить продажу"
 shandong_events.100.b: "Нет, немедленно прекратите эту продажу!"

 shandong_events.101.t: "Японские инженеры продают нам проекты"
 shandong_events.101.d: "Тайная сделка потерпела неудачу, но окончательная продажа, похоже, была спасена. Незадолго до заключения сделки, Корпорация Кавасаки предупредила нас, что им было дано разрешение на законную продажу военно-морских проектов. Инженеры, с которыми мы контактировали, сейчас находятся в тюрьме. Этот удивительный поворот событий не сулит ничего хорошего, но в настоящее время он нас удовлетворитяет."
 shandong_events.101.a: "Это было близко"

 shandong_events.102.t: "Японские инженеры арестованы перед продажей"
 shandong_events.102.d: "Тайная сделка потерпела неудачу, и мы потеряли контакт с японскими инженерами. Полагаем, инженеры были арестованы во время крупной облавы в Корпорации Кавасаки, где они работали. Этот удивительный поворот событий не сулит ничего хорошего, а инвестиции, которые мы сделали в проекты, потеряны."
 shandong_events.102.a: "Мы это запомним"

 shandong_events.991.t: "Цзунчан и народные бунты"
 shandong_events.991.d: "Заблудшие души Шаньдуна считают, что в регионе началась анархия, стоило губернатору погибнуть. Мы должны напомнить им, что теперь мы являемся новой властью. Начать стоит с уничтожения бывших сборщиков налогов Цзунчана, которые продолжают грабить сёла, которые вооружаются в ответ на такую дерзость. Ситуацию затрудняет тот факт, что у Цзунчана, несмотря на его грешную жизнь, было много сторонников. Мы уже вынуждены перекрыть подступы к Цзинаню, так как город заполонили тысячи сочувствующих, собравшихся почтить память Генерала-Псины на его похоронах, которые прошли пышнее и торжественнее, чем он того заслуживал."
 shandong_events.991.a: "Странно, как много людей..."

 shandong_events.992.t: "Анти-цинские настроения в Шаньдуне"
 shandong_events.992.d: "После грандиозного возвращения Суна из Пекина, представители императора арестовали Цзунчана и его клику. Зная местных солдат, Чжэюаню ничего не стоило купить их верность, переманив большую часть на свою сторону. Кроме того, за него вступились отряды линчевателей, которые патрулировали сельскую местность от нападений бандитов. Однако не всё так гладко, как хотелось бы. Остатки верных Цзунчану людей продолжают грабить и разорять народ, распространяя смуту. Масла в огонь подливают культисты Игуаньдао, чья деятельность развернулась в полную мощь."
 shandong_events.992.a: "Благоденствие вернётся ещё не скоро"

 shandong_events.21.t: "Цюй Иньгуан просит помощи"
 shandong_events.21.d: "После того, как наши представители арестовали Чжана Цзунчана в Шаньдуне, Цюй Иньгуан был назначен на его место. Ему было поручено разузнать, какой ущерб режим Цзунчана принёс провинции. Для многих стало настоящим шоком истинное положение дел в регионе, о котором стало известно из очередного доклада Иньгуана. Он жалуется на то, что в Шаньдуне действует множество банд, и его сил не хватает для их подавления. Иньгуан просит нас выделить дополнительные войска и отправить их к нему для восстановления порядка. Что нам ему ответить?"
 shandong_events.21.a: "У нас есть другие дела"
 shandong_events.21.b: "Ну и кашу заварил этот Цзунчан"

### 400 - 409 Natpop Flavour Events

 shandong_events.400.t: "Чжао Матриарх присоединяется к Чжан Тяньжаню"
 shandong_events.400.d: "В море беженцев, спасающихся бегством на северо-востоке Китая, много обещаний было дано Достопочтенному Магистру Чжао Тяньжаню. Многие крестьяне доверили Чжао свое имущество, другие поклялись сражаться в Красных Копьях за Шаньдун. В солнечный день к Чжао Тяньжаню подошла женщина в зимней одежде из Пекина. Стражи Игуаньдао утверждают, что она матриарх, как и жена Тяньжаня, Сунь Су Чен, но она стоит перед ним с двумя пистолетами на поясе. Чжао Хун Венго, мать пекинского студенческого лидера Чжао Донга, приехала сюда, чтобы предложить свои семейные услуги Игуаньдао. Чжао Хун Венго утверждает, что делает это не из религиозной верности или финансовой необходимости, а потому, что Игуаньдао оказывает существенное сопротивление против японской агрессии, угрожающей ее дому. Достопочтенный Магистр соглашается и повторяет свое обещание никогда не сотрудничать с японцами, в обмен на финансовые и тактические услуги ее семьям. Чжао Хун Венго также входит в состав командования дивизий "Красное Копье" и "Большой Меч", в качестве полноценного фельдмаршала."
 shandong_events.400.a: "Ее решимость не оставляет нам сомнений в ее способностях."

 shandong_events.401.t: "Тяньжань публикует Предварительный этикет"
 shandong_events.401.d: "Тяньжань давно настаивал на том, чтобы учения буддизма и Конфуция являлось неотъемлемыми аспектами китайского общества, которые никогда не могут подвергаться сомнению. Во внутреннем кругу Игуаньдао бушует спор между Чжан Тяньжанем и Сунь Су Ченом о том, как лучше всего привлечь литераторов в Шаньдун. Тяньжань и Су Чен совместно работали над книгой под названием "Предварительный этикет", предназначенной для демонстрации того, как Игуаньдао уважает духовное происхождение китайского руководства. Для Чжан Тяньжаня, который когда-то был мелким бюрократом при Юань Шикае, духовная родословная китайского диктатора перешла от регента Цзайфэна к Юань Шикаю, а затем, наконец, к воцаренному Пу И. Однако для Сунь Су Чена, духовное происхождение в Китае принадлежало Сунь Ятсену, и после смерти Сунь Ятсена в настоящее время нет истинного духовного лидера Китая. Интерпретация Чжана, похоже, подтверждает его согласие продвигать Пу И как Императора в Игуаньдао, но игнорирует источник духовной поддержки южных идеалистов."
 shandong_events.401.a: "Чжан прав, восхваляйте Пу И"
 shandong_events.401.b: "Сунь прав, восхваляйте Сунь Ятсена"

 shandong_events.402.t: "Тяньжань чтит духовную преемственность доктора Сунь"
 shandong_events.402.d: "Доктор Сунь является важной фигурой для всего Китая, так как его 'Три Точки' - основа будущего Китая.  Мы должны чтить этого великого человека, ибо он действительно является примером того, что значит быть китайцем. Некоторые могут указывать на то, что он христианин, но мы все знаем, что это была лишь оболочка для его внутренней китайской души! Более того, его забота о китайском народе перекликается с духовным учением императрицы Цыси. Конечно, такой великий человек должен влиять на Пу И!"
 shandong_events.402.a: "Его уверенность в себе готовит нас к Маха-Кальпе"

 shandong_events.403.t: "Плохая урожайность в Шаньдуне"
 shandong_events.403.d: "Голод давно разоряет народ Китая, что вызвало массовые смерти и до сих пор держит нас в зависимости от зерна вне нашего контроля. Наша чрезмерная зависимость от традиционного сельского хозяйства, вероятно, является причиной такого положения, но попытка отойти от него, привела бы в ярость фермеров, которые использовали одни и те же проверенные и настоящие методы на протяжении тысячелетий. Мы всегда можем начать внедрять новые, современные методы ведения сельского хозяйства, известные нам от жителей Запада и рискнуть оттолкнуть наших сторонников, которые обращаются к нам за традиционным руководством, или мы могли бы выделить значительную часть наших Красных Копий, чтобы помочь фермерам и убедиться, что мы не страдаем от голода."
 shandong_events.403.a: "Тайно распределять удобрения"
 shandong_events.403.b: "Красные Копья на поля"

 shandong_events.404.t: "Буддийский священник Джузан объявляет Тяньжаня ересиархом"
 shandong_events.404.d: "Наши буддийские братья в Хунане, решили начать кампанию клеветы против нас! Наставник Джузан объявил Игуаньдао ересью, а Тяньжаня - ересиархом! Это обличение, уже вызывает колебания на нижних ступенях нашей организации. Менеджеры сообщают, что несколько богатых буддийских доноров перестали появляться в храме. Буддийские наставники, обучающиеся в Тайшане, уже слышали эту новость, и их нерешительность заставила некоторых из них покинуть Игуаньдао. Для Чжан Тяньжаня, наставник Джузан - не что иное, как фанатичный сектант, желающий разрушить китайскую духовную родословную и предотвратить Маха-Кальпу."
 shandong_events.404.a: "Отправь Красные Копья, чтобы найти и сжечь брошюры Джузана"

 shandong_events.405.t: "Пойман бывший почтенный наставник Лу Чжунцзе"
 shandong_events.405.d: "Чжан Тяньжань вполне может быть 18-ым патриархом Игуаньдао, но шрамы от ухода Лу Чжунцзе остаются. После того, как Лу Чжунцзе во второй раз сбежала из Шаньдуна во время штурма Игуаньдао на Цзинане, наши Красные Копья замечали ее нечасто. После того, как наставник Джузан поговорил с Лу Чжунцзе, когда он снова опубликовал свою клевету на нас, Красные Копья прокрались в Хунань. Один из наших самых преданных младших императоров, сумел выследить ее и вернуть нам после всех этих лет. Во внутреннем кругу бушуют дебаты о том, как справиться с этой неожиданностью. Для Чжан Тяньжаня и Сунь Су Чена, поддержание жизни Лу Чжунцзе, побуждает дальнейших инакомыслящих почитать ее как перевоплощенного Гуань Инь. Для Красного Копья и их лидера Сюэ Дяня, Лу Чжунцзе была настолько слабой, что не представляла для них угрозы. Сюэ Дянь настоял на том, чтобы посадить Лу Чжунцзе под домашний арест, и чтобы ей не причинили никакого вреда."
 shandong_events.405.a: "В тюрьму, но не причиняйте ей вреда!"
 shandong_events.405.b: "Игнорируйте Сюэ Дянь, Лу Чжунцзе умрёт!"

 shandong_events.406.t: "Общество Красной свастики бросило Игуаньдао"
 shandong_events.406.d: "Общество "Красная свастика", бывший союзник Игуаньдао во время режима Чжан Цзунчана, наконец-то откололось и бросило нас. Эта новость является сюрпризом даже для Почтенного наставника, которому даже страшно придумать ответ своим последователям. Тем не менее, для Сунь Су Чена это дезертирство доказывает ее неприятие военного положения, которое, как она утверждает, она всегда чувствовала. Сунь воспользовалась этой возможностью, чтобы отчитать Чжан Тяньжаня, сказав, что это было очевидным следствием попытки уравновесить войну с благотворительностью. Вне пределов внутреннего круга Игуаньдао, младшие императоры и управляющие преуменьшают эту потерю. По их слвоам, Общество Красной свастики было выкуплено американской YMCA, чтобы оклеветать и опорочить Игуаньдао."
 shandong_events.406.a: "Виноват американский доллар"

 shandong_events.407.t: "Тяньжань тайно встречает Цунэсабуро Макигути"
 shandong_events.407.d: "Почтенный наставник Чжан Тяньжань, вступает в контакт с Сока Гаккай в Японии. Это буддийское общество, подвергалось притеснениям со стороны правительства за лоббирование коллег-буддистов против японской интервенции в Китай. Письмо Чжана Тяньжаня к Цунэсабуро Макигути, было распространено среди общественности, подчеркивая их общую привязанность к Лотосовым сутрам. Похоже, что японская общественность положительно восприняла это письмо. Наши японские братья и сестры еще могут повлиять на ситуацию в более выгодном для нас направлении."
 shandong_events.407.a: "Достопочтенного японца следует почитать"

 shandong_events.408.t: "Тяньжань отправил письмо Дао Цай Дао"
 shandong_events.408.d: "Почтенный наставник Чжан Тяньжань, вступил в контакт с лидером Дао Цао Дай во Вьетнаме. Эта группа получила послания от таинственного Цао Дая, божественной буддийской силы, которая как они утверждают, объединяет человечество всех рас. Сострадательное письмо Тяньжаня, надеется установить и формализовать связи с нашими братьями во Вьетнаме. Нынешний лидер Дао Цай Дао, Фам Конг Так, организовал ополчение, похожее на "Красные Копья Шаньдуна", для защиты своей земли от немецкого религиозного абсолютизма. Несмотря на длительное соперничество и вражду между китайцами и вьетнамцами, мы можем еще больше сблизиться через нашу общую веру, а следовательно друг с друга."
 shandong_events.408.a: "Достопочтенного Юэ следует почитать"

 shandong_events.409.t: "Тяньжань отправил письмо Ким Тархён"
 shandong_events.409.d: "Почтенный наставник Чжан Тяньжань вступил в контакт с Чхондогё в Корее. Чхондогё - благородная группа конфуцианцев, которые видят сквозь империалистическую ложь и стремятся к независимой Корее. Чхондогё известны своим бывшим лидером Чон Бонджун, который был казнен японскими военными за участие в восстании Тонхак. Благодаря этой пропаганде, мы можем оказывать дальнейшее влияние на корейский Небесный путь, и таким образом, мы можем получить поддержку со стороны корейских буддистов и конфуцианцев, которые сочувствуют нашему делу."
 shandong_events.409.a: "Достопочтенных корейцев следует почитать"

 shandong_events.410.t: "Цюй Иньгуан отправляет спасательный круг в Пекин"
 shandong_events.410.d: "В провинции Шаньдун поднялся туман смятения, но появился человек, Цюй Иньгуан. Сун отвечал за предупреждение магистрата о незаконных и непростительных преступлениях Чжан Цзунчана в Шаньдуне, после чего в знак благодарности был назначен губернатором. Губернатор Цюй Иньгуан, ссылаясь на восстания сдерживающие Шаньдун, умоляет правительство Цин помочь восстановить порядок. Существуют опасения, что провинция может быть проиграна другому военачальнику, или даже потеряна Гоминьдану. Конечно, Цин не позволит другой провинции отпасть от них?"
 shandong_events.410.a: "Наконец-то губернатор с умом"
 shandong_events.410.b: "Мы не доверяем бывшему республиканцу"

 shandong_events.411.t: "Пекин обещает защиту Шаньдуну"
 shandong_events.411.d: "Пекинская делегация уступила, и направила отряд солдат для розыска и ареста бандитов в Шаньдуне. Солдаты прибыли с большими фанфарами в Цзинань, откуда были направлены генералом Цюй Иньгуан во все города. Похоже, что большинство повстанцев сопротивляющихся налогообложению, сложили оружие, а некоторые, оказавшие сопротивление, теперь находятся за решеткой."
 shandong_events.411.a: "Наконец мы можем сосредоточиться на внутренних делах"

 shandong_events.412.t: "Пекин отвергает просьбы Иньгуана"
 shandong_events.412.d: "Пекинская делегация занимает твердую позицию и отказывается посылать солдат в Шаньдун, чтобы помочь бывшему республиканскому губернатору. Генерал Цюй Иньгуан решил использовать блеф. Для запугивания повстанцев в Шаньдуне, будут посланы запасные солдаты, одетые в цинскую форму. Будем надеяться, что повстанцы не узнают о том, что солдаты которых мы посылаем разбить их, не из Пекина."
 shandong_events.412.a: "Мы должны защитить себя"

 shandong_events.413.t: "Прибыл изгнанный из Шаньдуна военачальник"
 shandong_events.413.d: "Хотя наши военные не достигают уровня лояльности, наблюдаемого в западных державах, мы гордимся меритократией. Командиры и адмиралы, которых вы видите на поле боя, доказали свою преданность вождю и людям. С другой стороны, победа может зависеть от смертоносной воли еще большего числа наемных командиров, готовых сделать или умереть. Этот человек приезжает к нам из шумной провинции Шаньдун, чьи клики в прошлом сильно зависели от наемных командиров. Этот генерал приходит с слезливой историей о том, как приливы и отливы обрушились на него, и он пришёл к нам в лохмотьях, готовый хоть раз сразиться за доброе дело. Трудно определить, является ли он искренним, но мы должны решить, стоит ли его вербовать в это и без того предательское время."
 shandong_events.413.a: "Нам нужна любая помощь"
 shandong_events.413.b: "Хорошая история, все равно скажу нет"

### 414 - 423 Authdem Flavour Events

 shandong_events.414.t: "Кун Дэчан оскорбил пекинского учёного"
 shandong_events.414.d: "Молодой Кун Дэчан, одно из доверенных лиц Общества Восстановления Благоденствия, недавно отличился на публике. Унаследовав поместье Цуфу, он долгое время не следил за новомодными веяниями в Конфуцианстве, которыми увлеклась столица. Личности, подобные У Пейфу, начали придумывать свою вольную интерпретацию классических канонов, чего никак не пожелал признавать Кун Дэчан. Его публикации носят ярый анти-ревизионистский и консервативный характер. Особенно рьяно он прошёлся по Чэню Хуаньчжао, чьи идеи о поддержании благочестия и порядка в стране посредством государственного принуждения он назвал извращённой ересью. Дэчан отстаивает позиции того, что каждая семья в Китае должна сама прийти к подобному образу жизни, а не изображать оную, боясь расправы. Подобные взгляды привели к опале Дэчана в интеллектуальных кругах Пекина."
 shandong_events.414.a: "Ах, этот юношеский задор…"

 shandong_events.415.t: "Иньгуан скупает дворянские титулы"
 shandong_events.415.d: "Герцог Яньшэн, Маркиз Великой Милости, а также множество других пафосных дворянских титулов было куплено Суном Чжэюанем для себя и своих друзей у имперской администрации с целью поддержать бюджет Цин, который последнее время имеет тренд на убыль. Эти титулы носят исключительно косметический характер и не дают никаких фактических привилегий при дворе. Однако тут, в Шаньдуне, обладатели подобной титулатуры сразу приобрели вес и значимость в глазах народа. Друзья и союзники Иньгуана получили от него в подарок и земельные наделы из средств регионального фонда, чтобы ещё больше закрепить за собой статус дворян и увеличить своё влияние на местных."
 shandong_events.415.a: "Спасибо, о император"

 shandong_events.416.t: "Голод в Шаньдуне, нужна помощь Пекина"
 shandong_events.416.d: "Урожай этого года был сильно ниже от запланированного нашей администрацией. Многолетнее использование полей под опиумные плантации и варварские методы ведения хозяйства подручных Цзунчана привели к крайнему истощению почв и голоду в Шаньдуне. Цюй Иньгуан обратился к имперской администрации с просьбой наладить поставки зерна из провинции Хэбэй, где урожай в этом году выдался особенно большим. С помощью импортного зерна, Иньгуан хочет прекратить голод и создать резервный фонд на случай, если подобный неурожай случится снова. Людям придётся затянуть потуже пояса и отдать своё кровно нажитое на новые чрезвычайные налоги."
 shandong_events.416.a: "Горький опыт научил нас запасать зерно"

 shandong_events.417.t: "Большие Мечи покинули Игуаньдао"
 shandong_events.417.d: "Большие Мечи, отряд крестьянского ополчения, который когда-то присягал на верность Чжану Тяньжаню, покинул его и хочет присоединиться к нам. Их лидер лично прибыл в Цзинань на аудиенцию к Чжэюаню. Большие Мечи хотели лишь одного – избавиться от наркотрафика в регионе, и мы с этим справились, заслужив их почёт и уважение. Одно нас смущает – нам придётся платить им так же, как и регулярным солдатам, что нагрузит наш бюджет ещё сильнее. Примем ли мы на службу этих храбрых ополченцев?"
 shandong_events.417.a: "Нам нужны только профессионалы"
 shandong_events.417.b: "На всегда нужны новые люди"

 shandong_events.418.t: "Общество Жёлтого Песка напало на нас"
 shandong_events.418.d: "В провинции Хэнань было создано Общество Жёлтого Песка – культ, наподобие Игуаньдао. Эти благородные бандиты были изгнаны из своих домов имперскими войсками и перебрались к нам в Шаньдун, повторяя свою вековую мантру об “уничтожении проклятой Цин и возрождении Мин”. Эти избитые фразы подстегнули культистов к разбоям и поджогам. Отряды бандитов-фанатиков подобрались к городку Дэчжоу, где находится фамильный храм семьи Иньгуана. К счастью, местный гарнизон с лёгкостью отразил атаку и рассеял бандитов, убив многих из них и захватив их лидера. Ведомые своей ненавистью к императору, члены Общества Жёлтого Песка погибли, большей частью, в своём первом же бою, а те жалкие остатки, что смогли убежать, скрылись где-то на границе с Хэнанем."
 shandong_events.418.a: "Ничему их жизнь не учит"

 shandong_events.419.t: "Общество Жёлтого Песка ретировалось из Шаньдуна"
 shandong_events.419.d: "В маленьком шаньдунском городке Дэчжоу разразился вооружённый конфликт. Культисты из Общества Жёлтого Песка попытались напасть на фамильный храм губернатора Иньгуана. Силами местного гарнизона, большая часть бандитов была истреблена, а их лидер схвачен. Жалкие остатки, которые смогли бежать, вернулись к нам в Хэнань, где культ окончательно и распался."
 shandong_events.419.a: "Неплохая попытка"

### 424 - 423 Patauto Flavour Events

 shandong_events.424.t: "Посольство в Фэнтянь"
 shandong_events.424.d: "Чжан Цзунчан, с целью заручиться ещё большей поддержкой у Чжан Цзолиня, решил лично посетить столицу Фэнтяня, Шеньян, и встретиться со своим другом. Однако посольство провалилось, не успев даже начаться. По прибытии в Шеньян, Цзунчан изрядно напился и решил пройтись по местным борделям перед официальной встречей. Цзолиню потребовалось целых 3 часа после предполагаемого начала встречи, чтобы найти своего горе-союзника, который явно был уже не в кондиции. Из всех дипломатических приветствий, Цзунчан выбрал самое необычное. Лёжа на полу, он попытался встать на ноги, но лишь обильно залил ботинки Цзолиня своей рвотой и окончательно отключился. Такое фиаско ещё не скоро забудут! "
 shandong_events.424.a: "Цзунчан выставил себя клоуном"

 shandong_events.425.t: "Чжан Цзунчан издал сборник стихов"
 shandong_events.425.d: "Даже такой человек, как Чжан Цзунчан, может иметь тонкий вкус в поэзии. Генерал-Псина решил издать сборник стихов собственного производства. И хотя качество его работ весьма сомнительное, Цзунчан остался очень доволен собой и даже вёл себя менее ублюдски в этот день."
 shandong_events.425.a: "Псина прекратила гавкать хотя бы на мгновение"

 shandong_events.426.t: "Псина показала клыки!"
 shandong_events.426.d: "Чжан Цзунчан недавно опубликовал свои комментарии касательно 13-ти классических конфуцианских текстов. В своей публикации он основательно прошёлся по воззрениям У Пейфу, грязно оскорбив его всевозможными словами. Цзунчан обвиняет Пейфу в том, что тот извращает учение Конфуция в угоду сложившейся политической конъюнктуры при императорском дворе, совершенно забыв об изначальных идеях философа о благочестии и абсолютной морали."
 shandong_events.426.a: "Заступник морали, которого мы заслужили"

 shandong_events.427.t: "Псина сцепилась с псиной?"
 shandong_events.427.d: "Цзунчан, выйдя на новый уровень извращения, завёл себе привычку спать с жёнами своих подчинённых. В поисках очередной жертвы, он приглядел супругу своего командира, Суня Дяньина. Рогоносец прознал про сношения своей жёнушки с Цзунчаном и теперь шантажирует своего начальника, требуя повышения. И хотя об образе жизни Генерала-Псины и так всем давно известно, подобная выходка может сильно подорвать его авторитет среди собственных подчинённых. Возможно, стоит прислушаться к словам Дяньина."
 shandong_events.427.a: "Давайте всё спокойно обсудим…маршал"
 shandong_events.427.b: "А жёнушка твоя - бревно"

 shandong_events.428.t: "Генерал-Псина и старый добрый уголь"
 shandong_events.428.d: "Цзунчан недавно ввёл новый налог на экспорт угля, обложив каждую вывезенную тонну дополнительными 40 центами таможенного сбора. Этот шаг был призван привнести новые средства в бюджет Шаньдуна за счёт иностранных покупателей, которым теперь придётся платить больше за тот же объём поставок."
 shandong_events.428.a: "Деньги не пахнут!"

 shandong_events.429.t: "Необычная драка в борделе"
 shandong_events.429.d: "Цзунчан, то ли в очередной раз обкурившись опиума, то ли изрядно перебрав, умудрился назначить на пост Министра Безопасности сразу двух человек одновременно. Двое мужчин, поняв весь казус ситуации, решили обратиться к своему начальнику с просьбой разобраться. Они нашли его в борделе, предающимся утехам. Не желая вникать в ситуацию, Цзунчан просто приказал своим подчинённым устроить бой на кулаках, победителю которого достанется должность. Мужчины устроили драку прямо в борделе, не сдерживая себя, в надежде забить противника и забрать себе прибыльное местечко во власти. Он мутузили друг друга какое-то время, на потеху Цзунчану и его девочкам."
 shandong_events.429.a: "Можно ли считать это оргией?"

 shandong_events.430.t: "Самое дешёвое из лекарств"
 shandong_events.430.d: "Из-за того, что Цзунчан уже многие года варварски использует поля Шаньдуна в качестве плантаций по выращиванию опиума, ‘самого дешёвого лекарства от всех болезней и забот’, почвы в провинции начали стремительно истощаться, что подтолкнуло нас на порог голода. Часть плантаций придётся вырубить под корень, а народу стоит затянуть потуже пояса. Даже сам Цзунчан был вынужден поменьше налегать на свой любимый наркотик."
 shandong_events.430.a: "Действительно, у него сильная воля"

 shandong_events.431.t: "Сунь Дяньин строит храмы бандитов"
 shandong_events.431.d: "Автономия генерала Сунь Дяньиня в армии велика настолько, что его офицеры действуют так, как будто Сунь Дяньин - это клика в клике. Солдаты Сунь Дяньин, разграбив Тайшань и получив книги Игуаньдао, замыслили закрепить власть Сунь Дяньин. Поскольку Сунь Дяньин был когда-то руководителем Общества Храмовой дороги в Хэнане, прежде чем отступить в Шаньдун, его люди посчитали разумным воссоздать общество в Тайшане. На вершине горы Тай, под обязательным опиумным туманом, Сунь Дяньин построил храм под названием "Девятое небо". По сообщениям, солдаты Сунь Дяньина начали рисовать на своих лицах персонажей Тэ и Шэна."
 shandong_events.431.a: "Трудно избежать веры в Шаньдун"

 shandong_events.432.t: "Императрица лишилась одеяний"
 shandong_events.432.d: "Сунь Дяньинь, в поисках очередной наживы, приказал своим людям разорить гробницу вдовствующей императрицы Цыси, чьи шелковые одеяния были украдены прямиком с трупа. И хотя Цыси являлась персоной неоднозначной, в которой одни видят закостенелого тирана, приведшего Китай к Веку Унижений, некоторые видят в ней воплощение истинной китайской аристократки. Так или иначе, разграбление могилы императрицы вызвало сильное возмущения в Пекине."
 shandong_events.432.a: "Это же был ценный артефакт!"

 shandong_events.433.t: "Очередное унижение Мин"
 shandong_events.433.d: " Сунь Дяньинь, в поисках очередной наживы, приказал своим людям разорить мавзолей Мин Сяолин, построенный при прежней династии Мин. Гробницы были разграблены, а само культовое сооружение сожжено, варварство, которое свет не видывал с 1644 года, когда Ли Цзычен захватил Пекин и предал огню многие гробницы Мин. Судя по всему, старые слоганы о том, что китайцы должны восстановить священную династию, утратили свою значимость."
 shandong_events.433.a: "У людей нет ничего святого"

 shandong_events.434.t: "Новая столица?"
 shandong_events.434.d: "Наше расширение на юг привело к тому, что мы теперь управляем не одним лишь Шаньдуном. И хотя самые консервативные наши сторонники предлагают оставаться дома, в Цзинане, другие настаивают на том, что нам стоит перебраться в Нанкин, который имеет большую стратегическую и экономическую значимость."
 shandong_events.434.a: "Останемся в Цзинане"
 shandong_events.434.b: "Переберёмся в Нанкин"

 shandong_events.438.t: "Шанцин Тяньгоу создано"
 shandong_events.438.d: "Губернатор Чжан Цзунчан, известный в народе как Генерал-Псина, был убит. Газеты докладывают, что Цзунчан и его ближайшее окружение было убито культом Игуаньдао при попытке штурма их резиденции на горе Тай. Наставник Чжан Тяньжань, пользуясь сложившейся анархией, объявил, что теперь он управляет Шаньдуном. В прессе о нём мало что когда-либо говорили, но для простого крестьянина имя Наставника Тяньжаня всегда было на слуху. Игуаньдао, получив полную власть над провинцией, объявило о создании Шанцин Тяньгоу. Консервативные круги в Китае поддержали новообразованное государство, видя в нём рассвет новой эпохи."
 shandong_events.438.a: "Звучит как-то скверно..."

 shandong_events.439.t: "Беспорядки на Юге"
 shandong_events.439.d: "Лигу Восьми Провинций захлестнула волна беспорядков, связанных с продажей Германии новопостроенной железной дороги, в которую было вложено столько сил. Нам стоит держать ухо в остро, ведь мы можем чем-нибудь да поживиться, стоит Клике Чуаньфана потерять власть над Югом. "
 shandong_events.439.a: "Мы внимательно следим за ситуацией"

 shandong_events.440.t: "Роковая пуля"
 shandong_events.440.d: "Маршал Сунь Чуаньфан был застрелен неизвестным стрелком. Беспорядки в Лиге только нарастают, неудивительно, что какой-то смельчак добрался до Чуаньфана. Ещё неясно, что станет с южными провинциями, но нам стоит внимательно следить за ситуацией."
 shandong_events.440.a: "Эта пуля навсегда изменит судьбу Китая"

 shandong_events.445.t: "Мелкий император Сю Дянь и Лю Чжунцзэ сбежали"
 shandong_events.445.d: "Заверив Чжана Тяньжаня и Суня Сучжэня, что Лю Чжунцзэ изолирован, мелкий император Шаньдуна предал Игуаньдао. Не застав того на утренней тренировке, солдаты Красных Копий обнаружили, что его комната была пуста. В панике, они попытались найти Сю Дяня, но их опасения только усугубились, когда вскрылось, что вслед за ним исчез и Почётный Учитель Лю Чжунцзэ. После того, как Чжан Тяньжань прибыл в его комнату, пребывая в несвойственной ему ярости, он попросил помощи у духов. После нескольких часов медитации он покинул комнату Сю Дяня и заявил, что тот был выбран высшими силами, чтобы немедленно отправиться в вечное паломничество. И хотя Красные Копья были удовлетворены таким объяснениями, оппозиция за пределами горы Тай быстро вычислила, что эти двое просто на просто сбежали из культа. К удивлению многих, даже самого Суня Сучжэня, Тяньжань не стал объявлять охоту за ними. Видимо, Почётный Мастер принял последствия своих решений, на которые он не рассчитывал."
 shandong_events.445.a: "Время Маха-Кальпы пришло"

 shandong_events.500.t: "Победа в войне Лиги!"
 shandong_events.500.d: "Мы победили"
 shandong_events.500.d1: "Для Китая начинается новая эра. Когда началась война Лиги, силы Игуаньдао были всего лишь странной, но влиятельной организацией, но, вступив в Нанкин, они принесли надежду и искупление землям, страдающим от коррупции и зла. Теперь Чжан Тяньжань, 18-й патриарх Игуаньдао, вышел победителем из Войны Лиги и правит богатыми восточными провинциями Китая. Он не терял времени даром: в городе Нанкине конфисковывали опиум, устраивали облавы на притоны и изгоняли преступных иностранцев. Монахи Ингуаньдао, стремясь заслужить расположение населения, оказывали помощь страждущим и нуждающимся.\n\nНо хотя наш контроль над Восточным Китаем был в основном обеспечен, беззаконие остается нормой в слишком большой части сельской местности. Несговорчивые губернаторы, бандиты Гоминдана, остатки полевых командиров - список препятствий на пути интеграции довольно длинный. Потребуется некоторое время, чтобы закрепить контроль над землями, которые мы завоевали в борьбе, но вскоре Шанцин Тяньгоу вознесет Китай в новую эру праведной морали."
 shandong_events.500.d2: "Для Китая начиналась новая эра, или так думали радикалы Гоминдана и фанатики Игуаньдао, пытаясь навязать народу свои опасные идеологии. Отличаясь от остальных мелких правителей Китая прежде всего масштабами своей коррупции и экстравагантности, генерал-догмат Чжан Цзунчан вышел победителем из Войны Лиги и стал править богатыми восточными провинциями страны. Чтобы отпраздновать этот невероятный подвиг, Чжан Цзунчан устроил ночь пьяных увеселений, в завершение которой употребил огромное количество опиума и совершил тур по прекрасным борделям Нанкина.\n\nНо хотя контроль над Восточным Китаем был в основном обеспечен, беззаконие остается нормой в слишком большой части сельской местности. Несговорчивые губернаторы, бандиты Гоминдана, религиозные фанатики - список препятствий на пути интеграции довольно длинный. Потребуется некоторое время для консолидации контроля над землями, которые мы завоевали в борьбе, но вскоре мы сможем объявить о создании новой Лиги Восточно-Китайских Провинций под управлением будущего маршала Чжан Цзунчана."
 shandong_events.500.a: "Наконец-то мир"

 shandong_events.501.t: "Чжан Чжунчан покидает Шаньдун"
 shandong_events.501.d_FNG: "Оставив Цзинань в огне, а Шаньдун - в метаниях жестокого восстания, Чжан Цзунчан недавно прибыл в [745.GetCapitalVictoryPointName] с группой близких соратников за штурвалом спешно захваченного грузового судна для перевозки скота. Несмотря на непритязательное средство передвижения, генерал-догмат быстро добрался до Шэньяна и потребовал возвращения в ближний круг Чжан Цзуолиня. Несмотря на недавнее поражение, Чжан Цзунчан остается грозным генералом, которого считают одним из самых эффективных в Северном Китае. Многие утверждают, что его возвращение представляет собой непревзойденную возможность.\n\nКак бы то ни было, Чжан быстро утвердил свою автономию, когда оказался в изоляции в Шаньдуне во время Третьей Чжифэньской войны. Его армии остались в стороне в 1928 году, в самый трудный для нас момент; это было предательство, но только по названию.\n\nНа самом деле, именно Чжан Цзуолинь сделал Чжан Цзунчана; именно его армии генерал-догмат привел к победе. Теперь, когда он снова зависит от милосердия Великого Маршала, не говоря уже о его помиловании, следует ли продлить и то, и другое?"
 shandong_events.501.d_SZC: "Оставив Цзинань в пламени, а Шаньдун в метаниях жестокого восстания, Чжан Цзунчан прибыл в [SZC.Capital.GetCapitalVictoryPointName] с группой близких соратников. По всей видимости, оставшись без дома в Фэнтяне, Чжан теперь смело требует места во главе одной из наших армий и обещает серию быстрых побед.\n\nНесмотря на недавние поражения, Чжан Цзунчан остается грозным генералом, которого считают одним из самых эффективных в Северном Китае. Многие утверждают, что его возвращение представляет собой непревзойденную возможность. С другой стороны, Чжан известен своей непредсказуемостью и плохой репутацией в самых уважаемых кругах."
 shandong_events.501.a: "Добро пожаловать, Старый Восемьдесят Шестой!"
 shandong_events.501.b: "Нам не нужна эта бешеная собака."

 shandong_events.502.t: "Лоялисты Цзунчана бегут из Шаньдуна"
 shandong_events.502.d: "После попытки штурма священной горы Тай Чжан Цзунчан и его старший лейтенант Сунь Дяньин были застрелены. Лоялисты, пережившие штурм, бежали из Шаньдуна и теперь прибыли в [ROOT.GetNameDef]. Они попросились на службу в наши вооруженные силы, возможно, надеясь однажды вернуться домой. Хотя их знания могут оказаться полезными в будущих сражениях в Шаньдуне, другие члены вооруженных сил считают их не более чем бандитами."
 shandong_events.502.a: "Здесь им рады."
 shandong_events.502.b: "Нам не нужны зависимые военачальники."

 shandong_events.503.t: "Маньчжуры бегут из Пекина после неудавшегося переворота!"
 shandong_events.503.d: "После неудачной реставрации Цин в Пекине некоторые маньчжурские генералы и советники бежали от призраков Чжилийской клики У Пэйфу и теперь ищут убежища в нашей провинции. События развиваются быстро, и хотя судьба императора Пу И и его брата Пуцзе пока неизвестна, эти члены семьи предлагают свою помощь в деле восстановления монархии/"
 shandong_events.503.a: "Им здесь рады"
 shandong_events.503.b: "Они нам не нужны"

 shandong_events.504.t: "Безудержный гамбит"
 shandong_events.504.d: "При шокирующем повороте событий кажется, что преступный мир пекинской политики вышел на национальную сцену. Как оказалось, железная хватка Нефритового маршала и Баодинского короля У Пэйфу и Цао Куня была менее прочной, чем считалось во всем мире. После их бездействия при распаде Лиги клика Чжили была отправлена в миазмы беспорядка. Почувствовав в своих врагах и возможность, и слабость, маньчжурские короли вступили в сговор с губернатором Шаньси Янь Сишанем, чтобы изгнать Чжили из Центральных провинций.\n\n Однако история повторилась, и У Пэйфу снова бросил вызов и обратил шансы в свою пользу. По сообщениям, попытка переворота закончилась драматическим провалом, и новый "Национальный защитник" стал мстительным и энергичным. Клика Чжили, похоже, намерена выйти на тропу войны против Клики Цзинь Янь Сишаня и Гоминьцзюня Фэн Юйсяна за покушение на его жизнь.\n\nЕще остается возможность для [SHD.GetLeader]. С монархическими симпатиями и урегулированной политической ситуацией в Шаньдуне это может стать необходимой завязкой, чтобы он поднялся с уровня провинции на национальный уровень. Разумеется, при условии, что его армии смогут на равных сражаться с армиями Нефритового маршала, чего редко удается достичь."
 shandong_events.504.a: "Захватить инициативу! Ради императора!"
 shandong_events.504.b: "Мы будем глупцами, если выступим против Нефритового маршала."

 shandong_events.505.t: "Переворот в Цзинане"
 shandong_events.505.d: "В течение 12 лет провинцией Шаньдун управлял Чжан Цзунчан, человек, которого однажды окрестили самым 'подлым' военачальником Китая за его коррупцию и расточительность, необычайно высокую даже по китайским меркам. Однако теперь этой ситуации пришел неожиданный конец. Рано утром отряд цинской пехоты, очевидно по просьбе [SQI.GetLeader], вошел в Цзинань и ворвался в дом Цзунчана, доставив его в Пекин в наручниках, чтобы предстать перед судом за его преступления. После этого [SQI.GetLeader] был назначен новым губернатором Шаньдуна. Набожный монархист и способный генерал, это ознаменовало втягивание провинции в орбиту Цин."
 shandong_events.505.a: "Нехорошо, нехорошо"
 shandong_events.505.b: "На одну угрозу меньше."
 shandong_events.505.c: "Очаровательно."

