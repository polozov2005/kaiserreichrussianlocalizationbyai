 #張天然
 SHD_zhang_tianran: "Чжан Тяньжань"
 SHD_zhang_tianran_leader_desc: "§YОписание лидера\nРодился:§! 15 августа 1889, Цзинин, Шаньдун, Империя Цин\n§YПолитическая карьера:§! Чжан Тяньжань ни к чему не стремился в своей жизни, пока не попал в культ Лу Чжунъи. В 1918 году Лу Чжунъи возглавил небольшую группу религиозных синкретистов под названием "Игуаньдао". Лу Чжунъи всегда планировал, что его сестра Лу Чжунцзе сменит его на посту лидера Игуандао, и даже признавал ее предполагаемую божественность как реинкарнацию буддийского бога Гуань Инь. После смерти Лу Чжунъи в 1930 году произошел теологический раскол, в результате которого Лу Чжунцзе вывела верных ей последователей из Игуандао и переселилась в Хэнань, где они остаются и по сей день. Чжан Тяньжань, получив полное доверие своих членов, а также недавно прозревшую жену Сунь Сучжэнь, начал рассказывать поразительные откровения. В 1922 году Чжан Тяньжань построил на горе Тай святилище, которое росло, пока не охватило все остальные монастыри на горе. К 1924 году гора Тай стала круглогодичным домом для Почтенного Учителя и его окружения. В том же году спиритический сеанс предсказал, что императору Пу И грозит отравление, и была запланирована поездка в Пекин. Чжан Тяньжань развлекал и льстил императору Пу И обещаниями, что Игуандао будет укреплять лояльность Цинам благотворительностью и войной, если потребуется. Первые Красные копья и Большие мечи прибыли на гору Тай в 1925 году. Самой большой удачей стало предполагаемое обращение Чжан Цзунчана в Чжан Тяньжаня в 1935 году."

 #李藻麟
 SHD_li_zaolin: "Ли Цзаолинь"
 SHD_li_zaolin_sic_desc: "§YBorn:§! §L1892, in Beijing, Zhili Province, Great Qing§!\n§YBackground:§! §LBorn into a peasantry and lost his father as a child, Li Zaolin had to seek refuge from his uncle and poverty hindered his education. His military career began in 1909 when he entered the Baoding Military Academy at the age of 17 with the referral of a friend. After studying infantry for three tough years, he joined the 3rd Division as a junior officer under Cao Kun and Wu Peifu.\n\nFollowing the formation of an air force by Yuan Shikai in 1913, Li studied at the Nanyuan Aviation School and became one of the first batch of Chinese pilots in 1915. As a flying squad commander, when the National Protection War broke out, Li was sent by Yuan to showcase military prestige with his flying skills under Feng Yuxiang. Li returned to Beijing and enrolled in the 5th class of the Staff College in 1916, but he spontaneously joined Zhang Zongchang's force in Hunan as a staff in 1917 against the Constitutional Protection Army to earn field experience. As this was not officially authorised, he was declared missing at one point. After graduating in 1919, this outstanding officer became a tutor at Baoding.\n\nIn the First Zhili-Fengtian War in 1922, Li served as the chief of staff of Peng Shouxin in the Zhili army (with official recognition this time). In the Second Zhili-Fengtian War, as the chief of staff of the 1st Zhili Corps under Peng, Li was captured and recruited by the Fengtian Clique after repelling multiple Fengtian offensives in Shanhaiguan before being encircled (It is said that Zhang Xueliang met him in person following his capture). Daunted by his defeat, Li tried returning to Beijing secretly, but Zhang Zongchang's men intercepted him at the train station and persuaded him to work with the Dogmeat General again. Since then, Li has been serving as Zhang's chief of staff, assisting him in overseeing military affairs, especially after he took charge of Shandong.§!\n\n§YNotes: Although Li worked with several prominent figures, his loyalty is unquestioned, as he strongly disapproves of actions that go against superiors.§!"

