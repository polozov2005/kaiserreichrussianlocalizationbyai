### Bookmark ###
 PHI_KR_gathering_storm_desc: "Недолгая свобода, которую Филиппины обрели при Первой Филиппинской республике, была жестоко подавлена, когда Парижский мирный договор 1898 года официально признал аннексию островного архипелага Соединенными Штатами. Филиппинами стало управлять управляемое американцами \"Островное правительство\", которое постепенно начало делегировать полномочия филиппинским политикам и готовить их к возможности обретения независимости. Мануэль Кесон и его Националистическая партия, несмотря на их призывы к немедленной независимости, доказали, что являются прагматичными партнерами американской администрации. Но поскольку США стремительно приближаются к конфликту, независимость может наступить раньше, чем ожидалось..."

### Intro Screen ###
 PHI_country_intro_background: "GFX_PHI_intro"
 PHI_country_intro_header: "Путь к независимости"
 PHI_country_intro_content: "После столетий испанского владычества Филиппины в 1896 году подняли открытое восстание, возглавляемое революционным тайным обществом "Катипунан". Год спустя революционеры провозгласили первую республику в истории Азии. Успех был недолгим, поскольку испанское контрнаступление вынудило революционное правительство бежать. Испано-американская война подорвала власть Испании на Филиппинах, но вскоре стало ясно, что Соединенные Штаты не собираются допускать существования независимого филиппинского государства. Так началась филиппино-американская война, которая быстро переросла в партизанскую войну, поскольку американцы расширили свой контроль над страной. К 1902 году война была официально объявлена оконченной, поскольку основные националистические силы потерпели поражение, и Филиппины стали территорией США.\n\nНациональная борьба перешла от военной к политической. Основной закон Филиппин от 1902 года предоставил правительству острова выборную ассамблею, и первые выборы были проведены в 1907 году. На них с подавляющим большинством голосов победила Националистическая партия Мануэля Кесона и Серхио Осменьи, которая призывала к \"немедленной и безоговорочной независимости\". Самоуправление было еще более укреплено Законом Джонса от 1916 года, который заменил неизбранную Филиппинскую комиссию Сенатом. После многих лет лоббирования и кампаний филиппинские представители, наконец, вынудили Конгресс США принять Закон Тайдингса-Макдаффи, который преобразовал территорию в Содружество Филиппин, установил полное самоуправление во внутренних вопросах и назначил дату обретения полной независимости Филиппин через десять лет.\n\nНа первых президентских выборах уверенно победили Мануэль Кесон и Серхио Осмена, которые стали президентом и вице-президентом соответственно. Националистическая партия контролировала законодательную власть на протяжении всего своего существования и в настоящее время занимает неоспоримое положение в политической жизни страны. Главная оппозиция, Демократическая партия, изо всех сил пытается подорвать позиции националистов. Поскольку на Филиппинах сейчас действует президентская система правления, демократам или другому потенциальному оппозиционному движению придется ждать следующих президентских выборов, чтобы получить шанс прийти к власти. На данный момент Кесон и националисты могут продолжать свои усилия по государственному строительству, одновременно подавляя крестьянские волнения и зарождающееся синдикалистское движение. Вся эта стабильность, конечно, гарантируется сохраняющимся контролем Соединенных Штатов над обороной и внешней политикой страны."

 PHI_guide: "§MКесон выигрывает выборы 1939§! (§mРыночный либерализм§!)\n£white_dot Поддерживайте баланс сил на уровне $PHI_bop_elitist_tensions$ или $PHI_bop_populist_tensions$ ко времени выборов 1939 года.\n£white_dot Серхио Осменья (§mРыночный либерализм§!) победит на последующих президентских выборах 1943 года.\n\n§MМануэль Рохас выигрывает выборы 1939 года§! (§aАвторитарные демократы§!)\n£white_dot Поддерживайте баланс сил на уровне $PHI_bop_elitist_agitation$ или $PHI_bop_elitist_outage$ ко времени выборов 1939 года.\n\n§MЭмилио Агинальдо выигрывает выборы 1939 года§! (§aАвторитарная демократия§!)\n£white_dot Держите баланс сил на уровне $PHI_bop_populist_agitation$ или $PHI_bop_populist_outrage$ ко времени выборов 1939 года.\n£white_dot Убедитесь, чтобы §jЯпония§! обладала наибольшим влиянием в борьбе за Филиппины ко времени выборов 1939 года.\n\n§MКларо Ректо выигрывает выборы 1939 года§! (§lСоциал-либерализм§!)\n£white_dot Удерживайте баланс сил на уровне $PHI_bop_populist_agitation$ или $PHI_bop_populist_outrage$ ко времени выборов 1939 года.\n£white_dot Убедитесь, чтобы §gГермания§! обладала наибольшим влиянием в борьбе за Филиппины ко времени выборов 1939 года.\n\n§MКрисанто Эванхелиста начинает социалистическую революцию§! (§rСиндикализм§!)\n£white_dot Удерживайте баланс сил на уровне $PHI_bop_populist_agitation$ или $PHI_bop_populist_outrage$ ко времени выборов 1939 года.\n£white_dot Убедитесь, что ни §jЯпония§! , ни §gГермания§! не имеют высокого влияния в борьбе за Филиппины ко времени выборов на Филиппинах в 1939 году."

