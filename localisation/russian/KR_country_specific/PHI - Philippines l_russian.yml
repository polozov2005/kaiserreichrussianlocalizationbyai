#### - Political Tree - ####
 ###  Quezon Tree ###
 PHI_continue_philippinisation: "Продолжить филиппинизацию"
 PHI_continue_philippinisation_desc: "Помимо обретения независимости, главной целью националистов с самого начала была замена американцев на государственных должностях филиппинцами. Закон Джонса от 1916 года дал местному законодательному органу право передать большую часть государственной службы в руки филиппинцев, но с тех пор американский контингент оставался на Филиппинах. В связи с растущими проблемами в Соединенных Штатах сейчас самое подходящее время завершить филиппинизацию раз и навсегда."

 PHI_national_council_for_education: "Национальный Совет по образованию"
 PHI_national_council_for_education_desc: "Система образования, созданная американцами, хотя и не без недостатков, была, пожалуй, одним из наиболее положительных результатов их правления. Но с 1902 года время изменилось, а вместе с ним изменились и образовательные потребности нашего народа. Настало время созвать Национальный совет по образованию, в состав которого войдут назначенные эксперты, для консультирования Президента и Департамента народного образования по необходимым образовательным реформам."

 PHI_eight_hour_labour_law: "Принять закон о восьмичасовом рабочем дне"
 PHI_eight_hour_labour_law_desc: "На протяжении десятилетий профсоюзные движения по всему миру проводили кампанию за восьмичасовой рабочий день. Это также не какое-то крипто-синдикалистское движение; большинство развитых стран перешли на восьмичасовой рабочий день. Филиппинам давно пора вступить в ряды этих цивилизованных стран и доказать филиппинским рабочим, что Националистическая партия является их другом и защитником."

 PHI_social_justice_campaign: "Кампания социальной справедливости"
 PHI_social_justice_campaign_desc: "Что такое \"социальная справедливость\"? Является ли это доктриной, заимствованной из папских энциклик? Является ли это новшеством прогрессивной философии права? Среднестатистическому филиппинцу не нужно беспокоиться о таких сложных вопросах. Все, что он должен знать, это следующее: президент Кесон - защитник общего благосостояния, друг бедных и угнетенных и неустанно работает над тем, чтобы поднять массы к более высокому образу жизни."

 PHI_government_survey_board: "Правительственный наблюдательный совет"
 PHI_government_survey_board_desc: "Правительство, управляемое филиппинцами как в аду, может быть, и предпочтительнее, чем правительство, управляемое американцами как в раю, но, по общему признанию, было бы неплохо, если бы филиппинское правительство тоже могло управляться как в раю. В наших учреждениях, вероятно, есть некоторые недостатки и сокращения, и для решения этих проблем нам необходимо иметь более полное представление о правительстве в целом."

 PHI_optional_religious_instruction: "Дополнительное религиозное обучение"
 PHI_optional_religious_instruction_desc: "Филиппины - страна, в которой преобладает католическое население. В то же время Филиппинская революция была в значительной степени восстанием против испанских монахов, а Конституция Филиппин установила отделение церкви от государства. Некоторые из наших наиболее набожных граждан требуют введения религиозного (то есть католического) обучения в школах. Мы можем найти золотую середину: занятия религией будут необязательными и не будут мешать остальной части учебного дня."

 PHI_patronise_the_deutsche_klub: "Покровительствовать Немецкому Клубу"
 PHI_patronise_the_deutsche_klub_desc: "Немецкая община в Маниле существует уже давно. Хотя раньше она была небольшой, с ростом немецкого присутствия на Дальнем Востоке ее численность увеличилась. Хотя официальные деловые отношения с Кайзеррайхом осуществляются через Имперское консульство Германии, центр немецкого сообщества находится в шикарном Deutscher Klub, где можно найти бизнесменов, имеющих связи с Сингапуром и Ханоем. Пришло время нанести визит в клуб.."

 PHI_friends_not_forgotten: "Не забывая друзей"
 PHI_friends_not_forgotten_desc: "Можно подумать, что мы, филиппинцы, затаили злобу на Соединенные Штаты за их оккупацию. Хотя мы яростно защищаем свою независимость, мы также великодушны. Несмотря на наши различия, у нас появилось много друзей в Америке, и мы искренне сочувствуем им, когда их родину охватывают беспорядки и разрушения. Когда настанет день, когда их национальный кошмар закончится, мы будем ждать с протянутой рукой."

 PHI_visit_from_the_ijn: "Визит ЯИФ"
 PHI_visit_from_the_ijn_desc: "У Филиппин пока нет собственного военно-морского флота, и в том случае, если военно-морской флот Соединенных Штатов больше не сможет нас защищать, наша страна, расположенная на архипелаге, окажется чрезвычайно уязвимой. Это одна из причин, по которой мы ценим нашу дружбу с Японской империей, поскольку ее могучий флот поддерживает мир и порядок в западной части Тихого океана. Давайте отправим телеграмму в Токио с приглашением японской эскадре зайти в Манильский залив; мы окажем им государственный прием."

 PHI_more_government_less_politics: "\"Больше правительства, меньше политики\""
 PHI_more_government_less_politics_desc: "Оппозиция много говорит о состоянии нашей политики, ставя под сомнение сохранение правления националистов. Нужно ли нам напоминать им, что все достижения островного правительства были достигнуты под нашим руководством, что Содружество было консолидировано, а независимость обретена при президенте Кесоне? Наша администрация не соизволяет ввязываться в эти политические разборки; мы здесь для того, чтобы обеспечить хорошее правительство для филиппинцев во всем мире."

 PHI_nineteenthirtynine_elections: "Филиппинские выборы 1939 года"
 PHI_nineteenthirtynine_elections_desc: "Впервые в своей истории Филиппины проведут президентские выборы в качестве свободной и независимой республики. Поскольку президент Мануэль Кесон пытается сохранить давнюю гегемонию националистов над правительством, местные националистические боссы сделают все возможное, чтобы ускорить голосование. Но оппозиция тоже организовалась. Вопрос только в том, будет ли этого достаточно для победы?"

 ### Quezon Second Term ###
 PHI_to_the_victors_go_the_spoils: "Трофеи достаются Победителям"
 PHI_to_the_victors_go_the_spoils_desc: "Перед этими выборами наблюдатели задавались вопросом, может ли, наконец, закончиться непрерывная череда побед Мануэля Кесона. Похоже, что их прогнозы были всего лишь принятием желаемого за действительное. Президент Кесон в очередной раз доказал, что является мастером филиппинской политики, и его положение и наследие более прочны, чем когда-либо. Не то чтобы он намерен почивать на лаврах. Предстоит еще многое сделать: принять законы, оказать покровительство и выступить с речами."

 PHI_industrial_arbirtration: "Промышленные суды"
 PHI_industrial_arbirtration_desc: "По мере развития экономики Филиппин производственные споры между растущим рабочим классом и их работодателями становятся все более серьезной проблемой. Забастовки вредны для страны, поскольку они не только подрывают производство, но и дают возможность синдикалистским агитаторам еще больше внедриться в рабочее движение. Вместо этого правительство должно быть гарантом мира в промышленности; мы создадим промышленный суд, наделенный юрисдикцией в отношении трудовых споров."

 PHI_open_more_public_schools: "Расширение сети общественных школ"
 PHI_open_more_public_schools_desc: "Наша система образования модернизирована не хуже, чем в любой западной стране. Ее главный недостаток заключается в том, что ее охват остается слишком ограниченным. Огромное число филиппинцев остаются неграмотными, а школ по-прежнему недостаточно, чтобы обслуживать растущее население, особенно в сельской местности. Будет построено еще больше начальных школ, пока мы не будем уверены, что ими будут охвачены все районы страны."

 PHI_plebiscite_on_womens_suffrage: "Плебисцит касательно избирательного права женщин"
 PHI_plebiscite_on_womens_suffrage_desc: "Конституция Филиппин не предусматривает избирательного права для женщин, но в нее включено положение об обязательном проведении плебисцита по этому вопросу. Уникально то, что в ходе плебисцита будут опрашиваться только филиппинские женщины по вопросу о том, должны ли они участвовать в голосовании. Суфражистки уговаривают правительство провести плебисцит, поэтому пришло время действовать; положительный результат, по-видимому, гарантирован."

 PHI_expand_the_council_of_state: "Расширить состав Государственного совета"
 PHI_expand_the_council_of_state_desc: "Государственный совет был первоначально создан в территориальный период для консультирования назначенного американцами генерал-губернатора. Первоначально в него входили спикер Палаты представителей, президент Сената и главы исполнительных департаментов. Однако с тех пор государство выросло, и в совете должно быть представлено больше родов войск. Будут добавлены начальник штаба армии, секретарь президента и главы важных государственных корпораций."

 PHI_reserve_officers_training_corps: "Корпус подготовки офицеров запаса"
 PHI_reserve_officers_training_corps_desc: "Следуя американской модели, Филиппинский университет в 1922 году создал первое в стране официальное подразделение Корпуса подготовки. В связи с растущими потребностями вооруженных сил и оборонного комплекса спрос на офицеров высок как никогда. Отныне все колледжи и университеты, в которых обучается более ста человек, должны будут создать свой собственный КПОЗ."

 PHI_the_national_dream_fulfilled: "Осуществление национальной мечты"
 PHI_the_national_dream_fulfilled_desc: "После сокрушительного поражения в войне против Соединенных Штатов в 1902 году филиппинская нация постепенно выходила из состояния порабощения. Да, это была долгая борьба, и не без неудач и компромиссов, но сегодня мы видим, что выбранный нами курс оправдал себя, и плоды нашего труда того стоят. Филиппины снова стали нацией: свободной, ничем не скованной, которая сама распоряжается своей судьбой."

 PHI_a_modern_philippines: "Современные Филиппины"
 PHI_a_modern_philippines_desc: "Наши бывшие хозяева называли нас \"примитивными\", но именно они были ответственны за наше грубое состояние. Разве не испанцы заковали нас в цепи реакции и религиозного мракобесия? Разве не американцы заковали нас в цепи экономической отсталости? По правде говоря, филиппинцы - дальновидный народ, всегда стремящийся к взаимодействию с современным миром и использующий новейшие технологические и социальные достижения."

 PHI_hub_of_the_pacific: "Хаб тихоокеанского региона"
 PHI_hub_of_the_pacific_desc: "Когда-то ось мировой политики вращалась вокруг Европы, но это не может продолжаться вечно. Япония - великая держава, а Китай пробуждается от спячки. Тихоокеанский регион играет все более важную роль в мировой экономике, а куда течет богатство, туда и власть. Филиппины, возможно, никогда не войдут в число великих держав мира, но, учитывая их стратегическое положение в центре западной части Тихого океана, они все же могут стать незаменимыми."

 PHI_a_proper_diplomatic_service: "Собственная дипломатическая служба"
 PHI_a_proper_diplomatic_service_desc: "Из всех отрицательных последствий американского правления для развития нашего правительства самым серьезным было ограничение способности нашей страны самостоятельно вести внешнюю политику. Поскольку наша независимость наступила совершенно неожиданно, перед нами сейчас стоит важная задача - утвердиться на мировой арене. Наш Департамент иностранных дел растет, и многие из наших лучших и талантливых сотрудников выстраиваются в очередь, чтобы служить в нем."

 ### Evangelista ###
 PHI_coalition_of_the_oppressed_masses: "Коалиция угнетенных"
 PHI_coalition_of_the_oppressed_masses_desc: "Буржуазия свергнута. Можно сказать, что массы имеют лишь смутное представление о том, чего они только что достигли, но это не должно умалять их достижений. Этот акт является достаточным доказательством того, что рабочие и крестьяне Филиппин, смутно нащупывающие путь к классовому самосознанию, уже продвинулись достаточно далеко, чтобы бороться и одержать победу над своими угнетателями. Мы поведем их в будущее."

 PHI_create_labour_colleges: "Создание рабочих училищ"
 PHI_create_labour_colleges_desc: "Несмотря на то, что мы побеждаем в борьбе с капитализмом, есть еще одна борьба, которую мы должны вести: борьба с невежеством. Массам нужно многому научиться - от элементарного чтения и арифметики до технических и сельскохозяйственных знаний, а также реального понимания того, что представляют собой социализм и синдикализм. В великих революционных государствах Европы они решили эту проблему, создав рабочие училище для обучения взрослых; мы будем внедрять эту модель."

 PHI_break_up_the_haciendas: "Разрушить асиенды"
 PHI_break_up_the_haciendas_desc: "На Филиппинах, где еще не сформировался многочисленный класс капиталистов, господствовали крупные землевладельцы. Они господствовали над крестьянством, держа его в феодальном и долговом рабстве. Большинство крестьян лишь мечтали о более мягком и снисходительном хозяине, но мы здесь для того, чтобы сказать им, что они могут мечтать о большем. Гасиенды, огромные поместья, будут немедленно экспроприированы без компенсации. Земля принадлежит народу."

 PHI_moulding_the_revolutionary_woman: "Привлечь женщин к участию в Революции"
 PHI_moulding_the_revolutionary_woman_desc: "Движение за права женщин на Филиппинах до сих пор возглавлялось буржуазными активистками, сосредоточенными на буржуазных проблемах. Какое-то избирательное право здесь или какая-то законодательная реформа там не приведут к освобождению женщин. Женщины Филиппин должны понимать, что революция уничтожит капиталистическую семейную структуру и ее притеснения. На практике это может занять много времени, но это цель, к которой мы всегда стремимся."

 PHI_dictatorship_of_labour: "Диктатура пролетариата"
 PHI_dictatorship_of_labour_desc: "В течение многих лет и наши американские хозяева, и их националистические лакеи отмахивались от притеснений рабочих, заявляя, что на Филиппинах демократия и что перемены должны произойти путем голосования. Но нет никакой ценности в капиталистической демократии, которая дает рабочему свободу лишь в выборе того, какой сапог будет давить ему на шею. Время демократии прошло; только диктатура рабочего класса может разрушить капиталистическую систему."

 PHI_cooperation_with_kpmp: "Сотрудничество с Национальным крестьянским советом"
 PHI_cooperation_with_kpmp_desc: "Калипунанг Памбанса нг мга Магсасака нг Пилипинас, Национальный совет крестьян Филиппин, является аграрным партнером Рабочей партии. На самом деле, если бы КПМП не сплотила крестьян, в такой сельской стране, как Филиппины, вообще не было бы революции. Мы сделаем все возможное, чтобы продолжить наши тесные отношения с КПМП. Даже если мы захотим индустриализировать Филиппины, они еще долгое время будут оставаться преимущественно аграрной страной."

 PHI_create_a_peoples_army: "Создать Народную Армию"
 PHI_create_a_peoples_army_desc: "Профессиональные военные - это инструменты буржуазного государства в угнетении народа; достаточно взглянуть на филиппинскую полицию, чтобы увидеть такой пример. Революция была осуществлена рабочими и крестьянами, которые вооружились и организовались, и именно их энтузиазм одержал победу. Существующие ополчения будут реорганизованы в Народную армию, которая станет новым средством обороны для нашей страны."

 PHI_true_independence: "Настоящая независимость"
 PHI_true_independence_desc: "Националисты снова и снова обещали независимость от американского империализма. Но когда она наконец наступила, оказалось, что это ложь. Призывы к суверенитету бессмысленны перед лицом капиталистически-империалистической системы, с которой Филиппины по-прежнему связаны. Только революция, наконец, принесла нам истинную независимость: независимость от капитала, свободу объединиться со всеми революционными рабочими мира."

 PHI_the_internationalist_outlook: "Взгляд вовне"
 PHI_the_internationalist_outlook_desc: "После революции мы были заняты тем, что смотрели внутрь себя, пытаясь создать институты социализма на Филиппинах. Мы получили большую помощь от других социалистических стран, и теперь мы достигли стадии, когда можем начать смотреть вовне. Ибо международная революция требует участия пролетариата всего мира, и нам пора внести свой вклад.."

 PHI_the_destruction_of_imperialism: "Сокрушить империализм"
 PHI_the_destruction_of_imperialism_desc: "Социализм для нас обеспечен, но главная задача остается нерешенной. Растущая волна колонизованных народов мира готова свергнуть капиталистический империализм под знаменем революционного социализма. Филиппины, возможно, и маленькая страна, но не забывайте: они уже однажды восстали против империализма и создали первую республику в Азии. Нам предстоит сыграть славную роль в предстоящем начинании."

 ### Recto ###
 PHI_evolution_not_revolution: "Эволюция, не Революция"
 PHI_evolution_not_revolution_desc: "Впервые в истории филиппинской демократии националисты были отстранены от власти. Президент Ректо обещает преобразовать страну и исправить злоупотребления предыдущего правительства. Но это не отречение от прошлого, это вовсе не так. Мы строим на фундаменте, заложенном теми, кто был до нас, и твердо верим, что Филиппины могут стать лучше. Благодаря этой упорядоченной передаче власти филиппинская демократия была освящена."

 PHI_promote_public_welfare: "Способствование общественному благосостоянию"
 PHI_promote_public_welfare_desc: "В современном обществе государство обязано заботиться о своих гражданах, повышая общий уровень жизни и, следовательно, обеспечивая социальный мир и безопасность. Бюро общественного благосостояния уже проделало хорошую работу, но есть еще много возможностей для расширения. Поскольку наши налоговые поступления увеличиваются, мы можем отложить расходы на пенсии по старости, уход за детьми и поддержку безработных."

 PHI_new_medium_of_instruction: "Новое средство обучения"
 PHI_new_medium_of_instruction_desc: "Конституция определила английский и испанский языки как официальные, но содержала положение о начале процесса определения национального языка. При прошлой администрации Институт национального языка принял решение о том, что языком Филиппин станет стандартизированная форма тагальского. Теперь предстоит воплотить эти слова в жизнь. Отныне все государственное школьное образование будет вестись на филиппинском языке, что позволит обучать нашу молодежь новому национальному языку."

 PHI_domestic_relations_and_probate_courts: "Суды по семейным делам и делам о наследствах"
 PHI_domestic_relations_and_probate_courts_desc: "Женщины Филиппин, получившие право голоса, продолжают активно выступать за расширение своих гражданских прав. Поскольку место женщины по-прежнему остается в доме и семье, защита их прав по отношению к своим мужьям и иждивенцам является их главной заботой. Для рассмотрения этого дела будут созданы специальные суды, занимающиеся внутренними отношениями."

 PHI_provincial_autonomy: "Автономия провинций"
 PHI_provincial_autonomy_desc: "Став президентом, Кесон не видел проблем в том, чтобы сосредоточить исполнительную власть вокруг себя, чтобы лучше управлять системой патронажа и иерархии, которая управляет филиппинской политикой. Но наше правительство, состоящее из высокопоставленных чиновников, неэффективно и менее чутко реагирует на нужды простых филиппинцев. Многие функции центрального правительства могут быть переданы из Манилы администрациям провинций, что позволит более равномерно распределить государственную службу по всей стране."

 PHI_protect_press_freedoms: "Защита свободы прессы"
 PHI_protect_press_freedoms_desc: "Незаменимым принципом либеральной демократии является свобода слова и печати. Эти свободы закреплены в нашей конституции, но не всегда соблюдаются должным образом. Власть имущие использовали законы о клевете, чтобы заставить замолчать критиков, а правительство подавляло все, что оно считает подрывным, во имя государственной безопасности. Нельзя допустить, чтобы эти злоупотребления продолжались, если мы хотим построить по-настоящему свободное общество."

 PHI_cement_military_political_divide: "Закрепить разделение Политики-Армия"
 PHI_cement_military_political_divide_desc: "Создание наших собственных вооруженных сил было необходимо для развития нашей национальной обороноспособности. Однако мы не должны позволять все более многочисленной и хорошо финансируемой армии начинать думать, что она является независимым субъектом, который может диктовать свои желания избранному правительству. Наши армейские начальники будут отчитываться перед гражданскими должностными лицами в их качестве представителей народа."

 PHI_break_the_colonial_pattern: "Разрушить колониальные нарративы"
 PHI_break_the_colonial_pattern_desc: "Колониальное наследие лежит тяжелым бременем на Филиппинах. Хотя мы и обеспечили политический суверенитет, отпечаток колониализма все еще ощущается на нашей экономике, нашем обществе и нашей системе управления. Колониальный менталитет по-прежнему присутствует в умах людей, но это не будет длиться вечно. Мало-помалу мы освобождаемся от цепей прошлого, становимся независимыми как во взглядах, так и в фактах."

 PHI_assert_our_independence: "Защита нашей независимости"
 PHI_assert_our_independence_desc: "Освободившись, наконец, от американского владычества, мы клянемся никогда больше не позволять себе привязываться к иностранному правителю. Мы готовы поддерживать дружеские отношения с другими странами и налаживать взаимоотношения во имя сотрудничества и взаимной безопасности. Но Филиппины не окажутся в руках какой-то более могущественной державы; мы сами будем определять свою судьбу и место в мире."

 PHI_the_unconquerable_faith: "Непоколибимая вера"
 PHI_the_unconquerable_faith_desc: "Филиппинская революция началась с идеи, мечты о свободе, справедливости и создании независимого филиппинского государства. С тех пор филиппинский народ неустанно трудился и боролся за то, чтобы эти мечты стали реальностью. В ходе этой борьбы они столкнулись с растущим цинизмом по поводу трудностей формирования справедливого и демократического правительства. Пусть никто не сомневается в реальности наших достижений, чтобы филиппинцы никогда не теряли свой идеализм и веру в нацию."

 ### Roxas ###
 PHI_a_steady_hand: "Твердая Рука"
 PHI_a_steady_hand_desc: "Националистическая партия уже несколько десятилетий стоит на страже филиппинской демократии. Она обеспечивает стабильность и преемственность правления, защищая страну от беспорядков и хаоса. В последние годы популистские подстрекатели толпы пытались подтолкнуть страну к анархии, и предыдущее правительство по глупости уступило их требованиям. Этого больше не будет; националисты снова выступают за здоровое, разумное правительство."

 PHI_consolidate_the_university_of_the_philippines: "Расширение Национального Университета"
 PHI_consolidate_the_university_of_the_philippines_desc: "Наш национальный университет - гордость нации, он дает нашим лучшим студентам образование мирового уровня, чтобы они могли стать будущими лидерами Филиппин. По мере расширения университета колледжам приходилось занимать здания везде, где они были доступны, в Маниле. С переездом всех колледжей в единый расширенный кампус Филиппинский университет сможет расти."

 PHI_security_through_patronage: "Безопасность через покровительство"
 PHI_security_through_patronage_desc: "В основе филиппинского общества лежат взаимные обязательства между социальными группами. Если низшие классы служат элитам в качестве арендаторов или работников, то от элит также ожидается определенное благородство, они должны оказывать услуги тем, кто находится ниже их по положению, посредством таких вещей, как подарки, займы и прощение долгов. Хотя это и не закреплено законом и некоторые считают "коррумпированным", это всегда было способом поддержания социального мира на Филиппинах."

 PHI_model_of_filipino_womanhood: "Образец филиппинской женственности"
 PHI_model_of_filipino_womanhood_desc: "Женщины Филиппин стремятся к большему, и это хорошо. Женщины всегда играли ключевую роль в обществе как хранительницы домашнего очага. Их следует поощрять к тому, чтобы они совершенствовали свое образование, свои добродетели и свое социальное положение, поскольку таким образом они будут оказывать благотворное и стабилизирующее влияние на филиппинских мужчин."

 PHI_expel_subversives: "Изгнать подрывные элементы"
 PHI_expel_subversives_desc: "Хотя Филиппины гордятся тем, что являются демократическим и либеральным обществом, мы не допускаем злоупотребления политическими свободами. В последнее время деструктивные и антигосударственные активисты стали смелее пытаться захватить политическую власть. Многие из них - красные, некоторые - религиозные фанатики; это одно и то же. Мы не позволим им манипулировать невежественными массами. Пусть они кипят и бушуют сколько угодно, пока они делают это, захлопнув за собой дверь Конгресса."

 PHI_greasing_the_wheels: "Смазывание колес"
 PHI_greasing_the_wheels_desc: "В политике все зависит от того, кого вы знаете. Чего не понимают реформаторы, так это того, что никто не отказывается от чего-то, не получив ничего взамен. Вместо того, чтобы биться головой о статус-кво, лучше научиться плыть по течению в свою пользу. Находясь на вершине национальной иерархии, мы можем добиваться благосклонности в каждой провинции и районе страны."

 PHI_expand_the_constabulary: "Расширение состава полиции"
 PHI_expand_the_constabulary_desc: "Армия может нести ответственность за национальную оборону, но обеспечение правопорядка и поддержание мира и порядка входит в компетенцию филиппинской полиции. Хотя у местной полиции может быть свое собственное место, как у национальной силы, полиция является главным средством борьбы с угрозой беспорядков, исходящей от крестьянских и рабочих агитаторов. Ее следует расширить, чтобы справиться с этой растущей угрозой."

 PHI_unification_of_politics: "Унификация политики"
 PHI_unification_of_politics_desc: "Кто-то может сказать, что конкурентная, многопартийная демократия является необходимым условием процветающего либерального общества, но так ли это на самом деле? Простой факт заключается в том, что Националистическая партия руководила филиппинской политикой с самого ее основания, и все попытки создать жизнеспособное оппозиционное движение провалились. Это не должно восприниматься как что-то плохое. При устойчивом национальном правлении все части страны работают вместе в гармонии."

 PHI_agreement_of_mutual_benefits: "Соглашение о взаимовыгоде"
 PHI_agreement_of_mutual_benefits_desc: "Американцы заключили жесткую сделку: хотя они и дали нам кое-что, взамен они получили многое. Мы рады, что вышли у них из-под контроля, но это не значит, что мы стали враждебно относиться к США или любой другой великой державе, если на то пошло. Сегодня на мировой арене множество игроков соперничают за наше внимание, и нам было бы неплохо начать с ними бизнес, если мы сможем заключить выгодную сделку."

 PHI_our_seat_at_the_table: "Наше место под Солнцем"
 PHI_our_seat_at_the_table_desc: "Заслужить уважение - трудная задача. Долгое время Филиппинская Республика считалась страной-выскочкой, американской колонией, испытывающей трудности и получившей независимость почти случайно. Потребовалось немало усилий, чтобы изменить это восприятие, но наша дипломатия и национальный прогресс, наконец, принесли свои плоды. Филиппины теперь полностью приняты и уважаемы, и у них есть собственное влияние, которым они могут воспользоваться."

 ### Aguinaldo ###
 PHI_the_humble_sons_of_the_people: "Смиренные сыны народа"
 PHI_the_humble_sons_of_the_people_desc: "Что политики сделали для нас? Они грабили и обманывали; годами они изображали из себя борцов за независимость, в то время как были верными слугами американцев. Пришло время избавиться от них. Мы не политики. Наше движение не является политической партией, стремящейся увековечить свою власть. Все, что мы делаем, - это бескорыстное служение народу."

 PHI_vocational_and_nationalist_education: "Профессиональное и националистическое образование"
 PHI_vocational_and_nationalist_education_desc: "Школы на Филиппинах были отравлены западными моделями обучения и учебной программой, превратившись в фабрики, где английский язык вдалбливают в головы наших детей. Что нужно филиппинцам, так это практические знания, знания для достижения успеха в профессии и знания для развития этой страны. Прежде всего, их нужно научить любить нацию и служить ей."

 PHI_improve_working_class_housing: "Улучшить жилищные условия рабочего класса"
 PHI_improve_working_class_housing_desc: "Среднестатистический филиппинец живет в плохих условиях, будь то лачуги в сельских районах или растущие трущобы Манилы. В то же время политики живут в особняках. Сильный и здоровый народ нуждается в хорошем, гигиеничном жилье. Давайте начнем кампанию по строительству нового, лучшего жилья для низших классов."

 PHI_mothers_of_the_nation: "Матери нации"
 PHI_mothers_of_the_nation_desc: "У филиппинской женщины славная история. Она восстала против испанского угнетателя. Она оказала сопротивление американскому захватчику. Она наказала своего мужчину, когда он уклонился от выполнения своего национального долга. Роль филиппинской женщины в жизни страны должна уважаться и культивироваться. Они - наши сестры и матери будущего поколения."

 PHI_cooperation_of_labour_and_capital: "Сотрудничество Труда и Капитала"
 PHI_cooperation_of_labour_and_capital_desc: "Это правда, что экономическая элита этой страны эксплуатирует рабочий класс многими способами. Также верно, что синдикалистские агитаторы используют лозунг "классовой борьбы", чтобы сеять раздор и разделение. Постоянная война между трудом и капиталом никогда не принесет процветания и мира. Эти двое должны объединиться и научиться сотрудничать, отбросив злобу и вражду во имя национальных интересов."

 PHI_spirit_of_ninety_six: "Дух 96-го"
 PHI_spirit_of_ninety_six_desc: "В 1896 году на Филиппинах началась революция. Она дала нам пантеон национальных героев, наследие которых вдохновляет нас по сей день. Но слишком многие старики забыли, а слишком многие молодые ничего не знают об этой истории. Мы не можем позволить нации потерять свой дух, впасть в самоуспокоенность и упадок. Мы должны оглянуться на великих патриотов прошлого и следовать их примеру, смело устремляясь в будущее."

 PHI_spirit_of_national_defense: "Система национальной обороны"
 PHI_spirit_of_national_defense_desc: "Недостаточно просто желать независимости; она должна быть подкреплена военной силой. Мы должны сделать все возможное, чтобы иностранная держава никогда больше не угрожала нашему суверенитету. Все трудоспособные мужчины должны быть готовы к военной службе и обучены военному искусству. Страна должна быть готова к мобилизации в любой момент, имея наготове планы того, как максимально эффективно использовать наши людские и материальные ресурсы."

 PHI_philippines_unbowed: "Непокоренные Филиппины"
 PHI_philippines_unbowed_desc: "Еще вчера Филиппины были зависимым государством: если не от своих бывших американских хозяев, то от коррумпированного и эгоистичного политического класса, который предал национальные интересы. Те времена прошли. Мы восстановили свое достоинство и покончили с коррупцией партийной политики. Мы создали правительство, которое служит всем филиппинцам и которому все филиппинцы гордятся тем, что служат."

 PHI_pan_asian_propaganda: "Паназиатская пропаганда"
 PHI_pan_asian_propaganda_desc: "Испания и Соединенные Штаты, возможно, и пытались заставить Филиппины жить по западному образцу, но в глубине души мы всегда были азиатской нацией. От нашего братства с малайцами на юге до наших китайских и японских общин - мы безоговорочно принадлежим восточному миру. Борьба всех азиатских народов против империализма - это наша борьба, и мы с нетерпением ждем того дня, когда все встанут вместе, как один."

 PHI_the_glorious_republic: "Славная Республика"
 PHI_the_glorious_republic_desc: "Избавившись от эксплуатации, бедности и апатии, Филиппины вновь стали жемчужиной Востока. Наше величие сияет по всему Тихому океану, воодушевляя наших друзей и устрашая наших врагов. Первая республика, родившаяся в Малолосе, восстала из пепла, более величественная, чем мы могли себе представить. Филиппинский народ может по праву гордиться своей нацией, которой он служит самоотверженно, с энтузиазмом, никогда не забывая посвятить свое существование любимому отечеству."

#### - Military Tree - #####
### West Point Tree ###

 PHI_west_point_of_the_east: "Вест-Пойнт Востока"
 PHI_west_point_of_the_east_desc: "Военная академия Филиппин была построена по образцу и стилю ее выдающегося американского аналога в Соединенных Штатах. Хотя у нее и нет такой легендарной истории, как у ее американского аналога, PMA, тем не менее, воплощает дух Вест-Пойнта, который вдохновлял на успех и славу на поле боя. С американской помощью или без нее, мы создадим современную армию, способную защитить нашу родину."

 PHI_philippine_american_officers: "Филиппино-американские офицеры"
 PHI_philippine_american_officers_desc: "Еще до создания ВАФ в силах обороны Филиппинских островов служили филиппинские офицеры, которые прошли формальное военное образование в Соединенных Штатах. Учитывая, что военные опасности возникают все чаще, мы должны обратиться к этим офицерам для обучения и подготовки следующего поколения филиппинских военных."

 PHI_a_new_service_rifle: "Новая армейская винтовка"
 PHI_a_new_service_rifle_desc: "Вооружение Филиппинской армии всегда закупалось на складах Соединенных Штатов, что привело к массовому бегству ее офицеров, солдат и части материальных средств. Военные вынуждены полагаться на вооружение от недоступного поставщика. При поддержке нашего избранного покровителя военные запросили информацию о покупке и технических деталях их служебной винтовки."

 PHI_the_archipelagic_struggle: "Борьба на архипелагах"
 PHI_the_archipelagic_struggle_desc: "Наличие сотен отдельных островов было благом и проклятием для филиппинской нации; многие колониальные правители пришли к выводу, что умиротворение на островах затруднено из-за нашего географического положения, но это также доставило нам неприятности, затруднив развертывание наших вооруженных сил по всей стране. Будут выделены средства на модернизацию инфраструктуры крупных островов."

 PHI_from_hooves_to_tires: "От копыт до шин"
 PHI_from_hooves_to_tires_desc: "В ходе боевых действий во время Вельткрига кавалерийские атаки в Европе были массово подавлены огнем пулеметов на укрепленных позициях, и, основываясь на наблюдениях за крупными конфликтами вокруг нас, военные начали массированную моторизацию своих войск."

 PHI_tangke_de_guerras: "Tangke de Guerras"
 PHI_tangke_de_guerras_desc: "Вельткриг ввел концепцию танков в военное дело 20-го века, и хотя мы, возможно, не сможем сравниться с бронетанковыми силами великих европейских держав, военные постараются создать силы, достойные соответствовать стандартам современных западных вооруженных сил."

 PHI_king_of_the_battlefield: "Королева поля боя"
 PHI_king_of_the_battlefield_desc: "Учитывая, что в последнее время мы уделяем особое внимание модернизации вооруженных сил, Филиппинская армия обратится к Конгрессу с просьбой выделить дополнительные средства на приобретение более современных артиллерийских установок для вооруженных сил Филиппин."

 PHI_tiradores_de_la_muerte: "Tiradores de La Muerte"
 PHI_tiradores_de_la_muerte_desc: "\"Tiradores de la Muerte\" , или стрелки смерти, были элитным подразделением снайперов наряду с \"Черной гвардией\", отобранным генералом Антонио Луной во время филиппино-американской войны. Мы должны обратиться к их наследию при создании наших первых полков специального назначения."

 PHI_modernise_the_scout-rangers: "Подразделения рейнджеров"
 PHI_modernise_the_scout-rangers_desc: "Филиппинские скауты гордятся своей способностью ориентироваться в джунглях и руководить подразделениями регулярной армии. Мы должны подчеркнуть важность этой подготовки для будущих скаутов, которые будут прикреплены к армии."

 PHI_modern_vanguard_of_the_pacific: "Современный авангард Тихоокеанского региона"
 PHI_modern_vanguard_of_the_pacific_desc: "Наконец, после нескольких месяцев напряженных усилий, Республика создала вооруженные силы, обученные способам ведения современной войны. Никогда больше тираны не омрачат наши сияющие поля!"

### Shared Tree ###
 PHI_finish_the_nineteen_twenty_defence_act: "Завершить принятие Закона об обороне 1920 года"
 PHI_finish_the_nineteen_twenty_defence_act_desc: "В 1920  генерал Ласситер предложил создать местную мобильную базу резервистов для оказания помощи в обороне Коррехидора. После того, как Кос Саммералл в то время дал свое благословение, включенный закон позволил Филиппинским островам создать военные округа и в предварительном порядке создать первые подразделения филиппинской армии."

 PHI_expand_the_akademiyang_militar_ng_pilipinas: "Военная академия Филиппин"
 PHI_expand_the_akademiyang_militar_ng_pilipinas_desc: "Одной из проблем, с которой столкнулись первые подразделения сил обороны острова, была нехватка офицеров, которые могли бы руководить большим количеством коренного населения. В соответствии с Законом об обороне, разрешающим набор резервистов и небольшого числа штатных сотрудников, перед Департаментом была поставлена задача создать первую на острове академию подготовки офицеров для укомплектования резервистов численностью 150 000 человек."

 PHI_militarisation_of_the_constabulary: "Милитаризация полиции"
 PHI_militarisation_of_the_constabulary_desc: "Филиппинская полиция - одно из первых подразделений, возглавляемых местными офицерами. Хотя первоначально она выполняла функции жандармерии для подавления бандитизма и мятежей, Департамент признал ее компетентной силой, которая могла бы выполнять функции местной военной полиции, чтобы держать их в узде."

 PHI_national_defense_act: "Закон о национальной обороне [GetYear] года"
 PHI_national_defense_act_desc: "Закон о национальной обороне, был одним из первых законодательных актов, принятых избранными представителями Всефилиппинского конгресса. В нем излагались положения о создании независимой местной промышленности для производства оборудования, которое считается необходимым и жизненно важным для обороны островов."

 PHI_war_plan_orange: "Военный план Оранж"
 PHI_war_plan_orange_desc: "Военный план Оранж был военным планом США, ориентированным на событие, в котором США и Япония будут находиться в состоянии войны. Одним из предположений было вовлечение островов; теперь, когда американцы ушли, мы должны взять то, что осталось от военного плана Orange, и перекроить его в соответствии с нашей новой ситуацией."

 PHI_the_philippine_department: "Департамент Филиппин"
 PHI_the_philippine_department_desc: "Создание наших вооруженных сил не было полностью независимым. Обстоятельства, связанные с нашим статусом содружества, позволили нам воспользоваться услугами американских офицеров в департаменте Филиппин для консультирования по вопросам создания и организации вооруженных сил."

 PHI_sandtahang_lakas_ng_pilipinas: "Sandatahang Lakas ng Pilipinas"
 PHI_sandtahang_lakas_ng_pilipinas_desc: "Филиппинская революционная армия потерпела поражение в 1899 году. С тех пор острова находятся под защитой американцев. Теперь эта защита утрачена, и стране приходится защищать себя тем, что у нее есть, в одиночку."

 PHI_improve_army_logistics: "Улучшение армейской логистики"
 PHI_improve_army_logistics_desc: "Естественно, были приняты во внимание транспортные расходы для войск формирующейся армии, учитывая непоследовательное качество перевозок между военными округами. Закон III определяет порядок приобретения и содержания животных, водных, автомобильных и других видов транспорта."

 PHI_the_radio_control_division: "Отдел радиоуправления"
 PHI_the_radio_control_division_desc: "Отдел радиоуправления (созданный в 1931 году) был переведен в Министество обороны из Почтового управления в 1936 году указом президента Кесона с целью модернизации Вооруженных сил Филиппин."

 PHI_americas_arsenal: "Американский арсенал"
 PHI_americas_arsenal_desc: "Хотя Конгресс и некоторые представители Военного министерства исторически не решались вкладывать средства в оборону острова, принятие Закона об обороне 1920-х годов гарантировало, что наряду с обещанием Америки создать национальные институты, он также поможет ей вооружиться для его защиты."

 PHI_a_fledging_military_industry: "Зарождающаяся военная промышленность"
 PHI_a_fledging_military_industry_desc: "При содействии того покровителя, которого мы выберем, Республика теперь имеет доступ к необходимому техническому опыту для создания собственной военной промышленности."

 PHI_modernise_our_artillery: "Mодернизировать нашу артиллерию"
 PHI_modernise_our_artillery_desc: "В то время как наши пехотные войска, возможно, и справились с некоторыми из своих насущных проблем, наши артиллерийские войска по-прежнему полагаются на очень старые пушки малого калибра. Если мы хотим эффективно защищать страну, нам следует стремиться к приобретению более новых и тяжелых боеприпасов."

 PHI_increase_military_aid_procurement: "Увеличить объем военной помощи"
 PHI_increase_military_aid_procurement_desc: "С помощью наших покровителей мы сможем активно расширять строительство военных объектов на территории архипелага."

 PHI_prepare_for_the_storm: "Подготовка к шторму"
 PHI_prepare_for_the_storm_desc: "Наше стратегическое положение в Тихом океане обеспечивает легкий доступ в Юго-Восточную Азию. Мы всегда знали, что найдутся стороны, заинтересованные в распространении влияния за пределы наших границ. Теперь, когда теория начинает все больше и больше походить на реальность, Конгресс санкционировал дополнительное финансирование дальнейших закупок всех видов вооружений и техники для подготовки к любому конфликту, который может угрожать нашим островам."

 PHI_approach_the_foreign_arms_market: "Выход на зарубежный рынок вооружений"
 PHI_approach_the_foreign_arms_market_desc: "В Республике ни для кого не секрет, что Германская и японская империи конкурируют за влияние в нашей зарождающейся независимой республике. Заметив нашу неспособность производить собственное оборудование, мы получили предложения о технических консультантах, инвестициях и приобретении из Берлина."

### Home Defence Tree ###
 PHI_memories_of_eighteen_ninetynine: "Воспоминания о 1899"
 PHI_memories_of_eighteen_ninetynine_desc: "Теперь, когда Америки больше нет, а наша армия не имеет направления для своего формирования, некоторые из наших наиболее националистически настроенных офицеров выступают за то, чтобы мы обратились к опыту, приобретенному нами во время филиппино-американской войны."

 PHI_our_land_our_ways: "Наша Земля, Наши пути"
 PHI_our_land_our_ways_desc: "Как страна-архипелаг, обладающая десятками островов, покрытых джунглями, одной из наших основных мер защиты от любого потенциального захватчика является перспектива ведения асимметричных боевых действий с изолированными партизанскими отрядами. Мы должны обратить внимание на это в системе образования PMA.."

 PHI_standardise_our_rifles: "Стандартизация стрелкового оружия"
 PHI_standardise_our_rifles_desc: "Военное снаряжение армии представляет собой эклектичную смесь британского оружия и винтовок разного возраста и устаревшей техники. Если мы хотим создать силы, способные вести партизанскую войну против оккупантов, мы должны обеспечить массовое производство винтовок нового образца."

 PHI_form_the_sandatahanes: "Формирования сандатахане"
 PHI_form_the_sandatahanes_desc: "Уделяя особое внимание партизанской войне, мы должны реорганизовать гражданские военные округа (сандатахане), чтобы обеспечить вспомогательные подразделения для защиты своих районов и оказания помощи регулярной армии в выполнении ее обязанностей."

 PHI_expertise_of_the_scouts: "Опыт скаутов"
 PHI_expertise_of_the_scouts_desc: "Ни одно другое подразделение филиппинской армии не может сравниться со скаутами в умении ориентироваться в густых зарослях наших островов, покрытых джунглями. Объединение полков спецназа для поддержки наших дивизий позволит нам быстрее маневрировать в джунглях."

 PHI_jungle_fighter: "Войны джунглей"
 PHI_jungle_fighter_desc: "Иностранные захватчики уже испытывали наши земли на прочность: сначала испанцы, а затем американцы. Теперь, когда над нашими любимыми островами нависла угроза войны, мы должны ожидать, что нам придется обратиться к джунглям, чтобы оказать ожесточенное сопротивление. Ибо именно в джунглях мы научились тому, как лучше всего сражаться и как лучше всего побеждать."

 PHI_lessons_from_the_revolution: "Уроки Революции"
 PHI_lessons_from_the_revolution_desc: "Большая часть военной истории островов сосредоточена на использовании преимуществ нашего географического положения, чтобы превратить работу оккупантов в кошмар. Возможно, они и способны победить нас в обычных сражениях, но за каждой травинкой в джунглях, за каждым изолированным островом прячутся люди, готовые сражаться и умирать за республику."

 PHI_facilitate_domestic_arms_production: "Содействие отечественному производству оружия"
 PHI_facilitate_domestic_arms_production_desc: "Если мы хотим сосредоточить наши вооруженные силы в ожидании того, что превосходящие силы неизбежно высадятся на островах, наша военная промышленность также должна быть готова к размещению в небольших мастерских, спрятанных в джунглях и на островах. Исходя из этого, мы спланируем эвакуацию оружейников, которые будут рассредоточены по всей стране, и подготовим создание изолированных мастерских."

 PHI_the_jungle_our_refuge: "Джунгли-наши убежища"
 PHI_the_jungle_our_refuge_desc: "Мы должны включить подготовку в джунглях в программу базовой подготовки вооруженных сил в целом, учитывая, что мы берем на себя обязательство вести асимметричную войну в джунглях."

 PHI_paglaban_ng_pilipinas: "Paglaban ng Pilipinas"
 PHI_paglaban_ng_pilipinas_desc: "История не была благосклонна к островам, долгое время угнетаемым колонизаторами и империалистами, мы боролись за право распоряжаться своей судьбой с тех самых пор, как катипунцы присоединили свои владения к Испанской империи. С помощью этих реформ мы добьемся того, что любые потенциальные оккупанты заплатят свою цену за попытку отнять у нас нашу землю."

### Navy Tree ###
 PHI_expand_the_philippine_navy: "Создать береговой патруль"
 PHI_expand_the_philippine_navy_desc: "В соответствии с правительственным указом № 11, в состав морского патруля входит все морское оборудование и персонал, приобретенные правительством Филиппин и переданные в мирное или военное время под контроль начальника штаба. У него будут такие обязанности и полномочия, которые позволят защищать берега и острова нашего любимого островного государства."

 PHI_import_foreign_navy_designs: "Импорт зарубежных военно-морских проектов"
 PHI_import_foreign_navy_designs_desc: "Военно-морская гонка вооружений в начале 20-го века приблизила мир к началу первой мировой войны. Учитывая географический и стратегический характер Филиппинских островов, расположенных в Филиппинском и Южно-Китайском морях, является дерзостью, что мы обращаемся к иностранным военно-морским моделям и советникам для улучшения нашего военно-морского потенциала в целях обеспечения безопасности нашей страны."

 PHI_commence_the_coastal_defence_plan: "Приступить к реализация плана береговой обороны"
 PHI_commence_the_coastal_defence_plan_desc: "Амбициозный план береговой обороны [Get.Year] направлен на улучшение укреплений Форт-Друма (остров Эль-Фрейле), военно-морской базы Лейте-Самар и укреплений Пуэрто-Принсеса. Морские орудийные батареи, траншеи и фугасы будут укреплены, чтобы предотвратить морское вторжение на острова."

 PHI_develop_the_island_naval_bases: "Развивать островные военно-морские базы"
 PHI_develop_the_island_naval_bases_desc: "В дополнение к военно-морским батареям и фортификационным сооружениям, военно-морские базы должны быть дополнительно модернизированы с помощью прожекторов, зенитных батарей и вышек управления огнем. Военно-воздушные базы и радиолокационные станции также должны быть построены в срочном порядке, чтобы улучшить защиту островов."

 PHI_found_the_marine_corps: "Основать корпус морской пехоты"
 PHI_found_the_marine_corps_desc: "Географический характер Филиппин гарантирует, что операциями лучше всего управляют солдаты, способные быстро развернуться как на суше, так и на море, что делает Филиппины идеальной страной для создания энергичного корпуса морской пехоты. Со своим девизом \"честь, долг и героизм\" эти морские пехотинцы должны стать настоящим острием копья."

 PHI_a_fleet_of_mosquitos: "Москитный флот"
 PHI_a_fleet_of_mosquitos_desc: "Американцы оставили многие из своих торпедных и патрульных катеров. На этих лодках установлены торпеды, глубинные бомбы и легкие зенитные орудия. Хотя они и необычны по современным военно-морским стандартам, их размеры и скорость делают их идеальными для островной местности в западной части Тихого океана."

 PHI_revitalise_the_cavite_naval_yard: "Возродить военно-морскую верфь в Кавите"
 PHI_revitalise_the_cavite_naval_yard_desc: "Изначально это был испанский арсенал, но американцы захватили военно-морскую верфь Кавите, которая стала единственным судоремонтным предприятием ВМС США в западной части Тихого океана. Теперь, когда американцы ушли, мы должны постараться отремонтировать и оживить бывшую военно-морскую верфь, чтобы выпускать корабли для подготовки военных действий в открытом море."

 PHI_a_new_generation_of_naval_officers: "Новое поколение морских офицеров"
 PHI_a_new_generation_of_naval_officers_desc: "На протяжении всей истории филиппинцы отличались на полях сражений, начиная с победы Лапу-Лапу над Магелланом в битве при Мактане в 1521 году и заканчивая ожесточенным сопротивлением генерала Антонио Луны американскому империализму. Сейчас, когда в нашей республике начинает формироваться новое поколение морских офицеров, мы должны позаботиться о том, чтобы они возглавили следующее поколение."

 PHI_protecting_our_seas_securing_our_future: "Защищитим наши моря, защитим наше будущее"
 PHI_protecting_our_seas_securing_our_future_desc: "Наши усилия по модернизации бывшего морского патруля в по-настоящему грозную военно-морскую силу принесли свои плоды. Теперь мы можем с гордостью объявить о создании нового военно-морского флота Филиппин, который будет защищать наши моря и обеспечит нам по-настоящему дальновидное будущее!"

### Air Tree ###
 PHI_found_a_philippine_airforce: "Создать Армейский авиационный корпус Филиппин"
 PHI_found_a_philippine_airforce_desc: "Современные инновации в военной доктрине и исследованиях показали, что 20-й век должен стать веком воздушных сражений и превосходства в воздухе. Вдохновленная усилиями, предпринимаемыми в Соединенных Штатах, армия решила создать армейский авиационный корпус, чтобы повысить энтузиазм и заинтересованность в национальной противовоздушной обороне."

 PHI_seek_foreign_expertise: "Обратиться к зарубежному опыту"
 PHI_seek_foreign_expertise_desc: "Германская империя и Японская империя обладают одними из самых лучших самолетов в мире. Более того, мы также можем стремиться следовать американским образцам. Тем не менее, это дерзость, что мы обращаемся за иностранной помощью и советниками для обучения наших начинающих пилотов в рамках национальной программы "Молодые самолеты".."

 PHI_naval_air_integration: "Интерграция военно-морской авиации"
 PHI_naval_air_integration_desc: "Последствия интеграции сухопутных и воздушных сил во время первой мировой войны позволили осмыслить потенциал взаимодействия военно-морских и военно-воздушных сил также и в боевых действиях. Морские пикирующие бомбардировщики, оснащенные торпедами, послужили бы укреплению связей между военно-морским флотом и военно-воздушными силами и позволили бы нам наносить удары по военно-морским силам противника без присутствия крупных линкоров и крейсеров."

 PHI_expand_air_defence_installations: "Расширение системы ПВО"
 PHI_expand_air_defence_installations_desc: "В случае вторжения на Филиппины враг, скорее всего, попытается установить контроль над нашим небом. Мы не можем допустить, чтобы это произошло. На основных островах и реконструированных авиабазах должны присутствовать новые инновации и технологии, такие как радиолокационные станции, которые позволят военно-воздушным силам защищать наше небо."

 PHI_create_the_special_forces_regiment: "Полк Спецназначения"
 PHI_create_the_special_forces_regiment_desc: "Европейские и американские военные доктрины вложили средства в концепцию парашютистов - солдат, которые выпрыгивают из самолета и используют парашюты для обеспечения безопасности районов, недоступных непосредственно для других транспортных средств. Учитывая расстояние между филиппинскими островами, учебная программа по созданию полка специального назначения, предназначенного для подобных действий, будет иметь жизненно важное значение для нашей национальной обороны."

 PHI_promoting_young_aces: "Продвигать молодых асов"
 PHI_promoting_young_aces_desc: "Напряженность в мире становится все более высокой, и становится ясно, что в ближайшие годы нам, скорее всего, придется бороться за оборону. Таким образом, необходимо немедленно повышать в звании лучших пилотов, чтобы они стали ведущим поколением филиппинских пилотов и асов."

 PHI_invest_in_a_domestic_aviation_industry: "Инвестиции в собственную авиапромышленность"
 PHI_invest_in_a_domestic_aviation_industry_desc: "Уровень развития отечественной авиационной промышленности на Филиппинах невелик для страны в Азии и ничтожен по сравнению с западными стандартами. Учитывая, что угроза конфликта очень близка, мы должны стремиться к модернизации и развитию отечественной авиационной промышленности."

 PHI_expand_island_airbases: "Расширение островных авиабаз"
 PHI_expand_island_airbases_desc: "В целях укрепления островной обороны, особенно с точки зрения авиации, началась масштабная программа реконструкции и развития новых аэродромов, таких как аэродром Дель-Кармен, Кларк-Филд, Мба-Филд, Дель-Монте-Филд, Батаан-Филд и Николс-Филд."

 PHI_create_the_bomber_wing: "Созданий крыльев бомбардировщиков"
 PHI_create_the_bomber_wing_desc: "Вдохновленный европейскими доктринами стратегического уничтожения и интеграции наземных и воздушных сил, Корпус армейской авиации санкционировал создание программы, предназначенной для подготовки пилотов к выполнению задач по бомбардировке с целью нанесения ударов по наземным или военно-морским силам потенциального противника с неба."

 PHI_guardians_of_our_precious_skies: "Защитники наших драгоценных небес"
 PHI_guardians_of_our_precious_skies_desc: "Благодаря существенной модернизации и развитию армейская авиация значительно выросла и теперь стала Военно-воздушными силами Филиппин - отдельным подразделением армии. Как хранители нашего драгоценного неба, они будут передовым отрядом в защите нашего острова с воздуха."

 #### - Econ Tree - #####
  ### Black Monday ###

 PHI_convene_the_national_economic_council: "Созвать Национальный экономический совет"
 PHI_convene_the_national_economic_council_desc: "Национальный экономический совет, одно из первых созданий нового правительства Содружества, объединяет государственных служащих, промышленников, финансистов и технократов для консультирования президента по экономическим вопросам. У них есть опыт, необходимый для разработки и рекомендации плана действий по преодолению разворачивающегося кризиса."

 PHI_import_relief_rice: "Импорт льготного риса"
 PHI_import_relief_rice_desc: "Для подавляющего большинства филиппинцев вопрос о том, смогут ли они позволить себе достаточное количество риса для удовлетворения своих потребностей, является постоянным вопросом их повседневной жизни. Поскольку наше сельское хозяйство переориентировалось на выращивание товарных культур, мы постоянно производим недостаточно риса для удовлетворения наших внутренних потребностей, и в трудные времена это приводит к росту цен. Наше правительство оплачивает импорт риса, чтобы снизить цены на этот продукт."

 PHI_halt_immigration: "Остановить иммиграцию"
 PHI_halt_immigration_desc: "Китайцы долгое время доминировали в коммерческой жизни этой страны и широко представлены во многих городских отраслях. Отношение людей к этим иностранным конкурентам и без того плохое при нормальных обстоятельствах, но в условиях депрессии оно становится откровенно враждебным. На данный момент мы приостановим любую дальнейшую иммиграцию из материкового Китая. Народ поддержит правительство, которое заботится о своих собственных интересах.."

 PHI_cut_bureaucratic_expenses: "Сокращение бюрократических расходов"
 PHI_cut_bureaucratic_expenses_desc: "Поскольку наши доходы стремительно падают, нам придется как-то сокращать расходы. Государственная служба является основным работодателем для высокомобильных образованных филиппинцев, а также простым способом получения патронажа. Однако на данный момент нам придется экономить на наших отделах, сокращая количество ненужных сотрудников и урезая зарплаты. С другой стороны, при падении цен, по крайней мере, покупательная способность чиновников не сильно снизится."

 PHI_revive_the_cedula: "Восстановление седулы"
 PHI_revive_the_cedula_desc: "В старые испанские времена седула, налог на проживание, который платили все взрослые туземцы и который фактически был подушным налогом, был ненавистным символом угнетения. Фактически, крик Пугада Лоуина, когда члены "Катипунан" разорвали свои календари, ознаменовал начало революции. В настоящее время потребности современного государства требуют увеличения налоговых поступлений. Все взрослые должны будут уплатить своим муниципалитетам налог в размере пятидесяти сентаво, за который они получат свидетельство о проживании."

 PHI_form_the_nepa: "Национальная ассоциация защиты экономики"
 PHI_form_the_nepa_desc: "Тот факт, что значительная часть экономической жизни Филиппин находится в руках иностранцев, вызывает возмущение. Это касается всего - от предприятий, принадлежащих иностранцам, до торговцев-иммигрантов и необходимости покупать готовую продукцию за рубежом, что приводит к значительному дефициту торгового баланса нашей экономики. Национальная ассоциация защиты экономики была сформирована из известных бизнесменов и общественных лидеров и возглавит кампанию, призванную призвать людей "покупать филиппинское".."

 PHI_key_to_economic_nationalism: "Ключ к экономическому национализму"
 PHI_key_to_economic_nationalism_desc: "На протяжении десятилетий лидеры Филиппин говорили о национализме и наших национальных устремлениях. Мы стремились к независимости и развитию политических институтов, но национализм - это нечто большее. Чтобы стать по-настоящему независимой нацией, мы должны установить контроль над нашей внутренней торговлей и коммерциализацией и приумножить коренное богатство Филиппин."

 ### Agriculture ###
 PHI_improve_internal_transport: "Развитие внутреннего транспорта"
 PHI_improve_internal_transport_desc: "В такой развивающейся сельскохозяйственной экономике, как наша, высокие транспортные расходы являются одним из самых серьезных препятствий на пути экономического развития. Есть дороги, которые нуждаются в улучшении, железные дороги, которые нуждаются в расширении, реки, которые нуждаются в углублении дна, и причалы, которые нуждаются в строительстве. Совершенствование нашей транспортной сети, как по суше, так и по воде, позволит нашим фермерам быстрее и эффективнее доставлять свои товары на рынок."

 PHI_encourage_crop_diversification: "Поощрять диверсификацию с/х культур"
 PHI_encourage_crop_diversification_desc: "По мере интеграции Филиппин в мировую экономику они становятся все более зависимыми от ограниченного числа товарных культур. Это имеет как положительные, так и отрицательные стороны. Монокультуры более подвержены неурожаям и болезням, а зависимость от одного продукта вредит фермерам, когда цены падают. Поощрение диверсификации сельскохозяйственных культур обогатит наши почвы и обеспечит фермеров более разнообразным источником дохода."

 PHI_redistribute_large_estates: "Перераспределить крупные поместья"
 PHI_redistribute_large_estates_desc: "С незапамятных времен собственность на землю была сосредоточена в руках элиты. Американцы приложили некоторые усилия, чтобы разделить поместья монахов, но дальше этого дело не пошло. Правительство выкупит земельные участки у их владельцев по справедливой цене, разделит их на участки и раздаст безземельным с целью увеличения численности мелких землевладельцев."

 PHI_internal_colonisation_of_Mindanao: "Внутреняя колонизация Минданао"
 PHI_internal_colonisation_of_Mindanao_desc: "Минданао всегда был пограничной территорией, населенной мятежными мусульманами и язычниками, которых испанцы так и не смогли приручить. Но наследие американской империи в конце концов усмирило эти народы, и современное филиппинское государство наконец-то получило возможность открыть для себя эту великую землю. Тысячи безземельных жителей Висайи уже прибыли на Минданао, чтобы завладеть собственными участками и превратить непродуктивную дикую местность в будущую житницу Филиппин."

 PHI_cap_rents_for_sharecroppers: "Ограничение ренты для земледельцев"
 PHI_cap_rents_for_sharecroppers_desc: "Крестьяне всегда были связаны с землевладельцами долгами, но в последние годы ситуация ухудшилась. Модернизация сельской экономики привела к тому, что задолженность арендаторов увеличилась до такой степени, что они не могут позволить себе даже недельный запас риса для своей семьи. Крестьяне не просят многого и будут в значительной степени удовлетворены, если мы ограничим требования землевладельцев к ним и будем поощрять прощение долгов в трудные времена."

 PHI_import_farming_machinery: "Импорт сельскохозяйственной техники"
 PHI_import_farming_machinery_desc: "Было время, когда для ведения хозяйства требовались только мужчина, плуг и карабао. И этого может быть достаточно для мелких фермеров, но крупные землевладельцы знают о революции в сельском хозяйстве, которая происходит в промышленно развитых странах: автомобильные тракторы, механические лущильники и другие хитроумные устройства. Если филиппинское сельское хозяйство хочет оставаться конкурентоспособным в этом меняющемся мире, ему необходимо заменить человеческую силу машинной."

 PHI_expand_the_sugar_centrals: "Расширение сахарных плантаций"
 PHI_expand_the_sugar_centrals_desc: "Сахарный тростник выращивается на многих плантациях, разбросанных по островам, но рафинирование сахара - это интенсивный и дорогостоящий процесс, особенно при использовании нового центробежного метода. Вот почему производители сахара объединяются, чтобы финансировать крупные централизованные сахарные заводы для переработки урожая. Если мы хотим продолжать расширять производство нашей основной статьи экспорта, мы должны поощрять продолжение этой тенденции."

 PHI_agricultural_and_industrial_bank: "Сельскохозяйственный и промышленный банк"
 PHI_agricultural_and_industrial_bank_desc: "Наши фермеры хорошо знают о препятствиях, с которыми сталкивается наш сельскохозяйственный сектор, а также о многих возможных решениях, но чего им не хватает, так это средств. Ничего нельзя сделать без капитала, а в такой неразвитой колониальной экономике, как на Филиппинах, капитала не хватает. Сельскохозяйственный и промышленный банк должен быть учрежден правительством специально для предоставления кредитов крупным сельскохозяйственным предприятиям."

 ### Industry ###
 PHI_domestic_textile_production: "Собственная текстильная промышленность"
 PHI_domestic_textile_production_desc: "Безусловно, самым важным товаром промышленного назначения для среднестатистического филиппинца является текстиль. Импорт дешевых тканей массового производства из-за рубежа уже давно привел к фактическому вымиранию старых кустарных ткацких мастерских. Однако создание отечественной текстильной промышленности - это тот вид легкой промышленности, который находится в пределах наших возможностей. Будет открыта государственная текстильная фабрика, что позволит нам меньше зависеть от импорта одежды."

 PHI_build_fertilizer_plants: "Строительство заводов по производству удобрений"
 PHI_build_fertilizer_plants_desc: "Если мы собираемся развивать химическую промышленность, то имеет смысл начать с продуктов для сельского хозяйства. Сульфат аммония - самое дешевое и простое в производстве азотное удобрение. Оно может быть менее эффективным, чем большинство удобрений, но его применение все равно даст значительные результаты в повышении производительности наших ферм."

 PHI_encourage_native_retailers: "Поддержка местных торговцев"
 PHI_encourage_native_retailers_desc: "В торговле Филиппин, от крупных складов в Маниле до маленьких магазинчиков в каждом районе Барангая, доминируют китайцы. Нет причин, по которым коренные филиппинцы не могли бы разрушить эту монополию и сами стать владельцами магазинов. Если мы откроем кредитные линии тем гражданам, которые заинтересованы в открытии предприятий розничной торговли, им будет легче конкурировать с этими иностранцами."

 PHI_expand_the_electrical_grid: "Расширение электрической сети"
 PHI_expand_the_electrical_grid_desc: "Манильская электрическая компания (Manila Electric Company) была одной из главных движущих сил модернизации столицы, обеспечивая электроэнергией транспорт, телекоммуникации и бытовые нужды. Если мы хотим, чтобы страна стала по-настоящему современной, электроснабжение должно быть доступно как можно большему числу людей. Электрическая сеть протянется за пределы Манилы во внутренние районы Лусона, а другие сети будут построены на отдаленных островах."

 PHI_protect_small_industries: "Защита малых предприятий"
 PHI_protect_small_industries_desc: "В борьбе за замещение импорта важную роль играют не только крупные предприятия. Сотни небольших фабрик и мастерских, которые занимаются прядением хлопка, изготовлением мыла и консервирования продуктов питания, также играют ключевую роль в развитии нашего отечественного производства. Мы примем законы, защищающие эти малые предприятия как с точки зрения производимой ими продукции, так и с точки зрения возможностей трудоустройства."

 PHI_la_union_cement_plant: "Цементный завод "Ла Юнион""
 PHI_la_union_cement_plant_desc: "При строительстве современных зданий, дорог и портовых сооружений используются современные материалы, главным из которых является цемент. Национальная девелоперская компания уже добилась успеха в строительстве цементного завода на набережной Себу через свою дочернюю компанию, и эта модель может быть повторена в других регионах. Следующим объектом нашего внимания в области строительства станет Северный Лусон."

 PHI_national_trading_corporation: "Национальная торговая корпорация"
 PHI_national_trading_corporation_desc: "По мере роста напряженности в мире мировая экономика испытывает трудности. Блоки великих держав, испытывающие экономическую депрессию и боящиеся друг друга, отгородились друг от друга стенами, и свободный поток товаров был ограничен. Для обеспечения безопасности Филиппин необходимо, чтобы правительство могло обеспечить закупку и накопление определенных жизненно важных товаров и ресурсов. Для этого будет создана государственная корпорация."

 PHI_establish_the_bangko_sentral_ng_pilipinas: "Учредить Центральный Банк Филиппин"
 PHI_establish_the_bangko_sentral_ng_pilipinas_desc: "В 1916 году был создан Филиппинский национальный банк, контрольный пакет акций которого принадлежал государству. Хотя первоначально он считался успешным, во время послевоенного кризиса он едва не обанкротился. Но теперь, когда песо не привязан к доллару США, необходимость обеспечения стабильности валюты возродила идею создания настоящего центрального банка. Для подготовки устава уже был созван Совет Центрального банка."

 ### Mining ###
 PHI_expand_zamboanga_plantations: "Расширение плантаций Замбоанга"
 PHI_expand_zamboanga_plantations_desc: "Полуостров Замбоанга является наиболее развитой частью Минданао, и на нем уже выращивается небольшое количество каучуковых деревьев. На самом деле нет причин, по которым мы не могли бы расширить производство этой культуры, чтобы конкурировать с плантациями в Малайе, особенно при практически таких же климатических и почвенных условиях. Эксперты считают, что спрос на этот важнейший ресурс будет расти."

 PHI_exploit_zambales_chromium: "Эксплуатация месторождений хрома"
 PHI_exploit_zambales_chromium_desc: "Недавнее развитие гальванопокрытия значительно расширило сферу применения хрома в металлургической промышленности, и так уж случилось, что на Филиппинах находятся одни из самых больших запасов хрома, которые еще не обнаружены. До сих пор основным потребителем были Соединенные Штаты, но по мере того, как наша экономика будет все меньше привязываться к Америке, мы сможем свободно продавать этот ресурс на мировом рынке."

 PHI_small_scale_gold_mining: "Мелкомасштабная добыча золота"
 PHI_small_scale_gold_mining_desc: "Добыча золота долгое время была важным видом деятельности на Филиппинах, начиная с доколониальных времен. В мире, где многие страны все еще придерживаются золотого стандарта, спрос на золото никогда не был таким высоким. Большая часть нашего золота добывается мелкими старателями с использованием относительно примитивных технологий. Возможно, это тяжелая и вредная для здоровья работа, но она обеспечивает им достойную жизнь, и поэтому не должна подвергаться угрозе."

 PHI_roads_in_the_cordillera: "Дороги в Кордильерах"
 PHI_roads_in_the_cordillera_desc: "Кордильеры острова Лусон - самая неразвитая часть страны, населенная языческими племенами, которые едва ли были просвещены цивилизацией. Тем не менее, они также содержат огромные богатства в виде нетронутых полезных ископаемых и высококачественной тропической древесины. Американцы уже начали осваивать этот регион, построив дорогу в Багио; мы можем завершить то, что они начали."

 PHI_develop_domestic_coalfields: "Освоение отечественных угольных месторождений"
 PHI_develop_domestic_coalfields_desc: "Ни один минеральный ресурс не имеет такого широкого применения, как уголь: в производстве электроэнергии, для отопления жилых помещений, на транспорте и в промышленности. Национальная угольная корпорация работает над тем, чтобы Филиппины были самодостаточны в обеспечении своих потребностей. Увеличение инвестиций в угольные месторождения Сибугей и Компостела приблизит нас к этой цели."

 PHI_surigao_iron_deposits: "Месторождения железа в Суригао"
 PHI_surigao_iron_deposits_desc: "Развитие отечественной тяжелой промышленности заманчиво, но пока это остается несбыточной мечтой. Это, конечно, не означает, что наши запасы железа должны простаивать. В Тихоокеанском регионе есть много рынков, которые были бы заинтересованы в приобретении нашего железа для своей промышленности, если бы только у наших горнодобывающих предприятий были средства для производства по конкурентоспособным ценам."

 PHI_electrify_the_manila_railroad: "Электрификация Манильской железной дороги"
 PHI_electrify_the_manila_railroad_desc: "Железнодорожная компания Манилы была одним из самых успешных предприятий индустриальной эпохи. Ее протяженность превысила тысячу километров, соединив Манилу с Сан-Фернандо на севере и Легаспи на юге, что значительно улучшило перевозки людей и грузов. Настало время сделать следующий шаг и повысить эффективность за счет электрификации существующих путей."

 PHI_copper_capital_of_the_east: "Медная столица Востока"
 PHI_copper_capital_of_the_east_desc: "Медь - гораздо более редкий металл, чем многие думают, однако она незаменима для производства электропроводки и других важных материалов. Обладая крупнейшими разведанными месторождениями меди в Тихоокеанском регионе, мы уже успешно занимаемся экспортом медной руды в различные страны. Инвестиции в эту отрасль должны быть увеличены, чтобы сохранить наше преимущество."

########################################
#####- Section 06: Decisions - #########
########################################

 PHI_join_internationale: "Присоединиться к Интернационалу"
 PHI_join_internationale_desc: "Как товарищи-революционеры, мы должны объединиться против сил капитализма и империализма, демонстрируя солидарность трудящихся против тех, кто хочет их угнетать!"

 PHI_fight_for_the_philippines_decision_cat: "Сражение за Филиппины"
 PHI_fight_for_the_philippines_decision_tt: "Вторая гражданская война в США вынудила американцев отступить через Тихий океан, подорвала их колониальное влияние на Филиппины и оставила вакуум власти в регионе. Занимая жизненно важное положение в Тихом океане, Манила стремится обезопасить себя, а представители Германии и Японии спешат подкупить политиков, задобрить военных и повлиять на общественное мнение в интересах Пакта и всей сферы. Многие филиппинцы неохотно связывают свою нацию с внешней средой, но в условиях надвигающейся войны им придется сделать судьбоносный выбор.\n\nСторона, обладающая наибольшим влиянием на момент проведения выборов на Филиппинах в сентябре 1939 года увидит, что Филиппины присоединятся к их фракции. В противном случае Филиппины останутся неприсоединившимися.\n\n[PHI_fight_for_the_philippines_decision_cat_scripted_loc]"
 PHI_pie_chart_title: "Уровень"
 PHI_pie_chart_desc_tt: "[PHI.GetFlag] §YФилиппины§! могут [PHI_fight_for_the_philippines_pie_chart_scripted_loc]."
 PHI_fight_for_philippines_usa_outcome: "§3присоединиться к Америке§!"
 PHI_fight_for_philippines_gea_outcome: "§gприсоединиться к Германии§!"
 PHI_fight_for_philippines_cps_outcome: "§jприсоединиться к Японии§!"
 PHI_fight_for_philippines_independent_outcome: "§Rостаться независимыми§!"
 PHI_pie_chart_desc_delay_tt: "  \nУровень §Rнезависимости§!: [?PHI.PHI_forpol_IND_percentage_var|%1R]\n§gНемецкое§! влияние: [?PHI.PHI_forpol_GEA_percentage_var|%1g]\n§jЯпонское§! влияние: [?PHI.PHI_forpol_CPS_percentage_var|%1j]\n§cАмериканское§! влияние: [?PHI.PHI_forpol_USA_percentage_var|%1c]"

 PHI_USA_winner_exists_key: "Окончание гражданской войны в США привело к восстановлению американских интересов на Тихом океане. Если влияние Америки будет больше, чем у любой другой группировки, а Филиппины будут иметь совместимые позиции, они предоставят взаимные гарантии, и Филиппины могут присоединиться к любой фракции, которую поддержат американцы."

 PHI_no_USA_winner_exists_key: "Гражданская война в США нанесла ущерб американским интересам на Тихом океане. Если война закончится до выборов 1939 года, у них есть возможность вступить в борьбу за Филиппины."

 PHI_election_in_180_days_mission_timer: "Предстоящие выборы на Филиппинах"
 PHI_election_in_180_days_mission_timer_desc: "После провозглашения Республики при посредничестве филиппинского политического истеблишмента и президента Кесона был достигнут компромисс. Как и было обещано, в сентябре 1939 года должны состояться новые президентские выборы, которые будут иметь значительные последствия как для островного государства, так и для его соседей."

 PHI_election_in_180_days_dummy_mission_timer: "Предстоящие выборы на Филиппинах"
 PHI_election_in_180_days_dummy_mission_timer_desc: "После провозглашения Республики при посредничестве филиппинского политического истеблишмента и президента Кесона был достигнут компромисс. Как и было обещано, в сентябре 1939 года должны состояться новые президентские выборы, которые будут иметь значительные последствия как для островного государства, так и для его соседей."

 GEA_military_coordination_with_the_philippines: "Военная координация с Филиппинами"
 GEA_military_coordination_with_the_philippines_desc: "Тихий океан - это пороховая бочка, в которой четко прослеживаются границы между интересами Германии и Японии. Правительство Филиппин, прежде всего, отчаянно нуждается в безопасности на фоне распада Соединенных Штатов и неуклонного роста напряженности в регионе. Демонстрация нашей способности защитить острова необходима для того, чтобы склонить их на нашу сторону."
 GEA_political_negotiations_with_the_philippines: "Политические переговоры с Филиппинами"
 GEA_political_negotiations_with_the_philippines_desc: "Старая добрая дипломатия имеет большое значение для привлечения иностранных государств на нашу сторону. Конечно, мы вряд ли ограничены официальными или даже легальными политическими каналами - некоторые закулисные сделки, хитроумная взятка и случайный шантаж могут склонить чашу весов в нашу пользу."
 GEA_sabotage_japanese_influence: "Подорвать японское влияние"
 GEA_sabotage_japanese_influence_desc: "В конце концов, иногда правильным решением будет отказаться от более масштабной победы в пользу более реалистичной. Учитывая, что влияние наших соперников неуклонно превышает наше собственное, возможно, было бы лучше выбрать меньшее из двух зол и победить их вместе с нами - в надежде, что нейтральные Филиппины для нас лучше, чем вражеские."
 GEA_encourage_an_open_door_in_the_philippines: "Поощрение политики открытых дверей на Филиппинах"
 GEA_encourage_an_open_door_in_the_philippines_desc: "В администрации Манилы и среди широкой общественности царит большой ужас по поводу иностранного вмешательства в дела их новой \"независимой\" страны. Для нас важно приоткрыть дверь иностранному влиянию, даже если это означает, что наши соперники могут получить преимущество над нами в краткосрочной перспективе."
 GEA_economic_aid_package_to_the_philippines: "Пакет экономической помощи Филиппинам"
 GEA_economic_aid_package_to_the_philippines_desc: "Филиппины остро нуждаются в иностранных инвестициях, чтобы вытащить свой народ из пучины Великой депрессии и "Черного понедельника". Пакет экстренной помощи, хотя и остается значительным, принесет им гораздо больше пользы, чем это будет стоить нам, и значительно укрепит наше влияние в регионе."
 GEA_arms_shipments_to_the_philippines: "Поставки оружия на Филиппины"
 GEA_arms_shipments_to_the_philippines_desc: "Филиппинская армия - чрезвычайно молодое учреждение, впервые созданное в декабре 1935 года и сформировавшееся из небольшого числа ветеранов филиппинской полиции и филиппинских скаутов. Учитывая ограниченные возможности по производству собственного оружия и инфраструктуры для подготовки сил, необходимых для защиты их новой республики, наша помощь в развитии их вооруженных сил будет иметь большое значение для укрепления нашей дружбы и подготовки их к предстоящим войнам."

 JAP_military_coordination_with_the_philippines: "Военная координация с Филиппинами"
 JAP_military_coordination_with_the_philippines_desc: "$GEA_military_coordination_with_the_philippines_desc$"
 JAP_political_negotiations_with_the_philippines: "Политические переговоры с Филиппинами"
 JAP_political_negotiations_with_the_philippines_desc: "$GEA_political_negotiations_with_the_philippines_desc$"
 JAP_sabotage_german_influence: "Подорвать немецкое влияние"
 JAP_sabotage_german_influence_desc: "$GEA_sabotage_japanese_influence_desc$"
 JAP_encourage_an_open_door_in_the_philippines: "Поощрение политики открытых дверей на Филиппинах"
 JAP_encourage_an_open_door_in_the_philippines_desc: "$GEA_encourage_an_open_door_in_the_philippines_desc$"
 JAP_economic_aid_package_to_the_philippines: "Пакет экономической помощи Филиппинам"
 JAP_economic_aid_package_to_the_philippines_desc: "$GEA_economic_aid_package_to_the_philippines_desc$"
 JAP_arms_shipments_to_the_philippines: "$GEA_arms_shipments_to_the_philippines$"
 JAP_arms_shipments_to_the_philippines_desc: "$GEA_arms_shipments_to_the_philippines_desc$"

 USA_military_coordination_with_the_philippines: "Военная координация с Филиппинами"
 USA_military_coordination_with_the_philippines_desc: "$GEA_military_coordination_with_the_philippines_desc$"
 USA_political_negotiations_with_the_philippines: "Политические переговоры с Филиппинами"
 USA_political_negotiations_with_the_philippines_desc: "$GEA_political_negotiations_with_the_philippines_desc$"
 USA_encourage_philippine_neutrality: "Поощрять нейтралитет Филиппин"
 USA_encourage_philippine_neutrality_desc: "Реальность ситуации такова, что наш контроль над Филиппинами был нарушен, возможно, безвозвратно. Вместо того, чтобы бороться с неизбежным, нам важно позаботиться о том, чтобы Филиппины не скатились в лагерь враждующих Японии и Германии. Возможно, позже, в лучшие времена, мы сможем возобновить нашу дружбу."
 USA_economic_aid_package_to_the_philippines: "Пакет экономической помощи Филиппинам"
 USA_economic_aid_package_to_the_philippines_desc: "$GEA_economic_aid_package_to_the_philippines_desc$"
 USA_arms_shipments_to_the_philippines: "$GEA_arms_shipments_to_the_philippines$"
 USA_arms_shipments_to_the_philippines_desc: "$GEA_arms_shipments_to_the_philippines_desc$"

 PHI_shoring_up_our_own_defences: "Укрепить нашу оборону"
 PHI_shoring_up_our_own_defences_desc: "Скорее всего, наша страна так или иначе окажется в осаде. Вряд ли мы можем ожидать, что кружащие вокруг нас акулы будут держаться от нас подальше, если мы беззащитны, и, следовательно, мы должны быть настороже в отношении угрозы иностранного вторжения."
 PHI_playing_off_our_competitors: "Отыгрываться на наших конкурентов"
 PHI_playing_off_our_competitors_desc: "В Манилу прибыли контрабандисты из Токио, Сингапура и других стран, которые присоединились к американским сторонникам, пытающимся приобрести влияние в сложной филиппинской политической системе. Но мы являемся экспертами в своей собственной игре, и, противопоставляя друг другу эти конкурирующие программы, мы выйдем вперед."
 PHI_peace_in_the_pacific: "Мир в тихоокеанском регионе"
 PHI_peace_in_the_pacific_desc: "Континент находится на пороге войны, и наша удаленность от материка не обеспечит нам достаточной защиты. Но, хотя иностранные государства настаивают на том, чтобы мы приняли их сторону, мы никогда не должны забывать о своей собственной. Наш народ не заинтересован в конфликте, и чем скорее ему об этом напомнят, тем лучше."
 PHI_crackdown_on_foreign_agitators: "Подавить иностранных агитаторов"
 PHI_crackdown_on_foreign_agitators_desc: "Иностранные агенты прибыли из-за рубежа в надежде опрокинуть наши давние политические традиции и пожертвовать нашим народом ради своих интересов. Мы должны изгнать этих иностранцев и отстранить от дел всех, кто брал у них взятки."
 PHI_negotiate_with_the_americans: "Переговоры с американцами"
 PHI_negotiate_with_the_americans_desc: "Несмотря на то, что американское правительство претерпело значительные изменения, на Филиппинах по-прежнему остается много сторонников Америки, которые надеются сохранить свое давнее политическое, экономическое и военное влияние, завоеванное за десятилетия оккупации. Хотя это и неприятно для многих филиппинских националистов, работа с этими фигурами может оказаться необходимой, чтобы не дать нам втянуться в смертельные игры, в которые играют наши соседи."
 PHI_negotiate_with_the_Germans: "Переговоры с Германией"
 PHI_negotiate_with_the_Germans_desc: "Немецкое влияние на Тихом океане существовало с 19 века, но резко расширилось после их победы в Великой войне и захвата британских владений в Юго-Восточной Азии. Поскольку способность американцев быть посредниками между ними и мстительными японцами ослабла, они могут стать нашей последней надеждой в сопротивлении японскому вторжению."
 PHI_negotiate_with_the_Japanese: "Переговоры с японцами"
 PHI_negotiate_with_the_Japanese_desc: "Японцы - растущая держава на Тихом океане, они одержали победу над немцами в боях во время Первой мировой войны, несмотря на то, что в конечном итоге потеряли свои завоевания в ходе последовавшего мирного процесса. Они не забыли этого и, вероятно, больше не согласятся на меньшее. Они приходят во имя паназиатизма, и, возможно, нам пора присоединиться к ним."
 PHI_the_geopolitical_ballgame: "Геополитический пинг-понг"
 PHI_the_geopolitical_ballgame_desc: "В условиях постоянного изменения течения в Тихом океане мы должны быть гибкими, чтобы выжить. Помогая слабейшей стороне в своих интересах и регулярно меняя партнеров по танцам, мы сохраняем конкурентоспособность в игре и наши возможности.."

 PHI_join_faction: "Альянс с [FROM.GetNameDef]"
 PHI_join_faction_desc: "Несмотря на все наши усилия (или, возможно, благодаря им), ситуация в Тихоокеанском регионе изменилась настолько, что наш миролюбивый народ должен, наконец, выбрать сторону. Несмотря на значительное нежелание делать это, в конечном счете нам необходимо принять это трудное решение, чтобы защитить себя от внешних угроз."

 PHI_enforce_our_claims_on_north_borneo_decision: "Enforce Our Claims on North Borneo"
 PHI_enforce_our_claims_on_north_borneo_decision_desc: "The Sultanate of Sulu was granted the northeastern part of the island of Borneo in 1704 as a reward for helping the Sultan of Brunei. In 1878 the Sultanate of Sulu signed an agreement with the British over the rights to the northeastern part of the island of Borneo. The British maintain it was a cession of territory, but the ambiguity of the treaty (written in Malay) has led to many in the Philippines to believe it was meant to be a lease. As the legal successors to the Sultanate of Sulu, the Philippines maintain that that territory is rightfully theirs.\n\nWhile we can cite various legal justifications for our argument, court cases and linguistic debates will not garner international recognition for our claim. Only having boots on the ground in the area and the asserting of our dominance over the region will allow us to gain the authority we deserve."

 PHI_appease_the_masses_decision: "Успокоить массы"
 PHI_appease_the_masses_decision_desc: "Настало время для новых Филиппин! С помощью пламенных слов и грандиозных обещаний мы можем вдохновить толпы добиваться большего, чем то, чего они добиваются в жизни сейчас!"

 PHI_suppress_the_rabblerousers: "Подавление инакомыслия"
 PHI_suppress_the_rabblerousers_desc: "Стремительные изменения в мировом порядке привели к тому, что на первый план вышли разного рода подстрекатели к беспорядкам. Хотя и жесткие меры по пресечению их деятельности необходимы для прогресса, даже если в долгосрочной перспективе это может привести к серьезным последствиям."

 PHI_embrace_the_spirit_of_change_decision: "Принять движение вперед"
 PHI_embrace_the_spirit_of_change_decision_desc: "Движение вперед неумолимо. Хотя многие реакционеры стоят на нашем пути, правда в том, что пути назад нет. Мы поведем Филиппины вперед, даже если нам придется потрясти основы нашего общества до основания."

 PHI_appeal_to_the_elites_decision: "Обращение к элитам"
 PHI_appeal_to_the_elites_decision_desc: "Как и в любом обществе, чтобы добиться чего-то хорошего, лидеры должны ориентироваться в сложной сети влиятельных лиц и заинтересованных сторон, тщательно убеждая их одобрить постепенные, необходимые изменения, которые принесут пользу всем."

 PHI_confront_the_caciques_decision: "Конфронтация с касиками"
 PHI_confront_the_caciques_decision_desc: "Последствия Черного понедельника и упадка послевоенного политического порядка продолжают сказываться на Филиппинах. Есть много укоренившихся групп, которые не могут смириться с этим фактом. Мы должны противостоять им, несмотря на те опасности, которые это может представлять, иначе вся наша нация будет сдерживаться до тех пор, пока не образумится."

 PHI_champion_the_traditional_order_decision: "Отстаивать традиционные порядоки"
 PHI_champion_the_traditional_order_decision_desc: "Хотя времена быстро меняются, основные институты власти на Филиппинах остаются прежними. Возможно, это не всегда популярно, но на то есть свои причины, и мы не позволим, чтобы народ был введен в заблуждение жаждущими власти недовольными."

 PHI_enforce_the_presidential_vision_decision: "Претворяя в жизнь президентское видение"
 PHI_enforce_the_presidential_vision_decision_desc: "У президента есть мечта о процветающем будущем Филиппин, которую не вполне понимают ни популисты, ни элиты. Но народ Филиппин поймет и выиграет, если только позволит ему провести грань между реформами и реакцией."

 PHI_land_reform_decision: "Земельная реформа в [FROM.GetName]"
 PHI_land_reform_decision_desc: "Борьба за филиппинскую сельскую местность, длящаяся десятилетиями, еще не закончена. Потребуются постоянные усилия по модернизации и благоустройству сельской местности, и мы можем только надеяться, что это принесет свои плоды в долгосрочной перспективе."

