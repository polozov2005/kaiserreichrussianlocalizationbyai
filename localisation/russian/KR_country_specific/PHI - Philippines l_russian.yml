 PHI_totalist_party: "РПФ"
 PHI_totalist_party_long: "$PHI_syndicalist_party_long$"

 PHI_syndicalist_party: "РПФ"
 PHI_syndicalist_party_long: "Рабочая Партия Филиппин\n§LРабочая Партия является ведущей организацией филиппинских крайне левых. Первоначально основанная в 1924 году как средство продвижения лейбористских кандидатов на муниципальных выборах, она была быстро захвачена крайне левыми активистами, которые использовали ее в качестве группы давления, чтобы подтолкнуть Филиппинский трудовой конгресс к более радикальной позиции. РПФ является идеологически синдикалистской организацией и филиалом Третьего интернационала; ее основная база поддержки находится среди рабочего класса Манилы. Однако она установила тесные связи с основными крестьянскими группами Лусона, что необходимо в стране, где большинство населения по-прежнему проживает в сельской местности.§!\n"

 PHI_radical_socialist_party: "РПФ"
 PHI_radical_socialist_party_long: "$PHI_syndicalist_party_long$"

 PHI_social_democrat_party: "РП"
 PHI_social_democrat_party_long: "Республиканская Партия\n§LРеспубликанская партия была основана писательницей, журналисткой и активисткой лейбористской партии Изабеллой де лос Рейес в 1905 году. Отражая прогрессивные и своеобразные убеждения де лос Рейеса, она была главным образом средством его собственных предвыборных усилий. В конце концов, де лос Рейес передал руководство Республиканской Партией своему близкому другу Грегорио Аглипаю, первому епископу Независимой Филиппинской церкви. После президентских выборов 1935 года она была фактически прекращена.§!\n"

 PHI_social_liberal_party: "ДП"
 PHI_social_liberal_party_long: "Демократическая Партия\n§LДемократическая партия была образована в 1917 году в результате слияния Национальной прогрессивной партии и Национальной демократической партии, которые в то время были двумя главными противниками националистической партии. На самом деле демократы почти полностью определялись своей оппозицией националистам. Когда националисты раскололись между собой, демократы смогли воспользоваться этим расколом; но когда националисты снова объединились, демократы снова оказались в безвыходном положении. После многих лет борьбы за альтернативное видение филиппинской политики партия движется в более прогрессивном направлении под руководством блестящего Кларо М. Ректо, который изображает демократов защитниками чистого правительства и гражданских свобод.§!\n"

 PHI_market_liberal_party: "НП"
 PHI_market_liberal_party_long: "Националистическая Партия\n§LНационалистическая партия была основана в 1907 году молодыми политиками, которые выступали за \"немедленную и безоговорочную независимость\" от Соединенных Штатов. Руководствуясь этой простой платформой, они одержали сокрушительную победу на первых парламентских выборах и с тех пор поддерживают ее. Контролируя политику на национальном, провинциальном и местном уровнях, националисты создали впечатляющую машину, основанную на семейных династиях, клиентелизме и коррупции. Лидер партии Мануэль Кесон построил свою карьеру на мастерстве ведения этой грязной политической игры, но это не означает, что его действия полностью циничны. Кесон и националисты искренне стремятся к национальному развитию, пытаясь сохранить стабильность и традиционную филиппинскую иерархию.§!\n"

 PHI_social_conservative_party: "НП"
 PHI_social_conservative_party_long: "$PHI_market_liberal_party_long$"

 PHI_authoritarian_democrat_party_roxas: "НП"
 PHI_authoritarian_democrat_party_roxas_long: "Националистическая Партия\n§LНационалистическая партия была основана в 1907 году молодыми политиками, которые выступали за \"немедленную и безоговорочную независимость\" от Соединенных Штатов. Руководствуясь этой простой платформой, они одержали сокрушительную победу на первых парламентских выборах и с тех пор поддерживают ее. Контролируя политику на национальном, провинциальном и местном уровнях, националисты создали впечатляющую машину, основанную на семейных династиях, клиентелизме и коррупции. Когда президент Кесон попытался отойти от этой традиции со своим персоналистским популизмом, националисты исправились, бросив его и сплотившись вокруг Мануэля Рохаса. Вместе они обеспечат, чтобы традиционная власть на Филиппинах не подвергалась угрозе.§!\n"

 PHI_authoritarian_democrat_party: "PPS"
 PHI_authoritarian_democrat_party_long: "Partido Pambansang Sosyalista\n§LНациональная социалистическая партия - это недавнее событие в филиппинской политике. Это не что иное, как средство продвижения потенциального кандидата в президенты Эмилио Агинальдо, который заявляет, что это не партия, а \"движение\". Поддержку ей оказывают в основном пожилые ветераны войны за независимость и филиппино-американской войны, которые считают Агинальдо своим лидером. Таким образом, репутация PPS является синонимом репутации Агинальдо, который, тем не менее, является популярной фигурой среди простых людей.§!\n"

 PHI_paternal_autocrat_party: "ФП"
 PHI_paternal_autocrat_party_long: "Филиппинская полиция\n§LФилиппинская полиция была создана американцами, которым требовался местный вспомогательный персонал для поддержания правопорядка на островах во время захватнической войны. Основными задачами полиции были разгром последних мятежников и подавление восстания Моро; с тех пор она превратилась во что-то вроде национальной жандармерии, выполняющей функции правоохранительных органов и компонента национальной обороны наряду с молодой армией. Полиция печально известна среди простых людей своей жесткостью в подавлении потенциальных угроз государству, будь то протестующие крестьяне или религиозные движения.§!\n"

 PHI_national_populist_party: "PS"
 PHI_national_populist_party_long: "Partido Sakdalista\n§LПартия "Сакдалиста" была основана в 1933 году недовольным бывшим националистом Бениньо Рамосом. Рамос работал секретарем Сената и был близок к Кесону, но порвал с партией после того, как присоединился к забастовке. Затем он основал газету \"Сакдал\" (что в переводе с тагальского означает \"обвинять\"), которая стала крупнейшим националистическим изданием, беспощадно критикующим правительство за ошибки, как реальные, так и предполагаемые. Движение сакдалистов распространилось по всему Лусону, завоевав поддержку своим популизмом, крайним национализмом и антиамериканизмом.§!\n"

