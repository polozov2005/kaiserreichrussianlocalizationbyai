#####- Section 03: Characters - ########
########################################

###- Country Leaders -###

 PHI_crisanto_evangelista: "Крисанто Эванхелиста"
 PHI_crisanto_evangelista_leader_desc: "§YРодился:§! §L1 ноября, 1888, Мейкауаян, Булакан, Филиппины§!\n§YБиография:§! §LКрисанто Эванхелиста, выходец из крестьянской семьи, стал учеником печатника в быстро растущем городе Манила. Он вступил в один из первых профсоюзов страны, Союз филиппинских трудящихся, и со временем стал его генеральным секретарем. Хотя изначально Эванхелиста был националистом, он все больше находился под влиянием марксистских идей и присоединился к Рабочей Партии, где возглавил движение по преобразованию ее в подлинно революционную социалистическую партию. С тех пор Рабочая Партия подтолкнула Конгресс филиппинцев к синдикализму. Эванхелиста заслужил одобрение Третьего интернационала, который признает его главным лидером филиппинского синдикализма.§!"

 PHI_juan_feleo: "Хуан Фелео"
 PHI_juan_feleo_leader_desc: "§YРодился:§! §L 1 мая 1896, Санта-Роса, провинции Нуэва-Эсиха, Генерал-капитанство Филиппины§!\n§YБиография:§! §LСын малообеспеченного мелкого землевладельца, Хуан Фелео стал школьным учителем, но быстро нашел свое призвание в защите бедных арендаторов, которым угрожало выселение. В связи с появлением крестьянских организаций в центральной части Лусона Националистическая партия спонсировала создание Калипунанг Памбанса нг Магбубукид са Пилипинас (Национальной конфедерации крестьян Филиппин). Фелео стал вице-президентом КПМП и направил группу в более воинственное русло, противостояние политическому истеблишменту. Его успех и дурная слава, включая несколько тюремных заключений, обеспечили ему место в руководстве партии Обреро в качестве главы крестьянского отдела.§!"

 PHI_gregorio_aglipay: "Грегорио Аглипай"
 PHI_gregorio_aglipay_leader_desc: "§YРодился:§! §L5 мая, 1860, Батак, Северный Илокос, Генерал-капитанство Филиппины§!\n§YБиография:§! §LХотя большинство представителей филиппинского духовенства не поддержали восстание против испанской короны, отец Грегорио Аглипай был исключением. Перешедший на сторону революции, Аглипай стал капелланом временного правительства и был единственным священнослужителем, присутствовавшим на конгрессе в Малолосе, за что был отлучен от церкви архиепископом Манилы. После войны писательница Исабело де лос Рейес убедила Аглипая присоединиться к его движению за отколовшуюся националистическую церковь. Независимая церковь Филиппин была основана в 1902 году, и Грегорио Аглипай стал ее первым верховным епископом. Позже он сменил де лос Рейеса на посту лидера Республиканской прогрессивной партии.§!"

 PHI_claro_recto: "Кларо М. Ректо"
 PHI_claro_recto_leader_desc: "§YРодился:§! §L 8 февраля 1890, Тиаонг, Кесон Лусон, Генерал-капитанство Филиппины§!\n§YБиография:§! §LКларо Ректо происходил из образованной семьи, принадлежавшей к верхушке среднего класса, и был блестящим студентом, начавшим весьма успешную юридическую карьеру. Начав с должности юрисконсульта в Сенате, он победил на выборах в Палату представителей от второго округа Батангас. Несколько лет спустя Ректо стал лидером демократического меньшинства в Палате представителей, что дало ему возможность участвовать в миссии по обеспечению независимости Соединенных Штатов. Хотя Ректо часто пытался вернуться к юридической практике и преподаванию, его всегда тянуло обратно в мир политики. Он наиболее известен как основной автор Конституции Филиппин.§!"

 PHI_manuel_luis_quezon: "Мануэль Кесон"
 PHI_manuel_luis_quezon_leader_desc: "§YРодился:§! §L19 августа, 1878, Балер, Нуэва-Эсиха, Генерал-капитанство Филиппины§!\n§YБиография:§! §LИстория филиппинской политики времен американского правления может быть историей одного человека: Мануэля Кесона. Прервав изучение юриспруденции, чтобы вступить в республиканскую армию во время филиппино-американской войны, Кесон в возрасте 28 лет был избран губернатором своей родной провинции. В следующем году он был избран в Первый законодательный орган Филиппин и стал лидером парламентского большинства. Вместе со спикером Палаты Серхио Осменья он основал националистическую партию, которая с тех пор побеждала на всех выборах. У Кесона и Осмении были непростые отношения, и их чередующиеся вражда и примирение доминировали в политической жизни. Но Кесон одержал верх, и именно под его руководством была, наконец, достигнута установленная дата провозглашения независимости от Соединенных Штатов. Благодаря этому Кесон уверенно победил на выборах и стал первым президентом Филиппинского содружества.§!"

 PHI_manuel_roxas: "Мануэль Рохас"
 PHI_manuel_roxas_leader_desc: "§YРодился:§! §L1 января 1892, Капис, провинция Капис, Генерал-капитанство Филиппины§!\n§YБиография:§! §LВыходец из большой землевладельческой семьи \"асендадо\", Мануэль Рохас пошел по пути большинства молодых филиппинцев из высшего общества того времени и поступил в юридическую школу. Пройдя путь от губернатора Каписа до Палаты представителей, Рохас стал спикером Палаты представителей и выдвинулся в первые ряды националистического руководства. Вместе с Кесоном и Осменьей он лоббировал независимость от Соединенных Штатов в меняющемся процессе, когда националистические амбиции смешивались с политической целесообразностью и личным соперничеством. Тем не менее, Рохас сохранил свое место в тройке лидеров и стал министром финансов Кесона.§!"

 PHI_emilio_aguinaldo: "Эмилио Агинальдо"
 PHI_emilio_aguinaldo_leader_desc: "§YРодился:§! §L 22 марта 1869 года, Кавите, Генерал-капитанство Филиппины§!\n§YБиография:§! §LЭмилио Агинальдо родился в богатой семье; его отец служил губернатором в испанской администрации, и Агинальдо пошел по его стопам. Тем не менее, он вступил в революционное тайное общество "Катипунан" и стал лидером повстанцев Кавите. После нескольких побед над испанцами была провозглашена Первая Филиппинская республика, президентом которой стал Агинальдо. Однако контратака испанцев вынудила Агинальдо отправиться в изгнание, и он вернулся только во время испано-американской войны. Революционеры и американцы вскоре поссорились, и в ходе последовавшего конфликта силы Агинальдо потерпели поражение. Сдавшись американцам, Агинальдо ушел из политики, но продолжал активно участвовать в ветеранских организациях и стал живым символом революции.§!"

 PHI_paulino_santos: "Паулино Сантос"
 PHI_paulino_santos_leader_desc: "§YРодился:§! §L 22 июня 1890 года, Камилинг, Генерал-капитанство Филиппины§!\n§YБиография:§! §LКогда Паулино Сантосу исполнилось 18 лет, он поступил на службу в филиппинскую полицию; после четырех лет службы он поступил в школу офицеров полиции, которую окончил с речью на прощание. Лейтенант Сантос участвовал в двух кампаниях против индейцев Морос, где отличился своим лидерством и отвагой. Когда пришло время формировать настоящую армию Содружества, Сантос был одним из офицеров полиции, которых выбрали для перевода. За это он был произведен в бригадные генералы. Быстро продвигаясь по служебной лестнице, он также зарекомендовал себя как потрясающе способный администратор, и правительство рассматривало его кандидатуры и для участия в крупных гражданских проектах.§!"

 PHI_benigno_ramos: "Бениньо Рамос"
 PHI_benigno_ramos_leader_desc: "§YРодился:§! §L10 февраля 1892 года, Булакан, Булакан, Генерал-капитанство Филиппины§!\n§YБиография:§! §LКак и многие представители растущего образованного среднего класса, Бениньо Рамос работал учителем, прежде чем переехал в Манилу с целью поступить на государственную службу. Поначалу он преуспевал, дослужился до должности в аппарате Сената и даже завязал отношения с Кесоном. Но после того, как Рамос присоединился к забастовке учителей, Кесон потребовал его отставки, в результате чего Рамос с горечью покинул Националистическую партию. Он основал газету \"Сакдал\", которая яростно нападала на Кесона и политическую элиту. Популистский стиль Рамоса привлек к нему внимание, и в конце концов он основал движение \"Сакдалиста\".§!"

###- Second in Commands -###
 PHI_guillermo_capadocia: "Гильермо Кападосия"
 PHI_guillermo_capadocia_sic_desc: "§YРодился:§! §L1909 год, Восточный Негрос, Филиппины§!\n§YБиография:§! §LРодился в бедной рабочей семье, Кападосия работал шеф-поваром и официантом, прежде чем стать членом профсоюза в 1920-х годах. Несмотря на отсутствие формального образования, он известен как высокограмотный специалист и знаток социалистической литературы. Член Центрального комитета и генеральный секретарь Рабочей партии, он является чрезвычайно видным социалистом и профсоюзным организатором.§!"

 PHI_norberto_nabong: "Норберто Набонг"
 PHI_norberto_nabong_sic_desc: "§YРодился:§! §LГенерал-капитанство Филиппины§!\n§YБиография:§! §LМалоизвестный политик из Манилы, о нем мало что известно, кроме того, что он является членом Рабочей партии.§!"

 PHI_vicente_sotto: "Висенте Сотто"
 PHI_vicente_sotto_sic_desc: "§YРодился:§! §L18 апреля 1877 года, Себу, Генерал-капитанство Филиппины§!\n§YБиография:§! §LПолучив образование в университете Сан-Карлоса, в 1899 году он стал издавать "\Справедливость\", первую газету в Себу, издаваемую гражданином Филиппин, в которой он выступал за независимость. Подвергнутый цензуре со стороны американского губернатора, он неделю спустя выступил с изданием \"Эль Насьональ\", что привело к его тюремному заключению. Несмотря на это, он продолжал публиковаться даже после освобождения, также внеся значительный вклад в культуру Кебуано своими пьесами, одна из которых была посвящена \"Моей Родине, чтобы у вас была память о славной революции, которая избавила вас от порабощения. Я посвящаю вам эту скромную пьесу\".\n\nСотто впервые занялся политикой в 1902 году в качестве члена муниципального совета Себу. Позже он изучал юриспруденцию в юридическом колледже Манилы, в 1907 году сдал экзамены в коллегию адвокатов, а также победил на выборах мэра, несмотря на юридические трудности, связанные с похищением и изгнанием в Гонконг. Он вернулся на Филиппины в 1914 году и в 1922 году баллотировался в Палату представителей Филиппин. Член Демократической партии, он также является младшим братом сенатора Филемона Сотто, членом Филиппинской независимой церкви и соратником Грегорио Аглипая..§!"

 PHI_sergio_osmena: "Сергио Осменья"
 PHI_sergio_osmena_leader_desc: "§YРодился:§! §L9 сентября 1878, 18 апреля 1877 года, Себу, Генерал-капитанство Филиппины§!\n§YБиография:§! §LРодившийся внебрачным ребенком дона Антонио Сансона, известного китайского бизнесмена-метиса и землевладельца, он взял фамилию своей матери и был принят в богатый китайско-филиппинский клан Осменья. Во время учебы в колледже Сан-Хуан-де-Летран он познакомился с Мануэлем Кесоном, своим будущим союзником и соперником. Изучая юриспруденцию, он поднялся по служебной лестнице и в 1906 году был избран губернатором Себу. Год спустя он баллотировался в недавно созданную Ассамблею Филиппин и стал ее первым спикером. Он стал одним из основателей Националистической партии вместе с Кесоном, вступив в конфликт с американскими властями. Тем не менее, он был избран в Сенат и стал временным президентом. Пара разделилась из-за законопроекта о сокращении штатов Хэйр-Хоуз: Осмена выступила в поддержку законопроекта, в то время как Кесон отверг его из-за нескольких положений о военных базах. Это привело к расколу в Националистической партии, и на выборах 1934 года крыло Кесона одержало верх. В 1935 году два крыла примирились и баллотировались по одному списку.§!"

 PHI_elpidio_quirino: "Эльпидио Кирино"
 PHI_elpidio_quirino_sic_desc: "§YРодился:§! §L16 ноября 1890 года, Виган, Южный Илокос, Генерал-капитанство Филиппины§!\n§YБиография:§! §LРодившийся в тюрьме провинции Виган в семье китайских метисов по происхождению, Квирино практиковал как юрист до того, как был избран в Палату представителей Филиппин в 1922 году. Затем, в 1925 году, он был избран сенатором, а в 1932-1933 годах исполнял обязанности лидера большинства, поскольку внутрипартийная напряженность обострилась во время дебатов по законопроекту Хэйра-Хоуза, и Бенигно Акино-старший и Серхио Осмена отправились в Соединенные Штаты, чтобы лоббировать его принятие. Когда в 1935 году двухпалатный конгресс был упразднен, он потерял свое место, но, как говорят, стремился вернуться в Националистическую партию.§!"

 PHI_raymundo_melliza: "Раймундо Меллиза"
 PHI_raymundo_melliza_sic_desc: "§YРодился:§! §L15 марта 1854 года, Моло, Генерал-капитанство Филиппины§!\n§YБиография:§! §LОтучившись в университете Санто-Томас, Раймундо Меллиса в конце 1870-х годов продолжил образование в Испании. В 1880 году он вернулся на Филиппины, где работал судьей, прежде чем принять участие в Филиппинской революции. Некоторое время он был президентом недолговечного Федерального округа Висайас в Панае, затем выступал в качестве революционного генерала, а затем губернатора Илоило во время американской оккупации в 1904-1906 годах. Вскоре после этого он ушел из политики, но спустя десятилетия вернулся в нее, став напарником Эмилио Агинальдо на выборах 1935 года на Филиппинах. Несмотря на то, что его кандидатура на пост вице-президента не увенчалась успехом, он остается политически активным участником движения Агинальдо.§!"

 PHI_basilio_jose_valdes: "Базилио Вальдес"
 PHI_basilio_jose_valdes_sic_desc: "§YРодился:§! §L10 июня, 1892, Манила, Генерал-капитанство Филиппины§!\n§YБиография:§! §LОтец Вальдеса был врачом и бывшим одноклассником героя Филиппин Хосе Рисаля, но после смерти матери, когда ему было пять лет, его семья переезжала из города в город. Посещая школы в Испании, на Филиппинах и в Гонконге, он стал врачом. После недолгого пребывания в качестве студенческого лидера и лектора он принял участие в Вельткриге волонтером-медиком во французской армии.\n\nВернувшись домой после войны, он руководил клиникой в Маниле, прежде чем в 1922 году его попросили поступить на службу в филиппинскую полицию, чтобы перестроить ее медицинское обслуживание. В течение четырех лет он был главным хирургом, затем стал медицинским инспектором, а в 1934 году стал бригадным генералом и начальником полиции. В 1936 году он был назначен заместителем начальника штаба Филиппинской армии под командованием Паулино Сантоса.§!"

 PHI_celerino_tiongco: "Селерино Тионгко"
 PHI_celerino_tiongco_sic_desc: "§YРодился:§! §LГенерал-капитанство Филиппины§!\n§YБиография:§! §LГоворят, что Тионгко - относительно малоизвестная фигура из Санта-Розы, штат Лагуна. Пока Бениньо Рамос проводил в Соединенных Штатах кампанию против принятия закона о сокращении поголовья скота, Тионгко стал исполняющим обязанности руководителя газеты "Сакдал", продемонстрировав свою известность как лидера движения "Сакдалиста". Разочарование из-за неэффективного тура привело к преобразованию движения сакдалиста в более официальную партию, и Тионгко участвовал в организации нескольких региональных отделений и предвыборной кампании во время выборов 1934 года. Однако восстание 2 мая 1935 года нанесло серьезный удар по движению сакдалистов, вынудив его руководство уйти в подполье.§!"

###- Commanders -###

 #Non-Socialists
 PHI_vicente_lim: "Висенте Лим"
 PHI_vicente_lim_army_chief_desc: "§YРодился:§! §L24 февраля, 1888, Каламба, Генерал-капитанство Филиппины§!\n§YБиография:§! §LТретий из четырех детей, Висенте Лим китайского происхождения, его отец - чистокровный Сангли, а мать - месица де Сангли (китайская месица). Его родители дружили с семьей Хосе Рисаля, национального героя Филиппин. Когда Висенте было 14 лет, он собрал группу детей, которые должны были служить курьерами для войск генерала Мигеля Мальвара в Каламбе. После окончания филиппино-американской войны Висенте стал учителем, и благодаря его атлетизму и способностям в математике ему было предложено поступить в Военную академию Соединенных Штатов в Вест-Пойнте. Там он стал первым филиппинцем, поступившим в школу. Несмотря на серьезные расовые предрассудки, Висенте был единственным кадетом-иностранцем, окончившим курс в 1914 году. После окончания школы он получил назначение в филиппинские скауты, где в течение последних нескольких лет обучал офицеров филиппинской полиции. Благодаря своему опыту обучения в Соединенных Штатах, он остается одним из лучших.§!"

 PHI_carlos_p_romulo: "Карлос Ромуло"
 PHI_carlos_p_romulo_commander_desc: "§YРодился:§! §L14 января, 1898, Интрамурос, Манила, Генерал-капитанство Филиппины§!\n§YБиография:§! §LКарлос Ромуло был родом из Пангасинеса, родители которого воевали против Соединенных Штатов во время филиппино-американской войны. Затем его отец перешел на работу в правительство США на Филиппинах, пройдя путь от члена городского совета, мэра и, в конечном счете, губернатора провинции Тарлак. Карлос начал свое образование в центральной начальной школе Камилинг, а затем стал профессором английского языка в Филиппинском университете. Затем он получил должность секретаря председателя Сената Филиппин Мануэля Кесона. Увлекшись литературой, он стал издателем и редактором \"The Philippines Herald\" и стал одним из основателей организации \"Бойскауты Филиппин\".§!"

 PHI_ruperto_kangleon: "Руперто Канглеон"
 PHI_ruperto_kangleon_commander_desc: "§YРодился:§! §L27 марта 1890 года, Макрохон, Лейте, Генерал-капитанство Филиппины§!\n§YБиография:§! §LРуперто Канглеон учился до шестого класса в Лейте, а затем завершил начальное образование в Суригао, потому что он отказался подчиняться тому, что, по его мнению, было властным и деспотичным поведением школьных властей. Затем он отправился в Себу, где проявил себя как выдающийся спортсмен и был отправлен за границу в составе сборной Филиппин на Олимпийских играх 1912 года. После окончания университета он отправился в Манилу и поступил в Филиппинский университет, но его привлекла военная жизнь. Затем он поступил в Филиппинскую полицейскую школу, где стал выдающимся офицером, участвовавшим в кампаниях по умиротворению беззаконных элементов.§!"

 PHI_jesus_vargas: "Хесус Варгас"
 PHI_jesus_vargas_high_command_desc: "§YРодился:§! §L22 марта 1905 года, Манила, Островное правительство Филиппины§!\n§YБиография:§! §LХесус Миранда Варгас получил степень бакалавра наук в Филиппинской полицейской академии в 1929 году. Затем он отправился в Соединенные Штаты для обучения в школе полевой артиллерии, а затем стал адъютантом президента Филиппин и командующим офицером.§!"

 PHI_mateo_capinpin: "Матео Капинпин"
 PHI_mateo_capinpin_high_command_desc: "§YРодился:§! §L27 марта 1890 года, Макрохон, Лейте, Генерал-капитанство Филиппины§!\n§YБиография:§! §LМатео Капинпин получил начальное и среднее образование в средней школе Лагуны. После окончания школы он присоединился к филиппинским скаутам, где в возрасте 24 лет стал самым молодым первым сержантом. Он поднялся по служебной лестнице, получил офицерское звание и вскоре стал командиром 45-го пехотного полка. Дальнейшее обучение привело его в пехотную школу армии Соединенных Штатов в Форт-Беннинге, штат Джорджия, в 1920 году. В 1936 году Кэпинпин уволился из филиппинских скаутов, чтобы присоединиться к недавно сформированной филиппинской армии.§!"

 #Socialists
 PHI_luis_taruc: "Луис Тарук"
 PHI_luis_taruc_army_chief_desc: "§YРодился:§! §L 21 июня 1913, Сан Луис, Пампанга, Центральный Лусон, Филлипинская территория, США§!\n§YБиография:§! §LЛуис Тарук родился в бедной крестьянской семье. В возрасте восьми лет Луис посещал государственную школу в Сан-Мигеле, Булакан. В пятнадцать лет он поступил в среднюю школу в городе Тарлак. Затем он два года учился в университете Манилы, изучая медицину и юриспруденцию, но из-за высоких расходов не смог позволить себе учебу. Затем он вернулся в Батасан, где вместе со своим братом открыл ателье по пошиву одежды. В юности он был вдохновлен историями о катипунеро, которые боролись за независимость и свободолюбие против Испании, и вскоре некоторые люди в его деревне и провинции начали видеть в нем воплощение выдающегося лидера катипунцев Фелипе Сальвадора. Он также оказался под влиянием марксистского движения Педро Абада Ссантоса и присоединился к нему в качестве организатора Социалистической партии Филиппин. Уже будучи видным лидером боевиков, он был назначен главнокомандующим и председателем военного комитета революционного правительства.§!"

 PHI_casto_alejandrino: "Касто Алехандрино"
 PHI_casto_alejandrino_high_command_desc: "§YРодился:§! §L18 ноября 1911, Араят, Пампанга, Филлипинская территория, США§!\n§YБиография:§! §LВ семье Алехандрино был знаменитый революционный генерал и сенатор Филиппин Хосе Алехандрино. Благодаря земельному наследству в 68 акров в Арьяте, Алехандро проникся сочувствием к земледельцам, и поклялся освободить их от цепей. Активный представитель крестьянской группы \"Агуман дин Малданг Талапагобра\" (AMT, Лига бедных трудящихся) и Социалистической партии Филиппин, Алехандрино остается одним из ведущих профсоюзных организаторов на Филиппинах и занимает второе место в военном комитете революционного правительства.§!"

 PHI_vivencio_cuyugan: "Вивенсио Куюган"
 PHI_vivencio_cuyugan_high_command_desc: "§YРодился:§! §L13 января 1895 года, Сан-Фернандо, Пампага, Генерал-капитанство Филиппины§!\n§YБиография:§! §LВивенсио Куюган начал свою карьеру в Соединенных Штатах, где он учился и зарабатывал на жизнь профессиональным боксом. Вернувшись домой из Штатов, где он получил образование, в 1927 году он был назначен муниципальным вице-президентом Сан-Фернандо и избран первым мэром-социалистом на Филиппинах и первым мэром муниципалитета. Вместе с Педро Абадом Сантосом он стал одним из основателей Социалистической партии Филиппин. Он также помогал организовывать силы социалистического ополчения и командовать ими.§!"

 PHI_bernardo_poblete: "Бернардо Поблете"
 PHI_bernardo_poblete_commander_desc: "§YРодился:§! §L1896, Миналин, Пампанга, Генерал-капитанство Филиппины§!\n§YБиография:§! §LБернрадо Поблете принадлежал к низшему классу и в конечном итоге служил в филиппинских скаутах с 1907 по 1911 год, где он нашел работу в армии США. Вскоре после этого он вернулся в Пампангу и стал фермером. Поблете, вдохновленный Педро Абадом Сантосом, вступил в Агуман Дин Талапагобра (Лигу бедных трудящихся) и занялся деятельностью, связанной с АМТ и Социалистической партией. Его постоянное участие в этом деле способствовало его продвижению по служебной лестнице, несмотря на его вульгарное понимание социализма. С началом восстания Поблете основал Банальный полк и повел его в бой. Его жена и дети присоединились к нему и продолжают служить под его командованием, а его сын Томас является его доверенным лицом.§!"

 #Admirals
 PHI_enrique_jurado: "Энрике Л. Хурадо"
 PHI_enrique_jurado_high_command_desc: "§YРодился:§! §LJuly 15th, 1911, in Lucena Province, Territory of the Philippines, United States of America§!\n§YБиография:§! §LEnrique Jurado attended the United States Naval Academy in 1934. During his freshman year, he participated in soccer and then wrestling - earning letterman honours in his final three years. In the 1936 Olympics hosted in Ireland, he would compete in the freestyle bantamweight class. One of the Philippines' few naval officers, he possesses an interest in ordnance and torpedo boats.§!"

 PHI_pelagio_cruz: "Пелагио А. Крус"
 PHI_pelagio_cruz_high_command_desc: "§YРодился:§! §LJune 16th, 1912, in Baliuag, Bulacan Province, Territory of the Philippines, United States of America§!\n§YБиография:§! §LPelagio Cruz originally grew up in Barrio Pulong Gabat by the Candaba Swamps but he calls Baliuag his hometown. He graduated at the top of his class from the Philippine Constabulary Academy and was commissioned as a 3rd Lieutenant to the Infantry Howitzer Company at the Gigalangin Garrison by Manilla. With an interest in military aviation, Pelagio undertook military pilot training at the Army Air Force's Flying School at Zablan Field, where he has become a flight instructor.§!"

 PHI_jose_andrada: "Хосе Андрада"
 PHI_jose_andrada_navy_chief_desc: "§YРодился:§! §LFebruary 3rd, 1906, in Capiz Province, Territory of the Philippines, United States of America§!\n§YБиография:§! §LJosé Andrada began his career by taking a course in the University of the Philippines College of Engineering prior to studying in the United States Naval Academy in Annapolis, Maryland. After graduating in 1930, the fourth Filipino to do so at the time, Andrada (now promoted as Lieutenant) would be appointed as head of the Offshore Patrol by President Manuel Quezon. In his tenure thus far, Andrada has initiated a volunteer service programme attracting fellow Annapolis graduates to the new naval institution.§!"

 PHI_jose_francisco: "Хосе Франциско"
 PHI_jose_francisco_navy_chief_desc: "§YРодился:§! §Lin the Territory of the Philippines, United States of America§!\n§YБиография:§! §LJosé Francisco is a Philippine a naval officer, educated in Annapolis. Having recently returned from the United States, he has accepted a commission within the fledging Offshore Patrol.§!"

 PHI_ramon_alcaraz: "Рамон Алькарас"
 PHI_ramon_alcaraz_admiral_desc: "§YРодился:§! §LAugust 31st, 1915, in Quingua, Bulacan Province, Territory of the Philippines, United States of America§!\n§YБиография:§! §LThe oldest of two sons in a large family, Ramon Alcaraz entered the Philippine Constabulary Academy at Teachers Camp in Baguio where he graduated with a Bachelor of Science Degree. He then joined the newly formed Offshore Patrol Training School to begin a career as a naval officer.§!"

###- Political Advisors -###
 PHI_benigno_aquino: "Бениньо Акино"
 PHI_benigno_aquino_advisor_desc: "§YРодился:§! §L3 сентября 1894, Тарлак, провинция Тарлак, Генерал-капитанство Филиппины§!\n§YБиография:§! §LРодившийся в семье Сервильяно Акино, филиппинского революционного генерала, Бениньо Акино учился в университете Санто-Томас, где в 1914 году окончил адвокатуру. Впервые он был избран в Палату представителей Филиппин в 1919 году, где проработал до своего избрания в Сенат в 1928 году. Он участвовал в миссии президента Филиппин и рассматривался на пост министра сельского хозяйства и торговли.§!"

 PHI_jose_abad_santos: "Хосе Абад Сантос"
 PHI_jose_abad_santos_advisor_desc: "§YРодился:§! §L19 февраля 1886, Сан-Фернандо, провинция Пампанга, Генерал-капитанство Филиппины§!\n§YБиография:§! §LРодившись в богатой семье, Хосе Абад Сантос получил образование в Соединенных Штатах, сдав адвокатуру в 1911 году. В отличие от своего старшего брата Педро, который стал известным социалистом, он работал помощником адвоката в Министерстве юстиции, а также внес свой вклад в становление правовой системы Филиппин. После работы корпоративным юристом в государственном национальном банке Филиппин и железнодорожной компании Манилы он поднялся по служебной лестнице в Министерстве юстиции. Дальнейшая работа в качестве главного советника лидеров Конгресса, руководящая роль в образовательной миссии в Соединенных Штатах и еще четыре года на посту министра юстиции помогли ему укрепить свои позиции, прежде чем он был назначен в Верховный суд.§!"

 PHI_antonio_de_las_alas: "Антонио де лас Алас"
 PHI_antonio_de_las_alas_advisor_desc: "§YРодился:§! §L14 октября, 1898, Таал, Батанга, Генерал-капитанство Филиппины§!\n§YБиография:§! §LПолучив юридическое образование в Йельском университете, Антонио де лас Алас в 1922 году некоторое время исполнял обязанности министра внутренних дел, а затем занялся политикой в качестве представителя 1-го округа Батангаса. В 1933 году президент Кесон назначил его министром общественных работ и коммуникаций, и его кандидатура рассматривалась на пост министра финансов. У него хорошие связи с филиппинскими деловыми кругами, и он является заметной фигурой в экономических кругах.§!"

 PHI_vicente_madrigal: "Висенте Мадригал"
 PHI_vicente_madrigal_advisor_desc: "§YРодился:§! §L5 апреля 1880, Лигао, Генерал-капитанство Филиппины§!\n§YБиография:§! §LВинсенте Мадригал родился в бедной испанской семье, иммигрировавшей на Филиппины. Он мечтал о собственном судоходном флоте, чтобы делать бумажные кораблики в сезон муссонов. Его любимой историей было то, что его мать часто шутила, что на этих лодках он не увезет его слишком далеко, на что он отвечал, что однажды хотел бы отправиться с родителями на настоящем корабле в Испанию, исполняя последнее желание своего отца (бывшего солдата).Учась в одном классе с Мануэлем Кесоном и Серхио Осменьей, также дальними (и бедными) родственниками из богатых семей, в Маниле, он увидел, каким огромным богатством обладал его дед по материнской линии (который игнорировал свою семью), и поклялся однажды превзойти это состояние. К несчастью для него, его пароходная компания "Мадригал" не смогла добиться значительных прибылей до тех пор, пока не умерла его мать, хотя он смог пригласить свою сестру в круиз в Барселону. Мадригал воспользовался своими тесными связями с президентом Кесоном, чтобы дважды стать президентом Торговой палаты, а также приобрести нефтеперерабатывающий завод..§!"

 PHI_camilo_osias: "Камило Осиас"
 PHI_camilo_osias_advisor_desc: "§YРодился:§! §L28 марта 1889, Балаолан, Генерал-капитанство Филиппины§!\n§YБиография:§! §LОсиас был выбран государственным стипендиатом в Соединенных Штатах и учился в Чикагском университете, прежде чем продолжить образование в качестве преподавателя. В 1915 году он стал первым филиппинским школьным инспектором и последовательно занимал должности как в государственном, так и в частном образовании. Он пришел в политику в качестве сенатора в 1925 году, участвуя в Конституционном конвенте 1934 года. Он остается видным деятелем в образовательных кругах, несмотря на то, что его влияние продолжает расти.§!"

 PHI_jose_laurel: "Хосе Лаурель"
 PHI_jose_laurel_advisor_desc: "§YРодился:§! §L9 марта 1891, Танауан, Батанга, Генерал-капитанство Филиппины§!\n§YБиография:§! §LХосе П. Лаурель, родившийся в семье революционного чиновника китайского происхождения-метиса, в 1903 году поступил в колледж Сан-Хуан-де-Летран. Обвиненный в покушении на убийство после ссоры из-за женщины, он сумел добиться оправдательного приговора для себя, изучая юриспруденцию в Филиппинском университете. Будучи ученицей будущего судьи Джорджа А. Малкольма, Лорел поступила в несколько престижных учебных заведений в Соединенных Штатах и Соединенном Королевстве, включая докторантуру.\n\nЕго карьера в политике началась, когда он был студентом, работая в Бюро лесного хозяйства и различных юридических комитетах. Его карьера в Министерстве внутренних дел включала несколько должностей в качестве исполняющего обязанности секретаря, и в 1925 году он был избран в Сенат Филиппин. После того, как в 1931 году он проиграл свою кандидатуру на переизбрание Кларо Ректо, он ненадолго вернулся к частной практике, прежде чем стать делегатом Конституционного конвента 1934 года в качестве одного из \"Семи мудрецов\". В знак своего престижа он был назначен вместо Джорджа Малкольма в Верховный суд.§!"

 PHI_miguel_cuaderno: "Мигель Куадерно"
 PHI_miguel_cuaderno_advisor_desc: "§YРодился:§! §L12 декабря 1890, Манила, Генерал-капитанство Филиппины§!\n§YБиография:§! §LПосле получения диплома юриста в Филиппинской школе права он был принят в коллегию адвокатов в 1919 году. Он также изучал теорию центрального банка и денежно-кредитной политики в Соединенных Штатах и Соединенном Королевстве. Во время Конституционного съезда 1934 года он был одним из \"Семи мудрецов\", которые участвовали в разработке Конституции 1935 года и выступали за ее принятие в Соединенных Штатах. Позже он стал видным сотрудником Филиппинского национального банка и в настоящее время занимает новые экономические должности в государственных учреждениях.§!"

 PHI_jose_yulo: "Хосе Юло"
 PHI_jose_yulo_advisor_desc: "§YРодился:§! §L24 сентября 1894, Багрос, Западный Негрос, Генерал-капитанство Филиппины§!\n§YБиография:§! §LЮрист, получивший образование в Университете Филиппин, он в 1913 году в юном возрасте стал адвокатом, заняв третье место. Из-за своего возраста он не начинал практиковать еще два года, но как только он это сделал, он стал известным корпоративным юристом. Впоследствии, в 1935 году, президент Кесон назначил его министром юстиции.§!"

 PHI_pedro_abad_santos: "Педро Абад Сантос"
 PHI_pedro_abad_santos_advisor_desc: "§YРодился:§! §L31 января, 1876, Сан-Фернандо, провинция Пампанга, Генерал-капитанство Филиппины§!\n§YБиография:§! §LРодившись в большой и состоятельной семье, Педро Абад Сантос-и-Баско изучал медицину в университете Санто-Томас. Помимо прохождения медицинских осмотров, он также самостоятельно изучил юриспруденцию и стал адвокатом. Участвуя как в Филиппинской революции, так и в филиппино-американской войне, он избежал 25-летнего тюремного заключения, назначенного американцами, благодаря успешному лоббированию своей семьи. После непродолжительной юридической карьеры в 1916 году он стал членом Палаты представителей, а в 1922 году был членом дипломатической миссии Серхио Осмении в Соединенных Штатах. Он проиграл выборы губернатора Пампанги в 1926 году. Будучи другом Крисанто Эванхелисты, он изучал марксизм за границей, в Париже. Он участвовал в создании Рабочей партии, наставляя Луиса Тарука и других филиппинских социалистов. По иронии судьбы, его брат Хосе занимал пост министра юстиции в правительстве Кесона.§!"

 PHI_vicente_lava: "Висенте Лава"
 PHI_vicente_lava_advisor_desc: "§YРодился:§! §L24 декабря 1894, Булакан, Генерал-капитанство Филиппины§!\n§YБиография:§! §LРодившись вскоре после окончания испано-американской войны, Винсенте Лава вырос на быстро меняющихся Филиппинах. Изучая химию в Филиппинском университете, позже он поступил в Калифорнийский университет в Беркли. Он получил степень магистра и доктора наук в Колумбийском университете и в 1923 году вернулся на Филиппины, где работал химиком, надеясь продвигать местную промышленность Филиппин, разрабатывая методы извлечения топлива из кокосовых орехов. в 1929 году он вернулся в Соединенные Штаты по стипендии Грасселли для изучения витамина В в Оберлинском колледже. Он продолжил свою работу над кокосами в Нью-Йоркском университете, где познакомился с социалистическими идеалами, прежде чем вернуться на Филиппины в 1934 году. Будучи видным членом нескольких научных обществ и членом Партии Обреро, он также планирует получить патент на свои технологии производства кокосовых орехов и разработать экспериментальные установки для получения других видов экстрактов из местных растений на Филиппинах. Его младший брат Хосе также является членом РПФ.§!"

 PHI_jose_lava: "Хосе Лава"
 PHI_jose_lava_advisor_desc: "§YРодился:§! §L1912, Булакан, Филиппинская Территория, США§!\n§YБиография:§! §LРодившийся в семье богатых землевладельцев, Хосе Лава изучал бухгалтерский учет в Школе бизнеса Филиппинского университета, прежде чем стать юристом в юридическом колледже Филиппинского университета. Вскоре после окончания школы он присоединился к своему старшему брату Винсенте Лаве в качестве члена партии Обреро, быстро поднявшись по служебной лестнице в партийном секретариате вместе со своим младшим братом Хосе Лавой.§!"

 PHI_primitivo_arrogante: "Примитиво Арроганте"
 PHI_primitivo_arrogante_advisor_desc: "§YРодился:§! §LФилиппинская Территория, США§!\n§YБиография:§! §LВ 1935 году Примитиво Арроганте был выбран в качестве пенсионера (студента, расходы которого оплачивало правительство) для поездки на учебу в социалистическую Европу. Он был одним из нескольких известных профсоюзных деятелей-социалистов, которых Крисанто Эванхелиста быстро выбрал для этого проекта, финансируемого французским правительством при посредничестве американских социалистов. Во время мятежа он был назначен партией главой отдела образования и разведки, который занимался распространением пропаганды и координацией тайных операций партизан.§!"

###- High Command -###
 PHI_jesus_a_villamor: "Хесус Вилламор"
 PHI_jesus_a_villamor_air_chief_desc: "§YРодился:§! §L7 ноября 1914 года, Бангед, Территория Филиппины, США§!\n§YБиография:§! §LСын знаменитого помощника судьи Верховного суда Игнасио Вильямора, Хесус Вильямор получил привилегированное образование в колледже Де Ла Саль в Маниле, где изучал коммерцию, надеясь получить степень в области бизнеса. Одним из его товарищей по детским играм был Роберто Лим, сын бригадного генерала Висенте Лима. Также известный своим друзьям как "Джесс", в возрасте 14-15 лет он уже интересовался авиацией, хотя его семья хотела, чтобы он пошел по семейным стопам и стал адвокатом. После смерти отца мать смягчилась и посоветовала Вильямору заняться пилотированием. Несмотря на то, что он беспокоился из-за своего небольшого роста, ему удалось научиться управлять самолетом Cox-Klemin в Philippine Air Taxi Corp. После 20-часового самостоятельного полета Вильямор обратился в Бюро аэронавтики, но не смог пройти тест, и директор бюро капитан Рассел Моэн заявил, что Вильямор летал безрассудно. Пилот-инструктор, ветеран авиации и волонтер Берт Холл, однако, уговорил мать Вильямора отправить его в Далласскую авиационную школу в Техасе, где он получил лицензию транспортного пилота. По возвращении на Филиппины Вильямор стал одним из первых филиппинских офицеров в авиации.§!"

 PHI_basilio_fernando: "Базилио Фернандо"
 PHI_basilio_fernando_air_chief_desc: "§YРодился:§! §L14 июня, 1895, Сан-Матео, Ризаль, Генерал-капитанство Филиппин§!\n§YБиография:§! §LФернандо начал свою карьеру в гражданских правоохранительных органах в филиппинской полиции. Затем он стал одним из 33 молодых офицеров, отобранных для обучения на филиппинских летчиков в авиационной школе Кертисс в Паранаке. Затем он получил должность в Филиппинской воздушной службе, перевозившей пассажиров и авиапочту между Манилой, Илолио, Себу и Замбонагой. В 1935 году он стал первым командиром воздушного корпуса.§!"

 PHI_felix_pestana: "Феликс Пестана"
 PHI_felix_pestana_high_command_desc: "§YРодился:§! §LТерритория Филиппины, США§!\n§YБиография:§! §LФеликс Пестана, студент юридического факультета Филиппинского университета, пошел на риск, поступив в летную школу в связи с угрозой возникновения напряженности в Тихом океане. Через несколько месяцев, благодаря своим успехам в обучении, он был назначен инструктором на аэродроме Маникис в Кэмп-Тинио.§!"

###- Theorists -###
 PHI_philippine_military_academy: "ФВА"
 PHI_philippine_military_academy_theorist_desc: "§YДата основания:§! §L25 октября, 1898, Малолос, Булакан, Филиппинская территория, США§!\n§LМужество, честность и преданность. Академия, являющаяся преемницей Филиппинской полицейской академии, ведет свою историю с 1905 года, когда она была учреждена полицией. Там была создана академия для курсантов, чтобы подготовить их к службе в качестве офицеров филиппинской полиции в целях охраны территории Филиппин в отсутствие американских войск в Штатах. В связи с тем, что гражданская война в США вызвала колебания в американских делах как внутри страны, так и за рубежом, правительство Филиппин официально одобрило создание Филиппинской армии, и, таким образом, академия теперь служит для подготовки следующего поколения филиппинских офицеров. Созданная по образцу Военной академии Соединенных Штатов, песня альма-матер академии \"О,ФВА!\" звучит в залах для следующего поколения высших офицеров Тихоокеанской армии.§!"

###- Others -###
 PHI_josefina_guerrero: "Жозефина Герреро"

