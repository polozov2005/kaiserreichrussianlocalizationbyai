#- Section 1: Political Events -#

## Section 1a - Quezon's First Term (1936-1939)
 #Initial Black Monday Chain (000-019)
 philippines_political_events.001.t: "Черный понедельник докатился до Филиппин"
 philippines_political_events.001.d: "Филиппины - островная страна во многих отношениях. При американском правлении стране лишь постепенно позволялось отстаивать свои устремления, оставаясь при этом привязанной к метрополии в плане безопасности и экономической жизни. В то же время, продолжающееся правление Националистической партии способствовало созданию атмосферы стабильности. Экономика страны по-прежнему привязана к Соединенным Штатам, которые являются основным рынком как экспорта, так и импорта и в конечном счете определяют ее торговую политику.\n\nНовость о Черном Понедельнике не сразу всколыхнула Манилу, поскольку экономические связи страны с Германией довольно скромны. Но когда пришло известие о том, что экономический кризис распространился на Соединенные Штаты, стало ясно, что потрясения на Филиппинах будут лишь вопросом времени. С экономикой, основанной на экспорте товарных культур, таких как сахар, абака, кокосовые орехи и табак, Филиппины тесно связаны с США, и углубление экономической депрессии там, несомненно, приведет к падению доходов от торговли.\n\nПравительство Филиппин, как колониальной державы, мало что может сделать, чтобы справиться с кризисом. Тем не менее, оно не беспомощно. В условиях почти гарантированного падения доходов от экспорта есть способы компенсировать разницу. Сокращение расходов при одновременном повышении некоторых налогов поможет сохранить бюджет под контролем. В то же время необходимо принять меры для обеспечения того, чтобы простые люди не оказались в нищете и голодной смерти."
 philippines_political_events.001.a: "Мы готовы принять этот вызов."

 philippines_political_events.002.t: "Политическая сцена Филиппин"
 philippines_political_events.002.d: "Националистическая партия была доминирующей силой в филиппинской политике со времени первых выборов, состоявшихся в 1907 году. Ее первоначальная платформа была простой: немедленная независимость от Соединенных Штатов. Последующая история оказалась гораздо более сложной, поскольку лидеры националистов часто меняли позиции относительно условий и сроков провозглашения независимости в своих переговорах с американскими властями. Однако, наконец, сроки достижения полной независимости были определены, и националисты могут заявить, что они выполнили обещание, данное названием своей партии.\n\nХотя на бумаге Филиппины могут считаться либеральной демократией, их политическая культура оставляет желать лучшего. В стране, где большая часть населения отчаянно бедна и не имеет достаточного образования, в политике доминируют местные знаменитости, известные как \"касики\". Местные элиты формируют альянсы на основе взаимных интересов и семейных связей и оказывают свое влияние, оказывая покровительство. Политического успеха добиваются те, кто лучше всех умеет играть в этой коррумпированной системе, и никто не справляется с этим лучше, чем лидер националистов и нынешний президент Мануэль Кесон.\n\nЭто не значит, что филиппинская демократия - сплошная фикция. Мнение масс по-прежнему имеет значение, и когда их недовольство достигает точки кипения, это может пошатнуть государственный корабль. Успех Кесона обусловлен не только его отношениями с элитой страны, но и его способностью убедить простых филиппинцев в том, что он также является защитником интересов простого человека. Под расплывчатым лозунгом \"социальной справедливости\" Кесон преследовал квазипопулистские цели. Хотя критики Кесона могут справедливо сказать, что он больше говорил, чем делал, ограниченные социальные программы его президентства принесли Кесону значительную популярность."
 philippines_political_events.002.a: "Но может ли Кесон действительно править вечно?"

 philippines_political_events.003.t: "Возможные преемники"
 philippines_political_events.003.d: "Со своего балкона во дворце Малаканьянг Кесон мог бы по праву чувствовать себя в безопасности на вершине власти Филиппин. То есть до тех пор, пока события будут развиваться более или менее по той же траектории. Кесону рано или поздно предстоят новые выборы, и за три года многое может измениться.Однако на данный момент неясно, кто вообще будет выступать против Кесона. Наиболее вероятными кандидатами являются представители Демократической партии. Вечно находящаяся в оппозиции и изо всех сил пытающаяся позиционировать себя как нечто большее, чем \"не-националисты\", партия, возможно, сплотится вокруг идеалиста Кларо М. Ректо, который обещает изменить политику к лучшему. Но не менее вероятно, что может начаться повстанческая кампания. Старый революционер Эмилио Агинальдо все активнее критикует правительство. Он может использовать свою личную популярность и националистические убеждения, чтобы выдвинуть свою кандидатуру на пост президента.\n\nВ то же время синдикалистские настроения продолжают расти среди филиппинских рабочих и крестьян. Объединившись в радикальную партию Обреро, социалисты черпают вдохновение в Третьем интернационале и мечтают о революции. Вероятность того, что они когда-нибудь выиграют президентские выборы, невелика, но, если они будут достаточно сильны, они могут попытаться дестабилизировать ситуацию в Республике.\n\nВозможно, реальная угроза власти Кесона исходит не извне, а изнутри. Среди националистов нет недостатка в весьма амбициозных фигурах, которые могут заявлять о лояльности президенту, но с радостью ухватились бы за корону, если бы ее им предложили. Успех и популярность Кесона на данный момент подавили всех соперников, но если президент допустит ошибку, он может столкнуться с тем, что его собственная партия восстанет против него."
 philippines_political_events.003.a: "В политике все зависит от того, кого ты знаешь."
 philippines_political_events.003.b: "Будущее Филиппин зависит от народа."

 philippines_political_events.004.t: "Элиты выражают недовольство"
 philippines_political_events.004.d: "На Филиппинах происходят большие перемены. Заявления президента Кесона о \"социальной справедливости\" не были пустой риторикой, а действительно возвестили о приходе администрации, которая в большей степени сосредоточена на проведении конкретных реформ в массы. Кесону всегда нравилось пользоваться расположением народа, но его личная популярность никогда не была так высока. В репортажах из провинций рассказывается о том, что посещаемость крестьянских групп падает, поскольку арендаторы в ответ на призывы агитаторов заявляют, что президент все исправит.\nУдовлетворять людей - это хорошо, но это не обходится без затрат. Местные элиты чувствуют, что их влияние ослабевает, поскольку низшие классы обращаются к центральному правительству за безопасностью и вознаграждением. Это недовольство просачивается в столицу; конгрессмены-националисты тихо возмущаются популистским курсом Кесона. Хотя об этом тщательно скрывают от самого президента, поговаривают о готовящемся партийном восстании, которое бросит вызов Кесону на следующих выборах. Ходят также слухи, что иностранные державы следят за развитием событий, видя в претенденте на Кесона возможность расширить свое влияние."
 philippines_political_events.004.a: "Решения принимает президент!"
 philippines_political_events.004.b: "Не волнуйтесь, Кесон не забыл о \"больших\" людях."

 philippines_political_events.005.t: "Недовольство популистов"
 philippines_political_events.005.d: "Никто не ожидает слишком многого от демократии на Филиппинах, хорошо известных своей коррупцией и клиентелизмом. И все же удивительно, насколько циничной была администрация Кесона. Люди смеются над разговорами о \"социальной справедливости\", в то время как низшие классы по-прежнему прозябают в нищете. Тем временем щедрость правительства поступает в распоряжение местных элит, которые управляют политикой. Националистическая партия, обладающая большими размерами и не имеющая недостатка в амбициозных личностях, тем не менее, совершенно свободна от фракционности, поскольку партия преданно поддерживает Кесона.\nОднако, возможно, националисты слишком самоуверенны в своей позиции. Привыкнув управлять страной без эффективной оппозиции, они, возможно, упускают из виду ее рост прямо у себя под носом. Демократическая партия под руководством Кларо Ректо пытается использовать недовольство и добивается неожиданного успеха. В то же время старый революционер Эмилио Агинальдо, популист, рассматривает возможность баллотироваться в президенты на следующих выборах. Наибольшее беспокойство вызывает рост радикально-синдикалистской Рабочей Партии, которая мыслит не в категориях выборов, а в категориях Революций. Также ходят слухи, что иностранные державы следят за развитием событий, видя в претенденте на место Кесона возможность расширить свое влияние."
 philippines_political_events.005.a: "Наша позиция неприступна!"
 philippines_political_events.005.b: "Возможно, нам следует бросить массам кость."

 #American Civil War Chain (020-039)
 philippines_political_events.020.t: "Провозглашение Республики"
 philippines_political_events.020.d: "Это шокирующий поворот событий: с началом гражданской войны в Соединенных Штатах американская власть в западной части Тихого океана рухнула почти в одночасье. Связь с Вашингтоном прервана, и американский верховный комиссар в полной растерянности, не зная, что делать. Сегодня в 9 часов утра президент Кесон, поддержанный своим кабинетом министров и Конгрессом Филиппин, провозгласил Вторую Филиппинскую Республику перед ликующей толпой во дворце Малаканьянг.\n\nНесмотря на все это ликование, потребуется некоторое время, чтобы ощутить все прелести этого момента в полной мере. Политическое господство Кесона и Националистической партии было неразрывно связано с борьбой Филиппин за независимость, и теперь, когда Соединенные Штаты вышли из игры, ситуация изменилась. Наиболее значительным является недавнее изменение Конституции, в соответствии с которым Кесон провел поправку, сокращающую президентский срок с шести до четырех лет, но дающую ему возможность баллотироваться на второй срок. Это означает, что следующие президентские выборы состоятся уже в 1939 году; кто знает, кто будет главным противником Кесона.\n\nНа данный момент главная задача состоит в том, чтобы решить, что делать с оставшимися американцами. Хотя в последние несколько месяцев они массово покидают страну, многие остаются, в том числе американские солдаты, охраняющие свои военные базы, которые, как оказалось, полны очень ценного оборудования. Без поддержки правительства они зависят от любого решения, которое мы примем."
 philippines_political_events.020.a: "Эти винтовки и джипы - небольшая плата за оккупацию."
 philippines_political_events.020.b: "Заставьте их отступить, но оставьте им их собственность."

 #Fight for the Philippines Events (040-059)
 philippines_political_events.040.t: "Сражение за Филиппины"
 philippines_political_events.040.d.body: "Совсем недавно Филиппины были цитаделью Соединенных Штатов в западной части Тихого океана. Этот статус-кво внезапно исчез. С выводом американских военных кораблей и солдат после начала гражданской войны в США Филиппины провозгласили себя независимой республикой. Но она оказалась в центре вакуума власти. Соединенные Штаты были главным сдерживающим фактором для противостояния Японии и Германии в регионе, и с их уходом соперничество двух держав вспыхнуло с новой силой. Филиппины расположены между Токио и Сингапуром, и их лояльность уже готова к принятию. Дипломатические и экономические миссии уже отправились в Манилу, надеясь снискать расположение новой азиатской республики."
 philippines_political_events.040.d.PHI: "$philippines_political_events.040.d.body$\n\nДля филиппинских лидеров эта ситуация представляет как возможности, так и опасность. Объединение с державой дает преимущества, но также может вызвать враждебность ее оппонента. Некоторые склоняются к Японии с ее видением паназиатского сотрудничества и конца западного империализма. Другие указывают на Германию, которая по-прежнему является мировым гегемоном и хранительницей существующего порядка. Еще больше сторонников того, чтобы держаться на расстоянии как от Японии, так и от Германии, хотя в нынешних обстоятельствах это, вероятно, окажется непростой задачей. Многие тихо проклинают уход американцев и вопреки всему надеются, что США, какими бы колониальными хозяевами они ни были, когда-нибудь восстановят свою силу."
 philippines_political_events.040.d.GER: "$philippines_political_events.040.d.body$\n\nГермания никогда особо не интересовалась Филиппинами. Хотя в стране имеется солидное немецкое коммерческое представительство, Кайзеррайх был рад признать гегемонию Америки над островами. Однако новая ситуация требует пересмотра. Германия смогла сохранить свои позиции в регионе не только благодаря сотрудничеству с голландскими и британскими колониальными властями, но и установлению отношений с Сиамом и Бирмой. Теперь, когда на сцене появилось новое азиатское государство, оно также может быть заинтересовано в поддержке существующего порядка. Хотя бы по какой-то другой причине мы должны стремиться привлечь Манилу на свою сторону до того, как Токио сможет это сделать."
 philippines_political_events.040.d.JAP: "$philippines_political_events.040.d.body$\n\nФилиппины долгое время были занозой в боку Японии. Это был центр американского влияния и военной мощи в регионе, которые долгое время рассматривались Токио как потенциальная угроза растущему могуществу Японской империи. Однако с уходом американцев ситуация изменилась. Филиппины не связаны с Японией, но они уже являются крупным торговым партнером и принимают у себя значительное японское население. Союз с Филиппинами значительно расширил бы влияние Японии на юге. Хотя бы по той причине, что мы должны стремиться привлечь Манилу на нашу сторону раньше, чем это удастся Сингапуру."
 philippines_political_events.040.d.USA: "$philippines_political_events.040.d.body$\n\nВывод войск с Филиппин стал печальным днем для Соединенных Штатов. Несмотря на то, что отношения между двумя странами были отношениями хозяина и подданного, между многими американцами и филиппинцами также существовала подлинная дружба. Когда американские войска уходили, филиппинские лидеры часто (в частном порядке) говорили им, что Филиппины будут открыты для воссоединения с Соединенными Штатами, как только закончатся нынешние гражданские беспорядки. Теперь, когда худшие времена войны остались позади, появилась возможность восстановить свою власть в западной части Тихого океана. Но Германия и Япония соперничали за влияние в Маниле, пока нас не было; нам нужно наверстать упущенное, и как можно скорее."
 #These options are for the Philippines
 philippines_political_events.040.a: "Выбрать Германию."
 philippines_political_events.040.b: "Выбрать японцев."
 philippines_political_events.040.c: "Мы предпочтем нейтралитет."
 #These options are for the other tags
 philippines_political_events.040.e: "Укрепить немецкое консульство в Маниле."
 philippines_political_events.040.f: "Укрепить японское консульство в Маниле."
 philippines_political_events.040.g: "Cкажите им, что американцы возвращаются!"
 philippines_political_events.040.h: "Сейчас это не то, что стоит нашего внимания."
 philippines_political_events.040.i: "This isn't worth our attention right now."

 philippines_political_events.041.t: "The Americans Have Returned"
 philippines_political_events.041.d.intro: "The Second American Civil War was devastating, but it seems the adventuring American spirit (and their aggressive pursuit of their interests) remains intact. With their domestic rivals having been dealt with, President [FROM.GetLeader] has wasted little time reactivating American consulates around the world and stamping out any questions of his government's legitimacy. This apparently has extended to America's Pacific flank as [FROM.Capital.GetCapitalVictoryPointName] has poured considerable resources into catching up with their rivals and bringing us back into their sphere."
 philippines_political_events.041.d.socialistamerica: "$philippines_political_events.041.d.intro$\n\nThe new American ambassador speaks of peace and cooperation, but the grizzled [PHI.GetLeader] knows better. While many in the cabinet were hesitant to recognize the new socialist government, much less allow them to take over the old American embassy, the American hegemony can scarcely be ignored even if now painted red. They bring a formal denouncement of the old American imperialism as well as plenty of money, but the triumph of socialism in the heart of capitalism has galvanised many in the Philippine left to try following suit. There are already rumors of secret meetings around the American embassy as populist discourse grows more normalised."
 philippines_political_events.041.d.nonsocialistamerica: "$philippines_political_events.041.d.intro$\n\nThe new American ambassador speaks of peace and cooperation, but the grizzled [PHI.GetLeader] knows better. While many in the cabinet were relieved by the failure of the socialist revolution, as the new government takes over the old American embassy the return of the American hegemony can scarcely be ignored. They bring formal recognition of our independence as well as plenty of money, but in truth their real goal is to buy our politicians - and our submission. As we welcome their new diplomats, there are all smiles before cameras but there are already rumors of secret backroom meetings around the American embassy as they court the Philippine elite."
 philippines_political_events.041.a: "...but as equals right?"

 philippines_political_events.045.t: "Немцы покидают Манилу"
 philippines_political_events.045.d.GEA_invaded: "В результате неожиданного поворота событий посольство Германии в Маниле в последние несколько недель резко сократило свой штат. Сегодня посол, наконец, объяснил, почему: Германия и Филиппины находятся в состоянии войны. Какой бы ни была причина, надежды Германии заручиться поддержкой Филиппин дипломатическим путем полностью испарились - теперь Манилу можно будет взять только силой. Что касается Филиппин, то еще неизвестно, удастся ли достичь консенсуса по поводу того, что делать дальше."
 philippines_political_events.045.d.GEA_dead: "Неожиданный поворот событий привел к падению Сингапура, что фактически дискредитировало усилия Германии по оказанию влияния на Филиппины. Посольство Германии в Маниле уже приступило к сокращению своего персонала, отказавшись от надежд на обеспечение безопасности Филиппин дипломатическим путем. На данный момент, похоже, немцы борются за собственное выживание в Восточной Азии, и их с трудом созданная империя висит на волоске."
 philippines_political_events.045.a: "Они нас больше не побеспокоят."
 philippines_political_events.045.b: "Однажды мы вернемся..."

 philippines_political_events.046.t: "Японцы покидают Манилу"
 philippines_political_events.046.d.JAP_invaded: "В результате неожиданного поворота событий посольство Японии в Маниле в последние несколько недель резко сократило свой штат. Сегодня посол, наконец, объяснил, почему: Япония и Филиппины сейчас находятся в состоянии войны. Какой бы ни была причина, надежды Японии заручиться поддержкой Филиппин дипломатическим путем полностью испарились - теперь Манилу можно будет взять только силой. Что касается Филиппин, то еще неизвестно, удастся ли достичь консенсуса по поводу того, что делать дальше."
 philippines_political_events.046.d.JAP_dead: "В результате неожиданного поворота событий Тайвань пал, что фактически дискредитировало усилия Японии по оказанию влияния на Филиппины. Посольство Японии в Маниле уже начало сокращать свой персонал, отказавшись от надежд на обеспечение безопасности Филиппин дипломатическим путем. На данный момент, похоже, японцы борются за собственное выживание в Тихом океане, и их с трудом заработанная империя висит на волоске."
 philippines_political_events.046.a: "Они нас больше не побеспокоят."

 #Economic support events
 philippines_political_events.050.t: "Германия предлагает экономическую помощь"
 philippines_political_events.050.d: "Великая депрессия и падение Соединенных Штатов в состояние гражданской войны ввергли экономику Филиппин в штопор. В то время как молодая нация работает над тем, чтобы перестроить свою экономику, избавившись от колониальных корней, и преодолеть свой экономический кризис, местные немецкие власти в Восточной Азии протянули руку помощи. Они готовы субсидировать местных немцев и бизнесменов, связанных с Германией, в развитии предприятий на Филиппинах, способствуя экономическому росту и якобы создавая процветание для обеих сторон. Как эти доходы будут распределены - это другой вопрос. Скрытые нити, связанные с этим, вызывают беспокойство даже у самого доброжелательного к бизнесу государственного деятеля."
 philippines_political_events.050.a: "Мы примем любую доступную помощь!"
 philippines_political_events.050.b: "Нет уж, спасибо."

 philippines_political_events.051.t: "Предложение экономической помощи от Америки"
 philippines_political_events.051.d: "Великая депрессия и падение Соединенных Штатов в состояние гражданской войны привели экономику Филиппин в штопор. В то время как молодая нация работает над тем, чтобы перестроить свою экономику, отойти от колониальных корней и преодолеть экономический кризис, возрожденные американские интересы протянули руку помощи. Они готовы субсидировать местных американцев и связанных с Америкой бизнесменов в развитии предприятий на Филиппинах, способствуя экономическому росту и якобы создавая процветание для обеих сторон. Как эти доходы будут распределены, это другой вопрос - скрытые связи вызывают беспокойство даже у самого доброжелательного к бизнесу государственного деятеля."
 philippines_political_events.051.a: "Мы примем любую доступную помощь!"
 philippines_political_events.051.b: "Спасибо, нет."

 philippines_political_events.052.t: "Японское предложение экономической помощи"
 philippines_political_events.052.d: "Великая депрессия и падение Соединенных Штатов в состояние гражданской войны привели экономику Филиппин в штопор. В то время как молодая нация пытается перестроить свою экономику, избавившись от колониальных корней, и преодолеть свой экономический кризис, правительство Японии протянуло руку помощи. Они готовы субсидировать местных японцев и связанных с ними бизнесменов для развития предприятий на Филиппинах, способствуя экономическому росту и якобы создавая процветание для обеих сторон. Как эти доходы будут распределены - это другой вопрос. Скрытые связи вызывают беспокойство даже у самого доброжелательного к бизнесу государственного деятеля."
 philippines_political_events.052.a: "Мы примем любую доступную помощь!"
 philippines_political_events.052.b: "Нет уж, спасибо."

 philippines_political_events.053.t: "Филиппины приняли нашу экономическую помощь"
 philippines_political_events.053.d: "Великая депрессия и падение Соединенных Штатов в состояние гражданской войны ввергли экономику Филиппин в штопор. Поскольку молодая нация стремится перестроить свою экономику, избавившись от колониальных корней, и преодолеть свой экономический кризис, она с готовностью приняла наше предложение субсидировать коммерческие предприятия в их стране, углубляя экономические связи между нами и способствуя взаимному экономическому процветанию. Невысказанными остаются скрытые аспекты этой сделки: негласное влияние, которым мы теперь обладаем в Маниле."
 philippines_political_events.053.a: "Отличные новости!"

 philippines_political_events.054.t: "Филиппины отказались от нашей экономической помощи"
 philippines_political_events.054.d: "Великая депрессия и падение Соединенных Штатов в состояние гражданской войны ввергли экономику Филиппин в штопор. В то время как молодая нация стремится перестроить свою экономику, избавившись от колониальных корней, и преодолеть свой экономический кризис, она, тем не менее, отвергла наше предложение о субсидировании коммерческих предприятий в их стране, что способствовало бы взаимному экономическому процветанию и предоставило бы их народам поддержку, в которой они так отчаянно нуждаются. Хотя мы уверены, что в будущем филиппинский народ пожалеет о подозрительности и недальновидности своих лидеров, в настоящее время нам был нанесен серьезный удар."
 philippines_political_events.054.a: "Проклятье."

#Military aid events
 philippines_military_events.060.t: "Немцы предлагают военную помощь"
 philippines_military_events.060.d: "Филиппинская армия была официально создана в декабре 1935 года из ветеранов филиппинской полиции и филиппинских скаутов с американской помощью. Эти планы так и не были полностью реализованы до тех пор, пока Вторая гражданская война в США не загнала Филиппины в 'неизвестные воды', и многие задаются вопросом, справится ли новая Республика с задачей вооружения и подготовки сил, необходимых для защиты островов от иностранного вторжения.\n\nНемцы берут на себя роль американских инструкторов, обещая поставку оружия и опытных военных советников, необходимых для обучения целой дивизии по немецкому образцу. Эта дивизия впоследствии станет образцом для дальнейшего развития филиппинских вооруженных сил, что значительно усилит их влияние на развитие нашей армии. Учитывая обстоятельства, маловероятно, что мы можем просить о более выгодной сделке."
 philippines_military_events.060.a: "Мы любезно принимаем их предложение."
 philippines_military_events.060.b: "Мы должны отказаться от такого предложения."

 philippines_military_events.061.t: "Американцы предлагают военную помощь"
 philippines_military_events.061.d: "Филиппинская армия была официально создана в декабре 1935 года из ветеранов филиппинской полиции и филиппинских скаутов с американской помощью. Эти планы так и не были полностью реализованы до тех пор, пока Вторая гражданская война в США не загнала Филиппины в 'неизвестные воды', и многие задаются вопросом, справится ли новая Республика с задачей вооружения и подготовки сил, необходимых для защиты островов от иностранного вторжения.\n\nАмериканцы предложили завершить начатое, пообещав поставку оружия и опытных военных советников, необходимых для подготовки целого подразделения по американскому образцу. Это подразделение впоследствии стало бы образцом для дальнейшего развития филиппинских вооруженных сил, что значительно усилило бы их влияние на развитие нашей армии. Учитывая обстоятельства, маловероятно, что мы можем просить о более выгодной сделке."
 philippines_military_events.061.a: "Мы любезно принимаем их предложение."
 philippines_military_events.061.b: "МЫ должны отказаться от такого предложения"

 philippines_military_events.062.t: "Япония предлагает военную помощь"
 philippines_military_events.062.d: "Филиппинская армия была официально создана в декабре 1935 года из ветеранов филиппинской полиции и филиппинских скаутов с американской помощью. Эти планы так и не были полностью реализованы до тех пор, пока Вторая гражданская война в США не загнала Филиппины в 'неизвестные воды', и многие задаются вопросом, справится ли новая Республика с задачей вооружения и подготовки сил, необходимых для защиты островов от иностранного вторжения.\n\nЯпонцы предложили выступить в качестве покровителя этого молодого подразделения, пообещав поставку оружия и опытных военных советников, необходимых для подготовки целой дивизии по японскому образцу. Это подразделение стало бы образцом для дальнейшего развития филиппинских вооруженных сил, значительно увеличив их влияние на развитие нашей армии. Учитывая обстоятельства, вряд ли мы можем рассчитывать на более выгодную сделку."
 philippines_military_events.062.a: "Мы любезно принимаем их предложение."
 philippines_military_events.062.b: "Мы должны отказаться от такого предложения."

 philippines_military_events.063.t: "Филиппины соглашются принять нашу помощь"
 philippines_military_events.063.d: "Филиппинская армия была официально создана в декабре 1935 года из ветеранов филиппинской полиции и филиппинских скаутов с американской помощью. Эти планы так и не были полностью реализованы до тех пор, пока Вторая гражданская война в США не загнала Филиппины в 'неизвестные воды', и многие задаются вопросом, справится ли новая Республика с задачей вооружения и подготовки сил, необходимых для защиты островов от иностранного вторжения. Наше предложение предоставить их силам людей и материалы, необходимые для подготовки образцового подразделения по направлениям [ROOT.GetAdjective], было любезно принято. Если все пойдет по плану, уроки, извлеченные этим подразделением, будут использованы для дальнейшего развития филиппинских вооруженных сил, что значительно усилит наше влияние на развитие их армии и подготовит их в качестве союзников в будущем конфликте."
 philippines_military_events.063.a: "Все идет по плану."

 philippines_military_events.064.t: "Филиппины отвергают наше предложение о военной помощи"
 philippines_military_events.064.d: "Филиппинская армия была официально создана в декабре 1935 года из ветеранов филиппинской полиции и филиппинских скаутов с американской помощью. Эти планы так и не были полностью реализованы до тех пор, пока Вторая гражданская война в США не загнала Филиппины в 'неизвестные воды', и многие задаются вопросом, справится ли новая Республика с задачей вооружения и подготовки сил, необходимых для защиты островов от иностранного вторжения. Несмотря на это, правительство Филиппин упорно отказывается от нашего предложения предоставить их вооруженным силам людей и материалы, опасаясь нашего растущего влияния на их вооруженные силы. Это сделает их берега опасно уязвимыми для вторжения."
 philippines_military_events.064.a: "В конце концов они поймут какую ошибку они допустили"

 philippines_military_events.065.t: "Образцовая дивизия завершила подготовку"
 philippines_military_events.065.d: "Благодаря военным советникам и материалам [FROM.GetNameDef] было сформировано, оснащено и обучено образцовое подразделение. Построенное в соответствии с последними достижениями [FROM.GetAdjective]ой военной доктрины, это образцовое подразделение представляет собой вдохновляющее зрелище. Следующими шагами, конечно, будут другие подразделения нашей молодой армии, которые будут подражать этому дизайну, и мы отправим только что прошедших подготовку офицеров и сержантов из этого подразделения в другие подразделения, чтобы ввести их в курс дела. В целом, это была большая победа для [FROM.GetAdjective]о-филиппинского сотрудничества!"
 philippines_military_events.065.a: "Современное подразделение для современной войны!"
 philippines_military_events.065.b: "We don't need a new division, but the equipment will be useful."
 PHI_create_locked_division: "§YThis template will be locked and cannot be modified until $PHI_fight_for_the_philippines_decision_cat$ is over§!"

 #Neutrality Alignment (070-089)
 philippines_political_events.070.t: "Филиппины закрепляют свой нейтралитет"
 philippines_political_events.070.d: "В конце концов, Филиппинам удалось отразить попытки иностранных государств склонить их к вступлению в альянс. Как и у большинства вещей в международных отношениях, у этого есть и свои недостатки. Широкая общественность неохотно ввязывается в какие-либо иностранные военные авантюры, и Филиппины, скорее всего, попытаются спрятаться и сохранить нейтралитет в море войны. Конечно, мир практически всегда побеждает войну, и наш нейтралитет имеет дополнительное преимущество в виде политической гибкости - если война все-таки придет к нашим берегам или ситуация иным образом подтолкнет широкую общественность к войне, мы все равно можем в конечном итоге присоединиться к какой-либо фракции."
 philippines_political_events.070.a: "На данный момент мы оставляем наши возможности открытыми и надеемся на лучшее."

 philippines_political_events.071.t: "Филиппины закрепляют свой нейтралитет"
 philippines_political_events.071.d: "Добившись независимости от Соединенных Штатов, молодая Филиппинская Республика оказалась под давлением всех сторон, поскольку напряженность в Тихоокеанском регионе растет. Отвергнув предложения Токио и местных немецких властей в Сингапуре, президент [PHI.GetLeader], провозгласивший нейтралитет своей страны в любом вооруженном конфликте.\n\nСкорее всего, это будет не так-то просто. Манила расположена в стратегически важном месте, и, хотя они неявно пригрозили объединиться против любого захватчика, искушение заручиться их поддержкой силой остается сильным. Как эта нация, оказавшаяся в эпицентре противостояния двух держав, будет ориентироваться в этих бурных водах, еще предстоит выяснить."
 philippines_political_events.071.a: "Неужели они действительно думают, что смогут выжить самостоятельно?"

 philippines_political_events.072.t: "[FROM.Capital.GetCapitalVictoryPointName] принуждает нас к нейтралитету"
 philippines_political_events.072.d: "Хотя у [FROM.GetNameDef] было явное преимущество в политическом влиянии на Филиппины, и состояние двусторонних отношений развивалось в направлении укрепления альянса, [FROM.GetAdjective]ое правительство  решило вместо этого использовать это влияние, чтобы принудить нас к нейтралитету. Может быть, это потому, что они не хотели перенапрягаться, может быть, это из-за их собственной непостоянной политики, может быть (мы опасаемся), это потому, что у них негативные намерения в отношении нас в будущем. В любом случае, мы купили мир на данный момент."
 philippines_political_events.072.a: "Что ж,так тому и быть."

 #Reichspakt Alignment (090-109)
 philippines_political_events.090.t: "Наш триумф в Маниле"
 philippines_political_events.090.d: "Благодаря давлению и обещаниям Германии правительство Филиппин решило разделить с нами участь в грядущих конфликтах в Восточной Азии. Двусторонние отношения между нами развиваются в направлении создания альянса, при этом большую часть работы выполняют местные немецкие власти в Сингапуре. Кажется вполне логичным, что мы вместе противостоим японской угрозе, хотя, возможно, было бы лучше просто подтолкнуть их к формальному нейтралитету, лишив наших соперников возможности действовать."
 philippines_political_events.090.a: "Этими договорами мы привяжем их к себе."
 philippines_political_events.090.b: "Нейтральные Филиппины лучше отвечают нашим интересам."

 philippines_political_events.091.t: "Филиппины присоединяются к Рейхспакту"
 philippines_political_events.091.d: "Благодаря давлению и обещаниям Германии правительство Филиппин решило разделить с ними их участь в грядущих конфликтах в Восточной Азии. Двусторонние отношения между нами развиваются в направлении союза, и кажется вполне логичным, что мы вместе противостоим японской угрозе. Мы можем только надеяться, что их флота хватит, чтобы защитить как наши берега, так и их собственные."
 philippines_political_events.091.a: "Берлин - наш единственный шанс противостоять японской угрозе."

 philippines_political_events.092.t: "Филиппины присоединяются к Рейхспакту"
 philippines_political_events.092.d: "Добившись независимости от Соединенных Штатов, молодая Филиппинская Республика оказалась под давлением всех сторон, поскольку напряженность в Тихоокеанском регионе растет. Отвергнув предложения Токио, президент [PHI.GetLeader], только что одержавший победу на выборах, объявил о своих намерениях подписать ряд обязательных военных соглашений с Берлином.\n\nЭто соглашение о безопасности, заключенное при посредничестве местных немецких властей в Сингапуре, является огромной победой [GEA.GetLeader], обеспечивающей Остазиенфлотту жизненно важные базы в Тихом океане. Но принесет ли это мир на острова или вторжение, еще предстоит выяснить."
 philippines_political_events.092.a: "Прилив движется в сторону Сингапура."

 philippines_political_events.093.t: "Наш триумф в Маниле"
 philippines_political_events.093.d: "[ROOT.GetLeader] и его сотрудники получили сегодня телеграмму из Берлина, в которой выражается признательность за наши неустанные усилия по созданию основы для союза с Филиппинами. Хотя большая часть заслуг в этой великой дипломатической победе, вероятно, будет принадлежать министерству иностранных дел, мы можем гордиться тем, что справились с ситуацией, предоставив нашей стране значительное преимущество на театре военных действий благодаря нашей инициативе."
 philippines_political_events.093.a: "Мы выполним свой долг."

 #Sphere Alignment (110-129)
 philippines_political_events.110.t: "Наш триумф в Маниле"
 philippines_political_events.110.d: "Благодаря японскому давлению и обещаниям правительство Филиппин решило связать свою судьбу с нами в грядущих конфликтах в Восточной Азии. Двусторонние отношения между нами развиваются в направлении создания альянса, что стало результатом напряженного дипломатического лоббирования. Кажется вполне логичным, что мы вместе противостоим немецкой угрозе, хотя, возможно, было бы лучше просто подтолкнуть их к формальному нейтралитету, лишив наших соперников возможности действовать."
 philippines_political_events.110.a: "Этими договорами мы привяжем их к себе."
 philippines_political_events.110.b: "Нейтральные Филиппины лучше отвечают нашим интересам."

 philippines_political_events.111.t: "Филиппины присоединяются к сфере Со-Процветания"
 philippines_political_events.111.d: "Благодаря давлению и обещаниям Японии правительство Филиппин решило разделить с ними их участь в грядущих конфликтах в Восточной Азии. Двусторонние отношения между нами развиваются в направлении союза, и кажется вполне логичным, что мы вместе противостоим западной угрозе. Мы можем только надеяться, что их флота хватит, чтобы защитить как наши берега, так и их собственные, поскольку новая нация принимает опасный оборот."
 philippines_political_events.111.a: "Токио принесет мир и процветание в Азию."

 philippines_political_events.112.t: "Филиппины присоединяются к сфере Со-Процветания"
 philippines_political_events.112.d: "Добившись независимости от Соединенных Штатов, молодая Филиппинская Республика оказалась под давлением всех сторон, поскольку напряженность в Тихоокеанском регионе растет. Отвергнув предложения местных немецких властей в Сингапуре, президент [PHI.GetLeader], только что одержавший победу на выборах, объявил о своих намерениях подписать ряд обязательных военных соглашений с Токио.\n\nЭто соглашение о безопасности является огромной победой для [JAP.GetLeader], поскольку оно даст важные базы Японской Императорской Армии в Тихом океане недалеко от Ост-Индии. Но принесет ли это мир на острова или вторжение, еще предстоит выяснить."
 philippines_political_events.112.a: "Прилив несет в сторону Токио."

 #American Alignment (130-149)
 philippines_political_events.130.t: "Наш триумф в Маниле"
 philippines_political_events.130.d: "Благодаря американскому давлению и обещаниям правительство Филиппин решило связать свою судьбу с нами в грядущих конфликтах в Восточной Азии. Двусторонние отношения между нами развиваются в направлении создания альянса, что стало результатом напряженного дипломатического лоббирования. Кажется вполне логичным, что мы вместе противостоим иностранным угрозам, хотя, возможно, было бы лучше просто подтолкнуть их к формальному нейтралитету, лишив наших соперников возможности действовать."
 philippines_political_events.130.a: "Этими договорами мы привяжем их к себе."
 philippines_political_events.130.b: "Нейтральные Филиппины лучше отвечают нашим интересам."

 philippines_political_events.131.t: "Филиппины воссоединяются с Америкой"
 philippines_political_events.131.d: "К удивлению многих, американцам удалось не только своевременно прекратить гражданскую войну, но и восстановить свое влияние на Тихом океане. Филиппины, под давлением и, возможно, учитывая старые связи между ними, согласились подписать договор о взаимной обороне в надежде уравновесить угрозы со стороны Германии и Японии. В сегодняшнем заявлении Президент заявил о нашей готовности оставаться открытыми для возможного вступления в дальнейшие альянсы."
 philippines_political_events.131.a: "Вашингтон возвращается в качестве нашего защитника."

 philippines_political_events.132.t: "Филиппины воссоединяются с Америкой"
 philippines_political_events.132.d: "Добившись независимости от Соединенных Штатов, молодая Филиппинская Республика оказалась в центре внимания всех сторон на фоне роста напряженности в Тихоокеанском регионе. Мало кто мог подумать, что американцы, разделенные гражданской войной, когда-нибудь смогут вернуть свое влияние в Маниле. Тем не менее, в конце концов, президент [PHI.GetLeader] и правительство Филиппин решили выбрать того дьявола, которого они знают, согласившись на договоры о взаимной обороне и возобновив филиппино-американские отношения на высоком уровне.\n\nЭто соглашение о безопасности направлено на защиту островов от посягательств Германии и Японии, но возврата к статус-кво 1920-х годов не будет. Сможет ли этот договор действительно защитить Филиппины от войны, еще предстоит выяснить."
 philippines_political_events.132.a: "Новое партнерство? Или возвращение к рабству?"

 # 1939 Elections Events (150-199)
 philippines_political_events.150.t: "Начало избирательной кампании 1939 года"
 philippines_political_events.150.d: "Сегодня год президентских выборов; в сентябре избиратели Филиппин отправятся на избирательные участки, чтобы определить, кто станет следующим лидером страны. Уже один кандидат бросил свою шляпу на ринг: действующий президент Мануэль Кесон. Это неудивительно, поскольку несколько лет назад Кесон специально добивался принятия конституционной поправки, чтобы изменить свой единственный шестилетний срок на два возможных четырехлетних срока. Как лидер Националистической партии и самый влиятельный человек в стране, Кесон считает, что он все еще может добиться переизбрания.\n\nНа этих общенациональных выборах может быть только один реальный претендент, если оппозиция хочет иметь хоть какие-то шансы на успех. Демократическая партия, похоже, готова выдвинуть Кларо М. Ректо, если почувствует, что поле для маневра чисто. Однако Ректо может отступить, если выяснится, что старый революционер Эмилио Агинальдо выдвинет свою собственную кандидатуру, на что указывают многие из его доверенных лиц. Ходят даже слухи, что часть националистической партии, недовольная Кесоном, готова расколоть партию и поддержать Мануэля Рохаса, хотя из этого пока ничего не вышло. Синдикалистская Рабочая Партия уже объявила, что будет бойкотировать выборы, и планирует крупные антиправительственные демонстрации по мере приближения даты."
 philippines_political_events.150.a: "Порядок и опыт приведут к результату!"
 philippines_political_events.150.b: "Прогресс и братство воодушевляют массы!"
 philippines_political_events.150.c: "Как единая нация, мы защищим нашу независимость."

 philippines_political_events.151.t: "Приближаются выборы 1939 года"
 philippines_political_events.151.d: "Сегодня год президентских выборов; в сентябре избиратели Филиппин отправятся на избирательные участки, чтобы определить, кто станет следующим лидером страны. Уже один кандидат бросил свою шляпу на ринг: действующий президент Мануэль Кесон. И Германия, и Япония пытались наладить тесные отношения с президентом, но, хотя он не оказал им холодного приема, все еще неясно, в какую сторону он на самом деле склоняется. Возможно, именно по этой причине усилия Германии и Японии проникли глубже в саму Националистическую партию, где они могли бы найти более лояльного соратника.\n\nНа этих общенациональных выборах, которые пройдут впервые, может быть только один достойный соперник, если оппозиция хочет иметь хоть какие-то шансы на успех. Потенциальный кандидат от Демократической партии Кларо М. Ректо был замечен в компании немецких бизнесменов, которые, как полагают, финансируют партию. Тем временем потенциальный кандидат в президенты Эмилио Агинальдо только что вернулся из поездки в Японию; нет никаких сомнений в том, где находятся его друзья. Синдикалистская партия "Обреро" осудила влияние иностранных капиталистов на национальные выборы и планирует крупные антиправительственные демонстрации по мере приближения даты их проведения."
 philippines_political_events.151.a: "Мы должны активизировать наши усилия!"
 philippines_political_events.151.b: "Замётано."

## Section 1b - Quezon's Second Term (1939-1943+)
 philippines_political_events.200.t: "Кесон переизбран президентом"
 philippines_political_events.200.d: "Результаты таковы: Мануэль Кесон добился переизбрания на пост президента Филиппинской Республики. В течение нескольких месяцев люди гадали, закончится ли, наконец, десятилетняя череда непрерывных политических побед Кесона; возможно, они поступили глупо, поступив так. Кесон в очередной раз доказал, что является мастером политики, без особых усилий управляя общественным мнением и сохраняя при этом в неприкосновенности укоренившийся политический истеблишмент. Сегодня Кесон в очередной раз произнес свою присягу с балкона дворца Малаканьянг, а толпа внизу приветствовала его аплодисментами."
 philippines_political_events.200.a: "Поздравляем президента Кесона."

 philippines_political_events.201.t: "Президентские выборы 1943 года"
 philippines_political_events.201.d: "Этот день был неизбежен. Хотя Кесон, возможно, и хотел остаться президентом (и ходят слухи, что он обращался к членам Верховного суда с просьбой разрешить ему это), ограничения по срокам полномочий и ухудшающееся состояние здоровья в конце концов вынудили его уйти с поста президента. Вместо него выступил вице-президент Серхио как кандидат от националистов. Осмена долгое время находился в тени Кесона, в равной степени являясь его другом и соперником, но наконец-то ему представился шанс самому взять бразды правления в свои руки. Победа Осменьи, которая с легкостью привела к переизбранию, несмотря на явную оппозицию, закрепляет продолжающееся доминирование националистов в филиппинской политике."
 philippines_political_events.201.a: "Поздравляем президента Осменью."

## Section 1c - Roxas' Presidency (1939-1943+)
 philippines_political_events.300.t: "Рохас и элиты восстанавливают контроль"
 philippines_political_events.300.d: "Кесон сам вырыл себе могилу. Увлекшись своим представлением о себе как об отце народа, он забыл укрепить свои позиции в Националистической партии. В результате значительная часть партии взбунтовалась и выдвинула кандидатуру Мануэля Рохаса на пост президента. "Касики" перешли к активным действиям, используя все свое влияние, чтобы уговорить, подкупить и запугать людей голосовать против Кесона. Когда, наконец, были опубликованы результаты, стало ясно, что произошло невозможное: победил Рохас.\n\nСегодня Рохас произнес свою присягу с балкона дворца Малаканьянг под радостные возгласы толпы внизу. В своей первой речи в качестве президента он объявил о новом курсе, который исправит ошибки последних лет и вернет Националистическую партию к ее истокам как гаранта здорового и стабильного правительства. Он отметил, что с потенциальными революционерами и недовольными будут жестоко обращаться. В своем заключительном слове Рохас также выразил готовность Филиппин сотрудничать с зарубежными партнерами."
 philippines_political_events.300.a: "Поздравляем президента Рохаса."

## Section 1d - Aguinaldo's Presidency (1939-1943+)
 philippines_political_events.400.t: "Агинальдо прорывается через эстемблишмент"
 philippines_political_events.400.d: "Кесон сам вырыл себе могилу. Слишком довольный своим положением на вершине власти, он не обратил внимания на недовольство, которое бурлило внизу. В результате люди наконец-то выступили против националистов и собрались перед великим героем Эмилио Агинальдо. Касики пустились во все тяжкие, используя все свое влияние, чтобы попытаться уговорить, купить и запугать людей проголосовать за Кесона, но этого было недостаточно. Когда, наконец, были объявлены результаты, стало ясно, что произошло невозможное: Агинальдо победил.\п\П Сегодня Агинальдо произнес свою присягу с балкона дворца Малаканьянг, а внизу ликовала толпа. В своей первой речи в качестве президента он объявил о возрождении духа, который руководил страной в ее войне за независимость. Эпоха коррумпированной и сеющей раскол политики подходит к концу, поскольку весь народ сплачивается на благо нации. В своем заключительном слове Агинальдо объявил о своем намерении сотрудничества Филиппин с Японией \"ради великого будущего Азии\"."
 philippines_political_events.400.a: "Поздравляем президента Агинальдо."

## Section 1e - Recto's Presidency (1939-1943+)
 philippines_political_events.500.t: "Ректо сплачивает вокруг себя популистов"
 philippines_political_events.500.d: "Кесон сам вырыл себе могилу. Слишком довольный своим положением на вершине власти, он не обратил внимания на недовольство, которое бурлило внизу. В результате народ в конце концов выступил против националистов и поддержал кандидата от демократической партии Кларо Ректо. Касики вышли из себя, используя все свое влияние, чтобы попытаться уговорить, купить и запугать людей проголосовать за Кесона, но демократы опередили их. Когда наконец пришли результаты, стало ясно, что произошло невозможное: Ректо победил.\n\nСегодня Ректо принес присягу с балкона дворца Малаканьянг под радостные возгласы толпы, собравшейся внизу. В своей первой речи в качестве президента он поздравил Филиппины с первой в истории мирной передачей власти другой политической партии. Он подчеркнул намерение своей администрации бороться с коррупцией, защищать гражданские свободы и служить всем людям. В своем заключительном слове Ректо похвалил Германию как \"защитника прав и интересов малых народов\"."
 philippines_political_events.500.a: "Поздравляем президента Ректо."

## Section 1f - Evangelista's Presidency (1939-1943+)
 philippines_political_events.600.t: "Эванхелиста возглавил социалистическую революцию"
 philippines_political_events.600.d: "Выборы привели к краху Кесона. Хотя его популярность была на грани срыва, полностью потеряв доверие народа, он упорно пытался удержаться у власти. Поскольку оппозиция грызлась между собой и не могла сплотиться вокруг кандидата, казалось, что демократический процесс терпит неудачу. В Маниле выросла партия Обреро, провозгласившая, что капиталистическому режиму приходит конец. Когда на Лусоне вспыхнуло крестьянское восстание, полиция растворилась, и вскоре вооруженные крестьяне двинулись маршем на столицу. Поскольку город был парализован всеобщей забастовкой, трусливые политики бежали, а над Интрамуросом был поднят красный флаг.\n\nС балкона дворца Малаканьянг лидер Рабочей Партии Крисанто Эванхелиста провозгласил рождение Социалистической Республики Филиппины. Он объявил, что уже сформирован временный исполнительный орган во главе с ним самим, который приступит к созданию настоящего рабоче-крестьянского правительства. Внизу толпы филиппинских рабочих приветствовали его и пели Интернационал."
 philippines_political_events.600.a: "Пролетарии Филиппин, обьединяйтесь."

#- Section 2: Economic Events -#
#- Section 3: Military Events -#

 philippines_military_events.001.t: "Закупка армейского снаряжения"
 philippines_military_events.001.d: "Наша армия увеличивается в размерах, а наш традиционный защитник отступает, и наша система поставок стремится не отставать. Это непростая задача, особенно учитывая, что основная часть разработки и производства вооружений сосредоточена в руках великих держав, не доверяющих друг другу, которые угрожают вновь ввергнуть мир в войну. После обращения к различным поставщикам мы получили несколько многообещающих предложений о технической поддержке в модернизации наших вооруженных сил, будь то улучшение наших винтовок, артиллерии или нашей сети поддержки.\n\nКое-кто из высшего командования выдвинул гораздо более амбициозное предложение - обеспечить долгосрочную безопасность нашей страны путем развития обширной системы закупок, объединяющей множество поставщиков, центров технического обслуживания и ремонта, а иногда и создания новых с нуля. Это будет дорого, но зато это свобода."
 philippines_military_events.001.a: "Немецкое дополнительное снаряжение."
 philippines_military_events.001.b: "Японское пехотное снаряжение."
 philippines_military_events.001.c: "Американская артиллерия."
 philippines_military_events.001.e: "Мы создадим оружейную сеть с нуля!"

 philippines_military_events.020.t: "Импорт военно-морских проектов"
 philippines_military_events.020.d: "Для такого островного государства, как наше, контроль над водами вокруг нас жизненно важен для нашей безопасности. Вдвойне важно, когда великие державы, конкурирующие за влияние в регионе, имеют огромное преимущество перед армадами, с которыми мы никогда не сможем сравниться. Тем не менее, что-то лучше, чем ничего, и нашему начинающему флоту не помешала бы фора. Мы получили предложения от различных поставщиков, каждый из которых борется за влияние в нашем развивающемся флоте. В условиях быстро меняющихся условий ведения боевых действий на море внедрение новых технологий является ключом к тому, чтобы уравнять наши шансы.Более амбициозное предложение от ведущих деятелей нашего нового военно-морского флота и альянса верфей послужило основанием для крупных инвестиций нашего правительства в развитие отечественного военно-морского судостроения. Выделение этих средств потребовало бы не только денег, выделенных на импорт иностранных военно-морских образцов, но и потребовало бы от нас больших затрат из нашей казны."
 philippines_military_events.020.a: "Германские U-boat."
 philippines_military_events.020.b: "Японские торпедные бомбардировщики."
 philippines_military_events.020.c: "Американские эсминцы."
 philippines_military_events.020.e: "Мы должны создать свой собственный корабль!"

 philippines_military_events.040.t: "Изучение опыта воздушного боя"
 philippines_military_events.040.d: "Война в воздухе - это быстро развивающийся фронт в военном деле, и мы не можем позволить себе отставать в этом. Контроль над небом и использование его для того, чтобы обрушивать на силы вторжения град пуль, бомб и торпед, может означать разницу между победой и поражением. Иностранные поставщики щедро предложили нам помощь в разработке и внедрении некоторых из этих новых авиационных технологий, но мы также никогда не должны забывать об основах. Новое поколение филиппинских героев, которых иногда называют \"рыцарями\" новой эры, с нетерпением встает в очередь, чтобы занять их место, защищая мир над нами."
 philippines_military_events.040.a: "Немецкие пикирующие бомбардировщики."
 philippines_military_events.040.b: "Японские истребители Зеро."
 philippines_military_events.040.c: "Обучение у американских пилотов."
 philippines_military_events.040.e: "Мы сами найдем свою судьбы в небесах!"

