#####- Section 04: Ideas - #############
########################################

### Political Ideas ###
 PHI_political_spirit_1_idea: "Укоренившиеся касики"
 PHI_political_spirit_1_idea_desc: "Хотя на бумаге Филиппинское содружество является переходной либеральной демократией, на практике в его политической культуре доминируют местные знаменитости, известные как \"касики\". Местные элиты образуют сложную сеть альянсов, связанных семейными узами, взаимными интересами и политическим покровительством. Несмотря на повсеместную коррупцию и непрозрачность системы для малообразованных и обнищавших низших классов, настроения масс по-прежнему имеют влияние. Еще больше усложняет ситуацию наследие американского империализма и то, как оно взаимодействует с националистической партией."

 PHI_political_spirit_2_idea: "Укоренившиеся касики"
 PHI_political_spirit_2_idea_desc: "$PHI_political_spirit_1_idea_desc$\n\nМануэль Кесон был избран первым президентом Филиппинского содружества в 1935 году, воспользовавшись своими мощными связями с элитой и одновременно создав имидж защитника интересов простого народа. Он оказался весьма успешным в отстаивании своей воли лидера, чему, вероятно, будут подражать его преемники."

 PHI_political_spirit_3_idea: "Укоренившиеся касики"
 PHI_political_spirit_3_idea_desc: "$PHI_political_spirit_2_idea_desc$\n\nПо мере того как проходят годы и независимость Филиппин становится все более и более реальной, Филиппины, похоже, готовы наметить свой собственный путь."

 PHI_political_spirit_quezon_1_idea: "Президенство Кесона"
 PHI_political_spirit_quezon_1_idea_desc: "Успешная кампания по переизбранию Мануэля Кесона в 1939 году укрепила его имидж реформатора. Укрепляя свою власть на Филиппинах, он продолжает продвигать свои планы по модернизации Филиппин и подготовке их к предстоящему конфликту в Азии."

 PHI_political_spirit_quezon_2_idea: "Триумф Кесона"
 PHI_political_spirit_quezon_2_idea_desc: "$PHI_political_spirit_quezon_1_idea_desc$\n\nСтав победителем в борьбе за власть на Филиппинах и руководя страной во время войны на Тихом океане, Мануэль Кесон закрепил свое наследие в молодой республике, сформировав ее по своему образу и подобию."

 PHI_political_spirit_roxas_1_idea: "Президенство Рохаса"
 PHI_political_spirit_roxas_1_idea_desc: "Избрание Мануэля Рохаса президентом в 1939 году подтвердило авторитет националистической партии как защитника независимости Филиппин и продемонстрировало, что партия (и ее элиты) - это нечто большее, чем просто тогдашний президент Кесон. Национальный истеблишмент будет продолжать руководить Филиппинами и защищать их, поддерживая порядок и мир в стране."

 PHI_political_spirit_roxas_2_idea: "Триумф Рохаса"
 PHI_political_spirit_roxas_2_idea_desc: "$PHI_political_spirit_roxas_1_idea_desc$\n\nСтав победителем в борьбе за власть на Филиппинах и руководя страной во время войны на Тихом океане, Мануэль Рохас закрепил свое наследие в молодой республике, сформировав ее по своему образу и подобию."

 PHI_political_spirit_aguinaldo_1_idea: "Президенство Агинальдо"
 PHI_political_spirit_aguinaldo_1_idea_desc: "Наконец-то Эмилио Агинальдо вернулся к власти. Первый и единственный президент Первой Республики, похоже, что он стал вторым президентом Второй Республики Филиппин. Опираясь на силу масс, он теперь ведет нацию к новому будущему, высвобождая мощь народа для строительства Филиппин, которые должны были стать такими, какими они были в 1899 году.."

 PHI_political_spirit_aguinaldo_2_idea: "Триумф Агинальдо"
 PHI_political_spirit_aguinaldo_2_idea_desc: "$PHI_political_spirit_aguinaldo_1_idea_desc$\n\nСтав победителем в борьбе за власть на Филиппинах и руководя страной во время войны на Тихом океане, Эмилио Агинальдо закрепил свое наследие в молодой республике, сформировав ее по своему образу и подобию."

 PHI_political_spirit_evangelista_1_idea: "Президенство Эванхелиста"
 PHI_political_spirit_evangelista_1_idea_desc: "Несмотря ни на что, Крисанто Эванхелиста возглавил широкую коалицию социалистов, пролетариев, аграриев, партизан и других народных сил, направленную на свержение старой элиты и уничтожение старого порядка. Этот союз бывших угнетенных стремится построить новые Филиппины для всех народов и добиться независимости от империализма и капитализма.."

 PHI_political_spirit_evangelista_2_idea: "Триумф Эванхелиста"
 PHI_political_spirit_evangelista_2_idea_desc: "$PHI_political_spirit_evangelista_1_idea_desc$\n\nБудучи победителем в борьбе за власть на Филиппинах и руководя страной во время войны на Тихом океане, Крисанто Эванхелиста закрепил свое наследие в молодой республике, сформировав ее по своему образу и подобию."

 PHI_political_spirit_recto_1_idea: "Президенство Ректо"
 PHI_political_spirit_recto_1_idea_desc: "Мало кто думал, что это возможно, и еще меньше людей верили, что это может быть сделано так скоро, но Правящая партия привела политическую оппозицию к победе на выборах, впервые в истории Филиппин вытеснив националистов. Теперь он претендует на широкие полномочия по реформированию Филиппин и искоренению коррупции, и даже если он потерпит неудачу в своих более масштабных планах, ясно, что его победа пошатнет незыблемые основы старого порядка."

 PHI_political_spirit_recto_2_idea: "Триумф Ректо"
 PHI_political_spirit_recto_2_idea_desc: "$PHI_political_spirit_recto_1_idea_desc$\n\nСтав победителем в борьбе за власть на Филиппинах и руководя страной во время войны на Тихом океане, Кларо Ректо закрепил свое наследие в молодой республике, сформировав ее по своему образу и подобию."

 PHI_workers_rights_idea: "Права рабочих"
 PHI_workers_rights_idea_desc: "Президент Кесон пообещал поддерживать мир в молодом промышленном секторе Филиппин, способствуя росту и ограничивая трудовой радикализм, одновременно защищая права развивающегося рабочего класса."

 PHI_workers_revolution_idea: "Рабочая Революция"
 PHI_workers_revolution_idea_desc: "Рабочие на Филиппинах долгое время подвергались угнетению как со стороны иностранных империалистов, так и со стороны местных реакционеров. Новое правительство принесло на Филиппины настоящую демократию, возглавляемую пролетариатом."

 PHI_promote_welfare_idea: "Способствование повышению благосостояния"
 PHI_promote_welfare_idea_desc: "Главной обязанностью государства является забота о людях, и в наши дни это влечет за собой государственные программы по поддержке уязвимых групп населения и повышению уровня жизни людей."

 PHI_security_through_patronage_idea: "Безопасность через покровительство"
 PHI_security_through_patronage_idea_desc: "Филиппинское общество держится на неписаном, но общепризнанном социальном кодексе, который объединяет как элиту, так и массы. Эти две группы должны существовать в гармонии и служить друг другу, чтобы не расколоться изнутри и не быть разорванными на части силами извне."

 PHI_cooperation_of_labour_and_capital_idea: "Сотрудничество Труда и Капитала"
 PHI_cooperation_of_labour_and_capital_idea_desc: "Рабочий класс и капиталистическая элита всегда были в противоречии, что усугублялось капиталистической эксплуатацией и призывами социалистов к классовой войне. Но нация не может жить без них обоих, и их вражда друг с другом была бы фатальной для нашей молодой Республики. Вместо этого правительство должно научить эти две силы жить в гармонии и работать вместе на благо всех.."

 PHI_improve_working_class_housing_idea: "Жилье для рабочего класса"
 PHI_improve_working_class_housing_idea_desc: "Это позор, что бедные люди страны вынуждены терпеть унижение, живя в тесных, перенаселенных и негигиеничных трущобах и лачугах-лачугах в городах или сельской местности. Самый заметный и, возможно, самый действенный способ, которым наше правительство может продемонстрировать свою заботу о народе, - это взять на себя обязательства по строительству нового жилья для своих граждан."

 PHI_expel_subversives_idea: "Преследование подрывных элементов"
 PHI_expel_subversives_idea_desc: "Поддерживаемые из-за рубежа подрывные элементы стремятся проникнуть в нашу страну, используя наше свободное общество для того, чтобы вызвать хаос и посеять раздор. Будь то введение в заблуждение масс посредством радикальной агитации или ложных религий, эти зачинщики беспорядков не приносят стране никакой пользы. Они должны быть уничтожены ради улучшения положения и порядка в нашей стране."

 PHI_women_suffrage_idea: "Женское избирательное право"
 PHI_women_suffrage_idea_desc: "Конституция Филиппин, разработанная в 1935 году, не предоставляла женщинам права голоса, но она включала положение о проведении обязательного плебисцита по этому вопросу (в котором могли участвовать только женщины) в будущем. После проведения плебисцита, который был одобрен подавляющим большинством голосов, кажется, что на политической сцене Филиппин наступает новый день."

 PHI_womens_revolution_idea: "Матери нации"
 PHI_womens_revolution_idea_desc: "Освобождение женщин выходит за рамки простого избирательного права, но также должно включать в себя их свободу от деспотичных семейных структур и капиталистической экономической системы. Для реализации этого видения потребуется много лет, но, возможно, у него будет хорошее начало."

 PHI_mothers_of_the_nation_idea: "Революция для женщин"
 PHI_mothers_of_the_nation_idea_desc: "Филиппинская женщина всегда занимала почетное место в истории Филиппин. Она заставляла своих мужей, братьев и сыновей выполнять свой патриотический долг и даже сама брала в руки винтовку, когда они терпели неудачу или падали в борьбе с захватчиками. Мы никогда не забудем их вклад в развитие нашей государственности!"

 PHI_domestic_relations_and_probate_courts_idea: "Гражданские права для женщин"
 PHI_domestic_relations_and_probate_courts_idea_desc: "Проведение плебисцита, дающего женщинам право голоса, стало началом, но реальные перемены для среднестатистической филиппинской женщины должны также включать гражданскую защиту от домашнего насилия и сбалансированное правосудие в судах по делам о наследствах."

 PHI_model_of_filipino_womanhood_idea: "Филиппинская женственность"
 PHI_model_of_filipino_womanhood_idea_desc: "Настоящая филиппинская женщина - хранительница домашнего очага и, следовательно, будущего филиппинской нации. Благодаря своему образованию, добродетелям и обаянию они оказывают положительное влияние на своих мужей, братьев и сыновей."

 PHI_break_up_the_haciendas_idea: "Уничтожение асиенд"
 PHI_break_up_the_haciendas_idea_desc: "В то время как пролетариат в Европе страдает под гнетом своей буржуазии, на Филиппинах преимущественно сельское население страдает под гнетом землевладельческого дворянства. Победа крестьянских повстанцев привела к экспроприации гасиенд (крупных поместий) помещиков, что вызвало мощную волну перемен в сельской местности."

 JAP_PHI_friendship_idea: "Договор о японо-филиппинской дружбе"
 JAP_PHI_friendship_idea_desc: "В поисках паназиатского освобождения от влияния западных держав Филиппины связали свою судьбу со Сферой совместного процветания. Благодаря победе Североатлантического союза на Азиатско-Тихоокеанском театре военных действий молодая республика пожинает плоды."

 GER_PHI_friendship_idea: "Договор о германо-филиппинской дружбе"
 GER_PHI_friendship_idea_desc: "В поисках стабильности и защиты от японского империализма Филиппины связали свою судьбу с Рейхспактом. С победой североатлантического союза на Азиатско-Тихоокеанском театре военных действий молодая республика пожинает плоды."

 USA_PHI_friendship_idea: "Договор об американо-филиппинской дружбе"
 USA_PHI_friendship_idea_desc: "Надеясь избежать иностранного влияния и сохранить равновесие, Филиппины вернулись в лоно Америки. Одержав победу на Азиатско-Тихоокеанском театре военных действий, молодая республика пожинает плоды."

 CHI_PHI_friendship_idea: "Договор о китайско-филиппинской дружбе"
 CHI_PHI_friendship_idea_desc: "В поисках азиатского пути к социализму Филиппины связали свою судьбу с Китаем. Благодаря их победе на Азиатско-Тихоокеанском театре военных действий молодая республика пожинает плоды."

 INT_PHI_friendship_idea: "Договор о сотрудничестве Филиппин с Интернационалом"
 INT_PHI_friendship_idea_desc: "В поисках глобальных союзников в мировой революции Филиппины связали свою судьбу с Третьим интернационалом. Одержав победу на Азиатско-Тихоокеанском театре военных действий, молодая республика пожинает плоды."

 HND_PHI_friendship_idea: "Договор об индо-филиппинской дружбе"
 HND_PHI_friendship_idea_desc: "В поисках партнеров в борьбе за национальное освобождение Южной Азии Филиппины связали свою судьбу с индийцами. Одержав победу на Азиатско-Тихоокеанском театре военных действий, молодая республика пожинает плоды."

 PHI_standing_our_grand_idea: "Мы будем стоять на своем"
 PHI_standing_our_grand_idea_desc: "Несмотря на давление со всех сторон, Филиппины в конечном счете не попали в сферу влияния Германии, Японии или Америки, как ожидалось. Вместо этого нынешнее правительство Филиппин придерживается собственного мышления (возможно, с помощью других неприсоединившихся держав), пытаясь противостоять миру. Вопрос о том, насколько они независимы на самом деле, спорен, но их дух неоспорим."

 PHI_pacific_vanguard: "Расширение филиппинской дипломатии"
 PHI_pacific_vanguard_desc: "Хотя худшая часть конфликта в Азиатско-Тихоокеанском регионе позади, национальная безопасность Филиппин внутри страны не может быть гарантирована без готовности участвовать в нем за рубежом. Будь то дипломатия или помощь союзникам за рубежом, мы будем сдерживать внешние угрозы."

 PHI_pacific_socialist_vanguard: "Тихоокеанский авангард социализма"
 PHI_pacific_socialist_vanguard_desc: "Хотя мы добились мира и свободы на Филиппинах, мировая революция продолжается за рубежом. Если мы хотим, чтобы угнетенные народы по всему миру не были раздавлены один за другим, мы все должны быть готовы сотрудничать в борьбе против реакционных систем. Наши революционные армии должны быть готовы сражаться за освобождение всех народов Тихого океана."

 PHI_the_unconquerable_faith_idea: "Непобедимый Дух"
 PHI_the_unconquerable_faith_idea_desc: "Филиппинская революция началась как маленькая, но могучая мечта о свободе, справедливости и независимости для колонизированного народа. Несмотря на годы притеснений, которые приходили и уходили, эти идеалы восторжествовали. Теперь, когда мы пережили еще одно поколение потрясений, единственный способ защитить следующее поколение - это играть активную роль за рубежом."

 PHI_the_glorious_republic_idea: "Наша национальная слава"
 PHI_the_glorious_republic_idea_desc: "В жестоком мире, где сильные уничтожают слабых, важно демонстрировать не только силу, но и славу. Выживание Филиппин в этой жестокой войне за Тихий океан показало всему миру, что Филиппины - это нечто большее, чем просто американская колония, а настоящая жемчужина. И храбрый народ Филиппин будет продолжать бороться, чтобы защитить свою славу."

 PHI_our_seat_at_the_table_idea: "Наше место под Солнцем"
 PHI_our_seat_at_the_table_idea_desc: "Как недавно получившая независимость республика, оказавшаяся в нестабильном и жестоком мире без защитника, Филиппины боролись за то, чтобы к ним относились серьезно. Но благодаря нашей доблести и хитрости мы боролись за то, чтобы стать равными среди народов мира, когда в Тихоокеанский регион были вовлечены беспорядки. И мы будем продолжать демонстрировать нашу приверженность защите нашего дома, будь то здесь или за рубежом.."

### Economic Ideas ###
 PHI_black_monday_1: "Последствия Черного Понедельника"
 PHI_black_monday_1_desc: "Черный понедельник вверг нашу и без того ослабленную экономику в разрушительный штопор, дестабилизируя нашу страну и останавливая нашу слабеющую экономику. Чтобы оживить ее, придется принять неприятные решения, которые могут иметь ужасные последствия для будущего."

 PHI_black_monday_2: "Эхо Черного Понедельника"
 PHI_black_monday_2_desc: "Были предприняты первые меры реагирования на чрезвычайные ситуации, что привело к некоторому облегчению ситуации. В национальной экономике восстановился слабый импульс, даже несмотря на то, что большая часть страны все еще не оправилась от экономического кризиса."

 PHI_black_monday_3: "Стабилизация после Черного Понедельника"
 PHI_black_monday_3_desc: "После очередной серии мер по оказанию помощи ситуация в основном стабилизировалась. Экономический спад продолжает наносить ущерб наиболее уязвимым слоям населения, однако, несмотря на то, что немедленное восстановление экономики оказалось более быстрым, чем предполагалось ранее, благодаря относительной изоляции Филиппин от экономики Германии и сохраняющимся травмам от Великой депрессии."

 PHI_agriculture_1_idea: "Неравенство в сельской местности"
 PHI_agriculture_1_idea_desc: "Наследие испанского и американского колониализма привело к тому, что сельскохозяйственный сектор Филиппин оказался в крайне неравноправном положении. Товарные культуры являются жизненно важной частью экономики Филиппин, но американская экономическая политика сильно привязала Филиппины к США. Кратковременный всплеск модернизации сельского хозяйства и экономического роста в 1920-х годах резко прекратился из-за Великой депрессии.\n\nЗа последние несколько лет напряженность в отношениях между землевладельцами и их арендаторами неоднократно перерастала в насилие, что привело к появлению различных радикальных группировок как левого, так и правого толка. Власти США и стран Содружества пытались провести различные реформы для решения этих проблем, в частности, в 1933 году был принят Закон Кесона об аренде рисовых долей, однако эти усилия были сведены на нет из-за легко используемых лазеек, сопротивления дворянства, гнева крестьян и неспособности правительства угодить ни тем, ни другим.."

 PHI_industry_1_idea: "Застопорившаяся индустриализация"
 PHI_industry_1_idea_desc: "Ограниченный промышленный рост Филиппин серьезно замедлился из-за Великой депрессии, которая привела к замедлению развития городов. Иностранные инвестиции сократились, многие по-прежнему остаются без работы, а финансовые учреждения Филиппин продолжают испытывать трудности с тем, чтобы встать на ноги. Поскольку большая часть экономики сосредоточена в сельских секторах, было трудно проявить достаточную политическую волю, чтобы выбить филиппинскую промышленность из колеи."

 PHI_mining_1_idea: "Сниженна добыча ресурсов"
 PHI_mining_1_idea_desc: "Хотя основная часть филиппинского экспорта приходится на рис и другие сельскохозяйственные культуры, Филиппины также являются родиной крупных месторождений полезных ископаемых и других природных ресурсов. Однако из-за Великой депрессии, снизившей спрос на сырье в Соединенных Штатах, производительность горнодобывающей и лесозаготовительной промышленности снизилась. В условиях ограниченного объема ресурсов, выделяемых на развитие инфраструктуры, экономика Филиппин с трудом поспевает за своими конкурентами."

 PHI_form_the_nepa_idea: "Национальная ассоциация защиты экономики"
 PHI_form_the_nepa_idea_desc: "Национальная ассоциация защиты экономики - это альянс патриотически настроенных бизнесменов и гражданских лидеров, цель которого - побудить филиппинцев покупать товары отечественного производства в надежде преодолеть дефицит торгового баланса."

 PHI_agriculture_populist_plan: "Перераспределение земли"
 PHI_agriculture_populist_plan_desc: "$PHI_agriculture_1_idea_desc$\n\nВ новых усилиях по борьбе с социальным неравенством правительство Филиппин настаивает на жестком регулировании соглашений между арендаторами и домовладельцами, а в некоторых случаях даже на экспроприации. Оно также поощряет заселение земель, находящихся в государственной собственности, в надежде создать новый класс мелких фермеров-йоменов. Протекционистские тарифы были введены, чтобы помочь защитить филиппинских фермеров от недружественной иностранной конкуренции, поскольку Филиппины стремятся к самообеспечению."

 PHI_agriculture_elite_plan: "Модернизация сельского хозяйства"
 PHI_agriculture_elite_plan_desc: "$PHI_agriculture_1_idea_desc$\n\nВ новых усилиях по обеспечению процветания правительство Филиппин сосредоточилось на субсидировании усовершенствования методов и технологий ведения сельского хозяйства, что повышает эффективность и продуктивность для создания конкурентоспособной экспортной экономики. В долгосрочной перспективе это создаст столь необходимое богатство, которое позволит Филиппинам развиваться в позитивном направлении."

 PHI_industry_populist_plan: "Защита местной промышленности"
 PHI_industry_populist_plan_desc: "$PHI_industry_1_idea_desc$\n\nСтремясь раздуть искры отечественной промышленности, правительство Филиппин провело ряд протекционистских, а иногда и автаркических мер, направленных на замещение импорта промышленными товарами отечественного производства. С повышением тарифов, увеличением субсидий и призывами к патриотическим покупкам Филиппины надеются создать собственную производственную базу."

 PHI_industry_elite_plan: "Международные промышленные инвестиции"
 PHI_industry_elite_plan_desc: "$PHI_industry_1_idea_desc$\n\nСтремясь ускорить индустриализацию Филиппин, правительство Филиппин начало активно привлекать иностранные инвестиции, снижая торговые барьеры и нормативные акты, в том числе создавая специальные зоны, способствующие экономическому росту. Они стремятся еще больше связать экономику Филиппин с внешним миром, привнося современность и процветание."

 PHI_mining_populist_plan: "Определение приоритетов в добыче ресурсов"
 PHI_mining_populist_plan_desc: "$PHI_mining_1_idea_desc$\n\nПравительство Филиппин удвоило объемы добычи полезных ископаемых, открыв для эксплуатации новые шахты и новые леса в сельской местности. Это позволило увеличить занятость и помогло преодолеть дефицит торгового баланса, хотя переизбыток товаров, поступающих на рынок, сказался на прибылях компаний."

 PHI_mining_elite_plan: "Развитие национальной инфраструктуры"
 PHI_mining_elite_plan_desc: "$PHI_mining_1_idea_desc$\n\nПравительство Филиппин стремится привлечь безработных к ремонту и расширению внутренней инфраструктуры, что является дорогостоящим и порой сопряженным с эксплуатацией предприятием. Усовершенствование транспортных сетей сделало доставку филиппинских товаров в порты для экспорта более эффективной, что пошло на пользу существующим владельцам и предприятиям."

 PHI_foreign_industrial_support_idea: "Иностранная промышленная поддержка"
 PHI_foreign_industrial_support_idea_desc: "В своем стремлении восстановить свою экономику Филиппины решили заручиться поддержкой иностранных деловых кругов - во многих случаях при явной поддержке иностранных держав. Хотя это и оказалось полезным для экономического роста, многие задаются вопросом, оправдает ли себя потеря суверенитета в долгосрочной перспективе."

### Military Ideas ###
 PHI_army_1: "Новорожденная армия"
 PHI_army_intro: "После разгрома Филиппинской революционной армии во время филиппино-американской войны американские власти не разрешали создавать постоянную филиппинскую армию. Ближайшим эквивалентом была Филиппинская полиция, жандармерия, назначенная для подавления местных восстаний, и филиппинские следопыты, в состав которых входили филиппинцы, служившие в армии США. Вооруженные силы Филиппин были официально созданы только в соответствии с Законом о национальной обороне 1935 года, и армия Филиппин вместе с Советом национальной обороны, таким образом, появились на свет 21 декабря, всего через месяц после создания Содружества."
 PHI_army_1_desc: "$PHI_army_intro$\n\nПока Соединенные Штаты сохраняют свою власть на Филиппинах, острова находятся в безопасности от внешних угроз, но что произойдет, если они отвлекутся?"

 PHI_army_2: "Проблемы роста армии"
 PHI_army_2_desc: "$PHI_army_intro$\n\nРасширение состава новой филиппинской армии оказалось довольно сложной задачей, несмотря на амбициозные планы филиппинских и американских планировщиков. Армия и ее резервы увеличились в размерах, быстро опережая инфраструктуру, доступную для их подготовки. Пришлось строить новые тренировочные лагеря, а инструкторов набирать из полиции и скаутов."

 PHI_army_3a: "Армия по американскому образцу"
 PHI_army_3a_desc: "$PHI_army_intro$\n\nФилиппинская армия продолжает развиваться по тем же принципам, которые были определены американскими военными планировщиками в 1935 году. Под руководством многих офицеров, прошедших обучение в Вест-Пойнте, основной упор делается на военный профессионализм. Эта программа началась с реорганизации Филиппинской полиции в полицейское подразделение, создав ядро новой армии, на базе которого она будет работать.."

 PHI_army_4a: "Армия по американскому образцу"
 PHI_army_4a_desc: "$PHI_army_3a_desc$\n\nПосле подготовки основного состава филиппинской армии приоритетной задачей стало расширение программ подготовки пехоты и создание резервов, чтобы довести численность филиппинской армии до полной. Кроме того, в фортах близ Манилы началась артиллерийская и специализированная подготовка."

 PHI_army_5a: "Филиппинская армия"
 PHI_army_5a_desc: "$PHI_army_4a_desc$\n\nФилиппинская армия, наконец, достигла зрелости. Несмотря на то, что она была спланирована по американскому образцу, она была создана благодаря героическим усилиям филиппинцев. С современными, хорошо обученными и оснащенными подразделениями, окруженными элитным ядром, Филиппины способны вести боевые действия в любом конфликте, как вблизи, так и вдалеке. Теперь эта армия способна решать задачи, стоящие перед нацией, и проявлять инициативу в борьбе с любым врагом!"

 PHI_army_3b: "Наследие Революционной Армии"
 PHI_army_3b_desc: "$PHI_army_intro$\n\nНесколько отступая от планов, разработанных американцами в 1935 году, которые, по мнению правительства, продолжали рассматривать филиппинскую армию как вспомогательное подразделение, Филиппинский генеральный штаб приказал своей армии извлечь уроки из опыта старой Филиппинской революционной армии и ее длительного сопротивления в филиппино-американской войне. Вместо того, чтобы вести войну в стиле, неподходящем для наших условий и зависящем в конечном итоге от прибытия американского подкрепления, Филиппинская армия должна быть создана так, чтобы держаться самостоятельно. Чего бы это ни стоило."

 PHI_army_4b: "Наследие Революционной Армии"
 PHI_army_4b_desc: "$PHI_army_3b_desc$\n\nЧтобы облегчить этот процесс, было быстро подготовлено большое количество резервистов, а по всей стране созданы местные тайные ячейки. Были распределены новые заказы на вооружение и гранты на планы военного производства. Прежде всего, люди должны быть готовы помочь в защите страны."

 PHI_army_5b: "Филиппинская армия"
 PHI_army_5b_desc: "$PHI_army_4b_desc$\n\nФилиппины могут быть уязвимы для вторжения со всех сторон с моря, но филиппинская армия готова к выполнению этой задачи. Располагая рассредоточенными и полуавтономными подразделениями, способными использовать преимущества местной местности, они могут обнаружить захватчиков и окружить их еще до того, как будет создан плацдарм. И если случится невероятное, предусмотрены непредвиденные обстоятельства, чтобы отдельные подразделения могли продолжать сражаться. Воодушевленная Духом 1899 года, Филиппинская армия сохранит Филиппины свободными!"

 PHI_from_hooves_to_tires_idea: "От копыт до шин"
 PHI_from_hooves_to_tires_idea_desc: "Мобильность всегда была жизненно важна на войне, а массовое производство легковых и грузовых автомобилей открыло новые возможности как для снабжения наших войск, так и для переброски их в ключевые точки боя."

 PHI_domestic_rifle_production_idea: "Собственное производство оружия"
 PHI_domestic_rifle_production_idea_desc: "Филиппины традиционно закупают оружие за рубежом, однако в условиях, когда мир становится разделенным и враждебным, полагаться исключительно на импорт из-за рубежа больше невозможно. По крайней мере, мы должны работать над расширением наших возможностей по производству винтовок и боеприпасов у себя дома."

 PHI_prepare_for_the_storm_idea: "Подготовка к шторму"
 PHI_prepare_for_the_storm_idea_desc: "Учитывая, что война на Тихом океане, казалось бы, неизбежна, а филиппинские вооруженные силы крайне плохо подготовлены, правительство Филиппин предоставило Совету национальной обороны карт-бланш на приведение армии в боевую готовность. Некоторые говорят, что этой экстренной программы милитаризации слишком мало, слишком поздно, но, безусловно, что-то лучше, чем ничего."

 PHI_lessons_from_the_revolution_idea: "Уроки Революции"
 PHI_lessons_from_the_revolution_idea_desc: "Филиппинская революция и филиппино-американская война продемонстрировали, что, несмотря на постоянное превосходство наших противников в вооружении, упорство и отвага наших бойцов могут заставить наших врагов сесть за стол переговоров, а иногда даже свергнуть империи."

 PHI_air_industry_idea: "Растущая авиапромышленность"
 PHI_air_industry_idea_desc: "Авиапромышленность Филиппин невелика, но благодаря целеустремленности нашего народа и обширному государственному финансированию нам удалось приобрести постоянный поток самолетов для защиты нашего неба."

 PHI_guardians_of_our_precious_skies_idea: "Филиппинские ВВС"
 PHI_guardians_of_our_precious_skies_idea_desc: "Согласно указу Президента, военно-воздушные силы Филиппинской армии преобразованы в Военно-воздушные силы Филиппин. Отважным пилотам и неутомимому наземному персоналу этого нового и равноправного подразделения Вооруженных сил Филиппин поручено охранять небо над Филиппинами. Да здравствуют они!"

 PHI_expand_naval_production_idea: "Расширение военно-морского производства"
 PHI_expand_naval_production_idea_desc: "Филиппинам долгое время не хватало собственных военно-морских сил, ближайшим из которых является филиппинский береговой патруль, подразделение ВМС США. С обретением независимости мы больше не можем полагаться на других в защите наших берегов, особенно в качестве островного архипелага. Это будет дорого стоить, но флот должен быть быстро создан с нуля, если мы хотим защитить наши дома от вторжения."

 PHI_navy_spirit_idea: "Филиппинский флот"
 PHI_navy_spirit_idea_desc: "В знак признания того, как далеко мы продвинулись, президент официально объявил о переименовании Филиппинского военно-морского патруля в ВМС Филиппин. Наши отважные моряки готовы защищать берега и бороздить волны от всего, что угрожает нашему народу."

 PHI_foreign_military_mission: "Иностранные военные миссии"
 PHI_foreign_military_mission_desc: "Филиппинская армия - это совершенно новое учреждение, впервые созданное в декабре 1935 года и сформированное из небольшого числа ветеранов филиппинской полиции и филиппинских скаутов. Чтобы способствовать быстрому расширению, необходимому для защиты новой Республики, Филиппины приняли иностранных советников из более зрелых армий для оказания помощи в переходный период"

### Concerns and MIOs ###

 #Industrial Concerns
 PHI_national_development_company: "НКР"
 PHI_national_development_company_desc: "Национальная компания развития была основана в 1919 году как \"Compania de Fomento Nacional\", одна из первых компаний на Филиппинах. Это государственная корпорация, недавнее законодательство дало ей ее нынешнее название и расширенные полномочия по инвестированию государственного капитала, разработке природных ресурсов и созданию новых отраслей промышленности. В ее портфолио входят судоходство, авиация, производство стали, меди, электроники, текстиля, сахара и многое другое."

 PHI_philippine_national_bank: "PNB"
 PHI_philippine_national_bank_desc: "Национальный банк Филиппин был основан в 1916 году как государственный банк, занимающийся предоставлением финансовых займов в поддержку экономического развития. Обслуживая как промышленный, так и сельскохозяйственный секторы, в 1920-х годах он был на грани банкротства из-за хронической неэффективности управления, что привело к финансовому кризису 1921 года. Обладая особыми полномочиями по выпуску банкнот, PNB фактически являлся центральным банком и казначейством Филиппин. Несмотря на то, что в настоящее время создан настоящий центральный банк в качестве центрального банка Бангко нг Пилипинас, влияние Национального банка сохраняется."

 PHI_manila_railroad_company: "МЖК"
 PHI_manila_railroad_company_desc: "Основанная в 1887 году и зарегистрированная в 1892 году, Манильская железнодорожная компания имеет долгую и легендарную историю, которая началась еще до Филиппинской революции. Во время Первой мировой войны правительство острова приобрело британскую Манильскую железнодорожную компанию (1906) Лимитед и Манильскую железнодорожную компанию Нью-Джерси, реорганизовав их в единую государственную Манильскую железнодорожную компанию. Усилия по модернизации включали в себя модернизацию вагонов, электрификацию железных дорог, проектирование новых станций и даже производство собственных локомотивов."

 PHI_national_power_corporation: "НЭК"
 PHI_national_power_corporation_desc: "Национальная энергетическая корпорация была создана недавно, когда правительство национализировало гидроэнергетическую отрасль, включая всю электроэнергию, вырабатываемую из озер, ручьев и родников. Перед ней была поставлена задача электрификации Филиппин, особенно в сельской местности."

 PHI_benguet_consolidated_mining_company: "BCMC"
 PHI_benguet_consolidated_mining_company_desc: "Компания Benguet Consolidated Mining Company была основана тремя американскими солдатами в 1903 году, что сделало ее старейшей горнодобывающей компанией в стране. Компания управляет золотыми рудниками в одноименной провинции Бенгет, а также в провинции Северный Камаринес, также контролирует хромитовые и медные рудники в других частях страны. Также ведутся разговоры о расширении деятельности компании в сфере лесного хозяйства и грузоперевозок с помощью правительства."

 PHI_standard_oil: "Stanvac"
 PHI_standard_oil_desc: "В 1933 году "Сокони-Вакуум Ойл Компани" ("Стандард Ойл оф Нью-Йорк") и "Стандард Ойл оф Нью-Джерси" ("Джерси Стандард") объединили свои дальневосточные отделения в одно совместное предприятие, известное как "Стандард Вакуум ойл Компани". Работая в десятках стран, филиппинский филиал стремился выиграть выгодные государственные тендеры на строительство новых нефтеперерабатывающих заводов на Филиппинах."

 PHI_mitsui: "Mitsui"
 PHI_mitsui_desc: "Одна из первых и крупнейших дзайбацу в Японии, Mitsui начинала как торговая компания и банк, а затем превратилась в мегаконгломерат, имеющий интересы в промышленности, тяжелой химии, судостроении, производстве стали и угля, а также в страховании. Известно также, что компания готова сотрудничать с японскими имперскими интересами, особенно заинтересованными в развитии горнодобывающих и металлургических производств в Юго-Восточной Азии."

 #Material Designers
 PHI_squires_bingham_co: "Squires Bingham"
 PHI_squires_bingham_co_desc: "Squires Bingham & Co начинала как типография в Маниле, которая затем расширилась до продажи иностранных мотоциклов и спортивных товаров. Это включало продажу охотничьих досье и боеприпасов, и компания оказалась в выгодном положении (с помощью некоторых предприимчивых инвесторов), чтобы начать производство винтовок для удовлетворения внезапного спроса правительства на огнестрельное оружие отечественного производства."

 PHI_yutivo_corporation: "Yutivo"
 PHI_yutivo_corporation_desc: "Корпорация Yutivo была основана в 1887 году и собирала импортные автомобили различных международных производителей, включая Chevrolet, Opel, Holden, Vauxhall, Buick и Isuzu. Поддержка правительством местного автомобильного производства позволила Yutivo превратиться в оборонную подрядную фирму благодаря щедрым субсидиям."

 PHI_krupp_ost_asien_artillery: "Krupp"
 PHI_krupp_ost_asien_artillery_desc: "Krupp - немецкая компания, основанная как сталелитейный завод в 1811 году. Ее вхождение в мир военного производства началось с выпуска первых стальных пушек для русской, турецкой и прусской армий, а после объединения Германии ее масштабы резко возросли. В настоящее время компания известна производством кораблей, подводных лодок, танков и артиллерии. С ростом влияния Германии в Восточной Азии после Первой мировой войны Крупп последовал за империей на Тихий океан."

 PHI_ford_motor_company: "Ford"
 PHI_ford_motor_company_desc: "Ford Motor Company была основана в 1903 году их тезкой Генри Фордом. Модель T впервые была собрана на Филиппинах в 1913 году, а в 1929 году был основан Филипинский автомобильный завод Ford Car Works, Inc. в качестве местного филиала. Один из самых влиятельных американских автопроизводителей, его сфера деятельности простирается вплоть до Манилы."

 #Armour Designers
 PHI_government_arsenal: "Правительственный Арсенал"
 PHI_government_arsenal_desc: "Правительственный арсенал - это государственное оборонное учреждение, в задачи которого входит производство и закупка оружия для филиппинских вооруженных сил и полиции. Имея несколько других вариантов, правительство Филиппин вынуждено полагаться на арсенал, чтобы каким-то образом закупать более современное оборудование, такое как бронетехника и танки."

 PHI_krupp_ost_asien_tanks: "Krupp"
 PHI_krupp_ost_asien_tanks_desc: "$PHI_krupp_ost_asien_artillery_desc$"

 #Air Designers
 PHI_NIST: "NIST"
 PHI_NIST_desc: "Филиппинский институт науки и технологии (Philippine Institute of Science and Technology) - небольшая компания-разработчик самолетов, расположенная в Маниле, которая стремится стать пионером в производстве самолетов Philippine air с использованием местных материалов, таких как дерево. Несмотря на то, что она не добилась исключительного успеха, высокие государственные субсидии позволили ей оставаться одним из претендентов на военные контракты.."

 PHI_nakajima: "Nakajima"
 PHI_nakajima_desc: "Авиастроительная компания Nakajima Aircraft Company была основана в 1918 году военно-морским инженером Накадзимой Чикухэем, который годом позже выкупил свою долю в компании. Тесное и раннее сотрудничество с Императорской армией Японии позволило ей расширить свое присутствие на нескольких заводах по всей Японии и сделало ее ведущим разработчиком и производителем военной авиации."

 PHI_focke_wulf_ost_asien: "Focke Wulf"
 PHI_focke_wulf_ost_asien_desc: "Компания Focke Wulf была основана в 1923 году как Bremer Flugzeugbau AG, а затем быстро переименовалась в свое нынешнее название. Компания является крупным немецким аэрокосмическим разработчиком, производящим как гражданские, так и военные самолеты."

 #Naval Designers
 PHI_NSSC: "NSSC"
 PHI_NSSC_desc: "Национальная судостроительная и сталелитейная корпорация (National Shipyards and Steel Corporation) была создана указом Президента как государственный проект. Один из крупнейших сталелитейных заводов на Филиппинах, работающий при поддержке правительства, тем не менее, вызывает сомнения, что он действительно справляется с задачей производства судов для флота."

 PHI_electric_boat: "Electric Boat"
 PHI_electric_boat_desc: "Айзек Райс основал компанию Electric Boat Company в 1899 году, специализирующуюся на строительстве подводных лодок. Годом позже USS Holland стала первой подводной лодкой, построенной для ВМС США. Было разработано и произведено несколько последующих моделей, и компания Electric Boat остается одним из двух крупнейших производителей подводных лодок в США."

 PHI_sasebo_naval_arsenal: "Sasebo"
 PHI_sasebo_naval_arsenal_desc: "Военно-морской арсенал Сасебо - одна из четырех основных военно-морских верфей, принадлежащих Императорскому флоту Японии. Основанный в 1886 году как военно-морская база, он вскоре был расширен за счет ремонтной базы, сухого дока, а затем и верфи. Во время Великой отечественной войны производственные мощности компании были модернизированы и расширены, и в настоящее время она является ведущим судостроителем для IJN."

