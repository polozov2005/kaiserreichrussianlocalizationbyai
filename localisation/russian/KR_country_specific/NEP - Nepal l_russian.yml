 NEP_follow_the_calcutta_line: "Следовать линии [HND.Capital.GetCapitalVictoryPointName]"
 NEP_follow_the_calcutta_line_desc: "Как доиндустриальная нация без реального собственного социалистического движения, Трудовая партия Сватантра действует не столько как самостоятельная сила, сколько просто как местная рука правительства в [HND.Capital.GetCapitalVictoryPointName]. С этой целью, учитывая недавние идеологические сдвиги в Индии, было бы разумно убедиться, что мы полностью согласованы с нынешним руководством Республики."

 NEP_the_darjeeling_conspiracy_category: "[NEP_loc_conspiracy_name]"
 NEP_the_darjeeling_conspiracy_category_desc: "[NEP_loc_conspiracy_desc]"
 NEP_the_darjeeling_conspiracy_category_NEP: "Дарджилингский заговор"
 NEP_the_darjeeling_conspiracy_category_desc_NEP: "Революция назревает в Непале, антирановская оппозиция объединилась в «Мукти Сена» («Армия Освобождения»), действующую при значительной поддержке [HND.GetNameDef] в Калькутте. С помощью [RAJ.GetNameDef] премьер-министр Джуддха Шамшер Рана надеется сокрушить этих повстанцев и полностью объединиться с Доминионом, чтобы отомстить Республике за их проступки.\n\nТрудно сказать, что может произойти, когда повстанцы наконец сделают свой ход, но если одна из сторон добьется успеха, Непал окажется втянутым в сферу своего благодетеля, но если ни одна из сторон не сможет добиться успеха, у Короля может появиться возможность восстановить порядок и сохранить национальный нейтралитет.$NEP_the_darjeeling_conspiracy_category_desc_info$"
 NEP_the_darjeeling_conspiracy_category_HND: "Революция в Непале"
 NEP_the_darjeeling_conspiracy_category_desc_HND: "Теперь, когда подготовка к операции «Гром» идет полным ходом, наша поддержка антирановской оппозиции в Непале предоставляет нам прекрасную возможность вырвать одно из немногих государств, все еще дружественных оккупантам в Лахоре, до начала вторжения. Мы должны убедиться, что когда Мукти Сена наконец выступит против Рана, у них будет достаточно союзников, оружия и подготовки для успеха. Как только Непал будет освобожден, остальная часть субконтинента наверняка быстро последует за ним.$NEP_the_darjeeling_conspiracy_category_desc_info$"
 NEP_the_darjeeling_conspiracy_category_RAJ: "Наши интересы в Непале"
 NEP_the_darjeeling_conspiracy_category_desc_RAJ: "Бандиты, оккупирующие большую часть нашей страны, явно не довольствуются разрушением Индии, теперь они хотят принести хаос и анархию и в Непал. Наш союзник в Непале, достопочтенный премьер-министр Джуддха Шамшер Рана, твердо стоит против этих повстанцев, но без нашей помощи он, скорее всего, окажется в могиле. Мы не можем этого допустить, и мы должны сокрушить этих повстанцев, и, надеюсь, Непал вернет долг, когда Калькутта неизбежно попытается напасть на нас.$NEP_the_darjeeling_conspiracy_category_desc_info$"
 NEP_the_darjeeling_conspiracy_category_desc_info: "\n\n[HND.GetFlag] Сила повстанцев, поддерживаемых Бхаратией: [?NEP.NEP_conspiracy_influence_var_@HND|Y0]\n[RAJ.GetFlag] Сила правительства, поддерживаемого Доминионом: [?NEP.NEP_conspiracy_influence_var_@RAJ|Y0]\nЕсли у одной стороны есть §Gна 25 или более очков больше, чем у другой§!, Непал присоединится к ним после завершения миссии, в противном случае он, скорее всего, останется нейтральным.\n\nПри текущих уровнях влияния вероятно, что:\n[NEP_conspiracy_winning_check]"

 NEP_conspiracy_mission: "Дарджилингский заговор"
 NEP_conspiracy_mission_desc: "Как только они соберут достаточно сил, Мукти Сена сделают свой ход против династии Рана. Так или иначе, будущее Непала скоро будет решено."
 NEP_conspiracy_HND_winning_check: "§l[HND.GetFlag] Повстанцы успешно свергнут Рана.§!"
 NEP_conspiracy_RAJ_winning_check: "§P[RAJ.GetFlag] Премьер-министр победит повстанцев.§!"
 NEP_conspiracy_NEP_winning_check: "§g[NEP.GetFlag] Армия может вмешаться, чтобы предотвратить анархию.§!"

 NEP_weaken_HND_influence_decision: "[NEP_loc_weaken_HND_influence_name]"
 NEP_weaken_HND_influence_rebels_name: "Противодействовать доминированию Республики"
 NEP_weaken_HND_influence_ranas_name: "Выступить против повстанцев"
 NEP_weaken_HND_influence_decision_desc: "[NEP_loc_weaken_HND_influence_desc]"
 NEP_weaken_HND_influence_rebels_desc: "Хотя мы зависим от поддержки Калькутты против Рана, если мы позволим их влиянию стать слишком сильным, мы, скорее всего, станем не более чем марионеткой Бхаратии. Мы должны подчеркивать нашу независимость, чтобы предотвратить такой исход."
 NEP_weaken_HND_influence_ranas_desc: "Повстанцам нельзя позволять набирать силу, и хотя мы вряд ли уничтожим их всего несколькими рейдами, мы должны наносить удары по ним при любой возможности, чтобы, надеюсь, ослабить их силу в долгосрочной перспективе."

 NEP_weaken_RAJ_influence_decision: "[NEP_loc_weaken_RAJ_influence_name]"
 NEP_weaken_RAJ_influence_rebels_name: "Сеять раздор в рядах правительства"
 NEP_weaken_RAJ_influence_ranas_name: "Уменьшить зависимость от Доминиона"
 NEP_weaken_RAJ_influence_decision_desc: "[NEP_loc_weaken_RAJ_influence_desc]"
 NEP_weaken_RAJ_influence_rebels_desc: "Династия Рана не является единым фронтом, о чем свидетельствуют ее многочисленные внутренние споры и особенно количество Рана в наших рядах, которые хотят видеть конец тирании своей семьи. С помощью нескольких удачно подобранных слов, шепнутых им на ухо, мы можем легко разрушить их через междоусобицы."
 NEP_weaken_RAJ_influence_ranas_desc: "Хотя мы зависим от поддержки Лахора против Мукти Сена, если мы позволим их влиянию стать слишком сильным, мы, скорее всего, станем не более чем индийской марионеткой. Мы должны подчеркивать нашу независимость, чтобы предотвратить такой исход."

 NEP_increase_HND_influence_decision: "[NEP_loc_increase_HND_influence_name]"
 NEP_increase_HND_influence_HND_name: "Поддержка Праджа Паришад"
 NEP_increase_HND_influence_rebels_name: "Привлечение королевских офицеров"
 NEP_increase_HND_influence_ranas_name: "Сокращение полицейской деятельности"
 NEP_increase_HND_influence_decision_desc: "[NEP_loc_increase_HND_influence_desc]"
 NEP_increase_HND_influence_HND_desc: "Непал Праджа Паришад представляют более граждански настроенную сторону восстания против Рана и жизненно важны для привлечения на свою сторону большей части населения, которая презирает Рана, но опасается радикализма. Мы должны и дальше поддерживать их рост, если хотим, чтобы их восстание увенчалось успехом."
 NEP_increase_HND_influence_rebels_desc: "Хотя в настоящее время они могут служить Рана своими действиями, многие офицеры не из Рана в армии превыше всего ставят истинную преданность Королю. Убедив их, что свержение Рана будет в интересах Короля, они, скорее всего, встанут на сторону революции."
 NEP_increase_HND_influence_ranas_desc: "Даже при назревающем восстании от нас нельзя ожидать жизни в постоянном страхе. Нет причин продолжать ежедневные рейды в любое место, подозреваемое в укрывательстве повстанцев, если не что иное, это просто не стоит затрат, которые вместо этого могли бы пойти на новенький автомобиль для премьер-министра или другую подобную покупку."

 NEP_increase_RAJ_influence_decision: "[NEP_loc_increase_RAJ_influence_name]"
 NEP_increase_RAJ_influence_RAJ_name: "Отправить средства Джуддхе Рана"
 NEP_increase_RAJ_influence_rebels_name: "Ограничить собрания групп"
 NEP_increase_RAJ_influence_ranas_name: "Укрепить лояльность армии"
 NEP_increase_RAJ_influence_decision_desc: "[NEP_loc_increase_RAJ_influence_desc]"
 NEP_increase_RAJ_influence_RAJ_desc: "Если премьер-министр Непала собирается сражаться с этими повстанцами, ему понадобятся средства для покупки оружия, снаряжения и найма дополнительных охранников и солдат. Имея достаточный излишек, мы должны предоставить средства для дальнейшей помощи ему в этих вопросах."
 NEP_increase_RAJ_influence_rebels_desc: "Несмотря на то, что эффективная организация жизненно важна для успешной революции, мы подвергаем себя риску ареста каждый раз, когда встречаемся, чтобы спланировать будущие действия. Было бы разумно сократить количество встреч, которые мы проводим сейчас, где это возможно, чтобы избежать таких арестов."
 NEP_increase_RAJ_influence_ranas_desc: "Повстанцы не могут победить Непал, пока армия на стороне премьер-министра, и, к сожалению, многие беспокоятся, что когда придет время, именно они выстрелят ему в спину. Этого нельзя допустить, и мы должны обеспечить лояльность армии любыми способами."

 NEP_india_send_guns_decision: "[NEP_india_send_guns_name]"
 NEP_india_send_guns_HND_name: "Вооружение Мукти Сена"
 NEP_india_send_guns_RAJ_name: "Помощь силам безопасности Непала"
 NEP_india_send_guns_decision_desc: "[NEP_india_send_guns_desc]"
 NEP_india_send_guns_HND_desc: "Когда придет время для их восстания, нашим союзникам понадобится столько оружия, сколько они смогут физически унести. Имея мало возможностей приобрести это огнестрельное оружие в самом Непале, мы должны предоставить им это снаряжение вместо этого."
 NEP_india_send_guns_RAJ_desc: "Люди, которых Непал использует в качестве сил безопасности, часто оснащены хуже, чем средний полицейский в Лахоре, и все же от них ожидают победы над вооруженным восстанием. Мы должны отправить им любое оружие, которое можем выделить, чтобы у них действительно был шанс против повстанцев, вооруженных Калькуттой."

 NEP_india_command_power_decision: "[NEP_india_command_power_name]"
 NEP_india_command_power_HND_name: "Обучение революционеров ТПС"
 NEP_india_command_power_RAJ_name: "Увеличение операций БРЛ в Катманду"
 NEP_india_command_power_decision_desc: "[NEP_india_command_power_desc]"
 NEP_india_command_power_HND_desc: "Хотя «Паришад», безусловно, полезны для нас, когда придет время, мы вряд ли можем представить себе кучку интеллектуалов среднего класса, штурмующих Катманду. Более пылкие силы среди Трудовой партии Сватантра — гораздо лучшая ставка для выполнения дел, и мы должны дополнительно обучить их для подготовки к восстанию."
 NEP_india_command_power_RAJ_desc: "Бюро разведки Лахора представляет собой одних из лучших шпионов во всей Азии, и без них Республика, вероятно, вызвала бы 29 различных восстаний только в этом году. Если кто-то и может остановить повстанцев в Непале, так это они, и поэтому мы должны отправить больше агентов в Катманду, чтобы помочь Джуддхе Рана."

 NEP_join_faction_name: "[NEP_loc_join_faction]"
 NEP_join_faction: "Присоединиться к [FROM.GetNameDef]"

 NEP_assert_the_mantle_of_asal_hindustan: "Утвердить мантию Асал Индостана"
 NEP_assert_the_mantle_of_asal_hindustan_desc: "Когда великий Притхви Нараян Шах объединил Непал, он провозгласил наше королевство Асал Индостаном, настоящим Индостаном, поскольку остальная часть субконтинента была оккупирована захватчиками Великих Моголов. Хотя немногие восприняли его заявление как нечто большее, чем националистическая бравада, мы стоим сейчас как бесспорные правители всего Индостана, и мы позаботимся о том, чтобы мир знал о нашем праве управлять им."

 NEP_surviving_the_indian_nightmare_category: "Переживая индийский кошмар"
 NEP_pilfer_the_depots: "Обчистить склады"
 NEP_pilfer_the_depots_desc: "Мы отчаянно нуждаемся в винтовках, и, к счастью для нас, наша армия редко выбрасывает или продает старое снаряжение, просто складывая его на хранение на всякий случай. Многие из этих ружей больше не функционируют или настолько устарели, что их можно считать нефункциональными, но мы должны быть в состоянии наскрести достаточно, чтобы дополнительно вооружить наши войска."
 NEP_emergency_military_production: "Чрезвычайное военное производство"
 NEP_emergency_military_production_desc: "То немногое, что у нас есть в плане промышленности, потенциально может быть перепрофилировано для производства униформы, боеприпасов и другого такого снаряжения, в котором отчаянно нуждается наша армия. Это, конечно, ограничит нашу способность производить что-либо еще, но сейчас мало что имеет значение."
 NEP_retreat_to_kathmandu: "Отступление в [323.GetCapitalVictoryPointName]"
 NEP_retreat_to_kathmandu_desc: "Наши враги прорвали линию фронта и начали оккупировать части Непала. Отступление в столицу и укрепление там может быть нашим лучшим вариантом на данном этапе, и надежда, что неудачные атаки на нее дадут нам возможность контратаковать."
 NEP_fortify_uttaranchal: "Укрепить [814.GetName]"
 NEP_fortify_uttaranchal_desc: "Горы и холмы [814.GetName] сами по себе обеспечивают значительное оборонительное преимущество, но этого, вероятно, недостаточно, чтобы полностью защитить сам Непал от решительной армии. Нам следует позаботиться о строительстве укреплений в регионе, чтобы мы могли держать боевые действия подальше от центральных районов."
 NEP_fortify_darjeeling: "Укрепить [887.GetName]"
 NEP_fortify_darjeeling_desc: "[887.GetName] представляет собой жизненно важный логистический центр для наших войск, действующих на востоке, особенно потому, что он служит единственной реальной связью с [888.GetName] и другими восточными регионами. Мы должны гарантировать, что [887.GetName] не падет, путем строительства дополнительных укреплений."

