 NEP_kunwar_inderjit_singh: "Кунвар Индерджит Сингх"
 NEP_kunwar_inderjit_singh_sic_desc: "§YРодился:§! §L1906 год, в Думракоте, Королевство Непал§!"
 NEP_juddha_shumsher_jang_bahadur_rana: "Джуддха Шамшер Рана"
 NEP_juddha_shumsher_jang_bahadur_rana_leader_desc: "§YРодился:§! §L19 апреля 1875 года в Катманду, Королевство Непал§!\n§YБиография:§! §LНемногие Рана столь же голубых кровей, как могущественный Джуддха Рана, рожденный в семье Чхетри и Раджпутов, будучи к тому же племянником самого основателя династии Рана. Великий Джанг Бахадур Рана сделал его полковником в младенчестве, позже он стал генералом, когда ему было всего десять лет. Несмотря на кратковременную заминку, когда ему пришлось бросить школу из-за плохого здоровья, восхождение Джуддхи к власти было устойчивым и славным.§!"
 NEP_samrajya_shumsher_jang_bahadur_rana: "Самраджья Шамшер Джанг Бахадур Рана"
 NEP_samrajya_shumsher_jang_bahadur_rana_regnal: "Самраджья"
 NEP_samrajya_shumsher_jang_bahadur_rana_leader_desc: "§YРодился:§! §L1921 год, в Катманду, Королевство Непал§!\n§YБиография:§! §LПоложение Самраджьи уникально: он сын Рана и Шаха. Самраджья провел большую часть своего детства неловко посередине растущей напряженности между двумя семьями, хотя его отец генерал Кайзер Шамшер Джанг Бахадур Рана и его мать принцесса Лакшми Раджья Лакшми Дев приложили стальные усилия, чтобы держать его подальше от семейных ссор.\n\nПри всем при этом Самраджья теперь оказывается прямо в центре внимания после кульминации многолетних ссор между Рана и Шахами. Молодой и невероятно неопытный, он обречен (по замыслу) поддерживать годы и годы традиционного правления Рана над тем, что в остальном формально является владением Королевского дома Горкха. Действительно, Рана теперь преуспели в том, чтобы наконец закрепить себя как синоним правящей семьи.§!"
