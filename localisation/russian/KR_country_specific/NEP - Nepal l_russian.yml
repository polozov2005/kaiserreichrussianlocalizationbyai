 NEP_indian_nightmare_decisions_tt: "§YРешения военного времени§! будут разблокированы на время войны."

 NEP_five_year_plan_tt: "§YЭкономика коррупции и стагнации§! теперь будет §Gвременной§! и будет удалена через 5 лет."
 NEP_five_year_plan_shorten_tt: "Время действия §YЭкономики коррупции и стагнации§! будет §Gсокращено§!."

 NEP_conspiracy_ongoing_flag: "Дарджилингский заговор продолжается."
 NEP_conspiracy_influence_change_tooltip: "Влияние [$COUNTRY$.GetFlag] [$COUNTRY$.GetAdjective] изменяется на [?NEP_conspiracy_influence_change|=Y0] очков."
 NEP_conspiracy_influence_costchange_tooltip: "Стоимость решений для $DIRECTION$ влияния [$COUNTRY$.GetFlag] [$COUNTRY$.GetAdjective] изменяется на £pol_power §Y$NUMBER$§! Политической власти."
 NEP_backed_revolution_flag: "Мы решили поддержать заговор против Рана."
 NEP_backed_ranas_flag: "Мы решили поддержать премьер-министра против повстанцев."
 NEP_backed_revolution_tt: "Мы попытаемся поддержать §lМукти§! §RСена§! в их революции по свержению Джуддхи Рана и его династии, разблокируя ветку фокусов §Y$NEP_the_darjeeling_conspiracy$§!."
 NEP_backed_ranas_tt: "Мы продолжим поддерживать §Pпремьер-министра§! в его попытках сохранить власть, разблокируя ветку фокусов §Y$NEP_rooting_out_the_traitors$§!."
 NEP_conspiracy_start_decisions_tt: "Разблокирует решения £GFX_decision_icon_small §Y[NEP_loc_conspiracy_name]§!.\n\n"
 NEP_conspiracy_start_NEP_tt: "§gНачнется заговор против правящей династии Рана, разблокируя соответствующую категорию решений. Примерно в это же время в следующем году премьер-министр либо будет «смещен» с поста, либо заговорщики будут окончательно разгромлены, даже если Король числится в их рядах.§!"
 NEP_conspiracy_start_RAJ_tt: "§gВ Непале начался заговор против правящей династии Рана, организованный нашими врагами в Калькутте, которые хотят установить лояльный режим в Королевстве. Мы должны гарантировать, что эти повстанцы будут разгромлены, когда они сделают свой ход чуть меньше чем через год, если мы не хотим получить еще одного врага на востоке.§!"
 NEP_conspiracy_start_HND_tt: "§gВ Непале начался заговор против правящей династии Рана при полной поддержке наших храбрых агентов. Восстание должно начаться чуть меньше чем через год, и мы должны гарантировать, что наши союзники преуспеют в своей революции, лишив Доминион ценного союзника и, возможно, получив одного из наших.§!"
 NEP_conspiracy_spirit_tt: "§YЭтот дух будет удален после завершения заговора.§!"
 NEP_conspiracy_ending_soon_nepal_tt: "§RЗаговорщики сделают свой ход через 30 дней, твердо определив судьбу будущего Непала тем или иным образом.§!"
 NEP_conspiracy_ending_soon_india_tt: "§RПовстанцы в Непале должны сделать свой ход через 30 дней, что положит конец нашим попыткам повлиять на них. Мы не можем позволить нашим врагам одержать победу над нами.§!"

### Characters ###
 NEP_tribhuvan: "Трибхуван"
 NEP_tribhuvan_leader_desc_start: "§YРодился:§! §L30 июня 1906 года в Катманду, Королевство Непал§!\n§YБиография:§! §LПосле кончины своего отца короля Притхви в 1913 году всего лишь пятилетний Трибхуван Бир Бикрам Шах Дев стал королем Трибхуваном. Выросший под регентством королевы-матери Дивьешвари Лакшми Деви, в 12 лет он женился на Канти Раджья Лакшми Деви Шах и ее сестре Ишвари в один и тот же день на двух отдельных церемониях.\n\nНесмотря на то, что он был главой Королевского дома Горкха (также известного как династия Шах), пока он рос, ни Трибхуван, ни его мать не обладали никакой реальной властью, а Рана держали железную хватку над реальным управлением. Во время Великой войны ему и его матери угрожали и запугивали, заставляя приказать непальским войскам вступить в войну в поддержку Британии и усилий Антанты, что углубило взаимную вражду между двумя семьями.§!\n\n"
 NEP_tribhuvan_leader_desc: "$NEP_tribhuvan_leader_desc_start$§LСегодня Трибхуван взрослый, и он терпел Рана гораздо дольше, чем ему хотелось бы. Поскольку Непал Праджа Паришад продолжает плести интриги, Трибхуван тоже чувствует, что время сделать свой ход наступит скорее раньше, чем позже.§!"
 NEP_tribhuvan_restored_leader_desc: "$NEP_tribhuvan_leader_desc_start$§LТеперь, когда Рана были раздавлены, Трибхуван готов наконец наверстать упущенное за почти столетие деспотизма Рана. Сосредоточив значительную власть в своих руках, время покажет, что именно Трибхуван решит делать со своим обновленным мандатом.§!"
 NEP_tribhuvan_democratic_leader_desc: "$NEP_tribhuvan_leader_desc_start$§LТеперь, когда Рана были раздавлены, Трибхуван готов наконец наверстать упущенное за почти столетие деспотизма Рана. Предоставляя свою легитимность правительству, состоящему из свободных людей Непала, Трибхуван теперь надеется наблюдать за переходом Непала от деспотии 19 века к современной демократической нации.§!"
 NEP_ram_prasad_rai: "Рам Прасад Рай"
 NEP_ram_prasad_rai_leader_desc: "§YРодился:§! §L1 марта 1910 года в Бходжпуре, Королевство Непал§!\n§YБиография:§! §LРодившийся в зажиточной семье в деревне Сандилунг, мало кто думал, что незаметное рождение Рама Прасада Рая приведет к огромным последствиям для будущего Непала. В возрасте 14 лет он вступил в армию Британского Раджа в качестве члена элитных бригад гуркхов, прежде чем в конечном итоге встать на сторону правительства Калькутты, сражаясь с индийскими повстанческими войсками против британских индийских сил.\n\nВ то время как Бхаратийская Народная Республика зализывала раны и праздновала свою с трудом завоеванную свободу после прекращения огня 1927 года, Рам вскоре представил, как такая революция может выглядеть на его родине в Непале. Большую часть 20-х и 30-х годов он сотрудничал со своими товарищами-революционерами и неустанно работал над тем, чтобы привить политическое сознание непальскому крестьянству.\n\nПосле многих лет усилий с его стороны и со стороны его товарищей Непальская революция наконец свершилась, и его соотечественники были освобождены от оков деспотического феодализма Рана. Тесно связанный с ИНК, многие сомневаются, что юный Рам далеко отойдет от партийной линии своих соратников в Индии.§!"

