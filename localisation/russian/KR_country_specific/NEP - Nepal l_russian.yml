### Intro Screen ###
 NEP_country_intro_background: "GFX_NEP_intro"
 NEP_country_intro_header: "Королевство Непал"
 NEP_country_intro_content: "Королевство Непал, объединенное великим Притхви Нараян Шахом, долгое время оказывалось довольно уникальным государством по сравнению со своими ближайшими соседями. Хотя оно было подчинено британцами, как и его индийские коллеги, ему все же удалось сохранить большую степень автономии, во многом благодаря широко известной ненасытности и храбрости его войск, а также преднамеренной политике изоляционизма. Эта автономия даже увидела официальное признание Британией его независимости в 1923 году, став вторым государством в регионе, достигшим такого подвига, и первым, сделавшим это дипломатическим путем, в отличие от Афганистана.\n\nУправление Непалом также долгое время отличало его от соседей, так как, хотя на бумаге королевством может править династия Шах, основавшая его, на протяжении почти столетия нацией правит династия Рана через наследственную диктатуру. Действуя во многом как японские сёгунаты, Рана действительно правят Непалом через должность премьер-министра, а король выступает в качестве высокоуважаемой номинальной фигуры, которая просто штампует их приказы. Хотя правление Рана вызывает сильное недовольство как у населения, так и у самого Короля, их политика жестоких репрессий, экономической стагнации и непоколебимой взаимной поддержки с Британией исторически приводила к тому, что вся оппозиция их правлению подавлялась почти сразу же, как только начиналась.\n\nКогда в Индии разразился хаос с началом их Революции, Непал быстро оказался втянут в конфликт в поддержку своих британских союзников. Хотя Непал не был непосредственным полем битвы, тысячи войск гуркхов были отправлены сражаться непосредственно под командованием британцев, а также те, кто находился под командованием премьер-министра, были отправлены защищать пограничные регионы, где они остаются и по сей день. Неспособность победить повстанцев, наряду с крахом их главного союзника, оставила непальское государство в очень шатком положении, а правительство в Калькутте открыто враждебно настроено к режиму Рана. При поддержке [HND.GetNameDef] антирановские повстанцы, главным образом Непал Праджа Паришад, начали формироваться в годы после прекращения огня, надеясь свергнуть Рана и создать свободную нацию, ориентированную на Калькутту. Только время покажет, сбудутся ли их мечты или Рана и их британские союзники сокрушат обоих своих врагов и еще больше укрепят железную власть премьер-министра."

 NEP_guide: "§MРегентство Рана§! ($paternal_autocrat_coloured$)\n£white_dot Когда Дарджилингский заговор закончится, правительство, поддерживаемое Доминионом, должно победить, набрав на 25 или более очков больше, чем повстанцы.\n£white_dot Вы начнете как марионетка, но сможете стать независимым членом Антанты с фокусом §Y$NEP_renegotiate_defence_obligations$§!.\n\n§MРеставрация Королевской власти§! ($authoritarian_democrat_coloured$)\n£white_dot Когда Дарджилингский заговор закончится, ни у одной из сторон не должно быть на 25 или более очков больше, чем у другой.\n£white_dot Завершение фокуса §Y$NEP_protection_of_nepalese_independence$§! даст возможность присоединиться к Сфере Сопроцветания, если вы граничите с членом, или к любой фракции, частью которой станет Княжеская Федерация.\n\n§MОсвобождение Непала§! ($social_liberal_coloured$ / $radical_socialist_coloured$ / $syndicalist_coloured$ / $totalist_coloured$)\n£white_dot Когда Дарджилингский заговор закончится, повстанцы, поддерживаемые Бхаратией, должны победить, набрав на 25 или более очков больше, чем правительство.\n£white_dot Последующее событие позволит вам выбрать между $social_liberal_coloured$ Непал Праджа Паришад или $radical_socialist_coloured$ Трудовой партией Сватантра.\n£white_dot ТПС впоследствии сможет стать $syndicalist_coloured$ или $totalist_coloured$ через решение, если [HND.GetNameDef] выбрала любой из этих вариантов после фокуса §Y$HND_first_united_congress$§!.\n£white_dot ТПС начнет как марионетка, но сможет стать независимым союзником [HND.GetNameDef] через фокус §Y$NEP_renegotiate_defence_obligations$§!, в то время как для «Паришад» завершение фокуса §Y$NEP_under_the_wings_of_the_republic$§! даст возможность присоединиться к любой фракции, частью которой станет Княжеская Федерация."

 NEP_KR_gathering_storm_desc: "Почти столетие Непалом правила железная рука династии Рана, подавляя любое инакомыслие и превращая монархию страны в не более чем марионеточный институт. Даже после Индийской революции твердая рука премьер-министров Рана позволила ему избежать участи своих британских союзников, быстро расправляясь с любой потенциальной оппозицией.\n\nОднако с ростом напряженности в Индии и подготовкой соседней Республики в Калькутте к возвращению на тропу войны начинает казаться, что Рана могут столкнуться со своей самой большой угрозой."

