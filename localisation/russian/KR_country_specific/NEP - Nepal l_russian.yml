 NEP_join_PRF: "§YЕсли [PRF.GetNameDef] создаст или присоединится к фракции, Непал может присоединиться к ней вместе с ними.§!"
 NEP_join_factions_india: "§YЕсли мы создадим или присоединимся к фракции, Непал присоединится вместе с нами.§!"
 NEP_follow_the_calcutta_line_radical_socialist_tt: "ТПС переориентируется на §RРадикальный социализм§!."
 NEP_follow_the_calcutta_line_syndicalist_tt: "ТПС переориентируется на §rСиндикализм§!."
 NEP_follow_the_calcutta_line_totalist_tt: "ТПС переориентируется на §oТотализм§!."

 NEP_indian_nightmare_subject_tt: "§YЭтот дух будет удален, как только Индия воссоединится.§!"
