### Ideas ###
 NEP_royal_army_name: "Королевская армия Непала"
 NEP_republican_army_name: "Республиканская армия Непала"
 NEP_royal_army: "[NEP_loc_army_name]"
 NEP_royal_army_desc: "[NEP_loc_army_name] — одна из немногих вещей в Непале, которая вызывает гордость у представителей всего политического спектра. Со времен англо-непальской войны непальские войска пользовались мировой известностью, и на протяжении более века непальские «гуркхи» считались самыми элитными войсками под британским командованием.\n\nПосле британской и индийской революций многие непальские ветераны этих конфликтов вернулись домой в Непал, принеся с собой мудрость и опыт, необходимые для того, чтобы поднять собственную армию Непала на большие высоты, позволяя нации играть роль, значительно превосходящую ее размер."
 NEP_an_economy_of_corruption_and_stagnation: "Экономика коррупции и стагнации"
 NEP_an_economy_of_corruption_and_stagnation_desc: "Из-за сочетания коррумпированной системы, построенной почти исключительно для обогащения династии Рана, и общей политики противодействия индустриализации для ослабления политической власти крестьянства, Непал оказывается невероятно бедным и отсталым, несмотря на огромный потенциал для экономического роста.\n\nХотя за последние два десятилетия были предприняты некоторые попытки наконец привести Непал хотя бы в XIX век, хаос 20-х годов решительно похоронил все надежды на это. Индустриализация Непала, вероятно, потребует больших политических изменений и помощи извне, но она будет жизненно важна, чтобы нация не угасла в безвестности."
 NEP_the_padma_shumsher_plan: "План Падмы Шамшера"
 NEP_the_padma_shumsher_plan_desc: "Хотя он расценивается как крайне радикальный и глубоко непопулярный среди других членов династии Рана, довольно сдержанный план индустриализации Падмы Шамшера был навязан Непалу их покровителями из Индийского Доминиона, которые потребовали непальской индустриализации ради национальной безопасности.\n\nХотя план Падмы вряд ли превратит Непал в промышленную державу, он, вероятно, поможет построить современную экономику в Непале и позволит ему оказывать помощь своим индийским союзникам."
 NEP_realm_of_the_ranas: "Владения Рана"
 NEP_realm_of_the_ranas_desc: "С момента военного переворота против королевы-регента Раджьи Лакшми и ее мужа короля Раджендры династия Рана правит Непалом железной рукой, подавляя любые попытки оппозиции, прежде чем они смогут перерасти в угрозу.\n\nНепал при Рана действует как настоящий сёгунат в Гималаях — сравнение, которое не ускользнуло от внимания руководства Непала. Неудачная революция против режима только укрепила их хватку над Непалом, разбив все надежды врагов Рана на то, что их правление закончится так же, как у Токугавы."
 NEP_realm_of_the_ranas_0_desc: "С момента военного переворота против королевы-регента Раджьи Лакшми и ее мужа короля Раджендры династия Рана правит Непалом железной рукой, подавляя любые попытки оппозиции, прежде чем они смогут перерасти в угрозу.\n\nНепал при Рана действует как настоящий сёгунат в Гималаях — сравнение, которое не ускользнуло от внимания руководства Непала, хотя большинство полагает, что им удастся избежать участи режима Токугавы. Однако постепенный рост антирановской оппозиции, активно поддерживаемой индийцами, начал ставить этот оптимизм под сомнение..."
 NEP_pnp_finished: "Долгий путь к современности"
 NEP_pnp_finished_dec: "Хотя он расценивается как крайне радикальный и глубоко непопулярный среди других членов династии Рана, довольно сдержанный план индустриализации Падмы Шамшера был навязан Непалу их покровителями из Индийского Доминиона, которые потребовали непальской индустриализации ради национальной безопасности.\n\nХотя план Падмы вряд ли превратит Непал в промышленную державу, он, вероятно, поможет построить современную экономику в Непале и позволит ему оказывать помощь своим индийским союзникам."
 NEP_bnia_finished: "Новая непальская экономика"
 NEP_bnia_finished_dec: "Ценой огромных усилий Непалу удалось преодолеть застой времен Рана и построить экономику, которая, если и не потрясает воображение, то, по крайней мере, приемлема для современного мира. Впрочем, есть надежда, что это только начало, и впереди десятилетия экономического роста."
 NEP_state_initiatives: "Государственные инициативы"
 NEP_state_initiatives_desc: "Учитывая практически полное отсутствие внутреннего капитала, на который можно было бы надеяться для самостоятельного начала индустриализации, правительство сочло необходимым запустить непальскую промышленность с помощью финансируемых государством усилий и предприятий, находящихся в государственной собственности."

 NEP_unchallenged_autocracy: "Неоспоримая автократия"
 NEP_unchallenged_autocracy_desc: "Поражение Мукти Сена почти наверняка уничтожило любые шансы на свержение Рана по крайней мере на следующие несколько десятилетий, так как целое поколение революционеров погибло или находится в изгнании. Теперь ничто не стоит на пути их абсолютной власти."
 NEP_national_restoration: "Национальная реставрация"
 NEP_national_restoration_desc: "Попытка революции в Непале, возможно, и привела к падению абсолютного правления Рана, но также ознаменовалась восстановлением королевской власти, а не достижением более радикальных целей, на которые надеялись многие революционеры, поддерживаемые Калькуттой. Теперь Король надеется увести непальскую нацию от конфликтов и исцелить ее глубокие разногласия под своим великим авторитетом и руководством."
 NEP_our_ruler_glorious_idea: "Наш славный правитель"
 NEP_our_ruler_glorious_idea_desc: "Несмотря на то, что управление осуществляется через национальное правительство, состоящее из представителей всего политического спектра, истинная власть в Непале теперь снова находится в руках Короля. Это разительная перемена по сравнению с его некогда бесправным положением, и есть надежда, что это поможет нации преодолеть годы тирании Рана."
 NEP_constitution_of_the_revolution: "Конституция революции"
 NEP_constitution_of_the_revolution_desc: "Теперь, когда народ полностью контролирует непальскую нацию, первая конституция страны медленно разрабатывается и применяется через временные законы. Есть надежда, что к концу десятилетия полная версия конституции будет наконец принята, и Непал сможет завершить свой полный переход к надлежащей современной и свободной системе."
 NEP_the_peoples_kingdom: "Народное королевство"
 NEP_the_peoples_kingdom_desc: "Благодаря силе и решимости Мукти Сена, а также огромной поддержке короля Трибхувана, Непал сбросил тираническое правление династии Рана. Впервые в истории Непала страной правят не элиты, а простой народ."
 NEP_rule_of_the_mukti_sena: "Правление Мукти Сена"
 NEP_rule_of_the_mukti_sena_desc: "При поддержке Калькутты социалистическая Трудовая партия Сватантра захватила полную власть в Непале, используя военную силу и революционную риторику для легитимизации своего положения. Хотя ТПС не может по-настоящему достичь многих грандиозных целей социализма в доиндустриальной стране, она надеется, что при достаточной поддержке социалистов мира Непал тоже присоединится к ним на пути к социализму."
 NEP_first_citizen_of_nepal: "Первый гражданин Непала"
 NEP_first_citizen_of_nepal_desc: "Хотя официально страна является республикой, широкая поддержка монархии и личная популярность Трибхувана после его участия в революции сделали полную ликвидацию этого института весьма затруднительной. В качестве компромисса ныне бывшему Королю была предоставлена чисто церемониальная должность Раджья Прамукх (Главы государства), что помогло успокоить многочисленных монархистов страны."

 NEP_surviving_the_indian_nightmare: "Переживая индийский кошмар"
 NEP_surviving_the_indian_nightmare_desc: "Война в Индии вспыхнула вновь, и на кону стоит будущее не только Индии, исход конфликта почти наверняка определит и будущее Непала. Руководство Непала теперь стоит перед сложной задачей провести нацию через этот кризис, надеясь выйти из него свободными и невредимыми."

 NEP_crushing_the_conspirators: "Сокрушение заговорщиков"
 NEP_crushing_the_conspirators_desc: "С помощью [RAJ.GetNameDef] премьер-министр Джуддха Рана начал усилия по подавлению любого попытки заговора против непальского государства, надеясь быстро расправиться с любым планируемым восстанием."
 NEP_covert_support_for_the_mukti_sena: "Тайная поддержка Мукти Сена"
 NEP_covert_support_for_the_mukti_sena_desc: "Хотя премьер-министр официально начал усилия по подавлению любой оппозиции государству, Король в рамках своих ограниченных возможностей начал тайно помогать повстанцам, надеясь положить конец тирании Рана."

 udyog_parishad: "Удьог Паришад"
 udyog_parishad_desc: "Удьог Паришад, или просто «Промышленный совет», был основан в 1935 году в рамках усилий премьер-министра Джуддхи Шамшера Рана по содействию медленной индустриализации в Непале, исключительно на благо его династии. Совет существует для эффективной координации государственных расходов и инвестиций в индустриализацию части страны сверху вниз, с основным упором на создание небольших государственных предприятий в наиболее потенциально прибыльных секторах."
 nepal_government_railway: "Непальская государственная железная дорога"
 nepal_government_railway_desc: "Планы создания первой железной дороги в Непале были впервые разработаны в начале 20-х годов в надежде соединить Непал с Индией, чтобы Рана могли перевозить лес для собственной выгоды. Эти планы были принудительно отменены после начала гражданской войны в Индии, но теперь, когда ситуация стала намного стабильнее, а правительство на юге достаточно дружелюбно, проект был возрожден. Не желая останавливаться на этом, непальское правительство намерено строить дальнейшие железные дороги по всей стране, работающие под контролем государства."
 biratnagar_mills: "Фабрики Биратнагара"
 biratnagar_mills_desc: "Текстиль — одна из самых ценных отраслей, доступных такой стране, как Непал, поскольку роскошные одежды и ткани всегда пользуются высоким спросом. С этой целью в Биратнагаре были созданы одни из первых фабрик страны, целью которых является производство текстиля из хлопка и джута, чтобы удовлетворить потребности как состоятельных непальцев, так и покупателей за рубежом."

 ### Focuses ###

 NEP_rooting_out_the_traitors: "Искоренение предателей"
 NEP_rooting_out_the_traitors_desc: "Почти столетие династия Рана стояла у руля Королевства Непал. Хотя он и не король по имени, премьер-министр Джуддха Шамшер Рана является лидером этой страны. Выступать против него — значит выступать против государства, устраивать заговор против него — значит устраивать заговор против Непала."
 NEP_intelligence_cooperation_with_the_lib: "Сотрудничество с Бюро разведки Лахора"
 NEP_intelligence_cooperation_with_the_lib_desc: "Бюро разведки Лахора (LIB), разведывательное агентство Доминиона Индия, является одним из величайших в своем роде на Востоке. Есть веские основания полагать, что британское правление в Индии давно бы кануло в лету без их отличных разведывательных служб, которые всегда играли жизненно важную роль в подавлении восстаний в зародыше задолго до того, как само Бюро было даже создано. С их помощью мы легко сможем сделать то же самое с нашим собственным восстанием."
 NEP_bribing_the_weakest_links: "Подкуп слабых звеньев"
 NEP_bribing_the_weakest_links_desc: "Хотя многие из тех, кто восстает против нас, богаче среднего непальца, в их рядах все же бесчисленное множество тех, кто готов на все за скромную сумму. Предложив достаточно крупное вознаграждение тем, кто готов сдать своих товарищей-повстанцев, мы очень быстро увидим, как они предают друг друга и выдают нам все свои секреты."
 NEP_infiltrating_the_praja_parishad: "Внедрение в Праджа Паришад"
 NEP_infiltrating_the_praja_parishad_desc: "В то время как обученные в Калькутте социалисты из Мукти Сена гораздо более замкнуты и в них труднее внедриться, более крупная организация «Паришад» всегда готова принимать новых членов с очень малой осторожностью, будучи почти полностью сосредоточенной на расширении своего движения. Поэтому нам будет очень просто заслать несколько человек под видом новых членов, что позволит нам взломать их изнутри."
 NEP_the_fate_of_all_rebels: "Участь всех мятежников"
 NEP_the_fate_of_all_rebels_desc: "Хотя мы изначально планировали оставить лидера повстанцев Дашаратха Чанда Тхакури в живых, чтобы выпытать у него информацию и использовать как разменную монету при необходимости, публичная демонстрация того, какая судьба ожидает тех, кто выступает против премьер-министра, может быть лучшим применением для него. Давайте подготовим петлю палача и вселим страх в сердца предателей."
 NEP_countering_bharatiya_influence: "Противодействие влиянию Бхаратии"
 NEP_countering_bharatiya_influence_desc: "Без постоянной поддержки со стороны своих союзников в Республике эти повстанцы были бы не более чем легкой неприятностью, а не реальной угрозой. Нашим приоритетом должно быть перекрытие как можно большего числа их потенциальных каналов поддержки, и как только мы перережем вены, движение начнет умирать вместе с ними."
 NEP_isolating_the_king: "Изоляция короля"
 NEP_isolating_the_king_desc: "Даже при отсутствии реальной власти Король по-прежнему пользуется огромным уважением в непальском обществе, и на данный момент почти открытым секретом является то, что он возмущен властью премьер-министра. Он очень легко может стать мощным вектором поддержки для наших врагов, и поэтому, пока это восстание не будет подавлено, мы должны ограничить его доступ к внешнему миру, так как мы не можем рисковать распространением опасных идей как к нему, так и от него."
 NEP_the_darjeeling_conspiracy: "Поддержать Дарджилингский заговор"
 NEP_the_darjeeling_conspiracy_desc: "Почти столетие коррумпированные автократы династии Рана держали мертвой хваткой политику Непала, подавляя его народ, узурпируя власть его королей и удерживая всю страну в состоянии отсталости. Если у народа Непала есть будущее, правление тиранов Рана должно подойти к концу."
 NEP_establishing_contacts_within_the_army: "Установление контактов в армии"
 NEP_establishing_contacts_within_the_army_desc: "Хотя армия подчиняется премьер-министру, как и остальная часть правительства, непальская армия не является полностью безнадежной. Многие, несомненно, возмущены правлением Рана или сохраняют верность королю-заложнику Трибхувану. Установив контакт с этими дальновидными патриотами в армии, мы можем проложить путь к падению Рана."
 NEP_cooperating_with_exiled_ranas: "Сотрудничество с изгнанными Рана"
 NEP_cooperating_with_exiled_ranas_desc: "Хотя Рана привели Непал к разорению, не каждый Рана желает нам зла. Мы можем получить преимущество, заручившись поддержкой тех, кто был отвергнут или изгнан своими родственниками, находящимися у власти."
 NEP_strengthen_ties_with_calcutta: "Укрепление связей с Калькуттой"
 NEP_strengthen_ties_with_calcutta_desc: "Наши товарищи в Калькутте испытывают огромную симпатию к нашему делу, и их помощь может быть жизненно важной для поддержки Армии Освобождения. Если мы хотим добиться успеха в изгнании Рана, мы должны углубить наши связи с Народной Республикой."
 NEP_appeal_to_hindu_unity: "Призыв к индуистскому единству"
 NEP_appeal_to_hindu_unity_desc: "С тех пор как великий король Притхви Нараян Шах объявил Непал «Асал Индостан», Истинной Индией, в знак неповиновения исламским императорам Великих Моголов, Непал сохраняет репутацию последнего свободного оплота индуизма. В Индии, и не только в Республике, есть много людей, которые считают, что свобода Непала жизненно важна для защиты индуизма от иностранного влияния; и хотя мы можем не разделять их радикализм в этом вопросе, их поддержка, безусловно, приветствуется."
 NEP_preparing_border_infiltration_efforts: "Подготовка проникновения через границу"
 NEP_preparing_border_infiltration_efforts_desc: "Мы должны посеять семена победы, чтобы, когда наступит решающий момент, мы были полностью готовы нанести смертельный удар по угнетателям Рана. С этой целью мы тайно переправляем сторонников и союзников через границу, получая разведданные и хорошо расположенные активы для использования в нужный момент."
 NEP_training_with_the_republican_army: "Обучение с Республиканской армией"
 NEP_training_with_the_republican_army_desc: "Рана не будут свергнуты с помощью нескольких брошюр со строгими формулировками, их нужно убрать силой, а с самим премьер-министром нужно поступить аналогичным образом. Приоритетом Мукти Сена должно стать обучение армии вместе с нашими индийскими союзниками и подготовка к неизбежной войне за освобождение Непала."
 NEP_sowing_the_seeds_for_democracy: "Посев семян демократии"
 NEP_sowing_the_seeds_for_democracy_desc: "Хотя почти наверняка Рана не уйдут добровольно и для их смещения потребуется сила, мы не можем забывать, что именно захват власти силой и убийство политических лидеров позволили Рана создать свой режим. Нашим приоритетом должна быть подготовка к построению свободного Непала после свержения премьер-министра, а не только то, как его свергнуть, поскольку без такой подготовки мы легко можем скатиться обратно к тирании."
 NEP_limit_the_spread_of_propaganda: "Ограничение распространения пропаганды"
 NEP_limit_the_spread_of_propaganda_desc: "Кажется, не проходит и дня, чтобы в Катманду не распространялась какая-нибудь газета из Лахора или Калькутты, или чтобы человек с панджабским или бенгальским акцентом не начинал распускать слухи всем, кто готов слушать. Эти довольно очевидные попытки повлиять на Непал нельзя терпеть, и мы должны пресекать их при любой возможности."
 NEP_request_restraint_by_all_factions: "Призыв к сдержанности всех фракций"
 NEP_request_restraint_by_all_factions_desc: "Хотя текущая ситуация далека от идеальной, положение в Непале почти наверняка станет еще хуже, если Мукти Сена эскалирует свою революцию или Рана станут жестче в своих попытках подавления. Мы, как нация, не можем позволить себе погрязнуть в кровопролитии, и мы должны призывать к сдержанности, даже если эти призывы часто остаются без ответа."
 NEP_defending_our_sovereignty: "Защита нашего суверенитета"
 NEP_defending_our_sovereignty_desc: "Позорно, что за Непал борются так, как будто это просто игрушка великих держав, а не гордая самодостаточная нация. Никто не должен решать политику Непала, кроме самого Непала, и мы должны предотвращать все попытки извне повлиять на ситуацию в пользу любой из сторон этого конфликта, если мы не хотим стать простым марионеточным государством."
 NEP_put_faith_in_his_majesty: "Вера в Его Величество"
 NEP_put_faith_in_his_majesty_desc: "Если у Непала и есть один маяк стабильности в это неспокойное время, то это его величество король Трибхуван Шах, и даже если нацию охватит хаос, мы должны верить, что руководство Короля приведет нас к светлому будущему."

NEP_acquiring_indian_surplus: "Приобретение индийских излишков"
 NEP_acquiring_indian_surplus_desc: "Конфликт за Индию привел к появлению значительных запасов излишков военного снаряжения, и жизненно важно, чтобы мы приобрели столько, сколько сможем. То, что для других является излишком, для Непала может стать разницей между поражением и выживанием."
 NEP_guarding_the_prime_minister: "Охрана премьер-министра"
 NEP_guarding_the_prime_minister_desc: "Поскольку будущее нашей страны зависит от безопасности ее лидера, его защита имеет первостепенное значение для армии. По этой причине мы создадим элитные силы, способные не только стоять стеной между лидером и опасностью, но и защищать границы нации, а при необходимости наносить удары по территории врага."
 NEP_protecting_kathmandu: "Защита Катманду"
 NEP_protecting_kathmandu_desc: "В случае худшего сценария жизненно важно, чтобы столица и окружающая долина Катманду были защищены от иностранного вторжения. Эта оборона должна состоять не только из существующих географических барьеров, но и из мощных искусственных укреплений, созданных с пониманием методов и средств современной войны."
 NEP_preparing_for_tibetan_aggression: "Подготовка к тибетской агрессии"
 NEP_preparing_for_tibetan_aggression_desc: "Несмотря на прошлые попытки прояснить ситуацию, наша граница с Тибетом остается плохо определенной и уязвимой в нескольких ключевых местах. Хотя атака с севера в настоящее время кажется маловероятной, важно, чтобы правительство подготовилось к такому развитию событий, если северный сосед попытается более решительно провести демаркацию границы."
 NEP_when_the_ganga_runs_red: "Когда Ганг окрасится в красный цвет"
 NEP_when_the_ganga_runs_red_desc: "С возобновлением войны на юге будущее Непала стало как никогда неопределенным. Вступим ли мы в борьбу за Индию напрямую или поддержим нашего фаворита на расстоянии, жизненно важно, чтобы мы играли активную роль в определении того, кто будет доминировать в будущем субконтинента."
 NEP_built_around_an_elite_core: "Построенная вокруг элитного ядра"
 NEP_built_around_an_elite_core_desc: "Будущее непальской армии зависит от того, сможем ли мы опереться на элитные традиции, которые сделали солдат из Непала известными и внушающими страх во всем мире. Вместо того чтобы ломать то, что явно показало свою высокую эффективность, мы сосредоточимся на том, чтобы вся армия Непала соответствовала репутации, установленной ее лучшими представителями."
 NEP_favouring_flexibility: "Предпочтение гибкости"
 NEP_favouring_flexibility_desc: "Хотя наши солдаты могут быть сильны духом, мы должны признать, что вряд ли выиграем у крупных держав в обычной битве. Однако нам повезло, что не все битвы должны быть обычными, и поэтому мы должны подготовить наших солдат к действиям в любой ситуации, в которой они окажутся, что, надеюсь, даст нам необходимое преимущество перед неподготовленными."
 NEP_capitalising_on_breakthroughs: "Использование прорывов"
 NEP_capitalising_on_breakthroughs_desc: "Учитывая элитный характер наших лучших солдат, прорыв вражеских линий, безусловно, возможен, но эти достижения довольно бессмысленны, если мы не знаем, как ими воспользоваться. Поэтому наши солдаты должны быть обучены быстро действовать против дезорганизованных сил, даже если это означает действия в отрыве от наших более широких логистических сетей."
 NEP_kafar_hunu_bhanda_marnu_ramro: "Кафар Хуну Бханда Марну Рамро"
 NEP_kafar_hunu_bhanda_marnu_ramro_desc: "«Кафар Хуну Бханда Марну Рамро», или «Лучше умереть, чем жить как трус», — это девиз, с которым живут и умирают многие наши солдаты. Там, где другие бежали бы в страхе при первых признаках беды, наши люди стоят твердо и одерживают победы, которых другие слишком трусливы, чтобы достичь, и именно это действительно отличает непальские войска от всех остальных."
 NEP_invest_in_mountaineering_equipment: "Инвестиции в альпинистское снаряжение"
 NEP_invest_in_mountaineering_equipment_desc: "Хотя многие наши люди знакомы с действиями в горных районах Непала, даже самый опытный альпинист будет плохо работать в таких условиях без надлежащего снаряжения. Поэтому жизненно важно, чтобы наши люди были обеспечены лучшим, что мы можем достать, ведь мы не можем ожидать, что они будут пересекать горную местность с одними лишь голыми руками и мужеством, не так ли?"
 NEP_specialise_the_doctrines: "Специализация доктрин"
 NEP_specialise_the_doctrines_desc: "Непальские солдаты вряд ли окажутся штурмующими пляжи Дорсета или сражающимися в влажных лесах Юкатана, поэтому нет смысла тратить время на их подготовку к бесчисленным ситуациям, с которыми они, вероятно, никогда не столкнутся. Вместо этого наше внимание должно быть сосредоточено на подготовке их к боям на холмах и в горах, составляющих большую часть непосредственного региона, и просто позволить нашим союзникам справиться с остальным."
 NEP_modernising_the_royal_army: "Модернизация [NEP_loc_army_name]"
 NEP_modernising_the_royal_army_desc: "Хотя непальские солдаты имеют грозную репутацию, наша армия в целом безнадежно отстала от времени по структуре, снаряжению и доктрине. Чтобы построить армию, использующую сильные стороны Непала, мы сначала должны создать армию, способную противостоять современным вызовам и современным противникам на поле боя."
 NEP_the_guns_of_a_modern_age: "Орудия современной эпохи"
 NEP_the_guns_of_a_modern_age_desc: "Артиллерия долгое время занимала незаменимую роль в войне, и ее важность со временем только росла, однако даже сегодня вам будет трудно найти достаточно непальских солдат, знакомых с оборудованием настолько, чтобы создать батальон. Если мы хотим модернизировать армию, приобретение артиллерии для наших войск и обучение их ее использованию должно быть нашим главным приоритетом."
 NEP_expand_the_labour_corp: "Расширение Трудового корпуса"
 NEP_expand_the_labour_corp_desc: "Хотя в непальской армии, безусловно, есть солдаты, которые могут подпасть под классификацию инженеров или саперов, было бы почти неловко сравнивать их с настоящими инженерными ротами великих держав мира. Тем не менее, даже со своей неопытностью эти люди могут легко послужить идеальным фундаментом для создания нового и расширенного Трудового корпуса, который однажды может оказаться наравне с ними."
 NEP_copying_indian_tactics: "Копирование индийской тактики"
 NEP_copying_indian_tactics_desc: "Индийская революция научила многих тому, как будет вестись война с современным оборудованием в Индии, и поэтому индийские армии быстро начали формулировать новые доктрины, основанные на их опыте. Вместо того чтобы пытаться самостоятельно разрабатывать идеи о том, как мы будем сражаться в Индии, было бы гораздо проще просто черпать вдохновение у них, так как они уже проделали за нас тяжелую работу."
 NEP_utilise_contemporary_planning_methods: "Использование современных методов планирования"
 NEP_utilise_contemporary_planning_methods_desc: "Война стала настолько многогранной, что традиционные методы планирования сражений усложнились, и мы не можем рассчитывать на победу с тактикой, разработанной во времена, когда самым крупным объектом, летающим над полем боя, был голодный стервятник. Огромные усилия должны быть направлены на модернизацию наших методов, возможно, по образцу наших индийских соседей, у которых мы уже черпаем значительные знания."
 NEP_capitalise_on_volunteer_eagerness: "Использование энтузиазма добровольцев"
 NEP_capitalise_on_volunteer_eagerness_desc: "Если и есть область, в которой Непал не испытывает недостатка, так это люди, готовые взять винтовку и отправиться на фронт. И в 1914, и в 1925 годах тысячи непальских мужчин покинули страну, чтобы сражаться за наших британских союзников без особых уговоров, и такой энтузиазм все еще широко распространен по всей стране, что мы должны подготовиться использовать для расширения армии."
 NEP_implementation_of_conscription: "Введение воинской повинности"
 NEP_implementation_of_conscription_desc: "Даже с учетом того, что многие непальские мужчины готовы записаться в вооруженные силы без особых уговоров, ухудшающаяся ситуация в регионе означает, что даже этих добровольцев, вероятно, недостаточно для защиты нации в случае угрозы. Поэтому мы должны перейти к внедрению системы воинской повинности для обеспечения национальной безопасности."
 NEP_invest_in_nakhu_rifle_workshops: "Инвестиции в ружейные мастерские Накху"
 NEP_invest_in_nakhu_rifle_workshops_desc: "Непал никогда не был известен производством огнестрельного оружия, но довольно много попыток производить собственные винтовки было предпринято покойным Гехендрой Шамшером Рана в Накху. Хотя это и не особо впечатляет, оставшееся оборудование, использовавшееся для этих операций, определенно лучше, чем ничего, для возрождения усилий по производству винтовок, и поэтому должно быть использовано как наша отправная точка."
 NEP_training_from_foreign_advisors: "Обучение у иностранных советников"
 NEP_training_from_foreign_advisors_desc: "Вопрос о том, станет ли кто-то офицером в непальской армии, часто сводился к вопросу «Насколько близко вы связаны с премьер-министром?», и поэтому стране довольно не хватает настоящего опытного офицерского класса. Если мы хотим изменить это, нам придется пригласить иностранных экспертов для помощи в обучении наших людей из-за упомянутой нехватки опыта."
 NEP_inviting_air_instructors: "Приглашение авиаинструкторов"
 NEP_inviting_air_instructors_desc: "Хотя состоятельные люди в Непале, безусловно, слышали о существовании самолетов, в стране очень мало тех, кто действительно может подтвердить их существование. Поэтому попытка создать какой-либо уровень военно-воздушных сил, безусловно, будет сложной задачей, которая будет почти полностью зависеть от сторонних экспертов и пилотов. Возможно, с их поддержкой мы однажды сможем поднять в небо несколько собственных самолетов."

 NEP_protection_of_nepalese_independence: "Защита непальской независимости"
 NEP_protection_of_nepalese_independence_desc: "Вместо того чтобы просто быть подчиненным более сильному соседу, Непал твердо противостоял иностранному контролю, успешно избежав тирании Рана. Однако такую свободу не следует воспринимать как данность, и мы должны гарантировать, что мы никогда больше не окажемся в положении подчиненных."
 NEP_resolving_the_bhutan_conflict: "Разрешение конфликта с Бутаном"
 NEP_resolving_the_bhutan_conflict_desc: "За исключением нескольких десятилетий, когда британцы мешали им это делать, большая часть истории Бутана включала насильственные набеги на соседей, особенно на бывшее королевство Сикким. В результате индийской революции мы обеспечили контроль над Сиккимом, разозлив бутанцев, которые с тех пор совершают набеги на нас. Пришло время отомстить за эти набеги и, возможно, освободить непальское меньшинство, которое Бутан так жестоко угнетает."
 NEP_integration_of_the_frontiers: "Интеграция пограничных территорий"
 NEP_integration_of_the_frontiers_desc: "Официально задуманное как временная мера, пограничные регионы Уттаракханд и Дарджилинг были заняты непальскими войсками для британцев с момента начала восстания в Индии. Учитывая наше намерение порвать с иностранным контролем любого рода, было бы разумно просто сохранить наш контроль над этими регионами. В конце концов, конечно, эти земли когда-то были непальскими, будучи просто украденными у нас британскими завоеваниями, и поэтому мы имеем право владеть ими."
 NEP_punishing_tibetan_insolence: "Наказание тибетской наглости"
 NEP_punishing_tibetan_insolence_desc: "Тибетцы долгое время были наглым народом, часто относясь к нам так, как будто они лучше нас, выдвигая нелепые требования и угнетая наш народ. Несколько лет назад их жестокое убийство непальских граждан чуть не привело к войне между нами, предотвращенной только страхом вмешательства Калькутты или Пекина, но теперь, когда и то, и другое вызывает меньше беспокойства, наконец пришло время поставить тибетцев на место."
 NEP_reaffirm_the_friendship_treaty: "Подтвердить договор о дружбе"
 NEP_reaffirm_the_friendship_treaty_desc: "Поскольку поддержка Доминиона жизненно важна для нашего выживания, а наша страна снова прочно находится в британской сфере, мы должны попытаться перезаключить договор о дружбе, который мы достигли с Британией, но теперь с нашими друзьями в [RAJ.Capital.GetCapitalVictoryPointName]. Этот договор был впервые подписан до того, как индийцы лишились своей нынешней независимости, и поэтому важно признать его преемственность с Доминионом отдельно от британцев, просто как символический жест наших прочных связей, если не что иное."
 NEP_uphold_gurkha_commitments: "Соблюдать обязательства по гуркхам"
 NEP_uphold_gurkha_commitments_desc: "Непальские войска, действующие в британских батальонах гуркхов, были основой выживания британского правления во время Индийской революции, и они, вероятно, останутся таковыми до тех пор, пока Доминион продолжает существовать. Чтобы отплатить за их поддержку в остановке нашей собственной революции, мы должны убедиться, что люди по-прежнему отправляются на помощь нашим индийским друзьям, и приобрести материалы, необходимые для их обучения для будущих начинаний."
 NEP_technological_exchange_with_raj: "Технологический обмен с Доминионом"
 NEP_technological_exchange_with_raj_desc: "Наш союз с Доминионом представляет собой прекрасную возможность для передачи знаний между нашими двумя странами, и теперь иностранные промышленные эксперты и современные технологические прорывы находятся у нас под рукой. Такую возможность, несмотря на наше нежелание полностью индустриализировать нацию, не следует просто игнорировать, и поэтому мы должны попытаться воспользоваться ею незамедлительно."
 NEP_under_the_wings_of_the_republic: "[NEP_HND_or_PRF]"
 NEP_under_the_wings_of_the_republic_HND: "Под крылом Республики"
 NEP_under_the_wings_of_the_republic_PRF: "Искать соглашения с Федерацией"
 NEP_under_the_wings_of_the_republic_desc: "Без поддержки индийцев вполне вероятно, что «Мукти Сена» была бы разгромлена, и Непал страдал бы под гнетом Рана вечно. Мы никогда не забудем великий дар свободы, который индийцы нам предоставили, и мы должны стремиться публично признать жизненно важную роль, которую они сыграли, чтобы показать нашу благодарность."
 NEP_seek_indian_economic_aid: "Искать индийскую экономическую помощь"
 NEP_seek_indian_economic_aid_desc: "Индустриализация Непала будет непростой задачей, и попытка справиться с ней исключительно своими силами вряд ли приведет к быстрым или эффективным результатам. К счастью, у наших новых друзей на юге есть такая сильная промышленность, чтобы помочь нам, даже с учетом разрушений гражданской войны. С их помощью Непал, возможно, сможет однажды назвать себя по-настоящему современной нацией."
 NEP_acquire_blueprints_from_ishapore: "Получить чертежи из Ишапура"
 NEP_acquire_blueprints_from_ishapore_desc: "Основанный сначала британцами и значительно расширенный после его захвата [HND.GetNameDef], Ишапур является, возможно, одним из самых продуктивных винтовочных заводов во всей Азии, и поэтому имеет возможность производить большое количество огнестрельного оружия. Если мы хотим производить оружие, более подходящее для XX века, чем модифицированные Мартини-Генри, которые все еще использует большинство наших войск, нет места лучше для получения чертежей, чем Ишапур."
 NEP_renegotiate_defence_obligations: "Пересмотреть оборонные обязательства"
 NEP_renegotiate_defence_obligations_desc: "С окончанием гражданской войны в Индии и победой нашего союзника над их варварскими соперниками нынешний уровень военного присутствия Индии в Непале больше не нужен, и поэтому мы можем настаивать на большей степени независимости от их влияния. Будем надеяться, что наши союзники согласятся с этим настроением и позволят нам снова действовать как свободная нация."

 NEP_the_padma_shumsher_economic_plan: "Экономический план Падмы Шамшера"
 NEP_the_padma_shumsher_economic_plan_desc: "Несмотря на оппозицию этой концепции со стороны премьер-министра, а также многих крупных членов династии, Доминион потребовал, чтобы мы начали индустриализацию ради безопасности обеих наших наций. Они поддержали идеи старшего члена Падмы Шамшера Рана, чьи радикальные идеи поставили его в противоречие со значительной частью правительства, но, вероятно, позволят достичь того, чего требует от нас Доминион."
 NEP_implementing_the_company_act: "Внедрение Закона о компаниях"
 NEP_implementing_the_company_act_desc: "Маловероятно, что непальская промышленность начнется сама по себе без вмешательства правительства, так как немногие в стране, чья фамилия не заканчивается на «Рана», имеют возможность сделать это. Поэтому задача правительства — дать толчок промышленному развитию, и поэтому мы должны начать создание множества государственных предприятий в текстильной и других таких легкодоступных отраслях."
 NEP_importing_displaced_indian_workers: "Импорт перемещенных индийских рабочих"
 NEP_importing_displaced_indian_workers_desc: "Годы конфликта в Индии оставили многих перемещенными и отчаявшимися, что делает их довольно идеальной группой работников для наших расцветающих отраслей. Многие из этих людей уже будут иметь опыт работы на фабриках, и, нанимая их, мы также можем избежать расширения прав и возможностей среднего непальского гражданина больше, чем нам нужно."
 NEP_ensure_defence_of_the_regime: "Обеспечить защиту режима"
 NEP_ensure_defence_of_the_regime_desc: "Несмотря на все наши усилия, вполне вероятно, что в будущем мы можем столкнуться с повторением недавнего восстания, и неясно, сможем ли мы продолжать полагаться на другие страны в производстве оружия, необходимого для поражения любого дальнейшего мятежа. Поэтому мы должны возродить прежние усилия по производству оружия на месте, даже если оно может несколько уступать тому, что можно приобрести в других местах."
 NEP_place_limits_on_tax_skimming: "Ввести ограничения на уклонение от налогов"
 NEP_place_limits_on_tax_skimming_desc: "Несмотря на яростную оппозицию идее со стороны членов его династии, Падма Шамшер заявил о своем желании сократить количество денег, уводимых у государства для финансирования многочисленных прихотей Рана. С его поддержкой со стороны Доминиона мы мало что можем сделать, чтобы остановить такую тиранию."
 NEP_cotton_and_jute_mills_in_biratnagar: "Хлопковые и джутовые фабрики в Биратнагаре"
 NEP_cotton_and_jute_mills_in_biratnagar_desc: "Город Биратнагар, расположенный на равнинных землях Тераи, является идеальным местом для первых крупных промышленных проектов страны. Мы должны стремиться создать здесь крупные джутовые и хлопковые фабрики, так как его близость к индийской границе означает, что продукция, произведенная на этих фабриках, такая как шпагат, джутовые мешки и одежда, может быть легко экспортирована нашему богатому соседу."
 NEP_expanding_the_industrial_council: "Расширение Промышленного совета"
 NEP_expanding_the_industrial_council_desc: "Удьог Паришад, Промышленный совет, представляет собой одну из немногих предыдущих попыток Джуддхи Рана рассмотреть идею индустриализации. Он был создан как способ направить финансирование на любые усилия по индустриализации, в первую очередь направленные на расширение таких элементов, как лесозаготовительная промышленность, от которой его члены семьи получают значительную прибыль. Теперь он послужит идеальным фундаментом для содействия росту других ключевых национальных отраслей."
 NEP_furthering_thoshe_mining_efforts: "Развитие добычи в Тхоше"
 NEP_furthering_thoshe_mining_efforts_desc: "Шахта Тхоше в Рамечхапе является одной из крупнейших по добыче железа в стране, хотя добыча значительно замедлилась в последние годы. Однако местный доступ к железу для стали, вероятно, будет чрезвычайно важен в индустриализации, и поэтому мы должны гарантировать, что эти усилия по добыче не только возобновятся, но мы также должны контролировать их значительное расширение."

 NEP_bringing_nepal_into_the_industrial_age: "Введение Непала в индустриальную эпоху"
 NEP_bringing_nepal_into_the_industrial_age_desc: "Непал как нация давно имеет потенциал стать промышленной державой, но в результате плохого управления Рана он оказался на столетия позади своих соседей. Главным приоритетом правительства после стабилизации ситуации должно стать изменение курса и, наконец, вывод Непала на путь индустриализации и экономического роста."
 NEP_beginning_the_five_year_plan: "Начало Пятилетки"
 NEP_beginning_the_five_year_plan_desc: "Концепция годовых экономических планов стала довольно распространенной в последние годы как решение экономической отсталости. Эти идеи широко распространены по другую сторону границы в Индии и постепенно начали приживаться среди членов правительства в Катманду. С победой их аргументов Непал теперь готов начать собственную пятилетку, к концу которой должна быть достигнута индустриализация."
 NEP_inviting_indian_investors: "Приглашение индийских инвесторов"
 NEP_inviting_indian_investors_desc: "Непальская экономика вряд ли вырастет полностью сама по себе, и не стоит ожидать, что она это сделает. Многие по ту сторону границы в Индии почти пускают слюни при мысли о том, чтобы сделать себе имя, инвестируя в расцветающую промышленность Непала, и мы должны воспользоваться таким энтузиазмом для содействия нашему росту."
 NEP_utilising_our_natural_beauty: "Использование нашей природной красоты"
 NEP_utilising_our_natural_beauty_desc: "Хотя Непал и пострадал от Индийской революции, он начал приобретать некоторую известность среди многих иностранцев благодаря своей природной красоте. Есть бесчисленное множество богатых мужчин и женщин, которые заплатят целое состояние, чтобы иметь возможность подняться на наши горы и познакомиться с нашей культурой, и нет причин отказывать таким посетителям в возможности предоставить нам свое богатство."
 NEP_growing_the_pashmina_industry: "Развитие индустрии пашмины"
 NEP_growing_the_pashmina_industry_desc: "Хотя шерсть кашемировых коз так сильно ассоциируется с Кашмиром, вплоть до того, что названа в честь региона, изделия из пашмины, произведенные из нее, часто изготавливаются и в Непале. В течение многих лет непальскую пашмину носили даже так далеко, как в гламурном Нью-Йорке в Америке, и, несмотря на их гражданскую войну, все еще существует высокий спрос как там, так и во всем мире на эти предметы роскоши; спрос, который мы должны стремиться удовлетворить, насколько это возможно."
 NEP_towards_a_national_highway_network: "К национальной сети автомагистралей"
 NEP_towards_a_national_highway_network_desc: "Хотя проект Почтового шоссе, начатый Рана, безусловно, является фантастической отправной точкой, мы должны мечтать о большем и стремиться соединить всю нацию вместе через грандиозную сеть автомагистралей. Хотя маловероятно, что это будет завершено в ближайшее время, даже самое базовое развитие, вероятно, принесет значительные краткосрочные выгоды для нации."
 NEP_adopting_modern_irrigation_methods: "Внедрение современных методов орошения"
 NEP_adopting_modern_irrigation_methods_desc: "Орошение жизненно важно для роста урожая, и в то время как остальной мир начал отходить от дней, когда отсутствие дождя могло искалечить страну, многие регионы Непала все еще находятся под угрозой голода, вызванного засухой. Мы должны стремиться улучшить наши ирригационные сети, в надежде, что однажды ни один человек в Непале не сможет сказать вам, какова на вкус вареная трава."
 NEP_ramp_up_national_exports: "Увеличение национального экспорта"
 NEP_ramp_up_national_exports_desc: "Будущее экономики Непала должно стать таким, где мы будем получать большую выгоду от экспорта продукции, начиная от сырых металлов и заканчивая сложными изделиями одежды и таймерами. Мы должны наращивать производство во всех отраслях, насколько это возможно, одновременно ища новые рынки для продажи этих товаров, и со временем вся нация, вероятно, начнет получать выгоду."

 NEP_paving_the_postal_highway: "Мощение Почтового шоссе"
 NEP_paving_the_postal_highway_desc: "Проект Почтового шоссе был инициирован в начале десятилетия с целью проложить одну непрерывную дорогу вдоль всей южной границы страны, в первую очередь ориентированную на доставку почты, как следует из названия. Однако большая часть этого проекта все еще остается незавершенной, и дальнейшее его развитие должно стать национальным приоритетом теперь, когда правительство стало намного стабильнее."
 NEP_revive_the_government_railway_plan: "Возрождение правительственного плана железных дорог"
 NEP_revive_the_government_railway_plan_desc: "Планы создания первой железной дороги в Непале, целью которой было соединить местную лесозаготовительную промышленность у границы с покупателями в Индии, были полностью сорваны индийской революцией. Поскольку ситуация в Индии и Непале достаточно стабильна, эти планы должны быть возрождены как основа железнодорожного транспорта в Непале."
 NEP_connecting_to_the_frontier: "Соединение с границей"
 NEP_connecting_to_the_frontier_desc: "Хотя непальские войска могут контролировать многие из пограничных регионов, они действуют довольно автономно от столицы из-за того, как трудно добраться до них из Катманду. С нашим недавним выходом в железнодорожную инфраструктуру было бы разумно попытаться построить железные дороги, соединяющие границу, для дальнейшего расширения нашего охвата."
 NEP_bringing_in_foreign_experts: "Привлечение иностранных экспертов"
 NEP_bringing_in_foreign_experts_desc: "Технологическое развитие жизненно важно для растущей экономики, и все же Непалу довольно не хватает кого-либо, кто мог бы действительно возглавить такое развитие. Поэтому нам следует попытаться пригласить тех со всего мира, кто готов работать за приличную государственную зарплату, чтобы возглавить наши усилия по развитию в будущем."
 NEP_constructing_the_sundarijal_station: "Строительство станции Сундариджал"
 NEP_constructing_the_sundarijal_station_desc: "Уже довольно много лет существуют планы по строительству гидроэлектростанции у истока реки Багмати в Сундариджале. Небольшая гравитационная плотина в этом месте идеально подойдет для обеспечения электроэнергией Катманду, и с недавним ростом промышленного потенциала мы наконец-то в состоянии фактически построить такую станцию."

 NEP_regency_of_the_ranas: "Регентство Рана"
 NEP_regency_of_the_ranas_desc: "Несмотря на окружение врагами извне и предателями изнутри, правительство Рана выжило. Социалистический сброд «Мукти Сена» был разбит и бежал обратно к своим хозяевам в Калькутту вместе с королем-предателем. Подойдя так близко к краю пропасти, вполне естественно, что направляющая рука премьер-министра должна ужесточить свою хватку, чтобы предотвратить повторение этой катастрофы."
 NEP_replacing_the_rebellious_ruler: "Замена мятежного правителя"
 NEP_replacing_the_rebellious_ruler_desc: "С бегством неблагодарного короля Трибхувана из страны вместе с большей частью его семьи Регент остался перед дилеммой: служить по номинальному повелению вакантного трона. Ради обеспечения стабильности королевства и преемственности правительства Рана мы должны быстро найти кандидата с законными правами, который также понимает, кто на самом деле держит бразды правления."
 NEP_purge_the_army_of_royalists: "Очистить армию от роялистов"
 NEP_purge_the_army_of_royalists_desc: "Хотя нам удалось на данный момент отбиться от угрозы реставрации роялистов, большая часть армии остается преданной побежденному Королю и королевскому дому. Поскольку мы не можем полностью ликвидировать монархию, мы должны гарантировать, что армия не станет оплотом для любых глупцов, надеющихся повторить пример бывшего короля Трибхувана."
 NEP_furthering_control_of_village_courts: "Усиление контроля над сельскими судами"
 NEP_furthering_control_of_village_courts_desc: "По всему Непалу большая часть повседневного управления осуществляется местными органами, чьи интересы и заботы также являются местными. Увеличивая наше участие в этих органах, мы можем гарантировать, что желания и потребности правительства действительно ощущаются по всей стране и известны людям."
 NEP_ramp_up_revenue_extraction: "Увеличить извлечение доходов"
 NEP_ramp_up_revenue_extraction_desc: "Очевидно, что мы были слишком добры к среднему гражданину, так как они богатеют, в то время как государство изо всех сил пытается финансировать себя. Мы должны исправить эту несправедливость, увеличив налоги везде, где это возможно, и земельный налог малгуджари, безусловно, является идеальным кандидатом для такого увеличения. Хотя крестьяне, конечно, будут возражать, мы никогда не слушали их мнения по таким вопросам, и не собираемся начинать делать это сейчас."
 NEP_developing_a_moral_education_system: "Развитие системы нравственного воспитания"
 NEP_developing_a_moral_education_system_desc: "Если побежденная угроза «Мукти Сена» и показала что-то, так это то, что значительная часть Непала пугающе открыта для проповедей негодяев, зараженных абсурдными иностранными идеологиями. Ради будущего нации следующее поколение должно вырасти с правильным пониманием своего места в мире и мудрости своих лидеров."
 NEP_harness_gorkha_nationalist_rhetoric: "Использование риторики национализма горкхов"
 NEP_harness_gorkha_nationalist_rhetoric_desc: "Среди некоторых младших членов династии медленно растет убеждение, что для продолжения правления Рана в долгосрочной перспективе нам нужно убедить среднего непальца, что мы работаем в его интересах. Поэтому было предложено попытаться использовать растущее националистическое движение, существующее как здесь, так и за границей, позиционируя Рана как ярых сторонников национализма горкхов против иностранного господства."
 NEP_empowerment_of_the_council_of_ministers: "Расширение полномочий Совета министров"
 NEP_empowerment_of_the_council_of_ministers_desc: "С заменой Короля исполнительная власть теперь находится под нашим полным контролем, а премьер-министр и его кабинет беспрепятственно управляют кораблем государства. Чтобы закрепить это изменение, Совету министров должна быть предоставлена большая свобода действий для формирования будущего курса нации."
 NEP_remove_vestiges_of_royal_authority: "Устранить остатки королевской власти"
 NEP_remove_vestiges_of_royal_authority_desc: "Хотя король Самраджья понимает свое положение, нет никакой гарантии, что будущие короли не будут принимать глупые и поспешные решения. Чтобы защитить достоинство королевского дома, мы должны дать понять, что номинальные полномочия, которыми когда-то обладали короли в Непале, теперь принадлежат премьер-министру и его лояльному правительству. Эта нация подчиняется Рана, и ничто никогда этого не изменит."
 NEP_reorganise_decaying_ministries: "Реорганизация разлагающихся министерств"
 NEP_reorganise_decaying_ministries_desc: "Хотя мы уже очистили институты Непала от врагов, в правительстве остается много расточительства и бесплодных усилий, которые можно устранить. Кроме того, мы можем использовать эту возможность, чтобы вознаградить тех, кто остался верным, и наказать тех, кто решил ничего не делать в наш час нужды, даже если они никогда не выступали против нас."
 NEP_establish_a_controlled_legislature: "Учредить контролируемый законодательный орган"
 NEP_establish_a_controlled_legislature_desc: "Явно продемонстрировав свое господство над государством, милостивый премьер-министр готов даровать своим подданным дар представительства, причем самые способные и преданные будут отобраны со всей страны, чтобы помогать нашим мудрым правителям в управлении. Поистине, Рана — самые щедрые из правителей."
 NEP_absolute_power_of_the_prime_minister: "Абсолютная власть премьер-министра"
 NEP_absolute_power_of_the_prime_minister_desc: "Кораблю нужен один капитан, а нации — один лидер; служить кораблю государства — значит действовать с абсолютным послушанием воле премьер-министра. Рана правили таким образом почти столетие и будут править так еще столетие, теперь без необходимости маскировать или разбавлять свою власть уступками слабым и недостойным. Рана — это Непал, и отрицать это — значит отрицать реальность."

 NEP_our_ruler_glorious: "Наш славный правитель"
 NEP_our_ruler_glorious_desc: "Сто лет узурпации были прекращены рукой нашего славного короля Трибхувана! Превратив попытки Доминиона и Республики использовать Непал как оружие друг против друга в мощный инструмент для получения поддержки элементов как «Мукти Сена», так и правительства Рана, Король снова находится в авангарде политики и правительства Непала."
 NEP_his_majestys_loyal_government: "Правительство Его Величества"
 NEP_his_majestys_loyal_government_desc: "С реставрацией Короля Непал теперь стоит по-настоящему независимым, не под железным кулаком коррумпированного тирана Рана, преклоняющего колени перед британцами, и не под радикальными социалистами, обязанными правительству в Калькутте, а действительно как своя собственная страна. Мы должны действовать быстро, чтобы воспользоваться этой ситуацией и создать правительство, лояльное Королю и его планам в отношении страны."
 NEP_restoring_power_to_the_sovereign: "Возвращение власти суверену"
 NEP_restoring_power_to_the_sovereign_desc: "При Рана Король стал всего лишь символом, с помощью которого они сохраняли контроль над страной. С правительством, наконец лояльным Королю, мы восстановим практическую власть суверена Непала править."
 NEP_compromise_with_the_ranas: "Компромисс с Рана"
 NEP_compromise_with_the_ranas_desc: "Хотя годы правления Рана были прискорбными, отдельные Рана остаются способными и влиятельными фигурами, игнорировать которых было бы глупо. С нависающей угрозой социализма будет нетрудно пойти на уступки, необходимые для привлечения остатков старого порядка к нам на службу."
 NEP_empowering_local_councils: "Расширение полномочий местных советов"
 NEP_empowering_local_councils_desc: "Король — всего лишь один человек, и правительство может быть только таким обширным в такой стране, как наша. Расширение полномочий местных советов для решения их собственных проблем позволит Королю и его правительству сосредоточиться больше на национальных приоритетах, одновременно создавая ощущение отзывчивого правительства."
 NEP_a_state_that_serves_its_people: "Государство, которое служит своему народу"
 NEP_a_state_that_serves_its_people_desc: "Слишком долго государство управлялось так, как будто его цель — обеспечить выгоду нескольким могущественным фигурам, к разорению всех остальных. Теперь, наделенный властью, король Трибхуван в своей великой мудрости понимает, что долг государства и его правителей — заботиться о благополучии своего народа, и неустанно трудится в этом духе."
 NEP_ensure_royal_control_of_the_army: "Обеспечить королевский контроль над армией"
 NEP_ensure_royal_control_of_the_army_desc: "Теперь, когда период символического правления закончился, крайне важно, чтобы Король восстановил прямую королевскую власть над вооруженными силами. Ни при каких обстоятельствах нельзя позволить будущему узурпатору использовать силы, предназначенные для защиты Королевства, для его разрушения."
 NEP_forming_an_elected_assembly: "Формирование избранной ассамблеи"
 NEP_forming_an_elected_assembly_desc: "Самым важным приоритетом в стабилизации Непала является предоставление народу права голоса. Только работая с народом и для народа и его законных представителей, мы можем вывести Непал из тирании плохого правления Рана."
 NEP_royally_appointed_bharadari_sabha: "Королевски назначенная Бхарадари Сабха"
 NEP_royally_appointed_bharadari_sabha_desc: "Хотя мы пошли на значительные уступки народному правлению, в интересах Королевства, чтобы любая всенародно избранная ассамблея держалась под контролем, чтобы предотвратить вспышку охлократии. Для этой цели мы создадим назначаемую верхнюю палату законодательного органа, укомплектованную людьми, выбранными Королем за их компетентность и мудрость."
 NEP_prioritise_the_need_for_education: "Приоритет необходимости образования"
 NEP_prioritise_the_need_for_education_desc: "Чтобы у Непала было светлое будущее, его народ должен быть готов к решению проблем современного мира. Ядром достижения такого подготовленного населения является образование, вооружающее население знаниями и навыками, которые будут служить им и Непалу долгие годы."
 NEP_under_the_courageous_sovereign: "Под властью отважного суверена"
 NEP_under_the_courageous_sovereign_desc: "В то время как другие стремились захватить власть, обращаясь к чужакам, только у Короля хватило мужества подняться на высоту положения, а не преклонить колени перед теми, кто видит в Непале средство для достижения своих собственных целей. Реставрация заложила основу для вступления Непала в эпоху процветания и безопасности на его собственных условиях."

 NEP_the_unshackling_of_nepal: "Освобождение Непала"
 NEP_the_unshackling_of_nepal_desc: "Наконец тираны Рана были свергнуты, «Мукти Сена» взяли столицу, и нация может наконец смотреть вперед, а не назад. Впервые за многие годы будущее Непала светлое, ведомое не одним человеком, а народом."
 NEP_formation_of_the_interim_government: "Формирование временного правительства"
 NEP_formation_of_the_interim_government_desc: "Успех нашей революции принадлежит монархии так же, как и социалистам, и народ все еще стоит со своим Королем перед лицом неопределенного будущего. Поскольку некоторые упрямо отрицают эту реальность, на «Паришад» ложится задача взять на себя ведущую роль вместе с Королем в переходе Непала к Демократии."
 NEP_a_democratic_maha_sabha: "Демократическая Маха Сабха"
 NEP_a_democratic_maha_sabha_desc: "Следуя двухпалатной модели других демократических стран, Непал создаст верхнюю палату своего законодательного органа, избираемую народом. Эта верхняя палата будет обеспечивать контроль над властью нижней палаты и работать с ней и Королем для управления страной."
 NEP_honour_the_legacy_of_the_martyrs: "Почтить наследие мучеников"
 NEP_honour_the_legacy_of_the_martyrs_desc: "Все те, кто погиб в погоне за светлым будущим, все те, кто сражался и погиб в битве за прекращение тирании Рана, все те, кто умер за Непал, будут почитаться за их героизм и жертву, чтобы будущие поколения могли брать с них пример."
 NEP_uplift_nepal_into_the_20th_century: "Поднять Непал в 20-й век"
 NEP_uplift_nepal_into_the_20th_century_desc: "Будущее Непала лежит в курсе, проложенном Праджа Паришад. В присоединении к современному миру, создании богатства и почитании религии, превращении Непала в одну из передовых стран мира и в том, чтобы гордость народа за свою страну эхом разносилась во всех направлениях на тысячи лет."

 NEP_loyalty_to_the_liberators: "Верность освободителям"
 NEP_loyalty_to_the_liberators_desc: "Революция в Непале была бы невозможна без поддержки наших друзей в Калькутте. В наш самый темный час, когда холодная хватка Рана казалась фактом жизни для Непала, они укрывали и поддерживали «Мукти Сена» и взращивали свободу Непала. Хотя «Паришад», безусловно, более сговорчивы с Королем, чем социалисты, ясно, что будущее Катманду связано с Калькуттой."
 NEP_the_monarchy_problem: "Проблема монархии"
 NEP_the_monarchy_problem_desc: "Решая вопрос с монархией, мы оказываемся зажатыми между нашими принципами, нашими союзниками и реалиями коалиции, которая привела нас к власти в первую очередь. Скорее раньше, чем позже, мы будем вынуждены решить, есть ли у Короля вообще место в будущем Непала."
 NEP_dethrone_the_landlords: "Свергнуть землевладельцев"
 NEP_dethrone_the_landlords_desc: "Первым приоритетом социалистической революции в любой преимущественно сельской стране является отнятие контроля над землей у помещиков и аристократов. Передача земли тем, кто ее обрабатывает, не только ломает базу власти реакционного класса, но и завоевывает лояльность и поддержку кисанов, которые могут много выиграть от упразднения своих хозяев."
 NEP_research_support_from_india: "Исследовательская поддержка из Индии"
 NEP_research_support_from_india_desc: "Хотя наши амбиции связаны с современным миром, пока Непал безнадежно отстает от времени. В исправлении этого наши собственные усилия должны сочетаться с полным сотрудничеством и поддержкой наших союзников в Калькутте. Только тогда Непал сможет начать стремиться к месту в современности."
 NEP_glorify_the_kisan: "Прославлять кисана"
 NEP_glorify_the_kisan_desc: "Если слава нации кому-то и принадлежит, то не отдельной личности, живой или мертвой, а угнетенному классу, чье богатство построило дворцы аристократов и чья продукция кормила армии князей и королей. Именно кисаны служат фундаментом и опорой Непала, и именно для кисанов мы построим будущее Непала."
 NEP_the_land_of_red_mountains: "Страна красных гор"
 NEP_the_land_of_red_mountains_desc: "То, что еще совсем недавно казалось невозможным, свершилось. Следы феодализма и реакции пали по горам и долинам Непала, сменившись яркими знаменами социализма и современности, высоко реющими над головой и окрашивающими землю внизу в ярко-красный цвет."

 NEP_sweep_away_the_ranas_greed: "Смести жадность Рана"
 NEP_sweep_away_the_ranas_greed_desc: "С созданием нового правительства пришло время покончить с последними остатками коррупции и непотизма Рана, которые так много украли у Непала. Эпоха клептократии, которая привела нацию к обнищанию, будет сметена и никогда не вернется."
 NEP_developing_panchayat_self_governance: "Развитие самоуправления панчаятов"
 NEP_developing_panchayat_self_governance_desc: "В поисках плана для будущего Непала нам очень повезло разделить одну из старейших систем местного самоуправления в мире, которая соответствует нашим демократическим принципам. Развитие и расширение прав и возможностей этой системы позволит нам не только модернизировать местное самоуправление, но и заручиться поддержкой и сотрудничеством доверенных местных институтов."
 NEP_establishment_of_the_pradhan_nyayalaya: "Учреждение Прадхан Ньяялая"
 NEP_establishment_of_the_pradhan_nyayalaya_desc: "Для построения демократического будущего независимость судебной власти является жизненно важным шагом. Создавая ответственный Прадхан Ньяялая (Верховный суд), мы гарантируем, что закон находится вне досягаемости для использования в качестве оружия партийными лидерами и потенциальными тиранами."
 NEP_protection_of_the_fundamental_principles: "Защита фундаментальных принципов"
 NEP_protection_of_the_fundamental_principles_desc: "Без принципов справедливости и человеческого достоинства, которые нами двигали, революция, за которую мы сражались против Рана, — это пустой захват власти. Поэтому наш высший долг как участников революции — следовать этим фундаментальным принципам и защищать их от любых нападок, а также создавать то, что защитит их в свою очередь."

