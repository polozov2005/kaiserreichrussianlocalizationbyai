 NEP_matrika_prasad_koirala_sic_desc: "§YРодился:§! §L1 января 1912 года, в Бенаресе, Объединенные провинции Агры и Уда, Британская Индия§!"
 NEP_tanka_prasad_acharya: "Танка Прасад Ачарья"
 NEP_tanka_prasad_acharya_leader_desc: "§YРодился:§! §L31 декабря 1912 года в Навалпараси, Королевство Непал§!\n§YБиография:§! §LТанка Прасад Ачарья родился у Тики Прасада Ачарьи, районного налогового инспектора с двумя женами, от первой из которых родился Танка. Подрастая, Танка поддерживал очень близкие отношения со своей матерью и попал под сильное влияние не только ее моральных учений, но и учений индуистской веры. Астрологически рожденный между знаками Шукра и Брихаспати, их «материалистическое» и «духовное» влияние заставило многих предсказать, что он когда-нибудь станет Раджой (королем) или Джоги (святым), ожидания, которые глубоко повлияли на него по сей день.\n\nВ очень юном возрасте его отец раскрыл коррупцию у одного из своих подчиненных, однако этот подчиненный был оправдан, а Тику заставили заплатить огромный штраф как начальника Рана. С тех пор Танка питал к ним глубокую ненависть и стал одержим политикой, что привело к основанию Непал Праджа Паришад.\n\nСчитая себя человеком настоящего, Танка видит свое прошлое как простую древность, и точно так же он видит феодальное прошлое Непала. Танка планирует утвердить независимость Непала и привести его в современную эпоху, даже если эта задача окажется чрезвычайно сложной.§!"
