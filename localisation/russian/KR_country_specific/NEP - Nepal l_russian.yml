 NEP_indian_nightmare_volunteer_RAJ_tt: "(§Y[RAJ.GetNameWithFlag]§!) $volunteer_limit_plus_one_tt$"
 NEP_indian_nightmare_volunteer_PRF_tt: "(§Y[PRF.GetNameWithFlag]§!) $volunteer_limit_plus_one_tt$"
