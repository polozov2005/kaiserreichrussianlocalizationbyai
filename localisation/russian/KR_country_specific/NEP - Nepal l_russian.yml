l_russian:

 nepal_focus: "Nepal Focus Tree"

### Events ###

nepal_events.1.t: "Арест Дашаратха Чанда"
 nepal_events.1.d: "С тех пор как режим в Калькутте начал укреплять свою власть, они используют любую возможность для финансирования мятежей против непальского государства, пытаясь превратить его в лояльную марионетку, возможно, даже с планами последующей аннексии. Так называемый «Непал Праджа Паришад», или Народный совет, стал одной из основных групп, получающих поддержку от Республики в их попытках разжечь революцию в Непале. Несмотря на то, что они были основаны совсем недавно, им удалось собрать поразительное количество сторонников на высоких постах.\n\nОднако пока Калькутте придется искать новую змею, которую можно подослать к нам, поскольку удача улыбнулась нам: сегодня в ходе рейда против членов «Паришад» был арестован второй человек в организации, Дашаратх Чанд Тхакури. Хотя целью рейда был не он лично, это приятный сюрприз. Если фортуна будет к нам благосклонна, этот арест заставит повстанцев метаться, как курицы с отрубленными головами, в лихорадочных поисках нового руководства."
 nepal_events.1.a: "С ещё одним мятежником покончено."

 nepal_events.2.t: "Шепот из дворца"
 nepal_events.2.d: "Несмотря на надежды, что «Паришад» угаснет, пока Чанд Тхакури находится за решеткой, отчеты тревожно свидетельствуют о том, что группа стала активнее, чем когда-либо, возможно, стремясь действовать быстро, пока остальная часть их руководства не постигла та же участь. Однако еще большее беспокойство вызывают слухи, исходящие из дворца, касательно личного тренера короля, Дхармы Бхакты Матхемы. Матхема давно находится под подозрением у премьер-министра, так как этот человек когда-то был напрямую связан с группами, ныне управляющими правительством в Калькутте, однако против него никогда не было конкретных улик.\n\nНедавние слухи, однако, мало способствуют снятию подозрений: дворцовый персонал сообщает, что слышал довольно крамольные высказывания, обращенные к королю в моменты, которые считались уединенными. Один из слуг даже зашел так далеко, что заявил, будто король согласился с этими настроениями, якобы полагая, что с премьер-министром нужно что-то «делать». Хотя у нас мало конкретных доказательств, кроме сплетен слуг (что само по себе вряд ли убедительно, учитывая, что их подслушивание уже граничит с изменой), трудно не поддаться паранойе по поводу того, какой яд вливают в уши короля..."
 nepal_events.2.a: "Даже если это правда, король не представляет большой угрозы."

 nepal_events.3.t: "Слухи из Калькутты"
 nepal_events.3.d: "В дополнение к возросшей активности «Паришад» и тревожным сплетням из дворца, мы получили разрозненные отчеты о событиях в Калькутте, носящих еще более мрачный характер. Разведка законного индийского правительства в Лахоре еще в прошлом году информировала нас о планах калькуттского режима нанести по ним удары в надежде вновь разжечь войну на субконтиненте, хотя эти планы были отложены после катастрофической попытки прощупать границы Доминиона. Теперь они сообщили нам, что эти планы, по-видимому, были возобновлены, и, что еще более тревожно, сам Непал был включен в это уравнение.\n\nХотя Непал и не является фундаментальной частью планов вторжения, их агенты утверждают, что в Калькутте состоялась встреча с непальскими мятежниками, включая лидера «Паришад» Танку Прасада Ачарью и лидера социалистов Рама Прасада Рая, по поводу непальского вопроса. Якобы обсуждался союз между ними в надежде создать единый фронт против Рана и начать революцию против нас как первую костяшку домино, которая обрушит влияние Доминиона на субконтиненте. Хотя исход встречи пока неизвестен, а отчеты предполагают, что она в лучшем случае закончилась безрезультатно, это явно самый высокий уровень организованности революционеров с момента начала их мятежа, и поэтому с этим нужно разобраться максимально жестко, пока ситуация не усугубилась."
 nepal_events.3.a: "Тревожно."

 nepal_events.4.t: "Дарджилингский заговор"
 nepal_events.4.d: "Похоже, предыдущие отчеты о безрезультатности встречи повстанцев были слишком хороши, чтобы быть правдой: новости из приграничного города Дарджилинг подтвердили наши худшие опасения. Был заключен союз между «Паришад» и социалистической «Трудовой партией Сватантра», которые теперь действуют под общим названием «Мукти Сена», или Армия Освобождения. Они открыто заявили о своих намерениях свергнуть династию Рана любыми необходимыми средствами при поддержке своих товарищей, которые «желают видеть освобождение Непала».\n\nЭта новость вызвала волну страха в Катманду, и все верные члены династии Рана сплотились вокруг премьер-министра Джуддхи Рана. Король, следуя совету премьер-министра, публично заявил о своем доверии правительству в попытках подавить этот мятеж, хотя это вряд ли окажет большое влияние из-за его очевидной неискренности. Учитывая этот союз между повстанцами и их полную поддержку со стороны Калькутты, кажется очевидным, что эта «Армия Освобождения» не остановится ни перед чем, чтобы увидеть конец правления Рана над Непалом, и они должны быть раздавлены, если, конечно, такая революция не является желательной."
 nepal_events.4.a: "Рана должны быть свергнуты."
 nepal_events.4.b: "Королевство поддерживает премьер-министра."

 nepal_events.5.t: "Дарджилингский заговор"
 nepal_events.5.d.RAJ: "На фоне изобилия слухов и отчетов о растущем милитаризме режима на востоке неудивительно слышать, что Калькутта начала открыто организовывать восстание против правительства Непала — одного из немногих государств в регионе, все еще дружественных нам. Непальское правительство во главе с премьер-министром Джуддхой Рана в прошлом оказывало нам значительную помощь, и теперь они обратились к нам с просьбой помочь подавить этот мятеж, пока он не разросся еще больше.\n\nЭти повстанцы, действующие под именем «Мукти Сена» (Армия Освобождения), хотят свергнуть Рана и вернуть к власти непальского короля — исход, который в лучшем случае оставит их нейтральными, а в худшем — даст Республике нового союзника для войны против нас. Мы не можем допустить такого исхода и должны помочь нашим друзьям в Катманду, которые, мы надеемся, смогут помочь нам в ответ, когда Калькутта неизбежно попытается напасть на нас."
 nepal_events.5.d.HND: "Вскоре после того, как Хак был впервые назначен Председателем, многообещающему молодому человеку из Непала по имени Танка Прасад Ачарья удалось организовать встречу с правительственными чиновниками в поисках поддержки для свержения тиранического режима Рана и возвращения власти непальскому королю. Несмотря на наше неодобрение монархов любого рода, был сделан выбор поддержать этого человека, так как Рана долгое время были верными союзниками британцев, и разрушение их власти над Непалом лишило бы Лахор войск гуркхов, на которые они так полагаются. Ачарья вместе со своими союзниками теперь возглавляет основную оппозицию правительству Рана в «Непал Праджа Паришад», и с нашей поддержкой они стали грозной силой против Рана.\n\nОднако недавно второй человек в группе, Дашаратх Чанд Тхакури, был арестован режимом Рана, и впоследствии «Паришад» прибежали в Калькутту за дальнейшей поддержкой, чтобы заполнить пустоту, оставшуюся после него. Согласно соглашению, достигнутому с Ачарьей, его организация сформировала союз с более социалистически настроенными непальскими революционерами, базирующимися в Республике, которые теперь действуют вместе под единым знаменем «Мукти Сена», или Армии Освобождения.\n\nВернув операцию «Гром» на повестку дня, мы отправили «Мукти Сена» обратно в Непал в надежде разжечь революцию против пробританских Рана с конечной целью установить в Катманду дружественный режим, который поможет нам против Лахора. Мы должны обеспечить их успех, если не хотим получить фронт на севере, когда наконец пробил час для остатков британского правления."
 nepal_events.5.a: "Мы не можем позволить Непалу пасть."
 nepal_events.5.b: "Непал должен быть освобожден от тирании."

 nepal_events.6.t: "Слухи о контрабанде"
 nepal_events.6.d: "Несмотря на сохраняющуюся напряженность в отношениях с Республикой, означающую, что наша общая граница охраняется гораздо тщательнее, наши люди, к сожалению, не могут находиться везде одновременно. За последние несколько дней поступили разрозненные сообщения о небольшой группе, пересекшей границу в районе реки Гандак, проскользнувшей мимо охраны и тащившей за собой рикшу. Однако, что довольно удивительно, все сообщения об этой группе отвергают любые опасения по поводу того, что это оружие или другое военное снаряжение из Калькутты. Вместо этого утверждается, что это некий механизм, и наиболее вероятная догадка — печатный станок.\n\nПодтверждение того, что эта контрабанда не является оружием для повстанцев, успокоило армию, и никто в данный момент не отправлен на поиски этих людей и их рикши, но в целом это вызвало большое недоумение: зачем им было так стараться? Ввоз печатного станка в Непал не является чем-то незаконным, цензура еще не зашла так далеко, поэтому лучшее предположение, которое было выдвинуто, заключается в том, что эти люди — воры, пытающиеся сбыть сложный на вид предмет, который им удалось раздобыть.\n\nТем не менее, хотя этот акт контрабанды, вероятно, можно списать на мелкую кражу, тот факт, что им это удалось, означает, что в следующий раз это легко могут быть оружие или взрывчатка. Охрана границы должна быть усилена, а те, кто сейчас дежурит на этом переходе, как минимум получат строгий выговор."
 nepal_events.6.a: "Нам нужно удвоить пограничную охрану."

 nepal_events.7.t: "В Катманду распространяются крамольные газеты"
 nepal_events.7.d: "Похоже, мы наконец получили ответ на загадку операции по контрабанде, произошедшей несколько недель назад, и это не тот ответ, на который мы надеялись. В последние несколько дней кажется, что, куда бы вы ни повернулись в Катманду, вы можете найти копию газеты «Джаната Патрика» из Калькутты, наполненную крамольными и предательскими заявлениями о премьер-министре и его семье. Сопровождает эту грязь зачастую листовка от «Непал Праджа Паришад», берущая на себя ответственность за всю операцию и гордо заявляющая о своих угрозах нации:\n\n«Династия Рана! Вы должны знать, что Непал Праджа Паришад был создан с целью освободить и избавить непальский народ от ваших жестоких когтей, просветить его чистым знанием, почтить его расу, обрести богатство и религию, сделать его одной из цивилизованных рас мира и заставить гордость за свою страну эхом разноситься во всех направлениях на тысячи лет».\n\nХотя эти газеты вряд ли окажут большое влияние, так как большинство грамотных людей, способных их прочитать, просто сбиты с толку материалом, тот факт, что мы позволили этому проскользнуть мимо нас, является довольно постыдным делом. Отсутствие отслеживания печатного станка после его идентификации означает, что мы сейчас не знаем, где он оказался, что могло бы потенциально раскрыть операции «Паришад». Все, что мы действительно можем сделать на данный момент, — это решить, как реагировать на то, что уже было распространено, тем более что премьер-министр особенно настаивает на поимке ответственных с использованием всех ресурсов, которые мы можем выделить."
 nepal_events.7.a: "Сжечь эти газеты и найти печатников."
 nepal_events.7.b: "Эта куча чуши даже не заслуживает ответа."

 nepal_events.8.t: "Генерал Буратхоки встречается с королем"
 nepal_events.8.d: "Недавние слухи во дворце вызвали серьезное беспокойство среди ближайших советников премьер-министра, так как генерал Гири Прасад Буратхоки за последние несколько недель организовал необычно большое количество частных встреч с королем. Несмотря на важную роль генерала как одного из немногих командных офицеров в Непале, имеющих боевой опыт (он сражался в рядах Британской Индийской армии во время Индийской революции), его последующее разочарование в них, приведшее к возвращению в Непал, часто заставляло многих задаваться вопросом, не питает ли он революционных симпатий.\n\nХотя никто, кроме короля и самого генерала, не знает, что говорилось на этих встречах, существует сильное подозрение, что генерал мог быть скомпрометирован повстанцами и теперь пытается втянуть в заговор и короля.\n\nЕсли эти слухи верны и повстанцы пользуются поддержкой ключевых генералов, то необходимо предпринять все шаги, чтобы остановить дальнейший рост их влияния. Однако принять меры против генерала, основываясь только на слухах, невозможно без риска усугубить ситуацию, но неофициальный запрет на любые дальнейшие встречи был бы разумным шагом. Мы также должны помнить, что действуем исключительно на основании слухов, и человек может быть полностью невиновен, а его изоляция может вызвать ненужное трение без особой пользы."
 nepal_events.8.a: "Нам не следует слишком остро реагировать на слухи."
 nepal_events.8.b: "Ввести запрет на любые подобные встречи в будущем."

 nepal_events.9.t: "Волна арестов в Покхаре"
 nepal_events.9.d: "В кои-то веки премьер-министр проснулся с хорошими новостями о повстанцах: в городе Покхара прошла волна арестов тех, кто пытался распространять листовки «Паришад». До сих пор повстанцы действовали в основном в районе Катманду и регионах к востоку от него, и, по всей видимости, это была попытка начать распространение восстания на остальную часть страны. К нашему счастью, группа незнакомцев, прибывшая в незнакомый город и пытающаяся раздавать листовки — это действие, которое вызовет подозрение у любого местного жителя. Очень быстро эти повстанцы были сданы властям и арестованы. Если им повезет, они просто просидят в камере остаток своих жизней, а если нет — будут ждать, пока освободится палач."
 nepal_events.9.a: "С очередной партией мятежников покончено."

 nepal_events.10.t: "Расширение Армейского резервного фонда"
 nepal_events.10.d: "Продолжающееся восстание привело многих в правительстве в состояние крайнего напряжения — состояние, которое можно было бы назвать паранойей, если говорить об этом вне слышимости премьер-министра. Если раньше любое восстание против государства подавлялось еще до того, как становилось проблемой, то индийская поддержка сделала это восстание реальной угрозой. По мере того как правительственная паранойя продолжает нарастать, страхи по поводу того, насколько далеко идущим может быть заговор, множатся.\n\nНедавние частные переговоры между королем и генералом Буратхоки посеяли в умах людей зерно сомнения: любая часть непальского государства может быть скомпрометирована, особенно армия. А если скомпрометирована армия, то остановить революцию может стать невозможным. Однако, в надежде развеять эти страхи, было предложено принять упреждающие меры, чтобы удержать армию на нашей стороне или вернуть её лояльность, если она уже пошатнулась.\n\nНесколько лет назад был создан Армейский резервный фонд как пенсионная схема для солдат, куда они отчисляют процент от своего жалованья, чтобы обеспечить себя после выхода на пенсию. Эта схема уже сотворила чудеса для публичного имиджа Рана среди вооруженных сил, но было высказано предположение, что, возможно, дальнейшее расширение схемы с прямым взносом из государственной казны в окончательные пенсионные выплаты — это именно то, что нужно для еще большего укрепления их лояльности."
 nepal_events.10.a: "Выделите немного дополнительных средств, это окупится в будущем."
 nepal_events.10.b: "Эти взятки не стоят затрат."

 nepal_events.11.t: "Налет в Биргандже"
 nepal_events.11.d: "Похоже, количества охранников, направленных на границу после инцидента с контрабандой, оказалось совершенно недостаточно: сегодня бойцы «Мукти Сена», прибывшие из Республики, совершили налет на оружейный склад в Биргандже. Двое охранников склада попытались остановить налет, но были застрелены бандитами. Запасы винтовок на складе были захвачены, а повстанцы, насколько можно судить по отчетам, ушли невредимыми. Хотя это были в основном винтовки Гахендра, которые были списаны и отправлены на вечное хранение согласно правительственной политике в отношении старого снаряжения, они, вероятно, все еще найдут применение в будущих рейдах против нас, и в целом ситуация является большим позором."
 nepal_events.11.a: "Найдите этих людей, немедленно!"

 nepal_events.12.t: "Предотвращена попытка массового самоубийства"
 nepal_events.12.d: "Несмотря на громкий характер действий «Мукти Сена» против правительства, важно не забывать, что они не единственная угроза для премьер-министра, и другие группы единомышленников способны на свои формы государственной измены против Непала. В последние годы группа, состоящая преимущественно из женщин под предводительством одной из немногих женщин-аскетов в Непале, Йогмайи Неупане, постепенно стала занозой в боку правительства. Хотя поначалу Неупане рассматривалась как более терпимая форма оппозиции, в основном просто подталкивающая премьер-министра к реформам через апелляцию к индуизму (что можно было бы уладить символическими уступками), она стала гораздо более открыто враждебной к самому государству, а не просто к системам внутри него.\n\nЗа последние несколько месяцев, с тех пор как наша борьба с «Мукти Сена» начала обостряться, она становилась все смелее в своих требованиях, угрожая совершить самосожжение, чтобы спровоцировать восстание против режима. Это были явно не пустые угрозы: сегодня она и ее последователи попытались осуществить задуманное, но были остановлены стражниками, посланными лично премьер-министром, за мгновения до того, как костер должен был быть зажжен. Десятки женщин, а также чуть меньше дюжины мужчин, были арестованы за участие в этом инциденте; мужчин отправили в тюрьму в Дханкуте, а женщин заключили в храме Радхакришны.\n\nВ то время как мужчины, принявшие участие в инциденте, вероятно, останутся за решеткой надолго за свою измену, судьба женщин не так однозначна. Храм, в котором их содержат, вряд ли подходит для длительного заключения, но другого подходящего места нет, а держать женщин в заключении годами — это плохой имидж, какими бы предательницами они ни были. Поэтому было предложено просто отпустить их через несколько дней и установить тщательное наблюдение для предотвращения будущих инцидентов. Однако нет гарантии, что они не найдут альтернативных способов досадить государству, как только снова окажутся на свободе, и поэтому, возможно, стоит держать их взаперти так долго, как мы сможем."
 nepal_events.12.a: "Дайте им пару лет за решеткой, это поставит их на место."
 nepal_events.12.b: "Выпустите их через пару дней, они не представляют реальной угрозы."

 nepal_events.13.t: "Джая Сингх критикует премьер-министра"
 nepal_events.13.d: "Хотя Непал признает только одного великого короля, его величество Трибхувана, который правит всеми землями Непала, многие из мелких королевств, объединившихся под знаменем Притхви Нараян Шаха, по сей день действуют как вассалы королевства. Сам премьер-министр, наряду со своими предшественниками, носит титул Махараджи Каски и Ламджунга, получив эти титулы при установлении правления династии. Однако из всех этих королевств ни одно не было таким проблемным в последние годы, как Баджханг, и его бывший раджа Джая Притхви Бахадур Сингх.\n\nБудучи раджой, Сингх постоянно метался между союзником государства и его врагом. Сначала он приобрел известность во время короткого правления Дев Шамшер Рана как самый ярый сторонник реформы образования в стране, и поэтому был вынужден отправиться в изгнание, когда Дев был свергнут за свой реформизм. Позже он примирился с новым премьер-министром Чандрой Шамшер Рана, но его оппозиция поддержке британцев в Великой войне привела ко второму изгнанию, на этот раз добровольному, в Индию. Когда началась революция в Индии, он стал поддерживать военные усилия, оказывая медицинскую помощь раненым Республики, а его гуманистические и реформистские взгляды сделали его заметной фигурой среди политических умеренных Калькутты.\n\nДействуя теперь из самой Калькутты и возражая против очевидной «жестокости» премьер-министра в последние месяцы, Сингх выступил с речью, призывая к прекращению правления Рана и к «свободе» Непала. Эта речь, якобы организованная правительственными фигурами Республики, вряд ли окажет прямое влияние на «Мукти Сена», но выступление против нас такой заметной фигуры, безусловно, выглядит плохо. Если новости о его речи распространятся в Непале, это может нанести довольно большой репутационный ущерб, что потребует кампании цензуры, хотя затраты на ее проведение могут не стоить того, учитывая, как мало влияния он имеет на Непал в наши дни, даже в самом Баджханге."
 nepal_events.13.a: "Природа скоро разберется с этим дерзким стариком."
 nepal_events.13.b: "Цензурируйте любое распространение этой клеветы в Непале."

 nepal_events.14.t: "Покушение на Бабера Шамшера"
 nepal_events.14.d: "Даже с учетом постоянных атак на непальское государство, мало кто мог ожидать, что «Мукти Сена» падет так низко, как сегодня. По пути домой на героя Великой войны Бабера Шамшер Рана было совершено покушение: в его дверной проем бросили бомбу. Хотя бомба не взорвалась, один из несостоявшихся убийц выхватил пистолет и выстрелил в Бабера, попав в него как минимум дважды. Оставив генерала умирать, эти люди попытались скрыться с места происшествия, но, к счастью, были застрелены солдатами, отреагировавшими на выстрелы.\n\nСам Бабер, хоть и тяжело ранен, к счастью, выжил, и по всему Катманду были размещены солдаты для защиты всех видных членов династии Рана от дальнейших попыток убийства. Разъяренный этим актом варварства, премьер-министр заявил, что правительство не остановится ни перед чем, чтобы истребить это восстание, ясно дав понять, что ни одному мятежнику не будет даровано пощады, и что скоро всех их постигнет та же участь, которую они пытались уготовить Баберу."
 nepal_events.14.a: "На этот раз они зашли слишком далеко."

 nepal_events.15.t: "Заговорщики в движении"
 nepal_events.15.d: "Похоже, покушение на Бабера было лишь первым выстрелом революции, так как агенты Доминиона сообщили нам о медленном скоплении обученных в Калькутте войск у границы страны.\n\nПо всему Непалу ходят слухи о вооруженных людях, быстро передвигающихся под покровом ночи, и армии дан приказ начать подготовку к худшему."
 nepal_events.15.a: "Будущее Непала на кону."

 nepal_events.16.t: "Заговорщики в движении в Непале"
 nepal_events.16.d.RAJ: "Наши агенты, действующие по всей Республике, начали докладывать нам о скоплении войск у непальской границы, по-видимому, готовящихся к враждебным действиям. Хотя сразу же зазвучала тревога о том, что это также сигнализирует о вторжении против нас, мы заметили мало движения в других местах, что говорит о том, что Калькутта пока намерена действовать исключительно против Непала.\n\nВероятно, скоро эти войска, вместе со своими союзниками внутри самого Непала, попытаются осуществить запланированную революцию против Рана. Мы уже сообщили об этом Джуддхе Рана, и все, что мы можем теперь сделать, — это подготовиться к их ходу."
 nepal_events.16.d.HND: "Несмотря на наши рекомендации не делать этого, наши союзники из «Мукти Сена» в Непале несколько недель назад совершили покушение на видного члена династии Рана, но в конечном итоге не смогли убить его. С тех пор непальское правительство усилило репрессии настолько, насколько это возможно без активной отправки войск через нашу границу, и «Мукти Сена» осознали, что у них почти не осталось выбора, кроме как действовать.\n\nТе, кто действует с нашей территории, начали скапливаться на критических позициях у границы, в то время как те, кто находится в самом Непале, начали занимать ключевые позиции, и все они теперь готовятся наконец начать революцию против Рана."
 nepal_events.16.a: "Мы должны помочь нашим союзникам всем, чем можем."

 nepal_events.18.t: "Непальская революция"
 nepal_events.18.d: "Удары по всему Непалу, быстрый захват Покхары на западе и Хетауды на юге — то, что «Мукти Сена» представляли как кровавую войну по всей стране, закончилось скорее тихим всхлипом, за исключением осады самой столицы. После заявления короля об отстранении Джуддхи Рана с поста премьер-министра и дальнейшего приказа армии сложить оружие, немногие действительно решились бросить вызов повстанцам, когда те начали устанавливать контроль над страной. Те, кто остался верен правлению Рана, в основном отступили в столицу под руководством генерала Экраджа Шамшер Рана, надеясь переломить ход событий или, по крайней мере, героически держаться до последнего.\n\nНе встретив особого сопротивления, войска «Мукти Сена» под руководством Субарны Шамшер Рана со стороны «Паришад» и Кунвара Сингха со стороны «Трудовой партии Сватантра» (ТПС) начали осаду столицы через несколько часов после начала восстания. Бои между войсками Экраджа и «Мукти Сена» продолжались до конца дня, и быстро стало очевидно, что Рана уступают в численности и вооружении. Вместо того чтобы сражаться насмерть, правительственные войска сложили оружие ближе к закату, сдавшись повстанцам. Ранним утром следующего дня, когда пыль улеглась, прибытие короля для встречи с лидерами повстанцев было встречено громкими приветствиями, и вскоре начались обсуждения формирования первого свободного правительства Непала."
 nepal_events.18.a: "Непал наконец свободен!"

 nepal_events.19.t: "Лояльность Калькутте"
 nepal_events.19.d: "Поскольку династия Рана теперь свергнута, а бывший премьер-министр Джуддха Рана, по сообщениям, бежал из страны, для восстановления порядка быстро потребуется новое правительство. Довольно предсказуемо, король решил назначить Танку Прасада Ачарью, лидера «Паришад», новым премьер-министром страны, поручив ему создать временное правительство и направить Непал на путь демократии. Однако, действуя по приказу из Калькутты, ТПС заявила, что откажется поддерживать правительство, если их не поставят во главе социалистического государства, лояльного их благодетелям.\n\nХотя мы, вероятно, можем противостоять их влиянию и все же назначить Ачарью, возможно, будет разумно просто уступить и полностью объединиться с Калькуттой для защиты от Доминиона и дальнейшей нестабильности."
 nepal_events.19.a: "Демократия должна быть установлена, а монархия сохранена."
 nepal_events.19.b: "Никаких компромиссов, мы тоже примем социализм."

 nepal_events.20.t.RAJ: "Рана свергнуты в Непале"
 nepal_events.20.t.HND: "Непальская революция успешна"
 nepal_events.20.d.RAJ: "Сегодняшние новости можно описать только словом «катастрофа» или длинной чередой ругательств. В Непале произошла революция, свергнувшая наших друзей из династии Рана и давшая власть кучке радикалов, ориентированных на Калькутту. Несмотря на их неполноценность по сравнению с вооруженными силами Непала, повстанческие войска смогли захватить власть с небольшим сопротивлением из-за личной поддержки революции королем, надеющимся свергнуть Рана, державших его династию в цепях почти столетие.\n\nХотя Джуддха Рана и некоторые из его людей сумели бежать через границу к нам, мы потеряли ценного союзника, и, что еще хуже, мы теперь можем получить врага, если Калькутте удастся установить своих самых ярых лоялистов в Катманду."
 nepal_events.20.d.HND: "Из Непала пришли чудесные новости: «Мукти Сена» захватили контроль над Катманду, и все оставшиеся силы, верные династии Рана, сдались, при этом большая часть армии сложила оружие по приказу короля. Единственной ложкой дёгтя в этих новостях стали сообщения о том, что свергнутому премьер-министру удалось сбежать с несколькими оставшимися лоялистами в Доминион, хотя с текущими военными планами он вряд ли будет долго скрываться от правосудия.\n\nОднако более важно то, что непальский король созвал руководство «Паришад» и наших союзников из «Трудовой партии Сватантра» для обсуждения создания нового правительства, и поэтому мы, надеюсь, скоро окажемся в идеальном положении, чтобы склонить эти обсуждения в нашу пользу."
 nepal_events.20.a: "К черту Калькутту, и «Паришад» вместе с ними."
 nepal_events.20.b: "Непал теперь вкушает свободу, и скоро вся Индия тоже!"

 nepal_events.21.t: "Будущее непальского правительства"
 nepal_events.21.d: "Поскольку династия Рана в Непале теперь свергнута, а бывший премьер-министр Джуддха Рана, по сообщениям, бежал из страны, для восстановления порядка быстро потребуется новое правительство. Довольно предсказуемо, непальский король решил назначить Танку Прасада Ачарью, лидера «Паришад», новым премьер-министром страны, поручив ему создать временное правительство и направить Непал на путь демократии. Хотя мы можем считать «Паришад» союзником, их отсутствие приверженности международному социалистическому делу означает, что они почти наверняка направят Непал на путь нейтралитета и капитализма, даже если внешне будут дружелюбны к нам.\n\nЕсли бы мы захотели, мы могли бы легко установить наших союзников из ТПС в качестве единоличных правителей Непала, полностью подчинив его себе и гарантировав его поддержку как против наших врагов в Индии, так и против наших будущих противников по всей Азии. Такое правительство, однако, вряд ли будет стабильным и почти наверняка находится в десятилетиях от реального внедрения того, что кто-либо мог бы благожелательно назвать социализмом, и поэтому, возможно, будет разумно позволить им оставаться нейтральными при Ачарье. Что бы ни случилось, наше огромное влияние на Непал означает, что в конечном итоге выбор за нами."
 nepal_events.21.a: "Позволить Непалу выбрать свою судьбу."
 nepal_events.21.b: "Установить лояльное правительство в Катманду."

 nepal_events.22.t: "Хаос в Катманду"
 nepal_events.22.d: "На встрече с королем несколько дней назад в рамках подготовки к восстанию лидер «Паришад» Танка Прасад Ачарья обратился к Трибхувану с просьбой открыто поддержать их революцию против Рана в надежде избежать кровопролитных боев между вооруженными силами и повстанцами. Опасаясь, что «Мукти Сена» слишком слабы, чтобы взять власть, король отклонил его просьбу, надеясь, что они просто отложат революцию до более подходящего времени. Однако, совершив шаг, который в ретроспективе оказался ошибочным, «Мукти Сена» все же начали восстание. Последовали кровопролитные сражения по всей стране, причем такие города, как Биргандж, быстро пали перед повстанцами, прежде чем были отбиты правительственными войсками в смертельной перестрелке.\n\nОднако никакие бои не были столь разрушительными, как в Катманду, где основные силы «Мукти Сена» столкнулись с войсками под командованием самого Джуддхи Рана. Несмотря на преимущество его войск, премьер-министр был сражен шальной пулей, когда выбивал повстанческие войска с западных окраин столицы, что посеяло хаос в рядах. Даже сейчас, оставшись без руководства, войска Рана, похоже, готовы медленно вытеснять «Мукти Сена» из города, но, вероятно, ценой больших потерь. С обеих сторон конфликта звучат призывы к королю вмешаться и спасти нацию..."
 nepal_events.22.a: "Король должен спасти нас!"

 nepal_events.23.t: "Приказ Суверена"
 nepal_events.23.d: "Конец этому жестокому конфликту положили не новые смерти, а шествие суверена по улицам Катманду в сопровождении бесчисленных армейских офицеров, которые всегда оставались непоколебимо верны королю. Субарна Шамшер Рана, лидер секции «Мукти Сена» от «Паришад», Кунвар Сингх как лидер от ТПС и Кайзер Шамшер Рана как исполняющий обязанности лидера правительства вышли вперед как представители своих сторон, чтобы встретиться с королем вскоре после его прибытия.\n\nХотя обе стороны были согласны с тем, что боевые действия должны прекратиться, ни одна из них не желала просто сдаться другой. В конечном итоге, однако, был достигнут компромисс между «Паришад» и Рана: они согласились на формирование правительства под главным руководством самого Трибхувана. В рамках этого соглашения должность премьер-министра будет сначала предоставлена более умеренному члену «Паришад» Матрике Прасаду Коирале, а не Ачарье, а лояльным членам династии Рана будут предоставлены министерские посты ради стабильности. Главное — Непал также объявит об официальном нейтралитете в индийском конфликте, полностью порвав с попытками Доминиона и Республики влиять на него.\n\nОднако не все были готовы принять эту сделку: ТПС решительно возражала против предложения о нейтралитете, не упуская из виду и то, что при таком раскладе они будут исключены из правительства. После того как «Паришад» дали понять, что готовы принять компромисс, лидеры ТПС в гневе покинули встречу, хотя риск возникновения дальнейшего конфликта невелик, так как «Мукти Сена» в целом, похоже, поддержала соглашение. По крайней мере, на данный момент Непал находится в мире, возглавляемый своим восстановленным сувереном."
 nepal_events.23.a: "Да здравствует Его Величество!"

 nepal_events.24.t: "Реставрация королевской власти в Непале"
 nepal_events.24.d.RAJ: "Трудно понять, как относиться к новостям, полученным сегодня утром из Непала. Несколько дней назад революция против режима Рана началась в полную силу, дав старт жестокому конфликту по всему Непалу, без видимой быстрой победы для какой-либо из сторон. Несмотря на все наши усилия поддержать премьер-министра против повстанцев, наш хороший друг Джуддха Рана был убит при обороне Катманду. Очевидно, испугавшись краха без командования своего лидера, правительство согласилось на предложение короля выступить посредником в перемирии, начав переговоры с «Мукти Сена» о мирном разрешении.\n\nХотя согласно этому соглашению лидер «Паришад» был, к сожалению, вознагражден должностью премьер-министра, король действительно будет держать бразды правления, и многим лоялистам Рана в рамках компромисса будут предоставлены министерские посты. Социалисты также были полностью исключены из этого нового правительства, что для нас является облегчением, хотя эта новость также сопровождалась объявлением о разрыве Непалом связей как с нами, так и с Республикой. Несмотря на потерю потенциального союзника в нашей борьбе с Калькуттой, нейтралитет Непала по крайней мере удерживает их от того, чтобы стать угрозой для нас в ближайшем будущем, и поэтому мы должны хотя бы быть благодарны, что исход не стал хуже."
 nepal_events.24.d.HND: "Трудно понять, как относиться к новостям, полученным сегодня утром из Непала. Несколько дней назад революция против режима Рана началась в полную силу, дав старт жестокому конфликту по всему Непалу, без видимой быстрой победы для какой-либо из сторон. Несмотря на все наши усилия поддержать «Мукти Сена», они оказались почти вытеснены из Катманду, хотя в процессе им удалось убить премьер-министра Рана. Очевидно, полагая, что у них нет шансов в затяжном конфликте, они ухватились за возможность, когда король предложил выступить посредником между двумя сторонами.\n\nХотя итогом этого посредничества стал конец абсолютного правления Рана и назначение члена «Паришад» премьер-министром, «Паришад» согласились позволить лоялистам Рана участвовать в правительстве и, что более важно, согласились исключить всех социалистов из него. Это новое правительство также согласилось на полный нейтралитет в отношении Индии, разорвав связи с нами, но также и с Доминионом. Несмотря на то, что мы не получили союзника, мы по крайней мере достигли нашей цели — сломить хватку Доминиона над Непалом, и поэтому мы все еще можем в конечном итоге записать этот инцидент в Непале как победу."
 nepal_events.24.a: "Нейтралитет по крайней мере лучше враждебности..."

 nepal_events.25.t: "Неудавшийся переворот в Катманду"
 nepal_events.25.d: "Несмотря на надежды «Мукти Сена», что они смогут посеять хаос, нанеся удар по правительству по всей стране, они, по-видимому, не были готовы к тому, что армия будет их поджидать. На западе их попытки взять Покхару были быстро подавлены войсками под командованием Экраджа Шамшер Рана, в то время как старший сын премьер-министра так же быстро ликвидировал все попытки захватить Хетауду на юге. Явно не осознавая, что они уже проиграли, оставшиеся силы повстанцев попытались начать атаку и на Катманду, не сумев даже войти в черту города, прежде чем были обращены в массовое бегство.\n\nЛидеры повстанцев, понимая, что корабль идет ко дну, бежали через границу в Республику, явно пребывая в заблуждении, что смогут попытаться реорганизоваться позднее. Однако к ним, что довольно шокирующе, присоединился сам король, опасаясь, что его связи с повстанцами подвергнут его риску возмездия теперь, когда их восстание подавлено. Поскольку король считается отрекшимся от престола, не оставив явного преемника, так как его семья бежала вместе с ним, премьер-министр объявил о регентстве до тех пор, пока не будет найден новый король. Действуя теперь как регент, Джуддха Рана провозгласил, что Непал продолжит уничтожать все остатки этого мятежа, даже если для этого придется перейти границу."
 nepal_events.25.a: "Непал твердо стоит против мятежа!"

 nepal_events.26.t: "Революция провалилась в Непале"
 nepal_events.26.d.RAJ: "В кои-то веки мы наконец получили порцию хороших новостей. Сегодня утром повстанцы в Непале наконец начали свое давно запланированное восстание против династии Рана, пытаясь быстро захватить контроль над несколькими городами по всей стране. Однако последовало уничтожение сотен этих повстанцев солдатами, лояльными премьер-министру, которые были полностью готовы ко всем этим атакам против них. Последняя атака повстанцев на Катманду, состоящая из основной части сил повстанцев, была быстро отражена, даже не проникнув в город.\n\nВ свете их провала лидеры повстанцев бежали в Калькутту, удивительным образом сопровождаемые королем Трибхуваном, который якобы пытался поддержать восстание. Джуддха Рана, действующий теперь как регент при вакантном троне, поклялся выследить этих предателей и заявил о своей поддержке нас, когда Республика неизбежно начнет атаку против нас обоих."
 nepal_events.26.d.HND: "Сегодняшние новости можно описать только словом «катастрофа» или длинной чередой ругательств. Несмотря на нашу решительную поддержку «Мукти Сена», их попытка восстания была подавлена еще до того, как она по-настоящему началась: правительственные войска отразили все попытки захватить контроль над городами по всему Королевству. Руководство повстанцев бежало через границу к нам, надеясь, возможно, на другую возможность в будущем свергнуть Рана. Непальский король также присоединился к ним, опасаясь за свою жизнь из-за своей тайной поддержки повстанцев.\n\nТем временем непальский премьер-министр, теперь действующий как регент, полностью присоединил нацию к Доминиону и заявил о своем намерении вторгнуться к нам, чтобы захватить руководство «Мукти Сена». Похоже, теперь Непал должен быть полностью включен в планы вторжения..."
 nepal_events.26.a: "Впервые щупальца Калькутты не смогли заполучить очередную жертву."
 nepal_events.26.b: "Операция «Гром» — наш единственный оставшийся вариант освободить Катманду."

 nepal_events.30.t: "Судьба пограничных территорий"
 nepal_events.30.d: "Во время Индийской революции мы отправили войска в несколько пограничных штатов, чтобы занять их гарнизонами для британцев, не давая им попасть в руки повстанцев. С тех пор мы официально признавали эти земли индийскими, планируя вернуть полный контроль над ними, когда ситуация достаточно стабилизируется. Теперь, когда мы оказались в союзе с индийским правительством, которое полностью готово принять их, мы сообщили им о своих намерениях сделать это, хотя точный перечень передаваемых земель оставляет немного пространства для маневра. В то время как трудно спорить, что [814.GetName] и [887.GetName] не являются индийскими, поскольку они были полностью частью Британской Индии, Королевство Сикким всегда считалось отдельным, так же как мы или Бутан. В результате мы, возможно, сможем убедить наших союзников признать наш контроль над ним, позволив ему и дальше существовать отдельно от Индии под нашей властью, при этом передав две другие территории."
 nepal_events.30.a: "Передать все спорные территории индийцам."
 nepal_events.30.b: "Вернуть Уттаракханд и Дарджилинг, но попросить оставить Сикким."

 nepal_events.31.t: "Непал возвращает оккупированные территории"
 nepal_events.31.d.RAJ: "С возвращением Индии под наше правление следующим вопросом на повестке дня стали те территории, которые все еще заняты непальскими войсками.\n\nПоскольку эти земли всегда признавались индийскими и просто защищались ими от повстанцев, не потребовалось долгих уговоров, чтобы добиться их возвращения: Непал теперь передал полный контроль над бывшими индийскими территориями [814.GetName] и [887.GetName], а также землями, составлявшими Королевство Сикким."
 nepal_events.31.d.HND: "Хотя Непал никогда не был нашим прямым врагом во время Индийской революции, их войска были развернуты в поддержку Британии, чтобы помешать нам захватить ключевые регионы, такие как [814.GetName] и [887.GetName], а также оппортунистически захватить контроль над Королевством Сикким.\n\nТеперь, когда их обязательства перед британцами и их лакеями в Лахоре остались в прошлом, они согласились передать контроль не только над индийскими территориями, но и над самим Сиккимом, и наши войска уже направляются, чтобы заменить своих непальских коллег."
 nepal_events.31.a: "Как и ожидалось."

 nepal_events.32.t: "Статус Сиккима"
 nepal_events.32.d.RAJ: "С возвращением Индии под наше правление следующим вопросом на повестке дня стали те территории, которые все еще заняты непальскими войсками. Поскольку эти земли всегда признавались индийскими и просто защищались ими от повстанцев, не потребовалось долгих уговоров, чтобы добиться их возвращения: Непал теперь передал полный контроль над бывшими индийскими территориями [814.GetName] и [887.GetName].\n\nОднако возник вопрос о статусе Сиккима — территории, которая, хоть и была протекторатом Британии, считалась отдельной от Индии, наряду с Бутаном и самим Непалом. Они утверждают, что их контроль над ним возник в результате конфликта между двумя суверенными державами, и поэтому он по праву принадлежит им. Хотя такой аргумент явно имеет изъяны, возможно, будет проще согласиться на просьбу, ведь в конце концов, что мы реально выигрываем от более прямого контроля над несколькими горными деревнями?"
 nepal_events.32.d.HND: "Хотя Непал никогда не был нашим прямым врагом во время Индийской революции, их войска были развернуты в поддержку Британии, чтобы помешать нам захватить ключевые регионы, такие как [814.GetName] и [887.GetName], а также оппортунистически захватить контроль над Королевством Сикким. Теперь, когда их обязательства перед британцами и их лакеями в Лахоре остались в прошлом, они согласились передать контроль над индийскими территориями.\n\nОднако возник вопрос о статусе Сиккима — территории, которая, хоть и была протекторатом Британии, считалась отдельной от Индии, наряду с Бутаном и самим Непалом. Они утверждают, что их контроль над ним возник в результате конфликта между двумя суверенными державами, и поэтому он по праву принадлежит им. Хотя такой аргумент явно имеет изъяны, возможно, будет проще согласиться на просьбу, ведь в конце концов, что мы реально выигрываем от более прямого контроля над несколькими горными деревнями?"
 nepal_events.32.a: "Они должны вернуть всё, без исключений."
 nepal_events.32.b: "Пусть забирают, он не представляет для нас большой ценности."

 nepal_events.33.t: "[FROM.GetNameDefCap] отказывает нам в просьбе оставить Сикким"
 nepal_events.33.d: "Несмотря на нашу законную и мирную просьбу, [FROM.GetNameDef] отказались позволить нам оставить Сикким и забрали его вместе с остальными возвращенными территориями."
 nepal_events.33.a: "Не позволили оставить даже крохи..."

 nepal_events.34.t: "[FROM.GetNameDefCap] соглашается на нашу просьбу оставить Сикким"
 nepal_events.34.d: "Явно недовольные соглашением, но не желающие спорить по этому поводу, [FROM.GetNameDef] согласились на нашу просьбу и оставили нам контроль над Сиккимом, забрав остальные территории."
 nepal_events.34.a: "Фантастика!"

 nepal_events.100.t: "Непал предоставляет дополнительные дивизии гуркхов"
 nepal_events.100.d: "Гуркхи, получившие свое название от этнохоронима непальцев, из которых они состоят, долгое время были одними из самых элитных войск Британской Индийской армии и оставались таковыми при Доминионе. С хаосом в Индии и последовавшей революцией в Непале набор новых гуркхов стал очень сложным, так как больше людей требовалось дома для защиты своей нации. Однако теперь, когда с восстанием покончено, и Непал хочет вернуть долг, они прислали нам две дивизии, полные солдат, сражавшихся против «Мукти Сена», с обещаниями вернуть набор на нормальный уровень как можно скорее. Мы, конечно, поблагодарили их за это, и надеемся, что гуркхи всегда будут оставаться важной частью вооруженных сил."
 nepal_events.100.a: "«Лучше умереть, чем быть трусом»."

 nepal_events.101.t: "Непал просит большей свободы"
 nepal_events.101.d: "После нашего вмешательства в Непальскую революцию Непал оказался под очень жестким контролем с нашей стороны, с индийскими войсками, постоянно размещенными в Катманду для обеспечения порядка и защиты от наших соперников. Теперь, когда мы являемся единственным индийским правительством, а ситуация в Непале стабилизировалась, непальское правительство попросило нас вывести наши войска и позволить им снова стать полностью независимой нацией. Они, конечно, останутся нашими верными союзниками, но снова будут иметь свободу вести себя так, как они пожелают."
 nepal_events.101.a: "Давайте продолжим как партнеры."
 nepal_events.101.b: "Мы не можем рисковать тем, что может случиться без нашего надзора."

 nepal_events.102.t: "Индия соглашается на нашу просьбу"
 nepal_events.102.d: "Мы получили отличные новости от [FROM.GetNameDef], которые согласились вывести свои войска из нашей страны и позволили нам снова стать полностью автономной нацией. Будем надеяться, что это станет новым началом плодотворного и долгого партнерства между Непалом и Индией."
 nepal_events.102.a: "Фантастика!"

 nepal_events.103.t: "Индия отказывает в нашей просьбе"
 nepal_events.103.d: "Мы получили ужасные новости от [FROM.GetNameDef], которые отказались вывести свои войска из нашей страны, ссылаясь на опасения нестабильности в Непале и риск того, что без их прямого участия враждебные силы могут захватить контроль над правительством. Похоже, у нас нет выбора в этом вопросе..."
 nepal_events.103.a: "Как они смеют?"

 nepal_events.200.t: "Коронация короля Самраджьи"
 nepal_events.200.d: "Отречение короля Трибхувана и добровольное изгнание его семьи поставили премьер-министра в довольно сложное положение: монарх был необходим для обеспечения стабильности королевства, но не было подходящих кандидатур для замены предыдущего короля. Однако после долгих размышлений был сделан спорный выбор в пользу племянника Трибхувана, Самраджьи Шамшер Рана, в качестве нового короля страны. Несмотря на близкое родство Самраджьи с бывшим сувереном, молодой человек является членом династии Рана, будучи плодом брака сестры Трибхувана с Кайзером Рана. Полагая, что лучшего выбора нет, а также видя выгоду в том, чтобы член династии находился непосредственно на троне, Джуддха Рана утвердил выбор Самраджьи несколько дней назад.\n\nПриняв присягу служить королевству, новый король нации, Самраджья Шамшер Джанг Бахадур Рана, титулованный как Е.К.В. Шри Панч Бада Махараджадхираджа «Самраджья», был официально коронован сегодня. Хотя церемония, возможно, была не такой пышной, как многие надеялись, излишняя экстравагантность после недавнего конфликта была сочтена неуместной, и поэтому мероприятие носило скромный характер. Новый король, не питая иллюзий относительно своего места, подтвердил положение премьер-министра в правительстве, довольствуясь ролью номинальной фигуры и не имея амбиций повторить судьбу своего предшественника."
 nepal_events.200.a: "Надеюсь, этот король будет гораздо сговорчивее."

 nepal_events.300.t: "Сдержанная реакция индийцев"
 nepal_events.300.d: "Хотя объявление королем полного нейтралитета в индийских делах было жизненно важным для мирного процесса, оно, безусловно, было рискованным шагом. Значительные вложения как Доминиона, так и Республики во влияние на нашу политику создавали реальную возможность того, что та или иная сторона не примет такой исход и просто введет свои войска для прямой установки лоялистского режима.\n\nОднако сейчас кажется, что риск оправдался: хотя оба индийских правительства, безусловно, возмущены, они, по-видимому, готовы принять новый статус-кво, считая исход, при котором Непал не достался их врагам, достаточно хорошим. Без непосредственной угрозы вторжения или дальнейшего вмешательства в политику страны новое правительство должно иметь достаточно возможностей, чтобы сосредоточиться на внутреннем исцелении национального раскола."
 nepal_events.300.a: "Мы все можем вздохнуть с облегчением."

 nepal_events.301.t: "ТПС протестует против мирного соглашения"
 nepal_events.301.d: "Хотя ТПС сразу же была определена как потенциальная угроза после мирного соглашения, прекращение поддержки Калькуттой ныне несуществующей «Мукти Сена» убедило большинство в том, что они просто уйдут в небытие. Социалисты, очевидно, не слышали об амбивалентности Республики, так как сегодня в [NEP.Capital.GetCapitalVictoryPointName] прошел протест с участием более 200 членов ТПС под руководством Рама Прасада Рая и Кунвара Индерджита Сингха.\n\nПламенная речь, произнесенная в основном Сингхом, призывала к немедленному включению ТПС в правительство и аресту Кирана и Мохана Рана за гибель гражданских лиц во время восстания, вину за которую Сингх возложил на династию Рана. Сингх завершил свою речь угрозой новой вооруженной революции, если требования не будут выполнены, что было встречено одобрительными возгласами его товарищей-повстанцев.\n\nНе желая мириться с этой изменой, премьер-министр Коирала приказал разогнать протест и арестовать его участников; Рай оказался среди тех, кто сейчас сидит в ближайшей тюрьме. Однако Сингх, как утверждается, сбежал с протеста, избежав ареста, хотя войска полагали, что схватили его — ошибка, которую пока списывают на то, что они перепутали другого похожего протестующего с Сингхом. Местонахождение этого человека в настоящее время неизвестно, но ожидается, что арест остальных членов подавит желание других выскочек из ТПС вызывать беспорядки."
 nepal_events.301.a: "Выследите Сингха, мы не можем допустить дальнейших мятежей."

 nepal_events.302.t: "Войска атакованы под Хетаудой"
 nepal_events.302.d: "С тех пор как он сбежал с протеста в Катманду, Кунвар Сингх не только избежал поимки, но даже не был замечен теми, кто его искал, что давало правительству надежду, что он, возможно, погиб в дикой местности. Хотя конкретных доказательств обратного до сих пор нет, недавнее нападение на войска, действующие недалеко от Хетауды, явно несет на себе отпечаток Сингха и его товарищей-диссидентов. Местный аванпост, укомплектованный несколькими десятками человек, внезапно подвергся нападению неизвестного количества вооруженных мародеров.\n\nПосле первоначального столкновения, в котором погибли двое солдат, аванпост был ненадолго сдан этим бандитам, прежде чем подкреплению удалось выбить их после короткого боя. Среди дополнительных жертв со стороны повстанцев были обнаружены люди в форме Индийской республиканской армии, очень похожей на ту, что поставлялась «Мукти Сена». Хотя это не является окончательным доказательством участия Сингха, это, безусловно, доказательство попытки восстания диссидентов ТПС, и правительству придется отреагировать."
 nepal_events.302.a: "Отправьте больше войск на поиски Сингха."
 nepal_events.302.b: "Они явно планируют что-то большее, держите армию в готовности."

 nepal_events.303.t: "Восстание Ракша Дал"
 nepal_events.303.d.body: "После революции против Рана солдаты «Мукти Сена», которые не влились в армию, были преобразованы в «Ракша Дал», Силы охраны, чтобы помогать поддерживать порядок наряду с армией. Несмотря на исключение из правительства, многие бывшие члены ТПС вошли в их число — идея, которая теперь доказала свою ошибочность. Те, кто остался верен Сингху и Раю, подняли восстание в [NEP.Capital.GetCapitalVictoryPointName], к которым быстро присоединились Сингх и его диссиденты из Хетауды, освободив Рая и других протестующих из тюрьмы.\n\n"
 nepal_events.303.d.hunthnd: "$nepal_events.303.d.body$Освобожденные заключенные, вооруженные своими товарищами-повстанцами, отправились занимать столицу, быстро захватив контроль над дворцом Сингха Дурбар, откуда управляло Национальное правительство. Сингх и Рай провозгласили республику, лояльную Калькутте, очевидно надеясь спровоцировать прямое вмешательство Индии в Непал для поддержки их режима. Однако, к их явному удивлению, после дня осады правительственными войсками и лояльными членами «Ракша Дал», повстанцы даже не получили ответа от Республики, не говоря уже о подкреплении, на которое они надеялись.\n\nНе опасаясь столкновения с войсками с юга, правительственные войска начали атаку, чтобы выбить повстанцев из дворца, и очень быстро добились успеха. Однако Сингх снова, по-видимому, ускользнул, сбежав вместе с Раем, хотя с поражением этих повстанцев и отсутствием поддержки со стороны Республики маловероятно, что эти двое будут представлять какую-либо дальнейшую угрозу."
 nepal_events.303.d.huntnohnd: "$nepal_events.303.d.body$Освобожденные заключенные, вооруженные своими товарищами-повстанцами, отправились занимать столицу, быстро захватив контроль над дворцом Сингха Дурбар, откуда управляло Национальное правительство. Сингх и Рай провозгласили республику, хотя с исчезновением режима в Калькутте их попытка была очевидно обречена с самого начала. После дня осады правительственными войсками и лояльными членами «Ракша Дал», без каких-либо признаков внезапного чуда, которое склонило бы чашу весов в их пользу, повстанцы начали переговоры с правительством в надежде добиться некоторых уступок.\n\nУстав от восстаний Сингха, правительственные войска вместо этого получили приказ штурмовать дворец, причем этот приказ якобы исходил непосредственно от короля. Штурм прошел успешно, дворец был возвращен, а повстанцы побеждены в течение нескольких часов. Однако Сингх снова, по-видимому, ускользнул, сбежав вместе с Раем, хотя с поражением этих повстанцев и отсутствием поддержки со стороны Республики маловероятно, что эти двое будут представлять какую-либо дальнейшую угрозу."
 nepal_events.303.d.reinforce: "$nepal_events.303.d.body$Освобожденные заключенные, вооруженные своими товарищами-повстанцами, отправились занимать столицу, начав с попытки взять под контроль дворец Сингха Дурбар, откуда управляло Национальное правительство. Поскольку после атак Сингха в Хетауде в столицу было переброшено достаточно войск, восстание фактически закончилось, не успев начаться: дворец был успешно защищен, а повстанцы быстро разбиты. Однако Сингх снова, по-видимому, ускользнул, сбежав вместе с Раем, хотя с поражением этих повстанцев и отсутствием поддержки со стороны Республики маловероятно, что эти двое будут представлять какую-либо дальнейшую угрозу."
 nepal_events.303.a: "Будем надеяться, что мы видим их в последний раз."

 nepal_events.304.t: "Трения внутри «Паришад»"
 nepal_events.304.d: "Хотя они и не так радикально настроены против мирного соглашения, как ТПС, сказать, что все члены «Паришад» принимают то, на что им пришлось согласиться ради стабильности, было бы значительным преувеличением. Множество разногласий, от оппозиции любому участию Рана в правительстве до противодействия роли дворца в политике или даже просто личных разногласий с новым премьер-министром, начали показывать трещины в некогда единой партии.\n\nТе, кто считает себя наиболее преданным Ачарье, первыми начали выражать неодобрение новому статус-кво, значительно возражая против того, что его обошли в пользу Коиралы. В настоящее время, однако, эти разногласия пока остаются за закрытыми дверями, но рисуют картину грядущих проблем."
 nepal_events.304.a: "Сейчас не время ссориться между собой."

 nepal_events.305.t: "Братские перепалки"
 nepal_events.305.d: "Почти столько, сколько премьер-министр себя помнит, он считал своего младшего брата Бишвешвара Прасада Коиралу одним из своих ближайших союзников, причем Б.П. был одним из первых, кто отвергал любую критику своего брата со стороны товарищей по партии. Однако в последние недели отношения между ними, как сообщается, стали довольно прохладными, причем поворот Б.П. от монархиста к медленному разочарованию в роли короля в правительстве, как говорят, стал основным поводом.\n\nТе, кто больше в курсе, начали спекулировать, может ли за этим спором стоять нечто большее, чем просто разногласия по поводу политики. Ходят теории, что недовольные правлением М.П., особенно в отношении недавнего одобрения верхней палаты, назначаемой исключительно королем, начали настаивать на замене премьер-министра, заручившись поддержкой Б.П., пообещав ему место брата.\n\nОфициально, однако, все в «Паришад» отрицают какой-либо раскол внутри партии, надеясь, что любую нестабильность можно просто переждать..."
 nepal_events.305.a: "Разве небольшой спор не нормален между братьями?"

 nepal_events.306.t: "Исключение М.П. Коиралы"
 nepal_events.306.d: "Несмотря на надежды пережить бурю, похоже, что расколы внутри «Паришад» нельзя было просто замять. Члены партии, возглавляемые Ачарьей и Б.П. Коиралой, предложили исключить М.П. из членов «Паришад», заявив, что он предал цели революции своим продолжающимся правлением бок о бок с Рана и отсутствием приверженности полной демократизации Непала.\n\nБольшая часть «Паришад» выразила свою поддержку этому решению, хотя не все союзники премьер-министра покинули его, многие высказались в его пользу. Мохан и Кайзер Рана, как представители своей династии, также выразили поддержку премьер-министру, и, по крайней мере на данный момент, ни король, ни премьер-министр не дали никаких указаний на то, что М.П. Коирала уйдет в отставку со своего поста. Однако как правительство будет действовать дальше — остается только гадать."
 nepal_events.306.a: "Внутренняя борьба и революционеры — такое неизбежное сочетание."

 nepal_events.307.t: "Раскол «Паришад»"
 nepal_events.307.d: "Не желая мириться с его исключением, союзники премьер-министра теперь полностью порвали с «Паришад», объединившись в знак солидарности с Коиралой. Под руководством М.П. была сформирована новая партия, которая попытается продолжить управление страной, известная как «Растрия Праджа Парти» (Национальная народная партия). Состоящая в основном из более консервативных членов «Паришад», «Праджа Парти» в своих первоначальных официальных позициях заявляет о непоколебимой поддержке роли короля в правительстве, оппозиции любому фракционализму и стремлении к национальной стабильности.\n\nХотя премьер-министр явно уверен в своей способности продолжить пребывание в должности, используя эту новую партию, руководство «Паришад» потребовало от короля сместить его с поста премьер-министра, угрожая отозвать свою поддержку правительству, если он останется в должности. Трибхуван, не желая пока уступать их требованиям, отказался прямо заявить о своей позиции по кризису. Не поддерживая премьер-министра и не увольняя его, кажется, что на данный момент король просто ждет, чтобы увидеть, сможет ли М.П. удержаться или нет."
 nepal_events.307.a: "Возможно, пришло время пересмотреть позицию Коиралы."

 nepal_events.308.t: "М.П. Коирала подает в отставку"
 nepal_events.308.d: "Хотя «Паришад» еще не выполнила свою угрозу отозвать поддержку правительства, премьер-министру и королю быстро стало очевидно, что пребывание первого в должности не может продолжаться, даже при поддержке «Праджа Парти». В конечном итоге желая стабильности превыше всего, М.П. Коирала подал прошение об отставке королю, готовясь снова уйти на второй план политики.\n\nПытаясь сформировать новое правительство, король сначала обратился к «Паришад», где Ачарья был очевидным следующим кандидатом на пост премьер-министра. Самым большим препятствием на этом пути, однако, стали Рана, чьи ключевые члены заявили о своем отказе работать с этими «радикалами», и о которых «Паришад» высказали аналогичные чувства.\n\nПоскольку ни одна из сторон не желала идти на компромисс, ближайшие доверенные лица Трибхувана предложили, чтобы король пока просто взял на себя прямой контроль над нацией, управляя оставшимися элементами национального правительства через чрезвычайные полномочия. Они предлагают создать консультативный совет, состоящий из ключевых членов династии Шах, таких как Пурендра Бикрам Шах, чтобы обеспечить надлежащее исполнение воли короля. Хотя руководство Рана не будет в восторге от этой идеи, они, скорее всего, согласятся с ней, даже если союзники Ачарьи почти наверняка будут возражать. Король теперь стоит перед трудным выбором, но этот выбор должен быть сделан."
 nepal_events.308.a: "Назначить Ачарью заменой Коирале."
 nepal_events.308.b: "Король должен править напрямую, пока что."

 nepal_events.400.t: "Реорганизация Рана"
 nepal_events.400.d: "Хотя многие Рана бежали из Непала, когда революция охватила страну (бывший премьер-министр был первым среди них), немало из них решили стоять на своем и остаться в Непале. Не желая вызывать дальнейшие раздоры, их пока оставили в покое, и мало кто ожидал, что они будут представлять угрозу после их полного отстранения от власти. Однако, похоже, их пока рано списывать со счетов, так как оставшиеся члены династии в Непале объединились вокруг новой организации, возглавляемой Моханом Шамшер Рана.\n\nОбъединившись с небольшой националистической группой горкхов, известной как «Кхукури Дал», Мохан сформировал новую политическую партию, действующую теперь под названием «Вир Горкха Дал», явно надеясь участвовать в любых предстоящих выборах в попытке восстановить правление своей династии над нацией. Хотя официально они не выступают за прямое восстановление предыдущей системы и еще не предприняли никаких незаконных действий, многие члены этой «Кхукури Дал» явно имеют военизированный характер, и новое правительство опасается, что Рана могут планировать собственную насильственную революцию для восстановления власти. Однако пока они не начнут действовать, правительство мало что может сделать, кроме как наблюдать за ними."
 nepal_events.400.a: "Обеспечить постоянный мониторинг их деятельности."

 nepal_events.401.t: "Линии начинают формироваться"
 nepal_events.401.d: "Хотя когда-то они были едины в своем желании освободить Непал от Рана, вопрос о том, что происходит после революции, всегда имеет обыкновение раскалывать ряды. Даже до революции «Паришад» часто спорили о правильном способе ведения дел, и хотя позиция насильственной революции победила, крупная фракция придерживалась убеждения, что Рана следовало свергнуть путем мирного протеста. Эта фракция, возглавляемая в основном братьями Коирала, Матрикой и Бишвешваром, теперь начала еще больше расходиться с основным крылом партии, поддерживающим премьер-министра.\n\nВ то время как крыло за Ачарьей продвигалось к полностью конституционной монархии, а также выступало за индустриализацию, более близкую к линии правительства Калькутты, крыло Коиралы заняло твердую оппозиционную позицию. Желая вместо этого системы капиталистического типа, а также утверждая, что нация рискует снова впасть в тиранию без направляющей руки короля, они начали в частном порядке сопротивляться многим предложениям премьер-министра. Все еще в конечном счете верные революции, эти препирательства пока вряд ли развалят «Паришад», но начали обнажать линии разлома, которые позже могут треснуть."
 nepal_events.401.a: "Мелкие склоки вряд ли объединят нацию."

 nepal_events.402.t: "Раскол ТПС"
 nepal_events.402.d: "Хотя они сыграли значительную роль в революции против Рана, социалисты из «Трудовой партии Сватантра» почти полностью оказались за бортом новой непальской системы. Поскольку Калькутта твердо поддерживает «Паришад», ТПС обнаружила, что почти вся иностранная поддержка для них испарилась, и из-за их спорной политики, такой как республиканизм, они не смогли легально зарегистрироваться как политическая партия в новой системе. В то время как более радикальные члены партии обсуждали вторую революцию против новой системы, отсутствие поддержки сделало это невозможным, и те, кто менее привержен социалистическому делу, отказались от надежд партии.\n\nС этой целью была создана новая социалистическая партия, отколовшаяся от ТПС. «Самьюкта Сватантра Парти», или Объединенная партия независимости, отбросила самые спорные аспекты ТПС, в первую очередь отказавшись от республиканизма и приняв позицию конституционной монархии. Хотя ТПС осудила их как раскольников, партии удалось привлечь значительное количество членов из своих рядов, а также поглотить нескольких радикалов из «Паришад». Эта новая партия, однако, вряд ли окажется у национального руководства в ближайшее время, так как их политика все еще слишком радикальна для большинства населения, но они явно представляют возможное будущее для левых в новом Непале."
 nepal_events.402.a: "Лучше расколотые, чем угрожающие."

 nepal_events.500.t: "Проблема монархии"
 nepal_events.500.d: "Несмотря на желание большей части нашего руководства, и особенно наших союзников в Калькутте, упразднить монархию, существование правительства сильно зависит от поддержки убежденных монархистов. Даже несмотря на то, что мы правим теперь без их участия, количество реальных социалистов-республиканцев в Непале едва достаточно, чтобы заполнить комнату в хороший день, в то время как «Паришад» и другие промонархические группы значительно превосходят нас численностью. Настроить их против нас, избавившись от монархии, может сильно дестабилизировать наш режим, хотя с поддержкой Калькутты мы, вероятно, сможем удержаться.\n\nВ качестве попытки компромисса с монархистами было выдвинуто предложение даровать Трибхувану титул «Главы государства», Раджья Прамукх, чисто церемониальный титул для признания его статуса при сохранении власти правительства. Хотя этого, возможно, недостаточно, чтобы удовлетворить самых убежденных монархистов, этого, вероятно, хватит, чтобы успокоить достаточное количество людей. Немногие в правительстве довольны этим решением, полагая, что сохранение монархистов в любом качестве ослабит государство в долгосрочной перспективе, и вместо этого предложили просто сорвать пластырь сейчас и разобраться с последствиями."
 nepal_events.500.a: "Разрешить церемониальную роль для бывшего короля."
 nepal_events.500.b: "Он еще не был изгнан, и это единственная привилегия, которая у него будет."

 nepal_events.1000.t: "Выбор пути ИИ"
 nepal_events.1000.d: "Так ИИ выбирает, к какому пути он будет стремиться в мини-игре «Заговор». На это влияют правила игры. Первые три не применяются, если кто-либо из участников является игроком-человеком."
 nepal_events.1000.a: "Ориентированный на HND (Бхаратия)"
 nepal_events.1000.b: "Нейтральный"
 nepal_events.1000.c: "Ориентированный на RAJ (Британская Индия)"
 nepal_events.1000.e: "Ориентированный на HND (с участием игрока)"
 nepal_events.1000.f: "Ориентированный на RAJ (с участием игрока)"

 nepal_events.1001.rana_title: "Неудавшаяся революция в Непале"
 nepal_events.1001.royal_title: "Реставрация королевской власти в Непале"
 nepal_events.1001.revolution_title: "Антирановская революция в Непале"
 nepal_events.1001.rana_desc: "В течение последнего года в гималайском королевстве Непал продолжалось восстание, якобы поддерживаемое соседней [HND.GetName] с целью свержения премьер-министра Джуддхи Рана. Новости, полученные сегодня из столицы страны [NEP.Capital.GetCapitalVictoryPointName], подтвердили, что произошла попытка общенационального восстания: революционеры ненадолго захватили контроль над частями Непала, прежде чем были разбиты правительственными войсками.\n\nСообщается, что главари бежали к своим покровителям в Республику, к ним присоединился король Непала, который якобы поддерживал их. Теперь объявлено регентство, а премьер-министр также сигнализирует о намерении страны присоединиться к альянсу «Бомбейский пакт» против Калькутты."
 nepal_events.1001.royal_desc: "В течение последнего года в гималайском королевстве Непал продолжалось восстание, якобы поддерживаемое соседней [HND.GetName] с целью свержения премьер-министра Джуддхи Рана. Новости, полученные сегодня из страны, нарисовали мрачную картину: кровавый насильственный конфликт вспыхнул по всей стране между правительством и повстанческими силами после убийства премьер-министра, и закончился только благодаря перемирию, заключенному при посредничестве непальского короля.\n\nВ рамках перемирия король обозначил свое намерение создать правительство, состоящее как из фигур, настроенных против Рана, так и из ключевых членов династии Рана. Несмотря на индийское вмешательство в конфликт, король, как сообщается, объявил о полном нейтралитете в отношении Индии, надеясь вместо этого переключить внимание Непала на внутренние дела."
 nepal_events.1001.revolution_desc: "В течение последнего года в гималайском королевстве Непал продолжалось восстание, якобы поддерживаемое соседней [HND.GetName] с целью свержения премьер-министра Джуддхи Рана. В последние несколько дней это восстание наконец переросло в полномасштабную революцию, и страна теперь полностью контролируется повстанческими силами после общенациональных восстаний.\n\nСообщается, что бывший премьер-министр бежал в Лахор, а представители альянса «Мукти Сена» проводят встречи с королем в столице страны [NEP.Capital.GetCapitalVictoryPointName], чтобы обсудить формирование временного правительства. Только время покажет, как пройдут эти встречи, учитывая, что [HND.GetNameDef] уже якобы начала настаивать на установлении социалистического правительства под своим руководством."
 nepal_events.1001.rana_option: "Правление Рана железной рукой продолжается."
 nepal_events.1001.royal_option: "Сможет ли такой компромисс действительно продержаться?"
 nepal_events.1001.revolution_option: "90 лет правления Рана закончились за несколько дней."

 nepal_war_events.9.t: "Предложить мир [438.owner.GetNameDef]?"
 nepal_war_events.9.d: "Мы не только полностью остановили индийские попытки взять [323.GetCapitalVictoryPointName], но наши войска теперь захватили контроль над несколькими крупными индийскими городами. Поскольку их армии разбиты, теперь, возможно, будет разумно предложить мир индийцам, потребовав официального признания нашего контроля над границами и прекращения враждебных действий против нас."
 nepal_war_events.9.a: "Отправить им наши требования."
 nepal_war_events.9.b: "Мы будем сражаться до их полной капитуляции!"

 nepal_war_events.10.t: "Непал требует мира"
 nepal_war_events.10.d.indian: "То, что считалось простым вторжением для обеспечения контроля над слабым соседом, быстро превратилось в катастрофу. Наши войска не только не смогли взять [323.GetCapitalVictoryPointName], но непальские войска зашли так далеко, что оттеснили нас, захватив контроль над несколькими крупными индийскими городами. Теперь они требуют, чтобы мы прекратили наше вторжение и немедленно вывели все войска, официально признав их контроль над многочисленными пограничными регионами, на которые они ложно претендуют."
 nepal_war_events.10.d.factionleader: "То, что считалось простым вторжением для обеспечения контроля над слабым соседом, быстро превратилось в катастрофу. Наши союзники в Индии не только не смогли взять [323.GetCapitalVictoryPointName], но непальские войска зашли так далеко, что оттеснили их, захватив контроль над несколькими крупными индийскими городами. Непальские представители теперь пришли к нам, требуя, чтобы мы принудили к миру на индийском фронте, включая полное признание непальского контроля над пограничными регионами, на которые они претендуют."
 nepal_war_events.10.a: "Да, давайте закончим это сейчас."
 nepal_war_events.10.b: "Просто смиритесь с потерями и скажите индийцам сдаться."
 nepal_war_events.10.c: "Мы отказываемся сдаваться, продолжайте давить!"

 nepal_war_events.11.t: "[From.GetNameDefCap] просит мира с Непалом"
 nepal_war_events.11.d: "Наше вторжение в Непал обернулось полной катастрофой, и [FROM.GetNameDef] быстро пришли в ярость по этому поводу. Желая сократить свои потери, они принудили нас к миру с Непалом, потребовав от нас официально передать контроль над пограничными регионами, на которые Непал ложно претендует, и вывести все наши войска как можно скорее."
 nepal_war_events.11.a: "Невероятно!"

 nepal_war_events.20.t: "Тупик в войне с Непалом"
 nepal_war_events.20.d: "Наша попытка вторжения в Непал пошла не совсем так, как ожидалось: то, что должно было быть короткой операцией, превратилось в затяжной обмен ударами. На данном этапе, возможно, стоит просто сократить наши потери и предложить им мир на основе существующих линий фронта."
 nepal_war_events.20.a: "Да, давайте закончим это сейчас."
 nepal_war_events.20.b: "Мы попросим [ROOT.FactionLeader.GetNameDef] договориться о мире."
 nepal_war_events.20.c: "Нет! Мы будем править над [323.GetCapitalVictoryPointName] или умрем пытаясь!"

 nepal_war_events.21.t: "Индия просит нас выступить посредником в мире с Непалом"
 nepal_war_events.21.d: "Попытка вторжения в Непал наших индийских союзников пошла не совсем так, как ожидалось: то, что должно было быть короткой операцией, превратилось в затяжной обмен ударами. Поэтому [FROM.GetNameDefCap] попросили нас вмешаться и выступить посредником в заключении мира между ними и непальцами, при условии, что обе стороны согласятся признать существующие линии фронта будущей границей и отведут свои войска."
 nepal_war_events.21.a: "Тогда давайте закончим это сейчас."
 nepal_war_events.21.b: "Война не закончится, пока [323.GetCapitalVictoryPointName] не подчинится!"

 nepal_war_events.22.t: "Мир с [From.GetNameDef]?"
 nepal_war_events.22.d: "Хотя мы понесли большие потери в борьбе с [FROM.GetNameDef], стало ясно, что у них нет реальных шансов завоевать нас, как они явно планировали. Поскольку война зашла в тупик, представители с их стороны прибыли в [323.GetCapitalVictoryPointName], чтобы договориться о мире, при условии, что обе стороны отведут свои армии, а существующие линии фронта будут признаны границей, по крайней мере, на ближайшее будущее."
 nepal_war_events.22.a: "Да, давайте закончим это сейчас."
 nepal_war_events.22.b: "Ни за что!"

