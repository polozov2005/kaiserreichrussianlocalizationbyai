### Focuses ###
 CHL_air: "Обновить авиационную философию"
 CHL_air_desc: "Наши воздушные доктрины - это реликт времен ранней авиации, и то, что раньше было передовой технологией, теперь принадлежит музеям. Соответственно, наши пилоты и планирование будут обновлены."
 CHL_air2: "Авиапроизводство"
 CHL_air2_desc: "Внезапное сокращение финансирования авиации было основной причиной, почему она присоединилась к нам во время Революции; теперь мы должны внимательно позаботиться, чтобы наши самолеты были современными и всегда в хорошем состоянии. К счастью, у нас есть товарищи из Британского Союза, которые помогут нас в этом деле."
 CHL_fighters: "Усилия по исследованию истребителей"
 CHL_fighter2: "Самолёты непосредственной авиационной поддержки"
 CHL_fighter3: "Эксперименты с авиацией длинного радиуса полета"
 CHL_fighters_desc: "Превосходство в воздухе - это ключ к современной войне, мало кто в этом сомневается; но приход новых технологий означает, что наши старые бипланы больше не могут защищать чилийское небо."
 CHL_fighter2_desc: "Превосходство в воздухе будет бесполезно, если мы не сможем использовать его для помощи нашим войскам на линии фронта; нам понадобятся не только специализированные самолёты, но и специальные тренировки."
 CHL_fighter3_desc: "Со стратегической точки зрения, наша страна слишком вытянута по оси Север-Юг, чтобы ее можно было бы полностью защитить простыми истребителями. С помощью наших европейских товарищей, мы должны обеспечить, что у нашей авиации есть самолёты, способные к долгому автономному полету."
 CHL_airdoc: "Воздушная стратегия"
 CHL_airdoc2_desc: "Сами бои должны быть проанализированы, мы не можем себе позволить разбрасываться нашим небольшим числом самолетов. Осторожное изучение и маневрирование станут ключами в нашей будущей победе."
 CHL_airdoc_desc: "Воздушные схватки - это быстрые и жестокие сражения; поэтому следует готовиться к ним и стратегическим заданиям заранее. Нашему генеральному штабу придется решить, какая будет цель у наших ВВС в будущей войне."
 CHL_airdoc2: "Воздушная тактика"
 CHL_bomber: "Усилия по исследованию бомбардировщиков"
 CHL_bomber_desc: "Роль самолета-бомбардировщика достаточно нова, но его польза была уже давно доказана. Чтобы убедиться, что мы сможем защитить наше отечество, мы должны заменить старые модели времен Мировой войны."
 CHL_bomber2: "Современные бомбардировочные самолеты"
 CHL_bomber2_desc: "Чтобы убедиться, что наша авиация не только активная и модернизированная, но и современная, мы должны инвестировать в исследования разных бомбардировщиков, разделенных по ролям!"
 CHL_navy: "Правитель Тихого океана"
 CHL_navy_desc: "Наш флот, после недавних пополнений и инвестиций во время срока Председателя Пуги, пожалуй, самый сильный в Южной Америке; он точно самый хорошо вооруженный флот на Южном Тихом Океане, способный как на оборонительные, так и наступательные операции."
 CHL_highseas: "Флот открытого моря"
 CHL_highseas_desc: "Решающие сражения будущих войн будут происходить в открытом море, вдалеке от береговой поддержки. Чтобы убедиться, что наш флот готов к столкновению с потенциальным противником на западе, будут проводиться учения, морские упражнения и будет поднято на новый уровень планирование."
 CHL_dockyard: "Обновление флота"
 CHL_dockyard_desc: "Несмотря на хорошее вооружение и оснащение нашего флота, в нем состоят многие подержанные и устаревшие корабли; если мы хотим его модернизировать, мы не должны экономить ни на верфях, ни на портах, ни на артиллерийских системах."
 CHL_carry2: "Усилия по исследованию авианосцев"
 CHL_carry2_desc: "Многие эксперты уверены в важности авианосцев в современных морских сражениях; это особенно ярко выражено в нашей Республике, где многие члены генштаба ранее служили в авиации. Хотя он будет стоить огромные деньги, наличие современного авианосца может означать разницу между победой и поражением."
 CHL_cafi: "Морская авиация"
 CHL_cafi_desc: "Морская авиация всегда была ключевым фактором национальной обороны; большинство наших военных центров расположены в зоне обстрела корабельной артиллерии. Защита наших берегов от иностранной агрессии - задача первостепенной важности."
 CHL_hc: "Прорыв в крейсерах"
 CHL_hc_desc: "Крейсеры - основа нашего флота, однако, несмотря на усилия по расширению флота, у нас они все устаревших классов и типов. Нам нужны технологические улучшения"
 CHL_bc: "Дополнительные инвестиции в судоверфи"
 CHL_bc_desc: "Нельзя иметь сильный флот, полагаясь на иностранные судоверфи. С помощью наших европейских товарищей, наши доки будут улучшены по современным стандартам."
 CHL_bb: "Ввести в строй больше линкоров"
 CHL_bb_desc: "Корабли класса Альмиранте Латорре - хорошие линкоры, но они уже начинают устаревать, даже учитывая некоторые поставленные нами улучшения. Нам наверняка понадобится новый флагман, чтобы обеспечить безопасность страны."
 CHL_highseas2: "Океанская стратегия"
 CHL_highseas2_desc: "Учитывая все большую важность ведения боевых действий в океане, нам понадобятся новые доктрины и маневры, если мы хотим иметь возможность победить наших врагов."
 CHL_sub: "Уклон в сторону подлодок"
 CHL_sub_desc: "Наш нынешний подводный флот маленький и устаревший, поэтому нам нужны более современные, лучше вооруженные классы, которые будут наводить страх на флот империалистов."
 CHL_des: "Усилия по борьбе с подлодками"
 CHL_des_desc: "Наши усилия по борьбе с вражескими подлодками будут бесплодными, если наши малые корабли не будут достаточно современными, что поставит под риск как наши флагманы, так и морские пути. Мы обязаны этого не допустить."
 CHL_ls: "Рейдеры"
 CHL_ls_desc: "Даже если наш флот - один из сильнейших на юге, империалистические силы Германии, Соединенных Штатов и Аргентины могут заставить нас полагаться на ассиметричную войну, чтобы компенсировать наш недостаток тоннажа и живой силы."
 CHL_arms_of_the_revolution: "Осажденная нация"
 CHL_arms_of_the_revolution_desc: "Самая большая угроза для Чили - это не внутренняя, а восстающая контрреволюционная Аргентина. Они почти не скрывали их аппетиты на наши территории с самого их создания в 1800-ых, а теперь, осмелившиеся ввиду бразильской некомпетентности, хотят завоевать Чили. Мы этого не позволим!"
 CHL_mobility_potential: "Скоростной потенциал"
 CHL_mobility_potential_desc: "Многие слышали идеи и планы о том, что современная война будет быстрой и механизированной; даже если это не так, у нас нет живой силы, чтобы ввязываться в традиционную войну с Аргентиной и другими империалистами. Мы будем стараться, чтобы улучшить мобильность наших войск."
 CHL_communard_expertise: "Опыт коммунаров"
 CHL_communard_expertise_desc: "Французская агрессивная доктрина нашла сильную поддержку и сможет помочь нашему делу, особенно если учесть, что многие ее теоретики будут рады оказаться на фронте борьбы против империализма."
 CHL_tanque: "Усилия по исследованию танков"
 CHL_tanque_desc: "Нашим вооруженным силам нужны не просто танки, а современные, автономные и приспособленные к жесткому рельефу нашей родины. Наличие продвинутых военных машин может означать разницу между победой и поражением."
 CHL_tanque2: "Усилия по производству танков"
 CHL_tanque2_desc: "Мы не сможем механизировать наши войска простым импортом; мы должны убедиться, что наши заводы смогут обеспечить вооруженные силы сами, так как нельзя полагаться на другие страны в таких жизненно важных делах."
 CHL_army_rearmament: "Перевооружение армии"
 CHL_army_rearmament_desc: "Хотя армия не так обделена финансированием, как до Революции, она все еще плохо оснащена. Давайте покроем нужды наших офицеров и обеспечим то, что наша армия сможет победить любую угрозу."
 CHL_art: "Обновление арсенала"
 CHL_art_desc: "Наша артиллерия нуждается в срочном обновлении; поля битв Мировой войны служат доказательством этому. Только новые модели выстоят против Западной Агрессии."
 CHL_infeq2: "Современное военное снаряжение"
 CHL_infeq2_desc: "Несмотря на все наши усилия, снаряжение нашей армии далеко от современных стандартов. Нашим офицерам потребуется больше финансирования и внимания со стороны государства, но авангард революции требует только лучшего!"
 CHL_arty2: "Усилия по увеличению огневой мощи"
 CHL_arty2_desc: "Нам действительно нужны более точные, лучшие пушки, если мы хотим обеспечить выживание нашей страны. Теперь, имея специализированные орудия, мы обрушим огонь на головы врагов!"
 CHL_high_command: "Реформы верховного командования"
 CHL_high_command_desc: "Нашему военному верховному командованию нужна встряска, а контрреволюционеры не  будут ждать, пока мы обновим нашу стратегию и тактику!"
 CHL_mountaineer_focus: "Расширение горнострелковых бригад"
 CHL_mountaineer_focus_desc: "Горы, которые нас окружают, являются составной частью любого плана национальной обороны в случае иностранного вторжения. Проходы, вершины и склоны должны охраняться не свежими новобранцами, а элитными, специально тренированными подразделениями, готовыми к суровым реалиям жизни в горах."
 CHL_andean_strategy: "Андская стратегия"
 CHL_andean_strategy_desc: "Так называемая Линия Сантьяго будет нашей последней оборонительной линией, если Аргентина победит нас и перейдет Анды. Жёсткий рельеф вокруг Сантьяго станет неприступным для иностранных захватчиков, что позволит нам противостоять даже самому серьезному вражескому превосходству в численности."
 CHL_long_term_planning: "Долгосрочное планирование"
 CHL_long_term_planning_desc: "Важны не только битвы и боестолкновения, но и передвижение и организация как наших войск, так и противника. Доскональное их изучения подготовит наш генштаб к предстоящей Войне с Империализмом."
 CHL_strategic_mining: "Экономическое развитие"
 CHL_strategic_mining_desc: "Чтобы быть эффективными в военное время, мы должны инвестировать в экономику. Дальнейшая индустриализация будет чрезвычайно полезна для нашей страны."
 CHL_doctrine_offense: "Доктрина нападения"
 CHL_doctrine_offense_desc: "Мы обеспечим готовность наших войск и генерального штаба к наступлению на наших врагов. Честь полка нас далеко не увезет, стратегия и планирование обеспечат нашу победу!"
 CHL_drilled_military: "Возобновить строгие стандарты муштры"
 CHL_drilled_military_desc: "Некогда чилийские вооруженные силы называли 'Южной Пруссией', а их боевым качествам и дисциплине завидовали все. Теперь, когда она выполнила свою роль как народного авангарда, пришло время обратить наш взор на тех, кто собирается обидеть наших соотечественников и те идеи, которые они поддерживают."
 CHL_the_third_chairman: "Третий Председатель"
 CHL_the_third_chairman_desc: "После окончания срока Мармадуке Грове, сконцентрировавшем свои усилия на обороне, кто станет Третьим Председателем?"
 CHL_total: "Лабарка и фракция тоталистов"
 CHL_total_desc: "Лабарка и мослиисты знают, что только сильное правительство сможет защитить Чили от его многочисленных врагов. Теперь народ защищен!"
 CHL_permanet: "Доктрина перманентной революции"
 CHL_permanet_desc: "Одно из убеждений лабаркистов состоит в том, что Революцию можно сохранить только силой, с реакционными элементами нельзя договариваться и даже вести переговоры. Диктатура Пролетариата будет постоянной, пока в ней не отпадет необходимость."
 CHL_directrule: "Централизованное планирование"
 CHL_directrule_desc: "Все решения об экономическим благосостоянии государства должны приниматься после консультаций с Центральными Комитетами в Сантьяго. Делать иначе - это в лучшем случае глупо, в худшем - измена."
 CHL_chairmanmega: "Расширить полномочия Председателя"
 CHL_chairmanmega_desc: "Многим действиям Председателя все еще нужно одобрение Синдикалистского Конгресса, что сильно ограничивает нашу способность быстрого реагирования. Мы обязаны это изменить!"
 CHL_commisariats: "Революционные комиссары"
 CHL_commisariats_desc: "Мы назначили офицеров на заводы и в армейские подразделения, которые обеспечат постоянный тяжелый труд, так как спокойный разум - это приглашение контрреволюции."
 CHL_directcivilian: "Промышленные квоты"
 CHL_directcivilian_desc: "Каждая фабрика, шахта и коммуна должны достичь определенных целей, иначе все Чили падет. Мы обеспечим выполнение этих квот."
 CHL_loyalty: "Наградить верных тоталистов"
 CHL_loyalty_desc: "Мужчины и женщины, которые помогали нам с самого начала, когда мы были слабы; вот те немногочисленные избранные, кому предназначено возглавить авангард партии!"
 CHL_clean: "Правительство тоталистов"
 CHL_clean_desc: "Тотализм означает полную верность и полную преданность революционным идеалам, которые нам так дороги, несмотря ни на что. Нельзя допускать 'умеренных' к принятию сколько-нибудь серьезных решений."
 CHL_getcounterrev: "Обеспечить верность офицеров"
 CHL_getcounterrev_desc: "Многие офицеры все еще старомодны и являются традиционалистами, они даже могут быть теократами с их прискорбной приверженностью древним религиям. Но их священники не смогут предсказать им, как можно наколдовать спасение от Революционного Трибунала!"
 CHL_helicopter_rides: "Расправиться с изменниками"
 CHL_helicopter_rides_desc: "Некоторые индивидуумы все еще верны контрреволюционным идеалам и не готовы от них отказаться. Есть место, где они смогут сохранять свое мировоззрение: Остров Пасхи. Конечно, на пути туда с ними могут произойти много неприятных вещей..."
 CHL_santiago: "Прямое управление из Сантьяго"
 CHL_santiago_desc: "Революция стала Тотальной, и мы можем пожинать плоды нашей долгой и трудной работы. Хвала товарищу Лабарке и героям, которые принесли свет во тьму!"
 CHL_strengthen_republic: "Усилить республику"
 CHL_strengthen_republic_desc: "Наша революция слишком много времени уделила беспокойству об угрозах и заговорах, и забыла о рабочем, за которого она должна была сражаться. Это изменится сейчас же!"
 CHL_cement_congresses: "Укрепить авторитет Конгресса"
 CHL_cement_congresses_desc: "Конгресс Синдикатов все еще в некотором роде неизвестен рабочим; многие называют его просто Сенатом, по привычке. Мы обеспечим то, что его члены, решения и достижения будут хорошо известны простому народу."
 CHL_extended: "Расширить власть КЧС"
 CHL_extended_desc: "Конгресс Синдикатов стал настоящим домом демократии, в отличии от парламента Старой Республики. Однако, он все ещё бессилен в многих вопросах - наследие нашего чрезмерно централизованного президентского прошлого. Мы обязаны это исправить!"
 CHL_autonomous_councils: "Автономные советы"
 CHL_autonomous_councils_desc: "Местные рабочие советы получат больше автономии от Сантьяго, хотя и будут соблюдать директивы наших товарищей из столицы; такой баланс принесет гармонию в отношениях между обеими сторонами вопроса."
 CHL_anarchosyndicalism: "Расширенная местная автономия"
 CHL_anarchosyndicalism_desc: "Местные коммуны знают лучшего всего, что нужно их гражданам, и мы разрешим им выбирать приоритеты и инвестиции соответственно."
 CHL_conciliation: "Усилия по примирению"
 CHL_conciliation_desc: "Любой политический спор создаёт вражду, а революция это только усугубляет. Многих талантливых товарищей дискриминируют за плохо-информированные мнения, которых они придерживались годы назад, и эти предрассудки мешают процветанию Республики."
 CHL_tackle_unemployment: "Борьба с безработицей"
 CHL_tackle_unemployment_desc: "Многие в чилийских городах не могут приносить пользу обществу из-за недостатка промышленных предприятий - мы должны немедленно заняться этой проблемой."
 CHL_peace_and_calm: "Промышленное процветание"
 CHL_peace_and_calm_desc: "После реорганизации правительства и вооруженных сил, наша страна наконец может вкусить настоящие мир и процветание!"
 CHL_do_away_with_conservative: "Рабочие домашнего фронта"
 CHL_do_away_with_conservative_desc: "Теперь, когда столько хороших мужчин ушло на фронт, наши заводы страдают от недостатка живой силы, чтобы продолжать работу. Время расстаться с консервативными идеалами и обеспечить возможность чилийским женщинам внести свой вклад."
 CHL_arms_factories: "Обширное военное расширение промышленности"
 CHL_arms_factories_desc: "Мы обеспечим наши войска на фронте снаряжением, чтобы они могли выполнять свой долг на поле боя."
 CHL_additonal_militarization: "Расширить арсеналы"
 CHL_additonal_militarization_desc: "Мы должны подготовить всю нашу мощь к приближающемуся шторму контрреволюции, даже если он принесет жестокую борьбу."
 CHL_joint_projects: "Совместные проекты"
 CHL_joint_projects_desc: "Многие наши академики отправятся во Францию и в Европу, чтобы помочь как Чили, так и всей Мировой Революции!"
 CHL_techslot: "Серьезная реформа образования"
 CHL_techslot_desc: "Наша образовательная система имеет много изъянов, но главный из них - это недостаток финансирования и помощи со стороны государства. Теперь это изменится."
 CHL_watchoutforthosesiterockets: "Обмен продвинутыми технологиями"
 CHL_watchoutforthosesiterockets_desc: "Участие наших ученых в исследованиях в Европе принесло нам продвинутые идеи и чертежи, которые могут быть необходимыми для защиты революции!"
 CHL_milsci: "Военная наука"
 CHL_milsci_desc: "К сожалению, на данный момент, наши школы должны учить больше защите революции, чем теоретическим проблемам и вопросам. Все Чили должно отозваться на зов!"
 CHL_counter_revolution: "Контрреволюция"
 CHL_counter_revolution_desc: "После падения синдикалистского правительства, для начала, мы должны создать основу нашего собственного."
 CHL_provisional_junta: "Временная хунта"
 CHL_provisional_junta_desc: "Хунта Бланша получила власть, и теперь должна постепенно получить контроль над чилийским правительством."
 CHL_restoring_order: "Восстановление порядка"
 CHL_restoring_order_desc: "После захвата нашей хунтой власти в бывших синдикалистских институтах, для начала, мы должны утихомирить население и создать видимость порядка в Чили."
 CHL_restoring_private_enterprise: "Восстановление частных предпринимательств"
 CHL_restoring_private_enterprise_desc: "Чтобы по-настоящему перейти от синдикализма, мы должны восстановить частную собственность, начиная с важных предприятий."
 CHL_restoring_mining_industry: "Восстановление горнодобывающей промышленности"
 CHL_restoring_mining_industry_desc: "Чтобы поддержать восстановление Чили, мы должны поставить компетентных бизнесменов в главе шахт нашей страны."
 CHL_basic_economics: "Базовая экономика"
 CHL_basic_economics_desc: "Строительство базиса нашей экономики важно для будущей стабильности и процветания Чили."
 CHL_restoring_democratic_instituitions: "Восстановление демократических институтов"
 CHL_restoring_democratic_instituitions_desc: "Мы должны воссоздать бывшие демократические институты Республики Чили."
 CHL_restoring_rule_of_law: "Восстановление главенства закона"
 CHL_restoring_rule_of_law_desc: "Бывшее правительство поменяло многие чилийские законы, поэтому мы должны их реформировать и восстановить Верховный Суд Чили, чтобы достичь настоящего главенства закона."
 CHL_the_last_power: "Последняя сила"
 CHL_the_last_power_desc: "Чтобы обеспечить успешный переход к демократии, мы должны создать систему для работы парламента и президента республики."
 CHL_emergency_aid: "Экстренная помощь"
 CHL_emergency_aid_desc: "Чтобы восстановить в Чили стабильную южноамериканскую демократию, мы должны попросить помощи у наших бывших врагов о всему миру."
 CHL_reinstate_taxation: "Восстановление налогов"
 CHL_reinstate_taxation_desc: "Если наша страна хочет стать стабильной и процветающей, ей необходимо наличие налогообложения, его восстановление должно стать нашим приоритетом."
 CHL_desyndicalize_provincial_organization: "Десиндикализировать местные организации"
 CHL_desyndicalize_provincial_organization_desc: "Реорганизация бывших органов местного самоуправления позволит нам построить еще больше промышленности."
 CHL_elections_free: "Свободные выборы"
 CHL_elections_free_desc: "После счастливого завершения выборов, мы снова можем назвать себя демократией!"
 CHL_elections_free_conservative: "Победа консерваторов"
 CHL_elections_free_conservative_desc: "После получения власти партией дель Кампо, они наконец-то смогут оправдать себя и принести в Чили процветание."
 CHL_youth_recovery: "Восстановление молодежи"
 CHL_youth_recovery_desc: "Мы должны составить программы по привлечению молодежи Чили в престижные вооруженные силы, а также дать семейные льготы, чтобы увеличить рост населения ради будущего Чили."
 CHL_restore_church_special_status: "Восстановление специального статуса церкви"
 CHL_restore_church_special_status_desc: "Одной из вещей, забытых при восстановлении налогообложения стали исключения для церкви, что мы немедленно исправим."
 CHL_chilean_traditions: "Чилийские традиции"
 CHL_chilean_traditions_desc: "Если мы хотим научно быть наравне с остальным миром, в Чили должны быть стабильные и подробные образовательные программы, обучающие нашим традициям."
 CHL_industrial_collaboration: "Промышленное сотрудничество"
 CHL_industrial_collaboration_desc: "Сотрудничая с счастливыми предпринимателями, которых мы восстановили, мы легко расширим нашу гражданскую промышленность."
 CHL_restore_landowning_private: "Восстановление частного владения землей"
 CHL_restore_landowning_private_desc: "Возвращение земли ее правомерным владельцам ослабит ношу на нашем правительстве, и позволит нам эффективнее управлять землями, оставшимся под нашим контролем."
 CHL_elections_free_socdem: "Победа социал-демократов"
 CHL_elections_free_socdem_desc: "После победы Монтеро и его партии на выборах, они должны подготовиться к их будущим реформам в Чили."
 CHL_fuffling_the_calais_pact: "Изменить Пакт Кале"
 CHL_fuffling_the_calais_pact_desc: "Реорганизация нашей партии позволит нам более эффективно проводить законы и влиять на наше правительство."
 CHL_development_program: "Программа развития"
 CHL_development_program_desc: "Работа с нашими индустриальными лидерами в новой правительственной программе о дальнейшем расширении и улучшении обеспечит стабильный промышленный рост."
 CHL_the_new_republic: "Новая Республика"
 CHL_the_new_republic_desc: "Благодаря успеху наших предыдущих программ, мы с легкостью можем поднять популярность нашей партии и укрепить стабильность нашего государства."
 CHL_democratic_amnesty: "Демократическая амнистия"
 CHL_democratic_amnesty_desc: "Предложив амнистию демократическим изгнанникам в Южной Америке, мы получим приток талантливых политиков и учёных, спасающихся от репрессивных режимов."
 CHL_rehabilitation_military: "Реабилитированные военные"
 CHL_rehabilitation_military_desc: "Большая часть военных поддерживала синдикалистов, и хотя они приняли смену власти, некоторая их часть испытывает к нам антипатию, приложив некоторые усилия, мы сможем это изменить и стабилизировать наши вооруженные силы."
 CHL_elections_free_marlib: "Победа либералов"
 CHL_elections_free_marlib_desc: "После победы Артуро Алессандри и либеральной партии на выборах, они смогут вновь сделать Чили великой экономической державой."
 CHL_detable_prices: "Дерегуляция цен"
 CHL_detable_prices_desc: "Дерегуляция цен позволит корпоративному сектору органично расти, что поможет нам в других сферах, например, мы сможем более выгодно продавать наши ресурсы."
 CHL_laissez_faire: "Принцип невмешательства"
 CHL_laissez_faire_desc: "Наш принцип невмешательства привлечет в нашу страну больше капитала и талантливых людей, что расширит наше производство и исследования."
 CHL_deunionze_workers: "Деунионизация рабочих"
 CHL_deunionze_workers_desc: "Избавившись от рабочих профсоюзов, мы нанесем удар по оставшимся синдикалистам и расширим чилийскую промышленность."
 CHL_press_freedom: "Гарантировать свободу прессы"
 CHL_press_freedom_desc: "Гарантировав свободу прессы, мы покажем чилийцам, что они на самом деле свободны, и что мы не боимся столкнуться с критикой."
 CHL_detable_currencies: "Дерегуляция валют"
 CHL_detable_currencies_desc: "Либерализовав нашу валюту, мы избавимся от плохой экономической регуляции и позволим рынку свободно действовать, принося нам прибыль."
 CHL_elections_free_np: "Победа популистов"
 CHL_elections_free_np_desc: "Неожиданно Мареес и его партия получили большинство на выборах, хотя многие недовольны тем, что он уже пытается увеличить свою власть."
 CHL_nationalist_junta: "Националистическая хунта"
 CHL_nationalist_junta_desc: "После получения власти Вальдеррама объявил план по борьбе со своими политическими противниками, чтобы предотвратить синдикалистский контрпереворот."
 CHL_assert_dominance: "Укрепить доминирование"
 CHL_assert_dominance_desc: "Мы должны дать всем ясно понять, что только мы руководим государством."
 CHL_cleanse_military_dissent: "Расправиться с военным недовольством"
 CHL_cleanse_military_dissent_desc: "В армии есть много сочувствующих синдикалистам, мы должны их переобучить, пока они не создали проблемы."
 CHL_cleanse_naval_dissent: "Расправиться с недовольством моряков"
 CHL_cleanse_naval_dissent_desc: "Даже наш великий флот не защищен от синдикалистских идей, мы должны устранить тех, кто сочувствует этим радикальным левым."
 CHL_political_peace_by_force: "Политический мир, силой"
 CHL_political_peace_by_force_desc: "Использовав наше огромное влияние и запугивание, мы принесем стабильность в нашу страну."
 CHL_violent_de_syndicalization: "Жестокая десиндикализация"
 CHL_violent_de_syndicalization_desc: "Хотя им официально запрещено участвовать в правительстве, среди нас есть синдикалисты, а вокруг нас лежат остатки их режима, мы должны быстро это изменить."
 CHL_radical_curriculum_changes: "Радикальное изменение куррикулума"
 CHL_radical_curriculum_changes_desc: "Наш образовательный куррикулум устаревший и неэффективный, мы должны его радикально изменить, если мы хотим стать стабильным современным государством."
 CHL_administrative_centralization: "Административная централизация"
 CHL_administrative_centralization_desc: "Централизовав все сферы государства, мы укрепим нашу власть и одновременно улучшим нашу подготовку к войне."
 CHL_the_state: "Усилить государство"
 CHL_the_state_desc: "Усилив государство, мы получим больше власти и народной поддержки."
 CHL_chilean_identity: "Чилийская идентичность"
 CHL_chilean_identity_desc: "Мы должны поддерживать национальную идентичность отдельной чилийской нации, чтобы улучшить гордость и дух нашего народа."
 CHL_nationalist_propaganda: "Националистическая пропаганда"
 CHL_nationalist_propaganda_desc: "Контроль над СМИ позволяет нам распространять пропаганду и усилить поддержку нашего правительства."
 CHL_prussian_ethos: "Прусский дух"
 CHL_prussian_ethos_desc: "Мы должны полностью принять нашу роль как 'Южную Пруссию', и тренировать наши вооруженные силы до максимума дисциплины и боеготовности."
 CHL_national_mythos: "Национальный миф"
 CHL_national_mythos_desc: "Пропагандируя то, что означает быть чилийцем, и чилийскую культуру, мы создадим в нашей стране такой дух, который невозможно сломить."
 CHL_hispanism: "Испанизм"
 CHL_hispanism_desc: "Ключевая идея испанизма - это  то, что все испаноязычные народы должны быть вновь объединены в новую империю, мы должны осуществить эту цель!"
 CHL_natural_order: "Естественный порядок"
 CHL_natural_order_desc: "Это естественно, когда слабые боятся сильных, поэтому мы должны расширять нашу армию, поддерживающую нашу идеологию."
 CHL_anti_sindicalism: "Антисиндикализм"
 CHL_anti_sindicalism_desc: "Хотя мы уже сделали несколько шагов, чтобы стереть с истории Чили пятно синдикализма, мы должны сконцентрировать наши усилия на полном сокрушении умирающей идеологии, чтобы обеспечить стабильность нашей страны."
 CHL_land_of_santiago: "Земля Сантьяго"
 CHL_land_of_santiago_desc: "Чтобы достигнуть настоящего испанизма, мы должны поднять знамя священного лидера испаноязычного мира, и показать нашу решимость достигнуть наших целей силой."

### Intro Screen ###
 CHL_country_intro_background: "GFX_CHL_intro"
 CHL_country_intro_header: "Чили в 1936 году"
 CHL_country_intro_content: "После Второй Тихоокеанской войны 1879-1883 гг. Чили получило перуанские провинции, богатые селитрой - Тарапаку и Арику, вдобавок к боливийскому прибрежному региону Антогафасте, страна получила доступ к огромным запасам меди и монополизировала мировую торговлю селитрой. Началась фаза экономического процветания, поддержанного высоким спросом на селитру в начале Мировой войны. Однако, химические реакции, изобретенные во время войны, позволили создавать этот минерал искусственно, что сделало огромные его запасы в Чили бесполезными. Ухудшающиеся экономические условия вкупе с ростом населения вызвали социальный кризис. Рабочие и профсоюзы получили политическое влияние, особенно после кошмарного правления Карлоса Ибаньеса дель Кампо, когда Чили в 1931 году объявило банкротство. Вскоре после этого, Ибаньес был смещен, а флот и большинство армии подняли восстание, поддержанное народом, возвращение подкреплений во главе со старым изгнанником Мармадуке Грове из Британского Союза привели к провозглашению Синдикалистской Республики Чили. После 5 лет восстановления, руководимого первым советом, номинально возглавленным Артуро Пугой, экономика испытала значительное улучшение и началось строительство в военных целях. Теперь, когда аргентинская риторика становится все более агрессивной, всеми уважаемый Мармадуке Грове, военный-ветеран двух революций, разделенных океаном, возглавляет восстанавливающуюся республику. Однако, не все чилийцы смотрят в будущее с таким оптимизмом, как синдикалистские лидеры..."

 CHL_guide: "§MPartido Sindicalista Chileno / Alianza Socialista Nacional / Partido Revolucionario Permanente§! ($radical_socialist_coloured$ / $syndicalist_coloured$ / $totalist_coloured$)\n£white_dot Когда появится событие о выборе третьего председателя, выберите Карлоса Лабраку (тоталист), Сальвадора Альенде (радикальный социалист), или Клотарио Блеста Риффо, который останется синдикалистом. \n£white_dot Через 5 лет снова пройдут выборы, и вы сможете выбрать четвертого председателя - синдикалиста, радикального социалиста или тоталиста, а через 5 лет после этого пройдут еще одни выборы с теми же вариантами."

### Events ###
 chile_events.100.t: "Землетрясение в Чили"
 chile_events.100.d: "Землетрясение в Чили убило 30.000 людей, а тысячи остались бездомными. Мы должны сделать что-то, чтобы им помочь."
 chile_events.100.a: "Помочь выжившим!"
 chile_events.100.b: "Нужды многих важнее нужд невезучего меньшинства"

 chile_events.1.t: "Третий Председатель"
 chile_events.1.d: "Наша молодая республика теперь проводит свои вторые центральные выборы; люди празднуют на улицах, и три кандидата надеются получить голоса рабочих. Блест Риффо, который сражался за права рабочих во времена худших репрессий, поддерживаем как Мармадуке, так и большинством ортодоксальных синдикалистов, то есть имеет большинство голосов. С ним соперничает молодой Сальвадор Альенде, чья оппозиционная коалиция настолько широка, что она становится неповоротливой, но они обещают лучшее будущее для Чили. Также, с мизерными шансами на успех, тоталисты, испытавшие влияние таких европейских социалистов, как Мосли и Берия, выбрали своим кандидатом Лабарку. Так что же решит народ?"
 chile_events.1.a: "Клотарио Блест Риффо и ортодоксальные синдикалисты"
 chile_events.1.b: "Сальвадор Альенде и Социальная коалиция"
 chile_events.1.c: "Карлос Лабарка и мослиисты"

 chile_events.2.t: "Четвертый Председатель"
 chile_events.2.d: "После 10 лет стабильного правительства, чилийский народ радуется процветанию и миру, принесенному революцией. Теперь пришло время избрать Четвертого Председателя Чилийской Синдикалистской Республики. Три кандидата хотят получить эту должность, причем двое из них - уважаемые и хорошо известные поэты и писатели. Габриэла Мистраль ведет за собой Пакт Кале, широкую коалицию интеллектуалов и политиков, защищающих центральное правительство Республики, но, в отличии от тоталистов Карлоса Контреры Лабарки, считают регулярные выборы и личные свободы чрезвычайно важными. Ортодоксальных синдикалистов возглавляет Пабло Неруда, еще один очень успешный писатель и поэт. Но какая из них станет доминирующей партией в Чили?"
 chile_events.2.a: "Лусила Годой Алькайяга, более известная как Габриэла Мистраль, и неортодоксальные синдикалисты"
 chile_events.2.b: "Карлос Лабарка и мослиисты"
 chile_events.2.c: "Рикардо Элиэсер Нефтали, более известный как Пабло Неруда, и ортодоксальные синдикалисты"

 chile_events.3.t: "Пятый Председатель!"
 chile_events.3.d: "Прошло 15 лет стабильного правительства в Чили, и вновь пришло время выбирать председателя республики."
 chile_events.3.a: "Аурелио Селедон Пальма и Новая социальная коалиция"
 chile_events.3.b: "Карлос Диас Лойола, более известный как Пабло де Рока, и мослиисты"
 chile_events.3.c: "Луис Эмилио Рекабаррен и ортодоксальные синдикалисты"

 chile_events.4.t: "Председатель [GetYear] года вступает в должность"
 chile_events.4.d: "Теперь, после того как Председатель официально вступил в должность, сторонники его партии поздравляют его с успехом."
 chile_events.4.a: "Виват!"

 chile_events.5.t: "Демократические выборы [GetYear] года"
 chile_events.5.d: "Хорхе Гонсалес фор Мареес и Офицерский комитет против атеизма и изменников"
 chile_events.5.a: "Карлос Ибаньес дель Кампо и Альянс народной свободы"
 chile_events.5.b: "Хуан Эстебан Монтеро и Пакт Кале"
 chile_events.5.c: "Артуро Алессандри и Либеральная партия"
 chile_events.5.e: "Jorge González von Marées and the Committee of Officers Against Atheism and Traitors."

 chile_events.6.t: "Демократические выборы [GetYear] года"
 chile_events.6.d: "Хорхе Гонсалес фор Мареес и Офицерский комитет против атеизма и изменников"
 chile_events.6.a: "Хуан Пабло Беннетт и Альянс Народной Свободы"
 chile_events.6.b: "Габриэль Гонсалес Видела и Пакт Кале"
 chile_events.6.c: "Эдуардо Алессандри и Либеральная партия"
 chile_events.6.e: "Jorge González von Marées and the Committee of Officers Against Atheism and Traitors."

 chile_events.9.t: "Освободительная война!"
 chile_events.9.d: "Теперь мы с Аргентиной находимся в состоянии войны, наши армия флот уже мобилизуются к предстоящему конфликту."
 chile_events.9.a: "Мы должны помочь нашим аргентинским товарищам!"

 chile_events.10.t: "Переговоры по Огненной Земле"
 chile_events.10.d: "После того, как наши товарищи получили контроль над Огненной Землей, у нас есть уникальная возможность начать переговоры по этой территории как репарации за нашу помощь в войне. Это позволит Чили полностью контролировать Магелланов пролив!"
 chile_events.10.a: "Да! Начать переговоры"
 chile_events.10.b: "Она бесполезна, пусть остается у них"

 chile_events.11.t: "Чили просит Огненную Землю"
 chile_events.11.d: "Наши товарищи из Чили просят контроль над Огненной Землей, как репарацию за их помощь в войне против Аргентины."
 chile_events.11.a: "Она бесполезна, пусть будет у них"
 chile_events.11.b: "Никогда!"

 chile_events.12.t: "Захватить Галапагосские острова"
 chile_events.12.d: "Мы можем использовать войну на континентальном Эквадоре как отвлекающий фактор и повод для захвата Галапагосских островов как морскую базу для нашего флота."
 chile_events.12.a: "Сделаем это! Наш могучий флот правит Тихим океаном"
 chile_events.12.b: "Лучше не стоит."

 chile_events.17.t: "Переворот удался!"
 chile_events.17.d: "Офицерский комитет победил! Две главные силы этой группы: офицеры, ведомые Бартоломе Бланшом, который поддерживает временную хунту, чтобы вернуться к демократии, и вторая группа, ведомая Франсиско Диасом Вальдеррамой, который хочет заключить власть государства в руках националистической хунты. Только одна из этих фракций может участвовать в новом чилийском правительстве..."
 chile_events.17.a: "Бартоломе Бланш сохраняет власть хунты!"
 chile_events.17.b: "Франсиско Диас Вальдеррам захватывает государственный аппарат!"

 chile_events.18.t: "Бланш сигнализирует о выборах"
 chile_events.18.d: "Бланш успокоил страхи о вечной хунте, подтвердив, что в Чили проведутся демократические выборы."
 chile_events.18.a: "Прекрасно!"

 chile_events.19.t: "Культурная кампания испанистов"
 chile_events.19.d: "Правительство, возглавляемое Вальдеррамой, объявило о кампании по пропаганде испансистской культуры, чтобы включить ее в состав собственной культуры Чили."
 chile_events.19.a: "Похвальная инициатива"

 chile_events.20.t: "Рафаэль Франко просит нас освободить Парагвай"
 chile_events.20.d: "Наши товарищи из Парагвая вошли с нами в контакт, прося нас освободить их от режима угнетателей."
 chile_events.20.a: "Мы это сделаем, если сможем!"

 chile_events.21.t: "Победить Голиафа!"
 chile_events.21.d: "Наконец время пришло, чтобы показать Бразилии, что главное - не размер, а мастерство!"
 chile_events.21.a: "Бразилия нас не остановит!"

 chile_events.22.t: "Арест реакционеров"
 chile_events.22.d: "Наши недавние усилия по выдавливанию изменников принесли свои плоды, и мы арестовали многих предателей и реакционеров."
 chile_events.22.a: "Посадите их в самолеты, видеть их не хочу"

 chile_events.23.t: "Мапуче восстают против нас!"
 chile_events.23.d: "Из-за того, что нынешняя война отягощает нашу страну, мапуче, в провинциях южнее Сантьяго, подняли восстание против нашего правительства и организовали слабое партизанское движение, чтобы создать нам проблемы."
 chile_events.23.a: "Проклятые индейцы!"

 chile_events.24.t: "Интересная встреча"
 chile_events.24.d: "Лидер оппозиции Сальвадор Альенде встретился с уважаемым офицером Бартоломе Бланшом сегодня за ужином, и договорились о новой встрече, чтобы обсудить 'щекотливые темы'."
 chile_events.24.a: "'Я заинтригован, мы еще встретимся'"

 chile_events.25.t: "Вторая встреча"
 chile_events.25.d: "Сальвадор Альенде и Бартоломе Бланш вновь встретились сегодня, в этот раз у Альенде дома, где офицер предложил отложить в сторону разногласия, чтобы вместе свергнуть нынешнее тоталистское правительство, однако ему понадобится время, чтобы придумать план."
 chile_events.25.a: "'Мы сможем работать вместе... Пока что"

 chile_events.26.t: "Планирование операции"
 chile_events.26.d: "После мучительного ожидания Бланш вернулся к Альенде с подготовленным планом как вернуть власть из рук тоталистов, объяснив его лидеру социалистов. Бланш настаивал на том, что убийство необходимо для срабатывания плана, но Альенде мешкал и больше склонялся к принуждению отречения от власти."
 chile_events.26.a: "Мы сначала убьем Председателя, а потом исполним его"
 chile_events.26.b: "Окружим Дворец и заставим его уйти в отставку"

 chile_events.27.t: "Переворот удался!"
 chile_events.27.d: "Силы Альенде и Бланша успешно сместили репрессивный режим тоталистов, но теперь придется выяснить, кто из этих двоих станет лидером Чили"
 chile_events.27.a: "Сформирована хунта под Бартоломе Бланшем"
 chile_events.27.b: "Умеренные социалисты, ведомые Альенде, получают власть"

 chile_events.28.t: "Переворот провалился!"
 chile_events.28.d: "Несмотря на все усилия заговорщиков, силы тоталистов предотвратили переворот против своего правительства! Они арестовали многих заговорщиков, но их лидеры на свободе. Однако после этого мнение народа о тоталистах ухудшилось."
 chile_events.28.a: "Проклятые предатели! Заводите самолеты и звоните на остров Пасхи, скоро он будет загружен"

 chile_events.32.t: "Лусила Годой объединяется с Альенде"
 chile_events.32.d: "Больше известная под ее литературным псевдонимом Габриэла Мистраль, Лусила Годой Алькайяга объявила свое членство и номинирование на кандидатуру Председательницы в партии умеренных Альенде, которая была недавно переименована в 'Неортодоксальные синдикалисты'."
 chile_events.32.a: "Широкий фронт становится ещё шире!"

 chile_events.33.t: "Рикардо Элисьер Нефтали продвигается в рядах ортодоксальных"
 chile_events.33.d: "Рикардо Элисьер Нефтали, больше известный как Пабло Неруда, необычайно быстро поднялся в рядах ортодоксальных социалистов, став их кандидатом на пост Председателя в будущих выборах."
 chile_events.33.a: "Поэт против другого!"

 chile_events.34.t: "Лабарка попробует ещё раз!"
 chile_events.34.d: "Несмотря на поражение на предыдущих выборах, Лабарка неутомим, объявив свою заявку на пост Председателя этим утром."
 chile_events.34.a: "Так и есть"

 chile_events.35.t: "Нефтали выпускает политизированную книгу!"
 chile_events.35.d: "Неожиданным ходом, Нефтали выпустил книгу, описывающую его планы, если его изберут Председателем, и критикующую недостатки как Лусилы Годой и Карлоса Лабарки, так и их партий."
 chile_events.35.a: "Близится драка!"

 chile_events.36.t: "Лусила агрессивно отвечает на претензии Нефтали"
 chile_events.36.d: "В ответ на оскорбительные претензии, опубликованные Нафтали в его книге, Лусила ответила обвинениями в трусости и злонамерении, дав ход продолжению политической битвы."
 chile_events.36.a: "Как нецивилизованно!"

 chile_events.37.t: "Пабло де Рока поддерживает Лабарку и высмеивает Нефтали"
 chile_events.37.d: "Третий поэт вступил на поле политических битв на этих выборах. Карлос Диас Лойола, известный как Пабло де Роха, вышел, и выразил свою поддержку Лабарке и мослиистам, одновременно высмеивая книгу Нефтали и его лидерские способности."
 chile_events.37.a: "Так много поэтов, мы скоро соскучимся по простым политикам!"

 chile_events.38.t: "Нефтали отвечает на оскорбления и просит цивилизованности"
 chile_events.38.d: "Лидер ортодоксальных ответил на атаки, сойдя с предыдущих позиций вражды, и призвал к цивилизованности пред предстоящими выборами, что некоторые посчитали проявлением слабости, а другие профессиональным ответом."
 chile_events.38.a: "Почему мы не можем жить дружно?"

 chile_events.39.t: "Нетали и Лусила улаживают недопонимания"
 chile_events.39.d: "После завершения выборов, лидеры партий Лусила Годой и Рикардо Нефтали встретились, чтобы исправить испорченные отношения между партиями и укрепить связи, чтобы эффективнее управлять Чили."
 chile_events.39.a: "Прекрасное развитие!"

 chile_events.40.t: "Пабло де Рока вновь атакует Нефтали и Годой"
 chile_events.40.d: "Несмотря на поражение на выборах, тоталисты не изменили своей враждебной риторики, и Пабло де Рока выдвинул новые претензии лидерам двум противостоящим ему партиям. Это подняло еще больше беспокойства и сарказма на чилийской политической сцене, хотя лидер мослиистов Карлос Лабарка неожиданно тихо отреагировал на эти события."
 chile_events.40.a: "Как грубо!"

 chile_events.41.t: "Пабло де Рока становится лидером тоталистов!"
 chile_events.41.d: "Объявив о своем неэффективном лидерстве и поражении на выборах, Пабло де Рока отказался от поста председателя партии мослиистов. Вакуум был быстро заполнен наглым поэтом Карлосом Даисом Лойолой, чья популярность вдохнула новую жизнь в загнивавшую партию мослиистов."
 chile_events.41.a: "Сможет ли новое лидерство им реально помочь?"

 chile_events.42.t: "Возглавление революции в Америке!"
 chile_events.42.d: "После страшного краха ОСА мы остались единственной крупной синдикалистской страной в Америке. Мы должны храбро поднять знамя революции!"
 chile_events.42.a: "Виват!"

 chile_events.43.t: "Возвращение Карлоса Ибаньеса дель Кампо?"
 chile_events.43.d: "Из изгнания во время революции, наконец вернулся Карлос Ибаньес дель Кампо, который подал заявку на участие в выборах Президента как часть Альянса народной свободы."
 chile_events.43.a: "Он действительно думает, что сможет победить?"

 chile_events.44.t: "Реабилитация социалистов"
 chile_events.44.d: "Пока мы сконцентрировали наши усилия на переходе к демократии, мы пытались, безуспешно, восстановить отношения с социалистами, быть может, правительство вне хунты будет более успешно?"
 chile_events.44.a: "Нам понадобится время"

 chile_events.45.t: "Союз с Карлесом и Агуэро?"
 chile_events.45.d: "Наше новое правительство гораздо ближе сотрудничает с бывшими врагами, чем считалось ранее, и они выразили интерес в присоединении к нашему альянсу, быть может, нам согласиться?"
 chile_events.45.a: "Бог и Родина!"
 chile_events.45.b: "Это плохая идея"

 chile_events.451.t: "Чили просит присоединиться к нашей фракции"
 chile_events.451.d: "Мы получили просьбу от чилийских дипломатических представителей с просьбой разрешить Чили подписать с нами военное соглашение и тем самым официально присоединиться к нам в рамках все более усложняющегося баланса сил."
 chile_events.451.a: "Чудесно, мы полностью согласны."
 chile_events.451.b: "Втягивать себя в такое соглашение нам не по душе."

 chile_events.51.t: "Наши претензии на Антарктику"
 chile_events.51.d: "Чили уже давно называет своей часть Антарктики, мы можем более агрессивно выразить наши претензии, если так угодно."
 chile_events.51.a: "Зачем? Там же только пингвины"
 chile_events.51.b: "Это принадлежит Чили!"

 chile_events.52.t: "Чили захватило Галапагосские острова"
 chile_events.52.d.ecu: "Видя, как мы погрязли в конфликте с Перу, Чили решили устроить военное вторжение на Галапагосские острова, пользуясь случаем, пока мы заняты в другой войне."
 chile_events.52.d.not_ecu: "Воспользовавшись нашей недавней аннексией Эквадора, Чили сделала шаг к Галапагосам, захватив острова до того, как мы смогли в них укрепиться."
 chile_events.52.a: "Мы ничего не можем поделать..."
 chile_events.52.b: "Приведите гарнизоны в боевую готовность!"

 chile_events.53.t: "Неудача на Галапагосах"
 chile_events.53.d: "Несмотря на наш идеальный план захватить Галапагосские острова, пока Эквадор занят войной с Перу, гарнизон островов был вооружён сильнее, чем мы планировали. Наши силы вторжения были выбиты с побережья и перебиты. Этот день стал траурным для всей нашей нации. Эквадор ещё поплатится за такую дерзость."
 chile_events.53.a: "Чёрт!"

 chile_events.54.t: "Чили хочет присоединиться к Интернационалу"
 chile_events.54.d: "Рабочая революция в Чили была очень успешной, она стала сияющей звездой революционных идеалов в Южном полушарии. Однако, они чувствуют угрозу со стороны соседей-реакционеров и прочих империалистических угроз, и поэтому считают, что пришло время присоединиться к Интернационалу."
 chile_events.54.a: "Давайте поприветствуем их в борьбе за Мировую Революцию!"
 chile_events.54.b: "Это бессмысленно!"

 chile_events.55.t: "[From.GetNameDefCap] хочет присоединиться к нашему Альянсу"
 chile_events.55.d: "После выборов, чилийское революционное правительство изменило свою внешнеполитическую позицию на дружественную местным синдикалистским режимам, и соответственно пришли к нам, прося военного союза."
 chile_events.55.a: "Конец Аргентины - это только начало! Вперед!"

 chile_events.56.t: "[From.GetNameDefCap] отказала"
 chile_events.56.d: "К нашему удивлению, государство [From.GetNameDefCap] отказало нам во вступлении в Третий Интернационал."
 chile_events.56.a: "Они свихнулись?"

 chile_events.57.t: "Контрреволюция в Чили"
 chile_events.57.d: "Хотя Чили когда-то считалось самым прочным бастионом синдикализма и социалистических ценностей в Южной Америке, похоже, что этого режима больше нет. Явный провал руководства во время войны против Аргентины и сложное стратегическое положение, в котором находится страна, привела к тому, что группа военных офицеров захватила власть в Сантьяго, и часть ключевых позиций в городе и по всей стране также попали им в руки. \n\n Пока неизвестно, по какому пути пойдет Чили, но, видимо, ещё одной латиноамериканской страной будет управлять хунта - по крайней мере пока."
 chile_events.57.a: "Факелу и молоту нанесен удар."

