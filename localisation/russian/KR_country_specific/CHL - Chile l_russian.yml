 CHL_marmaduke_grove_vallejo: "Мармадуке Грове Вальехо"
 CHL_marmaduke_grove_vallejo_leader_desc: "Грове родился в северных районах Копьяпо 6 июля 1878 года в семье Хосе Мармадуке Грове Абалоса, юриста по профессии, и Анны Валехо Бургоа. В 1891 году, его отец был депортирован за оппозиционные настроения по отношению к президенту Хосе Мануэлю Бальмакеде. В 1931 году, после затяжного кризиса в Чили, большая часть армии и флота восстала против демократической системы, что позволило молодому Грове вернуться из Британского Союза, где он скрывался и обучался все эти годы, и объявить о создании социалистической республики. Поддержка военными социалиста может значить только одно - война с Аргентиной неизбежна, и народ Чили объединяется перед общим врагом."POLITICS_CARLOS_LABARCA_DESC: ""

