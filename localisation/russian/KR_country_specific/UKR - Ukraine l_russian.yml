 BSD_start_tt: "Разблокирует решения о союзничестве или вторжении в страны Черноморского региона.\n\nДобавляет идею §Y$UKR_black_sea_member$§!, которая может быть улучшена фокусами §5$UKR_bsd_political_union$§! и §5$UKR_bsd_customs_union$§!." #TODO maybe add flags of countries which can be invaded
 UKR_bsd_customs_union_tt: "Изменить §YЧерноморское союзное государство§! на §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§!: §Y-5%§! и §Y$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$§!: §G+2%§!.\nЗа каждую дополнительную нацию, присоединившуюся к ЧСЗ, этот модификатор увеличивается до максимального значения §Y$MODIFIER_CONSUMER_GOODS_FACTOR$§!: §Y-25%§!, $MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!."
 UKR_bsd_political_union_tt: "Изменить §YЧерноморское союзное государство§! на §Y$MODIFIER_STABILITY_FACTOR$§!: §G+2%§! и §Y$MODIFIER_POLITICAL_POWER_GAIN$§!: §G+0.02§!.\nЗа каждую дополнительную нацию, присоединившуюся к ЧСЗ, этот модификатор увеличивается до максимального значения §Y$MODIFIER_STABILITY_FACTOR$§!: §G+10%§!, $MODIFIER_POLITICAL_POWER_GAIN$: §G+0.2§!."

### Republic Decisions ###
UKR_republic_decisions: "Республиканская Администрация"
UKR_republic_decisions_desc: "Последние выборы вынудили нас идти на компромиссы, делать обещания и объединяться с другой партией. Все зависит от того, как мы действуем, чтобы коалиционное правительство восстановленной Народной Республики смогло пережить бурю и обеспечить стабильность.\n\n[UKR_republican_decision_category_text]\n\n"
UKR_usdrp_coalition_tt: " в §SУСДРП§!"
UKR_urdp_coalition_tt: " в §lУРДП§!"
 UKR_republic_decisions_desc_part_two: "[UKR_republic_decisions_second_half]"
UKR_republic_decisions_part_two_urdp: "Нам также необходимо следить за тем, чтобы фракционность внутри §lУРДП§! не вышла из-под контроля. Если влияние одной из фракций партии окажется слишком низким, это может привести к §Rвосстанию изнутри§!, но порой §Gвысокое§! влияние может быть полезным.\n\n§CВлияние§! §mПравых§! составляет [UKR_urdp_right_influence_level].\n§CВлияние§! §lЦентра§! составляет [UKR_urdp_centre_influence_level].\n§CВлияние§! §SЛевых§! составляет [UKR_urdp_left_influence_level]."
UKR_republic_decisions_part_two_usdrp: "С помощью §Hсобытий§! и §Hфокусов§! мы также можем влиять на §1Идеализм§! в §Sпартии§!. Каждый уровень будет §Gусиливать§! эффекты нашего политического дерева фокусов. §1Идеализм§! может варьироваться от §Y-4§! до §Y+6§!, при этом бонусы ограничиваются §Y+4§!. Чем сильнее уровень, тем большее влияние он оказывает на наши фокусы.\n\nТекущий уровень §1Идеализма§!: [?UKR_usdrp_idealism_points|=Y0]"
UKR_add_idealism_tt: "Изменение §1Идеализма§!: [?UKR_idealism_change|=Y0]"
UKR_urdp_right_strengthen_tt: "§lУРДП§!-§mПравые§! §Gполучат§! влияние."
UKR_urdp_right_weaken_tt: "§lУРДП§!-§mПравые§! §Rпотеряют§! влияние."
UKR_urdp_centre_strengthen_tt: "§lУРДП§!-§lЦентр§! §Gполучит§! влияние."
UKR_urdp_centre_weaken_tt: "§lУРДП§!-§lЦентр§! §Rпотеряет§! влияние."
UKR_urdp_left_strengthen_tt: "§lУРДП§!-§SЛевые§! §Gполучат§! влияние."
UKR_urdp_left_weaken_tt: "§lУРДП§!-§SЛевые§! §Rпотеряют§! влияние."

