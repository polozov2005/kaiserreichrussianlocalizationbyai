 UKR_lun_mechanic: "Натиократическое государство" #TODO make desc dynamic
 UKR_lun_mechanic_desc: "Несмотря на захват нами власти, негативные последствия векового порабощения все еще проявляются в различных сферах духовной и социальной жизни, которые требуют применения соответствующего лечебного средства. Дальновидные меры являются необходимой частью §NНациональной революции§!, которая всесторонне укрепит организм нации, неустанно увеличит ее созидательные силы и способность бороться за право на свое развитие. С нашим приходом к власти возникли и новые проблемы, так как расширение Лиги привело к образованию §gСтарой§! §PГвардии§!, которая не так склонна к всеобъемлющей национальной революции, как нам хотелось бы. Для блага нации мы должны сотрудничать вместе и поддерживать §Yсплоченность§! Лиги.\n\n[UKR_lun_mechanic_loc] $UKR_lun_mechanic_stability_text$ $UKR_lun_mechanic_political_power_text$ [UKR_lun_mechanic_army_attack] [UKR_lun_mechanic_war_support] [UKR_lun_mechanic_FactoryOutput]\n\nДля того чтобы §NСциборский§! оставался первым государственным секретарем, §Yсплоченность§! должна быть хотя бы в некоторой степени высокой. Старая гвардия может предложить §PМельника§! или §gКапустянского§! на пост первого государственного секретаря, если их популярность достаточно высока или если §Yсплоченность§! низкая." #The decision §YHold the LUN Conference§! unlocks the post war trees. add this after PR or whaters

