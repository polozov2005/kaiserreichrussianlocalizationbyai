### Land Reform & Industrialisation ###

 UKR_landreform_category: "Земельная реформа"
 UKR_landreform_category_desc: "В конечном счете, основной причиной восстания 1936 года стала широко распространенная горечь крестьянства по поводу неравного владения землей. Хотя крестьяне являются сердцем украинской нации, они часто работают на полях, принадлежащих земельной элите, и едва могут обеспечить свои семьи. Элита, в свою очередь, не желает отказываться от своей власти. Усугубляет бедность сельского населения то, что наши методы производства зачастую примитивны по сравнению с крестьянством в более западных странах.\n\n§CТекущая оценка земельной реформы§!: [?UKR_land_reform_score]\n§YДля достижения наилучшего национального духа необходимо 90 баллов. Любой излишек баллов конвертируется в Стабильность.§!\n\nНаша нынешняя земельная реформа [UKR_land_reform_variable_loc]"
