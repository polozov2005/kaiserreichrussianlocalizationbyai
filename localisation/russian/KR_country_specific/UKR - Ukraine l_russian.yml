### USKhD Tooltips and Descriptions ###
 UKR_uskhd_promises_tt: "Если §gХлеборобы Державники§! не смогут выполнить свои обещания и вовремя завершить необходимые миссии, их правительство падет, и бразды правления возьмет на себя §cАграрная Демократическая Партия§!."
 UKR_uskhd_consolidating: "УСХД укрепляет свой контроль."
 UKR_protofis_dismissed_authdem_tt: "§RВы не сможете принять фокус §YНеобходимый компромисс§!§!."
 UKR_protofis_wasnt_dismissed_tt: "Протофис не был смещен"
 UKR_uskhd_consolidation: "Консолидация УСХД"
 UKR_uskhd_consolidation_desc: "Назначение Сергея Шемета атаманом-министром стало неожиданностью для многих. Движение, в котором он состоит, УСХД, не пользуется благосклонностью, и даже гетман относится к нему с подозрением. Тем не менее, если Шемет и УШХД смогут проявить себя, то вера в правительство гетмана будет возрождена."
 UKR_hetman_scrutiny: "Гетманский контроль"
 UKR_hetman_scrutiny_desc: "В то время как Шемет весьма благосклонен к Скоропадскому, он не разделяет той же симпатии к аграрно-статистическому движению. Любая ошибка, допущенная движением, может серьезно подорвать веру гетмана в способность Шемета восстановить контроль."
 UKR_concerns_among_union: "Озабоченность среди членов Профсоюза"
 UKR_concerns_among_union_desc: "Хлеборобы Державники никогда не были особенно большим или мощным движением. Если мы хотим быть уверены, что наш шанс на власть не будет подавлен, влияние Аграриев-Этатистов должно быть сильно непропорционально их реальной численности."
 UKR_scepticism_among_coalition: "Скептицизм среди коалиции"
 UKR_scepticism_among_coalition_desc: "Аграрные демократы не теряют времени даром, критикуя каждый наш шаг, надеясь, что они одолеют нас и возьмут власть в свои руки. Мы должны быстро консолидировать и расширять аграрно-государственное движение и стать более знакомыми массам, если мы хотим добиться успеха."
 UKR_homzyn_help_tt: "§CКонтакты Хомзына могут пригодиться позже.§!"
 UKR_appoint_loyal_bureaucrats: "Назначить лояльных бюрократов"
 UKR_issue_government_reconstruction_grants: "Выдача государственных грантов на реконструкцию"
 UKR_drag_down_appointment_procedure: "Перетащить вниз процедуру назначения"
 UKR_not_dragging_down: "Мы не затягивали процедуру назначения"
 UKR_support_viktor_reinbot: "Мы не поддерживали Виктора Рейнбота на пост президента Сената"
 UKR_not_supporting_viktor_reinbot: "Не поддерживаем Виктора Рейнбота на пост президента Сената"
 UKR_cant_issue_thrice: "§CЭто решение может быть принято только дважды.§!"
 UKR_uskhd_missions_complete_tt: "Выполнил все три миссии"
 UKR_uskhd_consolidation_tt: "Устранив ближайшие препятствия, УСХД теперь может начать укреплять свою власть над страной."
 UKR_if_empower_class_aristocracy_tt: "§CЕсли оценка земельной реформы выше, чем §Y35§! при завершении данного фокуса, то этот фокус добавит §Y+5§! оценки земельной реформы.§!"
 UKR_if_mysticism_and_imperialism_tt: "§CЕсли при выполнении этого фокуса стабильность выше 50%, будет добавлена политическая власть §Y50§!§!"
 UKR_if_support_loyal_intelligentsia_tt: "§CЕсли разведывательное агентство уже создано, добавляется §Y30§! политическая власть.§!"
 UKR_if_leading_role_of_agrarian_class_tt: "§CЕсли показатель земельной реформы выше §Y60§! при завершении этого фокуса, будет построен дополнительный гражданский завод, и этот фокус добавит §Y+3§! показателя земельной реформы.§!"
 UKR_if_eliminate_threat_of_ochlocracy_tt: "§CЕсли на момент завершения этого фокуса наша текущая политическая власть будет §Y100§! или выше, то этот фокус добавит дополнительную стабильность.§!"
 UKR_if_put_end_to_parliamentarian_chaos_tt: "§CСобытие добавит стабильности, если популярность §cСоциал Консерваторов§! будет ниже §Y5%§!§!"
 UKR_if_territorial_patriotism_tt: "§CЕсли у нас будет более §Y400,000§! рабочей силы на местах, национальный дух будет сильнее.§!"
 UKR_if_highest_moral_authority_tt: "§CЕсли §YМетрополита Васыля§! анять в качестве советника, то национальный дух добавит еще §Y20%§! ежемесячного населения.§!"
 UKR_lord_of_land_order_labour_tt: "§CЕсли промышленный балл выше, чем §Y70§! при завершении этого фокуса, то этот фокус добавит §Y+3§! промышленного балла.§!"
 UKR_increase_timer_curb_populist_rhetoric_tt: "§CДобавляет 30 дней к срокам выполнения миссий по земельной реформе и индустриализации.§!"

### UDKhP Tooltips and Descriptions ###
 UKR_udkhp_parliamentarisation: "Демократизация государства"
 UKR_udkhp_parliamentarisation_desc: "Под руководством Хлеборов-Демократов были выдвинуты многочисленные предложения по парламентским реформам. Хотя большинство членов партии и остальной части Сойма объединены этими целями, этого нельзя сказать об исполнительной власти, которая с подозрением смотрит на эти попытки прямого ослабления своей власти. §CЧтобы успешно провести реформы с наибольшей пользой, запаситесь политической силой и используйте ее для снижения §Rсопротивления со стороны исполнительной власти§!§!.\n\nРезультат в конце миссии будет зависеть от уровня сопротивления исполнительной власти; если он ниже 50, реформа пройдет, и мы получим национальный дух, соответствующий уровню сопротивления. Если оно будет выше 50, реформа не пройдет.\n\nЭти реформы больше не будут доступны после войны с Россией.§!\n\n§RResistance from the Executive Office§!: [?UKR_executive_office_resistance]"
 UKR_appointment_of_otaman_minister: "Реформирование процедуры назначения отамана-министра"
 UKR_appointment_of_otaman_minister_desc: "Чтобы демократизировать назначение атамана-министра, мы реформируем его таким образом, чтобы вместо исполнительной власти в этом вопросе принимал участие и Сойм.\n\n§CВ конце задания мы получим национальный дух, который даст нам §Yстабильность§!; количество будет зависеть от того, сколько §Rсопротивления исполнительной власти§! у нас осталось.§!"
 UKR_vote_of_no_confidence: "Введение вотума недоверия"
 UKR_vote_of_no_confidence_desc: "Мы введем вотум недоверия, когда Сойм, а не только Гетман, сможет уволить атамана-министра и его правительство.\n\n§CВ конце миссии мы получим национальный дух, который даст нам §Yприрост политической власти§!;  количество будет зависеть от того, сколько §Rсопротивления исполнительной власти§! у нас осталось.§!"
 UKR_review_electoral_laws: "Анализ избирательного законодательства"
 UKR_review_electoral_laws_desc: "Мы введем элементы пропорционального представительства в нашу избирательную систему.\n\n§CВ конце задания мы получим национальный дух, который даст нам §YСкорость исследований§!; количество будет зависеть от того, сколько §RСопротивления исполнительной власти§! у нас осталось.§!"
 UKR_parliamentary_reform_debate_1: "Дебаты по реформе завершаются"
 UKR_add_resistance_tt: "§RСопротивления исполнительной власти§! изменяется на [?UKR_resistance_change|=Y0]\n"
 UKR_skoropadskyi_concessions_tt: "§RСопротивления исполнительной власти§! не увеличится в этот ход."
 UKR_executive_office_resistance_increasing: "Повышение сопротивляемости исполнительной власти"
 UKR_visit_executive_office: "Посетить исполнительную власть"
 UKR_visit_executive_office_desc: "Убедить гетмана и его советников поддержать наши предложения будет трудной задачей, но, тем не менее, необходимой. Мы должны общаться напрямую, чтобы было хоть какое-то доверие."
 UKR_rally_the_democrats: "Объединение демократов"
 UKR_rally_the_democrats_desc: "УСХД всегда была не очень большой партией, и голоса реформаторов в последние годы часто замалчивались. Пришло время воспользоваться возможностью изменить статус-кво и сплотиться ради общего дела."
 UKR_concessions_to_skoropadskyi: "Уступки Скоропадскому"
 UKR_concessions_to_skoropadskyi_desc: "Мы не добьемся своего, пытаясь протащить наши идеи. Если гетман сочтет наши предложения слишком радикальными, они не пройдут. Только тщательно заверив его в том, что мы работаем не против, а вместе с ним, мы обеспечим безопасность демократического процесса."
 UKR_concessions_cost: "£GFX_social_conservative_texticon £GFX_authoritarian_democrat_texticon §R-1%§!"
 UKR_concessions_cost_blocked: "§RInsufficient £GFX_social_conservative_texticon или £GFX_authoritarian_democrat_texticon Popularity§!"
 UKR_end_reform_debate_otaman_minister_tt: "§CВ конце задания мы получим национальный дух, дарующий нам §YСтабильность§!; количество будет зависеть от количества оставшегося у нас §RСопротивления исполнительной власти§!.§!"
 UKR_end_reform_debate_no_confidence_tt: "§CВ конце задания мы получим национальный дух, дарующий нам §YПрирост политической власти§!; количество будет зависеть от количества оставшегося у нас §RСопротивления исполнительной власти§!.§!"
 UKR_end_reform_debate_electoral_laws_tt: "§CВ конце задания мы получим национальный дух, дарующий нам §YСкорости исследования§!; tколичество будет зависеть от количества оставшегося у нас §RСопротивления исполнительной власти§!.§!"
 UKR_otaman_minister_reform_spirit: "Реформирована процедура назначения атамана-министра"
 UKR_otaman_minister_reform_spirit_modifier: "Реформирована процедура назначения атамана-министра"
 UKR_otaman_minister_reform_modifier_tt: "$MODIFIER_STABILITY_FACTOR$: [?UKR_otaman_minister_reform_stability|=%+]"
 UKR_vote_of_no_confidence_reform_spirit: "Вотум недоверия"
 UKR_no_confidence_reform_spirit_modifier: "Вотум недоверия"
 UKR_no_confidence_reform_modifier_tt: "$MODIFIER_POLITICAL_POWER_GAIN$: [?UKR_no_confidence_pp|=+]"
 UKR_review_electoral_laws_reform_spirit: "Реформированное избирательное законодательство"
 UKR_review_electoral_laws_reform_spirit_modifier: "Реформированное избирательное законодательство"
 UKR_review_electoral_laws_reform_modifier_tt: "$MODIFIER_RESEARCH_SPEED_FACTOR$: [?UKR_review_electoral_laws_researchspeed|=%+]"
 UKR_hetmanist_soimist_idea_1: "Реформа исполнительной власти"
 UKR_hetmanist_soimist_idea_1_desc: "Гетман был политически значимой силой с момента обретения нами независимости, и кажется, нет причин менять это. До тех пор, пока Сойм остается также влиятельной силой, мы должны быть довольны тем, что имеем."
 UKR_hetmanist_soimist_idea_2_desc: "Гетман является политически значимой силой с момента обретения нами независимости, но, по правде говоря, у него нет ни ответов, ни решений. Более могущественный Сойм обеспечит ему надлежащую проверку, если он переступит свои границы."
 UKR_hetmanist_soimist_idea_3_desc: "Гетман был политически значимой силой с момента обретения нами независимости, но времена меняются. Народ призвал к настоящей парламентской демократии в Украине, и Гетман выразил свое согласие. Теперь мы можем убить двух зайцев одним выстрелом: народ получит свою демократию с мощным законодательным органом, а гетман станет конституционным монархом, почувствовав облегчение от того, что на его плечи больше не ложится бремя правления."

 UKR_support_from_agrarians: "Поддержка со стороны Аграрной фракции"
 UKR_support_from_agrarians_desc: "Аграрная фракция составляет наибольшее число членов УСХД. Вполне естественно, что если мы прислушаемся к их требованиям, они безоговорочно поддержат наши предложения."
 UKR_unlock_agrarian_support_tt: "§CЕсли дебаты по реформе §YАнализ избирательного законодательства§! продолжается, это решение будет разблокировано:§!"
 UKR_agrarians_supported_tt: "Дух, который мы получим в конце реформы, даст нам небольшое сокращение §YТНП.§!"

 UKR_hardline_course_decrease_resistance_tt: "§CЕсли у нас идут дебаты по §YРеформе§!, то будет применен следующий эффект:§!"

 UKR_political_pragmatism_reform_tt: "§CЕсли у нас идут дебаты по §YРеформе§!, то будет применен следующий эффект:\nРешение §YУступки Скоропадскому§! будет длиться два хода вместо одного.§!\nДобавляет §Y20§! дней задания §YОбсуждение реформы продолжается§!"

 UKR_support_from_military_clique: "Поддержка со стороны армии"
 UKR_support_from_military_clique_desc: "В идеале армия должна быть в основном отстранена от политики, но она также должна воплощать и защищать созданный конституционный порядок. В соответствии с этим представлением, вера армии в демократические институты нашего государства довольно важна."
 UKR_unlock_military_support_tt: "§CЕсли дебаты по реформе §YВотум недоверия§! продолжаются, это решение будет разблокировано:§!"
 UKR_military_support_tt: "Дух, который мы получим в конце реформы, даст нам бонус к §Yпроизводительности фабрики.§!"

 UKR_nationalist_clique_tt: "§CЕсли мы приняли как минимум две §Yреформы§!, мы получим следующие эффекты"

 UKR_jingoistic_rehtoric_reform_tt: "§CЕсли у нас продолжаются §Yдебаты по реформам§!, то национальный дух, который мы получим от принятия реформ, будет выше.§!"

 UKR_garner_support_from_unsp: "Поддержка со стороны УНСП"
 UKR_garner_support_from_unsp_desc: "Не все в УСХД можно сказать, что поддерживают наши реформаторские предложения, но большая часть УНСП может. Их поддержка будет неоценима."
 UKR_unlock_unsp_support_tt: "§CЕсли §YДебаты по реформе§! продолжаются, это решение будет разблокировано:§!"
 UKR_garner_support_available_tt: "§CЭто решение может быть принято только три раза.§!"

### SHD Tooltips and Descriptions ###
 UKR_protofis_dismissed_pataut_tt: "§RВы не сможете принять фокус §YВзаимовыгодное соглашение§!§!."
 UKR_lun_could_takeover_tt: "§RЕсли в ближайшее время мы не проведем §m50§! или больше пунктов земельной реформы, Лига может взять власть в свои руки.§!"
 UKR_ivan_influence: "Структура СГД"
 UKR_ivan_influence_desc: "Хотя номинально СГД едина, в ней больше внутренних разногласий, чем можно подумать. В частности, Иван Полтавец-Остряница стремился как можно больше влиять на правительство, укрепляя свою личную власть и расширяя полномочия казачьих советов.\n\nКаждый раз, когда миссия заканчивается, сила Полтавца-Остряницы будет увеличиваться вместе с разобщенностью ШД. Различные решения на карте будут доступны после завершения фокусов и будут зависеть от количества силы Полтавца-Остряницы, и их можно будет выбрать на вкладке решений.§!\n\n§RКогда земельная реформа будет завершена, этих решений уже не будет, а влияние национального духа сохранится.§!\n\n§CВлияние Полтавца-Остряницы§!: [?UKR_ivan_influence_variable]"
 UKR_ivan_influence_less_than_or_equals_tt: "Has [?UKR_ivan_influence_check] or less Poltavets-Ostrianytsia influence"
 UKR_ivan_influence_greater_than_or_equals_tt: "Has [?UKR_ivan_influence_check] or higher Poltavets-Ostrianytsia influence"
 UKR_ivan_po_mission: "Увеличение влияния Полтавца-Остряницы"
 UKR_increase_ivan_po_event_tt: "§OКаждый раз, когда задание запускается, с вероятностью 75% произойдет событие, дающее нам преимущества в политической власти и стабильности.§!"
 UKR_increase_ivan_po_event_2_tt: "§OКаждый раз, когда задание запускается, вероятность события, дающего нам преимущества в политической власти и стабильности, составляет 25%.§!"
 UKR_ivan_po_influence_idea_1: "Влияние Полтавца-Остряницы"
 UKR_ivan_influence_variable_increase: "§CВлияние Полтавца-Остряницы увеличивается на 1.§!"
 UKR_ivan_influence_variable_decrease: "§CВлияние Полтавца-Остряницы уменьшается на 1.§!"
 UKR_solidify_homzyn_position: "Solidify Homzyn's Position"
 UKR_cossack_east_decisions_tt: "Разблокирует решения §PУполномочить казачьи советы§! в различных восточных провинциях. Эти решения на карте можно выбрать на вкладке решений."
 UKR_cossack_west_decisions_tt: "Разблокирует решения на карте для §PРазрешить казачьи советы§! в различных западных провинциях. Эти решения на карте можно выбрать на вкладке решений.\n\nРешение \"§YУкрепить позицию Хомзына§!\" будет стоить меньше."
 UKR_cossack_militias_tt: "Разблокирует на карте решения §Pрасширить возможности казачьих ополчений§! в различных провинциях.§!"
 UKR_a_united_organisation_tt: "Решение\"§YУкрепить позицию Хомзына§!\" добавит дополнительную £stability_texticon §Y1%§! стабильность."
 UKR_will_of_the_cossack_nation_tt: "Задание \"Увеличение влияния Полтавца-Остряницы\" теперь будет срабатывать каждые 60 дней. События, которые запускаются из миссии, будут нести §Gнемного меньше§! штрафы."
 UKR_expand_union_membership_tt: "Это событие позволит нам, в той или иной степени, поглотить членов коалиции и усилить нашу политическую мощь ценой стабильности."

 UKR_solidify_homzyn_position_wo_technocrat_tt: "§CКаждый раз, когда это решение будет выполнено, будет 25% шанс того, что событие даст нам политическую власть или популярность Отцовского Автократора.§!"
 UKR_solidify_homzyn_position_with_technocrat_tt: "§CКаждый раз, когда это решение будет выполнено, будет 75% шанс того, что событие даст нам политическую власть или популярность.§!"

 UKR_direction_of_shd_tt: "Событие даст нам два варианта:\n\n1. Повышение шансов на исключение события из решения \"§YУкрепить позицию Хомзына§!\", и решение добавит 2% популярности §PПатерналистов§!.\n\n2. Уменьшит вероятность наступления события в результате выполнения задания \"Увеличение влияния Полтавца-Остряницы\""
 UKR_technocratic_state_flag_tt: "§CПовысит шансы событие из решения \"Укрепить позицию Хомзына\", и решение добавит 2% популярности §PПатерналистов§!.§!"
 UKR_national_dictatorship_flag_tt: "§CУменьшить вероятность наступления события в результате выполнения задания \"Увеличение влияния Полтавца-Остряницы\"§!"

 UKR_council_cost: "£stability_texticon  §R-1.5%§!"

 UKR_cossack_council_generic: "Наделить полномочиями казачий совет в [FROM.GetName]"

 UKR_cossack_militia_decision: "Empower Cossack Militias in [FROM.GetName]"
 UKR_cossack_militia_cost: "£stability_texticon  §R-1%§!"
 UKR_cossack_militia_tt: "Upon war with Russia, a §YCossack Militia Division§! will join our forces in [FROM.GetName]."
 UKR_cossack_militia_1: "Силы обороны казачьего ополчения"
 UKR_cossack_militia_2: "Силы обороны казачьего ополчения"
 UKR_cossack_militia_3: "Силы обороны казачьего ополчения"
 UKR_cossack_militia_4: "Силы обороны казачьего ополчения"

 UKR_timer_exchange_curtail_focus_tt: "§CДобавляет 40 дней к таймеру земельной реформы§! и §RУдаляет 40 дней от таймера индустриализации.§!"
 UKR_timer_exchange_mutual_focus_tt: "§CДобавляет 40 дней к таймеру индустриализации§! и §RУдаляет 40 дней от таймера земельной реформы.§!"

 UKR_crimean_autonomy: "Крымская автономия"
 UKR_crimean_autonomy_desc: "Благодаря многочисленному этническому русскому населению, а также большому количеству крымских татар, Крым является автономной частью Украины с момента обретения независимости. При поддержке украинского правительства Германией в 1918 году были проведены переговоры между Крымским региональным правительством и Украинской Державой, в результате которых полуостров получил административный статус, сохраняющийся до сих пор."
 UKR_crimean_autonomy_2: "Крымская автономия"
 UKR_crimean_autonomy_2_desc: "Благодаря многочисленному этническому русскому населению, а также большому количеству крымских татар, Крым является автономной частью Украины с момента обретения независимости. При поддержке украинского правительства Германией в 1918 году были проведены переговоры между Крымским региональным правительством и Украинской Державой, в результате которых полуостров получил административный статус, сохраняющийся до сих пор."
 UKR_crimea_modifier_tt: "Модификатор §YКрымская автономия§!:\nРекрутироемое население: §G+20%§!\nСкорость местного строительства: §G+20%§!"

 UKR_integrate_organisations_full: "Конвертировать популярность §gУДХП§! и §gУСХД§! в популярность §PСГД§!."
 UKR_integrate_organisations_half: "Конвертировать половину популярности §gУДХП§! и §gУСХД§! в популярность §PСГД§!."

### Military decisions ###
 UKR_eastern_threat: "Угроза с Востока"
 UKR_eastern_threat_desc: "[219.owner.GetNameDefCap] никогда по-настоящему не принимал независимую Украину. Целью украинских вооруженных сил, сейчас и всегда, будет сдерживание русской угрозы."

 UKR_evacuate_industry: "Эвакуация промышленности"
 UKR_fortify_homel: "[241.GetName]-Шостка Линия укрепления"
 UKR_fortify_sumy: "[225.GetName]-[221.GetName] линия укреплений"
 UKR_fortify_yuzivka: "Луганско-Мариупольская линия укреплений"
 UKR_fortify_kyivstate: "Днепровская линия укрепления"
 UKR_fortify_kyivstate_desc: "Река Днепр раздваивает Украину и окажется идеальной для военной резервной линии. Несмотря на то, что его легко оборонять, нам придется обследовать местность и соорудить несколько основных укреплений на земле, на которых можно будет строить."
 UKR_emergency_recruitment: "Срочное рекрутирование"
 UKR_demobilize_volunteers: "Демобилизация добровольцев"
 UKR_organise_partisan_cells: "Организовать партизанские ячейки"
 UKR_not_step_back: "Ни шагу назад"

 UKR_war_conscription: "Распространение листовок с призывом"
 UKR_war_conscription_desc: "Революция призывает всех служить в этот почетный момент борьбы с империализмом. Служить и умереть в бою за нашу священную свободу - это самое великое дело, которое только может быть."
 UKR_war_stability: "Обращение Шумского к народу"
 UKR_war_stability_desc: "Некоторые подвергают сомнению дело Боротьбистов, когда наших людей посылают на смерть, и готовы сдать нашу нацию капиталистам в Берлине. Напоминание о том, за что мы сражаемся, снова поднимет дух людей."
 UKR_war_reduce_petlurite: "Уничтожение ячеек петлюровцев"
 UKR_war_reduce_petlurite_desc: "Несмотря на грандиозную неудачу в работе с украинским народом, Петлюра и его лакеи продолжают терроризировать нас и вступать в сговор с иностранными державами, чтобы уничтожить суверенитет нашей страны. Мы должны немедленно уничтожить их ячейки."
 UKR_war_advance_steppes: "Приказ о степном наступлении"
 UKR_war_advance_steppes_desc: "Московиты все еще глупо верят, что они могут стереть независимость Украины и отбросить нашу революцию. Новое контрнаступление заставит их дважды подумать."
 UKR_war_advance_polesia: "Переход в [997.GetName]"
 UKR_war_advance_polesia_desc: "Наши товарищи по Третьему Интернационалу верят в нас, и эта вера не должна быть разрушена. Продвижение на запад с целью соединения наших сил с их силами возродит их веру в нас."
 UKR_war_advance_carpathians: "Пересечение Днестра и Карпат"
 UKR_war_advance_carpathians_desc: "Война пришла не только на наш запад и восток, но и на наш южный фронт. Если империалисты считают, что могут нанести нам удар с тыла, давайте преподадим им урок!"
 UKR_anti_imperialist_propaganda: "Выпуск антиимпериалистической пропаганды"
 UKR_anti_imperialist_propaganda_desc: "Империи всегда стремились контролировать Украину в своих интересах, будь то российская, немецкая или австрийская, и на протяжении десятилетий и даже столетий им это удавалось. Но больше так не будет! Украина должна принадлежать украинскому народу, и мы будем бороться до конца, чтобы увидеть ее свободной!"

 UKR_ger_pilot_training_initiative_tt: "Изменить §H$UKR_shadow_of_mighty_wings$§! на Ловкость: [?0.1|=+%0]"
 UKR_demobilize_volunteers_tt: "Все добровольческие подразделения будут расформированы, а личный состав возвращен."
 UKR_integration_decisions: "Интеграционные решения"
 UKR_claim_state: "Претензия [FROM.GetName]"

### Borotbyst Tooltips ###
 UKR_syndie_nationalisation: "§RМы национализируем промышленность, инфраструктуру и банки, начиная с последних. Это подстегнет нашу борьбу против контрреволюционных мер.§!"
 UKR_syndie_constitution_tt: "§RМы разорвем буржуазную Конституцию и напишем новую, придерживаясь нашего видения.§!"
 UKR_syndie_volobuiev_start: "§rМы реализуем видение Волобуева об автаркии и независимости.§!\n\n"
 UKR_syndie_hrynko_start: "§rМы реализуем видение Гринько об ортодоксальном синдикализме.§!\n\n"
 UKR_syndie_revolution_warning_1_tt: "§RМы должны быстро разработать нашу земельную реформу, иначе последствия будут плачевными...§!"
 UKR_syndie_revolution_warning_2_tt: "§RСитуация может быстро обостриться...§!"
 UKR_bakhmut_meeting_agree_to_ukapist: "§RУкаписты могут быть полезным союзником, но стоит ли доверять этим старым большевикам?§!"
 UKR_bakhmut_meeting_no_agreement: "§RУкаписты могут запятнать нашу идеологию, но сможем ли мы обойтись без них?§!"
 UKR_prepare_for_worst_tt: "§RМы сами по себе, мы никому не можем доверять...§!"
 UKR_reach_to_rds_tt: "§RRDS may be our last hope for survival!§!"
 UKR_general_strike_tt: "§RТочка невозврата...§!"
 UKR_tyutyunnyk_betrayal_tt: "§RКогда люди против тебя, это уже плохо, но когда к этому присоединяются военные, это конец...§!"
 UKR_borotbyst_popularity_mechanic_tt: "§OМы получим бонус, основанный на§! §Oпопулярности§! §rСиндикалистов§! и если мы заключим союз с §oУкапистами.§!"
 UKR_popular_revolution_tt: "§CБлагодаря тому, что революция широко популярна среди населения Украины, мы получим следующие эффекты:§!"
 UKR_medium_popular_revolution_tt: "§CПоскольку революция пользуется некоторой популярностью среди населения Украины, мы получим следующие эффекты:§!"
 UKR_unpopular_revolution_tt: "§CИз-за того, что в революцию все еще проникают реакционные силы, мы получим следующие последствия:§!"
 UKR_khvyliovyi_anger_tt: "§RЭто действие может разозлить Хвылевого.§!"
 UKR_khvyliovyi_buff2_tt: "Периодически будут появляться события, которые будут усиливать трейт Хвылевого на §G3%§! £GFX_war_support_texticon §Yподдержки войны§! ценой §R-1%§! £GFX_stability_texticon §Yстабильности§!."
 UKR_khvyliovyi_revo_start_tt: "§OМы начнем реализовывать концепцию Хвылевого 'Революция в культуре', в центре которой - возрождение украинской культуры, сближение с западными странами и \"Психологическая Европа\"§!\n"
 UKR_petlurite_resistance_active_tt: "§YВсе Петлюровские круги ослаблены.§!"
 UKR_borotbyst_land_reform_start_tt: "\n§RМы начнем работу над собственной земельной реформой, которая будет более справедливой и выйдет за рамки предыдущих проектов. Поскольку мы будем перераспределять всю землю, некоторые люди могут выступить против наших действий.§!\n"
 UKR_land_reform_days_tt: "§YБлагодаря средствам, полученным в результате интеграции Комнезамы,§! §Rнаша земельная реформа§! §Yначнет прогрессировать, улучшаясь каждые 60 дней, пока не остановится на максимальном значении.§!"

 UKR_following_french: "Следуя их идеалам"

