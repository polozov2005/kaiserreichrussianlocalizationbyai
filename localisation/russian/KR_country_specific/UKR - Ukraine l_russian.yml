 UKR_women_suffrage_hetmanate: "Женское избирательное право"

### AuthDem Hetmanate Ideas ###
 UKR_uskhd_issues_1: "Консолидация УСХД"
 UKR_uskhd_issues_1_desc: "Союз Хлеборобов-Державников имеет амбициозную программу по масштабному преобразованию украинского общества в целом. Однако он находится под большим давлением, чтобы сделать это быстро, учитывая значительное количество оппозиции его платформе.\n\n§CЭтот национальный дух будет §Rухудшаться§! каждые 150 дней и будет удален, как только фокусная ветвь УХСД будет завершена§!."
 UKR_uskhd_issues_tt: "§CЭтот национальный дух будет §Rухудшаться§! каждые 150 дней и будет удален после завершения ветки фокуса УХСД§!."
 UKR_transformation_of_the_state: "На пути к органической нации"
 UKR_transformation_of_the_state_desc: "Децентрализованное государство, свободное от парламентского хаоса. Государство, где все люди, независимо от их этнической принадлежности, работают на благо общества. Государство, где производящие классы добиваются своего суверенитета через собственные советы и организации. Государство, где монарх является олицетворением всей нации. Это тот идеал, к которому мы стремимся."
 UKR_loyal_intelligentsia: "Лояльная интеллигенция"
 UKR_loyal_intelligentsia_desc: "Ни в коем случае не исключаем из нашей программы тех, кто не принадлежит к производящим классам - до тех пор, пока они присягают на верность и не ведут агитацию против нас, то есть."
 UKR_highest_moral_authority: "Авторитет церкви"
 UKR_highest_moral_authority_desc: "Без великого учения Православной Церкви, на кого наш народ мог бы смотреть как на моральный авторитет? Гетман может быть нашим мужественным, благородным и мудрым главой государства, но он не Бог."
 UKR_territory_patriotism: "Территориальный патриотизм"
 UKR_territory_patriotism_desc: "Что является источником бед Украины? Некоторые считают, что это поляки, русские, евреи. Но это шовинистическое мышление опасно; важна не этническая принадлежность, а беззаветное служение нации."

 UKR_revolutionary_leftism_suppression: "Подавление активности левых"
 UKR_revolutionary_leftism_suppression_desc: "Даже после восстания революционеры все еще скрываются в некоторых частях Украины, надеясь нанести удар в спину, когда она будет слаба. Мы будем иметь наше государство, свободное от этих недугов, - ведь излишнее усердие в арестах не должно вызывать проблем, не так ли?"
 UKR_cultural_autonomy_and_suffrage: "Культурная автономия и избирательное право"
 UKR_cultural_autonomy_and_suffrage_desc: "Украина не идет в ногу со временем. Во всей Европе уже провозглашено избирательное право для женщин, но различные силы удерживают нас от принятия этой новой нормы. Пришло время сделать это реальностью."

### Borotbyst Ideas ###
 UKR_sporadic_protests: "Периодические протесты"
 UKR_mass_protests: "Массовые протесты"
 UKR_protests_banditry_clashes: "Протесты, бандитизм и локальные столкновения"
 UKR_syndie_general_strike: "Всеобщая забастовка!"
 UKR_confused_army: "Сбитая с толку армия"
 UKR_shaky_cooperation: "Зыбкое сотрудничество"
 UKR_bad_constitution: "Враждебная система"
 UKR_bad_constitution_desc: "Революция наконец-то наступила. Тем не менее, правила и законы, которые были использованы и сформулированы высшим классом республики до нас, все еще остаются в силе."
 UKR_unpopular_revolution: "Нестабильная революция"
 UKR_unpopular_revolution_desc: "§CЭта идея будет удалена, как только мы достигнем 30% §! £GFX_syndicalist_texticon §Cпопулярности§! §rсиндикализма§!"
 UKR_revolutionary_might: "Революционная мощь"
 UKR_petliurites: "Сопротивление Петлюровцев"
 UKR_petliurites_desc: "Хотя Петлюра и бежал к империалистическим державам после поражения под Житомиром, многие его лакеи, к сожалению, все еще бродят по стране, совершая мелкие нападения, которые угрожают нашей революции."
 UKR_expansion_of_urban_housing: "Расширение городского жилья"
 UKR_expansion_of_urban_housing_desc: "В условиях продолжающейся войны многие жилые комплексы и районы разрушаются ежедневно. Если мы хотим избежать массовой бездомности после окончания войны, нам необходимо значительно расширить наши планы по строительству городского жилья, чтобы учесть возможные последствия."
 UKR_revolution_under_siege: "Революция в осаде!"
 UKR_revolution_under_siege_desc: "К оружию! Мы призываем всех, кто способен сражаться, подняться и встать на защиту революционного дела. Реакционные силы вокруг нас замышляют погасить пламя нашего восстания, и наш долг - предотвратить это любыми средствами."
 UKR_council_of_deputies: "Совет депутатов"
 UKR_syndie_constitution: "Конституция трудящихся"
 UKR_nationalised_banks: "Национализированные банки"
 UKR_nationalised_banks_desc: "Вместо того чтобы увековечивать цикл наживы за счет высоких процентных ставок, новые национализированные банки обеспечат кредитование даже самых труднодоступных уголков страны для создания средств, с помощью которых местное сообщество сможет процветать в будущем."
 UKR_labour_association_support: "Поддержка трудовых объединений"
 UKR_regional_guidance: "Региональное руководство"
 UKR_workers_regulations: "Положение о работниках"
 UKR_workers_regulations_desc: "Обеспечение возможности услышать голос работника через представительство на рабочем месте - это одно достижение, но оно не может гарантировать, что его состояние точно останется положительным.\n\nСоздание здоровых условий труда и образа жизни с четкими границами, которые нельзя переступать, дополнительно обезопасит работника от любых оставшихся способов, которыми многие могут попытаться его использовать."
 UKR_revolutionary_fervour: "Революционный пыл"
 UKR_great_experiment: "Великий эксперимент"
 UKR_pre_industrial_evolution_idea: "Великий эксперимент §Wи§! Конституция трудящихся"
 UKR_industrial_evolution_idea: "Промышленная эволюция"
 UKR_after_french: "После французов"
 UKR_pre_systemic_compromise_idea: "После французов§W,§! Революционный пыл §Wи§! Конституция трудящихся"
 UKR_systemic_compromise_idea: "Системный компромисс"
 UKR_inevitable_revolution: "Неизбежная революция"
 UKR_inevitable_revolution_desc: "Где бы эти подонки ни прятались и ни пытались восстановить свой экономический порядок, пылающий огонь социалистических ценностей, который был зажжен здесь, найдет и их."
 UKR_fighters_till_the_end: "Борьба до конца"
 UKR_people_victory: "Победа народа"
 UKR_people_victory_desc: "Мы неустанно боролись за избавление страны от тирании и империализма, и испытания, выпавшие на нашу долю, не могут быть забыты. Наш народ хорошо приучен к войне, и поэтому любого врага, который осмелится перечить нам, постигнет та же участь, что и остальных."

### Other
 UKR_RUS_will_puppet_tt: "§YХотя сейчас мы, возможно, сражаемся на одной стороне против капиталистическо-империалистической гегемонии в Европе, цели России не являются секретом, и в действительности Москва рассматривает [202.GetName] не как равного союзника, а как субъекта. §CЕсли мы быстро объединимся с Интернационалом на Западе, мы сможем избежать порабощения, но в противном случае мы будем страдать от последствий.§!§!§!"
