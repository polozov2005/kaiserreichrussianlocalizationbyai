 UKR_landreform_election_promises_desc: "Мы были избраны под обещание принять быстрые и решительные меры для решения проблемы земельной реформы в этой стране. Если мы не сдержим свое слово, мы будем страдать от последствий."

 UKR_industrialisation_category: "Индустриализация"
 UKR_industrialisation_category_desc: "Украина в значительной степени является аграрной страной с небольшим количеством промышленности. Хотя наш аграрный рынок может быть здоровым, мы отстаем от других стран мира и должны вступить в определенную форму индустриализации, чтобы обеспечить наше дальнейшее экономическое выживание. Из-за отсутствия инвестиций и ветхого характера заводов, доставшихся нам в наследство от России, нам придется тщательно выстроить программу индустриализации, чтобы добиться максимальной эффективности.\n\n§CПоказатель индустриализации§!: [?UKR_industrial_score]\n§Y90 баллов необходимо для лучшего национального духа. Любой излишек баллов конвертируется в 5 баллов политической силы за каждое очко.§!\n\nНаш текущий прогресс в индустриализации составляет [UKR_industry_variable_loc]"
 UKR_add_industrial_score_tt: "Промышленные показатели изменяются на [?UKR_influence_change|=Y0]\n"
 UKR_industry_score_check: "Требуется как минимум [?UKR_score_check|H0] Промышленный балл."
 UKR_completion_info: "§YС нашим текущим показателем мы получили бы следующий Национальный дух:§!"
 UKR_protofis_spirit_tt: "§CПривлечение Протофиса к нашим планам индустриализации приведет к тому, что национальный дух, который мы получим к концу миссии, будет сосредоточен на §YПроизводительность фабрики, сокращении ТНП и скорости строительства военных фабрик.§!§!"

