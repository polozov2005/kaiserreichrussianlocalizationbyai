 UKR_agro-industry_development: "Развивать агропромышленный комплекс"
 UKR_agro-industry_development_desc: "Сахар, подсолнечное масло, бумага - многие ценные товары можно производить на наших обширных сельскохозяйственных угодьях. Поощряя их производство, мы можем постепенно модернизировать даже самую отсталую Украину."
 UKR_kharkiv_steelworks: "Сталелитейные заводы [221.GetName]"
