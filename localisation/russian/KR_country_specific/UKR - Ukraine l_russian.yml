 UKR_loan_tt: "§CЭто решение может быть принято два раза.§!"
 UKR_loan_tt_hetman: "§gПосле того, как гетманское кресло обеспечено, а с восстанием покончено, мы снова можем рассчитывать на приглашение немецкой бизнес-элиты, такой как Siemens и Krupp, чтобы помочь нам в наших текущих усилиях по индустриализации.§!"
 UKR_loan_tt_not_hetman: "§gХотя мы остаемся твердой частью Миттельевропейского Экономического Блока, помощь со стороны немецких бизнес-гигантов, к сожалению, в значительной степени сократилась после нашего стремления к более справедливым экономическим отношениям после отстранения гетмана.\n\nК счастью, австрийские бизнесмены охотнее сотрудничают с нами в тех секторах, в которых их братские коллеги не хотят сотрудничать§!"
