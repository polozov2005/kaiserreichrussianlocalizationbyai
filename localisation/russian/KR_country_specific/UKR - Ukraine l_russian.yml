 UKR_beyond_mitteleuropa_cat: "За пределами Миттельевропы"
 UKR_beyond_mitteleuropa_cat_desc: "С момента создания Украинского государства мы были ограничены торговлей в основном с немецкой экономической сферой, Миттелевропой. Однако чрезмерная зависимость от Германии оказалась фатальной, когда на страну обрушился Черный Понедельник, диверсификация нашей торговли со странами, не входящими в блок, может, по крайней мере, уменьшить экономическое доминирование Германии в нашей стране. Первый шаг - построить крупный порт [192.GetName], чтобы иметь возможность торговать с остальным миром.\n\n§LС каждой успешной сделкой национальный дух §YЗа пределами Миттельевропы§! будет становиться все сильнее.§!"
