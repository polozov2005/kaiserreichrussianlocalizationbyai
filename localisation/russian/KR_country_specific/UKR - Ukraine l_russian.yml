 UKR_odessa_dockyards: "Верфи [192.GetName]"
 UKR_basf: "Разработка месторождений нефти BASF"
 UKR_basf_desc: "Немецкое дочернее предприятие IG-Farben, BASF входит в число ведущих нефтяных компаний Европы. Благодаря их опыту мы можем модернизировать наши нефтяные месторождения."
 UKR_dneproges: "Завершить проект Днепровской гидроэлектростанции"
 UKR_dneproges_desc: "Строительство обширных плотин гидроэлектростанций через Днепровские пороги было начато несколько лет назад, но по разным причинам приостановилось. Его завершение позволило бы значительно увеличить производство электроэнергии в регионе."
 UKR_dneproges2: "Расширение дамб Днепрогэса"
 UKR_dnepr_reservoir_industry: "Промышленный регион [200.GetName]-[226.GetName]"
 UKR_dnepr_reservoir_industry_desc: "С дополнительной мощностью мы сможем сосредоточить большое количество новых производств вокруг Днепровского водохранилища и городов [200.GetName] и [226.GetName]."
 UKR_modernise_technical_universities: "Модернизировать технические университеты"
 UKR_modernise_technical_universities_desc: "Во многих наших технических университетах до сих пор преподают устаревшие методы и не полностью освоили новейшие инженерные технологии. Новая учебная программа должна черпать вдохновение в немецких университетах и стремиться к максимально возможному уровню сложности."

 UKR_industry_election_promises: "Обещания по индустриализации"
 UKR_industry_election_promises_desc: "Мы были избраны под обещание принять быстрые и решительные меры по индустриализации нашей страны. Если мы не сдержим свое слово, мы будем страдать от последствий."

