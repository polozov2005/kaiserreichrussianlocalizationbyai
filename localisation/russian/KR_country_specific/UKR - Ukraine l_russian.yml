 UKR_radicals_may_take_over_natpop_tt: "Для миллионов людей, проживающих на украинских полях, земля является источником средств к существованию. Невыполнение наших обещаний по проведению земельной реформы может привести к краху нашего правительства и захвату власти §Nрадикальными силами...§!"
 UKR_radicals_may_take_over_syndicalist_tt: "Для миллионов людей, проживающих на украинских полях, земля является источником средств к существованию. Невыполнение наших обещаний по проведению земельной реформы может привести к краху нашего правительства и захвату власти §rрадикальными силами...§!"
 UKR_radicals_could_takeover_tt: "§rЕсли наша программа земельной реформы будет и дальше пробуксовывать, радикалы могут захватить власть!§!"
