#Republic Election Mechanic
 UKR_republic_election_mechanic: "Выборы в Национальные Собрания"
 UKR_republic_election_mechanic_desc: "После почти двух десятилетий диктаторского правления гетмана наша страна наконец-то проводит свои первые по-настоящему демократические выборы. Миллионы украинцев скоро отдадут свои голоса и выберут, кто будет руководить ими в ближайшие годы.\n\nПартии всех мастей объявили о своем участии в выборах, но только три имеют шансы сформировать правительство. Это §lРадикальные демократы§!, §SРабочая партия§! и §RРабочий Демократический Союз§!. Тот, кто получит большинство голосов, будет вести переговоры о создании коалиции с другими партиями в Национальном Собрании.\n\nКонечно, для того, чтобы обеспечить победу, мы должны заручиться поддержкой народа. §CВозможности завоевать сердца и умы различных групп избирателей будут периодически появляться.§!.\n\nЛидирующая партия: [UKR_republic_elections_get_leading_party]\n\nВероятный результат выборов: [UKR_republic_elections_likely_election_result]"
 UKR_election_relations_1: "\n\nНаш выбор на выборах также повлияет на наши отношения с нашим вероятным будущим партнером по коалиции-§SУСДРП§!. От лучшего к худшему, мы можем §RНесотрудничать§!, §OБыть нейтральными§!, §GСотрудничать§!, или §CСговариваться§! между собой. Было бы разумно договариться ними и при этом самим одерживать победы, поскольку позитивные отношения имеют множество полезных последствий.\n\nВ настоящее время их отношение к нам таково [UKR_usdrp_attitude]."
 UKR_election_relations_2: "\n\nНаш выбор на выборах также повлияет на наши отношения с нашим вероятным будущим партнером по коалиции-§lУРДП§!. От лучшего к худшему, мы можем §RНесотрудничать§!, §OБыть нейтральными§!, §GСотрудничать§!, или §CСговариваться§! между собой. Было бы разумно договариться ними и при этом самим одерживать победы, поскольку позитивные отношения имеют множество полезных последствий.\n\nВ настоящее время их отношение к нам таково[UKR_urdp_attitude]."
 UKR_rds_factionalism_elections: "\n\n§CРабочий Демократический Союз§!, состоящий из §RУкраинской партии социалистов-революционеров§! и §RСоветско-Революционного Блока§!, безусловно будут отстаивать свои собственные интересы во время предвыборной кампании. Хотя с такой фракционностью будет важнее разобраться позже, возможно, сейчас мы можем попытаться сбалансировать интересы обоих?\nВ коалиции четыре основные силы, и та, у кого их больше, будет доминировать. Ниже перечислены их текущие сильные стороны. Посмотрите ваше §Hдерево фокусов§! чтобы понять какие эффекты дополнительно появятся после нашей победы.\n\n- §RС-РБ§! §oРадикалы§! (§Y[?UKR_rrb_radical_var]§!)\n- §RС-РБ§! §SУмеренные§! (§Y[?UKR_rrb_moderate_var]§!)\n- §RУПС-Р§! §oРадикалы§! (§Y[?UKR_upsr_radical_var]§!)\n- §RУПС-Р§! §SУмеренные§! (§Y[?UKR_upsr_moderate_var]§!)"

