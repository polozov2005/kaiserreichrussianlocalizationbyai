ukraine_republican_level_2_desc: "Этот уровень отношений варьируется от §Y11§! до §Y15§!.\n\n[UKR_urdp_cooperative_pp] [UKR_urdp_cooperative_stab] [UKR_urdp_indifferent_ws] [UKR_urdp_cooperative_syndie_drift] [UKR_urdp_cooperative_radsoc_drift] [UKR_urdp_cooperative_factory_output] [UKR_urdp_cooperative_construction_speed] [UKR_urdp_cooperative_prod_eff_cap] [UKR_urdp_cooperative_prod_eff_base] [UKR_urdp_cooperative_consumer_goods] [UKR_urdp_cooperative_land_reform] [UKR_usdrp_cooperative_pp] [UKR_usdrp_cooperative_stab] [UKR_usdrp_cooperative_production_speed_buildings_factor] [UKR_usdrp_cooperative_prod_eff_base] [UKR_usdrp_cooperative_consumer_goods] [UKR_usdrp_cooperative_prod_eff_cap] [UKR_usdrp_cooperative_land_reform] [UKR_usdrp_cooperative_industrialisation]" #Сотрудничество
ukraine_republican_level_3_desc: "Этот уровень отношений варьируется от §Y16§! до §Y20§!.\n\n[UKR_urdp_amenable_pp] [UKR_urdp_amenable_stab] [UKR_urdp_amenable_syndie_drift] [UKR_urdp_amenable_radsoc_drift] [UKR_urdp_amenable_factory_output] [UKR_urdp_amenable_construction_speed] [UKR_urdp_amenable_prod_eff_cap] [UKR_urdp_amenable_prod_eff_base] [UKR_urdp_amenable_consumer_goods] [UKR_urdp_amenable_land_reform] [UKR_usdrp_amenable_pp] [UKR_usdrp_amenable_stab] [UKR_usdrp_amenable_production_speed_buildings_factor] [UKR_usdrp_amenable_prod_eff_base] [UKR_usdrp_amenable_consumer_goods] [UKR_usdrp_amenable_prod_eff_cap] [UKR_usdrp_amenable_prod_eff_retention] [UKR_usdrp_amenable_land_reform] [UKR_usdrp_amenable_industrialisation]" #Положительное отношение

