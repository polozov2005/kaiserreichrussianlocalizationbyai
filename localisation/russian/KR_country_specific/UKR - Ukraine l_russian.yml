#RevBloc Mechanic
UKR_revbloc_mechanic_unlocked_flag: "Мы можем взаимодействовать с решениями §YНаправления Рабочего Демократического Союза§! через месяц после выборов."
UKR_revbloc_mechanic: "Направление Рабочего Демократического Союза"
UKR_revbloc_mechanic_desc: "Неожиданная победа на выборах вывела Рабочий Демократический Союз, коалицию между §RСоветско-Революционный Блок (СРБ)§! Володи́мира Винниченко и §RУкраинской Партией Социалистов-Революционеров (УПСР)§! Никифора Григорьева, на передний план в национальной политике. Теперь, будучи в коалиции с §SУСДРП§! Исаака Мазепы, была создана широкая левая коалиция, направляющая Украину в революционное будущее. Кабинет Винниченко, безусловно, столкнется с крупным сопротивлением как изнутри, так и извне - вести открытую социалистическую правительство в Центральной Европе будет непросто.\n\nСо временем, по мере того как наша коалиция будет пытаться отдаляться от Германии все больше и больше, §oРадикализм§! продолжит расти.\n\n§rНо будьте осторожны: если §oРадикализм§! превысит §o[?UKR_radicalism_limit]§!, наше правительство может §rпасть!§!§!\n\nЕсть четыре основных силы в коалиции, которые могут стать доминирующими, если получат достаточную власть. Они приведены ниже с их соответствующими текущими силами, а также пассивными §Gполитическими бонусами§!.\n\n- §RСРБ§! §oРадикалы§! (§Y[?UKR_rrb_radical_var]§!)  -  §G+15%§!\n- §RСРБ§! §SУмеренные§! (§Y[?UKR_rrb_moderate_var]§!)  -   §G+5%§!\n- §RУПСР§! §oРадикалы§! (§Y[?UKR_upsr_radical_var]§!)  -   §G+10%§!\n- §RУПСР§! §SУмеренные§! (§Y[?UKR_upsr_moderate_var]§!)  -  §R-5%§!\n\nКроме того, если силы фракций равны, то та, которая наименее увеличивает §oРадикализм§!, будет иметь приоритет.\n\nВ настоящее время доминирующим партнером в коалиции является [UKR_revbloc_dominant_partner].\n\n§oРадикализм§! в настоящее время составляет [UKR_radicalism_tt].\n\nЭта категория решений исчезнет после завершения нашего политического древа, за исключением фокусов, требующих от нас быть §RРадикальными социалистами.§!"

UKR_revbloc_mechanic_unlocked: "§CДля того чтобы использовать полный потенциал §RРабочего Демократического Союза§!, вам следует завершить фокусы с их фракционными бонусами. Однако, если §oРадикализм§! достигнет определенного уровня, наше правительство может §rпасть§!."

UKR_rrb_moderates_dominant_tt: "§RСРБ§! §SУмеренные§! под руководством §CВолодимира Винниченко§!. Мы получим [?UKR_revbloc_pp|+=%0] политической власти."
UKR_rrb_radicals_dominant_tt: "§RСРБ§! §oРадикалы§! под руководством §CАнатолия Писоцкого§!. Мы получим [?UKR_revbloc_pp|+=%0] политической власти."
UKR_upsr_moderates_dominant_tt: "§RУПСР§! §SУмеренные§! под руководством §CНиколы Ковалевского§!. Мы получим [?UKR_revbloc_pp|+=%0] политической власти."
UKR_upsr_radicals_dominant_tt: "§RУПСР§! §oРадикалы§! под руководством §CНикифора Григорьева§!. Мы получим [?UKR_revbloc_pp|+=%0] политической власти."

