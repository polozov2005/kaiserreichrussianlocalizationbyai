UKR_urdp_right_influence_increase: "Смягчить левую риторику"
UKR_urdp_right_influence_increase_desc: "Процветание Украины зависит от нашей способности поддерживать экономическую инициативу среди народа и защищать верховенство закона. Нет нужды играть в дешевые социально-революционные лозунги, подрывающие доверие к правительству."
UKR_urdp_centre_influence_increase: "Продвигать ответственных партийных кадров"
UKR_urdp_centre_influence_increase_desc: "Нам в конце концов нужны не только идеологически мотивированные партийцы, стремящиеся продвигать свою повестку, но и те, кто будет ставить на первое место хорошие политические решения."
UKR_urdp_left_influence_increase: "Поддерживать прогрессивные политики"
UKR_urdp_left_influence_increase_desc: "УРДП имеет великую историю борьбы за украинского простого человека, и эта наследственность должна продолжаться! Только сохраняя принципиальность и продолжая борьбу, партия обеспечит процветание всей страны."

