UKR_national_defence_act: "Дебаты по закону о национальной обороне"
UKR_national_defence_act_desc: "Появится §Hсобытие§!, касающееся принятия законопроекта о национальной обороне. Следующие факторы помогут закону о обороне пройти:\n£white_dot Наша £GFX_stability_texticon стабильность выше §H70%§!.\n£white_dot Наша £GFX_war_support_texticon поддержка войны выше §H50%§!.\n£white_dot Отношения с нашим коалиционным партнером §GСотрудничество§! или §CCговорчивые§!.\n£white_dot Наши §Cочки земельной реформы§! и §Cиндустриализации§! выше §Y90§!.\n£white_dot Пройден фокус §HУкраинский земельный фонд§! и §HПрогрессивное налогообложение§!.\n£white_dot Если мы §lсоциал-либералы§!, то §Cвлияние§! §lУРДП§!-§lЦентра§! будет §Oумеренным§! или выше. В ином случае, если мы §Sсоциал-демократы§!, §1Идеализм§! выше §Y0§!.\n£white_dot Пройдено хотя бы §H3§! фокуса из военного дерева, начиная с и включая §HРасширение [202.GetName]ской Военной Академии§!,.\n\nЕсли все эти условия выполнены, закон гарантированно §Gпройдет§!. Если выполнены только два, закон гарантированно §Rне пройдет§!."
