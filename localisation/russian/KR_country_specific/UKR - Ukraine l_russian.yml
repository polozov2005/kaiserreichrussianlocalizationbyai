UKR_dominant_faction_modifier: "Текущая доминирующая фракция"
UKR_radicalism_increasing: "Увеличение радикализма коалиции"
UKR_radicalism_increasing_desc: "Настоящие цели революции были сокращены иностранными силами, но мы сделаем все, что в наших силах, чтобы продолжить действия и осуществить нашу социалистическую программу.\n\n§CСтепень усиления §oРадикализма§! при каждом повторении миссии зависит от нынешнего доминирующего партнера по коалиции.§!"
UKR_radicalism_warning_tt: "§RБудьте осторожны!§! Невозможность удержать §oРадикализм§! ниже лимита, когда миссия активируется, приведет к §Rкраху§! нашего правительства.\n\nКаждая доминирующая §Cфракция§! увеличивает §oРадикализм§! на определенное количество. В порядке возрастания:\n§RUPS-R§! §SУмеренные§!: §Y+1§!\n§RR-RB§! §SУмеренные§!: §Y+2§!\n§RUPS-R§! §oРадикалы§!: §Y+3§!\n§RR-RB§! §oРадикалы§!: §Y+3§!"
