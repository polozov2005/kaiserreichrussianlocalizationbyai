### Anti-Hetman Revolt ###

 UKR_AntiHetmanRevolt_skoro: "Антигетманский мятеж"
 UKR_AntiHetmanRevolt_skoro_desc: "Экономическая депрессия довела Украину до предела. То, что началось как всеобщая забастовка, организованная Всеукраинским Демократическим Движением (ВДД), превратилось в полномасштабные беспорядки. Крестьянские партизаны и социалистическое ополчение поднялись по всей стране, пользуясь хаосом в нашей администрации и мятежами в армии. Но с помощью быстрых, решительных действий эти беспорядки будут сдержаны и уничтожены.\n\n£command_power §YКомандный ресурс: [?command_power|0]§!\n\nСила повстанческих сил: [?UKR_vdr_strength|R0]\n\n§CНам нужно снизить прочность ВДД ниже §R10§! прежде чем проводить контрнаступление. Как только мы это сделаем, нас ждет победа!§!"

 UKR_hetman_side_tt: "§CМы будем играть за войска гетмана.§!"
 UKR_vdr_side_tt: "§CМы будем играть за войска ВДД.§!"

 UKR_RP_intervention_request: "Запросить вмешательство Рейхспакта"
 UKR_RP_intervention_request_desc: "§RПризыв Рейхспакта для подавления восстания следует рассматривать как крайнее средство, когда все другие варианты уже исчерпаны. Это, несомненно, будет большим ударом по легитимности гетмана...§!"
 UKR_eastern_reinforcements_good: "Подкрепление с Востока"
 UKR_rebel_attack: "Наступление повстанцев!"
 UKR_rebel_attack_desc: "§RПовстанцы могут штурмовать [202.GetName], если они контролируют как минимум два граничащих с ним провинции. Если их сила во время штурма превысит 30, [202.GetName] падет, а вместе с ним и Гетманат!§!"
 UKR_odessa_in_flames: "[192.GetName] в огне"
 UKR_anti-insurgency_operation: "Контрпартизанская операция"
 UKR_counter_attack: "Начать контратаку"
 UKR_counter_attack_desc: "§CПоскольку их ряды сильно поредели, мы можем провести контрнаступление, чтобы раз и навсегда покончить с этим мятежом.§!"
 UKR_negotiate_surrender: "Провести переговоры о капитуляции ВДД"
 UKR_negotiate_surrender_desc: "§CВДД потерпели серьезное поражение, и теперь у них нет никаких шансов. Пришло время положить конец этому восстанию и добиться их капитуляции.§!"
 UKR_reinforce_kyiv: "Усилить [202.GetName]"
 UKR_reinforce_south: "Укрепление Юга"
 UKR_authorize_bombing: "Разрешить бомбардировки"
 UKR_authorize_bombing_desc: "Некоторые говорят, что это заходит слишком далеко, но если ВДД желает войны, они её получат. Демократические лозунги и старые мосинки мало что сделают против самолетов Dornier."
 UKR_mobilize_cossacks: "Мобилизация казачьих подразделений"
 UKR_mobilize_cossacks_desc: "Царский режим был известен использованием казаков в качестве безжалостной военной полиции, и надо признать, что они хорошо подходят для этой цели. Кавалерийские войска способны бороться с повстанцами на их собственной территории, вдали от городов и основных дорог, и они более лояльны к гетману, чем кто-либо другой."
 UKR_anti-socialist_campaign: "Антисоциалистическая кампания"
 UKR_anti-socialist_campaign_desc: "Клеймя ВДД как коммунистов и представляя призрак беспорядков 1925 года, мы можем посеять недоверие в крестьянстве. \"Петлюровцы коллективизируют ваши сельскохозяйственные угодья\" - такая агитация заставит многих крестьян почувствовать себя неуютно в поддержку повстанцев."
 UKR_promote_loyalist_officers: "Продвижение лоялистских офицеров"
 UKR_promote_loyalist_officers_desc: "Мятежные настроения широко распространились в армии. Хотя большинство подразделений не бунтуют, они, конечно, не склонны применять силу против своих соотечественников, испытывая некоторое сочувствие к участи крестьян. Эти лидеры должны уйти. Командиры должны быть прежде всего верны гетману и исполнять его волю, независимо от того, согласны с ней их личные моральные принципы или нет."

 UKR_kiev_fall_warning_tt: "§RЕсли сила ВДД превысит 30, [202.GetName] падет!§!"
 UKR_hetman_10_tt: "§yСила воздействия сил ВДД должна быть ниже 10.§!"
 UKR_vdr_strength_increase: "§RСила ВДД возрастет на $RIGHT$§!"
 UKR_vdr_strength_decrease: "§PСила ВДД уменьшится на $RIGHT$§!"

 UKR_AntiHetmanRevolt_vdr: "Антигетманское восстание"
 UKR_AntiHetmanRevolt_vdr_desc: "Экономическая депрессия довела Украину до предела. То, что началось как всеобщая забастовка, организованная Всеукраинским Демократическим Движением, превратилось в полномасштабное восстание. Крестьянские партизаны и социалистические отряды поднялись по всей стране, пользуясь хаосом в правительственной администрации и мятежами в армии. Мы должны действовать быстро и обеспечить безопасность [202.GetName] как можно быстрее, иначе наша революция будет подавлена.\n\n£command_power §YКомандный ресурс: [?command_power|0]§!\n\nСила прогетманских сил: [?UKR_hetman_strength|R0]\n\n§CНам нужно захватить [202.GetName], чтобы победить гетмана до вмешательства немецкой армии.§!"

 UKR_RP_intervention_mission: "Грядущее вмешательство Рейхспакта!"
 UKR_RP_intervention_mission_desc: "§RПо прошествии времени, когда ситуация для гетмана будет выглядеть все более шаткой, он, несомненно, призовет на помощь немецкие войска и сокрушит наши надежды и мечты. Если мы хотим, чтобы наша революция была успешной, мы должны быстро разгромить его силы.§!"
 UKR_eastern_reinforcements: "Подкрепление с Востока"
 UKR_block_eastern_railway: "Блокировать восточные железные дороги"
 UKR_secure_brest: "Охрана польской границы"
 UKR_rebel_advance: "Продвигаться к [FROM.GetName]"
 UKR_pincer_movement: "[193.GetName] в клещи"
 UKR_pincer_movement_desc: "Атаковать глубоко за Днепром рискованно, но есть шанс отрезать [202.GetName] от подкреплений и изолировать город. Однако мы не уверены, что наши войска смогут осуществить такой амбициозный маневр.\n§CЧем меньше сила прогетманских сил, тем больше шансов, что манёвр в клещи удастся.§!"
 UKR_advance_to_kiev: "Нападение [FROM.GetName]"
 UKR_advance_to_kiev_desc: "§CЕсли мы возьмем [202.GetName], силы гетмана падут, и мы одержим победу!§!"
 UKR_kiev_encircled: "§g[202.GetName] окружен.§!"
 UKR_borotbist_uprising: "Восстание [192.GetName]"
 UKR_kharkiv_commune: "Революция в [FROM.GetName]"
 UKR_southern_rebel_advance: "Продвигаться к [FROM.GetName]"
 UKR_recruitment_campaign: "Кампании по вербовке"
 UKR_internationale_support: "Международная помощь"

 UKR_vdr_25_tt: "§yСила прогетманских войск должна быть 25 или ниже.§!"
 UKR_hetman_strength_increase: "§RСила прогетманцев возрастет на $RIGHT$§!"
 UKR_hetman_strength_decrease: "§SСила прогетманцев уменьшится на $RIGHT$§!"

 UKR_vdr_side: "Мы встали на сторону ВДД"
 UKR_peasant_warrior_tt: "§CНаши войска будут более эффективно сражаться в сельских регионах, таких как [201.GetName], [203.GetName], [198.GetName], [193.GetName] и [997.GetName].§!"
 UKR_revolutionary_spirit_tt: "§CНаши войска будут эффективнее сражаться в промышленно развитых районах, таких как [192.GetName], [197.GetName], [226.GetName], [200.GetName] и [221.GetName].§!"

 UKR_revolt_started: "Антигетманское восстание продолжается!"
 UKR_undermine_vdr_legitimacy_tt: "§CВДД будет не в состоянии расшириться.§!"

 UKR_pacification: "Умиротворение сельской местности"
 UKR_pacification_desc: "Многие повстанцы бежали в сельскую местность после того, как их восстание было подавлено. Со своих сельских баз они продолжают отравлять сознание крестьян своей пропагандой, а более смелые группы даже продолжают организовывать вооруженные вылазки против полиции и военных частей. Потребуется время, пока их остатки не будут уничтожены."

 UKR_pacification_generic: "Умиротворить [FROM.GetName]"
 UKR_rebel_state: "Антигетманские волнения"
 UKR_pacify_volyn: "Умиротворить [792.GetName]"

 UKR_five_foci_max_tt: "Для определения нашего подхода к мятежу можно взять не более §Hпяти§! очагов."
 UKR_lower_pacification_cost_tt: "§CУмиротворение мятежных провинций обойдется §Gдешевле§!.§!"
 UKR_faster_pacification_tt: "§CУмиротворение мятежных провинций займет §Gменьше§! времени.§!"
