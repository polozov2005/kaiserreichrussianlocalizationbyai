#SocDem/RadSoc Shared Branch
 UKR_local_land_councils: "Местные земельные советы"
 UKR_local_land_councils_desc: "Традиционно крестьяне общинно владели деревенской землей. Современным аналогом этой системы являются местные земельные советы - крестьянские органы, управляющие волостными полями и лесами, выделенными из крупных помещичьих хозяйств в ходе земельной реформы."
 UKR_radicalism_decision_tt: "Решение §Yуступки УСДРП§! снизет уровень §oРадикализма§! еще на один пункт."
 UKR_education_for_all: "Образование для всех"
 UKR_education_for_all_desc: "Для политически грамотного гражданина необходимо хорошее базовое образование, поэтому даже самая бедная крестьянка и дочь шахтера заслуживает этих знаний."
 UKR_education_for_all_event_tt: "Мы обновим §CКиевский Педагогический университет§!."

#Socialist-Revolutionary/Council-Revolutionary Bloc Branch
 UKR_fight_and_you_will_overcome: "Боритесь - поборете!"
 UKR_fight_and_you_will_overcome_desc: "Нам нечего терять, кроме наших цепей. Единственный способ победить - это начать борьбу! К счастью, мы хорошо подготовлены к этой борьбе, поскольку весь украинский народ на нашей стороне."
 UKR_fight_and_you_will_overcome_tt: "Если §RРабочий Демократический Союз§! у власти, то §rсиндикалистская§! революция будет невозможна."
 UKR_build_up_peasant_communities: "Создание крестьянских общин"
 UKR_build_up_peasant_communities_desc: "Традиционная крестьянская деревня - опора рабочей Украины. Это идеальное государство, где власть принадлежит производителям, а не господам и капиталистам. Чем больше местное управление осуществляется сельской общиной, тем лучше."
 UKR_rights_of_the_worker: "Права рабочих"
 UKR_rights_of_the_worker_desc: "Установленные законом выходные дни и защита от перегрузок и недогрузок. Поддержка по безработице. Справедливая оплата труда и право голоса при управлении рабочим местом. Эти законные требования наконец-то будут воплощены в жизнь."
 UKR_rights_of_the_worker_tt: "Если §oрадикалы§! в §RС-РБ§! будут доминировать, это §Gусилит эффекты§!."
 UKR_an_end_to_private_ownership: "Последовательный отказ от частной собственности"
 UKR_an_end_to_private_ownership_desc: "С частной собственностью нельзя покончить сразу, но можно постепенно сворачивать ее путем национализации средств производства и разделения крупнейших земельных владений на крестьянские кооперативы."
 UKR_principle_of_labor: "Принцип труда"
 UKR_principle_of_labor_desc: "Труд в конечном итоге является тем, что создаёт ценность, и, следовательно, рабочие по своей природе являются основой не только нашего общества, но и любого другого. Это естественно, что те, кто работает в полях и на фабриках, должны получать достойное вознаграждение за свои усилия, а не буржуазия, обогащающаяся за счёт их труда."
 UKR_principle_of_labor_tt: "Этот национальный дух предоставит дополнительно §G+10%§! стабильности и начнёт §Gувеличивать§! популярность нашей партии через §Y100§! дней."
 UKR_principle_of_labor_tt_2: "Если будет доминировать любая из фракций §RС-РБ§!, эффекты будут §Gудвоены§!, национальный дух станет более мощным, а популярность §rсиндикалистов§! снизится.\nПопулярность §oтоталистов§! вместо этого вырастет, если доминируют §RR-RB§! §oрадикалы§!."
 UKR_principle_of_labor_tt_3: "§CЭтот национальный дух даст дополнительную §G+10%§! стабильность и начнет §Gповышать популярность нашей партии§! через §Y100 дней§!§!."
 UKR_unionisation_of_countryside: "Унификация сельской местности"
 UKR_unionisation_of_countryside_tt: "Если бы какая-либо из фракций §RУПСР§! станет доминирующий, эффект будет §Gудвоен§!."
 UKR_unionisation_of_countryside_desc: "Из опыта объединения крестьянских хозяйств, особенно во Франции, были извлечены хорошие уроки. Цель \"крестьянского союза\" подобна цели расширенного кооператива: он предлагает финансовую поддержку, расширенное образование и доступ к другим потенциально дорогостоящим услугам и ресурсам, которые отдельный фермер не может получить самостоятельно."

#RadSoc/Syndicalist Shared Branch
 UKR_mass_nationalization_drive: "Массовая национализация"
 UKR_mass_nationalization_drive_desc: "Для того чтобы сгладить бурный процесс форсированной индустриализации, государство возьмет под полный контроль некоторые ключевые промышленные объекты. В дальнейшем контроль над некоторыми из них будет передан тем, кто там работает, но пока чрезвычайная консолидация - наш единственный выход."
 UKR_mass_nationalization_drive_tt: "Решения индустриализации будут §Gстоить на 20 политической власти меньше§!, но они будут §Rвредить нашей £stability_texticon стабильности§!."
 UKR_promote_vocational_training: "Продвигать профессиональное обучение"
 UKR_promote_vocational_training_desc: "Массовая индустриализация невозможна без квалифицированной и образованной рабочей силы. Мы уже сделали некоторые шаги в этом направлении, но без большего инициирования этого просто не достичь. Создание технических школ и обеспечение максимального количества учащихся ими — первостепенная задача."
 UKR_promote_vocational_training_tt: "Мы получим больший бонус на исследования §Yпромышленности§! и больше §Yочков индустрилизации§! в случае доминирования §oРадикалов§! в §RС-РБ§!.\nИли же, если будет доминировать §RУПСР§!, мы получим бонус на исследования §Yстроительства§! и §Yочки земельной реформы§!."
 UKR_promote_vocational_training_tt_2: "Мы получим больший бонус на исследования §Yстроительства§! и больше §Yочков земельной реформы§! в случае доминирования §oРадикалов§! в §RУПСР§!.\nИли же, если будет доминировать §RС-РБ§!, мы получим бонус на исследования §Yпромышленности§! и §Yочки индустриализации§!."
 UKR_promote_vocational_training_tt_3: "В случае доминирования §RУПСР§! фракции, мы получим бонус на исследования §Yстроительства§! и §Yрейтинга земельной реформы§!."
 UKR_promote_vocational_training_tt_4: "В случае доминирования §RС-РБ§! фракции, мы получим бонус на исследования §Yиндустрии§! и §Yиндустриального рейтинга§!."
 UKR_special_bureau_of_military_affairs: "Специальное бюро военных дел"
 UKR_special_bureau_of_military_affairs_desc: "Хотя многие из высокопоставленных лиц не приняли активного участия ни за, ни против нас во время антигетманского восстания, мы всё же унаследовали армию, которая долгие годы служила преступному гетманскому режиму. Для борьбы с потенциально враждебными элементами в вооружённых силах мы создадим специальное подразделение АПДМВС для защиты демократического процесса от возможных переворотов."
 UKR_special_bureau_of_military_affairs_tt: "В случае доминирования §Sумеренных§! в §RС-РБ§!, национальный дух даст §G10%§! стабильности."
 UKR_special_bureau_tt: "Если не принять это национальное решение достаточно быстро, это может привести к §rпоследствиям§!."
 UKR_denounce_personalistic_tendencies: "Осудить личностные устремления"
 UKR_denounce_personalistic_tendencies_desc: "Нередко военные лидеры используют революционные лозунги и якобы народную поддержку, зачастую заходя так далеко, что всё, за что боролась революция, отбрасывается ради их собственных амбиций. Наполеон — особенно печально известный пример, но он не единственный. В нашей демократической республике мы обеспечим, чтобы ни один человек не смог подорвать волю народа через тиранические стремления."
 UKR_advancement_of_socialism: "Продвижение социализма"
 UKR_advancement_of_socialism_desc: "Народ сказал своё слово, и они хотят социализма! Когда всё будет сделано, и мы сможем быстро выступить против сил реакции в Европе, необходимость сотрудничества с буржуазными партиями или институтами отпадёт, поскольку они только загрязняют наше дело. Коалиция с УСДРП может сохраниться, но все должны знать: это лишь временная мера."
 UKR_advancement_of_socialism_tt: "Лимит §oРадикализма§!, который мы можем иметь до краха нашего правительства, будет §Gувеличен§! на §Y10§!.\n\nМы больше не будем требовать, чтобы £KR_game_rule_flag_GER §YГерманская Империя§! находилась на грани капитуляции для восстания против неё.\n\n§RRадикальные социалисты§! теперь предоставят §Y75%§! своей популярности."
 UKR_kushnir_win_tt: "Лимит §oРадикализма§!, который мы можем иметь до краха нашего правительства, будет §Gувеличен§! на §Y5§!."
 UKR_kushnir_lose_tt: "Лимит §oРадикализма§!, который мы можем иметь до краха нашего правительства, будет §Rуменьшен§! на §Y5§!."
 UKR_maintain_pluralism: "Сохранить плюрализм"
 UKR_maintain_pluralism_desc: "Наши коалиционные партнёры из УСДРП могут не иметь той же страсти к полному разрушению капиталистических институтов, как мы, но однажды это может измениться. Они тоже будут обращены к революционному делу — нам просто нужно показать, что мы готовы сотрудничать с ними и учитывать их требования."
 UKR_maintain_pluralism_tt: "Все решения о §Yуступках§! станут на 5 политической силы §Gдешевле§!.\n\nМиссия §YУвеличение радикализма коалиции§! теперь начнётся на 5 дней позже."
 UKR_reclaim_legacy_of_liberation_struggle: "Вернуть наследие освободительной борьбы"
 UKR_reclaim_legacy_of_liberation_struggle_desc: "Есть определённая наглость в том, что гетманисты утверждают, что мы оторваны от украинского духа. На самом деле, именно УПСР и нынешний С-РБ находились в авангарде национальной борьбы, сражаясь сначала за автономию, а затем за независимость от московского правления. Напоминая народу о нашем великом историческом наследии, мы получим легитимность среди тех, кто более осторожно принимает социалистическое дело."
 UKR_reclaim_legacy_of_liberation_struggle_tt_1: "Если будет доминировать фракция §RУПСР§!, мы вместо этого получим:\n"
 UKR_reclaim_legacy_of_liberation_struggle_tt_2: "Если будет доминировать фракция §RС-РБ§!, мы вместо этого получим:\n"
 UKR_remove_socialist_nationalization: "Решения индустриализации больше §Gне будут вредить нашей £stability_texticon стабильности§!, но они будут §Rстоить больше§!."
 UKR_socialization_of_the_land: "Социализация земли"
 UKR_socialization_of_the_land_desc: "Все богатства плодородных земель Украины отныне будут принадлежать народу. Хотя отдельные сельскохозяйственные объекты будут национализированы, контроль над подавляющим большинством земельных ресурсов будет передан непосредственно местным органам власти - для честного и справедливого перераспределения между сельскохозяйственными коллективами, кооперативами и индивидуальными семейными хозяйствами."
 UKR_socialization_of_the_land_tt: "§YПо завершении§!:\nЕсли §oРадикалы§! из §RУПСР§! будут доминировать, этот национальный дух §Yеще более снизит фактор народного потребления§! и §Yповысит нашу популярность§!."
 UKR_breakneck_industrialization: "Ускоренная индустриализация"
 UKR_breakneck_industrialization_desc: "Для обеспечения процветания нашей страны необходимо принимать кардинальные меры. Разрыв между более индустриально развитыми странами и нашей страной продолжает расти, поэтому стабильное и быстрое развитие нашей промышленной базы остается одним из наших ключевых приоритетов. Планы, разработанные нашими предшественниками, будут пересмотрены - настало время решительных действий, как в мыслях, так и на деле."
 UKR_breakneck_industrialization_tt: "Если §oРадикалы§! из §RС-РБ§! будут доминировать, мы получим дополнительно §YГражданские фабрики§! и §YВоенные заводы§!, а также более §Y+3§! очков индустриализации."
 UKR_seize_german_assets: "Арестовать немецкие активы"
 UKR_seize_german_assets_desc: "Берлин - один из главных бенефициаров и пособников буржуазного господства на Украине. Дешевая рабочая сила, слабое соблюдение или прямое отсутствие правил для работодателей, богатые минеральные и сельскохозяйственные ресурсы - все это привлекало немецких эксплуататоров. Но не более! Все, что построено непосильным трудом украинского народа, отныне будет служить его нуждам и интересам."
 UKR_affordable_urban_housing: "Доступное городское жилье"
 UKR_affordable_urban_housing_desc: "Процесс промышленного роста неизбежно приведет к массовой миграции населения из сельской местности в города. Если мы не подготовимся к этому заранее, то столкнемся с жилищным кризисом весьма пугающих масштабов. Вызванные им социальные потрясения могут серьезно подорвать стабильность нашего государства. Поэтому одной из наших главных задач в настоящее время является создание новых объектов жилья, а также реконструкция и расширение сопутствующей инфраструктуры."

 UKR_radicalism_check_tt: "§oРадикализм§! как минимум [?UKR_radicalism_check_var|H0]"
 UKR_rrb_radical_dominant_faction_tt: "§oРадикалы§! из §RС-РБ§! доминируют в настоящее время."
 UKR_upsr_radical_dominant_faction_tt: "§oРадикалы§! из §RУПСР§! доминируют в настоящее время."
 UKR_upsr_moderate_dominant_faction_tt: "§SУмеренные§! из §RУПСР§! доминируют в настоящее время."
 UKR_rrb_moderate_dominant_faction_tt: "§SУмеренные§! из §RС-РБ§! доминируют в настоящее время."

 UKR_if_buildup_peasant_communities: "Если §oРадикалы§! из §RУПСР§! будут доминировать, мы §Gполучим§! дополнительную §Yстабильность, инфаструктуру и очки земельной реформы.§!"
 UKR_if_mass_nationalisation_drive: "Если §oРадикалы§! §RС-РБ§! будут доминировать, национальный дух еще больше §Gсократит§! фактор товарного потребления."
 UKR_if_denounce_personalistic_tendencies: "Если §oРадикалы§! из §RУПСР§! или из §RС-РБ§! будут доминировать, национальный дух даст более §Gлучшие§! эффекты."

#Borotbyst Branch
 UKR_fighters_til_the_end: "Бойцы до конца!"
 UKR_fighters_til_the_end_desc: "Те первые смельчаки, которые подняли революционное знамя и бросили вызов несправедливому капиталистическому строю, навсегда останутся для нас источником вдохновения. Наша борьба - это продолжение их борьбы, и каждый враг революции должен понять: она не прекратится до тех пор, пока наши разорванные цепи не захлебнутся кровью наших угнетателей."
 UKR_the_left_wing_unity: "Сила в единстве"
 UKR_the_left_wing_unity_desc: "Чтобы противостоять натиску контрреволюции, мы должны отбросить мелкие разногласия и создать союз между всеми подлинно революционными силами. Формальная партийная принадлежность имеет меньшее значение, чем верность идеалам нашей освободительной борьбы."
 UKR_question_of_ideological_rivals: "Разобраться с петлюровцами"
 UKR_question_of_ideological_rivals_desc: "Нельзя забывать и о тех предателях, которые пытались скрыть свою глубоко буржуазную сущность за тонкой вуалью \"реформизма"\ и \"прогрессизма"\. Главные из них сплотились вокруг петлюровского флага, и с ними надо расправиться в соответствии с революционной необходимостью."
 UKR_from_shopfloors_to_the_trenches: "От торговых площадок до траншей"
 UKR_from_shopfloors_to_the_trenches_desc: "К оружию! Мы призываем всех, кто способен бороться, подняться и встать на защиту революционного дела. Реакционные силы вокруг нас замышляют погасить пламя нашего восстания, и наш долг - не допустить этого любыми средствами."
 UKR_recruit_the_red_militia: "Вооружение красногвардейцев"
 UKR_recruit_the_red_militia_desc: "Те, кто присоединился к нашей борьбе, когда успех был далеко не гарантирован, сполна доказали свою преданность и верность. Они станут ядром, вокруг которого будут расти новые революционные когорты."
 UKR_establish_the_council_of_deputies: "Учредить Совет депутатов"
 UKR_establish_the_council_of_deputies_desc: "Наконец-то закончился фарс буржуазного парламентаризма. На месте собрания, призванного в первую очередь сохранять несправедливый общественный строй, возникнет новое, нацеленное на верное представительство трудящихся масс."
 UKR_dismantle_pillars_of_exploitation: "Разрушение основ эксплуатации"
 UKR_dismantle_pillars_of_exploitation_desc: "Слишком долго плоды труда человека несправедливо присваивались эксплуататорскими классами. Благодаря тотальному контролю над промышленной, сельскохозяйственной и финансовой сферами они постоянно обеспечивали свое процветание за счет простых людей. Поэтому наша главная задача - разрушить те основы, на которых строилась эта противоправная система."
 UKR_a_constitution_for_the_working_people: "Конституция для трудового народа"
 UKR_a_constitution_for_the_working_people_desc: "Этим главным законом будет определяться сама суть нового революционного строя. Он станет подлинным проявлением народной воли, воплощая в себе идеалы освобождения и справедливости. Построенная на его основе политическая система обеспечит достойное сохранение достижений нашей борьбы."
 UKR_primacy_of_labour_collectives: "Примат трудовых коллективов"
 UKR_primacy_of_labour_collectives_desc: "Экономическое развитие страны как на государственном, так и на региональном уровне должно контролироваться непосредственными представителями тех, кто трудится в поле, на шахте или на заводе. Организованные в Союзы производителей и потребителей, они смогут добиться того, чтобы предлагаемая экономическая политика учитывала потребности трудового народа."
 UKR_guidance_of_the_councils: "Руководство Советов"
 UKR_guidance_of_the_councils_desc: "Конечная власть по вопросам экономики должна принадлежать Совету депутатов и региональным крестьянским и рабочим советам, а профсоюзы и кооперативы должны выполнять консультативную роль. Это позволит упорядочить и рационализировать процесс планирования экономики и обеспечить максимальную эффективность экономического развития."
 UKR_peace_for_the_nations: "Мир народам"
 UKR_peace_for_the_nations_desc: "Гидра шовинизма и буржуазного национализма должна быть уничтожена без зазрения совести. Различные народы, проживающие на территории Украины, должны пользоваться государственной защитой своих основных национальных прав и иметь возможность отстаивать свои интересы через специальные представительные органы."
 UKR_foster_revolutionary_fervour: "Воспитывать революционный пыл"
 UKR_foster_revolutionary_fervour_desc: "Идеологический фронт не менее важен, чем военный. Годы угнетения привели к тому, что многие украинцы запутались в том, кто является их настоящими врагами. Необходимо очистить их от мелкособственнических инстинктов и мелкобуржуазного менталитета, еще сохраняющихся в некоторых социальных слоях, и укрепить их революционное сознание путем просвещения и пропаганды."
 UKR_justice_for_the_workers: "Справедливость для трудящихся"
 UKR_justice_for_the_workers_desc: "Ни один честный труженик не должен сталкиваться с несправедливым или безразличным отношением. Необходимо обеспечить достойную компенсацию труда, связанного с опасностью для здоровья, ограничение продолжительности рабочего дня, постоянное поддержание достойных условий труда."
 UKR_volobuievs_great_experiment: "Большой эксперимент Волобуева"
 UKR_volobuievs_great_experiment_desc: "Михаил Волобуев, которого одни считают перспективным новатором, а другие - наивно эксцентричным, известен своими своеобразными взглядами на вопросы экономического развития. Тем не менее, он стал предпочтительным выбором нового первого заместителя председателя правительства Ковалива и теперь имеет возможность доказать, что отстаиваемая им экономическая стратегия - нечто большее, чем набор туманных теоретических построений."
 UKR_the_organic_development: "Органическое развитие"
 UKR_the_organic_development_desc: "Слишком долго полной реализации экономического потенциала Украины мешала иностранная эксплуатация: сначала царским режимом, затем капиталистами Берлина и Вены. Но с этим покончено. Чтобы занять достойное место среди экономик освобождающейся Европы, мы должны направить свои усилия на достижение экономической самодостаточности. К счастью, Украина обладает всеми необходимыми для этого ресурсами."
 UKR_decentralised_economic_planning: "Децентрализованное экономическое планирование"
 UKR_decentralised_economic_planning_desc: "Наследие того, что Украина рассматривалась как часть большого имперского целого, до сих пор дает о себе знать при планировании экономики. Однако каждый экономический регион Украины имеет свои уникальные условия, поэтому делегирование достаточных полномочий региональным плановым комитетам имеет первостепенное значение. Местные органы власти совместно с профсоюзами и рабочими кооперативами смогут разрабатывать планы экономического развития в соответствии со своими возможностями и потребностями."
 UKR_proletarian_offensive: "Пролетарское наступление"
 UKR_proletarian_offensive_desc: "Среди оглушительного шума заводов и в недрах тускло освещенных шахт закаляется настоящий боевой дух. Вооруженный ясностью цели и непоколебимой убежденностью, промышленный пролетариат будет сражаться на самом переднем крае революционной борьбы."
 UKR_industrial_evolution: "Эволюция промышленности"
 UKR_industrial_evolution_desc: "Гармоничное и рациональное развитие промышленного потенциала Украины заложит необходимые основы для стабильного экономического роста. Это укрепит позиции Украины как органичного субъекта мировой и региональной экономики. Когда наши соседи окончательно освободятся от капиталистического ига, сотрудничество с сильной украинской экономикой поможет им перестроиться и обеспечить процветание в будущем."
 UKR_revolution_in_culture: "Революция в культуре"
 UKR_revolution_in_culture_desc: "Революция вызовет небывалый по своим масштабам культурный ренессанс. Высоко и гордо будет нестись факел нового, пролетарского искусства. Трепещите, лживые трубадуры буржуазной посредственности, - в новом мире, за который мы так яростно боремся, не будет места для таких, как вы."
 UKR_hrynkos_orthodox_approach: "Ортодоксальный подход Гринько"
 UKR_hrynkos_orthodox_approach_desc: "Требовательный, твердый и решительный - так обычно характеризуют Григория Гринько его соратники по Боротьбе. Поэтому неудивительно, что при поддержке первого заместителя председателя Полоза партийная карьера Гринько быстро пошла в гору. Поможет ли ему его стойкий характер в достижении прочного компромисса между порой разрозненными революционными силами? Только время покажет."
 UKR_french_example: "Французский пример"
 UKR_french_example_desc: "Париж - яркий факел освобождения и прогресса, неустанно борющийся с темной европейской ночью. Его свет будет направлять нашу борьбу: Французские институты будут служить образцом для наших, французские революционные традиции будут определять наши решения, а беззаветная храбрость мучеников Коммуны будет вечно вдохновлять нас на новые вершины героизма."
 UKR_united_vanguard: "Объединенный Авангард"
 UKR_united_vanguard_desc: "Только создав крепкий, прочный союз между городским пролетариатом и сельскими массами, мы сможем в полной мере реализовать революционный потенциал нашего народа. Единый авангард рабочих и крестьян сметёт силы реакции и контрреволюции, приблизит нас к миру, где ни один трудящийся человек не знает гнёта и несправедливости."
 UKR_systemic_compromise: "Системный компромисс"
 UKR_systemic_compromise_desc: "Ключевое слово: баланс. Баланс между промышленностью и сельским хозяйством, баланс между советами и профсоюзами, баланс между интернационализмом и верностью Отечеству. Трудно удержать равновесие, и говорят, что компромисс никого не устраивает, но мы-то знаем: слишком сильно прислонись к одной стороне - и вся хрупкая система неизбежно рухнет."
 UKR_inevitable_future_of_the_world: "Неизбежное будущее мира"
 UKR_inevitable_future_of_the_world_desc: "Простая и неоспоримая истина: эпоха буржуазных империй и национальных государств когда-нибудь закончится. На ее месте возникнет новый мир - мир братских республик, объединенных на принципах социалистической солидарности, прогресса и всеобщего блага. И хотя этот исход обеспечен, борьба за него еще не закончена, и мы должны быть на переднем крае этой борьбы."

# People's Republic Post-War - Moderate #
 UKR_a_dream_come_true: "Мечта стала явью"
 UKR_a_dream_come_true_desc: "Мы победили. Украинская демократия родилась заново и одержала победу над российской угрозой. Народ готовится к первым послевоенным выборам, и жизнь постепенно возвращается в нормальное русло. Впервые в истории Украины оптимизм кажется оправданным."
 UKR_postwar_elections_tt: "Сможет ли правящая партия победить на выборах, будет зависеть от следующих факторов:\n£white_dot Наши §CОчки земельной реформы§! и §CИндустриализации§! должны быть выше §Y90§!.\n£white_dot §lУРДП§! не страдает от мятежей изнутри.\n£white_dot Мы не достигли §Y60%§! прогресса капитуляции или более.\n\nЕсли мы преуспеем во всем этом, §Gпобедит§! правящая партия, но если нет, мы уйдем в §Rоппозицию§!.\n\nТакже, если:\n£white_dot Правительство национального единства §Rне§! было сформировано.\n £white_dot §lУРДП§!-§lЦентр§! имеет §Gвысокое§! влияние.\n £white_dot Наши отношения с §SУСДРП§! §CСговорчивые§!.\nТогда мы получим более §Gлучшие§! результаты..."
 UKR_postwar_elections_tt_2: "Сможет ли правящая партия победить на выборах, будет зависеть от следующих факторов:\n£white_dot Наши §CОчки земельной реформы§! and §CИндустриализации§! должны быть выше §Y90§!.\n£white_dot Наш §1идеализм§! не достиг §Y-4§!.\n£white_dot §mПравые§! в §lУРДП§! не взял верх на партийной конференции.\n£white_dot Мы не достигли §Y60%§! прогресса капитуляции или более.\n\nЕсли мы преуспеем во всем этом, §Gпобедит§! правящая партия, но если нет, мы уйдем в §Rоппозицию§!.\n\nТакже, если:\n£white_dot Правительство национального единства §Rне§! было сформировано.\n£white_dot У нас есть только национальный дух §YНезначительные немецкие привелигии§!, ранее были проведены торговые переговоры с §rфранцузами и британцами§!, и принят §YЗакон о национальной обороне§!.\n£white_dot Наши отношения с §lУРДП§! §GСотрудничающие§! или §CСговорчивые§!.\nТогда мы получим более §Gлучшие§! результаты..."
 UKR_the_scarred_generation: "Поколение со шрамами"
 UKR_the_scarred_generation_desc: "Две мировые и несколько гражданских войн. Это должно было произойти по какой-то причине. Ведь все эти страдания были неспроста, не так ли? Эти вопросы преследуют миллионы людей, потерявших родных и близких. Мы выжили, но что мы будем делать с нашей победой?"
 UKR_integration_of_eastern_regions: "Интеграция восточных регионов"
 UKR_integration_of_eastern_regions_desc: "Военное правительство восточных областей наконец-то может быть распущено, и начнется долгая работа по интеграции этих территорий в состав Украины. Если во время войны партизанская активность была велика, то после капитуляции России менталитет изменился. Наше русофобское сообщество оказало неоценимую помощь в работе с этими регионами."
 UKR_peace_and_prosperity: "Мир и процветание"
 UKR_peace_and_prosperity_desc: "Нам больше не нужно бояться войны и страдать от тиранов. Впервые в нашей истории вся созидательная энергия нации может быть направлена на собственное процветание."
 UKR_a_plentiful_land: "Изобильная земля"
 UKR_a_plentiful_land_desc: "Украина - богатая земля, и она может быть богатой для каждого. Наша цель - обеспечить экономическое процветание и возможность самореализации для всех украинцев. Вопрос только в справедливости, чтобы каждый получил свою долю нашего богатства."
 UKR_swords_to_ploughshares: "Мечи на плахи"
 UKR_swords_to_ploughshares_desc: "Никогда больше. Наша армия победила в силу необходимости, но какой ценой? В Украине будущего не будет абсурдных машин смерти, только мир, спокойствие и благоденствие народа."
 UKR_change_from_within: "Изменения изнутри"
 UKR_change_from_within_desc: "Настоящие перемены происходят медленно и трудоемко, но тем не менее они происходят. И хотя путь к подлинному социальному освобождению может быть долгим и трудным, ничто не остановит украинский народ на этом пути."
 UKR_testament_fulfilled: "Завет выполнен"
 UKR_testament_fulfilled_desc: "Когда я умру, похороните меня на моей любимой Украине,\nМоя могила на могильном кургане высоко,\nПосреди раскинувшейся равнины."
 UKR_weltkrieg_has_ended: "§CРоссия потерпела поражение в войне§!"
 UKR_weltkrieg_has_ended_decision: "Russia has been defeated in a war"
 UKR_UNR_finisher_1: "Мир и процветание"
 UKR_UNR_finisher_2: "Изобильная земля"
 UKR_UNR_finisher_3: "Мечи на плахи"
 UKR_UNR_finisher_4: "Путь к социальному освобождению"

# People's Republic Post-War - Socialist #
 UKR_new_sunrise: "Новый восход"
 UKR_new_sunrise_desc: "Всё было против нас... но каким-то образом мы здесь. Мы одержали победу. Мы победили Гетмана, русских, немцев — и больше всего мы победили, оставаясь верными нашим демократическим ценностям и институтам. После стольких мрачных дней войны и смерти трудно было поверить, что солнце снова взойдёт для украинского народа... но теперь орудия умолкли, и этот день, кажется, настал."
 UKR_gifts_of_liberation: "Дары освобождения"
 UKR_gifts_of_liberation_desc: "Освобожденные территории должны быть полноценно интегрированы в нашу республику на правах федеральных округов, с таким же уважением к местному самоуправлению, как и в любом другом регионе Украины."
 UKR_workers_and_peasant_democracy: "Рабоче-крестьянская демократия"
 UKR_workers_and_peasant_democracy_desc: "Угрозы контрреволюции практически миновали, и теперь мы можем ослабить хватку. Необходимо привлекать все больше людей на влиятельные должности, отбросив все претензии на однопартийность и диктатуру. Пока они готовы работать на благо трудовой Украины, они будут услышаны."
 UKR_collectocratic_ideal: "Коллективистский идеал"
 UKR_collectocratic_ideal_desc: "Средства производства окончательно перешли в руки трудящихся. Коллективы на добровольных началах управляют нашим производством при минимальном вмешательстве любой другой иерархии, как того требует естественное состояние человека-труженика."
 UKR_from_democracy_to_communism: "От демократии к коммунизму"
 UKR_from_democracy_to_communism_desc: "Однажды политические силы, которые некогда составляли Союз рабочих-демократов, прекратят своё существование. Все революционные силы должны быть объединены под одним знаменем, одной партией, представляющей украинский пролетариат. Для достижения этой цели, на данном этапе С-РБ будет первым среди равных в революционном движении, направляя путь к коммунистическому идеалу."
 UKR_utopian_ruralism: "Утопическое сельское хозяйство"
 UKR_utopian_ruralism_desc: "Украинская деревня — это духовная колыбель и истинная опора украинской нации. УПСР могла раньше переживать множество расколов из-за различных вопросов, но теперь, когда она находится в авангарде революционного движения, пришло время оставить эти мелкие разногласия в прошлом. Защита украинской земли и сохранение её чистоты являются ключевыми для нашего национального развития."
 UKR_all_peoples_revolutionary_front: "Общенародный революционный фронт"
 UKR_all_peoples_revolutionary_front_desc: "Хотя великое революционное благо уже достигнуто, не стоит забывать, что нас привело к этому: компромиссы и коалиции. Глупо полагать, что сейчас время для внутренних раздоров только потому, что угрозы иностранного господства в основном исчезли. EGCHбудет представлять не только тех, кто стремится к радикальным социальным изменениям и действиям, но и всё украинское крестьянство, сельский и городской пролетариат."
 UKR_revolutionary_tradition: "Революционные традиции"
 UKR_revolutionary_tradition_desc: "Тарас Шевченко, Леся Украинка, Иван Франко, Михаил Драгоманов и многие другие, сыгравшие важную роль в становлении современной украинской нации, - все они были носителями революционного духа. Борьба за справедливость и свободу пронизывает саму суть украинской идентичности. Поэтому социалистическая революция, как единственная истинная форма освобождения, является единственным логическим результатом украинской национальной борьбы."

 UKR_UNR_finisher_5: "Коллективистский идеал"
 UKR_UNR_finisher_6: "Утопическое сельское хозяйство"

#Revolt focuses
 UKR_mistakes_of_1925: "Ошибки 1925 года"
 UKR_mistakes_of_1925_desc: "Мы не можем повторить ошибки 1925 года, когда правительственные репрессии против боротбистов были неоправданно жестокими, часто направленными против гражданских лиц, не имеющих никакого отношения к боротбистскому движению, что привело к новым восстаниям. Вместо этого мы должны учиться на своих ошибках и следить за тем, чтобы репрессии против повстанцев не настроили народ против нас."
 UKR_appeal_to_pacifism: "Призыв к пацифизму"
 UKR_appeal_to_pacifism_desc: "Обращение к пацифистским тенденциям будет способствовать укреплению нашей легитимности в глазах народа. Гетман уже показал, что он осуждает насилие с обеих сторон, и повторение его слов позволит народу вновь поверить в гетмана и его правительство."
 UKR_reach_out_to_urdp: "Обратиться к УРДП"
 UKR_reach_out_to_urdp_desc: "УРДП, возможно, находится в оппозиции к гетманской коалиции, но даже она может быть полезна. Обращение к ним даст нам большой толчок к повышению легитимности, поскольку станет доказательством наших реформаторских тенденций в условиях, когда есть сомнения в том, что правительство заботится о простых гражданах."
 UKR_undermine_vdr_legitimacy: "Подрыв легитимности ВДД"
 UKR_undermine_vdr_legitimacy_desc: "Как это ни прискорбно, но ВДД пользуется большой поддержкой среди населения, но эта поддержка может быть поставлена под сомнение в сознании людей. Разоблачая радикальные боротбистские тенденции в их рядах и сообщая о злодеяниях, которые их войска совершают против наших, мы можем добиться того, что их легитимность рухнет."
 UKR_promises_of_reforms: "Обещания реформ"
 UKR_promises_of_reforms_desc: "Восстание еще не подавлено, и многие наши граждане по-прежнему поддаются на их ложь, но это положение непрочно. Если мы хотим действительно подавить восстание, мы должны, по крайней мере, на данный момент, дать конкретные обещания по реформированию Гетманата, чтобы успокоить наших новых союзников и народ."

 UKR_victories_of_1919: "Победы 1919 года"
 UKR_victories_of_1919_desc: "В борьбе с восстанием, с которым сейчас сталкивается гетман, мы должны ориентироваться на наши победы в 1919 году. Когда анархисты и боротбистские террористы угрожали уничтожить страну, гетманские войска смогли провести успешное контрнаступление. Мы должны применить ту же тактику и здесь, и пощады предателям не будет!"
 UKR_secure_the_military_apparatus: "Охрана военного аппарата"
 UKR_secure_the_military_apparatus_desc: "Особенно сильно от восстания пострадали военные, в рядах которых наблюдается массовое дезертирство и полный разрыв связи. Гетман должен подтвердить свое положение главнокомандующего и напомнить армии, кому она призвана служить."
 UKR_purge_vdr_supporters: "Чистка сторонников республиканцев"
 UKR_purge_vdr_supporters_desc: "Ходят слухи, что чиновники нашего правительства исповедуют республиканские идеалы, и хотя раньше против них практически ничего не предпринималось, сейчас настали тяжелые времена: в любой момент они могут заявить о своей приверженности нелегитимной \"Народной Республике\" Широкомасштабная чистка республиканских чиновников и их сторонников сделает невозможными их действия против нашего правительства."
 UKR_expand_mil_police: "Расширить корпус военной полиции"
 UKR_expand_mil_police_desc: "Увеличение численности военной полиции будет очень полезно, особенно на востоке страны, так как основные силы сосредоточены против восстаний на западе. Они помогут нам в подавлении восстаний и мятежей, в аресте ключевых лидеров ВДД."
 UKR_retake_the_railroads: "Вернуть железные дороги"
 UKR_retake_the_railroads_desc: "Железные дороги Украины не только чрезвычайно прибыльны, но и ценны; если повстанцы контролируют основные железнодорожные сети, они могут саботировать наши поставки и подкрепления. Возвращение железных дорог должно стать одной из первоочередных задач при подавлении восстания."
 UKR_authdem_will_turn_into_pataut_tt: "§RЕсли позволить военным оказывать слишком большое влияние на наш подход, это может повернуть украинское государство в более §Pавторитарном направлении.§!§!"
 UKR_double_rebel_attack_timer_tt: "§CУдваивает время, необходимое для расширения ВДД.§!"

 UKR_dreams_of_1917: "Мечты 1917 года"
 UKR_dreams_of_1917_desc: "В 1917 году Украина возлагала большие надежды и мечтала о независимости - о том, чтобы стать суверенным государством после многовекового иностранного господства. Эта независимость должна была стать средством достижения политического самоопределения и демократии, позволить украинцам управлять собой, а не зависеть от прихотей иностранных правителей. Настало время воплотить эту мечту в жизнь."
 UKR_peasant_warrior: "Крестьянские ополчения"
 UKR_peasant_warrior_desc: "Защита от врага.\nЗащита местного населения.\nЗащита ресурсов.\n\nСоздание крестьянского ополчения обеспечит продовольствие и снабжение нашей стороны, не отторгая нашу сельскую базу поддержки такими громкими словами, как \"диалектика\" или \"материализм\""
 UKR_revolutionary_spirit: "Революционная Гвардия"
 UKR_revolutionary_spirit_desc: "Мы не можем обеспечить безопасность нашего движения, прибегнув к помощи сброда. Преданная и дисциплинированная сила будет защищать нашу революционную идеологию, поддерживать авторитет и подавлять оппозицию."
 UKR_distance_from_syndicalism: "Отдалиться от синдикализма"
 UKR_distance_from_syndicalism_desc: "Для сохранения революционного импульса необходимо очистить нашу среду от социалистической символики и риторики. Мы боремся за спасение самой Украины, а не за возвышенные идеалы, о которых пишет зарубежная пресса."
 UKR_lessons_of_britain_and_france: "Уроки Великобритании и Франции"
 UKR_lessons_of_britain_and_france_desc: "Синдикалистские страны Запада за ограниченное время своего существования достигли очень многого. Их достижения настолько велики, что можно только стремиться им подражать. Поэтому мы должны адаптировать их политику к материальным условиям нашей Украины."
 UKR_strongest_message: "Самое сильное послание"
 UKR_strongest_message_desc: "Радио позволяет нам распространять информацию, поддерживать наши идеи и мобилизовывать массы. В то время как нелегитимный режим продолжает отдавать приказы сверху, мы обращаемся непосредственно к своему народу."
 UKR_peoples_army_focus: "Украинская народная армия"
 UKR_peoples_army_focus_desc: "Мы уже не иррегуляры, не крестьяне, не добровольцы - мы армия, сражающаяся за независимую, свободную Украину, определяющая ход истории."

## LUN Focuses ##
 UKR_triumph_of_the_national_revolution: "Триумф Национальной Революции"
 UKR_triumph_of_the_national_revolution_desc: "Руководствуясь бессмертной волей украинского народа и пламенной преданностью наших сердец, мы торжественно клянемся вступить в новую эпоху: эпоху национального возрождения, эпоху героизма и мученичества, эпоху вновь обретенной украинской мощи."
 UKR_cure_primitive_ideology: "Излечить проклятие примитивной идеологии"
 UKR_cure_primitive_ideology_desc: "Мы осуждаем антиобщественный реакционный дух так называемого \"гетманского консерватизма\" Мы отвергаем примитивный материализм социализма и демолиберализма. Только нациократическое мировоззрение, ясное и бескомпромиссное, даст нам необходимые средства для борьбы за будущее украинского национального государства."
 UKR_spiritual_mobilisation: "Мобилизовать дух нации"
 UKR_spiritual_mobilisation_desc: "Духовная мощь украинского народа дремлет, скованная отвратительной косностью так называемого \"Гетманщина\" Наша важнейшая задача — пробудить спящие национальные энергии, обуздать их силу и направить на благо общества и укрепление Украинского государства."
 UKR_above_party: "Вышеуказанная партия"
 UKR_above_party_desc: "Больше никаких мелких политических разногласий! Украинское национальное государство выше эгоистичных грызней различных партий. \"атаманы\" Необходимы согласованные усилия всего общества, чтобы сохранить и укрепить Украину."
 UKR_above_class: "Высший класс"
 UKR_above_class_desc: "Наш долг — создать все условия, необходимые для гармоничного сотрудничества между различными классами. Вместо того, чтобы преследовать свои узкие интересы, они должны работать сообща, стремясь принести процветание всему украинскому народу."
 UKR_convene_national_assembly: "Созвать Национальное собрание"
 UKR_convene_national_assembly_desc: "Настало время заложить первые камни в фундамент нового Украинского государства. Лучшие и самые яркие представители нашей нации соберутся, чтобы сформулировать правовую, политическую и экономическую основу, полностью подходящую для нужд Национальной революции. Самый важный вопрос повестки дня столь же прост, сколь и важен: на кого будет возложена священная задача вести наше государство и нацию в эти неспокойные времена?"
 UKR_annihilate_parasitic_exploitation: "Уничтожить паразитическую эксплуатацию"
 UKR_annihilate_parasitic_exploitation_desc: "В то время как мы, вопреки социалистической демагогии и демократическим иллюзиям, признаем, что неравенство имманентно любому обществу, мы также понимаем, что труд есть творческое и благородное дело и его плоды должны служить всему обществу, а не нескольким социальным тунеядцам, скрывающимся за вуалью. анонимного капитала."
 UKR_avoid_industrial_anarchy: "Избегать промышленной анархии"
 UKR_avoid_industrial_anarchy_desc: "С анархией производства и монополией грабительских клик нужно бороться любыми средствами. Мы позаботимся о том, чтобы при нациократическом порядке каждому и каждому было надлежащее место, соответствующее их продуктивному вкладу и насущным потребностям."
 UKR_reward_peasants: "Вознаграждение крестьян"
 UKR_reward_peasants_desc: "Раздраженное реакционным игом крупного землевладельца украинское крестьянство было лишено возможности улучшить свое плачевное материальное положение. Отказываясь терпеть это дальше, сельские массы восстали и в конце концов проложили путь для нашего захвата. Пора положить конец прежней несправедливости и обеспечить аграрное ядро нашей нации всеми необходимыми средствами для своего развития."
 UKR_organic_economy: "Органическая экономика"
 UKR_organic_economy_desc: "В то время как современный синдикализм отравил идею профессионального представительства как основы экономической организации бездушным материализмом и политической анархией, сама основная концепция остается здоровой. Поручая вопросы экономической политики специальным органам, состоящим из представителей различных профессиональных организаций, мы обеспечим направление процесса экономического развития в соответствии с потребностями всего народа."
 UKR_spiritual_labour: "Восстановить дух и цель труда"
 UKR_spiritual_labour_desc: "Труд есть то, что возвышает человека над его основным животным я. Именно через труд человек приходит к осознанию собственной ценности и через него находит достойное место в более широком обществе. Мы должны напомнить населению, что не бывает незначительных дел и что важен каждый добросовестный вклад в национальное богатство."
 UKR_hierarchy_duty_discipline: "Иерархия, Долг, Дисциплина"
 UKR_hierarchy_duty_discipline_desc: "К бредовому лозунгу \"Свобода, Равенство, Братство\" мы отвечаем своим девизом. \"Иерархия, Долг, Дисциплина\" - три столпа, на которых строится наш авангард национальной революции. Это те ценности, которые приведут нас к окончательной победе."
 UKR_societal_harmonisation: "Социальная гармонизация"
 UKR_societal_harmonisation_desc: "Наше общество должно быть организовано таким образом, чтобы способствовать единству целей и внутренней сплоченности. Каждый гражданин должен понимать, что благополучие нации и государства важнее личных интересов."
 UKR_ukraine_above_all: "Украина превыше всего"
 UKR_ukraine_above_all_desc: "\"Святая Украина, вечная и непобедимая, за Тебя и Твою Славу смело идем в бой. Закалите наш дух, ожесточите нашу волю, чтобы мы могли отомстить тысячам безымянных воинов Твоих революций. В борьбе с Твоими врагами мы найдем сладкую смерть, а после этого - благословение жизни вечной, навеки облеченной Твоим духом, Святая Украина.\""
 UKR_cult_of_creativity: "Поощряйть культ творчества"
 UKR_cult_of_creativity_desc: "Нет процветания и развития без творческого подхода во всех сферах жизни, от мирских трудов до искусства и науки. Поэтому воспитание творческого духа украинских масс является одной из наших главных задач. Некоторые утверждают, что лишь немногие избранные обладают истинным творческим потенциалом и инновациями. Мы отвергаем это элитарное представление и сохраняем веру в огромный творческий потенциал, присущий всей нации."
 UKR_eternal_nation: "Бессмертная воля украинского народа"
 UKR_eternal_nation_desc: "Мы вернули Украину с грани уничтожения, но наше революционное наступление продолжается. Нет слишком высокой цены и слишком больших жертв для достижения нашей конечной цели - Суверенного Единого Украинского Государства."
 UKR_destiny_of_ukraine: "Судьба Украины"
 UKR_destiny_of_ukraine_desc: "У каждого народа есть судьба, и он либо исполняет ее, либо погибает, пытаясь. Наша вполне ясна - нести нравственное и духовное возрождение Восточной Европы, помогать различным народам этих земель в реализации их истинного потенциала. Стабильность и безопасность для всего региона - идеал, к которому стоит стремиться."
 UKR_bsd_customs_union: "Объединить экономики Черного моря"
 UKR_bsd_customs_union_desc: "Государства Черноморского региона естественно предрасположены к тесному экономическому сотрудничеству. Объединив наши ресурсы и усилия, мы создадим союз с экономической мощью, способной соперничать с величайшими империями. Снятие торговых барьеров между нашими странами станет нашим первым шагом в этом направлении."
 UKR_bsd_political_union: "Построить Великое Черноморское Сообщество"
 UKR_bsd_political_union_desc: "Как первое среди равных, наше государство возьмет на себя ведущую роль в строимом нами сообществе. В то время как вопросы внутренней политики в основном останутся в компетенции отдельных государств-членов, наши коллективные ответы на международные вызовы будут в первую очередь координироваться [202.GetName]."
 UKR_true_camaraderie: "Истинное товарищество"
 UKR_true_camaraderie_desc: "Мы — братство, гордящееся непоколебимым доверием друг к другу. Таким образом, внутренние обсуждения не должны просто разрешаться, их следует поощрять. Конечно, решающее слово останется за нашими мудрыми руководителями, но для принятия наиболее взвешенного решения они должны иметь доступ к самым разным мнениям и точкам зрения."
 UKR_cautious_reconciliation: "Осторожное примирение"
 UKR_cautious_reconciliation_desc: "Времена меняются. Там, где требовалась бескомпромиссная жесткость, теперь нам лучше послужит гибкость. После преодоления серьезных угроз внутреннюю политическую сцену можно сделать более открытой, поскольку общество не может должным образом развиваться под постоянным давлением. Возможно, голоса тех, кто искренне заботится об интересах Украины, должны быть услышаны, даже если они формально не заявляют о своей верности нам. Разве мы все не украинцы, в конце концов?"
 UKR_organised_nationalism: "Организованный национализм"
 UKR_organised_nationalism_desc: "Строгая дисциплина, полное единство мысли и действия и четкая иерархия принесли нам многочисленные победы над врагами внутренними и внешними. Мы превратили государство в хорошо организованную армию, где каждый понимает свою роль в общей схеме, где каждый приказ беспрекословно исполняется. Войну за выживание можно выиграть — война за национальное величие только начинается."
 UKR_cult_of_providnyk: "Культ Провидника"
 UKR_cult_of_providnyk_desc: "Слава Украине! Слава Провиднику! Каждое его слово - приказ, не оставляющий места неповиновению. Каждое его действие - вдохновляющий поступок. Его авторитет - абсолютный, его мудрость - непревзойденная. Пресловутый сверхчеловек, наш славный Лидер стоит высоко и могущественно, готовый принять любой вызов, который судьба может осмелиться послать ему."
 UKR_eternal_element: "Дух Одвичной Стихии"
 UKR_eternal_element_desc: "Здесь, на границе двух миров Востока и Запада, судьбой и промыслом возложена на нас священная миссия: созидать, терпеть, бороться во имя Единой и Суверенной Украины. Мы вняли этому призыву и зажгли пламя Национальной Революции, которое будет гореть вечно, ибо наша борьба не знает конца. Мы всегда идем вперед, без паузы, без колебаний, огонь в наших душах ярче с каждым шагом."
 UKR_cross_of_sword: "Крест меча"
 UKR_cross_of_sword_desc: "\"Могучий Бог княгини Ольги и Владимира Великого требует от тебя ни слез, ни милости, ни пассивного размышления, но мужества и жизни, полной дел.\" Это послание, которое наша возлюбленная Церковь должна распространять среди верующих. Единственный крест, достойный почитания, — это крест меча, ибо именно сила и мужество, а не кротость, принесут спасение Украине."
 UKR_labour_front: "Трудовой фронт"
 UKR_labour_front_desc: "Поскольку боевые действия удаляются от наших земель, пришло время направить нашу национальную энергию на дело восстановления. Вас ждут новые поля сражений — фабричный цех и строительная площадка. Будет создан специальный орган, которому будет поручено управление восстановительными работами, и регулярные отчеты будут представляться непосредственно государственному секретарю [GetSecondInCommand]."
 UKR_sisterhood_of_princess_olha: "Сестричество княгини Ольги"
 UKR_sisterhood_of_princess_olha_desc: "Тотальная национальная мобилизация во время войны открыла для женщин многие должности и роли, традиционно отведенные мужчинам. Часы нельзя повернуть вспять, поэтому, чтобы обеспечить полный контроль над развитием общества, мы создадим всеобъемлющую женскую организацию под руководством ЛУН. Таким образом, мы сможем продвигать среди нашего женского населения ценности и модели поведения, полезные для национального дела."
 UKR_unity_of_action: "Единство действий"
 UKR_unity_of_action_desc: "Наше правление укреплено и обеспечено, непосредственные угрозы Украине отражены и сдержаны. Время смотреть в будущее. Какие бы испытания он ни принес, мы встретим их сплоченными и подготовленными. Заложив должным образом основы национального процветания, Лига готова защищать все наши многочисленные достижения."
 UKR_liberated_territory: "Психологически подготовить освобожденные территории"
 UKR_liberated_territory_desc: "Мы снова воссоединяемся с нашими потерянными родственниками, разлученными с нами происками империалистических держав. Полная интеграция недавно освобожденных территорий займет много времени, ибо наши враги не жалели сил, пытаясь разрушить глубокие родовые связи, связывающие эти земли с современной Украиной."

### Characters ###

 ### Country Leaders
 UKR_vlas_chubar: "Влас Чубарь"
 UKR_vlas_chubar_leader_desc: "§YРодился:§! §L22 февраля, 1891, Федоровка, Екатеринославская Губерния, Российская Империя§!"

 UKR_oleksandr_shumskyi: "Александр Шумский"
 UKR_oleksandr_shumskyi_leader_desc: "§YРодился:§! §L2 декабря, 1890, Борова Рудня, Волынь, Российская Империя§!\n§YБиография:§! §LДесятилетия забастовок и антиправительственных выступлений - все это можно отнести к одному человеку: Александру Яковичу Шумскому. Пламенный революционер, которого многие считают лицом украинского синдикализма, происходил из скромной семьи. В юности он едва сводил концы с концами, и неудивительно, что он быстро проникся социалистическими идеалами. Его рассказы о бедности детства нашли отклик среди бедных и угнетенных народов Украины, и в глазах толпы сторонников, которые сейчас стоят на его стороне, Шумский зарекомендовал себя как несгибаемый революционер.\n\nВ возрасте восемнадцати лет Шумский начал свою карьеру, вступив в Украинский социал-демократический союз, где он помогал организовывать крестьянские забастовки. Его революционная жилка продолжилась в 1915 году, когда он присоединился к УПСР. После Февральской революции он был выдвинут на пост в новом республиканском правительстве, но быстро разочаровался в курсе, выбранном страной. Это привело его к тому, что он вместе со своими товарищами откололся от УПСР и сформировал группу \"Боротьбистов\", которые были загнаны в подполье после гетманского переворота. Затем его организация превратилась в партизанскую силу, которая в течение следующих двух десятилетий вызывала волнения среди населения Украины.\n\nДействительно, его преданность делу социализма привела его далеко вперед. Сотни забастовок, демонстраций и террористических актов привели его к власти. Революционер \"батрак\", к добру это или к худу, теперь точно определяет, куда должна двигаться Украина. Шумский построит революционное государство, о котором он всегда мечтал, или умрет, пытаясь это сделать.§!"

 UKR_volodymyr_vynnychenko: "Владимир Винниченко"
 UKR_volodymyr_vynnychenko_leader_desc: "§YРодился:§! §L28 июля, 1880, Елизаветград, Херсонская Губерния, Российская Империя§!\n§YБиография:§! §LВладимир Кириллович Винниченко, первый премьер-министр Украинской Народной Республики, вновь возвращается, чтобы руководить страной. Талантливый писатель изначально интересовался изучением права, но был исключен из Киевского университета за революционную деятельность. Он был арестован за провоцирование политической агитации среди киевских крестьян, после чего был призван в дисциплинарный батальон российской армии, где распространял революционную пропаганду среди своих сослуживцев. После того, как ему пригрозили пожизненным заключением, Винниченко провел почти десять лет в изгнании, живя под чужим именем.\n\nПосле Февральской революции в России Винниченко стал первым президентом Генерального секретариата Украины. Он надеялся использовать свое положение для создания независимой социалистической Украины, но его надежды в конечном счете были развеяны государственным переворотом Скоропадского. Вновь оказавшись в изгнании, он разочаровался в реформаторском курсе УСДРП, что привело его к созданию Советско-революционного блока. Тем не менее, его новая партия примирилась с социал-демократами и присоединилась к Украинскому социалистическому блоку в 1933 году.\n\nТеперь, после десятилетий революционной борьбы, Винниченко вновь возглавляет Украину. Несмотря на десятилетия подавления со стороны реакционных режимов, его дело доказало свою победу. Идея независимой социалистической нации, свободной от нужды и угнетения, которую когда-то изображали только в романах и повестях, наконец-то станет реальностью.§!"

 UKR_nykyfir_hryhoriiv: "Никифор Григорьев"
 UKR_nykyfir_hryhoriiv_leader_desc: "§YРодился:§! §L9 февраля, 1883, in Burty, Киевская Губерния, Российская Империя§!\n§YБиография:§! §LНикифор Яковлевич Григорьев родился в сельской местности Украины в крестьянской семье. Из-за того, что его отец был учителем, его семья часто переезжала с места на место. Агроном по профессии, Григорьев так и не смог закончить свою карьеру из-за нежелания участвовать в том, что он считал \"эксплуатацией крестьян\". Вместо этого он переехал в Киев, где придерживался социалистических взглядов и стал агитатором нескольких революционных партий.\n\nСын учителя, он унаследовал профессию своего отца и работал профессором и педагогом в нескольких школах. Названный \"ненадежным учителем\" из-за своего участия в местном профсоюзе учителей, он был переведен в школу в Каменце-Подольском, где присоединился к местной организации "Просвита" и со временем стал ее лидером. В 1915 году его мобилизовали в русскую армию, хотя большую часть своего времени он проводил, занимаясь военной литературой.\n\nИзбранный в Центральную раду в 1917 году в качестве представителя УПСР, он в дальнейшем занимал несколько должностей в республиканском правительстве, сначала в качестве председателя Совета солдатских депутатов, а затем в качестве министра образования. После раскола в своей партии он возглавил Организационный комитет УПСР, целью которого было продолжение реализации первоначальной программы партии. Сосланный в Галицию вместе со своими товарищами, он проводил много времени за написанием статей для нескольких социалистических изданий, включая официальный орган УПСР \"Трудовая Украина\".\n\nВсю свою жизнь Григорьев ждал того дня, когда его утопическое видение осуществится. Государственный переворот 1919 года едва не положил конец его мечте, но, тем не менее, его дело выстояло и преодолело все трудности. С Григориевым у руля блестящее социалистическое будущее находится в пределах досягаемости, и Украина готова принять его с распростертыми объятиями.§!"

 UKR_isaak_mazepa: "Исаак Мазепа"
 UKR_isaak_mazepa_leader_desc: "§YРодился:§! §L16 августа, 1884, Костоборов, Черниговская Губерния, Российская Империя§!\n§YБиография:§! §LОдин из самых выдающихся революционеров Украины и глава Украинской социал-демократической рабочей партии Исаак Прохорович Мазепа вернулся, чтобы вновь играть важную роль в Украинской Народной Республике.\n\nОкончив учебу и включившись в украинское студенческое движение, он в 1905 году вступил в партию. Позже, когда была провозглашена Украинская народная Республика, он занимал различные посты, став одним из руководителей провинциального правительства Екатеринослава, и в том же году он и Панас Феденко начали издавать газету УСДРП \"Наш голос\" в Екатеринославе. Государственный переворот Скоропадского привел Народную Республику в замешательство, и Мазепа совместно с Украинским революционным комитетом выступил против государственного переворота. В начале января 1919 года он получил приглашение на 6-й съезд УСДРП, на котором екатеринославская делегация, в отличие от киевской, выступила против установления власти Советов и решительно выступила против "диктатуры городского пролетариата над деревней".В итоге съезд одобрил проект резолюции, предложенный Исааком Мазепой, Панасом Феденко и Николаем Поршем. Мазепа был избран в Центральный комитет УСДРП и стал его секретарем.\n\nАктивно участвуя в политических делах республиканских изгнанников в Галиции, Мазепа вернулся на родину после победы республиканских сил над гетманщиной. Вновь оказавшись на высшем государственном посту, Мазепа в изгнании, как однажды написал Панас Феденко, переживал трудные времена, но с возвращением народной республики к власти Мазепа стремится возродить Украину, которую он когда-то знал, - свободную, социалистическую и демократическую.§!"

 UKR_symon_petliura: "Симон Петлюра"
 UKR_symon_petliura_leader_desc: "§YРодился:§! §L22 мая 1879, Полтава, Полтавская Губерния, Российская Империя§!\n§YБиография:§! §LПлодовитый писатель и заметный деятель украинского национального движения, Симон Васильевич Петлюра посвятил свою жизнь своей стране. Выходец из семьи, имевшей тесные связи с православным монашеством, он сначала учился на священника в семинарии в своем родном городе, но был исключен после того, как выяснилось, что он был членом Общины. Это событие только укрепило его веру в украинское революционное движение. Его деятельность навлекла на себя гнев царских властей, и в 1903 году он был арестован. После освобождения в 1904 году он вернулся в Киев, где писал для нескольких газет, в том числе для газеты УСДРП \"Слово\".\n\nКо времени революции 1917 года Петлюра был объявлен генеральным секретарем Украины по военным вопросам. Тем не менее, его пребывание в правительстве продлилось недолго, поскольку путч Скоропадского отправил его в изгнание, а его любимую республику - в руины. Его подпольная революционная деятельность продолжилась в Галиции, на этот раз направленная против правительства гетмана и его немецких покровителей. Вместе со своими союзниками по Социалистическому блоку он провел в засаде почти два десятилетия, выжидая подходящего момента для нанесения удара.\n\nПо мере того, как страну охватывает очередная революция, кажется, что десятилетия борьбы за по-настоящему свободную Украину не прошли даром. После свержения гетманщины Петлюра может, наконец, направить Украину по тому пути, по которому она должна была идти, - к Свободе, Равенству и Независимости.§!"
 UKR_symon_petliura_postwar_leader_desc: "§YРодился:§! §L22 мая 1879, Полтава, Полтавская Губерния, Российская Империя§!\n§YБиография:§! §LПрошло много лет с тех пор, как Петлюра недолго возглавлял временную администрацию, созданную после успешного восстания. Некоторые утверждают, что он нерешительно передал бразды правления и что его взгляд всегда был прикован к высшим постам в национальной политике. Какой бы ни была правда, Симон Васильевич вновь занимает один из высших государственных постов – на этот раз не из-за поспешного компромисса, вызванного неразберихой во время восстания, а как законный лидер, признанный как народом, так и политическим истеблишментом.\n\nЕго сегодняшняя риторика сосредоточена на национальном единстве и решимости построить свободную, процветающую Украину – той самой решимости, которая помогла спасти ее в годы войны. Многие украинцы, все еще уставшие от ужасов военного времени, с радостью приветствуют одного из героев восстания и войны в качестве нового лидера, в то время как скептики и критики озабочены одним вопросом: смягчили ли годы боевых действий решительность и внушительность Петлюры или только усилили ее?§!"

 UKR_wilhelm_franz_von_habsburg: "Василь Вышиванный"
 UKR_wilhelm_franz_von_habsburg_leader_desc: "§YРодился:§! §L10 февраля, 1895, Пула, Истрия, Австро-Венгрия§!\n§YПолитическая карьера:§! §LЭрцгерцог Вильгельм Франц фон Габсбург-Лотарингский с юных лет чувствовал близость к украинскому народу. Большую часть своего детства он провел в польском городе Живец, прежде чем переехал в Украину для прохождения военной службы. Там он привязался к украинской культуре и принял имя \"Василий Вышиваный\". Его семья приехала сюда, чтобы поддержать его интерес к Украине, надеясь однажды посадить его на трон поддерживаемой Австрией украинской монархии. Однако этим планам так и не суждено было осуществиться.\n\nПосле укрепления режима Павла Скоропадского Василий бежал в Галицию, где выступал против вновь созданного правительства. Затем он отправился во Львов и основал \"Австро-украинскую ассоциацию дружбы\", целью которой было продвижение украинской культуры и поощрение сотрудничества с украинцами Галиции. Тайно Василий использовал эту организацию в качестве прикрытия для поддержки дела Республики.\n\nПобеда республиканских сил над гетманским правительством воплотила в жизнь Украину, о которой Василий всегда мечтал. В предвыборный сезон благотворительность и доброта Василия по отношению к украинскому народу не остались незамеченными, поскольку в конечном итоге он был избран председателем Национального Собрания. Теперь самозваный \"Красный принц\" ведет Народную Республику в новую эпоху. Пусть он австриец по происхождению, но миллионы украинцев, которых он сейчас представляет, с гордостью называют его своим.§!"

 UKR_oleksandr_shulhyn: "Александр Шульгин"
 UKR_oleksandr_shulhyn_leader_desc: "§YРодился:§! §L30 июля, 1889, Софино, Полтавская Губерния, Российская Империя§!\n§YБиография:§! §LАлександр Якович Шульгин, родившийся в семье с казацкими корнями, начал свою политическую карьеру именно в Санкт-Петербургском университете, где он преподавал историю и философию.\n\nПо мере того как призывы к независимости Украины звучали по всей России, Шульгин все больше увлекался деятельностью некой культурной организации - Общества украинских прогрессистов. Он стал членом их Санкт-Петербургского отделения, прежде чем в конечном итоге оказался в центральном комитете Украинской демократической радикальной партии. Вернувшись в Киев после Февральской революции, Шульгин сначала был избран в Центральную раду, а затем стал министром иностранных дел в недолговечном республиканском правительстве.\n\nИ все же, несмотря на его прогрессивные взгляды, переворот Скоропадского не означал конца его карьеры. После назначения на должность посла в Болгарии Шульгин будет играть меньшую роль в правительстве гетмана, продолжая свою работу в Министерстве иностранных дел. Как член Радикально-демократической партии, он будет продолжать выступать за прогрессивную и парламентскую Украину, насколько это в его силах, не навлекая на себя гнев правительства.\n\nТеперь республика, которую он помогал создавать много лет назад, наконец-то восстановлена. Оказавшись на посту председателя, он готов пропагандировать республиканские идеалы по всей стране. Украина снова дышит свободно, и Шульгин сделает все, чтобы она больше никогда не страдала от угнетения..§!"

 UKR_volodymyr_dolenko: "Владимир Доленко"
 UKR_volodymyr_dolenko_leader_desc: "§YРодился:§! §L17 апреля, 1889, Мешебылово, Харьковская Губерния, Российская Империя§!\n§YБиография:§! §LВладимир Доленко родился в крестьянской семье и с ранних лет был знаком с реалиями жизни в сельской местности Украины. После окончания Харьковского университета Доленко начал работать юристом, часто защищая интересы крестьян в судах. В то же время он активно участвовал в общественной деятельности Украинского национального движения в Харькове, находясь под влиянием другого местного видного активиста и будущего политика – Николая Михновского.\n\nВ гетманисткой Украине Доленко быстро оказался на правом фланге более демократически настроенных политических кругов. После провала просуществовавшей недолго Украинской крестьянской партии он в конце концов присоединился к реорганизованной УРДП и вскоре стал видным членом ее зарождающейся правой фракции. Рассматривая фермеров как опору украинской нации, он настаивал на том, что без свободных и процветающих крестьян не может быть процветания Украины.\n\nТеперь, когда успешная земельная реформа создала многочисленный класс мелких и средних землевладельцев, видение Доленко, несомненно, будет реализовано. Как один из самых выдающихся национальных политиков, он готов вести Народную Республику к светлому будущему, построенному сильными руками ее трудолюбивого народа.§!"

 UKR_danylo_skoropadskyi: "Данило Скоропадский"
 UKR_danylo_skoropadskyi_desc_body: "Инженер по профессии, Даниил получил свое имя в честь Даниила Апостола, гетмана Войска Запорожского, правившего в 1727-1734 годах. В письме к Даниилу в 1925 году Павел напомнил ему,\n\n\"... твои предки были простыми казаками и получили дворянство своей семьи за службу в армии, за мужество, за энергию, за проявленное ими военное мастерство... они никогда не хотели мирной жизни без забот и без работы, они прошли тернистыми путями и достигли высокого положения в государстве и выдающейся роли в истории своего народа.\"\n\nСо смертью отца Данило оказался в тяжелом положении."
 UKR_danylo_skoropadskyi_leader_desc: "§YРодился:§! §L13 февраля, 1904, Санкт-Петербург, Российская Империя§!\n§YПолитическая карьера:§! §L$UKR_danylo_skoropadskyi_desc_body$ Несмотря на то, что у него никогда не было такого опыта правления, как у его отца, он, вместе с премьер-министром Дмитром Дорошенко, тем не менее, намеревался продолжить переговоры с Всеукраинским демократическим движением. Только время покажет, сможет ли он пройти тернистый путь и добиться успеха в установлении новой, конституционной эры для Гетманщины.§!"
 UKR_danylo_skoropadskyi_neutral_leader_desc: "§YРодился:§! §L13 февраля, 1904, Санкт-Петербург, Российская Империя§!\n§YПолитическая карьера:§! §L$UKR_danylo_skoropadskyi_desc_body$ У него никогда не было такого опыта правления, как у его отца, и он довольно неопытен в политике. Сейчас он возглавляет послевоенную эпоху, но куда приведет Украину будущее, неизвестно.§!"

 UKR_borys_martos: "Борис Мартос"
 UKR_borys_martos_advisor_desc: "§YРодился:§! §L20 мая, 1879, Градижск, Полтавская Губерния, Российская Империя§!"

 UKR_dmytro_doroshenko: "Дмитро Дорошенко"
 UKR_dmytro_doroshenko_leader_desc: "§YРодился:§! §L27 марта, 1882, Вильно,Российская Империя§!\n§YБиография:§! §LДмитрий Дорошенко родился в старинной семье казацкой старшины. Он учился в Варшаве и Санкт-Петербурге и окончил Киевский университет в 1909 году. В том же году он переехал в Екатеринослав, где работал учителем истории, а в 1913 году вернулся в Киев и стал секретарем Украинского научного общества имени Шевченко. Он был одним из основателей Украинской Центральной рады, но когда к власти пришел Павел Скоропадский, он стал министром иностранных дел гетмана. Он должен был прийти к соглашению с лидерами Белого движения, что принесло бы мир в Украину и неофициальное признание правительства гетмана российскими дипломатами.\n\nБывший член УРДП, Дорошенко пришел к власти в качестве премьер-министра в 1932 году, когда Скоропадский искал компромиссный вариант, который удовлетворил бы УРДП и консерваторов. Хотя этот шаг вызвал протест как со стороны более левых, так и со стороны правых фигур в Сойм, центристское большинство в УРДП, УДХП и УСХД предпочло бы поддержать его выдвижение. Дорошенко вступил в должность, пообещав продолжить реализацию программы земельной реформы, а также позаботиться о том, чтобы Украина оставалась сильной как внутри, так и снаружи.§!"

 UKR_pavlo_skoropadskyi: "Павел Скоропадский"
 UKR_pavlo_skoropadskyi_leader_desc: "§YРодился:§! §L15 мая, 1873, Висбаден, Гессен-Нассау,Королевство Пруссия, Германская Империя§!\n§YБиография:§! §LПавел Скоропадский - это много кто: оппортунист, казак, военный офицер и потомок украинской знати. Но самое главное, он гетман, бесспорный лидер Украины.\n\nВедя свою родословную от гетмана Войска Запорожского 18-го века, Скоропадский в мгновение ока поднялся по служебной лестнице в царской армии. Во время Украинской революции Павел Скоропадский стал главным организатором Украинского армейского корпуса и многочисленных казачьих добровольческих формирований, которые стремились бороться с пробольшевистскими ополченцами. Ярый противник социализма, Скоропадский вместе со своими союзниками из числа землевладельцев, капиталистов и военных начал готовить заговор против Украинской Народной Республики, который завершился ее свержением 29 апреля 1918 года. Было создано так называемое \"Украинское государство\", Центральная рада была упразднена, и Скоропадский захватил всю полноту власти как гетман, отменив многие реформы предыдущего правительства. Тем не менее, Скоропадский пообещал провести выборы в Сойм, как только \"политическая и финансовая ситуация снова стабилизируется\".\n\nВ следующем году Скоропадский использовал свои временные полномочия с большим успехом, поскольку он и генерал Константин Присовский, командовавшие войсками, насыщенными немецкой военной техникой, железным кулаком подавили анархистское восстание Нестора Махно. С победой Германии в Великой Отечественной войне и окончанием гражданской войны в России на Украине наступил мирный период. В 1920 году Совет министров принял новую конституцию, которая наделяла сойм и Сенат значительными судебными и законодательными полномочиями, но сохраняла некоторые полномочия гетмана из старой конституции, включая право назначать атамана-министра и распускать сойм по своему усмотрению. Вскоре после выборов 1924 года Скоропадский сформировал широкую коалицию правых партий и групп интересов, лояльных гетману, положив начало правящему кругу, который будет править Украиной в течение пятнадцати лет, несмотря на значительные изменения, произошедшие с течением времени. Скоропадский определял политический ландшафт Украины с момента ее рождения как нации. Независимо от того, является ли он тираном и немецкой марионеткой, как его порицают, или великим символом единства Украины и авангардом борьбы с социализмом, как его восхваляют, никто не может отрицать, что он оставил свой след в истории страны.§!"

 UKR_dmytro_dontsov: "Дмитро Донцов"
 UKR_dmytro_dontsov_advisor_desc: "§YРодился:§! §L29 августа, 1883, Мелитополь, Таврическая Губерния, Российская Империя§!"

 UKR_mykola_stsiborskyi: "Николай Сциборский"
 UKR_mykola_stsiborskyi_leader_desc: "§YРодился:§! §L28 марта, 1898, Житомир, Волынская Губерния, Российская Империя§!\n§YБиография:§! §LСогласно утверждениям Андрея Мельника, Николай Сциборский \"...жил действием и своей собственной работой; его отличал революционный темперамент.\". Поэтому неудивительно, что он пришел к власти как правая рука Евгения Коновальца, став ключевой фигурой в свержении правительства Скоропадского.\n\nОкончив Житомирский государственный университет и вступив в армию в 1915 году, Сциборский три года спустя первоначально был сторонником гетманского переворота, но быстро впал в немилость из-за землевладельческой политики Скоропадского. Один из основателей Лиги украинских националистов, Сциборский почти во всех своих работах резко критиковал демократию, отдавая предпочтение тому, что он называл \"Нациократией\", отрицая классовый конфликт и \"право определенных социальных групп монополизировать государство и эксплуатировать общество\". Он презирал партийную политику, полагая, что они стали разрушительными инструментами для групп с эгоистичными интересами, и выступали за централизованную, вертикально организованную государственную власть.\n\nКогда усилия Скоропадского по проведению земельной реформы провалились, Сциборский почувствовал слабость и вместе с армейскими офицерами, которые поддерживали смену гетманского правительства, провел успешный государственный переворот. Ставший одним из самых влиятельных людей в стране, Сциборский стремится стойко защищать новую, национал-демократическую Украину от любых внутренних и внешних угроз.§!"

 UKR_yevhen_konovalets: "Евгений Коновалец"
 UKR_yevhen_konovalets_desc_body: "Евгений Михайлович Коновалец вырос в религиозной семье и с раннего возраста был вовлечен в патриотические студенческие движения Украины. Эта активная деятельность была прервана Великой войной, в которой он участвовал в составе австрийской армии. Его подразделение понесло ужасные потери, и Коновалец оказался в плену в Царицыне. Там он и его товарищи, такие как Андрей Мельник, начали интенсивную пропагандистскую работу среди украинских военнопленных, которые были освобождены после Февральской революции. Под именем Е. Блаватского он отправился в Украину.\n\nКоновалец и другие бывшие военнопленные сформировали Галицко-Буковинский полк сечевых стрельцов - группу, которая позже стала известна как \"Сечевики\"."Он приобрел репутацию чрезвычайно целеустремленного и почти фанатично преданного украинскому народу человека. Его полк сыграл ведущую роль в борьбе против большевиков, и в марте 1918 года его кампания завершилась взятием Киева у большевиков.\n\nСечевики были разоружены режимом гетмана Скоропадского в рамках более широкой демобилизации республиканской армии. В то время как верные Петлюре бежали в Галицию, Коновалец был одним из тех, кто присягнул на верность режиму Скоропадского. Вскоре ему разрешили заново сформировать свой полк. Братство сечевиков, в состав которого входили офицеры Андрей Мельник, Роман Дашкевич и Роман Сушко, сохранилось, и они сформировали сплоченную группу националистов в вооруженных силах Украины."
 UKR_yevhen_konovalets_army_chief_desc: "§YРодился:§! §L14 июня, 1891, Зашков, Королевство Галиция и Лодомерия, Австро-Венгрия§!\n§YБиография:§! §L$UKR_yevhen_konovalets_desc_body$§!\n\n§YПримечания: Коновалец служил в Украинской народной армии и, возможно, симпатизирует республиканцам.§!"
 UKR_yevhen_konovalets_leader_desc: "§YРодился:§! §L14 июня, 1891, Зашков, Королевство Галиция и Лодомерия, Австро-Венгрия§!\n§YБиография:§! §L$UKR_yevhen_konovalets_desc_body$§!"

 ###Generals
 UKR_mykhailo_omelianovych_pavlenko: "Михаил Емельянович-Павленко"
 UKR_mykhailo_omelianovych_pavlenko_army_chief_desc: "§YBorn:§! §LDecember 8th, 1878, in Tiflis, Tiflis Governorate, Russian Empire§!\n§YBackground:§! §LMykhailo Omelianovych-Pavlenko's father was a general with Transdanubian Cossack ancestry, and his mother was from a Georgian princely family. This background made him nobility in the Russian Empire, and led him naturally to a military career. He saw combat as a lieutenant in the Russo-Japanese War, and eventually rose as the commander of the Life Guards Company of the Volyn Regiment, part of the prestigious Tsar's Life Guard. During this time he changed his name to honour his Cossack grandfather, Omelian.\n\nHe was wounded multiple times during the Great War, most famously when he led a bayonet attack in the Łódź-Toruń front in late 1914. This awarded him the St. George's Cross and so serious wounds that he would spend the next two years in the hospital. Because of his injuries, he was transferred as a teacher into the Odesa Ensign School, where he became the head of the Ukrainian cadets. It was when he decided to embrace the Ukrainian identity of his grandfather, and he decided to serve in Ukraine rather than in Russia. He organised the Free Cossacks to keep order after the total collapse of the Russian army, and aligned himself with Hetman Skoropadskyi's regime.\n\nOnce the situation in Ukraine stabilised, Omelianovych-Pavlenko was one of the organisers of the Ukrainian Volunteer Corps, which gave crucial support to the Don Army after their catastrophic retreat after the Third Battle of Tsaritsyn. After the Bolsheviks were defeated, Omelianovych-Pavlenko has served in leading positions of the army and wrote numerous manuals based on his war experiences. He is relatively uncontroversial and a generally liked figure in the army, who has stayed away from factionalism and politics.§!"

 UKR_mykola_kapustianskyi: "Николай Капустянский"
 UKR_mykola_kapustianskyi_sic_desc: "§YBorn:§! §LFebruary 1st, 1881, in Chumaky, Yekaterinoslav Governorate, Russian Empire§!\n§YBackground:§! §LMykola Kapustianskyi, a son of a priest, grew up in a deeply religious and patriotic family in rural Ukraine. After his theological seminary he joined the cadet school, initially serving as a field pastor. He volunteered to fight in the Russo-Japanese War, and was decorated for his courage.\n\nKapustianskyi had been promoted to colonel during the Great War, and in 1917 he oversaw the transition of the 104th Rifle Division of the Russian army into the 1st Ukrainian Rifle Division, the first Ukrainian military unit. The division's soldiers' council elected charismatic speaker Kapustianskyi as their commander, and later on Kapustianskyi was appointed by Symon Petliura as Chief of Staff for the new Ukrainian republic. However, the Bolsheviks overran forces loyal to Petliura in the region, and Kapustianskyi only barely escaped them. Kapustianskyi managed to make his way through Bolshevik-occupied Kyiv, and offered his services to Hetman Skoropadskyi, whose forces he met in Zhytomyr.\n\nKapustianskyi has since been staff officer in Ukrainian high command and kept contacts with Yevhen Konovalets and the other ex-republicans. He is known as a cultured, even elitist and academic figure, having written both military texts and nationalist articles.§!"

 UKR_omelian_volokh: "Емельян Волох"
 UKR_omelian_volokh_army_chief_desc: "§YBorn:§! §LJuly 19th, 1886, in Kalnibolotskaya, Kuban Oblast, Russian Empire§!\n§YBackground:§! §LOmelian Volokh hails from a poor peasant family in Kuban. He worked as a cattle herder and in a coal mine from a very early age, but managed to spend some time at school. He managed to get a scholarship to Kharkiv's art school with the support of a local priest. Unfortunately, his aspirations in painting were interrupted by the Great War and Volokh was mobilised.\n\nVolokh was wounded multiple times and was promoted through the ranks from infantry ensign to staff captain in 1916. The next year, he joined the Ukrainian Socialist-Revolutionary Party and was elected by his division into the Congress of the Soviets in Petrograd, where he focused on opposing the war no matter what.\n\nBy late 1917, Volokh was a company commander in Kharkiv. He fled from the Bolsheviks and joined the \"Red Haidamaky\" aligned with Petliura's army, and clashed with the Bolsheviks multiple times. However, he refused to pledge fealty to Pavlo Skoropadskyi's regime, and resigned from the army.\n\nHis part in the Borotbyst uprising of 1925 is unclear, but it forced him to flee Ukraine in fear of imprisonment. In exile, Volokh turned from an apathetic socialist to a convinced revolutionary, and continued his officer's studies in International Military School in Paris in 1927-1930. Since then, Volokh has been one of the primary military organisers of the republican cause.§!"

 UKR_kostiantyn_prisovskyi: "Константин Присовский"
 UKR_kostiantyn_prisovskyi_army_chief_desc: "§YBorn:§! §LSeptember 22nd, 1879, in Kyiv, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LThe Prisovskyi family was part of Kyiv's upper class, and the military was a natural career for Kostiantyn (Ukrainisation of his name which he only started using later in life). He did not see fighting in the Russo-Japanese War, but led his 278th Kromsky Infantry Regiment in the Great War. He fought on the Galician frontlines and received the highest military honour of Order of St. George for bravery and skilled leadership. His regiment was almost wiped out when the Germans broke through at Gorlitskyi in 1916. Prisovskyi was wounded there, transferred to Kyiv, and later promoted to major general.\n\nAs Ukraine collapsed into civil war, Prisovskyi tried to rein in the chaos unsuccessfully. His unit was defeated in Kyiv with chemical weapons used by the Bolsheviks, and had to retreat and ally with Symon Petliura's republican forces. Prisovskyi made solid impressions on anyone he met - a tall, firm and calm man, intelligent and aristocratic yet could make mutinying Cossacks obey him with sheer force of will. He was also entirely ruthless, and took back Zhytomyr from the Bolsheviks after a series of bloody battles. He took back Kyiv on March 1st and was greeted as the liberator, though Petliura quickly moved Prisovskyi into less important positions, fearing his popularity.\n\nAfter Hetman Skoropadskyi's rise to power, Prisovskyi became his palace commandant and trusted second-hand man. He led the Eastern Campaign against Nestor Makhno's revolutionary army, and in a series of blows reduced the rebellion into a ragtag group of guerrillas. Makhno himself managed to escape. After this campaign, Prisovskyi joined Omelianovych-Pavlenko's Ukrainian Volunteer Corps in Russia and fought alongside the Don Army against Dzugasvhili's front until the end of the war.\n\nAfter 1920, Prisovskyi has served in various positions, including regional Otaman of Kyiv military district and minister of defence. The Hetman's opponents call General Prisovskyi \"Pavlo's Policeman\" for his role and efficiency in fighting against anti-Hetman insurgencies, and his relatively late embracing of Ukrainian identity did not help in making aristocratic Prisovskyi likeable by the people. However, in the military he is respected, even feared.§!"

 UKR_vsevolod_petriv: "Всеволод Петров"
 UKR_vsevolod_petriv_commander_desc: "§YBorn:§! §LJanuary 12th, 1883, in Kyiv, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LBoth general and chronicler, Petriv's education was directed towards military service from a young age starting at the Kyiv Cadet Corps. It is said that his family name comes from Peter the Great, whose troops captured Vsevolod's great-grandfather during the Great Northern War, and subsequently allowed him to settle in Saint Petersburg. His mother has Ukrainian-Norwegian roots.\n\nPetriv started the Great War as company commander in 165th Lutsk Infantry Regiment, and climbed the ranks to divisional commander by 1917. He joined a group of independence-minded Ukrainian officers in 1918 and served under the Ukrainian People's Republic in their struggle against the Bolsheviks. Initially he refused to swear an oath to Hetman Skoropadskyi, but eventually accepted the new realities and offered his services to Hetman's army. Despite his country's victorious peace, Petriv shows no signs of losing enthusiasm for military matters and penned nine books detailing the military history of the country.§!"

 UKR_marko_bezruchko: "Марк Безручко"
 UKR_marko_bezruchko_commander_desc: "§YBorn:§! §LOctober 31st, 1883, in Tokmak, Taurida Governorate, Russian Empire§!\n§YBackground:§! §LMarko Bezruchko started his military career in Odesa Infantry Cadet School and served in various positions in the Russian army. He joined Ukrainian People's Republic's forces after the February Revolution and later joined Skoropadskyi's forces, serving in staff officer duties in both. After the Great War, he studied fortification engineering in Theresian Military Academy in Austria. He acted as Ukrainian observer in Poland in the 1920s as the kingdom was reorganised and modernised into the German model, and has been proponent of similar technical-organisational modernisation of the Ukrainian army ever since. He has been since preoccupied with the organisation of fortifications in Eastern Ukraine as one of the main advisors in the Ostwall Programme.§!"

 UKR_oleksandr_udovychenko: "Александр Удовиченко"
 UKR_oleksandr_udovychenko_commander_desc: "§YBorn:§! §LFebruary 20th, 1887, in Kharkiv, Kharkov Governorate, Russian Empire§!\n§YBackground:§! §LOleksandr Udovychenko was born into a Russo-Ukrainian peasant family, originally from Orel, that had settled in Kharkiv. Orphaned at a young age, he eventually followed his brother into the Military Topographic College, graduating in 1908. During the Great War, he was first attached to the 129th Bessarabia Regiment before taking an accelerated course at Nikolai Military Academy in Petrograd. Udovychenko then served as senior adjutant for the 21st Infantry Division and the 3rd Causcasian Corps, and was decorated with the Order of St. George.\n\nIn the wake of the February Revolution, Udovychenko became a leading figure of the Ukrainian National Movement within the Russian Army, participating in First and Second All-Ukrainian Military Congresses. He became a close confidante of Symon Petliura and was made chief of staff of the 3rd Haidamatskyi Infantry Regiment, with which he fought against the Bolshevik uprising in Kyiv. After the Hetman's coup, Udovychenko was appointed assistant head of military intelligence. However, his antipathy to the Hetmanate saw him resign his post and leave the country to join Petliura in exile. In the intervening years, Udovychenko appeared busy writing a history of the People's Republic's Army; however, his true work was organising an underground fighting force of republican exiles. Now that Petliura has returned, Udovychenko is ready to lead an army reborn.§!"

 UKR_oleksandr_zahrodskyi: "Александр Забродский"
 UKR_oleksandr_zahrodskyi_high_command_desc: "§YBorn:§! §LApril 10th, 1889, in Zelenkiv, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LZahrodskyi was born in a large family of a countryside priest. He also went to study in theological seminary, and thanks to his studies he was allowed to start non-commissioned officer's training in the army. Zahrodskyi was wounded five times during fighting in Galicia, and received St. George's Arms for bravery during the Brusilov Offensive.\n\nHe Ukrainised his regiment after the February Revolution and became commander of 1st Kyiv Guard Regiment under the Central Rada. His forces under General Prisovskyi fought to the last in Kyiv against the Bolshevik offensive, but were forced to retreat after losing most of their men. Zahrodskyi joined Hetmanist army soon after, and took part in reconquest of Poltava region. His wounds left him with a painful limp, but it didn't persuade him to leave the military after the tumultuous times. He joined the Ukrainian Volunteer Corps and fought in Russia against the Bolsheviks alongside the Don Army.§!"

 UKR_ivan_poltavets_ostrianytsia: "Иван Полтавец-Остряница"
 UKR_ivan_poltavets_ostrianytsia_high_command_desc: "§YBorn:§! §LSeptember 26th, 1890, in Subotiv, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LLosing his father at an early age, Ivan Poltavets-Ostrianytsia was raised by his mother, a village teacher. After graduating from Yelysavethrad Military School, he served as an officer in an infantry regiment in the Kuban. In 1917, he was elected Chieftain of the Free Cossacks, and became an early supporter of Hetman Skoropadskyi. Currently heading the Great Cossack Rada, Poltavets-Ostrianytsia has always been more of a political visionary - or a bandit leader, depending on who you ask - rather than a military man, but his good relations with Skoropadskyi have ensured him influence in the military. Along with Borys Homzyn, he was the co-founder of the Union of Hetmanites - State Builders in 1925.§!"
 UKR_ivan_poltavets_ostrianytsia_sic_desc: "§YBorn:§! §LSeptember 26th, 1890, in Subotiv, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LLosing his father at an early age, Ivan Poltavets-Ostrianytsia was raised by his mother, a village teacher. After graduating from Yelysavethrad Military School, he served as an officer in an infantry regiment in the Kuban. In 1917, he was elected Chieftain of the Free Cossacks. Along with Borys Homzyn, he was the co-founder of the Union of Hetmanites - State Builders in 1925.\n\nAs head of the Great Cossack Rada, he was expecting to become Otaman-Minister in the wake of Dmytro Doroshenko's resignation, only to be outmanoeuvred by Homzyn. This only emboldened him, however, and gradually his support base, along with the power of the Cossack Radas, significantly grew. After Ukraine's victory in the Second Weltkrieg, a return to partial parliamentarisation was attempted - only to be shut down by Poltavets-Ostrianytsia and those loyal to him, and the demand to replace Borys Homzyn with Poltavets-Ostrianytsia as Otaman-Minister was begrudgingly accepted by the Hetman.\n\nThe Union of Hetmanites - State Builders is now staffed with men loyal to Poltavets-Ostrianytsia - and though Skoropadskyi may remain Hetman, it is clear that the man in control is Ivan Poltavets-Ostrianytsia.§!"

 UKR_andrii_melnyk: "Андрей Мельник"
 UKR_andrii_melnyk_sic_desc: "§YBorn:§! §LDecember 12th, 1890, in Volia Yakubova, Kingdom of Galicia and Lodomeria, Austria-Hungary§!\n§YBackground:§! §LAndrii Melnyk's father was a nationalist activist in Galicia, and inspired his son to follow in the same footsteps. Melnyk joined the Legion of Ukrainian Sich Riflemen in Lviv and fought on the Carpathian front. The young, bold lieutenant often led assaults personally - but he was eventually captured by the Russians and sent to the Tsaritsyn prisoner camp. There he met Yevhen Konovalets, and the pair would become close friends. They escaped captivity and made their way to Kyiv, where they joined the Halytskyi-Bukovyn Regiment of the Sich Riflemen - the Sichovyky.\n\nMelnyk's unit fought under Symon Petliura against the Bolsheviks until German-Hetmanist intervention put Skoropadskyi in power. Konovalets, Melnyk and other Sichovyky pledged loyalty to the new regime, and continued serving in the armed forces of the Ukrainian State. Melnyk has kept contacts with other veterans of the Konovalets clique, and their group wields considerable influence within the Ukrainian armed forces as the nationalist young guard, compared to older generals from the Russian army.§!"

 UKR_yurii_tiutiunnyk: "Юрий Тютюнник"
 UKR_yurii_tiutiunnyk_commander_desc: "§YBorn:§! §LApril 20th, 1891, in Budyshche, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LYurii \"Yurko\" Tiutiunnyk comes from a poor peasant family. Half of his siblings died as children, while the rest dedicated themselves to radical politics, joining the party of Socialist-Revolutionaries. His entire family was arrested in 1902 for distributing leaflets to the peasants, which was his first run-in with the authorities. Tiutiunnyk graduated from agricultural school and was then conscripted into the Russian army in 1913. He was seriously wounded near Łódź and spent his time in the hospital reading military theory, which inspired the young man to become an officer.\n\nTiutiunnyk was a lieutenant at the time of the February Revolution, and he became the deputy chairman of his unit, Ukrainianised into the 1st Simferopol Regiment \"Hetman Doroshenko\". Tiutiunnyk was elected to represent his unit in the Second All-Ukrainian Military Congress and was later elected to the Central Rada, always supporting the most radical faction there. He stood loyal to Petliura in 1918 as the Bolsheviks captured Kyiv, and his Zvenihorod Cossacks waged a stubborn guerrilla war in the Kherson region against Hetmanite forces. Ultimately his forces were destroyed, and what was left of them went underground.\n\nBy 1925, Tiutiunnyk had become one of the leading Borotbyst military organisers, and was one of the planners of the 1925 insurgency operations. Ever since, he has been on the run - in exile in Lviv, in France, in rural Ukraine, tirelessly agitating for revolution and change. Finally in 1936 his work has borne fruit, as Tiutiunnyk had once again taken up arms as one of the leading figures of the People's Army.§!"

 UKR_leonid_stupnytskyi: "Леонид Ступницкий"
 UKR_leonid_stupnytskyi_commander_desc: "§YBorn:§! §LMay 29th, 1891, in Romanivka, Volhynia Governorate, Russian Empire§!\n§YBackground:§! §LLeonid Stupnytskyi comes from a peasant family in the Zhytomyr region. His father was connected to a number of Ukrainian cultural figures and was greatly inspired by the Narodnyk ideas, which also affected Leonid's worldview. He was mobilised into the cavalry and after successful service was sent to ensign school. He graduated as a cavalry captain in 1916, and subsequently joined first the republican and later the Hetmanite military.§!"

 UKR_roman_dashkevych: "Роман Дашкевич"
 UKR_roman_dashkevych_commander_desc: "§YBorn:§! §LDecember 6th, 1892, in Tustanovychi, Kingdom of Galicia and Lodomeria, Austria-Hungary§!\n§YBackground:§! §LRoman Dashkevych grew up in a priest's family near Lviv, and was able to study law in Lviv University. He made contacts with other young Ukrainian nationalists there, such as Yevhen Konovalets and Andrii Melnyk. This group would later become the Legion of Ukrainian Sich Riflemen, serving under the Austrian flag. He studied the science of artillery, but this was cut short by the war and later capture by the Russians, who sent him to Siberia. During his imprisonment, Dashkevych published a newspaper calling for Austrian Ukrainians to revolt, and after the February Revolution he escaped his camp and made his way to Kyiv.\n\nIn Ukraine he joined Konovalets' Sichovyky and quickly became its gunnery specialist and founder of Ukrainian artillery. His relatively wealthy family donated much funds to the early development of the Sich Regiment. Dashkevych took part in fighting around Kyiv until he was demobilised and integrated into Hetmanite forces. His career in independent Ukraine has made him the foremost expert of artillery in Ukraine, and he has tirelessly lobbied for more funds for his branch as Inspector of Artillery. Dashkevych continues to have contacts with Konovalets and the League of Ukrainian Nationalists.§!"

 UKR_vasyl_fylonovych: "Василий Филонович"
 UKR_vasyl_fylonovych_commander_desc: "§YBorn:§! §LJanuary 15th, 1894, in Rohizne, Kharkov Governorate, Russian Empire§!\n§YBackground:§! §LVasyl Fylonovych comes from a noble family of Kalinov. He studied military cartography and eventually became a lieutenant in the Russian army. After the February Revolution, he Ukrainianised the division under his command and joined the republic's military in a bloody battle against the Bolsheviks.§!"

 UKR_petro_diachenko: "Пётр Дьяченко"
 UKR_petro_diachenko_commander_desc: "§YBorn:§! §LDecember 30th, 1895, in Berezova Luka, Poltava Governorate, Russian Empire§!\n§YBackground:§! §LPetro Diachenko was a young mechanic when the Great War broke out. Volunteering to join the army, he fought as part of the 52nd Siberian Rifle Regiment in Poland and Lithuania for which he was awarded three crosses of St. George. He took part in the Brusilov Offensive where he was wounded; according to his compatriots, in numerous battles against the German and Austro-Hungarian troops, he fought bravely and showed personal courage.\n\nWhen the Ukrainian revolution began, Diachenko joined the forces of the Ukrainian People's Republic. Under the command of Colonel Petro Bolbochan, Diachenko participated in the liberation of Kharkiv, Oleksandrivske, and Melitopol from the Bolshevik forces. Upon the Hetman coming to power, Diachenko remained in the army, leading the cavalry as part of the 2nd Zaporizhia Regiment. Since then, Diachenko has led the Cavalry Regiment of the Black Zaporozhians, a unit he has garnered quite a reputation for.§!"

 UKR_oleksii_fedorov: "Алексей Фёдоров"
 UKR_oleksii_fedorov_commander_desc: "§YBorn:§! §LMarch 17th, 1901, in Lotsmanska Kamianka, Yekaterinoslav Governorate, Russian Empire§!\n§YBackground:§! §LComing from a family of modest means near Katerynoslav, Oleksii Fedorov was too young to serve in the Great War. After working as an apprentice in construction, he joined the Ukrainian Army in 1920. Despite an aptitude for military life, Fedorov quickly grew disgusted with the army for supporting what he considered a corrupt and reactionary government. Fedorov returned to his career in railway construction and became involved in organised labour, eventually gaining a seat on the District Council of Trade Unions in Chernihiv. Now that the Hetman is gone, however, Fedorov is ready to don his uniform once again in the defence of the Ukrainian people.§!"

 ### Admirals
 UKR_sviatoslav_shramchenko: "Святослав Шрамченко"
 UKR_sviatoslav_shramchenko_high_command_desc: "§YBorn:§! §LMay 3rd, 1893, in Baku, Baku Governorate, Russian Empire§!\n§YBackground:§! §LSviatoslav Shramchenko hails from the ancient Chernihiv noble family. His father was an ethnographer and a researcher of Ukrainian folklore, and it did not come as a surprise when Shramchenko embraced Ukrainian identity fully after the February Revolution. He was integral in the Ukrainisation of the entire Black Sea Fleet. He served briefly as the Minister of Maritime Affairs before the stabilisation of the Ukrainian military situation. In the 1920s, he became more well-known as a naval historian and stamp collector. Known as a kind and charismatic leader, he is well-liked in the Navy.§!"

 UKR_yurii_svirskyi: "Юрий Свирский"
 UKR_yurii_svirskyi_admiral_desc: "§YBorn:§! §LApril 5th, 1884, in Kalisz, Kalisz Governorate, Kingdom of Poland, Russian Empire§!\n§YBackground:§! §LPolish Jerzy Świrski was pushed into a military career by his family's military tradition. He graduated from the Imperial Russian Marine Cadet Corps School in 1902, and served in the Black Seas Fleet. In 1918, when the Ukrainian People's Republic took control over much of the Russian Black Sea Fleet, many officers such as Świrski embraced Ukrainian identity and joined the new state's fleet. The gifted Svirskyi was quickly promoted to Vice-Admiral. In Ukraine, he became an active member of the Polish cultural organisations in Sevastopil. Svirskyi is seen as a creative and independent commander, who understands the cooperation between the marine infantry and the fleet.§!"

 ### SiC
 UKR_borys_homzyn: "Борис Хамзин"
 UKR_borys_homzyn_sic_desc: "§YBorn:§! §LJune 7th, 1887, in Savran, Podolia Governorate, Russian Empire§!\n§YBackground:§! §LOnce a poet, a playwright, a publicist and now the Otaman-Minister, Borys Homzyn has seen a sudden and meteoric rise. Born to nobles of Saint Petersburg who had large estates in the Baltskyi district of Podolia Governorate, Borys Homzyn graduated from Yelysavethrad Cavalry School and joined the army, serving as squadron commander of the 5th Reserve Cavalry Regiment. When Skoropadskyi came to power, he became one of the Hetman's closest associates, and became a Lieutenant Colonel as well as the assistant chief of the intelligence department of the army. In response to the British Revolution and the subsequent Borotbyst agitation against the Hetmanate, he along with Ivan Poltavets-Ostrianytsia founded the Union of Hetmanites - State Builders.\n\nAs an organisation of the open-secret type, it tended to have a rather poor reputation, and Skoropadskyi sought to distance himself from it. Seeking a more direct, authoritarian approach not shackled by politicians from the Soim, Skoropadskyi appointed Homzyn as Otaman-Minister. With the empowerment of the Council of Ministers as the chief legislative institution of the state, Skoropadskyi and his associates from SHD now wield nigh-unlimited power. As one of Skoropadskyi's closest associates, Homzyn has emphasised the need for a traditional Ukrainian State with the Hetman as its most powerful institution.§!"

 UKR_serhii_shemet: "Сергей Шемет"
 UKR_serhii_shemet_sic_desc: "§YBorn:§! §LJune 6th, 1875, in Oleksandrivka, Poltava Governorate, Russian Empire§!\n§YBackground:§! §LSerhii Shemet came from a noble family of landowners called the Shemety-Kezhaily. During his studies at the Saint Petersburg Practical Technological Institute of Emperor Nicholas I, he became part of the Ukrainian Student Society. In 1917, he would become one of the co-founders of the Ukrainian Democratic Agrarian Party, and when Skoropadskyi came to power he advocated for the Ukrainianisation of the Hetman's government, seeing it as too pro-Russian. On the eve of the 1924 elections, Viacheslav Lypynskyi, one of UDKhP's leaders, would go on to propose a revision of the party programme through a neomonarchist and corporatist lens. The proposal was met with scepticism and Lypynskyi would go on to be removed as a party leader. In response, Lypynskyi went ahead and gathered his supporters among party members and left, creating a new political organisation - the Ukrainian Union of Agrarians-Statists. Shemet decided to join the USKhD due to his belief that a party led by a close advisor to the Hetman would offer better prospects than the increasingly big-tent UDKhP.\n\nSeeking a personally loyal candidate with a certain degree of legitimacy in the Soim, Skoropadskyi decided to appoint Shemet as Otaman-Minister after the victory of the coalition. Shemet is recognised as one of the more pragmatic members of the organisation and is more sceptical of those more ideologically inclined, such as Mykola Kochubei. Nonetheless, after his appointment as Otaman-Minister he has sought to consolidate his personal hold on the government and expand his influence to the wider bureaucratic circles.§!"

 UKR_mykola_mikhnovskyi: "Николай Михновский"
 UKR_mykola_mikhnovskyi_sic_desc: "§YBorn:§! §LMarch 31st, 1873, in Turivka, Poltava Governorate, Russian Empire§!\n§YBackground:§! §LMykola Mikhnovskyi's family was mostly of Cossack origins, with their roots going back to the 17th century. Son of a priest, he was significantly influenced by both his environment and his father, who raised him with an \"independent spirit\". The growth of the Ukrainian national movement in the late 19th century led to division among Ukrainian intelligentsia; many believed that the solution would be greater degrees of autonomy in cultural and educational affairs. Mikhnovskyi, however, disagreed, preferring full independence, and created a secret student organisation to advocate for it. Though the organisation proved unsuccessful, Mikhnovskyi's dream of an independent Ukraine came to fruition later when the Ukrainian People's Republic finally moved to assert its independence.\n\nDespite disliking the socialist ideals of the People's Republic, he believed the new government under Skoropadskyi was too pro-Russian, and refused to become the Hetman's personal advisor. Still, his ties among conservative political circles, his fiery personality and veritable credentials of one of the first Ukrainian \"samostiinyk\" (advocate for full independence) eventually led him to the Democratic Agrarian Party, where he quickly rose to prominence, leading the party's more populist wing. After the VDR's failed revolt Mikhnovskyi managed to fully secure leadership of the party and was subsequently offered the position of Otaman-Minister after the USKhD failed to deliver on their promises. Sometimes labelled as the \"Hetman's Radical Firebrand\", Mikhnovskyi is perceived as a staunch nationalist, but his radical and seemingly uncompromising rhetoric is often at odds with actual policies implemented by his cabinet.§!"

 UKR_ihor_kistiakovskyi: "Игорь Кистяковский"
 UKR_ihor_kistiakovskyi_sic_desc: "§YBorn:§! §LJanuary 4th, 1876, in Kyiv, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LGraduating from Kyiv University's law school in 1897, Ihor Oleksandrovych Kistiakovskyi would often meet with figures such as Volodymyr Antonovych and Pavlo Zhytetskyi, who had heavy influences on his national worldview. After practising law and teaching at the University of Moscow for some years, he left in protest in 1911 due to the violation of the university's autonomy. He cooperated with the figures of the Ukrainian national movement, materially supporting the publication \"Ukrainian Life\". When Pavlo Skoropadskyi came to power, he was appointed as Minister of the Interior, and he belonged to a group of ministers that opposed any treaty with Russia that threatened full Ukrainian independence.\n\nEventually he joined UDKhP, which attracted many among more right-leaning kadets from Ukraine. Boasting numerous political connections and effectively weaponising his reputation as a cunning and ruthless political actor, Kistiakovskyi quickly climbed the party ranks. After the VDR's failed revolt he managed to fully secure leadership of the party and was subsequently offered the position of Otaman-Minister after the USKhD failed to deliver on their promises. Now Kistiakovskyi heads an administration championing political pragmatism and rational approach to governance built on the broad compromise between the Soim and the executive office.§!"

 UKR_oleksandr_shapoval: "Александр Шаповал"
 UKR_oleksandr_shapoval_sic_desc: "§YBorn:§! §L1888, in Pysarshchyna, Poltava Governorate, Russian Empire§!\n§YBackground:§! §LOleksandr Shapoval was born to a peasant family. Once a member of the Ukrainian Party of Socialists-Independentists, Shapoval, disillusioned with the chaotic nature of partisan politics, would later turn to the Hetmanist movement, and became one of its strongest advocates. As a commander of the 1st Cossack Regiment, Shapoval's military career and later Hetmanist advocacy would earn him a spot in the Hetman's informal circle of advisors. He would become a great roadblock for the democrats in the UDKhP, as the Hetman would often block their proposals on his advice. Now that the war has been won, Shapoval's status has only heightened, with him becoming the latest Otaman-Minister, coming to power as an independent and a war hero. Shapoval symbolically represents the stagnant and uncompromising Hetmanite status quo that has existed for almost three decades now, perhaps moreso than any Otaman-Minister before him.§!"

 UKR_volodymyr_korostovets: "Владимир Коростовец"
 UKR_volodymyr_korostovets_sic_desc: "§YBorn:§! §LJuly 16th, 1888, in Gatchina, Saint-Petersburg Governorate, Russian Empire§!\n§YBackground:§! §LVolodymyr Korostovets was raised in his family's estates near Chernihiv and to a lesser degree in Saint Petersburg. He was tutored by home teachers, one of them an Englishman - which likely had great influence on his future career. Before the Ukrainian Revolution, Korostovets worked in the Russian foreign ministry as a private secretary, and when the revolution kicked off, he organised the defence of family estates in Ukraine against the Bolsheviks. Eventually, he would permanently settle here and start a career in the foreign ministry of Ukrainian State. Perhaps inspired by his English tutor in his earlier years, he would focus his efforts on strengthening relations between Ukraine and the British. The British Revolution in 1925 would not stop his work, however, as he was instrumental in the establishment of diplomatic relations with the revolutionary government. As a member of the UDKhP, Korostovets became a compromise candidate for the position of Otaman-Minister, aligned with Kistiakovskyi's inner circle. It is expected that he would continue the course of his predecessor.§!"

 UKR_viacheslav_prokopovych: "Вячеслав Прокопович"
 UKR_viacheslav_prokopovych_sic_desc: "§YBorn:§! §LJune 10th, 1881, in Kyiv, Kiev Governorate, Russian Empire§!\n§YBackground:§! §LAfter graduating from the faculty of history and philosophy at Kyiv University, Viacheslav Prokopovych taught history at a gymnasium, but was fired due to Ukrainophile sentiment. In 1905, he became a member of the Ukrainian Radical Democratic Party. When the revolution kicked off, Prokopovych would play a significant role in the establishment of the executive branch of the young People's Republic, eventually becoming the Minister of Public Education, contributing to the Ukrainisation of education. After the Skoropadskyi's coup he would not take any positions in the various Hetmanate's cabinets and would remain in discreet contact with Petliura and other exiled republicans. With a URDP government now at the helm in Kyiv, Prokopovych has taken up an important position as one of its senior officials and is poised to lead the first truly progressive cabinet since the Hetmanate's inception.§!"

 UKR_andrii_nikovskyi: "Андрей Никовский"
 UKR_andrii_nikovskyi_leader_desc: "§YBorn:§! §LOctober 14th, 1885, in Malyi Buialyk, Kherson Governorate, Russian Empire§!\n§YBackground:§! §LAndrii Nikovskyi always combined his political aspirations with those of a writer, an art critic and a scholar – an unsurprising development in the Ukrainian national movement, given how crucial were writers and poets for the development of Ukrainian identity. His career as a publicist started during student years, spent in the Novorossiya University in Odesa. Soon he would become a secretary of the local 'Prosvita' branch – a grassroot organisation dedicated to the cultural and educational development among Ukrainians.\n\nA prolific writer and cultural activist, Nikovskyi became an active member of the Society of Ukrainian Progressives and the party of the Socialists-Federalists. The Hetmanist coup would see him becoming a leader of the Ukrainian National-State Union – a big-tent organisation envisioned as a core of legal opposition to the Hetman's regime. However, he wouldn't serve there for long, with Volodymyr Vynnychenko eventually taking reins of the Union.\n\nIn later years the Socialists-Federalists would reorganise into the URDP, becoming the main legal oppositional force in the Hetmanate. With the other party's founders either in retirement or preoccupied with organisational matters, Nikovskyi soon became a recognised leader among the most uncompromising and radical members of the party, which coalesced over the years in its distinct left faction.\n\nNow, at the top of national politics, he can ensure that the party, which almost lost sight of its cause during the Hetman's reign, always remains true to its origins. National progress cannot be stopped – and Andrii Vasyliovych is here to ensure that the whole Ukraine shares in its ripe fruits.§!"

 UKR_opanas_fedenko: "Апанас Феденко"
 UKR_opanas_fedenko_leader_desc: "§YBorn:§! §LDecember 13th, 1893, in Veseli Terny, Yekaterinoslav Governorate, Russian Empire§!\n§YBackground:§! §LPanas Vasyliovych Fedenko, the renowned historian and teacher, has emerged in recent times as one of the most prominent members of the USDRP. The ninth child of a peasant family, Fedenko would stand out amongst his siblings due to his diligent and academic nature. By recommendation of his teachers, he would be transferred to a gymnasium in Oleksandriia, where he would continue his studies. There, Fedenko would develop a love for teaching, hopeful to one day teach Ukrainian history and language in his hometown. At the same time, however, Fedenko would also develop a fascination with socialist ideals.\n\nAfter travelling to Saint Petersburg to further pursue his studies, he would quickly find himself radicalised. Joining the USDRP in 1915, Fedenko began to spend much of his energy writing for several socialist publications, including Volodymyr Vynnychenko's \"Our Life\". Following the February Revolution, Fedenko would be elected as a representative to the Central Rada, in which he worked until Skoropadskyi's coup. His new position forced him to move to Katerynoslav, where he would help write for \"Our Cause\", the printed organ of the party. As a result of this, he began to work more closely alongside Isaak Mazepa and Katerynoslav faction of the USDRP. Spending his exile in Galicia alongside his fellow republicans, he would pen several other works, all the while continuing his work as a history teacher.\n\nTruly, the course of history has shown that the people's calls for freedom cannot be suppressed forever. The spirit of Ukrainian republicanism, no matter what befalls it, shall live on among the hills and steppes of Ukraine. With everything in his power, Fedenko stands ready to uphold its core ideal - that liberty reigns forevermore.§!"

 UKR_levko_kovaliv: "Лев Ковалёв"
 UKR_levko_kovaliv_sic_desc: "§YBorn:§! §LDecember 18th, 1894, in Kharkiv, Kharkov Governorate, Russian Empire§!\n§YBackground:§! §LLevko Kovaliv was born in the family of impoverished nobility and from the early years demonstrated great aptitude for studies. However, as an active member of the radical student community, Kovaliv would be largely distracted from scientific pursuits by his political activities.\n\nHe would later become one of the founders of the Ukrainian Party of Socialist-Revolutionaries and one of the leaders of its left-wing faction. During this period Kovaliv would spend significant time working in the land administration of Poltava, personally confronting complex realities of the land question in Ukraine. He would join Shumskyi in the exodus from the UPS-R and after the downfall of the republic would remain in Ukraine.\n\nAfter the government anti-socialist crackdown in 1925 Kovaliv would move to France as a part of the party's foreign bureau. Here he would direct his efforts both towards the representation of the party on the international scene and the studies of chemistry in the University of Paris. Having seen first-hand all the intricacies of the French post-revolutionary order, now First Deputy Chairman Kovaliv is absolutely sure that in order to fulfil its internationalist mission Ukraine should firstly forge its own, unique revolutionary path, in accordance with its specific geographic and socio-economic conditions.§!"

 UKR_mykhailo_poloz: "Михаил Полоз"
 UKR_mykhailo_poloz_sic_desc: "§YBorn:§! §LDecember 23rd, 1891, in Kharkiv, Kharkov Governorate, Russian Empire§!\n§YBackground:§! §LBorn in the family of an excise official from impoverished nobility, Mykhailo Poloz became an active participant in revolutionary politics during his early years. He was firstly arrested for his activities at the age of 17, in 1908. After the formation of Ukrainian Central Rada in 1917 he became its member representing the Ukrainian Party of Socialist-Revolutionaries. Later, during the party split, he would follow Shumskyi and join the central committee of the newly created party of Borotbysts. Poloz would stay in Ukraine after the solidification of Hetman's rule and would become instrumental in the coordination of underground far-left forces. Now, as the right hand of chairman Shumskyi, he largely continues to play the role of a mediator and coordinator, preserving revolutionary unity and making sure that internal discussions and disagreements don't lead to petty factionalism.§!"

 UKR_pavlo_khrystiuk: "Павел Христюк"
 UKR_pavlo_khrystiuk_sic_desc: "§YBorn:§! §L1890, in Yelizavetinskaya, Kuban Oblast, Russian Empire§!\n§YBackground:§! §LBorn to a Cossack family, Pavlo Onykiyovych Khrystiuk's political life began at the Kyiv Polytechnic Institute. A notable figure amongst Ukrainian intelligentsia, he spent much of his time writing for several socialist publications, such as the UPS-R's \"Borotba\".\n\nServing as a member of the central committee of the UPS-R, he would hold several high-ranking positions during the People's Republic's short tenure. Notably, he helped draft the 1918 Land Reform during his time as the general chancellor in Vynnychenko's government. Khrystiuk fled to Vienna following the Hetman's coup, where he acted as a member of the UPS-R's foreign delegation.\n\nNow, as the UPS-R has propelled itself back to the forefront of Ukrainian politics, Pavlo Khrystiuk finds himself holding an important role in the new government. Threats beset the revolutionary cause just as they did back in 1917, but this time, Khrystiuk vows, the Republic shall not crumble before them.§!"

