 ukraine_events.80.a: "Странная компания."

 ukraine_events.81.t: "Потерянный и найденный рай"
 ukraine_events.81.d: "После почти двух лет работы многолетний украинский режиссер Александр Довженко выпустил свой последний фильм \"Потерянный и найденный рай\", вдохновленный глубокой любовью к украинскому народу и долгой ссылкой в коммуне Франции. Это первое из его многочисленных художественных произведений, которое, к большому сожалению, было снято на Украине. В фильме рассказывается об утопическом поселении в украинской глуши, которое постепенно превращается в современный мегаполис, подвергаясь нападкам врагов, выступающих против уникального образа жизни, представляющего собой смесь общинной жизни и технократического рационального планирования.\n\nПо мнению критиков, это либо положительная аллегория возрождения левого украинского республиканизма, либо, по мнению более жестких противников Довженко, способ романтизации идей старой гетманской классократии. Сторонники Довженко превозносят фильм как оду потенциалу украинской нации, попытку примирить силы природы с силами современности. В отличие от предыдущих работ Довженко, основанных на коммунарской школе \"пролетарского реализма\", фильм достаточно интенсивно символичен, \"романтичен до изнеможения\", как остроумно заметил один из соавторов Довженко. Отсылки к конкретным национальностям, культурам и политическим движениям, даже украинским, скрыты за слоями аллегорий.\n\n Хотя широкая публика почесала голову, любимая Довженко левая авангардная аудитория встретила фильм с одобрением: показы фильма прошли не только в Украине, но и у его старых коллег в Париже и Лондоне. Неоднозначная реакция не испугала Довженко, и человек, прославившийся как \"первый поэт кино\", немедленно вернулся к работе над своим следующим проектом."
 ukraine_events.81.a: "Подождите, я не понял, речь шла о гетманате или республике?"
 ukraine_events.81.b: "Какой странный человек... расскажите мне поподробнее об этом любителе!"

 ukraine_events.82.t: "Первый поэт кино"
 ukraine_events.82.d: "Довженко - любопытный персонаж украинского кино: он происходил из бедных казаков, но вырос и стал преподавателем и одним из основателей Украинской академии искусств в [202.GetName]. В 1918 г. Довженко, первоначально поддерживавший гетманат, признался, что вступил в украинскую национальную революцию \"не через ту дверь\", и стал откровенным противником Скоропадского после того, как гетман ввел воинскую повинность среди студентов [202.GetName]. В дальнейшем он дрейфовал между Украинской Народной Республикой Симона Петлюры и фракцией 'Боротьба' коммунистического движения во время Гражданской войны, пока победа гетмана не заставила Довженко покинуть родину и искать убежища во Франции.\n\n В 1925 г. он устроился стажером во французскую киноиндустрию. Там он освоил все тонкости профессии и начал писать собственные сценарии, которые часто были комедиями, пародирующими и отсылающими к другим популярным фильмам. В конце концов, Довженко начал снимать собственные политические фильмы, собрав разношерстную команду из своих соотечественников, которые помогли ему написать и снять \"Украинскую трилогию\", состоящую из \"Звенигоры\", \"Арсенала\" и \"Земли\", которые он назвал \"Кинематографической поэзией\" и попыткой создать \"Украинскую Илиаду\", охватывающую всю историю его родины. Хотя все эти три картины снимались во Франции, Довженко был непреклонен в своем желании воссоздать на съемочных площадках аутентичную украинскую культуру.\n\nНаряду с националистическими настроениями, в этих работах проявилась и социалистическая политика Довженко, например, в картинах \"Звенигора\" и \"Земля\" он подчеркивал стремление украинского крестьянства к земельной реформе и экономической свободе, а в \"Звенигоре"\ и \"Арсенале"\ его изображение Гражданской войны в Украине несло в себе чувство меланхолии по поводу неудач Украинской Народной Республики и боротбистов, мрачную мечту о том, что могло бы быть, если бы они победили гетмана в те времена. Тем не менее, эти ранние фильмы были еще очень приземленными и несли в себе строгую апелляцию к земле, свободе и национальным традициям, что далеко от его последних, более эзотерических работ, таких как \"Потерянный и обретенный рай\"
 ukraine_events.82.a: "Возможно,\ "романтичный до изнеможения\" был прав..."

 ukraine_events.83.t: "Производство на "Тарасе Бульбе" остановлено"
 ukraine_events.83.d: "На протяжении последних десяти лет уважаемый украинский режиссер Александр Довженко работает над экранизацией казачьей повести XIX века \"Тарас Бульба"\, написанной Николаем Гоголем. Недавно режиссер начал сотрудничество с известным историком казачества Дмитрием Яворницким, чтобы гарантировать подлинность фильма. Они обещали, что сценарий близок к завершению, Довженко даже недавно вернулся с разведки мест съемок в Крыму, но многие его коллеги скептически отнеслись к тому, что десятилетний проект будет реализован в ближайшее время.\n\n К сожалению, похоже, что худшее уже свершилось, и съемки магнум опуса Довженко будут остановлены на неопределенное время, поскольку из-за объявления войны с Россией снимать в Крыму стало слишком опасно. Кроме того, несколько ведущих актеров фильма, например, молодой Николай Дупак, который должен был сыграть эрудированного сына казацкого героя Тараса Бульбы Андрея, заявили о своем желании пойти добровольцами в украинские вооруженные силы, а не проводить войну на съемочной или театральной сцене. Довженко поддержал это мнение и предложил себя на службу нашему правительству, которое обратилось к нему за помощью в съемках пропагандистских фильмов в поддержку военных действий.\n\nЭто было сделано с некоторой долей двойственности: хотя Довженко и разочарован тем, что его шедевр приходится откладывать, очевидно, что он возмущен российским врагом и уже начал писать пламенную риторику против него, например, небольшое журналистское эссе под названием \"Украина в огне\", которое уже нашло одобрение как среди простых солдат, так и среди офицеров и государственных чиновников."
 ukraine_events.83.a: "Слава Украинский! Поэт кино сражается рядом с нами!"

 ukraine_events.84.t: "Тарас Бульба освобожден"
 ukraine_events.84.d: "Несмотря на огонь и кровопролитие, которые пережила Украина, мы выжили, как и мечты великого режиссера Александра Довженко. Его многолетний проект по экранизации романа XIX века \"Тарас Бульба"\ наконец-то завершен и выходит на экраны. История 'Тараса Бульбы' непроста: написанная в XIX веке украинским писателем Николаем Гоголем, она, как и ее автор, всегда вызывала споры между украинскими и русскими националистами. Хотя Гоголь происходил из длинного рода украинских казаков, в основном он вращался в русских литературных кругах. Будучи человеком двух миров, он, как известно, не отдавал предпочтения ни русскому, ни украинскому националистическому делу, в результате чего обе стороны часто называли его своим.\n\n Хотя Довженко и отдает предпочтение украинской позиции в этом культурном конфликте, он старается не открывать старые раны, оставленные вторым Вельткригом. \"Тарас Бульба\", действие которого происходит в начале XVII века, повествует о том, как храбрый украинский казак-герой и его сыновья поднимают восстание против Речи Посполитой. Если в оригинальном романе поляков поддерживают евреи, крымчаки и другие коллаборационисты, то Довженко попытался изобразить более нюансированную картину, представив иностранных гегемонов как завлекающих христианское, еврейское и мусульманское население Украины следовать их воле. Среди других заметных изменений - отказ от гоголевского почитания русского царя, когда восставшие украинцы взывают к освободителю, чтобы спасти их, и использование более двусмысленного описания вождя или отца, который избавит их от угнетения.\n\n Наконец, в фильме есть несколько аллегорий Украинской Народной Республики, изображающих этот образец украинского сопротивления XVII века как часть более широкой борьбы против иностранного господства всех видов, особенно иностранного капитала из Берлина, Австрии и Москвы."
 ukraine_events.84.a: "Поздравляем Довженко!"

 ukraine_events.85.t: "Лилия"
 ukraine_events.85.d: "На украинской театральной сцене, где и меценаты, и творческие работники направляют свои усилия на поддержку войны против России, появилось новое художественное начинание. \"Лилея\" - драматический и националистический балет на либретто Всеволода Чаговца, который организовал и постановку, и захватывающую партитуру Константина Данькевича. Источником сюжета послужили стихи и баллады выдающегося украинского поэта XIX века Тараса Шевченко, в частности, его сборник "Кобзарь" ("Менестрель"). Спектакль не является прямой адаптацией какого-либо произведения, а представляет собой компиляцию различных частей 'Кобзаря', призванную создать единое повествование.\n\n Премьера спектакля состоялась в Национальной опере Украины в [202.GetName]. В нем рассказывается история молодой украинской крестьянки Лилеи, живущей в Украине 1820-х годов, жестоко угнетаемой династией Романовых, или \"московитов\", как их называют в спектакле. Она влюбляется в крестьянина Степана, но, обратившись к жестокому князю-москвичу, управляющему их деревней, за разрешением выйти замуж, становится объектом его извращенных желаний. Когда князь пытается похитить Лилею, ее и Степана уводят односельчане, но по дороге разлучают. Степан попадает в плен к князю, его ослепляют, но это увечье не останавливает его, и он начинает жить как бродячий менестрель, странствуя и привлекая на свою сторону народ Украины с помощью музыки.\n\nПосле воссоединения с Лилеей их снова настигает князь-москвич. Лилея получает смертельный удар, предназначенный ее возлюбленному, и ее смерть вдохновляет Степана и украинских крестьян на восстание и казнь князя, после чего они обещают создать новый народ, состоящий из равных людей, свободных от тирании. Поразительная история об угнетении, мученичестве и восстании была названа аллегорией долгой борьбы Украины против российской гегемонии"
 ukraine_events.85.a: "Самое интересное."

 ukraine_events.86.t: "Анимированные инновации в [192.GetName]"
 ukraine_events.86.d: "Малоизвестной стороной украинской культуры является отечественная анимационная индустрия, которая в последнее время привлекает все большее внимание мировой общественности. Она зародилась на Одесской киностудии, образовавшейся в результате слияния родных украинских киностудий после гражданской войны, под руководством Вячеслава Левандовского, которого называют отцом украинской анимации. Ученик балета и выпускник Академии художеств [202.GetName], Левандовский пришел в киноиндустрию [192.GetName], где сначала работал с куклами, мультипликацией и ротоскопированием, создав в 1927 г. первый украинский анимационный фильм \"Соломенный бычок\".\n\n Вскоре он заинтересовался \"целлулоидной анимацией\", разработанной компаниями Walt Disney Productions и Fleischer Studios, а также использованием звука, синхронизированного с анимацией. Левандовский и другие украинские аниматоры познакомились с этими понятиями в основном через культурный журнал "Дило", издававшийся в Галиции, но имевший широкое распространение в интеллектуальных кругах Украины. Со временем Левандовский отошел от кукол и начал использовать мультипликацию, начав в 1928 г. работу над своим самым известным мультфильмом \"Тук-Тук и его друг Жук\".\nЭто была попытка создать пару серийных талисманов для украинской анимации, персонажей, подобных Микки Маусу или Бетти Буп, которые могли бы появляться в разных мультфильмах. Миниатюрный мальчик Тук-Тук и его собачий товарищ Жук снялись в трех историях, созданных Левандовским вместе с его коллегами Иполитом Лазарчуком, Сергеем Конончуком, Семеном Гуецким и Евгением Горбачом в течение последнего десятилетия. Они завоевали огромную популярность среди украинских детей и способствовали превращению анимации в новый авторитетный вид искусства. Как Левандовский вдохновлялся иностранными идеями, так и украинские мультфильмы распространились по всему Рейхспакту и в Галиции, где они, в свою очередь, могут вдохновить других мультипликаторов"
 ukraine_events.86.a: "Какая очаровательная коллекция достопримечательностей и звуков!"

 ukraine_events.87.t: "Восстановление Еврейского национального совета"
 ukraine_events.87.d: "С недавним приходом республиканской революции украинские меньшинства также начали отстаивать свое место в новых политических реалиях. Для евреев Украины это означает восстановление Еврейского национального совета как представительно-консультативного органа для любой политической деятельности евреев в Украинской Народной Республике. Если Еврейский национальный совет был разогнан в первые годы существования Гетманата, то при Скоропадском не были упразднены все указанные консультативные учреждения, и Еврейский национальный совет был де-факто заменен Еврейским национальным собранием. Однако централизованный характер гетманского государства, а также запрет на любые социалистические силы привели к тому, что Еврейская национальная ассамблея была весьма ограничена в своих возможностях, в ней преобладали либеральные силы Еврейской народной партии, а также те, кто нашел свое место в Украинской радикально-демократической партии (прежде всего, один из ведущих дипломатов страны Арнольд Марголин)\n\nСегодня Совет вновь начал свою работу. Совет, в состав которого вошли представители различных политических сил, включая Поалей Цион, Бунд, Объединенную еврейскую социалистическую рабочую партию, упомянутую выше Еврейскую народную партию и сионистов в целом, принял ряд резолюций, приветствующих недавнее восстановление закона о национальной личной автономии и заявляющих о намерении оказать содействие в его реализации. Возникли частичные разногласия по поводу распределения мест в Совете, а также участия в нем явно революционно-социалистических сил, но они быстро сошли на нет. После некоторого обсуждения главой Совета был избран Соломон Гольдельман из "Поале Сион", а его заместителем - Вульф Лацкий. Лидер [UKR_leader_title] встретился с Гольдельманом, чтобы поздравить его с победой"
 ukraine_events.87.a: "Поздравляю, господин Гольдельман."

 ukraine_events.88.t: "Политические потрясения в Еврейском национальном совете"
 ukraine_events.88.d: "Было бы наивно полагать, что недавняя Боротьбистская синдикалистская революция обойдет стороной Еврейский национальный совет и его внутриполитические события. Учитывая политическую обстановку в стране, революционно-социалистические силы внутри Совета направили вотум недоверия руководству Совета, что было явной попыткой заменить его более левым составом. Попытка увенчалась успехом, и началась новая гонка за лидерство. Учитывая длительное пребывание Гольдельмана в еврейских политических кругах, было решено, что он займет более низкую должность 'секретаря', вместо того чтобы полностью уйти со всех руководящих постов.\n\n Интересно, что одним из кандидатов в новые руководители стал Исаак Бабель, известный еврейский автор из [192.GetName]. Получивший широкую известность благодаря своим рассказам и романам в межвоенный период, Бабель во время Гражданской войны был связан с большевиками. Тем не менее, Бабель спокойно отказался от выдвижения своей кандидатуры и вместо этого разослал заявление, в котором поздравил левые круги как в Национальном совете, так и в Украине в целом с успешной революцией."
 ukraine_events.88.a: "Революция действительно социальная."

 ukraine_events.89.t1: "Еврейский национальный совет в поддержку военных действий"
 ukraine_events.89.t2: "Еврейская национальная ассамблея в поддержку военных действий"
 ukraine_events.89.d.unr: "Еврейский национальный совет недавно принял почти единогласную резолюцию в поддержку наших военных действий. В резолюции отмечается необходимость борьбы с российским империализмом, приветствуется участие евреев Украины в военных действиях на всех уровнях, а также содержится призыв к украинским евреям записываться на службу добровольцами. Глава Совета Гольдельман также представил кандидатуру Совета на пост нового главного раввина армии. [GetLeader] официально поблагодарил Совет за поддержку."
 ukraine_events.89.d.soc: "Еврейский национальный совет недавно принял почти единогласную резолюцию в поддержку нашей революционной войны. В резолюции отмечается необходимость борьбы с международным империализмом, приветствуется участие евреев Украины во всех звеньях революционной борьбы, содержится призыв к добровольному поступлению на военную службу в меру своих сил и возможностей. Руководство Совета вместе с секретарем Гольдельманом представили также кандидатуру Совета на пост нового главного раввина армии. Товарищ Шумский позвонил руководству Совета и поблагодарил за поддержку."
 ukraine_events.89.d.hetman: "Еврейская национальная ассамблея, пропорциональная общественная организация, недавно приняла почти единогласную резолюцию в поддержку наших военных действий. В резолюции отмечается необходимость борьбы с российским экспансионизмом, приветствуется участие евреев Украины в военных действиях на всех уровнях, а также содержится призыв к украинским евреям записываться на службу добровольцами. Глава Ассамблеи Лацкий также представил кандидатуру Ассамблеи на пост нового главного раввина армии. [GetSecondInCommand] позвонил руководству Ассамблеи и поблагодарил за поддержку."
 ukraine_events.89.a: "Их помощь оценена по достоинству!"

 ukraine_events.90.t: "Поглощение организаций меньшинств"
 ukraine_events.90.d: "Совсем недавно представители СГД объявили о вхождении в организацию "групп меньшинств" Наиболее крупными общественно-политическими организациями, вошедшими в ШД, являются еврейская, русская и польская общины, но есть и множество других.\n\n В своем радиообращении отаман-министр Борис Гомзин и глава Великой казачьей рады Иван Полтавец-Острянец заявили о проведении политики 'социальной унификации'. При этом они подчеркнули, что ни в коем случае не будет приниматься 'специальное дискриминационное законодательство'. Гомзин и Полтавец-Острянец туманно заявили, что такой шаг необходим для защиты от 'внутренних и внешних угроз' и что 'все жители Украины равны'.\n\nНекоторые поглощенные организации, такие как Союз русских в Украине, оказались в несколько более мягких условиях, якобы из-за связей некоторых их руководителей с ШД, а такие организации, как Еврейская национальная ассамблея, практически потеряли свою автономию после того, как 'дружественное социалистам' руководство было снято, а 'социалистические программы' ассамблеи сокращены.\n\nВ любом случае, такой шаг вызвал многочисленные протесты по всей стране, которые были быстро разогнаны Державной Вартой."
 ukraine_events.90.a: "Очередная победа гетмана!"

 ukraine_events.91.t: "Разрозненные организации меньшинств"
 ukraine_events.91.d: "Совсем недавно Провид объявил о разгоне всех групп меньшинств в Украине. Наиболее крупные из них - еврейские, русские и польские общественные организации.\n\n В своем радиообращении члены Провидения Андрей Мельник, Евгений Онацкий и Ростислав Березюк-Волошин заявили о проведении политики 'социальной унификации', но подчеркнули, что ни в коем случае не будет принято 'конкретное дискриминационное законодательство'. Все трое утверждали, что этот шаг просто необходим для защиты Украины от 'внутренних и внешних угроз' в стремлении к 'идеологической однородности', и что без борьбы с этими антиукраинскими организациями 'Украина никогда не сможет возродиться и подняться как гордая и единая нация'.\n\n Несколько странно, что глава Лиги Николай Сциборский в полушутливых комментариях поддержал политику, но поставил под сомнение 'слишком силовую' тактику ее реализации, особенно в отношении евреев Украины. Его комментарии не нашли поддержки в самой Лиге и вызвали больше вопросов, чем ответов.\n\n В любом случае, такой шаг вызвал многочисленные протесты по всей стране, которые были быстро разогнаны милицией и легионерами."
 ukraine_events.91.a: "Еще одна победа Украины!"

 ukraine_events.92.t: "Странный человек в снегу"
 ukraine_events.92.d: "Украинские степи изобилуют историями о чудесах и святости. В Луганской области в каждом населенном пункте можно встретить лесного проповедника, который превозносит достоинства естественной жизни. Зимой эти люди обычно уходят на покой, и на Страстной Неделе улицы затихают. Но на этой страстной неделе все по-другому.\n\nМорозной ночью, при температуре -45 градусов по Цельсию, группа мужчин и женщин за пределами Луганска. Полиция сообщает об их аресте. То, что они обнаруживают, когда их втаскивают в помещение, является шоком. Мужчины и женщины, в основном, обнаженные по пояс, без обуви. Их предводитель, приземистый мужчина с длинной белой бородой.\n\nПервое сообщение о том, что полиция задержала Деда Мороза, было расценено как праздничный розыгрыш. Однако местные власти спрашивают нас, как оплатить их проведение после нового года. Это реальные люди, и они утверждают, что являются последователями Профины Ивоновой. Они не христиане и не старообрядцы. Их лидер состоит на учете в Коммунистической партии России, но при этом он проповедник. Эти члены, очевидно, ошибочно полагают, что минусовая погода на улице излечит их от всех недугов.\n\nОчевидно, что они сумасшедшие, но, может быть, есть альтернативная теория? Эти безумцы своим продолжением существования на самом деле помогают финансам украинского правительства. Они отказываются от социальной помощи, от медицинского обслуживания, от мяса и от всякой благотворительности. Если бы этой группе было позволено распространяться в нашей стране, они могли бы сэкономить государству на социальном обеспечении тысяч людей. Очевидно, что это привело бы к гибели многих последователей, поскольку их здравоохранение - фикция, а в Луганске с трудом терпят их иноверие."
 ukraine_events.92.a: "Освободите этих замечательных экономных людей."
 ukraine_events.92.b: "Я не собираюсь ждать, пока кто-то замерзнет насмерть."

 ukraine_events.93.t: "Мы вступаем в новую эру"
 ukraine_events.93.d: "Один вопрос, который, несомненно, будет обсуждаться историками, заключается в том, будет ли великое контрнаступление после падения Германии включено во Вторую Мировую войну или в нечто более грандиозное - в Третью мировую войну. Последнее мнение заслуживает похвалы, поскольку Украина и ее союзники совершили эпохальный подвиг.\n\nНо на подобные дискуссии нет времени: Европа должна перестроиться. Мы никогда не забудем о потерях, которые понесли в ходе войны, но мы также никогда не забудем и о причине, по которой она произошла. Хотя большинство считает главной причиной конфликта растущую франко-российскую агрессию в конце 1930-х годов, есть доля правды в теории о том, что стремление Германии к европейскому превосходству и, возможно, даже к мировому господству только еще больше обострило напряженность.\n\nМы сами знаем, к чему приводят такие желания. С 1918 года и до победоносного антигетманского восстания немцы поддерживали авторитарное гетманское правительство, заставляя нас продавать зерно по низким ценам и подчиняться довольно деспотичной среднеевропейской системе. Даже после восстановления Народной Республики такие меры были сохранены - мы все еще стремились к истинной свободе.\n\nТеперь не только мы почувствуем вкус этой истинной свободы. Именно для того, чтобы Европа больше никогда не вступала в конфликт, чтобы экономическая гегемония и военное превосходство больше не влияли на континент, чтобы Европа была в безопасности для демократии, в Берлине проходит грандиозный конгресс. На основе ранее подписанного Договора о сотрудничестве между народными государствами разрабатывается новое законодательство, призванное закрепить все эти благородные идеи по всей Европе. С этого дня и впредь мы вступаем в новую эру - эру мира, сотрудничества, братства и демократии."
 ukraine_events.93.a: "Это сыновья моей страны. Где бы ты была сегодня, Европа, если бы их не было?"
 #ukraine_events.93 through ukraine_events.103 are all Army Reorg events

 #Needed to display event option tooltip
 ukraine_events.99.a: "$ukraine_republican_events.242.a$"

 #Title is same as ukraine_republican_events.234
 ukraine_events.104.d: "Украинское государство - особая нация, и сейчас особые времена - мир рушится. Армии становятся все больше, оружейная промышленность развивается как никогда раньше - как в 1914 году, достаточно искры, чтобы все вспыхнуло. И если Германия не согласится с тем, что они хотя бы частично виноваты, тогда нам самим нужно проявить инициативу.\n\nВот почему гетманский дипломат и, пожалуй, самый дружелюбный к России государственный деятель Александр Сахно-Устимович был направлен с миссией в Москву, чтобы предпринять последнюю отчаянную попытку. Когда он встретился с главой российского государства, [RUS.GetLeader], пытаясь найти общий язык. Разве не в интересах обеих стран было избежать еще одной, потенциально еще более катастрофической войны, которая столкнет соседа на соседа?\n\nХотя [RUS.GetLeader] поначалу казался сочувствующим и подтвердил признание Россией украинской государственности, он стал настроен скептически. Это стремление к миру, продолжил он, не приведет к успеху, если не будет подкреплено действиями. Если Германия не хочет войны, то почему она продолжает сохранять такое значительное присутствие войск на Украине и в соседних с ней странах? Почему на Днепре и Даугаве продолжают возводиться линии укреплений?Если Украина хочет мира, то, возможно, ей следует отказаться от своего соглашения о безопасности с Германией и вместо этого найти общий язык со своими историческими братьями.\n\nСахно-Устимович был настроен решительно: он добавил, что Украина не предъявляет территориальных претензий к России, и что если Германия когда-нибудь нападет, то Киев будет решительно блокировать любые попытки использовать ее территорию в качестве плацдарма. Тем не менее, этого было недостаточно: условием прочного мира в Европе был уход Германии с Востока. Конечно, было бы позором для двух государств оказаться в состоянии войны, но такова реальность, если Украина собирается стать соучастницей агрессии Германии.\n\nВ конце концов, они оба покинули стол переговоров. Если о мире больше не могло быть и речи, оставалось только одно, к чему нужно было готовиться."
 ukraine_events.104.d2: "Украинское государство - особая нация, и сейчас особые времена - мир рушится. Армии становятся все больше, оружейная промышленность развивается как никогда раньше - как в 1914 году, достаточно искры, чтобы все вспыхнуло. И если Германия не согласится с тем, что они хотя бы частично виноваты, тогда нам самим нужно проявить инициативу.\n\nВот почему гетманский дипломат и, пожалуй, самый дружелюбный к России государственный деятель Александр Сахно-Устимович был направлен с миссией в Москву, чтобы предпринять последнюю отчаянную попытку. Когда он встретился с российским премьер-министром, тот попытался найти общий язык. Разве не в интересах обеих стран было избежать еще одной, потенциально еще более катастрофической войны, которая натравит соседа на соседа?\n\nХотя поначалу премьер-министр казался настроенным благосклонно и подтвердил признание Россией украинской государственности, он стал относиться к этому скептически. Это стремление к миру, продолжил он, не принесет результатов, если не будет подкреплено действиями. Если Германия не хочет войны, то почему она продолжает сохранять такое значительное присутствие войск на Украине и в соседних с ней странах? Почему на Днепре и Даугаве продолжают возводиться глубокие линии укреплений? Если Украина хочет мира, то, возможно, ей следует расторгнуть свое соглашение о безопасности с Германией и вместо этого найти общий язык со своими историческими братьями.\n\nСахно-Устимович был настроен решительно: он добавил, что Украина не предъявляет территориальных претензий к России, и что если Германия когда-нибудь нападет, то Киев будет решительно блокировать любые попытки использовать ее территорию в качестве плацдарма. Тем не менее, этого было недостаточно: условием прочного мира в Европе был уход Германии с Востока. Конечно, было бы позором для двух государств оказаться в состоянии войны, но такова реальность, если Украина собирается стать соучастницей агрессии Германии.\n\nВ конце концов, они оба покинули стол переговоров. Если о мире больше не могло быть и речи, оставалось только одно, к чему нужно было готовиться."
 #Answer lines same as ukraine_republican_events.234

#Relief Bill
 ukraine_relief_bill_events.1.t: "Разработка законопроекта о льготах"
 ukraine_relief_bill_events.1.d: "В условиях, когда экономическая ситуация ухудшается с каждым часом и не видно положительных сдвигов, перед Соймом и правительством стоит задача разработать комплексный законопроект, который позволит значительно увеличить государственный долг для стабилизации цен, закупки излишков продукции, организовать большой объем неотложных работ для облегчения финансового положения народа и тем самым вернуть доверие людей к правящему режиму. Безусловно, такая работа потребует значительных усилий от нашего разобщенного законодательного органа."
 ukraine_relief_bill_events.1.a: "Уверен, что 'Сойм' сможет прийти к консенсусу?"

 ukraine_relief_bill_events.2.t: "УРДП предлагает временную национализацию банковских центров"
 ukraine_relief_bill_events.2.d: "Представители УРДП предложили временно национализировать банковские центры в [202.GetName], [192.GetName], [221.GetName] и [226.GetName], чтобы позволить центральному правительству ликвидировать нерентабельные предприятия и остановить экономические \"падения\".\n\n Очевидно, что это предложение встретило яростное сопротивление со стороны представителей ВСЗВ и 'Протофиса', которые устали от вмешательства государства в финансовые дела своих благодетелей. Как ни странно, за закрытыми дверями члены ШД высказались в поддержку инициативы, назвав \"эксцессы безудержного капитализма\" и \"отсутствие экономической централизации\" основными причинами нынешнего кризиса."
 ukraine_relief_bill_events.2.a: "Государство будет защищать банковскую систему от внезапных потрясений."
 ukraine_relief_bill_events.2.b: "Наша финансовая система может пережить бурю без прямого вмешательства."
 UKR_banking_curves_nationalisation_tt: "§RМы будем счастливы, если банки не рухнут.§!"
 UKR_SHD_meddling_tt: "§PTВлияние СХД может иметь последствия.§!"

 ukraine_relief_bill_events.3.t: "Банкротство [221.GetName] банка"
 ukraine_relief_bill_events.3.d: "Банковские бега по всей Миттельевропе наконец-то добрались и до нашей страны. Под влиянием паники вкладчики и население начали изымать свои вклады из различных банков. Один из них, банк [221.GetName], оказался не готов к такому развитию событий и вскоре рухнул под тяжестью собственных долгов, а многочисленные кредиты, как ожидается, уже никогда не вернутся в банк. Это мрачный знак для нашей якобы стабильной финансовой системы."
 ukraine_relief_bill_events.3.a: "Нелепость, избавление от нестабильных предприятий только укрепит нашу финансовую систему."

 ukraine_relief_bill_events.4.t: "Программа сельского кредитования страдает из-за нестабильности в банковском секторе"
 ukraine_relief_bill_events.4.d: "Очередной день - очередная неприятность для наших финансов. На этот раз несколько банков прекратили свое участие в государственной программе "Сельское кредитование", в рамках которой фермерам предоставлялись дешевые кредиты на модернизацию сельскохозяйственной техники. Эта программа, являвшаяся частью проблемной земельной реформы, была совместным проектом УДХП и УСХД, и это прискорбное событие, несомненно, будет стоить нам их голосов в Сойме"
 ukraine_relief_bill_events.4.a: "У нас должна была быть сильная аграрная экономика..."

 ukraine_relief_bill_events.5.t: "УСХД предлагает создать временный совет класса в Сойме"
 ukraine_relief_bill_events.5.d: "Эксперименты с прямым классовым представительством в политике всегда были частью повестки дня СХД. Утверждая, что только представители производящих классов обладают необходимыми навыками, опытом и самоотдачей для руководства политическим и экономическим развитием страны, группа депутатов УШД во главе с Николаем Кочубеем предложила создать специальный совет, состоящий из делегатов, избранных государственными профсоюзами, фермерскими кооперативами, организациями работодателей и землевладельцев. Такое собрание должно участвовать в разрешении текущего экономического кризиса наряду с Соймом.\n\n Это предложение вызвало резкую критику со стороны УРДП, утверждающей, что этот институт, якобы призванный смягчить классовые конфликты, только усугубит их, а представители крупных землевладельцев и промышленников будут полностью доминировать в нем. Скептически настроены и другие группы внутри "Сойма", опасающиеся, что создание такого органа разрушит и без того хрупкий баланс сил в парламенте"
 ukraine_relief_bill_events.5.a: "УСХД - это часть коалиции, мы не можем оставить их предложение без внимания"
 ukraine_relief_bill_events.5.b: "\"Классово-кратический\" подход? Это звучит нелепо"
 ukraine_relief_bill_events.5.c: "Возможно, мы сможем убедить других"

 ukraine_relief_bill_events.6.t: "Проблемы с классным советом"
 ukraine_relief_bill_events.6.d: "Как и предсказывали многие, практическая реализация недавнего предложения УСХД встретила ряд препятствий. Вопросы квот на представительство, отсутствие взаимодействия между местными классовыми организациями и централизованной бюрократией, общий хаос на всех уровнях власти в связи с продолжающимся кризисом - все это превратило процесс формирования Совета в бюрократический кошмар.\n\n Списки кандидатов переделываются практически каждый день, поскольку за представительство борются различные организации, политические и экономические. Уже несколько раз переносилась дата первого заседания. Очевидно, что депутаты от ЕРДП не могут упустить возможность указать на эти события в своих выступлениях, а все сложности с Советом тщательно освещаются в партийной прессе."
 ukraine_relief_bill_events.6.a: "Ну, это стоило попробовать..."

 ukraine_relief_bill_events.7.t: "Раскол в гетманской коалиции"
 ukraine_relief_bill_events.7.d: "УХД являлась младшим партнером гетманской коалиции с момента ее создания в 1924 году. По сути, вынужденная в результате прямого вмешательства гетмана объединиться с УДХП, она, тем не менее, осталась верна своим радикальным неомонархическим убеждениям. После смерти основателя движения, политического философа и советника гетмана Вячеслава Липинского отношения между УДХД и другими консервативными силами стали еще более напряженными. Считая других слишком увлеченными радикальными и непрактичными \"классократическими\" идеями, движение, тем не менее, оставалось верным своей роли в коалиции, во имя национального единства и во славу гетманской Украины.\n\n Однако последние разногласия могут стать последней каплей. Отклонение проекта "Классовый совет" разозлило УСХД и породило многочисленные слухи о его возможном выходе из коалиции, а аграрии-статисты оказались сыты по горло постоянной ролью второстепенных партнеров. Только время покажет, насколько эти слухи похожи на правду"
 ukraine_relief_bill_events.7.a: "Они, конечно, очень скоро одумаются"

 ukraine_relief_bill_events.8.t: "Оппозиция чувствует себя воодушевленной"
 ukraine_relief_bill_events.8.d: "\nВ связи с недавними проблемами в гетманской коалиции, связанными с формированием Совета классов, УРДП, похоже, намерена воспользоваться этими событиями.\nВ своей язвительной речи, произнесенной сегодня на заседании Сойма, лидер парламентской фракции УРДП Андрей Никовский подверг яростной критике гетманскую коалицию, отметив ее последние неудачи, междоусобицы и растущий фракционный разброд. \"Как долго эта политическая мерзость сможет сохранять ложную видимость единства, когда лоббисты 'Протофиса' заботятся только о прибылях своих благодетелей, а УШД и УДХП с каждым днем становятся все более далекими?\" Это хороший вопрос, который, безусловно, волнует многих независимых депутатов."
 ukraine_relief_bill_events.8.a: "Обычная возня"

 ukraine_relief_bill_events.9.t: "Вопрос о запасах зерна"
 ukraine_relief_bill_events.9.d: "В условиях, когда цены на сельскохозяйственную продукцию снижаются практически с каждым днем, на наших складах скопилось значительное количество непроданного зерна. Представители VSZV и "Протофиса" предлагают продолжать продавать зерно даже по таким невыгодным ценам. По их мнению, каждый источник дохода имеет значение, а кроме того, вырученные средства можно направить на спасение различных предприятий (в основном, конечно, связанных с их благодетелями), тем самым сохранив рабочие места и убрав людей с улиц. В УПРДП поспешили осудить это предложение, заявив, что полученные таким образом средства должны быть направлены непосредственно на помощь больному сельскому хозяйству"
 ukraine_relief_bill_events.9.a: "Мы должны поддерживать владельцев бизнеса в такие времена"
 ukraine_relief_bill_events.9.b: "Это решение может обернуться против нас, учитывая текущий политический климат..."
 ukraine_relief_bill_events.9.c: "Возможно, убеждение других фракций поможет предотвратить нежелательные последствия"

 ukraine_relief_bill_events.10.t: "Новая волна протестов"
 ukraine_relief_bill_events.10.d: "В прессе УПСР было принято решение о выделении дополнительных средств на спасение предприятий вместо того, чтобы направить их на субсидирование сельского хозяйства, как еще один признак сговора между крупным капиталом и безразличным правительством. Хотя газеты с наиболее вопиющими статьями были быстро изъяты властями из продажи, ущерб уже был нанесен.\n\n В условиях поляризованного политического климата взволнованное население отреагировало возмущением, и новая волна протестов прокатилась по [202.GetName] и другим городам. В частном порядке несколько членов SHD выразили гетману свои опасения по поводу способности Сойма смягчить текущий кризис до того, как он полностью выйдет из-под контроля."
 ukraine_relief_bill_events.10.a: "Все под контролем"

 ukraine_relief_bill_events.11.t: "К вопросу о делегировании полномочий"
 ukraine_relief_bill_events.11.d: "Действительно, высокоцентрализованная бюрократия украинского государства вяло реагирует на экономический кризис. Чтобы снять остроту этой проблемы, депутаты нескольких фракций "Сойма" предложили наделить полномочиями местные органы власти в наиболее пострадавших регионах. Кроме того, они планируют создать в каждом крупном регионе Украины специальные офисы, которые будут координировать немедленные действия по преодолению кризиса с местными деловыми, профессиональными и политическими организациями.\n\n Хотя эта инициатива получила значительную поддержку в Сойме, особенно среди независимых, связанных с крымским депутатом Асаном Сабри Айвазовым, ходят слухи, что несколько высокопоставленных членов ШД обратились по этому вопросу к Гетману и его ближайшему окружению. По всей видимости, эта тайная клика опасается, что передача слишком больших полномочий регионам, охваченным волнениями, приведет лишь к активизации местных повстанцев и провокаторов, а кроме того, только сильная центральная власть способна в приемлемые сроки купировать самые серьезные проявления кризиса."
 ukraine_relief_bill_events.11.a: "Это просто слухи"
 ukraine_relief_bill_events.11.b: "Нам нужно действовать осторожно"
 UKR_doubt_independent_tt: "§RДецентрализация - ключевой вопрос, и отказ от позиции может привести к преждевременному завершению переговоров...§!"

 ukraine_relief_bill_events.12.t: "За закрытыми дверями"
 ukraine_relief_bill_events.12.d: "Оказывается, слухи о вмешательстве СХД были не совсем беспочвенны. Генерал Полтавец-Острянец был замечен в личной резиденции гетмана несколько раз за несколько дней. Сообщалось, что полковник Хомзин встречался с высокопоставленными чиновниками из министерств внутренних дел и финансов. Хотя неизвестно, принесли ли эти встречи какие-либо плоды, тем не менее, это очень тревожный знак, и многие члены Сойма встревожены возможным развитием событий"
 ukraine_relief_bill_events.12.a: "Мы можем только ждать"
 UKR_SHD_influence_tt: "§Работайте с осторожностью.§!"

 ukraine_relief_bill_events.13.t: "Встреча в резиденции"
 ukraine_relief_bill_events.13.d: "Неизвестно, что именно послужило поводом для этого приглашения, но несколько дней назад в личную резиденцию Гетмана были приглашены лидеры всех парламентских фракций "Сойм" Подробности встречи держатся в секрете, но, судя по реакции в штаб-квартире УДХП, можно предположить, что Скоропадский попытался более прямым способом повлиять на ход переговоров по законопроекту о помощи.\n\n На данный момент это вмешательство, похоже, дало эффект, обратный желаемому: депутаты УДХП в ярости, и даже некоторые независимые и более демократически настроенные члены УДХП в знак протеста отозвали свою поддержку законопроекта. Будущее переговоров выглядит теперь крайне мрачно"
 ukraine_relief_bill_events.13.a: "Может быть, это была ошибка..."

 ukraine_relief_bill_events.14.t: "Budget Reserves"
 ukraine_relief_bill_events.14.d: "With most revenue sources for the state drying up and with no signs of improvement in the near future, Soim deputies are pondering their possible options. The URDP suggests implementing an emergency tax-hike on the upper classes, arguing that in the conditions of severe economic inequality existing in Ukraine, the poorest social groups have been hit the hardest, and thus it's the responsibility of the wealthy to support the state during the crisis. Representatives of VSZV and Protofis oppose the proposal, saying that increasing the financial burden on the entrepreneurial class right now will only worsen the business climate in the country.\n\nThe possible alternative solution is an emergency loan from Berlin, which will help us to weather the worst part of the crisis. It's worth noting that several Protofis representatives have hinted that this question is of utmost importance to their benefactors, and our choice here may define relationships with the organisation for the foreseeable future."
 ukraine_relief_bill_events.14.a: "More wealthy ones pay more - it's only fair."
 ukraine_relief_bill_events.14.b: "Our German allies will surely understand."

 ukraine_relief_bill_events.15.t: "Профсоюзы и кооперативы"
 ukraine_relief_bill_events.15.d: "Поддерживаемые государством профессиональные союзы и фермерские кооперативы являются одним из основных инструментов контроля над трудовыми отношениями. При всей остроте нынешнего кризиса очевидно, что они с трудом справляются с задачей поддержания порядка среди рабочих и крестьян. Возможным решением может стать расширение прав и возможностей этих организаций, предоставление им большей свободы в трудовых переговорах и поддержки со стороны государства.\n\n Естественно, вопрос в том, насколько далеко мы готовы пойти в реализации этой идеи. СДПР, как обычно, предлагает предоставить государственным профсоюзам почти полную свободу действий в переговорах с работодателями и минимизировать наказания за забастовки. Представители "Протофиса", обвиняющие НПСР в \"криптобольшевизме\", выступают лишь за символическую поддержку. Другие фракции высказались за компромиссное решение"
 ukraine_relief_bill_events.15.a: "Хватит нести синдикалистскую чушь"
 ukraine_relief_bill_events.15.b: "Компромисс есть"
 ukraine_relief_bill_events.15.c: "Текущий кризис требует радикальных решений"

 ukraine_relief_bill_events.16.t: "Сомнения среди независимых"
 ukraine_relief_bill_events.16.d: "Отказ правительства от инициативы децентрализации вызвал волну критики не только со стороны оппозиции - УРДП, но и со стороны многих независимых депутатов, несмотря на то, что многие из них участвуют в Гетманской коалиции. Некоторые из них уже давно осторожно выступают за децентрализацию, другие видят в этом начинании возможность укрепить свои позиции в избирательных округах.\n\n Независимо от причин, слухи о причастности ШД к отклонению предложения распространяются как лесной пожар, некоторые независимые депутаты начали рассматривать возможность перехода в оппозицию, что ставит под угрозу переговоры по законопроекту о льготах."
 ukraine_relief_bill_events.16.a: "Они не посмеют"

 ukraine_relief_bill_events.99.t: "Переговоры по законопроекту о помощи прекращены"
 ukraine_relief_bill_events.99.d1: "В условиях разногласий в гетманской коалиции, постоянного вмешательства СГД в переговоры и активизации УРДП неудивительно, что несколько независимых депутатов решили перейти на сторону оппозиции. Действительно, зачем оставаться на явно тонущем корабле, тем более в условиях приближающихся выборов?\nБаланс сил в Сойме безвозвратно изменился, и переговоры, по сути, зашли в тупик. Похоже, что Сойм не выдержал испытания, не сумев найти компромисс среди мелких склок и политических разборок. Как это отразится на будущем демократии в Украине, пока неизвестно."
 ukraine_relief_bill_events.99.d2: "Несколько дней назад представители ВСЗВ и "Протофиса" заявили о выходе из переговоров по законопроекту о помощи. По всей видимости, последние решения правительства были расценены VSZV и "Протофисом" как противоречащие первоначальным договоренностям и обещаниям. Несколько неформальных встреч представителей правительства с представителями организаций не изменили ситуацию.\nНазывая в качестве основных причин выхода из переговоров ненадежность правительства и отсутствие конструктивного сотрудничества в Сойме, представители Protofis выразили надежду, что будущее правительство после выборов окажется более дееспособным и открытым для партнерства. Их голоса были решающими для гетманской коалиции, поэтому сейчас переговоры, по сути, зашли в тупик"
 ukraine_relief_bill_events.99.a: "У "Сойма" был шанс. Настало время для более прямого подхода"

 ukraine_relief_bill_events.100.t: "Голосование по законопроекту о помощи"
 ukraine_relief_bill_events.100.d: "Время пришло! После долгих месяцев торга, уговоров, угроз и компромиссов мы наконец-то пришли. Финансовый комитет Сойма одобрил законопроект, и он готов к вынесению на голосование. Вполне возможно, что именно этот день может определить ход всего кризиса, охватившего нашу страну. Остается только ждать результатов голосования. А законопроект..."
 ukraine_relief_bill_events.100.a: "Проголосовали за!"
 ukraine_relief_bill_events.100.b: "Пройдено!"

 ukraine_relief_bill_events.101.t: "Письмо от ВСЗВ и Протофис"
 ukraine_relief_bill_events.101.d: "Хотя Сойм ликует от недавнего принятия закона о помощи, этого нельзя сказать о представителях ВСЗВ и "Протофиса" В письме на имя отамана-министра главный деятель ВСЗВ Василий Кочубей выразил свое глубокое недовольство направлением деятельности правительства. Выступив с резкой критикой в адрес радикальных демократов и некоторых аграрных демократов, он заявил, что законопроект о помощи в долгосрочной перспективе только ослабит нацию и что протесты не будут решены одним росчерком пера, вопреки крипто-синдикалистской чепухе, которую распространяет большая часть 'Сойма'.\n\n Кочубей предупредил, что если коалиция будет продолжать идти по нынешнему пути, то о политическом сотрудничестве между ними не может быть и речи. Он подчеркнул, что будущее сотрудничество не будет невозможным, хотя и будет зависеть от пересмотра правительством своей позиции."
 ukraine_relief_bill_events.101.a: "Понятно"

#Anti-Hetman Revolt
 ukraine_revolt_events.1.t: "Костры революции"
 ukraine_revolt_events.1.d: "Недовольство и страдания достигли предела. Гетман отвечает жестокостью и безразличием - очевидно, что для улучшения ситуации его необходимо свергнуть. В ночь насилия и хаоса вооруженные отряды ВДД атаковали правительственные здания и военные казармы, убивая местных политиков и освобождая своих заключенных товарищей.\n\nДиректорат Украинской Народной Республики был провозглашен Симоном Петлюрой и другими лидерами ВДД в [792.GetCapitalVictoryPointName], и они потребовали от гетмана отречься от власти, разрешить свободные и демократические выборы и перераспределить землю в пользу крестьян. Для поддержки этих требований ВДД начала организовывать \"Украинскую народную армию\", которая быстро взяла под контроль западную сельскую местность, поскольку к ней присоединились местные крестьянские ополчения. Распространяясь как лесной пожар, революция быстро находит поддержку по всей стране"
 ukraine_revolt_events.1.d2: "Недовольство и страдания достигли предела. Гетман отвечает жестокостью и безразличием - очевидно, что для улучшения ситуации его необходимо свергнуть. В ночь насилия и хаоса вооруженные отряды ВДД атаковали правительственные здания и военные казармы, убивая местных политиков и освобождая своих заключенных товарищей.\n\nСимон Петлюра и другие лидеры ВДД в [792.GetCapitalVictoryPointName] провозгласили Директорию Украинской Народной Республики и потребовали от гетмана отречься от власти, Разрешить свободные демократические выборы и перераспределить землю в пользу крестьян. Для поддержки этих требований ВДД начала организовывать Украинскую народную армию, которая быстро взяла под контроль западную сельскую местность, поскольку к ней присоединились местные крестьянские ополчения. Распространяясь как лесной пожар, революция быстро находит поддержку по всей стране. Скоропадский объявил, что выборы будут отложены до стабилизации ситуации"
 ukraine_revolt_events.1.a: "Мы подавим эту революцию"
 ukraine_revolt_events.1.b: "Мы свергнем гетмана!"

 ukraine_revolt_events.2.t: "Военные в хаосе"
 ukraine_revolt_events.2.d: "Несмотря на консервативный менталитет украинских вооруженных сил, воспитанный двадцатилетней политической пропагандой, многие военнослужащие, по крайней мере, симпатизируют ВДД. Широко распространены мятежи, в некоторых частях распространяются антигетманские листовки. Офицеры высшего звена арестовывались или линчевались солдатами после получения приказа бороться с крестьянским ополчением ВДД. На западе страны некоторые воинские части были полностью расформированы - либо в результате мятежа, либо полного дезертирства.\n\nОсновная часть украинской армии была расквартирована на востоке, у российской границы, вдали от очагов агитации. Теперь их перебрасывают на запад для усиления правительственных войск, что является козырем Скоропадского. Однако путь предстоит долгий, а большая часть железных дорог находится под контролем ополченцев. Если эти подкрепления успеют прибыть на запад, то это существенно изменит ситуацию"
 ukraine_revolt_events.2.a: "Восточная армия Присовского спасет нас"
 ukraine_revolt_events.2.b: "Украинец, расстреливай своих рабовладельцев и присоединяйся к революции!"

 ukraine_revolt_events.3.t: "Железнодорожная война"
 ukraine_revolt_events.3.d: "Для переброски войск по равнинам Украины в межвоенные годы была построена качественная железнодорожная система. Однако она не была рассчитана на гражданскую войну. В регионах, где ближайшие гарнизоны находятся на большом расстоянии, значительные участки основных железных дорог с востока на запад были захвачены повстанцами. В этих местах рельсы были заблокированы или разрушены, что не позволило военным эффективно перебрасывать армейские подразделения с востока на запад. Наши кавалерийские соединения и бронепоезда могут преодолеть эти препятствия, но это приведет к задержке подкреплений на несколько недель. Если бы мы отдавали предпочтение железным дорогам перед другими целями, это помогло бы нам"
 ukraine_revolt_events.3.a: "Зачищайте партизан, не рискуйте"
 ukraine_revolt_events.3.b: "Отправьте подкрепление"

 ukraine_revolt_events.4.t: "Повстанцы отрезали [93.GetCapitalVictoryPointName]" # Брест
 ukraine_revolt_events.4.d: "Город [792.GetCapitalVictoryPointName] стал первым городом, оказавшимся в руках повстанцев. Сопротивление было незначительным, поскольку большая часть гарнизона взбунтовалась или даже вступила в крестьянское ополчение ВДД. Еврейско-польское большинство городов встретило республиканские войска с ликованием. С созданием опорного пункта была перерезана главная железная дорога от [202.GetName] до [93.GetName]. Не теряя времени, Народная армия начала наступление во всех направлениях.\n\nСамая критическая ситуация сложилась в [93.GetCapitalVictoryPointName], так как город не может быть укреплен, а сельская местность вокруг него быстро объявляет о своей верности республиканскому правительству. Командующий просит разрешения обратиться за помощью к польской армии, находящейся по ту сторону границы, аргументируя это тем, что это единственный способ удержать город. Правда, повстанцы, скорее всего, будут избегать нападения на иностранных солдат, опасаясь, что это даст польской армии основание поддержать гетмана. Однако опора на иностранные войска также является признаком слабости гетмана. Альтернативный вариант - запретить им такие отчаянные мольбы и туманно пообещать поддержку до тех пор, пока они удерживают город"
 ukraine_revolt_events.4.a: "Сообщить полякам"
 ukraine_revolt_events.4.b: "С парой крестьян мы справимся"

 ukraine_revolt_events.5.t: "Поляки спасают [93.GetCapitalVictoryPointName]" # Брест
 ukraine_revolt_events.5.d: "Столкновение украинских повстанцев с гарнизоном на [93.GetCapitalVictoryPointName] вполне могло закончиться катастрофой для гетманских войск. Однако на их просьбу о поддержке откликнулась 5-я пехотная дивизия Польши, дислоцированная в [1088.GetCapitalVictoryPointName]. Опираясь на военный союз двух стран, польские войска вошли в город и укрепили его оборону настолько, что повстанцы не решились продолжать штурм, а отступили в сельскую местность [997.GetName], продолжая вести партизанскую войну оттуда"
 ukraine_revolt_events.5.a: "Неожиданно, но приятно"

 ukraine_revolt_events.6.t: "[93.GetCapitalVictoryPointName] сдался!" # Брест
 ukraine_revolt_events.6.d: "Приказ для [93.GetCapitalVictoryPointName] был ясен - сопротивляться мятежникам до последнего патрона. Однако сломить дух командующего оказалось не так-то просто. Часть гарнизона взбунтовалась, заявив, что не будет стрелять в своих соотечественников. Под давлением населения он решил отдать приказ о капитуляции и сложить оружие, так как помощь от [202.GetName] явно не скоро придет"
 ukraine_revolt_events.6.a: "Досадно!"

 ukraine_revolt_events.7.t: "Разобщенность в ВДД"
 ukraine_revolt_events.7.d: "Либеральная УРДП является исключением в ВДД, так как стоит на стороне преимущественно социалистических партий, а в прошлом она часто вступала в союз с Гетманатом. Очевидно, что к такой радикальной позиции их подтолкнули постоянные неудачи и авторитаризм гетманского режима, но эти отношения можно исправить.\n\nОни согласились принять участие в тайных переговорах с нами, получив обещание занять важные государственные посты и расширить избирательные свободы после того, как волнения утихнут. Были достигнуты дополнительные договоренности о том, что мы не будем преследовать членов УРДП и других умеренных за участие в восстании. После этих уступок УРДП стала призывать своих сторонников добиваться более \"мирных решений\" и воздерживаться от дальнейшего насилия, кроме как в целях обороны. Если нам удастся лишить ВДД еще большей поддержки, то, возможно, движение начнет распадаться"
 ukraine_revolt_events.7.a: "Это начало"

 ukraine_revolt_events.8.t: "Разделяй и властвуй"
 ukraine_revolt_events.8.d: "ВДД - это большая палаточная организация, объединенная только стремлением к свержению гетмана. Можно апеллировать к более умеренному крылу и попытаться посеять раскол среди наших противников. В частности, социал-демократическая партия УСДРП никогда не была сторонницей насилия, всегда предпочитала легальный путь, а не насильственную революцию. Публично предложив им оливковую ветвь, мы можем вернуть их за стол переговоров или, по крайней мере, нанести ущерб единству ВДД.\n\nВ своем радиообращении Дорошенко постарался принизить значение Скоропадского и дал понять, что он действительно контролирует гетманское правительство и готов продолжать переговоры. Он заверил, что все бессудные казни и грубое жестокое обращение с пленными ВДД будут караться военным трибуналом. Бойцы ВДД, вышедшие из строя, не будут преследоваться только за участие в восстании, также были даны грандиозные обещания либерализации. Он также ожидал, что ВДД будет избегать \"чрезмерных реакций\", если она действительно привержена цивилизованным ценностям. Хотя такие требования вызвали насмешки в более революционно настроенных частях ВДД, Они поколебали многих сторонников УСДРП и заставили их призвать к сдержанности, что позволило успокоить ситуацию в некоторых регионах."
 ukraine_revolt_events.8.a: "Приятно видеть, что они прислушиваются к голосу разума"

 ukraine_revolt_events.9.t: "Расщепление ВДД"
 ukraine_revolt_events.9.d: "После недавних военных неудач в центральном комитете ВДД началась процедура перекладывания вины на других. Социалисты обвиняют УДРП и УСДРП в пассивном и оборонительном мышлении, но эти обвинения лишь увеличивают разрыв между умеренными и радикалами. В значительной степени ВДД опирается на популярность этих двух партий и их контакты в Галиции, что помогает финансировать движение. Они утверждали, что прошедшие события доказали бесперспективность революции и что ВДД должна пойти на переговоры, прежде чем ее полностью разгромят.\n\nЭто \"пораженчество\" Это привело к ярость боротьбистов и других крайне левых членов, которые поклялись бороться до конца, даже если классовые коллаборационисты предадут их делу. Коммунистические силы даже начали разоружать верные УСДРП отряды в некоторых своих опорных пунктах и перешли на враждебную риторику по отношению к своему бывшим товарищам по революции. Уже через несколько дней ВДД практически раскололась на две фракции, а значительная часть ее военной силы оказалась парализованной из-за отсутствия руководства. УРДП и УСДРП уже отправили зоны мира на [202.GetName]"
 ukraine_revolt_events.9.a: "Является ли это началом конца?"

 ukraine_revolt_events.10.t: "Указ Присовского"
 ukraine_revolt_events.10.d: "В разных городах сотрудники военной полиции приступили к арестам лиц, подозреваемых в приверженности к ВДД, судьба которых пока неизвестна. Генерал Присовский выступил по радио с обращением, в котором объявил, что все \"социалистические предатели\" Они будут уничтожены любыми средствами, а желающие избежать смерти должны сдаваться в полицию. Очевидно, что гетман выбрал грубую силу и только грубую силу. Хотя это дало огромные возможности военным, в политическом плане это привело к обратному результату. Более умеренные политики из гетманской коалиции громко заявили о своей несогласии с таким курсом действий - и многие из них переходят под знамена ВДД"
 ukraine_revolt_events.10.a: "Радикально, но необходимо"

 ukraine_revolt_events.11.t: "Предатели в рядах?"
 ukraine_revolt_events.11.d: "Мы получили информацию о том, что некоторые наши более умеренные союзники из УРДП и даже УСДРП ведут тайные переговоры с правительством Дорошенко. Похоже, что он пытается посеять раскол в нашем фронте, склонив наших менее революционно настроенных союзников вернуться за стол переговоров. Хотя вероятность того, что они действительно переведут стрелки на нас, невелика, но если их удастся склонить к пассивности, это может сильно помешать нашей революции.\n\nНа данный момент об этих переговорах знает лишь узкий круг лиц, поэтому карты остаются в наших руках. Мы можем либо публично раскрыть произошедшее и тщательно дискредитировать этих предателей, что может быть очень опасно для них самих, но послужит примером для всех остальных, либо все держать в тайне и в частном порядке успокаивать этих потенциальных предателей и делать все возможное, чтобы склонить их на свою сторону."
 ukraine_revolt_events.11.a: "Выгоните этих предателей"
 ukraine_revolt_events.11.b: "Держать дело в секрете"

 ukraine_revolt_events.12.t: "Берлин требует ответов"
 ukraine_revolt_events.12.d: "Посол Германии в [202.GetName] встретился сегодня с гетманом и потребовал передать в Берлин четкий ответ: способны ли милиция и армия Украины справиться с ситуацией? Немецкие военные и правые уже призывали к вмешательству, и теперь они требуют гарантий - или официального запроса о помощи. Поскольку ситуация на местах остается крайне запутанной, трудно сказать, является ли происходящее лишь спорадическими крестьянскими бунтами или началом настоящей гражданской войны"
 ukraine_revolt_events.12.a: "Мы позвоним вам, если вы нам понадобитесь!"
 ukraine_revolt_events.12.b: "Уверяю Вас, что все под контролем!"
 UKR_very_important_tt: "§ОЭто нормально.§!"

 ukraine_revolt_events.13.t: "Бомбардировка Сарн"
 ukraine_revolt_events.13.d: "Так называемое \"восстание\" Пережило сегодня свой самый страшный день: 127 человек погибли в результате бомбардировки, проведенной по приказу гетманского правительства. Немецкие самолеты Dornier Do 123 двумя волнами сбросили несколько тонн боеприпасов на южную часть города, где, по некоторым данным, располагался региональный штаб Народной армии. Кроме того, город расположен вдоль важной железной дороги, используемой повстанцами с востока на запад, что послужило обоснованием для использования железнодорожной станции Сарны в качестве военной цели. По мере распространения этой новости раскол между украинцами становился все больше, и даже в рядах СХД бомбардировка подверглась критике за плохое планирование и точность"
 ukraine_revolt_events.13.a: "Это заставит их переосмыслить свою бессмысленную революцию"
 ukraine_revolt_events.13.b: "Печальный день для Украины..."

 ukraine_revolt_events.15.t: "Всеукраинское демократическое движение"
 ukraine_revolt_events.15.d: "Как и Польское королевство, Гетманство Украина является напоминанием о геополитических замыслах, которые отняла у нас Германия. Легион украинских сечевых стрельцов доблестно сражался в составе наших армий во время Вельткрига, Но их демократическая республика была быстро отброшена немецкими военными и их лакеем Павлом Скоропадским. С тех пор во Львове базируются остатки украинских республиканцев, руководимые бывшим генеральным секретарем по военным делам Симоном Петлюрой. Несмотря на требования об экстрадиции, мы предоставили республиканцам безопасную гавань - в конце концов, они являются гражданами Двуединой монархии и могут организовывать любые объединения. Общество австро-украинской дружбы, возглавляемое эрцгерцогом Василием фон Габсбургом, является активным сторонником более демократической Украины.\n\nПосле экономического кризиса и усиления гетманского гнета демократические силы Украины объединились и создали Всеукраинское демократическое движение (ВДД). В настоящее время они ведут массовые акции протеста и даже оказывают вооруженное сопротивление гетманским войскам, и официально мы не можем их поддержать... но и не должны им мешать. Кронштадт Лодомерия стал их базой власти, и через него они переправляют технику, людей и средства в удерживаемые ВДД сельские районы по украинскую сторону границы. Поскольку местная администрация Лодомерии более или менее благосклонна к их целям, ничего не делается для того, чтобы остановить это"
 ukraine_revolt_events.15.a: "Следите за тем, чтобы украинцам не чинили препятствий"
 ukraine_revolt_events.15.b: "Мы не можем быть свидетелями терпимого отношения к такого рода революционной деятельности"
 UKR_VDR_future_tt: "Если республиканцам удастся свергнуть гетмана, они будут нам благодарны"

 ukraine_revolt_events.16.t: "Дорога на Броды"
 ukraine_revolt_events.16.d: "Нашими спецслужбами выявлен крупный республиканский маршрут снабжения, проходящий от Львова и Бродов на галицко-лодомерской стороне до Дубно и Ровно на нашей стороне. По этому маршруту люди и техника переправлялись на украинскую сторону дружественными повстанцам австрийскими организациями, очевидно, благодаря дружественным или некомпетентным пограничникам. Наши пограничники поймали некоторое количество этих контрабандистов, но без сотрудничества с австрийской стороной очень трудно положить этому конец. Кому нужны враги, когда есть такие друзья?"
 ukraine_revolt_events.16.a: "Выразить дипломатический протест и разместить на границе дополнительные силы"
 ukraine_revolt_events.16.b: "Только протест, мы не можем выделить там силы"

 ukraine_revolt_events.17.t: "Армия закрывает границу с Галицией"
 ukraine_revolt_events.17.d: "Гетманские силы на границе с Австрией были значительно усилены людьми из оставшихся западных гарнизонов, чтобы остановить поток добровольцев из ВДД с галицийской стороны границы. Наши друзья на львовской стороне начали искать альтернативные пути, например, через Польшу или Румынию, но пока они не организованы должным образом, мы должны выживать без помощи извне. Некоторые представители военного руководства ВДД даже приветствовали такое развитие событий как потенциально выгодное для нас, Поскольку переброска сил означает уменьшение сопротивления во Внутренней Украине."
 ukraine_revolt_events.17.a: "Черт"

 ukraine_revolt_events.18.t: "Украина заявляет дипломатический протест"
 ukraine_revolt_events.18.d: "Министерство иностранных дел Украины направило нам ноту с резкими формулировками, требуя объяснить \"нарушения на границе\", особенно в районе приграничных городов Броды и Радехов. По данным украинской разведки, наши пограничники не смогли пресечь широкомасштабные преступные контрабандные операции, поддерживающие терроризм в украинском государстве. В ноте содержится требование немедленно принять меры по устранению проблем и выступить с осуждением противоправных действий Всеукраинского демократического движения"
 ukraine_revolt_events.18.a: "Дать туманные обещания, но ничего не сделать"
 ukraine_revolt_events.18.b: "Хорошо, мы начнем расследование"

 ukraine_revolt_events.20.t: "Коммуна в [192.GetName]" #Odesa
 ukraine_revolt_events.20.d: "[192.GetName], второй по величине город Украины, уже несколько недель был парализован забастовками докеров. Забастовщики возвели баррикады на центральных дорогах, а организованная боротьбистами стража по сути укрепила порт [192.GetName] и вела напряженные переговоры с городскими властями, лояльными [202.GetName].\n\n Когда в город пришла весть об открытом восстании на севере, начался настоящий ад. Боротьбисты требовали немедленной революции и полного захвата города; их более умеренные союзники все еще верили, что гетман уступит давлению. Все изменилось, когда на борту эсминца Берестье вспыхнул мятеж, который немедленно открыл огонь по армейским блокпостам, установленным вокруг гавани. Уже через несколько часов боротбисты захватили большую часть городской инфраструктуры, в том числе радиостанцию и северные пути в город. Рабочую коммуну [192.GetName] провозгласил местный лидер восстания Александр Хмельницкий, находясь в серой зоне между тем, чтобы официально не присоединяться к ВДД, но при этом бороться против гетманских войск"
 ukraine_revolt_events.20.a: "Рабочие восстают!"
 ukraine_revolt_events.20.b: "Проклятые красные"

 ukraine_revolt_events.21.t: "Николаев в огне" #Николаев
 ukraine_revolt_events.21.d: "Воодушевленные восстанием в [192.GetName], рабочие советы Николаева потребовали от городской милиции отступить и передать город революционерам, иначе начнется жестокое восстание. В городе размещена пехотная бригада, которая до сих пор поддерживала порядок. После ультиматума они запросили подкрепления, опасаясь, что Боротьбистская гвардия из [192.GetName] продвинется к Николаеву и поможет местным жителям взять город.\n\nНаши политически надежные силы ограничены, хотя лучшими силами, которые мы могли бы послать туда, был бы 1-й морской пехотный полк из [137.GetCapitalVictoryPointName]. Они являются единственным резервом в регионе до прибытия дополнительных сил с востока. Возможно, лучше пока эвакуировать город и сохранить силы для контратаки"
 ukraine_revolt_events.21.a: "Эвакуировать город и передать его повстанцам"
 ukraine_revolt_events.21.b: "Отправить подкрепление из [137.GetCapitalVictoryPointName]"

 ukraine_revolt_events.22.t: "Осада Николаева" #Николаев
 ukraine_revolt_events.22.d: "Усиленный морской пехотой город Николаев был хорошо укреплен против мятежников. Находящиеся в городе сторонники мятежников изредка нападают на наши войска, но на открытое восстание не решаются. Подразделения ВДД из [192.GetName] и с севера прибыли, чтобы перекрыть пути отхода из города, но их вторжения были успешно отбиты.\n\nЭто благодаря превосходству наших войск и в первую очередь, тяжелым орудиям наших военных кораблей, стоящих на якоре в нескольких милях от порта в качестве мобильных артиллерийских платформ, которые держатся подальше от мятежников. Город отрезан от всех сторон, кроме моря, но он должен выстоять, поскольку силы мятежников сосредоточили свое внимание на других направлениях"
 ukraine_revolt_events.22.a: "Город выживет!"

 ukraine_revolt_events.29.t: "Конец коммуны [192.GetName]" #Odesa
 ukraine_revolt_events.29.d: "В результате разгрома Народной армии на севере у республиканцев остался только один важный опорный пункт - [192.GetName]. Де-факто контролируемый Боротбистским рабочим комитетом, этот огромный город был укреплен, чтобы выдержать любой штурм. Бодрость духа поддерживается радиопередачами, обещающими, что на помощь украинцам придет Интернационал с запада. По мере того как гетманские и кайзеровские войска продвигаются на юг, сокрушая все более мелкие позиции повстанцев, этот дух постепенно угасает.\n\nВ последней, кровавой главе восстания \"Жемчужина у моря\" была атакована со всех сторон. Защитники, усиленные бойцами, отступившими с севера, сражались на улице за улицей, зная, что их павшие товарищи на севере тоже не получили пощады от гетмана. После того как как первые штурмы были отбиты, начался артиллерийский обстрел. Массивные 305-мм снаряды линкора Воля обрушились на защитников, разрушив большую часть северных районов. Загорелся знаменитый оперный театр в стиле необарокко, превращенный в больницу скорой помощи. Наконец, после многодневных боев сопротивление рухнуло. Часть бойцов боротьбистов скрылась в городских катакомбах. Те, кто пытался бежать по морю, были потоплены. Когда с дворца Потоцкого спустили красный флаг, последний оплот украинских революционеров был потерян"
 ukraine_revolt_events.29.a: "Коммунистическая мразь"

 ukraine_revolt_events.30.t: "Контратака Присовского"
 ukraine_revolt_events.30.d: "Наши разведчики на восточном берегу Днепра обнаружили большое скопление лоялистских войск, идущих в направлении [203.GetName]. Взятые с восточной границы, эти дивизии составляют основную часть лоялистов Скоропадского и наконец-то смогли начать контрнаступление, несмотря на то, что наши партизанские действия замедлили их. В брошюрах, разбросанных по региону, так называемое \"Контрнаступление Присовского\" обещает сокрушить повстанцев и вернуть стабильность и порядок в стране.\n\nУ нас есть несколько подразделений в этом районе, особенно в районе [203.GetName], но наши местные командиры не знают, что делать. Они значительно превосходят нас по численности и вооружению. Многие предлагают отступить и сосредоточиться на ведении партизанской войны, а не рисковать в открытом бою своими меньшими силами. Однако другой план предложил некий молодой капитан, утверждавший, что концентрация наших сил в городе Канове - в одном из лучших мостов через Днепр - не только вынудит гетманские войска атаковать нас через реку, но и создаст угрозу их флангу, если они решат переправиться через реку из другого места. При таком дисбалансе в численности это не выиграет сражение, но может привести к большим потерям"
 ukraine_revolt_events.30.a: "Боевое отступление"
 ukraine_revolt_events.30.b: "Защитить переправу"

 ukraine_revolt_events.31.t: "Битва за Канев"
 ukraine_revolt_events.31.d: "Генерал Присовский клюнул на удочку. Обнаружив скопление войск под Каневом, он решил двинуться туда, стремясь разгромить мятежников на поле боя, даже с невыгодной позиции. Город был укреплен, наша скудная артиллерия расположилась на другом берегу Днепра, а передовые наблюдатели контролировали поле боя с Чернечьей горы.\n\nПри такой хорошо спланированной обороне первые атаки войск Присовского района не увенчались успехом. Берег реки превратился в кровавое кладбище, и только когда у нашей артиллерии закончились снаряды, оборона начала рушиться. Можно было попытаться отступить, надеясь выиграть время для организации обороны на западном направлении, а можно было занять последнюю позицию и сражаться там до тех пор, пока не останется сил"
 ukraine_revolt_events.31.a: "Войне не нужны герои. Отступаем"
 ukraine_revolt_events.31.b: "Нет ли слаще места для смерти, чем берега Днепра?"

 ukraine_revolt_events.32.t: "Контратака наступает"
 ukraine_revolt_events.32.d: "После окончательной переправы через Днепр корпус Присовского взял курс на [198.GetName] и разрезал Свободную Украину на две части, отделив северные войска от тех, что находятся на побережье. У нас все еще нет надежных сил для честной борьбы, но мы не можем бесконечно отступать.\n\nСеверные силы под командованием генерала Александра Удовиченко были усилены и готовы к действиям, но их шансы в открытом бою рискованны. На юге есть значительные силы под командованием Юрия Тютюнника, но они планируют продвигаться к [226.GetName], так как силы гетмана заняты на севере. Ходят даже слухи, что они надеются, что поражение Удовиченко решительно изменит внутренний баланс в ВДД в пользу радикалов. Убедить их присоединиться потребует определенной дипломатии, но сделает победу гораздо более уверенной. В качестве альтернативы можно было бы применить непрямой подход и просто окружить силы Присовского и вызвать смерть от тысячи порезов - но такая сложная партизанская операция требует безупречной координации и направления всех наших ветеранов на [198.GetName] фронт"
 ukraine_revolt_events.32.a: "Победить Тютюнника и собрать превосходство в численности"
 ukraine_revolt_events.32.b: "Нанести смерть от тысячи порезов"
 ukraine_revolt_events.32.c: "Смело продвигайтесь вперед и удивите их"

 ukraine_revolt_events.33.t: "Поражение на поле"
 ukraine_revolt_events.33.d: "Открытое сражение было ошибкой. Поначалу нам удалось обойти лоялистов с флангов и даже заставить отступить несколько батальонов, но это продолжалось недолго. Ополченцы, обладающие лучшей подготовкой и техникой, были прижаты и уничтожены артиллерийским обстрелом и наступательными действиями казачьих войск. Генералу Удовиченко удалось спасти часть наших сил, но битва осталась решительным поражением"
 ukraine_revolt_events.33.a: "Не падайте духом"

 ukraine_revolt_events.34.t: "Контратака Присовского разгромлена!"
 ukraine_revolt_events.34.d: "В момент начала наступления основные силы лоялистов находились в Жашкове, где мы разгромили их арьергард, защищавший пути снабжения. Избегая прямого столкновения, отряды Присовского изматывались мелкими атаками, пока не наступила деморализация. Хотя произошло несколько крупных сражений, особенно на северном фланге, силы гетмана быстро теряли сплоченность, понимая, что попали в тупик.\n\nНекоторые части сопротивлялись еще несколько дней, другие быстро сдавались в плен. В последних боях остатки войск пытались вырваться на восток, но большинство из них не смогли уйти. Эта победа доказала, что мы способны противостоять гетманским войскам, а известия о ней сильно деморализовали нашего противника"
 ukraine_revolt_events.34.a: "Этот день станет одним из основополагающих мифов республики!"

 ukraine_revolt_events.40.t: "Ворота в [202.GetName]"
 ukraine_revolt_events.40.d: "Народная армия стоит у ворот столицы. [202.GetName] уже несколько недель находится на военном положении, и забастовки там подавляются кроваво. Многие из повстанцев в начале восстания бежали из города, но теперь они объединились с Первым корпусом Народной армии под командованием Александра Удовиченко, Вынашивая дерзкий план захвата столицы и пленения гетмана, чтобы положить конец революции до того, как иностранные реакционные силы смогут начать действовать.\n\n[202.GetName] представляет собой грозную цель. Его запруженные улицы сделают продвижение медленным и кровавым, а огромные размеры города дадут защитникам возможность играть на время. Благодаря многочисленным сторонникам в городе у нас есть хорошие сведения о противнике. Генерал Леонид Ступницкий, командующий гарнизоном [202.GetName], политически надежен, но не обладает достаточным военным умом. Его силы растянуты, ослаблены дезертирством и мятежами, не говоря уже о том, что население настроено крайне враждебно. У них много тяжелого вооружения, они сильно укрепили центр города и мосты через Днепр.\n\nВозможно, удастся застать гарнизон врасплох и поверить, что измотанные прогетманские силы рухнут при достаточно смелом ударе прямо в сердце города. Однако если натиск не удастся, и они увязнут в болоте, то люди Ступницкого одержат верх. Более амбициозный план - фланговый маневр с продвижением через городские окраины к Днепру и наступлением на центр города с трех направлений. Осуществить такой сложный маневр с нашей импровизированной организацией и отсутствием радиоаппаратуры будет опасно, но если нам это удастся, то это может стать концом режима Скоропадского"
 ukraine_revolt_events.40.a: "Наносите удар до того, как они успеют среагировать"
 ukraine_revolt_events.40.b: "Разделите силы и обойдите их с фланга"
 ukraine_revolt_events.40.a.tt: "Мы выиграем битву немедленно, если силы гетмана будут достаточно истощены, но если нет..."
 ukraine_revolt_events.40.b.tt: "Это затянет сражение, но при правильной стратегии мы одержим решительную победу"

 ukraine_revolt_events.41.t: "Битва за [202.GetName]"
 ukraine_revolt_events.41.d.success: "Смелый план увенчался успехом. Нашим войскам удалось с наступлением темноты проникнуть вглубь города и имея превосходство в численности, прорвать баррикады Берестейского проспекта. Защитники были слишком рассредоточены, и когда они попытались укрепить южные районы, наши войска оказались почти в центре города. Генералу Ступницкому удалось спастись благодаря удаче, и он перевел свой штаб на другую сторону Днепра.\n\nСкоропадский и его министры бежали раньше, направляясь на север. Артиллерия города была захвачена, и вскоре дезорганизованные проправительственные силы стали массово сдаваться в плен, связь с командующим прервалась. Взятие [202.GetName] фактически означает победу восстания - это и опорный пункт логистики и коммуникаций армии, и огромное пропагандистское значение."
 ukraine_revolt_events.41.d.failure: "Смелый план оказался удачной попыткой. С наступлением темноты нашим войскам удалось проникнуть вглубь города и имея превосходство в численности, прорвать баррикады Берестейского проспекта.\n\n Однако резервы противника оказались быстрее и многочисленнее, чем мы ожидали, и штурм завяз по большинству направлений. Оказавшись перед выбором: Вступить в бой на истощение без должной артиллерийской поддержки или отступить, командующий войсками Александр Удовиченко предпочел сохранить мобильность и отвести войска из города. Катастрофа была предотвращена, но наши потери оказались значительными"
 ukraine_revolt_events.41.a: "Да здравствует республика!"
 ukraine_revolt_events.41.b: "Просто неудача"

 ukraine_revolt_events.42.t: "Контратака под Мышаловкой"
 ukraine_revolt_events.42.d: "На севере Днепр был достигнут в районе Вышгорода, который имел лишь слабую оборону. На юге наши войска попытались захватить врасплох недостроенную крепость Лысая Гора - артиллерийские позиции на холме контролируют подступы к городу с юга. Замысел провалился, так как сильный кавалерийский отряд ударил по нашему южному флангу через лес к югу от жилого района Мышаловка. Южный пинцет так и не дошел до реки, и панические призывы о помощи были направлены нашим основным силам к западу от города"
 ukraine_revolt_events.42.a: "Придерживайтесь плана и укрепляйте их"
 ukraine_revolt_events.42.b: "Их жертву будут помнить. Атакуйте город немедленно!"

 ukraine_revolt_events.43.t: "Битва за [202.GetName]"
 ukraine_revolt_events.43.d.success: "Импровизированный план сработал. Многие защитники были слишком сосредоточены на сражении на юге вокруг Лысой Горы. Сила и скорость атак с севера и запада застала врасплох тонко сгруппированных защитников, которые во многих местах были отрезаны и вынуждены сдаться. Когда прогетманские войска к югу от города отреагировали, было уже поздно. Генералу Ступницкому удалось спастись благодаря удаче, и он перевел свой штаб на другой берег Днепра.\n\nСкоропадский и его министры бежали раньше, направляясь на север. Артиллерия города была захвачена, а южная контратака отбита с большими потерями. Взятие [202.GetName] фактически означает победу восстания - это и оплот логистики и коммуникаций армии, и огромная пропагандистская ценность"
 ukraine_revolt_events.43.d.failure: "Импровизированный план не сработал. Большая часть защитников была сосредоточена на сражении на юге, вокруг Лисьей Горы, но мы были слишком рассредоточены. Несмотря на первоначальное продвижение вглубь города, нам так и не удалось создать полноценный прорыв. Наша южная группировка была уничтожена под ударом прогетманских казачьих частей, которые затем быстро ударили во фланг. Быстрое отступление спасло нас от полного разгрома, но потери в живой силе были значительными"
 ukraine_revolt_events.43.a: "Да здравствует республика!"
 ukraine_revolt_events.43.b: "Просто неудача"

 ukraine_revolt_events.44.t: "Южный пинцет распадается"
 ukraine_revolt_events.44.d: "Два батальона были спешно направлены на помощь нашему южному плацдарму между Мышаловкой и Лысой Горой. Они едва успели стабилизировать ситуацию, как с юга стали прибывать все новые и новые подкрепления. Не имея возможности продвинуться к реке, как планировалось, южная группировка потребовала прекратить операцию.\n\nОтвет был малозначителен - следующая атака гетманских войск полностью разгромила южную группировку и ударила по нашим основным силам с такой силой, что едва не вызвала всеобщую панику. Чтобы уберечь лучшие части Народной армии от уничтожения, было объявлено боевое отступление"
 ukraine_revolt_events.44.a: "Катасрофа!"

 ukraine_revolt_events.45.t: "Окруженный [202.GetName]"
 ukraine_revolt_events.45.d: "Республиканские войска отрезали все пути к [202.GetName]. Гарнизон города еще силен, имеет приличное количество артиллерии, но он безнадежно разбросан по огромному городу. Скоропадский покинул город; генералу Леониду Ступницкому поручено оборонять \"крепость [202.GetName]\" до прибытия прогетманских и германских войск, чтобы снять с нее оборону. Однако эта надежда оказалась тщетной. Казачьи части Ивана Полтавца-Острянича пытались продвинуться к [202.GetName], но увязли в постоянных партизанских атаках в юго-восточной части города.\n\nКогда началось общее [202.GetName]наступление Народной армии, стало ясно, что город не удержать. Сопротивление было мужественным, местами прогетманские части удерживали позиции, но их было слишком мало, и они не могли удержать все. К сумеркам орудия в основном замолчали. Взятие города фактически означало победу восстания - он являлся и опорным пунктом логистики и коммуникаций армии, и имел огромное пропагандистское значение."
 ukraine_revolt_events.45.a: "Так пал гетман"

 ukraine_revolt_events.46.t.success: "Наступление мятежников на [202.GetName]"
 ukraine_revolt_events.46.t.failure: "Падение [202.GetName]а"
 ukraine_revolt_events.46.d.success: "Повстанческая армия под командованием Александра Удовиченко стоит у ворот столицы. У повстанцев есть смелый план - захватить столицу и пленить гетмана, положив конец революции до того, как иностранные державы смогут начать действовать. Наши позиции в [202.GetName] сильны - его забаррикадированные улицы сделают продвижение медленным и кровавым, а огромные размеры города дадут защитникам возможность играть на время. Генерал Леонид Ступницкий, командующий гарнизоном [202.GetName], политически надежен и пользуется популярностью среди своих подчиненных.\n\nТеперь было несколько опасных моментов, но нашим войскам удалось сдержать мятежников. Учитывая превосходство в технике и подготовке, мятежники не могли рассчитывать на прорыв в честном бою и были вынуждены отступить, понеся значительные потери"
 ukraine_revolt_events.46.d.failure: "Повстанческая армия под командованием Александра Удовиченко стоит у ворот столицы. Повстанцы вынашивают смелый план: захватить столицу и пленить гетмана, положив конец революции до того, как иностранные державы смогут начать действовать. Наши позиции в [202.GetName]е сильны - его забаррикадированные улицы сделают продвижение медленным и кровавым, а огромные размеры города дадут защитникам возможность играть на время. Генерал Леонид Ступницкий, командующий гарнизоном [202.GetName]а, политически надежен и пользуется популярностью среди своих людей.\n\nНаступила катастрофа. План мятежников был изощренным - они сосредоточились на окружении города, и не успели мы перегруппировать свои силы, как они нанесли удар. Наступление застопорилось на юге, но после мужественного сопротивления на севере наши силы потерпели крах и были перебиты и отрезаны повстанцами. Было уже поздно, когда Ступницкий приказал отступать к центру города. Мужественные защитники были окружены и перебиты, город пал. Так закончилось правление Скоропадского."
 ukraine_revolt_events.46.a: "Повстанческая мразь"
 ukraine_revolt_events.46.b: "Так пал гетман"

 ukraine_revolt_events.50.t: "Панцеры пересекают границу"
 ukraine_revolt_events.50.d: "[GetDateText], первые части немецкой армии пересекли нашу западную границу в сопровождении польской дивизии и небольших контингентов литовских и белорусских войск. Гетман узаконил это вторжение на Украину, официально запросив помощь против революционеров. Азартная игра Скоропадского на время оправдала себя, поскольку он все еще удерживает [202.GetName], а его армия не распалась, как надеялись повстанцы.\n\nЧасти Народной армии на Западной Украине были быстро разбиты численно и материально превосходящими немецкими частями. Большинство из них, потеряв большую часть тяжелой техники, захваченной на армейских складах, рассеялись по сельской местности. Нескольким батальонам удалось на сутки остановить продвижение к реке Стырь, но они были вынуждены отступить, так как закончились артиллерийские снаряды. Одновременно верные Скоропадскому войску, многие из которых были переброшены с российской границы, перешли в наступление. Народная армия распалась между молотом и наковальней, и под ее контролем остались лишь некоторые южные районы и значительная часть отдаленной сельской местности.\n\nНесмотря на то, что Скоропадский преуменьшает значение немецких войск, и союзникам, и врагам ясно, Что он никогда еще не выглядел такой марионеткой кайзера, как сейчас, когда победоносные немецкие войска маршируют по столице."
 ukraine_revolt_events.50.a: "Еще одна украинская революция была погашена прусским сапогом"

 ukraine_revolt_events.51.t: "Оружие молчит"
 ukraine_revolt_events.51.d: "На закате вечера представители правительства, все еще забаррикадировавшиеся в восточных кварталах [202.GetName], встретились с Симоном Петлюрой на историческом Николаевском мосту, чтобы подписать соглашение о прекращении огня, положившее конец восстанию.\n\nВо время хаоса гетман Скоропадский эвакуировал себя и свою семью на небольшой аэродром за городом под охраной бойцов Сердюкской гвардейской дивизии. Объявив кабинету министров о своем отречении, он выступил по радио с кратким историческим обращением к народу Украины.\n\n\"Я, гетман всея Украины, восемнадцать с половиной лет отдавал все свои силы на то, чтобы вывести страну из того тяжелого состояния, в котором она находилась. Бог не дал мне сил справиться с этой задачей. Теперь, учитывая сложившиеся условия, руководствуясь исключительно благом Украины, я ухожу от власти.\n\nОтаман-министр взял на себя бразды правления, но дал понять, что намерен немедленно начать переговоры с победившей ВДД после того, Как верховное командование сообщило, что дальнейшая борьба будет бесполезной.\n\nПосле того, как осела пыль, повстанцы и солдаты сложили оружие. То, что когда-то было фантазией мечтателей и диссидентов, стало реальностью: Украина снова будет греться в лучах свободы."
 ukraine_revolt_events.51.a: "Ще не вмерла Україна, і слава, і воля!"

 ukraine_revolt_events.52.t: "Оружие молчит"
 ukraine_revolt_events.52.d: "Революционная армия была разбита и загнана в подполье. Большая часть руководства была арестована и расстреляна, хотя по основной части руководства ВДД удалось благополучно скрыться. Их местонахождение неизвестно, но гетман заверил, что они будут найдены и привлечены к ответственности за \"сговор с иностранными державами с целью уничтожения украинского народа.\" Однако все бывшие повстанцы могут быть помилованы, если они помогут правоохранительным органам выявить тех, кто еще не сдался.\n\nОстатки повстанцев отступили в отдаленные районы западной и северной Украины, где их прячут и снабжают села, еще дружественные республиканскому делу. Перед армией стоит задача умиротворить эти регионы и как можно быстрее уничтожить оставшихся партизан."
 ukraine_revolt_events.52.d2: "Революционная армия отступила до [792.GetCapitalVictoryPointName], где наиболее преданные республиканские бойцы забаррикадировали город в безнадежной последней попытке продолжить восстание. Однако их усилия оказались тщетными, так как они были урезаны в численности и вооружении, а их позиции продержались недолго, так как в город вошли прогетманские войска. На закате вечера представители гетманского правительства во главе с отаманом-министром Дмитрием Дорошенко встретились с республиканским лидером Максимом Славинским у памятника Тарасу Шевченко. Там Славинский подписал соглашение о прекращении огня, официально положив конец боевым действиям. Остальные представители республиканского руководства бежали за границу в неизвестном направлении, но большая часть народной армии сложила оружие, когда пыль улеглась. На армию будет возложена задача умиротворения оставшихся в живых сторонников на время заключения мира."
 ukraine_revolt_events.52.a: "Наконец-то стабильность"

 ukraine_revolt_events.53.t: "Увеличение влияния СГД"
 ukraine_revolt_events.53.d: "Последние несколько недель восстания ознаменовались большим расширением полномочий военных. Хотя Сойм и отаман-министр высказывали гетману различные мнения о том, как поступить с республиканскими предателями, Их часто игнорировали или оттесняли на второй план в пользу деятелей из армии и СГД.\nВ исполнительную канцелярию все чаще заходят такие видные деятели последней, как Борис Хомзин и Иван Полтавец-Острянец, а Сойм, похоже, становится все слабее и слабее. Мало кто сомневается, что эти действия в долгосрочной перспективе будут иметь тяжелые последствия для демократии..."
 ukraine_revolt_events.53.a: "Я вижу..."

 ukraine_revolt_events.54.t: "Добровольцы из [BLR.GetNameDef]"
 ukraine_revolt_events.54.d: "До сих пор у наших войск было мало иностранных сторонников. Хотя Германская империя официально сохраняет военный союз с Украиной, в Берлине было признано, Что в случае победы республиканцев над Скоропадским новое правительство будет признано в пользу гетманского. Тем не менее, это не помешало другим странам, союзным Германии, особенно Польше, Республиканское движение, в результате которого получилось значительное развитие, направить гетману небольшое количество добровольцев и снаряжения. Более того, Австрия, хотя и симпатизирует нашему делу, в большинстве своем воздерживается от прямой помощи, Чтобы сохранить приличные отношения с Германией и не оттолкнуть гетмана в случае его победы.\n\n Но в обстановке сомнений и скептицизма одна страна на нашем севере оказалась бастионом света: Белорусская Народная Республика. Хотя ее руководство не давало никаких комментариев и не пыталось напрямую поддержать наше начинание, небольшое число белорусских добровольцев, Приверженных тем же демократическим и республиканским идеалам, которые отстаиваем мы, пересекли границу, чтобы присоединиться к нашей стороне. Правительство в Минске, похоже, позволило этим добровольцам пересечь границу практически незамеченными, В то время как силы из других стран Рейхспакта контролируются и ограничиваются из-за военного союза с правительством Гетмана. Несмотря на то, что их численность невелика и скорее всего, не принесет существенной пользы на поле боя, Их пополнение стало большим стимулом для нашей армии, показав, что мы не одиноки в борьбе с силами тирании и угнетения."
 ukraine_revolt_events.54.a: "Вместе за свободную Восточную Европу!"

 ukraine_revolt_events.99.t: "Остатки мятежников"
 ukraine_revolt_events.99.d: "После капитуляции большей части сил ВДД оставшиеся радикалы разделились на различные ячейки, не имеющие собственной центральной организации. Остались крестьянские повстанцы, верные делу Петлюры, но более левые группы отделились и перешли к революционному терроризму.\n\nПолиция и армия прочесывают сельскую местность, выкашивая оставшихся повстанцев, но работа идет медленно, и жертвы нередки. Особенно ненавистны взрывы - старая добрая социал-революционная традиция еще с царских времен - военных чиновников, которые часто приводят и к другим жертвам. Приговоры тоже суровы, поскольку большинство повстанцев на этом этапе ожидает расстрел - иногда даже без суда и следствия, якобы они \"погибли в перестрелке при сопротивлении аресту\"."
 ukraine_revolt_events.99.a: "Какая трагедия"

 ukraine_revolt_events.103.t: "Неповторимый офицер"
 ukraine_revolt_events.103.d: "Быстро зачищая остатки ВДД в [199.GetCapitalVictoryPointName], наши военные сделали неожиданное открытие. Осадив небольшой загородный дом, давно покинутый хозяевами и служивший командным пунктом для повстанцев, Наши войска встретили ожесточенное сопротивление и после долгого боя смогли заставить их сдаться.\n\nКогда пушки замолчали, из дома появилась знакомая фигура, объявившая себя командиром и попросившая амнистировать своих людей, взяв на себя ответственность за случившееся. Несмотря на первоначальный шок, выяснилось, что офицер - не кто иной, как самопровозглашенный король Украины эрцгерцог Вильгельм, более известный как Василий Вышиваный.\n\nПосле ареста и отправки в ближайший лагерь Вильгельма подвергли допросу и потребовали признаться, что он присутствует здесь для продвижения австро-польских интересов в Гетманате. Однако эрцгерцог утверждает, что пришел по своей воле и воевал не за кого иного, как за народ Украины. Ходят слухи, что его необычные показания, а также рассказы о его прежних подвигах во время Вельткрига убедили некоторых солдат, Но правительство настаивает на том, чтобы с ним обращались как с любым другим пленным. Уже разрабатываются планы по его переводу в более надежную столичную тюрьму, хотя, несомненно, уже через неделю он вернется в Лемберг."
 ukraine_revolt_events.103.a: "Посмотрим, что скажут австрийцы"

 ukraine_revolt_events.104.t: "Австрийцы ходатайствуют об освобождении Вильгельма"
 ukraine_revolt_events.104.d: "От нашего посла в Вене поступило сообщение, что Австрия ходатайствует о немедленном освобождении Вильгельма. Австрийский посол в [202.GetCapitalVictoryPointName] передал телеграмму от австрийского правительства, в которой объясняется, Что необычное появление Вильгельма на нашей территории объясняется тем, что \"его яхта потеряла курс на Днепр\" и просто искала помощи, что, по иронии судьбы, прямо противоречит его собственному рассказу.\n\nДалее было отмечено, что австрийское правительство якобы не знало о его присутствии и продолжает отрицать наличие каких-либо австрийских подданных на Украине. Хотя их слова и пусты, это лучшее, что мы можем получить на данный момент."
 ukraine_revolt_events.104.a: "Как и ожидалось"

 ukraine_revolt_events.105.t: "Красный принц сбегает!"
 ukraine_revolt_events.105.d: "В середине ночи некоторые из оставшихся в регионе повстанцев напали на военную базу, где содержался эрцгерцог Вильгельм. В хаосе нападения Вильгельму удалось бежать из заточения, и в настоящее время он скрывается в сельской местности, вероятно, уже на пути в Галицию. Хотя официально считается, что именно нападение повстанцев дало ему шанс на побег, утверждается, Что его тюремщики и некоторые из защищавшихся солдат не предприняли никаких попыток остановить его, а некоторые, возможно, даже помогли ему бежать.\n\nПо причине неоднозначного характера произошедшего мы, скорее всего, никогда не узнаем, что произошло на самом деле.  Где бы он ни был сейчас, это, несомненно, станет еще одной главой в истории его зарубежных приключений, а его наследие, несомненно, будет жить."
 ukraine_revolt_events.105.a: "Счастливо оставаться, Василий Вышиваный"

 ukraine_revolt_events.106.t: "Возвращение эрцгерцога Вильгельма"
 ukraine_revolt_events.106.d: "Эрцгерцог Вильгельм, находившийся в военном заключении после захвата в [199.GetCapitalVictoryPointName], официально возвращен из украинского государства. После прибытия на поездку в Лемберг эрцгерцог был встречен огромной толпой ликующих украинцев, которые стекались к нему из окрестностей. В беседе с прессой он отказался давать подробные комментарии о своем местонахождении. Пусть это и не встреча с героем, но его история войдет в историю."
 ukraine_revolt_events.106.a: "Добро пожаловать домой, Вильгельм!"

 ukraine_revolt_events.107.t: "Эрцгерцог Вильгельм пересекает границу"
 ukraine_revolt_events.107.d: "После заключения под стражу в [199.GetCapitalVictoryPointName], Василий смог бежать во время атаки повстанцев и добраться до галицийской границы, причем украинские пограничники не предприняли никаких попыток остановить его переход. Несмотря на то, что в Украине он все еще находился в розыске, посол Гетманата в Вене получил информацию о том, Что человек по имени эрцгерцог Вильгельм не принимал участия в восстании, но ордер на арест выдан на одного \"Василия Вышиваного\"."
 ukraine_revolt_events.107.a: "Добро пожаловать домой, Василий!"

 ukraine_revolt_events.108.t: "Об отпускниках и эрцгерцогах"
 ukraine_revolt_events.108.d: "Недавно в Министерство иностранных дел на Баллхаусплац поступил гневный звонок из украинского посольства: За последние несколько недель в границу пересекло большое количество австрийских граждан, что, по мнению посла, связано с недавними событиями на Волыни. Более того, он утверждает, что один из этих \"отпускников\" - не кто иной, как эрцгерцог Вильгельм. Министерство дало довольно скудный ответ: Они опечатают границу, если украинское правительство официально попросит об этом (косвенное признание глубокого кризиса на Украине), и обеспечат пребывание эрцгерцога в Австрии.\n\nНо посол не знал, насколько глубока кроличья нора австрийского участия. Военное министерство в последнее время предоставляло щедрые отпуска галицийским военнослужащим, а консул Украины в Лемберге помогал Эвиденцбюро с визами и разведданными.\n\nПозже сам император сообщилт, что его родственника в последний раз видели на яхте в Лошине на Адриатике, прекрасно зная, что автомобиль эрцгерцога уже пересек границу Украины под управлением некоего \"Василия Вышиваного\." за несколько дней до официального запроса."
 ukraine_revolt_events.108.a: "Иди вперед, Василий, ты нужен своей стране"

 ukraine_revolt_events.109.t: "Восстание на Украине"
 ukraine_revolt_events.109.d: "Экономический кризис Черного Понедельника, охвативший весь мир, привел к беспорядкам в Остштатене. Особенно тяжело пришлось украинскому государству: аграрная экономика страны прогибается под собственной тяжестью. В стране, и без той представляющей собой котел со стрелками, теперь разразилась гражданская война, В ходе которой наш давний союзник Симон Петлюра и его республиканская коалиция возглавили восстание на Западе.\n\nПосол Украины в Берлине заверил нас, что ситуация находится под контролем, и это не нанесет ущерба положению Оствала и политической ситуации в Украине. Тем не менее, мы мало что можем сделать для реального вмешательства.Экономический кризис Черного Понедельника, охвативший весь мир, привел к беспорядкам в Остштатене. Особенно тяжело пришлось украинскому государству: аграрная экономика страны прогибается под собственной тяжестью. В стране, и без той представляющей собой котел со стрелками, теперь разразилась гражданская война, В ходе которой наш давний союзник Симон Петлюра и его республиканская коалиция возглавили восстание на Западе.\n\nПосол Украины в Берлине заверил нас, что ситуация находится под контролем, и это не нанесет ущерба положению Оствала и политической ситуации в Украине. Тем не менее, мы мало что можем сделать для реального вмешательства."
 ukraine_revolt_events.109.a: "Выглядит серьезно"

 ukraine_revolt_events.130.t: "Гетман Скоропадский бежит из Украины"
 ukraine_revolt_events.130.d: "Уже некоторое время немецкое государство-клиент Украина, возглавляемое гетманом Павлом Скоропадским, охвачено республиканским восстанием. Теперь, похоже, будущее гетманата под угрозой, поскольку стало известно, что Скоропадский бежал из страны.\n\nПосле успешного штурма [202.GetName] республиканская оппозиция провозгласила восстановление Украинской Народной Республики. Несмотря на то, что это событие поставило под сомнение способность Германии удерживать свои восточные страны-клиенты, Новое правительство уже обратилось к Берлину для переговоров о дальнейших отношениях."
 ukraine_revolt_events.130.a: "Передать телеграмму в [202.GetName]. Сейчас."
 ukraine_revolt_events.130.b: "Передать телеграмму в [202.GetName], сейчас!"
 ukraine_revolt_events.130.c: "...наши оборонительные планы будут в порядке, верно?"
 ukraine_revolt_events.130.e: "Будем надеяться, что роль г-на Винниченко в этом не будет забыта..."
 ukraine_revolt_events.130.f: "Вот что происходит, когда вы зависите от мелких тиранов"
 ukraine_revolt_events.130.g: "Может ли Оствал существовать без Украины?"

 ukraine_revolt_events.131.t: "Неудавшееся восстание на Украине"
 ukraine_revolt_events.131.d: "В течение некоторого времени государство Украина, являющееся клиентом Германии и возглавляемое гетманом Павлом Скоропадским, Было втянуто в восстание, возглавляемое республиканской оппозицией, первоначально действовавшей в австрийской Галиции. Теперь, похоже, будущее Гетманата обеспечено: республиканские силы вытеснены из страны за исключением нескольких небольших очагов сопротивления, разбросанных по западной части государства.\n\nПосле восстания гетманское правительство продолжает проводить консервативный курс под руководством \"Гетманской коалиции\", но ожидается, что предстоящие выборы станут поворотным моментом, который может сильно изменить украинскую политику."
 ukraine_revolt_events.131.d2: "В течение некоторого времени государство Украина, являющееся клиентом Германии и возглавляемое гетманом Павлом Скоропадским, Было втянуто в восстание, возглавляемое республиканской оппозицией, первоначально действовавшей в австрийской Галиции. Теперь, похоже, будущее Гетманата обеспечено: республиканские силы вытеснены из страны за исключением нескольких небольших очагов сопротивления, разбросанных по западной части государства.\n\nОкончание восстания ознаменовало победу авторитарных сторонников жесткой линии и верных Гетману, которые использовали восстание как предлог для приостановки Сойма и консолидации власти."
 ukraine_revolt_events.131.a: "Надеюсь, на этом все и закончится..."
 ukraine_revolt_events.131.b: "Вызовите министра иностранных дел. Василий опять вляпался в неприятности..."
 ukraine_revolt_events.131.c: "О, слава Богу."
 ukraine_revolt_events.131.e: "Уже трижды гетман воевал с собственным народом. Сколько их будет еще?"
 ukraine_revolt_events.131.f: "Надо было давно расстрелять этого мятежника..."
 ukraine_revolt_events.131.g: "Будет ли Украина когда-нибудь знать мир?"

#Negotiations with VDR
 ukraine_negotiations_events.1.t: "Переговоры с УРДП"
 ukraine_negotiations_events.1.d: "Страна стоит на грани хаоса. Позиция гетмана ясна - если \"Сойм\" не сможет разрядить ситуацию, он будет отброшен в сторону. В ход пойдет оружие, погибнут люди, возможно, даже сама украинская демократия. Понимая все это, отаман-министр Дорошенко собрал группу своих самых доверенных людей и начал переговоры по решению первой проблемы - единства самого \"Сойма\".\n\nНа данный момент УРДП относится к ВДР как минимум с пониманием, граничащим с открытой симпатией. Это и понятно - под руководством Скоропадского им не удалось провести свою политику. Чтобы получить их поддержку, ситуация должна измениться. В ходе напряженных переговоров между Дорошенко и Шульгиным был заключен жесткий договор: демократические реформы, борьба с коррупцией - все это в обмен на поддержку НПСР, а главное, на роль посредника между правительством Дорошенко и ВДР. Теперь, получив подавляющее большинство в Сойме, правительство могло начать работу по достижению взаимопонимания с социалистической оппозицией."
 ukraine_negotiations_events.1.a: "Мирное решение еще возможно."

 ukraine_negotiations_events.2.t: "Конфликт внутри коалиции"
 ukraine_negotiations_events.2.d: "Оптимистичные планы Дорошенко не нашли отклика у правого крыла. Борис Гомзин обвинил отамана-министра в том, что тот усугубляет кризис, не предпринимая решительных и жестких действий. СГД и часть военных предложили правительству бастовать уже сейчас и не обращать внимания на попытки либералов тянуть время, которые только дают социалистам время для организации. Массовые аресты и налеты на известные убежища ВДР могли бы обезглавить зверя одним стремительным ударом - если бы только отаман-министр не был так слаб и нерешителен, утверждают они. Окончательное решение остается за гетманом."
 ukraine_negotiations_events.2.a: "Найти мирное решение."
 ukraine_negotiations_events.2.b: "Куй железо, пока горячо."

 ukraine_negotiations_events.3.t: "Упреждающий удар"
 ukraine_negotiations_events.3.d: "Ночью наши войска атаковали различные конспиративные квартиры ВДД в ряде крупных западных городов. Проведены региональные массовые аресты, взяты под стражу лица, подозреваемые в предательской деятельности. Наши агенты внутри ВДР утверждают, что в результате удара организация ВДР в различных регионах практически уничтожена, а остальным предстоит лишь зачистка. Однако менее оптимистично настроенные члены Коалиции скептически относятся к тому, что ВДР будет так легко разгромлена, и к тому, что полученные сведения верны."
 ukraine_negotiations_events.3.a: "Отличная новость?"

 ukraine_negotiations_events.4.t: "Приглашение в ВДД"
 ukraine_negotiations_events.4.d: "Получив зеленый свет от гетмана, отаман-министр Дорошенко предложил руководству ВДД начать переговоры, причем сообщения передаются через руководителя фракции УРДП в Сойме Андрея Никовского. Если республиканцы - и конкретно Симон Петлюра - согласятся, то возможно даже мирное прекращение протестов."
 ukraine_negotiations_events.4.a: "Надеюсь, они увидят причину."

 ukraine_negotiations_events.6.t: "ВДД согласно!"
 ukraine_negotiations_events.6.d: "Хорошие новости дошли до Сойма! Азартная игра Дорошенко оправдалась, и руководство ВДД заявило о готовности начать переговоры, как только они будут назначены, причем небольшая делегация от ВДР во главе с членом УСДРП Андреем Ливицким и членом УПС-Р Всеволодом Голубовичем. Хотя успех еще не доказан, их реакция стала существенным стимулом для Дорошенко и его более мягкого подхода в Сойме, настроив некоторых скептиков на осторожно-оптимистический лад."
 ukraine_negotiations_events.6.a: "Настоящая работа начинается сейчас."

 ukraine_negotiations_events.7.t: "Вопрос о заключенных"
 ukraine_negotiations_events.7.d: "Перед началом серьезных переговоров ВДР выдвигает одно требование: освобождение политических заключенных и приостановление всех текущих политических процессов. В обмен на это ВДР обещает сдержать протесты и прекратить некоторые из нынешних забастовок.\n\nХотя согласие на освобождение было бы, безусловно, жестом доброй воли по отношению к ВДР, в коалиции есть опасения, что ВДР воспользуется освобождением для усиления своих протестов. Среди этих политзаключенных много агитаторов и организаторов, которые могут даже радикализировать рядовых членов ВДР... но это их первое требование."
 ukraine_negotiations_events.7.a: "Им нельзя доверять."
 ukraine_negotiations_events.7.b: "Мы должны договориться ради страны."

 ukraine_negotiations_events.8.t: "Смерть в [192.GetName]"
 ukraine_negotiations_events.8.d: "Несмотря на заверения ВДР в том, что они обуздают протестующих в обмен на освобождение заключенных, недавние события в [192.GetName] показали, что они контролируют протестующих меньше, чем готовы признать. Забастовка работников доков в [192.GetName] обернулась смертельным исходом, когда противостояние между полицией и забастовщиками переросло в перестрелку, унеся по меньшей мере две жизни.\n\nКакова бы ни была причина, терпение ВДР в коалиции иссякает, и СГД предупредил Дорошенко о необходимости прекращения переговоров."
 ukraine_negotiations_events.8.a: "Переговоры должны продолжаться."
 ukraine_negotiations_events.8.b: "Они зашли слишком далеко. Прекратить переговоры."

 ukraine_negotiations_events.9.t: "СХД вмешивается"
 ukraine_negotiations_events.9.d: "Не получив серьезного отпора от Дорошенко по поводу инцидента в [192.GetName], Борис Хомзин обратился непосредственно к гетману. После длительных переговоров он убедил Скоропадского поддержать подход СГД, заявив, что повстанцы просто играют на время и переходят в наступление.\n\n Согласившись, Скоропадский дал понять отаман-министру Дорошенко, что переговоры - это лишь отвлекающий маневр, а решительные действия полиции должны быть предприняты быстро, и если он не согласится, то гетман найдет себе министра, который согласится."
 ukraine_negotiations_events.9.a: "О нет..."

 ukraine_negotiations_events.10.t: "Контрпредложение"
 ukraine_negotiations_events.10.d: "Удивительно, но делегат Ливицкий признал вину ВДД в инциденте [192.GetName] и выразил желание продолжить переговоры. В качестве демонстрации доброй воли они готовы раскрыть местонахождение некоторых своих тайников с оружием в обмен на продолжение переговоров. Трудно понять, насколько искренним является это предложение."
 ukraine_negotiations_events.10.a: "Они пытаются быть разумными, мы тоже должны."
 ukraine_negotiations_events.10.b: "Их ошибки так просто не прощаются."

 ukraine_negotiations_events.11.t: "Вопрос представительства"
 ukraine_negotiations_events.11.d: "Теперь, когда обе стороны, несмотря на все неудачи, согласились продолжить переговоры, необходимо ответить на вопрос, кто будет представлять правительство на переговорах. Делегация ВДР хочет обсуждать реформы непосредственно с гетманом, так как хочет получить гарантию того, что переговоры будут искренними. В конце концов, гетман имеет возможность отменить любые обещания своих политиков, поэтому обещания кого-либо еще мало что значат.\n\nСГД и сам гетман против этого. Они не хотят признавать ВДР в качестве равноправного партнера на переговорах, который может вести переговоры с главой государства напрямую, как если бы он был легитимным правительством. По мнению Скоропадского, достаточно, чтобы государство представлял отаман-министр Дорошенко. Наконец, сын гетмана Данил был предложен вместе с Дорошенко в качестве компромиссной кандидатуры из-за его конституционалистских взглядов."
 ukraine_negotiations_events.11.a: "Попробуйте убедить Скоропадского."
 ukraine_negotiations_events.11.b: "ВДД придется иметь дело с Дорошенко."
 ukraine_negotiations_events.11.c: "Предложите в качестве альтернативы Данила вместе с Дорошенко."

 ukraine_negotiations_events.12.t: "Переговоры провалились"
 ukraine_negotiations_events.12.d: "Похоже, что, несмотря на требования ВДД, решение о том, чтобы гетман непосредственно представлял переговоры между государством и ВДР, было ошибочным. Скоропадский задался вопросом, в каком положении находится ВДР, чтобы выдвигать подобные требования, которые он приравнял к большевизму, и подчеркнул, что его правительство уже предприняло решительные действия по выходу из экономического кризиса путем принятия закона о помощи. Поскольку предложения ВДР показались Скоропадскому бессмысленными, их представители покинули стол переговоров, и похоже, что переговоры закончатся без четкого ответа..."
 ukraine_negotiations_events.12.a: "О нет..."

 ukraine_negotiations_events.13.t: "Переговоры провалились"
 ukraine_negotiations_events.13.d: "Решение о том, что Дорошенко будет представлять правительство, похоже, было ошибочным. ВДР признал этот шаг как проявление доброй воли, однако указал на присущие ему проблемы, заявив, что, хотя Дорошенко и может вести переговоры, нет никакой гарантии, что все, о чем будет достигнута договоренность, будет признано гетманом, и следовательно, любые дальнейшие переговоры будут бессмысленными..."
 ukraine_negotiations_events.13.a: "О нет..."

 ukraine_negotiations_events.14.t: "Вопрос о земельной реформе"
 ukraine_negotiations_events.14.d: "Компромисс оказался достаточным для ВДД. Были согласованы очные переговоры, которые должны были состояться в небольшом перекрестке Калиновка под [198.GetName]. Настроение было напряженным, когда туда прибыли гетманы Данил Скоропадский и отаман-министр Дорошенко с группой представителей Сойма и сравнительно небольшим отрядом милиции. ВДД было представлено комитетом, возглавляемым лично Симоном Петлюрой, а также лидером социалистов Никифиром Григорьевым. У них также была своя охрана из солдат, хотя обе стороны договорились ограничить присутствие своих сил безопасности в отдельных частях города и подальше от здания переговоров.\n\nНа первых переговорах были согласованы принципы переговоров, локальное прекращение огня и взаимная деэскалация на время. Однако для реальной деэскалации ситуации ВДР нуждается в соответствующих уступках: обещаниях, которые удовлетворят их разъяренную базу. Первое обещание, которое дало правительство, - продолжение земельной реформы, которая была одним из основных требований крестьянских организаций и ополчения ВДР. При этом были даны гарантии того, что реформа действительно будет включать адекватное перераспределение земли, а не просто обещания.\n\nК счастью, и Данил, и Дорошенко, похоже, согласны с этим. Если обещания отамана-министра легко отбить политическими уловками, то официальная подпись наследника гетмана под требованием земельной реформы должна быть достаточно весомой гарантией, поскольку ставит на карту престиж Гетманата."
 ukraine_negotiations_events.14.a: "Это начало"

 ukraine_negotiations_events.15.t: "Вопрос социалистов"
 ukraine_negotiations_events.15.d: "Вторым важным требованием ВДД является отмена запрета на участие социалистов в местных и национальных выборах, действующего с 1920 года. Снятие запрета на участие социалистов в местных выборах не вызывает особых споров у умеренных членов коалиции, поскольку даже если социалисты смогут получить различные места в местных советах, они не смогут угрожать национальной стабильности. Однако разрешение им участвовать в общенациональных выборах - гораздо более тревожный сценарий, который может привести к радикальным последствиям."
 ukraine_negotiations_events.15.a: "Только местные выборы"
 ukraine_negotiations_events.15.b: "Местные и национальные выборы"

 ukraine_negotiations_events.16.t: "Возмущение правых"
 ukraine_negotiations_events.16.d: "Решение разрешить социалистам участвовать в местных и национальных выборах привело в ярость как коалицию, так и СГД. Они назвали его полной \"капитуляцией\" перед ВДР и пригрозили прекратить переговоры. Без их согласия или хотя бы нейтралитета в Сойме не имеет значения, что мы обещаем, поскольку мы не можем провести это в законодательном порядке.\n\nБыл разработан быстрый компромисс: допуск социалистов на выборы с двумя исключениями. Во-первых, они не должны настаивать на полной социализации земли или пытаться ее осуществить. Во-вторых, они не должны пытаться свергнуть Гетманат и установить республику."
 ukraine_negotiations_events.16.a: "Игнорировать их"
 ukraine_negotiations_events.16.b: "Постарайтесь их успокоить"
 ukraine_negotiations_events.16.c: "Разрешить участие левых с двумя оговорками"

 ukraine_negotiations_events.17.t: "Переговоры провалились"
 ukraine_negotiations_events.17.d: "Не имея никаких признаков того, что к их опасениям прислушиваются, Коалиция и СГД обратились к гетману, чтобы сообщить о \"капитуляции\" Дорошенко перед радикальными элементами. Они дали понять, что не допустят принятия любых \"концессионистских\" законов, которые может предложить Дорошенко. Вскоре гетман Скоропадский заявил, что переговоры не будут продолжены, а Дорошенко будет уволен, если продолжит их. При неохотном согласии Дорошенко дальнейшее сотрудничество представляется маловероятным..."
 ukraine_negotiations_events.17.a: "О нет..."

 ukraine_negotiations_events.18.t: "Переговоры провалились"
 ukraine_negotiations_events.18.d: "На опасения коалиции и СГД Дорошенко заверил их, что избирательные правила сделают невозможной победу социалистов на национальных выборах. Это дало обратный эффект, поскольку радикалы из ВДД допустили утечку информации, раскрывающую лживость этих переговоров. Это быстро вызвало новую волну протестов, в результате чего у ВДР не осталось иного выбора, кроме как обвинить правительство в обмане. Похоже, что дальнейшие попытки примирения маловероятны..."

 ukraine_negotiations_events.19.t: "Книжный клуб Винниченко"
 ukraine_negotiations_events.19.d: "Владимир Винниченко, один из лидеров ВДД, недавно прибыл в [202.GetName], чтобы провести \"общественную встречу\" среди [202.GetName]ской интеллигенции. Оперативники, внедренные в круги местной интеллигенции, сообщили нам, что в этом \"книжном клубе\" участвуют различные социалисты и радикальные либералы.\n\nХотя обычно это не является поводом для беспокойства, в нынешней ситуации кажется вероятным, что такой активный социалист, как Винниченко, может усилить напряжение. А вдруг это собрание - лишь прикрытие для организации революционной деятельности? Поскольку мы знаем, где собирается его \"клуб\", мы могли бы организовать его арест и вывезти из города до того, как будет нанесен ущерб. Однако такая атака, если она будет проведена неудачно или станет достоянием гласности, может привести к худшим последствиям, чем простое разрешение на выступление. В конце концов, его встреча может оказаться просто прославленным званым ужином. Винниченко даже иногда выступает за сдержанность и в прошлом высказывался в пользу переговоров."
 ukraine_negotiations_events.19.a: "В конце концов, он писатель. Оставьте его в покое"
 ukraine_negotiations_events.19.b: "Остановите встречу"

 ukraine_negotiations_events.20.t: "Вопрос о полномочиях Сойма"
 ukraine_negotiations_events.20.d: "Третье требование ВДД касается полномочий Сойма. Принцип парламентаризма должен быть закреплен в законе, то есть отаман-министр должен быть ответственен только перед Сеймом. Он будет назначаться Соймом и сниматься с должности путем вотума недоверия. Гетман же, как и в цивилизованных демократиях, будет просто принимать того, кого предложит Сейм.\n\nНа практике это превратит Украину в парламентскую монархию, где власть гетмана станет в значительной степени символической. Если Данил и Дорошенко готовы рассмотреть эту идею, то продать ее нынешнему Сойму или самому Павлу может оказаться совершенно невозможно. Ведь это означает, что Скоропадский откажется от значительной части своей власти. Обещать такую реформу ВДР, а потом блокировать ее гетманом - не в чьих интересах."
 ukraine_negotiations_events.20.a: "Мы должны попробовать!"
 ukraine_negotiations_events.20.b: "Это слишком радикально"

 ukraine_negotiations_events.21.t: "Переговоры провалились"
 ukraine_negotiations_events.21.d: "По совету СГД гетман сообщил Дорошенко, что переговоры должны быть немедленно прекращены в связи с тем, что он капитулировал, отказавшись не только от полномочий Скоропадского, но и от своих собственных. Под угрозой со стороны гетмана и СГД Дорошенко согласился. Были предприняты последние попытки выработать компромисс, но они оказались невозможными, так как было ясно, что гетман его не примет. Переговоры провалились, и ВДР вскоре покинул стол переговоров."
 ukraine_negotiations_events.21.a: "О нет..."

 ukraine_negotiations_events.22.t: "Альтернативный вариант ВДД"
 ukraine_negotiations_events.22.d: "Когда стало ясно, что Дорошенко не сможет заставить гетмана согласиться на столь радикальное предложение, Петлюра предложил компромисс. После бурных дебатов в руководстве ВДД было решено принять не слишком парламентское решение: Гетман сохраняет за собой право увольнять отамана-министра и накладывать вето на законы, но эти полномочия могут быть остановлены большинством в две трети голосов в Сойме. Однако у разумного в остальном компромисса есть неприемлемый штрих: Павло должен уйти, а новый гетман, искренне поддерживающий демократию, должен быть избран."
 ukraine_negotiations_events.22.a: "Как мы могли на это согласиться?"

 ukraine_negotiations_events.23.t: "Тупик"
 ukraine_negotiations_events.23.d: "Мы были так близки к величию. Столько компромиссов уже было согласовано, но теперь переговоры уперлись в стену. Гетман Скоропадский не уйдет в отставку из-за требований \"демагогов\." В отчаянных попытках спасти переговоры было испробовано все, но ВДР примет только одно из двух предложений: либо полный парламентаризм, либо сокращенный парламентаризм с новым гетманом. Даже если более умеренные сторонники ВДР согласятся на мизерную выгоду, большая часть движения - радикальные республиканцы или социалисты, и они уверены, что если переговорщики от ВДР примут хоть одно \"урезанное\" предложение, революция продолжится без них. Боротьбисты особенно активно распространяют слухи о том, что Петлюра собирается тайно уступить требованиям гетмана и сорвать революцию, не успев ее толком начать. Некоторые ячейки даже планируют возобновить насилие, чтобы вынудить переговоры прекратиться.\n\nПо другую сторону стола переговоров Данил пытался убедить своего отца принять отречение от престола, но безуспешно. Гетман приводил в пример судьбу Романовых - правитель, отказавшийся от власти, отказывается от всего, и радикалы придут к власти, что приведет к гибели государства. Проходят дни, переговорщики не могут найти компромисс, и над демократическими реформаторами Гетманата, осмелившимися поверить в возможность мирного урегулирования, нависает пораженчество и депрессия."
 ukraine_negotiations_events.23.a: "Но тогда..."

 ukraine_negotiations_events.24.t: "Крушение поезда"
 ukraine_negotiations_events.24.d: "На участке между [202.GetName] и Черкассами поезд гетмана столкнулся с ужасной аварией. Павел Скоропадский возвращался в столицу после инспектирования гарнизона в Черкассах и встречи с южными областными отаманами для обсуждения ситуации с безопасностью в их округах. По сообщениям газет, поезд гетмана на большой скорости сошел с рельсов из-за неполадок в конструкции. Гетмана удалось спасти из-под обломков, он был тяжело ранен, но скончался по дороге в больницу. Еще три человека, члены ближайшего окружения гетмана, погибли, а десяток получили тяжелые ранения.\n\nС самого начала посыпались обвинения: правая пресса была уверена, что это не несчастный случай, а преднамеренное убийство, совершенное анархистами. Некоторые распространяли версию о том, что недовольные офицеры заложили бомбу в личный поезд Скоропадского, чтобы избавиться от него, пока он не сдался ВДР и не уничтожил все то, что было нажито сторонниками Гетманата за последние 20 лет. Следователи не смогли обнаружить следов взрывчатки: рельсы были либо саботированы, либо просто сломаны, возможно, из-за отсутствия технического обслуживания. В любом случае, никто не знает, что будет дальше. На улицах широко обсуждается возможность военного переворота или социалистической революции, так как страна переживает смерть гетмана"
 ukraine_negotiations_events.24.a: "Так падает гетман"

 ukraine_negotiations_events.26.t: "Новый гетман"
 ukraine_negotiations_events.26.d: "Когда весть о смерти гетмана достигла столицы, траур сразу же омрачился политическим азартом. Прецедента в этой ситуации нет: Данил не становится преемником автоматически, и этот сложный вопрос должен решать специальный орган, которому поручено решение важнейших государственных дел в случае внезапной смерти или тяжелой болезни гетмана - Коллегия верховных правителей, состоящая из заранее и тайно выбранного представителя гетмана, представителей Совета министров и Государственного сената.\n\nЗная о дружеском расположении Данила к конституционным реформаторам в Сойме, Борис Гомзин рано утром встретился с генералом Полтавцом-Острянычем и обсудил возможность военного переворота в столице, чтобы обеспечить продолжение дела жизни Павла, используя Данила как марионеточную фигуру СГД. Эти планы были переданы генералу Присовскому, еще одному потенциальному заговорщику, но он, приняв решение, спасшее страну от кровопролития, отказался бесчестить память Скоропадского подобными планами.\n\nЧерез несколько часов "окно" для военного переворота было закрыто, и Коллегия Верховных Правителей созвала экстренное заседание Сойма. Все три ее члена - отаман-министр Дорошенко, сенатор Кочубинский и министр Яснопольский - согласились выдвинуть единственную кандидатуру: Данила Павловича Скоропадского, который был единогласно избран преемником своего отца на посту гетмана всея Украины. Его первое выступление на этом посту было проникновенным, а речь - искусной. Он сокрушался о трагедии своего покойного отца и требовал от всех украинцев отказаться от насилия. Он представил свои переговоры с Петлюрой как последнюю работу Павла и пообещал завершить их так, чтобы удовлетворить всех. Подобная формулировка позволила заглушить самые резкие протесты правых - ведь переговоры велись с согласия Павла. Однако было ясно, что, несмотря на видимость мира в Сойме, недовольство и даже шепот о том, что сын немедленно приступит к демонтажу отцовского наследия, остались"
 ukraine_negotiations_events.26.a: "И так мы смело вступаем в новую эру"

 ukraine_negotiations_events.27.t: "Отказ от ВДД"
 ukraine_negotiations_events.27.d: "Несмотря на большие надежды, ВДД отказалась от сотрудничества и переговоров с нами, ссылаясь на то, что ШД - это \"не более чем банда грабителей и убийц\" и что наше недавнее проявление сдержанности - не более чем акт успокоения народа. Пока ситуация спокойная, но в любой момент может вспыхнуть"
 ukraine_negotiations_events.27.d2: "Несмотря на большие надежды, ВДД отказалась от какого-либо сотрудничества или переговоров с нами. Признавая готовность ВДР выступить в качестве посредника в переговорах, они ссылаются на недавно принятый законопроект о помощи, в котором ВДД оказалась в стороне, как на доказательство неискренности нашего правительства, называя его \"подчиненным прихотям землевладельцев и промышленников\." Пока ситуация спокойная, но в любой момент она может разгореться"
 ukraine_negotiations_events.27.a: "Некоторые не могут расстаться с прошлым"

 ukraine_negotiations_events.29.t: "Переговоры провалились"
 ukraine_negotiations_events.29.d: "ВДД покинула стол переговоров. Они заявили, что наш отказ допустить социалистические партии к участию во всенародных выборах свидетельствует о неискренности переговоров в целом и об отсутствии у нас стремления к подлинной демократии. Переговоры практически заглохли"
 ukraine_negotiations_events.29.a: "О нет..."

### Land Reform Events ###
 ukraine_land_reform_events.1.t: "Начало земельной реформы и индустриализации"
 ukraine_land_reform_events.1.d1: "Сейчас, когда государство окончательно оправилось от Черного Понедельника и последствия восстания постепенно сходят на нет, мы можем приступить к осуществлению грандиозных проектов земельной реформы и индустриализации. Десять лет назад гетманское правительство разработало противоречивый план земельной реформы, который был признан слишком умеренным парламентскими консерваторами и слишком радикальным лоббистами землевладельцев - оглядываясь назад, можно сказать, что с самого начала было ясно, что он не будет успешным. Проекты индустриализации также не увенчались успехом, поскольку было понятно, что, несмотря на их необходимость, они не являются столь актуальными и не принесут нашим политикам голосов. Тем не менее, восстание научило нас тому, что для того, чтобы гетманское государство выжило, мы должны учиться на своих ошибках и много импровизировать. Настоящая работа начинается сейчас."
 ukraine_land_reform_events.1.d2: "Сейчас, когда государство окончательно оправилось от Черного Понедельника, а нация - от гражданской войны, мы можем приступить к реализации наших великих проектов земельной реформы и индустриализации. На протяжении всего своего существования Гетманат постоянно не выполнял своих обещаний по земельной реформе, что и послужило причиной необходимости республиканского восстания. Но мы - другие. Мы свергли гетмана и его приспешников, пообещав власть народу, и настало время ее реализовать. Настоящая работа начинается сейчас."
 ukraine_land_reform_events.1.d3: "Сейчас, когда государство окончательно оправилось от Черного Понедельника и идет процесс создания нового Гетманата, мы можем приступить к реализации наших грандиозных проектов земельной реформы и индустриализации. Десять лет назад правительство Павла Скоропадского разработало противоречивый план земельной реформы, который был признан слишком умеренным парламентскими консерваторами и слишком радикальным землевладельческими лоббистами - оглядываясь назад, можно сказать, что с самого начала было ясно, что он не будет успешным. Проекты индустриализации также сошли на нет, поскольку было осознано, что, несмотря на их необходимость, они не являются столь актуальными и не принесут нашим политикам голосов. Тем не менее, испытания и невзгоды последних лет научили нас тому, что для выживания гетманского государства необходимо учиться на своих ошибках и импровизировать. Настоящая работа начинается сейчас."
 ukraine_land_reform_events.1.a: "Давайте начнем!"

 ukraine_land_reform_events.4.t: "Землевладельцы обращаются в правительство"
 ukraine_land_reform_events.4.d: "Приняв к сведению наши планы по справедливому распределению земли среди крестьян, крупный землевладелец из [201.GetName] обратился в местное правительство с петицией, в которой предложил нам политическую поддержку, если мы не будем вмешиваться в его земельные дела. Хотя помещики являются одними из самых влиятельных людей в Украине, и их поддержка, безусловно, была бы полезна, отступление от наших обещаний по проведению земельной реформы может радикализировать крестьянство и создать массу других проблем."
 ukraine_land_reform_events.4.a: "Конечно, мы можем делать исключения."
 ukraine_land_reform_events.4.b: "Мы не будем играть в любимчиков."

 ukraine_land_reform_events.5.t: "Болота [997.GetName]"
 ukraine_land_reform_events.5.d: "В более болотистых частях Украины [997.GetName] преобладают крупные землевладельцы, так как эти земли считаются экономически невыгодными для освоения, что приводит к появлению большого количества неиспользуемых земель. Хотя это может оказаться дорогостоящим, попытка осушить болота, чтобы сделать поместья более прибыльными и передать их малоземельному крестьянству, может оказаться выгодной в долгосрочной перспективе."
 ukraine_land_reform_events.5.a: "Это слишком дорого."
 ukraine_land_reform_events.5.b: "Преобразим болота!"

 ukraine_land_reform_events.6.t: "Вопрос приоритетов"
 ukraine_land_reform_events.6.d: "По мере реализации проектов земельной реформы и индустриализации возникает молчаливое признание того, что наш бюджет может оказаться не в состоянии учесть и то, и другое, и возникает вопрос о том, каковы должны быть наши приоритеты. Мы можем продолжить финансирование земельной реформы, инвестируя в ирригационную инфраструктуру, или же отдать предпочтение развитию обрабатывающей промышленности и сферы услуг."
 ukraine_land_reform_events.6.a: "Продолжить финансирование земельной реформы."
 ukraine_land_reform_events.6.b: "Направить средства на наши отраслевые проекты."

 ukraine_land_reform_events.7.t: "Успешные реформы"
 ukraine_land_reform_events.7.d: "Наша программа земельной реформы идет успешно. Неравенство и бедность уменьшились, а крестьяне в ответ оказывают правительству поддержку. Если эта тенденция сохранится, то, несомненно, вознаграждение в конечном итоге будет достойным."
 ukraine_land_reform_events.7.a: "Великолепно."

 ukraine_land_reform_events.8.t: "Субсидии для ветеранов?"
 ukraine_land_reform_events.8.d: "В ходе реализации программы земельной реформы правительство проявляет особую заинтересованность в выборе бенефициаров реформы. В обмен на ценную политическую лояльность была выдвинута идея отдать предпочтение ветеранам и семьям погибших на войне."
 ukraine_land_reform_events.8.a: "Это было бы ценно..."
 ukraine_land_reform_events.8.b: "Нет необходимости."

 ukraine_land_reform_events.9.t: "Финансирование кооперативного движения"
 ukraine_land_reform_events.9.d: "В Украине кооперативное движение существует уже несколько десятилетий и способствует повышению благосостояния крестьянства за счет максимизации прибыли мелких фермеров и возможности объединять свои ресурсы. В частности, на западе Украины количество членов кооперативов исчисляется сотнями тысяч, а прямое финансирование со стороны государства только усиливает их полезность."
 ukraine_land_reform_events.9.a: "Фантастика."

 ukraine_land_reform_events.10.t: "Взять на поруки больные хозяйства?"
 ukraine_land_reform_events.10.d: "Многие мелкие фермерские хозяйства уже некоторое время работают плохо и обременены тяжелыми кредитами. Существует опасение, что эти фермеры разорятся, если будет собран хоть один плохой урожай. Крестьянские организации обратились к правительственным земельным программам с просьбой о предоставлении субсидий и реструктуризации кредитов этим мелким фермерам, иначе им грозит финансовый крах."
 ukraine_land_reform_events.10.a: "Поддержите фермеров."
 ukraine_land_reform_events.10.b: "Направить средства на наши отраслевые проекты."

 ukraine_land_reform_events.11.t: "Землевладелец обращается в правительство"
 ukraine_land_reform_events.11.d: "Приняв к сведению наши планы по справедливому распределению земли среди крестьян, один из крупных херсонских землевладельцев обратился в местное правительство с петицией, в которой предложил нам политическую поддержку, если мы не будем вмешиваться в его земельные дела. Хотя помещики являются одними из самых влиятельных людей в Украине, и их поддержка, безусловно, была бы полезна, но отступление от наших обещаний по проведению земельной реформы может радикализировать крестьянство и создать массу других проблем."
 ukraine_land_reform_events.11.a: "Не может быть."
 ukraine_land_reform_events.11.b: "Возможно, мы сможем найти компромисс?"
 ukraine_land_reform_events.11.c: "Можно сделать исключения."

 ukraine_land_reform_events.12.t: "Неравноправное владение на Западе"
 ukraine_land_reform_events.12.d: "Исторически сложилось так, что в Западной Украине землевладельческая элита была в основном польского происхождения, а крестьянство - украинского. Явное разделение земельной собственности по этническому признаку вызывает озабоченность многих крестьян и нашего правительства. Возможно, нам следует направить часть наших усилий на устранение этого разрыва."
 ukraine_land_reform_events.12.a: "Конечно."
 ukraine_land_reform_events.12.b: "Мы не хотим отторгать поляков."

 ukraine_land_reform_events.13.t: "Протест в [193.GetName]."
 ukraine_land_reform_events.13.d: "Группа крестьян в [193.GetName] выразила протест местным властям за то, что они недостаточно выполняют свои обещания, утверждая, что земельная собственность в регионе по-прежнему крайне неравномерна. Создается впечатление, что в администрации штата существует мощное землевладельческое лобби, которое сдерживает усилия по проведению земельной реформы. "
 ukraine_land_reform_events.13.a: "Попытка избавить государство от лобби."
 ukraine_land_reform_events.13.b: "Мы мало что можем сделать."

 ukraine_land_reform_events.14.t: "Вопрос о налогообложении"
 ukraine_land_reform_events.14.d: "Некоторые члены нашего правительства выступают за повышение налогов с крупных землевладельцев, утверждая, что это даст государству возможность финансировать программы социального обеспечения и поддерживать мелкие фермерские хозяйства, хотя против этого высказываются и другие, утверждая, что это приведет лишь к снижению производительности сельского хозяйства."
 ukraine_land_reform_events.14.a: "Это, безусловно, обеспечило бы нам поддержку крестьянства."
 ukraine_land_reform_events.14.b: "Это не то, что нам нужно."

 ukraine_land_reform_events.15.t: "Стимулирование нового экспорта"
 ukraine_land_reform_events.15.d: "На протяжении многих лет Украина была признана крупным экспортером семян подсолнечника и пшеницы, поставляя эти основные продукты питания в страны всего мира. Однако по мере реализации амбициозной программы земельной реформы в стране все чаще звучат призывы к диверсификации экспорта. Этого можно достичь путем наделения крестьян новыми земельными участками и стимулирования выращивания новых культур. Хотя это может оказаться дорогостоящим мероприятием, потенциальные выгоды от расширения нашего экспортного портфеля весьма значительны."
 ukraine_land_reform_events.15.a: "Придерживаться наших традиционных культур."
 ukraine_land_reform_events.15.b: "В долгосрочной перспективе это будет стоить того."

 ukraine_land_reform_events.16.t: "Обман системы"
 ukraine_land_reform_events.16.d: "Некоторые землевладельцы нашли способ обойти наши реформы, продавая излишки земли друзьям и родственникам, которые в свою очередь сдают ее в аренду по номинальной стоимости. Такого рода договоренности трудно пресечь, поскольку формально никакого преступления не совершается, разве что против доброй воли."
 ukraine_land_reform_events.16.a: "Черт."

 ukraine_land_reform_events.17.t: "Тракторы, тракторы, тракторы"
 ukraine_land_reform_events.17.d: "Благодаря снижению арендной платы за землю все большее число фермеров могут позволить себе более современную сельскохозяйственную технику - в первую очередь тракторы. Один трактор может вдвое сократить объем работ, необходимых для производства того же количества зерна, что на практике означает, что то же количество работников может производить вдвое больше урожая. Добро пожаловать в современность!"
 ukraine_land_reform_events.17.a: "Повысить налогообложение тех, кто увеличивает производство."
 ukraine_land_reform_events.17.b: "Пусть продают."

 ukraine_land_reform_events.18.t: "Волынские поляки подают петицию правительству"
 ukraine_land_reform_events.18.d: "Знатные дворяне, происходящие от поляков, составляют значительную часть элиты западных районов Украины, накопив в имперские времена огромные состояния. В прошлом эти землевладельцы в целом поддерживали политику гетмана, но недавняя политика перераспределения земель заставила их насторожиться. Они требуют исключений, основанных на различных местных законах и традициях, и по сути, обещают свою дальнейшую поддержку режиму в обмен на \"лазейки\"."
 ukraine_land_reform_events.18.a: "Безусловно, традиции надо уважать."
 ukraine_land_reform_events.18.b: "Они должны подчиняться законам, как и все остальные."

 ukraine_land_reform_events.19.t: "Спекуляция с субсидиями"
 ukraine_land_reform_events.19.d: "После открытия льготных кредитов для мелких землевладельцев на покупку сельскохозяйственной техники некоторые более обеспеченные фермеры воспользовались возможностью использовать эти кредиты для инвестиций в прибыльные производства. Формально это злоупотребление кредитной политикой и отъем средств у тех, кто в них действительно нуждается, но для отечественной промышленности это тоже весьма полезно."
 ukraine_land_reform_events.19.a: "Они являются примером для всех фермеров."
 ukraine_land_reform_events.19.b: "Гарантировать, что подобное не повторится."

 ukraine_land_reform_events.20.t: "Ликероводочный бум"
 ukraine_land_reform_events.20.d: "Мы выделяли субсидии на любые заводские проекты в сельских регионах, чтобы помочь этим регионам развиваться и модернизироваться. Похоже, что самым популярным бизнесом там быстро стали спиртзаводы, особенно те, которые в основном производят дешевую горилку из излишков зерна. Многие неравнодушные люди - священники, матери, учителя - критикуют эти \"дьявольские машины\" за то, что дешевый алкоголь извергает из сельской местности непристойный образ жизни. Однако они очень продуктивны, и ограничение их деятельности означало бы потерю значительной части потенциального роста и корпоративных налогов."
 ukraine_land_reform_events.20.a: "Алкоголь - напиток дьявола."
 ukraine_land_reform_events.20.b: "Пить - это радость всех украинцев!"

 ukraine_land_reform_events.21.t: "Осушение болот"
 ukraine_land_reform_events.21.d: "В Украине много болот и заболоченных территорий, особенно на северо-западе, где на сотни километров простираются великие Пинские болота. Осушение части этих болот позволило бы создать дополнительные сельскохозяйственные угодья, но это очень дорого, поскольку для отвода воды необходимо прорыть множество каналов. Обычно такие проекты организуют специально созданные \"болотные кооперативы\", каждый член которых оплачивает часть расходов по осушению и получает новые сельскохозяйственные угодья в размере своего вклада. При наличии государственных субсидий мы могли бы оказать существенную помощь в рекультивации таких земель."
 ukraine_land_reform_events.21.a: "Болота не будут стоять на пути прогресса!"
 ukraine_land_reform_events.21.b: "Звучит дорого."

 ukraine_land_reform_events.22.t: "Сословия православной церкви"
 ukraine_land_reform_events.22.d: "Многие церкви и монастыри владеют значительными земельными наделами, имеют арендованных крестьян, которые занимаются их обработкой. Согласно нашей политике перераспределения земель, наиболее богатые монастыри также должны продать часть своих земель. Однако многие из них подали прошение о предоставлении им особого режима, мотивируя это тем, что они не корпорации и не частные лица, преследующие цели извлечения прибыли, а стремятся к благу всего украинского народа. Действительно, церковные поместья зачастую более современны и ухожены, чем те, что принадлежат аристократам, но, опять же, делать исключения тоже нежелательно."
 ukraine_land_reform_events.22.a: "Церковь всегда права!"
 ukraine_land_reform_events.22.b: "Владел ли Христос землей?"

 ukraine_land_reform_events.23.t: "Регулирование цен на пшеницу"
 ukraine_land_reform_events.23.d: "Поскольку ситуация в мире дестабилизировала большую часть торговых сетей, наше значительно улучшившееся сельскохозяйственное производство стало процветающим бизнесом. Гражданская война в Америке практически уничтожила производство нашего главного конкурента по производству пшеницы, и перед нами открылось множество новых рынков. Фермеры продают свой урожай по постоянно растущим ценам, поскольку экспортные компании продают на внешние рынки все, что могут купить. Несмотря на большие прибыли для аграрного сектора, все это больно ударило по городскому населению Украины, для которого цены на хлеб выросли до непосильного уровня. Можно было бы установить максимальные цены на пшеницу или ограничить экспорт другими способами, но это будет происходить за счет сельскохозяйственного бизнеса."
 ukraine_land_reform_events.23.a: "Давайте делать прибыль!"
 ukraine_land_reform_events.23.b: "Каждый заслуживает дешевой еды."

 ukraine_land_reform_events.29.t: "Рост поддержки среди крестьян"
 ukraine_land_reform_events.29.d: "Похоже, что наша земельная реформа приносит свои плоды. Крестьяне все больше видят, что правительство заботится о простых людях, поскольку они могут лучше контролировать свою жизнь и открывать для себя новые экономические возможности."
 ukraine_land_reform_events.29.a: "Отлично!"

 ukraine_land_reform_events.30.t: "Увеличение объемов сельскохозяйственного производства"
 ukraine_land_reform_events.30.d: "Усилия правительства, направленные на увеличение сельскохозяйственного производства в рамках программы земельной реформы, принесли свои плоды. По всей стране отмечается резкий рост производства продовольствия, и похоже, продовольственная безопасность только улучшается."
 ukraine_land_reform_events.30.a: "Хорошая новость!"

 ukraine_land_reform_events.31.t: "Дерадикализация сельской местности"
 ukraine_land_reform_events.31.d: "Благодаря нашей земельной реформе крестьяне, похоже, все больше отворачиваются от радикальных идеологий, таких как синдикализм и крайний национализм. Теперь, когда крестьяне все больше видят возможности, они реже вступают в организации, пропагандирующие эти идеологии, что, в свою очередь, приносит нам большую политическую поддержку."
 ukraine_land_reform_events.31.a: "Превосходно."

 ukraine_land_reform_events.32.t: "Крестьянские забастовки"
 ukraine_land_reform_events.32.d: "Группа крестьян объявила забастовку, протестуя против бездействия правительства в отношении земельной реформы, жалуясь на низкую заработную плату и плохие условия труда на полях. Несмотря на то, что забастовка в конечном итоге состоится, она является явным признаком того, что мы должны удвоить наши усилия, если хотим сохранить стабильность и обуздать беспорядки."
 ukraine_land_reform_events.32.a: "Прискорбно."

 ukraine_land_reform_events.33.t: "Крестьяне радикализируются"
 ukraine_land_reform_events.33.d: "В сельской местности большое количество крестьян обратилось к радикальной идеологии. Синдикалисты и сторонники крайних националистических взглядов обратились к крестьянам, утверждая, что правительство стало заложником групп землевладельцев и что оно не представляет интересы народа. Для того чтобы иметь стабильную базу политической поддержки, мы должны совершенствовать наши усилия по проведению земельной реформы."
 ukraine_land_reform_events.33.a: "Безусловно, мы должны принять меры..."

### SocLib Hetmanate Events ###
 ukraine_danylo_events.1.t: "Шепот правых"
 ukraine_danylo_events.1.d: "Когда гетман Данил объявил о своем намерении продолжить переговоры с ВДР, наступила тишина, по крайней мере, поначалу. Некоторые члены УДХП, УСХД и особенно ШД обратились к новому гетману, предостерегая от переговоров с радикальными левыми. Когда стало ясно, что переговоры будут продолжены \"для блага нации\", вопрос прояснился: гетман, каким бы сильным он ни был, не имеет поддержки коалиции своего отца."
 ukraine_danylo_events.1.a: "Может, они просто молчат?"

 ukraine_danylo_events.2.t: "Долгий путь впереди"
 ukraine_danylo_events.2.d: "От имени Данила Скоропадского отаман-министр Дорошенко объявил "Сойму", что выборы, намеченные на конец этого года, будут отложены в связи с новой ситуацией. Он добавил, что последние события доказали необходимость \"надлежащего политического представительства\" и компромисса с оппозицией.\n\n Хотя новая дата выборов не была названа, для нового гетмана и Дорошенко это огромная возможность продолжить переговоры с ВДР и обеспечить реализацию своей реформаторской программы."
 ukraine_danylo_events.2.a: "Давайте начнем."

 ukraine_danylo_events.3.t: "Главный вопрос"
 ukraine_danylo_events.3.d: "Земельная реформа - один из самых ключевых вопросов в жизни нашего государства. Неспособность предыдущего правительства справиться с земельной реформой привела к тому, что новое правительство готовит предложение, которое попытается удовлетворить народ. Мы должны выбрать: либо более взвешенный подход и умиротворение землевладельцев, либо радикальные меры."
 ukraine_danylo_events.3.a: "Стремиться к радикальным действиям."
 ukraine_danylo_events.3.b: "Мы должны идти на компромисс."

 ukraine_danylo_events.4.t: "О полномочиях и ответственности"
 ukraine_danylo_events.4.d: "Уже некоторое время полномочия гетмана Данила находятся в подвешенном состоянии, с юридической точки зрения он сохраняет те же авторитарные прерогативы, что и его отец, и может их реализовать в любой момент. Правительство согласно с тем, что его полномочия должны быть сокращены конституционным указом, но в каком объеме - пока неясно. Многие представители политической сцены считают, что его полномочия должны быть полностью сокращены, чтобы создать обычную конституционную монархию, однако все чаще звучат призывы к тому, чтобы он сохранил хотя бы незначительное право фактического вето на последнюю стадию принятия законопроектов, чтобы выступать в качестве беспристрастного политического контролера."
 ukraine_danylo_events.4.a: "Наверное, гетману пора сдать свои полномочия."
 ukraine_danylo_events.4.b: "Гетман должен поддерживать определенную степень политической релевантности!."

 ukraine_danylo_events.5.t: "Радикальные боротьбисты напали на поезд"
 ukraine_danylo_events.5.d: "Полагая, что политическая ситуация, вызванная экономическими последствиями Черного Понедельника, остается достаточно нестабильной и что им удастся привлечь на свою сторону ВДР, боротбисты совершили нападение на поезд с военными грузами, полагая, что это подтолкнет других к вооруженной революции. Хотя их усилия пока не принесли результатов, ШД, а также другие представители консервативной оппозиции указывают на эти нападения как на доказательство того, что переговоры с ВДР - бессмысленная затея, и это убеждает многих в правильности позиции нынешнего правительства."
 ukraine_danylo_events.5.a: "Радикалы будут радикалами."
 ukraine_danylo_events.5.b: "Мы должны остановить их при любой возможности."

 ukraine_danylo_events.6.t: "Гетман и генерал"
 ukraine_danylo_events.6.d: "Сегодня генерал Присовский прибыл в кабинет гетмана для обсуждения условий. Он предупреждает, что правительство не приняло должных мер для пресечения деятельности боротбистов, что, по его мнению, является предвестником социалистической революции. Хотя слово Присовского не является окончательным, его слова имеют вес, поскольку именно ему принадлежит заслуга в наступлении на анархистское восстание Нестора Махно в 1919 году. Что должен сказать гетман?"
 ukraine_danylo_events.6.a: "Мы ведь не расходимся во мнениях, правда?"
 ukraine_danylo_events.6.b: "А дальше что, повторять те же ошибки, что и в 1925 году?"

 ukraine_danylo_events.8.t: "Дорошенко руководит УДХП"
 ukraine_danylo_events.8.d: "С момента вступления Данила Скоропадского в должность гетмана Дмитрий Дорошенко, используя свое положение отамана-министра, активно работает над тем, чтобы ОДХП поддержала переговоры с ВДР и реформы. В частности, он выступает за превращение должности гетмана в символическую, а членство в партии направляет в более конституционное русло."
 ukraine_danylo_events.8.a: "Его усилия оценены по достоинству."

 ukraine_danylo_events.9.t: "Визит из ВСЗВ"
 ukraine_danylo_events.9.d: "Сегодня вечером несколько членов ВСЗВ посетили кабинет гетмана, чтобы обратиться к нему с просьбой по одному ключевому вопросу - земельной реформе. Признавая, что земельная реформа - это вопрос, с которым согласны и левые, и правые, они заявили, что план ВДР по земельной реформе слишком радикален и в долгосрочной перспективе абсолютно пагубен, способен привести лишь к неэффективности и хаосу. Какой должна быть реакция гетмана?"
 ukraine_danylo_events.9.a: "Вы правы, мы не должны капитулировать перед радикальными элементами здесь."
 ukraine_danylo_events.9.b: "Гетман и его правительство проводят земельную реформу по своему усмотрению!"
 ukraine_danylo_events.9.c: "Возможно, мы сможем найти компромисс?"

 ukraine_danylo_events.12.t: "Вопрос об административных делениях"
 ukraine_danylo_events.12.d: "Одна из главных претензий ВДД - разница в управлении. При провозглашении Народная республика была гораздо более децентрализованной, чем Гетманат, и была разделена на значительно большее количество земель. Нынешняя система очень напоминает деление царской эпохи, и ВДР утверждает, что для построения подлинно демократического общества ее следует перекроить."
 ukraine_danylo_events.12.a: "Проводить большую децентрализацию."
 ukraine_danylo_events.12.b: "Попытаться найти компромисс."

 ukraine_danylo_events.13.t: "Последнее путешествие Его Светлейшего Высочества"
 ukraine_danylo_events.13.d: "Когда народ собирается, чтобы оплакать потерю своего любимого гетмана, все внимание приковано к Даниилу Скоропадскому, который готовится произнести надгробную речь на похоронах своего отца. Поднимаясь на трибуну, молодой гетман должен решить, на чем сосредоточить свою речь, учитывая нынешние политические трудности.\n\n Он может сосредоточиться исключительно на великих достижениях своего отца, подчеркнув, что именно он стоял во главе борьбы за независимость Украины и достойно руководил страной вплоть до своей безвременной кончины. А может быть, ему следует создать образ несколько несовершенного (ведь все мы такие?), но в конечном счете благонамеренного и преданного своему делу правителя, чьи выдающиеся деяния заложили необходимый фундамент, на котором будущие поколения будут строить нечто действительно долговечное. Хотя первый вариант, безусловно, создаст у консервативной оппозиции в Сойме и ШД впечатление, что гетмана просто сбивает с пути ВДР, такие действия, безусловно, повредят переговорному процессу, а второй вариант вряд ли нанесет серьезный ущерб его репутации."
 ukraine_danylo_events.13.a: "Павел Скоропадский был отцом нации."
 ukraine_danylo_events.13.b: "Он сыграл важную роль в приближении светлого будущего."

 ukraine_danylo_events.14.t: "Розбудова Нація"
 ukraine_danylo_events.14.d: "Розбудова нація" - основное печатное издание Лиги украинских националистов, которое после смерти Скоропадского приобрело определенную привлекательность в связи с продолжающимся ростом радикализма в условиях политического кризиса. Сегодня один из главных редакторов журнала Евгений Онацкий опубликовал статью, в которой подробно изложил свои мысли об украинском обществе и его дальнейшей судьбе.\n\n В статье Онацкий утверждает, что, хотя в воздухе витает предчувствие больших перемен и Украина определенно вступает в новую политическую эпоху, не стоит забывать: пока все украинское общество не объединится вокруг идеи служения нации превыше всего и не будет руководствоваться одной организацией, призванной решать только эту задачу, Украина будет оставаться уязвимой для внешних и внутренних угроз. Он намекает, что, возможно, спасение может прийти от армии: она представляет все слои общества и сочетает в себе дисциплину и уважение к иерархии с традициями самоотверженного служения и самопожертвования. Его слова придали сил оппозиции, и многие начинают считать переговоры с ВДР в лучшем случае бессмысленными, а в худшем - вредными."
 ukraine_danylo_events.14.a: "Беда."

 ukraine_danylo_events.15.t: "Злой гений и радикальный фанатик"
 ukraine_danylo_events.15.d: "УДХП переживает самый переломный момент. За последние несколько месяцев партия разделилась по вопросу о том, поддерживать ли переговоры или идти на союз с оппозицией, и ни одна из сторон не получила явного преимущества. Однако вопрос стоит иначе, поскольку в это непростое время требуется лидерство, которое бы пользовалось всеобщим уважением и беспрекословным повиновением. Поэтому две ведущие фигуры этой довольно крупной партии вступают в жестокую конкуренцию. Игорь Кистяковский и Николай Михновский: кто возьмет бразды правления УДХП в свои руки? Кистяковский известен своим хитрым характером и многочисленными связями, пронизывающими практически всю украинскую политическую сферу. В то же время откровенная манера поведения Михновского вызывает восхищение широких слоев общества: от крестьян и солдат до национально настроенной интеллигенции."
 ukraine_danylo_events.15.a: "Политическая хватка Кистяковского победила."
 ukraine_danylo_events.15.b: "Пламенная риторика Михновского раскачивает партию."

 ukraine_danylo_events.16.t: "Последняя тайна Павла Скоропадского"
 ukraine_danylo_events.16.d: "Пока страна оправляется от шока, вызванного гибелью Павла Скоропадского, к расследованию привлекаются следователи для установления причин и поиска возможных подозреваемых. Первым очевидным преступником является радикальный "Боротьба", однако, несмотря на репутацию этой организации, занимающейся политическими убийствами, и возможность наличия мотива, конкретных доказательств того, что убийство совершил кто-то из ее членов, нет. Похоже, что эта работа окажется более значимой, чем предполагалось ранее, и ее результаты, какими бы они ни были, несомненно, окажут влияние на будущее Украины."
 ukraine_danylo_events.16.a: "Это будет сложно."

 ukraine_danylo_events.17.t: "Роспуск Союза аграриев-статистов"
 ukraine_danylo_events.17.d: "Поглощение многих желающих членов УШД в УДХП стало для первого соломинкой, сломавшей спину верблюда. Когда на Украине наступил Черный Понедельник, это небольшое, но влиятельное движение посчитало, что могло бы воспользоваться беспорядками и стать доминирующей организацией в гетманской коалиции. Некоторые утверждают, что Скоропадский в свое время планировал назначить лидера организации Сергея Шемета отаманом-министром из-за его личной близости к гетману.\n\n В последнее время число членов организации сократилось благодаря усилиям УДХП по переубеждению более прагматично настроенных членов движения, и многие из них прислушались к призыву. В связи с этим Николай Кочубей, главный идеолог УСХД, принял решение о роспуске организации из-за ее незначительного состава, отсутствия финансирования и поддержки. Вместо нее Кочубей и наиболее влиятельные мыслители движения провели ребрендинг \"Братство классократов-монархистов\", более точно отражающий их основные идеи. Новая организация, однако, малочисленна и политически неактуальна, и вряд ли в ближайшее время сможет добиться каких-либо успехов."
 ukraine_danylo_events.17.a: "Чрезмерная забота об идеологической чистоте обычно не приносит пользы."

 ukraine_danylo_events.18.t: "Настоящий союз центра?"
 ukraine_danylo_events.18.d: "Решение правительства поддержать УСДРП вызвало серьезную озабоченность в УДХП и некоторых группах внутри УРДП. По всей видимости, правое крыло УПРД обратилось к части УДХП с предложением создать альянс между более умеренно настроенными кругами обеих организаций с целью воспрепятствовать возможному приходу леворадикалов. Переговоры закончились безрезультатно из-за разногласий по многим вопросам между двумя сторонами, однако тот факт, что некоторые представители УДХП, которые были самыми стойкими сторонниками переговоров с ВДР, предприняли такую попытку, все же нанес удар по способности ВДР убедить 'Сойм'."
 ukraine_danylo_events.18.a: "УПРС не так едина, как может показаться."

 ukraine_danylo_events.22.t: "Выборы [GetYear] года"
 ukraine_danylo_events.22.d: "Наконец-то. Месяцы и месяцы переговоров наконец-то вылились в то светлое будущее, о котором многие мечтали. Принят ряд законов, закрепляющих Украину как демократическое государство и обеспечивающих политический плюрализм, десятилетия авторитаризма начинают становиться воспоминаниями. Работа гетмана, отамана-министра Дорошенко и его единомышленников в Сойме наконец-то принесла свои плоды: сегодня состоялись первые по-настоящему свободные выборы. Результат был в основном ожидаемым и завершился победой НПСР - поскольку гетман больше не назначает отамана-министра, Сойм проголосовал за избрание на этот пост ветерана партии Вячеслава Прокоповича. Члены партии ликовали, что наконец-то получили большинство в Сойме, которого они были лишены при авторитарном правлении Павла Скоропадского.\n\n В знак признания усилий правительства Симон Петлюра вместе с известными членами ВДР, такими как Исаак Мазепа, Владимир Винниченко и Никифир Григориев, собрался на официальную церемонию роспуска ВДР, заявив, что эта организация достигла своих целей и больше не нужна. В конце той же недели Симон Петлюра вместе со своим ставленником Александром Удовиченко встретился с Данилой Скоропадским, чтобы неофициально подтвердить соглашение между правительством и реформаторскими силами. Но самое главное - Петлюра предложил вновь служить в вооруженных силах Украины, и гетман и отаман-министр Прокопович согласились.\n\n Пока заложена лишь основа. Земельная реформа остается проблемой, а поскольку в Европе становится все более неспокойно, необходимость индустриализации и создания мощной армии для защиты Украины становится просто необходимостью. Пока неясно, сможет ли эта новая глава в истории Украины привести к чему-то прочному."
 ukraine_danylo_events.22.a: "Боже великий, едкий, нам Украину храни!."

 ukraine_danylo_events.23.t: "Выборы [GetYear] года" #Послевоенные выборы
 ukraine_danylo_events.23.d: "На долю Украинского государства выпало множество испытаний. Независимость, начиная с 1917 г., была в лучшем случае шаткой, а последующие годы были бурными, обусловленными большой политической нестабильностью. Хотя соглашение между ВДР и гетманским правительством успешно завершило значительную часть политической поляризации, самое серьезное испытание было еще впереди. Русский медведь вонзил свои когти в Украину в рамках самой кровопролитной войны в мировой истории. Но в итоге, как это было и будет всегда, Украина победила - ее враги исчезли, как роса на солнце. Русские считали Украину разобщенной, но украинцы осмелились мечтать о лучшем будущем, работая вместе над общим делом величия. Сегодня, как никогда раньше, людям есть во что верить - в демократию, справедливость и свободу, и они будут сражаться за это до смерти.\n\n Именно благодаря этим убеждениям явка на выборы стала самой высокой за всю историю молодого государства. Ключевыми игроками на выборах стали УРДП, УСРДП и УДХП. Из всех трех партий наибольшее наследие досталось УРДП: правительство Вячеслава Прокоповича еще не одно десятилетие будут вспоминать с благодарностью, ведь оно пережило самое трудное для Украины время. Но за годы, прошедшие после последних выборов, УДРП стала довольно мощной силой, пытающейся апеллировать как к рабочим, так и к крестьянам. Под руководством Исаака Мазепы и Опанаса Феденко они, пожалуй, представляют собой наиболее реальную угрозу правлению УДРП. Наконец, темной лошадкой в предвыборной гонке остается УДХП. Несмотря на то, что в последние годы их численность несколько уменьшилась, они пытаются восстановить свой имидж и осуждают некоторые эксцессы режима Павла Скоропадского, что раньше случалось довольно редко. УДХП не хватает голосов для абсолютной победы на выборах, но их присутствие может оказаться решающим фактором на этих выборах."
 ukraine_danylo_events.23.a: "Радикальные демократы снова одержали победу!"
 ukraine_danylo_events.23.b: "Радикальные демократы создают коалицию с демократами-аграриями!"
 ukraine_danylo_events.23.c: "Победа со спины для Социал-демократической рабочей партии!"

 ukraine_danylo_events.24.t: "Расследование гибели гетмана"
 ukraine_danylo_events.24.d: "Черкасская полиция выясняет причины крушения поезда, в результате которого погиб покойный гетман. Процесс идет медленно из-за огромного количества возможных вариантов, поскольку к поезду и путям имели доступ десятки людей. Использование взрывчатки практически опровергнуто, но это только усложняет ситуацию. Ведущий сыщик Михаил Прокопенко придерживается версии о том, что на локомотиве была совершена диверсия с целью вызвать катастрофический сход.\n\n Но кем была совершена диверсия? Выяснилось, что по крайней мере один из тормозников поезда, \"Шевченко\", так и не был найден ни живым, ни мертвым. Другие оставшиеся в живых мужчины из локомотивной бригады мало что могли рассказать об этом человеке, поскольку большинство из них были спешно набранными забастовщиками, так как большинство железнодорожников бастовало. Кажется вероятным, что именно этот пропавший человек стоит за саботажем.\n\nНо если речь идет о преднамеренном саботаже со стороны рабочего, то почему и кем он был? Знал ли он о критических переговорах между Дорошенко и руководством ВДР? Первоначально предполагалось, что это мог быть боевик-социалист, пытавшийся своими действиями спровоцировать беспорядки, - и это, безусловно, наименее политически сомнительное прочтение. Однако пока этот Шевченко остается на свободе, мы не можем сказать ничего более.\n\nПохоже, что гетман был выведен из игры в такой важный момент. Если бы этого не произошло, переговоры могли бы сорваться - другого исхода трудно представить. Возможно, личность этого Шевченко останется в истории как самое большое нераскрытое преступление Украины."
 ukraine_danylo_events.24.a: "Завязывайте с заговорами."

 ukraine_danylo_events.25.t: "Переделанная репутация"
 ukraine_danylo_events.25.d: "Можно было бы с полным основанием сказать, что жизнерадостность, мягкость и спокойствие Гетмана Даниила Скоропадского сделали его склонным поддаваться чужому влиянию. Годами УСХД и СГД в частности, стремились использовать его как пешку в своих амбициях. Большую часть своего правления Павел держался в стороне от СГД, хотя и признавал их патриотами и верными сторонниками, а УСХД всегда раздражала его независимая и волевая натура. Эти факторы сделали влияние на наследника Гетмана главной целью двух автократических организаций, и для любого из окружения гетмана отстраненность Даниила от политики, несомненно, сделала бы его марионеткой, если бы с его отцом что-нибудь случилось.\n\nЭти прогнозы, конечно, не оправдались, как многие ожидали. Несомненно, гетман Даниил продолжает выполнять свои конституционные обязанности и даже немного больше, и часто отказывается открыто комментировать национальную политику, что является неопределенным протоколом для монархов при демократической парламентской системе. Но именно инициатива Даниила привела реформистов к победе, и кровопролития удалось избежать, когда напряженность, казалось, достигла апогея. В тот момент, когда многие ожидали от него нерешительности, он казался человеком часа, когда это было важнее всего.\n\nВозможно, его действия лучше всего характеризуют его как человека с характером. Дело не только в идеологии и желании править, но и в том, чтобы делать то, что лучше для народа. Несмотря на усилия его отца добиться этого, именно идеология ослепила его. По иронии судьбы, у человека, проработавшего в политике почти два десятилетия, казалось, не было решения, а человек с очень небольшим опытом, казалось, был готов предложить решение, которое, в конце концов, принесло свои плоды.\n\nМожно сказать, что члены УРДП, и в частности премьер-министр Дмитрий Дорошенко, обладали такой же, если не большей, инициативой в создании нового, демократического государства. Даже если это так, следует задаться вопросом, смогли бы они добиться успеха без поддержки нового гетмана или нет. Гораздо меньше людей ответили бы утвердительно на этот вопрос, но, в конце концов, это не главное. Впереди нас ждут процветание и мир, и неустанный труд тех, кто стремился создать это, никогда не будет забыт."
 ukraine_danylo_events.25.a: "Душу й тило мы положем за нашу свободу."

 ukraine_danylo_events.26.t: "Выборы [GetYear] года"
 ukraine_danylo_events.26.d: "Вновь проводятся выборы делегатов в Сойм. Две основные партии, СДПГ и УСДРП, имеют наибольшие шансы на победу. Кто займет первое место в этом году?"
 ukraine_danylo_events.26.a: "Победа УРДП!"
 ukraine_danylo_events.26.b: "Победа УРДП-УДХП!"
 ukraine_danylo_events.26.c: "Победа УРСДРП!"

### AuthDem Events ###
 ukraine_coalition_events.1.t: "Выборы в Украине [GetYear] года"
 ukraine_coalition_events.1.d: "Выборы в Украине, первоначально назначенные на ноябрь 1936 года, были отложены из-за восстания. Но теперь, когда восстание закончилось, выборы удалось провести. Для выборов этого года была характерна низкая явка; отсутствие мощной и единой Радикально-демократической партии, расколовшейся в результате восстания, способствовало тому, что национальные настроения были пронизаны чувством отстраненности.\n\nНа выборах, естественно, победила коалиция Аграрно-демократической партии и аграриев-статистов, но результат был своеобразным. Более идеологизированный характер Аграриев-Статистов оказался благоприятным, поскольку их электорат оказался более легко мобилизуемым, чем электорат Аграрных Демократов. Несмотря на то, что Аграрно-демократическая партия получила больше мест, чем Аграрии-Статисты, результаты последних превзошли ожидания.\n\nСкоропадский назначил отаманом-министром лидера Аграриев-Статистов Сергея Шемета. Несмотря на вновь обретенную силу Аграриев-Статистов в коалиции, организация сталкивается с противодействием со всех сторон: Аграрные Демократы и Гетман теперь следят за каждым ее шагом. Только время покажет, удастся ли им выполнить свои обещания по преобразованию украинского государства."
 ukraine_coalition_events.1.a: "Первое партизанское правительство?"

 ukraine_coalition_events.2.t: "Судьба заговорщиков"
 ukraine_coalition_events.2.d: "Борис Гомзин, вероятно, лидер Союза гетманистов, в течение многих лет пользовался значительным влиянием в исполнительной власти; хотя попытка переворота не состоялась, было ясно, что Гомзин и остальные члены ШД пытались захватить власть в свои руки во время восстания.\n\nПосле того, как пыль осела и гетманская коалиция укрепила свои позиции, остается один вопрос: что делать с заговорщиками?\nХотя Хомзын уже не имеет такого политического влияния, как раньше, даже на самого гетмана, он представляет ряд возможностей для аграриев-статистов, поскольку по-прежнему имеет связи в службах безопасности, армии и полиции. Если заключить с Гомзыном маловероятный союз в обмен на то, что он позволит нам использовать эти связи, борьба аграриев-статистов за власть может стать более легкой. С другой стороны, признание его влияния может показаться отчаянной попыткой, а сотрудничество с человеком, которого считают потенциальным заговорщиком, может принести нам больше неприятностей, чем чего-либо еще. Снижение его роли в исполнительном аппарате, низведение его до второстепенной должности, фактически отстранение его от политического влияния, может завоевать сердца многих, кто хочет, чтобы в стране был восстановлен закон и порядок, а предатели были уничтожены."
 ukraine_coalition_events.2.a: "Заключить союз с Хомзиным."
 ukraine_coalition_events.2.b: "Перевести его на какую-нибудь второстепенную должность в [201.GetName], или что-то в этом роде."

 ukraine_coalition_events.3.t: "Судьба генерала Присовского"
 ukraine_coalition_events.3.d: "Второй по значимости чиновник в СГД генерал Константин Присовский представляет собой сложное испытание для аграриев-статистов. В отличие от Гомзина или Полтавца-Остряныци, он сохраняет определенную популярность, особенно среди военных; он известен подавлением крестьянских восстаний 1919-1920 гг. и сыграл главную роль в избавлении страны от анархистских банд Махно в том же году. Такое высокое отношение к Присовскому заставляет Шемета и аграриев-статистов опасаться предпринимать попытки борьбы с ним, но, учитывая его явные связи с ШД, принуждение его к досрочной отставке может быть вполне возможным. Однако такой шаг наверняка вызовет недовольство военных и возможно, самого гетмана, учитывая давние связи между ними. "
 ukraine_coalition_events.3.a: "Он по-прежнему нужен."
 ukraine_coalition_events.3.b: "Ему давно пора на заслуженную пенсию."

 ukraine_coalition_events.4.t: "Судьба Ивана Полтавца-Остряка"
 ukraine_coalition_events.4.d: "Как глава Великой казачьей рады, Иван Полтавец-Острянец обладает значительным влиянием среди казачьих институтов Украины. Тем не менее, среди ШД он считается крайне ненадежным, лично амбициозным и авантюрным, что играет в нашу пользу и должно облегчить работу с ним. Во время восстания Полтавец-Острянец командовал отрядом, который почти не дезертировал в республиканские войска, и поэтому его мнение несколько высоко, однако многие отмечают его поведение во время восстания как жестокое и беспринципное. Лишение его руководства Великой казачьей радой потребует меньше усилий и быстро решит проблему, но привлечение его к суду по обвинению в злоупотреблении властью может стать демонстрацией силы, в которой так нуждаются аграрии-статисты, пытающиеся удержать власть."
 ukraine_coalition_events.4.a: "Заменить его на посту лидера Великой казацкой рады."
 ukraine_coalition_events.4.b: "Привлечь его к суду."

 ukraine_coalition_events.5.t: "Последний гвоздь в крышку гроба"
 ukraine_coalition_events.5.d: "Сделан последний шаг к закреплению господства аграриев-статистов. Сойм, постепенно ослабевая в результате междоусобиц и все более утрачивая свою значимость, отходит на второй план перед такими институтами УСХД, как Всеукраинское сословное собрание и Совет присяжных заседателей. С прямого одобрения гетмана и отамана-министра глава Совета присяжных Николай Кочубей созвал съезд представителей местных сословных советов и Всеукраинского сословного собрания, объявив о роспуске Сойма и передаче его полномочий Собранию.\n\nПолитические партии были ограничены, а сословные советы стали единственной формой политического представительства в государстве. Реакция бывшей УДХП пока что была вялой; несколько ее видных деятелей вошли в состав Совета присяжных, а Демократическая фракция выразила сожаление по поводу \"антиконституционного переворота\" и пообещала бороться за демократию, хотя, похоже, их усилия в основном тщетны."
 ukraine_coalition_events.5.a: "Это не переворот, клянусь!"

 ukraine_coalition_events.6.t: "Прокладывая путь"
 ukraine_coalition_events.6.d: "В связи с постепенной стабилизацией общей ситуации и завершением восстановительных работ отаман-министр Сергей Шемет созвал конференцию, чтобы \"расширить полномочия гетманской коалиции в связи с новыми политическими событиями\." Несмотря на значительное внимание и сопротивление тому, что пост отаманского министра занимает член аграриев-статистов, остается очевидным, что коалиция под управлением Шемета была стабильной и мирной, по крайней мере, до сих пор. На конференции Шемет, вероятно, убежденный Кочубеем и его сторонниками, планирует добиваться включения в коалиционную программу ряда более радикальных предложений, таких как создание местных сословных советов, а также возведение Совета присяжных заседателей в ранг национального института."
 ukraine_coalition_events.6.a: "Посмотрим, как все пройдет."

 ukraine_coalition_events.7.t: "Иллюзия единства"
 ukraine_coalition_events.7.d: "Ходят слухи о "пакте"\ между союзниками Сергея Шемета и политиками, близкими к деятелю СДХП Игорю Кистяковскому; якобы в обмен на щедрые должности в правительстве часть СДХП будет поддерживать программу Шемета и голосовать за включение некоторых классократических идей в программу гетманской коалиции. Слухи распространились настолько, что Николай Михновский обратился сегодня к членам Демократической аграрной партии, заявив, что если такие переговоры существуют, то они должны вестись открыто, а не тайно, поскольку такая тайна разрушает единство партии. Он даже указал на Кистяковского как на возможного виновника такой сделки, довольно издевательски сославшись на его репутацию политического манипулятора. Независимо от того, соответствуют ли эти слухи действительности, очевидно, что межпартийное единство нарушено, а аграрные демократы разобщены как никогда...."
 ukraine_coalition_events.7.a: "Идеально."

 ukraine_coalition_events.8.t: "Последний призыв плутократов"
 ukraine_coalition_events.8.d: "В ответ на планы Сергея Шемета относительно новой коалиционной конференции демократическая фракция УДХП заявила о своем намерении бойкотировать ее и призвала других членов УДХП сделать то же самое. По их мнению, очевидно, что Шемет намерен использовать свои последние успехи в преодолении кризиса после восстания. Расширение мандата\, по их мнению, является не более чем обычным захватом власти, направленным на реализацию антидемократической программы УШХД. Хотя к призыву многие не прислушались, этот демарш лишь усилил раскол внутри партии. И хотя многие в УДХП предпочли проигнорировать эти опасения, очевидно, что делегация партии на конференции окажется в невыгодном положении, учитывая все внутренние разногласия."
 ukraine_coalition_events.8.a: "Все идет по плану!"

 ukraine_coalition_events.9.t: "Триумф, к которому долго шли"
 ukraine_coalition_events.9.d: "Несведущий человек может предположить, что нынешнее собрание гетманской коалиции ничем не отличается от многочисленных предыдущих, в том числе и от того, которое состоялось совсем недавно, после последних выборов в Сойм.\n Ничто не может быть дальше от истины.\n\n Исчезла обычная уверенность членов УДХП. Высказывания Михновского выглядят сдержанными по тону. Кистяковский, обычно безупречно сконцентрированный, расфокусирован. Он вдруг стал просто пожилым человеком, не уверенным в своем будущем. Нервные взгляды постоянно бросаются на несколько пустых рядов, отведенных для делегатов от УДХП: видимо, призыв к бойкоту был воспринят более широко, чем предполагалось. Независимые представители собираются небольшими группами: голоса тихие, рассматриваемые варианты так или иначе не устраивают.\nДелегация Союза аграриев-статистов, похоже, впервые в истории гетманской коалиции оказалась под контролем. Сергей Шемет сумел завоевать расположение Павла Скоропадского: если единоначалие Липинского вызывало отторжение, то предполагаемый прагматизм Шемета получил одобрение. Как и подобает признанному лидеру, его слова на конференции были первыми и последними.\n\nБольшую часть времени говорил Николай Кочубей: он нарисовал видение сильной Украины, не разделенной мелкими пристрастиями и объединенной под знаменем трудовой наследственной монархии. Первые шаги на пути к этой мечте являются самыми важными: местные сословные советы должны быть достаточно полномочными, а их деятельность должна контролироваться беспристрастным Советом присяжных заседателей. Разумеется, состав Совета не будет ограничиваться членами УХД, соответствующую долю мест в нем получат независимые и УДХП.\nВ конечном итоге, голосование по предложенным изменениям прошло с небольшим перевесом, но этого оказалось достаточно. Трансформация украинского государства начинается сейчас."
 ukraine_coalition_events.9.a: "Пора приступать к реальной работе."

 ukraine_coalition_events.10.t: "Казачьему роду нема перевода?"
 ukraine_coalition_events.10.d: "Формальное восстановление казачьего сословия было одной из первых мер, предпринятых Скоропадским после прихода к власти в 1918 году. Эта военизированная, землевладельческая квазиаристократия должна была стать опорой нового консервативного строя. Со временем была создана сложная структура самоуправления, начиная с местных казачьих советов (рад) и заканчивая Великой казачьей радой.\nПо прошествии почти двух десятилетий результаты эксперимента выглядят неоднозначно. Наделенные различными привилегиями, такими как право оказывать помощь местным правоохранительным структурам, возможность влиять на местную политику через казачьи советы и самое главное, свобода собирать собственное вооруженное ополчение, казаки в итоге не смогли стать чем-то большим, чем прославленными землевладельческими военизированными формированиями, зачастую слабо претендующими на старые традиции.\n\nПо крайней мере, это мнение широко распространено среди значительной части гетманской коалиции. Восстание только усугубило опасения и подозрения по этому поводу. Казачье ополчение сыграло важную роль в его подавлении, но слабая дисциплина и порой неуместное чувство долга привели к ряду досадных инцидентов. Чтобы сохранить монополию государства на насилие в неприкосновенности, необходимо что-то предпринять.\n\n Появились два предложения: в УСХД казачьи советы долгое время рассматривались как перспективная основа для сословных структур. Конечно, степень их милитаризации должна быть резко снижена, но сами советы были бы полезны для украинского государства. Для УДХП даже это слишком: они предполагают постепенное превращение этих собраний в чисто церемониальные органы, занимающиеся исключительно сохранением и воспеванием богатой украинской культуры."
 ukraine_coalition_events.10.a: "Лучше со временем свести эти советы к клубам культуры."
 ukraine_coalition_events.10.b: "Они найдут истинное предназначение в новом классовом строе."

 ukraine_coalition_events.11.t: "Падение Шеметского кабинета"
 ukraine_coalition_events.11.d: "Когда Союз аграриев-государственников неожиданно стал доминирующей частью гетманской коалиции, все складывалось как нельзя лучше. Им вдруг представился шанс всей жизни, и они не собирались его упускать.\n\n Похоже, что амбиции взяли верх: с самого начала пребывания Шемета на посту отамана-министра возникли трудности. Аграрные демократы, несмотря на свою многочисленность и разнообразие, объединились в оппозицию к УШД, отказываясь голосовать за любые предложенные им законы и угрожая развалить коалицию между ними. В кулуарах Шемет постоянно препирался с более идеологически настроенными представителями УШД, такими как Николай Кочубей, и не мог прийти к единому мнению относительно мер, которые необходимо было принять для закрепления своего правления. Хотя после республиканского восстания предполагалось восстановление и мир, вместо этого наступил политический хаос.\n\nОценив ситуацию, гетман в частном порядке сообщил Шемету, что тот не оправдал надежд и скоро будет заменен; аграрные демократы ликовали, поскольку им сообщили, что замена отамана-министра будет из их рядов, и призвали их решить вопрос о партийном руководстве. В итоге пребывание на посту отамана-министра Шемета стало самым коротким за всю двадцатилетнюю историю страны..."
 ukraine_coalition_events.11.a: "Возможно, возвращение к нормальной жизни?"

 ukraine_coalition_events.12.t: "Крах УСХД"
 ukraine_coalition_events.12.d: "Очевидный провал аграриев-статистов привел к их полному краху. Будущая заключительная конференция, состоявшаяся в [221.GetName], стала катастрофой для всех присутствовавших; Шемет обвинил некоторых членов УШД в том, что они уничтожили всякую надежду на серьезную реализацию их программы, и что если бы они позволили ему отвечать за большинство политических маневров, он не оказался бы в том положении, в котором находится сейчас.\n\nВскоре после этого бывший отаман-министр связался с УДХП, чтобы начать процесс переговоров, заявив о своем намерении вступить в ряды демократических аграриев. Он был не одинок в этом решении: многие аграрии-государственники предпочли отказаться от УСХД в пользу ОДХП. То, что начиналось как многообещающая партия, в центре которой стоял ветеран консервативного движения и близкий доверенный гетмана, вскоре превратилось в организацию, пораженную узким идеологическим доктринерством, крайне неадекватным политическим реалиям украинского государства. Когда последние капли доверия к организации были потрачены на реализацию причудливых и надуманных проектов, настало время расстаться.\n\n После того, как главный политический спонсор УШД ушел, ситуация стала поистине мрачной: на следующий день Кочубей как неофициальный глава УШД принял решение о полном роспуске организации. Вместо нее теперь существует \"Братство классократов-монархистов\" - небольшой и по большей части не имеющий никакого значения идеологический форум для Кочубея и других последователей мысли Липинского."
 ukraine_coalition_events.12.a: "В добрый путь."

 ukraine_coalition_events.13.t: "[202.GetName]ская Конференция - предпочтение аграриев"
 ukraine_coalition_events.13.d: "Конференция, призванная определить лидера УДХП (а впоследствии и нового отамана-министра), наконец-то началась. За этот пост будут бороться два титана партии - Игорь Кистяковский и Николай Михновский. Конечный результат предсказать невозможно, поскольку УДХП - большая и неоднородная организация, изобилующая фракционностью.\n\n Аграрное крыло партии является наиболее сильным и составляет ее экономический костяк. Долгое время в нем преобладали крупные землевладельцы, которые склонны поддерживать Кистяковского как хитрого и хорошо связанного политического оператора. Однако в последние годы в партии стало более заметным присутствие тех, кто отстаивает интересы мелких и средних фермеров. Они отдают предпочтение Михновскому, поскольку он всегда ставил защиту \"честного украинского крестьянина\" во главу угла.\n\nКто сможет обеспечить себе благосклонность аграрного крыла?"
 ukraine_coalition_events.13.a: "Кистяковский продолжает заручаться поддержкой аграриев."
 ukraine_coalition_events.13.b: "Аграрии смещают свой голос в сторону Михновского!"

 ukraine_coalition_events.14.t: "[202.GetName]ская Конференция - выбор интеллигенции"
 ukraine_coalition_events.14.d: "Второй вопрос - это националистическая, праворадикальная интеллигенция. Михновский, скорее всего, заручится их поддержкой, поскольку может с полным основанием заявить, что является одним из ведущих деятелей борьбы за независимость Украины. Десятилетия назад, когда многие представители украинской интеллигенции выступали за автономию в составе федеративной России, Михновский был одним из первых сторонников полной и окончательной независимости; хотя его порой слишком резкая риторика и оттолкнула некоторых, он все же заслужил большое уважение за свою бескомпромиссную позицию. Тем не менее, Кистяковский пользуется определенным уважением в украинском судейском сообществе, что может в определенной степени влиять на позицию интеллектуального крыла партии."
 ukraine_coalition_events.14.a: "Кистяковский раскачивает интеллигенцию!"
 ukraine_coalition_events.14.b: "Михновский продолжает свое доминирование."

 ukraine_coalition_events.15.t: "[202.GetName]ская Конференция - фаворит независимых"
 ukraine_coalition_events.15.d: "Последним и пожалуй, самым важным вопросом для обоих кандидатов является обеспечение поддержки независимых кандидатов, в частности, вернувшегося в партию Сергея Шемета и его сторонников. Несмотря на то, что Шемет находится в некоторой опале из-за недолгого пребывания на посту отамана-министра, он все же является одним из основателей партии и может оказать влияние на голосование, особенно учитывая его связи с аграрной фракцией партии. Шемет был давним политическим соратником Михновского в правых рядах Национального движения с начала 1900-х годов, но, с другой стороны, Шемет добился своего положения в основном за счет работы рядом с истеблишментом, что Кистяковский представляет лучше, чем Михновский."
 ukraine_coalition_events.15.a: "Кистяковский побеждает Шемета и его союзников."
 ukraine_coalition_events.15.b: "Шемет и Михновский сохраняют политическую дружбу."

 ukraine_coalition_events.16.t: "Окончание Киевской конференции"
 ukraine_coalition_events.16.d1: "Киевская конференция закончилась, и похоже, Игорь Кистяковский получил голоса аграриев-демократов, чтобы стать новым лидером партии. Пообещав умеренный курс и защиту Украины от радикалов \"изнутри и извне\", Кистяковский на следующий день получил поздравительное письмо от гетмана, который объявил Сойму, что Кистяковский займет пост отамана-министра."
 ukraine_coalition_events.16.d2: "Киевская конференция закончилась, и похоже, Николай Михновский получил голоса аграриев-демократов, чтобы стать новым лидером партии. В своей речи Михновский сделал акцент на внешней угрозе независимости Украины, прежде всего, со стороны России, и пообещал бороться с ней любой ценой. На следующий день гетман прислал Михновскому поздравительное письмо, в котором объявил Сойму, что Михновский вступает в должность отамана-министра."
 ukraine_coalition_events.16.a: "Поздравляю, господин Кистяковский."
 ukraine_coalition_events.16.b: "Поздравляю, господин Михновский."

 ukraine_coalition_events.17.t: "Формирование УРДП"
 ukraine_coalition_events.17.d: "Украинская радикально-демократическая партия является примерно такой же большой партией, как и Аграрно-демократическая партия, и это то, чем могут воспользоваться аграрные демократы. В течение некоторого времени правоцентристские и центристские силы Радикальной демократической партии были весьма недовольны левым крылом, но, несмотря на это, продолжали оставаться в партии, однако сейчас времена изменились. Раскол Радикал-демократов после восстания, а также недавний приход к власти Аграрных демократов без партнерства с СХД создали возможность для нового политического альянса. По инициативе отамана-министра [GetSecondInCommand] были проведены тайные переговоры с центристами-радикал-демократами, такими как Пилип Пилипчук и Виктор Андриевский, о создании новой партии-сателлита Аграрных демократов.\n\nНа сегодняшний день зарегистрирована новая политическая партия - Украинская крестьянская народная партия. Она в целом солидаризируется с аграрно-демократическими партиями по земельным и финансовым вопросам, но при этом остается верной старым ценностям радикальных демократов - народному представительству и расширению прав и возможностей сойма. Создание этой партии вызвало недовольство многих представителей радикальных демократов, которые все больше обеспокоены своим положением в украинской политической сфере. Хотя Украинская крестьянская народная партия невелика, ее существования может быть достаточно, чтобы обеспечить аграрным демократам большинство на будущих выборах, чему последние, как сообщается, очень рады."
 ukraine_coalition_events.17.a: "Очень нужные союзники."

 ukraine_coalition_events.18.t: "Полномочия гетмана"
 ukraine_coalition_events.18.d: "На протяжении всего времени существования гетманата Скоропадский сохранял значительные полномочия. Он может накладывать вето на законы, предлагаемые Соймом, вынуждая Сойм искать компромисс с гетманской трактовкой, имеет право назначать отамана-министра без особого учета состава Сойма. Демократическая фракция УДХП долгое время выступала за то, чтобы гетман стал скорее фигурой, не слишком похожей на многих конституционных монархов в Европе. Однако в условиях, когда парламентские реформы зашли в тупик, по крайней мере, пока, эти меры, похоже, не находят поддержки. В конце концов, УДХП во многом обязана своим положением в украинской политике самому Скоропадскому, чье вмешательство спасло консервативный плюрализм против УРДП-П. В итоге, похоже, что любые предложения по ограничению его власти придется подождать."
 ukraine_coalition_events.18.d2: "На протяжении всего времени существования гетманата Скоропадский сохранял значительные полномочия. Он может наложить вето на законы, предлагаемые Соймом, вынуждая Сойм искать компромисс с гетманской трактовкой, имеет право назначать отамана-министра без особого учета состава Сойма. Демократическая фракция УДХП давно выступает за то, чтобы гетман стал в большей степени фигурой, не слишком похожей на многих конституционных монархов в Европе. В условиях набирающих обороты парламентских реформ это находит достойную поддержку, однако исполнительная власть остается влиятельной силой, как и советники Скоропадского."
 ukraine_coalition_events.18.d3: "На протяжении всего времени существования гетманата Скоропадский сохранял значительные полномочия. Он может наложить вето на законы, предлагаемые Соймом, вынуждая Сойм искать компромисс с гетманской трактовкой, имеет право назначать отамана-министра, не обращая особого внимания на состав Сойма. Демократическая фракция давно выступает за то, чтобы гетман стал в большей степени фигурой, не слишком похожей на многих конституционных монархов в Европе. После принятия трех значительных предложений по реформе, наделивших Сойма большими полномочиями, демократическая фракция УДХП значительно расширила свои возможности, и эта идея представляется лишь естественным развитием нынешней политической тенденции."
 ukraine_coalition_events.18.a: "Гетман должен оставаться политически ключевой силой."
 ukraine_coalition_events.18.b: "Возможно ли найти компромисс в этом вопросе?"
 ukraine_coalition_events.18.c: "Гетман станет действительно конституционным монархом."

 ukraine_coalition_events.19.t: "Неприемлемый компромисс"
 ukraine_coalition_events.19.d: "Для Сойма, в котором сейчас доминирует УДХП, а также для "Независимых" и других сторонников реформистских идей, одно можно сказать наверняка. Антигетманское восстание и неудачи недолговечного шеметского правительства обнажили глубокие недостатки гетманской системы. Еще раньше неудачи правительства в проведении значимой земельной реформы и индустриализации показали, что если правительство выживет в будущем, оно не сможет продолжать действовать только за счет грубой силы.\n\n Корень проблемы лежит в исполнительной власти. Слишком долго Сойм был оттеснён на второй план в пользу Скоропадского и его ближайших советников. Несмотря на обещания гетмана поддерживать демократическую систему, настоящая демократия так и не наступила.\n\n Все эти беды, безусловно, подорвали доверие к гетману, но теперь, когда правительство УДХП не сдерживается более авторитарными силами распавшейся гетманской коалиции и закулисной политикой ШД, появилась возможность. Мы ни в коем случае не должны стремиться к упразднению самого гетманата - Народная Республика уже показала свою несостоятельность в любом качестве - но, работая над расширением возможностей Сойма и ограничивая со временем власть гетмана, мы сможем решить многие из проблем, с которыми государство сталкивалось на протяжении многих лет."
 ukraine_coalition_events.19.a: "Действительно, высокая задача..."

 ukraine_coalition_events.21.t: "Corruption from VSZV and Protofis?"
 ukraine_coalition_events.21.d: "Появились слухи о возможном вмешательстве ВСЗС и "Протофиса" в работу нового правительства, в котором доминирует УШД. Согласно этим слухам, некоторые члены ВСЗС и "Протофиса" используют свои финансы и социальное положение для влияния на процесс формирования и выборов в местные и региональные советы классов. Альянс между ВСЗС и этими лоббистскими организациями с самого начала был весьма непростым, и многие встревожены таким развитием событий. Мы могли бы продолжить расследование этого вопроса, но дальнейший раскол между альянсом, который наше правительство заключило с ВСЗС и 'Протофисом', может выглядеть не лучшим образом, учитывая обязательства, которые мы взяли на себя в отношении этого альянса"
 ukraine_coalition_events.21.a: "Провести дополнительное расследование."
 ukraine_coalition_events.21.b: "Возвращайтесь, когда у вас будут РЕАЛЬНЫЕ доказательства."

 ukraine_coalition_events.22.t: "Реальные доказательства"
 ukraine_coalition_events.22.d: "Похоже, что слухи были правдивы: расследование деятельности ВСЗС и "Протофиса" обнаружило множество доказательств, указывающих на махинации невероятных масштабов. Чиновники, связанные с альянсом, лоббировали в местных классовых советах интересы крупных землевладельцев и промышленников в ущерб более бедным фермерам и мелким предпринимателям в обмен на большее влияние в местной и региональной администрации, что привело к тому, что многие из наиболее влиятельных классовых советов превратились в советы, в которых доминирует альянс. Этого, конечно, нельзя допустить, но и полностью отвергать ВСЗС и Протофиса было бы неразумным решением. Мы должны найти способ так или иначе справиться с ними"
 ukraine_coalition_events.22.a: "Сделайте им строгое предупреждение, чтобы они остановились."
 ukraine_coalition_events.22.b: "Убрать чиновников, связанных с лоббированием."

 ukraine_coalition_events.23.t: "Скандал с ВСЗС/Протофис"
 ukraine_coalition_events.23.d: "На аграриев-статистов обрушилась волна обвинений в коррупции. Многие газеты обнаружили контакты между альянсом ВСЗС и Протофиса и местными советами классов, косвенно изображая правительство как некомпетентное или не желающее принимать меры. Несмотря на то, что новости ушли, мы все равно должны что-то сделать, чтобы спасти свою репутацию..."
 ukraine_coalition_events.23.a: "Тихо уволить их..."

 ukraine_coalition_events.24.t: "Выборы объявлены"
 ukraine_coalition_events.24.d: "В связи с окончанием восстания и постепенной стабилизацией ситуации гетман выступил сегодня по радио с заявлением о том, что выборы, первоначально назначенные на ноябрь, состоятся в ближайшие несколько недель. В отличие от предыдущих выборов, население не испытывает особого восторга, в основном желая скорейшего восстановления и возвращения к нормальной жизни. Делаются прогнозы, кто получит большинство голосов в Сойме, но есть уверенность, что гетманская коалиция продолжит свое правление - УРДП со времен восстания сотрясается от дезертирства и раскола, а отсутствие мощной оппозиции, несомненно, еще больше укрепит позиции коалиции. Еще один момент, на который стоит обратить внимание, это СГД - ее судьба остается неопределенной, и избрание [GetYear] может стать для нее поворотным моментом."
 ukraine_coalition_events.24.a: "Что бы ни случилось, надеюсь, что насилия не будет."

 ukraine_coalition_events.25.t: "Из тех, кто без класса"
 ukraine_coalition_events.25.d: "В последние недели канцелярию отамана-министра захлестнул шквал заявлений, жалоб, просьб, а иногда и требований, исходящих в основном от различных профессиональных организаций юристов, врачей, учителей и представителей других профессий, считающихся непроизводственными. Всеукраинский союз медицинских работников, [202.GetName] Судебное общество, Ассоциация учителей Украины, Союз журналистов, Национальная академия наук и многие, многие другие - все они требуют такого же уровня представительства в советах классов, какой был предоставлен аграрным и промышленным организациям.\n\n Ситуация непростая. С одной стороны, эти профессионалы крайне важны для общества и страны, и многие из них, безусловно, обладают лишь искренним желанием служить народу без каких-либо политических устремлений. С другой стороны, история не раз показывала, что люди, не имеющие прочных корней в традиционных структурах производящих классов, зачастую лишены чувства ответственности перед обществом в целом и часто руководствуются собственными мелкими амбициями. Именно это в конечном итоге и привело к гибели Народной Республики в 1917 году - слишком многое решали юристы, писатели и публицисты, а те, кто работал на земле или обеспечивал промышленное развитие страны, остались за бортом процесса принятия решений.\n\n Мы не должны повторять эту ошибку, но, возможно, компромиссное решение возможно?"
 ukraine_coalition_events.25.a: "Мы уже поддерживаем эти организации, не так ли?"
 ukraine_coalition_events.25.b: "Они могут играть только совещательную роль в советах классов."
 ukraine_coalition_events.25.c: "Согласиться с требованиями."

 ukraine_coalition_events.26.t: "Проблемы с классовыми советами"
 ukraine_coalition_events.26.d: "Наше решение отдать предпочтение аграрному классу перед всеми остальными привело к некоторым проблемам. Уже некоторое время представители различных промышленных объединений заявляют, что в устройстве классовых советов слишком большой перекос в пользу аграрных организаций. Они не понимают, что, несмотря на все успехи индустриализации, Украина остается аграрной страной, и мы не можем просто игнорировать социально-экономические реалии нашего государства. Вполне естественно, что аграрный класс должен играть ведущую роль в управлении страной. Тем не менее, ради стабильности нашей страны мы должны так или иначе реагировать на эти жалобы"
 ukraine_coalition_events.26.a: "Не обращайте на них внимания."
 ukraine_coalition_events.26.b: "Попытаться найти компромисс."
 ukraine_coalition_events.26.c: "Использовать контакты Хомзина, чтобы заставить замолчать самых громких жалобщиков."

 ukraine_coalition_events.27.t: "Проблемы УДХП"
 ukraine_coalition_events.27.d: "Положение УСХД как старшего партнера в гетманской коалиции беспокоит многих, особенно в Демократической аграрной партии. Некоторые партийные боссы опасаются, что новый порядок вещей может угрожать их положению; поддержка части членов УДХП играет важную роль в том, что УСХД сможет продолжить свое правление, хотя мы должны стараться быть бескомпромиссными в своих взглядах."
 ukraine_coalition_events.27.a: "Их опасения остаются без внимания."
 ukraine_coalition_events.27.b: "Постарайтесь их успокоить."
 ukraine_coalition_events.27.c: "Использовать контакты Хомзина для шантажа."

 ukraine_coalition_events.28.t: "Серьезные перестановки в кабинете министров?"
 ukraine_coalition_events.28.d: "Пока что деятельность Кистяковского на посту отамана-министра проходит довольно гладко - земельная реформа идет полным ходом, грандиозный проект индустриализации дает Украине необходимые материалы для создания мощной армии. Для первого правительства, в котором доминируют аграрники-демократы, кажется, что они оправдали ожидания, а в некоторых случаях и превзошли их.\n\n Хотя достижения нового гетманского правительства не остались незамеченными, проблемы все же возникли, одна из них касается самого Кистяковского. По кабинету прошел слух, что Кистяковский по состоянию здоровья намерен сложить с себя полномочия отамана-министра и даже предложил гетману свою отставку. Но никаких публичных заявлений по этому поводу сделано не было, и можно было только сделать вывод, что гетман отклонил его предложение. Высказываются разные версии причин этого: одни говорят, что, поскольку срок пребывания Шемета на посту министра был столь коротким, возникла необходимость формирования более стабильного и долговечного кабинета. Другие согласны с этим, но при этом подчеркивают важность влияния иностранных держав: гетманское правительство не должно выглядеть слабым и неустойчивым перед лицом растущего российского реваншизма и международной милитаризации.\n\n В частном порядке слухи подтвердились, поскольку Кистяковский рассказал о ситуации своему окружению. Он заявил, что, хотя и не собирается уходить в отставку, необходимо найти преемника его руководства. После долгих внутренних дебатов выбор пал на Владимира Коростовца, поскольку он давно работает в МИДе, имеет обширные контакты как с канадским, так и с недавно признанным революционным британским правительствами, а также в целом придерживается умеренных политических взглядов. Ожидается, что он сможет продолжить курс, намеченный Кистяковским."
 ukraine_coalition_events.28.a: "Желаю удачи господину Коростовцу!"

 ukraine_coalition_events.29.t: "Смерть Игоря Кистяковского"
 ukraine_coalition_events.29.d: "Сегодня, в окружении друзей и близких, [?global.date.GetDateStringNoHourLong], скончался отаман-министр Игорь Кистяковский. Его наследие - это успешная карьера, которая позволила модернизировать украинское государство и ввести его в новую эпоху. Несмотря на то, что прошло уже более года с начала российского вторжения, Украина еще не потеряна и продолжает противостоять российской агрессии.\n\n В знак партийного единства и уважения к воле Кистяковского Владимир Коростовец был утвержден лидером Аграрно-демократической партии, а вскоре после этого назначен гетманом и соймом отаманом-министром. В своей инаугурационной речи Коростовец поклялся продолжить наследие Кистяковского и обеспечить единство украинского народа перед лицом российской агрессии. История Коростовца, возможно, не столь велика, как у Кистяковского, поскольку он всю жизнь занимал менее значимые государственные посты, но у него большой опыт работы в МИДе, за что его многие в УДХП уважают - несмотря на это, он рассматривается как компромиссный кандидат между многочисленными фракциями партии и тот, кто может сплотить страну в трудные времена."
 ukraine_coalition_events.29.d2: "В окружении друзей и близких сегодня, в день [?global.date.GetDateStringNoHourLong], скончался отаман-министр Игорь Кистяковский. Его наследие - это успешная карьера, которая позволила модернизировать украинское государство и ввести его в новую эпоху. Несмотря на то, что прошло уже более года с начала российского вторжения, Украина еще не потеряна и продолжает противостоять российской агрессии.\n\n В знак партийного единства и уважения к воле Кистяковского Владимир Коростовец был утвержден лидером Аграрно-демократической партии, а вскоре после этого назначен гетманом и соймом отаманом-министром. В своей инаугурационной речи Коростовец поклялся продолжить наследие Кистяковского и обеспечить единство украинского народа перед лицом российской агрессии. История Коростовца, возможно, не столь велика, как у Кистяковского, поскольку он всю жизнь занимал менее значимые государственные посты, но у него большой опыт работы в МИДе, за что его многие в УДХП уважают - несмотря на это, он рассматривается как компромиссный кандидат между многочисленными фракциями партии и тот, кто может сплотить страну в трудные времена.\n\nВ конце выступления Коростовец вспомнил о своих контактах в Канаде и подчеркнул, что они важны как никогда; недавно успешно проведенная Галифаксская конференция, по словам Коростовца, стала маяком света и единства перед лицом неопределенности, и этот великий союз должен противостоять всем силам синдикалистской тирании и московитской агрессии."
 ukraine_coalition_events.29.a: "Я уверен, что господин Коростовец прекрасно справится со своей работой."

 ukraine_coalition_events.30.t: "Встреча в Александровке"
 ukraine_coalition_events.30.d: "Как и многие встречи, предшествующие радикальным переменам, эта была достаточно сдержанной. Отаман-министр Сергей Шемет принял своего соратника и главного идеолога УСХД Николая Кочубея в его родовом доме в небольшом селе Александровка, что к юго-востоку от Лубнов. Два видных аграрника-статиста собрались, чтобы обсудить будущее движения и страны после того, как Шемет, похоже, закрепился у власти.\n\n Кочубей высказался прямо: восстание окончательно доказало правильность и глубокую мудрость замысла Вячеслава Липинского. До тех пор, пока в национальной политике будут действовать бесклассовые демагоги и махинаторы, раскачивающие доверчивые массы в угоду своим узким интересам, Украина будет оставаться в опасности. В такие времена нужны лидеры, способные понять, что такое ответственность перед соотечественниками, лидеры, опирающиеся на самое органичное социальное деление, которое только можно себе представить, - на класс. Должно быть пересмотрено и положение гетмана - монарх не должен быть \"самым могущественным политиком\", поддерживаемым подневольной бюрократией, доходящей до авторитарной диктатуры. Гетман должен служить символом единства для всех украинцев, его задача - защищать и сохранять традиции справедливости, служить балансирующим фактором между творческими порывами и волей к власти национальных элит и восприимчивостью пассивных масс. Сейчас, когда у СХД появилась реальная возможность воплотить это видение в жизнь, нерешительность недопустима. Иначе, лишившись цели, организация прекратит свое существование.\n\n Монолог, скорее напоминающий лекцию, продолжался некоторое время, но Шемет привык к таким встречам. В конце концов, было решено, что некоторые пункты этой \"классократической\" программы будут вынесены на дальнейшее рассмотрение Гетманской коалиции. Реализация, если предложение будет принято, ляжет на плечи самого Кочубея, как вновь избранного главы Совета присяжных заседателей УСХД."
 ukraine_coalition_events.30.a: "Наше дело - самое праведное."

 ukraine_coalition_events.31.t: "Аудитория"
 ukraine_coalition_events.31.d: "Мало кто считал такой исход наиболее вероятным, но он таков, каков он есть: после недолгих раздумий гетман всея Украины Павел Скоропадский решил возложить на Сергея Шемета, одного из ведущих деятелей УСХД, полномочия и обязанности отамана-министра.\n\n Аудиенция, предоставленная будущему отаману-министру, была краткой, хотя, как утверждается, не без курьезных моментов. Много позже, в частной беседе, Шемет вспоминал, что по приезде застал Скоропадского за пролистыванием страниц исторического труда Вячеслава Липинского \"Украина в переломный момент\" Отложив книгу в сторону, он в довольно сухой и непринужденной манере сообщил Шемету о своем решении. Среди причин назначения были названы относительно высокие результаты на выборах, надежные рекомендации близких доверенных лиц и \"многолетняя история упорной работы на благо всей Украины\" Незадолго до отъезда Шемета Скоропадский якобы заметил, что Вячеслав Липинский, который оставался личным советником гетмана до самой его смерти, хотя и был многоликим, но, конечно, не лишен верности и истинной преданности - качеств, едва ли встречающихся у современных государственных деятелей.\nПомимо апокрифических анекдотов, причины столь любопытного выбора отамана-министра, скорее всего, были вполне прозаичны. После фиаско правительства Дорошенко Скоропадский остановил свой выбор на кандидате, чья поддержка в Сойме была достаточно сильна, чтобы обеспечить ему определенную легитимность, но недостаточно сильна, чтобы дать возможность действовать самостоятельно."
 ukraine_coalition_events.31.a: "Долгожданная возможность реализовать замысел Липинского?"

 ukraine_coalition_events.32.t: "Один решающий шаг"
 ukraine_coalition_events.32.d: "Сегодня делегаты, избранные местными советами классов со всей страны, собрались в [202.GetName], чтобы торжественно открыть новый законодательный орган - Всеукраинское собрание классов. Отныне представители производящих классов смогут оказывать помощь в согласовании экономических и политических вопросов на самом высоком уровне, поскольку специальным постановлением Совета присяжных заседателей Собрание получило значительные полномочия в вопросах экономического развития и даже право вето на соимские законодательные предложения.\n\nНа первом заседании присутствовали отаман-министр Сергей Шемет, глава Совета присяжных заседателей Николай Кочубей и самое главное, сам светлейший гетман всея Украины Павел Скоропадский. Он обратился к собравшимся со словами напутствия, заявив, что \"трудолюбивые и старательные люди, проникнутые истинной любовью к нашей стране, всегда составляли ее величайшую силу\".\n\n Первым вопросом повестки дня было избрание Председателя Ассамблеи. Большинство голосов получил Василий Кочубей, бывший член ВСЗС и старший брат Николая Кочубея, который стал первым государственным чиновником, избранным в соответствии с сословными принципами со времен избрания гетмана Скоропадского в 1918 году.\n\n Однако не все решили отметить это поистине знаменательное событие. Многочисленные голоса утверждают, что \"параллельная законодательная власть\" неизбежно приведет к \"размыванию конституционного строя\", но кого волнуют бредни плутократов, чувствующих, как незаслуженно ускользает от них власть?"
 ukraine_coalition_events.32.a: "Наше первое реальное достижение."

 ukraine_coalition_events.33.t: "Суверенитет"
 ukraine_coalition_events.33.d: "За последние годы многое изменилось, и одна из них - это роль, которую гетман играет в повседневных делах государства. Продолжительные встречи с кабинетом министров и советниками в основном ушли в прошлое, их заменили еженедельные аудиенции, предоставляемые только атаману-министру. Однако публичные выступления, особенно вместе с гетманом Даниилом Скоропадским, стали более частыми, чем когда-либо. Украинский народ не должен чувствовать, что его суверен пренебрегает им, и должен быть уверен в стабильности и преемственности гетманского правления.\n\nЭти изменения дались нелегко и поначалу вызвали много споров. Павел Скоропадский был требовательным человеком: по его мнению, карьерным политикам не хватало ответственности и самоотверженности, в то время как профессиональным государственным служащим часто не хватало дальновидности и преданности делу. Таким образом, гетман был вынужден постоянно внимательно следить за политическими событиями, определяя стратегические цели и одновременно пресекая наихудшие эксцессы политического класса.\n\nПоэтому, когда Сергей Шемет и Николай Кочубей (каждый, без сомнения, по своим причинам) предложили уменьшить личное участие гетмана в управлении страной, первая реакция была весьма негативной. Тем не менее, со временем Павел Скоропадский стал более восприимчивым к этой идее: преклонный возраст умерил его склонность к чрезмерному контролю, в то время как классократические реформы привнесли определенную степень предсказуемости в политическую жизнь. С уменьшением числа партизанских отрядов государственные дела теперь находились в руках более прагматичных и деловых людей.\n\nГетман, однако, не остался без козырей. Шемет был достаточно умен, чтобы не полностью игнорировать мнение Скоропадского. Кочубей, как истинно верующий человек, был более непредсказуем, но его можно было держать в узде с помощью своих соратников. Выдвижение одного из ближайших доверенных лиц гетмана, Александра Скоропис-Желтуховского, на должность секретаря Совета присяжных заседателей дало бы гетману широкие возможности направить его в нужное русло, если возникнет такая необходимость."
 ukraine_coalition_events.33.a: "Просвещенное правление для современной страны."

 ukraine_coalition_events.50.t: "Влияние Александра Пальтова"
 ukraine_coalition_events.50.d: "За последнюю неделю Александра Пальтова несколько раз видели в кабинете гетмана. Пальтов, которого можно назвать \"серым преосвященством"\, наиболее известен своим участием в создании Гетманской коалиции более десяти лет назад. В первые годы существования Гетманата он занимал пост заместителя министра иностранных дел и был автором многих временных законов, что закрепило за ним статус довольно антидемократической фигуры. В то же время он кажется более независимым, чем те, кто придерживается аналогичных взглядов, поскольку отказался вступить в СГД, хотя во время антигетманского восстания выступал против умеренного курса Дорошенко. Гетман неоднократно отмечал блестящие способности Пальтова и его заслуги перед государством. Судя по всему, последние консультации Пальтова были посвящены реформам аграрно-демократической партии. Отмечая специфику исполнительных и антипарламентских законов, принятых по его (и других) настоянию много лет назад, г-н Пальтов утверждал, что отмена слишком многих из них может обернуться катастрофой для государства и его институтов, разрушением недавно достигнутой стабильности и мира. Должны ли мы прислушаться к совету нашего \"седого преосвященства\" и спустить на тормозах Отамана-Министра [GetSecondinCommand] или позволить им продолжать в том же духе?"
 ukraine_coalition_events.50.a: "Поговорите с гетманом напрямую, ограничьте его влияние."
 ukraine_coalition_events.50.b: "Нет необходимости участвовать в этом."

 ukraine_coalition_events.51.t: "Советы генерала Шаповала"
 ukraine_coalition_events.51.d: "В то время как в парламенте продолжаются дебаты, в Исполнительный аппарат гетмана Скоропадского поступил экстренный вызов от одного из самых известных его членов - генерала Александра Шаповала. Шаповал - давний сторонник гетмана и гетманистского движения в целом, в том числе и по линии различных консервативных партий и организаций, таких как ШД. Еще дольше Шаповал был ведущим военным офицером, способствовавшим превращению нашей армии в ту грозную силу, которой она является сегодня. За такую преданность и эффективность господин Шаповал получил должность, близкую к гетману.\n\n Поэтому неудивительно, что Шаповал решил вызвать гетмана на беседу из-за \"беспокойства\" по поводу передачи некоторых обязанностей Сойму. Отметив, что значительная часть гетманского правления основана на исполнительной власти, он заявил, что для стабильности государственных институтов было бы лучше, если бы гетман ограничил \"интенсивность\" последних реформ \"парламентаризации\" Конечно, возникает вопрос. Прислушаться ли нам к довольно неконкретному совету генерала Шаповала или пока держать \"руки подальше\"?"
 ukraine_coalition_events.51.a: "Конечно, его слова мало что значат, мы можем это учитывать."
 ukraine_coalition_events.51.b: "Нет комментариев по этому вопросу."

 ukraine_coalition_events.53.t: "Интригующий трактат!"
 ukraine_coalition_events.53.d: "Пока в аппарате отамана-министра и в Госсовете идет дискуссия о конституционных изменениях и избирательных законах, наш старый добрый друг Александр Скоропыс-Йолтуховский вновь оказался в центре внимания. Плодовитый исследователь (когда он не слишком занят канцелярской работой), Скоропыс-Йолтуховский занимается изучением украинско-германских отношений и их развития. Поэтому неудивительно, что его недавно опубликованный трактат посвящен именно этому. Повторяя свои прежние предостережения, главный тезис основного трактата Скоропыса-Елтуховского повторяет еще одно предостережение по поводу предполагаемой нестабильности, которая может возникнуть в результате этих реформ. Отмечая, что Германия является самым большим и важным союзником Украины, он говорит о том, что \"опасность передачи слишком больших полномочий Государственному Союзу, в котором укрываются скептически настроенные к Германии силы, слишком велика\" Господин канцлер в очередной раз дал нам повод для размышлений."
 ukraine_coalition_events.53.a: "Очень интересно. Очень много смысла!"
 ukraine_coalition_events.53.b: "Сколько раз мы должны преподать тебе этот урок, старик?"

 ukraine_coalition_events.54.t: "Великая казачья рада протестует!"
 ukraine_coalition_events.54.d: "Наши отношения с возрожденными казачьими слоями не всегда были самыми лучшими... Поэтому неудивительно, что недавно запущенный проект реформы вызвал споры в казачьих рядах. Да и как им не быть, если конечным пунктом реформы является заметно более бесправное казачество? Несмотря на то, что Иван Полтавец-Острянец, бывший глава Рады, казачества в целом и один из лидеров глубоко антипарламентской СГД, \"оборвал\" свою карьеру, в казачьей среде все еще существует четкое понимание того, что к "Сойму" следует относиться с осторожностью. Новоизбранный казачий лидер Гнат Зеленевский, возможно, имеет гораздо лучшие отношения с гетманом, чем его предшественник, но вряд ли от него можно ожидать \"радужных\" отношений с гетманской коалицией. Гетману Скоропадскому предстоит принять еще одно непростое решение - стоит ли пытаться сохранить ограниченную власть внутри страты?"
 ukraine_coalition_events.54.a: "Они сделали для нас достаточно... никаких компромиссов."
 ukraine_coalition_events.54.b: "Они сделали для нас достаточно! Необходим компромисс."

 ukraine_coalition_events.56.t: "Новая аудиенция с гетманом Скоропадским!"
 ukraine_coalition_events.56.d: "Вмешательство высших эшелонов государственной канцелярии! Совсем недавно некий Александр Скоропыс-Йолтуховский попросил аудиенции у остальных сотрудников Исполнительной канцелярии гетмана. Сам господин Скоропыс-Йолтуховский является сотрудником канцелярии и уже много лет находится в хороших отношениях с гетманом Скоропадским. Внешне симпатизируя бывшему Аграрно-Статистическому Движению, он, тем не менее, находился в приличных отношениях с умеренными консерваторами, такими как бывший отаман-министр Дорошенко или покойные государственные деятели Владимир Леонтович и Евгений Чикаленко.\n\n При такой \"многовекторности\" политики господин Канцлер явно держит свои карты открытыми, поэтому его недавнее вторжение не должно вызывать удивления. На последнем заседании Исполнительной канцелярии господин Скоропыс-Йолтуховский отметил, что, хотя он и не возражает против основной идеи реформ, проводимых Канцелярией отамана-министра, он считает, что форсированное внедрение новых доктрин может повредить их общему успеху, и что лучше было бы принять более \"реалистичные сроки\", при максимально слабой оппозиции. Гетман выслушал его обращение и погрузился в глубокое раздумье..."
 ukraine_coalition_events.56.a: "Господин Скоропыс-Йолтуховский прав, надо следовать его советам!"
 ukraine_coalition_events.56.b: "Мы находимся в \"реалистичном графике\" уже более 15 лет. Хватит!"

 ukraine_coalition_events.57.t: "Симферополь зовет"
 ukraine_coalition_events.57.d: "Реформа парламентаризации, начатая центральным правительством, естественно, затронет все уголки нашего государства. Не является исключением и Крымское региональное правительство. Оценивая ситуацию, глава Крыма Сулейман Сулькевич принял решение запросить визит делегации Центрального правительства в крымскую столицу. Заявленная причина \"переговоры о проведении реформ\" Возглавляемая Василием Кочубеем (не родственником чиновника ВСЗС), делегация прибыла в Симферополь и сразу приступила к работе.\n\nПремьер-министр Сулькевич оказался в окружении ведущих региональных политиков, таких как Асан Сабри Айвазов и Леон Кричинский; впоследствии советник Кочубей стал свидетелем острой дискуссии между крымчанами. С одной стороны, г-н Айвазов горячо поддержал реорганизационную политику отамана-министра, отметив, что в случае ее реализации новое государственное устройство Крыма позволит создать более \"представительное\" и \"народное\" правительство. Кричинский, напротив, утверждал, что, хотя сам проект имеет определенные достоинства, обусловленные \"особенностями демографической ситуации в Крыму\", одностороннее ограничение полномочий премьер-министра Сулькевича может \"дестабилизировать политическую атмосферу\" в Крыму и вызвать реакцию ближнего зарубежья. Тщательно проанализировав аргументы, Сулькевич принял решение и подробно изложил его Кочубею, который быстро поспешил вернуться к [202.GetName]. По теме реформы парламентаризма премьер-министр Крыма Сулейман Сулькевич высказал свое:"
 ukraine_coalition_events.57.a: "...поддерживаю!"
 ukraine_coalition_events.57.b: "...против!"

 ukraine_coalition_events.59.t: "Сделка с ВСЗС/Протофис"
 ukraine_coalition_events.59.d: "На частной встрече между членами УДХП и ВСЗС/Протофис последние сделали неожиданное предложение. Они уверены, что, обладая обширными патронажными сетями, смогут обеспечить избираемость предпочитаемых ими кандидатов \"на долгие годы вперед"\, и поэтому весьма заинтересованы в том, чтобы Сойм стал реальным противовесом влиянию исполнительной власти. По всей видимости, некоторые представители ВСЗС/Протофис устали от чрезмерной зависимости от личных связей с ближайшим окружением гетмана и хотели бы сделать свое присутствие и влияние в украинской политике более \"институциональным\" Поэтому, по их словам, они с удовольствием предоставят средства для \"сглаживания\" переговоров между соймом и исполнительной властью, поскольку также считают, что их положение может оказаться небезопасным при усиливающемся гетмане. От такого предложения трудно отказаться, хотя некоторые и предостерегают от него."
 ukraine_coalition_events.59.a: "Похоже на сделку."
 ukraine_coalition_events.59.b: "Мы не нуждаемся в их помощи."

 ukraine_coalition_events.60.t: "Разоблаченная схема лоббирования"
 ukraine_coalition_events.60.d: "Почему-то кажется, что наша прежняя сделка с ВСЗС и Протофисом стала достоянием гласности. Несмотря на то, что в 'Сойме' она подверглась широкой критике, а официальные лица лоббистского альянса стали объектом пристального внимания - некоторые из них даже были отстранены от работы в правительстве - хуже всего пришлось самому гетману, который, по слухам, собирается наложить вето на готовящееся предложение по реформе. Без доверия Скоропадского мы мало что можем сделать..."
 ukraine_coalition_events.60.a: "Не может быть!"

 ukraine_coalition_events.70.t: "Наконец-то выборы"
 ukraine_coalition_events.70.d1: "Послевоенные выборы, по общему мнению, были самыми справедливыми, пожалуй, с момента восшествия гетмана на престол. К сожалению, консервативный истеблишмент осознал необходимость реформ только после восстания 1936 г., но вскоре кабинет отамана-министра [GetSecondInCommand] взял бразды правления в свои руки и приступил к реализации амбициозной программы социальных и политических реформ. Они провели страну и через земельную реформу, и через Великую войну (для некоторых землевладельцев - угрозы сопоставимой серьезности) - и как последнее достижение - свободные выборы в Сойм, более демократичные и легитимные, чем когда-либо в гетманате.\n\n Если убрать многие ограничения, то электоральный спектр Украины выглядит совсем иначе. Произошел значительный сдвиг в сторону центра. Успехом пользовались УРДП и небольшие левоцентристские партии, но наибольшую победу одержали УДХП [GetSecondInCommand] и ее недавно созданная организация-сателлит - Крестьянская народная партия (КНП). Ожидается, что гетман назначит центристский кабинет УДХП-УРДП для контроля за дальнейшей демократизацией."
 ukraine_coalition_events.70.d2: "Выборы были в целом одинаковыми и закончились победой УДХП с выигрышем более мелких партий. Незначительные политические реформы не привели к существенным изменениям в стране. Хотя в Сойм было избрано несколько новых, менее консервативных делегатов, маловероятно, что они будут иметь большое политическое влияние. Вместо этого Сойм остается второй скрипкой по отношению к гетману, его кабинету и советникам, обладающим реальной политической властью.\n\nХотя ожидалось, что отаманом-министром будет назначен Михновский или Коростовец, гетман выдвинул новую компромиссную кандидатуру: Александр Шаповал. Генерал Шаповал, хотя и не пользуется особой популярностью среди населения Сойма, известен своей военной карьерой и в результате приобрел немалую популярность. Хотя за закрытыми дверями многие сомневались в решении гетмана, Сойм проголосовал за назначение Шаповала.\n\nШаповал вступает в должность отамана-министра как независимый кандидат, как и Дорошенко в 1932 году. Но если назначение Дорошенко было центристским компромиссом между консервативными и либеральными силами в Сойме, то назначение Шаповала - дело рук только гетмана. Возможно, на словах политические реформы дадут гетманскому авторитаризму еще десяток-другой лет стабильности..."
 ukraine_coalition_events.70.a: "Парламентарии торжествуют."
 ukraine_coalition_events.70.b: "Реформы только по названию..."

 ukraine_coalition_events.71.t: "Гетманыч и Союз"
 ukraine_coalition_events.71.d: "Приверженность идее наследственной трудовой монархии всегда была одним из основных постулатов идеологической базы УСХД. Им нужен был монарх - хранитель вечных традиций, квинтэссенция Властителя Земли, Порядка и Труда, правящего трудолюбивым народом Украины, мерило для национальной аристократии и масс, олицетворение национального величия и суверенитета. Однако в личности Павла Скоропадского этот возвышенный идеал часто вступал в противоречие с суровой реальностью. Упрямый, темпераментный и зачастую недальновидный, гетман был непростым человеком для аграриев-статистов.\n\n Поэтому неудивительно, что УХД не жалеет времени и сил на то, чтобы ухаживать и влиять на царского наследника - гетманыча Даниила Скоропадского. Популярный, мягкий и немногословный, но не лишенный внутренней силы, он стал живой надеждой для более идеологически настроенных членов УСХД, включая главу Совета присяжных заседателей Николая Кочубея. Союз скрупулезно курировал личный круг Даниила Скоропадского и тщательно организовывал каждое его публичное выступление. Гетманыча тщательно готовили к его будущей роли под пристальным взглядом аграриев-статистов.\n\n Насколько успешными были эти усилия - пока сказать трудно, поскольку за обычным безупречно веселым настроем Даниила может скрываться многое. Тем не менее, королевская линия остается под надежной защитой, и это достаточный повод для радости для многих в УСХД."
 ukraine_coalition_events.71.a: "Династия Скоропадских - да будут они править, пока жива Украина!"

 ukraine_coalition_events.72.t: "Видение... Реализовано?"
 ukraine_coalition_events.72.d: "Николай Кочубей рассматривает довольно непритязательное надгробие на католической части Байкового кладбища в [202.GetName]. Надпись на двух языках, украинском и польском, гласит: \"Вячеслав Лыпинский 1882 - 1933\" Эпитафии нет.\nНиколай Кочубей погружен в свои мысли. Иногда он посещает место упокоения своего наставника, особенно когда его охватывает тревога или неуверенность. Сейчас, казалось бы, нет видимых причин для таких чувств, но, тем не менее, чувство тревоги было достаточно сильным, чтобы привести его сюда сегодня.\n\nБольшая работа была проделана. От скромного начала в виде отколовшейся от основной консервативной партии до силы, доминирующей на всей политической сцене, - все испытания и невзгоды только укрепляли движение аграриев-статистов, отсеивая тех, кто был слишком слаб, чтобы следовать идеалу сильной и независимой Украины. Но время идет, появляются новые вызовы, и хотя самый главный из них - война с Россией - уже преодолен, успокаиваться рано.\n\nУкраина продолжает страдать от своего хаотичного прошлого: невозможно за считанные годы преодолеть десятилетия запустения и безответственности. Даже в высших эшелонах власти по-прежнему хватает тех, кто, преследуя свои мелкие интересы, хочет ослабления страны. Они манипулируют теми, кто глуп, и коррумпируют тех, кто нечестен, они вызывают гнев угнетенных и наживают незаслуженные богатства, продавая свой собственный народ.\n\n Неудивительно, что с каждым днем все громче звучат голоса, требующие от Союза более активной и решительной позиции. Движение, по их мнению, должно гораздо более прямо и бескомпромиссно участвовать в управлении государством, а обвинения в построении \"диктатуры\" должны быть прокляты. Не сам ли Липинский писал, что переход к классовому строю проходит гораздо мягче в условиях упорядоченной диктатуры, чем в условиях демократического хаоса?\n Так легко было бы последовать за этими голосами, железной рукой смести старый порядок.\n\n Но этому соблазну, как и многим другим, надо противостоять. И вот, чувствуя, что его осаждают и друзья, и враги, Николай Кочубей поднимает глаза к горизонту. Он темнеет грозовыми тучами."
 ukraine_coalition_events.72.a: "Так много сделано. Еще столько предстоит сделать."

 ukraine_coalition_events.73.t: "Выборы [GetYear] года"
 ukraine_coalition_events.73.d: "В этом году в Украине снова проходят выборы. Политический ландшафт сильно изменился после антигетманского восстания и войны. Кроме того, Даниил, сын покойного гетмана, теперь впервые принимает участие в выборах. Кто победит?"
 ukraine_coalition_events.73.a: "УДХП одерживает очередную победу!"
 ukraine_coalition_events.73.b: "УРДП удается завоевываеть расположение избирателей!"

### SHD Events ###
 ukraine_shd_events.1.t: "Государство, которое они строят"
 ukraine_shd_events.1.d: "Некогда незначительная организация, претендовавшая на внимание гетмана, СГД вышла на передний план украинской политики. Стремясь к ограничению левых сил в Украине, а также к широкой централизации государства, правительство СГД теперь может реализовывать свои амбициозные планы при поддержке гетмана.\n\n Хотя номинально СГД объединяется вокруг этой политики, между двумя наиболее значимыми членами организации, Борисом Гомзиным и Иваном Полтавцом-Остряницей, существуют разногласия: если Гомзин часто рассматривается как правая рука гетмана, то Полтавец-Остряница более амбициозен и независим от гетмана. Если большинство членов СГД рассматривают расширение прав казаков как временную меру, то Полтавец-Остряница видит в этой политике \"естественное развитие\" гетманата, в результате которого казаки со временем станут мощным \"единым аграрным слоем\" С учетом того, что Борис Хомзин ранее был назначен отаманом-министром, влияние Полтавца-Остряницы незначительно, но нет никакой гарантии, что так будет и в дальнейшем."
 ukraine_shd_events.1.a: "Слава гетману!"

 ukraine_shd_events.3.t: "Праведник среди предателей?"
 ukraine_shd_events.3.d: "УДХП и УСХД, ранее входившие в гетманскую коалицию, после введения военного положения потеряли связь с гетманом. Тем не менее, эти организации могут быть полезны - хотя они и не разделяют взглядов СГД по большинству вопросов, но согласны с некоторыми из его важнейших постулатов, в частности, с подавлением левых.\n\n В любом случае, УДХП  и УСХД могут быть привлечены на сторону СГД, что, несомненно, будет способствовать расширению СГД как массовой организации. Мнения о том, в какой степени нам следует пытаться поглотить желающих членов этих организаций, расходятся: нужно ли стремиться привлечь их на свою сторону любой ценой, или эти усилия не стоят того, чтобы превратить СГД в разобщенную организацию?"
 ukraine_shd_events.3.a: "Взятки и угрозы должны быть достаточными."
 ukraine_shd_events.3.b: "Призывать их присоединиться к нам."
 ukraine_shd_events.3.c: "Это принесет нам только коррупцию и разобщенность."

 ukraine_shd_events.4.t: "Против мелкого авантюризма"
 ukraine_shd_events.4.d: "На заседании Совета Министров Украины, атаман-министр Борис Гомзин выступил с речью на различные темы, в том числе о текущем государственном бюджете для реализации инициатив по земельной реформе и индустриализации. Он также выразил признательность Союзу гетманитов за их самоотверженные усилия по построению более сильного и единого украинского государства, подчеркнув важную роль государства в обеспечении руководства и лидерства на протяжении всего времени.\n\n Неожиданным отступлением от своих обычных выступлений на заседании Совета стало упоминание о наличии радикальных элементов, стремящихся дестабилизировать ситуацию в Украине, руководствующихся личными амбициями и корыстными интересами, а не лояльностью к гетманату и его институтам. Хотя в выступлении не было названо конкретных лиц или групп, оно было воспринято как завуалированная критика растущего влияния Полтавца-Остряницы в Союзе гетманитов. Речь Хомзина была положительно воспринята Советом, и судя по всему, ему удалось успешно повлиять на Союз в соответствии со своими целями"
 ukraine_shd_events.4.a: "Хорошо."

 ukraine_shd_events.5.t: "Первый партийный съезд СХД"
 ukraine_shd_events.5.d: "По мере роста численности членов СХД, когда их число исчисляется тысячами, организация оказалась в некотором роде в состоянии кризиса идентичности. С самого начала СГД создавалась как элитарное общество государственных служащих, политиков и офицеров во время восстания 1925 г., которые поддержали жесткие репрессии гетмана против боротбистов. СГД всегда занимал четкую авторитарную и решительную антилевую позицию, но с самого начала его возглавляли два человека, которые все больше отдалялись друг от друга, поскольку их видение гетманства сильно различалось. Теперь, когда число членов СГД велико как никогда, необходимость определить, что именно отстаивает СГД, как никогда велика, поскольку фракционность и мелкие разногласия должны быть пресечены.\n\n Для решения этих вопросов Хомзин объявил о проведении первого партийного съезда СГД в [202.GetName], официально ознаменовавшего его превращение из элитной организации в политическую партию. На съезде партии Хомзин вышел на трибуну, чтобы изложить позицию партии. Он объяснил, что первыми и главными идеалами ШД являются сохранение гетманата и вовлечение в этот процесс всех слоев общества, работающих как единое, органичное сообщество, а все остальное - вторично. Тем не менее, он выделил и другие основные положения СГД: она однозначно антисоциалистическая, выступает за централизованное государство, но при этом придерживается демократических традиций Украины. Хомзин не стал уточнять, когда в будущем будут проводиться выборы, но остался непреклонен: как и многие другие страны, СГД придерживается демократии, только делает это своеобразно, в условиях Гетманата.\n\n Для Полтавца-Остряницы расширение СГД - это само по себе ошибка, организация должна оставаться чистой и свободной от ошибок коалиции, а обязанности казачьих делегаций необходимо расширить, считая, что они должны стать новой аграрной аристократией, так как это естественно и органично для Гетманата. Затем он изложил эти идеи на партийной конференции, возможно, понимая, что эта точка зрения не пользуется особой популярностью."
 ukraine_shd_events.5.a: "Позиции Хомзина остаются прочными."
 ukraine_shd_events.5.b: "Полтавец-Остряница имеет свою точку зрения."

 ukraine_shd_events.6.t: "Установление наследственного правления"
 ukraine_shd_events.6.d: "С момента прихода гетмана к власти в 1918 году родословная гетманства не была установлена. Хотя было известно, что в случае кончины Павла Скоропадского гетманский пост займет его сын Даниил, это никогда не было закреплено законодательно. При достаточной поддержке Совета министров, а также при молчаливом признании возраста Скоропадского этот закон, наконец, будет принят.\n\n Однако остается один вопрос. В ходе обсуждения закона Иван Полтавец-Остряница утверждал, что назначение наследника гетмана должно утверждаться Великой казачьей радой. Учитывая влияние Великой казачьей рады, можно было бы утверждать, что это придаст легитимность престолонаследию, однако некоторые считают это очередным захватом власти со стороны Полтавца-Остряницы."
 ukraine_shd_events.6.a: "Преемственность гетмана подтверждена!"
 ukraine_shd_events.6.b: "...и Великая Казачья Рада подтвердит преемственность!"

 ukraine_shd_events.7.t: "Роспуск УСХД"
 ukraine_shd_events.7.d: "Поглощение многих желающих членов УСХД в СХД стало для него той соломинкой, которая сломала спину верблюду. Когда на Украине наступил Черный Понедельник, а через несколько месяцев в стране началась гражданская война, это небольшое, но влиятельное движение посчитало, что могло бы воспользоваться беспорядками и стать доминирующей организацией в гетманской коалиции. Некоторые утверждают, что Скоропадский в свое время планировал назначить лидером организации Сергея Шемета из-за его личной близости к гетману.\n\n В последнее время число членов этой небольшой организации сократилось благодаря усилиям СГД по привлечению ее в правительство. Многие из менее идеологически настроенных и более прагматичных членов организации перешли в СГД. В связи с этими событиями Николай Кочубей, главный идеолог УСХД, решил распустить организацию из-за ее незначительного состава и отсутствия финансирования и поддержки. Вместо нее Кочубей и наиболее влиятельные мыслители движения провели ребрендинг \"Братство классократов-монархистов\", более точно отражающий их основные идеи. Новая организация, однако, малочисленна и политически неактуальна, и вряд ли в ближайшее время добьется каких-либо успехов, поскольку СГД продолжает консолидироваться на украинской политической сцене."
 ukraine_shd_events.7.a: "Чрезмерная забота об идеологической чистоте обычно не приносит пользы."

 ukraine_shd_events.8.t: "Коррупция в СХД"
 ukraine_shd_events.8.d: "Доминирующие консервативные фракции в гетманате традиционно придерживаются экономической политики, которая отдает предпочтение государственному интервенционизму. Это особенно заметно на примере СГД, который с момента прихода к власти приступил к реализации программы национализации ряда ключевых отраслей промышленности. Однако эта политика не обошлась без проблем: процесс назначения государственных менеджеров был сопряжен с обвинениями в коррупции. Многие бюрократы, некоторые из которых, как считается, были тесно связаны с самим Хомзиным, обвинялись в субсидировании определенных отраслей промышленности в обмен на долю прибыли. Личность человека, ответственного за раскрытие этих скандалов, остается неизвестной, хотя некоторые подозревают Ивана Полтавца-Остряницы, который уже некоторое время активно работает над подрывом позиций Хомзина."
 ukraine_shd_events.8.a: "Мы должны быть всегда бдительны."

 ukraine_shd_events.9.t: "Озабоченность землевладельцев"
 ukraine_shd_events.9.d: "Появление влиятельных казачьих советов в результате усиления власти Великой Казачьей Рады породило в последнее время ряд проблем. Растущее влияние Великой казачьей рады вызвало у многих в СГД озабоченность концентрацией власти и последствиями этого для управления.\n\n Одним из наиболее острых вопросов является предполагаемое превышение полномочий региональных казачьих советов, примером чего может служить жалоба одного из местных крупных землевладельцев на чрезмерное вмешательство местного казачьего собрания в процесс перераспределения земли. Это лишь одна из многих претензий к советам, многие в СГД считают, что они проявляют слишком большой интерес к вопросам, которые должны решаться местными властями. Кроме того, растет обеспокоенность по поводу степени зависимости правительства от Ивана Полтавца-Остряницы. Многие в СГД считают, что Остряница получил слишком много власти, что, в свою очередь, дало возможность его союзникам в казачестве переступить границы дозволенного."
 ukraine_shd_events.9.a: "Понятно..."

 ukraine_shd_events.10.t: "Против внутренних разногласий"
 ukraine_shd_events.10.d: "СХД уже давно испытывает проблемы, связанные с внутренними разногласиями. Однако благодаря действиям Бориса Хомзина в последнее время наблюдается заметное укрепление единства группы. Неустанно работая в кулуарах над объединением различных фракций, он провел обширные консультации с членами Совета министров, а также выступил с публичными обращениями, в которых подчеркнул важность единства перед лицом внешних угроз. В результате среди членов Совета министров усилилось чувство товарищества и общности целей, многие из них теперь работают над достижением общих целей.\n\nУсилия Хомзина по укреплению единства СГД привели к непредвиденным последствиям: он постепенно отодвинул Ивана Полтавца-Остряницу на второй план. Несмотря на первоначальное сопротивление Полтавца-Остряницы, становится все более очевидным, что ситуация изменилась не в его пользу. Члены СГД теперь смотрят на Хомзина как на лидера и руководителя, многие видят в нем движущую силу возрождения чувства цели и единства внутри организации"
 ukraine_shd_events.10.a: "Едины в одном."

 ukraine_shd_events.12.t: "Атаман-министр Борис Хомзин"
 ukraine_shd_events.12.d: "В течение последних нескольких месяцев сформировался гетманат, который выглядит совсем иначе, чем тот, который существовал ранее. Проект государственного строительства СГД значительно отличается от видения предыдущих консервативных правительств Украины - если в их версии традиция представляла собой бдительного гетмана, балансирующего между парламентскими и региональными интересами, то деятелей Союза гетманитов державников можно назвать неотрадиционалистами, стремящимися вложить абсолютную власть в священный институт гетманата и действующих от его имени министров. По их мнению, последние потрясения подтверждают их точку зрения, что гетманат и государство находятся в осаде, и создание неоабсолютистского государства абсолютно необходимо для того, чтобы силы традиции смогли отразить глобальный натиск модернизма.\n\nНе многие так хорошо подходят под этот образ, как новый отаман-министр Борис Хомзин. Хомзин - один из основателей СГД, за плечами которого долгая карьера в сфере военного дела и безопасности, жизнь, посвященная служению гетманату. По мнению Хомзина, дата 29 апреля 1918 года знаменует собой два события, которые определяют украинскую нацию. Первое событие - это установление независимости и суверенитета Украины, возвращение ей статуса, который она имела до 1654 года, и не менее важное второе событие - основание гетманского движения, которое Хомзин рассматривает как \"творческое начало\" светлого будущего Украины, что соответствует его увлечению написанием стихов, пьес и прозы.\n\n Центральное место в политике Хомзина занимает его убеждение в том, что после обретения независимости Украина вновь стала гетманством, в то время как российское государство свергло монархию, и благодаря этому Украина стала более легитимным государством, вернувшись к своей естественной форме правления, от чего Россия отказалась. Известно, что взгляды Хомзина на Россию были необычными: он считал, что развитие большевизма было не чуждо ей, а являлось прямым следствием русского менталитета и исторического прошлого. Это сочетается с его неприятием российского экспансионизма, который правительство СГД принимает в качестве одного из смыслов своего существования. По убеждению Хомзина и СГД, Гетманат является гарантом независимости Украины, его защита и укрепление необходимы для сохранения нации как таковой, и это мнение лежит в основе всей их политической программы."
 ukraine_shd_events.12.a: "Гетманат победит темные силы!"

 ukraine_shd_events.13.t: "Ликвидация Крымской автономии"
 ukraine_shd_events.13.d: "Сегодня с согласия отамана-министра [GetSecondInCommand] и гетмана был отменен автономный статус Крыма. Это решение - как ни странно, не единогласное - стало последним в серии административных реформ, направленных на централизацию власти вокруг гетманского правительства, и оправдывается оно тем, что в крымском правительстве существует бюрократический аппарат и системная неэффективность. Для тех, кто строит новую концепцию гетманата, подобные правовые барьеры не могут больше оставаться в силе - если закон не отвечает потребностям рационального и эффективного государства, он должен быть отменен.\nРешение было весьма спорным. В ходе обсуждения в Совете министров неоднократно поднимался вопрос о том, что отмена автономии Крыма может иметь серьезные последствия и привести к сепаратизму - демографический состав Крыма весьма неоднороден, в нем проживают украинцы, татары, а также этнические русские и русскоязычные, многие из которых высоко оценили предоставленную им ранее автономию. Действительно, автономия Крыма сыграла важную роль в его вхождении в состав Украины, и теперь, когда она исчезла, реакция местного населения была крайне негативной.\n\n Решение было быстро найдено в лице предыдущего главы крымского правительства Сулеймана Сулькевича, которого Совет предложил назначить представителем Крыма в Совете министров. Хотя он не имел бы такого права верховного вето на крымские дела, как раньше, его присутствие и влияние давали бы ему большой голос в управлении Крымом, уступая только отаману-министру и гетману. Несмотря на то, что Сулькевич не является особо популярным политиком, его слова имеют большой вес среди крымчан, а его заверения народу привели к некоторому успокоению общественного мнения.\n\n Вскоре после подписания законопроекта министр иностранных дел России выступил с осуждением этого шага, обвинив правительство в притеснении этнических русских и русскоязычных и в мнимых украинских \"зверствах\" В ответ на это министр иностранных дел Адам Монтрезор заявил, что такого намерения нет, и подтвердил, что этот шаг направлен на упорядочение работы администрации, а не на притеснение русских, а также осудил Россию за попытку разжигания сепаратизма"
 ukraine_shd_events.13.a: "Этого следовало ожидать."

 ukraine_shd_events.14.t: "О сотрудничестве с ВСЗС и Протофис"
 ukraine_shd_events.14.d1: "В то время как государство приступает к реализации амбициозных проектов земельной реформы и индустриализации, в Совете Министров идет принципиальная дискуссия о статусе ВСЗС и Протофиса. Отаман-министр Борис Хомзин и большинство членов Совета министров призывают гетмана уволить из кабинета главного представителя собрания Протофис, а также главного чиновника, связанного с фракцией 'Великие землевладельцы' в Союзе землевладельцев, Бориса Бутенко. Они утверждают, что экономическая политика, проводимая благодаря связям с Протофисом и Союзом, привела к кризису и последовавшему за ним восстанию, и что наличие такого лобби противоречит видению нового Гетманата, который пытается построить СГД.\n\nБутенко, выступая от имени ВСЗС и Протофиса, отстаивал свою позицию, ссылаясь на экономический рост страны и считая отношения между союзом и правительством основной причиной того, что экономика Украины является одной из крупнейших в Рейхспакте. Тем не менее, окончательное решение остается за гетманом"
 ukraine_shd_events.14.d2: "В то время как государство приступает к осуществлению амбициозных проектов земельной реформы и индустриализации, в Совете Министров идет решающая дискуссия о статусе ВСЗС и Протофиса. Отаман-министр [GetSecondInCommand], а также большинство членов Сойма призывают гетмана уволить из кабинета главного представителя собрания протофисов, а также главного чиновника, связанного с фракцией 'Великих землевладельцев' в Союзе землевладельцев, Бориса Бутенко. Они утверждают, что экономическая политика, проводимая благодаря связям с Протофисом и Союзом, привела к кризису и последовавшему за ним восстанию.\n\nБутенко, выступая от имени ВСЗС и Протофиса, отстаивает свою позицию, ссылаясь на экономический рост страны и считая отношения между Союзом и правительством основной причиной того, что экономика Украины является одной из крупнейших в Рейхспакте. Тем не менее, окончательное решение остается за гетманом"
 ukraine_shd_events.14.a: "Увольте их."
 ukraine_shd_events.14.b: "Они могут быть полезны..."

 ukraine_shd_events.23.t: "Правая рука гетмана"
 ukraine_shd_events.23.d: "Прошло несколько месяцев с начала антигетманского восстания, и политический ландшафт, на котором когда-то доминировала гетманская коалиция, приобрел, похоже, совсем другие очертания. Во время восстания Скоропадский часто отказывался прислушиваться к советам коалиции, прислушиваясь к мнению офицеров Гетманского союза, таких как генерал Присовский и полковник Хомзин. Поведение правительства по отношению к республиканским предателям было жестоким, многие аграрно-демократические партии критиковали правительство и сравнивали его с репрессиями 1925 года.\n\nВ частном разговоре с лидерами УДХП Игорем Кистяковским и Николаем Михновским, а также с лидером УРДП Александром Шульгиным отаман-министр Дмитрий Дорошенко выразил разочарование в правительстве и даже в Скоропадском, что во многом повторяет мнение соймовцев о том, что их просьбы прекратить чрезмерную жестокость и насилие остались неуслышанными. На следующее утро в кабинет отамана-министра нанесли визит ключевые чиновники СГД - Борис Хомзин, Константин Присовский и Иван Полтавец-Остряница; представители СГД недвусмысленно сообщили Дорошенко, что власть Сойма отменена, что он потерял расположение гетмана, и что если он не сложит с себя полномочия отамана-министра в течение ближайших двадцати четырех часов, то они будут вынуждены взять дело в свои руки.\n\nПоздним вечером Дорошенко сообщил собравшимся в Сойме о своем намерении уйти в отставку на следующий день, сославшись на то, что ему предстоит долгая и трудная работа по обеспечению эффективного управления в условиях гражданской войны. На фоне взимных обвинений и междоусобиц, с которыми столкнулся Сойм, многие решили последовать по стопам Дорошенко и уйти в отставку.\n\n Именно тогда был поставлен последний блок. После спешно организованной встречи с "большой тройкой" СГД Скоропадский объявил, что пост отамана-министра займет Борис Хомзин, раскритиковав Сойм за неспособность отбросить разногласия ради блага страны. Был принят закон, объявляющий Сойм \"бессрочно прекратившим свое существование до появления ответственного правительства\" Скоропадский утвердил новый состав Совета министров, большинство из которых были связаны с Союзом; любому стороннему наблюдателю, да и самому гетману, теперь как никогда ясно, кто на самом деле стоит у руля"
 ukraine_shd_events.23.a: "Добро пожаловать, отаман-министр Борис Хомзин."

 ukraine_shd_events.24.t: "Казачье ополчение восстает!"
 ukraine_shd_events.24.d: "В ответ на войну против России казачьи ополчения, верные Ивану Полтавцу-Острянице и Великой казачьей раде, поднялись на защиту народа!"
 ukraine_shd_events.24.a: "Превосходно!"

 ukraine_shd_events.25.t: "Поощрение от Его Светлейшего Высочества"
 ukraine_shd_events.25.d: "Выступая сегодня непосредственно перед Советом Министров, гетман Скоропадский похвалил СГД за глубокую любовь и почитание Родины, отметив, что это чувство лежит в основе казачьих традиций. Он подчеркнул важность этого чувства в контексте гетманата, заявив, что сильное и единое чувство национальной идентичности является залогом успеха любого политического проекта. Высказывания гетмана Скоропадского были восприняты как одобрение деятельности СГД и его стремления к созданию гетманата, верного идеалам казачьего народа. Они получили высокую оценку членов организации, которые расценили их как подтверждение их упорного труда и преданности делу построения лучшего будущего для всех украинцев"
 ukraine_shd_events.25.a: "Приятно слышать!"

 ukraine_shd_events.26.t: "Восстановление штаба гетмана"
 ukraine_shd_events.26.d: "В связи с дальнейшей централизацией гетманского правления были возвращены старые учреждения 1918 г., главным из которых является штаб гетмана. Однако Скоропадский должен выбрать, кого назначить начальником гетманского штаба - ключевой должности в восстановленном аппарате. Борис Палий-Нейло - один из ближайших казацких соратников Хомзина, несомненно, будет отличным союзником технократического крыла СГД. Другой вариант - Иван Берчак-Волошин, сторонник Полтавца-Острянтцы, назначение которого может позволить нам воспользоваться связями Полтавца-Остряницы в казачьих советах"
 ukraine_shd_events.26.a: "Выбрать Бориса Палий-Нейило."
 ukraine_shd_events.26.b: "Выбрать Ивана Берчака-Волошина."

 ukraine_shd_events.27.t: "Низкая дисциплина в казачьих ополчениях"
 ukraine_shd_events.27.d: "Интеграция казачьих формирований в наши вооруженные силы не обошлась без проблем. Многие из них недисциплинированны и вызывают проблемы в рядах, что приводит к жалобам со стороны высшего командования; исторически сложившийся высокоавтономный характер казачьих ополчений плохо сочетается с централизованным характером армии, и этот факт осложняется тем, что интеграция казаков в армию активно сдерживается Великой казачьей радой."
 ukraine_shd_events.27.a: "Мы будем разбираться в ситуации."

 ukraine_shd_events.28.t: "Вопрос безопасности"
 ukraine_shd_events.28.d: "Во времена Временного правительства 1918 г., когда гетман правил авторитетно и решительно, существовало отдельное учреждение для работы с диссидентами и следящими агитаторами - Особый отдел Личного штаба гетмана. По сравнению с Департаментом информации Государственной гвардии, подчинявшимся Министерству внутренних дел, Специальный департамент входил в состав личного штаба гетмана и соответственно, подчинялся непосредственно ему. Однако с либерализацией гетманского режима вскоре после этого отдел был упразднен.\n\n С возобновлением действия многих законов временного правительства Особый отдел был возвращен. Начальнику штаба гетмана поручено следить за развитием событий в СГД и обеспечивать его лояльность Скоропадскому, но насколько широкими полномочиями он должен обладать, еще предстоит выяснить."
 ukraine_shd_events.28.a: "В Министерстве внутренних дел и так все хорошо."
 ukraine_shd_events.28.b: "Дайте дополнительное финансирование Спецотделу, посмотрим, что он сможет сделать."

 ukraine_shd_events.29.t: "Будущее Союза"
 ukraine_shd_events.29.d: "Гетман организовал встречу, в которой приняли участие наиболее видные в Союзе гетманистов деятели - в частности, Борис Хомзин, Александр Пальтов, Борис Палий-Нейило и другие. По прибытии участников встречи Скоропадский изложил возможные проблемы, с которыми СГД может столкнуться в будущем. Он подчеркнул, что политическое господство СГД зиждется на доброй воле и доверии украинского народа, и что нынешний авторитарный курс в долгосрочной перспективе будет нецелесообразен. Когда-нибудь, отметил он, должно появиться ощущение нормальной жизни, и придется назначать новые выборы"
 ukraine_shd_events.29.a: "Слова мудрости."

 ukraine_shd_events.30.t: "Демонстрация силы и единства"
 ukraine_shd_events.30.t2: "Демонстрация силы... и единства?"
 ukraine_shd_events.30.d: "Только что на Крещатике в [202.GetName] состоялся крупнейший в истории Украины военный парад. В нем приняли участие прославленные генералы Коновалец и Присовский, а также сам гетман, который произнес торжественную речь, высоко оценив роль армии в обеспечении независимости Украины. Одной из центральных фигур парада стали казачьи дивизии - 1-й и 3-й гвардейские кавалерийские корпуса.\n\n На следующий день состоялся прием, на котором присутствовали ведущие члены СГД, такие как Борис Хомзин, Борис Палий-Нейло, Александр Пальтов, Гнат Зеленевский и Александр Шаповал. Признавая, что СГД не сможет поддерживать постоянный чрезвычайный режим и диктатуру, были разработаны планы начала процесса нормализации; новый режим вскоре должен был приступить к частичному возвращению к демократии. Тем не менее, утверждалось, что при любом раскладе СГД должен продолжать доминировать на политической сцене - оппозиция должна стать легальной, но бесправной. Хомзин заметил остальным присутствующим, что если к власти придет оппозиционная СГД партия, то это будет означать ограничение исполнительной власти Скоропадского, что, по его мнению и мнению остальных, является основой самого гетманата, естественного государства Украина"
 ukraine_shd_events.30.d2: "Только что на Крещатике в [202.GetName] состоялся крупнейший в истории Украины военный парад. В параде приняли участие прославленные генералы Коновалец и Присовский, а также сам гетман, который произнес торжественную речь, высоко оценив роль армии в обеспечении независимости Украины. Одной из центральных фигур парада стали казачьи дивизии - 1-й и 3-й гвардейские кавалерийские корпуса.\n\n На следующий день состоялся прием, на котором присутствовали ведущие члены СГД, такие как Борис Хомзин, Борис Палий-Нейло, Александр Пальтов, Гнат Зеленевский и Александр Шаповал. Признавая, что СГД не сможет поддерживать постоянный чрезвычайный режим и диктатуру, были разработаны планы начала процесса нормализации; новый режим вскоре должен был приступить к частичному возвращению к демократии. Тем не менее, утверждалось, что в любом случае СГД должен продолжать доминировать на политической сцене, а оппозиция должна стать легальной, но бесправной.\n\n Но тема частичной демократизации не отвлекала от реальной проблемы - клики Ивана Полтавца-Остряницы, которая за последние годы значительно выросла. Главе Великой казацкой рады, конечно, не понравится, что Хомзин пытается подорвать его влияние... Но в то же время гетман и раньше поддерживал возвращение к демократии, так что, наверное, реальной власти у него нет?"
 ukraine_shd_events.30.a: "Слава Украине!"

 ukraine_shd_events.31.t: "Выборы объявлены"
 ukraine_shd_events.31.d: "В ближайшее время состоятся первые с 1932 года всенародные выборы в Украине. Гетман Скоропадский официально объявил о проведении выборов по радио, сообщив, что они состоятся в течение ближайших нескольких месяцев. Добавив, что ситуация в стране сейчас стабильная, а угрозы Украине, как внешние, так и внутренние, значительно уменьшились, он призвал всех украинцев принять участие в голосовании и присоединиться к народу в этом \"патриотическом начинании\".\n\n Объявление выборов привело к регистрации большого количества партий, надеющихся бросить вызов доминированию СГД, как на региональном, так и на национальном уровне. Однако СГД значительно укрепилась в политике, и для того, чтобы сместить ее с трона, потребуется серьезная встряска; разветвленные сети патронажа и огромная численность элиты благодаря многолетней консолидации партии снизили вероятность того, что ее доминирование прекратится в ближайшее время.\n\n Хотя численность партии сократилась с момента прихода СГД к власти в конце 30-х годов, УДХП представляет наибольшую электоральную угрозу для СГД. Так называемая \"Демократическая фракция\" партии значительно укрепилась после переворота, так как многие менее парламентски настроенные члены партии стремились вступить в СГД, чтобы сохранить свою значимость в политике. Среди тех, кто остался в партии, есть такие видные деятели, как Николай Михновский, который громко осудил большое \"предательство\" в своих рядах, но при этом призвал тех, кто перешел в СГД, вернуться в УДХП и обеспечить себе победу на выборах. Однако независимо от того, удастся ли им укрепить свои позиции в политике, их шансы на победу невелики, а в худшем случае и вовсе невозможны."
 ukraine_shd_events.31.a: "Нам нечего бояться."

 ukraine_shd_events.32.t: "Закон о создании политических партий"
 ukraine_shd_events.32.d: "Совет Министров одобрил новый закон - "О создании политических партий" Закон предусматривает ряд ограничений для партийных платформ. Запрещается создание партий, пропагандирующих \"угрозу государству и его независимости\", \"непатриотические взгляды\", \"политический экстремизм\", \"противоречащих конституционному строю\" Ограничения на деятельность социалистических партий, наложенные законами о неприкосновенности частной собственности, естественно, сохранились, и УРДП осталась самой левой из легальных партий страны. После подписания закона отаманом-министром и гетманом он был использован для блокирования создания в Крыму новой политической партии \"Крымская народная партия\", выступающей за восстановление автономного статуса своей родины. Однако до сих пор этот закон применялся ограниченно в силу доминирования СГД на политической арене; окружение Хомзина косвенно признает, что в случае угрозы СГДзакон может быть использован более широко."
 ukraine_shd_events.32.a: "Превосходно."

 ukraine_shd_events.33.t: "Выборы [GetYear]"
 ukraine_shd_events.33.d: "Долгожданные выборы состоялись. Результаты выборов оказались неудивительными: СГД, опираясь на платформу эффективного управления, консервативных ценностей и победы в войне, набрала 76% голосов, что является самым высоким показателем среди всех партий за всю историю выборов в стране. УДХП и УРДП, создавшие перед выборами \"Демократическую коалицию\" в противовес доминированию СГД, оказали серьезное сопротивление на выборах. Обвинив СГД в запугивании и мошенничестве, Демократическая коалиция подала громкие, но в конечном итоге незначительные голоса, набрав всего 18% голосов, остальные голоса достались более мелким партиям.\n\n Первой задачей вновь созванного Сойма было утверждение новой конституции, разработанной СГД, которая была принята подавляющим большинством голосов. Конституция наделяет гетмана широкими полномочиями, подчеркивая его роль как самого могущественного института государства; в остальном же она остается расплывчатой, с множеством неопределенных положений, создающих впечатление о незначительном влиянии СГД.\n\n При доминировании СГД практически во всех политических институтах возможность реальной демократии в ближайшее время представляется маловероятной; СГД, став партией большой палатки, имеет возможность реформировать себя при необходимости, и любая значимая конкуренция ее правлению будет ограничена. Пройдут если не годы, то десятилетия, прежде чем великий проект государственного строительства СГД будет окончательно свергнут; но даже если это произойдет, кто придет ему на смену?"
 ukraine_shd_events.33.a: "Нация продолжает свой марш."

 ukraine_shd_events.34.t: "Правая рука гетмана"
 ukraine_shd_events.34.d: "[?global.date.GetDateStringNoHourLong]. Последний день работы отамана-министра Бориса Хомзина и первый - Ивана Полтавца-Остряницы. В тот вечер Полтавец-Остряница вместе с отрядом казаков, верных Великой казачьей раде, и своим соратником Иваном Волошиным-Берчаком вошел в кабинет отамана-министра как раз в тот момент, когда Хомзин собирался уходить на повторный созыв Сойма. Много лет назад на такой встрече могли бы встретиться близкие политические союзники, теперь же она состоялась между самыми яростными соперниками.\n\nХомзин вспомнил дни антигетманского восстания. Это была трагедия, в результате которой украинцы ополчились друг на друга, а радикалы стремились разорвать страну на части. Но это была и возможность, когда гетман Скоропадский осознал мудрость СГД - к тому времени изгнание Дорошенко с поста было лишь формальностью. Неужели и сам Хомзин был теперь только формальностью? Формальность?\n\nПолтавец-Остряница недвусмысленно сообщил Хомзину, что правительство и ключевые городские структуры находятся под контролем казачьих отрядов, а гетман находится под охраной, чтобы защитить его от \"всякого возможного вреда\" Послание было четким: он должен как можно скорее подать в отставку, иначе будет задержан как лицо, подозреваемое в заговоре и государственной измене вопреки воле гетмана.\n\nПоздним утром гетман выступил с историческим радиообращением: Хомзин, сославшись на плохое состояние здоровья, несовместимое с нынешним грузом обязанностей, получил отставку. Его место займет глава Великой казацкой рады, фактический лидер СГД и правая рука гетмана: Иван Полтавец-Остряница"
 ukraine_shd_events.34.a: "Добро пожаловать, отаман-министр Полтавец-Остряница."

 ukraine_shd_events.35.t: "Совет равных"
 ukraine_shd_events.35.d: "С момента закрытия последней сессии Сойма несколько лет назад законодательный орган существовал в серой зоне, его деятельность де-факто была полностью прекращена \"до появления ответственного правительства\" Ничего удивительного в этом нет, поскольку в те времена речь шла о чрезвычайных ситуациях, о быстрых и решительных действиях, а юридические тонкости могли подождать. Теперь, когда внешние и внутренние враги повержены, а страна, благодаря упорной работе гетмана и его верного отамана-министра, окончательно стабилизировалась, можно завязать этот последний клубок.\n\nОчевидно, что прежний Сойм, с партийными разногласиями и мелким политиканством, не вернется. Вместо этого собрание верных слуг, людей, полностью преданных гетману, государству и нации, окажет необходимую помощь в решении сложных вопросов управления. Никакой упаднической партийности: делегаты будут избираться профессиональными и политическими организациями под руководством СГД. Чтобы придать этому собранию необходимую степень легитимности и обеспечить полное представительство интересов украинского народа, определенное количество мест будет зарезервировано за членами казачьих советов - нашими благородными рыцарями, хранителями традиций и общественного порядка. Благодаря неустанным усилиям отамана-министра Полтавца-Остряницы украинское казачество стало важнейшим элементом общественной ткани нашей страны и поэтому заслуживает того, чтобы играть соответствующую роль в ее политической системе"
 ukraine_shd_events.35.a: "Собрание, подобающее нашему славному государству."

 ukraine_shd_events.36.t: "От гетмана к памяти"
 ukraine_shd_events.36.d: "Как могло случиться, что среди всех людей, окружавших меня в бытность мою гетманом, было так мало тех, кто думал так же, как я?\" Слова были выведены чернилами на чистом листе, но они никогда не будут продолжены. Все, что напишет гетман Скоропадский, в конце концов, станет просто воспоминанием - не более. Воспоминанием, как и то, чем стал он сам. Как же так получилось? Как мог его перехитрить гордый недоучка? Старый гетман стал хрупким и нерешительным. Он пожертвовал всем своим комфортом и удовольствием ради служения Украине и счастья своего народа, думал он. Неужели последние годы своей жизни он проживет, видя, как государство, которое он пытался построить, уродуется авантюристом?\n\nЖизнь была горько-сладкой, с победами и поражениями. Все беды, выпавшие на долю его правительства во времена гетманской коалиции, гражданские войны, русское вторжение... Но все это должно было стоить того. Окончание войны на востоке против русского империализма должно было принести новую эру порядка, стабильности, свободы. Вся работа, которую гетман вел для того, чтобы приблизить эту эру в течение почти тридцати лет, - возможно, если бы он прожил достаточно долго, то смог бы увидеть ее плоды.\n\n Возможно, Бог не дал ему сил справиться с задачей правления. Гетман только по имени стал воспоминанием - незабываемым, но позорным воспоминанием"
 ukraine_shd_events.36.a: "История рассудит его достоинства."

 ukraine_shd_events.37.t: "Подарок гетмана"
 ukraine_shd_events.37.d: "Еще несколько недель назад визиты Бориса Хомзина в кабинет гетмана не представляли собой ничего особенного - брифинги с разведданными о расположении повстанцев и ходе контрнаступления, которое в итоге должно было вытеснить криптосиндикалистов из страны. Но теперь все было по-другому. Восстание закончилось, так что же могло послужить причиной на этот раз?\n\nСидя за столом напротив Скоропадского, Хомзин высоко оценил работу гетмана, решительно расправившегося с предателями, как это было в 1919 и 1925 годах. Победа стала ярким доказательством мудрости и преданности гетмана своей стране. Подобные высказывания Хомзина были для Скоропадского непривычны - как с одним из ближайших соратников, они всегда поддерживали близкие отношения, несмотря на политические разногласия, - но сейчас все было по-другому. Хомзин, хотя и не в первый раз, сформулировал главный урок восстания: парламентаризм потерпел крах. Несмотря на попытки гетмана договориться с либералами и социалистами Украины, о чем свидетельствует назначение Дорошенко отаманом-министром и законопроект о помощи, агитаторы использовали это только как возможность нанести ответный удар гетману. Такие политики, как Шемет и Кистяковский, стремились лишь к укреплению собственной политической власти - ведь только гетман понимал, в каком направлении должна двигаться страна.\n\nИ все же, продолжал Хомзин, без истинных патриотов, воплощающих гетманское видение, как может Украина по-настоящему процветать? Пусть предатели пока скрываются, но ясно, что они не сдадутся и опираясь на своих корыстных единомышленников в Сойме, снова придут сеять хаос.\n\nВ конце концов, Хомзин обратился к гетману с призывом. Хомзин и его соратники по Союзу гетманитов сыграли первостепенную роль в том, чтобы помочь гетману раз и навсегда справиться с республиканской угрозой. Вполне естественно, что они были вознаграждены в ответ, в качестве подарка за свою преданность"
 ukraine_shd_events.37.a: "Конечно."

ukraine_shd_events.38.t: "В залах правосудия"
ukraine_shd_events.38.d: "Завоевав контроль над исполнительной властью и приостановив заседания Сойма на неопределенный срок, SHD теперь переключает свое внимание на высший судебный орган страны — Государственный Сенат. Ранний уход в отставку предыдущего президента дает гетманитам-строителям государства уникальную возможность укрепить свое влияние в этом органе. Виктор Рейнбот, невыразительный, но гибкий и яростно антисоциалистический сенатор, является идеальным кандидатом на этот важный пост.\n\nОднако все идет не так гладко, как ожидалось. Неожиданно несколько уважаемых сенаторов высказали недовольство по поводу кандидатуры Рейнбота на пост президента. Их кандидат, кажется, — Михаил Чубинский, способный и разумный член Сената, но также человек, который не боится противостоять повестке SHD. Хотя окончательное решение по кандидатуре президента остается за Гетманом, очевидно, что ему будет трудно назначить кого-то, кто вызывает значительное сопротивление в Сенате.\n\nКорень проблемы, как утверждают многочисленные источники, заключается в Игоре Кистяковском. Политическом тяжеловесе с множеством связей в судебных кругах, которого называют 'Злым духом Гетмана' как поклонники, так и противники, он продолжает оказывать влияние, даже после фактического выхода на пенсию после падения УДХП.\n\nОбычно SHD обратилась бы непосредственно к Гетману, чтобы обойти сопротивление еще одного упрямого консервативного старца. Однако в этом случае ситуация более деликатна: Скоропадский ненавидит напрямую вмешиваться в вопросы судебной власти. Необходимо найти другой подход."
ukraine_shd_events.38.a: "Пришло время сделать несколько звонков."

ukraine_shd_events.39.t: "Сражаться с драконом..."
ukraine_shd_events.39.d: "Иногда, когда речь идет о борьбе с закулисным влиянием такого опытного политического деятеля, как Кистяковский, нельзя прибегать к проверенным методам, таким как публичная клевета, запугивание, шантаж или физическое устранение. Иногда огонь можно победить только огнем.\n\nИменно это побудило Бориса Гомзина обратиться к двум видным фигурам украинской консервативной политики: Александру Пальтову и Александру Скоропысю-Ёлтуховскому. Пальтов в чем-то напоминает самого Кистяковского: один из тех, кто заложил основы Гетманата еще в 1918 году. Создание Гетманской коалиции больше десятилетия назад также во многом связано с его манипуляциями. Сейчас он вроде бы на пенсии, но это открытый секрет, что многие влиятельные люди (включая самого Гетмана) ценят его советы.\n\nСкоропыс-Ёлтуховский — опытный государственный деятель и бывший член УСКД. Именно через связи с его основателем, личным советником Гетмана Вячеславом Липинским, Скоропыс-Ёлтуховский привлек внимание Скоропадского и заслужил его доверие как трезвого и верного государственного деятеля. Работая в почти каждом правительстве на различных должностях, он умело использовал благосклонность Скоропадского и приобрел множество связей.\n\nС этими двумя союзниками на стороне SHD, президентство Рейнбота в Сенате теперь практически обеспечено. Кроме того, ожидается, что Пальтов и Скоропыс-Ёлтуховский займут высокие посты в SHD в качестве компенсации за их решающую помощь."
ukraine_shd_events.39.a: "...нужно иметь своего дракона. Или лучше — двоих."

ukraine_shd_events.40.t: "Маршировать в унисон"
ukraine_shd_events.40.d: "Анти-Гетманское восстание выявило многие слабости украинского государства. Одна из них особенно ярко выражена — это глубоко укоренившаяся духовная апатия, охватившая все военное ведомство. Во время восстания армия страдала от неподчинения, массовых мятежей и откровенных предательств. Слабая реакция армии на мятежников свидетельствует о серьезности проблемы.\n\nРешение кажется очевидным: ужесточение наказаний, продвижение надежных офицеров, увольнение ненадежных, изменения в учебных планах военных училищ и академий и так далее. Однако реальная реализация этих мер — это другая проблема. Кому можно доверить такую важную задачу? SHD связано с военным классом, но не имеет полного контроля над армией. Назначение Ивана Полтавца-Остряницю на эту роль наверняка вызвало бы недовольство независимых офицеров, таких как Евгений Коновалец и его Сичевые, или Петр Болбочан. Между тем, Костянтин Присовский, уважаемый в военных кругах, отклонил предложение возглавить реформы.\n\nВыход был предложен Гетманом. Он выдвинул кандидатуру генерала Александра Шаповала, известного своей способностью осторожно лавировать в политических кругах украинской армии. Подозреваемый сторонник республиканцев в начале 1920-х годов, со временем он стал сторонником Гетманата и заслужил репутацию искреннего сторонника среди консервативной элиты.\n\nСвязи Шаповала с SHD в прошлом были шаткими и сложными, но выбора мало: это личное покровительство трудно отклонить. С другой стороны, армия в целом должна быть более восприимчива к его усилиям, чем к усилиям тех, кто более близок к SHD."
ukraine_shd_events.40.a: "Горькая пилюля, но ее необходимо проглотить."

ukraine_shd_events.41.t: "Трое Олександров"
ukraine_shd_events.41.d: "Все чаще, обсуждая внутренние дела SHD, можно услышать ссылку на 'Трех Олександров'. Эта фраза стала общим наименованием для группы из трех высокопоставленных чиновников SHD: Александра Пальтова, Александра Скоропыся-Ёлтуховского и Александра Шаповала. Еще недавно каждый из них был посторонним для Союза Гетманитов-Строителей Государства, но благодаря сочетанию заслуг, усердия и покровительства с высоких мест они стали оказывать значительное влияние на SHD.\n\nСлухи говорят, что они выполняют роль личных связных и посланников Павла Скоропадского, неустанно работая над расширением присутствия SHD во всех сферах политической и общественной жизни. Воля Гетмана ясна: однажды Сойм будет вновь созван, и будут назначены новые выборы. К этому времени SHD должна перестать быть просто кланом и готова занять свою роль на передовой украинской политики как надежная и проверенная 'Партия Гетмана'. Там, где Гетманская коалиция провалилась, SHD должна достичь успеха.\n\nПока что 'Трое Олександров' тесно работают с Отаманом-министров, чья концепция будущего украинского государства полностью совпадает с видением Гетмана. Тем не менее, сам факт существования этой троицы является постоянным и ясным напоминанием для Бориса Гомзина: несмотря на все усилия, он лично и SHD в целом еще не заслужили полного доверия Его Высочества.\n\nКонечно, не все среди Гетманитов-Строителей Государства в восторге от того, как влиятельной стала эта троица чужаков. Если в SHD произойдет перераспределение власти, все трое Олександров могут оказаться в очень уязвимом положении..."
ukraine_shd_events.41.a: "...пока Гетман остается сильным, они будут исполнять свою роль."

ukraine_shd_events.42.t: "Выборы [GetYear] года"
ukraine_shd_events.42.d: "В Украине снова проходят выборы. Хотя в них примет участие множество партий, реальный шанс на власть есть только у одной партии - СГД. СГД вновь сохранила свою монополию на власть и получила большинство в парламенте."
ukraine_shd_events.42.a: "Так и должно быть."

### Borotbyst Events ###
 ukraine_borotbyst_events.1.t: "В поисках общей платформы"
 ukraine_borotbyst_events.1.d: "После объявления новых выборов в Национальные Зборы партии стали быстро заявлять о своих претензиях на власть. В то время как мелкие партии объединялись в избирательные блоки, крупные, такие как УСДРП или УДРП, решили баллотироваться самостоятельно. Это вызвало вопрос в кругах Рабочий Демократический Союз, который ранее находился в коалиции с УСДРП. Если некоторые члены УПСР-Б хотели восстановить пакт с УСДРП, то большинство членов УПС-Р предпочли обратиться к более радикальному варианту - 'боротьбистам' К сожалению для них, УПСР (СРБ) прямо отказался, не желая принимать участие в \"Буржуазных выборах\" После этого УПСР (СРБ) решила участвовать в выборах как \"Рабочий Демократический Союз\". После этого руководство УСДРП пошло на контакт с Блоком, ведя переговоры о возможном союзе и даже намекая на создание правительства.\n\n Но никто не знал, что вся эта история с Блоком и Боротьбистами проходила под наблюдением УСДРП. Имея такую информацию в своем досье, они имеют потенциальный крючок на Блок, который может быть использован и против боротьбистов, чтобы представить их как врагов новой системы и ненадежных союзников."
 ukraine_borotbyst_events.1.a: "Передайте это в прессу. Мы должны разоблачить боротьбистов, какие они есть."

 ukraine_borotbyst_events.2.t: "Результаты местных выборов - неожиданный всплеск боротьбистов"
 ukraine_borotbyst_events.2.d: "На местных выборах по всей стране 'боротьбисты' получили неожиданный всплеск популярности. Они набрали большой процент голосов, хотя никогда не были достаточно сильны, чтобы сформировать плюрализм. Понимая это, они попытались создать местные коалиции с УСДРП и особенно с СРБ и УПСР в попытке добиться политического влияния в сельской местности. В некоторых случаях последние отказывались от таких коалиций, пытаясь изолировать влияние боротьбистов, но некоторые из них предполагали, что коалиция с 'боротьбистами' облегчит контроль над ними. Однако в случае создания коалиции с радикалами, которые открыто отказываются участвовать во всеобщих выборах, популярность УПСР может снизиться."
 ukraine_borotbyst_events.2.a: "Разрешите их, так мы сможем контролировать и в конечном итоге кооптировать этих радикалов."
 ukraine_borotbyst_events.2.b: "Вместо этого постарайтесь их изолировать."

 ukraine_borotbyst_events.3.t: "Голос для крестьянства"
 ukraine_borotbyst_events.3.d: "Организованный для защиты крестьянских интересов в политике местных органов власти, а также для участия в проводимой земельной реформе, УПСР в настоящее время вновь создал Селянскую Спилку (Крестьянский Союз). В ответ на это боротьбисты создали 'Комнезамы' (комитеты небогатых крестьян), которые во многом придерживаются тех же принципов. Единственное отличие состоит в том, что если 'Селянская спилка' несколько смягчила свою программу в соответствии с УПСР, то 'Комнезамы' бескомпромиссно выступают за отмену частной собственности. Возникли опасения, что 'Комнезамы' могут стать более популярными, чем 'Селянская спилка', если 'Спилке' не будет оказана дополнительная поддержка"
 ukraine_borotbyst_events.3.a: "Оказать дополнительную государственную поддержку компании "Спилка""
 ukraine_borotbyst_events.3.b: "Не вмешиваться."

 ukraine_borotbyst_events.4.t: "Съезд Всеукраинского центрального совета профсоюзов"
 ukraine_borotbyst_events.4.d: "Вновь реорганизованный Всеукраинский центральный совет профсоюзов, крупнейшая профсоюзная федерация Украины, собрался и провел выборы впервые после свержения республики в 1918 году. По итогам выборов большинство мест заняли представители УСДРП и Рабочего Демократического Союза. Однако в состав Всеукраинского центрального совета профсоюзов было избрано значительное число 'укапистов' и особенно 'боротьбистов', что, возможно, свидетельствует о том, что уровень проникновения радикалов в профсоюзы выше, чем предполагалось."
 ukraine_borotbyst_events.4.a: "Тайно расследовать процедуру выборов."
 ukraine_borotbyst_events.4.b: "Мы не можем вмешиваться в их разбирательства."

 ukraine_borotbyst_events.5.t: "Забастовка железнодорожников в [226.GetName]"
 ukraine_borotbyst_events.5.d: "Хотя различные новые законы, принятые Национальными Зборами, обеспечили улучшение прав трудящихся, особенно по сравнению с гетманатом, фактическое проведение этой политики в жизнь заняло значительное время и сопровождалось различными препятствиями. Естественно, боротьбисты использовали это как возможность представить Зборы как некомпетентный буржуазный законодательный орган, что и послужило причиной крупной забастовки в [226.GetName]. Забастовки не были редкостью с момента провозглашения республики, поскольку конституция гарантирует право на забастовку, но эта, в частности, стала самой крупной за всю историю новообразованной республики."
 ukraine_borotbyst_events.5.a: "Вести переговоры."
 ukraine_borotbyst_events.5.b: "Подождите."

 ukraine_borotbyst_events.6.t: "Мелкие протесты вспыхивают в сельской местности"
 ukraine_borotbyst_events.6.d: "Судя по всему, боротбистская формация комнезама представляет собой гораздо большую угрозу, чем считалось ранее. Спорадические и малочисленные акции протеста, организуемые Комнезамом, стали призывать к быстрому и эффективному перераспределению земли и отмене частной собственности. Пока эти протесты остаются изолированными и не выходят за пределы традиционной базы боротьбистов, но они служат напоминанием правительству о том, что для выживания администрации необходимо провести эффективную земельную реформу"
 ukraine_borotbyst_events.6.a: "Почему они верят им, а не нам?"

 ukraine_borotbyst_events.8.t: "Влияние боротьбистов растет"
 ukraine_borotbyst_events.8.d: "Комнезамы, которые раньше казались ограниченными сельскими районами, продолжают расширять свои протесты и распространяются на крупные города, такие как [221.GetName] и [192.GetName]. Поначалу нас можно было бы простить, поскольку перераспределение земель требует времени и усилий, но теперь люди, похоже, недовольны нашими нынешними усилиями. Только удвоив усилия, мы сможем оттолкнуть их от радикалов"
 ukraine_borotbyst_events.8.a: "Мы должны вернуть доверие трудящихся масс."

 ukraine_borotbyst_events.9.t: "Слухи о Юрии Тютюннике"
 ukraine_borotbyst_events.9.d: "Юрий Тютюнник неустанно боролся за республиканское дело и был весьма влиятелен в республиканских вооруженных силах, поскольку являлся ключевой фигурой в антигетманском восстании. Но поскольку присутствие боротьбистов в сельской местности растет с каждым днем, появились слухи, что Тютюнник более благосклонен к боротбистам, чем Петлюра, и возможно, даже состоит в их рядах. В то время как крестьяне и рабочие выступают против режима - это одно дело, потенциальная нелояльность в армии может стать катастрофой - хотя открытое выступление против него может привести к серьезным последствиям."
 ukraine_borotbyst_events.9.a: "Перевести его на другую должность."
 ukraine_borotbyst_events.9.b: "Лучше держать его поближе."

 ukraine_borotbyst_events.11.t: "Протесты становятся все более многочисленными"
 ukraine_borotbyst_events.11.d: "Ситуация в сельской местности обострилась. В различных сельских районах, особенно там, где преобладают зажиточные помещики, крестьяне-бедняки, связанные с комнезамом, начали нападать на помещиков и зажиточных крестьян. Для многих все заявления, которые делала республика в период антигетманского восстания и предвыборной кампании, оказались пустыми обещаниями, что свидетельствует о необходимости брать дело в свои руки. Если быстро не исправить ситуацию, то вера народа в республику может пошатнуться..."
 ukraine_borotbyst_events.11.a: "Все начинает выходить из-под нашего контроля."

 ukraine_borotbyst_events.12.t: "Реформа красногвардейцев"
 ukraine_borotbyst_events.12.d: "Как будто и так было плохо, но в связи с неблагополучной ситуацией в городах стали создаваться "Красные гвардейцы" - возрожденные революционные отряды времен восстания 1936 года. Организованные с целью самообороны трудящихся, особенно в Донбассе и Кривбассе, они фактически лишены боротбистской связи. Тем не менее, единство крестьянства и промышленных рабочих растет, образуя очень опасную оппозиционную республике силу."
 ukraine_borotbyst_events.12.a: "Сейчас даже маленькая искра может стать причиной пожара."

 ukraine_borotbyst_events.13.t: "Столкновения между ополченцами"
 ukraine_borotbyst_events.13.d: "Формирование Красной гвардии прошло примерно так, как и ожидалось. Сразу же начались столкновения между ними и Народным ополчением, поддерживаемым добровольцами, защищающими республику. Ввод армии, скорее всего, приведет к катастрофе и только накалит протесты, но необходимо принять решение о том, что делать со степенью участия Народного ополчения. Сдерживание их может быть воспринято как акт доброй воли, но некоторые говорят, что демонстрация силы необходима для сохранения республики."
 ukraine_borotbyst_events.13.a: "Укреплять милицию."
 ukraine_borotbyst_events.13.b: "Эти меры необходимы."

 ukraine_borotbyst_events.14.t: "Бахмутская встреча"
 ukraine_borotbyst_events.14.d: "Красная гвардия продолжает оставаться для боротьбистов аномалией. Действительно, являясь передовой революционной партией, организующей протесты и крестьянские отряды самопомощи, они не участвовали в создании Красной гвардии. После длительного расследования со стороны революционного руководства выяснилось, что 'Красной гвардией' и другими связанными с ней группами руководили многие высшие чины украинской компартии, такие как Николай Скирпник, Василий Шахрай и Сергей Мазлах. Несмотря на очевидную взаимную выгоду обеих сторон в поддержке и проведении успешной революции и свержении республики, между ними существует большое недоверие. Несмотря на принципиальную противоположность, Боротьба в основном имеет свои ряды в сельской местности, в то время как УКП в большей степени представлена в городах. \n\n Существует реальная опасность того, что каждая из партий попытается свести на нет влияние другой, а также ее предпочтительную базу поддержки.\n\n Тем не менее, поскольку положение республики продолжает ухудшаться, а забастовки и столкновения становятся обычным явлением, вероятность революции велика как никогда. Представители высшего руководства боротьбистов и УКП договорились о переговорах по совместным действиям против республики. Руководителем переговоров является Анатолий Писоцкий, один из самых левых членов блока Совет - Революция и один из его главных лидеров. УКП и СРБ предложили сотрудничать с боротьбистами, если те увеличат представительство городских рабочих, особенно шахтеров. Таким образом, часть делегатов в Центральном революционном комитете окажется на стороне УКП и СРБ. Переговоры принесли определенные плоды, но факт остается фактом: боротьбисты остаются самой мощной революционной организацией в стране и в случае необходимости могут сами совершить революцию; в то же время поддержка УКП и СРБ может оказаться неоценимой."
 ukraine_borotbyst_events.14.a: "В административной столице достигнута договоренность."
 ukraine_borotbyst_events.14.b: "Никаких компромиссов."

 ukraine_borotbyst_events.15.t: "Крах правового государства"
 ukraine_borotbyst_events.15.d: "В условиях, когда широкомасштабная революционная гвардия наращивает мускулы, а республиканские правоохранительные органы осторожничают в своих действиях, мы вновь погрузились в хаос, подобный тому, что был до антигетманского восстания. Поскольку предыдущие столкновения Народного ополчения с протестующими только подлили масла в огонь, сейчас власти пытаются избежать эскалации и любых действий, которые можно было бы сконструировать как аналогичные Скоропадскому несколько лет назад, но вряд ли это лучший вариант. Преступность резко возросла, поскольку боротбисты в некоторых местах фактически захватили целые районы"
 ukraine_borotbyst_events.15.a: "А вот это..."

 ukraine_borotbyst_events.17.t: "Слухи о всеобщей забастовке"
 ukraine_borotbyst_events.17.d: "По всей республике ходят слухи о том, что боротьбисты организуют всеобщую забастовку, которая положит конец насилию и грабежам и поставит буржуазное правительство на колени. Остается, однако, один вопрос: поддержат ли забастовку СРБ и УПСР? Если нам удастся убедить Социалистический блок не поддерживать ее, то революция боротьбистов может рухнуть."
 ukraine_borotbyst_events.17.a: "Готовьтесь к худшему."
 ukraine_borotbyst_events.17.b: "Обратиться к Блоку за помощью в борьбе с боротьбистами."

 ukraine_borotbyst_events.18.t: "Всеобщая забастовка"
 ukraine_borotbyst_events.18.d: "Всеобщая забастовка, о которой ходили слухи, наконец-то началась. По всей республике металлурги, железнодорожники, шахтеры отказываются работать и требуют улучшения условий труда, отставки действующего правительства и создания социалистической республики. Пропаганда 1936 года была перенаправлена на республику, обвиняя правительство в том, что оно просто стало новым гетманатом, не заботящимся о судьбах простых людей. Вся страна замерла на месте - даже некоторые бойцы Народного ополчения перешли на сторону боротьбистов, а правительство [UKR.GetLeader] горячо обсуждало, что делать в ответ."
 ukraine_borotbyst_events.18.a: "Разборки начинаются"

 ukraine_borotbyst_events.19.t: "Предательство Тютюнника"
 ukraine_borotbyst_events.19.d: "Когда правительство обсуждало, какие действия предпринять в ответ на всеобщую забастовку, одна из идей, в частности, заключалась в том, чтобы использовать военных для подавления протестов, что было бы нехарактерно жестоким действием и актом тирании, но могло оказаться единственным вариантом.\n\nПо крайней мере, это был вариант - пока генерал Юрий Тютюнник, о котором давно ходили слухи, что он связан с боротьбистами, не заявил о своей приверженности забастовке вместе со своими людьми. С дезертирством популярного генерала мятежи в армии приняли массовый характер, и все больше людей присоединялись к \"Юрко\" в борьбе с неэффективным правительством."
 ukraine_borotbyst_events.19.a: "Эта змея!"

 ukraine_borotbyst_events.20.t: "Штурм парламента"
 ukraine_borotbyst_events.20.d: "Предательство Юрия Тютюнника вызвало большое смятение среди военных, особенно в гарнизоне [202.GetName], который теперь оказался практически парализованным. В условиях многотысячных протестов на Крещатике и у Национальных Зборов представился удобный случай. Опираясь на поддержку демонстрантов, вооруженные боротьбисты и небольшие отряды Красной гвардии и других милиционеров ворвались в Национальные Зборы, арестовали кабинет министров и выступили с торжественным обращением к парламенту: добровольно распустить парламент и передать власть переходному правительству во главе с боротьбистами.\n\n Боротьбисты обратились к Рабочему Демократическому Союзу, предложив им должности в новом народном правительстве, если они согласятся распустить парламент. Учитывая, что ситуация складывалась в пользу боротьбистов, а в случае отказа им грозило вооруженное восстание, Революционный блок вместе с боротьбистами согласился на совместный роспуск парламента. Испугавшись перспективы гражданской войны, большая часть республиканских вооруженных сил заявила о своей верности новому режиму.\n\nВ конце концов, человеком времени стал лидер боротьбистов Александр Шумский. После роспуска парламента Шумский выступил с радиообращением непосредственно к народу, заявив, что голос народа наконец-то будет услышан, и призвал всех поддержать новую власть - Украинскую Социалистическую Республику."
 ukraine_borotbyst_events.20.a: "Хай живе Україна! Хай живе соціалізм!."

 ukraine_borotbyst_events.21.t: "Петлюра поднимается в [198.GetName]"
 ukraine_borotbyst_events.21.d: "По всей стране старшие командиры сообщают о получении телеграфных сообщений с призывом \"противостоять жестокому коммунистическому восстанию\" Эти послания исходят не от кого иного, как от Симона Петлюры, предполагаемого преступника. Несколько дней назад Петлюра вместе с Удовиченко отправился в [198.GetName], якобы для инспектирования вооруженных сил. На самом деле, похоже, он готовился к тому, что станет его первым актом измены социалистической республике.\n\n Надеясь обезглавить боротьбистское движение до того, как оно сможет осуществить восстание против буржуазной республики, Петлюра опоздал - Тютюнник и боротьбисты уже взяли под контроль [202.GetName] и большую часть страны, поскольку новое правительство было активно или молчаливо поддержано большей частью населения страны. Сообщения Петлюры достигли лишь некоторых отрядов в западной части [226.GetName], [221.GetName] и Полтаве, которые сдались после коротких столкновений с войсками Тютюнника.\n\n Взяв под контроль местные вооруженные силы в [198.GetName], Петлюра затем двинул свои войска на восток, чтобы противостоять армии Тютюнника. Встретившись в [201.GetName], обе стороны столкнулись с низким моральным духом, поскольку украинцы были вынуждены стрелять в украинцев второй раз за три года. Более многочисленные и преданные войска Тютюнника одержали победу, так как Петлюра провел поспешный отход. Петлюра отступил через границу в Польшу, где, по некоторым данным, пытался обратиться к Берлину и Вене с просьбой вмешаться и подавить революцию."
 ukraine_borotbyst_events.21.a: "Как и тиран гетман до него, он преклоняет колено перед империалистами."

 ukraine_borotbyst_events.42.t: "Боротьбисты теряют темп"
 ukraine_borotbyst_events.42.d: "После долгожданного расширения финансирования программы "Спилка" нам удалось заглушить значительную часть критики программы земельной реформы, инспирированной Боротьбой. Организованные ими комнезамы потеряли сторонников, а значительная часть бедного крестьянства восстановила свою веру в наше правительство."
 ukraine_borotbyst_events.42.a: "В итоге победила Спилка."

 ukraine_borotbyst_events.43.t: "Протесты потихоньку успокаиваются"
 ukraine_borotbyst_events.43.d: "Протесты по всей стране, вызванные боротьбистами, постепенно затихают по мере выполнения их требований. Новая программа перераспределения земель была воспринята как успех. По иронии судьбы, ядро боротьбистов выглядит наиболее недовольным таким развитием событий, поскольку выполнение их требований удовлетворило многих их менее преданных сторонников и побудило их дистанцироваться от протестов."
 ukraine_borotbyst_events.43.a: "Все кончено."

 ukraine_borotbyst_events.44.t: "Боротьбистские разборки"
 ukraine_borotbyst_events.44.d: "На последнем партийном съезде УПСР (СРБ) развернулась яростная дискуссия о руководстве Шумского и его неудачах. Радикалы утверждают, что было сделано слишком мало и что революция началась недостаточно рано. Умеренные утверждают, что момент был неподходящий, и нужно было вести более активную агитацию. Значительная часть боротьбистов даже заявила о выходе из партии и переходе в Рабочий Демократический Союз, который, по их мнению, теперь представляет \"истинные интересы трудящихся\". В партийной верхушке их величают предателями, но ущерб уже нанесен."
 ukraine_borotbyst_events.44.a: "Так много для \"левого единства\""

 ukraine_borotbyst_events.45.t: "Дерадикализация профсоюзов"
 ukraine_borotbyst_events.45.d: "По мере ослабления влияния боротбистов многие руководящие комитеты профсоюзов переходят под контроль более лояльных Винниченко и Рабочему Демократическому Союзу. Хотя некоторые профсоюзы, например, железнодорожный, останутся безнадежно радикальными, снижение влияния боротьбистов в большинстве других профсоюзов должно стабилизировать экономическую жизнь Украины в долгосрочной перспективе."
 ukraine_borotbyst_events.45.a: "Все возвращается на свои места."

 ukraine_borotbyst_events.47.t: "Товарищи по революции или прихлебатели буржуазии?"
 ukraine_borotbyst_events.47.d: "Вопрос о непроизводящих классах разделил марксистов. Наиболее радикальные, особенно среди правильных синдикалистов, утверждают, что люди, не производящие стоимости, не должны решать, как распределяется стоимость рабочей силы. Однако \"рабочие-интеллигенты\" включают в себя как многих важных социалистических деятелей, так и такие группы, как ученые, которые, несомненно, полезны для государства пролетариата, несмотря на то, что они не являются настоящими рабочими. Приверженцы жесткой линии утверждают, что если бюрократам и другим \"попутчикам\" дать слишком много власти, то они в конце концов отнимут революцию у простого народа, как это, по их мнению, произошло во многих других странах."
 ukraine_borotbyst_events.47.a: "У нас демократия, пусть и социалистическая. Пусть участвуют."
 ukraine_borotbyst_events.47.b: "Мы не можем позволить этому запятнать наше дело."

 ukraine_borotbyst_events.48.t: "Выборы в Совет депутатов"
 ukraine_borotbyst_events.48.d: "Национальные Зборы распущены как орудие буржуазной коррупции, проведены новые всенародные выборы делегатов в новый парламент. Поскольку голосование организовано рабоче-крестьянскими советами, выдвинувшими наибольшее число кандидатов, исход выборов очевиден. Несмотря на наличие независимых кандидатов и некоторых либералов, подавляющее большинство мест досталось боротьбистам. Много мест получили также партии УКП, УПСР и СРБ. Первым своим решением Совет проголосовал за избрание товарища Шумского своим председателем и фактическим главой государства."
 ukraine_borotbyst_events.48.a: "Тост за рабочую демократию!"

 ukraine_borotbyst_events.49.t: "Первая сессия Совета"
 ukraine_borotbyst_events.49.d: "После того как Шумский был избран председателем Совета депутатов, следующим шагом будет избрание первого заместителя председателя и председателей отдельных комитетов - по сути, кабинета парламентских штатов. Это назначение является частью более широкой дискуссии о направлении революции.\n\nБыстро сформировались две фракции. Григорий Гринько и так называемые \"умеренные\", подчеркивающие важность единства революционного движения, поддерживают нынешнего временного первого заместителя председателя Михаила Полоза. Оппозиция Левко Ковалива \"реформисты\" выступают за быстрое индустриальное развитие по технократическим принципам как единственный способ обеспечить выживание рабочей Украины. Программа Ковалива основана на теориях Михаила Волобуева, который долгое время был эксцентричным представителем подобных промышленно-экономических реформ. После длительных дебатов, в конце концов, был достигнут консенсус..."
 ukraine_borotbyst_events.49.a: "Оставьте Полоза, он хорошо справляется со своими обязанностями, а Гринько - его верный союзник."
 ukraine_borotbyst_events.49.b: "Выбирайте Ковалива, он и Волобуев могут гарантировать сильную и независимую Украину."

 ukraine_borotbyst_events.50.t: "Национализация банковского сектора"
 ukraine_borotbyst_events.50.d: "Есть несколько более ненавистных для обывателя учреждений, чем банк. Это символ экономического неравенства, когда богатые становятся богаче за счет процентов, которые платят бедные. Воспоминания о потерянных сбережениях после банкротства банков в 1936 году у многих еще свежи. Поэтому принятие закона, по которому все банки в Украине переходят под контроль Комитета бюджетного равенства, не вызвало никаких сомнений."
 ukraine_borotbyst_events.50.a: "Теперь мы контролируем ситуацию."

 ukraine_borotbyst_events.51.t: "Центральный кооперативный банк Украины"
 ukraine_borotbyst_events.51.d: "Чтобы заменить частных банкиров, обчищающих трудящихся, банки Украины были реорганизованы по кооперативной модели, когда каждый, кто имеет сбережения в банке, владеет паем кооперативного банка и может голосовать при принятии решений, касающихся правил и будущего банка. Все небольшие региональные кооперативные банки, многие из которых уже существовали в сельских регионах, были объединены под руководством Центрального кооперативного банка, на который также возложена задача поддержания фискальной стабильности."
 ukraine_borotbyst_events.51.a: "Мы больше не будем зависеть от Берлина."

 ukraine_borotbyst_events.53.t: "Национализация арсеналов"
 ukraine_borotbyst_events.53.d: "Поздние буржуазные республики уже провели ряд национализаций, но, как обычно, бросили работу на полпути. Революция сместила большинство фабрикантов и других бесполезных пиявок, и теперь машины управляются теми, кто на них работает. Особенно важно скоординировать оружейную промышленность в единую экономическую единицу, так как такое серьезное дело, как оборона страны, не должно быть отдано на волю отдельных лиц"
 ukraine_borotbyst_events.53.a: "Правда."

 ukraine_borotbyst_events.56.t: "Вопрос об организации рабочих"
 ukraine_borotbyst_events.56.d: "Благодаря разнообразию социалистических движений в стране нет единого мнения о том, что такое \"самоуправление трудящихся\" В частности, среди аграрных социалистов региональные советы и коллективы формируются по принципу локальности. Каждый человек принимает непосредственное участие в управлении своим ближайшим окружением, и правительство должно оставить как можно больше власти местным коллективам. В то же время, особенно в крупных промышленных городах, все большую поддержку находят профсоюзные организации, созданные под влиянием налога на прирост капитала. Во многих городах рабочие в основном объединены в профсоюзы, которые обеспечивают своих членов многими предметами повседневного спроса. Эти профсоюзы координируются общей федерацией профсоюзов на самом высоком уровне. Хотя мы не настаиваем на изменении системы, нам следует определиться с политикой в отношении предпочтительного метода"
 ukraine_borotbyst_events.56.a: "Местные коллективы."
 ukraine_borotbyst_events.56.b: "Федеральные союзы."

 ukraine_borotbyst_events.58.t: "Критика автономий меньшинств"
 ukraine_borotbyst_events.58.d: "После того как мы разрешили украинским национальным меньшинствам создавать свои коллективы, на эти организации стали поступать жалобы от преимущественно этнических украинцев, которые считают \"националистические клубы\" вредными для духа социализма и тем, что усиливает разделение, а не решает его. Особенно ярко эта дискуссия проявилась после столкновения крымскотатарского и крымско-русского советов по поводу юрисдикции в решении некоторых вопросов на полуострове, для урегулирования которого потребовался переговорщик из Совета депутатов. Однако другие утверждают, что эти протесты сами по себе носят крипто-националистический характер"
 ukraine_borotbyst_events.58.a: "Мы поддерживаем Автономии."
 ukraine_borotbyst_events.58.b: "Возможно, нужно доработать систему."

 ukraine_borotbyst_events.59.t: "Соглашение Шумского-Винниченко"
 ukraine_borotbyst_events.59.d: "Революция не может быть увязана в мелких разногласиях, когда нам угрожают со всех сторон. Понимая это, руководство боротьбистов пошло на контакт с другими ведущими революционными партиями Украины - УПСР и СРБ. Несмотря на их различия, между ними есть большая общность - все они подчеркивают роль сельского хозяйства в социалистической Украине.\n\n Чтобы удовлетворить их требования и обеспечить здоровое сотрудничество всех социалистических сил, лидер СРБ и фактический лидер союза УПСР и СРБ в целом Владимир Винниченко получил пост председателя Исполнительного комитета, а различные деятели УПСР - важные министерские посты."
 ukraine_borotbyst_events.59.a: "Вперед, к новому светлому будущему!"

 ukraine_borotbyst_events.60.t: "Предложение Чубаря"
 ukraine_borotbyst_events.60.d: "Влас Чубарь, председатель Коммунистической партии Украины, предложил союз между УКП и боротьбистами. Наше прошлое несколько скалисто, поскольку УКП никогда не отказывалась от своих большевистских симпатий, а боротьбисты с самого начала искали свой путь. Однако во многих практических вопросах мы сходимся, по крайней мере, больше, чем с группой Винниченко."
 ukraine_borotbyst_events.60.a: "Мы должны объединиться для борьбы с буржуазией!"
 ukraine_borotbyst_events.60.b: "Большевики слишком авторитарны."

 ukraine_borotbyst_events.62.t: "Средства для ВАПЛите"
 ukraine_borotbyst_events.62.d: "В рамках проекта \"Революция в культуре\" Николай Хвылевой обратился с просьбой о финансировании ВАПЛит, Вольной академии пролетарской литературы. ВАПЛит, в состав которой входят такие деятели, как Майк Йохансен, Аркадий Любченко, Михаил Яловый и другие, ставит своей целью создание новой украинской культуры, отличной от гетманской и республиканской. По мнению Хивилевого, эта новая украинская культура может быть активизирована влиянием сложившейся западноевропейской художественной традиции. Он подчеркивает, что, несмотря на политическую независимость Украины де-юре, она никогда не была по-настоящему независима от Москвы в культурном плане, и поэтому девиз ВАПЛит- \"Прочь от Москвы!\".\n\nНо некоторые боротьбисты, скептически относящиеся к идеям Хвылевого, предостерегают от финансирования ВАПЛит. Наиболее известный из них, Андрей Хвыля, заявил, что искусство должно использоваться как инструмент поддержки социалистической революции, а не \"упражняться в мелком национализме\"
 ukraine_borotbyst_events.62.a: "Передайте Хвылевому, что он получит свои средства."
 ukraine_borotbyst_events.62.b: "Хвыля прав, мы можем позволить использовать искусство только как инструмент поддержки революции."

 ukraine_borotbyst_events.63.t: "Азиатский ренессанс"
 ukraine_borotbyst_events.63.d: "Николай Хвылевой опубликовал в ВАПЛите новую статью, получившую название \"Азиатский ренессанс\" В ней Николай Хвылевой высоко оценивает социалистические революции в Китае и Индокитае и считает, что они являются примером неизбежного: пробуждения Азии и остального колониального мира, большая часть которого в настоящее время томится под сапогом европейского и японского империализма. По его мнению, азиатские народы зажгут "лампу нового возрождения, которая вспыхнет, как лазурная пентаграмма, над темной европейской ночью""
 ukraine_borotbyst_events.63.a: "Как и они, мы тоже боремся против империализма."

 ukraine_borotbyst_events.64.t: "Нова генерация"
 ukraine_borotbyst_events.64.d: "Похоже, ВАПЛит - не единственное творческое объединение, ставшее известным в результате революции. Михаил Семенко создал новое объединение "Новая генерация", пропагандирующее радикальный отход от литературных традиций прошлого. Новое поколение" выступает за так называемый \"революционный футуризм\" и \"функциональную поэзию\" Организация Семенко получила определенную поддержку со стороны правительства в силу своего идеологического и пропагандистского характера. ВАПЛит и "Новое поколение" начали конкурировать за признание, представляя собой своего рода идеологическое соперничество, поскольку члены ВАПЛита по-прежнему верят в литературные традиции. Хивлиовый в ответ на возвышение группы заметил,\"настоящее искусство - это нечто большее, чем идеологически заряженные пропагандистские листовки\""
 ukraine_borotbyst_events.64.a: "Неважно, национальное или футуристическое, искусство остается искусством."

 ukraine_borotbyst_events.65.t: "Антинеоклассицистическая кампания"
 ukraine_borotbyst_events.65.d: "Выдающаяся группа поэтов и писателей-модернистов, известная как \"[202.GetName]ские неоклассицисты\", в последнее время подвергается ожесточенной критике в прессе, особенно в газетах, поддерживающих УКП. Провозглашая лозунги \"чистого искусства\", неоклассики обвиняются в \"продолжении упадочных буржуазных традиций\" и \"идеологической пустоте\" Тем не менее, в лице Николая Хвылевого группа нашла, возможно, неожиданного союзника. Ветеран-революционер ответил шквалом собственных брошюр, в которых нападал на \"красную графоманию\" и защищал \"строгие и взыскательные стандарты литературного искусства, отстаиваемые неоклассицистами\" То, что начиналось как искусствоведческий анализ, превратилось в полноценную кампанию клеветы в многочисленных газетах, поскольку украинская культурная элита вынуждена выбирать сторону в этой \"неоклассицистической войне\""
 ukraine_borotbyst_events.65.a: "Фанатизм не заменяет опыта."
 ukraine_borotbyst_events.65.b: "Объявить Хвылевому выговор, он зашел слишком далеко."

 ukraine_borotbyst_events.66.t: "Проект латинизации украинского алфавита"
 ukraine_borotbyst_events.66.d: "Латинизированный вариант украинского алфавита с момента его принятия на Орфографической конференции 1927 года использовался довольно редко, большинство населения привыкло к традиционной кириллице. Несмотря на все усилия филолога Николая Сулымы, выступавшего за более широкое использование латиницы, вопрос о ее принятии и популяризации оставался на задворках культурной дискуссии.\n\n До настоящего времени. Она привлекла внимание Николая Хвылевого, который охотно стал ее активным сторонником. Однако, судя по всему, его не устраивает \"продвижение\" и \"более широкое внедрение\" Хвылевой считает, что \"европеизация украинской культуры\" диктует необходимость отказа от кириллицы как пережитка русско-православной гегемонии над Украиной. Латинизация языка, по его мнению, навсегда освободит украинское национальное сознание от московской культурной гегемонии и привяжет его к \"психологической Европе\", где должен находиться идеологический дом Украины."
 ukraine_borotbyst_events.66.a: "Кириллица как была нашим алфавитом испокон веков, так им и останется."
 ukraine_borotbyst_events.66.b: "Мы должны использовать оба алфавита, как во времена Старого Содружества."
 ukraine_borotbyst_events.66.c: "Начать подготовку планов для последующего внедрения."

 ukraine_borotbyst_events.67.t: "Мысли против течения"
 ukraine_borotbyst_events.67.d: "Последней работой тов. Хвылевого является статья под названием \"Мысли против течения\", в которой он на страницах критикует примерно все в своем беспорядочном, эксцентричном стиле. Он объявляет бюрократизацию великими оковами украинской революции, и если ее не искоренить, она будет расти и в конце концов уничтожит революционные свободы. Он нападает на чрезмерную бюрократизацию на всех уровнях - от сельских коммун до Совета депутатов, призывая к духовной чистке администрации и переключению внимания на то, что действительно важно: защиту и развитие украинской революции до тех пор, пока Украина не станет равной с западным миром. Тщательно прослеживается и его излюбленная тема - очевидный застой в украинском художественном мире, где господствуют посредственность и дешевая пропаганда."
 ukraine_borotbyst_events.67.a: "Игнорировать статью."
 ukraine_borotbyst_events.67.b: "Заказать статью с опровержением его утверждений."

 ukraine_borotbyst_events.69.t: "Вопрос о проекте латинизации"
 ukraine_borotbyst_events.69.d: "Николай Хвылевой, похоже, не из тех, кого можно игнорировать. Он развернул в прессе очередную кампанию по доказательству превосходства латиницы над кириллицей, которую он осуждает как \"пережиток царизма.\" Это не отличается от того, что было в прошлый раз - значительная часть украинцев оскорблена этой идеей и считает кириллицу частью национальной идентичности. Однако секта Хвылевого продолжает неустанно повторять его мантры."
 ukraine_borotbyst_events.69.a: "Мы должны сосредоточиться на восстановлении страны, а не разделять ее еще больше."
 ukraine_borotbyst_events.69.b: "Заменять его слишком рискованно. Принятие обоих вариантов должно устроить всех."
 ukraine_borotbyst_events.69.c: "Хвылевой долго ждал, реализуйте."

 ukraine_borotbyst_events.70.t: "Хвылевой уходит в отставку"
 ukraine_borotbyst_events.70.d: "Устав от постоянного противодействия своим амбициозным реформам, Николай Хвылевой сообщил Совету депутатов о своей отставке. В горьком тоне он обрисовал своих оппонентов как заговорщиков культурной реакции, которые смотрят только назад и отказываются понимать великое будущее, ожидающее украинскую нацию. Хвылевой будет продолжать пропагандировать свои убеждения через свою газету, но он больше не считает себя способным возглавлять культурные усилия партии. Несмотря на свою популярность, его отставка приветствовалась многими, и его преемником был избран более умеренный Майк Йохансен."
 ukraine_borotbyst_events.70.a: "Хвылевой был слишком радикален. Будем надеяться, что Йохансен прекрасно справится с этой задачей."

 ukraine_borotbyst_events.71.t: "Культурное возрождение"
 ukraine_borotbyst_events.71.d: "Йохансен, будучи сам одним из основателей ВАПЛита, сочетает в себе интеллектуальную смелость Хвылевого с гораздо более дружелюбным характером и разумной умеренностью. Хотя его взгляды не так уж сильно отличаются от взглядов предшественника, можно с уверенностью сказать, что Йохансен будет уделять гораздо больше времени не постоянным перебранкам в литературной прессе, а своим обязанностям руководителя отдела культуры партии. Грандиозный стиль Хвылевого имел свои достоинства, но более тонкое, но не менее глубокое прикосновение Йохансена будет служить нам лучше. Под его руководством обычные детали повседневной украинской жизни будут подняты на передний план культуры. Его программа "Культурное возрождение" будет способствовать тому, чтобы художники запечатлевали и возвышали подлинную Украину, превращая обыденное в величественное и прекрасное."
 ukraine_borotbyst_events.71.a: "Отличная инициатива."

 ukraine_borotbyst_events.72.t: "Красные казаки поднимают знамена!"
 ukraine_borotbyst_events.72.d: "История казачества в украинской левой среде неоднозначна. Они стали печально известны как часть царского механизма государственного насилия, и точно так же их использовали гетман и его приближенные для оправдания своих репрессивных мер. Однако правда о казаках гораздо глубже - это не прославленная военная полиция, а одно из первых в мире эгалитарных обществ, которое не подчинялось ни господам, ни царям. Ведь казаки родились из беглых крепостных крестьян, мечтавших о равенстве всех людей. Поэтому гетман - это не царь, а первый среди равных, пока эта традиция не была разрушена царским порабощением казачества. Теперь у нас есть шанс возродить изначальную форму казачества - вольнолюбивого брата-солдата."
 ukraine_borotbyst_events.72.a: "Вместе против угнетения!"

 ukraine_borotbyst_events.73.t: "Надвигающаяся угроза"
 ukraine_borotbyst_events.73.d: "После прихода к власти боротьбистов одним из первых актов вновь избранного Совета депутатов стал отказ от договоров Украины с иностранными империалистическими державами. Единогласным решением Совета были отменены экономические и военные соглашения с Германией, а также Австрией, которые должны были вступить в силу немедленно. Согласно новому закону, все немецкие и австрийские советники и военнослужащие подлежали высылке. Те, кому посчастливилось спастись, перешли границу в основном с Польшей, ища убежища от хаоса революции и рассказывая местным властям о \"синдикалистском гнете\" Других, кто не успел вовремя бежать, схватили; большинство из них были интернированы в Лукьяновскую тюрьму в [202.GetName] для ожидания своей дальнейшей участи.\n\nВесть о революции почти сразу же достигла штаб-квартиры правительства в Берлине, и расправа с немецкой и австрийской тиранией сильно повлияла на общественное мнение: из газет Берлина и Вены раздавались призывы подавить революцию и восстановить порядок. В тот же день, когда закон был принят, из Берлина поступил ультиматум [202.GetName]. В нем говорилось, что революционеры должны немедленно отказаться от власти и вернуть власть законному правительству, а в случае невыполнения последуют \"жесткие действия\"; ультиматум был проигнорирован. Самые мощные немецкие дивизии находятся на западе для защиты от крупных синдикалистских держав, а вблизи украинской границы недостаточно сил для полноценного вторжения, поэтому представляется маловероятным, что нападение произойдет немедленно. Тем не менее, то, что предсказывали боротьбистские революционеры, несомненно, сбудется: Украина будет вынуждена защищать свой суверенитет от превосходящих сил рейхспакта."
 ukraine_borotbyst_events.73.a: "Никто не остановит волны революции!"

 ukraine_borotbyst_events.74.t: "Анализ бойца"
 ukraine_borotbyst_events.74.d: "В условиях роста популярности Боротьбы и нарастания хаоса в стране Александр Шумский с каждым днем становится все большей проблемой. Чтобы окончательно разобраться с ним, [UKR.GetLeader] решил поручить разведке изучить биографию и характер Шумского. Начали с того, что гетманская разведка уже собрала о нем:\n\nИМЯ: Александр Якович Шумский.\n\nРодился: 2 декабря 1890 года, в семье батраков (обедневших крепостных)\n\nПРИМЕЧАНИЯ: Ошибки относительно места рождения. Либо родился в Боровой Рудне ([202.GetName] губерния), либо в Турчинке (Волынская губерния). Член \"Спилки\" с 1908 г. и УПСР с 1911 г. В 1918 г. вместе со своими единомышленниками и последователями вышел из УПСР, чтобы создать новую партию - \"Украинскую партию социалистов-революционеров (коммунистов-боротьбистов)\".\n\nАгенты решили начать с места его рождения, чтобы определить, кто из них правдив. Поскольку в церковных записях Боровой Рудни его не было, оставалось только село Турчинка. Анализ его церковных записей оказался полезным, так как был обнаружен интересный факт: Шумский не только лгал о своем воспитании, но и о своей родословной. Выяснилось, что он был сыном лесничего и внуком священника, приписанного к селу Турчинка. Кроме того, он действительно происходил из дворянского рода, гербом которого был \"Ястрженбец\" (или ястреб-тетеревятник). Возникает очевидный вопрос: что делать с этой информацией? Если она попадет в прессу, то Шумский будет выставлен лжецом и врагом для своих сторонников. С другой стороны, люди могут не поверить в эти утверждения, а некоторые даже высмеять их, да и сам Шумский, скорее всего, опровергнет их."
 ukraine_borotbyst_events.74.a: "Нам нужны более весомые претензии, чтобы его уничтожить."
 ukraine_borotbyst_events.74.b: "Утечка, мы должны использовать все, что можно."

 ukraine_borotbyst_events.75.t: "Интеграция комнезамов"
 ukraine_borotbyst_events.75.d: "Мы создавали Комнезамы как объединение свободных крестьян для представления их интересов и координации перераспределения земли. Сейчас, когда земельная реформа завершается, эта организация исчерпала свою полезность. Планируется интегрировать ее основные структуры, такие как крестьянские товарищества, в официальные государственные институты под юрисдикцией Совета депутатов."
 ukraine_borotbyst_events.75.a: "Он хорошо выполнял свои обязанности."

 ukraine_borotbyst_events.76.t: "Конституционное собрание"
 ukraine_borotbyst_events.76.d: "Конституционный съезд Украины, состоящий в основном из ведущих боротбистских деятелей, согласился только с одним: прежняя конституция Украинской Народной Республики не имеет юридической силы. Остальные вопросы быстро распались. Председатель Шумский поручил Михаилу Полозу подготовить конституционный проект, который съезд возьмет за основу, но уже после его оглашения он был признан совершенно неудовлетворительным. Политическая программа Боротьбы, на которой он основывался, во многих моментах была крайне нечеткой, поэтому в нем были использованы заимствования из французской и британской конституций.\n\n Сразу же возникли совершенно разные мнения. Левко Ковалив утверждал, что в конституции слишком много заимствований, и она должна быть \"более украинской\" по своему характеру, хотя в чем именно это выражалось, было неясно. Григорий Гринько обвинил идею Ковалива в национализме и заявил, что коммунистическо-синдикалистский синтез является гораздо более рациональным решением, чем что-то упрямо \"национальное.\" Николай Хвылевой, похоже, выступил против самого понятия конституции, заявив, что это конструкция, созданная для того, чтобы сковать абсолютную власть Советов трудящихся и революции. Неоднократно председательствующий вынужден был объявлять перерыв, поскольку эмоции слишком сильно накалились. После четырнадцати часов дебатов и многочисленных голосований был принят проект, который должен быть передан в Совет депутатов"
 ukraine_borotbyst_events.76.a: "Отличная демонстрация единства, все..."

 ukraine_borotbyst_events.77.t: "Конец гетмана"
 ukraine_borotbyst_events.77.d: "С наступлением Боротбистской революции страна оказалась окруженной со всех сторон, вдали от союзников по Третьему Интернационалу. Ходят слухи, что Рейхспакт или Россия планируют наступление с целью захвата [202.GetName], учитывая его близость к линии фронта. В условиях частичной оккупации страны руководство Боротьбистов обсуждает, что делать с бывшим гетманом Павлом Петровичем Скоропадским, гниющим в Лукьяновской тюрьме на западе [202.GetName] с момента успешного восстания против него.\n\nЕсли [202.GetName] падет, Скоропадский может быть захвачен и восстановлен в качестве марионеточного лидера для русских или немцев. Это было бы сокрушительным ударом по нашему праведному делу, так как грозило бы полным крахом и без того колеблющегося боевого духа войск. Для трудящихся революции это вызвало бы смуту, которую просто необходимо было бы предотвратить.\n\nПосле того, как в газете "Червоный папор" появились слухи о гетманском вопросе, полученные из неизвестного источника, они дошли до рядов лукиановской тюремной охраны. Состоящая в основном из фанатичных и недоброжелательных людей, для них сам вид гетмана со временем стал отвратительным. Теперь он дряхлый старик, дни его сочтены, и он ждет, чем закончится его жизнь; тело его окоченело и неподвижно, ведь все, что ему доставалось, - это куски хлеба.\n\nВечером [?global.date.GetDateStringNoHourLong] по приказу офицера двое подчиненных вытащили его из камеры и прихрамывая, вывели во двор. Привязанный к деревянному столбу и с завязанными глазами, гетман произнес последние слова. Офицер начал оглашать все обвинения, предъявленные ему на импровизированном судебном процессе, произнося слова, словно проповедь о победе над дьяволом.\nКак только на горизонте наступили сумерки, солдат выстрелил в него из винтовки. Чёрная, как ночь в день расстрела, папка с грифом "Секретно" пополнила архив."
 ukraine_borotbyst_events.77.a: "Достойный конец для этого жалкого \"гетмана\""

 ### Borotbyst revolution's international consequences
 ukraine_borotbyst_events.100.t: "Украинская революция!"
 ukraine_borotbyst_events.100.d: "Украинские беспорядки окончательно закипели, и коммунистическо-синдикалистское движение 'Боротьба' захватило власть в республике. Законному правительству Украины удалось спастись, и в настоящее время оно обращается к Германии с просьбой о помощи в борьбе с социалистической угрозой. Президент новой социалистической республики Шумский осудил их как классовых предателей и коллаборационистов и объявил о полном суверенитете Украины. Началась стремительная мобилизация для защиты революции от любых внешних угроз. В результате такого поворота событий был разрушен стержень германской гегемонии на востоке."
 ukraine_borotbyst_events.100.a: "Это катастрофа." #GER, решение о разблокировке
 ukraine_borotbyst_events.100.b: "Это может стать возможностью." #RUS, решение о разблокировке
 ukraine_borotbyst_events.100.c: "This is concerning!" #AUS, does nothing

 ukraine_borotbyst_events.200.t: "Украинская социалистическа революция"
 ukraine_borotbyst_events.200.d1: "Для многих победа антигетманского восстания ознаменовала победу демократии и свободы в Украине. Однако республиканское правительство не оправдало возлагавшихся на него надежд, его неэффективность привела к массовым протестам в сельской и городской местности, возглавляемым в основном коммунистическо-синдикалистским движением 'Боротьбист'.\n\n В условиях всеобщей забастовки, парализовавшей страну, и растерянности военных, боротьбисты при поддержке Рабочего Демократического Союза свергли правительство в результате успешного переворота. Александр Шумский, лидер боротьбистов, объявил о полном суверенитете Украины, чем вызвал гнев Берлина и Москвы, которые, как сообщается, мобилизуют силы для подавления революции. Столкновение двух держав за Украину может оказаться неминуемым..."
 ukraine_borotbyst_events.200.d2: "Для многих победа антигетманского восстания означала победу демократии и свободы. Однако республиканское правительство не оправдало возлагавшихся на него надежд, его неэффективность привела к массовым протестам в сельской и городской местности, возглавляемым в основном коммунистическо-синдикалистским движением 'Боротьбист'.\n\n В условиях всеобщей забастовки, парализовавшей страну, и растерянности военных, боротьбисты при поддержке Рабочего Демократического Союза свергли правительство в результате успешного переворота. Александр Шумский, лидер "боротбистов", провозгласил полный суверенитет Украины"
 ukraine_borotbyst_events.200.a: "Есть ли у них желание умереть?"
 ukraine_borotbyst_events.200.b: "Многолетние планы, ставшие бесполезными..."
 ukraine_borotbyst_events.200.c: "Нельзя вечно задерживать ход истории..."
 ukraine_borotbyst_events.200.e: "Немецкий порядок провалился. Необходим новый..."
 ukraine_borotbyst_events.200.f: "При малейшем потрясении немецкое господство рушится"
 ukraine_borotbyst_events.200.g: "Хаос на востоке, в самое опасное время..."

 UKR_GER_invade_ukraine: "Вторжение в Украину"
 UKR_GER_invade_ukraine_desc: "Опорный пункт на востоке пал. Синдикалистское движение 'Боротьбист' захватило республику, и теперь бастион Интернационала угрожает рейхспакету. Этого нельзя допустить - мы должны немедленно восстановить порядок"
 UKR_RUS_invade_ukraine: "Вторжение в Украину"
 UKR_RUS_invade_ukraine_desc: "Опорный пункт Германии на востоке пал. Синдикалистское движение боротьбистов захватило республику, оставив ее изолированной и слабой. Появилась возможность восстановить наш контроль над территориями, потерянными в Брест-Литовске, и мы должны немедленно начать подготовку к этому."
 ukraine_borotbyst_events.101.t: "Интервенция на Украине" #для GER
 ukraine_borotbyst_events.101.d: "Началась подготовка к вмешательству и подавлению украинской революции. Операция 'Леопольд', план действий Хеер на случай враждебной Украины, уже определила основные принципы наступления, но потребуется некоторое время для переброски необходимых частей с западных границ на восток.\n\n Пока военные готовятся, мы должны принять политическое решение о будущем Украины - которое не должно быть публичным, а скорее будет реализовано только после того, как [202.GetName] будет освобождена от красной угрозы. Очевидно, что наиболее популярным вариантом было бы восстановление прежнего правительства, хотя революция поставила под сомнение его компетентность и популярность. Возможно, более ответственным вариантом было бы оказание давления на них с целью заставить их принять некоторые изменения в кабинете министров и создать в целом более консервативный и надежный республиканский режим. Наконец, некоторые сторонники жесткой линии хотят восстановить гетмана - либо самого Павла, либо его сына - в качестве окончательного возврата к стабильности, хотя сомнительно, что это действительно найдет легитимность на Украине."
 ukraine_borotbyst_events.101.a: "Избранное правительство остается легитимным."
 ukraine_borotbyst_events.101.b: "Создать более ответственное республиканское правительство."
 ukraine_borotbyst_events.101.c: "Восстановите гетмана, он бы это предотвратил."

 ukraine_borotbyst_events.102.t: "Россия мобилизуется" #для GER и UKR
 ukraine_borotbyst_events.102.d: "Наши опасения сбылись. Российская армия начала массовую переброску войск к границам Украины и других стран Восточной Европы. Началась мобилизация резервных частей для подготовки к самой большой войне с 1914 года. Официально \"подготовка к обороне от коммунистического вторжения\", но очевидно, что они стремятся вторгнуться на Украину, у которой теперь нет союзников, способных до нее добраться. Третий Интернационал хранит молчание, но, несомненно, следит за развитием ситуации, готовясь к войне."
 ukraine_borotbyst_events.102.a: "Послать Москве ультиматум - отступить" #GER
 ukraine_borotbyst_events.102.b: "Мы никогда не сдадимся!" #UKR

 ukraine_borotbyst_events.103.t: "Немецкий ультиматум"
 ukraine_borotbyst_events.103.d: "Посол Германии в Москве передал нам ультиматум из Берлина. Требования просты - территориальный суверенитет Украины не должен быть нарушен. Российское правительство может быть уверено, что Германия и ее союзники разберутся с коммунистическим восстанием. Если русские пересекут украинскую границу, это будет воспринято как нападение на союзника Германии, законное правительство Украины, и тем самым вынудит Германию объявить войну захватчику. Германия предложила возможность незначительных \"пограничных переговоров\" после подавления революции, чтобы снять напряжение между Берлином и Москвой. Похоже, что гунн просто играет на время, надеясь, что предложение о переговорах заставит нас упустить шанс века."
 ukraine_borotbyst_events.103.a: "Послать контр-ультиматум и перейти границу"
 ukraine_borotbyst_events.103.b: "Мы не готовы к войне"

 ukraine_borotbyst_events.104.t: "Россияне пересекают украинскую границу"
 ukraine_borotbyst_events.104.d: "Ответ России на наш ультиматум носил по большей части пропагандистский характер. В нем они заявили о своем намерении освободить своих украинских братьев от гнета коммунистов и иностранцев - очевидно, имея в виду нас - и вернуть Украину украинскому народу под защиту России. Их возмутительные требования включали в себя отказ Германии от территорий,\ "несправедливо захваченных по Брест-Литовскому договору\" Как будто желая оправдать наш блеф, они почти сразу после этого начали вторжение, пересекая украинскую границу в нескольких местах. Если мы не объявим войну, как обещали, это сильно повредит нашей репутации и что еще хуже, может быть расценено синдикалистскими державами как признак слабости."
 ukraine_borotbyst_events.104.a: "Значит, это война"
 ukraine_borotbyst_events.104.b: "Отбой"

 ukraine_borotbyst_events.105.t: "[202.GetName] Призывает на помощь!" #for INT
 ukraine_borotbyst_events.105.d: "Украина обратилась с просьбой о немедленной помощи, поскольку она сталкивается с немецким и российским вторжением. Франция и Британия, безусловно, симпатизируют Украине, но сомневаются, стоит ли вступать в войну. Дело Боротбиста кажется далеким, хотя вражда между Германией и Россией дала нам лучший за последние десятилетия шанс отомстить за 1919 год и распространить революцию на берега Рейна и за его пределы."
 ukraine_borotbyst_events.105.a: "Мы готовы!"
 ukraine_borotbyst_events.105.b: "Готовьте войска!"

 ukraine_borotbyst_events.106.t: "Мир в огне" #для УКР
 ukraine_borotbyst_events.106.d: "То, что началось как забастовка в [202.GetName], теперь стало еще одной Великой войной, когда миллионы людей идут на смерть по всей Европе. С объявлением франко-британской войны надежды Украины значительно возросли. Если мы сможем продержаться до прихода наших западных товарищей, наша республика будет в безопасности. При их поддержке мы сможем принудить Россию к миру, а еще лучше - освободить Кубань и другие регионы. Но путь туда будет долгим и трудным, и Днепр до конца будет красным от крови.\n\nКогда два человека, давние друзья, говорили о прошлых революциях, они услышали радиопередачу. Вся Камяница, расположенная на улице Инстиутской, а вместе с ней и вся страна, затихла, слушая объявление. С запада и востока только что перешли границу немецкие и русские войска. Как только радио начало передавать "Интернационал" на украинском языке, один из мужчин пошел к себе в кладовку. Вернулся с бутылкой красного одесского вина и двумя бокалами. Отпив глоток, второй мужчина ответил:"
 ukraine_borotbyst_events.106.a: "Такое горькое вино, как человеческая судьба в этой долине слез..."
 ukraine_borotbyst_events.106.a.tt: "Война против русско-германского империализма может закончиться только победой. Как только §РТретий Интернационал§! разгромит §Рейхспакт§! и пограничит §Московское соглашение§!, мы сможем присоединиться к их стороне и принудить Россию к перемирию - но если Россия не будет чувствовать угрозы, может произойти Третий Вельткриг."

 ###UKR-RUS peace after WK2 has ended
 ukraine_borotbyst_events.110.t: "Делегация мира Интернационала в России" #дляРоссии
 ukraine_borotbyst_events.110.d1: "В Москву прибыла совместная делегация международных держав для ведения переговоров о мире между Россией и Украиной. Делегация, состоящая в основном из украинских, французских и британских дипломатов, подготовила соглашение о прекращении огня, которое вернет границы 1939 года. Поскольку ни одна из сторон не добилась значительных успехов, это соглашение будет относительно легко принято обеими сторонами. Интернационал пригрозил направить поддержку Украине или даже напрямую вступить в войну, если Россия решит продолжить вторжение." #Украина цела
 ukraine_borotbyst_events.110.d2: "Совместная делегация международных держав прибыла в Москву для переговоров о мире между Россией и Украиной. Делегация, состоящая в основном из украинских, французских и британских дипломатов, подготовила соглашение о прекращении огня, которое в большей или меньшей степени признает нынешнюю линию фронта в качестве новой границы, уступая России значительную часть территории Украины. Украинские дипломаты выразили резкий протест, но не смогли изменить результат, поскольку ни одна из сторон не была заинтересована в продолжении войны по этому вопросу." #Украина разделена
 ukraine_borotbyst_events.110.d3: "Совместная делегация международных держав прибыла в Москву для ведения переговоров о мире между Россией и Украиной. Делегация, состоящая в основном из украинских, французских и британских дипломатов, подготовила соглашение о прекращении огня, которое признает украинские завоевания на востоке страны частью Украины. Российские дипломаты были в ярости от такого требования, но реалии стратегической ситуации заставили их все же рассмотреть его. Интернационал пригрозил вступить в войну, если соглашение о прекращении огня не будет достигнуто. " #Украина оккупирует часть территории России
 ukraine_borotbyst_events.110.a1: "Согласие на прекращение огня"
 ukraine_borotbyst_events.110.a2: "Согласие на прекращение огня"
 ukraine_borotbyst_events.110.a3: "Согласие на прекращение огня."
 ukraine_borotbyst_events.110.b: "Хорошо, мы их тоже раздавим."

 ukraine_borotbyst_events.111.t: "Предложить мир России?"
 ukraine_borotbyst_events.111.d: "Уже некоторое время [RUS.GetNameDef] воюет против [UKR.GetNameDef], стремясь опрокинуть революцию рабочих и разбить их мечты о независимости. Война с Германской империей не позволила нам добраться до украинцев, как и нецелесообразность одновременного ведения войны с Россией. Но ситуация изменилась в нашу пользу: мы победили германских империалистов и освободили значительные территории Европы, а украинцы продолжают борьбу, бросая вызов российскому империализму. Многие призывают закончить революцию и вступить в войну на стороне украинцев, но мы должны признать, что это непопулярно у нас дома, ведь целое поколение душ уже потеряно для немцев. Даже если мы не вступим в войну напрямую, наше выгодное положение может позволить нам заставить русских сесть за стол переговоров и прекратить вторжение в Украину"
 ukraine_borotbyst_events.111.a: "Давайте вызовем [202.GetName] на связь и посмотрим, что они скажут."
 ukraine_borotbyst_events.111.b: "Мир - бесплодная затея. За Москву!"

 ukraine_borotbyst_events.112.t: "Парижское мирное предложение"
 ukraine_borotbyst_events.112.d1: "Силы Третьего Интернационала наконец-то пришли к нам на помощь. Однако, признавая тот факт, что в борьбе с Германией они потеряли целое поколение душ, их первым предложением было не вступать в войну непосредственно на нашей стороне, а провести переговоры о мирном предложении между всеми сторонами. Поскольку ни одна из сторон не добилась значительных успехов, они предложили соглашение о прекращении огня, которое вернет границы 1939 года, что довольно легко было принять обеим сторонам."
 ukraine_borotbyst_events.112.d2: "Силы Третьего Интернационала наконец-то пришли к нам на помощь. Однако, признавая тот факт, что в борьбе с Германией они потеряли целое поколение людей, их первым предложением было не вступать в войну непосредственно на нашей стороне, а провести переговоры о заключении мира между всеми сторонами. Они предложили соглашение о прекращении огня, которое более или менее признавало бы нынешнюю линию фронта в качестве границы, уступая России значительную часть территории Украины. Многие наши политики и дипломаты выразили резкий протест, назвав это капитуляцией, но многие заявили, что если мы не примем это предложение, то Интернационал бросит нас на растерзание российскому империализму"
 ukraine_borotbyst_events.112.d3: "Силы Третьего Интернационала наконец-то пришли к нам на помощь. Однако, признавая тот факт, что они потеряли целое поколение душ в борьбе против Германии, их первым предложением было не вступать в войну непосредственно на нашей стороне, а вести переговоры о мирном предложении между всеми сторонами. Они предложили соглашение о прекращении огня, в соответствии с которым украинские завоевания на востоке страны будут признаны частью Украины, и было бы глупо не принять это предложение"
 ukraine_borotbyst_events.112.a: "Мы согласимся ради мира."
 ukraine_borotbyst_events.112.b: "Мы не хотим и не нуждаемся в их помощи. Смерть империализму!"
 ukraine_borotbyst_events.112.a.tt: "Если Россия откажется от мира, мы вступим в §РТретий Интернационал§! и будем сражаться вместе с ними."

 ukraine_borotbyst_events.113.t: "Мир в наше время?"
 ukraine_borotbyst_events.113.d1: "Когда наши дипломаты спешат домой после заключения договора, по всей Украине ощущается спокойствие: война закончилась. Процесс восстановления, несомненно, будет долгим: немецкие и российские империалисты бомбили страну без устали и ничего не оставили после себя. Французы и англичане пообещали оказать нам обширную гуманитарную помощь для восстановления нашей родины, но, несомненно, на это потребуется время.\n\n Хотя мы были вынуждены уступить России несколько территорий, прекращение огня широко отмечается как победа. С самого начала нашей революции мы подвергались вторжениям со всех сторон, мир пылал, пока мы пытались с честью защитить свою страну. Мало кто надеялся на боротбистское дело - международные журналисты предсказывали нашу капитуляцию перед империалистами уже в первые недели после русско-германского вторжения, но мы сумели опровергнуть все ожидания. Выживание Боротьбы, несомненно, будет изучаться последующими поколениями как одна из самых маловероятных военных побед в этом столетии, а может быть, и в истории.\n\n В разных городах вспыхивают мелкомасштабные акции протеста с требованиями продолжить войну и вернуть утраченные территории, освободив миллионы украинцев, находящихся под российской оккупацией. Протесты в основном затихают, и голоса разума берут верх, но, несмотря на это, многие понимают, что однажды Украина должна снова стать целой. Ситуация довольно неспокойная, отношения между Россией и Международным сообществом никогда не были хуже, и возможно, наши страны снова столкнутся - на этот раз с помощью Международного сообщества. Но некоторые надеются, что в конце концов Украина снова станет целой одним росчерком пера, даже если для этого потребуются годы и даже десятилетия. В любом случае, мы победили, никогда не забывая о подвиге наших храбрецов, отдавших себя за дело свободной Украины"
 ukraine_borotbyst_events.113.d2: "Когда наши дипломаты спешили домой после заключения договора, по всей Украине ощущалось спокойствие: война закончилась. Процесс восстановления, несомненно, будет долгим: немецкие и российские империалисты бомбили страну без устали и ничего не оставили после себя. Французы и англичане пообещали оказать нам обширную гуманитарную помощь для восстановления нашей родины, и несомненно, потребуется некоторое время для того, чтобы ситуация восстановилась. Перемирие широко отмечается как победа благодаря храбрости и решительности наших войск, за исключением одной крайне кислой точки: [202.GetName]. Наша столица, символ украинской государственности, была уступлена русским; в нашей новой, \"временной\" столице, [UKR.Capital.GetCapitalVictoryPointName], уже начались масштабные протесты, требующие от Интернационала нарушить перемирие и свергнуть оккупантов. К сожалению, мы мало что можем сделать, хотя голоса разума пытаются успокоить протесты. Ситуация довольно неспокойная, отношения между Россией и Интернационалом как никогда ухудшились, и возможно, наши страны снова столкнутся - на этот раз с помощью Интернационала. Но некоторые надеются, что в конце концов Украина снова станет целой одним росчерком пера, даже если для этого потребуются годы и даже десятилетия. В любом случае, мы одержали пиррову победу, никогда не забывая о подвиге наших храбрецов, отдавших себя за дело свободной Украины."
 ukraine_borotbyst_events.113.d3: "Когда наши дипломаты спешили домой после заключения договора, по всей Украине царило ощущение спокойствия: война закончилась. Процесс восстановления, несомненно, будет долгим: немецкие и русские империалисты бомбили страну без устали и ничего не оставили после себя. Французы и англичане пообещали оказать нам обширную гуманитарную помощь для восстановления нашей родины, но, несомненно, потребуется некоторое время для восстановления ситуации.\n\n Прекращение огня широко отмечается как победа. С самого начала нашей революции мы подвергались вторжениям со всех сторон, мир пылал, когда мы пытались с честью защитить свою страну. Мало кто возлагал надежды на боротбистское дело - международные журналисты предрекали нам капитуляцию перед империалистами уже в первые недели после русско-германского вторжения, но мы сумели опровергнуть все ожидания. Даже потерпев катастрофические поражения и потери от империалистов, мы сумели отбросить их назад по всем направлениям, освободив все наши территории как раз к моменту прихода Интернационала и прекращения московской агрессии. Выживание Боротьбы, несомненно, будет изучаться последующими поколениями как одна из самых маловероятных военных побед в этом столетии, а возможно, и в истории.\n\nНесмотря на то, что ситуация довольно непростая, отношения между Россией и Интернационалом никогда не были хуже, Интернационал сейчас имеет большое преимущество; в течение многих лет русские громко заявляли, что уничтожат нашу независимость, но в итоге им не удалось захватить ни пяди земли, и они оказались униженными. Некоторые рекомендуют прервать перемирие, как только мы сможем консолидировать наши силы; в конце концов, если мы смогли остановить наступление Москвы так хорошо, как мы это сделали без внешней помощи, то, несомненно, с помощью Интернационала мы будем в Москве через несколько месяцев, а может быть, и недель. Тем не менее, не стоит торопиться, и мы одержали великую победу из пасти поражения, никогда не забывая о подвиге наших храбрецов, отдавших себя за дело свободной Украины"
 ukraine_borotbyst_events.113.d4: "Перемирие заключено, украинцы и русские отходят к границам, определенным договором. Хотя некоторые выступают за войну, чтобы раз и навсегда сокрушить российский империализм, большинство довольны перемирием. Боротьбисты действительно проявили храбрость, отбиваясь от немецких и русских войск, и с их включением в наш военный союз они станут первым оплотом против любой российской агрессии"
 ukraine_borotbyst_events.113.d5: "Перемирие заключено, украинцы и русские отходят к границам, определенным договором. Хотя некоторые выступают за продолжение войны и поход на Париж, чтобы покончить с революцией, есть ощущение больших сомнений в наших возможностях сделать это, учитывая нашу неспособность вовремя уничтожить украинскую революцию. Возможно, когда-нибудь мы сможем осуществить свой реванш, но этот день не сегодня"
 ukraine_borotbyst_events.113.a: "Но однажды мы снова будем едины."
 ukraine_borotbyst_events.113.b: "Когда-нибудь мы снова увидим Золотые ворота."
 ukraine_borotbyst_events.113.c: "Несомненно, невероятная победа"
 ukraine_borotbyst_events.113.d: "Революция продолжается!"
 ukraine_borotbyst_events.113.e: "Как мы проиграли?"

 ukraine_borotbyst_events.114.t: "Интернационал на нашей стороне!"
 ukraine_borotbyst_events.114.d: "После долгой войны Третий Интернационал окончательно разгромил немецкую угрозу и теперь обратил свое внимание на наше дело. Надежды на Украине были невелики, но они разрушили все ожидания - идя на большой риск и действительно демонстрируя свою приверженность социалистическому братству, они напрямую перешли на нашу сторону против России. Мы уже показали, что русский медведь - это бумажный тигр, который так долго сопротивлялся, а с Интернационалом на нашей стороне наша победа практически неизбежна!"
 ukraine_borotbyst_events.114.a: "В Москву!"

 ukraine_borotbyst_events.115.t: "Российско-украинский договор о взаимопомощи"
 ukraine_borotbyst_events.115.d: "Теперь, когда мы бок о бок сражаемся против кайзеровских рабских армий и их буржуазных хозяев, мы можем, наконец, официально закрепить вечную дружбу между украинским и русским народами" Российская делегация в радужных тонах рассказывала и объясняла детали предлагаемого договора. Экономика Украины после разрыва связей со среднеевропейскими рынками зашла в тупик, тысячи людей остались без работы, крестьяне не могут продать свой урожай, заводы закрыты из-за отсутствия комплектующих. Миллионы людей требуют от правительства облегчить положение, но в краткосрочной перспективе у него нет другого выхода, кроме как призвать всех безработных в армию. Естественным решением было бы заключение всеобъемлющего соглашения между Россией и Украиной, которое объединило бы экономики двух стран ради их процветания. Кроме того, научное и военное сотрудничество обеспечит прогресс и стабильность.\n\n С тех пор в парламенте разгорелась яростная дискуссия. Критики утверждают, что принятие российских условий означает отказ от с таким трудом завоеванной независимости и делает нас не лучше Скоропадского. Другие соглашаются, но признают, что других реальных вариантов нет, поскольку в упорной изоляции Украина тоже не сможет обрести процветание. К тому же союз с Западом будет лишь символическим, так как на деле он мало чем может помочь. Есть и те, кто всей душой поддерживает договор, напоминая, что Россия [SOV.GetLeader] вряд ли большевистская, и что вражда, длившаяся десятилетиями, не должна мешать международному сотрудничеству; разве не Маркс заявлял, что границы станут неважными после того, как революция пролетариата совершится?\n\nПозади публичной дискуссии российская делегация была более четкой. Непринятие договора приведет к экономической изоляции, и России, возможно, придется вмешаться, чтобы помочь украинскому пролетариату сбросить лже-социалистов"
 ukraine_borotbyst_events.115.a: "И в результате окончательного голосования... договор принят."

 ukraine_borotbyst_events.116.t: "Неудачный переворот в [202.GetName]"
 ukraine_borotbyst_events.116.d: "Так называемый Договор о дружбе с Москвой не остался без противников. Хотя большинство в правительстве понимало, что без этого договора экономика Украины еще больше ухудшится, за закрытыми дверями вооруженные силы восприняли это не очень хорошо. Для многих военнослужащих, особенно из националистической клики, такой как Евгений Коновалец, Андрей Мелынк и другие, посвятившие свою карьеру независимой Украине, договор был оскорблением всего, ради чего они работали.\n\nНе многие верили, что будут предприняты какие-либо действия, учитывая наличие российских войск в стране; тем не менее, заговорщики осуществили свой план. Сотни солдат и офицеров, верных Коновальцу и Мелынку, подняли тревогу, перерезали Русановский мост и Дарницкий вокзал. Поспешив, заговорщики двинулись на захват управления безопасности и здания правительства, не встретив при этом практически никакого сопротивления.\n\n Вместе с остальными заговорщиками Коновалец вошел в здание, чтобы объявить о своих целях. Он дал понять, что суверенитет Украины не будет нарушен и что договор между Украиной и Россией в перспективе приведет только к аннексии, поэтому он потребовал отменить или пересмотреть договор между двумя странами, чтобы не нарушать украинскую государственность. В зале присутствовал сам председатель, который с пониманием отнесся к требованиям Коновальца, но из-за их расплывчатости законодательное собрание не нашло понимания, что делать.\n\n Через несколько часов стало ясно, что время заговорщиков истекло. Лояльные украинские полки при поддержке русской 2-й пехотной дивизии начали артиллерийский обстрел, чтобы снять блокаду с моста. Окруженные со всех сторон, заговорщики теряли силы. После их ареста одна из российских газет заявила: \"Ультранационалистический переворот в [202.GetName].\"
 ukraine_borotbyst_events.116.a: "Мечта разбилась вдребезги, унесенная неизбежной судьбой."

 ukraine_borotbyst_events.117.t: "Россия отвергает режим прекращения огня"
 ukraine_borotbyst_events.117.d: "У российских тиранов хватает наглости. После того как мы протянули оливковую ветвь, обещая мир и прекращение вечной войны с нашими братьями на Украине, они отвергли наше предложение, заявив, что ситуация на Украине нас не касается, и что мы не должны вмешиваться во внутренние дела России. Считают ли они, что мы блефуем, или нет, но их вызов не может остаться безнаказанным. Это может стать нашим моментом, чтобы покончить с империализмом по всей Европе"
 ukraine_borotbyst_events.117.a: "От Парижа до Берлина, от Берлина до Москвы!"
 ukraine_borotbyst_events.117.b: "Не стоит рисковать"

 ukraine_borotbyst_events.118.t: "Махно уезжает на Украину"
 ukraine_borotbyst_events.118.d: "В связи с укреплением "боротбистской" революции на Украине генерал Нестор Махно выразил желание вернуться на родину и вступить в ряды украинских вооруженных сил. Поскольку мы теперь являемся союзниками Украины, это является лишь неофициальным вопросом"
 ukraine_borotbyst_events.118.a: "Счастливого пути, товарищ"

 ukraine_borotbyst_events.119.t: "Махно возвращается на Украину"
 ukraine_borotbyst_events.119.d: "Легендарный анархист и революционер Нестор Махно широко известен в социалистическом мире. Махно командовал армией повстанцев, которая дала гетману тяжелый бой, но в конце концов была разбита с помощью немецкого оружия. В качестве изгнанника он прибыл в Коммуну Франции, но идейные разногласия с ее институтами привели его в Патагонию, где он служит уже много лет.\n\nНесмотря на свои разногласия с боротбистами, товарищ Махно заявил, что желает служить в армии, похвалив наши доблестные усилия в борьбе с немецким и русским империализмом. Кроме того, он дал понять, что языковой барьер в Патагонии и во Франции создал для него значительные проблемы, и хотя в Патагонии есть те, кто более близок к его идеологии, нет большего дома, чем место, где он известен.\n\nНесомненно, Махно был принят в ряды вооруженных сил, пообещав поддерживать нашу борьбу за свободу и социальную справедливость."
 ukraine_borotbyst_events.119.a: "Отец Анархии вернулся"

 ukraine_borotbyst_events.120.t: "Памяти товарища Эллан-Блакитного"
 ukraine_borotbyst_events.120.d: "У истоков нашего политического движения стояло много людей, одним из которых был товарищ Василий Еллан-Блакитный. Там, где стояли Шумский, Полоз, Гринько, Ковалив, был и Еллан-Блакитный.\nУроженец Украины Василий Елланский, наш дорогой товарищ с ранних лет принимал активное участие в украинском социал-революционном и национально-освободительном движениях, сначала в родной Черниговской губернии, а затем и по всей стране. Находясь в заключении на закате первой итерации УНР, а также во времена Гетманата, Еллан-Блакитный был освобожден после нескольких месяцев неволи и сразу же начал распространять идеи нашего Движения. Такие смелые и эффективные действия произвели эффект, и товарищ Эльян-Блакитный быстро поднялся по партийной лестнице и стал фактическим вторым командиром Боротьбы.\n\n Даже после ссылки в Париж наш дорогой товарищ оставался таким же активным, как и прежде, сосредоточившись на идеологической полемике с товарищами по партии и членами других революционных движений в эмиграции, а также занимаясь написанием революционной \"пролетарской\" литературы.\nС глубоким прискорбием товарищ Эллан-Блакитный ушел из жизни в 1926 году, как раз в тот момент, когда реакционные силы подняли свою уродливую голову на нашей родине.\n\nНаш дорогой товарищ, возможно, не дожил до успеха нашей революции, но он, несомненно, гордился бы тем, что мы находимся на этом месте! В память о нем уже запланировано перезахоронение в [202.GetName] из Парижа"
 ukraine_borotbyst_events.120.a: "Отдыхайте, товарищ"

 ukraine_borotbyst_events.121.t: "Перемирие с Украиной?" #Игрок, вероятно, никогда не увидит этого события
 ukraine_borotbyst_events.121.d: "Надежды в этой войне мало. Может быть, удастся добиться перемирия с Украиной и впредь ориентироваться только на немцев."
 ukraine_borotbyst_events.121.a: "Давайте заключим мир с [202.GetName]"
 ukraine_borotbyst_events.121.b: "Нет!"

 ukraine_borotbyst_events.122.t: "Перемирие с Россией?"
 ukraine_borotbyst_events.122.d: "Российский лидер [RUS.GetLeader] предложил перемирие между Россией и Украиной,\ "ради интересов обоих народов.\" Очевидно, что Москва в отчаянии, так как она готова позволить нам оккупировать земли, на которые мы претендуем,\ "временно.\" пока Германия не будет побеждена. Это позволит высвободить многие наши силы, чтобы сосредоточиться на войне на западе"
 ukraine_borotbyst_events.122.a: "Принять"
 ukraine_borotbyst_events.122.b: "Нет!"

##Republic events
 ukraine_republican_events.1.t: "Новая Конституция"
 ukraine_republican_events.1.d: "29 апреля 1918 года Центральная Рада утвердила Конституцию Народной Республики. Этот документ, предусматривавший создание парламентской республики, гарантировавшей равные права каждому гражданину, просуществовал всего несколько часов. В тот же день в результате гетманского переворота конституция была быстро заменена на гораздо более удобную для Скоропадского. И все же те, кто присутствовал в день подписания конституции, не отказались от идеалов, которые она олицетворяла. Демократия, автономия, независимость - все это когда-нибудь станет законом страны.\n\n Похоже, что этот день уже близок: в Доме Центрального Совета собрался недавно сформированный конституционный комитет, чтобы начать процесс восстановления республиканской конституции. В течение нескольких недель они будут тщательно изучать законодательство, внося в него необходимые поправки. В документе почти двадцатилетней давности есть немало спорных моментов, которые, несомненно, вызовут ажиотаж среди членов комиссии, как и в 1918 году. Тем не менее, Конституция Народной Республики, считающаяся самым прогрессивным законодательным актом в истории Украины, должна вступить в силу уже в ближайшие недели, и на этот раз ей ничто не помешает."
 ukraine_republican_events.1.a: "Как мы уже говорили, пока нас так грубо не прервали..."
 UKR_convene_constitutional_committee_tt: "В конце этой цепочки событий мы обретем §Национальный дух§!, последствия которого будут зависеть от §Выборов, которые мы сделаем§!"

 ukraine_republican_events.2.t: "Избирательные права для осужденных преступников"
 ukraine_republican_events.2.d: "В ходе работы конституционного комитета над восстанавливаемой республиканской конституцией в последние дни все чаще обсуждается один пункт. Речь идет о статье 17, которая гласит: \n\n 'Гражданин Украинской Народной Республики не может быть ограничен в праве слова, печати, вероисповедания, организации и забастовки, если он не нарушает норм уголовного права'.\n\nКонечно, именно конец этого предложения вызвал много споров. Многие члены комитета считают, что отбирать у преступников эти базовые права несправедливо и что этому закону не место в столь прогрессивном документе. Другие не согласны с этим, утверждая, что те, кто пренебрегает институтами республики, не заслуживают участия в ней. После нескольких дней обсуждения проводится голосование..."
 ukraine_republican_events.2.a: "Комитет согласен внести поправки"
 ukraine_republican_events.2.a_tt: "§YКонституция§! даст нам:\n$MODIFIER_STABILITY_FACTOR$: §G+10%§!"
 ukraine_republican_events.2.b: "Статья 17 остается без изменений"
 ukraine_republican_events.2.b_tt: "§YКонституция§! даст нам:\n$MODIFIER_POLITICAL_POWER_FACTOR$: §G+5%§!"

 ukraine_republican_events.3.t: "Внутренние административные подразделения"
 ukraine_republican_events.3.d: "Следующим спорным вопросом конституционной комиссии должно было стать административное деление Украины. Перед свержением Народной республики двадцать лет назад был принят закон, определявший административное деление государства, разделивший его на 32 \"земли\", которые должны были служить избирательными округами для Украинской Народной Республики и децентрализующим элементом, вокруг которого должно было осуществляться общественное самоуправление. Это предложение основывалось на идеях Грушевского, который предлагал, чтобы земли вмещали около миллиона человек каждая и были достаточны для самостоятельного устройства санитарного, дорожного, земельного, промышленного и культурного дела, а также для организации среднего образования.\n\n Однако после переворота Скоропадского деление было изменено и стало напоминать губернии старой Российской империи. Многие утверждают, что администрация Скоропадского не вполне адекватно представляла новый порядок, а власть была сильно централизована вокруг [202.GetName]. Несомненно, мы исправим его ошибки, но в какой степени - это вопрос, который вызывает ожесточенные споры; нынешние границы Украины уже не те, что были в короткий период республиканского правления, и нужно проводить новые разграничения."
 ukraine_republican_events.3.a: "Комитет согласен сильно перекроить дивизионы"
 ukraine_republican_events.3.a_tt: "§YКонституция§! даст нам:\n$MODIFIER_STABILITY_FACTOR$: §G+10%§!\n$MODIFIER_POLITICAL_POWER_FACTOR$: §G+5%§!"
 ukraine_republican_events.3.b: "Умеренный компромисс достигнут"
 ukraine_republican_events.3.b_tt: "§YКонституция§! даст нам:\n$MODIFIER_STABILITY_FACTOR$: §G+5%§!"

 ukraine_republican_events.4.t: "Конституция Украинской Народной Республики 1937 года"
 ukraine_republican_events.4.d: "После многодневных обсуждений новая конституция Украинской Народной Республики стала законом страны. Ее называют, пожалуй, самой прогрессивной конституцией в Восточной Европе, хотя по сравнению с первоначальной конституцией 1917 года в ней мало что изменилось.\n\n Но более всего принятие конституции стало значительной символической победой над старым порядком. Она закрепила право украинского народа осуществлять свою власть через Национальное собрание, а также равные права граждан Украины, независимо от того, русский он, белорус, поляк или еврей. Гетман больше не будет иметь ничем не ограниченную исполнительную власть - новая конституция гарантирует, что наша исполнительная власть, Совет народных министров, подотчетна народу через Национальное собрание.\n С принятием новой конституции мы становимся маяком свободы в Восточной Европе, ярким примером в стране неопределенности, которому обязательно последуют другие."
 ukraine_republican_events.4.a: "Конституция от народа, для народа!"

 ukraine_republican_events.5.t: "Завершение революции"
 ukraine_republican_events.5.d: "Винниченко немедленно отдал приказ маршалу Волоху и генералу Тютюннику начать разоружение подразделений немецкой армии на Украине для защиты от готовящегося государственного переворота. Были некоторые опасения, что другие высокопоставленные лица, такие как Петлюра, могут причинить неприятности, но, конечно, после следующего поступка Винниченко не останется никого, кто выступил бы против Украины и второго этапа революции. Следующим актом стала грандиозная речь перед Национальным собранием, которая, несомненно, запомнится в истории Украины на долгие годы.\n\n"Десятилетиями мы боролись за то, чтобы Украина была свободной. Но иностранные тираны всегда боролись за то, чтобы поработить нас! Всегда и везде, ради собственной корыстной выгоды, они стремились поработить народ Украины.\n\nНесмотря на тяжелые условия, мы никогда не теряли надежды на то, что в один прекрасный день гетман будет свергнут, и мы все еще надеемся, что снова окажем сопротивление российским агрессорам.\n\nТеперь и на Западе они не остановятся ни перед чем, чтобы эксплуатировать Украину и украинский народ! Очевидность очевидна: они хотят нового 29 апреля, чтобы уничтожить украинский дух и все, за что мы проливали кровь.\n\nУ нас ничего этого не будет. Мы не повторим прежних ошибок. Мы будем бороться и победим!""
 ukraine_republican_events.5.a: "Это последний конфликт!"

 ukraine_republican_events.6.t: "Выборы в Трудовой Конгресс"
 ukraine_republican_events.6.d: "Вот-вот состоятся выборы в Трудовой Конгресс. В отличие от прошлых выборов, к участию в них допускаются только те, кто обещает поддерживать Революцию и действовать в интересах рабочего класса.\n\nТеперь, когда революция увенчалась успехом и с контрреволюционными силами было покончено, судьба Рабочего демократического союза стала ясна: две его составляющие, СРБ и УПСР, согласились мирно распустить Союз и участвовать в выборах в Трудовой конгресс отдельно. В целом, контроль над Трудовым Конгрессом оспаривают СРБ и УПСР, причем первые поддерживают кандидатуру Владимира Винниченко на пост председателя, а вторая - кандидатуру Никифора Григорьева.\n\nНо не только они будут участвовать в Трудовом Конгрессе. Боротьбисты восприняли наши успехи и намерены участвовать в выборах в Конгресс. Несмотря на то, что их популярность за последние годы значительно снизилась, они могут оказаться влиятельным фактором, если захотят примириться с партией, от которой они первоначально откололись, - УПСР. Украинская коммунистическая партия (УКП) также заявила, что примет участие в съезде. Грубо говоря, УКП имеет много идеологического сходства с СРБ, в частности с партийным крылом Писоцкого. Хотя многие ожидали, что Писоцкий будет отодвинут на второй план, у него много сторонников в СРБ, которые считают, что умеренный курс Винниченко больше не нужен, поскольку революция укрепилась.\n\nХотя были некоторые опасения, что УСДРП после Революции утратит свою актуальность, некоторые из ее наиболее независимых членов продолжают присоединяться к умеренному крылу УПСР, полагая, что влияние Ковалевского может заставить Григорьева пойти на компромисс. Наконец, остается вопрос о самом Винниченко. Скорее всего, СРБ не получит большинства в Трудовом Конгрессе, точно так же, как они были в меньшинстве у УПСР, когда существовала Национальная партия "Зборы". Но никто не может отрицать, что Винниченко довольно популярен, вероятно, благодаря своему компромиссному, но умелому руководству. Остается неясным, сможет ли Винниченко заручиться поддержкой для продвижения своей \"коллективократической\" программы, или же он капитулирует перед более радикальными элементами своей партии. В итоге результаты первых выборов в Трудовой Конгресс таковы..."
 ukraine_republican_events.6.a: "Никифор и Ковалевский формируют всеэсеровский альянс!"
 ukraine_republican_events.6.b: "Никифор и Христюк формируют радикальный альянс в УПСР!"
 ukraine_republican_events.6.c: "Винниченко контроллирует центр!"
 ukraine_republican_events.6.e: "Винниченко заключает союз с радикалами Писоцкого!"

 ukraine_republican_events.7.t: "Всеобщие выборы 1937 года"
 ukraine_republican_events.7.d: "По мере того, как постепенно стихают волнения, вызванные антигетманским восстанием, на Украине начинает утверждаться новый, демократический образ жизни. Некогда реакционное, авторитарное государство, Украина сегодня с гордостью представляет собой образец демократии и республиканства. Поэтому не стоит преуменьшать, что всеобщие выборы 1937 года будут очень важными.\n\nСимон Петлюра объявил о выборах на рассвете [?global.date.GetDateStringNoHourLong], а к вечеру о своем намерении участвовать в них заявили уже десятки партий. Хотя многие кандидаты выдвинули свои имена, шансы на пост председателя есть только у трех. Это Александр Шульгин от УРДП, Исаак Мазепа от УСДРП и Владимир Винниченко от Революционного блока.\n\n На первый взгляд, лидеры бывшего Социалистического блока могут выступать с похожей риторикой, но у каждого из них есть свои цели и задачи. У каждой партии есть свой план развития страны, а у каждого кандидата - свое видение будущего. Однако парламентская система Украины может заставить их пойти на компромисс в отношении этих идеалов.\n\n Для победы на выборах им придется найти единомышленников в Национальном Собрании, а это легче сказать, чем сделать. Они не могут рассчитывать на большинство в одиночку, и им нужны надежные союзники, если они хотят реформировать Украину по своему вкусу. Поэтому коалиция, безусловно, будет создана, но кто в нее войдет, зависит от того, как пройдут выборы"
 ukraine_republican_events.7.a: "Кого бы ни выбрал народ, он навсегда изменит ход истории"
 ukraine_republican_events.7.b: "Долой остатки гетманской политики – УСДРП поведет нас к новой Украине!"
 ukraine_republican_events.7.c: "Больше никаких пустых обещаний! Люди требуют действий – и РДС выполнит их!"
 ukraine_republican_events.7.a.tt: "Вы будете играть за §OУРДП§! на всеобщих выборах 1937, и будете получать соответствующие события.\n\nНесмотря на то, что мы будем стремиться к плюрализму, мы, вероятно, будем вынуждены объединиться с §SУСДРП§! в случае нашей победы. Возможно, во время выборов нам следует убедиться, что они не будут полностью отстранены, чтобы позже у нас могли сложиться дружественные отношения с ними."
 ukraine_republican_events.7.b.tt: "Вы будете играть за §SУСДРП§! на всеобщих выборах 1937, и будете получать соответствующие события.\n\nНесмотря на то, что мы будем стремиться к плюрализму, мы, вероятно, будем вынуждены объединиться с §OУРДП§! в случае нашей победы. Возможно, во время выборов нам следует позаботиться о том, чтобы они не были полностью отстранены, чтобы позже у нас могли сложиться дружественные отношения с ними."
 ukraine_republican_events.7.c.tt: "Вы будете играть за §RРДС§! на всеобщих выборах 1937, и будете получать соответствующие события.\n\nНам придется справиться с фракционностью двух партий, которые составляют наш избирательный альянс, §RC-РБ§! и "§RУПСР§!. Возможно, во время предвыборного сезона нам следует попытаться сбалансировать их интересы, чтобы позже мы могли продолжить здоровые отношения между ними."

 ukraine_republican_events.10.t: "Выборы закончились"
 ukraine_republican_events.10.d: "После нескольких месяцев агитации, политиканства и предвыборной борьбы выборы медленно подходят к концу. В день [?global.date.GetDateStringNoHourLong] миллионы людей отдали свои голоса, чтобы определить, кто возглавит страну. Подсчет голосов велся до поздней ночи, и к рассвету были объявлены результаты.\n\n[UKR_republic_election_result_dynamic]"
 ukraine_republican_dynamic_radical_win: "УРДП стала обладателем плюрализма. После установления контактов с УСДРП они быстро создали коалицию и тем самым обеспечили себе большинство. Революционный блок и правые партии составили оппозицию, которой едва хватило голосов, чтобы остаться в Национальном собрании.\nПоскольку УРДП еще не выдвинула своего председателя, он будет избран Национальным собранием. Голосование состоится в ближайшие дни."
 ukraine_republican_dynamic_socdem_win: "По итогам голосования, в качестве плюралиста, выступила УСДРП. После установления контактов с УРДП они быстро создали коалицию и тем самым обеспечили себе большинство. В оппозиции оказался Революционный блок, а также правые партии, которым едва хватило голосов, чтобы остаться в Национальных Зборах.\nИсаак Мазепа, лидер УСДРП, будет введен в должность председателя в ближайшие дни. Новое правительство пообещало исправить ситуацию в экономике страны и начать новую прогрессивную эру"
 ukraine_republican_dynamic_socialist_win: "Рабочий Демократический Союз стал обладателем плюрализма. Считаясь "темной лошадкой" в борьбе за власть, социалисты-революционеры, тем не менее, получили неожиданное количество мест в Национальном собрании. После установления контактов с ССРП Революционный блок сформировал первое левое правительство в стране с 1918 года. УРДП вместе с правыми партиями стала оппозицией, которой едва хватило голосов, чтобы остаться в Сойме.\n\nЭтот результат представляет собой более радикальный сдвиг в украинской политической сфере, и пока неясно, сможет ли Владимир Винниченко выполнить свои предвыборные обещания."
 ukraine_republican_dynamic_radical_socdem_tie: "В результате выборов между УРДП и УСДРП сложилась ничья. Ни радикал-демократы, ни социал-демократы не получили достаточного количества мест для формирования правительства. В итоге им ничего не оставалось, как создать коалицию. Еще предстоит выяснить, какая партия возьмет на себя ведущую роль.\nРеволюционный блок, занявший третье место, возглавит оппозицию вместе с теми партиями, которые остались от более правых."
 ukraine_republican_dynamic_radical_socialist_tie: "В результате выборов между УРДП и УПСР образовалась ничья. Радикалы быстро поняли, что единственный способ преодолеть это препятствие - заручиться поддержкой УСДРП. Если они создадут коалицию, то смогут легко получить большинство в Собрании.\n Однако Революционный блок также борется за поддержку Рабочей партии, поэтому радикалам придется действовать быстро, чтобы не проиграть выборы."
 ukraine_republican_dynamic_socdem_socialist_tie: "В результате выборов между УСДРП и Революционным блоком образовалась ничья. Хотя левая коалиция может быть легко создана, некоторые члены УСДРП сомневаются в целесообразности сотрудничества с Революционным блоком. Они отмечают более экстремистские наклонности Винниченко и предлагают ему объединиться с радикалами."
 ukraine_republican_dynamic_tie: "Выборы завершились полным ничейным результатом. Ни одна из партий не получила достаточно мест для формирования правительства. Единственное, что они могли сделать сейчас, это договориться со своими оппонентами и попытаться создать коалицию.\nУ УРДП и УСДРП еще есть шанс, если они решат создать коалицию, чтобы сдержать Революционный блок. Однако и блок не теряет надежды, поскольку он может заручиться поддержкой более радикально настроенных членов Рабочей партии."
 ukraine_republican_events.10.a: "Такой исход никогда не вызывал сомнений"
 ukraine_republican_events.10.b: "Украина для рабочего человека!"
 ukraine_republican_events.10.c: "Славная победа революционеров"
 ukraine_republican_events.10.e: "УРДП занимает ведущую роль в коалиции!"
 ukraine_republican_events.10.f: "Изаак Мазепа от УСДРП стал председателем!"
 ukraine_republican_events.10.g: "Выработана коалиция между УРДП и УСДРП, во главе которой стоят радикалы"
 ukraine_republican_events.10.e.tt: "An election tie gives us weaker results."

 ukraine_republican_events.10.tt: "Выборы 1937 года - это только начало, и мы должны заложить основу для будущих выборов. Ознакомьтесь с первым фокусом вашего послевоенного древа, §YМечта стала явью§!, чтобы спланировать, как победить на следующих выборах."

 ukraine_republican_events.11.t: "Выборы председателя"
 ukraine_republican_events.11.d: "Перед выборами Александр Шульгин казался беспроигрышным вариантом на пост председателя в случае победы УРДП. Дипломатичный, но принципиальный Шульгин провел УРСДП через трудные времена и имеет широкую поддержку даже за пределами своей партии. Однако на рассмотрение Национального Собрания была вынесена еще одна кандидатура: Василий Вышиваный, собственный габсбургский принц Украины. Он вызывает больше разногласий: его сторонники, многие из которых уже воевали под командованием Василия во время Великой войны, считают Василия настоящим патриотом, который является украинцем не только потому, что родился, а по собственному выбору и убеждению. Его противники утверждают, что избрание Габсбурга вместо коренного украинца равносильно преклонению перед Веной, и сомневаются в честности побуждений Василия. После подсчета всех голосов победителем становится..."
 ukraine_republican_events.11.a: "Александр Шульгин"
 ukraine_republican_events.11.b: "Василий Вышиваный"

 ukraine_republican_events.13.t: "За закрытыми дверями"
 ukraine_republican_events.13.d: "Победа на выборах Рабочего Демократического Союза поставила новую украинскую республику в сложное положение. Воля народа была ясна - он выбрал революционную политику вместо умеренной, но Украина не может полностью следовать желаниям своего народа - по крайней мере, пока. Посол Германии внимательно следит за ходом украинских выборов и несомненно, пишет доклады в Берлин о возможном полном захвате страны социалистами. Мы не желаем войны и вражды с Германией - в идеальном мире мы могли бы жить в мире без подобного политического вмешательства, - но реалии геополитики заставили Винниченко и Феденко пожать друг другу руки и создать коалицию, несмотря на то, что Рабочая партия была явно более слабым членом соглашения. В ходе переговоров за закрытыми дверями было решено, что умеренные возьмут под контроль министерство иностранных дел и ряд других второстепенных постов, а Революционный блок займет остальные посты в кабинете министров"
 ukraine_republican_events.13.a: "Мы должны работать вместе, пока"
 ukraine_republican_events.13.tt: "Чтобы умиротворить Берлин, мы должны принять правительство, которое им больше по душе. §Будьте уверены, такое положение вещей долго не продержится!"

 ukraine_republican_events.14.t: "Падение правых"
 ukraine_republican_events.14.d: "После распада Гетманата украинские правые оказались в штопоре. Многие партии, организации и движения, некогда занимавшие значительное место в украинской политике, понесли серьезные потери, среди них и УХДП.\n\nПосле республиканского мятежа партия фактически раскололась на два лагеря: \"Прагматиков\" во главе с Сергеем Шеметом и \"Истинно верующих\" во главе с Николаем Кочубеем. Прагматики Шемета быстро покинули УШД и перешли на сторону УДХП, хотя их прежние связи с гетманским правительством фактически сделали их политическими изгоями. Ожидаемо, что на прошлогодних выборах они показали низкие результаты и практически не имеют влияния на политическую сцену страны.\n\n Тем временем те, кто еще верил в ценности УШД, присоединились к новой организации Кочубея: \"Братство классократов-монархистов\" Эта организация выступает за немедленную отставку правительства и восстановление сословного общества с гетманом во главе. Сейчас клика Кочубея решительно выступает против Республики и ее демократической системы, но не имеет достаточной власти для реализации своих целей.\n\n Впрочем, есть одна сила, которой удалось в какой-то мере удержаться на плаву после кризиса. Украинская демократическая аграрная партия, некогда партнер УДХП по коалиции, едва набрала достаточно голосов, чтобы остаться в Национальных Зборах Их поддержка значительно упала из-за их прошлого участия в гетманском правительстве, и большая часть избирателей покинула их в пользу радикал-демократов. Хотя руководство УДХП пытается очистить партию от неблаговидного прошлого, ее имидж запятнан и останется таковым в обозримом будущем. С теми немногими местами, которые у них есть, они теперь являются частью оппозиции против правительства"
 ukraine_republican_events.14.a: "По мере того, как гетманат постепенно исчезает, вместе с ним, надеюсь, исчезает и право"

 ukraine_republican_events.30.t: "Обещания народу"
 ukraine_republican_events.30.d: "Земельная реформа может быть вопросом жизнеобеспечения людей, но это не означает, что наши планы индустриализации не являются фактором на этих выборах - совсем наоборот. Интеллигенция и элита смотрят в индустриальное украинское будущее, в модернизированную украинскую экономику, которая сможет пережить бурю в будущем, потому что сможет экспортировать не только зерно. Грандиозные инженерные проекты, такие как Днепрогэс, принесут электричество в дома многих украинцев, и нет сомнений, что эти проекты популярны. Может быть, стоит воспользоваться этими проектами и пообещать их реализовать в рамках нашей предвыборной кампании?"
 ukraine_republican_events.30.d2: "Земельная реформа может быть вопросом жизнеобеспечения людей, но это не означает, что наши планы по индустриализации не имеют никакого значения на этих выборах - на самом деле, как раз наоборот. Интеллигенция и элита мечтают о промышленном будущем Украины, о модернизированной украинской экономике, которая сможет пережить бурю в будущем, потому что сможет экспортировать больше, чем просто зерно. Грандиозные инженерные проекты, такие как гидроэлектростанция Днепрогэс, обеспечат электричеством дома многих украинцев, и нет сомнений в том, что эти проекты пользуются популярностью. Возможно, нам следует воспользоваться преимуществами этих проектов и пообещать внедрить их в рамках нашей избирательной кампании?"
 ukraine_republican_events.30.d3: "Земельная реформа может быть вопросом жизнеобеспечения людей, но это не означает, что наши планы по индустриализации не имеют никакого значения на этих выборах - на самом деле, как раз наоборот. Интеллигенция и элита мечтают о промышленном будущем Украины, о модернизированной украинской экономике, которая сможет пережить бурю в будущем, потому что сможет экспортировать больше, чем просто зерно. Грандиозные инженерные проекты, такие как гидроэлектростанция Днепрогэс, обеспечат электричеством дома многих украинцев, и нет сомнений в том, что эти проекты пользуются популярностью. Возможно, нам следует воспользоваться преимуществами этих проектов и пообещать внедрить их в рамках нашей избирательной кампании?\n\nОднако важно помнить, что некоторые представители УПСР склонны думать, что обещания грандиозных промышленных проектов не обязательно найдут отклик у сельского населения нашей страны."
 ukraine_republican_events.30.a: "К индустриальному будущему мы идем!"
 ukraine_republican_events.30.b: "Мы не должны обещать того, чего не можем выполнить"
 ukraine_republican_events.30.b_tt: "Через §Y300 дней§! после выборов мы должны будем достичь показателя §CБаллов индустриализации§! выше §Y30§! Если мы не выполним свое обещание, мы будем §Рплатить цену§!"
 ukraine_republican_events.30.b2: "Там, где потерпел поражение гетманат, мы одержим победу!"
 ukraine_republican_events.30.c2: "К промышленному будущему, но с учетом интересов сельской местности."

 ukraine_republican_events.31.t: "Вопрос о земельной реформе"
 ukraine_republican_events.31.d: "Земля для всех! Именно это обещание объединило крестьянство для поддержки ВДР против гетмана. Если все партии, безусловно, относятся к нему серьезно, то для социалистов другие партии все еще кажутся слишком мягкими по отношению к крупным землевладельцам, говоря о компенсациях и легализме. Пока большинство крестьян поддерживают ВДР, но, взяв земельный вопрос в свои руки, Мазепа и его партия смогут постоянно добиваться новых уступок крестьянам и в конечном счете, привлечь на сторону ВДР часть сельской местности."
 ukraine_republican_events.31.d2: "Земля для всех! Именно это обещание объединило крестьянство для поддержки ВДД против гетмана. Если все партии, безусловно, относятся к нему серьезно, то для социалистов другие партии все еще кажутся слишком мягкими по отношению к крупным землевладельцам, говоря о компенсациях и легализме. На данный момент большинство фермеров поддерживают УПС-Р, но, рассматривая земельный вопрос как свой собственный, наша партия могла бы постоянно добиваться новых уступок крестьянам и в конечном итоге отвоевать у Социалистов-Революционеров часть сельской местности."
 ukraine_republican_events.31.d3: "Земля для всех! Именно это обещание объединило крестьянство для поддержки ВДД против гетмана. Если все партии, безусловно, относятся к нему серьезно, то для нас, социалистов, другие партии все еще кажутся слишком мягкими по отношению к крупным землевладельцам, говоря о компенсациях и легализме. На данный момент большинство фермеров поддерживают УПС-Р, но, принимая земельный вопрос как свой собственный, Мазепа и его партия могли бы постоянно добиваться новых уступок крестьянам и в конечном итоге привлечь часть сельской местности к УСДРП. Такой исход никоим образом не гарантирован, но все же может оказаться полезным частично направить нашу кампанию против социал-демократов."
 ukraine_republican_events.31.a: "У Мазепы есть решение!"
 ukraine_republican_events.31.b: "УПСР знает, что делает!"
 ukraine_republican_events.31.a2: "Давайте не будем переусердствовать в наших усилиях."
 ukraine_republican_events.31.b2: "Тяжелое положение фермеров - это наше тяжелое положение!"
 ukraine_republican_events.31.a3: "Давайте сосредоточимся на позитивной повестке дня."
 ukraine_republican_events.31.b3: "Слабые социал-демократы ни к чему не приведут нашу страну!"

 ukraine_republican_events.32.t: "Искусство ведения избирательной кампании"
 ukraine_republican_events.32.d: "Любая заминка и компромисс воспринимаются социалистами как доказательство слабости республиканского правительства. Чтобы успокоить избирателей, мы могли бы развернуть широкую кампанию в СМИ, вбивая в них наши обещания и демонстрируя нашу политику на практике, чтобы показать, что мы не только решаем земельный вопрос, но и делаем это эффективнее, чем кто-либо другой."
 ukraine_republican_events.32.d2: "Первоначально "Селянская спилка" была организацией, призванной обеспечить надлежащее представительство крестьянства в вопросах образования, культуры и правосудия. Его можно было бы охарактеризовать как форму крестьянского союза, сходную по принципу с синдикалистской, но без урбанизма и почитания революционного насилия. Эту модель можно было бы восстановить как способ организации крестьянства и, возможно, распространения коллективистских принципов UPS-R среди крестьян, помогая им в решении их проблем.\n\nОчевидно, что благодаря "Спилке" и репутации УПС-Р как крестьянской партии, мы сможем получить довольно высокие результаты опросов в сельских округах."
 ukraine_republican_events.32.a: "Мы обещаем быстрые и решительные действия"
 ukraine_republican_events.32.b: "Давайте не будем забегать вперед"
 ukraine_republican_events.32.a2: "Хорошая инициатива! Очень хорошо! Даже великолепно!"
 ukraine_republican_events.32.b2: "Это хорошо и все такое, но у нас уже есть этот электорат в запасе."

 UKR_landreform_election_promises_tt: "§CБаллы земельной реформы§! выше §Y30§!"
 UKR_industry_election_promises_tt: "§CБаллы индустриализации§! находится выше §Y30§!"
 ukraine_republican_events.32.a_tt: "Через §Y300 дней§! после выборов мы должны будем достичь показателя §CБаллы земельной реформы§! выше §Y30§! Если мы не выполним свое обещание, мы §Рзаплатим цену§! за это."

 ukraine_republican_events.33.t: "Невыполненные обещания"
 ukraine_republican_events.33.d: "Чтобы заручиться поддержкой населения, нужно давать грандиозные обещания решить все насущные проблемы, стоящие перед страной. Обещания, которые наше правительство, похоже, до сих пор не выполнило. По мере того как растет нетерпение и беспокойство по поводу нашего бездействия, общественная поддержка нашего руководства начинает падать. Протесты становятся все более распространенными, многие избиратели отказываются от нас в пользу оппозиции. И хотя наша администрация продолжает работать, эти события, безусловно, помешают нашим планам"
 ukraine_republican_events.33.a: "Помните все те обещания, которые вы давали? Ваш народ точно помнит"
 ukraine_republican_events.33_tt: "Наша неспособность выполнить даже эти простые обещания не сулит ничего хорошего ни нашей администрации, ни стабильности в стране. Мы должны немедленно переломить ситуацию, чтобы она не вышла из-под контроля"

 ukraine_republican_events.34.t: "Прагматизм vs радикализм"
 ukraine_republican_events.34.d: "Для многих революционеров, участвовавших в антигетманском восстании, встал вопрос: кто мы? Для одних ответ можно было найти в Революционном блоке - те, кто боролся против тиранического гетманского правительства, боролись за социализм, радикальный передел земли и бескомпромиссные действия. Для других ответ можно найти в УРДП и УСДРП - тех, кто стремился к свержению гетманского правительства, поскольку оно отказывалось идти на компромиссы и было омрачено неэффективностью.\n\n Этот вопрос стал главным на выборах. В большинстве своем УРДП и УСДРП представляют себя образцами ответственного государственного мышления, обвиняя Революционный блок в дешевом популизме, который в случае избрания приведет к неизбежному хаосу и неэффективности правительства. В свою очередь, Революционный блок обвиняет реформистские партии в предательстве прогрессивных идеалов, за которые всегда боролась народная республика, и в том, что правительство, построенное на компромиссах, приведет к тем же неспособностям, что и гетманское правительство. Кому же верить украинскому народу?"
 ukraine_republican_events.34.d2: "Для многих революционеров, принимавших участие в Антигетманском восстании, возник вопрос: кто мы такие? Для некоторых ответ можно было найти в РДС - те, кто боролся против тиранического гетманского правительства, боролись за социализм, радикальное перераспределение земли и бескомпромиссные действия. Для других ответ можно было найти в УРДП и УСДРП - тех, кто стремился свергнуть гетманское правительство, потому что Гетман отказывался идти на компромисс и был запятнан неэффективностью.\n\nЭтот вопрос стал главной темой выборов. Поскольку мы застряли где-то посередине между умеренной УРДП и радикальным РДС, этот вопрос вызвал серьезные разногласия. Антигетманское восстание на самом деле было борьбой за мир, землю и демократию, но некоторые утверждают, что оно идет гораздо дальше. Под нашим руководством мы не просто выполним тот минимум, на который способен любой мало-мальски компетентный государственный деятель, но вместо этого осуществим настоящую социальную революцию. Возможно, нам следует подчеркнуть эти идеалы; в конце концов, именно они привели нас к победе."
 ukraine_republican_events.34.d3: "Для многих революционеров, принимавших участие в Антигетманском восстании, возник вопрос: кто мы такие? Для некоторых ответ можно было найти в РДС - те, кто боролся против тиранического гетманского правительства, боролись за социализм, радикальное перераспределение земли и бескомпромиссные действия. Для других ответ можно было найти в УРДП и УСДРП - тех, кто стремился свергнуть гетманское правительство, потому что Гетман отказывался идти на компромисс и был запятнан неэффективностью.\n\nЭтот вопрос стал главной темой выборов. Естественно, ответ очевиден: РДС - это правильный выбор украинского избирателя. Многие проголосуют только по одному давно нерешенному вопросу, а именно по земельной реформе, и нет никаких сомнений в том, что УПС-Р имеет значительное влияние на украинскую сельскую местность. Кампания, основанная исключительно на земельной реформе, безусловно, сработала бы хорошо, но некоторые опасаются, что этого может оказаться недостаточно, чтобы выделить РДС. Деятели С-РБ, в частности, выступают за то, чтобы мы также представляли себя передовыми борцами за независимость и суверенитет Украины против всех видов империализма, будь то немецкий или российский. Другие партии, возможно, и принимали участие в Антигетманском восстании, но нет никаких сомнений в том, что они продадутся австро-германскому империализму, и этот факт, возможно, нам следует использовать в своих интересах."
 ukraine_republican_events.34.a: "Народ голосует против радикализма"
 ukraine_republican_events.34.b: "Революционные настроения охватили весь народ"
 ukraine_republican_events.34.a2: "Люди хотят социализма, и они могут найти его в УСДРП."
 ukraine_republican_events.34.b2: "Грядет великая трансформация украинского общества!"
 ukraine_republican_events.34.a3: "Мир, земля и хлеб - лучше и быть не может."
 ukraine_republican_events.34.b3: "Народ хочет свободы от иностранной тирании, и РДС обеспечит ее!"
 ukraine_republican_events.34.b2.tt: "Посмотрите ваше политическое древо фокусов, чтобы понять эффекты от §1Идеализма§!."

 ukraine_republican_events.35.t: "Невыполненные обещания"
 ukraine_republican_events.35.d: "Прекрасные обещания новых рабочих мест и более низких цен. Где же великий комплекс плотины Днепрогэса, который обещали сделать вершиной украинского машиностроения, который создаст тысячи рабочих мест и еще больше электроэнергии для домов вокруг него? Люди помнят ваши обещания, даже если вы их не помните"
 ukraine_republican_events.35.a: "Мы сделали все, что могли!"

 ukraine_republican_events.36.t: "УРДП под пристальным вниманием"
 ukraine_republican_events.36.d: "Своим существованием Народная Республика во многом обязана Радикально-демократической партии. Один из ее лидеров, Александр Шульгин, во время антигетманского восстания приложил немало усилий, чтобы Берлин не вмешался в подавление революции, и практически с самого начала вел переговоры с германским правительством. В партии также работает известный Василий Вышиваный, который, несмотря на свое австрийское происхождение, стал восприниматься как человек из народа. На предстоящих выборах Радикально-демократическая партия может рассматриваться как наиболее правая по сравнению с социал-демократами и Революционным блоком, что снискало ей большую популярность среди представителей предыдущей администрации.\n\n Однако в последнее время ее связи с Гетманатом подвергаются обстрелу со стороны оппонентов. Известно, что Шульгин работал в гетманском правительстве министром иностранных дел, а УРДП, хотя и представляла оппозицию правящей гетманской коалиции, все же занимала различные посты. Можно было бы счесть это попыткой работать в рамках системы для ее улучшения, что, безусловно, и делала УРДП - тем не менее, социалистические партии использовали историю партии, чтобы представить ее беспринципной или, что еще хуже, предательницей революции. Каким будет их ответ?"
 ukraine_republican_events.36.d2: "Своим существованием Народная Республика во многом обязана Радикально-демократической партии. Один из ее лидеров, Александр Шульгин, во время антигетманского восстания приложил немало усилий, чтобы Берлин не вмешался в подавление революции, и практически с самого начала вел переговоры с германским правительством. В партии также работает известный Василий Вышиваный, который, несмотря на свое австрийское происхождение, стал восприниматься как человек из народа. На предстоящих выборах Радикально-демократическая партия может рассматриваться как наиболее правая по сравнению с социал-демократами и Рабочим Демократическим Союзом, что снискало им большую благосклонность среди членов предыдущей администрации.\n\nОднако в последнее время ее связи с Гетманатом подвергаются критике со стороны оппонентов. Известно, что Шульгин работал в гетманском правительстве министром иностранных дел, а УРДП, хотя и представляла оппозицию правящей гетманской коалиции, все же занимала различные посты. Можно было бы выдать это за попытку работать в рамках системы, чтобы улучшить ее, что, несомненно, и пыталась делать УРДП. Тем не менее, есть возможность использовать историю партии в качестве оружия, чтобы представить их либо беспринципными, либо, что еще хуже, предателями революции. Что нам следует делать?"
 ukraine_republican_events.36.a: "Мы выступаем за демократию, как и все остальные!"
 ukraine_republican_events.36.b: "Наше прошлое не имеет значения!"
 ukraine_republican_events.36.a2: "Воспользуйтесь этой риторикой в своих интересах."
 ukraine_republican_events.36.b2: "Беспринципные, возможно, но предатели революции? Конечно нет."
 ukraine_republican_events.36.a3: "Конечно, они гетманские марионетки!"
 ukraine_republican_events.36.b3: "Правда но, честно говоря, сейчас это не имеет большого значения."

 ukraine_republican_events.37.t: "Взаимодействие с профсоюзами"
 ukraine_republican_events.37.d: "Поддержка профсоюзов будет неоценима на предстоящих выборах. Профсоюзы традиционно придерживались ортодоксальных синдикалистских взглядов и были солидарны с боротбистами и укапистами, но сейчас времена другие. Жестокие действия гетмана, репрессии против социалистов всех мастей привели к тому, что многие радикально перешли на крайне левые, революционные позиции. Теперь, когда народная республика восстановлена, и эти революционеры перестали быть объектом преследования, социал-демократы попытались закрепиться в профсоюзах. Независимых профсоюзов после революции появилось очень много, и есть значительный потенциал для того, чтобы склонить их на свою сторону. Однако народная республика еще молода, и ей еще предстоит доказать, что она способна обеспечить эффективное управление, что заставляет некоторых опасаться заявлять о своей приверженности новой политической партии."
 ukraine_republican_events.37.d2: "Поддержка профсоюзов будет неоценима на предстоящих выборах. Профсоюзы традиционно придерживались ортодоксальных синдикалистских взглядов и были солидарны с боротбистами и укапистами, но сейчас времена другие. Жестокие действия Гетмана, репрессии против социалистов всех мастей привели к тому, что многие радикально перешли на крайне левые, революционные позиции. Теперь, когда народная республика восстановлена, и эти революционеры перестали быть объектом преследования, социал-демократы попытались закрепиться в профсоюзах. Независимых профсоюзов после революции появилось очень много, и есть значительный потенциал для того, чтобы склонить их на свою сторону. Однако народная республика еще молода, и ей еще предстоит доказать, что она способна обеспечить эффективное управление, что заставляет некоторых опасаться заявлять о своей приверженности новой политической партии.\n\nЕстественно, РДС - это союз трудящихся, и наши позиции здесь достаточно сильны. Тем не менее, господство боротьбистов и укапистов над профсоюзами ставит перед нами трудный вопрос. Возможно, было бы лучше договориться с боротьбистами; в обмен на то, что мы не будем пытаться конкурировать с ними там, где они добились успехов на местных выборах, они окажут нам свою поддержку на парламентских выборах. Такое соглашение было бы довольно проблематичным для УПСР, учитывая, что они, как правило, оспаривают голоса боротьбистов на местных выборах. Но для Республиканской партии было бы не менее проблематично не прийти к соглашению, поскольку это уменьшит количество голосов, которые они получат от городских рабочих."
 ukraine_republican_events.37.a: "Все-таки УСДРП - это социалистическая партия"
 ukraine_republican_events.37.b: "Профсоюзы не отказываются от своих революционных взглядов"
 ukraine_republican_events.37.a2: "Тогда пришло время для обмена любезностями!"
 ukraine_republican_events.37.b2: "Это не наша вина, что мы верим в общенациональные выборы, а они - нет."

 ukraine_republican_events.39.t: "Министры УПСР и С-РБ покидают правительство"
 ukraine_republican_events.39.d: "Левая коалиция в составе нашего правительства возникла в результате прагматичного союза Революционного блока и УСДРП. Для того чтобы представить свое правительство в более умеренном свете, председатель Винниченко решил уступить ряд позиций членам Рабочей партии. Блок надеялся, что этот альянс будет лишь временной мерой, еще одним препятствием на пути к социализму. Однако, похоже, их надежды не оправдались.\n\nНе сумев обеспечить свой контроль над правительством, планы Революционного блока, похоже, провалились."
 ukraine_republican_events.39.a: "Остановлена ли революция?"
 UKR_revbloc_collapse: "Крах §RЛевой Коалиции§"

 ukraine_republican_events.40.t: "На страницах газет и на переполненных улицах"
 ukraine_republican_events.40.d: "Великие потрясения 1936 и 1937 годов оживили дремлющие круги украинской интеллигенции. Те, кто причисляет себя к "интеллегенции", начинают чувствовать, что будущее вновь полно возможностей и обещаний. Как всегда, представления о светлом завтрашнем дне имеют тенденцию к разнообразию, поэтому жаркие споры, пространные брошюры и язвительные статьи вновь сопровождают напряженную интеллектуальную дискуссию о перспективах восстановленной Украинской республики.\n\nВсе основные конкуренты на выборах пользуются значительным авторитетом среди украинской интеллигенции и рассматривают ее как ценный электоральный электорат. Поэтому важно разработать и тщательно продвигать правильное предвыборное послание, которое сможет привлечь симпатии, не оттолкнув безнадежно всех остальных. Эти люди нелегко забывают обиды, поэтому чрезмерная злоба в нападках на наших оппонентов может иметь неприятные последствия позже.\n\nГоды неустанной работы в культурной и образовательной сферах уже снискали нам большую благосклонность интеллектуальных кругов, поэтому, возможно, правильнее было бы сделать наше послание более примирительным."
 ukraine_republican_events.40.d2: "Великие потрясения 1936 и 1937 годов оживили дремлющие круги украинской интеллигенции. Те, кто причисляет себя к "интеллегенции", начинают чувствовать, что будущее вновь полно возможностей и обещаний. Как всегда, представления о светлом завтрашнем дне имеют тенденцию к разнообразию, поэтому жаркие споры, пространные брошюры и язвительные статьи вновь сопровождают напряженную интеллектуальную дискуссию о перспективах восстановленной Украинской республики.\n\nВсе основные конкуренты на выборах пользуются значительным авторитетом среди украинской интеллигенции и рассматривают ее как ценный электоральный электорат. Поэтому важно разработать и тщательно продвигать правильное предвыборное послание, которое сможет привлечь симпатии, не оттолкнув безнадежно всех остальных. Эти люди нелегко забывают обиды, поэтому чрезмерная злоба в нападках на наших оппонентов может иметь неприятные последствия позже.\n\nНаша позиция и так уже достаточно ясна: многие представители интеллигенции считают, что УРДП слишком привязана к наследию Гетманщины, и в то же время опасаются радикализма РДС. Возможно, правильнее было бы сделать наше послание более примирительным."
 ukraine_republican_events.40.d3: "Великие потрясения 1936 и 1937 годов оживили дремлющие круги украинской интеллигенции. Те, кто причисляет себя к "интеллегенции", начинают чувствовать, что будущее вновь полно возможностей и обещаний. Как всегда, представления о светлом завтрашнем дне имеют тенденцию к разнообразию, поэтому жаркие споры, пространные брошюры и язвительные статьи вновь сопровождают напряженную интеллектуальную дискуссию о перспективах восстановленной Украинской республики.\n\nВсе основные конкуренты на выборах пользуются значительным авторитетом среди украинской интеллигенции и рассматривают ее как ценный электоральный электорат. Поэтому важно разработать и тщательно продвигать правильное предвыборное послание, которое сможет привлечь симпатии, не оттолкнув безнадежно всех остальных.\n\nЕще один момент, который следует учитывать, - это то, как далеко мы должны зайти: чрезмерные попытки угодить интеллектуальным кругам могут не понравиться нашим избирателям из числа рабочих и крестьян. Возможно, более ограниченной кампании будет достаточно. В конце концов, многие из наших выдающихся членов, такие как Владимир Винниченко, который известен в творческих кругах не только как политик, но и как плодовитый писатель и драматург, уже собрали немало подписчиков."
 ukraine_republican_events.40.a: "Нет необходимости в чрезмерной сдержанности."
 ukraine_republican_events.40.b: "Важно, чтобы дискуссия велась вежливо."
 ukraine_republican_events.40.b2: "Мы все разделяем схожие идеалы."
 ukraine_republican_events.40.a3: "Нам нужно отвлечь их от УРДП и УСДРП."
 ukraine_republican_events.40.b3: "Какими бы важными они ни были, будущее принадлежит трудящимся."

 ukraine_republican_events.41.t: "Образование УНП"
 ukraine_republican_events.41.d: "После восстановления Украинской Народной Республики украинские правые оказались в сложной ситуации. Попытки создать полноценную правую силу, способную адаптироваться к новому политическому консенсусу, в основном провалились. Большинство идеологически настроенных прогетманских сил были почти полностью вытеснены, в то время как более беспартийным и независимым государственным деятелям, работавшим при гетманском режиме, трудно вернуться в политику. Возможно, наилучший шанс для правых имеет тот, кто не подходит ни под одно из этих описаний: Николай Михновский. Покинув СДХП, Михновский решил основать свою собственную партию - УНП (Украинская народная партия).Поскольку СДХП сейчас переживает трудные времена, для УНП открыты все возможности стать крупнейшей партией украинских правых, и она, безусловно, будет более популистской, чем любая из старых гетманских партий.\n\nДля УРДП медленный подъем УНП приводит к возникновению важного вопроса. Большая часть риторики УНП была направлена против социалистических партий, в частности РДС, и, хотя партия довольно небольшая, влияния Михновского может оказаться достаточно, чтобы навредить нашим оппонентам. О терпимости к росту УНП, по крайней мере в краткосрочной перспективе, не может быть и речи. Однако правое крыло нашей партии выступило против этого, поскольку они видят в этом прямой вызов своей власти и влиянию, особенно в том, что касается подающих надежды мелких и средних землевладельцев. Они утверждают, что УРДП, безусловно, могла бы сделать больше для привлечения умеренных политических сил, и нам было бы легче противостоять потенциальному возрождению консерваторов в будущем."
 ukraine_republican_events.41.a: "На данный момент враг моего врага - мой друг."
 ukraine_republican_events.41.b: "Приложите больше усилий для привлечения умеренных членов."

 ukraine_republican_events.42.t: "Долг солдата"
 ukraine_republican_events.42.d: "Среди различных групп избирателей, за которыми борятся конкурирующие партии, особенно выделяется одна: те военнослужащие, которые добровольно подняли оружие против преступного режима. Их деяния и жертвы помогли свергнуть тиранию Гетмана, их истории станут частью основополагающего мифа новой Республики, а их политическая лояльность может повлиять на курс страны в будущем. Они составляют социальную группу, важность которой, несмотря на относительно малочисленность, признают все основные конкуренты на выборах.\n\nНекоторые из этих людей перешли на сторону повстанцев только после того, как УРДП объявила о своей полной оппозиции правительству Скоропадского. Кроме того, члены партии сыграли важную роль в установлении связей между изгнанниками и симпатизирующими им военными. С другой стороны, эффективность выборов в немалой степени зависит от узнаваемых личностей, и в этом отношении УРДП не хватает людей, способных достойно конкурировать с такими, как Симон Петлюра или Юрий Тютюнник. В связи с этим некоторые предлагают переключить наше внимание на другую сторону: на тех, кто остался в стороне или оказался на стороне гетмана. Многие из них деморализованы и сбиты с толку; чтобы заслужить их расположение, может быть, достаточно предложить им перспективу надежного правления и стабильного будущего. В конце концов, побежденные тоже заслуживают милосердия."
 ukraine_republican_events.42.d2: "Среди различных групп избирателей, за которыми борятся конкурирующие партии, особенно выделяется одна: те военнослужащие, которые добровольно подняли оружие против преступного режима. Их деяния и жертвы помогли свергнуть тиранию Гетмана, их истории станут частью основополагающего мифа новой Республики, а их политическая лояльность может повлиять на курс страны в будущем. Они составляют социальную группу, важность которой, несмотря на относительно малочисленность, признают все основные конкуренты на выборах.\n\nК счастью, Симон Петлюра, давний член партии, известен многим как человек, сыгравший решающую роль в нашей победе над гетманом. Использование его популярности среди солдат может не только принести нам голоса избирателей, но и заложить основы для нового класса военнослужащих: тех, кто непоколебимо предан самой идее Народной Республики. Тем не менее, даже среди членов партии некоторые советуют соблюдать осторожность. Чрезмерная привязка имиджа партии к единственному военному лицу может оказаться неразумной в будущем."
 ukraine_republican_events.42.d3: "Среди различных групп избирателей, за которыми борятся конкурирующие партии, особенно выделяется одна: те военнослужащие, которые добровольно подняли оружие против преступного режима. Их деяния и жертвы помогли свергнуть тиранию Гетмана, их истории станут частью основополагающего мифа новой Республики, а их политическая лояльность может повлиять на курс страны в будущем. Они составляют социальную группу, важность которой, несмотря на относительно малочисленность, признают все основные конкуренты на выборах.\n\nОбъединить ветеранов восстания под нашими знаменами - задача не из легких. Некоторые предлагают заключить союз с Юрием Тютюнником. ‘Юрко" по праву признан героем восстания, широко популярным среди солдат, сочувствующим делу истинной революции и, что немаловажно, полностью лишенным политических амбиций. Другие предостерегают от безумия "петлюровщины": почитание военных символов часто наносит ущерб делу революции. Солдаты, объединенные личной преданностью, а не идеологическим сознанием, обречены похоронить революцию, а не защищать ее."
 ukraine_republican_events.42.a: "Мы внесли свой вклад в победу не меньше, чем другие."
 ukraine_republican_events.42.b: "Великодушие - это добродетель победителей."
 ukraine_republican_events.42.a2: "Он герой и должен быть признан таковым."
 ukraine_republican_events.42.b2: "Наше дело выходит за рамки зависимости от популярности отдельных людей."
 ukraine_republican_events.42.a3: "В конце концов, революции нужны свои герои."
 ukraine_republican_events.42.b3: "Нет необходимости пропагандировать милитаристское идолопоклонство."

 ukraine_republican_events.45.t: "Коалиция, непохожая на коалицию Гетмана"
 ukraine_republican_events.45.d: "В отличие от шатких основ бывшей Народной Республики, новое коалиционное правительство находится в гораздо более безопасных условиях. В страну возвращается некоторое ощущение нормальности, а выборы прошли без насилия и запугиваний - будем надеяться, что это признак грядущих перемен.\n\nВозглавляемое, УРДП и УСДРП, это не то правительство, на которое надеялись некоторые. По их мнению, умеренно прогрессивная администрация, безусловно, намного лучше, чем гетманская, но, возможно, она не продвинется достаточно далеко в своих усилиях по надлежащему преобразованию Украины после почти двух десятилетий забвения. Таким образом, они надеются, что УСДРП в коалиции, по крайней мере, сможет должным образом склонить УРДП в более левом направлении.\n\nПринесут ли эти надежды какие-либо плоды, еще предстоит выяснить. Несомненно, обеспечение благополучия УСДРП будет сложной задачей, но она будет очень важной. Придется пойти на уступки, если мы хотим, чтобы первое настоящее народное правительство выжило и действительно выполнило свои обещания, а также создало хороший прецедент на будущее."
 ukraine_republican_events.45.d2: "В отличие от шатких основ бывшей Народной Республики, новое коалиционное правительство находится в гораздо более безопасных условиях. В страну возвращается некоторое ощущение нормальности, а выборы прошли без насилия и запугиваний - будем надеяться, что это признак грядущих перемен.\n\nВозглавляемое, УРДП и УСДРП, это не то правительство, на которое надеялись некоторые. Для них относительно неопытная, но прогрессивная администрация, безусловно, намного лучше гетманской, но, возможно, они не готовы столкнуться с многочисленными проблемами, сопровождающими процесс управления. Таким образом, они надеются, что УРДП в коалиции, по крайней мере, сможет должным образом направлять УСДРП и умерять ее возможные эксцессы.\n\nПринесут ли эти надежды какие-либо плоды, еще предстоит выяснить. Несомненно, сделать так, чтобы УРДП была счастлива, будет трудной задачей, но она будет очень важной. Придется пойти на уступки, если мы хотим, чтобы первое настоящее народное правительство выжило и действительно выполнило свои обещания, а также создало хороший прецедент на будущее.\n\nОднако, стремясь к компромиссу, мы не должны упускать из виду наши собственные идеалы. Нам, как партии, не хватает определенных преимуществ, которыми обладают радикальные демократы, таких как обилие опытных партийных кадров, связи на государственной службе или укоренившиеся местные политические сети. УРДП прекрасно осознает это и, несомненно, будет использовать свои сильные стороны, чтобы влиять на нашу политику. Необходимо соблюдать тщательный баланс между компромиссами и приверженностью нашим собственным принципам."
 ukraine_republican_events.45.a: "Если это делается ради благого дела, мы будем рады сотрудничать с ними."
 ukraine_republican_events.45.a.tt: "В зависимости от отношения к нам §SУСДРП§! мы будем получать различные пассивные §Cмодификаторы§!. Эти §Cмодификаторы§! могут изменяться через §Hфокусы§! и §Hсобытия§!.Поддержание хороших отношений с §SУСДРП§! будет иметь решающее значение для вашего правительства, и могут возникнуть §Rпоследствия§! если наши отношения будут разорваны.\n\Просматривая £GFX_decision_icon_small §YРешения§! чтобы узнать больше, и прочтите описание фокуса §HРадикальная перекройка§! чтобы получить разъяснения."
 ukraine_republican_events.45.a2.tt: "В зависимости от отношения к нам §SУРДП§! мы будем получать различные пассивные §Cмодификаторы§!. Эти §Cмодификаторы§!  могут изменяться через §Hфокусы§! и §Hсобытия§!. Поддержание хороших отношений с §SУСДРП§! будет иметь решающее значение для вашего правительства, и могут возникнуть §Rпоследствия§! если наши отношения будут разорваны.\n\nПросматривая £GFX_decision_icon_small §YРешения§! чтобы узнать больше, и прочтите описание фокуса §HВозвышение Рабочей партии§! чтобы получить разъяснения."

 ukraine_republican_events.48.t: "Три столпа партии"
 ukraine_republican_events.48.d: "После завершения переговоров о создании коалиции постепенно складывается новый политический ландшафт. УРДП, как старший партнер правящей коалиции, готова занять в ней ключевую позицию. Однако партия не является монолитной структурой, поэтому состав правительства после выборов отражает не только компромиссы, достигнутые с УСДРП, но и существующую внутрипартийную фракционность.\n\nАлександр Шульгин, представляющий не только партию в целом, но и ее центристскую фракцию в частности, был избран председателем Национальных зборов. Центр партии - это собрание, которое в меньшей степени связано идеологическими взглядами и в большей степени практическими соображениями. Она служит основой управления партией и в значительной степени отвечает за управление ее политической машиной. В конце концов, только хорошо организованная партия сможет отстаивать идеалы прогресса и демократии в эти трудные времена.\n\nАндрей Никовский, одна из ведущих фигур левого крыла партии, был утвержден на посту главы Совета народных министров. Левая фракция неуклонно растет в результате неспособности Гетманщины решать многочисленные социальные проблемы в сочетании с политическим вакуумом, оставшимся после подавления УСДРП и других левых сил. Левые партии выступают за жесткий государственный контроль над важнейшими секторами экономики, отстаивают социально прогрессивные цели и привносят здоровую дозу конструктивного радикализма в общее видение УРДП.\n\nНаконец, пост руководителя парламентской фракции УРДП был передан Владимиру Доленко, одному из руководителей правого крыла партии. Его основные интересы заключаются в поддержке "низового капитализма" малых, средних и кооперативных предприятий в сочетании с защитой интересов мелких и средних землевладельцев. Такое внимание к крестьянству является причиной того, что правая фракция УРДП возлагает большие надежды на успех земельной реформы и поддерживает связи с Православной церковью, влияние которой в сельской местности остается весьма значительным."
 ukraine_republican_events.48.d2: "После завершения переговоров о создании коалиции постепенно складывается новый политический ландшафт. УРДП, как старший партнер правящей коалиции, готова занять в ней ключевую позицию. Однако партия не является монолитной структурой, поэтому состав правительства после выборов отражает не только компромиссы, достигнутые с УСДРП, но и существующую внутрипартийную фракционность.\n\nВасиль Вышиваный избран председателем Национальные зборов. Хотя он символически представляет всю партию, его пребывание на этом посту будет в значительной степени зависеть от центристской фракции партии. Партийный центр - это собрание, в меньшей степени связанное идеологическими взглядами и в большей - практическими соображениями. Он служит основой партийного руководства и в значительной степени отвечает за управление политической машиной. В конце концов, только хорошо организованная партия сможет отстаивать идеалы прогресса и демократии в эти трудные времена.\n\nАндрей Никовский, одна из ведущих фигур левого крыла партии, был утвержден на посту главы Совета народных министров. Левая фракция неуклонно растет в результате неспособности Гетманщины решать многочисленные социальные проблемы в сочетании с политическим вакуумом, оставшимся после подавления УСДРП и других левых сил. Левые партии выступают за жесткий государственный контроль над важнейшими секторами экономики, отстаивают социально прогрессивные цели и привносят здоровую дозу конструктивного радикализма в общее видение УРДП.\n\nНаконец, пост руководителя парламентской фракции УРДП был передан Владимиру Доленко, одному из руководителей правого крыла партии. Его основные интересы заключаются в поддержке "низового капитализма" малых, средних и кооперативных предприятий в сочетании с защитой интересов мелких и средних землевладельцев. Такое внимание к крестьянству является причиной того, что правая фракция УРДП возлагает большие надежды на успех земельной реформы и поддерживает связи с Православной церковью, влияние которой в сельской местности остается весьма значительным."
 ukraine_republican_events.48.a: "Действительно, зонтичная партия."
 ukraine_republican_events.48.a.tt: "Управление трeмя фракциями §lУРДП§! может быть изменчивым. Имея §GВысокое§! влияние фракции, мы можем улучшить эффекты §Yфокусов§!, но они также могут ослабить влияние других фракций, если у них будет достаточно времени.\n\nТакже,если влияние одной из фракций будет §PНизким§! слишком долгое время, они могут вызвать §Rпереворот внутри партии§!, это сильно подорвет нашу способность управлять. Было бы лучше избегать такого сценария, пытаясь максимизировать выгоды и избегать фракционности.\n\nПросматривая £GFX_decision_icon_small §YРешения§! чтобы узнать больше, и прочтите описание фокуса §HРадикальная перекройка§! чтобы получить разъяснения."

 ukraine_republican_events.49.t: "Социалистический блок распускается"
 ukraine_republican_events.49.d: "Рано утром [?global.date.GetDateStringNoHourLong] руководство Социалистического блока собралось в отеле "Паласт" в [202.GetName], чтобы официально оформить роспуск своего союза. В совместном заявлении лидеры каждой из ассоциированных партий провозгласили, что \"движение было создано для объединения социалистических партий против гетманского режима. Поэтому с падением Гетманата Блок утратил свое предназначение и официально распущен.\n\n Председатель НСДРП Исаак Мазепа добавил: \"Основополагающими принципами Социалистического блока всегда были республиканизм, социализм и приверженность демократии. Прекращение деятельности этого союза не означает, что мы отступили от своих идеалов.\" В заключение Владимир Винниченко и Никифир Григорьев заявили, что коалиция между их партиями будет продолжена, скорее всего, ради предстоящих выборов, в которых они, несомненно, планируют принять участие."
 ukraine_republican_events.49.a: "Нет национального освобождения без социального освобождения"

 ukraine_republican_events.50.t: "Судьба генерала Присовского"
 ukraine_republican_events.50.d: "В процессе реорганизации вооруженных сил нам предстоит решить один конкретный вопрос: судьбу генерала Присовского. Присовский - известный гетманский приверженец, член ШД, достаточно печально известный своими действиями по разгрому крестьянских восстаний 1919 года, не говоря уже о том, что во время антигетманского восстания он был одним из лучших гетманских генералов, противостоявших нашим войскам. Однако большинство наших военных признают его компетентность, и в случае реабилитации он мог бы сослужить хорошую службу в наших вооруженных силах. Действительно, среди гетманских войск он выглядит вполне приемлемо, особенно по сравнению с Иваном Полтавцом-Остряницей. Мы можем либо заставить его отойти от военных дел и доживать остаток жизни в уединении, либо принять его обратно в армию, хотя последнее, скорее всего, вызовет противодействие"
 ukraine_republican_events.50.a: "Он может жить как частное лицо"
 ukraine_republican_events.50.b: "Присовский - талантливый генерал, он будет служить и нам"

 ukraine_republican_events.52.t: "Грохот на Востоке"
 ukraine_republican_events.52.d: "Право на забастовку является одним из основных прав, гарантированных конституцией Народной Республики, и, похоже, некоторые готовы пользоваться им в полной мере. Независимый профсоюз горняков - это новая организация, не связанная с устоявшимися профсоюзными структурами и созданная после отмены ограничений на деятельность профсоюзных объединений, введенных Гетманщиной. Она пользуется довольно большой поддержкой шахтеров Донбасса и несет ответственность за многочисленные забастовки, которые сейчас охватывают горнодобывающую промышленность. Следует ожидать забастовок, поскольку экономика только недавно начала оправляться от потрясения, вызванного кризисом "черного понедельника", но в них чувствуется воинственность и радикализм, больше напоминающие о бурных днях 1936 года.\n\nОчевидно, что в то время как у рабочих есть обоснованные претензии, УКП и боротьбисты, без сомнения, стоящие за этим Независимым профсоюзом, используют ситуацию для достижения своих собственных политических целей: нарушить общественный порядок и дискредитировать наше недавно созданное правительство. Нашим партнерам по USDRP удалось достичь определенного взаимопонимания с ведущими деятелями профсоюза, и они представили нам дорожную карту, направленную на снижение напряженности на рынке труда в долгосрочной перспективе.\nНа повестке дня два основных вопроса: установление государственного контроля над горнодобывающими предприятиями и постоянная государственная поддержка организованных профсоюзов. Приверженность этим целям может завоевать доверие профсоюзного руководства и разрядить нынешнюю напряженную ситуацию.\n\nЭто предложение сразу же вызвало подозрения у партии. Некоторые утверждают, что УСДРП просто использует продолжающийся кризис для достижения своих собственных узких целей. Гарантий нет, и даже в случае успеха УСДРП просто поставит это себе в заслугу, наращивая свой политический капитал за наш счет. Забастовки, в конце концов, можно переждать, в то время как Народное ополчение следит за тем, чтобы они не привели к нарушению общественного порядка. Тем не менее, бездействие и нерешительность могут выставить нашу администрацию в дурном свете, поэтому, возможно, принятие плана УСДРП - это правильный поступок."
 ukraine_republican_events.52.a: "Тяжелое начало нашего пребывания в должности..."
 ukraine_republican_events.52.a.tt: "Взяв фокусы §Национализация угольных шахт§! и § укрепление Центрпрофа§! позволит избавиться от этого национального духа, но мы также можем позволить ему угаснуть самому по себе."

 ukraine_republican_events.53.t: "Ничего личного, просто бизнесс!"
 ukraine_republican_events.53.d: "Кризис "черного понедельника" привел к беспрецедентному оттоку иностранных инвестиций из нашей экономики. Не будучи уверенным в будущем украинских рынков, международный капитал в основном решил сократить убытки, чему его с трудом помешали обещания, содержащиеся в законопроекте о льготах. Но даже это относительное затишье продлилось недолго, поскольку восстание и последующая победа республиканцев подорвали ту малую веру иностранных бизнесменов в стабильность в Украине, которая еще оставалась. Многие из них, изначально привлеченные в Украину обещаниями дешевой рабочей силы, слабыми профсоюзами и слабо соблюдаемыми правилами, поняли, что этим предпочтительным условиям вскоре может прийти конец. Другие, перепутав наше праведное восстание с каким-то коммунистическим путчем, начали опасаться, что их предприятия будут принудительно конфискованы государством. Нелепая идея, но, тем не менее, подрывающая доверие к нам.\n\nВосстановление доверия иностранных инвесторов является важным испытанием для нашей возрожденной республики, которое покажет, достаточно ли зрело ее правительство, чтобы пойти на необходимые компромиссы во имя общего блага. На карту поставлена не только экономическая стабильность или международный авторитет, но и само будущее Украины как современного государства: иностранный опыт необходим для успешной индустриализации и общего развития нашей страны.\n\nЭто будет долгий процесс, но первые шаги могут быть относительно простыми. Твердая приверженность верховенству закона и решительный протест против любых перспектив "революционных эксцессов" продемонстрируют серьезность наших намерений. Использование наших оставшихся связей в кругах ныне несуществующего протофиса может убедить тех, кто все еще сомневается. Комплекс временных законодательных мер, касающихся налоговой политики, может выиграть для нас некоторое время, но, без сомнения, расстроит наших партнеров по коалиции. Тем не менее, необходимо что-то предпринять и быстро принять необходимые решения."
 ukraine_republican_events.53.a: "Мы никогда не были союзниками Протофиса, но в такие времена, как сейчас..."
 ukraine_republican_events.53.b: "Социал-демократам нужно будет немного поучиться необходимому прагматизму."
 ukraine_republican_events.53.c: "В нашей стране закон уважается и защищается."
 ukraine_republican_events.53.c.tt: "Эта опция доступна, потому что мы уделяем особое внимание § Уважению независимости судебной власти§!."

 ukraine_republican_events.54.t: "Прокламация Петлюры"
 ukraine_republican_events.54.d: "На глазах народа рухнул строй, просуществовавший почти два десятилетия, и на его место пришло правительство, которое, как многие думали, уже никогда не вернется. В то время как революционеры праздновали по всей стране, а гетманисты складывали оружие, украинский народ оказался на пороге новой эпохи.\n\nТысячи людей собрались перед зданием Центрального совета в [202.GetName], где Петлюра должен был выступить с исторической речью: \"...несмотря на все свои попытки, гетман не смог сломить нашу непоколебимую веру в будущее, где мы больше не будем скованы цепями. Прежнее правительство пыталось заглушить наши призывы к свободе и всеми силами боролось с неостановимым революционным потоком. И все же, несмотря ни на что, республиканское дело победило. Настало время исправить несправедливость, совершенную по отношению к нашему народу восемнадцать с половиной лет назад. Я, Симон Петлюра, провозглашаю Украинскую Народную Республику.\n\n Это заявление было встречено ликующими толпами. К полудню вся страна узнала новость - Народная Республика, которую считали выброшенной на свалку истории, вернулась.\n\n Петлюра возьмет на себя временное руководство новопровозглашенным правительством до выборов, которые должны состояться в ближайшие месяцы. Пока неизвестно, что думает по этому поводу Германия, но ответ из Берлина ожидается в ближайшие дни."
 ukraine_republican_events.54.a: "Да здравствует Украинская Народная Республика!"

 ukraine_republican_events.55.t: "[GetYear]-Выборы отложены"
 ukraine_republican_events.55.d: "После начала войны многие стали задаваться вопросом, что же будет с запланированными на [GetYear] всеобщими выборами. Срок пребывания у власти правительства [UKR.GetRulingParty] постепенно подходит к концу, и хотя выборы должны состояться в ближайшие недели, сложившаяся ситуация, безусловно, осложняет ситуацию. Поэтому Зборы проголосовали за то, чтобы отложить выборы и позволить правительству оставаться у власти до тех пор, пока мир не вернется на наши земли.\n\nНесколько деятелей в парламенте и правительстве заявили, что проведение выборов в такой момент было бы безответственным. Это мнение разделяет большинство населения Украины, но многие разочарованы тем, что им придется ждать так долго, чтобы их голос снова был услышан. В результате возросла решимость довести войну до конца, и многие готовы бороться за свой демократический образ жизни"
 ukraine_republican_events.55.a: "Народная война. Народная мечта"

 ukraine_republican_events.56.t: "Угроза справа"
 ukraine_republican_events.56.d: "Хотя некоторые могут предположить, что триумф Республики либо потерпел крах, либо заставил подчиниться всех ее врагов, реальность гораздо сложнее. Службы безопасности указывают на то, что определенные угрозы все еще сохраняются, скрываясь на заднем плане, накапливая силу и ожидая возможности нанести удар.\n\nОстатки СГД являются одной из таких угроз. Большинство ее руководителей либо бежали из страны, либо были задержаны, но значительное число ее членов все еще находятся на свободе. Некоторые из них, возможно, отказались от своего дела, но оставшиеся несгибаемые сторонники, несомненно, создадут проблемы, если их не остановить. Вот почему значительные усилия были направлены на выявление оставшихся структур СГД в вооруженных силах и полиции. Некоторые результаты оказались весьма неожиданными: есть серьезные подозрения, что Василий Мурашко, высокопоставленный сотрудник инспекции воздушного флота, был членом СГД с начала 30-х годов. Несмотря на свое относительно незаметное поведение, он, по-видимому, сыграл важную роль в содействии проникновению СГД в органы безопасности Украины. Дальнейшее расследование может собрать достаточно доказательств для возбуждения против него официального дела.\n\nДругая, хотя и менее явная угроза исходит от так называемой Лиги Украинских Националистов. Относительно небольшая группа, популярная в основном среди студентов, все еще имеет сторонников в армии. На данный момент трудно связать ее членов с какой-либо ярко выраженной антиреспубликанской деятельностью. Более того, разрозненные сообщения указывают на то, что во время восстания некоторые подразделения под командованием младших офицеров, связанных с ЛУН, взбунтовались и отказались выполнять приказы гетманцев. Тем не менее, Лига проповедует доктрину национал-шовинизма и савинковское почитание диктатуры, несовместимые с истинными республиканскими идеалами. В связи с этим ряд ее последователей в армии, включая одного из ее основателей, полковника Владимира Мартынца, были взяты под пристальное наблюдение."
 ukraine_republican_events.56.a: "Пережитки более мрачных времен."

 ukraine_republican_events.57.t: "Примирение с аграрными демократами"
 ukraine_republican_events.57.d: "Единственное, чего не хватает УРДП по сравнению с другими политическими силами Народной Республики, - это ее правового статуса в эпоху гетманщины. Хотя в то время гетманская система все еще оставалась прогрессивной реформаторской силой, она в значительной степени подавляла сильные идеологические настроения, что привело к некоторому идеологическому размыванию партии.Во многом то же самое можно было сказать и о СДХП; многие вступили в партию не из идеологических убеждений, а просто из желания найти свое место в политической сфере. Теперь, когда ситуация изменилась и УДХП стала практически бесполезной из-за политических потрясений, а также из-за того, что все больше украинских правых склоняются к УНП, произошло новое событие. Ряд независимых кандидатов, ранее входивших в УДХП, но вышедших из партии перед выборами из-за ее связей с гетманской политикой, теперь стремятся вступить в УРДП.\n\nПолитическое влияние этих независимых организаций, безусловно, было бы полезным, поскольку их патронажные сети в значительной степени сохранились, несмотря на ликвидацию гетманской системы. Однако следует задаться вопросом, будет ли их членство необходимым или полезным в долгосрочной перспективе. С тех пор как республика возродилась, идеологические принципы УРДП стали только более выраженными, и хотя на данный момент партия сохраняет свой палаточный характер, мы должны быть осторожны, чтобы не превратиться в партию апатичных бюрократов."
 ukraine_republican_events.57.a: "Им будут рады в УРДП."
 ukraine_republican_events.57.b: "Мы - партия народа, а не конъюнктурных интересов."

 ukraine_republican_events.58.t: "Возхождение Сечевиков"
 ukraine_republican_events.58.d: "В то время как прогетманистские военные группировки пребывают в смятении, среди украинских офицеров возникают новые центры влияния. Один из них, связанный с Симоном Петлюрой и его приближенными, нас мало волнует: нам удалось достичь понимания, что политическому вмешательству нет места в новой украинской армии.\n\n Однако есть еще одна заметная группа. Высокопоставленная офицерская клика, которая осталась нетронутой как гетманским вмешательством, так и нашими попытками деполитизировать армию: сечевики во главе с генералом Коновальцем. Репутация Коновальца как уважаемого генерала не вызывает сомнений, и хотя он и его окружение оставались невмешанными в политику в целом (хотя и были в некоторой степени обласканы УНП), возглавляемая им патриотическая и националистическая группировка оказала значительное влияние на наши вооруженные силы.\n\nКоновалец и его люди, без сомнения, больше преданы Народной Республике, чем Гетманщине, и его преданность украинской нации превыше всего, так что нет причин не доверять им. Тем не менее, они остаются вне нашей досягаемости, являясь гораздо более независимой и сплоченной группой, чем остальные. При условии, что мы будем хорошо управлять страной и правящая коалиция не распадется, проблем возникнуть не должно, но если нет, то Сычовики могут оказаться более... сложной проблемой, чем представлялось."
 ukraine_republican_events.58.a: "Крепкий орешек..."

 ukraine_republican_events.59.t: "Угроза слева"
 ukraine_republican_events.59.d: "В течение некоторого времени наши службы безопасности были заняты наблюдением за деятельностью ультраправых, готовые противостоять любой угрозе, исходящей от остатков старого порядка или нового поколения правых экстремистов. Между тем, наблюдение и профилактические меры в отношении крайне левых проводились в гораздо более сдержанной манере. Таким образом, мы могли пропустить некоторые важные события.\n\nПоследние сообщения свидетельствуют о том, что боротьбисты готовятся начать подпольную кампанию по вербовке. Используя свои обширные связи среди организованных рабочих и крестьянства, опираясь на свой богатый опыт медленной партизанской кампании против гетмана, они планируют организовать и обучить лояльные им военизированные формирования. В подтверждение этих сообщений на одной из обысканных конспиративных квартир недавно был обнаружен тайник с оружием. Хотя неучтенные запасы оружия, оставшиеся со времен ВДД и восстания, не являются чем-то необычным, это оружие, похоже, недавно было ввезено в страну контрабандой. Другим тревожным фактором является то, что создание и поддержание военизированных формирований требует значительных средств, которые трудно получить без внешней поддержки. В совокупности эти факты поднимают некоторые неприятные вопросы относительно масштабов иностранного вмешательства в наши внутренние дела.\n\nНекоторые представители силовых структур призывают нас перенаправить хотя бы часть наших усилий на борьбу с этой новой угрозой, в то время как другие по-прежнему настроены скептически. Несомненно, проникновение ультраправых в вооруженные силы потенциально опаснее, чем банда бандитов, вооруженных старыми контрабандными винтовками? Это работа для Народного ополчения и полиции, а не для контрразведки."
 ukraine_republican_events.59.a: "Мы должны защищать нашу демократию от всех угроз."
 ukraine_republican_events.59.b: "Сохраняйте нашу текущую направленность. Народная поддержка защитит нас от крайне левых."

 ukraine_republican_events.60.t: "Союз равных"
 ukraine_republican_events.60.d: "В наших отношениях с Германией и Миттельевропой многое оставляет желать лучшего. Вместо того чтобы яростно выступать против европейского сотрудничества, как это делают упертые радикалы, нам следовало бы нацелиться на сотрудничество с другими единомышленниками в Восточной Европе. Ведь во многих наших странах-единомышленницах к власти пришли социал-реформистские и демократические правительства.\n\nНа конференции Mitteleuropa летом прошлого года уже велись предварительные переговоры об углублении сотрудничества между нашими \"народными республиками\", а теперь это предложение превратилось в реальный договор, в основном основанный на проекте польского государственного деятеля Габриэля Нарутовича (Gabriel Narutowicz). Договор о сотрудничестве между народными государствами, получивший в прессе название \"Малый пакт\", позволит сформировать внутри Mitteleuropa собственную экономическую зону, которая, с одной стороны, объединит наше влияние в организации, а с другой - будет координировать совместные инфраструктурные проекты и проекты развития. В идеале наше сотрудничество должно стать примером неэксплуататорских отношений между соседями и противовесом интересам Германии и Австрии"
 ukraine_republican_events.60.a: "Великолепное предложение!"
 ukraine_republican_events.60.b: "Звучит подозрительно"

 ukraine_republican_events.61.t: "[FROM.GetName] Стремиться к более тесным отношениям"
 ukraine_republican_events.61.d: "[FROM.GetAdjective]ий МИД представил свой план Договора о сотрудничестве между народными государствами. Этот договор, прозванный в прессе \"Маленьким пактом"\, создаст нашу собственную экономическую зону внутри Миттельевропы. Его целью станет, с одной стороны, объединение нашего влияния в организации, а с другой - координация совместных инфраструктурных проектов и проектов развития. В идеале наше сотрудничество должно стать примером неэксплуататорских отношений между соседями и противовесом интересам Германии и Австрии."
 ukraine_republican_events.61.a: "Восхитительное предложение!"
 ukraine_republican_events.61.b: "Не интересно"

 ukraine_republican_events.62.t: "Ратификация Договора о сотрудничестве между народными государствами"
 ukraine_republican_events.62.d: "Наступил торжественный момент принятия парламентом Договора о сотрудничестве между народными государствами как свидетельства народных революций и подъема свободы и демократии в Восточной Европе. Пока эта организация находится в стадии становления и занимается в основном совместными инфраструктурными проектами в наших общих приграничных регионах, но есть много идей по расширению договора до более крупного экономического союза. Надеюсь, это даст нам дополнительные дипломатические рычаги в будущих торговых переговорах с Германией."
 ukraine_republican_events.62.a: "За свободу и братство!"

 ukraine_republican_events.63.t: "Формирование Договора о сотрудничестве между народными государствами"
 ukraine_republican_events.63.d: "Министры иностранных дел Польши, Украины и Белой Рутении подписали сегодня Договор о сотрудничестве между народными государствами. В их совместном заявлении говорится, что договор призван координировать их инфраструктурные проекты и другие виды экономического сотрудничества. Мы были проинформированы об этом заранее, и МИД не счел нужным останавливать эти замыслы - по крайней мере, после того, как мы получили ряд исключений и оговорок в тексте договора, гарантирующих, что наше собственное экономическое влияние от этого не пострадает. На практике этот договор мало что значит. В лучшем случае он может улучшить экономическую стабильность Восточной Миттельевропы, а в худшем - развалится через год-два из-за внутренних распрей"
 ukraine_republican_events.63.a: "Они сейчас объединяются в профсоюзы?"
 UKR_EE_coop_tt: "Если они согласятся, то мы все получим следующие преимущества:"
 UKR_EE_cooperation: "Малый пакт"

 ukraine_republican_events.64.t: "Призрак социализма"
 ukraine_republican_events.64.d: "Контакты между Интернационалом и украинскими социалистическими партиями существовали уже давно. В 20-е годы переговоры были неофициальными и спорадическими, но они велись с энтузиазмом, с надеждой на то, что Революционный блок сможет дестабилизировать гетманский статус-кво.\n\n Но антигетманское восстание дало шанс народу, который выбрал Революционный блок - социалистическую аномалию в традиционной и консервативной сфере влияния Германии. Реакция на выборы во Франции и Великобритании была неоднозначной, но в основном с осторожным оптимизмом, поскольку шанс на прочные отношения с Украиной, которые были невозможны при гетманском правительстве, неожиданно стал реальностью. После выборов были установлены контакты между Третьим Интернационалом и Революционным блоком, особенно между более радикальными его членами.\n\nВ соответствии с военными договорами Украины с Германией, Украина была вынуждена объявить войну Интернационалу. Но симпатии к Интернационалу хорошо известны в Революционном блоке, что беспокоит министра иностранных дел Арнольда Марголина - настолько, что он провел закрытое совещание с другими видными министрами правительства от Рабочей партии, заверив, что полный захват власти Революционным блоком маловероятен в случае успеха немцев против франко-британского альянса. Но в противном случае..."
 ukraine_republican_events.64.a: "Мы должны тщательно взвесить наши возможности"
 UKR_revbloc_revolt_tt: "[UKR_revbloc_revolt_tooltip]"
 UKR_early_wk_revbloc_tt: "Война пришла в Украину раньше, чем ожидалось, а межфракционные распри еще не успели разрешиться в нужный момент, поэтому нам придется оставить наши разногласия в стороне. Таким образом, механика §RНаправление Рабочего Демократического Союза§! теперь §YОтключена§!, а доминирующая фракция сохранит свое господство, предоставляя преимущества, которые она давала в нашем §YДереве Фокусов§! изначально."

UKR_revbloc_revolt_tt1: "Как только мы примем фокус §YПродвижение социализма§!, мы сможем восстать в любой момент."
UKR_revbloc_revolt_tt2: "Поскольку мы являемся соседями другого §Rсоциалистического§! государства, мы сможем восстать в любой момент."
UKR_revbloc_revolt_tt3: "Так как §RУПСР§! §SУмеренные§! в настоящее время доминируют, мы сможем восстать, когда у £KR_game_rule_flag_GER §YGерманской Империи§! будет более §Y40%§! прогресса капитуляции."
UKR_revbloc_revolt_tt4: "Так как §RУПСР§! §oРадикалы§! в настоящее время доминируют, мы сможем восстать, когда у £KR_game_rule_flag_GER §YGерманской Империи§! будет более §Y25%§! прогресса капитуляции."
UKR_revbloc_revolt_tt5: "Так как §RС-РБ§! §SУмеренные§! в настоящее время доминируют, мы сможем восстать, когда у £KR_game_rule_flag_GER §YGерманской Империи§! будет более §Y25%§! прогресса капитуляции."
UKR_revbloc_revolt_tt6: "Так как §RС-РБ§! §oРадикалы§! в настоящее время доминируют, мы сможем восстать, когда у £KR_game_rule_flag_GER §YGерманской Империи§! будет более §Y10%§! прогресса капитуляции."

 ukraine_republican_events.65.t: "На грани краха"
 ukraine_republican_events.65.d: "Все кончено. Гегемония Германии разрушена, Европа охвачена пламенем. Мы и наши восточноевропейские братья доблестно сражались, но это лишь вопрос времени, когда мы будем раздавлены один за другим. Единственный способ выжить - это сплотить оставшихся союзников, объединенных верой в народную демократию и свободу. "
 ukraine_republican_events.65.a: "Мы не бросим своих товарищей!"
 ukraine_republican_events.65.b: "Какая глупая идея"

 ukraine_republican_events.66.t: "Выборы на Украине"
 ukraine_republican_events.66.d: "Молодая украинская республика проводит свои первые выборы в тревожной ситуации. К участию в них допущены все партии, независимо от того, насколько они социалистичны и революционны. Альянс нескольких крайне левых партий, получивший название \"Рабочего Демократического Союза\", реально рискует победить на выборах. Хотя они уверяют, что не будут кардинально менять внешнеполитический курс Украины, есть все основания с подозрением относиться к их намерениям.\n\n Хотя идеальным кандидатом был бы человек, более ориентированный на оборону, правое крыло Украины находится на самом низком уровне после долгого сотрудничества с режимом Скоропадского. Мы могли бы мягко поддержать - и возможно, предоставить анонимное финансирование - более \"умеренным\"- партиям, Радикальным демократам и Социал-демократической рабочей партии, чтобы гарантировать, что сторонники жесткой линии не победят."
 ukraine_republican_events.66.a: "Поддерживать ответственных лиц"
 ukraine_republican_events.66.b: "Пусть у них будут свободные выборы!"

 ukraine_republican_events.67.t: "Вопрос обороны"
 ukraine_republican_events.67.d: "На фоне выборов посол Германии Йоханнес фон Вельцек запросил у временного председателя Петлюры меморандум о позиции Украины по вопросам национальной обороны. В своем заявлении фон дер Шуленбург заверил, что Германия будет уважать украинскую демократию, но просит гарантий, что оборонное сотрудничество между двумя странами будет продолжаться в соответствии с ранее достигнутыми договоренностями, и намекнул, что некоторые стороны могут относиться к национальной обороне не так серьезно, как другие. В явной насмешке над Винниченко он отметил, что в трудные времена странам нужны надежные умеренные люди, такие как Петлюра, а не идеалисты,\"оторванные от реальности\". Подобные завуалированные вмешательства Германии не редкость в политике Восточной Европы. Посыл был ясен: Революционный блок не пользуется доверием Германии. И хотя это не беспокоит большинство их избирателей - скорее наоборот, - это дает другим партиям оружие для борьбы с неопределившимися избирателями. В конце концов, как бы кто ни относился к Германии, их постоянная дружба - это то, что держит Россию на расстоянии вытянутой руки, а украинскую национальную экономику - в рабочем состоянии."
 ukraine_republican_events.67.d2: "На фоне выборов посол Германии Йоханнес фон Вельцек запросил у временного председателя Петлюры меморандум о позиции Украины по вопросам национальной обороны. В своем заявлении фон дер Шуленбург заверил, что Германия будет уважать украинскую демократию, но просит гарантий, что оборонное сотрудничество между двумя странами будет продолжаться в соответствии с ранее достигнутыми договоренностями, и намекнул, что некоторые стороны могут относиться к национальной обороне не так серьезно, как другие. В явной насмешке над Винниченко он отметил, что в трудные времена странам нужны надежные умеренные люди, такие как Петлюра, а не идеалисты,\"оторванные от реальности\".\n\nПодобные завуалированные вмешательства Германии не редкость в политике Восточной Европы. Посыл был ясен: Рабочий Демократический Союз не пользуется доверием Германии. И хотя это не беспокоит большинство их избирателей - скорее наоборот, - это дает другим партиям оружие для борьбы с неопределившимися избирателями.\n\nТеперь вопрос в том, как мы должны реагировать. РДС выступает за подлинную независимость от иностранных держав, и, очевидно, это означает, что мы должны держаться на расстоянии от Берлина. Однако, учитывая подобные заявления, возможно, нам лучше не прибегать к подобной риторике в предвыборный сезон."
 ukraine_republican_events.67.a: "УПСР обещает рациональную и ответственную внешнюю политику!"
 ukraine_republican_events.67.b: "УСДРП обвиняет Винниченко в игнорировании реалий безопасности."
 ukraine_republican_events.67.a2: "УСДРП обвиняет Винниченко в игнорировании реалий безопасности."
 ukraine_republican_events.67.c: "УПСР рисует своих соперников как слишком дружественных Берлину"
 ukraine_republican_events.67.c2: "We have been pragmatic from the beginning. Tone it down."

 ukraine_republican_events.68.t: "Украинская революция" #Польская реакция
 ukraine_republican_events.68.d: "Свержение гетмана Павла Скоропадского на Украине вызвало дрожь во всем польском политическом спектре. Некоторые ораторы правого толка указывали на то, что "Центролев" участвует в опасно похожей кампании анархии, хотя многие утверждали, что это лишь доказывает, почему для монархии важно допускать в Сейм либеральные и левые партии. В заявлении премьер-министра Пониковский назвал социалистическую агитацию самой большой опасностью для стабильности как в Польше, так и на Украине, и активно похвалил PSL и \"некоторых государственных деятелей в PPS\" за их \"зрелый\" взгляд на политику и отказ от союза с революционерами, несмотря на их оппозицию правительству MKP. Трудно сказать, было ли это искренне или просто попытка вбить клин между умеренной и радикальной частями Центролевы.\n\n Однако республиканская база была наэлектризована. Самые ярые активисты активно призывали воспользоваться моментом и оседлать большую революционную волну, которая поднялась на Украине. Более спокойные головы лишь признавали, что украинская революция стала доказательством того, что с авторитаризмом можно бороться, но не должна менять веру "Центролева" в мирные методы. Наиболее острая дискуссия развернулась среди социал-демократов, где многие стали охотнее прислушиваться к левым, проповедующим насильственную революцию"
 ukraine_republican_events.68.a: "Ужесточить цензуру вокруг украинских событий"
 ukraine_republican_events.68.b: "Так мы только больше будем похожи на гетмана"

 ukraine_republican_events.70.t: "Кризис предотвращен!"
 ukraine_republican_events.70.d: "Несмотря на болтовню о возможном распаде коалиции, похоже, что на этот раз нам удалось переждать бурю. Урегулировав разногласия с нашими партнерами по коалиции в УСДРП, "Селянской спилке", а также в УПСР и С-РБ, был достигнут меморандум о продолжении программы социализации. Председатель Винниченко, как сообщается, был очень доволен"
 ukraine_republican_events.70.a: "Хорошие новости!"

 ukraine_republican_events.71.t: "Правительство Винниченко рухнуло!"
 ukraine_republican_events.71.d: "Подлые изверги! Похоже, мы не смогли разобраться в тонкостях земельной реформы, из-за чего наши так называемые коалиционные \"партнеры"\ из УСДРП объявили нам вотум недоверия в Национальных Зборах. Хуже того, предатели революции в одной из своих партий (УПС-Р) во главе с Ковалевским поддержали это предложение! И как стервятники, радикал-демократы и те, кто остался от консерваторов, последовали их примеру. Председатель Винниченко подал в отставку, и в стране появилось правительство УСДРП-УДРП во главе с Исааком Мазепой..."
 ukraine_republican_events.71.a: "Предатели революции!"

 ukraine_republican_events.75.t: "Выборы [GetYear] года"
 ukraine_republican_events.75.d: "As the devastating war finally draws to a close, the people are eager to return to their peaceful way of life. This conflict caused an overwhelming amount of suffering for many people - refugees, wounded veterans, orphans and many others who have lost much to this war. Our nation must begin the process of rebuilding, but first, it is time to hold those elections that were postponed in the wake of the conflict.\n\nNaturally, the main topic of these elections will be reconstruction. All parties have unveiled their plans for ambitious post-war welfare programmes and other campaigns to heal the wounds of the war. The Radicals are banking on securing a majority by promising to create a prosperous and booming economy, which will, in turn, help those afflicted by the war get back on their feet. Meanwhile, the Workers' Party is drumming up support by embracing pacifist rhetoric, promising to never let Ukraine fall victim to a tragedy like this ever again. However, the greatest promises of change are once again coming from the UPS-R and the R-RB. With Ukraine's natural threat neutralised, they claim that now is the ideal time for radical social and political change.\n\nThe electoral situation is made even more unpredictable by a new contender - The Ukrainian People's Peasants' Party, composed from the members of the URDP centre and right factions, somewhat disillusioned with the party's big-tent nature and somewhat vague agenda, and UDKhP defectors aiming to re-enter the political scene under a new brand, not perceived as inherently \"hetmanist\". The party is centred around the leadership of Pylyp Pylypchuk and Viktor Andriievskyi and focused on the defending of economic interests of small and middle holding farmers. While the party remains small, it may prove to be an invaluable partner for a potential parliamentary coalition.\n\nNow, on the [?global.date.GetDateStringNoHourLong], millions of voters return to the polls once again to choose their government. To many, it feels like a lifetime has passed since the 1937 elections, and, indeed, the people have been waiting for a long time to have their voices heard again. Democracy, it seems, has prevailed, and the new government shall ensure it thrives for ages to come."
 ukraine_republican_events.75.a: "Центристская коалиция реабилитирует правых"
 ukraine_republican_events.75.b: "Радикалы обеспечивают себе большинство"
 ukraine_republican_events.75.c: "Предвыборная агитация УРДП сработала хорошо"
 ukraine_republican_events.75.e: "Необходима широкая левая коалиция"
 ukraine_republican_events.75.f: "Право УРДП сохранять свое господство."
 UKR_postwar_fatigue_tt: "Отказ от прежней политической позиции и создание более радикальной коалиции может разочаровать многих"

 ukraine_republican_events.76.t: "Выбор главы государства"
 ukraine_republican_events.76.d1: "Председатель Республики избирается представителями Национальных Зборов и действует до тех пор, пока после всеобщих выборов не будет сформирован новый состав Зборов. Хотя обычно председатель избирается на четыре года, но в ходе войны правительство председателя просуществовало гораздо дольше этого срока, и настало время выбрать нового главу правительства.\n\n Неудачные результаты выборов как для УСДРП, так и для Рабочего Демократического Союза открыли путь к формированию правительства во главе с УРДП. Радикальная партия, объединившись с недавно образованными УНСП и УДХП, которые показали лучшие результаты, чем ожидалось, возглавит новое правительство. Многие ожидают, что на пост председателя будет выдвинут Александр Шульгин, человек, который вел партию в трудные времена. Однако на первое место может выйти Василий Вышиваный, так называемый \"красный принц\" Его считают патриотичным и воспитанным человеком, на его стороне стоит значительное число представителей.\n\nПосле некоторых дебатов Зборы решают выдвинуть..."
 ukraine_republican_events.76.d2: "Председатель Республики избирается представителями Национальных Зборов, срок его полномочий длится до формирования нового Собрания после всеобщих выборов. Хотя обычно председатель избирается на четыре года, но в ходе войны правительство председателя просуществовало гораздо дольше этого срока, и настало время выбрать нового главу правительства.\n\n Неудачные результаты на выборах как УСДРП, так и Рабочему Демократическому Союзу открыли путь к формированию правительства во главе с УРДП. Многие ожидают, что на пост председателя будет выдвинут Александр Шульгин, человек, который вел партию в трудные времена. Однако Василий Вышиваный, так называемый \"красный принц\", еще может выйти на первое место. Его считают патриотичным и воспитанным человеком, на его стороне находится значительное число представителей.\n\nНесмотря на то, что он не получил большинства, это не означает, что УРДП не участвует в дискуссии. Используя свое положение в коалиции, они тоже могут предлагать в качестве кандидатов членов своей партии. Так, Опанас Феденко выдвигается в качестве кандидата от Рабочей партии, а Симон Петлюра, вернувшийся с военной службы, также выразил желание участвовать в выборах.\n\nПосле некоторых дебатов Зборы решают выдвинуть..."
 ukraine_republican_events.76.d3: "Председатель Республики избирается представителями Национальных Зборов, срок его полномочий длится до тех пор, пока после всеобщих выборов не будет сформирована новое Собрание. Хотя обычно председатель избирается на четыре года, в ходе войны правительство председателя просуществовало гораздо дольше этого срока, и настало время выбрать нового главу правительства.\n\nСоюз с УРДП помог УСДРП сформировать большинство в Зборе, хотя кандидат на пост председателя еще не найден. Одной из ведущих фигур является Опанас Феденко, ставленник Мазепы, выступающий за сохранение господства фракции Екатеринослава над УСДРП. Другой потенциальный кандидат - бывший председатель партии Симон Петлюра. Вернувшись с военной службы, он выразил желание вновь заняться политикой. Его участие в войне и восприятие себя как спасителя республики может помочь ему претендовать на пост председателя.\n\nПосле некоторых дебатов Зборы решают выдвинуть кандидатуру..."
 ukraine_republican_events.76.d4: "Председатель Республики избирается представителями Национальных Зборов, срок его полномочий длится до тех пор, пока после всеобщих выборов не будет сформирована новое Собрание. Хотя обычно председатель избирается на четыре года, но в результате войны правительство председателя просуществовало гораздо дольше этого срока, и настало время выбрать нового главу правительства.\n\nСмягчив свою платформу и объединившись с Рабочей партией, УПС-Р получила ведущую роль в новой леворадикальной коалиции. Народный фронт, получивший большинство в 'Зборах', должен выбрать председателя своего нового правительства. Лидер УПС-Р Никифир Григорьев - очевидный выбор. Выступая за медленный и осторожный переход к аграрно-социалистическому обществу, он является одним из самых популярных кандидатов на пост председателя. Впрочем, УСДРП выдвинула и своих, менее радикальных кандидатов. Опанас Феденко, ставленник Мазепы, популярен среди более умеренного крыла коалиции, а Симон Петлюра, желающий снова участвовать в политике, также на слуху.\n\nПосле некоторых дебатов Собрание решает выдвинуть..."
 ukraine_republican_events.76.a: "Александр Шульгин"
 ukraine_republican_events.76.b: "Василий Вышиваный"
 ukraine_republican_events.76.c: "Опанас Феденко"
 ukraine_republican_events.76.e: "Симон Петлюра"
 ukraine_republican_events.76.f: "Никифор Григорьев"

 ukraine_republican_events.77.t: "Наша безопасность на Украине"
 ukraine_republican_events.77.d: "С момента избрания Рабочего Демократического Союза наши дипломаты испытывают беспокойство. Обычно избрание такого левого правительства на Украине было бы еще как-то терпимо, поскольку шансов на поддержку со стороны Интернационала у него практически не было. Но с недавним приходом к власти в России социалистического правительства ситуация перевернулась с ног на голову. Недавние действия Рабочего Демократического Союза, включая массовые национализации и социализацию земли, вызывают опасения - и теперь вопрос о возможности союза Украины с такой же левой Россией в случае войны с ней остается открытым.\n\n К счастью, в [202.GetName] еще есть потенциальные союзники. Мы можем попросить нашего посла на Украине Фридриха-Вернера Графа фон дер Шуленбурга связаться с министром иностранных дел Украины Арнольдом Марголиным и организовать встречу с руководством УСДРП. Цель такой встречи - убедить руководство УСДРП ограничить влияние Революционного блока и тем самым лишить его возможности вести самостоятельные переговоры с Россией"
 ukraine_republican_events.77.a: "Организуйте встречу"
 ukraine_republican_events.77.b: "В этом нет необходимости. Украина, безусловно, останется верной"
 ukraine_republican_events.77.b.tt: "§RCМожно ли доверять Рабочему Демократическому Союзу? §!"

ukraine_republican_events.78.t: "Международные ставки на украинские выборы"
ukraine_republican_events.78.d: "Надежда на социалистическую Украину снова возгорелась в последнее время. Всего несколько месяцев назад изгнанная Украинская Народная Республика, возглавляемая Симоном Петлюрой и его союзниками из Директории, начала восстание против поддерживаемого Германией гетмана Павла Скоропадского и успешно свергла его правительство. Несмотря на надежды на полноценную революцию в Украине, многие были разочарованы, когда новое правительство продолжило поддерживать связи с Миттельевропой и ориентироваться на германскую сферу влияния.Тем не менее, часть надежды вернулась с новостью о том, что Украина проведет выборы в ближайшие месяцы, в которых будут участвовать три основные партии: Радикально-демократическая партия, Социал-демократическая рабочая партия и Рабочий демократический союз. Рабочий демократический союз, верный своим революционным социалистическим взглядам, несмотря на свою довольно уязвимую позицию между Германией и Россией, является нашим наилучшим союзником, и, без сомнения, они поддержат нас, если мы одержим победу над Германией. Мы поддерживаем неофициальные контакты с Рабочим демократическим союзом в изгнании, и некоторые предлагают тайное финансирование для блока, а также встречи с их руководством, чтобы укрепить их шансы на победу на выборах."
ukraine_republican_events.78.a: "Давайте свяжемся с господином Винниченко."
ukraine_republican_events.78.b: "Как бы мы ни старались, старые связи с Германией не исчезают."

ukraine_republican_events.79.t: "Французская помощь Рабочему демократическому союзу"
ukraine_republican_events.79.d: "Контакты между Интернационалом и Рабочим демократическим союзом были редкими и поверхностными с тех пор, как последний оказался в изгнании, но с наступлением выборов можно наконец начать более официальные переговоры. Тайно французы предложили помочь Союзу с финансированием и агитацией на выборах. Конечно, их помощь сопровождается некоторыми последствиями — хотя Германия может быть защитником Украины сейчас, ситуация может измениться, если социалистические силы на Западе смогут выполнить свои обещания по свержению германского гегемона."
ukraine_republican_events.79.a: "Необходимый союз."

 ukraine_republican_events.80.t: "Завет выполнен"
 ukraine_republican_events.80.d: "В 1845 году знаменитый Тарас Шевченко написал поэму \"Заповит\" как свое завещание украинскому народу. Может быть, наконец, можно сказать, что это завещание исполнилось.\n\nКогда я умру, похороните меня\nНа любимой Украине,\nМоя могила на кургане высоком,\nСреди расстилающейся равнины,\nЧтобы поля, бескрайние степи,\nПогружающийся берег Днепра,\nМои глаза видели, мои уши слышали\nРёв могучей реки.\n\nКогда из Украины Днепр понесет\nв синее море\nкровь врагов...\nТогда я оставлю\nэти холмы и плодородные поля\nЯ оставлю их все и улечу\nв обитель Бога,\nи тогда я буду молиться ..... Но до того дня\Nя ничего не знаю о Боге.\NПохороните меня, тогда поднимитесь,\NИ разорвите свои тяжелые цепи,\NИ кровью тиранов полейте свободу, которую вы обрели.\NИ в новой великой семье,\Nсемье свободных,\NС мягким, добрым словом\Nпомяните и меня."
 ukraine_republican_events.80.a: "Вперед к светлому будущему"

 ukraine_republican_events.81.t: "Дух восстания"
 ukraine_republican_events.81.d: "В бурные годы бунта и страданий слова поэта Ивана Франко из \"Духа бунта\" были на устах у многих. Неужели в Украине наконец-то зажгли неугасимое пламя?\n\nНеугасимый дух бунта - \nПобуждающий человека к могучей доблести,\nБорьба за счастье и прогресс,\nСегодня пламя горит, как в старину!\nНи дыба инквизиции,\nни тюрьма королевского деспота,\nни войска на войне не обучены,\nни самые мрачные пушки не созданы,\nни подлое ремесло доносчика -\nНикто не может уложить его в могилу!\n\nБесстрастный дух бунта,\nЛюбовь к свободе, свет познания,\nДвижение вперед, без возврата,\nНе может быть скован, как в старину.\nНыне лавовый поток течет,\nНыне лавина катится,\nИ есть ли на земле сила столь мощная,\nЧтобы остановить этот поток,\nИ погасить, как пламя,\nПробуждение дня?..."
 ukraine_republican_events.81.a: "Пламя горит ярко"

 ukraine_republican_events.100.t: "Предложение о единой Украине"
 ukraine_republican_events.100.d: "Союз между украинской частью Двуединой монархии и Украинской Народной Республикой уже рассматривался в 1918 году, но был отброшен немецкими замыслами. Но история дала украинцам еще один шанс: гетман был свергнут, и вновь была создана Украинская республика. И галичане, и правительство в [202.GetName] обратились к Вене с просьбой позволить жителям Галиции самим решать свою судьбу, скорее всего, присоединиться к своим государствам.\n\n Проще говоря, это предложение означает раздел Галиции на Польшу и Украину в обмен на их лояльность. Это решение поддерживают как поляки нашей империи, так и сам император. По мнению сторонников австро-польского решения, галичане за 150 лет не стали и никогда не станут австрийцами, поэтому имеет смысл дать им собственное государство в австрийской сфере влияния. Противники такой идеи видят в ней уступку славянским меньшинствам и компрометацию империи"
 ukraine_republican_events.100.a: "Предоставить полякам Западную Галицию"
 ukraine_republican_events.100.b: "Краков останется с нами"
 ukraine_republican_events.100.c: "Ерунда!"

 ukraine_republican_events.101.t: "Вопрос о Закарпатье"
 ukraine_republican_events.101.d: "После восстания и поражения Венгрии Закарпатье оказалось в составе Галицко-Лодомерии в результате переговоров в Аугсляйхе. Теперь она вновь оказалась на перепутье.\n\n В первые годы независимости Украины ее претензии распространялись не только на более обширный регион Галиции-Лодомерии, но и на небольшие регионы юго-восточной Западной Галиции и Восточной Словакии, основанные на проживании украинского населения в горах. Однако многие жители региона, хотя и имеют много общего, в конечном итоге считают себя самостоятельными.\n\n Так или иначе, но баланс установлен. Передадим ли мы ее Украине и решим вопрос в ее пользу? Или же сохранить его в угоду тем членам кабинета министров, которые скептически относятся к лояльности Украины, и местному населению, которое хочет сохранить свою идентичность (которая может оказаться под угрозой со стороны украинского правительства) под властью Габсбургской монархии?"
 ukraine_republican_events.101.a: "Закарпатье принадлежит им, но с одной оговоркой"
 ukraine_republican_events.101.b: "Этим украинцам нельзя доверить такой стратегически важный регион"

 ukraine_republican_events.102.t: "Закарпатье признано!"
 ukraine_republican_events.102.d: "Удивительным сюрпризом после галицийских переговоров стало решение австрийского истеблишмента о передаче региона [73.GetName], а не о сохранении его за собой! Перспективы того, что Украина когда-нибудь будет контролировать этот регион, в эпоху Гетманата значительно померкли, так как страну волновали более приоритетные вопросы, но после революции и прихода к власти более дружественного Вене правительства австрийцы образумились. Это несомненный триумф республики и всего украинского народа в целом"
 ukraine_republican_events.102.a: "Мы благодарны"

ukraine_republican_events.103.t: "Необходимость или ошибка?"
ukraine_republican_events.103.d: "На украинской политической сцене существует общеизвестная точка зрения, что внешние альянсы необходимы — Москва может официально признать независимость Украины, но на практике ситуация гораздо более шаткая. Это стало причиной возвращения Народной Республики в Миттелеуропу, и даже среди многих представителей левого коалиционного правительства Украины оборонительные соглашения с Берлином в основном рассматриваются как необходимое зло. В конце концов, как Украина может защитить себя от агрессии Германии?\n\nНо двадцать лет эксплуатации при поддержке Германии в гетманате не могут не вызвать сильных чувств взаимного недоверия, что подчеркивает новый министр внутренних дел, Анатолий Писоцкий, в своей статье, опубликованной в газете С-РБ. Писоцкий, возможно, один из немногих, кто достаточно смел, чтобы открыто осудить германское правительство и критиковать курс правительства Винниченко.\n\nЦентральным элементом взглядов Писоцкого является то, что Антигетманское восстание было остановлено до того, как оно смогло раскрыть весь свой «революционный потенциал». Повстанцы, открыто выражавшие социалистические лозунги, свергли Гетмана не мирным протестом, а насильственным конфликтом с открыто поддерживаемым Германией режимом. Этот революционный потенциал, по словам Писоцкого, был прерван, когда временное правительство решило вступить в переговоры с Германией после падения [202.GetName].\n\nВозможно, наиболее резкая критика Писоцкого направлена на решение временного правительства вступить в переговоры, не имея настоящей популярной поддержки — народ желает настоящей независимости от иностранных сил, и выборы в Рабочий демократический союз это показывают. Но учитывая, что многие, кто боролся за эти переговоры, составляют большинство в составе Блока, несогласие Писоцкого выявило более глубокие разделения среди революционной левой фракции, чем правительство Винниченко готово было признать."
ukraine_republican_events.103.a: "Убедите Писоцкого не публиковать статью."
ukraine_republican_events.103.b: "Революция всё же имеет своих настоящих солдат."

ukraine_republican_events.104.t: "Вопрос внешнего министерства"
ukraine_republican_events.104.d: "Как сказал мудрый человек, попасть к власти — одно, а править — другое. Пока это утверждение полностью оправдывается в отношении Рабочего демократического союза. Их планы радикальных действий с самого начала противоречили ограничительным институтам Миттелеуропы и немецким требованиям поддерживать высокий уровень военных расходов, не говоря уже о подавлении украинской внутренней промышленности из-за импорта из Берлина.\n\nУже спорная фигура, будучи наиболее заметным либералом в кабинете Винниченко, именно Марголин и его контроль над внешним министерством часто получают большую часть критики, а радикалы из УПСР и С-РБ становятся основными обвинителями. За закрытыми дверями такие, как Писоцкий и Христюк, призывали к немедленному удалению Марголина с должности, утверждая, что его халатность в переговорах о более «проукраинских» условиях с Германией делает его непригодным для этой должности и вредным для правящего блока в целом.\n\nНо Марголин не стал министром иностранных дел, чтобы предлагать оливковую ветвь побежденному УРДП, а для того, чтобы обеспечить признание самого левосоциалистического правительства в Миттелеуропе на сегодняшний день. Пока что, похоже, Марголин хотя бы сдерживает Германию на расстоянии, уверяя их, что Винниченко и его кабинет не стремятся к конфликтам.\n\nТем не менее, требования об удалении Марголина за так называемую «небрежность» только усилились после нескольких месяцев медленных, но стабильных социальных реформ. Хотя Винниченко пока молчал по этому вопросу, он неизбежно должен будет принять решение вскоре..."
ukraine_republican_events.104.a: "Уверен, мы можем найти решение, не так ли?"

ukraine_republican_events.105.t: "Работа с Марголином"
ukraine_republican_events.105.d: "Винниченко уже выполнял роль посредника в множестве межкоалиционных переговоров, но вопрос внешнего министерства обещает стать значительным испытанием. Хотя это, к сожалению, жестокая реальность, на данный момент важнейшим является поддержание рабочих отношений с Берлином. Невозможность сохранить эти отношения может означать конец всему, за что боролись смелые герои Антигетманского восстания, поглотив еще одну украинскую революцию под прусским сапогом.\n\nСогласно статье 57 Конституции, члены Совета Министров могут быть отстранены Национальным Собранием при наличии большинства голосов. Было предложено несколько кандидатов на замену Марголина, в основном из УСДРП. Хотя голосование против Марголина еще не состоялось, с учетом всех разговоров на эту тему, похоже, оно неизбежно произойдет в ближайшие дни.\n\nЛидер Спилки и министр сельского хозяйства Николай Ковалевский лично посоветовал Винниченко по поводу слухов, недавно распространившихся, посоветовав ему встретиться с Марголином и побудить его изменить позиции в Министерстве иностранных дел в более угодном для Блока ключе — и в любом случае, поддержать Марголина, чтобы избежать гнева Берлина. Маловероятно, что Марголин будет удален в ходе голосования, но это может быть демонстрацией единства среди радикалов в Ассамблее, а также более прямым давлением на Марголина, чтобы он реформировал свой офис более тщательно."
ukraine_republican_events.105.a: "Марголин может вести офис так, как ему угодно. Поддержите его."
ukraine_republican_events.105.b: "Что плохого в обсуждении этого вопроса? Пусть голосуют."
ukraine_republican_events.105.a.tt: "Имейте ввиду, что §Cдоминирующая фракция§! будет обдумывать, какой ответ дать."
ukraine_republican_events.105.b.tt: "Имейте ввиду текущую §Cдоминирующую фракцию§! при рассмотрении вопроса о том, чем может закончиться голосование."

ukraine_republican_events.106.t: "Невозможный компромисс"
ukraine_republican_events.106.d: "Из множества назначенных в Совет Министров Винниченко особое внимание привлекает одна знакомая фигура. Это Арнольд Марголин: еврейский украинец и член УРДП, который ранее работал в судебной системе и внешнем министерстве государства Гетмана.\n\nРепутация Марголина как защитника заслуживает особого внимания, так как он стал известен по всему государству благодаря его участию в широко освещаемом «Деле Бейлиса» более двадцати лет назад. В период, когда в Российской империи царил антисемитизм, Марголин мастерски защищал еврейского рабочего от обвинений в ритуальном убийстве. Хотя Марголин не был единственным защитником Менахема Бейлиса, он все же заслужил репутацию защитника прав меньшинств в Украине, особенно большой еврейской общины.\n\nНо хотя этот процесс принес ему большую известность, это не причина, по которой его выбрали на пост министра иностранных дел Винниченко. Все слишком хорошо знают о недоверии Германии к Рабочему демократическому союзу, и мы не можем позволить себе разрушить все это преждевременно. Опыт Марголина в внешнем министерстве, а также его принадлежность к УРДП стали основой важного компромисса между [202.GetName] и Берлином, который, по сути, должен продлиться, если мы хотим выжить.\n\nЭто не компромисс, с которым все довольны. У Марголина есть обширные связи среди его однопартийцев, а также среди начальников штаба Петлюры, и нет сомнений, что он будет использовать пост министра, чтобы влиять на революционное правительство любым способом, который сможет."
ukraine_republican_events.106.a: "В конце концов, это просто политика."
ukraine_republican_events.106.b: "Следите за внешним министерством."

ukraine_republican_events.107.t1: "Бесплодная встреча" # Поддерживаем Марголина
ukraine_republican_events.107.t2: "Успешный компромисс"
ukraine_republican_events.107.d1: "Послушав совет Ковалевского, Винниченко организовал частную встречу с Марголином, чтобы обсудить текущий вопрос. Когда Винниченко сообщил Марголину, что многие в Совете Министров и Национальной Ассамблее хотят его отставки, тот ответил, что такие требования ему уже не новы.\n\nПо-видимому, он тоже осознавал масштаб ситуации. Когда Винниченко предложил провести перераспределение должностей в Министерстве иностранных дел, Марголин отказался, полагая, что это не только подтолкнет Германию к открытому вмешательству в правительство Винниченко, но и ничего не даст радикалам С-РБ и УПСР. Несколько часов обсуждений между председателем и министром закончились ничем.\n\nТолько на следующий день результат встречи стал очевиден. В тщательно подготовленной речи на собрании Рабочего демократического союза Винниченко предупредил против «мелкой междоусобной борьбы и фракционности», подчеркивая единство перед лицом реакционных сил. Хотя он не упомянул Марголина напрямую, заявление явно было направлено на защиту его поста и предупреждение о попытках Национальных Зборов его отставить. Вероятно, что, по крайней мере на данный момент, слова Винниченко помогут Марголину удержаться на должности, но проблему нельзя считать решенной, и оба мужчины вышли из ситуации в невыгодном положении."
ukraine_republican_events.107.d2: "Послушав совет Ковалевского, Винниченко организовал частную встречу с Марголином, чтобы обсудить текущий вопрос. Когда Винниченко сообщил Марголину, что многие в Совете Министров и Национальной Ассамблее хотят его отставки, Марголин ответил, что такие требования ему уже не новы.\n\nПо-видимому, он тоже осознавал масштаб ситуации. Когда Винниченко предложил провести перераспределение должностей в Министерстве иностранных дел, Марголин отказался, полагая, что это не только подтолкнет Германию к открытому вмешательству в правительство Винниченко, но и ничего не даст радикалам С-РБ и УПСР. Несколько часов обсуждений между председателем и министром закончились ничем.\n\nТолько на следующий день результат встречи стал очевиден. В тщательно подготовленной речи на собрании Рабочего демократического союза Винниченко предупредил против «мелкой междоусобной борьбы и фракционности», подчеркивая единство перед лицом реакционных сил. Хотя он не упомянул Марголина напрямую, заявление явно было направлено на защиту его поста и предупреждение о попытках Национальных Зборов его отставить. Вероятно, что, по крайней мере на данный момент, слова Винниченко помогут Марголину удержаться на должности, но проблему нельзя считать решенной, и оба мужчины вышли из ситуации в невыгодном положении."
ukraine_republican_events.107.a: "Хорошо. Теперь разберемся с этим."
ukraine_republican_events.107.b: "Не забивайте себе голову."

ukraine_republican_events.108.t: "Голосование" 
ukraine_republican_events.108.d1: "Когда его неоднократно обвиняли в том, что он продал украинскую республику 'интересам иностранных держав', министр иностранных дел Марголин ответил, что все его действия были направлены на обеспечение безопасности Украины, и, кроме того, что обвинения против него были необоснованными, политически мотивированными и неразумными. В конечном итоге, несмотря на бесконечные дебаты, вопрос об отставке Марголина был вынесен на голосование в Национальном Зборе.\n\nКогда голоса были подсчитаны, стало ясно, что Марголин сохранит свою должность. Умеренные в УПСР, а также единогласное голосование депутатов УРДП и нескольких правых депутатов объединились, чтобы защитить Марголина от этих 'необоснованных' обвинений. Но факт, что Марголин пережил голосование, не был особенно примечательным. Удивительным было то, как легко оно было побеждено: многие делегаты С-РБ, поддерживающие Винниченко, отказались одобрить отставку Марголина, и группа Писоцкого оказалась изолированной. В довольно очевидной шутке против Писоцкого несколько депутатов задали вопрос, зачем вообще было необходимо голосование, учитывая почти единогласное решение Збора.\n\nЭта критика, похоже, распространилась и на Винниченко. В конце концов, Винниченко поощрял вынесение вопроса на голосование в Национальном Зборе. Несмотря на его согласие с умеренными по этому вопросу, его поощрение теперь выглядит так, будто он дал власть громкому меньшинству над молчаливым большинством, что заставляет многих задаваться вопросом, где на самом деле лежат верности председателя: к революционной коалиции и благу Украины или только к его партнёрам в С-РБ." 
ukraine_republican_events.108.d2: "Когда его неоднократно обвиняли в том, что он продал украинскую республику 'интересам иностранных держав', министр иностранных дел Марголин ответил, что все его действия были направлены на обеспечение безопасности Украины, и, кроме того, что обвинения против него были необоснованными, политически мотивированными и неразумными. В конечном итоге, несмотря на бесконечные дебаты, вопрос об отставке Марголина был вынесен на голосование в Национальном Зборе.\n\nКогда голоса были подсчитаны, стало ясно, что Марголин сохранит свою должность. Умеренные в УПСР, а также единогласное голосование депутатов УРДП и нескольких правых депутатов объединились, чтобы защитить Марголина от этих 'необоснованных' обвинений. Но факт, что Марголин пережил голосование, не был особенно примечательным. Удивительным было то, насколько близким оказалось голосование. Многие из С-РБ, даже те, кто поддерживал Винниченко, который оставался осторожным по этому вопросу, проголосовали за отставку Марголина - и так же поступила большая часть радикальной фракции УПСР.\n\nНа этот раз казалось, что умеренные силы в Национальном Зборе больше не имели явного преимущества над жёсткими революционерами, и их отсутствие серьёзного сопротивления критике Марголина до голосования теперь ставит под сомнение их способность сдерживать радикалов в будущем." 
ukraine_republican_events.108.a: "Довольно разочаровывающий результат..." 
ukraine_republican_events.108.b: "Теперь мы можем действовать против них более открыто." 

ukraine_republican_events.109.t: "Правая оппозиция" 
ukraine_republican_events.109.d: "После почти двадцати лет в изгнании социалисты Рабочего демократического союза и Социал-демократической рабочей партии действительно перевернули политическую ситуацию. Падение 'гетманского консерватизма' было внезапным и быстрым, и украинский народ, по крайней мере в ближайшем будущем, полностью отверг его, что подтверждается победой социалистов на выборах.\n\nПо крайней мере, это та версия событий, которую мы хотели бы видеть.\n\nИз многих мелких партий, которые едва набрали достаточно мест, чтобы остаться в Национальном Зборе, одна особенно выделялась: Украинская народная партия (УНП). Теперь крупнейшая правая партия в Ассамблее, УНП была сформирована во время избирательной кампании, где она, казалось, не получила большого внимания. Но хотя их присутствие в Ассамблее невелико, они оставили свой след на улицах, организуя протесты против 'большевистской' политики Рабочего демократического союза.\n\nПартию возглавляет Николай Михновский, бывший гетманист и ранее кандидат на руководство УДКХП, который якобы покинул партию, чтобы оставить гетманские связи в республиканскую эпоху. Куда бы ни шли эти правые протесты, Михновский произносил страстные речи, изображая Блок как 'собрание традиционно слабой интеллигенции, далёкой от борьбы и нужд украинской нации'. Его усилия пока немногочисленны, но по сравнению с другими опозоренными гетманскими фигурами, популистская риторика и политическая экспертиза Михновского могут оказаться большей угрозой, чем мы могли себе представить." ukraine_republican_events.109.a: "Легко говорить, когда никогда не управлял сам!" 
 ukraine_republican_events.109.a: "Easy to say when you've never governed yourself!"

ukraine_republican_events.110.t: "Новый год, новые планы"
ukraine_republican_events.110.d: "С наступлением нового года председатель Винниченко воспользовался моментом, чтобы созвать Национальный Збор. Снижение бедности, земля для всех и новая промышленная база, немыслимая в эпоху гетманства, были ключевыми темами в начале вступительного заявления Винниченко - но хотя это было приятно слышать, это не было темой речи Винниченко.\n\nСлон в комнате - это вопрос национальной обороны. Агрессивные действия России на мировой арене и их отрицание украинской государственности ясно дали понять, что если Украина хочет выжить, этот вопрос будет иметь первостепенное значение. Впервые с момента избрания Рабочего демократического союза военные расходы стали приоритетом превыше всего. Слова Винниченко вызвали бурные аплодисменты и одобрение в Национальной Ассамблее - в конце концов, кто бы мог быть против такого патриотического начинания?\n\nНо после того, как Винниченко покинул центр внимания, началось обсуждение, которое, вероятно, вызвало бы значительно меньше аплодисментов в Зборе. Собрав несколько министров С-РБ и УПСР, а также генералов Тютюнника и Волоха, Винниченко попросил Тютюнника разработать планы защиты Украины от русских, но и от немцев на западе.\n\nС возможностью новой Великой войны в Европе в ближайшее время, опасения, что Германия может предпринять действия против украинского правительства, больше не являются просто разговорами. Вопрос заключается в характере этих планов: должны ли они быть только оборонительными или учитывать возможность решительного успеха Третьего Интернационала и потенциальных наступательных манёвров в западный Рейхспакт?" 
ukraine_republican_events.110.a: "В любом случае, оборонительная позиция в двухфронтовой войне - это естественно." 
ukraine_republican_events.110.b: "Готовьтесь к удару в сердце реакции!"

ukraine_republican_events.111.t: "Центральный комитет экономического развития"
ukraine_republican_events.111.d: "Земельная реформа и индустриализация обещают стать грандиозным проектом, который потребует значительных финансов, времени, планирования и экспертизы. Верно, что в сравнении с правительством Гетмана отсутствие мощного лобби землевладельцев, как у ВСЗВ, упростит задачу — но это не сделает её легкой, а Национальное Собрание, с множеством партий, групп интересов и фракций, может сделать процесс гораздо более сложным, чем предполагалось. Очевидно, что для реализации этих задач необходима определённая степень централизации — ведь это будут самые амбициозные проекты, которые украинская республика начнёт.Для достижения этих целей и более тщательной координации планирования был предложен специальный орган — Центральный комитет экономического развития. Идея была поддержана политическими силами по всей линии, даже некоторыми более правыми депутатами Национального Собрания, но остаётся важный вопрос: перед кем должен быть подотчётен комитет?Множество представителей УПСР и УСДРП выразили желание, чтобы он подчинялся Национальному Собранию, придерживаясь принципов республиканского парламентаризма и давая возможность предложить более широкий круг идей. С другой стороны, С-РБ настаивает, чтобы комитет подчинялся Министерству экономики. Легко понять, почему — пропорционально в Совете министров больше представителей С-РБ, чем в Национальном Собрании. Кроме того, такая мера обойдёт "бюрократическое раздутие" первого варианта и избежит конфронтации с не революционными силами в Национальном Собрании."
ukraine_republican_events.111.a: "Он будет подотчётен Министерству экономики."
ukraine_republican_events.111.b: "Национальное Собрание сохраняет свою законодательную верховенство."

ukraine_republican_events.112.t: "Выбор председателя комитета" #WIP
ukraine_republican_events.112.d: "Следующий вопрос: кто станет председателем Комитета по экономическому развитию? Два наиболее перспективных кандидата разделены по партийным линиям, так что этот вопрос может стать более спорным, чем ожидалось.Павло Попов — один из ближайших людей Винниченко и давно состоит в С-РБ. Как и Винниченко, он был членом УСДРП, пока партия не раскололась на социал-демократическую и полностью социалистическую. Недавно его назначили главой управления землепользования в Юзовке, и он имеет большое влияние как сельскохозяйственный учёный. Несмотря на это, Попов считает процесс индустриализации решающим, и под его председательством Комитет по экономическому развитию, вероятно, сосредоточится на создании мощной промышленной базы.Микола Шрах — второй кандидат. Он был одним из первых членов Центрального комитета УПСР в 1917 году и уважаем за свои знания в области водного планирования, а также за свою работу преподавателем в [221.GetName]."
ukraine_republican_events.112.a: "Выбрать Попова."
ukraine_republican_events.112.b: "Выбрать Шраха."

ukraine_republican_events.112.a.tt: "§YРешения по индустриализации§! будут стоить на 5 политической силы §Gменьше§!, но §Yрешения по земельной реформе§! потребуют 20 политической силы §Rбольше§!."
ukraine_republican_events.112.b.tt: "§YРешения по земельной реформе§! потребуют 20 политической силы §Gменьше§!, но §Yрешения по индустриализации§! будут стоить на 5 политической силы §Rбольше§!."

ukraine_republican_events.113.t: "Ожидаемое разногласие"
 ukraine_republican_events.113.d: "It is a frequent tale that when socialists are not faced with overwhelming odds against reactionary forces, they quickly turn on each other. Historically, this has been the case in Ukraine as well, evidenced by the splits in the UPS-R and the USDRP during the Ukrainian Revolution.\n\nDespite the rather pluralistic nature of the new government, it was promised that the splintering and squabbling of the past would be put aside. The legacy of the disastrous Hetmanist administration would be swept aside in favour of a revolutionary socialist one, and the good of any party or faction would be put aside for the ultimate good: the good of the Ukrainian nation.\n\nBut it has been only a month since the revolutionary cabinet was assembled, and cracks have begun to show. The appointment of a R-RB Chairman of the Central Committee has shown many aspirations of \"leftist unity\" to be little more than a farce - several UPS-R and USDRP delegates protested the appointment, with some even claiming that the R-RB is planning an eventual takeover of the National Zbory as a whole. Regardless of the validity of such statements, it does not help the already divisive mood in the National Zbory. It is clear that the Workers' Democratic Union, noble as its goals may be, will have a difficult time actually succeeding when there are necessary compromises with liberals, an unenviable geopolitical situation, a powerful right-wing opposition, and clear party differences.\n\nWhatever the case may be, it is clear from these events that the Ukrainian socialist experiment will face many challenges, both internal and external. But perhaps we should remain hopeful. After all, we have fought hard for this electoral victory - naturally, we will fight even harder to fulfil the promises we made."
ukraine_republican_events.113.a: "Наверное, мы не ожидали, что всё будет легко..."
ukraine_republican_events.113.b: "Погоди-ка, кто все эти люди?"

ukraine_republican_events.114.t: "Преследование прошлого"
ukraine_republican_events.114.d: "Это действительно сложная задача — исправить два десятилетия разрушений, которые Гетман и его правительство нанесли обществу. Когда силы Удовиченко начали наступление на [202.GetName] и начали финальный штурм, был создан специальный комитет, чтобы привлечь к ответственности виновных за их преступления против украинского народа.Специальный комитет по расследованию преступлений украинского государства, как он официально называется, изначально состоял из депутатов Национального Собрания от разных политических направлений и продолжает состоять из них по сей день. Теоретически комитет должен быть беспристрастным, однако некоторые члены подверглись жестокой критике со стороны некоторых депутатов Национального Собрания — в частности, со стороны представителей URDP, которые служат в комитете.Поскольку URDP является меньшинством в Национальном Собрании, а комитет подчиняется последнему, было выдвинуто следующее предложение: члены комитета не могут быть членами гетманского "Государственного Сойма", чтобы избежать конфликта интересов, или принадлежать к политической партии, представленной в Нацсобрании. Практически это исключило бы членов URDP из состава комитета, а их места заняли бы делегаты из УСДРП, С-РБ или УПСР.Естественно, это предложение имеет далеко идущие последствия и вызывает большую полемику. Во время выборов левые партии изображали УРДП как тайных сторонников гетманизма, которые не были привержены революции, присоединившись к Антигетманскому восстанию на республиканской стороне только когда это стало удобно. Риторика — это одно, но ограничивать возможности политической партии только на основании её связи с этим периодом — совсем другое."
ukraine_republican_events.114.a: "Они всё равно предадут революцию однажды."
ukraine_republican_events.114.b: "Это слишком далеко зашло..."

ukraine_republican_events.115.t: "Суд над Присовским"
ukraine_republican_events.115.d1: "Для временного правительства, как у Украинской Народной Республики во время восстания, было ожидаемо, что будут допущены ошибки — восстановление бюрократии и реорганизация армии — это не мелкое дело. Однако вскоре после восстания временное правительство совершило свою величайшую ошибку, ошибку, которую Рабочий Демократический Союз стал сильно ненавидеть: помилование Присовского.\n\nЭто еще более тяжкое преступление со стороны погранично-бонапартистского режима Петлюры — не только помиловать Присовского, но и вновь интегрировать его в Народную Армию. Попытки скрыть действия Присовского во время восстания не увенчались успехом: есть ясные доказательства того, что Присовский отдал приказ о бомбардировке республиканского регионального штаба в Сарнах, что привело к гибели более ста человек. И тем не менее, несмотря на свои преступления, сегодня он — свободный человек. Многие правильно отмечают этот необоснованный гипокризис — ведь мы осудили Гетмана, не так ли?\n\nЗадача правительства Винниченко заключалась в том, чтобы осуществить правосудие для тех, кто был убит аморальными поступками Присовского. На сильно политизированном суде Присовский утверждал, что необходимо сделать все возможное, чтобы предотвратить "большевистский переворот", и что его политические связи на тот момент не были признаны незаконными до поражения Гетмана.\n\nТем не менее, в основном, его аргументы остались без ответа. Присовский был признан виновным в организации насилия со стороны государства против украинского народа, в приказах о казнях и других преступлениях — однако остается вопрос, насколько жестким должно быть наказание."
ukraine_republican_events.115.d2: "Для временного правительства, как у Украинской Народной Республики во время восстания, было ожидаемо, что будут допущены ошибки — восстановление бюрократии и реорганизация армии — это не мелкое дело. Однако вскоре после восстания временное правительство совершило свою величайшую ошибку, ошибку, которую Рабочий Демократический Союз стал сильно ненавидеть: помилование Присовского.\n\nЭто еще более тяжкое преступление со стороны погранично-бонапартистского режима Петлюры — не только помиловать Присовского. Попытки скрыть действия Присовского во время восстания не увенчались успехом: есть ясные доказательства того, что Присовский отдал приказ о бомбардировке республиканского регионального штаба в Сарнах, что привело к гибели более ста человек. И тем не менее, несмотря на свои преступления, сегодня он — свободный человек. Многие правильно отмечают этот необоснованный гипокризис — ведь мы осудили Гетмана, не так ли?\n\nЗадача правительства Винниченко заключалась в том, чтобы осуществить правосудие для тех, кто был убит аморальными поступками Присовского. На сильно политизированном суде Присовский утверждал, что необходимо сделать все возможное, чтобы предотвратить "большевистский переворот", и что его политические связи на тот момент не были признаны незаконными до поражения Гетмана.\n\nТем не менее, в основном, его аргументы остались без ответа. Присовский был признан виновным в организации насилия со стороны государства против украинского народа, в приказах о казнях и других преступлениях — однако остается вопрос, насколько жестким должно быть наказание."
ukraine_republican_events.115.a: "Этот палач не заслуживает пощады."
ukraine_republican_events.115.b: "Затаивание обид вредно. Дай ему более мягкое наказание."

ukraine_republican_events.116.t: "Финансирование польских социалистов"
ukraine_republican_events.116.t2: "Ставки в Варшаве"
ukraine_republican_events.116.d: "Политика Восточной Европы меняется. То, что когда-то было очагом в основном реакционных режимов, теперь содержит яркий социалистический пример в Украине, который многие обязательно будут следовать. В этом году несколько предсказывают еще один удар по полному германскому господству над его восточными клиентскими государствами в виде предстоящих польских выборов.\n\nПравление пронемецкого Интерпартизанского Круга, коалиция подчиненных короля Августа IV, несомненно столкнется с вызовом в остановке прогресса либеральной и социал-демократической коалиции Центролев. В течение многих лет эти левые активисты критиковали монархию и ее авторитарные прусские корни, а также обещали восстановить экономический порядок после «неумелого» управления кризисом Черного Понедельника.\n\nНо их борьба не наша. Несмотря на некоторые из их более благородных целей, Центролев действовал как парламентская оппозиция королю, подобно тому как буржуазное УРДП (достаточно сомнительно) пыталось свергнуть коалицию Гетмана несколько лет назад через выборы в Соим. Пока мы, по крайней мере, пытались вести войну с капиталистическими институтами через парламентские институты, вряд ли победа Центролева будет какой-либо выгодой для нас или поляков — они просто не имеют революционного пыла Рабочего Демократического Союза.\n\nТем не менее, как и в случае с УСДРП в ее лучшие годы, Польская Социалистическая Партия содержит значительное количество настоящих революционеров. Финансирование этих активистов, безусловно, будет большой помощью для мировой революции, а также для нас, и, возможно, это может вызвать восстание, которое растянется по всему востоку — от Черного моря до Балтики. Социалистическая солидарность и принципы в стороне, единственное мнение против заключается в том, что мы не можем полагаться на польских социалистов, которые находятся в совсем других условиях, чем мы. Плюс, разве у нас нет достаточно проблем дома?"
ukraine_republican_events.116.d2: "В этом году в Королевстве Польском должны состояться выборы, и поговаривают о том, что прогерманский межпартийный круг теряет власть. Оппозиционные партии, сконцентрированные вокруг республиканского центристского движения, неуклонно набирают силу.\n\nНаши отношения с королем Польши Августом IV, мягко говоря, непростые, в значительной степени из-за столкновений между войсками ВДД и польским гарнизоном, дислоцированным вблизи [93.GetName] во время антигетманского восстания. Режим, которым он управляет, почти во всех отношениях противоположен республиканскому идеалу - он является тем самым символом немецкого экономического и политического влияния на Польшу, каким Гетман был для Украины.\n\nЕстественно, [202.getName] рассматривает Центролев как гораздо более привлекательного партнера для работы, чем Короля. Планы дальнейшего сотрудничества между двумя демократическими крестьянскими республиками - Украиной и Беларусью - уже разработаны, и если Центролев придет к власти, эти планы могут распространиться и на Польшу.\n\nНекоторые проблемы между нашими двумя государствами могут сохраняться даже при наличии Центролев у власти, в частности, потенциальный раздел Галиции. Однако в противном случае нет особых причин не поддерживать их кампанию - и наши партнеры по коалиции оказали на нас давление, учитывая шансы на появление нового идеологического союзника и соседа."
ukraine_republican_events.116.a: "Наши борьбы едины!"
ukraine_republican_events.116.b: "Французы могут заняться такими делами..."
ukraine_republican_events.116.a2: "Сделайте заявление о поддержке Центролева."
 ukraine_republican_events.116.b2: "It's not our problem."

ukraine_republican_events.117.t: "Украина влияет на нашу политику"
ukraine_republican_events.117.d: "В последние дни активисты левого крыла ППС настойчиво призывают польский народ свергнуть свои 'буржуазные институты' и про-германский порядок, который продолжает угнетать страну. После некоторых расследований властей, похоже, что эта поддержка была переправлена через границу с Украины. Их радикально социалистическое правительство — удивительно, что оно все еще держится в Центральной Европе — вероятно, либо поддерживало такие действия, либо позволяло им происходить через неподготовленных пограничников. Нам остается только надеяться, что такого рода деятельность не продолжится."
ukraine_republican_events.117.d2: "Председатель Украинской Народной Республики, [UKR.GetLeader], недавно выступил с заявлениями в поддержку кампании Centrolew. Вероятно, из-за плохих отношений, которые сложились между Польшей времен Августа IV и новым правительством в [202.getName], они сейчас активно поддерживают оппозицию и дали понять, что были бы готовы сотрудничать с республиканской Польшей, придерживающейся аналогичных взглядов, в будущем, если это произойдет."
ukraine_republican_events.117.a: "Я понимаю."

ukraine_republican_events.118.t: "Критика с левого фланга"
ukraine_republican_events.118.d: "Сегодняшние разговоры о левой литературе касаются новой статьи, опубликованной лидером боротбистов Александром Шумским. Хотя некоторые изначально полагали, что боротбисты примут новое социалистическое правительство, статья Шумского показала обратное. Два раздела из нее особенно выделяются, в которых говорится следующее:\n\n\"Я бы поздравил товарища Винниченко с 'победой' на недавних выборах, если бы было что-то, достойное праздников, но, увы, единственное, что достигнуто этим 'спектакулярным' выступлением — это укрепление изъянов основ этой буржуазной республики. Видимо, прошлый опыт не научил товарища Винниченко ничему. Эта неспособность учиться на своих собственных ошибках должна показать всем, каким революционером является уважаемый Владимир Кирилович и какие перспективы ожидают украинское революционное движение под его руководством.\n\nВ 1925 и 1936 годах мы, коммунисты, сражались против Гетмана, не обращая внимания на отвратительные клеветы, которые мы получали от всех... мы были действительно преданы борьбе за свободную Украину. Мы не можем предложить толстовское непротивление злу — только продолжать безжалостно поддерживать социалистическое дело.\"\n\nПока что боротбисты не пытались активно подавить новое правительство, но недовольство Шумского им теперь известно и широко распространяется как одна из наиболее четко сформулированных критик со стороны левых."
ukraine_republican_events.118.a: "Посмотрим, как это будет."
ukraine_republican_events.118.b: "Что ты знаешь о руководстве, Александр Яковлевич?"

ukraine_republican_events.119.t1: "Дела, которые мы обязаны"
ukraine_republican_events.119.t2: "Белорусский вопрос"
ukraine_republican_events.119.d1: "С начала 1936 года Беларусь находится под властью деспотического реакционного правительства, возглавляемого [BLR.GetLeader] и его [BLR.GetRulingParty]. Про-германский переворот сверг законное правительство БСДП и разрушил многие свободы и демократические институты, которые последние тщательно внедряли на протяжении двух десятилетий.\n\nТаким образом, немногие были удивлены, когда многие видные члены БСДП и солдаты, поддерживавшие эту партию, оказались в западной Украине, как только началось Анти-Гетманское восстание. Естественно, так как их дело — дело свободной, демократичной, социалистической Восточной Европы — это и наше дело, эти белорусские эмигранты нашли себе новый дом в Украине. С конца восстания они организовали себя для защиты белорусских интересов в Украине — а также против их тиранического режима, публикуя статьи, осуждающие [BLR.GetLeader]'s соратников и надеясь, что однажды смогут вернуться в свой родной дом в безопасности.\n\nИменно эти действия и разгневали Минск. По словам белорусского министра иностранных дел, украинское правительство укрывает 'осужденных преступников', участвующих в 'sabotaже и терроризме', и потребовало от нас их экстрадиции.\n\nЭто явно неприемлемое и возмутительное требование. Продавать наших товарищей реакционным властям через границу было бы предательством наших принципов и народа, но, несмотря на это, некоторые поддерживают принятие этого требования. В их мнении это не вопрос принципов — это просто реальность, что если их правительство не получит того, что хочет, оно обратится к Германии, чтобы заставить нас поступить по-своему."
ukraine_republican_events.119.d2: "Совсем недавно, в разгар Анти-Гетманского восстания, белорусы встали на сторону украинского народа против Гетмана, когда никто другой этого не делал. Белорусская Народная Республика служила оплотом социального демократии в регионе Европы, в котором доминируют германские интересы и реакционные автократы, и с тех пор как наша революция увенчалась успехом, связи между нами лишь укрепились.\n\nИменно поэтому председатель Винниченко организовал поездку в Минск, чтобы отблагодарить белорусов за их помощь и укрепить связь между нашими двумя демокрациями. Там Винниченко выступил в Государственном Соиме, чтобы поздравить правящее правительство БСДП с их достижениями — и если бы не некоторые особые обстоятельства, эта поездка не имела бы ничего примечательного.\n\nТе особые обстоятельства касаются самого БСДП. Несмотря на то, что партия провозглашает себя светочем прогресса для молодого белорусского государства, она в значительной степени доминирует правыми тенденциями, которые не действительно стремятся к социализму, а их аграрная реформа, «План Серда», существенно затруднена увеличением компенсации землевладельцам. В некоторых случаях эти действия понимаемы — Германия не колебалась бы послать войска, если бы партия не сделала значительных уступок.\n\nЭти несчастные реалии совсем не служат нашим интересам, но БСДП все еще содержит значительное и влиятельное левое крыло, которое постоянно игнорируется в вопросах принятия решений. С слухами о сочувствующих на самых высоких уровнях, включая самого председателя Тарашкевича, есть потенциал сделать их более податливыми для настоящего социализма. Если мы подготовим необходимые средства и финансируем левое крыло настолько, насколько сможем — финансово или иначе — захват Беларуси, как начало нашей революции, будет очень дорогим предприятием, но чрезвычайно полезным, если оно будет успешным."
ukraine_republican_events.119.a: "Мы не подведем наших граждан, независимо от того, что думают иностранные державы."
ukraine_republican_events.119.b: "Примите их требования. Идеализм не приведет нас к успеху."
ukraine_republican_events.119.c: "Революция — это не вопрос денег, а моральных принципов!"
ukraine_republican_events.119.d: "Разве у нас нет достаточно проблем дома?"

ukraine_republican_events.120.t: "Народная партия в движении"
ukraine_republican_events.120.d: "'Винниченко пытается убедить вас, что главным врагом являются коварные силы капитала, но не заблуждайтесь: главный враг — в Москве! Подрывая наше правительство и внутренний порядок социалистическими революционными глупостями, они лишают нас силы перед российской угрозой'.\n\nПодобные пылкие речи произносил сам Михновский на последнем митинге УНП в Харькове. УНП Михновского добилась значительных успехов среди населения города, обеспокоенного угрозой российского вторжения, зная, что в случае войны они станут одной из первых целей.\n\nК сожалению, партия Михновского не распалась сразу, как мы надеялись. Обещание нового украинского будущего — не гетманистского и не социалистического — оказалось успешным посланием, и Михновский продолжает поездки по сельской местности и городам, укрепляя поддержку среди консервативных избирателей, готовых бросить вызов левым.\n\nЕще более тревожным является то, что Михновский установил связи с другими влиятельными консерваторами, которые все больше оставляют позади гетманистскую политику и присоединяются к УНП. Среди них такие личности, как Юрий Коллард, Иван Луценко и Опанас Андреевский — все они были сторонниками украинской независимости, открыто оспаривая влияние Рабочего Демократического Союза на национальную повестку.\n\nНачальный состав был позднее дополнен более молодой волной правых мыслителей и культурологов, таких как Евген Маланюк, Леонид Мосендз и особенно, Макар Кушнир. Известность работ Кушнира и способность УНП расширять свою базу поддержки за пределы долгосрочных 'ветеранов' национальной борьбы вызвали обеспокоенность в правительственных кругах."
ukraine_republican_events.120.a: "Организуем собственное мероприятие в ответ, покажем им, насколько они 'популярны'."
ukraine_republican_events.120.b: "Игнорировать этих некомпетентных дураков, что они когда-либо сделали, кроме как устраивали митинги?"

ukraine_republican_events.121.t: "Угрозы от армии"
ukraine_republican_events.121.d: "Помимо растущих связей УНП с крестьянской и городской базой, кажется, что пропаганда михновистов проникает и в армию.\n\nЕще с гетманистских времен контакты между правыми националистическими группами и видными военными — особенно в ЛУН — были обыденным делом, даже если это были изолированные инциденты или простые совпадения. В каком-то смысле это неудивительно. Хотя большинство армии оставалось аполитичным, некоторые военные круги видят свою роль в украинском государстве не только как аппарат безопасности, но и как защитника простого народа, более важного, чем любой Збор или Председатель.\n\nХотя ЛУН оставался в стороне от большинства высших военных чинов, вероятно, из-за их эзотерических и тоталитарных убеждений, эти военные круги нашли новое место среди УНП, где популистская риторика Михновского и приверженность армии как спасителю Украины нашли отклик у многих.\n\nВ частности, генералы Петр Болбочан и Владимир Оскилько, которые зарекомендовали себя как независимые и смелые личности, подхватили ту же риторику, что и УНП, и подчеркнули необходимость увеличения военных расходов для защиты от иностранных угроз. Сейчас в окружении Винниченко идет серьезная дискуссия, пытаются ли они просто вести пустую болтовню или это часть более широкой конспирации против Рабочего Демократического Союза и Народной Республики в целом?"
ukraine_republican_events.121.a: "Не стоит принимать меры, даже если такой заговор существует."
ukraine_republican_events.121.b: "Перевести этих двоих на другую должность, тогда они не будут представлять угрозу."
ukraine_republican_events.121.tt: "Так как мы не взяли фокус §YСпециальное бюро по военным вопросам§, эти события будут иметь §Rхудшие§! эффекты."

ukraine_republican_events.124.t: "Правосудие рабочих"
ukraine_republican_events.124.d: "Новый Совет Министров, утвержденный Зборами, обозначил возвращение одного из самых многообещающих людей С-РБ: Анатолия Писоцкого. Известный как марксист и бескомпромиссный человек, Писоцкий теперь занимает одну из самых могущественных должностей в правительстве.\n\nОн немедленно приступил к радикальной реорганизации Министерства внутренних дел — тех, кто имел связи с гетманистским правительством и множество сторонников Петлюры в переходной администрации, уволили, а на высокие посты были назначены люди с близкими связями с Писоцким, в основном ветераны из Антигетманского восстания и члены партии.\n\nКроме того, ссылаясь на возможность 'анти-республиканской деятельности' после выборов, Писоцкий также расширил Народное ополчение. Обычно Народное ополчение имеет гораздо более социалистические наклонности, чем армия, и многие из их лучших бойцов пережили худшее от гетманской власти, что стало ключевым фактором в их идеологическом развитии как силы, тесно связанной с Рабочим Демократическим Союзом.\n\nХотя те, кто действительно предан революции, признают многие его действия как необходимые, прошло не так много времени с момента учреждения народного правления. Слишком радикальные действия слишком быстро могут побудить Германию задуматься — или подчеркнуть раскол в нашей коалиции в целом."
ukraine_republican_events.124.a: "Его пост, его решения."
ukraine_republican_events.124.b: "Скажите Писоцкому немного успокоиться..."

ukraine_republican_events.125.t: "Нечего терять"
ukraine_republican_events.125.d: "Слово высшего порядка дошло до офиса Председателя Винниченко. Глава разведки Иван Литвиненко принес на стол Председателя документ с шокирующим откровением.\n\nНаписанный на немецком языке, документ — это запрос от Германского Министерства иностранных дел к Германской 6-й армии на 'обеспечение украинской лояльности'. В нем говорится, что операция должна быть проведена как 'быстро и гладко, как только возможно', чтобы ее последствия не сильно повлияли на немецкие военные усилия на востоке.\n\nДокумент детализирует, как будет проводиться эта операция:\n- Немецкие войска в украинской территории окружат Киев и Национальные Зборы.\n- Заставить кабинет Винниченко подать в отставку.\n- Назначить временное правительство, лояльное Берлину. Точные детали будут рассматриваться после обеспечения операции, но потенциальные союзники в УНП или восстановление гетманства рассматриваются как возможные.\n- Если будет признано абсолютно необходимым для обеспечения военного сотрудничества и экспорта зерна в Берлин, немецкий комиссар возьмет временный контроль.\n\nНе было времени решать, подделка ли это документ. Но было время действовать."
ukraine_republican_events.125.a: "И это время — сейчас!"

ukraine_republican_events.126.t: "Против партизанских расколов"
ukraine_republican_events.126.d: "Прошло два года с тех пор, как правительство Рабочего Демократического Союза пришло к власти. За это время многое было сделано — земельная реформа и индустриализация идут успешно, принято законодательство, защищающее рабочих, создана социальная сеть безопасности и многое другое.\n\nНо для того, чтобы все эти политики сработали, это было не просто вопросом принятия действий. С самого начала мы были разделены и должны были кооперироваться с менее радикальным партнером из УСДРП.\n\nТеперь, когда кажется, что многие более серьезные вопросы управления решены, мы можем только смотреть наружу. Российская агрессия не может и не будет терпима, но в конце концов, то же самое будет справедливо и для немецкого господства. Истинная свобода Украины неизбежна — и теперь мы должны неустанно работать для достижения этой великой мечты."
ukraine_republican_events.126.a: "За единство народа и партий!"
ukraine_republican_events.126.a.tt: "Механики §RDirection of the Workers' Democratic Union§! теперь §Yнеактивированы§!. Борьба не заканчивается здесь.\n\nКроме того, наша доминирующая фракция смогла укрепить себя как лидера Блока, что имеет последствия для того, как будет выглядеть наше правительство в конце борьбы."

ukraine_republican_events.127.t: "Начало конца"
ukraine_republican_events.127.d: "В Министерстве внутренних дел было зафиксировано серьезное осложнение: руководство УНП оказалось под следствием. Пока нет официального заявления от Писоцкого, можно только догадываться о причине расследования. УНП на данный момент является одной из сильнейших правых оппозиционных партий Рабочего Демократического Союза и, кажется, в попытке устранить их влияние, обвиняется в получении средств от иностранных разведок для дестабилизации украинского правительства.\n\nТемп расследований не случаен. Под псевдонимом Писоцкого 'Андрий Ричицкий' была опубликована новая статья в газете С-РБ, 'Нова Доба (Новая Жизнь)'. Статья под названием 'О проблемах общественного бдительности в эпоху развивающегося социализма' призывает к 'жестким мерам против контрреволюционных сил'. Несмотря на то, что Писоцкий всегда был жестким представителем С-РБ и Рабочего Демократического Союза, его язык в этой статье был воспринят как особенно агрессивный, даже по отношению к другим членам Союза."
ukraine_republican_events.127.a: "Наверное, это всего лишь слова... правда?"
ukraine_republican_events.127.a.tt: "Механики §RDirection of the Workers' Democratic Union§! теперь §Yнеактивированы§!."

ukraine_republican_events.128.t: "Тупик"
ukraine_republican_events.128.d: "Слово дошло до Национальных Зборов о новой инициативе Министерства внутренних дел. Для защиты от 'анти-республиканских мер' министерство подготовило законодательный пакет, который на практике исключает всех тех, кто служил в гетманистском режиме, не только от службы в Национальных Зборах, но и от госслужбы в целом.\n\nНа этом дело не закончено. Министерство внутренних дел также запросило расследование в отношении министра иностранных дел Марголина по обвинению в 'незаконном получении пожертвований от иностранных разведок' и коррупции. К сожалению для инициатив Писоцкого, такое предложение было быстро отклонено Национальными Зборами, при этом большинство из УПСР и УСДРП проголосовало против, и таким образом предложение не достигло необходимого двухтретих голосов.\n\nГнев охватил многих из жестких революционеров С-РБ и УПСР. В следующем законодательном заседании, когда был вынесен реформаторский закон о национализации земли, они мстили, проголосовав против этого предложения.\n\nНа данном этапе законодательные тупики стали чем-то привычным, но они становятся все более личными — линии уже не проводятся из-за серьезных соображений для хорошей политической работы, а из-за партийной линии."
ukraine_republican_events.128.a: "Мы должны это исправить, и как можно скорее."

ukraine_republican_events.129.t: "Смерть партии?"
ukraine_republican_events.129.d: "Когда многие важнейшие делегаты и министры С-РБ были вызваны на встречу, все взгляды были устремлены на Писоцкого. Немедленно Винниченко потребовал объяснений по поводу этих жестких мер, которые быстро разрушали всякую надежду на единство Рабочего Демократического Союза и создавали стойкий тупик в Национальных Зборах.Писоцкий защищал себя яростно. Как он уже объяснял в своей недавней статье, революционный импульс был утрачен, и его нужно было как-то вернуть. Дух Анти-Гетманского Восстания должен быть вновь направлен на народ — если этого не сделать, то С-РБ будет уничтожена, атаковавшая одновременно другие социалисты с левого фланга, такие как Боротбисты и УКП, и реформаторы справа. В такие трудные времена, когда Берлин внимательно следит за каждым шагом Украины и тайно замышляет против ее республиканских институтов, такая бдительность необходима для спасения революции.Винниченко ответил, повторив свое предыдущее заявление, открыто критикуя Писоцкого за то, что тот не обсудил эти меры с остальными членами партии и действовал слишком независимо, хотя ситуация требует компромисса.К сожалению для С-РБ, этот ответ оказался слишком снисходительным.На встрече представителей УПСР было решено раскрыть содержание заседания С-РБ, так как один из членов партии сообщил о происходившем. Хотя утечка была представлена в довольно предвзятой манере, теперь она угрожала самому существованию С-РБ: для всех, кто был в курсе, недостаток критики Винниченко по отношению к аргументам Писоцкого стал доказательством того, что С-РБ намерен разрушить коалицию и захватить полный контроль."
ukraine_republican_events.129.a: "Социалистическое единство было лишь мечтой, не так ли?"

ukraine_republican_events.130.t: "Конец Союза"
ukraine_republican_events.130.d: "С-РБ понесла еще один удар, когда в [221.GetName] была организована огромная митинг, на который собрались сторонники партии УСДРП, такие как Петлюра и Ковалевский. Мазепа поднялся на трибуну, чтобы воспользоваться новостями о утечке.Стремления к свободе и демократии лежат в самом основании нашего народного государства. Это именно та причина, по которой мы подняли оружие против Гетмана, когда никто не поддержал нас: потому что эти убеждения являются неотъемлемой частью украинского народа. Несмотря на все препятствия, мы совершили нашу революцию, зная, что нам предстоит столкнуться с огнем врага. Судьба Гетмана должна служить напоминанием всем, кто пытается подорвать наш демократический процесс, ибо если нам снова придется умереть, чтобы его спасти, мы не сомкнемся'.Пока Винниченко пытается защитить себя и опровергнуть содержание утечки, ситуация в С-РБ становится крайне серьезной. В последней отчаянной попытке сохранить лицо, Винниченко потребовал от Писоцкого уйти в отставку, утверждая, что Рабочий Демократический Союз можно спасти, если будет заключен глубокий компромисс с УСДРП.Но его усилия были напрасны. В полном ответе Писоцкий немедленно отверг требование Винниченко: время для компромиссов прошло. Только решительные действия могли спасти партию и будущее страны. Если это означает войну с Германией, то пусть так и будет — многолетняя борьба должна быть завершена, даже если для этого понадобится миллион жизней."
ukraine_republican_events.130.a: "Начинается противостояние."

ukraine_republican_events.131.t: "Последний гвоздь в гроб"
ukraine_republican_events.131.d: "Организация Народной Милитии не была легким делом, и время неумолимо шло. В первые часы так называемого 'Второго Восстания', по приказу Писоцкого Народная Милития собрала оружие и готовилась к решающей битве с гарнизоном [202.GetName]. Мало кто на самом деле понимал, за что они сражаются, и покинули попытку захватить армию едва ли не сразу, как только приказ был отдан.Когда Народная Милития подошла к гарнизону и был отдан приказ открыть огонь, началась перестрелка, но дело не длилось долго. Не сумев стрелять по своим соратникам, многие из которых также участвовали в Анти-Гетманском Восстании, великий 'Марш на [202.GetName]' продлился не более двенадцати часов.Когда армия начала разоружать Народную Милитии, был выписан ордер на арест Писоцкого и его союзников из Министерства внутренних дел. Тем временем Винниченко вел напряженные переговоры с УСДРП. Он искренне утверждал, что сделал все возможное для спасения ослабленной коалиции, но продолжал подвергаться критике за отсутствие реплики на аргументы Писоцкого ранее, что только дало еще один повод для исполнения этого беззаконного переворота. Тем не менее, они пришли к соглашению: в обмен на отставку Винниченко как председателя ему удастся избежать расследований по этому делу.Временный председатель Христьюк пробыл на посту всего день. На голосовании за недоверие, в котором почти единогласно проголосовали умеренные фракции УПСР и УСДРП, Исаак Мазепа был приведен к присяге как новый председатель страны.Обещания Мазепы исцелить недавно открытые раны в Национальных Зборах получили некоторое внимание, но в конечном итоге можно сказать, что вся эта беспорядочная история посеяла большие сомнения в легитимности Народной Республики. Что может существовать теперь, может быть более устойчиво, чем правительство Гетмана, но будет ли восстановлена вера в демократию после такого инцидента?"
ukraine_republican_events.131.a: "Лучше задать вопрос: заслуживает ли она этого?"

ukraine_republican_events.132.t: "Фракции Рабочего Демократического Союза"
ukraine_republican_events.132.d: "Рабочий Демократический Союз состоит из двух крупных партий: УПСР (Украинская партия социалистов-революционеров), возглавляемой в основном Никифором Григориевым, Павлом Христьюком и Николаем Ковалевским, и С-РБ (Советско-Революционный Блок), возглавляемой в основном Владимиром Винниченко, Владимиром Чехивским и Анатолием Писоцким.УПСР подчеркивает украинскую деревенскую общину как естественную форму народной организации. В 1917 году партия пережила несколько расколов — один из которых стал основой для Боротбистов, которые сегодня отделены от основной партии УПСР. Первая остается популистской и ориентированной на крестьянство, в то время как Боротбисты приняли более марксистскую точку зрения, значительно сместив свой фокус на промышленный пролетариат.Сегодня УПС-Р можно грубо разделить на две фракции, умеренную и радикальную, которыми в основном руководят Ковалевский и Григориев соответственно. Идеологические различия между ними незначительны, но в отличие от радикалов, умеренные УПСР, как правило, считают возможное восстание против Германии преждевременным и предпочитают работать в рамках социализма, применяя прагматизм в немецкой сфере. Они также считают коалицию с УСДРП желательной, особенно по сравнению с их более радикальными коллегами.С-РБ имеет корни в левом крыле УСДРП, обладая программой советского коммунизма и коллективной собственности на средства производства. Мнения в партии по поводу частной собственности разнятся: умеренные, возглавляемые самим Винниченко, высказали свою поддержку ограниченной частной собственности, в то время как радикалы, возглавляемые Писоцким, полностью против этого и сохраняют более строгий контроль за управлением партией. Помимо этих идеологических отличий, умеренные и радикалы в партии расходятся в плане направления, которое Союз должен выбрать в целом, при этом радикалы предпочитают жесткие меры для защиты Блока от внешнего вмешательства и внутреннего разногласия, а коалицию с УСДРП рассматривают с большой подозрительностью."
ukraine_republican_events.132.a: "Я уже вижу, у нас есть отличная формула для левого единства!"

ukraine_republican_events.133.t: "Обещание, которое так и не было выполнено"
ukraine_republican_events.133.d: "С ужасами войны, оставшимися позади, вопрос о перенесенных выборах становится все более актуальным с каждым днем. Электральные перспективы не выглядят особо яркими для правящей коалиции — несмотря на многочисленные успехи, оппозиция сумела оправиться от поражения 1937 года, используя различные недостатки правительственных реформ последних лет и неизбежные ошибки правления во времена войны в свою пользу. Внутренние разногласия в социалистическом альянсе, которые уже длительное время разрывают его целостность, также не помогают.На фоне этого лидер Боротбистов Александр Шумский опубликовал еще одну статью, направленную против Рабочего Демократического Союза. Его вывод был достаточно прямолинейным.Глубоко реакционный характер так называемого "Рабочего Демократического Союза" был очевиден для любого с хоть малейшим здравым смыслом с самого начала. Несмотря на нескончаемое повторение пустых обещаний и призывов к демократической революции, на самом деле все они не имели большего значения, чем марксистский лозунг о переходе к социалистической революции. С самого начала С-РБ никогда не собирался по-настоящему защищать демократические права трудового народа, скорее, он был призван захватить власть и подчинить себе каждого, кто сопротивляется этой жестокой и некомпромиссной борьбе'.Готов ли народ восстать и снова пройти сквозь огонь? Бороться ли за этот справедливый процесс?"
ukraine_republican_events.133.a: "Обещание не было выполнено."

UKR_prepare_for_germany_tt: "§YПри выборе§!:\n§YГермании§! не понравятся такие радикальные политики. §RПодготовьтесь защищать свои интересы.§!"
ukraine_republican_events.134.t: "Катастрофа Миттельевропы"
ukraine_republican_events.134.d: "В новом эпизоде германского империалистического вмешательства в наши дела, немецкий посол в Украине Иоганнес фон Вельцек потребовал прямой встречи с председателем Винниченко. Обычно дипломатические сообщения между Германией и Украиной обрабатываются министром иностранных дел Марголином, так что этот случай вызывает особое беспокойство.\n\nВельцек и Винниченко пока что поддерживали относительно добрососедские отношения, несмотря на свои идеологические различия, так как Вельцек известен как антикоммунист. Несмотря на эти различия, Вельцек сообщил, что Берлин крайне обеспокоен новыми трудовыми законами, принятыми новым правительством. Эти новые законы, по его словам, осложняют работу немецким компаниям в Украине. Он даже поставил под сомнение законность таких мер: законы Миттелеуропы предписывают, что в любой стране-члене следует свободно вести бизнес.\n\nВинниченко не ведет переговоры на равных условиях. Тем не менее, любой здравомыслящий социалист понимает, что наша законодательная защита украинского рабочего имеет первостепенное значение, особенно после многих лет правления Гетмана, который постоянно продавал пролетариат промышленникам в Протофисе. Возможно, уступки в других областях заставят их отказаться от этих абсурдных требований - или мы можем просто признать, что у нас нет выхода из этой ситуации."
ukraine_republican_events.134.a: "Похоже, так оно и есть."
ukraine_republican_events.134.b: "Может, мы сможем заключить более выгодную сделку?"
UKR_socialisation_no_buff_tt: "Мы §Rбольше не§! получим лучших результатов от фокуса §YСоциализация Земли§!, даже если §RУПСР§! §oРадикалы§! доминируют."

ukraine_republican_events.135.t: "Подозрительные симпатии"
ukraine_republican_events.135.d: "Требования фон Вельцека не ограничились вопросами, связанными с Миттелеуропой. Следующий вопрос касался безопасности. По словам фон Вельцека, немецкая служба безопасности Абтельюнга III выявила «подозрительные симпатии» у некоторых представителей украинского правительства, многие из которых принадлежат партии Винниченко.\n\nХотя Вельцек не обвиняет Винниченко напрямую, он намекает, что такие личности представляют собой серьезную угрозу как для Германии, так и для Украины. Если у них действительно есть связи с Парижем, то утечка военных документов Рейхспакта в Третью Интернационалу не только возможна, но и вероятна.\n\nЭти заявления сопровождаются требованием от Вельцека: Украина должна опубликовать заявление с осуждением Третьей Интернационалы и ее приспешников, а также гарантировать, что эти радикальные политики либо будут максимально маргинализованы, либо исключены из партии.\n\nСнова Винниченко оказался в сложной ситуации, так как полная реорганизация Союза не только будет катастрофической, но и трудной, ведь, вероятно, только С-РБ окажется подвержена таким действиям, учитывая руководство Винниченко. Но может быть еще способ избежать этих необоснованных требований Германии?"
ukraine_republican_events.135.a: "Уверяю вас, фон Вельцек, это называется коллектократия, а не коммунизм."
ukraine_republican_events.135.b: "Давайте сделаем неопределенные обещания, но ничего не предпринимать."
ukraine_republican_events.135.c: "...хорошо."

ukraine_republican_events.136.t: "Протесты в Черкассах"
ukraine_republican_events.136.d: "Расследования против гетманистских чиновников продолжаются уже некоторое время. Особенно высокопрофильные фигуры, такие как сам Скоропадский и Присовский, были осуждены за свои преступления, а большинство оставшихся дел касается местного уровня. В последнее время расследования касаются не только УДХП или бывших членов УСКД и ШД, но и некоторых представителей УНП. Ведь их лидер Михновский работал в гетманистской системе и ранее был кандидатом на лидерство в УДХП.\n\nХотя расследования в отношении УНП вызвали протесты местной партии, которые заявляют, что их преследуют Комитет, эти протесты пока не нашли большого отклика или внимания. Все изменилось, когда против одного из представителей УНП было открыто расследование.\n\nВ гетманистском правительстве Макар Кушнир был независимым делегатом в Сойме, имеющим связи как с правым крылом УРДП, так и с популистами (теми, кто был связан с Михновским) в УДХП. Сегодня, в республиканскую эпоху, он становится восходящей звездой УНП. Его решение перейти на сторону республиканцев в начале Анти-Гетманского Восстания позволило ему стать частью делегации Шульгина в Берлине, где Шульгин и другие либеральные политики вели переговоры с Германией от имени ВДР во время восстания. После того как восстание было успешно завершено, Кушнир не баллотировался на выборах 1937 года, а получил известность через местное законодательство в Черкассах.\n\nКроме того, он представляет УНП в местном земельном совете Черкасс и работает в Комитете по внешним делам УНП. Все эти факторы сделали его восходящей звездой в УНП, возможно, представителем нового поколения украинских консерваторов, не связанных с гетманистами.\n\nПротесты против расследования были спокойными, и, вероятно, Кушнир будет оправдан, так как против него нет убедительных доказательств."
ukraine_republican_events.136.a: "Понимаю."

ukraine_republican_events.137.t: "Член УНП арестован по обвинению в измене!"
ukraine_republican_events.137.d: "В Черкассах произошла неожиданная эскалация ситуации, поскольку только вчера Макар Кушнир был арестован полицией и обвинен в измене.\n\nЭти обвинения исходят от его прошлой работы в качестве гетманистского разведчика, так как он был якобы завербован из-за своих связей с некоторыми представителями республиканского движения. Эти связи, по обвинению, позволили ему infiltrировать делегацию Шульгина в Берлине как гетманистского шпиона и передавать информацию обратно в [202.GetName] с целью саботировать делегацию. Даже сейчас, по словам обвинения, Кушнир может быть связан с преступными гетманистскими эмигрантами, которые покинули Украину после успешного восстания.\n\nУНП утверждает, что ситуация как раз противоположна. По их словам, Кушнир работал как двойной агент республиканцев, будучи завербованным гетманистами как шпион, но на самом деле работал на республиканцев.\n\nТем не менее, арест Кушнира сильно обострил ситуацию не только в Черкассах, но и по всей стране. Хотя обычно УНП были бы единственными, кто выступает против этой «тирании», значительная часть УРДП выразила поддержку Кушниру, включая самого Шульгина, который теперь активно защищает роль Кушнира в своей делегации.\n\nОднако не все республиканцы поддерживают делегацию Шульгина. Для Революционного Блока делегация Шульгина не имела права вести переговоры от имени всего ВДР, особенно учитывая их теперь меньшинственное положение в Национальных Зборах - да и кто знает, какие безумные уступки УРДП могли сделать немцам в самом начале? Но именно недоверие к этому привело к тому, что УРДП активно защищает Кушнира, опасаясь, что вся делегация может быть обвинена в измене."
ukraine_republican_events.137.a: "Все стало сложным внезапно..."

ukraine_republican_events.138.t: "Выход из этого беспорядка"
ukraine_republican_events.138.d: "В руководящую коалицию поступила информация, что, из-за отсутствия доказательств, скорее всего, Кушнир будет оправдан. Это само по себе не является поражением для Блока, но есть опасения, что продолжающиеся протесты могут привести к поражению. УРДП и УНП продемонстрировали беспрецедентную солидарность, сотрудничество, которое когда-то казалось невозможным, несмотря на социалистическое доминирование в Национальных Зборах. Разделенные, они не представляют угрозы для Блока, но они могут стать серьезной угрозой, если преодолеют свои разногласия.\n\nПисоцкий, вместе с его союзниками, предостерегает от того, чтобы сейчас «подарить победу» УНП, когда они находятся на пике своей популярности, так как это может быть катастрофически для правящей коалиции. Вместо этого они предложили сообщить УРДП в целом, что они не будут, и не будут, являться целью расследований Специального Комитета — и перенаправить внимание с делегации Шульгина на «иностранные контакты» УНП. По словам Писоцкого, имеются разрозненные данные о том, что УНП получала большие пожертвования от зарубежных, реакционных сил. Как член Комитета по внешним делам УНП, вполне возможно, а может и вероятно, что, если эти данные подтвердятся, Кушнир окажется замешанным.\n\nС другой стороны, некоторые считают, что затягивание расследований является ненужным и будет восприниматься как продолжение преследования со стороны правых. Может быть, для Блока лучше всего просто отпустить этот вопрос, поскольку, вероятно, УНП не так сильна, как это представляли некоторые в коалиции, и протесты спадут, как только Кушнир будет оправдан."
ukraine_republican_events.138.a: "Затянем расследования, посмотрим, к чему это приведет."
ukraine_republican_events.138.b: "Просто отпустите этот вопрос, это не стоит того."
ukraine_republican_events.138.a.tt: "Имейте в виду текущую §Cдоминантную фракцию§! при принятии решения о том, какой результат будет."

ukraine_republican_events.139.t: "Кушнир оправдан"  # Радикальная версия
ukraine_republican_events.139.d: "В конце концов, Кушнир был оправдан по всем обвинениям, поскольку его связи с возможными иностранными пожертвованиями в пользу УНП не удалось доказать. Однако после того как УРДП было успокоено, похоже, что возможный альянс между УРДП и УНП был предотвращен. Протесты в значительной степени иссякли, как и расследование в глазах общественности.\n\nХотя УНП празднует победу, кажется, что этот результат только доказал Писоцкому — и многим другим, что Рабочий Демократический Союз может быть более смелым в своих желаниях и все равно выходить победителем."
ukraine_republican_events.139.a: "Думаю, это хороший результат!"
ukraine_republican_events.139.b: "Бессмысленно? Это было совершенно необходимо!"

ukraine_republican_events.140.t: "Кушнир оправдан"  # Умеренная версия
ukraine_republican_events.140.d: "В конце концов, Кушнир был оправдан по всем обвинениям, поскольку его связи с возможными иностранными пожертвованиями в пользу УНП не удалось доказать. Однако после того как УРДП было успокоено, похоже, что возможный альянс между УРДП и УНП был предотвращен. Протесты в значительной степени иссякли, как и расследование в глазах общественности. Похоже, что решение просто позволить проблеме исчезнуть само собой оказалось выгодным для Блока, и возможный кризис был предотвращен."
ukraine_republican_events.140.a: "Пока мы контролируем нарратив, нас ничто не разорвет."
ukraine_republican_events.140.b: "Разобщенность в моменты, когда это требуется, никогда не может привести к хорошему..."

ukraine_republican_events.141.t: "Национальные Зборы распущены"
ukraine_republican_events.141.d: "Финальная война за независимость Украины и свободу от иностранного угнетения дала возможность Рабочему Демократическому Союзу положить конец Национальным Зборам, которые, хотя и были полезны в моменты для легитимизации его целей, позволяли правым заговорам плести интриги против Блока. В особенности последние несколько лет УНП создавали проблемы. Парламентская перебранка и анти-революционная активность не могут продолжаться так, как раньше.\n\nПодавляющее большинство членов Союза, от радикалов из лагеря Писоцкого до умеренных из лагеря Ковалевского, объединились, чтобы проголосовать за последний акт Национальных Зборов, который был принят с легкостью. Чтобы предотвратить предательство революции и устранить фракционализм ради войны, а также для продвижения интересов революции в целом, Национальные Зборы должны быть распущены.\n\nАкт гласит, что Зборы будут заменены или изменены в ближайшем будущем, как только ситуация стабилизируется. Несмотря на протесты правых и либералов, они бессильны противодействовать акту. Тем не менее, вопрос о том, чем будут заменены Национальные Зборы, остается открытым. Популярное предложение — создание 'Трудового Конгресса', где места в конгрессе будут поделены между представителями крестьян, рабочих и трудовой интеллигенции."
ukraine_republican_events.141.a: "Нам нужно выиграть войну, чтобы выиграть мир."
ukraine_republican_events.141.a.tt: "Как только мы победим в мировом конфликте, наш §послевоенный контент§! будет разблокирован."

ukraine_republican_events.142.t: "Остатки Первой Революции"
ukraine_republican_events.142.d: "Роль Михаила Грушевского в истории современной Украины едва ли можно переоценить. Историк по профессии, он был одним из тех, кто значительно развил интеллектуальную основу украинского национального дела. Его вклад был не только научным: в 1917 году Грушевский был избран главой Центральной Рады — парламентского органа новой Украинской республики. В этот период он установил прочные связи с Украинской партией социалистов-революционеров. Он активно участвовал в разработке украинской конституции и даже современные административные деления Украины отчасти основаны на его идеях.\n\nПосле гетманистского переворота Грушевский покинул Украину и переехал во Львов, где постепенно отошел от политики, сосредоточив внимание на исторических исследованиях. Возможно, решающую роль в этом сыграло то, что украинское национальное движение становилось все более разделенным, с большой частью, принимающей гетманистский режим, а изгнанники погрязли в мелких раздорах. Когда в 1923 году он получил приглашение от Украинской академии наук вернуться в Украину и продолжить свою научную работу, он, возможно, неожиданно согласился.\n\nТеперь, с восстановлением республики, положение Грушевского стало необычным. Радикалы рассматривают его как мелкого интеллектуала, который легитимировал преступный режим своими действиями. Несмотря на то что Грушевский не упускал случая критиковать его за излишества, в их глазах это создавало ложное впечатление плюрализма, только поддерживая его существование. Однако многие утверждают, что он неоднократно привлекал общественное внимание к ошибкам бывшего режима и, в конце концов, кто, если не он, был лучше подготовлен, чтобы защищать украинскую историческую науку от гетманистского ревизионизма?\n\nНа данный момент, похоже, что с тем, как уважаемый ученый начинает получать положительное внимание со стороны властей, его противники вынуждены оставить его в покое."
ukraine_republican_events.142.a: "Сложные времена, сложная судьба..."

ukraine_republican_events.143.t: "Наследие Председателя"
ukraine_republican_events.143.d: "Наконец, все завершено. Обет, данный Рабочим Демократическим Союзом — завершить Революцию, начавшуюся с падения Гетманщины — исполнен. После многих лет борьбы Украина больше не связана с Германской империей и теперь может сосредоточиться исключительно на движении к социализму.\n\nМногое изменилось за эти годы. Со временем власть была медленно децентрализована к крестьянским и рабочим советам по всей стране, которые все больше несут ответственность за местные и региональные дела и во многом определяют состав Трудового Конгресса. Этот процесс продолжится, когда военные меры, надеемся, станут ненужными в ближайшем будущем. Даже сейчас украинская политика несет отпечатки этой трансформации. Верно, что Совет-Революционный Блок остается у руля власти, а социалисты-революционеры являются их в основном конструктивными партнерами, как это было раньше. Но за пределами самых базовых динамик ситуация совершенно изменилась: часто провинциальный характер советов дал rise в куклы местных фракций и депутатов, не аффилированных с С-РБ, УПСР, или даже с остаточной оппозицией УСДРП. Политические интриги теперь в значительной степени сосредоточены вокруг них, так как их выравнивание колеблется между поддержкой и противодействием двух ведущих партий, и временные альянсы между различными силами постоянно возникают и распадаются. Трудовой Конгресс неизменно является местом оживленных дебатов.\n\nНекоторые в С-РБ с тоской смотрят на состояние дел, считая, что этот хаос только вредит социализму и опасен для положения партии в долгосрочной перспективе — но председатель Винниченко утверждает, что в стране сейчас существует 'здоровая политическая конкуренция' и что партия должна терпимо относиться к ее развитию.\n\nВ это время, тем не менее, многие критики считают, что виной происходящему являются не политические дебаты, а тот факт, что власть в стране так сильно рассеяна между провинциями. Слишком много времени прошло с падением Гетманщины, и теперь Винниченко и его коллеги пытаются решить, что такое социальное устройство." 
ukraine_republican_events.143.a: "Работа продолжается!"

ukraine_republican_events.144.t: "Вознесение Рабочей партии"
ukraine_republican_events.144.d: "Наконец-то это завершено. Обет, данный Рабочим Демократическим Союзом — завершить Революцию, начавшуюся с падения Гетманщины — выполнен. После многих лет борьбы Украина больше не связана с Германской империей и теперь может сосредоточиться исключительно на движении к социализму.\n\nМногое изменилось за эти годы. Советы крестьян и рабочих получили определенные государственные полномочия и в конечном итоге определяют состав Трудового Конгресса. Однако Советы-Революционеры приложили немало усилий, чтобы обеспечить себе максимально возможное присутствие и влияние в советах, а значит, и доминирующее положение как внутри Конгресса, так и за его пределами. Таким образом, партия утверждает гегемонию в украинской политике, опираясь на свою собственную силу и на поддержку со стороны Коммунистической партии. Сам Р-ДБ пережил значительные изменения: председатель Винниченко был отстранен, и вместо него в качестве высшего руководящего органа партии был избран Президиум, состоящий из членов партии. Он принимает решения по важнейшим вопросам, которые затем становятся основой партийной политики, которую все члены обязаны поддерживать без исключений. Это напоминает то, что большевики называли демократическим централизмом.\n\nНесмотря на это, Народная Республика пока не может считаться партийным государством. Р-ДБ не имеет полного контроля над Трудовым Конгрессом или советами, и другие фракции по-прежнему играют роль сдерживающих факторов. Социалист-Революционеры, хоть и ослаблены, по-прежнему существуют наряду с более мелкими группами, которые нашли опору благодаря успеху в советах. Хотя эти внешние фракции поощряются к сотрудничеству, Р-ДБ не может заставить их работать вместе, а их партийные комитеты еще не вытеснили исполнительную власть Республики в реальном осуществлении политики. Что касается архитектора подъема Р-ДБ, то он не стремится к принуждению. Анатолий Писоцкий — Первый Народный Министр Республики, Первый Секретарь Президиума Р-ДБ и настоящий лидер партии — уверен, что это временное явление. Со временем необходимость в различных партиях исчезнет, и все действительно прогрессивные силы естественно объединятся в одно целое. Принуждение к этому лишь создаст реакционную оппозицию — со временем материальные условия сами подскажут решение.\n\nВремя покажет, прав ли он."
ukraine_republican_events.144.a: "И вот мы идем, к концу истории."

ukraine_republican_events.145.t: "Путь, прорубленный серпом и косой"
ukraine_republican_events.145.d: "Наконец-то это завершено. Обет, данный Рабочим Демократическим Союзом — завершить революцию, начавшуюся с падения Гетманщины — выполнен. После многих лет борьбы Украина больше не связана с Германской империей и теперь может сосредоточиться исключительно на движении к социализму.\n\nМногое изменилось за эти годы. Со временем власть была постепенно децентрализована на крестьянские и рабочие советы по всей стране, процесс, который, вероятно, ускорится, когда военные меры станут ненужными. Реальность демографической ситуации Украины такова, что крестьянские советы намного многочисленнее и важнее рабочих, и без специальных мер ситуация останется таковой — что вполне устраивает власти. Эти советы имеют некоторое влияние на состав Трудового Конгресса, что способствует поддержанию его пролетарского характера. Но в остальном Конгресс остался удивительно близким к тем Зборам, которые он заменил: центр системы, напоминающий традиционный парламент. Таким образом, даже Радикальные Демократы смогли пробиться в Конгресс, хоть и на весьма маргинальной основе.\n\nСоциалист-Революционеры, во главе с их радикальными компонентами, сформировали эти события и теперь стоят в центре нового революционного порядка. Пост председателя был передан от Владимира Винниченко человеку С-Ров, Никифору Григорьеву. Теперь правительство возглавляет Первый Народный Министр Павел Христюк, человек, наиболее ответственный за восхождение партии. Под его руководством Боротысты были приведены в революционный лагерь, и их аграрное крыло активно сотрудничает с правительством, ориентированным на крестьян. Р-ДБ была в значительной степени вытеснена своими бывшими партнерами, но по-прежнему конкурирует с коммунистами за рабочие избирательные округа, где она занимает роль конструктивной оппозиции, в отличие от радикальной оппозиции коммунистов. Разница между их электоратами в основном заключается в том, верит ли избиратель в сотрудничество с сельскими районами или считает, что они были ими оставлены.\n\nС-Ры не так считают. Крестьянство почувствовало тяжесть гетманского гнета, и на полях Украины были посеяны семена революции — кто сказал, что они не должны быть теми, кто их пожнёт?"
ukraine_republican_events.145.a: "Чёрт возьми, урожай хороший."

ukraine_republican_events.146.t: "Эволюция и Революция"
ukraine_republican_events.146.d: "Наконец-то это завершено. Обет, данный Рабочим Демократическим Союзом — завершить революцию, начавшуюся с падения Гетманщины — выполнен. После многих лет борьбы Украина больше не связана с Германской империей и теперь может сосредоточиться исключительно на движении к социализму.\n\nМногое изменилось за эти годы... и всё же, некоторые скажут, что на самом деле мало что изменилось. Крестьянские и рабочие советы медленно получают полномочия от центрального правительства и, вероятно, получат больше, когда военные меры исчезнут. Эти советы имеют некоторое влияние на состав Трудового Конгресса, чтобы сохранить его пролетарский характер — но те, кто ожидал более революционной замены Зборов, в целом разочарованы. Конгресс по-прежнему управляется достаточно традиционным парламентским способом, а правительство не проявляет особого интереса к преследованию буржуазии и «ревизионистской» левой, что даёт место для существования Социалистической партии вместе с левыми, а радикальные демократы иногда могут войти через места, предназначенные для «трудовой интеллигенции». Даже среди крестьянских советов — которые значительно превосходят рабочие по численности — иногда можно встретить удивительно консервативных независимых представителей, что вызывает шок и ужас.\n\nНесмотря на некоторые напряжённые отношения, многие из этих прогрессивных сил действительно смогли установить рабочие, хотя и порой шаткие, отношения друг с другом. Винниченко в конце концов был заменён на посту председателя на Никифора Григорьева из УПСР, но настоящим организатором этой гармонии стал Первый Народный Министр Николай Ковалевский. Возглавляя умеренных социалистов-революционеров, он сохранил баланс между силами революции и эволюции и достиг примирения между фракциями, одновременно маневрируя, чтобы поставить С-Ров в лидирующую позицию в Конгрессе. Вместе с Социал-Демократами С-Р теперь возглавляют народный фронт, состоящий из них и СРБ, в то время как коммунисты выступают основными антагонистами системы.\n\nБудет ли этот статус-кво долгосрочным — вопрос открытый. Некоторые предсказывают, что фронт не выдержит; что Конгресс в конечном итоге будет захвачен более революционными элементами — или проникнут реакционными силами, что приведет к его подрыву изнутри. Но это будущее: а пока что революционный период продолжается."
ukraine_republican_events.146.a: "Ведь мы все сильнее вместе."

ukraine_republican_events.147.t: "Беспокойное будущее"
ukraine_republican_events.147.d: "С исчезновением повседневных проблем управления российская угроза, кажется, становится реальностью. Наше разведывательное управление, АПДМВС, обнаружило значительное российское сосредоточение войск на украинской границе со всех сторон, что вызывает опасения, что их обещания отказаться от Брест-Литовского мира могут быть реализованы скорее, чем мы думали.\n\nРеакция председателя Винниченко была типичной: он осудил империалистскую ментальность России по отношению к Украине и призвал Москву отказаться от своих глупых амбиций, которые навредят не только украинцам, но и россиянам, поскольку украинцы будут бороться до последнего, чтобы сохранить суверенитет своей страны. Его риторика в отношении Германии сменилась на более примирительный тон, даже подчёркивая немцев как надёжных партнёров по обороне.\n\nПублично такие заявления хорошо воспринимаются немцами, и недавно они стали менее склонны требовать от нас бесконечных уступок, чтобы мы могли сохранить наше правительство. В более скрытых встречах с его кабинетом стало очевидно, что когда-то Украина должна полностью разорвать связи с Миттелевропой. Несмотря на кажущуюся невозможность этого шага, Винниченко заявил, что его нужно осуществить, независимо от всего.\n\nМинистр сельского хозяйства Николай Ковалевский выразил мнение, не согласное с анализом Винниченко. Главной угрозой для украинской независимости всегда будет Москва, объяснил он. Отказ от Германии даст Рабочему Демократическому Союзу полное господство в политической системе, но лучше попытаться выиграть будущие выборы, даже если Германия останется влиятельной. Ведь так много уже сделано — переизбрание блока, конечно же, неизбежно. Христюк и Писоцкий воспользовались случаем, чтобы атаковать заявление Ковалевского, указав, что Германия будет вмешиваться в дела Восточной Европы так, как посчитает нужным, и даже если блок будет переизбран, кайзер использует все средства, чтобы противостоять правительству, которое они явно считают укрывающим сторонников Интернационала.\n\nВ конце концов Винниченко пришлось успокоить кабинет, но спор только подчеркнул, как разделено правительство по этому вопросу. Тем не менее, такие распри не могут длиться долго, когда появится возможность — решение должно быть принято, и оно должно быть принято скоро."
ukraine_republican_events.147.a: "Последний акт революции зовёт."

ukraine_republican_events.148.t: "В память о товарище Шаповале"
ukraine_republican_events.148.d: "Немногие могут претендовать на такую же влиятельность в украинских национальных и социальных движениях, как один Николай Шаповал. Родился под Бахмутом в Донбассе, Шаповал в начале своей жизни в основном ограничивался деятельностью в родном регионе. Его революционная кампания приобрела новый поворот, когда он перебрался в Харьков, где начал официально вступать в украинские подпольные организации, включая первые ячейки будущей УПСР. С продвижением дорогого товарища Шаповала по стране, рос и его статус в украинских политических кругах. К моменту революционных событий 1910-х годов, Николай Шаповал был одним из ведущих революционных социалистов и национальных освободителей всей Украины.\n\nХотя он не был подавлен после реакционного переворота Гетмана Скоропадского, товарищ Шаповал немедленно принялся за организацию украинских левых и республиканских партий для координации восстания против Гетмана в наиболее удобный момент — трагически, этот момент не наступил так скоро, как бы он хотел. Столкнувшись с неминуемыми репрессиями, Николай Шаповал, а также его товарищи из УПСР и УСДРП пересекли границу и начали организовываться в австрийской Галиции. После долгих размышлений, в изгнании центральный комитет УПСР выбрал Николая Шаповала на пост председателя партии. Не теряя надежды увидеть падение угнетающего режима Гетманщины, товарищ Шаповал оставался очень активным в аналитической и полемической работе, а также в партийной деятельности УПСР.\n\nТаким образом, великая трагедия его смерти в 1933 году, всего за несколько лет до конца Гетманщины, не может быть преуменьшена. Григорьев занял его место на посту председателя, но как Р-ДБ, так и УПСР никогда не забыли его. Он не дожил до успехов восстаний против Гетмана и Германии, но его дух на самом деле вёл нас, даже после смерти. Процесс перезахоронения в [202.GetName] уже начат."
ukraine_republican_events.148.a: "Спасибо, Николай Шаповал."

# URDP and USDRP from here

ukraine_republican_events.150.t: "Опасности революционного рвения"
ukraine_republican_events.150.d: "Левая фракция сыграла очень важную роль в борьбе против Гетманщины. Поддерживая пламя сопротивления и поднимая знамя восстания среди угнетенных, коммунисты сильно нам помогли. Это не означает, однако, что у нас нет значительных разногласий между нами. Пока одни, как большинство РДС, решили правильно интегрироваться в новую политическую систему, другие выбрали более аморфную или даже открыто враждебную позицию по отношению к Народной Республике.Такие события нельзя игнорировать. Помимо политических разногласий, те, кто отказывается признавать право нашей Республики на существование, должны быть сопротивляться, независимо от их прошлых заслуг. Сейчас наши службы безопасности, поддерживаемые немецкими партнерами, ставят перед собой две основные задачи: внимательно следить за внутренними организационными мерами, предпринимаемыми некоторыми радикальными группами, и исследовать их возможные иностранные контакты. Что касается первой задачи, имя Михаила Полоза сразу привлекло внимание. Талантливый координатор подпольных действий при правлении Гетмана, он снова, похоже, замешан в революционных заговорах. С другим известным боротбистом, Левко Коваливым, возглавляющим влиятельную левую фракцию в местном полтавском совете, Полоз имеет удобную базу для своей деятельности в этом регионе.Что касается возможного иностранного вмешательства, то внимание стоит уделить УКП и радикалам в РДС. 'Интернационалистское' крыло первой, возглавляемое Станиславом Косіором и Лазарем Кахановичем, подозревается в поддержке тесных связей с российскими социалистами. Между тем, некоторые элементы РДС, сосредоточенные в основном вокруг Анатолия Писоцкого и Павла Христюка, по слухам, сохраняют обширные связи с Парижем. Учитывая уязвимое положение нашей страны и важность немецких гарантий безопасности, крайне важно внимательно следить за такой деятельностью."
ukraine_republican_events.150.a: "Мы могли быть союзниками, но времена изменились."

ukraine_republican_events.151.t: "Единственный выстрел"
ukraine_republican_events.151.d: "Пару недель назад произошел особенно тревожный инцидент во время плановой проверки Северного военного округа в Чернигове. Генерал Тютюнник, глава делегации, был атакован огнестрельным оружием, когда готовился покинуть город. К счастью, генерал остался невредим, а преступник был быстро задержан благодаря оперативным действиям присутствующего персонала.Задержанный, капитан местного гарнизона, отрицал свою причастность к какой-либо группе и утверждал, что действовал один, 'по патриотическому долгу и приверженности, присущей любому украинцу'. Следователи сочли это заявление довольно сомнительным, и после тщательной проверки выяснилось, что он может быть связан с СГД.Это открытие весьма тревожно. Наши службы безопасности, будучи заняты борьбой с радикальной левицей, недооценили риски, связанные с остаточными гетманистскими элементами в вооруженных силах. Многие теперь призывают правительство пересмотреть свою стратегию в отношении политического экстремизма и перераспределить усилия контрразведки на борьбу с монархическими элементами в армии. Даже минимальные меры, такие как более тщательные проверки офицеров, могут выявить потенциальные угрозы и предотвратить инциденты, подобные этой попытке убийства. Тем не менее, существует оппозиция этим предложениям. Расследование, в конце концов, не выявило никаких сообщников преступника или связи с продолжающимся заговором. Противники утверждают, что это сожалительное, но, вероятно, изолированное событие не оправдывает масштабных репрессий среди офицеров."
ukraine_republican_events.151.a: "Мы должны быть бдительными и тщательными."
ukraine_republican_events.151.b: "Не стоит принимать поспешных решений. Сосредоточим внимание на коммунистах."

ukraine_republican_events.152.t: "Неожиданные посетители"
ukraine_republican_events.152.d: "Как и ожидалось, восхождение режима [RUS.GetLeader] окончательно разрушило демократическую оппозицию его власти. Несмотря на все их усилия, демократическая оппозиция в России потерпела неудачу, и теперь, спасаясь от тирании, они, иронично, просят убежища в том месте, которое они часто называли германской марионеточной страной: Украине.Среди них есть несколько известных имен: с левого фланга — Даниил Сулимов и Александр Титов, а также более правые кадеты, такие как Петр Долгоруков и Антон Карташев. Естественно, будучи открытым и свободным обществом, мы позволили им войти. Однако, несмотря на то, что некоторые из них могут разделять те же идеалы, что и мы, они все же оставались российскими государственными деятелями. Независимо от того, демократичны ли они или нет, те, кто в Кремле, часто считали Украину лишь германским изобретением, которое всегда будет служить оплотом против России."
ukraine_republican_events.152.a: "Им рады тут, но... следите за ними."

ukraine_republican_events.153.t: "Эхо недовольства"
ukraine_republican_events.153.d: "Когда российские политики, оппозиционные власти [RUS.GetLeader], прибыли в Украину, сначала никто не обратил на это большого внимания. Изгнанники в основном организовывались между собой, пытаясь укрепить поддержку против 'зла, обитающего в Кремле', и предупредить мир об опасностях нового России. Именно поэтому было относительно мало комментариев о стране, в которой они только что поселились, и те, которые были, казались относительно благими.Однако со временем замечания относительно политической истории и развития Народной Республики, хотя и оставались благопристойными, приобрели определенный патерналистский оттенок. Украинский парламент одновременно был слишком слаб для обеспечения стабильного управления и слишком силен для своего блага. Отсутствие 'сильной исполнительной власти' мешало необходимым реформам. Земельная реформа была слишком амбициозной по своим целям и слишком робкой по исполнению. Система национальной личной автономии была слишком лабиринтной и перегруженной, но одновременно недостаточно прочной, чтобы защищать интересы российской нации. Культурная политика и инициативы были слишком узконаправленными. Левые изгнанники lamentировали, что Республика слишком зависима от интересов буржуазии, в то время как более консервативные критиковали её как беззащитную против 'заблуждений социализма'. Часто упоминалась и 'беспощадная', 'эксплуататорская', 'вездесущая' германская власть, а также, видимо, отсутствие воли ей противостоять.В общем, внешний наблюдатель мог бы получить впечатление, что определенная восприимчивость украинской аудитории привлекла многих изгнанников к проповедованию каждого их политического поворота и личной политической фиксации, сейчас запрещенной в новой России."
ukraine_republican_events.153.a: "Вы потеряли свою страну из-за диктатуры и разорения. Кто вы такие, чтобы говорить?"
ukraine_republican_events.153.b: "Пусть говорят. Однажды они поймут, как сильно они нуждаются в нас."

ukraine_republican_events.154.t: "Объединены против деспотизма"
ukraine_republican_events.154.d: "Не прошло и много времени, как русские изгнанники, живущие в стране, стали проблемой, но не той, на которую мы рассчитывали. Для широкой публики критика изгнанников в адрес украинской республики не оказала большого воздействия, и сами изгнанники в основном посвятили себя анти-Савинковской деятельности. Именно эта деятельность дальше ухудшила русско-украинские отношения.Российский посол в Украине передал записку от правительства Савинкова, требуя выдать изгнанников для суда за 'преступления против российского народа'. После того как мы были смягчены и предупреждены о последствиях отказа, министр иностранных дел Марголин доложил Национальной Зборе подробности этого послания. Прямые угрозы из Москвы были редки последние годы, но с созданием Московского соглашения и другими подобными событиями такие инциденты становятся все реже.Недолго спустя было достигнуто согласие: Украина не поддастся российскому империализму снова, особенно после восстановления демократии в [202.GetName]. Так или иначе, мы отвергнем их жалкие попытки запугать нас. Вопрос в том, как именно мы это сделаем. Более левые члены Зборы хотят предложить твердое опровержение, задавая вопрос, какое право имеет Савинков требовать экстрадиции тех, кто хочет жить в Украине. Это обязательно покажет, что Украина готова встать против иностранной агрессии. С другой стороны, некоторые предлагают проявить осторожность и предложить вообще не реагировать на это. Ведь, как они говорят, это лишь усилит уже растущую напряженность между двумя странами."
ukraine_republican_events.154.a: "Пусть Вождь узнает. Мы не уступим тебе, но будем бороться с тобой."
ukraine_republican_events.154.b: "Нет смысла отвечать на такую чепуху."

ukraine_republican_events.155.t: "Богатство народа"
ukraine_republican_events.155.d: "Государственная поддержка кооперативных предприятий всегда была общим делом как для УРДП, так и для УСДРП. Украинское кооперативное движение неуклонно росло с 1860-х годов, и даже Гетманщины помогала в определенной степени. Однако реальность практического управления может поставить наши отношения с кооперативами в иную перспективу.Для реализации амбициозной программы социального обеспечения наше правительство обратилось к одному из самых распространенных и надежных источников государственных доходов — увеличению налогов. Хотя мы сделали все возможное, чтобы обеспечить справедливое распределение налоговой нагрузки, жалобы были ожидаемы. На этот раз они пришли от кооперативных предприятий.Через публичные заявления и частные каналы несколько кооперативных ассоциаций выразили свое недовольство курсом правительства. Они утверждают, что кооперативы должны либо быть освобождены от налоговых увеличений, либо хотя бы получить значительный срок отсрочки. Их аргументы стандартны: кооперативы — это наиболее естественная форма деятельности на местах, и их развитие важно для процветания нации. Что касается благосостояния рабочих, то они, по их мнению, уже обо всем позаботились: обширные взаимные фонды помощи и сети самообслуживания обеспечивают все необходимые удобства. Конечно же, изымать деньги напрямую из карманов рабочих и тратить их на неэффективную, громоздкую и чрезмерно бюрократическую систему 'государственного благосостояния' — это не лучший вариант?Хотя этот подход выглядит маловероятным, существует более прозаическая точка зрения. Кооперативы составляют существенную и хорошо организованную часть нашей избирательной базы. Слишком сильное раздражение кооперативов может поставить под угрозу наши политические перспективы в будущем."
ukraine_republican_events.155.a: "Возможно, стоит немного задержать решение."
ukraine_republican_events.155.b: "Благосостояние всей нации требует вкладов от каждого."

ukraine_republican_events.156.t: "Искусство торга"
ukraine_republican_events.156.d: "Широкая национализация горнодобывающих предприятий не была в числе наиболее приоритетных пунктов нашей повестки, но экономические и политические обстоятельства заставили нас действовать в этом направлении. Сейчас правительство погрязло в долгих и трудных переговорах с крупными горнодобывающими магнатами, как украинскими, так и иностранными, многими из которых являются члены Национального союза горнодобывающей промышленности (ранее часть печально известного Протофиса). Переговоры продвигаются очень медленно, благодаря тому, что горнодобывающие магнаты используют все свои возможности, как публичные, так и скрытые, чтобы добиться более выгодных условий.\n\nИх упрямство вполне ожидаемо, но тем не менее вызывает множество головной боли. Задержки уже наносят ущерб нашим возможностям для надлежащего планирования в рамках программы индустриализации. Кроме того, наши партнёры в УСДРП становятся всё более нетерпеливыми, так как переговоры затягиваются. Почему, спрашивают они, мы не можем использовать наши законодательные и исполнительные полномочия, чтобы диктовать свои условия? Не нужно быть снисходительными к тем, кто не заинтересован в ответной услуге. Мы должны просто представить им свершившийся факт в виде государственной процедуры для установления цен на выкуп. Они могут обратиться в суд, но маловероятно, что смогут что-то добиться.\n\nХотя такой подход звучит заманчиво, сжигание мостов с влиятельными бизнесменами может создать больше проблем для нашего правительства в будущем. Всё же, возможно, приоритетом должно оставаться стремление к взаимовыгодному компромиссу."
ukraine_republican_events.156.a: "Конечно, мы можем найти компромисс."
ukraine_republican_events.156.b: "Интересы государства важнее забот о крупном капитале."

ukraine_republican_events.157.t: "Угроза или Возможность?"
ukraine_republican_events.157.d: "Недавнее соглашение, заключённое между партией и группой независимых депутатов, связанных с УДХП и Протофисом, открыло для нас новые возможности. Налаживание тесных связей с бизнес-кругами может не только способствовать общему развитию здоровой экономики, но и помочь непосредственно партии. Однако полезно помнить уроки предыдущих администраций. Ни при каких обстоятельствах наше правительство не должно становиться заложником крупного капитала, как это часто происходило во времена Гетманщины.\n\nИменно поэтому последнее предложение, выдвинутое некоторыми кругами нашей партии, вызвало значительный переполох. Речь идёт о Фёдоре Терещенко – влиятельном авиационном промышленнике с обширными связями с ныне упразднённым Протофисом. Терещенко – опытный организатор, который начинал с авиамастерских и закончил созданием крупнейшего авиастроительного предприятия Украины. Однако его путь был значительно облегчён покровительством его чрезвычайно богатой семьи и большими государственными субсидиями, скорее всего полученными через лоббизм Протофиса.\n\nТем не менее, Фёдор Фёдорович обладает реальной и значительной экспертизой, и именно поэтому некоторые предлагают пригласить его в один из государственных плановых советов, курирующих программу индустриализации. Он, по слухам, заинтересован и готов сотрудничать, особенно если правительство гарантирует, что его авиационное предприятие не будет национализировано.\n\nЭто заманчивое предложение, но и спорное. Наши партнёры в УСДРП и некоторые члены нашей партии могут воспринять этот шаг как капитуляцию перед крупным капиталом. Обещание сохранить компанию Терещенко частной может вызвать недовольство части нашей базы и всего левого крыла. Оправдают ли потенциальные выгоды разделённость внутри партии?"
ukraine_republican_events.157.a: "Это немного заходит слишком далеко."
ukraine_republican_events.157.b: "Национальный прогресс – это общее дело, не так ли?"

ukraine_republican_events.158.t: "Мельницы Правосудия"
ukraine_republican_events.158.d: "Реформа судебной системы, проводимая одновременно с земельной реформой, привела к ожидаемым, но всё же неприятным трудностям. Многие судьи либо находятся на проверке, либо в стадии отстранения или апелляции, а суды, перегруженные исками и делами, связанными с перераспределением земель, встали в тупик. Серьёзность проблемы растёт с каждым днём, так как судебный долг продолжает увеличиваться. Различные бюрократические препятствия уже создают проблемы для земельной реформы, и это новое развитие событий точно не помогает.\n\nОдним из возможных решений является передача всех дел, связанных с земельной реформой, в юрисдикцию специального судебного органа, состоящего из судей, чья честность была уже подтверждена обзором Генерального суда. Конечно, создание новой структуры в условиях кризиса может ещё больше осложнить ситуацию, поэтому это решение не стоит принимать легкомысленно."
ukraine_republican_events.158.a: "Давайте продолжим создание нового судебного органа."
ukraine_republican_events.158.b: "Дополнительная бюрократизация нам не поможет."

ukraine_republican_events.159.t: "Угрозы с Востока"
ukraine_republican_events.159.d: "С момента подписания Брест-Литовского мирного договора в Кремле всегда жаловались на то, что независимая Украина существует на карте. Однако, начиная с Чёрного понедельника, эти жалобы — а иногда и угрозы из Москвы — только усилились.\n\nОсобенно после восхождения Савинкова и его последующей консолидации власти, российские государственные СМИ и высокопоставленные политики начали активно использовать антикоррупционную риторику, направленную против самой республиканской власти. Идея, которая продвигается, заключается в том, что Гетман всегда был слишком дружелюбен с Россией, и, следовательно, немцы, желающие расширить свое влияние в Восточной Европе и систему укреплений Оствалл, были бы заинтересованы в его замене на режим, направленный исключительно на уничтожение русской идентичности и языка в Украине.\n\nЭто, по всей видимости, часть сосредоточенной усилий по укреплению гегемонии Германии в Восточной Европе и окончательному устранению российского присутствия в регионе. Такие идеи, конечно, абсурдны, но они кажутся хотя бы частично резонансными для русского народа — и скорее всего, их слова будут подкреплены силой."
 ukraine_republican_events.159.d2: "Since the Treaty of Brest-Litovsk, those in the Kremlin have always complained of the mere fact that an independent Ukraine exists on the map. However, in the years since Black Monday, those complaints - and sometimes threats from Moscow - have only grown.\n\nThe triumph of republicanism over Savinkov in Russia, despite being interpreted as a positive sign by many Ukrainian liberals and left-wingers, has perhaps not yielded the results we expected. Despite acknowledging some similarities in governance and ideology between our two countries, their rhetoric has only intensified. Russian politicians have criticised the Ukrainian People's Republic as not a 'true democracy', claiming that it is still beholden to the rigid demands, treaties and economic influence of Berlin. As long as Russians and Ukrainians are separated due to Germany's iron grip over Eastern Europe, mutual hostilities will always remain. If war between [202.GetName] and Moscow will come, they say, it will be because of the forced divisions between the two, engineered by greedy and xenophobic German elites.\n\nSuch ideas are nonsense, of course, but they seem to at least somewhat resonate with the Russian people - and it is likely that sooner or later, their words may be backed up with force." #Democratic
 ukraine_republican_events.159.d3: "Since the Treaty of Brest-Litovsk, those in the Kremlin have always complained of the mere fact that an independent Ukraine exists on the map. However, in the years since Black Monday, those complaints - and sometimes threats from Moscow - have only grown.\n\nThe restoration of the monarchy in Russia, especially in tandem with the republican restoration in Ukraine, has most definitely soured relations even further. Many remember the long periods of Russification and oppression under the tsar, and now are worrying that a renewed attack on Ukraine and her way of life is inevitable. Statements from Russian politicians since the restoration have not been surprising, but still concerning; they say that the very existence of an independent Ukraine, especially one tied to Berlin, is a 'dagger aimed at the heart of Russia'. For hundreds of years, Ukraine was a rightful part of the Russian cultural and political sphere of influence, the 'Russkiy Mir'. Without a preemptive strike to get rid of this threat, they say, Germany will strike first and destroy Russia again.\n\nSuch ideas are nonsense, of course, but they seem to at least somewhat resonate with the Russian people - and it is likely that sooner or later, their words may be backed up with force." #Empire
 ukraine_republican_events.159.d4: "Since the Treaty of Brest-Litovsk, those in the Kremlin have always complained of the mere fact that an independent Ukraine exists on the map. However, in the years since Black Monday, those complaints - and sometimes threats from Moscow - have only grown.\n\nThough the red flag now flies on the top of the Kremlin once again, something totally unexpected given the years under the extremely reactionary Savinkovist rule, relations between [202.GetName] and Moscow have only soured. The Russian narrative is that the Ukrainian People's Republic is beholden solely to the interests of German capital - in the end, the republican restoration served to reinforce bourgeois rule and to sideline socialist efforts to build a free Ukraine. The total destruction of the enemies of the revolution - German imperialism, Ukrainian bourgeois-nationalism, and so on - are necessary to ensure the victory of socialism and the end of capitalism in Europe.\n\nSuch ideas are nonsense, of course, but they seem to at least somewhat resonate with the Russian people - and it is likely that sooner or later, their words may be backed up with force." #Socialist
ukraine_republican_events.159.a: "Если они хотят прийти к нам, мы будем готовы."

ukraine_republican_events.160.t: "Председатель под Атакой"
ukraine_republican_events.160.d: "То, что началось как вспышка рабочего недовольства в галичском городе Дрогобич, может иметь заметные последствия и для [202.GetName]. Демонстрация, состоящая в основном из местных нефтяников, была грубо разогнана полицией: были сделаны выстрелы, несколько протестующих были ранены. Это возмутительное событие вызвало резкие осуждения со стороны социалистов и левых сил как в Галиции, так и в Украине. Однако в последнем случае протесты имеют одну характерную черту, направленную не только против жестокой полиции и равнодушных властей Дрогобыча и Галиции, но и против председателя Национального Собора, Василия Вышиваного, родившегося Вильгельма Франца фон Габсбург-Лотарингского.\n\nПредседатель из аристократии всегда был несколько аномальным явлением на республиканской политической арене. Несмотря на то, что он по сути является чужаком в украинской политике, он приобрел статус, близкий к народному герою среди части населения и уважение (хотя и с некоторым недовольством) со стороны бывших политических изгнанников. Действительно, «Аустро-Украинское Общество Дружбы», учреждённое Вышиваным в Галиции, значительно помогло их делу и принесло ему много признания.\n\nОднако быть благодетелем за кулисами и быть в центре политической жизни — это две разные вещи. Особенно РДС всегда ненавидели его назначение председателем, считая, что иностранный аристократ не должен занимать такую важную должность. Теперь их критика становится особенно язвительной. Габсбурги, эти тираны, эти тюремщики наций, поедают кровь народа, а один из них возглавляет парламент Народной Республики? Разве это не величайшее унижение, не великое осквернение республиканских ценностей?\n\nОбычно такие абсурдные высказывания не требуют признания, не говоря уже о прямом ответе. Однако сейчас политическая ситуация настолько напряжённая, что даже некоторые наши партнёры в коалиции находят удобным признать эту ненавистную чушь, угождая части своей базы. Чтобы избежать дальнейших осложнений, возможно, будет разумно осторожно подойти к этому вопросу."
ukraine_republican_events.160.a: "Лающие собаки не кусают."
ukraine_republican_events.160.b: "Одного заявления, похоже, недостаточно."

ukraine_republican_events.161.t: "УРДП и Вера"
ukraine_republican_events.161.d: "С 1917 года церковь и республиканская позиция по её поводу стали более поляризованными и сложными. Хотя некоторые низшие священники могли быть восторженными по поводу свержения Гетмана, значительная часть высшей церковной иерархии состояла из сторонников Скоропадского, и этот факт неизбежно отразился на том, как церковь вела себя, и как на неё смотрели некоторые республиканцы. Многие начальные симпатии к церкви были утеряны, даже среди республиканцев, не относящихся к левому крылу, отношение к церкви стало более скептическим, и в целом отношения с церковью можно охарактеризовать как нейтральные.\n\nПоляризация мнений также охватывает и УРДП. Большая часть партии признаёт ценность поддержания здоровых отношений с церковью; особенно в сельской местности, церковь имеет большое влияние на систему образования и играет важную роль в борьбе с бедностью. Правая фракция партии особенно считает связи с верующими важнейшими.\n\nТем не менее, из-за сомнений других фракций партии и, в особенности, наших партнёров по коалиции в УСДРП, серьёзные усилия по налаживанию этих связей были в значительной степени избегаемы. Постепенно растущий УНП, которого правые в УРДП считают своим главным соперником, заполнил этот пробел, что позволило им набирать больше сторонников в деревне.\n\nТеперь, когда их база поддержек оказывается под угрозой, лидер УРДП-правых Владимир Доленко призывает партию перенаправить усилия на налаживание позитивных и взаимовыгодных отношений с церковью. Однако это будет нелегко уговорить наших партнёров по коалиции из УСДРП на такие шаги."
ukraine_republican_events.161.a: "Хорошая инициатива."
ukraine_republican_events.161.b: "Возможно, было бы лучше сделать шаг в другую сторону."

ukraine_republican_events.162.t: "О Национальной Обороне"
ukraine_republican_events.162.d: "С учётом того, что российская военная промышленность быстро расширяется, а Москва становится всё более агрессивной, в Национальном Соборе начали возникать разговоры о надлежащем ответе. Постепенно все партии начинают осознавать серьёзность российской угрозы. Дебаты о необходимости национальной обороны кажутся неизбежными."
ukraine_republican_events.162.d2: "С учётом того, что российская военная промышленность быстро расширяется, а Москва становится всё более агрессивной, в Национальном Соборе начали возникать разговоры о надлежащем ответе. Постепенно все партии начинают осознавать серьёзность российской угрозы. Дебаты о необходимости национальной обороны кажутся неизбежными.\n\nОднако, похоже, это останется только разговорами в обозримом будущем. С учётом того, что коалиция в Государственной Думе не имеет единого мнения по вопросу о необходимости вооружённых сил, говорить о создании полноценной армии или какой-либо реальной национальной обороне преждевременно.\n\nДля того чтобы иметь возможность действовать в этом направлении, крайне важно создать, по крайней мере, военную структуру, способную эффективно ответить на самые базовые угрозы. Таковая может быть организована, но потребуется гораздо больше усилий и ресурсов."
ukraine_republican_events.162.a: "Мы должны подготовиться."
ukraine_republican_events.162.b: "Без поддержки это невозможно." 
ukraine_republican_events.162.a.tt: "Через §H13 месяцев§! вы получите §Hсобытие§!, касающееся принятия закона о национальной обороне. Следующие факторы помогут закону о национальной обороне быть принятым:\n£white_dot Наша £GFX_stability_texticon стабильность выше §H70%§!.\n£white_dot Наша £GFX_war_support_texticon поддержка войны выше §H50%§!.\n£white_dot Отношения с нашим партнёром по коалиции должны быть на уровне §GСотрудничества§! или §CСговорчивости§!.\n£white_dot Наши §CБаллы Земельной Реформы§! и §CОчки индустриализации§! выше §Y90§!.\n£white_dot Были приняты фокусы §HМечта стала явью§! и §HПрогрессивное налогообложение§!.\n£white_dot Если мы являемся §lСоциал-либералами§!, то §CВлияниe§! от §lУРДП§!-§lЦентр§! должно быть §Oумеренным§! или выше. В противном случае, если мы §SСоциал-демократы§!, то §1Идеализм§! должен быть выше §Y0§!.\n£white_dot Были приняты хотя бы §H3§! фокуса из военного дерева, отходящих от фокуса §HРасширение [202.GetName]ской Военной Академии§!.\n\nЕсли все эти условия выполнены, закон будет гарантированно §Gпринят§!. Если выполнены только два, закон будет гарантированно §Rне принят§!."
ukraine_republican_events.162.b.tt: "Поскольку наша коалиция распалась, закон о национальной обороне не будет вынесен на голосование.§!"

ukraine_republican_events.163.t: "Закон о национальной обороне"
ukraine_republican_events.163.d: "На протяжении двух десятилетий Украина зависела от военной помощи и альянса с Германской Империей. Новые реалии могут означать, что это больше не будет возможно для нужд национальной обороны. Военные возможности России увеличиваются, а уверенность и экономические проблемы Германии, похоже, оставили их несколько неподготовленными к любому новому европейскому конфликту.\n\nПо этой причине Национальная Зборы обсуждает закон, который, надеемся, значительно укрепит наши возможности сопротивляться любой агрессии с востока и обеспечит производство винтовок, артиллерийских орудий и других вооружений внутри страны.\n\nХотя все признают необходимость сохранения независимости Украины, несколько факторов сделали принятие закона более сложным, чем ожидалось. Республиканское движение в Украине всегда было довольно пацифистским, особенно с учётом милитаристского имиджа, который продвигал Гетманат, от которого мы стремимся дистанцироваться. Другие факторы, такие как единство коалиционного правительства, ещё больше осложняют ситуацию. Тем не менее, закон готов к голосованию - надеемся, он будет принят без особых проблем...?"
ukraine_republican_events.163.a: "Мы с нетерпением ждём результатов."

ukraine_republican_events.164.t: "Закон не прошел"
ukraine_republican_events.164.d: "Закон о национальной обороне не был принят Национальным Собранием, и его положения не будут реализованы. К сожалению, нам придётся искать другие способы для надлежащей мобилизации."
ukraine_republican_events.164.a: "Чёрт!"

ukraine_republican_events.165.t: "Закон принят"
ukraine_republican_events.165.d: "Закон о национальной обороне был принят Национальными Зборами. Дополнительное финансирование для армии в пути - скоро мы сможем защитить Украину от всех угроз!"
ukraine_republican_events.165.a: "Слава Богу!"
ukraine_republican_events.165.a.tt: "Благодаря нашим успехам в переговорах о лучших экономических условиях с Германией, торговой сделке с Интернационалом и теперь достигнутой степени военной самодостаточности, внешнее влияние значительно сократилось. §GТеперь мы независимы!§!"

ukraine_republican_events.166.t: "Формирование Национального Единого Правительства?"
ukraine_republican_events.166.d: "Украина подвергается атаке с всех сторон со стороны российских войск. Ранее поляризованная политическая сцена теперь объединяется для сопротивления вторжению - националисты, демократы и даже крайние левые в основном объединились для одной цели: Украина должна быть свободной, а захватчики должны быть изгнаны из страны.\n\nС учетом того, что выборы отложены до конца войны, некоторые считают, что будет разумно протянуть руку силы, находящиеся в оппозиции. Они предлагают создать национальное единство, которое объединит не только существующую коалицию, но и оппозицию, в основном из фигур РДС и, возможно, даже из УНР. Как лидеры РДС и УНР, Винниченко и Михновский уже выразили поддержку такой идее.\n\nЭто, безусловно, будет полезно для всей Украины, но некоторые считают, что это ненужное усилие, которое может подорвать легитимность избранного правительства среди населения, не говоря уже о том, как объединение людей с такими различными взглядами может усложнить процесс управления."
ukraine_republican_events.166.a: "Мы будем бороться вместе и победим вместе!"
ukraine_republican_events.166.b: "Что? Нет, это ненужно."
ukraine_republican_events.166.a.tt: "Отношения с вашим партнёром по коалиции будут установлены на §Oбезразличными§!.\n\nБудьте предупреждены, что это сделает невозможным для правящей партии добиться §Yосновной победы§! на послевоенных выборах."
ukraine_republican_events.166.b.tt: "Мы получим модификатор §YНациональная Оппозиция§! Это штраф будет незначительным в начале, но он §Rухудшится§! по мере того, как мы будем терять £victory_points очки победы над §HРоссией§!. Показатели §Gулучшатся§! по мере того, как мы будем возвращать свои основные территории."
UKR_national_unity: "Национальная Оппозиция"
UKR_national_unity_desc: "Эта идея §Rбудет становиться хуже§! по мере того, как мы теряем £victory_points Очки Победы над §HРоссией§!. Это §Gулучшится§! по мере того, как мы будем возвращать свои основные территории."

ukraine_republican_events.167.t: "Прогрессивные силы"
ukraine_republican_events.167.d: "Восемнадцать лет существования при системе гетманщины по-разному повлияли на политическую траекторию УРДП. Постоянно находясь в оппозиции, действуя в условиях ярого антисоциалистического политического ландшафта, она была вынуждена тщательно балансировать: отстаивать свою прогрессивную политику, не давая властям никаких оснований для подавления партии как очага опасного радикализма.\n\nЭти обстоятельства в конечном счете привели к образованию трех фракций внутри партии, возвышение каждой из которых было реакцией на давление Гетманщины. В то время как правые в основном сосредоточили свое внимание на проблемах крестьян-землевладельцев, центр, следуя старому кредо "партии ответственного государственного управления", стал компромиссной фракцией. Левые, тем временем, стремились заполнить нишу, освободившуюся после запрета открыто социалистических сил.\n\nРазвивая более идеалистические аспекты собственной доктрины партии, сочетая их с идеологическим наследием легального марксизма и другими реформистскими тенденциями бывшей империи, она в конечном итоге сформировала свою платформу. Надлежащий переход к справедливому и равноправному обществу должен был быть осуществлен не путем полного отказа от капитализма, а путем его осторожного и контролируемого развития. Необходимо было признать модернизирующее влияние капиталистической системы, а также исключительную важность ограничения ее неизбежных эксцессов.\n\nНеудивительно, что относительное влияние левых в партии помогло в ходе переговоров с УСДРП. Хотя обе партии работали вместе в судьбоносные дни 1917 и 1918 годов, были опасения, что прошедшие годы слишком сильно отдалили их друг от друга. Однако утверждение Никовского на посту главы кабинета министров, по-видимому, свидетельствует о том, что УСДРП достаточно доверяет нашей партии и готова к сотрудничеству."
ukraine_republican_events.167.a: "Принесем надежду и процветание Украине – вместе."

ukraine_republican_events.168.t: "Правые Уходят"
ukraine_republican_events.168.d: "Несколько недель назад трио лидеров правого крыла партии – Владимир Доленко, Евгений Архипенко и Филип Пилипчук – объявили о своем намерении покинуть УРДП и вместе со своими сторонниками заняться поиском новых политических направлений. Каким бы неприятным ни было это заявление, оно не стало полной неожиданностью. В течение некоторого времени напряженность в партии была высокой, а фракция правых открыто заявляла о своем недовольстве уступками УСДРП и предполагаемым пренебрежением к "естественным интересам" партии.\n\nСегодня Доленко, Архипенко и Пилипчук, к которым присоединился бывший член УДХП (и один из ее основателей) Виктор Андриевский, объявили о создании новой политической партии. Новая сила, получившая название Украинская народная селянская партия (УНСП), обещает отстаивать экономические интересы мелких и средних фермеров, поддерживать дружественные отношения между государством и Православной церковью, одновременно защищая идеалы "свободы и процветания всего украинского народа". Партия готова привлечь на свою сторону часть сторонников как УРДП, так и УНП, при этом националистическая и ура-патриотическая риторика последней для некоторых едва ли приемлема.\n\nХотя можно утверждать, что такой исход был предопределен давным-давно и что аутсайдеры, вступившие в УРДП в начале 1920-х годов, все равно никогда не вписывались в партию, эта потеря остается весьма ощутимой. С уменьшением численного состава УРДП в Зборах отношения с УСДРП, несомненно, выйдут на передний план партийной повестки дня."
ukraine_republican_events.168.a: "Наша партия переживет это."
ukraine_republican_events.168.a.tt: "Все эффекты получаемые от §SУСДРП§! зависят от уровня отношений-§RНесотрудничество§!, §OБезразличие§!, или §GСотрудничество§! будут потеряны, и любые дополнительные эффекты получаемые через фокусное древо будут §Rне доступны§!.\n\nэффекты от §SУСДРП§!:\n§RНесотрудничество§!: Ежедневный прирост политической власти: §R-0.20§!, Стабильность: §R-15.00%§!\n§OБезразличие§!: Ежедневный прирост политической власти: §R-0.10§!, Стабильность: §R-15.00%§!\n§GСотрудничество§!: Ежедневный прирост политической власти: §R-0.10§!"

ukraine_republican_events.169.t: "Разброд в партии"
ukraine_republican_events.169.d: "Относительный рост влияния правого и левого крыла партии застал центр совершенно врасплох. Сторонники партии называют ее "бастионом ответственных государственников", а недоброжелатели - "фракцией полумер и пустых компромиссов". Крупнейшая группа партии парализована и не в состоянии справиться с растущей поляризацией. Его основные функции – руководить партией в целом, обеспечивать компетентное руководство и обеспечивать продвижение разумных политических решений – в настоящее время не выполняются.\n\nВ условиях, когда левые и правые разъединяют партию, обычные подходы к поддержанию партийной дисциплины бесполезны. Частные переговоры зашли в тупик, а попытка созвать экстренный съезд партии была пресечена некоторыми членами Центрального комитета. Ни о каком карательном изгнании также не может быть и речи: равновесие в Зборах слишком шаткое.\n\nБудущее партии неопределенно, но ее настоящее, к сожалению, остается ясным: безудержная фракционность, внутренняя борьба и полное отсутствие единства. "Партия ответственного правления" потерпела неудачу в управлении собой."
ukraine_republican_events.169.d2: "Относительный рост влияния правого и левого крыла партии застал центр совершенно врасплох. Сторонники партии называют ее "бастионом ответственных государственников", а недоброжелатели - "фракцией полумер и пустых компромиссов". Крупнейшая группа партии парализована и не в состоянии справиться с растущей поляризацией. Его основные функции – руководство партией в целом, обеспечение компетентного руководства и продвижение разумного политического курса – в настоящее время не выполняются.\n\nВ условиях, когда левые и правые разъединяют партию, обычные подходы к поддержанию партийной дисциплины бесполезны. Частные переговоры зашли в тупик, а попытка созвать экстренный съезд партии была пресечена некоторыми членами Центрального комитета. Ни о каком карательном изгнании также не может быть и речи: равновесие в Зборах слишком шаткое.\n\nОсознавая серьезность ситуации и свою неспособность повлиять на нее, председатель Вышиваный подал в отставку, а его место занял Александр Шульгин.\n\nБудущее партии неопределенно, но ее настоящее, к сожалению, остается ясным: безудержная фракционность, внутренняя борьба и полное отсутствие единства. "Партия ответственного правления" потерпела неудачу в управлении собой."
ukraine_republican_events.169.a: "Мы были так близки к величию..."

ukraine_republican_events.170.t: "Восстание идеалистов"
ukraine_republican_events.170.d: "'Партия потеряла из виду свои идеалы, но мы вернем ее на круги своя!' - таковы были заключительные слова Андрея Никовского во время последнего ежегодного съезда партии. Несмотря на то, что они демонстрировали видимость доверия, реальность оказалась менее благосклонной к Андрею Васильевичу и его планам. Предложение об изменении состава Центрального комитета партии, которое он отстаивал, в конечном итоге было отклонено.\n\nЭта неудача - лишь последняя из многих, с которыми недавно столкнулось левое крыло УРДП. Находясь в тени своих правых коллег, не находя понимания у высокопоставленных лиц в центре партии, в конце концов, оно приняло политику обструкционизма практически по отношению к любым инициативам партии. Все это время позиция Никовского как главы Совета народных министров делает его практически неприступным, а левые партии в целом по-прежнему демонстрируют дисциплину и единство, превосходящие таковые в УРДП в целом. Ходят даже слухи о негласной поддержке со стороны Сергея Ефремова, одного из основателей партии и ее бывшего лидера, который в настоящее время держится в стороне от политической жизни.\n\nНет никаких признаков того, что это противостояние разрешится в ближайшем будущем. Партия, как утверждается, утратила свое по-настоящему прогрессивное направление. То, что когда-то было силой, готовой бороться за демократию, права трудящихся, освобождение женщин и многое другое, теперь становится выразителем конъюнктурных интересов. Правые слишком озабочены своей ограниченной повесткой дня и не в состоянии примириться с широко прогрессивным характером УРДП. Центр считает требования левых относительно реорганизации партии слишком радикальными, в то время как повстанцы отказываются сдвинуться с места, полностью убежденные в том, что их долг - вернуть партию на правильный путь, подальше от узколобости правых и конформизма центристов. Спасет ли это упрямство УРДП или разрушит его – покажет только время."
ukraine_republican_events.170.a: "Партия, замкнутая в противостоянии сама с собой."

ukraine_republican_events.171.t: "Затишье перед бурей"
ukraine_republican_events.171.d: ""...конечно, они строят еще одно гетманство, на этот раз под прикрытием "республиканских ценностей". Весь их политический опыт просто не позволяет им заниматься чем-то другим, даже если бы они этого захотели. Когда-то в их названии было слово "федералисты". Иронично, учитывая, что их реальная платформа не имеет ничего общего с автономией и самоуправлением. Передав полный контроль над Народным ополчением в руки центрального правительства, они показали, как мало их на самом деле волнуют идеалы народного суверенитета. УРДП просто нуждается в послушном инструменте, всегда готовом подавить сопротивление людей их прогнившему буржуазному режиму, и..."\n\nЭто лишь небольшой фрагмент статьи в последнем номере газеты "Новая воля", автором которой является не кто иной, как Андрей Ричицкий, широко известный под псевдонимом скандально известного депутата от СРБ Анатолия Писоцкого. Остальная часть статьи не менее критична, и, что еще хуже, она не похожа на простой протест маргинального радикала. Действительно, наше последнее решение относительно подотчетности Народного ополчения вызвало много вопросов и возражений. Эта статья, хотя и является особенно провокационной, является всего лишь проявлением более широкого недовольства.\n\nХотя мы утверждаем, что защита республики требует упорядоченного и рационализированного контроля над силами безопасности, есть некоторые поправки, которые могут быть внесены. Мы можем определить процедуру, при которой в определенных случаях местные законодательные органы смогут отменить развертывание Народного ополчения, санкционированное центральным правительством, при условии, что за это предложение проголосует большинство в 2/3. Учитывая, насколько раздробленными обычно бывают местные собрания, и что точная процедура все равно будет разработана нашим правительством, практический эффект будет незначительным. Тем не менее, иногда символическая уступка - это именно то, что может повлиять на общественное мнение."
ukraine_republican_events.171.a: "Даже символическая уступка была бы слишком большой."
ukraine_republican_events.171.b: "Давайте приступим к внесению поправок."

ukraine_republican_events.172.t: "Волна разбоя в [192.GetName]"
ukraine_republican_events.172.d: "В настоящее время на страницах местных [192.GetName] газет появляется все больше сообщений о насильственных преступлениях. Хотя относительно оживленное криминальное подполье не является чем-то новым для крупного портового города, в последнее время ситуация, похоже, выходит из-под контроля. Бандитская война приобретает все более наглый и жестокий характер – банды сражаются друг с другом, не заботясь о сопутствующих жертвах среди законопослушных граждан. Этот недавний всплеск в основном объясняется ожесточенными разборками из-за прибыльных маршрутов контрабанды.\n\nОбычно в такой критической ситуации требуется активное использование народного ополчения, но некоторые местные аспекты осложняют ситуацию. В законодательных органах как города, так и региона действуют необычайно мощные и сплоченные леворадикальные фракции. Их представители относятся к Народному ополчению с недоверием, считая его всего лишь переименованной Национальной гвардией времен гетманщины. Таким образом, местные подразделения, как правило, плохо оснащены, недоукомплектованы персоналом и возглавляются людьми, выбранными в основном за отсутствие инициативы и политическую целесообразность.\n\nЦентральное правительство мало что может сделать с таким положением дел, но и просто оставаться в стороне тоже вряд ли возможно. Основной причиной данной проблемы является безудержный рост контрабанды. Как обычно, местные чиновники и таможенники позволили ей разрастись до таких масштабов, на что их было слишком легко повлиять взятками. Тщательное расследование и соответствующие суровые наказания в значительной степени снизят привлекательность контрабандного бизнеса и, таким образом, уменьшат преступную деятельность, связанную с ним."
ukraine_republican_events.172.a: "Эта буря пройдет, вот увидите."
ukraine_republican_events.172.b: "Направьте следственные группы."

ukraine_republican_events.173.t: "Восстания во Львове"
ukraine_republican_events.173.d: "В то время как вся страна празднует долгожданное воссоединение с нашими галицийскими братьями, все еще есть некоторые элементы, для которых ненависть и предрассудки делают новый статус-кво неприятным. Три дня назад толпы польских радикальных националистов, в основном сторонников экстремистских правых партий, таких как Эндеция и ОНР, хлынули на улицы Львова, сея хаос и беспорядки. Были атакованы украинские и еврейские магазины, а группа наиболее дерзких бунтовщиков попыталась захватить городскую ратушу. На следующий день порядок был восстановлен, в немалой степени благодаря помощи украинских волонтеров, но теперь перед нами стоит другой вопрос.\n\nПольский национальный союз, организация, которой поручено представлять интересы польского меньшинства в Народной Республике, все еще пытается сформировать официальную позицию в отношении недавнего инцидента. Тем не менее, некоторые из ее руководителей связались с нашим правительством по тайным каналам, умоляя о снисхождении к арестованным радикалам. Они утверждают, что в то время как нескольким избранным главарям могут быть предъявлены обвинения в государственной измене, большинство подсудимых должны быть обвинены всего лишь в хулиганстве и вандализме.\n\nЭто непростая просьба. Политическая принадлежность участников беспорядков и их попытка захватить городскую администрацию, не говоря уже о намеренном вандализме, ясно указывают на истинную природу их мотивов. Излишняя мягкость по отношению к ним может послужить опасным сигналом для других национал-шовинистов: Украинская Народная Республика слаба и не готова к самообороне. Нельзя недооценивать и потенциальный протест населения и правой оппозиции: УНП будет использовать ситуацию на пределе своих возможностей. Хотя великодушие действительно является достоинством победителей, возможно, сейчас не самое подходящее время проявлять его."
ukraine_republican_events.173.a: "Никакого снисхождения к национал-шовинистам."
ukraine_republican_events.173.b: "Это большая уступка, но, возможно, разумная."

ukraine_republican_events.174.t: "Сломленная мечта"
ukraine_republican_events.174.d: "Правящей коалиции Украинской Народной Республики больше нет. В совместном заявлении Исаак Мазепа, председатель Центрального комитета УСДРП, и Панас Феденко, лидер социал-демократической фракции в Зборах, объявили о выходе своей партии из правящей коалиции. Несколько министров от УСДРП уже подали в отставку, их обязанности до проведения следующих выборов будут исполнять соответствующие заместители министров.\n\nЭто серьезный удар по политической стабильности нашей страны и результат конфликтов, недоразумений и разногласий последних нескольких месяцев. Хотя непримиримость и упрямство наших бывших партнеров являются причиной большинства сложностей, мы тоже несем определенную долю вины, возможно, проявив излишнюю негибкость, когда обстоятельства требовали более примирительной позиции.\n\nТеперь мы должны нести ответственность за управление в одиночку. При незначительном количестве в в Зборах мы, несомненно, столкнемся с многочисленными трудностями. Некоторые уже сравнивают серьезность нынешней ситуации с кризисами конца 1917 и начала 1918 годов. Стоящая перед нами задача чрезвычайно сложна, но у нас нет выбора: даже если мы будем сломаны, украинская мечта должна сохраниться."
ukraine_republican_events.174.d2: "Правящей коалиции Украинской Народной Республики больше нет. В совместном заявлении Исаак Мазепа, председатель Центрального комитета УСДРП, и Панас Феденко, лидер социал-демократической фракции в Зборах, объявили о выходе своей партии из правящей коалиции. Несколько министров от УСДРП уже подали в отставку, их обязанности до проведения следующих выборов будут исполнять соответствующие заместители министров.\n\nЭто серьезный удар по политической стабильности нашей страны и результат конфликтов, недоразумений и разногласий последних нескольких месяцев. Хотя непримиримость и упрямство наших бывших партнеров являются причиной большинства сложностей, мы тоже несем определенную долю вины, возможно, проявив излишнюю негибкость, когда обстоятельства требовали более примирительной позиции.\n\nNow, we must bear the responsibilities of governance alone. При хрупком представительстве в Зборах мы наверняка столкнемся с многочисленными трудностями. Некоторые уже сравнивают серьезность сложившейся ситуации с кризисами конца 1917 и начала 1918 годов. Стоящая перед нами задача чрезвычайно сложна, но у нас нет выбора: даже если мы будем ранены, украинская мечта должна сохраниться."
ukraine_republican_events.174.a: "Тем не менее, наша работа продолжается..."
ukraine_republican_events.174.a.tt: "Любые последствия, касающиеся наших отношений с §SУСДРП§! будут удалены и не смогут быть изменены в будущем. §lПартийная фракционность§! также не сможет быть изменена.\n\n§RМы не будем получать никаких сообщений о событиях, относящихся ни к одному из них, и будем править самостоятельно.§!"
ukraine_republican_events.174.a2.tt: "Любые последствия, касающиеся наших отношений с §lУРДП§! будут удалены и не смогут быть изменены в будущем. Для §1Идеализма§! будет установлено значение §Y0§! и его также нельзя будет изменить.\n\n§RМы не будем получать никаких событий, относящихся ни к одной из этих механик, и будем править в одиночку.§!"

ukraine_republican_events.175.t: "Нехватка средств на земельную реформу"
ukraine_republican_events.175.d: "По-настоящему всеобъемлющая земельная реформа - это исключительная инициатива, и, как и все подобные начинания, она никогда не идет по плану. Фактические затраты на реформу превзошли даже наши самые пессимистичные оценки. Министерство сельского хозяйства уже некоторое время просит о дополнительном экстренном финансировании. В последнее время эти просьбы стали еще более настоятельными, поскольку нынешний народный министр сельского хозяйства Евгений Архипенко пригрозил уйти в отставку, если денежные требования останутся без ответа.\n\nАрхипенко, один из лидеров правого крыла УРДП, является ответственным и опытным государственным деятелем. Он служил (хотя и не на руководящей должности) в министерстве сельского хозяйства кабинета Дорошенко и с 1920-х годов был ярым сторонником всеобъемлющей земельной реформы. Тем не менее, учитывая недавние неприятности, возможно, было бы разумно позволить ему уйти в отставку и дать дорогу для новых специалистов.\n\nНаиболее очевидной альтернативой является кандидат от УСДРП Борис Мартос. Ученый, он известен своим обширным опытом в вопросах кооперативных предприятий. Во время эмиграции он преподавал в Украинском университете во Львове и написал несколько трактатов о кооперативах. После возвращения он применил свои теоретические знания на практике, сыграв ключевую роль в реорганизации Коопцентра.\n\nОднако есть и более неортодоксальный вариант. Николай Ковалевский, одна из ведущих фигур умеренной фракции УПСР, был выдвинут в качестве кандидата. Ковалевский сыграл важную роль в возрождении крестьянского профсоюза "Селянская спилка" и остается чрезвычайно популярным среди крестьян. Хотя УПСР в целом является радикальной оппозиционной партией, Ковалевский довольно дружелюбно относится к нашей коалиции. Его назначение могло бы удовлетворить РДС и успокоить население. Нельзя упускать из виду и символический аспект: Николай Николаевич служил в правительстве, свергнутом Скоропадским в 1918 году, так что это назначение может быть представлено как возвращение к республиканским корням."
ukraine_republican_events.175.d2: "По-настоящему всеобъемлющая земельная реформа - это исключительная инициатива, и, как и все подобные начинания, она никогда не идет по плану. Фактические затраты на реформу превзошли даже наши самые пессимистичные оценки. Министерство сельского хозяйства уже некоторое время просит о дополнительном экстренном финансировании. В последнее время эти просьбы стали еще более настоятельными, поскольку нынешний народный министр сельского хозяйства Борис Мартос пригрозил уйти в отставку, если денежные запросы останутся без ответа.\n\nМартос, известный ученый, известен своим обширным опытом в вопросах кооперативных предприятий. Во время ссылки он преподавал в Украинском университете во Львове и написал несколько трактатов о кооперативах. После возвращения он применил свои теоретические знания на практике, сыграв ключевую роль в реорганизации Коопцентра. Тем не менее, учитывая недавние проблемы, возможно, было бы разумно позволить ему уйти в отставку и привлечь новых специалистов. Евгений Архипенко, один из лидеров правого крыла УРДП, является ответственным и опытным государственным деятелем. Он служил (хотя и не на руководящей должности) в министерстве сельского хозяйства кабинета Дорошенко и был активным сторонником всеобъемлющей земельной реформы с 1920-х годов.\n\nОднако есть и более неортодоксальный вариант. Николай Ковалевский, одна из ведущих фигур умеренной фракции УПСР, был выдвинут в качестве кандидата. Ковалевский сыграл важную роль в возрождении крестьянского профсоюза "Селянская спилка" и остается чрезвычайно популярным среди крестьянства. Хотя УПСР в целом является радикальной оппозиционной партией, Ковалевский довольно дружелюбно относится к УСДРП. Его назначение могло бы удовлетворить РДС и успокоить население. Нельзя упускать из виду и символический аспект: Николай Николаевич служил в правительстве, свергнутом Скоропадским в 1918 году, поэтому это назначение может быть представлено как возвращение к республиканским корням."
ukraine_republican_events.175.a: "Обеспечить Архипенко необходимыми средствами."
ukraine_republican_events.175.b: "Архипенко – на выход, Мартос – вперед."
ukraine_republican_events.175.c: "Давайте мыслить нестандартно."
ukraine_republican_events.175.a2: "Обеспечьте Мартоса необходимыми средствами."
ukraine_republican_events.175.b2: "Мартос - на выход, Архипенко - вперед."

ukraine_republican_events.176.t: "Наши надежды под угрозой"
ukraine_republican_events.176.d: "Провал Закона о национальной обороне продемонстрировал глубокие политические разногласия в то время, когда мы не можем себе этого позволить. Сейчас много споров вызывает вопрос о том, почему он провалился: была ли политическая важность земельной реформы слишком очевидной для такого изменения бюджетных приоритетов? Было ли это вызвано недовольством и мелкой стычкой между двумя главенствующими партиями, УРДП и УСДРП? Или вера в то, что Россия вскоре вторгнется, была сочтена слишком надуманной, слишком бессмысленной, учитывая военное превосходство Германии в Европе?\n\nНедавние заявления министра иностранных дел России, а также опасения, что агрессия коммунаров в отношении Германии может перерасти в более масштабный конфликт, только усилили опасения, что провал законопроекта может обойтись дороже, чем предполагалось. Сторонники этого закона, многие из которых принадлежат к УНП Михновского и другим деятелям правого крыла, громко осудили провал законопроекта, назвав его одним из величайших провалов восстановленной Народной Республики. Если Украина не сможет защитить себя из-за того, что она не осознала важность отечественной военной промышленности и опасности усиления российского реваншизма, то виноватыми будут только правящая коалиция.\n\nАрмия также не очень хорошо восприняла провал законопроекта. За закрытыми дверями члены националистической группировки "Сечевики" в армии, в частности генерал Коновалец, выразили крайнее разочарование в Национальном Собрании. Ходили даже слухи о том, что если коалиция и впредь не будет выполнять свои обязанности перед нацией, то военное вмешательство в политику может стать серьезной проблемой.\n\nРеальность неминуемого российского вторжения начинает проявляться. Мы должны признать, что оно есть, иначе оно сокрушит нас, как приливная волна."
ukraine_republican_events.176.d2: "Прошло уже некоторое время с момента принятия Закона о национальной обороне, и его положения, безусловно, выполняются, предоставляя Украине инструменты, необходимые для самообороны. В то время как внутренние угрозы Народной Республике в значительной степени исчезли, а принятие закона стало признаком столь необходимого единства в Национальном сообществе, одна перспектива все еще вырисовывается.\n\nРеальность такова, что российское вторжение, возможно, уже не за горами, и это не та реальность, с которой кто-либо в Зборах или во всей стране хочет мириться. Но, в частности, для мечтателей 1917 года, которые воплотили в жизнь свои надежды на независимую, свободную Украину, эта мысль еще более ужасна. Скоро Второй Народной Республике исполнится третий год ее существования; откровенно говоря, это слишком короткий срок, учитывая почти два десятилетия забвения гетмана.\n\nЗа последние два года многое произошло, и именно поэтому мысль о российском вторжении, стершем с лица земли поля и города Украины, перечеркнувшем все, чего мы достигли, - не самая утешительная мысль. Даже если не принимать во внимание амбиции России по завоеванию и полному подчинению Украины, мы находимся в безвыходном положении. Военный союз с Германией сделает [202.GetName] мишенью, и все же это тот военный союз, от которого мы не можем отказаться.\n\nУкраинская Народная Республика прожила еще недостаточно долго. Еще предстоит в полной мере доказать, что мечты 1917 года стоили того, чтобы за них бороться. Надеюсь, когда-нибудь мы сможем доказать, что это так.."
ukraine_republican_events.176.a: "Тревожно."
ukraine_republican_events.176.a2: "Не волнуйтесь. Мы еще не на том свете."
ukraine_republican_events.176.tt: "Если какая-либо фракция §lУРДП§! в настоящее время имеет §PНизкое§! влияние, оно будет изменено до §MУмеренного§!."

ukraine_republican_events.177.t: "Ковалевский принимает председательство в УПСР"
ukraine_republican_events.177.d: "Всего через год после всеобщих выборов 1937 года Украинская партия социалистов-революционеров пересматривает свое направление после поражения партии в умеренной коалиции. После некоторых внутренних дебатов, многие в партии согласились с тем, что связь УПСР с более радикальными С-РБ сделала создание последовательного послания, которое могло бы привлечь избирателей, трудным — то, что более умеренные партии делают гораздо лучше. Кроме того, с продолжающейся земельной реформой, революционный настрой, характерный в начале выборов, кажется, исчезает.Столкнувшись с этими событиями, произошла смена руководства: после партийной конференции был смещен предыдущий председатель УПСР, Никифор Григориев, в пользу лидера умеренного крыла партии, Николая Ковалевского. Странный поворот, учитывая, что Николай Николаевич был на посту главы партии в 1917 и 1918 годах. Ковалевский — сторонник национализации земли, а не социализации, что сближает его с УСДРП, которые тепло восприняли возвращение Ковалевского в кресло председателя. Теперь изменение отношений между двумя партиями в весьма положительном направлении кажется вполне вероятным.Смена руководства УПСР вызвала бурные дебаты в УРДП. Некоторые видят в этом серьезную угрозу — практические вопросы управления порой оставляют наших партнеров из УСДРП неудовлетворенными, и нельзя недооценивать возможность появления умеренной социалистической коалиции на следующих выборах. Другие видят ситуацию по-другому, считая, что это может расколоть левый фланг и оставить УРДП в роли заправляющего, способного доминировать в политическом центре и свободно выбирать свой курс."
ukraine_republican_events.177.a: "Необходимо сделать дополнительные уступки..."
ukraine_republican_events.177.b: "В худшем случае это не имеет значения — в лучшем случае это приветственное развитие."

ukraine_republican_events.178.t: "Выборы [GetYear] года"
ukraine_republican_events.178.d: "Когда разрушительная война наконец заканчивается, народ стремится вернуться к мирной жизни. Этот конфликт принес огромное количество страданий многим людям — беженцам, раненым ветеранам, сиротам и многим другим, кто потерял многое в этой войне. Нашей нации предстоит начать процесс восстановления, но сначала настало время провести те выборы, которые были отложены в результате конфликта.Естественно, основной темой этих выборов будет восстановление. Все партии представили свои планы амбициозных послевоенных программ социального обеспечения и других кампаний для исцеления ран войны. Радикалы надеются получить большинство, обещая создать процветающую и бурно развивающуюся экономику, которая, в свою очередь, поможет тем, кто пострадал от войны, вернуться к нормальной жизни. Тем временем, Рабочая партия привлекает поддержку, принимая пацифистскую риторику, обещая никогда не допустить, чтобы Украина снова стала жертвой подобной трагедии. Однако самые большие обещания перемен снова исходят от УПСР и С-РБ. С тем, что угроза для Украины нейтрализована, они заявляют, что теперь идеальное время для радикальных социальных и политических изменений.Избирательная ситуация стала еще более непредсказуемой из-за нового претендента — Украинской народной партии (УНП). Хотя правая Украина еще не оправилась от поражения Гетмана, и Народная Республика без сомнений доказала свою состоятельность, политический ландшафт меняется в их пользу. Война разожгла патриотический пыл, так необходимый УНП, и под популярным руководством Михновского партия привлекает избирателей больше, чем когда-либо.Теперь, на [?global.date.GetDateStringNoHourLong], миллионы избирателей снова идут на выборы, чтобы выбрать свое правительство. Для многих это кажется целой вечностью с тех пор, как состоялись выборы 1937 года, и на самом деле люди давно ждут того, чтобы их голос был снова услышан. Демократия, похоже, победила, и новое правительство обеспечит ее процветание на века."
ukraine_republican_events.178.a: "Преобладание УРДП заканчивается, и партия остается вне власти."
ukraine_republican_events.178.b: "Преобладание УРДП заканчивается, и партия становится младшим партнером УСДРП."
ukraine_republican_events.178.c: "УРДП возвращается к власти под руководством Доленко!"
ukraine_republican_events.178.e: "УРДП возвращается к власти под руководством Никовского!"
ukraine_republican_events.178.f: "УРДП возвращается к власти под руководством Вышиваного!"
ukraine_republican_events.178.g: "УРДП возвращается к власти под руководством Шульгина!"

ukraine_republican_events.182.t: "Украина и Pax Germanica"
ukraine_republican_events.182.d: "С тем, что УРДП теперь занимает позицию правящей партии, разногласия между различными ее крыльями теряют исключительно теоретический характер и переходят в сферу практической политики. Хотя дебаты обычно касаются в первую очередь порядка приоритетов принятия определенных решений, некоторые вопросы остаются довольно спорными. Одним из таких является место Украины в Pax Germanica.Правое крыло УРДП в основном поддерживает существующий статус-кво. Хотя эти взгляды редко выносятся на передний план в публичном имидже фракции (с учетом относительно низкой популярности Берлина среди обычных украинцев), многие правые частные лица сохраняют довольно положительное мнение о текущем международном порядке. Рейхспакт, по их мнению, является оплотом порядка против синдикалистской анархии, Миттелевропа — союзом самых развитых экономик континента, необходимым для мирного и плодотворного сотрудничества между народами Европы. Поэтому неудивительно, что Пилип Пилипчук, один из ведущих представителей правого крыла УРДП и член экономического комитета партии, всегда настаивал на укреплении связей между Украиной и Германией.Тем не менее, эти взгляды сейчас не находят понимания среди левого крыла партии. Они утверждают, что милитаризация Германии частично ответственна за рост напряженности в Европе, в то время как Миттелевропа слишком навязчива, чтобы позволить развитию своих государств-членов (с исключением Германии). Как выразился Иван Фещенко-Чопивский, видный представитель левого крыла УРДП и Народный министр экономики: «Национальное развитие должно контролироваться национальным правительством, а не невыбранными иностранными бюрократами».С течением времени нашему Министерству иностранных дел все труднее лавировать между этими противоречивыми взглядами. С ростом международной напряженности, возможно, уже скоро, возможно, будет необходимо занять твердую позицию по этому вопросу."
ukraine_republican_events.182.a: "Будущее Украины связано с европейским порядком."
ukraine_republican_events.182.b: "Наша ответственность перед нашим народом, а не перед далекими столицами."

ukraine_republican_events.183.t: "Спилка и правая партия"
ukraine_republican_events.183.d: "Возрождение 'Селянской Спилки', профсоюзной сети, ориентированной на крестьянство, является одним из самых заметных недавних событий в сфере организованного труда. Многие считают эту огромную организацию, возрожденную под покровительством УПСР, свидетельством того, что способность к сотрудничеству и местной организации остается одной из сильных сторон украинского народа.Однако не все разделяют эту точку зрения. Правая фракция УРДП, в частности, настроена скептически по отношению к этой структуре. Как всегда, ее члены опасаются потенциально разрушительного влияния «социального коллективизма», который, по их мнению, не характерен для украинского крестьянства и остается обременительным наследием российской колонизации, опасным иностранным экспортом.Эти опасения теперь принимают форму беспокойства за безопасность украинского государства. Очевидно, что Спилка предоставляет идеальное прикрытие для радикальных социалистов, распространяющих антиреспубликанскую пропаганду среди самых бедных слоев крестьянства. Поскольку организация настолько велика и децентрализована, вполне естественно ожидать, что боротбисты и радикалы УПСР тайно захватят ее местные отделения и повернут их против республиканского порядка. Необходима тщательная проверка возможных незаконных действий, и сама организация должна находиться под строгим наблюдением.Однако левая фракция УРДП не слишком склонна к этому взгляду. Костянтин Мациевич, один из ведущих представителей левого крыла и ключевой член аграрного комитета партии, в частных беседах назвал эти подозрения «погранично параноидальными». Он утверждает, что Спилка важна для развития сельской местности, а ее образовательные и организационные усилия особенно ценны сейчас, во время продолжающейся земельной реформы. Более того, это укрепляет позиции умеренного крыла УПСР, тем самым уменьшая радикализм социалистической оппозиции. Поэтому государство должно сотрудничать с этим союзом, а не ограничивать его."
ukraine_republican_events.183.a: "Действительно подозрительная организация."
ukraine_republican_events.183.b: "Ее усилия следует поддерживать."

ukraine_republican_events.184.t: "Генералы выражают беспокойство"
ukraine_republican_events.184.d: "Наше решение поддержать инициативу УСДРП относительно надлежащего идеологического и образовательного развития вооруженных сил неизбежно привлекло много критики. Хотя громкие возмущения генерала Болбочана и тихие недовольства генерала Омельяновича-Павленко были ожидаемы, неудовлетворенность заметна даже среди более сдержанных высокопоставленных офицеров.Генералы Греков и Чижевский — редкие примеры офицеров военного командования, поддерживающих нашу партию, особенно ее правое крыло. Это связано с их связями с партиями Социалистов-Независимых и Народных Республиканцев, многие из которых вступили в УРДП в 1920-е годы и теперь составляют ее правое крыло. Теперь эти офицеры тайно обратились в партию, чтобы выразить свои опасения по поводу реформ в армии. Суть их аргумента сводится к простому утверждению: чрезмерная политизация армии вредна, независимо от того, кто ее осуществляет — гетманист или демократ.Хотя мы отвергаем обвинения в «чрезмерной политизации» и считаем, что долгосрочные выгоды от реформы перевешивают краткосрочные неудобства, вызванные ею, некоторые в партии предлагают хотя бы признать реальные опасения наших союзников среди военных. Другие более скептичны и видят в этом лишь завуалированную просьбу к партии использовать свое влияние для защиты позиций двух генералов и их сторонников — довольно богато, если учесть, что эти люди жалуются на предполагаемую 'политизацию' армии."
ukraine_republican_events.184.a: "Вежливый ответ будет достаточен."
ukraine_republican_events.184.b: "Успокойте генералов, заверив, что им нечего бояться."

ukraine_republican_events.185.t: "Будущее под угрозой"
ukraine_republican_events.185.d: "Военная ситуация развивалась не в нашу пользу. Огромная огневая мощь российского наступления вытеснила нас с оборонительных позиций, и многие крупные города уже оказались под контролем русских.\n\nВ то время как миллионы украинцев теперь находятся под оккупацией, а наши вооруженные силы показали неудачи, ответственность за это возлагается на правительство. Оппозиция укрепила свои позиции, и общественное мнение, похоже, становится все более негативным в отношении того, как правительство справляется с войной.\n\nХотя победа в конечном итоге наступит, эти события явно не дают надежды на успех на послевоенных выборах. Патриотические украинцы, оказавшиеся под оккупацией российскими силами, едва ли с благодарностью вспомнят, как мы их оставили."
ukraine_republican_events.185.a: "Неудача."
ukraine_republican_events.185.a.tt: "Правящая партия гарантированно §Rпроиграет§! послевоенные выборы."

#USDRP Events Start Here
ukraine_republican_events.187.t: "Взгляд влево"
ukraine_republican_events.187.d: "Несмотря на наши усилия, Украина по-прежнему связана с миттелеевропейским порядком — Берлин продолжает оказывать на нас давление, часто используя Миттелеевропу как инструмент. Наша торговая независимость ограничена, и наша экономика всё ещё остаётся под значительным влиянием иностранных держав.\n\nЕсть один способ обойти эти неблагоприятные обстоятельства. Хотя у нас мало симпатий к насильственному социализму Интернационала, возможно, лучшим вариантом было бы заключить двустороннее торговое соглашение. Франция и Великобритания — это промышленно развитые страны, которые могут предложить Украине многое.\n\nОднако такое соглашение стало бы прецедентом, учитывая двадцатилетнее господство Германии в восточноевропейской торговле. Кроме того, Миттелеевропа была создана с учётом протекционизма, и торговля за её пределами обычно не приветствуется, особенно для стран, находящихся под германским сапогом.\n\nТем не менее, ради нашей выгоды мы готовы отправить переговорщика в Париж, чтобы сделать это реальностью. Арнольд Марголин, член УРДП, имеет опыт работы в иностранной службе и будет хорошим кандидатом для компромисса как с нашим младшим партнёром, так и с Берлином, если наши переговоры с Интернационалом вызовут их гнев. Некоторые предлагают отправить другого члена партии, например, Михаила Еремеева, чтобы показать, что мы серьёзно настроены на эти переговоры и действуем независимо от Германии."
ukraine_republican_events.187.a: "Отправим Марголина в Париж."
ukraine_republican_events.187.b: "Отправим вместо него Еремеева!"
ukraine_republican_events.187.a.tt: "§HАрнольд Марголин§! из §lУРДП§! будет отправлен в Париж для переговоров о торговой сделке с французами и британцами.\n\nЭто §Rусложнит§! условия сделки, но вероятность её успеха §Gвырастет§! на §Y20%§!."
ukraine_republican_events.187.b.tt: "§HМихаил Еремеев§! из §SУСДРП§! будет отправлен в Париж для переговоров о торговой сделке с французами и британцами.\n\nЭто §Gулучшит§! условия сделки, но вероятность её успеха §Rуменьшится§! на §Y20%§!."

ukraine_republican_events.188.t: "Искусство сделки"
ukraine_republican_events.188.d: "Наш переговорщик прибыл в столицу Франции, что стало небольшой неожиданностью для коммунистических чиновников. Уже становится очевидным, что отношения между Интернационалом и Украиной значительно улучшились по сравнению с тем, что было при Гетманате, и этим мы можем гордиться.\n\nВ обмен на дешёвое украинское зерно у нас есть несколько вариантов: поставка высококачественных потребительских товаров или, возможно, необходимое оборудование для продолжающейся программы индустриализации. Поставка топлива в Интернационал, учитывая нынешний нефтяной бум, также на повестке дня и, вероятно, позволит улучшить условия сделки."
ukraine_republican_events.188.a: "Промышленная помощь, безусловно, важна."
ukraine_republican_events.188.b: "Мы можем справиться с индустриализацией. Потребительские товары в приоритете."
ukraine_republican_events.188.c: "Время на большую сделку: продадим и нашу нефть."
ukraine_republican_events.188.tt: "Если торговое соглашение состоится:"
ukraine_republican_events.188.c.tt: "Этот вариант доступен, поскольку решение §HРазработка месторождений нефти BASF§! завершено.\n\nВероятность успеха сделки §Rуменьшится§! на §Y20%§!."

ukraine_republican_events.189.t: "Берлин стучится в дверь"
ukraine_republican_events.189.d.spd: "Изначально ожидалось, что отношения могут достичь нового уровня с приходом СДПГ в Рейхстаг, но их требования показывают, что они не менее империалистичны, чем их предшественники."
ukraine_republican_events.189.d.schleicher: "Хотя администрация Шлейхера кажется прагматичной на первый взгляд, нет сомнений, что они воспользуются этой возможностью, чтобы выжать из нас все возможные уступки. Для них тот факт, что мы свергли одного из самых верных германских союзников, — это пощёчина, так что можно ожидать, что они оправдают свои действия."
ukraine_republican_events.189.d.swr: "На самом деле, германский министр иностранных дел, Ульрих фон Хассель, не скрывает, что он презирает народную республику и её социал-демократическое правительство. Уже в Германии принимаются антисоциалистические законы, в основном направленные против наших идеологических братьев в их стране. Их нежелание работать с нами теперь выставлено на всеобщее обозрение."
ukraine_republican_events.189.d: "Когда переговоры, казалось, шли хорошо, произошло беспорядки. В Национальные Зборы поступило вербальное уведомление от администрации [GER.GetSecondInCommand], посланное немецким послом в Украине, Иоганнесом фон Вельцеком.\n\nВ нём прямо требует от украинского правительства объяснений о природе переговоров с французами и британцами. Если это требование не будет выполнено, будет объяснено, что последуют серьёзные последствия.\n\nТеперь более чем когда-либо ясно, что Германия не ценит УСДРП. $ukraine_republican_events.189.d.spd$\n\nНо мы должны найти выход из этой ситуации. Больно, но некоторые предлагают отменить сделку полностью и искать новые пути, чтобы дистанцироваться от Берлина. Мы уже так далеко зашли — и у нас есть множество вариантов."
ukraine_republican_events.189.d2: "Когда переговоры, казалось, шли хорошо, произошло беспорядки. В Национальные Зборы поступило вербальное уведомление от администрации [GER.GetSecondInCommand], посланное немецким послом в Украине, Иоганнесом фон Вельцеком.\n\nВ нём прямо требует от украинского правительства объяснений о природе переговоров с французами и британцами. Если это требование не будет выполнено, будет объяснено, что последуют серьёзные последствия.\n\nТеперь более чем когда-либо ясно, что Германия не ценит УСДРП. $ukraine_republican_events.189.d.schleicher$\n\nНо мы должны найти выход из этой ситуации. Больно, но некоторые предлагают отменить сделку полностью и искать новые пути, чтобы дистанцироваться от Берлина. Мы уже так далеко зашли — и у нас есть множество вариантов."
ukraine_republican_events.189.d3: "Когда переговоры, казалось, шли хорошо, произошло беспорядки. В Национальные Зборы поступило вербальное уведомление от администрации [GER.GetSecondInCommand], посланное немецким послом в Украине, Иоганнесом фон Вельцеком.\n\nВ нём прямо требует от украинского правительства объяснений о природе переговоров с французами и британцами. Если это требование не будет выполнено, будет объяснено, что последуют серьёзные последствия.\n\nТеперь более чем когда-либо ясно, что Германия не ценит УСДРП. $ukraine_republican_events.189.d.swr$\n\nНо мы должны найти выход из этой ситуации. Больно, но некоторые предлагают отменить сделку полностью и искать новые пути, чтобы дистанцироваться от Берлина. Мы уже так далеко зашли — и у нас есть множество вариантов."
ukraine_republican_events.189.a: "Ограничим масштаб соглашения."
ukraine_republican_events.189.b: "Отменим сделку полностью."
ukraine_republican_events.189.c: "Попробуем уговорить мистера Вельцека..."
ukraine_republican_events.189.e: "Пересмотрим германо-украинский договор и предложим новые уступки."
ukraine_republican_events.189.a.tt: "Ответ Германии §Hбудет зависеть§! от трёх факторов: \n£white_dot Выбрали ли мы §lМарголина§! или §SЕремеева§! для переговоров.\n£white_dot Является ли Германия §SСоциал-демократической§!, §gАвторитарно-демократической§!, или §PПатерналистской§!.\n£white_dot Наш уровень §1Идеализма§! - чем §Rменьше§!, тем лучше."
ukraine_republican_events.189.b.tt: "Торговая сделка §Rне состоится§!."
ukraine_republican_events.189.c.tt: "Ответ Германии §Hбудет зависеть§! от трёх факторов: \n£white_dot Выбрали ли мы §lМарголина§! или §SЕремеева§! для переговоров.\n£white_dot Является ли Германия §SСоциал-демократической§!, §gАвторитарно-демократической§!, или §PПатерналистской§!.\n£white_dot Наш уровень §1Идеализма§! - чем §Gбольше§!, тем лучше."

ukraine_republican_events.190.t: "Гнев Кукловода"
ukraine_republican_events.190.d: "Немцы не отреагировали положительно на наше предложение.\n\nПосол Вельчек передал ответ из Берлина, в котором они усомнились в том, что украинское правительство имеет право выдвигать такие требования, и поставили под сомнение оборонительный договор между двумя странами.\n\nКроме того, они отправили ультиматум: в течение 24 часов Украина должна взять на себя ответственность и прекратить эти вредоносные переговоры, угрожающие безопасности обеих наций. Несоблюдение этого условия приведет к волне санкций, заморозке членства Украины в Миттелевропе и другим мерам. Стало ясно, что через эти угрозы они пытаются организовать второй переворот против Народной Республики и заставить правительство УСДРП принять решение.\n\nКогда это было зачитано на сессии Национального Собрания, паника охватила зал. Наши младшие партнеры из УРДП обвинили нас в разрушении германо-украинских отношений, которые необходимы для обеспечения нашей безопасности от российской агрессии. Фигуры правой фракции УРДП и УНП, такие как Николай Михновский и Владимир Доленко, громко осудили УСДРП как партию высокомерных идеалистов, которые ни перед чем не остановятся, чтобы привести Украину к разрушению своей невежественной внешней политикой.\n\nВ конце концов, наш дипломат, отправленный в Париж, был отозван, а немцы не прислали нам больше ни слова. Говорить, что этот инцидент стал позором для партии, было бы большим преуменьшением."
ukraine_republican_events.190.a: "Реальность — жестокая госпожа..."

ukraine_republican_events.191.t: "Мягкость идет далеко"
ukraine_republican_events.191.d: "Немцы положительно отреагировали на наше контрпредложение, что означает, что франко-британско-украинская торговая сделка может наконец начать действовать.\n\nКроме материальных выгод, это также огромная пропагандистская победа для USDRP. Несмотря на протесты правых, даже URDP, похоже, в целом поддерживает успех переговоров. Прежде всего, мы показали, что можем идти своим путем и вести переговоры с Германией на равных условиях."
ukraine_republican_events.191.a: "То, что гетман не мог сделать, мы сделали за год."

ukraine_republican_events.192.t: "Закладка основ"
ukraine_republican_events.192.d: "Почти два десятилетия наша любимая Украина томилась под игом Скоропадского. С надеждами и мечтами 1917 года покончено, наша страна была сведена к ничем не отличающемуся личному феодальному владению так называемого 'Гетмана' и его приспешников. Несмотря на тонкую оболочку 'национального украинского характера', этот режим был, по сути, прямым продолжением царского правления — жестокого, безжалостного и глубоко реакционного.\n\nЧтобы исправить все разрушения и компенсировать все годы пренебрежения, требуется непоколебимая решимость. Наша решимость основана на преданности социалистической идее. Однако мы понимаем, что материальные и геополитические условия Украины не позволяют сразу перейти к насильственной социалистической трансформации, как это пропагандируют Париж и Лондон. Нет, болезненные уроки неудачной большевистской революции наглядно показали нам, что открытая классовая война в Украине приведет только к хаосу, экономическому краху и, в конечном счете, к тирании немногих. Здесь социализм может быть построен только на прочных демократических и парламентских основах. Наша важнейшая задача — заложить их.\n\nЭто будет нелегко. Нам предстоит глубоко преобразовать саму ткань украинского общества и политической системы, одновременно расширяя влияние нашей партии, превращая ее в настоящее массовое движение рабочего класса. Мы ожидаем сопротивления как слева, так и справа, как от заблуждающихся экстремистов, так и от довольных умеренных.\n\nНо не будем колебаться. Непреклонность наших оппонентов только закалит нашу решимость и придаст нам новые силы для борьбы за наши идеалы."
ukraine_republican_events.192.a: "За свободную и процветающую Украину!"
ukraine_republican_events.192.a.tt: "В зависимости от уровня §1Идеализма§!, показанного в вкладке решений, многие из наших фокусов получат дополнительные бонусы. Принятие этих фокусов обычно тратит наш §1Идеализм§!, но через события и другие фокусы мы сможем §Gувеличить§! уровень.\n\nОпускание §1Идеализма§! до §Y-4§! может иметь катастрофические последствия, так что будьте осторожны."

ukraine_republican_events.193.t: "Раскол"
ukraine_republican_events.193.d: "Роспуск Украинского Социалистического Блока, объявленный после провозглашения Народной Республики, был представлен общественности как мирный и доброжелательный процесс: старые товарищи расходятся на пороге чего-то нового. Однако за этим расколом скрывается больше, чем кажется на первый взгляд. Распад уже и так шаткого альянса был согласован на фоне внутренних напряжений, которые сильно обострились после относительно недавнего инцидента.\n\nВ последние дни анти-Гетманской кампании состоялась импровизированная встреча представителей УСДРП и РДС в городе Белая Церковь, недалеко от Киева. Делегацию РДС возглавлял Антин Драгомирецкий, один из главных представителей радикальной фракции СРБ, а также Павло Христюк из УПСР. Социал-демократов представляли два члена центрального комитета — Панас Феденко и Андрей Ливицкий — в сопровождении Николая Галагана, члена комитета партии по военным делам.\n\nДрагомирецкий был ясен: пора воспользоваться революционным моментом и после свержения Гетмана провозгласить социалистическую и советскую республику. Нет нужды заменять один буржуазный режим на другой, даже если он якобы более демократичен, когда есть шанс на настоящую революцию. Хотя Галаган проявил некоторый интерес к предложению, Феденко и Ливицкий были явно озадачены. Последний напомнил о 'предыдущих соглашениях с УРДП и рисках немецкого вмешательства', в то время как первый сосредоточился на 'неадекватных материальных условиях и отсутствии политической осведомленности среди масс', заявив, что революционные попытки на этом этапе могут погубить все дело, даже так близко к победе.\n\nПлан в итоге был отклонен, а этот эпизод стал окончательным разделом среди бывших изгнанников. Смогут ли УСДРП и РДС достичь примирения в новом политическом климате, или они останутся в полном противостоянии — покажет время."
ukraine_republican_events.193.a: "Старый раскол между реформаторами и революционерами."

ukraine_republican_events.194.t: "УРДП на распутье"
ukraine_republican_events.194.d: "Ежегодная партийная конференция УРДП состоится через три месяца, и, безусловно, значительная часть ее будет посвящена составу партийного руководства. Неудовлетворительные результаты на последних выборах вызвали сомнения среди членов партии в нынешнем направлении УРДП, поэтому не удивительно, что правая фракция партии набирает популярность. Владимир Доленко, ее лидер, раскритиковал левое и центристское крыло, заявив, что они не могут 'сдерживать социалистов в Собрании' и не способны предоставить должное руководство партии в целом.\n\nНеудивительно, что правая фракция УРДП поддерживает кандидатуру Доленко на должность секретаря центрального комитета, которая в настоящее время занимает Вячеслав Прокопович. Прокопович относится к центристам партии, которые ранее подчеркивали хорошие отношения с нами и, вероятно, продолжат это делать. Это, безусловно, разрушительно для наших отношений с УРДП, если Доленко займет его пост.\n\nНекоторые в УСДРП, в частности Андрей Ливицкий, предложили возможные контрмеры: если УРДП будет двигаться дальше вправо и станет нам помехой, УСДРП должна принять более серьезные меры для укрепления своей позиции. Передача большей власти исполнительной власти через создание президентского офиса может стать нашим билетом к сопротивлению правой инертности."
ukraine_republican_events.194.a: "Нам нужно сначала увидеть результаты."

ukraine_republican_events.195.t: "Победа Доленко"
ukraine_republican_events.195.d: "Ставка Владимира Доленко оправдалась, и теперь он занимает должность секретаря центрального комитета УРДП. По приходу он пообещал направить партию в более 'рациональное русло', заявив, что УРДП не станет спутником старшего коалиционного партнера.\n\nЭти изменения, безусловно, будут ощущаться со временем. Однако у нас есть козырь в рукаве, и нам будет разумно его использовать."
ukraine_republican_events.195.a: "Мы переживем это мелкое вмешательство."
ukraine_republican_events.195.a.tt: "Теперь эффекты §lУРДП§! дают:\n§RНепримиримый§!: Ежедневное количество политической власти: §R-0.25§!, Стабильность: §R-15.00%§!\n§OНейтральный§!: Ежедневное количество политической силы: §R-0.25§!, Стабильность: §R-15.00%§!\n§GСовместимый§!: Ежедневное количество политической власти: §R-0.20§!, Стабильность: §R-10.00%§!\n§CПриятный§!: Ежедневное количество политической власти: §R-0.20§!, Стабильность: §R-10.00%§!"

ukraine_republican_events.196.t: "Прокопович держится"
ukraine_republican_events.196.d: "Ставка Владимира Доленко провалилась. В конце партийной конференции УРДП центр и левая фракции объединились и помогли Вячеславу Прокоповичу сохранить свою должность секретаря центрального комитета УРДП.\n\nНа практике это означает, что отношения между УСДРП и УРДП останутся прежними. По крайней мере, пока это победа."
ukraine_republican_events.196.a: "Хорошо."

ukraine_republican_events.197.t: "Месть левых"
ukraine_republican_events.197.d: "Ставка Владимира Доленко провалилась — и в самой зрелищной форме. Когда правая фракция УРДП обвинили Андрея Никовского, лидера левых, в излишней мягкости по отношению к социализму, он мастерски защитил свою позицию. Он не только ответил на обвинения, но и заявил, что правая фракция УРДП не имеет общих целей с остальной частью партии и стремится только к захвату власти ради собственных узких интересов.\n\nТак умело Андрий Васильевич разрушил импульс правой фракции, что случилось нечто неожиданное. Несмотря на первоначальные ожидания, что Прокопович сохранит свой пост, именно Никовский стал новым секретарем центрального комитета.\n\nЭто отличные новости для нас. Никовский, несомненно, будет более надежным младшим партнером, чем его предшественники, и мы можем ожидать, что наш союз будет продолжать развиваться без проблем."
ukraine_republican_events.197.a: "Поздравляю!"

ukraine_republican_events.198.t: "Кто ты, Симон Петлюра?"
ukraine_republican_events.198.d: "Его лицо на множестве агитационных плакатов, его имя скандируется толпами и шепчется в дымных комнатах, его восхваляют как спасителя Республики и осуждают как удачливого оппортуниста, но даже внимательные наблюдатели едва ли могут понять его точную программу. Где он стоит? Конечно, известность и влияние такого масштаба — это признаки человека с амбициями, выходящими за пределы простой Народной Минсобственности по военным делам?\n\nНекоторые ищут ответы в далеком прошлом, особенно в неопределенные и мутные годы раннего изгнания. Там можно найти историю противоречивых взглядов и эго, когда среди первых попыток консолидации шаткого изгнанного движения, видение Петлюры столкнулось с множеством других — Винниченко, Шаповал и других. Они рассматривали анти-Гетманскую борьбу как форму социальной борьбы, сопротивление угнетенным массам против эксплуататоров, в то время как Петлюра призывал к более широкому подходу, настаивая на том, чтобы поставить интересы угнетенной украинской нации выше классовых и партийных разделений.\n\nДругие смотрят на более поздние годы, когда Петлюра, уменьшивший свое влияние в свете постоянных споров, покинул главный политический круг изгнания и сосредоточился на практических организационных вопросах. Здесь также трудно быть уверенным. Были ли его успехи в искоренении агентов Гетманистов среди изгнанников и в планировании восстания результатом его таланта, или это просто удача в подборе компетентных и активных соратников, таких как Удовиченко, Тютюнник или Чеботарев?\n\nВосстановление Республики, в котором Петлюра, безусловно, сыграл важную роль, добавляет вес этим многочисленным вопросам. Одна из них, однако, продолжает оставаться на виду. Было ли его отступление на задний план политической сцены временной мерой или жизненным решением? Возможно, общий курс партии даст нам представление о планах и ожиданиях этого скрытного лидера повстанцев."
ukraine_republican_events.198.a: "Вопрос на миллион гривен."
ukraine_republican_events.198.a.tt: "После найма, черта Петлюры будет изменена в зависимости от нашего §1Идеализма§!.\n\nНайм Петлюры, а также повышение его уровня навыков во время войны может создать возможность для новых послевоенных политических событий."
KR_MHC_chief_otaman_tt: "Черты Петлюры будут изменены в зависимости от нашего §1Идеализма§!.\nИзменение §1Идеализма§!: §Y-1§!"

ukraine_republican_events.199.t: "Создание президентского офиса"
ukraine_republican_events.199.d: "Все становится слишком очевидным: парламентская модель не оправдала ожидания в пользу УСРДП. С приходом правой фракции в УРДП, коалиция между двумя партиями начинает разваливаться, поскольку Национальные Зборы становятся местом бессмысленных дебатов и бездействия.\n\nПредложение Андрея Ливицкого о создании президентского офиса и тем самым наделении исполнительной власти полномочиями стало серьезно обсуждаться в рядах УСРДП. Однако такое предложение требовало голосования за изменение Конституции, что оказалось спорным даже внутри партии.\n\nВ конечном итоге, когда голосование состоялось в Национальных Зборах, результат оказался более единодушным, чем ожидалось. Это был сюрприз, что правая фракция УРДП, в частности, в основном проголосовала за предложение; вероятно, они полагали, что это решение в будущем может сыграть против социал-демократов на следующих выборах.\n\nС сегодняшнего дня установлено звание «Президента Украинской Народной Республики» и все полномочия, связанные с этим."
ukraine_republican_events.199.a: "Переходим к следующему этапу!"

ukraine_republican_events.200.t: "Социалистическое восстание в Украине"
ukraine_republican_events.200.d: "Когда Рабочий Демократический Союз провозгласил победу на выборах в Украине в 1937 году, это вызвало беспокойство у многих - наличие открытого социалистического правительства вызвало значительное недовольство в Берлине и Вене, которые до сих пор терпели правительство при условии, что оно будет соблюдать военные альянсы.\n\nСегодня, когда Германия продолжает терпеть военные поражения, эти опасения оправдались. После устранения более умеренных элементов из правительства Союз взял полный контроль и объявил о своей приверженности Интернационалу, что представляет собой новую угрозу для Райхспакта на Востоке."
ukraine_republican_events.200.a: "Мы должны были это предвидеть..."
ukraine_republican_events.200.b: "Возьмите оружие, Украина, за революцию!"
ukraine_republican_events.200.c: "Всегда бегать к сапогам нового завоевателя Европы..."
ukraine_republican_events.200.e: "Германский порядок дрогнул..."

ukraine_republican_events.201.t: "Исаак Мазепа, Президент Украины"
ukraine_republican_events.201.d: "Сегодня состоялись первые выборы на пост президента. На этот пост выдвигались многочисленные кандидаты, такие как Владимир Винниченко, Николай Михновский и Владимир Доленко. Однако, как и ожидалось, единственным кандидатом, имевшим шансы на победу, был действующий председатель Национального Собрания Исаак Мазепа.\n\nУчитывая, насколько далеко УСРДП продвинулся в плане вывода украинского народа из нищеты, справедливого распределения земли, установления трудовых прав и многого другого, было ожидаемо, что мы получим второй мандат.\n\nКроме того, немалая роль в результатах принадлежит самому Мазепе: на данный момент он, вероятно, только уступает Петлюре как лицо украинского республиканизма. Он никогда не стремился к славе или богатству, его репутация - это человек, который тих и скромен в частной жизни, но стойко защищает республиканские идеалы на публике. Естественно, такой результат не вызывал сомнений.\n\nКак президент Украинской Народной Республики, Мазепа теперь обладает важной властью: правом вето. Пока это вето не будет отменено двумя третьями голосов в Национальных Зборах, президент может отклонить законопроекты. Маловероятно, что правые, по крайней мере на данный момент, смогут должным образом ответить на это."
ukraine_republican_events.201.a: "Поздравляем, господин Президент."

ukraine_republican_events.202.t: "Объединены в борьбе?"
ukraine_republican_events.202.d: "Отношения между УСРДП и УПСР всегда были сложными. Обе партии выступали за социализм и часто сотрудничали, но различия в подходах и организационные особенности ставили их на определенную дистанцию – УСРДП всегда была более централизованной организацией, в то время как УПСР, особенно в первые годы, часто напоминала общественное движение, а не дисциплинированную партию. Восстание и первые дни Республики увеличили дистанцию между ними, одна из которых стала ведущей силой правительственной коалиции, а другая – частью оппозиции.\n\nТем не менее, несмотря на напряженные отношения между двумя партиями, есть голоса, призывающие к усиленному сотрудничеству. Одним из самых ярких сторонников возможного сближения является Николай Галаган, который едва не был исключен из УСРДП за несанкционированные переговоры с УПС-Р в первые годы изгнания. Даже сейчас, будучи членом наиболее заметных кругов партии, он настаивает, что будущее социал-демократов связано с будущим социалист-революционеров. Отклонение их от радикалов С-РБ, кооптация или союз с наиболее восприимчивыми элементами и создание единого социалистического фронта – вот ключевые приоритеты для партии. Без популярности УПСР РДС останется всего лишь клубом псевдомарксистских догматистов. Николай Ковалевский, лидер умеренной фракции УПС-Р, может быть слишком ценным союзником, чтобы просто его игнорировать.\n\nЭти страстные призывы находят как сторонников, так и скептиков среди широкого состава УСРДП. Некоторые считают, что УПСР слишком далеко зашла, окончательно потеряна. Другие понимают возможные последствия для союза с УРДП. Тем не менее, даже скептики склонны согласиться, что ограниченное сотрудничество может принести свои плоды."
ukraine_republican_events.202.a: "Галаган прав. Мы много получим от усиленного сотрудничества."
ukraine_republican_events.202.b: "Ограниченное сотрудничество в Зборах будет достаточным."
ukraine_republican_events.202.c: "Нет нужды в этом."
ukraine_republican_events.202.a.tt: "Нам нужно достичь хотя бы §Y90§! §CОчков земельной реформы§!, чтобы миссия увенчалась успехом."

ukraine_republican_events.203.t: "Киевская конференция"
ukraine_republican_events.203.d: "Ратификация Договора о сотрудничестве между народными государствами открыла новые возможности для совместных усилий восточноевропейских стран в Центральной Европе. Сегодня одним из таких усилий стала так называемая Киевская конференция, на которой собрались делегаты социал-демократических партий региона, включая УСРДП, Белорусскую БСДП, Литовскую ЛСДП и Грузинскую ССДП, чтобы обсудить будущее социал-демократии.\n\nНа конференции было поднято множество вопросов, поскольку наши идеологические братья делились теоретическими трудами, практическими вопросами управления и многим другим. Делегат УСРДП Панас Феденко взял слово, чтобы подчеркнуть сходства между странами делегатов: все они ранее были частью Российской Империи и боролись за национальное и социальное освобождение. В то время как первое в значительной степени было достигнуто, борьба за социальное освобождение продолжается.\n\nРечь Феденко стала более смелой. Он подчеркнул, что величайшим препятствием для социального прогресса является не внутреннее, а внешнее влияние: необходимо ограничить разрушительное воздействие немецкого капитала и сохранить суверенитет восточноевропейских народов. Присутствие наблюдателя от СПД на конференции не сбило Феденко с пути, несмотря на попытки изобразить Германию как угнетателя народов.\n\nТем не менее, его слова стали более спорными, чем ожидалось. Некоторые делегаты, как например, Ян Серада из БДСП, усомнились в необходимости столь агрессивной риторики в адрес немецких союзников. Несмотря на все сходства, есть один факт: УСРДП пришла к власти в Украине через насильственную борьбу против Гетмана, чего не пришлось пережить нашим социально-демократическим братьям за границей. Это и стало основой для различий во взглядах делегатов."
ukraine_republican_events.203.d2: "Ратификация Договора о сотрудничестве между народными государствами открыла новые возможности для совместных усилий восточноевропейских стран в Центральной Европе. Сегодня одним из таких усилий стала так называемая Киевская конференция, на которой собрались делегаты социал-демократических партий региона, включая УСРДП, Белорусскую БСДП, Литовскую ЛСДП и Грузинскую ССДП, чтобы обсудить будущее социал-демократии.\n\nНа конференции было поднято множество вопросов, так как наши идеологические братья делились теоретическими работами и практическими вопросами управления. Делегат УСРДП Панас Феденко взял слово, чтобы подчеркнуть сходства между странами делегатов: все они ранее были частью Российской Империи и боролись за национальное и социальное освобождение. В то время как первое в значительной степени было достигнуто, борьба за социальное освобождение продолжается.\n\nОднако не в последнюю очередь благодаря присутствию делегата СПД на конференции и правительству СПД в Берлине, которое несомненно с удовольствием доложит о неповиновении своих восточных союзников, конференция приняла более умеренную позицию по отношению к Германии, чем это могло бы быть в противном случае."
ukraine_republican_events.203.a: "Международная солидарность — ключ к процветающему будущему для всех."

ukraine_republican_events.205.t: "Симон Петлюра, пламенный лидер"
ukraine_republican_events.205.t2: "Симон Петлюра, государственный деятель"
ukraine_republican_events.205.t3: "Симон Петлюра, прагматик"
ukraine_republican_events.205.d: "Либо по причине общей политической атмосферы в партии, наполненной энтузиазмом и рвением, либо из-за более личных изменений взглядов, похоже, что Главный Отаман возвращается в политическую жизнь. Окруженный ветеранами, верными сторонниками партии, такими как Николай Галаган и Иван Романченко, он делает это в, возможно, неожиданной роли — как публичное лицо и защитник радикальной реформаторской программы партии. Снова обращается к перу, его статьи частенько появляются на страницах ‘Робітничої Газети', снова обращается к народу, его речи собирают толпы сторонников."
ukraine_republican_events.205.d2: "Похоже, что обещание Петлюры держаться подальше от публичной политики все же остается в силе. Столкнувшись с трудностями в поддержании баланса между своей повесткой и ожиданиями союзников по коалиции, Симон Васильевич предпочел сохранить свою политическую дистанцию. Вместо этого он полностью поглотился вопросами Народного министерства военных дел. С такими надежными товарищами, как генералы Удовиченко, Сальский и Безручко, он сосредоточен на укреплении и повышении обороноспособности Украины."
ukraine_republican_events.205.d3: "Долгожданное возвращение Главного Отамана в политическую жизнь не стало неожиданностью для многих. С учетом внутренних разногласий в партии, Петлюра решил несколько дистанцировать свое имя от партийных распрей. Посоветовавшись с Народным министром иностранных дел Андреем Ливицким и высокопоставленным чиновником Министерства связи Иларионом Косенко, Симон Васильевич предпочел представлять себя как патриота, стоящего выше узких партийных интересов. В этой роли он часто служит посредником между УСРДП и УРДП, призывая к компромиссу и сотрудничеству вместо незрелого максимализма."
ukraine_republican_events.205.a: "Мы социал-демократы, но не сектанты."
ukraine_republican_events.205.b: "Государство не может обеспечить свою собственную суверенность без сильной и способной армии."
ukraine_republican_events.205.c: "Национальное освобождение достигнуто, пора бороться за социальное."

ukraine_republican_events.206.t: "Расширение охвата сельских районов"
ukraine_republican_events.206.d: "Если мы намерены преобразовать УСДРП в действительно массовую рабочую партию, мы не можем игнорировать её положение среди крестьян и сельских рабочих. Украина по-прежнему преимущественно аграрная страна, поэтому крайне важно завоевать симпатии сельской местности. Воскрешение 'Селянської Спілки', сети профсоюзов, ориентированной на крестьянство, действующей в основном под патронажем УПСР, даёт нам возможность расширить наше присутствие в сельской местности.\n\nТем не менее, существуют дебаты относительно точного подхода. Более активный подход подразумевает официальную поддержку государства для профсоюза, агрессивную пропагандистскую кампанию, нацеленную на местные отделения союза, и попытку привлечь к себе членов центрального комитета Спілки, не входящих в УПСР. Несмотря на обещания, эта тактика безусловно вызовет раздражение УПСР, с которыми у нас уже сложные отношения.\n\nБолее сдержанный подход будет ограничиваться государственной поддержкой Спілки без попыток инфильтрировать и кооптировать её административные органы. Результаты будут, конечно, меньшими, но, возможно, лучшие отношения с УПСР компенсируют это."
ukraine_republican_events.206.a: "УСДРП должна стать главной партией рабочего класса."
ukraine_republican_events.206.b: "Отчуждение УПСР — ошибка."
ukraine_republican_events.206.a.tt: "Миссия §YНаправление УПСР§! будет завершена только с §Y100§! или более очками по реформе земли."

ukraine_republican_events.207.t: "Победа радикальной фракции"
ukraine_republican_events.207.d: "Несмотря на слухи о возможном изменении курса, радикальное руководство УПСР, сосредоточенное вокруг Никифора Григорьева и Павла Христьюка, удерживает свою позицию.\n\nХотя ожидалось, что их поражение на выборах год назад приведет к пересмотру платформы Социалистов-революционеров, на последней партийной конференции эти идеи не обсуждались. Идея примирения с социал-демократами также была отвергнута из-за явной "медлительности и неэффективности земельной реформы".\n\nВ результате, умеренная фракция УПСР, сосредоточенная вокруг Николая Ковалевского, продолжает оставаться в тени. Маловероятно, что она скоро получит значительное внимание, если не произойдут непредвиденные обстоятельства."
ukraine_republican_events.207.a: "Так тому и быть."

ukraine_republican_events.208.t: "Конфликт среди социалистов-революционеров"
ukraine_republican_events.208.d: "В Украинской партии социалистов-революционеров начинается раскол.\n\nМногие ожидали такой раскол: после поражения на выборах партия осталась вне правительства, а относительно быстрое дер Radicalизация крестьянства после успешной земельной реформы казалась предвестием изменения курса партии. Не стоит забывать и о недавних событиях, когда вмешательство Германии было крайне неприятным для менее радикального правительства, а русское перевооружение парализовало многие более идеалистические предложения на Национальных Зборах.\n\nНа последней партийной конференции УПСР более прагматичная фракция, сосредоточенная вокруг Николая Ковалевского, объединилась, чтобы принудить к необходимым изменениям в курсе партии. Было проведено голосование по удалению нынешнего лидера Никифора Григорьева. В конечном итоге Григорьев сохранил свою позицию, но голосование было весьма близким. Впервые за долгое время кажется, что радикальная фракция УПСР не сможет адаптироваться к текущим политическим условиям Украины.\n\nНебольшой сдвиг вправо безусловно усложнил отношения между УПСР и С-РБ, но для нас это представляет собой потенциальную возможность. Если они посчитают это выгодным, возможно, умеренные из УПСР однажды решат объединиться с социал-демократами, оставив узкомыслящий сектаризм в пользу широкого демократического фронта."
ukraine_republican_events.208.a: "Хорошие новости!"
ukraine_republican_events.208.a.tt: "Лучшие отношения с §RУПСР§! могут создать возможность для новых послевоенных политических событий, если §SУСДРП§! добьется великолепных результатов на выборах."

ukraine_republican_events.209.t: "Смягчить ущерб"
ukraine_republican_events.209.d: "Недавние политические события оказались довольно вредными для наших отношений с УПСР. Поскольку эта партия вряд ли значительно потеряет популярность в будущем, она сохранит своё значительное присутствие и влияние в Собрании, что мы должны учитывать. Таким образом, необходима как краткосрочная, так и долгосрочная стратегия взаимодействия с УПСР.\n\nОдин из более радикальных предложений, направленных на ограничение возможного разрушения парламентарного процесса — это изменение состава Совета старших представителей. Этот орган, состоящий из одного представителя (обычно лидера фракции) каждой партии в Зборах, занимающей более определенного числа мест, выполняет не только административные функции. Его согласие требуется при формировании правительства, а также он может вносить законодательные инициативы независимо от других депутатов. Сейчас как правящая коалиция (УСДРП и УРДП), так и левая оппозиция (УПСР и С-РБ) имеют равное количество мест в Совете. Пока что нам удавалось избегать длительных тупиков в его работе, но с учётом того, что УПСР остаётся отстранённой от нас, нет гарантии, что разумное сотрудничество продолжится. Таким образом, было выдвинуто смелое предложение — назначить каждой партии количество представителей пропорционально числу мест в Зборах. Это значительно усилит позицию правящих партий и снизит потенциальные риски активного саботажа со стороны оппозиции.\n\nМы предполагаем, что реакция депутатов УРДП на предложение будет смешанной — они поддержат его голосами, видя явные выгоды для своей партии, но сделают это с некоторой неохотой, так как большинство депутатов УРДП предпочитают не вмешиваться в парламентскую работу."
ukraine_republican_events.209.a: "Давайте приступим к реорганизации."
ukraine_republican_events.209.b: "Не стоит делать оппозицию ещё более враждебной."

ukraine_republican_events.210.t: "О популистах и землевладельцах"
ukraine_republican_events.210.d: "Природа не терпит пустоты. Вскоре после того, как осел пепел восстания, правая фланга украинской легальной политики начала свою реорганизацию. Несмотря на новые названия партий, лица людей, вовлечённых, обычно достаточно знакомы. Все они утверждают, что поддерживают новый республиканский порядок, одновременно отвергая все обвинения в возможных симпатиях к Гетманщине и выражая шок относительно “раскрытых преступлений предыдущей администрации”. Отвратительная лицемерие, но мы обязаны терпеть её некоторое время.\n\nСамая крупная новая партия называется Украинская народная партия (УНП) и возглавляется бывшим членом УДХП, Николаем Михновским. Ему повезло в некотором смысле: не будучи идеологически настроенным гетманитом, ни беспартийным слугой старого порядка, Михновский хорошо расположен к центристской и правой аудитории в новых политических условиях. Его популистская позиция и бомбастная личность привлекут новых последователей в ближайшие годы.\n\nМеньше по размеру, но не менее раздражающее — это новое политическое дополнение, известное как Национальная аграрная партия (НХП). В отличие от УНП, она не участвовала в общих выборах, хотя есть слухи, что все больше независимых депутатов местных советов начинают клясться в верности этой партии. Говорят, что она во многом вращается вокруг двух личностей: бывшего члена ныне распавшегося ВСЗВ, Василия Кочубея, и знаменитого Сергея Шемета, который покинул УДХП почти сразу после того, как присоединился к нему вслед за падением УСКД. С таким руководством вполне вероятно, что партия будет служить просто политическим фасадом для оставшихся крупных землевладельцев, пытающихся адаптироваться к новому политическому порядку."
ukraine_republican_events.210.a: "Силы реакции не так уж легко подавить."

ukraine_republican_events.212.t: "В защиту Республики"
ukraine_republican_events.212.d: "Только теперь, когда мы получили полномочия и ответственность за управление, мы можем по-настоящему оценить масштабы и разнообразие угроз, осаждающих нашу восстановленную Народную Республику. Подполье кишит экстремистами и фанатиками, готовыми на всё, чтобы посеять хаос и беспорядок. Силы реакции, укрытые теперь хитрым использованием наших собственных законов, строят заговоры для разрушения республики за закрытыми дверями. Наши государственные служащие и органы безопасности глубоко инфильтрированы немецкими агентами и информаторами. Масштабы настолько тревожны, что можно объяснить их только чудом (или медлительностью немецкой бюрократии), что Берлин не смог отреагировать на наше восстание вовремя. Российское подрывное влияние тоже нельзя сбрасывать со счетов — Москва всё ещё не смирилась с потерей империи.\n\nЧтобы бороться с этими угрозами, мы должны действовать решительно. Будет создано специальное контрразведывательное учреждение с широкими полномочиями, чтобы бороться с самыми серьёзными угрозами, которые ставят под угрозу саму основу нашего государства. Названное 'Кош защиты республиканского порядка', оно будет подчиняться напрямую высшим эшелонам Народного Министерства внутренних дел.\n\nВопрос о первоначальном финансировании остаётся открытым. Мы можем ограничиться только средствами из бюджета Министерства внутренних дел или вынести на голосование в Зборах запрос на дополнительное финансирование."
ukraine_republican_events.212.a: "Не стоит скупиться."
ukraine_republican_events.212.b: "Давайте сохраним бюджет разумным."

ukraine_republican_events.213.t: "Вартові Петлюра"
ukraine_republican_events.213.d: "Новообразованный Кош защиты республиканского порядка требует должного руководства с опытом. Высший пост будет отведен одному из соратников Петлюры — Николаю Чеботареву. Лично ответственный за разведывательные усилия для изгнанников Народной Республики, он является подходящим выбором, но одним, который многие всё же считают спорным.\n\nКак беспощадный, независимый и откровенный человек, он успел заручиться немалой антипатией со стороны различных политиков. Не раз его критическое поведение приводило к конфликтам с влиятельными изгнанниками. Некоторые утверждают, что его беспощадность не знает границ, и он может быть столь же жесток к своим подчинённым, как и к врагам и оппонентам. Его противники дали ему печально ироничное прозвище — 'Вартові Петлюра'. Хотя на первый взгляд оно подчеркивает его служебные обязанности в безопасности, оно также ясно отсылает к тем, кто служил в Державной Варті — печально известном полицейском ведомстве Гетманщины.\n\nНесмотря на свою репутацию, его профессионализм и преданность республиканскому делу не вызывают сомнений. Как ветеран УСДРП, он пользуется определённым доверием у партийных властей. Всё же, некоторые считают, что будет разумно следить за ним — на всякий случай."
ukraine_republican_events.213.a: "Опасный человек, но полезный."
ukraine_republican_events.213.b: "Партия будет следить за ним."

ukraine_republican_events.214.t: "Преданные идеалы"
ukraine_republican_events.214.d: "Это стало неожиданностью для председателя Мазепы, когда Народный министр иностранных дел Андрей Ливицкий позвонил ему и предложил встретиться с ним в его резиденции наедине. Насколько он мог судить, эта встреча будет более личной.\n\nОказавшись на месте, Ливицкий действительно сделал её таковой, но довольно косвенным способом. Он вспомнил, как далеко продвинулась USDRP и что она будет продолжать быть важной силой в украинской политике ещё долго, при условии сохранения “текущего курса” партии.\n\nОзадаченный этим, Мазепа попросил уточнения, что именно означает этот курс, и тогда разговор, который казался простым, превратился в лекцию. Ливицкий хвастался тем, как партия преодолела нереалистичные цели, характерные для периода изгнания, и адаптировалась к реальным условиям Украины. УСДРП стала рациональной и ответственной народной партией, и это то, чем она должна оставаться.\n\nМазепа был только сбит с толку такими заявлениями: разве вера в эти “нереалистичные цели” не позволила партии достичь новых высот в первую очередь? Но возразить он мог мало. Последние сессии Национальных Зборов, тяжёлое влияние Германии и многое другое доказали, что видение Ливицкого стало преобладающим.\n\nВозможно, он был прав. Или возможно, он был не прав, но что с этим можно было бы сделать?"
ukraine_republican_events.214.a: "Падение справедливости заканчивается не взрывом, а тишиной."
ukraine_republican_events.214.a.tt: "Механика §1Идеализм§! будет §Rвыключена§!, и все §YСобытия§! изменяющие §1Идеализм§! больше не будут активироваться."

ukraine_republican_events.215.t: "Доверие под угрозой"
ukraine_republican_events.215.d: "В высших кругах силовых структур возникает контроверзия. Несколько отчетов указывают, что Николай Чеботарев, в которого мы вложили столько доверия, мог интерпретировать директивы политического руководства довольно свободно. Перехваченные коммуникации подразумевают, что Чеботарев, вопреки своим задачам, активно и тайно сотрудничал с немецкими разведслужбами, а именно с Abteilung IIIb. Дальнейшее расследование показало, что это секретное сотрудничество привело к разоблачению нескольких сетей российских агентов. Отличный результат, но достигнутый ценой ужесточения контроля Германии над нашими внутренними делами.\n\nПри столкновении с обвинениями Чеботарев просто отмахнулся от них, заявив, что политикам было бы лучше не вмешиваться в работу специалистов. Даже этот смелый ответ не остановил его сторонников. Они утверждают, что действия Чеботарева были обусловлены гибкостью и прагматизмом, которые следует ожидать от опытного разведчика. Его противники, в свою очередь, настаивают, что Чеботарев нарушил четкие директивы, и что полное подчинение силовых структур политическому руководству является главным для любого уважающего себя государства. Попытки Берлина ослабить украинский суверенитет, как открыто, так и тайно, остаются реальной угрозой будущему страны, поэтому борьба с немецкой разведкой была одной из важнейших задач Коша Обороны Республиканского Порядка. Чеботарев не справился, и его следует заменить.\n\nОсновной кандидат – Иван Лытвиненко, который служил под началом Чеботарева. Хотя он несколько менее опытен, чем его бывший начальник, он может оказаться более надежным и предсказуемым выбором."
ukraine_republican_events.215.a: "Опыт Чеботарева незаменим."
ukraine_republican_events.215.b: "Хватит. Лытвиненко займет пост."

ukraine_republican_events.216.t: "Безопасность и Суверенитет"
ukraine_republican_events.216.d: "Перспектива нового крупномасштабного катастрофического конфликта в Европе становится все более реальной с каждой неделей. Русский империализм, революционный фанатизм, немецкий милитаризм – все это угрожает толкнуть нашу страну на грань уничтожения. В этой опасной атмосфере вопрос наших договоренностей по безопасности с Германией становится все более актуальным.\n\nВ партии и силовых структурах формируется дебат: какую роль должна сыграть Германия в случае возможного вторжения России? Большинство военных и дипломатических структур, главным образом, представляющих Народного министра иностранных дел Андрея Ливицкого, настаивает на том, что всяческая помощь приветствуется: материальная поддержка, обмен разведывательными данными, обучение и, что наиболее важно, готовность немецких вооруженных сил встретить российское наступление.\n\nОднако эта точка зрения оспаривается некоторыми среди партийного руководства. Их скептицизм связан с присутствием немецких армейских частей на территории Украины. Хотя косвенную поддержку приветствовать можно, прямое участие иностранных вооруженных сил может представлять ненужные риски для Республики. Военный контингент может предоставить Берлину подходящие средства для дальнейшего ограничения нашего суверенитета. Никогда не стоит забывать 1918 год, когда, с молчаливого согласия немецкого военного командования, была уничтожена Народная Республика, и на Украину пришли тирания и реакция. Таким образом, присутствие иностранных вооруженных сил следует минимизировать, желательно ограничив их только подготовкой персонала и советниками.\n\nЧтобы компенсировать отсутствие немецких войск, предложена реформа Народной милиции. Вместо того, чтобы быть полицейской силой, она должна заниматься военной подготовкой и организацией трудоспособных мужчин в мирное время. Так отряды милиции смогут выполнять различные функции: от обеспечения подготовленных резервистов для регулярной армии до партизанских действий в тылу.\n\nТем не менее, учитывая жесткую хватку Берлина над нашей страной, этот дебат, скорее всего, останется чисто символическим. На данный момент мы не располагаем возможностью вести переговоры с Германией по вопросам безопасности."
ukraine_republican_events.216.d2: "Перспектива нового крупномасштабного катастрофического конфликта в Европе становится все более реальной с каждой неделей. Русский империализм, революционный фанатизм, немецкий милитаризм – все это угрожает толкнуть нашу страну на грань уничтожения. В этой опасной атмосфере вопрос наших договоренностей по безопасности с Германией становится все более актуальным.\n\nВ партии и силовых структурах формируется дебат: какую роль должна сыграть Германия в случае возможного вторжения России? Большинство военных и дипломатических структур, главным образом, представляющих Народного министра иностранных дел Андрея Ливицкого, настаивает на том, что всяческая помощь приветствуется: материальная поддержка, обмен разведывательными данными, обучение и, что наиболее важно, готовность немецких вооруженных сил встретить российское наступление.\n\nОднако эта точка зрения оспаривается некоторыми среди партийного руководства. Их скептицизм связан с присутствием немецких армейских частей на территории Украины. Хотя косвенную поддержку приветствовать можно, прямое участие иностранных вооруженных сил может представлять ненужные риски для Республики. Военный контингент может предоставить Берлину подходящие средства для дальнейшего ограничения нашего суверенитета. Никогда не стоит забывать 1918 год, когда, с молчаливого согласия немецкого военного командования, была уничтожена Народная Республика, и на Украину пришли тирания и реакция. Таким образом, присутствие иностранных вооруженных сил следует минимизировать, желательно ограничив их только подготовкой персонала и советниками.\n\nЧтобы компенсировать отсутствие немецких войск, предложена реформа Народной милиции. Вместо того, чтобы быть полицейской силой, она должна заниматься военной подготовкой и организацией трудоспособных мужчин в мирное время. Так отряды милиции смогут выполнять различные функции: от обеспечения подготовленных резервистов для регулярной армии до партизанских действий в тылу."
ukraine_republican_events.216.a: "Будем надеяться, что немцы не возьмутся за слишком амбициозные идеи."
ukraine_republican_events.216.b: "Нам нужна вся помощь, какая есть."
ukraine_republican_events.216.c: "Опасения по поводу вмешательства Германии вполне обоснованы."

ukraine_republican_events.217.t: "Привлечение профсоюзов"
ukraine_republican_events.217.d: "Трудовое движение в Гетманате было сведено к нескольким государственным, утвержденным и контролируемым профсоюзам. С их голосами подавленными, а руки скованы, рабочие не могли защищать свои права, и как иностранный бизнес, так и приближенные Гетмана из Протофисов были свободны для эксплуатации. К счастью, возрождение Народной Республики положило конец этому. С отменой ограничений по свободе объединений трудящихся украинские массы получили возможность организовываться должным образом.\n\nДля нас этот обширный организационный процесс предоставил возможность отвлечь пролетариат от опасных радикалов и утвердить USDRP как ведущую рабочую партию. Хотя предстоит еще многое сделать, наши усилия уже начинают приносить плоды.\n\nСегодня мы официально учреждаем Украинский Социалистический Рабочий Союз (УСРС) – профсоюзную федерацию, ориентированную на УСДРП. Она обеспечит постоянную связь партии с массовым рабочим движением и его проблемами, одновременно развивая политическое сознание и организационные навыки рабочего класса. Хотя до доминирования на сцене организованного труда еще далеко, создание УСРС, тем не менее, является важным шагом в истории нашей партии."
ukraine_republican_events.217.a: "Великий день для рабочего движения!"
ukraine_republican_events.217.a.tt: "Потому что мы завершили §HУкрепить Уцентрпроф:§!"

ukraine_republican_events.218.t: "События в Таврии"
ukraine_republican_events.218.d: "Гетман Скоропадский почувствовал глубокое предательство, когда понял, что глава Крыма, Сулейман Сулкевич, займёт значительно более нейтральную позицию во время Анти-Гетманского восстания, чем рассчитывали гетманисты. Господин Скоропадский считал, что господин Сулкевич должен был продемонстрировать благодарность за десятилетия патронажа со стороны Киева.\n\nСулкевич не согласился. Крым — особый регион с уникальной демографией и особым руководством. Он должен был позаботиться, чтобы хаос с материка не распространился на полуостров. И ему это удалось: Крым оставался относительно стабильным в ходе восстания. Далее он считал, что слишком поздно для Гетмана победить революционеров.\n\nОтносительная нейтральность Сулкевича не спасла его от политических последствий, произошедших на материке, когда революционеры вошли в правительственные кварталы Киева, но позволила избежать реальных последствий как ведущего антисоциалиста на полуострове. Его отставка произошла быстро и без особых предвестий."
ukraine_republican_events.218.a: "Открылась вакансия. Кто её займет?"

ukraine_republican_events.219.t: "Ожившая политическая атмосфера"
ukraine_republican_events.219.d: "С конца почти двухдесятилетнего правления Сулкевича политическая ситуация в Крыму начала двигаться в том же направлении, что и на материке. Консервативный блок в Региональном совете пошел по пути Гетмана, в то время как либеральные и вновь легализованные социалистические силы начали конкурировать за освободившееся место. Дополнительным осложнением являются действия крымско-татарских национальных групп и различных других меньшинств. Но с окончанием избирательного сезона и агитации тоже завершились.\n\nС одной стороны, есть Мий Фирка: основная крымско-татарская национальная сила, представляющая крымских татар не-руссифицированного происхождения (что составляет подавляющее большинство этого народа). Идеологически Мий Фирка весьма разнообразна, от умеренного либерализма до революционного социализма, и сила каждой фракции зависит от обстоятельств в Киеве.\n\nЗатем есть основные политические партии: Крымская Радикально-Демократическая Партия, Крымская Социал-Демократическая Рабочая Партия и Крымская Социалистическая-Революционная Партия. Хотя официально эти партии являются «национально слепыми», на практике они представляют интересы этнических русских и русскоязычных (руссифицированных украинцев, евреев и татар, среди прочих) на полуострове. Идеологически они разделяют принципы своих материковых аналогов; хотя названия общие, крымские партии независимы, связанные с их северными союзниками через политические объединения.\n\nНаконец, есть Блок Национальных Меньшинств, который представляет другие народы, проживающие на полуострове: неруссифицированных украинцев, евреев, армян и других. Члены этого блока претендуют на политическое влияние в значительной степени благодаря своей межнациональной солидарности."
ukraine_republican_events.219.a: "Политика Крыма становится все более многообразной."

ukraine_republican_events.220.t: "Сила слова"
ukraine_republican_events.220.d: "Чтобы утвердить нашу партию как по-настоящему массовую, нам необходимо уделять должное внимание вопросам информации и пропаганды. Особенно важна партийная пресса, так как она позволяет нам не только поддерживать контакт с широкими слоями украинского народа, но и влиять на них, а также задавать тон политической дискуссии в стране.С учетом этого необходимо определить редакционную политику нашей газеты «Робітнича Газета». С момента своего основания она в значительной степени руководствовалась Николаем Поршем, ветераном партии и одним из ее ведущих теоретиков. Его влияние обеспечивало, чтобы газета не просто информировала читателя, но и давала глубокий анализ текущих политических вопросов и общих дебатов о демократическом социализме в Европе и мире.Теперь, когда наша партия вновь вовлечена в украинскую политику, главный редактор газеты Иван Романченко предлагает изменить курс. Сосредоточение на теоретических вопросах, сочетание сухого стиля было полезно для поддержания контакта с политически активными эмигрантами и приверженцами партии в годы подпольной деятельности в Гетманщине. В нынешних условиях газета должна привлечь гораздо более широкую аудиторию, в основном состоящую из малообразованных рабочих. Для того чтобы повысить их понимание, развить классное сознание и привести их к социалистической Украине, партия должна прежде всего завоевать их внимание. Поэтому язык и тон газеты должны стать более вдохновляющими и менее сложными – по крайней мере, на протяжении первых лет правления.Хотя это предложение кажется логичным, среди руководства партии существует некоторая нерешительность. Смогут ли боевые лозунги и воодушевляющие памфлеты действительно заменить глубину мысли и теоретическую глубину?"
ukraine_republican_events.220.a: "Мы должны просвещать наших сторонников, а не кормить их дешевыми лозунгами."
ukraine_republican_events.220.b: "Новый курс для новых условий."

ukraine_republican_events.221.t: "Процесс Василя Кочубея"
ukraine_republican_events.221.d: "В рамках кампании по искоренению остатков гнусного, коррумпированного гетманского режима на скамье подсудимых оказываются даже ранее неприкосновенные фигуры. Василь Кочубей, один из лидеров НХП, предстал перед судом после того, как были обнаружены доказательства того, что он использовал свое богатство и связи, чтобы продвигать собственное политическое влияние и влияние ныне не существующей ВСЗВ. Даже после восстановления республики он продолжал это делать, хотя и в меньших масштабах, его новая партия постепенно внедрялась в местные земельные советы. Теперь он пойман с поличным.Можно утверждать, что Кочубей и его союзники среди крупных землевладельцев были основной силой, стоящей за Гетманщиной: именно они помогли Скоропадскому прийти к власти в 1918 году, и режим оставался устойчивым благодаря их связям. Так что говорить, что этот процесс стоит особняком, будет слабым утверждением.На данный момент это обсуждаемая тема, а поскольку огромное состояние Кочубея позволило ему нанять отличную команду защиты, вероятно, процесс затянется и останется в центре внимания общества.Основные партийные органы и газеты таких партий как УРДП, УСРП, УПС-Р и других уже начали комментировать это дело. Для либералов и аграрных социалистов позиция очевидна, а вот нам предстоит разобраться, как подойти к этому вопросу. Является ли процесс над Василем Кочубеем просто ожидаемым результатом системы, которая на самом деле наказывает правонарушителей, или это представляет собой нечто большее: решительную победу республиканских идеалов над тиранией крупных землевладельцев и их реакционными сторонниками?"
ukraine_republican_events.221.a: "Он нарушил закон и попался. Тут нечего обсуждать."
ukraine_republican_events.221.b: "Гибель Гетманщины наглядно демонстрируется – и как мы приветствуем ее смерть!"

ukraine_republican_events.222.t: "Сопротивление старого порядка"
ukraine_republican_events.222.d: "Министерство сельского хозяйства республики в последнее время получает постоянные тревожные сообщения. Процесс земельной реформы в нескольких регионах не укладывается в сроки. В этих районах местные земельные советы поглощены мелкими ссорами, бюрократия медлительна и непродуктивна, а суды слишком медлительны, чтобы справляться с растущим количеством споров по земельной реформе. Все это создает неловкую ситуацию для нашего правительства.Дальнейшее расследование показало, что эти регионы имеют общую особенность: везде есть значительное число местных депутатов, которые, будучи независимыми, многие из которых занимают свои должности еще с Гетманщины, присягнули на верность Национальной аграрной партии (НХП). Этот факт объясняет многое: через этих депутатов НХП медленно проникает в местные земельные советы, используя их влияние и все возможные юридические лазейки, чтобы затруднить перераспределение земель. Суды мало помогают бороться с этими усилиями: многие судьи попросту слишком снисходительны, когда речь идет о преследовании правонарушителей, имеющих связи с местными крупными землевладельцами.Одним из возможных решений может быть подвержение наиболее известных нарушителей, связанных с НХП, вниманию политических департаментов наших силовых структур. Однако, стоит помнить, что даже если расследования выявят что-то важное, окончательное решение все равно будет принято теми же, нереформированными судами. УРДП, скорее всего, выразит обеспокоенность по поводу возможных злоупотреблений в отношении этих, якобы, 'политически мотивированных' дел. Тем не менее, возможно, такое внимание со стороны государства будет достаточно, чтобы сдержать хотя бы некоторых противников земельной реформы."
ukraine_republican_events.222.a: "Мы можем переждать их бесполезное сопротивление."
ukraine_republican_events.222.b: "Возможно, стоит предпринять более активные шаги."

ukraine_republican_events.223.t: "Реорганизация Инспектората армии"
ukraine_republican_events.223.d: "Одним из приоритетных направлений нашей работы является обеспечение того, чтобы армия оставалась послушной, лояльной и преданной республиканскому делу при любых обстоятельствах. Мы считаем, что для достижения этой цели нельзя просто оставить вооруженные силы на их собственное усмотрение. В 1918 году армия по сути просто наблюдала, как Гетман разрушает Народную Республику, и нерешительность офицеров во многом стала причиной нашей неспособности начать антигетманское восстание в тот год. Поэтому повышение политической осведомленности и идеологической сознательности в армии остается для нас важнейшей задачей. Цитата из Главного Отамана Петлюры: 'Нашей целью должно быть превращение солдата в фанатика украинского государственности, но при этом в сознательного, образованного фанатика.'Таким образом, политическое руководство страны должно быть постоянно представлено в вооруженных силах, структура, которая будет служить связующим звеном между армией и государством, способная передавать необходимые директивы и указания от правительства к офицерам. Реорганизованный Инспекторат армии будет служить нам в этой роли, теперь он будет иметь полномочия проводить широкое организационное наблюдение.Мы бы предпочли, чтобы Инспекторат возглавил бывший эмигрант, например, генерал Удовиченко, но это решение может вызвать ненужное сопротивление со стороны высшего командного состава, многие из которых служили в Гетманщине. Возможно, назначение такого человека как генерал Чижевский, известный своими симпатиями к УРДП, было бы воспринято как менее спорный выбор."
ukraine_republican_events.223.a: "Ничего страшного в том, чтобы подорвать их позиции, назначим Удовиченко."
ukraine_republican_events.223.b: "Чижевский выглядит разумным выбором."

ukraine_republican_events.225.t: "На службе прогресса"
ukraine_republican_events.225.d: "Для того чтобы поднять украинский народ, правильно образовать нашу нацию, дать массам средства для саморазвития и правильный набор социальных ценностей и идеалов для следования, нам необходимо не только расширить образовательную сеть, но и подготовить большое количество хорошо обученных и мотивированных педагогических кадров.Одним из наших шагов в этом направлении станет реорганизация Киевского педагогического института. Хотя в годы Гетманщины институт не был полностью заброшен, во многом благодаря усилиям УРДП, его состояние в настоящее время не вполне соответствует нашим целям. Увеличив финансирование, расширив его возможности, изменив программу, мы надеемся преобразовать его в центр знаний, который не будет иметь аналогов в Украине.Для того чтобы лучше отразить его новое и ключевое значение, институт будет переименован в 'Высший педагогический институт имени М. Драгоманова'. Михаил Драгоманов был одной из ключевых интеллектуальных фигур украинского национального движения и одним из главных представителей украинского социалистического мышления. Название института в его честь будет вполне уместным, так как он будет помогать нам вести Украину к светлому, справедливому и справедливому будущему."
ukraine_republican_events.225.a: "Основная цель — политический, социальный и культурный прогресс для индивида и сообщества."

ukraine_republican_events.226.t: "Новое правительство Крыма"
ukraine_republican_events.226.d: "После завершения выборов разговоры переключаются на формирование правительства в Симферополе. Ожидаемо, наибольшее количество голосов получила Миллий Фирка, за ней идет Крымская радикально-демократическая партия.После долгих обсуждений депутаты регионального собрания решили избрать Асана Сабри Айвазова из умеренной либеральной фракции Миллий Фирка новым лидером Крыма. Долгосрочный ветеран крымской и крымско-татарской политики, а также плодотворный интеллектуал, Сабри Айвазов занимал министерские посты в правительстве Сулкевича, представляя его либеральное крыло.Правительство Асана Сабри Айвазова будет поддержано Крымской радикально-демократической партией и Блоком национальных меньшинств."
ukraine_republican_events.226.d2: "После завершения выборов разговоры переключаются на формирование правительства в Симферополе. Ожидаемо, наибольшее количество голосов получила Миллий Фирка, за ней идет Крымская социал-демократическая рабочая партия.После долгих обсуждений депутаты регионального собрания решили избрать Джафера Сейдамета Кырымера из социал-демократической фракции Миллий Фирка новым лидером Крыма. Известный как радикал в некоторых кругах, приход Сейдамета Кырымера вызвал обеспокоенность в русскоязычных кругах, однако он смог развеять эти опасения, сославшись на свой «рабочий» опыт с Сулкевичем, известным своим мультикультурным подходом к Крыму.Правительство Джафера Сейдамета Кырымера будет поддержано умеренными силами Крымской социал-демократической рабочей партии и Крымской партией социалистов-революционеров, а также Блоком национальных меньшинств."
ukraine_republican_events.226.d3: "После завершения выборов разговоры переключаются на формирование правительства в Симферополе. Ожидаемо, наибольшее количество голосов получила Миллий Фирка, за ней идет Крымская партия социалистов-революционеров.После долгих обсуждений депутаты регионального собрания решили избрать Амета Озанбашли из революционно-социалистической фракции Миллий Фирка новым лидером Крыма. Настоящий левый инсургенты, Озанбашли вызвал обеспокоенность в умеренных и либеральных кругах, однако он сумел развеять эти опасения, ссылаясь на парламентскую систему Крыма, которая, по его словам, «в любом случае заставит искать компромисс».Правительство Амета Озанбашли будет поддержано радикалами Крымской социал-демократической рабочей партии и Крымской партией социалистов-революционеров, а также Блоком национальных меньшинств."
ukraine_republican_events.226.a: "Симферополь ждет, мистер Сабри Айвазов!"
ukraine_republican_events.226.b: "Симферополь ждет, мистер Сейдамет Кырымер!"
ukraine_republican_events.226.c: "Симферополь ждет, мистер Озанбашли!"

ukraine_republican_events.227.t: "Взгляд в будущее"
ukraine_republican_events.227.d: "Чтобы обеспечить светлое будущее для Украины, нам нужно приложить серьезные усилия для того, чтобы направить и поддержать тех, кто будет строить это будущее – молодежь нашей страны. В ней действительно скрыт нераскрытый потенциал, который лучше всего использовать на благо социалистического дела. Выросшие в независимой Украине, не пережившие испытания национальной борьбы, молодые поколения часто более восприимчивы к идеалам социальной свободы. Их пылающая решимость и приверженность принципам будут служить напоминанием о опасностях самоуспокоенности и ложной привлекательности чрезмерных компромиссов.\n\nНаша партия пользовалась определенной поддержкой среди студентов во время изгнания, и после возвращения мы можем сделать еще больше для их привлечения. Однако есть вопрос о нашем точном подходе. Мы могли бы сосредоточиться на воздействии на различные студенческие группы и общества, объединяя их в децентрализованную организацию, слабо связанную с УСДРП. Это обеспечит максимально широкий охват, позволяя нашим словам распространяться далеко и широко, и значительно повысит нашу популярность. С другой стороны, мы могли бы сосредоточиться на создании более централизованного молодежного крыла нашей партии, полностью интегрированного в ее структуры и подчиненного ее руководству. Это позволило бы использовать его как источник мотивированных и подготовленных кадров для партии."
ukraine_republican_events.227.a: "Нам нужно дисциплинированное молодежное крыло."
ukraine_republican_events.227.b: "Не стоит подавлять энтузиазм молодежи."

ukraine_republican_events.228.t: "Беспокойства старой гвардии"
ukraine_republican_events.228.d: "Наше решение следовать предложению УРДП о дальнейшем централизации Народной милиции вызвало некоторую озабоченность в партии. Особенно тревожат это людей из орбиты Николая Порша и Дмитрия Антоновича, старых ветеранов УСДРП, которые до сих пор пользуются уважением, несмотря на редкое участие в повседневной деятельности партии.\n\nЦентрализация силовых структур им кажется чрезмерной и необоснованной, шагом, противоречащим принципам партии. Значительная часть вопросов безопасности должна оставаться в руках местных властей, чтобы они не чувствовали угрозы со стороны центрального правительства. Кроме того, местные власти гораздо лучше осведомлены о ситуации на местах, поэтому делегирование им возможности организовывать собственные меры безопасности — это рациональный выбор, а не только идеологический. Было ли это уступкой УРДП действительно разумным решением?\n\nВозможно, стоит напомнить, что партия как часть коалиции не может проводить полностью независимую политику, и иногда опираться на опыт других в вопросах практического управления может быть полезным. Или, возможно, нам следует просто проигнорировать эти обеспокоенности — эти жалобы не продлятся долго."
ukraine_republican_events.228.a: "Давайте обсудим это разумным образом."
ukraine_republican_events.228.b: "Действительно ли каждое решение требует утверждения всей партии?"

ukraine_republican_events.229.t: "Выборы [GetYear] года"
ukraine_republican_events.229.d: "Когда разрушительная война наконец близится к концу, народ с нетерпением жаждет вернуться к мирной жизни. Этот конфликт причинил невероятное количество страданий многим людям - беженцам, раненым ветеранам, сиротам и многим другим, кто потерял многое. Наша нация должна начать процесс восстановления, но прежде всего настало время провести те выборы, которые были отложены в связи с конфликтом.\n\nЕстественно, основной темой этих выборов будет восстановление. Все партии представили свои планы по амбициозным послевоенным социальным программам и другим кампаниям для исцеления ран войны. Радикалы рассчитывают получить большинство, обещая создать процветающую и бурно развивающуюся экономику, которая, в свою очередь, поможет пострадавшим от войны вернуться к нормальной жизни. В то время как Рабочая партия привлекает сторонников, используя пацифистскую риторику, обещая больше никогда не допустить, чтобы Украина стала жертвой трагедии вроде этой. Однако наибольшие обещания перемен снова идут от УПСР и С-РБ. Учитывая, что угроза Украины теперь нейтрализована, они утверждают, что сейчас идеальное время для радикальных социальных и политических изменений.\n\nЭлекторальная ситуация стала еще более непредсказуемой с появлением нового претендента - Украинской народной партии (УНП). Несмотря на то что украинская правая сторона еще не полностью оправилась от поражения Гетмана, а Народная Республика зарекомендовала себя как неизменный лидер, политический ландшафт начинает меняться в их пользу. Война возбудила патриотический пыл, так давно требуемый УНП, и под популярным руководством Михновского партия привлекает все больше избирателей.\n\nТеперь, [?global.date.GetDateStringNoHourLong], миллионы избирателей вновь идут на выборы, чтобы выбрать свое правительство. Для многих кажется, что прошло целое столетие с выборов 1937 года, и, действительно, народ долго ждал, чтобы снова услышать его голос. Демократия, похоже, победила, и новое правительство обеспечит ее процветание на века."
ukraine_republican_events.229.a: "Срок УСДРП истек, и она выведена из правительства."
ukraine_republican_events.229.b: "Срок УСДРП истек, она стала младшим партнером УРДП."
ukraine_republican_events.229.c: "УСДРП возвращает власть, с Мазепой на посту!"
ukraine_republican_events.229.e: "УСДРП возвращает власть, с Феденко на посту!"
ukraine_republican_events.229.f: "УСДРП возвращает власть, с Петлюрой на посту!"
ukraine_republican_events.229.g: "УСДРП возвращает власть, с Ковалевским на посту!"

ukraine_republican_events.230.t: "Будь там или будешь плоским!"
ukraine_republican_events.230.d: "Это вовсе не секрет, что у Евгена Архипенко, одного из лидеров правого крыла УРДП, есть младший брат, Александр.\n\nЭто еще менее секретно, что Александр является всемирно известным авангардным художником, специализирующимся на кубизме. Разделяя свое время между Парижем, Нью-Йорком и Киевом, Александр добился крупного международного успеха в своем искусстве. Его считают либо первым, либо вторым (после Пабло Пикассо) кубистом-скульптором в мире искусства.\n\nТак что не удивительно, что Евген решил попросить Александра провести массовую художественную выставку по всем городам Украины, с полной поддержкой и спонсорством правительства. Со своей стороны, Александр выразил явный интерес и сказал, что будет ждать "зеленый свет".\n\nНо вот тут все и стало запутанным. Когда Евген предложил эту инициативу на конференции УРДП, немедленно не возникло сопротивления. Тем не менее, обсуждение перешло к маркетинговой кампании. Ведь в чем смысл проводить столь масштабное мероприятие, если оно привлечет только студентов художественных школ и андеграундных писателей сомнительного качества?"
ukraine_republican_events.230.a: "...что такое кубизм?"

ukraine_republican_events.231.t: "Мы ненавидим кубы? (О политическом сознании и современном искусстве)"
ukraine_republican_events.231.d: "Правое крыло партии, к которому принадлежит и сам Евген, выразило ряд опасений по поводу содержания выставки и предложило ведущие члены, Владимир Доленко и Филипп Пилипчук, ограничить содержание более 'реалистичными' произведениями искусства. Как они утверждали, последнее, чего кому-то хочется, это отпугнуть посетителей из 'сельского моря' странными формами и композициями. Некоторые, по их мнению, могут посчитать определенные работы абсолютно абсурдными и потерять поддержку нашего правительства за то, что оно тратит их время и деньги налогоплательщиков.\n\nВ противоположность этому, левое крыло партии выразило противоположную точку зрения через речь Андрея Никовского (самого крупного литературного и художественного критика). В своем выступлении Никовский утверждал, что гораздо более захватывающим для людей будет увидеть 'все формы искусства', независимо от того, как они могут выглядеть. Стимуляция разговора — хорошая цель, к которой стоит стремиться, заметил он. Еще больше усложнили дело вмешательство Сергея Ефремова, бывшего тяжеловеса украинской политики. Хотя технически он ушел от крупных политических функций, он иногда вмешивается в культурную политику.\n\nВ конце концов решающий фактор зависел от центристского большинства в УРДП. Доминируемое дипломантами и более аморфными полемистами, такие темы обычно не входят в основную повестку этого крыла, но тем не менее им нужно было выбрать. Приняв сторону, Александр Шульгин и Вячеслав Прокопович заявляют, что..."
ukraine_republican_events.231.a: "Согласиться с поправками Доленко и Пилипчука."
ukraine_republican_events.231.b: "Поддержать инициативу Никовского и Ефремова."

ukraine_republican_events.232.t: "О, наука!"
ukraine_republican_events.232.d: "В течение достаточно однообразного дня, работая над планами расширения образования, наш кабинет получил странное предложение от четырех человек.\n\nСуть предложения заключалась в следующем:\n "Уважаемые товарищи по партии,\nКак известно, недавно восстановленный Киевский педагогический институт имени Михаила Драгоманова переживает период процветания. Поэтому важно, чтобы помимо 'естественных наук' социальные дисциплины и гуманитарные науки также получили должное внимание. Для подробностей смотрите ниже. Подпись: Чикаленко, Слабченко, Гермайзе, Бочковский."\n\nПредложение отметило, что институт является лидером в "внедрении республиканских и социалистических ценностей", и такое расширение позволит государству воспитать новое поколение преданных и страстных граждан. В то же время было осознано, что финансирование ограничено, и что внимание института может быть направлено только на одну дисциплину. Также, по чистой случайности, предложение поступило от наших товарищей по партии."
ukraine_republican_events.232.a: "Расскажите подробнее."

ukraine_republican_events.233.t: "Дальнейшее расширение института"
ukraine_republican_events.233.d: "Первым предложенным предметом была археология, предложенная Левко Чикаленком, сыном покойного гражданского лидера и покровителя культуры Евгения Чикаленко и студентом покойного ведущего археолога Федора (Хведира) Вовка. Это, пожалуй, самый 'непартийный' из всех предложенных предметов, исследования Чикаленко сосредоточены на древних культурах, которые жили на территории Украины, таких как Трипольская культура. Эта заявка не вызовет особых замечаний со стороны оппозиции, но, вероятно, не будет восприниматься как 'социалистическое исследование'.\n\nВторым предметом была история, предложенная Йосифом Гермайзе и Михаилом Слабченко, ведущими экспертами в своих областях. Это достаточно 'партийный' предмет, поскольку исследования Слабченко и Гермайзе сосредоточены на украинском государственном строительстве и революционных процессах соответственно. Этот тип исследований покажет определенный социалистический уклон и может быть не слишком принят оппозицией, но в целом будет понятен. В конце концов, история все-таки изучает прошлое.\n\nПоследним предметом была социология, предложенная Ольгердом-Иполитом Бочковским, настоящим мастером своего дела. Специализируясь на изучении национализма, а также национальной политики и отношений, Бочковский изложил свои исследования через различные полемики, описывающие политику имперского управления на завоеванных территориях и то, как различные народы добиваются национальной свободы. Это предложение, вероятно, вызовет наибольшее недовольство среди оппозиции, учитывая возможное использование исследований Бочковского для формирования нашей политики, поэтому мы должны быть осторожны."
ukraine_republican_events.233.a: "Все гривны на археологию!"
ukraine_republican_events.233.b: "Все гривны на историю!"
ukraine_republican_events.233.c: "Все гривны на социологию!"

ukraine_republican_events.234.t: "Неудачный оливковый мир"
ukraine_republican_events.234.d: "Украинская народная республика — это особая нация, и это особые времена — мир рушится. Армии становятся все больше, оружейные производства растут как никогда прежде — как в 1914 году, все, что нужно — искра, чтобы все взорвалось. И если Германия не признает свою частичную вину, нам нужно взять инициативу в свои руки.\n\nИменно поэтому дипломат УСДРП Михаил Еремиев был отправлен в Москву с последней попыткой. Когда Еремиев встретился с российским главой [RUS.GetLeader], бывший пытался найти общую основу. Разве не в интересах обеих стран избежать новой, потенциально еще более разрушительной войны, которая столкнет соседей друг с другом?\n\nХотя [RUS.GetLeader] сначала казался сочувствующим и подтвердил признание российским руководством украинской государственности, позже он стал скептически настроен. Это желание мира, как он сказал, не приведет к результату, если не будет подкреплено действиями. Если Германия не хочет войны, почему она продолжает поддерживать столь большое присутствие войск в Украине и ее соседях? Почему вдоль Днепра и в южных областях находятся сотни тысяч солдат, а не маленькие группы миротворцев?\n\nРоссия пошла на уступки, но, казалось, Михаил Еремиев не сумел убедить российское руководство в необходимости мирных усилий. В конце концов, переговоры не завершились результатом, и Украина осталась в ожидании того, как же закончится война, а с ней и сама судьба."
ukraine_republican_events.234.d2: "Украинская народная республика — это особая нация, и это особые времена — мир рушится. Армии становятся все больше, оружейные производства растут как никогда прежде — как в 1914 году, все, что нужно — искра, чтобы все взорвалось. И если Германия не признает свою частичную вину, нам нужно взять инициативу в свои руки.\n\nИменно поэтому дипломат УСДРП Михаил Еремиев был отправлен в Москву с последней попыткой. Когда Еремиев встретился с российским главой [RUS.GetLeader], бывший пытался найти общую основу. Разве не в интересах обеих стран избежать новой, потенциально еще более разрушительной войны, которая столкнет соседей друг с другом?\n\nХотя поначалу премьер-министр казался настроенным благосклонно и подтвердил признание Россией украинской государственности, он стал относиться к этому скептически. Это стремление к миру, продолжил он, не принесет результатов, если не будет подкреплено действиями. Если Германия не хочет войны, то почему она продолжает сохранять такое значительное присутствие войск на Украине и в соседних с ней странах? Почему на Днепре и Даугаве продолжают возводиться глубокие линии укреплений? Если Украина хочет мира, то, возможно, ей следует расторгнуть свое соглашение о безопасности с Германией и вместо этого найти общий язык со своими историческими братьями.\n\nЕремеев был настроен решительно: он добавил, что Украина не предъявляет территориальных претензий к России, и что если Германия когда-нибудь нападет, то Киев будет решительно блокировать любые попытки использовать ее территорию в качестве плацдарма для проведения операции. Тем не менее, этого было недостаточно: условием прочного мира в Европе был уход Германии с Востока. Конечно, было бы позором для двух государств оказаться в состоянии войны, но такова реальность, если Украина собирается стать соучастницей агрессии Германии.\n\nВ конце концов, они оба покинули стол переговоров. Если о мире больше не могло быть и речи, оставалось только одно, к чему нужно было готовиться."
ukraine_republican_events.234.a: "Предоставить больше полномочий для мирных переговоров."
ukraine_republican_events.234.b: "На Украине не будет уступок."

ukraine_republican_events.235.t: "Неправильный вид радикализма"
ukraine_republican_events.235.d: "Совсем недавно радикальный демократ мог почувствовать, что он на вершине мира. Для многих мир без Гетмана сулил такую перспективу: более светлое будущее, где крестьянин, рабочий и предприниматель могут свободно заниматься своим делом без страха перед государством, все как сыновья свободной Украины.\n\nУ каждого своя версия того, что произошло дальше. Одни обвиняют в этом схемы правых или левых флангов. Другие винят циничный центр, третьи — ссоры между ними. Некоторые считают, что земельная реформа была несовершенной, что программа индустриализации оттолкнула многих, или что жесткие решения, принятые во время войны, вернулись, чтобы преследовать. Другие говорят, что виновато все это вместе — а некоторые утверждают, что ни одно из них. Как бы то ни было, результат наступил в ночь выборов, как Апокалипсис для партии, которая теперь изгнана в оппозицию.\n\nРезультат — худший кошмар для многих: теперь Украиной управляет пан-социалистическое правительство, которое обещает поставить классовые интересы выше национального благосостояния. Сама УРДП переживает глубокий кризис: сторонники левых взглядов теперь рассматривают УСДРП как партию будущего, в то время как правые избиратели реагируют на это тихим ростом гетманистской ностальгии, размышляя, что УНП может быть единственным спасением Украины от социализма.\n\nМногие боятся, что УРДП теперь разделит судьбу немецкого либерализма: зажатая между левыми и правыми, без явного выхода. Возможно, партия еще восстановится или хотя бы найдет себе место в качестве влиятельной малой партии. Но для тех, кто возлагал на нее большие надежды, вывод один: мечта мертва, и, возможно, она уже никогда не проснется."
ukraine_republican_events.235.a: "Самые яркие огни сгорают быстрее всего..."

ukraine_republican_events.236.t: "Шаг вперед, шаг назад"
ukraine_republican_events.236.d: "Совсем недавно радикальный демократ мог почувствовать, что он на вершине мира. Для многих мир без Гетмана сулил такую перспективу: более светлое будущее, где крестьянин, рабочий и предприниматель могут свободно заниматься своим делом без страха перед государством, все как сыновья свободной Украины.\n\nУ каждого своя версия того, что произошло дальше. Одни обвиняют в этом схемы правых или левых флангов. Другие винят циничный центр, третьи — ссоры между ними. Некоторые считают, что земельная реформа была несовершенной, что программа индустриализации оттолкнула многих, или что жесткие решения, принятые во время войны, вернулись, чтобы преследовать. Другие говорят, что виновато все это вместе — а некоторые утверждают, что ни одно из них. Как бы то ни было, выборы подтвердили результат: партия утратила свою привлекательность в глазах народа.\n\nТеперь партия оказалась в роли младшего партнера в правительстве, в то время как левые взяли на себя управление. Для одних это разочарование — правые недовольны мыслью о том, что им приходится играть второстепенную роль по отношению к социалистам, левые горюют о потере статуса передовых прогрессистов, а центр чувствует, что упущен шанс создать естественную партию власти. Но есть и повод для надежды: УРДП все еще может рассчитывать на свою базу преданных сторонников и все еще может направлять политику правительства в продуктивное русло. Как замечают более рассудительные голоса, партия выживает, а в выживании заключена возможность для возвращения.\n\nВ конце концов, видение радикальных демократов — это видение возможностей, где все возможно для тех, кто готов работать ради этого. Новая Украина все еще их создание. Кто скажет, что возможности не ждут и их?"
ukraine_republican_events.236.a: "Даже когда она не верит в нас, мы всегда будем верить в Украину."

ukraine_republican_events.237.t: "Те, кто строят нации"
ukraine_republican_events.237.d: "Множество типов называли себя радикальными демократами. В начале 1920-х, когда Гетманат укрепился, партия стала убежищем для различных либеральных группировок: социалистов-индепендентов, народных республиканцев и других, которые стремились сохранить свою электоральную жизнь и защищать права крестьян. В Народной Республике они составили правое крыло УРДП, отстаивая интересы мелких фермеров и малого бизнеса — тех, кто продвигает нацию вперед своей инициативой.\n\nКогда-то они были аутсайдерами в партии, а теперь именно эти люди ведут ее в будущее. С Володыимиром Доленко, который теперь возглавляет партию и правительство, URDP удалось избавиться от влияния социалистических радикалов и направить Народную Республику на путь гармонии и процветания. На их месте образовалась новая коалиция с UNP и либеральными независимыми — людьми, понимающими принципы хорошего управления. Вместе они стремятся защищать достижения Украины; те, кто победил российский империализм и разрушительное влияние коммунизма и синдикализма.\n\nДействительно, украинский народ продемонстрировал большую зрелость, преодолев эти вызовы — особенно ее трудолюбивые и свободомыслящие крестьяне, которые нашли в своем многолетнем опыте силу отклонить соблазн коллективизма. Их наградили основательной земельной реформой, создав основу для новой нации, возглавляемой этими трудолюбивыми патриотами. Под их руководством Украина имеет светлое будущее для всех, кто готов работать ради этого.\n\nНе все в УРДП довольны таким положением дел. Левое крыло партии все еще рассматривает УНП как партию гетманистских марионеток, и пока неясно, останутся ли они в правительстве, которым доминируют правые. Но на данный момент все топоры похоронены в полях Украины — а поля всегда нуждаются в заботе."
ukraine_republican_events.237.a: "Нация, построенная трудом, может повалить даже самую мощную империю."

ukraine_republican_events.238.t: "В конце долгой ночи"
ukraine_republican_events.238.d: "Множество типов называли себя радикальными демократами. В 1917 году, под другим именем, партия помогла создать Народную Республику — прекрасную вещь, которую слишком рано забрал этот мир. Но под Гетманатом они сохраняли ее огонь живым: УРДП стала убежищем для недовольных, дом для тех, кто смело мечтал о более свободном, справедливом и равном мире.\n\nТеперь партия, и Украина, принадлежат им. С восхождением Андрея Никовского на вершину политики, его правительство снова активно преследует прогрессивные цели. Вместе с их союзниками-республиканцами в УСДРП, радикальные демократы осмеливаются вести Украину в новую эпоху: эпоху, где государство поддерживает тех, кто способен реализовать свои мечты, и защищает тех, кто оказался в трудной ситуации. Наконец-то все те, кто остался позади Гетманата, получат землю, хлеб и свободу, о которых им когда-то обещали, независимо от их пола, культуры или веры.\n\nДля этих реформаторов это похоже на переживание 1917 года снова: время, когда их страна наконец была свободна, ее лидеры готовы были покончить с несправедливостью мира, и все было возможно. Но теперь все ее враги были побеждены. Москва, большевики и гетманисты больше не смогут отнять у народа его свободу, и больше никто не будет настраивать народ против друг друга. Каждый, кто построил свободную Украину, найдет свое место в ней — Народная Республика позаботится об этом.\n\nНекоторые все еще не видят этого. Правые партии все еще негодуют по поводу прогрессивной культуры и продолжающегося содействия социализму, даже сейчас. Останутся ли они в правительстве, где доминируют левые, покажет время — как и то, переживет ли правительство их уход. Но это проблема на другой день: сейчас солнце наконец может встать над Украиной, и будущее наконец может быть ярким."
ukraine_republican_events.238.a: "Да придет день в своей славе, и прошлое исчезнет, как плохой сон."

ukraine_republican_events.239.t: "Юнитас ин Варитате"
ukraine_republican_events.239.d: "Множество типов называли себя радикальными демократами. От начала века, через создание первой Народной Республики и годы Гетманата, УРДП привлекала различные политические тенденции, каждая из которых имела свои идеи прогресса, но все были объединены идеей свободной Украины. Некоторые утверждали, что это станет их падением — что широкая церковь будет уничтожена реальностями управления.\n\nИ все же в своем многообразии партия нашла силу. Где одни видели раздробленность, те, кто руководил партией, видели возможность — и старейшины УРДП не поддались требованиям ее фракций, как кто-то ожидал. Вместо этого, через дипломатию и прозорливость, они воссоединили партию, заглушили конкуренцию между фракциями и поставили их на службу общему делу. Больше нет негодования между левыми и правыми, а есть скорее уважение и товарищество. Они находят утешение в том, что, что бы они ни делали, это на службе у народа — рабочего, крестьянина и предпринимателя.\n\nТеперь ничего не кажется невозможным. Радикальные демократы теперь сидят как бесспорные гегемоны центристской политики. Будь то обновление прогрессивного альянса с УСДРП или создание нового для национального процветания с УНП, партия может направить Народную Республику в любом направлении, которое ей угодно. УРДП достигла состояния, о котором многие либералы могут только мечтать: стать естественной партией власти, поддержка которой выходит за пределы классовых и мелких догм. Под их руководством Украина может наконец занять свое место среди наций.\n\nВопросы остаются. Действительно ли фракционализм был навсегда побежден? Не жертвовали ли единством ценностями? Является ли партия без идеалов по-настоящему прогрессивной? Однажды эти вопросы могут определить будущее Украины — но пока они не могут побеспокоить партию, которая имеет все."
ukraine_republican_events.239.a: "Широкие церкви всегда самые красивые."

ukraine_republican_events.240.t: "Смерть революции?"
ukraine_republican_events.240.d: "Восхождение Рабочего Демократического Союза не должно было закончиться так.\n\nС окончанием войны с Россией были проведены регулярные выборы, и хотя результат в целом приемлем, с образованием правительства с УСДРП и УПСР, это далеко не то, на что мы надеялись. Революционный дух угас, и кто знает, когда он вновь поднимется?"
ukraine_republican_events.240.a: "Мы сделали все, что могли."

ukraine_republican_events.241.t: "Городская политическая десегрегация"
ukraine_republican_events.241.d: "Ландшафт городов Украины за последние 15 лет претерпел огромные изменения. Немецкие инвестиции и ограниченные капиталы предыдущего Гетмана оказались в таких местах, как доки Одессы, военные промышленности Харькова и производство подвижного состава Киева.\n\nОднако, когда рабочие проводили большую часть дня за трудом, остальную часть времени они посвящали заботам о своих семьях и частном/социальном жилье. В отличие от них, пригородные районы мало изменялись: аренда была высокой, но подача электричества и воды ненадежной. Ограниченный общественный транспорт редко проезжал через эти районы, в то время как более богатые центральные районы городов сталкивались с меньшими проблемами.\n\nГородская сегрегация привела к радикализации, и полицейские подразделения начали отступать из этих районов, чтобы сэкономить бюджет, что привело к росту деятельности насильственных банд. Далее, они вмешивались только в случае взятки от тех, кто мог себе это позволить, или если ситуация в этих депрессивных районах считалась достаточно серьезной для проведения полицейских рейдов.\n\nПроблема все больше усиливалась и была замечена правящей партией [UKR.GetRulingParty] — эти крупные и депрессивные урбанистические районы и их жители стали оплотом Бороти и РДС, которые недавно протестовали против ужасных условий жизни.\n\nПо причинам, которые можно оправдать и почти за 3 года работы, недавно полученные статистические данные наконец показали надежду. Общественные и частные услуги были расширены в этих депрессивных районах, пригородная инфраструктура наконец-то была отремонтирована или заменена, и порядок был установлен. Вместе с этим пришел крах последнего крупного оплота поддержки крайне левых в Юзовке.\n\nМного лет подряд, один и тот же лозунг звучал в этих местах: разрушение, которое было установлено Скоропадским, продолжит правительство [UKR.GetRulingParty], и необходимо принять радикальные и революционные методы, чтобы хоть как-то спасти ситуацию."
ukraine_republican_events.241.a: "Трудно быть революционером, когда реальность не совпадает с лозунгами."

UKR_excavation: "Бонус к раскопкам"

ukraine_republican_events.242.t: "Реформа армии завершена" #242-251
ukraine_republican_events.242.d: "Завершена последняя реформа армии. Украинская армия быстро модернизируется, и скоро мы сможем защищать нашу территорию наилучшим образом."
ukraine_republican_events.242.a: "Превосходно."

 #Needed to display event option tooltip
 ukraine_republican_events.247.a: "$ukraine_republican_events.242.a$"

ukraine_republican_events.252.t: "Крупное академическое нарушение"
ukraine_republican_events.252.d: "Ничто не предвещало волнений, когда Панас Феденко был объявлен докладчиком в Киевском национальном университете. Господин Феденко может возглавить правительство нашей новой республики, но в нашем обществе следует ожидать атмосферу вежливости.\n\nПланируемая лекция Панаса в университете должна была быть посвящена опасности экстремального национализма, особенно его 'интегральной' форме. Хотя в рекламных материалах лекции это прямо не упоминалось, все понимали, что речь идет о критике так называемого Союза украинских националистов (СУН).\n\nПрибыв, господин Феденко поднялся на трибуну и был немедленно прерван отрядом в униформе, который скандировал 'Позор!' и 'Московские агенты, вон!'. Провокаторов быстро усмирили, никто не пострадал. Однако было ясно, что эти люди были членами или сторонниками СУН.\n\nПосле расследования было установлено, что этот отряд связан с Пантелеймоном Саком, молодым директором одной из киевских школ. Хотя он не был обвинен в чем-либо, господин Сак был немедленно уволен. Похоже, что Пантелеймон недавно присоединился к СУН — дальнейшие проверки показали, что молодой педагог ранее принадлежал к различным движениям, как социалистическим, так и гетманистским.\n\nИ он не единственный, кто сделал это. Для некоторых восстановление республики обещало обновление украинской нации, которое разрушит российское культурное и политическое влияние на Украину, столь сильно укоренившееся в Гетманщине. Однако они разочарованы тем, что, по их мнению, пренебрегают украинской титульной нацией и угождают иностранным элементам. На данный момент такие дебаты в основном неактуальны, но в случае войны с Россией это наверняка станет важным вопросом."
ukraine_republican_events.252.a: "Черт побери, легисты..."

ukraine_republican_events.253.t: "Когда история стоит на месте"
ukraine_republican_events.253.d: "Социал-демократы долгое время находились в тени. Они не чужды трагедии — их мечты были разрушены много лет назад, когда Гетманщина стала их первыми жертвами. Когда они наконец отомстили, они поклялись, что такой жестокой судьбы больше не допустят. На этот раз Народная Республика будет навсегда, и они поведут её в будущее. В каком-то смысле они получили то, о чем мечтали.\n\nНо эта судьба была жестока иным способом. Она наступала медленно, незаметно для большинства. Причиной могли быть любые факторы: неспособность согласовать высокие идеалы с практическим правлением, неудачи в консолидации республиканского фронта, недостаточный рост для крестьян и рабочих или неспособность отразить угрозы Москвы и Берлина. Но её последствия стали очевидны только тогда, когда было уже слишком поздно что-либо изменить; когда всё, что оставалось — это наблюдать, как самые верные республике теряют свои посты, отверженные народом, которому они поклялись служить. Украина отвергла своих чемпионов, и теперь они вынуждены наблюдать, как она движется без них.\n\nНа их место Республика попала в руки коалиции правых, где Радикальные демократы объединились с наследниками Гетманщины, чтобы остановить прогресс. И с тем, что их миссия потерпела неудачу, партия теперь сталкивается с кризисом, которого она не переживала ранее. Когда Республика умерла в первый раз, все знали, что надежда не имеет выбора, кроме как продолжать борьбу; что борьба должна продолжаться. Но что делает партия народа, когда народ её отвергает? Путь назад к власти может всё ещё существовать, но сможет ли партия найти силы пройти по нему? И если она это сделает, что это будет ей стоить? Кто останется с партией в её темный час, а не сбежит влево или вправо? Будущее хранит множество возможностей, но немногие из них приятны.\n\nНесколько лет назад вкус великой победы УСДРП был сладким — но те, кто надеялся изменить ситуацию к лучшему, обнаружили, что победа может быть горькой. Куда пойдет партия дальше, угадать трудно, но немногие знают, останется ли что-то прежним."
ukraine_republican_events.253.a: "В конце концов, будущее отказалось измениться..."

ukraine_republican_events.254.t: "Ожидание прихода будущего"
ukraine_republican_events.254.d: "Социал-демократы долгое время находились в тени. Они не чужды трагедии — их мечты были разрушены много лет назад, когда Гетманщина стала их первыми жертвами. Когда они наконец отомстили, они поклялись, что такой жестокой судьбы больше не допустят. На этот раз Народная Республика будет навсегда, и они поведут её в будущее. В каком-то смысле они получили то, о чем мечтали.\n\nНо эта судьба была жестока иным способом. Она наступала медленно, незаметно для большинства. Причиной могли быть любые факторы: неспособность согласовать высокие идеалы с практическим правлением, неудачи в консолидации республиканского фронта, недостаточный рост для крестьян и рабочих или неспособность отразить угрозы Москвы и Берлина. Но как продолжались кампании, так и увеличивалась апатия: митинги на заводах и в полях больше не привлекали той энергии, как раньше. Украина больше не верит, как раньше.\n\nТеперь партия находит себя младшим партнером в правительстве, которое они помогли построить. Ирония не ускользает от многих — после восстановления Народной Республики и проведения её через тёмные часы, народ вознаградил партию, решив, что им нельзя доверить её возглавить. Это горькая пилюля для многих, но могло быть и хуже: некоторые предсказали более серьёзные потери, которые так и не произошли, и теперь УСДРП остаются в таком положении, где могут защищать рабочих и вести Украину в будущее. С удачей, эти результаты могут быть случайностью, и путь к лидерству может всё ещё появиться. Всё, что нужно — это немного размышлений... и терпения.\n\nСоциал-демократы ждали почти два десятилетия, чтобы увидеть освобождение Украины, и два других — её второе освобождение. В полном размаху истории эти годы — ничто, и эти тоже пройдут. Они могут подождать немного больше."
ukraine_republican_events.254.a: "Победоносный революционер — терпеливый, а мы, если что, не теряем терпение."

ukraine_republican_events.255.t: "Строим лучший мир"
ukraine_republican_events.255.d: "Сорок лет назад было дано обещание. Обещание страны, свободной от империи и капитала, свободы для её рабочих от их когтей — обещание, под которым УСДРП построили Народную Республику, и которое они обновили на её могиле. Даже когда появились другие партии, претендующие на представление рабочих, социал-демократы остались их главными защитниками.\n\nИменно рабочие свергли Гетманщину, и именно их руками была построена Народная Республика. Её основа — это всё, что Гетманщина презирала: равенство, свобода, уважение к жизни и труду. И их орудия не были орудиями фанатиков, которые бы разрушили всё, что они добились, но дисциплины и реформ. Рабочие Украины поняли, что непрекращающаяся революция — не путь к свободе. Они знали, что внутри стен, которые они построили, можно работать над инклюзивным, демократичным, гуманным социализмом.\n\nИ они знают, как и УСДРП, что не может сделать это в одиночку. Как рабочие объединились, чтобы свергнуть Гетмана, так и УСДРП объединились с УПСР и С-РБ, оставив позади свои разногласия, чтобы построить новую коалицию в имени прогресса. И они делают это без злобы к бывшим партнерам в URDP — просто признавая, что в Украине, больше не находящейся под сапогом гетманов, кайзеров и царей, слишком много разделяющих их вещей. В каком-то смысле это счастливая разлука. То, что партии больше не чувствуют нужды оставаться вместе, возможно, является наибольшим доказательством того, что Республика наконец безопасна.\n\nКак долго останется счастье, знает только будущее. Успех новой коалиции не гарантирован, и некоторые сомневаются, что сближение между УСДРП и С-РБ будет долговечным. Возможно, как только память о Гетманщине угаснет, угаснет и дух социалистического единства. Но немногие имеют время думать о неопределенности будущего. Единственная мысль о будущем Украины — как его построить."
ukraine_republican_events.255.a: "Дай мне молоток, Микола. Время работать."

ukraine_republican_events.256.t: "Вести с передовой"
ukraine_republican_events.256.d: "Сорок лет назад было дано обещание. Обещание свободного народа с свободным правительством, больше не скованным цепями империи — и ради этого обещания УСДРП создала Народную Республику, и ради этого они вернули её из пепла. С момента, как идея стала реальностью, социал-демократы считают себя партией Республики.\n\nИ, более чем кто-либо, человек, наиболее ассоциируемый с Республикой, это собственно Симон Петлюра. Главный Отаман был с нами на протяжении всего пути: он сражался, чтобы добиться независимости Украины, защищал её от белых и красных, боролся, чтобы сохранить её дух в изгнании — и, когда Украина нуждалась в нём больше всего, снова сражался, чтобы не допустить её превращения в провинцию русских шовинистов. За это Петлюра стал одним из величайших героев Украины, вдохновив украинцев всех слоев и партий объединиться и защищать её.\n\nИ так социал-демократы осуществили одну из своих старейших мечт: стать партией для всех украинцев. Там, где их когда-то презирали как шайку мятежников и безнадежных идеалистов, социал-демократы доказали, что являются партией национального единства и ответственного правления, в которой люди всех слоев общества могут доверять. Вместе с республиканцами из УРДРП они с нетерпением ждут восстановления страны, которая, наконец, будет в безопасности, и Народной Республики, которая наконец укоренится в сердцах всех."
ukraine_republican_events.256.a: "Настоящий герой знает только две партии: свою родину и свой народ."
ukraine_republican_events.256.a.tt: "Описание лидера §YСимон Петлюра§! будет §Yобновлено§!."

ukraine_republican_events.257.t: "Братство"
ukraine_republican_events.257.d: "Сорок лет назад было дано обещание. Обещание того, что однажды силы угнетения больше не будут иметь преимущества в Украине, и что все её люди смогут жить как равные — обещание, за которое было пролито много крови для создания Народной Республики не один, а дважды. УСДРП были хранителями этого обещания, но оно вдохновило многих на действия ради истинной свободы. Множество людей называют себя республиканцами.\n\nВ течение большей части своей борьбы те, кто поддерживал Республику, были разделены. Их партии всегда находили причины настороженно относиться друг к другу, даже будучи союзниками. Но в Гетманщине были заложены семена республиканского фронта. Социалистический блок объединил много разрозненных левых и дал модель для будущего, а борьба за свободу привлекла УРДП к республиканскому делу. Вместе, под руководством социал-демократов, они сделали невозможное — и наметили невозможное.\n\nСейчас, в отличие от того, что было прежде, УСДРП больше не существует — на её месте стоит Украинская социалистическая партия как гигант левых. Против всех ожиданий, дух республиканства победил среди СР; дух, который побуждает людей откладывать разногласия и ценить общие цели. С их помощью УСП может стать массовой партией в том смысле, в каком УСДРП никогда не могла стать — партией с последователями в студенческих клубах, профсоюзах, крестьянских объединениях и во всех промежуточных группах. Через свою стойкую веру в свои принципы и отказ от бессмысленного радикализма, УСП завоевала уважение как слева, так и справа. Любая из сторон будет готова протянуть руку своему республиканскому партнёру, если будет призвана.\n\nКуда они пойдут дальше? Так ли прочны эти союзы, как кажутся? Какие испытания ждут спасителей Украины, и смогут ли они пережить их неудачу? Будущее всё ещё хранит опасности, как известные, так и неизвестные. Но для человека с историей за плечами, чего бояться?"
ukraine_republican_events.257.a: "Единственное требование быть социалистом — это иметь Украину в своем сердце."

ukraine_republican_events.259.t: "Формирование коалиции" #Победа СДП на выборах
ukraine_republican_events.259.d: "УСДРП одержали великую победу на этих выборах — с результатом, превышающим выборы 1937 года, социал-демократы теперь находятся на вершине политической сцены Украины.\n\nЧтобы получить большинство, мы можем либо вновь объединиться с радикальными демократами, либо, возможно, оставить их позади и сформировать чисто социалистическую коалицию с Социалистами-революционерами и Советско-революционным блоком. Если это удастся, обе опции обеспечат большинство в Собрании. Что нам делать?"
ukraine_republican_events.259.a: "Время для радикальных изменений!"
ukraine_republican_events.259.b: "Формируется второй народный союз!"

ukraine_republican_events.260.t: "Формирование Коалиции" #URDP Общее Победное Дело
ukraine_republican_events.260.d: "УРДП одержала большую победу на этих выборах — с еще более внушительными результатами, чем на выборах 1937 года, теперь Радикальные Демократы возглавляют украинскую политическую сцену.\n\nДля достижения большинства мы можем снова объединиться с Социал-демократами, или, возможно, оставить их позади и сформировать более центристскую коалицию с Украинской Народной Партией. В случае успеха обе опции приведут к большинству в Зборах. Что мы должны сделать?"
ukraine_republican_events.260.a: "Союз народа остается сильным!"
ukraine_republican_events.260.b: "Коалиция для национального прогресса сформирована!"

ukraine_republican_events.261.t: "Чрезвычайный Конгресс Партии!"
ukraine_republican_events.261.d: "С течением времени мы все больше подвергаемся давлению, чтобы новое поколение политиков вышло на сцену. «Нужны новые лидеры, новые идеи и новые личности», — говорят они. «Справедливо», — отвечаем мы. С поражением России уже почти очевидным, было решено провести специальный партийный конгресс для Украинской Радикальной Демократической Партии. Тем не менее, сразу же возникли споры.\n\nЕдинственным кандидатом, избранным в Центральный Комитет без особого сопротивления, был Тимиш Олесюк, главный государственный служащий в министерствах внутренних дел и образования, бывший военный и лидер подляшской-украинской эмигрантской общины. Его избрание не вызвало значительных разногласий, и он был выбран подавляющим большинством делегатов партии. Конечно, это помогло, что господин Олесиук открыто ассоциировал себя с центристским большинством партии.\n\nНо затем ситуация усложнилась. С оставшимися только двумя местами в Центральном Комитете, два противоборствующих политических дуэта были предложены на рассмотрение. С одной стороны, это были Александр Юрченко и Евгений Гловинский. Юрченко, ведущий правовед, и Гловинский, бывший офицер и профессор экономики и инженерии, оба ассоциируются с левым флангом (особенно с Никовским). Они вызвали серьезное недовольство у правых, которые обвинили этих двоих в том, что они «не в теме академики».\n\nС другой стороны, были Василий Дубровский и Михаил Ветухив. Дубровский, известный историк, и Ветухив, знаменитый ветеринар и биолог, вместо этого ориентировались на фракцию господина Доленка, все трое базируются в Харькове. Это, естественно, закрыло возможную поддержку со стороны левых, которые обвинили пару в том, что они «нерелевантные книжники».\n\nПоскольку центристы обладают значительным большинством, их голоса решат исход. Что в итоге оказалось…"
ukraine_republican_events.261.a: "Победа Юрченко и Гловинского!"
ukraine_republican_events.261.b: "Успех Дубровского и Ветухива!"

ukraine_republican_events.262.t: "Старейшины Партии высказывают недовольство"
ukraine_republican_events.262.d: "Однажды ночью Мазепа сидел в своем офисе, размышляя о различных законодательных проектах, которые он и Феденко собирались представить в ближайшие недели. Вдруг он услышал стук в дверь. Один из помощников Мазепы вошел и передал председателю письмо. Имя на бумаге было ему хорошо знакомо: Дмитрий Антонович, Николай Порш, Прокип Поняенко и Николай Ковальский. Общеизвестные как «старейшины партии», эти личности были на учредительном партийном съезде в 1905 году вместе с Мазепой, но по какой-то причине ушли от значительной политической активности в эмиграции в 1920-х годах. Тем не менее, четверка все еще сохраняла некоторое влияние в партии, и их мнение имеет вес.\n\nОжидая теплое сообщение, выражение лица Исаака омрачилось, когда он прочитал письмо. В нем «старейшины» критиковали правительство за отклонение от пути реформаторского социализма и марксистской доктрины, заявив, что оно «стало заложником сил буржуазных радикальных демократов». Если что-то не изменится, они предупреждают, что УСРП может стать «социалистической партией только по имени».\n\nЭто было не то, что Мазепа хотел услышать. Он считал, что это исходит из добрых побуждений, но это не сделало ситуацию намного лучше. Обращаясь к своим товарищам, Дмитрию, Прокипу и двум Николаям, Исаак попытался успокоить их. Все же, они преувеличивали… не так ли? По крайней мере, это то, что хотел думать Мазепа."
ukraine_republican_events.262.a: "Они ошибаются!"
ukraine_republican_events.262.a.tt: "Вы получили это событие, потому что ваш §1Идеализм§! снизился до §Y-2§!. Убедитесь, что он не опустится до §Y-4§!."

ukraine_republican_events.263.t: "Кушнир торжествует!" #RDS событие
ukraine_republican_events.263.d: "Незадолго до его оправдания на широко освещаемом процессе, Макар Кушнир вернулся в Черкассы. Он не потерял времени и сразу же собрал значительный митинг своих сторонников в одном из крупных городских помещений.\n\nОкруженный молодыми культуристами Евгением Маланюком и Леонидом Мосендцем, а также региональным лидером партии Опанасом Андриевским, Кушнир торжественно заявил о «победе разумных и патриотичных сил» в ответ на решение суда. Он также выразил свою уверенность, что власть в стране захвачена «скоро капитулирующими», которые сбегут при первом признаке войны с Россией или Французской Коммуной.\n\nМитинг был воспринят как частичный успех Народной Партии, но маловероятно, что это изменит что-то в глобальном плане. Тем не менее, Анатолий Писоцкий опубликовал чрезвычайно резкую критику (под своим не секретным псевдонимом Андрий Ричицкий) того, как развивалась вся эта ситуация. Писоцкий утверждал, что, даже если это было случайно, наше правительство помогло УНП завоевать известность, которой мы хотели бы избежать. Он закончил свою статью саркастическим вопросом, заинтересован ли Винниченко в прощении бывшего Гетмана. Другой партийный лидер, Михаил Авдиенко, явно планирует большой контрмитинг, в основном против УНП, но также против «правительственной слабости»."
ukraine_republican_events.263.a: "Не время, ребята!"

ukraine_republican_events.264.t: "Коммеморация Никиты Шаповала"
ukraine_republican_events.264.d: "Никогда не теряя надежды на падение режима Гетмана, Шаповал оставался очень активным в своей аналитической работе, а также в партийной деятельности. Но трудности эмиграции начали сказываться на нем.\n\nВ своем обычном пылком стиле Шаповал и его ближайшие союзники начали часто ссориться с другими левыми эмигрантами. Вопросы стратегии, споры о идеологических элементах, написание программ и межличностные отношения часто становились предметом обсуждения. Более того, постоянная борьба за финансирование и политические тактики с австрийскими покровителями привлекала внимание со всех сторон - включая Вену, галичанские политические силы и других эмигрантов. Был реальный страх, что эмиграция может разрушиться до того, как начнется борьба против Гетмана.\n\nНо сначала появилась реакционная опасность. В 1931 году недовольный студент Львовского университета, явный сторонник Гетмана, застрелил товарища Шаповала. Не было доказательств какого-либо участия организаций или иностранных государств. Согласно всем данным, это был одиночный волк с личными претензиями. Смерть Никиты потрясла всю эмигрантскую общину. Но это вдохновило других и заставило их забыть разногласия и работать на общую цель.\n\nИ так, он может не дожить до нашего триумфа, но он действительно вдохновил нас, даже после своей смерти. Процедуры перезахоронения в Киеве уже начаты.\n\nЦеремонию возглавит председатель партии УПСР Григорьев, его близкий друг и политический преемник, а также Александр Мыцюк, высокопоставленный член УПСР и уроженец Донбасса, и Николай Шаповал, младший брат Никиты. Никиту Ефимовича похоронят рядом с его младшим братом, Артемом, офицером армии, который погиб на войне всего несколькими месяцами ранее."
ukraine_republican_events.264.a: "Спасибо, Никита Шаповал."

ukraine_republican_events.265.t: "Чрезвычайный Конгресс Партии!"
ukraine_republican_events.265.d: "С течением времени мы все больше подвергаемся давлению, чтобы новое поколение политиков вышло на сцену. «Нужны новые лидеры, новые идеи и новые личности», — говорят они. «Справедливо», — отвечаем мы. С поражением России уже почти очевидным, было решено провести специальный выборный конгресс партии Украинской Социал-Демократической Рабочей Партии. Тем не менее, сразу же возникли споры.\n\nЧетыре основных кандидата, избранных в Центральный Комитет без особого сопротивления, это Алексей Козловский, Николай Малашко, Иван Лучишин и Петр Волыняк. Козловский и Малашко, оба бывшие солдаты (первый был офицером), также разделяют страсть к кооперативной экономике и педагогической деятельности. Лучишин не так далеко от этих двоих и тоже ориентирован на кооперативы, но больше с практической экономической стороны. Волыняк, напротив, сосредоточен исключительно на работе в Министерстве образования. Тем не менее, все четыре смогли найти себе место в руководстве УСРП.\n\nНо затем ситуация усложнилась. С оставшимся только одним местом в Центральном Комитете, два противоборствующих кандидата были предложены на рассмотрение. С одной стороны, был Юрий Лавриенко. Лавриенко, знаменитый писатель и высоко оцененный полемист, получил некоторую известность благодаря близким связям с прогрессивными писателями Украины, Галиции и даже Польши.\n\nС другой стороны, был Иван Багряный. Точно так же, Багряный — известный писатель и ведущий полемист. Но в отличие от Лавриенко, Багряный также знаменит своей яркой риторикой и довольно радикальными (для социал-демократа) антироссийскими взглядами. Если его выберут, он определенно будет считаться одним из лидеров более правых фракций партии.\n\nПока Лавриенко является фаворитом на победу. Но возможен и неожиданный исход. В любом случае, результат оказался…"
ukraine_republican_events.265.a: "Победа Лавриенко!"
ukraine_republican_events.265.b: "Успех Багряного!"

ukraine_republican_events.267.t: "Прогерманский переворот в Украине"
ukraine_republican_events.267.d: "После периода ухудшения отношений после победы социалистической партии РДС на выборах на Украине, Министерство иностранных дел Германии наконец решило отреагировать. Подробности неизвестны, но, похоже, требование посла Германии очистить украинское правительство от «радикальных социалистических элементов» не было выполнено.\n\nВ преддверии неизбежного свержения Винниченко принял решение бежать в Москву. После кризиса в [202.GetName]е было сформировано новое правительство либеральных прогрессистов и умеренных социал-демократов, что без единого выстрела обеспечило Украине лояльность Берлину."
ukraine_republican_events.267.a: "Повернись спиной к коммунисту, и он выстрелит тебе в спину."
ukraine_republican_events.267.b: "Совершенно неприемлемо!"

### LUN Events ###
 ukraine_lun_events.2.t: "Национальное собрание избирает Коновальца"
 ukraine_lun_events.2.d: "Самые яркие умы по всей Украине призваны временно взять в свои руки власть народа. Их цель - разработать проект учредительных документов Украинской Народной Республики. Открытое временным главой государства Николаем Сциборским собрание приняло конституционное предложение секретаря Лиги Дмитрия Андриевского и утвердило титул Провидника как постоянного главы государства с полномочиями, равными гетманским. В споре о том, кто должен быть избран на эту должность, образовались две фракции - радикалы ЛУН предпочли оставить Сциборского, но в итоге их перевесило более консервативное большинство, стоящее за генералом Евгением Коновальцем. От сурового, популярного и негетманского военного ожидается беспристрастность в политике и преданность исключительно национальному благу. Поскольку избрание Коновальца было очевидным, торжественный генерал был встречен бурными аплодисментами. Наконец-то полурусский аристократ ушел, а на его месте гордо стоит истинный украинец!"
 ukraine_lun_events.2.a: "Он прошел долгий путь!"

 ukraine_lun_events.3.t: "Дебаты по экономической политике"
 ukraine_lun_events.3.d: "В экономических вопросах Лига не проявила особой решительности, за исключением основных принципов национальной земельной реформы, самообеспечения и сильной военной промышленности, но это лишь развитие экономической политики времен Скоропадского, а не что-то радикально иное. В любом случае, такая умеренная позиция устраивает не всех.\n\n Группа экономистов и теоретиков, в том числе Николай Сциборский, Яков Моралевич и Леонид Костарив, разработала амбициозную экономическую политику, которая должна быть представлена на рассмотрение Национального собрания. Их экономические предложения предусматривают жесткий государственный контроль над экономикой через критические экспортные монополии, национализацию тяжелой промышленности и исполнительное руководство банковским сектором. Сциборский утверждает, что таким образом можно разрушить гегемонию \"безнациональной\" денежной элиты и направить огромные богатства Украины более эффективно - и что более важно, на нужды украинского народа.\n\nДополнительно предложение включает организацию профессий в политически конспирированные союзы, которые будут иметь корпоративное представительство в администрации. В качестве рабочего примера такой формы организации приводится легионерский рабочий корпус в Румынии, завоевавший поддержку части рабочего класса.\n\nСторонники этого проекта утверждают, что вряд ли разумно начинать масштабные экономические реформы накануне войны, и предпочитают просто улучшить существующую экономическую ситуацию путем проведения отдельных национальных реформ."
 ukraine_lun_events.3.a: "Радикалы правы"
 ukraine_lun_events.3.b: "Старая гвардия права"

 ukraine_lun_events.4.t: "Судьба Скоропадского"
 ukraine_lun_events.4.d: "Последней неувязкой, обеспечивающей наш захват власти, является судьба бывшего гетмана. В настоящее время он и его семья находятся на даче под наблюдением людей, верных [ROOT.GetLeader], но пока никакого решения не принято. Старшая гвардия украинских националистов, многие из которых служили в гетманской администрации и армии, по-прежнему уважают Скоропадского за его роль в обеспечении украинской государственности и не хотели бы слишком жестоко наказывать его за неудачи. Однако более ревностные члены ЛУН требуют действий. Они утверждают, что гетман не просто потерпел неудачу, а активно разлагал украинскую нацию российским влиянием и рабством перед Германией, и поэтому требуют наказания.\n\n В чрезвычайно политизированном судебном процессе эти две точки зрения противоречили друг другу. Прокурор был ярым сторонником ЛУН и изложил длинный список преступлений, утверждая даже, что подавление восстания 1936 года было \"преступлением против украинского крестьянства\". Они также показали, что Скоропадский лично извлекал выгоду из связей своего правительства с компанией 'Протофис' и другими деловыми кругами в Украине, изображая гетмана коррумпированным и преступником.\n\n За три дня судебных слушаний мнения только разделились, поскольку стратегия ЛУН, направленная на то, чтобы усугубить положение людей против гетмана, также вызвала отпор и сделала процесс еще более похожим на шоу, чем он уже есть. Присяжные, похоже, тоже расколоты - многие из них симпатизируют Скоропадскому. Окончательное решение они принимают..."
 ukraine_lun_events.4.a: "Домашний арест"
 ukraine_lun_events.4.b: "Изгнание в Германию"

 ukraine_lun_events.5.t: "Вопрос демократии"
 ukraine_lun_events.5.d: "Рождение Народной республики было прежде всего прагматичным делом: для спасения нации нужна сильная рука. В остальном мнения о том, какой должна быть Украина в будущем, расходятся. Такие военные, как Коновалец, похоже, совершенно не интересуются этим вопросом, сосредоточившись на укреплении Украины уже сейчас, оставив подобные вопросы на будущее, когда минует великая угроза со стороны России.\n\n Впрочем, многие идеологи уже представляют себе будущее республики. Дмитрий Донцов, пожалуй, самый ярый сторонник полного отказа от парламентаризма и создания тоталитарного, националистического государства. Некоторые настроены более идеалистично - например, последователи Макара Кушнира утверждают, что диктатура - лишь временная мера, и как только Украина достаточно укрепится, она сможет стать настоящей национально-демократической республикой с сильной президентской властью."
 ukraine_lun_events.5.a: "Демократия - это фантом, придуманный либералами и социалистами"
 ukraine_lun_events.5.b: "Демократия - естественное состояние украинской нации"

 ukraine_lun_events.6.t: "Сочинения Донцова"
 ukraine_lun_events.6.d: "На митингах Лиги, как никто другой, возвысился один человек: Дмитрий Донцов. Его брошюры получили широкое распространение, и Донцов быстро стал почти легендарной фигурой среди молодых рядовых членов ЛУН.\n\n Донцов был самым откровенным критиком сохранения старых пережитков гетманского строя, призывая вместо них к рождению нового человека с горячей верой и каменным сердцем, который будет заниматься национализмом не на словах, а на деле. Донцов является ярым украинским этнонационалистом и проповедует превосходство нации над всем остальным.\n\nЭто напоминает многим наблюдателям "Железную гвардию" и другие ультранационалистические движения, которые поднимают голову по всей Европе. Дополнительное подозрение вызывает прошлое Донцова, который в прошлом был сторонником гетманского ультратрадиционализма, но разочаровался в режиме и вступил в ЛУН. Его популярность делает его потенциальной угрозой, и некоторые призывают ограничить его публикации, чтобы они не распространяли ненужный радикализм в народе."
 ukraine_lun_events.6.a: "Цензура его самых революционных произведений"
 ukraine_lun_events.6.b: "Он имеет право это говорить"

 ukraine_lun_events.7.t: "Два лица Лиги"
 ukraine_lun_events.7.d: "После прихода Лиги к власти число ее членов резко возросло, поскольку различные мелкие националистические группы влились в эту организацию. Аналогичным образом, значительная часть прежних прогетманских консерваторов и националистов присоединилась к организации, а еще большее число не являются ее членами, но входят в состав ассоциаций, связанных с ЛУН. Все это значительно расширило Лигу, превратив ее в полноценное массовое движение, которое стало доминировать в политической жизни Украины.\n\nВскоре стало очевидно, что в Лиге появились две отдельные группы. Старая гвардия состоит из более умеренных националистов, многие из которых ранее сотрудничали с Гетманатом. В эту группу, как правило, попадают администраторы, офицеры старшего поколения и ветераны боев 1917-1918 гг. Их взгляд на национальную революцию ограничен - они хотят не великого идеологического переворота, а эффективного, милитаризованного государства, такого, каким должен был быть Гетманат. Они наиболее благосклонны к генералу Коновальцу и \"военному правлению\". Молодая гвардия - по иронии судьбы, группа, которая дольше всех находится в ЛУН, - это молодые радикалы, офицеры низшего звена и представители среднего класса с высшим образованием. Ее символами являются такие идеологи, как Николай Сциборский и Дмитрий Донцов. Некоторые представители "Молодой гвардии" считают, что их национальная революция оказалась слишком консервативной из-за их умеренных союзников, в то время как "Старая гвардия" склонна видеть в радикалах, возможно, слишком незрелых, склонных к мечтательности и недостаточно опытных, чтобы правильно руководить страной."
 ukraine_lun_events.7.a: "У обоих есть некоторые моменты"

 ukraine_lun_events.20.t: "Новая оппозиция Гетманату?"
 ukraine_lun_events.20.d: "Для многих антигетманское восстание раз и навсегда развеяло представления о гетманском режиме как о единственно возможном гаранте стабильности, столь необходимой для развития молодого украинского государства. Однако в условиях дезорганизации республиканских сил вопрос о наибольшей угрозе гетманскому господству над политической системой остается для многих открытым.\n\n Некоторые признаки указывают на то, что наибольшая угроза гетманскому режиму может исходить не слева, как это было раньше, а справа. В той ситуации, в которой оказалось украинское государство, характер Лиги украинских националистов, организации, всецело и рьяно выступающей за радикальные перемены, дал шанс некогда небольшой и относительно малозначимой группе.\n\n Одним из наиболее ярких рассадников этой организации стали военные; дезертирство во время восстания, а также последующие попытки нынешнего режима сделать армию более \"политически благонадежной\", заставили Лигу активизировать агитацию среди солдат и младших офицеров, призывая к созданию нового украинского государства на принципах долга, дисциплины и воинского товарищества."
 ukraine_lun_events.20.a: "Мы будем следить за этим"
 UKR_lun_firstwarning: "Лига украинских националистов§! может быть, пока и является фронджерским движением, но если мы не выполним обещания по земельной реформе, то, несомненно, они будут расти"

 ukraine_lun_events.21.t: "Лига и сельская местность"
 ukraine_lun_events.21.d: "По сравнению с такими партиями, как Социал-демократическая рабочая партия и Аграрно-демократическая партия, Лига украинских националистов никогда не имела сильных позиций в сельской местности, а ее риторика часто находила поддержку только среди правой интеллигенции. По мере того как левая оппозиция Гетманату ослабевает, а Лига пытается улучшить свое положение среди крестьянства, она находит маловероятного союзника: бывшего республиканца Кирилла Осьмака.\n\n Возглавляя кооперативное объединение \"Сильский хозяин\", сельскохозяйственную организацию, основанную в Галиции в 1899 г., а затем распространившую свою деятельность по всей Украине, Осьмак обеспокоен авторитарными тенденциями и радикальными предложениями Лиги. Несмотря на это, Осьмак считает, что опасения Сциборского по поводу благосостояния крестьян и фермеров искренни. Между Лигой и 'Сильским хозяином' сложился фактический союз, и многие должности в региональной сети кооператива перешли к Лиге.\n\n Помимо помощи в создании и работе фермерских кооперативов, сельскохозяйственного образования и помощи нуждающимся фермерам, члены Лиги использовали возможность распространить свое послание о новой Украине - где потребности украинского народа являются первоочередной заботой государства и где нет места тирании крупных землевладельцев. Под влиянием Лиги в сельской местности проходят локальные, небольшие акции протеста, требующие от правительства справедливого распределения земли."
 ukraine_lun_events.21.a: "Беспокойство"

 ukraine_lun_events.22.t: "Республиканские остатки и Лига"
 ukraine_lun_events.22.d: "Похоже, что попытки Лиги заручиться поддержкой бывшей оппозиции гетмана принесли свои плоды. При поддержке кооперативного объединения Кирилла Осьмака ЛУН распространила свое влияние на недовольное крестьянство. Пытаясь обратиться к широким слоям населения, партийные органы Сциборского сбавили тон антидемократических выступлений и сосредоточились на критике медленной и неэффективной политики гетманского правительства в области земельной реформы. Под видом сельских протестных движений Лига стала привлекать все больше тех, кто ранее поддерживал республиканцев, опираясь на очень схожие идеи: призывы к социальному равенству на селе, увеличению представительства народа в \"элитарном\" гетманском режиме"
 ukraine_lun_events.22.a: "Какие криптореспубликанцы..."

 ukraine_lun_events.23.t: "Безоговорочная лояльность?"
 ukraine_lun_events.23.d: "В то время как агитаторы Лиги продолжают свои усилия по радикализации крестьянства и организации новых акций протеста, военные остаются наиболее уязвимым институтом для ультранационалистической инфильтрации. Хотя спорадические контакты даже относительно высокопоставленных офицеров с Лигой существовали уже давно, но они были случайными и незначительными.\n\n Похоже, ситуация меняется к худшему: появились слухи о том, что два офицера активно сотрудничают с ЛУН: Петр Болбочан и Владимир Оскилко, которые имеют репутацию людей достаточно независимых и несколько опрометчивых в мыслях и действиях. В военных кругах негласно считается, что оба они видят в армии нечто большее, чем просто часть аппарата государственной безопасности. Ярко выраженные элитарные тенденции SHD всегда отталкивали их, но откровенно популистская риторика LUN сумела привлечь их интерес. Оставаясь в основном равнодушными к более \"эзотерическим\" постулатам Лиги, они, тем не менее, возлагают определенные надежды на эту динамичную и бескомпромиссно радикальную организацию."
 ukraine_lun_events.23.a: "Повод для беспокойства"

 ukraine_lun_events.24.t: "Марш Лиги украинских националистов"
 ukraine_lun_events.24.d: "Организация Николая Сциборского из книжного клуба правого толка превратилась в широкую организацию, объединяющую под одним знаменем различных националистов, республиканцев и недовольных консерваторов. В качестве демонстрации своей силы было организовано шествие по историческим местам [202.GetName]. Главный организатор мероприятия Евгений Онацкий выступил с заявлением, в котором назвал марш \"праздником украинской нации и ее достижений\", однако столичные правоохранительные органы придерживаются более пессимистичной точки зрения.\n\n Хотя марш прошел мирно, он, конечно, вызвал немало вопросов. Многие выступления в рамках мероприятия носили радикальный характер, особенно выступление Дмитрия Донстова: Лига требовала от гетмана немедленных действий по \"коррекции курса государства.\" Среди требований Лиги - раздача земли верному украинскому народу, удаление из ближайшего окружения гетмана коррумпированных бюрократов и бизнесменов, назначение отамана-министра, дружественного Лиге.\n\n Еще большее беспокойство вызывает то, что многие низшие офицеры участвовали в акции протеста в частном порядке. В армии распространено мнение, что Лига - хорошее, патриотическое движение, цели которого достойны восхищения, даже если их средства несколько подозрительны. Сам Сциборский - полковник, и в армии у него появились свои поклонники"
 ukraine_lun_events.24.a: "Давайте попробуем ограничить их влияние..."

 ukraine_lun_events.25.t: "Лига и армия"
 ukraine_lun_events.25.d: "За закрытыми дверями состоялась встреча руководства Лиги с рядом националистически настроенных генералов. От ЛУН на встрече присутствовали Николай Сциборский, Евгений Онацкий и Дмитрий Андриевский, а от военных - Евгений Коновалец, Николай Капустянский и Петр Болбочан - бывшие республиканцы времен Народной Республики и лишь немногословные сторонники Скоропадского. Они уверяют, что их сомнения разделяют и многие другие в армии, особенно среди военнослужащих Западной Украины, которая часто оставалась в стороне от гетманских проектов. Помимо опасений рядовых солдат, Коновалец рассказал о том, как предыдущее восстание и отставание в проведении реформ подрывают доверие офицерского корпуса к гетману. В частном порядке многие генералы выражали опасения по поводу способности Скоропадского выполнять функции главнокомандующего в военное время, а война, несомненно, грядет.\n\n В качестве потенциального решения этих проблем была предложена возможность \"передачи власти\" Руководство ЛУН заверило, что если Коновалец и верные ему люди решат выступить против гетмана и организовать \"более ответственное правительство\", то они получат поддержку Лиги. Достоинства такого плана были быстро признаны, хотя и не в одиночку. Капустянский опасался возможного кровопролития - передача власти должна быть не очередным восстанием, а чистым и организованным отстранением Скоропадского от власти. В противном случае это может только еще больше ослабить безопасность Украины. Тем не менее, это предложение казалось наилучшим выходом из сложившейся ситуации"
 ukraine_lun_events.25.a: "Коновалец принял план"
 ukraine_lun_events.25.b: "Коновалец не принял этот план"

 ukraine_lun_events.26.t: "Волна Лиги проходит"
 ukraine_lun_events.26.d: "ЛУН потеряла значительную часть своей первоначальной популярности после периода расцвета. Многие из их более умеренных сторонников, похоже, удовлетворены некоторыми из последних политик Скоропадского, а большое массовое движение сошло на нет. Поскольку земельная реформа продолжается - медленно, но верно, - многие утверждают, что именно требования ЛУН привели к ее осуществлению. Кроме того, распространение брошюр Лиги в армии было запрещено, и даже офицеры, дружественно относившиеся к Лиге Сциборского, перешли на более осторожный тон."
 ukraine_lun_events.26.a: "Уловки Савинкова здесь не работают"

 ukraine_lun_events.27.t: "Большой протест Лиги"
 ukraine_lun_events.27.d: "Воодушевленный одобрением военных, второй Великий поход был быстро организован, на этот раз с более радикальными политическими требованиями. Правительство требовалось отправить в отставку, а гетман должен был передать власть \"национально надежным людям.\" Прямого требования отречься от престола не было, но смысл был ясен: либо Скоропадский согласится стать марионеткой Лиги, либо уйдет. В поддержку своих требований был организован большой митинг, собравший недовольных крестьян, студентов и многих других в [202.GetName] и слушавший пламенные ораторские речи генерала Капустянского, который, ссылаясь на Священное Писание, изображал гетманское правительство ростовщиками и лжеверующими.\n\n Протесты быстро распространились по крупным городам, и участники шествия перекрыли многие улицы в [202.GetName], когда казаки попытались их разогнать. Скоропадский, по-видимому, очень опасался насилия, опасаясь, что эти националисты будут пользоваться широкой популярностью в вооруженных силах. Но у него не было выбора - его кабинет и он сам были настроены на сохранение власти. Даже если у этой Лиги и были приемлемые цели, они были радикалами, пытавшимися свергнуть конституционный строй, что ничем не лучше того, что пытались сделать республиканцы некоторое время назад. Наконец, на третий день протестов, после долгих раздумий, гетман издал суровый приказ: толпа должна разойтись и вернуться в свои дома, если она уважает национальный порядок и стабильность в Украине. Все, кто не подчинится, будут арестованы"
 ukraine_lun_events.27.a: "Надеюсь, это сработает"

 ukraine_lun_events.28.t: "Снятие гетмана Скоропадского"
 ukraine_lun_events.28.d: "Требование гетмана о массовых арестах не было выполнено. Когда отряды милиции пытались разогнать толпу, митингующие держались стойко, начались потасовки. Началась стрельба. Руководство движения назвало правоохранительные органы предателями, служащими коррумпированной элите, и вскоре вялые попытки разогнать протестующих переросли в пассивность или даже присоединение к ним. Многим это напомнило дни перед восстанием 1936 года, хотя на этот раз протесты были направлены на благо народа, а не на установление социализма и анархии.\n\nКарты гетмана Скоропадского быстро заканчивались: было ясно, что Лига пользуется поддержкой населения. Он мог приказать армии вмешаться, но не был уверен, что ей можно доверять. Один из его доверенных лиц предложил собрать вещи и уехать из [202.GetName] в [221.GetName], собрав там верные войска, но большинство членов кабинета не хотели начинать новую гражданскую войну. Некоторые предлагали Скоропадскому начать переговоры - или даже принять их требования - ради блага нации.\n\nПо мере того как шли эти дебаты, у руководства Лиги, похоже, кончилось терпение. Утром пятого дня протестов группа высокопоставленных офицеров под руководством Евгения Коновальца прибыла в резиденцию гетмана и приказала охране отступить. Люди военного заговора быстро оцепили пути отхода, арестовали гетмана и кабинет министров, чтобы не спровоцировать новое антигетманское восстание, и вскоре заставили гетмана подписать отречение от престола и назначить кабинет министров, состоящий из членов ЛУН и сторонников Коновальца. Лидер Лиги Николай Сциборский был введен в должность временного главы государства до тех пор, пока Сойм не сможет собраться для решения вопроса о будущем Украины."
 ukraine_lun_events.28.a: "Да здравствует народная республика!"

 ukraine_lun_events.40.t: "Революция обеспечена"
 # ukraine_lun_events.40.t2: "A Change of Direction"
 ukraine_lun_events.40.d1: "Учитывая, что на последних выборах в Сойм доминировали делегаты, связанные с \"Революционным крылом\" ЛУН, можно с уверенностью сказать, что радикальное ядро единоверцев организации не только сохранило свои позиции, но и смогло их значительно укрепить. Хотя сотрудничество между ветеранами движения и так называемой \"старой гвардией\" не всегда было гладким, особенно на первых порах, со временем оно постепенно налаживалось, и все благодаря беспристрастности и мудрости нашего славного Провидника. Наконец, в горниле войны наша Лига переродилась в действительно единое целое, сосредоточенное прежде всего на важнейшей задаче - продолжении и защите Национальной революции.\n\n Неудивительно, что первый государственный секретарь Николай Сциборский остается в благоволении нашего Вождя, его положение обеспечено, его неустанные усилия направлены на улучшение и укрепление нашего государства и нации. Действительно, широкая поддержка Сциборского в законодательном органе, о которой так горячо говорил Олег Ольжич на открытии первой после выборов сессии Сойма, свидетельствует о том, насколько оздоровилась наша политическая среда. Таким образом, хотя те, кто хотел бы видеть Первого государственного секретаря свергнутым, еще могут строить планы в темноте, в обозримом будущем им суждено остаться в меньшинстве в нашей организации"
 ukraine_lun_events.40.d2: "Учитывая, что на последних выборах в Сойм доминировали делегаты, относящиеся к так называемой \"старой гвардии\", можно с уверенностью сказать, что радикальное ядро единоверцев ЛУН значительно ослабло со времен революции 1938 года. Сотрудничество между ветеранами движения и "старой гвардией" всегда было непрочным, а во время войны милитаристское и умеренное крылья организации сумели взять верх.\n\n$ukraine_lun_events.40_mil$ Им противопоставлено умеренное крыло, выступающее за $ukraine_lun_events.40\n\n Хотя наш Провидец допускает определенную свободу внутренних дискуссий и редко вмешивается напрямую, если этого не требует ситуация, он, тем не менее, остро чувствует пульс политической жизни Лиги и государства. Новый состав Сойма явно свидетельствует о том, что революционное крыло потеряло значительную часть своей поддержки в движении, и поэтому первый государственный секретарь Сциборский вскоре неизбежно столкнется со значительным давлением и противодействием со стороны восходящих крыльев. Возможно, для того чтобы обеспечить дальнейшее бесперебойное правление, настало время перемен"
 ukraine_lun_events.40.d3: "$ukraine_lun_events.40_elect$ Милитаристское крыло оказалось в состоянии бросить вызов лидерству.\n\n$ukraine_lun_events.40_mil$\n\n$ukraine_lun_events.40_end$ Милитаристского крыла. Возможно, для того чтобы обеспечить дальнейшее бесперебойное управление страной, настало время перемен"
 ukraine_lun_events.40.d4: "$ukraine_lun_events.40_elect$ Умеренное крыло оказалось в состоянии бросить вызов лидерству.\n\n Умеренное крыло выступает за $ukraine_lun_events.40_mod$, столь необходимое в эти трудные времена.\n\n$ukraine_lun_events.40_end$ Умеренное крыло. Возможно, для того чтобы обеспечить дальнейшее бесперебойное управление страной, пришло время перемен"
 ukraine_lun_events.40_elect: "Хотя на последних выборах в Сойм в основном доминировали делегаты, связанные с \"Революционным крылом\" ЛУН, \"Старая гвардия\" сумела расширить свое влияние и может даже обогнать \"Революционное крыло\" по значимости. Хотя сотрудничество между ветеранами движения и "старой гвардией" улучшилось с самого начала, оно не так сильно, как могло бы быть и во время войны"
 ukraine_lun_events.40_mil: "Милитаристское крыло выступает за жесткую внутреннюю дисциплину и иерархическую реорганизацию Лиги по строго определенным линиям подчиненности и ранжирования. Свои надежды они возлагают на Андрея Мельника, давнего соратника и верного лейтенанта нашего Провидника. Под его руководством, по их мнению, государство достигнет внутренней сплоченности и порядка, столь необходимых в наше непростое время"
 ukraine_lun_events.40_mod: "за большую открытость внутренних дискуссий и ослабление некоторых ограничений в политической сфере. Свои надежды они связывают с Николаем Капустянским, восхитительным полководцем и авторитетным военным теоретиком, лично в основном не замешанным в интригах и борьбе за власть в Лиге. Под его руководством, по их мнению, государство достигнет внутреннего мира и стабильности"
 ukraine_lun_events.40_end: "Хотя наш Провиднык допускает определенную свободу внутренних дискуссий и редко вмешивается напрямую, если этого не требует ситуация, он, тем не менее, чутко чувствует пульс политической жизни Лиги и государства. Хотя первый государственный секретарь Николай Сциборский остается в хорошем расположении нашего Провидения, его неустанные усилия, направленные на улучшение и укрепление государства и нации, пользуются широкой поддержкой в законодательном органе, новый состав Сойма ясно показывает, что революционное крыло уже не так сильно, как раньше, и поэтому Сциборский может вскоре столкнуться с серьезным давлением и противодействием со стороны восходящего движения"
 ukraine_lun_events.40.a: "Оставьте Сциборского, он достойно работал все эти годы"
 ukraine_lun_events.40.b: "Первый государственный секретарь Мельник, приступайте к исполнению своих обязанностей"
 ukraine_lun_events.40.c: "Первый государственный секретарь Капустянский, приступайте к исполнению своих обязанностей"

 ukraine_lun_events.49.t: "Воспоминания о Павле Скоропадском"
 ukraine_lun_events.49.d1: "Изгнанный в небытие после решения суда о заключении его под домашний арест на даче, Павел Скоропадский, безусловно, переживает лучшие времена. С самого начала своего заключения опальный старый гетман взялся за написание личных мемуаров, в которых расскажет о своей жизни на посту главы украинского государства в течение двух десятилетий. Сегодня его мемуары официально опубликованы.\n\n В своем предисловии Скоропадский отмечает, что у него нет ни желания, ни умения создавать интересные мемуары, что усугубляется его преклонным возрастом. Тем не менее, его публикация дает достаточно полное представление об истории Украинского государства с момента возникновения Гетманата до националистического переворота в конце 1938 года. Ближе к концу мемуаров, когда Скоропадский рассказывает о самом перевороте, он признается, что \"не очень доволен тем, в каком направлении движется нация\", хотя и не уточняет этого. Он признает, что его администрация, возможно, совершила \"некоторые ошибки\", которые привели к ее разрушению.\n\n Однако он по-прежнему убежден, что его правление было в целом благожелательным, за что новое руководство должно быть ему благодарно; ведь именно он предотвратил социалистический захват Украины не один, а три раза за всю историю молодого государства."
 ukraine_lun_events.49.d2: "Изгнанный в небытие после решения суда о его высылке в Германию, Павел Скоропадский, безусловно, переживает лучшие времена. С самого начала своего изгнания опальный старый гетман взялся за написание личных мемуаров, чтобы рассказать о своей жизни на посту главы украинского государства в течение двух десятилетий. Сегодня его мемуары официально опубликованы и стали бестселлером в книжных магазинах Берлина.\n\n В своем предисловии Скоропадский отмечает, что у него нет ни желания, ни умения создавать интересные мемуары, что усугубляется его преклонным возрастом. Тем не менее, его публикация дает достаточно полное представление об истории Украинского государства от начала существования Гетманата до националистического переворота в конце 1938 года. Ближе к концу мемуаров Скоропадский обсуждает сам переворот и пишет, что он \"не очень доволен тем, в каком направлении движется нация\" В эпоху роста русского реваншизма он предсказывает, что \"бредовая демагогия Лиги, ослепленной своей нелепой ненавистнической доктриной\", только расколет украинский народ, особенно этнических русских и русофонов на востоке. Он заявляет, что, хотя его правительство, возможно, и совершило ошибки, Лига лишь усугубит проблемы Украины. Наконец, он подвергает яростной критике офицеров-националистов, участвовавших в перевороте, называя их \"оппортунистами\", воспользовавшимися популярностью Лиги в деревне.\n\nСкоропадский заканчивает свои воспоминания словами о том, что, несмотря ни на что, все его действия были направлены на интересы Украины и ее народа, и что, хотя он может сильно не соглашаться с новым правительством, он надеется, что оно отбросит мелкие этнические и языковые разногласия и \"поставит украинский народ на первое место\"."
 ukraine_lun_events.49.a: "Неужели он действительно считает себя каким-то спасителем?"
 ukraine_lun_events.49.b: "Кем возомнил себя этот прусский подхалим?"

 ukraine_lun_events.50.t: "На пороге новой Украины"
 ukraine_lun_events.50.d: "Мы победили нашего экзистенциального врага, Россию - но будьте осторожны, это не вечная победа. Не застрахованы мы и от Германии, которая по-прежнему грозно нависает над Восточной Европой. Мы - великая нация, но в одиночку мы недостаточно сильны - для реализации нашей судьбы необходимо создать блок государств-единомышленников.\n\nВеликие империи древности всегда строились вокруг морей, то же самое верно и для нас, поскольку Черное море - наша естественная империя. Если представить себе союз, простирающийся от Украины по всему Черному морю, то можно понять возможности такого объединения: около ста миллионов человек, большие плодородные земли и естественные пути сообщения.\n\nЭта так называемая \"Черноморская доктрина\" была разработана Юрием Лыпой как широкая цель нашей внешней политики на будущее."
 ukraine_lun_events.50.a: "Вперед в будущее!" #111

 ukraine_lun_events.51.t: "Украина приглашает нас в Черноморский союз"
 ukraine_lun_events.51.d: "Министерство иностранных дел Украины обратилось к нам с предложением о создании союза независимых государств, получившего название \"Черноморский союз.\" Целью союза является создание альтернативного силового блока, не зависящего от таких великих держав, как Германия и Россия. Помимо соглашения о взаимной обороне, союз будет включать в себя ряд экономических договоров, направленных на создание самодостаточной экономической зоны в Черноморском регионе. Однако соглашение может повредить нашим отношениям с другими державами, которые относятся к этому проекту с подозрением - в первую очередь с Германией"
 ukraine_lun_events.51.a: "Принять"
 ukraine_lun_events.51.b: "Упадок"

 ukraine_lun_events.52.t: "[FROM.GetName] вступает в БГУ"
 ukraine_lun_events.52.d: "[FROM.GetName] очнулся от всех попыток извне эксплуатировать и унизить его и мудро вступил в черноморское сообщество. Это великий день - видеть, что другие начинают прозревать и просыпаться. Вместе мы будем противостоять всем попыткам поработить народы Причерноморья"
 ukraine_lun_events.52.a: "Мы все вместе, лучше, чем когда-либо"

 ukraine_lun_events.53.t: "[FROM.GetName] отклоняет наше предложение"
 ukraine_lun_events.53.d: "[FROM.GetName] остается слепым к натиску извне на все причерноморские страны и попыткам превратить причерноморские земли в колонию. Хотя их отказ был вежливым, очевидно, что они просто противостоят нам политически, боясь за свое положение. Их освобождение рано или поздно наступит, даже если для этого потребуется сила"
 ukraine_lun_events.53.a: "Временная неудача"

 ukraine_lun_events.54.t: "Перемирие с Украиной?"
 ukraine_lun_events.54.d: "Новое националистическое правительство Украины объявило об одностороннем прекращении огня с нашими войсками, заявив, что война на западе далека, а германо-империалистический проект, который уже ничего не значит для украинского народа, не имеет никакого значения. Они предлагают прекратить боевые действия между ними и нашим альянсом. Конечно, это выглядит в основном формально, поскольку мы сейчас вряд ли способны нанести удар по Украине, да и они нам не угрожают"
 ukraine_lun_events.54.a: "Подпишите перемирие"
 ukraine_lun_events.54.b: "No compromises with Reaction!"

 ukraine_lun_events.55.t: "Украина идет своим путем"
 ukraine_lun_events.55.d: "Националистический режим Украины официально аннулировал свои военные договоры с нами. Их посол сообщил нам, что Украинская Народная Республика не связана договорами, подписанными гетманским правительством, и что избранные украинским народом представители решили аннулировать эти несправедливые договоры, направленные на ограничение суверенитета Украины. Однако они согласились сохранить ряд важнейших экономических договоров, хотя и не имеют права национализировать неукраинский капитал на территории страны. В своей декларации они обозначили расплывчатую цель - создание блока националистических режимов-единомышленников вокруг Черного моря, свободного от влияния таких великих держав, как Германия и Россия. Однако они не представляют военной угрозы для нашей гегемонии, по крайней мере, пока"
 ukraine_lun_events.55.a: "Пока они знают свое место"
 ukraine_lun_events.55.b: "Изолировать их с помощью санкций" #111 Сделать это удаление из Mitteleuropa?
 ukraine_lun_events.55.c: "Это предательство"

 ukraine_lun_events.56.t: "Наш союзник дезертирует!"
 ukraine_lun_events.56.d: "[FROM.GetName] совершили неожиданный поворот в своей дипломатии, [FROM.GetAdjective]ая подпись о присоединении к возглавляемому Украиной, Черноморскому союзу. Они заверили, что намерены продолжать дружеские отношения с нами, но при этом заявили, что их новая ориентация направлена на создание блока независимых, националистических государств, свободных от иностранного влияния. Хотя это, безусловно, похоже на действия поворачивающегося плаща, это не является конкретным нарушением каких-либо наших договоров. Однако некоторые отмечают ультранационализм и милитаризм украинского режима как потенциальную угрозу в случае дальнейшего усиления его гегемонии"
 ukraine_lun_events.56.a: "Это их право"
 ukraine_lun_events.56.b: "С этой украинской империей надо покончить"

 ukraine_lun_events.60.t: "Черноморская доктрина"
 ukraine_lun_events.60.d: "Идея создания единого черноморского сообщества впервые была высказана Юрием Липой в работе \"Судьба Украины\" - серии геополитических эссе, опубликованной в 1938 году. В этой работе доктор Липа утверждал, что при определении своей национальной безопасности причерноморские государства должны использовать новую геополитическую перспективу: они должны быть переопределены как ключевые территории между Севером и Югом, а не Востоком и Западом, и использовать свое уникальное положение для роста могущества и обеспечения своей безопасности. Ось Восток-Запад была наиболее опасной, поскольку она превратила бы черноморские государства в колониальные аннексии более развитых стран.\n\n\"Доктрина Черного моря\" развивает его предыдущую работу, определяя черноморские народы как обладающие общим морским характером и потенциалом самодостаточности. Черное море - это сердце крепости, восточные стены которой образуют кавказские государства, а западные - Карпаты и Балканы. Дунай, Каспий и Босфор - ворота этой могучей крепости.\n\n Мировые державы отказывают причерноморским государствам в праве на независимость, которая возможна только в силу их политической дезорганизации и экономической отсталости. К счастью, доктор Липа разработал политическую стратегию восстановления суверенитета и обретения реальной власти: создание Черноморского Союза позволит устранить московский и германский империализм и объединить несколько государств на Черном море в одно большое экономически связанное государство. Хотя в настоящее время мы не можем осуществить судьбу Украины, но когда представится возможность, мы не будем колебаться"
 ukraine_lun_events.60.a: "Судьбу можно только отсрочить, но никогда не отвергнуть"

 ukraine_lun_events.100.t: "Националистический переворот на Украине"
 ukraine_lun_events.100.d: "Несмотря на неудачу, антигетманское восстание двухлетней давности развеяло представления о том, что гетманское правительство является единственным гарантом стабильности в Украине. Нигде это не проявилось так ярко, как в сельской местности, где призывы к земельной реформе в основном игнорировались, что привело к массовым протестам.\n\nРазочаровавшись в способности администрации Скоропадского обеспечить порядок, Лига украинских националистов при поддержке нескольких высокопоставленных офицеров решила взять дело в свои руки и совершила успешный переворот. Новое руководство, исповедующее корпоративистские, милитаристские и тоталитарные идеалы, провозгласило \"Украинскую национальную республику\", обещая исправить ошибки старого режима."
 ukraine_lun_events.100.a: "Почему мы вообще доверились этому проклятому притворщику..."
 ukraine_lun_events.100.b: "Все, что они сделали, - это поменяли одного реакционера на другого"
 ukraine_lun_events.100.c: "Они хотят сделать ЧТО-ТО с Царицыном?"
 ukraine_lun_events.100.e: "Везение гетмана наконец-то закончилось"

 ### Ukraine foreign policy ### (mostly republic's and LUN's negotiations with Germany)
 ukraine_foreign_policy_events.15.t: "Нормализация германско-украинских отношений"
 ukraine_foreign_policy_events.15.unr.b: "Известие о свержении правительства Павла Скоропадского было воспринято в Берлине с тревогой и недоверием. По мере стабилизации ситуации стало понятно что захвата власти синдикалистами удалось избежать. Всеукраинское демократическое движение осталось верно своим заверениям и начало работу по созданию крестьянской республики подобной той, какой является Беларусь. \n\nПервым делом правительство обратилось к нам чтобы заверить нас что они все еще желают сотрудничества, особенно в военных делах, хотя и с надеждой на расширение автономии в экономическом плане в соответствии со своей социал-демократической экономической программой, которая включает в себя ограничение власти землевладельцев, и что наиболее важно для нас, промышленников. Возможно неудовлетворенная Украина по своей глупости захочет сохранить нейтралитет или же войти в австрийскую сферу влияния, хотя следует помнить что большие уступки с нашей стороны будут крайне непопулярны как внутри нашей страны, так и в других частях Миттельевропы."
 ukraine_foreign_policy_events.15.lun.d: "Известие о свержении правительства Павла Скоропадского было с тревогой воспринято в Берлине. Военный переворот сместил правительство гетмана и привел к созданию республики, управляемой Лигой Украинских Националистов. Несмотря на их ультранационализм и часть анти-немецкой риторики, похоже что режим возглавляемый ЛУН осознает что сотрудничество с нами является лучшей гарантией их безопасности, хоть они и стремятся к большей автономии в плане политики и экономики, включая национализацию и контроль иностранных предприятий, работающих в Украине. Возможно неудовлетворенная Украина по своей глупости захочет сохранить нейтралитет или же войти в австрийскую сферу влияния, хотя следует помнить что большие уступки с нашей стороны будут крайне непопулярны как внутри нашей страны, так и в других частях Миттельевропы."
 ukraine_foreign_policy_events.15.a: "Давайте начнем по-хорошему."
 ukraine_foreign_policy_events.15.b: "Нам нужны твердые гарантии, все же они радикалы."

 ukraine_foreign_policy_events.16.t: "Немецкие требования: статус-кво в экономике"
 ukraine_foreign_policy_events.16.d: "Начало переговоров оказалось на удивление конструктивным. Берлин требует чтобы мы остались частью экономического союза Миттельевропы со всеми договорами заключенными до этого, что было одним из наилучших результатов переговоров, проведенных правительством Скоропадского. Однако следует отметить что Берлин также требует предоставления немецким предприятиям тех же прав, что имеют сейчас украинские предприятия и гарантий что немецкие предприятия не будут национализированы, подвергуты нападениям и т.д. Тем не менее такие результаты переговоров намного лучше, чем некоторые опасались."
 ukraine_foreign_policy_events.16.a: "Попробовать договориться о более выгодной сделке."
 ukraine_foreign_policy_events.16.b: "Это лучше, чем мы ожидали."

 ukraine_foreign_policy_events.17.t: "Немецкие требования: строгие гарантии"
 ukraine_foreign_policy_events.17.d: "Как правительство пришедшее к власти в результате революции, мы не можем вернуться к тому же уровню доверия который существовал между нашими правительствами, объяснила немецкая делегация. Поэтому Берлин требует строгих гарантий. Нам не только придется вернуться в экономический союз Миттельевропы, но и охранять немецкую собственность и капитал в Украине и предоставить преференции в торговле Германской империи. Вдобавок к этому, немцы требуют контроль над основными железнодорожными магистралями страны, дабы обеспечить \"национальную безопасность\" Украины. Несмотря на то что официально это объясняется необходимостью быстрой переброски войск против России, по факту это делается для оказания давления на украинский \"радикальный\" режим."
 ukraine_foreign_policy_events.17.a: "Это ужасные условия, отправьте наших лучших дипломатов в Берлин"
 ukraine_foreign_policy_events.17.b: "Лучше подписать это..."

 ukraine_foreign_policy_events.18.t: "Украинское контр-предложение"
 ukraine_foreign_policy_events.18.d: "Не удовлетворившись нашими требованиями, украинская делегация приехала поторговаться. Они хотели бы изменить наиболее проблемные пункты нашего соглашения, например разрешить национализацию немецких активов, но с выплатой полной компенсации за них. Они также хотели бы избежать слишком явного немецкого присутствия в стране и за дополнительные послабления предложить нам более выгодные условия экспорта. Очевидно это более важно для них поскольку они не хотят прослыть людьми \"продавшими страну немцам\", в чем они обвиняли правительство гетмана."
 ukraine_foreign_policy_events.18.a: "Звучит разумно"
 ukraine_foreign_policy_events.18.b: "Они не в том положении чтобы торговаться."
 ukraine_foreign_policy_events.18.b.tt: "В ответ на нашу жесткую позицию Украина может добиться от £KR_game_rule_flag_AUS §YАвстрийской Империи§ лучшей сделки, но если они согласятся, то §Gвыгоды будут огромными§!."

 ukraine_foreign_policy_events.19.t: "Немцы принимают наше предложение"
 ukraine_foreign_policy_events.19.d: "Our delegation managed to convince Germany to lower their unreasonable demands. It is an achievement that we can sell to our domestic supporters as victory over German hegemony, or at least progress towards our eventual liberation - something that the Hetmanate never managed to achieve. As a major part of the renegotiation, the Germans dropped their demand of controlling the railway and manning them with their own soldiers, and were satisfied with the establishment of a joint committee to manage and organise the infrastructure system."
 ukraine_foreign_policy_events.19.a: "Хорошо что они одумались."
 ukraine_foreign_policy_events.19.b: "Этого недостаточно, возможно у нас есть союзники в Вене..."

 ukraine_foreign_policy_events.20.t: "Германия проигнорировала наше контр-предложение!"
 ukraine_foreign_policy_events.20.d: "Наша делегация не смогла добиться каких-либо существенных изменений. Немцы пошли на некоторые символические уступки, но это были лишь хлебные крохи, дабы показать что немцы были благоразумны, а не просто заставили нас подписать их ультиматум. Если мы подпишем его, мы будем не очень хорошо выглядеть в глазах наших сторонников, в таком случае единственным способом изменить нашу ситуацию в лучшую сторону является поддержка со стороны другой крупной державы."
 ukraine_foreign_policy_events.20.a: "Посмотрим, есть ли у нас союзники в Вене..."
 ukraine_foreign_policy_events.20.b: "По крайней мере мы попытались."

 ukraine_foreign_policy_events.21.t: "Украинские железные дороги возвращаются под контроль немцев"
 ukraine_foreign_policy_events.21.d: "В соответствии с соглашением с новым украинским правительством, главные транспортные артерии страны были проданы немецкой государственной компании и переданы в ее управление. На практике это означает прочный немецкий контроль над Украиной, с возможностью свободно перемещать немецких военнослужаших по стране. Германия будет будет получать прибыль от этой системы. Это национальное унижение для [UKR.GetNameDef], но Берлин может спать спокойно, закрепив свою власть на востоке."
 ukraine_foreign_policy_events.21.a: "Отлично."
 ukraine_foreign_policy_events.21.b: "Необходимая жертва."

 ukraine_foreign_policy_events.22.t: "Украина хочет союза"
 ukraine_foreign_policy_events.22.d: "Во время секретных переговоров с украинским послом в Вене, вопрос официального альянса между [202.GetName] и Веной был поднят впервые. Германско-украинские переговоры, похоже, зашли в тупик, поскольку украинцы не хотят выполнять неразумные требования немцев. Дабы выйти из затруднительного положения, нам был предложен союз между империей Габсбургов и Украиной, что позволит им уменьшить зависимость от немцев в плане защиты и даст им больше возможностей для ведения переговоров. Этот шаг несомненно сильно разозлит немцев, но с другой стороны, они украли у нас возможность альянса с Украиной еще в 1917 году. В этот раз мы не должны подвести украинцев."
 ukraine_foreign_policy_events.22.a: "Им всегда рады."
 ukraine_foreign_policy_events.22.b: "Они просто хотят втянуть нас в еще одну бессмысленную войну."

 ukraine_foreign_policy_events.23.t: "Австро-германо-украинский договор"
 ukraine_foreign_policy_events.23.d: "После того как стало очевидным что германо-украинский договор был невозможен, три страны начали новый раунд переговоров. Компромисс заключался в уравновешивании австрийцами сторон в своих интересах. Был предложен военный союз Украины с Австрией, сохранение членства Украины в экономическом союзе Миттельевропы. Однако, экономическая часть договора более комплексная чем кажется, в ней указано все: от прав иностранных граждан на ведение бизнеса наравне с местными до положений защищающих иностранные предприятия от национализации, нападений и т.д. Условия предложенные австрийцами гораздо мягче тех, что предложили немцы."
 ukraine_foreign_policy_events.23.a: "Надеюсь это вернет стабильность в регион."
 ukraine_foreign_policy_events.23.b: "Неважно."
 ukraine_foreign_policy_events.23.c: "Отлично!"

 ukraine_foreign_policy_events.25.t: "Германо-украинское соглашение"
 ukraine_foreign_policy_events.25.d: "После напряженных переговоров страны пришли к шаткому соглашению. Украинская Народная Республика продолжит находиться в военном союзе с Германией и размещать немецкие войска на своей территории. Однако, экономическая часть договора более комплексная чем кажется, в ней указано все: от прав иностранных граждан на ведение бизнеса наравне с местными до положений защищающих иностранные предприятия от национализации, нападений и т.д. Все это сохраняет веру немецких промышленников что в Украину можно инвестировать, однако соглашение, несомненно, станет занозой в боку республики."
 ukraine_foreign_policy_events.25.a: "Надеюсь это вернет нас к нормальной жизни."

 ukraine_foreign_policy_events.26.t: "Судьба Скоропадского"
 ukraine_foreign_policy_events.26.d: "Ситуация изменилась. Бывший гетман и его соратники сбежали в Берлин до того как до них добралось правосудие и теперь они организуют \"Украинское национальное правительство\" в изгнании. Они попросили кайзера поддержать их, однако, пока безрезультатно. Трудно представить что Скоропадский может представлять какую-либо опасность для нас, однако он виновен в бесчисленных преступлениях против украинского народа и обязан предстать перед судом. Мы можем подать Германии запрос на его экстрадицию в Украину, но это может поставить немцев в неудобное положение."
 ukraine_foreign_policy_events.26.a: "Запросите его экстрадицию."
 ukraine_foreign_policy_events.26.b: "Его судьба более не волнует нас."

 ukraine_foreign_policy_events.27.t: "Запрос на экстрадицию Павла Скоропадского"
 ukraine_foreign_policy_events.27.d: "Павел Скоропадский, бывший украинский гетман, пытался найти убежище в Берлине вместе с оставшимися членами его правительства. Новое республиканское правительство заседает в [202.GetName] и Скоропадский предлагал нам начать военное вторжение с целью восстановления \"законного правительства\" в Украине. Об этом не может быть и речи, республиканское правительство готово к переговорам, а вмешательство на данном этапе означало бы открытую войну с Украиной, которуй будут очень рады русские. \n\nМы собирались полностью игнорировать Скоропадского, однако украинское правительство подало нам запрос на его экстрадицию в Украину чтобы он ответил за совершенные преступления. С одной стороны, он бесполезен для нас и его выдача может быть использована как знак доброй воли по отношению к Украине. С другой стороны, у Скоропадского есть союзники в Германии и было бы очень неловко если бы человек которому мы оказывали всяческую поддержку в течение 20 лет предстал перед судом как военный преступник."
 ukraine_foreign_policy_events.27.a: "Отправьте его в Украину."
 ukraine_foreign_policy_events.27.b: "Отклоните запрос об экстрадиции."

 ukraine_foreign_policy_events.28.t: "Германия приняла запрос об экстрадиции"
 ukraine_foreign_policy_events.28.d: "Немецкое правительство приняло нашу сторону и арестовало Скоропадского, ему были предъявлены обвинения в преступлениях особой тяжести. Он будет отправлен в Украину в ближайшее время чтобы предстать перед судом и ответить перед украинцами за свои деяния."
 ukraine_foreign_policy_events.28.a: "Готовьте обвинения."

 ukraine_foreign_policy_events.29.t: "Скоропадский останется в Германии"
 ukraine_foreign_policy_events.29.d: "Берлин вежливо сообщил нам что Павлу Скоропадскому было предоставлено убежище в Германии и пока он не совершил какое-либо преступление на немецкой земле, он не будет депортирован. Немецкий посол намекнул нам в частной беседе что дальнейшие попытки поднятия этого вопроса очень не понравятся Берлину и посоветовал нам забыть о нём."
 ukraine_foreign_policy_events.29.a: "Тиран сбежал."

 ukraine_foreign_policy_events.30.t: "Суд над гетманом"
 ukraine_foreign_policy_events.30.d: "Список обвинений огромен-заказные убийства, пытки, посадки крестьян и рабочих Украины с 1919 года, 20 лет репрессивных мер и приказы о массовых расстрелах во время Украинской революции 1936 года. Список хорошо подготовленных обвинений был политически мотивированным, но подлинным, на руках гетмана была кровь. В свою защиту Скоропадский утверждал что все что он делал было направлено на защиту государственного строя в Украине и её демократии. В неожиданно эмоциональной речи он заверил нас что он думал только о благе всех украинцев и что обвинения, некоторые из которых он признает правдивыми, всего лишь фикция, поскольку в момент совершения действий из-за которых были предъявлены обвинения они не были незаконными и были объявлены таковыми постфактум.\n\nВ конце концов, он все равно виновен, вопрос только в его наказании."
 ukraine_foreign_policy_events.30.a: "Он предатель и должен гнить в тюрьме."
 ukraine_foreign_policy_events.30.b: "Проявите снисхождение к тому кто никогда не проявлял его к нам."

 ukraine_foreign_policy_events.32.t: "Революция в Украине!"
 ukraine_foreign_policy_events.32.d: "Волнения в Украине неконец-то закончились и Украинская партия Синдикалистов-Революционеров-Боротьбистов захватила власть в стране. Легитимному правительству Украины удалось сбежать и в данный момент они просят помощи у немцев в борьбе с социалистической угрозой. Президент новой социалистической республики Шумский назвал их классовыми предателями и коллаборационистами и объявил о полном суверенитете Украины. Для защиты революции от любых внешних угроз была начата стремительная мобилизация. При таком повороте событий опора германской гегемонии на востоке была разрушена. Вдобавок к этому, новое правительство вступило в союз с русскими."
 ukraine_foreign_policy_events.32.a: "Это катастрофа. Готовьте войска!"
 ukraine_foreign_policy_events.32.b: "Мы не должны торопиться."

 ukraine_foreign_policy_events.34.t: "Германия предлагает альянс"
 ukraine_foreign_policy_events.34.d: "Теперь когда мы не состоим в каком-либо союзе Германия вновь обратила на нас свой взор. Хотя и в более вежливом тоне, чем в прошлый раз, они снова предложили нам военный союз. В связи с нестабильностью в Дунайском регионе, это по крайней мере защитит нас от возможных враждебных действий от австрийского ультранационалистического режима. Хотя союз и напоминает некоторым о порабощении Украины Германией во времена гетманского правления, у нас нет других вариантов, если мы хотим получить защиту от будущей российской агрессии. Следовательно нам следует согласиться."
 ukraine_foreign_policy_events.34.a: "Давайте заключим с ними союз, на этот раз по собственной воле."

 ukraine_foreign_policy_events.35.t: "Протесты в Украине"
 ukraine_foreign_policy_events.35.d: "Точно так же, как продолжают обостряться наши собственные внутренние проблемы, обостряются и проблемы нашего самого важного союзника на востоке. Гетман Павел Скоропадский, которого мы поддержали в начале 1918 года как нашего ключевого союзника в Украине, сталкивается со все более жесткой критикой со стороны республиканской оппозиции в изгнании, которая требует политических и экономических реформ. Вызывает тревогу тот факт, что ситуация, похоже, выходит из-под контроля гетмана.\n\nЭто правда, что мы мало что можем сделать для нашего украинского союзника, но некоторые говорят, что это вопрос национальной безопасности. Если мы не сможем оказать какую-либо помощь, правление гетмана может продлиться недолго."
 ukraine_foreign_policy_events.35.a: "Убедитесь, что он получит все, что ему нужно."
 ukraine_foreign_policy_events.35.b: "Я уверен, что он прекрасно справится с ситуацией."
 ukraine_foreign_policy_events.35.tt: "Поддержка Гетманщины на данный момент может быть дорогостоящим мероприятием, но, гарантируя, что Скоропадский останется у власти, мы сможем §Gизвлечь выгоду§! в долгосрочной перспективе."

 ukraine_foreign_policy_events.36.t: "Восстание на Украине подавлено"
 ukraine_foreign_policy_events.36.d: "Хорошие новости из [202.GetName]а достигли нас. Посол Украины в Германии проинформировал нашего посла Йоханнеса фон Вельцека о том, что критическая ситуация в Украине миновала. Несмотря на первоначальные неудачи, контрнаступление вытеснило украинских повстанцев-социалистов из страны и вынудило их бежать, гарантируя, что правление Скоропадского в Украине, по сути, неоспоримо.\n\nХотя Гетман никогда не называл себя прогермански настроенным, предпочитая, чтобы его называли проукраинским, нет никаких сомнений в том, что его победа пойдет на пользу немецко-украинскому сотрудничеству. Надеемся, что мы сможем пожинать плоды этого сотрудничества, а также быть уверенными в том, что наши планы по обороне Оствалла будут продолжаться в прежнем режиме."
 ukraine_foreign_policy_events.36.a: "Отрадно слышать."

 ukraine_foreign_policy_events.37.t: "Резкий рост украинского экспорта"
 ukraine_foreign_policy_events.37.d: "Война в Америке резко сократила объемы экспорта пшеницы на мировые рынки, и наш верный союзник Украина оказалась в числе тех, кто извлек большую выгоду из трагедии, происходящей в Соединенных Штатах. Кроме того, мир вокруг нас восстанавливается после ужасного экономического спада. Несмотря на нависшую угрозу войны и все еще незаживающие раны от восстания, украинский экспорт очень хорошо восстановился.\n\nГотовность администрации Скоропадского экспортировать зерно в Германию, безусловно, имеет свои преимущества. Однако в какой-то степени украинское господство на зерновом рынке имеет своих противников среди людей, настроенных более протекционистски."
 ukraine_foreign_policy_events.37.a: "Никогда больше брюквенной зимы!"
 ukraine_foreign_policy_events.37.b: "Это не может происходить за счет немецких фермеров."

 ukraine_foreign_policy_events.38.t: "BASF заявляет о рекордной прибыли"
 ukraine_foreign_policy_events.38.d: "The Badische Anilin- und Sodafabrik, или BASF, в последнее время объявила о рекордных доходах. Как крупнейшая нефтяная компания, работающая в Германии и Восточной Европе в целом, это неудивительно, поскольку одновременно с продолжающейся программой индустриализации Украины она помогла украинской нефтяной промышленности подняться на новый уровень. Мы сами смогли извлечь некоторые выгоды, особенно благодаря выгодным сделкам администрации Скоропадского с немецкими бизнесменами."
 ukraine_foreign_policy_events.38.a: "Фантастическая инициатива."
 ukraine_foreign_policy_events.38.b: "Мы должны извлечь из этого больше пользы..."

### Focuses ###

 UKR_the_army_and_the_state: "Армия и государство"
 UKR_the_army_and_the_state_desc: "И хотя армия Украины – одна из самых больших в германской сфере влияния, она страдает от неэффективной организации, недостатка бюджета и других пережитков имперской эпохи. Война не за горами и мы должны превратить нашу армию во что-то стоящее."
 UKR_armament_program: "Программа резервного вооружения"
 UKR_armament_program_desc: "Наш резерв живой силы смело перешагивает за миллион человек, но, суровая правда в том, что у нас едва ли есть оборудование, чтобы вооружить и половину этого количества в случае мобилизации. Это нужно решить быстро"
 UKR_state_arsenals: "Инспекция арсеналов"
 UKR_state_arsenals_desc: "Украинская военная промышленность разбросана по всей стране без единого координирующего органа, который бы руководил исследованиями и производством. Назначение военного органа для надзора за ними обеспечило бы эффективность"
 UKR_state_arsenals_tt: "\nОсторожно, по мере того, как наш общий §CПоказатель индустриализации§! увеличивается, §Cвооружение§!, которое можно получить, увеличивается, одновременно уменьшая непосредственный бонус к §CПоказателю индустриализации§!.\n"
 UKR_semi-motorized_cavalry: "Моторизация кавалерийского корпуса"
 UKR_semi-motorized_cavalry_desc: "Чтобы кавалерийские войска оставались актуальными и в наше время, они должны обучиться работе на новой, более тяжелой и быстрой технике. Бронеавтомобили и легкие танки обеспечат кавалерийским полкам столь необходимую ударную мощь, не снижая при этом их скорости"
 UKR_recon_in_force: "Разведка с саблями и карабинами"
 UKR_recon_in_force_desc: "Дни кавалерийских сражений ушли в прошлое. На современном поле боя наиболее подходящей ролью кавалерии является роль разведки, поскольку они могут быстро перемещаться по любой местности, внезапно наносить удары и уходить так же быстро, как и появляются"
 UKR_ostwall: "Программа Восточного вала"
 UKR_ostwall_desc: "Первоначально задуманный Балтийским ландсвером в конце 1920-х годов, ‘Восточный вал’ представляет собой всеобъемлющую систему укреплений на передовой линии Рейхспакта. Украина слишком велика и имеет слишком много выступов на линии фронта, чтобы поддерживать единую непрерывную линию укреплений, но некоторые из наших офицеров решили модифицировать и адаптировать балтийскую идею под наши реалии, что нашло поддержку и энтузиазм даже среди кадетов"
 UKR_centralise_military_railway_service: "Централизировать военно-железнодорожную службу"
 UKR_centralise_military_railway_service_desc: "Единая логистическая структура является источником жизненной силы любой армии, защищающей такую большую страну, как Украина. Все поезда, используемые армией, будут организованы единым отделом при штабе армии вместо нынешней региональной организации"

 UKR_german_way: "Немецкий подход к войне"
 UKR_german_way_desc: "Некоторые из наших молодых офицеров обучались в немецкой парадигме ведения войны – парадигме мобильности и постоянного движения с целью дизорганизовать и разбить противника. Учитывая наши давние кавалерийские традиции и равнинную местность, мы могли бы с лёгкостью адаптировать эти идеи. Однако такой подход требует высокой дисциплины и широкой независимости непосредственных командиров, что никогда не было у нас в приоритете."
 UKR_tank_corps: "Украинский бронетанковый корпус"
 UKR_tank_corps_desc: "Имея танки немецкого производства, мы можем организовать нашу первую полноценную бронетанковую дивизию в качестве фундамента для будущего расширения. Быстрые бронетанковые силы сформируют наш кулак на равнинах Украины"
 UKR_russian_way: "Русский подход к войне"
 UKR_russian_way_desc: "Поскольку многие наши генералы побывали на службе в российской армии, то они, естественно, видят поле боя как шахматную доску. Задача генерала - создать как можно более четкий план и безукоризненно его выполнить. На практике это заключается в беспрепятственном взаимодействии между пехотой, артиллерией, кавалерией и новыми родами войск"
 UKR_breakthrough_artillery_units: "Штурмовые артиллерийские части"
 UKR_breakthrough_artillery_units_desc: "Артиллерия - королева поля боя, что побеждает в войнах. Наши артиллеристы будут лучше всех обучены в мире и оснащены самыми современными средствами дальномера и координации."

 UKR_expansion_of_kyiv_military_academy: "Расширение Киевской военной академии"
 UKR_expansion_of_kyiv_military_academy_desc: "Большая армия нуждается в большем количестве офицеров и военных инженеров, иначе это будет просто орда плохо управляемых ополченцев."

 UKR_army_reorganisation_add_tt: "Добавляет §Y$UKR_army_reorganisation$§!, что даст:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: [?-0.05|%=+] на §Y200§! дней."
 UKR_army_reorganisation_start_tt: "На §Y200§! дней:\nИзменяет §Y$UKR_army_reorganisation$§! на"
 UKR_army_reorganisation_end_tt: "\nКогда реорганизация завершится своим чередом:"
 UKR_has_completed_army_reforms: "Реорганизация армии завершена."

 UKR_air_fleet_inspectorate: "Инспекция воздушного флота"
 UKR_air_fleet_inspectorate_desc: "Назначение специального инспектора ВВС гарантирует, что он будет знать о слабых сторонах нашего воздушного флота и сможет принять меры для решения этих проблем, а не оставлять эти вопросы на усмотрение отдельных подразделений"
 UKR_aviation_workshops: "Авиамастерские"
 UKR_aviation_workshops_desc: "У нас есть промышленный потенциал, чтобы стать крупным производителем самолетов, но прогресс в этом деле отстает по множеству причин. Государство должно стремиться оказывать финансовую поддержку одаренным инженерам-авиаконструкторам и их компаниям, чтобы создать базу для собственного авиастроения."
 UKR_aviation_school: "Авиашколы"
 UKR_aviation_school_desc: "Украинские ВВС никогда не были особенно большими или развитыми, часто они состояли только из переданных немецких истребителей. В связи с недавней реформой необходимо основать новые школы для обучения первоклассных пилотов истребителей и бомбардировщиков. Школа пилотов имени Льва Мациевича, созданная в Киеве в 1930 году, послужит образцом для новых учебных заведений"
 UKR_guarding_the_skies: "На страже небес"
 UKR_guarding_the_skies_desc: "Не стоит обращать внимание на тех, кто утверждает, что следующая война будет выиграна с помощью воздушных бомбардировок. Нет, мы должны направить наши ресурсы на охрану нашего воздушного пространства, а не на исполнение желаний футуристов."
 UKR_death_from_above: "Смерть с небес"
 UKR_death_from_above_desc: "Один отважный украинец, пилотирующий бомбардировщик, может уничтожить столько же врагов, сколько рота может сделать с помощью винтовок. Было бы безумием не оставить эти смертоносные машины без внимания и упустить наше будущее."
 UKR_air_defence: "Противовоздушные мероприятия"
 UKR_air_defence_desc: "Независимо от состояния наших военно-воздушных сил, русский натиск будет беспощаден. Нам необходимо разработать собственное ПВО и производить его в достаточно больших количествах, чтобы противостоять российскому огненному дождю."
 UKR_long-range_bombing_force: "Бомбардировочная группа дальнего действия"
 UKR_long-range_bombing_force_desc: "Наши враги многочисленны, но глубокие воздушные удары по стратегическим тылам могут нарушить концентрацию их сил и маршруты снабжения, дав нам окно для проведения контратаки"

 UKR_fleet_for_two_seas: "Украинский государственный флот"
 UKR_fleet_for_two_seas_desc: "Мы унаследовали относительно сильный военно-морской флот от бывшего российского Черноморского флота. Хотя некоторые из старых кораблей были списаны, он по-прежнему остается сильнейшим военно-морским флотом в Черном море, и его необходимо сохранить для защиты нашей протяженной береговой линии."
 UKR_marines_training: "Морская пехота"
 UKR_marines_training_desc: "Наша морская пехота продолжает традиции Императорской Черноморской дивизии, одной из лучших дивизий морской пехоты в бывшей Российской империи. Они служат нашим кулаком в Черном море, способным как к быстрому развертыванию через море, так и к стойкой обороне наших фортификаций в таких городах как [137.GetCapitalVictoryPointName]."
 UKR_mykolaiv_shipyard: "Николаевский судостроительный завод"
 UKR_mykolaiv_shipyard_desc: "В Николаеве расположены крупнейшие верфи Восточной Европы, и за последние десятилетия здесь были построены сотни кораблей. Поскольку на горизонте маячит война, нам необходимо расширять его военно-инженерные возможности."
 UKR_refineries: "Отечественные крекинг-заводы"
 UKR_refineries_desc: "В процессе крекинга углеводородов метан из природного газа перерабатывается в нефтепродукты, такие как бензин и керосин. На юге Украины много природного газа, который легче всего перерабатывается в прибрежных городах, а затем экспортируется по морю."
 UKR_subs: "Разработка подводных лодок"
 UKR_subs_desc: "Сотрудничая со специалистами Кайзерлихмарине, мы можем создать отечественные подводные силы для дальнейшего усиления нашей обороны на море"
 UKR_light_ships_designs: "Проекты легких кораблей"
 UKR_light_ships_designs_desc: "Эсминцы и крейсера составляют основу нашего флота, они необходимы как для патрулирования береговой линии, так и для защиты нашего судоходства"
 UKR_odesa_port: "Порт Одессы"
 UKR_odesa_port_desc: "Одесса — второй по важности город в Украине и крупнейший по общему объему торговли и судоходства. Через наш главный внешнеторговый порт через отгружаются миллионы тонн пшеницы, овощей и семян подсолнечника"
 UKR_black_sea_mastery: "Покорение Черного моря"
 UKR_black_sea_mastery_desc: "Наш флот является неоспоримым хозяином Черного моря, и наши корабельные орудия могут быть использованы для бомбардировки любой цели на его побережье. Следующим шагом для демонстрации нашей мощи является заключение соглашения с владельцем региона [773.GetName], чтобы наши корабли могли пройти через Дарданеллы"
 UKR_fortress_crimea: "Крепость [137.GetName]"
 UKR_fortress_crimea_desc: "[137.GetName] по сути является островом. На востоке находится его узкий Керченский пролив, а на севере он соединен с материком через Перекопский перешеек шириной в несколько километров непроходимой болотистой местности. При должном укреплении полуостров может выжить несмотря ни на что, даже будучи отделенным от остальной части страны"
 UKR_crimean_forts_tt: "Добавлены форты на Перекопском перешейке, Керченском полуострове и в городе [137.GetName.GetCapitalVictoryPointName]."
 UKR_merchant_marine: "Расширение торгового флота"
 UKR_merchant_marine_desc: "Хотя у нас хорошее железнодорожное сообщение с Германией, основная часть нашей торговли идет по морю."

 UKR_reform_committee: "Комитет по реформированию армии"
 UKR_reform_committee_desc: "Старая армия гетмана была коррумпирована и неэффективна. Вместо военного диктатора главнокомандующим будет назначаемый правительством Верховный атаман и его региональные представители. Таким образом, руководство армией будет находиться в руках профессиональных военных, но под гражданским надзором, как и должно быть в любом современном государстве"
 UKR_kharkiv_design_bureau: "Харьковское конструкторское бюро"
 UKR_kharkiv_design_bureau_desc: "Основным центром разработки бронетехники в нашей стране является Харьковское конструкторское бюро, в котором работают наши самые талантливые инженеры. До сих пор они действовали в тесном сотрудничестве с немецкими и польскими консультантами над созданием идеальной бронетехники для украинских условий. Мы должны выделить им бюджет для того, чтобы мы были должным образом вооружены, когда начнется война"
 UKR_call_of_fatherland: "Зов Отечества"
 UKR_call_of_fatherland_desc: "Призыв нужно ужесточить. Это не бремя и не обязанность, а право каждого украинца до последнего защищать свою дорогую Родину."
 UKR_curtail_army_factionalism: "Покончить с фракционализмом в армии"
 UKR_curtail_army_factionalism_desc: "Между бывшими армейскими генералами и более молодыми, более националистически настроенными людьми долгое время существовала неприязнь. Иногда эта немая вражда негативно сказывалась даже на армейских продвижениях. Весь этот фракционализм должен быть обрублен на корню. Решение о повышении должно приниматься нейтральным комитета, назначенного нашим лидером, и любое кумовство должно быть подавлено"
 UKR_mobile_infantry: "Доктрина быстрой пехоты"
 UKR_mobile_infantry_desc: "Эта доктрина, широко адаптированная в 1920-х годах, является доктриной маневра, поскольку немецкие инструкторы привнесли в нашу подготовку свои проверенные способы ведения войны. Недостаток тяжелой техники мы компенсируем большим количеством конных и моторизованных частей, которые могут быстро двигаться и использовать свое локальное численное превосходство для разрушения опорных пунктов противника"
 UKR_war_for_survival: "Война за выживание"
 UKR_war_for_survival_desc: "Война - это слишком серьезная вещь, чтобы оставлять ее солдатам. Нет, грядущая война будет народной войной. Либо украинский факел будет погашен русской лавиной (возможно, навсегда), либо Украина восторжествует и закрепит за собой место среди великих народов мира. Чтобы избежать участи столь многих павших до нас, все наше общество должно быть готово к войне"
 UKR_fire_from_sky: "Местные бомбардировщики"
 UKR_fire_from_sky_desc: "Из-за больших расстояний Украины авиация меняет правила игры. Впервые в истории мы можем быстро отправить поддержку куда угодно, от Мариуполя до [241.GetName]"
 UKR_national_mobilisation: "Национальная мобилизация"
 UKR_national_mobilisation_desc: "Армия — это лишь часть нашей обороны. Промышленности должна быть поставлена задача выполнять свой патриотический долг, а церковь должна воспитывать в народе надлежащий милитаристский дух. Все, от мала до велика, должны понимать, о чем идет речь. "
 UKR_total_dedication: "Полное посвящение"
 UKR_total_dedication_desc: "Над всей этой тотальной мобилизацией государства стоит наш лидер, олицетворение нашего дорогого Отечества. В военное время не может быть никакой политической грызни, только полная преданность вождю и делу."
 UKR_deed_and_sacrifice: "Доблесть и самоотверженность"
 UKR_deed_and_sacrifice_desc: "Много крови будет пролито, чтобы сохранить нашу землю свободной, но это того стоит. Когда из чернозема, удобренного кровью наших патриотов, вырастут подсолнухи, мы наконец-то сможем отдохнуть."
 UKR_hetman_army: "Рыцари гетмана"
 UKR_hetman_army_desc: "Любой человек может стать солдатом с винтовкой и двумя месяцами обучения. Чтобы обучить настоящих ‘рыцарей’, требуется больше. Бойцы должны стать настолько замотивированными и опытными, что они будут вызывать у простых солдат трепет и восхищение. Имея более строгие стандарты обучения, украинская армия скоро станет объектов зависти всего мира"
 UKR_integration_of_cossacks: "Объединение казачьих советов"
 UKR_integration_of_cossacks_desc: "Современная казачья организация была основана для пропаганды воинских доблестей, но их связь с профессиональными военными была напряженной. В идеале они должны стать частью резерва, обучены и экипированы, чтобы их можно было легко интегрировать в профессиональные подразделения во время войны"
 UKR_interservice_cooperation: "Межродовое сотрудничество"
 UKR_interservice_cooperation_desc: "В нашей армии нет пехотинца, артиллериста, или матроса. Все они - рыцари Украины. Соперничество между родами должно прекратиться, и нужно создать общий дух, чтобы воспитывать менталитет сотрудничества между разными родами войск."
 UKR_primacy_of_maneuver: "Верховенство маневра"
 UKR_primacy_of_maneuver_desc: "Война на истощение против России - бесполезное занятие. На бескрайних равнинах Украины и России маневр - ключ к победе. Тот, кто сможет нанести удар первым и двигаться быстрее, получит преимущество. И если он будет достаточно настойчив, то сможет его сохранить"
 UKR_valour_and_victory: "Доблесть и победа"
 UKR_valour_and_victory_desc: "Хотя физические навыки солдата имеют значение, то, что действительно создает победу - это его моральные качества. Доблесть была секретом, как греки могли победить великие персидские армии: доблесть - это то, как мы победили Наполеона, и ее отсутствие было причиной падения русских армий два десятилетия назад. Солдат силен настолько, насколько сильны его убеждения"

 UKR_general_staff_reorganisation: "Реорганизация Генерального штаба"
 UKR_general_staff_reorganisation_desc: "Старая система доказала свою несостоятельность во время восстания 1936-го года. Система назначенных гетманами региональных атаманов была слишком громоздкой, и зачастую атаманы либо долго ждали приказаний, либо полностью выходили за рамки отданных приказов. Этот военный авантюризм должен прекратиться, а система должна быть формализована должным образом"
 UKR_refund_kharkiv_design_bureau: "Переоснащение Харьковского конструкторского бюро"
 UKR_refund_kharkiv_design_bureau_desc: "Гетманат находилась в процессе разработки грандиозного бюджета на бронетанковую войну, главным образом через Харьковское конструкторское бюро, главный центр разработки бронетехники в стране. Хотя поначалу мы не могли позволить себе такие усилия, учитывая небывало высокие военные расходы, пришло время реинвестировать средства в этот все более важный компонент современной войны."
 UKR_partisan_training: "Партизанская подготовка"
 UKR_partisan_training_desc: "Хотя в идеале никакая часть нашей страны не будет оккупирована, это просто хорошая подготовка к обучению наших войск асимметричной обороне. Наша военная организация и связь должны оставаться в рабочем состоянии на оккупированных территориях, и наши лидеры должны понимать, как вести эффективную партизанскую войну в поддержку нашей армии"
 UKR_ncos: "Новое поколение унтер-офицеров"
 UKR_ncos_desc: "Несмотря на попытки внедрить децентрализованное командование в нашу армию, она страдает от пассивности и отсутствия инноваций под командованием гетмана, вдохновленным русскими. Новое поколение унтер-офицеров, кто будет вести солдат своим примером, а не авторитетом, необходимо обучать динамичному искусству войны, где им можно доверять самостоятельные решения"
 UKR_knowing_the_land: "Познание земли"
 UKR_knowing_the_land_desc: "Одним из немногих преимуществ, которые мы имеем перед великой российской военной машиной, является то, что большая часть боевых действий будет происходить на Украине. Наши люди знают эти поля, эти реки и леса. Сама почва поддержит нас"
 UKR_unquestionable_loyalty: "Верность Украине"
 UKR_unquestionable_loyalty_desc: "Лояльность Скоропадскому и его режиму никогда не была достаточно велика, чтобы объединить народ, и сомнительно, что кто-то из людей может быть настолько вдохновляющим. Вместо этого украинский солдат борется за идеалы Украины, за все, что им любо и дорого."
 UKR_citizen_defence: "Каждый - солдат"
 UKR_citizen_defence_desc: "Бесполезно отдавать предпочтение семьям из высшего сословия при продвижении по службе или запрещать женщинам и евреям проходить военную подготовку. Любой, кто хочет служить своей стране, должен иметь возможность делать это в меру своих возможностей"
 UKR_review_structure: "Пересмотреть структуру армии"
 UKR_review_structure_desc: "Армия эпохи Скоропадского была слишком жесткой, слишком иерархичной. Она не была способна ни к достаточно быстрому принятию решений, ни к импровизации. Необходимо переосмыслить всю нашу армейскую организацию, сместить акцент с высшего командного состава на дивизионный и бригадный уровень, к людям на поле боя"
 UKR_empower_local_command: "Усилить местное командование"
 UKR_empower_local_command_desc: "Молодые офицеры более лояльны, патриотичны и подходят к задаче с более новаторским подходом. Часто именно местное командование, возглавляемое умным человеком и сопровождаемое группой лично преданных людей, побеждало гораздо более сильных врагов."
 UKR_glory_and_freedom: "Слава и Воля"
 UKR_glory_and_freedom_desc: "Защита Украины — это совместная работа: нам нужно объединить наши самые светлые умы, самые смелые сердца и наши самые сильные руки"
 UKR_revolutionary_war: "Революционная война"
 UKR_revolutionary_war_desc: "Это не обычная война, которую ведут империалисты и монархи. Эта война - заключительный акт украинской революции, направленный против всего и всех, кто может противостоять окончательному требованию украинского самоопределения и свободы."
 UKR_ideological_unity: "Содействовать истинно преданным"
 UKR_ideological_unity_desc: "Чтобы обеспечить эффективность и лояльность нашей армии, нам нужно быстро найти людей с безупречными идеологическими убеждениями, людей, готовых умереть за наше правое дело, которые не были запятнаны кумовством и неэффективностью старого режима"
 UKR_centralised_command: "Централизованное управление"
 UKR_centralised_command_desc: "Старая беспорядочная иерархия должна быть рационализирована и превращена в более простую систему, в которой Ставка имеет всю власть над военными вопросами. Упорное накопление военной техники региональными командирами должно уйти в прошлое, а наша ударная мощь должна быть направлена туда, где это в настоящее время необходимо больше всего"
 UKR_hardiness_and_fervour: "Упорство и рвение"
 UKR_hardiness_and_fervour_desc: "Войны выигрывает не тот, кто прав, а тот, кто выжил. Стойкость и воля к действию победят грубую силу. Наша единственная цель - не проиграть, и для этой цели нам просто нужно не сдаваться."

 UKR_the_plan_to_save_europe: "План спасения Европы"
 UKR_the_plan_to_save_europe_desc: "Германская империя, великая защитница независимости Украины (и, откровенно говоря, зависимости), пала. Хотя противостоящие нам армии продолжают наступать и угрожать нашему сердцу, мы не сдаемся. Мы будем сражаться до последнего человека, чтобы снова сохранить независимость Украины. Пусть это будет наша последняя, величайшая битва - если нам суждено умереть, мы сделаем это со славой!"
 UKR_our_last_stand: "Наш последний бой"
 UKR_salvage_what_we_can: "Спасем, что имеем"
 UKR_salvage_what_we_can_desc: "Распад Миттельевропы не прошел гладко. Отступающие немцы оставили после себя большое количество оружия, и нам было передано его так много, чтобы мы могли продолжать борьбу. Мы должны использовать его так, как только сможем."
 UKR_something_to_defend: "Нам есть что защищать!"
 UKR_something_to_defend_desc: "Гораздо лучше умереть героем, чем капитулировать перед тиранией. Мы не откажемся от институтов, на которых была основана наша великая Народная Республика, поскольку мы боролись за них десятилетиями. Солдаты Антигетманского восстания и Второго Вельткрига войдут в историю благодаря своим усилиям, и мы позаботимся о том, чтобы их потери не были напрасными."
 UKR_utmost_scientific_cooperation: "Максимальное научное сотрудничество"
 UKR_utmost_scientific_cooperation_desc: "В Германской империи были одни из величайших ученых в мире, а их военные технологии были на высшем уровне. Мы уже поделились с ними многими разработками, но в попытках сохранить их гегемонию мы часто были предоставлены самим себе. Настало время нам, как и другим, найти достойное применение их невероятным достижениям и объединить наши знания, чтобы превосходящее вооружение армий противника не уничтожило нас."
 UKR_convene_a_european_congress: "Созыв Европейский конгресс"
 UKR_convene_a_european_congress_desc: "Миллионы людей отдали свои жизни за этот момент... но мы сделали это. Мы смогли изменить ситуацию и защитить наш народ с мужеством и отвагой. Теперь, когда мы продвинулись от Лондона к Москве, необходим новый европейский порядок: основанный не на эксплуатации, как в Миттельевропе, а на свободном сотрудничестве народов Европы."

 UKR_shadow_of_mighty_wings: "В тени могучих крыльев"
 UKR_shadow_of_mighty_wings_desc: "Германия - самая передовая военная мощь в мире. Нам повезло, что мы находимся под их защитой и руководством в военных вопросах."
 UKR_ger_pilot_training_initiative: "Немецкая инициатива по обучению пилотов"
 UKR_ger_pilot_training_initiative_desc: "В Германии есть первоклассные авиационные школы и что еще более важно, намного больше учебных самолетов, чем у нас. Более подготовленные украинские пилоты означают, что Германии нужно будет держать меньше собственных эскадрилий в Восточной Европе. Таким образом, совместная программа обучения выгодна обеим сторонам"
 UKR_ger_request_heavy_equipment: "Запросить тяжелую технику"
 UKR_ger_request_heavy_equipment_desc: "Немецкий военно-промышленный комплекс производит за день то, что наш производит за несколько недель. Более того, у нас даже нет мощностей для производства гораздо более совершенного оружия. К счастью, немецкие корпорации охотно продают нам свою продукцию."
 UKR_ger_rockets: "Опыты с реактивной артиллерией"
 UKR_ger_rockets_desc: "В рамках совместных исследований с германской армией мы приступили к разработке ракетных установок, которые подойдут для открытых равнин Украины как дешевая и легкая система вооружения с большой ударной способностью."

 UKR_protection_of_dual_monarchy: "Двойная защита дуалистической монархии"
 UKR_protection_of_dual_monarchy_desc: "Возможно, Австро-Венгрия не является передовой военной державой, но они напрямую участвуют в нашей обороне: только наши люди стоят между ними и русскими армиями. Сотрудничество между двумя нашими народами происходит естественным образом и определенно более равноправно, чем наше сотрудничество с Германией"
 UKR_aus_skoda_deals: "Контракты со Шкодой"
 UKR_aus_skoda_deals_desc: "Дунайские промышленные конгломераты стремятся производить новую технику для украинской армии. В Чехии особенно развита автомобильная промышленность, которая может значительно повысить уровень моторизации нашей пехоты и кавалерии."
 UKR_aus_ensure_supply_lines: "Защита линий снабжения"
 UKR_aus_ensure_supply_lines_desc: "У нас есть мощная железнодорожная система, построенная в Германии, которая соединяет Берлин с Киевом. Однако наше снабжение с Австрией организовано хуже, а цепь поставок идёт через труднодоступные Карпатские перевалы. Прежде чем австрийская армия организовать своего рода развёртывание на нашем территории, мы должны обеспечить ей стабильное снабжение"
 UKR_aus_austro_ukrainian_command: "Австро-украинское восточное командование"
 UKR_aus_austro_ukrainian_command_desc: "В рамках нашего нового союза в регионе [226.GetName] будет создано постоянное австро-украинское командование для координации наших и австро-венгерских сил, а также совместной разработки оборонных доктрин."

 UKR_stronghold_of_internationale: "Оплот Интернационала"
 UKR_stronghold_of_internationale_desc: "Мы, наконец, заняли предназначенную нам позицию оплота свободы и равенства. Украинская революция будет стойко обороняться от налётов реакционеров, словно крепость."
 UKR_intelligence_cooperation: "Сотрудничество разведок"
 UKR_intelligence_cooperation_desc: "Британские и французские спецслужбы имеют всемирные сети и могут делиться с нами большим количеством информации, что значительно увеличивает количество данных, которые наши генералы используют для принятия решений."
 UKR_southern_flank_of_revolution: "Южный фланг революции"
 UKR_southern_flank_of_revolution_desc: "Вместе с нашими русскими товарищами мы нанесём удар по Западу, чтобы отомстить за немецкое господство над нашими родными землями и положить конец их угнетению нашего славянского рода по всей Европе."
 UKR_russian_armor: "Чертежи русских танков"
 UKR_russian_armor_desc: "Совместный с Россией проект по разработке бронетехники нового поколения идет полным ходом, и вскоре он должен дать результат, который пойдёт на вооружение наших частей самой качественной бронетехникой."
 UKR_french_technical_expertise: "Французская техническая экспертиза"
 UKR_french_technical_expertise_desc: "Несмотря на наши собственные таланты, у французских инженеров есть чему поучиться. Приглашение их технических специалистов — это первый шаг в обучении нового военно-технического персонала, способного наилучшим образом использовать современные технологии"
 UKR_british_air_force_model: "Модель британских ВВС"
 UKR_british_air_force_model_desc: "Британия всегда располагала передовыми авиационными технологиями. Включение радаров и новых типов радиостанций в наши системы воздушного боя значительно повысит их эффективность"

 UKR_bsd_mil1: "Освободители Черного моря"
 UKR_bsd_mil1_desc: "Слишком долго район Черного моря оставался площадкой для крупных держав, будучи частью их ‘сфер влияния’ или ‘имперских проектов’. Наше национальное пробуждение станет первым крупным ударом по этой исторической несправедливости. Защищенные нашей мощью, народы этих земель смогут построить сильное сообщество, свободное от хищничества империалистов"
 UKR_bsd_mil2: "Крымские авианосцы"
 UKR_bsd_mil2_desc: "Дорогая наша Таврида похожа на цитадель, упирающуюся в Черное море. Ее центральное расположение делает ее естественной крепостью, где наши теперь уже независимые воздушные силы могут охранять и континент, и море."
 UKR_bsd_navy: "Общий морской характер"
 UKR_bsd_navy_desc: "Чёрное море всегда служило ключевым связующим звеном между различными народами, поселившимися на его берегах. Оно сильно повлияло на наш национальный характер и имело решающее значение для установления связей с нашими соседями. Эти исторические и духовные связи будут иметь большое значение для обеспечения нашей способности защитить морскую границу от любого потенциального врага"
 UKR_bsd_mil3: "Легион верных"
 UKR_bsd_mil3_desc: "Недостаточно быть просто обученным солдатом, нужно быть ещё и идейно убежденным. Профессиональный солдат может принять власть Скоропадским и Петлюрам будущего, но истинно национально настроенный украинец не будет принимать никакого участия в подобном унижении."

 UKR_the_hour_approaches: "Час приближается"
 UKR_the_hour_approaches_desc: "Вопрос не в том, что если, а в том, что когда. Россия охвачена реваншистским безумием, и мы являемся их первоочерёдной жертвой. Все, что мы можем сделать - это подготовиться."
 UKR_militarisation_of_industry: "Милитаризация промышленности"
 UKR_militarisation_of_industry_desc: "Некоторые заводы тяжелой промышленности можно легко перепрофилировать под производство продукции военного назначения, которая нам больше всего понадобится в ближайшие годы."

 UKR_black_monday_focus: "Черный понедельник ударяет по Украине"
 UKR_black_monday_focus_desc: "Поскольку экономика Германии рушится, экономика Украины, как и остальной части Миттельевропы, рухнула вместе с ней. Украина оказалась в отчаянном положении из-за накопления излишков зерна и коллапса сельскохозяйственных рынков. Нам необходимо принять обширные меры по выходу из этого кризиса"
 UKR_drop_gold_standard: "Отказаться от золотого стандарта"
 UKR_drop_gold_standard_desc: "Украинская валюта, гривна, уже некоторое время привязана к золотому стандарту, и в прошлом это обеспечивало определенную степень экономической стабильности, особенно в плане предотвращения инфляции. Сейчас, в трудные времена, Украина должна последовать за другими странами и отказаться от этой архаичной практики, что позволит нам влить в экономику столь необходимые деньги"
 UKR_bail_out_companies_ger: "Поддержать немецкие компании"
 UKR_bail_out_companies_ger_desc: "Немецкие промышленные предприятия в нашей стране немногочисленны, а на фоне экономического спада они могут совсем исчезнуть в одночасье. Чтобы предотвратить еще большую утечку капитала из страны, мы должны помочь этим корпорациям, чтобы они могли продолжать работать"
 UKR_bail_out_companies_ger_tt: "Увеличивает политическую власть за счет будущих займов на §Y20§!"
 UKR_bail_out_companies_ukr: "Поддержать отечественные компании"
 UKR_bail_out_companies_ukr_desc: "Мы должны в первую очередь заботиться о наших отечественных компаниях. Может быть, у них и нет такого капитала, как у немцев, но они нанимают гораздо большее количество людей, чьи средства к существованию находятся под угрозой."
 UKR_railway_issue: "Железнодорожный вопрос"
 UKR_railway_issue_desc: "Железные дороги являются источником жизненной силы украинской экономики, и наши немецкие благотворители вложили много средств в их улучшение. К сожалению, многие из улучшенных железнодорожных линий с новой шириной колеи принадлежат немцам. Поскольку их рабочие бастуют, мы можем попросить долю в собственность…"
 UKR_remove_prussian_railways_tt: "Уберёт §YПройсише Остбан§!"
 UKR_support_protofis: "Успокоить ВСЗС и Протофис"
 UKR_support_protofis_desc: "Представители ВСЗС и Протофиса играют огромную роль в нашем правительстве с момента его создания в 1918 году. Финансовая стабильность и экономический рост нашей страны, во многом, зависят от доброй воли и возможностей этих организаций. Мы должны заверить их, что их проблемы во время этого кризиса будут иметь наше самое пристальное внимание. Однако следует помнить, что невыполненные обещания могут привести к непредвиденным последствиям…"
 UKR_mass_privatization: "Массовая приватизация"
 UKR_mass_privatization_desc: "Несостоявшимся предприятиям нужен кто-то, кто ими управляет. Давайте продадим их тому, кто предложит самую высокую цену, даже если это означает большую концентрацию богатства для тех, кто уже богат"
 UKR_export_subsidies: "Экспортные субсидии"
 UKR_export_subsidies_desc: "Правила Миттельевропы запрещают одностороннее повышение тарифов, но они не запрещают государственные субсидии для ключевых секторов. Благодаря экспортным субсидиям мы можем удержать наши отрасли на плаву в этот непростой период"
 UKR_austerity_measures: "Ввести меры жесткой экономии"
 UKR_austerity_measures_desc: "Из-за кризиса Чёрного понедельника правительство решило сократить расходы и повысить налоги, чтобы не допустить полного банкротства казны. Хотя это облегчит нагрузку на наши финансы, это нанесет ущерб нашим производственным мощностям. "
 UKR_creation_of_state_corporations: "Создание госкорпораций"
 UKR_creation_of_state_corporations_desc: "Вместо того, чтобы продавать обанкротившиеся предприятия частным капиталистам, их следует временно поставить под контроль государства, чтобы обеспечить их финансовую ответственность"

 UKR_flames_of_rebellion: "Пламя восстания"
 UKR_flames_of_rebellion_desc: "Самое худшее из зол пришло к нам. Протесты, беспорядки, митинги против гетмана, гражданские беспорядки переросли в полномасштабную гражданскую войну. Если мы не разберемся с этими бунтовщиками, правление гетмана может быть недолгим."

### SocLib Hetmanate Focuses ###
 UKR_the_march_towards_parliamentarisation: "Марш к парламентаризации"
 UKR_the_march_towards_parliamentarisation_desc: "Смерть Павла Скоропадского была самым печальным событием, но мы не должны забывать о его благонамеренных попытках договориться с УРДП. В отличие от других, которые хотели бы, чтобы нация погрузилась в гражданскую войну, мы продолжим переговоры и обеспечим безопасность и свободу Украины."
 UKR_the_necessity_of_reform: "Необходимость реформы"
 UKR_the_necessity_of_reform_desc: "УРДП выдвинула ряд реформ, которые они считают необходимыми для терпимости к гетманскому правительству. К счастью, атаман-министр Дорошенко и Даниил Скоропадский согласны со многими из их более умеренных реформ, но провести их с оппозицией со стороны менее конституционалистски настроенных членов Сойма, безусловно, будет непростой задачей..."
 UKR_issue_of_land_reform: "Вопрос о земельной реформе"
 UKR_issue_of_land_reform_desc: "К счастью, земельная реформа была одной из ключевых идей, с которой Павел Скорпадский и УРДП, казалось, в основном согласились, и Даниил, наряду с Дорошенко и большей частью Сойма, похоже, единодушны в этом вопросе. Тем не менее, остаются вопросы о том, как будут выглядеть планы нового правительства по земельной реформе..."
 UKR_reign_not_rule: "Царствовать, а не править"
 UKR_reign_not_rule_desc: "Чрезмерное вмешательство гетмана Скоропадского в украинскую политику вызвало у многих недовольство гетманщиной. С приходом на престол Данила и его отсутствием интереса к прямому правлению мы можем, наконец, превратить гетмана в более символическую должность."
 UKR_decentralising_the_administration: "Децентрализация администрации"
 UKR_decentralising_the_administration_desc: "До сих пор страна и ее правительство были сильно централизованы, и это привело к тому, что некоторым регионам, особенно на западе, не уделялось должного внимания. Мы сделаем исправление этого приоритетом."
 UKR_lift_ban_on_socialist_organisations: "Снять запрет на социалистические организации"
 UKR_lift_ban_on_socialist_organisations_desc: "Социалистические партии и организации запрещены уже более пятнадцати лет. УРДП потребовала, чтобы им разрешили участвовать в местных и национальных выборах; пока они не попытаются совершить революцию, мы примем их просьбу."
 UKR_expand_suffrage_to_women: "Расширить избирательное право для женщин"
 UKR_expand_suffrage_to_women_desc: "Женские организации, такие как НИУЗ, давно добиваются поддержки от нашего правительства, отстаивая права женщин в Украине. Поскольку права женщин становятся все более популярной идеей в Европе, мы закрепим их избирательное право."
 UKR_dealing_with_the_coalition: "Работа с коалицией"
 UKR_dealing_with_the_coalition_desc: "Коалиция Скоропадского — палка о двух концах; антидемократическое и классократическое УСХД почти сразу высказалось против переговоров, тогда как мнение УДХП было более неоднозначным. Возможно, путем хитрого политиканства нам удастся расколоть коалицию и привлечь на свою сторону некоторых ее членов."
 UKR_strike_the_classocrats: "Ударить классократов"
 UKR_strike_the_classocrats_desc: "УСХД, как бы громко ни звучал их голос, имеют власть только благодаря милости Павла Скоропадского - и они это знают. Мы будем разоблачать их антидемократические настроения, а также призывать некоторых менее идеологически настроенных членов вступать в УДХП."
 UKR_sack_protofis_representatives: "Уволить представителей Protofis"
 UKR_sack_protofis_representatives_desc: "Хотя это уже давно назрело, лоббисты-землевладельцы и промышленники из союза Протофисов должны быть изгнаны из правительства. К счастью, это будет довольно бесспорный шаг среди коалиции, а также УРДП, и с уменьшением их влияния оппозиция переговорам будет загнана в угол."
 UKR_defang_the_borotbists: "Ослабить Боротьбистов"
 UKR_defang_the_borotbists_desc: "Безнадежно веря, что их саботаж нации приведет страну к революции, боротьбисты тем не менее подорвали потенциал успешных переговоров с УРДП, и многие в коалиции призывают к их немедленному подавлению. Хотя это может навредить нашим отношениям с УРДП, это, несомненно, успокоит правых, которые критикуют нас за бездействие."
 UKR_support_the_usdrp: "Поддержка УСДРП"
 UKR_support_the_usdrp_desc: "Хотя в настоящее время они могут не пользоваться поддержкой в Сойме, мы протянем оливковую ветвь УСДРП, которая лоббировала в гетманском правительстве разрешение на участие социалистов в выборах, как местных, так и национальных. Их умеренная платформа даст нам значительные рычаги, чтобы убедить правых в том, что наши действия носят не революционный, а компромиссный характер."
 UKR_dealing_with_the_shd: "Работа с СГД"
 UKR_dealing_with_the_shd_desc: "Союз гетманов-государствостроителей, пожалуй, представляет наибольшую опасность для процесса парламентаризации, неоднократно угрожая прекратить переговоры силой. Если переговоры увенчаются успехом, их нужно решить, и быстро."
 UKR_bring_the_military_in_line: "Привести военных в порядок"
 UKR_bring_the_military_in_line_desc: "Вероятность военного переворота, который приведет к быстрому прекращению переговоров, представляет собой вполне реальную угрозу. Тем не менее, военные должны понимать, кто теперь гетман, и что наступила великая эра перемен, и что их долг - защищать нацию и оберегать ее, а не вмешиваться в ее политику."
 UKR_support_loyal_officers: "Поддержать лояльных офицеров"
 UKR_support_loyal_officers_desc: "Генерал Присовский и другие члены СГД, возможно, достигли высокого престижа, и именно поэтому они представляют такую большую угрозу. Чтобы противостоять их влиянию, мы будем поддерживать офицеров, верных новому гетману и правительству, что дает нам значительные рычаги влияния в армии."
 UKR_union_dark_horse: "Темная лошадка Союза"
 UKR_union_dark_horse_desc: "Среди членов СГД глава Великой казачьей Рады Иван Полтавец-Острянец не имеет такого авторитета, как Присовский. Мы изобразим СГД как полностью разделяющую его более радикальные взгляды, оставившую ее более изолированной и имеющую еще более плохую репутацию, чем раньше."
 UKR_curb_right_wing_radicalism: "Обуздать правый радикализм"
 UKR_curb_right_wing_radicalism_desc: "Хотя радикальные левые, безусловно, представляют собой одну из величайших угроз для нации, правый радикализм представляет собой такую же опасность; будь то через СГД, ЛУН или иным образом, эти опасности должны быть ограничены."
 UKR_the_parliamentary_hetmanate: "Парламентская Гетманщина"
 UKR_the_parliamentary_hetmanate_desc: "Похоже, долгая и трудная задача парламентаризации подходит к концу. Когда оппозиция обезврежена, а реформы УРДП полностью реализованы, выборы снова готовы к проведению, поскольку Украина воссияет новой яркой эрой!"

 UKR_the_young_hetman: "Молодой гетман"
 UKR_the_young_hetman_desc: "Гетман Данила новичок и неопытен в политике. Но он отважен, ласков, решителен и элегантен - именно с его доброжелательным, легким правлением Гетманщина снова засияет и возвестит новую либеральную эру."
 UKR_the_art_of_compromise: "Искусство компромисса"
 UKR_the_art_of_compromise_desc: "Наше государство смогло договориться с УРДП, потому что мы выступали за прагматизм и компромисс, но без некоторого компромисса с правыми мы бы никогда не добились этого. Эти принципы должны быть нашим руководством."
 UKR_time_for_radical_action: "Время радикальных действий"
 UKR_time_for_radical_action_desc: "В течение двух десятилетий в этой стране были только разговоры и никаких действий - земельная реформа была обещана с самого начала, но так и не была проведена, так как внутренние распри помешали любым планам. Пора принять решительные меры и провести земельную реформу на благо нашего народа."
 UKR_level_up_the_countryside: "Поднять уровень сельской местности"
 UKR_level_up_the_countryside_desc: "Сельские районы Украины всегда требовали большего внимания, особенно на западе. По инициативе государства мы будем помогать местным властям бороться с нищетой и нищетой на селе."
 UKR_balanced_development: "Сбалансированное развитие"
 UKR_balanced_development_desc: "Было бы несправедливо, если бы государство отдавало предпочтение группам людей в зависимости от того, где они живут. Только сбалансированный рост как городов, так и сельской местности обеспечит процветание."
 UKR_promote_cooperative_farming: "Продвигать кооперативное сельское хозяйство"
 UKR_promote_cooperative_farming_desc: "В крестьянском кооперативе независимые фермеры объединяют свои ресурсы, знания и тяжелую работу и вместе пожинают плоды. Они являются естественной заменой великим земельным магнатам ушедших эпох."
 UKR_subsidise_mechanisation_efforts: "Субсидировать усилия по механизации"
 UKR_subsidise_mechanisation_efforts_desc: "Через десять лет в Украине не будет ни одного фермера, у которого не было бы трактора. Инвестировать в механизацию сейчас, и вскоре мы соберем большие плоды."
 UKR_rural_banks: "Сельские банки"
 UKR_rural_banks_desc: "Создание кооперативных банков в сельской местности обеспечит фермерам столь необходимые кредиты для расширения их ферм и инвестиций в повышение эффективности. Банки должны быть не для банкиров, а для людей."
 UKR_organise_state_monopolies: "Организовать государственные монополии"
 UKR_organise_state_monopolies_desc: "Промышленные секторы, являющиеся неотъемлемой частью национальной безопасности, такие как вооружение, лучше всего держать под жестким контролем назначенного правительством совета. Целью промышленности должно быть не получение больших прибылей для капиталистов, а улучшение всей нации."
 UKR_seek_foreign_expertise: "Искать иностранную экспертизу"
 UKR_seek_foreign_expertise_desc: "Несмотря на украинское великолепие, есть основания для привлечения иностранных инженеров, промышленников и других специалистов для дальнейшей модернизации нашей нации и обучения их навыкам следующего поколения одаренных украинцев."
 UKR_industrial_planning_committee: "Комитет промышленного планирования"
 UKR_industrial_planning_committee_desc: "Промышленники должны быть не реакционной лоббистской организацией, а знатоками украинской экономики. Их опыт лучше использовать в техническом планировании, а не в политике."
 UKR_introduce_progressive_taxation: "Ввести прогрессивное налогообложение"
 UKR_introduce_progressive_taxation_desc: "Здравый смысл подсказывает, что самые богатые могут внести больший вклад в казну нации и при этом оставаться богатыми. В конце концов, налоги создают инфраструктуру и безопасность, на которые опирается их бизнес."
 UKR_the_retinue_plays_the_king: "Свита играет короля"
 UKR_the_retinue_plays_the_king_desc: "Павла Скоропадского всегда окружал широкий круг советников и доверенных лиц. Некоторые из них имели особенно сильное влияние на гетмана и в первую очередь были ответственны за плачевное состояние нашей страны. Данило, несомненно, окружит себя своим кружком, и мы должны сделать так, чтобы он состоял из людей, которые не будут поощрять нового гетмана злоупотреблять своей властью."
 UKR_uniting_symbol: "Объединяющий символ"
 UKR_uniting_symbol_desc: "При практически бессильной гетманской канцелярии исчезла угроза ее исполнительного перевеса. Отныне гетман станет символом национального единства и суверенитета, практически не участвуя в повседневных политических делах государства."
 UKR_tour_the_country: "Путешествие по стране"
 UKR_tour_the_country_desc: "Павла часто обвиняли в том, что он элитарен, человек в башне из слоновой кости, аристократ, оторванный от простого народа. Данило понял, насколько это чувство способствовало падению его отца. Чтобы добиться большего, он должен путешествовать по своему королевству и встречаться как с простыми людьми, так и с могучими."
 UKR_society_of_prince_ostrozyki: "Общество князя Острожского"
 UKR_society_of_prince_ostrozyki_desc: "Князь Константин Василий Острожский широко почитается в Украине благодаря его покровительству искусствам и наукам. В память о нем мы создадим новую государственную организацию под личным руководством гетмана Даниила Скоропадского, занимающуюся поддержкой культурных и научных инициатив."
 UKR_burdens_of_the_past: "Бремя прошлого"
 UKR_burdens_of_the_past_desc: "Наследие государства Павла, по меньшей мере, противоречиво, поскольку жестокое подавление крестьянских восстаний и революций еще в недавней памяти - мы должны осудить эти эксцессы насилия. В то же время мы не должны пытаться окрасить все это в черный цвет, подчеркивая взвешенность в изображении его режима."
 UKR_bring_justice_to_all: "Вернём всем справедливость"
 UKR_bring_justice_to_all_desc: "Сенат государства по-прежнему сильно коррумпирован, многие его члены назначаются непосредственно Павлом Скоропадским. Реформа процесса назначения в Сенат сделает наши законы справедливыми и справедливыми."
 UKR_safeguarding_constitutional_order: "Защита конституционного строя"
 UKR_safeguarding_constitutional_order_desc: "Мы создали для себя демократическое, конституционалистское государство, которое избирается народом и для народа, но это было так долго, и некоторые хотят свести на нет весь достигнутый нами прогресс. Наш закон должен соответствовать демократическому мандату, который мы обещали народу."
 UKR_campaign_against_illiteracy: "Кампания против неграмотности"
 UKR_campaign_against_illiteracy_desc: "Уровень неграмотности снижается уже некоторое время, но этого недостаточно. Будущее следующего поколения украинцев зависит от умения читать и писать – дополнительное финансирование строительства школ и их ремонта станет нашим билетом в светлое будущее для всех детей Украины."
 UKR_cooperate_with_womens_organisations: "Сотрудничать с женскими организациями"
 UKR_cooperate_with_womens_organisations_desc: "Женщины Украины давно требовали признания, и теперь оно у них будет: поддерживая НУЗ и другие женские объединения, мы поднимем женщин в более высокий статус и добьемся равноправия полов."
 UKR_legacy_of_tup: "Наследие ОУП"
 UKR_legacy_of_tup_desc: "До 1917 года так наз. \"Общество украинских прогрессистов\" активно выступал за демократию, автономию и украинское культурное и национальное развитие. Обращаясь к воспоминаниям об этом обществе, мы можем способствовать дальнейшему сотрудничеству и сближению между правительством и прогрессивными социалистическими организациями."
 UKR_lone_pillar_of_progress: "Одинокий столб прогресса"
 UKR_lone_pillar_of_progress_desc: "Радикально-демократическая партия, возможно, несла наибольшую ответственность за нынешнее положение дел, выступая в качестве главного посредника между правым крылом и УРДП. Теперь, когда они победили на выборах, правильно, что они одни понесут факел прогресса и поведут Украину в светлое будущее."
 UKR_restrict_authority_of_cossack_councils: "Ограничить полномочия казачьих советов"
 UKR_restrict_authority_of_cossack_councils_desc: "Слишком долго организовывались казачьи советы, чтобы подавить восстание или принять решение о местном самоуправлении. Они будут ограничены чисто церемониальной и культурной ролью, за которую мы их обязательно оценим."
 UKR_new_administrative_divisions: "Новые административные единицы"
 UKR_new_administrative_divisions_desc: "Административные районы Гетманщины в значительной степени основаны на старых царских временах, и поэтому государство было довольно централизовано вокруг [202.GetName]. Чтобы исправить это, мы перекроим наше административное деление и дадим больше полномочий местным органам власти."
 UKR_austromarxist_approach: "Австромарксистский подход"
 UKR_austromarxist_approach_desc: "Австро-марксисты стремятся синтезировать веру в национальное государство с социальными принципами марксистской мысли. Хотя эти идеи и раньше имели некоторую поддержку в Украине, мы должны поддерживать их более решительно и стремиться привить нашим собственным революционным левым здоровую национальную гордость, сделать их сторонниками нашего государства, а не его врагами."
 UKR_principle_of_cultural_national_autonomy: "Принцип культурно-национальной автономии"
 UKR_principle_of_cultural_national_autonomy_desc: "Региональные автономии, такие как крымская, обслуживают только региональное большинство и не могут должным образом поддерживать большинство национальных меньшинств в Украине. Вместо этого концепция культурно-национальной автономии предоставит культурным ассоциациям их собственные свободы и предоставит гражданам свободу объединяться с любой группой, которую они предпочитают."
 UKR_condemn_revolutionary_violence: "Осудить революционное насилие"
 UKR_condemn_revolutionary_violence_desc: "Мы позволили социалистам участвовать в демократическом процессе до тех пор, пока они не пытаются свергнуть государство. Напоминание им об их обещаниях гарантирует, что мы останемся стабильными и не поддадимся тому же революционному насилию, что и раньше."
 UKR_at_arms_length_from_politics: "На расстоянии вытянутой руки от политики"
 UKR_at_arms_length_from_politics_desc: "В старой Гетманщине военные, полиция и спецслужбы часто строили заговоры против правительства, вместо того, чтобы ответственно и покорно ему служить. Мы должны исправить это."
 UKR_victory_of_the_fatherland: "Победа Отечества"
 UKR_victory_of_the_fatherland_desc: "Те, кто называл усилия гетмана Даниила по проведению реформ идеалистическими или глупыми, теперь замолчали, и мы показали, почему они необходимы. Победа над Россией была достигнута, и это произошло потому, что украинцы были едины, а не в беспорядке. Настало время вступить в давно заслуженную эру мира, свободы и солидарности."
 UKR_integration_of_eastern_regions_2: "Интеграция восточных провинций"
 UKR_integration_of_eastern_regions_2_desc: "Военное правительство восточных регионов, наконец, может быть распущено, и может быть начата длительная работа по интеграции этих территорий в состав собственно Украины. Хотя партизанская активность во время войны была сильной, после капитуляции России менталитет изменился. Наше русскоязычное сообщество оказало неоценимую помощь этим регионам."
 UKR_red_tinted_hetmanate: "Гетманщина с красным оттенком"
 UKR_red_tinted_hetmanate_desc: "Правительство УРДП лишь заложило фундамент, который предстоит завершить УСДРП. Социальные программы, здравоохранение для всех, комплексная система социальной защиты - все эти требования будут реализованы с победой социал-демократов. Запрет на участие УСДРП в выборах во время правления Павла, в конечном счете, так и не разрушил веру в то, что демократический и эволюционный социализм может стать будущим Украины."
 UKR_four_more_years_of_progress: "Еще четыре года прогресса"
 UKR_four_more_years_of_progress_desc: "Кто бы мог сказать, что УРДП не является факелоносцем украинского прогрессивизма, украинского национального развития, архитектором великого гетманского компромисса и партией тех, кто привел Украину к победе? Вполне естественно, что УРДП вновь возглавляет правительство большинства, и в условиях мира мы, несомненно, достигнем некоторых из наших более амбициозных целей."
 UKR_in_defence_of_the_old: "В защиту традиции"
 UKR_in_defence_of_the_old_desc: "Павел Скоропадский был архитектором свободной Украины, и Даниил довел свое видение до совершенства. Консерваторы из УДХП и либералы из УРДП, отнюдь не потерпевшие поражения после выборов, теперь контролируют Сойм, и они будут продолжать придерживаться этого видения по своему усмотрению."
 UKR_a_hetmans_legacy: "Наследие Гетмана"
 UKR_a_hetmans_legacy_desc: "Была ли смерть покойного Павла Скоропадского трагической случайностью или благоприятной возможностью? Был ли он представителем элиты, который стремился только к власти, или заботливым отцом нации, который вел ее в трудные времена? Был ли он узурпатором, укравшим мантию украинского национального движения, или патриотом, который по праву заслужил это? Возможно, в будущем появятся ответы на подобные вопросы, но сейчас давайте сосредоточимся на настоящем."

### SHD/PatAut Focuses ###
 UKR_all_the_hetmans_men: "Вся гетманская рать"
 UKR_all_the_hetmans_men_desc: "Наконец, пришло время Гетману и его верным людям из СГД спасти Украину от синдикализма. Хотя Петлюра и его прихвостни подались в бега, в тенях всё ещё бродят предатели, готовые вонзить нож в спину Гетмана и довести страну до гражданской войны Теперь, когда у власти находится более ответственное правительство, мы можем быть уверены, что враги Украины будут знать своё место!"
 UKR_a_united_organisation: "Объединённая организация"
 UKR_a_united_organisation_desc: "СГД долен стать хорошо смазанной политической машиной, его члены должны быть объединены общим делом и продвигать стабильность и безопасность государства, в которых он так нуждается. Мы не потерпим диссидентов и мелочных популистов, только несгибаемая воля и мудрость нашего Гетмана спасут нас."
 UKR_will_of_the_cossack_nation: "Казачий дух"
 UKR_will_of_the_cossack_nation_desc: "Украинцы и казаки – братские народы, а наше государство ведёт свою преемственность от Запорожской Сечи. После установления Гетманата и формального восстановления казаков как отдельного класса в 1918-ом году наша духовная связь была вновь установлена. Но этого мало. Казачий дух должен стать основой ментальности нашего общество, мы должны вернуться к славным традициям прошлого."
 UKR_reestablish_hetmans_headquarters: "Восстановить гетманский штаб"
 UKR_reestablish_hetmans_headquarters_desc: "Гетманский штаб, созданный в 1918-ом году, был политическим органом, призванным снабжать лично Гетмана информацией о положении дел с стране, а также лично охранять его. К сожалению, начиная с ранних 20-ых годов, штаб практически не выполнял свои функции. Это вопиющее ограничение власти Гетмана не привела ни к чему хорошему, поэтому мы должны восстановить данную организацию в её былом величии."
 UKR_responsible_government: "Отзывчивое правительство"
 UKR_responsible_government_desc: "После приостановления работы сойма на неопределенный срок должно быть создано более сговорчивое с Гетманом правительство. Отныне гетманскую власть будут исполнять действительно верные слуги, а Совет министров, составленный из людей, тщательно отобранных из рядов СГД, примет на себя бремя законодательной власти в дополнение к своим обычным исполнительным обязанностям."
 UKR_knightly_virtues: "Рыцарские благодетели"
 UKR_knightly_virtues_desc: "Построить независимое государство и защитить его от врага может только лишь человек, в котором сильны рыцарский дух, вера и любовь к Отчизне. Рыцарские традиции, взращенные нами и прошедшие через века, а также кровь наших предков, пролитая за наше будущее, дают нашему народу силу."
 UKR_further_centralisation_of_state: "Дальнейшая централизация государства"
 UKR_further_centralisation_of_state_desc: "Чтобы обеспечить полный контроль над политической ситуацией, мы должны вернуться к положениям Конституции 1918-го года, по которыми местные лидеры не выбирались, а назначались непосредственно из Киева. Этот шаг позволит СГД контролировать всё не только на уровне страны, но и на уровне отдельных регионов."
 UKR_mutually_beneficial_agreement: "Взаимовыгодное соглашение"
 UKR_mutually_beneficial_agreement_desc: "Кооперация с ВСЗС и Протофисом может быть исключительно взаимовыгодной. В обмен на их поддержку нашего правительства, они смогут привлекать больше инвесторов и наладить свой бизнес, который поможем ускорить индустриализацию страны."
 UKR_gears_of_industry: "Шестерни промышленности"
 UKR_gears_of_industry_desc: "При обширной поддержке Протофиса, промышленность Украины способна зарычать гулом сотен заводов и фабрик. Протофис сыграет свою роль в переходе страны от аграной к индустриальной экономике."
 UKR_well_deserved_compensation: "Заслуженная компенсация"
 UKR_well_deserved_compensation_desc: "И хотя земельная реформа должна продолжаться, не секрет, что многие богатые землевладельцы выразили своё недовольство этой реформой. В обмен на то, что они поддержат СГД, мы обеспечим им солидную денежную компенсацию и приостановим раздел наиболее крупных участков, ограничившись только самыми убыточными и неэффективными."
 UKR_curtail_capitalism_excesses: "Сгладить острые углы капитализма"
 UKR_curtail_capitalism_excesses_desc: "Многие подметили, что дикий капитализм стал одной из причин, почему Украина находится в таком плачевном положении. Бедные крестьяне и мелкие землевладельцы больше всего пострадали от кризиса. В это непростое время мы не должны делать ставку на промышленников и крупных землевладельцев. Это лишь ухудшит наше положение ещё сильнее."
 UKR_favour_loyal_landowners: "Отдать предпочтение местным землевладельцам"
 UKR_favour_loyal_landowners_desc: "По мере того, как государственная комиссия по перераспределению земли выполняет свою работу, мы должны учитывать политическую позицию землевладельцев. Те, кто поддерживает СГД, должны получить солидные компенсации и преференции по сравнению с теми, чья верность нашему правительству поставлена под сомнение."
 UKR_favour_loyal_landowners_tt: "Осторожно, по мере того, как наш общий §Oпоказатель земельной реформы§! увеличивается, §Oстабильность§!, которую можно получить, тоже увеличивается, одновременно уменьшая непосредственный бонус к §Oпоказателю земельной реформы§!"
 UKR_empower_financial_council: "Усилить финансовый совет"
 UKR_empower_financial_council_desc: "Ради блага Украины, её финансовая политика должна управляться Гетманом и его верными людьми, а не богатыми промышленниками, которые заботятся только о том, чтобы набить свои карманы. Чтобы добиться этого, мы усилим роль финансового совета – высшего экономического института, в ведении которого находятся вопросы государственного кредитования, займов и денежного обращения. Таким образом, мы можем быть уверены, что все насущные вопросы будут рассмотрены лично Гетманом."
 UKR_expand_union_membership: "Расширить членство в Союзе"
 UKR_expand_union_membership_desc: "Многие полагают, что СГД смог достичь своего положения исключительно на фоне развернувшегося кризиса Чёрного понедельника. Что ж, они, отчасти правы. Но чтобы развеять их скепсис, мы можем расширить членство в Союзе, пригласив туда бывших товарищей по коалиции. Это покажет всем сомневающимся, что СГД – это не просто элитарный клуб, а самая настоящая массовая организация."
 UKR_in_defence_of_law_and_order: "На страже закона и порядка"
 UKR_in_defence_of_law_and_order_desc: "Мир и свобода не придут на земли Украины, пока на них не будет закона и порядка. СГД – это единственная ниточка, что держит Украину над пропастью хаоса и очередной синдикалистической революции. Запрет на забастовки должен продолжиться, а вместе с ним должна быть введена и цензура печати, чтобы удостовериться в том, что среднестатистический житель Украины не стал жертвой крамольных идей."
 UKR_the_red_menace: "Красная угроза"
 UKR_the_red_menace_desc: "Как показала история нашей страны и всего остального мира, независимые профсоюзы рано или поздно становятся рассадником синдикалистических идей и движений. Все неподконтрольные правительству профсоюзы должны быть немедленно распущены, а потенциальные красные агенты и агитаторы поставлены под пристальные контроль. Всё ради безопасности нашего государства. "
 UKR_discipline_and_obedience: "Дисциплина и послушание"
 UKR_discipline_and_obedience_desc: "Во время восстания многие солдаты, офицеры и даже генералы перешли на сторону повстанцев. Среди тех, кто не перешел, были и те, кто выступал с \"критикой\" нашего режима. Необходимо провести всестороннюю ревизию армии, чтобы искоренить такие нелояльные элементы и закрепить контроль СГД над вооруженными силами."
 UKR_loyalty_and_its_rewards: "Лояльность и ее вознаграждения"
 UKR_loyalty_and_its_rewards_desc: "Доминирование СГД над политической системой не может быть достигнуто без участия широких слоев общества. С этой целью членство в профсоюзе должно стать обязательным условием для получения работы на государственной службе, в полиции и армии."
 UKR_line_of_succession: "Линия преемственности"
 UKR_line_of_succession_desc: "Павел Скоропадский стареет, и придет время, когда новый гетман снова приведет Украину к славе. Мы должны законодательно закрепить его преемственность, чтобы Его Светлейшее Величество Гетман Всея Украины мог однажды возглавить страну по образу и подобию СГД."
 UKR_father_of_nation: "Отец нации"
 UKR_father_of_nation_desc: "Павел Скоропадский снова и снова вел нас за собой, в периоды стабильности и смуты, в мирное и военное время. Он является примером для всех жителей Украины, будь то украинец, русский, татарин или еврей, как надо быть лидером. Мы должны принять его культ личности, чтобы следующее поколение знало, на кого равняться и кому подражать."
 UKR_ukraine_faithful_son: "Верный сын Украины"
 UKR_ukraine_faithful_son_desc: "Идея украинского гетманства - это идея нового монархизма. Павел Скоропадский, может быть, и великий человек, но он лишь часть гораздо более великой традиции. Гетманство - это символ единства украинской нации и силы украинского государства, олицетворенный в лице традиционного, национального, наследственного гетмана."
 UKR_mining_mechanisation: "Механизация шахт"
 UKR_mining_mechanisation_desc: "Для повышения эффективности управления ресурсами мы будем инвестировать в средства механизации шахт, что позволит нам более эффективно использовать огромные, еще не освоенные природные ресурсы Украины."
 UKR_everything_for_the_fatherland: "Все для Отечества"
 UKR_everything_for_the_fatherland_desc: "На данный момент единственным гарантом мира в Украине является ее сила. Мы единственные, кто понимает, что вооруженные силы должны быть в центре нашего внимания, чтобы Украина не стала жертвой российской агрессии. Следовательно, бюджет вооруженных сил, который и без того довольно высок по сравнению с некоторыми нашими соседями, будет увеличен. Некоторые могут жаловаться, но есть только один способ сохранить украинское государство."

 UKR_unbroken_resolve: "Непоколебимая решимость"
 UKR_unbroken_resolve_desc: "Синдикалисты вели против нас агитацию. Республиканцы восставали против нашего правления. Даже те, кто якобы был верен Скоропадскому, сомневались в нас. Но только мы можем утверждать, что защитили украинский народ от самой большой угрозы. Слава Украине! Слава Гетману!"
 UKR_true_heirs_of_rus: "Истинные наследники Руси"
 UKR_true_heirs_of_rus_desc: "Украина является государством, наиболее достойным мантии законного наследника [202.GetName]ской Руси. Этот образ мы должны использовать для легитимации своего правления на вновь приобретенных территориях, подчеркивая культурную близость с русским народом и не умаляя при этом своего национального своеобразия."
 UKR_a_nation_on_the_march: "Нация на марше"
 UKR_a_nation_on_the_march_desc: "После окончания войны мы можем приступить к процессу \"демократизации\" Под благосклонным руководством гетмана и СГД украинский народ сможет достичь немыслимых ранее высот!"
 UKR_partial_lift_of_electoral_restrictions: "Частичная отмена избирательных ограничений"
 UKR_partial_lift_of_electoral_restrictions_desc: "Мы примем закон, который даст государству новые полномочия по определению того, какие политические партии могут участвовать в выборах. Поскольку закон будет сконструирован Советом министров под руководством СГД, нам нечего будет бояться в будущем."
 UKR_the_hetmans_gift: "Подарок гетмана"
 UKR_the_hetmans_gift_desc: "Выборы и новая Конституция должны стать самым большим подарком Гетмана народу Украины. Без Гетмана и партии его последователей - СГД - не было бы никакой Украины. Пусть этот факт будет известен на тысячу лет!"
 UKR_the_right_hand_of_hetman: "Правая рука гетмана"
 UKR_the_right_hand_of_hetman_desc: "Отаман-министр Полтавец-Остряница стал незаменимой правой рукой гетмана, часто облегчая его бремя управления в самые тяжелые времена войны. В новой Украине этот послушный последователь должен быть признан таким же важным героем войны, каким был сам Скоропадский. has made himself the irreplaceable right hand man of the Hetman, often easing his burden of rulership in the darkest times of the war. In the new Ukraine, this dutiful follower must be acknowledged as just as important of a war hero as Skoropadskyi himself was."
 UKR_more_than_a_myth: "Больше, чем миф"
 UKR_more_than_a_myth_desc: "Казацкая рада - это не просто культурная организация, а хранительница национальной гордости Украины. Большое количество мест в Сойме должно быть выделено казакам в награду за их патриотическую работу и для сохранения будущего курса Украины."
 UKR_puppet_with_a_mace: "Марионетка с булавой"
 UKR_puppet_with_a_mace_desc: "Власть Полтавца-Остряницы почти укрепилась. Для ее окончательного закрепления крайне необходима чистка \"гомзынцев\", единственной реально конкурирующей клики в СГД. После их отстранения от политической власти останется только отаман-министр Полтавец-Остряница в качестве гетмана, но не по имени."

## AuthDem (USKhD) Focuses ##
 UKR_the_center_holds: "Центр побеждает"
 UKR_the_center_holds_desc: "В результате выборов [GetYear] гетманская коалиция вновь оказалась в авангарде власти. Только время покажет, приведет ли назначение Сергея Шемета отаманом-министром к успеху УСХД или УДХП их узурпирует."
 UKR_restore_order_in_the_countryside: "Наведение порядка в сельской местности"
 UKR_restore_order_in_the_countryside_desc: "По сравнению с городскими центрами, где Скоропадский и правительство пользовались наибольшей поддержкой, сельская местность по-прежнему остается очагом левацкой активности и поддержки ВДД. Порядок должен быть восстановлен, и быстро"
 UKR_fate_of_the_shd: "Судьба СГД"
 UKR_fate_of_the_shd_desc: "В ходе гражданской войны Союз гетманитов-государственных строителей неоднократно предпринимал попытки сорвать гетманское правление и захватить власть в свои руки. Хотя мы должны осторожно бороться с некоторыми из этих заговорщиков, с ними так или иначе придется иметь дело."
 UKR_reorganisation_of_cossack_councils: "Реорганизация казачьих советов"
 UKR_reorganisation_of_cossack_councils_desc: "Восстание закончилось, и теперь мы можем более детально рассмотреть роль Большой и Местной казачьих рад. Пересмотр их военизированной деятельности, а также полицейских функций в обмен на поддержку их самостоятельности в решении местных вопросов, вероятно, был бы оптимальным."
 UKR_cooperation_under_state_guidance: "Сотрудничество под руководством государства"
 UKR_cooperation_under_state_guidance_desc: "Кооперативное движение в Украине укрепило экономическую мощь рабочих и крестьян и научило их ответственности за свою землю и друг за друга. С помощью государственного вмешательства мы можем помочь организовать эти кооперативные движения, а также искоренить в них сторонников социализма."
 UKR_necessary_compromise: "Необходимый компромисс"
 UKR_necessary_compromise_desc: "Хотя многие считают, что коалиция ВСЗС и Протофис имеет непропорционально большое влияние в правительстве и является основной причиной провала проектов земельной реформы почти десятилетней давности, преимущества перевешивают недостатки; наше сотрудничество с ВСЗС/Протофис привело к значительному экономическому росту. Давайте продолжим это сотрудничество."
 UKR_end_alliance_with_vszv_protofis: "Прекращение сотрудничества с ВСЗС/Протофис"
 UKR_end_alliance_with_vszv_protofis_desc: "Коалиция между ВСЗС и Протофис, хотя и имела большое значение в начале существования Гетманата, изжила свою полезность в нашем правительстве, и они, по крайней мере частично, ответственны за провал наших предыдущих проектов земельной реформы. На этот раз мы больше не будем зависеть от прихотей землевладельческого и промышленного лобби."
 UKR_industrial_subsidies: "Промышленные субсидии"
 UKR_industrial_subsidies_desc: "Мы можем поддержать наши усилия по индустриализации, предоставив Протофис столь необходимые субсидии и государственные контракты - их бесценный опыт и ноу-хау дадут нам необходимые ресурсы для реализации грандиозных проектов индустриализации страны."
 UKR_expand_land_credit_bank: "Расширение Банка земельного кредита"
 UKR_expand_land_credit_bank_desc: "Для укрепления сельскохозяйственного сектора национальный банк будет отвечать за предоставление доступных кредитов фермерам, на которые они смогут приобретать удобрения и инвестировать в механизацию сельского хозяйства."
 UKR_expand_land_credit_bank_tt: "Остерегайтесь, что с увеличением общего объема §Oземельной реформы§! увеличивается §Cстабильность§!, которую можно получить, при этом уменьшается немедленный бонус к §Oземельной реформе.§!"
 UKR_support_state_unions: "Поддержка государственных профсоюзов"
 UKR_support_state_unions_desc: "Расширение официальных профсоюзов, контролируемых государством, позволит обеспечить достойное представительство и льготы нашим работникам, а также оградить страну от опасностей социалистического влияния."
 UKR_curb_populist_rhetoric: "Сдерживание популистской риторики"
 UKR_curb_populist_rhetoric_desc: "И ВСЗС, и наше правительство заинтересованы в том, чтобы не допустить социалистической риторики, которая привела к насильственным нападениям крестьян на крупных землевладельцев. Выпуская в эфир пропагандистские сообщения, направленные против этой демагогии, мы можем обеспечить сохранение нашего союза с ВСЗС и стабильность в деревне."
 UKR_extensive_nationalisation_program: "Широкая национализация"
 UKR_extensive_nationalisation_program_desc: "Институт социального корпоративизма способен обеспечить учет интересов всех - работников, работодателей, государства - и создать стабильную и гармоничную систему управления. Для этого мы будем добиваться национализации отдельных отраслей, таких как лесная, железнодорожная, угольная."
 UKR_diversification_of_exports: "Диверсификация экспорта"
 UKR_diversification_of_exports_desc: "Украину не зря называют \"хлебной житницей Европы\", ведь именно сюда экспортируется большое количество зерна. Однако Черный Понедельник показал, что наша экономика может быть весьма уязвима к резким колебаниям. Экспорт новых видов сырья позволит снизить зависимость от зерна и обеспечить дальнейшую финансовую стабильность."
 UKR_classocratic_principle: "Классократический принцип"
 UKR_classocratic_principle_desc: "Основным принципом аграриев-этатистов является политическое представительство - мы должны отказаться от идеи представительства через мелкую партийную политику и парламентаризм и вместо этого сосредоточить свое внимание на классовом представительстве. Только добиваясь представительства производящих классов - аграрного и рабочего - мы можем создать справедливое общество."
 UKR_empower_class_aristocracy: "Расширение возможностей классовой аристократии"
 UKR_empower_class_aristocracy_desc: "Только лучшие представители аграрного класса, самые старательные и трудолюбивые из рабочих могут быть пригодны для руководства. Организация этих представителей в децентрализованные классовые советы на местах обеспечит эффективность повседневного управления и будет направлять политическую и экономическую жизнь страны."
 UKR_leading_role_of_agrarian_class: "Ведущая роль аграрного класса"
 UKR_leading_role_of_agrarian_class_desc: "Украинское государство с момента своего возникновения было аграрным, и это остается актуальным и сегодня. Поскольку образ жизни украинцев зависит от сельского хозяйства, аграрный класс обязан играть ведущую роль в управлении государством. Для этого его представители должны получать больше мест в местных собраниях."
 UKR_mysticism_and_imperialism: "Мистицизм и империализм"
 UKR_mysticism_and_imperialism_desc: "Согласно идеям Липинского, мистицизм - предельная вера в правильность собственных убеждений, и империализм - воля к власти, желание властвовать и организовывать, являются основными характеристиками успешного политического движения. Только аграрии-этатисты имеют наиболее четкое видение будущего украинского государства. Именно поэтому ее главный руководящий орган - Совет присяжных заседателей - должен направлять законодательную и исполнительную функции государства."
 UKR_put_end_to_parliamentarian_chaos: "Положить конец парламентскому хаосу"
 UKR_put_end_to_parliamentarian_chaos_desc: "Парламентаризм, якобы призванный представлять интересы простых людей, привел лишь к вырождению и мелкому политиканству. Пора окончательно покончить с этим пагубным институтом: на смену Сойму должно прийти Всеукраинское классовое собрание, а единственной формой политического представительства, при ограничении политических партий, должна стать классовая организация."
 UKR_eliminate_threat_of_ochlocracy: "Устранение угрозы охлократии"
 UKR_eliminate_threat_of_ochlocracy_desc: "Боротьбистов и националистов Лиги объединяет демагогия и вздорная популистская риторика - вера в правление толпы, что в итоге приведет к жесткой авторитарной диктатуре сверху. Мы должны защищаться от этих радикалов на каждом шагу."
 UKR_lord_of_land_order_labour: "Властелин земли, порядка и труда"
 UKR_lord_of_land_order_labour_desc: "Правильная роль монарха должна заключаться в том, чтобы править как олицетворенный символ украинской нации. Хорошим примером для подражания может служить британская монархия, где традиции, а также ожидания масс и элит определили роль монарха в политике. Наш Гетманат, а значит, и наш Гетман должны следовать этому идеалу."
 UKR_support_loyal_intelligentsia: "Поддержка лояльной интеллигенции"
 UKR_support_loyal_intelligentsia_desc: "Многие, кто не относится к производящим классам - юристы, учителя, ученые, врачи и другие, все равно необходимы для функционирования общества и управления. И пока они будут самоотверженно служить государству в своих начинаниях, мы будем их поддерживать."
 UKR_the_highest_moral_authority: "Высший моральный авторитет"
 UKR_the_highest_moral_authority_desc: "Украина - преимущественно православная страна, и поэтому православное христианство должно служить примером нравственной чистоты для всех украинцев. Для этого оно должно быть оторвано от мелочного политиканства и оставаться в стороне от политических дел, чтобы оставаться объединяющим всех делом."
 UKR_territorial_patriotism: "Территориальный патриотизм"
 UKR_territorial_patriotism_desc: "Языковой и этнический шовинизм - это язвы, которые сеют только раскол и разрушение. Чтобы избавиться от этих заблуждений, мы должны принять доктрину \"территориального патриотизма\"; сотрудничество различных культур, этносов и языков будет способствовать улучшению нашего общего дома - Украины."

 UKR_our_place_in_history: "Наше место в истории"
 UKR_our_place_in_history_desc: "Победа над Россией доказала неотъемлемое превосходство классовой системы государственного устройства - даже несовершенной - над любой конкурирующей системой. Это служит историческим оправданием нашей политики и дает нам веру в то, что мы будем продолжать идти по тому же пути."
 UKR_USKHD_points_tt: "§CНаграда за послевоенные фокусы зависит от количества выполненных фокусов с их дополнительными наградами. В настоящее время число этих фокусов составляет [?UKR_uskhd_points]."
 UKR_power_to_class_councils: "Создание местных советов классов"
 UKR_power_to_class_councils_desc: "Национальная организация через местные классовые советы доказала свою эффективность. Они могут играть еще более центральную роль в национальной жизни Украины путем передачи советом различных бюрократическо-административных функций от менее крупных организаций."
 UKR_expanding_the_system: "Расширение системы"
 UKR_expanding_the_system_desc: "Вновь завоеванные регионы на востоке страны сильно испорчены хаотичной политической системой России, но упорным трудом они будут направлены на правильный путь и укрепление единства с Украиной."
 UKR_against_the_law_of_capital: "Против закона капитала"
 UKR_against_the_law_of_capital_desc: "Закон капитала - это закон безымянных акционеров, биржевых игроков, авантюристов и плутократов, всегда противоречащий здоровым и творческим силам нации. С ним надо бороться самым решительным образом, чтобы последнее слово в экономических делах оставалось за производящими классами, а не за лакеями бездушного капитала."
 UKR_dedication_and_will: "Целеустремленность и воля"
 UKR_dedication_and_will_desc: "Многое было сделано с момента прихода к власти УСХД и многое еще предстоит сделать. Постоянная борьба с двуединым злом - демократией и охлократией - требует волевых усилий и полной самоотдачи. В связи с этим Совет присяжных заседателей оставляет за собой право вмешиваться в процесс формирования национальных элит, когда сочтет нужным."

 UKR_after_the_storm: "После бури"
 UKR_after_the_storm_desc: "Война выиграна, теперь настало время завоевать мир. Помня о наших обещаниях, после заключения мира прозвучало много призывов начать внедрение более справедливой и равноправной политической системы. В конце концов, столько украинцев сражались и умирали за свободу своей страны, что можно доверять им и после таких испытаний ответственно относиться к политической власти."
 UKR_justice_at_last: "Наконец-то справедливость"
 UKR_justice_at_last_desc: "Недостаточно просто обещать защищать основные права и свободы наших граждан. Только наказывая каждую попытку посягательства на гражданские свободы, мы можем предотвратить появление в будущем очередного СГД, пытающегося подмять под себя нашу демократию."
 UKR_amend_anti_socialist_laws: "Поправки к антисоциалистическим законам"
 UKR_amend_anti_socialist_laws_desc: "Война доказала лояльность многих украинцев, даже тех, кто ранее выступал против гетмана. Справедливо будет принять их участие в политической жизни - они заслужили это в окопах Донбасса. Если они разделяют наше видение стабильного и законного Гетманата, они могут присоединиться к нам в строительстве государства."
 UKR_reject_partisanship: "Отказ от партий"
 UKR_reject_partisanship_desc: "Реформы - да. Повторение старых ошибок? Ни в коем случае. Демократия - это ценность, но она не должна ставиться выше национального блага. Цель демократии - дать возможность наиболее способным украинцам обладать политической властью, а не позволять худшим элементам нашего народа саботировать государство."
 UKR_formalise_advisory_council: "Создание Консультативного совета"
 UKR_formalise_advisory_council_desc: "Его Светлейшее Высочество всегда окружали надежные советники и доверенные лица. Официально создав Консультативный совет, мы можем гарантировать, что только самые компетентные и ответственные государственные деятели будут иметь возможность влиять на принятие решений Гетманом."
 UKR_call_elections: "Созыв [GetYear] года"
 UKR_call_elections_desc: "Гетман по своей милости решил устроить новые выборы, чтобы показать свою убежденность в свободе всех украинцев."
 UKR_democratisation_successful: "At least two democratic reforms have been passed."
 UKR_democratization_not_successful: "Fewer than two democratic reforms were passed."

## AuthDem (UDKhP) Focuses ##
 UKR_fall_of_uskhd: "Падение УСХД"
 UKR_fall_of_uskhd_desc: "У хлеборобов-державников был шанс - и они провалились. С их падением почти наверняка произойдет восхождение Демократической аграрной партии, и ответственное управление, наконец, будет восстановлено."
 UKR_kistiakovskyi_victory: "Кистяковский - лидер УДХП."
 UKR_mikhnovskyi_victory: "Михновский - лидер УДХП."
 UKR_ascension_of_udkhp: "Восход УДХП"
 UKR_ascension_of_udkhp_desc: "После роспуска хлеборобов-державников и раскола радикальных демократов почти наверняка следующим отаманом-министром будет представитель хлеборобов-демократов; хотя в руководстве партии уже давно существует раскол, этот вопрос не может оставаться открытым. В [221.GetName]е состоится конференция, на которой будет определен лидер УДХП."
 UKR_hetman_evil_spirit: "Злой дух гетмана"
 UKR_hetman_evil_spirit_desc: "Вопрос о партийном руководстве решен: новым отаманом-министром стал Игорь Кистяковский. Прагматик и убежденный анти-левый, а также сторонник умеренных аграрных и консервативных гетманских идеалов, он, несомненно, будет определять будущее государства на долгие годы."
 UKR_hardline_course_against_revolutionary_leftism: "Жесткий курс против революционных левых"
 UKR_hardline_course_against_revolutionary_leftism_desc: "Даже после восстания левые агитаторы продолжают сеять хаос из своих подпольных террористических ячеек. Мы должны арестовывать всех этих подозреваемых в социализме и не допускать их на трибуну; хотя кому-то это может показаться чрезмерным, в долгосрочной перспективе это, безусловно, принесет нам стабильность."
 UKR_champion_political_pragmatism: "Чемпион политического прагматизма"
 UKR_champion_political_pragmatism_desc: "В большинстве случаев лучшая политика - умеренная. С этой целью мы будем поддерживать средних фермеров и землевладельцев, которые более стойко хранят верность нашему государству, и продолжать поддерживать развитие украинского языка и культуры на стабильном мирном уровне."
 UKR_hetman_radical_firebrand: "Гетманский радикальный факел"
 UKR_hetman_radical_firebrand_desc: "Вопрос о партийном руководстве решен: новым отаманом-министром стал Николай Михновский. Ярый националист, известный своими связями в армии, а также радикальной риторикой, он, несомненно, будет определять будущее государства на долгие годы."
 UKR_reach_out_to_army_nationalist_clique: "Обращение к националистической клике армии"
 UKR_reach_out_to_army_nationalist_clique_desc: "Армия - единственный гарант независимости украинского государства, мы должны любой ценой спасти Украину от разрушения ее государственности. Мы будем работать с более националистически настроенными людьми в армии, пропагандировать культ армии."
 UKR_invoke_jingoistic_rhetoric: "Привлечение шовинистической риторики"
 UKR_invoke_jingoistic_rhetoric_desc: "До обретения Украиной независимости Михновский часто использовал ксенофобскую риторику. Мы будем использовать аналогичную тактику, чтобы подчеркнуть, что за пределами нашей страны проживают миллионы украинцев, и выступать за более активное продвижение украинской культуры и языка."
 UKR_pact_with_urdp_right: "Пакт с правым крылом УРДП"
 UKR_pact_with_urdp_right_desc: "С начала 1920-х гг. радикальные демократы стали более разнородной партией, особенно в связи с усилением их правых сил. Для того чтобы укрепить позиции аграрных демократов в Сойме и обеспечить всеобъемлющий характер партии, мы будем опираться на их правые силы."
 UKR_establish_constitutional_review_committee: "Учредить Комитет по пересмотру Конституции"
 UKR_establish_constitutional_review_committee_desc: "Отаман-Министр и его союзники теперь стремятся реализовать свою реформаторскую программу, которая даст больше власти Сойму. Несомненно, это будет непростая задача, учитывая возможное противодействие со стороны исполнительной власти; но если мы сможем провести наши реформы, то создадим более сбалансированную политическую систему, менее уязвимую для некомпетентности, безответственности или сознательного саботажа."
 UKR_outline_parliamentary_executive_diarchy: "Гетманистско-соимистская диархия"
 UKR_outline_parliamentary_executive_diarchy_desc: "С момента создания Сойма его отношения с гетманской канцелярией были достаточно сложными. Павел Скоропадский имел возможность по своему усмотрению вмешиваться в законодательные процессы как официально, так и неофициально. Сложившаяся политическая схема была омрачена неэффективностью, и настало время правильно определить границы власти гетмана по отношению к парламенту."
 UKR_questions_of_cultural_autonomy_and_suffrage: "Вопросы культурной автономии и избирательного права"
 UKR_questions_of_cultural_autonomy_and_suffrage_desc: "В Украине проживает множество различных культур, будь то русская, татарская, польская или еврейская, и все они борются за признание. Для того чтобы обеспечить достойное представительство всех наших народов, мы должны осуществить меры по децентрализации, наряду с собственным видением национально-культурной автономии. Кроме того, необходимо вернуться к вопросу о женском избирательном праве, если мы хотим обеспечить достойное представительство всего народа."
 UKR_industry_udkhp_focus: "Защитник государства"
 UKR_industry_udkhp_focus_desc: "В течение многих лет мы находились в застое и полагались на немецкое оружие для защиты нашей страны, но в условиях растущей российской мощи это не может продолжаться. Мы обеспечим дополнительное финансирование армии и не допустим, чтобы она была плохо оснащена для защиты нашего суверенитета."
 UKR_landreform_udkhp_focus: "Управляемая земельная реформа"
 UKR_landreform_udkhp_focus_desc: "Чтобы максимально эффективно провести земельную реформу, мы создадим национальный земельный фонд, который будет разделен на хозяйства, размер которых будет соответствовать оптимальной экономической производительности для определенной территории."
 UKR_review_committee_tt: "§CМы начинаем процесс дальнейшей парламентаризации нашего правительства. Дебаты по избирательным законам, вотуму недоверия и процедуре назначения отамана-министра можно будет проводить на вкладке §YРешение§!.\n\nВ зависимости от того, будет ли процесс парламентаризации успешным или нет, мы получим различные §YНациональные духи§!, а также определим, станем ли мы §cСоциал-консерваторами§! или останемся §gАвторитарными демократами§! в конце Вельткрига.§!"
 UKR_outline_diarchy_tt: "§CОт того, сколько реформ мы проведем, будет зависеть наш национальный дух.§!"
 UKR_cultural_autonomy_tt: "§CОт того, сколько реформ мы проведем, будет зависеть наш национальный дух.§!"
 UKR_udkhp_liberalisation: "Контролируемая либерализация"

## People's Republic Focuses ##
 #Pre-Election Branch
 UKR_a_family_new_and_free: "Новая и свободная семья"
 UKR_a_family_new_and_free_desc: "Наконец-то сбылись мечты бесчисленных отважных революционеров. После отставки гетмана и полного краха его правительства Симон Петлюра и его победоносное ВДД восстановили Украинскую Народную Республику. По мере того как страна излечивается от десятилетий тирании и угнетения, некогда считавшаяся несбыточной мечта наконец-то воплощается в жизнь."
 UKR_bring_the_army_in_line: "Привести армию в порядок"
 UKR_bring_the_army_in_line_desc: "Мы одержали победу над гетманскими войсками, но до восстановления нашей власти еще далеко. Хаос царит не только в сельской местности, но и в рядах наших военных. Если мы хотим в ближайшее время вернуться к нормальной жизни, нам придется провести реорганизацию армии."
 UKR_quash_hetmanite_resistance: "Подавить сопротивление гетманцев"
 UKR_quash_hetmanite_resistance_desc: "Несмотря на то, что ВДД является бесспорным победителем в гражданской войне, среди нас все еще есть те, кто высоко ценит прежний режим. Радикальные реставраторы и приверженцы гетманского режима все еще таятся в тени, и необходимо принять оперативные меры для привлечения их к ответственности."
 UKR_national_personal_autonomy: "Национально-личностная автономия"
 UKR_national_personal_autonomy_desc: "Конституция нашей страны гарантирует национальную и личную автономию каждому гражданину, проживающему на нашей земле. Все народы, будь то русские, поляки или евреи, пользуются в нашей Народной Республике равными правами."
 UKR_the_long_road_to_recovery: "Долгий путь к выздоровлению"
 UKR_the_long_road_to_recovery_desc: "Годы не были добрыми к Украине. Черный понедельник только усугубил экономические проблемы, а гражданская война разрушила то немногое, что у нас осталось. Наша страна находится в плачевном состоянии, и правительство должно взять на себя трудную задачу оздоровления нашей больной экономики."
 UKR_the_long_road_to_recovery_tt_1: "Мы начали земельную реформу и индустриализацию."
 UKR_the_long_road_to_recovery_tt_2: "Эффекты этого фокуса станут очевидными, как только мы начнем решать вопросы земельной реформы и индустриализации."
 UKR_reorganize_the_corrupt_bureaucracy: "Борьба с бюрократической коррупцией"
 UKR_reorganize_the_corrupt_bureaucracy_desc: "Казалось бы, даже целое вооруженное восстание не смогло избавить страну от коррупции. Остатки коррумпированной бюрократии Гетманата до сих пор сохраняются, позволяя нечестным государственным служащим наживаться на мошенничестве. Допустить такое положение дел было бы позором, поэтому настало время окончательно избавиться от кумовства, взяточничества и обмана."

 #Radical Democrats
UKR_solidarity_and_compromise_1: "Солидарность и компромисс"
UKR_solidarity_and_compromise_2: "Радикальный подход"
UKR_solidarity_and_compromise_3: "Восхождение Рабочей Партии"
 UKR_solidarity_and_compromise: "[UKR_solidarity_and_compromise]"
 UKR_solidarity_and_compromise_desc: "[UKR_solidarity_and_compromise_desc]"
UKR_solidarity_and_compromise_desc_1: "Первый полноценный выборы возрожденной народной республики уже в пути. УРДП и УСДРП представляют реформистские партии в бывшем ВДД, противостоящие революционному альянсу между УПСР и С-РБ. Однако только время покажет, сможет ли умеренная коалиция победить."
UKR_solidarity_and_compromise_desc_2: "Через десятилетия после своего основания Радикальная Демократическая Партия встала во главе нации. Без Гетмана, который бы их отодвинул, радикалы наконец могут построить прогрессивную и парламентскую Украину, о которой мечтали миллионы."
UKR_solidarity_and_compromise_desc_3: "УСДРП уже более 30 лет отстаивает права рабочего человека и демократию. Мы были лишены возможности полностью реализовать свое видение в 1917 году, но теперь все будет по-другому. Борьба, начавшаяся в 1905 году, будет доведена до конца."
UKR_solidarity_and_compromise_tt: "После того, как мы выберем либо §lУРДП§!, либо §SУСДРП§!, этот фокус отобразит §Cподсказку§! с объяснением §Yспецифичных механик пути§!."
UKR_a_radical_touch_tt: "Правительство §lУРДП§! должно уделить внимание двум вопросам:\n£white_dot Поддержание хороших отношений с нашими коалиционными партнерами из §SУСДРП§!.\n£white_dot Управление влиянием фракций внутри §lУРДП§!: §mПравыми§!, §lЦентром§! и §SЛевыми§!.\n\nПоддержание хороших отношений с §SУСДРП§!, которое зависит от §HНациональных фокусов§! и §HСобытий§!, даст нам различные §Gбонусы§!. Если наши отношения с §SУСДРП§! ухудшатся мы получим различные §Rштрафы§!. Кроме того, если §SУСДРП§! останутся §Rнесотрудничающими§! слишком долго, они покинут коалицию, оставив нас §Rправительством меньшиства§!.\n\nФракции внутри §lУРДП§! могут иметь §PНизкое§!, §MУмеренное§! или §GВысокое§! влияние. Это видно в табе принятия решений.\nФракция с §GВысоким§! влиянием может улучшить эффекты определенных фокусов, но будет снижать влияние других двух фракций.\nФракция с §PНизким§! влиянием может восстать против партии, что, если не будет решено, приведет к §Rсерьезным§! штрафам.\n\nЕсли более одной фракции имеет §GВысокое§! или §PНизкое§! влияние одновременно, действия примет только одна: §mПравые§! восстанут или уменьшат влияние других фракций первыми, §SЛевые§! вторыми и §lЦентр§! третьими."
UKR_ascension_of_the_workers_party_tt: "Правительству §SУСДРП§! нужно сосредоточиться на двух вещах:\n£white_dot Поддержание хороших отношений с нашими коалиционными партнерами из §lУРДП§!.\n£white_dot Поддержание §1Идеализма§! в партии.\n\nПоддержание хороших отношений с §lУРДП§!, которое зависит от §HНациональных фокусов§! и §HСобытий§!, даст нам различные §Gбонусы§!. Если наши отношения с §lУРДП§! ухудшатся, мы получим различные §Rштрафы§!.\nКроме того, если отношения с §lУРДП§! останутся §Rнесотрудничающими§! слишком долго, они покинут коалицию, оставив нас §Rправительством меньшиства§!.\n\n§1Идеализм§! может варьироваться от §Y-4§! до §Y+6§!, и каждый уровень до §Y+4§! будет давать дополнительные §Gбонусы§! ко многим нашим эффектам фокусов. Однако каждый фокус, связанный с §1Идеализмом§!, если не указано иное, будет §Rпотеряно§! одно очко §1Идеализма§! — и если она упадет до §Y-4,§! будут §Rпоследствия§!."
UKR_will_spend_idealism_tt: "Принятие этого фокуса §Rпотратит§! одно очко §1Идеализма§!."
UKR_wont_spend_idealism_tt: "Принятие этого фокуса §Gне потратит§! ни одного очка §1Идеализма§!."

UKR_building_popular_consensus: "Создание народного консенсуса"
UKR_building_popular_consensus_desc: "Свобода не достигается просто сменой властей. Если мы действительно хотим создать народную республику, которую мы отстаиваем, то нам предстоит много работы. Нужно создать политически сознательный народ, зафиксировать мандат народа и гарантировать, что наша демократия не станет уязвимой для узурпаторов, таких как Скоропадский — задачи сложные, но необходимые."
UKR_building_popular_consensus_usdrp_tt: "Для каждого уровня §1Идеализма§! дух будет модифицирован следующим образом:\nЕжедневная поддержка социал-демократов: §G+0.01§!\nЕжедневная поддержка социал-либералов: §G+0.01§!"

UKR_respect_judicial_independence: "Уважение судебной независимости"
UKR_respect_judicial_independence_desc: "Мы не стремимся заменить угнетающий беспредел гетманиского режима потворство эксцессам так называемого 'нового революционного порядка'. Напротив, мы стремимся создать справедливую и независимую судебную систему, способную выполнять свои задачи без политического вмешательства. Это единственный способ для нашей республики завоевать доверие народа."

UKR_emergency_powers_to_the_general_court: "Чрезвычайные полномочия для Генерального суда"
UKR_emergency_powers_to_the_general_court_desc: "Судебная система, унаследованная от Гетманата, прогнила до основания. Чтобы исправить это, Генеральный суд, состоящий из самых профессиональных судей, проверенных Национальными Зборами, получит временные полномочия для проверки деятельности судов по всей стране. Судьи, чья честность вызывает сомнения, будут отстранены: мы не можем позволить безнравственным остаткам старой судебной системы разрушить нашу обновленную республику."

UKR_controlled_capitalism: "Контролируемый капитализм"
UKR_controlled_capitalism_desc: "В современном мире экономический рост невозможен без капиталистической системы отношений. Однако, чтобы ограничить ее неизбежные излишества и обеспечить процветание для всех, мы должны принять систему \"контролируемого капитализма\", при которой государство контролирует определенные сектора экономики, но не подавляет деятельность малых и средних частных предприятий."

UKR_merger_of_monopolized_industries: "Слияние монополизированных отраслей"
UKR_merger_of_monopolized_industries_desc: "Ключевые предприятия, такие как угольные шахты, железные дороги и лесопилки, все еще остаются в частных руках. Эти отрасли должны управляться для блага нашей страны, а не для ради прибыли. Пришло время взять их под наш контроль."

UKR_overtures_to_vienna: "Контакты с Веной"
UKR_overtures_to_vienna_desc: "На нашем западном рубеже лежит [AUS.GetName]. Годы гетманского правления испортили отношения между нашими странами, и теперь, когда у нас есть разумное правительство, мы можем начать новый этап и наладить отношения с нашим западным соседом."
UKR_overtures_to_vienna_tt_2: "Для каждого уровня §1Идеализма§! национальный дух будет модифицирован следующим образом:\nСкорость строительства: §G+3.00%§!\nСкорость исследований: §G+3.00%§!"

UKR_beyond_mitteleuropa: "За пределами Миттельевропы"
UKR_beyond_mitteleuropa_desc: "Украина оказывается в довольно неблагоприятной ситуации с точки зрения дипломатии. Немцы и австрийцы на западе не считают её равной, в то время как русские на востоке питают к ней лишь враждебность. И всё же есть достойные союзники. Украине нужно просто найти их."
UKR_beyond_mitteleuropa_tt: "Расширение торговли принесет нам бонусы к §Yпотребительским товарам, политической власти, производству на верфях и скорости строительства§!"
UKR_beyond_mitteleuropa_2_tt: "Если §lУРДП§!-§mПравые§! имеют §GВысокое§! влияние, мы получим вместо этого:"
UKR_beyond_mitteleuropa_3_tt: "Эффекты будут §Gулучшены§! благодаря §lУРДП§!-§mПравым§! с §GВысоким§! влиянием."
UKR_beyond_mitteleuropa_4_tt: "Если §lУРДП§!-§mПравые§! имеют §GВысокое§! влияние при завершении этого фокуса, решения будут усилены."
UKR_beyond_mitteleuropa_5_tt: "За каждый уровень §1Идеализма§! национальных дух будет измененн следующим образом:\nЕжедневный прирост политической власти: §G+2%§!\nСкорость строительства: §G+2.00%§!\nФактор потребительских товаров: §Y-2.00%§!\nФактор мнения о торговых сделках: §G+5%§!"

UKR_beyond_mitteleuropa_modifier: "За пределами Миттельевропы"
UKR_decentralized_national_governance: "Децентрализованное национальное управление"
UKR_decentralized_national_governance_desc: "Страна, в которой вся власть сосредоточена на высшем уровне, не может заявлять, что она действительно заботится о своем народе. Необходимо принять меры для реформирования нашей системы управления в более децентрализованный формат, чтобы народ мог участвовать в принятии решений."

UKR_promote_grassroots_cultural_initiatives: "Продвижение культурных инициатив на местах"
UKR_promote_grassroots_cultural_initiatives_desc: "Образовательные и культурные инициативы, такие как общество «Просвита», сыграли важную роль в продвижении и развитии украинского национального дела. Более того, можно утверждать, что корни нашей партии уходят именно в такие организации. Поэтому их необходимо активно поддерживать государством, особенно учитывая, что уровень безграмотности в некоторых сельских районах всё ещё вызывает обеспокоенность."
UKR_promote_grassroots_cultural_initiatives_tt: "Если §lУРДП§!-§lЦентр§! имеет §GВысокое§! влияние, мы получим вместо этого:"
UKR_promote_grassroots_cultural_initiatives_tt_2: "Эффекты будут §Gулучшены§! благодаря §lУРДП§!-§lЦентру§! с §GВысоким§! влиянием."
UKR_promote_grassroots_cultural_initiatives_tt_3: "За каждый уровень §1Идеализма§! национальный дух будет изменен следующим образом:\nФактор набираемой рабочей силы: §G+2%§!\nПолучение политической власти: §G+3%§!"

UKR_support_for_nruz: "Поддержка НРУЗ"
UKR_support_for_nruz_desc: "Хотя наша конституция гарантирует равные права для каждого украинца, независимо от пола, это не означает, что женщины находятся на равных правах с мужчинами. Мы выделим финансирование для Национального совета украинских женщин и публично поддержим их дело, чтобы наконец создать общество, свободное от шовинизма и предвзятости."
UKR_support_for_nruz_3_tt: "За каждый уровень §1Идеализма§! эффекты отношений с §lУРДП§! в этом фокусе будут изменены следующим образом:\nПроизводство на фабриках: §G+1.00%§!"

UKR_a_tight_rein_on_radical_leftists: "Жесткий контроль над радикальными левыми"
UKR_a_tight_rein_on_radical_leftists_desc: "Хотя восстание привело к созданию правительства, которое действительно заботится о своем народе, всё ещё есть те, кто не ценит наши усилия. Многие на радикально левом фланге хотят погрузить нашу страну в хаос своими революционными идеями. Всё больше людей начинают верить в их ложь, поэтому мы должны как можно скорее нейтрализовать эти движения, чтобы они не нанесли вреда."
UKR_a_tight_rein_on_radical_leftists_tt: "Преобразовать половину популярности §rСиндикалистов§! и §RРадикальных социалистов§! в популярность §SСоциал-демократов§!"

#SocLib/SocDem Shared Branch
 UKR_land_fund_establishment: "Украинский земельный фонд"
 UKR_land_fund_establishment_desc: "В качестве эффективного метода распределения земли используется Государственный земельный фонд: выкупленные государством гектары передаются под управление Фонда, который затем организует продажу этих земель местным крестьянам."
UKR_land_fund_establishment_tt: "За каждую фракцию §lУРДП§!, имеющую §Gвысокое§! влияние, мы получим:"
UKR_land_fund_establishment_tt_3: "За каждый уровень §1Идеализма§! эффект будет модифицирован:\nЕжемесячный прирост населения: §G+10.0%§!\nОчки земельной реформы: §Y+1§! каждые §Y150 дней§!"
UKR_land_fund_establishment_tt_4: "При §Y3§! фракциях с §Gвысоким§! влиянием мы получим:"
UKR_land_fund_establishment_tt_5: "При §Y2§! фракциях с §Gвысоким§! влиянием мы получим:"
UKR_land_fund_establishment_tt_6: "При §Y1§! фракции с §Gвысоким§! влиянием мы получим:"
UKR_land_fund_establishment_tt_7: "§RВ данный момент ни одна фракция не имеет высокого влияния, бонусы отсутствуют!§!"
UKR_land_fund_2a_tt: "Очки земельной реформы: §Y+1§! каждые §Y150 дней§!"
UKR_land_fund_2b_tt: "Очки земельной реформы: §Y+2§! каждые §Y150 дней§!"
UKR_land_fund_2c_tt: "Очки земельной реформы: §Y+3§! каждые §Y150 дней§!"
UKR_land_fund_2d_tt: "Очки земельной реформы: §Y+4§! каждые §Y150 дней§!"
UKR_land_fund_2e_tt: "Очки земельной реформы: §Y+5§! каждые §Y150 дней§!"

UKR_keeping_the_flame: "Сохраняя Огонь"
UKR_keeping_the_flame_desc: "Мы уже достигли многого, но это не значит, что мы можем позволить себе расслабиться. Мы должны активно распространять политическое сознание и знания среди народа. Политическая апатия позволила Гетману править так долго, несмотря на его бездействие, но в нашей народной республике любой потенциальный тиран дважды подумает, прежде чем пытаться захватить власть в личных интересах."
UKR_keeping_the_flame_tt: "Влияние §mправых§!, §lцентристов§! и §Sлевых§! в §lУРДП§! будет сброшено до §Mумеренного§!."
UKR_keeping_the_flame_tt_2: "За каждый уровень §1Идеализма§!:\nОтношения §SУСДРП§! с §lУРДП§! будут §Gулучшены§!."
UKR_keeping_the_flame_tt_3: "Миссия §YСкептицизм в Партии§! теперь будет появляться каждые §Y120 дней§! вместо §Y100 дней§!."

UKR_break_regional_patronage_networks: "Разрушить Сети Регионального Покровительства"
UKR_break_regional_patronage_networks_desc: "Судебная реформа начинает приносить первые плоды. Многие местные магнаты, чьё богатство и влияние были построены на гнилых основах Гетманата, теперь сталкиваются с заслуженным преследованием. Они больше не смогут скрываться за коррумпированными судами и небрежными юридическими лазейками: меч республиканской справедливости найдёт и накажет любого нарушителя."

UKR_centralised_security_apparatus: "Централизованная Система Безопасности"
UKR_centralised_security_apparatus_desc: "Для защиты всей республики наши силы безопасности должны быть организованы рационально и упорядоченно. Стандарты оборудования, обучения и кадрового состава будут единообразны по всей стране. Кроме того, местные отделения Народной Милиции будут подчиняться прежде всего республиканским властям, при этом региональные органы власти будут иметь ограниченное влияние на их деятельность."

UKR_delegate_control_over_peoples_militia: "Передать контроль над Народной Милицией"
UKR_delegate_control_over_peoples_militia_desc: "Местные власти, наделённые доверием населения, которое они представляют, лучше всего подходят для надзора за вопросами региональной безопасности. Чрезмерное вмешательство из столицы только затруднит их способность к оперативным и решительным действиям. Кроме того, жёсткий контроль государственных органов над местными делами был одной из характеристик тирании Гетмана — и мы не должны прибегать к тем же постыдным практикам против собственного народа."
UKR_delegate_control_over_peoples_militia_tt: "За каждый уровень §1Идеализма§! национальный дух будет модифицирован:\nПроцент фабрик, выпускающих товары народного потребления: §Y-3.0%§!"

UKR_politically_neutral_force: "Политически Нейтральная Сила"
UKR_politically_neutral_force_desc: "Украинская армия не должна зависеть от какой-либо политической идеологии, а просто быть готовой защищать нашу территорию и независимость в любое время. Некоторые говорят, что идейно мотивированные солдаты сражаются лучше в сложных условиях, но они одинаково опасны для республиканских институтов и могут стать угрозой в будущем. Наши люди будут сражаться только за Украину."

UKR_true_peoples_army: "Настоящая Народная Армия"
UKR_true_peoples_army_desc: "Против чего мы боролись с Гетманом, если не за демократию, народный суверенитет и благополучие всей Украины? Чтобы наши бойцы могли наилучшим образом защищать нашу землю, они будут проникнуты республиканскими и демократическими ценностями. Только так мы сможем воспроизвести ту же ярость и пыл, которые так ярко проявились во время Антигетманского восстания."
UKR_petliura_and_udovychenko_buffs: "§YСимон Петлюра§!, §YАлександр Удовиченко§!:\nДобавлено ко всем навыкам: §G1§!"
UKR_true_peoples_army_tt: "За каждый уровень §1Идеализма§! национальный дух будет модифицирован:\nСкорость восстановления дивизий: §G+2.0%§!\nОрганизация дивизий: §G+1.0%§!"

 UKR_progressive_tax_policy: "Прогрессивная налоговая политика"
 UKR_progressive_tax_policy_desc: "Вот уже несколько десятилетий разрыв в благосостоянии между беднейшими и богатейшими слоями населения поразительно велик. В то время как голодающие крестьяне едва сводят концы с концами, жадные олигархи на самом верху отказываются дать им даже одну гривну. Так больше продолжаться не может. Отныне каждый гражданин этой страны должен внести свою лепту."
 UKR_progressive_tax_tt: "Счет земельной реформы увеличивается на §Y+1§! каждые §Y70 дней§!"
UKR_progressive_tax_tt_2: "Очки земельной реформы: §Y+4§! каждые §Y150 дней§!"
UKR_progressive_tax_policy_tt: "Если §lУРДП§!-§SЛевые§! имеют §Gвысокое§! влияние, мы вместо этого получим:"
UKR_progressive_tax_policy_tt_2: "Эффекты §Gулучшены§! благодаря высокому влиянию §lУРДП§!-§SЛевые§!."
UKR_progressive_tax_policy_tt_3: "За каждый уровень §1Идеализма§! мы получим дополнительное:\nИзменение Индустриального Счета: §Y+2§!"

 UKR_expansion_of_kooptsentr: "Расширение Коопцентра"
 UKR_expansion_of_kooptsentr_desc: "Коопцентр Украинского центрального кооперативного комитета является, по сути, центральной организацией земельных кооперативов. Его задача - поддержка крестьян в создании кооперативных хозяйств, распространение кооперативной идеологии, финансовая и юридическая помощь кооперативным фермерам."

 UKR_strike_down_right_wing_extremists: "Нанести удар по правым экстремистам"
 UKR_strike_down_right_wing_extremists_desc: "Даже спустя столько времени некоторые реакционеры продолжают испытывать неприязнь к нашему \"социалистическому\" режиму. Они участвуют в антидемократических организациях, мелкой преступности, создают внешне невинные объединения, служащие политическим прикрытием реакционных целей. С ними надо бороться жестко, но законно."

UKR_nationalization_of_coal_mines: "Национализация Угольных Шахт"
UKR_nationalization_of_coal_mines_desc: "Для стабильности общества крайне важно иметь доступный уголь и зерно; холодные и голодные люди быстро возводят баррикады. Только под контролем государства мы сможем обеспечить достаточное количество дешёвого угля как для граждан, так и для бизнеса."
UKR_nationalization_of_coal_mines_tt: "Эффекты §SУСДРП§! теперь дают:\n§GСотрудничество§!: Промышленная оценка §H+2§! каждые §H150 дней§!\n§CПодатливые§!: Промышленная оценка §H+3§! каждые §H150 дней§!\n"
UKR_nationalization_of_coal_mines_tt_2: "Каждый уровень §1Идеализма§! дает дополнительные:\nИзменение промышленной оценки: §Y+3§!\nБазовая стабильность: §G+2.00%§!.\n"

UKR_absorb_forestry_companies: "Поглощение Лесных Компаний"
UKR_absorb_forestry_companies_desc: "Леса являются национальным ресурсом, принадлежащим всем украинцам, а не только землевладельцам. Скандинавские страны должны стать для нас моделью: мы должны создать Государственную Лесную Компанию, которая будет управлять национализированными лесами и решать, как их использовать наилучшим образом."
UKR_absorb_forestry_companies_tt: "Эффекты §SУСДРП§! теперь дают:\n§GСотрудничество§!: Оценка земельной реформы §H+3§! каждые §H150 дней§!\n§CПодатливые§!: Оценка земельной реформы §H+4§! каждые §H150 дней§!\n"
UKR_absorb_forestry_companies_tt_2: "Эффекты §lУРДП§! теперь дают:\n§GСотрудничество§!: Оценка земельной реформы §H+3§! каждые §H150 дней§!\n§CПодатливые§!: Оценка земельной реформы §H+4§! каждые §H150 дней§!\n"
UKR_absorb_forestry_companies_tt_3: "Эффекты §SУСДРП§! теперь дают:\n§CПодатливые§!: Оценка земельной реформы §H+4§! каждые §H150 дней§!"

UKR_municipalize_private_institutions: "Муниципализация Частных Институтов"
UKR_municipalize_private_institutions_desc: "Местные органы власти имеют личную заинтересованность в заботе о своих гражданах, в отличие от частных предприятий, которые в первую очередь преследуют прибыль. Они должны быть реорганизованы, чтобы функционировать в рамках муниципального управления."

UKR_prosperity_under_state_control: "Процветание Под Государственным Контролем"
UKR_prosperity_under_state_control_desc: "Государственный контроль позволяет принимать экономические решения экспертам без учета стремления к прибыли. Вместо этого экономика будет управляться в соответствии с теориями наших лучших экономистов и администраторов."
UKR_prosperity_under_state_control_tt: "Эффекты §SУСДРП§! теперь дают:\n§OБезразличный§!: Базовая эффективность производства: §G+1.00%§!\n§GСотрудничество§!: Базовая эффективность производства: §G+3.00%§!\n§CAдекватные§!: Базовая эффективность производства: §G+5.00%§!"

UKR_introduce_worker_self_management: "Ввести самоуправление рабочих"
UKR_introduce_worker_self_management_desc: "Одним из определяющих принципов рабочего движения является предоставление рабочим власти в принятии решений на их рабочих местах. Через введение производственных советов это может быть реализовано в управляемом формате."
UKR_introduce_worker_self_management_req: "Влияние §lУРДП§!-§SЛевых§! находится на уровне §GВысокое§!, а влияние §lУРДП§!-§mПравых§! на уровне §MУмеренное§! или §PНизкое§!"
UKR_workers_self_management_tt: "За каждый уровень §1Идеализма§!:\nНациональный дух будет изменен:\nБазовая эффективность производства: §G+3.00%§!\nНацдух будет продлен на §Y25§! дней."

UKR_the_path_of_parliamentary_reformism: "Путь парламентского реформизма"
UKR_the_path_of_parliamentary_reformism_desc: "Некоторые считают, что равенство невозможно достичь через парламентские, буржуазные методы, но мы считаем иначе. Без парламентализма нет надлежащего народного представительства, а без разнообразия мнений невозможно серьезное рассмотрение предложенных политик."
UKR_the_path_of_parliamentary_reformism_tt_3: "Если у нас есть §Y+3§! или больше §1Идеализма§!, мы вместо этого получим:"
UKR_the_path_of_parliamentary_reformism_tt_4: "Если у нас есть §Y+2§! или меньше §1Идеализма§!, мы вместо этого получим:"
UKR_the_path_of_parliamentary_reformism_tt_5: "Решение £GFX_decision_icon_small §YПодчеркнуть приверженность принципам§! будет стоить на £GFX_pol_power §Y25§! политической власти §Gменьше§!."

UKR_create_the_presidential_office: "Президент для народа"
UKR_create_the_presidential_office_desc: "Президентская канцелярия черпает свою легитимность не из политических сделок в Зборах, а напрямую от украинского народа, который выбирает президента. Этот народный мандат позволит канцелярии служить противовесом парламенту. Хотя президентские полномочия будут ограниченными, они все же укрепят исполнительную ветвь власти, позволяя смягчать последствия возможных законодательных тупиков."
UKR_cuck_urdp_right_tt: "Негативные эффекты §lУРДП§! от прихода к власти §lУРДП§!-§mПравых§! будут §Gудалены§!."
UKR_dolenko_secretary: "§lУРДП§!-§mПравые§! взяли под контроль нашего младшего партнера по коалиции."
UKR_create_the_presidential_office_tt: "За каждый уровень §1Идеализма§! черта будет изменена:\nЕжедневное получение политической власти: §G+0.05§!\nСтоимость политических советников: §G-5%§!\nСтоимость Высшего командования: §G-5%§!\nВоенная поддержка: §G+5.00%§!"

UKR_our_own_industrial_revolution: "Наша собственная промышленная революция"
UKR_our_own_industrial_revolution_desc: "Индустриализация России была неравномерной и контролировалась приверженцами капитализма laissez-faire. Царский режим и позже Гетман оставили нам промышленность, построенную и принадлежащую иностранцам. Для истинного национального самоопределения мы должны наконец начать нашу собственную промышленную революцию, управляемую украинскими инженерами и служащую украинским потребителям."
UKR_our_own_industrial_revolution_tt: "За каждый уровень §1Идеализма§! мы получим дополнительно:\nСтоимость промышленных проектов будет §Yна 5§! политической власти §Gменьше§!.\nПроекты будут завершаться §Yна 10§! дней §Gбыстрее§!."
UKR_our_own_industrial_revolution_tt_2: "Стоимость промышленных проектов будет §Yна 15§! политической власти §Gменьше§!.\nПроекты будут завершаться §Yна 30§! дней §Gбыстрее§!."

UKR_bolster_the_utsentrprof: "Укрепить Уцентрпроф"
UKR_bolster_the_utsentrprof_desc: "Уцентрпроф, или Всеукраинский Центральный Совет Профсоюзов, служит основной организацией, координирующей украинские профсоюзы. Мы поддерживаем с ними дружеские отношения, и через увеличение членства в профсоюзах, связанных с Уцентпрофом, мы можем легче договариваться с рабочими и снижать влияние более радикальных профсоюзов."
UKR_bolster_the_utsentrprof_tt_2: "За каждый уровень §1Идеализма§! национальный дух будет изменен на:\nПрирост политической власти: §G+2%§!\nБазовая эффективность производства: §G+2.00%§!"
UKR_bolster_the_utsentrprof_tt_4: "Решения по индустриализации начнут увеличивать популярность §SСоциал-демократов§!."

