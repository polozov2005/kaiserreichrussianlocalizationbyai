### SocLib Hetmanate Tooltips and Descriptions ###
 UKR_parliamentary_hetmanate: "Путь к парламентаризму"
 UKR_parliamentary_hetmanate_desc: "Данило Скоропадский стремится продолжить переговоры с ВДД и провести необходимые реформы. К сожалению, это вызвало значительный гнев со стороны антипарламентских правых, которые внезапно увидели, что их власть ускользает. Для того чтобы процесс парламентаризации начался и закончился гладко, с ними необходимо разобраться, пока реформы §SВДД§! медленно внедряются в жизнь.\n\nДля того, чтобы сфокусироваться на снижении силы оппозиции, сила §SВДД§! должна быть достаточно высокой. Для проведения реформ ВДД сила §Pконсервативной оппозиции§! должна быть достаточно низкой.\n\nТекущая сила §SВДД§!: [UKR_government_strength_variable_loc]\n\n §PКонсервативной оппозиции§!: [UKR_opposition_strength_variable_loc]"

