UKR_mykola_kovalevskyi_trait: "Изменяет черты вашего §YГлавы правительства§!:\n§CМикола Ковалевский§! теперь будет иметь изменяющиеся эффекты, зависящие от популярности §Sсоциал-демократов§!. Текущий эффект:\n - Стабильность: [?party_popularity@social_democrat|=%+]"
UKR_pavlo_khrystiuk_trait: "Изменяет черты вашего §YГлавы правительства§!:\n§CПавло Христюк§! будет иметь изменяющиеся эффекты, зависящие от популярности §rсиндикализма§!. Текущий эффект:\n - Производительность на фабриках: [?party_popularity@syndicalist|=%+]"
UKR_volodymyr_chekhivskyi_trait: "Изменяет черты вашего §YГлавы правительства§!:\n§CВолодимир Чеховский§! будет иметь изменяющиеся эффекты, которые будут соотноситься с половиной вашей текущей популярности §Rрадикального социализма§!. Текущий эффект:\n - Скорость исследования: [?temp|=%+]"
