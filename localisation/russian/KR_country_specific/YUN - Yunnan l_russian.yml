##Russian Theorist Mission
 YUN_RUS_theorist: "Русская военная миссия"
 YUN_RUS_theorist_desc: "§YБиография:§! §LВ соответствии с договоренностями, достигнутыми между правительствами России и Юньнани, множество русских военных советников было отправлено для помощи в развитии армии Дянь. Номинально возглавляемая русским ветераном Петром фон Глазенапом, служащим главной связью между Россией и Китаем, миссия стремится интегрировать современные русские методы на поля сражений Китая.\n\nДругими ключевыми фигурами миссии являются Георгий Эльфенгрен, идеологический организатор армии, нацеленный на подчеркивание идеологической чистоты в войне, и Всеволод Иванов, известный кавалерийский наставник, писатель и известный евразиец, который намерен привить китайскому солдату мышление «Тотальной войны». Номинально аполитичная военная миссия, ее члены рассматривают себя вне политических дрязг китайцев и почти полностью сосредоточены на военных аспектах дела китайской армии.§!"

##Yunnan Branch of the Chinese Syndicalist Party Characters (YSP)
 #王复生
 YUN_wang_fusheng: "Ван Фушэн"
 YUN_wang_fusheng_bio: "Получив стандартное образование в Западной Юньнани, Ван Фушэн покинул свою внутреннюю провинцию, чтобы поступить в подготовительный класс гуманитарных наук Пекинского университета в 1918 году, а в 1920 году он поступил на факультет французской литературы. Во время своего пребывания в Пекине Ван начал заигрывать с очарованием синдикализма, вступив в контакт с теоретиками синдикализма, такими как Дэн Чжунся, Ли Дачжао и другими. В том же году под руководством Ли Дачжао вместе с 19 другими Ван помог инициировать первую в Китае исследовательскую группу синдикализма — Исследовательское общество синдикалистской теории Пекинского университета. Возглавляя группу французского перевода, Ван перевел множество революционных теорий, появившихся во Франции после ее синдикалистской революции. Вступив в Пекинский социалистический союз молодежи, основанный Ли Дачжао, Ван в конечном итоге был принят в члены Китайской синдикалистской партии в 1921 году.\n\nПозже преподавая в провинции Шэньси из-за плохих финансов, Ван стремился постоянно распространять синдикалистские идеи и организовывать работу от имени КСП. Вернувшись в Пекинский университет для продолжения учебы, он и его брат инициировали Общество «Новая Юньнань», издавая еженедельный журнал «Реформа». Участвуя в Движении 30 мая, он был отправлен в Гуанчжоу в 1926 году для работы в Политическом отделе Национально-революционной армии. Отправившись в Куньмин для организации свержения Тан Цзияо, Ван помог организовать Временный партийный комитет Юньнаньской КСП. Сотрудничая с такими людьми, как его брат Ван Дэсань и другими левыми фигурами в Юньнани, Ван Фушэн продолжает отстаивать дело рабочих."
 YUN_wang_fusheng_leader_desc: "§YРодился:§! 27 сентября 1896 года в уезде Сянъюнь, провинция Юньнань, Великая Цин\n§YБиография:§! §L$YUN_wang_fusheng_bio$§!"
 YUN_wang_fusheng_commander_desc: "§YРодился:§! §L27 сентября 1896 года в уезде Сянъюнь, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §rЮньнаньская синдикалистская партия§!\n§YБиография:§! §L$YUN_wang_fusheng_bio$§!"

 #李鑫
 YUN_li_xin: "Ли Синь"
 YUN_li_xin_advisor_desc: "§YРодился:§! §L12 октября 1897 года в уезде Лунлин, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §rЮньнаньская синдикалистская партия§!\n§YБиография:§! §LРодившийся в бедной крестьянской семье в сельской Юньнани, Ли Синь и несколько его друзей шли пешком более месяца, чтобы наконец прибыть в Куньмин, намереваясь поступить в провинциальную среднюю школу. Под влиянием революционных и прогрессивных идеалов Ли Синь посвятил себя попыткам искоренить неравенство в Китае. Окончив школу в 1919 году, Ли был принят на факультет сельского хозяйства Юго-Восточного университета в Нанкине. Переведясь на факультет садоводства Пекинского сельскохозяйственного университета, Ли Синь попал под влияние идей синдикализма, осознав, что только через революцию можно устранить угнетение и эксплуатацию.\n\nВ 1925 году Ли Синь вступил в Синдикалистскую партию Китая, участвуя в формировании Общества «Новая Юньнань» с Ван Дэсанем и Ван Фушэном, а также в создании журнала «Реформа». Участвуя в Движении 30 мая, Ли Синь поступил на службу в Политический отдел Национально-революционной армии и был назначен в Юньнань для помощи в формировании там Синдикалистского союза молодежи. Активно работая с Ван Фушэном, Ли Синь использовал свои аграрные навыки, чтобы проповедовать более дружественное крестьянам послание низшим классам Юньнани.§!"

##NRA 3rd Army Leftists (3AL)
 #朱德
 YUN_zhu_de: "Чжу Дэ"
 YUN_zhu_de_bio: "Родившийся в семье арендатора-хакка в Сычуани, Чжу Дэ выполнял случайные работы и участвовал в тайном обществе Гэлаохуэй, изучая восстание Тайпинов и его влияние на Китай. Готовясь к поступлению на гражданскую службу, один из наставников Чжу был преданным сторонником Кан Ювэя, и поэтому Чжу начал подпадать под очарование революционных настроений. Сдав уездные и префектурные экзамены, отмена экзаменационной системы в 1905 году заставила уже разочарованного традициями Чжу поступить в Куньминский военный университет. Привлеченный новым милитаризмом, Чжу поступил в Куньминскую военную академию как один из немногих принятых студентов из Сычуани.\n\nОкончив специальный ускоренный класс после участия в восстании Двойной девятки, Чжу Дэ все больше становился одним из протеже Цай Э. Служа военным инструктором, Чжу сражался в Первой армии Цай Э во время Войны в защиту республики, а позже в Войне в защиту конституции. В сговоре с Гу Пиньчжэнем с целью свержения Тан Цзияо, Гу попытался присвоить средства для финансирования поездки в Европу. С возвращением Тан Цзияо Чжу бежал в Шанхай и на средства Цзинь Ханьдина отправился в Европу с Сунь Бинвэнем.\n\nУчась в Париже, Чжу встретил Чжоу Эньлая, Чэнь И и Ли Лисаня, формально, хотя и тайно, вступив в Китайскую синдикалистскую партию в 1922 году. Позже, учась в Германии, он был очарован европейской военной теорией. Вернувшись в Китай для участия в Северном походе, он безуспешно пытался мобилизовать Ян Сэня присоединиться к революционному делу. Создав Корпус подготовки офицеров 3-й армии НРА, Чжу Пэйдэ последовал за остальной частью 3-й армии в Гуйчжоу. Считаясь знаменитым политическим тяжеловесом Юньнани, Чжу Дэ провел остаток межвоенного периода, разрабатывая военные теории, формируя свою группу левых офицеров и вступая в доктринальные споры с Бай Чунси."
 YUN_zhu_de_leader_desc: "§YРодился:§! 1 декабря 1886 года в уезде Илун, провинция Сычуань, Великая Цин\n§YБиография:§! §L$YUN_zhu_de_bio$§!"
 YUN_zhu_de_sic_desc: "§YРодился:§! §L1 декабря 1886 года в уезде Илун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §RЛевые 3-й армии§!\n§YБиография:§! §L$YUN_zhu_de_bio$§!"

 #陳毅
 YUN_chen_yi: "Чэнь И"
 YUN_chen_yi_high_command_desc: "§YРодился:§! §L26 августа 1901 года в уезде Лэчжи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §RЛевые 3-й армии§!\n§YВоенная карьера:§! §LРодившийся в семье мелкого землевладельца в Сычуани, Чэнь И поступил в Чэндуский технологический институт в возрасте 15 лет. Жизненный путь Чэня решительно изменился, когда он переехал в Париж в 1919 году по программе работы и учебы. Именно там Чэнь встретил Чжоу Эньлая и Цай Хэсэня и познакомился с марксистскими идеями. По возвращении в Китай Цай привел Чэня в Китайскую синдикалистскую партию в качестве члена ее молодежной лиги.\n\nВ 1923 году он встретил Янь Чанъи и Сяо Чжэньшэна в Китайско-французском университете в Пекине, став секретарем отделения Китайской синдикалистской партии в этом учреждении. В 1924 году Чэнь вступил в Ассоциацию исследования грамотности под руководством Мао Дуня и был избран президентом школьного союза своего университета. После Первой реорганизации Гоминьдана и создания Китайского объединенного фронта Чэнь стал секретарем Лиги КСП Пекинской студенческой федерации и тесно сотрудничал с местным отделением Гоминьдана.\n\nПосле инцидента в Дагукоу, когда японские военные корабли обстреляли форты Таку в поддержку Фэнтяньской клики, а Гоминьцзюнь ответил установкой морских мин, Чэнь принял участие в крупной акции протеста против Ультиматума восьми держав 18 марта 1926 года, где державы требовали от китайских милитаристов демилитаризации порта в соответствии с Заключительным протоколом, и он пережил последующие правительственные репрессии, в результате которых было убито более 40 студентов и граждан, известные как Бойня 18 марта. После назначения секретарем Северного районного комитета Китайской синдикалистской партии Чэнь вернулся в Сычуань, чтобы служить в военной роли в грядущей китайской революции под началом Чжу Дэ. Однако судьба не благоволила революционерам, немецкое вмешательство обрушило национальную революцию, как карточный домик. Чэнь эвакуировался в Гуйчжоу под началом Чжу Дэ в составе 3-й армии во время хаоса. Несмотря на неудачи, понесенные Гоминьданом, Чэнь остается уверенным, что социалистическая революция произойдет в Китае, так или иначе.§!"

 #曾萬鍾
 YUN_zeng_wanzhong: "Цзэн Ваньчжун"
 YUN_zeng_wanzhong_commander_desc: "§YРодился:§! §L1894 год, уезд Дагуань, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §RЛевые 3-й армии§!\n§YБиография:§! §LПоступив в Куньминскую военную академию в юности, Цзэн Ваньчжун был одноклассником Чжу Дэ и Чжу Пэйдэ и, присоединившись к революционному делу, также участвовал в восстании Двойной девятки в 1911 году. Участвуя в Войне в защиту республики, Цзэн достиг звания командира батальона, а позже, участвуя в Войне в защиту конституции, он достиг звания командира полка. Включенный в состав Цзингоцзюнь, он помог Гу Пиньчжэню свергнуть Тан Цзияо в 1920-х годах, позже сбежав после возвращения Тан Цзияо.\n\nВступив в «Юньнаньскую армию в Гуандуне» в 1923 году, Цзэн сражался в Восточных походах и при подавлении восстания Торгового корпуса, завоевав внимание и известность. Будучи интегрированным в 3-ю армию Чжу Пэйдэ в 1926 году, он повел свой 19-й полк в Северный поход, сражаясь достаточно доблестно, чтобы получить личную благодарность от Чан Кайши.\n\nВедя свои войска в боевом отступлении в запланированный район укрытия Гуанси-Гуйчжоу, Цзэн начал медленно сближаться с развивающейся фракцией Чжу Дэ внутри 3-й армии из-за того, что он рассматривал как неумелое руководство Чжу Пэйдэ.§!\n\n§YПримечания: Простой и честный человек, Цзэн не владеет землей и не имеет сбережений. Как сообщается, он ненавидит любые формы коррупции и презирает вымогательство, оставаясь неподкупной фигурой в армии.§!"

 #唐淮源
 YUN_tang_huaiyuan: "Тан Хуайюань"
 YUN_tang_huaiyuan_high_command_desc: "§YРодился:§! §L1886 год, уезд Цзянчуань, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §RЛевые 3-й армии§!\n§YБиография:§! §LПотеря отца в юном возрасте не выбила из колеи Тан Хуайюаня, который сдал провинциальный экзамен в 1909 году, будучи принятым в Куньминскую военную академию. Одноклассник таких людей, как Чжу Дэ и Цзинь Ханьдин, он стал близким названым братом с ними обоими. Под влиянием революционных идеалов, распространяемых по указанию Ли Гэньюаня в Куньмине, Тан вступил в Тунмэнхой в 1910 году. Участвуя в юньнаньском восстании, смежном с Синьхайским, восстании Двойной девятки (девятый день девятого лунного месяца), Тан был выбран одним из 100 выдающихся студентов для формирования специального класса вместе с такими людьми, как Чжу Пэйдэ, Чжу Дэ и Цзинь, чтобы получить уникальную подготовку и быть повышенным до командира взвода в том же году.\n\nСлужа под началом Цай Э в Войне в защиту республики, Тан продемонстрировал достойные результаты в бою, быстро получив звание командира бригады к 1918 году. После внутренней борьбы в Юньнаньской армии Тан Хуайюань поддержал попытку Гу Пиньчжэня свергнуть Тан Цзияо, позже бежав после возвращения Тан Цзияо в 1922 году. Живя в Шанхае с Чжу и Цзинем, они встретились с доктором Сунем в Гуандуне, причем Чжу уехал в Европу учиться на средства Цзиня.\n\nВступив в 3-ю армию Национально-революционной армии, Тан преподавал в офицерской школе, прежде чем был вынужден отступить, так как Северный поход провалился. Снова оказавшись в неудобной близости к Тан Цзияо, Тан Хуайюань и Цзинь Ханьдин снова объединились с Чжу Дэ после его возвращения из Европы, причем Тан стал ключевым членом неформальной группы Чжу Дэ внутри 3-й армии.§!"

##Civil Engineering Clique (CEC)
 #陳誠
 YUN_chen_cheng: "Чэнь Чэн"
 YUN_chen_cheng_leader_desc: "§YРодился:§! 4 января 1898 года в уезде Цинтянь, провинция Чжэцзян, Великая Цин\n§YБиография:§! §LАмбициозный, престижный, некоторые назвали бы его высокомерным, поборник Гоминьдана, жизнь Чэнь Чэна красочна и полна опыта. Пробиваясь через образование, несмотря на обстоятельства, он был брошен в мир военных через поступление в Баодинскую военную академию в юности.\n\nНедолго прослужив в Гуандунской армии в 1920 году, Чэнь вступил в Гоминьдан, а затем вернулся в Баодин, чтобы закончить учебу. Окончив ее, он был нанят своим наставником Дэн Яньда в качестве лейтенанта-адъютанта. Печально известный тем, что был ранен, защищая доктора Суня, Чэнь попал в поле зрения Чан Кайши. После создания Вампу Сунь, Чан и Дэн поручились за зачисление Чэня туда.\n\nСтудент, инструктор и капитан команды, Чэнь отличился в подвигах Национально-революционной армии 1920-х годов. Но без Чана или Дэна Чэнь оказался оттеснен Хэ Инцинем. Теперь, заменив старого Генералиссимуса, широкое понимание Чэнем земельной реформы и его псевдосоциалистические заслуги, как ни странно, повернули «Новых правых» влево.§!\n\n§YПримечания: Отмечается, что он ведет особенно спартанский образ жизни, лишенный удовольствий. Точно так же он набожно выступает против коррупции.§!"
 YUN_chen_cheng_sic_desc: "§YРодился:§! §L4 января 1898 года в уезде Цинтянь, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §SКлика гражданского строительства§!\n§YБиография:§! §LИзначально обреченный быть домашним слугой, чтобы помогать своей семье, Чэнь Чэн взял дело в свои руки, умудрившись брать частные уроки дома в течение года, а затем проехав 100 миль, чтобы подать документы в различные школы в окрестностях. Закончив образование, Чэнь Чэн намеревался поступить в Сикан Гакко в Японии, но экзаменатор отказал ему из-за его плохих физических возможностей. Используя хитрость, Чэнь подал документы в Баодинскую военную академию, хотя сначала ему было отказано во вступлении из-за плохих результатов тестов и роста, он снова проявил настойчивость, используя связи со старым другом семьи, будучи принятым в артиллерийскую секцию Баодина.\n\nПосле начала первой войны Чжили-Аньхой Чэнь отправился на юг, чтобы служить в Гуандунской армии, попутно вступив в Гоминьдан, и как только Баодин возобновил занятия, Чэнь вернулся, чтобы закончить образование. Окончив ее в 1922 году, Чэнь был нанят Дэн Яньда — с которым у него были отношения ученик-учитель — чтобы служить лейтенантом-адъютантом последнего. Раненый в грудь при защите доктора Суня, его храбрость привлекла внимание некоего Чан Кайши, который навестил его в больнице, и после создания Вампу Сунь, Чан и Дэн поручились за зачисление Чэня туда.\n\nСлужа студентом, инструктором и капитаном команды, Чэнь с отличием сражался в Восточных походах, получив замечательную похвалу от Чана, даже заработав прозвище «Три пушки». Участвуя в Северном походе, Чэнь стал командиром дивизии на пике военных успехов НРА, но с немецким вмешательством и последующим убийством его благодетеля Чана Хэ Инцинь уволил Чэнь Чэна с его поста, когда изгнанники НРА прибыли в Гуйчжоу. Однако, проявляя упорство, Чэнь провел следующие несколько лет, работая на военных административных должностях, и создавая свою собственную клику внутри Вампу, известную как «Гражданское строительство», которая поддерживает смесь идеологий обоих его наставников, Чан Кайши и Дэн Яньда.§!\n\n§YПримечания: Отмечается, что он ведет особенно спартанский образ жизни, лишенный удовольствий. Точно так же он набожно выступает против коррупции.§!"

 #羅卓英
 YUN_luo_zhuoying: "Ло Чжоин"
 YUN_luo_zhuoying_sic_desc: "§YРодился:§! §L19 марта 1896 года в уезде Дабу, провинция Гуандун, Великая Цин§!\n§YПриверженность:§! §SКлика гражданского строительства§!\n§YБиография:§! §LУроженец хакка, Ло Чжоин получил стандартное образование, а затем подал документы в Баодинскую военную академию в 1918 году. Поступив в восьмую артиллерийскую секцию академии, Ло в конечном итоге стал лучшим другом и названым братом Чэнь Чэна и Чжоу Чжижоу. Окончив ее в июле 1922 года, Ло вернулся в свой родной город, чтобы служить научным руководителем и директором, прежде чем был рекомендован политиком Гоминьдана Цзоу Лу на должность главного штабного офицера армии Чаомэй, но Ло немедленно ушел в отставку. Настоятельно рекомендованный Чэнь Чэном для вступления в недавно основанную Военную академию Вампу, Ло проскользнул туда в конце 1924 года, начав отношения, в которых, куда бы ни поднимался Чэнь Чэн, Ло Чжоин обязательно следовал за ним по пятам.\n\nСлужа прямым подчиненным Чэнь Чэна во время Восточного похода, способность Ло командовать артиллерией снискала ему большую похвалу в Национально-революционной армии. С началом Северного похода артиллерийский батальон Чэнь Чэна сражался под командованием командира 1-й армии Хэ Инциня, войдя в Фуцзянь и Чжэцзян. Ненадолго перенаправленная для освобождения Гуанчжоу от немецкого вторжения, артиллерия Чэня и Ло мало что сделала, чтобы переломить ход событий, и после катастрофической внутренней борьбы, убийства Чан Кайши и хаотичного отступления в Гуйчжоу, Чэнь Чэн был переведен в политический отдел Хэ Инцинем, в то время как Ло заменил его на посту командира артиллерии 1-й армии.\n\nВыдающийся стратег и тактик, Ло работал в тандеме с административными способностями Чэнь Чэна, создавая Клику гражданского строительства в рамках НРА.§!\n\n§YПримечания: Лучший друг и его правая рука, Ло Чжоин известен как «Карманный мозговой центр», что контрастирует с прозвищем Чэнь Чэна «Карманный генеральный директор».§!"

 #胡璉
 YUN_hu_lien: "Ху Лянь"
 YUN_hu_lien_commander_desc: "§YРодился:§! §L13 ноября 1907 года в уезде Хуасянь, провинция Шэньси, Великая Цин§!\n§YПриверженность:§! §SКлика гражданского строительства§!\n§YВоенная карьера:§! §LХотя он вырос в бедной семье, Ху Лянь проявил необычайный талант в образовании, усердно учась. Решив вступить в армию, Ху Лянь начал военную карьеру клерком под началом подчиненного Ху Цзинъи. Но вскоре после этого Ху получил письмо от родственника из Гуанчжоу, призывающее его поступить в Военную академию Вампу. Поступив в Вампу в 1925 году, Ху Лянь вскоре закончил ее как раз вовремя, чтобы принять участие в Восточных походах. Впоследствии отправившись в Северный поход, Ху Лянь сражался в качестве командира роты, но в конечном итоге, оказавшись во власти немецкого вмешательства, Ху и его начальство быстро бежали в провинцию Гуйчжоу.\n\nСчитающийся одаренным от природы и намного превосходящим своих сверстников в военном командовании, Ху Лянь быстро поднялся после различных стычек, в которых участвовали остатки Национально-революционной армии во время их изгнания в Гуйчжоу, будучи прикрепленным к различным дивизионным и армейским командованиям Чэнь Чэна. Несмотря на относительную молодость, он привлек внимание и покровительство своего начальника, что привело к взлету до небес, свободному от бюрократического противодействия.§!\n\n§YПримечания: Однажды описанный как «хитрый как лиса и свирепый как тигр», Ху Лянь является одаренным командиром, и наряду с такими людьми, как Вэй Лихуан и Ло Чжоин, способствует серьезному значению Клики гражданского строительства в НРА.§!"

 #衛立煌
 YUN_wei_lihuang: "Вэй Лихуан"
 YUN_wei_lihuang_army_chief_desc: "§YРодился:§! §L16 февраля 1897 года в Хэфэе, провинция Аньхой, Великая Цин§!\n§YПриверженность:§! §SКлика гражданского строительства§!\n§YВоенная карьера:§! §LПогрузившись в культурную классику в юном возрасте, Вэй Лихуан недолго служил солдатом в местной армии во время Синьхая, прежде чем стать старшим преподавателем класса военной подготовки. Под влиянием революционных идеалов своего старшего брата Вэй Лихуан присоединился к массовому вооруженному восстанию в Аньхое во время Второй революции. Пройдя обучение в кадетском лагере армии Хубэя, Вэй в конечном итоге оказался в Гуандунской армии в 1915 году. Избранный одним из телохранителей доктора Сунь Ятсена в 1917 году, Вэй еще больше укрепил свое понимание Трех принципов, вступив в Гоминьдан. Повышенный за быстрое мышление в борьбе с силами клики Аньхой, Вэй одержал победу во всех военных начинаниях зарождающегося Гоминьдана, преданно служа под началом Сюй Чунчжи.\n\nСражаясь в Восточных походах и восстании Торгового корпуса, Вэй в конечном итоге был интегрирован в 1-ю армию Национально-революционной армии в 1925 году. Под командованием Хэ Инциня в Северном походе Вэй проявил себя как храбрый, решительный и опытный солдат и командир, быстро получив звание командира 14-й дивизии. Когда Северный поход захлебнулся, а Гуанчжоу был захвачен, Вэй Лихуан был одним из немногих командиров НРА, все еще демонстрировавших постоянные военные успехи, но он не смог сдержать наступление Чжили. Следуя за 1-й армией в хаотичном отступлении в Гуйчжоу, Вэй часто использовался в качестве сдерживающей силы, чтобы позволить более слабым подразделениям уйти.\n\nВсегда находясь во власти своего начальника, Вэй Лихуан использовался как один из самых способных командиров НРА, отражая любые посягательства на Гуйчжоу либо Старого Гуйчжоу, либо Старого Гуанси. Не согласный с управлением Хэ Инцинем кликами Вампу и в жесткой оппозиции «Синерубашечникам» Тэн Цзе, Вэй Лихуан нашел общий язык с Чэнь Чэном и его Кликой гражданского строительства, став ее равнодушным членом.§!\n\n§YПримечания: Считающийся многими военным гением, соперничающим с Бай Чунси, Вэй Лихуан получил прозвище Генерал-«Тигр», самый главный из «Пяти тигров» Вампу.§!"

##(New) Political Science Clique (PSC)
 #張羣
 YUN_zhang_qun: "Чжан Цюнь"
 YUN_zhang_qun_bio: "Посещая ускоренный курс Национальной армии Баодина в ранние годы, в 1908 году Чжан Цюнь был отправлен в Японию учиться в Симбу Гакко, где по воле случая стал близким другом и одноклассником вундеркинда Чан Кайши. В том же году Чжан был захвачен революционным течением Китая того времени, вступив в Тунмэнхой, и после начала Синьхая Чжан присоединился к своему другу в борьбе под командованием Чэнь Цимэя. В конечном итоге он служил штабным офицером дивизии Чана. Навсегда связав свои судьбы, Чжан Цюнь сражался с Чаном во Второй революции в 1913 году, и после службы штабным офицером в 1915 году в провинции Чжэцзян, он был завербован Цэнь Чуньсюанем.\n\nОн оказался в правительстве Кантона доктора Сунь Ятсена в 1917 году, в конечном итоге сражаясь в провалившейся революции доктора Суня, прежде чем вернуться домой, чтобы быть нанятым Сюн Кэу в качестве директора Департамента полиции Сычуани. После поражения Сюн Кэу в 1923 году Чжан снова был завербован Чаном, чтобы служить его штабным офицером в 1926 году. Служа генеральным советником и членом Военного комитета, Чжан Цюнь играл приглушенную роль во внутренних распрях Национально-революционной армии. После краха Северного похода и смерти его друга у Чжан Цюня было мало времени на скорбь, так как он последовал за «Правым» Гоминьданом в Гуйчжоу.\n\nПоднявшись на видное положение в гражданском правительстве Гуйчжоу, Чжан Цюнь был мэром Гуйяна с 1929 по 1932 год и в конечном итоге стал служить в Провинциальном правительственном комитете в качестве генерального секретаря. Считающийся лицом Новой клики политической науки, Чжан Цюнь обладает широким влиянием в гражданской бюрократии Гоминьдана.\n\n§YПримечания: Благодаря своему влиянию в партии Чжан Цюнь сумел добиться амнистии для членов Старой Политической науки, таких как Ян Юнтай и Сюн Шихуэй. Благодаря пребыванию Чжан Цюня в клике она получила прозвище «Департамент Нового курса».§!"
 YUN_zhang_qun_leader_desc: "§YРодился:§! 9 мая 1889 года в уезде Хуаян, провинция Сычуань, Великая Цин\n§YБиография:§! §L$YUN_zhang_qun_bio$§!"
 YUN_zhang_qun_commander_desc: "§YРодился:§! §L9 мая 1889 года в уезде Хуаян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §m(Новая) Клика политической науки§!\n§YБиография:§! §L$YUN_zhang_qun_bio$§!"

 #楊永泰
 YUN_yang_yongtai: "Ян Юнтай"
 YUN_yang_yongtai_sic_desc: "§YРодился:§! §L1880 год, город Маомин, провинция Гуандун, Великая Цин§!\n§YПриверженность:§! §m(Новая) Клика политической науки§!\n§YБиография:§! §LРодившийся в богатой семье в городском Гуандуне, Ян Юнтай получил строгое традиционное образование в ранние годы, сдав экзамен на звание ученого Цин в 1897 году. В возрасте 21 года Ян оказался в Высшей школе Гуанчжоу, получая образование западного образца, позже переведясь на учебу в Пекинскую школу политических наук и права. Вернувшись домой после выпуска, Ян стал своего рода местной знаменитостью, известным своим беглым письмом, быстрым мышлением, глубокими аргументами и активными идеями. По мере роста его известности росло и его желание революционных перемен, он написал серию статей, выражающих его поддержку конституционной монархии.\n\nИзбранный во Временное национальное собрание в 1912 году, Ян оказался без работы из-за махинаций Юань Шикая и вступил в контакт с Хуан Сином и доктором Сунь Ятсеном. Посвятив себя Китайской революционной партии Суня, Ян Юнтай служил в Войне в защиту республики и оказался в штабе Ли Лецзюня, назначенным директором Финансового бюро. Став членом-основателем Общества политической науки наряду с такими людьми, как Ли Гэньюань, Ян был назначен директором финансов в Кантонском правительстве доктора Суня 1917 года, но из-за влияния Политической науки он отказался от должности. После махинаций Тан Цзияо и Политической науки Сунь ушел в отставку в гневе, а Ян Юнтай оказался губернатором Гуандуна в 1920 году.\n\nОпасаясь возмездия, Ян бежал к Бэйянскому правительству, а после подкупа Цао Куня Ян оказался в Шанхае, где он оставался до 1927 года. После того как Чан Кайши ушел в отставку в том же году, Ян написал множество писем различным чиновникам Гоминьдана, выражая как свое желание вернуться в политику, так и желание увидеть восстановление Чана. Игнорируемый большинством, Ян использовал свои связи, чтобы найти работу у Ван Боцюня. Заметив его амбиции после отступления в Гуйчжоу, Чжан Цюнь дергал за ниточки, чтобы увидеть, как Ян Юнтай снова поднимется к известности. Считающийся заместителем Чжана, подтверждение Яном его лидерства объединило Старую и Новую клики политической науки.§!"

 #孔祥熙 (HH Kung)
 YUN_kong_xiangxi: "Кун Сянси"
 YUN_kong_xiangxi_advisor_desc: "§YРодился:§! §L11 сентября 1880 года в Тайгу, провинция Шаньси, Великая Цин§!\n§YПриверженность:§! §m(Новая) Клика политической науки§!\n§YБиография:§! §LРодившийся в состоятельной семье банкиров, прямых потомков Конфуция, Кун Сянси отправился в Соединенные Штаты изучать культуру и социальные науки в Оберлинском колледже в Огайо. Он продолжил изучать минералогию в Йельском университете, получив степень магистра физики и химии.\n\nКогда началась Синьхайская революция 1911 года, Кун Сянси возглавил местных студентов и бизнес-группы в Тайгу для поддержания порядка. Находясь в Японии для сбора средств для Китайской революционной партии Сунь Ятсена, он встретил английского секретаря Суня Сун Айлин, старшую сестру семьи Сун. Они поженились в 1914 году и вернулись в Китай, чтобы заниматься бизнесом в Шаньси. Его работа в образовании и бизнесе привлекла внимание губернатора Шаньси Янь Сишаня, который нанял его советником. Работая на Янь Сишаня, Кун Сянси помог продвигать имидж Шаньси как «образцовой провинции» и помог оказать помощь жертвам сильной засухи в 1919 году. Действуя как связной Суня в Северном Китае, Кун установил контакт с генералом Фэн Юйсяном и помог ему запустить Пекинский переворот для свержения Цао Куня и У Пэйфу.\n\nВ 1926 году Кун Сянси отправился в Гуанчжоу, чтобы поддержать Северный поход. Однако, поскольку удача Национально-революционной армии быстро отвернулась, Кун сбежал в Гуйчжоу с остальными правыми членами партии. Он провел последнее десятилетие, обеспечивая поступление финансов в администрацию Гоминьдана в Гуйчжоу. Опасаясь и остерегаясь борьбы партии на Юго-Западе, Кун поддерживал контакт со своим шурином Сун Цзывэнем. Теперь, когда предпочтительная компания технократов и банкиров Гоминьдана Куна наконец-то всплыла на поверхность, он снова предлагает свои услуги революционному делу.§!\n\n§YПримечания: Хотя он связан с Кликой политической науки, известно, что он конфликтовал с более технократическими элементами КПН из-за своего несогласия с экономическим планированием.§!"

 #李根源
 YUN_li_genyuan: "Ли Гэньюань"
 YUN_li_genyuan_sic_desc: "§YРодился:§! §L6 июня 1879 года в уезде Тэнъюэ, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §m(Новая) Клика политической науки§!\n§YБиография:§! §LИзучая традиционную китайскую культуру в юности, Ли все больше удручался слабостью и хрупкостью китайского общества. Взяв дела Китая на себя, Ли Гэньюань питал сильные антицинские настроения с 20 лет. Поступив в японскую Сикан Гакко в 1904 году, Ли присутствовал на учредительном собрании Тунмэнхоя в Токио, а также наладил прочные связи с такими людьми, как Цай Э и Тан Цзияо. Ли вернулся в Юньнань в 1909 году, будучи назначенным заместителем начальника Куньминского военного курса, что было загадочной перспективой для молодого Ли.\n\nПредставив дополнительный список своих товарищей-выпускников Сикан Гакко для перевода в Юньнань, Ли преобразовал Военный курс в современную Куньминскую академию, став ее первым директором. Превратив ее в рассадник революционных настроений, Ли Гэньюань пропагандировал Три принципа своим студентам, просил Ли Лецзюня служить наставником и в конечном итоге сговорился с Цай Э начать восстание Двойной девятки в тандеме с Синьхаем. Служа на различных должностях по прихоти Цая, Ли Гэньюань рассматривался как единственный потенциальный равный Цай Э в Юньнани, и все же он был увезен в 1913 году, чтобы служить в Палате представителей Бэйяна. Почти сразу отмеченный Юань Шикаем для смерти, Ли бежал в объятия Цэнь Чуньсюаня, доктора Суня и Хуан Сина.\n\nОрганизовав возвращение Цай Э в Куньмин в 1915 году, Ли в конечном итоге стал губернатором Шэньси в 1917 году, а позже командующим Юньнаньской армией, расквартированной в Гуандуне. Выступая против подкупа Цао Куня в 1923 году, Ли ушел из правительства Бэйяна, выбрав жизнь размышлений и уединения со своей семьей. Вернувшись в центр внимания после десятилетия отставки, заслуги Ли Гэньюаня снискали ему большое уважение и враждебность со стороны многих в Юньнани.§!\n\n§YПримечания: Он последний из вымирающей породы революционеров, но навсегда остается верен своему девизу: «Терпи трудности, в которых заключается основа реформ».§!"
 YUN_li_genyuan_leader_desc: "§YРодился:§! 6 июня 1879 года в уезде Тэнъюэ, провинция Юньнань, Великая Цин\n§YБиография:§! §LЛи Гэньюань все больше удручался слабостью и хрупкостью китайского общества в своей юности. Поступив в японскую Сикан Гакко в 1904 году, Ли присутствовал на учредительном собрании Тунмэнхоя в Токио, а также наладил прочные связи с такими людьми, как Цай Э и Тан Цзияо. Ли вернулся в Юньнань в 1909 году, будучи назначенным заместителем начальника Куньминского военного курса.\n\nПредставив дополнительный список своих товарищей-выпускников Сикан Гакко для перевода в Юньнань, Ли преобразовал Военный курс в современную Куньминскую академию, став ее первым директором. Превратив ее в рассадник революционных настроений, Ли пропагандировал Три принципа своим студентам, просил Ли Лецзюня служить наставником и в конечном итоге сговорился с Цай Э начать восстание Двойной девятки в тандеме с Синьхаем. Служа на различных должностях по прихоти Цая, Ли рассматривался как единственный потенциальный равный Цай Э в Юньнани, и все же он был увезен в 1913 году, чтобы служить в Палате представителей Бэйяна. Почти сразу отмеченный Юань Шикаем для смерти, Ли бежал в объятия Цэнь Чуньсюаня, доктора Суня и Хуан Сина.\n\nОрганизовав возвращение Цай Э в Куньмин в 1915 году, Ли в конечном итоге стал губернатором Шэньси в 1917 году, а позже командующим Юньнаньской армией, расквартированной в Гуандуне. Выступая против подкупа Цао Куня в 1923 году, Ли ушел из правительства Бэйяна, выбрав жизнь размышлений и уединения со своей семьей. Вернувшись в центр внимания после десятилетия отставки, заслуги Ли Гэньюаня снискали ему большое уважение и враждебность со стороны многих в Юньнани.§!\n\n§YПримечания: Он последний из вымирающей породы революционеров, но навсегда остается верен своему девизу: «Терпи трудности, в которых заключается основа реформ».§!"

 #熊式輝
 YUN_xiong_shihui: "Сюн Шихуэй"
 YUN_xiong_shihui_commander_desc: "§YРодился:§! §L1893 год, уезд Аньи, провинция Цзянси, Великая Цин§!\n§YПриверженность:§! §m(Новая) Клика политической науки§!\n§YВоенная карьера:§! §LПоступив в Нанкинскую армейскую среднюю школу № 4 в 1911 году и вскоре после этого вступив в Китайский Тунмэнхой, Сюн с радостью служил в Синьхайской революции в том же году, позже присоединившись ко второму этапу Баодинской армейской офицерской школы в 1913 году. После выпуска в 1915 году Сюн служил в Юньнаньской армии под покровительством Ли Лецзюня, участвуя как в Войне в защиту республики, так и в революции 1917 года. В 1921 году Сюн был рекомендован Генеральным штабом Гуандунского военного правительства для обучения в Сикан Гакко, и после окончания в 1924 году он вернулся в Китай, чтобы служить директором по образованию в Военной академии Юньнаньской армии в Гуанчжоу, а затем партийным представителем Первой дивизии Национально-революционной армии. Все еще служа ее партийным представителем, когда она была расширена до 14-й армии, Сюн участвовал в полевой службе в качестве командира 1-й дивизии.\n\nПосле провала Северного похода Сюн чудом спасся с остатками своих товарищей по Четырнадцатой армии в Гуйчжоу, где он быстро присоединился к различным административным должностям Чжан Цюня. Глава Департамента безопасности провинции Гуйчжоу, Сюн курировал серию строгих реформ, примененных к местным отрядам безопасности Гуйчжоу, превратив их в псевдовоенные полки.§!\n\n§YПримечания: Известный эксцентрик, Сюн имеет склонность тратить свои деньги на пышные празднества для различных партийных деятелей, устроив одно для Чжан Цюня и его жены, Хэ Инциня, Чэнь Чэна, Хуан Шаохуна и Ли Цзунжэня.\nМолодой и полный энергии, Сюн является одним из немногих членов Клики политической науки, имеющих военный послужной список, хотя из-за его любопытной личности он не самый преданный член.\n\nПримечания: Считается «одаренным интеллектом и огромной энергией», Сюн является одним из ведущих сторонников экономического планирования в КПН.§!"

 #谷正倫
 YUN_gu_zhenglun: "Гу Чжэнлунь"
 YUN_gu_zhenglun_commander_desc: "§YРодился:§! §L1889 год, префектура Аньшунь, провинция Гуйчжоу, Великая Цин§!\n§YПриверженность:§! §LНезависимый§!\n§YБиография:§! §LСтарший из братьев Гу, Гу Чжэнлунь выбрал карьеру военного с юных лет. В 1906 году Гу окончил Гуйчжоускую армейскую начальную школу и продолжил обучение в Хубэйской армейской средней школе. В 1909 году Гу был выбран для обучения за границей в японской Токийской Симбу Гакко, специально созданной для китайских студентов. Во время своего пребывания в Японии Гу стал сочувствовать подпольному республиканскому националистическому движению Тунмэнхой. Гу еще больше посвятил себя националистическому делу, приняв участие в Синьхайской революции 1911 года.\n\nЗакончив учебу в Японии, Гу вернулся домой в Гуйчжоу, где служил в составе местных вооруженных сил. Когда Сунь Ятсен начал Движение в защиту конституции, Гу снова встал на сторону Суня и вошел в Сычуань. Когда Старая клика Гуанси предала Национальное правительство Гуанчжоу, Гу мобилизовал свои силы против мятежной провинции Лу Жунтина и занял Гуйлинь. Гу Чжэнлунь умело служил в Северном походе, но немецкое вмешательство остановило амбиции Гоминьдана в Китае и заставило его бежать с остальной частью НРА в Гуйчжоу.\n\nИспользуя свои связи и полномочия в провинции Гуйчжоу, Гу Чжэнлунь сумел позиционировать себя как влиятельную фигуру в политике провинции Гуйчжоу. Поддерживая связи с Парижем через своих братьев и сговариваясь с генералами Чжу Пэйдэ и Хэ Инцинем против Тан Цзияо, Гу служит мостом между Центральным комитетом Ван Цзинвэя и остатками Гоминьдана в Юньнани. Но не примкнув ни к одной фракции в диаспоре Гоминьдана в Гуйчжоу, многие видят в Гу дополнительную пешку в игре между различными армиями НРА, КПН и CC-кликой.§!"

##NRA 3rd Army Rightists (3AR)
 #朱培德
 YUN_zhu_peide: "Чжу Пэйдэ"
 YUN_zhu_peide_leader_desc: "§YРодился:§! 6 октября 1889 года в уезде Луфэн, провинция Юньнань, Великая Цин\n§YБиография:§! §LЧжу Пэйдэ поступил в военную академию 19-й армии в Куньмине, которая позже стала Куньминской военной академией в 1909 году. Изучая пехоту, Чжу получил суровую, строгую военную подготовку по учебной программе Ли Гэньюаня. Чжу разделил первое место в своем классе с известным Чжу Дэ, став известным как «Два Чжу». Поскольку Тунмэнхой активно разжигался в Куньмине, Чжу вступил в организацию.\n\nСлужа в восстании Двойной девятки, Чжу позже сражался в Войне в защиту республики под началом Ли Лецзюня. С отставкой Ли из «Юньнаньской армии в Гуандуне», Чжу стал командиром бригады и вступил в Гоминьдан. В результате борьбы за власть, разгоревшейся после увольнения Ли Гэньюаня с поста командующего «Юньнаньской армией в Гуандуне», Чжу в конечном итоге проиграл и был уволен, отправившись в изгнание в Шанхай.\n\nОтозванный доктором Сунем в 1921 году, Чжу снова сражался за Революционное дело, став одним из самых доверенных военных командиров Суня, поднявшись до видного положения главнокомандующего Юньнаньской армией, а позже 3-й армией Национально-революционной армии. Избранный членом ЦИК, Чжу действовал как умеренный посредник между такими людьми, как Чан Кайши и Старые правые.\n\nВ последующей борьбе за власть Чжу в конечном итоге стал лидером остатков Гоминьдана в Гуйчжоу во главе хунты из 5 человек. Теперь, обеспечивая свое несколько скучное правление, дорога впереди, несомненно, трудна для «Самого верного» из Куньмина.§!"
 YUN_zhu_peide_army_chief_desc: "§YРодился:§! §L6 октября 1889 года в уезде Луфэн, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §cПравые 3-й армии§!\n§YВоенная карьера:§! §LСредний ребенок престижной семьи бюрократов и ученых, Чжу Пэйдэ поступил в военную академию 19-й армии в Куньмине, позже присоединившись к недавно основанной Куньминской военной академии в 1909 году. Изучая пехоту, Чжу Пэйдэ получил суровую, строгую военную подготовку по учебной программе Ли Гэньюаня. Украшенный такими одноклассниками, как Фань Шишэн, Цзинь Ханьдин, Тан Хуайюань, Чжу Пэйдэ разделил первое место в своем классе с известным Чжу Дэ, став известным как «Два Чжу». Поскольку Тунмэнхой активно разжигался в Куньмине, Чжу тайно читал антицинские статьи и вступил в организацию в 1910 году.\n\nСлужа в восстании Двойной девятки, Чжу был прямым подчиненным Ли Гэньюаня и сражался в Войне в защиту республики под началом Ли Лецзюня. С отставкой Ли Лецзюня из «Юньнаньской армии в Гуандуне», Чжу Пэйдэ стал командиром бригады и вступил в Гоминьдан. В результате борьбы за власть, разгоревшейся после увольнения Ли Гэньюаня с поста командующего «Юньнаньской армией в Гуандуне», Чжу в конечном итоге проиграл и был уволен, отправившись в изгнание в Шанхай.\n\nОтозванный доктором Сунем в 1921 году, Чжу снова сражался за Революционное дело, став одним из самых доверенных военных командиров Суня, поднявшись до видного положения главнокомандующего Юньнаньской армией, а позже 3-й армией Национально-революционной армии. Избранный членом ЦИК, Чжу действовал как умеренный посредник между такими людьми, как Чан Кайши и Старые правые.\n\nКомандуя своей 3-й армией в Северном походе, Чжу был назначен ответственным за восточный фронт после вторжения Германии в Гуанчжоу. В последующей борьбе за власть Чжу полностью поддержал Чан Кайши, но после убийства последнего принял командование остатками НРА, бежавшими в Гуйчжоу и Гуанси, действуя как компромиссная фигура между махинациями Ли Цзунжэня и Хэ Инциня. Создав хунту из 5 человек в 1930-х годах, Чжу разделил власть со своими товарищами-командирами НРА, но все еще рассматривался как общий лидер остатков.§!"

 #金漢鼎
 YUN_jin_handing: "Цзинь Ханьдин"
 YUN_jin_handing_high_command_desc: "§YРодился:§! §L1891 год, уезд Цзянчуань, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §cПравые 3-й армии§!\n§YБиография:§! §LИмея революционное желание в юном возрасте, Цзинь Ханьдин был принят в Куньминскую военную академию в 1909 году, подружившись с такими людьми, как Чжу Пэйдэ и Чжу Дэ. Под влиянием Ли Гэньюаня и Ло Пэйцзиня Цзинь вступил в Тунмэнхой вместе с Чжу Дэ и считался одним из лучших курсантов своего класса. Участвуя в восстании Двойной девятки, Цзинь позже участвовал в Войне в защиту республики, служа в Первой армии Цай Э. Построив крепкую дружбу с Чжу Дэ по пути, Цзинь Ханьдин выдержал различные борьбы за власть в Юньнани с Чжу на своей стороне. Став исполняющим обязанности главнокомандующего после попытки захвата власти Гу Пиньчжэнем в 1921 году, он бежал после возвращения Тан Цзияо, отправившись в изгнание в Шанхай. Финансируя учебу Чжу Дэ в Европе, Цзинь проживал в Гонконге до 1926 года, когда он приступил к действиям ради еще одного шанса послужить нации.\n\nНабрав более 2000 солдат, его люди были организованы в 16-ю дивизию Национально-революционной армии, помогая захватить Наньчан. После того как его войска были расширены до 9-й армии НРА, возвышение Цзиня до командующего армией было недолгим, так как из-за немецкого вмешательства и внутренней борьбы в Гоминьдане Северный поход захлебнулся и рухнул. В результате Цзинь Ханьдину пришлось вести свою теперь разгромленную 9-ю армию в регион Гуйчжоу-Гуанси.\n\nВстретившись снова с Чжу Дэ после его возвращения в Китай, они обсуждали обыденные вещи, такие как их прошлое, или то, чему Чжу Дэ научился в Германии, или даже все более левые революционные принципы Чжу Дэ. При реорганизации НРА 9-я армия Цзиня была расформирована и влита в 12-ю дивизию Третьей армии.§!\n\n§YПримечания: Солдат, но также преданный общему здоровью и боевым искусствам, Цзинь Ханьдин работал над пропагандой борьбы с курением среди Гоминьдана в Гуйчжоу.\nДорогой друг Чжу Дэ, он поддерживает Чжу во всех его начинаниях, даже если он не разделяет ту же социалистическую идеологию.§!"

 #范石生
 YUN_fan_shisheng: "Фань Шишэн"
 YUN_fan_shisheng_high_command_desc: "§YРодился:§! §L1887 год, уезд Хэси, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §cПравые 3-й армии§!\n§YБиография:§! §LУмный и прилежный с юных лет, Фань Шишэн сначала учился, чтобы стать ученым, и практиковал китайскую медицину до отмены императорского экзамена. Вступив в Тунмэнхой после этого, Фань оказался клерком в Новой армии Цай Э в Юньнани. Принятый в недавно основанную Куньминскую военную академию в 1909 году, он стал хорошим другом со своими одноклассниками, такими как Чжу Пэйдэ или Тан Хуайюань, и служил в восстании Двойной девятки вместе с ними. Служа под началом Гу Пиньчжэня и Ло Пэйцзиня, Фань сражался в Войне в защиту республики в составе Первой армии Цай Э, получив отличие и будучи назначенным начальником штаба дивизии Гу Пиньчжэня.\n\nВозразив против плана сражения Гу Пиньчжэня во время войны между сычуаньскими милитаристами и Юньнаньской армией в 1920-х годах, Фань был уволен и отправлен обратно в Юньнань. Однако по пути Фань сговорился с другими заговорщиками, чтобы свергнуть Тан Цзияо из провинции. После успеха их заговора Фань ненадолго стал командиром дивизии, прежде чем присоединиться к правительству доктора Суня после смерти Гу Пиньчжэня.\n\nИмея внутренние разногласия со своими современниками и не имея истинной преданности Суню, Фань неохотно сражался за Гоминьдан, добившись замечательных успехов и в конечном итоге будучи повышенным до генерала Сунем. Со смертью Суня в Пекине в 1925 году Тан Цзияо предпринял гамбит, чтобы захватить титул «Генералиссимуса», вторгшись в Гуанси и Гуандун. Быстро встреченный силами Фань Шишэна, объединенные усилия Ли Цзунжэня, Бай Чунси и Фаня привели к тому, что Тан был отброшен обратно в Юньнань. С его частью Юньнаньской армии, реорганизованной в 16-ю армию НРА, Фань тесно сотрудничал как с представителями Китайской синдикалистской партии, так и с Гоминьданом, даже имея левого Чжу Дэ в подчинении.\n\nБежав в регион Гуйчжоу-Гуанси после Северного похода, Фань увидел, как его 16-я армия была расформирована и интегрирована в реорганизованную 3-ю армию Чжу Пэйдэ, став командиром дивизии.§!"

 #李彌
 YUN_li_mi: "Ли Ми"
 YUN_li_mi_commander_desc: "§YРодился:§! §L1902 год, уезд Инцзян, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §cПравые 3-й армии§!\n§YВоенная карьера:§! §LПервоначально получив работу военнослужащего в 7-й дивизии «Юньнаньской армии в Гуандуне» в 1924 году благодаря своей связи с Ли Гэньюнем, младшим братом Ли Гэньюаня, Ли Ми проявил упорство в труде и образовании, заработав повышение до адъютанта. Рекомендованный для вступления в четвертую медицинскую команду недавно основанной Военной академии Вампу в 1924 году, Ли Ми был примечателен как один из самых молодых курсантов там, уступая только таким людям, как Сун Силянь. Окончив ее в 1926 году, он был назначен в Учебный корпус Третьей армии Национально-революционной армии, возглавляемый Чжу Дэ, в качестве лейтенанта командира взвода.\n\nПрибыв слишком поздно, чтобы что-то изменить, Ли Ми последовал за Чжу Пэйдэ и Чжу Дэ в запланированную зону укрытия Гуанси-Гуйчжоу после провала Северного похода. Известный своей абсолютной смертельной храбростью и бесстрашным лидерством, Ли Ми отличился во многих стычках НРА, которые произошли в 1930-х годах.§!\n\n§YПримечания: Возглавляя своих солдат почти буйным и неорганизованным образом, Чэнь Чэн однажды получил приказ от Хэ Инциня принудить Ли Ми и его солдат к сдаче. Обойдя силы Чэнь Чэна, Ли Ми прямо столкнулся с Хэ Инцинем, заявив: «Когда директор был в Военной академии Вампу, он учил своих студентов только как сражаться, но никогда как сдаваться».§!"

##CC Clique (CCC)
 #戴季陶
 YUN_dai_jitao: "Дай Цзитао"
 YUN_dai_jitao_bio: "Отправившись в Японию в 1905 году учиться в Токийской высшей нормальной школе, Дай Цзитао встретил молодого Чан Кайши, и эти двое в конечном итоге стали назваными братьями. Вернувшись в Китай в 1909 году, чтобы служить бюрократом, Дай вступил в Тунмэнхой в 1911 году, управляя серией антицинских журналов, что привело к его возможному изгнанию по всей Азии. После начала Синьхая Дай связался с Чэнь Цимэем, участвуя в Шанхайском восстании, что позже привело к должности личного секретаря доктора Суня и переводчика с японского. Председательствуя в шанхайской «Миньцюань Дэйли», Дай участвовал во всех будущих мероприятиях Гоминьдана вечно на стороне Суня. Используя свои навыки журналиста, Дай служил одним из ключевых доверенных лиц Суня.\n\nУчаствуя в Шанхайской синдикалистской группе в 1920 году, Дай участвовал в основании Китайской синдикалистской партии, но перестал заигрывать с ней после оппозиции Суня этой идеологии. Избранный членом Первого Центрального исполнительного комитета и Постоянного комитета, он был назначен министром Центрального отдела пропаганды. После смерти Суня в 1924 году Дай Цзитао был особенно сильно поражен, войдя в состояние тяжелой депрессии, почти успешно покончив с собой.\n\nПосле предполагаемого вмешательства фигуры доктора Суня Дай посвятил себя созданию того, что он рассматривает как истинную интерпретацию Трех принципов. Смешивая конфуцианство, саньминизм и антисиндикализм, Дай стал ключевым теоретиком «Новых правых» Гоминьдана, получив личное покровительство Чана."
 YUN_dai_jitao_leader_desc: "§YРодился:§! 6 января 1891 года в Гуанхане, провинция Сычуань, Великая Цин\n§YБиография:§! §L$YUN_dai_jitao_bio$\n\nПервоначально довольствуясь работой с кликой Вампу генералиссимуса Хэ Инциня для продвижения своего видения Китая, Дай поднялся к национальному лидерству после падения Хэ от власти. Теперь у руля Гоминьдана Дай Цзитао поведет Партию и Китай к своему идеалу истинно революционного государства.§!"
 YUN_dai_jitao_sic_desc: "§YРодился:§! §L6 января 1891 года в Гуанхане, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aCC-клика§!\n§YБиография:§! §L$YUN_dai_jitao_bio$§!\n\n§YПримечания: Эклектичный эксцентрик, одержимый буддизмом, конфуцианством и снотворным, Дай Цзитао пользуется всеобщим уважением среди «Новых правых» партии и даже имеет личную дружбу с Ху Ханьминем, хотя и не согласен с истинной интерпретацией наследия Суня.§!"

 #陳立夫
 YUN_chen_lifu: "Чэнь Лифу"
 YUN_chen_lifu_bio: "Младший брат Чэнь Гофу и племянник Чэнь Цимэя, Чэнь Лифу учился в Тяньцзиньском Бэйянском университете, изучая инженерное дело и горное дело. После окончания Тяньцзиньского Бэйянского университета Чэнь отправился в Соединенные Штаты для продолжения учебы, получив степень магистра металлургии в Питтсбургском университете. В отличие от своего брата Чэнь Гофу, дяди Чэнь Цимэя и близкого друга Чан Кайши, Чэнь Лифу не интересовался политикой, но был убежден Чаном и Чэнь Гофу присоединиться к Национальному правительству Гуанчжоу, которое стремилось объединить Китай и очистить его от коррумпированных Бэйянских милитаристов.\n\nКогда Чан был убит и Северный поход провалился, Чэнь Лифу последовал за своим братом в Шанхай, где они надеялись укрепить свое влияние в Гоминьдане, продолжая управлять инвестиционными интересами и фондовыми биржами. В то время как Чэнь Гофу зарекомендовал себя как видная фигура в правых националистических кругах Гоминьдана, Чэнь Лифу оставался в тени, помогая брату, где мог, но также посвятив себя гражданской бюрократии партии. Благодаря его инженерным знаниям, связям и ноу-хау в области пропаганды он считается ценным активом для партии. Однако, в то же время, это делает Чэнь Лифу довольно опасным врагом, если вы вызовете гнев любого из братьев Чэнь.\n\n§YПримечания: Преданный практик традиционной китайской медицины, Чэнь Лифу проповедует странную форму Трех принципов доктора Суня, смешанную с его собственной идеологией витализма.§!"
 YUN_chen_lifu_leader_desc: "§YРодился:§! 21 августа 1900 года в уезде Усин, провинция Чжэцзян, Великая Цин\n§YБиография:§! §L$YUN_chen_lifu_bio$§!"
 YUN_chen_lifu_advisor_desc: "§YРодился:§! §L21 августа 1900 года в уезде Усин, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §aCC-клика§!\n§YБиография:§! §L$YUN_chen_lifu_bio$§!"

 #陳果夫
 YUN_chen_guofu: "Чэнь Гофу"
 YUN_chen_guofu_sic_desc: "§YРодился:§! §L27 октября 1892 года в уезде Учэн, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §aCC-клика§!\n§YБиография:§! §LЧэнь Гофу провел свою раннюю жизнь в тени своего знаменитого дяди Чэнь Цимэя, одного из основателей Китайской Республики, союзника Сунь Ятсена и наставника Чан Кайши. Под руководством своего дяди Чэнь вступил в Тунмэнхой и участвовал в Синьхайской революции.\n\nВстретив протеже своего дяди Чан Кайши, эти двое стали близкими друзьями и много работали вместе после убийства Чэнь Цимэя в 1916 году. В 1920 году Чэнь Гофу работал на Шанхайской фондовой бирже вместе с Чаном, чтобы финансировать Гоминьдан. Судьба Чэнь Гофу улучшилась с возвышением Чана до директора Военной академии Вампу Суня, причем Чэнь был назначен ответственным за военный набор в Шанхае.\n\nКогда Северный поход обернулся катастрофой, и старый друг Чэня Чан был убит, он и его брат бежали из Гуанчжоу в Шанхай, где консолидировались некоторые остатки Гоминьдана. Чэнь Гофу стал видным голосом в правом крыле Гоминьдана, решительно выступая против союза Левого Центрального исполнительного комитета с синдикалистскими силами. С Чэнь Гофу, доминирующим в бюрократии Правого крыла Гоминьдана, и его братом рядом с ним, он не допустит, чтобы Национальная революция Сунь Ятсена погрузилась в такую тьму. Нет, он перестроит Национальную революцию в честь Чан Кайши, Чэнь Цимэя и всех националистических мучеников, отдавших свои жизни за будущее Китая.§!\n\n§YПримечания: Вместе со своим братом Чэнь Гофу постоянно работал над монополизацией своего влияния внутри фрагментированной партии, распространяя щупальца Центрального клуба везде, где это возможно.§!"

 #陳布雷
 YUN_chen_bulei: "Чэнь Булэй"
 YUN_chen_bulei_advisor_desc: "§YРодился:§! §L15 ноября 1890 года в уезде Цыси, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §aCC-клика§!\n§YБиография:§! §LРодившийся в богатой семье, ранняя жизнь Чэнь Булэя была посвящена образованию, но под ней оставалось постоянное революционное скрытое течение. Вступив в революционную партию, известную как «Общество товарищей Фумань», Чэнь поступил в Чжэцзянский университет в 1907 году. Несколько лет спустя, в 1911 году, Чэнь был нанят писателем для «Тяньдо Бао» вместе с такими людьми, как Дай Цзитао. Выразив поддержку Синьхайской революции, Чэнь в конечном итоге ушел в отставку из-за низкой заработной платы и вступил в Гоминьдан позже в 1912 году.\n\nУчаствуя в новой «Шанхай Бизнес Дэйли» в 1920 году, Чэнь служил редакционным директором, а благодаря связям со старшим родственником в конечном итоге брал интервью у фигур внутри Гоминьдана в 1926 году. Вступив в Гоминьдан с Пан Гунчжанем позже в 1927 году, Чэнь в конечном итоге бежал в Шанхай после провала Северного похода. Служа главным писателем «Новостей текущих событий» и управляя «Новостным агентством Учэнь», Чэнь был приглашен своим близким другом Дай Цзитао помочь в пропаганде нового возрождения Правого крыла Гоминьдана, на что Чэнь согласился.§!\n\n§YПримечания: Высоко ценимый за свои литературные способности, известный журналист Цзоу Таофэнь однажды написал о Чэне: «Господин Чэнь Булэй не только обладал чувством справедливости, но и был революционером. В то время люди ненавидели милитаристов и с энтузиазмом относились к Северному походу. Его статьи часто использовали острое письмо и справедливое отношение, чтобы впечатлить людей. Роль рупора».§!"

 #潘公展
 YUN_pan_gongzhan: "Пан Гунчжан"
 YUN_pan_gongzhan_advisor_desc: "§YРодился:§! §L23 октября 1895 года в уезде Усин, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §aCC-клика§!\n§YБиография:§! §LПринадлежа к богатой семье торговцев шелком, Пан Гунчжан погрузился в революционную деятельность невероятно рано в своей жизни. Вступив в революционное общество и издавая антицинскую газету в юности, Пан в конечном итоге был принят на факультет иностранных языков Университета Святого Иоанна в Шанхае в 1912 году. Добившись замечательных результатов и многократно занимая первое место в конкурсах английской речи, Пан оказался также отличным писателем, пишущим для ряда газет, журналов и даже вступив в поэтическое общество.\n\nПосле окончания университета Пан составил «Полную историю движения национального спасения китайских студентов», что привело к его возможному найму в шанхайскую «Бизнес Дэйли», где он стал близким другом Чэнь Булэя. Представленные Чэнь Гофу, Пан Гунчжан и Чэнь Булэй встретили генералиссимуса Чан Кайши в 1927 году, вступив в партию в том же году. Решив работать над продвижением Трех принципов в шанхайской прессе, пропагандистские ролики Пана в конечном итоге остались без внимания, поскольку Северный поход Гоминьдана захлебнулся. С формированием клики Центрального клуба братьями Чэнь, Лифу и Гофу, Пан Гунчжан был лично приглашен служить ключевым технократом в делах клики, отражая собственную роль его друга Чэнь Булэя для Дай Цзитао.§!"

 #歐陽格
 YUN_ouyang_ge: "Оуян Гэ"
 YUN_ouyang_ge_navy_chief_desc: "§YРодился:§! §L1895 год, уезд Ихуан, провинция Цзянси, Великая Цин§!\n§YПриверженность:§! §aCC-клика§!\n§YБиография:§! §L$YUN_ouyang_ge_bio$§!"

 #王柏齡
 YUN_wang_boling: "Ван Болин"
 YUN_wang_boling_army_chief_desc: "§YРодился:§! §L1889 год, уезд Цзянду, провинция Цзянсу, Великая Цин§!\n§YПриверженность:§! §aCC-клика§!\n§YВоенная карьера:§! §LНаследник известной семьи из Цзянсу, отец Ван Болина умер рано, оставив его мать единственным опекуном. Поступив в Нанкинскую армейскую начальную школу, он преуспел и был рекомендован для поступления в Экспресс-школу Баодина. Встретив там студента Чан Кайши, эти двое стали близкими друзьями, и дуэт прибыл в Японию, чтобы вместе поступить в Симбу Гакко. Вступив в Тунмэнхой во время учебы там, он был направлен в Японскую армию в качестве стажера после выпуска, но когда разразилась Синьхайская революция, он вернулся в Китай, чтобы сражаться. Служа под началом Чэнь Цимэя в Шанхае вместе с Чан Кайши, Ван послушно служил и во Второй революции в 1913 году. После ее провала он отправился в Японию, чтобы поступить в Школу армейских сержантов, вернувшись в Китай в 1916 году после выпуска, чтобы служить директором по образованию Лекционного зала Юньнани по просьбе Тан Цзияо.\n\nОтозванный в Гуанчжоу Чаном в 1923 году, он служил старшим штабным офицером и был назначен членом Подготовительного комитета Вампу. Служа членом приемной комиссии, он также служил директором учебного отдела. Создав Второй учебный полк, Ван Болин командовал им вместе с Первым учебным полком Хэ Инциня. Добившись ограниченного успеха в Восточных походах, он был сменен Цянь Дацзюнем и назначен на преподавательские должности в Вампу.\n\nС созданием НРА Ван стал командиром Первой дивизии Первой армии, но ужасная служба на первом этапе Северного похода привела к его увольнению. Будучи назначенным в Военную комиссию после отступления в Гуйчжоу, Ван в конечном итоге ушел в отставку и занялся буддизмом. Теперь, будучи принужденным к службе снова братьями Чэнь, Ван Болин неохотно сражается от их имени.§!\n\n§YПримечания: Сосредоточенный на буддизме гораздо больше, чем на полевом командовании, он участвовал в местных буддийских обществах Юньнани и Гуйчжоу, восстанавливая даосский храм горы Цзицзу.§!"

##Whampoa Clique (WPC)
 #何應欽
 YUN_he_yingqin: "Хэ Инцинь"
 YUN_he_yingqin_leader_desc: "§YРодился:§! 2 апреля 1890 года в Синъи, провинция Гуйчжоу, Великая Цин\n§YБиография:§! Предназначенный быть сияющим и блестящим солдатом, Хэ Инцинь сначала посещал Учанскую армейскую школу, прежде чем был отправлен учиться в Токийскую Симбу Гакко. Встретив там Чан Кайши, Хэ попал под влияние антицинской риторики Тунмэнхоя, к которому он позже присоединился.\n\nСражаясь в Синьхайской революции, он окончил учебу в Японии в 1916 году, вернувшись в Гуйчжоу служить военным инструктором под началом Ван Вэньхуа. После инцидента Миньцзю Хэ был изгнан из Гуйчжоу и оказался инструктором в Куньминской военной академии.\n\nИспользуя свою связь с Чаном, Хэ Инцинь стал главным инструктором в Вампу в 1924 году и возглавлял ее полки в различных экспедициях после этого. Пройдя жестокую службу в Северном походе, Хэ снова оказался в своей родной провинции. Де-факто преемник Чана в Вампу, Хэ должен был соперничать с генералиссимусом Чжу Пэйдэ. После установления партийного контроля в Гуандуне Хэ Инцинь успешно оттеснил Чжу и договорился о компромиссе с Ху Ханьминем.\n\nТеперь у руля возрожденного Национального правительства Хэ Инцинь владеет массивом сторонников, от революционной CC-клики до националистического Общества синерубашечников. Лишенный юмора солдат, вытолкнутый на центральную сцену, Хэ Инцинь либо падет, как его старый друг, и будет забыт временем, либо адаптируется к своей роли наследника революции и запомнится как спаситель Китая в его самый темный час."
 YUN_he_yingqin_army_chief_desc: "§YРодился:§! §L2 апреля 1890 года в Синъи, провинция Гуйчжоу, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YВоенная карьера:§! §LВ возрасте 19 лет Хэ Инцинь посещал престижную Учанскую третью армейскую среднюю школу. Он был выбран среди группы из 20 студентов для обучения за границей в японской Токийской Симбу Гакко. Именно там он встретил Чан Кайши, сокурсника по академии. Хэ Инцинь попал под влияние антицинской риторики Тунмэнхоя, к которому он серьезно присоединился. С Учанским восстанием Хэ и его сокурсники присоединились к Синьхайской революции. После выпуска в 1916 году Хэ Инцинь вернулся в Китай, недолго служил Чэнь Цимэю в Шанхае, прежде чем отправиться в Гуйчжоу по приглашению генерала Ван Вэньхуа, и дуэт создал военную академию, сформировав «Новую» клику Гуйчжоу. После смерти Вана в 1921 году после катастрофического инцидента Миньцзю, Хэ Инцинь был изгнан из Гуйчжоу и пробрался в Юньнаньскую клику Тан Цзияо, служа инструктором в Куньмине.\n\nВ 1924 году Сунь Ятсен основал Военную академию Вампу и по настоянию Чан Кайши назначил Хэ Инциня главным военным инструктором. В 1925 году Хэ Инцинь повел обученные в Вампу полки против Чэнь Цзюнмина и захватил Чаочжоу и Шаньтоу, отметив первый успех НРА. С умиротворением Гуандуна Хэ Инцинь подготовил военных Гоминьдана к грядущему Северному походу. Несмотря на доблестную службу в Первой армии Национально-революционной армии, немецкое вмешательство привело к краху усилий Гоминьдана. Хэ Инцинь и Первая армия отступили в Гуйчжоу с другими армиями НРА, где Хэ Инцинь принял де-факто роль преемника генералиссимуса Чана.\n\nГлава так называемых клик «Вампу», состоящих из ядра Хэ Инциня, Клики гражданского строительства и Общества синерубашечников, Хэ Инцинь желает Национальной революции, осуществленной военными и для военных. Ибо в его глазах только военные могут быть спасением Китая и Партии.§!\n\n§YПримечания: Именуемый преемником генералиссимуса Чан Кайши в кругах Вампу, Хэ Инцинь гораздо больше последователь, чем лидер, лишенный авторитета, который когда-то был у его друга.§!"

 #王伯群
 YUN_wang_boqun: "Ван Боцюнь"
 YUN_wang_boqun_sic_desc: "§YРодился:§! §L12 сентября 1885 года в Синъи, провинция Гуйчжоу, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YБиография:§! §LБрат Ван Вэньхуа, Ван Боцюнь был выбран вместе с партией из четырех других студентов из Синъи для обучения в Японии за государственный счет. Поступив на факультет политической экономии колледжа Хунвэнь, а позже в Центральный университет, Ван в конечном итоге вступил в Тунмэнхой во время своего пребывания в Японии, познакомившись с такими людьми, как Лян Цичао, Сунь Ятсен и Чжан Тайянь. После Синьхайской революции Ван вступил в «Объединенную партию», организованную Чжан Тайянем, служа менеджером газеты, нацеленной на критику революционной деятельности доктора Суня. Участвуя в разработке Конституции Бэйяна, Ван Боцюнь испытал отвращение к Юань Шикаю, вернувшись в Гуйчжоу служить в местном правительстве.\n\nПомогая Цай Э вернуться в Гуйчжоу, Ван выступал за восстание против Юань Шикая в Войне в защиту республики, в конечном итоге заставив губернатора Гуйчжоу Лю Сяньши присоединиться к стороне Юньнани. Ван участвовал в различных горнодобывающих предприятиях, а позже вступил в Гэминьдан доктора Суня (позже ставший Гоминьданом) и стал министром транспорта в правительстве доктора Суня. После хаоса инцидента Миньцзю и смерти брата Ван приютил Хэ Инциня и был назначен губернатором Гуйчжоу заочно доктором Сунем. Позже основав Университет Дася в Шанхае, Ван служил представителем на мирных переговорах Севера и Юга, сопровождая доктора Суня в Пекин. После смерти Суня Ван сначала подрабатывал членом Временного сената Дуань Цижуя, прежде чем в конечном итоге уйти в отставку в Шанхай, чтобы продолжить председательствовать в Университете Дася.\n\nПосле краха Северного похода Хэ Инцинь отозвал Ван Боцюня в Гуйчжоу, где Ван с тех пор эффективно управлял гражданскими делами от имени Клики Вампу Хэ Инциня.§!"

 #劉峙
 YUN_liu_zhi: "Лю Чжи"
 YUN_liu_zhi_high_command_desc: "§YРодился:§! §L30 июня 1892 года в Цзиане, провинция Цзянси, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YБиография:§! §LРодившийся в крестьянской семье, Лю Чжи был принят в ряд военных школ, недолго прослужив в студенческой армии и военной полиции в 1911 году, прежде чем вернуться к учебе в 1912 году. Сплоченный призывом Ли Лецзюня объявить импичмент Юань Шикаю, Лю Чжи участвовал во Второй революции, прежде чем был принят в Баодинскую армейскую офицерскую школу. Успешно служа в Движении в защиту нации в Гуандунской армии под началом Цэнь Чуньсюаня, Лю продолжал служить, будучи переведенным Чэнь Цзюнмином в 1921 году в Генеральный штаб. Вступив в Гоминьдан в том же году, Лю Чжи сражался против Старой клики Гуанси, против милитаристов в Цзянси и служил под началом Сюй Чунчжи.\n\nПриглашенный служить тактическим инструктором в недавно основанной Вампу Хэ Инцинем, Лю Чжи стал командиром в Первом учебном полку Вампу, где сформировал глубокое братство с такими людьми, как Хэ Инцинь, Гу Чжутун, Цянь Дацзюнь и Цзян Динвэнь. Ведя свои войска против Чэнь Цзюнмина в обоих Восточных походах, Лю Чжи добился замечательного успеха, и после успешного подавления восстаний Ян Симиня и Лю Чжэньхуаня стал командиром дивизии.\n\nПослушно следуя приказам Чан Кайши во время Инцидента с кораблем Чжуншань, Лю Чжи служил в 1-й армии НРА во время Северного похода. Перенаправленная для попытки освободить Гуанчжоу после прямого немецкого вмешательства, Вторая дивизия Лю Чжи не смогла переломить ход событий, и после отступления в Гуйчжоу Лю Чжи, наряду с Гу Чжутуном и Цзян Динвэнем, сформировал внутренний круг Клики Вампу Хэ Инциня.§!\n\n§YПримечания: Известный тем, что бросает вызов шансам независимо от обстоятельств, Лю Чжи получил прозвище «Счастливый» генерал.§!"

 #顧祝同
 YUN_gu_zhutong: "Гу Чжутун"
 YUN_gu_zhutong_commander_desc: "§YРодился:§! §L9 января 1893 года в уезде Ляньшуй, провинция Цзянсу, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YБиография:§! §LМечтая вступить в армию с юных лет, Гу Чжутун попрощался со своей семьей и посещал Нанкинскую армейскую начальную школу, жаждя изучать искусство войны. Присоединившись к Синьхайской революции по воле случая по пути домой после закрытия школы, Гу служил командиром взвода, позже вернувшись в школу, как только учреждения по всей стране вновь открылись. Поступив в Хубэйскую армейскую офицерскую школу французского стиля, Гу Чжутун предпринял неудачную попытку помочь революционерам Защиты нации в 1916 году, сбежав домой. В конечном итоге Гу был принят в Баодинскую армейскую офицерскую школу, окончив ее с отличными результатами в 1919 году. Гу довольно хаотично оказался в компании доктора Сунь Ятсена в 1920 году, а позже встретил Чан Кайши в 1922 году, поладив и став соратниками. По рекомендации Чана Гу стал капитаном-адъютантом Сюй Чунчжи, Гу стал невероятно благодарен за доброту Чана, закрепив свои отношения обещанием сражаться на стороне Чана, несмотря ни на что.\n\nУчаствуя в создании Академии Вампу, Гу служил инструктором тактики, а позже отличился во время Восточных походов против Чэнь Цзюнмина, сражаясь лично на передовой. Сражаясь в доблестных битвах в начале Северного похода против Чжоу Иньжэня, служба Гу Чжутуна в 1-й армии НРА в конечном итоге привела к тому, что он был выброшен на ветер после убийства Генералиссимуса и краха НРА. Отступая в Гуйчжоу с остальными своими товарищами, Гу Чжутун оплакивает смерть своего дорогого друга и благодетеля, надеясь, что вместе с остальной частью Клики Вампу Хэ Инциня они смогут воплотить его идеалы.§!\n\n§YПримечания: Благодаря своей неизменной преданности как Хэ Инциню, так и Чан Кайши вопреки всему, Гу Чжутун имеет прозвище «Верный» генерал.§!"

 #關麟徵
 YUN_guan_linzheng: "Гуань Линьчжэн"
 YUN_guan_linzheng_commander_desc: "§YРодился:§! §L19 марта 1905 года в уезде Хусянь, провинция Шэньси, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YВоенная карьера:§! §LРодившийся в обычной крестьянской семье в сельской Шэньси как Гуань Чжидао, однажды учитель детства спросил его о его будущих амбициях, на что он ответил: «Я надеюсь стать командиром роты в будущем». Встав на путь воинской доблести, Гуань поначалу не смог поступить в армию, но в 1924 году, услышав, что доктор Сунь Ятсен открыл новую офицерскую школу в Гуанчжоу и тайно набирал студентов, Гуань отправился в путь со своим другом Дэн Юймэем. Получив паспорта, выданные Ху Цзинъи, Гуань занял место У Линьчжэна, официально сменив имя на Гуань Линьчжэн в паспорте.\n\nПутешествуя по пути, они встретили Старейшину-революционера Юй Южэня, который поинтересовался, почему двое мальчиков хотят стать солдатами, на что Гуань мог ответить только: «Потому что быть офицером — это величественно». Позабавившись, Юй объяснил дуэту Три принципа и, наряду с такими людьми, как Ду Юймин, получил рекомендательное письмо от Юй Южэня, успешно зачислив мальчиков в Академию Вампу. Вступив в Гоминьдан вскоре после этого, Гуань посвятил себя абсолютно как Революции, так и НРА, участвуя в Восточных походах под началом Хэ Инциня. Получив тяжелое ранение во время Походов, левая нога Гуаня была спасена только благодаря тщательному вмешательству Ляо Чжункай.\n\nСлужа под началом таких людей, как Дэн Яньда, Гуань в конечном итоге дрейфовал вправо от партии и служил в полках военной полиции во время Северного похода. Не имея возможности делать что-либо, кроме как служить НРА, Гуань последовал за рушащимися армиями НРА в Гуйчжоу, где он медленно поднимался по служебной лестнице в поредевшей Клике Вампу Хэ Инциня.§!\n\n§YПримечания: Упрямый и известный как «Железный кулак», Гуань Линьчжэн имеет сильное соперничество с Чэнь Чэном. Абсолютно презирая этого человека, Гуань считает, что его звание в армии незаслуженно согласно его навыкам на поле боя.§!"

 #張靈甫
 YUN_zhang_lingfu: "Чжан Линфу"
 YUN_zhang_lingfu_commander_desc: "§YРодился:§! §L20 августа 1903 года в Сиане, провинция Шэньси, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YВоенная карьера:§! §LПервоначально стремясь к жизни интеллектуала, Чжан Линфу поступил на исторический факультет Пекинского университета в 1923 году, однако не смог оплатить обучение, вместо этого вступив в Корпус подготовки офицеров Второй национальной армии Ху Цзинъи в Хэнани. Случайно встретив Юй Южэня, Чжан отправился на юг в Гуанчжоу по рекомендации Юй, поступив в Военную академию Вампу.\n\nИспытав все стандартные аспекты идеологии и образования Вампу, Чжан был включен в 21-ю дивизию Национально-революционной армии в качестве командира взвода и участвовал в Северном походе как солдат 1-й дивизии. После ее ужасающего краха Чжан последовал за остальной частью 1-й армии в боевом отступлении в Гуйчжоу, где Тан Цзияо неохотно приютил остатки Гоминьдана. Проявив большое мастерство и инициативу в межвоенный период, он был продвинут Хэ Инцинем как свежее лицо для больной НРА.§!"

 #錢大均
 YUN_qian_dajun: "Цянь Дацзюнь"
 YUN_qian_dajun_theorist_desc: "§YРодился:§! §L14 июня 1893 года в уезде Усянь, провинция Цзянсу, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YБиография:§! §LНаследник купеческой семьи, Цянь Дацзюнь вместо этого поступил на военную службу в 1909 году, зачислившись в Цзянсускую армейскую начальную школу. Недолго прослужив в Синьхае, Цянь окончил учебу в 1912 году и почти сразу же принял участие во Второй революции в 1913 году, вступив в отряд Смертников, организованный Ню Юнцзянем. При спонсорстве последнего Цянь Дацзюнь отправился в Японию учиться в Академию Хаожань, встретив доктора Сунь Ятсена и вступив в Гэминьдан (позже Гоминьдан) в 1914 году. Вернувшись в Китай в 1915 году, Цянь посещал военную подготовительную школу, прежде чем был вынужден бросить учебу из-за деятельности против Юань Шикая, а после смерти Юаня он вернулся к учебе и позже поступил на артиллерийское отделение Баодинской армейской офицерской школы.\n\nОднако до официального зачисления он посещал Симбу Гакко в Токио, а позже Сикан Гакко. Окончив японское обучение и женившись на Оуян Цзаоли, Цянь наконец поступил на артиллерийское отделение Баодина, но ушел в отставку в 1921 году, чтобы последовать за Сунь Ятсеном в Гуандун, присоединившись к его армии под началом Сюй Чунчжи. Одна из ключевых фигур в подготовке Вампу, он служил инструктором по оружию. Вступив в Восточные походы, Ван Болин был заменен Цянь Дацзюнем из-за плохой работы в командовании 2-м учебным полком, а позже служил штабным офицером Хэ Инциня.\n\nСтав директором гарнизона Гуанчжоу во время Северного похода, доблестная оборона Цянь Дацзюня против немецкого вторжения не смогла предотвратить потерю города Гоминьданом, и, следуя за остальной частью НРА в Гуйчжоу, Цянь Дацзюнь оказался служащим под началом Хэ Инциня командиром дивизии и штабным офицером.§!"

 #徐庭瑤
 YUN_xu_tingyao: "Сюй Тинъяо"
 YUN_xu_tingyao_high_command_desc: "§YРодился:§! §L9 октября 1892 года в уезде Увэй, провинция Аньхой, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YБиография:§! §LПоступив на третий этап пехотного отделения Баодинской военной академии в 1916 году, Сюй Тинъяо начал службу офицером-стажером в Аньхойской армии, позже став командиром роты. В 1920 году он ненадолго вернулся в свой родной город, чтобы стать учителем начальной школы, прежде чем вернуться на службу командиром роты и командиром батальона Гуандунской армии в 1922 году. Сражаясь храбро и яростно в Восточных походах, он был повышен до звания командира батальона. В августе 1925 года Сюй служил командиром в 1-й армии под началом Сюй Чунчжи, участвуя в Северном походе. Видя, как разворачивается крах армии перед ним, Сюй последовал за 1-й армией в Гуйчжоу, где он был быстро повышен до командира 2-й дивизии, а затем 4-й дивизии.\n\nВступив в период размышлений, Сюй Тинъяо стал очарован развивающимся состоянием механизированной и моторизованной войны, подав прошение Хэ Инциню разрешить ему создать Школу транспортного корпуса для подготовки бронетанкового корпуса. Несмотря на тяжелое состояние Национально-революционной армии в 1930-х годах, Сюй Тинъяо надеется, что однажды его мечты о Китайских бронетанковых силах, обрушивающихся на милитаристов и империалистов, осуществятся. До тех пор все, что он может делать, — это набрасывать статьи, детализирующие его военные теории, такие как «О механизированных войсках», «Строевой устав колесниц» и «План действий механизированных сил», пока еще неопубликованные работы.§!\n\n§YПримечания: Страсть Сюя к бронетанковым полкам привела к тому, что его называют «Отцом китайских бронетанковых сил», его единственным современником является Ду Юймин.§!"

 #蔣鼎文
 YUN_jiang_dingwen: "Цзян Динвэнь"
 YUN_jiang_dingwen_commander_desc: "§YРодился:§! §L25 января 1895 года в Чжуцзи, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YВоенная карьера:§! §LПолучив стандартное образование, Цзян Динвэнь вступил в Студенческую армию Ханчжоу после начала Синьхайской революции, а в следующем году поступил в Чжэцзянский армейский лекционный зал, чтобы завершить свое военное образование. После выпуска Цзян служил командиром взвода и роты, прежде чем отправиться в Гуандун в 1917 году сражаться во Второй революции доктора Суня. Назначенный подполковником-адъютантом штабного отдела, Цзян Динвэнь стал полковником-штабным офицером в 1922 году, всего в возрасте 27 лет. Служа на различных штабных должностях, Цзян Динвэнь добровольно отказался от своего звания и должности, чтобы поступить в Академию Вампу, став капитаном второй студенческой команды и военным инструктором.\n\nИмея странную привычку просыпаться рано, он часто встречался с директором Чан Кайши. Как сообщается, на полевых учениях в Вампу иностранный советник наблюдал за учениями с Чаном и Цзяном. Задавая спонтанные вопросы, Цзян Динвэнь отвечал бегло, к изумлению советника. Участвуя в подавлении Восстания торговцев Гуанчжоу, Цзян также служил в Первом Восточном походе, завоевав личное уважение Чана. Вступив в Северный поход с энтузиазмом, Цзян участвовал в неудачной осаде Уханя, прежде чем был отброшен обратно в Гуйчжоу вместе с остальной частью 1-й армии.\n\nМолодое лицо в клике ветеранов, Цзян Динвэнь причисляется к внутреннему кругу Вампу и послушно служит своему начальнику Хэ Инциню.§!\n\n§YПримечания: Известный своим быстрым мышлением, быстрыми действиями и умелым пониманием маневренной войны, Цзян Динвэнь получил прозвище «Летающий» генерал.§!"

 #桂永清
 YUN_gui_yongqing: "Гуй Юнцин"
 YUN_gui_yongqing_high_command_desc: "§YРодился:§! §L7 марта 1901 года в уезде Гуйси, провинция Цзянси, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YБиография:§! §LВыбранный вместе с земляками из Гуйси для обучения в Японии в юном возрасте, Гуй Юнцин в конечном итоге вернулся в Китай, услышав об основании Военной академии Вампу, присоединившись к ее первому классу. Участвуя в Восточных походах против Чэнь Цзюнмина, Гуй примечателен как один из немногих солдат Вампу, активно участвовавших в грабежах и мародерстве, что было замечено Ли Чжилуном. Услышав об этом, Чан Кайши пришел в ярость, приказав казнить Гуя в назидание остальным из Вампу, потребовав, чтобы Хэ Чжунхань был палачом. Однако из-за связей Гуй Юнцина с Хэ Чжунханем последний вмешался от имени первого, подав прошение Хэ Инциню попросить Чана пощадить его жизнь и назначить более мягкое наказание.\n\nСлужа командиром батальона спецназа 1-й армии НРА, он вошел в Фуцзянь в 1926 году во время Северного похода, но после провала битвы при Лунтане Гуй в конечном итоге был отстранен после своего выступления. Чудом пережив крах Северного похода, Гуй Юнцин оказался в Гуйчжоу и в армии, гораздо более благородной, чем он сам.\n\nОтчаянно нуждаясь в работе, Гуй использовал свой опыт в амфибийной войне наряду со связями в истеблишменте Вампу, а именно с Тэн Цзе, чтобы получить официальное звание адмирала. Хотя формально это бесполезная должность, так как нет береговой линии, откуда можно было бы отплыть, Гуй надеется, что удача НРА приведет к тому, что он получит надлежащую работу. До тех пор он вполне доволен пожинанием плодов продолжающейся службы.§!\n\n§YПримечания: Исключительно трусливый, Гуй Юнцин был замешан в пытках подозреваемых синдикалистов и хищении средств. Не имея практически никакого реального военно-морского опыта, Гуй выживает исключительно благодаря своей связи со своими братьями по Вампу.§!"

 #張靜愚
 YUN_zhang_jingyu: "Чжан Цзинъюй"
 YUN_zhang_jingyu_air_chief_desc: "§YРодился:§! §L1895 год, уезд Гаотан, провинция Шаньдун, Великая Цин§!\n§YПриверженность:§! §PКлика Вампу§!\n§YВоенная карьера:§! §LПоступив в Подготовительную школу Университета Цинхуа, Чжан Цзинъюй в конечном итоге готовился к учебе в Соединенных Штатах. Однако с внезапным началом Вельткрига он вместо этого отправился в Европу, где изучал машиностроение в Ливерпуле. Вступив в Европейское отделение Китайского Гоминьдана, он был назначен доктором Сунем главой ливерпульского отделения Гоминьдана в 1922 году. Вернувшись в Китай в 1924 году, он был переведен в Военную академию Вампу, служа секретарем Центрального партийного комитета. Сначала служа английским секретарем Профессорского отдела под началом Ван Болина, он позже служил английским секретарем непосредственно для Чан Кайши.\n\nНазначенный партийным представителем 2-го учебного полка Вампу, он участвовал в Первом Восточном походе, увидев немного полевой службы. Вернувшись в Гуанчжоу, он служил партийным представителем Арсенала Шицзин, а позже директором бизнес-отдела Гуандунского авиационного бюро. Назначенный директором всего Авиационного бюро в 1926 году, он служил партийным представителем Авиационного отдела для НРА и одновременно для Военно-морского отдела.\n\nПосле краха контроля Гоминьдана в Китае Чжан Цзинъюй продолжал быть посредником между партийными делами и делами военно-воздушных сил, и хотя ВВС Гуйчжоу в настоящее время ничтожны, он надеется увидеть их модернизированными, чтобы в конечном итоге послужить основой для национальных китайских.§!"

##Blueshirts Society (BSS)
 #滕杰
 YUN_teng_jie: "Тэн Цзе"
 YUN_teng_jie_bio: "Окончив факультет социологии Шанхайского университета, Тэн Цзе накопил широкий опыт в управлении политическими делами и с радикальной, экстремальной идеологией. Поступив в Военную академию Вампу, Тэн Цзе окончил 4-й пехотный отдел и служил в Северном походе простым солдатом. Служа клерком в Главном политическом отделе Главного штаба Национально-революционной армии, он постепенно начал испытывать отвращение к сотрудничеству между КСП и Гоминьданом.\n\nПокинув Китай после краха Северного похода для учебы на факультете политической экономии Университета Мэйдзи в Японии, Тэн Цзе сосредоточился на партийной политике и изучении партийной организации. Глубоко понимая важную роль, которую политические партии играют в современной политике, Тэн Цзе начал верить, что для спасения Китая они должны сначала начать с партийного строительства. Анализируя внутренних врагов Гоминьдана как местных милитаристов и Китайскую синдикалистскую партию, он счел первых очень хрупкими и не представляющими проблемы. В то же время он счел Китайскую синдикалистскую партию одной из величайших угроз для Гоминьдана. У нее была организация, доктрина, стратегия и поддержка Интернационала.\n\nПоэтому, чтобы справиться с КСП, он желал создания новой «всемогущей партийной организации», заявляя, что если Гоминьдан не превзойдет КСП в организационной эффективности, они никогда не смогут победить их в действии, не смогут гарантировать полный успех Национальной революции. Помогая в организации того, что теперь называется «Обществом синерубашечников» внутри правых остатков Гоминьдана, Тэн Цзе служил генерал-майором директором Департамента политической подготовки остатков НРА."
 YUN_teng_jie_leader_desc: "§YРодился:§! 25 января 1906 года в уезде Фунин, провинция Цзянсу, Великая Цин\n§YБиография:§! $YUN_teng_jie_bio$"
 YUN_teng_jie_commander_desc: "§YРодился:§! §L25 января 1906 года в уезде Фунин, провинция Цзянсу, Великая Цин§!\n§YПриверженность:§! §nОбщество синерубашечников§!\n§YВоенная карьера:§! §L$YUN_teng_jie_bio$§!"

 #劉健羣
 YUN_liu_jianqun: "Лю Цзяньцюнь"
 YUN_liu_jianqun_sic_desc: "§YРодился:§! §L1902 год, уезд Цзуньи, провинция Гуйчжоу, Великая Цин§!\n§YПриверженность:§! §nОбщество синерубашечников§!\n§YБиография:§! §LОкончив Провинциальную профессиональную школу Гуйчжоу, Лю Цзяньцюнь стал связан с Хэ Инцинем в ранние годы, позже будучи рекомендованным Ху Чжунсяном для поступления в военно-юридический отдел Гуйчжоуской армии. Однажды послужив директором Военно-юридического департамента и Департамента военного снабжения, Лю стал конфиденциальным секретарем Хэ Инциня в 1925 году, находясь рядом с ним, когда он служил инструктором в Военной академии Вампу, и когда он командовал учебными полками в Восточных походах и 1-й армией в Северном походе.\n\nНазначенный директором Отдела политической подготовки Военной комиссии в Гуйчжоу, Лю Цзяньцюнь начал набрасывать серию теорий в своей брошюре «Предварительные предложения по реорганизации Гоминьдана», предполагая, что все члены партии должны полностью подчиняться приказам лидера, что символизируется ношением синей одежды — из-за того, что костюм Чжуншань сделан из сине-серой ткани. Работая вместе с Тэн Цзе, Лю помог в создании «Общества синерубашечников», став одним из немногих членов фракции не из Вампу.\n\nВ своем Отделе политической подготовки Лю Цзяньцюнь внедрил девиз «Одна партия, одна доктрина, один враг», немедленно включая их в Синерубашечники после выпуска. Распространяя пропаганду и брошюры Синерубашечников, его тайная организация стала довольно грозной силой внутри остатков НРА.§!\n\n§YПримечания: Как сообщается, он утверждает, что каждое успешное революционное движение было вдохновлено Тремя народными принципами.§!"

 #李士珍
 YUN_li_shizhen: "Ли Шичжэнь"
 YUN_li_shizhen_commander_desc: "§YРодился:§! §L1896 год, уезд Нинхай, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §nОбщество синерубашечников§!\n§YБиография:§! §LВ ранние годы Ли Шичжэнь был отправлен в Шанхай учиться, окончив Шанхайскую общественную школу, а позже поступив в Чжэцзянский университет. Поступив в Военную академию Вампу в 1924 году, Ли Шичжэнь участвовал в правом «Обществе Сунь Ятсена», созданном Чан Кайши, служа кандидатом в секретари общества. После окончания в сентябре 1925 года Ли вступил в Национально-революционную армию и служил командиром взвода, ротным инструктором и партийным представителем Первой дивизии Первой армии. Участвуя во Втором Восточном походе, он участвовал в подготовке к созданию полицейской академии в сентябре 1926 года, служа директором временной Полицейской академии в звании подполковника. В 1927 году он был повышен до службы штабным офицером генерального штаба НРА, а после провала Северного похода возглавил полк безопасности в Гуйчжоу.\n\nБудучи отправленным изучать современную полицейскую тактику в 1930 году, он отправился в Соединенные Штаты, чтобы служить под началом легендарного полицейского офицера Августа Воллмера, узнав от него огромный объем знаний об эффективной полицейской деятельности. Позже отправившись в Японию, он изучал полицейское строительство, поступив в Японскую пехотную школу, а позже окончив Японскую полицейскую академию. Он вернулся в Китай в 1932 году, служа полковником-штабным офицером Военной комиссии, директором Института подготовки полиции Департамента полиции Гуйчжоу, секретарем Центрального исполнительного комитета «Общества возрождения» Синерубашечников и секретарем Департамента полиции Гуйчжоу.§!\n\n§YПримечания: Суровый сторонник дисциплины и эксперт-организатор полиции, усилия Ли Шичжэня резко сократили бандитизм в Гуйчжоу, к большому одобрению Гоминьдана в провинции.§!"

