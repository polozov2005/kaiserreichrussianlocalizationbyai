 #The Fight for Human Rights Tooltips #
 YUN_the_fight_for_human_rights_tt: "§YМы получим уникальный динамический модификатор, который будет усилен принятием фокусов в политическом дереве, чтобы помочь создать подлинно современную, единую и сильную Китайскую Республику.§!"

 YUN_the_fight_for_human_rights_modifier: "Борьба за права человека"
 YUN_the_fight_for_human_rights_modifier_desc: "Вечная борьба — это борьба за права человека. Не только за права гражданина, предоставленные ему государством, но и за неотъемлемые права человека. Дарованные нам с самой искры нашего существования. Именно эти права, свобода мысли, организации, слова, рода занятий и многие другие, эти фундаментальные и неотъемлемые права, на которых основан закон природы. Они являются основой борьбы Полумесяца, и, смеем сказать, основой всей борьбы всей Демократической лиги Китая.\n\nКитайская конституция должна быть первой в мире, которая подкрепляет свои демократические украшения истинной демократией граждан. Ибо свободная и подлинно демократическая система должна ставить права человека выше даже бумаги, на которой они разграничены. Если у человека в голове появляется мысль, то есть только желание выразить такую мысль. И если есть такое одно желание, его нельзя просто отрицать. Sic semper tyrannis; человечеству должно быть позволено проявлять себя свободно и охотно, а не быть запуганным тем, чего желают другие."

