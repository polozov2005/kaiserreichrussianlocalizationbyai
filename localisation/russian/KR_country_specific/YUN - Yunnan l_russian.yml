 YUN_watching_the_upstarts_name_loc_KMT: "Патрулирование гор"
 YUN_watching_the_upstarts_desc_loc_KMT: "С изгнанием прогнившей структуры режима Тан Цзияо из провинции, начальникам Национально-революционной армии стало совершенно очевидно, что в горной местности Юньнани остались непримиримые. Испещренная глубокими долинами и ассортиментом титанических каменных бегемотов, Юньнань является воплощением суровой местности внутренних районов Китая. Мы развернем солдат НРА, чтобы изгнать любых оставшихся партизан из провинции."

 YUN_watching_the_upstarts_name_loc_noKMT: "Наблюдение за выскочками"
 YUN_watching_the_upstarts_desc_loc_noKMT: "По сути, в момент временного позора власти Юньнани были вынуждены позволить бегущим остаткам Национально-революционной армии войти в наши де-факто территориальные границы. С созданием «Новыми правыми» Гоминьдана базового района в Гуйчжоу они фактически контролируют провинцию. Идеологически настроенные против нашего режима, было бы разумно развернуть солдат для патрулирования гор между Юньнанью и Гуйчжоу, наблюдая за каждым их шагом."

