 YUN_KMT_civil_war_no_Zhang_tt: "§Y§gХу Жоюй победит, если популярность §gАвторитарных демократов§! выше, чем у §SСоциал-демократов§! и §cСоциал-консерваторов§! вместе взятых.\n §SЧэнь Чэн§! победит, если популярность §SСоциал-демократов§! выше, чем у §cСоциал-консерваторов§!.\nВ противном случае §cЧжу Пэйдэ§! победит по умолчанию.§!§!"
