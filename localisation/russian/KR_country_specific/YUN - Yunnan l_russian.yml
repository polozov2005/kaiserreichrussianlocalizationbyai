 YUN_UPC_civil_war_tt: "§YСила §gТан Цзияо§! — это популярность §gАвторитарных демократов§! и §cСоциал-консерваторов§! вместе взятых.\nСила §PХу Жоюя§! — это популярность §PПатерналистов-автократов§! и §mРыночных либералов§! вместе взятых.\nСила §SЦунь Шушэна§! — это популярность §SСоциал-демократов§! и §lСоциал-либералов§! вместе взятых.\nПобедит сильнейшая из этих трех фракций.§!"

 YUN_zhu_peide_warning_tt: "§Y§cЧжу Пэйдэ§! — идеологически гибкий регионалист; независимый правый, который также укрывает многих левых под своим командованием, оставаясь союзником опальной Клики политической науки. Обычно ожидается, что он останется лояльным, но будьте осторожны.§!"

 YUN_chen_cheng_warning_tt: "§Y§SЧэнь Чэн§! — правый член Временного комитета действий, протеже Чан Кайши и Дэн Яньда. Более ориентирован на национальные интересы, чем большинство региональных фигур, ожидается, что он останется в целом лояльным, пока правительство стабильно.§!"

 YUN_zhang_bojun_warning_tt: "§Y§RZhang Bojun§! is a left wing member of the Provisional Action Committee and one of its founders, recently dispatcehd by the Central Committee. Loyal to the Committee, he is expected to remain generally loyal so long as the government does not become tyrannical.§!"

 YUN_cun_shusheng_warning_tt: "§Y§SЦунь Шушэн§! — педагог, связанный с ДЛК, имеющий связи с местными социалистами. Обычно ожидается, что он останется лояльным, если наша республика останется демократической, но никогда нельзя знать наверняка.§!"

 YUN_tang_jiyao_warning_tt: "§Y§gТан Цзияо§! — губернатор, связанный с ВРА, правивший Юньнанью десятилетиями. Убежденный федералист, но с амбициозной жилкой; если центральное правительство ослабнет, он может воспользоваться возможностью захватить власть.§!"

