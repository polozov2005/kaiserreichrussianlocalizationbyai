#####- Section 06: Decisions - #########
########################################

###- Phase I Decisions - ###
 YUN_introgame_minigame_decision_category: "Разрыв патовой ситуации Дянь-Цянь"
 YUN_introgame_minigame_decision_category_desc: "К марту 1927 года последние отставшие из потрепанной Национально-революционной армии завершили свой изнурительный «Великий поход» в западную Гуйчжоу, разбив лагерь в провинции, долго оспариваемой соседними милитаристами. Поскольку наступление Чжили теряло обороты по мере продвижения на восток, они согласились на установление Юань Цзумина губернатором на Востоке, оставив остальную часть Гуйчжоу на милость клики Юньнань. Внутренние потрясения в Юньнани и желание буферного региона против гегемонии Чжили помешали губернатору Тан Цзияо вернуть Западную Гуйчжоу в свою сферу в течение последнего десятилетия, но ограниченное перемирие между §cхунтой Гоминьдана§! в Гуйчжоу и §fкликой Юньнань§! быстро исчезает.\n\nПротивостояние, скорее всего, будет разрешено только силой оружия, но переброска войск к границе — дело непростое.\nУ §cГуйчжоуского Гоминьдана§! мобилизовано [?YUN_introminigame_KMT_soldiers_var|c0] солдат.\nУ §fЮньнаньской клики§! мобилизовано [?YUN_introminigame_UPC_soldiers_var|f0] солдат.\n\n§YПодавляющее преимущество по крайней мере в 10 000 человек больше, чем у другой стороны, потребуется любой из сторон, чтобы безопасно одолеть своего соперника.§!\n[YUN_introgame_troop_advantage_loc]"
 YUN_introgame_troop_advantage_loc_KMT: "У §cГуйчжоуского Гоминьдана§! на [?YUN_introminigame_KMT_soldiers_difference_var|c0] больше солдат, чем у §fЮньнаньской клики§!"
 YUN_introgame_troop_advantage_loc_UPC: "У §fЮньнаньской клики§! на [?YUN_introminigame_UPC_soldiers_difference_var|f0] больше солдат, чем у §cГуйчжоуского Гоминьдана§!"
 YUN_introgame_troop_advantage_loc_balanced: "Ни §fЮньнаньская клика§!, ни §cГуйчжоуский Гоминьдан§! не имеют преимущества друг перед другом."

 YUN_introminigame_war_preparation_mission_timer: "Начальная подготовка к войне завершена"
 YUN_introminigame_war_preparation_mission_timer_desc: "Хотя Юньнань и Гуйчжоу являются соседями, закладка основы для вторжения займет некоторое время. Склады снабжения должны быть созданы, карты сражений должны быть начерчены, а вновь прибывшие войска должны быть размещены. По обе стороны границы генералы разыгрывают свои следующие ходы, надеясь получить решающее преимущество. Наращивание сил вдоль линии фронта продолжается в течение посевного сезона, и к лету командиры считают, что их армии будут готовы к вторжению."

 YUN_troops_flood_to_the_border_monthly_timer: "Войска стекаются к границе Дянь-Цянь"
 YUN_troops_flood_to_the_border_monthly_timer_desc: "Скопление подразделений на границе Юньнань-Гуйчжоу вызвало цикл продолжающейся эскалации, так как обе стороны развертывают силы на фронте. С потерей к этому моменту всякой надежды на внезапную атаку обе стороны спешат попытаться превзойти друг друга — по иронии судьбы усиливая патовую ситуацию. Только решительные действия позволят одной стороне получить достаточно большое преимущество на границе, необходимое для захвата другой."

 YUN_introminigame_switch_sides_decision: "Сменить сторону"
 YUN_introminigame_switch_sides_decision_desc: "Эра милитаристов полна историй о грязных предательствах, иногда из-за зависти, иногда из-за жадности, а иногда ради самосохранения. Для многих офицеров низшего звена по обе стороны границы этот выбор становится все более и более заманчивым, поскольку чаша весов начинает склоняться."

 YUN_introminigame_commence_the_assault_decision: "Начать штурм"
 YUN_introminigame_commence_the_assault_decision_desc: "Благодаря усилиям наших людей наращивание наших войск опередило наращивание войск наших врагов. Инициатива на нашей стороне. Мы должны нанести удар, пока железо еще горячо, и приказать нашим войскам наступать, прежде чем наши враги смогут подтянуть больше подкреплений."

 YUN_introminigame_accelerate_our_buildup_decision: "Ускорить наше наращивание"
 YUN_introminigame_accelerate_our_buildup_decision_desc: "Эта патовая ситуация будет нарушена только в том случае, если одна сторона сможет перехватить инициативу и опередить другую в сборе своих войск. Мудрый генерал знает, что логистическая игра — это не просто военное дело, но часто политическое. Сторона, которая сможет мобилизовать ресурсы своего народа и преодолеть бюрократическую инерцию, будет той, у которой больше оружия, больше припасов и больше войск."

 YUN_introminigame_develop_our_battleplan_decision: "Разработать наш план битвы"
 YUN_introminigame_develop_our_battleplan_decision_desc: "Говорят, что лучшие планы генералов никогда не переживают контакта с врагом, но это вряд ли умаляет ценность хорошего плана. Мы должны работать, чтобы собрать воедино информацию, предоставленную нашими сетями шпионов, разведчиков и солдат на земле, позволяя нашим планировщикам создать наилучшую возможную стратегию для предстоящей войны. Хотя точные детали обязательно изменятся по мере развития ситуации, наличие правильных фигур в правильных местах перед битвой даст нам гибкость для победы."

 YUN_introminigame_win_the_war_of_wills_decision: "Выиграть войну воли"
 YUN_introminigame_win_the_war_of_wills_decision_desc: "Высшее искусство войны — покорить врага без сражения, и в эпоху сменяющихся лояльностей эффективное количество войск одной стороны на земле может быть намного меньше или намного больше, чем их фактическое количество собранных солдат. С помощью адаптированной пропаганды с одной стороны и щедрых взяток с другой мы, возможно, сможем убедить наших противников сдаться или, по крайней мере, не сопротивляться так сильно. Точно так же адекватная оплата и хорошее обращение с нашими людьми будут иметь большое значение для укрепления лояльности наших собственных офицеров и солдат."

###- Phase II Decisions -###
 YUN_GXC_war_decision_category: "Вторая Юньнань-Гуансийская война"
 YUN_GXC_war_decision_category_desc: "Юньнань вторглась в Лянгуан, возобновив конфликт между двумя южными державами. Успех или неудача в этой войне, скорее всего, будут зависеть от их способности взять Наньнин, столицу Гуанси. Его захват откроет дверь для марша на Гуанчжоу. Неудача в этом приведет к тому, что многие в Юньнани потеряют веру в [YUN.GetLeader] и, вероятно, приведет к дипломатическому урегулированию.\n\n§Y[YUN_GXC_war_settlement_scripted_loc]§!"
 YUN_GXC_war_settlement_outcome_start: "Если бы договор был подписан сегодня, Юньнань была бы"
 YUN_GXC_war_settlement_outcome_1: "$YUN_GXC_war_settlement_outcome_start$ вынуждена стать Ассоциированным Губернаторством и уступить Гуйчжоу."
 YUN_GXC_war_settlement_outcome_2: "$YUN_GXC_war_settlement_outcome_start$ вынуждена стать Ассоциированным Губернаторством, но сохранила бы Гуйчжоу."
 YUN_GXC_war_settlement_outcome_3: "$YUN_GXC_war_settlement_outcome_start$ подписала бы белый мир и уступила Гуйчжоу."
 YUN_GXC_war_settlement_outcome_4: "$YUN_GXC_war_settlement_outcome_start$ подписала бы белый мир, но сохранила бы Гуйчжоу."

 YUN_the_course_of_the_yunnan_guangxi_war_mission: "Ход Дянь-Гуйской войны"
 YUN_the_course_of_the_yunnan_guangxi_war_mission_desc: "Генералы клики Юньнань, неохотно идущие на внешние военные авантюры или рискующие попаданием Юньнани под внешнее господство, ожидают быстрых результатов в этой войне, иначе они начнут паниковать. Успешный захват Наньнина даст Юньнани импульс, неудача в этом разрушит его."
 YUN_GXC_increase_morale_effect_tt: "§YНаш национальный дух Морали может §Gувеличиться§!, если мы контролируем Наньнин и наша поддержка войны высока.§!"
 YUN_GXC_decrease_morale_effect_tt: "§YНаш национальный дух Морали может §Rуменьшиться§!, если мы не контролируем Наньнин и наша поддержка войны низкая.§!"

 YUN_begin_secret_surrender_negotiations_decision: "Начать тайные переговоры о сдаче"
 YUN_begin_secret_surrender_negotiations_decision_desc: "Война пошла ужасно, как и ожидалось. С угасанием надежд на быстрое разрешение и ростом опасений, что наши враги войдут в Юньнань, генералы Лун Юнь и Ху Жоюй начали тайно сговариваться друг с другом о возможности свержения [YUN.GetLeader]. Возможно, пришло время тайно начать переговоры с нашими врагами и закончить эту войну, пока не стало слишком поздно!"

 YUN_accept_yunnans_surrender_decision: "Принять сдачу Юньнани"
 YUN_accept_yunnans_surrender_decision_desc: "Получив контакт с заговорщиками-генералами Юньнани в Куньмине и с развитием событий на поле боя в нашу пользу, пришло время нам настаивать на наших условиях. Это позволит нам избежать дорогостоящей кампании в горах, обеспечив наш западный фланг на данный момент."

###- Phase III Decisions -###
 YUN_grand_southern_reconstruction_decision_category: "Великая реконструкция Юга"

 YUN_expand_gejiu_mining: "Расширить добычу в Гэцзю"
 YUN_expand_gejiu_mining_desc: "С началом проекта Великой реконструкции Юга массивные залежи олова в Гэцзю наконец могут быть использованы благодаря тому, что наша экономика стала более индустриализированной за последние несколько лет."

 YUN_kunming_cement_factory: "Куньминский цементный завод"
 YUN_kunming_cement_factory_desc: "Чтобы уменьшить зависимость Юньнани от импортного цемента из соседних провинций и из-за рубежа, Юньнань должна развивать свою собственную цементную промышленность, чтобы обеспечить безопасность и стабильность Великой реконструкции Юга."

 YUN_modernised_smelting: "Модернизированная плавка"
 YUN_modernised_smelting_desc: "Если минеральные залежи Юньнани должны быть оптимально использованы и уменьшена наша зависимость от импортной стали, должны быть внесены улучшения в текущую плавильную промышленность Юньнани. Устаревшее оборудование должно быть заменено, недостающее оборудование закуплено, а новые методы изучены."

 YUN_purchasing_american_machinery: "Закупка американского оборудования"
 YUN_purchasing_american_machinery_desc: "Для дальнейшего прогресса развития нашей промышленности и замены наших неэффективных и довольно устаревших инструментов правительство должно обратиться к более опытному внешнему миру. Будучи одной из более индустриализированных стран мира, было бы разумно для нашего правительства обратиться за помощью к Соединенным Штатам."

 YUN_yaolong_electric_station: "Электростанция Яолун"
 YUN_yaolong_electric_station_desc: "Поскольку экономика Юньнани становится все более индустриализированной, было бы разумно построить гидроэлектростанцию в самой Юньнани недалеко от Яолуна для удовлетворения будущих потребностей Юньнани в энергии."

 YUN_charcoal_kiln: "Расширить куньминские угольные печи"
 YUN_charcoal_kiln_desc: "Поскольку большая часть населения Юньнани проживает в сельской местности, древесный уголь стал востребованным источником топлива из-за того, что на нем часто намного проще готовить, чем на топливе. Расширяя внутреннее производство древесного угля в Юньнани, наше правительство может увидеть увеличение доходов, а также умиротворить местных торговцев углем."

 YUN_arsenal_subsidies: "Субсидии арсеналу"
 YUN_arsenal_subsidies_desc: "Несмотря на то, что Куньминский арсенал исторически является стабильным поставщиком оружия для Юньнаньской армии, этого может быть недостаточно из-за возросшего спроса нашего правительства на оружие. Поскольку некоторые надеются расширить арсеналы, было бы крайне важно увеличить субсидии для Куньминского арсенала, если наше правительство надеется поддерживать свои поставки оружия."

 YUN_guizhou_brewing_factory: "Пивоваренный завод Гуйчжоу"
 YUN_guizhou_brewing_factory_desc: "Несмотря на неразвитость и бедность Гуйчжоу, Маотай оставался одним из самых ценных и самых известных экспортных товаров Гуйчжоу на протяжении всей его истории. Поэтому расширение текущих пивоварен и винокурен должно быть предпринято, если мы хотим сохранить или даже увеличить поставки Маотая из Гуйчжоу в остальной Китай."

 YUN_guangzhou_cement_factory: "Цементный завод Гуанчжоу"
 YUN_guangzhou_cement_factory_desc: "Благодаря уже существующей относительно стабильной промышленности по производству цемента в Гуандуне, дополнительные капиталовложения не требуются, если мы хотим ее сохранить. Однако, если наше правительство хочет сократить использование иностранного цемента, цементная промышленность Гуандуна должна быть расширена еще больше, чтобы обеспечить безопасность всех будущих строительных проектов на юго-западе."

 YUN_qingyuan_chemical_and_fertiliser_factory: "Химический и удобрительный завод Цинъюань"
 YUN_qingyuan_chemical_and_fertiliser_factory_desc: "Хотя Китай преимущественно аграрная страна, ему все еще не хватает современной промышленности удобрений. Экономические планировщики наметили амбициозный проект по развитию химического и удобрительного завода в Гуанчжоу, который, как мы надеемся, даст толчок модернизации удобрений в Китае."

 YUN_wengjiang_hydroelectric_plant: "Гидроэлектростанция Вэнцзян"
 YUN_wengjiang_hydroelectric_plant_desc: "Поскольку Гуанчжоу и Гуандун в целом становятся новым промышленным центром Китая, прогнозируется, что регион увидит массовое увеличение потребления энергии в последующие годы. Для снабжения новой промышленности Гуандуна можно использовать поток могучей Жемчужной реки, построив вдоль нее новые гидроэлектростанции."

 YUN_qiongya_rubber: "Каучук Цюнъя"
 YUN_qiongya_rubber_desc: "Благодаря теплому климату и богатой питательными веществами почве Цюнъя в последние годы стал плантацией товарных культур. Прибыль от товарных культур острова может быть еще больше увеличена, если будет создана каучуковая плантация для снабжения каучуком как нашего правительства, так и любых потенциальных иностранных покупателей."

 YUN_guangxi_infrastructure_development_scheme: "Схема развития инфраструктуры Гуанси"
 YUN_guangxi_infrastructure_development_scheme_desc: "Поскольку Гуанси часто отстает в развитии, его инфраструктура часто не соответствует современным стандартам. Поэтому, если наше правительство надеется развить промышленность Гуанси, инвестиции в новые инфраструктурные проекты имеют первостепенное значение."

 YUN_guangxi_farmers_bank: "Крестьянский банк Гуанси"
 YUN_guangxi_farmers_bank_desc: "Фермеры живут в цикле вечного долга, беря кредиты весной в надежде собрать плодородный урожай осенью. Чтобы облегчить их участь, будет создан крестьянский банк для кредитования сельских зернохранилищ и фермеров, принимая зерно в качестве залога. Кредитные офисы для простого народа должны быть созданы лавочниками под государственным регулированием для облегчения сельского бизнеса. Мы не оставим наших фермеров позади."

 YUN_arable_land_development: "Развитие пахотных земель"
 YUN_arable_land_development_desc: "Из-за гористой местности Юньнани крупномасштабное сельскохозяйственное развитие всегда было проблемой в регионе. Рисовые поля и небольшие фермы составляют большую часть текущего сельского хозяйства Юньнани из-за его приспособляемости к сложной местности. Чтобы облегчить это, правительство должно развивать сельскохозяйственную промышленность Юньнани, еще больше расширяя количество пахотных земель."

 YUN_yunnan_cotton_spinning_and_weaving: "Прядение и ткачество хлопка в Юньнани"
 YUN_yunnan_cotton_spinning_and_weaving_desc: "Поскольку производство и прядение хлопка является одной из более продуктивных отраслей легкой промышленности Юньнани, было бы разумно продолжить усилия правительства Тана по дальнейшему развитию хлопчатобумажных фабрик Юньнани."

 YUN_yunnan_water_control: "Контроль воды в Юньнани"
 YUN_yunnan_water_control_desc: "Поскольку в Юньнани часто выпадает большое количество сезонных осадков, наводнения являются довольно частым явлением для многих жителей Юньнани. Учитывая, насколько разрушительными бывают наводнения в сезон дождей, предыдущие правительства часто организовывали масштабные проекты по контролю воды в попытке ограничить ущерб. Наше правительство должно продолжать делать то же самое."

 YUN_support_inc: "Поддержка Индокитайского восстания"
 YUN_support_inc_desc: "Всегда разделяя форму культурного братства с нашими индокитайскими соседями, мы не могли ранее поддерживать их предыдущие усилия по избавлению своих земель от немецкого ига. Однако теперь, когда вспыхнуло новое восстание, более жестокое и сильное, чем прежде, крайне важно, чтобы мы воспользовались возможностью поддержать дружественный режим, ослабить немецкое влияние в Азии и устранить немецкое проникновение в Юньнань. Победа для всех. Кроме немцев."

 YUN_mining: "Расширение горнодобывающих операций"
 YUN_mining_desc: "Горнодобывающие операции вблизи Гэцзю и других крупных горнодобывающих городов в Юньнани являются важным аспектом юньнаньской экономики, даже жизненно важным. Расширение шахт, печей и плавильных заводов в нашей провинции, а также субсидирование горнодобывающих корпораций поможет нам увеличить нашу производительность и качество."

 YUN_mining1_decision: "Расширить добычу угля в [816.GetName]"
 YUN_mining1_decision_desc: "Расширение шахт, печей и плавильных заводов в [816.GetName], а также субсидирование горнодобывающих корпораций поможет нам увеличить нашу производительность и качество."

 YUN_mining2_decision: "Расширить добычу алюминия в [325.GetName]"
 YUN_mining2_decision_desc: "Расширение шахт, печей и плавильных заводов в [325.GetName], а также субсидирование горнодобывающих корпораций поможет нам увеличить нашу производительность и качество."

 YUN_mining3_decision: "Расширить добычу хрома в [816.GetName]"
 YUN_mining3_decision_desc: "Расширение шахт, печей и плавильных заводов в [816.GetName], а также субсидирование горнодобывающих корпораций поможет нам увеличить нашу производительность и качество."

 YUN_mining4_decision: "Расширить добычу вольфрама в [816.GetName]"
 YUN_mining4_decision_desc: "Расширение шахт, печей и плавильных заводов в [816.GetName], а также субсидирование горнодобывающих корпораций поможет нам увеличить нашу производительность и качество."

#CHI YUN Satellite Decisions
 YUN_CHI_Spreading_Socialism_to_the_Southwest_decision_category: "Распространение социализма на Юго-Запад"
 YUN_CHI_Spreading_Socialism_to_the_Southwest_decision_category_desc: "Юго-западные китайские провинции Юньнань и Гуйчжоу традиционно были более консервативными, революционные движения подавлялись в пользу поддерживаемого знатью «реформизма». Гоминьдан и его предшественники боролись за сохранение плацдарма в регионе на протяжении 1920-х годов, однако после Великого похода Национально-революционной армии правые силы сумели захватить часть Гуйчжоу в 1928 году, а после краха гегемонии Чжили они завоевали Юньнань от имени партии.\n\nСлабо связанные с нашим правительством, их лояльность остается под вопросом. Центральный комитет направил советников в Куньмин и Гуйян в надежде на продвижение социализма в регионе, но они могут использовать нашу помощь. Принятие следующих решений увеличит левое влияние на Юго-Западе, повышая шансы §RЧжан Боцзюня§! или §SЧэнь Чэна§! взять под контроль Юньнань после того, как мы завершим Северный поход."

 YUN_CHI_fund_agrarian_development_in_guizhou_decision: "Финансирование аграрного развития в Гуйчжоу"
 YUN_CHI_fund_agrarian_development_in_guizhou_decision_desc: "Призывы генерала Чэнь Чэна к обширной сельской земельной реформе, включая принцип «земля — пахарю», ограничение арендной платы и оптимизацию налогообложения, являются уменьшенной версией более радикальных предложений нашей партии, но, возможно, достаточны, чтобы донести наше послание до консервативного Гуйчжоу. Предлагая финансировать эти усилия, мы можем способствовать более справедливому будущему для провинции в сельской местности."

 YUN_CHI_arm_the_civil_engineering_clique_decision: "Вооружить Клику гражданского строительства"
 YUN_CHI_arm_the_civil_engineering_clique_decision_desc: "Чэнь Чэн был недавно назначен командующим 18-й армией, отделившейся от старой 1-й армии, которая расположилась лагерем в Гуйчжоу. В сочетании с его непосредственным командованием 10-й дивизией, его фракция была названа «Кликой гражданского строительства» (визуальный каламбур) и представляет левый дрейф клики Вампу Чан Кайши. Хотя, возможно, и не истинно социалистическая, связь Чэня с Дэн Яньда и ВКД делает его полезным противовесом откровенно правой Клике политической науки. Приоритет оружия для генерала Чэня поможет продвигать социализм на юго-западе."

 YUN_CHI_cultivate_third_army_leftists_decision: "Культивировать левых 3-й армии"
 YUN_CHI_cultivate_third_army_leftists_decision_desc: "Генерал Чжу Дэ, пожалуй, самый заметный левый в Третьей армии, блестящий стратегический ум и хорошо связанный среди региональных революционных генералов, включая Чжу Пэйдэ, Фань Шишэна и Цзинь Ханьдина. Поскольку личная политика часто имеет приоритет над идеологией на юго-западе, он является жизненно важным активом, и, финансируя капитальный ремонт Куньминского арсенала и Куньминской военной академии, мы получим рычаги влияния на военных Юньнани."

 YUN_CHI_empower_zhang_bojun_decision: "Наделить полномочиями Чжан Боцзюня"
 YUN_CHI_empower_zhang_bojun_decision_desc: "Чжан Боцзюнь — лояльный партийный кадр, направленный в Юньнань в качестве «советника», на практике действующий как наш полномочный представитель на юго-западе. Чжан — довольно эффективный дипломат: хорошо образованный и харизматичный, он способен проникнуть в местные интеллектуальные круги. С учетом того, что многие студенты и профессора Юньнани разочарованы недавними политическими событиями, они созрели для обращения, утверждает он, если только мы будем щедры на финансирование."

 YUN_CHI_recognise_the_new_yunnan_society_decision: "Признать Общество «Новая Юньнань»"
 YUN_CHI_recognise_the_new_yunnan_society_decision_desc: "Юньнаньское особое бюро Китайской синдикалистской партии — это тайная группа бывших студентов, ставших революционерами, с военно-политической подготовкой из Вампу. Возглавляемые братьями Ван Дэсанем и Ван Фушэном, они добились определенного успеха, проникая в провинцию от имени более широкого Общества «Новая Юньнань», общества синдикалистов, родившихся в Юньнани, в составе КСП. Предложение официального признания этим агентам позволило бы им выйти из тени, но последствия непредсказуемы."
 YUN_CHI_recognise_the_new_yunnan_society_tt: "§YВ зависимости от выбора Юньнани, это может принести пользу юньнаньским §rсиндикалистам§!, §Rрадикальным социалистам§! или §Sсоциал-демократам§!.§!"

##Dian Dragon's Domain Decisions

#YUN Side Decisions
 YUN_dian_dragon_domain_decision_category: "Владения Дракона Дянь"
 YUN_dian_dragon_domain_decision_category_desc: "Преемник Цай Э и его наследия пал. Несмотря на то, что он создал провинцию Юньнань и ее провинциальную армию такими, какие они есть сегодня, окрыленный своей победой над оплотом Гоминьдана в Гуйчжоу, губернатор Тан Цзияо устремил свой взор на Жемчужину Юга, Гуанчжоу. По недомыслию губернатор Тан угрожал уничтожить само существование клики Юньнань своим неудачным вторжением в Гуанси, вынудив своих генералов задержать его и заключить мир.[YUN_dian_dragon_domain_long_yun_status_scripted_loc][YUN_dian_dragon_domain_hu_ruoyu_status_scripted_loc]"

 YUN_dian_dragon_domain_long_yun_independent_key: "\n\nКрепко удерживая власть над политикой Юньнани в течение десятилетий и будучи временно заключенным в северном городе Чжаотун после неудачного переворота 6 февраля, позиция §gгенерала Лун Юня§! как «Короля Юньнани» теперь стала реальностью, когда губернатора Тана больше нет в центре внимания. Твердо выступая за защиту автономии Юньнани, генерал Лун предпочитает изоляционизм и неприсоединение.\nВлияние §Y§g$YUN_long_yun_clique_party$§! в настоящее время составляет [?YUN.party_popularity@authoritarian_democrat|%g2].§!"
 YUN_dian_dragon_domain_long_yun_subject_zhili_key: "\n\nХотя он удерживает провинциальный центр Куньмин и унаследовал базы власти губернатора Тана, хватка §gгенерала Лун Юня§! над Юньнанью ослабла, так как влияние Мэнцзы растет с помощью внешних акторов. Столкнувшись с потенциальной угрозой своей власти, генерал Лун должен быть бдительным к схемам хунты Мэнцзы, чтобы Юньнаньский дракон не постигла та же участь, что и его предшественников...\nВлияние §Y§g$YUN_long_yun_clique_party$§! в настоящее время составляет [?YUN.party_popularity@authoritarian_democrat|%g2].§!"
 YUN_dian_dragon_domain_long_yun_subject_other_key: "\n\nЛибо просто следуя за ветром, либо из чистого отчаяния, §gгенерал Лун Юнь§! нарушил политику изоляционизма Юньнани и объединил Куньмин с другой силой. Хотя это не выгодно ни Куньмину, ни Мэнцзы, генерал Лун остается бдительным к схемам хунты Мэнцзы, чтобы Юньнаньский дракон не постигла та же участь, что и его предшественников...\nВлияние §Y§g$YUN_long_yun_clique_party$§! в настоящее время составляет [?YUN.party_popularity@authoritarian_democrat|%g2].§!"

 YUN_dian_dragon_domain_hu_ruoyu_independent_key: "\n\nСосредоточенная вокруг южного города Мэнцзы, §Pхунта Ху Жоюя, Чжан Жуцзи и Ли Сюаньтина§! известна тем, что работала с немецкими интересами, а также была восприимчива к влиянию Чжили. Как только популярность §P$YUN_hu_ruoyu_clique_party$§! превысит 20%, §Rклика Чжили сможет оказать давление на Юньнань для присоединения, если будет граничить с ней.§!\nВлияние §Y§P$YUN_hu_ruoyu_clique_party$§! в настоящее время составляет [?YUN.party_popularity@paternal_autocrat|%P2].§!"
 YUN_dian_dragon_domain_hu_ruoyu_subject_zhili_key: "\n\nНакопив достаточно влияния, чтобы убедить Куньмин открыто присоединиться к Чжили, баланс сил в Юньнани теперь все больше склоняется в пользу §Pклики Мэнцзы§!, которая теперь сговаривается запустить переворот против генерала Луна, чтобы захватить власть. Как только популярность §P$YUN_hu_ruoyu_clique_party$§! превысит 50% и разразится война между Китаем и Японией, §Rпереворот гарантированно увенчается успехом...§!\nВлияние §Y§P$YUN_hu_ruoyu_clique_party$§! в настоящее время составляет [?YUN.party_popularity@paternal_autocrat|%P2].§!"
 YUN_dian_dragon_domain_hu_ruoyu_subject_other_key: "\n\nНесмотря на то, что §Pклика Мэнцзы§! настаивала на присоединении к Чжили, похоже, что Юньнань теперь попала в подчинение другой державе. Тем не менее, это может сыграть на руку Мэнцзы, если Ху предпочтут Луну. Как только популярность §P$YUN_hu_ruoyu_clique_party$§! превысит 50% и разразится война между Китаем и Японией, §Rпереворот гарантированно увенчается успехом...§!\nВлияние §Y§P$YUN_hu_ruoyu_clique_party$§! в настоящее время составляет [?YUN.party_popularity@paternal_autocrat|%P2].§!"
 YUN_dian_dragon_domain_hu_ruoyu_zhili_dead_key: "\n\nСосредоточенная вокруг южного города Мэнцзы, §Pхунта Ху Жоюя, Чжан Жуцзи и Ли Сюаньтина§! известна тем, что работала с немецкими интересами, а также была восприимчива к влиянию Чжили. Однако с крахом клики Чжили и отсутствием спонсоров схемы Мэнцзы столкнулись с серьезной неудачей. Тем не менее, как только популярность §P$YUN_hu_ruoyu_clique_party$§! превысит 50% и разразится война между Китаем и Японией, §Rпереворот гарантированно увенчается успехом...§!\nВлияние §Y§P$YUN_hu_ruoyu_clique_party$§! в настоящее время составляет [?YUN.party_popularity@paternal_autocrat|%P2].§!"

 YUN_acknowledge_zhili_authority_decision: "Признать власть Чжили"
 YUN_acknowledge_zhili_authority_decision_desc: "Автономия Юньнани должна быть сохранена любой ценой, но в такие времена мы должны признать невозможность достижения такого подвига. С Чжили у нашего порога и их сторонниками, продолжающими оказывать на нас давление, чтобы мы присоединились к ним, у нас нет иного выбора, кроме как отправить телеграмму руководству Чжили, признавая их национальную власть, чтобы обеспечить ту оставшуюся автономию, которую мы будем иметь под их защитой."

 YUN_building_a_democratic_base_decision: "Построение демократической базы"
 YUN_building_a_democratic_base_decision_desc: "Юньнань была первой провинцией, восставшей против тирании Юань Шикая, когда он демонтировал республику, короновав себя императором Китая, таща нацию обратно к монархической системе, за свержение которой многие революционеры погибли во время Синьхая. Чтобы помнить жертвы революции, мы должны опираться на это наследие, превращая Юньнань в «демократическую» крепость с помощью интеллектуалов-реформистов и прогрессивных движений в провинции, чтобы сформировать Юньнань такой, какой она должна быть."

 YUN_entrust_our_finances_to_commerce_decision: "Доверить наши финансы торговле"
 YUN_entrust_our_finances_to_commerce_decision_desc: "Способствуя экономическому росту в Юньнани через развитие местной промышленности и финансовой системы провинции, Торговая палата Юньнани доказала, что является достойным союзником провинциального правительства. С их предыдущим сотрудничеством с губернатором Цай Э и губернатором Тан Цзияо, Торговой палате, безусловно, можно доверить управление финансами провинции с заботой и ответственностью. Вместе этот плодотворный пакт принесет процветание Юньнани, которым будут наслаждаться все."

 YUN_continue_modernisation_efforts_decision: "Продолжить усилия по модернизации"
 YUN_continue_modernisation_efforts_decision_desc: "Далеко в уголках горных рубежей нации Юньнань отстала по сравнению с другими провинциями на востоке. Без береговой линии, через которую провинция могла бы быть достигнута, Юньнань не почувствовала преимуществ усилий по модернизации, которые уже имели место по всей стране, за исключением попыток сделать это со стороны губернатора Тан Цзияо. Продолжая там, где остановился губернатор Тан, мы обеспечим модернизацию Юньнани в социальном, политическом и экономическом плане."

 YUN_repurpose_the_bureaucracy_decision: "Перепрофилировать бюрократию"
 YUN_repurpose_the_bureaucracy_decision_desc: "При всех недостатках губернатора Тана именно благодаря ему мы наследуем обширную и функционирующую бюрократию, которая так «верно» служила ему на протяжении всего его губернаторства, эффективно и беспрекословно реализуя его политику и реформы. С его уходом со сцены и нашим контролем над Юньнанью вполне естественно, что мы переконфигурируем эту замечательную систему для обслуживания наших нужд и легитимизируем наше правление, действуя как преемственность предыдущей администрации."

 YUN_tolerate_mengzis_monopoly_decision: "Терпеть монополию Мэнцзы"
 YUN_tolerate_mengzis_monopoly_decision_desc: "Большая часть природных ресурсов Юньнани находится в руках Мэнцзы, который контролирует большинство шахт провинции в южных пределах горного плато Юньгуй. Добыча полезных ископаемых из земли и экспорт их в порты Индокитая для переработки стали одним из основных источников дохода Юньнани, финансирования ее экономического развития, администрации и, что наиболее важно, ее военной мощи. Предсказуемо, из-за их местоположения, Мэнцзы удерживает монополию на горнодобывающий сектор провинции, которую мы пока вынуждены терпеть."

#Non-YUN Side Decisions

 YUN_pressure_yunnan_into_alignment_decision: "Принудить Юньнань к присоединению"
 YUN_pressure_yunnan_into_alignment_decision_desc: "Наши усилия в Юньнани начали приносить плоды, так как лояльные нашему правительству начинают обладать достаточной властью, чтобы оспаривать текущие власти в провинции. Поскольку мандат генерала Лун Юня на грани краха, самое время нам оказать давление на Юньнань, чтобы она присоединилась к нашему правительству!"

 YUN_allure_of_money_and_flattery: "Очарование денег и лести"
 YUN_allure_of_money_and_flattery_desc: "Удаленность от досягаемости Центрального правительства привела к тому, что Юньнань пользуется определенным уровнем политической автономии, свободной осуществлять свое управление независимо от пожеланий Пекина. Однако это также сделало Юньнань одной из беднейших провинций на Юго-Западе, пренебрегаемой центральными властями, так как ее экономика страдает от неразвитости. Для нас это лишь возможность увеличить наше влияние в Юньнани, соблазнив их финансовой помощью."

 YUN_bribing_the_disaffected: "Подкуп недовольных"
 YUN_bribing_the_disaffected_desc: "Юньнаньская армия может быть более профессиональной, чем большинство армий милитаристов в Китае, но ее лояльность под вопросом. Несмотря на то, что позиция Лун Юня как гегемона Юньнани неоспорима, остаются те, кто верен губернатору Тану и его клике, а также те, кто более чем готов сбежать с корабля за небольшое денежное вливание. Посылая волны взяток коррумпированным офицерам и апатичным рядовым, угрозы дезертирства должны помочь держать Лун Юня в узде."

 YUN_issue_threats_to_yunnan: "Выпустить угрозы Юньнани"
 YUN_issue_threats_to_yunnan_desc: "Хотя клика Юньнань отступила в изоляционизм в свете своей неудачи во Второй Юньнань-Гуансийской войне и последующего переворота против губернатора Тан Цзияо, сама идея сохранения независимости Юньнани больше не может оставаться. С военным поражением, свежим в умах Юньнаньской армии, угроза возможности еще одной войны должна напугать руководство Юньнани и заставить его присоединиться к нам и укрепить нашу хватку над Юго-Западом."

 YUN_deal_with_the_mengzi_junta: "Сделка с хунтой Мэнцзы"
 YUN_deal_with_the_mengzi_junta_desc: "С уходом губернатора Тана со сцены существует баланс сил между Лун Юнем в Куньмине и тремя другими командирами гарнизонов в Мэнцзы: Ху Жоюем, Чжан Жуцзи и Ли Сюаньтином. В отличие от Лун Юня, который показал себя сторонником изоляционизма и неприсоединения, наши агенты в Юньнани указали, что хунта Мэнцзы более восприимчива к присоединению к нашему правительству. Имея это в виду, мы могли бы расширить их влияние в провинции, напрямую заключая сделки с Мэнцзы."

 YUN_send_out_peace_feelers: "Послать мирные сигналы"
 YUN_send_out_peace_feelers_desc: "Помимо того, что это акт самосохранения его заговорщиков, переворот в Куньмине является явным признаком того, что Юньнань дистанцируется от Экспортного милитаризма и, как следствие, от самой войны. Изолированные политически, мы должны послать мирные сигналы в Юньнань, объявляя о нашем намерении достичь национального объединения, не прибегая к силовым методам. С продвижением мира в наших общих интересах, нет сомнений, что Куньмин примет и присоединится к нам во имя мирного объединения нации."

###- Phase IV Decisions -###

#Hu Hanmin Crisis
 YUN_provisional_constitution_crisis_decisions: "Кризис временной конституции"
 YUN_provisional_constitution_crisis_decisions_desc: "[YUN_provisional_constitution_crisis_desc_scripted_loc]"
 YUN_provisional_constitution_crisis_desc_he_yingqin_key: "Президент Хэ Инцинь поклялся принять Временную конституцию, чего бы это ни стоило. Для него это единственный способ объединить нацию и утвердить свою власть раз и навсегда. Столкнувшись с жесткой оппозицией со стороны Ху Ханьминя, премьера Законодательного Юаня, он приказал своим людям начать планирование авто-переворота — устранение инакомыслия против его правления силой одним махом.\n\nЧтобы успешно это провернуть, Хэ Инцинь должен гарантировать, что §cНационалистический пыл§! остается стабильно в центре: выше §R$RKT_bop_unrelenting_cynicism$§! и ниже §G$RKT_bop_unbridled_conviction$§! в конце 60-дневной миссии $YUN_he_yingqin_autocoup_mission$.\n\nВ настоящее время Националистический пыл находится на уровне §Y[ROOT.GetActiveRangeName]§!"
 YUN_provisional_constitution_crisis_desc_zhang_qun_key: "В результате ареста Ху Ханьминя кризис Временной конституции вышел из-под контроля. Надеясь спасти ситуацию, §MКлика политической науки§! устроила захват власти, которому решительно противостоят их соперники в §aCC-клике§!. Тем временем §PКлика Вампу§! рассматривает возможность собственного переворота.\n\nНациональное собрание продолжается. Делегаты известны двуличием, готовые голосовать с тем, кто больше их стимулирует или кажется сильнее в данный момент.\n\n§MКлике политической науки§! нужно §M335 голосов§!, чтобы принять свою Конституцию и спасти свое правительство.\n[?YUN_PSC_aligned_delegates_variable|M0]§M/502§! делегатов в настоящее время готовы голосовать с ними.\n\n§aCC-клике§! нужно §g252 голоса§!, чтобы отклонить Конституцию и начать вотум недоверия.\n[?YUN_CCC_aligned_delegates_variable|g0]§g/502§! делегатов в настоящее время готовы голосовать с ними.\n\nЕсли решение не будет найдено вовремя, произойдет государственный переворот §PКлики Вампу§!.\n\nКонечный победитель понесет штраф к §g£pol_power Политической власти (места CC)§!, §M£GFX_stability_texticon Стабильности (места КПН)§! и/или §P£war_support_texticon Поддержке войны (Время переворота)§! пропорционально силе их противников в конце кризиса."

 YUN_he_yingqin_autocoup_mission: "Авто-переворот Хэ Инциня"
 YUN_he_yingqin_autocoup_mission_desc: "Растущая критика изнутри партии, возглавляемая премьером Законодательного Юаня Ху Ханьминем, создала жестокий разрыв между Ху и президентом Хэ Инцинем. По мере роста взаимных подозрений, усугубляемых разработкой Временной конституции, Хэ Инцинь решил устранить своего соперника раз и навсегда.\n\nДля этого ему нужно будет не только очистить партию от Ху Ханьминя и его союзников из Клики Московского комитета, но и разоружить или запугать до подчинения региональные милитаристские клики, которые доминируют в южном сердце партии. Это непростая задача, и для успеха ему нужно будет продемонстрировать, что он может сохранить партийную стабильность и избежать слишком высокого или слишком низкого роста Националистического пыла."

 YUN_hu_hanmins_outrage_mission: "Гнев Ху Ханьминя"
 YUN_hu_hanmins_outrage_mission_desc: "Ху Ханьминь — пламенный оратор и один из ближайших учеников Сунь Ятсена, что позволяет ему выражать необычно большое инакомыслие внутри партийного государства. Преданный демократический централист, он обрушился на деятелей Гоминьдана, которые сформировали фракции для продвижения частных интересов, и правительственных чиновников, которые накапливают собственность и живут за счет коррупции, что Хэ Инцинь понял как завуалированную атаку на Генералиссимуса.\n\nХотя его выходки когда-то были терпимы или, по крайней мере, необходимым злом, дискуссии по поводу Временной конституции ухудшили отношения между двумя мужчинами. Ху, как премьер Законодательного Юаня, утверждает, что Гоминьдан может созвать Национальное собрание (также переводимое как Национальное народное собрание), но не может разработать временную конституцию. Национальное собрание может разработать полную конституцию только в конце Политической опеки. Более того, Ху утверждает, что временная конституция не улучшит жизнь людей, вместо этого она будет отвлекать от национальной реконструкции, снижения налогов и развития коммуникационной инфраструктуры, сельского хозяйства, промышленности и торговли.\n\nВ отличие от пустых слов временной конституции, Ху Ханьминь очень готов подкрепить свои взгляды своими хорошо вооруженными сторонниками."

 YUN_position_forces_near_liangguang_mission: "Размещение сил возле Лянгуана"
 YUN_position_forces_near_liangguang_mission_intro: "Лянгуан («Два Гуана» — Гуандун и Гуанси) — это традиционное сердце Гоминьдана, а также центр недовольства против Хэ Инциня. Между автократическим правлением Хэ Инциня, статусом Ху Ханьминя как любимого сына Гуандуна, усилиями CC-клики по «декантонизации» партии, неприглядной историей Клики политической науки там и статусом чужаков многих ведущих членов Клики Вампу (Хэ Инцинь из Гуйчжоу, Тэн Цзе из Цзянсу, Чэнь Чэн из Чжэцзяна), Гуандун, пожалуй, является эпицентром оппозиции Старых и Региональных правых Новым правым.\n\nОни также не являются пустой угрозой. Одна из самых богатых провинций в Китае с долгой историей внешней торговли с Западом, их региональные силы хорошо оснащены. Точно так же, поскольку Новая клика Гуанси восстанавливает свой контроль над своими провинциями, они превратили Гуанси в «Спарту Китая», превратив свои кишащие бандитами провинции в дисциплинированное гражданское ополчение."
 YUN_position_forces_near_liangguang_mission_desc: "$YUN_position_forces_near_liangguang_mission_intro$\n\nУбеждение обеих провинций отступить и прислушаться к голосу разума потребует армии за гранью понимания — десятки тысяч, если не сотни."

 YUN_liangguang_troop_stationing_mission: "Размещение войск в Лянгуане"
 YUN_liangguang_troop_stationing_mission_desc: "$YUN_position_forces_near_liangguang_mission_intro$\n\nС вводом лоялистских войск в регион все больше и больше потенциально мятежных командиров были убеждены отступить. Чтобы по-настоящему отговорить от восстания в этом мятежном сердце, нам, возможно, придется продлить наше пребывание."

 YUN_divide_and_conquer_in_hunan_mission: "Разделяй и властвуй в Хунани"
 YUN_divide_and_conquer_in_hunan_mission_intro: "У Хунани сложные отношения с Гоминьданом. Не только будучи главным полем битвы между правительствами Бэйяна и Гуанчжоу на протяжении многих лет, густонаселенная провинция также была домом для трех враждующих фракций, связанных с Гоминьданом. С момента подъема Новых правых Хунань балансировала между подчинением директивам центрального правительства и выражением симпатий регионалистам и движениям Старых правых."
 YUN_divide_and_conquer_in_hunan_mission_desc: "$YUN_divide_and_conquer_in_hunan_mission_intro$\n\nОни в любом случае являются квази-подчиненным регионом, поэтому демонстрация силы должна запугать колеблющихся и заставить их присоединиться к нашим интересам, а их мелочное внутреннее соперничество сделает все остальное."

 YUN_Hunan_Divided_and_Conquered_mission: "Хунань разделена и покорена"
 YUN_Hunan_Divided_and_Conquered_mission_desc: "$YUN_divide_and_conquer_in_hunan_mission_intro$\n\nС нашими войсками, уже оккупирующими регион, центр тяжести сместился в нашу пользу. Однако, чтобы это было больше, чем просто демонстрация силы, нам нужно будет показать, что мы здесь надолго."

 YUN_Secure_the_Southwest_mission: "Обезопасить Юго-Запад"
 YUN_Secure_the_Southwest_mission_intro: "Юго-западные провинции Юньнань и Гуйчжоу были нашим военным сердцем в течение многих лет. Именно там Национально-революционная армия впервые реорганизовалась после своего поражения в Северном походе и конечной точки Великого похода."
 YUN_Secure_the_Southwest_mission_desc: "$YUN_Secure_the_Southwest_mission_intro$\n\nУ нас глубокая связь с юго-западом, о чем наши враги, похоже, забыли. Мы напомним им о нашей силе... и нашей любви."

 YUN_The_Southwest_Submits_mission: "Юго-Запад подчиняется"
 YUN_The_Southwest_Submits_mission_desc: "$YUN_Secure_the_Southwest_mission_intro$\n\nУ нас глубокая связь с юго-западом, о чем мы поспешили напомнить нашим врагам. Все же, чтобы не дать им забыть снова, возможно, нам стоит остаться здесь на некоторое время."

#PSC Decisions
 YUN_Pass_the_Provisional_Constitution_decision: "Принять Временную конституцию"
 YUN_Pass_the_Provisional_Constitution_decision_desc: "Наконец, имея на нашей стороне квалифицированное большинство делегатов Национального собрания, мы можем продвигаться вперед, несмотря на кризис, с нашей долгожданной Временной конституцией. Как только пойдет устойчивый поток «За», большинство оставшихся делегатов подчинятся. Правление Чжан Цюня будет легитимизировано, и Клика политической науки будет иметь стабильность, необходимую для примирения с Южно-Китайским политическим советом."

 YUN_Loyalty_Tests_in_the_Bureaucracy_decision: "Проверки лояльности в бюрократии"
 YUN_Loyalty_Tests_in_the_Bureaucracy_decision_desc: "Бюрократия Национального правительства раздута и кумовская, создана для покровительства и вознаграждения лоялистов, а не для административной эффективности. Теперь, когда лояльность ставится под сомнение по всему режиму, пришло время начать переукомплектовывать правительство в нашу пользу. Новая гражданская служба должна быть квалифицированной, прилежной и беспрекословно подчиняться нашим директивам!"

 YUN_Promise_a_Constitutional_government_decision: "Обещать конституционное правительство"
 YUN_Promise_a_Constitutional_government_decision_desc: "В стране, которая долгое время считалась отсталой, жестокой и фактически феодальной, раздался крик изнутри и снаружи о модернизации. Клика политической науки стремится продемонстрировать свою приверженность современности — современной промышленности, современным стилям, современной деловой культуре, современным технологиям, современному управлению. Отказ от ненужных традиций и открытие новой страницы — сложный процесс, но необходимый.\n\nСреди хаоса кризиса Ху Ханьминя растет консенсус в том, что произвольный, капризный характер военного правления должен закончиться в пользу гражданского правительства. Вместо военного доминирования должно подняться современное технократическое и ответственное правительство, даже если для полной демократии может быть слишком рано. Верховенство закона, а не партийное государство и его фанатики, должно быть основой нашей республики."

 YUN_Release_Political_Prisoners_decision: "Освободить политических заключенных"
 YUN_Release_Political_Prisoners_decision_desc: "Когда Ху Ханьминь был арестован, сотни его последователей были задержаны вместе с ним и содержались без суда. Другие были схвачены за эти годы, иногда по ложным или несуществующим обвинениям чрезмерно усердной тайной полиции или выданы мстительными политическими соперниками. Верный способ завоевать буржуазию и интеллигенцию, составляющую большую часть недавно избранного Национального собрания, — освободить политических диссидентов, которые похожи на них или даже близки к ним. Это будет нелегко, но это было бы хорошей отправной точкой для дальнейших переговоров."

 YUN_Bribe_Miliitary_Officers_decision: "Подкупить военных офицеров"
 YUN_Bribe_Miliitary_Officers_decision_desc: "Национально-революционная армия — это сильно политизированная сила по замыслу, призванная быть полностью лояльной партийному государству и его революционному кредо. Многие из ее основных дивизий и офицеров являются идеологическими фанатиками и полностью внедрены в культ личности Вампу. Однако по мере расширения армии они быстро оказались в окружении многих подразделений, недавно поглощенных из побежденных или интегрированных армий милитаристов, или новобранцев из менее политизированных учебных программ. Хотя, возможно, уже слишком поздно полностью обезвредить армию, некоторые тщательно размещенные взятки (как денежные, так и касающиеся повышений) и использование наших связей с видными региональными военными могут быть достаточными для сдерживания менее ревностных офицеров от поддержки государственного переворота."

#CCC Decisions
 YUN_Call_a_Vote_of_No_Confidence_decision: "Призвать к вотуму недоверия"
 YUN_Call_a_Vote_of_No_Confidence_decision_desc: "Правительство Политической науки исчерпало себя, и ни днем раньше. Поскольку вероломный Чжан Цюнь и двуличный Ян Юнтай мечутся, революционное правительство, которое мы так усердно строили, несется к краху. Видя неизбежное и опасаясь очевидного недовольства военных, было собрано солидное большинство делегатов, чтобы отложить обсуждение Временной конституции, на которую Ян и его союзники поставили свою легитимность. Мы продолжим вотумом недоверия вскоре после этого и покончим с этим фарсом раз и навсегда."

 YUN_Increase_Propaganda_Output_decision: "Увеличить выпуск пропаганды"
 YUN_Increase_Propaganda_Output_decision_desc: "У Вампу есть свои войска, а у Клики политической науки — свои экономические органы, но только CC-клика может по-настоящему использовать волю народа! Через обширную кампанию в СМИ, с участием ведущих мыслителей и ученых нации, мы можем воспламенить сердца и просветить умы людей! С большим энтузиазмом мы вновь разжигаем революционные страсти партии!"

 YUN_Stoke_Xenophobic_Hysteria_decision: "Разжечь ксенофобскую истерию"
 YUN_Stoke_Xenophobic_Hysteria_decision_desc: "Наша партия окружена партийными предателями и иностранными агентами! Синдикалисты и их попутчики проникают и извращают нашу революцию слева, в то время как плутократы и компрадоры Банка Китая пытаются купить себе путь к власти справа! Эти негодяи подорвали волю китайского народа и дух нашей Националистической партии, все в надежде поставить ее под иностранный контроль!\n\nЧжан Цюнь и Ян Юнтай пригласили социалистов, либералов, реакционеров и иностранные интересы в наше правительство под видом плюрализма, не вызывая ничего, кроме раскола и разорения! Они скоро выставят нашу революцию на аукцион и продадут наши принципы тому, кто больше заплатит! Мы не позволим им победить — все патриоты должны восстать и выполнить свой долг, чтобы не допустить, чтобы сапоги социалистов топтали [ROOT.Capital.GetCapitalVictoryPointName]!"

 YUN_Orchestrate_a_Walkout_of_the_Bureaucracy_decision: "Организовать забастовку бюрократии"
 YUN_Orchestrate_a_Walkout_of_the_Bureaucracy_decision_desc: "Ян Юнтай, новый премьер, может воображать себя новым хозяином бюрократии, но правда в том, что у него не больше власти, чем принципов. Он и его приспешники пытались просеять администрацию, созданную Дай Цзитао, медленно вытесняя наших назначенцев и подкупая или продвигая своих людей — создавая страх и замешательство в рядах. Мы не будем ждать такого унижения — братья Чэнь организуют массовый уход правительственных чиновников, сделав аппарат неработоспособным. Даже те, кто колеблется, почувствуют давление присоединиться к нашим рядам, поскольку позиция Клики политической науки становится несостоятельной, а наше возвращение (и месть) неизбежным."

 YUN_Mobilise_the_Political_Commissars_decision: "Мобилизовать политических комиссаров"
 YUN_Mobilise_the_Political_Commissars_decision_desc: "Чан Кайши, возможно, создал Национально-революционную армию, но Дай Цзитао и Чэнь Гофу были рядом с ним с самого начала. Что отличает Национально-революционную армию от любой другой армии, бродящей по Китаю, так это тщательная политическая индоктринация, внедренная в каждое подразделение через его политических комиссаров, непосредственно отобранных и обученных самой партией. Именно эти связи мы будем использовать, чтобы продолжать привязывать армию к нам и благу партийного государства."

#BSS/WPC Decisions
 YUN_The_Whampoa_Coup_mission: "Переворот Вампу"
 YUN_The_Whampoa_Coup_mission_desc: "Произошла великая травестия — наш уважаемый Генералиссимус был вынужден уйти в отставку неблагодарной партией, выброшенный такими, как злой Ху Ханьминь. Это наглое проявление разобщенности и предательства заставило нашу страну выглядеть слабой на международной арене в то время, когда выживание наций зависит от порочной силы и упорства воли. Подобно продажным политикам прошлого, наша партия впала в мелочную внутреннюю борьбу и соперничество из-за тонкостей бесполезной бумажки. Если партия не сможет разобраться в делах в разумные сроки, то революционная армия, построившая эту нацию, возьмет дело в свои руки!"

 YUN_Leverage_Whampoa_Connections_decision: "Использовать связи Вампу"
 YUN_Leverage_Whampoa_Connections_decision_desc: "Что бы ни случилось, и что бы ни случилось, Хэ Инцинь сохраняет культ личности. Для многих бывших студентов и сотрудников он всегда будет одним из ведущих инструкторов Вампу и почтенным революционным генералом, который сам по себе может быть институтом. Хотя он всего лишь среднего возраста, он оставил свой след в истории нации. И хотя он загнан в угол со всех сторон, все еще есть много желающих сплотиться вокруг него.\n\n§RОднако для того, чтобы заманить умеренных обратно в его лагерь, потребуется более джентльменский, обнадеживающий подход, что может задержать планы армии по перевороту.§!"

 YUN_Campaign_of_Intimidation_decision: "Кампания запугивания"
 YUN_Campaign_of_Intimidation_decision_desc: "Нация находится в состоянии войны, осознает она это или нет. Каждый день — это еще одна битва за безопасность нации и будущее китайской расы! В этой войне должен использоваться каждый инструмент в нашем наборе инструментов для спасения нашей страны — будь то убийства, ночные аресты и массовая слежка. Через это праведное насилие наша нация возрождается.\n\n§RМы должны быть осторожны, однако, потому что страх имеет тенденцию загонять испуганных людей в любой лагерь, который их защитит.§!"

 YUN_Remind_about_Foreign_Threats_decision: "Напомнить об иностранных угрозах"
 YUN_Remind_about_Foreign_Threats_decision_desc: "«Японский империализм — смертельный враг китайского народа, и мы абсолютно отрицаем возможность компромиссного мира. Если эта партия не свергнет японский империализм, японский империализм уничтожит Китай. Поэтому мы решительно сохраняем отношение абсолютной вражды к Японии, и работа по сопротивлению Японии является самой важной и самой святой задачей этой партии». — Национальная программа Общества синерубашечников\n\nКитай остается под угрозой, независимо от того, сколько «сдержанности» или «компромисса» заявляют иностранные империалисты. Эта разобщенность по поводу чего-то столь тривиального и бессмысленного, как Временная конституция, вполне может стать похоронным звоном китайской цивилизации, если ее не остановят истинные патриоты революции."

 YUN_Encourage_Military_Disobedience_decision: "Поощрять военное неповиновение"
 YUN_Encourage_Military_Disobedience_decision_desc: "Почему наша революция терпит неудачу сегодня? Это, конечно, не потому, что армии не хватает воли сражаться. И не потому, что людям не хватает огня в сердцах или что Китай не способен быть великой нацией! Это та же причина, по которой Китай терпел неудачи последние несколько столетий — декаданс элиты и ее сговор с иностранными державами! Пока пекинские предатели и шанхайские воры продолжают доминировать в нашей политике и экономике, не может быть нового Китая. Но мы не потерпим этого и не вернемся к тому, как все было!\n\nЭто темный день, когда вечно лояльную Национально-революционную армию призывают к неповиновению партии. Но когда весь партийный аппарат предал революцию, что еще остается делать? Змеи в Центральном исполнительном комитете забыли, насколько незаменима сильная армия и сильная рука в выполнении наших революционных обещаний. Только организовав массовый отказ следовать их незаконным приказам, дестабилизируя их правительство, мы можем по-настоящему спасти нашу партию и нашу страну!"

#CEC + Other Decisions
 YUN_Negotiate_with_the_SCPC_decision: "Переговоры с ЮЗПС"
 YUN_Negotiate_with_the_SCPC_decision_desc: "Лоялисты Ху Ханьминя объединились в Южно-Китайский политический совет. Хотя мы успешно пресекли их попытки привлечь дальнейшую поддержку своему движению, они продолжают доминировать в старом сердце партии. Либо мы делаем шаг к примирению с ними (что обязательно будет популярно среди делегатов Национального собрания), либо мы работаем над подрывом этих переговоров."

 YUN_Handle_the_Leftist_Bloc_decision: "Взаимодействие с левым блоком партии"
 YUN_Handle_the_Leftist_Bloc_decision_desc: "Левые партии охватывают широкий спектр социалистов, синдикалистов, левых националистов и прогрессистов и с трудом представляют собой единое целое. Переговоры с ними — сложная задача, мягко говоря, это часто сродни разговору со стеной. Тем не менее, с единством партии под вопросом и растущим левым движением внутри самой армии, возможно, можно достичь какой-то договоренности."

 YUN_Negotiate_with_the_Dangwai_decision: "Диалог с Данвай"
 YUN_Negotiate_with_the_Dangwai_decision_desc: "Данвай (буквально переводится как «Вне партии») описывает различных политических независимых, которым было разрешено участвовать в законодательных процессах Гоминьдана. Чтобы сохранить легитимность разбирательств в [ROOT.Capital.GetCapitalVictoryPointName], было приглашено большое количество Данвай.\n\nДанвай — разнообразная группа. Многие из южных Данвай склонны быть более левыми и прогрессивными. Привыкшие быть отстраненными от власти, многие жаждут своего шанса быть включенными в политические дискуссии. Многие из северных Данвай — устоявшиеся, консервативные политики из старых правительств Бэйяна. Привыкшие к вращающейся двери администраций, их политическая гибкость полезна, но они также вполне привыкли вести жесткие переговоры. Нам понадобятся они все, если мы хотим сохранить стабильность нашего правительства."

 YUN_Harness_the_Mass_Movement_decision: "Использование массового движения"
 YUN_Harness_the_Mass_Movement_decision_desc: "Революции выигрываются не только армиями и их оружием, но и народом и его готовностью поддержать их. Хотя многие утверждают, что говорят от имени народа, и еще больше утверждают, что сражаются за него, очень немногие действительно являются частью масс и способны поднять их среди лет войн и нарушенных обещаний."

