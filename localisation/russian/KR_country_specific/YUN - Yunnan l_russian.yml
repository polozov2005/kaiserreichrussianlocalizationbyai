 YUN_republicans_party: "Республиканцы"
 YUN_republicans_party_long: "Независимые республиканцы и интеллектуалы\n§LПосле Шанхайского восстания 1932 года и приостановки выборов многие либеральные интеллектуалы бежали от все более авторитарного режима Чжили в пользу федералистских правительств Южного Китая. В Юньнани многие педагоги нашли дорогу домой, заявив о своем отвращении к Пекинскому правительству, и присоединились к растущей Федерации китайских демократических партий (ФКДП).\n\nБлагодаря финансированию губернатора Тана они пользуются определенной степенью влияния в администрации Куньмина. Среди собрания прогрессивных интеллектуалов в Юньнани особенно высоко поднялись Су Хунган и Цунь Шушэн, сформировав свои собственные внутрипартийные группы в кругах Куньмина. Базируясь в Национальном юго-западном объединенном университете, Су и Цунь работают с членами Общества полумесяца Лян Шицю и Вэнь Идо, чтобы продвигать демократию в Юньнани.§!\n"

 #中國民主同盟 甸省委
