########################################
 YUN_KR_gathering_storm_desc: "Некогда ведущая сила республиканизма на юге, Клика Юньнань оказывается униженной несправедливостью времени. Вынужденный преклонить колени у подножия пекинского правительства, губернатор Тан Цзияо оказывается в тупике в борьбе против остатков сил Гоминьдана в Гуйчжоу. Именуя себя лидером Федералистского движения, Тан стремится не только сокрушить повстанцев Гоминьдана, но и осуществить объединение на своих условиях. Увидит ли наследник Защиты нации, как знамя федералистов развевается над Срединным царством, или мечта о Национальной революции возродится с пламенем мести?"

 YUN_country_intro_background: "GFX_YUN_intro"
 YUN_country_intro_header: "§lХозяин Восточного континента§!"
 YUN_country_intro_content: "Долгое время являясь очагом антицинских настроений, §YЮньнань§! решительно восстала после провозглашения §lСиньхайской революции§! в 1911 году. Под руководством §mЛи Гэньюаня§! Военная академия Куньмина стала центральным элементом шахматной доски революционеров в регионе, а ее выпускники и преподаватели так или иначе были связаны с §lТунмэнхоем§!. Под эгидой §mЛи Гэньюаня§!, §PЦай Э§!, §aЛо Пэйцзиня§!, §PЛю Цуньхоу§!, §mГу Пиньчжэня§!, §aТан Цзияо§! и других, §lТунмэнхой§! §YЮньнани§! начал собственное восстание солидарности с §lСиньхаем§! 30 октября 1911 года (Девятый день девятого месяца по лунному календарю), получившее название восстания «Двойной девятки». Став одной из первых провинций, добившихся полной победы в §lСиньхайской революции§!, §YЮньнань§! отправилась вторгаться в §YСычуань§! и §YГуйчжоу§!, вдохновляя местные силы на восстание, делая то же самое в §YГуанси§! и §YГуандуне§!. Став почти национальным героем, §PЦай Э§! стал губернатором §YЮньнани§!, а §aТан Цзияо§! — губернатором §YГуйчжоу§!.\n\nС разрушением нестабильной политической диархии между Севером и Югом из-за махинаций §PЮань Шикая§!, герой §lСиньхая§! и набожный революционер §cЛи Лецзюнь§! начал свою §cВторую революцию§! под эгидой §aСунь Ятсена§!, что в конечном итоге оказалось обреченным начинанием после того, как большое количество провинций, включая §YЮньнань§! и §YГуйчжоу§!, отказались подчиниться призыву к революции. Все еще оставаясь в шатком балансе сил, §PЦай Э§! был «повышен» до должности в §YПекине§!, практически будучи вынужденным согласиться, и поэтому назначил §aТан Цзияо§! на свое место в §YЮньнани§!; а §PЛю Сяньши§! заменил §aТана§! в §YГуйчжоу§!.\n\nПланируя восстановить монархию, §PЮань Шикай§! побудил §mЛи Гэньюаня§!, §aТан Цзияо§!, §cЛи Лецзюня§!, §PЦай Э§! и других революционеров внутри и за пределами страны начать планировать еще одно восстание против его правления. Публично потребовав, чтобы §PЮань Шикай§! казнил всех своих сообщников по имперским амбициям, и не получив ответа, §PЦай Э§!, §cЛи§! и §aТан§! объявили о создании §lАрмии защиты нации§! и о своей независимости от §cЦентрального правительства§!. Одинокая провинция против остального Китая, решительные и блестящие победы, одержанные в ранней кампании против армии §eБэйяна§!, привели к тому, что к §YЮньнани§! присоединились §YГуйчжоу§!, §YГуанси§!, §YГуандун§! и в конечном итоге большая часть Юга (даже если некоторые неохотно).\n\nПобедив и сформировав собственное правительство на короткий период, и §PЦай Э§!, и §PЮань Шикай§! умерли вскоре после этого, оставив после себя основы для милитаризма. В ходе разворачивающейся политической борьбы между §PФэн Гочжаном§! и §PДуань Цижуем§!, де-факто преемниками §PЮаня§!, Северная ассамблея была распущена, и в ответ §aСунь Ятсен§!, §cЧжан Тайянь§! и другие начали §lДвижение в защиту конституции§! в §YГуандуне§!, хотя в конечном итоге оно было захвачено такими лидерами, как §PЛу Жун-тин§! и §aЦэнь Чуньсюань§!, которые пытаются вести переговоры с §eБэйяном§!. Втянутый в Движение в качестве заместителя генералиссимуса (хотя и немедленно ушедший в отставку), §aТан§! продолжил свои амбиции по контролю над Юго-Западом.\n\nВ начале 1920-х годов §YФедералистское§! движение набрало интеллектуальный оборот, видя ключевых промоутеров среди милитаристов, таких как §PЛу Юнсян§!, §aЦао Кун§!, §cЧжао Хэнти§!, §aТан Цзияо§!, §lЧэнь Цзюнмин§!, §SСюн Кэу§! и другие. После смерти §aСуня§! в 1925 году §aТан§! попытался заявить о своих правах на пост генералиссимуса, но был решительно отброшен §PНовой кликой Гуанси§!, отступив с презрением и неудачей в §YЮньнань§! и §YГуйчжоу§!."

 YUN_country_intro_header_1: "§gКороль Юго-Запада§!"
 YUN_country_intro_content_1: "Фактически отстраненный от дел в своем собственном правительстве, и с нарастающими первостепенными опасениями неминуемого вторжения Гоминьдана, §aТан Цзияо§! сделал козлом отпущения за провал вторжения в Гуанси §PЧжан Жуцзи§! (одного из четырех командующих гарнизонами Юньнани), выдворив его из §YМэнцзы§!, при этом §gЛун Юнь§! получил §YКуньмин§!, §PХу Жоюй§! получил старую территорию §PЧжана§!, а §PЛи Сюаньтин§! остался в §YДали§!. В июле 1926 года §aТан§! сформировал свою собственную политическую партию, утверждая, что у нее есть идеология, независимая от иностранного влияния и совместимая с «Китайской сущностью». Известная как §cМиньчжидан§!, или §cПартия народного правительства§!, она решительно §YФедералистская§!, но имеет неоднозначные отношения с §lЧжигунданом§!, или §lПартией общественных интересов§!, основанной §lЧэнь Цзюнмином§!, заместителем лидера которой §aТан Цзияо§! согласился стать годом ранее.\n\nС ослаблением Северного похода в начале 1927 года §aТан§! попытался снова вторгнуться в §kГоминьдан§!, но поскольку все его подчиненные решительно не повиновались ему, вместо этого был совершен переворот. Инициированный §PХу Жоюем§!, §YПереворот 6 февраля§! привел к тому, что §gЛун Юнь§! стал самым могущественным милитаристом в §YЮньнани§!. Настаивая на том, чтобы §aТан§! оставался марионеточным губернатором для поддержания баланса сил, §gЛун§! в конечном итоге был переигран силовым ходом §aТана§! 6 апреля, организовавшим восстание в §YМэнцзы§! и вытеснившим §PХу Жоюя§! из §YКуньмина§!, а затем приказавшим §PМэн Ювэню§! изгнать §gЛун Юня§!.\n\nПоскольку §kГоминьдан§! приказал совершить Великий поход в §YГуйчжоу§! в начале 1927 года, §PЧан Кайши§! был убит в феврале, и §cЧжу Пэйдэ§! взял на себя управление как §PГенералиссимус§!, ведя переговоры с враждующими милитаристами §YЮньнани§!, чтобы заставить их обосноваться в провинции §YГуйчжоу§!.\n\nС успехом Тана и уменьшением угрозы §RГоминьдана§!, Король Юго-Запада успешно вернул §YКуньмин§! и принудил к переговорам между всеми сторонами: §aТан§! получает §YКуньмин§!, §gЛун§! получает §YЧжаотун§!, §PХу§!, §PЛи Сюаньтин§! и §PЧжан Жуцзи§! получают §YМэнцзы§!. §aСунь Ду§!, бывший подчиненный §PХу§! и сторонник §aТана§!, получает §YДали§!. Возобновив переговоры с §YПекином§! во время 4-й войны Чжили-Фэнтянь в 1928 году, §aТан§! добился уступок для §YФедерализма§! в дополнение к финансированию Центрального правительства с условием, что он выступит против §RГоминьдана§! в §aГуйчжоу§!.\n\nОднако, подобно Северному походу, §gЛун Юнь§! отказался жертвовать своими солдатами, и поэтому мало что произошло. В 1930-х годах §gКлика Юньнань§! замкнулась в себе из-за разочарования в §zПравительстве Чжили§! и прекратила свои набеги на §kГоминьдан§!. В то же время §gХунта§! §kГоминьдана§! в §YГуйчжоу§! создала правящий совет из 5 человек под руководством §PХэ Инциня§!, §cТань Янькая§!, §cЧжу Пэйдэ§!, §aЧэн Цяня§! и §PЛи Цзунжэня§!. Реорганизовав остатки НРА, они консолидировали свои силы в 1-ю, 3-ю, 6-ю и 7-ю Национально-революционные армии, вытеснив §cТань Янькая§!."

 YUN_country_intro_header_2: "Сложенный карточный домик"
 YUN_country_intro_content_2: "§MКлика Юньнань§!\nВокруг хрупкого баланса, достигнутого в §YЮньнани§!, находятся различные разрозненные политические фракции провинции. С ядром и действующей властью, удерживаемой одноименной §aКликой Тана§! §aТан Цзияо§!, они представляют собой текущее лицо провинциальной политики. Верная непосредственно преемнику §PЦай Э§!, §aТан Цзияо§!, история §aКлики Тана§! так же запятнана, как и у ее лидера. Проповедуя как авторитарную, так и прогрессивную политику с конечной целью продвижения §YФедерализма§!, §aКлика Тана§! стремится заручиться поддержкой интеллектуалов-реформаторов, сохраняя при этом лояльность джентри и офицеров. С ней также связана §cПартия народного правительства (Миньчжидан)§!, преемница более ранней §cДемократической партии (Миньчжудан)§! §aТана§!, представляющая более реформистский, демократический и консервативный подход губернатора, вдохновленный §cЛян Цичао§!, §cЧжан Шичжао§! и §cЧжан Тайянем§!.\n\nПараллельно в погоне за демократией работает благородное §lОбщество полумесяца§!, сформированное как коллекция интеллектуалов с англо-американским образованием, писавших для §lЖурнала Полумесяца§!. Часто вступая в конфликт с левыми писателями из-за принятия более умеренного и современного консервативного взгляда на китайскую культуру, §lАколиты Полумесяца§! начали продвигать гуманистическую форму конституционализма с акцентом на права человека и образование.\n\nВ совокупности остаются клики §PХу Жоюя§! и §gЛун Юня§!, сосредоточенные вокруг их одноименных фигур. Принимая различные формы полупрогрессивных правительственных взглядов, милитаристские клики на самом деле желают только править наверху, укреплять Юньнань и упорствовать в провинции, по крайней мере, на поверхности. Среди них числятся различные мелкие группы интересов, такие как §mТорговая палата Юньнани§!, §nПартия молодой Китай§! и другие.\n\n§MГоминьдан§!\nВнутри остаточного режима §kГоминьдана§!, который консолидировался в §YГуйчжоу§!, остается много фракций с разрозненными идеологическими интерпретациями Трех народных принципов и воли §aОтца нации§!. С лоялистами Старых правых, §kГоминьдан§! Гуйчжоу представляет собой сердце секты Новых правых партии под руководством ее главного идеологического теоретика §aДай Цзитао§!. Однако настоящие бразды правления находятся у потомков §PЧан Кайши§! в виде §PКлики Вампу§!, возглавляемой §PХэ Инцинем§!. Продвигая палингенетический ультранационализм §aДая§!, который, как утверждается, основан на традиционных китайских верованиях, §PХэ Инцинь§! стремится оживить Китай в погоне за Национальной революцией.\n\nБлагодаря усилиям §aДая§!, Общество революционных товарищей Чжэцзяна, возглавляемое в настоящее время §aбратьями Чэнь§!, стремится объединиться в неформальную структуру §aКлики Центрального клуба§!, технократов со своей собственной «виталистской» доктриной и похожим патерналистским революционным национализмом, как у §PКлики Вампу§!. В оппозиции к ним находится §mНовая клика политической науки§!, с их нишей в управлении и банковских интересах, они по своей сути технократичны и элитарны, но посвящены атрибутам «либеральной» демократии — управляемой через бюрократию.\n\nРадикалы Партии нашли свои стаи слева и справа в лагерях §SКлики гражданского строительства§! и §nОбщества синерубашечников§!. Причем последние считают, что §RНациональная революция§! потеряла свой революционный путь, они вдохновлены как Савинковым, так и Кодряну. §SГражданское строительство§! занимает особую нишу как левые, тесно связанные с §rВременным комитетом действий§!, балансируя между §Sлевыми§! и §aправыми§! Партии.\n\nОднако первенство остается за §c3-й армией Чжу Пэйдэ§!, представляющей §aСтарых правых Гоминьдана§!. Вдохновленный ортодоксальным саньминизмом и с сильной приверженностью целостности §aХу Ханьминя§! как лидера §YЦентрального комитета§!, §cЧжу Пэйдэ§! по своей сути является регионалистом, стремящимся помочь Центральному комитету в их возвращении в §YЛянгуан§!. На его фланге находится секта левых §RЧжу Дэ§! внутри §c3-й армии§!, находящаяся под сильным влиянием §RЧжан Боцзюня§! из §RВременного комитета действий§!."

 YUN_guide: "§MПути сателлитов Гоминьдана — CPWDP/3AL - CEC - PSC - 3AR§! ($radical_socialist_coloured$ / $social_democrat_coloured$ / $market_liberal_coloured$ / $social_conservative_coloured$)\n£white_dot Чтобы §cГоминьдан§! пришел к власти в Юньнани, он должен выиграть §YБорьбу Дянь-Цянь§!\n£white_dot Чтобы стать сателлитом, вы должны подчиниться либо Повстанческому движению Миньгань, либо любому другому правительству Гоминьдана.\n\n£white_dot §YПримечание: Пути Радикальных социалистов CPWDP/3AL и Социал-демократов CEC доступны только при условии подчинения §RПовстанческому движению Миньгань§!§!\n\n§MДемократическая партия китайских крестьян и рабочих/Левые 3-й армии§! ($radical_socialist_coloured$)\n£white_dot Как только ваш хозяин возьмет Пекин (с вашей помощью), заставьте §RЧжан Боцзюня§! и §RЧжу Дэ§! захватить власть в результате переворота, сделав §RРадикальных социалистов§! самой популярной партией\n£white_dot Позже вы можете предать Центральный комитет и объединить Китай на своих условиях\n\n§MКлика гражданского строительства§! ($social_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot Как только ваш хозяин возьмет Пекин (с вашей помощью), заставьте §SЧэнь Чэна§! захватить власть в результате переворота, сделав §SСоциал-демократов§! или §PПатерналистов-автократов§! (в зависимости от того, связаны ли вы с §RЛевым Гоминьданом§! или §cПравым Гоминьданом§!) самой популярной партией\n£white_dot Позже вы можете предать Центральный комитет и объединить Китай на своих условиях\n\n§MНовая клика политической науки§! ($market_liberal_coloured$)\n£white_dot Как только ваш хозяин возьмет Пекин (с вашей помощью), оставьте §cЧжу Пэйдэ§! у власти, сделав §cСоциал-консерваторов§! самой популярной партией\n£white_dot Позже вы можете предать Центральный комитет и объединить Китай на своих условиях\n£white_dot После объединения завершите свое дерево фокусов, пока не получите событие о партийных выборах, и выберите §mЛи Гэньюаня§! победителем\n\n§MПравые 3-й армии§! ($social_conservative_coloured$)\n£white_dot Как только ваш хозяин возьмет Пекин (с вашей помощью), оставьте §cЧжу Пэйдэ§! у власти, сделав §cСоциал-консерваторов§! самой популярной партией\n£white_dot Позже вы можете предать Центральный комитет и объединить Китай на своих условиях\n£white_dot После объединения завершите свое дерево фокусов, пока не получите событие о партийных выборах, и выберите §cЧжу Пэйдэ§! победителем\n\n\n§MПути претендентов Гоминьдана — PSC - CCC - CEC - WPC - BSS§! ($market_liberal_coloured$ / $authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$ / $national_populist_coloured$)\n£white_dot Чтобы §cГоминьдан§! пришел к власти в Юньнани, он должен выиграть §YБорьбу Дянь-Цянь§!\n£white_dot Чтобы стать претендентом, вы должны объявить войну владельцу Гуанчжоу и успешно сформировать собственное соперничающее правительство\n\n§MНовая клика политической науки§! ($market_liberal_coloured$)\n£white_dot Держите §cНационалистический пыл§! на низком уровне и возьмите Пекин\n£white_dot Убедитесь, что §PХэ Инцинь§! потерпит неудачу на первом этапе §YКризиса Временной конституции§!\n£white_dot После того как §mЧжан Цюнь§! придет к власти, помогите §mPSC§! принять временную конституцию на втором этапе\n\n§MКлика Центрального клуба§! ($authoritarian_democrat_coloured$)\n£white_dot Держите §cНационалистический пыл§! на высоком уровне и возьмите Пекин\n£white_dot Убедитесь, что §PХэ Инцинь§! потерпит неудачу на первом этапе §YКризиса Временной конституции§!\n£white_dot После того как §mЧжан Цюнь§! придет к власти, помогите §aКлике CC§! вынести вотум недоверия на втором этапе\n\n£white_dot У §aКлики Центрального клуба§! есть два пути после объединения; §YЗабота о национальном улье§! под руководством §PДай Цзитао§! и §YВдевание нитки в иголку§! под руководством §aЧэнь Лифу§! и §aЧэнь Гофу§!\n£white_dot Чтобы сохранить §PДай Цзитао§! после объединения, откажитесь от его отставки. В противном случае принятие его отставки разблокирует §aЧэнь Лифу§! и §aЧэнь Гофу§!\n\n§MКлика гражданского строительства§! ($paternal_autocrat_coloured$)\n£white_dot Держите §cНационалистический пыл§! на высоком уровне и возьмите Пекин\n£white_dot Убедитесь, что §PХэ Инцинь§! потерпит неудачу на первом этапе §YКризиса Временной конституции§!\n£white_dot После того как §mЧжан Цюнь§! придет к власти, поддержите §YПереворот Вампу§!\n£white_dot После объединения выберите первый фокус дерева §PКлики гражданского строительства§!\n\n§MКлика Вампу§! ($paternal_autocrat_coloured$)\n£white_dot Держите §cНационалистический пыл§! на среднем уровне и возьмите Пекин\n£white_dot Убедитесь, что §PХэ Инцинь§! добьется успеха на первом этапе §YКризиса Временной конституции§!\n\n£white_dot У §PКлики Вампу§! есть 5 подконцовок, связанных с выбором игрока после объединения; §YРеволюционно-демократическое будущее§! (связано с §SCEC§!), §YВосстановление духовного равновесия§! (связано с §aCCC§!), §YВоенный централизм§! (связано с §PWPC§!), §YПерестановка в Исполнительном Юане§! (связано с §mPSC§!) и §YРеализация диктатуры§! (связано с §sBSS§!)\n£white_dot Чтобы получить доступ к любому из путей, просто выберите одноименный фокус, когда это возможно\n\n§MОбщество синерубашечников§! ($national_populist_coloured$)\n£white_dot Держите §cНационалистический пыл§! на низком уровне и возьмите Пекин\n£white_dot Убедитесь, что §PХэ Инцинь§! потерпит неудачу на первом этапе §YКризиса Временной конституции§!\n£white_dot После того как §mЧжан Цюнь придет к власти§!, поддержите §PПереворот Вампу§!\n£white_dot После объединения выберите первый фокус дерева §sОбщества синерубашечников§!"

 YUN_guide_1: "§MПути сателлитов Федералистов — YCDL - PGP - TXY§! ($social_democrat_coloured$ / $market_liberal_coloured$ / $authoritarian_democrat_coloured$)\n£white_dot Чтобы §fФедералисты§! пришли к власти в Юньнани, они должны выиграть §YБорьбу Дянь-Цянь§!\n£white_dot Чтобы стать сателлитом, вы должны подчиниться любому правительству §fФедералистов§!\n\n§MДемократическая лига Китая Юньнани§! ($social_democrat_coloured$)\n£white_dot Как только ваш хозяин возьмет Пекин (с вашей помощью), заставьте §SДемократическую лигу Китая Юньнани§! захватить власть в последовавшей борьбе за власть\n£white_dot Позже вы можете предать своего сюзерена и объединить Китай на своих условиях\n£white_dot Держите §fДемократический энтузиазм§! на высоком уровне и помогите §SЦунь Шушэну§! выиграть последующие национальные выборы\n\n§MПартия народного правительства/Клика Дянь§! ($market_liberal_coloured$ / $authoritarian_democrat_coloured$)\n£white_dot Как только ваш хозяин возьмет Пекин (с вашей помощью), заставьте §SДемократическую лигу Китая Юньнани§! захватить власть в последовавшей борьбе за власть\n£white_dot Позже вы можете предать своего сюзерена и объединить Китай на своих условиях\n£white_dot §mТан Сяоин§! и §mПартия народного правительства§!/§aКлика Дянь§! могут прийти к власти как §mРыночные либералы§! и §aАвторитарные демократы§!\n\n£white_dot Чтобы прийти к власти как §mРыночный либерал§!, держите §fДемократический энтузиазм§! на высоком уровне и помогите §mТан Сяоину§! выиграть последующие национальные выборы\n£white_dot Чтобы прийти к власти как §aАвторитарный демократ§!, держите §fДемократический энтузиазм§! на низком уровне и впоследствии помогите §aТан Сяоину§! выиграть последующую борьбу за власть\n\n£white_dot В качестве альтернативы, можно захватить власть, если §fДемократический энтузиазм§! либо §SДемократической лиги Китая Юньнани§!, либо §mПартии народного правительства§! упадет до низкого уровня\n\n\n§MПути претендентов Федералистов — CMS - PGP - TJY§! ($social_liberal_coloured$ / $social_conservative_coloured$ / $authoritarian_democrat_coloured$)\n£white_dot Чтобы §fФедералисты§! пришли к власти в Юньнани, они должны выиграть §YБорьбу Дянь-Цянь§!\n£white_dot Чтобы стать претендентом, вы должны объявить войну владельцу Гуанчжоу и успешно сформировать собственное соперничающее правительство\n\n§MОбщество полумесяца§! ($social_liberal_coloured$)\n£white_dot Держите §fДемократический энтузиазм§! на высоком уровне и возьмите Пекин\n£white_dot После объединения выберите §lЛо Лунцзи§! президентом\n\n§MПартия народного правительства§! ($social_conservative_coloured$)\n£white_dot Держите §fДемократический энтузиазм§! на высоком уровне и возьмите Пекин\n£white_dot После объединения выберите §cТан Цзияо§! президентом\n\n§MКлика Дянь§! ($authoritarian_democrat_coloured$)\n£white_dot Держите §fДемократический энтузиазм§! на низком уровне и возьмите Пекин\n£white_dot После объединения выберите §aТан Цзияо§! президентом в обстоятельствах, воспринимаемых как несправедливые\n\n£white_dot В качестве альтернативы, можно захватить власть, если §fДемократический энтузиазм§! либо §lОбщества полумесяца§!, либо §cПартии народного правительства§! упадет до низкого уровня"

 YUN_guide_2: "§MРегионалисты — LYC - LHN - HRY§! ($authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot Чтобы §eРегионалисты§! пришли к власти в Юньнани, любая сторона должна выиграть §YБорьбу Дянь-Цянь§!\n£white_dot Объявите войну владельцу Гуанчжоу и зайдите в тупик в конфликте, прежде чем попросить мира\n£white_dot После подписания мира §aЛун Юнь§! совершит переворот в правительстве\n\n§MКлика Лун Юня§! ($authoritarian_democrat_coloured$)\n£white_dot После начала Второй японо-китайской войны победите попытку переворота §PХу Жоюя§!\n£white_dot Позже вы можете предать своего сюзерена и объединить Китай на своих условиях\n£white_dot У §aЛун Юня§! есть два пути после объединения; §YЭффективное правительство§! и §YЗакаленная демократия§!\n£white_dot Чтобы получить доступ к любому из путей, просто выберите одноименный фокус\n\n§MКлика Лу Ханя§! ($authoritarian_democrat_coloured$)\n£white_dot После начала Второй японо-китайской войны пусть попытка переворота §PХу Жоюя§! увенчается успехом\n£white_dot Позже вы можете предать своего сюзерена и объединить Китай на своих условиях\n£white_dot После объединения пусть §aЛу Хань§! победит §PХу Жоюя§! в последовавшей борьбе за власть\n\n§MКлика Мэнцзы§! ($paternal_autocrat_coloured$)\n£white_dot После начала Второй японо-китайской войны пусть попытка переворота §PХу Жоюя§! увенчается успехом\n£white_dot Позже вы можете предать своего сюзерена и объединить Китай на своих условиях\n£white_dot После объединения пусть §PХу Жоюй§! победит §aЛу Ханя§! в последовавшей борьбе за власть "

