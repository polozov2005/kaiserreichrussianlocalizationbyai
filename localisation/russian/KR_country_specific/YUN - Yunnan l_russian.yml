 YUN_apostle_of_the_cultural_revolution_trait_desc: "§L«Чтобы требовать подлинного освобождения всего человечества, сначала необходимо взять всю научную культуру и сформировать ее на основе морали сострадания и любви».§!"

 YUN_socialist_at_heart: "Социалист в душе"
 YUN_socialist_at_heart_desc: "§LСтранная птица среди Новых правых Гоминьдана, многие близкие к Чэнь Чэну описывают его как «социалиста в душе». Его стремление к достижению Миньшэна только укрепило эти утверждения.§!"

 YUN_little_generalissimo: "Маленький Генералиссимус"
 YUN_little_generalissimo_desc: "§LЗемля — это опора человеческой жизни, но теперь она в дефиците. Объект, за обладание которым индивидуум сражался с индивидуумом, а нация сражалась с нацией. Под эгидой Маленького Генералиссимуса сама земля увидит свободу.§!"

 YUN_champion_of_the_peasantry: "Защитник крестьянства"
 YUN_champion_of_the_peasantry_desc: "§L«Освобождая нацию, развивая ее экономику, нужно сначала освободить капитал и сам труд через земельную реформу. Только тогда китайская нация сможет процветать».§!"

 YUN_the_lingxiu: "Линсю"
 YUN_the_lingxiu_desc: "§L«Если лидер хорош, то революционное предприятие, которое он возглавляет, будет быстро прогрессировать; если лидер не хорош, то революционное предприятие, которое он возглавляет, вряд ли избежит ложного курса».§!"

 YUN_the_generalissimo: "Генералиссимус"
 YUN_the_generalissimo_desc: "§LСамо воплощение военной формальности, Хэ Инцинь заявляет, что «военная мощь — единственная гарантия существования и развития нации».§!"

 YUN_marshal_of_the_new_right: "Маршал Новых правых"
 YUN_marshal_of_the_new_right_desc: "§LВечно преданный китайской нации, Хэ Инцинь поклялся продвигать «Одну доктрину, одну партию» и принципы духовной революции Дай Цзитао.§!"

 YUN_the_crude_reformist: "Грубый реформист"
 YUN_the_crude_reformist_desc: "§LВ окружении своих союзников в Либеральной олигархии Китая Генералиссимус Хэ взял на себя мантию установления демократического наследия нации.§!"

 YUN_safeguarding_chinese_democracy_trait: "Защита китайской демократии"
 YUN_safeguarding_chinese_democracy_trait_desc: "§L«Наступая, он беспокоится о стране; отступая, он в мире с миром. Его мысли тщательны, как планирование для страны; его дух силен, как использование войск; его использование законов снисходительно, как забота о людях; его чувства глубоки».§!"

 YUN_modernising_maverick: "Модернизатор-инакомыслящий"
 YUN_modernising_maverick_desc: "§LМахинации и сделки — это то, как функционируют многие правительства, и при Политической науке такие методы обмана направлены только на преследование Национальной революции.§!"

 YUN_the_first_assessor: "Первый оценщик"
 YUN_the_first_assessor_desc: "§LОбъединив состояния умного царя, мудрого правителя и мудрого ученого, Тан Цзияо поистине является Первым оценщиком Тайяня, как Янь Хуэй был для Конфуция.§!"

 YUN_the_third_assessor: "Третий оценщик"
 YUN_the_third_assessor_desc: "§LУчась и слушая как своего отца, Чжан Тайяня, так и многочисленных других республиканских государственных деятелей, Сяоин стал сродни Третьему оценщику Тайяня, как Цзысы был для Конфуция.§!"

 YUN_master_of_the_eastern_continent: "Хозяин Восточного континента"
 YUN_master_of_the_eastern_continent_desc: "§LВозможно, величайший китайский государственный деятель, который когда-либо жил, Тан Цзияо поистине в зените славы. Бесспорный чемпион китайской политики, он один предпринял шаги, необходимые для восстановления Китая.§!"

 YUN_the_princeling: "Наследный принц"
 YUN_the_princeling_desc: "§LХотя он и не так богат наградами, как его отец, Тан Сяоину все же удалось гарантировать, что политическая династия Тан останется вечно богатым образом в умах всех китайцев.§!"

 YUN_the_patriot_pedagogue: "Патриот-педагог"
 YUN_the_patriot_pedagogue_desc: "§L«Вы должны закалять свой дух в трудной среде и развивать свою силу в борьбе... Я верю, что каждый потомок Желтого императора не будет покорным гражданином и не будет добровольным рабом!»§!"

 YUN_the_lonesome_warrior: "Одинокий воин"
 YUN_the_lonesome_warrior_desc: "§LПечально известный своей неуживчивостью по сравнению с Чжан Цзюньмаем и «не очень китайский» по сравнению с Хуан Яньпэем, Ло известен своим вспыльчивым характером. Но некоторые считают, что это делает его целеустремленное стремление к демократии еще сильнее.§!"

 YUN_king_of_yunnan: "Король Юньнани"
 YUN_king_of_yunnan_desc: "§LИзвестный своей непреодолимой ролью в политике Юньнани на протяжении десятилетий, Лун Юнь заблокировал провинцию своей железной хваткой.§!"

 YUN_dian_dragon: "Дракон Дянь"
 YUN_dian_dragon_desc: "§LВосстав с Юго-Запада как то, что когда-то было мелким милитаристом, Лун Юнь поднялся на высший пост как истинный государственный деятель и один из самых стойких, кого может предложить Китай.§!"

 YUN_the_great_commandant_trait: "Великий комендант"
 YUN_the_great_commandant_trait_desc: "§LДуховный преемник многих военных силачей-президентов до него, Ху отличается своей несравненной силой и решимостью, как на войне, так и в политике.§!"

 YUN_reluctant_revolutionary: "Невольный революционер"
 YUN_reluctant_revolutionary_desc: "§LПрагматичный превыше всего, Лу Хань готов работать с кем угодно, чтобы дополнить свои политические амбиции, даже если это сводит его с людьми более революционного характера.§!"

#Dynamic Modifiers
 YUN_phase3_econ_tree_reward_state_modifier: "Оживленная южная экономика"
 YUN_phase3_econ_tree_reward_state_modifier_desc: "Наши экономические реформы наконец принесли плоды. Поскольку мы начинаем свое пребывание в качестве национального правительства, успех экономической модели Южного Китая покажет нации, на что мы способны."

 YUN_civil_engineerings_reforms_effect: "Реформы Гражданского строительства"
 YUN_civil_engineerings_reforms_effect_desc: "Вдохновленное крестовым походом Чэнь Чэна против злых джентри, местных хулиганов и господства богатых в китайском обществе, его правительство подстегнуло серию местных провинциальных администраций, сосредоточенных на контроле арендной платы, снижении налогов и согласованных усилиях по искоренению господства элит."

 YUN_spiritual_authoritarianism_effect: "Весы Новых правых"
 YUN_spiritual_authoritarianism_effect_desc: "Представляя опасную и своеобразную форму Военного центризма Хэ Инциня в его управлении, Весы Новых правых являются символом его акционеров.\n§YЭффекты этой идеи изменяются в зависимости от вашей текущей популярности партий $market_liberal_coloured$, $authoritarian_democrat_coloured$, $national_populist_coloured$, $social_democrat_coloured$ и $paternal_autocrat_coloured$.§!"
 YUN_spiritual_authoritarianism_dynamic_modifier_tt: "§CДобавляет Динамический модификатор, эффекты которого зависят от вашей текущей популярности партий $market_liberal_coloured$, $authoritarian_democrat_coloured$, $national_populist_coloured$, $social_democrat_coloured$ и $paternal_autocrat_coloured$.§!\nТекущие эффекты:\n - Ежедневный прирост политической власти: [?YUN.party_popularity@market_liberal|=%+]\n - Модификатор стабильности от популярности партии: [?YUN.party_popularity@authoritarian_democrat|=%+]\n - Поддержка войны: [?YUN.party_popularity@national_populist|=%+]\n - Выработка фабрик: [?YUN.party_popularity@social_democrat|=%+]\n - Множитель увеличения максимального командного ресурса: [?YUN.party_popularity@authoritarian_democrat|=%+]"

 YUN_national_defense_fortification_plan_effect: "План укрепления национальной обороны"
 YUN_national_defense_fortification_plan_effect_desc: "Чтобы предотвратить уничтожение силами за пределами национальных границ Китая, нация приступила к амбициозному национальному плану укрепления, направленному на усиление центрального контроля над границей."

 YUN_towards_revolutionary_datong_modifier: "Возвращение к духовному корню"
 YUN_towards_revolutionary_datong_modifier_desc: "Северо-западная граница Китая — это лишь неиспользованный рог изобилия ресурсов и добродетели. Его нужно просто использовать Центральному правительству. Обеспечивая безопасность границ Китая и вселяя чувство гордости в духовных горячих точках нации, Гоминьдан начал программу тщательного культивирования на Северо-Западных территориях, обеспечивая модернизацию при сохранении хрупкого баланса в регионе."

 YUN_constituent_of_the_chinese_confederation_modifier: "Составная часть Китайской Конфедерации"
 YUN_constituent_of_the_chinese_confederation_modifier_desc: "Федерализм в его лучшем проявлении, центральное правительство наделило составляющие провинции множеством широких полномочий. Хотя и не так радикально, как предпочел бы Чжан Тайянь, суть его идеалов по-прежнему формирует национальную и провинциальную политику на местах."

