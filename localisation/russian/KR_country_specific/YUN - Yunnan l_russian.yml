## Beiyang (BEI)

 #缪云台
 YUN_miao_yuntai: "Мяо Юньтай"
 YUN_miao_yuntai_bio: "Изучая английский язык в Школе диалектов Куньмина в конце правления Цин, Мяо Юньтай поступил в подготовительный класс для обучения за границей после 1911 года, а в 1913 году получил стипендию для обучения в Соединенных Штатах. Изучая горное дело и металлургию в Юго-Западном колледже в Канзасе, а затем в Университете Миннесоты, он окончил его в 1918 году и работал в сталелитейной компании в Нью-Йорке. В 1919 году он вернулся в Юньнань и вскоре после этого был назначен Тан Цзияо президентом Оловянной компании Гэцзю. Поскольку компания в то время несла финансовые убытки, Мяо удалось погасить долги и внедрить современные западные технологии, значительно улучшив работу компании.\n\nВ 1924 году он служил со-управляющим банка Юньнань Фудянь, а в 1928 году был назначен директором Департамента сельского хозяйства и горнодобывающей промышленности провинции, а также членом Провинциальной ассамблеи. В 1930 году он был председателем Комитета по финансовому оздоровлению провинции Юньнань, а в 1931 году стал генеральным управляющим Промышленного банка Юньнани. Продолжая служить директором Департамента промышленности, Мяо стал генеральным управляющим Юньнаньской оловорафинировочной компании, значительно повысив стандарты юньнаньского олова.\n\nВ 1934 году он был назначен президентом Нового банка Фудянь и преобразовал финансовую систему провинции с ориентированной на опиум на ориентированную на олово, а также улучшил валюту банкнот провинции Юньнань. Внося вклад в развитие местной промышленности, Мяо является главным представителем финансовых интересов Юньнани."
 YUN_miao_yuntai_leader_desc: "§YРодился:§! §L23 марта 1894 г., Куньмин, провинция Юньнань, Великая Цин§!\n§YБиография:§! §L$YUN_miao_yuntai_bio$§!"
 YUN_miao_yuntai_advisor_desc: "§YРодился:§! §L23 марта 1894 г., Куньмин, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §mТорговая палата§!\n§YБиография:§! §L$YUN_miao_yuntai_bio$§!\n\n§YПримечания: Подчеркнуто беспартийный.§!"

 #徐之琛
 YUN_xu_zhichen: "Сюй Чжичэнь"
 YUN_xu_zhichen_advisor_desc: "§YРодился:§! §Lпровинция Юньнань, Великая Цин§!\n§YПриверженность:§! §LНейтральный§!\n§YБиография:§! §LКлючевой приверженец провинциальной администрации Юньнани, Сюй Чжичэнь был назначен в 1916 году смотрителем Мэнцзы под началом Цай Э, и, поднимаясь по служебной лестнице при Тан Цзияо, был назначен директором Департамента иностранных дел и Департамента финансов. Во времена Военного правительства Гуанчжоу Сюй Чжичэнь был отправлен туда для наблюдения и сбора разведданных для Тан Цзияо, и по возвращении остался в министерстве. Он примечателен тем, что его ненавидят члены клики Юньнань, которые видят в нем бенефициара кумовства или ядро клики Тан Цзияо, хотя действительно ли это так — вопрос интерпретации.§!"

 #張維翰
 YUN_zhang_weihan: "Чжан Вэйхань"
 YUN_zhang_weihan_sic_desc: "§YРодился:§! §L29 декабря 1886 г., уезд Дагуань, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §LНейтральный§!\n§YБиография:§! §LОкончив Юньнаньскую школу публичного права и политики, в 1908 году Чжан Вэйхань присоединился к 37-й бригаде 19-го армейского полка, служа учителем и секретарем. Во время восстания Двойной девятки он участвовал на стороне революционеров и вступил в Гоминьдан в 1912 году. Служа подчиненным Тан Цзияо, он стал главой отдела общих дел Административного управления провинции Юньнань и местным губернатором уездов Яньсин и Гэцзю. В 1915 году он присоединился к Хугоцзюнь и сражался в Войне в защиту республики против Лун Цзигуана.\n\nВойдя в Сычуань в 1916 году, он был назначен генеральным секретарем Офиса военного губернатора Сычуани и вернулся в Юньнань в 1917 году. В следующем году он был отправлен Таном представлять Юньнань в Военном правительстве Гуанчжоу, а позже отправился в Японию изучать административное управление в Императорском университете. В 1922 году он вернулся в Юньнань и был назначен губернатором Мэнцзы, а позже первым главой Муниципального управления Куньмина.\n\nПродолжая службу в конце 1920-х и начале 1930-х годов, Чжан Вэйхань занимал должности директора Департамента гражданских дел и директора Департамента иностранных дел. Уступчивый, квалифицированный и, несомненно, полезный, Вэйхань позитивно воспринимается большинством членов клики Юньнань, за исключением, главным образом, Лу Ханя.§!"

 #周钟岳
 YUN_zhou_zhongyue: "Чжоу Чжунъюэ"
 YUN_zhou_zhongyue_sic_desc: "§YРодился:§! §L17 октября 1876 г., уезд Цзяньчуань, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §LНейтральный§!\n§YБиография:§! §LПринадлежащий к народности бай, Чжоу Чжунъюэ родился в семье ученого и сдал провинциальные экзамены в Лицзяне и Дали, заняв первое место в обоих. В 1900 году он окончил академию Сиюнь в Дали и стал клерком при Чжао Фане, следуя за ним в Хунань и Сычуань. Вернувшись в 1903 году, он снова с блеском сдал провинциальные экзамены и отправился в Японию учиться за государственный счет, поступив в Университет Васэда на факультет права и политики. Служа чиновником в провинции Юньнань, он протестовал против неравноправных договоров и вернулся в Юньнань в 1911 году, чтобы служить генеральным секретарем у Цай Э.\n\nСлужа на различных должностях, он стал незаменим для Цай Э, гражданским «инь» для милитаристского «ян». Когда Цай Э покинул Пекин в 1915 году, чтобы начать Войну в защиту республики, Чжоу работал, чтобы замести его следы, и отправился в Японию ради собственной безопасности. Приехав в Сычуань в 1916 году, он служил генеральным секретарем Ло Пэйцзиня, а затем в том же качестве у Тан Цзияо. В 1919 году он был исполняющим обязанности губернатора провинции Юньнань, а позже официальным губернатором. В 1922 году он был комиссаром по транспортировке соли Юньнани при Тан Цзияо, тайным советником и председателем Провинциального юридического комитета.\n\nВ 1926 году он стал директором Департамента внутренних дел провинции Юньнань и, недолго побыв посредником во внутренней политике клики Юньнань, ушел в отставку. В 1930 году он стал директором Музея общей истории Юньнани и составлял историю провинции. Отозванный в 1934 году Тан Цзияо, он служит министром гражданских дел Юньнани.§!"

 #李文宜
 YUN_li_wenyi: "Ли Вэньи"
 YUN_li_wenyi_advisor_desc: "§YРодилась:§! §L1903 г., Ухань, провинция Хубэй, Великая Цин§!\n§YПриверженность:§! §LНейтральный§!\n§YБиография:§! §LОкончив Хубэйское провинциальное женское нормальное училище в 1924 году, Ли Вэньи вступила в Китайскую синдикалистскую партию и Гоминьдан в марте 1926 года, служа в подпольном провинциальном комитете Гоминьдана в Хубэе. Особенно увлеченная движением за освобождение женщин, она организовала и возглавила работу Женской ассоциации провинции Хубэй. Член Женского комитета Китайской синдикалистской партии, она покинула страну в 1928 году, чтобы учиться в Университете Сунь Ятсена во Франции, и вернулась, чтобы служить членом комитета района Худун в Шанхае от Китайской синдикалистской партии в 1930-х годах.\n\nПостепенно увлекаясь политикой Третьего пути после Шанхайского восстания, она неформально связала себя с Национальным обществом возрождения Чжан Цзюньмая, Обществом полумесяца, Движением сельского строительства, Кликой политической науки и всеми другими партиями или ассоциациями Третьего пути. Ведущая феминистка в борьбе китайских женщин за равенство, она переехала в Куньмин, чтобы создать там провинциальную женскую организацию, основываясь на своей работе в Хубэе.§!"

 #鲁道源
 YUN_lu_daoyuan: "Лу Даоюань"
 YUN_lu_daoyuan_high_command_desc: "§YРодился:§! §L1900 г., уезд Чаннин, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §LНейтральный§!\n§YБиография:§! §LОкончив 13-е пехотное отделение Куньминской военной академии, Лу Даоюань служил в Четвертом гвардейском полку Цзингоцзюнь с 1922 по 1927 год. Получив звание командира батальона, он лавировал в политике клики Юньнань, чтобы позиционировать себя как сторонник Лун Юня и Тан Цзияо. Выступал против амбиций Чжан Жуцзи и Ху Жоюя. Повышен до командира Четвертого гвардейского полка в 1928 году, став бригадным генералом в том же году.\n\nУчаствуя в многочисленных стычках в конце 1920-х годов, Лу проявил необычайное остроумие и храбрость перед лицом серьезных проблем в Юньнаньской армии и известен своей склонностью к стальной решимости перед лицом превосходящих сил.§!"

 #廖行超
 YUN_liao_xingchao: "Ляо Синчао"
 YUN_liao_xingchao_bio: "Писавший стихи под руководством своего дяди, Ляо Синчао окончил Младшее нормальное училище Куньмина в 1911 году. Охваченный Синьхайской революцией, он отказался от карьеры в литературе и вступил в армию, служа в студенческом добровольческом отряде смертников. Поступив в четвертый пехотный класс Юньнаньской военной академии, он стал одноклассником и впоследствии близким другом Лун Юня. Окончив её в 1914 году, он был назначен служить под началом Чжу Дэ. Сражаясь в Войне в защиту республики, он был повышен по её окончании за достойную службу.\n\nСлужа начальником штаба Цзинь Ханьдина в 1918 году, он участвовал в качестве наблюдателя во время переворота Гу Пиньчжэня в 1920 году. Служа под началом Ян Жусюаня, он сражался в Юньнаньской армии в Гуандуне в 1922 году против Чэнь Цзюнмина. В 1924 году он стал названым братом Ляо Чжункая, но позже в том же году покинул Китай, чтобы учиться во Франции, поступив на исторический факультет Лионского университета. Познакомившись с будущими основателями Младокитайской партии, Цзэн Ци и Ли Хуаном, он примкнул к их молодой идеологии.\n\nВернувшись в Китай в 1925 году, он бежал во Вьетнам после притеснений со стороны Чан Кайши, а в 1927 году отправился учиться в Японию. Вернувшись в страну в 1935 году, он был назначен начальником штаба Лун Юня, хотя и не особенно привязан к его клике."
 YUN_liao_xingchao_leader_desc: "§YРодился:§! §L12 февраля 1895 г., уезд Хуанин, провинция Юньнань, Великая Цин§!\n§YБиография:§! §L$YUN_liao_xingchao_bio$§!"
 YUN_liao_xingchao_high_command_desc: "§YРодился:§! §L12 февраля 1895 г., уезд Хуанин, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §nМладокитайская партия§!\n§YБиография:§! §L$YUN_liao_xingchao_bio$§!\n\n§YПримечания: Он близкий друг Лун Юня и Цзинь Ханьдина.\nСчитается лидером Юньнаньского провинциального отделения МКП.§!"

 #刘显潜
 YUN_liu_xianqian: "Лю Сяньцянь"
 YUN_liu_xianqian_commander_desc: "§YРодился:§! §L28 декабря 1864 г., уезд Синъи, провинция Гуйчжоу, Великая Цин§!\n§YПриверженность:§! §LНезависимый§!\n§YБиография:§! §LДвоюродный брат Лю Сяньши, Лю Сяньцянь был принят в уездную школу как сын семьи чиновников, но после ужасной череды академических неудач вместо этого бездельничал дома. В 1902 году он служил в местном ополчении для отражения бандитов из Гуанси и был повышен до звания капитана династией Цин. В 1911 году он был назначен командиром Армии пограничной обороны Гуанси губернатором Шэнь Бинкунем и сражался против революционеров на стороне Цин, активно сотрудничая при этом со своим двоюродным братом.\n\nПовышенный во время захвата Гуйчжоу Тан Цзияо, он стал местным милитаристом и поднимался по служебной лестнице до 1915 года. Когда Война в защиту республики была в самом разгаре, Лю Сяньцянь неохотно сражался на стороне АЗР. Вовлеченный во фракционную борьбу в Гуйчжоу в конце 1910-х годов, Сяньцянь последовал за своим братом в Юньнань после инцидента Миньцзю. Вернувшись в 1922 году вместе со своим двоюродным братом и Юань Цзумином, семья Лю была предана Юанем, и поэтому встала на сторону Тан Цзияо ради своего восстановления.\n\nИзгнав Юаня вместе с Тан Цзию в 1923 году, Сяньцянь стал исполняющим обязанности губернатора в 1924 году. Помогая Тан Цзияо во вторжении в Лянгуан в 1925 году, его силы были остановлены Новой кликой Гуанси, а его база была вновь захвачена Юань Цзумином. Объявив о своей отставке, Лю удалился в Синъи, и после хаоса на Юго-Западе и входа Гоминьдана в Гуйчжоу, был вновь призван к действию Тан Цзияо.§!"

 #劉沛泉
 YUN_liu_peiquan: "Лю Пэйцюань"
 YUN_liu_peiquan_air_chief_desc: "§YРодился:§! §L1893 г., уезд Наньхай, провинция Гуандун, Великая Цин§!\n§YПриверженность:§! §LНейтральный§!\n§YБиография:§! §LПоступив в Профессиональную школу Цзэнбу в 1910 году, Лю Пэйцюань был принят и подружился там с Чэнь Цэ и Чжан Факуем — в будущем отмечалось, что эти три человека представляли соответственно ВМС, Армию и ВВС Китая. В 1915 году Лю работал репортером в газете Цзюэхунь Дэйли, сообщая о полетах китайско-американского пилота Тань Гэня, а впоследствии стал секретарем Таня. В 1920 году он был нанят Тан Цзияо на должность директора нового Юньнаньского авиационного департамента, а также директора авиационной школы и старшего советника штаба Юньнаньской армии.\n\nВ 1922 году он набрал группу авиационного персонала из Гуандуна в Куньмин, заказал шесть самолетов из Гонконга и заложил основы для создания ВВС Юньнани. В 1926 году он был ненадолго назначен командующим ВВС Армии восточного маршрута Национально-революционной армии, но перешел обратно к клике Юньнань после неудач НРА на поле боя. В 1930 году он служил в Подготовительном офисе Китайских авиалиний, а в 1933 году организовал Юго-Западную компанию гражданской авиации.§!"

