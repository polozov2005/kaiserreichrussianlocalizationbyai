 YUN_focus_tree: "Дерево фокусов Юньнаньской клики"

###- Yunnan Economic Tree -###

 YUN_maintaining_the_paradigm: "Поддержание парадигмы"
 YUN_maintaining_the_paradigm_desc: "Напряженная до предела, экономика Юньнани давно находится в аварийном состоянии. Уже слабая и нестабильная из-за усилий по милитаризации, Черный понедельник обрушил карточный домик. Часы тикают: мы должны найти способ предотвратить полный крах с ограниченными ресурсами в распоряжении Юньнани, чтобы наши амбиции не были подавлены в зародыше постоянным экономическим коллапсом."

 YUN_alleviate_the_gentry: "Облегчить участь знати"
 YUN_alleviate_the_gentry_desc: "Знать играла ключевую роль в истории Юньнани и, конечно, сильно пострадала от текущего экономического кризиса. В то время как Цай Э направил провинцию Юньнань в более боевое и милитаристское русло, губернатор Тан Цзияо попытался несколько смягчить милитаризацию. С экономикой в руинах, экономику нужно снова налаживать, начиная со знати."

 YUN_expanding_tin_exports: "Расширение экспорта олова"
 YUN_expanding_tin_exports_desc: "Безработица — еще одна серьезная проблема, вызванная текущим экономическим кризисом. К счастью, есть способ бороться с ней, используя исторически богатые оловянные рудники Юньнани в наших интересах. Расширяя рудники, мы создадим гораздо больше рабочих мест для безработных, а также получим возможность еще больше эксплуатировать богатые запасы олова Юньнани для расширения экспорта."

 YUN_dual_development: "Двойное развитие"
 YUN_dual_development_desc: "Хотя промышленные возможности Юньнани остаются незначительными, провинция богата природными ресурсами. Будучи традиционно экспортной экономикой, ресурсы Юньнани можно использовать для развития внутренней легкой промышленности и диверсификации экономики. Ресурсы, не отправленные на западные рынки, будут использованы для развития растущей легкой промышленности в городах Юньнани."

 YUN_nationalisation_of_critical_industries: "Национализация критически важных отраслей"
 YUN_nationalisation_of_critical_industries_desc: "Текущий экономический кризис нельзя оставлять на волю свободного рынка. Нет, администрации провинции потребуется более активный подход, требующий накопления большего дохода в руках губернаторства. Кроме того, национализация позволит государству создать новые рабочие места для безработных, предотвратить злоупотребления трудом со стороны знати и подготовить провинцию к войне."

 YUN_appealing_to_berlin: "Обращение к Берлину"
 YUN_appealing_to_berlin_desc: "Основная связь Юньнани с международным рынком осуществляется через построенную французами железную дорогу Куньмин-Хайфон, и она действует как крупнейший поставщик оружия в провинцию. Немцы с тех пор унаследовали железную дорогу, но не продолжили продажи оружия в той же степени. Чтобы стимулировать Берлин, мы, конечно, пообещаем держать наших вьетнамских рабочих в узде и внедрить более строгие меры по борьбе с бандитизмом..."

 YUN_centralising_taxation: "Централизация налогообложения"
 YUN_centralising_taxation_desc: "Неэффективное налогообложение долгое время было серьезной проблемой для экономики Юньнани. Однако попытки централизовать и оптимизировать его потерпели неудачу из-за коррумпированных чиновников и нехватки персонала. В связи с необходимостью увеличения доходов провинции, провинция должна централизовать сбор налогов в одном министерстве финансов, а не поручать это множеству независимых бюро."

 YUN_kunming_to_guiyang: "От Куньмина до Гуйяна"
 YUN_kunming_to_guiyang_desc: "С тех пор как династия Юань включила Юго-Запад в состав Китая, Юньнань и Гуйчжоу разделяют общую судьбу, связанные обстоятельствами и географией. Действительно, две провинции страдали вместе в последние годы династии Цин. К сожалению, Северный поход разделил их: Куньмин оказался под Тан Цзияо, а Гуйчжоу под Гоминьданом. Однако Дянь и Цянь снова под одним флагом, и никогда они больше не будут разделены!"

 YUN_united_xinan_model: "Единая модель Синань"
 YUN_united_xinan_model_desc: "Хотя Юньнань и Гуйчжоу наконец-то снова стали единым целым, предстоит проделать еще много работы. Юго-запад Китая долгое время был одним из наименее развитых регионов Китая, и экономические реформы до сих пор были менее чем плодотворными. Если Китай хочет избежать Века унижений, провинции должны сначала освободиться от отсталости и иностранного господства, и Юньнань и Гуйчжоу возглавят этот процесс."

 YUN_develop_yunnans_smelting_company: "Развитие Юньнаньской плавильной компании"
 YUN_develop_yunnans_smelting_company_desc: "Амбиции Тан Цзияо заключались не только в индустриализации, но и в горнодобывающей промышленности. Один из основных столпов юньнаньской экономики, Тан пытался сломить иностранное доминирование в горнодобывающей промышленности с ограниченным успехом. Еще одним критическим путем экономической модернизации были плавильные заводы, и если Юньнань хочет стать современной провинцией, плавка в Юньнани должна осуществляться юньнаньскими компаниями параллельно с юньнаньской добычей."

 YUN_provincial_reconstruction: "Провинциальная реконструкция"
 YUN_provincial_reconstruction_desc: "Постоянно опустошаемая бесконечными кризисами, провинция Юньнань остается искалеченной бедностью, бандитизмом и шрамами милитаризации. Юньнаньские губернаторы традиционно добивались успеха в обуздании бандитизма в краткосрочной перспективе, но только экономическое восстановление действительно покончит с юньнаньским бандитизмом навсегда. Рука об руку знать, крестьянство и правительство будут работать как одно целое, чтобы принести столь необходимое облегчение провинции Юньнань."

 YUN_financial_regulation: "Финансовое регулирование"
 YUN_financial_regulation_desc: "В Юньнани долгое время существовала лоскутная система сбора налогов, восходящая к династии Цин. Последний наместник региона Юнь-Гуй Ли Цзинси попытался оптимизировать налогообложение, но не смог многого добиться до того, как произошла Синьхайская революция. Даже через 20 лет после Ли Цзинси проблемы Юньнани остаются во многом теми же, и система налогообложения не отличается. Губернатор [ROOT.GetLeader] должен наконец наладить надлежащее налогообложение и финансы, если Юньнань хочет процветать."

 YUN_centralised_planning: "Централизованное планирование"
 YUN_centralised_planning_desc: "Оставление экономики на волю рынка делает ее открытой для иностранного господства, судьба, которую китайский народ знает слишком хорошо. Современность должна культивироваться твердой рукой провинциального правительства, которое приведет экономику в достойное состояние и увидит, как Юньнань и Гуйчжоу работают как хорошо смазанный механизм и достигают общего процветания для народов обеих провинций."

 YUN_cultivating_the_bureaucratic_apparatus: "Культивирование бюрократического аппарата"
 YUN_cultivating_the_bureaucratic_apparatus_desc: "Государство не может надеяться эффективно регулировать и управлять экономикой без надлежащей бюрократии. В то время как знать предпочла бы, чтобы правительство не совало руки в их дела, правительство должно сделать именно это, ибо знать, хотя и является уважаемым классом в Юньнани, также является препятствием для нашей повестки дня. Экономическая комиссия Юньнани поможет контролировать плавку, модернизацию горнодобывающей промышленности и сельскохозяйственное развитие Юньнани при поддержке знати."

 YUN_militarising_guizhous_ironwork_industry: "Милитаризация железоделательной промышленности Гуйчжоу"
 YUN_militarising_guizhous_ironwork_industry_desc: "Юньнань и Гуйчжоу, несмотря на объединение под одним флагом, все еще отстают от своих провинциальных соседей. Юньнаньская милитаризация — единственный возможный вариант для народов Дянь и Цянь получить преимущество перед угрозами на нашем Севере и Востоке. Гуйчжоу по-прежнему остается менее милитаризованным по сравнению с Юньнанью, и его ресурсы должны быть мобилизованы Куньмином, чтобы защитить их от общих угроз."

 YUN_promoting_self_sufficiency: "Продвижение самодостаточности"
 YUN_promoting_self_sufficiency_desc: "Империалисты, которым мы вынуждены служить, наслаждаются роскошью в своих западных городах, в то время как китайский народ прикован к жизни в нищете, пока мы производим прибыльные и необходимые материалы для их потребления. Болезнь капитализма опустошает наши земли и заставляет всех играть по своим правилам, но везде, где это возможно, правительство [ROOT.GetLeader] будет держать Запад на расстоянии вытянутой руки. Смерть империалистическому вымогательству, да здравствует вечный дух китайской нации!"

 YUN_begin_grand_southern_reconstruction_project: "Великий проект реконструкции Юга"
 YUN_begin_grand_southern_reconstruction_project_desc: "Юньнань не знала ничего, кроме раздоров с начала Века унижений, но реформистские устремления администрации завершились в форме Великого проекта реконструкции Юга, самой амбициозной программы экономических реформ, которая продвинет не только Юньнань, но и Южный Китай, а вскоре и всю нацию в современную эпоху! Да здравствует [ROOT.GetLeader]!"

 YUN_streamline_superfluous_taxes: "Оптимизация лишних налогов"
 YUN_streamline_superfluous_taxes_desc: "Во времена династии Цин юньнаньские налоговые бюро создавались независимо друг от друга, вызывая большие головные боли у администрации Куньмина. В то время как поздние цинские реформы видели попытки централизовать налогообложение, оппозиция знати в конечном итоге предотвратила полную централизацию, и Юньнань была охвачена войной в республиканскую эпоху. Наконец-то были разработаны планы по реструктуризации налогообложения в Юньнани."

 YUN_resurgent_south: "Возрождающийся Юг"
 YUN_resurgent_south_desc: "День за днем фабрики оживают в Куньмине. Юньнаньский экспорт наполняет карманы народа Юньнани, а не западных держав. Со времен династии Цин экономика Южного Китая стагнировала из-за пренебрежения, но Великий проект реконструкции Юга увидел долгожданное развитие. Пусть будет известно, что юг восстает, как феникс, и Китайский век настал!"

 YUN_waking_the_tiger: "Пробуждение тигра"
 YUN_waking_the_tiger_desc: "С тех пор как Цай Э взял бразды правления Юньнанью, ему приходилось балансировать свои милитаристские амбиции с реформистским взглядом, но в конечном итоге он решил сильно милитаризировать провинцию. Тан Цзияо стремился сбалансировать экономику, но также не мог отказаться от милитаризма. Поскольку правительство сосредоточило все внимание на экономических реформах, государство теперь находится на перепутье: между продолжением милитаризации или полным перебалансированием."

 YUN_national_defence_economy: "Экономика национальной обороны"
 YUN_national_defence_economy_desc: "Юньнань окружена стервятниками со всех сторон. Даже с богатством Гуанчжоу под рукой государство должно быть готово подтолкнуть китайского рабочего, торговца и солдата работать как одно целое. Сильный акцент на дисциплине побудит всех работать с потом, кровью и слезами, чтобы осуществить национальное объединение, которое приведет к возрождению нации. Без армии не было бы нового Китая!"

 YUN_funding_the_guangxi_reconstruction_movement: "Движение за реконструкцию Гуанси"
 YUN_funding_the_guangxi_reconstruction_movement_desc: "Как и Юньнань, Гуанси является местом реализации программы милитаризма десятилетней давности. Во время короткого правления Ли Цзунжэня и его Новой клики Гуанси Движение за реконструкцию Гуанси было принято для модернизации провинции при сохранении милитаристских принципов Лу Жунтина. Хотя этим реформам не хватает масштаба юньнаньских, поддержка реконструкции Гуанси подпитает военную машину Юга."

 YUN_urban_self_initiatives: "Городские самоинициативы"
 YUN_urban_self_initiatives_desc: "Во время поздних цинских реформ наместник Юньнани Ли Цзинси предпринял амбициозную программу бюрократических и экономических реформ. В конечном итоге оппозиция знати ограничила его реформы только большими городами провинции. В то время как сегодняшняя администрация стремится к реформам во всех частях экономики и общества Китая централизованным образом, ограниченная автономия городских центров может породить реформы завтрашнего дня."

 YUN_dictating_foreign_trade: "Диктование внешней торговли"
 YUN_dictating_foreign_trade_desc: "На протяжении многих лет иностранные бизнесмены из Японии и Запада эксплуатировали наши ресурсы и уничтожали средства к существованию китайских производителей. Этого больше не будет, так как мы будем проводить протекционистскую политику, которая обогатит руки народа, а не карманы тех, кто эксплуатировал нас веками. Запад оказался на расстоянии вытянутой руки при Кантонской системе, и так будет снова."

 YUN_merchants_under_the_state: "Торговцы под государством"
 YUN_merchants_under_the_state_desc: "При более ранних администрациях Гуандуна Торговый корпус пользовался беспрецедентным уровнем свободы, не в отличие от юньнаньской знати. Пользуясь гостеприимством правительства, Торговый корпус обкрадывал китайский народ и действовал как сборщик налогов для западных держав и Токио. Больше Торговый корпус не будет пользоваться автономией, ибо нация должна быть едина в едином патриотическом направлении."

 YUN_industrial_self_reliance: "Промышленная самодостаточность"
 YUN_industrial_self_reliance_desc: "В то время как Восточный Китай получает большую прибыль от иностранных инвестиций и построенных иностранцами заводов, география и расположение Юньнани диктуют принятие более автаркической политики, чтобы провинция не стала сырьевым придатком Великих держав, как это было в предыдущие десятилетия. Принятие более автаркического, самодостаточного или даже меркантилистского взгляда на промышленную модернизацию сохранит юг зависимым от силы, которая принадлежит им самим."

 YUN_expanding_the_kunming_arsenal: "Расширение Куньминского арсенала"
 YUN_expanding_the_kunming_arsenal_desc: "Куньмин не может всегда полагаться на горы, которые его окружают, поэтому он должен быть готов защищать себя в любое время, а это значит, что ему нужно много снаряжения, чтобы выжить. Инвестирование в строительство новых заводов поможет усилиям по созданию более сильного спасательного круга не только для города Куньмин, но и для остальной части Юньнани и за ее пределами. Куньминский арсенал превзойдет арсеналы Ханькоу, Тайюаня и Шэньяна!"

 YUN_union_of_state_and_industry: "Союз государства и промышленности"
 YUN_union_of_state_and_industry_desc: "В современную эпоху модернизация армии требует модернизации экономики. Чтобы модернизировать экономику, бюрократический аппарат государства должен работать с максимальной эффективностью. Огромные усилия по модернизации юга требуют всеобщего участия и полного сотрудничества между всеми секторами экономики и всеми аспектами правительства. Юньнань должна стать свирепой машиной войны и современности."

 YUN_the_south_unshackled: "Юг освобожденный"
 YUN_the_south_unshackled_desc: "С падения династии Мин Южный Китай не знал ничего, кроме отчаяния и упадка. Усугубленный Веком унижений, патриотичные китайцы могли только наблюдать, как некогда центр мира разграблялся жестокими европейцами и японскими предателями. Время пребывания Южного Китая в сточной канаве закончилось, и правительство Гуанчжоу движется вперед, модернизированное, обновленное и свободное!"

 YUN_southern_reconstruction_commission: "Комиссия по реконструкции Юга"
 YUN_southern_reconstruction_commission_desc: "Хотя администрация [ROOT.GetLeader] находится в шатком положении, она также предлагает уникальную возможность для китайского обновления. Недавняя история Юньнани изобиловала милитаризмом, но теперь, когда милитаристские институты находятся в упадке, перебалансировка экономики Юньнани наконец стала возможной. Если Китай хочет процветать, он должен восстановиться и получить передышку. С этой целью Комиссия по реконструкции Юга станет первым крупным шагом от милитаризма к процветанию."

 YUN_promoting_national_light_industries: "Продвижение национальной легкой промышленности"
 YUN_promoting_national_light_industries_desc: "Век унижений нанес глубокий ущерб легкой промышленности Китая на национальном уровне, усугубив страдания народа. Хватит! Значительная модернизация, развитие и реформы гарантируют, что легкая промышленность нации, наконец, будет процветать, как это всегда и предполагалось, и поднимет китайский народ из страданий под гнетом империализма."

 YUN_promoting_foreign_investment: "Продвижение иностранных инвестиций"
 YUN_promoting_foreign_investment_desc: "Важность Гуанчжоу не только для Юга, но и для самого Китая невозможно переоценить. Во времена династии Цин Кантонская система помогала контролировать западную торговлю в Китае и давала Пекину преференциальный торговый дисбаланс с Западом. Эта система была отменена после Опиумных войн, но ее наследие живет. Если Китай хочет достичь процветания, западную торговлю нужно поощрять, хотя и не в ущерб китайскому бизнесу. И Китай, и Запад должны получить прибыль от этого соглашения."

 YUN_friendly_but_cautious: "Дружелюбный, но осторожный"
 YUN_friendly_but_cautious_desc: "Хотя иностранные инвестиции, несомненно, необходимы для содействия национальному экономическому развитию, такие усилия также требуют осторожности, чтобы снова не попасть в ловушку чрезмерной зависимости от иностранных держав и их империализма. На северо-востоке маршал Чжан Цзолинь оказывается безнадежно зависимым от Токио, и это служит предостережением для остальной части Китая. Китай может встретить Запад крепким рукопожатием и дружеской улыбкой, но всегда оставаться начеку."

 YUN_developing_the_middle_man: "Развитие посредника"
 YUN_developing_the_middle_man_desc: "Чтобы гарантировать, что иностранные инвестиции в Гуанчжоу идут по плану, и максимизировать их эффективность, правительству придется взять на себя роль посредника между иностранными предприятиями и торговцами в Гуанчжоу, обеспечивая необходимый надзор и рациональное направление инвестиций, поступающих из-за рубежа."

 YUN_cantonese_trade_ties: "Кантонские торговые связи"
 YUN_cantonese_trade_ties_desc: "Гуанчжоу, Город цветов, чрезвычайно важен как торговый центр, и использование торговых связей между ним и Юньнанью быстро ускорит экономическое развитие. Экономика Китая будет поднята не за счет зависимости от иностранных империалистов, а через прочные связи и дружбу между самими китайскими провинциями."

 YUN_promoting_economic_integration: "Южная межрегиональная торговля"
 YUN_promoting_economic_integration_desc: "Чтобы полностью использовать экономический потенциал южного Китая, необходимо способствовать экономической интеграции. Уже сделано несколько заметных шагов по интеграции Куньмина и Гуанчжоу, и теперь пришло время ускорить и довести этот процесс до его естественного завершения. Юньнань найдет свой путь к современности, сделав себя незаменимой в китайской внутренней экономике!"

 YUN_guangzhou_and_kunming_united: "Повесть о двух городах"
 YUN_guangzhou_and_kunming_united_desc: "Под новым руководством Куньмин действительно стал одним из самых важных экономических регионов в Китае, и с дальнейшим сотрудничеством и интеграцией с Гуанчжоу были открыты новые горизонты в китайской межрегиональной торговле, а экономический прогресс лучше, чем когда-либо прежде. Да процветает Китай!"

 YUN_investment_in_mining: "Инвестиции в горнодобывающую промышленность"
 YUN_investment_in_mining_desc: "В Юньнани экспорт олова уже расширен, и плавка теперь осуществляется на месте. Однако этого недостаточно: чтобы Юньнань, а значит и Китай, продолжала свой непоколебимый марш к современности, горнодобывающая промышленность должна развиваться дальше. Запасы Юньнани так же богаты, как и прежде, все, что нужно сделать сейчас, — это использовать их еще больше. Гэцзю будет доминировать не только на рынках Азии, но и на рынках Европы!"

 YUN_rural_demilitarisation: "Сельская демилитаризация"
 YUN_rural_demilitarisation_desc: "Губернатор Тан Цзияо видел проблемы, кроющиеся в бесконечной милитаризации Юньнани, и пытался бороться с ней несколькими мерами. Теперь, однако, администрация [ROOT.GetLeader] пойдет еще дальше. Демилитаризация направлена на устранение разрухи в сельской местности, одного из худших побочных эффектов милитаристской программы Цай Э. Демилитаризация сельских регионов, наконец, во многом поможет облегчить положение населения и восстановить надежду на лучшее экономическое будущее."

 YUN_balancing_the_budget: "Балансировка бюджета"
 YUN_balancing_the_budget_desc: "Чрезмерные военные расходы почти довели экономику Юньнани до полного разорения, создав все более перекошенный бюджет и накапливая калечащий долг для провинции. Пришло время сократить непрерывное финансирование армии и сосредоточиться на погашении долгов. Без должным образом сбалансированного бюджета дверь к современности останется навсегда закрытой."

 YUN_guangzhou_kunming_rail: "Железная дорога Гуанчжоу-Куньмин"
 YUN_guangzhou_kunming_rail_desc: "Пришло время еще больше модернизировать китайскую межрегиональную торговлю: со строительством новой железной дороги между Гуанчжоу и Куньмином больше торговли теперь будет идти через первый, делая нас естественно менее зависимыми от немцев. С этим новым развитием Юньнань, наконец, положит конец десятилетиям экономического подчинения."

 YUN_prosperous_south: "Процветающий Юг"
 YUN_prosperous_south_desc: "После десятилетий милитаризма Южный Китай оказывается на новом пути. Если раньше Юньнань была известна как великая воинственная провинция юга наряду с Гуанси, то теперь Куньмин показывает себя в новом свете мирной современности. В то время как большая часть Китая остается в хаосе и разорена войной, Южный Китай открывает новую страницу, пример для остальной нации!"

 YUN_backbone_of_the_south: "Хребет Юга"
 YUN_backbone_of_the_south_desc: "На протяжении всего существования Китая сельское хозяйство неизменно играло роль первостепенной важности. Китайская цивилизация возникла на реке Хуанхэ, произойдя от выращивания пшеницы. Когда Китай расширился на юг, к китайскому сельскому хозяйству добавилось выращивание риса. Тысячелетиями сельское хозяйство оставалось главной опорой китайского народа, и поэтому его реформирование в современную эпоху является нашим главным приоритетом."

 YUN_mechanising_agriculture: "Механизация сельского хозяйства"
 YUN_mechanising_agriculture_desc: "В современную эпоху сельскохозяйственный сектор — ничто без надлежащих механических инструментов. Новые промышленные машины значительно увеличивают производительность, и Китай тоже должен использовать мощь механизированного сельского хозяйства, если нация хочет конкурировать с Великими державами. Китайское сельское хозяйство больше не будет полагаться исключительно на человеческий труд, ибо теперь наши фермеры должны использовать моторизованную механизацию."

 YUN_land_to_the_tiller: "Земля — пахарю"
 YUN_land_to_the_tiller_desc: "Конечной целью Национальной революции является создание справедливого и обновленного китайского государства с гражданами, проникнутыми патриотическим пылом. С этой целью китайское сельское хозяйство должно быть не только модернизировано, но и уравнено среди фермерского населения. Сунь Ятсен призывал к принципу «Земля — пахарю» в своих амбициозных планах обновления Китая, и с восстановлением присутствия националистов на материке воля вечного премьера должна быть исполнена."

 YUN_ending_rural_overtaxation: "Прекращение чрезмерного налогообложения села"
 YUN_ending_rural_overtaxation_desc: "Сельские районы сильно пострадали в прошлые десятилетия, им остро не хватало урбанизации и программ развития, и они постоянно облагались чрезмерными налогами. Было создано много различных налоговых агентств для финансирования программы Куньмина, но отсутствие централизованного контроля препятствовало ответственному налогообложению. Наконец пришло время исправить это: кампания по реконструкции села будет проведена в разных регионах, а неприлично высокие налоги будут сокращены."

 YUN_material_reconstruction: "Материальная реконструкция"
 YUN_material_reconstruction_desc: "Масштаб материального ущерба, нанесенного сельскохозяйственному сектору, невозможно переоценить. Чтобы поднять его из состояния почти полного паралича, необходимы значительные усилия по материальной реконструкции, и правительство, конечно, будет действовать, чтобы обеспечить их. Бесконечные войны Эры милитаристов в сочетании с бандитизмом свели материальное благополучие народа Юньнани к рекордно низкому уровню, но теперь Националистическая партия обеспечит то, что не смог Тан Цзияо."

 YUN_commercialising_agriculture: "Коммерциализация сельского хозяйства"
 YUN_commercialising_agriculture_desc: "С медленным возвращением сельскохозяйственного сектора в нормальное русло появляются новые возможности для экономического роста: одной из таких возможностей является коммерциализация сельского хозяйства. Изобилие чая и шелка, в частности, может быть продано с огромной прибылью, чтобы значительно поднять экономику. Коммерциализация сельского хозяйства на китайских условиях позволит богатству течь не только в руки правительства, но и в руки самих людей."

 YUN_liberated_agriculture: "Освобожденное сельское хозяйство"
 YUN_liberated_agriculture_desc: "Путь к истинной социальной революции все еще ускользает от Южного Китая, но впервые за десятилетия были сделаны шаги в правильном направлении. Реформы администрации [ROOT.GetLeader] не только поднимут народ Южного Китая, но и станут вдохновением для общенациональных реформ, которые возвестят конец Века унижений и возобновление подъема Китая на мировой арене как равноправного партнера."

 YUN_maintaining_the_course: "Поддержание курса"
 YUN_maintaining_the_course_desc: "Без тени сомнения, сельскохозяйственный сектор отчаянно нуждается в почти полной переделке. Сельскохозяйственное состояние Юньнани было сильно подорвано постоянными войнами Эры милитаристов и требует большой реконструкции. Хотя юньнаньский метод оказался медленным, это тщательный и долгий продуманный процесс, разработанный десятилетиями проб и ошибок. Наконец пришло время продемонстрировать, что может сделать кульминация десятилетий опыта."

 YUN_the_opium_question: "Опиумный вопрос"
 YUN_the_opium_question_desc: "С 19 века опиум был бичом народа Юньнани. Его распространенность в экономике Юньнани также делает его особенно трудным для искоренения. Тан Цзияо много раз пытался подавить мак, но, делая это, он наносил ущерб местной экономике и толкал многие пораженные бедностью регионы в анархическое состояние бандитизма. Даже сейчас вопрос остается неясным: возобновить ли подавление опиума или просто ввести налогообложение."

 YUN_developing_local_granaries: "Развитие местных зернохранилищ"
 YUN_developing_local_granaries_desc: "Зерно имеет первостепенное значение в Южном Китае, особенно когда голод постоянно угрожает продовольственным запасам. Пока сельскохозяйственный сектор не достигнет полного восстановления, угроза разрушительного голода все еще очень реальна, и было бы разумно развивать и улучшать зернохранилища в регионе, чтобы более эффективно запасать больше зерна. Это не только предотвратит угрозу голода, от которого в настоящее время страдает Сычуань, но и поможет в снабжении местных армий."

 YUN_dual_policy: "Двойная политика"
 YUN_dual_policy_desc: "Хотя крайне важно, чтобы Знать не контролировала всю правительственную политику, ее сотрудничество также не менее важно. Ли Цзинси узнал это на горьком опыте, и независимо от того, какое влияние Знать оказывает на правительственные реформы, она окажется полезной для развития местной экономики. Предоставляя им стимулы, частная промышленность будет развиваться, а богатство, предоставленное государству, позволит увеличить финансирование правительственных проектов."

 YUN_land_reclamation_initiative: "Инициатива по мелиорации земель"
 YUN_land_reclamation_initiative_desc: "Мелиорация земель оставалась недоиспользованной идеей в Южном Китае до сих пор. Бюро мелиорации земель Каймэн, созданное Таном в прошлые годы, поможет в усилиях по модернизации и увеличению доходов. Поставки зерна в столицу будут увеличены, и, надеюсь, производство шелка и риса возрастет. Хотя первоначальное бюро было менее успешным, будут приложены дополнительные усилия, чтобы гарантировать, что возобновленные усилия не угаснут."

 YUN_modernism_with_yunnanese_characteristics: "Курс Юньнани на современность"
 YUN_modernism_with_yunnanese_characteristics_desc: "Юньнань уникальна преемственностью своих реформ на протяжении всей своей политической истории. Реформистская повестка дня переходила от Ли Цзинси к Цай Э и Тан Цзияо. [ROOT.GetLeader] неустанно работал над тем, чтобы поддерживать долгосрочный метод реформ, который, хотя и не такой радикальный, как националистическая повестка дня, несомненно, принесет больший результат в долгосрочной перспективе. Путь к современности будет достигнут на пути преемственности, а не агрессивной риторики."

 YUN_white_sun_ascendant: "Восхождение Белого Солнца"
 YUN_white_sun_ascendant_desc: "Мечта националистов впервые возникла через несколько десятилетий после восстания тайпинов. Устав от слабости Цин и иностранного господства, Тунмэнхой был обещанием Китая, свободного от империализма и маньчжурской тирании. Национальная революция родилась из призыва к действию после Реорганизации партии 1924 года. Национальная революция была искалечена в 1927 году, но теперь Гоминьдан не только восстановился, но и триумфально победил. Да здравствует Китайская Республика!"

 YUN_rebuilding_local_administrations: "Восстановление местных администраций"
 YUN_rebuilding_local_administrations_desc: "Теперь, когда Национальное правительство контролирует обширные территории, которыми когда-то управляли коррумпированные и жаждущие власти милитаристы, на нас легла задача восстановить центры местного управления, чтобы должным образом способствовать Национальной реконструкции и текущей задаче объединения нашей страны."

 YUN_expand_the_legislative_yuan: "Расширение Законодательного Юаня"
 YUN_expand_the_legislative_yuan_desc: "В рамках Основ национального строительства покойный вечный премьер заявил, что правительство должно быть разделено на различные ветви. Поскольку Законодательный Юань продолжал действовать во время изгнания Правых, теперь, когда наша власть полностью утвердилась над Китаем, мы можем стремиться расширить законодательную ветвь нашего правительства, чтобы включить больше голосов в национальный парламентский процесс."

 YUN_inaugurate_the_smaller_yuans: "Торжественное открытие малых Юаней"
 YUN_inaugurate_the_smaller_yuans_desc: "Экзаменационный Юань и Контрольный Юань задумывались доктором Сунем как две меньшие, но все же независимые ветви власти, сосредоточенные на проверке и искоренении коррумпированных элементов в бюрократии. Экзаменационный Юань контролирует качество наших экзаменов, чтобы гарантировать, что все кандидаты имеют справедливые и равные шансы на назначение, в то время как Контрольный Юань отвечает за аудит и импичмент правонарушителей."

 YUN_daughters_of_a_new_china: "Дочери Нового Китая"
 YUN_daughters_of_a_new_china_desc: "Наш долг в этой новой китайской республике — наметить курс для женщин этой страны. Долгое время подчиненные западной безнравственности и дегенеративным практикам, женщины нового Китая будут образцовыми личностями, одевающимися скромно и стремящимися к воспитанию материнского и патриотического долга перед своими семьями и родиной."

 YUN_the_new_life_movement: "Движение за новую жизнь"
 YUN_the_new_life_movement_desc: "Национальная революция Гоминьдана — это не просто революция против империализма, это также социальная революция против дряхлой культуры прошлого. Народ будет укреплен не только морально, но и физически через развитие хороших манер и гигиены. Основываясь на китайской философии и морали, мы будем стремиться к космополитическому утопизму современной эпохи, основанному на конфуцианстве."

 YUN_a_new_social_organism: "Новый социальный организм"
 YUN_a_new_social_organism_desc: "Индивидуум — это элемент, составляющий общество, а общество формируется из собрания множества индивидуумов. Если индивидуум не находится в обществе, он не может обеспечить свое выживание. В этом мире жестокого выживания, где могут выжить только наиболее приспособленные, крайне важно, чтобы революционный индивидуум воплощал добродетели и обязанности благочестивого и патриотичного гражданина нашей любимой страны."

 YUN_academia_sinica: "Academia Sinica"
 YUN_academia_sinica_desc: "Academia Sinica — это запланированный проект Гоминьдана по созданию подлинно национального исследовательского университета, посвященного изучению математики, физических наук, гуманитарных и социальных наук. Поскольку мы отстаем от Запада с точки зрения нашей исследовательской инфраструктуры, Академия поможет воспитать новое поколение исследователей и студентов, позволяя нам догнать остальной мир."

 YUN_expand_public_education: "Расширение государственного образования"
 YUN_expand_public_education_desc: "В рамках Основ национального строительства покойный доктор Сунь Ятсен (сам интеллектуал и лектор) планировал расширение государственного образования для масс. Мы не только сможем обогатить наше в значительной степени неграмотное население, но через государственные школы мы сможем привить учение Трех принципов, чтобы воспитать образованное и ответственное национальное гражданство."

 YUN_pursue_international_legitimacy: "Стремление к международной легитимности"
 YUN_pursue_international_legitimacy_desc: "Когда Гоминьдан рухнул в 1927 году после провала Северного похода, международная легитимность китайского националистического движения в основном перешла к конкурирующему Центральному комитету Ван Цзинвэя, базирующемуся в Париже. Однако теперь, когда наш контроль установлен над регионом Бэйпин, мы имеем право объявить миру, что мы являемся единственной и законной Китайской Республикой."

 YUN_create_the_national_health_administration: "Создание Национального управления здравоохранения"
 YUN_create_the_national_health_administration_desc: "Национальное управление здравоохранения организовано Министерством здравоохранения для подготовки к развитию общественного здравоохранения и гигиены, особенно в сельских районах. Возглавляемое амбициозным «Трехлетним планом», НУЗ планирует запустить грандиозный проект по реализации крупной государственной программы развития клиник, больниц и сельских медицинских пунктов для улучшения жизни угнетенных."

 YUN_cement_the_dangguo_ideal: "Закрепление идеала Данго"
 YUN_cement_the_dangguo_ideal_desc: "Крайне важно, чтобы массы понимали, что руководство Партии — единственное средство, с помощью которого может быть достигнута истинная демократия и освобождение от империализма. Под строгим, но благожелательным руководством авангарда партии наш народ сможет успешно освободиться от милитаристов и агрессии империалистических держав, которые, без сомнения, попытаются воспользоваться нами."

 YUN_national_reconstruction_committee: "Комитет национальной реконструкции"
 YUN_national_reconstruction_committee_desc: "С момента Опиумных войн Китай видел катастрофу за катастрофой без передышки. В то время как падение династии Цин обещало новую эру, последующая Эра милитаристов погрузила Китай в полный хаос и опустошила сельскую местность. С Северным походом, восстановившим некоторое подобие единства, задача реконструкции ложится на Гоминьдан. Правительство [ROOT.GetLeader] уже наметило несколько органов для целей реконструкции села и города."

 YUN_autarkic_model: "Автаркическая модель"
 YUN_autarkic_model_desc: "В начале династии Цин торговля контролировалась через Кантонскую систему. Она была разработана для защиты от коммерческих и торговых угроз со стороны западных колониальных держав. Кантонская система была разрушена британцами в Опиумных войнах, и с тех пор Китай был экономически колонизирован Западом и Японией. Националистическая партия стремится к Китаю, свободному политически и экономически, и поэтому китайское государство примет политику самообеспечения."

 YUN_pursuing_minsheng: "Стремление к Миньшэну"
 YUN_pursuing_minsheng_desc: "В основе идеологических убеждений доктора Суня лежат Три народных принципа: Миньцзу, Миньцюань и Миньшэн, или национализм, демократия и народное благосостояние. Миньшэн был особенно центральным фокусом Гоминьдана. Дело национализма уже проникло в сердца всех китайцев, а демократия придет со временем под руководством партии. Экономическое равенство проложит путь для Китая к современности и за ее пределы."

 YUN_national_capitalism: "Национальный капитализм"
 YUN_national_capitalism_desc: "С почти завершенным национальным объединением Центральный комитет начал внедрение «Национального капитализма». Правительственные чиновники будут работать над созданием институтов, предназначенных для благосостояния, поток капитала будет регулироваться, и будут созданы органы для земельной реформы. Конечной целью национального капитализма является развитие Китая до точки, где национальное богатство будет находиться в общественной собственности. Да будет будущее Китая процветающим!"

 YUN_rural_cooperative_movement: "Сельское кооперативное движение"
 YUN_rural_cooperative_movement_desc: "С момента создания китайской цивилизации земледелие было основным элементом китайского образа жизни. Хотя современность должна быть принята, чтобы возродить китайскую нацию, сельское хозяйство всегда останется основой. Таким образом, миссия Гоминьдана по достижению справедливости должна привести к тому, что фермеры Китая выберутся из унизительной бедности. С этой целью Национальное правительство создаст и поддержит сельские кооперативные общества для предоставления кредитов фермерам."

 YUN_modernised_rail_system: "Модернизированная железнодорожная система"
 YUN_modernised_rail_system_desc: "Если чему-то и стоит поучиться у Запада, так это тому, что великие инфраструктурные проекты были венцом промышленного развития. Строительство железных дорог всегда было увлечением доктора Суня и его сына Сунь Фо и поможет принести процветание в китайское ядро и глубинку. Будет создано Министерство железных дорог под руководством Сунь Фо, чтобы гарантировать, что Китай станет нацией рельсов."

 YUN_uplifting_chinas_downtrodden: "Подъем угнетенных Китая"
 YUN_uplifting_chinas_downtrodden_desc: "Поскольку Гоминьдан представляет дело всех китайцев, Гоминьдан защищает права всех маргинализированных групп Китая. Слишком долго женщины служили собственностью своих мужей и подвергались бинтованию ног. Слишком долго крестьяне подвергались насилию со стороны своих помещиков и вымогательству со стороны местных чиновников. Слишком долго рабочие страдали на отвратительных фабриках, построенных Великими державами. Именно Гоминьдан стремится поднять угнетенных Китая!"

 YUN_chinese_solutions_for_chinese_problems: "Китайские решения для китайских проблем"
 YUN_chinese_solutions_for_chinese_problems_desc: "В то время как многие интеллектуалы верили, что ответ на беды Китая придет с Запада, Гоминьдану [ROOT.GetLeader] ясно, что ответ лежит внутри самого Китая. Три принципа — это не ступенька к гедонистическому анархо-социализму, принципы — это средства и цели. Западные идеи — это не что иное, как пустое обещание лучшего завтра, в то время как Национальная революция обеспечивает решительные действия на пути к равенству."

 YUN_developing_the_financial_sector: "Развитие финансового сектора"
 YUN_developing_the_financial_sector_desc: "Хотя наша Национальная революция обещает справедливость в ответ на разрушения капитализма и империализма, Китайское государство не сможет помочь своему народу без надлежащего капитала. С этой целью Китай должен изучить западную игру финансов и развить свой финансовый сектор до состояния, подобающего великой державе. Современные финансовые институты будут иметь большое значение не только в укреплении возможностей китайского правительства, но и в укреплении иностранного мнения о нашем правительстве."

 YUN_establish_coastal_economic_zones: "Создание прибрежных экономических зон"
 YUN_establish_coastal_economic_zones_desc: "В нашей конечной цели формирования национального капитализма на пути к истинному социальному равенству партия решила создать ряд особых экономических зон вдоль побережья в критически важных городах, способствуя росту рынков, валюты и, в конечном итоге, нашей экономики. Хотя это может изображать зависимость от мировой торговли, это будет на условиях китайского народа и приведет к самодостаточности в будущем."

 YUN_union_of_class_and_society: "Союз класса и общества"
 YUN_union_of_class_and_society_desc: "Хотя Гоминьдан является партией рабочих и крестьян, было бы неправильно останавливаться на этом. Национальная революция стремится охватить все китайское общество, от высших эшелонов старой политической элиты до самых низов общества. Все классы должны работать в гармонии, к единой цели производительности и возрождения Китая, все под эгидой Националистической партии."

 YUN_reconstruction_by_chinese_means: "Реконструкция китайскими средствами"
 YUN_reconstruction_by_chinese_means_desc: "В то время как империалисты Запада продвигают глупые идеалы, такие как либеральная буржуазная демократия и универсализм, синдикалистские державы продвигают еще худшие концепции, такие как гедонистический анархизм и разрушительный классовый конфликт. Точно так же, как западные идеалы больше не будут загрязнять эту нацию, западный капитал не будет держать китайский народ в мертвой хватке. Будущее Китая — подняться к величию, не будучи обязанным никакой другой нации, исключительно на коллективной воле китайского народа."

###- Yunnan Military Tree -###

 YUN_champions_of_the_nation: "Чемпионы нации"
 YUN_champions_of_the_nation_desc: "Поддавшись давлению своей среды, захваченная партикуляризмом, не сумев адаптироваться к новым политическим тенденциям, Юньнаньская армия стала анахронизмом. Провинциальная армия, которая была посредником и давала силу националистическому и республиканскому идеализму, была вытеснена формами организации, подобными формам Данго (партийного государства) Гоминьдана. Некогда называемые «Чемпионами нации», они остро нуждаются в реформе, чтобы вернуться к своим корням."

 YUN_brigade_reorganisation: "Реорганизация бригад"
 YUN_brigade_reorganisation_desc: "Бригады в Юньнаньской армии в настоящее время составлены неорганизованно, некоторые группы основаны на американском «Правиле трех», в то время как другие имеют 4, 5 или даже 1 батальон. Будучи обычным явлением в хаосе Эры милитаристов, истоки Юньнаньской армии — это профессиональные солдаты, бюрократические и организованные. Чтобы исправить эту дисфункциональную систему, мы реорганизуем дивизии в соответствии с новым стандартизированным размером бригады."

 YUN_baring_our_teeth: "Оскаливание зубов"
 YUN_baring_our_teeth_desc: "После наших неудачных гамбитов в начале десятилетия Юньнаньская армия стала запуганным зверем. Слишком беспокоясь, чтобы даже утвердить себя за пределами провинциальных границ Юньнани или Гуйчжоу, она позволила остаткам НРА сидеть в Гуйчжоу, продолжающемуся преследованию со стороны Юань Цзумина через границу Гуйчжоу и росту немецкого влияния в провинциальных шахтах. Пришло время Юньнаньской армии расправить крылья."

 YUN_encroaching_on_colonialisms_lifeline: "Посягательство на линию жизни колониализма"
 YUN_encroaching_on_colonialisms_lifeline_desc: "Железная дорога Куньмин-Хэкоу является частью более широкой железной дороги Куньмин-Хайфон, первого пути империалистического влияния в саму Юньнань. Построенная французами, а теперь контролируемая немцами, бесчисленные китайские рабочие погибли при ее строительстве. Мы будем работать над усилением охраны железной дороги, чтобы показать властям Германской Восточной Азии, что гордость Юньнани все еще сильна."

 YUN_watching_the_upstarts: "[YUN_watching_the_upstarts_name_loc]"
 YUN_watching_the_upstarts_desc: "[YUN_watching_the_upstarts_desc_loc]"

 YUN_vanquishing_personalism: "Победа над персонализмом"
 YUN_vanquishing_personalism_desc: "С ослаблением центральной власти в Юньнани Армия продолжала деградировать. То, что когда-то считалось силой, невосприимчивой к коррупции армий милитаристов, теперь солдаты более лояльны своему командиру, чем институту. Повторно вводя частую ротацию штабных и командных назначений наряду с расформированием подразделений, мы надеемся, что оковы личного командования будут разбиты."

 YUN_four_qualities_of_a_general: "Четыре качества генерала"
 YUN_four_qualities_of_a_general_desc: "Отец нынешнего положения Юньнани как «Короля Юго-Запада», Цай Э также считается одним из самых важных основателей Юньнаньской армии, возглавлявшим ее в самые поворотные моменты. Им были провозглашены четыре наиболее важных качества генерала: уметь управлять людьми так, чтобы они преуспевали, быть храбрым перед лицом смерти, не желать славы или выгоды и быть способным переносить страдания. Мы должны снова привить эти ценности нашим людям."

 YUN_legacy_of_the_last_generation: "Наследие последнего поколения"
 YUN_legacy_of_the_last_generation_desc: "«Последнее поколение» Юньнаньской армии — пример для нации в целом. Бросив вызов Юань Шикаю и спасши республику, такие люди, как Цай Э, Тан Цзияо, Ло Пэйцзинь, Гу Пиньчжэнь и Ли Гэньюань, превозносят добродетели того, что значит быть военным лидером в китайском государстве. Осознавая политические цели нации, их дух живет в институте, даже в таком упадке, как сейчас."

 YUN_implementing_bianqian: "Внедрение Бяньцянь"
 YUN_implementing_bianqian_desc: "Чтобы уменьшить местную власть различных автономных армий в Юньнани, высший командный состав настоял на сокращении численности всей юньнаньской армии, проводя политику «реорганизации и демобилизации», известную как бяньцянь. Чтобы построить современное, единое государство, частью которого будет Юньнань, армия должна быть дисциплинированной и находиться под центральным командованием. Пусть Юньнань станет примером этого для всех провинциальных армий."

 YUN_the_spirit_of_revolution: "Дух революции"
 YUN_the_spirit_of_revolution_desc: "Индокитай, долгое время бывший полем битвы между французским колониальным влиянием и коренными народами, является колонией, омраченной восстаниями и инакомыслием. Между индокитайцами и юньнаньцами существует большое революционное братство, так как Индокитай служил местом изгнания для революционеров Синьхая десятилетия назад. Возвращение долга и поддержка революционеров против нашего общего врага приведет к изгнанию немцев из сферы влияния на Юньнань."

 YUN_aid_from_europes_kingpins: "Помощь от европейских авторитетов"
 YUN_aid_from_europes_kingpins_desc: "Как бы мы ни старались, Германская империя пока является неоспоримой мировой сверхдержавой современной эпохи. Их влияние достигает каждого темного уголка мира, и Юньнань не исключение. Вместо того чтобы переходить в наступление на немецкое влияние на нашем нынешнем, более слабом этапе, мы должны вместо этого использовать немецкий бизнес для дальнейшего стимулирования нашего военного прогресса, чтобы мы могли переломить ход событий, как только нация будет объединена."

 YUN_legacy_of_the_huguojun: "Наследие Хугоцзюнь"
 YUN_legacy_of_the_huguojun_desc: "Хугоцзюнь, или Армия защиты республики, была в одностороннем порядке зенитом военной мощи и влияния Юньнаньской армии в стране. Бросив вызов имперским амбициям Юань Шикая, Хугоцзюнь были в меньшинстве и хуже вооружены, но вышли победителями. Этот «беспрецедентный» акт «тронул храбрых и добрых людей до слез», и если мы хотим снова спасти нацию, Юньнаньская армия должна снова принять мантию Национальной защиты."

 YUN_revitalising_kunming_academy: "Оживление Куньминской академии"
 YUN_revitalising_kunming_academy_desc: "Считающийся наиболее важным компонентом силы Юньнаньской армии, офицерский корпус и лидеры, вышедшие из Куньминской академии, постоянно и доблестно сражались за провинцию и нацию. Однако институт в его нынешнем виде находится в запустении, сохранив свой престиж, но потеряв свой дух. С девизом «Терпи трудности, в которых заключается основа реформ», академия нуждается в омоложении."

 YUN_reimplementing_drill_standards: "Повторное внедрение стандартов строевой подготовки"
 YUN_reimplementing_drill_standards_desc: "Предыдущая эра Юньнаньской армии отличалась высоким стандартом подготовки как в строевой подготовке, так и в маневрах. Режим тренировок длился три месяца, по восемь часов практических и теоретических занятий в день. Артиллеристы и пехота получали индивидуальный и групповой инструктаж, с полевыми маневрами, использующими ночные атаки. Истинный признак военного превосходства Юньнани, мы должны вернуться к этой золотой эре подготовки."

 YUN_handling_overglorification: "Борьба с чрезмерным прославлением"
 YUN_handling_overglorification_desc: "С растущим самодовольством Юньнаньской армии в прошлом, она стала свидетелем развивающейся атмосферы прославления, направленной на армию как институт, игнорируя все более гнилое ядро под парадами и помпой. Мы должны покончить со всеми непрекращающимися парадными учениями и сосредоточиться на суровой боевой службе. Физическая подготовка, полевые и групповые учения должны иметь приоритет."

 YUN_officers_initiative: "Инициатива офицеров"
 YUN_officers_initiative_desc: "Без сомнения, армии ведут себя лучше в военных столкновениях, когда есть определенный уровень автономии у низших эшелонов командной структуры. Как видно в Хугоцзюнь, Национально-революционной армии и армиях Чжили У Пэйфу. Независимость подразделений с более широкими стратегическими целями в отличие от крупномасштабных фронтов приводит к волне доблестных успехов для армии."

 YUN_ensuring_ideological_cohesion: "Обеспечение идеологической сплоченности"
 YUN_ensuring_ideological_cohesion_desc: "Национально-революционная армия продемонстрировала различным китайским армиям достоинство изложения политических целей простым солдатам. Обеспечение полной идеологической лояльности офицеров и солдат предотвратит развращающее влияние, наблюдаемое в последние десятилетия, с полным подчинением политическим целям, в которые верят люди. Как НРА и Гоминьцзюнь, Хугоцзюнь последует их примеру."

 YUN_leading_from_the_front: "Командование с передовой"
 YUN_leading_from_the_front_desc: "Офицеры Юньнаньской армии когда-то стремились быть примером для своих людей, внушая чувство решимости, приверженности и высокого морального духа среди них. Офицеры отличались уровнем личной приверженности и взаимопонимания с людьми под их командованием и постоянно бросались вперед, ведя мечом. Чтобы подражать нашим прошлым успехам и снова вселить дух в армию, давайте возвеличим эту храбрость."

 YUN_daring_to_die: "Смелость умереть"
 YUN_daring_to_die_desc: "Ключевым компонентом ранних успехов Национально-революционной армии в Северном походе было частое использование отрядов «Смертников», вдохновленных такими людьми, как революционеры Синьхая. Юньнаньская армия не чужда чисто самоубийственной тактике перед лицом общей цели, ибо армия пропитана кровью своих мучеников в конечном счете жертвенной борьбе за спасение нации. Еще раз мы возьмем мантию революционеров и посвятим наши сердца."

 YUN_soul_of_the_rapid_offensive: "Душа быстрого наступления"
 YUN_soul_of_the_rapid_offensive_desc: "Доктрина Юньнаньской армии прошлого была существом лицемерия. В то время как Цай Э выступал за практику партизанской тактики, основанной на тактике буров, генерал на практике проявлял неслыханную свирепость на поле боя. Всегда захватывая пространство и инициативу, участвуя в быстрых наступлениях, когда это возможно. С сутью всегда наносить удар первым и жестко, мы уверены, что будем непобедимы."

 YUN_yunnans_militarist_credidentials: "Милитаристские полномочия Юньнани"
 YUN_yunnans_militarist_credidentials_desc: "Приверженность руководства Юньнани военной профессии неслыханна. Сама перспектива перехода к невоенным исследованиям привела в ужас отца Куньминской академии Ли Гэньюаня настолько, что он заявил, что «скорее умрет», чем сделает это. Если бы у китайской нации было больше героев-милитаристов и меньше слабаков-ученых или интеллектуалов, возможно, нация не была бы такой, какая она есть. Тем не менее, Юньнань должна работать, чтобы все исправить."

 YUN_militaristic_and_patriotic_spirit: "Милитаристский и патриотический дух"
 YUN_militaristic_and_patriotic_spirit_desc: "Величайшая проблема, стоящая перед Китаем, — это выживание. Китай может выжить только в том случае, если он разовьет воинский дух через обновленную систему образования, прославляя военную жизнь в литературе и музыке и повышая социальный статус и уважение к солдатам. Такие меры должны работать, чтобы привить славу достижениям наших солдат и сделать Китай сильной военной державой. В мире реальной политики выживут только сильные."

 YUN_the_huguojuns_bureaucracy: "Бюрократия Хугоцзюнь"
 YUN_the_huguojuns_bureaucracy_desc: "Исключение из правил военных институтов, Юньнаньская армия славного прошлого была бюрократически организованной армией. Офицеры связаны не только верностью, но и тем фактом, что приказы исходили с более высокой позиции от имени всего учреждения. Власть заключается не в человеке, а в самой должности, и должности были пирамидальной иерархией по своей природе. Такие ценности должны сиять в нашей новой Хугоцзюнь."

 YUN_commitment_and_bravery: "Приверженность и храбрость"
 YUN_commitment_and_bravery_desc: "Армии Национальной защиты, наши дорогие и любимые Хугоцзюнь, когда-то демонстрировали боевой дух, который побеждал всех врагов, с которыми сталкивался. Будь то армии Бэйяна, Старой Гуанси или Сычуани, Хугоцзюнь уничтожал всех. С нашей личной известностью и престижем, снова развивающимися, пришло время снова укрепить храбрость наших офицеров и поддержание исключительного морального духа в тяжелых обстоятельствах."

 YUN_idealisation_of_political_goals: "Идеализация политических целей"
 YUN_idealisation_of_political_goals_desc: "Мы больше не можем полагаться на идеалы и цели, демонстрируемые внутри провинции, поскольку все больше и больше северных провинций переходят под наш контроль, не решаясь на революционные изменения. Как поддерживается многими в высшем командном составе, разработка системы политических комиссаров централизовала бы политические взгляды Хугоцзюнь в свете увеличения набора солдат за пределами Юньнани."

 YUN_prioritisation_of_military_victory: "Приоритезация военной победы"
 YUN_prioritisation_of_military_victory_desc: "Важнейшей является общая цель военной победы. Ибо какие бы политические результаты ни желали наши кампании, они не могут быть достигнуты без предварительной военной победы над любой оппозицией. Подчеркивая мобильную войну, штыковые атаки и ночные штурмы, наша дерзость и внезапность наверняка компенсируют любые недостатки армии и доведут до конца наше военное превосходство."

 YUN_to_bear_sacrifices: "Нести жертвы"
 YUN_to_bear_sacrifices_desc: "Идеальный военный человек должен быть мотивирован патриотизмом, честью, верностью и чувством долга перед национальным государством. Такой воин должен быть дисциплинированным, послушным и одушевленным «воинским духом». С таким мышлением военные люди смогут лучше различать национальные интересы и повысить свою готовность жертвовать ради них. Чтобы дополнить такое мышление, мы усилим физическую подготовку и военные учения."

 YUN_knowledge_of_the_land: "Знание местности"
 YUN_knowledge_of_the_land_desc: "Иногда самым важным компонентом успеха битвы является правильное манипулирование окружающей средой битвы, чтобы подчеркнуть способности наших солдат. К счастью для нас, внутренняя часть Китая оказывается одной из самых напряженных, трудных территорий, которые может предложить мир. Горные хребты, глубокие реки и ряды холмов — это идеальная среда для дальнейшего обучения на пересеченной местности."

 YUN_the_new_era_of_warfare: "Новая эра войны"
 YUN_the_new_era_of_warfare_desc: "Современная война является свидетелем третьего театра военных действий, аспекта воздушной поддержки, а также развязала быструю атаку бронированных гигантов на полях сражений мира. Хотя Китаю, возможно, не хватает промышленности и мощностей, чтобы создать конкретный бронетанковый корпус до этого момента, с недавними событиями пропускная способность для бронетанковых бригад выросла, и Юньнань должна быть на переднем крае."

 YUN_drafting_a_viable_supply_corps: "Создание жизнеспособного корпуса снабжения"
 YUN_drafting_a_viable_supply_corps_desc: "Без припасов армия — это не что иное, как бродячая банда недоедающих, демотивированных и беззубых тигров. До сих пор Хугоцзюнь полагалась на ограниченную моторизацию линий снабжения, щедрость местных жителей и захваченное снаряжение. Для фронта, столь обширного, как китайский, разумно создать централизованную, регулярно контролируемую систему продовольствия для поддержки наших глубоких прорывов на вражескую территорию."

 YUN_heirs_of_national_protection: "Наследники Национальной защиты"
 YUN_heirs_of_national_protection_desc: "Другие могут утверждать, что они сражаются за Нацию, или за Революцию, или даже за Республику. Но никто до сих пор не имеет истинной истории приверженности борьбе за то, чтобы стать спасителями китайской нации. Наши солдаты умирают, храбрые и бесстрашные, изрешеченные пулями, осознавая, что их жертва — ради высшего блага национального государства. Происходя из Юньнани, наша армия марширует за Китай в целом."

 YUN_fighting_for_our_stolen_land: "Борьба за нашу украденную землю"
 YUN_fighting_for_our_stolen_land_desc: "Долгое время являясь регионом спора между британскими и цинскими властями, граница между Юньнанью и Бирмой никогда по-настоящему не была демаркирована. Воспаленные инцидентом в Пяньме 1910 года и крахом британской власти в Бирме, мы начали возобновлять наши притязания на южный регион границы, где находится много ценных серебряных рудников."

 YUN_yunnans_most_premier_caste: "Самая престижная каста Юньнани"
 YUN_yunnans_most_premier_caste_desc: "Наша местная элита — это те оставшиеся отставшие из ранних поколений Хугоцзюнь и те из поколения сразу после Войны национальной защиты. Без них Армия не имела бы необходимой глубины и опыта, из которых можно было бы черпать, и осталась бы бессильной силой. Поистине превознося каждую добродетель военного человека национального государства, пришло время вознаградить этих храбрых людей."

 YUN_integration_of_auxillaries: "Интеграция вспомогательных войск"
 YUN_integration_of_auxillaries_desc: "Хотя Хугоцзюнь больше не страдает от развязанного кумовства автономных армий прошлого, мы все еще используем несколько иррегулярных формирований для дополнения наших более широких регулярных сил. Способные и, в конечном счете, полезные, время для таких дивизий прошло, поскольку мы выходим на национальные и международные арены войны. Предоставляя звания вспомогательным солдатам, мы можем еще больше укрепить нашу центральную армию."

 YUN_heroes_of_the_nation: "Герои нации"
 YUN_heroes_of_the_nation_desc: "Без сомнения, новый, реформированный Хугоцзюнь доказал, что снова является спасителем китайской нации. Принимая все вызовы на каждом шагу, мы победили. Внушая добродетель и воинский дух в национальное сознание, армия оттащила народ от края гибели. Для наших товарищей, потерянных по пути, эта победа для вас."

 YUN_first_amongst_equals: "Первый среди равных"
 YUN_first_amongst_equals_desc: "Без наших великих лидеров не было бы нового Китая. [ROOT.GetLeader] снова и снова демонстрировал чистое превосходство своего лидерства и командования как в политике, так и на поле. Практически спаситель страны, культ личности начал развиваться вокруг воинской доблести [ROOT.GetLeader]. Не помешало бы развить такой культ, истинный «Первый среди равных» наподобие Цай Э."

 YUN_an_era_of_national_struggle: "Эра национальной борьбы"
 YUN_an_era_of_national_struggle_desc: "С Эрой милитаристов, истощившей международное положение Китая, народ Китая пострадал еще больше. Проблеск света после Синьхайской революции был в конечном итоге погашен после махинаций Юань Шикая и краха Северного похода. Если народ действительно хочет проявить свою волю в эту эру Национальной борьбы, необходима армия, состоящая исключительно из народа."

 YUN_preserving_ones_forces: "Сохранение своих сил"
 YUN_preserving_ones_forces_desc: "Сражаясь с превосходящим противником с малым количеством снаряжения и живой силы, наша тактика должна вращаться вокруг уклонения от вражеских армий и сохранения наших собственных. Сосредоточившись на маневренных, мобильных подразделениях, которые наносят удары по нескольким армиям и линиям, мы можем затем ускользнуть в глубинку Китая, прежде чем любая противостоящая сила сможет нанести ответный удар. Хотя это считается «Партизанской войной», такая тактика является лишь экстраполяцией тактики, применяемой Куньмином."

 YUN_engulfing_the_enemy: "Поглощение врага"
 YUN_engulfing_the_enemy_desc: "«Если Китай в ближайшем будущем столкнется в военном отношении с другой страной, ему лучше будет принять тактику буров... Китай должен в первую очередь принять стратегию задерживающего сопротивления и ретроградной обороны, чтобы сохранить свои собственные силы, заманивая врага вглубь. Когда враг истощен и не имеет достаточно сил для поддержки себя, Китай может уничтожить его одним ударом». — Цай Э"

 YUN_resolute_in_ideals: "Решительные в идеалах"
 YUN_resolute_in_ideals_desc: "Наши люди в нашей армии — наш самый важный аспект, ибо без них само ядро армии не существовало бы. Однако идеальный солдат должен быть безрассудным, конкретным и решительным в своих социальных, экономических и политических идеях. Внушение этих добродетелей нашим солдатам даст им безграничную уверенность в наших военных стратегиях и нашей способности применять их."

 YUN_officers_prerogative: "Прерогатива офицеров"
 YUN_officers_prerogative_desc: "Как показали независимые подразделения Национально-революционной армии — по крайней мере те, которые происходят из Вампу — делегирование местной автономии командирам этих подразделений оказалось на удивление успешным в прошлом. Подчеркивая инициативу и независимость офицеров низшего звена, сохраняя при этом методичный подход к тщательной подготовке и планированию операций, наши военные цели обязательно будут достигнуты."

 YUN_extensive_reconnaissance: "Обширная разведка"
 YUN_extensive_reconnaissance_desc: "Критически важным для победы над превосходящим противником является ведение войны разведки. Выполняя надлежащую разведку вражеских подразделений перед боем, мы уверены, что сможем определить их слабые места и нанести удар там, где им будет больно больше всего. Однако мы не просто ограничены разведывательными отрядами и биноклями, ибо разгневанное местное население также может быть использовано, предоставляя разведданные о силах милитаристов."

 YUN_fighting_in_our_favour: "Борьба в нашу пользу"
 YUN_fighting_in_our_favour_desc: "Национально-революционная армия давно усвоила суровые уроки, навязанные ей после краха Северного похода. Тактики Вампу было недостаточно, чтобы переиграть немецкого военного гиганта, и Национальная революция пострадала из-за этого. В конечном счете, мы должны использовать все необходимые рычаги в битве, чтобы склонить их в нашу пользу, и, заманивая вражеские колонны на нашу землю, мы уверены, что окружим и уничтожим их."

 YUN_committed_in_ideology: "Преданные идеологии"
 YUN_committed_in_ideology_desc: "Преданность партии, идеологии Трех принципов, предельная преданность Национальной революции — это все атрибуты, примерами которых должны быть наши солдаты. Проводя массовые собрания, объясняющие политическую и военную ситуацию, мы обеспечим чувство цели для наших солдат, надеясь повысить их мотивацию в бою, позволяя им довести миссию до завершения."

 YUN_renewed_officer_examinations: "Возобновленные офицерские экзамены"
 YUN_renewed_officer_examinations_desc: "Введя серию экзаменов и тестов для нашего офицерского корпуса, наши генералы оценят их знания уставов, приказов и современной мобильной тактики армии. Одновременно они должны продемонстрировать навыки как в строевой подготовке, так и в полевых операциях. Наряду с этим будут также оценены их личности и наклонности, а также их навыки управления отделением, лидерство в бою и их способности учить или тренировать."

 YUN_the_endpoint_of_chinese_armies: "Конечная точка китайских армий"
 YUN_the_endpoint_of_chinese_armies_desc: "В конечном счете, наша структура армии не является чем-то революционным, несмотря на номенклатуру. Наш способ ведения войны — это просто продолжение инноваций китайских армий после внедрения реформ Новой армии поздней Цин. От Цин до Бэйяна, до Партийного государства, до нынешнего момента наша армия оказалась самой эффективной, поскольку она содержит краткую способность реализовывать свои идеалы без страха."

 YUN_extolling_political_objectives: "Восхваление политических целей"
 YUN_extolling_political_objectives_desc: "На своей службе в Войнах национальной защиты Чжу Дэ осознал исключительную важность сохранения четкого фокуса на общих политических целях войны, даже если они вступали в противоречие с непосредственными военными императивами. Цай Э сдерживал свою полную силу накануне войны, чтобы сплотить дело Национальной защиты в провинциях Гуанси и Сычуань. Точно так же мы должны ставить массы выше военных успехов."

 YUN_concentration_of_popular_will: "Концентрация народной воли"
 YUN_concentration_of_popular_will_desc: "Важным и часто упускаемым из виду аспектом военного успеха в Эру милитаристов является завоевание поддержки гражданского населения. Ибо среднего китайского солдата считают не более чем узаконенным бандитом. Однако если мы покажем, что наша армия — это народная армия, пришедшая освободить их из лап милитаристов, они обязательно поддержат и нашу администрацию, и наших солдат."

 YUN_frontlines_everywhere: "Линия фронта повсюду"
 YUN_frontlines_everywhere_desc: "Как утверждал Хэ Инцинь, китайские силы должны «сделать оккупированные районы частью поля битвы» через организацию партизанских отрядов и атак, тем самым «превращая тыловые районы в линию фронта». Если какой-либо враг ступит на китайскую территорию, он столкнется не только с нашими военными силами, но и с полным гневом самого китайского народа."

 YUN_improving_our_soldiery: "Улучшение наших солдат"
 YUN_improving_our_soldiery_desc: "Состав нашей армии на данный момент состоит в большинстве из крестьян, затем ветеранов Национальной революции, затем рабочих и, наконец, бандитов. Такая армия, хотя и верна нашему образу народной армии, в конечном итоге дает смешанную силу с разным уровнем навыков. Если мы хотим по-настоящему превратиться в национальную армию, мы должны работать над стандартизацией строевой подготовки и методов обучения."

 YUN_installing_discipline: "Установление дисциплины"
 YUN_installing_discipline_desc: "Рожденная как армия, состоящая из народа, неудивительно, что в напряженных и хаотичных ситуациях наши солдаты теряют самообладание и мстят знати и помещикам. Несмотря на свои личные убеждения, Национально-революционная армия должна быть армией для народа, независимо от их статуса в жизни. Вводя строгие дисциплинарные меры, наши люди должны научиться прятать свою ненависть."

 YUN_strategic_defensive_tactical_offensive: "Стратегическая оборона, тактическое наступление"
 YUN_strategic_defensive_tactical_offensive_desc: "Как свидетельствует гений фон Шлиффена в Первом Вельткриге, и с собственными исследованиями Чжу Дэ военной теории первого, оставаясь в обороне, переходя в наступление на оперативном и тактическом уровнях, мы обязательно одержим победу независимо от ситуации. Достигая уничтожения вражеских сил через окружения, наша армия одержит победу над империалистом или милитаристом."

 YUN_qualities_of_a_leader: "Качества лидера"
 YUN_qualities_of_a_leader_desc: "Поистине, добродетели нашей армии подкрепляются и отражаются добродетелями ее руководства. В конечном счете, армия желает целеустремленного лидера с железным характером и упрямой волей к победе. Ничто не иллюстрирует это лучше, чем руководство Национально-революционной армии, постоянно борющееся за спасение Китая. С учтивым руководством наши войска ясно поймут суть проблем."

 YUN_lower_level_autonomy: "Автономия низшего уровня"
 YUN_lower_level_autonomy_desc: "Как показано Национально-революционной армией и Ауфтрагстактик немецкой армии, или тактикой выполнения задач, теоретики нашей армии желают делегирования тактических вопросов низшего уровня различным подчиненным. Определяя четкую общую цель, временные рамки, а также силы, необходимые для завершения, генералы оставят офицерам расшифровку наилучшего способа достижения указанной цели."

 YUN_maintaining_flexibility: "Поддержание гибкости"
 YUN_maintaining_flexibility_desc: "Вероятностный характер войны хорошо ценится нашими военными теоретиками, слишком хорошо знакомыми с тем, что тактики и стратеги должны знать, что ситуация на поле боя может радикально измениться, и поэтому установленные правила невозможны при командовании войсками. Решения на поле боя должны зависеть от конкретной задачи, ситуации противника и местности. Поскольку все это часто может меняться, нужно быть способным проявлять гибкость в планировании."

 YUN_a_hundred_regiments: "Сто полков"
 YUN_a_hundred_regiments_desc: "Все, что нам нужно, — это 100 полков. С 100 полками, численностью 200 000 человек, мы можем вступить в бой с любым врагом и уничтожить его. Мощь Национально-революционной армии намного превзошла мощь Северного похода, и если какой-либо враг столкнется с ней сейчас, будь то японцы, немцы или кто-то еще, они будут бояться Белого Солнца, Синего Неба и Совершенно Красной Земли. Не сгибаясь под жестокостью этого мира, наши солдаты продолжают идти вперед, продолжают кричать и продолжают сражаться."

YUN_reorganising_the_airforce: "Реорганизация ВВС"
 YUN_reorganising_the_airforce_desc: "Изначально созданная как Авиационный департамент в 1922 году, Юньнаньская авиационная школа является одной из старейших авиационных школ во всем Китае. Прикрепленная к Куньминской военной академии, она была реорганизована в ВВС Юньнани в 1924 году. Теперь, когда доступны средства для оживления учреждения, пришло время для второй реорганизации ВВС, назначения новых авиационных капитанов и набора новой авиационной команды."

 YUN_renovating_wujiaba_airport: "Реконструкция аэропорта Уцзяба"
 YUN_renovating_wujiaba_airport_desc: "Аэропорт Уцзяба, построенный под эгидой Тан Цзияо в 1923 году, является одним из первых аэропортов на материковой части Азиатского континента. Построенный в стратегическом месте недалеко от Куньмина, он является третьим по величине аэропортом в Китае, уступая только пекинскому аэропорту Наньюань и аэропорту Ханчжоу Сяньцяо. Однако он пришел в упадок и остро нуждается как во внимании, так и в финансировании, чтобы вернуть свой полный потенциал."

 YUN_mass_proliferation_of_airfields: "Массовое распространение аэродромов"
 YUN_mass_proliferation_of_airfields_desc: "Хотя Уцзяба предоставляет свои услуги добросовестно и с большой пропускной способностью, топография Юньнани гористая и неровная. Если мы хотим по-настоящему достичь каждого темного уголка провинции и выйти за ее пределы в соседние провинции, было бы разумно начать широкую кампанию по массовому распространению аэродромов. Обязав уезды завершить строительство аэропорта в установленные сроки, хотя и без денежной компенсации, мы уверены в установлении конкретного контроля над воздухом."

 YUN_equalisation_of_pilots: "Уравнивание пилотов"
 YUN_equalisation_of_pilots_desc: "В первый класс студентов Уцзяба Тан Цзияо специально отобрал двух девушек из богатых семей Юньнани для зачисления в школу, в попытке поощрить студентов подавать заявления и создать прецедент для изучения авиации китайскими женщинами. Однако Ся Вэньхуа и Инь Юэцзюань были не единственными успешными женщинами-пилотами, окончившими школу, так как в третьей партии выпускников было 9 женщин. Мы должны снова позволить женщинам-пилотам летать ради возможного гендерного равенства."

 YUN_powering_on_liangguang: "Включение Лянгуана"
 YUN_powering_on_liangguang_desc: "С захватом нами двух провинций Гуанси и Гуандун мы обнаружили рог изобилия богатства и промышленности, просто ожидающий реанимации. С такими арсеналами, как арсеналы Гуанси и Гуандуна, мы уверены, что революционизируем не только нашу гражданскую промышленность, но и нашу военную промышленность. С финансированием Лянгуана наша Юньнаньская армия больше не будет стеснена отсутствием вооружения или оплаты."

 YUN_foreign_naval_experts: "Иностранные военно-морские эксперты"
 YUN_foreign_naval_experts_desc: "Реалистично, будучи по своей сути провинцией, не имеющей выхода к морю, неоспоримым фактом является то, что нашему военно-морскому штабу особенно не хватает кадров. С свободными средствами, предоставленными нашей новой геополитической ситуацией, было бы разумно искать изгнанных или безработных моряков из Посольств, чтобы обучить наш собственный военно-морской персонал искусству морской войны."

 YUN_securing_a_merchant_marine: "Обеспечение торгового флота"
 YUN_securing_a_merchant_marine_desc: "Без выхода к морю правительство провинции Юньнань традиционно полагалось на наземные транспортные линии через Гуанси, Гуйчжоу и Индокитай для экспорта наших товаров на международные рынки. Однако с захватом береговой линии мы теперь можем работать над созданием и покупкой флотилии кораблей, способных пересекать моря для экспорта и импорта товаров с международных рынков."

 YUN_the_lightning_school: "Школа «Молния»"
 YUN_the_lightning_school_desc: "Имея давнюю традицию во флоте, благодаря древней кантонской военно-морской традиции, адмирал Оуян Гэ стремился создать свою собственную военно-морскую академию в Гуандуне, известную как школа «Молния». Якобы независимая военно-морская академия, на самом деле она является продолжением Куньминской военной академии, действуя как собственный набег армии в политический мир китайских военно-морских клик. Тем не менее, это вдохновение новой жизни в военно-морскую историю Китая."

 YUN_a_new_class_of_wujiaba_cadres: "Новый класс кадров Уцзяба"
 YUN_a_new_class_of_wujiaba_cadres_desc: "С реконструкцией аэропорта Уцзяба и созданием дополнительных аэродромов по всей нашей территории пришло время снова приветствовать новое поколение курсантов Уцзяба на учебном курсе. Обучаемое как старыми, так и новыми кадрами, это новое поколение, возможно, увидит больше всего боевых действий из всех и должно быть способно принять вызов. Ибо в перенесении трудностей лежит основа реформ."

 YUN_securing_modern_equipment: "Обеспечение современным оборудованием"
 YUN_securing_modern_equipment_desc: "Будучи вынужденной полагаться на, честно говоря, ничтожное оружие и боеприпасы, которые она могла получить из иностранных источников и Куньминского арсенала, Юньнаньская армия отчаянно нуждалась в оружии столько времени, сколько она была военной силой. Однако с захватом Кантона первоклассная недвижимость и промышленность в Жемчужине Юго-Запада, способные поддерживать милитаристские клики Старой Гуанси, более чем достаточны для поддержания Юньнаньской армии."

 YUN_integrating_beiyangs_legacy: "Интеграция наследия Бэйяна"
 YUN_integrating_beiyangs_legacy_desc: "Долгое время будучи экспертами в плавании в открытом море, а недавно оставшись без работы, адмиралтейство Бэйяна навсегда осталось дружелюбным сопровождением моряков по сравнению с большинством их коллег из Бэйяна. Аполитичные или даже питающие симпатии к нашему делу, мы можем использовать контакты и связи с этими старыми морскими волками и использовать этих людей за их ноу-хау и навыки, что в конечном итоге принесет пользу нации."

 YUN_defending_chinas_coastline: "Защита береговой линии Китая"
 YUN_defending_chinas_coastline_desc: "Длинная и непрерывная, береговая линия Китая является идеальной декорацией для любого потенциального вторжения с моря. Постоянная проблема во всех применениях наших оборонительных стратегий, некоторые из адмиралтейства и армейского штаба посоветовали правительству реструктурировать и консолидировать текущую береговую оборону, одновременно выделяя средства на корабли береговой обороны. С этими усилиями есть надежда, что наша береговая линия станет неприступной крепостью."

 YUN_circumnavigating_the_blockade: "Обход блокады"
 YUN_circumnavigating_the_blockade_desc: "При всей своей обширности география Китая в конечном счете является клеткой, запертой японцами и немцами. С их владениями в Юго-Восточной Азии и у нашего непосредственного побережья невозможно, чтобы какие-либо торговые товары проходили без их ведома. Однако вместо того, чтобы просто лечь и принять свою судьбу, крайне важно, чтобы мы разработали стратегии и корабли, способные уклоняться от вражеских патрулей, чтобы обойти любую блокаду."

 YUN_a_central_aviation_academy: "Центральная авиационная академия"
 YUN_a_central_aviation_academy_desc: "С консолидацией большей части Китая юньнаньское законодательство мод в области китайской авиации может полностью расцвести. Несмотря на заметные попытки предыдущих режимов, таких как Чжили, Фэнтянь или Гоминьдан, Китай никогда по-настоящему не демонстрировал настоящую Центральную авиационную академию для ВВС. Однако с возобновленными усилиями и консолидацией предыдущих попыток наши силы будут летать под недавно окрещенной ЦАА."

 YUN_constructing_aircraft_plants: "Строительство авиационных заводов"
 YUN_constructing_aircraft_plants_desc: "Несмотря на амбиции по созданию собственных ВВС, китайская авиационная промышленность критически не соответствует нашим потребностям. Для действительно независимых ВВС мы не можем полагаться на иностранных поставщиков для удовлетворения наших потребностей. С планами строительства авиационного завода в Дуншане и расширения завода в Шаогуане наш авиационный персонал также разработал планы по созданию завода глубже в Гуанси."

 YUN_adopting_armoured_assaults: "Принятие бронетанковых штурмов"
 YUN_adopting_armoured_assaults_desc: "В эпоху современной войны две вещи торжествуют над простой смертностью человечества: самолет и танк. Ревущие металлические гиганты вселяют страх в любого солдата противника и обладают огневой мощью наряду с мобильностью для выполнения окружений невероятных участков фронта. Если Китай хочет по-настоящему выжить среди великих держав, крайне важно, чтобы у него были свои собственные бронетанковые силы."

 YUN_the_nation_under_siege: "Нация в осаде"
 YUN_the_nation_under_siege_desc: "Настал долгожданный час суда. Несмотря на наш срок, наша цивилизация веков, тысячелетий боится полного и абсолютного уничтожения от рук японских империалистов. Никто не в безопасности, будь то женщина или ребенок. Мы все знаем, что это правда, и с приближающейся гибелью китайский народ должен отложить свои ссоры и объединиться перед лицом невзгод!"

 YUN_acquiring_expertise: "Приобретение опыта"
 YUN_acquiring_expertise_desc: "Несмотря на предыдущие приобретения иностранного опыта, этого оказалось недостаточно для наших нужд. Старые и устаревшие, моряки посольств не подходят для состояния современной морской войны. С амбициями, выходящими далеко за пределы Китая, пришло время вступить в дипломатию с иностранными державами и договориться о консультативных миссиях для наращивания нашей собственной военной мощи."

 YUN_incentivising_airfleet_production: "Стимулирование производства воздушного флота"
 YUN_incentivising_airfleet_production_desc: "В целом, наша нехватка количества самолетов, летающих над нашим небом и аэродромами, оказалась крайне недостаточной для защиты воздушного пространства Китая. Еще раз, с еще большей серьезностью и усилиями, и с упором на оптимизацию производства самолетов, наш воздушный флот увидит быстрое расширение своих возможностей, чтобы соперничать даже с немецким."

 YUN_a_nascent_marine_corps: "Зарождающийся корпус морской пехоты"
 YUN_a_nascent_marine_corps_desc: "Давняя традиция в китайском флоте, почти столь же долгая, как и сама Республика, Корпус морской пехоты Китайской Республики существует с 1914 года, когда он был призван из распадающегося корпуса морской охраны и преобразован в силу, способную преодолевать морские десанты и реки. Предоставляя достаточную поддержку институту в нашем стремлении к флоту, наши корабли будут поддержаны нашей армией."

 YUN_a_fleet_in_six_years: "Флот за шесть лет"
 YUN_a_fleet_in_six_years_desc: "Амбициозный план, намного превосходящий наши собственные ожидания, военно-морской штаб разработал правительственный финансовый план для создания флота водоизмещением 600 000 тонн за 6 лет. Получив полное одобрение правительства, сотни кораблей и верфей должны быть построены, чтобы достичь цели. Возможно, еще раз китайский флот достигнет берегов Америки."

 YUN_a_naval_guerilla_war: "Морская партизанская война"
 YUN_a_naval_guerilla_war_desc: "С современными военно-морскими достижениями, превозносящими лучшие, большие и быстрые корабли, можно забыть о тихом прогрессе подводной войны. Превратившись из консервных банок, которые, скорее всего, убьют своих пассажиров в схватке с более крупным судном, подводные лодки теперь доминируют в своей роли в ведении своего рода «морской партизанской войны». Было бы разумно инвестировать в такие возможности, чтобы задушить наших врагов."

 YUN_combined_air_land_offensives: "Комбинированные воздушно-наземные наступления"
 YUN_combined_air_land_offensives_desc: "Под эгидой местной сухопутной войны ничто не способно переломить ход событий лучше, чем поддержка с воздуха. Способные уничтожать вражеские укрепления, бронетехнику и подразделения, самолеты непосредственной авиационной поддержки неоднократно доказывали свою эффективность. Во всех будущих китайских военных столкновениях наша пехота больше не будет двигаться без ВВС, направляющих их по пути, освещая путь бомбардировками."

 YUN_wartime_service_corps: "Корпус военной службы"
 YUN_wartime_service_corps_desc: "В связи с тяжелыми обстоятельствами, в которых мы оказались, было предложено создание «Корпуса военной службы», который предусматривает призыв мужчин и женщин для службы на второстепенных штабных должностях за линией фронта, чтобы освободить больше солдат для службы на фронте. Возможно, непопулярный или даже откровенно ненавистный, большинство по всей стране прекрасно знают о своем долге. Ибо если они потерпят неудачу, весь Китай будет потерян."

 YUN_hundred_years_of_resistance: "Сто лет сопротивления"
 YUN_hundred_years_of_resistance_desc: "«Долгосрочная война сопротивления зависит от бесконечного притока солдат на замену. Наша страна велика, и людей у нас много, поэтому все, что нам нужно, — это хорошая система призыва, и приобретение дополнительных войск не будет проблемой. Если мы сделаем это, мы покажем миру, что у нас есть силы для столетней войны сопротивления»."

 YUN_scorched_earth_policies: "Политика выжженной земли"
 YUN_scorched_earth_policies_desc: "По мере того как враг марширует вглубь огромной китайской территории, его линии снабжения становятся все тоньше, ненадежнее и отчаяннее. Ободренные нашими постоянными отступлениями во внутренние районы, ожидается, что мы должны быть в состоянии отдать все, на что они потенциально могут позариться, чтобы добиться полной победы. Стремясь использовать все, что есть в сельской местности, до того, как это сделают захватчики, мы затем продолжим безжалостным партизанским нападением."

 YUN_nation_building_through_turmoil: "Национальное строительство через потрясения"
 YUN_nation_building_through_turmoil_desc: "В конечном счете, кровопролитие и потрясения вторжения привели к обновленному чувству китайского национализма и братства. Через огонь и пламя общей жестокости наши соотечественники, независимо от их идеологических склонностей, разделяют друг с другом общего врага и общую любовь к китайскому национальному государству. Братья и сестры, мы все участвуем в общей борьбе, общей нации, построенной через потрясения."

 YUN_revival_of_chinas_naval_prowess: "Возрождение морской мощи Китая"
 YUN_revival_of_chinas_naval_prowess_desc: "Многие из более склонных к морю держав посмеялись бы над такой фразой, как «Морская мощь Китая», и все же китайская нация когда-то доминировала во всей Азии в целом. Наши корабли имели влияние в Японии, Корее, на Филиппинах, в Индонезии, Малайзии и даже больше. Китайский флот, возможно, пережил период стресса и слабости, но судьба Китая — оказывать влияние по всему миру, и это возможно только с сильным флотом."

 YUN_the_navy_of_the_national_protectors: "Флот национальных защитников"
 YUN_the_navy_of_the_national_protectors_desc: "Так же, как и храбрые солдаты Армии национальной защиты прошлого, наш флот также служит для защиты китайского народа от империалистических вторжений на нашу территорию. Действуя локально, флот является оборонительным, однако, если того потребует необходимость, наши храбрые моряки будут прокляты, если иностранные корабли вмешаются в китайские дела и уйдут невредимыми."

 YUN_the_navy_of_export_militarism: "Флот экспортного милитаризма"
 YUN_the_navy_of_export_militarism_desc: "В конечном счете, милитаризм Юньнани — это уникальный штамм, с постоянным желанием и потребностью расширяться за пределы наших провинциальных границ, такие аспекты перекочевали в наше более широкое национальное мышление. Наш флот тоже принимает такие наклонности и надеется проецировать свою мощь и влияние через все четыре океана мира."

 YUN_overseeing_the_seas: "Наблюдение за морями"
 YUN_overseeing_the_seas_desc: "В совместных усилиях между авиационным и военно-морским крыльями вооруженных сил они разработали совместные технические проекты для собственного развертывания Китаем возможностей морской бомбардировочной авиации. Запускаемая с аэропортов или авианосцев для поддержки нашего флота, интеграция третьего пути войны обязательно приведет к полному доминированию на морском поле."

 YUN_unified_air_doctrine_cohesion: "Единая сплоченность воздушной доктрины"
 YUN_unified_air_doctrine_cohesion_desc: "Яркие и сияющие, как никогда, наши ВВС продемонстрировали оглушительный успех, но многие наблюдатели за испытательными полетами пилотов критиковали беспорядок в доктрине, практикуемой отдельными подразделениями. Призрак предыдущих попыток создания региональных китайских ВВС. В конечном счете, если мы хотим искоренить такой призрак, было бы разумно централизовать нашу воздушную доктрину в согласованную единую, понятную и реализуемую всеми начинающими пилотами."

 YUN_from_above_and_below: "Сверху и снизу"
 YUN_from_above_and_below_desc: "Хотя наши ВВС все более способны защищать китайское население от террора и стратегических бомбардировок, бывают моменты, какими бы редкими они ни были, когда бомбардировщик может проскользнуть и посеять хаос в деревнях и промышленности. В эти времена наши солдаты должны укомплектовать недавно созданные установки ПВО и сбивать нарушителей в нашем воздушном пространстве. Сверху и снизу, пусть все, кто вторгается, боятся возмездия."

 YUN_the_jingguojun_of_the_air: "Цзингоцзюнь воздуха"
 YUN_the_jingguojun_of_the_air_desc: "Так же, как и «Армия национального умиротворения», или Цзингоцзюнь Тан Цзияо, новые китайские ВВС стремились к умиротворению китайского воздушного пространства. С исключительными асами-пилотами и обучением наши радикальные пилоты и сорвиголовы стремятся бросить вызов шансам или умереть, пытаясь. В то время как нация объединена под более широким китайским национальным государством, остатки военных традиций Юньнани проникли во все аспекты военной жизни."

###- UPC Political Tree -###
 YUN_the_king_of_the_southwest: "Король Юго-Запада"
 YUN_the_king_of_the_southwest_desc: "Тан Цзияо, возможно, воображал себя «Королем Юго-Запада» на пике своей власти в 1919 году, но в последующее десятилетие его правление оспаривалось соперниками в других провинциях и дома. Однажды готовый захватить контроль над южным правительством в 1925 году, к 1936 году он едва может оказывать влияние на кишащую Гоминьданом западную Гуйчжоу. Но Тан не смог бы выжить так долго без хитрости, и с приближением нового года он стряпает новые схемы."

 YUN_harness_the_yunnan_army: "Обуздать мощь Юньнаньской армии"
 YUN_harness_the_yunnan_army_desc: "Юньнаньская армия имеет гордую историю, стойкие авангарды юго-западного Китая против европейского империализма и защитники китайского республиканизма против монархистов-реставраторов и социалистов-революционеров. Она обеспечивала порядок среди хаоса 1910-х годов, но потерпела унизительные поражения в 1920-х. Хватит. Гордые наследники Цай Э и Куньминской военной академии должны снова оказаться на высоте!"

 YUN_revive_the_national_revolutionary_spirit: "Пробудить национально-революционный дух"
 YUN_revive_the_national_revolutionary_spirit_desc: "Национально-революционная армия была основана в 1925 году самим доктором Сунь Ятсеном, сила, лояльная партии и народу, а не милитаристам и тиранам. Хотя и побежденные в Северном походе и вынужденные отправиться в позорное изгнание в Гуйчжоу, храбрые солдаты, которые остались, еще не забыли свою революционную миссию. И они будут выполнять свой долг до горького конца!"

 YUN_the_federalist_revival: "Возрождение федерализма"
 YUN_the_federalist_revival_desc: "Он сделал это снова! Владыка Восточного континента снова обеспечил свою власть в Юньнани! Федералистский Чемпион, непобедимый, непреодолимый! Крайне важно заверить Провинциальное собрание в том, что Губернатор подтвердил свои обязательства. Долой деспотизм! Долой Бэйян! Долой милитаризм! Да здравствует Народное правительство! Да здравствует Провинциальная автономия!"

 YUN_leveraging_our_assets: "Использование наших активов"
 YUN_leveraging_our_assets_desc: "Естественно, правя Юньнанью более трех десятилетий, Тан Цзияо и его когорта приобрели довольно широкий спектр активов в провинции. Шахты, фабрики, банки, деньги и власть практически текут через руки двора Короля Юньнани. Крайне важно, чтобы эти средства были использованы для создания Партии народного правительства и подготовки генералов к праведной войне."

 YUN_buddhist_revivalism: "Буддийское возрождение"
 YUN_buddhist_revivalism_desc: "Преданный буддист, Тан Цзияо нашел много общего со своим коллегой-основателем Партии народного правительства Чжан Тайянем. Заигрывая с движением буддийского возрождения, пришло время Губернатору пойти ва-банк. Приглашая Сюй Юня, известного буддийского монаха, в правительство, он будет выполнять роль духовного советника, пока мы улучшаем жизнь народа Юньнани через Фоши, буддийский обряд."

 YUN_joint_committee_of_the_gentry: "Объединенный комитет по знати"
 YUN_joint_committee_of_the_gentry_desc: "Знать заботится о том, чтобы вступать в союз с гораздо более податливыми милитаристами, такими как Ху Жоюй или Лун Юнь, но это их собственная глупость. Через Объединенный комитет знати Чжан Тайяня у знати не будет иного выбора, кроме как подчиниться или быть разорванной воле Тан Цзияо. Все должны способствовать федералистскому будущему и концу старого порядка."

 YUN_elevating_the_poor_masses: "Возвышение бедных масс"
 YUN_elevating_the_poor_masses_desc: "Каким бы благородным он ни был, Гоминьдан — это всего лишь мерзкие паразиты, намеревающиеся злоупотреблять массами. Добиваясь их искренней поддержки, они жаждут, они подстрекают массы, а затем с вихрем ярости, который они создали, направляют его на своих врагов. Однако Юньнань не может быть социалистической; она слишком бедна без иностранной помощи. Массы вместо этого должны сосредоточиться на свободе как на своем пороке."

 YUN_completing_ma_congs_reforms: "Завершение реформ Ма Цуна"
 YUN_completing_ma_congs_reforms_desc: "Стойкий и способный, Ма Цун — один из самых проницательных членов Партии народного правительства. Изначально гражданское лицо в милитаристской клике Тан Цзияо, его переход во внутреннюю политику привел к тому, что он стал главным переговорщиком на Конференции в Иляне от имени Тана и министром финансов в 1928 году. Стремясь искоренить коррупцию, он столкнулся с препятствиями со стороны милитаристов. При полной поддержке Тана, давайте уничтожим эту угрозу."

 YUN_the_southwestern_university: "Юго-Западный университет"
 YUN_the_southwestern_university_desc: "С жестокими репрессиями Лиги в 1932 году, осуществленными Ци Сеюанем, и общим снижением свободы слова и демократического прогресса в прибрежных районах, огромные толпы престижных интеллектуалов бежали во внутренние районы. Циркулируя вокруг Юньнани, «Общество полумесяца» основано на интеллектуальном фундаменте выпускников Цинхуа и Пекинского университета, и они очень охотно пропагандируют свои идеи."

 YUN_order_in_guizhou: "Порядок в Гуйчжоу"
 YUN_order_in_guizhou_desc: "Хотя семья Лю в Гуйчжоу, естественно, непопулярна, у нее есть связи, простирающиеся далеко и широко. Возможно, уменьшившиеся в уважении и престиже, это ничто по сравнению с официальной поддержкой губернатора Тана. Конечно, у губернатора долгая история с Гуйчжоу, и его обычно считают мясником или тираном. Но на самом деле, какой у него выбор? Тан Цзию?"

 YUN_a_new_national_protection_war: "Новая война в защиту нации"
 YUN_a_new_national_protection_war_desc: "Долго ведя кампанию против чрезмерно ревностной милитаризации (сохраняя при этом раздутую армию, тем не менее), кажется, время пришло. Последняя заявка на Кантон в 1925 году закончилась почти провалом, но в конечном итоге клика Юньнань была не готова в тот раз. С десятилетием за плечами пришло время заявить о законном месте Юньнани как Короля Юго-Запада."

 YUN_aid_our_federalist_allies: "Помощь нашим союзникам-федералистам"
 YUN_aid_our_federalist_allies_desc: "С момента общего краха федералистского движения с его пика в середине 1920-х годов Юньнань испытывала относительную атмосферу изоляции. Конечно, есть губернатор Чжао, но явные разногласия по поводу законной ситуации в Гуйчжоу привели к большому смятению. Но тем не менее, федерализм не может выжить в одиночку, и Юньнани нужны союзники, если она хочет выжить."

 YUN_hold_the_guangzhou_conference: "Проведение конференции в Гуанчжоу"
 YUN_hold_the_guangzhou_conference_desc: "Чудом, или, возможно, даже как предначертано, юньнаньские федералисты наконец-то сумели выполнить цель более чем десятилетней давности. Наш первый гамбит почти стоил нам жизни, но второй оказался удачным! С южным политическим центром власти наконец в наших руках неизбежно, что мы должны объявить нации о возрождении федералистского движения!"

 YUN_a_new_order_in_beijing: "Новый порядок в Пекине"
 YUN_a_new_order_in_beijing_desc: "Итак, герои Национальной защиты сделали это. Без ограничений войны двадцатилетней давности, без оговорок ее политических лидеров. В стране установлен новый, формальный политический порядок. Порядок федерализма и демократии, а не промедления и автократии. Первым, кто выдвинул этот новый порядок, является не кто иной, как Тан Цзияо, и он стремится смазать колеса своего нового города."

 YUN_control_wartime_commodities: "Контроль товаров военного времени"
 YUN_control_wartime_commodities_desc: "Легкомыслие и индивидуализм отныне привели к огромному дефициту ценных ресурсов для военных усилий нации и не только. Материалы, еда, одежда, все виды снаряжения необходимы для солдат нации и ее народа, и все же накопление вышло из-под контроля. Через распространение поддерживаемых правительством организаций частным заводам будут гарантированы необходимые материалы для их производства товаров."

 YUN_revise_the_tax_system: "Пересмотр налоговой системы"
 YUN_revise_the_tax_system_desc: "В жизни неизбежны две вещи: смерть и налоги. Хотя это, возможно, не относилось ко многим людям в крайне нерегулярном состоянии потока Китая в Эру милитаристов, она, тем не менее, была свидетелем обеих крайностей. Высокий уровень смертности и обширные налоги на всякую всячину и абсурдности. Через тщательный пересмотр налоговой системы может быть принято прогрессивное налогообложение, обеспечивающее правительство необходимым финансированием для обоснования себя."

 YUN_chinas_new_industrial_revolution: "Новая промышленная революция Китая"
 YUN_chinas_new_industrial_revolution_desc: "Вокруг Китая расположено много врагов, которые хотели бы видеть его в руинах, чтобы большая часть страны оставалась легко эксплуатируемым захолустьем, разобщенным и раздробленным. Но патриоты Китая, его народ, его правители и его уважаемые просвещенные немногие разработали анафему для его врагов. Индустриализация, охватывающая как легкую, так и тяжелую промышленность, будет всем, что нужно нации для обеспечения своей национальной обороны навсегда."

 YUN_protect_the_landowners: "Защита землевладельцев"
 YUN_protect_the_landowners_desc: "Мы не стремимся лишить людей их собственности, знать их прав, отправить их на безвременную кончину в результате действий масс недовольных. Это непокорно и, прежде всего, отвратительно. Мы ищем не насилия, а перемен, и как таковая частная собственность должна поддерживаться в принципе. Споры о территории должны разрешаться справедливо, а землевладельцы должны быть уверены в своей важности для государства."

 YUN_encourage_resource_extraction: "Поощрение добычи ресурсов"
 YUN_encourage_resource_extraction_desc: "Китай — страна, полная богатых ресурсов, от руд до сельскохозяйственных культур, от рабочих до культуры; нация тысячелетий, несомненно, обладает достаточными ресурсами, чтобы видеть себя доминирующей на мировой арене. Но, в настоящее время, большая часть его богатой красоты неправильно используется негодяями и капиталистами, намеревающимися заработать за его счет. Ресурсы, которые могут быть использованы в общественных интересах, должны принадлежать государственным служащим."

 YUN_finding_a_third_way_in_china: "Поиск третьего пути в Китае"
 YUN_finding_a_third_way_in_china_desc: "Между революционерами и милитаристами те, кто является сторонниками реформизма, оказались оттесненными и зажатыми между громкими демагогами, которые ищут радикализма как решения бед нации. Но именно Третий путь, путь Умеренных, путь умеренных мнений, основанных на расчетливых доказательствах, выражающих себя только умеренными словами, спасет положение и нацию."

 YUN_rejuvenating_liberal_conservatism: "Омоложение либерального консерватизма"
 YUN_rejuvenating_liberal_conservatism_desc: "Требование демократии, прав человека, национальной конституции, верховенства закона, свободы мысли, слова, права протестовать против авторитаризма, милитаризма и всего такого — все это лишь неотъемлемые права для народа. Это то, что обещают либеральные консерваторы Умеренного Общества полумесяца, и это то, что выполнит Тан."

 YUN_rule_of_the_outstanding: "Правление выдающихся"
 YUN_rule_of_the_outstanding_desc: "Нация не может пасть жертвой обличительных речей непросвещенных глупцов, верящих в свою собственную шутливую самооценку. Это не карточная игра, ею не может управлять идеология, но вместо этого современная наука и интеллектуальный опыт. Через административную компетентность и правительство экспертов нацией должна управлять самая выдающаяся группа людей, эксперты по политологии, отобранные через экзамены и выборы."

 YUN_the_last_stand_against_tyranny: "Последний бой против тирании"
 YUN_the_last_stand_against_tyranny_desc: "Возможно, величайшей глупостью Бэйяна была неспособность собственной администрации Республики, законодателей и присяжных отрицать или предотвращать растущую автократию и полное злоупотребление законом; конституции были лишь быстро состряпаны для обеспечения политических успехов. Сдержки и противовесы, именно сдержки и противовесы между ветвями власти и центральным правительством по сравнению с провинциями могут избежать громоздкой тирании в главном офисе."

 YUN_strengthen_presidential_powers: "Усиление президентских полномочий"
 YUN_strengthen_presidential_powers_desc: "Милитаристы верят в свою собственную глупость, что Центральное правительство почти гарантированно будет кланяться их нуждам. Но именно нужды народа, а не губернаторов, должны быть удовлетворены. И это большая ошибка — дальше узаконивать легальный милитаризм через Конфедерацию. Китай перерос потребность в провинциализме, и пришло время для мудрой исполнительной власти, решительных действий, чтобы прорваться через трясину провинциальной политики."

 YUN_elevating_the_nations_thinkers: "Возвышение мыслителей нации"
 YUN_elevating_the_nations_thinkers_desc: "Правление просвещенных или правление элитного меньшинства? Партии масс позаботились бы о том, чтобы тирания и зло масс одолели тех, кто лучше всего подходит для управления. Демократия должна культивироваться, а не навязываться людям, плохо подготовленным к ее использованию. И поэтому именно при этом правлении самые яркие и хорошо оснащенные люди нации должны быть возвышены, взяв на себя бремя будущего нации."

 YUN_integrate_the_beiyang_bureaucracy: "Интеграция бюрократии Бэйяна"
 YUN_integrate_the_beiyang_bureaucracy_desc: "Идеалисты и утописты отбросили бы всю «гнилую» структуру правительства Бэйяна как коррумпированную, полную недугов, безнадежных личностей в их новом мировом порядке. Но они столкнулись бы с последствиями своих действий: неэффективной системой, полностью лишенной квалифицированного персонала. Бюрократия — это болезнь, это правда, но при правильном применении она может порождать великие государственные машины. Мы должны только попробовать."

 YUN_the_fight_against_imperialism: "Борьба с империализмом"
 YUN_the_fight_against_imperialism_desc: "Самое гнусное зло, извлеченное на нацию, — это великое наступление империалистических начинаний в Китае. Ибо оно было свидетелем того, как иностранные державы бессмысленно делили его на зоны влияния и контроля. Даже сейчас, несомненно, втянутые в войну, они смотрят на Поднебесную с голодом в глазах и недовольством ее народом. Это не война между отдельными людьми, а война национальных государств, и выживают только сильные."

 YUN_promises_of_constitutional_rule: "Обещания конституционного правления"
 YUN_promises_of_constitutional_rule_desc: "Это может казаться лишь пустым лозунгом, пропагандируемым милитаристами и меньшими людьми, но наши заверения искренни, и наши действия оправдают новое Федеральное правительство. Это не правление тирании или партийного государства, а слуг народа. Отдающих свои жизни служению солидарности и представительству народа, соблюдению законов, соблюдению доброй морали!"

 YUN_groundwork_for_a_confederation: "Основа для конфедерации"
 YUN_groundwork_for_a_confederation_desc: "Чжан Тайянь, один из ключевых архитекторов федерализма, предложил то, какую форму должен принять китайский федерализм: конфедерация. И увы, многие указали бы, что такая позиция противоречит его желанию устранить милитаризм, но по сути это та самая опорная база, с помощью которой милитаризм можно предотвратить. Если умиротворить их конфедерацией, они просто не заметят урезания их власти и возможного устранения."

 YUN_affirm_governor_loyalty: "Подтверждение лояльности губернатора"
 YUN_affirm_governor_loyalty_desc: "Конечно, у лояльности есть свои награды. Именно лояльность гарантирует доверие, и именно лояльность строит настоящую силу среди соотечественников. Насколько это верно в армии или в повседневной жизни, лояльность служит своей цели и в государственном управлении. Не обязательно это должно принимать форму коррупции, так как те, кто лоялен, могут остаться. У тех, кто нелоялен, просто погаснет пламя."

 YUN_first_among_equals: "Первый среди равных"
 YUN_first_among_equals_desc: "Провинция, которая породила все это, провинция, которая охраняла достоинства республиканизма с 1911 года, и республика, которая отстаивала неразбавленный федерализм в течение десятилетий. Именно Юньнань, Первая среди равных, показала сильные стороны провинциальной единицы. Идеального размера, провинция не слишком большая и не слишком маленькая, и индивидуально имеет потенциал объединить нацию. Вместе коллективная мощь провинций преодолеет империализм."

 YUN_unity_through_national_essence: "Единство через национальную сущность"
 YUN_unity_through_national_essence_desc: "Вряд ли можно навязывать свою волю другим, и точно так же нельзя навязывать власть центрального правительства провинциальным правам и отношениям. Как будто выращивая растение, нужно проявлять большую осторожность и быть нежным, ибо любое открытое действие — и оно завянет. Объединенные общей культурой, буддийской идентичностью и общей национальной сущностью, клеветники регионализма будут сдерживаться патриотической гордостью."

 YUN_healing_the_north_south_rift: "Исцеление раскола Север-Юг"
 YUN_healing_the_north_south_rift_desc: "Столько, сколько это было определено, существовал тлеющий культурный и политический разрыв между югом и севером нации. Апатичный к авторитаризму и предрасположенный к вторжению, Север давно поддерживает как традиционное место власти, так и политические договоренности. Юг, охваченный милитаристскими тенденциями и революционными идеологами, отверг великие перемены и переход. Решение? Надлежащее обсуждение полномочий."

 YUN_for_a_new_china_for_a_new_economy: "За новый Китай, за новую экономику"
 YUN_for_a_new_china_for_a_new_economy_desc: "С захватом Пекина государство должно было пройти, возможно, несвоевременный и радикальный переход, поскольку различные объекты, департаменты, компании и другие аспекты экономики были поставлены под прямой государственный контроль. С ослаблением ограничений крайне важно, чтобы контроль военного времени и монополии были отменены, а экономика переориентирована обратно на удовлетворение потребностей людей, а не военных."

 YUN_emerging_from_the_ashes: "Восстание из пепла"
 YUN_emerging_from_the_ashes_desc: "Индивидуальные и коллективные групповые действия не обязательно достаточны, как казалось бы, чтобы подавить беды народа. В различных недавно завоеванных районах и даже дома они чахнут и страдают от разрушения инфраструктуры и падения денежной стоимости. Только через прямую государственную помощь тем, кто хочет обновить свою жизнь, и китайскому юаню, нация может действительно подняться из своего плачевного состояния."

 YUN_promoting_economic_security: "Продвижение экономической безопасности"
 YUN_promoting_economic_security_desc: "Это одна из самых важных ценностей любой свободной экономики в современную эпоху, что принцип экономической демократии соблюдается. В соответствии с таким принципом должны быть обеспечены адекватные средства к существованию и экономическая безопасность, и так же должно быть уравнивание богатства и дальнейшее сокращение разрыва между богатыми и бедными. Люди жаждут лучшей жизни, и ответственность правительства — способствовать этому."

 YUN_revolution_of_the_middle_classes: "Революция средних классов"
 YUN_revolution_of_the_middle_classes_desc: "Естественно, это не революция масс или элит, а средних классов. Производителей, предпринимателей, активных капиталистов, идущих на риск и инициативу в своих начинаниях. И поэтому производство также должно быть увеличено при адекватном планировании как частных, так и национальных фирм. Ожидается, что они будут придерживаться этого предложения, и правительство обязано помогать, чем может."

 YUN_sanction_safe_progress: "Санкционирование безопасного прогресса"
 YUN_sanction_safe_progress_desc: "Вихрь прогресса никогда не продвигался дальше, чем яростью масс. Ибо именно их жажда лучшей жизни навязала китайской нации и другим местам революцию. Несмягченное угнетение может привести только к взрывной контратаке революционеров, но если вы умны в управлении государством, вы можете облегчить такие беды. Защита и гарантия прав крестьян и рабочих — это лишь первый шаг к освобождению."

###- UPC Satellite Tree -###
 YUN_federalist_fortress_in_the_southwest: "Федералистская крепость на Юго-Западе"
 YUN_federalist_fortress_in_the_southwest_desc: "С возвращением федерализма как грозной силы после краха Чжили было много соображений относительно роли, которую Юньнань должна играть в освобождении от централистской системы. По своей истинной сути Юньнань долгое время была крепостью неповиновения. Одной против тиранов, против автократов, против монархистов и против революционеров. И поэтому вполне естественно, что она станет крепостью Федерализма; его истинной защитой."

 YUN_support_the_southern_government: "Поддержка Южного правительства"
 YUN_support_the_southern_government_desc: "Играть вторую скрипку — вряд ли место для юньнаньцев, но не заблуждайтесь, если Юго-Западное федералистское правительство падет, сама Юньнань будет так ужасно одинока. Мы слишком хорошо знаем цену хорошим союзникам на китайских полях сражений, и поэтому крайне важно, чтобы провинциальное правительство собрало все, что может, для помощи нашим союзникам. Войска, люди, материалы, все должно быть направлено на нашу общую цель."

 YUN_press_for_unification: "Настаивать на объединении"
 YUN_press_for_unification_desc: "Казалось бы, что наши всегда милостивые союзники сочли уместным бездельничать, вряд ли преследуя курс объединения искренним или своевременным образом. Это просто не может продолжаться. Мир не будет ждать, пока китайский народ объединится и нация соберется, и чем дольше мы ждем, тем сильнее становятся наши национальные и международные противники. Мы должны надавить на наших союзников, чтобы они продвигались вперед с грандиозным наступлением."

 YUN_last_holdout_of_federalism: "Последний оплот федерализма"
 YUN_last_holdout_of_federalism_desc: "И так казалось бы, что история повторилась в третий раз в Эру милитаристов. Юньнань, стоя на своих босых ногах, должна противостоять натиску противников, сплачивая знамя свободы, вольности и демократии. И если история верна, то именно Юньнань, несомненно, выстоит и выйдет победителем. Мы должны приложить все наши силы, всю нашу мощь, чтобы сохранить все, что нам дорого. Ваньсуй!"

 YUN_rein_in_the_defence_commissioners: "Обуздать комиссаров обороны"
 YUN_rein_in_the_defence_commissioners_desc: "Загнанный в угол, Тан Цзияо был вынужден позволить обширным территориям Юньнани фактически иметь своих собственных региональных царьков в форме комиссаров обороны. Равномерно распределенные к северу, западу и югу от Куньмина в Чжаотуне, Дали и Мэнцзы, комиссары обороны могли оказывать чрезмерное влияние на политику клики Юньнань с бурных 1920-х годов. Они должны быть поставлены на колени перед королем."

 YUN_self_government_training: "Обучение самоуправлению"
 YUN_self_government_training_desc: "Очень немногие существующие бюрократы и магистраты достаточно образованы по политической позиции федерализма или по пути местного самоуправления. Отправляя кадры в Колледж права и политики или даже за границу в такие места, как Япония, правительство может обучить старых чиновников особенностям их статуса и поколение новых чиновников с общей надеждой, что они смогут в достаточной степени наделить полномочиями местные собрания."

 YUN_second_southwestern_conference: "Вторая Юго-Западная конференция"
 YUN_second_southwestern_conference_desc: "Якобы именно союзники Юньнани возглавляют атаку национального федералистского движения, но в великой реальности федералистского проекта именно Юньнань будет вести юго-западные провинции к сплоченному и единому фронту. Это наша судьба, и вряд ли кто-то сможет нам противостоять. Созывая делегатов, представляющих все аспекты Юго-Запада, мы изложим роль, которую Юньнань должна играть в национальном федерализме."

 YUN_the_yunnan_monroe_doctrine: "Доктрина Монро Юньнани"
 YUN_the_yunnan_monroe_doctrine_desc: "Сама Юньнань сражалась, истекала кровью и жертвовала, чтобы нести флаг китайского республиканизма и федерализма с момента ее неуверенного вступления в провинциальное управление в Синьхайской революции. Но с союзниками на большинстве фронтов ей больше не нужно нести это знамя в одиночку. Собственная «Доктрина Монро» Юньнани, сродни доктрине Хунани, позволит ей сосредоточиться на местных реформах и развитии, позволяя нашим союзникам вести большую часть боевых действий."

 YUN_implement_social_reforms: "Внедрение социальных реформ"
 YUN_implement_social_reforms_desc: "Обеспечив мир за пределами провинций, Юньнань теперь имеет возможность проводить минимум необходимых реформ, поскольку военные отходят на второй план. Различные древности остаются в культурном обществе Юньнани, такие как деспотическая пенитенциарная система или нелепые обычаи брака, погребения и дарения подарков. Хотя мы на самом деле не желаем указывать людям, что им следует и не следует делать, мы можем, по крайней мере, предотвратить наиболее вредные излишества этих привычек."

 YUN_spreading_popular_education: "Распространение народного образования"
 YUN_spreading_popular_education_desc: "Недостаточно просто построить грандиозный Юго-Западный университет или принять целое великолепие китайских интеллектуалов. На всех уровнях Юньнань должна быть просвещена. Через распространение народного образования, строительство начальных школ, профессиональных школ, вечерних школ, педагогических школ и распространение лекционных обществ Юньнань станет утопией на Юго-Западе."

 YUN_true_peoples_government: "Истинное Народное правительство"
 YUN_true_peoples_government_desc: "Люди не видят, что демократия и федерализм не могут быть просто введены только по местной инициативе, ибо это равносильно объявлению своей провинции выше нации. Нет, именно «Истинное» Народное правительство, посредством которого Юньнань послужит моделью для всех провинций; экономическое развитие, образование и реформирование администрации. Но никаких всенародных выборов губернатора, не до национального объединения."

 YUN_reform_the_militia_system: "Реформа системы ополчения"
 YUN_reform_the_militia_system_desc: "Система ополчения Баоцзя и все другие подобные системы были разработаны, чтобы служить местными стражами или гарнизонами своих соответствующих общин. Однако на самом деле они стали не более чем простыми пешками местных магистратов или знати, способствуя восприятию их тиранического правления над крестьянством. Консолидируя и управляя ополчением через центральный офис, все они станут подотчетны губернатору, по крайней мере, косвенно."

 YUN_consolidate_the_southwest: "Консолидация Юго-Запада"
 YUN_consolidate_the_southwest_desc: "Под эгидой местного самоуправления якобы дурным тоном считается аннексировать или иным образом контролировать соседнюю провинцию через военное вмешательство или иным образом. Как и суть федерализма, провинции должны управляться своими соотечественниками. Однако эксперимент Гуйчжоу показал, что связывание провинций вместе может принести значительные выгоды, если применять его правильно. Давайте экспортируем модель Дянь-Цянь на весь Юго-Запад!"

 YUN_reconcile_with_the_socialists: "Примирение с социалистами"
 YUN_reconcile_with_the_socialists_desc: "Почти отвратительно, как «благоприятный» губернатор Тан Цзияо относился к местному рабочему движению Юньнани. Опасаясь популизма, не доверяя воспринимаемому «радикализму», он почти кооптировал или иным образом уничтожил любую форму законного представительства рабочих среди интеллигенции и фабрик. Наши братья-социалисты не являются нашими врагами, ибо они стремятся к той же цели, что и все китайцы, мы должны лишь заслужить их благосклонность амнистией."

 YUN_root_out_the_socialists: "Искоренение социалистов"
 YUN_root_out_the_socialists_desc: "Стало совершенно очевидно, что победы над Гоминьданом было недостаточно, чтобы предотвратить падение Юньнани под тиранию демагогов и масс. Проповедуя свой яд в подпольных ячейках, различные революционные группы остаются активными в Юньнани, особенно те, которых возглавляют Ван Фушэн или Ли Синь. Социалистической революции нет места в Китае, он просто слишком аграрен и беден для своих средств. Если они не видят смысла, то увидят меч."

 YUN_seize_federalist_leadership: "Захват лидерства федералистов"
 YUN_seize_federalist_leadership_desc: "Казалось бы, что не все связи созданы, чтобы длиться, и уж точно не все союзники. К сожалению, Юньнань скорее привыкла выполнять свой долг и служение в одиночку и своими собственными руками. С крушением предыдущего факелоносца федералистского движения только в должной линии преемственности Юньнань, и только Юньнань, может сесть на трон Объединенных провинций."

 YUN_refuge_for_intellectuals: "Убежище для интеллектуалов"
 YUN_refuge_for_intellectuals_desc: "С Обществом полумесяца и Юго-Западным университетом, пустившими корни в Юньнани, провинция в какой-то степени превратилась в рог изобилия интеллектуализма и развития в китайской нации. Конечно, разумно, чтобы провинциальное правительство спонсировало, финансировало и культивировало этих амбициозных современных ученых-чиновников, для их блага и нашего собственного."

 YUN_patriotic_labour_unions: "Патриотические профсоюзы"
 YUN_patriotic_labour_unions_desc: "Профсоюзы — это особая и, по идее, славная форма представительства тех, кто составляет основу индустриального общества. Вполне естественно, что они сохраняют свое влияние и служат своей роли в промышленной революции Китая. Но они не могут быть политическими. Это пятнает их потенциал, отравляет колодец возрождения рабочих. Нет, они должны быть аполитичными, подпитываемыми не властными политиками, а чистым патриотизмом."

 YUN_addressing_the_currency_crisis: "Решение валютного кризиса"
 YUN_addressing_the_currency_crisis_desc: "Естественно, гражданская война, национальное объединение и тотальная борьба с иностранными империалистами не являются особенно благоприятной почвой для экономического развития или укрепления деловых связей. Хуже того, сама Юньнань находилась в диких муках притока различных валют. Немецкие марки, банкноты банка Фудянь и даже некоторые сохранившиеся купюры Юань Шикая и до-Синьхая. Однако, развивая банк Фудянь, решение может быть найдено в его расширении."

 YUN_gathering_capital_and_labour: "Сбор капитала и рабочей силы"
 YUN_gathering_capital_and_labour_desc: "Возможно, вследствие довольно жесткого подхода провинциальной администрации к рабочему движению, она была полностью лишена китайских рабочих для финансирования своих амбициозных проектов развития. Модернизация транспорта, сельского хозяйства, горнодобывающей и легкой промышленности требует рабочей силы. С рабочими из Вьетнама и Гонконга, наряду со схемой жилья для рабочих для местных китайских иммигрантов, Юньнань разовьется, чтобы соперничать даже с Шанхаем."

 YUN_promoting_mass_education: "Продвижение массового образования"
 YUN_promoting_mass_education_desc: "С развитием местных образовательных учреждений в Юньнани развилась своего рода внутрифракционная клика. Так называемая «Пекинская группа» была связана с ростом радикализма среди студенческой базы, но их свирепость перенеслась и на образовательные начинания. Организуя Студенческую организацию Юньнани, она увидела развитие комплексной программы образования для взрослых, подчеркивающей патриотизм, демократию и оппозицию старине."

 YUN_push_for_economic_revival: "Толчок к экономическому возрождению"
 YUN_push_for_economic_revival_desc: "Полностью поврежденная почти вечной войной со времен Синьхая и бандитизмом до этого, китайская экономика находится под иностранным господством, раздроблена и особенно слаба в различных провинциях. Но чтобы свернуть горы, китайцы должны быть в состоянии утвердить истинное экономическое процветание и независимость. Если народ и политики не видят истинной необходимости экономической реконструкции, то мы должны лишь просветить их."

 YUN_freedoms_final_call: "Последний зов свободы"
 YUN_freedoms_final_call_desc: "Час ведьм настал! Те предательские головорезы, наши когда-то благоприятные союзники, они стремятся предать свои собственные идеалы! Разорвать их ради собственного величия и глупости! Этого нельзя допустить! Мученики федерализма не сражались за сильную, свободную и справедливую демократию, чтобы увидеть, как она потоплена амбициозными автократами и их средой безликих бюрократов. Судьба Юньнани — быть авангардом против тирании, и поэтому мы должны взять в руки оружие и выступить против наших врагов!"

 YUN_a_patriots_war: "Война патриота"
 YUN_a_patriots_war_desc: "Нет истинного китайского патриота, который может просто сидеть в стороне и терпеть, как нация снова падает в катастрофическую пустоту деспотизма и авторитаризма! Эта война — народная война против системы, которая вышла из-под их контроля. Это война против самих сил энтропии. Это война за будущее не только нынешнего поколения, но и каждого последующего поколения. И долг каждого китайца — бороться за свою свободу."

 YUN_exploiting_divided_loyalties: "Использование разделенной лояльности"
 YUN_exploiting_divided_loyalties_desc: "Собственные тылы и штаб-квартиры предателя не являются по-настоящему едиными, это очевидно в их кампаниях, проводимых до и после их предательства. Если мы просто консолидируем наши собственные силы и заискиваем перед теми, кто подумывает о дезертирстве, или теми, кто видит те же несправедливости своими собственными глазами, ряды предателя сломаются, и их решимость будет совсем пустой."

 YUN_leadership_of_the_best_and_brightest: "Руководство лучших и ярчайших"
 YUN_leadership_of_the_best_and_brightest_desc: "Именно Куньминская академия выпустила одних из самых фантастических и блестящих генералов, офицеров и командиров нации. Укомплектованная еще большим количеством военных педагогов, она является гордостью нации, вдохновляя долг, честь, служение и патриотизм в своих выпускниках. Без сомнения, клика Юньнань сильнее благодаря этому, и поэтому именно офицеры клики Юньнань принесут устойчивую победу."

 YUN_the_lessons_of_fire_and_blood: "Уроки огня и крови"
 YUN_the_lessons_of_fire_and_blood_desc: "Китайская история веками омывалась кровопролитием, гражданской войной и разрушением. Наше восстание — лишь одно из длинной череды вызывающих противостояний национальной тирании и деспотизму. Но оно не будет неудачей. В недавней истории, в Синьхае и войне за Национальную защиту, Юньнань была законодателем мод в обеспечении победы, и вполне естественно, что эти прошлые победы продвигают нас дальше."

 YUN_sustaining_the_republics_flame: "Поддержание пламени Республики"
 YUN_sustaining_the_republics_flame_desc: "Стремление к демократии, свободе и федерализму — благородные цели. Это истинный утопический идеализм китайских масс, что они тоже, как и их соотечественники на Западе и в других местах, могут утвердить народный мандат выборов и отзыва. Это то самое ревущее пламя, которое было свидетелем расцвета китайских республиканских революционеров, и именно это пламя мы защитили и, в конечном итоге, разожгли."

 YUN_no_sacrifice_no_victory: "Нет жертв — нет победы"
 YUN_no_sacrifice_no_victory_desc: "Нельзя обеспечить победу без какой-либо формы жертвы. Мученики революции и реформ оправдали свою борьбу потерей жизни, и именно через эту борьбу с тиранией китайский народ должен снова собрать свою волю, победить автократов и обеспечить прочный мир в Республике. Чего бы это ни стоило, Китай должен быть единым, и он должен быть демократией."

###- UPC Endgame Tree -###

 YUN_the_fight_for_human_rights: "Борьба за права человека"
 YUN_the_fight_for_human_rights_desc: "Только при продолжении кампании за свои собственные неодолимые права человека может возникнуть Свободная и Демократическая политическая система; это долгое время было ядром платформы Общества полумесяца. Государство не может сосредоточиться на предоставлении прав граждан, игнорируя при этом внутренние права человека. Демократии по всему миру ставят права граждан на первое место, но именно «Полумесяц» сделает шаг к примату прав человека."

 YUN_cultivating_liberal_nationalism: "Культивирование «либерального» национализма"
 YUN_cultivating_liberal_nationalism_desc: "Многие утверждают, что противоядием от иностранного империализма является проведение тотальной мобилизации народа, направление культурной и военной мощи против Токио, Москвы или Берлина. И они были бы, по крайней мере, наполовину правы. Но именно национализм, забытое обожание и гордость за свою страну, ее историю и культуру, будут бороться с империализмом. Интернационализм может подождать, по крайней мере, пока всем Китаем не будут править китайцы."

 YUN_promoting_positive_thinking: "Продвижение позитивного мышления"
 YUN_promoting_positive_thinking_desc: "Сюй Чжимо первым высказал предположение, что Эра милитаристов привела к тому, что «все стандарты ценностей» были нарушены неразберихой и хаосом. Ухудшение доброкачественной человеческой порядочности. Потеря такого «позитивного мышления» привела к тому, что неосознанные и бессознательные мысли вошли в сознательную деятельность. Но ситуация не безнадежна: долг интеллектуалов — продолжать конфуцианское моральное и интеллектуальное воспитание; или, достаточно сказать, политику экспертов."

 YUN_health_and_dignity: "Здоровье и достоинство"
 YUN_health_and_dignity_desc: "Социальные услуги, здравоохранение, социальное обеспечение и всевозможные благотворительные начинания для поддержания благополучия китайских граждан в значительной степени остались в подвешенном состоянии из-за отсутствия национального единства в Эру милитаристов. Христианские миссионеры, Красный Крест и филантропия милитаристов служили в основном для замены центральной системы здравоохранения. Но, как символизируют литературные идеалы «Полумесяца», правительство должно работать над восстановлением «здоровья» и «достоинства» населения."

 YUN_leadership_of_the_talented_minority: "Лидерство талантливого меньшинства"
 YUN_leadership_of_the_talented_minority_desc: "Цзиньши и все другие ученые-чиновники когда-то вели Цин к просвещенному прогрессу. Следуя примерам, поданным Конфуцием или Мэн-цзы, они пользовались доверием двора и общества, чтобы быть экспертами китайского правительства. Поэтому вполне естественно, что их современные потомки, интеллектуалы и эксперты, несут их бремя, укомплектовывая центральную бюрократию."

 YUN_ending_the_political_chaos: "Прекращение политического хаоса"
 YUN_ending_the_political_chaos_desc: "Естественно, интенсивный политический хаос в Китае был в значительной степени вызван двумя решительно злыми силами: милитаристами, контролирующими правительство и политику, и поощряемым захватом добычи милитаристами, бандитами или коррумпированными бюрократами. Чтобы быть анафемой таких злых сил, необходимо как сдерживать армию, так и вычищать бюрократию. Ссорящиеся политики не приносят удачи, и долг правительства — держать их в узде."

 YUN_third_way_economics: "Экономика Третьего пути"
 YUN_third_way_economics_desc: "Китай — в значительной степени аграрное общество, крестьяне трудятся под своими дворянами-землевладельцами, в то время как немногие скудные городские центры, такие как Тяньцзинь или Шанхай, поддерживают большие части городского производительного сектора. Чтобы преобразовать Китай, крайне важно создать контролируемую государством экономику. Государство — это инструмент национального развития, и поэтому как свободные рынки, так и классовая борьба должны быть отвергнуты во имя государственного развития."

 YUN_the_peaceful_road_to_socialism: "Мирный путь к социализму"
 YUN_the_peaceful_road_to_socialism_desc: "Поскольку сам Китай так лишен материального и экономического процветания, для обездоленных и разгневанных слишком обычно смотреть в сторону историко-материалистических взглядов и классовой борьбы для достижения процветания. Но не экономическое неравенство, а политическое неравенство является истинным источником горя. Чтобы культивировать конечную цель китайского социализма, нужно ввести его через демократический процесс."

 YUN_spartan_education_methods: "Спартанские методы обучения"
 YUN_spartan_education_methods_desc: "Как снова и снова утверждал Цунь Шушэн, китайское общество, и особенно его школы и университеты, должны быть полностью самодостаточными, если они хотят выжить в суровой реальности. Обязанные тысячелетиями традиций и культуры, студенты должны научиться быть строгими, прилежными, прагматичными и открытыми для новых идей, сохраняя при этом краткие и согласованные основные принципы, которыми они живут."

 YUN_from_a_spark_to_a_prairie_fire: "От искры к степному пожару"
 YUN_from_a_spark_to_a_prairie_fire_desc: "Из одной благородной искры может разгореться каскадная революция. Точно так же из одного принципиального примера может разгореться целый степной пожар. Факел Цунь Шушэна и Су Хунгана, двух замечательных педагогов, откроет светлую эру просвещения для всей страны. Больше ни один потомок Желтого Императора не будет покорным гражданином, и не будет добровольным рабом какого-либо иностранного хозяина."

 YUN_economic_stewardship: "Экономическое управление"
 YUN_economic_stewardship_desc: "Черный понедельник и ежегодные рецессии показали ясный пример того, что Центральные правительства вряд ли могут сидеть сложа руки и просто наблюдать, как хаос вспыхивает в сельскохозяйственном и промышленном секторах во время экономических трудностей. Китай тем более требует активной руки в экономических делах; поиск мирных решений земельных споров, облегчение страданий крестьян при защите интересов землевладельцев, свободное предпринимательство, все виды стабильной экономики должны управляться государственными руками."

 YUN_mandatory_public_education: "Обязательное государственное образование"
 YUN_mandatory_public_education_desc: "В 1902 году император Гуансюй издал указ о закрытии всех традиционных школ, таких как Куньминская академия, и реорганизации их на основе современных принципов. Были основаны два нормальных училища, одно для мальчиков и другое для девочек, наряду со Школой горного дела и Школой права и политики. К 1920-м годам насчитывалось 10 современных школ с 2000 учениками. Образование было в центре жизни Юньнани, и крайне важно, чтобы оно стало центром жизни Китая тоже."

 YUN_scholarly_civil_service: "Ученая гражданская служба"
 YUN_scholarly_civil_service_desc: "Поистине, самой замечательной системой гражданской службы в мире должна быть система Соединенных Штатов. Подавая пример, развитие системы от Джорджа Вашингтона и далее является ничем иным, как изумительным. В своем бескорыстном служении и Вашингтон, и Джефферсон очистили коррупцию и гарантировали, что гражданская служба оставалась лояльной нации, а не какой-либо политической партии. И именно этому примеру должен подражать Китай."

 YUN_modernising_china: "Модернизация Китая"
 YUN_modernising_china_desc: "Чтобы быть по-настоящему сильной нацией, способной к собственным независимым действиям, Китай должен быть современным. А чтобы быть современным государством, он должен основываться на фундаменте сельского хозяйства, торговли и промышленности. Этих трех титанов, на которых все западные нации стали богатыми и сильными. Нужно всего лишь несколько уверенных в себе китайских торговцев, чтобы однажды создать великий коммерческий круг, который будет конкурировать с их западными коллегами."

 YUN_zhang_taiyans_federation: "Федерация Чжан Тайяня"
 YUN_zhang_taiyans_federation_desc: "Хотя и не обязательно такое экстремальное, как он хотел бы, знамя Чжан Тайяня все еще высоко реет в столице. Духовный отец нации, его преемники должны работать, чтобы построить сбалансированное правительство, которое все еще остается жизнеспособным. Не конфедерация, но настолько автономная, насколько это возможно; провинции имеют власть, возможно, даже национальную гвардию, но Центральное правительство все же должно сохранять свое слово."

 YUN_peace_with_the_democrats: "Мир с демократами"
 YUN_peace_with_the_democrats_desc: "Опасения велики, что Партия народного правительства просто стремится установить диктатуру или доминирующую партию, сродни тем фронтовым организациям, таким как Ассоциация Гармонии или Лига возрождения, но это не может быть дальше от истины. Протягивая оливковую ветвь, ПНП должна успокоить напряженность не только с Демократической лигой Китая и независимыми демократами, но и с Младокитайской партией."

 YUN_grand_republican_statesman: "Великий республиканский государственный деятель"
 YUN_grand_republican_statesman_desc: "Хотя, возможно, аутсайдер-кандидат федералистского дела, Тан Сяоин несет с собой много заслуг. Образованный, молодой и представляющий «современный» взгляд на платформу Партии народного правительства, можно сказать, что он является символом нового поколения китайского политика. Более связанный с более широким Великим республиканским альянсом и с Демократической лигой Китая, он является умеренной, либеральной и объединяющей силой на политической сцене."

 YUN_fair_competition_in_the_middle_kingdom: "Честная конкуренция в Поднебесной"
 YUN_fair_competition_in_the_middle_kingdom_desc: "Революционеры заискивают перед массами через продвижение усилий по земельной реформе в стиле джорджизма, принципа «Земля — пахарю», завещания земли тем, кто на ней работает. Лишая знать их доминирования, это также сравнительно лишает их какого-либо влияния вообще. Должно быть чувство баланса и гармонии в аграрных вопросах, доброжелательных помещиков, наблюдающих за прилежными работниками."

 YUN_arbiter_between_the_provinces: "Арбитр между провинциями"
 YUN_arbiter_between_the_provinces_desc: "Нет более великого государственного деятеля во всей современной китайской политической эпохе, чем Тан Цзияо. Сын революционного огня и интенсивного патриотизма, он принес не только истинную свободу китайскому народу, но и истинную демократию. Центральная, связующая и нейтральная фигура, поистине просвещенный человек, способный сбалансировать интересы каждого китайского человека. Истинный Первый среди равных."

 YUN_the_saviour_of_the_nation: "Спаситель нации"
 YUN_the_saviour_of_the_nation_desc: "Никто не мог бы сделать это так хорошо, как семья Тан. Маршируя под знаменем народного правительства, народной демократии и народного федерализма, они обеспечили как процветание китайской республики, так и продолжающееся доминирование юньнаньцев в китайских делах. Они были спасителями нации, предприимчивыми солдатами, сражавшимися против автократии, и они сделали это снова."

 YUN_demobilising_the_army: "Демобилизация армии"
 YUN_demobilising_the_army_desc: "В новой китайской федерации крайне важно, чтобы милитаризм и ему подобные были сокращены почти навсегда. Никогда не может быть другой Эры милитаристов, и, расширяя автономию провинций, нужно гарантировать, что милитаристы не получат власть в таком сценарии. Таким образом, национальная армия должна быть сокращена всего до 200 000 человек, достаточно для независимых действий при защите национальной целостности."

 YUN_preserving_chinese_culture: "Сохранение китайской культуры"
 YUN_preserving_chinese_culture_desc: "Китайская цивилизация видела себя сильно угнетенной в последние годы. Век унижений, десятилетия внутренней борьбы и раздоров, несостоятельная политическая система и несостоятельное общество. Многое было сделано, чтобы навредить нашей тысячелетней культуре, но больше этого не будет! Китайская культура должна быть сохранена, с ней нужно обращаться деликатно и позволить ей процветать. Переплетенная с китайским буддизмом как связующим фактором, ни социалист, ни империалист не усугубят наше унижение."

 YUN_the_liangist_ideal: "Идеал Ляна"
 YUN_the_liangist_ideal_desc: "Хотя это и благоприятно, и, конечно, заслуживает уважения, концепция федерализма Чжан Тайяня предусматривала бы предоставление широкой автономии провинциям, которые с трудом могут переварить привязку к Пекину. В самой максимальной форме идеализма он стремился бы полагаться на «Хороших людей» для добросовестной службы, но Тан Цзияо слишком хорошо знает судьбу «Хороших людей». Сильное государство, сильное правительство — вот единственное, что способно сбалансировать нацию."

 YUN_mastering_beiyang_politics: "Освоение политики Бэйяна"
 YUN_mastering_beiyang_politics_desc: "Многое можно сказать о состоянии дел политики Бэйяна, но если одно точно: чтобы рыскать в логове Тигра, вам нужны союзники. И слишком стремясь смотреть на центральную объединяющую фигуру, Младокитайская партия, среди других групп интересов, открылась для авансов со стороны Тана. Вместе нация будет сильной, устойчивой и больше не будет игрушкой других великих держав."

 YUN_bearing_our_fathers_torches: "Нести факелы наших отцов"
 YUN_bearing_our_fathers_torches_desc: "Это был долг, возложенный на нас нашими предками, чтобы китайская нация стала сильнее. Тайянь, Сунь Ятсен, Цичао, их политика, возможно, спорная, но никто не может сомневаться в их патриотизме. И поэтому долг каждого китайского гражданина, какого бы происхождения, какой бы профессии он ни был, нести с собой факел нашего коллективного наследия и маршировать вперед в новую эру процветания."

 YUN_cai_es_champion: "Чемпион Цай Э"
 YUN_cai_es_champion_desc: "Нет более великого человека с таким резонансным влиянием на жизнь Тан Цзияо, чем Цай Э. Именно Цай Э наставлял Тана в управлении государством. Именно Цай Э полагался на Тан Цзияо и доверял ему. И именно Цай Э защищал нацию в ее самый темный час. Возможно, если бы он не умер рано, именно Цай Э был бы на этой самой позиции. Аполитичный Первый среди равных, он выступал против политических партий. Тан может только надеяться, что он гордится."

###- KMT Political Tree -###
 YUN_resurgence_of_the_kuomintang: "Возрождение Гоминьдана"
 YUN_resurgence_of_the_kuomintang_desc: "С результатом Противостояния Дянь-Цянь в виде решительной победы Гоминьдана Гуйчжоу, такие люди, как Тан Цзияо и его федералистские кадры, были изгнаны из провинции. С целью стабилизации правления Гоминьдана и освобождения Юньнани от хватки милитаристов, [ROOT.GetLeader] решил ухаживать за различными интеллектуалами Юньнани, к черту споры."

 YUN_hope_in_defeat_meaning_in_despair: "Надежда в поражении, смысл в отчаянии"
 YUN_hope_in_defeat_meaning_in_despair_desc: "Потерпев почти полное уничтожение от рук милитаристов и иностранных империалистов, многие считали наше движение умирающим, рассеивающимся. Просто шатающийся труп, слишком упрямый, чтобы умереть. Но в нашем отчаянии мы размышляли. В нашем изгнании мы обдумывали свои недостатки. В нашем поражении мы возродились, новая надежда для нации."

 YUN_mobilisation_of_the_soul: "Мобилизация души"
 YUN_mobilisation_of_the_soul_desc: "Чтобы вернуть материальность традиционных ценностей, партия должна предпринять духовную трансформацию, управляя моралью, привычками, мыслями и амбициями китайского народа. Чтобы по-настоящему мобилизовать волю народа и помочь в строительстве нового Китая, мы будем одновременно призывать и принуждать китайский народ ради блага страны."

 YUN_dealing_with_yunnans_establishment: "Взаимодействие с истеблишментом Юньнани"
 YUN_dealing_with_yunnans_establishment_desc: "Хотя на поверхности администрация Юньнани полностью изменилась, и Белое Солнце сияет на всех проспектах, под миражом продолжается сама основа юньнаньского общества. Хотя они так же неохотно присоединяются к нашему делу, как Лун Юнь или Ху Жоюй, старая знать и бюрократия остаются скептически настроенными по отношению к партии, и пришло время решить их судьбу."

 YUN_scientific_management: "Научное управление"
 YUN_scientific_management_desc: "В вечной погоне за прогрессом партийное государство должно работать над тейлоризацией повседневного поведения граждан, поскольку величайшая борьба за национальное выживание ведется в библиотеках, лабораториях и мастерских, наши люди должны вовремя посещать собрания, быстро выполнять задачи, сокращать время, потраченное впустую на бесполезные легкомысленные дела. Этим мы гарантируем возрождение новой китайской культуры."

 YUN_contact_the_ZSRC: "Связаться с нашими товарищами в Чжэцзяне"
 YUN_contact_the_ZSRC_desc: "Поскольку Центральные клубы навсегда останутся неуловимой кликой в партии, неудивительно, что они поддерживают связи с более гнусными членами китайского общества. Под эгидой «Общества революционных товарищей Чжэцзяна» братья Чэнь и Дай Цзитао смогли использовать свои связи с Зелеными бандами, чтобы помочь революции."

 YUN_cult_of_violence: "Культ насилия"
 YUN_cult_of_violence_desc: "Среди партии лежит много противоречий, однако одно из самых тревожных — это положения против насилия в обществе. Хотя якобы убийство и подобные инструменты являются тяжкими преступлениями в современной правовой системе, уважаемой партией. Одновременно Гоминьдан видит великую способность, которой обладают такие преступные акты. При правильном использовании само насилие может быть применено таким образом, чтобы служить отличным дисциплинарным инструментом для масс."

 YUN_utilisation_of_the_youth: "Использование молодежи"
 YUN_utilisation_of_the_youth_desc: "В Юньнани находится большой рассадник студенческих радикалов в ее интеллектуальных учреждениях. Желая удержать студентов в кампусе и вне администрации, такие люди не могут по-настоящему увидеть полную полезность молодых масс. Через применение форм молодежного активизма, таких как скаутинг, мы можем продвигать послушание, волонтерство и самосовершенствование среди будущих поколений Китая."

 YUN_awaken_the_sleeper_cells: "Пробуждение спящих ячеек"
 YUN_awaken_the_sleeper_cells_desc: "Некогда охватывавший такие провинции, как Хунань, Гуанси, Гуандун, Фуцзянь и Цзянси, со связями в далеко идущих провинциях, Гоминьдан все еще поддерживает многочисленных бывших солдат, государственных служащих и другие связи в этих разрозненных провинциях. Возобновляя наши связи с нашими своенравными союзниками, мы можем получить столь необходимые разведданные об администрациях и армиях внешних провинций."

 YUN_lighting_the_match: "Зажигание спички"
 YUN_lighting_the_match_desc: "Чтобы маршировать на север из нашего бастиона в Юньнани, крайне важно, чтобы либо мы сами, либо наши союзники контролировали Сияющую Жемчужину Юга. Ибо с Гуандуном дом революции партии может снова послужить колыбелью для Северного похода. В конце концов, национальное объединение — это единственная цель, которой должно быть подчинено все остальное, и Национально-революционная армия должна полностью посвятить себя таким действиям."

 YUN_hold_a_national_congress_focus: "Проведение Национального конгресса"
 YUN_hold_a_national_congress_focus_desc: "С безопасным Гуанчжоу у нас есть необходимая легитимность для проведения Национального конгресса Гоминьдана, объединяющего разрозненные правые фракции партии в сплоченное революционное правительство. Последующая задача построения работающего партийного государства будет непростой; остается много разногласий между различными крыльями партии. Кто выйдет победителем в этих политических играх, остается открытым вопросом."

 YUN_developing_the_civilian_party: "Развитие гражданской партии"
 YUN_developing_the_civilian_party_desc: "Основа национализма — этика сыновней почтительности. Основа демократии — этика доверия и праведности. Основа народного благосостояния — этика доброжелательности и мира. Теперь, когда партия прочно восстановилась в своей родной провинции Гуандун, пришло время приступить к осуществлению Национальной революции."

 YUN_western_expedition: "Западный поход"
 YUN_western_expedition_desc: "Как провозгласил доктор Сунь Ятсен еще в 1915 году, крайне важно, чтобы внутренние районы Китая были защищены от антагонистических сил, прежде чем маршировать на эти вероломные внешние силы. Дом для многих, кто выступает против Национально-революционной армии и Партийного государства, расширенные владения милитаристов, занимающие гористую внутреннюю часть, должны быть уничтожены."

 YUN_eastern_expedition: "Третий Восточный поход"
 YUN_eastern_expedition_desc: "С дебютом Национально-революционной армии десять лет назад с Первым и Вторым Восточными походами на территорию, удерживаемую Чэнь Цзюнмином в Восточном Гуандуне и Фуцзяни, казалось бы, снова дом революции находится под угрозой. С учетом значительного вакуума власти, созданного крахом Лиги, крайне важно воспользоваться возможностью занять Нанкин."

 YUN_return_of_the_northern_expedition: "Возвращение Северного похода"
 YUN_return_of_the_northern_expedition_desc: "Навсегда разделенная по линии Север-Юг, китайская нация имеет долгую историю вечной борьбы между своим революционным югом и автократическим севером. Признанная доктором Сунем в его призыве к Северному походу в 1920-х годах, первоначальная попытка Гоминьдана была обречена на провал. Однако с восстановленными силами, омоложенными войсками, людьми со стальными сердцами, время нанести удар на север настало!"

 YUN_expelling_national_traitors: "Изгнание национальных предателей"
 YUN_expelling_national_traitors_desc: "Долгое время оспариваемая русскими, маньчжурами и японцами, истинными владельцами Маньчжурии являются не кто иной, как китайское национальное государство. Став интегрированным после установления династии Цин, Дунбэй, как его называют, является неотъемлемой частью нации. Больше им не будут править предатели, прогибающиеся под прихоти Японии!"

 YUN_enacting_tutelage_of_the_masses: "Введение опеки над массами"
 YUN_enacting_tutelage_of_the_masses_desc: "Однопартийное правление не означает просто захват существующего государства. Нет, партия также должна взять на себя «пророческую» роль в обращении людей к Трем принципам. Кадры должны рисковать своей жизнью, распространяя революционное евангелие, а не формировать просто новый набор бюрократической номенклатуры. Наша революция — народная, борющаяся против материализма и коррупции."

 YUN_establishing_a_central_political_school: "Создание Центральной политической школы"
 YUN_establishing_a_central_political_school_desc: "Провозглашенная как «Центральная академия партийных дел», институция вращается вокруг четырехлетней академической программы с упором на социальные науки, подстегиваемая коварным Центральным клубом. Как провозгласили братья Чэнь, нация сегодня страдает от обширного недуга компетентных администраторов, и для построения нации завтрашнего дня нам понадобится новое поколение."

 YUN_educating_our_officers: "Образование наших офицеров"
 YUN_educating_our_officers_desc: "Травестия среди многих, многочисленные офицеры, которые присоединились к нашим рядам либо через ассимиляцию, либо иным образом, — это люди, опытные в военной области, но не более того. Выбирая новое поколение классов для дальнейшего обучения и улучшая наши учреждения, мы можем просветить наших офицеров во всех добродетелях интеллекта."

 YUN_ensuring_public_safety: "Обеспечение общественной безопасности"
 YUN_ensuring_public_safety_desc: "Сильно оспариваемым различными фракциями Гоминьдана является вопрос нашего разведывательного агентства и полиции. Созданное Ли Шичжэнем, «Отцом китайской полиции», он инициировал «Кантонское бюро общественной безопасности», основанное на американской модели полицейской деятельности. В конечном итоге надеясь действовать как центр для всех будущих полицейских усилий в Китае."

 YUN_revolutionary_shock_troopers: "Революционные ударные отряды"
 YUN_revolutionary_shock_troopers_desc: "Наши солдаты не должны быть просто вооружены артиллерией и винтовкой, ибо они являются первыми копьями в распространении Национальной революции среди разрозненного населения. Со своим вооружением они должны нести вперед натиск идеалов Трех принципов, и через обширные усилия по просвещению они будут приверженными и идеологически убежденными."

 YUN_a_cultural_revival: "Культурное возрождение"
 YUN_a_cultural_revival_desc: "В конечном счете, фундаментом нашего нового Революционного Китая является аналогичный фундамент ядра нации. Конфуцианство и китайская «Родная культура» — два краеугольных камня партии, являющейся хранителем китайской морали. Через продвижение корпоративистского конфуцианства, как проповедует Дай Цзитао, партия может объединить как индустриальную современность, так и китайские традиции."

 YUN_attract_nationalist_technocrats: "Привлечение националистических технократов"
 YUN_attract_nationalist_technocrats_desc: "Возможно, по большой глупости или грубости, наш уважаемый доктор Сунь довольно неудачно увещевал или отбросил великое море многообещающих членов партии Гоминьдан, видя в их либерализме признаки карьеризма или оппортунизма. Когда Тунмэнхой был преобразован в Гоминьдан в 1912 году, эти люди отвернулись от нас. Давайте еще раз протянем руку, ради патриотизма."

 YUN_our_nation_supreme_and_sacred: "Наша нация, высшая и священная"
 YUN_our_nation_supreme_and_sacred_desc: "Китайская нация уникальна. Возвышаясь над всем остальным с точки зрения истории, вклада и культуры. Единственный долг китайского народа — обязаться защищать национальные интересы. Через контроль религии, образования, искусства, прессы, экономики и всех других аспектов их повседневной жизни партия может оживить положение нации в мире."

 YUN_concern_for_the_rural_masses: "Забота о сельских массах"
 YUN_concern_for_the_rural_masses_desc: "В конечном счете, чтобы собрать достаточную народную поддержку для борьбы с милитаристами, федералистами и империалистами, сама армия должна продемонстрировать свою способность заботиться о китайском населении, будь то крестьянин или рабочий. Поддерживаемая такими людьми, как Чэнь Чэн и его Клика гражданского строительства, серия местных земельных инициатив будет иметь место для поднятия народных настроений."

 YUN_mobilisation_of_the_nation: "Мобилизация нации"
 YUN_mobilisation_of_the_nation_desc: "Никогда больше китайцы не будут обязаны вторжениям иностранного империализма или господству милитаристских автократов. Обязав крестьян вступать в сообщества типа ополчения и приобретать навыки стрельбы, публичных выступлений и владения военными сигналами, мы можем создать полностью самодостаточное общество. Ибо нерациональному обществу не хватает жизненной силы в его духе."

 YUN_the_way_of_the_youth: "Путь молодежи"
 YUN_the_way_of_the_youth_desc: "Опубликованный Дай Цзитао, «Путь для молодежи» описывает, с помощью чего будущие китайские поколения могут вести нацию к надлежащему спасению и современности. Только через продвижение национальной мобилизации, а не сладкой лжи дьявольского социализма, китайский народ и национальное государство могут процветать."

 YUN_kuomintangising_the_southwest: "Гоминьданизация Юго-Запада"
 YUN_kuomintangising_the_southwest_desc: "Несмотря на давние республиканские убеждения с самых ранних дней Куньминской военной академии, учрежденной Ли Гэньюанем, Гоминьдан никогда по-настоящему не имел сильной позиции в провинции Юньнань. Влияние, возможно, но вряд ли режим Гоминьдана, напоминающий современную партию. Теперь, запертые в провинции, мы должны попытаться продемонстрировать добрую волю Партии."

 YUN_cleaning_out_the_rot_and_decadence: "Очистка от гнили и декаданса"
 YUN_cleaning_out_the_rot_and_decadence_desc: "Невероятно дисфункциональное плохое управление администрацией Юньнани Тан Цзияо и его местными феодалами породило культуру коррупции в провинции. Построенная на личном удовлетворении в отличие от национального блага, бандиты и торговцы свирепствуют, и в нашей спешке обеспечить возвращение Партии в Гуанчжоу мы мирились с таким положением дел. Больше нет."

 YUN_humbling_the_kingmakers: "Смирение творцов королей"
 YUN_humbling_the_kingmakers_desc: "Расположенные в своих местных феодальных владениях и гарантированные влиянием Ху Жоюя, остатки предыдущей Юньнани продолжают упорствовать вопреки режиму Гоминьдана. Хотя они вовлечены в неловкое, но взаимовыгодное соглашение, ясно, что такая ситуация не может продолжаться. Однако до этого момента знать остается укоренившейся, и мы можем, по крайней мере, использовать их силу для прогресса."

 YUN_incentivising_the_enlightenment: "Стимулирование просвещения"
 YUN_incentivising_the_enlightenment_desc: "Без образовательных центров нации мы не можем надеяться на ее процветание и модернизацию, и все же такие учреждения отошли на второй план, поскольку провинциальные милитаристы сосредотачиваются гораздо больше на достижении военных целей, чем на общественных. Чтобы исправить такую ошибку, давайте выделим значительную сумму финансирования на развитие новой эры просвещения в нации."

 YUN_relief_to_the_laobaixing: "Облегчение для Лаобайсин"
 YUN_relief_to_the_laobaixing_desc: "Поскольку Гоминьдан теперь закрепился в провинции Юньнань, мы не можем просто продолжать предоставлять импровизированные и ситуативные решения потребностей людей. Простолюдины оплакивают свое положение и требуют какой-то компенсации, какого-то прогресса и освобождения в своей жизни. Под руководством левых влияний внутри партии давайте облегчим и возвысим обычный пролетариат."

 YUN_two_model_zhus: "«Два образцовых Чжу»"
 YUN_two_model_zhus_desc: "Построенные на фундаменте их названого братства с ранних дней Куньминской военной академии, «Два образцовых Чжу» — Чжу Пэйдэ и Чжу Дэ — получили такое прозвище благодаря их выдающейся деятельности и доблестной службе в Юньнаньской армии и Академии. Поддерживая прочное взаимопонимание со времен их учебы, Два Чжу способствовали принятию левого влияния в правом крыле партии."

 YUN_rallying_the_legacy_of_the_southwest: "Сплочение наследия Юго-Запада"
 YUN_rallying_the_legacy_of_the_southwest_desc: "Долгое время Куньмин прыгал выше головы в национальных делах. Считавшаяся нищей внутренней провинцией, ориентированной на поддержание китайских интересов в Индокитае и Бирме, в отличие от вмешательства в дела Пекина, Юньнань постоянно удивляла своих недоброжелателей. Такой дух не покинул Куньмин, нет! Ибо в Национальной революции мы послушно служим для поддержания ее основ."

 YUN_a_combined_political_military_offensive: "Политико-военное наступление"
 YUN_a_combined_political_military_offensive_desc: "С объединением Гоминьдана с Китайской синдикалистской партией в Объединенном фронте 1924 года между братскими партиями развилось революционное сестринство. Несмотря на это, однако, радикалы в КСП культивируют определенную атмосферу антагонизма с ГМД, особенно в Юньнани. Направляя наступление из 70% политических и 30% военных усилий, мы можем остановить красную волну синдикализма."

 YUN_contacting_the_yunnan_labour_unions: "Связь с профсоюзами Юньнани"
 YUN_contacting_the_yunnan_labour_unions_desc: "Собственное синдикалистское профсоюзное движение Юньнани долгое время было развивающимся бутоном на клумбе. Медленно взращиваемое пылким республиканизмом и тяжелыми условиями предыдущих администраций Юньнани наряду с влиянием Партии, оно выросло в силу, с которой нужно считаться на провинциальной сцене. С нашими взаимными связями и дружбой с КСП давайте наладим позитивные отношения с профсоюзами Куньмина."

 YUN_our_part_in_the_national_revolution: "Наша часть в Национальной революции"
 YUN_our_part_in_the_national_revolution_desc: "Мы всего лишь инструментальная часть головоломки в более широком продвижении революционных идеалов доктора Суня, и все же мы не можем оставаться в стороне, пока враги Белого Солнца растут в силе и мощи. Все должно быть отправлено вперед к Центральному комитету, чтобы помочь знаменосцам Гоминьдана в их отвоевании и объединении нации."

 YUN_throwing_ourselves_in_the_ring: "Бросаясь на ринг"
 YUN_throwing_ourselves_in_the_ring_desc: "Травестия снова поразила Гоминьдан! В то время как Центральный комитет мог быть побежден, самые верные сыновья и дочери Белого Солнца продолжают мчаться к окончательной победе. Яростно отстаивая идеалы Национальной революции и Трех принципов, мы не допустим, чтобы еще один Великий поход случился когда-либо снова. Чтобы предотвратить такой кошмар, пришло время для [ROOT.GetLeader] перейти в наступление."

 YUN_directing_the_flames_of_revolution: "Направление пламени революции"
 YUN_directing_the_flames_of_revolution_desc: "Центральный комитет в последнее время становится довольно самодовольным. Хотя мы разделяем взаимную любовь, обожание и желание видеть объединение нации, они, тем не менее, считают уместным почивать на лаврах. То, что Партия и Национально-революционная армия требуют сейчас больше всего на свете, — это решительные действия! Давайте напомним Комитету об их революционном долге."

 YUN_form_the_southwest_china_political_council: "Формирование Юго-Западного политического совета Китая"
 YUN_form_the_southwest_china_political_council_desc: "Признавая власть Центрального комитета в основных политических вопросах, нельзя сбрасывать со счетов влияние и власть Куньмина в Национальной революции и шаги, предпринятые для ее достижения до сих пор. Через силу Юньнани и Гуйчжоу Юго-Запад доблестно служил Гоминьдану во всех начинаниях. Несомненно, весь Юго-Запад последует за ним."

 YUN_a_revolutions_sole_visionary: "Единственный провидец революции"
 YUN_a_revolutions_sole_visionary_desc: "Без жертв Национально-революционной армии в выполнении Национальной революции, как можно было бы вообще увидеть, как мечта доктора Суня осуществится? Никто не знает этого лучше, чем Третья армия, стойкие лоялисты Партии, которые оставались на своем долгу и службе еще до основания НРА. Только они могли, возможно, представить будущее без проблемного ребенка Вампу."

 YUN_a_business_utopia_in_the_southwest: "Бизнес-утопия на Юго-Западе"
 YUN_a_business_utopia_in_the_southwest_desc: "Многие из предприимчивых бизнесменов и предпринимателей Китая наверняка предпочли бы городские метрополии Шанхая, Шэньяна, Пекина, Нанкина, Гуанчжоу или даже Гонконга, и все же учтивые и смекалистые технократы Политической науки всегда обладают благоразумным знанием и харизмой, чтобы снискать расположение своих сообщников в финансах."

 YUN_a_new_deal_with_political_science: "Новый курс с политической наукой"
 YUN_a_new_deal_with_political_science_desc: "Известная под многими прозвищами, такими как Общество строительства Нового Китая, Новая клика политической науки получила последнее признание как «Департамент Нового курса». Ссылаясь на общее представление итерации Политической науки Чжан Цюня как этого нового поколения либералов, синтезирующихся с бюрократами старого стиля, политиками, интеллектуалами и знаменитостями, оптимизм изобилует под их экономическим управлением."

 YUN_returning_to_the_revolutions_root: "Возвращение к корням революции"
 YUN_returning_to_the_revolutions_root_desc: "Гоминьдан был прежде всего движением, рожденным из желаний и писаний интеллектуалов трансформировать и перевести свою любимую нацию от декадентской династии к лучезарному будущему. Через возрастающие испытания и невзгоды казалось бы, что Партия потеряла свои основы, теряя свой блеск среди интеллектуалов. Протягивая руку величайшим мыслителям Китая, мы можем восстановить наши ранее тесные связи."

 YUN_calling_on_shanghai_finance: "Призыв к шанхайским финансам"
 YUN_calling_on_shanghai_finance_desc: "Хотя Шанхай является убежищем для мошенников и гангстеров, он остается одним из оплотов революции, даже несмотря на подавление Шанхайского восстания. С биржевыми маклерами и революционными связями с Зелеными бандами, построенными на фундаменте шанхайских братьев Гоминьдана Чэнь Гофу и Чэнь Лифу, давайте воспользуемся их обширными сетями для финансирования Национальной революции."

 YUN_expanding_kunming_university: "Строительство Куньминского университета"
 YUN_expanding_kunming_university_desc: "С постоянно растущими требованиями к сектору образования правительственной администрации, Куньминская нормальная школа, возможно, достигла своего предела, чтобы взращивать новое поколение мыслителей и рабочих Юньнани. Расширяя ее кампус и строя дополнительные факультеты и учреждения, мы превратим Куньмин в интеллектуальный центр на Юго-Западе для поколений."

 YUN_kicking_up_the_whirlwind: "Поднимая вихрь"
 YUN_kicking_up_the_whirlwind_desc: "Возможно, многие сочтут, что мы играем вторую скрипку перед большими амбициями Центрального комитета, однако даже [ROOT.GetLeader] и провинциальное отделение Гоминьдана могут дергать за правильные рычаги и шкивы внутри Центральных органов Партии, чтобы обеспечить возникновение предпочтительных влияний. Используя взаимные связи и контакты, Юньнань покажет зубы даже на более широком политическом поле битвы."

 YUN_challenge_the_false_pretenders: "Вызов ложным претендентам"
 YUN_challenge_the_false_pretenders_desc: "Слишком долго Центральный комитет злоупотреблял народом и его доверием, беря так много, но давая так мало взамен. Ни стабильности, ни чашки риса, даже ни одного из своих революционных обещаний или защиты от милитаристов и империалистов. Вокруг нас угасающая надежда на Национальную революцию Китая продолжает прогрессировать. Чтобы предотвратить полную отмену нашей революционной миссии, мы должны совершить самый тяжкий грех..."

 YUN_seizing_the_revolution: "Захват революции"
 YUN_seizing_the_revolution_desc: "В конечном счете знамена Правого Гоминьдана упали на обочину, будь то из-за нашего собственного влияния или другого. Хотя благородный в своих усилиях как самый прилежный ученик доктора Суня, Ху Ханьминь в конечном итоге приковал себя к регионалистам и милитаристам, которые видели бы революцию разорванной на части. Теперь, с кончиной старого Центрального комитета, должен возникнуть новый, правильный Гоминьдан."

 YUN_bringing_sanmin_to_the_masses: "Донесение Саньминь до масс"
 YUN_bringing_sanmin_to_the_masses_desc: "Китайский народ так долго страдал под властью милитаристов и империалистов, что очень немногие интерпретируют или понимают собственный режим Гоминьдана как что-то новое; рассматривая Партию просто как систему Бэйян в революционной краске. Если мы хотим быть серьезными и искренними, мы должны подходить к людям на общих условиях, не как деспоты, господствующие над ними, а как твердая рука, стремящаяся к их освобождению."

 YUN_enforcing_guiyangs_compliance: "Принуждение Гуйяна к соблюдению"
 YUN_enforcing_guiyangs_compliance_desc: "Продолжаясь десятилетиями, судьба Гуйчжоу давно прикована к судьбе Юньнани. Хотя существовали клики Гуйчжоу сами по себе, которые предпочли бы уклониться от Короля Юго-Запада, в конечном итоге география и близость так или иначе привязали их к Куньмину. Чтобы обеспечить единую нацию, отчуждение между Цянь и Дянь должно закончиться, ибо нация объединяет нас всех."

 YUN_eject_the_wayward_despots: "Изгнание своенравных деспотов"
 YUN_eject_the_wayward_despots_desc: "Наши битвы идут тяжело, наша кампания беспощадна, и наши солдаты стремятся сражаться, даже когда их офицеры изрешечены градом пуль. И все же мы должны идти вперед! Всегда вперед к полной победе! Ибо нация не может успокоиться и не может быть объединена, пока деспоты не будут свергнуты и ответственное управление не будет восстановлено!"

YUN_summoning_the_spirit_of_the_people: "Призыв к духу народа"
 YUN_summoning_the_spirit_of_the_people_desc: "По правде говоря, мы не одиноки в борьбе против тиранов и революционных автократов, которые хотели бы видеть Национальную революцию, захлебнувшуюся в своей собственной бессмысленной ярости. По всей стране дух народа оплакивает навязанную ему несправедливость. Мы должны лишь постараться захватить их сердца нашим делом."

 YUN_heir_to_the_national_construction_army: "Наследник Армии национального строительства"
 YUN_heir_to_the_national_construction_army_desc: "Наша главная сила, Третья армия Национально-революционной армии, обязана своим истинным происхождением наследию Войн в защиту республики и героям Юньнаньской армии в Гуандуне. Превратившись из Второй Хугоцзюнь в Цзяньго Дяньцзюнь, а затем в Третью армию, она перенесла дух своих предшественников в новую эпоху."

 YUN_heeding_the_call_of_revolution: "Внимая зову революции"
 YUN_heeding_the_call_of_revolution_desc: "Эта война вызвана не просто ностальгией по ушедшей эпохе или нерешительностью перед лицом насильственной природы революции нации. Это народная война против системы, которая вышла из-под их контроля, война против самих сил энтропии! Все должны восстать и внять зову истинного Белого Солнца, ибо на кону судьба самой нации."

 YUN_policy_of_yunnans_thermidor: "Политика Юньнаньского Термидора"
 YUN_policy_of_yunnans_thermidor_desc: "Радикалы в Гоминьдане слишком долго доминировали у штурвала Национальной революции, и при всех их мнимых триумфах китайской нации это принесло лишь руины. Чтобы восстановить стабильность в китайской нации, Юньнань должна взять на себя роль, которую Цай Э возложил на нее все эти годы назад."

 YUN_disseminating_our_message: "Распространение нашего послания"
 YUN_disseminating_our_message_desc: "Наш смелый акт неповиновения не мог бы осуществиться без наших связей с деловым миром, журналистами и нашими храбрыми соотечественниками по ту сторону, которые продолжают отстаивать наше дело. Пока мы сосредотачиваемся на военных действиях для подкрепления наших требований, давайте выделим ресурсы на их усилия, чтобы завоевать и гражданские сердца."

 YUN_last_hurrah_of_the_model_erzhu: "Последнее ура образцового Эрчжу"
 YUN_last_hurrah_of_the_model_erzhu_desc: "Достигла бы Партия нынешних высот без [ROOT.GetLeader]? Была бы нация так близка к национальному объединению без [ROOT.GetLeader]? И все же, кажется, что этот образцовый Эрчжу обречен встретить свой конец. Пока Юго-Запад еще ревет, давайте держаться до горького конца!"

###- KMT Endgame Tree -###

#CCC Endgame - Dai Jitao and Chen Lifu
 YUN_awakening_of_the_new_right: "Пробуждение Новых правых"
 YUN_awakening_of_the_new_right_desc: "Осажденный со всех сторон неэффективными бюрократами, контрреволюционерами, предателями-социалистами и другими коррумпированными и дегенеративными элементами партийного распада, Китайский Гоминьдан долгое время чувствовал, как его революционные волокна рвутся по швам теми, кто стремится к его уничтожению. Именно под руководством уважаемого Дай Цзитао Партия будет стремиться к чистой истинной реорганизации."

 YUN_rein_in_the_generals: "Обуздать генералов"
 YUN_rein_in_the_generals_desc: "С момента восхождения президента Дай Цзитао и его нового реорганизованного правительства Гоминьдана в рядах Национально-революционной армии распространились беспорядки, поскольку сторонники бывшего генералиссимуса Хэ Инциня требуют его возвращения в национальную политику. Чтобы развеять слухи о нестабильности правительства и потенциальном военном перевороте, мы будем стремиться ограничить их власть и влияние в национальной политике."

 YUN_press_on_with_nationalisation: "Продолжать национализацию"
 YUN_press_on_with_nationalisation_desc: "Турбулентность после поражения Клики Вампу и восхождения президента Дай Цзитао и премьера Чэнь Гофу привела к тому, что многие иностранные инвесторы вывели свои вложения, и к общему экономическому спаду по всей стране. В соответствии с принципами Миньшэна президент распорядился принять исполнительные меры для продолжения процесса национализации с целью создания самодостаточной экономики."

 YUN_the_singular_organ_of_economic_society: "Единый орган экономического общества"
 YUN_the_singular_organ_of_economic_society_desc: "Забота о нации требует представить национальное государство как тело — с мозгом и глазами, направляющими курс великой Республики. Чтобы направить и контролировать всю экономическую деятельность способами, которые являются продуктивными и полезными для национальной реконструкции, мы будем стремиться объединить профсоюзы и организации под коллективным управлением, чтобы способствовать истинному классовому сотрудничеству."

 YUN_dismantle_reactionary_degeneracy: "Демонтаж реакционного вырождения"
 YUN_dismantle_reactionary_degeneracy_desc: "Так называемые администраторы и бюрократы бывшего коррумпированного режима Бэйян наряду с либеральными фракциями из и вне Гоминьдана должны быть устранены, так как их присутствие бросает реакционную тень на природу и курс революции. Если мы продолжим позволять этому яду гноиться и расти, это, несомненно, приведет к коррупции и уничтожению революции, за достижение которой мы так усердно боролись."

 YUN_purify_the_party_organ: "Очистить партийный орган"
 YUN_purify_the_party_organ_desc: "Примеси должны быть очищены, общество должно приблизиться к идеальному совершенству, которое представляли великие мудрецы древности, такие как Конфуций. Во времена беспорядка, почему мы должны продолжать позволять этим несовершенствам задерживать и обескураживать национальную революцию? Только очистив партию и избавив ее от контрреволюционных дегенератов, мы сможем обеспечить естественное развитие революции."

 YUN_the_scourge_of_marxism: "Бич марксизма"
 YUN_the_scourge_of_marxism_desc: "С момента своего прибытия к берегам Китая марксизм не принес ничего, кроме контрреволюционных и коррумпированных империалистических мыслей, присланных из-за рубежа социал-империалистическими нациями Британии и Франции. Слова Маркса не резонируют с традиционной эстетикой китайского политического этоса, а скорее не порождают ничего, кроме борьбы и разобщенности между классами."

 YUN_the_way_for_the_youth: "Путь для молодежи"
 YUN_the_way_for_the_youth_desc: "В настоящее время юноши и девушки тратят свои жизни впустую, потакают бессмысленной роскоши и занимаются бесплодными амбициями — полностью лишенными каких-либо революционных чувств. Если революция должна продолжать развиваться, она должна быть под руководством и в авангарде Партии, чтобы учить и направлять молодежь нации, готовить и тренировать себя, чтобы стать истинными распорядителями Китайской национальной революции доктора Суня."

 YUN_rehabilitate_the_general_staff: "Реабилитация Генерального штаба"
 YUN_rehabilitate_the_general_staff_desc: "Хотя мы, возможно, выступали против клики военных олигархов и псевдо-милитаристов Хэ Инциня, мы также понимаем, что революция не могла бы быть выиграна, если бы не жертвы и достижения Национально-революционной армии Вампу. Поскольку армия отныне будет поставлена под контроль Национального правительства, мы будем стремиться помиловать и амнистировать наших товарищей по революции."

 YUN_preliminary_plan_for_education: "Предварительный план реформы образования"
 YUN_preliminary_plan_for_education_desc: "В этой стране слишком много нетерпеливых молодых студентов тяготеют к ненужным предметам права и гуманитарных наук, в то время как истинная модернизация начинается с учебной программы, сосредоточенной на инженерных и технических областях. Если мы хотим превратить молодежь нашей страны в новый оплот революции, крайне важно реформировать школы и университеты для пропаганды учебной программы, которая принесет пользу новому современному китайскому государству."

 YUN_restore_social_harmony: "Восстановление социальной гармонии"
 YUN_restore_social_harmony_desc: "Успех национальной революции зависит не от блестящего руководства президента Дая и его премьера Чэнь Гофу, а скорее от коллективного утверждения гармоничных ценностей, выраженных мудрецами Конфуция. Мы должны отвергнуть гедонистический индивидуализм даосизма и принять коллективное общество; таков естественный прогресс человечества, чтобы все под небесами принадлежало всем."

 YUN_create_the_chinese_engineering_society: "Создание Китайского инженерного общества"
 YUN_create_the_chinese_engineering_society_desc: "В рамках продолжающихся усилий по Национальной реконструкции, получивший образование в Америке инженер Чэнь Лифу создал программу из шестнадцати пунктов для Промышленной реконструкции, которую возглавит Китайское инженерное общество. Включая экспертов со всей страны, которые поклялись в верности и служении делу Гоминьдана, общество стремится помочь ускорить процесс китайской индустриализации под просвещенным руководством."

 YUN_expand_the_central_banking_system: "Расширение системы центрального банка"
 YUN_expand_the_central_banking_system_desc: "Несмотря на номинальное национальное объединение, процесс объединения страны под одной валютой в новой Республике все еще остается серьезной проблемой. По указанию Центрального комитета правительство должно расширить систему центрального банка и поощрять принципы государственного капитализма, чтобы избежать иностранных займов и искать лучшие торговые и инвестиционные сделки, чтобы Китай мог наконец подняться из цепей империализма."

 YUN_control_the_means_of_media: "Контроль средств массовой информации"
 YUN_control_the_means_of_media_desc: "Человек всегда будет любопытен, но люди знают лучше, когда им показывают только правду. По указанию Центрального комитета усилия по национальному вещанию в рамках Центральной вещательной системы Китая должны быть увеличены — с большим акцентом на национальную и патриотическую музыку и новости для сплочения китайского народа и укрепления принципов национализма."

 YUN_one_doctrine_one_party: "Одна доктрина, одна партия"
 YUN_one_doctrine_one_party_desc: "Гоминьдан — любимое детище покойного революционера и вечного премьера партии доктора Сунь Ятсена, но с момента краха Северного похода он стал отвратительной тенью самого себя. Проникнутый контрреволюционными либералами, социалистическими агитаторами и милитаристами, мы должны продолжать утверждать, что доктрина Дай Цзитао действительно является правильным средством для возрождения Национальной революции."

 YUN_the_mother_of_enterprises: "Мать предприятий"
 YUN_the_mother_of_enterprises_desc: "Чтобы воскресить китайскую родину в ее былой славе, крайне важно использовать мать предприятий; то есть строительство новых и обширных сетей железных дорог, чтобы соединить великую нацию воедино. С железнодорожными сетями, наконец-то находящимися под китайским контролем, расширение китайских железных дорог улучшит торговлю, коммуникации и приведет к росту городов после многих лет крайней нищеты."

 YUN_organise_the_military_engineering_corps: "Организация Военно-инженерного корпуса"
 YUN_organise_the_military_engineering_corps_desc: "В рамках амбициозных усилий Китайского инженерного общества по расширению инфраструктуры и промышленности страны президент общества Чэнь Лифу приказал создать Военно-инженерный корпус. Эта организация в составе Национально-революционной армии сосредоточится на строительстве военной инфраструктуры, фортов и береговых оборонительных сооружений для укрепления национального государства."

 YUN_tend_to_the_national_beehive: "Забота о национальном улье"
 YUN_tend_to_the_national_beehive_desc: "Президент Дай Цзитао часто писал о нации как об аналогии улья. В улье пчелы знают свое место и не подвергают сомнению приказы — вместо этого они просто следуют за маткой. Они находят удовольствие в совместном использовании своих ресурсов, и внутри них нет борьбы, кроме единства. Именно в рамках этой доктрины китайский народ должен понять, что руководство Партии должно защищать и вести его к истинно революционному будущему."

 YUN_threading_the_needle: "Ювелирная работа"
 YUN_threading_the_needle_desc: "По мере того как президент Дай Цзитао начинает уходить на пенсию, его протеже, бывший секретарь ЦИК Чэнь Лифу, взойдет на пост президента Китайской Республики. С новым энергичным и решительным руководством, отвечающим за курс национальной революции, можно сравнить эффективность братьев Чэнь и их так называемой «CC-клики» в реорганизации и бюрократии с трудной задачей точного продевания нитки в иголку."

 YUN_human_engineering: "Человеческая инженерия"
 YUN_human_engineering_desc: "В то время как работа горного инженера — открывать и разрабатывать подземные ресурсы, администратор образования должен открывать и развивать человеческие ресурсы. В Америке работа в сфере образования часто называется «человеческой инженерией». Действительно возможно спроектировать и создать истинно современного китайского человека, того, кто обладает врожденными качествами как современного революционера, так и конфуцианского мудреца."

 YUN_the_doctrine_of_national_servitude: "Доктрина служения нации"
 YUN_the_doctrine_of_national_servitude_desc: "Марксизм пропагандирует необходимость классовой борьбы, но такая доктрина противоречит идеям доктора Сунь Ятсена и утопическому порядку, установленному учением Конфуция в его «Лунь юй». Мы должны принять концепцию продуктивного общества, общества, в котором понимается послушание, и в котором все работают рука об руку ради возрождения современной китайской нации."

 YUN_champion_the_national_dharma: "Отстаивание национальной Дхармы"
 YUN_champion_the_national_dharma_desc: "Хотя буддизм долгое время имел бурную историю как подъема, так и упадка в китайском обществе, нельзя отрицать, что буддизм укрепляет нацию, как это видно по успеху Реставрации Мэйдзи и антиколониальному восстанию Анагарики Дхармапалы на Цейлоне. Китай также должен направить эту концепцию национальной Дхармы и буддизма на развитие и укрепление морального характера нации."

 YUN_curtail_internal_disunity: "Пресечение внутренней разобщенности"
 YUN_curtail_internal_disunity_desc: "Презираемый и рассматриваемый как радикальный идеолог среди «Старых правых» Гоминьдана и как реакционер левыми, несмотря на его великую борьбу — именно президент Дай вышел победителем в возвращении революции доктора Суня на ее истинный путь и ориентацию. Несогласные голоса и громкие противники режима должны быть устранены и проблемы решены, чтобы мог начаться истинный прогресс и реорганизация."

 YUN_apostle_of_the_cultural_revolution: "Апостол культурной революции"
 YUN_apostle_of_the_cultural_revolution_desc: "В течение многих лет Дай Цзитао много писал и призывал Гоминьдан вернуться к своим истинным корням и принять возрождение для нового Китая, который прислушивается к своим традиционным ценностям и все же стремится к истинной антиимпериалистической современной революции. Как предвестник реакции, президент теперь выступает в качестве главного идеолога партии — истинного апостола учений покойного доктора Сунь Ятсена."

 YUN_cardinal_principles: "Четыре принципа и восемь добродетелей"
 YUN_cardinal_principles_desc: "Четыре кардинальных принципа (благопристойность, справедливость, честность и стыд) наряду с восемью добродетелями (сыновняя почтительность, лояльность, доброжелательность, гармония, любовь, правосудие, честность и мир) были давно забыты в этой стране, поскольку коррумпированные практики и верования увели людей в сторону. Пришло время Китаю пробудиться к своему традиционному прошлому и исправить ситуацию, чтобы будущие поколения знали."

 YUN_transfuse_western_sciences: "Внедрение западных наук"
 YUN_transfuse_western_sciences_desc: "Хотя духовные науки могут быть тем, в чем китайская цивилизация была экспертом в прошлые века, есть заслуга, если не прямая выгода, в принятии наук Запада без принятия их морального разложения. Западная модернизация и практики должны быть перелиты в самый кровоток китайской нации, чтобы позволить революционному сердцу биться еще быстрее."

 YUN_embrace_spiritual_sciences: "Принятие духовных наук"
 YUN_embrace_spiritual_sciences_desc: "Моральное разложение этой нации кроется в коррумпированных практиках западного морального характера, которые уничтожили и опустошили мораль и отношения. В эти времена хаоса и анархии крайне важно, чтобы мы искали руководства не в будущем, а в прошлом; нация от крестьянина до солдата должна стремиться следовать великим моральным принципам дней Цинь, чтобы возродить Чжунхуа."

 YUN_revitalise_filal_piety: "Возрождение сыновьей почтительности"
 YUN_revitalise_filal_piety_desc: "Это естественный цикл жизни, когда родители заботятся о своих детях, а когда они стареют — дети заботятся о своих родителях. Родители должны дисциплинировать своих детей любыми возможными способами как средство любви и роста, чтобы их дети научились уважать этот порядок. Через этот порядок мы можем родить общество, построенное на иерархии и порядке, возрождая социальную гармонию и прекращая классовую борьбу."

 YUN_towards_revolutionary_datong: "К революционному Датуну"
 YUN_towards_revolutionary_datong_desc: "Когда инженер хочет, чтобы пароход плыл, он включает двигатель; когда он хочет, чтобы двигатель остановился, он выключает двигатель. Именно под великим революционным руководством Китайская национальная революция будет стремиться к утопии, описанной не только Сунь Ятсеном, но и такими мудрецами, как Конфуций. Ибо именно Сунь истинно понимал и стал естественным преемником великого Конфуция в поиске Великого Единения (Датун) для всех."

#Whampoa Endgame - CEC, WPC, BSS
 YUN_whampoas_legacy_lives_on: "Наследие Вампу живет!"
 YUN_whampoas_legacy_lives_on_desc: "Кто был на стороне Партии с самого ее начала? Кто сражался и проливал кровь за Национальную революцию? Кто гарантировал, что мечта Отца нации не погибнет? Без Вампу Гоминьдан был бы несостоявшимся движением. Неспособным достичь чего-либо достойного внимания. Правя безраздельно без вероломных гражданских, студентам Академии предстоит заполнить большие пробелы."

 YUN_the_militarisation_of_education: "Милитаризация образования"
 YUN_the_militarisation_of_education_desc: "Поистине китайский народ не уважает и не ценит роль военного авангарда. Несмотря на все, что мы для них завоевали, они все еще видят в нас не более чем милитаристов, задрапированных в Белое Солнце. Превращая средние школы и университеты в учебные лагеря, мы привьем уважение к власти, навыки критического мышления, иностранные языки, науку и математику будущим поколениям Китая."

 YUN_preserving_social_order: "Сохранение социального порядка"
 YUN_preserving_social_order_desc: "Слишком долго хаос царил вечно. Поскольку предыдущие Центральные правительства не могли оказывать большого влияния за пределами своего прямого контроля, нация оставалась разобщенной. По крайней мере, до сих пор. Хотя люди все еще беспокойны, ибо они восстают против самих наших функций управления. Чтобы возродить Китай, мы должны выйти на улицы и восстановить порядок. Силой, если необходимо."

 YUN_the_fight_against_inflation: "Борьба с инфляцией"
 YUN_the_fight_against_inflation_desc: "Поистине катастрофическая, китайская экономика представляет собой жалкий лабиринт несчастий и обид. Несмотря на незначительные успехи, достигнутые в более процветающих прибрежных регионах, никто не мог противостоять влиянию, которое война за национальное спасение могла оказать на китайскую нацию. Несмотря на то, что они милитаристы, Клика Вампу определенно не слепа экономически. Люди страдают, и мы должны быть их спасением."

 YUN_disciplined_men_of_action: "Дисциплинированные люди дела"
 YUN_disciplined_men_of_action_desc: "Прежде всего, миссия Гоминьдана — современный, процветающий и передовой Китай. Такой, который морально чист, свободен от пороков и практикует самодисциплину в высшей степени. Политическая революция, нет, Национальная революция, продвинет вперед как нацию, так и ее народ. Но ее основной функцией будет польза для модернизации и силы армии Китая."

 YUN_a_second_reorganisation: "Вторая реорганизация"
 YUN_a_second_reorganisation_desc: "При правлении генералиссимуса Хэ Инциня ГМД был мешаниной из различных групп и фракций, и партийная бюрократия оказалась раздутой, с лишними политическими советами, работающими в тандеме с партийными подкомитетами. Если Чэнь Чэн хочет привести ГМД и Китай к новому и лучшему будущему, работа должна начаться с упразднения Политического консультативного совета в пользу Центрального комитета по реорганизации."

 YUN_refining_the_organic_economy: "Совершенствование органической экономики"
 YUN_refining_the_organic_economy_desc: "Опека стремится не только просветить китайский народ о ценностях Трех принципов, но и направить экономику к новой эре процветания и справедливости. При катастрофическом правлении Хэ Инциня китайская нация страдала от безудержной инфляции и буржуазной непримиримости. Рычаги экономики должны быть переданы в руки способных революционеров, больше не являясь игрушкой оппортунистов и контрреволюционеров."

 YUN_economic_centralisation: "Экономическая централизация"
 YUN_economic_centralisation_desc: "С нацией такой огромной, как Китай, и различными естественными барьерами, лежащими в ее границах, неудивительно, что политическая и экономическая автономия процветала в отдаленных регионах. Национальное правительство должно контролировать все аспекты экономики во имя Национальной революции. С централизованным контролем правительство националистов сможет должным образом регулировать по мере необходимости, а также защищать от иностранного экономического империализма."

 YUN_expand_the_youth_corps: "Союз молодежи Саньминьчжуи"
 YUN_expand_the_youth_corps_desc: "Если доктрина ГМД должна найти отклик среди населения, молодежь Китая должна должным образом усвоить, за что на самом деле выступает Национальная революция. Союз молодежи Саньминьчжуи (Три народных принципа) позаботится о том, чтобы молодежь Китая училась, жила и дышала Тремя принципами в глазах Чэня. Какофония в ГМД прекратится, когда молодые поднимутся, чтобы заменить старую гвардию Партии и помочь Генералиссимусу в истинной работе Национальной революции."

 YUN_curtailing_gentry_oppression: "Ограничение угнетения со стороны знати"
 YUN_curtailing_gentry_oppression_desc: "В конце династии Цин и начале республиканской эры неравенство было повсеместным по всему Китаю. Национальное правительство примет меры по ограничению знати посредством контроля за арендной платой, снижения налогов на продукцию и различных мер по борьбе с инфляцией. Национальная революция не может надеяться на успех, если крестьянство не будет освобождено, и Чэнь Чэн лично проследит, чтобы каждый помещик и их кураторы из CC были призваны к порядку!"

 YUN_reiterating_minsheng: "Подтверждение Миньшэна"
 YUN_reiterating_minsheng_desc: "Когда Отец нации впервые начал свою политическую карьеру, он разработал революционные постулаты Трех народных принципов: Миньцзу, Миньцюань и Миньшэн, или национализм, демократия и народное благосостояние. Наиболее важным для Генералиссимуса является Миньшэн, народное благосостояние. Генералиссимус Чэнь родился в бедствующей крестьянской семье и поэтому наиболее остро понимает тяжелое положение людей. Не может быть ошибки, что Миньшэн имеет первостепенное значение в нашей Революции!"

 YUN_institute_of_revolutionary_practice: "Институт революционной практики"
 YUN_institute_of_revolutionary_practice_desc: "При старой Партии Хэ Инциня различным контрреволюционным группам, таким как CC-клика и Клика политической науки, было позволено безнаказанно подрывать Национальную революцию. Гоминьдан генералиссимуса Чэнь Чэна не повторит старых ошибок, и Институт революционной практики позаботится о том, чтобы новички в Партии никогда не упускали из виду истинные цели нашей Национальной революции."

 YUN_rebuilding_party_cells: "Восстановление партийных ячеек"
 YUN_rebuilding_party_cells_desc: "По мере роста Партии потребность в оживлении системы партийных ячеек возрастает. Сеть партийных ячеек укоренится в правительстве, армии и среди военных, и все члены партии будут обязаны присоединиться к одной из них и пройти проверку на лояльность. Ячейки будут подчеркивать демократический централизм как идеологическое руководство политикой, а иерархическая власть и власть Партии будут восстановлены во имя Генералиссимуса."

 YUN_bridging_the_factional_divide: "Преодоление фракционного раскола"
 YUN_bridging_the_factional_divide_desc: "Во время Северного похода ГМД раскололся на две половины. Ван и Центральный комитет дрейфовали к социализму, в то время как силы, лояльные Чану, в сочетании со сторонниками Ху Ханьминя объединились в оппозиции. Это трагическое разделение должно быть исправлено, и Чэнь Чэн уникально подходит для этой задачи. Как ученик и Дэн Яньда, и Чан Кайши, Генералиссимус способен сплотить поддержку обоих крыльев."

 YUN_heir_to_the_red_napoleon: "Наследник Красного Наполеона"
 YUN_heir_to_the_red_napoleon_desc: "Хотя Дэн Яньда в конечном итоге не смог обезопасить нацию, его наследие живет. Чэнь Чэн гарантирует, что ГМД сохранит фокус на крестьянстве, и мечта о Датуне будет обновлена. Партия должна посвятить себя массам Китая превыше всего, ибо отношения ГМД к массам подобны отношениям рыбы и воды: рыба плавает в воде и не может выжить без нее. Во имя Дэна, Чэнь Чэн будет сражаться за народ!"

 YUN_all_forward_with_the_little_generalissimo: "Все вперед с Маленьким Генералиссимусом!"
 YUN_all_forward_with_the_little_generalissimo_desc: "Китайский народ был на пороге спасения, когда генералиссимус Чан возглавил Партию. Трагически, немецкое предательство остановило революцию и уничтожило ГМД. Вопреки всему, Партия не только вернулась, но и победила благодаря руководству самого верного ученика Чана, Чэнь Чэна. Маленький Генералиссимус закончит то, что начал Чан, и приведет нацию к светлому и процветающему будущему!"

 YUN_joint_commission_on_rural_reconstruction: "Объединенная комиссия по реконструкции села"
 YUN_joint_commission_on_rural_reconstruction_desc: "С завершением первого этапа Революции Националистическая партия должна начать процесс реконструкции. Китайская нация находится в лохмотьях после войн за объединение и войны за выживание против японских агрессоров. Разрушение сельской местности требует от Партии создания сельской комиссии, которая обеспечит сельским регионам не только восстановление довоенных условий, но и освободительные эффекты компетентного управления."

 YUN_formalise_the_government: "Формализация правительства"
 YUN_formalise_the_government_desc: "Слишком долго Партия правила довольно иррационально. Через указы, а не консенсус. Через произвольное посредничество и решения избранного меньшинства, а не народных масс. Хотя демократия еще далеко, а с ней и конституция, мы можем, по крайней мере, внедрить полуструктурированную форму управления, чтобы положить конец бессмыслице Партийного государства. С этим Китай обретет надлежащее управление."

 YUN_broaden_the_social_base: "Расширение социальной базы"
 YUN_broaden_the_social_base_desc: "Чтобы должным образом облегчить страдания народа, Партия должна лучше понимать общество. Партийная работа должна включать расследование членами местной экономики и социальных условий, которые могут создать социалистические симпатии. Партия тоже должна шире открыть свои двери для низших классов. Фермеры, рабочие и интеллектуалы должны быть привлечены в Партию, чтобы наша Национальная революция была действительно партией для рабочих и крестьян."

 YUN_a_revolutionary_democratic_party_for_the_future: "Революционное демократическое будущее"
 YUN_a_revolutionary_democratic_party_for_the_future_desc: "После Реорганизации 1924 года Гоминьдан часто сравнивали с другими ленинскими партиями и критиковали за то, что он является автократическим инструментом Революции. Эти критики не понимают целей нашей Партии, и китайский народ должен прийти к пониманию Партии как в конечном итоге демократической, которая стремится перевести Китай в свободное демократическое общество."

 YUN_reenergise_the_cadres: "Реэнергизация кадров"
 YUN_reenergise_the_cadres_desc: "Для укрепления революционных взглядов Партии кадровая система должна быть восстановлена. Эти кадры будут воспитаны в ценностях Трех принципов, их лояльность будет проверена, и они будут выбраны через выборы, рекомендации, обучение или экзамены. Кадры будут разделены на кадры партийной работы, политические кадры и кадры массового движения. Через кадровую систему Гоминьдан проникнет на каждый уровень китайского общества."

 YUN_the_peoples_generalissimo: "Народный Генералиссимус"
 YUN_the_peoples_generalissimo_desc: "Синьхайская революция 1911 года обещала обеспечить свободное и демократическое будущее для Китая. Однако Республика не смогла этого достичь, и Сунь обратился к более радикальным методам. Однако следует понимать, что цели ГМД никогда не менялись, и только методы стали революционными. Генералиссимус Хэ Инцинь и ГМД стремятся лишь выполнить заброшенные обещания Синьхая и освободить китайский народ."

 YUN_spiritual_authoritarianism: "Духовный авторитаризм"
 YUN_spiritual_authoritarianism_desc: "Как заметил сам доктор Сунь, разница между стареющим Китаем прошлого и возрожденным Китаем Гоминьдана подобна ночи и дню. В то время как монархи относились к нашей великой нации как к своей собственности, генералиссимус Хэ снова и снова доказывал, что он самоотверженный, великодушный герой, ведущий Китай в новую эру. Пока его сердце качает кровь, Генералиссимус будет неустанно работать, управляя нацией."

 YUN_engineering_a_future_for_china: "Проектирование будущего для Китая"
 YUN_engineering_a_future_for_china_desc: "Гоминьдан всегда был партией будущего, пробивающейся через болото запустения, которым когда-то был Китай. Ни один член партии не олицетворяет это вечное стремление к прогрессу больше, чем Чэнь Лифу. Инженер по профессии, он взял на себя новую роль архитектора будущего Китая. В отличие от социалистов и реакционеров, которые стремятся разделить нацию на мелкую фракционность, мы движемся не влево, не вправо, а вперед вместе как одна нация."

 YUN_concord_with_the_republican_elite: "Согласие с республиканской элитой"
 YUN_concord_with_the_republican_elite_desc: "Следуя примеру доктора Суня, Гоминьдан всегда стремился работать вместе с множеством движений ради блага китайской нации. Теперь, когда Китай объединен, было бы разумно объединить и политическую сферу, работая с лучшими и ярчайшими из единомышленников-республиканцев, которые могут принести свой опыт в наши усилия по реконструкции. Если вы за Гоминьдан, вы за Китай!"

 YUN_life_as_a_service: "Жизнь как служение"
 YUN_life_as_a_service_desc: "Ни одна партия, кроме Гоминьдана, не представляет по-настоящему весь китайский народ, среди всех классов. Сила нашей партии зависит от количества населения, которое стало верить в наши идеалы, а также от фанатизма и драйва указанных членов. Чтобы расширить оба этих фактора, жизненно важно показать массам, что Гоминьдан — единственная партия, которая заботится о них, с Генералиссимусом как патриархом всего народа."

 YUN_restoring_spiritual_balance: "Восстановление духовного равновесия"
 YUN_restoring_spiritual_balance_desc: "Чэнь Лифу теоретизировал, что все человеческие проблемы вызваны нарушением двух конкурирующих экономических сил: производства и потребления. Материалистические западные идеологии стремились исправить этот дисбаланс, увеличивая производство, и, в свою очередь, просто увеличивая человеческую жадность. Теперь, когда мы победили угрозы как внутри страны, так и за рубежом, нашей следующей целью будет сама человеческая природа."

 YUN_chinese_bushido: "Китайское Бусидо"
 YUN_chinese_bushido_desc: "Мы должны поощрять китайское население принять конфуцианскую ценность «жэнь», которая в интерпретации Чэнь Лифу означает благожелательное самопожертвование индивидуума в целом ради служения всем. Вдохновленный истинным обожанием Дай Цзитао к самоотверженным японцам, Китай достигнет освобождающего Датуна. Никогда не будет поглощен материализмом, жадностью или страданиями. Нация продуктивных, где каждый гражданин служит своей стране до последнего вздоха."

 YUN_the_revolutionary_generalissimo: "Революционный Генералиссимус"
 YUN_the_revolutionary_generalissimo_desc: "Гоминьдан — это больше, чем партия, больше, чем движение, это само волокно Китая — и Генералиссимус Хэ является его законным лидером. Века унижений и страданий, которые перенес Китай, станут лишь сноской, поскольку Хэ Инцинь и CC-клика ведут, с обнаженными мечами, нацию в ее «Лучезарное будущее». Больше, чем идеологическая борьба, больше, чем материальная война, новый Китай Хэ выйдет за пределы природы и самого человечества."

 YUN_caring_for_our_veterans: "Забота о наших ветеранах"
 YUN_caring_for_our_veterans_desc: "Без Гоминьдана не было бы нового Китая, но без наших военных не было бы Гоминьдана. Точно так же, как военные переделывают молодежь, вселяя в них безграничный национализм и мужество, необходимые для защиты их родины, военные были определяющим фактором в нашем обновлении Китая, когда он сбросил оковы западного и японского империализма. За свою службу наши ветераны, несомненно, заслужили справедливую награду, и пришло наше время наградить их."

 YUN_military_centrism: "Военный центризм"
 YUN_military_centrism_desc: "Начиная со своих корней в 1-й армии, Клика Вампу является образцом для всех китайских граждан: дисциплинированная, яростно патриотичная, готовая отдать свою жизнь и больше ради нации. В отличие от интеллектуалов Ван Цзинвэя и Ху Ханьминя, которые довольствуются сидением в своих башнях из слоновой кости, обсуждая мелочи, вместо того чтобы трудиться для революционной борьбы, именно лояльные военные Китая разбили его цепи. И за это они берут бразды правления."

 YUN_reform_confucianism: "Реформа конфуцианства"
 YUN_reform_confucianism_desc: "Провал идеологий Ван Цзинвэя и Ху Ханьминя очевиден для всех: они испорчены западными влияниями. Китай отчаянно нуждается в новой идеологической догме, которая действительно представляет китайский народ и его ценности. Дай Цзитао сформулировал сочетание конфуцианства и палингенетического ультранационализма, которое действительно представляет китайскую нацию и ее ценности, что послужит достойным кредо для «Новых правых»."

 YUN_the_lucky_generalissimo: "Удачливый Генералиссимус"
 YUN_the_lucky_generalissimo_desc: "Когда пуля застряла в сердце Хэ Инциня, думали, что это его последние часы, и все же он стал сильнее, чем когда-либо. Поистине уместно тогда, что так же, как удача даровала Генералиссимусу второй шанс, именно Хэ Инцинь сделает невозможное и даст Китаю второй шанс против врагов со всех сторон. Генералиссимус поистине является моделью, к которой должны стремиться все граждане нового Китая. Да здравствует Генералиссимус!"

 YUN_a_mixed_economic_system: "Плановое свободное экономическое развитие"
 YUN_a_mixed_economic_system_desc: "Гоминьдан сражался десятилетиями не для того, чтобы увидеть, как Китай впадает в тиранию империй прошлого, и не для того, чтобы увидеть, как он снова скатывается в анархию. Пришло время восстанавливать, и КПН предложила уникальную экономическую систему, специально созданную для восстановления. С лучшими технократическими планировщиками партии, направляющими тяжелую промышленность, и народными предпринимателями, оживляющими легкую промышленность, двигатель прогресса будет запущен под руководством самых талантливых людей Китая, работающих в гармонии."

 YUN_reshuffle_the_executive_yuan: "Перестановка в Исполнительном Юане"
 YUN_reshuffle_the_executive_yuan_desc: "Пришло время Юаню получить капитальный ремонт. Ху Ханьминь предпринял благородную попытку защитить традиционные, ортодоксальные формы партийного управления. Но будущее уже наступило. Представители, которые показали, что их больше заботит разжигание инакомыслия, чем вклад в партию, будут быстро уволены и заменены истинно лояльными партийными кадрами. Китай строится на хорошем, честном, технократическом управлении. А не на мелочном идеализме."

 YUN_political_consultative_conference: "Политический консультативный совет"
 YUN_political_consultative_conference_desc: "В рамках нашей инициативы по оптимизации внутренней работы партии мы формализуем Политический консультативный совет, состоящий из бюрократов Гоминьдана, представителей Данвай и других технократических мыслителей, связанных с Гоминьданом, для обсуждения и направления будущей политики. Партия снова эволюционирует из рыхлой ассоциации военных фракционеров в эффективный орган самых способных лидеров в каждом политическом аспекте."

 YUN_the_liberal_generalissimo: "Либеральный Генералиссимус"
 YUN_the_liberal_generalissimo_desc: "Когда Хэ Инцинь, вопреки всему, стал тем, кто объединил Китай, некоторые скептики предсказывали, что он будет милитаристом в костюме политика, проводником военной стратократии. Как же мы доказали их неправоту! Народ больше не попадется на ложь демагогов, а скорее будет уверен, что Гоминьдан — это партия того, кто правит лучше всего, а не того, кто кричит громче всех."

 YUN_national_military_education_movement: "Национальное движение военного образования"
 YUN_national_military_education_movement_desc: "Презрение интеллектуалов к физическому, тяжелому труду — это болезнь, которой нельзя позволить гноиться. С этой целью Национальное движение военного образования будет стремиться полностью трансформировать студентов Китая: военная индоктринация начнется в раннем возрасте, школы будут реорганизованы по образцу военных полков, а науки ориентированы на их применение в военное время. С этим новое поколение воинов спустится на общество."

 YUN_crackdown_on_warlordism: "Подавление милитаризма"
 YUN_crackdown_on_warlordism_desc: "Несмотря ни на что, Китай еще не является по-настоящему единым и интегрированным: остаются чрезмерное налогообложение и неэффективность. Причина этой проблемы исходит не из классовой динамики, а из нации: расколотой милитаристами по провинциальным линиям с их глупыми, мелочными амбициями. Не будет жалеть сил для искоренения этой болезни вместе со всеми теми, кто ее увековечивает. Скоро этот период разобщенности и неэффективности станет не более чем плохим воспоминанием."

 YUN_promote_yellow_unionism: "Продвижение желтых профсоюзов"
 YUN_promote_yellow_unionism_desc: "Китайские рабочие — это хребет нации, и пришло время облегчить их страдания, вызванные десятилетиями западного империализма: Национальное движение добровольного труда станет окончательным спасением труда, сокращая безработицу и защищая права рабочих, сохраняя при этом патриотический, националистический характер, вместо поощрения бессмысленного классового конфликта, который вызывает только дальнейшие неудачи, ибо основной конфликт — между нациями, а не классами."

 YUN_the_realisation_of_dictatorship: "Реализация диктатуры"
 YUN_the_realisation_of_dictatorship_desc: "Несмотря на достижение национального воссоединения, партия подвела китайский народ слишком много раз, чтобы сосчитать, став далекой от масс, отбрасывая их доверие и их веру, вызывая отсутствие политических и военных решений. Однако есть решение этой проблемы: Общество синерубашечников, истинно патриотическая сила, которая стремится к национальной революции в высшей степени. Верные Генералиссимусу, они отныне будут служить его столь необходимой правой рукой."

 YUN_restoring_the_chinese_national_character: "Восстановление китайского национального характера"
 YUN_restoring_the_chinese_national_character_desc: "К сожалению, китайский национальный характер в настоящее время занимает несколько крайностей одновременно: индивидуализм, верность семье и клану, и космополитизм, причем они цементируются конфуцианством, феодализмом и экспортированным с запада материализмом. Задача государства — уменьшить эти влияния и культивировать подлинный национализм, достигая национального восстановления через культурный контроль."

 YUN_the_blueshirt_generalissimo: "Генералиссимус Синерубашечников"
 YUN_the_blueshirt_generalissimo_desc: "Генералиссимус Хэ — истинный отец китайской нации, единственный, кто может полностью очистить Китай от западного империализма раз и навсегда и принести подлинное национальное восстановление. От тех, кто следует за ним, требуется абсолютное повиновение Генералиссимусу. Нужно жить и умереть с ним искренне и непоколебимо, если когда-либо возникнет необходимость, ибо сама судьба нации зависит от него."

 YUN_purge_the_old_party: "Чистка Старой партии"
 YUN_purge_the_old_party_desc: "Старая партия, полная предателей, капиталистов и коррумпированная до бесконечности, должна быть уничтожена, а на ее месте должна возникнуть новая организация только истинных революционеров. Это будет достигнуто не ужасно непрактичной полной реорганизацией, а созданием партии внутри партии, готовой отдать все за нацию и народ, со строгими ограничениями на материальное богатство и отказом от феодальных, семейных отношений в пользу подлинного товарищества."

 YUN_eliminate_unnecessary_bureaucracy: "Устранение ненужной бюрократии"
 YUN_eliminate_unnecessary_bureaucracy_desc: "Ненужная, коррумпированная и некомпетентная бюрократия долгое время отравляла партию и, как следствие, саму национальную революцию. Ее устранение жизненно важно для национального выживания и процветания, но есть много способов сделать это. В конечном счете, Общество синерубашечников сочло необходимым следовать своей идее «партии внутри партии», чтобы очистить ее от текущей бюрократии изнутри."

 YUN_negotiate_with_shanghai_compradors: "Переговоры с шанхайскими компрадорами"
 YUN_negotiate_with_shanghai_compradors_desc: "Поистине Общество синерубашечников не является чистым. В то время как партия может уклоняться от своих связей с финансистами и бандами Шанхая, это всего лишь рог изобилия возможностей. Поэтому агенты будут отправлены для переговоров с нашими бывшими друзьями и открытия пути к дальнейшему сотрудничеству. С их помощью национальный путь к процветанию будет намного легче пройти."

 YUN_reevaluating_underground_ties: "Переоценка связей с подпольем"
 YUN_reevaluating_underground_ties_desc: "Сходства и связи между Обществом синерубашечников и китайскими подпольными преступными организациями, особенно триадами, многочисленны: от ритуалов посвящения до работы через сети патронажа. С этим естественно, что у них были близкие отношения. Эти группы могли бы помочь в дальнейшем контроле, особенно над профсоюзами, крайне важно их привлечь."

 YUN_expand_the_special_task_force: "Расширение Специальной оперативной группы"
 YUN_expand_the_special_task_force_desc: "Истинно революционной партии нужна авангардная военная сила, чтобы вести примером и уничтожать любых предателей, стоящих на ее пути. Для Общества синерубашечников эту роль будет играть Специальная оперативная группа. Вдохновленная «Гостражей» Савинкова, Специальная оперативная группа будет состоять только из элиты элиты, с еще более строгим надзором и проверками биографии по сравнению с другими членами Общества."

 YUN_national_economic_reconstruction_movement: "Национальная экономическая реконструкция"
 YUN_national_economic_reconstruction_movement_desc: "Неумолимый и ядовитый западный империализм, безудержный милитаризм и, наконец, решающий конфликт с Японией оставили экономику китайской нации в руинах и значительно замедлили прогресс в любой земельной реформе. Потребуются сверхчеловеческие усилия и предельная самоотверженность, но новое партийное государство обеспечит подъем Китая из руин, в которых он оказался."

 YUN_mass_organisation: "Массовая организация"
 YUN_mass_organisation_desc: "Массовая организация жизненно важна для любого политического движения, и Общество синерубашечников не исключение. Общество будет иметь строгую, эффективную организацию сверху вниз, от Внутреннего круга и исполнительного комитета до доверенных вербовщиков и лазутчиков. Принятие ячеечно-групповой модели организации со строгим надзором, наблюдением и контролем расходов."

 YUN_absolute_obedience_to_the_leader: "Абсолютное повиновение Лидеру"
 YUN_absolute_obedience_to_the_leader_desc: "В конечном счете, прогресс революционных предприятий диктуется лидером. Если лидер компетентен, от революции следует ожидать быстрого прогресса. В противном случае революция вряд ли сможет избежать отклонения от курса и краха. [ROOT.GetLeader], несомненно, является первым, направляя китайскую нацию к истинной национальной революции. Никто не может сомневаться в его преданности и способности, и абсолютное повиновение ему необходимо, чтобы мы не позволили революции сбиться с курса."

 YUN_reinterpret_the_three_principles: "Переосмысление Трех принципов"
 YUN_reinterpret_the_three_principles_desc: "Три народных принципа являются самим фундаментом китайского национализма и национальной революции. Хотя империалисты и предатели могут обвинять Общество синерубашечников в оппозиции им, это далеко от истины. Но с тяжелым сердцем мы должны признать, они несовершенны. Чтобы достичь Национальной революции по-нашему, нужно отказаться от ортодоксального Миньцюаня (Демократии)."

 YUN_the_blueshirt_revolution: "Революция Синерубашечников"
 YUN_the_blueshirt_revolution_desc: "Слишком долго партия находилась в смятении, терзаемая бессилием и упадком, вызванными плохими методами, несовершенной системой и бессодержательным наполнением. Однако с появлением [ROOT.GetLeader] этих прежних слабостей больше нет. На их месте теперь только необузданная сила. Возник новый вид партийного государства, который готов рискнуть всем и каждым ради национальной революции. Никогда не колеблясь, никогда даже не допуская мысли о том, чтобы сдаться."

#Satellite Endgame - 3Al, 3AR, PSC
 YUN_the_kuomintang_periphery_at_its_center: "Периферия Гоминьдана в его центре"
 YUN_the_kuomintang_periphery_at_its_center_desc: "Когда кто-то думает о партийном государстве доктора Суня, его разум сразу же обращается к таким людям, как Ван Цзинвэй и его АТР, Чан и Осколки Вампу, Ху Ханьминь и его Клика Старейшин, или даже Временный комитет действий. Немногие обращают внимание на положение «периферии» Гоминьдана, тех фракций, которые постоянно упускаются из виду. И все же объединение привело к тому, что глаза всей нации с любопытством устремились на изгоев."

 YUN_salvaging_the_nations_livelihood: "Спасение средств к существованию нации"
 YUN_salvaging_the_nations_livelihood_desc: "Маршируя слишком похоже на Цай Э десятилетия назад, Юньнань вела войну национального спасения от Куньмина вплоть до Пекина и даже Дунбэя. Полные идеализма, полные энергии и добродетели революционных солдат, выполняющих свою миссию против тирании и сбитых с пути товарищей, такие надежды и мечты принесли разрушение Китайской Нации. Пришло время для процесса экономической реконструкции в свете бедственного положения народа."

 YUN_officialising_military_amnesty: "Официализация военной амнистии"
 YUN_officialising_military_amnesty_desc: "Крестовому походу Юньнани за истинную Национальную революцию противостояли не только наши революционные братья и сестры, но и товарищи самой Национально-революционной армии. Армия пошла на армию, и когда-то близкие союзники были вынуждены проливать кровь друг друга. Однако во всем этом остается суть братства, которая превосходит даже самую глубокую вражду. Чтобы навести мосты через пропасть, должны быть предоставлены широкие программы амнистии."

 YUN_reorganise_the_governmental_organs: "Реорганизация правительственных органов"
 YUN_reorganise_the_governmental_organs_desc: "Проще говоря, правительственная структура Гоминьдана пережила, возможно, свое худшее бедствие за последнее время. Поскольку клики Юньнани разорвали связи или иным образом изгнали многочисленных бюрократов и государственных служащих в своем крестовом походе, Республика находится в полном беспорядке. Через тщательное изучение отсутствующих позиций и обеспечение новым персоналом, [ROOT.GetLeader] может построить новое Партийное государство, сильнее прежнего."

 YUN_under_the_auspices_of_workers_and_peasants: "Под эгидой рабочих и крестьян"
 YUN_under_the_auspices_of_workers_and_peasants_desc: "В то время как Ван Цзинвэй и Центральный комитет уклонялись от своих обязанностей перед лаобайсин Китая, маленький аванпост на периферии подхватил мантию, которую они отбросили, и сражался не за Председателя или Партийное государство, а за улучшение жизни народа. Народ Китая вознаградил эту праведную борьбу против несправедливых и позволил нам свергнуть старую гвардию. С объединенным Китаем пришло время работать для народа!"

 YUN_modernisation_and_militarisation: "Модернизация и милитаризация"
 YUN_modernisation_and_militarisation_desc: "Хотя партизанские стратегии и партизанская война сильно помогли в освобождении Китая, очевидно, что военная модернизация должна быть предпринята, если мы хотим оставаться конкурентоспособными с нашими соседями. Маршал Чжу Дэ уже взял на себя задачу посетить другие социалистические страны, чтобы черпать вдохновение для нашей новой военной системы. Он уже рекомендовал армии принять принципы профессионализма, дисциплины и изучения современного оборудования."

 YUN_reconstituting_military_order: "Восстановление военного порядка"
 YUN_reconstituting_military_order_desc: "Хотя старые милитаристы и бонапартистское правительство Нанкина были свергнуты, многие сбитые с толку и введенные в заблуждение люди продолжают бороться против Нового Китая. В регионах, все еще страдающих от партизанской войны, будут созданы временные военные округа для восстановления местного порядка и обеспечения быстрого установления мира. Пусть будет известно, что дни, когда китайский народ убивал друг друга, подошли к концу, и пришло время для вечного мира дома!"

 YUN_to_enact_minsheng_geming: "Ввести в действие Миньшэн Гэмин"
 YUN_to_enact_minsheng_geming_desc: "Народ Китая сделал эту с трудом завоеванную победу возможной, и именно народ наконец насладится плодами своей справедливой борьбы. В феодальные времена народ безжалостно угнетался безразличными помещиками и злонамеренными бюрократами. Образование оказалось единственным методом, с помощью которого некоторые могли избежать жизни в нищете, и наш самый большой приоритет — видеть, как все граждане Китая наслаждаются качественным образованием, которого они заслуживают!"

 YUN_national_rejuvenation_and_national_prosperity: "Национальное омоложение и национальное процветание"
 YUN_national_rejuvenation_and_national_prosperity_desc: "С момента Опиумных войн наша нация видела непрерывную спираль смерти и нищеты. Периферийные регионы были искалечены голодом, а восстания жестоко подавлялись. Во имя национального омоложения репрессивные налоговые кодексы и укоренившаяся власть знати будут уничтожены, а удавка на шее крестьянства будет ослаблена. Цель государства — чтобы весь китайский народ однажды обрел богатство и оставил разрушение прошлого позади!"

 YUN_hundred_flowers_campaign: "Кампания «Сто цветов»"
 YUN_hundred_flowers_campaign_desc: "Хотя наши лидеры надеются только помочь рабочим и крестьянам Китая достичь общего процветания, никто не застрахован от критики и не безгрешен. Чтобы оценить мнения китайского народа о том, как улучшить нашу текущую политику, товарищ Чжан Боцзюнь объявил Кампанию «Сто цветов» для продвижения атмосферы открытости и терпимости. Пусть расцветают сто цветов в общественных науках и искусствах, и пусть сто точек зрения будут выражены в области науки!"

 YUN_chinese_socialism_secured_forevermore: "Китайский социализм обеспечен навеки"
 YUN_chinese_socialism_secured_forevermore_desc: "В то время как старый Гоминьдан стремился навязать идеологическую дисциплину массам, наша новая платформа ищет консенсуса. Там, где радикалы партии видели целью только идеологические ориентиры, наше руководство имеет в виду только улучшение жизни народа. Закрепляя демократию и социализм как совместимые силы, мы не только обеспечили процветание нации, но и то, что китайский социализм не умрет через поколение и продолжит вести народ на века вперед!"

 YUN_the_partys_most_loyal: "Самый верный партии"
 YUN_the_partys_most_loyal_desc: "Под руководством генералиссимуса Чжу Пэйдэ китайский народ наконец увидел объединение после десятилетий разобщенности. Верный ученик у ног Отца нации, Чжу обеспечит, чтобы Национальная революция сохраняла свой курс, как и предполагал доктор Сунь. Люди ликуют на улицах, зная, что хаос прошлого наконец прошел, и Чжу Пэйдэ будет стремиться вперед, чтобы гарантировать, что Гоминьдан освободит рабочих и крестьян и построит новый Китай для всех!"

 YUN_honouring_the_war_dead: "Почитание павших на войне"
 YUN_honouring_the_war_dead_desc: "Хотя Китайская Республика стоит гордо, это полная трагедия, что будущее Китая могло быть обеспечено только смертью миллионов, чтобы отразить жестоких японских империалистов. Ли Гэньюань рекомендовал построить Национальное кладбище Тэнчун, чтобы почтить всех, кто погиб в войне. Пусть имена этих храбрых душ будут выгравированы на Монументе, чтобы будущие поколения знали о высшей жертве, которую каждый принес в служении нации..."

 YUN_the_superior_form_of_federalism: "Высшая форма федерализма"
 YUN_the_superior_form_of_federalism_desc: "В то время как критики-федералисты высмеивают централистскую природу нации при Гоминьдане, их узколобое отношение не могло быть более слепым к истине. Там, где федералисты превратили свои провинции в деспотические абсолютистские государства, Гоминьдан поощрял истинное сотрудничество по всей стране. Наше националистическое государство сродни крепко укоренившемуся дереву, и на этом дереве нет места для грязных политических фантазий."

 YUN_deals_with_the_compradors: "Сделки с компрадорами"
 YUN_deals_with_the_compradors_desc: "Хотя компрадоры — это не что иное, как иностранные пиявки, надеющиеся извлечь то небольшое богатство, которое осталось у Китая, их можно использовать в наших собственных целях. Через переговоры с компрадорами экономическое сотрудничество с иностранными государствами будет ускорено, и обе наши нации могут много выиграть. В то время как Великие державы используют наши ресурсы и рабочий пул, мы будем использовать их инструменты для модернизации нашей нации, и именно китайцы будут командовать парадом через несколько десятилетий!"

 YUN_national_defense_fortification_plan: "План укрепления национальной обороны"
 YUN_national_defense_fortification_plan_desc: "В то время как Национальная революция прокатилась по всей нации, иностранные стервятники остаются бдительными, надеясь отменить освободительные цели нашей Партии. Генералиссимус Чжу Пэйдэ наметил планы обороны на этот возможный исход, чтобы мы не были застигнуты врасплох, как это случилось с Войной сопротивления. Если кто-то хочет испытать себя против Националистического Китая, пусть он столкнется с полной мощью Национально-революционной армии!"

 YUN_revolution_safeguarded_by_its_warriors: "Революция, охраняемая ее воинами"
 YUN_revolution_safeguarded_by_its_warriors_desc: "История доказала, что военные были величайшим активом Революции. Именно мощь Синьхайской республиканской армии свергла Цин, именно Хугоцзюнь положил конец монархическим амбициям Юаня, и именно Национально-революционная армия привела к объединению. Генералиссимус Чжу Пэйдэ и Юньнаньская НРА обеспечили, чтобы ГМД оставался сильным, и с военными на нашей стороне Национальная революция узнает успех!"

 YUN_brothers_of_principle_sons_of_the_guofu: "Братья по принципу, сыновья Отца нации"
 YUN_brothers_of_principle_sons_of_the_guofu_desc: "Партия смотрит на председателя Ху Ханьминя и генералиссимуса Чжу Пэйдэ как на два столпа Национальной революции. Вполне уместно, что два самых верных ученика Сунь Ятсена возглавляют усилия по достижению его мечты о современном Китае. В отличие от предателя-ревизиониста Ван Цзинвэя и его шайки оппортунистических сикофантов, Ху и Чжу стремятся следовать каждому слову доктора Суня буквально. Под руководством этих двух драконов Китай, несомненно, достигнет общего процветания для всех!"

 YUN_legacy_of_gu_pinzhen: "Наследие Гу Пиньчжэня"
 YUN_legacy_of_gu_pinzhen_desc: "Тяжела голова, носящая корону, ибо многие из наших храбрых революционных товарищей пали на обочине в борьбе за Национальную революцию. Однако ни один из них не был более проигнорирован и забыт, чем храбрый, свирепый и патриотичный Гу Пиньчжэнь. Революционный герой, как никто другой, без Гу Северный поход никогда бы не состоялся. Наконец, он может покоиться, зная, что его жертва никогда не была напрасной."

 YUN_unity_with_the_party_outsiders: "Единство с беспартийными"
 YUN_unity_with_the_party_outsiders_desc: "Хотя именно наша партия возглавила революцию, мы не одиноки в этой борьбе. Совместимые партии, такие как Демократическая лига Китая, стремятся к тем же целям, что и мы, и между нашими двумя партиями есть много общего. Демократия — это не антитеза нашей революции, скорее это ядро того, за что мы сражаемся. Давайте наведем мосты между всеми совместимыми партиями, чтобы рука об руку мы могли освободить Китай!"

 YUN_exporting_the_kunming_model: "Экспорт модели Куньмина"
 YUN_exporting_the_kunming_model_desc: "Хотя Юньнань была лишь захолустным периферийным регионом в великой нации Китая, именно благодаря юньнаньскому оружию и военным людям нация наслаждается единством, которое она имеет сегодня. Модель Куньмина показала себя наиболее успешной в Республиканскую эру, и она послужит планом для нации отныне. Не Баодин или Вампу положили конец Веку унижений, а дерзкий Куньмин, стойкий аутсайдер!"

 YUN_an_antidote_for_economic_woes: "Противоядие от экономических бед"
 YUN_an_antidote_for_economic_woes_desc: "Хотя капитализм является великим бичом нашей нации, облегчение потребует принятия некоторых капиталистических политик для народа. Частичная маркетизация сельского хозяйства побудит крестьян с их недавно полученными участками земли стать производительными силами в нации, а развитие побережья будет увеличено за счет иностранных инвестиций, но на китайских условиях. По мере модернизации нации мечта о равенстве и процветании становится все ближе..."

 YUN_flourish_of_the_kuomintang_liberals: "Торжество презираемых технократов"
 YUN_flourish_of_the_kuomintang_liberals_desc: "В то время как более ревностные элементы Гоминьдана продолжали отстаивать высокие идеи Национальной революции, они продолжали топтать необходимое и правильное экономическое планирование, которое продолжали отстаивать бюрократические и технократические элементы. Многие верили, что они никогда не добьются многого, но Политическая наука завоевала сердца китайского народа благодаря искренней преданности улучшению народного благосостояния."

 YUN_removing_the_trappings_of_ideology: "Устранение атрибутов идеологии"
 YUN_removing_the_trappings_of_ideology_desc: "Восхитительный институт, преданный революционной борьбе, в конечном итоге Вампу доказала, что представляет большую угрозу для китайского общества, чем можно было предположить. С их позерством и наполеоновским прославлением Национально-революционной армии они почти вытеснили гражданский элемент партии. Чтобы устранить политическое обучение и деполитизировать армию, давайте создадим Центральную политическую школу."

 YUN_engaging_with_the_dangwai: "Взаимодействие с Данвай"
 YUN_engaging_with_the_dangwai_desc: "Гоминьдан не правит китайской нацией в одиночку. Вне пузыря Партийного государства остаются обширные поля беспартийных, так уважительно называемых «Данвай». Многие из более радикальных членов Партии очернили бы любую форму сотрудничества с людьми, не преданными Трем принципам. Однако новая нация требует компромисса и сотрудничества для выполнения Национальной революции."

 YUN_undoing_the_injustice_of_1924: "Отмена несправедливости 1924 года"
 YUN_undoing_the_injustice_of_1924_desc: "Одним из самых катастрофических и разрушительных действий, произошедших вследствие отчаяния доктора Суня освободиться от «милитаризма», была Реорганизация Партии в 1924 году. Впервые внутренняя фракционность Гоминьдана пустилась в полную демонстрацию своего безумия. С правительством рациональных технократов у руля пришло время построить современный Китай, свободный от милитаристских фанатиков."

 YUN_draft_a_permanent_constitution: "Разработка постоянной конституции"
 YUN_draft_a_permanent_constitution_desc: "Слишком долго Гоминьдан правил хаотичным, непостижимым и несообразным образом иррациональных решений, принимаемых исполнительной властью. В его следе возникли ожесточенные диалектические дебаты между достоинствами Данго и Опеки против принятия Китайской Конституции. К счастью, Политическая наука получает наибольшую выгоду от реализации последнего."

 YUN_modernising_the_decrepit_dangguo: "Модернизация дряхлого Данго"
 YUN_modernising_the_decrepit_dangguo_desc: "Партийное государство стало очень ненавидимым и презираемым широкими слоями населения. Рассматриваемое как надменное собрание милитаристов, интеллектуалов и идеологов, слишком озабоченных бюрократией и внутренней борьбой, чтобы облегчить сомнения людей. Однако под руководством Политической науки рядовые члены — это те технократические планировщики, вовлеченные в дух времени модернизации. Давайте привнесем такую культуру в партию."

 YUN_a_national_liberal_economy: "Рационализация национального капитализма"
 YUN_a_national_liberal_economy_desc: "Несмотря на высокие идеалы и замечательные улучшения жилищных условий китайского народа при Национальном капитализме, в конечном итоге такая схема развития требует модификации. Через внедрение плановой экономики с государственным контролем в тяжелой промышленности Национальная буржуазия и Партия могут вместе увидеть знаковый экономический прогресс для Китайской Нации, в отличие от Партии в одиночку."

 YUN_rule_through_agreement_not_through_the_sword: "Через соглашение, а не через меч"
 YUN_rule_through_agreement_not_through_the_sword_desc: "То, что привело к разрушению Бэйянской республики, несмотря на всю пролитую кровь и принесенные жертвы, было не провалом ее институтов, а амбициями автократических военных милитаристов, больше сосредоточенных на личном развитии, чем на национальном. Партия должна внедрить, что Китай — это нация, управляемая Джентльменами и консенсусом, а не деспотами и милитаристами."

 YUN_rule_of_national_experts_and_gentlemen: "Правление национальных экспертов и джентльменов"
 YUN_rule_of_national_experts_and_gentlemen_desc: "Многие из ее недоброжелателей осудили бы Клику политической науки одновременно и как предателей Партии, которые пытались свергнуть Отца нации и работать с Бэйяном, и как собрание элит из башни из слоновой кости, которые не понимают тяжелого положения рабочего. В свете этого, однако, стало совершенно очевидно, что правление промышленных и интеллектуальных элит нации является наиболее удачным."

 YUN_ushering_a_new_era_under_the_genro: "Открытие новой эры под «Гэнро»"
 YUN_ushering_a_new_era_under_the_genro_desc: "Гэнро, или «Старейшие государственные деятели», — это неофициальный термин, приписываемый высшим должностным лицам и элите Японской империи в начале 20-го века. Создав одну из первых демократий Азии и ее самое современное государство, Гэнро обладали огромным влиянием, направляя японский народ твердой рукой в течение десятилетий. Точно так же правление Политической науки породило свою собственную стаю Гэнро."

###- NPA Political Tree -###
 YUN_to_save_yunnan_from_itself: "Спасти Юньнань от самой себя"
 YUN_to_save_yunnan_from_itself_desc: "Вечная глупость всех правителей Юньнани, Тан Цзияо наиболее заслуженно из всех, — это их предположение, что с достаточно большой демонстрацией силы они смогут контролировать Юго-Запад через Экспортный милитаризм. Но именно на такой Экспортный милитаризм они и натыкаются своим собственным клинком. Чтобы спасти Юньнань от самой себя и защитить ее граждан, Мэнцзы и Дракон были вынуждены действовать."

 YUN_reorganising_the_yunnan_army: "Реорганизация Юньнаньской армии"
 YUN_reorganising_the_yunnan_army_desc: "С обезглавливанием гидры в Юньнаньской армии все еще есть много тех, кто сохраняет истинную верность своему некогда бывшему Главнокомандующему многих долгих лет. По правде говоря, мы никогда не были по-настоящему единой силой, и всегда присутствует то, что без твердого электората поддержки в армии вы не можете править Юньнанью. Давайте вычистим последних некомпетентных Тана."

 YUN_retreating_into_isolation: "Отступление в изоляцию"
 YUN_retreating_into_isolation_desc: "Спасши Юньнань лишь чудом, существует надвигающаяся угроза продолжения наступления наших бывших противников на большую часть контролируемой Юньнанью территории. Чтобы стать непреодолимой крепостью и по-настоящему отказаться от национальных амбиций наших предшественников, крайне важно, чтобы укрепления и гарнизоны были усилены подкреплениями."

 YUN_dealing_with_the_southern_bandits: "Борьба с южными бандитами"
 YUN_dealing_with_the_southern_bandits_desc: "Чтобы укрепить свою позицию в провинциальной политике, Ху Жоюй предпочитал относительно мягкую руку в отношении проблемы бандитизма, предпочитая контролировать их. Лун Юнь, по своему предпочтению, скорее хотел бы видеть их истребленными. Из-за последнего гамбита за Гуанчжоу проблема бандитизма выросла в масштабах, к ней присоединились бывшие солдаты Тана и Гоминьдана, и они должны быть раздавлены."

 YUN_salvaging_tangs_reforms: "Спасение реформ Тана"
 YUN_salvaging_tangs_reforms_desc: "Что бы вы ни говорили о губернаторе Тане, одно можно сказать наверняка: его способность к прагматичному реформизму и постоянному прогрессу, несмотря на внешние и внутренние факторы, — это добродетель, о которой стоит думать высоко. Цзюньминь Фэньчжи, разделение военной и политической сфер, должно поддерживаться, а меритократия должна быть решающим фактором на государственных должностях, а не лояльность или семейные связи."

 YUN_eliminating_internal_dissidents: "Устранение внутренних диссидентов"
 YUN_eliminating_internal_dissidents_desc: "Из-за кажущейся хрупкости правительства или слабости под давлением наблюдается устойчивый рост и всплеск студенческого радикализма, мотивированный некоторыми политическими акторами, нашедшими свой дом в Юньнани с 1932 года. Независимо от того, какую позицию мы занимаем по отношению к посторонним, революционерам, республиканцам и прочим, диссиденты дома должны быть уничтожены."

 YUN_handling_external_affairs: "Ведение внешних дел"
 YUN_handling_external_affairs_desc: "Военной мощи и постоянной укрывающей изоляции просто недостаточно, чтобы держать большинство посторонних на расстоянии. Хотя мы, очевидно, не стремимся к отделению, это правда, что мы должны поддерживать некоторые связи, даже если неохотно, с внешними милитаристами. Хотя бы в надежде, что когда нация снова объединится, Юньнань сможет сыграть ключевую роль в ее руководстве."

 YUN_protecting_our_commerce: "Защита нашей торговли"
 YUN_protecting_our_commerce_desc: "Богатая минералами и с экспортной линией жизни, идущей к портам Индокитая, Юньнань долгое время выживала за счет, среди прочего, экспорта своих природных ресурсов. Под эгидой банковских систем, созданных Фудянь и Торговой палатой Мяо Юньтая, наряду с контролем Мэнцзы над шахтами, Юньнань, несомненно, будет процветать."

 YUN_expanding_our_universities: "Расширение наших университетов"
 YUN_expanding_our_universities_desc: "Среди любопытных эклектичных кругов личной клики Лун Юня есть много давних провинциальных государственных деятелей, которые несут с собой опыт образования в иностранных университетах. Используя опыт этих людей, таких как Чжан Банхань, будет создан стабильный бюрократический аппарат, который станет созданием Университета Дунлу, с надеждами на расширение в будущем."

 YUN_claiming_the_southwest: "Заявление прав на Юго-Запад"
 YUN_claiming_the_southwest_desc: "Хотя мы, возможно, отказались от идеи водрузить наш флаг на высотах Пекина, Юньнань, тем не менее, по-прежнему играет важную роль как непоколебимый арбитр политической динамики Юго-Запада. Как Владыкам Восточного континента, крайне важно, чтобы, если представится возможность, юньнаньцы управляли и захватывали то, что могут на Юго-Западе."

 YUN_as_the_flowers_bloom: "Как расцветают цветы"
 YUN_as_the_flowers_bloom_desc: "С цветением бегоний и нацией, несколько более стабильной, чем раньше, Юньнань, безусловно, сыграла ключевую роль в национальном положении дел. Но с надвигающейся войной на горизонте и нацией, пострадавшей экономически, Юньнань видела лучшие дни. Изливающийся национализм повредил понятиям изоляции или регионализма, и ходят слухи о дальнейших заговорах в Куньмине..."

 YUN_internal_affairs_reform_conference: "Конференция по реформе внутренних дел"
 YUN_internal_affairs_reform_conference_desc: "Поскольку нация и Юньнань переживают значительные потрясения, стало необходимо укрепить провинциальную бюрократию против дальнейших внутренних и внешних угроз. Созывая Конференцию по реформе внутренних дел, мы подтвердим столь необходимую финансовую реформу, обновленное управление казначейством и дальнейшее устранение бандитизма и беспорядков."

 YUN_raise_the_banner_of_the_southwest: "Поднять знамя Юго-Запада"
 YUN_raise_the_banner_of_the_southwest_desc: "Как бы мы ни тревожились, как бы мы ни уклонялись от долга, беспорядок нации потребовал, чтобы мы нарушили изоляцию Дянь. Чтобы права всех китайцев на Юго-Западе так нагло и постоянно попирались теми, кто, предположительно, должен быть нашими союзниками, — это нарушение, которое совершенно нетерпимо. Как и прежде, мы должны отправиться в поход."

 YUN_the_yunnan_uprising: "Восстание в Юньнани"
 YUN_the_yunnan_uprising_desc: "Поскольку ситуация за пределами Юньнани становится невыносимой, пришло время Юньнани заявить о своих правах на национальное объединение. Изгнав посторонних и их армии, мы должны затем двинуться на их столицу и освободить нацию. В то время как Цай Э начал свою Войну в защиту республики, чтобы защитить Конституцию, мы начинаем нашу собственную Войну за национальное освобождение."

 YUN_the_governments_undertaker: "Гробовщик правительства"
 YUN_the_governments_undertaker_desc: "Чтобы сохранить железную хватку нашей администрации на накопленной нами территории, становится все более необходимым отвечать более жесткими и сильными демонстрациями силы. Ад не знает пощады, крайне важно, чтобы правительство выделило средства на увеличение ресурсов Бюро общественной безопасности Юньнани, поскольку волны беспорядков снова омывают стены Юньнани."

 YUN_harmony_in_the_land_harmony_at_home: "Гармония в земле, гармония дома"
 YUN_harmony_in_the_land_harmony_at_home_desc: "С псевдореволюционными жестами и архитектурой правительства многие из знати начали бояться худшего для нашей администрации, несмотря на то, что их поддержка имеет решающее значение для провинциальной администрации. Напоминая знати об их ключевой роли в правительстве, мы можем сдержать любые дальнейшие крестьянские волнения."

 YUN_the_unexpected_development: "Неожиданное развитие"
 YUN_the_unexpected_development_desc: "Удивительно, но, несмотря на наши понятия об изоляции и самосохранении, нашей администрации представилась возможность еще больше подкрепить наши притязания на будущее объединение Китая. Хотя мы не обязательно жалуемся, и это необходимо в силу обстоятельств, мы можем только надеяться, что это пройдет лучше, чем последняя попытка накануне войны АЗР."

 YUN_a_nation_of_valleys_and_caves: "Нация долин и пещер"
 YUN_a_nation_of_valleys_and_caves_desc: "С глубокими редутами и пещерами, обычно полными бандитов, внутренние районы Китая стали местом, где изобретательность, а не люди или материалы, ведут к успеху. В то время как воздушная мощь потенциально является великим уравнителем, сапоги на земле под командованием командиров, которые понимают цели своей миссии и как лучше всего их достичь, несомненно, добьются успеха."

 YUN_the_vigorous_notion_of_sacrifice: "Энергичное понятие жертвы"
 YUN_the_vigorous_notion_of_sacrifice_desc: "Нам не привыкать к необходимости войны, так как многие отдали свои жизни, чтобы нести бремя амбиций национального объединения Юньнани. Но мы должны прославлять такие перспективы, способность, присущую умению «Сметь умереть». Если мы хотим спасти Бэйянскую республику от самой себя и сделать то, что не смог Цай Э, то не может быть никаких сдержек."

 YUN_organisation_of_a_modern_army: "Организация современной армии"
 YUN_organisation_of_a_modern_army_desc: "По-настоящему современная армия — это та, которую часто невозможно содержать без необходимых бюджетных ассигнований, особенно в таком регионе, как Китай. Сам Тан Цзияо почти обанкротил провинцию множество раз, поддерживая свою здоровенную Цзингоцзюнь. Но по мере того как Дяньская армия приобретает дальнейшие материальные запасы, появилась возможность для собственных элитных дивизий."

 YUN_kunming_as_a_safehaven: "Куньмин как убежище"
 YUN_kunming_as_a_safehaven_desc: "Куньмин стал чем-то вроде интеллектуального рога изобилия с момента репрессий левых и либерально-консервативных интеллектуалов в 1932 году. С множеством педагогов и писателей, собирающихся в юго-западных внутренних районах и работающих в таких учреждениях, как то, что сейчас является Юго-Западным объединенным университетом, или Юньнаньский университет. Давайте культивировать этих ученых, без их политики."

 YUN_revel_in_the_republican_tradition: "Наслаждение республиканской традицией"
 YUN_revel_in_the_republican_tradition_desc: "Внутреннее величие китайской республиканской традиции превозносит добродетели мужества и храбрости с намерением преобразовать свою нацию для блага своих сограждан. И с тотальной гражданской войной на переднем крае моральный дух и пропаганда вполне могут быть двумя столпами, поддерживающими наш успех. Давайте воспевать хвалу нашей истории великого восстания!"

 YUN_muster_our_fellow_comrades: "Сбор наших товарищей"
 YUN_muster_our_fellow_comrades_desc: "Есть много ветеранов долгой истории пылкой милитаризации Юньнани, как внутри, так и за пределами провинциальных границ. Поскольку многие становятся недовольными делами Центрального правительства, давайте сплотим наших старых солдат и воодушевим наших новых людей успехами нашей истории. Вместе Цзингоцзюнь способна победить любого врага."

 YUN_the_undefeatable_heroes: "Непобедимые герои"
 YUN_the_undefeatable_heroes_desc: "Мы, возможно, на последнем пределе. Уже наши армии начали напрягаться и немного прогибаться, однако мы — Владыки Восточного континента. С необузданной славой некоторых из самых талантливых солдат нации у руля наших прошлых побед мы можем предпринять одно, последнее, финальное усилие для победы. Однако, если мы потерпим неудачу, последствия будут катастрофическими."

 YUN_establish_the_economic_committee: "Создание Экономического комитета"
 YUN_establish_the_economic_committee_desc: "Хотя банк Фудянь доблестно служил своим целям с момента своего создания при Цай Э, стало ясно, что потребность в четком правительственном экономическом комитете, посвященном образованию и возрождению финансовых дел Юньнани, постоянно растет. Укомплектованный такими людьми, как Ли Пэйянь и Мяо Юньтай, пусть правительственный комитет работает над стабильностью."

 YUN_junta_of_many_faces: "Многоликая хунта"
 YUN_junta_of_many_faces_desc: "Объединенная больше в своей общей оппозиции таким фигурам, как Лун Юнь или Тан Цзияо, клика Мэнцзы Ху Жоюя поистине многогранна и разнообразна по своей природе. С Чжан Жуцзи, Ли Сюаньтином и различной знатью или иным образом изгнанными чиновниками, объединившимися под одним зонтиком, их управление по своей сути является актом балансирования, и все взоры обращены на Ху, чтобы увидеть, сможет ли он сохранить порядок."

 YUN_the_yunnan_dragon: "Юньнаньский дракон"
 YUN_the_yunnan_dragon_desc: "Так называемый Юньнаньский дракон из-за своего доминирования в делах провинции как при губернаторе Тане, так и после его свержения, правительство Лун Юня представляет собой эксцентричную смесь реформистов и старых революционеров, наложенную на бюрократию, где доминируют ханьцы, с армией, где доминируют и. И все же способности Луна приводят к идеальному сочетанию всех этих факторов."

 YUN_a_renewed_land_survey: "Обновленная земельная опись"
 YUN_a_renewed_land_survey_desc: "Под эгидой экономического комитета был предложен план политики перехода земельного налога на налог на обрабатываемые земли и учреждения Главного бюро землеустройства с Лу Чунжэнем в качестве генерального управляющего. Хотя он далеко не радикал, способность Лу к эффективному и прагматичному реформизму наверняка приведет к возобновлению источников дохода только от нового земельного налога."

 YUN_the_rotunda_of_finance: "Финансовая ротонда"
 YUN_the_rotunda_of_finance_desc: "При предыдущих администрациях провинциальный монетный двор находился под непосредственным контролем правительства, а не Департамента финансов. Приводя к врожденной бесхозяйственности и неэффективности, Лу Чунжэнь предложил передать управление своему финансовому департаменту. Кроме того, он надеется обучить новое поколение персонала и создать новую систему аудита."

 YUN_to_rebel_against_isolation: "Восстать против изоляции"
 YUN_to_rebel_against_isolation_desc: "Было глупой концепцией отступать дальше, чем раньше, только в провинциальные дела. Такова неотъемлемая роль, которую Юньнань должна играть в объединении Китая, что необходимо, чтобы мы участвовали в наступательных кампаниях, а не только в оборонительных. Под эгидой Лу Ханя правительство должно быть предприимчивым не только в Китае, но и в Индокитае."

 YUN_guarantee_of_stability: "Гарантия стабильности"
 YUN_guarantee_of_stability_desc: "Возможно, самым ключевым фактором правления Ху Жоюя является врожденная маскировка этого «Победоносного Хамелеона». Гибкий на всех фронтах идеологически, Ху плавал, работая с Гоминьданом, Тан Цзияо, У Пэйфу и многими другими за свою долгую карьеру, все до тех пор, пока они поддерживали его. В то время как некоторые сочли бы это отсутствием стержня, для Ху это его величайшая сила."

 YUN_security_as_a_provincial_affair: "Безопасность как дело провинции"
 YUN_security_as_a_provincial_affair_desc: "Чтобы всегда поддерживать парадигму в Юньнани, Лун Юнь давно счел местную безопасность делом провинции. Независимо от того, какую национальную политику может поддерживать или провозглашать Губернатор, внутренняя политика провинции всегда должна быть политикой безопасности и прогресса. Демократия снаружи, автократия внутри, все, что нужно для сохранения губернаторства."

 YUN_the_roots_of_a_democratic_fortress: "Корни «демократической» крепости"
 YUN_the_roots_of_a_democratic_fortress_desc: "С притоком либерально-консервативных интеллектуалов в Юньнань, наряду с ее собственным местным прогрессивным движением, провинция долгое время находилась в смятении по поводу природы демократии и ее применения в Китае. Под эгидой Короля Юньнани пусть процветают и преуспевают различные демократические организации, такие как Новая демократическая лига!"

 YUN_teaching_student_self_reliance: "Обучение студентов самодостаточности"
 YUN_teaching_student_self_reliance_desc: "В тяжелых обстоятельствах, в которых сейчас находится Китай, было много предполагаемых решений дерзкой проблемы студенческого радикализма или зависимости от стабильности государства для их будущего. Чтобы защитить нацию, такие люди, как Цунь Шушэн, начали выступать за самодостаточное «Спартанское образование». Пусть Юньнань прислушается к его методам."

 YUN_the_southwestern_metropolis: "Юго-Западная метрополия"
 YUN_the_southwestern_metropolis_desc: "Долгое время будучи ключевым городским центром китайского влияния и контроля на Юго-Западе, Куньмин стал чем-то вроде мини-мегаполиса, по крайней мере, по сравнению с большинством китайских городов. Специально культивируемый регионалистскими чиновниками, некогда в основном консульский город превратился в город с собственной бурной ночной жизнью и культурой, не испорченной войной."

 YUN_establishing_a_provincial_monopoly: "Установление провинциальной монополии"
 YUN_establishing_a_provincial_monopoly_desc: "Под эгидой Лу Чунжэня правительство начало проводить политику «использования администрации для поддержки финансов, финансов для продвижения производства и производства для обогащения финансов». Расширяя государственные предприятия, строго обеспечивая монополизацию и объединяя рынки, экономика Юньнани может быть преобразована в самодостаточную цепь."

 YUN_reorganise_the_fudian_bank: "Реорганизация банка Фудянь"
 YUN_reorganise_the_fudian_bank_desc: "В то время как щупальца финансовых кланов Юньнани проникли почти во все местные государственные предприятия, банк Фудянь доказал свою невероятную полезность и устойчивость во всех видах экономических реформ. В дальнейшем внедряя его в администрацию провинциального правительства, Юньнань объединит все крупные местные банки под одним государственным зонтиком."

 YUN_commerces_wartime_contribution: "Вклад торговли в военное время"
 YUN_commerces_wartime_contribution_desc: "Торговая палата Юньнани под руководством Мяо Юньтая долгое время была спасательным кругом экономики провинции Юньнань с 1920-х годов. И все же с избытком валюты они не внесли почти достаточного вклада в военные цели Юньнани. Выделив специальный фонд для приобретения оружия и боеприпасов, Юньнань получит в свое распоряжение новейшее международное вооружение."

 YUN_militarisation_to_save_the_nation: "Милитаризация для спасения нации"
 YUN_militarisation_to_save_the_nation_desc: "Только силой оружия китайцы могут освободиться от иностранного впечатления и национальной разобщенности. В игре эволюции выживают только сильные, и точно так же только нациям, которые могут навязывать свою волю другим, будет гарантирована скрытая безопасность. С каждой сконструированной винтовкой заряжается пуля, и с этим нация делает один шаг вперед."

 YUN_maximise_tax_revenues: "Максимизация налоговых поступлений"
 YUN_maximise_tax_revenues_desc: "Взимая специальный налог на потребление и специальный налог на бизнес, наряду с принудительным введением гербового сбора, Юньнань должна быть в состоянии собрать еще миллионы юаней со своих граждан для повторного введения в государственные предприятия. Кроме того, монополизировав продажу и транспортировку опиума, правительство может как обуздать его влияние, так и получить огромную прибыль."

###- NPA Endgame Tree -###

YUN_cai_es_dream_realised: "Мечта Цай Э реализована"
 YUN_cai_es_dream_realised_desc: "Как пропагандировал Цай Э, духовный преемник нынешнего Центрального правительства, Президент должен быть сильным, стойким, не занимающим позиции по вопросам, если только принцип центрального правительства не находится под угрозой, в то время как законодательная власть не должна иметь возможности командовать Президентом или кабинетом. Действующий Президент, безусловно, не испытывает угрызений совести, следуя такой доктрине."

 YUN_obligations_of_the_military: "Обязанности военных"
 YUN_obligations_of_the_military_desc: "Естественная роль военного человека в политике нации — быть видным участником проекта построения национального государства; они обязаны защищать нацию от всех угроз и, таким образом, имеют право или уполномочены вмешиваться в политическую сферу, если интересы нации подвергаются риску. Пока политики ссорятся, военные должны сохранять бдительность."

 YUN_the_financial_regulation_committee: "Комитет по финансовому регулированию"
 YUN_the_financial_regulation_committee_desc: "Поскольку нация пережила невыразимое количество политических и военных раздоров, она также пострадала от тяжелого экономического краха во многих секторах, наряду с крайне нерегулярной государственной финансовой сетью. Через создание нового комитета по финансовому регулированию государство начнет свое экономическое возрождение через отмену всех предыдущих экономических нарушений."

 YUN_building_a_shared_nation_state: "Построение общего национального государства"
 YUN_building_a_shared_nation_state_desc: "Именно в идеале Цай Э о государстве, об общем национальном государстве, каждый индивидуум берет на себя соответствующую ответственность за благополучие национального государства, тем самым обеспечивая его выживание. Рассматривать подрыв любого из политических институтов республики, будь то через отмену выборов или давление на ветви власти, означало бы тем самым подрывать национальное единство."

 YUN_restoring_harmony_to_the_countryside: "Восстановление гармонии в сельской местности"
 YUN_restoring_harmony_to_the_countryside_desc: "Хотя знать может противиться этому понятию, вы не можете править нацией в вечном страхе или раздоре с массами. Как предусмотрел доктор Сунь, необходимо, в некотором ретроспективном плане, проследить, чтобы принцип «Земля — пахарю» был реализован по всей стране. Однако правительство должно воздерживаться от политизации масс в этой программе, чтобы не дать возобладать революционному пылу."

 YUN_all_under_the_king: "Все под королем"
 YUN_all_under_the_king_desc: "По праву, как герой войны и глава государства, каждый отдельный министр его кабинета должен нести абсолютную ответственность перед президентом Лун Юнем; парламент должен существовать для голосования по повестке дня Президента, а не наоборот. Партийным раздорам нет места в новой Бэйянской республике, и если какие-либо партии и существуют, они должны быть полностью основаны на конституции."

 YUN_duel_of_twin_dragons: "Дуэль двух драконов"
 YUN_duel_of_twin_dragons_desc: "С разгромом всех других противников, казалось бы, что последующая волна предательств клики Дянь поглотила даже Ху Жоюя и Лу Ханя. Действующий глашатай остатков проекта государственного строительства Тан Цзияо и амбициозный авантюрный сторонник, когда-то привязанный к Лун Юню. Противостоя друг другу, несмотря на их взаимную победу, казалось бы, что раздоры нации еще не закончились."

 YUN_restraining_the_revolution: "Сдерживание революции"
 YUN_restraining_the_revolution_desc: "Солдаты не должны принимать участие в политических партиях; если они позволят себе отвлекаться и беспокоиться внешними делами, то задача руководства армиями понемногу перейдет к гражданским слабакам. Точно так же, если каждая партия будет иметь военную поддержку, то она станет ненадежным институтом. В принципе революция была хороша, но вы не можете политизировать армейских людей."

 YUN_three_trainings_and_commandments: "Три обучения и заповеди"
 YUN_three_trainings_and_commandments_desc: "С объединением нации произошло грандиозное увеличение внесудебных прав различных офицеров среднего и высшего звена, которые сами по себе стали чем-то вроде нового класса милитаристов. Чтобы восстановить строгую дисциплину и сократить коррупцию, мы должны привить добродетели честности, усердия и бескорыстия и бороться со всеми несправедливостями."

 YUN_from_flexibility_to_dynamicism: "От гибкости к динамизму"
 YUN_from_flexibility_to_dynamicism_desc: "Отсутствие конкретных идеологических убеждений могло бы рассматриваться как врожденное чувство персонализма или отсутствие плана государственного строительства, для Ху Жоюя и Лу Ханя это, возможно, их величайшая сила. Оставаясь верными идеалу аполитичных и решительных сильных людей, готовых делать прагматичный выбор, они способны неизбежно ставить в приоритет то, что лучше для нации, будь то либеральное или консервативное."

 YUN_cultivate_the_national_youth: "Культивирование национальной молодежи"
 YUN_cultivate_the_national_youth_desc: "Изначально любимый проект местных милитаристов Дянь, Юньнаньское провинциальное бюро по делам союза молодежи — идеальная модель для экстраполяции и экспорта по всей стране. Ибо будущим поколениям нужно руководство и мудрая рука, чтобы ввести их в управление будущим Китая. Таким образом, необходимо культивировать их дух через молодежные лиги и другие организации."

 YUN_chinas_melting_pot: "Китай как плавильный котел"
 YUN_chinas_melting_pot_desc: "Синтезировав вооруженные силы меньшинства И с провинциальной бюрократией большинства Хань, Лун Юнь не чужд интеграции различных культур меньшинств Китая в одно более широкое национальное целое. Точно так же он спонсировал большое расширение опер, библиотек и музеев. Оставаясь верным своему происхождению, президент Лун стремился принять новую мультикультурную идентичность для нового космополитического Китая."

 YUN_adherence_to_the_new_literati: "Приверженность новым литераторам"
 YUN_adherence_to_the_new_literati_desc: "В прошлые династии ученые когда-то поддерживались как добродетельные гражданские служащие, которые вели Китай в направлении гармоничного прогресса. Однако с Синьхайской революцией возникла новая форма престижных литераторов: интеллектуальный класс. Подверженные западным идеям или иным образом пытающиеся синтезировать их с китайской традицией, давайте еще раз прислушаемся к этим людям."

 YUN_exporting_the_dian_economic_model: "Экспорт экономической модели Дянь"
 YUN_exporting_the_dian_economic_model_desc: "В отличие от Восточного Китая, Западный Китай должен был принять свою собственную форму экономического развития: он не мог полагаться на иностранцев для строительства заводов и обучения рабочих, так как у них было мало инвестиций во внутренние районы. Таким образом, крупный бюрократический государственный аппарат, центральное планирование и государственное вмешательство в ключевые отрасли правили бал, и это будет править нацией тоже."

 YUN_on_the_issue_of_those_of_merit: "К вопросу о достойных"
 YUN_on_the_issue_of_those_of_merit_desc: "С недавним объединением нации различные ведущие милитаристы и иные командующие члены высшего командования продолжали жаловаться новому Президенту на «найм людей на государственные должности ненадлежащим образом» и «не найм тех, кто достоин». Хотя это, возможно, открытая попытка получить должности по протекции, все же необходимо, чтобы их сомнения были рассмотрены."

 YUN_restoring_auspicious_governance: "Восстановление благоприятного управления"
 YUN_restoring_auspicious_governance_desc: "В то время как ядро Чжили могло быть уничтожено приливом истории, их послушники и бездельники остаются в уголках страны: Ассамблея и Сенат, даже различные неформальные провинциальные сети Гуаньси остаются в действии. С подходящей карьерой, достойной быть Маршалом-Президентом, пусть Ху Жоюй выйдет с окраин генеалогического древа Чжили в его ядро."

 YUN_revolutionary_constitutionalism: "Революционный конституционализм"
 YUN_revolutionary_constitutionalism_desc: "Амбивалентный к истинной революционной борьбе Гоминьдана, Лу Хань, тем не менее, видит много достоинств в их идеалах и практиках. Рассуждая и понимая бедственное положение простого крестьянства и желание сильного, демократического и националистического государства, Лу может призвать мудрых людей, таких как Чжоу Чжунъюэ, чтобы способствовать реадмиссии некоторых революционеров в мейнстрим."

 YUN_the_steeled_democracy: "Закаленная «демократия»"
 YUN_the_steeled_democracy_desc: "Близкий друг многих милых демократов всех политических мастей, Лун Юнь в душе человек, рожденный в якобы демократических идеалах Синьхая. Взойдя на высшую должность во главе военного натиска, президент Лун, тем не менее, предпочитает править посредством конституционного правления. Хотя демократия может прийти не скоро, она может быть, по крайней мере, идеалом, к которому нужно стремиться."

 YUN_government_by_efficiency: "Правительство эффективности"
 YUN_government_by_efficiency_desc: "Демократы, демагоги и идеалисты страдают от непогрешимой природы веры больше в свои идеологические догматы, чем в то, что лучше для нации. И именно благодаря дальнейшему признанию их недостатков и неудач президент Лун, прагматичный и бывший, взошел на государственный пост. Через правила эффективности и прогресса Китай и его граждане будут процветать."

 YUN_protecting_chinas_foundations: "Защита основ Китая"
 YUN_protecting_chinas_foundations_desc: "Китайское национальное государство полностью зависит от своей способности заботиться, контролировать и возрождать как свой сельскохозяйственный сектор, так и окружающую среду. В то время как о крестьянстве активно заботятся, необходимо поддерживать и поля, которые они возделывают. Через региональные советы по охране природы и бюро мелиорации земель Китай никогда больше не будет страдать от голода."

 YUN_extending_a_hand_to_the_gentry: "Протягивание руки знати"
 YUN_extending_a_hand_to_the_gentry_desc: "Будучи ключевыми сторонниками многих людей, теперь близких к верхним залам центрального правительства, знать увидела, что ее положение, казалось бы, уменьшилось в свете объединения из-за характера крестьянского вопроса. Однако все еще возможно заключить взаимовыгодную сделку. Защищая знать от нестабильности, правительство заслужит их покорность."

 YUN_the_great_commandant: "Великий комендант"
 YUN_the_great_commandant_desc: "Во время своего пребывания в Китае Ху Жоюй написал много книг по современной военной теории. Среди них «Создание современной армии» и «Командующий великой армией». Очень похоже на пример, предписанный в последней, Ху сумел завоевать уважение нации как ее Великий комендант не только от своих сторонников, но и от масс."

 YUN_the_adventurous_turncoat: "Авантюрный перебежчик"
 YUN_the_adventurous_turncoat_desc: "Всегда готовый сжигать мосты в погоне за самопрославлением и бесконечными амбициями, Лу Хань наконец-то взошел, возможно, на самый высокий пост в нации. Со многими потерянными по пути, почти безрассудная натура Лу и сильно самоуверенный взгляд вызвали много нестабильности в хрупком балансе нации. И все же вечно ждет новое приключение."

