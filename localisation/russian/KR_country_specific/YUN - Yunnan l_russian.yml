#Example
 #中國國民黨中華復興社
 #CHI_crs_party: "KMT-CRS"
 #CHI_crs_party_long: "China Revival Society (Zhongguo Guomindang zhonghua fuxing she)\n§gThe China Revival Society (CRS) is a clique formed by radical officers of the National Revolutionary Army and holds close ties with Dai Chunfeng's shadowy BIS or Juntong. Led primarily by Hu Zongnan, He Zhonghan, and Deng Wenyi, the CRS emerged as a new political faction following the First National Congress and is especially popular amongst the military's young guard.\n\nTheir ideology consists of a host of influences from far-right Savinkovism, Japanese Bushido, Maximist British economic planning, but the Sorelian necessity of revolutionary cleansing violence most inspires them. The CRS sees the complex bureaucratic nature of the Kuomintang to be the party's downfall and wishes to see the party purged of its democratic elements - with the end goal of a party led by a glorious dictator (the lingxiu). From there, they envision China to be developed into a highly militarised and equal society with the notion and ideas of class struggle eradicated in favour of a completely totalitarian and socialist nation. They look to China's antiquity and its Confucian order of old as not elements of ancient history but rather a sense of halcyon tranquillity that will eventually be achieved under the rule of the benevolent lingxiu. If China is to be saved, if she is to be liberated, and if she is to become a respected mighty power once more - she will have to be revived from the ground up.§!\n"

 #NOTES - Add pinyin but without tones in parantheses.

 YUN_CSP_intro: "Китайская синдикалистская партия (КСП) была основана в 1922 году группой социалистических мыслителей, вдохновленных недавними успехами французских революционеров. В 1924 году она вступила в союз с Гоминьданом в рамках Первого объединенного фронта, что позволило ей расширить свое влияние в южном правительстве Гуанчжоу в эру милитаристов. Воодушевленная Гонконг-Кантонской забастовкой 1925 года, КСП сформировала Лигу китайских синдикалистов как широкий зонтик для китайских социалистов, не связанных напрямую с Гоминьданом, что стало высшей точкой развития их движения.\n\nЮньнаньские синдикалисты организовались в Пекинском университете в 1923 году под руководством Ли Дачжао. Братья Ван Фушэн и Ван Дэсань, вместе с другими лидерами, такими как Ли Синь и Ян Цинтянь, основали вместе с другими студентами Общество реформ Юньнани. В том же году они приняли участие в протестах 30 мая и переименовали группу в Общество «Новая Юньнань» (Синь Дянь шэ)."

 YUN_KMT_intro: "Гоминьдан был основан доктором Сунь Ятсеном после провала его громоздкого Тунмэнхоя. Партия приняла авторитарный курс, когда он потребовал клятв личной верности от всех ее членов, и сместилась влево, в сторону авангардизма, после реорганизации 1924 года. Построенная на учении доктора Суня и его культе личности, партия оказалась сильно разделенной после его смерти."

 YUN_NRA_intro: "Чтобы бороться с милитаристами, доктор Сунь потребовал создания армии, полностью лояльной партии и революции, известной как Национально-революционная армия (НРА). При помощи военных советников из Третьего Интернационала в Гуанчжоу была создана Военная академия Вампу, подготовившая поколение революционных военных офицеров."

##Primarily Totalist Parties
 #中國工團黨-政治保衛部雲南分部
 YUN_CSP_YSB_party: "КСП-ЮОО"
 YUN_CSP_YSB_party_long: "Китайская синдикалистская партия - Юньнаньский особый отдел (Чжунго Гунтуаньдан - Чжэнчжи Баовэй Бу Юньнань Фэньбу)\n§L$YUN_CSP_intro$\n\nБыл создан особый отдел КСП для координации тайных операций в Юньнани. Этот узкий круг включал многих политических и военных оперативников, обученных в Военной академии Вампу советниками из Третьего Интернационала.§!\n"

 #中國國民黨中華復興社
 YUN_KMT_CRS_party: "ГМД-ОВК"
 YUN_KMT_CRS_party_long: "Гоминьдан - Общество возрождения Китая (Гоминьдан Чжунхуа Фусиншэ)\n§L$YUN_KMT_intro$\n\nПосле краха Северного похода Ху Цзуннань откололся от Первой армии Хэ Инциня, присоединившись к ЦИК Ван Цзинвэя в Европе. Там он связался с товарищами по выпуску Вампу — Хэ Чжунханем и Дэн Вэньи, которые разделяли его разочарование состоянием партии. Приняв ультранационализм и жесткий милитаризм, Ху и Общество возрождения Китая (ОВК) взяли на вооружение революционное насилие французских сорелианцев, объявив бюрократию Партии главной причиной провала Северного похода. Неудача недавней авантюры левого комитета в Китае сломила их дело, оставив от них лишь тень былого. Однако после их принятия в новое правительство Гоминьдана, похоже, они пережили небольшое возрождение популярности. Отбросив более социалистические аспекты своей программы и подчеркивая приверженность омоложению революционной решимости Партии, они установили дружеские партнерские отношения с «Синерубашечниками» Тэн Цзе на основе общей приверженности ультранационалистическому милитаризму и тоталитаризму.§!\n"

##Primarily Syndicalist Parties
 #中國工團黨-新滇社
 YUN_CSP_NDS_party: "КСП-ОНЮ"
 YUN_CSP_NDS_party_long: "Китайская синдикалистская партия - Общество «Новая Юньнань» (Чжунго Гунтуаньдан - Синь Дянь шэ)\n§L$YUN_CSP_intro$\n\nОсновное отделение Общества «Новая Юньнань» также является преемником левой юридической и правительственной клики Юньнаньского Гоминьдана, действовавшей на базе Куньминской юридической школы. Несмотря на жесткое подавление, оно сохраняет популярность среди радикальных студентов.§!\n"

 #中國國民黨改組同志會
 YUN_KMT_WRD_SOC_party: "Общество «Мир»"
 YUN_KMT_WRD_SOC_party_long: "(Новое) Общество «Мир» (Шицзе шэ)\n§LОбщество «Мир» имеет честь быть первой организованной анархистской организацией (анархистские группы традиционно избегают называть себя партиями) в Китае. Возглавляемые «Четырьмя старейшинами» (Чжан Жэньцзе, Ли Шицзэн, У Чжихуэй и Цай Юаньпэй), эти парижские анархисты стали наставниками для многих видных деятелей Гоминьдана. Однако их влияние затмил подъем Китайской синдикалистской партии, особенно когда их отношения с другими анархистами ухудшились, и они были вынуждены отступить на свои позиции в истеблишменте Гоминьдана.\n\nХотя они понесли дальнейшую потерю влияния в Партии после краха левого правительства Гоминьдана, похоже, что полоса неудач закончилась после их вхождения в новое правительство Гоминьдана. Рассматривая КСП как своего рода политическую обузу, Национальное правительство решило поддержать Общество «Мир» в качестве главы Лиги китайских синдикалистов, чтобы сдержать их радикализм. В частности, Ли Шицзэн приобрел известность, снискав расположение в правых кругах благодаря своей недавней тщательной критике пропаганды классовой борьбы левыми членами Гоминьдана и КСП, объявив ее вредной во время борьбы Китая против иностранных империалистических держав.§!\n"

##Primarily Rad Soc Parties
 #國民黨-國民革命軍第三軍（左派）
 YUN_KMT_3AL_party: "ГМД-3АЛ"
 YUN_KMT_3AL_party_long: "Гоминьдан - 3-я армия Национально-революционной армии (левые) (Гоминьдан-Гоминьгэминцзюнь Ди Сань Цзюнь (Цзопай))\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\nТретья армия является преемницей нескольких ранних армий, связанных с южным правительством, включая Вторую армию защиты нации и Первую армию национального строительства. Она участвовала в мятеже против Гоминьдана после смерти Сунь Ятсена в 1925 году, но была полностью разгромлена.\n\nЗатем она была реорганизована в Третью армию под командованием Чжу Пэйдэ, лоялиста Юньнаньского Гоминьдана. Она отличилась на Восточном фронте Северного похода против Сунь Чуаньфана, но в конечном итоге была вынуждена отступить вместе с остальной частью НРА во время Великого похода. В Гуйчжоу Третья армия поглотила более мелкие военные силы, базировавшиеся в Юньнани под командованием Фань Шишэна и Цзинь Ханьдина, после того как Гоминьдан реорганизовался в Гуйчжоу.\n\nВ рядах Третьей армии укрывается крупная левая фракция во главе с Чжу Дэ. Хотя они и далеки от большинства, если их не контролировать, они могут вскоре узурпировать командование движением.§!\n"

 #中國國民黨改組同志會
 YUN_KMT_RCA_party: "ГМД-АТР"
 YUN_KMT_RCA_party_long: "Гоминьдан - Ассоциация товарищей по реорганизации (Умеренная фракция) (Гоминьдан - Гайцзутунчжихуэй (Вэньхэпай))\n§L$YUN_KMT_intro$\n\nАссоциация товарищей по реорганизации (АТР) была основана Чэнь Гунбо, Гу Мэнъюем и другими левыми гоминьдановцами для защиты Реорганизации 1924 года, а затем для продвижения правления их лидера: Ван Цзинвэя. Внутри АТР была разделена на радикалов под руководством Чэня, которые выступали за насильственную классовую борьбу и марксизм, и умеренных под руководством Гу, которые предпочитали классовое сотрудничество.\n\nРешение Ван Цзинвэя присоединиться к нашему правительству раскололо АТР, и многие рядовые члены осудили его как предателя. Чэнь Гунбо воздержался от прямой критики своего друга, но ушел в тень, в то время как Ван бросил свой вес на поддержку крыла Гу Мэнъюя и подчеркнул свои левонационалистические убеждения. АТР сохраняет некоторое влияние в нашей партии, особенно среди гражданской бюрократии, части интеллигенции и зарубежных отделений, но ясно, что их лучшие времена позади.§!\n"

 #中國國民黨临时行动委员会
 YUN_KMT_PAC_party: "ГМД-ВКД"
 YUN_KMT_PAC_party_long: "Гоминьдан - Временный комитет действий (Гоминьдан - Линьши синдун вэйюаньху)\n§L$YUN_KMT_intro$\n\nПосле краха Северного похода рос разрыв между Центральным комитетом в изгнании и руководством повстанцев на местах. Провал Шанхайского восстания 1932 года усугубил этот раскол и подтвердил необходимость более автономной структуры руководства в зоне Мингань. Это привело к «Декларации Сун Цинлин и Дэн Яньда революционному народу Китая и мира», которая официально объявила о создании Временного комитета действий Гоминьдана.\n\nСледуя аграрному, авангардистскому направлению социализма, его доминирование в Мингане сделало его ведущей внутренней оппозицией правлению Ван Цзинвэя. Несмотря на провал правительства Левого Гоминьдана, ВКД смог получить определенный уровень поддержки в новом правительстве Гоминьдана благодаря дружбе Дэн Яньда с Чэнь Чэном.§!\n"

 #中国国民党革命委员会
 YUN_revolutionary_committee_kuomintang_party: "ГМД-РК"
 YUN_revolutionary_committee_kuomintang_party_long: "Революционный комитет Гоминьдана (Чжунго Гоминьдан Гэминвэйюаньхуэй)\n§L$YUN_KMT_intro$\n\nОкончательные (хотя и запоздалые) победители в гражданской войне в Китае, Чжан Боцзюнь и Чжу Дэ, неожиданно стали главными лидерами Гоминьдана. Собрав различных партийных лидеров, особенно своих бывших союзников по Временному комитету действий, но не забыв привлечь полезные кадры из АТР и даже КСП, Чжан и Чжу реорганизовали партию под единым Революционным комитетом под своим контролем. Они пообещали устранить разногласия между фракциями партии и наметить третий путь, свой собственный путь, чтобы сохранить революционные ценности Китая.§!\n"

 #中國農工民主黨
 YUN_chinese_peasants_and_workers_democratic_party: "РКДПК"
 YUN_chinese_peasants_and_workers_democratic_party_long: "Рабоче-крестьянская демократическая партия Китая (Чжунго Нунгун Миньчжу Дан)\n§LБеря начало в первоначальном Прото-Временном комитете действий, основанном Чжан Боцзюнем и Тань Пиншанем в 1927 году в результате провала Северного похода, и будучи кооптированным Сун Цинлин и Дэн Яньда, многие полагали, что судьбы Таня и Чжана будут навсегда связаны с мантией Гоминьдан-ВКД. Поскольку Тань удалился в самоизгнание, чтобы возглавить гуандунское региональное отделение ВКД, а Чжан объединился с Дэном и Сун, такая судьба казалась предрешенной.\n\nИ все же, манипулируя политическим полем битвы, Чжан и его новый сообщник Чжу Дэ сумели продвинуться к новому знаковому «Третьему пути» для китайского социализма. Участвуя в дискуссиях с «Данвай» (внепартийными), такими как Демократическая лига Китая и Китайская синдикалистская партия, Чжан сумел освободиться от цепей Белого Солнца. Продвигаясь все дальше вперед, Чжан надеется привести нацию к новому демократическому социалистическому будущему, обязанному народу, а не комитету.§!\n"

##Primarily Soc Dem Parties
 #國民黨-黃埔系（左派）
 YUN_KMT_CEC_early_party: "ГМД-КВ (Левые)"
 YUN_KMT_CEC_early_party_long: "Гоминьдан - Клика Вампу [Левая фракция] (Гоминьдан-Хуанбу си (цзопай))\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\nВампу вскоре раскололась на левую и правую фракции, так как партия стремительно катилась к гражданской войне. Выбрать сторону было непросто, так как молодых курсантов обучали синкретической программе, включающей ультранационализм, социализм, японское бусидо, китайский традиционализм и революционное насилие. Чан Кайши и Дэн Яньда были двумя наиболее влиятельными военными в Академии, и каждый основал свою собственную организацию выпускников. Многие оказались на стороне Чана из-за личной преданности, но сочувствовали социальным и экономическим учениям Дэна.§!\n"

 #國民黨-國民革命軍土木系
 YUN_KMT_CEC_party: "ГМД-КГС"
 YUN_KMT_CEC_party_long: "Гоминьдан - Клика гражданского строительства Национально-революционной армии (левые) (Гоминьдан-Гоминьгэминцзюнь Туму Си)\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\nВампу вскоре раскололась на левую и правую фракции, так как партия стремительно катилась к гражданской войне. Выбрать сторону было непросто, так как молодых курсантов обучали синкретической программе, включающей ультранационализм, социализм, японское бусидо, китайский традиционализм и революционное насилие. Чан Кайши и Дэн Яньда были двумя наиболее влиятельными военными в Академии, и каждый основал свою собственную организацию выпускников. Многие оказались на стороне Чана из-за личной преданности, но сочувствовали социальным и экономическим учениям Дэна.\n\nОни организовались как Клика гражданского строительства под руководством Чэнь Чэна, который взял под контроль 18-ю армию и 11-ю дивизию («Ту Му» или «Гражданское строительство» — это визуальный каламбур, использующий китайские иероглифы номеров 11 и 18). Гордясь своей дисциплиной, популизмом и предполагаемой неподкупностью по сравнению с другими подразделениями НРА, они составляют левое крыло Клики Вампу.§!\n"

##Primarily Soc Lib Parties
 #中國國民黨再造会
 YUN_KMT_RCF_party: "ГМД-ФР"
 YUN_KMT_RCF_party_long: "Гоминьдан - Фракция реконструкции (Гоминьдан - Цзайцзао хуэй)\n§L$YUN_KMT_intro$\n\n«Клика кронпринца» была рыхлым собранием друзей и союзников (тогдашнего мэра Гуанчжоу) Сунь Фо, большинство из которых были недавними выпускниками западных университетов. Либеральная, технократическая и часто имеющая связи с богатыми спонсорами партии, она балансировала между фракциями растущего партийного раскола. После Северного похода она более формально объединилась во Фракцию реконструкции на Гавайях. Решение Сунь Фо присоединиться к нашему правительству привело с собой основную часть Фракции реконструкции, а также их мощные сети Комиссии по делам зарубежных китайцев в Юго-Восточной Азии и различных военных офицеров, связанных с Кликой Индии.§!\n"

##Primarily Mar Lib Parties
 #國民黨-（新）政學系
 YUN_KMT_PSC_party: "ГМД-КПН"
 YUN_KMT_PSC_party_long: "Гоминьдан - (Новая) Клика политической науки (Гоминьдан - (Синь) Чжэнсюэ си)\n§L$YUN_KMT_intro$\n\nПервая итерация Клики политической науки была основана в 1913 году членами Тунмэнхоя, которые отвергли требование доктора Суня о клятвах личной верности после провала Второй революции против Юань Шикая. Они создали Общество по изучению европейских дел в Токио, которое позже превратилось в Общество политической науки в 1916 году.\n\nОтвергая необходимость Северного похода для объединения Китая, они работали с южными милитаристами, такими как Цэнь Чуньсюань и Лу Жунтин, чтобы свергнуть Сунь Ятсена и его Правительство защиты конституции и способствовать переговорам о воссоединении с северным Бэйянским правительством. Когда Сунь с помощью Чэнь Цзюнмина смог изгнать Цэня и Лу из Гуандуна, а Тан Цзияо позже изгнал из Юньнани губернатора Гу Пиньчжэня, связанного с Кликой политической науки, Старая Клика политической науки фактически распалась.\n\nНовая Клика политической науки возникла из союза между Чжан Цюнем и Ян Юнтаем, которые сформировали Общество строительства Нового Китая (официальное название клики). Более лояльная Гоминьдану или, по крайней мере, более послушная, эта фракция практически не имеет массового движения, но вместо этого построена на обширных личных связях между южной банковской, интеллектуальной и бюрократической элитой Китая.§!\n"

 #國民黨- 政學系
 YUN_KMT_OLD_PSC_party: "ГМД-КПН"
 YUN_KMT_OLD_PSC_party_long: "Гоминьдан - Клика политической науки (Гоминьдан - Чжэнсюэ Си)\n§L$YUN_KMT_intro$\n\nВосставшая из пепла, хотя и не совсем мертвая, что касается Бэйянского мирового порядка, Старая Клика политической науки сумела реанимировать свою политическую значимость после бурной Эры милитаристов. Поскольку ее современники в Обществе строительства Нового Китая в конечном итоге перешли под крыло своих старших, технократы Партийного государства сплотились вокруг легендарного героя войны, ветерана и столпа Политической науки Ли Гэньюаня в надежде синтезировать свою собственную форму Опеки.§!\n"

##Primarily Soc Con Parties
 #國民黨-國民革命軍第三軍（右派
 YUN_KMT_3AR_party: "ГМД-3АП"
 YUN_KMT_3AR_party_long: "Гоминьдан - 3-я армия Национально-революционной армии (правые) (Гоминьдан-Гоминьгэминцзюнь Ди Сань Цзюнь (Юпай))\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\nТретья армия является преемницей нескольких ранних армий, связанных с южным правительством, включая Вторую армию защиты нации и Первую армию национального строительства. Она участвовала в мятеже против Гоминьдана после смерти Сунь Ятсена в 1925 году, но была полностью разгромлена.\n\nЗатем она была реорганизована в Третью армию под командованием Чжу Пэйдэ, лоялиста Юньнаньского Гоминьдана. Она отличилась на Восточном фронте Северного похода против Сунь Чуаньфана, но в конечном итоге была вынуждена отступить вместе с остальной частью НРА во время Великого похода. В Гуйчжоу Третья армия поглотила более мелкие военные силы, базировавшиеся в Юньнани под командованием Фань Шишэна и Цзинь Ханьдина, после того как Гоминьдан реорганизовался в Гуйчжоу.\n\nПравое крыло Третьей армии возглавляет Чжу Пэйдэ, но его лидерство далеко не бесспорно в их рядах. С относительно региональной повесткой дня он не рассматривается как серьезная угроза более крупными партийными силами.§!\n"

 #國民黨-莫斯科派
 YUN_KMT_MCC_party: "ГМД-КМК"
 YUN_KMT_MCC_party_long: "Гоминьдан - Клики Московского комитета (Гоминьдан-Мосыкэ Пай)\n§L$YUN_KMT_intro$\n\nПреемником Сунь Ятсена на посту генералиссимуса Военного правительства Гуанчжоу стал Ху Ханьминь, который был быстро оттеснен альянсом между Ван Цзинвэем, Чан Кайши и различными другими власть имущими. Растущая мощь левых и Китайской синдикалистской партии привела к тому, что правые фигуры в Гоминьдане умоляли Ху Ханьминя выступить против них, что и произошло на безрезультатном Четвертом пленуме. Чан встал на сторону против Ху, что привело к чистке или изгнанию его союзников.\n\nПеред Северным походом Ху и другие правые фигуры, присоединившиеся к нему, сформировали конкурирующий центральный комитет в изгнании, в конечном итоге нашедший приют в Москве. Их возвращение дало им некоторую власть над партией, которой когда-то управлял Ху, но они возмущены своей слабеющей властью в пользу своих соперников внутри партии.§!\n"

##Primarily Auth Dem Parties
 #舊滇系軍閥（殘部)
 YUN_KMT_dian_remnant_party: "Старая клика Дянь"
 YUN_KMT_dian_remnant_party_long: "Остатки Старой клики Дянь (Цзю Дянь Си Цзюньфа (Цаньбу))\n§LПосле Синьхайской революции военные стали доминировать в политике Юньнани. Первоначально возглавляемый Цай Э, Тан Цзияо сменил его после того, как первый был свергнут Юань Шикаем из-за его поддержки Сун Цзяожэня. Тан уступил власть Цаю после того, как тот сбежал во время восстановления монархии Юань Шикаем, и помогал ему возглавлять Альянс защиты нации, но снова стал губернатором после смерти Цая.\n\nХотя Тан Цзияо был убежденным демократом и федералистом, он извлек из опыта Войны в защиту республики ценный урок о том, что военные имеют право вмешиваться в гражданскую политику. Ху Жоюй принял эти уроки близко к сердцу, восстановив порядок после того, как Юньнань погрузилась в хаос после окончания гегемонии Цин и возвращения политической нестабильности в Куньмин.\n\nНовое правительство Ху Жоюя в значительной степени поддерживается только военными, хотя дворянство сотрудничает с администрацией Куньмина во имя закона и порядка. В то время как либеральные и социалистические агитаторы могут осуждать Ху Жоюя как тирана, его сторонники видят в нем оплот против хаоса и радикализма.§!\n"

 #國民黨-革命同志會浙江分社
 #YUN_KMT_zrcs_party: "KMT-ZSRC"
 #YUN_KMT_zrcs_party_long: "Kuomintang - Zhejiang Society of Revolutionary Comrades (Guomindang - Geming Tongzhi Hui Zhejiang Fenshe)\n§L$YUN_KMT_intro$\n\nDuring the Xinhai Revolution, Chen Qimei led a branch of the Tongmenghui operating out of Shanghai that coordinated revolutionary activities in the Jiangnan region. Chen partnered with his fellow Zhejiang cadres Chiang Kai-shek and Dai Jitao, along with his nephew Chen Guofu to raise money and soldiers for the revolution. Operating an illegal stock exchange and coordinating activities with nationalistic triads, he was ultimately assassinated, likely on the orders of Zhang Zongchang under the orders of Yuan Shikai. Chiang met a similar fate after a bout in leadership of the Kuomintang about a decade later. Dai Jitao, the intellectual of the group, has retreated to their old bases after the Northern Expedition and worked to rebuild their intelligence network.§!\n"

 #國民黨-CC系
 YUN_KMT_CCC_party: "ГМД-CC"
 YUN_KMT_CCC_party_long: "Гоминьдан - CC-клика (Гоминьдан-CC Си)\n§L$YUN_KMT_intro$\n\nВо время Синьхайской революции Чэнь Цимэй возглавлял отделение Тунмэнхоя, действующее из Шанхая, которое координировало революционную деятельность в регионе Цзяннань. Чэнь сотрудничал со своими товарищами из Чжэцзяна Чан Кайши и Дай Цзитао, а также со своим племянником Чэнь Гофу, чтобы собрать деньги и солдат для революции. Управляя незаконной фондовой биржей и координируя деятельность с националистическими триадами, он в конечном итоге был убит, вероятно, по приказу Чжан Цзунчана по приказу Юань Шикая. Чан встретил похожую судьбу после периода руководства Гоминьданом примерно десять лет спустя. Дай Цзитао, интеллектуал группы, отступил на их старые базы после Северного похода и работал над восстановлением их разведывательной сети.\n\nЭта тесная сеть политических оперативников превратилась в теневую клику, известную посторонним как CC-клика. Младший брат Чэнь Гофу, Чэнь Лифу, присоединился к ним в качестве видного представителя этой партийной фракции, которая доминирует в образовании, пропаганде и даже сборе разведданных.§!\n"

##Primarily Pat Aut Parties

 #國民黨-黃埔系（本流）
 YUN_KMT_WPC_party: "ГМД-КВ"
 YUN_KMT_WPC_party_long: "Гоминьдан - Клика Вампу (Основная фракция) (Гоминьдан-Хуанбу Си (Бэньлю))\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\nХэ Инцинь был ведущим инструктором в Вампу и заместителем номер один Чана в Первой армии. Революционер из Гуйчжоу, несмотря на крупную публичную ссору с Чаном, он сумел использовать свое знакомство с провинцией в период изгнания НРА, чтобы создать коллекцию лоялистов, друзей и протеже в армии, которая стала его базой власти. Консервативный военный и не особо мыслитель, он, тем не менее, предлагает определенную степень стабильности, которой иначе не хватало бы партии.§!\n"

##Primarily Nat Pop Parties

 #國民黨-國民革命軍（殘部）
 YUN_KMT_NRA_party: "ГМД-НРА"
 YUN_KMT_NRA_party_long: "Гоминьдан - Национально-революционная армия (Остатки) (Гоминьдан-Гоминьгэминцзюнь (Цаньбу))\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\nПосле провала Северного похода правое крыло Национально-революционной армии было вынуждено отступить с боями, что стало известно как Великий поход. Истощенные остатки 1-й, 2-й, 3-й, 6-й и 7-й армий добрались до своих баз в Гуйчжоу, где они объединились под властью хунты из пяти человек с Чжу Пэйдэ формально во главе. Отвлеченные конфликтами на Востоке, эти силы сумели выжить в последующие несколько лет, несмотря на растущее истощение и падение морального духа. Те, кто остался в Гуйчжоу, чрезвычайно радикализированы и жаждут мести.§!\n"

 #國民黨-黃埔系（極端派）
 YUN_KMT_BSS_early_party: "ГМД-КВ (Экстремисты)"
 YUN_KMT_BSS_early_party_long: "Гоминьдан - Клика Вампу (Экстремистская фракция) (Гоминьдан-Хуанбу Си (Цзидуань пай))\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\n«Общество Сунь Ятсена» в Вампу было ранней антисиндикалистской радикальной группой, которая обменивалась оскорблениями и ударами с левыми в кампусе. Еще больше радикализировавшись из-за предполагаемого предательства левых во время Северного похода, а также вмешательства иностранных держав, многие выпускники Вампу радикализировались в период изгнания. Они ищут решения в своем собственном ультранационализме и традициях Вампу, а также под влиянием иностранных национал-популистских групп, например, в России и Румынии, как спасти свою нацию от слабости и дегенерации.§!\n"

 #國民黨-藍衣社
 YUN_KMT_BSS_party: "ГМД-ОС"
 YUN_KMT_BSS_party_long: "Гоминьдан - Общество синерубашечников (Гоминьдан-Ланьишэ)\n§L$YUN_KMT_intro$\n\n$YUN_NRA_intro$\n\n«Общество Сунь Ятсена» в Вампу было ранней антисиндикалистской радикальной группой, которая обменивалась оскорблениями и ударами с левыми в кампусе. Еще больше радикализировавшись из-за предполагаемого предательства левых во время Северного похода, а также вмешательства иностранных держав, многие выпускники Вампу радикализировались в период изгнания. Они ищут решения в своем собственном ультранационализме и традициях Вампу, а также под влиянием иностранных национал-популистских групп, например, в России и Румынии, как спасти свою нацию от слабости и дегенерации.\n\nОрганизованное такими фигурами, как Тэн Цзе, «Общество синерубашечников» возникло из этого воинствующего национализма как тайное общество внутри НРА, посвященное построению национал-популистского государства в Китае. Фанатичные по своей природе, некоторые ставят под сомнение их сохраняющуюся лояльность генералу Хэ Инциню и даже самой партии.§!\n"

###- UPC Parties -###

 #共和大同盟
 YUN_GRA_intro: "Великий республиканский альянс (ВРА) — это квазилегальная политическая коалиция партий, в основном южнокитайских, действующая в оппозиции к установленному Бэйянскому политическому порядку. Сформированный в 1931 году после роста антиконцессионной энергии и националистической агитации вследствие провала переговоров Чжили-Фэнтянь, Великий республиканский альянс ненадолго вступил в союз с отставным Дуань Цижуем, и к нему присоединились другие «старые» федералистские группы, такие как Партия народного правительства Тан Цзияо в Юньнани и Движение за автономию Чжэцзяна Чу Фучэна, создав блок неповиновения в Национальном собрании. В значительной степени сочувствующими ВРА, но независимыми, являются Общество обновления народа Чжао Хэнти и Офис подготовки провинциальной федеральной автономии Сюн Кэу."

 #中國民主同盟
 #YUN_CDL_intro: "The China Democratic League would find its origins in the Fall of 1929, wherein after the National Assembly Elections and the resulting Harmony Association majority a group of endeavouring intellectuals would found the United National Construction League with the hopes of promoting democracy in China, albeit with the rather controversial inclusion of Zhang Bojun and Tan Pingshan. Ultimately banned in 1932 following the Shanghai Uprising, its component parties would continue to meet in the new underground Federation of Chinese Democratic Parties, without the aforementioned socialist revolutionaries.\n\nWhilst largely a force of all participating liberals and independents, including but not limited to the Political Science Clique, Chinese Constitutionalist Party, National Salvation Federation, China Vocational Education Society and Endeavour Society, the FCDP in the South would see itself coalesce and emerge from quasi-legal status to that of a fully fledged political alliance known as the China Democratic League. Including the Democratic Socialist Party, Crescent Moon Society, China National Democratic Construction Association and components of the aforementioned factions, it remains a force spearheading legitimate democracy within China."

 YUN_NPA_intro: "После Синьхайской революции военные стали доминировать в политике Юньнани. Первоначально возглавляемый Цай Э, Тан Цзияо сменил его после того, как первый был свергнут Юань Шикаем из-за его поддержки Сун Цзяожэня. Тан уступил власть Цаю после того, как тот сбежал во время восстановления монархии Юань Шикаем, и помогал ему возглавлять Альянс защиты нации, но снова стал губернатором после смерти Цая."

