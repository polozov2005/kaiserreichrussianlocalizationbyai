 YUN_KMT_hu_hanmin_crisis_PSC_zeal_tt: "§Y§MКлика политической науки§! будет работать над дерадикализацией нашего правительства, §Rснижая Националистический пыл§! пропорционально нашей популярности §MРыночных либералов§!.§!"

 YUN_KMT_hu_hanmin_crisis_CCC_zeal_tt: "§Y§aКлика CC§! будет работать над тем, чтобы придать энергии нашему правительству, §Gповышая Националистический пыл§! пропорционально нашей популярности §aАвторитарных демократов§!.§!"

 YUN_KMT_hu_hanmin_crisis_WPC_zeal_tt: "§Y§PСтарая гвардия клики Вампу§! будет работать над стабилизацией нашего режима, §cцентрируя Националистический пыл§! пропорционально нашей популярности §PПатерналистов-автократов§!.§!"

 YUN_KMT_hu_hanmin_crisis_BSS_zeal_tt: "§Y§nОбщество синерубашечников§! будет работать над радикализацией наших военных, §Rснижая Националистический пыл§! пропорционально нашей популярности §nНационал-популистов§!.§!"

 YUN_KMT_hu_hanmin_crisis_CEC_zeal_tt: "§Y§SКлика гражданского строительства§! будет работать над популяризацией наших военных, §Gповышая Националистический пыл§! пропорционально нашей популярности §SСоциал-демократов§!.§!"

 YUN_KMT_hu_hanmin_crisis_MCC_tt: "§Y§cХу Ханьминь§! и его союзники будут дестабилизировать правление §PХэ Инциня§!, доводя Националистический пыл до крайностей (либо §R$RKT_bop_unrelenting_cynicism$§!, либо §G$RKT_bop_unbridled_conviction$§!) пропорционально нашей популярности §cСоциал-консерваторов§!.§!"

 YUN_KMT_hu_hanmin_crisis_PSC_phase_2_tt: "§Y§MКлика политической науки§! будет работать над получением поддержки Временной конституции, склоняя делегатов пропорционально популярности §MРыночных либералов§!.§!"

 YUN_KMT_hu_hanmin_crisis_CCC_phase_2_tt: "§Y§aКлика CC§! будет работать над созданием поддержки вотума недоверия, склоняя делегатов пропорционально нашей популярности §aАвторитарных демократов§!.§!"

 YUN_KMT_hu_hanmin_crisis_WPC_phase_2_tt: "§Y§PСтарая гвардия клики Вампу§! будет работать над делегитимизацией как §MКлики политической науки§!, так и §aКлики CC§!, склоняя делегатов пропорционально нашей популярности §PПатерналистов-автократов§!.§!"

 YUN_KMT_hu_hanmin_crisis_BSS_phase_2_tt: "§Y§nОбщество синерубашечников§! будет работать над организацией государственного переворота, сокращая количество дней, необходимых для завершения миссии $YUN_The_Whampoa_Coup_mission$, пропорционально нашей популярности §nНационал-популистов§!.§!"

 YUN_KMT_hu_hanmin_crisis_CEC_phase_2_tt: "§Y§SКлика гражданского строительства§! будет работать над популяризацией наших военных, склоняя делегатов и сокращая количество дней, необходимых для завершения миссии $YUN_The_Whampoa_Coup_mission$, пропорционально нашей популярности §SСоциал-демократов§!.§!"

 YUN_KMT_hu_hanmin_crisis_MCC_phase_2_tt: "§Y§cПолитический совет Южного Китая§! будет настаивать на условиях примирения, которые будут благоприятствовать той или иной стороне пропорционально нашей популярности §cСоциал-консерваторов§!.§!"

 YUN_KMT_hu_hanmin_crisis_left_phase_2_tt: "§Y§RЛевый Гоминьдан§! будет настаивать на условиях примирения, которые будут благоприятствовать той или иной стороне пропорционально нашей совокупной популярности §oТоталистов§!, §rСиндикалистов§!, §RРадикальных социалистов§!, §SСоциал-демократов§! и §lСоциал-либералов§!.§!"

