## Tang Jiyao's Clique (TJY)
 #唐繼堯
 YUN_tang_jiyao: "Тан Цзияо"
 YUN_tang_jiyao_bio: "Многократно обманутый Король Юго-Запада, Тан Цзияо начал свою жизнь на пути имперского ученого. Сдав императорский экзамен, он отправился в Японию и учился в Токийской школе Цзиньбу, вскоре после этого вступив в Тунмэнхой. Окончив школу Чжэньу и отслужив в Японской армии стажером, он был принят в Японскую военную академию в 1907 году, окончив ее в следующем году вместе с Сунь Чуаньфаном, Лю Цуньхоу, Ли Гэньюанем, Ли Лецзюнем, Чэн Цянем и другими. Вернувшись домой, он служил директором Офиса генерального штаба, инструктором в Куньминской военной академии и командиром полка.\n\nОдин из ведущих заговорщиков восстания Двойной девятки, Тан помог Гуйчжоу и был избран губернатором в 1911 году. В 1913 году он подавил Вторую революцию и сменил Цай Э на посту губернатора Юньнани. В 1915 году он вместе с Ли Лецзюнем и Цай Э спланировал и инициировал Войну в защиту республики. Объединившись с Правительством защиты конституции, Тан возглавлял Цзингоцзюнь до своего свержения Гу Пиньчжэнем в 1921 году.\n\nВернувшись в 1922 году, он сотрудничал с Чэнь Цзюнмином и выступал против Северного похода. Пытаясь захватить Лянгуан после смерти Сунь Ятсена, он был отброшен Ли Цзунжэнем. Он принял заместительство лидера Партии общественных интересов в 1925 году и основал Миньчжидан, или Партию народного правительства, в 1926 году. Почти свергнутый в 1927 году, он проявил упорство и установил хрупкий баланс сил в Юньнани на долгие годы."
 YUN_tang_jiyao_leader_desc: "§YРодился:§! §L14 августа 1883 года в уезде Хуэйцзэ, провинция Юньнань, Великая Цин§!\n§YБиография:§! §L$YUN_tang_jiyao_bio$§!"
 YUN_tang_jiyao_army_chief_desc: "§YРодился:§! §L14 августа 1883 года в уезде Хуэйцзэ, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §L$YUN_tang_jiyao_bio$§!\n\n§YПримечания: Женатый на противоречиях и кажущемся лицемерии, Тан — человек, испорченный Эрой милитаристов, несмотря на свою преданность республиканизму.§!"

 #唐筱蓂
 YUN_tang_xiaoying: "Тан Сяоин"
 YUN_tang_xiaoying_leader_desc: "§YРодился:§! §L1905 год, уезд Хуэйли, провинция Юньнань, Великая Цин§!\n§YБиография:§! §LЕдинственный сын Тан Цзияо, немногие ожидали, что Тан Сяоин будет соответствовать примеру своего отца в политической известности, и все же вот он, Президент Китайской Республики. Подняв мантию своего отца, Сяоин сам был демократом немалого масштаба в Юньнани в течение многих лет. Отправленный в Японию учиться на экономическом факультете Токийского императорского университета, Тан вернулся в нацию, охваченную смутой. Послушно служа своему отцу, Сяоин организовывал важные низовые встречи Партии народного правительства в Саду семьи Тан, приглашая различных людей, таких как Чжоу Синьминь, Пан Дакуй и Цзян Лянфу, помочь в дальнейшей партийной организации ПНП.\n\nСоздав Академическую ассоциацию конституционных исследований, Тан служил ее директором и подталкивал отца к изучению более демократических средств управления. Предлагая, что перед внедрением конституционализма и федерализма народу должны быть предоставлены свобода слова и личная свобода, партиям должно быть разрешено организовываться, и что правительство, таким образом, должно сотрудничать с оппозицией, Сяоин развил тесные отношения с Демократической лигой Китая.\n\nГлава Провинциального партийного комитета Юньнани Партии народного правительства, Сяоин уникален тем, что он наладил тесные связи не только с Ло Лунцзи и Вэнь Идо, но и с Младокитайской партией, эффективно преодолевая политический разрыв между оппозицией и властью, роль, которую он надеется продолжать выполнять как президент.§!"
 YUN_tang_xiaoying_commander_desc: "§YРодился:§! §L1905 год, уезд Хуэйли, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §cПартия народного правительства§!\n§YБиография:§! §LЕдинственный сын Тан Цзияо, немногие ожидали, что Тан Сяоин будет соответствовать примеру своего отца в военной области, и увы, он получил полевое командование от отца по возвращении в Китай, что было весьма спорным вопросом в Юньнаньской армии. Отправленный в Японию учиться на экономическом факультете Токийского императорского университета, Тан в конечном итоге вернулся в нацию, охваченную смутой.\n\nИмея почти нулевое военное образование, но склонность к патриотическому долгу, Сяоин не позволил противникам отца отговорить его от военной службы. В конечном итоге непроверенный, многие с нескрываемым любопытством смотрят на относительно молодого Тана, чтобы увидеть, есть ли у экономиста то, что нужно.§!\n\n§YПримечания: Политический организатор Партии народного правительства своего отца, Тан проводит встречи в саду семьи Тан с членами Общества полумесяца и даже с Ляо Синчао от имени Младокитайской партии.§!"

 #唐继虞
 YUN_tang_jiyu: "Тан Цзию"
 YUN_tang_jiyu_sic_desc: "§YРодился:§! §L1890 год, уезд Хуэйцзэ, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LБрат Тан Цзияо, Тан Цзию окончил Школу боевых искусств Юньнаньской армии, и в 1912 году был назначен директором Бюро военной полиции Гуйчжоу своим братом. После назначения Цзияо губернатором Юньнани, Цзию последовал за ним домой и помогал брату в качестве директора Департамента полиции провинции Юньнань и командира корпуса охраны. Во время Войны в защиту республики Тан Цзию отправился в Японию и вернулся в 1916 году, чтобы служить деканом Военной академии.\n\nВ 1923 году по приказу Тан Цзияо он вошел в Гуйчжоу, чтобы спасти Лю Сяньши и изгнать Юань Цзумина. После успеха он стал губернатором Гуйчжоу, а Лю — директором Комитета военной реконструкции. В 1925 году Тан отступил в свете возвращения Юань Цзумина и вместо этого вошел в Гуанси по приказу брата.\n\nСражаясь катастрофически против Новой клики Гуанси, он вернулся побежденным и был назначен директором по обучению Юньнаньской армии. Во время попытки переворота 6 февраля Тан оставался стойким рядом с братом и сплотил свои силы для борьбы с заговорщиками. С их успехом Тан снова занял позицию правой руки при Тан Цзияо, вопреки всем обвинениям в кумовстве, которые могли бы его отговорить.§!\n\n§YПримечания: Он названый брат Си Цзыцяна и Ван Цзесю.§!"

 #孫渡
 YUN_sun_du: "Сунь Ду"
 YUN_sun_du_high_command_desc: "§YРодился:§! §L5 мая 1898 года, Лулянчжоу, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LИз дворянской семьи, Сунь Ду поступил на пехотное отделение Куньминской военной академии в 1915 году. Окончив ее в 1917 году, он затем вступил в Юньнаньскую армию. В 1922 году Сунь был повышен до главы независимого полка под прямым контролем Тан Цзияо и служил в Сычуани и Гуйчжоу, вернувшись в Юньнань в 1924 году. После этого он служил директором Юньнаньского бюро табачной и алкогольной монополии и командиром Юньнаньской провинциальной военной полиции.\n\nВо время попытки переворота 6 февраля Чжан Жуцзи, Ху Жоюя, Ли Сюаньтина и Лун Юня, Сунь занял выжидательную позицию, что оказалось разумным, учитывая, что Тан Цзияо оправился благодаря личной преданности своих подчиненных. Помогая Тану подавить заговорщиков, Сунь был повышен до директора Главного управления Союза молодежи провинции Юньнань, став правой рукой Тан Цзияо, не считая Тан Цзию.\n\nВ 1931 году Сунь был повышен до начальника штаба Юньнаньской армии за свою лояльность, и в 1931 году предложил Тану план радикального сокращения армии Юньнани, план, который был отложен из-за давления со стороны милитаристов Юньнаньской клики.§!\n\n§YПримечания: Он известен как «Маленький Чжугэ» Юньнаньской армии и юньнаньский «Генерал-конфуцианец» за свое мастерство.§!"

 #陳維庚
 YUN_chen_weigeng: "Чэнь Вэйгэн"
 YUN_chen_weigeng_commander_desc: "§YРодился:§! §L15 июня 1890 года в уезде Хуэйли, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LОкончив в 1910 году Юньнаньскую армейскую начальную школу, Чэнь Вэйгэн был принят в четвертый пехотный класс Куньминской военной академии в 1912 году и окончил ее в следующем году. В 1922 году он поступил в 15-й класс Японского армейского университета, а после этого в 1926 году служил главнокомандующим Штаба по подавлению бандитизма Юньнани. После попытки переворота 6 февраля он был назначен Тан Цзияо командиром гарнизона западной Юньнани.\n\nВ 1928 году он стал членом правительства провинции Юньнань, работая в Финансовом департаменте. Уйдя с поста в Финансовом департаменте, он занялся изучением традиционной китайской медицины, открыв «Аптеку Солнца и Луны».§!\n\n§YПримечания: Преданный гуманист, он был видным сторонником улучшения медицинского обслуживания офицеров.§!"

 #唐繼麟
 YUN_tang_jilin: "Тан Цзилинь"
 YUN_tang_jilin_commander_desc: "§YРодился:§! §L1894 год, уезд Хуэйчжао, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LОкончив Вторую армейскую подготовительную школу и Шестой инженерный корпус Баодинской армейской офицерской школы, Тан Цзилинь был назначен и служил в Юньнаньской армии. В 1927 году он служил командиром Второй дивизии Юньнаньской армии, а в 1928 году был назначен военным советником Тан Цзияо. В 1929 году он был командующим военным положением в Юньнани, а позже командиром 7-й дивизии. В 1930-х годах он был назначен членом правительства провинции Юньнань и был повышен до командира гарнизона Куньмина.§!"

 #王 修
 YUN_wang_jiexiu: "Ван Цзесю"
 YUN_wang_jiexiu_high_command_desc: "§YРодился:§! §L1892 год, Лицзян, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LУсердно учась в юности, в 1909 году Ван Цзесю был выбран для посещения Куньминской армейской начальной школы, а в 1911 году он принял участие в восстании Двойной девятки. Вскоре включенный в армию Тан Цзияо, здесь началась его долгая карьера постоянного служения и преданности. Следуя за Таном в Гуйчжоу, он вернулся в Юньнань с Таном и был снова отправлен в Куньминскую военную академию для окончания артиллерийского отделения. В 1915 году он сражался в Войне в защиту республики под началом Цай Э и был повышен Ли Юаньхуном до подполковника артиллерии по просьбе Тана.\n\nВ 1919 году он был награжден различными медалями высокого ранга и развил тесную дружбу с Си Цзыцяном и Тан Цзию, став назваными братьями. Став одним из основных подчиненных Тан Цзияо, Ван последовал за Тан Цзию на его назначение в Гуйчжоу, став командующим Первой армией. Получив приказ сражаться в Гуанси вместе с Ху Жоюем и Лун Юнем, его солдаты были окружены и уничтожены Бай Чунси.\n\nВо время переворота 6 февраля Ван колебался, почти примкнув к части Ху Жоюя, но с восстановлением Тана остался решительным с Тан Цзияо. Мастер искусства артиллерии, Ван де-факто является главой пушек Цзингоцзюнь.§!\n\n§YПримечания: Он названый брат Тан Цзию и Си Цзыцяна.§!"

 #吳學顯
 YUN_wu_xuexian: "У Сюэсянь"
 YUN_wu_xuexian_commander_desc: "§YРодился:§! §L1887 год, уезд Тунхай, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LМестный главарь бандитов Юньнани, в первые годы Республики У Сюэсянь сформировал банду, чтобы конкурировать с другим главарем бандитов, Юй Ином, за права на воду. В этой борьбе он накопил большое количество людей, оружия, валюты и власти в южной Юньнани. Чтобы раздавить У, Тан Цзияо послал солдат Ван Цзесю и Тань Шаоцина разобраться с ним, но У удалось стать сильнее и даже победить офицеров. В 1919 году он был завербован Тан Цзияо, участвуя в церемонии в стиле триады, чтобы скрепить их союз.\n\nС его новообретенной властью У убил Юй Ина и был назначен капитаном Юньнаньской армии. Сражаясь в Войне в защиту республики, он был ранен в ногу и в конечном итоге безуспешен в большей части конфликта. В конце 1920 года, после успешного переворота Гу Пиньчжэня, У начал партизанскую кампанию против Гу, ожидая возвращения Тана.\n\nСделав первый вклад в возвращение Тана в 1922 году, и, что наиболее важно, убив Гу Пиньчжэня позже. Следуя за Тан Цзию и Чжан Жуцзи для атаки на Лянгуан, он потерпел поражение. Во время переворота 6 февраля У оказался решающим в борьбе против заговорщиков переворота. За свою постоянную лояльность У был повышен и продолжил вялые рейды против клики Мэнцзы.§!"

 #習自強
 YUN_xi_ziqiang: "Си Цзыцян"
 YUN_xi_ziqiang_commander_desc: "§YРодился:§! §L1894 год, Лицзян, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LЧлен этнической группы Наси, Си Цзыцян был выбран для посещения Юньнаньской армейской начальной школы благодаря отличной успеваемости и сильному телосложению. В 1909 году он был принят в Военную академию Юньнаньской армии и окончил ее, затем принял участие в восстании Двойной девятки. В 1912 году он прошел переподготовку в академии и участвовал в Войне в защиту республики, Движении в защиту конституции и других революционных движениях. Служа с отличием, он стал очень близок с Ван Цзесю.\n\nПолагая, что Си Цзыцян лоялен и находчив, а Ван Цзесю серьезно относится к своей работе, Тан Цзияо постепенно стал благоволить дуэту как своим самым доверенным подчиненным. В 1919 году он стал главой полка личной охраны и был отправлен на Японский флот для обучения. Проучившись один год, он вернулся в Юньнань. В 1922 году он был переведен в Офис посланника Юго-Восточного тура, с Тан Цзияо в качестве его начальника штаба.\n\nВ 1923 году он служил начальником штаба Тан Цзияо во время его пребывания на посту губернатора Гуйчжоу. В 1925 году он был начальником инженерного отдела Куньминской военной академии, а позже губернатором Тэнъюэ. Обойдя борьбу за власть переворота 6 февраля в 1927 году, Си стал начальником штаба Офиса по умиротворению Юньнань-Гуйчжоу и одним из сторонников Тана.§!\n\n§YПримечания: Он названый брат Тан Цзию и Ван Цзесю.§!"

 #章炳麟
 YUN_zhang_taiyan: "Чжан Тайянь"
 YUN_zhang_taiyan_sic_desc: "§YРодился:§! §L12 января 1869 года в уезде Юйхан, провинция Чжэцзян, Великая Цин§!\n§YПриверженность:§! §cПартия народного правительства§!\n§YБиография:§! §LОдин из величайших политиков-реформаторов Китая и отец федералистского движения, Чжан Тайянь, также известный как Чжан Бинлинь, происходил из богатой семьи ученых. После небольшой заминки в своей научной карьере он продолжил учиться у различных интеллектуалов и философов. В 1894 году он пожертвовал деньги реформистскому Обществу Цянсюэ и начал переписку с Кан Ювэем и Лян Цичао. Служа главным редактором Шиу Бао по приглашению Ляна, он был редактором всего 4 месяца, прежде чем вступить в драку из-за конфуцианства.\n\nСвязываясь с более консервативными реформистами после этого, он бежал после окончания Стодневных реформ 1898 года и работал репортером в Японском Тайване. Сочувствуя Кану и Ляну, он встретил Сунь Ятсена через Ляна в Токио и начал интенсивно фокусироваться на антиманьчжурских писаниях. Связанный с Тунмэнхоем, он выступал за революционную мораль и откололся от Суня в 1909 году. После Синьхая он недолго помогал Юань Шикаю, прежде чем был им заключен в тюрьму, и уехал в Шанхай только после смерти Юаня в 1916 году.\n\nВ 1917 году он запустил Движение в защиту конституции с Сунь Ятсеном и призвал Тан Цзияо взять на себя ведущую роль. Выступая против мирных переговоров между севером и югом, он начал выступать за федеральную автономию в 1920 году наряду с Сюн Силином и Чжан Шичжао и постоянно надеялся, что Бэйян реформируется к лучшему, даже в свете Гоминьдана. Помогая основать Партию народного правительства в 1926 году, он является одним из самых больших интеллектуальных вдохновителей Тан Цзияо.§!\n\n§YПримечания: Как один из отцов-основателей федералистского движения и один из последних старых реформаторов, его карьера была образцовой.§!"

 #汪東
 YUN_wang_dong: "Ван Дун"
 YUN_wang_dong_sic_desc: "§YРодился:§! §L1890 год, уезд У, провинция Цзянсу, Великая Цин§!\n§YПриверженность:§! §cПартия народного правительства§!\n§YБиография:§! §LОтправившись в Японию учиться в 1904 году, он поступил в школу Сэйджо; затем на подготовительный курс Университета Васэда, а после выпуска поступил в Школу философии. В то же время Ван вступил в Тунмэнхой и работал писателем для Миньбао. В 1908 году он изучал филологию под руководством Чжан Тайяня, став одним из четырех учеников Чжана, и вернулся в Китай в 1910 году, чтобы служить в Синьхайской революции. В 1912 году он был писателем для «Грейт Репаблик Дэйли» и членом «Южного общества», антибэйянской организации.\n\nВ 1913 году он был заместителем в Министерстве внутренних дел, а в 1923 году основал ежемесячник Хуаго с Чжан Тайянем и другими. В 1925 году он был секретарем губернатора Цзянсу, в следующем году он помог в создании Партии народного правительства, а в 1927 году был нанят профессором в Университет Сунь Ятсена, должность, которую он в конечном итоге не смог занять.\n\nПереведенный в Юньнаньский университет после Шанхайского восстания, он стал деканом Колледжа искусств и считается интеллектуальным преемником Чжан Тайяня, выступающим за конституционалистскую, конфедералистскую китайскую демократию.§!"

 #汪荣宝
 YUN_wang_rongbao: "Ван Жунбао"
 YUN_wang_rongbao_advisor_desc: "§YРодился:§! §L1878 год, уезд У, провинция Цзянсу, Великая Цин§!\n§YПриверженность:§! §cПартия народного правительства§!\n§YБиография:§! §LВ возрасте 15 лет Ван Жунбао был рекомендован для учебы в Нанкинской академии, а позже сдал императорский экзамен, прошел и поступил в Военное министерство. После провала Движения 100-дневных реформ 1898 года Ван попросил отпуск со своей должности и вернулся домой. Став учителем в Наньянской общественной школе в Шанхае, он отправился в Японию учиться в Университете Васэда и Университете Кэйо в 1901 году, специализируясь на праве и политике.\n\nУчаствуя в создании Молодежной ассоциации, прото-тунмэнхойской организации, он постепенно перешел к реформистскому мышлению и вернулся в Китай, чтобы служить в бюрократии. Ключевая фигура конституционалистов в Пекине и член Прогрессивной партии, он помогал Юань Шикаю в роспуске Цин. Служа членом Временного сената, а затем Ассамблеи, он стал министром в Бельгии, членом Комитета по разработке конституции и представителем на Версальском мирном договоре.\n\nЗатем став министром в Швейцарии, он стал министром в Японии в 1922 году и в конечном итоге ушел в отставку со своей должности в 1932 году в знак протеста против обращения с Шанхайским восстанием. Соратник Лян Цичао, Ван привержен реформистской политике и защите конституционного правительства, наиболее представленного Партией народного правительства.§!\n\n§YПримечания: Он брат Ван Дуна, одного из соратников Чжан Тайяня в Партии народного правительства.§!"

 #董泽
 YUN_dong_ze: "Дун Цзэ"
 YUN_dong_ze_advisor_desc: "§YРодился:§! §L1888 год, уезд Юньлун, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §cПартия народного правительства§!\n§YБиография:§! §LВ 1907 году Дун Цзэ поступил в Первоклассную сельскохозяйственную школу Юньнаньской императорской академии, а в следующем году получил государственное финансирование для обучения в Японии, поступив в Токийский колледж Тунвэнь. Вступив в Тунмэнхой в этот период, он вернулся в Китай во время Синьхая, чтобы сражаться в революции, непосредственно участвуя в нападении на офис губернатора Нанкина. Вернувшись в Юньнань, он служил секретарем Цай Э и был рекомендован им для учебы в Соединенных Штатах.\n\nПоступив в Колумбийский университет в 1912 году для изучения политики, экономики и образования, он вернулся в Юньнань для участия в Войне в защиту республики, служа секретарем Офиса военного губернатора защиты нации и связным в Гонконге. После победы АЗР он вернулся в Соединенные Штаты, чтобы получить степень магистра.\n\nВернувшись в Китай в 1920 году, он стал директором подготовительного офиса Университета Дунлу в 1922 году и директором Департамента образования. Нанимая много известных людей для работы в университете, он выступал за демократическое управление школой и различные другие прогрессивные образовательные реформы. Дун вступил в Партию народного правительства в 1926 году при ее основании и продолжил свою роль директора Департамента образования.§!"

 #虛雲
 YUN_xu_yun: "Сюй Юнь"
 YUN_xu_yun_advisor_desc: "§YРодился:§! §L1864 год, уезд Цзиньцзян, провинция Фуцзянь, Великая Цин§!\n§YПриверженность:§! §aКлика Тан Цзияо§!\n§YБиография:§! §LПервоначально рожденный как Сяо Гуянь, мастер Сюй Юнь развил глубокую привязанность и интерес к буддизму с юных лет. В возрасте 17 лет он был женат отцом на двух женах, чтобы помешать ему стать монахом, однако он тем не менее стал им в храме Юнцюань в Фучжоу вместе со своими женами. Путешествуя по большей части страны и буддийскому миру в начале 1900-х годов, Сюй Юнь был посредником в конфронтации между Шанхайской буддийской ассоциацией и Нанкинской ассоциацией Датун в 1911 году.\n\nВстретившись с Сунь Ятсеном, чтобы обсудить возрождение устава Буддийской ассоциации, он отправился в Пекин, чтобы встретиться с Юань Шикаем, и Буддийская ассоциация Китая была реорганизована в Китайскую буддийскую федерацию. Близкий соратник и советник Цай Э, он договорился о мирном разрешении юньнаньско-тибетской войны в 1913 году, а в 1920 году восстановил храм Хуатин в Куньмине.\n\nПользующийся большим уважением и восхищением Тан Цзияо, Сюй Юнь имеет символический голос при метафорическом дворе Тан Цзияо, причем последний всегда по крайней мере учитывает его мудрость.§!\n\n§YПримечания: Его фактическая дата рождения плохо задокументирована. Хроники указывают даты от 1840-х до 1870-х годов.§!"

## Crescent Moon Society (CMS)

 #罗隆基
 YUN_luo_longji: "Ло Лунцзи"
 YUN_luo_longji_bio: "Известный ученый новой эры интеллектуалов и вундеркинд, Ло Лунцзи начал свою академическую карьеру в Подготовительной школе Цинхуа для обучения в Соединенных Штатах в 1913 году. В 1919 году он стал ведущей фигурой Студенческого движения Ноябрьского бунта, а в 1921 году наконец отправился в Соединенные Штаты учиться. Поступив в Висконсинский университет, а затем в Колумбийский университет для изучения политологии, он окончил его и поступил в Лондонскую школу экономики и политических наук из-за своего личного увлечения Ласки, получив докторскую степень в этой области и став любимым учеником последнего.\n\nВернувшись в Китай в 1928 году, он преподавал в Шанхайском университете Гуанхуа и основал книжный магазин и журнал «Полумесяц», выступая в качестве главного редактора. Публикуя политические статьи в том, что номинально предназначалось быть журналом литературы и анализа прозы, он вызвал много гнева и напряг отношения со своими более склонными к писательству товарищами, такими как Сюй Чжимо, но тем не менее продолжил свой крестовый поход против авторитаризма в стране.\n\nВ 1933 году на Ло было совершено покушение из-за его врожденной противоречивости, и он был уволен из публикации И Ши Бао, бежав во внутренние районы. Продвигая гуманистическое, либеральное, но современное консервативное видение для Китая, вдохновленное англо-американскими писателями и системами, Ло Лунцзи служит неформальным лицом Общества полумесяца, собрания его друзей, которое превратилось в политический рупор."
 YUN_luo_longji_leader_desc: "§YРодился:§! §L30 июля 1896 года в уезде Аньфу, провинция Цзянси, Великая Цин§!\n§YБиография:§! §L$YUN_luo_longji_bio$§!"
 YUN_luo_longji_advisor_desc: "§YРодился:§! §L30 июля 1896 года в уезде Аньфу, провинция Цзянси, Великая Цин§!\n§YПриверженность:§! §lОбщество полумесяца§!\n§YБиография:§! §L$YUN_luo_longji_bio$§!\n\n§YПримечания: Он еще один близкий друг Ху Ши.§!"

 #寸樹聲
 YUN_cun_shusheng: "Цунь Шушэн"
 YUN_cun_shusheng_bio: "Получив частное образование в юном возрасте, Цунь Шушэн был прилежным и активным учеником, обладал воображением и был похвален своим директором за амбиции. В 1918 году он отправился в Японию учиться в Восточноазиатской подготовительной школе, Токийской высшей нормальной школе и на экономическом факультете Факультета искусств и литературы Императорского университета Кюсю.\n\nПолучив степень бакалавра экономики, он вступил в Общество созидания во время своего пребывания в Японии, а в 1928 году вступил в Исследовательское общество социальных наук, организованное китайскими студентами, обучающимися в Японии и на Тайване. Служа их главным писателем, он исследовал и продвигал социалистическую теорию, даже опекая некоего Ай Сыци. С наступлением иностранного влияния на Китай он покинул Японию в 1931 году, чтобы преподавать в Школе права и бизнеса в Пекинском университете.\n\nПосле восстания Лиги и репрессий против интеллектуалов Цунь отступил во внутренние районы, позже участвуя во Всемирном форуме Син Сипина и присоединившись к Федерации национального спасения через Ма Сюйлуня. Приглашенный в Юньнань Ло Лунцзи, он стал центром сплочения для левого крыла Общества полумесяца. Жаждая союза с социалистами, он оказался в дружеских разногласиях с либеральными консерваторами Общества, но продолжает настаивать на единстве."
 YUN_cun_shusheng_leader_desc: "§YРодился:§! §L25 сентября 1896 года в уезде Тэнчун, провинция Юньнань, Великая Цин§!\n§YБиография:§! §L$YUN_cun_shusheng_bio$§!"
 YUN_cun_shusheng_advisor_desc: "§YРодился:§! §L25 сентября 1896 года в уезде Тэнчун, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §lОбщество полумесяца§!\n§YБиография:§! §L$YUN_cun_shusheng_bio$§!\n\n§YПримечания: Как учитель, он считает, что строгая спартанская подготовка необходима и полезна для китайской молодежи, обремененной тысячелетними традициями.§!"

 #苏鸿纲
 YUN_su_honggang: "Су Хунган"
 YUN_su_honggang_sic_desc: "§YРодился:§! §L1878 год, в Цзиньнине, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §lОбщество полумесяца§!\n§YБиография:§! §LУсердно учась в детстве, Су Хунгана учили всегда быть добрым, несмотря ни на какие трудности, и такое учение осталось с ним, глубоко повлияв на его жизнь и мышление. Сдав императорский экзамен в возрасте 16 лет, он преподавал в местной начальной школе и был принят в Высшую школу провинции Юньнань в 1903 году. В 1908 году он участвовал в Ассоциации выпускников Юньу в Куньмине, занимаясь антицинской деятельностью. Во время Синьхая Су посвятил себя делу просвещения народа через образование и с окончательного одобрения министра образования в 1919 году основал частную школу.\n\nУправляя школой заботливым, вдумчивым и эгалитарным образом, она расширилась, включив в себя два класса средней школы и два класса начальной школы, с дополнительным отделением неполной средней школы. Служа директором, он обучил целое поколение жителей Юньнани, не получая дополнительной зарплаты.\n\nС отступлением различных ученых во внутренние районы Су начал общаться с их реформистскими и прогрессивными кругами, став неформальным членом Общества полумесяца на Юго-Западе. Однако, не решаясь играть в политику, он гораздо больше стремится сосредоточиться на образовании, социальных вопросах и правах человека.§!\n\n§YПримечания: Он близкий друг Вэнь Идо и Ли Гунпу.§!"

 #梁实秋
 YUN_liang_shiqiu: "Лян Шицю"
 YUN_liang_shiqiu_advisor_desc: "§YРодился:§! §L6 января 1903 года в уезде Дасин, провинция Чжили, Великая Цин§!\n§YПриверженность:§! §lОбщество полумесяца§!\n§YБиография:§! §LВ 1915 году молодой Лян Шицю был принят в Университет Цинхуа по договоренности своего отца. Зачисленный в подготовительный класс для обучения в Соединенных Штатах, он стал близким другом Вэнь Идо и завязал короткую дружбу с Обществом созидания. Во время 4 ноября Лян был активным участником школьного движения. В 1923 году он отправился в Соединенные Штаты учиться в Колледж Колорадо, а в 1924 году окончил его, чтобы учиться в Гарварде. По пути он стал соучредителем группы писателей-националистов Общество Дацзян вместе с Вэнь Идо, Ло Лунцзи, Хэ Хаожо, У Цзинчао и другими.\n\nУчась на степень магистра в Гарвардском университете, он попал под влияние Нового гуманизма Бэббита и получил степень доктора философии. Вернувшись в Китай в 1926 году, он преподавал в Национальном юго-восточном университете, Университете Циндао и был директором Департамента иностранных языков наряду с библиотекой Пекинского нормального университета. В 1927 году он основал книжный магазин «Полумесяц» вместе с Сюй Чжимо и Вэнь Идо и преподавал в Университете Цзинань.\n\nМежду 1927 и 1936 годами Лян участвовал в серии интеллектуальных дебатов с различными левыми писателями, а именно Лу Синем, из-за своей критической позиции по классовой теории и продвижения современного консерватизма. После Шанхайского восстания Лян по собственной воле отправился во внутренние районы.§!\n\n§YПримечания: Он близкий друг Ху Ши, и они обмениваются диалогами о своих планах перевести Шекспира.\nЛу Синь оскорбил его как просто «Ученика Бэббита».§!"

 #聞一多
 YUN_wen_yiduo: "Вэнь Идо"
 YUN_wen_yiduo_sic_desc: "§YРодился:§! §L24 ноября 1899 года в уезде Сишуй, провинция Хубэй, Великая Цин§!\n§YПриверженность:§! §lОбщество полумесяца§!\n§YБиография:§! §LВ 1910 году Вэнь Идо и его двоюродные братья отправились в Учан учиться, посещая среднюю школу при Лянхуской нормальной школе. В 1912 году он был принят в школу Цинхуа в Пекине, заняв второе место среди всех студентов Хубэя. Очарованный древней китайской поэзией, он начал публиковать серию заметок о чтении в «Цинхуа Уикли». Создавая классическую поэзию, он активно участвовал в Студенческом движении 4 ноября и представлял школу на Конференции Национальной федерации студентов в Шанхае.\n\nВ 1920 году он опубликовал свою первую статью на народном китайском языке и свое первое стихотворение в новом стиле, «Западный берег». В 1921 году он окончил Цинхуа и основал Литературное общество Цинхуа с Сюй Чжимо, Лян Шицю и другими. В том же году он начал систематически изучать теорию метрического стихосложения современной поэзии, написав «Исследование регулярного стиха», весьма спорную работу.\n\nВ 1922 году он учился в Художественном институте Чикаго в Соединенных Штатах, а по возвращении в 1925 году служил профессором в Университете Сунь Ятсена и Пекинском художественном колледже. Участвуя в антисиндикалистских университетских группах, основанных Ли Хуаном, он стал деканом Факультета искусств Национального университета Циндао. Точно так же являясь ключевым членом книжного магазина «Полумесяц», он был изгнан из Национального университета Циндао из-за студенческого бунта.§!\n\n§YПримечания: Романтик и один из самых плодовитых поэтов и педагогов Китая, его поэзия взывает к национализму в его лучшем проявлении.§!"

 #葉公超
 YUN_ye_gongchao: "Е Гунчао"
 YUN_ye_gongchao_advisor_desc: "§YРодился:§! §L20 октября 1904 года в Цзюцзяне, провинция Цзянси, Великая Цин§!\n§YПриверженность:§! §lОбщество полумесяца§!\n§YБиография:§! §LПоступив в среднюю школу Нанькай в Тяньцзине в 1918 году, молодой Е Гунчао отправился в Соединенные Штаты в 1920 году и получил степень бакалавра в Массачусетском университете. Позже он отправился в Великобританию и получил степень магистра литературы в Кембриджском университете в 1924 году. Покинув Великобританию, он отправился в аспирантуру Парижского университета для исследований и вернулся в Китай в 1926 году, чтобы стать лектором на кафедре английского языка Пекинского университета.\n\nВ 1927 году он участвовал в создании книжного магазина «Полумесяц» и служил директором Департамента иностранной литературы и директором библиотеки Университета Цзинань, одновременно работая профессором английской литературы в Усунской китайской общественной школе. В 1929 году он служил профессором Департамента иностранной литературы Университета Цинхуа, а после жестокого подавления Шанхайского восстания отступил во внутренние районы со своими старыми коллегами из «Полумесяца».§!\n\n§YПримечания: Вэнь Идо в шутку называл его «Эрмаоцзы» из-за его владения английским языком и отсутствия такового в китайском.§!"

 #何浩若
 YUN_he_haoruo: "Хэ Хаожо"
 YUN_he_haoruo_army_chief_desc: "§YРодился:§! §L16 марта 1899 года в уезде Сянтань, провинция Хунань, Великая Цин§!\n§YПриверженность:§! §lОбщество полумесяца§!\n§YБиография:§! §LПоступив в школу Цинхуа в Пекине в 1913 году, Хэ Хаожо отправился в Соединенные Штаты учиться в 1920 году и поступил в Стэнфордский университет. В 1923 году он поступил в Висконсинский университет для изучения экономики, получив докторскую степень по философии. Позже Хэ поступил в Военную академию Лоу для изучения кавалерии, а в 1926 году вернулся в Китай, чтобы служить инструктором в Военной академии Вампу. После начала Северного похода он служил начальником штаба 46-й армии Национально-революционной армии.\n\nБлагодаря хитрому дезертирству через интриги федералистов в лагере Сунь Чуаньфана, Хэ был нанят в 1928 году профессором в Университет Цзиньлин, а в 1932 году был приглашен Чжао Хэнти служить в правительстве провинции Хунань. Будучи связанным с Обществом Дацзян во время своего пребывания в Соединенных Штатах, Хэ воссоединился со своими старыми коллегами в их новом Обществе полумесяца, в частности, как один из немногих членов с каким-либо военным опытом.§!"

###- NPA Characters -###

## Long Yun Clique (LYC)

 #龍雲
 YUN_long_yun: "Лун Юнь"
 YUN_long_yun_bio: "Член этнической группы И и родившийся в семье землевладельца с рабовладельческим наследием, Лун Юнь не мог научиться читать в юном возрасте, и поэтому был отправлен в Чжаотун со своим двоюродным братом Лу Ханем учиться. Встретив Цзо Жохэна, трое стали известны как «Три мушкетера Чжаотуна» и ненадолго присоединились к Сычуаньской армии, прежде чем вступить в Юньнаньскую армию. Вернувшись, чтобы поступить в Куньминскую военную академию с Лу Ханем, он окончил ее и был приписан к местному батальону. Женившись на Ли Пэйлянь, он сражался в Войне в защиту республики в качестве адъютанта Тан Цзияо. В 1916 году он стал начальником личной охраны Тан Цзияо и сопровождал его почти везде.\n\nВ 1921 году Гу Пиньчжэнь изгнал Тан Цзияо из Юньнани, и Лун Юнь лично сопроводил его в Гуанси и был на передовой, возвращая Юньнань для Тана в 1922 году. Назначенный командующим 5-й армией Цзингоцзюнь в 1923 году, он снова был на передовой за Тан Цзияо в 1925 году, сражаясь с Новой кликой Гуанси, но был окружен Бай Чунси и почти убит.\n\nВернувшись в 1927 году и будучи крайне недовольным тем, что все, что он сделал для Тана, было напрасно, он начал переворот 6 февраля с Ху Жоюем, Чжан Жуцзи и Ли Сюаньтином. Почти преуспев, лояльность командиров Тана привела к тому, что Лун был заключен в Чжаотуне. Тем не менее, намереваясь держать ключи от замка, Лун Юнь превратил Чжаотун и регион, который он контролировал, в сияющий город на холме внутри Юньнани, и благодаря своим связям внутри Юньнаньской клики все еще сохраняет значительное влияние."
 YUN_long_yun_leader_desc: "§YРодился:§! §L19 ноября 1884 года в Чжаотуне, провинция Юньнань, Великая Цин§!\n§YБиография:§! §L$YUN_long_yun_bio$§!"
 YUN_long_yun_sic_desc: "§YРодился:§! §L19 ноября 1884 года в Чжаотуне, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §gКлика Лун Юня§!\n§YБиография:§! §L$YUN_long_yun_bio$§!\n\n§YПримечания: Модернизатор в первую очередь, Лун, как известно, заигрывал с демократами Третьего пути, чтобы выступить против Тан Цзияо.§!"

 #盧漢
 YUN_lu_han: "Лу Хань"
 YUN_lu_han_bio: "Двоюродный брат и друг детства Лун Юня, Лу Хань вступил в армию Вэй Хуаньчжана в Сычуани с Луном, участвуя в Синьхайской революции. Принятый в четвертый пехотный класс Куньминской военной академии в 1912 году с Луном, он окончил ее в 1914 году и был назначен в Юньнаньскую армию. Сражаясь в Войне в защиту республики, он служил в Сычуани под началом Цай Э, а после этого служил командиром взвода в Юньнаньской армии, расквартированной в Сычуани. После изгнания Юньнаньской армии в 1920 году он служил главным адъютантом в офисе губернатора Тан Цзияо и решительно поддерживал его в свете переворота Гу Пиньчжэня.\n\nС возвращением Тана Лу стал командиром личной охраны Тана и сражался в Гуанси под командованием Лун Юня. Почти полностью окруженный, Лу Хань работал с Ху Жоюем, Чжан Жуцзи, Ли Сюаньтином и Лун Юнем в попытке свергнуть Тана в 1927 году, но из-за ее провала был вынужден уйти в Чжаотун. Сидя сложа руки, он считался главным подчиненным Лун Юня."
 YUN_lu_han_leader_desc: "§YРодился:§! §L6 февраля 1895 года в Чжаотуне, провинция Юньнань, Великая Цин§!\n§YБиография:§! §L$YUN_lu_han_bio$\n\nЛу Хань выступил против Лун Юня, отчасти из-за решения Луна назначить к власти бывших сторонников Тан Цзияо, но более непосредственно из-за попытки Луна централизовать власть вокруг себя. Дерзкий генерал затем предал Ху Жоюя, в свою очередь, позволив ему захватить контроль, используя бывшие ресурсы своего родственника.§!"
 YUN_lu_han_sic_desc: "§YРодился:§! §L6 февраля 1895 года в Чжаотуне, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §gКлика Лун Юня§!\n§YБиография:§! §L$YUN_lu_han_bio$§!\n\n§YПримечания: Хотя он близкий друг и родственник Лун Юня, он не обязательно лоялен.§!"

 #張衝
 YUN_zhang_chong: "Чжан Чун"
 YUN_zhang_chong_high_command_desc: "§YРодился:§! §L25 января 1901 года в уезде Луси, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §gКлика Лун Юня§!\n§YБиография:§! §LЧлен этнической группы И, молодой Чжан Чун посещал частную школу, а позже начальную школу в своем местном уезде. Погруженный в революционные настроения с юных лет, Чжан развил сильную симпатию к крестьянству и рабочему классу, сражаясь в местном ополчении против бандитов. К сожалению, из-за его антипомещичьих настроений он был почти арестован в 1918 году и вынужден вести жизнь бандита. Больше похожий на мстителя, сражающегося против местных тиранов и злой знати, он стал своего рода местным народным героем и сумел много раз превзойти провинциальные силы.\n\nВместо этого завербованный Тан Цзияо, он служил командиром полка в Юньнаньской армии. Поддержав попытку переворота против Тан Цзияо со стороны Лун Юня, Ху Жоюя, Чжан Жуцзи и Ли Сюаньтина, Чжан был выдвинут на должность командира 5-й дивизии, но из-за провала переворота был вместо этого вынужден уйти в Чжаотун с остальными последователями Лун Юня. Стремясь сохранить свою популистскую жилку и помочь людям, Чжан участвовал в местных усилиях по реформированию вокруг Чжаотуна, намереваясь превратить его в своего рода образцовый уезд.§!"

 #李培炎
 YUN_li_peiyan: "Ли Пэйянь"
 YUN_li_peiyan_advisor_desc: "§YРодился:§! §L1886 год, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §gКлика Лун Юня§!\n§YБиография:§! §LОдин из последних студентов Юньнани, получивших государственную стипендию в поздней Цин, Ли Пэйянь занял первое место на провинциальном экзамене и служил под началом Чжан Хангао. В 1915 году он был первым директором своей местной средней школы и был очень любим местными жителями. В 1917 году он был избран вторым провинциальным сенатором и одновременно служил генеральным управляющим уезда Лулян, хотя позже был уволен из-за обвинений в коррупции и был заключен в тюрьму.\n\nВ 1922 году, после того как его сестра Ли Пэйлянь вышла замуж за Лун Юня, он был освобожден из тюрьмы и возобновил свои обязанности. Назначенный директором Бюро пограничной соли Кайгуан Юань Цзягу, Ли решительно поддерживал Лун Юня во время слухов о перевороте 1927 года, и, будучи выдвинутым на должность президента Нового банка Юньнань Фудянь, он вместо этого был переведен на должность комиссара по транспортировке соли Юньнани. Построив ряд водосберегающих, образовательных, медицинских и промышленных объектов в Биньчуане, он медленно накопил богатство и власть в Юньнани.§!\n\n§YПримечания: Он косвенно связан с Лун Юнем как его шурин.§!"

 #李培天
 YUN_li_peitian: "Ли Пэйтянь"
 YUN_li_peitian_sic_desc: "§YРодился:§! §L1895 год, Биньцзюй, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §gКлика Лун Юня§!\n§YБиография:§! §LСтарший брат Ли Пэйяня, Ли Пэйтянь посещал и окончил Юньнаньскую провинциальную среднюю школу № 1 и отправился в Японию изучать политологию и экономику в Университете Васэда. После окончания он вернулся в Китай и преподавал в Пекинском университете политологии и права. В 1921 году он вернулся в Куньмин и служил главой Отдела образования Офиса надзора провинциального правительства Юньнани. В 1928 году он был назначен уездным магистратом Чэнцзяна.\n\nВ 1931 году в Шанхае был основан «Частный культурный колледж», и Ли был назначен президентом. Однако через три года он был закрыт из-за финансовых трудностей, и поэтому он вернулся в Куньмин. Последовательно служа директором Института подготовки уездных магистратов Юньнани, директором Корпуса подготовки административного персонала уездов провинции Юньнань и Бюро зерновой политики, он неоднократно спонсировался Лун Юнем.§!\n\n§YПримечания: Он косвенно связан с Лун Юнем как его шурин.§!"

 #陸崇仁
 YUN_lu_chongren: "Лу Чунжэнь"
 YUN_lu_chongren_advisor_desc: "§YРодился:§! §L1887 год, уезд Цяоцзя, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §gКлика Лун Юня§!\n§YБиография:§! §LЧлен этнической группы И, Лу Чунжэнь был принят в Юньнаньскую школу права и политики. После окончания он работал судьей в уезде Чжэньсюн, а позже был избран членом провинциального сената уезда Цяоцзя. Представленный своим односельчанином Юань Сихоу Лун Юню, он был назначен военным судьей Пятой армии Цзингоцзюнь Лун Юнем в 1922 году. Впоследствии рекомендованный Луном на должность губернатора уезда Сюньдянь, он стал своего рода местным героем, и местная знать построила для него мемориальный камень.\n\nПереведенный в Куньмин служить директором военно-юридического департамента Пятой армии, он тесно сотрудничал с Лун Юнем до такой степени, что его называли его «двоюродным братом». Работая в министерстве финансов, он настаивал на проведении различных реформ, многие из которых он не мог активно проводить из-за политики клики.§!\n\n§YПримечания: Он описывается как «чрезвычайно сдержанный и молчаливый человек» и является очень могущественным, но способным членом «бюрократии землевладельцев».§!"

 #張邦翰
 YUN_zhang_banghan: "Чжан Банхань"
 YUN_zhang_banghan_advisor_desc: "§YРодился:§! §L1885 год, уезд Чжэньсюн, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §gКлика Лун Юня§!\n§YБиография:§! §LПоступив в Юньнаньскую высшую школу в 1905 году, Чжан Банхань окончил ее, а затем отправился в школу Нам Ба Ви во Вьетнаме. В 1906 году он вступил в Тунмэнхой в Ханое и последовал за Сунь Ятсеном, путешествуя по Юго-Восточной Азии. Служа главным редактором сингапурской «Чжунсин Дэйли» и гонконгской «Чайна Пресс», он участвовал в восстании Чжэньнаньгуань и восстании Хэкоу, работая с Ху Ханьминем, чтобы укрывать революционеров. В 1909 году он отправился в Европу изучать прикладные науки и вернулся в Китай по приказу Сунь Ятсена.\n\nНазначенный директором департамента иностранных дел Юньнаньского военного правительства Цай Э, он уехал, чтобы получить сертификат электрохимического инженера в Бельгии, вернувшись в 1920 году служить инженером на заводе электрического света Яолун, директором Бюро беспроводного телеграфа, инструктором в Авиационной школе и профессором науки и техники в Юньнаньском университете.\n\nПоддерживая Тан Цзияо и Дун Цзэ в создании Юньнаньского университета, он был на передовой переговоров с Гоминьданом, когда они вошли в Гуйчжоу в качестве специального переговорщика Департамента иностранных дел. Недавно он был повышен до должности директора Департамента провинциального строительства.§!\n\n§YПримечания: Явно член Юньнаньской клики с прогоминьдановскими симпатиями.§!"

## Hu Ruoyu Clique (HRY)

 #胡若愚
 YUN_hu_ruoyu: "Ху Жоюй"
 YUN_hu_ruoyu_bio: "Наследник семьи землевладельцев, Ху Жоюй в юности был отправлен в частную школу, а позже окончил местную государственную среднюю школу. В 1910 году он был принят на четвертый курс Юньнаньской армейской начальной школы, а в следующем году принял участие в восстании Двойной девятки. В 1912 году он покинул Юньнань и отправился в Цзянси, чтобы служить под началом Ли Лецзюня, и вернулся в Юньнань накануне Второй революции. В 1914 году он поступил в офицерский класс Куньминской военной академии, окончив её и став командиром отделения и батальона. Во время Войны в защиту республики Ху Жоюй участвовал в битве за возвращение Гэцзю.\n\nПолучив приказ усилить Юньнаньскую армию в Сычуани, он победил Лю Цуньхоу и стал командиром бригады в 1918 году. В 1920 году во время попытки переворота Гу Пиньчжэня, Ху повел своих солдат в поддержку Тан Цзияо, но перенаправил свои силы в Гуанси, чтобы объединиться с Сунь Ятсеном, отбив Гуйлинь у Шэнь Хунъина и связавшись с Таном, бежавшим в Гонконг. Сражаясь от имени Тана за его возвращение к власти, он привел Лун Юня и Чжан Жуцзи к победе и был вознагражден постом командира гарнизона Мэнцзы.\n\nНастаивая на перевороте против Тана в 1927 году после нескольких ошибок последнего, Лун Юнь переиграл Ху, поставив Тана марионеточным губернатором, но Тан заставил Луна и Ху вернуться за стол переговоров. С поворотом внутрь страны в 1930-х годах Ху укрепил свои позиции на юге Юньнани, опираясь на связи Мэнцзы с Германским Индокитаем и обширные минеральные богатства."
 YUN_hu_ruoyu_leader_desc: "§YРодился:§! §L1894 г., Лупин, провинция Юньнань, Великая Цин§!\n§YБиография:§! §L$YUN_hu_ruoyu_bio$§!"
 YUN_hu_ruoyu_sic_desc: "§YРодился:§! §L1894 г., Лупин, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §PКлика Мэнцзы§!\n§YБиография:§! §L$YUN_hu_ruoyu_bio$§!"

 #李選廷
 YUN_li_xuanting: "Ли Сюаньтин"
 YUN_li_xuanting_high_command_desc: "§YРодился:§! §L1881 г., уезд Магуань, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §PКлика Мэнцзы§!\n§YБиография:§! §LОдин из четырех ранее крупных командиров гарнизонов при Тан Цзияо, Ли Сюаньтин окончил Куньминскую военную академию и впоследствии участвовал в восстании Двойной девятки. Отправленный служить в Юньнаньской экспедиции в Сычуань, он дослужился до командира батальона. В 1914 году он вернулся в Юньнань, чтобы служить магистратом уездов Гуаннань и Цзяньшуй. Сражаясь в рядах Хугоцзюнь (Армии защиты республики), он дослужился до командира полка.\n\nВ 1918 году он вошел в доверие к Офису военного губернатора Юньнани, а в 1919 году служил начальником штаба штаб-квартиры Второго гарнизонного округа Юньнани. В 1920 году он участвовал в стычках и конфликтах с юньнаньскими бандитами на юге, а во время попытки переворота Гу Пиньчжэня служил префектом Мэнцзы и начальником штаба регионального командования по борьбе с бандитизмом в Мэнцзы. В 1922 году он был назначен командиром гарнизона Дали за свои усилия по возвращению Тан Цзияо к власти, а в 1925 году фактически стал милитаристом Западной Юньнани.\n\nПосле продолжающихся ошибок Тан Цзияо он сговорился с Лун Юнем, Ху Жоюем и Чжан Жуцзи с целью свергнуть Тана, но, будучи переигранным губернатором, потерял свои владения в Дали, которые перешли к Сунь Ду, и был сослан в Мэнцзы. Оставшись на службе, он стал командиром штаба военной полиции Юньнаньской армии.§!"

 #張汝驥
 YUN_zhang_ruji: "Чжан Жуцзи"
 YUN_zhang_ruji_high_command_desc: "§YРодился:§! §L1896 г., уезд Цюйцзин, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §PКлика Мэнцзы§!\n§YБиография:§! §LОкончив Юньнаньскую армейскую начальную школу и Гуйчжоускую военную академию, Чжан Жуцзи служил ассистентом на факультете Куньминской военной академии. Участвуя в восстании Двойной девятки, он служил командиром взвода Офиса военного губернатора Юньнани, а в 1912 году участвовал в экспедиции Юньнаньской армии в Гуйчжоу. Поступив в Гуйчжоускую армейскую академию, он окончил её в 1914 году и вернулся в Юньнань.\n\nВ 1915 году он был командиром роты личной охраны Тан Цзияо и сражался в Войне в защиту республики против Лун Цзигуана. В 1921 году он продолжил службу во время правления Гу Пиньчжэня, сражаясь с Шэнь Хунъином в Гуанси. Во время работы штаба защиты конституции Чжан служил главнокомандующим штабом передовой армии Северного похода, а в 1922 году вернулся в Юньнань под начало Тан Цзияо.\n\nСлужа командиром Четвертой армии Цзингоцзюнь, он стал командиром штаба военной полиции Юньнаньской армии и командиром гарнизона Южной Юньнани. В 1923 году он был заместителем посланника союзных сил Юньнань-Гуйчжоу и последовал за Тан Цзию для оккупации Гуйяна, выступая в качестве содиректора Офиса по надзору за военной реконструкцией Гуйчжоу. Сражаясь против Гуанси под эгидой Тан Цзияо, он стал командиром гарнизона Восточной Юньнани в 1926 году и вместе с Ху Жоюем, Лун Юнем и Ли Сюаньтином предпринял попытку переворота для свержения Тана. После провала переворота он был сослан в Мэнцзы вместе с Ли и Ху.§!"

 #王維玉
 YUN_wang_weiyu: "Ван Вэйюй"
 YUN_wang_weiyu_commander_desc: "§YРодился:§! §L1892 г., Мэнцзы, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §PКлика Мэнцзы§!\n§YБиография:§! §LОтец Ван Вэйюя управлял небольшим бизнесом по обмену валюты в Мэнцзы, и благодаря своему предпринимательскому духу, сам Ван открыл лавку с пирожными и закусками в возрасте 15 лет. Сумев открыть шахту с деловым партнером Ли Пинем, их предприятие быстро выросло с момента основания в 1912 году и стало умеренно успешным. Однако из-за роста бандитизма на юге Юньнани в то время их операции постоянно находились под угрозой. В связи с этим местные горнодобывающие корпорации объединились, чтобы сформировать ополчение, командиром которого был выбран Ван.\n\nОсновав ряд горнодобывающих школ и занимаясь благотворительностью, Ван связан с немецкими горнодобывающими интересами на юге Юньнани и является местным авторитетом, пусть и довольно доброжелательным. Он служит младшим военным офицером и финансовым спонсором клики Мэнцзы.§!"

 #王汝為
 YUN_wang_ruwei: "Ван Жувэй"
 YUN_wang_ruwei_high_command_desc: "§YРодился:§! §L1894 г., Куньмин, провинция Юньнань, Великая Цин§!\n§YПриверженность:§! §PКлика Мэнцзы§!\n§YБиография:§! §LОкончив Юньнаньскую военную академию, Ван Жувэй принял участие в восстании Двойной девятки, а затем сражался в Войне в защиту республики в Сычуани, служа штабным офицером армии Ли Сюаньтина. В 1916 году он был принят на 11-е пехотное отделение Куньминской военной академии. После выпуска в 1918 году он неуклонно поднимался по служебной лестнице в Юньнаньской армии, включая период службы в Гуандуне, где правительство Гоминьдана обвинило его в попытке помочь Чэнь Цзюнмину в 1924 году.\n\nВернувшись в Юньнань, он создал свое собственное местное феодальное владение в Магуане на юго-востоке Юньнани. К 1927 году он был начальником штаба местного офиса комиссара по реконструкции. Обвиненный в вербовке местных бандитов для помощи в обеспечении безопасности уездов Вэньшань и Сичоу, он в конечном итоге не смог контролировать этих бандитов. Когда его брат предал его, он якобы хладнокровно убил его, в то время как Лун Юнь и Чжан Жуцзи предлагали ему участвовать в их перевороте против Тана, и он принял оба их предложения одновременно. Сбежав после того, как стало известно об успехе Лун Юня (хотя и недолгом), Ван оказался в клике Мэнцзы Ху Жоюя, то ли из-за беспокойства о своей безопасности, то ли ради выгоды.§!\n\n§YПримечания: Он стирает грань между военным офицером и местным бандитом.§!"

