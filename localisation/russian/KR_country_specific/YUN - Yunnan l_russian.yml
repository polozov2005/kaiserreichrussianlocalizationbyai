##Section 3a (000-099): Mid Game Misc Content

##Section 3b (100-399): Mid Game UPC Political Events

#Guangzhou Conference Chain (100-129):
YUN.midgame.100.t: "Конференция в Гуанчжоу"
 YUN.midgame.100.d: "Тан Цзияо наконец вернулся в Гуанчжоу, не как опальный изгнанник, а как победитель, наконец-то одолев силы Лянгуана. Город, хоть и пострадавший от конфликта, остается мощным символом революционных сил в Китае: он был домом для нескольких южных правительств, стремившихся бросить вызов господству Пекина в XX веке.\n\nИмея под своим контролем несколько южных провинций, губернатор Тан получил полномочия созвать конференцию, на которой, как ожидается, он станет «президентом Таном». Теперь его внимание сместилось: дела Юньнани не являются (и не могут быть) его приоритетом — теперь он командует региональным правительством. Среди фракций Лянгуана Гуандун является домом для более крупного федералистского движения, сосредоточенного вокруг Чэнь Цзюнмина и его армии Юэ. Провинция также является очагом различных течений революционного социализма и консервативной реакции — торговцы организовали Ассоциацию всех сословий по спасению Гуандуна против правления Гоминьдана и КПК. Гуанси более консервативна, разделена на регионалистские кланы, известные под общим названием Старая клика Гуанси. Часто враждующие, они, тем не менее, едины против внешнего вмешательства в их политику.\n\nЛидеры федералистов со всей страны стекаются в город, включая некоторых из недавно подчиненных. Несколько заинтересованных милитаристов прислали неофициальных представителей, избегая на данный момент каких-либо прямых обязательств перед будущим правительством. Они приходят с разными, иногда конфликтующими идеалами — свидетельство не только того, насколько децентрализованным всегда было движение, но и того, насколько фрагментированным оно стало после их сокрушительных неудач в 1920-х годах. Большинство являются убежденными сторонниками конституционализма, в то время как другие надеются на демократизацию в Китае, а многие присоединились ради обещаний движения о региональной автономии. Все требуют объединения и борьбы с империализмом, но одни ищут мирный путь, другие — войну за освобождение."
 YUN.midgame.100.a: "Мы боремся за конституционную демократию."
 YUN.midgame.100.b: "Мы не остановимся, пока наша нация снова не объединится."
 YUN.midgame.100.c: "Мы будем защищать наше право на самоуправление."

 YUN.midgame.101.t: "Великий республиканский альянс"
 YUN.midgame.101.d: "Великий республиканский альянс (ВРА) был совместным проектом, впервые основанным отстраненным Чэнь Цзюнмином и Дуань Цижуем в 1931 году на фоне растущего антиконцессионизма и разочарования после провала переговоров об объединении Чжили и Фэнтяня. Возрожденная Тан Цзияо и Чжан Тайянем Партия народного управления (ПНУ) присоединилась к ВРА вместе с Чжэцзянской ассоциацией самоуправления Чу Фучэна в следующем году, когда власть Чжили начала отступать на фоне Шанхайских восстаний 1932 года. Другие, опасаясь оскорбить власти Чжили, действовали параллельно — включая Общество обновления народа Чжао Хэнти и Народную федерацию ассоциаций защиты автономии Сюн Кэу.\n\nИдентичность ВРА как федералистской коалиции сформировалась в последующие годы, помогая сохранить федерализм живым, даже когда многие начали рассматривать его как опальную, непатриотичную идеологию. Номинальные положения Конституции Цао Куня о провинциальной автономии заставили многих усомниться в том, исчерпал ли федерализм себя и не является ли он просто предлогом для провинциальных милитаристов продолжать разделять страну.\n\nНеспособность Чжили не только выполнить свои конституционные обещания, но даже удержать страну вместе позволила федерализму получить второй шанс в глазах многих в Китае. Хотя возрожденный ВРА не столь радикален, как в разгар движения 1920-х годов, он привлек многих недовольных демократов, которые являются бывшими участниками Федерации китайских демократических партий и воочию наблюдали неспособность ФКДП добиться демократических изменений от Бэйяна.\n\nВРА клянется объединить милитаристов, интеллектуалов и других китайских патриотов для построения федеративной демократии. Но прежде чем он сможет это сделать, он должен разрешить некоторую тлеющую напряженность в своих рядах. Чэнь Цзюнмин является действующим председателем ВРА как глава Партии общественных интересов (Чжигундан) и в прошлом предлагал Тану пост вице-председателя, который тот принял с двойственным чувством, чтобы избежать подчинения Чэню. Теперь, когда Тан вышел на первое место, для него было бы логично взять на себя руководство ВРА. Но принуждение Чэня к уходу заставит его потерять лицо и оттолкнет потенциального союзника."
 YUN.midgame.101.a: "Тан — наш бесспорный лидер, и он легко выиграет выборы."
 YUN.midgame.101.b: "Оставить Чэня номинальным председателем в качестве оливковой ветви."

 YUN.midgame.102.t: "Угли ФКДП"
 YUN.midgame.102.d: "После инцидента с Семью благородными в 1936 году многие южные республиканцы, испытывавшие отвращение к приглушенной реакции Федерации китайских демократических партий, полностью покинули коалицию. Крупнейшей партией ФКДП и мишенью значительного гнева была Китайская конституционная партия, консервативные преемники Лян Цичао, хорошо интегрированные в истеблишмент Бэйяна. Вскоре после этого многие левые последователи Ляна, социал-демократы и прогрессивные либералы на юге собрались в Гуанчжоу, чтобы основать Демократическую социалистическую партию.\n\nДСП состоит из двух основных фракций. Первая и более доминирующая — это фракция Общества национального возрождения, возглавляемая Чжан Цзюньмаем и Чжан Дунсунем. Оба были реформистскими социалистами, получившими образование в Европе, которые пытались синтезировать восточную философию с западными политическими разработками. Второй была фракция Общества полумесяца, возглавляемая Ло Лунцзи, Вэнь Идо и Лян Шицю, более гуманистически-либерально ориентированная группа, получившая образование в Соединенных Штатах. Обе фракции черпали поддержку у интеллигенции и специалистов среднего класса.\n\nПартия поклялась «пробудить общее сознание нации, выполнить гармонизирующую функцию общества и достичь свободного развития личности — все это силой нации», предлагая смешанную экономическую систему и демократическую республику, возглавляемую учеными.\n\nТем не менее, были значительные споры по поводу их тактики. Чжан Цзюньмай, первый председатель партии, избегал массового следования в пользу использования традиционно привилегированного статуса китайских ученых для влияния на политику через образование и культуру. Однако многие не согласны с этой конфуцианской философией, предпочитая добиваться прямых реформ посредством широкого общественного давления. Ло Лунцзи, в частности, выступил в поддержку антиимпериалистических и даже антикапиталистических протестов. Некоторые из этих споров носят и личный характер — у авторитарного стиля руководства Чжана много недоброжелателей, и его лидерство ослабевает."
 YUN.midgame.102.a: "Внутреннее стремление ДСП к переменам свергает Чжана."
 YUN.midgame.102.b: "Подозрительность Тан Цзияо к социализму гарантирует изгнание Чжана."

 YUN.midgame.103.t: "Появление Ло Лунцзи"
 YUN.midgame.103.d: "Падение Чжан Цзюньмая было предсказуемо, учитывая обстоятельства, но быстрая консолидация ДСП вокруг лидерства Ло Лунцзи стала сюрпризом. Хотя Чжан сначала поклялся бороться за свою позицию, под давлением он ушел и полностью поддержал Ло.\n\nЛо Лунцзи вырос в Цзянси после того, как реформы «Сто дней» были подавлены вдовствующей императрицей Цыси. Он учился в Университете Цинхуа и стал студенческим лидером во время протестов 4 ноября. Смелый и полный энтузиазма, он также имел прагматичную сторону — нанял дюжего студента-спортсмена в качестве своего телохранителя. Позже он поступил в Колумбийский университет, написав докторскую диссертацию на тему «Проведение парламентских выборов в Англии».\n\nИдеологически он был вдохновлен Гарольдом Ласки и другими фабианскими социалистами, но тяготел к гуманистическому либерализму. Он восхищался американским государственным разделением властей — двухпалатным законодательным органом, тремя ветвями власти и федеральной системой, предотвращающей чрезмерную концентрацию власти. Он также включил элементы своего традиционного конфуцианского образования, увлеченный порядком в обществе, преобразующей силой образования, ответственностью правительства перед народом и тяготением к «экспертной политике».\n\nЛо вернулся в сильно изменившийся Китай вскоре после провала Северного похода. Он присоединился к Обществу полумесяца вместе со своими бывшими одноклассниками Вэнь Идо и Лян Шицю. Постепенно он стал противником авторитаризма Чжили, опубликовав «О правах человека» в 1929 году перед выборами, а позже осудил Чжили как подражающих репрессивному абсолютизму королей Карла I и Людовика XVI, но даже не эффективно.\n\nСтав мишенью во время репрессий после Шанхайского восстания 1932 года, он был арестован и внесен в черный список. Он присоединился к Обществу национального возрождения и ФКДП в Гуанчжоу, но в конечном итоге нашел должность в Куньминском университете. Он был энергичным пропагандистом и агитатором, хотя и изо всех сил пытался сбалансировать левое и правое крылья своего движения."
 YUN.midgame.103.a: "Достойный лидер, к которому Тан будет относиться как к старшему советнику."
 YUN.midgame.103.b: "Очередной бредовый либерал, которого Тан вежливо проигнорирует."

 YUN.midgame.104.t: "Управление Юньнанью"
 YUN.midgame.104.d: "С переездом Тан Цзияо и большей части его штаба в Гуанчжоу остается открытым вопрос о том, кто будет управлять повседневными операциями в Юньнани. Провинция, хоть и беднее Гуандуна, остается основной базой власти Тана, и он не может позволить себе потерять ее, иначе его карточный домик быстро рухнет. Хватка клики Тан над провинцией также остается шаткой, учитывая сомнительную лояльность Лун Юня и Ху Жоюя, хотя ситуация значительно улучшилась по сравнению с тем, что было до экспедиции в Гуанчжоу.\n\nЧжоу Чжунъюэ был бы надежным выбором, старший советник в провинциальном правительстве Тана на протяжении многих лет. Этнический бай и коллега-политик, получивший образование в Японии, Чжоу обучался на педагога, но был принят в офис Цай Э в качестве генерального секретаря и начальника образования, в дополнение к нескольким важным экономическим ролям. Он также был недолгое время губернатором с 1919 по 1920 год. Культурный старейшина-государственный деятель, его назначение губернатором стало бы естественным продолжением правления Тана.\n\nДун Цзэ — зять Тан Цзияо. Еще один этнический бай, он служил секретарем в офисе губернатора, прежде чем Цай Э отправил его учиться за границу в Колумбийский университет. Он также служил связным в Гонконге во время Войны в защиту республики. Педагог в Юньнаньском университете, а затем директор Департамента образования, он был известен тем, что нанимал ученых, получивших образование за границей, и продвигал демократическое управление школами. Несмотря на непотизм, его могут рассматривать как более либеральный выбор для провинции.\n\nНаконец, есть Тан Сяоин, сын Тан Цзияо. Получивший образование в Японии экономист, он часто появлялся рядом с отцом во время его политических митингов, и, как сообщается, симпатизирует Партии младокитайцев и ФКДП. Он также занимал различные мелкие должности в администрации и армии. Поскольку Тан Цзию сейчас находится в Гуйчжоу, он может быть ближайшим родственником Тан Цзияо, и он является новым лицом в политике. Однако это может привести к значительной напряженности, поскольку некоторые сомневаются в его способности контролировать непокорных мелких милитаристов."
 YUN.midgame.104.a: "Чжоу Чжунъюэ — выбор истеблишмента."
 YUN.midgame.104.b: "Дун Цзэ балансирует реформы со стабильностью."
 YUN.midgame.104.c: "Тан Сяоин пойдет по стопам отца."

 YUN.midgame.105.t: "Новое правительство федералистов"
 YUN.midgame.105.d: "После нескольких недель обсуждений окончательный план этого последнего правительства Гуанчжоу обрел форму. Оно будет построено по федералистским линиям, поклявшись уважать автономию провинций и объединить провинции — сначала дипломатией, а при необходимости силой. Тан Цзияо естественным образом занял пост президента после быстрого голосования, он также назначил Чэнь Цзюнмина своим вице-президентом, чтобы умиротворить кантонских федералистов.\n\nБыло создано временное законодательное собрание, и Чжан Тайяню поручено организовать их в качестве премьер-министра. Несмотря на их сходство, уже появились некоторые явные различия в их философии управления. Тан выступал за более сильное центральное правительство, способное бороться с иностранным империализмом и которое также может играть роль арбитра между различными провинциями. Чжан временами призывал к почти полной отмене центрального правительства, утверждая, что Китай слишком велик для управления, а предыдущие центральные правительства были склонны продаваться иностранным державам — вместо этого он стремился расширить права и возможности различных провинций. Чэнь и большинство других заняли более умеренную позицию между ними, и ожидается, что новое правительство будет действовать как компромисс между двумя крайностями, скрепляемое общими страхами внешнего нападения.\n\nВпереди у нового правительства много проблем. Провинции по всему Китаю занимают стороны в надвигающейся битве за воссоединение. Многие задаются вопросом, сможет ли федералистский режим разрешить свои внутренние противоречия и смогут ли они сделать это мирным путем."
 YUN.midgame.105.a: "Федерализм снова поднимается."

 YUN.midgame.106.t: "Юньнаньские федералисты объединяют Юг"
 YUN.midgame.106.d: "Гуанчжоу был домом для множества южных правительств в эпоху милитаристов, каждое из которых надеялось сломить господство Пекина. Последним лидером, объявившим себя претендентом, является Тан Цзияо, который сплотил несколько южных провинций под своим знаменем. Объединившись с различными милитаристами, интеллектуалами, дворянами и торговцами, это новое правительство утверждает, что борется за федеративную демократию в Китае — поворот судьбы для движения, которое многие списали как обреченное и непатриотичное десятилетие назад.\n\nТем не менее, многие сомневаются, будет ли правление Тана существенно отличаться от той тирании, с которой он, по его утверждениям, борется. Его авторитарное, гибкое, а иногда и прогрессивное правление снискало ему как поклонников, так и недоброжелателей на протяжении многих лет."
 YUN.midgame.106.a: "Доказательство того, что федерализм не мертв."
 YUN.midgame.106.b: "Движение, которое должно было оставаться мертвым."

#UPC Narrative Events (130-159):
 YUN.midgame.130.t: "Управление Лянгуаном"
 YUN.midgame.130.d: "Как и другие регионы Китая, охваченные гражданскими беспорядками после падения династии Цин в 1911 году, Лянгуан не является исключением. У руля политики Гуандуна стоит лидер движения федералистов Чэнь Цзюнмин и Чэнь Ляньбо из Торгового корпуса. Гуанси, с другой стороны, находится под властью кланов Старой Гуанси, ныне возглавляемых Линь Ху и «Армией Гуанси» Лю Чжэньхуаня. Но теперь две провинции столкнулись с новым хозяином, помимо Пекина, — правлением Куньмина. И с этим новым руководством приходят новые проблемы.\n\nТан Цзияо вступил в союз с Лю Чжэньхуанем из армии Гуанси, чтобы, как он надеется, уменьшить вероятность восстаний и беспорядков из-за более сельского и бунтарского характера Гуанси. Однако у Тана, безусловно, есть сомнения по поводу гуансийского милитариста. Лю — серьезный наркоман, сам амбициозный милитарист, хронический игрок и давно не был в Гуанси. Тан пообещал Лю провинцию, но, возможно, Линь Ху был бы лучшим выбором из-за того, что он был одним из первоначального правящего триумвирата в Гуанси.\n\nГуандун, в отличие от Гуанси, является революционным и федералистским очагом. Сильные федералистские симпатии лежат на стороне армии Юэ и дворянства. Чэнь Ляньбо — мэр города и лидер Ассоциации всех сословий по спасению Гуандуна, в которой доминируют торговцы; ассоциации, решившей объединить либералов и Клику политической науки для формирования регионалистского блока.\n\nОккупация Юньнанью и вмешательство в дела других провинций не являются уникальными для политики Тана. Во время руководства Цай Э юньнаньские силы были расквартированы в Сычуани за счет других провинций. Действительно, такие экспедиции подготовили Юньнань к чрезвычайной задаче объединения юга.\n\nРегиональные собрания Гуандуна и Гуанси были временно приостановлены из-за политического хаоса. Если старым собраниям будет разрешено созваться и голосовать, они, скорее всего, выберут регионалистов, близких к старому порядку. Если мы «проверим», кто вернется в собрание, это разозлит некоторых людей, но гарантирует, что «истинные» федералисты останутся у власти."
 YUN.midgame.130.a: "Пока они лояльны, мы будем уважать автономию провинций."
 YUN.midgame.130.b: "Милитаристы и другие подрывные элементы будут заменены перед выборами."

 YUN.midgame.131.t: "Правительство Тан Цзияо"
 YUN.midgame.131.d: "В постоянно расширяющейся юньнаньской бюрократии, которая теперь охватывает Южный Китай, бюрократия и правительство Тан Цзияо постоянно растут. Его ближайшее окружение по-прежнему состоит из членов его семьи, таких как его зять Дун Цзэ, его брат Тан Цзию и его сын Тан Сяоин. Его секретари занимают важные посты в правительстве, такие как Ван Цзюлин, Ли Юйкань и Бай Чжихань, и являются близкими доверенными лицами секретов и планов генерала.\n\nПНУ и Чжан Тайянь выступают в качестве политической базы Партии, смеси федералистов, либеральных интеллектуалов и законодателей. Они также, в более широком смысле, включают в себя теперь объединенный Великий республиканский альянс, зонтик профедералистских групп. В то время как ВРА является prima facie демократической коалицией, нацеленной на прекращение многолетней нестабильности и автократии, Тан обеспокоен фракционностью внутри групп. В частности, кантонское и хакка происхождение вице-президента Чэнь Цзюнмина имеет влияние в Гуандуне, в то время как Чжао Хэнти, федералистский губернатор Хунани, долгое время управлял провинцией.\n\nЕсть также военные, где доминирует армия Юньнани, но они были вынуждены дополнять себя поглощенными военными силами, ополчением и даже бандитами. Даже первоначальная армия Юньнани не была полностью лояльна Тану, а Лун Юнь и Ху Жоюй оказались менее чем надежными заместителями. В их отсутствие Тан укомплектовал свое военное руководство благоприятными кандидатами, такими как Чжан Вэйхань и Сунь Ду, которые приносят с собой как опыт, так и лояльность к постоянно меняющемуся режиму."
 YUN.midgame.131.a: "Тан Цзияо всегда может рассчитывать на бюрократию для исполнения своей воли."
 YUN.midgame.131.b: "Чжан Тайянь и движение федералистов — вот за что мы сражаемся!"
 YUN.midgame.131.c: "Чтобы победить, мы должны доверять нашим офицерам и нашим союзным провинциям."

 YUN.midgame.132.t: "Ло Лунцзи организует Полумесяц"
 YUN.midgame.132.d: "С момента своих публикаций о правах человека Ло Лунцзи сделал себе имя среди южных либералов и демократического блока. Как восходящая звезда либерального движения, он работал над медленным восстановлением связей между Обществом полумесяца и старой Федерацией китайских демократических партий (коалицией различных независимых, малых партий и клик, которые следуют федералистскому движению, но опасаются потенциального авторитаризма). В дополнение к организации повседневной деятельности ФКДП, Ло также усердно работал над публикацией статей и мнений в «Миньчжу Чжоукань» (Демократический еженедельник) и «Миньчжу Жибао» (Демократическая ежедневная газета); иногда в его произведениях содержался оттенок левого восхищения в поддержку демократических принципов Второй Французской революции.\n\nС новообретенной властью и ролью приходит новообретенная ответственность в подготовке к национальному объединению. Конечно, Ло мог бы укрепить китайскую демократическую коалицию, связав деятельность Общества полумесяца с Тан Цзияо и Великим республиканским альянсом. В этом, конечно, есть проблемы — Тан все еще милитарист, и могут быть некоторые сомнения в том, насколько военные лидеры привержены сохранению демократии. В качестве альтернативы Ло мог бы также сосредоточиться на «конструктивной критике извне» и попытаться собрать больше колеблющихся интеллектуалов в движение Полумесяца. Это могло бы поощрить свободу слова и мысли в демократическом процессе, хотя и ценой единства юга. Наконец, третий вариант мог бы заключаться в том, чтобы просто объединиться с различными милитаристами под властью Тана и принять их деньги и убежище. Возможно, Тан Цзияо все-таки нельзя доверять, и в интересах Ло может быть найти более значительного покровителя до потенциального изгнания."
 YUN.midgame.132.a: "Тан способен возглавить революцию!"
 YUN.midgame.132.b: "Здоровая оппозиция создает живую демократию."
 YUN.midgame.132.c: "Есть варианты получше, чем Тан."

YUN.midgame.133.t: "История федерализма в Китае"
 YUN.midgame.133.d: "Первый этап федерализма (1895–1911) основывался на наблюдениях китайской интеллигенции, которая смотрела на Соединенные Штаты и Швейцарию. Лян Цичао возглавил первоначальную атаку, заявив, что федерализм не делает такую обширную страну, как Китай, слабее, и Тунмэнхой вторил этим призывам, заявляя, что Китай заслуживает республиканского правительства. Провинциальные собрания действовали де-факто независимо от правительства Пекина, и некоторые провинции даже заигрывали с идеей автономных провинций, связанных вместе в федерацию.\n\nВторой этап федерализма (1912–1920) опирался на предательство Юань Шикая по отношению к Китайской Республике. Федерализм возник как оружие против правительства Юань Шикая, увеличивая автономию провинций и продвигая истинные демократические идеалы. После смерти Юаня и последующего раскола между Китайской националистической партией и китайскими прогрессистами федералистские идеалы в значительной степени остались без внимания. Но в 1917 году, когда переговоры о воссоединении потерпели неудачу, федералистские движения снова стали популярными: политик Сюн Силинь умолял провинции собраться вместе, чтобы разработать федералистскую конституцию и созвать собрание.\n\nТретий и текущий этап китайского федерализма, таким образом, отражает вершину федералистского революционного движения. В 1920 году Хунань сделала первый шаг и создала провинциальную конституцию. Такие идеи также оказались в тандеме с успехом Японии Мэйдзи и силой Запада. Истинная демократия — это демократия, где народный суверенитет принадлежит народу и с безоговорочными полномочиями, предоставленными провинциям. Эти настроения также отражались в растущем регионализме китайской политики: клики и партии теперь формировались из лояльности своим родным провинциям, а не Пекину. Федералистские писатели утверждают, что независимость провинций и их уникальные сильные стороны в конечном итоге укрепят более широкое национальное государство, а не ослабят его, позволяя самоуправление и развитие независимо от залов Пекина."
 YUN.midgame.133.a: "Федерализм — наш путь к восстановлению гармонии между нацией и провинциями."
 YUN.midgame.133.b: "Федерализм — это средство для достижения цели конституционной, демократической республики."

 YUN.midgame.134.t: "Наследие 4 ноября"
 YUN.midgame.134.d: "После утечки документов, разоблачивших секретные сделки Бэйянского правительства по обмену Шаньдуна на грабительские займы Антанты в октябре 1919 года, 4 ноября вспыхнула огромная волна национальных беспорядков, особенно в Пекине.\n\nАнтиимпериалистический характер протестов вызвал новую волну интеллектуализма, которая расцвела и развила современную китайскую политическую мысль. Под влиянием этого эволюционного, телеологического понятия времени и истории многие интеллектуалы 4 ноября рассматривали современное как «новое» (синь), сознательно противопоставленное «старому» (цзю). Этот прогрессивный и темпорализованный способ понимания современности «Оксидентализм» — радикальная и иконоборческая идеология, которая в своем экстремистском выражении призывала к полной «вестернизации китайской культуры».\n\nОбщество полумесяца, по большей части, отвергло этот иконоклазм. Вместо этого они критически размышляли о природе западной мысли о китайских политических и культурных институтах. Для них не было разницы между старым и новым. Скорее усилия должны быть посвящены оценке как Запада, так и Востока, старого и нового. Такие писатели, как Вэнь Идо, подтвердили «колебание новых мыслей», вызванное новым литературным движением, потому что оно «представляло наше сознание в поисках духа нового времени». В целом они ищут новый синкретический идеал, не отвергая явно старое и не продвигая новое, но начало новой политической культуры.\n\nСам Тан Цзияо поначалу сочувствовал националистическим беспорядкам 4 ноября, но также пытался ограничить студенческий активизм и ввел строгие указы, требующие от представителей собираться, а не протестовать. Он также заметил, что новая культурная мысль таких людей, как Общество полумесяца, — это просто философские и политические разглагольствования без видимых оправданий; подозрительно находя их контрпродуктивными."
 YUN.midgame.134.a: "Поистине мы принимаем новую культуру!"
 YUN.midgame.134.b: "Их понтификаторство бессмысленно."

 YUN.midgame.135.t: "Америка и федералистское движение"
 YUN.midgame.135.d: "Федералистское движение исторически имело два источника вдохновения: Соединенные Штаты Америки и Германская империя. Многие в Обществе полумесяца учились в Соединенных Штатах, и ранние федералистские интеллектуалы обнаружили, что американский эксперимент был первой настоящей федералистской демократией. С распадом Штатов во вторую гражданскую войну эти идеи, конечно, оспариваются, особенно учитывая шаткое положение Китая.\n\nОдним из предшественников Общества полумесяца была Ассоциация Великой реки. В начале 1920-х годов Лян Шицю, Вэнь Идо и Ло Лунцзи встретились в отеле «Дрексел» (недалеко от того места, где Вэнь и Лян были студентами Чикагского университета). Там мужчины составили манифест и сформировали Да Цзян Хуэй (Ассоциацию Великой реки), которая, по их мнению, символизировала славное прошлое Китая, уподобляя его исторической Желтой реке Китая. Их манифест утверждал, что (1) Национализм необходим для борьбы с иностранным империализмом, (2) Демократия и права человека должны быть реализованы, и (3) контролируемая государством экономика необходима для изменения нации и предотвращения классовой борьбы. Эта система будет управляться американскими федералистскими принципами; стремясь к сильному федеральному правительству со сдержками и противовесами на каждом шагу для обеспечения живой демократии.\n\nС другой стороны, Чжан Тайянь отверг американскую федералистскую модель как несовместимую с Китаем. Во-первых, структура власти федералистской китайской республики будет основана на местных общинах. Вместо власти, централизованной наверху в руках премьера и президента, федералистская республика будет рассредоточивать власть среди гражданских и военных лидеров в провинциях. Во-вторых, источник власти федералистской республики будет черпаться из местного, рассматривая провинции как суверенные государства и создавая конфедерацию, основанную на соглашении. В-третьих, будет центральное правительство, реализующее национальную политику и представляющее Китай в «семье наций», но власть центрального могущественного будет строго ограничена."
 YUN.midgame.135.a: "Демократия, как и американские штаты!"
 YUN.midgame.135.b: "Подражать Америке — значит быть некитайским."

 YUN.midgame.136.t: "Красная угроза в Южном Китае"
 YUN.midgame.136.d: "По мере того как федералистская революция продолжает расти в Южном Китае, она, естественно, вступила в конфликт с рассадником китайского социалистического движения, варьирующегося от анархистов, коммунистов, синдикалистов и, конечно, Гоминьдана. От их партизанских баз в Гуандуне и Фуцзяни до верфей Шанхая и Гонконга социалистическое движение, жестоко подавленное в 1932 году, продолжает расти, поскольку капиталистический мир восстанавливается после афтершоков Черного понедельника. От листовок до открытых забастовок социалисты осудили федералистское движение как нечестивый союз между милитаристами и буржуазией, запятнав славу социал-националистической революции окровавленными руками и капиталистической жадностью.\n\nНекоторые либералы нашли идеологического партнера в более либертарианских социалистических группах, таких как анархисты. Чжан Тайянь долго писал о своей идее утопической демократии, которая разделяет многие схожие взгляды китайских анархистов в осуждении феодальных конфуцианских мировоззрений в пользу большего Датуна. Разрыв Чжана с парижскими анархистами («Четырьмя старейшинами Гоминьдана») по вопросам, касающимся направления революции и революции против эволюции, привел бы к разрыву первого с социалистическим революционным движением.\n\nХотя более спокойные голоса выступают за мирные отношения с красными, многие, такие как Лян Шицю, в частности, нацелились на левую литературу, от написанной видными китайскими синдикалистами в портовых городах до даже написанной левыми членами Гоминьдана в изгнании в Европе. Лян прямо нацелился на политические работы, пропагандирующие классовую борьбу, как просто на «крипто-народничество». Левые газеты были закрыты или им было сказано сократить свои публикации. В некоторых случаях лидеры забастовок и труда также были открыто арестованы за подстрекательство к восстанию против демократической революции. Ясно как из федералистского движения, так и из Общества полумесяца, что коммунистическая революция не может и не обгонит их усилия за свободный Китай."
 YUN.midgame.136.a: "Дайте миру шанс."
 YUN.midgame.136.b: "Лучше мертвый, чем красный."

 YUN.midgame.137.t: "Критика внутри Полумесяца"
 YUN.midgame.137.d: "Общество полумесяца (ОП) не всегда было политической силой, которой оно является сегодня. Изначально, как и многие партии, оно началось с группы друзей с видением и мечтой; и теперь охватывает эклектичную идеологию, которая смешивает социал-демократию и правых. По мере роста движения некоторые из его основателей, такие как Сюй Чжимо, чувствовали, что его истинные идеалы пропитаны грязью «невыносимого мелкобуржуазного запаха». Для Сюя идеальное ОП — это общество, похожее на собрания вокруг таких, как Россетти и Шоу, поскольку умы немногих открывают безграничные политические, художественные и идеологические поля.\n\nСюй Чжимо был лицом и клеем ОП, удерживающим его разрозненные фракции вместе. Он женился на младшей сестре Чжан Цзюньмая в том, что стало бурным, драматичным и вихревым романом, который закончился тем, что двое стали близкими друзьями. Ученик Бертрана Рассела и Гарольда Ласки в Кембридже, Сюй затем женился во второй раз на замужней женщине и впоследствии был отрезан от своей семьи. Опозоренный своей семьей, Сюй занялся писательством и несколькими работами, прежде чем погибнуть в трагической авиакатастрофе в 1931 году. Его художественный прозаический стиль характеризовался отходом от безмятежных мелодий и большим принятием неопределенности нигилистического будущего.\n\nВ отсутствие его смерти ОП предало его видение и стало гораздо более крупной политической третьей силой; но его влияние все еще остается преобладающим. Есть те в движении, такие как Сунь Даюй и Шао Сюньмэй, которые приняли эти мелодии — привлеченные ужасающей природой машин, промышленности, чувственных образов и гротескных тем. Эти писатели выступают за то, чтобы доктрина ОП повернула больше влево; в то время как другие выступали за более ортодоксальный подход к политическим правым. Эти так называемые правые призывали направить движение к текущему истеблишменту, чтобы сделать их более податливыми к постоянно меняющемуся политическому ландшафту. В качестве альтернативы, просто позволив фракциям критиковать друг друга, мы можем сделать их более податливыми для наших собственных целей."
 YUN.midgame.137.a: "Есть красота в насилии современного мира."
 YUN.midgame.137.b: "Двигаться вправо и работать с истеблишментом."
 YUN.midgame.137.c: "Фракции остаются разорванными."

 YUN.midgame.138.t: "Федералистский национализм"
 YUN.midgame.138.d: "Национализм доминирует в китайской политической мысли в эту эпоху антиимпериалистической борьбы. Однако для федералистов это было трудным знаменем. В то время как, конечно, федералистское движение надеется уничтожить иностранные концессии и изгнать империалистических врагов Китая, таких как Германская и Японская империи; федералисты также должны поддерживать осторожную линию с регионалистскими властями.\n\nСам Тан Цзияо верит в сильное центральное государство, которое могло бы управлять автономией провинции, но в конечном итоге предан концепции национального государства, способного отразить иностранное влияние. Действительно, в Юньнани национализм варьируется от тех, кто стремится к тому, чтобы их рассматривали как коммерческих равных с иностранцами, и других, кто надеется изгнать дьяволов с китайских берегов любой ценой. Таким образом, возник уникальный националистический регионализм путем построения национальной автономии через местное развитие, которое, в свою очередь, создает уникальную идентичность.\n\nС другой стороны, Чжан Тайянь придерживается более... эзотерических убеждений. Концепция национализма Чжана была зажата между противоречивыми нарративами о том, что такое нация — та, которая постоянно движется вперед вместе, но как-то также связана с прошлым. Национальная сущность, следовательно, является решением истинного национализма. Национальная сущность — это сущность, где нация не имеет государства, и чье присутствие/возвращение нуждается в институциональном воплощении в государстве. Местные провинциальные правительства могут порой быть более полезными для взаимодействия с иностранными правительствами, чем полагаться на бюрократический характер централизованного государства."
 YUN.midgame.138.a: "Центральное правительство должно быть достаточно сильным, чтобы отбиться от империалистов!"
 YUN.midgame.138.b: "Мы можем полагаться только на коллективные провинции, чтобы отбиться от империализма!"

 YUN.midgame.139.t: "Образование и контроль мыслей"
 YUN.midgame.139.d: "Несмотря на то, что Тан является знаменосцем федералистской революции, его противники все еще описывают его не более чем как оппортунистического милитариста. Он уже начал внедрять свое влияние в университетах, реформируя их и пропагандируя свою идеологию. Недавно построенный Университет Дунху, укомплектованный шурином Тан Цзияо, обязывает учебную программу, которая сформирована и одобрена высшими должностными лицами Тана. Осуждения со стороны Общества полумесяца возникли в результате сообщений о столкновениях между студентами Дунху и левыми студентами в провинциях.\n\nПрограмма массового образования Тана распространилась не только на университеты, но и на народное образование, строительство начальных школ, профессиональных школ, вечерних школ и лекционных школ. Радикальные студенты взяли на себя организацию народных и патриотических драм и пьес, выражающих социалистические настроения, что часто приводило к столкновениям между студентами Дунху. В некоторых случаях военные курсанты также, как сообщается, штурмовали студенческие штаб-квартиры и общежития; часто на приглушенные реакции из офиса Тана.\n\nЛян Шицю из ОП осудил подавление свободы слова и мысли в провинциях. Он пишет, что результат контроля мыслей разделит людей на три группы. В первой группе будут те, у кого были идеи, но кто не мог пойти на компромисс со своими принципами с практикой контроля мыслей; следовательно, они либо будут вынуждены уйти в отставку, либо принуждены присоединиться к революции. Вторая группа — это оппортунисты, те, у кого было образование, но не было принципов и мужества. Последняя группа будет состоять из тех, кто не будет думать, кроме как в слепом повиновении. При таких обстоятельствах лучшие мозги и самые смелые будут вычищены; останутся только оппортунисты и невежественные массы. Таким образом, Лян в своих трудах умолял о терпимости, свободе мысли и либеральном образовании."
 YUN.midgame.139.a: "Кулак нужен в эти ужасные времена."
 YUN.midgame.139.b: "Но, возможно, нам следует ослабить его."

#UPC Party Popularity Ladder Events (160-189):
 YUN.midgame.160.t: "Размышления о правах человека"
 YUN.midgame.160.d: "В эпоху великих политических мыслителей и националистов, жаждущих возродить китайскую нацию, Ло Лунцзи является одним из немногих плодовитых либералов в китайской нации. Поступив в 1913 году в Подготовительную школу Цинхуа для обучения в Соединенных Штатах в Пекине, Ло стал студенческим лидером во время протестов 4 ноября. В 1921 году он отправился изучать политологию в Висконсинский университет, Колумбийский университет, а затем в Лондонскую школу экономики и политических наук. После чистки Сунь Чуаньфаном левоцентристов и социалистов в 1932 году Ло и фракция Университета Цинхуа нашли убежище в Юньнани, где они продолжили публиковать либеральную критику текущего правительства.\n\nВ своей последней работе «О правах человека» Ло пишет, что «Быть человеком, говоря откровенно, требует, чтобы человек имел счастье быть человеком, а жизнь требует, чтобы человек имел благополучие жизни. Чтобы наслаждаться благополучием жизни, различных условий [упомянутых выше] — одежды, еды, крова и телесной безопасности — недостаточно».\n\nОпираясь в значительной степени на традиции Запада, Ло создает онтологическое исследование либерализма от Великой хартии вольностей до Декларации прав человека 1789 года. В своем магнум опус Ло определяет права человека как то, чем человек может наслаждаться и что может вносить в общество, приводя в качестве примера свободу слова и то, как нарушение такого права представляет собой лишение естественных прав. Более того, он также переходит к объяснению природы общественного договора, ссылаясь на образы Гоббса о государстве, которое предает свою часть общественного договора, как о государстве, которому не стоит подчиняться. Где права человека утрачены, там революция — конечно, Ло уточняет, что это не революция марксистского характера (классовой борьбы), а скорее революция свободы. Наконец, он завершает свою работу замечаниями о важности верховенства закона и о том, что правовая база нации начинается с твердого понимания конституционного права — четко определенной конституции, которая будет защищать права всех граждан государства."
 YUN.midgame.160.a: "Мы сыграем свою роль в поддержке Государства!"
 YUN.midgame.160.b: "Но у нас есть право критиковать правительство."

 YUN.midgame.161.t: "Союзники Полумесяца"
 YUN.midgame.161.d: "В угасающем солнечном свете демократии в Китае исходит сияние от Общества полумесяца. Хотя в настоящее время в обществе доминируют Ло Лунцзи, Вэнь Идо и Лян Шицю после безвременной кончины Сюй Чжимо, есть и другие китайские интеллектуалы, которые бежали на Юго-Запад в надежде найти убежище для своих идей.\n\nПань Гуандань — выпускник Цинхуа, который учился в Соединенных Штатах. Социолог, евгеник и этнолог, он больше всего заинтересован в работе с этническими меньшинствами в Юньнани и на Китайском Юго-Западе.\n\nЧжу Гуанцянь покинул материк, чтобы учиться в Гонконгском университете, престижном западно-ориентированном университете в Посольских городах. Во время учебы он попал под сильное влияние Движения за новую культуру Лян Цичао и Ху Ши, связывая их работу со своим собственным интересом к эстетике и психологии.\n\nУ Вэньцзао — социолог, антрополог и этнолог, интересующийся изучением тибетских народов. Под влиянием таких писателей, как Бертран Рассел, Джон Дьюи, Сунь Ятсен, Ху Ши и Лян Цичао, У также является выпускником Цинхуа, который некоторое время учился в Соединенных Штатах.\n\nЛи Гунпу — бывший член Китайского Гоминьдана, но с тех пор дистанцировался от Националистической партии еще до краха НРА во время Северного похода. Затем он переехал в Соединенные Штаты, прежде чем учиться в Рид-колледже. После недолгого пребывания в Штатах он вернулся в Шанхай, где работал редактором газеты с такими социалистами, как Лю Си и Ай Шици. Когда жестокая чистка Суня пришла в восточные провинции Китая после восстания 1932 года, Ли, как и другие его друзья из Общества полумесяца, бежал в Юньнань."
 YUN.midgame.161.a: "Их вклад в науку был бесценен!"
 YUN.midgame.161.b: "Их участие в нашей демократии необходимо!"

 YUN.midgame.162.t: "Безумный Чжан и дело Су Бао"
 YUN.midgame.162.d: "Не прошло и поколения, как революционные настроения прокатились по Китаю, когда полные надежд мечтатели осмелились мечтать о свободной и возрожденной нации. Чжан Тайянь, как и многие из храбрых мучеников, также присоединился к призыву к свободе как патриот. В 1903 году, поссорившись с Кан Ювэем и Сунь Ятсеном (считая первого недостаточно радикальным в ненависти к маньчжурам) по поводу того, как проводить революцию, он опубликовал «Опровержение теории революции Кан Ювэя», критикуя цинскую монархию, и написал предисловие к «Революционной армии» Цзоу Жуна, которое было опубликовано в Су Бао, радикальной газете, призывавшей к свержению Цин.\n\nПоскольку газета находилась в юрисдикции Шанхая, власти Международного сеттльмента и цинский суд судили и осудили Чжана и Цзоу за подстрекательство к восстанию против Великой Цин. В первоначальном приговоре, который шокировал аудиторию на западе из-за драконовского характера наказания, требуемого Цин, под влиянием западных властей Чжан и Цзоу были приговорены к трем годам тюрьмы. Во время своего заключения ревностный революционер продолжал писать из своей камеры, восхваляя, что «Небо дало мне национальную сущность».\n\nИ Чжан, и Цзоу объявили голодовку в знак протеста против тиранического маньчжурского угнетения свободы слова. К сожалению, слабое здоровье Цзоу в сочетании с голодовкой привели к его смерти в раннем возрасте двадцати лет. Чжан выстоял через испытания и настаивал, что именно его почти фанатичное изучение буддийских сутр поддерживало его жизнь на протяжении всего испытания.\n\nПосле выхода из тюрьмы Чжан стал национальным героем и прославленным революционным героем. Прозванный «Безумным Чжаном» за свою откровенную ревностную пропаганду и страсть к истинно либеральной и демократической Китайской Республике, давние подвиги этого героя рассказываются в книгах, романах и в классе как одного из храбрых героев против имперской власти. Сегодня националисты смотрят на дело Су Бао либо как на дело свободы слова, либо как на дело, где мученики делают все, чтобы изгнать империалистов."
 YUN.midgame.162.a: "Слово стоит того, чтобы за него умереть!"
 YUN.midgame.162.b: "Так же, как мы изгнали маньчжуров, так и мы должны изгнать иностранных империалистов."

 YUN.midgame.163.t: "Направление ПНП"
 YUN.midgame.163.d: "После 1925 года Тан Цзияо обратился к Дуань Цижую в попытке лоббировать поддержку с севера. Когда это не удалось, в июле 1926 года — выступая против революционных фракций, возникших на китайском юге — Тан сформировал свою собственную политическую партию. Ныне Миньчжидан (Партия народного правительства) утверждала, что имеет уникальную идеологию, независимую от иностранного влияния, — совместимую с китайской сущностью Чжан Тайяня. Партия отстаивает демократию федералистского характера, лишенную автократического авангардного лидерства, но стремится также синкретизировать с концепцией национальной сущности. Несколько членов из Общества пробуждения льва также присоединились к Тану, найдя идеологическую совместимость.\n\nНациональная сущность берет свое начало из Японии и стремится создать собственный Кокутай Китая, реализуя природу Чжунхуа путем изучения китайской классики. Чжан и другие националисты смотрят на безмятежные дни, когда культурная, территориальная и общественная целостность Китая сохранялась в неприкосновенности до хищнической природы варварских северных орд. Национальная сущность — это сущность, где нация не имеет государства, и чье присутствие/возвращение нуждается в институциональном воплощении в государстве. Как только Китай достигнет своей Национальной сущности, он должен помочь другим угнетенным странам найти свою собственную — например, Индии.\n\nХотя два человека могли происходить из разных слоев общества, в постоянно меняющемся китайском политическом ландшафте и Тан, и Чжан нашли общий язык. Чжан основал Общество содействия движению самоуправления в 1922 году и стремился найти военную поддержку. Учитывая, что его последователи состояли в основном из интеллектуалов (таких как Общество национального обучения), которые предпочли бы сосредоточиться на китайских героических эпосах и классике, Чжан снова и снова пытался найти военную поддержку для своего революционного движения. После своего приезда в Юньнань он нашел внимательного слушателя в ПНП Тан Цзияо, чья федералистская идеология теперь стремится синкретизировать с национализмом Национальной сущности Чжана."
 YUN.midgame.163.a: "Поистине мы стремимся достичь федерализма!"
 YUN.midgame.163.b: "Поистине мы стремимся достичь Национальной сущности!"

 YUN.midgame.164.t: "Тан Цзияо, национальный чемпион Юньнани"
 YUN.midgame.164.d: "Последние годы провинцией Юньнань руководило доминирующее присутствие Тан Цзияо. Хотя многие осуждают его как милитариста, Тан — лишь один из многих сложных персонажей в бурной революционной истории Китая.\n\nРодившийся в богатой семье, как и многие его соотечественники, решивший получить сильное образование, Тан стал солдатом в Токио и участвовал в Луцзюньтуань (Армейское общество) и Усюэшэ (Общество военных исследований) во время своего пребывания. Один из авторов Усюэ Чжачжи (Журнал военных исследований), всегда патриотичный Тан вступил в Тунмэнхой как ранний участник. Однако ранние сомнения были высказаны относительно его лояльности, когда он, по-видимому, отказался бастовать против японских репрессий и был обвинен в предательстве своих сокурсников перед Провинциальной ассамблеей Юньнани. Критикуя «духовное образование», которое получали японские войска, Тан выступал за детальное изучение Ван Янмина. Он подружился с легендарным генералом Цай Э и помог первому спланировать революцию 1911 года в Куньмине.\n\nКогда революция создала новую Китайскую Республику, всегда осторожный Тан встал на сторону реформистов после конфликта между реформаторами и революционерами в хаотичный ранний период Эры милитаристов. После смерти Цай Э руководство Тана Юньнанью видело, как провинция либо вмешивалась в политику близлежащего Лянгуана, либо отказывалась участвовать и переждать шторм. Военный человек, который настаивает на правлении как гражданский лидер и действительно официально находится вне военной иерархии; нет никаких сомнений, что Тан сохраняет абсолютный контроль над военными и своими делами. Грандиозная фигура, чей портрет часто можно увидеть на монетах, в школах и газетных статьях, — нет сомнений, что присутствие Тана в юго-восточной провинции Китая непреодолимо. Провинция и его военные либо следуют за уважаемым лидером в его военном руководстве, либо за его очевидной приверженностью истинной революции."
 YUN.midgame.164.a: "Мы следуем за самим человеком!"
 YUN.midgame.164.b: "Он представляет нечто гораздо большее!"

 YUN.midgame.165.t: "Внутренний круг Тан Цзияо"
 YUN.midgame.165.d: "Тан Цзияо позиционирует себя как сильного человека, спасителя в беде Китая — даже играя самого себя в фильме 1926 года «Война Хунсянь», действие которого происходит во время Войны в защиту республики. Конечно, даже сильные люди не могут руководить без помощи своих доверенных лиц. Высшее командование Тан Цзияо состоит из военных и политиков, которые поклялись в провинциальной верности своим прекрасным горам и всегда грандиозному руководству милитариста провинции.\n\nВан Цзюлин — юньнаньский политик, получивший образование в Японии. Он участвовал в Синьхайской революции в Юньнани и в результате своей лояльности новому республиканскому режиму был вознагражден престижной должностью секретаря и финансового директора Тан Цзияо. Молчаливый переговорщик, Ван помог организовать несколько сделок с правительством Бэйяна и был вознагражден постом министра образования при Дуань Цижуе. В 1924 году он вернулся в Юньнань, чтобы работать в Соляной комиссии и банке Фудянь.\n\nДин Чжаогуань также является политиком, получившим образование в Японии, который служил в Департаменте финансов провинции Сычуань, прежде чем вернуться в Юньнань, чтобы служить директором Юньнаньского колледжа права и политики. Видный адвокат, Дин стал судьей и играл роль юридического советника Тан Цзияо.\n\nМэн Ювэнь — начальник службы безопасности Тана; отвечает за обеспечение безопасности и сохранности милитариста от врагов внутри провинции и за рубежом. Тан Шаоцин и Хэ Шисюн — офицеры Юньнаньской военной академии, которые, как говорят, входят в число самых доверенных генералов Тан Цзияо и заявили, что последуют за генералом в любое будущее, которое он пожелает."
 YUN.midgame.165.a: "Провинция строится финансами и администрацией."
 YUN.midgame.165.b: "Конечно, пистолет сильнее пера."

#Democratic Enthusiasm Ladder (190-219):

 YUN.midgame.190.t: "Бандитизм и милитаризм"
 YUN.midgame.190.d: "Даже до краха власти центрального правительства после Синьхайской революции бандитизм долгое время был проблемой в Юньнани, бандитские банды и милитаристы пользовались хаотичными беспорядками после революции. В течение 1920-х годов уволенные шахтеры, недовольные бывшие солдаты и голодные жители деревень были среди банд бандитов, которые бродили по сельской местности и даже часто посещали центры деревень и городов. Конечно, для многих мало различий между военными генералами, милитаристами и низкими бандитами, и временами границы, безусловно, размыты. Сверхмилитаризация также сыграла роль в росте бандитизма по всей провинции. С милитаристами и генералами, нанимающими тысячи призывников, ополченцев и военизированных формирований, эти чрезмерно ревностные наниматели забывают об ограниченности своих казначейских сундуков и часто не выплачивают своим солдатам. В результате многие из этих жестоких и закаленных в боях ветеранов обратились к бандитизму, уличным бандам и наемничеству у местных землевладельцев.\n\nДаже личного секретаря Тан Цзияо Ли Юнькуня обвиняют в связях с видными юньнаньскими бандитами, такими как Чжан Цзеба и У Сюэсянь. Эти бандиты с их большими силами бывших солдат печально известны тем, что в прошлом поднимали мятежи и терроризировали местных жителей. Они не только обычно крадут богатства, урожай, оружие и серебро, но и опиум, хотя официально он в целом запрещен в провинции, является популярным товаром. Особенно среди сельского крестьянства в деревне эти бандиты ужасают, с страшными историями и слухами о бандитах, таких как Чжан Цзеба, поедающих сердца своих врагов.\n\nС ростом этих бандитских групп еще больше и организованнее по всей территории [ROOT.GetNameDef] ситуация становится все более ужасной, так как народная поддержка федералистского движения колеблется. В то время как федерализм, конечно, отстаивает местную демократию и самоуправление, отсутствие народной поддержки сделает любой энтузиазм по поводу федералистской революции спорным. С другой стороны, борьба с бандитами, хотя некоторые могут утверждать, что это необходимо, также является серьезной нагрузкой на ресурсы и возможности правительства."
 YUN.midgame.190.a: "Бандитов можно запугать, это просто требует времени."
 YUN.midgame.190.b: "Кто-то должен ЧТО-ТО сделать!"

 YUN.midgame.191.t: "Милитаристы и философы"
 YUN.midgame.191.d: "В то время как многие согласны с тем, что революция в Китае должна быть выиграна с помощью военной силы из-за существования иностранных империалистов, которые готовятся захватить всю китайскую страну, напряженность с теми, кто выступает за более подлинную и «демократическую революцию», расстроила бюрократию правительства.\n\nВозглавляемая учеными-интеллектуалами, такими как Чжан Тайянь, растет критика в адрес руководства [ROOT.GetLeader]. Эти критики утверждают, что [ROOT.GetLeader] действует как диктатор и душит обучение, устанавливая цензуру и увеличивая бюджет правительства в пользу военных. Действительно, для самых радикальных федералистов и либералов существование федерального правительства само по себе является тиранией и угнетением народов. Эти радикалы утверждают, что существование центрального правительства, конституции, парламента и национальной исполнительной власти лишь приведет страну к централизованной диктатуре или к бесконечной гражданской войне. Скорее они проповедуют, что местная автономия должна отстаиваться, так как она так хорошо функционировала в отсутствие центральной власти. Для них три порока Конституции, Конгресса и Президента должны быть искоренены, а федеральные силы должны быть распущены; с военной властью в руках провинций. Только тогда военные будут использоваться для служения общей обороне, а не для эксплуатации народа.\n\nЭти идеи в значительной степени поддерживаются военными генералами и милитаристами, которые хотели бы сохранить свою автономию от централизованного контроля и которые клянутся, что будут использовать свои силы для безопасности и защиты своих родных провинций. Однако централисты и националисты утверждают, что эти идеи, похоже, укрепляют концепцию милитаризма и что генералы просто монополизируют власть в своих провинциях ради своих собственных эгоистичных желаний."
 YUN.midgame.191.a: "Центральное правительство породит китайского Савинкова."
 YUN.midgame.191.b: "Это просто милитаризм в овечьей шкуре."

 YUN.midgame.192.t: "Древний порок"
 YUN.midgame.192.d: "Papaver somniferum — невинно выглядящий цветок, но заслуживший презрение и ненависть китайских националистов по всей стране. Потребители растения, широко известного как опиум, сообщают о эйфорическом кайфе, лишенном какой-либо боли, который позволяет им сбежать в свои самые смелые фантазии.\n\nНи для кого не секрет, что опиум широко используется по всей стране, несмотря на исторический запрет на это незаконное вещество. Юго-Западный Китай, конечно, не исключение, с климатом и сухой засушливой жарой, идеально подходящими для выращивания проклятого растения. Члены общества от высоких классов до самого низкого нищего на улице потребляют наркотик; обычно курением, с его дурманящим и цветочным ароматом, открыто текущим по улицам города. Опиум попадает сюда из Южной и Юго-Восточной Азии и в остальную часть страны. Несмотря на номинальный запрет правительства на опиум, правила остаются свободными, так как магистраты и исполнители обычно закрывают глаза за одолжения и взятки.\n\nПо всей территории [ROOT.GetNameDef] проблема коррупции распространяется не только на контроль за опиумом, но и на контроль и монополии на общественные ресурсы, такие как медь. Видные лица в правительстве имеют связи с этой знатью и новыми аристократами, что вызвало подозрение и презрение, особенно среди активистов и журналистов, которые осудили эту откровенную коррупцию."
 YUN.midgame.192.a: "Нет ничего плохого в небольшом перекуре."
 YUN.midgame.192.b: "Коррупция должна быть тщательно искоренена!"

 YUN.midgame.193.t: "Национализм и федералистское движение"
 YUN.midgame.193.d: "Поскольку федералистское движение набирает обороты, среди националистов и патриотов существует обеспокоенность тем, что отстаивание федералистским движением местной провинциальной автономии разделит страну, а не поддержит ее. В то время как националисты едины в своем желании видеть свою страну объединенной от Шэньяна до Куньмина и вернуть территории, потерянные империалистами; такие настроения вступают в конфликт с более локальными идентичностями. Последние несколько десятилетий милитаризма показали, что люди больше верят своим местным правительствам, своим городам, своим мэрам и, возможно, губернаторам, но не более того.\n\nДействительно, региональные идентичности вполне могут бросить вызов единству китайского народа. Конечно, письменный китайский одинаков, но лингвистические диалекты от кантонского до хоккиен, хакка и мяо больше, чем просто стилистические различия в тонах, но сами могут быть классифицированы как уникальные языки.\n\nНационалисты провозглашают, что федералистское движение призвано защитить национальную целостность и что нация сама по себе есть и всегда будет Китаем. Однако с растущим акцентом на децентрализацию и местную автономию; все большее число голосов, особенно в деле федералистов, призывают к тому, что национализм породит только централизм и что истинная демократия принадлежит многим народам и племенам Китая, а не одной нации."
 YUN.midgame.193.a: "Давайте смягчим регионалистскую риторику."
 YUN.midgame.193.b: "Мы страна, состоящая из других, а не из одного."

 YUN.midgame.194.t: "Разрушение элитарной формы"
 YUN.midgame.194.d: "Названное в честь стихов «Полумесяц» индийского эрудита Рабиндраната Тагора, Общество полумесяца всегда гордилось своей псевдоэлитарной организацией. Присутствовавший на похоронах Сунь Ятсена Чэнь Сиин написал в своих «Некоторых мыслях о похоронах доктора Сунь Ятсена», насколько несерьезными стали молодые массы, выкрикивая лозунги и проявляя мало траура.\n\nДействительно, концепция элитарной группы, направляющей революцию, а не революции, возглавляемой массами, — идея, популярная среди членов ОП. Ло Лунцзи призвал к «правительству специалистов», сравнивая концепцию с Бернардом Шоу, в то время как другие, такие как Лян Шицю, вдохновленный Ирвингом Бэббитом, разделяют отвращение к экстремальным и радикальным идеям. Поскольку логичное и расчетливое ОП отстаивает классические ценности разума и сдержанности над общей атмосферой радикального освобождения, они тем не менее не полностью отрицают эмоции и воображение.\n\nДемократы по всей стране утверждают, что представляют простых людей, но немногие могут действительно заявить, что они провели годы, месяцы или даже дни с крестьянами, трудящимися на полях. Однако, поскольку поддержка федералистского движения как никогда высока, ОП и другие партии, ориентированные на демократов, призвали к тому, чтобы этап военного правления и управления закончился в пользу демократии сейчас. Конечно, учитывая их историю, определенно стоит задуматься, стремятся ли они просто к власти ради собственной выгоды или действительно к власти для народа."
 YUN.midgame.194.a: "Подобно ученым древности, мы должны направлять массы."
 YUN.midgame.194.b: "Мы были бы не лучше мини-диктаторов..."

 YUN.midgame.195.t: "«Ради чего я работаю»"
 YUN.midgame.195.d: "Лян Шицю недавно закончил статью для «Гуанмин Бао» (Светлая газета) под названием «Ради чего я работаю». Статья быстро распространилась по журналам и изданиям по всему Китаю, многие называют ее лучшим произведением Ляна и истинным тезисом китайского демократического движения.\n\nТщательно осуществлять сопротивление империалистам, восстановить полную территориальную целостность Китая и противостоять всем компромиссам с империалистами.\n\nРеализовать дух демократии и покончить с диктатурой, а также создать орган, в котором различные партии и группы могут обсуждать национальные дела.\n\nУкрепить внутреннее единство между различными партиями и группами.\n\nПомогать федералистскому движению в осуществлении Национальной реконструкции.\n\nЧтобы твердо установить единство национальной власти, должно быть надлежащее разделение центральной и местной власти.\n\nЧтобы гарантировать, что вооруженные силы принадлежат нации и лояльны ей, противостоять партийным организациям в армии и использованию армии в партийном конфликте.\n\nОсуществлять верховенство закона, защищать свободы жизни, собственности и личности людей и противостоять всем незаконным наказаниям.\n\nУважать интеллектуальную и академическую свободу, защищать все легальные выступления, публикации, собрания и ассоциации."
 YUN.midgame.195.a: "Наше дело правое!"
 YUN.midgame.195.b: "В этом вряд ли говорится что-то выдающееся."

#UPC Satellite Narrative Events (300-329):
 YUN.midgame.300.t: "Южная конфедерация"
 YUN.midgame.300.d: "Флаг Цзин Хуан Сина теперь гордо реет в Куньмине. Представители правительства [YUN.GetLeader] прибыли сегодня в Гуанчжоу, официально объявив о создании Южной конфедерации с Гуанчжоу. Действительно, федералисты в начале 1920-х годов говорили или, возможно, даже мечтали о создании конфедерации, чтобы противостоять прихотям Пекина и диктатуре Гоминьдана. Поистине, мечта Альянса защиты нации и Правительства защиты конституции, истинная Республиканская мечта о едином Китае под демократическим правительством будет достигнута.\n\nПоскольку федералистское движение теперь в самом разгаре в Юньнани, надежда и лихорадка объединения растут в рядах от городских улиц до высших политических должностей. Тан Цзияо, конечно, всегда якобы был федералистом, но федералистское движение столкнулось с истинной неопределенностью и крахом с победой Чжили и Реставрацией Сюаньтун. Теперь, когда Юг объединен под одной федералистской конфедерацией, мечты о национальном объединении под конфедерацией китайских провинций как никогда близки. Конечно, с Федерализмом как основной идеологией этой демократической революции голос Чжан Тайяня в правительстве стал еще громче. Чжан, безусловно, придерживается сильных, если не радикальных и эзотерических федералистских тенденций, и работа с Чжаном окажется интересной динамикой.\n\nКак губернатор Юньнани и ее вооруженных сил, Тан Цзияо также должен был иметь дело с судьбой своего главного соперника и подчиненного, амбициозного Лун Юня и комиссара обороны Чжаотуна. Конечно, служба Лун Юня Тану долгое время вызывала восхищение, но ни для кого не секрет, что двое мужчин состязаются в ожесточенном соперничестве за контроль над провинцией. Некоторые из частных советников Тана посоветовали Тану просто ослабить и по сути навсегда изгнать Лун Юня, повысив его до должности офицера связи между Гуанчжоу и Куньмином (по сути бесполезная работа). С другой стороны, влияние и опыт Лун Юня все еще могут оказаться полезными, и сохранение его в командовании может послужить высшему благу."
 YUN.midgame.300.a: "Новая должность офицера связи ему подойдет."
 YUN.midgame.300.b: "Держите его рядом под пристальным наблюдением."

 YUN.midgame.301.t: "Демократическое образование"
 YUN.midgame.301.d: "С успехом федералистской революции на Юге демократическая революция Китая федералистских принципов прибыла в Юньнань. Революционная лихорадка, заполнившая улицы во время Войны в защиту республики, снова оказалась на улицах Куньмина и Дали. Ло Лунцзи и Общество полумесяца теперь часто находятся в Гуанчжоу, ведя переговоры и работая с федералистской штаб-квартирой. В их отсутствие возникли местные демократические организации и партии Юньнани, которые взяли на себя инициативу в местной политике.\n\nПрограмма массового образования Тан Цзияо намерена помочь распространить народное образование, увеличивая количество начальных школ, профессиональных школ, вечерних школ и педагогических школ. Фактическая реализация этих школ делегирована Су Хунгану и Цунь Шушэну, которые отвечали за создание этих школ и их укомплектование персоналом. В результате нехватки учителей были приглашены ученые и интеллектуалы с Севера, что принесло им прозвище «Пекинская группа». Работы этой группы также критиковались как радикальные консерваторами внутри провинции, но, тем не менее, они остались на своих преподавательских должностях по поощрению Су Хунгана и Цунь Шушэна — вероятно, из-за нехватки адекватных профессионалов.\n\nЭти программы привлекли ряд левых радикалов. Радикальные студенческие группы, возглавляемые амбициозными патриотическими студентами, такими как У Дэн и Чжао Циньсянь, в провинции смешались с этими левыми группами, создав единый фронт под названием «Общество Новой Юньнани» при финансировании КСП. Естественно, создание таких радикальных левых групп, безусловно, вызывает беспокойство у Тан Цзияо. Хотя их националистические лозунги и идеи, безусловно, резонируют с остальной частью демократической революции; их радикальные левые идеалы и декларации классовой борьбы могут быть проблематичными и вызывающими разногласия. Возможно, тогда лучше подавить эти радикальные левые группы и обеспечить, чтобы их участие в публичных собраниях было ограниченным."
 YUN.midgame.301.a: "Эти группы — примеры того, что наша демократия работает."
 YUN.midgame.301.b: "Следите за ними с тяжелой рукой."

 YUN.midgame.302.t: "Обращение к военным округам"
 YUN.midgame.302.d: "В рамках уже существующей модели реализации федерализма Тана — правительство провинции было высшим уровнем власти. Здесь, как губернатор провинции, Тан обладал практически неограниченной и неконтролируемой властью назначать или увольнять всех других должностных лиц до принятия конституции. Поддерживаемое в основном торговой палатой Юньнани, правительство Тана также пыталось разделить военные и гражданские организации. Таким образом, Юньнань была разделена на четыре военных округа; Ху Жоюй в Куньмине, Лун Юнь в Чжаотуне, Ли Сюаньтин в Дали и Чжан Жуцзи в Мэнцзы.\n\nНесмотря на видимость правительственной инфраструктуры, децентрализованный аспект правления Тана, естественно, привел к проблемам в военных округах. Предоставление командирам гарнизонов их собственных округов только сделало их более автономными, и войска часто вымогали деньги или ресурсы у местных городов и округов на содержание своих солдат.\n\nПосле провала вторжения Тана в Гуанси возникли опасения вторжения Гоминьдана в провинцию. Изначально разделив свою провинциальную командную структуру на четыре региона, он перетасовал ее и сделал козлом отпущения Чжан Жуцзи. Таким образом, Лун Юнь получил Куньмин, Ху Жоюй получил Мэнцзы, а Ли Сюаньтин остался в Дали, но снова перетасовал ее после контрпереворота 1927 года. Результат таков: теперь Тан Цзияо правит Куньмином, Лун Юнь отправлен обратно на север в Чжаотун, Ху Жоюй, Ли Сюаньтин и Чжан Жуцзи застряли в Мэнцзы. Сунь Ду, бывший подчиненный Ху Жоюя и соперник Чжан Жуцзи, был вознагражден владением Дали.\n\nТеперь, когда Юньнань является ключевым игроком в демократической революции, похоже, нет необходимости сохранять эти военные округа. По просьбе демократов в провинции Тан мог бы официально упразднить эти регионы и перераспределить полномочия округам и местным провинциальным собраниям. С другой стороны, доверие к этим демократам в местном управлении может быть неэффективным и привести к анархии — и, возможно, назначение лоялистов из старых регионов Лун Юня обеспечит мир и стабильность."
 YUN.midgame.302.a: "Пришло время довериться воле народа."
 YUN.midgame.302.b: "Военные округа в порядке, как они есть."

 YUN.midgame.303.t: "Регионализм и Республика"
 YUN.midgame.303.d: "Как самая юго-западная провинция Китая, несмотря на то, что она была включена в раннюю китайскую династию Хань, Юньнань всегда пользовалась историей независимости и самоуправления. Пока монголы не завоевали Юньнань, провинцией правили отдельно от имперского Китая Королевство Наньчжао и Дали. Кроме того, культурное влияние на провинцию буддизма Тхеравады также усилило уникальную природу юньнаньского культурного регионализма от остального Китая. Ранние попытки независимости во время династии Цин провалились при У Саньгуе (который пытался основать свою собственную династию), а позже исламское восстание при Ду Вэньсю, который пытался найти «Пиннаньго» (Мирная Южная Нация). Ли Вэньсюэ, лидер племени И в Айлаошань, также пытался поднять восстание против кажущихся деспотичными ханьских повелителей.\n\nК концу династии Цин недовольство маньчжурами и даже ханьцами привело к вспышке спорадического насилия и настроений независимости Юньнани. Общества «Отделись или умри» наряду с обществами «Защити землю» и «Продвигай ханьцев» были среди тех, которые сформировались в результате краха маньчжурской власти и которые требовали немедленного отделения Юньнани от центрального правительства.\n\nФедеральное правительство Объединенных провинций Китая в конечном итоге стремится объединить все территориальные претензии Китайской Республики под одним национальным знаменем. Конечно, это, естественно, означает Юньнань, и потенциальная судьба Юньнани быть подчиненной еще одному национальному правительству спровоцировала прорегионалистов и тех, кто попадает в лагерь Чжан Тайяня, — которые утверждают, что идентичность Юньнани уникальна по сравнению с идентичностью Пекина. Также предполагается, что, возможно, Тан Цзияо разделяет аналогичную позицию, предпочитая более местную региональную идентичность, но истинные интересы Тана, которые он публично выразил, — это создание сильного государства для защиты и победы над иностранным империализмом. Действительно, разве не важно, что Республика выше всех провинций?"
 YUN.midgame.303.a: "Наша региональная идентичность принадлежит только нам!"
 YUN.midgame.303.b: "Но вместе мы формируем одну Нацию!"

 YUN.midgame.304.t: "Провинциальный конституционализм"
 YUN.midgame.304.d: "В первые дни Республики, когда республиканские и федералистские идеалы не были умалены реальностью Эры милитаристов, в Юньнани было много тех, кто хотел, чтобы провинция имела автономную конституцию, как Хунань. В то время Тан Цзияо отказался признать провинциальную конституцию, как Хунань. Тан снова и снова подчеркивал необходимость сильного центрального правительства, которое, таким образом, устранило бы необходимость в военной активности и милитаризме. И даже когда Цао Кунь принял Конституцию 1923 года, Тан отказался признать законодательство Пекина и укрепился в своих убеждениях.\n\nДаже после возвращения клики Чжили к национальной известности в 1929 году Тан Цзияо до сих пор не принял требования о провинциальной конституции. Торговцы и знать поддержали позицию Тана, вероятно, наслаждаясь отсутствием у них ограничений влияния на политику. Однако с момента создания федералистского правительства в Гуанчжоу демократы и демократически настроенные группы по всей провинции требовали немедленной разработки местной провинциальной конституции, чтобы гарантировать основные права на собрания, собственность, слова и право на стремление к счастью.\n\nСтолкнувшись с растущим беспокойством и недовольством еще одним годом без провинциальных конституционных гарантий, Тан снова сталкивается с перспективой разработки и принятия юньнаньской конституции. Его советники призвали его проявить значительную осторожность при этом, и ходят слухи, что, если Тан согласится на конституцию, это будет медленный и трудный процесс с множеством проектов и пересмотров, которые нужно будет выполнить. С другой стороны, успех федералистского движения зависит от объединения страны под флагом Цзин. До тех пор гарантии индивидуальных свобод придется подождать."
 YUN.midgame.304.a: "Мы начнем процесс разработки (медленно)."
 YUN.midgame.304.b: "Объединение имеет первостепенное значение."

 YUN.midgame.305.t: "Два с половиной года сельской работы"
 YUN.midgame.305.d: "Цунь Шушэн родился в поселке Хэшунь, уезд Тэнчун, Юньнань. Он учился в частной школе, а позже поступил в среднюю школу Хэшунь. В первый год Китайской Республики (1911) Цунь Шушэн был принят в среднюю школу Дали и окончил ее с отличием в 1915 году, вернувшись преподавать в среднюю школу Хэшунь. Проведя некоторое время на учебе в Японии, где он развил левые связи с Обществом созидания.\n\nВ Юньнани Цунь недавно добился местной провинциальной славы как директор средней школы Ицюнь. Школа обучается в соответствии с эллинистической традицией «Спартанской подготовки», и строгая спартанская подготовка и дух соблюдаются как в физической, так и в академической работе. Учителя и ученики помогают полоть сорняки, носить землю, выращивать овощи, сажать деревья и ремонтировать кампус самостоятельно. Даже уборка дорог в поселке Ицюнь осуществляется учениками. Ученики организованы в студенческую пожарную бригаду, чтобы помогать тушить пожары, а также помогать фермерам с зимней вспашкой, защитой лесов, строительством проектов по сохранению воды, развитием рыболовства и созданием птицеводства. Чтобы улучшить качество преподавания, Цунь также пригласил технических и образовательных специалистов из Куньмина.\n\nВ ответ на свои успехи в образовании в Ицюне Цунь опубликовал свой опыт в своей книге «Два с половиной года сельской работы». Критики, такие как У Хань, описали, что книга изображает, как «одна искра может зажечь степной пожар и что факел поселка даст яркое просвещение всей стране и всей нации».\n\nУчитывая его новообретенную известность в провинциальной и даже национальной политике, влияние Цуня, безусловно, может помочь укрепить режим Тан Цзияо. Цунь, безусловно, поддерживает национализм Тана и работу с Таном для обеспечения освобождения Китая от антиимпериализма, но также высказывался против более авторитарных принципов Тана. Благодаря его левым и демократическим связям с Обществом созидания; критика режима Тана, несомненно, принесет пользу левому крылу Юньнани."
 YUN.midgame.305.a: "Тан поможет достичь революции!"
 YUN.midgame.305.b: "Тан Тиран!"

 YUN.midgame.306.t: "Новый законодательный орган?"
 YUN.midgame.306.d: "В 1920-х годах, как и многие другие провинциальные губернаторы, Тан Цзияо пытался провести демократические реформы в своей родной провинции. В амбициозной попытке пересмотра законодательного органа Тан попытался перераспределить места делегатов, чтобы позволить более бедным районам голосовать за представителей, столкнувшись с сопротивлением. Эти реформы расширили бы участие на все уровни общества, но встретили сопротивление консерваторов, которые отказываются принять более разбавленный демократический процесс. Хотя это прямо не предусмотрено ни одним законом Юньнани, джерримендеринг фактически доминирует в избирательном процессе, так как те, кто находится в законодательном органе, могут чертить границы между избирательными округами.\n\nКлика политической науки и Гу Пиньчжэнь продолжали тормозить укрепление законодательного органа, и собрание разделилось на соперничающие фракции, которые продолжали бороться и назначать своих кандидатов. Более того, эти разделения только посеяли ужасную напряженность между секторами общества, причем левые активно осуждали местную знать и класс торговцев за классизм и элитарные отношения, отказывая своим менее удачливым братьям и сестрам в шансе участвовать в демократии. Теперь, в [GetYear], законодательный орган по сути закостенел, так как он контролируется в основном знатью Юньнани, торговцами и другими местными (милитаристскими) элитами. Демократы Юньнани призвали перерисовать округа и объявить джерримендеринг вне закона в пользу более справедливых границ округов. Конечно, это вызвало гнев консерваторов и тех, кто предпочитает текущий статус-кво (например, лагерь Ху Жоюя); которые вместо этого заявили, что пока не будут проводить новые выборы. Последующая реакция привела к взрыву ярости среди демократов, многие из которых нашли союзников среди левых Юньнани, таких как Общество «Новая Юньнань»."
 YUN.midgame.306.a: "Никаких новых выборов пока."
 YUN.midgame.306.b: "Хорошо, может быть, они правы."

 YUN.midgame.307.t: "Войны в кампусе"
 YUN.midgame.307.d: "С 1902 года провинциальное образование в Юньнани было радикально изменено указом императора Гуансюя, который закрыл традиционные школы, такие как Куньминская академия, и реорганизовал их в современные школы. Были основаны два нормальных училища, одно для каждого пола, а также Школа горного дела и Школа права и политики. К 1920-м годам около 2000 студентов были зачислены в 10 современных школ Куньмина, причем студенты были естественно политически активны. Те, кто уехал учиться в Пекин или крупные города и кто вернулся в Юньнань, как известно, становятся все более радикальными.\n\nВсе началось с листовки, осуждающей режим Тан Цзияо, в залах Провинциальной средней школы номер один. Листовка смело заявляла, что Тан Цзияо и его генералы-милитаристы собираются призвать всех студентов и загнать их в армию. Листовка расширялась до списка требований: важность антиимпериализма в национальной революции, прекращение любого военного финансирования в пользу провинциального развития, пацифизм для уничтожения власти милитаристов и воскрешение несуществующих групп, таких как студенческое издание Дянь Чао и Ассоциация Да Тун. То, что началось как простой протест, вскоре перекинулось на другие школы, и студенты потребовали закрытия Куньминской военной академии. Насилие вышло за рамки простых драк и боевых слов; Директор Военной академии издал прямой приказ запретить своим студентам носить ножи.\n\nТан попытался воздействовать на студентов пряником, а не кнутом, подтвердив свое влияние в университетах, реформируя их и пропагандируя свою идеологию. Поддерживаемый его шурином Дун Цзэ, его Университет Дунлу стремится быть образцовым институциональным залом благожелательного образования. Лоялистские настроения Дунлу вызвали ненависть радикальных студентов, которые рассматривают школу не более чем как культ личности истеблишмента. Столкновения между радикальными студентами и студентами Дунлу стали более частыми — директора школ умоляли Тана действовать быстро."
 YUN.midgame.307.a: "Эти школьники замочат себя кровью."
 YUN.midgame.307.b: "Давайте все просто успокоимся."

 YUN.midgame.308.t: "Местное самоуправление Юньнани"
 YUN.midgame.308.d: "В качестве одной из своих более немедленных демократических реформ Тан ранее стремился укрепить местное самоуправление в Юньнани. Его программа по созданию заседаний комитетов и департаментов среди местных деревень, укомплектованных как представителями высших, так и низших классов, могла быть обнадеживающей — но не вызвала ничего, кроме гнева со стороны местного руководства.\n\nСтаросты деревень и чиновники, ссылаясь на нехватку средств и отсутствие обученного персонала для выполнения программы самоуправления, осудили планы Тана как безнадежные и глупо идеалистические. В районах, где меры реформы были полностью реализованы, чиновники жаловались на практически бесконечные заседания комитетов, длящиеся от заката до рассвета, с практически нулевыми окончательными результатами в результате целых ночей препирательств и практически никаких компромиссов. В своей первой итерации Тан попытался переадаптировать программу самоуправления только к примерно восьми относительно богатым районам (Куньмин, Ами, Мэнцзы, Илян, Гэцзю, Сымао, Хуэйцзы и Тэнчжун), так как эти более богатые районы могут иметь более грамотное население. Эти попытки увенчались некоторым местным успехом, но все же показали увеличивающийся разрыв между богатыми и бедными районами.\n\nВ 1923 году в районе Магуань также возникла борьба за власть между действующим районным чиновником и вновь избранным главой комитета местного самоуправления, в результате которой районный чиновник был уволен. Районный чиновник, однако, просто остался, и последовавший хаос привел к сильной нехватке риса. Столица района была затем захвачена лидером бандитов И Ван Шичжэнем, который затем изгнал районного чиновника и захватил власть.\n\nТеперь, когда федералистское движение в самом разгаре, и постоянные мольбы о передаче власти городам, деревням и малым городам Китая — Тан снова подтвердил свои прежние планы местного самоуправления в надежде улучшить поддержку федералистской революции. Конечно, знать выразила свое несогласие; ссылаясь на прошлые неудачи Тана и на то, что такие меры будут пустой тратой ресурсов. Они настояли на сохранении текущего статус-кво и на том, чтобы все управлялось так, как есть."
 YUN.midgame.308.a: "Знать права."
 YUN.midgame.308.b: "Кому какое дело, что думает знать, Тан прав."

 YUN.midgame.309.t: "Продолжающаяся проблема бандитизма"
 YUN.midgame.309.d: "Во время своего руководства Юньнанью и до Войны в защиту республики Цай Э подал прошение правительству в Пекине разрешить Юньнаньской армии покинуть Гуйчжоу. Тан Цзияо поддержал это прошение, но Юань Шикай встал на сторону элиты Гуйчжоу и назначил Тана губернатором. Хотя Тана предупреждали о создании прецедента аннексии провинцией своего соседа, Экспедиция в Гуйчжоу была также оправданием для Тана для подавления бандитизма.\n\nЭкспедиция закрепила статус Тана как губернатора Юньнани. В целом силы Гуйчжоу были насильственно разоружены, а некоторые из них были преданы мечу под наблюдением Тана и брошены в братскую могилу, чтобы послать сигнал. Остальные силы Гуйчжоу и гражданские лица были заключены в тюрьму без суда. Особый интерес для Тана представляли те, кто принадлежал к Обществу самоуправления и членам Гэлаохуэй. Жестокость оккупации можно объяснить как фракционностью того периода, так и ядовитой ненавистью Тана к предполагаемым «насильникам и грабителям» региона.\n\nВ конце концов, Тану удалось обеспечить контроль над Гуйчжоу через свои отношения с Конституционной ассоциацией, которая лоббировала интересы Тана и отвечала за администрацию. Но жестокая оккупация Гуйчжоу Таном, безусловно, оказалась эффективным прецедентом в борьбе с бандитизмом. Ни для кого не секрет, что бандитизм продолжает преследовать Юньнань, особенно учитывая обширные просторы провинции и гористую местность. Войска часто заключали сделки или даже присоединялись к этим преступным бандам в Куньмине, которые в какой-то момент даже открыто продавали награбленные товары и похищали женщин с улицы. Сообщалось, что детей из богатых семей похищали из школ и удерживали ради выкупа. Таким образом, поскольку бандитизм является постоянной проблемой, возможно, нужна тяжелая рука, чтобы навести закон и порядок. С другой стороны, многие бандиты также являются бывшими солдатами. Поскольку проблемы с кадрами могут возникнуть по мере продолжения наших войн, возможно, использование их услуг на благо народа также будет полезным."
 YUN.midgame.309.a: "Бандиты не заслуживают пощады."
 YUN.midgame.309.b: "Наемники — рабы монеты."

##Section 3c (400-599): Mid Game KMT Political Events

#RKMT First Congress Chain (400-429)
 YUN.midgame.400.t: "Национальный конгресс в Гуанчжоу"
 YUN.midgame.400.d: "С падением Гуанчжоу хунта Гоминьдана обрела достаточную легитимность для проведения национального партийного конгресса. Ожидается, что этот Конгресс привлечет деятелей, выходящих далеко за рамки круга военных, которые первыми укрылись в Гуйчжоу. Правое крыло Гоминьдана представляет собой пестрое собрание фракций, разделенных еще до того, как Гоминьдан начал Северный поход.\n\nИх можно в целом разделить на три лагеря по линиям разлома в борьбе за власть, возникшей после смерти Сунь Ятсена. «Старые правые» в основном состоят из тех, кто поддерживал Ху Ханьминя, и обычно включают гражданские фракции, ведущие свое происхождение от либерального Тунмэнхоя времен до Синьхайской революции. Сюда входят «Клика старейшин» (EDC), «Клика Сишань» (WHC) и, более свободно, «Фракция реконструкции» (RCF) и «Старая клика политической науки» (PSC). «Новые правые» — термин, используемый для описания последователей Чан Кайши, которые предварительно поддержали Единый фронт с КСП (Китайской синдикалистской партией) против «Старых правых», но в конечном итоге поссорились с левым Гоминьданом. Эти фракции включают «Клику Вампу», «Общество революционных товарищей Чжэцзяна» и их различные правые ответвления. Наконец, есть те, кого можно ретроспективно классифицировать как «Региональные правые» — различные милитаристы с более локальным фокусом, примкнувшие к Гоминьдану, такие как Новая клика Гуанси (NGX), Новая клика Гуандун (NGD) и Клика 3-й армии — каждая с разной степенью интеграции в более широкий аппарат Гоминьдана.\n\nСуществует постоянный страх, что эти давние разногласия даже внутри лагерей перерастут в бесконечные междоусобицы. Из пепла Лянгуана Ли Цзунжэнь из NGX, Чэнь Цзитан из NGD и ведущие отпрыски «Московского комитета», включая Ху Ханьминя из EDC и Линь Сэня из WHC, получили места в Центральном комитете, чтобы умиротворить их. Сунь Фо из RCF также получил место заочно благодаря своей престижной родословной. Но многие из их последователей будут ожидать партийных синекур в обмен на свою лояльность."
 YUN.midgame.400.a: "Весьма внушительный набор фигур..."

 YUN.midgame.401.t: "Раскол среди Старых правых"
 YUN.midgame.401.d: "Ху Ханьминь и его Московский комитет были на переднем крае правого крыла Гоминьдана большую часть десятилетия, по крайней мере, на международном уровне. После смерти Чана и отступления его армии в Гуйчжоу изгнанный правый лидер доминировал на интеллектуальной сцене правого Гоминьдана, обмениваясь колкостями с Ван Цзинвэем и его Парижским комитетом в редакционной войне. Поэтому, естественно, он весьма обижен тем, что его предполагаемый авторитет имеет мало веса среди «грубых» и «неотесанных» военных, с которыми он оказался.\n\nШли дни, и согласия между Старыми правыми и Региональными правыми, доминировавшими в Гуйчжоу, было мало. Несмотря на снобистское поведение Московского комитета, Ху Ханьминь, похоже, держится в надежде, что среди всех междоусобиц лидерство в партии все равно перейдет к нему по умолчанию. Он уверенно, возможно, высокомерно, ожидает, что различные генералы будут умолять его возглавить партию — не обязательно неразумный ход, учитывая, что Ху рассчитывает быть чем-то большим, чем просто марионеткой. Его упрямство в реализации своей далеко идущей повестки вызвало многочисленные сравнения с Мустафой Кемалем.\n\nЛидерство Чжу Пэйдэ, вытекающее из его предыдущего руководства хунтой, получило серьезный удар из-за серьезных внутренних проблем с лидерством в 3-й армии со стороны Фань Шишэна, Цзинь Ханьдина и Чжу Дэ, которые все агитировали за дальнейшее разделение власти. Ху Жоюй присутствовал в Гуанчжоу, но Лун Юнь остался в Куньмине, проявляя мало интереса к национальному проекту. Для многих делегатов из Юньнани возрастает необходимость вернуться домой, чтобы предотвратить очередной провинциальный переворот, поскольку 3-я армия впадает в беспорядок. Однако это ослабит их позиции в текущих переговорах."
 YUN.midgame.401.a: "Гуанчжоу — наш главный и единственный приоритет."
 YUN.midgame.401.b: "Отправить их домой, чтобы присматривать за Луном."

 YUN.midgame.402.t: "Возвращение к берегам Вампу"
 YUN.midgame.402.d: "3-я армия — не единственная, кто переживает значительные потрясения после прибытия в Гуанчжоу. Когда старшие офицеры совершают паломничество в свою старую Военную академию, генерал Хэ Инцинь чувствует напряжение среди своего штаба. Хотя никто еще не выступил с вызовом ему, остаются вопросы о его лидерстве, и всплыли старые обиды и недовольства.\n\nФракция «Старой гвардии» Хэ Инциня представляет основную линию Вампу, а его лоялисты — консервативные военные, обученные подчиняться партийной ортодоксии. Генерал может оказывать свое влияние через Ассоциацию выпускников Военной академии Вампу (WMAAA), созданную Чаном как соперника левой Ассоциации революционных одноклассников Военной академии Вампу (WMARCA) Дэн Яньда.\n\nДва блока начали организовываться против лидерства Хэ Инциня. Чэнь Чэн был восходящей звездой и протеже как Дэна, так и Чана, и его «Клика гражданского строительства» включает многих офицеров левого толка, сочувствующих Временному комитету действий (PAC) Дэна, но оставшихся верными Чану во время Великого похода. Их соперниками является Общество синерубашечников, подпольная клика ультранационалистических офицеров, вдохновленных успехами Бориса Савинкова и СЗРС.\n\nОднако пока наследие Директора Чана живет — различные офицеры Вампу, похоже, довольны тем, что сплачиваются вокруг своего номинального лидера. Сам Хэ Инцинь усвоил это на горьком опыте во время Северного похода. Под давлением других фракций он сместил Чана во имя единства партии, но вскоре обнаружил, что 1-я армия, организованная бывшим кадетом по имени Чжу Шаолин, отказывается выполнять его приказы, пока Чан не вернется. Когда разъяренный Чан был неизбежно восстановлен, он предупредил генерала Хэ, что «без Чан Кайши нет Хэ Инциня!» Что ж, Чан давно мертв, и был ли он прав, еще предстоит увидеть."
 YUN.midgame.402.a: "Вампу несет революцию для всего Китая!"
 YUN.midgame.402.b: "1-я армия сплачивается вокруг генерала Хэ."

 YUN.midgame.403.t: "Новые союзники в Новых правых"
 YUN.midgame.403.d: "Руководство хунты Гоминьдана, в котором доминировали военные, оставило серьезный вакуум в гражданском лидерстве, что стало большой проблемой, поскольку территория движения увеличилась в четыре раза. Неэффективное управление и сравнения с милитаристами стали тормозом для легитимности партии. Ху Ханьминь и его Московский комитет имеют де-факто монополию на гражданское партийное руководство, что они продолжают надеяться использовать в своих интересах. Однако, поскольку переговоры зашли в тупик, более мелкие фракции быстро разрослись и увеличились в размерах.\n\nДай Цзитао и его Общество революционных товарищей Чжэцзяна вышли из своих баз в Цзяннани (регион, охватывающий устье реки Янцзы, включая Шанхай и части Цзянсу, Чжэцзяна и Аньхоя), завербованные Хэ Инцинем. И Дай, и Чэнь Гофу были старшими политическими сотрудниками Вампу, а Чэнь Лифу был доверенным секретарем Чан Кайши, так что все они хорошо известны генералу Хэ. Дай Цзитао также считается выдающейся интеллектуальной фигурой правых, одним из немногих, кто может соперничать с Ху Ханьминем по влиянию.\n\nЧжан Цюнь, де-факто начальник тыла 1-й армии и однокурсник Чана и Хэ, завербовал Ян Юнтая и группу гражданских лиц для формирования «Общества строительства Нового Китая». Однако чаще его называют «Новой кликой политической науки». Ян Юнтай был членом старой итерации, обвиняемым в предательстве доктора Сунь Ятсена в пользу Лу Жунтина и переговоров с Бэйяном. Эта более новая версия, однако, кажется более сочувствующей или, по крайней мере, более послушной в отношении партийного правления Гоминьдана. Их опыт и глубокие связи бесценны для партии, но их лояльность под сомнением.\n\nАрмия — это то, как завоевывается власть в Китае; с годами необходимость в сильном гражданском аппарате была признана всеми фракциями по всей стране. Внутри Гоминьдана Чан был одним из немногих, кто мог одновременно командовать большой армией и гражданскими последователями, что никто в данный момент, похоже, не может воспроизвести в больших масштабах. Пока что придется довольствоваться этим."
 YUN.midgame.403.a: "У Московского комитета самые лояльные кандидаты."
 YUN.midgame.403.b: "Общество Чжэцзяна вырастило практичных людей."
 YUN.midgame.403.c: "Клика политической науки знает всех нужных людей."

 YUN.midgame.404.t: "Компромисс в Кантоне"
 YUN.midgame.404.d: "После нескольких недель конференции, которая, казалось, вела в никуда, генерал Хэ Инцинь из 1-й армии и ведущий партийный теоретик Дай Цзитао из Общества революционных товарищей Чжэцзяна заключили соглашение, обойдя ранее доминировавший Московский комитет и Клику 3-й армии. Согласно их предложению, генерал Хэ займет пост президента Революционного правительства, председателя Гоминьдана и председателя Военного совета, в то время как Дай Цзитао станет первым премьером (временного) Исполнительного Юаня и заместителем председателя партии, контролируя исполнительную ветвь власти, фактически как премьер-министр.\n\nХэ Инцинь, который на удивление хорошо ладил с Хуан Шаохуном и в меньшей степени с Ли Цзунжэнем и Бай Чунси из Новой клики Гуанси, сумел заручиться их поддержкой этого предложения. Ожидается, что Хуан будет назначен министром внутренних дел в рамках договоренности, с благоприятными назначениями для Ли и Бая, которые все еще де-факто контролируют Гуанси вместе с Хуан Сюйчу.\n\nДай Цзитао, в свою очередь, смог убедить Ху Ханьминя и его союзников не покидать конференцию, опираясь на их прошлую дружбу и предложение сделать Ху Ханьминя премьером (временного) Законодательного Юаня, а Цзюй Чжэна — премьером (временного) Судебного Юаня. Он поклялся работать над поддержанием гражданского правления и заявил, что эта договоренность будет временной мерой до объединения.\n\nХотя это далеко от идеальной схемы, тот факт, что был найден какой-либо консенсус, принес облегчение большинству делегатов, которые быстро подчинились правительству Хэ-Дая. Однако титанические торги, которые потребовались, не сулят ничего хорошего для долгосрочных перспектив этого правительства, и ясно, что все еще далеко не закончено."
 YUN.midgame.404.a: "Великий акт государственной мудрости обеих сторон."

 YUN.midgame.405.t: "Гуйчжоуский Гоминьдан возвращается в Гуанчжоу"
 YUN.midgame.405.d: "Внезапным поворотом судьбы хунта Гоминьдана, отступившая в Гуйчжоу после проигрыша в Северном походе, смогла вернуться в Гуанчжоу спустя десятилетие. Победив милитаристов и соперников, стоявших на их пути, Национально-революционная армия взяла под контроль Лянгуан, вернув партийное государство на те же позиции, что и в 1925 году.\n\nОднако сформировать новое Национальное правительство в Гуанчжоу оказалось не так просто. Правое крыло партии казалось безнадежно расколотым между различными фигурами, и переговоры затянулись, пока наконец не был достигнут компромисс между генералом Хэ Инцинем и партийным теоретиком Дай Цзитао. После того как большая часть партии подчинилась, их внимание теперь обращается на Север."
 YUN.midgame.405.a: "Они никогда не сдавались, и мы тоже не сдадимся!"
 YUN.midgame.405.b: "Похоже, они опередили нас в Гуанчжоу."
 YUN.midgame.405.c: "Еще одно десятилетие, еще одна неудавшаяся революция."

#Zhu Peide's Rebellion Mini-Chain
 YUN.midgame.410.t: "Реакция 3-й армии"
 YUN.midgame.410.d: "Хотя Чжу Пэйдэ всегда ожидал, что ему придется делиться властью, даже когда он был главой хунты Гуйчжоу, он всегда был лишь первым среди равных. Наблюдать за тем, как разворачивался Конгресс, было для него не чем иным, как оскорблением. Хотя Чжу все еще является членом ЦИК и губернатором Юньнани, единственная должность, которую он получил в новом правительстве, — это символическая позиция в Военном совете под председательством Хэ Инциня — активная попытка оттеснить его на второй план.\n\nПоскольку ситуация быстро выходила из-под его контроля, Чжу задумал устроить переворот с теми силами, которые у него есть, до того как хунта будет официально распущена. Однако ветер, похоже, дует против него. Он все еще не в лучших отношениях с Ху Ханьминем и Московским комитетом, увидев провал нескольких раундов спорных переговоров. Ху Ханьминь, несмотря на свое открытое презрение к генералу Хэ, является известным сторонником партийного единства и приверженности демократическому централизму, и он дал понять свое мнение. Тем временем другие региональные генералы, необходимые для успеха переворота, такие как Ли Цзунжэнь, Бай Чунси и Чэнь Цзитан, были в значительной степени подкуплены. Столкнувшись с этими тревожными знаками, его товарищи-офицеры из 3-й армии сообщили генералу Чжу, что они слишком разделены и что большинство рядовых просто хотели бы подыграть шоу и продемонстрировать единство."
 YUN.midgame.410.a: "Генерал Чжу выступает против компромисса!"
 YUN.midgame.410.b: "Губернатор Чжу возвращается в Юньнань для планирования."

 YUN.midgame.411.t: "Генерал Чжу унижен"
 YUN.midgame.411.d: "Выпад Чжу Пэйдэ против компромисса Хэ Инциня и Дай Цзитао не имел особого успеха. Фракции Новых правых сомкнули ряды, региональные генералы из Гуанси и Гуандуна промолчали, и, что наиболее убийственно, Ху Ханьминь присоединился к Дай Цзитао, осудив Чжу как выскочку-милитариста, который угрожает единству партии ради своих собственных амбиций на лидерство.\n\nИз его товарищей по 3-й армии только Чжу Дэ и другие левые поддержали его (ухудшив восприятие среди правых), в то время как другие фигуры Юньнани, такие как Фань Шишэн и Цзинь Ханьдин, поспешили заявить, что он действовал в одиночку.\n\nПоскольку его плохо продуманный план дал обратный эффект, Чжу Пэйдэ мало что мог сделать, кроме как попытаться сохранить лицо — сдав свое место в ЦИК и вернувшись домой в Юньнань с позором. Чжу остается губернатором, но никто не знает, как долго это продлится."
 YUN.midgame.411.a: "Отправляйся домой в Куньмин, социалистический предатель!"

 YUN.midgame.412.t: "Кончина Чжу Пэйдэ"
 YUN.midgame.412.d: "С момента унизительного инцидента в Гуанчжоу Чжу Пэйдэ работал вдвое усерднее на посту губернатора Юньнани, чтобы спасти свою репутацию патриота. В сочетании со стрессом от управления своими осмелевшими соперниками, его здоровье ухудшилось. Сомнительное качество и доступность медицины в Куньмине нанесли последний удар, когда губернатор Чжу принял низкокачественные лекарства от анемии, импортированные из Германии, чтобы не пропустить встречу, из-за чего он сильно заболел и скончался после пребывания в больнице.\n\nСообщается, что перед смертью он сказал [ROOT.GetLeader], пришедшему навестить его в больнице, что у него осталось сказать три вещи. Во-первых, война сопротивления неизбежна, а национальные силы ограничены, поэтому он просил похоронить его просто, а не тратить деньги на государственные похороны. Во-вторых, он просил, чтобы его семья и дети заботились о себе сами, а не получали преференциального отношения. Наконец, он просил не винить его семейную сиделку в его смерти, потому что в конечном итоге медицинская наука Китая развита недостаточно.\n\nЕсли целью Чжу была реабилитация своей репутации, похоже, это сработало. Публичная похвала со всех секторов партии, включая левых, полилась рекой. Крупные фигуры отметили его усердие, скромность и патриотизм. Национальное правительство официально издало указ о его награждении:\n\n«Генерал Чжу Пэйдэ... был человеком великого военного мастерства и ума. В ранние годы он последовал за Премьером [Сунь Ятсеном] и служил революции. Ему неоднократно доверяли важные военные задачи. В Северном походе он вел дивизии и внес большой вклад... Он смог посвятить свою энергию и мудрость трудным временам... В память о его прошлых достижениях мы скорбим о его утрате... расходы на похороны должны быть простыми, чтобы соответствовать его простым и бережливым устремлениям. История его жизни должна быть сохранена и передана в Национальный исторический музей, чтобы почтить его заслуги и вдохновить будущие поколения»."
 YUN.midgame.412.a: "Да покоится с миром верный солдат."
 YUN.midgame.412.b: "Его запомнят как патриота."

 YUN.midgame.413.t: "Чжу Пэйдэ объединяется с Ху Ханьминем"
 YUN.midgame.413.d: "Перед отъездом в Куньмин Чжу Пэйдэ и его люди садятся с Ху Ханьминем и его союзниками для последнего раунда переговоров. В частных беседах они обсудили свое взаимное недоверие к новому правительству, в котором доминируют военные, и договорились консультироваться друг с другом перед тем, как предпринимать какие-либо шаги.\n\nХу Ханьминь усердно работает над расширением своего влияния в законодательном органе и партийном аппарате, сдерживая влияние Дай Цзитао и Чжан Цюня. Его связи с правительством Гуандуна и Чэнь Цзитаном в частности дали ему определенную жесткую силу, которой не хватает большинству других гражданских фигур. Они надеются, что смогут заручиться поддержкой Новой клики Гуанси, которая все еще находится в процессе перестройки, и, возможно, Гуйчжоу и Хунани для их стремления восстановить контроль над партией."
 YUN.midgame.413.a: "Союз заключен."

 YUN.midgame.414.t: "Юг консолидируется вокруг Ху Ханьминя"
 YUN.midgame.414.d: "Осторожно стараясь не поставить под угрозу успех революции в целом, Ху Ханьминь стал центром внутрипартийного сопротивления правлению Хэ Инциня. Он усердно работал над тем, чтобы оторвать региональные силы от Хэ Инциня, обеспечив поддержку Гуандуна, Юньнани и совсем недавно Гуанси. Работа с милитаристами всегда была трудной задачей для упрямого централиста Ху Ханьминя, но так же трудно принять военный контроль над партией.\n\nВ национальном правительстве Ху использовал свою позицию премьера Законодательного Юаня и свою известность как партийного лидера, чтобы попытаться изолировать Хэ Инциня. Он несколько раз пытался убедить Дай Цзитао отказаться от Генералиссимуса, стремясь назначить Чжу Пэйдэ новым председателем Военного совета.\n\nОн знает, что положение генерала Хэ шаткое, потому что, в отличие от Чан Кайши до него, он обладает только реальной военной властью и с трудом вызывает подлинную лояльность гражданского аппарата. Но контроль — это больше, чем просто лояльность, а наемная Клика политической науки имеет печально известную тенденцию идти туда, куда дует ветер. Возможно, ему лучше заручиться их поддержкой. В любом случае появление единого южного блока несет зловещие предзнаменования для правительства Вампу."
 YUN.midgame.414.a: "Идеями и верностью мы спасем нашу партию."
 YUN.midgame.414.b: "Силой и контролем мы свергнем тиранов."

#Narrative Events (420-439)
 YUN.midgame.420.t: "Два титана правых"
 YUN.midgame.420.d: "Двумя главными идеологическими лидерами правого Гоминьдана являются Ху Ханьминь и Дай Цзитао, оба близкие доверенные лица Сунь Ятсена, опубликовавшие обширные труды, интерпретирующие теории основателя партии. Проведя много времени за редактированием рукописей друг друга до поздней ночи, эти двое являются близкими друзьями, но их соответствующие последователи с тех пор отдалились друг от друга.\n\nЭтот раскол начался с разногласий, вызванных Единым фронтом, и собрания различных правых деятелей в пригороде Пекина Сишань (Западные холмы) для сопротивления растущему влиянию Китайской синдикалистской партии. Большинство из этих людей симпатизировали консервативной буржуазной демократии, более схожей с первоначальным Тунмэнхоем. Дай Цзитао был с силой изгнан с заседаний, обвиненный в социалистических симпатиях.\n\nДай в конечном итоге сплотил членов так называемых Новых правых, фракции правых, которые изначально стремились сохранить Единый фронт, но позже поддержали Чан Кайши в его стремлении отбиться от Китайской синдикалистской партии, не подвергая опасности иностранную помощь от Интернационала. Они отличились тем, что утверждали, что очищают идеологию Суня от иностранных элементов, смешивая ленинскую политическую структуру авангарда с традиционализмом.\n\nЧто объединяет правый Гоминьдан, так это общая приверженность революционному национализму и привязанность к теориям доктора Суня, но отказ от необходимости классовой борьбы. Хотя и Ху, и Дай, возможно, начинали свою карьеру, увлеченные левыми идеями, такими как марксизм и анархизм, в конечном итоге это было с намерением продвигать националистическую, антиимпериалистическую повестку дня, и оба в конечном итоге отбросили эти теории как неэффективные или прямо враждебные китайскому суверенитету. Ху Ханьминь, в отличие от многих своих последователей, не только верит, что партийное государство предотвратит вырождение революции в классовую войну, но и спасет ее от «лицемерной буржуазной демократической политики». Тем не менее, хотя партия должна не допускать своих соперников, когда государство будет окончательно создано, оно, в свою очередь, должно держать партию под контролем."
 YUN.midgame.420.a: "Мы должны держаться за идеалы, на которых была основана партия."
 YUN.midgame.420.b: "Нам нужно принять перемены и динамизм, чтобы победить!"

 YUN.midgame.421.t: "Клики Вампу"
 YUN.midgame.421.d: "1-я армия гордится тем, что представляет весь Китай. В отличие от региональных уклонов других армий НРА (даже если на практике студенты и сотрудники Вампу, как правило, набирались из нескольких избранных лояльных провинций), братство Вампу, которое возникло, дало им чувство межпровинциальной связи.\n\nЭто не помешало им расходиться во мнениях относительно своих планов на будущее. Старая гвардия во главе с Хэ Инцинем черпает вдохновение у более ранних консервативных реформаторов в Китае, а также в успешных усилиях Японии по модернизации. Занимая многие видные посты в истеблишменте, их приоритетом является поддержание порядка и баланса на протяжении всей революции.\n\n«Клика гражданского строительства» получила свое название от командования Чэнь Чэна 18-й армией (сформированной из разбитых частей армии Гуандуна) и 11-й дивизией. Китайские иероглифы для 11 (Десять и Один), если их сложить вместе, напоминают иероглиф для земли (Ту). Иероглифы для 18 (Десять и Восемь), если их сложить вместе, выглядят как иероглиф для дерева (Му), поэтому вместе получается Туму (Строительство/Инженерия). Они известны своим поглощением левых подразделений и своим высокомерием — гордо шагая перед дружественными силами и игнорируя их, высмеивая своих меньших братьев как «тофу-войска» или «войска из остатков масла».\n\nТэн Цзе давно планировал создать организацию с ведущими выпускниками, набранными из рядов Вампу. Он создал ячейки в полиции, армии и правительстве, выступающие против иностранного империализма. Немецкие, японские и легационные власти распространили название «Общество синерубашечников», наряду с альтернативными названиями, такими как «Синие куртки», «Группа синих рубашек» и «Цзиньванхуэй» (Общество спасения нации от гибели) — название взято от синих нашивок на их униформе в дополнение к партийным цветам.\n\nКаждый соревнуется за влияние в более широкой армии, создавая перекрывающиеся сети патронажа для обеспечения продвижения своих членов."
 YUN.midgame.421.a: "Хэ Инцинь и Старая гвардия знают лучше."
 YUN.midgame.421.b: "Чэнь Чэн и Клика гражданского строительства принимают будущее!"
 YUN.midgame.421.c: "Тэн Цзе и Синерубашечники спасут нацию!"

 YUN.midgame.422.t: "Восход Клики СС"
 YUN.midgame.422.d: "С тех пор как Дай Цзитао впервые принял командование Исполнительным Юанем, он переделал его по своему образу и подобию. Его последователи, в основном выходцы из Чжэцзяна, занимают высшие посты и усердно работают над реализацией повестки премьера Дая. Учитывая исчерпывающий портфель полномочий, полученный Даем в результате компромисса с президентом Хэ, существует мало областей, недоступных для него: военные остаются под контролем Хэ Инциня и Вампу, финансовый и экономический секторы находятся под Кликой политической науки, а законодательная и судебная власть — под назначенцами Клики Московского комитета.\n\nЧтобы удовлетворить растущие требования администрации Дая, Общество революционных товарищей Чжэцзяна превратилось в более крупную структуру, часто называемую аутсайдерами «Кликой СС» (аббревиатура от Central Club/Committee Clique или ссылка на двух братьев Чэнь). Само ее существование, однако, было тщательно опровергнуто Чэнь Лифу как попытка посеять партийные разногласия и поставить под сомнение лидерство Дая. Как бы то ни было, и господин Чэнь, и его старший брат Чэнь Гофу стали ведущими лейтенантами Дая в администрации партийного государства.\n\nВсе трое ценят образование, дисциплину и революцию партии. В то время как Дай Цзитао является лицом их клики, а Чэнь Лифу — его дублером, Чэнь Гофу — их тихая рабочая лошадка. Говорят, он наслаждается простой жизнью в соответствии с конфуцианскими принципами — никогда не пьет, не курит и не ходит в кино. Его единственное хобби — чтение книг, на которые он тратит деньги, даже если это был его последний доллар. Говорят, что его самым большим сожалением в жизни является то, что ему было отказано в высшем образовании из-за вступления в партию в возрасте 18 лет, и поэтому он рад поощрять молодых людей начинать углубленное обучение. Имея слабое здоровье из-за затяжных последствий туберкулеза, он тем не менее продолжает работать и читать лекции. Его цитируют: «Самое важное оружие в борьбе с болезнью — это забыть, что вы больны», поистине пример для всех нас."
 YUN.midgame.422.a: "Клика СС работает для продвижения повестки президента Хэ!"
 YUN.midgame.422.b: "Дай Цзитао возвышает умы и души наших товарищей!"
 YUN.midgame.422.c: "Нет никакой Клики СС, есть только одна партия и одна революция!"

 YUN.midgame.423.t: "Теория политического дискурса"
 YUN.midgame.423.d: "Ни одна из итераций Клики политической науки на самом деле не вписывается в Новых или Старых правых Гоминьдана. Старая клика политической науки, возглавляемая Цэнь Чуньсюанем и Ли Гэньюанем, была печально известна саботажем усилий правительства Гуанчжоу по написанию новой конституции, и их растущий спор с доктором Сунем привел к тому, что они сотрудничали с милитаристом Гуанси Лу Жунтином, чтобы изгнать Суня из Гуанчжоу. Точно так же их попытка отбить Юньнань у Тан Цзияо закончилась тем, что голова Гу Пиньчжэня была насажена на пику.\n\nЧжан Цюнь был штабным сотрудником при Цэне, но также не смог вписаться в Бэйян после того, как Гоминьдан сверг Клику политической науки, зато нашел стабильную работу под началом Чан Кайши и Хэ Инциня. Новый вице-премьер Исполнительного Юаня и по совместительству военный министр (с небольшим портфелем в МИДе), он построил свою клику вокруг технократического контроля над экономическими органами.\n\nЯн Юнтай, бывший соратник Хуан Сина и министр финансов Правительства защиты конституции, объединился с Цэнем и Ли против Суня. Когда их правительство пало, он был вынужден бежать к правительству Бэйяна, но после недолгого пребывания оказался в изгнании в Шанхае. Завербованный после почти десятилетия отставки Чжан Цюнем, он стремится избежать потери власти снова, приняв политику политической гибкости, оставаясь верным Генералиссимусу.\n\nЯн предложил решить проблемы Бэйянских милитаристов (непримиримо и активно выступающих против Гоминьдана) военным путем, проблемы Южных милитаристов, таких как Ли Цзунжэнь (обладающих военной мощью, но бедных финансово) — экономическими средствами, и решить проблемы Ху Ханьминя и Московского комитета (слабых в военном отношении, но с сильной политической репутацией) вместе с иностранными державами — дипломатическими средствами."
 YUN.midgame.423.a: "Военными средствами мы свергнем предателей!"
 YUN.midgame.423.b: "Мы будем держать наших «союзников» в узде с помощью экономических стимулов."
 YUN.midgame.423.c: "С помощью дипломатии мы сохраним единство партии."

 YUN.midgame.424.t: "Меч и перо"
 YUN.midgame.424.d: "Революция держится на рвении ее последователей, но они горько разделены на конкурирующие фракции. Хотя традиционно считается, что бюрократия Китая делится на меч (люди действия/военные) и перо (люди знания/бюрократия), крупнейшие лагеря Гоминьдана можно сравнить с цветами флага «Синее небо, белое солнце и совершенно красная земля», который украшает почти каждое здание в [ROOT.Capital.GetCapitalVictoryPointName].\n\nСинерубашечники (Синий) значительно выросли во влиянии по всей армии, продавая радикальное видение Китая, управляемого подобно фанатичному, дисциплинированному и революционному порядку их идеализированных воспоминаний о старой академии Вампу. Для многих молодых бывших кадетов, ставших старшими офицерами, они не знали ничего, кроме нестабильности, революции и войны с детства, и полны решимости спасти Китай любой ценой — даже если это означает отказ от коррумпированного и раздутого партийного аппарата и внедрение иностранных идей, импортированных из Европы.\n\nКлика СС (Белый) доминировала в партийном аппарате. Создавая массовое движение среди гражданских партийных кадров, призывающее к неоконфуцианскому возрождению и строгому соблюдению интерпретации Дай Цзитао теорий Сунь Ятсена, они апеллируют к более интеллектуальной форме ультранационализма, сосредоточенной вокруг партийной ортодоксии. Их контроль над большей частью истеблишмента и образования делает их мощными, однако у многих падает мнение о военных и их связи с оппортунистами вроде Ян Юнтая и Клики политической науки.\n\nКлика гражданского строительства (Красный) — еще одна ветвь старой гвардии, состоящая из тех, кто разочаровался в жестокости Синерубашечников и коррупции Клики СС. Также обращаясь к старым временам Вампу, они создали массовую поддержку своей дисциплиной и заботой о людях, отвергая радикализм социалистов.\n\nТри фракции почти не тратили времени, подрывая друг друга, иногда даже больше, чем аутсайдеров партии. По мере расширения территории партии конкуренция за влияние становится ожесточенной, особенно когда каждая из них поддерживает свою собственную разведывательную сеть, молодежную организацию и сети патронажа. Все под присмотром Генералиссимуса."
 YUN.midgame.424.a: "Синий, как небо и униформа наших героев!"
 YUN.midgame.424.b: "Белый, как Солнце и партия, озаряющая землю!"
 YUN.midgame.424.c: "Красный, как земля, обагренная кровью мучеников!"
 YUN.midgame.424.e: "Тщательно сбалансировано, как и должно быть."

 YUN.midgame.425.t: "Верный Гуйчжоу"
 YUN.midgame.425.d: "После Великого похода западный Гуйчжоу был центром власти остатков Национально-революционной армии. До правления Гоминьдана там было мало региональных государственных предприятий или вообще какой-либо промышленности, над чем хунта работала, чтобы частично решить проблему, хотя и не особенно успешно. Тем не менее, с перемещением основных баз Гоминьдана в Гуанчжоу возник вакуум власти, поскольку фракции борются за влияние.\n\nВан Боцюнь — зять Хэ Инциня и брат Ван Вэньхуа, который возглавлял некоторых из первых революционеров Гоминьдана в провинции против их дяди Лю Сяньши. Гражданский с глубокими связями в провинции, его преследуют обвинения в коррупции. И Хэ Инцинь опасается появления кумовства, если он назначит его на пост губернатора, тем более что его младший брат Хэ Цзиу одновременно добивается назначения мэром Гуйяна (столицы провинции).\n\nУчитывая, что Гуйчжоу — его родная провинция, она весьма ценна для Генералиссимуса. Еще один потенциальный член его круга, который рассматривается, — его секретарь и земляк Лю Цзяньцюнь. Офицер пропаганды, ответственный за слежку за Синерубашечниками, говорят, проникся их идеологией.\n\nГлавный соперник Хэ Инциня в провинции — Гу Чжэнлунь, бывший союзник, с которым они поссорились. Его младшие братья являются видными членами левой RCA Ван Цзинвэя, что бросает тень подозрения на него, несмотря на его антисоциалистические тенденции. Еще одна фигура Гоминьдана, Лу Дао, остается поблизости, но в значительной степени не рассматривается — он связал свою судьбу с генералом Гу.\n\nУчитывая чрезвычайно напряженную личную политику, у Политической науки или Центрального клуба было мало возможностей для своих назначений; хотя обе клики искали поддержки Гу Чжэнлуня для своего назначения, чтобы обойти генерала Хэ и Лю."
 YUN.midgame.425.a: "Ван Боцюнь, зять Генералиссимуса."
 YUN.midgame.425.b: "Гу Чжэнлунь, оставшийся сильный человек Гуйчжоу."
 YUN.midgame.425.c: "Лю Цзяньцюнь, секретарь-синерубашечник."

 YUN.midgame.426.t: "Новости и газеты партийного государства"
 YUN.midgame.426.d: "Несмотря на повсеместную цензуру, желание людей посплетничать и узнать новости о своем правительстве едва ли может быть утолено. Чтобы удовлетворить эту потребность, появилось множество партийных или квазигосударственных газет.\n\n«Capital News» считается духовным преемником «Минь Цюань Ли» (Права народа) Дай Цзитао. Основанная Кликой СС, ее заявленная миссия состояла в том, чтобы пропагандировать Три народных принципа и использовать доступ к конфиденциальным секторам для получения историй из первых рук, эксклюзивных материалов, избегая при этом печати каких-либо государственных или военных секретов. Публикуясь очень поздно ночью и включая иллюстрированные приложения о социальной сатире, а также серийные романы, заработанные деньги позволили им создать спин-оффы, такие как журнал «Current Affairs Monthly», «Political Review Monthly» и издательство «Cheng-chung». Их острые политические комментарии часто приводили к тому, что военные и политические деятели жаловались непосредственно президенту Хэ с требованием опровержения.\n\n«Society Mercury» — воинствующая газета, связанная с Синерубашечниками. Заявляя, что «национал-популизм — единственный инструмент самоспасения наций, находящихся на грани уничтожения», она настаивает на том, что «нет другого решения, кроме как подражать духу насильственной борьбы, как в Румынии и России». Восхваляя идеологию как «самое позитивное, самое смелое, самое сильное, конкретное проявление национального духа», они осуждают «унаследованный яд демократии», а также анархизм и индивидуализм за бессилие нынешнего Гоминьдана.\n\nУмеренные члены партии подписываются на «Reconstruction Review» Сунь Фо и «Three Principles of the People Daily» Ху Ханьминя. Клика политической науки стремилась возродить некоторые более мелкие газеты, которые появлялись и исчезали с годами, такие как «Modern Review» и информационное агентство «Guowen». Другие газеты, такие как «Shanghai Times», «Eastern Miscellany» и «New China», все еще существуют, даже если им не хватает прямого патронажа крупных партийных фигур."
 YUN.midgame.426.a: "Capital News всегда получает первый сенсационный материал!"
 YUN.midgame.426.b: "Society Mercury быстр и инновационен!"
 YUN.midgame.426.c: "Люди предпочитают более старые, надежные газеты."

 YUN.midgame.427.t: "Война с левыми"
 YUN.midgame.427.d: "Премьер Дай Цзитао начал жестокую «Войну с левыми». Изначально марксист, опубликовавший несколько статей о социализме, включая перевод «Экономических теорий Карла Маркса» Каутского, Дай восхищался их способностью достигать масс. Несмотря на членство в Обществе изучения марксизма, он отказался вступать в КСП в 1921 году и в итоге выступил против классовой борьбы, полагая, что рабочее движение бесполезно без сознательного руководства.\n\nКак секретарь и литературный помощник доктора Суня, он утверждал, что является одним из передовых толкователей идей Суня, и отмечал отсутствие марксистского вдохновения в его ранних работах. Дай опубликовал «Философские основы суньятсенизма», стремясь дискредитировать марксизм и его предполагаемую научную ценность. Апеллируя к собственному чувству ностальгии автора, гордости за расу, традиционной этике, пробуждению национализма, смутному социализму, призывам к ортодоксии, идеализированному взгляду на династию Чжоу, Дай сравнивает Суня с Конфуцием. Он также осудил Движение за новую культуру и иконоборчество, синтезировав революционное правое течение, включавшее учение Сунь Ятсена, ксенофобию и возвращение традиционных ценностей, которые он считал противоядием от научного социализма левых.\n\nЕго призывы к подавлению социализма, хотя и широко популярны, не везде воспринимаются хорошо. Социалистические симпатии широко распространены среди 3-й армии, и даже среди ее правых есть чувство солидарности против чрезмерного вмешательства центрального правительства. Чжу Пэйдэ, Фань Шишэн и Цзинь Ханьдин были замечены в защите своих товарищей-социалистов и будут продолжать сопротивляться попыткам чистки.\n\nВ рядах Вампу, даже с учетом ранних чисток социалистов, остаются левые, которые стремятся объединить левых и правых, чтобы вернуть Гоминьдан к его корням как синкретической революционной партии. Клика гражданского строительства, симпатизирующая Временному комитету действий, стремилась снизить поддержку социалистов, проводя собственные широкомасштабные социальные и экономические реформы."
 YUN.midgame.427.a: "Дай Цзитао — апостол Истинной Революции!"
 YUN.midgame.427.b: "Социалист или нет, они наши товарищи!"
 YUN.midgame.427.c: "Существует третий путь между реакцией и социализмом!"

 YUN.midgame.428.t: "Строительство нового правительства"
 YUN.midgame.428.d: "Построение нового правительства — сложнейшая задача. Гоминьдан стремится построить партийное государство, но существует острая нехватка квалифицированных специалистов, не говоря уже о преданных партийных кадрах по всему Китаю. Только Юньнань, Гуйчжоу, Гуанси, Гуандун, Хунань, Сычуань, Чжэцзян и Цзянсу на самом деле имеют полностью организованные провинциальные партийные отделения, составляющие 94% от общего числа городских и уездных отделений. Практически в каждой другой провинции есть временные директивные комитеты по партийным делам или единственный партийный агент, присланный братьями Чэнь для руководства партийными делами.\n\nБюрократия тем временем управляется почти напрямую из Военного совета, причем Военные советы имеют обширную власть над региональными администрациями. Ян Юнтай является главным архитектором этой системы, организуя создание зон подавления бандитизма с тремя приоритетами: административная эффективность, политическое образование и политическая мобилизация. Реформы Яна направлены на то, чтобы отдельные провинциальные исполнительные департаменты общались горизонтально, а не только со своим Центральным правительством и местными эквивалентами, а также на расширение полномочий уездных руководителей и подуездных форм правления в местных деревнях. Это включало создание системы Баоцзя, сельской милиции, дополненной краткосрочными центрами партийного образования в деревнях для борьбы с бандитами и повстанцами-социалистами.\n\nИх реформы, однако, были задушены медленной скоростью их реализации и сильной зависимостью от военных решений тем временем. Лишь несколько провинций, обычно под контролем офицеров Клики политической науки, внедрили реформы Яна, а плохие технологии связи означают, что многие из этих изменений вызвали лишь большую путаницу. Система Баоцзя в первую очередь понравилась джентри, разозлив многих крестьян. Попытки централизации Яна разозлили многих регионалистов и вызвали зависть Клики СС. Обвинения в элитарности и коррупции подтолкнули многих к призывам к реформам и изгнанию лидеров Клики политической науки."
 YUN.midgame.428.a: "Эти реформы сеют семена стабильной и свободной республики!"
 YUN.midgame.428.b: "Партия должна принять реформы и изменения, чтобы выжить!"
 YUN.midgame.428.c: "Их провал вызывает циклы сопротивления, насилия и жестокости."

 YUN.midgame.429.t: "Интриги в Куньмине"
 YUN.midgame.429.closer: "Юньнаньский Гоминьдан обычно рассматривается как более регионалистский и менее антисоциалистический, чем остальные правые. Возникли обвинения в укрывательстве социалистов, что ослабило фракцию Чжу Пэйдэ, поскольку он зависел от таких людей, как Чжу Дэ, в своей помощи. Возвращение Ли Гэньюаня также было спорным даже спустя столько лет, и его попытки восстановить влияние Старой клики политической науки не были восприняты хорошо. Фань Шишэн и Цзинь Ханьдин начали колебаться в своей поддержке из-за этих противоречий, оставаясь лояльными в основном из-за подозрения к влиянию Вампу.\n\nЛун Юнь и Ху Жоюй, которые оба приняли первоначальное правление Гоминьдана с расчетом на сохранение местной власти и автономии, стали смелее в подрыве основного аппарата Гоминьдана, создавая свои собственные партийные комитеты Гоминьдана и назначая своих лоялистов на видные посты — иногда насильно изгоняя назначенцев Чжу.\n\nЛю Чжи, один из Пяти тигров-генералов Вампу и бывший офицер армии Юньнани, был отправлен с отрядом, чтобы «разобраться в провинциальных делах». При таком количестве движущихся фигур неясно, кто выйдет победителем в затяжной борьбе за горную провинцию."
 YUN.midgame.429.d.Zhu_alive: "Несмотря на, казалось бы, экспоненциальный рост Новых правых, Юньнаньский Гоминьдан остается заметным в революции. Губернатор Чжу Пэйдэ осуществляет устойчивое, хотя и не неоспоримое руководство провинцией и пытается связать свою судьбу со «Старыми правыми», такими как Ху Ханьминь.\n\n$YUN.midgame.429.closer$"
 YUN.midgame.429.d.Zhu_dead: "Несмотря на, казалось бы, экспоненциальный рост Новых правых, Юньнаньский Гоминьдан остается заметным в революции. Со времени смерти губернатора Чжу Пэйдэ его друг и выпускник Вампу Ли Ми был назначен вместо него.\n\n$YUN.midgame.429.closer$"
 YUN.midgame.429.a: "Чжу Пэйдэ сплачивает Юньнань для сопротивления тирании [ROOT.Capital.GetCapitalVictoryPointName]!"
 YUN.midgame.429.b: "Ли Гэньюань и PSC переманивают Юньнань на свою сторону."
 YUN.midgame.429.c: "Старая клика Дянь вытесняет своих соперников в хаосе."
 YUN.midgame.429.e: "Ли Ми и Лю Чжи консолидируют Куньмин для Вампу."

#Digesting the LKMT (440-449)
 YUN.midgame.440.t: "Белое солнце возвращается в Нанкин"
 YUN.midgame.440.d.satellite: "Нанкин был местом славного возвращения Сунь Ятсена в Китай, избранного временным президентом собравшимися там революционерами 12 января 1912 года. Сегодня [ROOT.GetLeader] гордо стоит перед Президентским дворцом в Нанкине (бывший дворец генерал-губернатора), произнося речь в честь победы Национально-революционной армии.\n\nС падением Нанкина рушатся перспективы левого Парижского Центрального исполнительного комитета, хотя Правое крыло Партии чувствует себя не лучше. Теперь, вынужденные признать [ROOT.GetLeader], различные группы начали суетиться, пытаясь примкнуть к линии [ROOT.GetRulingParty]. Самым крупным из этих потенциальных союзников является Фракция реконструкции (RCF) и ее всегда ценная номинальная глава Сунь Фо, который недавно поклялся в верности новому Центральному исполнительному комитету, чтобы занять свою нишу в новой партии.\n\nRCF Сунь Фо — это последняя итерация его круга, который начался, когда он был мэром Гуанчжоу при своем отце Сунь Ятсене. Тогда известная как «Клика кронпринца», она включала многих молодых технократов и либералов, учившихся за границей. Хотя изначально они проявляли интерес к Конференции в Сишане, Ван Цзинвэй заставил их подчиниться, и позже они бежали на Гавайи после краха Северного похода. Эта «Гавайская клика» издавала журнал, известный как «Reconstruction Review» (который стал их тезкой), а также продолжает поддерживать связи с сообществами китайской диаспоры в Юго-Восточной Азии.\n\nСунь Фо, возможно, получил свое «наследство», но получат ли его последователи какие-либо благоприятные должности, кроме символических синекур в Законодательном Юане (Сунь уже ведет переговоры о том, чтобы стать вице-премьером), — это другой вопрос. Бюрократия уже довольно конкурентна, и Политическая наука, Московский комитет и другие разрозненные клики должны будут потесниться для них."
 YUN.midgame.440.d: "Нанкин был местом славного возвращения Сунь Ятсена в Китай, избранного временным президентом собравшимися там революционерами 12 января 1912 года. Сегодня [ROOT.GetLeader] гордо стоит перед Президентским дворцом в Нанкине (бывший дворец генерал-губернатора), произнося речь в честь победы Национально-революционной армии.\n\nС падением Нанкина перспективы левого крыла Гоминьдана рухнули вместе с ним. Правые, долгое время считавшиеся более слабым и менее легитимным крылом, теперь в руинах, и многие из тех, кто колебался между различными крыльями, присягнули правому режиму. Самым крупным из этих перебежчиков является Фракция реконструкции (RCF), и ее всегда ценная номинальная глава Сунь Фо поклялся в верности правому комитету, чтобы претендовать на свое место в Центральном исполнительном комитете.\n\nRCF Сунь Фо — это последняя итерация его круга, который начался, когда он был мэром Гуанчжоу при своем отце Сунь Ятсене. Тогда известная как «Клика кронпринца», она включала многих молодых технократов и либералов, учившихся за границей. Хотя изначально они проявляли интерес к Конференции в Сишане, Ван Цзинвэй заставил их подчиниться, и позже они бежали на Гавайи после краха Северного похода. Эта «Гавайская клика» издавала журнал, известный как «Reconstruction Review» (который стал их тезкой), а также продолжает поддерживать связи с сообществами китайской диаспоры в Юго-Восточной Азии.\n\nСунь Фо, возможно, получил свое «наследство», но получат ли его последователи какие-либо благоприятные должности, кроме символических синекур в Законодательном Юане (Сунь уже ведет переговоры о том, чтобы стать вице-премьером), — это другой вопрос. Бюрократия уже довольно конкурентна, и Политическая наука, Московский комитет и Клика СС должны будут потесниться для них."
 YUN.midgame.440.a: "Мы будем работать над внедрением их идей."
 YUN.midgame.440.b: "Сунь может остаться, но только ради имени."

 YUN.midgame.441.t: "Падший триумвир"
 YUN.midgame.441.d.satellite: "Ван Цзинвэй и его Ассоциация реорганизованных товарищей (RCA) являются ненавистными соперниками как Старых правых, так и Новых правых, яростными конкурентами во время борьбы за власть в Гуанчжоу и воспринимаются как продажные шкуры Третьего Интернационала. Ван Цзинвэй, однако, является доказанным политическим выживальщиком, гибким, как и высокомерным, и жаждет пробраться обратно в милость партии — якобы во имя партийного единства.\n\nВ действительности отношения RCA к [ROOT.GetLeader] являются, во всех отношениях, крайне сложным вопросом. Поскольку различные личности внутри [ROOT.GetNameDef] постоянно флиртуют между левым и правым крыльями, немногие оказываются особенно строго настроены против Вана по идеологическим соображениям. Многие, если не все, поддерживают Реорганизацию 1924 года, хотя немногие поддерживают союз с Интернационалом или сотрудничество с Китайской синдикалистской партией, но вместо этого провоцируют необходимость партийного единства в тяжелые времена. Хотя это, возможно, прямо соответствует желаниям RCA, самая жесткая оппозиция, исходящая от таких людей, как Ли Гэньюань, парадоксально побудила больше людей в рядах поддержать усилия Вана по примирению.\n\nВ отличие от левых, правое крыло Гоминьдана видит конечную цель революции в построении гармонично сотрудничающего национального тела, связанного культурой, действующего согласованно против взаимной угрозы. Такие люди, как Дай Цзитао, Ху Ханьминь и Чан Кайши, считали себя истинными революционерами, несмотря на свой консерватизм, и неудивительно, что левые и правые регулярно клеймили друг друга как контрреволюционеров. Между ними находятся такие люди, как Чжу Пэйдэ, Чэнь Чэн и Сунь Фо. Люди, которые по той или иной причине выступают за и поддерживают необходимость революции, но намерены примирить взгляды как левого, так и правого крыла.\n\nСо своей стороны, Ван настаивает, что он все еще может обеспечить иностранную поддержку через закулисные каналы, если его пригласят в правительство, и его присутствие уменьшит поддержку КСП. И в глобальном масштабе Ван остается ведущим лицом в Гоминьдане, отказ ему был бы сильным сигналом."
 YUN.midgame.441.d: "Ван Цзинвэй и его Ассоциация реорганизованных товарищей (RCA) являются ненавистными соперниками как Старых правых, так и Новых правых, яростными конкурентами во время борьбы за власть в Гуанчжоу и воспринимаются как продажные шкуры Третьего Интернационала. Ван Цзинвэй, однако, является доказанным политическим выживальщиком, гибким, как и высокомерным, и жаждет пробраться обратно в милость партии — якобы во имя партийного единства.\n\nУ Дай Цзитао и Реорганизации 1924 года (давшей название RCA) сложные отношения. В каком-то смысле он служил теневым альтер-эго Суня во время их изгнания в Японии, что сформировало более консервативную сторону Суня. Они верили, что неудача Синьхая была обусловлена провалом национального духа, но Дай также утверждал, что Синьхаю не хватало народного динамизма, необходимого для перемен. В то время как Дай одобрял авангардизм Реорганизации 1924 года, он утверждал, что истинная революция может быть осуществлена только через массы, а не радикальным меньшинством, и не одобрял союз с Интернационалом. Не одобряя одобрение двойного членства в Гоминьдане и КСП как разрешение внешнего контроля над партией, Дай отправился в де-факто изгнание в эпоху реорганизации, а смерть Суня разрушила любые сдерживающие факторы, которые у него были против левых, и подтолкнула его к почти самоубийственному пессимизму.\n\nВ отличие от левых, правое крыло Гоминьдана видит конечную цель революции в построении гармонично сотрудничающего национального тела, связанного культурой, действующего согласованно против взаимной угрозы. Такие люди, как Дай, Ху Ханьминь и Чан Кайши, считали себя истинными революционерами, несмотря на свой консерватизм, и неудивительно, что левые и правые регулярно клеймили друг друга как контрреволюционеров.\n\nКонечно, есть некоторая поддержка партийного единства в эти трудные времена. Ван утверждает, что он все еще может обеспечить иностранную поддержку через закулисные каналы, если его пригласят в правительство, и его присутствие уменьшит поддержку КСП. В глобальном масштабе Ван остается ведущим лицом в Гоминьдане, отказ ему был бы сильным сигналом."
 YUN.midgame.441.a: "Ван Цзинвэй может вернуться, но пусть лучше принесет пользу."
 YUN.midgame.441.b: "Предатель Ван может оставаться в Париже со своими кукловодами."

 YUN.midgame.442.t: "Остатки в Миньгань"
 YUN.midgame.442.d.satellite: "Когда Северный поход рухнул, потрепанные остатки Национально-революционной армии, сражавшиеся в Фуцзяни и Цзянси, отказавшиеся присоединиться к правым силам в Великом походе, решили уйти в подполье и вести затяжную партизанскую войну против Чжили. Эти силы организовали масштабное, но безуспешное Шанхайское восстание 1932 года против растущей тирании Лиги восьми провинций, но были жестоко подавлены.\n\nНе испугавшись, Сун Цинлин (вдова Сунь Ятсена), Ли Цзишэнь, Тань Пиншань и Дэн Яньда опубликовали «Декларацию к революционному народу Китая и мира» и объявили о создании Временного комитета действий (PAC) Гоминьдана для автономной координации деятельности партизанских остатков, теперь сосредоточенных в районе Фуцзянь-Цзянси (Миньгань).\n\nБольшинство их лидеров были видными фигурами в политике Гуандуна и играли ведущие роли в первоначальной Военной академии Вампу. Сочувствующие, такие как Клика гражданского строительства или левое крыло 3-й армии, стремились выступить посредниками в переговорах с этими аграрными революционерами. Но не все так уверены, так как PAC очень склонны к упрямству и, вероятно, станут занозой в боку любого, кто не так предан социалистической революции, как они."
 YUN.midgame.442.d: "Когда Северный поход рухнул, потрепанные остатки Национально-революционной армии, сражавшиеся в Фуцзяни и Цзянси, отказавшиеся присоединиться к правым силам в Великом походе, решили уйти в подполье и вести затяжную партизанскую войну против Чжили. Эти силы организовали масштабное, но безуспешное Шанхайское восстание 1932 года против растущей тирании Лиги восьми провинций, но были жестоко подавлены.\n\nНе испугавшись, Сун Цинлин (вдова Сунь Ятсена), Ли Цзишэнь, Тань Пиншань и Дэн Яньда опубликовали «Декларацию к революционному народу Китая и мира» и объявили о создании Временного комитета действий (PAC) Гоминьдана для автономной координации деятельности партизанских остатков, теперь сосредоточенных в районе Фуцзянь-Цзянси (Миньгань).\n\nБольшинство их лидеров были видными фигурами в политике Гуандуна и играли ведущие роли в первоначальной Военной академии Вампу. Сочувствующие, такие как Чэнь Чэн (протеже Дэн Яньда) и Клика гражданского строительства, стремились выступить посредниками в переговорах с этими аграрными революционерами. Но не все так уверены, так как PAC очень склонны к упрямству и, вероятно, станут занозой в боку правых."
 YUN.midgame.442.a: "Лучше иметь дело с ними внутри партии, чем вне ее."
 YUN.midgame.442.b: "Впускать их в наши ряды — это рецепт катастрофы."

 YUN.midgame.443.t: "Коллапс Лиги китайских синдикалистов"
 YUN.midgame.443.d.satellite: "Лига китайских синдикалистов (LCS) была основана в основном Китайской синдикалистской партией (КСП) как средство противодействия влиянию Гоминьдана и расширения границ Единого фронта. Лига почти сразу оказалась громоздкой силой, поскольку марксисты, синдикалисты, анархисты и различные другие независимые левые боролись друг с другом за влияние. Соперниками КСП, сами разделенными на крылья, является анархистское Общество (Нового) Мира, возглавляемое Четырьмя старейшинами Гоминьдана.\n\nКСП, и LCS как ее продолжение, является причиной существования правого Гоминьдана, который сформировался в оппозиции к Единому фронту. Правые считают, что уникальные социально-экономические обстоятельства Китая означают, что классовая война и диктатура пролетариата не нужны. Хотя они отвергают влияние свободного рынка и отмечают социальные дефекты системы наемного труда, правый Гоминьдан считает, что китайский капитализм достаточно рудиментарен, чтобы еще не сформировалось классовое сознание капиталистов.\n\nВеря наиболее строго в применение Трех народных принципов в противоположность любой форме марксизма или анархизма, Чжу Пэйдэ тем не менее предварительно вынес на обсуждение вопрос о включении китайских синдикалистов в Национальную революцию.\n\nОдин из первых членов КСП, Ван Фушэн, был поставлен на высокую позицию в партии в связи с недавними событиями, сумев создать провинциальный комитет от имени руководства КСП. Действуя с такими людьми, как Ли Синь, дуэт закрепился в местном студенческом и рабочем движениях.\n\nДовольно любопытно, что по другую сторону баррикад Четыре старейшины и их Общество Мира рассматриваются как гораздо более приемлемые. Ли Шицзэн, например, назвал марксистский синдикализм регрессивным, а Миньшэн — более совместимым с современными достижениями человеческой цивилизации. Гоминьдан должен вести новый третий путь против капитализма и синдикализма, двух сторон западного империализма. Примирение с Четырьмя старейшинами, возможно, облегчило бы задачу по сдерживанию КСП."
 YUN.midgame.443.d: "Лига китайских синдикалистов (LCS) была основана в основном Китайской синдикалистской партией (КСП) как средство противодействия влиянию Гоминьдана и расширения границ Единого фронта. Лига почти сразу оказалась громоздкой силой, поскольку марксисты, синдикалисты, анархисты и различные другие независимые левые боролись друг с другом за влияние. Соперниками КСП, сами разделенными на крылья, является анархистское Общество (Нового) Мира, возглавляемое Четырьмя старейшинами Гоминьдана.\n\nКСП, и LCS как ее продолжение, является причиной существования правого Гоминьдана, который сформировался в оппозиции к Единому фронту. Правые считают, что уникальные социально-экономические обстоятельства Китая означают, что классовая война и диктатура пролетариата не нужны. Хотя они отвергают влияние свободного рынка и отмечают социальные дефекты системы наемного труда, правый Гоминьдан считает, что китайский капитализм достаточно рудиментарен, чтобы еще не сформировалось классовое сознание капиталистов.\n\nТаким образом, марксисты не делают ничего, кроме поощрения заблуждения об интернационализме рабочего класса, которому необходимо противопоставить Национальное возрождение против империализма. И марксисты, и анархисты являются «реакционными элементами», по словам Дай Цзитао, которые подрывают «горькую дисциплину», требуемую от рабочих для повышения производительности и, таким образом, поддержки кооперативов, школ и страхования для трудящихся. Лидеры труда должны сопротивляться стадному менталитету и вместо этого направлять рабочих на вклад в это «Предприятие развития».\n\nДай аналогично ненавидел анархизм, утверждая, что он всегда ведет к провалу. При этом Четыре старейшины и их Общество Мира рассматриваются как гораздо более близкие к истеблишменту Гоминьдана. Ли Шицзэн, например, назвал марксистский синдикализм регрессивным, а Миньшэн — более совместимым с современными достижениями человеческой цивилизации. Гоминьдан должен вести новый третий путь против капитализма и синдикализма, двух сторон западного империализма. Примирение с Четырьмя старейшинами, возможно, облегчило бы задачу по сдерживанию КСП."
 YUN.midgame.443.a: "Может быть, у нас будет анархизм... через 3000 лет."
 YUN.midgame.443.b: "Анархизм, марксизм, синдикализм — все это социалистический бред."

 YUN.midgame.444.t: "Общество возрождения Китая цепляется за жизнь"
 YUN.midgame.444.d.satellite: "Отношения Ху Цзуннаня с членами [ROOT.GetNameDef] столь же своеобразны, сколь и разнообразны. Один из многих протеже генерала Чана, родившихся в Чжэцзяне, и недавно перешедший к экстремистскому левому повороту, находясь в изгнании, он собрал значительную группу радикальных последователей клики Вампу, известную как Общество возрождения Китая (CRS), тайное общество, вдохновленное европейскими тоталистскими движениями. Будучи директором Департамента подготовки во время изгнания, влияние Ху привило партийный экстремизм поколению левых кадетов.\n\nПоскольку их единственные, по иронии судьбы, братья по оружию в Обществе синерубашечников значительно утратили влияние, очень немногие в Партии в настоящее время способны переварить заискивание перед множеством экстремистов, извергающих синдикалистские лозунги. Хотя, что довольно любопытно, Клика гражданского строительства надавила на [ROOT.GetLeader], чтобы принять некоторых членов CRS, по крайней мере, из принципиальных соображений. Поскольку Вампу, похоже, помогает Вампу, очевидно, что CEC намерены использовать фанатизм CRS для своих собственных нужд.\n\nОднако, помимо оппозиции со стороны большинства партии, даже собственные товарищи левые из CRS (помимо CEC) осудили их как контрреволюционеров. Что еще хуже, члены партии из Старых правых и Новых правых осудили их как социалистических лазутчиков, в то время как различные гражданские лица партии осуждают их как слишком экстремальных."
 YUN.midgame.444.d: "Хэ Инцинь никогда особо не ладил с Ху Цзуннанем, одним из многих протеже генерала Чана, родившихся в Чжэцзяне, и это было до его радикального поворота во время изгнания. Ху собрал разнообразную группу экстремистских последователей клики Вампу, известную как Общество возрождения Китая (CRS), тайное общество, вдохновленное европейскими тоталистскими движениями. Будучи директором Департамента подготовки во время изгнания, влияние Ху привило партийный экстремизм поколению левых кадетов.\n\nПо иронии судьбы, или, по мнению некоторых, неудивительно, они нашли готовых сочувствующих в Обществе синерубашечников. Тэн Цзе и его союзники разделяют ультранационалистический инстинкт и верят, что при правильном поощрении генералы Ху Цзуннань, Дэн Вэньи и Хэ Чжунхань будут готовы отбросить синдикалистскую чепуху в своей платформе в пользу патриотической формы революции. Тэн попросил Лю Цзяньцюня, личного секретаря и доверенное лицо Хэ, вмешаться от их имени. Лю утверждал, что в отличие от других социалистов и либералов в левом лагере, CRS придерживаются более чистого, истинного социализма, более похожего на видение доктора Суня, а не на коррумпированную форму, найденную на дегенеративном западе.\n\nПомимо Хэ Инциня, есть много других, кто с осторожностью относится к CRS. Большинство их товарищей левых осудили их как контрреволюционеров, крайне правые обвиняют их в том, что они социалистические лазутчики, а гражданские крылья партии осуждают их как слишком экстремальных."
 YUN.midgame.444.a: "Они наши товарищи по Вампу."
 YUN.midgame.444.b: "Они опасные подрывные элементы."

#Focus Tree Events (450-469)

 YUN.midgame.450.t: "Предложение [GetYear] года по определению образовательных целей и методов их реализации"
 YUN.midgame.450.d: "В рамках своих первоначальных инициатив в качестве министра образования Чэнь Лифу разработал «Предложение [GetYear] года по определению образовательных целей и методов их реализации». Даже несмотря на попытки модернизации после Синьхайской революции, образование в Китае по-прежнему остается одним из самых хронически недофинансируемых секторов китайского общества. Бесплатное школьное обучение для всех обошлось бы в сотни миллионов юаней, а бюджетные ассигнования никогда не достигали даже 20% от этой суммы на пике и в среднем составляют около 10% от необходимого. Даже элементарные школы разбросаны и труднодоступны в сельской местности, а в крупных городах менее 5% посещали среднюю школу, несмотря на больший доступ к ресурсам.\n\nКроме того, в дополнение к расширению финансирования образования, предложение министра Чэня включало бы Три народных принципа в основные учебные программы всех уровней обучения, заменяя уроки гражданственности ортодоксальной партийной доктриной и акцентом на жизни, учениях, лекциях и трудах доктора Суня. Ожидается, что старшие студенты будут изучать политику Гоминьдана и ортодоксальную историю партии, готовясь к жизни в национальном служении своей стране. Кроме того, этот всеобъемлющий план призывает к «Движению за простой язык», заменяя классический литературный китайский язык народным, план, который, как ожидается, получит поддержку в городах, хотя столкнется с трудностями в проблемных сельских школах.\n\nТем не менее, возникла значительная оппозиция в отношении политического характера учебной программы, некоторые утверждают, что доктрина партии должна быть дополнительной, а не обязательной для развития гражданского образования. Вместо этого они утверждают, что акцент должен быть сделан на традиционной китайской истории с упором на литературный китайский язык для сохранения существующих традиций."
 YUN.midgame.450.a: "План министра действительно является путем вперед."
 YUN.midgame.450.b: "План Чэня — как обезьяна с пулеметом."

 YUN.midgame.451.t: "Возрождение революционного духа"
 YUN.midgame.451.d: "После первоначальной Синьхайской революции Тунмэнхой разделился на тех, кто верил, что можно завершить революцию парламентскими средствами, и тех, кто верил, что партия должна оставаться бдительной революционной силой. Хотя Хуан Син и Сун Цзяожэнь получили большинство мест на последовавших выборах, они были быстро подавлены армией Бэйяна Юань Шикая с помощью реакционеров в законодательном органе. С тех пор Сунь и многие его близкие последователи отреклись от парламентских средств, осудив Хуана и Суна как глупо наивных.\n\nДля Дай Цзитао это означало трансформацию от веры в либеральный индивидуализм как основу идеального государства к государству, построенному на идеологическом фундаменте, подкрепленном военной мощью. Он писал:\n\n«Нет основы единства в политической партии, кроме идеологии. Идеология — это нервная система партии. Идеология также составляет кровеносные сосуды партии. Без нервной системы и кровеносных сосудов животное больше не могло бы быть животным. Без идеологии партия больше не могла бы быть партией».\n\nДля Дая и его идеологических преемников среди Новых правых эта идеология означала смесь национализма, революции и традиционных ценностей. Он считает, что сила масс необходима, даже если они не до конца понимают, за что борются. Его идеи морали были построены на его опыте организации революционеров в Сычуани, где Дай наблюдал, что люди вели себя четырьмя способами: путь убийства, путь мольбы Богов о благословении, самоубийство опиумной зависимостью (судьба, которой он едва избежал) и эскапизм. Широкая любовь — это то, что нужно, чтобы избежать суеверий, Три принципа — чтобы вылечить недуги мира. Возрожденный Китай был бы построен в духе этих традиционных, утопических ценностей — или Китай столкнется с расовым истреблением."
 YUN.midgame.451.a: "Пламя революции должно быть вновь разожжено."
 YUN.midgame.451.b: "Превзойти эти концепции ради новой революционной концепции."
 YUN.midgame.451.c: "Радикализация — это то, что создало раскол партии!"

 YUN.midgame.452.t: "Революционные штурмовики"
 YUN.midgame.452.d: "В бурную эпоху милитаристов среднее качество китайского солдата значительно варьируется от деревни к провинции. Хотя Юньнань традиционно может похвастаться республиканским военным наследием, тысячам солдат все еще не хватает патриотических убеждений, и они скорее сражаются за миску риса и дневной заработок. Зная об этой проблеме, Дай много писал о необходимости революционных штурмовиков — солдат, движимых чистой моральной силой духа и патриотическим самопожертвованием, вооруженных идеями, а не только оружием.\n\nЭти солдаты не просто движимы чувством национализма, скорее они должны чувствовать призвание к своей цели; которая заключается в проецировании и передаче славы Трех народных принципов. Маршируя из города в город, они должны наставлять и направлять людей по учению Сунь Ятсена и провозглашать необходимость принятия четырех прав, чтобы люди могли учиться и понимать демократию. На это повлияли наблюдения за монополизацией большевиками пропаганды во время Гражданской войны в России. Особое внимание уделяется даже средствам пропаганды, таким как использование поездов и героизация таких фигур, как Троцкий. Несмотря на то, что это рассматривается как часть социалистической угрозы, угрожающей Гоминьдану, Дай благосклонно отзывался об этой тактике, утверждая, что Китай должен подражать этой модели революции в войнах против империализма.\n\nПредлагаемые Даем меры были полностью поддержаны членами Клики СС, включая журналиста Чэнь Булэя. Однако консервативные элементы в армии утверждают, что военные должны оставаться как можно более аполитичными и верить, что институт опеки принадлежит гражданскому крылу партии."
 YUN.midgame.452.a: "Армия — инструмент Национальной революции."
 YUN.midgame.452.b: "Армия должна временами дистанцироваться от политики."

 YUN.midgame.453.t: "Карьеристы и революция"
 YUN.midgame.453.d: "Покойного вечного премьера однажды процитировали, сказав, что как только революционная армия успешно восстанет, революционная партия должна быть распущена. Конечно, контекст очень важен: в то время Революционный альянс (также известный как Тунмэнхой) был распущен, и на его место пришла политическая партия, Китайская национальная партия, лишенная революционного духа.\n\nВремена меняются, и вместе с ними изменился взгляд Суня на природу Китайской революции. С провалом Второй революции цинизм и пессимизм Суня подтолкнули его к более авторитарным высотам, взяв на себя бремя спасения Китая. В результате клятв верности многие либеральные сторонники по всему Китаю и за пределами его базы власти в Гуандуне просто покинули его движение. Сунь ненавидел их в ответ, видя в них перебежчиков от необходимости национального спасения. Ведущие его протеже, включая Ху Ханьминя и Дай Цзитао, которые хотели видеть партию, состоящую полностью из лоялистов Гоминьдана, утверждали, что формальные институты не обязательно нужны, пока партия объединена под центральной ортодоксией.\n\nПоскольку Гоминьдан стремится снова взойти на китайскую политическую арену, члены так называемой Клики политической науки и даже те, кто входит в Клику СС, идентифицируют себя больше с технократическим управлением. Хотя они, безусловно, идентифицируют себя с националистическим делом, многие из них имеют более слабые связи с Национальной революцией, но их навыки, безусловно, необходимы для надлежащего национального управления. Или они просто оппортунисты, готовые сменить сторону при первой удобной возможности?"
 YUN.midgame.453.a: "Хорошему разумному правительству нужен компромисс."
 YUN.midgame.453.b: "PSC представляет все, что доктор Сунь ненавидел в бюрократах!"
 YUN.midgame.453.c: "На их месте должна подняться новая порода националистических технократов!"

 YUN.midgame.455.t: "Средства общественной и внутренней безопасности"
 YUN.midgame.455.d: "Со времен династии Цинь китайские правители давно использовали законнические средства угнетения и подавления внутреннего инакомыслия с помощью специальных полицейских сил. Поскольку слежка глубинного государства берет свое истинное начало в династии Мин, так и полиция по-настоящему началась во время Реформ ста дней и продолжилась при Бэйяне. Модель полицейской деятельности Гоминьдана началась с Бюро общественной безопасности Кантона, построенного по американскому образцу. Действительно, все будущие полицейские агентства Гоминьдана назывались «Бюро общественной безопасности». Даже сегодня Национальный комитет полицейских экспертов и Центральная полицейская академия ищут экспертов из ФБР, чтобы помочь превратить своих агентов из простых «головорезов» в элитных шпионов, следователей и убийц. Чжан Цюнь, имевший некоторый опыт управления полицейскими департаментами и де-факто включающий Министерство юстиции в свой портфель, посоветовал [ROOT.GetLeader] продолжать в этом направлении.\n\nОн не одинок среди тех, кто хочет создать партийную полицию. Чэнь Лифу, среди прочих должностей, взял на себя ответственность за координацию Бюро расследований и статистики Гоминьдана, группы из примерно сорока хорошо образованных любителей, разделенных на три секции (одна для гражданской контрразведки под руководством Сюй Эньцзэна, одна для военной контрразведки и одна секция общих дел под руководством Дин Моцуня).\n\nОднако Военную секцию возглавляет Ли Шичжэнь, выпускник Вампу со связями в Синерубашечниках, который фактически создал свою собственную разведывательную службу, подчиняющуюся непосредственно Военному совету, получившую название «Тэу», эвфемизм, означающий спецслужбы. Изучив полицейскую деятельность в Японии и теперь добиваясь поста Директора Центральной полицейской академии, он стремился организовать свои силы в две ветви. Департамент детективов включал бы Военную секретную службу под руководством Ван Байлина и Специальную секретную службу под руководством Гу Цзяньчжуна. Департамент убийств включал бы Бюро общественной безопасности и Корпус крови и железа, возглавляемый Гу Шуньчжаном."
 YUN.midgame.455.a: "Усилить Бюро общественной безопасности Чжан Цюня."
 YUN.midgame.455.b: "Усилить Бюро расследований и статистики Чэнь Лифу."
 YUN.midgame.455.c: "Усилить Департамент специальных служб Ли Шичжэня."

 YUN.midgame.456.t: "Молодежь Китая"
 YUN.midgame.456.d: "Гоминьдан давно прославляет молодежь как будущее Китая, даже если они с подозрением относятся к ее организации. В знак признания этого 29 марта заменило 4 мая в качестве Дня молодежи в Китае (чтобы избежать очевидной социалистической связи), и появилось большое количество поддерживаемых партией молодежных организаций. Определение «Молодежи» в этом контексте было спорным, иногда мужчины в возрасте до 35 лет сохраняли членство в этих организациях, к большому огорчению некоторых лидеров.\n\nПартия создала Сине-белый корпус, в то время как армия создала молодежное крыло Общества синерубашечников. Хотя оба технически незаконны, они получили обширное покровительство со стороны ведущих партийных деятелей. Чэнь Лифу сравнил их со спецназом, вербующим патриотически настроенную молодежь для действий в качестве вспомогательных сил для армии и обучения новых членов партии вместо плохо оснащенной существующей инфраструктуры партийного обучения.\n\nМенее прямо связаны с партией Скауты Китая, которые, поскольку Гоминьдан берет все больший контроль, некоторые предложили переименовать в Скаутов Национальной партии. Хотя это в основном городское явление, несмотря на западные корни, многие партийные деятели восхищаются им за продвижение дисциплинированной, патриотической массовой организации для молодежи, которая поощряет гражданскую активность. Известные своими грандиозными слетами, где девочки учатся женской работе, такой как рукоделие, а мальчики учатся искусству, легкой атлетике и регламентации, они привлекают поддержку менее политизированных семей.\n\nКонкуренция между этими группами была жесткой. Синерубашечники привлекли внимание, настаивая на том, чтобы их члены (якобы тайного общества) не зачислялись автоматически в Гоминьдан в возрасте 25 лет, вызывая обвинения в нелояльности. Чэнь Чэн предложил создать Лигу молодежи Трех народных принципов, непосредственно связанную с партией, объединив все три организации в одну сплоченную (в которой негласно доминировали бы его союзники). Это привлекло номинальную поддержку всех фракций, хотя можно ожидать продолжения борьбы внутри этой Лиги."
 YUN.midgame.456.a: "Сине-белый корпус обеспечит партийную ортодоксию в Лиге!"
 YUN.midgame.456.b: "Синерубашечники немного экстремальны, но нам нужна их энергия в Лиге!"
 YUN.midgame.456.c: "Скаутинг — это содействие самосовершенствованию молодежи."
 YUN.midgame.456.e: "Объединенная под новым руководством, Лига очистит старое мышление!"

 YUN.midgame.457.t: "Переосмысление Конфуция"
 YUN.midgame.457.d: "С тех пор как император Цинь объединил различные враждующие государства после периодов Вёсен и Осеней, конфуцианство было основным фундаментом китайской философии и культуры. Ассоциируясь с традициями и идеалистической ностальгической линзой в давно ушедшие дни, конфуцианство оказалось потрясенным веком унижения и последующим переворотом Синьхайской революции.\n\nВозрождающееся правое крыло Гоминьдана давно интерпретировало толкование Конфуция доктором Сунем как необходимую моральную основу для революции в мире, движимом такими понятиями, как материализм и империализм. Хотя многие признают, что такие понятия, как сыновняя почтительность, должны поощряться, а великих мудрецов следует преподавать и изучать (через государственные праздники и школы), другие, такие как Дай Цзитао, прямо утверждали, что «Лунь юй» (Аналекты) должным образом описывают, как управлять страной. Для Дая именно Сунь правильно понял Конфуция как моральный и жизненный дух, который Китай должен возродить.\n\nИ есть даже другие, кто видит конфуцианство за пределами моральной идеологии Китая. Те, кто состоит в Обществе синерубашечников, почитают исторический авторитарный режим Китая, приближающийся к деспотизму, время, когда свободная мысль была подчинена, и чистое послушание руководило всем."
 YUN.midgame.457.a: "Великая фигура, но мы должны смотреть в будущее."
 YUN.midgame.457.b: "Поистине чертеж для нашей цивилизации в будущем."
 YUN.midgame.457.c: "Конфуций — ключ как к прошлому, так и к славному будущему."

 YUN.midgame.458.t: "Христианский кризис души"
 YUN.midgame.458.d: "Природа христианства долгое время была предметом больших споров в Китае. Во-первых, христианство, безусловно, рассматривалось как религия иностранцев; варвары со всего мира несли свои распятия с оружием, расчленяя китайскую страну. Именно эти христианские нации стремились разделить Китай, та же жестокая борьба, воплощенная в Боксерском восстании более 30 лет назад.\n\nВнутри Гоминьдана отношения с христианством представляют собой богатую палитру разнообразных точек зрения. Лидеры партии, такие как Сунь Ятсен, Сун Цинлин и Чан Кайши, идентифицировали себя как христиане, в то время как другие, такие как Ляо Чжункай (основатель Антихристианской федерации) и У Чжихвей, осуждали христианство. Многие рассматривали христианские школы в Китае как символы империализма и иностранной идеологии, которой не место в новом Китае. Это мнение разделял Дай Цзитао, один из самых ярых критиков христианства.\n\nИ все же даже в Национальном правительстве сегодня видные деятели, такие как Хэ Инцинь (католик) и Чжан Цюнь (новообращенный благодаря своей жене), защищают христианство как хорошие принципы, которым следует подражать в дополнение к китайской морали. Ходили слухи, что жена Чэнь Чэна говорила, что сам Иисус был лидером социальной и религиозной революции — истинно национальной революции. Хотя сам Чэнь Чэн, похоже, колеблется по этому вопросу, так как в недавнем интервью он упомянул, что верит, что христианские миссионеры исторически и до сих пор относятся к коренным китайцам с неуважительным и снисходительным отношением.\n\nЭтот вопрос, по-видимому, угрожает единству партии, поскольку в последние дни дебаты стали более ожесточенными, причем Дай прямо призывает к изгнанию христиан, отказу от защиты Церкви и отказу от наличия христианских школ в Китае. И все же горькая ирония заключается в том, что, несмотря на отказ Гоминьдана от Христа, разве не факт, что великий вечный премьер также был учеником Святого свыше?"
 YUN.midgame.458.a: "Христианские ценности всегда имели определенное влияние на партию."
 YUN.midgame.458.b: "Иисус был хорошим человеком, но христианам нужно стать лучше."
 YUN.midgame.458.c: "В Китае нет места иностранным империалистическим религиям!"

#KMT Party Popularity Ladder Events (470-489)
 YUN.midgame.470.t: "Восход Клики Вампу"
 YUN.midgame.470.d: "Смерть Чан Кайши считалась концом Клики Вампу как силы в политике. В то время подающая надежды фракция, построенная на личных связях между военными офицерами, была выскочкой, политическим движением, которое потрясло существующую парадигму правых и левых в политике Гоминьдана 1920-х годов.\n\nТеперь, под руководством генерала Хэ Инциня, клика Вампу снова на передовой. Как и Чан, они использовали мощь Национально-революционной армии для достижения политического доминирования, сохраняя при этом видимость политического нейтралитета, чтобы разыгрывать разные идеологические клики внутри партии. Все это время братство Вампу кажется неделимым, по крайней мере для посторонних, построенным на общем «духе Вампу», культивируемом в академии, который сочетал суньятсенизм, социалистическую революционную энергию, японский бусидо и преобладающее чувство ультранационализма и фанатизма.\n\nУ руля стоит Хэ Инцинь. Генерал Хэ в своей основе — военный человек. Для него военные — это сила правительства, и поэтому Гоминьдану необходимо создать сильную и современную армию, чтобы обеспечить дальнейшее существование партии и нации. Хотя он был достаточно компетентным офицером во время Северного похода, его переход к логистической и административной роли также привел к эволюции убеждений Хэ. Все чаще он взвешивает, был ли он прав в том, что «с духом Вампу все возможно», и, возможно, есть необходимость в большей численности за счет призыва."
 YUN.midgame.470.a: "Элитный дух Вампу спасет нацию!"
 YUN.midgame.470.b: "Пришло время принять массовое движение, чтобы объединить армию и народ!"
 YUN.midgame.470.c: "Хэ Инцинь позволяет молодому поколению взять на себя инициативу."

 YUN.midgame.471.t: "Культ личности Генералиссимуса"
 YUN.midgame.471.d: "Гоминьдану не привыкать к культам личности, он был фактически построен на одном с тех пор, как доктор Сунь впервые потребовал личных клятв верности себе после Второй революции. Это всегда было основным источником раздоров, но, похоже, это не исчезнет в ближайшее время.\n\nЕсли что, он только увеличился в размерах. Двенадцатифутовое чучело генерала Хэ Инциня было поднято на параде 10/10 в [ROOT.Capital.GetCapitalVictoryPointName], символ того, насколько прочно он закрепился. Официальная история работала сверхурочно, чтобы укрепить революционные полномочия Хэ Инциня, выстраивая связь с самим доктором Сунь Ятсеном через его близкую дружбу с Чан Кайши и Дай Цзитао (у которых были более близкие, прямые отношения с Вечным премьером). История Вампу с партией также пишется так, чтобы быть сильно переплетенной с партией, не оставляя сомнений в том, кто является спасителем революции.\n\nУ этих усилий есть чрезвычайно идеологический подтекст. Если воскрешение нации было целью, которую нужно было превозносить превыше всего, то редакторы «Society Mercury» утверждают, что «установление центрального идола является важным условием объединенного Гоминьдана и первым шагом к воскрешению Китая». Они писали, что «молодежь Китая развила анархистские идеи и подчеркивала индивидуализм, считая почитание идола отсталым. Но это неправильно, потому что идол выполняет важную функцию укрепления силы национальной культуры и объединяет доверие массового духа». Проще говоря, Лю Цзяньцюнь отверг сравнение республиканского диктатора с реакционными императорами и королями, вместо этого утверждая, что это очень прогрессивное средство воскрешения нации."
 YUN.midgame.471.a: "Да здравствует генерал Хэ!"
 YUN.midgame.471.b: "Хэ зашел слишком далеко на этот раз."
 YUN.midgame.471.c: "Центральный идол нужен, но он больше не Генералиссимус."

 YUN.midgame.472.t: "Генералиссимус и его философ"
 YUN.midgame.472.d: "Не редкость для императоров и президентов иметь могущественных доверенных лиц, но отношения между президентом Хэ Инцинем и Дай Цзитао всегда были своеобразными. Ни один из мужчин не особенно создан для всеобщего внимания — генерал Хэ скорее последователь по характеру, в то время как Дай скорее интриган. Поскольку их общего соратника Чан Кайши нет в живых, было трудно найти публичное лицо для «Новых правых».\n\nИх личности сталкиваются (или, как говорят некоторые, дополняют друг друга) и в других отношениях. Несмотря на то, что Хэ Инцинь солдат в революционной партии, он сам не является новатором, считая себя послушным солдатом своего правительства. Говорят, что во время обучения его инструктор по физкультуре однажды отругал его перед другими студентами и приказал стоять по стойке смирно в стороне. Даже после окончания занятий, когда другие студенты и инструктор ушли, молодой Хэ Инцинь продолжал стоять по стойке смирно, так как ему не сказали поступить иначе.\n\nДай — революционер до мозга костей, хотя часто предпочитает действовать как «теневое альтер-эго» другой личности, следуя за Сунь Ятсеном в его путешествиях и интерпретируя, работая «литературным негром» и поддерживая связи от его имени. Когда Чан Кайши выступил против доминирования Ван Цзинвэя в партии, Дай поддержал своего друга, но беспокоился, что его война с левыми погубит его, в чем он, к сожалению, оказался прав.\n\nВсегда стоял вопрос, кто на самом деле у власти в режиме. На высоком уровне, когда Чан давно ушел, никто не обладает такой степенью контроля над армией и партией одновременно."
 YUN.midgame.472.a: "Дай Цзитао и Партия говорят от имени народа."
 YUN.midgame.472.b: "Хэ Инцинь и Армия защищают нацию."

 YUN.midgame.473.t: "Витализм Чэнь Лифу"
 YUN.midgame.473.d: "По мере роста влияния Клики СС растут и идеи их ведущего представителя Чэнь Лифу. В своей книге «Витализм», китайской интерпретации медицинской/духовной философии Анри Бергсона, Чэнь утверждал, что либеральная демократия является устаревшей формой правления. Он указывает на борьбу республиканцев и демократов в Америке и на то, как она посеяла катастрофический раскол.\n\nВ то же время, однако, принцип Людовика XIV «l'état, c'est moi» больше не работает в современной республике. Президент Республики должен быть «патриархальным благодетелем всех классов», возможно, более похожим на Луи Бонапарта. Вместо навязанной власти, чуждой массам, концепция диктатора Чэня полностью воплощает народный суверенитет. Его государство будет делать больше, чем просто поддерживать общественный порядок, но вместо этого служить идеей для «реализации нашей лояльности нации».\n\nИдеологический тон приспешников Чэня сравнивали с прославлением крестьянина румынской Железной гвардией и стремлением СЗРС к современности, машинам и промышленному насилию. Как и Дай Цзитао до них, Клика СС синтезирует примитивные и авангардные убеждения, призывая как футуристические, так и традиционные символы для продвижения своего государства.\n\nДоказывая свое требование прогресса, Чэнь Лифу (инженер по образованию) однажды сравнил политическую ситуацию со вторым законом Ньютона. Если Сила является функцией Массы и Ускорения, то Доблесть массовой организации напрямую зависит от ее Размера и Фанатизма. Клика СС приветствует глобальную войну, утверждая, что массовое насилие имеет потенциал возродить нацию и мобилизовать веру масс в партийную доктрину."
 YUN.midgame.473.a: "Будущее никого не ждет! Мы должны овладеть своей судьбой!"
 YUN.midgame.473.b: "Мы должны найти доброжелательного патриарха для нашей нации!"
 YUN.midgame.473.c: "Крестьянин, народный дух и Три принципа не могут быть разделены."
 YUN.midgame.473.e: "Через насилие и смерть мы возрождаем нацию!"

 YUN.midgame.474.t: "Ян Юнтай, рабочая лошадка Генералиссимуса"
 YUN.midgame.474.d: "Ян Юнтай — непревзойденный политик, по каждому важному вопросу он всегда тайно приносит два плана — один за и один против текущего курса действий. Выяснив мнение президента, он представлял план, который совпадает с мнением президента, и действовал так, как будто они были в согласии все это время. Таким образом, подобно волшебнику, он способен создать иллюзию идеальной синхронизации со своим лидером.\n\nУ Политической науки нет формальной организации (мимолетное Общество строительства Нового Китая было быстро распущено, чтобы избежать нарушения правил партии о раскольниках, и вряд ли вообще встречалось) и они довольно замкнуты по своей природе. Их сравнивали с придворными личностями, остающимися близкими к центрам власти, никогда не заигрывая с массами. Клика, построенная на связях между элитой, дистанцировалась от общественности, что в некотором роде принесло пользу (в частности, военные не видят в них угрозы), но отсутствие массового движения сделало их легкой мишенью для растущих рядов врагов.\n\nИх растущее влияние в национальной бюрократии, региональной администрации и даже сегментах армии вызвало гнев соперников на всех фронтах. Клика СС сговорилась подорвать их изнутри правительства, в то время как Клика гражданского строительства стремилась поднять массы против них, а Синерубашечники начали выбирать их членов мишенями для насилия. Они все призвали [ROOT.GetLeader] урезать их до нужного размера."
 YUN.midgame.474.a: "Мы должны укрепиться, пока наши соперники не смогли!"
 YUN.midgame.474.b: "Давайте замедлимся и поработаем внутри системы."

 YUN.midgame.475.t: "Банки сделаны из мрамора"
 YUN.midgame.475.d: "По мере продвижения революции Гоминьдана нехватка доступных талантов вынудила их назначить многих членов Клики политической науки на видные руководящие посты по требованию Чжан Цюня, Ян Юнтая и Ли Гэньюаня. Они достигли доминирования в бюрократии, которое грозило затмить все другие фракции вместе взятые.\n\nХотя зависть Клики СС, Клики гражданского строительства и Синих рубашек хорошо известна, растущее влияние Клики политической науки встревожило даже их обычных союзников в Московском комитете и их покровителей из Вампу. Чжан Цзи, видный отпрыск Московского комитета, осудил отсутствие прозрачности, сказав: «Если вы хотите узнать истинную картину политической ситуации в Китае, вам нужно пойти в Банк Китая, чтобы узнать».\n\nВышеупомянутый Банк Китая является неофициальной штаб-квартирой Клики политической науки, и именно там Чжан Цюнь, Ян Юйтин и У Течэн создали свою штаб-квартиру. Многие состоятельные люди в Националистическом Китае стекались в их ряды, несмотря на недовольство, которое это посеяло. Среди них богатые банкиры и финансисты, такие как Кун Сянси, Цзян Тинфу и У Динчан; ведущие ученые, юристы и интеллектуалы, такие как Гу Чжунсю, Ван Шицзе, Ван Ююн и Чжан Яоцзэн; и, конечно, военные, администраторы и политики.\n\nЧистая гибкость клики, включая многих бывших деятелей Бэйяна (особенно бывших Аньхойских), означает, что многие из этих людей являются пережитками старого порядка и вряд ли вообще являются фигурами Гоминьдана. Чжан Гунцюань, богатый магнат, банкир и поэт Общества полумесяца, является братом Чжан Цзюньмая и известным спонсором федералистских идей — принятым в ряды Гоминьдана Кликой политической науки.\n\nМассовое недовольство «истинных» членов партии неуклонно растет. Многие чувствуют, что их обходят при повышении в пользу связанных, коррумпированных элит, и это используется соперниками клики для создания легкого козла отпущения за беды нации. Поскольку де-факто руководство клики встречается, некоторые посоветовали проявить инициативу в защите достижений клики."
 YUN.midgame.475.a: "Мы должны сблизиться с армией."
 YUN.midgame.475.b: "Мы будем отстаивать экономическое планирование!"
 YUN.midgame.475.c: "Мы будем бороться за контроль над правительством!"

 YUN.midgame.476.t: "Конференция в Лушани"
 YUN.midgame.476.d: "С первых дней утренних звуков горна в казармах Вампу некоторые кадеты чувствовали, что Национальная революция может в будущем быть настигнута чем-то гораздо более зловещим — призраком синдикализма. Именно в этих священных залах военного революционного образования группы сплотились, некоторые поклялись следовать учению Генералиссимуса и бороться с растущим влиянием социалистов в академии. По мере формирования клик, таких как Ассоциация выпускников Вампу, часто тайно, некоторые верили в еще более радикальные убеждения.\n\nПоскольку радикализм и революционный пыл растут, Хэ Инцинь обычно посылал своего секретаря Лю Цзяньцюня следить за этими встречами в прошлом. Но в этот день он решил сам нанести визит. Там, на фоне гор Лушань, он заявил сотням присутствующих военных и лидеров Синерубашечников, что сейчас, как никогда, революционный дух должен быть вновь разожжен.\n\nЛидеры Синерубашечников, такие как Тэн Цзе, заявили, что их доктрина направлена на реорганизацию новых Трех народных принципов: Национальная оборона, Ультранационализм и Народное государство. Программа «Восход» в России, японский дух бусидо и успешная модернизация рассматриваются как потенциальные шаблоны для нового китайского государства. Пока на встрече обсуждались природа и реализация этих концепций, некоторые даже упомянули, что, возможно, действительно пришло время отвергнуть Три народных принципа — отменить демократию и стремиться к национал-популизму.\n\nБезусловно, существуют спорные элементы в идеологиях СЗРС и румынского ЛАМ, такие как тот факт, что ЛАМ — это движение, стремящееся к примирению с прошлым и прославлению монархии, в то время как СЗРС стремится к народному популизму под авторитарным республиканским руководством. Многие в военном руководстве Вампу выступают за революцию по консервативным линиям, в то время как более радикальные элементы выступают за продвижение в новое будущее."
 YUN.midgame.476.a: "Мир должен быть заключен с прошлым, чтобы двигаться вперед."
 YUN.midgame.476.b: "Мы должны перейти к следующему этапу революционной эволюции."

 YUN.midgame.477.t: "Война с социализмом"
 YUN.midgame.477.d: "Недавно чувство страха осело на территориях Гуанчжоуского национального правительства, поскольку беспрецедентное насилие вспыхнуло как в сельских, так и в городских районах страны. Действуя независимо от Национально-революционной армии, радикальные военные офицеры и солдаты Общества синерубашечников организовали «Специальную оперативную группу» (Бедундуй) для террора социалистических коммун и ополченцев в сельской местности. В городах левые и либеральные газеты и профсоюзы сообщают о нападениях организованных групп, таких как Муниципальная ассоциация товарищей за истребление предателей, Общество силы молодежи, Общество среднего авангарда и Муниципальные общества взаимопомощи.\n\nПо иронии судьбы, именно социалисты первыми обучили самых радикальных офицеров кадров Вампу. Красные русские изгнанники из ЧК инструктировали любопытных кадетов о наиболее эффективных средствах пыток, в то время как бывшие члены Общества возрождения Китая сами учились у британского NIB во время пребывания в Третьем Интернационале.\n\nКаждый день «Миньго Жибао» сообщает о еще одном убийстве на оживленной улице или резне глубокой ночью. Еще более тревожными являются скандальные газетные статьи, описывающие обнаружение расстрельных списков, многие из которых называют видных китайских либералов и социалистов. Внутри Партии члены Клики политической науки осудили это насилие над либералами и бизнесом, ссылаясь на опасения нанести вред как легитимности Партии, так и национальной экономике. К ним присоединяется клика Чэнь Чэна в армии, которые утверждают, что многие социалисты придерживаются принципов доктора Суня, включая тех, кто так доблестно сражался в повстанческом движении Миньгань. Клика Вампу и Клика СС молчаливо соглашаются, что всепроникающее влияние красных должно быть обуздано любой ценой, но беспокоятся, что это может создать плохой прецедент поощрения бешеного хулиганства в рядах Партии."
 YUN.midgame.477.a: "Остановите этот хаос немедленно!"
 YUN.midgame.477.b: "Древо нации должно быть полито кровью ее предателей."

 YUN.midgame.478.t: "Сложный характер Чэнь Чэна"
 YUN.midgame.478.d: "В отношении Чэнь Чэна, безусловно, есть что-то сложное. Выпускник Баодина, он оказывается немного аутсайдером, в отличие от большинства «первого класса» звездных кадетов Вампу, появившихся после Реорганизации Гоминьдана 1924 года. И, несмотря на его все более страстную привязанность к директору и Генералиссимусу Чан Кайши, Чэнь демонстрировал политическую и экономическую ориентацию, которая была значительно левой.\n\nИменно благодаря этим связям духовному преемнику Чана, Хэ Инциню, нравится присутствие Чэна в возрожденной Национально-революционной армии. Поразительно эффективный в привлечении людей к программе революционной дисциплины Вампу, Чэнь пользуется престижем благодаря своим связям, но тем не менее его радикальная натура и симпатии к левому движению позволяют ему использовать потенциальных врагов в радикальных правых Вампу, чтобы видеть в Чэне не более чем синдикалиста в военной форме.\n\nПо мере роста популярности он оказывается на перепутье. Конечно, верность Хэ Инциню может принести награды, но, возможно, лучшее партнерство может быть сформировано с региональными левыми страны, которые стремятся к гораздо более демократичному и справедливому обществу. В качестве альтернативы его связи в Баодине могут пригодиться, или, возможно, пришло время для Чэна осознать свою истинную судьбу и взять на себя ответственность за спасение Национальной революции."
 YUN.midgame.478.a: "Верность Вампу прежде всего."
 YUN.midgame.478.b: "Социализм — это действительно то, к чему мы должны стремиться."
 YUN.midgame.478.c: "В этой революции по всей стране много союзников."
 YUN.midgame.478.e: "Только Чэнь Чэн может вести революцию вперед!"

 YUN.midgame.479.t: "Учебный институт Хубэя"
 YUN.midgame.479.d: "Говорят, что мы никогда по-настоящему не забываем, откуда пришли, и можно сказать, что то же самое относится к Чэнь Чэну. Выросший в крайней нищете, Чэнь не мог позволить себе надлежащее образование — вместо этого ему пришлось выбрать карьеру военного. Чэнь никогда не забывал, откуда он родом, и, поскольку Национальное правительство контролирует обширные территории, он взял на себя задачу преобразовать и поднять провинции Китая, чтобы вырваться из цикла бедности.\n\nПервые попытки национальных реформ Клики гражданского строительства предпринимаются в провинции Хубэй, которую Чэнь возглавил как местный глава администрации. Они начали первые усилия по запрету курения, проституции, танцев и других легкомысленных действий аморального декаданса. Вместе с Янь Лисанем и Чжу Хуайбином они планируют провести более масштабные реформы в провинции, что приведет их к конфликту с прослойками коррупции внизу. Большая часть богатства в провинции тайно контролируется преступным миром, связанным с преступными организациями и Кликой СС в правительстве.\n\nЛевые в провинции призвали Чэна принять более серьезные меры в рамках приверженности Национальной революции принципу миньшэн, принципу народного благосостояния. Однако члены Клики Вампу в частном порядке выразили обеспокоенность напряженностью, которую это может вызвать в отношениях с Кликой СС в правительстве. Конечно, сейчас не время для больших фракционных споров внутри Партии, но, безусловно, что-то нужно сделать, чтобы помочь людям. Несмотря на это, Чэнь снова оказывается на перепутье, разрываемый со всех сторон во все более сложной национальной революции."
 YUN.midgame.479.a: "Люди нуждаются в нас сейчас больше, чем когда-либо."
 YUN.midgame.479.b: "Возможно, лучше прислушаться к начальству."
 YUN.midgame.479.c: "Мы можем сделать гораздо больше для людей."

 YUN.midgame.480.t: "От первого протеже до номинальной фигуры"
 YUN.midgame.480.d: "Говорили, что во времена Гуанчжоуского национального правительства после смерти Сунь Ятсена тремя людьми, правившими революционной хунтой, были Ван Цзинвэй, Ху Ханьминь и Чан Кайши. Несмотря на его номинальное признание де-факто главой Правого Гоминьдана, он оказывается все более исключенным из партийной политики как Премьер Законодательного Юаня. В эти дни он с горечью вынужден принимать частое посредничество Генералиссимуса Хэ Инциня, особенно в дискуссиях с Дай Цзитао и Исполнительным Юанем.\n\nТем не менее, Ху по-прежнему пользуется огромным уважением, особенно среди старых гуандунских гуаньси Гоминьдана; с такими людьми, как Чэнь Цзитан, Гу Инфэнь, Линь Сэнь, Цзюй Чжэн и Цзоу Лу, часто на его стороне. Поскольку влияние Вампу в Гуандуне оказывается все более ограниченным сопротивлением Клики Гуандуна, попытка Хэ Инциня удержать провинцию от прямого восстания, опираясь на печально известного регионалиста-милитариста Чэнь Цзитана, похоже, терпит неудачу в последние дни, поскольку Чэнь продолжает поддерживать Ху.\n\nКонечно, статус-кво все еще сохраняет аллюзию мира, и сохранение ортодоксии может продолжать удерживать Ху от открытого бунта. Также могут быть потенциальные союзники в лице Новой клики Гуанси, которые не являются поклонниками влияния Вампу в революции, но тем не менее являются частыми соперниками клик Гуандуна. Генералиссимус Хэ мог бы присмотреться к гражданским соперникам Ху и попытаться создать более широкий альянс гражданских лидеров, чтобы сдержать растущую известность Гуандуна."
 YUN.midgame.480.a: "Сосредоточиться на работе с региональными милитаристами."
 YUN.midgame.480.b: "Работать с гражданским истеблишментом."
 YUN.midgame.480.c: "Сохранять партийную ортодоксию."

 YUN.midgame.481.t: "Законодательный Юань"
 YUN.midgame.481.d: "Поскольку революция под руководством правого крыла Гоминьдана продолжает набирать обороты, в парламентском процессе Гоминьдана возникла растущая напряженность. Как глава Законодательного Юаня, Ху Ханьминь участвовал в непростой коалиции с Дай Цзитао, президентом Исполнительного Юаня. Несмотря на то, что он вынужден делить власть с остальной частью правого крыла Гоминьдана, Ху по-прежнему считается одним из самых плодовитых и глубоких знатоков Саньминьчжуи. Будучи с Сунем со времен Тунмэнхоя и одним из его самых любимых последователей, Ху обладает значительной властью в партийном аппарате.\n\nТеперь, когда коалиции и партийные союзы становятся все более очевидными, Ху может попытаться связаться с другими фракциями внутри партии, чтобы укрепить свое положение. Гу Чжунсю и Хуан Фу в Клике политической науки могли бы оказаться подходящими союзниками, хотя Клика политической науки заработала репутацию более ориентированной на экономическое планирование, чем на какую-либо реальную революционную идеологию, что может оказаться неудобным для Ху, который заинтересован в концепции приверженности ортодоксальной истинной революции Трех народных принципов. Чжэцзянец Чэнь Гофу, возможно, не слишком похож на Ху, но в последние дни он тайно встречался в офисе Ху. Поддержка Чэня, безусловно, примирила бы Ху с Даем, и, возможно, Ху мог бы использовать обоих, чтобы сдержать власть Генералиссимуса. В качестве альтернативы, обеспечение власти с помощью его собственной клики в Гуандуне, особенно благосклонности Кронпринца Сунь Фо, может оказаться ключом к сохранению престижа и влияния Ху в партии."
 YUN.midgame.481.a: "Держи друзей ближе."
 YUN.midgame.481.b: "Мы должны протянуть руку Клике политической науки."
 YUN.midgame.481.c: "Чэнь Гофу может оказаться мощным союзником."

 YUN.midgame.482.t: "Генерал-тигр Суня"
 YUN.midgame.482.d: "Всегда оставался один любопытный человек, вышедший из армии Юньнани в Гуандуне, один человек, который ставил идеологию, верность и клятву превыше всего. Ничто, пожалуй, так не определяет храбрую и неумолимую приверженность этого человека зову долга и Национальной революции, как его последовательная служба для достижения цели Белого солнца. Ибо это Чжу Пэйдэ, который участвовал в восстании Двойной Девятки простым солдатом. Ибо это Чжу Пэйдэ, который сражался в Войне в защиту нации и снова в Движении в защиту конституции.\n\nИсполнительный до крайности, выдающаяся служба Чжу позволила ему войти в Центральный исполнительный комитет и заставить себя командовать 3-й армией Национально-революционной армии. Друг многих, от Тань Янькая, Ли Цзишэня, Дэн Яньда, доктора Суня и Чжу Дэ до Чан Кайши, достижения Чжу принесли ему прозвище «Генерал-тигр» от самого Отца нации. Не испугавшись, 3-я армия Чжу сражалась доблестно и с решимостью, одерживая замечательные победы над Дэн Жучжо. Поскольку 3-я армия понесла заметные потери в Северном походе, это стало еще более горьким, когда он рухнул, и Генералиссимус Чан приказал отступить в Гуйчжоу.\n\nВ катастрофических последствиях Чан был убит, и руководство Правым Гоминьданом пало на Чжу. Взяв управление на себя, Чжу сумел обеспечить проход 1-й, 2-й, 3-й, 6-й, 7-й, 16-й и других армий НРА в Гуйчжоу, настоящий свет, сияющий во тьме. Продолжая двигаться вперед, Чжу не дрогнул; создав совет командиров НРА и руководя Гуйчжоуским Гоминьданом в бурный период 1930-х годов.\n\nБрошенный снова в бой, Чжу еще не разочаровал Партию, и все же он действует с союзниками новыми и старыми. Ли Гэньюань, вернувшийся из пепла истории, или даже Чжу Дэ, друг и соратник-социалист. Несомненно, они решат характер и наследие Чжу на долгие годы. Самый преданный сторонник Отца нации, герой 3-й армии или кандидат компромисса."
 YUN.midgame.482.a: "Чжу нас еще не подводил!"
 YUN.midgame.482.b: "Солдаты Юньнани всегда упорствуют!"
 YUN.midgame.482.c: "Нация, приведенная к современности..."

 YUN.midgame.483.t: "Премьер-министр гор"
 YUN.midgame.483.d: "Верно, что «Правое крыло» 3-й армии, прозвище которого она недавно заслужила, — это не только шоу Чжу Пэйдэ. Ибо да, такие личности, как Фань Шишэн или Цзинь Ханьдин, существуют в 3-й армии, и, конечно, есть подчиненные, такие как Чжу Шигуй, Чжан Яньчуань, Гань Фан, Лю Яоян, Юань Цзиси и многие другие. Однако никто не имеет такого же веса, влияния или характера, как Ли Гэньюань. Учитывая темное влияние за троном Чжу, Ли всегда был особым фаворитом в Юньнани; народный герой, человек, который сотворил чудеса для нации, «Премьер-министр гор».\n\nХотя Ли начинал как солдат, и великий солдат, ему всегда было суждено стать администратором и лидером. Человеком, который направит молодежь и приведет свое сообщество к светлому будущему. Известный своими благотворительными проектами по строительству школ, Ли последовательно заботился о своем сообществе на протяжении всей своей жизни. В 1911 году он основал среднюю школу Дали Модел, в 1912 году — педагогическую школу Тэнчун. В 1917 году, будучи губернатором Шэньси, Ли запретил опиум, защищал культурные реликвии и исторические места, расширил провинциальную библиотеку, основал педагогическую школу Шэньси и многое другое. В 1926 году Ли сделал почти то же самое, вернувшись в Юньнань, чтобы работать с местными чиновниками и такими людьми, как Хуан Яньпэй, чтобы создать сельские демократические кооперативы, и на протяжении всей своей карьеры Ли стремился защищать историю и культуру Китая.\n\nИ поэтому именно к Ли чаще всего обращаются люди Юньнани. Ибо именно Ли, бесспорно, сделал больше всего для людей, будь то через службу на войне или службу в администрации. И именно Ли лично переносил тяготы, чтобы его любимый народ мог жить лучше. Но такие настроения принесли ему много враждебности среди Гоминьдана, ибо Ли считается на шаг выше откровенного предателя, который держится только на своих связях с джентри, истеблишментом и Политической наукой. В конце концов, кто скажет, каковы настоящие намерения Ли? Тем не менее, нельзя отрицать, что он был позитивной силой."
 YUN.midgame.483.a: "Люди обожают Ли Гэньюаня!"
 YUN.midgame.483.b: "Давайте не будем пропагандировать культ личности."
 YUN.midgame.483.c: "За этими начинаниями стоит явное политиканство!"

 YUN.midgame.484.t: "Жизнь как милитариста, вечность как солдата"
 YUN.midgame.484.d: "Определить истинную идеологию Чжу Дэ было бы решенным делом. Военный человек прежде всего, Чжу сам всегда считал своей ролью быть лишь движущей силой революции в военном отношении, сражаясь на полях сражений и планируя кампании, а не дебатируя на симпозиумах и форумах. Что ожидаемо, естественно, учитывая его характер как одного из протеже Цай Э — человека, известного своим отвращением к политике и политикам. Это не значит, однако, что Чжу лишен идеологии или социалистических убеждений, или что он даже отделяет политическую мысль от военных дел. Утверждая, что его идеальный состав армии — это рабочие и крестьяне, он считает, что военные и политические кадры должны происходить только из городских пролетариев.\n\nБолее того, Чжу рассматривает милитаризм в социал-дарвинистском мышлении, очень похожем на мышление его товарищей-солдат Юньнани; ибо военные могут быть знаменосцем спасения Китая, и солдаты должны сознательно понимать, за что именно они сражаются. Чтобы они не поддались влиянию коррупции или жадности. И Чжу сам знает эту тенденцию человеческой природы лучше, чем кто-либо, поскольку после смерти Цай Э, и, по общему признанию, Чжу сожалеет об этом, он стал ничем не лучше местного милитариста в Сычуани. Назначая своих родственников на должности, захватывая богатство и даже пристрастившись к опиуму. Но путь к восстановлению всегда существует, и после отъезда Чжу в Европу он проникся новой целью.\n\nЦеня Национально-революционную армию как самого важного защитника социалистической политической власти, Чжу поддерживает идеалы, что она должна быть классовой армией, по миссии и по духу. Что она не должна быть изолирована от масс, инструментом угнетения рабочих и крестьян, как силы империалистов. Вместо этого НРА должна быть вооруженной силой освобождения масс рабочих и крестьян, армией с интернациональной миссией. Ибо не техника, современное вооружение или экстремальная огневая мощь решают исход революционной войны, а политика, политические системы и склонность или несклонность сердец людей. Ибо в этом идеале и надежде заключается причина, по которой Чжу Дэ служит и сражается."
 YUN.midgame.484.a: "Герой левых, окутанный правыми."
 YUN.midgame.484.b: "Народный маршал идет вперед!"
 YUN.midgame.484.c: "Однако он знает, когда нужно быть скромным."

 YUN.midgame.485.t: "Социалистические звезды Юньнани"
 YUN.midgame.485.d: "3-я армия, обеспечив безопасность новой цитадели Гоминьдана на китайском юго-западе, несомненно, сыграла решающую роль в необратимом марше к современности и продвижении Национальной революции. Тем не менее, четкое видение будущего остается неясным. Генерал Чжу Пэйдэ не чужд компромиссам и гибок во взглядах на националистический Китай.\n\nМногие в 3-й армии имеют более радикальные взгляды на будущее Китая, рассматривая Национальную революцию Гоминьдана как Социалистическую революцию. Чжу Дэ, как глава Офицерского учебного корпуса 3-й армии, работал над тем, чтобы 3-я армия стала силой для крестьян и рабочих Китая, медленно сдвигая Армию в левом направлении, с двумя восходящими защитниками рабочего класса, выходящими на первый план.\n\nВан Дэсань оказался в социалистических кругах в начале 1920-х годов, присоединившись к Обществу исследования марксизма в качестве переводчика с французского. В 1922 году он вступил в КСП по рекомендации Дэн Чжунся и стал ассоциироваться с Гоминьданом, когда позже стал политическим инструктором в Военной академии Вампу. Ван является одним из главных лиц социализма на китайском юго-западе.\n\nДругая восходящая звезда, Ло Бинхуэй, родился в семье нищих фермеров. Когда он начал свою военную карьеру, он служил под началом Тан Цзияо. В конце концов он выступил против него и присоединился к националистической армии Чжу Пэйдэ. Воспитание Ло оставило в нем сильную ненависть к помещикам и джентри и привело его к тайному вступлению в Китайскую синдикалистскую партию и сближению с Чжу Дэ.\n\nС восходом вышеупомянутых звезд и многих других в левой сфере многие начали отказываться признавать власть Чжу Пэйдэ или Ли Гэньюаня. Даже до такой степени, что различные представители рядового состава начали отчитываться только перед левыми офицерами, такими как Чэнь И или Ван Цзюнь. Такие события, что довольно очевидно, вызвали трения между группами братьев, известными как Правые и Левые 3-й армии, даже несмотря на общее товарищество, которое многие с обеих сторон все еще чувствуют друг к другу."
 YUN.midgame.485.a: "Сверкающая красная звезда на юго-западе."
 YUN.midgame.485.b: "Идеология должна быть вторичной в армии."
 YUN.midgame.485.c: "Цепочка командования существует не просто так!"

 YUN.midgame.486.t: "Вечный боец"
 YUN.midgame.486.d: "Какой громкий дух! Какая богатая история! Какие смелые начинания! Неумолимая сила природы, которой суждено породить революцию будущих поколений! Вот кто такой Ли Гэньюань! Человек, которому многие обязаны своим революционным наследием, и все же он опорочен Гоминьданом, Цай Э, Бэйяном. Но не самой Юньнанью, нет. Ибо он сам — истинный сын юго-запада. Выносливый, суровый, сильный и могущественный. Солдат, военный инструктор, директор, командир, бюрократ, губернатор. Ли был многим, и он продолжает расширять свой все увеличивающийся репертуар профессий и опыта даже сейчас.\n\nНо он был так предан военной профессии, что, будучи молодым студентом Шикан Гакко, сама перспектива перехода на невоенное обучение привела Ли Гэньюаня в ужас, когда он заболел в 1905 году — что он «скорее умрет», чем сделает это. Сила приверженности Ли Гэньюаня была бы непостижима, если бы его патриотизм был просто рутинным, автоматическим, не более чем видимостью. Здесь лежало утешение для многих событий жизни Ли, которые были нелегкими или неприятными.\n\nПреданность Ли достигла душ многих, ибо его слова навсегда запечатлены как в Академии Куньмина, так и в нации. «Если военный дух не возникнет, храбрые люди не появятся. Если храбрые люди не появятся, национальная душа потеряна. Если национальная душа потеряна, как может выжить государство? Будем надеяться, что теперь появится китайский бусидо. С ним сохранение территории и защита государства будут очень легкими». С такими словами, с такой энергией всем вокруг в Юньнани совершенно очевидно, что Ли Гэньюань — истинный Король национализма Юньнани, и неудивительно, что его последователи среди офицеров и народа растут день ото дня.\n\nКак бы то ни было, наследие Ли укоренилось в солдатах настоящего. Будь то через его протеже Гу Пиньчжэня, который успешно сражался с такими, как У Пэйфу, и чей дух — привитый Ли — остается в его учениках Цзинь Ханьдине и Ху Жоюе. Все солдаты нынешней революции, от Чжу Пэйдэ до Лун Юня, все они обязаны своими средствами к существованию Ли так или иначе, и без Ли нация вполне могла бы пострадать от катастрофы Юань Шикая."
 YUN.midgame.486.a: "Длительное наследие для нации."
 YUN.midgame.486.b: "Отец завтрашней революции!"
 YUN.midgame.486.c: "Восхитительный человек, но реликвия прошлого."

#Zeal Events (490-499)

 YUN.midgame.490.t: "Партия и Цин Бан"
 YUN.midgame.490.d: "С ранних революционных дней сопротивления маньчжурской монархии патриотичных и героических революционеров можно было найти не только в Национальной партии, но и в китайском преступном мире. Многие из лидеров партии, такие как Сунь Ятсен, Чан Кайши и Чэнь Цимэй, имели связи с тайными обществами триад и гангстеров, связанных вместе эфирным пороком жадности, но при этом проявляющих любопытное чувство героической верности, сродни японской якудзе или итальянской мафии. Хотя эти криминальные связи помогли Национальной партии в некоторые из ее самых слабых дней, эти сомнительные связи с тех пор нанесли ущерб их репутации.\n\nИ Клика СС, и Синерубашечники (несмотря на их взаимную враждебность и недоверие друг к другу) имеют обширные связи с Зеленой бандой. Лю Шаньчань, например, является членом Синерубашечников, но также имеет тесные связи с преступным миром Шанхая — хвастаясь примерно 10 000 последователей в обществах Большого меча и Малых мечей. В последнее время партии даже нанимали триады для обеспечения соблюдения лояльности профсоюзов Гоминьдану и разрешения трудовых конфликтов в попытках желтого юнионизма. Хотя профсоюзы, как правило, воспринимались в партии со скептицизмом из-за КСП и LCS, навязывать исключительно гоминьдановские профсоюзы намного проще при контроле жестоких гангстеров, особенно в прибрежных городах.\n\nПоскольку многие из правого крыла партии видят цель в том, чтобы в конечном итоге поглотить Триады, в настоящее время это не кажется возможным, учитывая их всепроникающее влияние. Скандалы уже возникли, когда гангстер Ши Лянцай обнаружил тайную сделку с серебром между высшими должностными лицами Гоминьдана, такими как Кун Сянси, который, в свою очередь, через Клику политической науки потребовал, чтобы с Ши тихо расправились. Но при рекордно высоком цинизме партии и настолько нормализованной коррупции и жестокости, нужно спросить, кто настоящие преступники?"
 YUN.midgame.490.a: "С преступниками нужно бороться, несмотря на наши прошлые связи"
 YUN.midgame.490.b: "Иногда нужно быть морально гибким."

 YUN.midgame.491.t: "Цикл коррупции"
 YUN.midgame.491.d: "Гуаньси, у которого нет прямого перевода (Гуань означает закрытый и заботливый, Си означает систему), глубоко укоренено в китайской культуре. Оно описывает глубоко личную сеть, связь сильнее, чем просто деловые отношения или личный контакт, которая берет свое начало в конфуцианстве и играет роль в политике, бизнесе и обществе.\n\nОднако для многих сторонних наблюдателей в Республике этот термин стал синонимом «Коррупции» и «Кумовства» в Националистическом правительстве. Растущее чувство цинизма и безжалостности в движении Гоминьдана создало чувство недомогания, ослабляя узы идеологической лояльности в пользу личных сделок. Поскольку патронаж становится таким важным фактором при крупных назначениях в правительстве, политическая реформа была задушена, и популярность партии также резко упала.\n\nДаже лично неподкупные люди с трудом противостояли растущей волне коррупции, поскольку гниль настолько въелась в систему, что борьба с ней, вероятно, привела бы к тому, что любой человек — включая, возможно, даже президента — потерял бы власть.\n\nБаза поддержки партии начала сужаться. Чтобы защитить свои благоприятные сети Гуаньси, партийные чиновники, как правило, подчеркивали, что массы должны оставаться на своем «надлежащем месте», вдали от коридоров власти. Их неоконфуцианские оправдания мало что сделали для того, чтобы снискать расположение населения, и многие опасаются, что это еще больше дестабилизирует наше правительство."
 YUN.midgame.491.a: "Люди должны верить в нас и наших хорошо информированных лидеров!"
 YUN.midgame.491.b: "Чтобы была гармония, массы должны знать свое место, а их лидеры вести себя достойно."
 YUN.midgame.491.c: "С революционным пылом мы встряхнем систему!"

 YUN.midgame.492.t: "Коррупционные скандалы в Гуйчжоу"
 YUN.midgame.492.d: "Как партия, посвященная подъему китайских масс, вопрос о земле разорвал партию по ее идеологическим швам — и левое, и правое крылья Гоминьдана не могут прийти к компромиссу относительно того, как лучше всего решить вопрос о земле. Особая критика была направлена в адрес Генералиссимуса Хэ, который владеет обширными земельными владениями в Гуйчжоу, несмотря на обещание правительства провести справедливые и адекватные земельные реформы. Зять Генералиссимуса, Ван Боцюнь, также оказался под пристальным вниманием общественности. Ранний член Тунмэнхоя, который был связан с доктором Сунь Ятсеном во время попытки мирной конференции после Учанского восстания, Ван недавно занимал пост министра транспорта и был отмечен за свои достижения в улучшении коммуникаций, железных дорог и даже авиации. Однако общественная кампания в последние месяцы разоблачила Вана за участие в торговле опиумом, и многие в правительстве, особенно в Клике гражданского строительства, призвали его уйти в отставку. Гу Чжэнлунь, видный политик Гуйчжоу, также призвал к расследованию владений Генералиссимуса (возможно, в попытке подорвать контроль Хэ над провинцией) — заявление, поддержанное представителями Клики политической науки. В меньшей степени под пристальное внимание попал младший брат Хэ Инциня, Хэ Цзиу, который работал под началом Ван Боцюня в качестве заместителя председателя China Airlines, члена правительства провинции и кандидата на пост мэра Гуйяна (столицы провинции)."
 YUN.midgame.492.a: "Это все полная ерунда."
 YUN.midgame.492.b: "Нам нужно расследовать это дальше."
 YUN.midgame.492.c: "Гу Чжэнлунь берет инициативу на себя."

 YUN.midgame.493.t: "Чжэцзянизация партии"
 YUN.midgame.493.d: "Гоминьдан, давно базирующийся в Гуанчжоу, является партией, в которой доминируют южане. Кантонские политики и другие выходцы из Гуандуна составляли основную часть партийного аппарата. Однако из-за влияния Дай Цзитао, Чэнь Гофу и покойного Чан Кайши Новые правые черпают большую часть своих рядовых членов из Чжэцзяна и, в меньшей степени, из Гуйчжоу. Это вызвало негодование и затяжную битву за влияние со старой гвардией Кантона.\n\nШанхай и богатый регион Цзяннань были крупным центром политической активности среди правых Гоминьдана, даже после создания Легационных городов. Сети Гуаньси, связывающие многих ведущих членов партии с городом, позволили таким людям, как братья Чэнь, использовать семейные, социальные, банковские, региональные и политические связи для развития Клики СС как политической силы, и память о революционном лидере Чэнь Цимэе все еще имеет вес даже в изменившемся обществе Шанхая. Многие из «патриотической» элиты начали делать ставки на Гоминьдан, посылая партии миллионы в виде займов. Точно так же многие тайные общества, особенно печально известная Зеленая банда, начали смыкать ряды за чжэцзянцами против социалистов и кантонских фракций партии.\n\nЭто не значит, что кантонцы, доминирующие в Клике Московского комитета, — отработанная сила. Они продолжают быть интеллектуальным авангардом партии и сохраняют обширные финансовые и политические связи, которые продолжают соперничать с джентри, торговцами и промышленниками Цзяннани, сплотившимися вокруг Новых правых. Более того, многие северяне нашли большую симпатию к Клике политической науки, находя их более сговорчивыми и менее радикальными. Политический переход, однако, хотя и не всегда сразу очевидный, идет полным ходом — интеллектуальная элита Чжэцзяна, такая как Дай Цзитао и Чэнь Гофу, унаследовала более консервативный реформизм, вдохновленный учеными-джентри, распространенный в их родной провинции, отходя от наследия тайпинов партии."
 YUN.midgame.493.a: "Порядок и революция не обязательно противоположны."
 YUN.midgame.493.b: "Возможно, они смогут найти более стабильных партнеров?"
 YUN.midgame.493.c: "Мы должны сохранить динамизм старого!"

 YUN.midgame.494.t: "Построение партийной линии"
 YUN.midgame.494.d: "Построение сплоченной партийной линии было неустанной миссией Центральной политической школы, в которой доминирует Клика СС. Дай Цзитао и Чэнь Гофу лично помогали отбирать многих из первых классов Вампу, а участие Чэнь Лифу в Организационном отделе партии помогло не допустить нежелательных агентов пятой колонны, таких как социалисты.\n\nНо в Партийной ортодоксии есть нечто большее, чем просто исключение нелояльных. Гоминьдан должен представить новое видение китайского общества, которое может мобилизовать массы на жертвы, необходимые для победы.\n\nДвижение за новую культуру повлияло на партию, как в оппозиции, так и в пользу ее различных идеалов. Многие учебники по граждановедению, напечатанные Партийной школой, подчеркивали современный и эгалитарный характер Трех народных принципов, отражая требования Новой культуры по увеличению производства, прогрессивному развитию, правам женщин, а также социальному и экономическому благосостоянию рабочего класса.\n\nОднако партия также, под влиянием Дай Цзитао, решительно выступила против антитрадиционализма и индивидуализма движения. Они призвали к органически интегрированному обществу, построенному и управляемому партией, которая одновременно была бы интегрированной, но также независимой, объективной и опекающей сущностью.\n\nВ этой концепции идеального общества Гоминьдана есть некоторые внутренние противоречия. Более традиционалистские мыслители представляют его как оживление старых семейных иерархий идеализированного прошлого — эта цивилизация в неоконфуцианском стиле была бы построена на цепочках иерархических отношений, которые объединяются в коллективную массу. Более модернистские философы вместо этого предположили, что общество должно быть эффективно гомогенизировано — одно органически единое партийное государство."
 YUN.midgame.494.a: "Мы можем восстановить гармоничные узы, которые нас питают!"
 YUN.midgame.494.b: "Мы можем построить современное, прогрессивное общество!"
 YUN.midgame.494.c: "У нас будет одна нация, один народ и одно будущее!"
 YUN.midgame.494.e: "Люди должны иметь возможность думать самостоятельно."

 YUN.midgame.495.t: "Цель революции"
 YUN.midgame.495.d: "«Какова цель революции?» — спросил Дай, прежде чем дать свой ответ. «Она состоит в том, чтобы вырвать новую культуру, уничтожившую нашу старую культуру, у меньшинства, чтобы простые люди в целом могли вернуть себе привилегированное положение, где они могут приобщиться к этой новой культуре. Наша цель не чрезмерна, ибо наши предки всегда обладали такой привилегией. В местах, где встреча с «современной цивилизацией» произошла несколько поздно, даже человек среднего возраста, как я, может вспомнить красоту человеческих чувств и счастье простых людей».\n\nПри рекордно высоком уровне националистических убеждений вера в их способность фундаментально изменить общество росла вместе с ним. Для Правого Гоминьдана мало что невозможно. Национализм, и только национализм и Национальная партия, могут создать эгалитарное общество с культурой, свободной от гедонистического потребительства. Это утопическое общество вместо этого будет построено на моральном предприятии, унаследованном от Конфуция, который, как утверждает Дай, вдохновил доктора Суня больше, чем Маркс или Ленин.\n\nОсновой национализма в Трех народных принципах тогда «является этика сыновней почтительности». Точно так же «основой демократии является этика доверия и праведности», а «основой народного благосостояния является этика благожелательности и народа». Другими словами, Три народных принципа представляют как прошлое, так и будущее Китая — вдохновленные конфуцианскими учениями, но фундаментально революционные в своей способности спасти Китай от упадка."
 YUN.midgame.495.a: "Через сыновнюю почтительность мы объединяем нацию!"
 YUN.midgame.495.b: "Доверие и праведность — вот что поддерживает республику."
 YUN.midgame.495.c: "Благожелательность и мир — вот что строит наше благосостояние."
 YUN.midgame.495.e: "Что это за чушь?"

#KMT Satellite Narrative Events (500-519)
 YUN.midgame.500.t: "Чжу Пэйдэ чистит Лун Юня"
 YUN.midgame.500.d: "Подчинение Чжу Пэйдэ центральному правительству в обмен на признание его губернаторства значительно укрепило его позиции. Получив секретное разрешение от Центрального исполнительного комитета, Чжу арестовал Лун Юня и многих его ближайших союзников, взяв Чжаотун под свой твердый контроль.\n\nПодчинение Куньмина [ROOT.OVERLORD.Capital.GetCapitalVictoryPointName] сместило баланс сил не только на более широкой китайской политической сцене, но и на юго-западе. Арест некогда могущественного генерала Луна демонстрирует, что Гоминьдан не просто «проходит через» Юньнань перед маршем на Гуанчжоу, как надеялись местные джентри, а скорее полон решимости остаться и реорганизовать провинцию по линии партийного государства.\n\nЧжу не единственный, кто усилился благодаря этому недавнему повороту событий. Хитрый Ху Жоюй, все еще командующий Мэнцзы на юге, был одним из первых крупных лидеров клики Юньнани, сменивших форму в надежде сохранить власть, несмотря на свои прежние связи с немецкими и чжилийскими интересами. Устранив двух своих величайших соперников (Тан Цзияо и Лун Юня), многие из старой провинциальной элиты обратились к нему, чтобы противостоять посягательствам революционеров.\n\nОднако пока позиция Чжу Пэйдэ надежна. Ху Жоюй продолжает открыто заявлять о своей лояльности, даже иногда изображая себя левым, чтобы укрепить партийную поддержку и избежать участи Луна. Однако он также советует правительству передать Лун Юня под его опеку, чтобы развеять страхи джентри. Генерал Ху, иногда конкурент, а иногда и ситуативный союзник Луна, вряд ли отпустит его далеко, но возможность того, что генерал Лун сохранит полевое командование, беспокоит многих."
 YUN.midgame.500.a: "Лун Юнь останется под стражей в Куньмине."
 YUN.midgame.500.b: "Лун Юнь будет переведен под домашний арест в Мэнцзы."

 YUN.midgame.501.t: "Второй шанс Ли Гэньюаня"
 YUN.midgame.501.d: "Чтобы сохранить свой шаткий контроль над Юньнанью, Чжу Пэйдэ был вынужден опираться на множество различных столпов. К ним относятся левые радикалы в 3-й армии, его товарищи правые (сомнительной лояльности) в 3-й армии, джентри Юньнани, а теперь все чаще и возрождающаяся Клика политической науки — тщательно балансируя всех этих акторов друг против друга.\n\nПартнерство Чжу с Ли Гэньюанем в некотором роде естественно, а в других — опасная авантюра. Генерал Ли остается открыто амбициозным человеком, даже если он номинально остается на заднем сиденье. Бывший заместитель Цай Э и инструктор в Военной академии Куньмина, он исторически конфликтовал с Тан Цзияо и джентри Юньнани из-за своей революционной харизмы, но также порвал с Сунь Ятсеном и основным Гоминьданом из-за своей поддержки Цэнь Чуньсюаня и продвижения переговоров об объединении Севера и Юга в 1920-х годах. Многие задаются вопросом, будет ли губернатор Чжу сильно отличаться от Гу Пиньчжэня (чье краткое губернаторство было омрачено обвинениями в том, что он марионетка Ли), хотя Чжу всегда был способен на политическую независимость сам по себе — сохраняя нейтралитет во время конфликта Гу и Тана.\n\nВлияние Клики политической науки распространяется и на Гуйчжоу. Чжан Цюнь — видный начальник тыла старой 1-й армии, создавший свою собственную «Новую клику политической науки». Немного ближе к истеблишменту Гоминьдана, Чжан слабо связан с фракцией Ли, хотя и остается отдельной сущностью.\n\nВ целом ожидается, что Ли Гэньюань станет важным партнером для стабилизации провинции, но он также угрожает подорвать правление Чжу Пэйдэ из-за своей непопулярности и бесконечных амбиций."
 YUN.midgame.501.a: "Желанная помощь региональной администрации."
 YUN.midgame.501.b: "Еще одна угроза целостности нашего правления."

 YUN.midgame.502.t: "Угасающий свет Хэ Инциня"
 YUN.midgame.502.d: "Отношения Хэ Инциня с его коллегами-командирами Национально-революционной армии всегда были спорными, его считали слишком большим лакеем Чана, чтобы ему доверять, но он предал Чана в несколько решающих моментов, что подорвало доверие в кругу Вампу. Его главным преимуществом в поддержании своего влияния в период изгнания были его обширные связи с Гуйчжоу. Но теперь, когда Гоминьдан восстановил контроль над многими другими провинциями, его рычаги влияния значительно ослабли. Не будучи особенно устрашающим как личность или исключительно харизматичным, его было легко изолировать в национальном масштабе.\n\nБлагодаря интригам Чжу Пэйдэ и Ли Гэньюаня Центральное правительство тихо надавило на генерала Вампу, чтобы тот ушел с поста губернатора Гуйчжоу. Они отметили его нелояльность и коррупцию и обвинили его в неподчинении национальной революции. Его заменил Чжан Цюнь, восходящий выпускник Клики политической науки и давний сотрудник Чан Кайши.\n\nЧжан продвигал обширные реформы и тесное сотрудничество с Куньмином, но не смог предотвратить возникновение вакуума власти. Хэ Инцинь и его союзники сохраняют связи среди видных членов местного джентри. Решение Чжан Цюня завербовать Ян Юнтая, бывшего соратника по Клике политической науки, ранее изгнанного, как ожидается, восстановит некоторые связи, но они оказались упрямыми после падения их лидера.\n\nБолее тревожной является реакция многих членов 1-й армии, в которой доминируют выпускники Военной академии Вампу. Разочарованные либеральным, «контрреволюционным» поворотом регионального правительства, многие стекались к молодому, харизматичному Чэнь Чэну, который усилил призывы к борьбе с коррупцией, земельной реформе и другим популистским обещаниям. Этот левый поворот будет гораздо труднее остановить, поскольку офицеры Вампу печально известны своей клановостью и идеологичностью."
 YUN.midgame.502.a: "Чэнь Чэн и Вампу возмущены таким поворотом событий!"
 YUN.midgame.502.b: "Реформы Чжан Цюня и Ян Юнтая свяжут регион воедино."

 YUN.midgame.503.t: "Левые на юго-западе"
 YUN.midgame.503.d: "Юго-запад исторически был относительно консервативным регионом, хотя революционный национализм и левые симпатии вряд ли являются чем-то неслыханным. Во время революции 1911 года здесь было значительное присутствие революционного Тунмэнхоя, даже когда они конкурировали с реформистскими фракциями за влияние. Ван Фушэн и другие студенты Юньнани, учившиеся у Ли Дачжао в Пекине, создали подпольный круг синдикалистов, известный как Новое общество Дянь, поклявшись принести революцию в свою родную провинцию.\n\nПрибытие Гоминьдана после Великого похода принесло еще одну волну левизны в регион. Ван попытался создать тайный социалистический круг в Колледже права и политики, издавая «Миньго Жибао» (Ежедневная Республика), но был быстро изгнан. Новое общество Юньнани (иногда переводится как Новое общество Дянь, Дянь — китайское сокращение Юньнани), порвало с более ориентированным на города подходом основной КСП и бежало в сельскую местность в надежде организовать крестьян, местные меньшинства и бандитов против правления Тан Цзияо.\n\nОднако более серьезные претенденты поддерживаются военными. Чэнь Чэн — протеже Дэн Яньда и Чан Кайши, воплощающий революционный левый национализм ранней Военной академии Вампу. Прозванные Кликой гражданского строительства, они поглотили другие фракции Вампу в Гуйчжоу.\n\nЧжу Дэ — еще одна восходящая звезда. Близкий друг Чжу Пэйдэ и имеющий связи с Фань Шишэном и Цзинь Ханьдином, он занимает видное место в вооруженных силах Юньнани. В переписке с Чжан Боцзюнем, видным членом Временного комитета действий (ведущая политическая сила в Гоминьдане в зоне повстанческого движения Миньгань), его круг является заметным форпостом левизны в провинции."
 YUN.midgame.503.a: "Ван Фушэн и Новое общество Юньнани конфликтуют с джентри!"
 YUN.midgame.503.b: "Чэнь Чэн и Клика гражданского строительства сражаются за Гуйчжоу!"
 YUN.midgame.503.c: "Чжу Дэ и левые 3-й армии борются за Куньмин!"

 YUN.midgame.504.t: "Партия и Тусы"
 YUN.midgame.504.d: "У Гоминьдана были сложные отношения с меньшинствами в Китае, отражающие сложное отношение Синьхайской революции, в которой доминировали ханьцы, к китайскому национализму. Гоминьдан заявляет, что выступает за всех китайцев, независимо от этнического наследия, но часто подвергался обвинениям в ханьском шовинизме. Их национализм и социал-дарвинизм часто вступают в противоречие с их эгалитарными идеалами, что на практике еще больше осложняется их паутиной местных союзов с милитаристами, джентри, социалистами и группами меньшинств.\n\nЮньнань и Гуйчжоу являются домом для большого населения этнических меньшинств. К ним относятся И, Бай, Буи, Дун, Туцзя, Мяо, Хани, Чжуан, Дай и многие другие. Меньшинства играли сложную роль в региональной политике: исторически династия Цин стремилась привлечь их лидеров в качестве союзников, классифицируя местных вождей как Тугуань (для гражданских ролей) или Тусы (для военных) и стремясь обучать их детей, чтобы создать надежную касту вассалов. Это сыграло роль в пограничных спорах с британцами из-за Бирмы, где даже после отступления власти Цин местные провинциальные лидеры продолжали вербовать Тусы, чтобы заявить о китайских претензиях на спорные территории и требовать дань. Торговцы Мяо в Юньнани также играли роль в коммерческих спорах против концессий.\n\nЭтнические меньшинства в Юньнани также играли важную роль во время Синьхайской революции. Чжан Вэньгуан опубликовал республиканский популистский манифест и безуспешно пытался захватить Дали с армией Тунмэнхоя, состоявшей из многих меньшинств и мусульман. Одним из его главных заместителей был Дао Аньжэнь, вождь меньшинства, умерший в изгнании, пытаясь установить контакт с Сунь Ятсеном.\n\nС победой Гоминьдана в регионе многие наблюдают, как они будут относиться к местным этническим группам — деликатный вопрос, когда почти треть населения не являются ханьцами. Роль Тусы, в частности, может быть спорной: одни утверждают, что они являются критически важными союзниками для расширения прав и возможностей местных групп для противостояния джентри, в то время как другие утверждают, что они такие же отсталые реакционеры, как и джентри, против которых они выступают."
 YUN.midgame.504.a: "Пусть знают, что Гоминьдан стремится наделить властью всех людей в Китае!"
 YUN.midgame.504.b: "Гоминьдан — сила прогресса и единства, и просветит их!"

 YUN.midgame.505.t: "Дуэль взглядов в Юньнани"
 YUN.midgame.505.d: "В Юньнани до Синьхайской революции доминировали два противоположных политических взгляда на растущее влияние иностранных концессионеров: реформистский национализм, обычно поддерживаемый джентри Юньнани, которые стремились устранить несправедливую внешнюю торговлю посредством внутреннего экономического развития и некоторого сотрудничества с иностранными торговцами, и революционный национализм коммерческих фирм и этнических меньшинств, которые стремились продвигать более свободный внутренний рынок и национализацию иностранных железнодорожных монополий.\n\nЭтот разрыв между реформистами и революционерами сохранился и после Синьхайской революции, причем решение Цай Э встать на сторону реформистов стало решающим в повороте провинциальной политики против радикального Тунмэнхоя. Попытки Тунмэнхоя, а затем Гоминьдана спровоцировать восстания против реформистского статус-кво были жестко подавлены, и генералы Гоминьдана, такие как Гу Пиньчжэнь, Ли Гэньюань, Чжу Пэйдэ, Фань Шишэн и Цзинь Ханьдин, не добились особого успеха в своих различных попытках «освободить» свою родную провинцию.\n\nУтвердившись у власти, Чжу Пэйдэ, Ли Гэньюань и Чжан Цюнь оказались в новом статус-кво, но все еще вынуждены бороться с реформистскими элементами, поддерживаемыми джентри Юньнани и консервативным генералом Ху Жоюем. Однако в то же время радикализм остается в моде для многих в партии, причем Чжу Дэ и Чэнь Чэн стремятся радикально перестроить юго-запад. Громкость этих людей, населяющих радикальную периферию, делает их трудными для игнорирования.\n\nТемпы перемен всегда были тонким балансом, и решить это непросто. В конце концов, всегда должна быть смесь философий, но все могут согласиться с тем, что перемены не только необходимы, но, вероятно, уже близки."
 YUN.midgame.505.a: "Приспособление к более реформистскому мышлению обеспечит устойчивые перемены."
 YUN.midgame.505.b: "Поддержание радикального курса — это то, как могут произойти реальные перемены."

 YUN.midgame.506.t: "Правление Чжан Цюня в Гуйчжоу"
 YUN.midgame.506.d: "После неровного старта администрация Чжан Цюня в Гуйчжоу начала добиваться определенного прогресса. Левый дрейф региона затруднил искоренение, поскольку многие местные рабочие и крестьяне симпатизируют Клике гражданского строительства 1-й армии. Чжан, по совету Ян Юнтая, быстро пришел к выводу, что использование военной силы будет неэффективным против растущего влияния Чэнь Чэна.\n\nЧтобы укрепить свой режим, якобы на благо [ROOT.OVERLORD.Capital.GetCapitalVictoryPointName], Чжан начал повторное введение системы ополчения Баоцзя, создав домовые реестры, обучая местные ополчения (часто возглавляемые сочувствующими джентри), строя укрепления, разыскивая и арестовывая социалистические элементы и начиная кампанию по «зачистке и подавлению» элементов 1-й армии, которые решили дезертировать и попытаться организовать повстанческое движение в сельской местности. Поскольку многие беженцы из Сычуани бегут в соседний Гуйчжоу, силы Чжана были заняты оказанием помощи, снижением налогов, а также приведением бюджета в равновесие.\n\nЧэнь Чэн, отвергнув путь некоторых своих более радикальных подчиненных в пользу официальной лояльности администрации Гуйчжоу, решил вместо этого выждать время. Он все чаще становится параллельной фигурой власти, причем многие армейские подразделения предпочитают обращаться в его штаб вместо Гуйяна. Он утверждает, что решение проблемы сельской нестабильности в Китае — это 70% политики и 30% военных мер, отстаивая борьбу с коррупцией, земельную реформу и политическую реформу для ликвидации бандитизма и завоевания крестьян. Он создал (с неохотного одобрения губернатора Чжана) Провинциальное зерновое административное бюро и Комитет по обучению народа. В районах, где доминируют силы Чэна, царит решительно более левая и популистская атмосфера, даже если во многих отношениях цели Чжана и Чэна совпадают."
 YUN.midgame.506.a: "Чжан Цюнь и устойчивый подход PSC приносят процветание."
 YUN.midgame.506.b: "Чэнь Чэн и популистские реформы CEC приносят надежду."

 YUN.midgame.507.t: "Чжу Пэйдэ и Провинциальная ассамблея Юньнани"
 YUN.midgame.507.d: "В Провинциальной ассамблее Юньнани доминирует местная элита, включая джентри, торговцев и интеллигенцию. Она оказалась консервативной либеральной силой, настаивающей на подотчетности правительства, но также сопротивляющейся революционной реформе, обещанной Гоминьданом. Это явление вряд ли уникально для Юньнани: многие провинциальные ассамблеи создавались в последние годы Великой Цин по мере фрагментации имперской власти.\n\nВо время Синьхайской революции Цай Э и его милитаристское правление, как правило, игнорировали провинциальную ассамблею, тенденция, которую Тан Цзияо несколько продолжил, но в своем стремлении построить федеральную, демократическую провинцию он также был готов пойти на некоторые уступки ассамблее. Хотя Тан потерял власть, многие из его последователей остались, создав либерально-консервативную смесь в провинциальной ассамблее, которая столкнулась с притоком законодателей, ориентированных на Гоминьдан.\n\nЭто отражает столь же сложную историю Чжу Пэйдэ и Ли Гэньюаня с Провинциальной ассамблеей. Оба проявили готовность работать с институтом, причем Ли начал свою карьеру как идеологический милитарист, подобный Цай Э, но переключился на более гражданский подход по мере развития революции. Он резюмировал свой подход, сказав, что «если чиновники и джентри не будут сотрудничать единодушно, действительно трудно избавиться от проблем».\n\nЧжу Пэйдэ также выразил некоторую открытость к гражданскому надзору, но он также провел большую часть своей карьеры как аутсайдер — будучи сосланным в Гуанчжоу довольно рано в революции. Это оставило его с немногими друзьями среди элиты Юньнани, и многие левые и даже некоторые правые в его кругу советуют ему заполнить ассамблею большим количеством представителей «народа», а не угождать истеблишменту. Это ослабило бы ассамблею в пользу партийного правления, фактически стирая небольшие достижения, сделанные за десятилетия правления Тана."
 YUN.midgame.507.a: "У Ассамблеи есть место в будущем нашей провинции."
 YUN.midgame.507.b: "Именно партия действительно представляет желания народа."

 YUN.midgame.508.t: "Восстание в Бачжае"
 YUN.midgame.508.d: "Джентри и чиновники, назначенные Куньмином, часто находятся в ссоре, проблема, которая преследовала предыдущие администрации и отражает сохраняющиеся сложные реалии правления Гоминьдана. Земельная элита часто контролирует местные ополчения безопасности, которые обычно действуют независимо от правительственных директив.\n\nОдна из этих многочисленных битв разыгралась в деревне Бачжай, отражая сложную природу политической ситуации в Юньнани. Правительство округа Магуань попыталось конфисковать оружие у местных жителей племен после того, как капитан местного ополчения отказался подчиниться и был обвинен в сборе налогов без одобрения. Это спровоцировало восстание, которое быстро поддержали агитаторы из синдикалистского Нового общества Юньнани, что позволило ему набрать обороты.\n\nК удивлению многих, местные помещики поддержали повстанцев Бачжая, послав свои ополчения поддержать восстание и запугав правительственные силы, заставив их отступить. Союз между представителями меньшинств, социалистами и джентри быстро оказался шатким, поскольку левые и реакционеры боролись за влияние внутри движения, что позволило правительству отправить подкрепление по мере того, как восстание застопорилось.\n\nПеред лицом наступления правительства радикальные командиры посоветовали внезапную атаку в надежде переломить ситуацию до того, как джентри перейдут на другую сторону и оставят их расплачиваться. Капитаны ополчения джентри вместо этого посоветовали переговоры с правительством, надеясь положить конец конфликту с небольшим кровопролитием."
 YUN.midgame.508.a: "Агрессивная внезапная атака позволяет выжившим социалистическим силам уйти!"
 YUN.midgame.508.b: "Повстанцы ведут переговоры, чтобы сохранить свою численность на будущее."

 YUN.midgame.509.t: "Восходящие звезды Гуйчжоу"
 YUN.midgame.509.d: "Чжан Цюнь в своем стремлении поставить 1-ю армию под свой контроль в Гуйчжоу возвысил многих более молодых и менее политически связанных генералов на должности двойной военной и гражданской власти. Сюн Шихуэй был самым многообещающим из этой молодой гвардии, долгое время работавшим бухгалтером Комитета по административным делам в Гуйчжоу и хорошо известным в кругу Чжан Цюня.\n\nНесмотря на его военное прошлое (или, возможно, благодаря ему), его внимание было сосредоточено на проектах общественных работ, упорядочении налогообложения и борьбе с бандитизмом. Назначенный Чжаном директором Генерального офиса штаба Гуйяна, он получил похвалу за строительство парков, мостов, гостевых домов, дорог, а также за отмену более ста непомерных налогов.\n\nЭто, естественно, вызвало сравнения с реформами Клики гражданского строительства, которые могут похвастаться своими собственными восходящими звездами. Чжу Хуайбин — еще один военный и однокурсник Чэнь Чэна, имеющий связи с Юньнанью. Повернув вправо, чтобы укрепить репутацию CEC в продвижении стабильности, Чжу изложил свой «План политической борьбы для уездов Гуйчжоу» и «План построения нового Гуйчжоу», организуя местные ополчения (включая ополчения джентри), объединяя и реорганизуя деревни и увеличивая количество часовых. Несмотря на его скромное заявление «делать великие дела, а не быть большим чиновником», он вызвал критику за свой драконовский лозунг «если одна семья контактирует с бандитами, пять будут наказаны».\n\nИ Сюн, и Чжу стремились взять под контроль Комитет провинциальных предприятий Гуйчжоу и его недавно предложенную Промышленную компанию Гуйчжоу. Эта государственная корпорация должна взять под контроль более пятидесяти местных компаний и шахт, которые Гоминьдан национализировал, когда впервые прибыл в Гуйчжоу, часто плохо управляемых партийными кадрами. Поскольку окончательный состав совета директоров будет избран или назначен в ближайшие недели, оба мужчины обещают, что они привнесут свежую кровь, чтобы оживить экономику Гуйчжоу."
 YUN.midgame.509.a: "Сюн Шихуэй и его группа технократов с западным образованием сделают свою работу."
 YUN.midgame.509.b: "Кадры Чжу Хуайбина посвящают свою жизнь возрождению промышленности."

#KMT Satellite LKMT Events (520-539)
 YUN.midgame.520.t: "Социалистические советники прибывают в Куньмин"
 YUN.midgame.520.d: "С подчинением Юньнани [CHI.Capital.GetCapitalVictoryPointName] левый Центральный комитет нашел союзников Гоминьдана на юго-западе, хотя и не обязательно тех, кому они доверяют. И Чжу Пэйдэ из Юньнани, и Хэ Инцинь из Гуйчжоу являются известными правыми, но известно, что Чжу Пэйдэ открыт для левых советников в своих рядах, а Хэ Инцинь — бывший заместитель Чан Кайши и, следовательно, известная, если не обязательно любимая величина среди офицеров Вампу.\n\nТем не менее, чтобы помочь вернуть Куньмин и Гуйян к революционной ортодоксии, Центральный исполнительный комитет счел целесообразным отправить делегацию «советников» в регион. Эту делегацию возглавляет Чжан Боцзюнь, видный лидер Временного комитета действий, который путешествовал в Европу на одном корабле с генералом Чжу Дэ в 1922 году и стал другом и соседом по комнате протеже 3-й армии.\n\nВ Гуйчжоу генерал Чжоу Чжижоу воссоединился со своими назваными братьями Чэнь Чэном и Ло Чжоином. Будучи коллегой-выпускником Баодина и инструктором Вампу, в период изгнания он изучал военную авиацию в Европе, став ведущим экспертом в этой области. Он также является известным членом Ассоциации революционных товарищей Военной академии Вампу (WMARCA) и, следовательно, связан с генералом Дэн Яньда. К нему присоединяется Янь Лисань, еще один инструктор Вампу и близкий друг Дэна, которому были обещаны важные должности в гражданской администрации Гуйчжоу.\n\nВан Цзинвэй и RCA не лишены союзников в регионе. Чжоу Эньлай также является другом Чжу Дэ и считает, что если дойдет до дела, он останется верным гражданской партии, а не путчистам WMARCA. В Гуйчжоу Гу Чжэнлунь является несколько отчужденным старшим братом братьев Гу, двух известных организаторов RCA. Хотя они разделены политикой, семья часто превосходит идеологию.\n\nНезависимо от этого, у этих людей одна задача — не допустить возвращения Юньнани в руки джентри и обеспечить ее постоянную лояльность социалистическому истеблишменту."
 YUN.midgame.520.a: "Чжан, Чжоу и Янь помогут направить Юньнань в левом направлении."
 YUN.midgame.520.b: "Чжоу Эньлай и Гу проделают фантастическую работу."
 YUN.midgame.520.c: "Мы все направляемся на юго-запад вместе! (Переключиться на Юньнань)"
 YUN.midgame.520.e: "Социализм — это наша судьба!"
 YUN.midgame.520.f: "Истинная революция восторжествует."

 YUN.midgame.531.t: "Помощь в сельской реконструкции от [FROM.Capital.GetCapitalVictoryPointName]"
 YUN.midgame.531.d: "Призывы генерала Чэнь Чэна к обширной сельской земельной реформе, включая передачу земли пахарям, ограничение арендной платы и упорядочение налогообложения, рассматриваются как уменьшенная версия более радикальных предложений левого Гоминьдана, но, возможно, это было необходимо, чтобы провести эти предложения в консервативном Гуйчжоу.\n\nКомиссия по национальной реконструкции предложила финансировать эти усилия, одобрив несколько крупных грантов и предложив направить технократов в сельскую местность Гуйчжоу. Это дало бы Чэну крупную политическую победу и изменило бы отношение в сельской местности в пользу Клики гражданского строительства.\n\nХотя перспективы масштабного экономического развития в Гуйчжоу заманчивы, некоторые советники в кругу губернатора Чжан Цюня посоветовали нам затормозить или иным образом воспрепятствовать проектам, которые провинциальное правительство не смогло бы напрямую контролировать, чтобы сельская местность не досталась социалистам."
 YUN.midgame.531.a: "Эта помощь будет жизненно важна для реконструкции Гуйчжоу."
 YUN.midgame.531.b: "Эта помощь — всего лишь уловка для нашего окончательного уничтожения."

 YUN.midgame.532.t: "[FROM.Capital.GetCapitalVictoryPointName] вооружает Клику гражданского строительства"
 YUN.midgame.532.d: "Чэнь Чэн недавно был назначен командующим 18-й армией, отделенной от старой 1-й армии, которая стояла лагерем в Гуйчжоу. В сочетании с его непосредственным командованием 10-й дивизией его фракция была названа «Кликой гражданского строительства» (визуальный каламбур) и представляет левый дрейф Клики Вампу Чан Кайши. Хотя, возможно, и не по-настоящему социалистическая, связь Чэна с Дэн Яньда и PAC сделала его самым заметным левым в Гуйчжоу.\n\nВоенный совет распорядился о крупной поставке оружия 18-й армии, особенно 10-й дивизии, с широким мандатом для генерала Чэна на укрепление партийного контроля, усиление существующих подразделений и создание новых. Силы безопасности Гуйчжоу, связанные с губернатором Чжаном, были проигнорированы, что привело к негодованию.\n\nЗахват этих партий оружия, вероятно, вызовет еще большее кровопролитие и ослабит дело в целом, но отказ от этого дестабилизирует контроль губернатора Чжана над Гуйчжоу."
 YUN.midgame.532.a: "Я полагаю, создание еще одной или двух дивизий безопасности сделает Гуйчжоу безопаснее."
 YUN.midgame.532.b: "Можно было бы подумать, что социалисты поймут необходимость делиться ресурсами."

 YUN.midgame.533.t: "[FROM.Capital.GetCapitalVictoryPointName] взращивает левых 3-й армии"
 YUN.midgame.533.d: "Генерал Чжу Дэ, пожалуй, самый заметный левый в 3-й армии, блестящий стратегический ум и имеет хорошие связи среди региональных революционных генералов, включая Чжу Пэйдэ, Фань Шишэна и Цзинь Ханьдина. Поскольку личная политика на юго-западе часто имеет приоритет над идеологией, центральный комитет рассматривает его как жизненно важный актив.\n\nВоенный совет предложил финансировать капитальный ремонт Арсенала Куньмина и Военной академии Куньмина, без сомнения, надеясь получить рычаги влияния на военных Юньнани. В качестве услуги за услугу генерал Чжу и его последователи, вероятно, получат львиную долю назначений для надзора за этими проектами, угрожая сделать гордую армию Юньнани красной.\n\nС другой стороны, однако, отказ от такого ценного предложения не только ослабил бы нашу оборону, но и, вероятно, был бы непопулярен в армии. И губернатор Чжу Пэйдэ обещает, что сможет удержать своего протеже в узде."
 YUN.midgame.533.a: "Эти инициативы будут иметь большое значение для укрепления нашей обороны от империализма."
 YUN.midgame.533.b: "Юньнани никогда не нужны были чужаки, чтобы защищать наши границы."

 YUN.midgame.534.t: "[FROM.Capital.GetCapitalVictoryPointName] наделяет полномочиями Чжан Боцзюня"
 YUN.midgame.534.d: "Чжан Боцзюнь — социалистический партийный кадр, направленный в Юньнань в качестве «советника», на практике действующий как их полномочный представитель на юго-западе. Чжан — довольно эффективный дипломат: хорошо образованный и харизматичный, он способен проникать в местные интеллектуальные круги. Поскольку многие студенты и профессора Юньнани разочарованы последними политическими событиями, они созрели для обращения, утверждает он, если только центральный комитет будет щедр с его содержанием.\n\nПохоже, что он наконец получил свое прошение, и он усердно работал, используя его. Его способность мобилизовать интеллектуальные классы для Гоминьдана была полезна для более плавной работы правительства, но растет подозрение в отношении левого дрейфа партии Юньнани."
 YUN.midgame.534.a: "Чжан Боцзюнь делает хорошую работу, гармонизируя социализм и хорошее управление."
 YUN.midgame.534.b: "Было бы жаль, если бы с его сторонниками произошли какие-то «несчастные случаи»."

 YUN.midgame.535.t: "[FROM.Capital.GetCapitalVictoryPointName] признает Новое общество Юньнани"
 YUN.midgame.535.d: "Специальное бюро Юньнани Китайской синдикалистской партии — это тайная группа бывших студентов, ставших революционерами с военно-политической подготовкой из Вампу. Возглавляемые братьями Ван Дэсанем и Ван Фушэном, они добились определенного успеха, проникнув в провинцию от имени более широкого Нового общества Юньнани, общества синдикалистов Юньнани внутри КСП. Официальное признание этих смутьянов Центральным правительством позволило им выйти из тени, распространяя свою злонамеренную ложь в открытую.\n\nДолгосрочные бенефициары этого политического развития остаются под вопросом. Ожидается, что Новое общество Юньнани расширится благодаря провозглашению, но не все синдикалисты Юньнани уверены в долгосрочной способности КСП удерживать регион. Вместо этого некоторые искали союза с Чжан Боцзюнем и Чжу Дэ, надеясь, что защита более крупного левого Гоминьдана позволит синдикализму процветать в Куньмине.\n\nСпособность правительства Юньнани подавить их ограничена, рискуя вызвать гнев центрального правительства. Некоторые советовали попытаться кооптировать энергию левых с помощью собственной популистской политики, потенциально подрывая Новое общество Юньнани, но за счет дальнейшей легитимизации левых в провинции."
 YUN.midgame.535.a: "Новое общество Юньнани расширяет свои ряды."
 YUN.midgame.535.b: "Левые 3-й армии пользуются моментом."
 YUN.midgame.535.c: "Клика гражданского строительства использует ситуацию."

#KMT Misc Events (580-599)
 YUN.midgame.580.t.he_yingqin: "Счастливый генерал продолжает борьбу!"
 YUN.midgame.580.t.chen_cheng: "Маленький Генералиссимус"
 YUN.midgame.580.t.teng_jie: "Появление Линсю?"
 YUN.midgame.580.t.li_genyuan: "Чемпион Клики политической науки"
 YUN.midgame.580.t.wang_boling: "От храма до поля битвы"
 YUN.midgame.580.t.zhu_peide: "Победитель 3-й армии"
 YUN.midgame.580.t.zhu_de: "Старый вождь Чжу"
 YUN.midgame.580.d.he_yingqin: "Хэ Инциню не привыкать к войне и политике, он участвовал в Синьхайской революции в группе Чэнь Цимэя и в борьбе за Гуйчжоу с Ван Вэньхуа, прежде чем стать ведущим заместителем Чан Кайши. Всегда больше ведомый, чем лидер, он в основном держался в стороне от политики, но изменившиеся обстоятельства вытолкнули его в центр внимания. Хотя он вряд ли самый ловкий политик или самый харизматичный лидер, с Генералиссимусом связана определенная стабильность. Он смог использовать свои недавние победы на поле битвы для достижения большого политического эффекта и получил прозвище «Счастливый генерал» за свою способность выживать в трудных сражениях."
 YUN.midgame.580.d.chen_cheng: "В последние дни Чэнь Чэн одержал множество побед на поле битвы, подняв свой профиль на национальной арене. Протеже Чан Кайши и Дэн Яньда, он перенял у первого вдохновленный конфуцианством спартанский образ жизни, а у второго — левую популистскую платформу. Его публичный имидж — строгий сторонник дисциплины, подающий пример, настаивая на не более чем четырех блюдах на столе за еду и живя аскетично. Районы под его юрисдикцией видели запрет на легкомысленное поведение, такое как курение, алкоголь и танцы, и его войска очень гордятся своей преданностью революции. У него также есть более мягкая сторона, он известен как вежливый, внимательный и мягкий с гостями."
 YUN.midgame.580.d.teng_jie: "Тэн Цзе — глава иллюзорного Общества синерубашечников, которое в последние дни попало под пристальное внимание, поскольку генерал Тэн и его люди продемонстрировали свой фанатизм на поле битвы. В первую очередь политический офицер, его назначение на полевое командование стало для некоторых сюрпризом, но он быстро заставил замолчать любые сомнения своей проницательностью, ведя свои дивизии к победе. Экстремизм его людей, вдохновленный глобальным национал-популистским движением, а также их склонность нарушать приказы гражданского крыла партии вызвали беспокойство, но их эффективность трудно подвергнуть сомнению. Будут ли они обузой в будущем — другой вопрос."
 YUN.midgame.580.d.li_genyuan: "Ли Гэньюань — опытный военный, организовывавший изгнанных революционеров в Японии в рамках подготовки к Синьхайской революции. Одним из его первых актов лидерства было восстание Двойной Девятки, которое укрепило его репутацию убежденного республиканского революционера. Ли Гэньюань остается в прессе благодаря своим недавним достижениям на службе Национально-революционной армии, выводя Клику политической науки и их защиту конституционализма на передний план. В и без того глубоко политизированной армии умеренность — это отход от нормы, и его успехи являются доказательством того, что фанатичный экстремизм — не единственный способ спасти нацию."
 YUN.midgame.580.d.wang_boling: "Ван Болин был видным революционером и соучредителем Вампу, но ушел в буддийский храм вскоре после Северного похода. Обучаясь у мастера Инь Гуана и получив буддийское имя Хуэй Чан, большинство предполагало, что его публичная карьера закончена. Но, как и остальная часть Гоминьдана, революция получила второе дыхание в 1936 году, и Ван был призван из отставки. Он полностью оправдал ожидания, одержав значительные победы над врагом и принеся честь своим союзникам в Клике СС. Помимо своих военных обязанностей, он известен тем, что отстаивает буддийские дела, сближаясь с мастером Тайсу и выступая за реконструкцию додзё горы Цзюцзу."
 YUN.midgame.580.d.zhu_peide: "Чжу Пэйдэ, пожалуй, самый выдающийся офицер армии Юньнани, проведший несколько десятилетий в борьбе за национальную революцию. Известная своим усердием, скромностью и честностью, 3-я армия продолжает оставаться заметной силой в делах Гоминьдана — подкрепленная недавними победами генерала Чжу на поле битвы. Известный своей защитой наращивания национальной обороны Китая и материальной простотой, его фракция, как правило, поддерживает более умеренную интерпретацию Трех народных принципов, более близкую к «Старым правым» партии. Его известность на национальной арене принесла некоторое облегчение тем, кто с подозрением относится к более радикальным течениям партии."
 YUN.midgame.580.d.zhu_de: "Чжу Дэ прожил легендарную жизнь, вырос в бедности, прежде чем стать солдатом у разных военных. Его жизнь изменилась, когда он стал революционером, бросив привычку к опиуму и узнав больше о социализме и военной теории в Европе. Он вернулся домой другим человеком и сыграл важную роль в реорганизации 3-й армии в мощную революционную боевую силу для народа. Они доказали свою ценность в последние дни, оттеснив своих врагов в изнурительной кампании, которая завоевала Чжу восхищение многих левых в Юньнани. С поддержкой народа и своей инновационной тактикой он клянется освободить всю нацию!"
 YUN.midgame.580.a: "Он подает пример для подражания Вампу!"
 YUN.midgame.580.b: "Клика гражданского строительства строит светлое будущее."
 YUN.midgame.580.c: "Потрясающее выступление ужасающего человека."
 YUN.midgame.580.d: "Солдат Синьхайской революции"
 YUN.midgame.580.e: "Пусть ему когда-нибудь разрешат вернуться к учебе."
 YUN.midgame.580.f: "Образцовый солдат для образцовой армии."
 YUN.midgame.580.g: "Отец новой армии!"

 YUN.midgame.581.t: "Падение Хунани"
 YUN.midgame.581.d: "С Чанша под нашим полным контролем, крайне важно назначить лояльного губернатора провинции и прекратить ее военную оккупацию. Для этого у нас есть несколько вариантов кандидатов на пост губернатора.\n\nПервый — гражданский кандидат Цинь Чжэнь, как член Клики Сишань, его, естественно, поддерживает Московский комитет. Революционер старой гвардии, он отлично подошел бы на пост губернатора и мог бы продемонстрировать приверженность гражданскому правлению со стороны Гоминьдана. Опасение, конечно, заключается в том, что его связи с Московским комитетом означают, что он будет служить потенциальным будущим соперником.\n\nВторой кандидат, командующий 6-й армией Чэн Цянь, может преодолеть этот разрыв. Сочувствуя Московскому комитету, Чэн также был учителем в Вампу, что делает его надежным выбором для формирования моста между Московским комитетом и кликой Вампу Хэ. Однако Чэн печально известен своим хунаньским регионализмом, вплоть до того, что покинул Гуйчжоу и переехал, чтобы взять власть в Хунани, вместо того чтобы идти на Куньмин.\n\nТретий крупный кандидат — Тань Янькай, хотя бывший командующий 2-й армией, он всегда был больше гражданской фигурой и трижды был губернатором Хунани в прошлом, все еще оставаясь популярным в провинции. Он покинул хунту Гуйчжоу ради Хунани, когда остатки его армии были переданы под командование Чэн Цяня. Несмотря на это, он поддерживал контакт с нашими силами, в частности со своим зятем Чэнь Чэном, и пытается использовать эти связи в своей борьбе за пост губернатора.\n\nЕсть четвертый кандидат, хотя он, возможно, не обладает таким же весом, как другие трое, Хэ Цзянь, подчиненный левого Тан Шэнчжи, сделал заявку на пост губернатора. Убежденный антисоциалист, он пытался наладить связи с Кликой Вампу, чтобы получить губернаторство. Непроверенная фигура, он может быть спорным выбором, но он помог бы укрепить позиции Хэ Инциня в правительстве."
 YUN.midgame.581.a: "Выбрать гражданский вариант, Цинь Чжэнь."
 YUN.midgame.581.b: "Умеренный Чэн — правильный выбор."
 YUN.midgame.581.c: "Тань Янькай — популярная фигура, назначить его."
 YUN.midgame.581.e: "Назначить темную лошадку, Хэ Цзяня."

 YUN.midgame.582.t: "Северный Гоминьдан"
 YUN.midgame.582.d: "Пока Национально-революционная армия пересекает Хуанхэ, возможность победы Гоминьдана в Северном походе становится все ближе. Разговоры о том, что Гоминьдан наконец свергнет Бэйян и установит свое собственное видение Республики, вызвали значительные пересуды по всей стране, особенно относительно того, что произойдет дальше?\n\nГоминьдан, несмотря на свои претензии представлять всю страну, является партией, базирующейся в основном на юге. Сунь Ятсен, Ху Ханьминь и Ван Цзинвэй были из Гуандуна, и их сменявшие друг друга правительства базировались в Гуанчжоу. Чан Кайши и Дай Цзитао были из Чжэцзяна, а меньшая подгруппа партии происходит с юго-востока. Многие рядовые члены партии родом с широкого юга, и у партии короткая скамейка кандидатов для руководства северными отделениями партии.\n\nСреди верных членов партии Дин Вэйфэнь и Юй Южэнь являются ведущими фигурами северного Гоминьдана и, таким образом, были вознаграждены местами в ЦИК. Дина Вэйфэня описывали как сдержанного человека немногословных, но очень весомых слов. Он был лидером тайных обществ, таких как Великий альянс, Общество возрождения Китая и Общество практики, действовавших в таких провинциях, как Шаньдун и Хубэй, которые служили фронтовыми организациями Гоминьдана. Юй Южэня описывали как человека оптимизма и искренности, с мощным телосложением и речью, олицетворяющей силу севера, не сдерживаемую возрастом.\n\nНесмотря на тяжелую работу наших товарищей Дина и Юя, ощущается нехватка надежных партийных кадров. Однако нет недостатка в людях, желающих быть лояльными партии, как указали Чжан Цюнь и Ян Юнтай. Они считают, что благодаря своим связям с Бэйяном они могут обеспечить переход многих умеренных республиканских фигур, таких как Хуан Фу, и наконец объединить нацию. Это вызвало гнев сторонников жесткой линии, которые осуждают этих людей как коррумпированных предателей, разбавляющих партию. Они призывают отправить на север проверенных и верных лоялистов, чтобы укрепить и «обучить» новое поколение членов партии."
 YUN.midgame.582.a: "Опремся на связи наших северных товарищей для отбора кандидатов."
 YUN.midgame.582.b: "Единственный путь вперед — объединиться с нашими бэйянскими братьями."
 YUN.midgame.582.c: "Будем держаться тех, кому можем доверять..."

##Section 3d (700-999): Mid Game NPA Political Events

#NPA Introduction Events (700-729):
 YUN.midgame.700.t: "Переворот в Куньмине"
 YUN.midgame.700.d: "Поскольку большинство офицеров, включая многих лоялистов старого режима, понимали, что ход войны безвозвратно повернулся против Юньнани, генералы Лун Юнь и Ху Жоюй смогли устроить государственный переворот и довести войну до неблагоприятного, но принятого конца. Подразделения армии Юньнани под командованием Ху Жоюя на линии фронта взбунтовались и арестовали старших офицеров-лоялистов, Лун Юнь смог захватить Куньмин с помощью сочувствующих в полиции и гарнизоне. Другие регионы пали вскоре после этого, так как другие генералы перешли на сторону заговорщиков.\n\nТан Цзияо номинально все еще является губернатором, поскольку никто из посторонних не признал смены руководства с момента его свержения. Однако он не появлялся на публике в течение некоторого времени, и открытым секретом является то, что он задержан без доступа к внешней связи — урок, который Лун и Ху усвоили на горьком опыте во время его первоначального свержения в 1927 году. Тем временем два генерала борются за добычу.\n\nКатастрофа, которой стала Вторая война Дянь-Гуй, вероятно, знаменует окончательный конец интервенционизма Юньнани, поскольку Юньнань поворачивается внутрь себя. Пока побежденные войска маршируют домой, поджав хвосты, нарастает гнев — некоторые обвиняют своих лидеров в том, что они отправили их в очередную обреченную кампанию, другие обвиняют их в ударе в спину. В Куньмине наблюдается аналогичный всплеск гнева и радикализма как со стороны сторонников, так и противников войны, кризис, который придется решать в ближайшее время. Но лидеры за пределами Юньнани вздыхают с облегчением, поскольку некогда воинственная провинция возвращается в изоляцию."
 YUN.midgame.700.a: "Позорный провал."

 YUN.midgame.701.t: "Генералы Юньнани устраивают переворот в Куньмине"
 YUN.midgame.701.d: "Несмотря на свою браваду и гордое военное наследие, армии Юньнани и Гуйчжоу в конечном итоге не смогли добиться значимого прогресса во время Второй войны Юньнань-Гуанси. Поскольку их наступление застопорилось или было отброшено назад, опасения, что их противники вторгнутся в саму Юньнань, побудили ведущих офицеров армии Юньнани свергнуть собственное правительство и подписать перемирие.\n\nРуководство в Юньнани находится в состоянии потока. Официальные документы продолжают подписываться внешне признанным губернатором Тан Цзияо, но его уже некоторое время не видели на публике. Другие имена, исходящие из Куньмина, — это Лун Юнь и Ху Жоюй, которые, как говорят, борются за превосходство. В любом случае это, вероятно, знаменует конец военных авантюр Юньнани, поскольку горная провинция поворачивается к изоляционизму."
 YUN.midgame.701.a: "Дракон Юньнани спит."

 YUN.midgame.702.t: "Непростое перемирие"
 YUN.midgame.702.d: "Политическая ситуация после переворота хаотична и тревожна, поскольку Юньнань поляризуется на разные лагеря. Среди двух восходящих сильных людей Лун Юнь в целом представляет статус-кво, ухаживая за старыми министрами Тан Цзияо и продвигая идею порядка и стабильности. Он надеется объединить свои обширные военные связи с сетью политического патронажа своего бывшего наставника, чтобы контролировать провинцию и обеспечить плавный переход.\n\nХу Жоюй, с другой стороны, занял реакционную позицию, надеясь радикально встряхнуть правительство и устранить «коррупцию» режима Тана. Хотя он иногда потворствует социалистическим и националистическим настроениям, он в конечном итоге надеется собрать коалицию джентри и торговцев, продвигая демилитаризацию и переговоры с центральным правительством. Он также готов использовать бандитов, иностранную поддержку и даже бывших активистов Гоминьдана, чтобы добиться своего.\n\nНи один из мужчин не имеет абсолютного влияния на джентри, торговцев и другие провинциальные элиты, чья поддержка будет жизненно важна для их окончательного захвата власти. Оба они активно ухаживали за ними через свои конкурирующие послания, но их поддержка остается непостоянной. Хотя наличие более сильной армии жизненно важно, также важна поддержка элиты.\n\nТемная лошадка в эти времена — Лу Хань, один из офицеров Лун Юня и его родственник — их точные отношения неясны, Лу Хань женился на одной из двоюродных сестер Лун Юня, но они были близки до брака, и ходят слухи, что они сводные братья или родственники. Генерал Лу поднялся к известности, держась за фалды Луна, и говорят, что он планирует сделать собственную заявку на власть через популистский угол. Но пока, по крайней мере, назревает схватка между генералом Луном и генералом Ху."
 YUN.midgame.702.a: "Лун Юнь представляет собой упорядоченный переход к изоляции."
 YUN.midgame.702.b: "Ху Жоюй выступает за мир и национальное единство!"

 YUN.midgame.703.t: "Смерть Тан Цзияо"
 YUN.midgame.703.d: "Тан Цзияо умер в своем доме, положив конец неделям спекуляций о его судьбе. Переговоры были напряженными между лагерями Луна и Ху, причем первый предпочитал, чтобы он оставался в заключении, чтобы помешать ему собрать другую армию за пределами провинции и создать видимость стабильности для аутсайдеров, в то время как последний стремился к его изгнанию или казни. Последователи Тана, опасаясь за его ухудшающееся здоровье и безопасность, просили о его безопасном выезде из провинции.\n\nОфициально смерть Тана наступила из-за болезни, но его сторонники широко верят, что он был отравлен. Как бы то ни было, хрупкое перемирие между заговорщиками было нарушено. Ху Жоюй нанес удар первым, окружив дом Лун Юня и разоружив его охрану. Лун был взят живым, хотя и с травмой глаза, и на этом все могло бы закончиться, если бы большинство его генералов не сбежали и не сплотили силы в Чжаотуне. Контратака генерала Лу Ханя, родственника Лун Юня, сорвала попытку Чжан Жуцзи захватить город. Назревает осада, и у сил Лун Юня есть преимущество — за исключением того, что Ху Жоюй поспешил указать, что их лидер остается в заключении в буквальной железной клетке.\n\nТем временем генерал Ван Цзесю предал Ху Жоюя и его клику Мэнцзы. Он и многие лоялисты Тан Цзияо собрались в Дали в попытке восстановить Тан Цзиюя. Присутствие третьей силы в провинции и перспективы гражданской войны заставляют обе стороны сесть за стол переговоров."
 YUN.midgame.703.a: "Армия Лун Юня помогает ему обеспечить выгодные условия для своего освобождения."
 YUN.midgame.703.b: "Контроль Ху Жоюя над железными дорогами дает ему переговорную силу."

 YUN.midgame.704.t: "Восстание Тан Цзиюя"
 YUN.midgame.704.d: "Лун Юнь был освобожден, положив конец конфликту между лагерем Луна и лагерем Ху на данный момент. Но Тан Цзию остается серьезной проблемой, так как ему разрешили вернуться из краткого изгнания на похороны брата. Поскольку первоначальный переворот 1927 года был явно нацелен на десять ближайших лоялистов Тана, включая мэра Чжан Вэйханя из Куньмина, министра иностранных дел и финансов Сюй Чжичэня, управляющего Юньнаньской оловянной компании У Куна и многих высших генералов Тана, включая Тан Цзиюя и Чэнь Вэйгэна, этот, скорее всего, мало чем будет отличаться.\n\nПонимая серьезность ситуации, они сплотились под началом брата Тана Тан Цзиюя в крепости Сунь Ду в Дали. Генерал Тан, надеясь заявить права на старую должность своего брата, стремился быстро двинуться на Куньмин в надежде заручиться поддержкой джентри и объединить разбросанных лоялистов Тана по всей провинции. Распространились слухи, что они даже получили симпатию генерала Лу Ханя, одного из ведущих генералов Лун Юня, для своего заговора — великое предательство, если это правда.\n\nОднако попытка была в значительной степени напрасной. Многие силы Тана — бывшие бандиты, такие как генералы Ван Цзесю и У Сюэсянь, и растаяли при столкновении со своими противниками. Бывшие подразделения охраны его брата в основном пытались перебежать либо к Лун Юню, либо к Ху Жоюю, или просто слишком изолированы, чтобы сделать что-то серьезное. В течение нескольких недель они были вынуждены сдаться или уйти в подполье.\n\nВ то время как Лун решил поглотить ведущих чиновников Тана, судьба его генералов — другое дело. По иронии судьбы, его позиция с Ху Жоюем изменилась: Ху надеется сохранить некоторых из них, таких как Мэн Ювэнь, в отчаянии получить преимущество над Луном, а Лун приказывает казнить или изгнать своих вооруженных противников."
 YUN.midgame.704.a: "Сделать из них пример!"
 YUN.midgame.704.b: "Изгнать Тан Цзиюя, поглотить остальных."

 YUN.midgame.705.t: "Умирающая мечта о демократии"
 YUN.midgame.705.d: "Зарождающееся демократическое движение, которое Тан Цзияо и Чжан Тайянь культивировали в Юньнани в конце 1920-х годов, потерпело серьезные неудачи с падением Тана. Тан был авторитарным человеком, безусловно, но два человека, заменившие его, еще меньше говорят о демократических идеалах, предпочитая закулисные сделки с известными фигурами в провинциальной ассамблее, чем стремление к большему представительству или реформам.\n\nГражданская война после путча Ху Жоюя, какой бы короткой она ни была, послужила дальнейшей демонстрацией бессилия интеллектуалов Юньнани, поскольку они мало что могли сделать, кроме как наблюдать, как два сильных человека обмениваются ударами. Пожилой Чжан Тайянь в основном ушел на покой, а Партия народного правительства Тана превратилась практически в ничто, кроме еще одного имени в учебниках истории Китая. Его сын Тан Сяоин, избранный преемником своего отца на посту председателя, в основном переключил свое внимание на молодежный активизм Партии молодой Китай, служа мелким чиновником у Лун Юня.\n\nДля оставшихся демократов варианты ограничены. Некоторые возвращаются к традиционной высокомерной отчужденности, которую интеллектуалы принимали в эпоху высоких милитаристов, либо покидая провинцию ради более престижной академической работы в более богатых провинциях, либо ограничивая свою активность в провинции. Лун Юнь и Лу Хань сделали ограниченные обращения к группам, таким как Общество полумесяца. Другие, все еще жаждущие политических перемен и прямых действий, обращаются к социализму, превращая свои сельские школы и литературные клубы в подпольные сети радикализма."
 YUN.midgame.705.a: "Мечта не умерла, ей просто нужны корректировки."
 YUN.midgame.705.b: "Нам нужно проснуться и понять, что одних слов недостаточно."

#NPA Narrative Events (730-759):
 YUN.midgame.730.t: "Клика Лун Юня"
 YUN.midgame.730.d: "Рожденный Нацзи Няоти, наполовину хань, наполовину и, внук вождя Тусы взял ханьское имя «Лун Юнь» (Облако Дракона), которое резонирует с его растущими устремлениями. Бывший революционер Тунмэнхоя и командир при Тан Цзияо, Лун захватил власть во имя стабильности, но мечтает о гораздо большем.\n\nКак и Тан до него, Лун стремился укомплектовать правительство теми, кому он может доверять. Его зятья Цзян Иншу, Ли Пэйтянь и Ли Пэйянь входят в его ближний круг, причем братья Ли, в частности, доминируют в провинциальных финансах и бюрократии. Другие родственники, такие как Ань Эньпу и Чжан Банхань, были назначены комиссарами по водному контролю и провинциальной реконструкции соответственно.\n\nЛун стремился поставить членов меньшинства И в правительство, чтобы уравновесить влияние ханьцев. Сдержанный и немногословный Лу Чунжэнь имеет тесные связи с классом джентри и представляет их голос в новом правительстве. Генерал Чжан Чун — еще один этнический И со связями с бандитами, который позже получил работу в Администрации соли Юньнани (соляная габель традиционно была ценным источником дохода, требующим вооруженной охраны).\n\nВозможно, самым заметным бенефициаром нового режима является Лу Хань, друг детства, одноклассник и очевидный родственник Луна, который стал частью «Трех мушкетеров Чжаотуна» вместе с Цзоу Жохэном, когда они были молоды. Этнический И, он окончил Военную академию Юньнани и стал одним из главных военных лейтенантов Луна. Он был вознагражден председательством в Банке Фудянь и должностью директора финансов, но он все больше беспокоится из-за решения Луна примириться с перебежчиками из круга Тана."
 YUN.midgame.730.a: "Лун вознаграждает своих друзей и семью, чтобы укрепить свой контроль."
 YUN.midgame.730.b: "Лун сохраняет старый статус-кво Тана ради стабильности."

 YUN.midgame.731.t: "Клика Мэнцзы"
 YUN.midgame.731.d: "Амбициозный, хитрый и всегда плетущий интриги — Ху Жоюя называли по-разному, но нельзя отрицать его влияние в провинции. Милитарист, действующий в Южной Юньнани, так называемая клика «Мэнцзы» следит за торговыми путями Юньнань-Индокитай и получает немецкую поддержку из Индокитая с 1930-х годов. Будучи идеологически гибким, открытое ухаживание Ху за У Пэйфу сделало их восприимчивыми к влиянию Чжили. Для Ху последний переворот в провинции дает новый шанс расширить свое влияние.\n\nКлика Мэнцзы состоит из военных и джентри, которые полны решимости сохранить свое прибыльное положение. Ли Сюаньтин и Чжан Жуцзи были бывшими комиссарами обороны при Тане, озлобленными тем, что их оттеснили на второй план в 1920-х годах. Ван Вэйюй — бизнесмен из Мэнцзы, который открыл ларек с пирожными и закусками в возрасте 15 лет, прежде чем заняться горнодобывающим бизнесом вместе с Ли Пинем. Рост их шахт вместе с немецкими инвесторами привлек внимание бандитов, и двое сформировали ополчение с шахтерами и владельцами шахт и начали работать с Кликой Мэнцзы, чтобы отбиваться от попыток вымогательства.\n\nНесмотря на прошлые конфликты, они также объединились с некоторыми из оставшихся бандитских групп в регионе. Старые бандитские расцветы Ли Шаоцзуна, Мо Пу, Пу Вэньжуна и Тан Сунлиня — ужасающие имена в 1920-х годах при правлении Тана — теперь в прошлом, большинство из них были как-то поглощены администрацией или функционально являются наемниками. Ван Жувэй — самый могущественный из них, выпускник Военной академии Юньнани и ветеран военной службы со времен Синьхая, который вырезал свою собственную вотчину в Магуане. Мощный, но ненадежный актив, за ним ухаживали Лун Юнь, Чжан Жуцзи и Гоминьдан одинаково — стирая границы между солдатом, бандитом и политиком."
 YUN.midgame.731.a: "Силы реакции в Юньнани сплачиваются вокруг Ху Жоюя."
 YUN.midgame.731.b: "Поток оловянной торговли ставит Ху в сильное положение."

 YUN.midgame.732.t: "Ситуация в Гуйчжоу"
 YUN.midgame.732.d: "Несмотря на хаотичное бегство во Второй войне Юэ-Гуй, у Лун Юня все еще есть стремление сохранить влияние Юньнани на соседний Гуйчжоу. Соседние провинции стали еще ближе, когда Тан Цзияо вмешался в конфликт между конституционалистами и фракциями самоуправления Гуйчжоу. Он продолжал поддерживать изгнанного Лю Сяньши на посту губернатора до смерти последнего в 1927 году, и его семья продолжала действовать из Юньнани, планируя свое возвращение.\n\nНесмотря на недавние неудачи, ни одно центральное правительство не смогло распространить свое влияние на юго-запад, что подбодрило Лун Юня попытаться восстановить доминирование Юньнани над Гуйчжоу. После войны Юэ-Гуй Гуйчжоу правит семья Лю, включая его двоюродного брата Лю Сяньцяня и племянника Лю Гунляна. Их слабые попытки утвердить независимость Гуйчжоу от Куньмина были подорваны безразличием внешних правительств к делам Дянь-Цянь.\n\nОн попытался помочь Чжан Жуцзи и клике Мэнцзы сдержать доминирование Лун Юня, опасаясь способности последнего распространить свою власть из своей базы в близлежащем Чжаотуне. Лун ответил, посеяв раздор между кланом Лю, а также направив поддержку местной элите И Жунцяню. Ни у кого из них нет большой надежды по-настоящему вырваться из орбиты Куньмина, но поскольку две стороны кружат друг вокруг друга с юньнаньским оружием, прокси-конфликт приобрел большее региональное значение."
 YUN.midgame.732.a: "Более могущественная семья Лю отбивается от своего нового соперника."
 YUN.midgame.732.b: "С помощью Лун Юня И Жунцянь побеждает более крупный, но разделенный клан Лю."

 YUN.midgame.733.t: "Старейшины бросают вызов Луну"
 YUN.midgame.733.d: "Тан Цзияо, может быть, ушел навсегда, но остатки старого режима все еще остаются. Несмотря на его ухаживания, усилия Лун Юня по консолидации контроля вызвали сопротивление старой гвардии Юньнани. Провинциальная ассамблея, функционально подчиненная губернатору, является мощным символом легитимности, и клика старейшин во главе с Дин Чжаогуанем, Ван Цзюлином и Ю Юньлуном затормозила повестку дня Луна.\n\nДин Чжаогуань — политик с японским образованием, который служил в финансовом департаменте провинции Сычуань, прежде чем вернуться в Юньнань, чтобы стать директором Колледжа права и политики Юньнани. Юрист по профессии, он был назначен на несколько руководящих должностей в Министерстве юстиции при Тане и был назначен директором по гражданским делам Луном, но с тех пор пригрозил уйти в отставку.\n\nВан Цзюлин также получил образование в Японии и участвовал в Синьхайской революции, прежде чем стать секретарем Тан Цзияо. Позже Тан назначил его директором финансов, прежде чем отправить его на переговоры с правительством Бэйяна, где он стал министром образования при Дуань Цижуе в 1924 году, прежде чем вернуться в Юньнань для работы в соляной комиссии и банке Фудянь. Почетный президент Университета Дунлу, он также занимает должности в различных общественных группах, таких как Буддийская ассоциация провинции Юньнань, Институт китаеведения и Южное общество Яши.\n\nНаконец, Ю Юньлун был основателем газеты Yunnan Daily. Он сыграл ключевую роль в организации Войны в защиту нации и исполнял обязанности губернатора Юньнани, пока Тан отсутствовал. Бывший директор по образованию, а также промышленник, он также был спикером Второго провинциального конгресса Юньнани и недавно был избран председателем Сената.\n\nХотя их в основном считают устаревшими и занимающими престижные, но бессильные должности, поскольку Ху Жоюй постоянно ищет возможности подорвать Луна, быстрое решение проблемы с этими людьми имеет важное значение для выживания Луна."
 YUN.midgame.733.a: "Лун переигрывает старейшин и укрепляет свою позицию."
 YUN.midgame.733.b: "Старейшины смиряют Луна, ослабляя его хватку."

 YUN.midgame.734.t: "Роль современного военного человека"
 YUN.midgame.734.d: "В традиционном китайском обществе карьера военного офицера, как правило, воспринималась уважаемыми семьями с пренебрежением. Конечно, верхушку общества составляли ученые-чиновники, которые довольствовались лишь сложностями поэтического дискурса и бюрократического управления. Конечно, время от времени им, возможно, приходилось вести простой сброд в бой, но это была лишь временная жертва, которую они должны были принести. Солдаты, с другой стороны, не нуждались ни в образовании, ни в изысканности; от них просто ожидалось, что они послужат жертвами для защиты своих лордов и начальников и гарантируют защиту Китая от варваров.\n\nНо с Войной в защиту нации возникла любопытная интеллектуальная страсть к военным. Идея Национальной армии, посвященной поддержке китайского конституционализма и Республики, глубоко отозвалась во многих, особенно в такой провинции, как Юньнань; которая была первой провинцией, отделившейся и объявившей войну защиты против пекинской автократии. Военная служба поощрялась, и призыв часто практиковался; как необходимое зло перед лицом гораздо больших превосходящих военных сил. Однако к тому времени, когда Тан Цзияо восстановил контроль над провинцией, гражданский контроль над армией и милитаристами был восстановлен — поскольку военные лидеры, такие как Тан, утверждали себя как благожелательные правители, а не вечное чувство военного положения.\n\nТеперь, когда Юньнань вступает в еще один бурный период своей истории, остается вопрос. Как долго на самом деле должно длиться правление военных над народом? С одной стороны, руководство военных было бесспорно необходимо во время кризиса, но кризисы утихают, и пока есть время до того, как провинция должна быть полностью мобилизована. Однако присутствие военных обеспечивает сильный сдерживающий фактор для бандитизма и преступного поведения — что, безусловно, высоко ценится в эти трудные времена."
 YUN.midgame.734.a: "Мы используем хорошее железо для гвоздей только в моменты отчаяния."
 YUN.midgame.734.b: "Генералы охраняют нас в эти трудные времена."

 YUN.midgame.735.t: "Лу Хань, недовольный родственник"
 YUN.midgame.735.d: "Лу Хань был рядом с Лун Юнем с детства, вместе изучая боевые искусства в Чжаотуне. После окончания Военной академии Юньнани они вместе служили в армии Юньнани. В какой-то момент они были так близки друг к другу, что даже ходили слухи, что Лу Хань был младшим сводным братом Лун Юня. Однако в последнее время Лу Хань в частном порядке выражал свое недовольство направлением режима Луна. Множество потенциальных проблем иллюстрируют причину разрыва Лу с Луном, но в своей основе, похоже, кадровые решения губернатора Луна как в министерстве, так и в армии, по-видимому, благоприятствовали многим бывшим лоялистам Тана.\n\nСуть этой проблемы заключается в недавнем назначении Чжан Вэйханя. Политик при режиме Тана, Вэйхань был бывшим начальником отдела общих дел Административного управления провинции и мэром Куньмина. После переворота Лун просто сохранил Вэйханя на его руководящей должности, и Вэйхань и Лу Хань никогда ни в чем не могли согласиться.\n\nВ то время как большинство бывшего лагеря Тана, которому было разрешено проживать в провинции, встало на сторону Лун Юня, есть те, кого можно склонить при достаточной убедительности. Сунь Ду — выпускник Армейской академии Юньнани и очень долго служил под началом Тана. Назначенный директором Бюро монополии на табак и алкоголь Юньнани, он оставался верен Тану до самого конца. Известный как Конфуцианский генерал и «Маленький Чжугэ» за свою храбрость, он ищет сильной достойной инициативы и лидерства; которые предлагает Лу Хань и который может стать потенциальным союзником в любом движении против Лун Юня."
 YUN.midgame.735.a: "Лун Юнь находит способы успокоить своего заблуждающегося родственника."
 YUN.midgame.735.b: "Лу Хань начинает подрывать клику Луна изнутри."

 YUN.midgame.736.t: "Лояльность и компетентность"
 YUN.midgame.736.d: "Юньнань уже некоторое время пытается предотвратить банкротство. Казна годами находилась под напряжением из-за дорогих военных авантюр, хронического плохого управления сверхамбициозными проектами, чрезмерной зависимости от опиума и повальной коррупции. Переворот, возможно, спас Юньнань от полного подчинения другим южным провинциям, но на данный момент экономика по сути нефункциональна.\n\nПредотвращение полного финансового краха поручено Мяо Юнтаю (также известному как Мяо Цзяньмин), который является одним из немногих провинциальных бизнесменов с американским образованием. Успешный руководитель оловянной промышленности, он был назначен Луном соуправляющим банком Фудянь, а также курировать экономическую реконструкцию в провинции. Его амбициозные планы включают переход от экономики, основанной преимущественно на опиуме (цены на который рухнули из-за того, что практически у всех милитаристов была одна и та же идея, перенасытившая рынок), в пользу экономики, основанной на олове и индустриализации.\n\nМяо доказал свою ценность снова и снова, настоящий финансовый гений. Но хотя Лун ценит его услуги, к сожалению, усилия Мяо и других успешных технократов были затруднены многими другими назначениями Луна. Тан Хунътао, один из бывших секретарей Луна, в частности, привлек скандал из-за своего плохого управления Юньнаньской оловянной компанией. Несмотря на свое инженерное образование, он оказался ужасно некомпетентным, небрежным и, возможно, просто ленивым.\n\nОжидается, что столкновение между назначенцами Луна по патронажу, которые жизненно важны для взятия экономики под его контроль, и назначенцами-технократами Луна, которые жизненно важны для приведения экономики в порядок, продолжит разыгрываться, пока инвесторы взвешивают свои варианты."
 YUN.midgame.736.a: "Мы должны доверять Мяо Юнтаю и другим экспертам!"
 YUN.midgame.736.b: "Доверие на первом месте, результаты придут со временем."

 YUN.midgame.737.t: "Размышления о 1915 годе"
 YUN.midgame.737.d: "Что такое Война в защиту нации? Социалисты, такие как Го Можо, утверждают, что это был милитаристский конфликт между милитаристами, хотя даже они расходятся во мнениях относительно роли масс, Прогрессивной партии и Гоминьдана. Другие историки утверждают, что революционный Гоминьдан Суня сыграл важную роль и что сами массы искали освобождения во время войны. В Юньнани Тан Цзияо поддерживал Лян Цичао и его прогрессистов во время войны, но сопротивлялся требованиям Суня о революции.\n\nДействительно, Война в защиту нации отражала, но также не смогла решить текущий националистический вопрос в Китае. Среди джентри и торговцев Юньнани в районах добычи полезных ископаемых Мэнцзы национализм означал стать равноправным партнером иностранцев и устранить торговый дисбаланс. Программа так называемого «реформистского национализма» стремилась создать местное индустриальное государство с помощью иностранцев, а не без них. Действительно, инвестиции Германии в Юньнань привели к развитию новых фабрик и заводов с их помощью. С другой стороны, революционная сторона провинции (особенно частные торговцы и купцы, которые значительно пострадали от доминирования внешней торговли) хотела, чтобы Китай избавился от иностранцев и империалистов раз и навсегда. Эти националисты рассматривают иностранное влияние как всепроникающее и доминирующее и считают, что если Китай хочет быть свободным, он должен быть свободен от империалистов навсегда.\n\nИ, наконец, для некоторых Война в защиту нации была в конечном итоге войной за сохранение конституции и развивающегося семени китайской демократии. После войны Тан Цзияо пытался провести демократические реформы в провинции, но результаты этих реформ еще предстоит реализовать. Разочарованный крахом сотрудничества между Севером и Югом, манифест Тана после окончания войны стремился заложить основы будущей демократии — с ограниченным успехом. Переоценивая войну, возможно, это был первый шаг к построению демократического Китая."
 YUN.midgame.737.a: "Война в защиту нации была борьбой за национальное освобождение!"
 YUN.midgame.737.b: "Хунта защиты нации защитила автономию Юньнани!"
 YUN.midgame.737.c: "Эра защиты нации была строительным блоком демократии."

 YUN.midgame.738.t: "Надежды социалистов угасают в Юньнани"
 YUN.midgame.738.d: "В Юньнани 75% крестьян владеют большей частью или всей своей землей, но обычно они владеют менее 5 му, что делало их владение практически бесполезным перед лицом налогов и поборов. Движимые духом прогресса, демократические реформаторы, такие как Цунь Шушэн и Су Хунган, активно работали в сельской местности, предоставляя сельское образование (с разной степенью поддержки со стороны провинциального правительства) и стремясь улучшить положение крестьян.\n\nНо ограниченность этих реформ подтолкнула многих других к отчаянному радикализму. Однако, в отличие от Миньгани, где социалисты смогли заручиться поддержкой крестьянства и бандитов, их юньнаньские коллеги не смогли добиться значимого классового сотрудничества. Когда их движение начало терпеть неудачу, они искали шатких союзов с местными магистратами.\n\nПровинциальный агитатор Ван Дэсань и его Новое общество Юньнани попытались спровоцировать восстание в уезде Люлян на фоне конфликтов между джентри и магистратами Куньмина. Поклявшись проникнуть в «социальные отношения, лежащие в основе видимости» между арендаторами, богатыми крестьянами, джентри и племенами меньшинств, Ван искал поддержки местных магистратов, стремящихся сдержать ополчения джентри, недовольных армейских офицеров и бандитов (которые часто являются популистами, если не идеологическими), различных сельских школ и учителей (в уезде Люлян непропорционально большое количество студентов) и соплеменников, недовольных недавними попытками их разоружения.\n\nНо хотя магистраты и джентри ненавидят друг друга, они боятся социалистов больше — отложив свои разногласия, чтобы подавить восстание. По мере того как надежды Красных угасают, Лун Юнь поручил магистратам выйти и работать с такими людьми, как Цунь, чтобы способствовать мирным отношениям с крестьянами, но при этом жестко расправляться с главарями повстанцев. Но насильственные восстания дали Ху возможность ухаживать за напуганными джентри, многие из которых обвиняют Луна в том, что он вообще позволил левым лазутчикам проникнуть в их деревни."
 YUN.midgame.738.a: "Крестьянские восстания убеждают джентри, что только Ху Жоюй может защитить их."
 YUN.midgame.738.b: "Магистраты и учителя Луна помогают привести сельскую местность к покорности."

 YUN.midgame.739.t: "Юньнань и центральное правительство"
 YUN.midgame.739.d: "Защищенная горами на далеком юго-западе Китая и являющаяся домом для плавильного котла культур, изоляция Юньнани создала сложную историю отношений с центральной властью. После кровавого восстания 1800-х годов сепаратизм был подавлен. Но местные жители боялись европейского империализма и возмущались неспособностью центрального правительства охранять их границы — часто беря дело в свои руки.\n\nНесмотря на то, что лидеры Юньнани часто сами были повстанцами, они часто говорили о необходимости сильного центрального правительства. Практически все позиции Цай Э вращались вокруг этого принципа, настаивая на том, чтобы Пекин оставался столицей, чтобы помочь сохранить влияние Китая в Маньчжурии и Монголии. Он также заявил, что Китай не подходит для федерализма — вместо этого предлагая упразднить провинции как единицу управления. Сама Юньнань могла управляться четырьмя округами со старшими чиновниками, назначаемыми непосредственно из Пекина.\n\nЦай возмущался упорством законодательного органа Тунмэнхоя по отношению к президенту Юаню и считал, что коррупции можно избежать, если президенты смогут оставаться беспристрастными в своих назначениях, а не полагаться на партийную политику. Ценя национальное единство и силу выше идеологии, он пророчески предупреждал, что партии будут стремиться каждая создать армию вокруг себя, а местные деспоты вырежут свои собственные владения в провинциях.\n\nЕго преемник Тан Цзияо также поддерживал сильное национальное правительство, но принял федерализм для разрешения противоречий, вызванных Войной в защиту нации Цая. Он разделил Юньнань на четыре комиссии обороны, но также перешел к гражданскому контролю над военными в своем более позднем правлении. При правлении Луна вернулось чувство регионализма, и хотя они все еще стремятся к национальному единству, они настаивают на равных условиях и самоуправлении."
 YUN.midgame.739.a: "Китаю нужно сильное правительство, но оно также должно быть ответственным."
 YUN.midgame.739.b: "Мы должны тщательно охранять наши собственные интересы, пока оно не появится."

#NPA Party Popularity Ladder Events (760-789):
 YUN.midgame.760.t: "Су Хунган, просветитель масс"
 YUN.midgame.760.d: "В то время как Юньнань традиционно принимала ряд либеральных элементов после Шанхайского восстания 1932 года и последующего жестокого подавления силами Чжили, Провинциальный комитет Демократической лиги Китая в Юньнани, безусловно, вносит свой весомый вклад в стол антипекинских интеллектуалов. Су Хунган, один из ведущих голосов Провинциальной CDL, родился в 1878 году в семье среднего достатка в окрестностях деревни Куньмин.\n\nХотя его семья не была особенно богатой, отец Су часто помогал бедным жителям деревни, благородный поступок, который вдохновил Су Хунгана в детстве. Повзрослев, Су начал образовательную карьеру, оставшись в своей родной деревне, чтобы преподавать после смерти отца. Су был очарован революционной политикой Тунмэнхоя в 1903 году и посвятил себя использованию образования для спасения нации после того, как республиканцы свергли дряхлую монархию Цин. В 20-х годах Су работал над созданием частной школы, которая в конечном итоге стала одной из самых известных средних школ в Юньнани.\n\nПосле подавления Лиги в 1932 году Су Хунган приветствовал бегущих интеллектуалов и вместе сотрудничал в создании Юго-Западного объединенного университета, который стал рассадником прогрессивной политики. Хотя администрация [ROOT.GetLeader] не всегда особенно любила новые идеалистические прогрессивные элементы, она сочла целесообразным поддерживать дружеские отношения с Су и его коллегами в Юго-Западном университете."
 YUN.midgame.760.a: "Су Хунган и CDL действительно делают честь народу."
 YUN.midgame.760.b: "Смелый мечтатель, к которому прислушивается администрация."

 YUN.midgame.761.t: "Дуэль за поддержку молодежи"
 YUN.midgame.761.d: "Часто говорят, что класс интеллектуалов предпочитал оставаться в своих башнях из слоновой кости обучения и не доверять интеллектуальным способностям масс, но это, безусловно, не распространяется на китайскую молодежь в академических кругах. Рассматриваемые как критическое поле битвы в войне идей, различные интеллектуальные политические группы часто проповедуют различным студенческим органам в надежде привлечь молодые умы в свои политические организации. Юньнаньское отделение Демократической лиги Китая ничем не отличается от остальных в этом отношении и запустило обширную образовательную кампанию для привлечения сторонников в различных университетах, члены которой выступают в качестве преподавателей.\n\nВ центре всего этого, конечно же, находится Юго-Западный объединенный университет, который служит центром не только Провинциального отделения Демократической лиги Китая, но и Общества полумесяца. Вербовка из студенческих масс стала еще более важной, так как на Северных равнинах именно националистическая и воинствующая Партия молодой Китай доминировала в наборе студентов, став массовой партией, соперничающей с Гоминьданом благодаря своей впечатляющей кампании по набору. Хотя прогрессивные интеллектуальные лагеря юга существенно отличаются по политическим взглядам, они приняли к сведению их подход к политике и пытаются сами стать массовыми интеллектуальными движениями."
 YUN.midgame.761.a: "CDL будет в авангарде Свободного Китая!"
 YUN.midgame.761.b: "Союзники в борьбе за Свободный Китай."

 YUN.midgame.764.t: "Мяо Юнтай, чудотворец"
 YUN.midgame.764.d: "Возможно, страдая больше, чем любая другая провинция, Юньнань прошла через огромные трудности на протяжении Века унижения. Возможно, это были условия, которые привели к росту Торговой палаты Юньнани, возглавляемой Мяо Цзяньмином. Хотя реформы наместника Ли Цзинси были заблокированы силами джентри, при администрации [ROOT.GetLeader] YCC, похоже, возглавила элементы реформ в провинции Юньнань. Мяо Цзяньмин родился в видной семье джентри Юньнани в 90-х годах и изучал инженерное дело в Соединенных Штатах. После короткой карьеры в Америке он вернулся домой в октябре 1919 года.\n\nГубернатор Тан Цзияо быстро заметил молодого инженера и назначил его главой Оловянной компании Гэцзю. Когда он возглавил компанию, она несла финансовые убытки, но Мяо смог вытащить Олово Гэцзю из финансовой ямы и модернизировал ее с помощью западных технологий, восстановив ее статус уважаемой корпорации. К 1924 году Мяо дослужился до главы Банка Фудянь, который на практике был центральным банком Юньнани. Серьезные заимствования Тан Цзияо у банка привели к высокой инфляции, роспуску Банка Фудянь и краху валюты в целом.\n\nВ 1932 году Мяо Юнтай в качестве президента Нового банка Фудянь смог использовать систему, включающую резервные пол-краевых долларов и Новые банкноты Юньнани, чтобы изъять старые банкноты Банка Фудянь из обращения и восстановить финансовое состояние провинции Юньнань. Восстановив финансы Тана, Мяо стал генеральным менеджером самой Юньнаньской оловянной рафинировочной компании и сломал традиционную экономическую зависимость Юньнани от опиума в пользу добычи олова и существенно ограничил экономическое влияние Германии через железную дорогу Куньмин-Хайфон. Сегодня Мяо Цзяньмин сохраняет значительный контроль над экономическими органами Юньнани в качестве главы Торговой палаты Юньнани, и народ Юньнани благодарен за его работу."
 YUN.midgame.764.a: "Его проницательное управление наполнило нашу казну."
 YUN.midgame.764.b: "Его умелые руки укрепили наш режим."

 YUN.midgame.765.t: "Казна Палаты"
 YUN.midgame.765.d: "Помимо впечатляющего резюме Мяо Юнтая, Торговая палата Юньнани сыграла неотъемлемую роль в развитии экономической модернизации и реформаторского движения Юньнани. До времен Мяо Цзяньмина хрупкой экономикой Юньнани управлял Чэнь Цзюнь. Изучив политику в Японии, Чэнь занял должность помощника управляющего Банка Фудянь в 1912 году, через год после смещения Ли Цзинси в Куньмине и установления республиканского правления. Цай Э заметил его административные таланты и привлек его в качестве директора внутренних дел в Юньнани.\n\nОттуда Тан Цзияо поручил ему разработку железной дороги Гэбиши, которая стала первой частной железной дорогой Китая. К 20-м годам Чэнь возглавил Горнодобывающую компанию Гэцзю и переехал в Мэнцзы, чтобы контролировать операции, и скончался в 1931 году. Развитию олова в Юньнани также способствовал У Кун, который возглавил Горнодобывающую компанию Юньнани при администрации Тана. Торговая палата Юньнани, укрепив свой контроль над оловодобывающей промышленностью Юньнани, сделала большой упор на то, чтобы экономика Юньнани перешла от традиционного выращивания опийного мака к экспорту природных ресурсов.\n\nС этой целью Палата, как правило, брала на себя вспомогательную роль в повестке дня Тана, помогая его попытке разделить гражданские и военные организации. В то время как студенты, как правило, возглавляли протесты против японского влияния в Китае по всей стране, в Юньнани именно Торговая палата инициировала такие мероприятия, а студенты присоединялись позже. Хотя Торговая палата не заинтересована в самоуправлении, она продолжает оказывать влияние на политику Юньнани, призывая провинцию придерживаться консервативной демократизации под руководством джентри и антиимпериализма."
 YUN.midgame.765.a: "Мы хвалим их конституционный взгляд."
 YUN.midgame.765.b: "Редко встретишь таких уважаемых антиимпериалистов."

#NPA External Influence Events (790-819):
 YUN.midgame.790.t: "[FROM.GetAdjective] помощь и похвала"
 YUN.midgame.790.d: "Юньнань — одна из беднейших провинций на юго-западе, наряду с соседней провинцией Гуйчжоу. Расположенная дальше всего от столицы и заполненная преимущественно горами и холмами, неудивительно, что Юньнань в значительной степени игнорируется центральными властями, когда дело доходит до управления и экономического развития.\n\nХотя это хорошо для того, чтобы позволить Юньнани оставаться политически автономной от прихотей Пекина, неразвитость со стороны Центрального правительства оставила Куньмин делать большую часть работы по модернизации, особенно после Синьхайской революции и Войны в защиту конституции.\n\nОднако недавно [FROM.GetNameDef] решил покончить с этой экономической несправедливостью и предложил отправить финансовую помощь Юньнани для дальнейшего развития местной экономики и выведения провинции на уровень Восточных провинций. Наряду с этим предложением [FROM.Capital.GetCapitalVictoryPointName] также направил похвалы генералу Лун Юню и, что удивительно, генералу Ху Жоюю в Мэнцзы.\n\nХотя большинство приветствует этот акт щедрости со стороны [FROM.GetAdjective] руководства, генерал Лун относится к нему с подозрением. Эта помощь может быть хорошей вещью, но предложение от [FROM.Capital.GetCapitalVictoryPointName] кажется слишком хорошим, чтобы быть правдой, и тем более, чтобы оно поступило без каких-либо условий."
 YUN.midgame.790.a: "Как мило с их стороны."
 YUN.midgame.790.b: "Спасибо, но нет."

 YUN.midgame.791.t: "Сообщения о подкупе [FROM.GetAdjective] агентами"
 YUN.midgame.791.d: "Методы вербовки в Китае отличаются от других стран, имеющих профессиональные армии, из-за фракционного характера армии, когда многие местные милитаристы формируют свои личные армии. От уличной вербовки, принудительного призыва и даже вербовки через семейные связи местные армии часто подпитываются отсутствием альтернативной занятости и страдают от коррупции.\n\nДезертирство является обычным явлением среди солдат, будь то из-за самосохранения, недовольства личными проблемами или подкупа, что делает местные провинциальные армии склонными к распаду, когда начинают появляться трещины. Таким образом, высокая готовность в Куньмине как реакция на сообщения о подкупе в армии, предложенном [FROM.Adjective] агентами, естественна.\n\nВозможно, являясь частью более широкого заговора с целью расширения их влияния в Юньнани и выдвижения Ху Жоюя в качестве предпочтительного кандидата на пост губернатора Юньнани, это обернется катастрофой для генерала Лун Юня, если между Куньмином и Мэнцзы возникнут внутренние конфликты.\n\nЧтобы противостоять этой гнили в армии, была предложена всеобъемлющая чистка армии для удаления скомпрометированных элементов. Хотя это может повлиять на боевые возможности армии Юньнани в краткосрочной перспективе, лояльность является наиболее важной чертой среди прочих, учитывая хаос, который Китаю пришлось пережить в последние десятилетия."
 YUN.midgame.791.a: "Признаки дезертирства наводняют армию Юньнани."
 YUN.midgame.791.b: "Генерал Лун проводит тщательную чистку в армии."

 YUN.midgame.792.t: "Военные угрозы от [FROM.GetNameDef]"
 YUN.midgame.792.d: "Существует много способов достижения политических целей, будь то война или дипломатия. Когда дипломатия недостижима, многие неохотно прибегают к войне для достижения своих целей. Но с учетом высокой цены, которую это влечет за собой, некоторые прибегают к военным угрозам как к возобновлению дипломатии другими средствами. Для [FROM.GetNameDef], похоже, это так, поскольку телеграмма была отправлена в Куньмин из [FROM.Capital.GetCapitalVictoryPointName], предупреждая об использовании военных средств, если их требования не будут выполнены.\n\nСреди прочего, они требуют, чтобы мы привлекли несколько человек в нашу администрацию. Неудивительно, что многие из перечисленных лиц, по-видимому, являются лоялистами и последователями, связанными с Ху Жоюем. Хотя это может быть случайностью, ясно, что [FROM.GetNameDef] предпочитает его в качестве губернатора Юньнани вместо генерала Лун Юня.\n\nНесмотря на военную угрозу, многие в Юньнани уверены, что иностранное вторжение [FROM.Capital.GetCapitalVictoryPointName] будет легко отражено, поскольку горная местность провинции дает явное оборонительное преимущество. Тем не менее, общественность, похоже, разочаровалась в войне в целом, поскольку поражение Юньнани во Второй войне Дянь-Гуй все еще свежо в памяти многих.\n\nДля генерала Луна внутренняя борьба между ним и Мэнцзы продолжается. Хотя пока ничего не произошло, ясно, что автономия Юньнани, а также его личная власть будут поставлены на карту, если он поклонится требованиям [FROM.Capital.GetCapitalVictoryPointName]. В то же время нельзя отрицать, что сохранение мира гораздо более желательно, чем возможная затяжная война."
 YUN.midgame.792.a: "Пораженчество распространяется перед лицом подавляющей силы."
 YUN.midgame.792.b: "Настроения в Юньнани остаются невозмутимыми перед вопиющим блефом."

 YUN.midgame.793.t: "[FROM.GetAdjective] сделки с Мэнцзы"
 YUN.midgame.793.d: "Вторая война Дянь-Гуй стала катастрофой не только для амбиций губернатора Тан Цзияо по экспансионизму, но и для внутренней стабильности Юньнани. Когда губернатор Тан впал в немилость, генерал Лун Юнь и генерал Ху Жоюй стали новыми центрами власти в Юньнани, причем генерал Лун удерживал столицу провинции Куньмин, а генерал Ху оставался в своей базе власти Мэнцзы, плетя заговоры со своими союзниками.\n\nНесмотря на то, что он не стал новым гегемоном Юньнани, генерал Ху по-прежнему держится за прибыльные южные шахты Мэнцзы, экспортируя полезные ископаемые в порты Индокитая и зарабатывая на этом огромные богатства. Таким образом, экономика Юньнани в значительной степени обязана влиянию Клики Мэнцзы и их покровителей, среди которых Клика Чжили.\n\nВыяснилось, что [FROM.GetNameDef] заключает сделки напрямую с Мэнцзы, а не с Куньмином, субсидируя продолжающуюся эксплуатацию шахт без того, чтобы мы увидели хоть одну монету. Помимо вопиющего нарушения автономии Юньнани, эта сделка служит лишь дальнейшему усилению влияния генерала Ху Жоюя в провинции.\n\nЧтобы сохранить лицо и упрекнуть очевидное вмешательство [FROM.GetAdjective], мы мало что можем сделать, кроме как отправить простую телеграмму, выражающую наше разочарование в [FROM.Capital.GetCapitalVictoryPointName], хотя некоторые предположили, что закрыть глаза может быть лучшим курсом действий, чтобы спасти себя от дальнейшего политического позора."
 YUN.midgame.793.a: "Они могут заключать сделки с кем хотят."
 YUN.midgame.793.b: "Куньмин — место администрации, а не Мэнцзы!"

 YUN.midgame.794.t: "[FROM.GetNameDefCap] прощупывает почву для мира"
 YUN.midgame.794.d: "Национальное объединение было целью многих с тех пор, как Китай раскололся со смертью Юань Шикая. Будь то путем переговоров или силовыми методами, все усилия не увенчались успехом по множеству причин. С крахом Лиги восьми провинций, когда маршал Сунь Чуаньфан был застрелен, а Ци Сеюань занял пост маршала Лиги, иллюзия китайского единства под господством Чжили была разрушена.\n\nВ Южном Китае Юньнань была единственной провинцией, не опустошенной войной и внутренними распрями, оттачивая свою силу для захвата провинции Гуйчжоу у одного из последних оплотов Гоминьдана, все еще оставшихся. Однако губернатор Тан Цзияо почти перечеркнул десятилетнее терпение, вторгшись в провинции-близнецы Лянгуан, присматриваясь к городу Гуанчжоу. Ради спасения Юньнани Лун Юнь и Ху Жоюй задержали губернатора Тана и направили провинцию к изоляционизму.\n\nВоспользовавшись новым дипломатическим поворотом Юньнани, [FROM.Capital.GetCapitalVictoryPointName] отправил мирные предложения в Куньмин, чтобы обсудить возможность воссоединения между Севером и Югом. Хотя национальное объединение довольно популярно в провинции, многие скептически относятся к тому, искренне ли это или просто уловка для укрепления [FROM.GetAdjective] влияния в Юньнани.\n\nДля генерала Лун Юня Клика Юньнани не может позволить себе иностранное вмешательство, чтобы не поставить под угрозу автономию Юньнани и не втянуть провинцию в войны, к которым она не имеет отношения. В то же время отказ от простого мирного предложения, направленного на продвижение дела национального объединения, рискует сделать администрацию Куньмина непопулярной среди народа."
 YUN.midgame.794.a: "Генерал Лун соглашается ради сохранения мира."
 YUN.midgame.794.b: "Генерал Лун отвергает эту очевидную попытку подчинения."

 YUN.midgame.795.t: "Юньнань срывает наши усилия"
 YUN.midgame.795.d: "Несмотря на значительные инвестиции в наши усилия по расширению нашего влияния в Юньнани, генерал Лун Юнь разгадал нашу схему и пресек ее. Тем не менее, наша интрига стоила генералу Луну драгоценных ресурсов, которые можно было бы потратить с большей пользой в другом месте. На данный момент Ху Жоюй и остальная часть его Клики Мэнцзы должны оставаться на месте и быть сами по себе, пока мы не оправимся от этой неудачи."
 YUN.midgame.795.a: "Мы выждем время."

 YUN.midgame.796.t: "[FROM.GetNameDefCap] давит на нас, требуя присягнуть на верность"
 YUN.midgame.796.d: "На протяжении большей части недавней истории Юньнани провинция редко подвергалась вторжению внешних сил, вместо этого вторгаясь в соседние провинции Гуйчжоу, Гуанси и даже Сычуань в рамках экспортного милитаризма губернатора Тан Цзияо, стремясь расширить влияние Юньнани на юго-западе. Неизбежно этот безрассудный экспансионизм достиг апогея, когда Юньнань не смогла вторгнуться в Лянгуан во время Второй войны Дянь-Гуй, заставив Клику Юньнани отступить обратно в изоляционизм, поскольку губернатор Тан был свергнут генералом Лун Юнем и генералом Ху Жоюем.\n\nТеперь, по иронии судьбы, Юньнань сталкивается с ультиматумом подчиниться внешней силе, стремящейся подчинить провинцию и уменьшить ее заветную автономию. Возможно, уверенный в своей способности подчинить юго-запад, [FROM.Capital.GetCapitalVictoryPointName] потребовал от генерала Луна принести клятву верности [FROM.GetNameDef] или рискнуть навлечь на себя его гнев.\n\nГенерал Лун хотел сохранить автономию Юньнани через неприсоединение и сосредоточить внимание провинции внутрь, а не расширять свое влияние. Однако, когда на горизонте война, рисковать своими людьми в другой кровопролитной войне, которая может привести к уничтожению Клики Юньнани, совсем не привлекательно."
 YUN.midgame.796.a: "Генерал Лун мобилизуется для защиты автономии Юньнани!"
 YUN.midgame.796.b: "Генерал Лун неохотно капитулирует перед [FROM.Capital.GetCapitalVictoryPointName]."

 YUN.midgame.797.t: "Юньнань стоит дерзко!"
 YUN.midgame.797.d: "Юньнань была первой провинцией, бросившей вызов восстановлению монархической системы Юань Шикаем еще во время Войны в защиту нации, когда губернатор Цай Э бежал из Пекина и вернулся в Юньнань, чтобы возглавить провинцию против всего мира. Благодаря чистому чуду Юньнань победила, когда другие провинции восстали против Пекина, укрепив свою репутацию «демократической крепости» против тирании Бэйяна.\n\nС тех пор Юньнань приняла смесь экспансионистского милитаризма и изоляционизма при сменявших друг друга губернаторах, с генералом Лун Юнем в качестве ее нынешнего гегемона. Прежде всего провинция ценит свою автономию от Центрального правительства. Несмотря на наши усилия поглотить юго-запад в нашу сферу, Куньмин остался непокорным.\n\nПоскольку плато Юньгуй действует как естественная защита от иностранного вторжения, может быть разумно оставить администрацию Куньмина в покое, учитывая военное преимущество, которым обладает армия Юньнани на своей территории. В то же время у нас может не быть другой возможности вернуть мятежную провинцию в строй, если мы оставим Куньмин на произвол судьбы."
 YUN.midgame.797.a: "Пришло время раз и навсегда проучить эту мятежную провинцию."
 YUN.midgame.797.b: "Пусть сохраняют свою автономию, мы выждем время."

###- Phase IV Events -###

##Military Events
 YUN.lategame.000.t: "Конфуцианские военные герои"
 YUN.lategame.000.d: "Нация, долгое время омраченная эпохами конфликтов, за которыми следовали эпохи мира, в общекитайском мышлении считает, что гражданские и военные функции (Вэнь и У), очевидно, предназначались для дополнения друг друга — неравные, но не противоположные. В тысячелетней истории китайских династий мир и единство неоднократно прерывались жестокими периодами беспорядков и разделения. В эти последние периоды военный опыт ценился превыше всего. Поэтому для молодого Тан Цзияо превозносить роль военачальника или героя было всего лишь модификацией, а не отрицанием преобладающих традиционных конфуцианских взглядов общества. Написав о таком мышлении в Шикан Гакко во время учебы, Тан начал:\n\n«Мудрец — это тот, кто появляется, когда мир следует Дао, и удаляется, когда нет. Герой — это тот, кто удаляется, когда мир следует Дао, и появляется, когда нет». Поскольку 19-й и 20-й века были периодами великих потрясений и кризисов, это, безусловно, время героев; нет сомнений, что китайский мир не «следует Дао». Продолжая в юношеских писаниях Тана: «Сегодня возрождение внутренних дел — важная задача Китая, но обычные люди не способны на это. Поэтому получить ученого, который искусен и энергичен, не так хорошо, как получить героя, который является смелым стратегом».\n\nС появлением его вышеупомянутых писаний для общественности, для китайского культурного духа стало очевидно, что сам Тан Цзияо воображает себя «героем», необходимым для возрождения китайской нации. Перехватив инициативу с вниманием к его недавним писаниям, Тан и его высшее командование использовали это настроение, чтобы мобилизовать людей для службы в Новой армии защиты нации (Хугоцзюнь), утверждая, что милитаризм — это не продукт безродных людей, оторванных от традиции, а просто то, что давние культурные традиции требуют от людей взять на себя мантию героя, как это сделал Тан. Однако возникли критики позиции Тана, намекающие, что такие люди, как Тан, являются причиной погружения Китая во тьму и эры милитаристов в целом."
 YUN.lategame.000.a: "Только военные могут видеть спасение Китая!"
 YUN.lategame.000.b: "Милитаризм — точная причина нашего нынешнего затруднительного положения!"

 YUN.lategame.001.t: "Китайский дух воина"
 YUN.lategame.001.d: "Считающийся прародителем современного государства Юньнань и нынешнего поколения его руководства, Цай Э, несомненно, оставил конкретный отпечаток на провинции и нации. Будучи «Отцом Хугоцзюнь», труды Цай Э получили новый виток популярности в философских дискуссиях. Наиболее интригующими являются его юношеские работы. Сотрудничая со своим лучшим другом, Цай и Цзян Байли написали две статьи для журнала Лян Цичао «Синьминь Цунбао»: «Милитаристский народ-государство» и «Воспитание милитаристского народа-государства» соответственно. Считающиеся первым введением военного национализма, экспортированного из Японии и Германии, в китайскую политическую сферу, обе статьи подробно описывают и защищают внедрение всеобщей военной подготовки для граждан Китая.\n\nВ частности, в статье Цай Э он оплакивает современный «женоподобный дух» Китая и острую необходимость развития Китаем собственного боевого духа. Прослеживая отсутствие милитаристского духа в китайском образовании, Цай также возлагает вину на китайскую философию, литературу, обычаи и музыку. Что в отличие от их соседа Японии, энергия молодежи Китая тратится впустую на «бесполезные формальности и витиеватые фразы», в то время как японцев воспитывали в духе лояльности, патриотизма и воинских качеств. Покорный и лишенный темперамента воина, неудивительно, что Китай постоянно преклонялся перед иностранными империалистическими державами.\n\nВ мире Цай Э, где выживают только сильные, он боялся, что Китай будет задушен иностранными державами, если не сможет собрать достаточно сил, как умственных, так и физических, выковывая новый национальный дух, способный адаптироваться к мировым тенденциям. В то время как труды Цай Э о социал-дарвинизме являются основой нового военного истеблишмента [ROOT.GetLeader] наряду с самой природой Куньмина, среди гражданского населения страны возникло сильное беспокойство. Возникают опасения, что дальнейшее прославление военных неизбежно приведет к бесцельной стратократии."
 YUN.lategame.001.a: "Наш собственный Бусидо!"
 YUN.lategame.001.b: "Следовало бы с осторожностью относиться к несгибаемым военным."

 YUN.lategame.002.t: "Наше общее национальное государство"
 YUN.lategame.002.d: "В наследии Хугоцзюнь нет ничего важнее критического момента основания, когда храбрые солдаты армий Цай Э, Тан Цзияо и Ли Лецзюня бросили вызов монархическим амбициям деспота Юань Шикая. Его убеждение в том, что военные несут ответственность за благополучие нации, постоянно повторялось на протяжении всего существования клики Юньнань, однако сверкающим моментом остается одно из обращений Цая к его солдатам накануне войны в защиту нации. Утверждая, что избранный президент Китайской Республики должен был создать «общее национальное государство», в котором каждый взял бы на себя соответствующую ответственность за государство-нацию — тем самым обеспечив его выживание — он осудил Юаня за то, что тот сделал прямо противоположное: сразу после своего избрания Юань предположительно начал подрывать политические институты Республики и злоупотреблять своими полномочиями в личных целях, тем самым разрушая национальное единство.\n\nХуже того, Юань притворился, что прислушивается к воле народа, провозглашая свою монархию Хунсянь. По этим причинам Цай подчеркнул: «Эта армия не может вынести мысли о том, что наше национальное государство находится на грани уничтожения. Поэтому я призываю военные круги в других провинциях, а также людей высоких идеалов объединить силы с нашими войсками, чтобы избавиться от Юаня и совместно сохранить нашу республику». Те же идеалы позже повторил Тан Цзияо, добавив, что отказ от республиканизма равносилен отказу от сил эволюции.\n\nПоддерживаемая самыми ярыми милитаристами нашей страны, эта позиция встретила приглушенную оппозицию со стороны гражданских кругов, намекающих, что не военным Китая определять потребности нации, и что если бы Юань Шикай не был избран, не достиг бы такой известности, и гражданское лицо взяло бы власть, это вполне могло бы спасти Китай от катастрофической эры милитаристов."
 YUN.lategame.002.a: "Наша Армия — наш спаситель!"
 YUN.lategame.002.b: "Разве нынешние военные не совершают те же нарушения?"

 YUN.lategame.003.t: "Роль военного человека в национальном государстве"
 YUN.lategame.003.d: "Смелые концепции Цай Э о китайском милитаристском государстве-нации были не просто постулированы им самим и его последователями, изолированными в вооруженных силах, поскольку вскоре после начала Войны в защиту нации в Юньнани было создано так называемое «Общество лекций по защите нации», и в Куньмине была проведена серия лекций для получения общественной поддержки доблестных солдат и их антимонархического дела. В одной из этих лекций повторялось, что «долгом» Армии защиты нации (Хугоцзюнь) было объявление войны Юаню. Если бы Юаню позволили беспрепятственно продолжать свои монархические планы, китайскому народу снова пришлось бы страдать как простым подданным империи без политической воли, их кровь проливалась бы ради единственной выгоды одного человека.\n\nВ другой лекции правовые соображения, лежащие в основе решения Цай Э, Тан Цзияо и Ли Лецзюня начать войну, были объяснены простым языком: «Народ является составным органом республиканского государства-нации, президент, согласно закону, избирается народом для руководства правительством. Однако в настоящее время Юань Шикай использует свой президентский пост в корыстных целях; он использует президентские полномочия, чтобы разбить Республику и самонадеянно провозгласить себя императором». Поскольку народ еще не полностью осознавал свою ответственность за пресечение махинаций Юаня, Тану, Цаю и Ли пришлось вмешаться, чтобы спасти нацию.\n\nНаконец, еще одна уличная лекция была проведена обществом, касающаяся следующего вопроса: «Итак, каков самый славный долг республиканского народа-государства?». Ответ, очевидный и ясный в свете того выдающегося статуса, который военный человек уже приобрел в китайском националистическом и государственном мышлении, был убедительно очевиден: «Служить солдатом, конечно!»."
 YUN.lategame.003.a: "Высокий статус таких военных людей следует приветствовать!"
 YUN.lategame.003.b: "Наши институты страдают под вашим правлением!"

 YUN.lategame.004.t: "Гордость Юньнани"
 YUN.lategame.004.d: "Традиция, которой долгое время придерживалась армия Юньнани, — это постоянное первенство и напоминание о ее героической истории. Даже в дни начала 1930-х годов, когда армия была лишь тенью самой себя, они продолжали проводить парады, произносить речи и превозносить роль армии Юньнани в национальной политике и провинциальной культуре. Повторяя эти настроения, [ROOT.GetLeader] провел серию грандиозных торжеств в Куньмине, выступив с речью перед большими массами солдат и офицеров в окружении их начальства, стремясь вдохновить их на усилия.\n\n«Сегодняшние торжества знаменуют непрерывную историю, в которой ваша армия Юньнани неустанно вставала на защиту институтов Китая. 24 декабря 1917 года, в тот день, армия Юньнани первой восстала, чтобы воссоздать республику, в тот день ваши предшественники взялись за оружие и мощным и беспрецедентным усилием свергли псевдодинастию Хунсянь и пресекли имперскую систему Юань Шикая. Этому дню предшествует годовщина Уханя и годовщина самоуправления Лянгуана; но если бы этого никогда не произошло, не было бы способа сохранить годовщину Уханя, и самоуправление Лянгуана не могло бы случиться. Сегодня наши соотечественники дома и за рубежом без исключения считают это огромное и блестящее достижение, перевернувшее небо и землю, работой армии Юньнани. То, как она покинула свою провинцию, чтобы истребить бандитов, пройдя несколько тысяч ли, сражаясь в десятках больших и малых битв, — это достижение, подобное тем, что выгравированы на древних бронзовых колоколах и треножниках».\n\nВстреченное громкими аплодисментами и одобрением, возрождение таких годовщин армии является уникальным элементом нового Хугоцзюня, ибо очень немногие армии во всей китайской нации могут похвастаться такой богатой и замечательной историей. Спустившись с подиума, [ROOT.GetLeader] позже в тот же день отдал дань уважения мемориалу революционных мучеников в Юньнани, широко освещая это событие."
 YUN.lategame.004.a: "Никогда не забывайте героев Хугоцзюня!"
 YUN.lategame.004.b: "Они бы постыдились нас, даже сейчас."

 YUN.lategame.005.t: "Пять генералов-тигров"
 YUN.lategame.005.intro: "С завершением военных реформ нового Хугоцзюня успехи собственного Хугоцзюня Цай Э живут глубоко в духе всех наших командиров и солдат. Пройдя долгий и трудный путь со многими ловушками, армия наконец-то вновь заняла свое положение Защитников Нации. Офицеры, исполненные долга и добродетели, полностью осознают свою роль в китайском милитаристском государстве-нации. Однако среди этих офицеров остается несколько избранных, которые возвышаются намного выше среднего генеральского состава. Подобно исключительным людям армии Юньнани из истории — Тан Цзияо, Цай Э, Ло Пэйцзиню, Ли Гэньюаню и Гу Пиньчжэню — исключительные люди сегодняшнего дня взяли на себя задачу привести нацию к спасению.\n\nЭтот новый бренд людей называют «Пятью генералами-тиграми», используя титул, относящийся к пяти лучшим командирам, служащим под началом лорда, берущий начало в периоде Троецарствия. Достигая своих пределов и намного превосходя их, они поистине лучшие солдаты, которых может предложить Хугоцзюнь нынешней эпохи.\n\n"
 YUN.lategame.005.d_npa: "$YUN.lategame.005.intro$Несмотря на чистку большей части генерального штаба после восхождения истинных защитников Дянь, армия только окрепла в отсутствие катастрофического сборища коррумпированной злобы и зловредности Тан Цзияо. Первым среди нового состава генералов-тигров Юньнани числится «Способный» генерал Ху Жоюй. Уже хорошо известный своим военным талантом и превосходством, Великий комендант долгое время считался Дамокловым мечом Юньнани с момента его первой попытки переворота против Тана в конце 1920-х годов.\nСледом за ним идет «Верный» генерал Лу Даоюань. Отличный офицер и к тому же смелый юноша, Лу служил с отличием в последнее время и известен своей аполитичностью в трясине политики Дянь.\nВ-третьих, это «Удачливый» генерал Лу Хань. Известный больше своей способностью идти по стопам своего кузена Лун Юня, успех Лу Ханя зависит от его врожденной способности приспосабливаться к любой ситуации, сродни огромной удаче.\nПредпоследним является случай «Летающего» генерала Чжан Чуна. Известный своим упорным прошлым и дерзостью на поле боя, его скорость и быстрые тактические импровизации на поле боя часто приводили к тому, что он опережал своих современников.\nНаконец, есть генерал-«Тигр» Лун Юнь. Оправдывая все качества своих предшественников, Лун Юнь, пожалуй, самый верховный военный генерал, которого может предложить Дянь. Опытный во всех формах боя, и особенно в наступательных операциях, его награда вполне заслужена.\n\nТакое приукрашивание этих солдат, естественно, вызвало скептицизм со стороны гражданских групп в правительстве, обвиняющих военных в дальнейшем отделении себя от самого правительства провинции."
 YUN.lategame.005.d_feds: "$YUN.lategame.005.intro$Первый из этих пяти — «Способный» генерал Ху Жоюй. Известный меньше своей лояльностью, чем способностью выживать в большинстве обстоятельств, Ху представляет себя как истинный человек Дянь, защищающий только нужды джентри и высшей касты офицеров Юньнани.\nСледом за ним идет «Верный» генерал Сунь Ду. Настоящий солдат до самого конца, Сунь служил своему начальству с блеском. Настоящий солдат до мозга костей, он не был испорчен политикой.\nВ-третьих, это «Удачливый» генерал Ван Цзесю. Командир, у которого больше навыков, чем здравого смысла, чистое упорство Ван Цзесю в войне, украшенное его постоянными победами, привело к его ироничному прозвищу. Тем не менее, он один из самых верховных командиров в свите.\nПредпоследним является случай «Летающего» генерала Тан Цзилиня. Выдающийся тактик, его способность быстро маневрировать дивизиями в свете любой боевой ситуации приводила к тому, что он неоднократно опережал своих коллег-генералов, к их большому огорчению и его восторгу.\nНаконец, есть генерал-«Тигр» Лун Юнь. Оправдывая все качества своих предшественников, Лун Юнь, пожалуй, самый верховный военный генерал, которого может предложить Куньмин. Опытный во всех формах боя, и особенно в наступательных операциях, его награда вполне заслужена, хотя его политическая оппозиция оставляет желать лучшего.\n\nТакое приукрашивание этих солдат, естественно, вызвало скептицизм со стороны гражданских групп в правительстве, обвиняющих военных в дальнейшем отделении себя в политике страны. И все же громкий звук горнов и истинная преданность этих людей федеральному проекту служат опровержением этих утверждений."
 YUN.lategame.005.d_kmt: "$YUN.lategame.005.intro$Первый из этих пяти — «Способный» генерал Чэнь Чэн. Известный как протеже покойного генералиссимуса, Чэнь Чэн и его Клика гражданского строительства проявили себя как истинные приверженцы Гоминьдана. Не раздираемый межфракционными разногласиями, надежность и умелость Чэнь Чэна являются истинными добродетелями настоящего революционера.\nСледом за ним идет «Верный» генерал Гу Чжутун. Настоящий солдат до самого конца, Гу служил любому начальнику с блеском, будь то Хэ Инцинь, Чжу Пэйдэ или Чан Кайши. Настоящий солдат до мозга костей, он не был испорчен политикой.\nВ-третьих, это «Удачливый» генерал Лю Чжи. Командир, у которого больше навыков, чем здравого смысла, чистое упорство Лю Чжи в войне, украшенное его постоянными победами, привело к его ироничному прозвищу. Тем не менее, он один из самых верховных командиров в свите.\nПредпоследним является случай «Летающего» генерала Цзян Динвэня. Выдающийся тактик, его способность быстро маневрировать дивизиями в свете любой боевой ситуации приводила к тому, что он неоднократно опережал своих коллег-генералов, к их большому огорчению и его восторгу.\nНаконец, есть генерал-«Тигр» Вэй Лихуан. Оправдывая все качества своих предшественников, Вэй Лихуан, пожалуй, самый верховный военный генерал, которого может предложить Вампу. Опытный во всех формах боя, и особенно в наступательных операциях, его награда вполне заслужена.\n\nТакое приукрашивание этих солдат, естественно, вызвало скептицизм со стороны гражданских клик внутри партии, обвиняющих военных в дальнейшем отделении себя как в НРА, так и в партии. И все же громкий звук горнов и истинная преданность этих людей Национальной революции служат опровержением этих утверждений."
 YUN.lategame.005.a: "Великие военные герои!"
 YUN.lategame.005.b: "Вопиющие клики присутствуют в армии!"

 YUN.lategame.006.t: "Создание Центральной авиационной школы"
 YUN.lategame.006.d: "С приближением конфликта между Китаем и иностранными империалистическими державами Юньнань получила новый центр внимания. Из-за своего относительно изолированного внутреннего положения в стране она приобрела все большее стратегическое значение в умах китайского верховного командования. С этой целью [YUN.GetRulingParty] и [ROOT.GetLeader] предприняли попытку перебросить все важные авиационные активы из Баодина и Ханчжоу в аэропорт Куньмин Уцзяба с концепцией, что Уцзяба превратится в место расположения штаба авиации Центрального правительства. China Airlines и Central Airlines также будут вынуждены перенести свою оперативную базу в Куньмин, при этом Уцзяба станет одним из «двух авиационных» центров нации.\n\nСтав местом сбора как национальных ВВС, так и гражданской авиации, а также для удовлетворения потребностей войны, провинциальным властям Юньнани было приказано расширить аэропорт Уцзяба. Провинциальный департамент строительства Юньнани, Департамент авиации, Генеральный штаб, Департамент военного снабжения и правительство округа Куньмин направили персонал для совместной подготовки к расширению и реконструкции аэропорта Уцзяба, сформировав Инженерный комитет по расширению и реконструкции аэропорта Уцзяба.\n\nПрактически переходя к единственному в Китае международному импортно-экспортному аэропорту, проект направлен на увеличение двух первоначальных параллельных взлетно-посадочных полос до двух тысяч двухсот метров, одна из которых должна быть преобразована в асфальтовое покрытие, а также на строительство кирпично-деревянного зала ожидания и соответствующих материальных складов. Наряду с этим, рядом с аэропортом будут построены некоторые отели, рестораны, магазины и медицинские клиники."
 YUN.lategame.006.d_kmt: "$YUN.lategame.004.d$\n\nНесмотря на то, что комитет возглавляют сторонники Вампу, а именно директор Хуан Бинхэн и Цзян Цзяньжэнь, они имеют мало реального влияния, например, на финансирование расширения. Поскольку ни для кого не секрет, что при наличии такого заманчивого контракта и уже имея свои руки в провинциальном департаменте строительства, департаменте военного снабжения и правительстве округа, Инженерный комитет по расширению и реконструкции аэропорта Уцзяба превратился в поле открытой битвы между банкирами Клики политической науки и технократами Клики СС. Намеренный поддерживать тщательный баланс, [ROOT.GetLeader] был поставлен в довольно несостоятельное положение, пытаясь склонить чашу весов в пользу любой из клик, чтобы проект не провалился из-за их препирательств."
 YUN.lategame.006.a: "Братья могут получить свои контракты."
 YUN.lategame.006.b: "Лучше оставить это финансовым экспертам."
 YUN.lategame.006.c: "Чтобы Юньнань стала центром нации!"

 YUN.lategame.007.t: "Доброе имя солдата"
 YUN.lategame.007.d: "В процессе вечной модернизации и продвижения боевого духа Юньнани в само сознание китайского народа проводились постоянные параллели между юньнаньским солдатом и солдатом имперской Японии. Но это все же поверхностно, ибо граждане Японии превозносят и восхваляют своих воинов как новых самураев, как солдат, сражающихся за славу нации и императора. В то время как в Китае, напротив, даже сейчас интеллектуалы и крестьяне продолжают относиться к простому солдату с определенным уровнем отчуждения и недоверия, опасаясь их истинных намерений.\n\nНаблюдая за восприятием солдата простым китайским гражданином, Цай Э однажды написал о собственном впечатлении японцев от своих воинов: «Они уважают своих солдат и вежливы с ними, когда мужчина поступает в армию, члены его клана или соседи собирают деньги, чтобы дать ему, вымпелы, чтобы поздравить его, и предлагают щедрые пиры, чтобы развлечь его; когда младшие сыновья поступают на службу, родители считают это славным. Всякий раз, когда он приезжает в гости, он платит только полцены, когда солдаты приходят в сельскую местность, жители деревни относятся к ним как к гостям с исключительной добротой. Если солдат бежит в бою или делает что-то еще, что порочит доброе имя его подразделения, родители, братья и соклановцы чувствуют глубокий стыд и позор».\n\nЕсли китайский солдат действительно хочет противостоять своим японским коллегам, армии Юньнани еще предстоит пройти долгий путь, чтобы революционизировать и трансформировать культурное мышление, стоящее за военной профессией. Пока эта точка не достигнута, армия Юньнани, безусловно, должна продолжать превосходить все ожидания, ибо Национальные чемпионы защищают нацию независимо от награды."
 YUN.lategame.007.a: "Новой кастой воинов стоит восхищаться!"
 YUN.lategame.007.b: "Идолопоклонство перед собственными медалями и сапогами ни к чему не приведет."

 YUN.lategame.008.t: "Король-воин Юньнани"
 YUN.lategame.008.d: "В связи с продолжающимися успехами на поле боя и очевидным громким политическим доминированием [FROM.GetLeader], многие не только в его ближайшем окружении, но и в стране распускали слухи, что он на самом деле является достойным преемником легендарного Цай Э как по национальному влиянию, так и по мудрости. Развивая почти великолепный культ личности, [FROM.GetLeader] был провозглашен «Королем-воином Юньнани», знаменосцем и острием новых Национальных защитников Китая. Не оставляя миссию наполовину завершенной, как это сделал ранее Цай Э, они прошли весь путь, намереваясь окончательно и по-настоящему спасти нацию.\n\nГерой армии Юньнани с их наследием в основных институтах Юньнани воспитал новое поколение меритократических воинов, исполняющих свой долг не ради личного удовлетворения, жадности или влияния, а ради самого китайского милитаристского национального государства. Их военный и политический гений достоин восхваления, а их деяния навсегда останутся в памяти, ибо современная китайская нация не существовала бы, если бы не их действия. За мучеников Китая прошлого и настоящего Хугоцзюнь сражается, чтобы сохранить вашу жертву."
 YUN.lategame.008.a: "Наследник наследия Цай Э."

 YUN.lategame.040.t: "Успех дела Желтой книги"
 YUN.lategame.040.intro: "Возникнув как проблема в китайско-британских отношениях после британской аннексии Верхней Бирмы в 1886 году, граница между провинцией Юньнань и территориальным пространством Бирмы долгое время была предметом спора для властей Юньнани. Британские, а затем и бирманские концепции границы лежат в информации, предоставленной чиновниками старого Бирманского королевства, определяющими государства, которые ранее платили лишь номинальную дань бирманским королям, как законную территорию Бирмы. Фактически британские власти претендовали на все территории, которые когда-то принадлежали бирманским династиям. Включая, помимо прочего: верховья реки Иравади, верхние долины рек Салуин, Меконг и Янцзы, однако эти регионы были домом для различных, но малонаселенных коренных общин шанов, качинов, чинов и лаши. Доколониальное бирманское влияние, вероятно, даже не достигало этих районов.\n\nНеоднократные переговоры между Цин и британцами не смогли определить полную протяженность границы, хотя к 1910 году два отдельных региона оставались неурегулированными. Один на севере и один на юге. Оставаясь нерешенными из-за фундаментально разных концепций относительно национальной границы, с доминированием на границе местных подчиненных режимов Тусы, которые были изменчивы и неоднозначны в территориальном охвате. С захватом британцами Пяньмы в 1910 году Цай Э проводил примирительную политику по отношению к британцам, но сохранил в своем сердце желание освободить китайскую землю от британского, а теперь и бирманского контроля.\n\nЕще более насущным было расположение ряда ценных серебряных рудников в южном регионе спора, Луфан, которые представляли особый интерес для провинциального правительства Юньнани. Служа точкой сбора для осуждения иностранного империализма в течение двух десятилетий, время нанести удар и вернуть утраченную территорию наступило в зените военной мощи Юньнани. Больше не преклоняясь ни перед какими иностранными державами, юньнаньцы предприняли серию пограничных рейдов и стычек, направленных на обеспечение контроля над небольшими изолированными фортами, укомплектованными бирманскими пограничниками.\n\n"
 YUN.lategame.040.d: "$YUN.lategame.040.intro$Несомненно, обеспечив контроль над местностью за считанные дни, провинциальные власти Юньнани сумели установить де-факто контроль над регионом. Представляя это как первый шаг к устранению несправедливости Века унижения."
 YUN.lategame.040.a: "Такова судьба всех остатков империализма!"
 YUN.lategame.040.b: "Все эти потерянные жизни, и ради чего?"

 YUN.lategame.041.t: "Провал дела Желтой книги"
 YUN.lategame.041.d: "$YUN.lategame.040.intro$Несмотря на численное превосходство и лучшую подготовку, солдаты Юньнани не смогли успешно захватить различные пограничные форты. Деморализованные провалом своего молниеносного удара, подкрепления защитников прибыли вскоре после этого, отразив вторжение юньнаньцев. Считающийся национальным позором в самом Китае, провал дела Желтой книги значительно укрепил решимость бирманцев в их вооруженных силах."
 YUN.lategame.041.a: "Мы все еще подчиняемся чужакам?"
 YUN.lategame.041.b: "И не возвращайтесь!"

 YUN.lategame.042.t: "Смешанные результаты"
 YUN.lategame.042.d: "$YUN.lategame.040.intro$Надеясь на первоначальный молниеносный удар по приграничным районам Бирмы, юньнаньцы предполагали, что их отличная подготовка и руководство обеспечат быструю победу. Однако чистое упорство защитников оказалось гораздо большим сопротивлением, чем то, к чему готовились, и хотя юньнаньцам удалось отбросить любые силы помощи обороне, они так и не смогли обеспечить полный контроль над пограничным регионом. Закончившееся посредственным поражением для юньнаньцев, дело Желтой книги является пирровой победой для защитников."
 YUN.lategame.042.a: "Национальные чемпионы, а мы даже не можем победить пограничных бандитов."
 YUN.lategame.042.b: "Какой глупый гамбит."

##KMT Military Events
 YUN.lategame.050.t: "Восстановление Закона о круговой поруке"
 YUN.lategame.050.d: "В старом наследии Вампу главной силой революционного солдата был националистический дух. Ибо, находясь под сильным влиянием офицеров-националистов, учившихся у японских инструкторов, они видели наибольшее упорство у тех, кто обладал сильнейшим духом воина. Кроме того, с прагматической точки зрения, солдат-националист, с большей вероятностью вступающий в штыковой бой, с меньшей вероятностью будет использовать ценные ресурсы, такие как боеприпасы. В Куньмине укоренилась новая культура, находящаяся под сильным влиянием слияния боевых акцентов Куньмина и Вампу.\n\nПостоянное наставление этих выдающихся курсантов, которые являются не просто солдатами, а сырой революционной силой, теми, кто готов пожертвовать своей жизнью, принять большие трудности и выстоять, привело к элитарному милитаристскому мышлению у простого солдата. И все же для высшего руководства, для тех остатков первоначальной Национально-революционной армии, они, возможно, были измотаны временем в изгнании. Экстремисты и сторонники дисциплины, такие как Тэн Цзе и Хэ Инцинь, сплотились за внедрение «Закона о круговой поруке» (Ляньцзофа) покойного генералиссимуса, в котором разрешалась казнь офицеров, если они либо бежали, либо покидали свои позиции на поле боя без четкого приказа сделать это.\n\nТакая радикальная инициатива, естественно, вызвала подъем в кругах военных клик, поскольку даже отмеченные милитаристы или студенты из самого Вампу, такие как Ли Гэньюань, Гу Чжутун или Вэй Лихуан, решительно выступали против такого закона. Обвиняя синерубашечников и Хэ Инциня в желании дисциплины там, где дисциплины больше нет, и что для человека естественно выбирать самосохранение в тяжелых обстоятельствах, и что нельзя заставить пожертвовать собой."
 YUN.lategame.050.a: "Закон необходим для революционной чистоты."
 YUN.lategame.050.b: "Мы не расстреливаем собственных офицеров!"

 YUN.lategame.051.t: "Новые стратегии для нового этапа"
 YUN.lategame.051.d: "Поскольку национальная ситуация теперь несколько стабилизировалась, реформаторы, выполняющие военный план Чжу Дэ, начали пропагандировать принятие более наступательной стратегии для Национально-революционной армии, видя, что возможность для более агрессивных действий имеется. Продолжая концентрироваться на окружении и уничтожении, и с увеличением их силы по отношению к их противникам, они начали превозносить цель расширения своего территориального контроля посредством уничтожения крупных сил противника как жизнеспособных препятствий. С новыми наступлениями, следующими предыдущим принципам наступательной стратегии, роли оппозиции и НРА фактически поменялись местами. Бремя контр-окружения теперь ложилось на оппозицию, и с их отсутствием народной поддержки и другими преимуществами, которыми обладает НРА, утверждается, что их провал в такой тактике гарантирован.\n\nС базовой схемой в игре реформаторы поддержали базовый шаблон успеха. Первая фаза этого стратегического наступления рассматривается как фаза разъединения, в которой успех зависит от умелой координации командирами НРА трех типов операций: партизанское разъединение, мобильное разъединение и позиционное разъединение.\nПартизанское разъединение включает нарушение коммуникаций и координации оппозиции посредством преследований, засад или саботажа; второе подразумевает маневрирование регулярных войск НРА между разделенными силами оппозиции; третье — атаки на слабые места в обороне оппозиции.\n\nЗа этой фазой последует вторая фаза стратегического окружения, в которой разъединение вражеских подразделений завершено, хотя и остается стратегическим по своей природе. После этого наступит третья и последняя фаза, уничтожение. Использование разнообразного тактического арсенала для уничтожения окруженных сил, будь то короткие атаки, атаки в одной и нескольких точках или ударные атаки. При незначительном или полном отсутствии сопротивления новым успехам новой НРА планы реформаторов были приведены в действие."
 YUN.lategame.051.a: "Герои крестьянства, вперед!"
 YUN.lategame.051.b: "Солдаты НРА, вперед!"

 YUN.lategame.052.t: "Столкновение старого и нового"
 YUN.lategame.052.d: "Возможно, как и ожидалось, многочисленные старые командиры Национально-революционной армии продолжают бороться с принятием новой реформистской доктрины, поддерживаемой Чжу Дэ, Чэнь И и молодыми реформаторами в армии. Вдохновленные своими первоначальными успехами и намеренные довести армейские реформы до их естественного завершения, реформаторы начали оговаривать, что в войне маневренная война должна быть основной, с различным акцентом на партизанские и позиционные действия в зависимости от стадии конфликта, в котором они сражаются.\n\nЧто касается продвижения любой иностранной империалистической державы на китайскую территорию, в основном касающегося Японии, реформаторы заявили, что их вторжение начнет первую стадию операций маневренной войны, где мобильность сил и гибкость стратегии наиболее важны. После этого японцам придется консолидировать свое влияние внутри страны, прекратив наступление. Поэтому на этом этапе было бы благоразумно сосредоточиться на партизанских кампаниях преследования и мобилизации массового сопротивления в тылу врага. Третий этап начнется, когда японцы будут полностью истощены, и в этом случае будет начата полная наступательная кампания, вынуждающая японцев к постепенному отступлению под тяжелыми китайскими атаками. На этом этапе маневренная война изначально является приоритетной, а позиционная стратегия медленно обгоняет ее, занимая главенствующее положение.\n\nОппозиция таким теориям довольно резко возникла со стороны Лю Чжи, Вэй Лихуана и Гу Чжутуна. Убежденные сторонники традиционной стратегии Вампу, они вместо этого дали отпор своей собственной концепцией традиционной доктрины НРА, в которой они предпочли бы проводить политику локального окружения вражеских сил с помощью ударов с самого начала. Чистой силой воли и нагромождением решающих сражений одно за другим победа гарантирована с минимальными страданиями китайского народа. В противоположность тому, что они рассматривают как ведение войны на истощение."
 YUN.lategame.052.a: "Всегда за решающую победу!"
 YUN.lategame.052.b: "Общая победа лучше, чем азартная игра на краткосрочную."

 YUN.lategame.053.t: "Стражи народа"
 YUN.lategame.053.d: "Благодаря нашим доблестным завоеваниям все новых и новых территорий Национально-революционная армия снова оказалась за пределами плато Юньгуй, приветствуемая одними и встреченная с презрением другими. Однако в наших недавно освобожденных территориях разворачивается незнакомое и выдающееся зрелище. Входя в недавно захваченные уезды, солдаты НРА были замечены на встречах с существующими партизанскими группами Гоминьдана, возрождая боевой дух и местные администрации. Кроме того, они создавали народные организации, укрепляли местные партизанские силы, создавая невооруженный «Корпус самообороны» для патрулирования дорог, передачи информации и ухода за ранеными. Более того, люди обучались Трем принципам через пьесы, речи, песни, танцы и настенные газеты, продвигаемые и созданные НРА.\n\nХотя это приносит исключительную пользу как местным экономическим условиям, так и административным условиям, значительная часть гражданского крыла партии подала жалобы на поведение этих солдат [ROOT.GetLeader]. Заявляя, что, хотя они согласны с тем, что солдаты действуют как общее моральное благо, это выходит за рамки того, чем должна управлять армия нации. Что они активно подрывают роль бюрократов и магистратов в управлении реконструкцией и новой территорией. Хотя это правдоподобно, это также может быть просто уловкой пешек Политической науки и братьев Чэнь, поскольку их влияние снова подрывается армией."
 YUN.lategame.053.a: "Поздравьте этих хороших революционеров!"
 YUN.lategame.053.b: "Это работа бюрократов, а не солдат."

 YUN.lategame.054.t: "Ужасное состояние наших воинов"
 YUN.lategame.054.d: "Продолжая свою серию директив, направленных на реформы армии, Чжу Дэ попросил [ROOT.GetLeader] самому выдвинуть директиву для продвижения реформы методов вербовки, проводимых в настоящее время. В разработанной Чжу Дэ «Директиве о призыве и обучении новобранцев» он стремится решить проблемы, стоящие перед Национально-революционной армией в приобретении свежих и надлежащих новобранцев. В нынешнем виде подразделения принимали новобранцев, которые были слишком молоды, или больны, или имели физические недостатки, и поэтому не могли сражаться. Предыдущая директива устанавливала следующие стандарты для новобранцев.\n\nОни должны быть старше шестнадцати, но моложе тридцати лет, иметь хорошее здоровье и рост не менее пяти футов. Все новобранцы в регулярных батальонах должны пройти осмотр у медицинского офицера подразделения, в то время как новобранцы, действующие в партизанских отрядах, должны пройти осмотр у командира отряда или политического комиссара, чтобы убедиться, что они соответствуют стандартам, установленным в директиве. Обучение и подготовка новобранцев должны проводиться коллективно. Новички будут организованы и обучены в батальонах или взводах новобранцев, и только после того, как их образование и подготовка достигнут определенного уровня, они будут добавлены в передовые воинские части.\n\nХотя условия вполне приемлемы и получают общую поддержку со стороны большинства военных клик в НРА, это, естественно, встретило сопротивление со стороны Клики СС. Ставя под сомнение обоснованность таких заявлений о плохих новобранцах, когда они сами отвечают за военный набор. Более того, Чэнь Лифу выдвинул идею о том, что такие обширные экзамены послужат бюрократическим бременем для партии и армии, и что лучше оставить такие вопросы экспертам, а именно его брату и его клике."
 YUN.lategame.054.a: "Разрешено. Лучше солдаты, лучше результаты."
 YUN.lategame.054.b: "Такие меры несостоятельны."

 YUN.lategame.055.t: "Оживление физической подготовки"
 YUN.lategame.055.d: "В очередной раз Чжу Дэ и его группа реформаторов обратились к [ROOT.GetLeader] с интересной директивой для решения вопросов методов полевой подготовки простых солдат Национально-революционной армии. В своей провозглашенной «Директиве о наращивании физической силы и улучшении навыков стрельбы» Чжу нацелился на улучшение физической подготовки и меткости как солдат, так и офицеров, надеясь развить высокие стандарты в обоих направлениях, чтобы компенсировать любые потенциальные недостатки НРА в огневой мощи или боеприпасах. Намеренные обеспечить выживание НРА в свете вражеских армий и иметь возможность победить их, реформаторы осознают, что солдаты Национально-революционной армии должны быть способны перещеголять в марше и маневре любое вражеское подразделение в гористой или иной труднопроходимой местности.\n\nЗаявляя, что физические упражнения и стрельба по мишеням являются двумя наиболее важными аспектами военной подготовки, Чжу Дэ лично установил режим упражнений, который должен быть принят всеми подразделениями, включая обширную гимнастику. Наряду с этим Чжу попытался изложить систему обучения стрельбе и организовать серию армейских соревнований по меткости. Полностью осознавая амбиции Чжу, [ROOT.GetLeader] мог бы легко позволить его плану осуществиться. Но тем не менее, действительно ли сейчас время для реализации такого обширного плана реформ, потенциально влияющего на боеспособность самой армии, в такой критический момент? Не было бы более целесообразным просто отложить его до конца национального объединения, после демобилизации ненужных дивизий?"
 YUN.lategame.055.a: "Улучшение доблести наших людей — приоритет!"
 YUN.lategame.055.b: "Отложите это до объединения."

 YUN.lategame.056.t: "Милитаристская традиция, разбавленная"
 YUN.lategame.056.d: "С постоянно растущим пространством территориального контроля Гоминьдана, все более развивающаяся Национально-революционная армия нуждается во все более обширных протоколах набора. Мы больше не набираем только уроженцев Юньнани и Гуйчжоу, но и тех, кто находится за пределами провинций. Однако больше всего беспокоит то, что многие из этих новых новобранцев в НРА не разделяют тех же убеждений или происхождения, что и их товарищи, из ядра. С расширением территории некоторые части Национально-революционной армии сохранили свою основную милитаристскую традицию, и из-за этого массы, как правило, чувствуют себя изолированными от НРА.\n\nС другой стороны, однако, НРА также совершила ошибки, разрешив широкомасштабную партизанскую войну без введения строгой армейской дисциплины. Это привело к тенденции индивидуальных действий среди определенных подразделений вместо широкого интереса к Национальной революции. Такая автономия позволила сохранить крестьянскую идеологию со склонностью к мести тем, кто совершил предполагаемые нарушения. Поскольку массы всегда более радикальны, чем Национально-революционная армия, они всегда желают больше убийств, чем можно допустить. Хотя НРА происходит из масс, она не должна отражать крестьянскую склонность к мести.\n\nВ НРА возникли два лагеря поддержки в отношении их новых, кровавых и безжалостных новобранцев. В то время как оба лагеря согласны с тем, что такие действия нетерпимы для хорошего имиджа партии, народа и армии, раскол заключается в том, как именно делать выговор тем, кто был пойман на совершении таких зверств. Радикалы в армии выступают за мягкую руку, поскольку можно часто увлечься народной революцией против элит. В то время как другая сторона выступает за жесткую политику, задерживая и арестовывая все виновные стороны, позволяя военным судам решать их судьбу."
 YUN.lategame.056.a: "Они просто были охвачены революционным пылом."
 YUN.lategame.056.b: "Мы освободители! Не тираны!"

 YUN.lategame.057.t: "Дисциплины и правила"
 YUN.lategame.057.d: "Всегда стремительный архитектор военной реформы, Чжу Дэ обратился к [ROOT.GetLeader] с просьбой о создании официальной брошюры Национально-революционной армии, составив серию правил реформы, которые будут опубликованы в виде памятки каждому солдату и офицеру. Выступая за сильный дисциплинированный дух, Чжу оговорил, что величайший урок, который можно извлечь из войны, заключается в том, что народ может победоносно сражаться с теми ресурсами, которые случайно оказались под рукой. Массы могут получить свое оружие, если у них есть решимость. Легко захватить оружие у врага внезапной атакой и ночными боями. Люди могут сражаться даже с плохим оружием или вообще без какого-либо формального вооружения. Любой вид оружия, если его использовать правильно и с надлежащим духом, может победить врага.\n\nС этой целью его дисциплинарная брошюра стремится привить солдатам чувство революционного духа. Ибо пока у них есть брошюра и сила воли, они могут сражаться с оружием или без него. Составленные как «3 основные дисциплины и восемь правил Национально-революционной армии», Три основные дисциплины Чжу заключаются в том, что солдаты должны: Повиноваться всем приказам, Не брать у народа ни иголки, ни нитки, Сдавать все товары, конфискованные у местных хулиганов и злых джентри. Наряду с этим, его Восемь правил гласят, что солдаты должны: Ставить на место двери, которые вы сняли для кроватей, Говорить вежливо с людьми и помогать, когда это возможно, Возвращать все одолженные предметы, Платить за все поврежденное, Быть честными при покупке вещей, Соблюдать санитарию; рыть уборные на безопасном расстоянии от дома и засыпать их землей перед уходом, Не мыться на виду у женщин, Не жестоко обращаться с пленными.\n\nВ одностороннем порядке согласованные как общее улучшение дисциплины и регулирования армии, ни одна военная клика не вызывает особого гнева составленными условиями. Однако они обеспокоены растущим прямым влиянием Чжу Дэ в армии, опасаясь, что он вполне может красть людей из-под них. Что они начнут отвечать только перед Чжу Дэ, а не перед своим командиром."
 YUN.lategame.057.a: "Разрешено. Наши солдаты изучат правильные правила войны."
 YUN.lategame.057.b: "Помни свое место, Чжу Дэ."

 YUN.lategame.058.t: "Раздоры в Верховном командовании"
 YUN.lategame.058.d: "С такой автономией, которая недавно была делегирована офицерам Национально-революционной армии, акцент на инициативе и независимости нижнего уровня следует общей глобальной тенденции принятия «Auftragstaktik», или тактики типа миссии, в рамках глобального немецкого доминирования, наиболее примечательного своим использованием в их Хеер (армии). Перед операцией НРА намерения и общие цели командира высшего уровня в битве сообщаются командирам нижнего уровня; им, в свою очередь, предоставляется гибкость в том, как достичь указанных целей. Постулировано реформаторами и Чжу Дэ: «Повиновение приказам и проявление независимой инициативы не противоречат друг другу. Независимое функционирование никогда не следует ошибочно принимать за неповиновение приказам. Также нецелесообразно выполнять приказы механически, не проявляя никакой независимой инициативы».\n\nПри координации действий крупных войсковых формирований важно, чтобы каждое подразделение при принятии своего задания понимало суть решения своего начальника и то, какую роль его собственная задача играет в выполнении этого приказа. Если ситуация изменилась и связь прервана, они должны действовать независимо в соответствии с приказом начальника и местными условиями, что не следует толковать как неповиновение приказу начальника.\n\nОднако против течений теорий Чжу Дэ возникла встречная волна мысли, поскольку совсем недавно возникли случаи, когда офицеры действовали вне общего понимания их начальником наилучшего курса действий, фактически действуя по собственной инициативе против желаний общего стратегического плана. Вызывая раздоры среди таких представителей верховного командования, как Цзян Динвэнь, Цянь Дацзюнь и Сюн Шихуэй, которые опасались неподчинения в своих рядах."
 YUN.lategame.058.a: "Офицеры действуют в рамках своих прав."
 YUN.lategame.058.b: "Генералы лучше понимают общую ситуацию."

 YUN.lategame.059.t: "Молодежный марш Трех народных принципов"
 YUN.lategame.059.d: "После установления конкретного контроля партии Гоминьдан в стране растущее партийное государство стремилось влиять не только на умы людей, но и на молодежь. С этой целью началась разработка планов создания «Молодежной лиги Трех народных принципов», также известной как «Тройственная молодежная лига». Задуманные как молодежная организация для продвижения принципов доктора Суня следующему поколению Китая, планы были приостановлены с началом Второй японо-китайской войны. Однако, тем не менее, благодаря усилиям известных музыкантов Ма Цзилиня и Цюэ Чжунъяо, они составили гимн для Молодежной лиги, известный как «Молодежный марш Трех народных принципов».\n\nПламя войны заполнило небо, кровь разлилась по всей земле, и китайская нация перенесла беспрецедентную катастрофу.\nМы растем в страданиях, нас искушает горнило катастрофической эры, и мы стали революционной молодежью.\nВозрождение партии и омоложение нации — две задачи, которые твердо лежат на наших плечах.\nМы клянемся сражаться за наши принципы, мы клянемся жертвовать ради революции, и мы можем двигаться только вперед ради Войны Сопротивления.\nНаши тела как сталь. Наша воля сильнее стали.\nУ нас есть сила, чтобы все покорить, и у нас есть жар, чтобы все расплавить.\nПусть наша кровь смоет все старые и новые обиды.\nМы — молодежь Трех народных принципов и позвоночник нации.\nЦелься во врага, сожми железный кулак, следуй за кровью мучеников,\nИ заверши великое дело Войны Сопротивления. Свет впереди, и победа завтра.\n\nДля китайских поколений здесь и в будущем, пусть наше великое кровопролитие и борьба будут ради вас, ради ваших надежд и мечтаний. Время великой борьбы наступило для китайской нации, ибо на карту поставлено само ее выживание."
 YUN.lategame.059.a: "Цзоусян шэнли!"

##Econ Events
 YUN.lategame.200.t: "Реконструкция Юга"
 YUN.lategame.200.d.gov: "Со времен Войны в защиту нации военные Юньнани достигли первенства в обществе и правительстве Юньнани. Реформы милитаризации Цай Э выделили 70% бюджета провинции военным, а провинциальные промышленные программы и сельскохозяйственные реформы в значительной степени застопорились. Губернаторство Тан Цзияо наблюдало ограниченные попытки демилитаризации экономики и перенаправления средств на экономическую модернизацию, но милитаризация оставалась главной утечкой провинциального бюджета. Те в правительстве, кто предлагает перебалансировать экономику по гуандунскому образцу, утверждают, что, хотя милитаризация служила нуждам правительства, пока оно находилось в Юньнани, продолжающаяся милитаризация нанесет ненужный долгосрочный ущерб китайской экономике, поскольку относительное богатство Гуандуна позволяет должным образом финансировать и армию, и экономику. Те, кто настаивает на сохранении милитаристского примата, утверждают, что, хотя милитаристская политика является экономическим ущербом, она также является необходимым злом для объединения Китая военными средствами и прекращения Века унижения. Спорный вопрос, выбор за [ROOT.GetLeader]."
 YUN.lategame.200.d.subject: "Со времен Войны в защиту нации военные Юньнани достигли первенства в обществе и правительстве Юньнани. Реформы милитаризации Цай Э выделили 70% бюджета провинции военным, а провинциальные промышленные программы и сельскохозяйственные реформы в значительной степени застопорились. Губернаторство Тан Цзияо наблюдало ограниченные попытки демилитаризации экономики и перенаправления средств на экономическую модернизацию, но милитаризация оставалась главной утечкой провинциального бюджета. Те в правительстве, кто предлагает перебалансировать экономику по гуандунскому образцу, утверждают, что, хотя милитаризация служила нуждам правительства, пока оно находилось в Юньнани, продолжающаяся милитаризация нанесет ненужный долгосрочный ущерб китайской экономике, поскольку относительное богатство Гуандуна позволяет должным образом финансировать и армию, и экономику. Поскольку стремления Куньмина были подавлены, сторонники милитаризма потеряли много позиций, и ожидается, что [ROOT.GetLeader] объявит об изменении политики милитаризации."
 YUN.lategame.200.a: "Милитаризация остается приоритетом."
 YUN.lategame.200.b: "Нам нужно перебалансировать экономику."

 YUN.lategame.201.t: "Военное государство Дянь"
 YUN.lategame.201.d: "Преподаватель престижной Военной академии Куньмина, Цай Э был солдатом всю жизнь. Многие революционные герои учились у ног Цай Э, включая Чжу Дэ. Цай Э оказался под домашним арестом в Пекине после провала второй революции Сунь Ятсена, и его коллега Тан Цзияо занял пост губернатора вместо него. Когда Юань обнародовал свои имперские амбиции, Цай бежал в Юньнань и скоординировался с Таном, чтобы начать Войну в защиту нации и создать Хугоцзюнь.\n\nДаже после смерти Юаня Цай Э содержал армию Юньнани с большими затратами, что побудило его вторгнуться в Сычуань, чтобы обеспечить местные ресурсы и уменьшить экономическую нагрузку армии на Юньнань. К сожалению, Цай Э скончался от болезни, но его наследие остается с Юньнанью по сей день. Военное государство, которое взрастил Цай Э, остается на месте, и истории о его храбрости продолжают вдохновлять студентов Военной академии Куньмина."
 YUN.lategame.201.a: "Мы стремимся подражать его примеру!"
 YUN.lategame.201.b: "Он был заблуждающимся героем."

 YUN.lategame.202.t: "Ярость торговцев"
 YUN.lategame.202.d: "Как и в Юньнани, джентри и торговцы обладают значительной властью в провинции Гуандун. Чтобы провести свои политические реформы, не оскорбив при этом устоявшихся региональных влиятельных игроков, Чэнь Цзюнмин заключил союз с Чэнь Ляньбо и Корпусом торговцев, что толкнуло крестьян в объятия Гоминьдана. После того, как националистическое правительство Гуанчжоу рухнуло из-за вмешательства Германии, Гуандун был разделен между различными силами.\n\nПоддерживаемый Пекином губернатор Шэнь Хунъин контролировал северные районы Гуандуна, Корпус торговцев Чэнь Ляньбо контролировал территорию вокруг Гуанчжоу, включая сам город, а Дэн Бэньинь правил Цюнъя. Этому положению дел был положен конец, когда армия Юньнани вошла в Гуанчжоу, объединив четыре провинции Южного Китая под единой администрацией.\n\n[ROOT.GetLeader] счел нужным резко сократить привилегии торговцев и поставить экономику под бдительное око временного правительства. Неудивительно, что Корпус торговцев яростно протестовал против сокращения автономии, и напряженность была настолько высока, что пришлось направить армию для восстановления порядка. На данный момент в Гуандуне установлен порядок, аналогичный тому, который был установлен Гоминьданом в 1925 году, и Корпус торговцев может лишь надеяться, что [ROOT.GetLeader] постигнет та же участь, что и Чан Кайши."
 YUN.lategame.202.a: "Нам следует действовать осторожно..."
 YUN.lategame.202.b: "Наглые капиталисты!"

 YUN.lategame.203.t: "Сестринская провинция"
 YUN.lategame.203.d: "Расположенная между Юньнанью и Гуандуном, Гуанси имеет много общих черт со своим западным соседом, а также богатую историю. Ее гористая местность, очень похожая на Юньнань, способствовала развитию многих уникальных культур. Ее природная красота, как и в Юньнани, досталась ценой экономического процветания провинции, и обе провинции, Гуй и Дянь, оказались беднейшими провинциями Китая.\n\nЭта гористая провинция, наполненная бедностью, оказалась благодатной почвой для политического радикализма, которым воспользовалось восстание тайпинов. Перейдя в XX век, Гуанси стала одной из ведущих республиканских провинций Китая и присоединилась к Синьхайской революции так же искренне, как и все другие южные провинции. Старая клика Гуанси Лу Жунтина имела схожие амбиции с Цай Э в Юньнани и милитаризировала провинцию до аналогичного с Юньнанью уровня.\n\nНовая клика Гуанси ненадолго контролировала Гуанси после свержения Лу, и их амбициозная программа реконструкции пыталась модернизировать и индустриализировать провинцию, сохраняя при этом политику милитаризации Лу. Лидеры Гуанси в конечном итоге не желали и были слишком консервативны, чтобы одобрить истинные реформы, и еще предстоит увидеть, реформирует ли [ROOT.GetLeader] существующую экономическую ситуацию в Гуанси или же все будет начато с чистого листа, и милитаризм будет отменен."
 YUN.lategame.203.a: "Гуанси узнает процветание!"
 YUN.lategame.203.b: "Милитаризм Гуй все еще имеет свое место."

 YUN.lategame.204.t: "Нестабильный баланс"
 YUN.lategame.204.d: "Хотя Юньнань была одной из беднейших провинций Китая, ее губернаторы были одними из самых амбициозных людей Китая. Когда Юань Шикай объявил себя императором, Цай Э и Тан Цзияо утвердили Юньнань как лицо республиканского движения, и именно юньнаньский Хугоцзюнь разбил армию Бэйяна в Сычуани и сорвал имперские амбиции Юаня. Милитаристские устремления Цай Э побудили его еще больше милитаризировать провинцию, чтобы она могла конкурировать с окружающими провинциями Юньнани.\n\nПосле смерти Цай Э Тан Цзияо также придерживался милитаристских устремлений к объединению Китая, полагая, что федералистский Китай все еще должен поддерживать сильную армию, чтобы защищать нацию от иностранных угроз и империализма. Зная о несостоятельном экономическом положении Юньнани, Тан проводил некоторые усилия по демилитаризации, но его милитаристские амбиции не позволили этим реформам возыметь полный эффект. Такое положение дел оставалось относительно неизменным до недавнего времени, когда губернатор [ROOT.GetLeader] совершил беспрецедентный поворот в пользу полного экономического перебалансирования и демилитаризации администрации."
 YUN.lategame.204.a: "Никаких больше полумер, губернатор."

 YUN.lategame.205.t: "Международная торговля"
 YUN.lategame.205.d: "Исторически Китай долгое время был предметом желания всего мира из-за экзотических торговых товаров. Во времена Рима династия Хань производила шелк и ревностно охраняла секреты его производства. Во времена расцвета международной торговли Шелковый путь переживал времена процветания, поскольку города Центральной Азии становились популярными направлениями, выступая посредниками в международной торговле. Китай сохранял этот статус до XIX века, пока британцы не открыли китайскую торговлю и не нарушили торговый дисбаланс с помощью опиума.\n\nРазличные регионы Китая были поделены между империалистическими державами, а ресурсы добывались и продавались по их усмотрению. Во многих регионах китайский бизнес был исключен из международной торговли, поскольку западные и японские компании в конечном итоге стали посредниками, которые отправляли продукцию на рынки Запада и Японии для потребителей. Такое положение дел побудило Экономическую комиссию Юньнани отдать приоритет развитию местных компаний и положить конец иностранному экономическому доминированию.\n\nХотя на провинциальном уровне можно сделать не так много, торговый дисбаланс Южного Китая действительно стал намного меньше зависеть от немецкого бизнеса и горнодобывающих операций, и гораздо больше богатства перешло в руки китайского государства и местного бизнеса. Увеличение государственных доходов от Юньнани в сочетании с торговым дисбалансом кантонской системы в пользу Китая значительно увеличило государственные доходы, и многие в правительстве [ROOT.GetLeader] уже изложили планы по их использованию."
 YUN.lategame.205.a: "Поддержите китайский бизнес, время изобилия настало!"
 YUN.lategame.205.b: "Ресурсы должны быть мобилизованы для войны."

 YUN.lategame.206.t: "Межрегиональная торговля"
 YUN.lategame.206.d: "Хотя международная торговля Китая может прибывать и убывать, как приливы и отливы океана, это не означало бы, что сама торговля прекращалась во времена изоляционизма Китая. Большой размер Китая, географическое разнообразие и богатство природных ресурсов привели к специализации провинций, и провинциальные барьеры действовали не слишком отлично от барьеров между странами.\n\nВ то время как Северный Китай традиционно производил пшеницу, иной климат и география Южного Китая делали выращивание риса гораздо более выгодным. Если делить китайские регионы еще дальше, одним из традиционных экспортных товаров Юньнани были драгоценные камни, которые находили рынок сбыта дальше на севере Китая, особенно в более богатых городах, таких как Пекин. В то время как империалистические державы стремились открыть Китай для торговли, межрегиональная торговля продолжала происходить, как и в течение тысячелетий, и стала более популярным методом торговли, поскольку международная торговля рассматривалась как логово эксплуатации.\n\nЭкономическая комиссия Юньнани стремилась не только сбалансировать торговлю с западными державами, но и открыть дальнейшую экономическую интеграцию между провинциями. В прошлом юньнаньское олово перевозилось в Ханой для транспортировки на запад, где французы были и посредниками, и потребителями, теперь юньнаньские ресурсы направляются на восток в Гуанчжоу, где кантонская система обеспечит сохранение богатства китайским народом. Хотя это только на провинциальном уровне, [ROOT.GetLeader] уверен, что это модель для движения нации вперед."
 YUN.lategame.206.a: "Китайская солидарность!"
 YUN.lategame.206.b: "Тьфу, кантонцы и немцы крадут у нас!"

 YUN.lategame.207.t: "Основа китайского общества"
 YUN.lategame.207.d: "Потомки Желтого императора и императора Янь, китайское общество насчитывает пять тысяч лет. Китайская цивилизация впервые возникла вдоль реки Хуанхэ и стала в основном базироваться на Центральных равнинах (Чжунъюань), регионе, простирающемся от Хуанхэ на севере до Янцзы на юге. Располагаясь вдоль двух крупных речных систем, древние китайцы стали очень сельскохозяйственным народом, черта, которая передавалась тысячелетиями. Даже в современную эпоху, когда промышленные чудеса появляются каждый день в Европе и Америке, китайский народ по большому счету остался сельскохозяйственным, к лучшему или к худшему.\n\nСчитается, что даже если Китай модернизируется и индустриализируется по западным образцам, Срединное царство все равно будет укоренено в сельском хозяйстве, хотя и с использованием более современных методов и технологий. Таким образом, китайская сельскохозяйственная и земельная реформа была центром китайской модернизации. Китайское сельское хозяйство и общество всегда были неравными, и современный Китай не исключение. Китайские крестьяне составляют большую часть населения, но небольшой класс помещиков владеет большей частью земли.\n\nБолее радикальные мыслители считают, что китайское правительство должно принять эгалитарную и распределительную программу «земля пахарю», чтобы наконец дать крестьянству справедливое вознаграждение. Более умеренные реформисты считают, что для подлинной модернизации китайского сельского хозяйства устойчивый темп реформ, начавшийся в последние годы династии Цин, принесет подлинную социальную мобильность и модернизацию, не вызывая хаоса насильственного искоренения помещичества и рисков тотальной конфронтации с джентри. Выбор за [ROOT.GetLeader]."
 YUN.lategame.207.a: "Земля пахарю — цель Национальной революции."
 YUN.lategame.207.b: "Реформа по юньнаньскому методу — наше вечное стремление."

 YUN.lategame.208.t: "Земля пахарю"
 YUN.lategame.208.d: "Имея корни в восстании тайпинов и будучи основанным как революционная республиканская партия, Гоминьдан долгое время представлял себя как расплату китайского крестьянства с тиранией Пекина и декадансом двора Цин. Когда стало очевидно, что наследие коррупции Цин унаследовали Юань Шикай и его отряд — Клика Бэйян, Гоминьдан посвятил себя свержению первой Республики и созданию подлинно современной республики во главе с Сунь Ятсеном и его революционными товарищами.\n\nКонфликт между севером и югом завершился Северным походом, в котором мечта Гоминьдана была разрушена. Вопреки всему, остатки Гоминьдана в Гуйчжоу навели порядок в провинции Юньнань и создали плацдарм для Национальной революции на материковой части Китая. Хотя Национальная революция еще не увенчалась успехом, Генералиссимус [ROOT.GetLeader] готов начать освобождение китайского народа на провинциальном уровне в качестве эксперимента для политики, которая будет принята на национальной арене.\n\nУчитывая центральное положение сельского хозяйства в китайском обществе, неудивительно, что аграрная реформа вошла в повестку дня Генералиссимуса. Для Чэнь Лифу из Клики СС Гоминьдан должен сформировать несколько ключевых министерств, включая, помимо прочего, экономическую комиссию, министерство внутренних дел и министерство финансов, чтобы точно оценивать и разрабатывать рекомендации в различных провинциях. Хотя этот бюрократический подход находит поддержку у Дай Цзитао, он горячо оспаривается синерубашечниками.\n\nДля таких провидцев-синерубашечников, как Тэн Цзе и Чжоу Фан, причина провала сельской экономики Китая заключалась в обременительной земельной политике и специальных налогах, эпизодических переоценках, непредсказуемых дополнительных налогах и подрыве стимулов и предприятий крестьян. Чэнь Чэн, восходящая звезда в Клике Вампу и лидер малой фракции Гражданского строительства, предлагает сочетание двух предложений с акцентом на сельские массы, борьбу с коррупционным накоплением богатства и использование государственного распределения товаров для борьбы с инфляцией, терзающей Китай. Партия в тупике, только Генералиссимус может решительно объявить политику земельной реформы Гоминьдана."
 YUN.lategame.208.a: "Освобождение крестьян приходит с революционной бюрократией!"
 YUN.lategame.208.b: "Первенство сельским массам!"

 YUN.lategame.209.t: "Треугольная торговля"
 YUN.lategame.209.d: "После восстановления Мин и китайского династического государства во главе с ханьцами правительство все больше замыкалось в себе, и изоляционизм снова стал политикой нации. Когда Цин завоевали династию Мин, изоляционизм сохранился, и внешняя торговля была ограничена портом Гуанчжоу, который действовал в рамках кантонской системы, создававшей торговый дисбаланс в пользу Китая. Желая нарушить дисбаланс, британцы решили контрабандой ввозить опиум, чтобы компенсировать импорт китайского чая на свои острова. Опиум захватил Китай штурмом до такой степени, что серебро стало дефицитом в Срединном царстве, а зависимость стала обычным явлением.\n\nКитайский император попытался бороться с контрабандой опиума, что привело к Опиумным войнам и унизило давно гордых китайцев. Контрабанда опиума и внутреннее производство усилились, и в экономике Юньнани стал доминировать экспорт опиума. В результате возникла треугольная торговля, при которой юньнаньский опиум продавался в Ухане, который, в свою очередь, использовался для покупки хлопка и пряжи у западных держав в Гуанчжоу и Тонкине. Губернаторство Цай Э и Тан Цзияо видело попытки обуздать опиум, но нехватка денег от производства опиума ударила по провинциальной администрации.\n\nАдминистрация Куньмина не была склонна участвовать в реконструкции сельских районов, но министерство финансов попыталось продать запасы зерна в зернохранилищах окрестных городов Куньмина, так как к тому моменту бандитизм в Юньнани был на низком уровне, особенно по сравнению с Гуанси и Сычуанью. Теперь, когда у власти находится Гоминьдан, подавление мака снова было введено в действие, но проблемы, которые преследовали Тан Цзияо и Цай Э, остаются, и доходы провинции в Юньнани резко упали с момента введения подавления мака. Многие задаются вопросом, не лучше ли было просто оставить подавление опиума на будущее время и ввести только налогообложение опиума, но высокопоставленные чиновники в администрации непреклонны в том, что у опиума нет будущего в Революционном Китае, и модель Юньнани укажет путь."
 YUN.lategame.209.a: "Опиум — это болезнь, которую нужно искоренить."

 YUN.lategame.210.t: "Сохранение курса"
 YUN.lategame.210.d: "В последние годы династии Цин после Боксерского восстания правительство предприняло беспрецедентный поворот к политической и экономической модернизации. В Юньнани наместник Ли Цзинси взялся за амбициозную задачу централизации провинции, модернизации экономики и отмены иностранного господства. Ли оказался ограничен сопротивлением местных джентри, и его реформы были в конечном итоге прерваны Синьхайской революцией. Преемниками Ли стали Цай Э и Тан Цзияо, солдаты Новой армии Юньнани, которые стали сочувствовать революции.\n\nЦай Э и Тан Цзияо оба правили Юньнанью с реформистскими взглядами, но милитаризм, бедность, опиум, джентри и эра милитаристов помешали полному проведению крупных реформ. Несмотря на это, настрой на реформы всегда оставался высоким в Куньмине. После урегулирования неотложных военных вопросов администрация Куньмина снова перенаправила свое внимание на задачу сельскохозяйственной реформы и модернизации. Существует скрытая вера в то, что, наконец, то, что началось с Ли Цзинси, наконец достигнет своего естественного завершения с [ROOT.GetLeader]."
 YUN.lategame.210.a: "Путешествие должно быть завершено."

 YUN.lategame.211.t: "Опиумный вопрос"
 YUN.lategame.211.d: "После Опиумных войн контрабанда опиума и производство мака усилились, и в экономике Юньнани стал доминировать опиум. Возникла треугольная торговля, при которой юньнаньский опиум продавался в Ухане, который, в свою очередь, использовался для покупки хлопка и пряжи у западных держав в Гуанчжоу и Тонкине. Наместник Ли Цзинси попытался централизовать налогообложение опиума, а Цай Э и Тан Цзияо попытались подавить опиум. Тан использовал общественные кампании, которые включали лекции, брошюры, публичные демонстрации и антиопиумные песни. Он также попытался взимать штраф в размере трех юаней за каждый му земли, засаженный маком.\n\nТан надеялся освободить больше пахотных земель для производства продовольствия, хотя возможности правительства обеспечить соблюдение этого за пределами Куньмина были настолько ограничены, что правительство официально решило, что штраф не будет применяться к югу от Куньмина, чтобы избежать беспорядков, которые могли бы нарушить работу железной дороги Куньмин — Хайфон. На практике антиопиумные штрафы были неэффективны для сокращения выращивания или потребления и наносили ущерб сельским регионам, что, в свою очередь, увеличивало бандитизм. Хотя это основной элемент экономической реформы Юньнани, многие призывают вообще отказаться от мер по подавлению мака из-за плохих результатов и вместо этого полагаться на доходы от опиума для модернизации экономики в других областях."
 YUN.lategame.211.a: "Подавление приведет к долгосрочному процветанию."
 YUN.lategame.211.b: "Война с опиумом развивалась не обязательно в нашу пользу..."

 YUN.lategame.212.t: "О Миньшэне"
 YUN.lategame.212.d: "Размышления одного из ведущих политических теоретиков Гоминьдана Дай Цзитао об экономической ситуации в Китае не имеют себе равных по амбициям и революционному пылу. Некогда левый подстрекатель, Дай Цзитао перешел к новым правым, осознав сикофантскую природу, которую парижские паразиты оказывали на китайское общество, и состряпал новое понимание принципов Сунь Ятсена в чистом, неограниченном китайском понимании. В отличие от левых, которые предали бы китайскую революцию ради международного социалистического дела, видение Даем Гоминьдана обязано лояльностью только китайской нации.\n\nВ отличие от либералов, которые предали бы массы Китая ради бесполезных банальностей, Дай понимает, что освобождение китайских классов должно быть первоочередной задачей. Однако классы Китая — это не инструменты, которые нужно использовать друг против друга; нет, классы Китая — это часть большего социального тела. Чтобы достичь этой великой гармонической конвергенции, Дай рассуждает, что революционные активисты должны быть дисциплинированы, чтобы продвигать единое видение Гоминьдана, которое охватывает все классы и не имеет более высокого призвания, чем национальное возрождение.\n\nГедонистический и анархический хаос, который пропагандируют социалисты, не имеет места в китайской революции, и массы не должны быть сбиты с пути такими призывами. Нет, массы — это мощная и все же непредсказуемая сила, которая требует дисциплинированной революционной гвардии, чтобы пасти их к славе. Этим пастырем является Гоминьдан, и партия принесет Китаю новый рассвет.\n\nЗападные концепции, такие как наемный труд и прибавочная стоимость, вообще не имеют отношения к китайской нации, поскольку труд в Срединном царстве является трансисторическим. Таким образом, когда Национальная революция объединит классы как единую машину производительности, которая принесет парящие высоты развития, сотрудничества и процветания, китайский народ достигнет этого общего благосостояния своим собственным трудом, стремлением всех наций."
 YUN.lategame.212.a: "За наше общее благосостояние!"

 YUN.lategame.213.t: "Националистическое десятилетие"
 YUN.lategame.213.d: "Под флагом националистов большая часть Китая была объединена. Крестьяне больше не вынуждены жить в постоянном насилии, так как война вспыхивает в провинциях каждый месяц. С каждым днем промышленность Китая адаптируется к современному веку и становится все ближе к паритету с западными державами. Китай сегодня на голову выше Китая, оставленного Юань Шикаем. Мечта доктора Суня о сильной и справедливой Китайской Республике находится на грани успеха. Свободные провинции нашей республики наслаждаются благами экономической интеграции, модернизации транспорта, и китайский бизнес процветает под справедливым надзором правительства. На востоке западные державы больше не пользуются всеми привилегиями, которые у них были всего десять лет назад. Производительные массы Китая чувствуют себя бодрыми благодаря дисциплинированной Китайской революции. Там, где рабочие лидеры когда-то пали перед призраком социализма, они теперь идут против стадного менталитета и направляют рабочих к предприятию развития. Конечно, предстоит еще много работы. Полная всеобъемлющая земельная реформа остается неуловимой, поскольку военное объединение имеет приоритет, а милитаристы по-прежнему правят большей частью глубинки. Тем не менее, Национальная революция только началась, и грядет день, когда Белое солнце будет развеваться от Харбина до Дали, от Тайбэя до Дихуа!"
 YUN.lategame.213.a: "Чжунхуа Миньго Ваньсуй!"

##Section 4c (400-599): Late Game KMT Political Events

#Hu Hanmin Crisis Initial Chain (400-409)
 YUN.lategame.400.t: "Триумф Северного похода"
 YUN.lategame.400.d: "Последние звуки спорадической ружейной и пушечной стрельбы были окончательно подавлены, когда флаг Синего неба, Белого солнца и Совершенно красной земли был поднят над Запретным дворцом и Национальной ассамблеей. Остатки Бэйянского правительства, такие как Пятицветный флаг и официальная печать нации, были сорваны, и солдаты из каждого городского квартала были замечены раздающими пропагандистские листовки в память о завершении видения покойного премьера.\n\nБыло ли необходимо братское кровопролитие? Наша партия всегда выступала за использование мирных средств для создания единого правительства. С одной стороны, правительство Китайской Республики должно быть создано самим китайским народом; с другой стороны, благосостояние народа находится в состоянии упадка и не может снова вынести бедствие внутренних распрей. Поэтому, когда покойный доктор Сунь отправился на север, он немедленно призвал всю страну созвать Национальную конференцию для разрешения текущей ситуации. Кто знал, что предатель Дуань открыто согласится на Национальную конференцию, но тайно откажется, а империалисты подстрекали милитаристов стать более жестокими.\n\nНаша партия умоляет народ и уничтожает предателей ради национального спасения. Нам все равно, успех это или неудача, и мы без колебаний пойдем на любые жертвы. Чтобы соблюсти стратегию, объявленную Вечным Премьером, наша партия выполнила свой божественный долг. Люди по всей стране, сочувствующие доктринам и политическим платформам нашей партии, перенесут свои симпатии на роль нашей партии в новой эре революции. Скоро успех национальной революции станет ближе."
 YUN.lategame.400.a: "Да здравствует единое правительство!"
 YUN.lategame.400.b: "Да здравствует успех Национальной революции!"
 YUN.lategame.400.c: "Да здравствует свобода и освобождение китайского народа!"
 YUN.lategame.400.e: "Да здравствует Китайская Национально-революционная армия!"

 YUN.lategame.401.t: "Напряженность в Центральном комитете"
 YUN.lategame.401.d: "Генералиссимус Хэ Инцинь, возможно, приписал себе львиную долю заслуг за победу Национально-революционной армии над их противниками во время Северного похода, но растет чувство тревоги по поводу его полномочий как президента. Оппозиция против него накапливалась в течение некоторого времени, и победы на поле боя не всегда утоляли недовольство его руководством.\n\nВ одном конкретном случае Ху Ханьминь и Центральный исполнительный комитет одобрили предложение, на что Чэнь Лифу сказал: «Мы должны дождаться мнения Хэ Инциня». Хэ Инцинь находился на линии фронта во время разбирательства, и комитет был настолько разгневан, что прежде, чем Ху Ханьминь смог ответить сам, другой заметил: «Если на решение партии все еще нельзя рассчитывать, зачем нам проводить собрание для его обсуждения?»\n\nЕго власть над собственной правящей коалицией, которая позволяла ему в значительной степени обходить своих критиков в прошлом, также начинает колебаться. Премьер Дай Цзитао и вице-премьер Чжан Цюнь, хотя и лояльны до сих пор и обычно могут быть противопоставлены друг другу, находятся в противоречии с военным доминированием правительства — надеясь обеспечить переход к более гражданскому правлению, сохранив Хэ Инциня на посту президента. В рядах НРА соответствующие клики Чэнь Чэна и Тэн Цзе также испытывают сомнения, полагая, что революция движется недостаточно быстро под консервативным правлением генерала Хэ.\n\nПартия начинает разваливаться изнутри, сталкиваясь с противоречивыми требованиями направления и демократии на фоне опасений внешних угроз. Хэ Инцинь начал выдвигать решение: под давлением определенных крыльев партии он предложил разработку Временной конституции. Хотя детали все еще обсуждаются, он тем не менее созвал срочный Национальный партийный конгресс Гоминьдана, чтобы собраться для окончательного согласования деталей."
 YUN.lategame.401.a: "Может ли это быть решением проблем нашей партии?"

 YUN.lategame.402.t: "Ху Ханьминь осуждает Конституцию [GetYear] года"
 YUN.lategame.402.d.intro: "Ху Ханьминь, упрямо ортодоксальный суньист, был самым ярым противником Временной конституции. Согласно теории трех этапы национального развития доктора Суня, конституция не может быть разработана до конца Политической опеки, когда национальный съезд, собранный из всех партий и фракций Китая, сможет принять участие в ее разработке в рамках подготовки к Конституционной фазе. В таком случае временная конституция — это не компромисс, а извращение учений доктора Суня.\n\nПо мере того, как конкретное содержание Временной конституции было обнародовано, возникла дальнейшая критика. По большей части Временная конституция просто подтверждает то, что уже существует — партийное государство и политическая опека будут официально кодифицированы в закон, Три народных принципа доктора Суня будут соблюдаться, Пять ветвей власти будут созданы, и правительство будет уважать разделение властей между центральным правительством и региональными правительствами, за исключением экономических вопросов, где Комиссия по национальной реконструкции будет напрямую реализовывать повестку дня доктора Суня. Однако поспешный характер этой конституции и ее очевидное отсутствие защиты прав человека (помимо религиозных свобод, личные свободы, как говорят, определяются законом, который можно изменить по желанию) вызвали критику со стороны многих умеренных в партии и либеральных аутсайдеров.\n\nДля Ху Ханьминя это был момент, которого он ждал. Твердый демократический централист, он не желает одобрять какой-либо курс действий, который напрямую разделяет партию."
 YUN.lategame.402.closer: "Ху Ханьминь начал открытую кампанию, чтобы остановить принятие Временной конституции и потребовать отставки Хэ Инциня. Он уже быстро собрал большую группу последователей, включая многих ведущих политиков, милитаристов и интеллектуалов, которые, как говорят, сформировали тайный Великий союз защиты партийной власти, чтобы добиться смещения Хэ Инциня."
 YUN.lategame.402.d.JapanIsDead: "$YUN.lategame.402.d.intro$ Однако с исчезновением японской угрозы оправдание Хэ Инцинем военного правительства в значительной степени испарилось.\n\n$YUN.lategame.402.closer$"
 YUN.lategame.402.d.IsAtWar: "$YUN.lategame.402.d.intro$ Однако, поскольку страна все еще находится в состоянии войны, а предложение Хэ Инциня непопулярно и вызывает разногласия, он уязвим как никогда.\n\n$YUN.lategame.402.closer$"
 YUN.lategame.402.d.IsAtPeace: "$YUN.lategame.402.d.intro$ Однако, поскольку страна наконец-то переживает краткую передышку от хаоса войны, многие чувствуют себя более комфортно, призывая к переменам.\n\n$YUN.lategame.402.closer$"
 YUN.lategame.402.a: "Мы будем сопротивляться этой тирании и поддерживать волю доктора Суня!"
 YUN.lategame.402.b: "Эти жалкие предатели заплатят за это!"

 YUN.lategame.403.t: "Дебаты о Временной конституции"
 YUN.lategame.403.d: "Поскольку дебаты продолжаются во время Национального конгресса, фигуры из различных клик высказывались в ходе многодневных заседаний. Говорят, что вице-премьер Чжан Цюнь является одним из самых активных сторонников этого предложения. Его враги утверждают, что он однажды сказал, что «у Клики Вампу есть оружие в качестве поддержки, у Клики СС есть массы в качестве базы, а Клика политической науки выглядит впечатляюще, но за ней ничего нет». Достоверность этой цитаты оспаривается, но бесспорным является то, что Клика политической науки, как ожидается, выиграет больше всех от перехода от случайного партийного государства к более формальному правительству.\n\nОни становятся странными союзниками со многими левыми, либералами и регионалистами, которые аналогичным образом призывали к временной конституции. Они утверждают, что это повысит власть народа за счет Гоминьдана и станет их шансом создать более плюралистическое правительство. Предложению, конечно, категорически противились Ху Ханьминь и многие фракции Московского комитета, которые, как правило, доминируют в партийных делах и могут потерять больше всех, если будет принята временная конституция.\n\nГоворят, что Дай Цзитао и Клика СС более амбивалентны. Чэнь Лифу официально заявил, что просто слишком рано начинать этот переход и что конституция пока не нужна. Единство для них имеет приоритет. С другой стороны, они не хотят занимать твердую позицию против президента и по большей части советуют компромисс между Вампу и Москвой."
 YUN.lategame.403.a: "Эта конституция обеспечит свободу и стабильность!"
 YUN.lategame.403.b: "Эта конституция — фарс, маскирующий тонко завуалированную диктатуру!"
 YUN.lategame.403.c: "Мы должны искать здесь разумное решение."

 YUN.lategame.404.t: "Армия взвешивает Конституцию [GetYear] года"
 YUN.lategame.404.d: "Хотя некоторые окрестили новую конституцию Конституцией Генералиссимуса или Конституцией Вампу, Национально-революционная армия гораздо более разделена по этому вопросу, чем большинство сторонних наблюдателей могли бы подумать. В то время как старая гвардия Вампу в основном сплотилась вокруг Хэ Инциня, фракции молодой гвардии выразили некоторое частное несогласие, и многие из основных офицеров вынуждены выбирать сторону.\n\nЛю Цзяньцюнь тщательно подбирал слова, написав в «Society Mercury», что первым принципом национал-популизма является «организация сильной нации и создание сильного правительства». Он продолжает говорить, что «величайший недостаток системы комитетов заключается в том, что все ищут оправдания, обвиняют друг друга и тем самым рассеивают внутреннюю силу партии... в революционной реконструкции никто не действует... как только созывается собрание, возникают разногласия. Количество гражданских войн почти прямо пропорционально количеству собраний». Хотя он был осторожен, чтобы не слишком сильно противостоять конституции своего начальника, хорошо известно, что Общество синерубашечников находит идею конституции, ограничивающей действия правительства, анафемой.\n\nЧэнь Чэн и Клика гражданского строительства также были осмотрительны в своих публичных мнениях, не желая привлекать возмездие со стороны своего начальства. Как и многие другие левые, они, как говорят, выразили некоторый интерес к конституции и общественной подотчетности, хотя многие цинично относятся к намерениям Клики политической науки и беспокоятся об отклонении от давней партийной ортодоксии."
 YUN.lategame.404.a: "Мы верим в Хэ Инциня и верим в его конституцию."
 YUN.lategame.404.b: "Когда мы поймем, что необходимы решительные действия?"
 YUN.lategame.404.c: "Но создаст ли эта конституция мир или еще большую войну?"

 YUN.lategame.405.t: "Хэ Инцинь планирует самопереворот!"
 YUN.lategame.405.d: "После завершения подготовки содержания Временной конституции последним необходимым шагом является ратификация Национальным собранием, в котором участвуют сотни делегатов со всей страны. Места распределяются не только по провинциям и городам, но и по профессиональным группам, профсоюзам, ассоциациям фермеров, торговым палатам, образовательным ассоциациям, общинам зарубежных китайцев и чиновникам от самой партии. Учитывая обстоятельства, такая договоренность — непростая задача: в районах, не оккупированных в настоящее время властями Гоминьдана, делегаты часто де-факто назначаются партией для их представления.\n\nС ростом оппозиции и Ху Ханьминем во главе, существует искреннее опасение, что Временная конституция не наберет большинства в 2/3 голосов, необходимого для ее принятия. Ху Ханьминь, как премьер Законодательного Юаня, имеет существенное влияние на ход разбирательства, и даже если Клика СС и Клика политической науки используют все грязные трюки в книге и весь вес партийного аппарата, нет гарантии, что голосование пойдет по их пути. Дай Цзитао, получив информацию от братьев Чэнь и их партийных организаторов, настоятельно посоветовал не продвигать это предложение.\n\nОднако уже слишком поздно, по крайней мере с точки зрения генералиссимуса Хэ. Все больше и больше голосование становится референдумом по лидерству самого Хэ Инциня. Угрожаемый и, возможно, оскорбленный растущей непокорностью южных лидеров, Хэ Инцинь принял решение. Через два месяца, как раз перед созывом Национального собрания, он арестует предателя Ху Ханьминя и расформирует вооруженных заговорщиков, поддерживающих его. В ходе быстрой кампании он планирует разоружить внутреннюю оппозицию.\n\nЧжан Цюнь может быть одним из главных архитекторов Временной конституции, но это предложение встревожило его. Точно так же Чэнь Чэн и его союзники выразили беспокойство по поводу опасностей такой крупной операции. Но для Тэн Цзе и многих других, кто возмущен неуклюжей неэффективностью партийного государства, это момент истины."
 YUN.lategame.405.a: "Ставим все на одну карту..."

 YUN.lategame.406.t: "Хэ Инцинь прокладывает путь вперед!"
 YUN.lategame.406.d: "Переворот прошел без сучка и задоринки. Инцинь пригласил ведущих партийных лидеров на званый ужин, и когда Ху Ханьминь прибыл, личная охрана генерала разоружила людей Ху и задержала его вместе с другими ведущими членами Московского комитета. В гостиничном номере Ху были предъявлены обвинения в различных преступлениях, включая заговор с целью убийства президента, свержения правительства и препятствования администрации путем блокирования принятия временной конституции.\n\nВ других местах силы Национально-революционной армии быстро двинулись, чтобы обезопасить южные провинции — устраняя потенциальные угрозы в центре Гоминьдана. Хотя было некоторое сопротивление, по большей части дивизии под руководством Вампу смели региональные силы, и в течение нескольких часов нация была в безопасности.\n\nНа заседаниях Национального собрания было объявлено, что Ху Ханьминь решил уйти в отставку из-за «ухудшения здоровья». Несмотря на попытки цензуры, правда о судьбе Ху Ханьминя постепенно вышла наружу, но большинство предпочло не высовываться. Любая оппозиция Временной конституции угасла с хныканьем. Дай Цзитао и Чжан Цюнь направили обсуждения к принятию, и партия сомкнула ряды вокруг своего теперь уже бесспорного лидера.\n\nГамбит Генералиссимуса окупился: Ху Ханьминь находится под домашним арестом, оппозиция была тщательно расчленена, а лояльные губернаторы установлены по всему югу. Гуандун находится под прямым военным управлением, а Нация потрясена, но в конечном итоге податлива. Хэ Инциню была передана чрезвычайная власть, теперь вопрос в том, как он ее использует? И кто из его лейтенантов в конечном итоге завоюет его ухо."
 YUN.lategame.406.a: "Только чистейшие патриоты должны служить!"
 YUN.lategame.406.b: "Нелояльные партии будут подвергнуты чистке!"
 YUN.lategame.406.c: "Давайте начнем процесс исцеления."
 YUN.lategame.406.e: "Генералиссимус устраняет свою оппозицию."

 YUN.lategame.407.t: "Дебаты о Временной конституции"
 YUN.lategame.407.d: "По мере того, как Национально-революционная армия достигала окраин Пекина, Китай все больше приближался к объединению, но Гоминьдан все больше разделялся. Раскол между левым и правым крыльями партии печально известен, но раскол внутри правых также рос в течение значительного периода времени. Это завершилось формированием фракций «Старых правых», которые в целом поддерживали Ху Ханьминя, и фракций «Новых правых», которые в целом поддерживали Чан Кайши в их соответствующих заявках на власть.\n\nВопрос о Временной конституции стал главной горячей точкой в этом внутрипартийном споре. Ху Ханьминь и его последователи осудили его по идеологическим причинам, утверждая, что почитаемый основатель партии Сунь Ятсен предписал, чтобы конституция не разрабатывалась до конца политической опеки. Однако президент Хэ Инцинь и многие другие интеллектуалы утверждали, что временная конституция повысит подотчетность и создаст более институционализированную структуру для опеки.\n\nПартия раскололась по фракционным линиям, и президент приказал Национальному собранию (с делегатами, только что набранными со всей страны) собраться через два месяца для голосования по предложению. Ходят слухи о возможном насилии, и этот вопрос все чаще рассматривается как референдум о лидерстве самого Хэ Инциня.\n\nОппозиция, называющая себя Великим союзом защиты партийной власти, разослала предложения региональным фракциям по всей стране в надежде заручиться нашей поддержкой против Временной конституции. О чем умалчивается, так это о том, что это будет означать нашу оппозицию диктатуре Хэ Инциня и нарисует мишень на наших спинах."
 YUN.lategame.407.a: "[ROOT.GetLeader] выступает против тирании!"
 YUN.lategame.407.b: "[ROOT.GetLeader] уступает президенту."

 YUN.lategame.408.t: "[FROM.GetName] выступает против Конституции!"
 YUN.lategame.408.d: "Великий союз защиты партийной власти искал союзников по всей стране, и неудивительно, что они нашли много оппортунистов среди региональных милитаристов. [FROM.GetLeader] со своей базы в [FROM.Capital.GetCapitalVictoryPointName] выступил с обращением, осуждающим временную конституцию на основании ее несовместимости с директивами доктора Суня, повторяя слова внутрипартийной оппозиции. Он поклялся помочь потопить предложение, используя свое влияние среди [FROM.GetAdjective] делегатов на предстоящем Национальном собрании.\n\nО чем умалчивается, так это о том, что теперь он твердо поставил себя в компанию тех, кто добивается смещения Хэ Инциня, вводя дополнительные армии милитаристов в потенциальную повстанческую коалицию. Это подняло престиж [FROM.GetLeader] на национальном уровне, что уже слишком поздно предотвращать. Однако мы можем с помощью различных закулисных методов, таких как убийства, взятки и цензура, работать над смягчением его влияния в более широкой партии."
 YUN.lategame.408.a: "Ряды Альянса продолжают пополняться."
 YUN.lategame.408.b: "Мы должны положить конец [FROM.GetAdjective] вмешательству."

 YUN.lategame.409.t: "[FROM.GetName] склоняется перед нашей властью"
 YUN.lategame.409.d: "Великий союз защиты партийной власти искал союзников по всей стране, надеясь привлечь различных оппортунистов среди региональных милитаристов. Однако не каждого губернатора так легко убедить, и [FROM.GetLeader] прислал нам телеграмму из [FROM.Capital.GetCapitalVictoryPointName], заверяя нас в своей неизменной преданности Хэ Инциню.\n\nПочему он так поступил, мы можем только догадываться. Возможно, он боится растущей мощи центральной армии или по-прежнему зависит от субсидий центрального правительства для поддержания собственной власти. В качестве альтернативы он может быть обеспокоен внешними угрозами со стороны империалистических держав или искренне озабочен национальным единством или судьбой партии. В любом случае это удар по Ху Ханьминю и его усилиям по подрыву президента."
 YUN.lategame.409.a: "Практические соображения удержали их в строю сегодня."
 YUN.lategame.409.b: "Идеализм — это то, что сохраняет единство нашего партийного государства."

#Hu Hanmin Crisis Explodes (410-419)
 YUN.lategame.410.t: "Ху Ханьминь арестован!"
 YUN.lategame.410.d.intro: "Кризис Ху Ханьминя начался со званого ужина. Ведущие партийные чиновники были приглашены на пир накануне созыва Национального собрания, и когда Ху Ханьминь прибыл, он был немедленно арестован. Ху были предъявлены обвинения в различных преступлениях, включая заговор с целью убийства президента, свержения правительства и препятствования администрации путем блокирования принятия временной конституции.\n\nБыло подано заявление об отставке, в котором утверждалось, что Ху Ханьминь уходит на пенсию ради своего здоровья, однако весть о судьбе Ху быстро распространилась по всей стране. Неуклюжая попытка Хэ Инциня «прояснить» произошедшее, заявив, что Ху ушел в отставку добровольно, потому что знал, что временная конституция будет принята вопреки его желаниям, была быстро встречена насмешками."
 YUN.lategame.410.d.HighZeal: "$YUN.lategame.410.d.intro$\n\nПопытка Национально-революционной армии подавить южных милитаристов провалилась на фоне волны народного недовольства. Люди просто слишком возбуждены, и протестующие вышли на улицы по всей стране. Газеты бросили вызов цензуре, публикуя передовицы против Хэ Инциня. Партийные кадры угрожают массовой отставкой, и, что вызывает беспокойство, многие дивизии отказались выполнять дальнейшие приказы.\n\nФанатики в Клике СС и Клике гражданского строительства активизировались, и Судебный Юань, в котором доминирует Московский комитет, официально потребовал освобождения Ху. Тем временем Клика политической науки была ослаблена дезертирством, в то время как Синерубашечники страдают от своей репутации инструментов жестокости Генералиссимуса.\n\nПо иронии судьбы, одна из немногих вещей, в которых сходятся лоялисты и недоброжелатели Хэ Инциня, — это то, что здоровье Ху Ханьминя, вероятно, ухудшается. Задержанный в отеле, известном содержанием политических заключенных, а затем в собственном доме с плохой циркуляцией воздуха, стресс кризиса, как говорят, довел артериальное давление Ху Ханьминя до опасного уровня. Он отказался от помощи врачей, присланных генералом Хэ, а его сочувствующим отказали его охранники, что заставило многих беспокоиться о его долгосрочной безопасности по мере развития кризиса."
 YUN.lategame.410.d.LowZeal: "$YUN.lategame.410.d.intro$\n\nТелеграммы наводнили страну, поскольку партийные отделения требуют ответов. Зарождающийся цинизм в движении Гоминьдана отмечался в течение некоторого времени, но немногие могли предсказать чистый объем ярости и разочарования, который был высвобожден. Солдаты, посланные для подавления южного инакомыслия, либо отступили на фоне протестов, либо дезертировали, так как совершенно очевидно, что даже партия и армия потеряли веру в руководство Хэ Инциня — разгневанные коррупцией режима, жестокостью железной руки и отсутствием демократии.\n\nКлика СС и Клика гражданского строительства были опустошены, их члены либо дезертировали с отвращением, либо радикализировались, либо поддались всепроникающей коррупции в правительстве. Тем временем по мере развития кризиса дебаты о Временной конституции вышли на передний план национальной политики — и фигуры выстроились либо за ее принятие, либо за отклонение, усиливая технократов в Клике политической науки и экстремистов Общества синерубашечников.\n\nОжидается, что Национальное собрание все же соберется в ближайшие дни, однако, поскольку страна быстро катится к кризису, многие задаются вопросом, будет ли гражданская война. На данный момент общество сильно разделено, и нация ждет, затаив дыхание."
 YUN.lategame.410.a: "Наши убеждения помогут нам пройти через это!"
 YUN.lategame.410.b: "Всплеск духа посреди циничного общества."

 YUN.lategame.411.t: "Тонущий корабль"
 YUN.lategame.411.d: "По мере того как хор ужаса нарастает, лояльность Центрального исполнительного комитета начинает колебаться. Спасаясь от ареста, многие члены Великого союза защиты партийной власти отступили в сочувствующие опорные пункты. Усилия по отстранению Хэ Инциня от власти ускорились, причем давние гранды Клики Московского комитета Цзоу Лу, Гу Инфэнь, Сяо Фочэн и Линь Сэнь (около трети центрального наблюдательного комитета партии) решили объявить импичмент президенту. Они выдвинули шесть обвинений:\n\n1. Построение собственной империи и присвоение диктаторских полномочий\n2. Преднамеренное разрешение социалистам захватить различные провинции\n3. Назначение Чэнь Гофу на различные посты в партии\n4. Доверие таким людям, как Кун Сянси, который обогатился\n5. Доверие старым бюрократическим чиновникам и милитаристам, таким как Ян Юнтай и Чжан Шичжао\n6. Незаконный арест Ху Ханьминя, Сюй Чунчжи и Цзюй Чжэна (среди прочих).\n\nВ центре обсуждения было не только злоупотребление властью, но и некомпетентность в управлении. Многие обвиняют Хэ Инциня в стремлении превратить президентство (задуманное как парламентский председатель) в личную диктатуру, что генерал Хэ попытался опровергнуть, выступив с публичной речью, отметив, что Национальное собрание лишь разрабатывает временную конституцию, а не расширяет президентские полномочия.\n\nПоскольку фурор почти не подает признаков стихания, Хэ Инцинь оказывается все более изолированным в своей штаб-квартире. Когда сегодня утром он наконец получил отставку Дай Цзитао с поста премьера Исполнительного Юаня, стало ясно, что ситуация (по крайней мере, в ее нынешнем виде) несостоятельна. В одном последнем гамбите Хэ Инцинь решил подать в отставку вместе с Даем «во имя национального единства», назначив Чжан Цюня и Чэнь Гофу «наблюдать за переходом». Он рассчитывает на то, что новый кабинет будет слишком слабым, а оппозиция — слишком громоздкой, чтобы править долго, доказывая его правоту в том, что его твердая рука необходима для функционирования режима."
 YUN.lategame.411.a: "Сможет ли нация выжить без генерала Хэ?"

 YUN.lategame.412.t: "Дерзкий гамбит Чжан Цюня"
 YUN.lategame.412.d: "Поскольку и Хэ Инцинь, и Дай Цзитао (по крайней мере временно) выбыли из игры, назначение военного министра Чжан Цюня на пост президента было быстро подтверждено запаниковавшими членами Центрального исполнительного комитета. Избранный президент оказался гораздо более свободомыслящим, чем большинство считало, и его первым шагом на посту было назначение Ян Юнтая премьером Исполнительного Юаня вместо Чэнь Гофу.\n\nОшеломленный Центральный исполнительный комитет, который провел последние несколько лет, фактически штампуя волю президента, неловко одобрил назначение. Правительство Чжана-Яна быстро перешло к назначению сочувствующих министров из мозгового треста Клики политической науки в кабинет, пытаясь оттеснить своих соперников в Клике СС. Точно так же Чжан Цюнь собрал небольшую клику союзных офицеров в Национально-революционной армии, включая генералов Ли Гэньюаня, Лай Шихуана и Сюн Шихуэя, с приказами держать армию под контролем.\n\nЧжан в своем поспешном массиве публичных обращений и речей перед Национальным собранием попытался укрепить свое положение. Он подчеркнул необходимость единства и переговоров с Южно-китайским политическим советом, а также подтвердил желание Клики политической науки принять временную конституцию. Как он намерен примирить эти две цели, он не сказал, и, учитывая, насколько острым был этот вопрос, это вряд ли будет легко. Возможно, он делает ставку на то, что страх возвращения Хэ Инциня (и его мести) побудит партийных умеренных к действию, но если это так, он делает очень опасную ставку."
 YUN.lategame.412.a: "Клика политической науки делает еще одну заявку на власть."

 YUN.lategame.413.t: "Заговор Дай Цзитао и Клики СС"
 YUN.lategame.413.d: "Дай Цзитао был верным учеником Национальной революции на протяжении десятилетий и весьма прозорливым. Он правильно предсказал, что Чан Кайши потеряет жизнь в борьбе с Ван Цзинвэем, и он правильно предсказал, что неуклюжая попытка Хэ Инциня разрешить свой спор с Ху Ханьминем будет иметь обратный эффект. Теперь он верит, что Чжан Цюнь, последний военный человек, взявший бразды правления в Китае и, вероятно, наименее принципиальный, падет.\n\nДай полон решимости быть тем, кто восстанет из пепла. Исторически будучи скорее фигурой второго плана, хроническое бесхозяйственность партии и интенсивность кризиса подтолкнули Дая к более активной роли. Его своевременная отставка позволила ему избежать последствий ареста Ху Ханьминя с меньшим ущербом, чем генералу Хэ, а его длительное пребывание в партии дало ему больше легитимности, чем Чжан Цюню. По его словам, он единственный, кто может по-настоящему преодолеть разрыв между буйными военными и неуправляемой гражданской партией, при этом придерживаясь принципов, изложенных доктором Сунь Ятсеном.\n\nОн вряд ли одинок в этой оценке. Крупные партийные деятели исторически избегали, если не прямо осуждали формирование незаконных внутренних фракций, и, верный форме, господин Дай тоже. Но неоспоримо, что большинство последователей, объединяющихся вокруг него, известны как Клика СС, возглавляемая недавно отвергнутым Чэнь Гофу и его младшим братом Чэнь Лифу.\n\nБратья Чэнь (которые, возможно, дали название Клике СС) работали над организацией заговора в поддержку Дай Цзитао, используя свое влияние на многих законодателей и партийных функционеров, чтобы официально отвергнуть Временную конституцию на Национальном собрании. Это нанесло бы смертельный удар по заявлениям Чжан Цюня и Ян Юнтая о том, что они являются эффективными управляющими партии, и последующий импульс сделал бы вотум недоверия неизбежным. Дай, вероятно, был бы приведен к присяге в качестве президента после этого и получил бы полномочия найти решение споров с армией и последователями Ху Ханьминя."
 YUN.lategame.413.a: "Клика СС выходит из тени."

 YUN.lategame.414.t: "Синерубашечники обращаются к генералу Хэ"
 YUN.lategame.414.d: "Тэн Цзе и многие другие офицеры Вампу, учившиеся за границей в Японии и России, давно составили секретный план, в котором рекомендовалось создать иллюзорную, мощную организацию внутри клики Вампу, которая служила бы основой нового государства. Поделившись своими планами с Цзэн Коцином, главным секретарем Военного департамента Центрального исполнительного комитета, впечатленный старший офицер пригласил более дюжины отобранных вручную выпускников Вампу на ужин, чтобы обсудить вопросы дальше. Каждый присутствующий затем поклялся завербовать одноклассника, и к третьему ужину у Синерубашечников было более 40 основных членов, набранных из первых шести классов Вампу.\n\nДвижение только росло с тех пор, чему способствовала возросшая радикализация партии и быстрые продвижения выпускников Вампу по мере расширения правительства. Их последняя повестка дня, принятая их внутренним кругом и быстро распространенная по их сетям, состоит в том, чтобы поддержать павшего Хэ Инциня в установлении его «верховной власти и центра веры в умах всего народа».\n\nДелегация во главе с Тэном и Цзэном прибыла в дом Хэ Инциня через несколько дней после его отставки на встречу, организованную Лю Цзяньцюнем. Генерал, который рассчитывал на поддержку своих товарищей из Вампу, жаждал услышать их похвалы и их мольбы о возвращении к власти.\n\nВ частном порядке генерал Хэ выразил тревогу по поводу бандитизма своих новых союзников, надеясь, что консервативный истеблишмент сам будет добиваться его возвращения. Но поскольку Клика политической науки и Клика СС фактически бросили его ради собственных амбиций, Вампу придется довольствоваться. Однако Вампу не контролирует всю Национально-революционную армию, и если они хотят осуществить свой ожидаемый переворот, то все клики Вампу должны объединить ряды. Заручиться поддержкой Чэнь Чэна и Клики гражданского строительства, которые остались в стороне, может быть не так просто, учитывая взаимную напряженность между Чэнем, Хэ и Тэном."
 YUN.lategame.414.a: "Государственная измена? Или спасение республики от самой себя?"

 YUN.lategame.415.t: "Кризис Временной конституции взрывается"
 YUN.lategame.415.d: "С напряжением в партии на рекордно высоком уровне судьба Временной конституции висит на волоске. Борьба за власть в партии приняла рискованный оборот, когда Хэ Инцинь приказал арестовать Ху Ханьминя как раз перед заседанием Национального собрания. Задержание Ху, премьера Законодательного Юаня и одного из ведущих идеологов партии, было встречено массовым возмущением по всей стране, которое вскоре переросло в более широкое осуждение злоупотреблений властью режима Хэ Инциня.\n\nЛоялистами Ху Ханьминя был сформирован Южно-китайский политический совет, возглавляемый Великим союзом защиты партийной власти. Столкнувшись с растущей оппозицией со всех сторон, Хэ Инцинь пошел на дерзкий гамбит — уйдя в отставку вместе с премьером Исполнительного Юаня Дай Цзитао во имя «национального единства».\n\nЧжан Цюнь, бывший военный министр, был приведен к присяге в качестве президента, но перевернул попытку генерала Хэ доказать свою незаменимость, попытавшись сформировать собственное правительство. Поддерживаемый Кликой политической науки, группой технократов, бизнес-магнатов и национал-либеральных политиков, он рассчитывает на принятие Временной конституции, чтобы сплотить страну вокруг себя.\n\nЕго соперники внутри партии сплотились вокруг Дай Цзитао, еще одного крупного интеллектуального титана внутри Гоминьдана. Поддерживаемые националистическими, консервативными партийными кадрами Клики СС, они поклялись потопить Временную конституцию, чтобы способствовать примирению с Южно-китайским политическим советом.\n\nАрмия не готова ждать слишком долго, пока страна скатывается в анархию. Растет обеспокоенность тем, что генерал Хэ Инцинь может попытаться вернуться в политику путем вооруженного переворота. Тем временем лидеры [ROOT.GetRulingParty] должны принять решение о том, как пережить этот следующий, более опасный кризис."
 YUN.lategame.415.a: "Мы поддержим Временную конституцию, чтобы двигать нацию вперед."
 YUN.lategame.415.b: "Мы будем лоббировать против Временной конституции, чтобы стабилизировать нацию."
 YUN.lategame.415.c: "Мы покинем Национальное собрание в знак протеста."

 YUN.lategame.416.t: "[FROM.GetLeader] хвалит Конституцию"
 YUN.lategame.416.intro: "Учитывая масштаб национального кризиса, следует ожидать только того, что более автономные партийные комитеты начнут взвешивать вопросы. [FROM.GetLeader] — губернатор [FROM.GetNameDef], мощного собрания милитаристов, базирующегося в [FROM.Capital.GetCapitalVictoryPointName], которое решило присоединиться к нашей революции. Несмотря на их заявления о лояльности, они никогда не были полностью интегрированы с нашим центральным правительством. Тем не менее, слова [FROM.GetLeader] имеют вес, даже за пределами [FROM.GetAdjective] делегации, хотя при такой изменчивой ситуации никто не знает, насколько далеко это может зайти."
 YUN.lategame.416.closer: "Конечно, еще не поздно смягчить ущерб, нанесенный [FROM.GetLeader]. Можно предлагать взятки, подвергать цензуре публикации, выступать с угрозами и «убирать» делегатов. Но нас следует предупредить, что не только [FROM.GetLeader] будет оскорблен таким курсом действий."
 YUN.lategame.416.d: "$YUN.lategame.416.intro$\n\n[FROM.GetLeader] решил использовать свое влияние, чтобы поддержать Временную конституцию, призвав делегатов из [FROM.GetNameDef] и других мест обеспечить ее принятие и двигать нацию вперед. Поступая так, он неявно поддержал Чжан Цюня и его правительство Клики политической науки.\n\n$YUN.lategame.416.closer$"
 YUN.lategame.416.a: "Их похвала очень ценится."
 YUN.lategame.416.b: "Им не позволят вести других к их глупости."

 YUN.lategame.417.t: "[FROM.GetLeader] осуждает Конституцию"
 YUN.lategame.417.d: "$YUN.lategame.416.intro$\n\n[FROM.GetLeader] решил использовать свое влияние, чтобы лоббировать против Временной конституции, призвав делегатов из [FROM.GetNameDef] и других мест отклонить предложение и начать переговоры с Южно-китайским политическим советом. Поступая так, он неявно поддержал Дай Цзитао и оппозицию Клики СС.\n\n$YUN.lategame.416.closer$"
 YUN.lategame.417.a: "Они правы, Конституция должна быть остановлена!"
 YUN.lategame.417.b: "Их мнение — чепуха, а их голос не имеет значения."

 YUN.lategame.418.t: "[FROM.GetLeader] покидает Собрание"
 YUN.lategame.418.d: "$YUN.lategame.416.intro$\n\n[FROM.GetLeader] решил использовать свое влияние, публично покинув Национальное собрание, призвав делегатов из [FROM.GetNameDef] и других мест сделать то же самое в знак протеста. Поступая так, он неявно отверг легитимность нашего правительства [ROOT.Capital.GetCapitalVictoryPointName] вообще, хотя остановился в шаге от этого. Он также оставил двусмысленным, протестует ли он против ареста Ху Ханьминя, смещения Хэ Инциня или просто против партийного правления Гоминьдана в целом, но в любом случае это добавило еще больше неопределенности в ситуацию.\n\n$YUN.lategame.416.closer$"
 YUN.lategame.418.a: "Ладно, они пожалеют, как только уйдут."
 YUN.lategame.418.b: "При достаточном давлении мы можем заставить их остаться."

 YUN.lategame.419.t: "Наши усилия сорваны!"
 YUN.lategame.419.d: "Хотя авторитаризм в китайском политическом климате хорошо известен, партийное государство Гоминьдан в принципе действует по линиям Демократического централизма. И более того, часть нашей договоренности с центральным правительством неявно предоставляет нам право выражать свое мнение по национальным делам. Несмотря на этот общественный договор, наши усилия по участию в разбирательствах во время Кризиса Временной конституции были жестко подавлены шквалом запугивания, цензуры, а иногда и откровенного насилия. Это не способ поведения для надлежащего правительства, и в наших рядах растет чувство бунтарства."
 YUN.lategame.419.a: "Может быть, однажды мы сами продиктуем предложение."

#Hu Hanmin Crisis Negotiations and Resolution (420-429)
 YUN.lategame.420.t: "Коммуникации с SCPC"
 YUN.lategame.420.d: "Южно-китайский политический совет не является монолитной структурой, особенно когда Ху Ханьминь все еще находится в заключении. Номинально возглавляемый Гу Инфэнем, по иронии судьбы его собственный непотический и автократический стиль руководства породил повстанцев в лагере повстанцев. Объединенные в своем осуждении Хэ Инциня, требовании освобождения Ху Ханьминя и общей связи с Гуандуном, последовавшие события в [YUN.Capital.GetCapitalVictoryPointName] и их собственный замедляющийся импульс помешали им сыграть более активную роль в кризисе.\n\nРастет консенсус в отношении необходимости воссоединения путем переговоров между центральным правительством и SCPC, основанного на освобождении Ху Ханьминя. Сунь Фо и его прогрессивно-либеральная Фракция реконструкции указали на свое предпочтение начать переговоры с Чжан Цюнем и технократической Кликой политической науки. Через доверенных посредников, таких как У Течэн, он изменил свое мнение по вопросу Временной конституции, полагая, что конституция (хотя и со значительными изменениями по сравнению с предложенной) была бы лучшим способом ограничить военное правление.\n\nОднако громкая оппозиция Ху Ханьминя Временной конституции уменьшила поддержку конституции, и более консервативные фигуры, такие как Чжан Цзи, предложили сотрудничать с Дай Цзитао и Кликой СС, чтобы обеспечить результат, более близкий к видению Ху Ханьминя партийного государства, управляемого гражданской интеллигенцией партии.\n\nНеопределенности добавляет то, что многие милитаристы, поддерживающие Южно-китайский политический совет, начали игнорировать директивы SCPC, ослабляя их позиции. Однако примирение между двумя правительствами Гоминьдана является насущной проблемой для многих делегатов Национального собрания, что дает совету рычаги влияния, если они будут действовать решительно. Основная часть членства SCPC находится под контролем так называемой Клики Сишань во главе с Линь Сэнем и Цзоу Лу, которые, вероятно, определят окончательный результат."
 YUN.lategame.420.a: "SCPC настаивает на пересмотре конституции и защите."
 YUN.lategame.420.b: "SCPC требует полного отзыва конституции."
 YUN.lategame.420.c: "Переговоры в конечном итоге проваливаются из-за споров SCPC."

 YUN.lategame.421.t: "Переговоры с левыми"
 YUN.lategame.421.d.CHI_DEAD: "Левые Гоминьдана, никогда не бывшие вполне единым или сплоченным органом, полностью раскололись после их уничтожения в битве. Некоторым из них удалось проникнуть в новое правительство, обычно используя свои личные связи и престиж, хотя они остаются в значительной степени маргинальным и недоверяемым органом внутри правого правительства. Тот факт, что существуют какие-либо закулисные каналы, является свидетельством слабости нынешнего правительства.\n\nВан Цзинвэй и его RCA выразили заинтересованность в работе с Кликой политической науки, даже если он старался не присутствовать лично во время кризиса. Он использовал свое время в квазиизгнании, чтобы потребовать принятия конституции, и недавнее стремление к Временной конституции подтвердило его взгляды. Без сомнения, он ожидает, что его союзники получат щедрые повышения, если они выиграют.\n\nСун Цинлин и ее PAC замышляли свергнуть правое правительство в целом, пытаясь привлечь Чэнь Чэна и его Клику гражданского строительства на помощь. Этот диалог шел в обоих направлениях, однако Чэнь пытался использовать свои собственные связи внутри WMARCA, чтобы потенциально создать базу для собственных усилий по реорганизации правительства.\n\nКонечно, есть много более мелких фракций, ищущих направление. У Четырех старейшин и их Общества Мира есть анархистские корни, но связи со старой гвардией партии. Они предварительно предложили объединиться с Дай Цзитао, коллегой-чжэцзянцем, хотя его история осуждения социализма всех видов (в отличие от только марксизма) затруднила примирение. Для многих независимых социалистов, бывших членов LCS и различных прогрессивных групп просто нет хороших вариантов, и они либо ищут возможности в правительстве, либо бегут за границу."
 YUN.lategame.421.d.CHI_ALIVE: "Левые Гоминьдана, все еще являющиеся главной силой в китайской политике, стремились использовать разногласия в наших рядах, маня возможностью дальнейшего партнерства. Хотя большинство понимает, что прочного единства просто никогда не будет, поскольку наше движение разделено как никогда, в нижних рядах есть искушение искать великий компромисс.\n\nВан Цзинвэй и его RCA выразили заинтересованность в работе с Кликой политической науки, даже если он старался не присутствовать лично во время кризиса. Он требовал принятия конституции в прошлом как дубины против правого правительства, и недавнее стремление к Временной конституции подтвердило его взгляды.\n\nСун Цинлин и ее PAC замышляли свергнуть правое правительство в целом, пытаясь привлечь Чэнь Чэна и его Клику гражданского строительства на помощь. Этот диалог шел в обоих направлениях, однако Чэнь пытался использовать свои собственные связи внутри WMARCA, чтобы потенциально создать базу для собственных усилий по реорганизации правительства.\n\nКонечно, есть много более мелких фракций, ищущих направление. У Четырех старейшин и их Общества Мира есть анархистские корни, но связи со старой гвардией партии. Они предварительно предложили объединиться с Дай Цзитао, коллегой-чжэцзянцем, хотя его история осуждения социализма всех видов (в отличие от только марксизма) затруднила примирение. Для многих независимых социалистов, бывших членов LCS и различных прогрессивных групп просто нет хороших вариантов, и они стремятся к нашему окончательному уничтожению."
 YUN.lategame.421.a: "Большинство левых предварительно принимают конституцию."
 YUN.lategame.421.b: "Левые остаются воинствующими и требуют новой реорганизации."
 YUN.lategame.421.c: "Спорящие группы левых не находят реального направления."

 YUN.lategame.422.t: "Конституция PSC принята"
 YUN.lategame.422.d: "После недель неопределенности Национальное собрание наконец вынесло пересмотренную версию Временной конституции на голосование. Хотя было сделано много изменений и компромиссов, многие все еще мучились вопросом, будет ли этого достаточно для обеспечения ее принятия. Однако, когда делегаты начали голосовать один за другим, стало ясно, что Чжан Цюнь и Клика политической науки собрали достаточно поддержки (восторженной или нет), чтобы заявить о триумфе.\n\nС обеспеченной победой, медленно, но верно партия вернулась в строй, как всегда. Клика СС и их функционеры были оттеснены, многие из тех, кто ушел в отставку в знак протеста против правительства, не были приняты обратно, другие к этому времени разорвали связи с Кликой СС и сменили сторону. Чэнь Лифу остается министром образования, но Дай Цзитао и Чэнь Гофу теперь фактически бессильны как министры без портфеля.\n\nЮжно-китайский политический совет после собственного спорного голосования решил вновь присоединиться к центральному правительству, обеспечив предварительную договоренность с Кликой политической науки. Это устранило еще одну угрозу режиму, одновременно помогая уравновесить угрозу со стороны военных.\n\nВлияние Вампу на Национально-революционную армию, хотя и значительное, также было усмирено. Впоследствии многие ведущие офицеры были переведены со своих постов. Гамбит генерала Хэ Инциня провалился, большинство офицеров покинули заговор с целью его восстановления. Офицеры, связанные с Кликой политической науки, тихо вытеснили более откровенные угрозы, требуя для себя лучших руководящих должностей.\n\nОжидается, что следующие несколько месяцев будут непростыми, поскольку Чжан и Ян укрепляют свою власть над правительством националистов. Однако худшее позади. Когда делегаты Национального собрания разъезжаются по домам, распространяя последние сплетни о делах Национального правительства, мало у кого есть сомнения, что президент Чжан здесь надолго."
 YUN.lategame.422.a: "Партия и военные должны быть тщательно очищены."
 YUN.lategame.422.b: "Наши внутренние соперники не найдут покоя."
 YUN.lategame.422.c: "Мы ускорим возвращение к стабильности."
 YUN.lategame.422.e: "Но что случится с революционным духом?"

 YUN.lategame.423.t: "Клика СС рушит правительство!"
 YUN.lategame.423.d: "После недель неопределенности и отсутствия успешных компромиссов в поле зрения Национальное собрание наконец вынесло временную конституцию на голосование. Подавляющим большинством резолюция провалилась, навсегда разрушив шансы Клики политической науки на столь необходимую политическую победу. Поскольку вотум недоверия был неизбежен, Чжан Цюнь и Ян Юнтай ушли в отставку, вместо того чтобы бороться дальше и рисковать уничтожением.\n\nСтарейшины партии помогли договориться о выходе, обеспечив плавный переход. Простым большинством Дай Цзитао был назван новым президентом. В качестве награды за их верную службу Чэнь Гофу из Клики СС был номинирован новым премьером, демонстрируя непреходящую власть фракции Чжэцзяна. Чжан Цюнь и Ян Юнтай смогли спорно сохранить свои старые портфели в оборонных закупках и банковском деле, хотя различные экономические и производственные органы, которые ранее подпадали под их домены, были перераспределены стойким приверженцам Клики СС. Многие представители бизнес-элиты, такие как Кун Сянси, признали перемену ветра и последовали их примеру.\n\nЮжно-китайский политический совет, хотя и не полностью удовлетворенный результатом, после спорного голосования и значительной работы посредников решил, что это лучшее, что они получат. Поскольку Временная конституция провалилась, они в основном решили признать Дая президентом и вновь присоединиться к национальному правительству, положив конец кризису.\n\nДай, обладающий уникальным для гражданского лица влиянием на военных, смог значительно подорвать власть Хэ Инциня над Вампу. Знакомое лицо в рядах Национально-революционной армии и автор многих еще более известных трудов, большинство офицеров встали на сторону нового режима.\n\nДай стал новым сильным человеком партии, способным обладать как гражданской, так и военной властью. Есть ли у него все необходимое, чтобы сохранить эту неоспоримую власть, невиданную со времен самого доктора Суня, — это другой вопрос."
 YUN.lategame.423.a: "Пришло время тщательно вычистить предателей."
 YUN.lategame.423.b: "Наши худшие соперники будут отстранены от должности."
 YUN.lategame.423.c: "Всеобъемлющая власть Дай Цзитао будет держать их в узде."
 YUN.lategame.423.e: "Но сможет ли он действительно соответствовать наследию доктора Суня?"

 YUN.lategame.424.t: "Государственный переворот Вампу"
 YUN.lategame.424.d: "После недель неопределенности, непрекращающихся дебатов и заламывания рук по поводу Временной конституции поддержка рушащегося правительства Политической науки достигла дна. Страх гражданской войны и иностранного вторжения растет, и растет ностальгия по стабильному, хотя иногда жестокому и бескомпромиссному руководству Хэ Инциня.\n\nПравительство Чжана-Яна надеялось, что осколки фракции Вампу, такие как прогрессивная Клика гражданского строительства, останутся лояльными достаточно долго, чтобы дела улеглись. Однако, когда имя Чэнь Чэна оказалось среди трех лучших в подписанном письме от различных начальников Национально-революционной армии, время явно истекло.\n\nВ ходе тщательно организованного ухода Чжан Цюнь и Ян Юнтай подали в отставку. Центральный исполнительный комитет пригласил Хэ Инциня вернуться для формирования нового кабинета, а Чэнь Чэн был выбран премьером в качестве награды за его лояльность. В то время как Чжан Цюнь и Ян Юнтай номинально сохраняют свои старые портфели в военном министерстве и банковском деле, а Дай Цзитао и братья Чэнь — в образовании и партийных делах, на практике кадры Вампу были назначены по всему правительству.\n\nВременная конституция была принята тихо. Южно-китайский политический совет на практике оказался бумажным тигром — после возобновленной жестокой кампании громоздкий альянс милитаристов и партийной оппозиции рухнул под тяжестью Новых правых.\n\nДля постороннего Хэ Инцинь доказал свою точку зрения: он незаменим для хорошего функционирования правительства. Однако в непрозрачных рядах Вампу произошел значительный сдвиг. Потребность в Генералиссимусе и Национально-революционной армии для охраны революции теперь неоспорима, но пригодность Хэ Инциня для этой роли была запятнана его связью с месяцами политического хаоса. Началась гонка за поиском кого-то моложе и менее обременительного, кто, возможно, сможет заменить его однажды."
 YUN.lategame.424.a: "Кто не с нами, тот против нас!"
 YUN.lategame.424.b: "Внутренняя оппозиция должна быть приведена к покорности!"
 YUN.lategame.424.c: "Мир и порядок восторжествуют."
 YUN.lategame.424.e: "Вампу мстит."

#He Yingqin Triumphant Events (430-439):
 YUN.lategame.430.t: "Разделенное правительство"
 YUN.lategame.430.d: "Спустя месяцы после разрешения кризиса Ху Ханьминь, в [ROOT.Capital.GetCapitalVictoryPointName] вернулось тревожное, но устойчивое спокойствие. Кажется, что большинство людей смирились с руководством генералиссимуса Хэ Инциня и Временной конституцией. Самым большим бенефициаром, конечно, стали Хэ Инцинь и Клика политической науки, но Клика СС не слишком отстает.\n\nБолее внимательный взгляд на ситуацию показывает, что сложная динамика, доминировавшая в партии с момента их возвращения в Гуанчжоу, фактически укрепилась. Сторонний наблюдатель описывает это так:\n\n«Конечная власть принятия решений в Гоминьдане находится в руках Хэ Инциня, но Хэ не изолирован. Вместо этого на него влияют различные группы под его началом. Каждая из них находится под его твердым контролем, и ни у кого нет всей власти. Власть разделена: партийные дела в руках Клики СС, финансы под Ян Юнтаем и Кун Сянси, военные вопросы в руках клики Вампу, а Клика политической науки имеет большую власть над региональной администрацией. Таким образом, у каждой группы есть только часть власти, а над ними всеми стоит генерал Хэ, который создает режим Хэ. В то же время, однако, каждая фракция имеет влияние на генерала Хэ».\n\nОжидается, что благодаря этому тонкому разделению власти правительство Генералиссимуса продолжит двигаться вперед, его правление теперь неоспоримо. Но это не предотвратило продолжения борьбы за власть между Кликой СС и Кликой политической науки или Кликой гражданского строительства и Обществом синерубашечников."
 YUN.lategame.430.a: "PSC настаивает на технократическом правительстве."
 YUN.lategame.430.b: "CCC помнит наше идеологическое наследие!"
 YUN.lategame.430.c: "CEC озвучивает призыв масс!"
 YUN.lategame.430.e: "BSS воплощает волю нации!"
 YUN.lategame.430.f: "Хэ Инцинь удерживает правительство вместе."

 YUN.lategame.431.t: "Конец Московского комитета"
 YUN.lategame.431.d: "Спустя почти год после заключения в тюрьму Ху Ханьминь и большинство других политических заключенных были тихо переведены под домашний арест. Ху удалился в скромное жилище в Гуанчжоу, его здоровье подорвано плохими условиями жизни в тюрьме. Упрямый, как всегда, он проводит свои дни за каллиграфией и поэзией, принимая мало посетителей. Усилия вернуть его на номинальную должность были отвергнуты, сварливый старик продолжает писать изобличающие заявления против правительства, которые быстро подвергаются цензуре.\n\nФракции Московского комитета в основном пошли своими путями. Клика старейшин в основном распалась без Ху Ханьминя, скрепляющего их, их высшее руководство держится на собственном престиже. Клика Сишань аналогичным образом закрепилась в Судебном Юане, больше не желая бросать вызов Хэ Инциню за пределами символических партийных выборов. Сунь Фо и Фракция реконструкции изменили свое мнение по конституционному вопросу, Сунь стал одержим идеей разработки «идеальной» конституции, которая каким-то образом выведет из диктатуры, заблуждение, которое поддерживал генерал Хэ.\n\nЮжные провинции, поддерживавшие Ху, пострадали больше всего, почти все они были отстранены от власти. Гуандун, некогда оплот Чэнь Цзитана, находился на военном положении, которое только недавно было снято. Военным губернатором до сих пор был генерал Ло Чжоин, побратим Чэнь Чэна и уроженец Гуандуна.\n\nЕго переход на политическую арену прошел гладко, но более гражданский лидер мог бы спроецировать более примирительный имидж. У Течэн — видная фигура PSC с обширными связями с бывшим MCC, включая Линь Сэня, Сунь Фо и Сюй Чунчжи. Несмотря на их давний антагонизм с Гуандуном, Клика СС выдвинула культурного Чжан Даопаня, имеющего некоторый опыт работы с правительством Гуандуна. Новая клика Гуандун подала запрос на назначение Линь Ичжуна, умеренного гражданского лидера и председателя Провинциального сената, и прекращение оккупации."
 YUN.lategame.431.a: "У Течэн имеет связи по всей Азии и идеально подходит для ворот в Китай."
 YUN.lategame.431.b: "Чжан Даофань — хорошо образованный ученый, идеально подходящий для сердца нашей партии."
 YUN.lategame.431.c: "Линь Ичжун станет лицом искупленной партии Гуандуна и знаком доверия."
 YUN.lategame.431.e: "Генерал Ло Чжоин до сих пор проделывал отличную работу."

 YUN.lategame.432.t: "Авангард революции"
 YUN.lategame.432.d: "Кризис Ху Ханьминя заставил правительство еще больше заботиться о своем имидже, опасаясь, что шквал нападок Ху на их революционную честность получил поддержку среди населения. Хотя известно, что режим более консервативен (а иногда и реакционен), множество фракций работали сверхурочно, чтобы доказать их неправоту и показать, что Гоминьдан действительно является революционным движением для китайцев.\n\nПропагандистские листовки по всем городским центрам страны, доходящие даже до Шанхая, украшены памфлетами, провозглашающими революционную славу Общества синерубашечников или прославляющими труды Чэнь Лифу и Гофу. Эти работы часто вызывают образы искренней и преданной солидарности между солдатами, рабочими и крестьянами — в духе, подобном тому, что делает левое крыло Гоминьдана.\n\nИрония заключается в том, что синерубашечники стремились популяризировать свои идеи через средства массовой информации — учитывая их собственную ненависть к либеральной прессе. Однако вместо пропаганды классовой борьбы политические трактаты призывают к межклассовой гармонии — эксплуатируемому национальному сообществу и кажущейся борьбе за национальное выживание в дарвинистском мире, полном голодных империалистических держав.\n\nЧэнь Чэн и Клика гражданского строительства также обратились к использованию средств массовой информации для проецирования своих идей, хотя их тон, по-видимому, носит более социалистический характер. Продвигая свои идеи о том, что CEC выступает за рабочих и крестьян страны, стремящихся к истинному земельному равенству, их работа была осуждена синерубашечниками и Кликой СС как не более чем скрытый марксизм.\n\nКлика политической науки решила подчеркнуть свою приверженность модернизации китайской экономики, провозгласив себя наиболее подходящей для планирования новой этатистской экономики, именуемой Плановым свободным экономическим развитием. Все эти разговоры о социализме и национальном выживании, утверждают они, отвлекают от истинного решения проблемы китайской слабости — быстрой индустриализации и агрессивного планирования."
 YUN.lategame.432.a: "Под истинным революционным авангардом мы можем достичь национальной революции!"
 YUN.lategame.432.b: "Следуйте Принципу синерубашечников, чтобы наш народ не вымер!"
 YUN.lategame.432.c: "Мы стремимся к истинной реализации Миньшэн для всех."
 YUN.lategame.432.e: "Лучшая революция — та, которая остается верной своему курсу."

 YUN.lategame.433.t: "Движение Гэсинь"
 YUN.lategame.433.d: "Хотя Клика политической науки получила огромную выгоду от создания официального правительства, квазинезависимого от партии, негодование нарастало в партийном аппарате и наконец выплеснулось наружу. Прозванное газетами, наблюдающими за партийной политикой, движением «Гэсинь», похоже, что движение Гэсинь каким-то чудесным образом объединило непримиримые противоборствующие фракции из-за их общей ненависти к Клике политической науки и ее очевидным бюрократическим тенденциям, строгой коррупции и отсутствию революционного рвения.\n\nПервые волны оппозиции возникли от Пань Гунчжэня (функционера клики СС) вместе с его товарищами Сяо Чжэном, Юй Цзинтаном, Чэн Тяньфаном. В ходе жаркой дискуссии во время пленарного заседания Центрального исполнительного комитета Пань ядовито осудил Клику политической науки как перебежчиков-милитаристов и оппортунистов, которые осквернили и запятнали революционный дух Гоминьдана.\n\nК нему присоединились те из Фракции реконструкции под руководством Лян Ханьцао, которые выразили аналогичные опасения. Чэнь Чэн и Клика гражданского строительства также присоединились к голосам, осуждая Клику политической науки за вопиющую коррупцию. Голоса доносились даже из радикального общества Синерубашечников, Тэн Цзе и Ли Шичжэнь выступили со списком обвинений, утверждая, что Чжан Цюнь был в сговоре с иностранными империалистами.\n\nДай Цзитао заметно молчал во время испытания, давно написав о своей оппозиции партийному фракционизму. Голоса с каждым днем становятся все громче для уха Генералиссимуса, чтобы урезать Клику политической науки, но стоит ли действительно кланяться такому растущему радикализму в Партии?"
 YUN.lategame.433.a: "PSC доказывали свою ценность снова и снова!"
 YUN.lategame.433.b: "Коррупция гноилась слишком долго!"

 YUN.lategame.434.t: "Вампу разделен"
 YUN.lategame.434.d: "Несмотря на наши парящие высоты, или, возможно, вопреки им, внутриличностные клики и фракции Вампу никогда не были бы так готовы перегрызть друг другу глотки. Суетясь и цепляясь за влияние, Чэнь Чэн и его Молодая гвардия гражданского строительства провели кампанию по подрыву авторитета генералиссимуса Хэ Инциня в военных кругах. Дошло до того, что была пролита настоящая кровь. Одним из примечательных случаев является случай с печально известным подчиненным Хэ Чэн Цзэжунем.\n\nСоревнуясь за влияние в Вампу, Чэн Цзэжунь получил приказ от генералиссимуса Хэ казнить одного из прямых подчиненных Чэнь Чэна, якобы за коррупцию. Навсегда вбив клин между Чэнем и Хэ, Маленький генералиссимус сумел осуществить сложную схему, в результате которой Чэн Цзэжунь был арестован и заключен в тюрьму за растрату, брошен в военную тюрьму.\n\nПоскольку вражда постоянно росла, генерал Гуань Линьчжэн, известный противник Чэнь Чэна, бросил свою шляпу на ринг. Прямолинейный, упрямый осел, вражда Гуаня с Чэнем началась еще в 1928 году, когда он оскорбил способность Чэна командовать на поле боя прямо перед Ло Чжоином. Не упуская возможности отчитать Чэна, по сообщениям, последний инцидент стал жестоким, когда их конфликт из-за выбора подчиненных Хэ привел к тому, что Гуань обвинил Чэна в сохранении комплекса превосходства, намекая, что он желает доминирования Гражданского строительства над армией. Поскольку конфронтация была ожесточенной, многие полагали, что мужчины подерутся. Однако из-за того, что язва желудка Чэнь Чэна снова дала о себе знать из-за напряжения, Маленький генералиссимус упал на колени, извергая огромное количество крови.\n\nОтстранив истекающего кровью Чэна, Гуань все равно получил отказ в выборе своего подчиненного Чжан Яомина, а командование было передано Фан Тяню из Гражданского строительства. Когда сообщения об инциденте всплыли как в гражданских, так и в военных кругах, возник поток сочувствия к Чэнь Чэну, которого рассматривали как человека, доводящего свое тело до физического предела ради нации. Другие, однако, осуждают и Хэ, и Чэна, с заметной оппозицией, исходящей от Тэн Цзе. Обвиняя дуэт в кумовстве, коррупции и допущении гниения внутри партии."
 YUN.lategame.434.a: "Чэнь Чэн — национальный герой!"
 YUN.lategame.434.b: "Генералиссимус Хэ просто беспристрастен."
 YUN.lategame.434.c: "Армия прислушивается к словам Тэн Цзе!"

#Teng Jie and Chen Cheng events (440-449)
 YUN.lategame.440.t: "Верховный лидер... и его люди"
 YUN.lategame.440.d: "На бумаге Хэ Инцинь командует лояльностью НРА — проверенных в боях солдат Войн объединения, Второго Северного похода. Тем не менее, в политической ситуации есть ощутимая ирония, поскольку положение Генералиссимуса в Вампу полностью рухнуло после кризиса Ху Ханьминя. Хотя он сохраняет свое положение в Президентстве, динамика Вампу остается радикально измененной.\n\nРеволюционный радикализм давно пронизал залы Академии, и теперь клики НРА разделены между Чэнь Чэном и Тэн Цзе, а Старая гвардия не в силах остановить их растущую популярность. Чтобы умиротворить радикальных военных, Чэнь Чэн был назначен премьером Исполнительного Юаня, в то время как Тэн Цзе теперь начальник Генерального штаба.\n\nЭто не помешало им усилить свою риторику о необходимости верховного лидера. В широко разрекламированной речи представитель Синерубашечников Лю Цзяньцюнь заявил, что на протяжении веков золотыми годами Китая были те, когда его возглавлял настоящий автократ, судьба нации как поднималась, так и падала из-за качества ее руководства. Зачем менять это сейчас, когда верховная Партия и непогрешимая национально-революционная партия наконец способны принести вечную славу китайской нации?\n\nСинерубашечники, даже Лю, никогда не называли генерала Хэ недвусмысленно верховным лидером партии. Однако они быстро действовали, чтобы обеспечить контроль над армией и ее обширными сетями патронажа. Чэнь Чэн с его выгодным браком и природной способностью заводить друзей заявил о своих правах на политическую сферу. Можно только гадать, кто будет истинным Верховным лидером."
 YUN.lategame.440.a: "Слава Линсю нашей нации!"
 YUN.lategame.440.b: "Сильная, но справедливая рука — вот что нужно, чтобы совершить настоящую революцию."

 YUN.lategame.441.t: "Несколько идей по реформе Гоминьдана"
 YUN.lategame.441.d: "И Тэн Цзе, и Чэнь Чэн в значительной степени относились к Хэ Инциню как к неудачнику и временному лидеру, пока они сосредотачивались на расширении своего собственного влияния, но Лю Цзяньцюнь знает лучше. Некогда личный секретарь Хэ Инциня, даже будучи де-факто министром пропаганды нового правительства, он все еще находит время, чтобы добиваться благосклонности президента Хэ. В правительстве, где все меньше и меньше членов заботятся о том, что говорит президент, это сыграло большую роль в расширении влияния Лю.\n\nЛю предпринял дополнительный шаг, не посоветовавшись с Тэном или Чэнем, опубликовав семистраничный манифест, просто озаглавленный «Несколько идей по реформе Гоминьдана». В нем он обозначил основные проблемы, с которыми сталкивается партия:\n\nРешение для Партии состояло не просто в том, чтобы очистить коррумпированных членов и начать новую реорганизацию Гоминьдана, а в том, чтобы полностью отказаться от старой партии и создать новую организацию, состоящую только из истинных революционеров.\n\nЧтобы партия была наполнена революционерами, настроенными на революционный дух Синерубашечников.\n\nОтвергнуть материальное богатство и феодальные отношения, даже семейные узы. Единственные истинные узы — это те, которые сформированы вашими товарищами. Конечно, это предусматривало ограничение частной собственности и полный контроль над членами семьи под охраной Общества синерубашечников.\n\nЧтобы Три народных принципа были реализованы с помощью организационных методов, подобных социалистическим, но с духом японского бусидо и стремлением к абсолютной революционной современности при национал-популизме.\n\nЧтобы Хэ Инцинь был единственным верховным лидером Гоминьдана, а также Китая. Все члены должны абсолютно поддерживать его, следовать только его приказам и делать его волю своей собственной. Да, в этот самый час Китаю нужен настоящий Кондукэтор или Вождь на этом этапе, когда революционный дух в опасности!"
 YUN.lategame.441.a: "Только через очищение наша партия может омолодиться!"
 YUN.lategame.441.b: "Материализм, безусловно, самая дегенеративная идеология этой новой эпохи!"
 YUN.lategame.441.c: "Можем ли мы больше не скрывать, что требуем собственного Савинкова для Китая?"

 YUN.lategame.442.t: "Третий путь для Гоминьдана"
 YUN.lategame.442.d: "Лю Цзяньцюнь не единственный, кто хочет реорганизовать правительство Гоминьдана. На фоне недомогания растущий спрос на возрождение подтолкнул многих членов клики Вампу к поиску возвращения к левому революционному духу 1924 года, что разжигается риторикой Чэнь Чэна.\n\nГлава гражданского правительства Чэнь предложил вторую реорганизацию, установив возрастные ограничения и требования к образованию для всех членов правительства. У него также есть много других далеко идущих пунктов повестки дня как в военных, так и во внутренних делах:\n\nНетрадиционные войска должны сопровождать основную армию в подавлении как социалистических предателей, так и реакционеров.\n\nАрмия должна быть полностью реформирована в жесткую, дисциплинированную, идеологическую силу. Силы НРА больше не могут называться просто силами милитаристов под флагом националистов.\n\nМолодежный корпус Саньминьчжуи должен быть значительно усилен тайной полицией внутри него для чистки антиреволюционной деятельности. В действительности это всего лишь уловка, чтобы не дать Хэ Инциню и Клике СС посягнуть на растущую власть Чэна.\n\nВосстановить доверие к Гоминьдану, работая над устранением разрыва между Московским комитетом и Генералиссимусом. Конечная цель Чэна — преодолеть разногласия в партии своей честностью и неподкупностью, чтобы восстановить веру в систему Гоминьдана."
 YUN.lategame.442.a: "Из новой армии восстанет наша новая нация!"
 YUN.lategame.442.b: "Будущее этой страны принадлежит ее молодежи!"
 YUN.lategame.442.c: "Мы стремимся наладить разорванные связи, чтобы служить великой цели." 

 YUN.lategame.443.t: "Уничтожение гражданских правых"
 YUN.lategame.443.d: "Для гражданских правых наступили не лучшие времена после кризиса Ху Ханьминя. В то время как Ху Ханьминь был тихо переведен под домашний арест, большинство его последователей либо стараются не высовываться, либо бежали из страны. Чжан Цюнь и Ян Юнтай были отстранены от дел, а Клика политической науки практически распущена. Дай Цзитао решил принять должность председателя Экзаменационного Юаня, что фактически устранило его от прямого управления.\n\nВ окончательном отчете о кризисе Ху Ханьминя, представленном Центральному исполнительному комитету, причинами кризиса были названы: 1) отсутствие массовой поддержки; 2) неспособность и отказ правительства от перемен; 3) бюрократическая бесхозяйственность; 4) чрезмерная фракционность; 5) нелояльность региональных правительств. Необходимость реформ после кризиса была ясна как день, и последовавшие за этим чистки создали готовую среду для изменений в партии. В противном случае, предупреждалось в докладе, долгосрочное выживание Гоминьдана окажется под угрозой.\n\nХотя Клика СС надеялась служить противовесом между Кликой гражданского строительства (CEC) и Обществом синерубашечников (BSS), их влияние колоссально снизилось. Чэнь Чэн использовал свое положение, чтобы вытеснить фигуры Клики СС короткими, решительными ударами, а не постепенной эволюцией. Тем не менее, поскольку Хэ Инцинь номинально все еще находится у власти, это лишь частичные изменения. Последней целью его реорганизации правительства стала должность Генерального секретаря Центрального исполнительного комитета, который управляет делами самого секретариата. Чэнь Лифу, которого планируют понизить до простого министра образования и чей брат был фактически сослан в Законодательный Юань, больше не может претендовать на этот титул.\n\nТеперь, когда СС оттеснены, CEC продвигает Чжу Хуайбина, левого военного офицера, ставшего гражданским администратором, которого высоко ценят за его исполнительность. BSS продвигает Лю Цзяньцюня — кандидата, который, как они знают, будет одобрен Хэ Инцинем, и который известен как плодовитый писатель, увлеченный народничеством. Пытаясь сохранить остатки своей легитимности, члены СС и CEC также выдвинули Чжан Лишэна, который является членом Клики СС, но в конечном итоге имеет тесные связи и интересы с предложенными Чэнь Чэном планами сельской земельной реформы."
 YUN.lategame.443.a: "Чжу Хуайбин принесет новую энергию режиму!"
 YUN.lategame.443.b: "Партии нужны более радикальные идеи Лю Цзяньцюня!"
 YUN.lategame.443.c: "С Чжан Лишэном необходим настоящий компромисс!"

 YUN.lategame.444.t: "Три фазы развития"
 YUN.lategame.444.d: "Покойный вечный премьер доктор Сунь Ятсен вызвал споры своей теорией трех этапов революции применительно к Китайской революции. Принятая Гоминьданом как истинная ортодоксальная доктрина для практики революции, она предлагала военный этап революции (в котором милитаристы будут подчинены), этап политического наставления или опеки для подготовки нации к демократии, и третий этап — эру конституционного правления с конечной целью достижения полной свободы от империализма и роста демократии.\n\nОднако Общество синерубашечников утверждает, что Китай должен оставаться на первом этапе военного правления. Установление гражданской опеки было лишь иллюзией прогресса, которая привела к ненужным и неуместным требованиям конституционного правления. В конце концов... действительно ли народу нужна демократия на данном этапе? Федералисты и другие демократические идеалисты могут так считать, но когда неграмотность еще не искоренена, а массы необразованны, устанавливать демократию в Китае сегодня — все равно что просить девушку с перебинтованными ногами танцевать на высоких каблуках.\n\nВозможно, поэтому синерубашечники полагают, что демократия не обязательно нужна в либеральном смысле, но истинная демократия, вера в руководство Линсю (Вождя) и доверие к Партии должны стать третьей фазой революции.\n\nСам Чэнь Чэн смутно соглашается с концепцией опеки под руководством военных, но он привержен идее конечной демократии. Партия должна ввести новых и энергичных членов, чтобы исправить ошибки политической опеки и подготовить Китай к постепенной либерализации и движению к демократии."
 YUN.lategame.444.a: "Демократия — это полный и абсолютный ОБМАН народа!"
 YUN.lategame.444.b: "Новая гвардия исправит ошибки, оставленные предшественниками."

#Dai Jitao Events (450-459):

 YUN.lategame.450.t: "Партийное государство реорганизовано"
 YUN.lategame.450.d: "Мир воцарился в партийном аппарате после окончательного разрешения кризиса Ху Ханьминя. Теперь Дай Цзитао является бесспорным лидером китайского Гоминьдана. Идеалистический консерватор, Дай верит в возрождение природы и понятия Датун (Великого единения), существовавшего в прошлые века, возвращаясь к временам, когда классы жили в гармонии до появления марксизма и синдикалистской революции. Истинная националистическая революция нуждается не в классовой войне, а скорее в едином сознании национализма и класса; это и есть истинная цель доктора Сунь Ятсена.\n\nВерный своей доктрине, Дай отказывается встать на сторону какой-либо конкретной партийной фракции, но он ассоциируется с Кликой СС. Два брата, Чэнь Лифу и Чэнь Гофу, возглавляют фракцию сторонников, стремящихся смоделировать Китай на основе сочетания конфуцианства и авторитаризма, сродни движению русских национал-солидаристов.\n\nТеперь, когда новый президент вступает в должность, должен начаться первый этап его запланированной реорганизации Гоминьдана. Безусловно, усиление собственного культа личности и власти укрепило бы имидж Дая, но поиск силы и поддержки могущественной Клики СС также мог бы усилить характер революционного духа внутри партии. В качестве альтернативы, новый президент может вместо этого преодолеть разногласия в стране, чтобы сосредоточиться на гармонизации нации под одной чистой идеологией."
 YUN.lategame.450.a: "Дай — действительно герой часа для Китая!"
 YUN.lategame.450.b: "К истинной гармонии должен стремиться народ."
 YUN.lategame.450.c: "Наделить властью лоялистов из Клики СС."

 YUN.lategame.451.t: "Новые медиа для Нового Китая"
 YUN.lategame.451.d: "В эту новую эру XX века взгляды все более грамотных масс прикованы к гигантским жирным буквам газет, треску домашнего радио и даже телевизионным СМИ, которые можно встретить в крупных городах Китая. Клика СС одержима мобилизацией и развлечением масс одобренными партией зрелищами, рассматривая медиа как эффективную форму контроля и власти, которую можно использовать ради национальной революции.\n\nФинансируемая Кликой СС Китайская ассоциация культурного обслуживания сделала акцент на укреплении китайской культуры над западной, с упором на традиционную китайскую оперу и музыку. Пьесы фокусируются на национальных героях китайской истории, особенно в периоды великих кризисов; например, пьеса «Дикая роза» посвящена секретным агентам Гоминьдана, сражающимся против японской разведки на улицах Шанхая. Героическое самопожертвование и трагическая любовь являются общими темами, с сильным акцентом на мученичестве ради национального спасения. Клика СС также финансировала журнал «Молодой солдат», ориентированный на молодежь Китая. Содержание журнала направлено на национальный патриотизм и включает песни, призывающие детей готовиться к неизбежной войне против японских и немецких империалистов, а также поощряет маленьких детей делать игрушечные самолетики из стекла, гвоздей, веретена и бамбука.\n\nЛюбопытно, что журнал также призывает детей играть в военную игру под названием «Возвращение утраченных территорий». Игроки делятся на команды и выстраиваются в очередь, чтобы вернуть флаги с названиями территорий, потерянных империалистами, таких как Гонконг, Шанхай, Тайвань и Порт-Артур."
 YUN.lategame.451.a: "Направить усилия по финансированию на прославление китайской культуры!"
 YUN.lategame.451.b: "Направить усилия по финансированию на прославление армии!"
 YUN.lategame.451.c: "Направить усилия по финансированию на прославление национального долга!"

 YUN.lategame.452.t: "Армия и Партия"
 YUN.lategame.452.d: "Армия долгое время была нестабильной силой в китайской политике, и Национально-революционная армия, безусловно, является одним из главных факторов успеха Национальной революции. Поскольку армия была разделена после Северного похода, истинная Национально-революционная армия, безусловно, признает Дай Цзитао де-факто лидером партии, учитывая собственный политический вес Дая в сфере правого крыла.\n\nПоскольку Хэ Инцинь фактически опозорен в политике, казалось бы, что слухи о заговоре Генералиссимуса с бандитскими и радикальными элементами армии, присягнувшими на верность Обществу синерубашечников, также были развеяны. В рядах армии Чэнь Чэн и Общество гражданского строительства по-прежнему требуют большей реформистской энергии. Клика политической науки также жалуется, что правительству все еще не хватает полной легитимности и сотрудничества, хотя они сами могут стать следующими жертвами реорганизации правительства.\n\nИмея за спиной лояльность армии, Дай, безусловно, может заигрывать с этими двумя фракциями, хотя стравливание их друг с другом создаст большую дисфункцию между ними, позволяя его влиянию внутри Клики СС только расти. В качестве альтернативы, партийная линия, безусловно, может быть ужесточена, а эти мелкие фракции — приведены к покорности."
 YUN.lategame.452.a: "Пока сохранить статус-кво."
 YUN.lategame.452.b: "Стравить две фракции друг с другом."
 YUN.lategame.452.c: "Привести партию к покорности!"

 YUN.lategame.453.t: "Интеллектуалы Новых правых"
 YUN.lategame.453.d: "Среди Новых правых два видных интеллектуала получили известность благодаря своим комментариям и связям с партией. Чжу Гуанцянь, выпускник Гонконгского университета, — либеральный эстетик, имеющий сильный и глубокий интерес к изучению эстетики, психологии, западной философии и искусств. Проведя некоторое время в 1920-х годах в социалистических странах Британии и Франции, Чжу сожалел об их упадке эстетики, тяготея к более «классической» эпохе. Несмотря на его собственные либеральные тенденции, его труды весьма популярны среди правых Гоминьдана из-за его собственного консерватизма. Действительно, Чжу критиковал китайские массы за лицемерие по отношению к собственному положению, отмечая, что многие брали стипендии «Боксерской контрибуции» только для того, чтобы призывать к «падению империализма».\n\nДругой заметный писатель — журналист Чэнь Булэй. Один из близких соратников Дая, Чэнь — амбициозный и преданный журналист, проводящий часы при тусклом свете, питаясь лишь черным чаем и сигаретами. Он — абсолютно преданный автор самых популярных речей Дая, истинно верующий в дело националистов, даже если его собственная дочь сбежала, чтобы присоединиться к Китайской синдикалистской партии. Будучи родственником братьев Чэнь и знаменитого революционера Чэнь Цимэя, Чэнь Булэй начал свою карьеру как редактор шанхайской газеты и стал членом Национальной партии по личному приглашению Чан Кайши. Поистине преданный член руководства Дая, Чэнь — непоколебимый кандидат полного и тотального повиновения, полный решимости писать и продолжать дело, превышающее его самого.\n\nАссоциация культурного обслуживания под благоприятным руководством Клики СС стремится продвинуть одного из двоих к почетному званию писателя года Китая. Поддержка трудов Чжу, находящихся под влиянием либерализма, кажется противоречащей делу Новых правых, но нет сомнений в совершенном понимании Чжу эстетики и философии — и того, как они могут быть связаны с возрождением Гоминьдана. В качестве альтернативы, чествование Чэна продолжит укреплять постоянно растущий культ личности президента."
 YUN.lategame.453.a: "Либерализм продолжается с Чжу!"
 YUN.lategame.453.b: "Чэнь Булэй — истинный писатель Революции!"

 YUN.lategame.454.t: "Примирение со Старыми правыми"
 YUN.lategame.454.d: "Оставив хаотичный кризис Ху Ханьминя позади Национального правительства, Ху Ханьминь официально ушел со всех постов в Гоминьдане и вернулся домой в Гуанчжоу, объявив о самоизгнании. Его дружба с Дай Цзитао сильно натянута в наши дни из-за всего произошедшего, но Дай все же последовательно предпринимал попытки восстановить дружбу с уважаемым старейшиной Гоминьдана.\n\nЮжно-китайский политический совет остается проблемой для легитимности Дая как главы партии, поскольку Ху изолировал себя. Клика старейшин из кантонских партийных лидеров в основном удалилась в свои поместья на юге, наслаждаясь послеобеденным чаем и обсуждая последние события в Китае и мире. Их власть, давно закрепленная в колыбели цивилизации Юэ, продолжает оставаться локально доминирующей, поскольку Дай и Клика СС не заинтересованы в их уничтожении. Клика Сишань продолжает удерживать свои позиции в Судебном Юане, в то время как Фракция реконструкции продолжает шуметь в Законодательном Юане и среди диаспоры китайских эмигрантов.\n\nТем не менее, хотя Ху Ханьминь, возможно, вышел из кризиса, не будучи названным предателем, того же нельзя сказать о других южных элементах. В то время как те, кто в Западных Холмах (Сишань), выступали за мягкую линию против повстанцев, многие милитаристские элементы внутри Партии призвали немедленно наказать кантонских и гуансийских милитаристов, составлявших костяк и мускулы Южно-китайского политического совета. Чэнь Лифу со своей стороны рекомендовал тщательную чистку предателей-перебежчиков из Клики политической науки, которые тоже бежали на юг."
 YUN.lategame.454.a: "Ху по-прежнему настоящий революционер, мы должны положить конец этой вражде."
 YUN.lategame.454.b: "Смягчить нашу риторику и построить новую Партию вместе."
 YUN.lategame.454.c: "Паразиты-милитаристы должны быть вычищены из нашей нации."

 YUN.lategame.455.t: "Центральный клуб и Чжэцзянские дзайбацу"
 YUN.lategame.455.d: "Поскольку национальная революция Гоминьдана продвигается далеко и широко по стране, характер отношений партии с местными элитами стал предметом недавних споров. Называемые, возможно, сродни непростому или ограниченному союзу, местные элиты в регионах, населенных Гоминьданом, всегда с осторожностью торговались и обменивались с Партией в разной степени. Это уже наблюдалось ранее в Гуандуне, возможно, с самым катастрофическим Восстанием торгового корпуса. Аналогичным образом, и совсем недавно, это подтверждается Центральным клубом и «Консорциумом Цзянсу-Чжэцзян» (JZC), крупнейшей финансово-промышленной группой в Китае.\n\nЧерез семейные связи, в основном через Чэнь Цимэя, братья из Центрального клуба Чэнь Гофу и Чэнь Лифу использовали свои региональные связи, чтобы задействовать неисчислимые богатства финансовой группы для финансирования начинаний партии Гоминьдан. Через свои предприятия и ZRCS, JZC в основном служил домом для различной революционной деятельности, а в нынешнюю эпоху нации поглотил региональный консорциум Цзяннань в свой конгломерат.\n\nОднако ни правительство, ни консорциум не являются монолитными структурами, и с включением местных провинциальных и уездных правительств картина еще больше запутывается. Иногда в прямое нарушение провинциальных или национальных законов местные уезды будут договариваться с элитами, вместо того чтобы принимать предложения Партии, такие как снижение арендной платы. С другой стороны, Партия обычно вымогала у местных элит значительные взносы на военные нужды и на финансирование самой партии, вплоть до участия в кампаниях мести под видом устранения «местных хулиганов и злых джентри» или всех тех слабых элит, которые отказываются платить.\n\nВ ответ против партии сформировались различные оппозиционные группы, иногда перерастающие в ожесточенные столкновения между местным ополчением и партийными солдатами. В этой атмосфере насильственной неопределенности Клика СС выдвинула идею совместной партийно-правительственной конференции, предлагающей мягкий подход к местным коренным элитам. Предпочитая правительственные действия массовым выступлениям толпы, их предложения получили большую поддержку в партии, и они настояли на том, чтобы Юй Цяцин занялся такими вопросами."
 YUN.lategame.455.a: "Центральный клуб использует свои связи, чтобы обуздать элиты!"
 YUN.lategame.455.b: "Как мы можем быть уверены, что это не играет им на руку?"

#Zhang Qun Events (460-469):
 YUN.lategame.460.t: "Правительство Политической науки"
 YUN.lategame.460.d: "Принятие Временной конституции было встречено широким одобрением в Законодательном Юане Гоминьдана. Благодаря доминированию Клики политической науки в рядах представительного правительства народа, кабинет стабилизировал восстановленное правительство. Страхи перед открытым военным переворотом в значительной степени утихли, поскольку рядовой состав НРА доказал свою лояльность. Попытка Клики СС свалить правительство Чжана в конечном итоге провалилась, что привело к редкому ощущению мира внутри Партии.\n\nСледующие шаги в их повестке дня — исцелить разногласия с бывшей Бэйянской республикой. Хотя правительство Бэйяна закончило как коррумпированная диктатура под властью Клики Чжили, такие политики, как Хуан Фу, У Динчан и У Течэн, готовы присягнуть на верность новому Националистическому правительству в Китае, принеся с собой свой богатый опыт. Хуан, в частности, посещал Германию несколько десятилетий назад, вдохновившись экономическими реформами Вальтера Ратенау.\n\nС восхождением правительства Политической науки технократы и другие политические умеренные выразили свою поддержку Чжан Цюню. Вэн Вэньхао и Дин Вэньцзян, известные бывшие технократы Бэйяна, предложили новые технократические органы, такие как Комиссия по национальным ресурсам (NRC) и Центральный плановый совет (CPB). Укомплектованный наиболее способными экспертами со всего Китая, CPB будет управлять центральным экономическим планированием нации, в то время как NRC будет отвечать за промышленное развитие.\n\nТаким образом, эти органы станут трамплинами для китайской индустриализации посредством амбициозной серии пятилеток и передадут экономику твердо в руки Гоминьдана. Более либеральные деловые элементы, сплотившиеся вокруг финансовой клики Кун Сянси, раскритиковали такие меры как социалистическую чепуху, но эти этатистские предложения до сих пор получали поддержку Ян Юнтая, который создал ряд государственных ферм на Юго-Западе."
 YUN.lategame.460.a: "Консолидировать правительственный контроль под лояльными сторонниками PSC."
 YUN.lategame.460.b: "Протянуть руку бэйянским политикам, стремящимся построить лучший Китай."
 YUN.lategame.460.c: "Возрождение экономики с помощью строгих мер — наш главный приоритет."

 YUN.lategame.461.t: "Переговоры с Южно-китайским политическим советом"
 YUN.lategame.461.d: "После ареста и кратковременного заключения бывший лидер триумвирата Гоминьдана Ху Ханьминь был наконец освобожден. Но уважаемый политик и писатель отказался признать новое правительство. Осудив новое правительство как не более чем компрадоров и замаскированных милитаристов, Ху отправился на юг в добровольное изгнание, полное одиночества и размышлений в Гуанчжоу. Разгневанный и упрямый, его посетители немногочисленны, а терпение на исходе.\n\nЕго последователи с тех пор рассеялись, а Клика старейшин также осудила новое правительство в [ROOT.Capital.GetCapitalVictoryPointName]. Однако Клика Сишань и Фракция реконструкции дружелюбно настроены на разрешение разорванных связей и построение настоящего нового конституционного правительства. Милитаристы в Южно-китайском политическом совете спокойно относятся к продолжающемуся кризису, рассматривая его как возможность для себя ограничить влияние национального правительства.\n\nБольшинство в Клике политической науки открыты идее возрождения дискурса с южными республиканцами. Некоторые предложили открыть Политический консультативный совет для Сунь Фо, Цзюй Чжэна и других ученых из Фракции реконструкции и Клики Сишань, чтобы начать работу над полной конституцией. Конечно, сам Сунь изменил свое мнение по вопросу Временной конституции, когда-то считая еретической мысль о том, что полная конституция теперь необходима для предотвращения будущих военных переворотов.\n\nПолитики всегда были открыты для взяток, и поэтому многих, безусловно, можно убедить присоединиться к новому национальному правительству с помощью сильных финансовых стимулов, обещаний выгодной стабильности в нестабильную эпоху китайской политики. Возможно, было бы лучше предоставить милитаристам их собственную автономию как средство наблюдения и ограничения их влияния, чтобы переворот не положил конец этой новой подлинной попытке создать правительство."
 YUN.lategame.461.a: "Инициировать Политический консультативный совет!"
 YUN.lategame.461.b: "Если вы возьмете эти деньги, я буду знать, что вы работаете на меня."
 YUN.lategame.461.c: "Предоставить милитаристам их собственную автономию."

 YUN.lategame.462.t: "Предотвращение военного переворота"
 YUN.lategame.462.d: "Поздней ночью в кабинете Чжан Цюня в [ROOT.Capital.GetCapitalVictoryPointName] состоялась встреча между Чжан Цюнем, Ли Гэньюанем, Сюн Шихуэем и Лай Шихуаном. Четверо мужчин обсуждали, насколько близка была Национально-революционная армия к организации военного переворота во время кризиса Ху Ханьминя. С властью и влиянием НРА внутри Партии правительство, безусловно, рухнуло бы в одно мгновение.\n\nНесмотря на победу правительства Политической науки, Клика Вампу продолжает доминировать в верховном командовании Национально-революционной армии. Хорошо известно, что фракция Чэнь Чэна едва терпит новое правительство, сохраняя лишь видимость лояльности.\n\nОбщество синерубашечников открыто ненавидит новое правительство из-за собственной ненависти к демократии и отказа следовать гражданскому правительству. С полным позором Хэ Инциня его фракция разделилась на тех, кто увидел знаки на стене и встал на сторону нового правительства, и тех, кто связан с радикальными фракциями в армии.\n\nБезусловно, пренебрегать армией сейчас — значит только подстегивать рост этого радикализма. Есть также регионалистские офицеры, которые могут быть связаны с новым правительством. Работа с этими офицерами для обеспечения нашего влияния может укрепить нашу власть над Вампу, и некоторых из них можно даже переманить на нашу сторону, чтобы полностью обезопасить наш контроль над НРА."
 YUN.lategame.462.a: "Оставьте НРА в покое, у нас есть приоритеты получше."
 YUN.lategame.462.b: "Обеспечить наш контроль над регионалистскими офицерами."
 YUN.lategame.462.c: "Активно продвигать PSC."

 YUN.lategame.463.t: "Восход Данвай"
 YUN.lategame.463.d: "Буквально переводимое как «Вне [партии]», Данвай — это термин, который приобретает большую популярность в националистическом дискурсе, особенно в популярных газетах и передовицах, таких как «Миньго Жибао». Термин относится к политическим независимым, которым разрешено принимать участие в правительстве, несмотря на то, что они номинально не являются частью Гоминьдана.\n\nВ условиях коалиции Чжана-Яна, которая теперь доминирует в Партии, многие из этих республиканских аутсайдеров, которые могли иметь политический вес в бывшем Клубе Аньфу или правительстве Бэйяна, теперь получают второй шанс на политическую известность. Поскольку новый режим стремится легитимизировать себя по всему Китаю, эти амбициозные политики возвращаются в национальную политику — часто за счет мест, которые были бы зарезервированы для лоялистов в Гоминьдане. Это вызвало значительную напряженность среди многих в Партии, которые считают, что их присутствие деградирует и размывает революционный дух Партии. Компромисс был предложен Гу Чжунсю: вместо этого предложить этим людям членство в партии как средство легитимизации их пребывания в новом Национальном правительстве."
 YUN.lategame.463.a: "В духе демократии мы должны предоставить слово стране."
 YUN.lategame.463.b: "Мы должны поощрять их к принятию членства в Гоминьдане."
 YUN.lategame.463.c: "Мы должны помнить наших истинных революционных товарищей."

 YUN.lategame.464.t: "Лица новой республики"
 YUN.lategame.464.d: "Клика политической науки включает в себя нечто большее, чем просто политиков, это разнообразная группа великих людей, находящихся в центре Нового Китая. Китая, который больше не связан иностранным унижением и руководством давно ушедшей монархии. Клика политической науки выступает за этих новых людей, великих людей, способных двигать историю самостоятельно.\n\nЕсть Вэн Вэньхао, ставший императорским ученым в юном возрасте, а затем отправившийся в Европу, где изучал геологию вместе с «тремя Вэнями» (Ху Вэньяо и Сунь Вэньяо). После учебы он работал в Министерстве сельского хозяйства и торговли Бэйяна, стал преподавателем в Институте геологии и недавно был назначен на должность министра экономики. Страстный геолог, он умолял Министерство внутренних дел расширить горнодобывающую деятельность, чтобы помочь вырастить настоящую китайскую нефтяную промышленность.\n\nУ Динчан был членом Тунмэнхоя, но вышел из революционной партии и вместо этого сдал императорский экзамен. После революции он присоединился к Прогрессивной партии и стал заместителем министра финансов в Клубе Аньфу. Потеряв актуальность после падения Аньфу, он жил в относительной политической безвестности, став успешным бизнесменом. При спонсорстве партии он стал министром промышленности, а также председателем провинциального правительства Гуйчжоу — близко к родной территории Новых правых.\n\nИ, наконец, есть политик У Течэн. Близкий друг Линь Сэня, революционер У служил в Синьхайской революции, а затем работал на доктора Суня, участвуя в Китайской революционной партии. После недолгого пребывания за границей в Гонолулу он работал вместе с Сюй Чунчжи, сражаясь с Чэнь Цзюнмином, и помогал подавлять Торговый корпус. Убежденный антисоциалист, он также особенно близок к лагерю Сунь Фо."
 YUN.lategame.464.a: "За новых ученых нового Китая!"
 YUN.lategame.464.b: "За новых планировщиков богатого Китая!"
 YUN.lategame.464.c: "За новых политиков сильного Китая!"

#Focus Tree Events (470-489):

 YUN.lategame.470.t: "Новая мода для новой жизни"
 YUN.lategame.470.d: "«Ключом к управлению этим беспрецедентным национальным кризисом было обучение и направление женщин к профессиональной жизни»\n— еженедельное женское приложение к «Миньго Жибао».\n\nВ соответствии с двойственной революционной и консервативной природой Гоминьдана, преобладает желание видеть женщин реформированными в соответствии с новыми, «патриотическими» гендерными нормами. В отличие от Европы, где многие крайне правые движения стремятся поощрять женщин оставаться дома, снижать уровень занятости на фоне «Черного понедельника» и становиться матерями, Гоминьдан считает, что индустриализирующийся Китай нуждается в большем участии женщин на рабочем месте, и, более того, проблема не столько в рождаемости, сколько в высокой детской смертности.\n\nДействительно, в рамках Движения за новую жизнь экстравагантная мода для женщин была запрещена. Платья должны быть длиной до щиколотки, расстояние между воротником и щекой должно быть не менее полутора дюймов, рукава должны доходить как минимум до локтя, разрезы по бокам юбок должны быть не выше колена, женщины должны избегать обтягивающей одежды и зачесывать волосы назад, не давая им падать ниже шеи. Завитые волосы были запрещены. Женщины в государственных учреждениях должны были подавать пример, нося короткие синие жакеты, черные юбки, черные чулки и черную обувь. Шерстяные пальто без пуговиц были запрещены.\n\nПохоже, что конфликт с консервативным революционным видением партии невелик. От женщин по-прежнему ожидают, что они будут «культивировать мирный, добрый и здоровый материнский инстинкт» и растить детей. Совместное купание полов было запрещено, как и хождение под руку на улице. Девочек следовало отделить от мальчиков в школе, чтобы положить конец совместной жизни двух полов, которая поощряла «эгоистичный дилетантизм, разжигала чувственные удовольствия и ставила под угрозу расу».\n\nТем не менее, традиционные свадьбы и похороны должны быть заменены простыми, и Гоминьдан повторил призывы Новой культуры к нуклеарным семьям, рассматриваемым как более современные и светские по сравнению с традиционной китайской структурой."
 YUN.lategame.470.a: "Мы стремимся к подлинно современному обществу для наших революционных сестер!"
 YUN.lategame.470.b: "Женщины должны следовать руководству своих революционных братьев!"
 YUN.lategame.470.c: "Пусть эти девки СИДЯТ ДОМА."

 YUN.lategame.471.t: "Женщины-националистки на войне"
 YUN.lategame.471.d: "В отчаянной борьбе Китая за выживание страна призвала на поле битвы не только своих сыновей, но и дочерей. Девушек по всей стране обучают оказывать первую помощь, ожидают выполнения задач по дому, а в некоторых случаях — даже учиться обращаться с пулеметами и боеприпасами, если ситуация станет совсем ужасной.\n\nСреди женщин Китая, поддерживающих правительство Гоминьдана, есть не кто иная, как Сун Мэйлин, жена бывшего генералиссимуса Чан Кайши. Будучи второстепенной партийной знаменитостью, учитывая ее недолгую связь с бывшим директором Вампу, Сун призвала женщин мобилизоваться на заводы подобно британским, французским и немецким женщинам, которые делали это во время Первой мировой войны. Эта мобилизация поможет повысить статус женщин в обществе, помогая женщинам восприниматься как равные мужчинам, особенно в обществе, где доминируют патриархальные нормы, таком как Китай. В акте филантропии и используя свои семейные связи, Сун также организовала сложные и современные детские дома, укомплектованные рекреационными объектами, такими как бассейны и игровые площадки, и с современными классами для растущего числа сирот в Китае.\n\nОна и другие видные женщины, включая жену Хэ Инциня, также призвали женщин участвовать в воинских частях. Будут ли они развернуты на передовой в качестве реальных комбатантов, еще предстоит увидеть, но тысячи откликнулись на призыв служить медиками и медсестрами в продолжающейся борьбе за национальное спасение."
 YUN.lategame.471.a: "Дети должны быть нашим приоритетом!"
 YUN.lategame.471.b: "Мобилизация женщин обеспечит их освобождение!"
 YUN.lategame.471.c: "Женщины тоже должны быть готовы бороться за свое выживание!"

 YUN.lategame.472.t: "Культивация и гигиена в Националистическом Китае"
 YUN.lategame.472.d: "В рамках усилий Национального правительства по возрождению и укреплению китайской нации битва за китайскую душу заключается не только в духе революции, но и в битве за возрождение китайских мужчин и женщин; их тела долгое время были опустошены годами голода, войн и болезней. Сунь серьезно говорил о своей концепции выживания наиболее приспособленных, о том, что революция должна произвести новую личность — и что если народ Китая не исцелится, он как вид будет стерт с лица земли. Движение за новую жизнь призвано пересмотреть старое Движение за новую культуру и сбалансировать китайскую моралистическую философию и западный дух. [ROOT.GetLeader] изображается в пропаганде как преданный своей жене, некоррумпированный и благочестивый, чтобы противопоставить себя милитаристам.\n\nПартия ведет серьезную работу в попытке «дерадикализировать» массовое движение и обеспечить, чтобы массовое движение оставалось послушным целям Движения за новую жизнь. В конце концов, люди, предоставленные сами себе, просто подчиняются жизненным удовольствиям и чувственности — пренебрегая своими делами и становясь реакционными дегенератами.\n\nДуховная сила, в конце концов, проистекает из принятия более здоровых и моральных принципов жизни. Вакцинация всячески поощряется в сельских медицинских пунктах, и людей учат принимать более здоровые стандарты жизни. Чистота и купание всячески поощряются, и даже уничтожение комаров показано в пропаганде как первый шаг к развитию подлинно аскетичного и гигиеничного нового китайца — такого, на которого Запад больше не будет смотреть свысока.\n\nКроме того, Чэнь Гофу предложил национализировать проституток государством. Он рассудил, что закрытие борделей просто переместит их в места, где бордели остаются законными. Бордели будут ограничены в районах, и все проститутки будут иметь доступ к «Препарату 606», арсфенамину/антибиотику, используемому для лечения опасных венерических заболеваний. Хотя это болезненно и все еще опасно, это, безусловно, более эффективно, чем традиционные методы лечения на основе ртути, и иногда может рассматриваться как эффективное средство от в противном случае смертельной болезни."
 YUN.lategame.472.a: "Мы стремимся воспитать нового китайского человека."
 YUN.lategame.472.b: "Победа в войне в их умах — ключ к революции."
 YUN.lategame.472.c: "Мы должны быть практичными в этом вопросе."

 YUN.lategame.473.t: "Движение за новую жизнь"
 YUN.lategame.473.d: "«Расцвет и упадок нации находится в прямой зависимости от процветания и упадка культуры. Если мы сначала не создадим новую национальную культуру, то восстановление нации вряд ли удастся».\n\nПравительство народа и для народа, подобное Гоминьдану, должно решать социальные проблемы, которые долгое время терзали китайское общество. Люди должны быть движимы и ведомы порядком, научены протянутой рукой и разумом Партии — испытать Новую жизнь и покончить с суевериями. Необходимо новое движение, вдохновленное митингами СЗРС Савинкова и порядком и стабильностью румынской Железной гвардии. Классовая борьба должна быть забыта, люди должны встать в строй и возродить понятие Чжунхуа.\n\nПодобно тому, как культ поклонения предкам пронизывает китайское общество, политические обозреватели и философы отметили, что аналогичная тенденция сейчас развивается для поклонения культу партийного государства. Движение за новую жизнь стремится примирить растущую вестернизацию Китая с моральными принципами, которые долгое время руководили этой нацией. Конечно, глупые концепции, такие как синдикализм и социализм, действительно не имеют места в этой стране, Гоминьдан был осквернен этими элементами — ослабляя партию внутренней фракционностью.\n\nЛюдей призывают следовать лозунговому конфуцианству, которое воплощает четыре добродетели в форме ли, и, лянь и чи (ритуал, справедливость, честность и чувство стыда/чести). Правительство обязало изучать Конфуция, соблюдать конфуцианские праздники и 96 правил, которые должны помочь регулировать повседневное поведение.\n\nКонечно, существуют философские аргументы, что это обширное движение было направлено не просто на возрождение китайского духа, но и на обеспечение выживания китайской расы. Сторонники Движения за новую жизнь утверждают, что вырождение движения «Новая культура» и чрезмерное потребление Запада привели к моральному и физическому упадку китайского народа. Многие считают, что, подражая японской воинской культуре, китайская нация должна быть реорганизована по образу японской военной академии — с дисциплиной, послушанием и эффективностью. Только при строгом и дисциплинированном возрождении внутренний человек преобразится, что в конечном итоге приведет к созданию нового общества и новой нации."
 YUN.lategame.473.a: "Мы должны отказаться от старых путей, стремиться к новому обществу!"
 YUN.lategame.473.b: "Добродетельная нация принесет истинную гармонию."
 YUN.lategame.473.c: "Мы стремимся к созданию нового человека."

 YUN.lategame.474.t: "Реформа местного самоуправления националистов"
 YUN.lategame.474.d: "Очень распространенная нить среди китайских реформаторов XX века заключается в том, что они желают возродить местную деревню и район. Националисты не исключение, хотя в отличие от своих соперников-федералистов они считают, что Центральное правительство должно играть ведущую роль в поощрении этого низового возрождения, а местная администрация, в свою очередь, поможет придать силы центральному правительству. Действительно, если на них надавить, чиновники Гоминьдана настаивают, что они строят «Лучший федерализм», где весь китайский народ работает вместе, а не воюет между провинциями.\n\nНовая система местного управления должна быть реализована с новыми уездами (сянь) с небольшими городами в качестве нового центра политической и экономической активности. Эти уезды должны стать вторым уровнем управления, уступая только провинциальному и муниципальному. За ними следуют деревни (сян) и поселки (чжэнь) наряду с другими более мелкими городами. Деревни должны возглавляться городскими администраторами или лидерами ополчения, часто отобранными вручную из более высоких уровней администрации, чтобы гарантировать стабильность и мир в сельских регионах.\n\nПроверенная и испытанная во времена династий Сун, Мин и Цин — система Баоцзя также используется новым Националистическим правительством. Генералиссимус Хэ Инцинь говорил о потенциале Баоцзя для создания подлинной обязательной военной службы. Организуя домохозяйства по 10, система Баоцзя помогает привлекать членов семьи к ответственности, поддерживать местный порядок, собирать налоги и организовывать гражданские проекты. Система Баоцзя также разработана, чтобы помочь местным жителям быть готовыми в случае подавления бандитизма, чтобы местные органы власти могли поддерживать правительство, даже если они находятся далеко от влияния столицы.\n\nНаконец, были проведены реформы в сельской местности, чтобы увеличить местные доходы провинции. Зернохранилища, укомплектованные государственными служащими, должны сообщать и вести учет зернового налога, хотя первоначальные отчеты указывают на то, что в рядах наблюдается изрядное количество коррупции и нечестности, и такие меры не были полностью успешными."
 YUN.lategame.474.a: "Порядок и безопасность принадлежат сердцу деревни."
 YUN.lategame.474.b: "К истинной гармонии и производительности потекут наши усилия."
 YUN.lategame.474.c: "Народ по-настоящему научится через систему Баоцзя."

 YUN.lategame.475.t: "Расширяющийся Центральный комитет"
 YUN.lategame.475.d: "Гоминьдан действует как партийное государство, но фактические отношения между правительством и самой партией всегда были неоднозначными. Эта дилемма усугублялась тем фактом, что фактическое управление партией стало бессистемным и громоздким. Центральный исполнительный комитет должен управлять партией от имени Национального конгресса Гоминьдана. Первоначально состоявший из 24 членов в 1924 году, с тех пор он вырос до 36, затем 71, и к этому времени составляет 119. С таким количеством членов он стал громоздким и фактически делает Законодательный Юань и Национальное собрание излишними, тем более что многие члены Центрального комитета также занимают места в обоих!\n\nСокращение членства вызвало слишком сильное сопротивление, поскольку членство в ЦИК фактически было наградой за подчинение, поэтому был опробован альтернативный план создания постоянного комитета из 3-15 членов. Первоначально предполагалось, что это будут президент Хэ Инцинь и премьеры Дай Цзитао и Ху Ханьминь, затем он включил все пять ветвей, и довольно скоро стал таким же неуправляемым, как и ЦИК.\n\nПредпринимается третья попытка реформировать систему с призывами создать Политический совет, включающий 9 членов постоянного комитета и 6 других, избираемых общей сессией ЦИК, с членством без права голоса, набираемым из кабинета. Сунь Фо и Ху Ханьминь составили описание того, как это должно выглядеть: «Политический совет является руководящим и директивным органом для задачи национальной опеки... Это партийный орган для управления партийными делами. Это не правительственный орган; тем не менее он инициирует фундаментальную политику правительства. Другими словами, политический совет наделен властью определять фундаментальные цели в период политической опеки... единственное связующее звено между партией и правительством».\n\nОднако уже раздаются призывы включить больше регулярных и альтернативных членов ЦИК и Центрального наблюдательного комитета, и если все они будут приняты, то численность составит почти 200 человек!"
 YUN.lategame.475.a: "Какая катастрофа... но мы заставим это работать, я полагаю."
 YUN.lategame.475.b: "В Политическом совете будет 200 человек, но постоянный комитет — только из 15."
 YUN.lategame.475.c: "Вся эта система должна быть перестроена с нуля!"

 YUN.lategame.476.t: "Аудиты и расследования в Националистическом Китае"
 YUN.lategame.476.d: "Формирование временного Экзаменационного и Контрольного Юаней было моментом для празднования, но, как и большинство вещей в Китае, они погрязли в тех же проблемах коррупции и некомпетентности, которые они были призваны остановить. Экзаменационный Юань, основанный на ранее существовавшей структуре императорских экзаменов, призван отсеивать некомпетентных претендентов на политические посты и поощрять правительство, основанное на меритократии и мастерстве.\n\nПредполагается, что Экзаменационный Юань будет иметь верховную власть над назначениями на государственную службу как на национальном, так и на провинциальном уровне. Экзаменационная комиссия должна устанавливать время, место и формы для экзаменуемых — включая временный совет экзаменов. Министерство персонала ведет учет должностных лиц в соответствии с системой ранжирования бюрократов Гоминьдана. Однако эта вытянутая бюрократия благоприятствует тем, кто наверху, в то время как те, кто находится на нижних ступенях, часто не могут создать устойчивый доход.\n\nКонтрольный Юань, призванный искоренять коррупцию, был перегружен расширением Экзаменационного Юаня. С таким большим правительством для администрирования Контрольный Юань является надзорной и аудиторской ветвью правительства Китайской Республики. Теоретически он имеет право объявлять импичмент правительственным чиновникам (не президенту и вице-президенту), выносить порицание чиновникам, принимать корректирующие меры, и он имеет возможность проводить аудит годового бюджета. Однако, поскольку проблема коррупции, по-видимому, является эндемичной для китайского политического общества, многие просто склоняются к тому, чтобы направить годовой бюджет на другие меры, в то время как другие выступают за увеличение финансирования Контрольного Юаня."
 YUN.lategame.476.a: "Больше финансирования для Экзаменационного Юаня."
 YUN.lategame.476.b: "Больше финансирования для Контрольного Юаня."
 YUN.lategame.476.c: "Нам нужны эти деньги в другом месте."

 YUN.lategame.477.t: "4 элемента и 9 принципов образования"
 YUN.lategame.477.d: "Чэнь Лифу, несмотря на взлеты и падения своей карьеры, остается видным деятелем образования. Он представил смелое, всеобъемлющее предложение по адаптации системы образования к потребностям военного времени перед Чрезвычайным национальным конгрессом Гоминьдана, предложив 4 элемента и 9 принципов для руководства нашими образовательными реформами, а также 17 способов их реализации.\n\nЭти элементы таковы: 1) Пересмотреть системы образования и учебные материалы и следовать учебным программам военного времени; 2) Обучать персонал с различными навыками и назначать их в соответствии с потребностями военного времени; 3) Подчеркнуть культивирование национальной этики, интенсифицировать научные исследования и расширить научные учреждения; 4) Обучать молодежь служить обществу и и дальше укреплять нашу способность вести войну сопротивления.\n\nОни должны поддерживаться девятью принципами: 1) Развивать образование умственными, физическими и дисциплинарными средствами; 2) Сочетать гражданское с военным; 3) Делать одинаковый упор на аграрные и промышленные нужды; 4) Иметь последовательность в образовательных и политических целях; 5) Связывать воспитание в семье со школой; 6) Использовать научные методы для реорганизации и преподавания литературы, истории, философии и искусства для построения национального характера на основе китайской традиции; 7) Увеличить обучение естественным наукам для удовлетворения насущных потребностей национальной обороны и производства; 8) Обновить социальные науки для изучения, соответствия нашим собственным национальным условиям и поощрения инноваций; 9) Четко определить наши цели в области образования, работать над выравниванием образования и обучения в разных местностях, сделать обязательное образование всеобщим для всех, реализовать нашу программу социального и семейного воспитания.\n\nСитуация мрачная, но седовласый джентльмен не падает духом в своих усилиях переформировать китайские умы. Будущее не ждет, пока молодежь повзрослеет, и если Китай хочет пережить эти годы бед, он должен научить свою молодежь, как ориентироваться и преодолевать предстоящие испытания."
 YUN.lategame.477.a: "Молодежь должна научиться сражаться и дисциплине, чтобы выжить."
 YUN.lategame.477.b: "Через науку и производство студенты могут построить наше будущее!"
 YUN.lategame.477.c: "Наши будущие товарищи должны изучать Принципы и государственную службу!"

 YUN.lategame.478.t: "Обучение на фоне национальных потрясений"
 YUN.lategame.478.d: "Чэнь Лифу, несмотря на взлеты и падения своей карьеры, остается видным деятелем образования. Поскольку войны в Китае вызывают значительные разрушения, а японская угроза спровоцировала исход студентов и ученых на запад, у него, безусловно, много работы. По его словам, «в то время как работа горного инженера состоит в том, чтобы открывать и разрабатывать подземные ресурсы, администратор образования должен открывать и развивать человеческие ресурсы. В Америке образовательная работа часто называется «человеческой инженерией».\n\nДаже до того, как дополнительные тяготы войны оставили систему образования в руинах, иностранные наблюдатели отмечали, что распределение ресурсов в китайской системе образования крайне неравномерно, а многие преподаватели неквалифицированны и используют неэффективные методы обучения, такие как зазубривание для сложных проблем. Чэнь выразил дальнейшее разочарование тем, что большинство продвинутых предметов преподаются на иностранных языках, что отражает всепроникающее иностранное влияние и еще больше делает техническое образование недоступным для обычных китайских студентов.\n\nВ наш краткий перерыв относительного мира Чэнь собрал сотни профессоров из разных университетов на нескольких крупных конференциях, чтобы составить десятки модернизированных учебных программ и учебников. Министерство образования также попыталось сократить раздутые штаты и слабые стандарты в высших учебных заведениях, разделив преподавателей на четыре ранга (профессор, доцент, лектор и ассистент преподавателя) и настаивая на определенной квалификации для каждого.\n\nЧэнь также настоял на переклассификации занятий как обязательных или факультативных, требуя создания учреждений для исследования удобрений, свиной щетины, тунгового масла, чая, фарфора и шелковой ткани, вероятно, вдохновленный традиционной китайской экономической теорией, но он утверждает, что это поможет устранить разрыв между планом Национальной экономической реконструкции Суня и системой образования. Менее спорно то, что он выделил деньги на исследовательские субсидии и стипендии, а также предоставил квалифицированным профессорам возможность уйти в творческий отпуск."
 YUN.lategame.478.a: "Студенты, перемещенные войной, должны отложить свои книги и взять в руки винтовку!"
 YUN.lategame.478.b: "Чтобы справиться с дефицитом, мы должны сосредоточиться на практическом и традиционном применении уроков."
 YUN.lategame.478.c: "Мы должны найти деньги для квалифицированных учителей и их проектов!"

 YUN.lategame.479.t: "Бюро расследований и статистики за работой"
 YUN.lategame.479.d: "Бюро расследований и статистики (BIS) Центрального организационного отдела Гоминьдана усердно работало под эгидой Чэнь Лифу и его постоянно растущего портфеля. В дополнение к своим одноименным ролям расследования и тайного сбора разведданных, BIS также серьезно относится к своим вспомогательным функциям связи и контрразведки.\n\nОни гордятся тем, что управляют несколькими коротковолновыми радиостанциями между городами, окружающими столицу, пионером которых стал один инженер с американским образованием по имени Ли Фаньи, специализирующийся на коротковолновом электричестве. Говорят, что эта система радиосигнализации улучшает правительственную связь, а также может иметь боевое применение для связи между военными штабами и Президентским дворцом.\n\nВ поддержку своей роли связи они стали весьма искусны в дешифровке и оперативной безопасности. Чэнь Лифу, который постоянно держит при себе книгу кодов, лично разработал систему индексации китайских иероглифов по 5 штрихам, которую он попытался популяризировать как в правительственных учреждениях, так и среди широкой общественности.\n\nИзвестно, что BIS и, как следствие, Клика СС управляют различными подставными организациями. Крупнейшей из них является Промышленная компания «Чжэнъюань», подставная корпорация, которая позволяет Клике СС перемещать деньги и вести экономический шпионаж. Ходят слухи, что ценная Китайская инженерная ассоциация Чэнь Лифу и их штаб-квартира также являются прикрытием для конспиративных квартир Клики СС.\n\nОднако деятельность BIS не осталась полностью бесконтрольной. Дин Моцунь, начальник Секции общих дел, недавно был обвинен в коррупции — его соперники из BSS потребовали расследования расходов, связанных с обеспечением безопасности видных левых перебежчиков. Хотя Дин утверждает, что обвинения политически мотивированы, его статус бывшего социалиста, перешедшего на другую сторону во время реорганизации 1924 года, усилил подозрения, как и его репутация импульсивного человека."
 #NOTE: Zheng yuan shiye she (正元實業社) is the company in question, the academic source material uses \"Origin of Basic Industrial Company\"
 YUN.lategame.479.a: "Их работа в области коммуникаций объединяет нацию."
 YUN.lategame.479.b: "Коды и шпионаж помогают защитить партию."
 YUN.lategame.479.c: "Я думаю, пришло время проверить их отчеты о финансировании."

 YUN.lategame.480.t: "Образцовая полиция для Образцового Китая"
 YUN.lategame.480.d: "Бюро общественной безопасности делает успехи под руководством Чжан Цюня и законников, связанных с Кликой политической науки. В авангарде их общественной деятельности находится Полицейская академия [Root.Capital.GetCapitalVictoryPointName], которую [ROOT.GetLeader] назвал образцом для подражания для всех других полицейских академий. Более 350 молодых курсантов обоего пола обучаются в этом учреждении и получают как бесплатное жилье, так и щедрую ежемесячную стипендию.\n\nВоенизированные по своей природе, их дни начинаются с сигналов горна и церемоний поднятия флага перед длительной учебной программой, которая включает плавание, джиу-джитсу, военную науку и политическое образование под руководством военных офицеров и политических комиссаров. Студентам второго курса разрешается специализироваться в одной из четырех областей: администрирование, уголовное расследование, иностранные службы, а также обучение и администрирование женщин-полицейских. Курсантам разрешается проходить службу в местных полицейских силах во время обучения, а по окончании они оснащаются оружием и современными автомобилями.\n\nХотя звезда Америки, возможно, померкла, ее влияние ощущается в китайской полицейской системе. Говорят, что националистические полицейские силы копируют принципы, установленные Августом Фоллмером в Калифорнии, сокращая уровень преступности вдвое. Ведущие следователи искали опыт ФБР, подражая их методам снятия отпечатков пальцев и федеральной полиции.\n\nОднако, пожалуй, самой элитной полицейской силой является Китайская военная полиция. Учрежденная как отдельная ветвь Национально-революционной армии, она завоевала репутацию Преторианской гвардии Президента. Возглавляемая Гу Чжэнлунем, прозванным «Отцом жандармерии», ее девиз: «не лги, не обманывай, выполняй свой долг и выполняй свои обязанности». Будучи также тщательным экспертом в области военного права, их главная обязанность — предотвратить военный переворот."
 YUN.lategame.480.a: "У нас нет ничего, кроме похвалы этим отличным студентам и школам."
 YUN.lategame.480.b: "С современными следователями организованной преступности стоит поберечься!"
 YUN.lategame.480.c: "Военная полиция будет держать военных в узде."

 YUN.lategame.481.t: "Борьба за власть в Тэу"
 YUN.lategame.481.d: "Тэу (Спецслужбы), возможно, начинали как Вторая (Военная) секция партийного Бюро расследований и статистики, но с тех пор переросли свое материнское агентство. С помощью обученных за границей тайных полицейских эта секретная служба разделила своих стажеров на секции A, B, C и связи — каждая из которых насчитывает около двух или трех дюжин курсантов, проходящих изнурительную шестимесячную программу обучения перед принятием в качестве «Основного персонала» в Департамент специальных служб.\n\nКурсанты секции B — выпускники полицейской академии, которые должны стать личными телохранителями президента. Тем временем студентки секции C, состоящей исключительно из женщин, обучаются стрижке и кулинарии, готовясь стать «персоналом прикрытия». Эти агенты должны организовывать «отношения прикрытия» в подразделениях Секретной службы.\n\nСекция А считается «костяком кадров», номинально инструктируемым лично Ли Шичжэнем (хотя повседневное обучение проводят другие офицеры). Они должны изучать теорию специальных операций, секретные коды и шифры, химические методы для ядов и коммуникаций, военную географию, международный шпионаж, политическую теорию, выслеживание и отслеживание, взрывчатые вещества и подрывное дело, стенографию и скоропись, сбор разведданных, физиогномику, фотографию, джиу-джитсу, китайский бокс, вождение автомобиля и верховую езду, а также иностранные языки — продвинутая программа для самых элитных шпионов и убийц нации.\n\nИх репутация и сила выросли настолько, что теперь они стремятся к полному контролю над партийными следственными делами. Кроме того, они требуют упразднения Корпуса охраны мира и жандармерии и власти над всей национальной полицией, одновременно подрывая разведывательную ветвь Молодежного корпуса Трех принципов. Эти шаги, которые подорвали другие крылья партии, привели к совместным усилиям потребовать от [ROOT.GetLeader] отобрать Департамент специальных служб у Ли Шичжэня и перераспределить его полномочия более равномерно между ветвями."
 YUN.lategame.481.a: "Мы должны расширить Президентскую охрану."
 YUN.lategame.481.b: "Отправить Тэу охотиться на врагов революции."
 YUN.lategame.481.c: "Я думаю, пришло время урезать их до нужного размера."

#Sino-Japanese War Events (490-499):
 YUN.lategame.490.t: "Декларация в [YUN_GetDeclarationLocation]"
 YUN.lategame.490.d: "«Если мы уступим хоть дюйм земли и суверенитета, мы будем вечными грешниками китайской нации! В то время мы сможем сражаться только жизнями всей нации, чтобы искать нашей окончательной победы. Когда наступит последний момент, мы сможем сражаться только жизнями всей нации, чтобы спасти страну. Когда наступит последний момент, у нас не будет выбора, кроме как жертвовать до конца и сражаться до конца. Где бы вы ни были, какого бы возраста вы ни были, мужчина или женщина, у каждого есть ответственность защищать землю и вести войну!»\n\nС громким одобрением Декларация [YUN_GetDeclarationLocation] была зачитана вслух толпе зевак [ROOT.GetLeader], под эхо возгласов «Чжунхуа Миньго Ваньсуй!» (Да здравствует Китайская Республика!). Поскольку захватчики теперь маршируют по китайской земле, совершая невыразимые акты террора среди наших давно угнетенных народов — пришло время каждому китайцу присоединиться к национальной борьбе и спасти китайскую расу от вечного истребления. [ROOT.GetLeader] уже занял новую должность военного времени — Генерального директора, и [ROOT.GetSecondInCommand] также последовал его примеру, организовав Национальный государственный совет для эффективного выполнения чрезвычайных и необходимых военных приказов без бремени бюрократии. Став Генеральным директором, [ROOT.GetLeader] теперь имеет паритет с покойным доктором Сунь Ятсеном, но в ситуации, становящейся все более отчаянной, — трудные времена требуют сильного лидера, чтобы вести Китай в его борьбе.\n\nПусть все патриотичные китайские мужчины и женщины прислушаются к призыву защищать свою родину, чтобы не видеть, как их любимая страна погибает. Ружье на плече, сабля на запястье — с кровью, кипящей как дикий прилив, все патриотичные мужчины и женщины будут служить своей стране сегодня."
 YUN.lategame.490.a: "Согласие между нашим правительством и народом — первое условие победы."
 YUN_GetDeclarationLocation_lushan: "Лушане"

 YUN.lategame.491.t: "Социальное образование"
 YUN.lategame.491.d: "Повышение грамотности в Китае — это непрекращающаяся битва, которая сбивает с толку китайских реформаторов образования. Война вставила еще одну палку в колеса их планов, но, несмотря на это, [ROOT.GetLeader] полон решимости упорствовать. Партия приказала построить новые библиотеки, музеи и художественные галереи в пределах дружественных линий в рамках своей программы «Социальное образование», призванной позволить среднему гражданскому лицу узнать о том, что значит быть китайцем.\n\nМинистр образования Чэнь Лифу поручил Национальному институту Дуньхуана изучить буддийские места и реликвии на северо-западе, выставив их результаты в Центральной галерее искусств. Продолжая свои планы, Чэнь основал Национальный колледж социального образования и Национальную академию музыки, чтобы взрастить музыкальную культуру, которая представляла бы моральный и современный Китай. Программа также будет нанимать людей из слоев, которые обычно были бы отвергнуты, таких как нищие, бездомные и женщины, чтобы наконец дать им шанс обучиться и использовать свои новые навыки по всей стране для продвижения китайской культуры.\n\nЧэнь Лифу также работал и продвигал другую программу под названием «Образование с помощью электрических аудиовизуальных средств», используя методы, популярные на западе, такие как кино и радиовещание, для использования по всей стране. Это также будет связано с новым набором дней фестивалей, которые будут включать День театрального фестиваля, День фестиваля искусств, День фестиваля радиовещания, День музыкального фестиваля и День спортивного фестиваля, чтобы поощрять и растить культуру современного Китая на грядущие дни.\n\nНекоторые критиковали Чэня за создание формы «контроля мыслей», что он яростно отрицал. Он утверждает, что марксисты регулярно распространяют свою пропаганду среди общественности ради собственной выгоды, а защита культуры нации является фундаментальной задачей современного правительства."
 YUN.lategame.491.a: "Яркие новые умы для светлого будущего!"

 YUN.lategame.492.t: "Офис моральных учений"
 YUN.lategame.492.d: "Начало Войны Сопротивления не остановило неустанные усилия Чэнь Лифу и Министерства образования по индоктринации молодежи в лояльные партийные кадры. Он сформировал Офис моральных учений с намерением поддерживать обучение молодежи, несмотря на чрезвычайную ситуацию, призванный наставлять и поддерживать студентов колледжей на протяжении всего кризиса.\n\nИ им это, безусловно, нужно. Еще до войны часто говорили, что «безработица ждет выпускников» и что «когда в школе на одного ученика больше, общество теряет производителя; когда из школы выпускается еще один человек, общество получает еще одного безработного». Но начало войны по иронии судьбы открыло много рабочих мест, которые офис стремился заполнить, поощряя недавних выпускников или тех, чье образование было прервано, браться за эти патриотические задачи.\n\nДля студентов, продолжающих обучение, отделение по делам студентов было уполномочено помогать в надзоре за студенческими кредитами, облегчением долгового бремени, медицинским обслуживанием и процессом военного призыва. Все это время им поручено следить за студенческой активностью и гарантировать, что молодых мужчин и женщин не «сбивает с пути неправильное мышление, и они в конечном итоге не мешают военным усилиям», как пишет Чэнь Лифу.\n\nЧтобы еще больше снизить нагрузку, Чэнь Лифу попытался оптимизировать образование. Существующие китайские университеты, как правило, предпочитают американскую систему регулярных и семестровых экзаменов, где студенты зарабатывают кредиты для выпуска. Хотя это, возможно, полезно в Америке, при постоянных сбоях в Китае большинство наблюдателей посоветовали перейти на европейский метод без экзаменов в течение учебного года и с одним выпускным экзаменом. Министерство образования решило сделать и то, и другое — давать кредиты, заработанные на семестровых экзаменах, но также проводить и выпускной экзамен."
 YUN.lategame.492.a: "Учим их пути к победе."

 YUN.lategame.493.t: "Дебаты о призыве"
 YUN.lategame.493.d: "У Китая огромное население, но сам масштаб войны и сокращение числа добровольцев спровоцировали серьезные дебаты о призыве. Военный совет представил свои доводы в пользу широкомасштабного призыва, впервые предложенного Хэ Инцинем пророчески в 1928 году. Согласно его плану, все дома будут обследоваться в течение года, затем в следующем году будет создан список всех подходящих мужчин. Мужчины будут отбираться в соответствии с системой Баоцзя, а новобранцы ежегодно будут отправляться в тренировочные лагеря, где они будут служить ополченцами в течение трех лет на постоянной основе, а затем шесть лет как «неактивные», оставаясь в резерве до 40 лет.\n\nЭта система ополчения, как предполагается, основана на наблюдениях Хэ Инциня в Японии и некоторых системах, внедренных Новой кликой Гуанси. Акцент делается на равенстве, при этом «Три равенства призыва» заключаются в том, что призывники должны отбираться без учета происхождения, бремя возлагается на все провинции поровну в зависимости от численности населения, и справедливо чиновниками. Они стремились провести реформы, чтобы привлечь более молодых, более квалифицированных офицеров Баоцзя из традиционно неохотных джентри: возмещая им расходы за службу, освобождая их от других обязанностей, предоставляя бесплатное образование детям военнослужащих и снижая налоги для тех, кто активно служит.\n\nНа практике призыв не дотянул до эгалитарных принципов, которые были обещаны. Истории о принудительном призыве под дулом пистолета и насильственных похищениях призывников распространились повсеместно. Многие офицеры молодой гвардии Вампу также протестуют против разбавления армии низкокачественным ополчением.\n\nМинистерство образования выступало за отсрочку призыва, заявляя, что в Китае много рабочей силы, но очень мало людей с высшим образованием. Чэнь Лифу предложил четыре элемента политики: во-первых, те, кто хочет сражаться, будут отпущены министерством; те, кто непригоден к военной службе, должны продолжить образование; те, кто уже учится, должны откликнуться на призыв правительства после окончания семестра; и любая молодежь, не служащая в армии, должна учиться."
 YUN.lategame.493.a: "Мы склоняемся к плану Министерства образования."
 YUN.lategame.493.b: "План Военного совета лучше."

 YUN.lategame.494.t: "Predictions of the Dharma Assembly"
 YUN.lategame.494.d: "When the Northern Expedition began so many years ago, the arch-imperialists in Berlin saw fit to put down our flame. Once again, with the revolution finally underway once again, the Japanese bandits have seen fit to inherit Germany's mantle for destruction and international tyranny and march against us. If China is to finally throw off the shackles of imperialism and repudiate the Century of Humiliation, then the war must not be fought through simply the rifle, but with the spiritual prowess of the Chinese people.\n\nNone more aware of this is Dai Jitao, who has organised the National Protection and Disaster Relief Dharma Assembly (hu guo xi zai fa hui) to bolster the Republic against the Japanese onslaught. On the advice of Dai, Generalissimo He Yingqin has invited prominent Chinese and Tibetan monks to this Dharma Assembly, organised to be in session for many weeks. Among the attending monks is the Venerable Master Xuyun, secretly invited by the Nationalist Government to preside over the rituals and was welcomed personally by Chen Lifu upon his arrival. On the first day of the Assembly, Dai set up a vegetarian feast at a local temple in the capital which saw both He Yingqin and Xuyun attend.\n\nDuring the festivities, the Generalissimo and Dai engaged in a lengthy discussion over the War of Resistance. When pressed about his opinions on the war, Master Xuyun asked a waiter for a pair of scissors and took out a piece of paper from his pocket. After cutting the paper into a square, folding it three times diagonally, and then cutting it horizontally three times, Xuyun unfolded the paper to reveal two characters: a cross and sun. After a moment of contemplation, Xuyun declared that this was a sign that Germany and Japan, the two imperialist titans who plundered China, would fall in the War of Resistance. Generalissimo He Yingqin said nothing in response but merely smiled."
 YUN.lategame.494.a: "We march to see Master Xuyun's predictions through!"

##KMT Satellite Narrative Events (500-539)
 YUN.lategame.500.t: "Неудачное обезглавливание"
 YUN.lategame.500.d: "Великая волна веселья и ликования прокатилась по всей нации! Ибо Белое солнце наконец-то искоренило мерзких управляющих наследием несостоявшейся Бэйянской республики из Северной столицы нации. Горны начали звучать даже в [ROOT.Capital.GetCapitalVictoryPointName]. Для других в провинции это время празднования, для Ли Гэньюаня и Чжу Пэйдэ это время действий.\n\nДолгое время противостояв влиянию предательского лейтенанта Тан Цзияо, Ху Жоюя, отчасти из-за того, что он представлял передовой край консервативного влияния Юньнани, и из-за значительных сил под его контролем, такое соглашение в конечном итоге подошло к концу. Или так предполагалось. Пытаясь завершить свою окончательную консолидацию Юго-Запада, дуэт провинциального Гоминьдана попытался вытеснить Ху в момент триумфа, мобилизовав силы Ли Ми для быстрого окружения Ху и требования его сдачи.\n\nОднако, предупрежденный заранее, Ху сумел обойти наступление Ли, вызвав небольшое восстание на юге из своей резиденции власти в Мэнцзы. Поддерживаемое джентри и торговцами, это восстание под руководством региональной элиты является лишь последним крупным препятствием для Белого солнца, чтобы охватить весь Юго-Запад, от горного пика до разверзающейся пропасти."
 YUN.lategame.500.a: "Гниль должна быть вырезана! Вперед!"
 YUN.lategame.500.b: "Тирания партийного государства должна быть предотвращена!"

 YUN.lategame.501.t: "Переворот Гражданского строительства"
 YUN.lategame.501.d: "В разворачивающейся ситуации после восстания Ху Жоюя в Мэнцзы, похоже, что другие заговорщики, находящиеся в тени Белого солнца, не сидели сложа руки. Генерал Чэнь Чэн, накапливая влияние в свете падения Хэ Инциня внутри Клики Вампу, наконец продемонстрировал свою неуклонно растущую руку.\n\nИспользуя ситуацию и свергнув товарища по Гоминьдану и губернатора Гуйчжоу Чжан Цюня, гамбит Чэна увенчался успехом с небольшими трудностями. Сплотив свои силы под началом Сюн Шихуэя и Чжан Цюня, Политическая наука начала быстро организованную эвакуацию в провинцию Юньнань из Гуйчжоу. Позволив Гражданскому строительству ненадолго консолидироваться, и Чэнь, и Чжан пришли к одному и тому же выводу: Вампу не сможет выжить, как только генерал Чжу Пэйдэ восстановит свои позиции в Юньнани.\n\nЕсли восстание Ху Жоюя в Мэнцзы будет подавлено достаточно быстро, чтобы позволить 3-й армии перебросить свои силы на восток, они, несомненно, восстановят свой де-факто контроль над провинцией Гуйчжоу. В ответ на такой маневр Чэнь Чэн и Ло Чжоин начали перенаправлять свои силы для наступления на Куньмин с северо-востока, пытаясь захватить весь Юго-Запад самостоятельно. В свою очередь, они начали преследовать формирования Политической науки, чтобы предотвратить любые изнуряющие атаки."
 YUN.lategame.501.a: "Силы губернатора Чжана отступают в полном порядке."
 YUN.lategame.501.b: "Силы генерала Чэна уничтожают отступающие формирования."

 YUN.lategame.502.t: "Война на два фронта"
 YUN.lategame.502.d: "С быстрым ухудшением ситуации как на юге, так и на северо-востоке, личное скопление лоялистов и союзников Чжу Пэйдэ фактически оказалось в ловушке. Выделив большую часть 3-й армии на передовые позиции против Ху Жоюя на юге, осталось очень мало потенциальных защитников, способных сдержать наступление Чэнь Чэна.\n\nВ конечном счете даже защитники, которые упорствуют, являются лишь жалкой тенью гордости НРА. В основном состоящие из деморализованных подразделений PSC под командованием Чжан Цюня и Сюн Шихуэя, многие только что отступили из Гуйчжоу. Сосредоточенные в первую очередь на сохранении собственных сил, их удержание Чжаотуна далеко от гарантированного.\n\nСозвав военный совет своего старшего штаба, Чжу Пэйдэ проконсультировался с Ли Гэньюанем, Чжу Дэ, Цзинь Ханьдином и Фань Шишэном относительно наилучшего подхода к решению их затруднительного положения. Увы, они разделились на три лагеря:\n\nЧжу Пэйдэ со своей стороны желает надавить на Ху Жоюя в Мэнцзы, устранив угрозу на юге, прежде чем развернуться, чтобы сразиться с наступлением Чэнь Чэна в быстрой кампании, даже за счет сил PSC. С другой стороны, Ли предложил перебросить подразделения в Чжаотун с тыловых позиций в Мэнцзы, притупив наступление 1-й армии с достаточной силой для начала контратаки. Очевидно, что такой шаг наиболее выгоден Ли политически, поскольку он сохраняет силы Чжан Цюня, усиливая PSC.\n\nИграя роль спойлера, прежде чем между Ли и Чжу мог разгореться спор, генерал Чжу Дэ учтиво предложил своим старшим командирам свой собственный план. Вместо того, чтобы начинать какое-либо наступление, 3-я армия отводит все силы, включая Ли Ми на юге и Чжан Цюня на севере, на оборонительные позиции и просит Центральное правительство потребовать от Чэнь Чэна отступить.\n\nПоскольку Цзинь и Фань остаются в стороне, их мнения, несомненно, повлияют на общий исход встречи. Поскольку все планы имеют свои достоинства, недостатки и политические махинации, стоящие за их созданием, ни один из них не является верным путем к успеху. Однако стало совершенно очевидно, что Цзинь находится в кризисе, разрываясь между своей дружбой, своим наставником и своим начальником."
 YUN.lategame.502.a: "План Чжу Пэйдэ — идти сражаться за Мэнцзы."
 YUN.lategame.502.b: "План Ли Гэньюаня — идти сражаться за Чжаотун."
 YUN.lategame.502.c: "План Чжу Дэ — просить поддержки у Центрального комитета."

 YUN.lategame.503.t: "Восстание в Люляне"
 YUN.lategame.503.d: "Независимо от плана атаки, разработанного военным советом Чжу Пэйдэ, исход был еще больше запутан вспышкой восстания в Люляне. Возглавляемые различными сельскими социалистическими повстанческими группами, которые оставались активными в Юньнани со времен Северного похода, они являются другим зверем по сравнению с теми, кто упорствовал в Миньгани. В то время как повстанцы Миньгани часто сотрудничали с бандитами в своей революционной борьбе, повстанцы Юньнани часто сотрудничали с сочувствующими районными чиновниками и другими приверженцами истеблишмента.\n\nУезд Люлян, к востоку от Куньмина и к югу от Цюйцзина, является домом для большого количества студентов. В довольно амбициозной операции, возглавляемой Ван Дэсанем, ему удалось завербовать Сюн Цунчжу и других местных магистратов, стремящихся проверить силу ополчения джентри, многие из которых восстают в пользу Ху Жоюя на юге.\n\nВ конечном счете их план вращается вокруг скоординированной атаки на список «деспотичных джентри» в Юньнани, таких как Сунь Юйшань, крупный землевладелец, который успешно объединил многие ополчения Баоцзя под своим зонтиком, и Ян Даофэн, который, как говорят, контролирует все, что происходит в районах, через сеть неофициальных связей. Однако их попытки убить Суня и Яна немедленно провалились, оставив восстание в тупике. Из-за относительной изоляции региона, затрудняющей сплочение народной поддержки, хаос с восстанием Ху и наступлением Чэна позволил их восстанию устоять.\n\nВ Новом обществе Юньнани ходят слухи о перспективных планах заручиться помощью Чжу Дэ и других сочувствующих офицеров в 3-й армии для получения более тяжелой огневой мощи или даже, возможно, обратиться к Гражданскому строительству Чэнь Чэна, полагаясь на его предполагаемые реформистские полномочия. Однако координация между любым из вариантов является нелегкой задачей в сочетании с уже напряженной ситуацией в ядре восстания. Тем не менее жалкое восстание Вана пробило брешь в линиях Куньмина, которую, несомненно, трудно заполнить."
 YUN.lategame.503.a: "Прибытие сил Чжу Дэ стабилизирует регион."
 YUN.lategame.503.b: "Авангард Чэнь Чэна использует брешь в линии Куньмина."
 YUN.lategame.503.c: "Победа джентри создает передовую базу для Ху Жоюя."

 YUN.lategame.504.t: "Куньмин сотрясают беспорядки"
 YUN.lategame.504.d: "С хаосом, быстро нарастающим и захватывающим провинцию Юньнань, беспорядки стали делом повседневной жизни в столице провинции. Значительная анархия охватила улицы Куньмина, особенно в свете ухода лучших дивизий Чжу Пэйдэ из города. Радикальные студенты и городские профсоюзы в равной степени восстали в «защиту революции» и начали конфликтовать с торговой элитой в Куньмине, которую они обвиняют в том, что она является подрывной силой в союзе с Ху Жоюем и его торговыми кланами Мэнцзы.\n\nВ ответ Торговая палата Юньнани обвинила Чжу Дэ и его союзников, таких как Тан Хуайюань и Цзэн Ваньчжун, в стремлении к социалистическому перевороту через предполагаемые связи с социалистическими радикалами в столице. Хотя это правда, что Чжу сочувствует радикалам, он неоднократно клялся в верности Чжу Пэйдэ как своему начальнику и, что самое главное, другу.\n\nДругие командиры в 3-й армии, такие как амбициозный Фань Шишэн и разумный Цзинь Ханьдин, отреагировали типично для их статуса «темных лошадок». Сочувствующий социализму и лучший друг Чжу Дэ, Цзинь Ханьдин был скован своей верностью Чжу Пэйдэ как своему начальнику и своей собственной личной моралью. С другой стороны, Фань Шишэн остался в стороне, ожидая наиболее выгодной сделки для себя, возможно, даже восстановления его 16-й армии.\n\nВнутренне Чжу Пэйдэ настаивал против обвинений Палаты, полагая, что лояльность Чжу Дэ гарантирована, несмотря на потенциальные доказательства обратного. С другой стороны, Ли Гэньюань настаивал на том, чтобы левые полностью отступили, намекая, что они представляют критическую угрозу для режима провинциальной администрации. Одновременно он предложил примирительное отношение к Торговой палате для поддержания фискальной ответственности. Для большинства стало совершенно очевидно, что старые раны между Ли и Чжу снова открываются..."
 YUN.lategame.504.a: "Чжу Дэ никогда бы нас не предал!"
 YUN.lategame.504.b: "Согласиться с Торговой палатой и наблюдениями Ли."

 YUN.lategame.505.t: "Марш 1-й армии"
 YUN.lategame.505.d: "В их всегда триумфальном и непоколебимом продвижении от Гуйчжоу далее к Куньмину, похоже, что Клика Вампу Чэнь Чэна сумела успешно пересечь границу, наконец достигнув Чжаотуна. Устанавливая осадные приготовления для взятия города у защитников, похоже, что события в лагере Чэнь Чэна также развиваются быстро. Многие из более осторожных и опасливых офицеров в его окружении, такие как Цзян Динвэнь, Цянь Дацзюнь и наиболее яростно Гуань Линьчжэн, оказались громкой оппозицией решительному маршу Чэна. Опасаясь, что 1-я армия стала слишком растянутой и теряет свое направление, оппозиционные офицеры сформировали значительный блок, задерживая любое продвижение.\n\nБолее того, широкий шатер Гражданского строительства Чэна начал испытывать значительное напряжение из-за своей многогранной и почти противоречивой природы. Включая как правых, таких как Вэй Лихуан или остатки Клики Вампу Хэ Инциня, наряду с такими самопровозглашенными «социалистами в душе», как Чэнь Чэн, начала развиваться небольшая волна распрей. Осложняет это природа различных клик Гуйчжоу, которые присоединились к генералу, которые все больше напрягаются в отношениях с Чэнем из-за несогласия с тем, что кажется отчаянным гамбитом в Куньмин.\n\nС точки зрения политики внутренние фракции еще более измотаны. Левые стремятся объединиться с такими, как Новое общество Юньнани Ван Дэсаня и их восстание в Люляне, надеясь свергнуть и Ху Жоюя, и Куньмин. Напротив, различные правые в лагере Чэна искренне надеются прийти к соглашению с Чжу Пэйдэ и 3-й армией, в то время как генерал Чэнь настаивает на сохранении сплоченности сил."
 YUN.lategame.505.a: "Революционеры должны держаться вместе, независимо от вероисповедания."
 YUN.lategame.505.b: "Компромисс может позволить избежать кровопролития."

 YUN.lategame.506.t: "Дилемма Мэнцзы"
 YUN.lategame.506.d: "В другом месте каскада хаоса Юньнани события развиваются столь же стремительно, превращаясь в ухудшающийся ураган политики и кровопролития. Свободно объединенная своей оппозицией Гоминьдану, но в остальном готовая перегрызть друг другу глотки, коалиция южных джентри Ху Жоюя начала расширять свои операции. Стремясь повлиять на западную Юньнань, традиционно радикальный очаг, готовый противостоять влиянию Куньмина, Ху начал вступать в переговоры с большинством более консервативных и реакционных джентри, проживающих там.\n\nВ непосредственном штабе Ху многие советуют генералу подходить к кризису дипломатично, собирая поддержку истеблишмента Юньнани, чтобы вернуть провинцию к острову стабильности, которым она когда-то была. Другие предложили, что Ху должен проводить наступательную политику открытой конфронтации с радикалами Гоминьдана, стремясь быстро уничтожить режим Гоминьдана, пока их распри находятся в худшем состоянии.\n\nЧтобы еще больше укрепить решимость и положение Ху, многие из его помощников начали использовать контакты по всей Юньнани, такие как Торговая палата, и за пределами провинции во внешнем мире. Устанавливая тайные связи с потенциальными союзниками в Сиаме, Бирме и Индокитае, позиция Ху, в свою очередь, была укреплена материалами и помощью, пусть даже только за обещания в будущем.\n\nТем не менее, гражданская война в Юньнани остается игрой для всех, где Ху Жоюй, Чжу Пэйдэ и Чэнь Чэн ввязываются в почти саморазрушительные гамбиты последней надежды, чтобы обеспечить свой контроль над провинцией. Увы, только один человек может выйти победителем..."
 YUN.lategame.506.a: "Быстрые успехи Ху Жоюя придают ему импульс."
 YUN.lategame.506.b: "Мощь Куньмина ломает боевой дух Мэнцзы."
 YUN.lategame.506.c: "На фоне жестоких боев оба начинают колебаться."

 YUN.lategame.510.t: "Переворот Чжу Дэ"
 YUN.lategame.510.d: "Поистине Куньмин находится в шатком положении. Охваченная восстанием и наступлением в равной степени, казалось бы, что даже география столицы не предотвратит натиск Ху Жоюя или Чэнь Чэна. И все же, зажатые со всех сторон, ни один из противников не смог свергнуть Чжу Пэйдэ, Чжу Дэ или Ли Гэньюаня. Поскольку Ху Жоюю не хватало сил для марша на Куньмин, очень похожего на его начальника Тан Цзияо десять лет назад, его наступление оказалось полностью притупленным. На севере, несмотря на успешный захват Чэнь Чэном Чжаотуна у лоялистов 3-й армии, дестабилизировавший легитимность Чжу Пэйдэ, его силы тем не менее потеряли свой импульс, когда они быстро приблизились к укрепленной столице. В свете этого, и среди теней, радикальные заговорщики внутри Куньмина начали мобилизацию.\n\nПоддерживаемые социалистическими кадрами, рабочими агитаторами и студенческими радикалами в городе, левые военные офицеры 3-й армии под эгидой Чжу Дэ быстро вошли во дворец губернатора в Куньмине. Устроив переворот против Чжу Пэйдэ и Ли Гэньюаня, их начинание быстро нашло поддержку Цзинь Ханьдина и Фань Шишэна, двух «правых» офицеров в Юньнаньском Гоминьдане, которые тем не менее всегда были открыты для левого сотрудничества.\n\nЯкобы предназначенный для избавления Чжу Пэйдэ от влияния Ли Гэньюаня, он довольно неконтролируемо перерос в полное отстранение Чжу Пэйдэ от должности. На место Чжу Пэйдэ Чжан Боцзюнь, представитель центрального правительства, был «рекомендован» в качестве губернатора местной хунтой, получив свое официальное назначение от Центрального комитета вскоре после этого.\n\nЧэнь Чэн довольно любопытно решил отступить, отойдя в Гуйчжоу, чтобы консолидировать свое губернаторство. А что насчет Ху Жоюя? Его дни сочтены, так как стало совершенно очевидно, что его силы будут уничтожены в предстоящем наступлении. Точно так же судьба Политической науки — вероломство, поскольку они снова становятся изгоями. Однако у всех на уме остается один вопрос. Что делать с Чжу Пэйдэ?"
 YUN.lategame.510.a: "Два образцовых Чжу возрождают свою связь."
 YUN.lategame.510.b: "Нравится это или нет, Чжу Пэйдэ предал народ."

 YUN.lategame.511.t: "Ху Жоюй марширует на Куньмин"
 YUN.lategame.511.d: "Революционеры в Гоминьдане, по-видимому, исчерпали свое гостеприимство в Юньнани, поскольку силы Ху Жоюя хлынули из Мэнцзы в Куньмин с небольшим сопротивлением. Растянутые гарнизоны 3-й армии были быстро захвачены, процесс ускорился восстанием в городе, организованным генералом Лу Ханем, штабным офицером при Лун Юне, который отомстил за своего родственника и избежал необходимости долгой осады.\n\nХваленый дух Вампу оказался немногим больше, чем разговорами, поскольку силы Чэнь Чэна были уничтожены при штурме позиций Старой клики Дянь. После перегруппировки своих сил Ху Жоюй и Лу Хань смогли захватить Гуйчжоу после разгрома своих противников. В то время как двое номинально сохраняют свое членство в Гоминьдане и заявляют о своей абсолютной преданности революции, истинно верующие партии были изгнаны с Юго-Запада.\n\nПоследующая политическая ситуация была напряженной. В то время как центральное правительство было слишком занято, чтобы беспокоиться о делах Юго-Запада, и воздерживалось от комментариев по ситуации, по иронии судьбы отсутствие внешней угрозы дестабилизировало провинцию. Тан Цзияо — абсолютная персона нон грата для Гоминьдана, но Лун Юнь вызывает больше разногласий. Гарнизон Куньмина и старейшины провинции ненадолго утвердили его губернатором, но столкновения между ним и его давним соперником Ху Жоюем (который теперь имеет преимущество) заставили их обмениваться обвинениями в контрреволюционном поведении.\n\nЛун надеялся укрепить свое пошатнувшееся положение, рассчитывая на поддержку Лу Ханя, чьи силы медленно просачиваются обратно из Гуйчжоу. Но генерал Лу решил принять роковое решение — прийти к соглашению с Ху Жоюем за его спиной и согласиться принять Ху в качестве губернатора, чтобы избежать дальнейшего конфликта. Лун Юнь, приглашенный участвовать в планируемой хунте, покинул Куньмин и отправился в Чжаотун — не желая быть номинальной фигурой и надеясь на более благоприятные ветры в будущем."
 YUN.lategame.511.a: "Юньнань возвращается к реакции."

 YUN.lategame.512.t: "Чэнь Чэн захватывает Куньмин"
 YUN.lategame.512.d: "Смелым маневром Чэнь Чэн и 1-я армия доказали ценность своей подготовки в Вампу. Гарантируя, что уроки их директора не были потеряны или забыты, их дерзкий спуск из Гуйчжоу далее к столице юго-запада стал легендой. Напоминая их Великий поход в свете краха Северного похода, собственная эскапада генерала Чэна была движима не страхом или печалью, а долгом, духом и честью.\n\nСвергнув правление Клики политической науки в Гуйчжоу посредством элегантного, но мастерски осуществленного переворота, 1-я армия успешно преследовала солдат Чжан Цюня и Сюн Шихуэя до Чжаотуна и сокрушила армии PSC.\n\nИмея на своей стороне инерцию, деморализованный гарнизон в Куньмине оказал лишь символическую защиту против триумфального продвижения Чэна в укрепленный город. Избавленная от длительной осады, большая часть Куньмина осталась нетронутой. Однако во время продвижения Чэна за пределы стен произошел дворцовый переворот во главе с левым контингентом внутри 3-й армии, в частности Чжу Дэ, Тан Хуайюанем и Цзэн Ваньчжуном. Присоединившись к лучшему другу Чжу Дэ Цзинь Ханьдину и генералу Фань Шишэну, диссиденты 3-й армии успешно задержали дискредитированных Чжу Пэйдэ, Ли Гэньюаня и Чжан Цюня.\n\nЗастигнутый врасплох хаосом, Ху Жоюй попытался начать собственное наступление из Мэнцзы, чтобы извлечь выгоду из конфронтации внутри Куньмина. Однако из-за заметной нехватки разведданных силы Ху были почти уничтожены, несмотря на их превосходящее вооружение, из-за комбинированного наступления 3-й и 1-й армий.\n\nПо мере того как пыль оседает, напряженность все еще сохраняется. Поскольку левые в Юньнани и Гуйчжоу разделились по политике в последствии, возникло множество проблем. Чжу Дэ и Цзинь Ханьдин со своей стороны желают освобождения Чжу Пэйдэ из тюрьмы, настаивая на том, что он просто не сделал ничего плохого и что контрреволюционные действия старого режима были по приказу Ли Гэньюаня. Сам Чэнь Чэн желает полной реорганизации Юньнани и Гуйчжоу, якобы для консолидации власти и тщательного «устранения коррупции», а Новое общество Юньнани продолжает сплачиваться для немедленных действий."
 YUN.lategame.512.a: "Генерал Чжу был соучастником несправедливости!"
 YUN.lategame.512.b: "Освободившись от своего разлагающего влияния, Чжу может быть искуплен."

 YUN.lategame.513.t: "Чжу и Ли держатся в Куньмине"
 YUN.lategame.513.d: "Снова брошенный в кошмар кровопролития, город Чжаотун недавно стал стержнем обороны для администрации Куньмина. Очень похоже на предыдущую войну Юньнань-Гуйчжоу, и уже опустошенный и восстанавливающийся после того конфликта, Чжаотун был взят в осаду вторгшимися силами, спустившимися из Гуйчжоу, нацелившись на сердце юго-запада. Однако именно здесь события перестают отражать друг друга, так как на этот раз Юньнань оказалась доблестно победоносной. С силами 1-й армии, отброшенными назад после грубой ошибки Цзян Динвэня, Чэнь Чэн был вынужден приказать отступить, номинально с позором.\n\nОбодренные своими успехами, силы Чжу Пэйдэ под командованием Ли Ми предприняли решительную, смелую и несколько самоубийственную атаку против собирающихся сил джентри Ху Жоюя на юге. Характерно для жесткого, хаотичного и буйного командования Ли Ми полем битвы, силы Ху Жоюя были застигнуты врасплох стремительной атакой Ли. По сообщениям, артиллерия Ли уничтожила укрепления Ху почти в упор и намеренно привела несколько его дивизий к окружению. Полагая, что он победил, силы Ху бросились захватывать или убивать Ли и его людей, и все же они были встречены упорством, неведомым окруженным солдатам. Отбитые назад, они сами были окружены внешним кольцом сил Ли и немедленно захвачены.\n\nУдержав замок от осады захватчиками, Чжу Пэйдэ и Ли Гэньюань остаются хозяевами юго-запада Китая. Пополнив запасы сил Чжан Цюня и Сюн Шихуэя, Чжу отправил стойких приверженцев Политической науки в Гуйян для переговоров о капитуляции 1-й армии Чэнь Чэна. Аналогичным образом восстание Ван Дэсаня тем временем было почти подавлено.\n\nОднако возник весьма любопытный вопрос. А именно, решить судьбу мятежных попыток узурпаторов. Должны ли Чжу и Ли быть благороднее, пытаясь примириться с Ху Жоюем и его штабом? Должны ли они протянуть оливковую ветвь Чэнь Чэну ради единства Партии? Или они должны покончить с обоими смутьянами, поскольку они доказали свою дьявольскую природу."
 YUN.lategame.513.a: "Пусть Мэнцзы послужит уроком."
 YUN.lategame.513.b: "Вампу отсмеялась последним смехом."
 YUN.lategame.513.c: "Оба причинили слишком много вреда, чтобы их отпустить."

 YUN.lategame.520.t: "Юго-Запад требует посредничества"
 YUN.lategame.520.d_intro: "Казалось бы, несмотря на грандиозное выполнение важного шага к объединению нации, не все так, как кажется в провинциях. Наиболее тревожными являются события, которые в настоящее время разворачиваются в провинциях Юньнань и Гуйчжоу. Связанные неуклюжим соглашением о разделе власти между губернатором Юньнани Чжу Пэйдэ и губернатором Гуйчжоу Чжан Цюнем, оба губернатора имели своих соответствующих местных влиятельных игроков, которыми нужно было управлять. Для Чжу это были Новое общество Юньнани, левые 3-й армии и истеблишмент под руководством генерала Ху Жоюя. Для Чжана это были последние остатки 1-й армии Национально-революционной армии во главе с Чэнь Чэном в свете падения Хэ Инциня. Пытаясь закрепить свой контроль над нацией, Чжу Пэйдэ и Ли Гэньюань намеревались изгнать Ху Жоюя из провинции, однако после его побега в Мэнцзы Чэнь Чэн предпринял собственный переворот в Гуйчжоу, чтобы сместить Чжана. Бежав в Куньмин, силы Чэна начали преследовать Чжана, опасаясь возмездия со стороны Куньмина."
 YUN.lategame.520.d_NOTCHI: "$YUN.lategame.520.d_intro$\n\nЗажатое с севера и юга, правительство Куньмина отправило сообщение в [ROOT.Capital.GetCapitalVictoryPointName] с просьбой о посредничестве в конфликте, надеясь, что директивы от [ROOT.GetLeader] смогут заставить Гуйчжоу отступить. Однако опасения более широкого социалистического восстания возникли в последующие дни, когда агитаторы из синдикалистского Нового общества Юньнани организовали восстание в уезде Люлян, ставя под сомнение способность Чжу Пэйдэ руководить. Даже начали появляться сообщения, что собственные союзники Чжу Пэйдэ, такие как Чжу Дэ, Цзинь Ханьдин и Фань Шишэн, начали плести заговор против генерала.\n\nНаиболее любопытно, что генерал и мятежный «губернатор» Чэнь Чэн также послал весточку [ROOT.GetLeader]. Настаивая на своей верности, долге и служении Национальной революции, Чэнь опирался на концепцию, что его марш из Гуйчжоу в Куньмин — это не игра за власть, движимая жадностью, а справедливость. Настаивая на том, что он просто выполняет свой революционный долг, изгоняя все более коррумпированных Ли Гэньюаня, Чжан Цюня и Чжу Пэйдэ от власти. Его слова имеют большой вес, однако Чэнь заметно сместился влево в последнее время, что усугубляется тем, что Вампу никогда по-настоящему не соглашалась и не была дружелюбна к остальной части Правого Гоминьдана.\n\nТем не менее тяжелые обстоятельства в Юньнани требуют какой-то реакции. Центральный исполнительный комитет со своей стороны уже задушен собственным конфликтом, и поэтому прерогатива решения остается полностью за [ROOT.GetLeader] и его [ROOT.GetRulingParty]. И они должны решить скоро..."
 YUN.lategame.520.d_CHI: "$YUN.lategame.520.d_intro$\n\nЗажатое с севера и юга, правительство Куньмина отправило сообщение в [ROOT.Capital.GetCapitalVictoryPointName] с просьбой о какой-либо форме посредничества в конфликте, надеясь, что директивы от [ROOT.GetLeader] смогут заставить Гуйчжоу отступить. Однако более широкий социалистический проект на юго-западе был поставлен под угрозу в последующие дни, когда агитаторы из синдикалистского Нового общества Юньнани организовали восстание в уезде Люлян, возможно, форсируя вопрос раз и навсегда.\n\nСекретное сообщение, переданное представителем партии Чжан Боцзюнем, гласит, что левый генерал Чжу Дэ, а также сочувствующие правые офицеры Цзинь Ханьдин и Фань Шишэн готовы поддержать государственный переворот в Куньмине с благословения Центрального комитета. В сочетании с посредничеством Юньнань-Гуйчжоу и подкреплением из центральной армии, он считает возможным взять весь юго-запад под социалистический контроль. Очевидно, что осталось невысказанным, так это то, что он ожидает, что регион будет под «его» контролем, приводя еще одну провинцию под правление PAC.\n\nЭто еще не все, поскольку Центральный исполнительный комитет недавно получил телеграммы от мятежного генерала и номинального левого Чэнь Чэна. Клянясь в абсолютной верности и преданности CEC и [ROOT.GetLeader], Чэнь настаивал на том, что его кампания направлена на искоренение коррупции на юго-западе. Опираясь на свои тесные связи с Дэн Яньда, Чэнь утверждает, что любые социалистические агенты в самой Юньнани слишком слабы, чтобы долго удерживать этот район. Вместо этого он предлагает, что только его армия, его Клика гражданского строительства и он сам могут привести регион в революционное лоно."
 YUN.lategame.520.a: "Приказать Чэнь Чэну и его людям вернуться в Гуйян."
 YUN.lategame.520.b: "Бросить Куньмин на произвол судьбы и молчаливо одобрить продвижение Чэна."
 YUN.lategame.520.c: "Приказать Чжан Боцзюню начать переворот и осудить Чжу Пэйдэ."

 YUN.lategame.521.t: "Посредничество [FROM.Capital.GetCapitalVictoryPointName] в конфликте"
 YUN.lategame.521.d: "Ансамбль директив от [FROM.GetLeader], как сообщается, достиг Гуйчжоу! Приказывая Чэнь Чэну и его людям вернуться в казармы в Гуйяне, «Маленький генералиссимус» был вынужден почти полностью подчиниться приказам Центрального исполнительного комитета. Выполняя хорошо организованное отступление, атмосфера их отхода была полна сожаления. Однако атмосфера в Куньмине была триумфальной! Ибо их угроза на севере была успешно устранена без большой крови.\n\nТеперь, без надвигающейся гибели от Первой армии Вампу, губернатор Чжу Пэйдэ сумел консолидировать силы Юньнаньского Гоминьдана, стремясь сконцентрировать и ударить по угрозе на юге, наконец положив конец восстанию Ху Жоюя в Мэнцзы. Испытав всю мощь не только смелой тактики Ли Ми, но и всей 3-й армии в целом, силы Ху оказались лишь незначительным препятствием, причем большинство из них сдалось.\n\nНесмотря на успехи вмешательства Центрального комитета в конфликт для спасения администрации Чжу Пэйдэ и Ли Гэньюаня, была одна оговорка. Ссылаясь на общее недовольство Гуйчжоу своим действующим губернатором, CEC решительно постановил отозвать признание Чжан Цюня губернатором Гуйчжоу, официально назначив на его место Чэнь Чэна.\n\nУзкая победа — все же победа, при этом Чжу и Ли эффективно сохраняют свой контроль, как и до их операции. Однако политический состав юго-запада изменился довольно радикально, причем Политическая наука почти полностью обязана силе Ли Гэньюаня теперь, когда Чжан Цюнь был официально смещен. Аналогичным образом пробел Чжан Цюня в политике юго-запада привел к тому, что левые Чжу Дэ заполнили разрыв влияния.\n\nОдин вопрос остается на столе теперь, когда пыль улеглась: что будет с судьбой подчиненных Ху Жоюя? Сам генерал потерял всякую власть, но его люди сдались мирно, и некоторые из них действительно весьма квалифицированы."
 YUN.lategame.521.a: "Люди Ху выживают на волосок от гибели."
 YUN.lategame.521.b: "Действия Ху обрекли его людей на кандалы, не так ли?"

 YUN.lategame.522.t: "Молчание [FROM.Capital.GetCapitalVictoryPointName] в конфликте"
 YUN.lategame.522.d: "Отчаянно умоляя Центральный комитет о каком-либо вмешательстве в дилемму Юньнани, Чжу Пэйдэ и Ли Гэньюань искали решающего вмешательства на своей стороне администрации. Однако их действия, довольно любопытно, имели колоссальный обратный эффект. В то время как их мольбы остались без ответа, центральное правительство не молчало полностью. [FROM.GetLeader] официально объявил и продиктовал назначение Чэнь Чэна губернатором Гуйчжоу.\n\nХотя шаткое руководство Чжу Пэйдэ не было прямо осуждено, последствия были очевидны для всех. Подстегиваемая этим импульсом, 1-я армия генерала Чэна быстро захватила Чжаотун, так как защитники Политической науки либо дезертировали, либо сдавались массово. Захватив критически важный узел на пути к Куньмину, наступление Чэна стало слишком напоминать первую крупную победу Гоминьдана во время их собственного наступления против Тан Цзияо.\n\nИ таким образом конфликт сумел закончиться фактически таким же образом: дворцовым переворотом в Куньмине. Заговорщики арестовали Чжу Пэйдэ, Гэньюаня и Чжан Цюня. Поддерживая левоориентированную хунту, укомплектованную Чжу Дэ, Тан Хуайюанем, Цзинь Ханьдином и Фань Шишэном, квадрумвират изначально стремился к прекращению огня с генералом Чэном и сохранению Чжу Пэйдэ в качестве номинальной фигуры в Юньнани. Увы, их условия были напрасны, так как Чэн вел жесткие переговоры, в конечном итоге заставив квадрумвират принять прибытие сил Чэна в Куньмин без единого выстрела.\n\nВ серии яростных переговоров, проносящихся между [FROM.Capital.GetCapitalVictoryPointName], Куньмином и Гуйяном, можно было забыть о первой спичке, зажегшей ад. Благодаря директиве Центрального исполнительного комитета и дворцовому перевороту, эффективно решившим вопросы в течение нескольких часов, собственное восстание Ху Жоюя в Мэнцзы оказалось неудовлетворительно слабым по сравнению с силами Первой и Третьей армий.\n\nОднако судьба Чжу Пэйдэ в конечном итоге висит в воздухе, так как квадрумвират желает его освобождения из-под домашнего ареста, в то время как Чэнь Чэн, де-факто «Генералиссимус Юго-Запада», стремится гарантировать, что от старого режима ничего не останется..."
 YUN.lategame.522.a: "Чжу Пэйдэ был просто солдатом, и он продолжит служить."
 YUN.lategame.522.b: "Брошенный своими союзниками, Чжу должен уйти в отставку."

 YUN.lategame.523.t: "[FROM.Capital.GetCapitalVictoryPointName] устраивает переворот в Куньмине"
 YUN.lategame.523.d: "Отчаянно умоляя Центральный комитет о каком-либо вмешательстве в дилемму Юньнани, Чжу Пэйдэ и Ли Гэньюань искали решающего вмешательства на своей стороне администрации. Однако их действия, довольно любопытно, имели колоссальный обратный эффект. Выставив Чжу Пэйдэ и Ли Гэньюаня слабовольными и трусливыми после восстания в Люляне, их телеграммы в CEC были проигнорированы. В то время как их мольбы остались без ответа, центральное правительство не молчало полностью. [FROM.GetLeader] официально объявил и продиктовал назначение Чэнь Чэна губернатором Гуйчжоу, заменив свергнутого главу Политической науки Чжан Цюня.\n\nБолее того, Центральный исполнительный комитет обрушил молот, осудив Клику политической науки как контрреволюционных оппортунистов, больше не видя смысла держать их рядом, фактически решив исключить их из партии. Вслед за новостями и с благословения Центрального комитета представитель партии в Юньнани Чжан Боцзюнь организовал дворцовый переворот с генералами Чжу Дэ, Цзинь Ханьдином и Фань Шишэном, одновременно мобилизовав партийные кадры, профсоюзы и студенческих радикалов, чтобы укрепить социалистический контроль над городом.\n\nСо свержением и немедленным арестом Чжу Пэйдэ и Ли Гэньюаня, наряду с Чжан Цюнем, Чэнь Чэн также, по сообщениям, сложил оружие, следуя приказам Центрального правительства. Отступив со своими людьми в организованном порядке в Гуйян, он начал консолидировать свое влияние как законный губернатор Гуйчжоу. Устранив угрозу на севере, Чжу Дэ приказал 3-й армии разгромить провалившееся восстание Ху Жоюя в Мэнцзы, что привело к ошеломляющему успеху.\n\nВ свете всего этого и всей борьбы, казалось бы, что социализм наконец победил на юго-западе. Крупное достижение авангарда, учитывая консервативную природу Юньнани и Гуйчжоу. Наконец, однако, [ROOT.GetLeader] должен решить судьбу противоречивого Чжу Пэйдэ, так как, хотя некоторые говорят, что он приложил руку к подавлению социализма, другие, такие как Чжу Дэ, настаивают на его верности Гоминьдану."
 YUN.lategame.523.a: "Чжу Пэйдэ — исполнительный солдат и дорогой друг."
 YUN.lategame.523.b: "Чжу был соучастником преступлений против народа!"

 YUN.lategame.530.t: "Центральное правительство рушится"
 YUN.lategame.530.d: "Центральное правительство пало, повергнув лоялистов Гоминьдана в смятение. Юго-западные комитеты всегда были довольно автономными образованиями, но даже они с трудом переносят крах, так как многие другие сдались нашим наступающим врагам. Большинство руководства старого центрального правительства бежало за границу, вместо того чтобы оказаться во власти «мелких милитаристов», и [ROOT.GetLeader] со своей стороны предпринял шаги, чтобы захватить контроль в качестве исполняющего обязанности Председателя.\n\nОн сталкивается с трудной задачей переломить ситуацию, поскольку его генералы с трудом интегрируют другие подразделения НРА, а многие деморализованные солдаты растворяются в сельской местности, оставляя «призрачные» бригады и дивизии. Экономика также была ввергнута в хаос, а также растут сомнения в нашей способности выплачивать долги.\n\nСреди этой неопределенности идет значительная борьба за власть. Хотя Чжу Пэйдэ и его союзники в настоящее время контролируют Юго-Запад, Ху Жоюй искал поддержки юньнаньских джентри для путча, в то время как левые генералы, такие как Чэнь Чэн и Чжу Дэ, маневрировали, чтобы подорвать лидерство Чжу Пэйдэ. Когда лидеры юго-запада собираются на конференцию..."
 YUN.lategame.530.a: "...они сплачиваются вокруг правления Чжу Пэйдэ."
 YUN.lategame.530.b: "...Чэнь Чэн и первая армия устраивают переворот."
 YUN.lategame.530.c: "...Чжан Боцзюнь и Чжу Дэ смещают Чжу Пэйдэ."
 YUN.lategame.530.e: "...Ху Жоюй и клика Старой Дянь устраивают путч."

 YUN.lategame.531.t: "Неожиданный поворот"
 YUN.lategame.531.d: "Внезапным поворотом судьбы, похоже, что юго-западному Гоминьдану удалось сформировать правительство самостоятельно. Большинство не ожидало, что это произойдет именно так, но падение старого центрального правительства дало им возможность, и некогда периферийный осколок сумел выкроить роль для себя.\n\nОднако это развитие событий не обошлось без последствий. Большая политическая власть влечет за собой большие ожидания, и новое правительство теперь несет ответственность за выплату долгов, восстановление опустошенных районов и реорганизацию теперь перенапряженных вооруженных сил. Более того, идет значительная борьба за власть. Хотя Чжу Пэйдэ и его союзники в настоящее время контролируют Юго-Запад, Ху Жоюй искал поддержки юньнаньских джентри для путча, в то время как левые генералы, такие как Чэнь Чэн и Чжу Дэ, маневрировали, чтобы подорвать лидерство Чжу Пэйдэ. Когда лидеры юго-запада собираются на конференцию..."
 YUN.lategame.531.a: "...они сплачиваются вокруг правления Чжу Пэйдэ."
 YUN.lategame.531.b: "...Чэнь Чэн и первая армия устраивают переворот."
 YUN.lategame.531.c: "...Чжан Боцзюнь и Чжу Дэ смещают Чжу Пэйдэ."
 YUN.lategame.531.e: "...Ху Жоюй и клика Старой Дянь устраивают путч."

#KMT Satellite Followup Events (540-559)
 YUN.lategame.540.t: "Слишком знакомое лицо"
 YUN.lategame.540.d: "Несмотря на их триумфальные успехи в гражданской войне в Юньнани, действия как Чжу Пэйдэ, так и Ли Гэньюаня в ходе кризиса выявили все более напряженный характер диархии Чжу-Ли. Естественно, плохая кровь прошлого обязательно должна была всплыть, учитывая их теперь почти полное доминирование как Королей Юго-Запада. Ранее, во времена армии Юньнани в Гуандуне, Ли и Чжу когда-то были начальником и подчиненным. Служа вместе с такими, как Ли Лецзюнь, Ян Симинь, Лю Чжэньхуань, Фань Шишэн и Чжан Кайжу. Поскольку Чжу долгое время был самым преданным доктору Суню из всей армии Юньнани в Гуандуне, он в конечном итоге встал на сторону Ли Лецзюня во время борьбы за власть Ли Лецзюня и Ли Гэньюаня. Поскольку Гэньюань занял антисуньскую позицию и настаивал на сотрудничестве со Старой Гуанси, а не с Тан Цзияо, он был изгнан своими подчиненными.\n\nИ, похоже, снова возникла такая атмосфера, с продолжающимися попытками Ли увеличить свою власть, будь то напрямую или за счет использования джентри и Клики политической науки. С их героями в виде Чжан Цюня и Ху Жоюя, изгнанными от власти, Ли принял их поддержку с распростертыми объятиями. Конечно, это никак не помогает делу, учитывая, что Ли уже презираем основной Партией.\n\nОднако их самый недавний спор касается разных подходов дуэта к управлению Юньнанью без необходимости договариваться с местными влиятельными игроками. Чжу Пэйдэ, всегда верный слуга Партии, настаивает на том, чтобы Юньнань была винтиком в Национальной революции. Ступенькой и моделью для остального пути Гоминьдана. Сам Ли вместо этого выступает за то, чтобы Юньнань сосредоточила свои усилия на местной реконструкции, заботясь о нуждах провинциальных жителей, работая с истеблишментом и строя более сильную провинцию для всех."
 YUN.lategame.540.a: "Ли прав, Юньнань нуждается в помощи."
 YUN.lategame.540.b: "Дух Чжу побеждает!"

 YUN.lategame.541.t: "Бастион Гоминьдана на Юго-Западе"
 YUN.lategame.541.d: "Довольно забавно, что, несмотря на их недостатки, постоянные препирательства, их политические махинации и плохую историю, Ли Гэньюань и Чжу Пэйдэ действительно построили свою собственную маленькую империю на Юго-Западе. Тщательно интегрировав Гуйчжоу в лоно Юньнани, Революционная диархия Юго-Запада собрала под своим де-факто контролем значительную часть нации. Поддерживая как существенную финансовую мощь, так и довольно многообещающую армию, напоминающую об неотъемлемом статусе Юньнани как вершителя судеб всего Юга Китая.\n\nХотя их политика не всегда лаконична или взаимно согласована, они тем не менее создали довольно стабильную администрацию, которая улучшила жизнь многих. С их внутренней властью и границами в безопасности оба мужчины начали обсуждения того, куда они направят недавно вновь обретенную известность Юньнани. Возможно, они подготовятся к созданию провинции как претендента на национальную власть самостоятельно или сосредоточатся на защите Юньнани и Национальной революции от тех, кто хотел бы видеть ее растоптанной. В любом случае, игра в их руках."
 YUN.lategame.541.a: "Защита Юньнани защитит Революцию!"
 YUN.lategame.541.b: "Юньнань будет твердо стоять на ногах!"

 YUN.lategame.542.t: "Реформы Клики гражданского строительства на Юго-Западе"
 YUN.lategame.542.d: "Достигнув своего решающего удара, амбиции «Генералиссимуса» Чэнь Чэна только усилились благодаря его недавно расширенным владениям. Не только Король Гуйчжоу, но и Юньнани и всего Юго-Запада, Чэнь имеет поддержку Центрального комитета со всеми вытекающими отсюда достоинствами и недостатками. Немедленно приступив к преобразованию своей нации, Чэнь начал с территории под своим прямым контролем. Полагая, что для того, чтобы получить народную поддержку для борьбы с радикалами, такими как синдикалисты, или консерваторами, такими как джентри и милитаристы, Гоминьдан и Национально-революционная армия должны были продемонстрировать свою врожденную заботу о сельских массах.\n\nСтремясь провести революционные и радикальные реформы, чтобы облегчить вечные страдания простого человека, Чэнь нацелился перевернуть существующую экономическую и социальную структуру Китая. Хотя это, следовательно, уничтожит большую часть существующего богатства фигур истеблишмента, наиболее уместно Торговой палаты, он счел это подходящей и необходимой жертвой для национального спасения.\n\nСнижая арендную плату с 60-70% годового урожая до 37% наряду со снижением процентных ставок до 20%, Чэнь надеется заложить первоначальную основу для дальнейшего развития своей экономической программы. С помощью программы нормирования, бартера и государственного распределения товаров Чэнь надеется стабилизировать цены и бушующую инфляцию, которую переживает страна.\n\nКроме того, черпая вдохновение у своего первого наставника Дэн Яньда, Чэнь также считает, что Китай находится в состоянии докапиталистического полуфеодализма, что революция требует масс и национального капитализма. Посредством доктринального руководства в рамках Трех принципов, реализации собственных программ Чэна и аналогичных, таких как «Земля пахарю», сохраняя при этом связи с мелкой буржуазией и военными. Амбициозная, но неустрашимая, экспериментальная программа Чэна надеется заручиться благосклонностью масс, подстегнуть прогресс и предотвратить создание слишком большого количества врагов среди джентри."
 YUN.lategame.542.a: "Пусть люди будут спасены от их бедственного положения!"
 YUN.lategame.542.b: "Реформы Чэна будут способствовать Национальной революции!"

 YUN.lategame.543.t: "«Ту-Му» наступает"
 YUN.lategame.543.d: "Слишком долго, по крайней мере в глазах Чэнь Чэна, Гоминьдан был заражен коррумпированными государственными служащими, бюрократическими ленивцами, своекорыстными клептократами и всеми, кто находится между ними. Ибо где революционная чистота? Где преданность Национальной революции и простому человеку? Их нуждам, их милостыне, продвижению Трех принципов и светлому будущему для всех? Все это было смыто в канализацию эгоистичных личных интересов без гармонии или желания. Однако создание противоядия и его применение — это просто детская игра для «Маленького Генералиссимуса».\n\nНамеренный очистить партию как идеологически, так и в революционной практике, Чэнь разработал планы второй, ограниченной реорганизации партии. Хотя она далеко не охватывает и даже не достигает Центрального исполнительного комитета, Юньнань и Гуйчжоу, по крайней мере, будут полностью революционизированы его усилиями. Кадры будут принуждены к соблюдению Трех принципов, и судить о них будут не по связям, а по истинным заслугам. В том же духе Чэнь разработал планы реализации «Молодежной лиги Трех народных принципов», по крайней мере, в будущем. Надеясь не только очистить партию настоящего, но и внедрить свою революционную идеологию в партию будущего, Чэнь стремится к тому, чтобы молодежь также участвовала в принятии решений национальной политики.\n\nЭто еще не все для всегда амбициозного генерала, так как за кулисами происходят различные махинации с еще большими маневрами и взмахами сабли. Будучи очень довольным своим нынешним положением, в Гражданском строительстве ходят слухи, что генерал Чэнь способен на гораздо большее. На исполнение судьбы, возложенной на него его революционными наставниками. Возможно, он выступит из Куньмина, защищая революцию, выкованную его собственной кровью."
 YUN.lategame.543.a: "Маленький Генералиссимус — всего лишь исполнительный слуга!"
 YUN.lategame.543.b: "У Чэна есть наследие, которое нужно выполнить..."

 YUN.lategame.544.t: "Цветы социализма расцветают на Юго-Западе"
 YUN.lategame.544.d: "Возможно, самым удачным, но неожиданным исходом недавней гражданской войны в Юньнани и поднятия Красного знамени в Куньмине после десятилетий борьбы является расцвет литературной сцены. Хотя Юго-Запад всегда был домом для различных философов всех политических убеждений, он тем не менее был традиционно консервативным регионом с большой нерешительностью в отношении концепций социализма. Но с недавним захватом власти левыми Юньнань и Гуйчжоу стали чем-то вроде социалистической писательской утопии. Привлекая не только философов, но и художников, музыкантов и теоретиков.\n\nВозможно, наиболее связанным с областью политики был бы Ай Сыци, уроженец Юньнани-Монголии и преданный социалистический философ и теоретик. Учась в Японии, самостоятельно изучая немецкий язык и в конечном итоге работая в газете «Шэнь Бао», Ай вступил в КСП в 1935 году. Преданный, молодой и собранный писатель, он уже завоевал некоторую репутацию своей публикацией «Популярной философии» в 1935 году. Аналогичным образом, сам Ай дружит с такими людьми, как Шэнь Цзюньжу и другими фигурами CDL.\n\nДругими известными личностями, которые приобрели известность, являются такие люди, как Не Эр, известный музыкант и композитор. Внесший вклад во многие недавние фильмы, национальную музыку и считающийся пионером нового музыкального движения Китая. Есть также У Дэн, знаменитый местный студенческий лидер в Объединенной студенческой организации Юньнани. Местная феминистка и радикальный социалистический лидер, она когда-то была одноклассницей жены покойного Лун Юня, Ли Пэйлянь, и даже сумела сохранить некоторые отношения с лейтенантом Тан Цзияо.\n\nНаконец, есть Чжан Боцзянь. Член меньшинства Бай, он отправился во Францию по соглашению «Работа-Учеба». Дружа с такими людьми, как Чжоу Эньлай, Чжан стремился распространять слово социализма среди китайских студентов, достигнув высокого теоретического и практического понимания социализма после Французской революции.\n\nПоистине, Юньнань превратилась из черного пятна нации, полного консерватизма со скудными отблесками реформистских настроений, в рог изобилия социализма в Китае, процветающее интеллектуальное поле битвы, полное дебатов и продвижения нации. Конечно, Юньнань всегда могла быть чем-то большим..."
 YUN.lategame.544.a: "Навеки Юньнань укроет социализм!"
 YUN.lategame.544.b: "Мы выполним наш революционный долг!"

 YUN.lategame.545.t: "Гуанмин Жибао"
 YUN.lategame.545.d: "Сколько все себя помнят, Чжан Боцзюнь всегда был фигурой, которой восхищались и которую ненавидели. Ненавидимый собственной партией за то, что был левым для правого крыла и правым для левого крыла, Чжан находил ограниченное утешение в своих товарищах; за исключением нескольких крепких дружеских связей, таких как его личная дружба с Чэнь Миншу и Чжу Дэ. Однако определенная часть китайской политической сферы всегда приветствовала Чжана и его усилия по крайней мере с восхищением, если не с поддержкой. Личный друг таких людей, как Чжан Цзюньмай, Шэнь Цзюньжу и других, Чжан удивительным образом сумел завоевать символическую поддержку фигур нового поколения демократов Третьей силы.\n\nТочно так же, со своей стороны, Чжан недавно был замечен на многочисленных встречах с различными фигурами Демократической лиги Китая, стремясь договориться с ними ради общей цели. Предлагая провинциальный политический альянс, Чжан и его друзья из CDL, похоже, строят широкий блок демократического реформистского социализма на юго-западе, по крайней мере, как это провозглашается их статьями в «Гуанмин Жибао».\n\nКонечно, такие усилия не просто домашние, предназначенные для чистого компромисса. Они выполняют двойную функцию: стабилизацию администрации Чжана и пылкую демонстрацию того, что Чжан не похож на своих современников в Гоминьдане, относящихся к Данвай с подозрением. Вместо этого Чжан считает целесообразным использовать свой неформальный альянс как оружие и инструмент для продвижения общего прогрессивного дела на юго-западе. Однако некоторые начали советовать губернатору, что ему следует смотреть далеко за пределы своего идеалистического кругозора Юньнань-Гуйчжоу и вместо этого нацелиться на национальный уровень."
 YUN.lategame.545.a: "Единое прогрессивное дело!"
 YUN.lategame.545.b: "Наши национальные амбиции требуют расширения!"

#KMT CIVIL WAR Events (550-559)
 YUN.lategame.550.t: "Наступление Национальных защитников"
 YUN.lategame.550.d: "Поскольку нация находится на грани гражданской войны, [YUN.GetLeader] поспешил восстановить спокойствие и лидерство в [YUN.Capital.GetCapitalVictoryPointName]. На грандиозной церемонии перед толпой специально отобранных сторонников и журналистов официальные лица [YUN.GetAdjective] осудили правительство Центрального комитета как коррумпированное, тираническое и ревизионистское, отмахнувшись от обвинений в измене, утверждая, что именно председатель предал идеалы доктора Суня. Мероприятие завершилось официальным провозглашением отказа от Центрального комитета и призывами к созданию нового лояльными товарищами.\n\nПразднества мало что могли сделать, чтобы скрыть беспокойство, прокрадывающееся даже в высшие ряды администрации. [YUN.GetLeader] сделал смелую ставку, восстав против Центрального правительства. Недавний кризис в высших эшелонах партии пошатнул политическую легитимность Центрального комитета, но вряд ли фундаментально изменит расклад на поле боя. Несмотря на призывы [YUN.Leader], не было никаких дезертирств высокого уровня внутри, даже когда Конгресс Центрального комитета расправляется с диссидентами изнутри. Повстанцы [YUN.GetAdjective] могут только надеяться, что другие на периферии присоединятся к восстанию, но это не гарантировано. Пока ревет артиллерия и пехота занимает позиции, судьба Китая, вероятно, будет решаться вдали от коридоров власти Куньмина."
 YUN.lategame.550.a: "Мы делали это однажды..."

 YUN.lategame.551.t: "Куньмин берет бразды правления"
 YUN.lategame.551.d: "Куньмин долгое время находился на периферии и внешней ступени революционного движения Гоминьдана. Хотя город, и, как следствие, провинция, никогда не контролировались непосредственно самой партией, они часто оказывались в схожих кругах и даже шли в ногу. Начиная от восстания Двойной Девятки Цай Э и Ли Гэньюаня (в котором участвовало множество будущих членов юньнаньского Гоминьдана) или легендарной Войны в защиту нации, в которой Юньнань сплотила дело многочисленных соседних провинций, чтобы победить распространение новой эры Хунсянь Юань Шикая. Однако Юньнань также часто оказывалась в разногласиях с Партией чаще, чем большинство. С отказом Цай Э участвовать во Второй революции 1913 года или постоянными махинациями Тан Цзияо по поводу контроля над революционным движением, а также над Гуандуном и Гуанси.\n\nПоэтому довольно неудивительно обнаружить, что регионалистский босс Юго-Запада сумел подорвать мнимое правление основных революционных центров и маршировать все дальше к победе над Центральным комитетом Гоминьдана, сметая старый порядок в полном триумфе. Те, кто входит в личный внутренний круг [YUN.GetLeader] и [YUN.GetRulingParty], понимали, что у них никогда не было никакого намерения полностью искоренять своих некогда благожелательных благодетелей, и все же история снова поставила их на роль Национального защитника.\n\nС уходом старого правительства немногие могут реально противостоять титаническому подъему Периферии Гоминьдана, но их лидерство все еще оспаривается. Не Партией в открытом поле, а народом, демобилизованными и экономикой. Милитаристы извне не в счет. Будет ли у [YUN.GetLeader] блаженно быстрый путь к национальному объединению или будут дальнейшие конфликты из-за выполнения Национальной революции, это сформирует Китай на долгие годы вперед."
 YUN.lategame.551.a: "Завершить миссию."

##Section 4d (600-799): Late Game UPC Political Events

#UPC Fall of Beijing Event Chain (600-629):
 YUN.lategame.600.t: "Крестовый поход Цай Э завершен"
 YUN.lategame.600.d: "Почти поколение назад Цай Э провозгласил независимость от так называемой «Китайской империи» Юань Шикая, возглавив несколько южных провинций, выступивших против его коронации как императора Хунсянь, и ввергнув страну в гражданскую войну. Последующие южные правительства не смогли выполнить эту миссию по освобождению нации от тирании Бэйяна до сегодняшнего дня — когда армии Юньнани наконец захватили контроль над древней столицей Китая.\n\nПоследствия возобновления гражданской войны были ужасными. Жизни и средства к существованию были потеряны в боях. Тысячи семей были перемещены движущимися армиями, а сами армии оказались потерянными и дезорганизованными после марша за сотни миль от дома. Перегруппировка для следующей фазы объединения займет месяцы, полное национальное восстановление займет еще одно поколение.\n\nПобеда на поле боя дала правительству Гуанчжоу достаточные рычаги влияния, чтобы созвать еще одну крупную конференцию в своей столице, на этот раз не просто как региональное правительство, а как вероятный наследник старого порядка Бэйяна. Приглашения были разосланы по всей стране, и немногие осмеливаются не присутствовать."
 YUN.lategame.600.a: "Эпоха подходит к концу."

 YUN.lategame.601.t: "Вторая федералистская конференция"
 YUN.lategame.601.d: "Пекин пал в руки Тан Цзияо, и вместе с ним был сметен старый порядок. Некоторые остатки Бэйяна продолжают сражаться или бежали в объятия наших соперников, но, по крайней мере, на данный момент сопротивление возле города утихло. Возникает новый порядок, на этот раз по планам Гуанчжоу.\n\nТан Цзияо — герой часа. Некогда просто губернатор изолированной провинции, неоднократно унижаемый в войнах за пределами Юньнани, и имя, которое люди знали бы в лучшем случае как бледную имитацию Цай Э, он стал вероятным будущим президентом объединенной республики. Действительно, кажется, что судьба отдала Китай в руки южан — редкость в китайской истории, где большинство объединений происходило с севера на юг.\n\nНо как он будет править? Одно дело — руководить в качестве президента квазипризнанного регионального правительства. Другое — быть центральным правительством в Китае, особенно у руля движения, якобы призванного наделить полномочиями провинции. Федералисты всегда были странной величиной в китайской политике — знакомой со старой системой и часто переплетающейся с ней, и все же в других отношениях провозглашающей себя новым, реформистским движением.\n\nС импульсом, смещающимся в их пользу, федералисты имеют преимущество в предстоящих разбирательствах. Многие побежденные члены ассамблеи Бэйяна стремились сохранить свои места в новом правительстве, умоляя о вхождении в победоносное правительство Гуанчжоу. По крайней мере, некоторые из них должны будут быть интегрированы ради стабильности, но в эти драгоценные моменты в начале нового порядка у Тан Цзияо так много власти, чтобы задать тон на будущее. Демократия означает так много разных вещей для стольких разных людей. Теперь республика ждет, чтобы узнать, что она означает для их нового президента."
 YUN.lategame.601.a: "Демократия означает конец эндемичной коррупции Бэйяна."
 YUN.lategame.601.b: "Демократия означает соблюдение закона, даже по отношению к нашим врагам."

 YUN.lategame.602.t: "Какой дорогой мы пойдем?"
 YUN.lategame.602.d: "Тан Цзияо и его союзники могут греться в лучах славы своего триумфа, но есть много других, жаждущих собственных побед. Активисты Общества полумесяца переиздали серию эссе, впервые написанных после объединения Чжили, в первую очередь «Какой дорогой мы пойдем?», возможно, основополагающее политическое заявление Полумесяца.\n\nВ нем они задали два риторических вопроса. Первый был: что мы хотим устранить? CMS нашло пять больших врагов: бедность, болезни, невежество, политическую коррупцию и социальный хаос. Примечательно исключены были капитализм, империализм и феодализм — считавшиеся многими интеллектуалами их самыми ненавистными врагами. Авторы утверждали, что Китай еще не был капиталистической страной и что феодализм был устранен в Китае два тысячелетия назад. Империализм не укоренился бы, если бы Китай изначально не был ослаблен «пятью дьяволами» изнутри. CMS полагало, что обвинение внешних врагов отвлекает от внутренних проблем, отражая их космополитическое и западное образование — вызывая критику со всего политического спектра.\n\nВозможно, самое главное, CMS не осудило открыто Цао Куна тогда или Тан Цзияо сейчас, оставляя открытой возможность союза. Конечно, дальнейшие статьи, такие как «Какую политическую систему мы хотим?», «О социализме» и «Мы хотим власти финансового контроля», в конечном итоге привлекли внимание Чжили, но Общество полумесяца всегда было больше сосредоточено на втором вопросе: что мы хотим установить? В этом они были расплывчаты — призывая к безопасной, процветающей, цивилизованной, современной и единой стране, которая могла бы принимать хорошие законы, поддерживающие мир, социальные услуги, инфраструктуру и справедливую и развитую экономическую систему.\n\nНо как они могли туда добраться? Революция разрушительна и превращает насилие в привычку. Эволюция слишком медленна и сохраняет слишком много устаревших элементов. Тогда единственный путь вперед — это третий путь — сознательная, мирная реформа."
 YUN.lategame.602.a: "Тан наверняка дарует нам сознательную, мирную реформу."
 YUN.lategame.602.b: "Настоящая реформа требует настоящей демократии."

 YUN.lategame.603.t: "Бэйян реорганизуется"
 YUN.lategame.603.d: "У Пекина появился новый хозяин, и старые партии Бэйяна поспешили адаптироваться к новому порядку, где они больше не доминируют. Многие из их лидеров, чувствуя нестабильность нового режима и желая подстраховаться, решили пока не участвовать в разбирательствах — позволяя своим подчиненным делать грязную работу, представляя их интересы в законодательном органе федералистов.\n\nВ старой системе Бэйяна доминировали независимые, по крайней мере номинально. Организованные политические партии рассматривались с подозрением после конфликта Юань Шикая с Тунмэнхоем, и многие политики Бэйяна ценили свою независимость — объединяясь в неформальные клики и ассоциации. Многие из этих независимых продолжают действовать, надеясь остаться актуальными при новом режиме, используя своих личных последователей, сети патронажа и/или политические машины, чтобы удержать власть.\n\nМногие северные левые присоединились к зарождающейся оппозиции, особенно те, кто связан с Федерацией национального спасения. Ху Ши и другие старые члены CMS начали интенсивный диалог с фракцией Ло, хотя и не исключили работу с президентом. Революционные социалистические партии, такие как Гоминьдан и КСП, столкнулись с жестким подавлением, и их центральные комитеты запретили своим членам участвовать в правительстве федералистов.\n\nИменно лянгисты увидели самый большой сдвиг. Китайская конституционная партия, когда-то крупнейшая официальная партия в ассамблее после Ассоциации гармонии, распалась после того, как ее руководство перешло в GRA. Осколок молодой гвардии работал с бывшими членами ДСП Чжан Цзюньмая над формированием Демократической конституционной партии. Партия молодой Китай стремилась извлечь выгоду из исхода членов ККП, хотя в то же время заигрывала с Кликой Тана."
 YUN.lategame.603.a: "Одобрение Таном лянгизма приносит ему союзников на севере."
 YUN.lategame.603.b: "Ло Лунцзи и CMS легко могут восстановить связи со старыми друзьями."
 YUN.lategame.603.c: "Независимые Пекина яростно защищают то, что принадлежит им."

 YUN.lategame.604.t: "Демократическая лига Китая"
 YUN.lategame.604.d: "Конференция завершилась принятием нескольких общих заявлений, декларирующих поддержку президента Тан Цзияо и его программы реконструкции. Тан, поблагодарив Конференцию за веру в него, поклялся продолжить войну за освобождение и пообещал провести демократические федеральные выборы после объединения. На данный момент он пообещал кабинет национального единства, но пока выбрал только лоялистов на действительно важные должности. Он просит их продолжать доверять ему, пока страна преодолевает трудности впереди.\n\nТе, кто опасается полагаться на очередного сильного человека, обещающего реформы, не молчали. Многие бывшие члены Федерации китайских демократических партий собрались в нескольких кварталах от конференц-зала. Отбросив два иероглифа из своего названия, они публично объявили о создании Демократической лиги Китая (CDL), подразумевая единую партию, требующую коалиционного правительства.\n\nЛо Лунцзи был избран председателем и составил «Проект принципов Демократической лиги», который предлагал демократическую федеративную республику с двухпалатным законодательным органом, разделением властей, всеобщим избирательным правом, равными возможностями образования, экономической демократией, национализацией вооруженных сил и постепенным переходом к бесклассовому социалистическому обществу. Подписанный бывшими лидерами более полудюжины партий, объединившихся для создания CDL, он был расценен как крупный независимый акт так называемого движения «третьего пути», ищущего путь к демократии между революцией и постепенной эволюцией.\n\nОтголоски ощущаются во всем китайском политическом спектре. Если CDL действительно сможет оставаться единой, они, вероятно, станут основой демократической политической оппозиции теперь, когда ККП была поглощена политической машиной Тана. Многие смотрят с волнением, хотя некоторые боятся реакции президента. Или, что еще хуже, того, что их неэффективность приведет к тому, что они станут символической оппозицией властям предержащим."
 YUN.lategame.604.a: "Они будут защищать демократию в нашей республике."
 YUN.lategame.604.b: "Они будут делать не более чем ныть, как всегда."

 YUN.lategame.610.t: "[UPC.Capital.GetCapitalVictoryPointName] проводит конференцию"
 YUN.lategame.610.d: "Тан Цзияо, успешно завоевав Пекин, почувствовал себя вправе созвать еще одну национальную конференцию в [UPC.Capital.GetCapitalVictoryPointName]. Представители со всей страны наводнили город в надежде, что их голос будет услышан во время обсуждений национальной реконструкции и военной реорганизации.\n\nОднако быстро стало очевидно, что делегаты начинают делиться между сторонниками президента и растущей оппозицией. Многие из тех, кто скептически относится к приверженности Тана демократии или иным образом недоволен его правлением, сплотились вокруг ученого Ло Лунцзи. Поскольку национальные выборы не будут проводиться до объединения, это может быть единственным шансом для людей выразить свое недовольство.\n\nДля нас в особо автономном регионе [ROOT.GetName] наш голос имеет особый вес. Агенты Тана призывали нас продемонстрировать единство, в то время как его противники умоляют нас сделать жест поддержки в их пользу. Однако приходится задаваться вопросом, потрудится ли какая-либо из сторон уважать обещание Федералистского движения защищать провинциальное самоуправление. Может быть, пришло время нам занять собственную позицию."
 YUN.lategame.610.a: "Тан Цзияо имеет нашу критическую поддержку."
 YUN.lategame.610.b: "Оппозиция заслуживает того, чтобы ее голос был услышан."
 YUN.lategame.610.c: "Нам нужно высказать собственные мнения."

 YUN.lategame.611.t: "[FROM.GetLeader] поддерживает Тана"
 YUN.lategame.611.warlordintro: "Лидеры [FROM.GetNameDef] всегда сохраняли значительную автономию, сначала при старом порядке Чжили, а теперь при нашей Федеральной системе. Региональные правительства, такие как их, способны обладать значительными военными и экономическими ресурсами независимо от центрального правительства, которые они могут использовать для получения значительных политических уступок. Однако лидеры милитаристов хитры и крайне непостоянны — лояльны в один момент и амбициозны в другой."
 YUN.lategame.611.d: "$YUN.lategame.611.warlordintro$\n\nНа сегодня, похоже, что [FROM.GetRulingParty] решила отдать себя на службу Тан Цзияо, причем [FROM.GetLeader] выступил с речью в пользу президента, а власти [FROM.GetAdjective] задерживают местных активистов оппозиции. Возможно, они надеются снискать расположение президента, или, может быть, это шанс устранить некоторых собственных врагов, однако это выглядит как подарок. С другой стороны, никогда нельзя слишком доверять своим соперникам."
 YUN.lategame.611.a: "Поддержка [FROM.GetLeader] ценится и будет возвращена однажды."
 YUN.lategame.611.b: "Тан обвиняет его в насилии, чтобы защитить собственную репутацию."

 YUN.lategame.612.t: "[FROM.GetLeader] защищает оппозицию"
 YUN.lategame.612.d: "$YUN.lategame.611.warlordintro$\n\nНа сегодня, похоже, что [FROM.GetRulingParty] решила отдать себя оппозиции Ло Лунцзи, причем [FROM.GetLeader] выступил с речью в пользу скорейшей демократизации, а [FROM.GetAdjective] предлагает убежище местным активистам оппозиции. Возможно, они искренне надеются на демократию в будущем, или, возможно, они просто хотят подорвать президента, однако это выглядит как подарок. С другой стороны, никогда нельзя слишком доверять милитаристам."
 YUN.lategame.612.a: "Ло всем сердцем принимает свой союз с [FROM.GetLeader]."
 YUN.lategame.612.b: "Оппозиция дистанцируется от милитаристов."

 YUN.lategame.613.t: "[FROM.GetLeader] осуждает централизм"
 YUN.lategame.613.d: "$YUN.lategame.611.warlordintro$\n\nНа сегодня, похоже, что [FROM.GetRulingParty] решила пойти независимым путем, подчеркивая всем, кто готов слушать, необходимость того, чтобы Федералистское движение защищало провинциальное самоуправление и избегало тирании центрального правительства. Хотя он не сказал этого прямо, [FROM.GetLeader] неявно отверг доминирование Клики Юньнань. То, что такой заметный региональный лидер говорит таким образом, не сулит ничего хорошего для будущего республики."
 YUN.lategame.613.a: "Тан начинает подчеркивать свои собственные федералистские полномочия."
 YUN.lategame.613.b: "Ло пользуется моментом, чтобы осудить милитаризм."

 YUN.lategame.614.t: "Наши усилия отвергнуты"
 YUN.lategame.614.d: "Казалось бы, федеральная политика — это игра юньнаньцев, и только игра юньнаньцев. Наши усилия помочь нашим союзникам в [UPC.Capital.GetCapitalVictoryPointName] были отвергнуты как нежелательное вмешательство милитариста, поскольку политики Юньнани сомкнули ряды. Однако они пожалеют об этом, наши голоса не будут заглушены. Нация теперь знает правду — что федералисты Юньнани никогда не намеревались позволить другим голосам быть услышанными."
 YUN.lategame.614.a: "Плохое предзнаменование на будущее."

#UPC Phase IV Narrative Events (630-659):

 YUN.lategame.630.t: "Милитаристы раздражены"
 YUN.lategame.630.d: "С продвижением армий Дянь к национальному объединению медленно расширяющаяся территория правительства привела к тому, что армия стала служить двойной цели. Управление «освобожденной» территорией и боевые действия на вражеской территории в конечном итоге привели к лоскутной сети систем внутри провинций. Естественно, это привело к напряженности среди милитаристов по мере появления «новых» милитаристов.\n\nВ районах искренней симпатии или наших союзников существовавшая ранее администрация была в значительной степени сохранена с разной степенью автономии. В районах восстаний, партизанской деятельности или особых волнений местные органы власти были практически реконструированы в условиях военного положения, при этом армия Дянь обеспечивала установку любезных коллаборационистов на значительные руководящие посты, хотя это приводило к ссорам между местными начальниками по подавлению бандитизма, провинциальными милитаристами и местными магистратами.\n\nС его неоспоримой ролью жесткого «посредника» и «арбитра» Центрального правительства Тан счел целесообразным часто вмешиваться в дела, что привело к растущему недовольству по отношению к нему и армии Дянь — его предпочтительному кандидату для решения вопросов в свою пользу.\n\nПодобно своей армии и завоеванным ею территориям, сам Тан также накопил значительное влияние не только во внутригосударственных делах, но и в масштабах всей страны и за ее пределами; отчасти благодаря своей национальной известности, но больше благодаря уникальному положению армии Дянь внутри страны. Фактически восстановив некоторое разнообразие провинций с нуля во время оккупации, они фактически заменили государство в некоторых областях собой, предоставив Тану и его армии непреодолимую власть."
 YUN.lategame.630.a: "Самое справедливое положение дел для защитника нации!"
 YUN.lategame.630.b: "Он хотел бы заменить государство своей армией!"

 YUN.lategame.631.t: "Демократия в военное время"
 YUN.lategame.631.d: "С ростом милитаристских настроений и шатким состоянием почти непрерывной войны по всей стране отношение к демократии и волнам свобод претерпело значительные ограничения и дебаты в залах стойких государственных деятелей и возвышенных интеллектуалов. Должны ли права и свободы быть ограничены? Практично ли сохранять демократию в военное время? А как насчет повстанцев, шпионов или внутренней стабильности?\n\nЛо Лунцзи, пишущий в «Цзыю Цзюньтань» (Форум Свободы), считает, что нашел решение. В ответ на предложения о том, что права и свободы должны быть значительно ограничены во время войны, он возразил, процитировав Гарольда Ласки. Постулируя, что свободой следует пользоваться как во время войны, так и в мирное время, иначе люди не захотят воевать или вносить какой-либо вклад в это.\n\nПриводя доказательства своим утверждениям, он приводит военные поражения в Британской революции или в Гражданской войне в США; значительные ограничения прав лишают правительства поддержки собственных граждан непосредственно из-за лишения их прав.\n\nВместо автократического или репрессивного правительства Ло поддерживает понятие «политики лидерства», пользующейся поддержкой собрания. Осуществляя чрезвычайные полномочия, президент делает это только с согласия народа, парламента и всех политических партий. Ставя национальные интересы выше личных, партийных или групповых интересов, люди способны пробудить дух великого патриотизма — без угнетения прав людей.\n\nВыходя за рамки партийных линий, понятие этого великого патриотизма опиралось на уважение к верховенству закона и, политически, «правил игры», поскольку это означает политическую этику, поддерживающую честную конкуренцию, свободу и свободу от военного влияния. Признавая свободу слова, свободу политического участия и проведение политических реформ, нация должна быть в состоянии вызвать силу такого великого патриотизма без большого вреда военной автократии."
 YUN.lategame.631.a: "Демократию нужно культивировать во все времена."
 YUN.lategame.631.b: "Их притворство демократией потопило бы государство вместе с ней."

 YUN.lategame.632.t: "Бэйян и PGP"
 YUN.lategame.632.d: "Естественно, с выходом Партии народного правительства из регионального Юго-Запада на национальную арену она получила большой приток новой поддержки и даже рекордное количество принятых в ряды членов. Но в этом курсе было включение большого количества «приемных сыновей», так сказать. Бывшие поклонники Бэйяна, Аньхой, Чжили, Фэнтянь и мелкие клики между ними — все они оказались в лоне PGP.\n\nПривыкшие работать на то, что по сути является диктатурой, по крайней мере, несмотря на покровительство Тан Цзияо, они нашли органичное место в партии, помогая в ее администрировании и бюрократии нации. Сам Тан, вдохновленный и, возможно, даже равный Лян Цичао, также сумел кооптировать множество китайских конституционалистов в свое лоно, заняв их нишу на национальном политическом поле.\n\nСо своей стороны Чжан Тайянь сплотился против их включения в партию. Настаивая на том, что они просто бюрократы и централисты, надеющиеся исказить чистую мечту китайского федерализма, он призывал не к их включению в партию, а к их сохранению как «независимых». Прагматичное сотрудничество максимум. Но в основном его сочли слишком старым, чтобы действительно контролировать ситуацию, антикварной реликвией более молодой эпохи.\n\nЭто не обязательно означает, что его взгляды не имеют веса. Его интеллектуальные и политические преемники, Ван Дун и Ван Жунбао, приблизились к золотой середине между Таном и Чжаном. Братья — относительные титаны в своих областях. Ван Дун — один из многих протеже Тайяня, вплоть до того, что его считают его преемником. Ван Жунбао — известный дипломат, посол, разработчик конституции и бывший член Прогрессивной партии.\n\nПонимая необходимость способных бюрократов и более реалистичного взгляда на федерализм, они рассудили, что конституционалисты разделяют тот же корень лянгизма, что и сам Тан, но утверждают, что истеблишмент Бэйяна по сути бездушен, работая на кого угодно."
 YUN.lategame.632.a: "Как всегда, Тан прав. Нам нужны администраторы."
 YUN.lategame.632.b: "Это политическое движение за перемены! А не сосуд для обогащения!"
 YUN.lategame.632.c: "Только истинно верующие могут отличиться в нашем правительстве."

 YUN.lategame.633.t: "CDL выступает против коррупции"
 YUN.lategame.633.d: "В таком большом правительстве, как у Тан Цзияо, с таким количеством отдельных активов, плавающих вокруг и переходящих из рук в руки, неизбежно, что некоторые вещи... скатываются в мутный преступный мир, дисциплина и организация шатаются, гниль развивается и проявляет себя. Это не значит, что Тан не был бдителен против всех признаков коррупции, даже если он иногда сам принимает в ней участие. И, конечно, с коррупцией правительства связаны его непрекращающиеся авторитарные меры.\n\nЛюди все чаще начинают требовать столь желанных свобод. Слова, мысли. Настолько, что Ло Лунцзи, всегда усердный, стал чем-то вроде рупора их криков. Предлагая позволить демократическим партиям расширить свою организацию и увеличить свою силу, чтобы их можно было считать равными с Партией народного правительства, это позволило бы всем людям с их недовольством правительством выражать свои опасения демократическим и мирным образом, в отличие от революционных диатриб или общей апатии.\n\nПродолжая, Ло стремился напомнить правительству истинное значение свободной демократии: «Сфера свободы слова такова, что в мире нет ничего, что нельзя было бы сказать, ничего в мире, что нельзя было бы обсудить. Чтобы бороться за права человека, мы должны бороться за верховенство закона, а это значит сначала бороться за конституцию, потому что конституция — это способ, которым народ контролирует правительство».\n\nС любыми авторитарными мерами, балансирующими на грани диктатуры, Ло утверждает, что правительство «вселит в умы граждан чувство страха, пассивности, зависимости и раболепия». Надеясь выполнить дело активной гражданской демократии, Ло предложил восстановление «всех стандартов ценностей» и «позитивного мышления».\n\nПроявляя осторожность, он не выступал за абсолютную свободу, но за свободу с ограничениями. Свободу, которая не вредит здоровью, ни психическому, ни интеллектуальному, и свободу, которая не уничтожает достоинство."
 YUN.lategame.633.a: "Стремление к такой свободе — благородное дело."
 YUN.lategame.633.b: "Я уверен, что его мнение изменилось бы, если бы он покинул башню из слоновой кости."

 YUN.lategame.634.t: "Конфликт между коллективизмом и индивидуализмом"
 YUN.lategame.634.d: "Несомненные союзники, сродни наставнику и его ученику, видение Тан Цзияо и Чжан Тайяня Китайской Федеративной Республики, очевидно, начало расходиться в последнее время. С протестами против Тана и инакомыслием, начинающим проявляться среди масс, интеллектуалов и даже в некоторых частях армии, они все чаще сталкиваются лбами, несмотря на схожие убеждения. Вдохновленный Чжаном и Лян Цичао, Тан дрейфовал к авторитарному патернализму ранней политики Лян Цичао, в отличие от любопытного индивидуализма Чжана.\n\nОбратившись в буддизм во время своего заключения как революционер в 1903-1906 годах, Чжан рассматривал свою религию как форму сопротивления коллективизму. В резком контрасте с постоянным призывом Ляна к китайскому народу как к коллективной «цельной» групповой идентичности, Чжан пытался использовать религию как способ сохранения своей идентичности в государстве, и даже то, как ее можно использовать для революционного самопожертвования.\n\nРасширяя свою точку зрения в конце 1900-х годов, Тайянь настаивал в «Миньбао» в 1906–1908 годах, что буддизм действует как сила, превосходящая национализм, сила духовного объединения внутри нации, которая может объединить все Пять рас в одно общее целое. Однако он не выступал за государственную религию, вместо этого выбирая подход золотого правила: вы должны относиться к людям так, как вы хотели бы, чтобы относились к вам. Для Чжана «настоящее равенство проистекает из освобождения от мнений о добре и зле или правильном и неправильном».\n\nЛюбопытный индивидуалистический дух Чжана жил в его пожилые годы, поскольку он все больше и больше смиряется со склонностями своего возраста, он все еще продолжает упрекать Тана в поддержании индивидуальных прав и свободы против лянгистского мышления коллективистской борьбы. Его идеи нашли ожившую поддержку среди подобных индивидуалистов в политическом центре, которые надеются, что Чжан сможет добиться более свободного федералистского Китая под железной хваткой Тана."
 YUN.lategame.634.a: "Индивидуализм Чжана гарантирует свободу!"
 YUN.lategame.634.b: "Наследие Ляна — это коллективная сила!"

 YUN.lategame.635.t: "CDL спотыкается"
 YUN.lategame.635.d: "Несмотря на свой высокий момент под солнцем всего годом ранее, спринт Демократической лиги Китая начал спотыкаться, поскольку она изо всех сил пытается найти для себя связную цель, даже подтвердить свою идентичность, не говоря уже о согласовании практики. В диалогах Демократической лиги возникают вопросы о том, является ли она настоящей партией или собранием партий. Некоторые лидеры утверждали, что в Лиге насчитывается 100 000 участвующих членов CDL, но сам Чжан Цзюньмай признает, что никто на самом деле не знает ее истинных последователей.\n\nСо своей стороны, Ло Лунцзи по-прежнему решительно выступал за то, чтобы CDL приняла форму официальной политической партии, пытаясь принудить все составляющие партии распуститься и перестроиться как часть CDL. Однако предложения Ло были отвергнуты большинством в Лиге, назвав их абсурдными, низводя партийных лидеров и влиятельных государственных деятелей до роли костюмов и рядовых.\n\nВ том же духе была предпринята еще одна попытка ведущих деятелей лучше организовать Лигу, но в конечном итоге она развалилась из-за представления о том, что «люди присоединяются к своим составляющим партиям, а затем могут быть зачислены как члены CDL индивидуально».\n\nВнутренняя борьба Лиги привела к тому, что многие старательные члены стали недоверчивыми. Чу Аньпин, редактор шанхайского либерального журнала «Наблюдатель», критиковал Лигу как «оторванную от реальности», а «ее природные данные слабы». Утверждая, что все члены Лиги были почти все старыми учеными, среди которых не было ни одного политика, и что их сдерживала только их оппозиция Чжили.\n\nЧто еще хуже, их позиция среди среднего класса и как жизнеспособной оппозиции была оспорена ни кем иным, как Партией молодой Китай, чья устоявшаяся роль в политике придала им дополнительную силу. В результате CDL пала в значительной степени из-за собственной недальновидности и, несомненно, потребует времени, чтобы восстановиться и провести самоанализ."
 YUN.lategame.635.a: "CDL должна принять быстрые меры для исправления своей организации!"
 YUN.lategame.635.b: "Тан использует их слабость для собственной выгоды."
 YUN.lategame.635.c: "YCP и независимые вбивают клин."

#UPC Phase IV Focus Tree Events (660-689):

 YUN.lategame.660.t: "Губернаторы и милитаристы"
 YUN.lategame.660.d: "Среди извилистых поворотов, беспокойных трубадуров и ненавистных революционеров Эры милитаристов многие могут забыть, что утверждение правительственного чиновника и милитариста может в конечном итоге зависеть просто от того, подтвержден ли их статус какой-либо высшей властью или органом. Что значит быть «легитимным» правительственным чиновником? Иногда быть милитаристом — это просто вопрос чьей-то точки зрения.\n\nПоистине нет четкого разграничения между тем, что, возможно, является просто влиятельной местной элитой, будь то гражданской или военной, и тем, что является милитаристом. Хуже того, нужно принимать во внимание «родословную» милитариста. Являются ли они просто «местным хулиганом»? Мелким региональным милитаристом, едва ли большим, чем бандит. Или они великий милитарист провинциального масштаба, способный заявить о себе на национальном уровне?\n\nКогда его южное правительство начало грандиозную кампанию национального объединения, правительство Тана победило многих милитаристов, но оно также полагалось на стольких же, чтобы сражаться в указанных войнах, и даже в некоторых случаях создавало совершенно новые политические машины милитаристов. В нынешнем виде это стабильно, пока. Но когда правительство неизбежно окрепнет, милитаристы неизбежно превратятся в большое препятствие для усилий по реформированию и даже для власти Тана.\n\nОднако любое подавление их операций в настоящее время может подтолкнуть их к приему различных фигур политической оппозиции, поддерживая людей слова своим оружием. Мелкие милитаристы, такие как Лун Юнь или Лю Чжэньхуань, заявили о таких намерениях, если их власть будет ограничена. И если бы это произошло, Тан, несомненно, потерял бы их политически податливую апатию к национальным делам, поскольку это не касается их или их базы власти.\n\nХотя остается вопрос, может ли Тан сидеть сложа руки и позволять коммодификацию и злоупотребление своим правительством, вопиюще бросая вызов его настойчивости на разделении военной и гражданской сфер? Вопиюще бросая вызов самой демократии?"
 YUN.lategame.660.a: "Они считают себя больше пешек?"
 YUN.lategame.660.b: "Лучше не дразнить тигра."

 YUN.lategame.661.t: "Феодализм и Федерализм"
 YUN.lategame.661.d: "Когда кто-то думает о термине «феодализм», он, вероятно, представляет лордов и дам, председательствующих над своими вассалами-подданными в каком-то связанном честью или иным образом соглашении, охватывающем давно забытое время. Немногие сочли бы этот термин соответствующим Милитаристам Современности или даже Федерализму как лингвистическому термину.\n\nПо крайней мере, в традиционном конфуцианском контексте «феодальный» (фэнцзянь) когда-то послушно служил символом местной автономии и противовесом имперской власти, но в наши дни он стал термином презрения, угнетения и регресса.\n\nЕго первое использование было в классической поэзии, указывая на чувство гармоничного равновесия между Землей и Небом. И все же только недавно «фэнцзянь» принял перевод, означающий «феодализм». Янь Фу, интерпретируя слово через западную призму, видел в нем свободное указание на автономию. А Чжан Тайянь со своей стороны выступал за форму федерализма «фэнцзянь» в рамках этого определения.\n\nСчитается, что через «фэнцзянь» внимание будет сосредоточено на развитии местных институтов и автономии, в отличие от реформистов «цзюньсянь», таких как Лян Цичао, которые желали централизованного и единого национального государства. И насколько это касается Тайяня и федералистов его образа мыслей, китайский федерализм неотделим от фэнцзянь. Термин «Объединенные провинции в самоуправлении», придуманный Тайянем в 1920 году, на самом деле был непосредственно под влиянием минских конфуцианцев Гу Яньу и Ван Фучжи, выступавших за фэнцзянь.\n\nСледовательно, подтекст фэнцзянь о сохранении местной автономии в защите от иностранных угроз должен защищаться любой ценой. Централизация Цин стоила Китаю его способности модернизироваться вместе с другими великими державами, а неудачная централизация Бэйянской республики только раздула вопросы милитаризма. Возможно, если бы фэнцзянь был поддержан раньше, то талантливые ученые земель У и Чу завершили бы Движение самоусиления, и Китай не был бы в том состоянии, в котором он находится сейчас."
 YUN.lategame.661.a: "Кто-то должен спустить утописта с небес на землю."
 YUN.lategame.661.b: "Мы все можем тосковать по лучшим людям в лучшие времена..."

 YUN.lategame.662.t: "Теория формы Вэня"
 YUN.lategame.662.d: "Несмотря на свой набег в политику, в самом своем сердце и душе Общество полумесяца — это собрание поэтов, тех людей прозы, которые видят мир под вуалью витиеватого языка и тонкого танца слов на странице. Это суть Полумесяца, это то, чем Сюй Чжимо изначально стремился сделать Общество и Книжный магазин. Не политической организацией, а культурным органом для нового возрождения в китайской поэзии.\n\nОдним из самых известных членов общества, как своей политикой, так и своей поэзией, должен быть Вэнь Идо. Проникнутый чувством гражданского политического участия во время своего пребывания в Америке, он стал особенно чувствителен к проблеме расового неравенства в демократической республике, наряду с вступлением в Общество пробужденного льва, предшественника Партии молодой Китай.\n\nВ поэтическом плане он наиболее известен своей теорией «формы» (гэлю). Полагая, что «нельзя обходиться без правил при игре в шахматы, как нельзя обходиться без формы при написании стихов», он является довольно жестким сторонником «формы». Утверждая, что поэзия может быть сочинена только после процесса редактирования и отбора, он выступает против романтической защиты «Возвращения к природе», потому что Природа «существует в несовершенном состоянии, и только Искусство может исправить недостатки Природы».\n\nАдаптированная из английских просодических правил и принимающая во внимание особенности китайского языка, «форма» Вэня является прямым ответом на его разочарование поэтическими тенденциями «отвратительной путаницы иностранных терминов, иностранных выражений, иностранных аллюзий, иностранных тем и иностранных мыслей». Подобно своей политике, Вэнь искал решение, синтезирующее элементы китайских и западных концепций.\n\nВсегда романтик, одержимый «смертью в экстазе», воображаемым царством искусства и реальным миром страданий и боли, Вэнь развил склонность к драматизму. С началом войны на горизонте он поклялся никогда не сбривать бороду, пока не будет достигнута победа."
 YUN.lategame.662.a: "Пока весь Китай истекает кровью, его поэты чувствуют наибольшую скорбь."
 YUN.lategame.662.b: "И все же романтическая погоня за красотой мимолетна, никогда не длится долго..."
 YUN_wen_yiduo_event_tt1: "§L«Счастье, я не могу принять твою взятку сейчас.»\n«Мой мир не в этом обнесенном стеной квадратном футе.»\n«Слушай, вот еще один пушечный выстрел, еще один рев Смерти»\n«Тихая ночь, как ты можешь остановить яростное биение моего сердца?»§!"
 YUN_wen_yiduo_event_tt2: "§L«Не слыша стонов и вздохов всех моих соседей,»\n«Не видя дрожащих теней вдов и сирот,»\n«И конвульсий в боевых окопах, безумцев, кусающих свои койки,»\n«И всех трагедий, перемолотых жерновом жизни.»§!"

 YUN.lategame.663.t: "Вспоминая Сюй Чжимо"
 YUN.lategame.663.d: "И это не могло быть так без отца-основателя. Как и для любой нации, любого правительства, любой партии, любой идеологии, тот, кто берет первую салфетку, навсегда оставит неизгладимое впечатление на своих потомков и так далее. Они связаны судьбой или идеалом следовать по их стопам, и все же с Полумесяцем это не могло быть иначе.\n\nСюй Чжимо, погибший несколько лет назад в трагическом несчастном случае, всегда надеялся, что Полумесяц останется чистым от политики. Он был личностью прометеевского типа, неисправимым индивидуалистом, который знал только индивидуума, понимал только индивидуума и верил только в индивидуума. Что демократия сама по себе является духом всеобщего индивидуализма.\n\nИ он был настолько откровенен, что его книжный магазин «Полумесяц» превратился в ячейку тех, кто презирал насильственную революцию, синдикализм, марксистскую теорию классов. С латентным восхищением «либеральной и все же консервативной» формой, которую британская политика принимала в прошлом, или верой в индивидуализм и независимую мысль.\n\nКак поэт тоже, Сюй был полон энтузиазма и страсти. Приглашенный на встречу в «рай новых поэтов» в 1926 году, его последующее решение запустить Поэтическое приложение в Приложении к Утренней Почте переросло в Поэтическую школу Полумесяца и одноименное общество в дальнейшем. «Исправить ранее необузданную свободу» было главным духом поэтической реформы, ради которой Сюй основал свою группу, восстать против «буйного эготизма» и безудержного использования иностранных выражений и тем в литературной работе того времени.\n\nНо работа Сюя развивалась дальше. Сначала Полумесяц был чисто литературным под руководством Сюя, Вэнь Идо и Жао Мэнканя. Но по мере того, как время шло вперед, и ситуация в Китае развивалась, такие писатели, как Ху Ши или Лян Шицю, неуклонно превращали общество в политическое литературное издание, как и многие до него. С полным ужасом он ушел в отставку, но его литературная сущность все еще остается в поэтическом поле Китая."
 YUN.lategame.663.a: "И я всегда буду сожалеть, что его нет здесь с нами."
 YUN.lategame.663.b: "Возможно, он был прав насчет природы политики?"
 YUN_xu_zhimo_event_tt1: "§L«Тихо я ухожу.»\n«Так же тихо, как пришел;»\n«Я тихо машу на прощание»\n«Облакам в западном небе.»§!"
 YUN_xu_zhimo_event_tt2: "§L«Но теперь я не могу петь вслух,»\n«Тишина — моя прощальная музыка,»\n«Даже мои сверчки теперь молчат для меня,»\n«Ибо Кембридж этим вечером молчит.»§!"

#UPC Satellite Narrative Events (700-729):
 YUN.lategame.700.t: "Федерализм на марше"
 YUN.lategame.700.d: "Север пал, а Юг размышляет, пока Китай переворачивает новую страницу своей истории. Китайское федералистское движение традиционно придерживалось более осторожного подхода к объединению, предпочитая дипломатию проведению северного похода — либо из-за искренней веры в переговоры, либо из-за желания сохранить ресурсы и пессимистического взгляда. Тем не менее [UPC.GetNameDef] вышел победителем в своих войнах, захватив международно признанную столицу Пекин в жестокой борьбе.\n\nРасходы были тяжелыми, даже для победителей. Юньнань, возможно, и не является центром федералистского правительства, но она была вынуждена взимать высокие налоги со своего народа и терпеть испытания современной войны. При всех жертвах, принесенных народом, растет ожидание того, что федералисты выполнят свои обещания о демократии и экономических реформах дома.\n\nДля Тан Цзияо его долги могут быть востребованы раньше, чем он надеялся. Беспорядки тлеют уже некоторое время, причем попытки Тана централизовать власть в провинции оттолкнули многих его командиров гарнизонов. Интеллигенция, с которой он вступил в союз, аналогичным образом стала недовольна медленным темпом реформ — разработка конституции застопорилась, а выборы были ограничены. Пока Гуанчжоу обдумывает свои следующие шаги, Куньмин сталкивается с собственной расплатой."
 YUN.lategame.700.a: "Лидерство Тан Цзияо спасет провинцию!"
 YUN.lategame.700.b: "Оппозиция борется за свободную Юньнань!"
 YUN.lategame.700.c: "Злоупотребления правительства должны быть остановлены!"

 YUN.lategame.701.t: "Агитация в Куньмине"
 YUN.lategame.701.d: "Тан Цзияо всегда придерживался осторожного подхода к левым радикалам, проникающим в его провинцию. Осознавая свою потребность привлекать интеллектуалов из престижных школ для создания своих демократических полномочий и укомплектования своего правительства, он иногда закрывал глаза, но его строгий антисоциализм также привел к формированию его противниками Инновационного общества Юньнани, которое позже превратилось в марксистское Новое общество Юньнани.\n\nТан внимательно следил за этими диссидентами, вербуя информаторов среди студенческих органов и преподавателей. Слежка и цензура являются обычным явлением в Китае, но не так просто решить проблему растущего разочарования левоцентристов, которые страдают от наложенных на них ограничений.\n\nСлухи о возрождении Федерации китайских демократических партий в Пекине распространяются. Эта последняя итерация, Демократическая лига Китая, организуется многими ведущими социалистами-реформистами, прогрессистами и либералами по всей стране. Среди ее соучредителей — Ло Лунцзи и Общество полумесяца, которые за последнее десятилетие наладили обширные связи в Юньнани.\n\nНо в Куньмине создание партии будет зависеть от местных жителей. Группа ученых, преподающих в регионе, сформировала так называемую «Ассоциацию девяти старейшин», в которую вошли Цунь Шушэн, Сунь Цимэн, Ли Гунпу, Чжан Тяньфан, Чжоу Симинь и Чу Тунань. К ним присоединилась фракция Школы Цюши во главе с Су Хунганом, имеющим связи с Ли Гунпу, Чу Тунанем, Вэнь Идо, Пань Гуанданом и У Ханем. К перекрывающимся группам также присоединились другие интеллектуалы Юго-Западного университета, включая (бывших) социалистов, таких как Ли Вэньи, Фэн Сутао, Ян Ибо и Чу Тунань.\n\nПедагог Цунь Шушэн стал их лидером, добившись известности как глава Ассоциации помощи Юньнани, а также работая в банке Куньмин Синвэнь. Он организовал Патриотическое студенческое движение в Куньмине, якобы для борьбы с империализмом, но также и для того, чтобы бросить вызов правлению Тана."
 YUN.lategame.701.a: "CDL Юньнани объединяется против угнетения!"
 YUN.lategame.701.b: "Власти Юньнани способны подавить диссидентов."
 YUN.lategame.701.c: "Злоупотребления правительства должны быть остановлены!"

 YUN.lategame.702.t: "Заговор комиссаров обороны"
 YUN.lategame.702.d: "Тан Цзияо работал над тем, чтобы оттеснить своих старших офицеров после их неудачного переворота в 1927 году, воспользовавшись своим союзом с центральным правительством и своим успехом в обеспечении безопасности флангов Юньнани, чтобы подорвать и подчинить их. Он медленно ограничивал их финансирование, стравливал их друг с другом и перераспределял их полномочия и привилегии своим собственным лоялистам с большим успехом на протяжении многих лет.\n\nОднако его схемы не остались незамеченными его соперниками. Удаление Таном генерала Лун Юня из Чжаотуна навсегда изменило баланс сил в Юньнани в его пользу: Лун был самым сильным из заместителей Тана, в какой-то момент сильнее, чем все они вместе взятые. Лун остается на службе под тщательным наблюдением, его власть в основном сломлена, но реальной угрозой правлению Тана теперь является генерал Ху Жоюй.\n\nВ каком-то смысле Ху всегда был тем, кого нужно было победить. Более агрессивный интриган из двух, он продолжает попытки создать коалицию, способную свергнуть Тана. Несмотря на его взаимную неприязнь с генералом Чжан Жуцзи, Ху пытался оторвать генерала Сунь Ду от сферы Тана. Точно так же он обратился к амбициозному генералу Лу Ханю, двоюродному брату Лун Юня, в надежде склонить его и его родственника на свою сторону. Ху имеет связи с местным CDL и даже некоторыми членами Гоминьдана, вдобавок к коммерческим интересам и даже некоторым бандитам. Точно так же, как Тан Цзияо готовился к решающей схватке, Ху Жоюй ждал этого момента годами."
 YUN.lategame.702.a: "Генерал Ху завершает свои последние приготовления..."
 YUN.lategame.702.b: "Губернатор Тан активирует тщательно расставленные ловушки..."

 YUN.lategame.703.t: "Восстание в Люляне"
 YUN.lategame.703.d: "Пока лидеры Юньнани плетут интриги друг против друга в городах, конфликт уже перерос в открытые бои в сельской местности. Напряженность назревала некоторое время, пока бандиты, джентри, социалисты и чиновники боролись за превосходство. По большей части социалисты Юньнани являются самой слабой фракцией — в отличие от своих коллег в Миньгани, раздробленные повстанцы Юньнани не смогли объединиться в армию, способную победить гораздо более крупные ополчения джентри, и вместо этого вынуждены полагаться на поддержку местных, менее идеологических бандитов.\n\nЕдинственным исключением, похоже, является уезд Люлян, где местные джентри восстали против местных чиновников, пытавшихся разоружить племена региона. Социалисты во главе с Ван Дэсанем попытались использовать момент, играя на обеих сторонах, прежде чем сделать шаг с помощью местных студентов, бандитов, фермеров и других, имеющих зуб на местных помещиков. Хотя инцидент был быстро подавлен, так как и джентри, и правительственные чиновники Тана перегруппировались, он вверг провинцию в анархию.\n\nХу Жоюй попытался пойти маршем на Куньмин, обвиняя Тана в укрывательстве социалистов и союзе с повстанцами против джентри. Тан приказал Провинциальной ассамблее объявить военное положение в ответ и арестовать лидеров социалистов в столице. Лидеры CDL, опасаясь, что они следующие, ютятся в своих домах, отчаянно пытаясь наметить свой следующий курс действий до восхода солнца..."
 YUN.lategame.703.a: "Послать представителей к генералу Луну, чтобы умолять о перевороте."
 YUN.lategame.703.b: "Отправить телеграмму в [UPC.Capital.GetCapitalVictoryPointName], чтобы попросить их вмешательства."

 YUN.lategame.710.t: "Ху Жоюй захватывает Куньмин"
 YUN.lategame.710.d: "Переворот был стремительным, быстрее, чем кто-либо мог себе представить. Правление Тан Цзияо оказалось гораздо более хрупким, чем казалось — его передовые силы таяли по мере продвижения армии Мэнцзы. Чжан Жуцзи возглавил левый фланг и быстро захватил Дали, так как местные ополчения джентри присоединились к нему по пути. Ху Жоюй и Ли Сюаньтин тем временем совершили быстрый марш к столице.\n\nКуньмин пал почти без выстрела, предотвратив необходимость в долгой осаде. Попытка Тан Цзияо убедить ассамблею осудить Клику Мэнцзы не увенчалась успехом, так как консерваторы в Провинциальной ассамблее и Торговой палате нарушили строй по мере распространения новостей о ранних поражениях на поле боя. Вскоре отступление превратилось в бегство, когда армия Ху достигла ворот города — на фоне протестов под руководством CDL в городе генерал Лун Юнь устроил дворцовый переворот и задержал губернатора Тана, назначив себя исполняющим обязанности губернатора.\n\nПопытка реставрации лоялистами Тан Цзияо на севере была быстро подавлена. Когда весть о перевороте достигла Гуйчжоу, клан Лю арестовал Тан Цзиюя, прежде чем он смог вернуться в Юньнань. Другие лоялисты Тана, такие как Тан Цзилинь, Ван Цзесю и У Сюэсянь, просто слишком разрозненны и деморализованы, чтобы долго сопротивляться.\n\nЗаговорщики в Куньмине послали представителей для переговоров с победившим триумвиратом Мэнцзы, но генерал Ху потребовал не что иное, как капитуляцию. Понимая свое шаткое положение, собственные генералы Луна — во главе с его родственником Лу Ханем — предали его, вместо того чтобы сражаться. Не желая участвовать в грядущей хунте в качестве бессильной номинальной фигуры, Лун решил «подмести могилы своей семьи» в Чжаотуне, надеясь на лучшую возможность. На его месте генерал Лу Хань стремился извлечь выгоду из недовольства CDL. Но на данный момент Ху Жоюй является хозяином юго-запада и был быстро признан губернатором центральным правительством."
 YUN.lategame.710.a: "Ху наконец-то отомстил."

 YUN.lategame.711.t: "Путч оппозиции в Куньмине"
 YUN.lategame.711.d: "Переворот был стремительным, быстрее, чем кто-либо мог себе представить. Правление Тан Цзияо оказалось гораздо более хрупким, чем казалось, с восстанием провинциальной ассамблеи и торговой палаты, когда он попытался заручиться их поддержкой для введения военного положения. CDL вывела тысячи протестующих на улицы, и с быстро падающей легитимностью губернатора отстраненный генерал Лун Юнь смог собрать поддержку, необходимую для дворцового переворота.\n\nВ сельской местности партизаны и бандиты, слабо связанные с CDL, смогли захватить контроль над несколькими городами, так как обезглавленные силы Тана начали таять. Попытка реставрации лоялистами Тан Цзияо на севере была быстро подавлена. Когда весть о перевороте достигла Гуйчжоу, клан Лю арестовал Тан Цзиюя, прежде чем он смог вернуться в Юньнань. Другие лоялисты Тана, такие как Тан Цзилинь, Ван Цзесю и У Сюэсянь, просто слишком разрозненны и деморализованы, чтобы долго сопротивляться. С уничтожением вооруженного крыла движения Тана большинство членов хрупкой PGP либо дезертировали из партии, либо бежали в Гуанчжоу, чтобы избежать возмездия.\n\nСилы Ху Жоюя слишком медленно покидали Мэнцзы, задержанные различными внутренними спорами и саботажем сельских сил. Поскольку его окно в Куньмин закрывалось, он решил принять соглашение с Цунь Шушэном, Лун Юнем, Мяо Юнтаем и Чжан Тайянем о формировании временного совета. Пока Цунь Шушэн, номинальный глава совета, работает над объяснением ситуации центральному правительству, судьба лоялистов Тана висит на волоске."
 YUN.lategame.711.a: "Сторонники Тан Цзияо будут сняты со своих постов!"
 YUN.lategame.711.b: "По просьбе Чжан Тайяня мы пока оставим их на месте."

 YUN.lategame.712.t: "Тан громит своих соперников"
 YUN.lategame.712.d: "Враги Тан Цзияо были быстры, но Тан был быстрее. Он быстро собрал поддержку ассамблеи, чтобы объявить чрезвычайное положение, и собрал свои гвардейские дивизии для обеспечения безопасности Куньмина. Разрозненные протесты CDL и социалистов в городе были быстро подавлены, и колеблющиеся силы встали в строй.\n\nВ Чжаотуне и Дали лоялисты смогли сдержать попытки захватить крупные города местными бандитами, партизанами и ополчениями джентри. Укрепив свои позиции, они смогли обезопасить западный фланг Тана, прежде чем авангард армии Мэнцзы смог соединиться с сочувствующими силами.\n\nОсновные силы Ху Жоюя слишком долго покидали Мэнцзы, страдая от низкого морального духа и плохой организации. Когда они наконец встретились с армией Тана, было слишком поздно — подразделения Куньмина окопались и были готовы к бою. Силы генерала Ху были легко отбиты, и силы Тана преследовали их до самого Мэнцзы, где триумвират был вынужден капитулировать. Их заговоры были раскрыты хитрым губернатором, повстанцы молят о пощаде у его ног."
 YUN.lategame.712.a: "Предатели будут заключены в тюрьму, их активы конфискованы, а их силы распущены."
 YUN.lategame.712.b: "Их силы будут разоружены, но с их лидерами будет достигнуто соглашение."

 YUN.lategame.720.t: "Телеграмма из Куньмина"
 YUN.lategame.720.d: "Президент получил срочную телеграмму из Куньмина, подписанную ведущими членами CDL Юньнани. Тревожные сообщения о внезапном всплеске политического насилия в полуизолированной и сильно автономной провинции поступают в [UPC.Capital.GetCapitalVictoryPointName] уже несколько дней, но они были спорадическими и ненадежными. Провинциальное правительство, возглавляемое десятилетиями губернатором-федералистом Тан Цзияо, неоднократно заявляло, что он держит ситуацию под контролем — что сельские бандиты (эндемичная, но стабилизированная проблема) и социалистические повстанцы использовали неопределенность после падения Берлина, чтобы создать проблемы.\n\nНедавняя телеграмма рисует другую картину. Она бичует правительство Тана как коррумпированное, авторитарное и жестокое — арестовывающее инакомыслящих и подавляющее гражданские права. Он отказался принять конституцию провинции или провести свободные выборы, цепляясь за власть. Очевидно, назревает гражданская война между Тан Цзияо и его лейтенантами, а местные демократические интеллектуалы оказались под перекрестным огнем. Сообщение умоляет центральное правительство вмешаться и приказать сместить Тана — дополнительно обвиняя его в планировании измены против правительства [UPC.GetLeader].\n\nАвторы явно преувеличивают, но это подчеркивает их отчаяние. Федералистская концепция 1920-х годов для отношений центрального правительства и провинций, как правило, была благоприятной для местной автономии и невмешательства в их избирательные дела. Тан Цзияо особенно был давним и видным членом движения федералистов, хотя сообщение задело за живое, когда дело дошло до сомнений в его лояльности, беспокойство, которое сохранялось на протяжении всего его пребывания в должности. Учитывая экстремальную ситуацию, вмешательство президента для достижения компромисса может быть единственным способом мирно разрешить ситуацию своевременно, но будет нести значительные политические риски. С другой стороны, невмешательство тоже."
 YUN.lategame.720.a: "Отправить ответ с приказом Тан Цзияо отступить и начать переговоры."
 YUN.lategame.720.b: "Отправить ответ, признающий власть Тана и запрашивающий переговоры."

 YUN.lategame.721.t: "[UPC.Capital.GetCapitalVictoryPointName] приказывает Тану отступить"
 YUN.lategame.721.d: "Убедительная петиция Цунь Шушэна президенту, должно быть, сработала! Быстро распространилась весть, что [UPC.GetLeader] публично приказал губернатору Тану немедленно прекратить репрессии и мирно разрешить кризис, охвативший его провинцию, с неопределенными последствиями в случае отказа. Это вторгается на сомнительную конституционную территорию, поскольку Федералистское движение традиционно поддерживало необходимость избегать вмешательства центрального правительства в местные дела, хотя некоторые утверждали, что должны быть исключения для обеспечения свободных выборов, гражданских прав и/или защиты национального суверенитета.\n\nОднако Тан Цзияо так и не получил возможности ответить. Ослабевающая популярность и стремительно падающий авторитет Тана обнажили его слабость, и в течение дня группа его генералов во главе с мстительным Лун Юнем организовала дворцовый переворот — задержав Тана и многих его ключевых лоялистов обезглавливающим ударом. Стремясь легитимизировать путч, он согласился на временный совет, включающий Цуня, Луна, Чжан Тайяня и Ху Жоюя — который неохотно согласился на условия. Тан Цзияо пока официально остается губернатором, но он фактически превратился в номинальную фигуру.\n\nПопытка реставрации лоялистами Тан Цзияо на севере была быстро подавлена. Когда весть о перевороте достигла Гуйчжоу, клан Лю арестовал Тан Цзиюя, прежде чем он смог вернуться в Юньнань. Другие лоялисты Тана, такие как Тан Цзилинь, Ван Цзесю и У Сюэсянь, просто слишком разрозненны и деморализованы, чтобы долго сопротивляться. Многие из его последователей, опасаясь возмездия, бежали в соседние провинции по мере смещения баланса сил — без сомнения, придумывая клевету против нас.\n\nЦентральное правительство вряд ли будет особенно счастливо исходом, но они также, вероятно, будут стремиться умыть руки от ситуации, по крайней мере, пока. Теперь безвозвратно создан прецедент, который может привести к острым проблемам в будущем."
 YUN.lategame.721.a: "Мы отомстим тиранам!"
 YUN.lategame.721.b: "Давайте работать над компромиссом, как можем."

 YUN.lategame.722.t: "[UPC.Capital.GetCapitalVictoryPointName] подтверждает полномочия Тана"
 YUN.lategame.722.d: "Попытки Цунь Шушэна и CDL заручиться поддержкой президента против губернатора Тана имели обратный эффект. Вместо того чтобы прийти им на помощь, [UPC.GetLeader] написал публичный ответ, отчитывающий CDL за подрыв авторитета Тана и попытку подстрекательства к насилию, повторяя заявления провинциального правительства о том, что CDL находится в сговоре с социалистическими революционерами и оппортунистическими бандитами. Кроме того, он сослался на прошлые соглашения в рамках Федералистского движения, защищающие провинции от неправомерного вмешательства центрального правительства в местные дела, и поручил Тану мирно разрешить свои разногласия с его недоброжелателями.\n\nКонечно, это было все, что нужно Тану, чтобы восстановить контроль над провинцией. С центральным правительством, казалось бы, на его стороне, колеблющиеся офицеры в его правительстве встали в строй, и Куньмин смог быстро завершить подавление подозреваемых предателей внутри города. CDL, потеряв инициативу, ожидая ответа центрального правительства, оказалась бессильной, пока их возможность ускользала.\n\nГрандиозный марш Ху Жоюя на Куньмин также так и не состоялся — его ставка на то, что региональные власти сплотятся на его стороне на фоне слабости Тан Цзияо, провалилась. Большинство сил клики Юньнань остались верны Тану, а недисциплинированные силы фракции Мэнцзы растаяли после неудачного штурма позиций лоялистов. Теперь, когда его доминирование обеспечено, мало что осталось на пути Тана."
 YUN.lategame.722.a: "Тан отомстит предателям."
 YUN.lategame.722.b: "Тан будет великодушен в своей победе."

 YUN.lategame.725.t: "Центральное правительство рушится"
 YUN.lategame.725.d: "Центральное правительство пало, повергнув лоялистов-федералистов в смятение. Юго-западные провинции всегда были довольно автономными образованиями, но даже они с трудом переносят крах, так как многие другие сдались нашим наступающим врагам. Большинство руководства старого центрального правительства бежало за границу, вместо того чтобы оказаться во власти «мелких милитаристов», и [ROOT.GetLeader] со своей стороны предпринял шаги, чтобы захватить контроль в качестве исполняющего обязанности президента.\n\nОн сталкивается с трудной задачей переломить ситуацию, поскольку его генералы с трудом интегрируют другие провинциальные подразделения, а многие деморализованные солдаты растворяются в сельской местности, оставляя «призрачные» бригады и дивизии. Экономика также была ввергнута в хаос, а также растут сомнения в нашей способности выплачивать долги.\n\nСреди этой неопределенности идет значительная борьба за власть. Тан Цзияо пока остается у руля, но возникший вакуум власти подбодрил генерала Ху Жоюя закинуть удочки, чтобы сделать ставку на власть. Тем временем в самом Куньмине за отстраненным генералом Лун Юнем ухаживали местные активисты во главе с так называемой «Ассоциацией девяти старейшин» во главе с Цунь Шушэном и Су Хунганом, к которым присоединились Общество полумесяца и местные социалисты. Похоже, неминуемая опасность только разделила, а не объединила провинцию."
 YUN.lategame.725.a: "Тан Цзияо сохраняет свое правление, несмотря на заговоры своих комиссаров."
 YUN.lategame.725.b: "Ху Жоюй марширует на Куньмин и становится во главе чрезвычайной хунты."
 YUN.lategame.725.c: "Заговорщики Куньмина устраивают переворот в столице и устанавливают чрезвычайное правительство."

 YUN.lategame.726.t: "Неожиданный поворот"
 YUN.lategame.726.d: "Внезапным поворотом судьбы, похоже, что юго-западным федералистам удалось сформировать правительство самостоятельно. Большинство не ожидало, что это произойдет именно так, но падение старого центрального правительства дало им возможность, и некогда периферийный осколок сумел выкроить роль для себя.\n\nОднако это развитие событий не обошлось без последствий. Большая политическая власть влечет за собой большие ожидания, и новое правительство теперь несет ответственность за выплату долгов, восстановление опустошенных районов и реорганизацию теперь перенапряженных вооруженных сил. Более того, идет значительная борьба за власть. Тан Цзияо пока остается у руля, но возникший вакуум власти подбодрил генерала Ху Жоюя закинуть удочки, чтобы сделать ставку на власть. Тем временем в самом Куньмине за отстраненным генералом Лун Юнем ухаживали местные активисты во главе с так называемой «Ассоциацией девяти старейшин» во главе с Цунь Шушэном и Су Хунганом, к которым присоединились Общество полумесяца и местные социалисты. Похоже, неминуемая опасность только разделила, а не объединила провинцию."
 YUN.lategame.726.a: "Тан Цзияо сохраняет свое правление, несмотря на заговоры своих комиссаров."
 YUN.lategame.726.b: "Ху Жоюй марширует на Куньмин и становится во главе чрезвычайной хунты."
 YUN.lategame.726.c: "Заговорщики Куньмина устраивают переворот в столице и устанавливают чрезвычайное правительство."

#UPC Satellite Followup Events (730-759):

 YUN.lategame.730.t: "Четыре Небесных Царя"
 YUN.lategame.730.d: "В китайской буддийской мифологии четырьмя сторонами света (север, юг, восток и запад) управляют четыре девы (бога). Это Вайшравана, Вирудхака, Дхритараштра и Вирупакша, и все они служат Шакре, повелителю девов. В 8-й, 14-й и 15-й день каждого лунного месяца четыре царя либо посылают эмиссаров, либо отправляются инспектировать состояние добродетели и нравственности людей. По приказу Шакры цари также защищают Траястримшу (мифическую небесную обитель девов) от нападений асуров, демонов, олицетворяющих смертные грехи, такие как чревоугодие и похоть.\n\nС консолидацией власти Таном в провинции больше внимания уделяется росту его так называемых «Четырех Небесных Царей», сосредоточенных вокруг его подразделений телохранителей. Это У Сюэсянь, Си Цзыцян, Хэ Шицзун и Тао Шаоцин.\n\nУ Сюэсянь — лидер бандитов, родившийся в богатой семье, который собрал ополчение, чтобы конкурировать с Юй Ином из Цюйцзинба за права на воду, и вступил в конфликт с силами Тана. В 1919 году двое мужчин пришли к перемирию, где У поклялся в абсолютной верности Тану и стал одним из самых надежных и компетентных офицеров Тана.\n\nСи Цзыцян — этнический наси, учившийся в Военной академии Юньнани. Набожный буддист и проницательный политик, он также стал одним из самых доверенных офицеров Тана.\n\nХэ Шицзун и Тао Шаоцин — военные офицеры, которые долгое время сражались вместе с Тан Цзияо. Поскольку они кровные братья Тана, они готовы убивать и умирать за губернатора Юньнани.\n\nКак четыре доверенных советника в прямых военных кругах Тана, Четыре Небесных Царя обладают огромным влиянием в вооруженных силах. Силы Юньнани долгое время представляли собой смесь как прилично обученных солдат из военных академий, таких как Куньмин, так и дивизий ополчения, часто укомплектованных лидерами бандитов. Потенциальный акцент может быть сделан на подготовке элитных солдат, укомплектованных кадровыми военными офицерами из академий и обученных в тяжелых условиях горной войны. Однако, возможно, военная подготовка могла бы быть направлена на укрепление провинциальных сил, таких как местные бандиты, в эффективное ополчение для народа."
 YUN.lategame.730.a: "Элитная сила для выполнения воли губернатора."
 YUN.lategame.730.b: "Давайте подготовимся к грядущей буре."

 YUN.lategame.731.t: "Полумесяц восходит"
 YUN.lategame.731.d: "После сопротивления и беспорядков против правительства Тан Цзияо CDL была подавлена, а многие ее члены были вынуждены скрываться. Сообщается, что членов CDL можно найти даже в Шанхае и Гонконге, далеко от самой юго-западной провинции Китая. Умеренные члены CDL попытались примириться с правительством и стремились присоединиться к Обществу полумесяца (CMS) под руководством Ло Лунцзи, Вэнь Идо и Лян Шии.\n\nСвязи CMS с CDL исторические. Ло Лунцзи в свои ранние годы участвовал в создании Национал-социалистической партии и работал главой пропаганды CDL. Определяя себя на раннем этапе как социал-демократа, Ло обратился к либерализму, поскольку восхищался концепцией и структурой разделения властей и отвергал социализм как средство достижения цели. Как профессор политологии и специалист по правам человека, Ло преподавал в Юго-Западном объединенном университете Куньмина с 1932 года. Учитывая его близость к губернатору и давние связи с демократическим движением, Ло поддерживает тесные связи с Тан Цзияо.\n\nКонечно, естественно, Общество полумесяца представляет угрозу. Их более левая риторика оставляет желать лучшего, и они часто расходятся во мнениях с Чжан Тайянем в своих более марксистских и левых интерпретациях демократии. Учитывая их явные тенденции к радикализму, Тану может быть полезнее поощрять Ло помогать «переориентировать» позицию бывших членов CDL в более умеренный лагерь. При этом члены расслабились бы в вопросе класса и больше сосредоточились на немедленном демократическом разделении властей. С другой стороны, ясно, что эти демократические группы в Юньнани приносили только неприятности последние несколько лет. Поскольку их присутствие только продолжает обострять отношения крестьян и рабочих в провинции, возможно, лучше просто закрыть их все вместе."
 YUN.lategame.731.a: "Ориентировать их в умеренном направлении"
 YUN.lategame.731.b: "Им лучше сосредоточиться на своей прозе..."

 YUN.lategame.732.t: "Режим Тана консолидируется"
 YUN.lategame.732.d: "На протяжении всего периода милитаристов люди, движимые страстью и рвением, возглавляли атаку революции, но часто не только они, но и их круги определяют их движение. У Сунь Ятсена был его Гоминьдан с верными приверженцами, такими как Ван Цзинвэй, Чан Кайши и Ху Ханьминь. У Чэнь Цзюнмина есть его вечно преданные Е Цзюй и Чэнь Цию. Подобно этим великим людям, у Тана также есть свои основные союзники.\n\nТан Сяоин, его сын, сидит по правую руку от него. Его близкие советники — генералы Тан Цзию и Чэнь Вэйгэн, Чжан Вэйхань (мэр Куньмина), Сюй Чжичэнь (министр иностранных дел и финансов) и У Кун (менеджер Юньнаньской оловянной компании). Вместе эти люди образуют самый доверенный персонал и кабинет Тана.\n\nПартию народного правительства возглавляет Чжан Тайянь и его последователи, которые формируют политическую базу правительства Тана. Это идеалистическая смесь федералистских принципов, консервативных демократических идеалов и конституционной партии. Хотя нет верховной догмы ортодоксальной идеологии, наблюдатели отмечают, что в дополнение к приверженности демократическим принципам и антиимпериализму партия также склонна следовать буддийским и конфуцианским верованиям и традициям. Кроме того, в самом начале Тан также приглашал представителей из Общества пробужденного льва, которые сформировали ядро партии, привлекая членов Партии молодой Китай.\n\nТеперь, когда страна твердо объединена под федерализмом, действительно ли это направление для Тана? Действительно ли так заканчивается юньнаньская революция Тана — истощенная и поглощенная большим федералистским движением, возглавляемым [UPC.GetLeader] и его [UPC/GetRulingParty]. Поскольку напряженность между Гуанчжоу и Куньмином обостряется с каждым днем, каждый день Тан встречается со своим ближним кругом и избранными представителями PGP — планируя и ожидая своего следующего шага."
 YUN.lategame.732.a: "Только Тан может завершить истинную революцию 1911 года."
 YUN.lategame.732.b: "Мы — широкая демократическая коалиция."
 YUN.lategame.732.c: "Мы поддерживаем Центральное правительство!"

 YUN.lategame.740.t: "Смерть Тан Цзияо"
 YUN.lategame.740.d: "Солдаты пришли в полночь. Глубокой ночью отряд пехотинцев ворвался в дом Тана с офицером, зачитывающим вслух ордер о том, что Тан Цзияо должен быть помещен под пристальное наблюдение на неопределенный срок. Приказы исходили непосредственно от бывших подчиненных Тана Ху Жоюя и Лун Юня, а также Цунь Шушэна, лидера CDL Юньнани. В ходе внезапного дворцового переворота десятилетние стремления Тана к власти рухнули несколько месяцев назад.\n\nСреди нового триумвирата возникли разногласия по поводу судьбы Тана. Цунь яростно заявлял, что Тана следует отправить далеко от Юньнани в Гуанчжоу, в то время как Лун Юнь утверждал, что присутствие Тана в провинции сослужило бы им лучшую службу, учитывая влияние Тана среди его сторонников. Ху Жоюй, с другой стороны, хочет, чтобы Тан предстал перед судом за свои преступления и, надеюсь, был осужден. Дискуссии, однако, оказались спорными. Телеграмма от центрального правительства прибыла на прошлой неделе, пытаясь обеспечить проезд Тана в Гуанчжоу под вооруженной охраной, но сегодня утром его нашли мертвым в постели. Хотя здоровье самого Тана в последнее время ухудшалось, быстро поползли слухи, что он был отравлен и полностью нейтрализован.\n\nТан Сяоин был в Гуанчжоу, пытаясь лоббировать интересы своего отца перед властями центрального правительства. Это снискало ему расположение видных фигур Великого республиканского альянса, особенно лидеров PIP, таких как возвышающаяся фигура Чэнь Цзюнмина, Чэнь Цию и Ма Юйхана. После смерти его отца многие, особенно внутри Партии народного правительства Тана, увидели в этом возможность выслужиться перед центральным правительством и сплотиться против противников бывшего режима. Полагая, что Тан был убит, они призвали Сяоина взять на себя роль председателя партии как естественного преемника своего отца. Сяоин также получил мощную поддержку не от кого иного, как Чжан Тайяня, который также пообещал поддержать молодого Тана в политической карьере в качестве главы PGP. Триумвират Ху Жоюя, Лун Юня и Цунь Шушэна рассматривал политическую судьбу Сяоина со смесью тщательного изучения и подозрения, но, возможно, с молодым Таном можно найти компромисс, чтобы направить его в правильном направлении."
 YUN.lategame.740.a: "Давайте поработаем с Сяоином, что-нибудь придумаем."
 YUN.lategame.740.b: "Он всегда жил в тени своего отца."

 YUN.lategame.741.t: "Демократическая молодежь"
 YUN.lategame.741.d: "С CDL, фактически находящейся в руках Цунь Шушэна, Партия теперь активно пытается консолидировать власть внутри демократического блока. Члены CDL обеспокоены лояльностью так называемых «демократических» милитаристов, таких как Лун Юнь и Ху Жоюй. Чтобы воспитать энтузиазм и энергию в молодежи.\n\nДемократическая молодежь организована в различные отделения, соответствующие соответствующим городам, причем наиболее известные отделения присутствуют в Сычуани и Юньнани. Отделение в Куньмине, например, известно своими поэтическими обществами, танцевальными обществами, образовательными обществами и женскими обществами. Они также отвечают за спонсирование организаций, таких как Всекитайская ассоциация против гражданской войны, призванная содействовать миру и победить милитаризм по всей стране. Общество работников культуры за демократию (также управляемое Демократической молодежью) также проводит встречи за чаепитием для обсуждения своей работы в Сычуани.\n\nХотя традиционно укомплектованная умеренными и либералами, У Хань, известный левый юньнанец, стал одним из самых громких голосов в молодежной организации. Круг и клика У Ханя в Демократической молодежи известны своими связями с левыми организациями и профсоюзами рабочих. Они активно продвигали единый фронт между этими левыми группами, такими как Новое общество Юньнани. Коммунисты и синдикалисты составляют самых радикальных членов группы, и из-за их явного радикализма им отказано во вступлении в CDL в качестве полноправных членов, но тем не менее они остаются тесно связанными.\n\nПоскольку политическая ситуация по всей стране становится все более неопределенной, Демократическую молодежь, безусловно, можно сформировать для наших целей. Молодежь можно стимулировать, чтобы разжечь энтузиазм и народную поддержку в провинциях, чтобы гарантировать, что они пропагандируют нашу идеологию и идеи. Более того, их можно обучать военным наукам и обращению с оружием в рамках подготовки к нарастающему конфликту. С другой стороны, страсть и пыл этой националистической молодежи можно использовать для разжигания беспорядков и нестабильности по всей стране. Обращаясь к антицентральному правительству, их можно использовать, чтобы убедить других, что наше дело действительно правое и истинная революция придет из Юньнани."
 YUN.lategame.741.a: "Пусть они вдохновляют наш народ своими песнями о славе."
 YUN.lategame.741.b: "Ненависть и насилие — истинные страсти." 

 YUN.lategame.742.t: "История У Ханя"
 YUN.lategame.742.d: "Как и многие другие страстные интеллектуалы, движимые патриотизмом, У Хань начал свою академическую карьеру в Пекинском университете. Там он стал учеником Ху Ши, а затем историком династии Мин, размышляя о взлете и падении последней коренной китайской династии Хань. Он женился на Юань Чжэнь, бывшей синдикалистке и старой подруге Ли Вэньи, и они обсуждали политические и исторические вопросы как муж и жена, а также как коллеги. Следуя тенденции демократических изгнанников, бегущих от насильственного подавления в 1932 году, У Хань переехал в Юньнань, где стал участником и членом Демократической лиги Китая.\n\nВ Юньнани У Хань создал аналитический центр под названием «Юго-Западное общество культурных исследований». Общество тайно встречалось в семейном саду Тан или на лодках, которые они арендовали в Куньмине, где они обсуждали эссе друг перед другом. Первым эссе У было «О коррупции», в котором утверждалось, что оковы семейной системы были коренной причиной коррупции; и «Об ученых», которое было сосредоточено на особой морали лояльности древнего ученого-солдата. Для У патриотизм интеллектуала был жизненно важен для духа и долголетия страны.\n\nБлагодаря своему уникальному академическому опыту на Севере Китая и связям с членами CDL по всей стране, У Хань по сути является мостом между родной CDL Юньнани и CDL по всей стране. Будучи членом Центрального комитета CDL, престижный академический опыт У Ханя и его энтузиазм помогли привлечь в лигу единомышленников. Под руководством Ло Лунцзи CDL традиционно держалась особняком, но некоторые внутри партии, такие как Пань Гуандань и Пань Дакуй, предлагали работать с другими группами по всей стране. Однако они по-прежнему строго против вступления социалистических и левых групп в CDL. У, однако, утверждал, что вступление левых групп укрепит коллективный единый фронт между демократическими фракциями страны и поможет проложить путь эгалитарной демократии. Учитывая его огромное влияние во всей партии, ясно, что У может сыграть роль в переориентации политического направления CDL."
 YUN.lategame.742.a: "Партия должна сосредоточиться на внутренних делах."
 YUN.lategame.742.b: "Расширить наш охват на других, но не на красных."
 YUN.lategame.742.c: "Единый фронт обеспечит истинную демократию."

#UPC Satellite Other Events (760-789):
 YUN.lategame.760.t: "Зов нации"
 YUN.lategame.760.d: "Неотъемлемой частью мифологии Синьхайской революции была мужественная позиция Юньнани против Юань Шикая в 1915 году. Изначально поддержав президента Юаня во имя стабильности, когда тот отвернулся от Республики и попытался возвести себя на трон как император, Цай Э и Тан Цзияо собрали юго-западных лидеров и первыми провозгласили независимость от новой Империи. Это спровоцировало Войну в защиту нации и привело к падению монархической схемы Юаня.\n\nВ последние дни Юньнань встала на сторону [UPC.GetLeader] во имя движения федералистов. Наши солдаты сражались бок о бок, пока мы работали над освобождением нации. Но, увы, как и Юань, президент обратился к мелкому авторитаризму, кумовству и чрезмерному региональному фаворитизму. Как можно проводить честные выборы в таких обстоятельствах? Поэтому [ROOT.GetLeader] восстал и призвал все другие провинции сделать то же самое.\n\nЭто, конечно, огромный риск. Хотя восстание провинции, долгое время связанной с движением федералистов, потрясло [UPC.Capital.GetCapitalVictoryPointName], до сих пор не было значительных внутренних дезертирств. Пока баланс сил не сместится, на данный момент мы просто еще одна мятежная провинция. История оправдает нас только в том случае, если мы добьемся победы на поле боя."
 YUN.lategame.760.a: "Одна последняя война за национальную защиту..."

 YUN.lategame.761.t: "Куньмин на передовой"
 YUN.lategame.761.d: "Старое Гуанчжоуское федералистское правительство мертво, последнее южное правительство, рухнувшее из-за внешних угроз и внутренней напряженности. Но федерализм в Китае уже несколько раз поднимался и падал раньше, и на этот раз все будет так же. Если уж на то пошло, выносливость нашего движения является лишь еще одним доказательством его важной роли в решении дилеммы, терзающей Китай десятилетиями: как столь разделенная нация может снова воссоединиться?\n\nИз пепла [ROOT.GetLeader] сплотил остатки федералистов, чтобы сформировать новое правительство и предпринять еще одну попытку получить контроль над Китаем. Может быть, на этот раз наша нация наконец реализует федералистскую демократию, которой ей было суждено стать."
 YUN.lategame.761.a: "Они потерпели неудачу, мы — нет."

##Section 4e (800-999): Late Game NPA Political Events

#NPA Sino-Japanese War Event Chain (800-829):
 YUN.lategame.800.t: "Вторая японо-китайская война"
 YUN.lategame.800.d: "Вторая японо-китайская война разразилась, столкнув Японию и ее китайских союзников с теми, кто стремится противостоять японскому господству. По всей стране всплеск националистических настроений, поскольку обычно апатичные люди начинают требовать, чтобы их ссорящиеся лидеры отложили свои мелкие разногласия и внесли свой вклад в борьбу между цивилизациями. Регионализм, по крайней мере в его прежней форме, стал табу, и ожидается, что все провинции присоединятся к войне на той или иной стороне.\n\nЛун Юнь поклялся направить войска в конфликт, но он также оказался в затруднительном положении. В любом случае его положение под угрозой — если он отправит войска на передовую, это означает меньше войск внутри провинции, помогающих защищать его правление. Если он не отправит обещанные войска, то его заклеймят как нелояльного и трусливого милитариста. При таких высоких эмоциях народный гнев — это не та угроза, которую можно игнорировать.\n\nЧтобы превентивно рассеять критику, губернатор Лун приказал провести провинциальную конференцию между законодателями, военными офицерами и членами бюрократии. Для Ху Жоюя это лучший шанс — все знают, что он воспользуется этим моментом для удара. Обращаясь к своим офицерам, он подчеркнул важность мысли, морали и веры в патриотические принципы, изображая себя патриотическим героем в неопределенные времена:\n\nДух нации оставляет глубокий след в уме солдата. И когда армия с принципами встречается с армией без принципов, армия с принципами побеждает. Когда армия, практикующая принципы, соответствующие национальным условиям, встречается с армией, не соответствующей им, побеждает та, что соответствует национальным условиям."
 YUN.lategame.800.a: "Заговорщики готовятся к прыжку."
 YUN.lategame.800.tt: "§YШансы [YUN.overlord.GetNameDefCap] поддержать переворот зависят от популярности наших партий.§!"

 YUN.lategame.801.t: "Политическая конференция [GetYear] года"
 YUN.lategame.801.d: "Пока Лун собирает более сотни членов ассамблеи, сенаторов, магистратов, военных офицеров и гражданских лидеров в [YUN.Capital.GetCapitalVictoryPointName] для импровизированной конференции по японо-китайской войне, присутствующие знают, что обсуждения на самом деле касаются защиты его собственной власти. И все же многие были застигнуты врасплох степенью, в которой губернатор Лун предложил реорганизовать армию накануне войны.\n\nСмелое предложение Луна состоит в том, чтобы упразднить дивизии и заменить их более мелкими, более легко управляемыми бригадами. В дополнение к нацеливанию на Ху Жоюя, это смело бы власть старших генералов, таких как Лу Хань, заменив их офицерами молодой гвардии, которых Лун лично продвигал и которые, таким образом, чувствуют чувство долга перед ним. В случае успешной реализации этот план ознаменовал бы окончательное разрушение военной системы Тан Цзияо, которая разделяла власть между комиссарами обороны, вероятно, навсегда поставив провинцию под власть Луна и его бюрократов.\n\nПредложение разозлило многих в высшем командовании армии, включая его главных лейтенантов, таких как Лу Хань, Чжу Сюй, Чжан Чун и Чжан Фэнчунь. Военные по-прежнему считают, что могут предлагать и диктовать политику по своему усмотрению, но власть уже некоторое время смещается в сторону Луна, который контролирует гражданскую администрацию провинции и сохраняет значительную поддержку общественности и джентри.\n\nХу Жоюй и Лу Хань решили разоблачить его блеф, устроив мятеж в столице. Они стремились легитимизировать свой путч, осудив Луна за защиту многих опальных бывших лоялистов Тан Цзияо, заговор с посторонними против нации и множество других обвинений. Лун, застигнутый врасплох предательством Лу Ханя, покинул Куньмин под предлогом возвращения в Чжаотун, чтобы подмести могилу своей семьи, но на самом деле он бросает им вызов свергнуть его, как они сделали это с Таном. Поскольку народная поддержка колеблется, заговорщики отчаянно ищут сотрудничества с джентри, бюрократией и законодательным органом, пока их переворот не рухнул."
 YUN.lategame.801.a: "Армия склоняет или запугивает гражданских лидеров для подчинения."
 YUN.lategame.801.b: "Переворот разваливается, так как администрация смыкает ряды вокруг Луна."

 YUN.lategame.802.t: "Лун Юнь свергнут в результате переворота"
 YUN.lategame.802.d: "Юньнань, спрятанная на гористом юго-западе Китая, известна как довольно изолированная, замкнутая провинция, но недавние события в Куньмине широко освещались внешними СМИ. Губернатор Лун Юнь, бывший генерал, попытался централизовать власть, что привело к поспешной попытке переворота со стороны его подчиненных.\n\nЛун покинул столицу, ожидая, что правительство будет неспособно управлять без него. Но он, очевидно, потерял доверие джентри и своих генералов, которые обвинили его в «использовании людей на государственной службе ненадлежащим образом» и «неиспользовании тех, кто имеет заслуги» в его «черной диктатуре, которая шла вразрез с интересами народа»."
 YUN.lategame.802.a: "Интересно, как долго продержится этот новый режим..."

 YUN.lategame.803.t: "Лун Юнь чистит своих генералов"
 YUN.lategame.803.d: "Юньнань, спрятанная на гористом юго-западе Китая, известна как довольно изолированная, замкнутая провинция, но недавние события в Куньмине широко освещались внешними СМИ. Губернатор Лун Юнь, бывший генерал, попытался централизовать власть, что привело к поспешной попытке переворота со стороны его подчиненных.\n\nОднако переворот быстро провалился, поскольку гражданская администрация сомкнула ряды. Вскоре после этого Лун провел чистку среди своих офицеров, осудив своего главного соперника Ху Жоюя как человека с «низким характером, склонного к беспорядкам, который сформировал в нем узурпаторскую и жадную натуру». Он также обвинил его в том, что он мыслит как феодальный, аннексирующий диктатор-милитарист и тайно вступает в незаконные контакты с врагами Китая."
 YUN.lategame.803.a: "Дракон восстает на Юго-Западе."

 YUN.lategame.810.t: "Заговорщики Юньнани ищут нашей поддержки"
 YUN.lategame.810.d: "Дела юго-запада редко представляли значительный интерес для нашего правительства, помимо их подчинения нашему правлению, из-за его удаленного расположения и своевольных лидеров. Но, очевидно, наш вклад важен для них, учитывая прибытие конкурирующих послов от соперничающих милитаристов Юньнани. Это, возможно, не является огромным шоком, учитывая постоянную смену переворотов и борьбы за власть в регионе после смерти Цай Э, но, как показала Война в защиту нации, даже бедная и далекая провинция, такая как Юньнань, может вызвать общенациональное бедствие.\n\nИз того, что мы собрали, две враждующие стороны — это губернатор Лун Юнь и его соперник генерал Ху Жоюй. Лун Юнь послал своего зятя Ли Пэйтяня защищать свое правление, утверждая, что Лун пытается подготовить свои армии, чтобы помочь нам в предстоящей войне с Японией, и что сохранение статус-кво имеет важное значение для поддержания мира на наших линиях фронта. Он попросил, чтобы [ROOT.GetLeader] подтвердил свое признание Луна губернатором и приказал генералам Юньнани принять его запланированное перераспределение армейских командований.\n\nХу заручился помощью Чжоу Чжунъюэ, недовольного старейшины-государственного деятеля Юньнани, которого Лун оттеснил на второй план. Чжоу утверждает, что Лун — непатриотичный милитарист, больше озабоченный защитой собственной власти, чем служением нации в нашей войне с Японией. Он принес телеграммы от различных местных деятелей, критикующих Луна за отсутствие приверженности национальному делу, блокирование важных реформ в провинциях и даже принятие социализма и «опробование его подстрекательских трюков».\n\nВ конечном счете мы подстрахуемся и избежим поддержки любого из них, пока они не победят. Однако, скажем мы что-то или нет, наше мнение будет иметь вес в Куньмине."
 YUN.lategame.810.a: "Мы намекнем на необходимость патриотических перемен."
 YUN.lategame.810.b: "Мы сделаем общие заявления о военной лояльности во время войны."

 YUN.lategame.811.t: "Центральное правительство поддерживает Ху"
 YUN.lategame.811.d: "Поскольку наша провинция балансирует на грани очередной гражданской войны, обе стороны искали поддержки [FROM.GetLeader] друг против друга. Лун Юнь послал своего зятя Ли Пэйтяня отстаивать свое дело, в то время как Ху Жоюй нанял недовольного старейшину-государственного деятеля Чжоу Чжунъюэ, чтобы настаивать на смене руководства.\n\nЦентральное правительство, как правило, не интересуется делами юго-запада, поэтому тщательно подбирало слова — страхуя свои ставки независимо от победителя. Но их решение подчеркнуть необходимость патриотизма в это время национального конфликта и даже намекнуть на возможность перемен было ложно истолковано по всей провинции как одобрение переворота. Хотя Лун пытался преуменьшить значение сообщения, ущерб был нанесен."
 YUN.lategame.811.a: "Ху Жоюй получил значительное преимущество."

 YUN.lategame.812.t: "Центральное правительство поддерживает Луна"
 YUN.lategame.812.d: "Поскольку наша провинция балансирует на грани очередной гражданской войны, обе стороны искали поддержки [FROM.GetLeader] друг против друга. Лун Юнь послал своего зятя Ли Пэйтяня отстаивать свое дело, в то время как Ху Жоюй нанял недовольного старейшину-государственного деятеля Чжоу Чжунъюэ, чтобы настаивать на смене руководства.\n\nЦентральное правительство, как правило, не интересуется делами юго-запада, поэтому тщательно подбирало слова — страхуя свои ставки независимо от победителя. Но их решение подчеркнуть необходимость военной лояльности в это время национального конфликта и их назначение Луна номинальным командующим армиями Юго-Запада имеет далеко идущие последствия, поскольку многие истолковывают это как указание на предпочтение [FROM.Capital.GetCapitalVictoryPointName]. Ху Жоюй попытается продолжить, несмотря ни на что, но его шансы тают с каждым днем."
 YUN.lategame.812.a: "Иногда несколько слов могут значить многое."

#NPA Shared Content (830-859):
 YUN.lategame.830.t: "Восстание в Юньнани!"
 YUN.lategame.830.d: "«Подчинение» Юньнани внешним силам всегда было номинальным делом, так как провинция была слишком изолированной и упрямой, чтобы ею действительно управляли чужаки. Хотя Клика Юньнань склонна к распрям, они традиционно могли объединяться против внешних угроз, даже если время от времени ищут помощи извне в своих конфликтах. Похоже, однако, что их потенциальные хозяева попытались надавить слишком сильно, спровоцировав [YUN.GetLeader] официально отказаться от какой-либо верности им.\n\nЭто далеко не первый раз, когда Юньнань восстает, даже вопреки всему. Цай Э и Тан Цзияо, конечно, возглавляли Войну в защиту нации против Империи Юань Шикая не более поколения назад, и гордые военные Юньнани доказали, что более чем способны сражаться на равных с любыми другими в Китае. Но многое изменилось за последние несколько десятилетий, и многие опасаются, что это восстание может в конечном итоге привести к концу ценной независимости Юньнани. Однако, если это так, ясно, что Юньнань не сдастся без боя."
 YUN.lategame.830.a: "Мы маршируем вперед, как наши братья до нас!"

 YUN.lategame.840.t: "Юньнань восстает снова"
 YUN.lategame.840.d: "Несмотря на все трудности, Клика Юньнань успешно отбросила своих противников — расширив свою территорию далеко за пределы юго-запада. Это придало [YUN.GetLeader] уверенности и легитимности для того, что когда-то считалось немыслимым — провозгласить новый Альянс защиты нации в Гуанчжоу. Для фракции, которую когда-то отвергали как убежденных изоляционистов и неудачливых экспансионистов, возвращение Юньнани к славным дням 1910-х годов замечательно.\n\nОтсюда правительству Национальной защиты еще предстоит пройти долгий путь, чтобы воссоединить Китай под своим знаменем. Принятие названия «Альянс защиты нации» указывает на его желание освободить остальной Китай, хотя делать это так поздно дает некоторые уникальные преимущества и проблемы, поскольку большинство их соперников уже предприняли попытку захватить контроль. Те, кто выжил так долго, вероятно, истощены, но также и консолидированы. Если они завершат свой квест, большинство ожидает, что [ROOT.GetLeader], как ожидается, будет править автократически, как это делал Цай Э, приведя землю к националистической, беспартийной и республиканской диктатуре."
 YUN.lategame.840.a: "На этот раз они нас не остановят!"

 YUN.lategame.841.t: "Реформы Альянса защиты нации"
 YUN.lategame.841.d: "Подобно Цай Э до них, это последнее поколение Клики Юньнань объявило о новом Альянсе защиты нации, чтобы бороться за лидерство в Китае. Это серьезный поворот от их предыдущей политики убежденного изоляционизма, вызванный множественными неудачными экспедициями. Похоже, что они использовали это время, чтобы нарастить силы для еще одной попытки освобождения Китая.\n\nКак и его предшественники, [YUN.GetLeader] сплотил военных и интеллектуалов под своим свободным знаменем, надеясь опереться на военную мощь Юньнани и южный популизм, чтобы свергнуть существующий порядок и устранить оставшихся претендентов в Китае. В случае успеха он клянется привести нацию к автократической, националистической, беспартийной и республиканской диктатуре."
 YUN.lategame.841.a: "Мы сделали это однажды, и мы сделаем это снова!"
 YUN.lategame.841.b: "Разве они еще не усвоили урок?"

#NPA Long Yun Followup Events (860-889):
 YUN.lategame.860.t: "Амбиции Лун Юня"
 YUN.lategame.860.d: "Лун Юнь теперь является фактически неоспоримым лидером Юньнани, расправившись со своими соперниками и взяв под свой контроль армию, администрацию и экономику. Его семья и близкие друзья теперь занимают влиятельные посты в правительстве, законодательный орган, в котором доминируют джентри, подчиняется его прихотям, и нет никого, кто мог бы поставить под сомнение его волю. Кроме одного человека.\n\nЛун Юнь, возможно, начал свою жизнь как военный командир, но он проявил себя чрезвычайно проницательным и гибким в своих политических пристрастиях. Но это вряд ли означает, что он необразован или не осведомлен о мировых политических событиях, лично столкнувшись и взаимодействуя с круговоротом идеологий, которые приходили и уходили в Куньмине — монархия Цин, республиканизм Синьхая, революционный национализм Гоминьдана, стратократический милитаризм Цай Э, консервативный федерализм Тан Цзияо и многие другие.\n\nТо, как он правит сейчас, когда на его пути нет никого, кроме него самого, определит его долгосрочное наследие. Он мог бы быть похожим на Цай Э, отчужденного военного сильного человека, который мудро выбирает министров без необходимости консультироваться с законодательным органом и иметь дело с партийными препирательствами. Или он может взять пример с Тана и его попыток ухаживать за местными демократами, никогда не отпуская их слишком далеко с поводка. Хотя его отношения с наставниками были сложными, в любом случае это будет рассматриваться как естественный переход от их правления."
 YUN.lategame.860.a: "Лун Юнь — мудрый и традиционный китайский правитель, который выше всего этого."
 YUN.lategame.860.b: "Лун Юнь — современный лидер и поборник прогресса!"

 YUN.lategame.861.t: "Прошлое и будущее"
 YUN.lategame.861.d: "Когда Лун Юнь впервые усмирил своих генералов несколько лет назад, он изобразил это как мудрый наставник, успокаивающий своих безрассудных подчиненных. Не желая становиться марионеткой, как Тан Цзияо, и, вероятно, погибнуть вскоре после этого, Лун покинул Куньмин, чтобы навестить могилы своей семьи, пока отчаявшиеся повстанцы (не найдя поддержки среди законодательного органа, бюрократии, джентри или низших чинов) не были вынуждены умолять его вернуться.\n\nЭто казалось справедливым компромиссом — Лу Хань и другие его давние командиры дивизий утверждали, что они верно служили Лун Юню годами, но были оттеснены ненадежными бюрократами Тан Цзияо, и попросили Луна удалить список лиц с плохой репутацией из правительства. В обмен они приняли бы продолжение руководства Луна и его военные реформы. Генералы отправились на встречу с Луном на самолете, в то время как Лун прибыл на шикарном автомобиле, и после затянувшейся и переигранной сцены Лун согласился вернуться домой и вернулся к теплому приему в столице.\n\nОднако вскоре Лун отомстил. После того как Лун отправил свои войска арестовать Ху Жоюя и клику Мэнцзы, он начал рассылать телеграммы любопытным аутсайдерам, отмахиваясь от недавнего кризиса как от действий некоторых мятежных генералов, которые «не очень хорошо разбираются в политике и небрежно делают заявления». В течение нескольких недель Лу Хань был уволен со всех военных постов и назначен на бессильную должность в правительстве, а два других командира дивизий Чжан Минчунь и Чжу Сюй были арестованы. Только самому молодому из четырех, Чжан Чуну, было разрешено быть пониженным до командования бригадой. Лун Юнь сломил власть старой военной верхушки.\n\nС обеспечением его власти и недавними политическими событиями в Китае пошли разговоры о восстановлении некоторых из этих людей на руководящих должностях в командном штабе. Но это может поставить под угрозу хрупкую систему, которую построил Лун, и ограничить его способность проводить односторонние действия за пределами провинции."
 YUN.lategame.861.a: "Лун никогда не должен позволить чужакам снова разделить Юньнань..."
 YUN.lategame.861.b: "У Луна должны быть компетентные люди, на которых он может положиться."

 YUN.lategame.862.t: "Лун Юнь и искусство"
 YUN.lategame.862.d: "Первая жена Лун Юня, Ли Пэйлянь, долгое время была влиятельной фигурой в культурной сфере Юньнани. Получив образование на Западе, Ли Пэйлянь лично заинтересовалась обновлением театральных и кинематографических секций Куньмина, финансируя другие художественные выставки в прошлом. Ее безвременная кончина в 1932 году стала источником душевной боли для губернатора, который вскоре после этого женился на Гу Инцю, иначе известной как «Красавица Юньнани № 1».\n\nОн продолжил художественные наклонности своей первой жены, основав кинотеатр Наньпин (Южный Мир), а также создав Юньнаньскую оперу. Лу Чунжэню было поручено служить главой Агентства по улучшению драмы для поощрения художественного и культурного развития в провинции. Агентству также было поручено ставить патриотические и националистические пьесы, чтобы помочь улучшить моральный дух граждан и укрепить поддержку и легитимность правления губернатора. Губернатор, например, жаждал ускорить премьеру «Драмы Юньнани». Это патриотическая пьеса, призванная представить Юньнань как республиканский авангард Китая, изображая события, связанные с Юньнанью в Войне в защиту нации. Хотя многие критики заявляли, что пьеса имеет очень явный анти-чжилийский подтекст и что она, по-видимому, имеет мало ценности, кроме попытки поднять моральный дух солдат и граждан Юньнани, нельзя отрицать, что многим, кто видел ее в театре, пьеса понравилась."
 YUN.lategame.862.a: "Показывая более мягкую сторону Юньнани."

 YUN.lategame.863.t: "Бамбуковый король"
 YUN.lategame.863.d: "Давным-давно, до Троецарствия, существовала Великая Хань, чья могучая династическая экспансия подтолкнула династию к расширению в современный Южный Китай. Там они столкнулись с Елан, союзом сельскохозяйственных племен.\n\nУ Елан есть легенда о их первом легендарном вожде — Бамбуковом короле. Согласно этой легенде, женщина стирала шелк в ручье, когда три больших бамбука проплыли между ее ногами. Когда она разрезала бамбук, она нашла плачущего ребенка, которого взяла и воспитала как своего собственного. Мальчик вырос и преуспел в мудрости, таланте и боевых искусствах. Он стал лидером среди своего народа, ведя людей И и Пу к славе, и именовал себя Маркизом Елан. Он также взял китайское слово для бамбука, «чжу», в качестве своей фамилии, став Бамбуковым королем.\n\nИстории раннего ханьского Китая перепутаны как с фактами, так и с вымыслом. Согласно истории Поздней династии Хань, маркиз сдался Хань и получил печать и ленту как символ своего вассалитета. Тем не менее по всей Юньнани, особенно среди общин И, бамбук высоко почитается как символ их легендарного лидера. Святилища бамбукового короля можно найти по всему уезду Елан. Меньшинства юго-запада, такие как И, наделяют бамбук богатыми культурными коннотациями и формируют сильное чувство поклонения бамбуку. И для этих этнических меньшинств повествование о Бамбуковом короле, кажется, отражает их собственную борьбу против великих феодальных правителей Хань."
 YUN.lategame.863.a: "Увлекательная легенда."

#NPA Hu Ruoyu Followup Events (890-919):
 YUN.lategame.890.t: "Ху и Лу сходятся в схватке"
 YUN.lategame.890.d: "Столкнувшись с вызовом Ху Жоюя с одной стороны и предательством Лу Ханя с другой, Лун Юнь покинул Куньмин и отправился в Чжаотун, сделав ставку на то, что ни у одного из этих людей не хватит легитимности, чтобы реально управлять Юньнанью без него, и они не смогут доверять друг другу настолько, чтобы свергнуть его. Очевидно, он ошибался насчет их готовности сместить его, но он не ошибся в том, что эти двое несовместимы.\n\nПока двое мужчин делят трофеи своих побед, конфликт между двумя фракциями обострился. Лу Хань, оппортунист, попытался оседлать волну борьбы с истеблишментом, заигрывая с различными демократами и даже социалистами. В то же время он попытался вобрать в свои ряды членов старой фракции Лун Юня, несмотря на их недавнюю ссору, пытаясь создать собственную гражданскую сеть.\n\nХу Жоюй решил поступить наоборот, надеясь собрать реакционный блок, обхаживая различные провинциальные элиты. Хотя многие присоединились к ним, другие явно предпочитали Луна и с подозрением относятся к Ху, что заставляет его стремиться к контролю над основными институтами, такими как провинциальное собрание, торговая палата и армия.\n\nНынешний вакуум власти вряд ли продлится долго, и рано или поздно один из них вырвется вперед."
 YUN.lategame.890.a: "Лу Хань способен привлечь как друзей, так и врагов режима Луна."
 YUN.lategame.890.b: "Ху Жоюй способен склонить на свою сторону влиятельных лиц и институты."

 YUN.lategame.891.t: "Сохраняя Юньнань свободной"
 YUN.lategame.891.d: "Хотя у различных фракций Юньнани есть свои разногласия, они едины в своем желании не допустить иностранных захватчиков в провинцию. Однако Ху Жоюй и Лу Хань выбрали радикально разные подходы к этой цели, поскольку оба готовятся к возможности того, что враждебное центральное правительство предпримет шаги у границ Юньнани.\n\nХу Жоюй в целом рассчитывает на укрепление стабильности Юньнани и переориентацию провинции на себя. Его цель — подготовить Юньнань к возможному вторжению, гарантируя, что он сможет лично мобилизовать ресурсы для ее защиты как протектор Юньнани. В то же время он будет использовать это личное лидерство для переговоров с внешними силами на равных, гарантируя тем самым, что, если Юньнань присоединится к правительству, она сделает это как добровольный субъект, а не как покоренный народ.\n\nЛу Хань также обеспокоен способностью Юньнани защитить себя, но, поскольку его войска уже печально известны слабой дисциплиной и мародерством, он стремится реабилитировать некоторых ведущих старших офицеров Юньнани в надежде восстановить порядок в армии. Таким образом, единство будет достигнуто через компромисс (и, без сомнения, он надеется быть в центре этой паутины), и Лу зашел так далеко, что рассматривает возможность найма тех же бывших лоялистов Тана, которых он когда-то осуждал, таких как Сунь Ду и Си Цзыцян.\n\nПо мере того как заседает провинциальный совет, они в конечном итоге должны определиться со стратегией."
 YUN.lategame.891.a: "Ху Жоюй получает чрезвычайные полномочия, необходимые для мобилизации провинции."
 YUN.lategame.891.b: "Лу Хань может вернуть нескольких изгнанных или отстраненных фигур."

 YUN.lategame.892.t: "Мухаммад Ма Цзянь"
 YUN.lategame.892.d: "«Мухаммад» Ма Цзянь — этнический хуэй, родившийся в деревне Шадянь, уезд Гэцзю, Юньнань. Когда Ма было шесть лет, его отправили в столицу провинции Куньмин, где он получал начальное и среднее образование до 19 лет. После окончания учебы Ма вернулся в свой родной город Шадянь, чтобы два года преподавать в китайско-арабской начальной школе, где он учился у Ху Суншаня в Нинся. Ма быстро возненавидел преподавание и отправился в Шанхай, чтобы продолжить учебу, и проникся левыми симпатиями, особенно из-за того, что попал в более плодотворную социалистическую среду города.\n\nВернувшись в Юньнань, он стал видной и влиятельной фигурой в мусульманской общине Юньнани. Он попросил региональное правительство помочь финансировать и продвигать китайско-арабские школы по всей сельской местности, что было встречено молчаливым одобрением со стороны [ROOT.GetLeader]. В этой роли местного лидера он также добился определенного национального признания за свою роль в составлении первого арабско-китайского словаря и более точного перевода Корана. Поскольку Коран долгое время страдал от несоответствий и неточностей из-за проблем с переводом между арабским и китайским языками, его словарь служит полезным справочником, помогающим китайским мусульманам понять истинные слова верующих.\n\nЧтобы укрепить поддержку и легитимность [ROOT.GetLeader], а также способствовать культурному обмену, Ма Цзянь получил финансирование для хаджа в Каир и Мекку. Он заявил, что это паломничество поможет поощрить культурный обмен между китайскими и арабскими мусульманами, а также укрепить легитимность и поддержку нынешнего правительства среди хуэй."
 YUN.lategame.892.a: "Демонстрируя более мягкую сторону Юньнани."

 YUN.lategame.893.t: "Окаменелости динозавров обнаружены в Юньнани"
 YUN.lategame.893.d: "Удивительные новости пришли с одной из наших дорожных строек в районе Куньмина. По-видимому, когда убирали грунт для строительства дороги, рабочие обнаружили окаменелые останки вымершего животного. Поскольку некоторые местные зеваки полагали, что это кости дракона или, возможно, цилиня, геолог Бянь Мэйнянь был быстро вызван на место. После проведения некоторого анализа он обнаружил окаменелые останки животного, теперь получившего название «IVPP V15».\n\nГруппа под руководством палеонтолога и зоолога Ян Чжунцзяня (также известного как Си Си Янг) прибыла для изучения останков IVPP V15. Хотя это лишь частичный скелет, многие сравнивают его зауроподоподобный внешний вид с открытием брахиозавра, массивного зауропода позднего юрского периода, обнаруженного в 1903 году в Колорадо. Однако ранние измерения Бянь Мэйняня показывают, что кости, скорее всего, относятся к позднему триасу, что вызывает еще больший энтузиазм у экспертов в этой области, поскольку считается, что большинство зауроподов не эволюционировали до ранних стадий юрского периода. Тем не менее, многие настроены скептически и указывают, что окружающая геология может подразумевать несколько более позднюю дату, более соответствующую предыдущим находкам. Еще один момент, который вызвал интерес к окаменелостям, — это тот факт, что скелет, похоже, не принадлежит ни к одному из известных видов зауроподов, классифицированных в Китае, и многие с нетерпением ждут, чтобы узнать, принадлежит ли этот новый скелет к еще не открытому роду.\n\nВ конце концов, Ян Чжунцзянь окончательно заключил, что IVPP V15 принадлежит к новому виду динозавров, который не был найден ранее, и назвал его Луфэнгозавр Хуэне (Lufengosaurus huenei), причем первое имя относится к геологической формации, где была найдена окаменелость, а второе — как дань уважения его наставнику Фридриху фон Хюне. Родственный вид, названный Юньнаньгозавром, также был обнаружен Яном, который быстро завоевал прозвище «Отец китайской палеонтологии позвоночных»."
 YUN.lategame.893.a: "Не будем жалеть средств."

###- Phase V Events -###

## Whampoa Shared (000-039) ##

 YUN.endgame.000.t: "Генералиссимус и его сломленная нация"
 YUN.endgame.000.d: "Возможно, история действительно непредсказуема. Ибо не доктор Сунь Ятсен привел Гоминьдан к победе, и не генералиссимус Чан Кайши. Не Ван Цзинвэй, не Ху Ханьминь и не какой-либо другой революционер из внутреннего круга. Совершенно поразительно, что именно генералиссимус Хэ Инцинь привел Гоминьдан к победе. Именно Хэ наконец воплотил мечту стольких революционеров до него. Ибо именно Хэ воссоединил Китай под единым революционным республиканским знаменем, и именно Хэ будет решать его будущее на многие поколения вперед.\n\nКонечно, битва еще не окончена, на пути Национальной революции много испытаний. Пока нация объединена против внешних угроз и независимых милитаристов, Партия представляет собой полную противоположность. Без единой силы, способной удержать разрозненные фракции внутри Гоминьдана вместе, само единство партии начало трещать по швам. Иностранные кредиторы, со своей стороны, поспешили назад, чтобы потребовать свои долги, в то время как правительство по-прежнему имеет множество собственных финансовых обязательств перед отечественными пенсионерами и государственными служащими.\n\nСтолкнувшись со столькими препятствиями, Партия должна одновременно решать две, казалось бы, противоречивые задачи — проводить демилитаризацию для спасения наших финансов и централизовать власть, чтобы максимально эффективно использовать наши ресурсы. Возможно, это неприятно, но единственный способ разрешить такую дилемму — заставить милитаристов демилитаризоваться, сохранив при этом Центральную армию. Факт, который, без сомнения, приведет к восстаниям.\n\nВ наших собственных рядах Хэ Инцинь продолжает заниматься своим деликатным балансированием власти, хотя теперь, укрепившись своим бесспорным лидерством, он получил право направлять нацию в любом направлении, в каком пожелает. Дай Цзитао, со своей стороны, как ожидается, объявит о своей отставке в ближайшем будущем, и выбор генералом Хэ премьер-министра, вероятно, будет иметь отголоски для будущих поколений."
 YUN.endgame.000.a: "Пришло время выполнить наши революционные обещания!"
 YUN.endgame.000.b: "Пришло время двигаться к стабильности!"

 YUN.endgame.001.t: "Генералиссимус и его разбитое наследие"
 YUN.endgame.001.d: "Возможно, история действительно непредсказуема. Ибо не доктор Сунь Ятсен привел Гоминьдан к победе, и не генералиссимус Чан Кайши. Не Ван Цзинвэй, не Ху Ханьминь и не какой-либо другой революционер из внутреннего круга. Совершенно поразительно, что на самом деле сыны Партийной армии привели Гоминьдан к победе. Именно Вампу, каждая ее грань, наконец воплотила мечту стольких других революционеров. Именно Вампу, под эгидой президента Хэ Инциня, премьера Чэнь Чэна и начальника Генерального штаба Тэн Цзе, увидела Китай воссоединенным под единым эволюционным республиканским знаменем. И именно Вампу решит судьбу нации для будущих поколений.\n\n\n\nКонечно, битва еще не окончена, на пути Национальной революции много испытаний. Пока нация объединена против внешних угроз и независимых милитаристов, Партия представляет собой полную противоположность. Без единой силы, способной удержать разрозненные фракции внутри Гоминьдана вместе, само единство партии начало трещать по швам. Иностранные кредиторы, со своей стороны, поспешили назад, чтобы потребовать свои долги, в то время как правительство по-прежнему имеет множество собственных финансовых обязательств перед отечественными пенсионерами и государственными служащими.\n\nСтолкнувшись со столькими препятствиями, Партия должна одновременно решать две, казалось бы, противоречивые задачи — проводить демилитаризацию для спасения наших финансов и централизовать власть, чтобы максимально эффективно использовать наши ресурсы. Возможно, это неприятно, но единственный способ разрешить такую дилемму — заставить милитаристов демилитаризоваться, сохранив при этом Центральную армию. Факт, который, без сомнения, приведет к восстаниям.\n\nОднако, если заглянуть во внутреннюю политику Партии, нет ничего более очевидного, чем тот факт, что дни президента Хэ на посту сочтены. Неверно разыграв свои карты, генерал, как ожидается, объявит о своей тихой и спокойной отставке. Линии фронта уже проводятся между Чэнь Чэном и Тэн Цзе, и многие в Партии с ужасом ожидают нового раунда нестабильности, когда молодая гвардия неизбежно вступит в схватку."
 YUN.endgame.001.a: "Отстаивать права крестьянства!"
 YUN.endgame.001.b: "Стать самым последним спасением Национальной революции!"

 YUN.endgame.002.t: "Шквал гиперинфляции"
 YUN.endgame.002.d: "Учитывая жестокие обстоятельства Партии и историю нации, возможно, было неизбежно, что экономика превратится в злокачественную опухоль современности. Поскольку Националистическому центральному правительству была поставлена задача содержать большую армию, чтобы отгонять гончих Японии, а также обрушивать молот на милитаристов и, что наиболее важно, предоставлять работу побежденным генералам для предотвращения восстаний, армия стала самой большой утечкой из национальной казны. Значительно способствуя ухудшению качества жизни в Китае, это не обязательно новое явление, ибо практически каждое правительство до нас страдало от подобной участи, и даже у нашего собственного правительства были такие приступы.\n\nОднако этот последний виток гиперинфляции превосходит все остальные, поскольку наше объединение нации привело к поглощению как явных, так и скрытых долгов, многие из которых подлежат оплате. Хуже того, мы исчерпали многие возможности для повышения доходов из-за многих лет войны и экономической разрухи, что оставляет нам два ненавистных выбора. Повысить налоги или продолжать печатать деньги. Попытка сдержать инфляцию, предлагая обменять валюту на наши золотые и серебряные резервы, вызвала набег на банки, и углубляющийся кризис привел к серьезным негативным последствиям по всем направлениям.\n\nПо мере того как экономика грациозно рушится, беспорядки растут синхронно. Традиционные экономисты, такие как Кун Сянси, стремились подавить инфляцию, устранив дефицит за счет высоких налогов и сокращения бюджета. Хотя это, скорее всего, наиболее эффективно в долгосрочной перспективе, давние экономические убеждения Гоминьдана о национальном капитализме вызвали серьезные опасения. Чэнь Чэн использовал нерешительность, чтобы продвигать свои собственные популистские меры, включая государственное распределение и нормирование товаров первой необходимости, контроль цен и разрешение бартера для стабилизации валюты. Более радикальные силы предложили массовый дефолт, преодолевая кризис путем использования направляемых правительством рабочих программ."
 YUN.endgame.002.a: "Нам нужно контролировать расходы и ужесточить бюджет!"
 YUN.endgame.002.b: "Повысить налоги на соль и установить государственный контроль над экономикой."
 YUN.endgame.002.c: "Правительство должно нормировать товары в период кризиса."
 YUN.endgame.002.e: "Иностранные пиявки не получат от нас ни цента!"

 YUN.endgame.003.t: "Бесконечная дисфункция"
 YUN.endgame.003.d: "Поскольку большинство внешних угроз Партии были полностью устранены, а также ожидаются сокращения финансирования и правительственных должностей, интенсивность политической борьбы и мании возросла. Молодые протеже карабкаются, чтобы заявить свои права на прибыльные должности по протекции, прежде чем политическая система закостенеет, в то время как политические аутсайдеры жалуются, что, несмотря на то, что они прекрасно квалифицированы для множества доступных рабочих мест, они не могут найти работу из-за отсутствия связей. В том же духе многие окопавшиеся партийные аппаратчики защищают свою монополию на гражданскую службу и другие бюрократические оплоты.\n\nЧестно говоря, такая ситуация стала все более порочной в результате ужасно ухудшающейся экономической ситуации в Китае, поскольку люди ищут работу, которая, как они надеются, защитит их от последствий инфляции. Тем временем многие действующие государственные служащие начали жаловаться на низкую зарплату и эндемическую коррупцию, так как их скудные зарплаты урезаются на взятки для сохранения своих должностей. Ужасающий хор начал вторить настроениям за реформы, чтобы сломать укоренившиеся интересы.\n\nВзирая на высшие уровни в поисках ответов, враждующие политические фракции слишком заняты борьбой друг с другом, чтобы обеспечить политическое направление, в котором нуждается страна. Товарищ начал сражаться с товарищем, независимо от того, из одного они класса Вампу или нет. Ни Центральный исполнительный комитет, ни Центральный наблюдательный комитет не свободны от склочных диалектических дебатов о будущем нации. Хотя разрозненные фракции действительно согласны в одном единственном взгляде: Партия должна реорганизоваться и выработать одно общее послание."
 YUN.endgame.003.a: "Единство в мыслях, духе и действиях — вот что спасет нашу нацию."
 YUN.endgame.003.b: "Вторая реорганизация необходима для искоренения коррупции."
 YUN.endgame.003.c: "Меритократическая реформа нашего правительства имеет важное значение."
 YUN.endgame.003.e: "Мы должны вернуть патриотический дух в наше партийное государство."
 YUN.endgame.003.f: "Партия должна быть очищена от коррумпированных и нежелательных влияний!"

 YUN.endgame.004.t: "Последние угли демократии"
 YUN.endgame.004.d: "Миазмы несчастья не ограничиваются только Партией или Экономикой, ибо болезнь распространилась на все без исключения грани китайского общества. Буржуазия и пролетариат одинаково страдают под гнетом гиперинфляции, члены партии, инсайдеры и аутсайдеры одинаково раздражены масштабной коррупцией. И теперь, в своем кульминационном ударе против правления Гоминьдана, недовольство начало расти среди гражданского населения. Сплочение против военной диктатуры, которая, по их мнению, обещала решить все эти проблемы, убрав бюрократию предыдущих администраций, но в значительной степени не смогла этого сделать.\n\nПодстегиваемый интеллектуальными кругами, хор голосов, требующих перемен, подотчетности правительства и демократизации, возник, чтобы нанести удар по Партии, прежде чем она сможет достичь революции доктора Суня. Хотя это и благородно, можно признать, антипартийное движение было опутано и контролируется оппортунистическими милитаристами, социалистическими повстанцами и другими недовольными режимом Гоминьдана.\n\nНесмотря на то, что в высших комитетах свирепствуют внутренние распри, партия медленно начала умерять свою пламенную риторику, поскольку многие начали понимать, что на самом деле поставлено на карту. Некоторые радикалы, такие как Чэнь Чэн или Тэн Цзе, даже предложили концепции, которые сводятся к временному перемирию на политическом поле битвы. Конечно, как только Партия эффективно применит лекарство от болезней народа, что также будет горячо обсуждаться, столкновения идеологий наверняка вспыхнут вновь."
 YUN.endgame.004.a: "Мы должны прислушаться к призыву народа к реформам и ответственности!"
 YUN.endgame.004.b: "Нам нужно продвигать конституционализм и слышать голоса со стороны."
 YUN.endgame.004.c: "Нам нужно продвигать упорядоченные изменения в соответствии с Саньминьчжуи!"
 YUN.endgame.004.e: "Нам нужно утвердить нашу власть и контролировать наше будущее!"

 YUN.endgame.005.t: "Земельная реформа Синерубашечников"
 YUN.endgame.005.d: "Захват партийного государства Синерубашечниками не удовлетворил общественный спрос на земельную реформу в Китае и не предотвратил внутренние разногласия не только по поводу надлежащей реализации такой программы, но и по поводу фундаментальных причин упадка некогда процветающей китайской экономики.\n\nУченые, такие как Чжоу Фан, винят в упадке села плохое управление правительством, утверждая, что грабительские специальные налоги, непоследовательные и произвольные переоценки и другие внезапные дополнительные налоги значительно подрывают крестьянские инициативы. В то же время такие люди, как Лу Июань, утверждают, что империализм и капитализм позволили зарубежным странам сбрасывать свои товары на китайский рынок и разрушили как местное сельское хозяйство, так и традиционные ремесленные отрасли. Империалистические займы и контрибуции еще больше вынудили китайское правительство облагать население чрезмерными налогами.\n\nЛю Бинли утверждает, что «азиатский способ производства» является фундаментальной причиной упадка сельского хозяйства, вызывая застой и реакционные настроения, которые препятствовали созданию сельскохозяйственных излишков, необходимых для современной индустриализации. Лян Юаньдун аналогичным образом писал, что «милитаристы и гражданская война... являются не причинами, а следствиями упадка деревни. Будучи лишь следствиями, их искоренение потребует фундаментального решения для облегчения положения деревень... в отсутствие фундаментального решения... результатом может быть только повторение и продолжение той же модели, которую мы имели: быстрая смена коррумпированных правительств и бесконечные битвы с милитаристами».\n\nТакие люди, как Чжоу Фан, верят, что первоначальные предложения доктора Суня, такие как «земля — пахарю», ограничение арендной платы и земельные налоги, будут достаточными, чтобы покончить с сельской бедностью. Более радикальные мыслители, такие как Лян и Лю, утверждают, что выравнивание прав на землю важнее равного распределения, которое просто сделает всех бедными и поощрит индивидуальные «эгоистичные» наделы. Вместо этого оба утверждают, что «если сельское хозяйство должно быть спасено, необходимо начать с совершенно новой структуры», причем Лю выступает за коллективное управление, а Лян — за коллективные хозяйства."
 YUN.endgame.005.a: "Первоначального плана «земля — пахарю» достаточно."
 YUN.endgame.005.b: "Должна быть установлена программа тотальной земельной реформы."

 YUN.endgame.006.t: "Земельная реформа в Китае Вампу"
 YUN.endgame.006.d: "Земельная реформа и принцип «Земля — пахарю» являются неотъемлемыми частями программы национальной реконструкции Сунь Ятсена, но ее реализация всегда была спорной темой. Доктор Сунь находился под влиянием идей Генри Джорджа, но, как правило, оставлял детали расплывчатыми. Существуют значительные споры о том, совместима ли программа, задуманная доктором Сунем, с частной собственностью, и как лучше всего приступить к модернизации китайского сельского хозяйства и разрушению крупных и часто отсутствующих поместий дворянства.\n\nБолее консервативные члены партии во главе с Чэнь Лифу представили свой отчет, выступая за создание совместной земельной комиссии при Национальном экономическом совете, Министерстве внутренних дел и Министерстве финансов. Это повлечет за собой систематическое обследование земель в разных провинциях и создание рекомендаций, пересмотр земельных контрактов и налогообложения, чтобы сделать вещи более равными, избегая ненужного радикализма. Правительство, согласно этому плану, будет контролировать продажи риса и ограничивать власть помещиков, предоставляя при этом субсидии на модернизацию сельского хозяйства.\n\nЧэнь Чэн представил свой собственный план для Объединенной комиссии по сельской реконструкции. Вдохновленный его собственными успехами на местах, это умеренная форма популистских реформ Дэн Яньда и других левых. План Чэня будет включать три части: 1. реформа ограничения арендной платы для снижения грабительской ренты; 2. Обязательная продажа земли крупными землевладельцами правительству по справедливым ценам и перераспределение купленной земли арендаторам; 3. Создание надзорных органов, состоящих из честных экспертов, для контроля за программой.\n\nНекоторые воспротивились этому плану, утверждая, что он является лишь плацдармом для безрассудной программы марксистского Временного комитета действий (ВКД) по окончательной национализации земли. ВКД исторически стремился позволить крестьянам владеть землей, которую они обрабатывают, чтобы обеспечить их политические права, отбирая землю у отсутствующих землевладельцев и других дворян, прежде чем в конечном итоге добиваться полной и постепенной национализации земли."
 YUN.endgame.006.a: "Частный сектор... при некотором государственном регулировании решит все сам."
 YUN.endgame.006.b: "Успех придет только благодаря тщательным инвестициям и сотрудничеству с дворянством."
 YUN.endgame.006.c: "Именно через мирные, но устойчивые реформы мы разорвем цикл войны и мира."
 YUN.endgame.006.e: "Поистине, демократии не будет, пока земля и крестьяне не станут свободными!"

 YUN.endgame.007.t: "Земельная реформа Чэнь Чэна"
 YUN.endgame.007.d: "Поскольку в Китае идет земельная реформа, Чэнь Чэн и его союзники обязали всех землевладельцев определенного размера и деятельности продавать свою землю правительству по «справедливой» цене, получая скромную сумму от правительства, а остальное — в акциях государственных корпораций (сформированных из недавно национализированных отраслей). Затем земля продается, с приоритетом для существующих арендаторов, при этом арендаторы соглашаются выплачивать правительству долг равными долями, создавая большее количество независимых фермеров. Генерал Чэнь приказал проводить этот процесс постепенно, мирно, но также решительно и неподкупно — продавцы и покупатели не должны иметь прямого контакта друг с другом.\n\nВторым важным компонентом является ограничение арендной платы в 37,5%. В прошлом арендная плата могла составлять более 50% от ожидаемого урожая, с «железными» пунктами, требующими полной оплаты даже при неурожае. Гоминьдан постановил, что 25% урожая принадлежит пахарю, а оставшиеся 75% должны быть разделены поровну между арендатором и землевладельцем. Договоры аренды должны быть задокументированы чиновниками на бумаге, при этом «железные» пункты запрещены, и контракты не могут быть расторгнуты до шестого года, с обязательным продлением аренды по требованию арендаторов, если только владелец не пожелает лично обрабатывать землю, что уменьшает рычаги влияния земельных акул. Чтобы обеспечить справедливость для землевладельцев, они будут представлены в комитетах по аренде ферм, и правительство будет гарантировать, что арендная плата не будет удержана; контракты также могут быть расторгнуты, если у арендатора есть задолженность более чем за два года аренды.\n\nПоследним шагом является создание единых законов и правил, которыми будет управлять ряд надзорных комитетов во главе с Земельным бюро Департамента гражданских дел. Чэнь пригласил экспертов, ученых, правительственные органы, местных представителей и прессу обсудить правила до их принятия и внимательно следил за надзорными органами на предмет коррупции. Этот план уже оказался широко популярным среди крестьян и признан скрепя сердце справедливым дворянством."
 YUN.endgame.007.a: "Многообещающее начало!"

 YUN.endgame.008.t: "Разрывая цикл войны и мира"
 YUN.endgame.008.d: "Президент Чэнь происходил из сельской семьи, и той, которая знала тяготы и страдания народа. Как «верный ученик доктора Сунь Ятсена», его целью было освободить своих соотечественников не просто от империалистов последних десятилетий, но от фундаментально неравной экономической системы, которая вызвала два тысячелетия гражданских войн, поскольку баланс населения и земли колебался.\n\nСлева и справа посыпалась критика программы Чэня. Правые обвиняли его в стремлении к полной национализации земли, в то время как левые критиковали его нежелание насильственно изымать собственность дворян. Но Чэнь стоял твердо, утверждая, что идея доктора Суня о национализации земли отделена от марксистской национализации, которая пытается экспроприировать всю собственность. Нация — это коллективная сущность, состоящая из индивидов, и не может быть нации без индивидов, поэтому только через их руки нация может владеть землей. Следовательно, теория доктора Суня не исключает частную собственность на землю, но помещает ее в рамки закона.\n\nКакой бы ни была теория, преимущества явно начали реализовываться. Перераспределение земли арендаторам снизило социальную напряженность и побудило этот новый класс йоменов инвестировать в поддержание порядка в своих общинах, а также в повышение производительности. Аналогичным образом, поскольку многие дворяне получили компенсацию акциями государственных предприятий, они кровно заинтересованы в выживании правительства. Получив деньги, многие вообще продали свои фермы и начали новую жизнь в городах, отправляя своих детей в школы и открывая новые предприятия. Для существующих мелких фермеров приток капитала и внимание к сельским районам, конец бандитизма и конфликтов, снижение налогов также улучшили их благосостояние.\n\nВозрождение деревень также ощутилось в городах, поскольку рост производства и экономическое развитие сельских районов питают промышленное и коммерческое процветание. Китайский капитал, когда-то сильно привязанный к земле, начал переход к промышленным предприятиям."
 YUN.endgame.008.a: "Когда народ процветает, процветает и партия."

 YUN.endgame.009.t: "Отставка Хэ Инциня"
 YUN.endgame.009.d: "Поскольку эпоха великих войн за освобождение Китая фактически закончилась, а генерал Хэ Инцинь был в значительной степени оттеснен в политическое небытие, его роль в военно-стратегическом планировании свелась к номинальной роли старшего советника президента. Имея мало дел, кроме как получать зарплату и вспоминать старые военные истории, бывший генералиссимус нашел способы убить время вне света рампы.\n\nПоклонник спорта, садоводства и бриджа, а также покровитель различных беспартийных клубов и ассоциаций, пожалуй, его самым важным проектом теперь, когда он находится в изгнании из политики, является гольф-клуб [RKT.Capital.GetCapitalVictoryPointName]. Получив спонсорскую поддержку от мэра, высших военных офицеров и других заядлых гольфистов в администрации, они получили разрешение на покупку государственной земли, ранее использовавшейся армией, для строительства 9-луночного поля для гольфа.\n\nУже строятся планы по дальнейшему расширению того, что стало чрезвычайно элегантным парком, причем гольф-клуб продвигает этот вид спорта по всей стране. Реагируя на критику элитарности и исключительности, они расширили публичный доступ, включая создание «Дней гольфа» в течение года.\n\nХэ Инцинь может находиться под постоянным наблюдением правительства, оказавшись в неловком положении опозоренного, но все еще потенциально опасного бывшего главы государства, но он явно извлекает из этого максимум пользы!"
 YUN.endgame.009.a: "Хорошее хобби."
 YUN.endgame.009.b: "Я попробую сыграть!"

#Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 YUN.endgame.010.t: "Националистическое правительство колеблется"
 YUN.endgame.010.d.base: "Китайская нация воссоединилась под властью Националистического правительства, но если они надеются, что один лишь китайский национализм сможет удержать их новое государство вместе, они ошибаются. С изгнанием иностранных держав и уничтожением конкурирующих правительств осталось мало внешних сил, скрепляющих движение. Между тем ожидания, возлагаемые на это новое правительство — со стороны народа, губернаторов и иностранных кредиторов, — начали опережать способность центрального правительства удовлетворять их.\n\nПервым серьезным признаком напряжения является экономическое свободное падение, которое произошло после объединения. Годы дефицитного расходования, высокие военные расходы, эндемическая коррупция и неэффективность, разрушение экономических предприятий и продолжающееся сопротивление налогообложению привели к росту долга. Захват власти революционным Гоминьданом заставил многих продуктивных элитариев и технократов бежать, в то время как иностранные кредиторы начали требовать немедленной оплаты. У центрального правительства нет денежных резервов для стабилизации валюты, что вызывает резкий рост инфляции.\n\nСлабеющая экономика имеет последствия в масштабах всей страны. Беспорядки начали нарастать, поскольку люди протестуют против повышения налогов в мирное время. Возможность дальнейших беспорядков исключила сокращение военных расходов на Центральную армию. Единственное решение в будущем в глазах [FROM.Capital.GetCapitalVictoryPointName] — это централизация власти [FROM.GetLeader], сокращение субсидий провинциям и роспуск армий милитаристов. Все это создало уникальный момент уязвимости, которым могут попытаться воспользоваться другие игроки."
 YUN.endgame.010.d.kmt: "$YUN.endgame.010.d.base$\n\nКак на региональное (и, как некоторые могут сказать, соперничающее) отделение Гоминьдана, большое внимание упало на нас здесь, в [ROOT.Capital.GetCapitalVictoryPointName]. Наши слова о направлении партии имеют особый вес, и многие наблюдают, возьмет ли [ROOT.GetLeader] на себя инициативу в подчинении директивам центрального комитета или же мы осудим правительство, спровоцировав внутрипартийный бунт. Однако решение должно быть принято в ближайшее время, так как по мере того, как партийное государство укрепляет свою власть, такой оплот лоялистов, как мы, будет первым в очереди на интеграцию в режим."
 YUN.endgame.010.d.shxyan: "$YUN.endgame.010.d.base$\n\nДля губернатора Яня, хитрого главы удивительно индустриализированной базы, это может быть шанс, который он ищет, чтобы подтвердить свои полномочия лидера в национальном масштабе и выступить против тирании партийного государства. Бэйян пал перед, казалось бы, неудержимым наступлением Гоминьдана, но теперь они, похоже, спотыкаются о свои собственные успехи. Если и было когда-то время поднять его знамя и попытаться восстановить павшую республику, то это сейчас!"
 YUN.endgame.010.d.shxgmj: "$YUN.endgame.010.d.base$\n\nДля маршала Фэна, гибкого (некоторые сказали бы двуличного) лидера Гоминьцзюнь, это может быть шанс, который он ищет, чтобы представить свои собственные националистические верительные грамоты и заявить о своих правах на лидерство. Будучи некоторое время членом Гоминьдана, Гоминьцзюнь Фэна всегда была отдельным движением, сочетающим национализм, христианский популизм и некоторые северные политические традиции — возможно, это то, что нужно Китаю, а не глупые военные из Гуанчжоу."
 YUN.endgame.010.d.generic: "$YUN.endgame.010.d.base$\n\nДля такой региональной фракции, как наша, это может быть последней возможностью защитить нашу автономию от тех, кто посягнет на нее. Поскольку националистический режим слаб как никогда в будущем, а наши коллеги-регионалисты разгневаны, восстание может свергнуть центральное правительство. Но увы, война рискованна, и иногда лучше отложить и приспособиться к неизбежному."
 YUN.endgame.010.a: "[FROM.GetLeader] — коррумпированный тиран и должен быть свергнут!"
 YUN.endgame.010.b: "[FROM.Capital.GetCapitalVictoryPointName] может говорить что угодно о централизации, но мы будем идти своим темпом."
 YUN.endgame.010.c: "Пришло время вернуть нашу провинцию в лоно. (Переключиться на [YUN.GetNameDef])"

 YUN.endgame.011.t: "[FROM.GetLeader] бросает вызов [RKT.GetLeader]"
 YUN.endgame.011.d.base: "Видя слабость правительства Гоминьдана в [RKT.Capital.GetCapitalVictoryPointName] и опасаясь их усилий по централизации правительства после объединения Китая, [FROM.GetNameDef] организовал восстание против центрального правительства во имя защиты гражданских свобод и порядка, свержения несправедливого правителя и прекращения коррумпированного режима. Поскольку правительство [RKT.GetLeader] борется под тяжестью экономических бед, политической раздробленности и внутренних беспорядков, сдерживание этого восстания, как ожидается, будет сложной задачей."
 YUN.endgame.011.d.kmt: "$YUN.endgame.011.d.base$\n\nЛицом этого восстания является [FROM.GetLeader], региональный лидер Гоминьдана, базирующийся в [FROM.Capital.GetCapitalVictoryPointName], который порвал с линией центрального комитета в надежде продвинуть свою собственную интерпретацию учения доктора Суня. Осколочные группы внутри Гоминьдана не являются чем-то неслыханным, учитывая его долгую и бурную историю, однако еще неизвестно, победит ли этот последний повстанец вопреки всему... или будет существенно отличаться от людей, которых они свергли."
 YUN.endgame.011.d.shxyan: "$YUN.endgame.011.d.base$\n\nЭто восстание было спровоцировано Янь Сишанем, хитрым «образцовым губернатором» Шаньси, долгое время действующим из удивительно индустриализированного города Тайюань. Он стремился использовать свои полномочия как северный политический лидер, связанный в основном со старым режимом Бэйяна, но интегрировавший множество различных политических теорий в свою собственную Теорию для Китая; он представляет явную угрозу для режима Гоминьдана, хотя многие говорят, что шансы невелики."
 YUN.endgame.011.d.shxgmj: "$YUN.endgame.011.d.base$\n\nВо главе этого восстания стоит Фэн Юйсян, лидер популистской Гоминьцзюнь. Осколочная фракция клики Чжили, они объединились с Гоминьданом во время Северного похода, но всегда сохраняли свою идентичность — сочетая христианство, китайский национализм, социализм и другие верования в свою собственную синкретическую идеологию. Но будет ли этого достаточно, чтобы свергнуть центральный комитет — это другой вопрос, который будет решен на поле боя."
 YUN.endgame.011.d.generic: "$YUN.endgame.011.d.base$\n\nЭто восстание было спровоцировано [FROM.GetLeader], лидером [FROM.GetNameDef]. Разочарованный захватом власти партией и, возможно, опасающийся за свой авторитет, он использовал глубоко укоренившуюся обиду на режим как внутри, так и за пределами своей провинции. Восстание не лишено риска, но, похоже, [FROM.GetRulingParty] считает, что оно того стоит."
 YUN.endgame.011.a: "Предатели встретят конец, которого заслуживают."
 YUN.endgame.011.b: "И подумать только, мы думали, что это будет концом войны."

## He Yingqin Exclusive (040-059) ##

 YUN.endgame.040.t: "Изменяющиеся отношения в меняющемся Китае"
 YUN.endgame.040.d: "Китай воссоединился, и нация стоит перед вопросом: «Что теперь?» Этот вопрос тяготит ум президента Хэ Инциня, который провел последние несколько месяцев, наверстывая партийную теорию, слушая широкий круг советников (включая посторонних) и размышляя о том, какими должны быть следующие шаги. После всех жертв, которые были принесены, как партия может построить будущее, достойное этих потерь?\n\nПо совету многих ведущих республиканцев (которые, как правило, получили англо-американское, а не японское или китайское образование, как он сам), он стал более открытым к их призывам принять конституционализм. Они посоветовали ему открыть правительство для Данвай (внепартийных) и, возможно, даже легализовать более мелкие партии, добавляя новые возможности для союзных аутсайдеров участвовать в управлении, пока мы готовимся к окончательному прекращению политической опеки. Конечно, большинство постов и правительственных органов, вероятно, останутся под контролем Гоминьдана в ближайшем будущем, но, конечно, говорят они, это не будет длиться вечно?\n\nЗемельная реформа — еще один насущный вопрос, по которому мнение Хэ Инциня начало меняться. Неотъемлемая часть плана Сунь Ятсена по экономической реконструкции, вдохновленного джорджизмом, предыдущие усилия в значительной степени не смогли выйти за рамки провинциального масштаба, сдерживаемые коррупцией и сопротивлением дворянства. Многие чиновники Гоминьдана, включая самого Хэ Инциня, происходили из земельной элиты или сохраняли крупные земельные владения. Но с завершением военного этапа революции растет чувство необходимости перемен, к чему президент Хэ смягчил свою позицию на фоне растущего популизма среди молодой гвардии.\n\nПеремены необходимы, говорят многие сторонники жесткой линии, но для них это означает завершение революции во всей ее полноте. Тысячи хороших товарищей погибли, чтобы довести нашу революцию до конца, и еще миллионы несут шрамы войны и разрушений. Чтобы был прочный мир, партийное государство должно использовать все свои полномочия, чтобы восстановить Китай с нуля в соответствии с принципами доктора Суня."
 YUN.endgame.040.a: "Война окончена, теперь настало время воссиять демократии."
 YUN.endgame.040.b: "Через земельную и экономическую реформу мы создаем справедливость."
 YUN.endgame.040.c: "Силой партии мы строим лучшее будущее."

 YUN.endgame.041.t: "Неоконфуцианское общество"
 YUN.endgame.041.d: "С объединением Китая под эгидой клики Вампу военные «новые правые» добились прочной победы для партии и подтвердили ее дрейф вправо. Чан Кайши, их павший лидер, опередил время, когда признал ценность обучения у наших предшественников времен Реставрации Тунчжи. Хотя эти реформаторы поздней династии Цин в конечном итоге не смогли остановить упадок маньчжуров, их принятие конфуцианских идей для содействия внутренней стабильности и безопасности заслуживает внимания. По его словам, «мы должны унаследовать нашу пятитысячелетнюю культуру и сделать ее руководством в человеческом прогрессе».\n\nКонфуцианство глубоко укоренилось в китайской политической традиции. Даже те, кто выступает против Хэ Инциня и клики Вампу, нашли общий язык в этом отношении: Ли Цзунжэнь однажды заявил, что социалисты стремятся «лишить людей их души», в то время как Чэнь Цзитан отмечает, что «в создании производства мы можем использовать иностранные машины, иностранные науки, даже иностранных инженеров. Но для создания людей у нас должны быть корни; и эти корни нужно искать в древней культуре Китая».\n\nТем не менее, современные неоконфуцианцы гораздо менее философичны, чем их предшественники — военные люди, ищущие практического применения философии. Основной упор делается на Ли (Ритуал), И (Справедливость), Лянь (Честность), Чи (Стыд), классические конфуцианские добродетели, связывая их напрямую с поддержанием социального порядка, сохраняя при этом их конкретные определения в целом расплывчатыми, несмотря на их распространенность в партийной литературе. Эта культурная война начала вытеснять войну настоящую теперь, когда революция сворачивается, с введением движения «Чтения классики», одновременно препятствуя западным гуманитарным и социальным наукам. «Только науку и технологии нужно заимствовать у Запада», — как выразился один писатель.\n\nЭто движение, однако, вызвало кризис внутренней идентичности, когда партия стала инструментом порядка, а не острием революции. Если Гоминьдан надеялся, что это движение восстановит моральный дух, его последствия были в лучшем случае смешанными."
 YUN.endgame.041.a: "Правильные добродетели создают честных людей."
 YUN.endgame.041.b: "Революция и Реакция — плохая пара."

 YUN.endgame.042.t: "Возвращение системы Баоцзя"
 YUN.endgame.042.d: "Гоминьдан может иметь революционное наследие, но его сдвиг в сторону более консервативной силы, защищающей статус-кво, был ощутимым. Многие офицеры Вампу, включая старших генералов, отождествляли себя с такими людьми, как Цзэн Гофань и Ху Линьи, губернаторами провинций, которые работали при умирающей Великой Цин, чтобы отбиться от восстания тайпинов.\n\nСогласно новой партийной линии, Цзэн и Ху воплощали военный профессионализм и дисциплину настоящего офицера, сохраняя при этом происхождение ученого-джентльмена, ожидаемое от надлежащей китайской элиты (военная карьера традиционно презирается в китайской культуре, уважаемые командиры должны быть в первую очередь учеными-бюрократами, а во вторую — солдатами). Почтение чиновников Гоминьдана к этим фигурам — ироничный, хотя, возможно, и понятный поворот для партии, которая в какой-то момент отождествляла себя с происходящим с юга восстанием тайпинов.\n\nДействительно, в своем стремлении восстановить порядок на местах и возродить партийный дух, сражаясь с повстанцами-социалистами и мятежниками-милитаристами, Гоминьдан официально принял принципы, предположительно изложенные Цзэном и Ху более века назад. Определяемые некоторыми учеными как «неореставрационистские», они включают 1) строгое правоприменение в охраняемых районах, 2) возрождение системы ополчения Баоцзя, 3) организацию лояльного дворянства.\n\nДля партии, которая когда-то выступала против системы Баоцзя и дворян как революционеров, это серьезный поворот. Ожидается, что дворяне укомплектуют большую часть этих ополчений Баоцзя, что является одной из многих старых привилегий, восстанавливаемых или добавляемых по мере того, как они возвращаются к своим старым ролям поддержания местного порядка. Однако это изменение имеет новый поворот — эти предположительно образованные дворяне должны быть в авангарде индоктринации крестьян в партийную идеологию."
 YUN.endgame.042.a: "Проверенный и верный метод."
 YUN.endgame.042.b: "Нам следует сохранить немного больше динамизма."

 YUN.endgame.043.t: "Католицизм и Китайская Республика"
 YUN.endgame.043.d: "В 1930-х годах, в период упадка существования Гоминьдана, Хэ Инцинь принял католицизм. Генерал вырос в меняющейся Гуйчжоу, где на юго-западе под влиянием Франции многие католические миссионеры обратили видные местные семьи, включая Ван Вэньсян (его жену) и ее семью. В такое тревожное время он нашел утешение в вере (хотя и неохотно делился какими-либо конкретными подробностями о своих мотивах), включая ее акцент на знакомых понятиях, таких как самодисциплина, социальная справедливость и самосовершенствование, и продолжает практиковать ее будучи президентом.\n\nБыть главой государства в качестве религиозного меньшинства — это балансирование для президента Хэ. Закрытый, стоический человек по натуре, он способен вести себя с достоинством на публике, хотя и старается не проявлять чрезмерного фаворитизма к религии, которую многие китайские националисты рассматривают как навязанную извне и контролируемую извне.\n\nОн и многие другие китайские католики сохраняют привязанность к китайским традициям. К счастью для самого заметного верующего в стране, недавние религиозные и политические события помогли сгладить некоторые старые разногласия между двумя мирами. Священная конгрегация пропаганды веры объявила китайские обычаи, связанные с почитанием предков, не обязательно суеверными по своей природе и разрешенными (с определенными оговорками), тем самым разрешив так называемый «спор о ритуалах», из-за которого католические миссионеры изгонялись в прошлом.\n\nНа международном уровне Католическая церковь и Китайская Республика установили дипломатические отношения, а архиепископ Пекинский Томас Тянь Гэнсинь был назначен кардиналом.\n\nХэ Инцинь, готовый немного больше говорить о своей вере на публике, также выразил свою поддержку движению «Моральное перевооружение», основанному американским лютеранским священником Фрэнком Бухманом с надеждой возродить христианскую мораль и способствовать международному миру и экономическому восстановлению."
 YUN.endgame.043.a: "Человек веры."

 YUN.endgame.044.t: "Новый Премьер"
 YUN.endgame.044.psc.d: "Дай Цзитао, революционный мудрец, уходит в отставку. Проведя последние несколько десятилетий на службе революции в качестве переводчика доктора Суня, лидера шанхайской подпольной ячейки, пропагандиста и писателя, партийного светила, а в последние несколько лет — премьера Исполнительного юаня, Дай решил завершить свою легендарную карьеру достойной отставкой теперь, когда нация воссоединилась. Его отношения с президентом, хотя и странные, а иногда и проблемные, оказались плодотворными — вместе они построили новую Республику.\n\nХотя существуют некоторые предположения о том, насколько добровольной является отставка Дая и чем он будет заниматься дальше, уходящий премьер заверил собравшихся членов партии на своей прощальной вечеринке, что он, скорее всего, останется в общественной сфере, чтобы продолжать направлять новую Республику со стороны в ее дни становления. Он размышлял о том, чтобы провести свои последние годы либо в сфере образования, либо на одной из менее обременительных должностей в правительстве, например, в Контрольном или Экзаменационном юанях.\n\nОн не стеснялся в своих мнениях о своем преемнике. Дай Цзитао осудил Ян Юнтая как двуличного предателя капиталистических и реакционных интересов, часто отпуская едкие комментарии как на публике, так и в частном порядке о его вероломных сделках. Он почти подтвердил, что Ян несет ответственность за его полупринудительную отставку, и хотя он мало что может сделать, чтобы остановить его, это не помешало ему ругать его напоследок."
 YUN.endgame.044.cec.d: "Дай Цзитао, революционный мудрец, уходит в отставку. Проведя последние несколько десятилетий на службе революции в качестве переводчика доктора Суня, лидера шанхайской подпольной ячейки, пропагандиста и писателя, партийного светила, а в последние несколько лет — премьера Исполнительного юаня, Дай решил завершить свою легендарную карьеру достойной отставкой теперь, когда нация воссоединилась. Его отношения с президентом, хотя и странные, а иногда и проблемные, оказались плодотворными — вместе они построили новую Республику.\n\nХотя существуют некоторые предположения о том, насколько добровольной является отставка Дая и чем он будет заниматься дальше, уходящий премьер заверил собравшихся членов партии на своей прощальной вечеринке, что он, скорее всего, останется в общественной сфере, чтобы продолжать направлять новую Республику со стороны в ее дни становления. Он размышлял о том, чтобы провести свои последние годы либо в сфере образования, либо на одной из менее обременительных должностей в правительстве, например, в Контрольном или Экзаменационном юанях.\n\nДай был осмотрителен в отношении своего преемника, отзываясь о нем уважительно, как того требует случай. В своих последних прощальных словах он мягко предостерег от социалистического радикализма, восхваляя при этом верную приверженность генерала Чэня революции и поддержанию революционного динамизма. Он выразил надежду, что Чэнь сможет найти общий язык со своими протеже, братьями Чэнь (не родственниками), хотя напряженность, к сожалению, уже проявилась."
 YUN.endgame.044.bss.d: "Дай Цзитао, революционный мудрец, уходит в отставку. Проведя последние несколько десятилетий на службе революции в качестве переводчика доктора Суня, лидера шанхайской подпольной ячейки, пропагандиста и писателя, партийного светила, а в последние несколько лет — премьера Исполнительного юаня, Дай решил завершить свою легендарную карьеру достойной отставкой теперь, когда нация воссоединилась. Его отношения с президентом, хотя и странные, а иногда и проблемные, оказались плодотворными — вместе они построили новую Республику.\n\nХотя существуют некоторые предположения о том, насколько добровольной является отставка Дая и чем он будет заниматься дальше, уходящий премьер заверил собравшихся членов партии на своей прощальной вечеринке, что он, скорее всего, останется в общественной сфере, чтобы продолжать направлять новую Республику со стороны в ее дни становления. Он размышлял о том, чтобы провести свои последние годы либо в сфере образования, либо на одной из менее обременительных должностей в правительстве, например, в Контрольном или Экзаменационном юанях.\n\nДай был осмотрителен в отношении своего преемника, отзываясь о нем уважительно, как того требует случай. В своих последних прощальных словах он мягко предостерег от чрезмерного военного доминирования в партии, восхваляя при этом приверженность Лю Цзяньцюня китайскому национализму. Он напоминает аудитории, однако, о необходимости верности Трем принципам и о том, чтобы не сбиваться с пути, даже если текущие обстоятельства не приносят немедленных плодов."
 YUN.endgame.044.ccc.d: "Дай Цзитао, революционный мудрец, уходит в отставку. Проведя последние несколько десятилетий на службе революции в качестве переводчика доктора Суня, лидера шанхайской подпольной ячейки, пропагандиста и писателя, партийного светила, а в последние несколько лет — премьера Исполнительного юаня, Дай решил завершить свою легендарную карьеру достойной отставкой теперь, когда нация воссоединилась. Его отношения с президентом, хотя и странные, а иногда и проблемные, оказались плодотворными — вместе они построили новую Республику.\n\nХотя существуют некоторые предположения о том, насколько добровольной является отставка Дая и чем он будет заниматься дальше, уходящий премьер заверил собравшихся членов партии на своей прощальной вечеринке, что он, скорее всего, останется в общественной сфере, чтобы продолжать направлять новую Республику со стороны в ее дни становления. Он размышлял о том, чтобы провести свои последние годы либо в сфере образования, либо на одной из менее обременительных должностей в правительстве, например, в Контрольном или Экзаменационном юанях.\n\nОн не стеснялся в своих мнениях о своем преемнике, осыпая его похвалами. Чэнь Гофу всегда был одним из близких друзей и союзников Дай Цзитао, а его младший брат Чэнь Лифу — любимым протеже. Дай очень высоко отзывается о них обоих как о будущем партии и решительно поддержал кандидатуру Чэнь Гофу. Теплые улыбки и рукопожатия, которыми обмениваются, ослабили опасения по поводу политического перехода, поскольку Дай заверяет партию, что она в надежных руках."
 YUN.endgame.044.wpc.d: "Дай Цзитао, революционный мудрец, уходит в отставку. Проведя последние несколько десятилетий на службе революции в качестве переводчика доктора Суня, лидера шанхайской подпольной ячейки, пропагандиста и писателя, партийного светила, а в последние несколько лет — премьера Исполнительного юаня, Дай решил завершить свою легендарную карьеру достойной отставкой теперь, когда нация воссоединилась. Его отношения с президентом, хотя и странные, а иногда и проблемные, оказались плодотворными — вместе они построили новую Республику.\n\nХотя существуют некоторые предположения о том, насколько добровольной является отставка Дая и чем он будет заниматься дальше, уходящий премьер заверил собравшихся членов партии на своей прощальной вечеринке, что он, скорее всего, останется в общественной сфере, чтобы продолжать направлять новую Республику со стороны в ее дни становления. Он размышлял о том, чтобы провести свои последние годы либо в сфере образования, либо на одной из менее обременительных должностей в правительстве, например, в Контрольном или Экзаменационном юанях.\n\nДай был осмотрителен в отношении своего преемника, отзываясь о нем уважительно, как того требует случай. В своих последних прощальных словах он мягко предостерег от непотизма, восхваляя при этом приверженность Ван Боцюня партии и генералиссимусу Хэ. Он выразил надежду, что Ван сможет найти общий язык со своими протеже в лице братьев Чэнь и работать над продолжением будущего партии."
 YUN.endgame.044.a: "Прощайте, Премьер Дай! Это было честью."
 YUN.endgame.044.b: "Другое видение, но общая приверженность революции."
 YUN.endgame.044.c: "Мы чествуем вклад великого патриота."
 YUN.endgame.044.e: "Наша Революция сохранит наследие Премьера Дая!"
 YUN.endgame.044.f: "Мы благодарим Премьера Дая за его поддержку генералиссимуса Хэ."

 YUN.endgame.045.t: "Что случилось в Цзю"
 YUN.endgame.045.d: "Уванцзайцзю (Wuwangzaiju) — это идиома, которая переводится примерно как «не забывайте, что случилось в Цзю». Древний город Цзю был осажден в период Сражающихся царств войсками государства Янь, став последним оплотом терпящего крах государства Ци. Но, несмотря на невозможные шансы, солдаты Ци смогли продержаться и начать контратаку, вернув свою родину.\n\nЭто история, которая отражает не только беды и окончательный триумф Гоминьдана, но и самого президента Хэ Инциня. Вынужденный покинуть Гуйчжоу из-за смерти своего зятя и скрывающийся в Куньмине, в декабре 1921 года Хэ Инцинь получил несколько пулевых ранений в грудь и ноги после перестрелки с убийцами в чайной Фэнхуа. Это и несколько других примеров личной удачи принесли ему прозвище «Счастливый генерал».\n\nОн не борется с невозможными шансами в одиночку. В дополнение к многочисленным наставникам, товарищам и подчиненным, которые приходили и уходили на протяжении многих лет, Хэ Инцинь нашел утешение в компании своей жены Ван Вэньсин. Она стала его родственной душой в его глазах после того, как помогла ему выздороветь после стрельбы 1921 года — партнер с тех пор, который помогал ему отказывать потенциальным соискателям работы, чтобы не навредить собственной репутации, и который был рядом с ним во время многочисленных кризисов. Говорят, что у Хэ Инциня есть два личных правила: как бы он ни устал или как бы поздно он ни вернулся, он всегда будет проводить время со своей женой и что он всегда будет есть с ней хотя бы один раз в день.\n\nПара, не имея собственных биологических детей, удочерила дочь по имени Личжу. На духовном уровне новая Республика — его ребенок, продукт поколения солдат, революционеров и мучеников. У руля возрожденного Китая президент Хэ будет помнить их, этих павших друзей и годы испытаний, которые потребовались, чтобы вернуть родину, пока он ведет нацию в новую эпоху."
 YUN.endgame.045.a: "Пусть его удача передастся нам."

 YUN.endgame.046.t: "Революция Вампу"
 YUN.endgame.046.d: "Национально-революционная армия была создана, чтобы стать Армией Революции, а Военная академия Вампу была учреждена для обучения вооруженных кадров авангардной партии. Люди, собравшиеся на тех берегах, хотя некоторые, возможно, и не знали об этом в то время, собирались сделать что-то особенное. Они не просто создали лояльную, преданную освободительную силу для народа, но и объединили сердца и души патриотически настроенных молодых людей, чтобы создать узы, которые продлятся всю жизнь.\n\nКруг людей, встретившихся в качестве инструкторов в Вампу, прибыл со всей страны. Будущий президент Хэ Инцинь прибыл из Гуйчжоу, тогдашний начальник Чан Кайши и ведущие офицеры Политического и Организационного отделов, такие как Дай Цзитао и Чэнь Цимэй, прибыли из Чжэцзяна, а Вечный Премьер Партии Сунь Ятсен прибыл из Гуандуна. Но полная приверженность восстановлению нации, заключенная в Трех принципах национализма, демократии и народного благосостояния, — это то, что выходит за рамки провинциальных границ.\n\nСолдаты с винтовками и комиссары со своими словами работали в тандеме, так, как не видели нигде в мире. Они прошли через смерть и пережили поражение и изгнание, но никогда не останавливались, пока их предначертанная миссия не была завершена. Рука об руку армия и партия освободили свою нацию от милитаристов, империалистов и сил коррупции, которые терзали их любимые дома.\n\nЭтот дух революционного братства зажег факел, за которым последует весь Китай, и душа Вампу войдет в историю Азии как маяк надежды для всех угнетенных народов Востока. Ожидается, что партнерство между кликой Вампу и кликой CC продолжится в следующую эпоху китайской истории, охраняя и реализуя данные высокие обещания и восстанавливая характер нации изнутри."
 YUN.endgame.046.a: "Братья по оружию, товарищи ради будущего."

 YUN.endgame.047.t: "Генерал и гэнро"
 YUN.endgame.047.d: "Гоминьдан после Реорганизации 1924 года горел революционной страстью, стремясь свергнуть Бэйянскую республику и установить истинно республиканское правительство, которое поведет массы и государство к новому, справедливому и процветающему будущему без империалистических стервятников.\n\nК сожалению, Гоминьдан рухнул во время Северного похода, и самые верные национал-революционеры совершили патриотическое отступление в провинцию Гуйчжоу. Под грандиозным руководством Хэ Инциня Гоминьдан не только отверг бэйянских милитаристов, но и освободил весь Китай от тисков империалистического угнетения. Однако после завершения задачи национального объединения процесс построения нового Китая стал новой первостепенной задачей Гоминьдана.\n\nГенералиссимус Хэ Инцинь понимает, что для построения нового Китая, способного достичь всеобщего процветания для народа, Партия должна адаптироваться к новой ответственности. Старые времена ультранационалистических революционеров и пламенной риторики больше не могут служить целям нашей Партии в прокладывании пути для будущего Китая, и партия теперь должна реформироваться в респектабельную организацию.\n\nС этой целью Хэ Инцинь позволил получившим западное образование ученым, старейшинам-государственным деятелям и технократам, которые все стремятся к современному Китаю, принять участие в его правительстве. В то время как Хэ Инцинь доверяет Чжан Цюню и Ян Юнтаю возглавить этих политических независимых деятелей, чтобы наметить демократическое и современное будущее для нации, генералиссимус и клика Вампу будут гарантировать, что этот Новый Китай сохранит порядок и стабильность, а милитаристы будут держаться на расстоянии.\n\nВ этом многие сравнивают новое правительство с правительством Реставрации Мэйдзи, где император Мэйдзи окружил себя технократами, модернизаторами и интеллектуалами, которые помогли ему превратить Японию в первую современную нацию в Азии. Действительно, Чжан Цюнь и Хэ Инцинь нашли много вдохновения в японской системе благодаря годам обучения в японских академиях.\n\nХотя многие ожидают, что в этом новом демократическом Китае Гоминьдан будет доминировать еще десятилетия, народ Китая надеется на хорошее современное будущее, где десятилетия отсталости и хаоса станут забытым воспоминанием. Эпоха революции прошла, и новая эра свободы и современности постучалась в двери Китая."
 YUN.endgame.047.a: "Революционные методы, умеренные цели..."

 YUN.endgame.048.t: "Опека действием"
 YUN.endgame.048.d: "До тех пор, пока Гоминьдан существовал как революционная сила воли китайского народа, Партия всегда стремилась освободить низшие классы Китая. Естественно, такие настроения привели к довольно противоречивым соглашениям и привлекательности или проникновению социализма во многих членов партии. Полностью раздробленная в конце 1920-х годов, Партия практически раскололась по швам. С двумя соперничающими Центральными исполнительными комитетами и двумя соперничающими остаточными группами, ведущими параллельную борьбу за Национальную революцию. Те, кто преодолевал этот разрыв, обычно высмеивались обеими сторонами, и все же здесь остается такое заблуждение.\n\nГлядя на бегущие улицы и городской лабиринт [ROOT.Capital.GetCapitalVictoryPointName] из своего кабинета, генералиссимус Хэ мог только вздохнуть со сдержанным облегчением. Солдат в душе, Хэ был в своей стихии в бурный период последних нескольких десятилетий Китая. Под его яростным руководством храбрые молодые души Вампу рвались вперед, сплачивая Три принципа и Белое солнце для Национального объединения. И все же, когда объединение было достигнуто, как должно было выглядеть мирное время?\n\nПрерывает его размышления стук в дверь. По зову голоса так называемый «Маленький генералиссимус» появляется в святилище Хэ. Несмотря на враждебность между любимой правой рукой Чана и его наследником после краха Партии, похоже, что слова Чэнь Чэна звучали правдиво для ушей Хэ. Ибо китайскому народу нужно больше, чем смелая риторика и военный сапог. Ибо им нужны политика, действия и оформленный план, постоянно продвигающийся вперед для Национальной революции.\n\nДва военных человека, премьер и президент, два сына Вампу и два революционных героя. Здесь они сидели, не слишком отличаясь от их встречи в Мяньху, где впервые возникла репутация Вампу. В последний сумеречный час именно Хэ возглавил штыковую атаку остатков Вампу. Осмелившись собрать последнее сопротивление, чтобы предотвратить провал Революции в ее зародыше. И именно Чэнь Чэн, чьи пушки стреляли день и ночь, обрушил адский огонь на войска Линь Ху. Одержав окончательную победу комбинированными методами, возможно, они смогут еще раз вырвать яркую победу из пепла разрушения."
 YUN.endgame.048.a: "Враждебность вытеснена боевым товариществом."

 YUN.endgame.049.t: "Оживленная революция"
 YUN.endgame.049.d: "По мере того как пыль оседает над Китаем, как внутренним, так и иностранным наблюдателям кажется, что, наконец, период непрекращающихся гражданских беспорядков по всей стране со времен Синьхайской революции подошел к концу. Флаг националистов с Синим небом и Белым солнцем торжествующе реет по всей стране, в то время как жестокие репрессии против «контрреволюционеров» и «предателей» продолжаются со спорадическими боями в городских и сельских центрах по всей стране.\n\nХэ Инцинь, генералиссимус Национально-революционной армии и самой Национальной революции, обнаружил, что единственным средством успеха в бурный период возрожденной национальной революции была чрезмерная вера в вооруженные силы Партии. В конце концов, мало кто может оспорить, что революционный калибр революционной армии был единственным средством, с помощью которого было достигнуто спасение? Ряды Вампу долгое время удерживались братьями, сыновьями опустошенной нации, объединенными в своей сильной любви к своей нации и готовности сделать все, что нужно, чтобы спасти ее. Именно с этим духом нация была спасена.\n\nНационал-популизм — это чужеродная идея, которая, возможно, даже стремится узурпировать идеологическое превосходство покойного доктора Сунь Ятсена. Однако опыт последних нескольких лет показал, что, возможно, идеи национал-популизма или народничества действительно могут быть примирены с революционным духом и огнем китайского Гоминьдана. Действительно, в эти неотложные времена, когда необходим национальный порядок и стабильность, силы Синерубашечников, безусловно, могут быть использованы для обеспечения мира во всей стране.\n\nНовый Китай должен родиться из пепла старого. И этот новый Китай возглавляет святой нации, Хэ Инцинь, человек, движимый ничем иным, как революционным рвением и страстью, истинный преемник уважаемого директора Вампу. Модель, внедренная покойным директором, в свою очередь была усовершенствована и отлажена генералиссимусом как новый путь для новой возрожденной китайской нации."
 YUN.endgame.049.a: "Душа Вампу живет!"

## Chen Cheng Exclusive (060-079) ##

 YUN.endgame.060.t: "Изгоняя гниль Вампу"
 YUN.endgame.060.d: "Возможно, в духе 1924 года, в духе сохранения партийной сплоченности в эти тревожные времена, или, как многие в оппозиции намекают, для укрепления своей железной хватки над китайским правительством, генералиссимус Чэнь Чэн провел то, что многие называют «Второй реорганизацией». В том же духе, что и его амбициозные усилия по централизации, он счел целесообразным официально проводить такие дела под эгидой официального правительственного агентства. Названный «Центральным комитетом реорганизации», генералиссимус учредил его создание для замены старого Центрального постоянного комитета и Центрального исполнительного комитета.\n\nПоскольку новый комитет укомплектован в основном членами, связанными с Чэнь Чэном, новая арена тяжеловесов Гоминьдана имеет средний возраст 56 лет, и все они имеют высшее образование или его эквивалент. Примечательно, что Реорганизация имеет шесть широких целей, которые должны быть достигнуты. Прежде всего, сделать Гоминьдан революционно-демократической партией. Во-вторых, расширить социальную базу партии, включив в нее крестьян, рабочих, молодежь, интеллектуалов и производителей. В-третьих, принять демократический централизм в качестве организационного принципа; в-четвертых, сделать акцент на партийных ячейках как основных единицах партии, и в-пятых, чтобы все решения принимались партийными комитетами, а кадровые и другие политические вопросы решались в соответствии с формальной процедурой. Наконец, настаивать на том, чтобы члены партии подчинялись партии, поддерживали ее политику и имели надлежащий стиль работы.\n\nКритики генералиссимуса, наиболее энергично — Общество синих рубашек, уже преследуют его за централизацию власти вокруг себя. Считая, что они отрезаны от любых путей к власти, многие из них устраивают грандиозные демонстрации неповиновения в партийных кругах. По крайней мере, они были бы наполовину правы. Настаивая на том, что он восстанавливает партийную власть над всеми сферами правительства и армии, генералиссимус Чэнь держит судьбу ненавистных Синерубашечников в своих руках."
 YUN.endgame.060.a: "На свалку истории!"
 YUN.endgame.060.b: "Связи Вампу трудно убить."

 YUN.endgame.061.t: "Консолидация будущего"
 YUN.endgame.061.d: "Неуклонно продвигаясь по пути прогресса для китайской нации, генералиссимус Чэнь добивался создания Молодежного корпуса Саньминьчжуи, или Молодежной лиги Трех народных принципов. Предназначенная для индоктринации нового поколения молодых людей философией Партии и омоложения больной, стареющей и коррумпированной Партии, Молодежная лига надеется создать новую эру для Гоминьдана в будущем. Ту, которая добровольно позволит старой гвардии членов Партии передать факел более энергичному и спартанскому органу. Вдохновленная парадами победы, юбилеями и горнами после почти покончившего с цивилизацией конфликта с Восходящим солнцем, Лига приняла страстный патриотический оборот. Поскольку многие образованные молодые люди добровольно вступают в Лигу, по всей стране была создана серия молодежных залов и гостевых домов для содействия дальнейшему набору.\n\nПроводя летние лагеря, спортивные игры и другие развлекательные мероприятия, Лига также помогала в создании групп обслуживания на поле боя и пропаганды для использования партией в будущих начинаниях. Распространяя свое влияние даже на систему образования, Лига также взяла на себя еще одну задачу политической консолидации. Продвигая достижения Чэнь Чэна как на поле боя, так и в управлении, Молодежная лига достигла критической точки расширения.\n\nОграниченные без посторонней помощи, некоторые члены Центрального комитета реорганизации предлагают генералиссимусу воспользоваться сетями раздробленного Центрального клуба (CC) внутри страны, используя братьев Чэнь и их обширные связи в гражданской бюрократии, чтобы добиться быстрого расширения Лиги. Конечно, они, без сомнения, вонзят свои зубы в саму Лигу."
 YUN.endgame.061.a: "Заключить сделку с Центральным клубом."
 YUN.endgame.061.b: "Мы прекрасно обойдемся без этих крыс."

 YUN.endgame.062.t: "Угли Объединенного фронта"
 YUN.endgame.062.d: "Самым любопытным для многих в «Новых правых» являются истинные пристрастия Чэнь Чэна внутри Партии. Некоторые намекают, что его связи с его наставником Дэн Яньда никогда по-настоящему не умирали, что он всего лишь тайный член Временного комитета действий (ВКД), учитывая, что он побратим Чжоу Чжижоу. Другие утверждают, что он просто ортодоксальный преемник генералиссимуса Чан Кайши, реализующий политику «Красного генерала» в полной мере. По правде говоря, хотя близкие к нему люди могут утверждать, что у него есть социалистические симпатии, генералиссимус Чэнь является полным членом растущих «Новых правых».\n\nСовпадая с этим, генералиссимус Чэнь недавно ввел кадровую систему для обеспечения влияния партии среди членов. С каждым кадром, прошедшим тщательную подготовку по Трем принципам Суня и проверенным на лояльность Партии и их способности, партийная работа также получила изменение направления. Нацеливаясь как на членство в Партии, так и на общество в целом, Чэнь надеется, что можно будет культивировать популярные настроения по отношению к Гоминьдану, и что расследования местных ситуаций могут предоставить информацию и искоренить незаконную деятельность.\n\nКроме того, набор в партию был трансформирован для того, чтобы вместить больше представителей низших классов: фермеры, рабочие и интеллектуалы получили приоритет. Хотя они, скорее всего, не будут участвовать в образовании, пропаганде, государственной службе или другой партийной работе, это было расценено остатками Временного комитета действий в стране как шаг к уравниванию крестьянства с массами.\n\nТакое хорошее взаимопонимание и одобрение со стороны Дэн Яньда из ВКД привели к тому, что левая организация предложила своего рода оливковую ветвь «Маленькому генералиссимусу». Вслед за недавними обменами мнениями с другими левыми, такими как Чжоу Эньлай, Дэн предложил помощь ВКД в просвещении крестьянства в обмен на амнистии и сохранение приоритета китайских низших классов."
 YUN.endgame.062.a: "Это эпоха Новых правых!"
 YUN.endgame.062.b: "Наставник и ученик снова вместе!"

 YUN.endgame.063.t: "Любовь, рожденная в трудные времена"
 YUN.endgame.063.d: "Влияние Чан Кайши на траекторию жизни Чэнь Чэна было мощным, постоянным и кратким. Оборванная смертью первого от рук недовольных солдат или, возможно, граждан во время Северного похода, карьера Чэня как протеже генералиссимуса так и не раскрыла свой истинный потенциал. Тем не менее, некоторое подобие философии и действий его второго наставника все еще остается в жизни Маленького генералиссимуса. Принципы Вампу или, возможно, спартанский образ жизни Чэня. Однако наиболее ярко это проявляется в его браке по договоренности с Тань Сян, дочерью одноименного Тань Янькая.\n\nНачинаясь изначально с попытки доктора Суня устроить брак между Сун Мэйлин и Танем, эта попытка в конечном итоге провалилась, так как Тань был навсегда женат на своей первой жене, даже после ее смерти. Вместо этого Тань решил стать крестным отцом Сун, а сам Сунь вместо этого попытался устроить брак Чана с Сун. После смерти Суня и сопротивления всех остальных членов семьи, кроме Сун Айлин, браку Чана, его спас только вмешательство Таня. После Северного похода Тань оказался в более слабой фракции в остатках Гуйчжоу, надеясь укрепить свое положение, Тань сговорился с Мэйлин, чтобы Чэнь Чэн и Тань Сян поженились в 1931 году.\n\nПоскольку Чэнь Чэн был ранее женат, многие считали это просто политическим ходом с его стороны. И все же, независимо от того, сколько влияния Сун, Тань или Чан оказали на их брак, Чэнь и Тань Сян доказали, что являются очень гармоничной парой. Несмотря на то, что их свадьба состоялась в гоминьдановском Гуйчжоу, и несмотря на все испытания и невзгоды, которые они пережили с тех пор, они сохранили свою любовь друг к другу. Заняв место рядом с мужем, Тань Сян взлетела от просто попыток сделать все возможное для оказания помощи раненым во время Второй японо-китайской войны до Первой леди Китая. Будучи также убежденной феминисткой в своей политической работе, Тань Сян стала вице-президентом Китайской ассоциации медсестер, девушек-скаутов и различных других учреждений."
 YUN.endgame.063.a: "За первую семью Китая!"
 YUN.endgame.063.b: "Провозгласить это настоящей любовью? Какая больная шутка!"

 YUN.endgame.064.t: "Пересекая черту"
 YUN.endgame.064.d: "На политическом поле битвы в Китае, безусловно, верно, что Партийное государство — не единственная неоспоримая политическая партия в стране. Называемые «Данвай», или партийные аутсайдеры, эти немногие смелые политические независимые деятели — одни из немногих людей, которые продолжают баллотироваться и отстаивать свои соответствующие дела в свете доминирования Гоминьдана в китайском правительстве. Гоминьдан настолько вездесущ, что при Чэнь Чэне Данвай и другие политические партии увидели несколько косвенное подавление любого влияния, которое они могли бы оказать на нацию.\n\nУстановив формальное полуконституционное правление в стране, Чэнь и его клика курировали дальнейшее создание сети партийных ячеек во всех сферах правительства, армии и общества, к которым должен был принадлежать каждый член Партии. С демократическим централизмом в качестве руководящей идеологии в вопросах политики, сеть увидела иерархическую власть и партийный авторитет, полностью восстановленные в стране.\n\nРазделенная на городской и сельский оттенок организации, каждая партийная ячейка проводит собрания для взаимной критики и самокритики членов, а также для изучения потребностей общества наряду с общественным мнением о партийной политике. В целом, эти усилия направлены на разработку политической линии, наиболее поддерживаемой массами. Поскольку каждого члена Гоминьдана принуждают к членству и посещению, определенный уровень конкретной лояльности, активности и достоинства каждого члена был практически гарантирован.\n\nОднако определенные голоса в правительстве настаивают на том, чтобы оппозиции было позволено процветать. Утверждая, что для разработки линии, наиболее одобряемой народными массами, необходимо получать такую информацию от голосов, непредвзятых к Партии, в Центральный комитет реорганизации была внесена процедура, которая предусматривала бы ограниченную плюрализацию, позволяющую участие Данвай в собраниях партийных ячеек."
 YUN.endgame.064.a: "Обеспечение будущего для Революции!"
 YUN.endgame.064.b: "Без наших современников, как мы можем быть праведными?"

 YUN.endgame.065.t: "Факелоносец масс"
 YUN.endgame.065.d: "«Человек не может жить без земли, из которой он черпает средства к существованию. Земля, по сути, является основой человеческой жизни. Однако следует заметить, что хотя общая площадь земли с древних времен не сильно изменилась, рост населения, если его не сдерживать, может вообще не иметь предела. В первобытные эпохи, когда земли было много, а жителей мало, каждый человек мог иметь столько земли, сколько хотел. Следовательно, земельной проблемы не существовало. Но в более поздние времена, когда земля стала дефицитной пропорционально росту населения, предложения было недостаточно для удовлетворения спроса».\n\nПлодовитый писатель, возможно, лучший политик и администратор, чем генерал, Чэнь Чэн с головой ушел в создание заявления за заявлением, объясняя с достоинством научной точности курс и обоснование своих амбициозных усилий по земельной реформе. Заявляя, что медленно и довольно жестоко земля стала не объектом, за счет которого жили люди. А просто объектом, за обладание которым человек боролся с человеком, а нация с нацией. Ситуация с землей настолько ухудшилась на протяжении всей истории Китая, что, будучи сельскохозяйственной нацией, полагающейся на руководство Небес в поисках хлеба насущного, она все еще имела много голодающих в сельской местности.\n\nОбъединившись со своими левыми современниками и союзниками, «Маленький генералиссимус» искал гораздо более радикальный курс, чем его бывшие соперники в «Новых правых». Позиционировать земельную реформу в Китае и ее отношения с крестьянством как самую критическую точку нации — некоторые назвали бы это драматизмом, преувеличением. И все же Чэнь Чэн полностью убежден в своем крестовом походе. Уничтожение угнетения китайского народа, избавление его от голода и рабства, предоставление ему свободы, стабильности и счастливой жизни, на которую он имеет право, — это мантия, которую унаследовал генералиссимус."
 YUN.endgame.065.a: "Рука об руку Срединное государство движется вперед."

 YUN.endgame.066.t: "Отменить тысячелетия несправедливости"
 YUN.endgame.066.d: "Современные исследования истории Китая за последние 2000 лет показывают повторяющиеся модели войны и мира. Многие источники могут быть приписаны таким периодам, по крайней мере, в их индивидуальных контекстах, но, возможно, одним общим качеством является неспособность династии, а значит и нации, поддерживать надлежащий баланс между землей и населением в течение какого-либо длительного времени. Затмевая период громкого прогресса и продвижения, население и богатство нации, несомненно, росли вместе с ним.\n\nДостигая критической конфликтной точки, где земли было недостаточно, насилие становилось немедленным ответом на сомнения людей. Восстания, гражданские конфликты, как будто это было научное применение страданий для исправления баланса Китая. С последующим сокращением населения и восстановлением равновесия «земля-население» начинался другой период социальной и политической стабильности; и тем самым люди снова ввергались в свой вечный цикл кровопролития.\n\nПо крайней мере, так утверждает «Маленький генералиссимус» в своих трудах, опубликованных для масс. Сказать, что исправление системы, которая разрушила целые цивилизации, — это трудная задача, было бы, безусловно, преуменьшением. И все же нет человека более амбициозного, более убежденного в своей задаче, чем Чэнь Чэн. Проводя пресс-конференцию по своим недавним усилиям по земельной реформе и централизации экономики, «Маленький генералиссимус» энергично провозгласил:\n\n«С окончательной реализацией земельной реформы в Китае мы можем разорвать порочный круг циклических войн и мира в стране, а также полностью развить ее промышленность и торговлю, чтобы модернизировать национальную экономику и народное благосостояние, а также гарантировать и развивать политическую демократию через экономическую свободу. Мы можем даже сказать, что реформы, рожденные сегодня, ознаменуют важное изменение в ходе китайской истории!»\n\nВстреченные громкими провозглашениями, приукрашивания Чэня и его государственной деятельности мало что делают, чтобы развеять страхи неудачи для амбициозного человека. Дорога перед Командующим длинна и трудна, но никто не подходит для такой задачи лучше, чем он."
 YUN.endgame.066.a: "«Что в нем такого „Маленького“?»"

## Teng Jie Exclusive (080-099) ##

 YUN.endgame.080.t: "Завершение Революции"
 YUN.endgame.080.d: "Поистине, народ и Партия не могли быть дальше друг от друга. Люди стали ненавидеть Партию, своих так называемых арбитров их воли, своих освободителей и тех, кто должен продвигать их вперед в светлое будущее. Что принесла Партия? Разрушение, потерю пламенного духа, повсеместное распространение милитаристов и коррупцию бюрократов. То, что когда-то было Национальной революционной партией, теперь не более чем шаркающий труп.\n\nТо, что можно наблюдать сейчас между руководством и членами Партии, — это просто взаимное использование и безразличие. Лидеры не делают различий между теми, кто лоялен, истинными членами партии, и теми, кто нет. Члены партии, со своей стороны, просто используют лидеров для достижения личных целей. Даже если они наносят вред обществу, до тех пор, пока они устно поддерживают лозунги лидеров, они считаются истинными товарищами. Даже среди самих членов партии они не любят друг друга. Революционное братство? Оно умерло в 1927 году.\n\nЧтобы покончить с бюрократами и капиталистами, которые контролируют партию сегодня, мы не можем просто провести чистку и замену, такое дело дестабилизирует и непрактично. Вместо этого будет тщательно построена партия внутри партии. С Центральным исполнительным комитетом, состоящим на две трети из Синерубашечников, половина членов не-Синерубашечников будут зарубежными китайцами. Указанные Синерубашечники должны состоять из людей, преданных только революции, готовых пожертвовать всем ради нации и масс.\n\nОтвергнуть материальное богатство! Отвергнуть феодализм! Любить своих товарищей! Вот наша задача! И все же остается вопрос об аутсайдерах. Милитаристы, те, кто не происходит из Вампу, и те, кто происходит, — они заразили членов партии, загноились и позволили развиться определенной гнили. Многие близкие к Лю Цзяньцюню предлагают «ампутацию», Тэн Цзе, со своей стороны, выступал за снисходительность к кадрам НРА. Некоторые радикальные голоса даже предлагают не будить спящую собаку..."
 YUN.endgame.080.a: "В Партии нет места предателям."
 YUN.endgame.080.b: "Снисходительность к Вампу. Что касается остальных..."
 YUN.endgame.080.c: "Нравится это или нет, они наши товарищи!"

 YUN.endgame.081.t: "Переосмысление Трех принципов"
 YUN.endgame.081.d: "«Мы твердо верим, что суматоха в партии, бессилие партии, упадок партии — это проблемы не отдельных лиц, а проблемы плохих методов, несовершенной системы и несущественного содержания. По причинам истории и легитимности, и поскольку мы не хотим провоцировать большую ссору, если ее можно избежать, мы выступаем за сохранение старой оболочки партии, но в дополнение к этому организуем внутри партии корпус, преданный простому народу нации, который придаст партии содержание и создаст душу партии».\n\nТакое заявление было расклеено по всем партийным передовицам и журналам в последнее время, как утверждается, выпущенное Лисиншэ (Обществом активных действий). Заявляя, что есть только название партии, что люди не видят работы партии, их заявление уже получило широкую негативную реакцию и возмездие со стороны оставшихся членов Гоминьдана. По крайней мере, тех, кто еще не в лапах Синерубашечников. И все же с их приходом к власти такие действия были отчасти неизбежны.\n\nСинерубашечники давно восхищались способностью массового движения достигать своих целей, сосредотачиваясь на таких фигурах, как Савинков, Муссолини, Кодряну или Мустафа Кемаль. И все же их предполагаемое отбрасывание Принципов и Старой партии — это не злоба, по крайней мере, так они утверждают, а стремление к действию вместо идеологии. Сам Лю Цзяньцюнь продолжает спорить и писать о том, как каждое успешное революционное движение на самом деле основывалось на Трех принципах. Даже если они не говорят о Саньминьчжуи, внешне их лозунги и предложения могут отличаться, но их явные действия соответствуют тому, что предписал доктор Сунь."
 YUN.endgame.081.a: "Новые принципы для Новой эпохи."
 YUN.endgame.081.b: "Это граничит с богохульством!"

 YUN.endgame.082.t: "Зажигая пламя молодежи Китая"
 YUN.endgame.082.d: "Следуя своему желанию видеть, как Национальная революция Китая полностью превращает коррумпированное государство старого образца в современную нацию, ничто не избежало взгляда или трансформации Синих рубашек. Даже молодежь, будущие поколения. Ибо обеспечить Революцию Синерубашечников для этого поколения недостаточно, ибо новое поколение должно быть индоктринировано Принципами. И так следует создание Движения национального военного образования.\n\nЧтобы преобразовать систему образования, нужно сначала милитаризировать ее, чтобы учителя и ученики будущего обучались и учились быть бойцами в решающем конфликте. Школы должны быть организованы сродни военным полкам, с учителями, преподавателями и школьными администраторами, принужденными к обязательной военной подготовке и загнанными в скромную, спартанскую и дисциплинированную жизнь армии.\n\nЧто касается самих учеников, индоктринация начнется в детском саду, детям будут давать ружья и военные корабли в качестве игрушек, а на стенах будут развешаны картины сражений. В подростковом возрасте они будут зачислены в группы бойскаутов с сильным военным костяком, и особый упор будет сделан на физическую подготовку и групповые спортивные соревнования. Наконец, в подростковом возрасте они начнут формальную военную подготовку.\n\nВ самой учебной программе физика, химия и инженерия будут ориентированы на их применение в военное время. Ядовитый газ, взрывчатка — ничто не запрещено. С учениками, обязанными отбывать сроки в реальных профессиях, новый Китай увидит, как слабовольные интеллектуалы и их презрение к физическому труду будут брошены в огонь. На их пепле каждый в новом обществе будет полезным, продуктивным членом нации."
 YUN.endgame.082.a: "Революция строится на ее последователях"
 YUN.endgame.082.b: "Пусть дети остаются детьми."

 YUN.endgame.083.t: "Темные щупальца ковена Синерубашечников"
 YUN.endgame.083.d: "Поистине, Гоминьдан и Партия прошлого неправильно понимали лучший метод проведения массовой организации и истинного осуществления воли этих масс. Ибо сама Партия прогнила изнутри. Ибо Партия стала ненавистной. Ибо Партия не принесла ничего, кроме провала и ложных заявлений о величии и преуспевании в исполнении желаний доктора Суня. Предательский Центральный комитет Ван Цзинвэя, зараженный социалистическими махинациями, и изгнанный Комитет Ху Ханьминя, полный старых дураков, цепляющихся за прошлое.\n\nВ эту новую эру Партии только Синерубашечникам можно доверить ответственность за руководство курсом нации. И для этих целей Синерубашечники должны быть организованы. И тщательно. Хотя Центральный исполнительный комитет (ЦИК), состоящий из семнадцати человек, действительно останется, должна быть организация, стоящая выше даже них.\n\nПо желанию Лю Цзяньцюня будет создан внутренний круг, Лисиншэ. Совет выше формальностей и бюрократии, даже ЦИК. С Тэн Цзе, выступающим в качестве его Линсю (Вождя), организация будет построена вокруг единственного верховного лидера.\n\nНа нижних ступенях ЦИК будет включать постоянный комитет из пяти человек во главе с исполнительным секретарем, секретариат с четырьмя отдельными функциями: общие дела, пропаганда, организация и специальные службы. Ниже ЦИК будет находиться Ассоциация юных товарищей под руководством Лю, отвечающая за набор новых членов и проникновение в гражданское население. Еще ниже — Фусиншэ (Общество возрождения), массовая база организации.\n\nЕстественно, создание такой тайной партийной структуры вызвало особую критику, причем некоторые голоса раздавались даже внутри самих Синерубашечников. Поскольку некоторые «умеренные» голоса выступали за выравнивание власти между Центральным исполнительным комитетом и Лисиншэ, они получили в конечном итоге незначительную поддержку внутри партии. Достаточную, чтобы, по крайней мере, заставить Тэн Цзе передумать, однако Лю Цзяньцюнь настаивает, что только Лисиншэ может вести нацию вперед."
 YUN.endgame.083.a: "Примат Лисиншэ!"
 YUN.endgame.083.b: "Поддержать Центральный исполнительный комитет."

 YUN.endgame.084.t: "Возрождение китайской культуры"
 YUN.endgame.084.d: "На протяжении всего бурного развития китайского национального государства его национальная культура и характер также переживали бедствия, реконструкцию и смену исторических тенденций. И все же это не принесло его народу ничего, кроме разрухи, упадка, коррупции и несчастья. Взгляды китайского общества современной эпохи охватывают две крайности континуума. Вместо того чтобы быть движимыми чувствами патриотизма или национализма, китайцы мотивированы индивидуализмом, семейными узами и клановыми связями с одной стороны, и утопическими идеалами космополитического декаданса с другой. Достаточно сказать, что ни одна из крайностей не способствует развитию истинного национализма.\n\nТрадиционалистская автократия семьи и старейшин клана сама по себе стала институционализированной, поскольку она служит интересам сохранения феодального правления в стране. И к их выгоде, Братство людей, или Датун, из конфуцианства сделало слабых интеллектуалов нации слишком привязанными к таким концепциям. Хуже того, китайцы позаимствовали материализм и индивидуализм у Запада. Они почти полностью заменили самореализацию индивидуальными правами и свободами, сделав материальные удовольствия своей главной заботой.\n\nИ поэтому бремя культивирования новой китайской культуры ложится на Партию и Синерубашечников. Ибо культурный контроль является сутью социальной, политической, образовательной и, по сути, всей деятельности в стране. Это сама душа национального восстановления. Он обладает мистическим качеством, которое заставляет всех неосознанно находиться под его контролем. И задача Синерубашечников — обуздать эту силу."
 YUN.endgame.084.a: "Уничтожить декаданс Запада!"
 YUN.endgame.084.b: "Сосредоточиться на создании культуры контроля для масс."

 YUN.endgame.085.t: "Мечты о Священной и Верховной Нации"
 YUN.endgame.085.d: "Действительно, может быть написано, что революционный участник, аскетичный приверженец, движимый своим и ее пламенным рвением антиимпериалистической ярости и преданный принципам покойного премьера, в этом новом Китае «никогда не станет богатым и никогда не будет голодать». Действительно, Верховный лидер китайской нации Тэн Цзе приведет Китай к состоянию общества, которое еще не было зафиксировано в литературной истории. Общество, свободное от полной дегенеративной грязи либерализма и разрушенного единства классовой борьбы, которая долгое время разделяла китайский народ.\n\nТоварищи, смотрите только на изотовцев Савинкова или отряды Железной гвардии Кодряну. Посмотрите на силу, которую они сплачивают, принося национальное возрождение, полное пренебрежение к бессмысленным отбросам жизни, таким как демократия, либерализм и социализм. Должна быть полная приверженность принципам национал-популизма, полная вера и доверие к линсю (вождю) и стремление к истинно свободному миру, где мужчина и женщина могут обрести истинную свободу в своих неустанных жертвах ради нации.\n\nСледующие шаги революции не обязательно будут легкими. Есть грязные корни и щупальца, которые нужно вырвать, древо революции действительно нужно снова и снова поливать кровью предателей, которые стремятся осквернить его. Должна быть концептуализирована новая культура, культура, свободная от коррумпированных недугов западного декаданса, но та, которая восходит к нашему собственному славному прошлому. Из такого прошлого, с порядком, уважением и благочестием, мы будем стремиться к еще более блестящему будущему.\n\nПока этот день не наступит, пусть воля Верховного лидера, инструмента революции Лисиншэ и воля Нации будут исполняться вечно."
 YUN.endgame.085.a: "Нация и лидер, верховные и священные!"

## CC Clique Shared (100-119) ##

 YUN.endgame.100.t: "Пробуждение Новых правых"
 YUN.endgame.100.d: "Когда-то Гоминьдан был партией Китайской революции. Когда любимый вечный премьер отчаянно пытался заручиться поддержкой угасающего пламени революции в 1920 году, именно чжэцзянские элементы партии с Чаном Кайши, Дай Цзитао, Чэнь Гофу и Чжан Жэньцзе отчаянно продолжали революционную работу в форме управления акционерным предприятием для сбора средств на дело революции. Пусть помнят, что когда партия была инфильтрирована контрреволюционерами и социал-империалистическими агентами Третьего Интернационала, именно Дай и его последователи призывали Гоминьдан вернуться к своим истинным родным корням как Китайской националистической партии, партии, основанной на моральном этосе Китая.\n\nСтрана опустошена годами внутренних гражданских распрей, иностранного империализма и разрушениями Второй японо-китайской войны, но амбициозные так называемые «Новые правые» Партии полны решимости переориентировать партию на революционную реорганизацию. Дай и его лидеры-протеже в так называемой «Клике CC» планируют реформировать все китайское общество в сторону, сродни легистской манере династии Цинь. Ибо если Китай хочет возродиться, он должен принять модернизацию, но также не должен забывать о моральной целостности нации, которая делала ее сильной на протяжении веков.\n\nСидя в своем кабинете с зажженной сигаретой в руке, Дай смотрит вверх над своим креслом на портрет покойного доктора Суня. Действительно, он размышляет про себя, что в будущие годы его могут рассматривать как следующего Ито Хиробуми. Однако, чувствуя острую боль в груди, он также задается вопросом, не следует ли ему уйти в отставку и доверить будущее революции в руки своих энергичных последователей, Чэнь Гофу и Чэнь Лифу. Быстро проглотив еще одну обезболивающую таблетку, отставка может означать шаг назад от суматошного мира партийной политики и шанс сосредоточиться на изучении буддизма и Четверокнижия. Но в новый яркий час Китая разве не пришло время истинному приверженцу революции встать у руля?"
 YUN.endgame.100.a: "Пришло время начать подготовку к новой эре!"
 YUN.endgame.100.b: "Пришло время готовить преемника..."

 YUN.endgame.101.t: "Оппозиция растет"
 YUN.endgame.101.d: "Несмотря на настояние вечного премьера на периоде революционных реформ под руководством опеки, еще с первых дней Синьхайской революции, до того как пессимизм проник в политическую мысль Гоминьдана, сам Дай Цзитао верил, что республиканизм заключается в верховенстве закона. По мере того как организация Гоминьдана росла и росла, и вместе с ней в партию входило все больше дегенеративных элементов, Дай продолжал настаивать на сохранении номинального разделения властей партии, даже если он способен пожертвовать индивидуальными свободами ради общественного порядка.\n\nС момента захвата власти Новыми правыми Партия снова оказалась в запутанном беспорядке, поскольку реакционные элементы вошли в правительство при нехватке квалифицированного персонала в бывших элементах Гоминьдана в Юньнани. Либеральные оппортунисты, члены зарождающейся оппозиции в Демократической лиге Китая, а также критика со стороны Старых правых, генералов-милитаристов и левых продолжают озвучивать свои опасения и несогласие с режимом президента Дая.\n\nДля его близких доверенных лиц одним из его предварительных шагов по укреплению нового режима будет чистка партийной фракционности, которая, по мнению Дая, является постоянно растущим деревом разобщенности, поливаемым коррупцией и национальной слабостью. При надежной поддержке Центрального комитета был принят исполнительный указ, заставляющий членов партии, которые либо дрейфовали, либо дистанцировались от Гоминьдана в 1911 году, перерегистрироваться со строгими экзаменами на их характер, понимание партийной политики и теорий Суня. Новые члены отныне подлежат аналогичной проверке, и в то же время им предоставляется только временное членство."
 YUN.endgame.101.a: "Партия будет очищена от оппортунистов, бандитов и милитаристов!"
 YUN.endgame.101.b: "Социалисты и смутьяны будут разогнаны!"

 YUN.endgame.102.t: "Ожесточенные офицеры"
 YUN.endgame.102.d: "Во время долгого изгнания Правых в Юньнань партийные лидеры Дай Цзитао и Чэнь Гофу всегда умудрялись играть дружественную роль в сложных отношениях между военным и гражданским крыльями Гоминьдана. Китайская революция, в конце концов, была определена военными успехами, но в соответствии с принципами, изложенными доктором Сунем, время военного правления должно было закончиться периодом политической опеки. Будучи давними союзниками высшего руководства Вампу, лидеры Новых правых теперь переживают напряженные отношения с военными.\n\nУход Хэ Инциня из политики вызвал беспорядки и гнев среди военного персонала, которому трудно смириться с гражданским доминированием над военными делами. Ходят слухи, что амбициозные планы реформ Дая предусматривают сокращение военных расходов, роспуск значительной части вооруженных сил (особенно наемников) и подготовку расходов на крупные экономические проекты.\n\nКроме того, в клике Вампу есть и те, кто откровенно обеспокоен уходом генералиссимуса из политики, оказываясь все более оттесненными на второй план перед лицом политического оппортунизма со стороны членов клики CC. В их вакууме клика Гражданского строительства и Общество синих рубашек, по-видимому, перехватили влияние военных, что является предостережением для гражданской администрации Гоминьдана не пренебрегать интересами Национально-революционной армии."
 YUN.endgame.102.a: "Партия должна ужесточить контроль над всеми вопросами, включая военные."
 YUN.endgame.102.b: "Вампу всегда защищала партию и будет продолжать это делать."
 YUN.endgame.102.c: "Иногда лучше знать свое место и избегать неприятностей."

 YUN.endgame.103.t: "Беды национализма"
 YUN.endgame.103.d: "Чэнь Лифу, Чжан Даопань и Дуань Сипэн — мускулы клики CC в Комиссии по национальной реконструкции, и они усердно работали над тем, чтобы поставить крупные корпорации и профсоюзы под контроль националистов. Чэнь Лифу цитировали, когда он говорил, что «простое копирование западных капиталистических или социалистических способов ведения дел при отрицании ценности китайской культурной традиции не может сделать Китай сильным!»\n\nБывший горный инженер в Скрэнтоне, его образование в Соединенных Штатах открыло ему жестокие реалии эксплуатации, и он присоединился к профсоюзу, возглавляемому Джоном Л. Льюисом, во время забастовки, прежде чем его отозвали домой. В то же время он также был впечатлен американской системой управления с ее акцентом на практичность и эффективность. Каждая фаза рабочего процесса тщательно изучалась, и шахтеры могли предлагать предложения, которые компании принимали, а иногда даже вознаграждали за них.\n\nОднако в Китае все совсем иначе. В стремлении Гоминьдана утвердить китайский контроль над экономикой произошел значительный отток капитала иностранных инвесторов и экспертов, покидающих крупные заводы и инфраструктуру. Цепочки поставок были нарушены хаосом, и вкралась коррупция, поскольку контроль взяли на себя неквалифицированные или нечистые на руку чиновники. Даже китайские граждане неохотно инвестируют в эти условия, особенно учитывая строгие требования, предъявляемые к ним новой администрацией.\n\nЧэнь сетовал, что в то время как американцы практиковали индивидуальную ответственность на каждом уровне, этот тип эффективности еще не был возможен в его стране. В то время как в США каждый уровень отчитывался перед вышестоящим, и каждый человек выполнял свою часть рабочего процесса, подчеркивая практические результаты, в Китае, как он утверждает, все, что можно было сделать за день, занимало два или три дня, как будто чтобы доказать, что занятой человек не может закончить свою работу вовремя. «Этот менталитет пустой траты времени и пренебрежения работой был распространенной болезнью во всех правительственных учреждениях Китая», — что он клянется изменить."
 YUN.endgame.103.a: "Мы продолжаем, принося национальный миньшэн всем!"
 YUN.endgame.103.b: "Нам нужна большая прозрачность, чтобы уменьшить коррупцию."
 YUN.endgame.103.c: "Возможно, стоит смягчить подход в экономических вопросах."

 YUN.endgame.104.t: "Предложение по земельной реформе"
 YUN.endgame.104.d: "Являясь частью Основ национальной реконструкции покойного доктора Сунь Ятсена, земельная реформа остается одной из самых популистских мер Гоминьдана — платформой, из которой Партия черпает свою национальную легитимность как истинная революционная партия для освобождения угнетенных масс к славе национального спасения. Не секрет, что вопрос земельной реформы остается спорным, поскольку и левое, и правое крыло Партии раскололись по идеологическим линиям относительно ее реализации.\n\nПосле того как контроль Новых правых над партийной линией был обеспечен, Партия теперь прислушивается к двум своим главным идеологам Дай Цзитао и Чэнь Лифу в отношении земельной реформы. Исполнительный комитет Комиссии по реконструкции национального правительства создал Национальный департамент земельной реформы, возглавляемый политиками Чжан Лишэном и Чжан Даопанем, которые пообещали народу, что Партия выполнит утомительную задачу национальной земельной реформы.\n\nПолагая, что будущее страны заключается в ее быстрой индустриализации, Дай Цзитао высказал мнение, что Партия должна вместо этого сосредоточиться на инвестициях в индустриализацию прибрежных развитых районов страны, что подстегнет экономическое развитие в сельской местности. Его политика, которой аплодировали члены дворянства и класс землевладельцев, настаивает на сохранении земельной автономии провинций, а не на государственном вмешательстве.\n\nКак генеральный секретарь Исполнительного комитета Комиссии по реконструкции, Чэнь Лифу высказался за необходимость обширной земельной реформы под тщательным государственным надзором. В отличие от подхода невмешательства Дая, Чэнь утверждал, что правительство должно взять на себя инициативу и взяться за эту трудную задачу через тщательные линзы государственной бюрократии, чтобы минимизировать коррупцию и повысить эффективность правительства во внутренних делах."
 YUN.endgame.104.a: "Дай прав, мы должны сначала сосредоточиться на индустриализации страны."
 YUN.endgame.104.b: "Предложения Чэнь Лифу по расширению верны."

 YUN.endgame.105.t: "Новая культура"
 YUN.endgame.105.d: "В годы, последовавшие за успехом Синьхайской революции, яркая волна новых мыслей, философий и идей пришла из стран Запада в Китай. Философы и интеллектуалы, такие как Чэнь Дусю и Ху Ши, приветствовали Движение за новую культуру как выход из жестокого мира милитаризма. Западная культура приветствовалась как исправительный источник для теперь уже устоявшейся пассивности и иррационализма китайской культуры. Консервативные мыслители, такие как Лян Шумин, не согласились, заявив, что западные философии несовместимы с китайской культурой, и эту точку зрения поддержал Чжан Цзюньмай.\n\nХотя изначально он согласился с попытками революционизировать национальную культуру, доктор Сунь Ятсен в конечном итоге счел это движение непатриотичным. Он провозгласил, что Гоминьдан является хранителем китайской морали и нации, и его последователи, такие как Дай Цзитао, вскоре последовали его примеру. Это стало основой Движения за новую жизнь, неоконфуцианской контратаки. Проповедуя, что грядет новая эра, мыслители «Новой жизни» ссылались на конфуцианские идеи коллективной жизни (гуншэн) и утопическое видение мирового единства (датун). Возрожденное моральное сообщество и человеческая деятельность должны были породить эту грядущую эпоху человеческой цивилизации.\n\nЧэнь Лифу — поздний участник дискуссии, обученный быть гибким пропагандистом партии. Обвиняя все, что не основано на конфуцианских моральных учениях, в синдикализме, его лекции в Центральном политическом институте сочетали западную виталистическую философию, традиционную китайскую космологию, почерпнутую из Ицзин (Книги Перемен), Дасюэ (Великого учения) и Чжунъюн (Учения о середине), а также учения доктора Суня и Дай Цзитао. В то время как многие в Партии рассматривают Движение за новую культуру как в конечном счете необходимый компонент Китайской национальной революции, безусловно, есть и те, такие как последователи Дай Цзитао, которые считают, что страна должна вернуться на свой конфуцианский путь. Растущее число молодой гвардии в интеллигенции партии предлагает инкорпорировать конфуцианство и концепцию витализма для слияния западной и китайской философий с целью создания истинной гибридной революционной культуры."
 YUN.endgame.105.a: "Необходима революция против старой культуры!"
 YUN.endgame.105.b: "Страна ищет Новую жизнь, а не Новую культуру."
 YUN.endgame.105.c: "Гибридная революционная культура — это то, что спасет Китай."

 YUN.endgame.106.t: "Черное сердце Белого солнца"
 YUN.endgame.106.d: "В 1911 году философ поздней Цин Ли Цзунъу описал феномен так называемой «Теории толстого и черного». В этом трактате он описал современную интерпретацию традиционного философского китайского дискурса о цветах — описывая силы безжалостности и скрытого, метафорическую аллюзию на тех, кто правит из тени, но с полным и авторитетным злом. Черный цвет напоминает людям о силах подполья, о тех, кого не обязательно видят, и вызывает образ организованной преступности и Триад.\n\nВ старые революционные дни разница между гангстером и революционером была очень тонкой. Оба были в основе своей братскими, «организованными преступниками», пытающимися уклониться от властей и имеющими дело с оружием, контрабандой людей и информацией. Ситуацию усложняет то, что даже известные лидеры банд часто были искренне националистическими и республиканскими. Временами грань между черными силами, пронизывавшими общество, и героическими мучениками революции казалась все более размытой.\n\nСтарое Общество революционных товарищей Чжэцзяна часто тесно сотрудничало с преступным миром Шанхая, таким как Зеленая банда, даже если в наши дни как члены партии и политики они настаивают, что никогда не были формальными членами. В разрушительной травме, которой стала провалившаяся Вторая революция, Дай Цзитао, Чэнь Цимэй и Чан Кайши делали все, что должны были делать, чтобы выжить во время революции. Поскольку китайская политическая культура ставит личное доверие и связи превыше всего, неудивительно, что многие люди с сомнительной репутацией нашли свой путь в правительство, где доминирует клика CC.\n\nИскоренение коррупции будет нелегкой задачей. В правительстве много голосов: тех, кто находится в парламентских залах Законодательного юаня, и тех, кто скрыт во тьме общества. В то время как президент Дай открыто выразил свое желание видеть правительство полностью очищенным от коррумпированных элементов, более молодые члены партии, включая Чэнь Лифу, высказались за сдержанность и такт, чтобы избежать последствий политического скандала, связанного с коррупцией, кумовством и жадностью. Более того, они утверждали, что силы тьмы могут быть фактически использованы правительством для подавления и сдерживания диссидентских и непокорных голосов."
 YUN.endgame.106.a: "Необходимо расследование криминальных элементов партии."
 YUN.endgame.106.b: "Связи с тьмой необходимы для стабильности этой нации."

 YUN.endgame.107.t: "Китайский Голливуд"
 YUN.endgame.107.d: "Вдохновленные грандиозными картинами, проводимыми в Париже в память о социалистическом революционном деле, или расцветающей российской киноиндустрией, прославляющей зрелищную природу ССРС, доминирующие фигуры клики CC, Чэнь Лифу и Гофу, упомянули о необходимости Гоминьдана достучаться до масс через современные СМИ. Культура и искусство, утверждает старший Чэнь, должны демонстрировать красоту и блеск китайской цивилизации, одновременно поддерживая обязанность Партии наставлять и направлять массы в Трех народных принципах.\n\nХотя фильмы и искусство политического характера традиционно находились под контролем левых политических сил, доминирование Новых правых привело к тому, что практически каждый левый режиссер, актер или актриса подверглись цензуре под новым тщательным партийным контролем. Под руководством популярного драматурга Чжан Даопаня, председателя Ассоциации китайских художников, в Нанкине была создана новая Национальная школа драмы для популяризации китайской оперы и классической музыки в противовес дегенеративной западной музыке, процветающей в Посольских городах. Поскольку новые кинематографисты, такие как Чжу Шилинь, возглавляют возрождение китайского кино после массового порицания левых художников, сами братья Чэнь организовали Ассоциацию кинообразования для вручения ежегодных призов трем самым выдающимся фильмам на основе их образовательного содержания и преданности национальному патриотизму."
 YUN.endgame.107.a: "Пойдем в кино!"

 YUN.endgame.108.t: "Указ о праве и гуманитарных науках"
 YUN.endgame.108.d: "В рамках Национальной реконструкции одной из фундаментальных целей национальной революции было оживление образования в Китае, расширение образовательных усилий за пределы простого изучения западной современности, а также воспитание нового поколения революционной молодежи. Дух образовательной современности был одним из первых крупных шагов реформы еще до Гоминьдана; педагоги, такие как Цай Юаньпэй, стремились породить новое поколение революционно настроенных интеллектуалов, преданных возрождению Китая.\n\nОднако премьер Чэнь Гофу предложил принять спорный закон, который сократил бы финансирование и закрыл бы факультеты права и гуманитарных наук в китайских университетах на следующие десять лет. В течение этого десятилетия правительство затем установило бы квоты на количество выпускников, необходимых в сельском хозяйстве, инженерии и медицине, — в конечном итоге утверждая, что количество студентов в технических областях должно быть значительно увеличено по сравнению с теми, кто работает в юридических областях.\n\nЭтот шаг вызвал значительные споры в китайском академическом мире и даже внутри клики CC. Многие члены клики CC, такие как Чжу Гуанцянь, имеют интеллектуальное и образовательное прошлое. Дуань Сипэн, первый президент Студенческой федерации Китайской Республики и глава исторического факультета Университета Сунь Ятсена, историк Ло Цзялунь и председатель Ассоциации китайских художников Чжан Даопань присоединились к этому призыву. Чжу Гуанцянь, в частности, зашел так далеко, что заявил, что Партия не должна вмешиваться в гражданское образование.\n\nКонечно, ирония заключается в том, что те, кто входит в клику CC, действительно придерживаются идеалистической формы китайской традиционной истории, а также легистских принципов, которыми руководствовалась первая империя Цинь. И, конечно, возникает вопрос: если нет юристов, которые защищали бы и интерпретировали законы для граждан; и если нет историков, которые защищали бы и преподавали историю народу, — то кто на самом деле знает правду в стране?"
 YUN.endgame.108.a: "Чэнь продавливает — указ принят."
 YUN.endgame.108.b: "Может быть, отложим это в долгий ящик пока что."
 YUN.endgame.108.c: "Они правы, партия не должна вмешиваться."

## Dai Jitao Exclusive (120-139) ##

 YUN.endgame.120.t: "Революционная мудрость и революционные труды"
 YUN.endgame.120.d: "На протяжении многих лет многие утверждали, что поняли сложную диалектическую работу покойного Вечного Премьера, но никто из них не смог достичь гениальности и понимания Трех народных принципов лучше, чем Дай Цзитао. Безусловно, идеология партии была разбавлена фиаско милитаристских офицеров и марксистски ориентированных контрреволюционеров. Но, наконец, мы, возможно, достигли истинного понимания Национальной революции; ибо только при президенте Дае, который может по праву называть себя Апостолом Культурной революции.\n\nНедавно опубликовав то, что должно стать и партийной доктриной, и его мемуарами, Президент недавно закончил свой магнум опус: «Революционная мудрость и революционные труды». По данным Министерства образования, это обязательная литература для того, чтобы способствовать пониманию и осмыслению принципов Нового Китая новой революционной молодежью.\n\nВ ней Дай умоляет своих читателей взглянуть на революционеров прошлого и понять их успехи и неудачи. Он пишет: «Мы должны стремиться к прогрессу и решать проблемы, имея доктрину в качестве нашей цели. Но мы не должны забывать об исторической и космополитической миссии, которая простирается с древних времен до наших дней, от Китая до мира». Действительно, в своих вступительных и заключительных замечаниях Дай провозглашает, что Три народных принципа являются пиком кристаллизации революции, что она отвергает марксизм и либерализм и провозглашает новую совершенно уникальную идеологию, посвященную сохранению китайской расы.\n\nДействительно, должно быть так, что только Дай Цзитао может считаться истинным апостолом воли Покойного Премьера для нации."
 YUN.endgame.120.a: "Вечные слова для новой славной эпохи."

 YUN.endgame.121.t: "Религии и задача национального спасения"
 YUN.endgame.121.d: "Как великая страна с множеством вероисповеданий, простирающихся не только от исконных китайских народных религий, но и от ислама, христианства и буддизма (который имел иностранное происхождение, но был принят в различных сектах и верованиях по всему Китаю), вопрос религии неизбежно возник с доминированием Новых правых. Хотя многие из первоначальных членов партии, включая Сунь Ятсена и Чан Кайши, были явными приверженцами христианской веры, вопрос религии, как правило, избегался ради национального единства.\n\nПрезидент Дай, набожный буддист с момента раннего обращения, изменившего его жизнь, выразил свою поддержку нации, основанной на добродетели, рыцарстве и морали. Он утверждает, что, хотя религию нельзя принимать некритически, нельзя ни противостоять ей, ни отбрасывать ее с порога, единственный оставшийся курс — работать над ее реформированием, чтобы она могла объединить китайский народ. Его личный путь с буддизмом, от его раннего обращения до его нынешнего лидерства, связывает его убеждения и ценности с убеждениями и ценностями нации, вдохновляя новую волну морального лидерства.\n\nЧтобы сделать больший акцент на религиозном соблюдении, Партия официально начала соблюдать буддийские праздники с такой же строгостью, как и праздники 10 октября (в память об Учанском восстании), даты рождения и смерти вечного премьера доктора Сунь Ятсена и смерти 72 мучеников в Гуанчжоу. Школьные собрания и публичные встречи должны часто посещаться монахами и религиозными ораторами с целью продвижения морально правильного образования для будущей молодежи Китая.\n\nКроме того, Министерство по делам Монголии и Тибета официально продвигает тибетскую веру тибетского буддизма Махаяны, которую исповедуют в Тибете, Монголии и Бутане. Хотя китайский язык, конечно, остается официальным языком и письменностью для использования в общественных местах, Министерство официально заявило, что тибетский язык может использоваться в религиозных практиках и что изучение тантрических текстов должно поощряться и защищаться национальным законодательством."
 YUN.endgame.121.a: "Мусульманин, буддист, христианин — мы ищем истинно моральную и честную нацию."

 YUN.endgame.122.t: "Буддийский национализм"
 YUN.endgame.122.d: "С момента вхождения в китайские народные религии в эпоху династии Тан почитание Будды пережило в Китае как ренессанс, так и падение. Со времени антиманьчжурского восстания тайпинов буддизм переживает устойчивый упадок — многие ханьские националисты рассматривают его как чужеродный и некитайский. Тем не менее учения Будды по-прежнему остаются популярными среди китайской интеллигенции, причем некоторые предлагают, чтобы буддизм сохранил свою силу и гегемонию в культурных кругах, а не на политической арене.\n\nДля президента Дая, который утверждал, что был спасен Буддой во время неудачной попытки самоубийства, буддизм вполне может стать ключом к национальному спасению в форме «буддийского национализма». Когда он упал в реку, он утверждал, что его поднял поток святого буддийского света, который принес его в руки рыбака. Эта замечательная встреча связала его с понятием общего националистического сознания между божествами наверху и обычным китайцем, преодолевая разрыв между божественным и обыденным. Вдохновленный японскими реформами буддизма от народной религии к религии, прививающей дух самопожертвования в феодальной Японии, Дай считает, что доктрина морали, добродетелей и аскетизма буддизма — это то, что необходимо для того, чтобы обратить вспять десятилетия морального вырождения по всему Китаю.\n\nВ отличие от традиционных народных религиозных верований, таких как поклонение предкам и местным божествам, которые Дай называет «суевериями», Дай утверждает, что буддизм укрепит волю народа, так что жертвы любого рода могут быть стимулированы. Только через реформацию буддизма как духовного меча и щита нации китайские граждане пожертвуют своими жизнями во славу и святость нации, подобно Бодхисаттвам древности; мужчины и женщины станут Гуаньинь и Вэньшу этого века."
 YUN.endgame.122.a: "Мы стремимся к вечной нирване."

##Chen Lifu Exclusive (140-159)
 YUN.endgame.140.t: "Сияющее будущее"
 YUN.endgame.140.d: "С момента своего восхождения на пост президента Китайской Республики Чэнь Лифу часто проводил долгие часы в своем кабинете, мечтая и планируя грядущие дни. Наконец-то революция, ради которой работали два брата Чэнь и их наставник, достигла стадии завершения.\n\nРазмышляя о будущем Китая, он записывает в своем дневнике свое твердое убеждение, что новое китайское государство превзойдет любую нацию, которая могла быть до него. Новое государство обладает как ответственностью опекуна за всех своих граждан, так и технологическим ноу-хау для создания по-настоящему современного, но морального общества. Сочетая моральные добродетели Востока и технологические пути Запада, действительно можно было спроектировать и способствовать возрождению китайской расы и цивилизации.\n\nОн улыбается, записывая свои оставшиеся мысли о том, что этот новый Китай будет тем, что он называет Сияющим будущим. Китай, организованный от провинции к провинции, от округа к округу, от деревни к деревне в форме моральных сообществ. Люди будут разделять общую обязанность служить государству и своим семьям, скрепленные комфортом любви и убежища — со всеми моральными недугами и пороками, отброшенными в пользу нового, праведного, развитого класса личностей, которые будут служить примером революционного сознания. Вместе они будут стремиться не только к продолжению Националистической революции, но и к миру общих ценностей и целей..."
 YUN.endgame.140.a: "Пусть лучи Белого солнца сияют вечно."

 YUN.endgame.141.t: "Грандиозная отставка"
 YUN.endgame.141.d: "Слухи о том, что Дай Цзитао готовится уйти в отставку, циркулировали вокруг [ROOT.Capital.GetCapitalVictoryPointName] в течение нескольких месяцев, и это было окончательно подтверждено несколько недель назад, когда президент Дай подал прошение об отставке в Центральный исполнительный комитет.\n\nДальнейшие спекуляции о его преемнике изобиловали, пока ЦИК заседал за закрытыми дверями. Ведущими кандидатами были Чэнь Лифу, Чэнь Булэй, а некоторые шептались о возможности военного кандидата. Однако в конце концов послание, стоящее за выбором Дай Цзитао преемника, было безошибочным — его молодой, пламенный протеже Чэнь Лифу станет президентом. Примерно на десять лет моложе, но уже имеющий послужной список работы с другими ведущими фигурами, такими как Чан Кайши, Ху Ханьминь и Сунь Фо, выбор Дая указывает на его желание передать бразды правления следующему поколению, тому, которое сражалось во время Северного похода, а не в Синьхае. Его выбор также укрепляет гражданское руководство партии, заканчивая долгое правление военного доминирования справа.\n\nВ поддержку кандидатуры своего брата Чэнь Гофу ушел с поста премьера, чтобы избежать видимости непотизма. Ожидается, что Чэнь Булэй (не родственник), интеллектуал, близкий к Даю, будет назначен на его место в качестве твердой руки за Исполнительным юанем. Ожидается, что восхождение Чэня ознаменует эпоху более коллективного руководства, а не стиля партийного сильного человека, который существовал со времен доктора Суня, но было бы неразумно сбрасывать со счетов многочисленные идеи, которые есть у самого молодого человека.\n\nВ честь Дая и Чэня была устроена грандиозная церемония, даже когда первый пошутил во время своего тоста, что он не собирается уходить в ближайшее время. Действительно, ожидается, что оба сохранят свои позиции в ЦИК, даже когда Дай намерен в основном уйти из общественной жизни, размышляя о том, чтобы посвятить больше времени изучению религии или занять преподавательскую должность в Университете Сунь Ятсена."
 YUN.endgame.141.a: "Троекратное ура двум Чэням!"
 YUN.endgame.141.b: "Мы будем скучать по вам, Президент Дай!"

 YUN.endgame.142.t: "Главная задача человеческой эволюции"
 YUN.endgame.142.d: "В написании собственных теорий по философии Чэнь Лифу создал свою собственную интеллектуальную ориентацию, свою доктрину витализма. Чтобы представить сложную диалектику, Чэнь сначала вводит концепцию, что цель человечества — доминировать над вселенной и природой; все естественные вещи попадают в естественную иерархию духовных и материальных качеств.\n\nОн отвергает утверждение Анри Бергсона о том, что выбор имеет решающее значение для прогресса, утверждая, что человечество не может справиться со свободой — чрезмерная свобода способствует социальному конфликту, и человек должен сосредоточиться на эффективности. Витализм — это решение проблемы избыточного потребления и свободы. Витализм происходит из собственного изучения Чэнем традиционной китайской медицины и западной философии, утверждая, что виталистические элементы составляют всю материю. Эти элементы являются мельчайшими, самыми фундаментальными вещами во вселенной, но они составляют части всего, в его собственной претензии на предложение научной теории — Чэнь переопределил атом и материю в манере, сродни теории энтелехии Ганса Дриша. Если это так, то партия, состоящая из людей, несет в себе витализм — витализм, таким образом, должен быть усилен внутри членов партии, чтобы улучшить естественную человеческую эффективность.\n\nИменно с этой идеей он зашел так далеко, что сказал, что для тех, кто не вносит вклад в общество, может быть полезно умереть, поскольку они просто потребляют ресурсы. Для Чэня именно те, кто достоин, кто несет в себе эти компоненты сильного витализма, являются естественными предшественниками окончательной эволюционировавшей формы человечества."
 YUN.endgame.142.a: "Это судьба нашего вида?"

 YUN.endgame.143.t: "Возрождение китайской медицины"
 YUN.endgame.143.d: "Традиционная китайская медицина (чжунъи) — это практика альтернативной медицины, основанная на традиционной медицине в Китае. Практики традиционной китайской медицины включают оздоровительные и лечебные практики, конфуцианскую философию, диету, упражнения, иглоукалывание и различные школы мысли. Эти формы целостного исцеления давно практикуются китайцами, причем некоторые из самых ранних работ по восточной терапевтической деятельности датируются династией Шан (XIV-XI века до н.э.).\n\nТрадиционная медицина отвергает западные практики, такие как инъекции, хирургия и фармацевтические препараты; скорее, она опирается на концепции, призывающие каналы циркуляции, «ци» человека и исследование отношений между божественным, космосом и человеческим опытом. С ростом западных знаний в Китае некоторые более либерально настроенные реформаторы выступали за расширение исследований западной медицины, а не китайской медицины, рассматривая последнюю как плод более архаичного времени.\n\nОднако Чэнь Лифу является давним сторонником традиционной китайской медицины, во многом благодаря развитию его собственных теорий витальности. Как один из основателей Китайского медицинского института (КМИ) как средства объединения лучшего из Запада и Востока. Являясь глубоким отражением его эклектичной идеологии, стремящейся синкретизировать Запад и Восток, КМИ привлекает как западных врачей, так и врачей, обученных традиционной китайской медицине, для обеспечения многоэтапного плана ухода, предоставляя как альтернативные, так и современные средства исцеления. Хотя некоторые из ведущих врачей страны выразили сомнения по этому поводу, учитывая относительно новый срок существования Института, вряд ли можно определить, удастся ли плану Чэнь Лифу действительно создать новую и уникальную ортодоксию в китайских медицинских исследованиях."
 YUN.endgame.143.a: "Какая интересная концепция!"

 YUN.endgame.200.t: "Китайский Термидор"
 YUN.endgame.200.d: "Когда звучат горны и Белое Солнце взмывает над большей частью страны, можно было бы поверить, что юньнаньский Гоминьдан должен быть в восторге. Ибо их мечта, идеалы, которым они посвятили свои жизни, наконец-то достигли своего завершения. Начатый Отцом нации в его настойчивых попытках спровоцировать новый революционный национальный порядок в свете декадентской, дряхлой монархии, мы сумели наконец довести его путешествие до конца. И все же это вряд ли момент триумфа.\n\nВокруг Партии и ее кадров можно наблюдать опустошение, нанесенное нации. Выступая подобно Цай Э до нас, кажется, что судьба, постигшая нацию после Войны в защиту республики, вполне может повториться снова. Поэтому крайне важно, чтобы Партия не оступилась здесь! Китайский народ смотрит на нас в поисках ответов, и мы должны их дать."
 YUN.endgame.200.a: "Народ взывает к Маленькому генералиссимусу!"
 YUN.endgame.200.b: "Брошенные в центр, мы в центре внимания..."

 YUN.endgame.201.t: "Новая партия для новой эры"
 YUN.endgame.201.d: "Временный комитет действий, в его нынешнем виде, изначально не предназначался для того, чтобы быть фракцией Гоминьдана. Нет, он должен был стать новым началом. Новой партией, не скованной неудачами партийного государства в его амбициях объединить нацию. Первоначально провозглашенный как детище Чжан Боцзюня и Тань Пиншаня вскоре после краха Северного похода, судьба прототипа ВКД в конечном итоге была решена приглашением основателями Сун Цинлин и Дэн Яньда к учредительным процедурам. В конечном итоге вытеснив Чжана и Таня как центр движения, ВКД стал Временным комитетом действий Гоминьдана, намеревающимся реформировать партию изнутри.\n\nБыстро разочаровавшись в руководстве Сун и Дэна и подозрительно относясь к Третьему Интернационалу, Тань вскоре покинул основной ВКД, намереваясь создать свое собственное региональное отделение, где он был бы королем. Тем временем Чжан оставался тесно связан с линией Дэн Яньда, в конечном итоге следуя за комитетом до тех пор, пока его не отправили в провинцию Юньнань.\n\nВ параллельном русле мысли другой внутренней оппозиционной фракцией Гоминьдана, возникшей в свете Центрального комитета Ван Цзинвэя, является 10-я армия Национально-революционной армии и ее лидер Чэнь Миншу. Дружелюбный человек, имеющий близкую дружбу с президентом Чжаном, он остался на плаву в новом китайском политическом порядке. В целом выступая против классовой борьбы, он придерживается гораздо более реформистского взгляда на китайский социализм. Конечно, даже в собственном лагере Вана и между ними были несогласные. Гу Мэнъюй и его умеренные из Реорганизованного товарищества или Сунь Фо и фракция Реконструкции.\n\nПытаясь преодолеть политический разрыв для укрепления нации, Чжан искал эти разнообразные группы, чтобы выяснить их готовность к сотрудничеству. Осведомленный о третьих партиях и более демократичный, чем Тань или Дэн и Сун, Чжан также сохраняет традиционно марксистский характер ВКД, по крайней мере, по сравнению с такими, как Гу, Чэнь или Сунь. И поэтому в конечном итоге, кого бы Президент ни привлек на свою сторону, это, по крайней мере, обеспечит уникальную перспективу для Партии и Правительства."
 YUN.endgame.201.a: "Во имя революционного единства, привлечь Комитет Таня."
 YUN.endgame.201.b: "Китайский народ нуждается в противоядии, и Реорганизованное товарищество Гу может его предоставить."

 YUN.endgame.202.t: "Аутсайдеры Гоминьдана в центре"
 YUN.endgame.202.d: "Несмотря на наше триумфальное продвижение, несмотря на наши решительные обещания и несмотря на наши убеждения, нация и Партия по-прежнему опасаются придерживаться клятв тех, кого они рассматривают не более чем аутсайдерами-выскочками, которым улыбнулась Госпожа Удача. Успешно победив Центральный комитет и спася нацию от отправки в проклятое существование под властью революционной тирании, [ROOT.GetRulingParty] вместо этого оказалась брошенной в политическую черную дыру, действуя как ее центр.\n\nДалекие от старого политического истеблишмента и не имеющие национальных верительных грамот, ожидаемых для их нынешнего статуса, периферийные фракции Гоминьдана погрузились, возможно, в свое величайшее испытание. Ибо военная кампания была только половиной битвы, а создание политического фронта при одновременном удовлетворении всегда необходимых требований Партии и населения — это, несомненно, тяжелая битва. Та, которую нужно встретить лицом к лицу, если они хотят выжить."
 YUN.endgame.202.a: "«Ах, ну это усложняет дело»."

 YUN.endgame.203.t: "Конкурирующие экономические требования"
 YUN.endgame.203.d: "Выйдя из Куньмина, провинциальный Гоминьдан только сейчас полностью осознал широкий спектр идеологий в стране. В то время как Юньнань была, возможно, микрокосмом, легко управляемым, по крайней мере сравнительно, вся нация находится в ярости и смятении. Не говоря уже о политическом фронте, экономические ожидания от нового правительства Гоминьдана широко варьируются и далеко идущие.\n\nВыдвигая разные ожидания от [ROOT.GetLeader] и правительства, крестьяне начали требовать немедленной земельной реформы, рабочие просят о расширении прав и защиты, а чтобы противодействовать этому, бизнесмены и дворяне объединяются для защиты своих собственных интересов и стабильности китайских рынков.\n\nБолее того, сама Партия расколота в отношении собственной экономической политики. Ибо многие ортодоксы выступают за тщательное следование национальному капитализму, как предписано доктором Сунем, в то время как другие либералы в Партии настаивают на более западной форме экономики, стремясь прежде всего к экономическому росту. Как бы то ни было, противоядие от экономических бед нации должно быть найдено в ближайшее время..."
 YUN.endgame.203.a: "«Разве вы не видите, с чем мы имеем дело?»"

 YUN.endgame.204.t: "Вакуум власти в провинциях"
 YUN.endgame.204.d: "Из-за обстоятельств гражданской войны в Гоминьдане провинциальная партия никогда не могла по-настоящему создать что-то большее, чем ограниченные или ситуативные администрации в различных китайских провинциях, поскольку все они перешли под контроль [ROOT.GetLeader]. Из-за этого неравенства земли, находившиеся под прямым управлением до начала конфликта, такие как Юньнань и Гуйчжоу, пользуются определенным уровнем сравнительной стабильности и мира. Однако отдаленные провинции или опорные пункты Центрального комитета, такие как Хубэй, Цзянсу, Гуандун и Пекин, демонстрируют легкий уровень практической анархии.\n\nПоскольку гражданская война фактически разорвала любую форму регионального политического управления, различные военные силы, которые сложили оружие и сдались под видом защиты своего провинциального контроля, остаются либо не желающими, либо опасающимися, либо враждебными к тому, чтобы слушать периферийную фракцию Партии, которую многие рассматривают просто как очередного выскочку. Или, что еще хуже, как провинциалов из Юньнани и изгоев, утверждающих полное господство над нацией."
 YUN.endgame.204.a: "И подумать только, мы просто вернули моду на милитаризм."

 YUN.endgame.205.t: "Земельная реформа Нового Гоминьдана"
 YUN.endgame.205.d: "Земельная реформа является одной из самых насущных и самых спорных проблем в современном Китае, имеющей значительные социальные, экономические и политические последствия. Сельская повестка Гоминьдана основана на предложениях Сунь Ятсена «Земля — пахарю», которые стали неотъемлемой частью программы национальной реконструкции партии.\n\nВ этом более ортодоксальном подходе к земельной реформе большинство теоретиков Гоминьдана призывают в первую очередь к ограничению арендной платы за землю, чтобы устранить грабительскую ренту землевладельцев, которую часто требуют в полном объеме даже при плохих урожаях. Эти контракты часто не документируются и обеспечиваются нанимаемым дворянством ополчением, что заставляет многих крестьян влезать в долги. Партия выступала за усиление государственного надзора и регулирования сельских контрактов. Есть также две другие важные опоры программы земельной реформы Гоминьдана.\n\nПервая — это упрощение налогообложения правительством, которое стало все более обременительным и громоздким из-за перекрывающихся юрисдикций, нужд военного времени и вопиющей коррупции. Консерваторы утверждали, что перераспределение земли бессмысленно, и предпочли бы сосредоточиться на содействии экономическому развитию, которое может способствовать индустриализации, предлагая нам сотрудничать с лидерами бизнеса и сельского хозяйства для поощрения строительства инфраструктуры, такой как общие зернохранилища и инфраструктура управления водными ресурсами. Наряду с усилением военного патрулирования сельских районов и финансированием земельных банков, это повысит благосостояние сельской местности в целом.\n\nВторая — это принудительная покупка крупных поместий, нацеленная, в частности, на отсутствующих землевладельцев. Затем правительство должно продать землю арендаторам-фермерам, которые обрабатывают землю, и/или продвигать кооперативы. Левые в партии советовали нам пойти дальше, с безвозмездной национализацией и обязательным участием в коммунах.\n\nКак объединители Китая, мы теперь наделены властью начать этот масштабный национальный проект, который может навсегда изменить китайское общество."
 YUN.endgame.205.a: "Ортодоксальный подход к проблеме — лучший."
 YUN.endgame.205.b: "Мы должны быть консервативны в наших реформах."
 YUN.endgame.205.c: "Наша революция не полна без реформ!"

## Zhang Bojun Exclusive (220-239)
 YUN.endgame.220.t: "Отдел единого фронта"
 YUN.endgame.220.d: "Возможно, одним из самых спорных шагов, который есть в предвыборной платформе [ROOT.GetRulingParty], по крайней мере в глазах основной Партии, является вопрос сотрудничества и связей с бесчисленными Данвай Китая, которые слабо объединились вокруг недавно созданной Демократической лиги Китая (ДЛК). Собрав некоторые из величайших демократических умов Китая, таких как Хуан Яньпэй, Чжан Цзюньмай, Чжоу Шичжао, Шэнь Цзюньжу, Ло Лунцзи, Ли Хуан, Сюй Цинь, Лю Чунъю и многие другие, партия является, возможно, прочным наследием работы Лян Цичао с нацией. Объединив Партию младокитайцев, Китайскую конституционную партию, Китайское общество профессионального образования, Китайскую национальную ассоциацию демократического строительства и многие другие мелкие демократические партии, они оформились в блок единомышленников-реформаторов, готовых добросовестно взаимодействовать с правительством.\n\nВ связи со смелым стремлением президента Чжана построить широкий Единый фронт для светлого будущего китайской нации, а также его многочисленными дружескими отношениями со многими лидерами ДЛК, появились предварительные планы по вступлению в Единый фронт, не слишком отличающийся от старого Единого фронта между Гоминьданом и Китайской синдикалистской партией. Однако такой шаг вызвал растущее недовольство внутри [ROOT.GetRulingParty], поскольку единственными возможностями для братских партий являются КСП или ДЛК.\n\nУ обоих, естественно, есть свои недостатки: ДЛК не доверяют сторонники жесткой линии собственной партии Чжана, они также опасаются социализма на практике. С другой стороны, КСП достигла уровня отчуждения от президента Чжана после восстания против Центрального комитета. Некоторые в лагере президента, однако, даже начали советовать не принимать таких мер, утверждая, что [ROOT.GetRulingParty] полностью способна построить демократическое социалистическое будущее на своих собственных условиях."
 YUN.endgame.220.a: "Демократия, построенная с Демократической лигой Китая!"
 YUN.endgame.220.b: "Сохранение главенства Партийного государства императивно!"
 YUN.endgame.220.c: "Создать Второй единый фронт!"

 YUN.endgame.221.t: "Исцеление раскола ВКД"
 YUN.endgame.221.d: "Временный комитет действий, в его нынешнем виде, изначально не предназначался для того, чтобы быть фракцией Гоминьдана. Нет, он должен был стать новым началом. Новой партией, не скованной неудачами Партийного государства в его амбициях объединить нацию. Первоначально провозглашенный как детище Чжан Боцзюня и Тань Пиншаня вскоре после краха Северного похода, судьба прототипа ВКД в конечном итоге была решена приглашением основателями Сун Цинлин и Дэн Яньда к учредительным процедурам. В конечном итоге вытеснив Чжана и Таня как центр движения, ВКД стал Временным комитетом действий Гоминьдана, намеревающимся реформировать партию изнутри.\n\nБыстро разочаровавшись в руководстве Сун и Дэна и подозрительно относясь к Третьему Интернационалу, Тань вскоре покинул основной ВКД, намереваясь создать свое собственное региональное отделение, где он был бы королем. Тем временем Чжан оставался тесно связан с линией Дэн Яньда, в конечном итоге следуя за комитетом до тех пор, пока его не отправили в провинцию Юньнань.\n\nВ параллельном русле мысли другой внутренней оппозиционной фракцией Гоминьдана, возникшей в свете Центрального комитета Ван Цзинвэя, является 10-я армия Национально-революционной армии и ее лидер Чэнь Миншу. Дружелюбный человек, имеющий близкую дружбу с президентом Чжаном, он остался на плаву в новом китайском политическом порядке. В целом выступая против классовой борьбы, он придерживается гораздо более реформистского взгляда на китайский социализм. Конечно, даже в собственном лагере Вана и между ними были несогласные. Гу Мэнъюй и его умеренные из Реорганизованного товарищества или Сунь Фо и фракция Реконструкции.\n\nПытаясь преодолеть политический разрыв для укрепления нации, Чжан искал эти разнообразные группы, чтобы выяснить их готовность к сотрудничеству. Осведомленный о третьих партиях и более демократичный, чем Тань или Дэн и Сун, Чжан также сохраняет традиционно марксистский характер ВКД, по крайней мере, по сравнению с такими, как Гу, Чэнь или Сунь. И поэтому в конечном итоге, кого бы Президент ни привлек на свою сторону, это, по крайней мере, обеспечит уникальную перспективу для Партии и Правительства."
 YUN.endgame.221.a: "Во имя революционного единства, привлечь Комитет Таня."
 YUN.endgame.221.b: "Китайский народ нуждается в противоядии, и Реорганизованное товарищество Гу может его предоставить."
 YUN.endgame.221.c: "Мы не можем забывать о нашем демократическом характере, Чэнь — наш человек."

 YUN.endgame.222.t: "Семейная библиотека Чжан"
 YUN.endgame.222.d: "Плодовитый писатель с юных лет, президент Чжан всегда был так или иначе погружен в мир литературы и писательства. Усердный и прилежный студент в юности, Чжан отправился в Уханьский педагогический университет в 1916 году, всего в 20 лет и в практической нищете, но тем не менее был принят на их факультет английского языка. Быстро подружившись с такими людьми, как Юнь Дайин, Чжан участвовал в Книжном клубе Лицюнь Юня. Познакомившись со знаменитым Сяо Чуйню через Юня, Чжан в конечном итоге основал свой собственный читательский клуб и студенческий союз под их руководством.\n\nПринося свою любовь к литературе, куда бы он ни пошел, Чжан недолго был директором Сюаньчэнского педагогического университета в Аньхое, прежде чем отправиться в Германию в 1922 году для обучения в Берлинском университете. Получив степень по философии, Чжан был соседом по комнате Чжу Дэ и даже подумывал о вступлении в Китайскую синдикалистскую партию.\n\nПо возвращении на родину Чжан начал собирать самые разные книги из всех слоев общества. В том числе 277 изданий Мин из 2239 томов, 53 издания Цин из 323 томов и множество других видов литературы. Плодовитый читатель и писатель, как сообщается, в свободное от государственных дел время Чжан больше всего ценит отдых в своей недавно построенной семейной библиотеке в окружении своих томов. Насчитывающая в общей сложности около 10 000 томов, семейная библиотека Чжан стала титанической коллекцией, поистине демонстрирующей его любовь к этому средству.\n\nСерьезная, идеалистическая, обожающая, библиотека — это лишь единственное свидетельство полной преданности Чжана своему ремеслу, энергии, которую он привносит на политическое поле. Возможно, даже такая дисциплина передастся детям Чжана, время покажет."
 YUN.endgame.222.a: "«Чтобы быть настоящим человеком, минимальное условие — быть последовательным во внешности и в сердце»."

 YUN.endgame.223.t: "Демократия для крестьян и рабочих"
 YUN.endgame.223.d: "Всегда устремляясь вперед, всегда амбициозно поворачивая циферблат к прогрессу и утопии. Это миссия, которой посвятили свою жизнь президент Чжан и премьер Чжу. Верный до конца и до боли идеалистичный, Чжан был вынужден терпеть постоянные нападки со всех сторон политического поля битвы. Несмотря на то, что его сердце обливается кровью за социализм и демократию, его обвиняют в том, что он правый агент, его соотечественники слева. С другой стороны, его соотечественники справа называют его левым недоброжелателем. И все же в глубине души он не может винить их за их мнения. Преданный своему делу, он даже зашел так далеко, что произнес речь, чтобы ответить на такие заявления.\n\n«Все не обязаны разделять одни и те же мысли и политические взгляды, и на самом деле они не могут разделять одни и те же взгляды. Заставлять людей разделять одни и те же взгляды или заставлять их стыдиться одних и тех же взглядов бесполезно. Как мы можем жить в мире и сосуществовании среди различий? Единственный способ — соблюдать дух демократии, создавая демократическую систему, уважая различия друг друга, принимая критику, учась на сильных сторонах других и восполняя собственные слабости».\n\nСмирившись со своей ролью послушного слуги нации и борющегося идеалиста, Президент не одинок, это правда. При широкой поддержке армии и ее маршала, а также всех его друзей и союзников, Чжан сумел обеспечить нации столь необходимую стабильность. А вместе с ней и основы новой Китайской Республики. Размышляя, он может только надеяться, что его усилия принесут социалистическую демократию, которую так отчаянно заслуживают китайские крестьяне и рабочие."
 YUN.endgame.223.a: "«Чем труднее получить свободу, тем слаще она на вкус и тем больше мы ее любим»."

## Zhu Peide Exclusive (240-259)
 YUN.endgame.240.t: "Партийные выборы [GetYear] года"
 YUN.endgame.240.d: "Воссоединившись снова как Ученик и Учитель, авангардный дуэт легендарного Ли Гэньюаня и стойкого Чжу Пэйдэ сумел успешно выдержать все штормы, которые обрушились на их стены. Преодолевая сопротивление радикалов слева и справа, режим Гоминьдана помогал в неустанном продвижении Национальной революции. И в самый темный момент Партии Ли и Чжу маршировали вперед, как это делал их любимый Цай Э десятилетия назад.\n\nНесмотря на их триумфы, быстро стало очевидно, что альянс Ли-Чжу подходит к концу. С его амбициями, которые трудно удовлетворить, и вернувшись в центр внимания при поддержке своих старых союзников в хорошо финансируемой клике «Политической науки» (Чжэнсюэси), Ли Гэньюань использовал всю политическую машину клики, чтобы заявить о своих правах на партийное руководство Гоминьданом.\n\nСо своей стороны, Чжу Пэйдэ, по слухам, ведет переговоры с более устоявшимися фракциями внутри партии, размахивая потенциальным премьерством, чтобы переманить их на свою сторону. Очевидно, Чжу стремится отстранить Ли от власти и поставить более покладистого кандидата. Среди его поклонников три главных титана старых правых: Сунь Фо и его фракция Реконструкции, Цзоу Лу и Сишань, и даже Ху Ханьминь и клика Старейшин. Соблазненные возвращением к власти, они также с подозрением относятся к Ли Гэньюаню и Чжэнсюэси с их отклонением от партийной ортодоксии.\n\nПод огромным давлением Чжу был вынужден объявить выборы председателя Партии, а вместе с ним и Президента Республики. Потеряв свою главную опору, Чжу был вынужден искать союзников, и крупное соглашение со Старыми правыми дало бы ему достаточно голосов для консолидации поддержки. С другой стороны, Ли начал переговоры со своим старым близким другом Гу Чжунсю, традиционным кандидатом от Северного Гоминьдана-Бэйяна. Однако Чжан Цюнь сделал свой ход, давя на молодую гвардию Чжэнсюэси, чтобы те поддержали Ян Юнтая в качестве своего премьера."
 YUN.endgame.240.a: "Чжу выдерживает шторм с фракцией Реконструкции!"
 YUN.endgame.240.b: "Чжу обеспечивает победу в союзе с Сишань!"
 YUN.endgame.240.c: "Удивительно, но Ху Ханьминь и Чжу Пэйдэ одерживают победу!"
 YUN.endgame.240.e: "Ли Гэньюань заявляет свои права на титул и назначает Гу Чжунсю!"
 YUN.endgame.240.f: "Ли Гэньюань и молодой Ян Юнтай одерживают победу!"

 YUN.endgame.241.t: "План укрепления национальной обороны"
 YUN.endgame.241.d: "Постоянно подвергаясь нападениям внешних захватчиков с незапамятных времен, китайская нация пережила трагедию в циклическом процессе войны, нарушающем династический мировой порядок. Это отчетливо видно в недавнем нападении Второй японо-китайской войны на нацию. Сея хаос, национальную травму и суматоху среди китайского народа, никто не знает такой трагедии лучше, чем солдаты ее нации.\n\nНамереваясь предотвратить будущие вторжения любой ценой, генералиссимус Чжу Пэйдэ разработал план со своими величайшими стратегическими соратниками из Третьей армии. Подразумевая тотальные усилия по укреплению, правительство профинансирует расширение фортов и транспортных линий для подготовки как к отражению вторжения, так и к транспортировке военных припасов на потенциальные фронты предполагаемого вторжения. Разделенная на три линии национальной обороны, первая будет простираться от Цзинани до Баодина. Вторая линия будет проходить от Яньчжоу до Аньяна, а на юго-востоке будет линия Сичэн. Кроме того, города Нанкин, Ухань, Сюйчжоу, Кайфэн, Ханчжоу, Усун и другие важные городские центры получат дополнительные городские укрепления.\n\nТайно отбирая персонал из различных военных и политических ведомств наряду с военными академиями, с дополнительным руководством иностранных экспертов, Чжу начал обследовать местность и разрабатывать планы строительства оборонительных позиций в районе Пекин-Шанхай-Ханчжоу. Оборонительная система, разделенная на три зоны, будет адаптирована к различному рельефу местности: район Нанкин-Шанхай, район Шанхай-Ханчжоу и район Нанкина.\n\nХотя союзники Чжу в НРА и правительстве приветствовали это как надежную инвестицию в будущую безопасность нации, Клика «Политической науки» выразила обеспокоенность. Ранее поддержав приоритет тяжелой промышленности до объединения, Ли Гэньюань и его союзники-технократы теперь настаивают на амбициозном планировании экономической модернизации, а не на милитаризации. Поддерживая инвестиции в транспорт, особенно в железные дороги, они упорно отказываются от дальнейших инвестиций в укрепления."
 YUN.endgame.241.a: "Навсегда защищены от империалистических вторжений!"
 YUN.endgame.241.b: "Наши усилия должны быть направлены на экономическое планирование, а не на милитаризацию."

 YUN.endgame.242.t: "Судьба левых в Третьей армии"
 YUN.endgame.242.d: "Наиболее характерной чертой Третьей армии Национально-революционной армии является ее двойственная природа в рамках более широкого неформального партийного раскола. Благодаря братству, возникшему в Военной академии Куньмина, различные левые сумели закрепиться в Третьей армии под явным покровительством прославленного Чжу Дэ. Опираясь на свою давнюю дружбу с такими людьми, как Цзинь Ханьдин и Чжу Пэйдэ, Чжу Дэ сумел превратить Третью армию в умеренную группировку внутри НРА.\n\nОднако с объединением нации и выходом Третьей армии на национальную арену влияние и само существование более социалистических элементов в ее рядах были поставлены под сомнение. Высмеиваемое многими из «Старых правых» партии, положение левых в их рядах находится в подвешенном состоянии. Со своей стороны, [ROOT.GetLeader] опасается действовать в свете такой ярости, предпочитая ждать, куда подует ветер. Хотя о настоящем исключении из партии речь пока не идет, многие требуют официального статуса «изгоев» для Чжу Дэ и его окружения.\n\nХуже того, в последнее время праведный, безрассудный и буйный командир Ли Ми начал еще больше разжигать напряженность, вступая в активные перестрелки с различными формированиями НРА, которые считаются находящимися под контролем «левых». Официально осужденный большинством партии, Ли Ми со своей стороны просто предположил, что делает то, что не может сделать [ROOT.GetLeader]. Становится очевидным, что необходима публикация официального заявления, так как большая часть Клики «Политической науки» настаивает на искоренении их влияния, в то время как общий консенсус Третьей армии склоняется к примирению."
 YUN.endgame.242.a: "Они наши товарищи навеки!"
 YUN.endgame.242.b: "Искоренить вероломное влияние парижских радикалов!"

 YUN.endgame.243.t: "Правление ортодоксального генералиссимуса"
 YUN.endgame.243.d: "Странная задумчивая дымка опустилась на нацию. В резком контрасте с атмосферой хаоса, страданий и кровопролития, которая обычно пронизывала все провинции Китая в последние несколько десятилетий, теперь ощущается строгий и осторожный дух того, что, возможно, можно считать оптимизмом. Оглядываясь на свою долгую и невероятно богатую событиями карьеру, генералиссимус Чжу Пэйдэ предстает, пожалуй, воплощением революционного солдата до мозга костей. Втянутый в жизнь воина в юном возрасте, патриотизм Чжу — и революционные настроения, привитые Ли Гэньюанем — привели его к участию в Синьхайской революции в составе Восстания двойной девятки. Сформировав скрепленные кровью узы с такими людьми, как Чжу Дэ, Фань Шишэн, Цзинь Ханьдин, Тан Хуайюань и многими другими из Куньмина, Чжу проливал свою кровь и рисковал жизнью ради преобразования своей нации.\n\nСнова и снова он отвечал на зов революции. Будь то Война в защиту республики, Война в защиту конституции, Северный поход и любой конфликт между ними. И вот снова на плечи Чжу легла задача сплотить Национально-революционную армию в ее самые темные моменты и продолжить Великий поход, как планировал покойный Чан Кайши. Действуя как генералиссимус в самый мрачный час Партии, Чжу вновь привел Партию к величию, завершив объединение нации.\n\nВозможно, даже время ничуть не замедлило его, так как генералиссимус без устали трудится в этот период национального восстановления, пытаясь выполнять свои обязанности государственного деятеля наилучшим образом. И несмотря на опасения быть свергнутым амбициозным Ли Гэньюанем, Чжу и его союзник [ROOT.GetSecondInCommand] сумели обеспечить будущее согласие для нации. Такое, в котором «Новые правые» и «Старые правые» преодолевают свои разногласия, где конституционное правление — в какой бы форме оно ни было — является приоритетом, и где Национальная революция реализуется в полной мере. Нация может спать спокойно, охраняемая своим самым верным защитником."
 YUN.endgame.243.a: "Твердая рука и самоотверженная личность."

 YUN.endgame.244.t: "Возрождение истинного героя Куньмина"
 YUN.endgame.244.d: "Возможно, это один из самых ироничных поворотов судьбы: не революционная «молодая гвардия» открыла новую эру Национальной революции. И не партийное ядро Гоминьдана, преданное доктору Сунь Ятсену до последнего. Вместо этого, это был один из дедов революционных настроения в китайской нации. Ибо именно Ли Гэньюань: сын юньнаньского дворянства; Ли Гэньюань: отец Военной академии Куньмина; и Ли Гэньюань: соперник Цай Э, был вознесен на пост Президента нации. Основатель Тунмэнхуэя, герой революции и блестящий государственный деятель. Карьера Ли — доказательство того, что упорная преданность, твердость характера и решимость могут позволить любому выстоять и выдержать в самых трудных обстоятельствах.\n\nОрганизовав возвращение Цай Э в Куньмин в 1915 году, Ли с самого начала возглавил борьбу против сводящего с ума деспотизма Юань Шикая. Кратко занимая руководящую роль в Южном военно-административном совете и пост губернатора Шэньси, Ли в конечном итоге снова оказался во главе солдат Юньнаньской армии. В конце концов, отвергнутый Тан Цзияо и Ли Лецзюнем, Ли уехал в Пекин, чтобы участвовать в политической жизни там. Однако его влияние на юге сохранилось, пусть и недолго. После попытки Ян Юнтая свергнуть Сунь Ятсена в Гуандуне, а также провала правления его протеже Гу Пиньчжэня в Юньнани, Ли в конечном итоге ушел в отставку после скандала со взяточничеством Цао Куня.\n\nИ все же старого пса трудно удержать на цепи. Вернувшись к национальной известности после захвата Юньнани Гоминьданом, Ли немедленно приступил к тому, чтобы на этот раз его амбиции не были скованы. Будучи изначально членом-основателем Общества политической науки и Общества изучения европейских дел, а также поддерживая контакты с членами Северной клики политической науки, такими как Гу Чжунсю и Хуан Фу, Ли оказался на критическом перепутье в жизни «Политической науки». Сместив Чжу Пэйдэ в блестящем политическом ходе, Старая клика политической науки сумела наконец выполнить свой долг, привитый им как революционным солдатам. Одно можно сказать наверняка: старые солдаты никогда не устают от грязной работы."
 YUN.endgame.244.a: "«Терпи лишения, в которых кроется основа для реформ»."

## Zhang Qun Exclusive (260-279)
 YUN.endgame.260.t: "Шанхайский опиумный скандал"
 YUN.endgame.260.d: "Характерной чертой Клики «Политической науки» является ее псевдовоенный статус, размывающий границы между миром гражданских дел и полем боя; многие из ее высших эшелонов — хотя сама клика и эгалитарна — имеют тот или иной военный опыт. Будь то богатая карьера Ли Гэньюаня на поле боя и вне его, роль Чжан Цюня в снабжении вооружением и в качестве штабного офицера, или должность Хуан Фу как начальника штаба Чэнь Цимэя. И в «молодой гвардии» такая традиция сохраняется.\n\nНедавно восходящая звезда и видный любимец «Политической науки» Сюн Шихуэй блестяще проявил себя на политической сцене Гоминьдана, устраивая роскошные вечеринки, будучи отличным администратором и способным политработником. Увы, в последнее время Сюн оказался в центре скандала, в который втянута администрация [ROOT.GetLeader], что в конечном итоге укрепило общее мнение о том, что Клика погрязла в политической коррупции.\n\nНазванный отечественными СМИ «Опиумным кольцом Янцзы» по аналогии с печально известным коррупционным скандалом администрации Улисса С. Гранта в США, пароход, следовавший из Ханькоу в Шанхай, был недавно остановлен и обыскан местной полицией. Под властью муниципалитета Большого Шанхая полиции удалось выяснить, что пароход на самом деле перевозил груз опиума по приказу командующего Сюн Шихуэя. Когда Чжан Динфань, известный соперник Сюна, доложил об этом Националистическому правительству, [ROOT.GetLeader] был вынужден создать Национальный комитет по борьбе с опиумом с целью проведения расследования. Однако в конечном итоге председатель комитета зависит от прихоти президента, и поэтому судьбу Сюна должен решать сам [ROOT.GetLeader].\n\nС одной стороны, правительство могло бы дернуть за ниточки в комитете, чтобы обеспечить защиту Сюна, какими бы недостатками это ни грозило. Это, по крайней мере, гарантировало бы, что восходящая звезда не будет погашена до того, как сможет взлететь. С другой стороны, возможно, президент предпочтет позволить событиям идти своим чередом, спасая репутацию Клики «Политической науки» путем грандиозной демонстрации карательного правосудия за контрабанду опиума."
 YUN.endgame.260.a: "Быстро! Скрыть все, что связано с этим «скандалом»."
 YUN.endgame.260.b: "Иногда приходится стиснуть зубы, Сюн."

 YUN.endgame.261.t: "Национальный Наньчанский университет"
 YUN.endgame.261.d: "Будучи самой яркой восходящей звездой Клики «Политической науки», Сюн Шихуэй часто попадает в заголовки национальных газет, будь то за его добросовестное служение нации и остроты для прессы, его эксцентричность в устройстве пышных вечеринок для сослуживцев, его многочисленные поэтические произведения или даже, как в последнее время, его благотворительную деятельность.\n\nБудучи недавно назначенным губернатором своей родной провинции Цзянси, Сюн выступил за строгое внедрение «чистой политики», требуя от своих подчиненных быть «простыми и ясными». Внедрив единую систему руководства партией, правительством и армией, Сюн фактически сделал себя «королем Цзянси». Полностью реорганизовав управление, он зашел так далеко, что назначил своих доверенных лиц в недавно созданные девять административных округов провинции и ввел «систему единого налога».\n\nОднако в соответствии с его реформаторскими усилиями СМИ подхватили создание Сюном Национального Наньчанского университета, превратив это в медиа-ажиотаж. Получив 1 миллион юаней от Министерства образования, Сюн сумел обеспечить основание комплексного университета для выведения концепций «величия, центральности и праведности». Первым президентом стал знаменитый «отец китайской ботаники» доктор Ху Сяньцянь, известный ученый и популяризатор традиционной китайской культуры; университет приступил к амбициозному проекту по повышению уровня жизни населения Цзянси, превращая провинцию в новый центр научных исследований.\n\nПривлекая многих других известных ученых на факультеты, университет может похвастаться такими сотрудниками, как декан инженерного колледжа Цай Фанъинь, декан колледжа искусств Ван И и декан сельскохозяйственного колледжа Чжоу Шилу. Имея дальнейшие планы по расширению и слиянию с другими университетами в Цзянси, Сюн, несомненно, оставил неизгладимый след в будущем своей провинции и нации в целом."
 YUN.endgame.261.a: "Отличная инициатива!"
 YUN.endgame.261.b: "Не стоит ли нам беспокоиться об этом «Короле»?"

 YUN.endgame.262.t: "Президентская каллиграфия"
 YUN.endgame.262.d: "Сказать, что правительством Гоминьдана в современную эпоху правят элегантные костюмы, приятные рукопожатия и лучезарные улыбки, было бы проницательным наблюдением. С захватом «Политической наукой» рычагов управления Революционная партия трансформировалась в по-настоящему стабильную, национальную партию. И характер ее правления нигде не проявляется так ярко, как в харизматичной личности ее президента, [ROOT.GetLeader].\n\nЗа завесой закрытых дверей, бюрократии и администрирования сам Чжан является воплощением харизматичного джентльмена. Известный каллиграф и увлеченный коллекционер искусства, он был частым гостем на китайской художественной сцене еще до президентства. Друг многих знаменитых великих мастеров XX века, таких как легендарный Чжан Дацянь — величайший мастер копирования каллиграфии традиционных мастеров, или даже Жань Иньтин, прославленный тайваньский акварелист, и Хуан Цзюньби, художник великолепных пейзажей.\n\nВ академическом мире «Либеральный бунтарь» также добился великолепных успехов. Ему были присвоены почетные докторские степени в нескольких университетах, включая Университет Иллинойса, Сеульский национальный университет, Университет Святого Иоанна, Университет Сонгюнгван и даже Университет Сучжоу. От политологии до права и литературы, Чжан привнес то же чувство утонченного отношения и в управление.\n\nПризывая своих коллег «уважать закон и быть прагматичными», а также быть «искренними и честными», Чжан приспособил духовный этос своего правительства к построению лучшего Китая через компромисс. Объединяя «Данвай» (внепартийных), таких как Цзэн Ци или Чжан Цзюньмай, благодаря своей личной дружбе, харизма Чжана даже завоевала ему восхищение изгоя Чжан Сюэляна и сына Отца нации, Сунь Фо. Его притягательная личность пронизывает даже официальные встречи, где в моменты простоя президент, как известно, отпускает шутки, чтобы разрядить обстановку."
 YUN.endgame.262.a: "Культивирование произведения искусства очень похоже на культивирование нации, не так ли?"

 YUN.endgame.263.t: "Комиссия по административной эффективности"
 YUN.endgame.263.d: "Стремясь должным образом обеспечить фундамент для современной нации, Клика «Политической науки» продвигается вперед — к большому огорчению и насмешкам своих современников из «Старых правых» — с истинной и тщательной модернизацией органов власти. Сосредоточившись в первую очередь на Исполнительном юане и его неэффективности, премьер Ян Юнтай начал составлять план предложений по оптимизации исполнительной ветви власти. Решительно настроенный предотвратить такие проблемы, как кризис Ху Ханьминя, и общее вялое управление Исполнительной властью, провозглашенная и возглавляемая Яном Комиссия по административной эффективности посоветовала правительству принять трехэтапный план для революционизирования и итерации текущей системы.\n\nВо-первых, бюрократия Исполнительного юаня должна абсолютно улучшить свои нынешние методы ведения архивов и, следовательно, упростить процедуры обработки важных официальных документов и корреспонденции. Во-вторых, правительство должно разработать новую, эффективную систему классификации и регистрации публичных документов, поскольку комитет указывает, что текущая структура представляет собой бюрократический лабиринт неэффективной рутины. Наконец, Исполнительный юань должен упразднить лишние административные агентства для повышения эффективности и координации.\n\nДалее Ян предложил расширить Национальный экономический совет для включения в него вопросов сохранения рек, упразднить все различные агентства, занимающиеся сельскохозяйственными реформами и сельскими кооперативами, передав их обязанности Министерству промышленности. Наряду с этим должно быть создано Министерство коммуникаций, а ликвидация опиума должна быть переведена из Совета по запрету опиума в Военный совет. Наконец, Министерство внутренних дел должно быть передано под надзор Кун Сянси, а Министерством промышленности должен ежегодно выпускаться экономический ежегодник.\n\nУчитывая функциональное доминирование «Политической науки» в законодательной и исполнительной власти, для таких мер практически формальностью является получение президентского одобрения, однако назначение спорного Кун Сянси и дальнейшая централизация вопросов в исполнительной власти вызвали легкое беспокойство на политическом поле."
 YUN.endgame.263.a: "Еще один шаг к государственно-социалистическому идеалу!"
 YUN.endgame.263.b: "И он хочет извратить институты Партии?"

 YUN.endgame.264.t: "Политическая консультативная конференция"
 YUN.endgame.264.d: "Поскольку объединение нации неуклонно близится к завершению, и начинается неизбежный период реконструкции, все взоры прикованы к президенту [ROOT.GetLeader] и Клике «Политической науки», чтобы выяснить, каким они видят Китай и будущее народа в целом. Какую форму примет их правление? Возвращение к старому Обществу политической науки или появление чего-то нового из Общества строительства нового Китая?\n\nПосле того как Старая клика политической науки формально воссоединилась после реинтеграции бэйянской секты Хуан Фу с южной сектой Ли Гэньюаня и Ян Юнтая, клика начала подталкивать своих молодых соотечественников к официальному прекращению политической опеки над нацией путем разработки конституции. Поскольку большая часть Новой клики политической науки Чжан Цюня демонстрирует признаки согласия, Фракция реконструкции под руководством Сунь Фо и Сишань под руководством Цзю Чжэна, наряду с другими юридическими экспертами в партии, заявили, что для того, чтобы сделать это «по правилам», все политические партии и независимые кандидаты должны быть приглашены на Политическую консультативную конференцию.\n\nВ конечном счете полномочия по таким вопросам остаются за президентом [ROOT.GetLeader], и, хотя он и является старательным технократом нового стиля, все же остается множество вариантов того, насколько ортодоксальным он должен быть для выполнения своих конституционных начинаний. Он мог бы просто подчиниться таким вопросам, следуя процессу до его полного завершения. Другой вариант — поставить во главе конференции тщательно подобранных партийных экспертов, чтобы гарантировать удовлетворение амбиций «Политической науки». Наконец, и это наиболее спорно, президент мог бы просто предложить сохранить Временную конституцию с умеренными корректировками.\n\nВ любом случае судьба нации остается неясной. Несмотря на демократические шаги, не совсем понятно, в какие сроки Гоминьдан, будь то под доминированием «Политической науки» или нет, позволит партиям «Данвай» вырваться на свободу и процветать. Ибо пока политики спорят, Партийное государство на практике закрепилось на всех уровнях власти на десятилетия вперед."
 YUN.endgame.264.a: "По правилам, господа! По правилам..."
 YUN.endgame.264.b: "Хорошее управление, обеспеченное экспертами партии!"
 YUN.endgame.264.c: "Просто скорректируйте временную конституцию, этого будет достаточно."

 YUN.endgame.265.t: "Вечно горящий факел"
 YUN.endgame.265.d: "Яркое солнце славно сияет над улицами [ROOT.Capital.GetCapitalVictoryPointName], пока люди бродят вокруг, занимаясь своими повседневными делами. Обмен приветствиями, торговые реплики — все это так далеко от нации, охваченной войной и разрушенной опустошением, исходящим от Эры милитаристов и Войны национального сопротивления.\n\nЧувство гордости глубоко укоренилось, и широкая улыбка не могла не появиться на лице Президента, когда он смотрел на извилистые дороги столицы и шумное население. Солнце было ярким, конечно, но еще более яркое Белое Солнце летело выше, чем первое когда-либо могло. Ибо оно символизировало надежду, современность и новую эру для китайского народа. Кто-то мог бы осудить его клику за предательство революции, и все же ослепительное процветание нации является свидетельством для всех. Свидетельством устойчивого руководства «Политической науки».\n\nНаделенный упреждающими и всеобъемлющими полномочиями, Президент далек от своих предшественников. Не просто автократ, правящий по прихоти; самого Чжана часто сравнивают и проводят аналогии с императором Мэйдзи во время Реставрации Мэйдзи. Окруженный собственным набором неформальных внеконституционных советников, они получили прозвище «Китайские Гэнро». Правящая олигархия эгалитарных, модернизаторских и реформаторских либеральных элит напоминает японскую систему, свидетелем которой Чжан был, будучи молодым студентом.\n\nВ конечном счете история Клики «Политической науки» и Гоминьдана — сложная история. Это точно. Втянутые в фракционный раскол с раннего возраста по поводу их участия в Китайской Республике, они снова и снова вступали в конфликт. И хотя «Политическая наука» может и не соответствовать тому Гоминьдану, который Сунь представлял в конце своей жизни, она, возможно, отражает истинную суть того, что Тунмэнхуэй изначально намеревался сделать все эти годы назад. Принести новую Республику китайской нации..."
 YUN.endgame.265.a: "Возможно, Тунмэнхуэй все-таки преуспел, в некотором роде..."

##Section 5d (300-599): End Game UPC Events

#UPC Endgame Shared (300-329):
 YUN.endgame.300.t: "Триумф Федерализма Юньнани"
 YUN.endgame.300.d: "Куньмин торжествует. Армии Юньнани, могущественная сила в 1910-х годах, прежде чем быть униженными в следующем десятилетии, вернули свою былую славу в решающей кампании по всей разрушенной нации. Сделав это, они распространили идеологию, также считавшуюся побежденной в 1920-х годах: китайский федерализм.\n\nСплотив группу милитаристов, регионалистов, конституционалистов, демократов и оппортунистов, Движение федералистов боролось за республику, возглавляемую учеными-дворянами (шэньши), с разделением властей между традиционно сильным центральным правительством и все более автономными провинциями. Движение, в котором доминировали южные лидеры, но имевшее сочувствующих на севере, смогло вырвать некоторую номинальную автономию в Конституции Цао Куня 1923 года, но ничего столь далеко идущего, как они надеялись, и полученные ими уступки соблюдались лишь эпизодически.\n\nТеперь они в состоянии внедрить систему по своему собственному выбору. Однако это обошлось дорогой ценой. Нация опустошена годами войны, армия раздута и сомнительно лояльна гражданскому правительству, а само движение сильно разделено. [ROOT.GetLeader] и его союзникам придется справляться с этими проблемами в ближайшие месяцы."
 YUN.endgame.300.a: "Победа демократии и конституционализма в Китае!"
 YUN.endgame.300.b: "Провинции завоевали свободу от тирании!"

 YUN.endgame.301.t: "Центральная армия и милитаристы"
 YUN.endgame.301.d: "Проблемы военной централизации в Китае эпохи милитаристов трудно переоценить. Десятилетия возросшей политической, экономической и военной автономии провинций в период поздней династии Цин в сочетании с еще несколькими десятилетиями продолжающейся гражданской войны в постсиньхайскую эпоху ослабили центральную власть и позволили различным местным фигурам создать мощные независимые армии. Провинции стали гипермилитаризованными, поскольку любое проявление слабости могло привести к вторжению соседей или национальных правительств на их территорию, истощая их казну и еще больше ослабляя их позиции, поскольку местные силы находят альтернативные способы сбора средств.\n\nПоложить конец этому кризису — нелегкая задача. Нация не может позволить себе содержать столько дивизий в мирное время, и многие подразделения придется демилитаризовать. Но для этого требуется определенная степень доверия между провинциями и центральным правительством, а если этого нет, центральное правительство должно быть достаточно сильным, чтобы обеспечить демилитаризацию. Помимо политических последствий, каждое расформированное подразделение означает, что больше молодых людей останутся без работы, что исторически приводило к всплескам бандитизма. Прошлые попытки демилитаризации провоцировали восстания в провинциях, поскольку центральное правительство пыталось сохранить свои лучшие силы за счет союзных милитаристов.\n\nЛидеры Юньнани годами бились над этим вопросом, сохраняя огромную армию, чтобы защитить себя от соперников, но также страдая от последствий этого. Когда Тан Цзияо был губернатором, он писал о необходимости для Китая иметь сильное центральное правительство, способное бороться с империализмом и выступать арбитром между провинциями. Чжан Тайянь, с другой стороны, настаивал на дипломатическом решении, позволяющем различным провинциям иметь по крайней мере две собственные дивизии. ДЛК много писала о необходимости национализации армий, однако часто зависела от милитаристов в вопросах защиты.\n\nВ любом случае, ожидается, что демобилизация начнется в ближайшем будущем, и основная тяжесть ляжет на плечи милитаристов, что приведет к напряженности."
 YUN.endgame.301.a: "Центральное правительство должно национализировать армии милитаристов."
 YUN.endgame.301.b: "Демобилизация должна быть сбалансированной, чтобы защитить права провинций."

 YUN.endgame.302.t: "Экономический попутный ветер впереди"
 YUN.endgame.302.d: "Объединение — это шанс на экономическое процветание, так как бои заканчиваются и начинается реконструкция, но краткосрочные перспективы очень сложные. По мере того как Китай переходит от военной экономики, магистраты и граждане вынуждены оценивать потери, понесенные за эти годы. Фермы, предприятия и инфраструктура были разрушены боями или мародерством. Перемещенные беженцы медленно возвращаются домой, находя мало что оставшимся от их старой жизни, в то время как расформированные солдаты с трудом находят работу. Закон и порядок в некоторых частях страны остаются нарушенными, так как бандиты и повстанцы продолжают терзать определенные районы. Споры о правах на землю, воду и бизнес по мере реинтеграции нации возникли среди хаоса.\n\nВ более крупном масштабе окончание многолетней гражданской войны создало сложные проблемы для нового правительства. Долги наступают и их больше нельзя так легко откладывать, пока новое правительство пытается утвердить свою легитимность. Кредиторы побежденных правительств, иногда поддерживаемые иностранными державами, также пытались заставить [ROOT.GetLeader] выполнить свои обязательства по облигациям. Продолжающийся кризис демобилизации еще больше сократил государственную казну, и выросли опасения гиперинфляции. Повышение налогов вызовет недовольство у утомленного войной народа, а продолжающиеся проблемы с коррупцией ограничивают его эффективность.\n\nМожно только гадать, сколько богатства было потеряно за эти годы не только из-за прямых актов разрушения и иностранной эксплуатации, но и из-за предприятий, которые так и не встали на ноги, потому что предприниматели слишком боялись инвестировать в военное время из-за нестабильности. Невозможно восстановить потерянный рост, который Китай мог бы увидеть, если бы постсиньхайская ситуация развивалась иначе, но сейчас настало время для нашего правительства наметить лучший курс на будущее."
 YUN.endgame.302.a: "Повышение налогов и выплата наших долгов восстановят веру в экономику."
 YUN.endgame.302.b: "Дефолт по облигациям Бэйяна и печатание большего количества денег оплатят наши долги."

 YUN.endgame.303.t: "Требования демократизации"
 YUN.endgame.303.d: "С завершением объединения под федералистским правительством требования новых выборов больше нельзя откладывать. Многие провинции разработали свои собственные конституции с разной степенью одобрения центральным правительством. Раздаются все более громкие призывы со всей страны разработать новую национальную конституцию и провести давно обещанное демократическое голосование.\n\nДемократическая лига Китая усилила давление, опубликовав серию заявлений после войны с Японией. Они включали 36 пунктов «Предложений для заключительного этапа Войны сопротивления» и «Срочное обращение в разгар победы в Войне сопротивления». Они потребовали прекращения авторитарного правления, признания всех политических партий и гражданских свобод, единого военного командования и военной демобилизации через национальную комиссию по сокращению армии, прекращения мер военного времени, таких как тайная полиция и исправительно-трудовые лагеря для политических заключенных, и помощи беженцам военного времени. Направлены ли эти заявления больше президенту [ROOT.GetLeader] или различным милитаристам, остается неясным.\n\nМенее двусмысленными являются требования провинций, которые стремились сдержать расширение власти центрального правительства. Федералистское правительство, несмотря на свои обещания уважать местную автономию, на практике накопило значительные рычаги влияния на провинции через контроль над программами реконструкции, развертывание войск центральной армии, назначение местных магистратов и урегулирование местных жалоб. Чжан Тайянь, который заболел раком носовых пазух и намерен уйти из национальной политики на фоне участившихся приступов астмы, провел свои последние дни на национальной арене, предупреждая тех, кто хотел его слушать, об опасностях превышения полномочий центральным правительством.\n\nОднако создать федералистскую демократию может быть легче на словах, чем на деле, так как люди в Китае имеют радикально разные взгляды на то, что подразумевает «демократия»..."
 YUN.endgame.303.a: "Предложить временное коалиционное правительство до проведения выборов."
 YUN.endgame.303.b: "Мы должны начать оставлять местные дела местным жителям."

 #Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 YUN.endgame.304.t: "Федерализм реализован?"
 YUN.endgame.304.d_intro: "Объединение Китая под возглавляемым Юньнанью федералистским правительством Гуанчжоу подвело черту под одной печальной главой истории нашей нации, но с наступлением новой эры возникают новые вопросы. Чтобы выиграть различные войны за объединение, новому центральному правительству пришлось создать большую, мощную армию и столь же мощный государственный аппарат — традиционные две руки тирании центрального правительства. Это привело к банкротству нации и опустошению казны, поскольку стране нужно переходить к мирному времени.\n\nВ результате инфляция и политическая напряженность обострились. Разрешение этого коктейля из социальных, экономических, военных и политических проблем потребует сложной серии переговоров для демилитаризации нации, реализации национальной реконструкции и решения давних политических вопросов о роли провинций и центрального правительства. Однако многие сомневаются в искренности [UPC.GetLeader] и опасаются, что издержки лягут на отдаленные провинции."
 YUN.endgame.304.d_generic: "$YUN.endgame.304.d_intro$\n\nЕдинственный способ справедливо разрешить эти кризисы — это честные демократические выборы, в желании провести которые многие сомневаются. Ожидается, что центральное правительство созовет новое конституционное собрание в [UPC.Capital.GetCapitalVictoryPointName], где будут доминировать юньнаньские и кантонские политические фигуры. В то же время, однако, хватка [UPC.GetLeader] кажется слабой как никогда. Если бы появился претендент... и, возможно, если бы [ROOT.GetLeader] был этим претендентом... смог бы он это сделать?"
 YUN.endgame.304.d_hnn: "$YUN.endgame.304.d_intro$\n\nДля нас посетить эту конференцию означало бы неявно сдаться [UPC.Capital.GetCapitalVictoryPointName]. Наше движение настолько фундаментально связано с движением федералистов, что либо мы сейчас выступим, чтобы попытаться взять над ним контроль, либо мы будем поглощены более широким течением. Для политиков Хунани, в частности, настойчивость многих в юньнаньском движении национализировать армию (или, в лучшем случае, оставить лишь несколько дивизий в руках местных жителей) является особенно неприемлемой — вероятно, это знаменует конец нашей автономии.\n\nКроме того, юньнаньское позерство, вопрос Гуйчжоу и личная вражда остаются яркими картинами в умах многих хунаньцев."
 YUN.endgame.304.d_szc: "$YUN.endgame.304.d_intro$\n\nДля нас посетить эту конференцию означало бы неявно сдаться [UPC.Capital.GetCapitalVictoryPointName]. Наше движение настолько фундаментально связано с движением федералистов, что либо мы сейчас выступим, чтобы попытаться взять над ним контроль, либо мы будем поглощены более широким течением. Для сычуаньских федералистов, которых лидеры Юньнани так часто угнетали в прошлом, преклонение колен перед их диктатом кажется неправильным. Но мы делали это до сих пор, готовы ли мы делать это вечно?"
 YUN.endgame.304.a: "Если целишься в короля..."
 YUN.endgame.304.b: "Возможно, он сдержит свое слово?"
 YUN.endgame.304.c: "Вряд ли далеко уйдешь, сидя в стороне! (Переключиться на [UPC.GetNameDef])"

 YUN.endgame.305.t: "[FROM.GetLeader] сопротивляется национализации"
 YUN.endgame.305.d.base: "Хотя у движения федералистов были сторонники по всей стране, в конце концов именно юньнаньцы в конечном итоге исполнили мечту Цай Э и воссоединили страну под одной республикой. Могущественная армия Юньнани смогла победить своих противников и привести нацию под одно знамя федералистов — цель, которая ускользала от могущественных лидеров с 1911 года.\n\nОднако, похоже, что победа и мир не всеми были встречены с радостью. Ссылаясь на политический фаворитизм правительства по отношению к Юньнани, доминирование юньнаньцев в национальной политике, коррупцию, непотизм, милитаризм и жесткие попытки централизации правительства, [FROM.GetLeader] сплачивает свою провинцию и других сторонников, чтобы отделиться от Центрального правительства."
 YUN.endgame.305.d.closer: "Ожидается, что Центральное правительство, конечно, будет иметь большое преимущество, контролируя крупные города Китая и обладая международной легитимностью (по крайней мере, на данный момент), что дает ему больший доступ к кредитам, а также большую налоговую и людскую базу для призыва в армию. Однако централизованная Федеральная армия все еще содержит в своих рядах много нелояльных регионалистов. Кроме того, регионалисты [FROM.GetAdjective] уверены в способностях своих сил и ожидают, что другие восстанут против тиранической диктатуры возглавляемого Юньнанью Центрального правительства. А Китай не привык к потрясениям. Однако обе стороны могут согласиться в том, что они не потерпят новой Эры милитаристов."
 YUN.endgame.305.d.generic: "$YUN.endgame.305.d.base$\n\n[FROM.GetLeader] и [FROM.GetRulingParty] в последнее время были слабо связаны с движением федералистов, имея независимые, но, казалось бы, совместимые корни. Их национальные амбиции совпали с победой федералистов на Юге, и они оседлали ее волну к объединению. Однако теперь, когда Центральное правительство пытается утвердить свою власть над бывшими союзниками, кажется, что [FROM.GetNameDef] просто не желает принимать федеральное господство.\n\n$YUN.endgame.305.d.closer$"
 YUN.endgame.305.d.hnnfed: "$YUN.endgame.305.d.base$\n\nХунань, долгое время имевшая решительную и устойчивую провинциальную конституцию, ставит автономию провинции превыше всего, гордясь почти конфедеративным характером своего федерализма. Доминирование кантонцев в разработке конституции и их открытые амбиции национализировать провинциальные вооруженные силы спровоцировали их на открытое восстание, поскольку они отчаянно пытаются отбиться от хватки [UPC.GetLeader], пока не стало слишком поздно.\n\n$YUN.endgame.305.d.closer$"
 YUN.endgame.305.d.szcfed: "$YUN.endgame.305.d.base$\n\nФедералистское движение Сычуани всегда было драматически затмеваемо их современниками — и даже рассматривалось некоторыми как враг, вступая в конфликт с федералистами Юньнани и Гуандуна в разные моменты. Национализация провинциальных сил, похоже, стала для них последней каплей, стремящейся загнать их в чисто провинциальную роль. Отказываясь подчиниться директивам центрального правительства, [FROM.GetLeader] решил восстать в попытке переопределить федерализм на своих собственных условиях.\n\n$YUN.endgame.305.d.closer$"
 YUN.endgame.305.a: "Милитаристы будут сокрушены."
 YUN.endgame.305.b: "Федералисты нападают друг на друга."

 YUN.endgame.310.t: "Федералистский избирательный порядок"
 YUN.endgame.310.intro: "На землю пришел новый политический порядок, в котором теперь доминируют победители войн за объединение Китая. Великий республиканский альянс (ВРА) и Демократическая лига Китая (ДЛК) стали ведущими политическими партиями в новой республике, сражаясь за контроль над законодательными собраниями провинций по всей стране. Но величайшим призом, за который будет вестись самая ожесточенная борьба, будет контроль над Президентством — а вместе с ним и ценные патронажные и исполнительные должности, которые оно контролирует.\n\nВеликий республиканский альянс считается старейшим из двух (технические детали спорны), прослеживая свои корни до старого движения федералистов 1920-х годов, причем многие из их лидеров сражались в первоначальной Синьхайской революции. Хотя он имеет более консервативную, истеблишментскую базу поддержки среди дворянства и торговцев, некоторые из его лидеров имели более эклектичные убеждения. Его акцент на защите местного самоуправления сделал его мощным, особенно на юге, где он был основан, однако это также сделало партию более зависимой от склочных личностей ее региональных лидеров."
 YUN.endgame.310.d_default: "$YUN.endgame.310.intro$\n\nТан Цзияо, будучи давним президентом, консолидировал ВРА под собой. Поскольку болезнь Чжан Тайяня ухудшилась, он объявил о своем уходе из политики. Тан представляет более консервативную и авторитарную сторону ВРА — правя в духе Ляна Цичао, традиционной модели, а не как его западные либеральные коллеги. Его самой большой проблемой в будущем будет не только победить на предстоящих выборах (учитывая обстоятельства, он фаворит), но и убедить людей в легитимности выборов.\n\nПоскольку ДЛК готова бросить ему вызов собственной на удивление обширной избирательной кампанией, Тан должен пройти по лезвию ножа, чтобы защитить свое наследие. Поскольку Чэнь Цзюнмин также отходит от национальной политики из-за плохого здоровья, он выдвинул Ма Юхана, бывшего заместителя Чэня, своим напарником на выборах."
 YUN.endgame.310.d_satellite: "$YUN.endgame.310.intro$\n\nСвержение и смерть Тан Цзияо, как предсказывали, станут концом его крыла ВРА, но факел Партии народного управления (ПНУ) был подхвачен его хитрым сыном Тан Сяоином. Поскольку болезнь Чжан Тайяня ухудшилась, он объявил о своем уходе из политики, оставив ПНУ в руках молодого политика. Младший Тан отличается от своего отца — хотя он также получил образование в Японии, он изучал экономику и играл в основном гражданскую роль в правительстве своего отца.\n\nБолее либеральный и лучше настроенный на современные китайские политические события, он заключил союз с бывшими союзниками и иногда соперниками своего отца в ВРА. Он выбрал бывшего заместителя Чэнь Цзюнмина Чэнь Цию в качестве своего кандидата в вице-президенты, чтобы обеспечить голоса кантонцев, пообещав при этом назначить северянина своим премьер-министром. Хитрый молодой человек может стать величайшим вызовом для правления Цунь Шушэна."
 YUN.endgame.310.a: "ВРА подчеркивает умеренное, конституционалистское послание."
 YUN.endgame.310.b: "Тан опирается на свои связи в армии и бюрократии."

 YUN.endgame.311.t: "Интриги демократов Китая"
 YUN.endgame.311.intro: "Демократическая лига Китая, возможно, была относительно новым событием, но она является продуктом десятилетий усилий китайских реформаторов по объединению различных либеральных и прогрессивных интеллектуалов для содействия демократическим реформам. Лян Цичао, наставник и прототип для многих ведущих фигур ДЛК, пытался сформировать организованный политический альянс еще в 1913 году, когда Прогрессивная партия объединила все фракции, не входящие в Тунмэнхуэй, в Бэйяне. Однако более непосредственно создание Объединенной лиги национального строительства в 1929 году стало первой итерацией того, что в конечном итоге станет ДЛК.\n\nДЛК, в которой доминируют круги интеллигенции среднего класса и бизнеса, столь же громоздка, как и ученые, бюрократы и банкиры, которые доминируют в ее руководстве. Левое крыло ДЛК включает в себя Федерацию национального спасения и различные более мелкие региональные группы, часто связанные с социалистическими отколовшимися группами. Либеральное крыло партии включает Общество полумесяца, Китайскую национальную ассоциацию демократического строительства и Китайскую ассоциацию содействия развитию демократии. Многие последователи Ляна (лянгисты) сплотились вокруг Демократической социалистической партии, которая сочетает в себе экономическую программу реформистского социализма с националистическим, несколько традиционалистским социальным мировоззрением."
 YUN.endgame.311.d_default: "$YUN.endgame.311.intro$\n\nДЛК действительно выигрывает от базы поддержки, которая менее определена регионально, чем у ВРА, с отделениями на севере, востоке и юге, где расположены крупнейшие населенные пункты Китая. Оппозиция правлению Тан Цзияо сплотилась вокруг Ло Лунцзи, который стремился использовать этот импульс для победы на предстоящих выборах. Пытаясь избавиться от своей репутации «мгновенно вызывающего несогласие» и чрезмерно вестернизированного, он неохотно предложил своему сопернику Чжан Цзюньмаю место в списке в надежде использовать как его репутацию упрямого социал-демократа, стойкого защитника китайской культуры, так и глубокую финансовую поддержку его семьи со стороны коммерческой элиты Шанхая. Тем не менее, крен влево или вправо неизбежно оттолкнет по крайней мере одно крыло партии."
 YUN.endgame.311.d_satellite: "$YUN.endgame.311.intro$\n\nЦунь Шушэн может быть президентом, но в некотором смысле он также «темная лошадка». Региональный интеллектуальный лидер, не особенно связанный с какой-либо из основных партий в ДЛК, его национальная известность в основном проистекает из некоторых его недавних работ о деревенской реформе и его неожиданного руководства силами Юньнани к объединению. Он стремился расширить свою базу, назвав Ло Лунцзи своим напарником, добавив в свой список уроженца Цзянси, но получившую образование на Севере знаменитость. Тем не менее, союзы Цуня с различными социалистическими и милитаристскими фигурами неизбежно будут подвергнуты тщательной проверке, поскольку он борется за то, чтобы быть больше, чем просто удачливым политиком с периферии Китая."
 YUN.endgame.311.a: "ДЛК делает поворот влево."
 YUN.endgame.311.b: "ДЛК развивается вокруг своего либерального крыла."
 YUN.endgame.311.c: "ДЛК обхаживает лянгистов."

 YUN.endgame.312.t: "Другие партии собираются"
 YUN.endgame.312.d: "ВРА и ДЛК фактически сговорились монополизировать политическую систему после объединения, но другие партии республики решили не сдаваться без боя. Готовясь к выборам, политические агенты из легальных и нелегальных партий организовались, сражаясь за сохранение своих существующих ниш и пытаясь расшириться на другие избирательные округа, используя слабые места в работе ВРА и ДЛК на местах.\n\n[UPC_GetDCPPartyLeader] и Партия младокитайцев имеют корни лянгизма и обслуживают нелиберальную политическую традицию. Лян Цичао, отец реформистской традиции Китая, на протяжении всей своей жизни метался по политическому спектру. Его руководящие принципы конституционализма, гражданского национализма, модернизации и сбалансированного подхода к западной науке и китайским традициям продолжают быть популярными, особенно в Северном Китае. Поскольку многие северяне чувствуют себя маргинализированными новым доминированием Юга в рамках федералистской системы, обе партии набрали обороты.\n\nПолитика Бэйяна традиционно избегала политических партий западного типа, особенно после того, как конфликт Юань Шикая с Тунмэнхуэем сделал партии фактически синонимом революционного мятежа. Но поскольку южане продемонстрировали их мощь, многие северяне начали экспериментировать с партийной политикой. Тем не менее, стигма сохраняется, и ностальгия по старой джентльменской политике жива. Региональные политические машины продолжают управлять политиками, упрямо держащимися за свою независимость и обслуживающими местные интересы.\n\nКрайне левые, изгоняемые, если не вовсе угнетаемые властями, продолжают действовать. Всегда лучшие в массовой мобилизации избирателей, особенно недовольных и обедневших, они остаются силой, с которой нужно считаться. Гоминьдан и КСП выживают, но появились расколы. Некоторые принимают новую республику, другие поклялись сражаться дальше в тщетной надежде на свою революцию."
 YUN.endgame.312.a: "Без политических партий мы будем поглощены новым порядком."
 YUN.endgame.312.b: "Север остается таким же упрямо независимым, как и всегда."

 YUN.endgame.313.t: "Смерть Чжан Тайяня"
 YUN.endgame.313.d: "Чжан Тайянь скончался в своем доме; поступают противоречивые сообщения о тяжелом приступе астмы и лихорадке или раке носовых пазух. Однако бесспорным является поток скорби по всей стране. Газеты по всему Китаю сообщили о его смерти, и политики со всего политического спектра выразили свои соболезнования.\n\nПрезидент [UPC.GetLeader] удовлетворил просьбу его семьи о государственных похоронах, хотя изначально были некоторые разногласия по поводу того, где его следует похоронить, что задержало процесс. Завещание Чжана предписывало его детям защищать республику и избегать занятия каких-либо должностей в установленных иностранцами правительствах (что отражает его сохраняющийся страх перед иностранным империализмом), но не содержало четких указаний о том, где он хотел быть похороненным. Однако некоторые из его соратников откопали завещание, которое он написал еще в 1915 году, находясь в тюрьме, пожелав быть похороненным в Ханчжоу рядом с Лю Цзи, великим ученым, который помог в основании династии Мин. По-видимому, он даже купил близлежащий участок после того, как был освобожден, у потомков Лю, и это недалеко от других китайских героев, таких как Чжан Хуаньян и Юэ Фэй.\n\nВ завещании Чжана 1915 года высказывалось сожаление о том, что его вклад не будут помнить так же нежно, как вклад Лю Цзи, из-за его поддержки Юань Шикая. Похоже, он ошибался. Если не считать его героизма во время Синьхайской революции, его вклад в китайскую литературу и изучение классики наряду с развитием Федералистской республики фундаментально сформировали эту новую эру в Китае. Тем не менее, от живых будет зависеть, как он останется в коллективной памяти общественности."
 YUN.endgame.313.a: "Чжан Тайянь был великим патриотом и революционером."
 YUN.endgame.313.b: "Чжан Тайянь — отец-основатель нашей федералистской демократии."
 YUN.endgame.313.c: "Вклад Чжан Тайяня в науку не будет забыт."

 YUN.endgame.314.t: "Государство и нестабильность"
 YUN.endgame.314.d: "Выборы [GetYear] года неуклонно приближаются к своему завершению, но напряженность сохраняется. В то время как во многих местах ожидается, что голосование пройдет организованно, консерваторы боятся, что радикальные агитаторы будут манипулировать массами, в то время как прогрессисты выразили обеспокоенность по поводу честности голосования.\n\nЭти проблемы ожидаемы в молодой демократии. Китайские выборы исторически были относительно сдержанными делами, как правило, решаемыми местным дворянством и власть имущими. Проведение выборов такой динамики перевернуло десятилетия укоренившейся политики, и некоторые действующие лица действительно рискуют быть смещенными новым поколением. Эта неопределенность, однако, создала атмосферу как надежды, так и страха.\n\nСтарая Бэйянская республика всегда вращалась вокруг сильных людей и их (обычно провинциальных) союзников. Федералисты утверждают, что они другие, но многие отмечают, что юньнаньские и другие южные фигуры продолжают удерживать основные рычаги власти в армии и бюрократии и даже неправительственных институтах, таких как партийные офисы и бизнес. Даже в академических кругах и прессе, где доминируют север и восток, те, у кого есть связи с Куньмином и Гуанчжоу, увидели карьерный рост. Поскольку их влияние приобрело национальный масштаб, мелкие разногласия между фракциями Юньнани стали неактуальными для большинства посторонних. Критики осуждают появление так называемой «Клики Дянь» (Дянь — аббревиатура Юньнани), монополизирующей желаемые должности влияния.\n\nПоскольку нация сталкивается с неопределенностью и этой реконсолидацией власти в руках немногих, откат демократии, вероятно, будет насущной проблемой по крайней мере для поколения. Это может произойти в любой момент и воспользоваться рядом потенциальных оправданий — государство начинает разваливаться изнутри, нация находится под угрозой извне, оспариваемые результаты голосования. Многие задаются вопросом, останется ли наша демократия жизнеспособной надолго."
 YUN.endgame.314.a: "Республика была лучше, когда голосование было сдержанным, скромным делом."
 YUN.endgame.314.b: "Свободное выражение воли народа — вот в чем суть демократии."

 YUN.endgame.320.t: "Широко оспариваемые выборы"
 YUN.endgame.320.d: "Китайские демократы долго ждали свободных и справедливых национальных выборов и цеплялись за надежду, что Федералистское движение сможет их обеспечить. К сожалению, однако, по мере того как объявляется все больше и больше результатов гонок, кажется, что им придется ждать еще много лет.\n\nХотя во многих округах действительно состоялось легитимное (или достаточно легитимное) голосование, многие другие были омрачены многочисленными нарушениями и обвинениями в фальсификациях. Результаты гонок с небольшим отрывом во многих центральных провинциях были объявлены в пользу консервативных кандидатов, а жалобы отклонены несочувствующими избирательными комиссиями. Во многих отдаленных провинциях поступали сообщения о подавлении избирателей или иногда даже о прямой фальсификации голосов офицерами Центральной армии. Вопиющая предвзятость большинства провинциальных истеблишментов в пользу статус-кво в подавляющем большинстве случаев благоприятствовала одной стороне: Великому республиканскому альянсу.\n\nНесмотря на возражения оппозиционных групп, [UPC_GetSTAPartyLeader] был назван президентом и поспешно приведен к присяге. Попытки оспорить результаты в суде начались, но большинство осознает тщетность ситуации. Армия явно выбрала своего фаворита после месяцев хаотичной кампании, и их командиры вряд ли сдвинутся с места сейчас. Вера в демократические процедуры отпала, и по мере того, как все больше и больше законодателей занимают свои места в [UPC.Capital.GetCapitalVictoryPointName], становится ясно, что институционального сопротивления его правлению не будет.\n\nВ отчаянии лидеры ДЛК призвали своих последователей выйти на улицы, чтобы протестовать против результатов, но, похоже, они лишь оттягивают неизбежное."
 YUN.endgame.320.a: "Демократия в действии, я полагаю."

 YUN.endgame.321.t: "Президентский самопереворот"
 YUN.endgame.321.d: "Президент Китая почти всегда обладал значительной властью, гораздо большей, чем предоставляет конституция. А когда это не Президент, это часто другой сильный человек за кулисами. Возможно, составители Конституции Федералистов надеялись, что законодательного органа или провинций, или простых демократических норм будет достаточно, чтобы остановить то же самое в их новой республике. Или, может быть, они приняли эту реальность задолго до ратификации.\n\nВ любом случае, президент Тан аккумулирует все больше и больше власти, консолидируя контроль над исполнительной властью за собой и своими приспешниками. Его агенты начали систематическую кампанию преследования диссидентов, и оппозиция находит все меньше и меньше законных путей для противодействия его правлению. Даже некоторые члены его собственной Партии народного управления оказались отодвинуты на второй план, поскольку Тан стремится консолидировать власть вокруг себя и небольшой клики чиновников из Юньнани, прозванной Кликой Дянь. Говорят, что сам премьер-министр [GetSecondInCommand] находится в опасном положении. Медленно, но верно демократические гарантии, установленные конституцией, демонтируются.\n\n[UPC_GetCDLPartyLeader] и другие лидеры ДЛК предприняли последнюю отчаянную попытку опротестовать захват власти Таном, распространяя в Национальном собрании законопроекты, призывающие к существенным ограничениям указов Президента и созданию правительства национального единства с участием всех партий. Но это не получило большой поддержки со стороны других партий, большинство из которых предпочли занять выжидательную позицию, если не прямо подчиниться правлению Тана.\n\nИнтеллектуалы ДЛК также начали озвучивать свои жалобы в передовицах по всей стране, надеясь на широкое сопротивление, но находя в основном апатию у утомленного войной народа. Большинство провинций также твердо находятся под контролем Тана либо из-за лояльности, страха репрессий, либо из-за презрения их губернаторов к радикальным действиям. Пресса, ориентированная на правительство, обвинила ДЛК в подрывной деятельности, в то время как демократия молодой республики разрушается."
 YUN.endgame.321.a: "Народ выбрал Тана, чтобы он вел их, а не их."

 YUN.endgame.322.t: "Падение правительства ДЛК"
 YUN.endgame.322.d: "Правительство [GetSecondInCommand] шаталось уже некоторое время, ослабленное противоречивыми решениями, недовольным военным командованием и плохим управлением различными кризисами Китая после объединения. Общественная поддержка правительства резко упала, говорят, что бандитизм растет, а элиты начали требовать, чтобы более сильное руководство взяло контроль. Но самое убийственное, похоже, что [UPC.GetLeader] потерял доверие магистратов и военных офицеров, от которых зависит функционирование его правительства.\n\nНебольшой бунт в столице наконец дал им предлог, необходимый для действий. Несколько студенческих активистов в [UPC.Capital.GetCapitalVictoryPointName] были арестованы полицией по обвинению в принадлежности к мятежной социалистической ячейке. Это вызвало значительное осуждение со стороны студенчества, и после того, как протесты переросли в насилие, местные власти приказали арестовать десятки человек, включая нескольких их профессоров, что усугубило беспорядки и подкрепило мнение о том, что ДЛК укрывает социалистических агитаторов в своих рядах. Многие из задержанных ученых являются членами ДЛК, которые умоляли Президента вмешаться от их имени.\n\nУ него едва ли был шанс сделать это. Когда весть об инциденте разнеслась по столице, поползли слухи о его намерении приказать освободить подозреваемых. [UPC_GetSTAPartyLeader] воспользовался моментом, призвав к вотуму недоверия кабинету премьер-министра [GetSecondInCommand]. Предложение было принято с поразительной скоростью — многие законодатели даже не присутствовали при голосовании. Позже той же ночью президент [UPC.GetLeader] исчез; полагают, что он сам был арестован в ходе дворцового переворота. Бывший премьер-министр и многие другие члены ДЛК бежали, надеясь сплотить сочувствующих союзников в провинциях."
 YUN.endgame.322.a: "Мы можем ожидать отставки [UPC.GetLeader] в ближайшее время..."

 YUN.endgame.323.t: "Мученики демократии"
 YUN.endgame.323.d: "Протесты начались медленно, но стали нарастать, когда ДЛК начала сплачивать своих последователей, чтобы противостоять силовой игре [UPC_GetSTAPartyLeader]. Юньнаньская армия нанесла сильный и быстрый удар, парализовав зарождающуюся оппозицию. Армейские кадеты организовали толпы лоялистов для нападения на протестующих ДЛК, в то время как полиция проводила рейды в домах их лидеров.\n\nЕще более пугающими были убийства средь бела дня. Ли Фужэнь и Ван Жэнь были застрелены в Сиане. Ли Гунпу, один из «Семерки благородных» и видный организатор Федерации нацспасения, получил тяжелую травму головы от рук проправительственной толпы. Восстанавливаясь в Куньмине, он был застрелен и зарезан офицерами местного гарнизона во время прогулки.\n\nРазъяренный Вэнь Идо произнес импровизированную речь на похоронах Ли три дня спустя, отпустив едкие замечания в самом сердце власти Клики Дянь. Он вызывающе обратился к тайным агентам, внедренным в толпу, заявив: «Мы не боимся смерти. Мы готовы пойти по стопам Ли! В тот момент, когда мы выходим за дверь, мы не думаем о том, чтобы вернуться обратно». Позже в тот же день он был изрешечен пулями, выходя из своего офисного здания.\n\nЕго мученическая смерть вызвала поток скорби. Во многих стихах Вэня он описывал свою надежду на «смерть в экстазе», умирая в совершенной красоте в погоне за своими идеалами. Героический акт самопожертвования и исполнения. Харизматичный учитель и политик однажды драматично протянул руки к аудитории, держа меловой порошок, настаивая на том, что как ученые ДЛК не имеют крови на своих руках. Он попросил толпу не умалять его чистых рук, ибо они могут «менять историю и творить чудеса».\n\nРеакция была сильной, но для Клики Дянь уже слишком поздно отступать. Лидеров ДЛК продолжают выслеживать и нападать на них. Другой, Сунь Чжунъюань, был убит в Пекине, а Дао Синчжи умер от инсульта в Шанхае. Введен комендантский час, издания закрыты, и многие бежали из страны."
 YUN.endgame.323.a: "[UPC_GetSTAPartyLeader] победил, но ужасной ценой."

#YCD Endgame Events (330-359):

 YUN.endgame.330.t: "Храбрые поэты в раненой нации"
 YUN.endgame.330.d: "Вторая японо-китайская война принесла невыразимые ужасы нации, и особенно людям, из которых она состоит. Матери потеряли сыновей, дети потеряли отцов, братья потеряли сестер. Это был конфликт против полного имперского господства и культурного уничтожения, последний бой всех китайцев против тех, кто стремился к их гибели. Запечатленная с необычайным использованием фотографии и даже киносъемки, тем не менее, вековая традиция прозы и поэзии запечатлела такие жестокие события в идеальном стазисе.\n\nСреди возглавляемой юньнаньцами Демократической лиги Китая есть множество людей, обученных теми из Общества полумесяца в сочинении стихов, и популярные патриотические банальности одного конкретного человека нашли возрождение среди народа нации теперь, когда он сам поднялся к известности.\n\nЯн Мин, этнический бай, родившийся в Дали, провинция Юньнань, в 1919 году, особенно молод для своего возраста, родившись в поколении, которое не знало ничего, кроме Эры милитаристов. В возрасте 9 лет он был подмастерьем в магазине в Сягуане, а затем в 16 лет в 1936 году он отправился в Куньмин, чтобы учиться в Китайско-немецком университете, и во время японо-китайской войны с ревом включился в действие, составляя и производя множество как пропаганды, так и поэзии.\n\nПредставленное Вэнь Идо Объединенному обществу новой поэзии, самое популярное произведение Ян Мина — это, безусловно, «Китайские солдаты погибли вне поля боя». Вплоть до того, что оно было прочитано самим Вэнем и адаптировано в драму, получив дополнительное признание в своей новой среде. В политическом мире сам Ян является яростным и неистовым членом Демократической лиги Китая, склоняющимся к ее левоцентристскому крылу. Решительный как в патриотических, так и в демократических наклонностях, он рассматривается как восходящая звезда в кругах ДЛК."
 YUN.endgame.330.a: "Новые поэты-политики нового поколения!"
 YUN.endgame.330.b: "Ему нет и 30 лет, а он приписывает себе такое величие?"

 YUN.endgame.331.t: "Революционеры среди реформистов"
 YUN.endgame.331.d: "С момента появления социализма на динамичном, молодом и текучем китайском политическом поле битвы Эры милитаристов существовал разрыв между теми, кто ищет классовой борьбы как метода провозглашения своих социалистических идеалов, и теми, кто участвует в буржуазной демократии для продвижения освобождения народа.\n\nПечально известные своей пропагандой революционной борьбы, самыми ярыми, неистовыми и непреклонными сторонниками первого в Китае должны быть Левый Гоминьдан и Китайская синдикалистская партия. Интерпретируя Три принципа как рецепт от бед общества и руководство по внедрению социализма в Китае, такие организации, как Временный комитет действий, давно возбуждали массы, умоляя массы взяться за оружие и свергнуть своих угнетателей.\n\nВозможно, величайшей массовой политической организацией, поддерживающей последнее, является левое крыло Демократической лиги Китая. От Федерации национального спасения до Демократической социалистической партии, левые ДЛК, возможно, сознательно, приняли большую часть перебежчиков-социалистов-революционеров. Бывшие поклонники Гоминьдана или даже доморощенные социалисты толпами присоединялись к Демократической лиге Китая, поскольку Гоминьдан теряет в статусе, значимости и постоянно преследуется государственным аппаратом; в основном за желание свергнуть упомянутый государственный аппарат.\n\nНо это расширение ДЛК за счет новой, радикальной крови привело к возникновению раскола в ее собственном руководстве. Работа с радикалами, несомненно, повредила бы восприятию движения среди определенных групп интересов и даже оппозиции. Однако отказ от работы с радикалами внутри ДЛК открыто признал бы дальнейшую фракционность внутри ДЛК, нанося ущерб влиянию и силе ДЛК в целом."
 YUN.endgame.331.a: "Мы не можем упрекать их за их практику."
 YUN.endgame.331.b: "Спросим их, насколько компромиссным был Сунь Ятсен?"

 YUN.endgame.332.t: "Национализация спартанского образования"
 YUN.endgame.332.d: "Считающийся отличным педагогом, возможно, даже лучшим, чем политиком, служба японского образованного экономиста, ставшего пионером демократической революции, во время японо-китайской войны является не чем иным, как замечательной. Найдя работу в Пекинском университете в 1932 году после возвращения в Китай, он в конечном итоге был изгнан обратно в свою родную провинцию после левых репрессий со стороны Чжили.\n\nНе испугавшись, он бросился на путь, который вскоре станет его визитной карточкой. Отправившись в Тэнчун, Цунь основал первую школу для зарубежных китайцев в Юньнани, среднюю школу Ицюнь, и служил ее директором. Собирая собственные средства на месте, Цунь, как цитируют, сравнивал создание школы со «строительством мудрого фруктового сада» и предложил концепцию сельских школ, наконец интегрирующихся с обществом.\n\nТщательно обучая и взращивая будущее своих учеников, Цунь выступал за особую уникальную форму «спартанского» образования. Призывая их развивать прагматичный дух, он оправдывал свой самодостаточный стиль обучения, настаивая на том, что «спартанская строгая подготовка необходима и полезна для китайской молодежи, обремененной тысячелетними традициями».\n\nАналогичным образом выступая за то, чтобы учителя и ученики выращивали свои собственные урожаи и ремонтировали свой кампус самостоятельно, его уроки доходили до того, что позволяли ученикам расчищать дороги своего поселка, организовывать пожарную бригаду, создавать спортивную команду, строить проекты по сохранению воды, развивать рыболовство и птицеводство и даже помогать фермерам с зимней пахотой.\n\nПригласив группу учителей из Куньмина для улучшения школьного образования в Ицюне, Цунь пошел дальше, чтобы внедрить свои методы в Хэшуне, служа директором начальной школы, директором библиотеки и директором отдела культуры поселкового управления. С его опытом он сумел вовлечь 90% детей школьного возраста в систему образования, и каждый взрослый в возрасте до 30 лет мог читать и писать."
 YUN.endgame.332.a: "Пусть его методы станут популярными по всей стране!"
 YUN.endgame.332.b: "Вряд ли стоит превращать каждую школу в коммуну."

#CMS Endgame Events (360-389):

 YUN.endgame.360.t: "Позиция Полумесяца"
 YUN.endgame.360.d: "С их полным вторжением в политику, смесь искусства и государственной деятельности Общества полумесяца принесла с собой их одноименные «Позиции Полумесяца». Одновременно литературный, художественный, научный и политический манифест, как полагают, был составлен Сюй Чжимо перед его кончиной, а его идеи и ценности черпаются из стиля политической мысли «Нового гуманизма», поддерживаемого Лян Шицю. В конечном счете он действует как своего рода представление новой либеральной культурной позиции, поддерживаемой Обществом полумесяца.\n\nПроизведение начинается с общей критики всей литературной сцены, изображая ее в состоянии «анархического хаоса», потому что «рынок мышления» потерялся в «абсолютной свободе». Разворачиваясь на месте, оно затем следует за такой критикой с «новой позицией», занятой поклонниками Полумесяца, представляя их идеалы литературы двумя лозунгами: «Здоровье» (Цзянькан) и «Достоинство» (Цзуньянь).\n\nДостоинство, ибо его голос может отозвать жизнь, блуждающую на перепутье; здоровье, ибо его сила может искоренить все бактерии, разъедающие нашу жизнь и мысль. Видя жизнь как «целое», а не фрагментированную или видящую только крайности, манифест объявляет об их желании искать умеренность, а не крайность или странность.\n\nЧто касается манифеста, принцип и предпосылка «сдержанности» являются незаменимым компонентом видения Нового гуманизма, причем Достоинство и Здоровье осуществляют сдерживающую силу для жизни и литературы. Подчеркивая пропаганду такой сдержанности, он сочетает это понятие с порядком и умеренностью, в отличие от экстремизма, странности и сиюминутных чувств.\n\nВ завершение Полумесяц указывает на тринадцать «невыносимых» литературных сил: сентименталисты, декаденты, эстеты, утилитаристы, моралисты, агрессоры, экстремисты, утонченность, порнографы, фанатики, шарлатаны, девиз-исты и изм-исты. Связывая эти силы со своим зарождающимся антилевым подходом, они вместо этого предлагают «знакомое англо-американское понятие автономии литературы» с его индивидуалистическим, элитарным и неутилитарным подходом."
 YUN.endgame.360.a: "Моральное общество — это вежливое общество."
 YUN.endgame.360.b: "Замена авторитаризма элитаризмом?"

 YUN.endgame.361.t: "Быть Президентом"
 YUN.endgame.361.d: "Что значит быть Президентом Китая? Это путь к власти? Это наделение всеобъемлющими правами формировать будущее Китая? Почти тотальная власть? Подчинение законодательной власти, исполнительной власти? Если бы вы спросили множество людей, от самого прилежного крестьянина до самого беспринципного милитариста, вы получили бы столько же ответов. Но если вы спросите действующего президента Ло Лунцзи, что значит быть президентом? Его ответ будет прост: защищать человеческую свободу.\n\nНа недавней пресс-конференции президент цитируется так: «Если свобода слова запрещена, запрещена не просто речь, но мысль; и не просто мысль, но и развитие личности и характера. Запретить развитие личности и характера — значит прекратить жизнь для отдельного человека и уничтожить жизнь для массы людей».\n\nИменно индивидуум, а не государство, является самым важным аспектом жизни для Ло. Для него и многих других в Обществе полумесяца человек — это Мыслящее Существо, которое естественным образом ищет счастья. Такое счастье может быть достигнуто только тогда, когда могут расти индивидуальная личность и характер. Для Ло свобода абсолютна, неотъемлемое право, дарованное всем людям.\n\nДиктатуры в конечном итоге не могут выполнить тройную функцию государства, как ее разработал Ло: защита прав народа, воспитание и развитие народа, и предоставление народу среды мира, спокойствия, порядка и справедливости. Отрицая свободу, они препятствуют воспитанию и развитию личности и характера, способствуя вместо этого развитию пассивных, зависимых личностей. Или, как считает их Ло, «немыслящих механических устройств».\n\nДля Ло быть президентом означает, что он может наконец реализовать свое желание, чтобы интеллектуалы построили политическую систему, подчеркивающую свободу выражения мнений, государственную защиту свободы и правильное применение таланта. Революции происходят в первую очередь потому, что бессильные свергают могущественных, и поэтому нужно просто приблизиться к бессильным и поднять их на большие высоты."
 YUN.endgame.361.a: "Одинокий Воин, сражающийся с десятилетиями несправедливости."
 YUN.endgame.361.b: "Но, конечно, мы можем сделать больше, чем просто политическую реформу?"

 YUN.endgame.362.t: "Смутьян Полумесяца"
 YUN.endgame.362.d: "Хотя Общество полумесяца, Демократическая социалистическая партия и различные другие партии, входящие в Демократическую лигу Китая, вряд ли укомплектованы седобородыми и лысыми, будучи в основном возглавляемыми сравнительно молодыми людьми, каждая партия все же несет в себе зарождающуюся «Молодую гвардию» гораздо более амбициозных, а иногда и радикальных членов партии. И особого внимания среди всех восходящих звезд в Обществе полумесяца заслуживает некий Чу Аньпин.\n\nРодившийся в 1909 году в видной семье в Гуанси, семья Чу давно славилась своими достижениями на имперских экзаменах. Одноклассник Хуан Яньпэя, Чу по-настоящему засиял с поступлением в Университет Гуанхуа, якобы выбрав недавно основанное учреждение из-за своих зарождающихся левых взглядов. Увлекающийся литературным искусством, он присоединился к Обществу полумесяца как восходящая звезда, имея теплые отношения учителя и ученика с Сюй Чжимо.\n\nВстречаясь и учась у таких людей, как Сюй, Ху Ши, Чжан Дунсунь, Ло Лунцзи и других, Чу встретил многих своих близких друзей в Гуанхуа и даже встретил там свою будущую жену Дуаньму Люси во время своего пребывания там. Активно участвуя в Федерации национального спасения, Чу некоторое время оставался в Шанхае. Опубликовав несколько произведений в таких статьях, как «Возрождение» Чжан Дунсуня, Чу с годами постепенно отказался от прозы, все больше обращаясь к литературной критике.\n\nОтправившись в Британию учиться в 1936 году, он принял к сведению ситуацию в синдикалистском мире. С началом Войны сопротивления он вернулся в Китай, чтобы помочь вести войну по-своему: через писательство. Управляя различными книжными магазинами и литературными изданиями в качестве редактора, Чу помогал своим друзьям в Обществе полумесяца, ДСП и ФНС в организации Демократической лиги Китая. Убежденный демократ и либерал, Чу часто выпускает пламенные возражения политическим оппонентам Демократической лиги Китая, критикуя их за оппозицию демократии, их коррупцию или их авторитаризм, и даже начал делать предложения Форуму демократии и науки, чтобы интегрировать их в ДЛК."
 YUN.endgame.362.a: "День, когда умирает демократия, — это когда исчезают такие люди, как Чу."
 YUN.endgame.362.b: "Смутьянам было бы мудро умерить свой пыл."

#PGP Endgame Events (390-419):

 YUN.endgame.390.t: "Каков отец, таков и сын"
 YUN.endgame.390.d: "Как сын уважаемого Тан Цзияо, политическая карьера Тан Сяоина, похоже, идет в гору с недавним объединением страны. Студент-экономист Токийского императорского университета, младший Тан вырос в Китае, сильно отличающемся от Китая его отца. И все же старший Тан пытался привить добродетель и мораль своему преемнику. Когда Сяоин был моложе, отец возил его в трущобы Куньмина, где он видел низшие классы, прозябающие в грязи и нищете. Старший Тан строго напомнил сыну не забывать отдавать долг обществу и использовать свои победы во благо.\n\nТеперь, когда наступило объединение Китая, младший Тан поднялся по служебной лестнице как член ПНУ. Поскольку Тан стремится гарантировать, что его род продолжит иметь некоторый вес и влияние в национальной политике, его советники предложили, что, возможно, Тан Сяоин мог бы искать карьеру офицера в вооруженных силах, где доминирует Партия младокитайцев (ПМК). Это могло бы обуздать влияние ПМК в более широкой китайской политической среде, обеспечив при этом дружественный голос в военных рядах.\n\nВ качестве альтернативы другое предложение направлено на использование существующих политических сетей и опыта Сяоина для участия в реальном политическом аппарате. Поступая так, он сыграл бы ключевую роль посредника и политика, сохраняя интересы Тан Цзияо живыми еще долго после смерти Тана.\n\nДругая идея заключается в том, чтобы Сяоин просто присоединился к растущей национальной бюрократии Клики Дянь в качестве бюрократа. Используя свое образование в области экономики, Сяоин может идеально подойти для Департамента транспорта или Казначейства, гарантируя, что шестеренки национальной машины продолжат работать плавно и без коррупции."
 YUN.endgame.390.a: "Как и его отец, военный офицер!"
 YUN.endgame.390.b: "Политика подходит такому человеку, как он."
 YUN.endgame.390.c: "Кто-то должен следить за тем, чтобы поезда ходили вовремя."

 YUN.endgame.391.t: "Буддизм в Федеративной Республике"
 YUN.endgame.391.d: "Тан, как и многие другие китайцы, является набожным буддистом. Официально Тан стремился примирить демократическое федералистское движение с принципами и верованиями, отстаиваемыми в буддизме Махаяны; Тан также создал круг буддийских лидеров и приверженцев, которые заняли все более влиятельные позиции в новом национальном правительстве. Видным из них, конечно, является Чжан Тайянь, чей эзотерический буддизм «кармических семян» отвергает прямой теизм и почитание Будды, опираясь скорее на учения таких монахов, как Ашвагхоша.\n\nСи Цзыцян — этнический наси (меньшинство из Гималаев), который также учился в Военной академии Юньнани. Набожный буддист и член Буддийской ассоциации Юньнани, он является близким членом круга Тана и часто консультирует как по военным, так и по политическим вопросам.\n\nСюй Юнь — последователь чань-буддизма из Фуцзяни, посвятивший свою жизнь и учебу открытию истинной дхармы и поиску просветления под руководством Гуаньинь. Плодовитый монах, почитаемый за свою поэзию и аскетический образ жизни; его лекции — одни из самых любимых у Тана. Познакомившись с буддийскими сутрами на похоронах своей бабушки, Сюй Юнь отверг даосизм своего отца в пользу буддизма. В раннем возрасте 14 лет он заявил, что отверг все материальное и искал жизни монаха-аскета.\n\nВо время своих путешествий Сюй Юнь проехал от родной Фуцзяни до далеких Сычуани и Тибета, где посетил резиденцию Далай-ламы и Панчен-ламы. Его путешествия привели его даже в далекую Индию, на Цейлон и в Бирму, прежде чем он вернулся в Китай в зрелом возрасте. Неутомимый бодхисаттва с культовыми последователями, простирающимися до Таиланда, Малайи, Вьетнама и Бирмы, Сюй также провел собрание под названием «Защитить нацию, подавить бедствие, Собрание Дхармы Махакаруны», чтобы увеличить поддержку движения федералистов."
 YUN.endgame.391.a: "Следуйте дхарме даже в эти неопределенные времена."

#TXY Endgame Events (420-459):

 YUN.endgame.420.t: "Сады Дунлу и Конвенция Юньнани"
 YUN.endgame.420.d: "Рожденный ученым, Тан Цзияо любил садово-парковое искусство и культуру. Во время своего пребывания в Юньнани он даже пригласил китайских и французских архитекторов тщательно спланировать и построить Семейный сад Тан, ставший выдающимся архитектурным шедевром на юго-западе. Самый большой частный сад в Куньмине и один из самых известных, он содержит двухэтажное угловое здание с китайско-западной деревянной конструкцией, называемое «Красным зданием», пруд с лотосами, арочный мост, резные каменные перила, фонтан-рокарий, по одному западному и китайскому павильону и сцену. Не говоря уже о том, что за садом находятся тысячи сливовых деревьев.\n\nПолный пышных цветов, Тан нечасто использовал его для устройства банкетов для развлечения гостей, но в остальном сохранял его исключительно ради его величия и для размещения своей личной коллекции классики, антиквариата, золота, каллиграфии и картин. Однако, считая досадным, что немногие люди могут по-настоящему оценить сад и искусство в нем, он построил библиотеку Дунлу в саду в 1923 году, которая оставалась открытой для публики бесплатно, но только по средам, субботам и воскресеньям.\n\nРасположенный в том же горном хребте, что и Юньнаньский университет, его часто посещали различные студенты и преподаватели, и он стал своего рода культурным центром Юго-Запада. В то время как Тан Цзияо в последнее время часто оказывался за пределами Куньмина, его сын, Тан Сяоин, имел обыкновение принимать гостей и проводить политические дискуссии в саду. Такие фигуры, как Шэнь Цунвэнь, Ло Лунцзи, Вэнь Идо, Лян Шицю, Цунь Шушэн, Чжоу Синьминь, Пань Дакуй, Цзян Лянфу и многие другие, исследовали сад по приглашению Сяоина.\n\nТеперь, когда он президент, Сяоин все еще часто удаляется в библиотеку Дунлу и Семейный сад Тан в те немногие моменты праздного покоя, которые ему предлагаются. Для некоторых это может быть просто сад, но для Сяоина, возможно, в некотором смысле сад — это напоминание о его отце; его смешанном наследии, том, за что он боролся, и его готовности отдавать людям."
 YUN.endgame.420.a: "Я думаю, в каком-то смысле он бы гордился."
 YUN.endgame.420.b: "Смотрите, он предает идеалы отца!"

 YUN.endgame.421.t: "Ассоциация конституционных исследований"
 YUN.endgame.421.d: "Поскольку Юньнань быстро превратилась в оплот демократии благодаря реформам федералистов, она приветствовала всевозможные интеллектуальные споры и дискуссии, варьирующиеся от обыденных до политических и литературных. И в центре одного конкретного местного движения должен быть не кто иной, как единственный сын Тан Цзияо, Тан Сяоин.\n\nОсновав Общество конституционных исследований с такими людьми, как Чжоу Синьминь, Пань Дакуй, Цзян Лянфу и Цзэн Чжаолунь, Общество сосредоточилось на подготовке докладов и семинаров, обсуждающих отечественное конституционное движение, ситуацию с конституционализмом в зарубежных странах и различные призывы к укреплению демократии и расширению влияния китайского демократического движения.\n\nВозможно, устраняя разрыв между Партией народного управления и Демократической лигой Китая, знаковой публикацией АКИ стала «Наши требования перед внедрением конституционного правительства», смешивающая политику ПНУ с политикой ДЛК. Она предлагала, чтобы до внедрения конституционализма народу сначала была предоставлена свобода слова и личная свобода, вся оппозиция должна быть легализована, и должно быть создано коалиционное правительство.\n\nРасширяя свое влияние, Тан Сяоин использовал Общество для налаживания контактов с такими людьми, как Ли Гунпу, Чжан Тяньфан, Ян Чуньчжоу и Чу Тунань, фактически связывая себя с различными участниками операций ДЛК. В сочетании с его биологическими связями с отцом и, как следствие, его своего рода «княжеским» поведением по отношению к союзникам его отца, таким как Чэнь Цзюнмин, Тан Сяоин превратился в нечто вроде народного героя.\n\nОбъединяя все составные части Великого республиканского альянса, а также находясь в хороших отношениях со всеми составными частями Демократической лиги Китая, Сяоин одновременно поддерживал прочную связь с Партией младокитайцев и Китайскими конституционалистами. Достигнув, возможно, невозможного, он связал каждую демократическую силу в нации со своим образом."
 YUN.endgame.421.a: "Нельзя управлять конституционным фронтом без сострадания."
 YUN.endgame.421.b: "Он бы отдал ключи от замка Обществу обновления народа и Чжигундан!"

 YUN.endgame.422.t: "На вершине карточного домика"
 YUN.endgame.422.d: "Китайская политика всегда была довольно шатким карточным домиком. Тщательно выстроенная через закулисные сделки и ловкие рукопожатия, даже лучшие и самые макиавеллиевские государственные деятели Бэйяна могли быть легко разрушены одним неверным движением или одним неверным кивком шляпы. Просто спросите Дуань Цижуя, Чжан Цзолиня или Цао Куня, как разыгрались их амбиции.\n\nНо тем не менее, это не Бэйянская республика. Здесь нет врожденной коррупции, врожденного патронажа, беспощадных сделок или десятилетий политического багажа. Это новая, свежая и омоложенная республика. Построенная на крови мучеников и идеалах провинциальных свобод и национальной демократии. Но с новой республикой остается большое количество старых лиц. Эти старые помощники Чжили, Фэнтянь, Китайские конституционалисты, «Политическая наука», Младокитайцы, различные другие группы продолжают существовать на новом политическом поле битвы среди выскочек из Великого республиканского альянса и Демократической лиги Китая.\n\nНо это, безусловно, не большое препятствие для первенца Тан Цзияо. Коварный и искренний, по-своему, сам Сяоин добился больших успехов в построении подлинных связей на всем политическом поле битвы. От его собственных клик в Великом республиканском альянсе, будь то Партия народного управления, Клика Дянь, Общество обновления народа или Партия общественных интересов. Или те, что от его личных связей с такими людьми, как Ло Лунцзи, Вэнь Идо или Ли Гунпу, приносящими ему влияние в Обществе полумесяца и Федерации национального спасения Демократической лиги Китая.\n\nИли, может быть, даже политические независимые? Общество усердия, «Политическая наука» или даже торговцы. А как насчет лянгистов? Партия младокитайцев и Китайские конституционалисты, группы, с обеими из которых Тан сохраняет тесные связи.\n\nКогда его правление стабилизировалось, у Сяоина остается возможность дернуть за свои ниточки, сыграть балансирующую роль среди групп интересов республики, отдавая предпочтение какому-то ассортименту людей, чтобы помочь в построении нового будущего для Китая."
 YUN.endgame.422.a: "Давайте обопремся на лянгистов за помощью."
 YUN.endgame.422.b: "Вряд ли смогу предать свою паству."
 YUN.endgame.422.c: "Фракционность — это вирус, используйте Независимых."

#YUN UPC Epilogues (460-479):
 YUN.endgame.460.t: "Наука, дух и талантливое меньшинство"
 YUN.endgame.460.d: "Общество полумесяца начиналось как круг друзей, делящихся поэзией и политикой за ужином. Даже тогда они были исключительными людьми. В эпоху, когда многие отчаянно обращались к модернизации, они сохранили эту непоколебимую веру в человеческий дух. Индустриализация была неизбежна, но она разрывает связь между средствами к существованию и природой. Механические требования эффективности и конкуренции подорвали «Истинную симпатию», которая строит человеческую дружбу. Восстановление естественной «радости жизни» требует устранения «суеверия об успехе и эффективности», продвигаемого YMCA и марксистами в равной степени. Подобно конфуцианцам, Общество полумесяца рассматривает человеческую ответственность как моральную проблему и призывает «Талантливое меньшинство» подняться.\n\nЭто «Талантливое меньшинство», к которому стремятся последователи Полумесяца, — это не отдельный класс или партия, а множество людей, ищущих чистого знания. Эти люди должны быть в авангарде глобального движения, которое признает каждого человека своим собственным моральным существом — радикальный поворот от традиционной конфуцианской концепции человека. Как предположил Сюй Чжимо после прочтения Фридриха Ницше и Ромена Роллана, «в духовных вопросах я за аристократию; в материальных вещах я выступаю за демократию».\n\nНа Ло Лунцзи выпала задача построить эту демократию, которая сочетает представительное правительство с экспертной бюрократией. Люди не могут доверять правительству без свободных выборов и открытой, неподкупной системы государственной службы. Ло однажды посетовал на отсутствие в Китае доступных талантов, поскольку элиты нации уезжали за границу учиться, но часто отказывались возвращаться, а те, кто возвращался, страдали в системе, пропитанной непотизмом. Через «экспертократию» Полумесяца общественность может участвовать в политике через политические партии и местные организации, в то время как эксперты в профессиональных органах и профессиональных обществах уполномочены использовать свои знания для управления государством."
 YUN.endgame.460.a: "Спасение Китая от «национального самоубийства» тирании и утечки мозгов."

 YUN.endgame.461.t: "Образование и общество"
 YUN.endgame.461.d: "Будучи номинально Президентом всей Китайской Республики, Цунь Шушэн часто оказывается вдали от столицы, возвращаясь в свой родной город. Педагог в душе, он часто имеет привычку посещать различные школы в регионе в качестве педагога, и особенно среднюю школу Ицюнь. Возможно, он больше подходит на роль профессора или декана, чем политика, не говоря уже о политике всей нации за пределами Юньнани, Цунь тем не менее не нашел проблем в принятии образа истинного государственного деятеля.\n\nПроникнутый патриотическим пылом и пониманием того, что образование, а не политические реформы, не революция, не грандиозные внешнеполитические амбиции или болезнь тотального омоложения общества, а образование, и только образование является источником проблем Китая. Если люди не умеют читать, если они не умеют писать, как можно ожидать, что они будут участвовать в гражданской демократии? Формулировать свои собственные идеи, свои собственные концепции. Продвигать нацию к новым высотам?\n\nКогда Цунь занял пост президента, лучшие и ярчайшие умы нации не могли даже сравниться со средним набором выпускников американского университета. Но точно так же, когда Цунь занял должность в Центральной начальной школе Хэшунь, большинство детей были вне школы, а большинство взрослых моложе 30 лет были неграмотными. И все же посмотрите на поселок Хэшунь сейчас! Большинство детей зачислены в систему образования, и большинство взрослых умеют читать и писать.\n\nИ именно на этом примере Цунь стремится исправить величайшую беду Китая, сдерживающую его от истинного процветания. Чтобы открыть новую эру, люди должны просто посвятить себя развитию экономического строительства страны, а также ее культурным, образовательным и научным начинаниям. Работая неустанно, безжалостно, Цунь принял президентство раненой и пострадавшей нации. Но к тому времени, когда его срок закончится, в его уме нет сомнений, что он оставит людям свежую утопию."
 YUN.endgame.461.a: "От искры к пожару в прерии, к пламени, охватывающему всю нацию."

 YUN.endgame.462.t: "Наследники будущего"
 YUN.endgame.462.d: "Многое предстоит сделать, и многое предстоит сделать президенту Республики. Рожденный с лишь скудными воспоминаниями о том, что было до Эры милитаристов, Тан Сяоин — лишь один из многих представителей нового поколения, которому поручено управление от старого. Хотя его отец был, возможно, одним из самых важных людей во всей эпохе, что это значит для него? Была ли его доля в жизни намного лучше? Выиграл ли он от этого? Возможно, да, возможно, нет.\n\nТем не менее, его отец умер, преследуя мечту о свободной, демократической и федеративной Китайской республике. Ученый в душе, но воин в реальности — вот все, за что Тан Цзияо боролся всю свою жизнь, и это стоило ему того. Но его миссия не умерла вместе с ним; мечту поддерживают все его союзники, все его друзья и, что самое важное, его сын. Его плоть и кровь. И именно этому завету нация была объединена, чтобы завершить мечту, за которую Цзияо и многие другие погибли, сражаясь.\n\nСохранение мечты живой — вот для чего это нужно. Но это не значит, что Сяоин не искренен, нет. В мире, столь суровом, как наш, с такой жаждой богатства, власти, существует мало подлинных государственных деятелей, но многие отбрасываются как не более чем маклеры собственной выгоды. И все же Сяоин несет в себе подлинную убежденность, низовой организатор, импровизированный солдат.\n\nОтец вручил ему факел целой эры революционеров Синьхая, всех тех, кто умер, их мечты о китайской демократии не умерли вместе с ними. Пока живы Сяоин или любой из тех, на кого повлияло старое поколение реформаторов и революционеров, их долг будет возвращен. Это может быть не определено, это может быть не гарантировано, это может быть даже выставлением напоказ идеалистов, но мы должны попытаться."
 YUN.endgame.462.a: "Мы все — огни, сияющие во тьме."

 YUN.endgame.463.t: "Народное управление и федерализм Фэнцзянь"
 YUN.endgame.463.d: "Чжан Тайянь провел большую часть своей жизни, сталкиваясь с фундаментальным вопросом в сердце демократии: как защитить свободу личности, предоставляя государству достаточную власть для предоставления государственных услуг своим гражданам. Это долгое время разрывало Тайяня на части и двигало им в его начинаниях и в его философии. Буддийская концепция Пустоты позволила Тайяню рассматривать создание национального государства как просто прагматичную услугу.\n\nФактически, не только национальное государство, но и либерализм был средством для достижения цели, все служило для достижения баланса между свободой личности, авторитетом лидера и властью государства. Все, что делал федерализм, в конце концов, — это максимизировал ответственность личности, ее лидеров и государства.\n\nТайянь ушел, но, возможно, его величайший последователь жив. В президенте Тане неограниченная и неумолимая автономия, Фэнцзянь, к которой стремился Тайянь, была умерена холодной, суровой реальностью. Герой революции, воин-ученый, государственный деятель и создатель новой республики, Тан Цзияо — человек многих достижений. Но все они сделаны на службе народу и его стране. Его федерализм служит двойной цели в его глазах: как проект государственного строительства и как буддийский обряд.\n\nУлучшая жизнь людей, стремясь к конституционной, стабильной и антимилитаристской республике, Тан всегда шел узкой дорогой. Возможно, стремясь к долгосрочному видению, он, естественно, балансировал между автократией и революцией. Националист, но с глубоким страхом перед популизмом, он нажил много врагов, но в конце концов, что они могут противопоставить?\n\nДемократия была передана массам, во всей ее красоте, во всем ее уродстве. Подавая пример, Тан принес массам не новую эру деспотизма Бэйяна, а подлинную демократическую мечту, к которой он и Чжан Тайянь долго стремились. В конце концов, в уме Тана есть только один решающий фактор. «Как сделать бедные массы счастливыми?»"
 YUN.endgame.463.a: "«Я не свой, а своей страны. Я люблю то, что приносит пользу моей стране, и ненавижу то, что вредит ей»."

 YUN.endgame.464.t: "Грехи отца"
 YUN.endgame.464.d: "Это непростительная тяжесть наших генетических родословных, за которую наши потомки должны нести крест своих предков. Тан Сяоин прекрасно это понимает; его отца, окруженного лестью, восхищением, везде, куда бы он ни поехал, сравнивают с ним. Но именно за демократическое дело, дело федералистов, сражался и умер его отец. И именно для этого Сяоин был вознесен на свое место.\n\nЕстественно, долгая и неустойчивая дорога китайской революции к давно желанному идеалу не была прямой. Безграничный идеализм вырвался в хаотичное пламя Синьхая, поглотив династию Цин в жару ее собственной апатии, и из пепла построив Бэйянскую республику. Но даже произнесение такого названия вызывает чувства недомогания или отвращения. И это жаль. Жаль, что так много людей погибли за неудачу. Что так много людей погибли, не будучи утешенными завершением своей мечты.\n\nНо есть одно топливо, которое разжигает огонь идеалистов и революционеров по всему миру: надежда. Надежда на лучшее будущее, на лучшую жизнь не только для них, но и для их потомков тоже. Сяоин может почтить своего отца, неся его знамя, но так же поступает и скромный крестьянин, рабочий, политик, солдат.\n\nСиньхаю потребовалось более поколения для завершения, и даже тогда работа все еще остается. И поэтому нельзя оплакивать тех, кто отдал свои жизни, или грехи их прошлого, или их начальников. Всегда есть следующее поколение, следующая эра, чтобы нести факелы революции, демократии, идеализма. И поэтому, пока Сяоин работает в Президентском дворце, пока политик работает в собрании, пока рабочий на фабрике, пока крестьянин в поле, пока солдат в окопе, весь Китай работает над лучшим будущим. Независимо от цены или креста, который нужно нести."
 YUN.endgame.464.a: "Прошлое ушло, мы должны смотреть вперед."

 YUN.endgame.465.t: "Республика победителей"
 YUN.endgame.465.d: "«Мудрец появляется, когда мир следует Пути, и уходит, когда нет. Герой уходит, когда мир следует Пути, и появляется, когда нет». Перечитывая свой дневник времен юности в тишине спокойной ночи, эти слова, те легендарные слова, которые Тан Цзияо написал почти четыре десятилетия назад, будучи студентом, они все еще звучат правдиво, не так ли? Разве он не был конфуцианским военным героем?\n\nОживление внутренних дел всегда было самой важной задачей Китая, но обычные люди были совершенно неспособны на это. Онемелая бесчувственность китайцев перед лицом катастрофы от рук иностранцев переросла только в неумелые и неспособные метания, перехваченные революционными демагогами, надеющимися злоупотребить массами в своей собственной форме «спасения». Или иначе, апатия. Всепоглощающее ничто, которое позволяло милитаристам править так долго. Брат сражался с братом за власть и прибыль, и так долго, что немногие даже знали значение братства в первую очередь.\n\nСоздание общего национального государства, где каждый человек берет на себя ответственность за благополучие национального государства, — Цай Э размышлял об этом в своих трудах, он ругал Юань Шикая за преследование прямо противоположного. Но что бы он подумал о Тане, о «Мистере Мине», как он насмешливо называл его. Он не пошел ни по пути, намеченному Цаем, ни по пути своего другого наставника, Чжан Тайяня. Вместо этого он наметил свой собственный независимый курс.\n\nИ хотя это правда, Тан не принес либеральную демократию или федерализм, как желали другие; было очевидно, что массы просто не были готовы. Но он не даровал китайскому народу новую автократию. Нация была сильной и единой. С праздными размышлениями в Президентском дворце и стареющим телом, казалось, Тан Цзияо «герой» ушел в отставку, позволив Тан Цзияо «мудрецу» появиться, чтобы вести нацию в ее возрождении."
 YUN.endgame.465.a: "Умелый ученый почти так же хорош, как смелый стратег."

##Section 5e (600-699): End Game Long Yun/Hu Ruoyu Events

#NPA Endgame Shared (600-629):

 YUN.endgame.600.t: "Завершение миссии"
 YUN.endgame.600.d: "Наконец, после того, что казалось десятилетиями с редкими перерывами, нация снова объединилась, и, по-видимому, навсегда. И снова кажется, что история повторилась, поскольку клика милитаристов, названная в честь своей провинции происхождения, выполнила такие обещания национального объединения.\n\nПостоянно являясь ключевым игроком в национальной политике, истинные амбиции Юньнани, казалось бы, постоянно притуплялись либо контингентом провинций, объединившихся против них, либо прогибались под огромным весом ответственности из-за их позиционирования.\n\nТем не менее, их нынешние усилия не могут не напомнить о днях Цай Э, Ли Лецзюня и Тан Цзияо в 1915 году. И хотя это было так маловероятно в то время, учитывая смерть Цая и крах их движения, возможно, можно было бы считать естественным ходом событий, что Юньнань в конечном итоге завершит свою миссию, начатую десятилетия назад, утвердив себя как истинного Хозяина Восточного Континента.\n\nОднако термидорианские настроения Юньнани не были встречены слишком любезно устоявшимся Национальным порядком Бэйяна, который увидел, как группа шумных выскочек выкорчевала их собственные укоренившиеся позиции и заняла их место. Точно так же демократы и революционеры находят мало друзей в нынешнем правительстве, поскольку, хотя у руля стоит более мягкая рука, само правительство остается осторожным и консервативным.\n\nЗастряв между молотом и наковальней, правительство под руководством Юньнани стремилось позиционировать себя как носителей Пяти Рас и популизма в южном революционном стиле, но безуспешно, поскольку люди ищут реальных, подлинных перемен. А не возрождения старого порядка."
 YUN.endgame.600.a: "Мы должны построить нацию из обломков."

 YUN.endgame.601.t: "Последствия бесхозяйственности в экономике"
 YUN.endgame.601.d: "Достаточно сказать, что экономическое положение Китая как внутри страны, так и на международном уровне оставляет желать лучшего. Годы гражданской войны, за которыми последовала война за национальное воссоединение, а затем за национальное выживание, в достаточной степени истощили все без исключения финансовые резервы по всей стране, одновременно повредив инфраструктуру, заводы, дома и другие аспекты национального государства.\n\nИнвесторы сбежали или находятся в процессе этого, долги, накопленные в Эру милитаристов или в условиях военного времени, наконец, предъявляются к оплате, не говоря уже о годах потерянного экономического роста из-за краха относительного мира и стабильности, принесенных попыткой объединения Чжили.\n\nКроме того, надвигающаяся неопределенность в отношении будущих перспектив и отсутствие оптимизма в отношении какого-либо ощутимого прогресса со стороны нового правительства совпали с ростом коррупции, имущественных споров, злоупотреблений со стороны военных и общим неприятием хорошего поведения.\n\nОднако, безусловно, самой большой экономической проблемой, которую необходимо решить, является размер массивной китайской армии в настоящее время, поскольку призыв и мобилизация раздули вооруженные силы. Точно так же, с ювенильной и неэффективной бюрократией у руля правительственных органов, общие источники государственных доходов, такие как сбор налогов, не смогли соответствовать ожидаемым национальным стандартам."
 YUN.endgame.601.a: "Мы не можем двигаться вперед, оглядываясь на прошлое."
 YUN.endgame.601.b: "Сила и Единство придут со временем."

 YUN.endgame.602.t: "Младенцы в львином логове"
 YUN.endgame.602.d: "Возможно, совершенно не в своей тарелке, изоляционистски настроенная Клика Дянь оказалась в положении, совершенно ей неизвестном. Будучи готовой, по крайней мере, в сдержанной манере, помогать амбициям Тан Цзияо по национальному объединению, мало кто ожидал, что они сами станут людьми в столице, делегирующими и вырабатывающими решения для всего множества национальных политических вопросов.\n\nИ все же их объединение ввергло установленный порядок в хаос; изначально разделенные на Север и Юг, различные политические конвенции укоренились среди региональных политиков из этих областей, что достаточно очевидно в отношениях во время различных мирных переговоров Севера и Юга в Эру милитаристов. Даже на индивидуальном провинциальном уровне политика и государственная деятельность осуществлялись со своими уникальными провинциальными качествами.\n\nНо те же самые акторы, которые занимают должности в кабинете, оставались относительно неизвестными, по крайней мере, за пределами их кармана на юго-западе. Брошенные в сложный мир, где грубая сила и государственные перевороты вряд ли принесут людям какую-либо благосклонность, они остались без каких-либо козырей для продвижения своей политики, вместо этого вынужденные полагаться на чистое политическое мастерство; которого им не хватает.\n\nИмея опыт навигации в провинциальной политике и ее собрании, сам масштаб их новых обязанностей призывает их справляться не только с национальным собранием и настроениями, но и с различными силами, которые они когда-то сокрушили. Революционеры и радикалы, нацеливающие свое оружие на президентское кресло, демократы, использующие призывы к демократии, провинциальные милитаристы, требующие автономии, и старый порядок, стремящийся защитить свои укоренившиеся интересы.\n\nПри отсутствии сплоченного видения, коррумпированной бюрократии и общем состоянии беспорядка, вредящем любым усилиям истинной государственной деятельности, новая Китайская Республика вполне может сеять свои собственные семена дальнейшей гражданской войны, если она потратит еще хоть немного времени, не добираясь до корня проблем китайского общества."
 YUN.endgame.602.a: "Давайте заключим соглашение с интеллектуалами и учеными."
 YUN.endgame.602.b: "Вряд ли можно научить старых собак новым трюкам, не говоря уже о львах."

 YUN.endgame.603.t: "Собственный Дамоклов меч Китая"
 YUN.endgame.603.d: "Поставленный в уникально уязвимое положение, страдания Китая в XX веке, возможно, достигли своего величайшего дна. Слишком хорошо осознавая этот факт, национальные вооруженные силы начали различные злоупотребления как своей властью, так и в качестве предупредительного маневра, направленного на Президента-Маршала, чтобы сохранить его лояльность армии и гарантии их прав, автономии и защиты.\n\nКонечно, такая ситуация несостоятельна и в равной степени пригодна для эксплуатации. С экономикой в руинах, политикой, быстро рассеивающейся в хаос, и Кликой Дянь, скалящей зубы на собственное отражение, растущее чувство слабости и уязвимости в новой республике стало секретом Полишинеля.\n\nВ сельской местности сопротивление продолжает формироваться, распространяться и расширяться, поскольку бандиты и революционеры, похоже, проводят параллельные кампании по осуществлению «справедливости» против правительства и всех воспринимаемых тиранов. В ответ военные явно начали злоупотреблять своей юрисдикцией в районах с действующим военным положением, задерживая дворян, торговцев или крестьян и взимая штрафы или другие различные поборы. В том же духе в столицу поступает много сообщений о том, что появилось множество мелких милитаристов, фактически игнорирующих правительственные директивы.\n\nОдной из коренных причин так называемого Дамоклова меча для зарождающейся республики является чрезмерное раздувание армии и множество ее неэффективностей. Успокоившись на своих успехах и накопленном богатстве, милитаристы яростно сопротивляются любому понятию демобилизации или повторного введения военной дисциплины. А что касается простых солдат, они боятся демобилизации не из-за лишения власти своих боссов, а потому, что это приведет их к безработице без каких-либо технических навыков или ноу-хау в менее чем идеальной экономике."
 YUN.endgame.603.a: "Военные должны научиться держать дистанцию."
 YUN.endgame.603.b: "Силой напомнить нашим «дорогим» товарищам об их присяге."

 #Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 YUN.endgame.604.t: "Момент слабости"
 YUN.endgame.604.d.base: "Альянс национальной защиты (АНЗ) победил, успешно пройдя маршем от Гуанчжоу до Пекина и свергнув всех своих соперников перед собой. Они намного превзошли действия своих предшественников, которые свергли попытку Юань Шикая короновать себя императором, но в конечном итоге пали жертвой распрей и не смогли уничтожить Бэйянскую армию Юаня в битве.\n\nПобеда АНЗ катапультировала [YUN.GetLeader] к великой славе по всей стране, позволив ему объявить себя Президентом воссоединенной Республики. Впрочем, объединение не обязательно означает вечный мир, особенно с раздутой важностью изоляциониста и регионалиста [YUN.GetLeader]. Объединение приносит большие ожидания быстрее, чем предоставляет инструменты для их удовлетворения, и [YUN.Capital.GetCapitalVictoryPointName] сталкивается с множеством экономических, военных и политических проблем, которые оставляют их открытыми для претендента.\n\nС призывами усилить централизацию и подчинить различных автономных милитаристов, разные региональные лидеры, как крупные, так и мелкие, поспешили составить какую-то подготовку к будущей гражданской войне. Те, у кого есть амбиции, стремятся к президентству, те, у кого их нет, действуют в нарушение сокращения их военной мощи Юньнанью из всех провинций."
 YUN.endgame.604.d.shxyan: "$YUN.endgame.604.d.base$\n\nДолго просидев в своей провинции десятилетиями, Янь Сишань, возможно, получил свой самый главный момент, чтобы выступить и претендовать на мантию Бэйянской республики. Один из последних Великих северных милитаристов, оставшихся стоять, многие смотрят на Яня, чтобы сохранить целостность Северного доминирования, и, возможно, если звезды сойдутся, они вполне могут увидеть, как их желание сбудется."
 YUN.endgame.604.d.shxgmj: "$YUN.endgame.604.d.base$\n\nФэн Юйсяну не привыкать к восстаниям против бывших союзников, и хотя он находится в уникальном положении, чтобы уловить как южные популистские настроения, так и страхи Северного Бэйяна, некоторые в Гоминьцзюнь предложили уступить. Если только для того, чтобы сделать гораздо более грандиозную игру за власть изнутри системы, а не снаружи."
 YUN.endgame.604.d.generic: "$YUN.endgame.604.d.base$\n\nПоскольку история работает против [ROOT.GetLeader], неизбежно, что Центральное правительство станет сильнее с течением времени, и, возможно, сейчас, в пылу момента, возможность сокрушить наших соперников наиболее созрела."
 YUN.endgame.604.a: "Всегда нужно перехватывать инициативу, когда можешь!"
 YUN.endgame.604.b: "Мы уступим, по крайней мере пока."

 YUN.endgame.605.t: "[FROM.GetLeader] объявляет «независимость»"
 YUN.endgame.605.d.intro: "Объединение Китая было радостным моментом, но за закрытыми дверями оно было также и вероломным. Победа вытолкнула [YUN.GetLeader] прямо в центр внимания нации из безвестности, что неизбежно должно было вызвать ревность, гнев и даже замешательство его бывших союзников. Это также возложило на него огромные ожидания, которым его правительство изо всех сил пыталось соответствовать, разбираясь с различными военными, экономическими и политическими проблемами.\n\nОпасаясь неизбежной централизации страны, [FROM.GetLeader] и его [FROM.GetName] отказались переходить от союзников к подданным. Осуждая Президента, которого они помогли установить не год назад; объявляя о своем желании вести новую войну для защиты нации. Это казалось бы маловероятным, но они наносят удар в уникально уязвимый момент для [YUN.Capital.GetCapitalVictoryPointName] — проблемного правительства, уже осажденного трудностями после объединения."
 YUN.endgame.605.d.shxgmj: "$YUN.endgame.605.d.intro$\n\nДля Фэн Юйсяна это всего лишь еще одно в длинной череде предательств в его последовательных амбициях к высшей власти и влиянию. Уже будучи змеей, его Гоминьцзюнь доказала свою надежную устойчивость, и, имея связи как на Севере, так и на Юге, похоже, он стремится вырвать победу из когтей Дянь."
 YUN.endgame.605.d.shxyan: "$YUN.endgame.605.d.intro$\n\nДля Янь Сишаня это отражение его чистых амбиций. Поскольку АНЗ устранил его соперников на севере, он извлек большую выгоду из страхов Бэйяна быть затмеваемым югом. Теперь вопрос только в том, сможет ли он подкрепить свои амбиции победами на поле боя..."
 YUN.endgame.605.d.generic: "$YUN.endgame.605.d.intro$\n\nНеясно, восстанут ли какие-либо другие провинции в это время, но пока, по крайней мере, инициатива находится в руках [FROM.Capital.GetCapitalVictoryPointName]. Как долго продлится этот импульс — другой вопрос."
 YUN.endgame.605.a: "Армия Дянь непобедима!"
 YUN.endgame.605.b: "Снова в бездну."

#LYC Endgame Events (630-659):
 YUN.endgame.630.t: "Кабинет национальной защиты"
 YUN.endgame.630.d: "Лун Юнь прошел долгий путь за такой короткий промежуток времени. Некогда подчиненный офицер отдаленного милитариста, он стал губернатором, затем претендентом, а теперь внезапно стал бесспорным Президентом всего Китая. Но эта новообретенная власть сопряжена с тяжелой ответственностью, и он не может править в одиночку.\n\nСоздание правительства, необходимого для послевоенного восстановления Китая, начинается с назначения сочувствующего премьер-министра во главе правительства. В то время как старые правительства Бэйяна и Гуанчжоу были вынуждены подчиниться, сохранение легитимности как региональной фракции, ставшей национальным правительством, требует дипломатического такта и внутренних связей.\n\nБратья Ли, родственники Луна по его первому браку, необходимы для помощи в сохранении власти. Ли Пэйтянь — старший брат и был главным послом Луна в различных правительствах в дополнение к его разнообразному опыту в администрации. Хотя, по-видимому, его не очень любили, он, тем не менее, был главным переговорщиком с политическим истеблишментом Пекина и Гуанчжоу и курировал переговоры с демократическими фигурами в Юньнани. Возвышение Ли до премьерства (а его брата Ли Пэйяня до высокой роли в кабинете) формализовало бы систему в ее нынешнем виде, но также подтвердило бы подозрения людей, что Лун Юнь планирует править как автократ в стиле Цай Э.\n\nАльтернатива — назначить инсайдера Бэйяна, в идеале уже находящегося под влиянием Юньнани. Тан Цзияо работал над тем, чтобы культивировать некоторых как часть своей Партии народного управления, и выделилась другая пара братьев. Ван Дун был протеже Чжан Тайяня, когда тот был в Чжэцзяне, потомок престижной семьи Ван. Его брат Ван Жунбао был законодателем, послом и составителем конституции для правительства Бэйяна. Выбор его, по крайней мере, показал бы некоторое ограниченное уважение к старой политической системе и ограниченную приверженность конституционному правлению."
 YUN.endgame.630.a: "Братья Ли — наш предпочтительный выбор."
 YUN.endgame.630.a_tt: "§YПопулярность партий §gАвторитарных демократов§! и §PПатерналистов-автократов§! поменяется местами.§!"
 YUN.endgame.630.b: "Братья Ван — необходимый выбор."

 YUN.endgame.631.t: "Сюн Цинлай, Математик"
 YUN.endgame.631.d: "Сюн Цинлай родился в Юньнани в 1893 году в семье государственного чиновника. Несмотря на рост антииностранных настроений в провинции, он начал изучать английский и французский языки во время учебы в Юньнаньском провинциальном институте высшего образования в 1911 году. Это позволило ему выиграть стипендию провинциального правительства для изучения горного дела в Бельгии в 1913 году, но его учеба была прервана началом Великой войны.\n\nВ результате он отправился в Париж и завершил бакалавриат в лицее Сен-Луи, прежде чем продолжить углубленное образование в Университете Гренобля, где изучал математику, аналитическую механику, физику и астрономию. В 1920 году ему была присуждена степень магистра наук, но он поспешил домой, когда революция охватила Францию.\n\nВернувшись в Китай, он переехал в Нанкин, чтобы основать факультет математики в Национальном Юго-Восточном университете, где он писал учебники по математическим предметам от геометрии до дифференциальных уравнений, будучи пионером во внедрении современной математики в Китае. После недолгого пребывания в Северо-Западном университете в Шэньси (прерванного конфликтами милитаристов) он присоединился к факультету Университета Цинхуа, где курировал создание факультета математики.\n\nВ 1930-х годах он вернулся в Европу, где получил международное признание за свою работу «О бесконечных целых функциях и метачистых функциях». Он также посетил Международный конгресс математиков в Цюрихе от имени Китая, будучи единственным представителем Китая. По возвращении в Китай он стал президентом Юньнаньского университета в Куньмине, расширяя школу и продолжая представлять Китай за рубежом — лицо постоянно растущей академической мощи Китая на мировой арене."
 YUN.endgame.631.a: "Блестящий ум, выросший прямо здесь, в Юньнани!"

 YUN.endgame.632.t: "Семейный бизнес"
 YUN.endgame.632.d: "С момента женитьбы Лун Юня на Ли Пэйлянь в 1915 году семья Ли всегда имела влияние на Лун Юня. Ли Пэйлянь была потомком Ли Цаньтина, известного врача, и была известна своими художественными талантами и красотой. Точная история их знакомства стала неотъемлемой частью местной пропаганды и фольклора, но ясно то, что она была чрезвычайно близким доверенным лицом и эффективна в мобилизации женщин в поддержку своего мужа как «современная» китаянка — хорошо образованная, «вестернизированная» и имеющая хорошие связи с местными интеллектуалами. Она умерла от болезни всего в 33 года в 1933 году.\n\nСамым значительным из детей пары был Лун Цзимоу, их четвертый сын, который в настоящее время является младшим штабным офицером. У Луна также есть несколько других детей от других браков, большинство из которых либо в армии, правительстве, либо в бизнесе — наиболее известен Лун Сяньцзэн, который был старшим штабным офицером, курировавшим военное строительство, и крупным покровителем искусств.\n\nНесмотря на смерть Ли Пэйлянь, ее братья Ли Пэйтянь и Ли Пэйянь остаются чрезвычайно влиятельными в администрации Лун Юня. Ли Пэйтянь — старший брат, обычно используемый как полномочный представитель Лун Юня в различных внешних правительствах и переговорах с местными влиятельными лицами, но также ему было поручено курировать подготовку правительственных магистратов, Бюро зерновой политики и Финансовый департамент. Ли Пэйянь на год моложе и был педагогом, ставшим провинциальным сенатором, прежде чем был уволен из-за обвинений в коррупции. Он был освобожден благодаря браку своей сестры и с тех пор описывается как политический фронтмен Луна, организующий его сети патронажа, провинциальное банковское дело и несколько других высших экономических и политических ролей, включая управление водными ресурсами, развитие инфраструктуры и даже строительство сахарных заводов. Хотя его компетентность в этих вопросах была сомнительной, его лояльность — нет."
 YUN.endgame.632.a: "Лун мнит себя выше личной политики."
 YUN.endgame.632.b: "Лун и его семья наслаждаются плодами власти."

#HRY Endgame Events (660-689):
 YUN.endgame.660.t: "Восстание Лу Ханя"
 YUN.endgame.660.d: "Окончательная конфронтация между Ху Жоюем и Лу Ханем становится все ближе, и в некотором смысле это будет финальная схватка между севером и югом. Двое мужчин враждовали в течение некоторого времени, и ведение войн за объединение дало лишь краткую передышку. Тот факт, что обоих мужчин рассматривают как удачливых аутсайдеров в национальной политике, только подогрел дальнейшую неопределенность, поскольку они соревнуются за контроль над армией и бюрократией.\n\nВдали от дома Ху Жоюй пытался привлечь на свою сторону старый истеблишмент Бэйяна. Как новый президент, он имеет более высокий национальный профиль и может рассчитывать на иностранную поддержку для сохранения своего правления, но он также несет большую степень ответственности (справедливо или нет) за проблемы национальной реконструкции. Точно так же, пытаясь укоренить себя как преемника старой клики Чжили, он опирается на вызывающее разногласия наследие.\n\nМаршал Лу Хань, его соперник, в основном работал над тем, чтобы поглотить бывших союзников своего родственника Лун Юня в свой лагерь. Он также пытался закинуть широкую сеть, ухаживая за бывшими сторонниками правительства Гуанчжоу, регионалистскими настроениями, республиканским национализмом и даже популизмом в стиле Гоминьдана. Находясь в институционально невыгодном положении, он решил нанести удар первым, используя гнев по поводу предполагаемых темных сделок Ху с иностранными державами, коррупции и автократического руководства, чтобы попытаться устроить переворот.\n\nВоспользовавшись тем, что Ху Жоюй развлекал иностранных сановников, Лу Хань приказал своим людям окружить ключевые позиции в столице, надеясь арестовать Ху Жоюя и его главных лейтенантов. Но Ху, хорошо знакомый с падениями Тан Цзияо и Лун Юня, был достаточно мудр, чтобы сбежать и собрать свои собственные силы для контратаки. К ночи..."
 YUN.endgame.660.a: "Лу Хань контролировал столицу!"
 YUN.endgame.660.b: "Лу Хань бежал из страны!"

 YUN.endgame.661.t: "Кухня Юньнани"
 YUN.endgame.661.d: "Во многих лапшичных в Юньнани нередко можно увидеть «мисянь» (рисовую лапшу), подаваемую с ингредиентами, включая мясо, которое является сырым/полусырым, овощи и другие ингредиенты сбоку, часто в коробках. Этот деликатес — рисовая лапша «переправа через мост», которая родом из Мэнцзы в Южной Юньнани.\n\nСуществует несколько легенд, но наиболее часто цитируемая легенда описывает ученого, занимающегося на изолированном острове, и чья жена ежедневно доставляла ему еду. Чтобы сохранить бульон горячим во время ее путешествия через мост, она придумала метод изоляции его слоем куриного жира, сохраняя сырые ингредиенты отдельно, чтобы приготовить их в бульоне по прибытии. Блюдо также имеет некоторое сходство с вьетнамским «фо», что не должно вызывать удивления, учитывая, что Юньнань и Индокитай имеют общую границу.\n\nЛегенда настолько популярна, что утверждается, что это одна из причин, почему местные милитаристы в Мэнцзы углубили Южное озеро, чтобы имитировать историю. Это одно из самых ценных культурных наследий юньнаньцев, и оно популярно по всей стране.\n\nЧай пуэр — еще одна местная специальность. Он выращивается и производится народами Булан и Дай, живущими на горе Цзинмай, по крайней мере с 10-го века. Традиционно чайные деревья сажали в подлеске после удаления более крупных деревьев. Разделенные леса сажали для защиты от распространения вредителей и болезней, с возделываемой землей для сельскохозяйственных культур и овощей на более низких высотах."
 YUN.endgame.661.a: "Как восхитительно."

 YUN.endgame.662.t: "Новый премьер-министр"
 YUN.endgame.662.d: "Пока Ху Жоюй и Лу Хань конфликтовали, тихо работающим на заднем плане был недавно назначенный премьер-министр Чжоу Чжунъюэ. Чжоу — старейшина-государственный деятель Юньнани, политик этнической группы Бай, который учился в Университете Васэда в Японии, прежде чем вернуться в Китай работать педагогом в 1907 году. Он помогал возглавлять протесты против Неравноправных договоров, подписанных династией Цин, которые предоставляли британцам и французам эксплуататорские права на добычу полезных ископаемых в провинции Юньнань, и в 1910 году после инцидента в Пяньме он был отправлен правительством провинции в Пекин в составе делегации, протестующей против иностранного вмешательства.\n\nОн был назначен генеральным секретарем канцелярии губернатора Цай Э после Синьхайской революции и в последующие годы служил на образовательных, экономических и политических должностях в правительстве Бэйяна. Но когда Цай Э восстал против Юань Шикая, он остался, чтобы прикрыть побег Цая, и позже был вынужден бежать в Японию, тем самым пропустив Войну в защиту нации.\n\nПосле смерти Цай Э в 1916 году Ло был оставлен Тан Цзияо и играл руководящие роли — даже недолго был губернатором Юньнани. Он помогал в посредничестве между Таном, Луном и Ху во время различных переворотов, а также помогал в создании Музея Тунчжи Юньнани.\n\nВ начале 1930-х годов он в основном отошел от дел, но на фоне хаоса в провинции был отправлен эмиссаром в Пекин в качестве представителя. Связи, которые он там завел, и его относительный нейтралитет сделали его одним из немногих достойных кандидатов, заслуживающих назначения премьер-министром."
 YUN.endgame.662.a: "Чжоу — отличный связной между [ROOT.GetLeader] и законодательным органом."
 YUN.endgame.662.b: "Он надежный, молчаливый слуга государства — и, что более важно, Президента."

#YUN NPA Epilogues (700-729):

 YUN.endgame.700.t: "Заглядывая в логово Дракона"
 YUN.endgame.700.d: "Преодолеть разрыв между революцией и реформизмом — непростая задача, особенно в богатой истории Китая. Но внутри Клики Дянь Лун Юнь всегда был эксцентричным в этом отношении. Поскольку многие из его близких друзей и союзников либо присоединились к Гоминьдану, либо иным образом участвовали в Тунмэнхое, Лун по сути был окружен агентами революции на протяжении всей своей карьеры. Хотя вывод Президента-Маршала гораздо больше похож на вывод Политической науки, чем лакеев Ху Ханьминя или Ван Цзинвэя.\n\nХотя это не совсем несовместимо, президент Лун искал «революционный» путь не из убеждения в идеалах Сунь Ятсена, а ради его измеримого и действенного прогресса. В то время как президент находится далеко за пределами своей зоны комфорта, такое понятие остается верным в его сердце; нет человека, более подходящего для должности, требуемой Президентством, чем человек, который может контролировать все аспекты правительства с убеждением и рвением, сродни самым неумолимым революционерам.\n\nПо сути, правительство «экспертов», как советовали его друзья, такие как Ло Лунцзи и Лю Чжэньхуань, в действительности правительство, в котором доминируют те же люди, которые контролировали провинциальные дела в Юньнани. Полностью укоренившаяся, Клика Дянь является лишь кукловодами национальной бюрократии, заполняя каждый правительственный орган. Высшие эшелоны армии укомплектованы людьми, близкими к Президенту-Маршалу. Бюрократия контролируется Ли Пэйянем, Ли Пэйтянем и Чжоу Чжунъюэ. Джентри загнаны в угол под руководством Лу Чунжэня, банкиры и промышленники — под руководством Мяо Юнтая.\n\nВсе работая по приказу Луна, Дракон Дянь лишь вытеснил Северное доминирование в Центральном правительстве своим собственным, Южным. Ценя эффективность и лояльность, жесткое «революционное» руководство Луна стало предусмотрительным в прогрессе, хотя некоторые в оппозиции отмечают режим, зависящий от способностей одного человека для обеспечения своего выживания."
 YUN.endgame.700.a: "Так рычит Дракон Дянь."

 YUN.endgame.701.t: "Президент и его Республика"
 YUN.endgame.701.d: "Как история расценит эксперимент с Китайской Республикой? Успех? Провал? Или что-то среднее? Разорвав тысячелетнюю династическую историю Китая, Синьхайская революция выпустила настоящий вихрь идей. Но вихрь был всепоглощающим, и с контрнаступлением Юань Шикая Китай снова был ввергнут в десятилетия страданий, нищеты и гражданской войны.\n\nИ все же там в одиночестве стояли люди неповиновения: Клика Дянь. Но не может быть глупости или ошибки, их неповиновение перед лицом персоналистских силовых игр Юаня привело к расколу нации и последовавшей Эре милитаристов. Но, увы, все это прошло, и снова Клика Дянь преобразила нацию, на этот раз, возможно, на пути к единству, а не борьбе.\n\nСолдат-И армии Юньнани с ранних лет, карьера Лун Юня была ничем иным, как замечательной. Постоянно и последовательно отличаясь в кампаниях в нескольких армиях, «Дракон Юньнани» взял на себя ответственность перехватить инициативу и сохранить целостность своей провинции в 1927 году, и снова, помогая в свержении Тан Цзияо, выступил с саблей в руке, чтобы обеспечить своевременное правосудие тем тиранам, которые стремились бы плохо обращаться с народом. Или, по крайней мере, так бы изображал себя Президент-Маршал; героем простого человека.\n\nВ то время как личная политика президента остается всегда прагматичной и отчужденной, кабинет и придворные Луна, по крайней мере, изображали бы понятие приверженности демократии. Как и Чжили до него, ежедневные начинания Луна в Президентском дворце, Ассамблее и Сенате окружают его личной камарильей различных либералов, консерваторов и других демократов.\n\nВозможно, ближе всего к президенту, однако, Ло Лунцзи и его Общество полумесяца. Консультируя президента по вопросам, варьирующимся от национальной политики до простых взаимных дискуссий об искусстве, Одинокий воин и Дракон Дянь в некотором смысле являются двумя родственными душами, идущими по одному пути."
 YUN.endgame.701.a: "Каждому королю нужен свой ученый."

 YUN.endgame.702.t: "Новый порядок..."
 YUN.endgame.702.d: "Впервые со времен Цай Э в 1910-х годах у Юньнани есть голос в центральном правительстве. И на этот раз Юньнань на вершине. Мало кто верил, что он попытается, еще меньше верили, что он сможет, но Ху Жоюй смог объединить весь Китай под своим началом и своим временным правительством. Немногим больше, чем региональное примечание в китайской политике десять лет назад, Ху Жоюй стал президентом Республики.\n\nХу Жоюй отражает современную эволюцию идеологии Цай Э — с верой в мощную, почти абсолютную военную исполнительную власть, управляющую «Милитаристским государством-народом». Этот военный человек должен быть патриотичным, благородным, дисциплинированным и исполнительным по отношению к нации-государству — одушевленным «боевым духом», который позволяет ему различать национальные интересы и жертвовать всем ради них.\n\nНаходясь в Пекине, Цай Э никогда по-настоящему не был против партий в принципе, но считал, что единство нации и сохранение конституции имеют первостепенное значение. Чжили, возможные победители борьбы за власть Высокой эры милитаристов в Бэйяне, в конечном итоге осознали важность включения гражданских бюрократов и интеллектуалов в свой аппарат управления и оказались в целом эффективными в этом отношении с созданием Ассоциации гармонии и терпимостью (если не всегда сотрудничеством) с различными партиями в законодательном органе.\n\nХу Жоюй и его союзные генералы пришли к схожей динамике, назначив беспартийного премьер-министра Чжоу Чжунъюэ, в то время как их хунта правит на заднем плане. Их усилия по поглощению старой клики Чжили, Ассоциации гармонии и других сетей были неуклюжими и неровными, но будут медленно обретать форму в течение следующего десятилетия или около того. Ху Жоюй пытался представить себя «Великим комендантом», возвышая себя до того же уровня, что и культы личности Короля Баодина Цао Куна и Нефритового маршала У Пэйфу. Сможет ли он соответствовать этим шоу — другой вопрос."
 YUN.endgame.702.a: "...и продолжение старого."

 YUN.endgame.703.t: "От милитариста к президенту"
 YUN.endgame.703.d: "Постсиньхайская среда вознаграждала смелых, амбициозных людей, позволяя им подняться далеко над своим положением при наличии должной решимости, военного мастерства, харизмы, безжалостности и удачи. Лу Хань, этническое меньшинство из далекой провинции, был неожиданным победителем, но, возможно, воплощает меняющуюся судьбу эпохи.\n\nСражаясь, заводя друзей, плетя интриги, подстрекая толпу и предавая на своем пути к вершине, Лу Хань командует объединенным Китаем как его новый президент. Он остается загадкой для многих даже сейчас — друг детства, а затем предатель своего бывшего покровителя, популист, который всегда был связан с истеблишментом, и регионалист, сумевший объединить нацию.\n\nВозможно, лучший способ понять Лу Ханя — проследить линию лидеров Юньнани до него. Пребывание Цай Э в Пекине в качестве осторожного лейтенанта Юань Шикая видело, как он ухаживал за Лян Цичао и его различными партиями и подчеркивал конституционализм, но также поддерживал почти автократическую, милитаристскую власть президента за счет парламента и региональной автономии.\n\nЦай умер вскоре после начала патовой войны за защиту республики против коронации Юань Шикая. Тан Цзияо сменил его после короткой борьбы за власть и сделал упор на федерализм, конституционализм и даже движение к гражданскому, хотя и авторитарному правлению. Следующее поколение сохранило авторитаризм Цая и Тана и двинулось к изоляционистскому бренду регионализма, но также сохранило по крайней мере часть ориентированного на гражданских правления, разработанного Таном.\n\nТак что же будет делать Лу Хань, возможно, четвертый лидер Клики Юньнань, теперь, когда он правит всем Китаем? Национализм и централизация кажутся неизбежными, фаворитизм по отношению к юньнаньцам и другим южанам тоже. Что будет дальше — загадка, но идиосинкразическое, прагматичное лидерство не является чем-то новым в Китае. Вероятно, будут призывы к «демократии», прогрессу и конституционализму с разной степенью искренности и выполнения — но нация превыше всего."
 YUN.endgame.703.a: "Авантюрист остепенился."

