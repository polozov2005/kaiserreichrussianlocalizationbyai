#Revolutionary Datong Tooltips #
 YUN_revolutionary_datong_explanation_tt: "§gМы получим уникальный динамический модификатор, который будет усилен принятием фокусов в политическом дереве, чтобы помочь построить подлинно органическое партийное государство для избавления нации от ее моральных заблуждений.§!"

 YUN_revolutionary_datong_modifier: "Реализация Революционного Датуна"
 YUN_revolutionary_datong_modifier_desc: "Наконец-то Новые правые обеспечили полный контроль над Партией и теперь могут реализовать свое истинное видение совершенной и упорядоченной реорганизации не только Китайской Национальной партии, но и моральных волокон, которые долгое время давали китайскому народу гегемонию в Азии. Поскольку беспорядочные группы, марксистские перебежчики и дегенеративные элементы проникают и развращают моральный витализм, который течет в крови национальных революционеров, неуместно, чтобы революция делала то, что она должна, чтобы изгнать эти элементы и достичь истинного революционного датуна.\n\n§YНовые правые партии будут стремиться продвигать свои взгляды на создание истинного китайского революционного государства, основанного на китайской моральной философии, но стремящегося к модернизации, сродни той, что была в японской реставрации Мэйдзи. Вы сможете усилить этот динамический модификатор, принимая фокусы во всем политическом дереве, чтобы приблизить Китай к их видению органического государства.§!"

