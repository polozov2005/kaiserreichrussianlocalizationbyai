 YUN_completed_10_chen_cheng_reforms_tt: "§SМы приняли как минимум §Y10§! решений по китайской земельной реформе. На данный момент мы приняли [?YUN_chen_cheng_land_reform_progress_var|Y0] решений по китайской земельной реформе.§!"

 YUN_under_the_auspices_of_workers_and_peasants_effect_tt: "§LВнешний удар по Центральному комитету вызвал много ярости. Вы потеряете стабильность пропорционально тому, сколько влияния §PПатерналистов-автократов§!, §mРыночных либералов§!, §aАвторитарных демократов§!, §cСоциал-консерваторов§!, §lСоциал-либералов§! и §nНационал-популистов§! у вас было.§!"

 YUN_the_partys_most_loyal_effect_tt: "§L3-я армия остается довольно непопулярной среди радикальных кругов. Вы потеряете стабильность пропорционально тому, сколько влияния §PПатерналистов-автократов§!, §aАвторитарных демократов§!, §RСиндикалистов§!, §SСоциал-демократов§!, §rРадикальных социалистов§! и §nНационал-популистов§! у вас было.§!"

 YUN_flourish_of_the_kuomintang_liberals_effect_tt: "§LКлика политической науки полностью ненавидима своими братьями по Гоминьдану. Вы потеряете стабильность пропорционально тому, сколько влияния §PПатерналистов-автократов§!, §aАвторитарных демократов§!, §RСиндикалистов§!, §SСоциал-демократов§!, §rРадикальных социалистов§!, §cСоциал-консерваторов§! и §nНационал-популистов§! у вас было.§!"

 YUN_an_antidote_for_economic_woes_effect_tt: "§WМы получим гражданские фабрики в §YНанкине, Гуанчжоу, Пекине, Ухане и Чанша§!. Мы получим одну гражданскую фабрику за город в зависимости от влияния нашей популярности §lСоциал-либералов§! и половины нашей популярности §cСоциал-консерваторов§! и §rРадикальных социалистов§!.§!"

 YUN_national_defense_fortification_plan_tt: "§LЧтобы обеспечить оборону страны, Партия должна приступить к амбициозному национальному плану укрепления в различных окраинных провинциях страны.§!"

 YUN_undoing_the_injustice_of_1924_tt: "§LМы получим уникальный эффект для этого фокуса в зависимости от нашего текущего §YЗаместителя!§!§!"

 YUN_draft_a_permanent_constitution_effect_tt: "§YРазработка постоянной конституции считается святотатством в глазах большинства членов партии! Вы потеряете политическую власть пропорционально тому, сколько влияния §PПатерналистов-автократов§!, §SСоциал-демократов§!, §cСоциал-консерваторов§!, §aАвторитарных демократов§! и §nНационал-популистов§! у вас было, но получите стабильность пропорционально влиянию §OСоциал-либералов§! и §mРыночных либералов§!.§!"

