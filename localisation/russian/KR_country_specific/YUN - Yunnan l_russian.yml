##Section 1a (000-399): Introgame Political Events

#YUN Internal Event Chain (000-049):
 YUN.introgame.001.t: "Интригующий двор на Юго-Западе"
 YUN.introgame.001.d: "Тан Цзияо на пике своей власти в конце 1910-х годов хвастался, что он «Король Юго-Запада» — метафорическое заявление, подкрепленное его командованием могущественной Цзингоцзюнь, его господством над Юньнанью и Гуйчжоу и его статусом преемника наследия Цай Э. Последующие годы стали унизительным опытом для Губернатора — многочисленные перевороты и военные поражения заставили его цепляться за жизнь. Но выжить так долго было непросто, и расчетливый лидер продолжает плести интриги со своего трона в Куньмине.\n\nПоследний раунд политических интриг в 1927 году оставил Юньнань в тупике. Будучи ненадолго свергнутым собственными генералами, Тан смог вернуть власть, сохранив лояльность своих подразделений телохранителей в столице. По мере того как угрозы вторжения Гоминьдана угасали, взбунтовавшиеся генералы вернулись в строй, оставив Тан Цзияо снова на вершине — правящим со своей базы в Куньмине.\n\nНа севере генерал Лун Юнь контролирует Чжаотун и остается вторым по могуществу человеком в Юньнани — регионалистом, который ставит стабильность превыше всего, и неохотным участником переворота 1926 года. Желание Тана сдержать влияние Луна было ограничено его потребностью в надежном командире для охраны границы с остатками Гоминьдана в Гуйчжоу, а также для обеспечения противовеса истинному вдохновителю переворота: Ху Жоюю.\n\nХу Жоюй, вместе с сообщниками Ли Сюаньтином и Чжан Жуцзи, был фактически изгнан на юг, где он правит Мэнцзы от имени Тана в рамках окончательного урегулирования. Даже в 1926 году их совокупное влияние никогда не могло превзойти влияние Тана или Луна. Тем не менее, с немецкими деньгами, поступающими из Индокитая, и бесстыдным почтением Ху к У Пэйфу и Сунь Чуаньфану после поражения Гоминьдана (Ху был одним из первых, кто приветствовал ГМД в провинции в 1920-х годах), они остаются мощной силой в Юньнани.\n\nС наступлением нового года Тан пригласил комиссаров обороны Луна, Ху, а также Сунь Ду из Дали на конференцию через несколько недель."
 YUN.introgame.001.a: "Наши дискуссии будут плодотворными, я уверен."
 YUN.introgame.001_tt: "§RЮньнаньская знать — это сила, с которой нужно считаться, и их власть представлена Лун Юнем, служащим заместителем командующего. Пока он не будет отстранен (так или иначе) позже, официальный «Губернатор» всегда будет под угрозой переворота.§!"

 YUN.introgame.002.t: "Напряженность на границе Дянь-Цянь"
 YUN.introgame.002.d: "Судьбы Юньнани (сокращенно Дянь) и Гуйчжоу (сокращенно Цянь) после Синьхайской революции переплелись. В то время как обе свергли своих цинских губернаторов, Цай Э из Юньнани оказался более успешным в консолидации контроля впоследствии и направил Тан Цзияо в Гуйчжоу для помощи Обществу подготовки конституции в вытеснении более радикального Общества изучения самоуправления.\n\nЭто привело к тому, что Лю Сяньши захватил власть в провинции, хотя он был свергнут своим племянником Ван Вэньхуа в борьбе за власть после того, как Тан вернулся в Юньнань, чтобы служить губернатором. Ван, которого поддерживал Гоминьдан, организовал переворот, известный как инцидент Миньцзю, с помощью командиров Гуйчжоу Хэ Инциня, Гу Чжэнлуня и Чжу Шаоляна в 1920 году. Кровопролитие вызвало широкое осуждение, и Ван Вэньхуа был убит в свою очередь, находясь в изгнании в Шанхае.\n\nГуйчжоу погрузилась в хаос на фоне опасений вторжения Юньнани, но правительство Бэйяна нанесло удар первым, спонсировав Юань Цзумина для вторжения в Гуйчжоу и свержения поддерживаемого Гоминьданом Лу Дао. К 1922 году Юань был хозяином провинции, но в течение года он столкнулся с силами вторжения под руководством брата Тан Цзияо, Тан Цзию, которому было поручено восстановить Лю Сяньши у власти. Тан Цзию затем служил де-факто со-губернатором, но был вынужден отступить в 1925 году после катастрофической Юньнань-Гуансийской войны. Юань, который ненадолго пришел к соглашению с Таном, неохотно встал на сторону Гоминьдана во время Северного похода, только чтобы предать их, когда ситуация изменилась.\n\nЮань надеялся вернуть Гуйчжоу после войны, но у судьбы были другие планы. Национально-революционная армия, побежденная, но не уничтоженная, предприняла «Великий поход» из восточного Китая в Гуйчжоу, оккупировав западную Гуйчжоу. Тан Цзияо, у которого была долгая история союзов и борьбы с Гоминьданом, решил выждать время, оставив их там гнить в качестве буфера, чтобы отказать Чжили в любых дальнейших приобретениях. Но он знает так же хорошо, как и любой другой, что революционеры всегда приносят проблемы в конечном итоге."
 YUN.introgame.002.a: "Однажды мы вернемся в Гуйчжоу."
 YUN.introgame.002.b: "Однажды мы покинем Гуйчжоу."
 YUN.introgame.002_tt: "§YГраница между Юньнанью и Гуйчжоу в данный момент слабо укреплена, патовая ситуация между двумя сторонами. Это может быстро измениться...§!"

 YUN.introgame.003.t: "Антиконцессионистская волна на Востоке"
 YUN.introgame.003.d: "Лига пяти провинций начиналась как проект Южных Чжили в восточном Китае, но после Северного похода Сунь Чуаньфан добавил Хунань, Гуандун и Гуанси в свою сферу влияния. Лига официально расширилась до восьми в 1930 году после спорных выборов 1929 года, когда Чжан Цзолинь покинул мирные переговоры на Севере, что вызвало опасения альянса Чжан-Сунь против предложений правительства Цао-У о разоружении и централизации.\n\nГуйчжоу очень чудом избежала добавления в Лигу. Признанный Чжили губернатор Юань Цзумин был чрезвычайно зависим от покровительства Южных Чжили, а затем клики Хунань, чтобы сохранить свое правление над восточной Гуйчжоу. Но Сунь в своих отчаянных маневрах против Севера стремился избежать антагонизма с сычуаньскими и юньнаньскими милитаристами в межвоенный период и оставил Гуйчжоу вне Лиги.\n\nК сожалению, обреченный квест Маршала Лиги бросить вызов своим наставникам оказался его падением. Раздутая армия, растущие расходы, эндемическая коррупция, крайняя жестокость и взятие значительных кредитов ослабили фундамент его империи. Его партнерство с иностранными концессионерами, в первую очередь немецкой AOG, вызвало массовые беспорядки, которые достигли лихорадочного пика после скандала с железной дорогой Чжэган.\n\nЮньнань, конечно, не новичок в работе с иностранными торговцами. Ценная торговля оловом привела британских, французских, японских, американских, а теперь и немецких торговцев в провинцию, и Тан Цзияо стремился сбалансировать потенциальные богатства с иностранной эксплуатацией. Превышение полномочий британцами и французами вызывало беспорядки в Гэцзю в прошлом, которыми Тан манипулировал в свою пользу. Тем не менее, немецкое влияние остается высоким, особенно в Мэнцзы, где их покровительство Ху Жоюю позволило им доминировать в торговле Юньнани.\n\nНа востоке инцидент в Уху дал Чэнь Тяоюаню из Аньхоя предлог, необходимый для выхода из Лиги. Возможно, это знак того, что ситуация меняется?"
 YUN.introgame.003.a: "В отличие от Лиги, мы будем стремиться к равноправному партнерству с иностранными торговцами."
 YUN.introgame.003.b: "Иностранная эксплуатация закончится только тогда, когда Китай вернет то, что принадлежит ему по праву!"

 YUN.introgame.004.t: "Черный понедельник парализует торговлю оловом"
 YUN.introgame.004.d: "Черный понедельник спровоцировал глобальный экономический кризис, катастрофу, которая искалечит экономики на долгие годы. Для Китая, уже борющегося с сокращением торговли после Великой депрессии в Америке, это, вероятно, усугубит политическую нестабильность, которую принес год. Для Юньнани, сильно зависящей от торговли оловом, крах немецкой экономики разрушителен.\n\nПрактически весь экспорт олова идет через железную дорогу Хайфон-Куньмин. Изначально построенная и принадлежавшая французам, немцы захватили ее после Великой войны, и она была включена в дочерние компании AOG. Точно так же права на добычу полезных ископаемых в регионе Мэнцзы, которые когда-то контролировались англо-французским синдикатом, фактически контролируются немцами. Подобно французам, которые использовали отсутствие легких путей в Гуандун, а также блокировали усилия по созданию альтернативных железных дорог, немцы взимали грабительские тарифы за использование линии Хайфон-Куньмин.\n\nНедовольство иностранными концессиями нарастало уже некоторое время, и недавние события создали как чувство национальной солидарности, так и ксенофобию по отношению к чужакам. Националистические и социалистические агитаторы, обычно связанные с Гоминьданом, воспользовались моментом, чтобы призвать к насильственному захвату банков, заводов, шахт и железных дорог, принадлежащих иностранцам. Хотя часто скудные на детали, кроме пересказа расплывчатой Программы национального строительства Сунь Ятсена, опубликованной десятилетия назад, для многих это отражает дух времени.\n\nДля технократов, работающих в правительстве Юньнани, возникла большая необходимость модернизировать экономику. Экономика Юньнани долгое время зависела от олова и опиума, и усилия министра финансов Ма Цуна в 1920-х годах по централизации экономики и продвижению валютных реформ в условиях тяжелого экономического кризиса развалились из-за бюрократического сопротивления. Его преемник, Мяо Юньтай, был более успешным в своих усилиях в 1930-х годах, особенно продвигая индустриализацию, но часто кажется, что у него мало времени для работы."
 YUN.introgame.004.a: "Революция освобождает людей, землю и нацию!"
 YUN.introgame.004.b: "Реформа экономики спасет ее."

 YUN.introgame.005.t: "Сунь Чуаньфан застрелен в Нанкине!"
 YUN.introgame.005.d: "Сунь Чуаньфан был застрелен убийцей в Нанкине, поставив Лигу на грань войны. Хотя он еще не умер, акулы кружат, пока его лейтенанты Южных Чжили борются за то, чтобы стать его преемником. Главными среди них являются губернатор Цзянсу Ци Сеюань и мятежный губернатор Аньхоя Чэнь Тяоюань, оба из которых готовятся к перевороту.\n\nНа юге восстания Гоминьдана вспыхнули почти одновременно по всей Лиге, поскольку лидеры националистов делают свой ход. В то время как большинство из них находятся в контакте с центрами Гоминьдана в Мингане или Гуйчжоу, другие просто берут инициативу на себя, не дожидаясь высшего разрешения.\n\nПекин в руинах, так как лидеры Северных Чжили враждуют по поводу того, как реагировать на кризис, и милитаристы, которые признавали их власть в течение последнего десятилетия, быстро ускользают из их орбиты. Беспорядки на севере и страх перед новым вторжением клики Фэнтянь парализовали правительство, и на данный момент они остались без руля.\n\nДля хунты Гоминьдана в Гуйчжоу следующие шаги очевидны. Это может быть их последний шанс выполнить свои революционные обещания, и пока истеблишмент Бэйяна отвлечен, они должны захватить контроль над теми провинциями, которые могут. Однако для таких людей, как Тан Цзияо, нынешние обстоятельства представляют собой затруднение.\n\nРасцвет федералистов пришелся на начало 1920-х годов, когда Китай был, казалось бы, безвозвратно разделен не только на Север-Юг, но и на провинциальные государства милитаристов. Идея мирного воссоединения через переговоры была привлекательна для многих интеллектуалов-реформистов, но еще до того, как Чжили смогли воссоединиться силой (тем самым доказав их неправоту), федералистское движение потеряло обороты, так как и северное, и южное правительства изгнали деятелей федералистов. Дискредитированное как непатриотичное за пределами определенных южных кругов, кажется, использование силы будет единственным путем к федерализму в Китае. Но для регионалистов в правительстве Тана покидание Юньнани непопулярно после последних нескольких неудачных военных экспедиций."
 YUN.introgame.005.a: "Революция Сунь Ятсена вернется!"
 YUN.introgame.005.b: "Мечта федералистов не умерла!"

 YUN.introgame.006.t: "Гамбит Тан Цзияо"
 YUN.introgame.006.d: "Пока карточный домик Сунь Чуаньфана продолжает падать в пяти провинциях, остальные три в Лиге пережили похожую волну беспорядков. Лянгуан, состоящий из провинций Гуандун и Гуанси, сейчас находится в состоянии полномасштабной гражданской войны, так как гегемония Старой клики Гуанси оспаривается милитаристами Гуандуна и захватчиками Гоминьдана.\n\nДля Тан Цзияо представилась прекрасная возможность — если бы он только мог ею воспользоваться. Чжили отвлечены, пожирая друг друга, пока центральная власть снова рушится. Соседние клики милитаристов в Сычуани и Лянгуане взрываются, а Хунань не в состоянии оспаривать его действия. Гуйчжоу (или, по крайней мере, западная его часть) созрела для захвата сейчас, все, что ему нужно сделать, — это уничтожить остатки Гоминьдана, окопавшиеся там, — амбиция, которую он выразил командирам, прибывающим в Куньмин.\n\nАмбиции Тана, конечно, не заканчиваются в Гуйяне. Хотя его бренд федерализма принял изоляционистский оборот в 1920-х годах после краха более широкого движения, Тан не чужд использованию силы для навязывания своей воли — маршируя в Гуйчжоу, Сычуань, Гуанси и Гуандун в раннюю эру милитаристов. Город Гуанчжоу, сердце старых южных правительств, был бы необходим, чтобы по-настоящему утвердить легитимность в качестве соперничающего правительства в Китае. Хотя его предыдущая попытка была сорвана особенно стойкой обороной армий в Гуанси, Тан уверен, что на этот раз его враги слабее, а его армии усвоили уроки.\n\nКонечно, у хунты Гоминьдана в Гуйчжоу довольно похожие идеи. К сожалению для них, отсутствие единства между их лидерами было обнажено, генералы Чэн Цянь из Хунани и Ли Цзунжэнь из Гуанси уже уехали в свои родные провинции. Хотя хунта «дала свое благословение» на их приключения, очевидно, что хунта Гуйчжоу имеет мало контроля над своими членами, и что их ведущие генералы едва могут терпеть друг друга. Это оставляет только двоих, чтобы сражаться с натиском Тана: генерала Чжу Пэйдэ из Юньнани и генерала Хэ Инциня из Гуйчжоу."
 YUN.introgame.006.a: "Гуйчжоу в этом году, Гуанчжоу в следующем, и однажды весь Китай!"
 YUN.introgame.006.b: "Они не пройдут!"
 YUN.introgame.006.a_tt: "§YВы будете играть за §fЮньнаньскую клику.§! Успешный штурм Гуйчжоу потребует выхода из тупика. Потребуется время, прежде чем любая из сторон сможет начать штурм, и им понадобится преимущество в §Gпо крайней мере на 10 000 человек больше§!, чтобы быть уверенными в победе.§!"
 YUN.introgame.006.b_tt: "§YВы будете играть за §cГуйчжоуский Гоминьдан§!. Отражение штурма Гуйчжоу и начало контратаки потребует выхода из тупика. Потребуется время, прежде чем любая из сторон сможет начать штурм, и им понадобится преимущество в §Gпо крайней мере на 10 000 человек больше§!, чтобы быть уверенными в победе.§!"

 YUN.introgame.007.t: "Изгнанники в Гуйчжоу"
 YUN.introgame.007.d: "В Западной Гуйчжоу расположились лагерем остатки Национально-революционной армии — силы, созданной Гоминьданом для борьбы и подчинения партии и только партии. Для одних Гуйчжоу — чужая земля и нелегкое изгнание. Для других — это возвращение домой. Реальность НРА такова, что она никогда не была по-настоящему «Национальной» армией, которой должна была быть, она была в основном сколочена из подчиненных армий милитаристов с обширными региональными лояльностями, выше которых НРА должна была быть.\n\nВ конце января 1927 года Чан Кайши воспользовался возможностью вернуться к власти и отменил приказы Ван Цзинвэя, приказав своим войскам отступить на запад в Гуанси, Гуйчжоу и Хунань, чтобы переждать наступление Чжили в отступлении, которое станет известно как «Великий поход». Убитый месяц спустя в Наньнине, верные ему подразделения НРА были медленно оттеснены в Гуйчжоу в течение следующего года.\n\nЕго место заняла хунта под председательством Чжу Пэйдэ из Третьей армии, состоящей в основном из юньнаньских солдат. К нему присоединились Ли Цзунжэнь (7-я армия/Гуанси), Тань Янькай (2-я армия/Хунань), Чэн Цянь (6-я армия/Хунань) и Хэ Инцинь (1-я армия/Вампу). Постоянная внутренняя борьба мешала прогрессу в Гуйчжоу, так как различные командиры пытались совершать набеги на свои родные провинции с небольшим успехом.\n\nТань Янькай уехал в Хунань много лет назад во время перестановки руководства, и поскольку Ли и Чэн увели большую часть своих сил в Гуанси и Хунань соответственно, остались только Чжу Пэйдэ и Хэ Инцинь. Чжу был «нейтральным» в конфликте Гу Пиньчжэня и Тан Цзияо, но фактически застрял в Гуандуне после возвращения Тана к власти в 1922 году. Он поглотил армии различных других изгнанных юньнаньских сил там, превратившись в угрозу для Тана.\n\nХэ Инцинь был ведущим заместителем Чана и инструктором Вампу, а его Первая армия состоит в основном из выпускников Вампу. Самая близкая вещь к идеалу НРА о всекитайской армии, она стала доминировать офицерами из Гуйчжоу в период изгнания."
 YUN.introgame.007.a: "С всего двумя генералами сотрудничество должно быть проще."
 YUN.introgame.007.b: "...Но вы знаете, каковы генералы."

 YUN.introgame.008.t: "Беженцы из Сычуани"
 YUN.introgame.008.d: "Жестокая комбинация засухи, наводнений и политической нестабильности привела к сильному голоду в соседней провинции Сычуань. Поскольку цены на рис растут, а коррумпированное, неэффективное правительство не может предоставить значительную помощь, беженцы из Сычуани наводнили соседние провинции. Будучи более бедной, гористой провинцией по сравнению с другими направлениями, Юньнань приняла меньше беженцев, чем другие, однако новости о бедственном положении людей дошли до Куньмина.\n\nУ Юньнани и Сычуани были сложные отношения на протяжении всей Эры милитаристов. Сычуань была разделена на множество конкурирующих фракций милитаристов, в том, что было описано как эра милитаристов внутри эры милитаристов. Во время Войны в защиту республики Цай Э вторгся в Сычуань в надежде захватить ее ценные соляные месторождения, и последующие конфликты между Юньнанью, Гуйчжоу и Сычуанью продолжались в течение следующего десятилетия или около того.\n\nВозможно, последним остатком этих конфликтов являются силы Сюн Кэу и Люй Чао, расположившиеся лагерем в пограничных землях между Сычуанью, Гуйчжоу и Юньнанью. Бывшие противники Тан Цзияо и не полностью в сфере Гоминьдана, они действуют как темная лошадка в надвигающемся конфликте между Юньнанью и Гуйчжоу."
 YUN.introgame.008.a: "Помогая беженцам из Сычуани, Тан надеется залечить прошлые обиды."
 YUN.introgame.008.b: "Заручившись помощью Сюна и Люй, Гоминьдан ищет преимущества."

 YUN.introgame.009.t: "Обеспечение безопасности южного фланга"
 YUN.introgame.009.d: "Тан Цзияо совершил поездку в южный город Мэнцзы, где встретился с южными генералами, расквартированными там. Самым видным из офицеров, которым поручено «охранять границу», является комиссар обороны Ху Жоюй, один из четырех первоначальных комиссаров обороны, назначенных Таном для помощи в надзоре за провинцией, и вдохновитель Февральского переворота против Тана в 1926 году. Он, наряду с генералами (и сами бывшими комиссарами обороны) Ли Сюаньтином и Чжан Жуцзи, был наиболее агрессивен в стремлении свергнуть Тана, оставив более глубокую вражду с Таном, чем более неохотный заговорщик Лун Юнь.\n\nГубернатор Тан не совершил бы эту поездку, если бы эта «Фракция Мэнцзы» не имела чего предложить. Хотя они потеряли значительную территорию с пика коллективного контроля над Куньмином, Дали и Мэнцзы, Мэнцзы относительно богат торговлей с Индокитаем. Их дружеские отношения с немцами и Лигой позволили им содержать большую армию, чем они должны были бы иметь, и доступ к иностранным средствам.\n\nИх силы не просто для вида (или предотвращения попыток Тана контролировать их). Южная Юньнань также была домом для крупных бандитских и повстанческих банд (разница часто стиралась в зависимости от того, на чьей вы стороне), которые поднимались и падали в течение 1920-х годов. Сотрудничество Тан Цзияо с некоторыми из этих банд дало боеприпасы его врагам против него, хотя Гоминьдан также был отмечен в попытках завербовать этих бандитов. Некоторым из этих людей удалось уйти на покой как «респектабельным», причем Мо Пу удалось стать «советником первого ранга» после перехода на сторону Тана, а Ван Жувэй даже остался бригадным офицером под началом Ху Жоюя.\n\nЕсли заговор Тан Цзияо должен сработать, ему понадобится сотрудничество южных сил или, по крайней мере, чтобы они оставались послушными в то же время. В противном случае Куньмин может быть уязвим для другого заговора, пока гвардейские силы Тана на севере собираются против Гоминьдана."
 YUN.introgame.009.a: "Тан Цзияо убеждает их отправить силы на север в Чжаотун."
 YUN.introgame.009.b: "Тан Цзияо может добиться только их нейтралитета."

 YUN.introgame.010.t: "Доклад Лун Юня"
 YUN.introgame.010.d: "Когда штурм Гуйчжоу был впервые запланирован, Тан Цзияо был вынужден поручить задачу подготовки основы для вторжения комиссару обороны Чжаотуна Лун Юню. На этой неделе губернатор Тан прибыл с делегацией в северный город, чтобы лично проинспектировать прогресс, достигнутый там.\n\nЛун Юнь усердно работал над строительством складов, организацией поставок и размещением прибывающих подразделений для наступления на Гуйчжоу. Через четыре месяца его штаб-квартира в Чжаотуне наполнилась активностью. В разговоре с Таном генерал Лун оценил, что основные приготовления, необходимые для наступательных операций, были завершены.\n\nНо он также предупреждает, что Гоминьдан не бездействовал по ту сторону границы. Заметив наращивание войск, хунта Национально-революционной армии начала мобилизовать собственные войска, строя оборонительные сооружения и призывая местных жителей. Любой элемент внезапности давно утрачен.\n\nОтношения между губернатором и его лучшим генералом также были напряженными, даже если ни один из мужчин не поднимает этот вопрос. Корень этой напряженности исходит из Юньнань-Гуансийской войны 1925 года, где силы Лун Юня возглавили успешный захват Гуанси на пути к Гуандуну. Однако Новая клика Гуанси, союзница Гоминьдана, предприняла решительную контратаку, окружив силы Луна в городе и в конечном итоге заставив их сдаться. Силы Тан Цзию, ответственные за охрану фланга Луна, прибыли поздно, чтобы снять осаду, некоторые обвиняли младшего Тана в том, что он был слишком занят покупкой опиума в Гуйчжоу, и даже когда они наконец прибыли, они были полностью разбиты.\n\nРешение Тан Цзияо защитить своего брата после фиаско и сделать козлом отпущения Чжан Жуцзи сыграло важную роль в перевороте год спустя. Два Тана имеют обширные связи с Гуйчжоу, и Тан Цзию возглавлял вторжение и оккупацию провинции в 1923 году, что заставило его ожидать повторения этой роли. Однако Лун Юнь, похоже, находится под впечатлением, что он в конечном итоге будет руководить вторжением."
 YUN.introgame.010.a: "Конечно, Лун Юнь будет командовать штурмом."
 YUN.introgame.010.b: "Давать власть предателю — значит приглашать дальнейшее предательство."

 YUN.introgame.011.t: "Ставка Хунани в Гуйчжоу"
 YUN.introgame.011.HNN_ruled_by_KMT: "Отношения Юньнани с Гуйчжоу вряд ли можно считать особенно дружескими. Вовлеченная в Синьхайскую революцию, Гуйчжоу быстро стала полем битвы между революционерами, контрреволюционерами, конституционалистами и местными милитаристами. Поскольку Лю Сяньши и Жэнь Кэчэн отправили посланника к Цай Э, Тан Цзияо впоследствии вторгся в Гуйчжоу от его имени. При помощи Лю Тан сверг правительство, став губернатором провинции в 1912 году. Консолидировав свою власть, Тан вернулся в Юньнань в 1913 году, чтобы стать губернатором там, передав власть Лю.\n\nВтянутый в Войну в защиту республики, Лю сформировал свою часть клики Гуйчжоу; Старую клику Синъи. Благодаря семейным назначениям Ван Вэньхуа, племянник Лю, его брат Ван Боцюнь и его зять Хэ Инцинь, также пришли к власти; и таким образом начали плести интриги против Лю Сяньши в том, что стало известно как инцидент Миньцзю в 1920 году. С последующей отставкой Сяньши и дальнейшей внутренней борьбой, Ван Вэньхуа был убит людьми на жаловании у Юань Цзумина по приказу Сяньши.\n\nИзгнав Лу Дао из Гуйчжоу, Юань затем также был изгнан Тан Цзию в 1923 году, участвовал в рукопашной схватке милитаристов Сычуани и присоединился к Чжили. Заключив мир с Таном в 1924 году, Юань снова стал губернатором в 1925 году, но продолжал сражаться в Гражданской войне в Сычуани, оставив большую часть управления своим подчиненным: Ван Тяньпэю, Пэн Ханьчжану и Чжоу Сичэну. Изгнанный Лю Сяном и Ян Сэнем в 1926 году, Юань был принят Старой кликой Хунань, сражаясь в Северном походе.\n\nК 1927 году Гуйчжоу была разделена между частью Гоминьдана, под зонтиком клики Юньнань, и частью Бэйяна, поддерживаемой Пекином. С недавним низложением Гоминьданом Чжао Хэнти и разгромом Старой клики Гуйчжоу, они отказались передать свою часть Гуйчжоу Хэ Инциню, ссылаясь на опасения Ван Тяньпэя и Лу Дао. Таким образом, в довольно любопытном повороте событий, пограничные споры привели к внутренней борьбе НРА вдоль сфер влияния Гуйчжоу, что может оказаться полезным в собственной борьбе Юньнани."
 YUN.introgame.011.HNN_ruled_by_non_KMT: "Отношения Юньнани с Гуйчжоу вряд ли можно считать особенно дружескими. Вовлеченная в Синьхайскую революцию, Гуйчжоу быстро стала полем битвы между революционерами, контрреволюционерами, конституционалистами и местными милитаристами. Поскольку Лю Сяньши и Жэнь Кэчэн отправили посланника к Цай Э, Тан Цзияо впоследствии вторгся в Гуйчжоу от его имени. При помощи Лю Тан сверг правительство, став губернатором провинции в 1912 году. Консолидировав свою власть, Тан вернулся в Юньнань в 1913 году, чтобы стать губернатором там, передав власть Лю.\n\nВтянутый в Войну в защиту республики, Лю сформировал свою часть клики Гуйчжоу; Старую клику Синъи. Благодаря семейным назначениям Ван Вэньхуа, племянник Лю, его брат Ван Боцюнь и его зять Хэ Инцинь, также пришли к власти; и таким образом начали плести интриги против Лю Сяньши в том, что стало известно как инцидент Миньцзю в 1920 году. С последующей отставкой Сяньши и дальнейшей внутренней борьбой, Ван Вэньхуа был убит людьми на жаловании у Юань Цзумина по приказу Сяньши.\n\nИзгнав Лу Дао из Гуйчжоу, Юань затем также был изгнан Тан Цзию в 1923 году, участвовал в рукопашной схватке милитаристов Сычуани и присоединился к Чжили. Заключив мир с Таном в 1924 году, Юань снова стал губернатором в 1925 году, но продолжал сражаться в Гражданской войне в Сычуани, оставив большую часть управления своим подчиненным: Ван Тяньпэю, Пэн Ханьчжану и Чжоу Сичэну. Изгнанный Лю Сяном и Ян Сэнем в 1926 году, Юань был принят Старой кликой Хунань, сражаясь в Северном походе.\n\nК 1927 году Гуйчжоу была разделена между частью Гоминьдана, под зонтиком клики Юньнань, и частью Бэйяна, поддерживаемой Пекином. Возобновив старую напряженность, Юань и Чжоу Сичэн начали предъявлять свои претензии на Гуйчжоу вопреки поддержке Таном Лю Сяньцяня, хотя некоторые министры предположили, что Тан мог бы сотрудничать с Юань Цзумином, а затем предать его, когда придет время."
 YUN.introgame.011.a: "Хэ Инцинь и Лу Дао могут прийти к (временному) соглашению."
 YUN.introgame.011.b: "Напряженность с Хунанью отвлекает войска Гоминьдана от границы."
 YUN.introgame.011.c: "Клике Юньнань вряд ли нужен Юань, чтобы взять Гуйчжоу."

 YUN.introgame.012.t: "Интеллектуалы взвешивают"
 YUN.introgame.012.d: "Для интеллигенции Юньнани и Гуйчжоу мнения о надвигающемся конфликте неоднозначны. Обе провинции пережили раскол между «реформистскими» и «революционными» фракциями, и в обеих эти конфликты переросли в насильственный конфликт за контроль над своими провинциями. Это отражало более широкий раскол в южном республиканском движении, когда революционные националисты дрейфовали в лагерь Гоминьдана, а реформисты склонялись к федерализму или переориентации на примирение с Бэйяном.\n\nИнтеллектуальная элита была втянута в эти битвы, многие вернувшиеся студенты и ученые присоединялись к ячейкам Гоминьдана и других социалистов, в то время как другие выступали в защиту более реформистской программы. Хотя они и не были так немедленно могущественны, как «люди оружия», эти «люди слова» были жизненно важны для конкурирующих милитаристов и революционных лидеров как источник легитимности для их правительств. Более того, в сочетании с их влиянием в бюрократии и в меньшей степени в таких учреждениях, как городские и провинциальные торговые палаты, гражданские лица в целом были неотъемлемой частью систем милитаристов.\n\nДля интеллектуалов, ищущих лидеров с последовательным идеологическим мировоззрением, лидеры юго-запада, несомненно, разочаровывали. И федералисты, такие как Тан Цзияо, и лидеры Гоминьдана, такие как Сунь Ятсен, колебались между различными политическими позициями как из-за прагматизма, так и из-за лично меняющихся позиций. Действительно, большая часть мира радикально изменилась после Великой войны, и новые идеологии восстали из пепла.\n\nЭти люди и их последователи могли быть довольно безжалостными, когда того требовала ситуация: Тан, в частности, выставил отрубленную голову своего павшего врага Гу Пиньчжэня на всеобщее обозрение, когда вернулся к власти, а Сунь Ятсен однажды ответил на роспуск своего телохранителя, лично приказав обстрелять штаб-квартиру Мо Жунси канонерскими лодками.\n\nГоминьдан и клика Юньнань могут рассчитывать на поддержку различных лоялистских газет, ораторов и писателей, но поскольку легитимность так драгоценна и редка в Китае — чашу весов придется склонить людям посередине."
 YUN.introgame.012.a: "Провинциальная автономия, демократия и реформы побеждают."
 YUN.introgame.012.b: "Национализм, демократия и благосостояние — мощное кредо."

 YUN.introgame.013.t: "Зима близко"
 YUN.introgame.013.d: "На протяжении всей истории даже самые могущественные армии были подвержены непостоянным прихотям погоды. Климат Юго-Западного Китая относительно мягкий, но зимой в горах может стать очень холодно и трудно передвигаться. Однако, возможно, более важно то, что Тан Цзияо отдал приказ начать кампанию к концу этого года — у Губернатора очень строгий график его планов объединения.\n\nВдоль линии фронта продолжаются приготовления. Для Гоминьдана наступление зимы дает значительное преимущество в защите своей позиции от вторжения, но даже если бы они выдержали первоначальный натиск, их окно для объединения юга также может закрываться. Руководство хунты приказало провести дальнейшую мобилизацию, но октябрьский сбор риса означал, что ополченцы с обеих сторон вернулись домой и лишь медленно возвращаются на фронт.\n\nНапряженность остается высокой, похоже, что для нервных войск на линии фронта мало передышки. Штаб-квартира Юньнаньской армии в Чжаотуне получила роковую телеграмму сегодня утром из Куньмина: они выступят на Гуйян к концу месяца. Тем временем у Национально-революционной армии, похоже, есть несколько тузов в рукаве..."
 YUN.introgame.013.a: "Юньнаньская армия спешит завершить приготовления."
 YUN.introgame.013.b: "Национально-революционная армия готовит засаду."
 YUN.introgame.013_tt: "§RЕсли патовая ситуация Дянь-Цянь не будет решительно разрешена в течение месяца, последующий штурм будет фактически решен случайным образом!§!"

#YUN External Event Chain (050-099):
 YUN.introgame.050.t: "Связь с Гуйчжоу"
 YUN.introgame.050.d: "Возможно, одним из величайших чудес или катастроф последствий Северного похода будет Великий поход Национально-революционной армии в Гуйчжоу. Приказанный Чан Кайши накануне его оплакиваемого убийства, он стоил значительного количества людей, материальных средств и припасов, но, возможно, привел к сохранению Правого Гоминьдана в целом. Создав хунту из 5 человек под началом Чжу Пэйдэ из 3-й армии в качестве исполняющего обязанности генералиссимуса, она включала Хэ Инциня из 1-й армии, Ли Цзунжэня из 7-й армии, Тань Янькая из 2-й армии и Чэн Цяня из 6-й армии.\n\nС борьбой за власть и плохими отношениями ранее, консолидация сил в сфере влияния Гуйчжоуского Гоминьдана в 1930-х годах привела к включению 2-й армии Тань Янькая в 6-ю армию Чэн Цяня, а сам Тань уехал на пенсию в Чанша. Точно так же Фань Шишэн был включен в 3-ю армию, а 16-я армия Цзинь Ханьдина была расформирована и также включена в 3-ю армию.\n\nРешение Ли Цзунжэня предпринять набег со своей 7-й армией в Лянгуан и заявить права на провинцию Гуанси вывело большую часть его людей из Гуйчжоу. Однако, что важно, несколько ключевых тыловых подразделений остались, чтобы облегчить связи между Хунтой и предприимчивым макиавеллистом. С ограниченными ресурсами и надежным первоначальным плацдармом Хуан Шаохун и Сюйчу выдвинули идею вывода всего оставшегося персонала из Гуйчжоу в Гуанси, чтобы укрепить его позиции в Лянгуане.\n\nОднако это может обречь оставшиеся силы Гоминьдана в Гуйчжоу в их битвах с враждебной кликой Юньнань, и лидеры хунты Гуйчжоу умоляли Ли сохранить взаимовыгодные линии снабжения между их силами. Что еще более спорно, персонал внутри Новой клики Гуанси выдвинул концепцию захвата припасов из общего запаса, утверждая, что это «его справедливая доля», хотя такое дело, вероятно, искалечило бы военные усилия Хунты. Тем не менее, возможно, хунта все равно уже обречена."
 YUN.introgame.050.a: "7-я армия выводит своих людей из Гуйчжоу."
 YUN.introgame.050.b: "Линии снабжения Ли остаются открытыми, помогая Гоминьдану."
 YUN.introgame.050.c: "Новая клика Гуанси захватывает свою долю запасов."

 YUN.introgame.051.t: "Наши силы в Юньнани"
 YUN.introgame.051.d: "Возможно, одним из величайших чудес или катастроф последствий Северного похода будет Великий поход Национально-революционной армии в Гуйчжоу. Приказанный Чан Кайши накануне его оплакиваемого убийства, он стоил значительного количества людей, материальных средств и припасов, но, возможно, привел к сохранению Правого Гоминьдана в целом. Создав хунту из 5 человек под началом Чжу Пэйдэ из 3-й армии в качестве исполняющего обязанности генералиссимуса, она включала Хэ Инциня из 1-й армии, Ли Цзунжэня из 7-й армии, Тань Янькая из 2-й армии и Чэн Цяня из 6-й армии.\n\nС борьбой за власть и плохими отношениями ранее, консолидация сил в сфере влияния Гуйчжоуского Гоминьдана в 1930-х годах привела к включению 2-й армии Тань Янькая в 6-ю армию Чэн Цяня, а сам Тань уехал на пенсию в Чанша. Точно так же Фань Шишэн был включен в 3-ю армию, а 16-я армия Цзинь Ханьдина была расформирована и также включена в 3-ю армию.\n\nХотя Чэн и большая часть его людей уже покинули Гуйчжоу, чтобы войти в Хунань, некоторый ключевой логистический персонал остался в Гуйчжоу, чтобы обеспечить стабильные линии снабжения в соседнюю провинцию. Поскольку Чэн лучше укрепился, некоторые адъютанты штаб-квартиры рекомендовали генералу вывести своих людей из Гуйчжоу. Другие в оппозиции рекомендовали сохранить там присутствие, в конечном счете, чтобы следить за хунтой Гуйчжоу.\n\nОфицеры, такие как Е Ци, настаивали на удвоении усилий по обеспечению безопасности Хунани, даже если это в конечном итоге может оттянуть ресурсы от хунты Гуйчжоу. Для них давно проблемная хунта все равно обречена, привязка к ним обрушила бы всю революцию."
 YUN.introgame.051.a: "Оставьте их на месте, чтобы держать линии снабжения открытыми."
 YUN.introgame.051.b: "Прикажите нашему арьергарду войти в Хунань, как и планировалось."
 YUN.introgame.051.c: "К сожалению, Чэн стремится сначала консолидировать Хунань."

 YUN.introgame.052.t: "Припасы ГМД пересекают границу [FROM.GetAdjective]"
 YUN.introgame.052.d: "Похоже, что время вмешательства Юньнани в политику соседних провинций пришло домой, поскольку припасы из соседних провинций Хунань и Гуанси оказались в Гуйчжоу, а соседние лидеры не желают или не могут их перехватить. Их решение позволить Гоминьдану перегруппироваться в течение многих лет без проверки аналогичным образом позволило генералам националистов перебраться в другие провинции на фоне слабости Лиги.\n\nПо мере продвижения они построили двустороннюю линию снабжения между Гуйчжоу и [FROM.GetNonIdeologyName], которая с каждым днем становится все более надежной. Поскольку большая часть активности происходит на противоположной стороне границы Дянь-Цянь, у властей Юньнани мало легких способов решения проблемы. Некоторые предложили прибегнуть к крайним мерам, таким как наем бандитов и других ополченцев для саботажа этих линий снабжения, надеясь, что эти рейды, по крайней мере, удержат эти силы на другом конце провинции."
 YUN.introgame.052.a: "Не нужно вмешиваться, чтобы не отследить источник."
 YUN.introgame.052.b: "У нас есть свои друзья..."

 YUN.introgame.053.t: "Предательство [FROM.GetAdjective] НРА!"
 YUN.introgame.053.d: "В довольно извращенном повороте событий, похоже, что все условия революционного братства или участия в национальной революции были отброшены недавно ушедшими [FROM.GetAdjective] отрядами Национально-революционной армии. Полностью осознавая тяжелую ситуацию, в которой оказалась хунта Гоминьдана в Гуйчжоу, их лидеры реквизировали «дополнительные» ресурсы из общего запаса, ослабив наши усилия против клики Юньнань. В конечном счете, нашим единственным ответом могло бы быть введение принудительного налогообложения для восполнения потерь или иным образом оставить все как есть и сосредоточиться на борьбе с Юньнанью."
 YUN.introgame.053.a: "Мы можем только надеяться, что они одумаются."
 YUN.introgame.053.b: "Отчаянные времена требуют отчаянных мер."

 YUN.introgame.060.t: "Наши интересы в Дянь-Цянь"
 YUN.introgame.060.d: "Поскольку борьба Дянь-Цянь в самом разгаре, внимание региональных революционных лидеров Сюн Кэу и Люй Чао привлекла шаткая ситуация в соседних провинциях. Якобы сторонники усилий Сюна и Люй, Гуйчжоуский ГМД начал противостоять идеологическому, хотя и далеко не личному, союзнику Сюна в лице федералиста Тан Цзияо. Преданный Гоминьдану и член Новой клики Гуанси, ситуация Лу гораздо более ясна, так как он неоднократно выступал за полную поддержку Гуйчжоуского Гоминьдана. Однако Сюн начал колебаться, учитывая их тюремное заключение его в прошлом. Поскольку различные сотрудники и сторонники оказывают свою поддержку, сычуаньские революционеры могут отложить помощь любой стороне."
 YUN.introgame.060.a: "Лу удается склонить кокус к поддержке Гоминьдана."
 YUN.introgame.060.b: "Сюн неохотно поддерживает юго-западный федерализм."
 YUN.introgame.060.c: "Двое соглашаются оставаться нейтральными на данный момент."

 YUN.introgame.061.t: "Промышленный корпус и его братья из Гоминьдана"
 YUN.introgame.061.d: "Похоже, что время вмешательства Юньнани в политику соседних провинций пришло домой, поскольку припасы из давно неспокойной провинции Сычуань оказались на передовой Юньнани. Хотя история влияния Юньнани в Сычуани богата и красочна, в конечном итоге юньнаньцы были изгнаны из провинции Сюн Кэу в разгар Эры милитаристов. Теперь скромная банда сквоттеров, расположившаяся лагерем на границе Сычуань-Гуйчжоу, как продолжение Гуйчжоуской хунты Гоминьдана, похоже, что Промышленный корпус, местная клика-филиал Гоминьдана в Сычуани, продолжил свою строгую революционную позицию. Ортодоксальный последователь Сунь Ятсена и член Новой клики Гуанси, Люй Чао мобилизовал мощь своей фракции для поддержки хунты ГМД в их борьбе против Юньнани."
 YUN.introgame.061.a: "Что они могут сделать, уставшие и без времени?"
 YUN.introgame.061.b: "Напасть на их караваны и отпугнуть их."

 YUN.introgame.062.t: "Провинциальный федерализм и сычуаньская модель"
 YUN.introgame.062.d: "Похоже, что время вмешательства Юньнани в политику соседних провинций пришло домой, поскольку припасы из давно неспокойной провинции Сычуань оказались на передовой Юньнани. Хотя история влияния Юньнани в Сычуани богата и красочна, в конечном итоге юньнаньцы были изгнаны из провинции Сюн Кэу в разгар Эры милитаристов. Теперь скромная банда сквоттеров, расположившаяся лагерем на границе Сычуань-Гуйчжоу, как продолжение Гуйчжоуской хунты Гоминьдана, похоже, что Сюн выполнил свои федералистские обещания, посылая припасы клике Юньнань Тан Цзияо. Это, безусловно, сюрприз, учитывая взаимную неприязнь, преобладающую между лидерами провинций."
 YUN.introgame.062.a: "Сюн ходит по тонкому льду."
 YUN.introgame.062.b: "Перехватить их грузы на границе."

 YUN.introgame.065.t: "Далекие левые в борьбе на Юго-Западе"
 YUN.introgame.065.d: "Повстанческая зона Мингань была не единственным революционным оплотом Гоминьдана после завершения Северного похода. Далеко по всей стране в провинции Гуйчжоу была похожая, хотя некоторые посчитали бы ее более успешной, борьба. Утверждая, что они являются истинными наследниками Национально-революционной армии, Гуйчжоуская хунта Гоминьдана во многих отношениях является наследием покойного генералиссимуса Чан Кайши, хотя некоторые из их лидеров номинально присягнули на верность комитету Ху Ханьминя в Москве. В то время как Мингань был построен на жертвах 4-й и 8-й армий Национально-революционной армии, Гуйчжоуский Гоминьдан произошел от всех других Армий Революции.\n\nХотя можно было бы подумать, что существует форма революционного родства, Гуйчжоуский Гоминьдан повернул вправо, приняв строгую антисиндикалистскую линию. Обвиняя Левое крыло в поддержке чуждой идеологии и катастрофической политике Объединенного фронта с Интернационалом, они с осторожностью отнеслись бы к любым искренним намерениям со стороны [ROOT.GetLeader].\n\nНесмотря на все это позерство, внутри Гуйчжоуской хунты все еще есть заметный контингент левых, особенно в 3-й армии Национально-революционной армии, но с несколькими в 1-й. Под защитой генералов, таких как Чжу Дэ и Чэнь Чэн, они поддерживали шаткие линии связи с Минганем при ограниченной поддержке со стороны своего начальства. Поскольку Хунта готовится к схватке с кликой Юньнань, Чжу и его клика левых в Третьей армии попросили нашего разрешения поддержать объединенный фронт с правыми."
 YUN.introgame.065.a: "Чжу Дэ и его люди должны поддержать Чжу Пэйдэ на данный момент."
 YUN.introgame.065.b: "Вряд ли они сделали бы то же самое для нас."

 YUN.introgame.066.t: "Мингань одобряет сотрудничество с Гуйчжоу"
 YUN.introgame.066.d: "Если вы думали, что ситуация Гоминьдана в Гуйчжоу ужасна, нужно просто совершить поездку через провинцию Хунань, чтобы достичь еще худшей ситуации в Повстанческой зоне Мингань, или, по крайней мере, могли бы. Избитые со всех сторон и вынужденные сражаться в сердце базы власти Южных Чжили, левые повстанцы там сражались почти десятилетие.\n\nЛевые элементы в остатках Гуйчжоу поддерживали шаткие линии связи с Минганем, хотя значительное сотрудничество оставалось неуловимым за пределами некоторых общих маршрутов контрабанды. Ни для кого не секрет, что генералы, такие как Чжу Дэ, были вовлечены в эти тайные переговоры, хотя он настаивает, что его лояльность остается с его названым братом Чжу Пэйдэ.\n\nОн сообщил последнему, что его работа принесла плоды: руководство Минганя официально приказало всем партийным кадрам подчиняться приказам хунты в их предстоящей борьбе с Тан Цзияо. Хотя на первый взгляд это щедрый жест, он неявно предполагает, что правительство Гуйчжоу все еще подчиняется левому Центральному комитету, увековечивая фантазию о том, что партия все еще едина. Тем не менее, на данный момент терять почти нечего: если Гуйчжоу падет, левые и правые будут уничтожены."
 YUN.introgame.066.a: "Несмотря на свои разногласия, левые и правые должны объединиться против Тана."
 YUN.introgame.066.b: "Эти предательские связи должны быть расследованы!"

 YUN.introgame.070.t: "Немецкие интересы в противостоянии Дянь-Цянь"
 YUN.introgame.070.d: "Немецкий колониальный проект в Юго-Восточной Азии в значительной степени унаследовал мантию предыдущих французских инвестиций, и дела в синосфере ничем не отличаются. Тесно связанные с политическими событиями в провинции Юньнань и провинции Гуанси, некогда французские, а теперь немецкие вьетнамские колониальные администрации оказались заняты по горло. С надвигающимися колониальными беспорядками и опасными событиями на полуострове Шаньдун и на территориях Лиги многие из их китайских владений, казалось бы, находятся под угрозой.\n\nОднако на непосредственной границе немецкие интересы в Юньнани оказываются жизнеспособными для сохранения. Вяло поддержав Тан Цзияо в сохранении его плацдарма на Юго-Западе, самопровозглашенный «Король Юго-Запада» теперь оказывается в кровавом противостоянии с остатками Гуйчжоуского Гоминьдана за юго-западные провинции. Хотя это не касается нас напрямую, посредники с командиром гарнизона Мэнцзы Ху Жоюем запросили дополнительное оружие, чтобы помочь патрулировать против «бандитов», которые были угрозой для торговцев оловом в регионе. В дополнение к более традиционным ворам (того рода, которые на самом деле были активны в южной Юньнани в прошлом), эта фраза часто используется как эвфемизм для социалистических повстанцев, без сомнения, поощренных деятельностью Гоминьдана на севере и, вероятно, находящихся в контакте с индокитайскими революционерами в наших колониях.\n\nПомощь генералу Ху обеспечит некоторую немедленную безопасность для наших прямых интересов и, вероятно, освободит силы губернатора Тана для решения его проблем глубже внутри страны. Хотя Тан и Ху далеко не самые надежные, революционеры Гоминьдана одновременно более открыто враждебны и ненасытны. Вместе они бы сильно угрожали немецким финансовым интересам."
 YUN.introgame.070.a: "Предложить дополнительное финансирование Ху Жоюю."
 YUN.introgame.070.b: "Вряд ли мы можем беспокоиться о Юньнани в данный момент."

 YUN.introgame.071.t: "Помощь из Сингапура"
 YUN.introgame.071.d: "Унаследовав французское влияние на Юньнань после окончания Великой войны, Сингапур с беспокойством заметил нарастающую напряженность в Юньнани, поскольку Куньмин и Гуйян готовятся к решающей борьбе за судьбу Китайского Юго-Запада. В то время как Тан Цзияо в основном действовал при поддержке Германии, Сингапур решил поддержать Тана косвенно, опасаясь слишком сильно укрепить «Короля Юньнани». Нет, вместо этого Германия отправила дополнительное оружие генералу Ху Жоюю, который недавно запросил помощь для подавления «бандитов», преследовавших торговлю оловом в Юньнани.\n\nУсиленная клика Мэнцзы действительно позволяет Тану перенаправить больше своих сил на вторжение в Гуйчжоу, а не патрулировать бандитов, но Губернатор не доверял бы генералу Ху ни на йоту. Действительно, генерал Ху в 1927 году замышлял отстранить Тана от губернаторства, что почти удалось. Хотя Ху, похоже, смирился с продолжающимся правлением Тан Цзияо в Юньнани, генерал-федералист знает, что Ху ждет, чтобы наброситься при малейшем признаке слабости.\n\nГубернатор Тан Цзияо оказывается загнанным в угол. В то время как его амбиции в отношении Китая начинаются с реинкорпорации Гуйчжоу в лоно федералистов, он также не может позволить выскочкам-генералам вне своего собственного лагеря разрушить хрупкий карточный домик, который он изо всех сил пытался удержать на плаву в течение двух десятилетий. Публично благодаря Берлин за помощь его правительству в подавлении бандитизма, в частном порядке он оплакивает их так называемую поддержку, размышляя над трудным решением."
 YUN.introgame.071.a: "Это освободит нас для развертывания большего количества войск на севере."
 YUN.introgame.071.b: "Теперь нам нужно будет внимательно следить за генералом Ху."

 YUN.introgame.080.t: "Неудача в борьбе Дянь-Цянь"
 YUN.introgame.080.d: "Несмотря на значительные инвестиции в конфликт Дянь-Цянь от имени хунты Гуйчжоу, похоже, что наша авантюра в борьбе за власть Дянь-Цянь в конечном итоге оказалась напрасной. Разбитые либо подготовленной засадой, либо украденные бандитами, либо взаимным недоверием, наши деньги и припасы едва ли попали в намеченные руки. С нашими усилиями, получившими отпор, потребуется значительное время для перегруппировки, и в конечном итоге многие в администрации охладели к страсти к участию в противостоянии Дянь-Цянь, по крайней мере, в ближайшем будущем."
 YUN.introgame.080.a: "Им придется бороться самостоятельно."

 YUN.introgame.081.t: "Провал в Дянь-Цяньской борьбе"
 YUN.introgame.081.d: "Несмотря на значительные инвестиции клики Юньнань в конфликт Дянь-Цянь, похоже, что наша ставка в борьбе за власть между Юньнанью и Гуйчжоу в конечном итоге оказалась напрасной. Наши деньги и припасы, уничтоженные подготовленными засадами, украденные бандитами или потерянные из-за коррупции, так и не попали в нужные руки. Поскольку наши усилия были отвергнуты, потребуется значительное время для перегруппировки, и в конечном счете у многих в администрации угас пыл к участию в противостоянии Дянь-Цянь, по крайней мере, в ближайшем будущем."
 YUN.introgame.081.a: "Давайте умоем руки в этой ситуации."

#YUN Resolution Event Chain (100-149):
 YUN.introgame.100.t: "Позднеосеннее наступление"
 YUN.introgame.100.d: "Песок в часах истек, и жребий брошен. Тан Цзияо, потеряв терпение из-за затянувшейся подготовки своей армии против того, что должно было быть гораздо более слабым Гуйчжоу, приказал наступать. Бои вспыхнули по всей линии фронта, когда разведывательные атаки армии Юньнани устремились вперед, чтобы встретиться с аванпостами Национально-революционной армии.\n\nТуман войны запутал оба верховных командования. Тщательно разработанные военные планы, нанесенные чернилами на карты с вниманием к мельчайшим деталям, развалились, как только солдаты вступили в перестрелку, а схемы и контрмеры были раскрыты. Пока на передовой и в тылу бушуют сражения, отдельные отряды солдат (преданные больше друг другу и своим командирам, чем своим номинальным хозяевам) вынуждены принимать деловые решения для себя: какая сторона с большей вероятностью выживет и заплатит нам?\n\nСудьба юго-запада решается в эти ближайшие дни, хотя пока исход остается неясным. Очевидно лишь то, что многочисленные задержки и неразрешимый тупик привели к кровопролитной битве: разрушительный исход для обеих сторон, которые должны были бы беречь свои элитные дивизии. Кто бы ни победил, ситуация выглядит мрачной."
 YUN.introgame.100.a: "Будь что будет, мы победим."

 YUN.introgame.101.t: "Юньнаньская армия захватывает Гуйчжоу"
 YUN.introgame.101.d: "После тяжелого наступления подготовка юньнаньцев и дисциплина Военной академии Куньмина принесли свои плоды. Преимущество начало переходить на нашу сторону, сначала медленно, а затем чрезвычайно быстро, по мере того как передовые позиции Национально-революционной армии были преодолены, и отступление Гоминьдана быстро превратилось в бегство.\n\nК тому времени, как армия Юньнани достигла тыловых эшелонов, битва за Гуйчжоу была фактически окончена. Большинство ополченцев Гоминьдана либо сдались, либо дезертировали, либо растворились в сельской местности, возвращаясь в свои дома, чтобы никогда больше не возвращаться. Планировалась фанатичная последняя оборона регулярных войск Гоминьдана в Гуйяне, но, поскольку их войска были в полном беспорядке и быстро окружены, исход был предрешен.\n\nРуководство хунты Гоминьдана также либо бежало в изгнание, либо ушло в подполье; надежды на возрождение Гоминьдана на юго-западе были окончательно разбиты. Тан Цзияо теперь является бесспорным хозяином региона, но многие вопросы остаются нерешенными."
 YUN.introgame.101.a: "Начнем следующий этап объединения!"

 YUN.introgame.102.t: "Инцидент в Чжаотуне"
 YUN.introgame.102.d: "Внезапным поворотом судьбы Национально-революционная армия перехватила инициативу, чем воспользовалась в полной мере. С отработанной точностью, националистическим пылом и упорством, достойным партийного государства, подразделения Гоминьдана усыпили бдительность армии Юньнани ложным чувством безопасности, прежде чем начать жестокое контрнаступление.\n\nЭлитные подразделения Национально-революционной армии прорвали слабые места юньнаньцев, воспользовавшись донесениями удачно расположенных шпионов и отважных разведчиков. Саботаж лазутчиков и массовое дезертирство по всей линии фронта посеяли хаос в тылу армии Юньнани, и вскоре их лучшие подразделения оказались в окружении.\n\nКогда панические отчеты достигли Куньмина, Тан Цзияо лично поспешил в Чжаотун, чтобы взять ситуацию под контроль. Но когда он прибыл в штаб армии Юньнани, его отряд телохранителей попал в засаду людей Лун Юня и был разоружен — это было крупное предательство. К концу дня делегация Гоминьдана прибыла в Куньмин, чтобы принять их капитуляцию, а Ху Жоюй отправил телеграмму из Мэнцзы о признании нового правительства."
 YUN.introgame.102.a: "Мы скоро прибудем в Куньмин."

##Section 1b (400-999): Introgame Misc Events

###- Phase II Events -###

 YUN.earlygame.000.t: "Наследие экспортного милитаризма"
 YUN.earlygame.000.d: "Состояние армии Юньнани — это состояние упадка, отражающее ухудшающееся качество морали и вооружения людей. Редкие поставки устаревших винтовок из арсенала Чэнду, которые поступали от сычуаньской администрации Ло Пэйцзиня, давно прекратились, как и те немногие, что приходили из Японии через южные порты Китая. Артиллерия также ухудшилась в качестве: многие горные орудия Круппа времен Цзингоцзюнь были выброшены или повреждены, а их расчеты хронически неопытны из-за острой нехватки как боевых снарядов, так и холостых патронов, необходимых для обучения.\n\nТаким образом, парады и тщетные демонстрации силы стали предпочтительнее реальных полевых боев и учений, не оказывая сколько-нибудь значимого влияния на эффективность новобранцев. Кавалерийские отряды армии Юньнани, и без того заброшенная сила из-за гористого рельефа Юньгуйского нагорья, были плохо обучены и недисциплинированны: лошади пугались и часто разбегались при малейшем столкновении. Эта острая нехватка обученных лошадей или транспортных средств также означает, что транспортные подразделения, часто критически важные для боевой сплоченности на Юго-Западе, остаются несуществующими.\n\nНесмотря на это, Куньмин все еще сохраняет репутацию силы и суровой дисциплины — элитной подготовки, смелости противостоять превосходящим противникам и побеждать вопреки всему, что, несомненно, поддерживается наследием военной академии Куньмина. Однако этому противодействует отсутствие этого духа в высшем командовании, прежде всего среди клики Тан Цзияо и его брата Тан Цзию. Рядовой состав Цзингоцзюнь также неоднороден по качеству: опытными солдатами легко управлять, но им часто не хватает интеллекта и инициативы, в то время как зеленые новобранцы остаются неуправляемыми, необученными и немотивированными. Время для реформы некогда великой армии Юньнани имеет первостепенное значение; разорванная на части экспортным милитаризмом и внутренними распрями, она может лишь надеяться на возвращение былого престижа."
 YUN.earlygame.000.a: "Впереди у нас долгий путь."

 YUN.earlygame.001.t_kmt: "Возрождение Вампу"
 YUN.earlygame.001.t_nokmt: "Расширение Куньмина"
 YUN.earlygame.001.intro: "Ключевым моментом в формировании нашей новой армии является положение Военной академии Куньмина. Неотъемлемой частью успехов Хугоцзюнь в прошлом была самоотверженность, братство и бескорыстие, пропагандируемые здесь. Поскольку в преподавательском составе учреждения служили такие люди, как Цай Э, Ян Цзе, Хэ Инцинь, Ли Гэньюань, Ли Лецзюнь, Тан Цзияо и множество других великих революционных бойцов, академия несет в себе глубокое наследие, внеся значительный вклад как в федералистское, так и в гоминьдановское революционные движения.\n\nС намерением создать класс воинов, столь же преданных институтам Китая и республиканизму, как японцы преданны своему Императору, учебная программа Куньмина в значительной степени вдохновлена Сикан Гакко в Японии — отчасти из-за того, что многие ранние преподаватели были её выпускниками. Управляемая по принципу единства в управлении и обучении, академия настолько же бюрократична, насколько и преданна делу. Общий штат невелик, но элитарен, однако как сотрудникам, так и студентам рекомендуется напрямую обращаться к директору по любым вопросам. Увы, сегодняшнее учреждение — это не то, что было в прошлом, и чтобы вдохнуть новую жизнь в прославленную академию, требуется новый директор, который будет управлять кораблем и восстановит душу, которая у неё когда-то была.\n\n"
 YUN.earlygame.001.d_kmtsatellite: "$YUN.earlygame.001.intro$Для властей, действующих по указке [ROOT.GetLeader], есть три варианта на эту влиятельную должность. Прежде всего, это «Отец-основатель» Ли Гэньюань, который будет курировать надлежащее и подлинное возвращение к принципам оригинальной академии, столь высмеиваемым в нынешнюю эпоху. Во-вторых, это способный Чжу Дэ. Считающийся большинством вундеркиндом и одним из многих протеже Цай Э, Чжу Дэ прошел обучение в академии и за прошедшие годы разработал обширные собственные военные теории. Однако он является архонтом левых симпатий в Юньнани и может спровоцировать более консервативные элементы. Последний вариант, чтобы удовлетворить вышеупомянутые фигуры, — это Ху Жоюй. Ранее бывший директором академии при Тан Цзияо, Ху Жоюй также был студентом академии и имеет прочные связи с истеблишментом."
 YUN.earlygame.001.d_kmt: "$YUN.earlygame.001.intro$Немедленным вариантом является выбор Хэ Инциня, благодаря его предыдущему опыту управления Военной школой Гуйчжоу с Ван Вэньхуа, его позднейшей должности декана по учебной части в Куньмине и его ключевой должности заместителя главного инструктора Вампу. Второй кандидат, продвигаемый кликой CC, — это отставной Ван Болин. Директор Вампу в 1925 году, Ван ушел в отставку после провала Северного похода из-за плохого послужного списка, однако под давлением Чэнь Гофу он решил поучаствовать в гонке — к большому неудовольствию Хэ Инциня. Последний вариант, продвигаемый Кликой политической науки, — это «Отец-основатель» академии Ли Гэньюань. Старый командир поколения Цай Э, Ли Гэньюань предан революционным идеалам и воинскому духу, хотя его политические убеждения вызывают отчуждение у молодой гвардии."
 YUN.earlygame.001.d_fed: "$YUN.earlygame.001.intro$\n\nСоответственно, были выдвинуты три потенциальных кандидата на самую влиятельную должность в военной культуре. Понимая, что такая должность фактически приведет к двойной лояльности как директору, так и [ROOT.GetLeader], наиболее привлекательным вариантом является восстановление Тан Цзию. Политически податливый, неамбициозный и зависимый от брата, он стал бы отличным продолжением влияния [ROOT.GetLeader]. Что касается двух других кандидатов, то, хотя они и отдалились от своего старого друга и хозяина, Ху Жоюй и Лун Юнь — способные люди в политических и военных делах, и с предыдущим опытом работы директором академии, они бы служили добросовестно. Хотя их мнение о [ROOT.GetLeader] оставляет желать лучшего."
 YUN.earlygame.001.d_npa: "$YUN.earlygame.001.intro$\n\nСоответственно, были выдвинуты два потенциальных кандидата на самую влиятельную должность в военной культуре. Понимая, что такая должность фактически приведет к двойной лояльности как губернатору, так и директору, два варианта — это два самых влиятельных человека в Юньнани: Ху Жоюй и Лун Юнь. У обоих есть свои достоинства, так как оба учились в академии, а позже оба были директорами во время правления Тан Цзияо. Однако их истинная сила заключается в их уникальных качествах: Ху Жоюй имеет связи по всему политическому спектру, в то время как Лун Юнь — печально известный надежный солдат и командир."
 YUN.earlygame.001.a: "У Хэ Инциня есть навыки."
 YUN.earlygame.001.b: "Ван Болин, его время еще не прошло!"
 YUN.earlygame.001.c: "Вернуть Куньмин его Отцу-основателю."
 YUN.earlygame.001.e: "Мы должны поделиться гением Чжу Дэ!"
 YUN.earlygame.001.f: "Ху Жоюй успокоит консерваторов."
 YUN.earlygame.001.g: "Лун Юнь — один из наших самых способных!"
 YUN.earlygame.001.h: "Тан Цзию, ради преемственности."
 YUN.earlygame.001.i: "Оставить нашего нынешнего директора."

 YUN.earlygame.002.t: "Сердце и душа Юньнани"
 YUN.earlygame.002.d: "В своей основе Куньминская академия была основана на принципах последнего бастиона истинных китайцев, которые стремились бы спасти дух Китая. При полной приверженности милитаризму как единственному методу, с помощью которого они могли бы это сделать, Куньмин стал одной из первых военных академий в стране, интегрировавших военные навыки в более широкую учебную программу. Благодаря такому образованию и продвижению всеобщей воинской повинности они надеялись, что смогут воспитать боевой дух в юньнаньцах, который восторжествует даже над величайшими проблемами, стоящими перед нацией.\n\nУчебная программа, в частности, отличалась от Баодина, так как в ней делался упор на военную подготовку, физическую форму и полевой опыт. Большинство инструкторов были из самой Юньнани, с символическим включением японских инструкторов из Сикан Гакко — выпускниками которой было большинство юньнаньских инструкторов. Студенты разделены на три класса: A для действующих офицеров в звании майора или ниже, B для офицеров временных сил обороны и C для начинающих офицеров, набранных из гражданских или военных школ. Предметы включают китайскую литературу, этику, черчение, строевую подготовку, боевую дисциплину и другие.\n\nС наступлением новой эры академии среди военного персонала разгорелась дискуссия о влиянии революционной академии Вампу на новый Куньмин. Ибо учебная программа партийного государства предусматривала еще больший упор на боевой дух солдата и его абсолютный долг перед революцией и нацией. Но критики, сторонники старых путей, высказывают опасения, что такая интеграция учений Вампу разбавит силу и характер Куньмина, и что лучше просто придерживаться прежнего курса."
 YUN.earlygame.002.a: "Среди всех академий Вампу — сверкающий бриллиант."
 YUN.earlygame.002.b: "Разве не эта учебная программа выиграла Войну в защиту республики?"

 YUN.earlygame.003.t: "Любимые захватчики"
 YUN.earlygame.003.d: "На протяжении многих лет армии Юньнани кропотливо создавали впечатление порядка среди населения провинции: высокий боевой дух, хорошая дисциплина и вежливое взаимодействие с гражданскими лицами отличали их от грубого образа северных армий. Это было достигнуто с помощью кодекса поведения между армией Юньнани и населением, соблюдение которого обеспечивали офицеры армии, в основном касающегося обращения с гражданскими лицами, общих манер и гигиены.\n\nВ отличие от типичных солдат эры милитаристов, которым давалась полная свобода в увольнении, новобранцев армии Юньнани призывают вести себя уважительно и сдержанно, в результате чего такие ценности отделяют их даже от региональных соперников на Севере и Востоке. Все ранги военного командования осуждают моральные пороки, которые обычно преследуют армии милитаристов, такие как курение опиума, проституция, а также чрезмерные азартные игры и пьянство.\n\nТакой режим поведения на протяжении всей службы обеспечил приемлемый стандарт моральной дисциплины в рядах армии Юньнани, хотя он и варьировался в зависимости от степени наказания в случае несоблюдения этих правил, а также от того, насколько жестко проводилась эта политика.\n\nПоскольку необходимость реформы Цзингоцзюнь снова на повестке дня, в военной структуре быстро возникли дебаты относительно того, насколько неотъемлемыми являются эти правила, причем многие утверждают, что они отвлекают от и без того разнообразной роли офицеров в армии. Вопреки этому, сторонники военного профессионализма продолжают настаивать на наследии армии Юньнани как той, которая остается преданной нации, народу и их делу."
 YUN.earlygame.003.a: "Репутация армии Юньнани должна быть сохранена!"
 YUN.earlygame.003.b: "Эти бюрократические правила отвлекают от важной роли, которую играет офицер."

 YUN.earlygame.004.t: "Душа стремительного наступления"
 YUN.earlygame.004.d: "При формулировании эффективной стратегии победы в войне командиры должны интегрировать стратегическую теорию, которой их учили в академиях, с военными, политическими и экономическими реалиями Китая. С первого десятилетия Республики начали формироваться две модели ведения войны: одна для войн, ведущихся во внутренних районах, и другая для войн, ведущихся на побережье. Эти два стиля различались из-за географии, логистики, современного вооружения и коммуникаций. Хотя в целом общей стратегической целью обеих стратегий был захват ключевых коммуникационных узлов, таких как города и поселки, контролирующие ключевые реки, горные перевалы и сети железных или автомобильных дорог.\n\nВ отличие от внутренних районов, Восточный Китай наделен более развитой инфраструктурой, что обеспечивает лучшие сети связи и железные дороги. Такие сети обеспечили эффективную мобилизацию и транспортировку войск и оборудования. Таким образом, решающий статус этих сетей превратился в оспариваемые военные цели, также определяющие размер и местоположение полей сражений. Войны там стали гораздо более интенсивными, а с лучшим приобретением современного оружия превратились в бойни.\n\nОднако внутренние районы испытывали острую нехватку как железных, так и автомобильных дорог: в Юньнани было 267 миль дорог по сравнению с 2440 милями в Гуандуне. Поэтому стратегией для войн во внутренних районах был общий приоритет коммуникационных узлов, однако армиям приходилось использовать реки для транспорта, наряду с разделением своих армий на небольшие отряды, малым количеством тяжелой техники, ограниченной разведкой и трудностями в координации.\n\nС такими ограничениями решительные, агрессивные действия были предпочтительными на протяжении двух десятилетий, но с медленной индустриализацией внутренних районов они стали все более незначительными в изменении хода битвы, а их риски потенциально могли опрокинуть целые режимы, как это чуть не случилось с Тан Цзияо в 1926 году."
 YUN.earlygame.004.a: "Решительные действия выигрывают войны!"
 YUN.earlygame.004.b: "Северный поход доказал ошибочность чистой агрессии."

 YUN.earlygame.005.t: "Воинский дух"
 YUN.earlygame.005.d: "Прививая революционный республиканизм и воинский дух студентам Академии Куньмин, первоначальные основатели стремились к созданию касты профессиональных солдат, наиболее подходящей для решения будущего китайской нации. С этой целью новый Куньмин снова ввел строгую дисциплину среди всех своих студентов, упрекая их за эгоистичные и индивидуалистические привычки, такие как распутство, азартные игры, наркотики и зависть к своим командирам. Директор неоднократно подчеркивал «бусидо» и ценность духовного воспитания в развитии особого школьного духа, как это было в Вампу.\n\nСамо понятие этого воинского духа функционирует как вершина китайского военного профессионализма. Ибо только профессиональный, военизированный и националистический солдат мог расшифровать направление национального государства, ибо это была его особая ответственность. Обладая превосходной компетентностью во всех вопросах национального государства, неудивительно, что новая Хугоцзюнь стремится поддерживать определенный уровень превосходства духа среди своих солдат.\n\nОднако более граждански настроенные чиновники осуждают возведение военных на пьедестал. Ибо такие действия привели к тому состоянию, в котором сейчас находится Китай. Задушенный военными диктаторами. Но другие выдвигают контраргумент: соглашаясь с тем, что Китай полон военных, управляющих его направлением, большинство из них не имеют ни духа, ни знаний, чтобы одновременно быть государственными деятелями. И поэтому стремление к духовному воспитанию студентов Куньмина — это всего лишь корректирующее действие."
 YUN.earlygame.005.a: "Только военные знают, что правильно!"
 YUN.earlygame.005.b: "Именно это понятие породило милитаристов!"

 YUN.earlygame.006.t: "Предыдущие поколения юньнаньских кадетов"
 YUN.earlygame.006.intro: "Провозглашенная по инициативе Тан Цзияо 25 декабря 1922 года, Юньнаньская авиационная школа официально открыла свой первый семестр с тридцатью студентами, которые были организованы в команду новобранцев авиации и обучались вместе с 17-м классом новобранцев Военной академии Куньмина. В апреле 1923 года Тан Цзияо позже одобрил прием четырех корейских студентов в класс: Ли Инмао, Чжан Чжири, Ли Чуня и первой женщины-пилота Цюань Цзию, также известной как Квон Ки-ок.\n\nПоддерживая двухлетнюю учебную программу, Юньнаньская авиационная школа включала шесть месяцев военной подготовки, за которыми следовали полтора года авиационной подготовки. С 1922 по 1935 год Юньнаньская авиационная школа открыла четыре летных класса и два класса механиков, выпустив 142 человека с летного факультета (включая 13 женщин-пилотов) и 100 с механического факультета.\n\nС 30 выпускниками четвертого класса в 1935 году был набран новый класс для новой эры школы, с обширным набором как из самой Юньнани, так и из-за ее пределов. Наряду с этим, сотрудники возрожденной школы разослали письма с приглашением старым студентам и преподавателям, получив умеренный отклик."
 YUN.earlygame.006.d_kmt: "$YUN.earlygame.006.intro$\n\nОднако наиболее важным для Гоминьдана является стремление двух отчаянных стажеров-пилотов с важным семейным прошлым. С зачислением Чэнь Сяньфу, сына Чэнь Цимэя, и Дай Анго, сына Дай Цзитао. Надеясь внести свой вклад в успех национальной революции, их зачисление показывает истинную преданность их семей делу Национальной революции."
 YUN.earlygame.006.d_nokmt: "$YUN.earlygame.006.intro$\n\nС официальным зачислением пятого класса школы многие в высшем командовании надеются, что Юньнань станет рассадником молодых авиационных талантов Китая, соперничая с Баодином."
 YUN.earlygame.006.a: "Пусть эти храбрые пилоты взлетают высоко!"

 YUN.earlygame.007.t: "Знаменательная история Уцзяба"
 YUN.earlygame.007.d: "Уцзяба, расположенная в четырех километрах к юго-востоку от Куньмина, находится на берегу озера Дяньчи. Изначально это была пустошь, заросшая сорняками на протяжении тысячелетий, у этой местности даже не было названия. Позже несколько семей с фамилией У прибыли в этот район, освоили его и поселились там, а возникшая деревня получила прозвище «Деревня Уцзя». Из-за горной природы Юньнани люди привыкли называть ровную землю, окруженную горами, «бацзы», и поэтому ровная земля, где располагалась деревня Уцзя, называлась старыми жителями Куньмина «Уцзяба».\n\nПереходя к современной эпохе, при Цин ровная земля Уцзяба за пределами Куньмина была поднята Бюро помощи для строительства артиллерийских казарм, и Уцзяба была преобразована в большой тренировочный полигон с 1137 казармами. Во время Синьхайской революции Цай Э и Ли Гэньюань возглавили революционную армию в Юньнани, чтобы начать «Восстание двойной девятки» в казармах Уцзяба, свергнув режим Цин в Юньнани. Уцзяба затем стала базовым лагерем революционной армии.\n\nЗаставив жителей вокруг Уцзяба переехать в 1922 году, Тан Цзияо превратил казармы в аэропорт, купив 30 старых истребителей и 15 старых учебных самолетов у немецких ВВС во Вьетнаме, официально создав ВВС Юньнани. В то время аэропорт Уцзяба был самым ранним аэропортом для авиационной подготовки на материковой части Азии, обучая большое количество летных талантов из разных стран.\n\nДаже по сравнению с режимами, управляемыми такими коллегами-милитаристами, как Янь Сишань и Лу Жунлин, авиационная программа Юньнани добилась замечательного успеха, соперничая с программой Центрального правительства."
 YUN.earlygame.007.a: "Истинное место рождения китайских ВВС!"

 YUN.earlygame.008.t: "Сомнительный флот Куньминской академии"
 YUN.earlygame.008.d: "С нашим недавно полученным побережьем изгнанные морские командиры, проживающие в Юньнани, наконец-то смогли увидеть свой звездный час. Объединившись вокруг адмирала Оуян Гэ, он попытался создать свою собственную военно-морскую академию, якобы крыло Военной академии Куньмина, которую он назвал «Школой Молнии». Не находясь в юрисдикции какого-либо независимого военно-морского ведомства, школа находится под прямым контролем Академии Куньмина, и поэтому ее называют «Военной академией Куньмина на флоте», что еще больше подкрепляется тем, что большинство персонала были студентами этого учреждения.\n\nС выпускниками, называемыми департаментом «Молнии и Грома», новая клика ворвалась в состояние китайских военно-морских клик по всей стране. Презираемая как новички, которым не место на их территории, Гуандунская военно-морская клика сплотилась в оппозиции, не признавая собственного звания Оуян Гэ на флоте или звания выпускников Школы Молнии, фактически ограничивая их командованием в пределах собственного влияния Юньнани.\n\nБолее того, Фуцзяньская клика попыталась воспрепятствовать возможности выпускников «Молнии и Грома» носить военно-морскую форму, по сообщениям, преследуя лиц, которые это делают."
 YUN.earlygame.008.a: "Обеспечить контроль над флотом!"
 YUN.earlygame.008.b: "Это посягательство на настоящих моряков!"

 YUN.earlygame.009.t: "Юньнаньские дела в колониальной администрации"
 YUN.earlygame.009.d: "От пограничников на границе Юньнань-Индокитай и тех, кто путешествует по железной дороге Куньмин-Ханой, поступают сообщения о серии таинственных грузов, покидающих границы провинции Юньнань и исчезающих в индокитайских миазмах. Возможно, эти грузы поставляются [YUN.GetLeader] колониальному сопротивлению под эгидой изгнания нашей администрации от его непосредственных границ, что в конечном итоге приведет к потере нашей монополии на ресурсы провинции.\n\nОднако существует вероятность, что такие случаи являются лишь следствием некомпетентности юньнаньских чиновников, неспособных должным образом определить, куда попадают их торговые товары. Тем не менее, многие чиновники посоветовали [ROOT.GetLeader], что, возможно, было бы целесообразно полностью перекрыть всю торговлю между колониями и Юньнанью, поскольку это потенциально может потопить хрупкую экономику Юньнани и прекратить поставки.\n\nДругие, однако, советуют, что такие действия могут еще больше разжечь напряженность, и что неважно, поддерживают ли юньнаньцы ИНК или нет, ибо Индокитайский национальный конгресс никогда не сможет победить Кригсмарине на поле боя."
 YUN.earlygame.009.a: "Какая наглость! Ввести эмбарго!"
 YUN.earlygame.009.b: "У нас мало времени, чтобы еще больше злить [YUN.GetLeader]."

 YUN.earlygame.040.t: "Российские военные советники"
 YUN.earlygame.040.d: "В нашем стремлении модернизировать армию мы успешно пролоббировали отправку российским правительством военных советников, чтобы помочь нам создать силы, структурированные по российскому образцу. Их опыт в Гражданской войне в России привел их к разработке концепции «Глубокой операции», которую мы надеемся перенять.\n\nДействительно, старая Вампу начиналась с помощью красных русских изгнанников, и хотя эти новые советники — бывшие офицеры Белой армии, их вера в патриотическую породу солдат и вдохновляющий офицерский класс, который будет сражаться до победного конца, нам вполне знакома.\n\nОсвещая новое яркое партнерство между теми, кто находится в правительстве [ROOT.GetLeader], выделяется Петр фон Глазенап, ветеран ударных полков Корнилова. Аполитичный и стремящийся сосредоточиться на военных вопросах, он имел большое участие и опыт в последних реформах русской армии в качестве члена штаба Корнилова и Деникина. Обладая обширными знаниями о том, как организовать армию с нуля, он окажется бесценным активом.\n\nПетра сопровождает Георгий Эльвенгрен, близкий как к Корнилову, так и к Савинкову. Он выполняет роль, сродни дипломату-солдату, подчеркивая важность идеологии в элитной армии и используя свой значительный опыт в организации повстанческих партизанских операций против численно превосходящего врага. Всеволод Иванов, тем временем, компетентный кавалерийский офицер с мышлением тотальной войны, подчеркивающий важность массовой пропаганды и имеющий опыт ведения боевых действий в регионах с плохой инфраструктурой.\n\nБудучи в значительной степени аполитичными в китайских делах, все они начали эффективно интегрироваться в структуру Куньмина, и их миссия служит дальнейшему укреплению нашего военного направления и потенциально открывает новое партнерство на мировой арене. Они принесли с собой много полезных идей для направления нашей армии."
 YUN.earlygame.040.a: "Оттачивая стратегию, мы побеждаем!"
 YUN.earlygame.040.b: "Элитная армия прокладывает путь к победе!"
 YUN.earlygame.040.c: "Только через тотальную мобилизацию мы можем победить!"

###- KMT Unique Military Events-###

 YUN.earlygame.050.t: "Степень политизации армии"
 YUN.earlygame.050.d: "Благодаря своим успехам, достигнутым в основном благодаря традиционной бюрократической организации, независимой от политического влияния, армия Юньнани прошлого поддерживала форму «аполитичного» милитаризма. Хотя они действительно сохраняли четкое общее представление о стратегических и политических целях своих кампаний, они, тем не менее, управляли своими операциями как хорошо смазанным механизмом. С ростом армии партийного государства достоинства интеграции политики в солдатскую среду и фанатизм, порожденный революционной лояльностью, стали поразительно очевидны. С растущим проникновением политики в армию гражданские клики партии попытались распространить свое влияние на структуру военного командования.\n\nПервым кандидатом, просящим о назначении, при поддержке «Политической науки», является само ее лицо, Чжан Цюнь. Имея опыт одноклассника и штабного офицера Чан Кайши, он относительно недавно перешел к гражданским делам. Однако в такое кризисное время он снова попросил о службе на поле боя.\n\nВторой продвигаемый кандидат — это сам Чэнь Гофу из клики CC. Аналогичным образом участвовавший в Синьхайской революции, Чэнь Гофу впоследствии ограничился псевдовоенными ролями, работая в сфере набора кадров для Вампу. Вечно активные махинации клики CC остаются загадкой, но такое назначение широко распространило бы их влияние на единственную непокоренную ими грань партии — армию.\n\nНаконец, есть особый случай Общества синих рубашек. Уже прочно интегрированные в военные дела, они потребовали назначения Лю Цзяньцюня на военную должность. Их главный идеологический теоретик, Лю практически не имел реального военного опыта, в основном занимая штабные или политические должности, такие как конфиденциальный секретарь Хэ Инциня.\n\nВ любом случае, их назначения встречают серьезное сопротивление со стороны таких людей, как Гу Чжутун и Вэй Лихуан, приверженцев НРА, которые высмеивают вмешательство скользких политиков в искусство войны."
 YUN.earlygame.050.a: "Эти люди доказали свою преданность!"
 YUN.earlygame.050.b: "Оставайтесь за столами, джентльмены."

 YUN.earlygame.051.t: "Кровь мучеников"
 YUN.earlygame.051.d: "Наследие революционной борьбы в Китае долгое и трудное, однако оно остается символом чистой решимости патриотов нации бороться за ее спасение. От восстаний-предшественников до Синьхая, до самого 1911 года, до Движения в защиту конституции, до Войны в защиту республики, до Северного похода. Китайские революционные мученики неисчислимы. Само дело построено на горе их трупов. И все же, полностью осознавая этот факт, наши храбрые солдаты продолжают жертвовать своими надеждами, своими мечтами, всем, что, как они думали, имело смысл, — все ради революционного дела.\n\nЭто нигде так не очевидно, как в памяти павших, и, в частности, в памяти молодого Ца Гуаньчжу. Погибнув в 1925 году, он написал письмо, адресованное брату, за день до того, как отдал свою жизнь Национальной революции.\n\n«Дорогой брат. Вероятно, я не вернусь живым из завтрашней битвы. Я никогда не забуду, как наша мать кормила и растила меня, как ты любил меня, и мои друзья помогали мне. Сегодня, однако, мой долг — продвигать Три принципа на благо всего Китая, а не верность семье и друзьям. Когда я думаю о многих героях, отдавших свои жизни в прошлом, мне становится очень стыдно. Поэтому завтра я посвящу всю свою энергию, пожертвую своей жизнью ради дела Трех принципов».\n\nНастоящий боец до самого конца, истории, подобные истории Ца Гуаньчжу, текут через сам дух Национально-революционной армии, хотя некоторые в партии продолжают колебаться перед полным высвобождением ярости народа, опасаясь олицетворения культа смерти и тщетности."
 YUN.earlygame.051.a: "Прольется еще много крови."
 YUN.earlygame.051.b: "Великая душа, но воздержитесь от идолопоклонства."

 YUN.earlygame.052.t: "В тени НРА"
 YUN.earlygame.052.d: "Корни Национально-революционной армии лежат в ее происхождении как силы, рожденной от отчаяния. Не в силах контролировать своих «союзников» в армии Юньнани в Гуандуне, доктор Сунь Ятсен стремился создать по-настоящему лояльную армию, преданную не вероломным местным лидерам, а партии и революции. С созданием Вампу Национально-революционная армия была небольшой силой с нехваткой снаряжения и живой силы. Она стала все больше полагаться на решительные, мобильные кампании, которые стремились избегать столкновения с более чем 1 вражеской армией за раз, что было изложено в доктрине «Сучжань, Суцзюэ» — Быстрая битва, Быстрое решение.\n\nБоевая тактика НРА включала акцент на маневренности, организованности, сплоченности и приспособляемости армии, причем элементы внезапности оказались решающими для армий генералиссимуса Чана на ранних этапах Северного похода в Хунани и Цзянси. Ибо чем дольше длилась битва, тем больше драгоценных ресурсов расходовалось.\n\nНесмотря на это, призывы к принятию таких военных доктрин столкнулись с сопротивлением и оппозицией среди высшего командования армии Юньнани, многие ссылались на сам провал Северного похода и Уханьское фиаско как на свидетельство недостатков таких рискованных стратегий. Это усугубляется тем фактом, что тактика мобильной войны НРА остается неиспытанной в горах и долинах Юньнани, а большая и плохо обученная армия провинции оставляет мало шансов на доктринальный успех. Однако молодые военные новаторы и теоретики остаются непреклонными в том, что сочетание новых инициатив по обучению, идеологической обработки и поощрения решительности офицеров может быть именно тем, что нужно провинциальной армии для процветания в новую эпоху мобильной войны. Ибо кто смеет, тот побеждает."
 YUN.earlygame.052.a: "Дух Вампу все еще с нами!"
 YUN.earlygame.052.b: "Хугоцзюнь побеждала благодаря координации."

 YUN.earlygame.053.t: "Годовщина битвы при Мяньху"
 YUN.earlygame.053.d: "Одна из важнейших битв ранней Национально-революционной армии, битва при Мяньху, провозглашается основополагающим событием духа Вампу в армии. Произошедшая в феврале 1925 года, во время Первого Восточного похода по изгнанию Чэнь Цзюнмина из Гуандуна, силами, собранными Гоминьданом, были армия Гуй под командованием Лю Чжэньхуаня, армия Юньнани в Гуандуне под командованием Ян Симиня, свежие учебные полки Вампу под командованием Хэ Инциня и Ван Болина, а также армия Гуандуна под командованием Сюй Чунчжи.\n\nБыстро захватив обширные территории и победив Хун Чжаолиня, армия Юньнани и армия Гуй в конечном итоге сдержали свои силы, заставив полки Вампу столкнуться с более чем 20 000 элитных солдат, имея немногим более 3000. Одержав великолепную победу над солдатами Линь Ху, тяжелые потери и упорство, проявленные здесь, послужили дальнейшему укреплению боевого духа новой НРА, а учебные полки сформировали основу 1-й армии НРА.\n\nХэ Инцинь недавно провел митинг для ветеранов битвы, подчеркнув важность победы, а также то, как она была достигнута. Рассматривая это как ключ к революции, он, как сообщается, призвал к возрождению «Духа Вампу». Гу Чжутун присоединился к своему начальнику, заявив, что дух самопожертвования послужил решающим фактором, определившим победу в Восточном походе и будущие успехи НРА.\n\nТем не менее, несмотря на ветеранов, такие люди, как Цзинь Ханьдин и Фань Шишэн — члены армии Юньнани в Гуандуне, наряду с гражданскими кликами преуменьшили ее важность, упрекая таких людей, как Цянь Дацзюнь, Хэ и Гу за их идолопоклонство перед духом, из-за которого они проиграли Северный поход."
 YUN.earlygame.053.a: "Истинное место рождения Вампу."
 YUN.earlygame.053.b: "И все же дух Вампу не смог спасти Северный поход."

 YUN.earlygame.054.t: "Общий стратегический обзор китайских армий"
 YUN.earlygame.054.d: "С точки зрения процесса военного мышления армии Юньнани, три титана выделились как прародители ее стратегии. Первым был Ли Гэньюань, директор-основатель Военной академии Куньмина; Ли был движущей силой бюрократического самоотверженного милитаризма армии Юньнани. Вторым был Цай Э. Имя, которое само по себе титаническое, Цай вел Юньнань в самые решающие моменты, сокрушая армии Юань Шикая, Сычуани и любых других, кто осмелился противостоять Хугоцзюнь. Наконец, был Тан Цзияо. Хотя большинство осуждало бы его как некомпетентного шута, была заслуга в его лучших попытках сохранить душу и достоинство его Цзингоцзюнь, однако ее судьба была уже предрешена.\n\nВторой из этого трио, Цай Э, был, пожалуй, одним из величайших военных тактиков и стратегов Китая современной эпохи. Опытный исследователь военной истории и стратегии, Цай был прародителем китайской вариации стратегии «заманивания врага вглубь», ценя опыт буров против британцев и русских против Наполеона. У Китая много земли, утверждал он, и поэтому можно пожертвовать этой землей, ведя непрерывную кампанию беспокойства, в конечном итоге нанеся ответный удар, когда придет время.\n\nОднако различные военные в истеблишменте — такие как сторонники жесткой линии Вампу Хэ Инцинь, Гу Чжутун и Тэн Цзе — не согласны с таким понятием, поскольку современный Китай должен иметь возможность, независимо от ситуации, сражаться на равных с любой иностранной империалистической державой."
 YUN.earlygame.054.a: "Цай Э прав, пусть просторы Китая поглотят их."
 YUN.earlygame.054.b: "Китайский дух лучше всего проявляется в наступлении!"

 YUN.earlygame.055.t: "Послебоевые конференции"
 YUN.earlygame.055.d: "Архитектор нашей новой военной теории, Чжу Дэ, провозгласил новообретенную критическую важность обучения и образовательных преимуществ своих гипотетических «послебоевых конференций». На них все командиры и солдаты будут сотрудничать и анализировать недавние битвы и кампании. Любой из участников может обсуждать и критиковать планы битв или кампаний, а также критиковать поведение отдельных командиров или солдат, ставя под сомнение и критикуя будущие планы битв и кампаний.\n\nВыступая на этих массовых собраниях лично, курирующий генерал объяснял бы более широкую политическую и военную ситуацию солдатам и офицерам, чтобы они могли понять общую ситуацию, дабы, по словам Чжу, сохранить армию «демократичной». Таким образом, информация распределяется поровну между рангами.\n\nИспользуя эти сессии для исправления ошибок, устранения некомпетентных командиров или продвижения других по заслугам, Чжу считает эти конференции имеющими высокую образовательную и техническую ценность для армии, планируя публиковать их результаты в виде брошюр для распространения в качестве учебного материала для солдат.\n\nВозникло сопротивление со стороны более консервативного высшего руководства армии, Лю Чжи, Гуань Линьчжэна и Хэ Инциня, которые утверждают, что такие конференции могут привести к смещению командиров на основе взаимной ненависти солдат к ним, обвиняя их в «некомпетентности», когда на самом деле они просто не доверяли видению своего начальника или им не хватало духа следовать за ним."
 YUN.earlygame.055.a: "Такие конференции непременно нарушат структуру командования!"
 YUN.earlygame.055.b: "Существует надлежащая необходимость в рефлексии, если мы хотим добиться успеха."

 YUN.earlygame.056.t: "Уравнивание командных должностей"
 YUN.earlygame.056.d: "Крайне важный для успехов армии Юньнани и Национально-революционной армии аспект обучения и инструктажа часто упускается из виду в армиях милитаристов. Однако, поскольку Чжу Дэ предписывает систематический подход к своим офицерам и солдатам, он начал выступать за принятие недавно разработанных западных доктрин и систем. Его методичный, ориентированный на детали подход к военной подготовке и обучению был очевиден в директивах, которые он издавал для армии: «Как оценивать офицеров и солдат», «Как отбирать и обучать новобранцев», «Как улучшить физическую подготовку и меткость» и других.\n\nОднако одна директива, вызывающая особое недовольство, — это «Как определять потенциальные назначения», в которой Чжу разработал систему тестирования и оценки офицеров и солдат для повышения по службе, определения их ролей в вооруженных силах и одобрения их переводов. Наряду с внедрением формальной системы образования для офицеров и солдат и назначенных организаций для проведения тестирования с использованием недавно разработанной Дальтон-плана.\n\nУвы, проблемы возникают с серьезным сопротивлением со стороны консервативных командиров в НРА, таких как Цзян Динвэнь, Ли Гэньюань и Гу Чжутун, которые опасаются, что такая директива посягает на их право назначать своих людей. Хотя «молодая гвардия», такие как Чэнь Чэн и паства Тэн Цзе, поддерживают такие идеи, заявляя, что это позволяет процветать меритократии."
 YUN.earlygame.056.a: "Истинная Национально-революционная армия сияет заслугами!"
 YUN.earlygame.056.b: "Знай свое место, Чжу."

 YUN.earlygame.057.t: "Стратегия и тактика новой НРА"
 YUN.earlygame.057.d: "Основываясь на стратегической теории таких людей, как Чжу Дэ, Чэнь И и Тан Хуайюань, новая Национально-революционная армия увидела подавляющий приток внимания к скорости и мобильности как к величайшим активам для обеспечения победы. Что следует избегать боя с более сильными вражескими подразделениями до тех пор, пока условия не станут наиболее благоприятными для начала атаки. Понимая, что подразделения НРА будут высокоприоритетными целями для любой противостоящей силы, командиры выступали за концентрацию подразделений Красной армии в труднопроходимой местности глубоко внутри территории Гоминьдана, чтобы побудить вражеские силы к наступлению.\n\nПоскольку вражеские силы обычно наступают нескоординированно, по разным маршрутам, по труднопроходимой местности и на незнакомой территории, они станут легкой мишенью для внезапной контратаки против изолированных батальонов. На тактическом уровне такая стратегия вызывает необходимость в местных партизанских отрядах вокруг различных деревень, в то время как оперативный уровень требует, чтобы подразделения НРА маневрировали на больших территориях, которые могут охватывать несколько провинций. Новая идея, такие стратегии видели прото-использование в повстанческой зоне Миньгань, доказав там свою эффективность.\n\nОднако оппозиция таким стратегиям многогранна, поскольку она исходит как от гражданских, так и от военных кругов партии. Гражданские кадры опасаются, что такие глубокие вражеские вторжения на территорию Гоминьдана нанесут значительный ущерб экономике, населению и местным учреждениям, в то время как армейские сторонники жесткой линии опасаются, что любые стратегические выгоды будут объявлены недействительными, если собственные подразделения НРА окажутся в окружении."
 YUN.earlygame.057.a: "Интересно, но крайне непрактично."
 YUN.earlygame.057.b: "Это единственный способ победить превосходящего противника!"

 YUN.earlygame.058.t: "Принципы новой НРА"
 YUN.earlygame.058.d: "Излагая свой план реформ для Национально-революционной армии, Чжу Дэ начал формулировать ряд доктринальных принципов для армии в целом. Изложенный в документе, переданном [ROOT.GetLeader], он начинается с цитаты: «Практика, оторванная от теории, подобна блужданию в потемках; теория, оторванная от практики, — бесцельная теория». По словам Чжу, хотя у НРА был большой практический опыт, ей в целом не хватало теоретических знаний тактики. Крайне важно, чтобы армия улучшала свои возможности посредством практики и изучения теории. Излагая принципы, вытекающие из его опыта как в теории, так и в полевых условиях, он начинает:\n\nВо-первых, нужно быть гибким на поле боя и приспосабливаться ко всем переменным.\nВо-вторых, командуя любым количеством войск, вы должны выбрать главное направление атаки, концентрируя там свои максимальные силы для участия в решающем сражении. На других направлениях нужно просто развернуть силы сдерживания.\nВ-третьих, стратегия предполагает обнаружение главной силы противника, в то время как тактика предполагает обнаружение слабых мест. Полная победа — это совокупность многочисленных малых побед.\nВ-четвертых, при координации формирований каждое подразделение должно понимать свою стратегическую задачу и суть решения вышестоящего начальства.\nВ-пятых, основные цели разведки — определить положение противника и местность, но командир все равно должен действовать с неполной информацией, если это необходимо.\nВ-шестых, если силы попали в клещи или окружение, они должны искать широкую внутреннюю дугу для обеспечения легкой маневренности.\n\nОторванные от политических настроений, такие принципы достигли полного согласия среди большинства в высшем командовании, за исключением немногих оставшихся представителей старой гвардии, таких как Ли Гэньюань или Цзинь Ханьдин. Они опасаются, что принципы экспериментирования на столь важном этапе революции слишком рискованны для реализации в данный момент, но признают их заслуги в будущем."
 YUN.earlygame.058.a: "Армия революции, непобедимая!"
 YUN.earlygame.058.b: "Сейчас не время экспериментировать."

 YUN.earlygame.059.t: "Наступательные задачи Партийной армии"
 YUN.earlygame.059.d: "Вслед за изложением Чжу Дэ новых принципов армии, он продолжил дальнейшее оживление и осмысление целей армии. Естественно, начав с наступательных целей. Он вывел, что у НРА есть три непосредственные цели в наступательной стратегии: выживание партии, получение территории и уничтожение вражеских военных сил.\n\nОписывая выживание партии, Чжу уточняет, что он намерен использовать партию и армию как синонимы, ибо без партии нет армии, а без армии нет партии. Указывая, что армию труднее заменить, чем сам [ROOT.Capital.GetCapitalVictoryPointName]. Более того, фундаментальный закон войны сам по себе заключается в уничтожении врага при сохранении себя.\n\nВ получении территории Чжу желает сохранения и расширения географических «базовых районов», контролируемых НРА. Заявляя, что указанные базовые районы должны быть функционально независимы друг от друга, распространяя влияние только в своих локальных областях.\n\nНаконец, что касается уничтожения вражеских военных сил, Чжу уточняет, что это не обязательно означает убийство, скорее устранение вражеской силы как препятствия, как предусмотрено Клаузевицем.\n\nОн столкнулся с серьезным сопротивлением со стороны Вампу еще раз, когда Лю Чжи, Хэ Инцинь и Гу Чжутун жадно боролись даже против самой концепции распространения независимых «базовых районов». Что такие институты снова станут первостепенными для местных полевых командиров."
 YUN.earlygame.059.a: "Эти солдаты будут сражаться за свое выживание, а не за великое дело!"
 YUN.earlygame.059.b: "Независимость подразделений обеспечивает выживание армии."

 YUN.earlygame.060.t: "Оборонительные задачи Партийной армии"
 YUN.earlygame.060.d: "Несмотря на сопротивление, Чжу Дэ продолжил, завершив изложение своих стратегических принципов. Сосредоточившись на этот раз на более оборонительных вопросах, Чжу вывел новый способ ведения войны для Национально-революционной армии.\n\nИзначально следует сосредоточиться на защите либо базовых районов, либо штаба армии от попытки вражеского военного вторжения, с тремя критическими целями для поддержания: сохранение оборонительного района, сохранение военной силы обороны и уничтожение всей или части атакующей силы.\n\nОтступая в оборонительную зону, НРА должна маневрировать на выгодную позицию и дать себе время для подготовки военных активов и концентрации живой силы. Чем дальше преследует враг, тем слабее его линии снабжения и связи и тем ниже его боевой дух. Когда условия оптимальны для контратаки, ее следует проводить немедленно и решительно.\n\nОднако наиболее спорным было то, что Чжу отказался признать концепцию «стратегического пункта», титула, приписываемого городам или памятникам, районам культурного или политического значения. Вместо этого он выступает за максимальный контроль над общим количеством территории в регионе.\n\nЕстественно, такое заявление вызвало обеспокоенность во всей партии и армии, с совместным сопротивлением гражданских, возглавляемых Ян Юнтаем и Сун Цзывэнем, наряду с такими людьми, как Ли Гэньюань, Лю Чжи и Гуань Линьчжэн, все из которых осуждают потерю городов как дестабилизацию экономических интересов. Хотя Чэнь Чэн и его Клика гражданского строительства оказали символическую поддержку прагматизму Чжу Дэ."
 YUN.earlygame.060.a: "Опасная игра, в которую мы не можем позволить себе играть."
 YUN.earlygame.060.b: "Это единственный способ победить превосходящего врага."

 YUN.earlygame.061.t_kmt: "Критика Хэ Инциня по итогам действий"
 YUN.earlygame.061.t_kmtsatellite: "Критика Чжу Пэйдэ по итогам действий"
 YUN.earlygame.061.intro: "Следуя своей реализации конференций по итогам действий среди солдат и офицеров, Чжу Дэ председательствовал на недавно состоявшемся спорном собрании, где большая часть обсуждения основывалась на эффективности и способностях недавних генералиссимусов как в полевых, так и в политических вопросах.\n\n"
 YUN.earlygame.061.d_kmt: "$YUN.earlygame.061.intro$Что касается Хэ Инциня, Чжу Дэ указал на довольно медленное продвижение и успехи 1-й армии Хэ Инциня во время первоначального этапа Северного похода, что привело к ограниченному развитию партийного контроля в провинции Чжэцзян. Кроме того, после захвата немцами Гуанчжоу и перенаправления 1-й армии Хэ Инциня на юг для начала их обреченной двухнедельной контратаки, Чжу поднял критический недостаток плохой подготовки Хэ к осаде города.\n\nВ гораздо более язвительной критике Чжу проводит параллели между Хэ Инцинем и покойным генералиссимусом Чан Кайши. Тот факт, что, несмотря на то, что он якобы был доверенным лицом и близким другом Чана, он все же поддержал попытку сместить генералиссимуса в 1926 году, и даже сейчас не обладает таким же обаянием и масштабом контроля над НРА, как его предшественник.\n\nПотрясенный тем, что он считает грубой, мелочной насмешкой над тем, к чему должен стремиться хороший солдат, Хэ Инцинь в ответ перешел в наступление. Обвиняя Чжу Дэ в политизации армии, подвергании ее влиянию синдикалистов и в том, что он обязан таким бесхребетным людям, как Ван Цзинвэй."
 YUN.earlygame.061.d_kmtsatellite: "$YUN.earlygame.061.intro$Хотя «Два Чжу», как их называли в Куньмине, давно разделяли общее братство и даже дружбу, Чжу Дэ тем не менее был весьма критичен к своему начальнику. Обвиняемый в многочисленных поражениях в свете наступающих армий Южных Чжили Сунь Чуаньфана во время Северного похода, Чжу Дэ еще больше подкосил репутацию своего друга, выдвинув обвинения в некомпетентности в решении политических вопросов и в контроле разрозненных фракций Национально-революционной армии. В основном, отчасти, из-за того, что Чжу Пэйдэ де-юре был самым высокопоставленным генералом и главой Национально-революционной армии в Гуйчжоу, но очевидно, что его влияние распространялось только на часть его собственной 3-й армии. Разделяя свое положение с такими людьми, как Хэ Инцинь, Ли Цзунжэнь, Чэн Цянь и Тань Янькай.\n\nРешительная и непоколебимая критика со стороны собственного одноклассника и друга разрушила ту малую веру, которую Чжу Пэйдэ продолжал сохранять в дружеских отношениях между двумя командирами. Выдвигая собственную критику Чжу Дэ, он критиковал отсутствие помощи со стороны последнего во время Северного похода, его постоянные требования считаться «преемником» Цай Э и его постоянную ассоциацию в качестве главаря левых внутри юньнаньского Гоминьдана."
 YUN.earlygame.061.a: "В его словах есть доля правды."
 YUN.earlygame.061.b: "Это наглая политика!"

###- Early Game Economic Events -###

 YUN.earlygame.200.t: "Ответ Берлина"
 YUN.earlygame.200.d: "В закатные десятилетия династии Цин большая часть страны была поделена на экономические сферы. Точно так же, как Северо-Восток был поставлен под российское, а затем японское влияние, Юньнань была включена во французскую сферу. Когда династия Цин наконец пала и началась эра милитаристов, множество разных милитаристов искали разных иностранных покровителей. Дуань Цижуй и Аньхойская клика развивали отношения с японцами и почти полностью зависели от финансов и военной помощи Токио.\n\nСтарый маршал в Шэньяне также обратился к японцам, но его мощная экономическая база давала ему свободу обращаться к множеству благодетелей. Юньнань под руководством Цай Э предприняла согласованные усилия по милитаризации в стремлении к объединению военными средствами, но географическое положение Юньнани диктовало, что военные амбиции провинции будут зависеть от милости Парижа, единственного поставщика оружия Куньмина. Когда Французская Республика пала в результате революции и немцы захватили Французский Индокитай, Берлин заменил экономическое господство Парижа над Юньнанью своим собственным, а также занял позицию единственного поставщика оружия Куньмина.\n\nС тех пор как китайская политика Берлина приблизила Пекин к немецким интересам, поставки оружия Тану становились все реже и реже, чтобы сдерживать армию Юньнани. Помимо амбиций Тана, отсутствие полицейского контроля за вьетнамскими бандитами в Юньнани также было не в пользу Берлина. Однако с крахом гегемонии Чжили интересы Германии в Китае находятся под большой угрозой, и губернатор Тан всегда мог успокоить опасения Берлина, пообещав использовать поставки оружия для борьбы с бандитизмом и поддержания немецкого порядка в Юго-Западном Китае..."
 YUN.earlygame.200.a: "Не могу поверить, что это сработало!"

 YUN.earlygame.201.t: "Олово и рельсы"
 YUN.earlygame.201.d: "Хотя Юньнань остается бедной, отсталой и сельскохозяйственной, провинция невероятно богата природными ресурсами. Когда французы колонизировали юго-западный Китай, они немедленно начали открывать Юньнань для коммерциализации. Города Мэнцзы, Маньхао и Лунчжоу были основаны в Юньнани и Гуанси. После японо-китайской войны французы обеспечили аренду Гуанчжоуваня на 99 лет, а также больше прав на железные дороги и добычу полезных ископаемых. Французский построили железную дорогу Куньмин — Хайфон, также известную как «Железная дорога Дянь-Юэ».\n\nЭта железная дорога, поддерживая модернистскую повестку Парижа, значительно увеличила перевозки между Французским Индокитаем и Куньмином, а участок железной дороги от Гэцзю до Цзицзе стал самой прибыльной частью дороги и значительно увеличил французский экспорт. До ее строительства экспорт Гэцзю никогда не превышал четырех тысяч тонн, но начиная с двух лет после строительства железной дороги и вплоть до Французской революции, Гэцзю экспортировал более десяти тысяч тонн ежегодно. Независимо от экспортных доходов, железная дорога не была особенно прибыльной, но преимущества, которые она предоставляла, делали ее стоящим предприятием для Парижа.\n\nДо строительства железной дороги французы полагались на посредников и перекупщиков в торговле оловом, но железная дорога сделала их ненужными и доставляла все коммерческие выгоды непосредственно Индокитайской колониальной администрации. В то время как Индокитайская колониальная администрация Германии была менее успешна в консолидации контроля, Берлин сохранил полный контроль над Железной дорогой Дянь-Юэ и поддерживает тот же уровень интереса к добыче ресурсов, что и Париж. Хотя будущее направление Юньнани весьма спорно, существует полное согласие в том, что иностранное экономическое господство Германии должно быть сломлено."
 YUN.earlygame.201.a: "Однажды мы станем свободными..."

 YUN.earlygame.202.t: "История финансовых трудностей"
 YUN.earlygame.202.d: "Юньнань, даже никогда не будучи особенно богатой и процветающей, была опустошена без передышки в XIX веке. В 1855 году бубонная чума, которая дважды опустошала мир до этого, поразила провинцию Юньнань на 15 лет, убив миллионы. Вскоре после этого провинция Юньнань была охвачена восстанием Ду Вэньсю под руководством хуэйцзу, в котором погибло миллион человек с обеих сторон. Падение численности населения привело к падению добычи полезных ископаемых, что, в свою очередь, вызвало девальвацию валюты, что привело к разгулу бандитизма. Напряженность между ханьцами и хуэйцзу оставалась высокой после восстания хуэйцзу, а также недоверие к иностранцам из-за британской поддержки Ду Вэньсю. Антииностранные настроения привели к смерти британского подданного, возможно, по приказу провинциального правительства, что спровоцировало британцев на пересмотр Тяньцзиньского договора 1858 года.\n\nНовый договор позволил Лондону увеличить торговлю из Бирмы в Юньнань и арендовать определенные приграничные регионы, что еще больше разожгло антииностранные настроения. Когда французы начали продвигаться во Вьетнам, вьетнамское правительство наняло китайских наемников для борьбы с французами. 50 тысяч китайских солдат вошли во Вьетнам, чтобы противостоять французам, но Париж все равно обеспечил контроль над регионом. Британцы и французы создали синдикат для контроля прав на добычу полезных ископаемых в Мэнцзы, который существовал до Французской и Британской революций и попал в руки AOG. Прошло почти столетие с тех пор, как бубонная чума опустошила Юньнань, но провинция остается неисцеленной."
 YUN.earlygame.202.a: "История страданий слишком обычна для Китая."

 YUN.earlygame.203.t: "Возвращение экономической самостоятельности"
 YUN.earlygame.203.d: "С момента Синьхайской революции экономическая реформа единодушно провозглашалась главной целью правительства провинции Юньнань. Однако путь к экономической реформе остается опасным и полным предательства. Последний цинский наместник региона Юнь-Гуй Ли Цзинси пытался оживить юньнаньскую горнодобывающую промышленность и восстановить юньнаньскую промышленность, но в процессе оттолкнул дворянство. Дворянство заставило Ли сократить государственные расходы и ограничило его реформы Куньмином и Мэнцзы.\n\nБывшие подчиненные Ли Цзинси, Цай Э и Тан Цзияо, унаследовали наследие и повестку Ли после Синьхайской революции, но столкнулись со многими из тех же проблем. Консервативные элиты и слабые потоки доходов постоянно мешали губернаторству, а программа милитаризации Цай Э только усугубила проблемы. Тем не менее, амбиции экономического развития остаются сильными и по сей день, и администрация [ROOT.GetLeader] надеется, что Экономическая комиссия Юньнани преуспеет там, где предыдущие реформы потерпели неудачу.\n\nШироко понимается, что на юго-западе требуется серьезное экономическое вмешательство, поскольку стимулирование иностранцев строить заводы, а затем реинжиниринг западных технологий, как это делается в Восточном Китае, неосуществимо. Непосредственными пятью задачами Экономической комиссии являются развитие хлопкопрядения и ткачества, гидроэлектроэнергетики, производства цемента, легкого машиностроения и критически важные инвестиции. Хотя на данный момент это лишь амбициозные цели, есть надежда, что, возможно, век раздоров в Юньнани наконец подходит к концу."
 YUN.earlygame.203.a: "Удачи Экономической комиссии."

##Section 2c (400-599): Early Game KMT Political Events
 YUN.earlygame.400.t: "Националистическая хунта на Юго-Западе"
 YUN.earlygame.400.d: "Сразу после переворота против Тан Цзияо Гоминьдан не терял времени даром, обосновавшись в Куньмине. В то время как Чжу Пэйдэ занял пост губернатора (примечание: Гоминьдан называл руководителей провинций председателями, но для простоты они в дальнейшем будут именоваться губернаторами), Хэ Инцинь, Лун Юнь и Ху Жоюй также обладают существенной властью в администрации. Хотя Гоминьдан является доминирующей силой в Юньнани, Чжу Пэйдэ признал необходимость объединения местных влиятельных игроков в провинции, включая дворянство. Однако не все благополучно для зарождающейся юньнаньской националистической хунты. Студенческие радикальные группы, которые поначалу с энтузиазмом восприняли захват власти Гоминьданом, оказались глубоко разочарованы этой умеренной позицией.\n\nПо иронии судьбы студенческие группы оказались в сотрудничестве с лояльными остатками Тан Цзияо в противодействии новой администрации Куньмина. Антигоминьдановская агитация была такова, что Торговая палата сообщила о нескольких случаях беспорядков. Помимо маргинализированных групп вне правительства, Чжу Пэйдэ находит оппозицию и внутри своего правительства. Лун Юнь, будучи инициатором переворота против Тана, надеется, что правление Гоминьдана в Юньнани лишь временно, так как амбиции Гоминьдана лежат в Гуандуне, родине Национальной революции.\n\nХу Жоюй, хотя и гораздо более сговорчивый к захвату власти Гоминьданом, имеет схожие взгляды и амбиции прибрать провинцию к рукам. Однако 3-я армия НРА, которую возглавляет Чжу Пэйдэ, демонстрирует существенные регионалистские настроения, предпочитая консолидировать контроль националистов над Юньнанью. С другой стороны, Хэ Инцинь и 1-я армия НРА настойчиво выступают за военную кампанию на запад для восстановления присутствия националистов в Гуанчжоу. Для них Юньнань — лишь ступенька к истинной базе Гоминьдана. Если Чжу Пэйдэ хочет хорошо управлять Юньнанью, ему придется сбалансировать конкурирующие интересы своих подчиненных или пасть, как Тан Цзияо."
 YUN.earlygame.400.a: "Консолидация Юньнани — главная забота Гоминьдана!"
 YUN.earlygame.400.b: "Одна Юньнань не может удовлетворить амбиции Гоминьдана, Гуанчжоу должен быть обеспечен!"

 YUN.earlygame.4000.t: "Силы Гоминьдана вторгаются в Юньнань!"
 YUN.earlygame.4000.d: "В конце Северного похода остатки Национально-революционной армии Гоминьдана предприняли «Великий поход» на запад в Гуйчжоу. Списанные со счетов как обреченная попытка кликой Чжили, они были оставлены, чтобы в конечном итоге быть поглощенными соседними кликами милитаристов. Они ошибались. Милитарист клики Юньнань Тан Цзияо попытался начать вторжение в Гуйчжоу, но был полностью разгромлен, и его собственные генералы предали его.\n\nЧжу Пэйдэ, лидер хунты Гоминьдана, был поставлен губернатором Юньнани при неохотной поддержке провинциального дворянства. Но мало кто верит, что Гоминьдан удовлетворится лишь двумя провинциями."
 YUN.earlygame.4000.a: "Революция возобновилась на Юго-Западе!"
 YUN.earlygame.4000.b: "Юго-Запад пал перед революцией..."

 YUN.earlygame.401.t: "Наследие Гоминьдана в Юньнани"
 YUN.earlygame.401.d: "Корни Гоминьдана в Юньнани уходят так же далеко, как и существование самой партии. Один из ведущих организаторов Тунмэнхуэя, Ли Гэньюань, стал инспектором Военной академии Куньмина в 1909 году. Когда произошло Учанское восстание, Ли Гэньюань работал с Цай Э и Тан Цзияо, чтобы организовать аналогичное восстание в Юньнани и объявить о революции. Ли провел 1910-е годы, противодействуя Юань Шикаю, и работал с Цэнь Чуньсюанем, чтобы сформировать Старую клику политической науки. Старая клика политической науки, которая была посвящена налаживанию отношений между Пекином и Гуанчжоу, оказалась в оппозиции к Сунь Ятсену, Тан Цзияо и Чэнь Цзюнмину.\n\nОднако Тан оттолкнул протеже Ли Гэньюаня Гу Пиньчжэня, отдавая предпочтение своему брату Тан Цзию, что побудило Гу заставить Тан Цзияо уйти с поста губернатора. Когда Тан готовился вернуться, его союзники Ли Лецзюнь и Чжу Пэйдэ порвали с ним. Пока Тан и Гу сражались, Сунь планировал, чтобы Цзинь Ханьдин захватил Юньнань, но это закончилось неудачей, и Тан вернул себе Юньнань. Юньнаньский Гоминьдан после смерти Гу был изгнан в Гуанчжоу и объединился в 3-ю армию, причем армии Цзинь Ханьдина и Фань Шишэна были интегрированы в 3-ю армию в 30-х годах.\n\nВсе они, имея разные корни — Чжу Пэйдэ, Фань Шишэн, Цзинь Ханьдин и восходящая звезда Чжу Дэ, — в результате демонстрируют большое политическое разнообразие. Фань Шишэн и Цзинь Ханьдин считаются не особенно идеологизированными. Контингент Чжу Дэ в 3-й армии проявляет социалистические тенденции. Сам Чжу Пэйдэ оказывается очень близким к Старым правым. Таким образом, решение Чжу вернуть Ли Гэньюаня в Юньнань по просьбе Фаня, Цзиня и Чжан Цюня, по всей вероятности, будет чрезвычайно спорным решением, так как последний предал Суня все эти годы назад. Хэ Инцинь и Вампу уже ясно выразили свое недовольство генералиссимусу."
 YUN.earlygame.401.a: "Ли, очевидно, искупил свои ошибки, он наш союзник!"
 YUN.earlygame.401.b: "Его предательство Отца нации не может быть забыто..."

 YUN.earlygame.402.t: "Злоба в победе"
 YUN.earlygame.402.d: "Поскольку Гоминьдан в значительной степени уладил свои дела в Куньмине, генералиссимус теперь обращает свое внимание на юньнаньскую бюрократию. Различные бюро по всей Юньнани, несомненно, имеют некоторую привязанность к своему старому губернатору, факт, который Чжу Пэйдэ было бы глупо игнорировать. Увольнять их было бы еще более тревожно. Хотя Ху Жоюй и Лун Юнь привели Национальную революцию в Куньмин, они в значительной степени ожидают продолжения статус-кво. Политическая история Юньнани всегда была несколько более стабильной, чем у ее северных соседей, и всегда существовала непрерывная линия реформизма, проводимая ее губернаторами.\n\nПосле того как наместник Ли Цзинси был свергнут Синьхайской революцией, Цай Э и Тан Цзияо сохранили политическую повестку Ли, хотя и с более милитаристским уклоном. Были созданы различные бюро во имя сбора налогов, экономического развития и конституционализма. Гоминьдан исторически был силой, базирующейся в Гуандуне, и не происходит из политических традиций Юньнани. Для Лун Юня и Ху Жоюя сохранение юньнаньской бюрократии еще более важно из-за ее влияния на армию. Армия Юньнани долгое время была бюрократическим институтом, где каждая армия была связана не просто лояльностью, но и тем фактом, что приказы поступали сверху во имя всего института.\n\nВласть была не в личности, а в должности, а должности представляли собой иерархическую пирамиду. Однако революционная повестка Гоминьдана не обязательно совместима с бюрократической традицией Юньнани. Для радикалов Гоминьдана бюрократия Юньнани — это беспорядочная смесь интересов дворянства и милитаризма. Ху Жоюй взял на себя задачу обратиться к Чжу Пэйдэ с просьбой найти компромисс, который сохранит бюрократическую машину Юньнани, уже связавшись с Чжу Дэ, Фань Шишэном и Цзинь Ханьдином, надеясь на уважение Чжу к Цай Э и более аполитичный взгляд двух других."
 YUN.earlygame.402.a: "Бюрократия Юньнани теперь будет служить Национальной революции."
 YUN.earlygame.402.b: "Национальная революция не будет использовать игрушки милитаристов!"

 YUN.earlygame.403.t: "Последний рубеж Вампу"
 YUN.earlygame.403.d: "Хотя Сунь добился успеха в распространении дела Тунмэнхуэя по всему Южному Китаю во время Синьхайской революции, расхождение интересов заставило многих отвернуться от его призыва ко Второй революции. Те, кто остался, сформировали ядро внутреннего круга Суня. Когда Сунь вернулся в Гуанчжоу, он провел годы, имея дело со своенравными союзниками и оппортунистическими милитаристами, которые предавали его дело за грош. Циничный из-за предательств и отсутствия западной поддержки, Сунь стал искать союза с синдикалистскими державами, и Миссия Интернационала помогла Суню реорганизовать Гоминьдан в дисциплинированную революционную партию.\n\nВ военном плане Суню требовалась преданная армия, посвященная его идеологическим целям и ставящая партию превыше всего, и поэтому он создал Академию Вампу. Сунь выбрал своего самого преданного ученика, Чан Кайши, директором для обучения первого поколения офицеров Вампу. Принеся учения Академии Баодин и Императорской японской армейской академии, Чан и его старый одноклассник Хэ Инцинь прививали кадетам Вампу каждый аспект ведения войны и основную идеологическую цель Национальной революции и догматы Трех народных принципов.\n\nКлика Вампу привела Чан Кайши к известности в Гоминьдане и добилась многих побед в Северном походе, но сильно пострадала, когда немецкие и чжилийские силы обрушились на них со всех сторон, и их любимый директор был убит. Хэ Инцинь привел свою часть остатков Вампу в 1-й армии в Гуйчжоу, где находятся одни из самых идеологически настроенных офицеров в НРА. Хотя на данный момент это всего лишь разношерстная сила, было бы ошибкой сравнивать их с другими остаточными армиями милитаристов, на что Клика Вампу быстро бы указала."
 YUN.earlygame.403.a: "Интересы Клики Вампу должны уважаться..."
 YUN.earlygame.403.b: "Какая претенциозная группировка морализирующих дружков..."

 YUN.earlygame.404.t: "Революционеры из Чжэцзяна"
 YUN.earlygame.404.d: "К 1900-м годам Зеленая банда контролировала всю преступную деятельность в Шанхае. Зеленая банда стала сотрудничать с Гоминьданом, когда Чэнь Цимэй присоединился к ним в 1908 году. За несколько лет до этого Чэнь работал в Японии на Сунь Ятсена и встретил земляков из Чжэцзяна Чан Кайши и Дай Цзитао. Во время Синьхайской революции Дай, Чан и Чэнь участвовали в Шанхайском восстании. Чан, Чэнь и Дай действовали в Шанхае и сформировали Общество революционных товарищей Чжэцзяна. Трио бежало в Японию после провала Второй революции Суня и произвело впечатление на Суня как одни из немногих революционеров, которые принесли ему клятву верности.\n\nВ 1916 году Чэнь был убит Чжан Цзунчаном. Впоследствии Чан наставлял племянника Чэнь Цимэя Чэнь Гофу, чтобы почтить его память. Общество революционных товарищей Чжэцзяна возобновило свою деятельность в Шанхае после смерти Юань Шикая, часто сотрудничая с Зеленой бандой, включая создание нелегальных фондовых бирж. Чан проводил много времени с акциями, пока не потерял небольшое состояние, в то время как Дай пылко писал в газетах. В 1924 году Сунь признал верность Чана и сделал его директором Военной академии Вампу. После смерти Суня в 1925 году Чан стал одной из ведущих фигур в Гоминьдане наряду с Ван Цзинвэем.\n\nДай Цзитао и братья Чэнь также поднялись на высокие посты и вместе с выпускниками Вампу из Чжэцзяна сформировали ядро внутреннего круга Чана. Восстание Общества революционных товарищей Чжэцзяна в Гоминьдане было прервано смертью Чан Кайши, и большая часть его обширного круга соратников и сетей рухнула. Дай Цзитао и братья Чэнь бежали в Шанхай в хаосе краха НРА и продолжали свою прежнюю деятельность в Шанхае в подполье до тех пор, пока Гоминьдан не захватил Юньнань. Хотя Дай и братья Чэнь теперь работают в Куньмине, они поддерживают свои связи с Зеленой бандой, а также свои менее пристойные деловые операции, такие как нелегальная фондовая биржа."
 YUN.earlygame.404.a: "Зеленая банда остается верным союзником Национальной революции!"
 YUN.earlygame.404.b: "Вы никогда не найдете более презренного улья подонков и злодейства, чем в Шанхае..."

##Section 2d (600-799): Early Game UPC Political Events
 YUN.earlygame.600.t: "Федералистский форпост на Юго-Западе"
 YUN.earlygame.600.d: "Армия Юньнани захватила Гуйчжоу, обезопасив северный фланг Тана. Дорога на Гуанчжоу открыта, но Тану все еще нужно убедить свой народ отправиться в военную авантюру, более опасную, чем Гуйчжоу.\n\nВ 1918 году Тан Цзияо предложил провинциальному собранию конфедерацию между Юньнанью, Сычуанью и Гуйчжоу. На пышной церемонии в Чунцине он принял командование Союзной армией семи провинций, номинально также включавшей Гуандун, Гуанси, Сычуань, Хунань и Шаньси. Его попытка Северного похода была сорвана внутренними распрями, поскольку власть постепенно переходила от Куньмина к Гуанчжоу. Финансирование закончилось, заставив их полагаться на опиум и бандитизм. Недовольство против «гостевых армий» Юньнани росло, пока в 1920 году коалиция сычуаньских милитаристов при поддержке Гуанчжоу не восстала. Сам Тан Цзияо был свергнут своими отступающими частями в ходе переворота Гу Пиньчжэня, поддержанного Гуанчжоу, что продемонстрировало, как поражение за границей может быстро отозваться дома.\n\nПосле возвращения Тана к власти в 1922 году он отдал приоритет внутренней стабильности перед «экспортным милитаризмом», проведя чистку среди своих получивших образование в Японии коллег, таких как Гу Пиньчжэнь, Ло Пэйцзинь и Хэ Гоцзюнь. Оснащение гордой армии Юньнани заржавело, жалование было урезано, и она была передана под командование брата Тана, Тан Цзию, чья преданность не вызывала сомнений, но компетентность была под вопросом. Тем не менее, Тан смог создать бюрократическую, а не основанную на личности армейскую иерархию, и перераспределить финансирование на гражданское развитие.\n\nМарш Тана на Гуанчжоу в 1925 году также оказался безумством — уничтоженным разобщенными кланами Гуанси еще до того, как они смогли добраться до Гуандуна. Помимо военных неудач, это был тяжелый урок современных китайских политических тенденций. Тан не смог сообщить, намерен ли он объединиться со своими изгнанными соперниками из армии Юньнани или уничтожить их, что привело к их враждебности или нейтралитету. Его дисциплинированная, но регионалистская армия Юньнани не могла сравниться с радикализованными армиями милитаристов, связанными с Гоминьданом. Вернувшись домой побежденным, он столкнулся с еще одним переворотом. Если все должно закончиться иначе..."
 YUN.earlygame.600.a: "...Нам понадобится собственная идеологическая коалиция."
 YUN.earlygame.600.b: "...Тану нужно будет укрепить свою власть."

 YUN.earlygame.601.t: "Юньнаньские силы штурмуют Гуйчжоу"
 YUN.earlygame.601.d: "Клика Юньнань когда-то была главной силой на юге, возглавляя революционеров против монархии Юань Шикая в Войне в защиту республики и играя ключевую роль в Войне в защиту конституции. Сокрушительные поражения от правительств, связанных как с Бэйяном, так и с Гуанчжоу, заставили их уйти в изоляцию, выжидая своего часа.\n\nТеперь, видя благоприятные ветры, губернатор Тан Цзияо повел свои войска в бой, уничтожив остатки Гоминьдана, укрывшиеся в Гуйчжоу. Очевидно, что его амбиции на этом не заканчиваются: с обеспеченным северным флангом ясно, что его следующие шаги будут общенациональными."
 YUN.earlygame.601.a: "Юго-западный союзник в нашем стремлении к китайской федерации?"
 YUN.earlygame.601.b: "С юго-запада возвращается недостойный протеже Цай Э..."

 YUN.earlygame.602.t: "Чжан Тайянь, икона федерализма"
 YUN.earlygame.602.d: "В Куньмине проживает Чжан Тайянь, ученый, также известный как Чжан Бинлинь. Престарелый интеллектуал-федералист, он реликт Синьхайской революции, получивший известность в деле о подстрекательстве Су Бао в 1906 году, когда он был заключен в тюрьму совместным судом Цин и Шанхайской концессии на три года.\n\nЕго работа в качестве антиманьчжурского писателя и его вера в так называемую «Национальную сущность» вдохновили «Юньнаньский сборник», газету, которая вдохновила многих молодых юньнаньских революционеров. Его «Юньнаньская сущность» (Дянь Цуй) включала биографии многих гражданских и военных лидеров Юго-Западного Китая, которые сопротивлялись контролю Цин на протяжении многих лет, продвигая веру в то, что Юньнань обладает уникальной, героической региональной идентичностью. Он также отстаивал девять реформистских «идей»: нация, солидарность, общественный дух, прогресс, презрение к опасности, почитание военных, промышленность, местное самоуправление и качество мужчин и женщин.\n\nЧжан Тайянь продолжал оставаться чрезвычайно уважаемым государственным деятелем в 1920-х годах, особенно в кругах федералистов. Тан Цзияо и другие в Юньнани были увлечены его продвижением региональной автономии для провинций, которые затем объединились бы, чтобы стать достаточно сильными для сопротивления иностранному вторжению. Хотя сам Чжан признавал, что его более радикальные идеи могут быть слишком утопичными, чтобы быть практичными, он продолжает оставаться влиятельным интеллектуалом.\n\nИзначально базировавшийся в Сучжоу и участник правительства Сунь Чуаньфана, он разочаровался в авторитаризме Суня и отказе порвать с централизмом Чжили. В 1932 году он впал в немилость у Суня и был вынужден бежать из Лиги вообще. Он нашел убежище во владениях Тана, несколько опозоренный вместе с более широким движением федералистов после того, как Чжили успешно объединили Китай. Тан и Чжан сумели несколько поправить свое положение благодаря слиянию Объединенной партии самоуправления Чжана с ослабевающей Партией народного управления Тана."
 YUN.earlygame.602.a: "Благодаря идеализму Чжана, федерализм обретает надежду!"
 YUN.earlygame.602.b: "Благодаря лидерству Тана, федерализм возрождается."

 YUN.earlygame.603.t: "Управление регионалистами"
 YUN.earlygame.603.d: "Дворянство и торговцы являются важными столпами власти практически во всех провинциях Китая, и Юньнань не исключение. После восстаний середины 1800-х годов дворянство взяло на себя ведущую роль в восстановлении провинции, что позволило им взять под контроль администрацию, финансы и горнодобывающие/торговые сети Юньнани.\n\nЭта власть позволила им доминировать в местных собраниях, которые они использовали для борьбы как с бюрократией центрального правительства, так и с эксплуатацией иностранных корпораций. Их контроль над местной политикой и экономикой сделал их мощной силой как реформ, так и реакции: реформы Ли Цзинси 1911 года были сорваны везде за пределами Куньмина и Мэнцзы из-за опасений дворянства по поводу дефицита. Примерно в то же время их недовольство британской оккупацией Пяньмы позволило им организовать Баоцзехуэй (Общество защиты территории), массовые бойкоты против британцев и призвать к революции против слабого центрального правительства, что привело к тому, что многие члены Баоцзехуэй присоединились к революционному Тунмэнхуэю.\n\nЭто перетягивание каната между реформой и реакцией, а также регионализмом и национализмом продолжается и сегодня. Юньнаньское дворянство и торговцы неохотно поддерживают значительные реформы, которые изменили бы баланс сил в сельской местности, но настаивают на некоторой форме конституционализма и элитарной демократии в форме провинциального собрания. Они враждебно относятся к перспективе войны и социально-экономическим потрясениям, которые она влечет за собой, но также стремятся к объединению страны на патриотических основаниях. Тем не менее, в этом объединении они желают значительной региональной автономии, которую ни одно центральное правительство, похоже, не желает давать. Потребуется много убеждений, чтобы заручиться их поддержкой в войне за объединение."
 YUN.earlygame.603.a: "Это наш национальный долг — освободить наших соотечественников!"
 YUN.earlygame.603.b: "Мы сражаемся, чтобы защитить наше право на самоуправление!"

 YUN.earlygame.604.t: "Фазы Полумесяца"
 YUN.earlygame.604.d: "Угасающее Общество полумесяца можно найти преподающим в университетах Куньмина. Основанное в 1923 году Сюй Чжимо как модный интеллектуальный социальный клуб высшего среднего класса с общим интересом к драматическому театру, свободное собрание друзей привлекло либеральных ученых, таких как Ху Ши и Чжан Цзюньмай, и быстро стало соперником ориентированной на реализм Литературной ассоциации и ориентированного на романтизм Общества творчества. Они заняли среднюю позицию среди иконоборчества Новой культуры, выступая за переоценку китайской традиции при рациональной оценке западной культуры.\n\nЛо Лунцзи, Вэнь Идо, Лян Шицю и Литературное общество Цинхуа вскоре присоединились к орбите Общества полумесяца и вместе стали мишенью для своих врагов в социалистической Лиге левых писателей (преемниках Общества творчества). Поскольку Общество становилось все более политическим и к нему присоединялись неинтеллектуалы, Сюй стал недоволен его «невыносимым мелкобуржуазным душком» и распустил клуб в суматохе 1927 года.\n\nТем не менее, они снова собрались в Шанхае, открыв книжный магазин. Не довольствуясь больше разговорами только о литературе, но и о политике на фоне растущих перспектив объединения, они начали издавать ежемесячник «Полумесяц». Его название произошло от сборника стихов «Полумесяц» индийского борца за независимость Рабиндраната Тагора, которым Сюй восхищался, заявляя, что «хотя это и не такой мощный символ, кажущийся хрупким полумесяц подразумевает и охватывает полную надежду на будущее».\n\nЕго политический поворот разделил членство, но набрал обороты во время либерализации Чжили. Безвременная смерть Сюй Чжимо в 1931 году в авиакатастрофе (многие считают, что он был убит) погрузила общество в траур, а жесткое подавление Лигой в следующем году заставило Ху Ши и фракцию Пекинского университета вернуться на север. Ло Лунцзи и фракция Университета Цинхуа искали большей интеллектуальной свободы на юге, найдя должности в Юньнани, где они продолжают публиковаться. При некотором финансировании, возможно, Полумесяц может снова взойти."
 YUN.earlygame.604.a: "Тан ценит их охват по всей стране."
 YUN.earlygame.604.b: "Они представляют надежду на демократическое будущее."

 YUN.earlygame.605.t: "Истинный правитель Гуйчжоу"
 YUN.earlygame.605.d: "Гуйчжоу (или, по крайней мере, его западная часть) была обеспечена, ценный приз в усилиях Тан Цзияо по восстановлению своей юго-западной империи. В предыдущих кампаниях губернатора в Гуйчжоу он помогал реформистской Ассоциации по подготовке конституции, поддерживаемой высшим дворянством, против революционного Общества самоуправления, поддерживаемого низшим дворянством.\n\nЭтот крюк в Гуйчжоу, вопреки приказам Цай Э наступать в Сычуань, навсегда изменил ход карьеры Тана. Это положило начало расколу между ним и Сунь Ятсеном, который пришел на помощь изгнанной «Группе гнева на несправедливость» (Юаньфэньтуань), а пребывание его брата Тан Цзию в качестве его де-факто военного префекта в Гуйчжоу способствовало не только их поражению в Юньнань-Гуансийской войне (Тан Цзию обвиняли в том, что он не смог вовремя помочь Лун Юню из-за своих коррумпированных сделок с опиумом), но и перевороту Ху Жоюя вскоре после этого.\n\nГуйчжоу при конституционалистах управлялась Лю Сяньши, патриархом Клики Лю, который доминировал в провинции в 1920-х годах, но был вытеснен Юань Цзумином, а затем силами изгнанников Гоминьдана. Он умер в изгнании в Куньмине в 1927 году, так и не увидев снова свою родную провинцию.\n\nЕго родственники, однако, поспешили последовать за армией Юньнани в Гуйчжоу. Его двоюродный брат, генерал Лю Сяньцянь, попытался занять пост губернатора, но это было оспорено его племянником Лю Гунляном, который, как говорили, был де-факто губернатором в последние дни своего пожилого дяди. Другие члены семьи Лю, такие как Лю Шэнчан и Лю Синьу (оба военные офицеры), а также соратники семьи, такие как И Жунцянь (милитарист, ставший филантропом и бизнесменом), заняли стороны в этом вопросе.\n\nТан Цзию также вернулся в Гуйчжоу, что стало источником разногласий, учитывая его репутацию. Однако, возможно, к лучшему, что он остается там: помимо того, что он держит провинцию под контролем Тана, это также держит его подальше от Юньнани, где офицеры губернатора его еще больше ненавидят."
 YUN.earlygame.605.a: "Лю Сяньцянь объединяет клан Лю против внешнего вмешательства."
 YUN.earlygame.605.b: "Тан Цзию помогает установить Лю Гунляна губернатором."

##Section 2e (800-999): Early Game NPA Political Events

#Yunnan-Guangxi War Setup Events (800-809)
 YUN.earlygame.800.t: "Дорога на Кантон"
 YUN.earlygame.800.d: "Отношения Юньнани с Лянгуаном («Два Гуана» — Гуандун и Гуанси) в постсиньхайскую эпоху были сложными. Три провинции объединились во время Войны в защиту республики вместе с Гуйчжоу и Сычуанью (тогда под господством Юньнани), Шэньси, Хунанью и Чжэцзяном. Этот Юго-западный альянс продолжился в Войне в защиту конституции, где Юньнань и ее сателлиты Сычуань и Гуйчжоу оказались на одной стороне с Гуанси и Гуандуном.\n\nНо напряженность с годами медленно росла, поскольку Юньнань оказывалась оттесненной Лянгуаном. Рост Клики политической науки после того, как армия Юньнани была изгнана из Сычуани, означал, что Юньнань оказалась на вторых ролях по сравнению с Гуанчжоу (также известным как Кантон), а после того, как Тан Цзияо смог вернуть власть в Юньнани, он оказался в конфликте с Гуандуном, где доминировал Гоминьдан. Гоминьдан утверждал, что Тан поддерживал Чэнь Цзюнмина против Суня в федералистском альянсе, и когда Сунь умер в 1925 году, Тан принял роковое решение идти на Гуандун в надежде претендовать на южное лидерство для себя. Однако он не учел упорства кланов Гуанси, сидящих между Куньмином и Гуанчжоу. Силы Юньнани были разбиты задолго до того, как смогли достичь своей цели, что серьезно дестабилизировало правление Тана.\n\nЮньнань оставалась в основном нейтральной во время Северного похода, в то время как Гуйчжоу оказался в слабом союзе с Гоминьданом, прежде чем в конечном итоге разделиться в конце конфликта между про-бэйянским правительством Юань Цзумина и хунтой Гоминьдана в Гуйяне. Поскольку [YUN.GetLeader] смотрит в сторону Гуанчжоу, он должен тщательно взвесить свои варианты."
 YUN.earlygame.800.a: "Мы продолжаем обдумывать наши варианты."
 YUN.earlygame.800.tt: "§RЕсли война с Лянгуаном пойдет не так, как нам нужно, стабильность нашего правительства окажется в серьезной опасности!§!"

 YUN.earlygame.801.t: "Вторая Дянь-Гуйская война"
 YUN.earlygame.801.d: "[YUN.GetLeader] принял роковое решение начать войну, приказав своим войскам пересечь границу Юньнани и Гуйчжоу. Хотя его конечным пунктом назначения является критически важный город Гуанчжоу, который ему нужен для провозглашения конкурирующего правительства, непосредственной целью его людей является Наньнин — столица Гуанси и жизненно важный логистический центр на пути.\n\nВо время первой войны Юньнань-Гуанси в 1925 году (Дянь — это сокращение от Юньнань, Гуй — сокращение от Гуанси), спровоцированной смертью Сунь Ятсена и последовавшей борьбой за власть, армия Юньнани под командованием Лун Юня смогла захватить город, но была окружена во время контратаки Гуанси под руководством Ли Цзунжэня. Неудачная попытка помощи со стороны Тан Цзияо и последующий захват города Новой кликой Гуанси положили конец войне, поскольку моральный дух юньнаньцев рухнул. Это имело роковые последствия для Южного Китая, так как опозоренный губернатор Тан едва избежал свержения своими недовольными генералами, в то время как правительство Гуанчжоу смогло завершить свою реорганизацию.\n\nГрядущая война, как ожидается, будет столь же решающей. Юньнань, Гуйчжоу и Гуанси — это сильно милитаризированные провинции, но гораздо более бедные, чем Гуандун. Если силы Юньнань-Гуйчжоу не смогут действовать агрессивно и быстро выбить Гуанси, они рискуют столкнуться с серьезными последствиями в будущем. С другой стороны, если Гуанси и ее труднопроходимые оборонительные линии падут, Гуандун станет уязвимым."
 YUN.earlygame.801.a: "Мы должны действовать быстро, чтобы добиться победы!"
 YUN.earlygame.801.b: "Мы будем держать оборону, как делали всегда."

 YUN.earlygame.802.t: "Падение Гуанчжоу"
 YUN.earlygame.802.d: "Ставка [YUN.GetLeader] увенчалась оглушительным успехом! Сметая защитников в труднопроходимых холмах и лесах Гуанси и на реках Гуандуна, армии [YUN.GetNameDef] совершили то, что не смогли их предшественники в 1925 году, и захватили Гуанчжоу в решающей битве. Еще предстоит проделать много работы, но значимость этого достижения не может быть проигнорирована или преуменьшена даже величайшими скептиками. Доказав силу [YUN.GetRulingParty], можно успокоить генералов и начать смотреть в будущее на следующие этапы национального объединения!"
 YUN.earlygame.802.a: "Весьма достижение, если можно так выразиться."

#The Kunming Coup (810-839)
 YUN.earlygame.810.t: "Заговорщики в Куньмине?"
 YUN.earlygame.810.d: "Юньнань уже некоторое время балансирует на грани краха, поражения на поле боя сказываются на моральном духе армии. Верховное командование Юньнани всегда неохотно поддерживало внешние военные авантюры после катастрофического провала их «экспортного милитаризма» 1910-х и 1920-х годов, предпочитая вместо этого вооруженную изоляцию. Мы получили сообщение от представителей генералов Лун Юня и Ху Жоюя, что они хотели бы видеть конец войне, предлагая свергнуть [YUN.GetLeader] в обмен на сохранение автономии Юньнани во внутренних делах.\n\nВ связи с этим наши возможности открыты. Хотя мы могли бы настаивать на полном завоевании Юньнани, их армии являются упорными бойцами в обороне, а провинция гористая, в то время как отдача от такого завоевания ожидается низкой. Возможно, лучше предложить условия рано или поздно (возможно, немного улучшив нашу переговорную позицию) и сберечь наши ресурсы для более важных целей."
 YUN.earlygame.810.a: "Мы будем иметь это в виду."

 YUN.earlygame.811.t: "[FROM.Capital.GetCapitalVictoryPointName] предъявляет свои условия"
 YUN.earlygame.811.d.intro: "Отбросив наши силы и наслаждаясь преимуществом в этом конфликте, [FROM.GetLeader] и его ближайшее окружение взвесили свои варианты относительно разрешения этой войны. Благоприятный для обороны рельеф Юньнани и сравнительная нехватка ресурсов, к счастью, сделали прямое вторжение непривлекательной перспективой. Вместо этого они решили принять предложение Куньминских заговорщиков, предлагая свою поддержку переворота в обмен на прекращение огня."
 YUN.earlygame.811.d.submission_and_lose_guizhou: "$YUN.earlygame.811.d.intro$\n\nЭто не значит, что этот мир достанется легко. Юньнань должна подчиниться [FROM.GetNameDef], положив конец своей автономии во внутрикитайских делах, но, по крайней мере, позволив нам сохранить наше самоуправление и контроль над нашими вооруженными силами. Провинция Гуйчжоу должна быть передана оккупационным силам, что положит конец нашей гегемонии на Юго-Западе."
 YUN.earlygame.811.d.submission_and_keep_guizhou: "$YUN.earlygame.811.d.intro$\n\nЭто не значит, что этот мир достанется легко. Юньнань должна подчиниться [FROM.GetNameDef], положив конец своей автономии во внутрикитайских делах, но, по крайней мере, позволив нам сохранить наше самоуправление и контроль над нашими вооруженными силами. Провинция Гуйчжоу (или, по крайней мере, те части, которые мы контролировали до войны) также останется в нашей сфере."
 YUN.earlygame.811.d.whitepeace_and_lose_guizhou: "$YUN.earlygame.811.d.intro$\n\nЭто не значит, что этот мир достанется легко. В рамках их условий мы будем вынуждены сдать Гуйчжоу (или, по крайней мере, те части, которые мы контролировали до войны), что положит конец нашей гегемонии на Юго-Западе."
 YUN.earlygame.811.d.whitepeace_and_keep_guizhou: "$YUN.earlygame.811.d.intro$\n\nХотя мир достанется нелегко, мы, к счастью, сможем сохранить большую часть того, с чем начинали. Юньнань останется свободной и нейтральной, а провинция Гуйчжоу (или, по крайней мере, те части, которые мы контролировали до войны) также останется в нашей сфере. Наша гордость была задета, но, по крайней мере, мы сделали то, что должны были, чтобы выжить."
 YUN.earlygame.811.a: "Похоже, дела в Юньнани идут неважно..."

