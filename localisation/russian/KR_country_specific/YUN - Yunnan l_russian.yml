 YUN_YCD_party: "ДЛК-Фракция Дянь"
 YUN_YCD_party_long: "$YUN_YCD_party_long_tt$\n§LПосле Шанхайского восстания 1932 года и приостановки выборов многие либеральные интеллектуалы бежали от все более авторитарного режима Чжили в пользу федералистских правительств Южного Китая. В Юньнани многие педагоги нашли дорогу домой, заявив о своем отвращении к Пекинскому правительству, и присоединились к растущей Федерации китайских демократических партий (ФКДП).\n\nБлагодаря финансированию губернатора Тана они пользуются определенной степенью влияния в администрации Куньмина. Среди интеллектуалов Юньнаньской ДЛК особенно высоко поднялись Су Хунган и Цунь Шушэн, сформировав свои собственные внутрипартийные группы внутри организации. Базируясь в Национальном юго-западном объединенном университете, Су и Цунь работают с членами Общества полумесяца Лян Шицю и Вэнь Идо, чтобы продвигать демократию в Юньнани.§!\n"
 YUN_YCD_party_long_tt: "Демократическая лига Китая - Фракция провинциального комитета Юньнани (Чжунго Миньчжу Тунмэн Дянь Пай)"

##Primarily Soc Lib Parties
 #共和大同盟 新月社
 YUN_CMS_local_party: "ОП"
 YUN_CMS_local_party_long: "Общество полумесяца (Синь Юэ Шэ)\n§LПервоначально созданное Сюй Чжимо в Шанхае в 1923 году как буржуазный социальный клуб, посвященный искусству и драме, Общество полумесяца эволюционировало и переименовало себя в политически ориентированный социальный клуб. Хотя многие интеллектуалы приходили и уходили, включая таких, как Ху Ши, Общество полумесяца начало вращаться вокруг Ло Лунцзи, Лян Шицю и Вэнь Идо как своего интеллектуального ядра.\n\nПодвергаясь все большим преследованиям со стороны полиции Лиги после Шанхайского восстания 1932 года, руководство ОП решило переехать в Юньнань под защиту губернатора Тан Цзияо. Открыв Национальный юго-западный объединенный университет как убежище для бежавших интеллектуалов Лиги, Ло и ОП продолжили вести войну с тиранией посредством слов и свободной дискуссии. Хотя это лишь одна интеллектуальная группировка среди многих, бежавших из Лиги Суня, ОП возвысилось над всеми ними как одна из крупнейших и самых популярных интеллектуальных организаций в провинции Юньнань.§!\n"

 #共和大同盟 新月社
 UPC_CMS_party: "ДЛК-ОП"
 UPC_CMS_party_long: "$UPC_CMS_party_long_tt$\n§LПервоначально созданное Сюй Чжимо в Шанхае в 1923 году как буржуазный социальный клуб, посвященный искусству и драме, Общество полумесяца эволюционировало и переименовало себя в политически ориентированный социальный клуб. Хотя многие интеллектуалы приходили и уходили, включая таких, как Ху Ши, Общество полумесяца начало вращаться вокруг Ло Лунцзи, Лян Шицю и Вэнь Идо как своего интеллектуального ядра.\n\nПодвергаясь все большим преследованиям со стороны полиции Лиги после Шанхайского восстания 1932 года, руководство ОП решило переехать в Юньнань под защиту губернатора Тан Цзияо. Открыв Национальный юго-западный объединенный университет как убежище для бежавших интеллектуалов Лиги, Ло и ОП продолжили вести войну с тиранией посредством слов и свободной дискуссии. Хотя это лишь одна интеллектуальная группировка среди многих, бежавших из Лиги Суня, ОП возвысилось над всеми ними как одна из крупнейших и самых популярных интеллектуальных организаций во всей стране.§!\n"
 UPC_CMS_party_long_tt: "Демократическая лига Китая - Общество полумесяца (Чжунго Миньчжу Тунмэн Синь Юэ Шэ)"

##Primarily Mar Lib Parties
 #總商會
 YUN_chamber_of_commerce_party: "Торговая палата"
 YUN_chamber_of_commerce_party_long: "Генеральная торговая палата Юньнани (Дянь Цзун Шанхуэй)\n§LОрганизация, созданная влиятельным классом дворянства Юньнани, Торговая палата посвящена защите их деловых интересов. Изначально набрав влияние после разрухи в Юньнани в 1800-х годах, дворяне сдерживали радикальные реформы в провинции, например, ограничив реформы наместника Ли Цзинси одним лишь Куньмином.\n\nВ Эру милитаристов Цай Э и Тан Цзияо работали с ними, чтобы гарантировать, что некоторые реформы в провинции могут быть проведены без сопротивления дворянства. Дворянство стало доминировать в различных местных собраниях и контролировать большую часть промышленности Юньнани. В последнее время Торговую палату возглавил Мяо Юньтай, предприимчивый бюрократ, возглавляющий экономическую реформу в Юньнаньской провинциальной администрации.§!\n"

 UPC_PGP_exiled_party: "ВРА-ПНП"
 UPC_PGP_exiled_party_long: "$UPC_PGP_exiled_party_long_tt$\n§L$YUN_GRA_intro$\n\nСформированная как союз между Обществом содействия движению самоуправления Чжан Тайяня и Демократическим обществом Тан Цзияо, Партия народного правительства действует как личная партия Тан Цзияо, продвигая его идеи провинциальной автономии, антимилитаризма и народного правительства. Однако партия не принадлежит только ему, так как Чжан Тайянь продолжает сохранять большое количество последователей внутри партии. Крыло партии Чжана продвигает более низовой вариант федерализма и наделение властью местных общин.\n\nПартия народного правительства получила поддержку от Шанхайского восстания 1932 года и последующих репрессий Чжили, так как многие интеллектуалы бежали на юг, чтобы присоединиться к его федералистскому режиму. Сформировав альянс с прогрессивными интеллектуалами нового Национального юго-западного объединенного университета, Партия народного правительства Тана стала гражданским крылом правительства Тан Цзияо.\n\nПротесты под руководством ДЛК против авторитаризма Тан Цзияо нанесли почти смертельный удар по его демократическому имиджу, и Тан был свергнут в результате переворота вскоре после этого. Его сын, Тан Сяоин, бежал в изгнание в Гуанчжоу, где он пытался сплотить сторонников и наладить более прочные связи с более широким ВРА. Рассматриваемый как более либеральный, чем его отец, Тан Сяоин все еще может иметь возможность вернуться к власти.§!\n"
 UPC_PGP_exiled_party_long_tt: "Великий республиканский альянс - Партия народного правительства (Гунхэ Датунмэн Жэньминь Чжэнфу Дан)"

##Primarily Soc Con Parties
 UPC_PGP_party: "ВРА-ПНП"
 UPC_PGP_party_long: "$UPC_PGP_party_long_tt$\n§L$YUN_GRA_intro$\n\nСформированная как союз между Обществом содействия движению самоуправления Чжан Тайяня и Демократическим обществом Тан Цзияо, Партия народного правительства действует как личная партия Тан Цзияо, продвигая его идеи провинциальной автономии, антимилитаризма и народного правительства. Однако партия не принадлежит только ему, так как Чжан Тайянь продолжает сохранять большое количество последователей внутри партии. Крыло партии Чжана продвигает более низовой вариант федерализма и наделение властью местных общин.\n\nПартия народного правительства получила поддержку от Шанхайского восстания 1932 года и последующих репрессий Чжили, так как многие интеллектуалы бежали на юг, чтобы присоединиться к его федералистскому режиму. Сформировав альянс с прогрессивными интеллектуалами нового Национального юго-западного объединенного университета, Партия народного правительства Тана стала подлинной демократической партией, способной противостоять угнетателям Чжили в Пекине и их провинциальным ставленникам в соседних провинциях. Гражданская сторона правительственного аппарата Тана, ПНП есть и будет ключевым компонентом правительства Тана.§!\n"
 UPC_PGP_party_long_tt: "Великий республиканский альянс - Партия народного правительства (Гунхэ Датунмэн Жэньминь Чжэнфу Дан)"

 UPC_PGP_destroyed_party: "ВРА-ПНП"
 UPC_PGP_destroyed_party_long: "$UPC_PGP_party_long_tt$\n§L$YUN_GRA_intro$\n\nСформированная как союз между Обществом содействия движению самоуправления Чжан Тайяня и Демократическим обществом Тан Цзияо, Партия народного правительства была разрушена свержением и смертью Тан Цзияо. Сочувствующие интеллектуалы, писатели и пропагандисты либо бежали в более благоприятные места, либо столкнулись с цензурой нового режима, Чжан Тайянь удалился в уединение, а новый председатель Тан Сяоин (сын Тан Цзияо), похоже, больше заинтересован в Младокитайской партии, чем в управлении дряхлыми руинами движения Тана. Тем не менее, влияние Тан Цзияо продолжает ощущаться в Юньнани, так как многие из его старых слуг держатся за различные должности в администрации.§!"

##Primarily Auth Dem Parties
 YUN_tang_jiyao_clique_party: "Клика Тана"
 YUN_tang_jiyao_clique_party_long: "Клика Тан Цзияо (Тан Пай)\n§LПосле Синьхайской революции военные стали доминировать в политике Юньнани. Первоначально возглавляемый Цай Э, Тан Цзияо сменил его после того, как первый был свергнут Юань Шикаем из-за его поддержки Сун Цзяожэня. Тан уступил власть Цаю после того, как тот сбежал во время восстановления монархии Юань Шикаем, и помогал ему возглавлять Альянс защиты нации, но снова стал губернатором после смерти Цая.\n\nХотя Тан Цзияо был убежденным демократом и федералистом, он извлек из опыта Войны в защиту республики ценный урок о том, что военные имеют право вмешиваться в гражданскую политику. В залах правительства Тана его военное крыло продолжает исповедовать идеи Цай Э о том, что военные обладают более развитым пониманием потребностей нации, чем простые люди, что профессиональный солдат считается обладающим высшей компетентностью во всех вопросах национального государства.\n\nГубернатор Тан верит во все это, но он также знает, что скатывание обратно к автократии пошло бы вразрез с эволюцией китайской нации, и уравновешивает свой военный лагерь интересами своей политической партии, Партии народного правительства. Правительство Тана поддерживает обширную коалицию идеалистических демократов, амбициозных и жестких генералов и способных бюрократов, работающих вместе с трудом.§!\n"

 YUN_national_dian_clique_party: "Клика Дянь"
 YUN_national_dian_clique_party_long: "Клика Дянь (Дянь Пай)\n§LПосле Синьхайской революции военные стали доминировать в политике Юньнани. Первоначально возглавляемый Цай Э, Тан Цзияо сменил его после того, как первый был свергнут Юань Шикаем из-за его поддержки Сун Цзяожэня. Тан уступил власть Цаю после того, как тот сбежал во время восстановления монархии Юань Шикаем, и помогал ему возглавлять Альянс защиты нации, но снова стал губернатором после смерти Цая.\n\nТан создал мощный аппарат управления за десятилетия своего пребывания у власти в Юньнани, объединив мощную армию, функционирующую гражданскую бюрократию, связи с дворянством и торговой элитой, а также идеологическую платформу, построенную вокруг консервативного, националистического бренда федерализма. По мере того как эта могучая машина росла из региональной силы в национальную, различия между более мелкими кликами в Юньнани стирались, пока они не стали функционально несущественными для большинства посторонних. Юньнаньские фигуры контролируют многие рычаги власти в новой республике, к большому огорчению других.§!\n"

 YUN_long_yun_clique_party: "Клика Луна"
 YUN_long_yun_clique_party_long: "Клика Лун Юня (Лун Пай)\n§L$YUN_NPA_intro$\n\nХотя Тан Цзияо был убежденным демократом и федералистом, он извлек из опыта Войны в защиту республики ценный урок о том, что военные имеют право вмешиваться в гражданскую политику. Однако Тан Цзияо продолжал поддерживать баланс между своими военными силами, либеральными союзниками и бюрократами, связанными с интересами дворянства.\n\nХотя приход к власти Лун Юня был далек от упорядоченного, он сохранил большую часть правительственного аппарата администрации Тана. От Ли Цзинси до Цай Э, от Тан Цзияо до Лун Юня, нынешняя администрация является лишь текущей в длинной череде реформаторов, стремящихся улучшить и усовершенствовать провинцию Юньнань и, возможно, послужить примером для остальной нации.§!\n"
 YUN_long_yun_clique_national_party_long: "Клика Лун Юня (Лун Пай)\n§L$YUN_NPA_intro$\n\nХотя Тан Цзияо был убежденным демократом и федералистом, он извлек из опыта Войны в защиту республики ценный урок о том, что военные имеют право вмешиваться в гражданскую политику. Однако Тан Цзияо продолжал поддерживать баланс между своими военными силами, либеральными союзниками и бюрократами, связанными с интересами дворянства.\n\nХотя приход к власти Лун Юня был далек от упорядоченного, он сохранил большую часть правительственного аппарата администрации Тана. От Ли Цзинси до Цай Э, от Тан Цзияо до Лун Юня, нынешняя администрация является лишь текущей в длинной череде реформаторов, стремящихся улучшить и усовершенствовать провинцию Юньнань.\n\nНеожиданно их успешное руководство привело их от мелкой региональной фракции к великим объединителям всего Китая в качестве главы Альянса защиты нации. Теперь Лун правит железной рукой, балансируя уроки всех своих наставников, пока он ведет Китай в новую эру.§!\n"

 YUN_lu_han_clique_party: "Клика Лу"
 YUN_lu_han_clique_party_long: "Клика Лу Ханя (Лу Пай)\n§L$YUN_NPA_intro$\n\nЛу Хань был близким другом детства Лун Юня, но отвернулся от него, когда Лун начал концентрировать власть вокруг себя за счет своих бывших сторонников. Это привело к тому, что многие его старшие генералы перешли на другую сторону и помогли совершить переворот против него. Впоследствии многие бывшие сторонники Луна (по крайней мере, военные) обратились к Лу Ханю как к своему новому лидеру. Лу, амбициозный и гибкий милитарист, заявил о своих правах на лидерство, опираясь на смутное чувство популизма и национализма.§!\n"

##Primarily Pat Aut Parties
 YUN_garrison_commanders_party: "Командиры гарнизонов"
 YUN_garrison_commanders_party_long: "Командиры провинциальных гарнизонов (Шэн Чжуцзюнь Чжихуэй Гуань)\n§L$YUN_NPA_intro$\n\nХотя Тан Цзияо является убежденным демократом и федералистом, он усвоил из опыта Войны в защиту республики, Эры милитаристов и последующего десятилетия насилия и хаоса, что одна вещь важнее всего: держи свой Дом в порядке.\n\nПостроенная на довольно хрупком карточном домике 1920-х годов, клика Юньнани была полна внутренней борьбы. Сначала это был Гу Пиньчжэнь, затем Лун Юнь, Ху Жоюй, Ли Сюаньтин и Чжан Жуцзи. Оба сделали свои гамбиты, чтобы свергнуть Короля Юньнани, и последнее испытание Тан Цзияо было самым близким к провалу, он лишь чудом избежал свержения. Теперь, когда Сунь Ду является командиром гарнизона на Западе, а Тан сосредоточен вокруг самого Куньмина, хрупкий мир сохраняется уже много лет. Лун Юнь на Севере, Ху, Ли и Чжан на юге. Хотя они внешне лояльны, истинные намерения клики Мэнцзы и клики Лун Юня еще предстоит увидеть.§!\n"

 YUN_hu_ruoyu_clique_party: "Клика Мэнцзы"
 YUN_hu_ruoyu_clique_party_long: "$YUN_hu_ruoyu_clique_party_long_tt$\n§L$YUN_NPA_intro$\n\nХотя Тан Цзияо был убежденным демократом и федералистом, он извлек из опыта Войны в защиту республики ценный урок о том, что военные имеют право вмешиваться в гражданскую политику. Ху Жоюй принял эти уроки близко к сердцу, восстановив порядок после того, как Юньнань погрузилась в хаос после окончания гегемонии Цин и возвращения политической нестабильности в Куньмин.\n\nНовое правительство Ху Жоюя в значительной степени поддерживается только военными, хотя дворянство сотрудничает с администрацией Куньмина во имя закона и порядка. В то время как либеральные и социалистические агитаторы могут осуждать Ху Жоюя как тирана, его сторонники видят в нем оплот против хаоса и радикализма.§!\n"
 YUN_hu_ruoyu_clique_national_party_long: "$YUN_hu_ruoyu_clique_party_long_tt$\n§L$YUN_NPA_intro$\n\nХотя Тан Цзияо был убежденным демократом и федералистом, он извлек из опыта Войны в защиту республики ценный урок о том, что военные имеют право вмешиваться в гражданскую политику. Ху Жоюй принял эти уроки близко к сердцу, восстановив порядок после того, как Юньнань погрузилась в хаос после окончания гегемонии Цин и возвращения политической нестабильности в Куньмин.\n\nХотя оппоненты осуждали это как оппортунистическую тиранию, Ху доказал свою эффективность в привлечении на свою сторону дворянства, торговцев, военных и даже некоторых интеллектуалов. Ему также удалось сделать невозможное — объединить Китай под своим знаменем. Теперь от него ожидают правления в манере, подобной Чжили до него; действительно, он работал над тем, чтобы поглотить многих бывших политиков Чжили для создания гражданского фасада, в то время как хунта его генералов решает национальные дела за закрытыми дверями.§!\n"
 YUN_hu_ruoyu_clique_party_long_tt: "Клика Мэнцзы (Мэнцзы Пай)"

##Primarily Nat Pop Parties
 YUN_YCP_party: "МКП"
 YUN_YCP_party_long: "Младокитайская партия (Чжунго Цинняньдан)\n§LРожденная из студенческого «Общества Младого Китая», Младокитайская партия стала одним из преемников общества, так как оно раскололось на «националистическую», «социалистическую» и «идеалистическую» фракции, возглавляемые Цзэн Ци и Ли Хуаном, Ли Дачжао и Ван Гуанци соответственно. Отправившись во Францию на учебу, Цзэн Ци, Ли Хуан и другие члены их националистической фракции вступали в перепалки с другими студентами во Франции, такими как Чжоу Эньлай, Цай Юаньпэй и Ли Шицзэн.\n\nИногда доходя до насилия, накопление поддержки Китайской синдикалистской партии и поддержка со стороны французского правительства привели к тому, что Цзэн и Ли сформировали свою собственную партию, объявив о создании Младокитайской партии в 1923 году под Парижем. Быстро развиваясь среди китайских студенческих организаций, Младокитайская партия заняла позицию конкретной оппозиции КСП и Гоминьдану. МКП вернулась в Шанхай, основав ряд политических обществ и газет в 1924 году, став союзниками У Пэйфу и Сунь Чуаньфана из клики Чжили.\n\nС победой Чжили Младокитайская партия взлетела на еще большие высоты как единственная массовая партия с хорошей репутацией в Центральном правительстве. И Юньнань, хотя и не входящая в клику Чжили, аналогичным образом ощутила ее отголоски. Хотя МКП не особенно влиятельна в республиканском бастионе, у нее тем не менее есть свой провинциальный партийный комитет, возглавляемый генералом клики Дянь Ляо Синчао.§!\n"

