###- Economic Ideas -###

###- Phase 1 and 2 -###
 YUN_oversized_military_idea1: "Раздутая армия"
 YUN_oversized_military_idea1_desc: "Хотя это обеспечило нас одной из лучших армий в Южном Китае, ясно, что сильный акцент провинциального правительства на развитии вооруженных сил является неустойчивым. Если эта политика будет продолжена, гражданское население и промышленность Юньнани продолжат страдать."

 YUN_oversized_military_idea2: "Раздутая армия"
 YUN_oversized_military_idea2_desc: "Несмотря на многие улучшения в управлении экономикой провинции, экономика все еще находится под сильным давлением из-за предыдущих огромных военных расходов. Однако в связи с текущими обстоятельствами правительство не может позволить себе дальнейшее сокращение армии. Пока политическая ситуация не изменится, народу Юньнани придется терпеть лишения."

 YUN_abysmal_economy_idea1: "Ужасная экономика"
 YUN_abysmal_economy_idea1_desc: "Поскольку и Юньнань, и Гуйчжоу являются двумя наиболее отсталыми провинциями Китая, а Гуйчжоу находится под фактическим контролем Гоминьдана, неудивительно, что провинциальное правительство постоянно испытывает нехватку средств. Без серьезных реформ ситуация вряд ли улучшится."

 YUN_abysmal_economy_idea2: "Рухнувшая экономика"
 YUN_abysmal_economy_idea2_desc: "С наступлением Черного понедельника и без того хрупкая экономика Юньнани полностью рухнула, так как иностранные инвестиции были выведены, а экспорт исчез в одночасье. Экономика находится в отчаянном положении, если в ближайшее время ничего не будет предпринято."

 YUN_abysmal_economy_idea3: "Стагнирующая экономика"
 YUN_abysmal_economy_idea3_desc: "Хотя многие проблемы Юньнани, существовавшие до Черного понедельника, все еще сохраняются, экономика находится в гораздо лучшем состоянии, чем сразу после Черного понедельника. Благодаря недавним экономическим инвестициям провинциального правительства кажется, что экономика Юньнани находится на пути к полному восстановлению."

 YUN_abysmal_economy_idea4: "Восстанавливающаяся экономика"
 YUN_abysmal_economy_idea4_desc: "Благодаря недавним инвестициям провинциального правительства, худший ущерб от Черного понедельника был смягчен. Несмотря на то, что системные проблемы в слаборазвитой экономике Юньнани все еще сильно препятствуют её экономическому росту, тем не менее есть надежда, что экономика Юньнани поднимется над своей хронической отсталостью."

 YUN_local_industrialisation_efforts: "Усилия по местной индустриализации"
 YUN_local_industrialisation_efforts_desc: "В грандиозном стремлении к экономической модернизации Юньнань и Гуйчжоу, несомненно, будут впереди! Хотя Черный понедельник мог омрачить ситуацию, это не является непреодолимым, и с каждой инициативой, с каждой реализованной мерой Юньнань движется вперед к современности."

 YUN_centralised_economic_development: "Централизованное экономическое развитие"
 YUN_centralised_economic_development_desc: "Капитализм свободного рынка не сделал ничего, кроме насаждения тирании на китайских рынках и привлечения иностранных империалистов, маскирующихся под видом «инвестиций», когда на самом деле они ищут контроля. Если Китай хочет встать на ноги, ему нужна централизованно управляемая экономическая доктрина, которая гарантирует развитие государства без легкомыслия предпринимательского капитала."

###- Phase 3 -###
 YUN_industrial_economy_idea1: "Промышленный коллапс"
 YUN_industrial_economy_idea1_desc: "Из-за участия Юньнани в недавних региональных конфликтах экономика военного государства Юньнань окончательно рухнула под давлением почти двух десятилетий экстремальных военных расходов. Однако с началом Великого проекта реконструкции Юга есть надежда на полное возрождение промышленности в регионе."

 YUN_industrial_economy_idea2a: "Промышленная стагнация"
 YUN_industrial_economy_idea2a_desc: "Благодаря недавним экономическим реформам [ROOT.GetName], был достигнут умеренный прогресс в направлении полного восстановления промышленности Южного Китая. Если повезет, наша экономика скоро полностью восстановится, поскольку мы делаем заявку на национальное лидерство."

 YUN_industrial_economy_idea3a: "Промышленное восстановление"
 YUN_industrial_economy_idea3a_desc: "Дальнейшая экономическая реформа [ROOT.GetName] привела к тому, что промышленность Южного Китая получила столь необходимое увеличение производственных мощностей. С возрождающимся югом мы скоро сможем двинуться на север и освободить наших соотечественников от гнета иностранного империализма и его прихвостней!"

 YUN_industrial_economy_idea4a: "Промышленная экономика"
 YUN_industrial_economy_idea4a_desc: "Благодаря усилиям [ROOT.GetName], промышленность южных провинций полностью восстановилась после краха из-за конфликтов и экономических кризисов. Скоро наши армии смогут двинуться на север и заявить свои права на звание законного правительства Китая!"

 YUN_industrial_economy_idea5a: "Промышленность возрождена"
 YUN_industrial_economy_idea5a_desc: "Поскольку промышленные возможности Юга сильны как никогда, [ROOT.GetName] подготовлено настолько, насколько это возможно, чтобы претендовать на национальное лидерство. Южная промышленность станет основой борьбы нашего нового правительства за изгнание иностранных прихвостней и ликвидацию милитаризма!"

 YUN_industrial_economy_idea2b: "Промышленная стагнация"
 YUN_industrial_economy_idea2b_desc: "Государство не может допустить дальнейшей милитаризации. Результаты прежних попыток укрепить власть через нее очевидны: почти полная экономическая разруха и нищета в гражданском секторе. Без веры народа современное государство — ничто. Усилия по реконструкции и развитию будут интенсифицированы, обеспечивая сбалансированный и рациональный экономический рост и укрепляя веру людей в государство."

 YUN_industrial_economy_idea3b: "Промышленное восстановление"
 YUN_industrial_economy_idea3b_desc: "Планы намечены, и наращивание промышленности началось. Люди смотрят в будущее с большой надеждой, так как правительство пообещало масштабное развитие, реформы и модернизацию во всех областях промышленности. Однако предстоит проделать большую работу, если правительство хочет выполнить эти обещания."

 YUN_industrial_economy_idea4b: "Промышленная экономика"
 YUN_industrial_economy_idea4b_desc: "Экономика наконец обуздала мощь промышленности, позволив стране догнать остальной мир. Со временем прошлая промышленная разруха станет лишь далеким воспоминанием."

 YUN_industrial_economy_idea5b: "Промышленность возрождена"
 YUN_industrial_economy_idea5b_desc: "Трансформация государства в поистине грозную промышленную державу завершена. Путь к современности увереннее, чем когда-либо, и другие смотрят на достижения режима с благоговением, завистью, а часто и с тем и другим. Да процветает Китай!"

 YUN_agrarian_economy_idea1: "Рухнувший сельскохозяйственный сектор"
 YUN_agrarian_economy_idea1_desc: "После десятилетий бесхозяйственности и конфликтов сельскохозяйственный сектор остался в катастрофическом состоянии. Если Южный Китай хочет продвинуться к современности, сельскохозяйственные реформы должны быть проведены как можно скорее."

 YUN_agrarian_economy_idea2a: "Слабый сельскохозяйственный сектор"
 YUN_agrarian_economy_idea2a_desc: "Фермеры изо всех сил пытаются справиться с хаосом, охватившим Китай, вынужденные иметь дело с разрушенными сельскохозяйственными угодьями и конкурирующими иностранными державами, что создает нечестную конкуренцию, благоприятствующую только империалистам, оставляя многих крестьян молиться о конце этого безумия."

 YUN_agrarian_economy_idea3a: "Восстанавливающийся сельскохозяйственный сектор"
 YUN_agrarian_economy_idea3a_desc: "Ситуация стабилизировалась, и наконец сельское хозяйство начинает восстанавливаться. Однако это все еще лишь маленький шаг в правильном направлении. Правительство не пожалеет усилий, чтобы обеспечить полное восстановление."

 YUN_agrarian_economy_idea4a: "Восстановленный сельскохозяйственный сектор"
 YUN_agrarian_economy_idea4a_desc: "Сельскохозяйственный сектор наконец восстановился благодаря правительственным программам и тяжелому труду людей. Больше засухи и разрушительный голод не погрузят страну в голодание, и больше фермерам не придется использовать устаревшие методы и оборудование."

 YUN_agrarian_economy_idea5a: "Революционный сельскохозяйственный сектор"
 YUN_agrarian_economy_idea5a_desc: "Сельскохозяйственный сектор теперь поистине революционен. Он прошел путь от полного и абсолютного краха до гордости народа. Благодаря множеству модернизаций, реформ и инновационных идей, житница нации теперь представляет собой поистине великолепное зрелище."

 YUN_agrarian_economy_idea2b: "Слабый сельскохозяйственный сектор"
 YUN_agrarian_economy_idea2b_desc: "Сельскохозяйственный сектор в руинах. Сильно устаревшие инструменты и методы, а также поврежденные фермы, к сожалению, являются обычным явлением. Хватит! Правительство должно начать амбициозную кампанию сельскохозяйственного развития, чтобы спасти сельскую местность от разорения."

 YUN_agrarian_economy_idea3b: "Восстанавливающийся сельскохозяйственный сектор"
 YUN_agrarian_economy_idea3b_desc: "После нескольких громких правительственных проектов сельское хозяйство наконец начинает восстанавливаться. Хотя сектор больше не в руинах, предстоит еще долгий путь, прежде чем можно будет считать, что он полностью восстановился."

 YUN_agrarian_economy_idea4b: "Восстановленный сельскохозяйственный сектор"
 YUN_agrarian_economy_idea4b_desc: "Полное восстановление сельского хозяйства достигнуто. Фермеры теперь трудятся с невиданным ранее энтузиазмом, и урожай обилен. Правительство не пожалеет средств, чтобы гарантировать, что сектор продолжит расти, и что это только конец начала."

 YUN_agrarian_economy_idea5b: "Возрожденный сельскохозяйственный сектор"
 YUN_agrarian_economy_idea5b_desc: "Сельскохозяйственный сектор был полностью возрожден, достигнув уровня процветания, который ранее считался лишь детской фантазией. С поистине обновленной житницей страна и её народ уверенно шагают в будущее."

 YUN_militarised_state_idea1: "Дряхлая армия"
 YUN_militarised_state_idea1_desc: "Наша армия — это позор по сравнению с другими державами, чьи армии дисциплинированы и сильны, в то время как люди под нашим командованием — новобранцы и, как известно, не выполняют приказы полностью."

 YUN_militarised_state_idea2a: "Слабая армия"
 YUN_militarised_state_idea2a_desc: "Враги со всех сторон постоянно смотрят на Южный Китай, и он всегда должен иметь возможность защитить себя. Для достижения этого проводится полная милитаризация общества и экономики, чтобы по-настоящему омолодить ныне слабые военные возможности нации, гарантируя, что любая угроза будет встречена лицом к лицу и уничтожена превосходящей мощью."

 YUN_militarised_state_idea3a: "Частичная милитаризация"
 YUN_militarised_state_idea3a_desc: "Уже сделано несколько заметных шагов к конечной цели полной милитаризации экономики, и даже самые яростные скептики теперь склоняются к этой идее. Хотя нагрузка на население растет еще больше, многие теперь понимают, что выгоды, которые принесет эта трансформация, намного перевешивают затраты."

 YUN_militarised_state_idea4a: "Военное государство"
 YUN_militarised_state_idea4a_desc: "Правительство наконец создало надлежащее военное государство, и его враги трепещут при мысли об этом. Очень скоро любые угрозы будут устранены, открывая путь к целям, которые ранее считались недостижимыми."

 YUN_militarised_state_idea5a: "Возрождающееся военное государство"
 YUN_militarised_state_idea5a_desc: "Военное государство теперь обладает еще большим разрушительным потенциалом, чем считалось возможным. Возрожденные армии юга — это поистине сила, с которой нужно считаться, и успехи милитаризма теперь неоспоримы."

 YUN_militarised_state_idea2b: "Раздутая армия"
 YUN_militarised_state_idea2b_desc: "Безудержный милитаризм поставил страну на грань разорения. Экономика совершенно гнилая, а гражданский сектор — в нищете. Если в ближайшее время не будут предприняты радикальные изменения, ни страна, ни народ не восстановятся."

 YUN_militarised_state_idea3b: "Дорогая армия"
 YUN_militarised_state_idea3b_desc: "Несмотря на некоторые шаги по очистке от гнили, военные расходы являются постоянным бременем для бюджета и, честно говоря, ни к чему не приведут правительство и особенно народ. Это проблема, которую необходимо решить как можно скорее."

 YUN_militarised_state_idea4b: "Сбалансированная экономика"
 YUN_militarised_state_idea4b_desc: "С балансировкой бюджета последние излишества были удалены из армии, и правительство может наконец начать надлежащим образом выплачивать долги. Предстоит еще многое сделать, но правительство проявило реальную готовность выполнить обещания по сокращению раздутых штатов, заслужив уважение народа."

 YUN_militarised_state_idea5b: "Здоровая экономика"
 YUN_militarised_state_idea5b_desc: "Потребовалось много времени и усилий как от правительства, так и от народа, но, наконец, экономику можно считать в надлежащей форме. Прекращение безудержной милитаризации, а также запуск нескольких проектов развития, похоже, сотворили чудеса с экономикой, полностью вытащив ее из грязи."

 YUN_national_defence_economy_idea: "Экономика национальной обороны"
 YUN_national_defence_economy_idea_desc: "После долгого и утомительного процесса экономика теперь полностью милитаризована для национальной обороны, и государство способно значительно превзойти в производстве всех потенциальных врагов. Ничто и никто теперь не может встать на пути амбиций правительства!"

 YUN_economic_stability_idea: "Экономическая стабильность"
 YUN_economic_stability_idea_desc: "Экономическая стабильность наконец достигнута, и народ ликует. Давно прошли дни постоянной безработицы, бедности и голода. Теперь среди людей, кажется, есть подлинная надежда, что, может быть, только может быть, шрамы века унижений могут начать заживать хотя бы немного."

 YUN_rising_dragon_idea: "Восходящий дракон"
 YUN_rising_dragon_idea_desc: "Китай снова на пути к мировой арене! Люди вместе идут на фабрики и фермы, создавая гораздо более сильную нацию, чем когда-либо прежде; подобно дракону, мы снова явим нашу мощь миру!"

 YUN_awaken_tiger_idea: "Пробудившийся тигр"
 YUN_awaken_tiger_idea_desc: "Китай бросается на мир лучше и здоровее, чем когда-либо! Стабильность для китайского народа возвращается, великий знак того, что унижение, преследовавшее нас веками, наконец подходит к концу, и, возможно, этот век станет веком процветания, которым народ Китая будет наслаждаться долгие годы."

 YUN_revolutionary_economy_idea: "Революционная экономика"
 YUN_revolutionary_economy_idea_desc: "Три принципа люди носят в своих сердцах в повседневной жизни, так как без этих идей и видения Суня они были бы под контролем безразличных милитаристов и империалистов, которые эксплуатировали бы их ради собственной выгоды, поэтому народ стал авангардом нового революционного и сильного Китая."

 YUN_reformed_state_idea: "Реформированное государство"
 YUN_reformed_state_idea_desc: "Китайский народ теперь начинает наслаждаться своим правом на современную жизнь в новом Китае. Реформирование нормального общества, сравнимого с западными, укоренилось, и скоро люди и их дети больше не будут вынуждены просить милостыню или ополчаться друг на друга, а теперь будут наслаждаться гораздо более светлым будущим."

 YUN_state_intervention_idea: "Государственное вмешательство"
 YUN_state_intervention_idea_desc: "В связи с последними событиями государственное вмешательство в экономику стало необходимостью. Администрация будет поддерживать жесткий контроль и обеспечивать экономическую стабильность страны."

 YUN_reducing_foreign_reliance_idea: "Снижение иностранной зависимости"
 YUN_reducing_foreign_reliance_idea_desc: "Век унижений распространил раковое влияние иностранного империализма по всему Китаю. Теперь, имея в своем распоряжении необходимые средства, пришло время бороться с этим. Китайская экономика снова будет приносить пользу китайцам!"

 YUN_rail_spree_idea: "Железнодорожный бум"
 YUN_rail_spree_idea_desc: "Правительство объявило о масштабном строительстве железных дорог по всей стране, что значительно улучшит и оптимизирует межрегиональные связи и торговлю, еще больше стимулируя экономический рост."

 YUN_promoting_light_industry_idea: "Продвижение легкой промышленности"
 YUN_promoting_light_industry_idea_desc: "Планы теперь продвигаются к национальной легкой промышленности, которая остро нуждается в развитии и модернизации. Пусть люди знают, что даже наименее интенсивные отрасли не останутся без внимания во время программы развития."

 YUN_promoting_foreign_investment_idea: "Продвижение иностранных инвестиций"
 YUN_promoting_foreign_investment_idea_desc: "Используя статус Кантона как одного из передовых центров торговли в Китае, в регионе началось массовое продвижение иностранных инвестиций и урбанизации, что дало государству фору в экономическом развитии."

 YUN_friendly_but_free_idea: "Дружелюбный, но свободный"
 YUN_friendly_but_free_idea_desc: "Хотя иностранные инвестиции, несомненно, имеют первостепенное значение для экономики, необходимы большая осторожность и работа, чтобы это снова не превратилось в экономическую зависимость от иностранных империалистических держав."

 YUN_neighbourly_cooperation_idea: "Добрососедское сотрудничество"
 YUN_neighbourly_cooperation_idea_desc: "Торговые связи между Кантоном и Юньнанью теперь укрепляются еще больше, что оказывается настоящим благом для экономического роста. Китайские торговцы из двух регионов медленно строят лучшую страну рука об руку друг с другом."

 YUN_economic_integration_idea: "Экономическая интеграция"
 YUN_economic_integration_idea_desc: "Благодаря тому, что межрегиональная экономическая интеграция между Кантоном и Куньмином стала более продвинутой, чем когда-либо, экономика демонстрирует невиданные ранее уровни роста. Люди, естественно, взволнованы этой новой эрой постоянной межрегиональной торговли и процветания, и тем, что она принесет."

 YUN_land_to_the_tiller_idea: "Земля — пахарю"
 YUN_land_to_the_tiller_idea_desc: "Земля работает и развивается лучше у тех, кто ее использует, поэтому поощрение землевладельцев продавать свою собственность работникам, которые трудятся на этих сельскохозяйственных угодьях, принесет не только гораздо более здоровую экономику, но и гораздо более счастливых людей, которые могут зарабатывать прибыль и сохранять ее."

 YUN_selling_tea_and_silk_idea: "Продажа чая и шелка"
 YUN_selling_tea_and_silk_idea_desc: "С самого раннего возраста Китай был известен своим шелком и чаем, которые стали одними из крупнейших торговых товаров в мире, как, например, любовь римлян к шелку, который путешествовал по Шелковому пути Центральной Азии, а позже британский флот, который любил наш чай. Имеет смысл экспортировать их снова."

 YUN_stocking_grain_idea: "Запасание зерна"
 YUN_stocking_grain_idea_desc: "Голод является препятствием для нашего развития, поэтому фермеры теперь будут запасать излишки зерна, которые они производят, на будущее, чтобы мы могли предотвратить любые бедствия, которые могут разрушить Китай, и чтобы семьям Китая никогда не приходилось беспокоиться о том, как поставить еду на стол, а их дети никогда не знали жизни, состоящей из отхода ко сну с пустыми желудками."

 YUN_dual_policy_idea: "Двойная политика"
 YUN_dual_policy_idea_desc: "Правительство начало новую двойную политику: в то время как частные землевладельцы стимулируются через налоговые льготы, капитал одновременно вливается в правительственные проекты."

###- Phase 4 -###

 YUN_national_revolution_idea: "Национальная революция"
 YUN_national_revolution_idea_desc: "Идея национальной революции теперь движет всем: люди полностью преданы воплощению видения доктора Суня о Китае в реальность в соответствии с тремя принципами, его величайшим даром китайскому народу. Это особенно ощущается в головокружительных темпах экономического развития Китая, где экономика функционирует как стержень гармонии нации. Вместо того чтобы служить иностранному империализму и концессиям, экономика теперь служит процветанию Китая и его народа, гарантируя, что три принципа могут быть реализованы в полной мере, как и предполагал доктор Сунь."

 YUN_party_state_finance_idea: "Финансы партийного государства"
 YUN_party_state_finance_idea_desc: "Финансовый сектор теперь развивается невиданными ранее темпами благодаря омоложению партийным государством. В рамках великой революционной миссии Гоминьдан обеспечит финансовую стабильность Китая и его народа на все времена!"

 YUN_union_of_class_and_society_idea: "Союз класса и общества"
 YUN_union_of_class_and_society_idea_desc: "В Древнем Китае существовало четыре сословия: крестьяне, ремесленники, ученые и торговцы. Живя в полной гармонии друг с другом, они сотрудничали ради взаимной выгоды общества и нации, пока правительство гарантировало хорошее управление. Китай сам по себе всегда находится в уникальном положении для достижения революции к обществу, возглавляемому классами, без необходимости использовать классовую борьбу. Если мы хотим восстановить гармонию между классом и обществом, мы должны сначала восстановить взаимное уважение и любовь к ближнему и рабочему месту."

 YUN_achieving_minsheng_idea: "Достижение Миньшэна"
 YUN_achieving_minsheng_idea_desc: "Конечной целью китайской революции, а также движущей силой на протяжении всей истории всегда было стремление к «Народному благосостоянию», или Миньшэну. Все, что предпринимает партия, направлено на достижение этой конечной цели — предоставления народу благосостояния. Миньцзу и Миньцюань, Национализм и Демократия, в конечном итоге подчинены обязанностям государства по обеспечению Миньшэна для населения. В отличие от синдикализма и социализма, Миньшэн будет использовать революционную силу каждого класса, чтобы ограничить расширение власти любого класса и позволить государственной власти устранить даже само понятие класса."

 YUN_national_health_administration_idea: "Национальное управление здравоохранения"
 YUN_national_health_administration_idea_desc: "Детище Министерства здравоохранения, Национальное управление здравоохранения — это амбициозная попытка создать эффективную и проактивную национальную службу здравоохранения по всей стране. В рамках своего амбициозного трехлетнего плана НУЗ планирует значительно расширить свои медицинские учреждения в виде сельских медицинских пунктов и клиник, чтобы значительно улучшить качество жизни людей в этой стране. Особое внимание уделяется повышению качества жизни женщин и маленьких детей, чтобы предоставить столь необходимую материальную и женскую медицинскую помощь в сельской местности."

 YUN_the_new_life_movement_idea: "Движение за новую жизнь"
 YUN_the_new_life_movement_idea_desc: "Поскольку Национальное правительство теперь контролирует китайскую страну и завершило Северный поход, мы должны стремиться возродить и омолодить энергию, возрождая мораль конфуцианства и предписывая старомодные правила личного поведения. Это конфуцианство для масс, лишенное философских тонкостей, сведенное к его этическим основам, лозунговое конфуцианство, которое обеспечит потребление четырех добродетелей: благопристойности, справедливости, честности и самоуважения. Через 96 правил, регулирующих повседневное поведение, китайский народ должен быть проинструктирован, как быть пунктуальным, застегивать одежду, стоять прямо и не есть шумно. Чтобы восстановить нашу нацию и отомстить за наши унижения, нам нужно говорить не о ружьях и пушках, а сначала о том, чтобы умывать лицо холодной водой. Поступая так, мы сможем преобразить внутреннего человека и создать новое общество и более сильную нацию."

 YUN_daughters_of_a_new_china_idea: "Дочери Нового Китая"
 YUN_daughters_of_a_new_china_idea_desc: "Национальная революция — это не просто революция против империализма, это культурная революция, социальная революция, посвященная подъему всех угнетенных масс. Поскольку женщины действительно помогают держать небо, они являются неотъемлемым аспектом национальной революции. Однако западные распущенные нравы и пороки давно превратили женщин Китая в дегенеративное месиво, что должно быть решено новым институтом партийного правления. Мы должны поощрять женщин быть послушными, быть новыми матриархами невинных и революционных семей и помогать участвовать в военных усилиях."

 YUN_provisional_constitution_crisis_idea_1: "Вопрос о временной конституции"
 YUN_provisional_constitution_crisis_idea_1_desc: "Растущий раскол внутри правящего Гоминьдана между сторонниками президента Хэ Инциня и его противниками во главе с Ху Ханьминем обострился на фоне напряженности вокруг предлагаемой временной конституции. Растет чувство неопределенности относительно направления партии, и неясно, сможет ли Генералиссимус добиться своего на этот раз."

 YUN_provisional_constitution_crisis_idea_2: "Кризис временной конституции"
 YUN_provisional_constitution_crisis_idea_2_desc: "Растущий раскол с правящим Гоминьданом по поводу временной конституции завершился арестом Ху Ханьминя. Последующие беспорядки вынудили Хэ Инциня уйти в отставку, ввергнув партийное государство в хаос. Противоречивые приказы и жестокая внутренняя борьба подорвали функционирование правительства и моральный дух военных."

###- Military Ideas -###
 YUN_GXC_war_morale_idea_intro: "Начало войны между Юньнанью (Дянь) и Гуанси (Гуй) столкнуло две провинции в жестоком реванше их конфликта 1925 года. Юньнаньская армия, которая стремится пройти мимо Гуанси и дальше в Гуандун, должна перейти в наступление и захватить важные города, чтобы поддержать свое наступление до падения морального духа."
 YUN_GXC_war_morale_idea_1: "Дянь-Гуйская война: Полный крах"
 YUN_GXC_war_morale_idea_1_desc: "$YUN_GXC_war_morale_idea_intro$\n\nЮньнаньская армия на грани краха! Непрерывные поражения на поле боя вернули плохие воспоминания о прошлых неудачах. Юньнаньская армия на грани бегства, если что-то не изменится быстро!"
 YUN_GXC_war_morale_idea_2: "Дянь-Гуйская война: Падение боевого духа"
 YUN_GXC_war_morale_idea_2_desc: "$YUN_GXC_war_morale_idea_intro$\n\nУгасающая надежда среди Верховного командования Юньнаньской армии на быструю победу просочилась в низшие чины, поскольку мнения о войне портятся. Юньнаньской армии нужно переломить ситуацию, и быстро!"
 YUN_GXC_war_morale_idea_3: "Дянь-Гуйская война: Колеблющийся боевой дух"
 YUN_GXC_war_morale_idea_3_desc: "$YUN_GXC_war_morale_idea_intro$\n\nНеудачи на поле боя и неспособность нанести нокаутирующий удар, взяв Наньнин рано, уменьшили шансы Юньнаньской армии на быстрое разрешение. Теперь выросли опасения по поводу возможности затяжной войны."
 YUN_GXC_war_morale_idea_4: "Дянь-Гуйская война: Высокий боевой дух"
 YUN_GXC_war_morale_idea_4_desc: "$YUN_GXC_war_morale_idea_intro$\n\nДух Юньнаньской армии высок, и их солдаты уверены в своей способности выиграть этот бой. Учитывая пересеченную местность и упорство кланов Гуанси, им, безусловно, придется превзойти ожидания, если они хотят победить."
 YUN_GXC_war_morale_idea_5: "Дянь-Гуйская война: Дух 1915 года"
 YUN_GXC_war_morale_idea_5_desc: "$YUN_GXC_war_morale_idea_intro$\n\nИнициатива явно на стороне Юньнаньской армии, и, похоже, дорога в Гуанчжоу широко открыта!"

 YUN_autonomous_armies_level0: "Автономные армии"
 YUN_autonomous_armies_level0_desc: "Несмотря на все его позирование, сплочение и потрясание кулаками, власть Тан Цзияо над всегда свирепым милитаризмом Юньнани хрупка и ломка. Свергнутый Гу Пиньчжэнем в начале 1920-х годов, влияние Тан Цзияо так и не восстановилось, и контроль над его армиями медленно ускользал из его рук. Все больше полагаясь на бандитские армии и все больше удручаясь своими ближайшими командирами, такими как Лун Юнь или Ху Жоюй, состояние некогда гордой Юньнаньской армии плачевно. Местные командиры гарнизонов и генералы управляют своими раздробленными подразделениями как феодальными владениями, основанными на личной преданности, больше не присягая на верность провинциальному губернатору. Одичавший Король Юго-Запада — не более чем Король Куньмина, и даже это спорно."

 YUN_autonomous_armies_level1: "Автономные армии"
 YUN_autonomous_armies_level1_desc: "$YUN_autonomous_armies_level0_desc$"

 YUN_autonomous_armies_level2: "Автономные армии"
 YUN_autonomous_armies_level2_desc: "$YUN_autonomous_armies_level0_desc$"

 YUN_legacy_of_the_huguojun_level_1: "Наследие Хугоцзюнь"
 YUN_legacy_of_the_huguojun_level_1_desc: "Хугоцзюнь, или Армия защиты республики, были великими спасителями Республики во времена ее великой борьбы против Имперских амбиций. Вероломный Юань Шикай стремился разорвать с трудом завоеванные ценности Синьхайской революции, растоптать конституцию и объявить себя Императором Хунсянь. Но храбрые лидеры Юньнани встали против его стремления к автократии. Лян Цичао, Цай Э, Тан Цзияо, Ли Лецзюнь, Ян Сэнь, все эти храбрые люди — герои современного Китая, бросившие вызов армии Центрального правительства, торжествующие над такими, как У Пэйфу, Цао Кунь и Фэн Юйсян.\n\nБез сомнения, их храбрые победы не могли бы быть такими быстрыми, такими трудными, если бы не превосходная подготовка, энергия и преданность выпускников Куньминской военной академии. Снова время великого конфликта настигло нацию, и руководство Юньнани должно снова выступить, чтобы спасти нацию. Вспоминая славные дни Хугоцзюнь, Юньнаньская армия сосредоточена на отличной строевой подготовке, офицерах и командовании, а не на превосходном вооружении. Ибо если что-то и точно, так это то, что преданный милитаристский воинский дух может победить даже самую хорошо экипированную дивизию."

 YUN_legacy_of_the_huguojun_level_2: "Наследие Хугоцзюнь"
 YUN_legacy_of_the_huguojun_level_2_desc: "$YUN_legacy_of_the_huguojun_level_1_desc$"

 YUN_legacy_of_the_huguojun_level_3: "Наследие Хугоцзюнь"
 YUN_legacy_of_the_huguojun_level_3_desc: "$YUN_legacy_of_the_huguojun_level_1_desc$"

 YUN_rejuvenation_of_national_struggle_level_1: "Омоложение национальной борьбы"
 YUN_rejuvenation_of_national_struggle_level_1_desc: "С возвращением Гоминьдана к власти Национально-революционная армия получила вторую жизнь. Под влиянием как партии, так и клик Вампу, новая линия военной мысли родилась из неудач Северного похода и реалий ситуации. С их врагами, гораздо лучше оснащенными, хорошо снабжаемыми и, без сомнения, более многочисленными, Гоминьдан решил использовать свою самую большую силу: сам китайский народ. Сосредоточившись на ведении народной войны, Национально-революционная армия станет истинным проводником ярости народа.\n\nСосредоточившись на подвижных иррегулярных подразделениях в сочетании с партизанскими кампаниями преследования и используя любую возможность, чтобы склонить битвы и сражения в свою пользу, Национально-революционная армия сосредоточилась на ведении войны самым прагматичным образом. Идеализируя не контроль над городами или деревнями, а вместо этого полный контроль для полной победы, НРА надеется ускользнуть от своих более централизованных противников и переиграть их тактикой маневренной войны."

 YUN_rejuvenation_of_national_struggle_level_2: "Омоложение национальной борьбы"
 YUN_rejuvenation_of_national_struggle_level_2_desc: "$YUN_rejuvenation_of_national_struggle_level_1_desc$"

 YUN_rejuvenation_of_national_struggle_level_3: "Омоложение национальной борьбы"
 YUN_rejuvenation_of_national_struggle_level_3_desc: "$YUN_rejuvenation_of_national_struggle_level_1_desc$"

 YUN_baring_our_teeth_idea: "Оскаливание зубов"
 YUN_baring_our_teeth_idea_desc: "Юньнаньская армия может быть в упадке, но она не полностью выбыла из игры. С ограниченной возможностью все еще проецировать наше влияние за пределы наших де-факто границ, пришло время зверю пробудиться, обновить свои арсеналы и показать всем, почему Юньнань была Творцом королей Юго-Запада на протяжении последних десятилетий."

 YUN_vanquishing_personalism_idea: "Избавиться от персонализма"
 YUN_vanquishing_personalism_idea_desc: "Наши институты и армии изобилуют распадом, гнилью и коррупцией. Судьба, постигшая все армии милитаристов; бюрократия Юньнаньской армии считала себя невосприимчивой к такому посягательству ничтожных сил, и все же нынешнее состояние армии является достаточным доказательством нашего падения. Чтобы вырезать такую гниль, необходимо снова ввести частые ротации командования, обязать постоянное образование и учебу в Куньмине, а также консолидировать наш высший командный состав, удалив тех, кому были дарованы титулы для смягчения их политических амбиций."

 YUN_kunming_military_academy: "Куньминская военная академия"
 YUN_kunming_military_academy_desc: "Организованная Ху Цзинъи от имени губернатора Ван Вэньшао, Юньнаньская военная академия была официально провозглашена в августе 1909 года, первым генеральным управляющим стал Гао Эрдэн, а первым директором — Ли Гэньюань. С Ли, консолидирующим свою роль, заняв пост генерального управляющего, он сформировал курс учреждения по образцу Сикан Гакко, или Академии Императорской армии Японии. Приоритетом была жесткая, обширная подготовка, академия выпустила одни из лучших военных умов этой эпохи войн и считается одной из «Большой тройки главных военных академий» Китая.\n\nС девизом «Терпи трудности, в которых заключается основа реформ», репутация учреждения далеко идущая, получившая положительные отзывы как от факультетов Баодина, так и от Вампу. Обучение основано на более боевом содержании образования, ориентированном на военные исследования, строевую и полевую подготовку, с пехотным, кавалерийским, артиллерийским, инженерным и транспортным отделениями. Среди известных выпускников и инструкторов такие люди, как Цай Э, Тан Цзияо, Ли Лецзюнь, Ли Гэньюань, Лю Цуньхоу, Ян Цзе, Чжу Дэ, Чжу Пэйдэ, Лун Юнь и многие другие."

 YUN_kunming_military_academy_level_2: "Куньминская военная академия"
 YUN_kunming_military_academy_level_2_desc: "$YUN_kunming_military_academy_desc$"

 YUN_kunming_military_academy_level_3: "Куньминская военная академия"
 YUN_kunming_military_academy_level_3_desc: "$YUN_kunming_military_academy_desc$"

 YUN_ensuring_ideological_cohesion_idea: "Обеспечение идеологической сплоченности"
 YUN_ensuring_ideological_cohesion_idea_desc: "К нашему большому разочарованию, Юньнаньская армия является рассадником воинствующих идеологических приверженцев. Тех, кто служит себе, тех, кто предан идеалам Трех принципов, республиканизму, тех, кто аполитичен. Однако в первую очередь Юньнаньская армия — это военная сила, и она должна функционировать на основе того, что ей суждено достигать военных целей для выполнения политических. Прохождение периода идеологической чистки может быть вредным для нашего общего командования, но в долгосрочной перспективе это гарантирует, что политические перспективы нашего правительства будут осуществляться без сучка и задоринки."

 YUN_handling_overglorification_idea: "Борьба с чрезмерным прославлением"
 YUN_handling_overglorification_idea_desc: "За время своей деятельности Юньнаньская армия стала лишь бумажным фасадом своих славных дней. Более сосредоточенная на помпезных проявлениях высокомерия, парадных маршах, нарядной форме и гусином шаге, чем на полевой подготовке и учениях. Если мы хотим вернуться на позицию национальных чемпионов, пришло время отложить военную форму, медали и снова вернуться к приземленной репутации наших предков."

 YUN_dare_to_die_idea: "Корпус смертников"
 YUN_dare_to_die_idea_desc: "Спасение приходит не к тем, кто ждет, а к тем, кто готов отдать все: свои средства к существованию, свои семьи и, самое главное, свои жизни за свободу и вольность Китая. Когда звучит горн, и юньнаньский солдат встает, чтобы занять свою позицию в этот поворотный момент китайской истории, смелые и мужественные люди должны стремиться сформировать корпуса смертников по образцу мучеников восстания Двойной девятки, чтобы они тоже могли принести свои жизни в жертву за свободный Китай."

 YUN_to_bear_sacrifices_idea: "Нести жертвы"
 YUN_to_bear_sacrifices_idea_desc: "Если мы хотим по-настоящему маршировать за китайскую нацию и ее институты, нет большей силы для военного человека, чем способность терпеть страдания. Ибо если мы можем терпеть страдания, мы не можем проиграть, и победа — это лишь гарантия. Внушая этот дух не только нашим военным лидерам, но и нашему населению, мы можем породить собственное врожденное Бусидо Китая и стать непобедимыми."

 YUN_political_commissars_idea: "Политические комиссары"
 YUN_political_commissars_idea_desc: "Привязанные к постоянно расширяющейся армии, и с увеличением набора за пределами Юньнани, политические взгляды нашей армии становятся все более мутными. Хотя мы не склонимся к чистой политической индоктринации, наблюдаемой в армиях партийного государства, таких как НРА, зачисляя и назначая ряд политических комиссаров в подразделения, мы можем гарантировать, что новый Хугоцзюнь сохранит свой курс. Никогда мы не впадем в корыстную коррупцию, пока Китай верит в мощь своей армии, и если Китай действительно должен быть спасен армией, то образование масс должно начаться с вооруженных сил — чтобы они были действительно армией, посвященной делу милитаристского национального государства."

 YUN_prioritisation_of_military_victory_idea: "Возвышение военной победы"
 YUN_prioritisation_of_military_victory_idea_desc: "У Хугоцзюнь была одна цель, когда они объявили свой крестовый поход против Юань Шикая: военная победа. Ибо с военной победой их политические цели могут быть навязаны всей нации. Такая неустанная преданность военному успеху заставила наших людей пожертвовать всем, чтобы внести свой вклад в это, и если мы хотим преуспеть в Темный час Китая, нашим людям придется снова погибнуть ради блага нации."

 YUN_seizing_our_land_idea: "Захват нашей законной земли"
 YUN_seizing_our_land_idea_desc: "Слишком долго бирманцы удерживали законную китайскую землю, дарованную из-за слабости декадентской Цин. Если мы хотим быть истинными защитниками Китая, мы должны объединить все это, неважно, насколько малое. Дело Желтой книги, как оно стало известно, возможно, высмеивается иностранными державами, но для нас, китайцев, это просто исправление ситуации."

 YUN_officers_prerogative_idea: "Прерогатива офицера"
 YUN_officers_prerogative_idea_desc: "Подчеркивая инициативу и командную способность командиров низшего звена в Юньнаньской армии, высшее военное командование предоставило им возможность определять наилучший курс действий для достижения их тактических военных целей в соответствии с общей стратегической целью. Наши офицеры — наш самый сильный актив, и было бы разумно доверять их суждению."

 YUN_concentration_of_popular_will_idea: "Народное производство оружия"
 YUN_concentration_of_popular_will_idea_desc: "Очевидно, что китайский народ спешит поддержать наши армии на каждом шагу, однако нашим людям все еще не хватает ружей и вооружения. Если мы хотим по-настоящему выступить как защитники народа и его прав, мы должны мобилизовать их не только на полях, но и на заводах. Ибо каждая сделанная пуля — это еще один побежденный угнетатель воли народа."

 YUN_frontlines_everywhere_idea: "Линия фронта повсюду"
 YUN_frontlines_everywhere_idea_desc: "Недостаточно, чтобы потенциальные захватчики вступали в бой с нашими военными силами в прямом бою, они также должны иметь дело с мобилизацией партизанских отрядов в их тылу. Чем глубже они продвигаются на нашу территорию, тем более хрупкими становятся их линии снабжения, и тем смелее становятся наши партизаны. Постоянно мы будем вести полную и абсолютную народную войну против захватчиков."

 YUN_lower_level_autonomy_idea: "Юньнаньский Ауфтрагстактик"
 YUN_lower_level_autonomy_idea_desc: "Ауфтрагстактик, или тактика выполнения задач, — это метод командования, практикуемый путем делегирования младшим военным руководителям четко определенной стратегической цели, временных рамок и необходимых сил для выполнения указанной цели, оставляя выполнение и наилучшее применение предоставленных ресурсов на их усмотрение. Наши военные теоретики изучали Вельткриг, и превосходные результаты Немецкой имперской армии были частично обусловлены их делегированием командования. Чтобы повторить их успехи, мы будем использовать наш собственный уровень автономии младших офицеров."

 YUN_a_hundred_regiments_idea: "Наступление ста полков"
 YUN_a_hundred_regiments_idea_desc: "Кампания, разработанная нашими величайшими военными теоретиками и стратегами, высшее военное командование набросало амбициозный и обширный план, требующий всего сто полков. С сотней полков наша армия может уничтожить любого захватчика или противника, независимо от их силы. Выдвигая вперед великую мощь и дух китайской нации, наши враги обязательно сожмутся в полном ужасе."

 YUN_the_lightning_school_idea: "Школа «Молния»"
 YUN_the_lightning_school_idea_desc: "Вразрез с традиционными морскими кликами Фуцзяни и Шаньдуна, недавно основанная школа «Молния» — это учебная школа, основанная бесстрашным адмиралом Оуян Гэ. Однако, фактически не находясь под собственной юрисдикцией, школа «Молния» является подразделением Куньминской военной академии и рассматривается традиционным военно-морским штабом просто как «Куньминская военная академия флота». Надеясь стимулировать новую возрожденную военно-морскую традицию для китайского народа, она специализируется на совместных военно-морских и сухопутных операциях и восхвалении исключительного лидерства для адмиралтейства."

 YUN_republic_of_china_navy_level_2: "ВМС Китайской Республики"
 YUN_republic_of_china_navy_level_2_desc: "Предшественник современного китайского республиканского флота восходит к ранним дням Синьхайской революции, когда Министерство флота было сформировано во Временном правительстве Китайской Республики. Бывший адмирал династии Цин Лю Гуаньсюн стал первым министром флота в этот бурный период. После Эры милитаристов и последующей Реставрации Сюаньтун многие элементы ВМС Китайской Республики бежали на юг в оплоты Гоминьдана и федералистов, в то время как многие другие предпочли остаться верными правительству в Пекине. Когда китайская страна, наконец, номинально объединена под одним знаменем, снова пришло время оживить и восстановить ВМС Китайской Республики, чтобы они были действительно достойны защиты великих морских интересов Китая."

 YUN_republic_of_china_navy_level_3: "ВМС Китайской Республики"
 YUN_republic_of_china_navy_level_3_desc: "$YUN_republic_of_china_navy_level_2_desc$"

 YUN_republic_of_china_navy_export_militarism: "Флот экспортного милитаризма"
 YUN_republic_of_china_navy_export_militarism_desc: "Предшественник современного китайского республиканского флота восходит к ранним дням Синьхайской революции, когда Министерство флота было сформировано во Временном правительстве Китайской Республики. Бывший адмирал династии Цин Лю Гуаньсюн стал первым министром флота в этот бурный период. После Эры милитаристов и последующей Реставрации Сюаньтун многие элементы ВМС Китайской Республики бежали на юг в оплоты Гоминьдана и федералистов, в то время как многие другие предпочли остаться верными правительству в Пекине. Когда китайская страна, наконец, номинально объединена под одним знаменем, снова пришло время оживить и восстановить ВМС Китайской Республики, чтобы они были действительно достойны защиты великих морских интересов Китая.\n\nТеперь, когда флот Республики снова в полной боевой готовности, пришло время, чтобы юньнаньский дух экспортного милитаризма ощущался по всему миру. Где бы ни находились китайские интересы, его военные силы обязательно последуют за ними по пятам. Ибо, хотя нация может быть единой, юньнаньское бусидо проникло во все аспекты ее военной жизни."

 YUN_republic_of_china_navy_national_protectors: "Флот национальных защитников"
 YUN_republic_of_china_navy_national_protectors_desc: "Предшественник современного китайского республиканского флота восходит к ранним дням Синьхайской революции, когда Министерство флота было сформировано во Временном правительстве Китайской Республики. Бывший адмирал династии Цин Лю Гуаньсюн стал первым министром флота в этот бурный период. После Эры милитаристов и последующей Реставрации Сюаньтун многие элементы ВМС Китайской Республики бежали на юг в оплоты Гоминьдана и федералистов, в то время как многие другие предпочли остаться верными правительству в Пекине. Когда китайская страна, наконец, номинально объединена под одним знаменем, снова пришло время оживить и восстановить ВМС Китайской Республики, чтобы они были действительно достойны защиты великих морских интересов Китая.\n\nТеперь, когда флот Республики снова в полной боевой готовности, пришло время, чтобы юньнаньский дух Национальной защиты стал авангардом великого побережья Китая. Никогда больше другой военно-морской силе, будь то японская, немецкая, русская или иная, не будет позволено высаживать свои сухопутные войска на нашей территории или заставлять нас снова кланяться их требованиям. Сильный флот защитит свой сильный народ."

 YUN_republic_of_china_air_force_level_1: "ВВС Китайской Республики"
 YUN_republic_of_china_air_force_level_1_desc: "Хотя первоначальные воздушные операции начались с пекинского аэродрома Наньюань династии Цин, ВВС Китайской Республики обязаны своим происхождением различным независимым воздушным программам, предложенным и распространенным местными милитаристами и Центральным правительством. С нашей промышленной и военной мощью, более сильной, чем когда-либо прежде, задача теперь возложена на нас — продолжить наследие, оставленное теми, кто был до нас, и создать по-настоящему мощные и современные военно-воздушные силы для китайского народа."

 YUN_republic_of_china_air_force_level_2: "ВВС Китайской Республики"
 YUN_republic_of_china_air_force_level_2_desc: "$YUN_republic_of_china_air_force_level_1_desc$"

 YUN_republic_of_china_air_force_level_3: "ВВС Китайской Республики"
 YUN_republic_of_china_air_force_level_3_desc: "$YUN_republic_of_china_air_force_level_1_desc$"

 YUN_republic_of_china_air_force_level_4: "ВВС Китайской Республики"
 YUN_republic_of_china_air_force_level_4_desc: "$YUN_republic_of_china_air_force_level_1_desc$"

 YUN_national_military_aviation_programme: "Национальная программа военной авиации"
 YUN_national_military_aviation_programme_desc: "С нашими возобновленными усилиями по развитию нашей собственной внутренней авиационной промышленности и академии правительство все еще находит общее количество самолетов в нашем небе и на аэродромах крайне недостаточным для защиты нации. Через еще одно оживленное усилие, с акцентом на оптимизацию защиты, пусть китайские ВВС всегда внушают страх и восхищение!"

 YUN_scorched_earth_idea: "Выжженная земля"
 YUN_scorched_earth_idea_desc: "Хотя нас могут превзойти в обычном бою, мы гордимся необъятностью нашей великой страны. На протяжении веков варварские нации всегда смотрели на Китай своими алчными взглядами, и снова и снова, от монголов до маньчжуров, мы показывали иностранным захватчикам трудности в коммуникациях и логистике, чем дальше они продвигаются в нашу страну. Поскольку мы в настоящее время терпим военные неудачи, растет число голосов в военном командовании, выступающих за намеренное разрушение мостов, ферм и всего, что может быть полезно врагу — в надежде замедлить их продвижение и измотать их силы."

 YUN_circumnavigating_the_blockade_idea: "Прорыватели блокады"
 YUN_circumnavigating_the_blockade_idea_desc: "Наши драгоценные конвои везут людей и ресурсы, отчаянно необходимые для удовлетворения потребностей как фронта, так и тыла. В ситуациях, когда враг имеет преимущество и блокировал наши пути, мы должны искать усилия, чтобы обойти и избежать их кораблей с помощью наших собственных более быстрых кораблей."

 YUN_a_fleet_in_six_years_idea: "Флот за шесть лет"
 YUN_a_fleet_in_six_years_idea_desc: "Амбициозная «Шестилетняя программа» направлена на быстрое развитие военно-морских производственных возможностей Китая. Хотя большинство китайских кораблей на протяжении многих лет были либо реликвиями, либо иностранными покупками, как часть возрождения нации — неизбежно, что мы стремимся модернизировать наши стандарты военно-морского производства до стандартов Запада или Японии. Используя огромные людские ресурсы нации, наши верфи будут постоянно заполнены переоборудованными и новыми военными кораблями."

 YUN_support_inc_idea: "Поддержка Индокитайской революции"

 YUN_hundred_years_of_resistance_idea: "Столетняя война сопротивления"
 YUN_hundred_years_of_resistance_idea_desc: "Наша страна слаба после многих лет дестабилизирующей внутренней политики и внутренних войн, недостаток, которым враг, скорее всего, попытается воспользоваться. Мы должны сопротивляться, как это возможно, будь то принятие тактики выжженной земли или самоубийственной тактики; используя огромные размеры и людские ресурсы Китая, чтобы замедлить и измотать врага истощением — в надежде, что мы сможем контратаковать."

###- Political Ideas -###
 YUN_unrest_in_kunming_level_1: "Беспорядки в Куньмине"
 YUN_unrest_in_kunming_level_1_desc: "Куньмин всегда был центром революции и реакции в Юньнани, резиденцией власти старой Имперской администрации и источником крупных городских беспорядков. В то время как небольшие города, такие как Тэнъюэ и Мэнцзы, часто быстро подпадали под влияние радикального Тунмэнхоя, Куньмин обычно намечает более консервативный курс и является полезным барометром для направления провинции.\n\nЮньнаньская армия привыкла доминировать в политике города, но раньше ей бросали вызов студенты и коммерческий класс. Власть Тан Цзияо над провинцией, которая ранее отражала вызовы со стороны Гоминьдана и высокомерных подчиненных в 1920-х годах, может быть не такой сильной, как кажется."

 YUN_unrest_in_kunming_level_2: "Хаос в Куньмине"
 YUN_unrest_in_kunming_level_2_desc: "Куньмин всегда был центром революции и реакции в Юньнани, резиденцией власти старой Имперской администрации и источником крупных городских беспорядков. В то время как небольшие города, такие как Тэнъюэ и Мэнцзы, часто быстро подпадали под влияние радикального Тунмэнхоя, Куньмин обычно намечает более консервативный курс и является полезным барометром для направления провинции.\n\nКрах мировой экономики и Лиги восьми провинций вызвал всплеск беспорядков среди недавно ставших безработными, националистических студентов и паникующего коммерческого класса. Юньнаньская армия, часто колеблющаяся в своей поддержке администрации Тан Цзияо, начала выражать сомнения."

 YUN_dian_qian_divide_1: "Раскол Дянь-Цянь"
 YUN_dian_qian_divide_1_desc: "Дянь, относящееся как к древнему царству Дянь наряду с народом Дянь, так и к современному озеру Дянь, расположенному рядом с Куньмином, является одноименным сокращенным обозначением для провинции Юньнань. Происходящее от древнего и вымершего народа Бо, обычно подразумевается, что оно означает «Бассейн», и использовалось со времен династии Хань для обозначения этой области. Точно так же Цянь может проследить свое происхождение до периода Сражающихся царств и династии Цинь, где регион обычно назывался «Цяньчжун», или «Средний Цянь». Получив дальнейшее звание «Префектура Цяньчжун» в Цинь, оно закрепило неофициальное сокращение для Гуйчжоу.\n\nВсегда неурегулированные, хрупкие и враждебные отношения. Ситуация между Юньнанью и Гуйчжоу была легендарной, трудной. Поскольку Тан Цзияо когда-то носил титул губернатора Гуйчжоу — после насильственного изгнания предыдущего губернатора, Тан Цзиньчэна — Гуйчжоу навсегда суждено было находиться в прямой сфере влияния клики Юньнань. Переходя из рук в руки между Старой и Новой кликами Гуйчжоу по указанию Юньнани и других игроков Юго-Запада, текущая ситуация в Гуйчжоу готова взорваться. С Гуйчжоу, разделенной в руках остатков Национально-революционной армии и де-юре под эгидой Юань Цзумина, ни одна из сторон не имеет позитивного взгляда на Куньмин."

 YUN_dian_qian_divide_2: "Противостояние Дянь-Цянь"
 YUN_dian_qian_divide_2_desc: "Дянь, относящееся как к древнему царству Дянь наряду с народом Дянь, так и к современному озеру Дянь, расположенному рядом с Куньмином, является одноименным сокращенным обозначением для провинции Юньнань. Происходящее от древнего и вымершего народа Бо, обычно подразумевается, что оно означает «Бассейн», и использовалось со времен династии Хань для обозначения этой области. Точно так же Цянь может проследить свое происхождение до периода Сражающихся царств и династии Цинь, где регион обычно назывался «Цяньчжун», или «Средний Цянь». Получив дальнейшее звание «Префектура Цяньчжун» в Цинь, оно закрепило неофициальное сокращение для Гуйчжоу.\n\nВсегда неурегулированные, хрупкие и враждебные отношения. Ситуация между Юньнанью и Гуйчжоу была легендарной, трудной. Поскольку Тан Цзияо когда-то носил титул губернатора Гуйчжоу — после насильственного изгнания предыдущего губернатора, Тан Цзиньчэна — Гуйчжоу навсегда суждено было находиться в прямой сфере влияния клики Юньнань. С крахом номинальной власти Куньмина над радикальными национально-революционными остатками в Гуйчжоу, похоже, что Гоминьдан и клики Юньнань готовятся к противостоянию «пан или пропал», чтобы решить судьбу провинций и, возможно, будущее самой нации."

 YUN_dian_qian_divide_3: "Дянь-Цянь усмирен"
 YUN_dian_qian_divide_3_desc: "Дянь, относящееся как к древнему царству Дянь наряду с народом Дянь, так и к современному озеру Дянь, расположенному рядом с Куньмином, является одноименным сокращенным обозначением для провинции Юньнань. Происходящее от древнего и вымершего народа Бо, обычно подразумевается, что оно означает «Бассейн», и использовалось со времен династии Хань для обозначения этой области. Точно так же Цянь может проследить свое происхождение до периода Сражающихся царств и династии Цинь, где регион обычно назывался «Цяньчжун», или «Средний Цянь». Получив дальнейшее звание «Префектура Цяньчжун» в Цинь, оно закрепило неофициальное сокращение для Гуйчжоу.\n\nВсегда неурегулированные, хрупкие и враждебные отношения. Ситуация между Юньнанью и Гуйчжоу была легендарной, трудной. Поскольку Тан Цзияо когда-то носил титул губернатора Гуйчжоу — после насильственного изгнания предыдущего губернатора, Тан Цзиньчэна — Гуйчжоу навсегда суждено было находиться в прямой сфере влияния клики Юньнань. Когда пушки замолчали, и люди снова вышли из своих домов, стало очевидно, что отношения между двумя соседними провинциями урегулированы. Поскольку власть, несомненно, сместилась в сторону Куньмина, Гуйчжоу снова оказывается пешкой хозяев в другом месте."

 YUN_dian_qian_divide_4_contender: "Наследие Национальной защиты"
 YUN_dian_qian_divide_4_contender_desc: "Снова ставшие арбитрами спасения нации, совместные усилия Юньнань-Гуйчжоу привели к тому, что их влияние проецируется далеко за пределы просто Юго-Запада. Доморощенное движение, ставшее серьезным претендентом на национальное объединение, напоминает дни великих национальных потрясений, когда храбрые люди Войны в защиту республики отправились сплотить страну для ее спасения. Снова маршируя от Куньмина до Пекина, судьба китайской нации снова прикована к эгиде исключительных людей Куньмина и Гуйяна. Всегда в авангарде, нация никогда не падет, пока ее защитники всегда бдительны."

 YUN_dian_qian_divide_4_satellite: "Короли Юго-Запада"
 YUN_dian_qian_divide_4_satellite_desc: "Помогши в национальном объединении Китая, Куньмин снова закрепил за собой статус «Королей Юго-Запада». Подобно 1920-м годам, сама судьба региона покоится на покровительстве и прихотях, дарованных [YUN.GetLeader]. С их влиянием, достигающим Хунани, Сычуани, Гуйчжоу, Гуанси и Гуандуна, возник серьезный силовой блок, даже при номинальном объединении, похоже, что Юньнань остается творцом королей еще некоторое время."

###- KMT Political Ideas -###

 YUN_KMT_popular_support_desc: "Гоминьдан может иметь демократические и популистские идеалы, но ему предстоит долгий путь к воплощению этих идеалов в реальность. Для народа Китая множество мечтателей приходили и уходили со своими утопическими обещаниями, и немногие их выполняли. Победы на поле боя могут доказать упорство Гоминьдана и, возможно, могут объединить Китай под его знаменем, но если они хотят по-настоящему завоевать сердца людей, они должны сначала спасти угнетенных простолюдинов от их вечных распрей."

 YUN_KMT_popular_support_1: "[YUN_KMT_popular_Support_1_scripted_loc]"
 YUN_KMT_popular_support_1_desc: "$YUN_KMT_popular_support_desc$\n\nЗахват Гоминьданом Куньмина привел Юньнань под их контроль с молчаливого согласия Юньнаньской армии и местного истеблишмента. Это позволило Гоминьдану добавить к своей череде юго-западных оплотов и дать им плацдарм для переноса революции в остальную часть Китая. Однако, находясь под доминированием милитаристов и Национально-революционной армии, вера народа в Юньнаньское революционное движение ничтожна."

 YUN_KMT_popular_support_2: "[YUN_KMT_popular_Support_2_scripted_loc]"
 YUN_KMT_popular_support_2_desc: "$YUN_KMT_popular_support_desc$\n\nСо стабилизацией режима Национально-революционной армии в Юньнани люди привыкли как к марширующим солдатам, так и к вечному пристальному взгляду милитаристов. Медленно завоевывая сердце народа столь необходимыми реформами, правительство стабилизируется, несмотря на новые вызовы на горизонте, как внутренние, так и внешние."

 YUN_KMT_popular_support_3: "[YUN_KMT_popular_Support_3_scripted_loc]"
 YUN_KMT_popular_support_3_desc: "$YUN_KMT_popular_support_desc$\n\nВозвращая мантию, которой они когда-то обладали накануне Северного похода, Национально-революционная армия и новое омоложенное крыло партии снова начали рассматриваться как спасители китайской нации и народа. По мере того как Национальная революция продвигается вперед, люди все больше принимают и осознают свою роль в ней."

 YUN_KMT_popular_support_4: "[YUN_KMT_popular_Support_4_scripted_loc]"
 YUN_KMT_popular_support_4_desc: "$YUN_KMT_popular_support_desc$\n\nС их доминированием, почти полным по составу, Китайский Гоминьдан снова восстановил свою позицию арбитров народной борьбы. Никогда больше они не впадут в такую слабость, такую хрупкость, которая постигла их при хаотичном распаде Национально-революционной армии в 1927 году."

 YUN_KMT_popular_support_5: "[YUN_KMT_popular_Support_5_scripted_loc]"
 YUN_KMT_popular_support_5_desc: "$YUN_KMT_popular_support_desc$\n\nПровозглашаемые истинными спасителями, истинными воинами народа, Гоминьдан больше не выскочки, больше не просто призрак из прошлого, возрожденный, чтобы причинить Китаю больше потрясений. Они — законное, национальное правительство, воспринимаемое многими как единственное истинное правительство для китайского народа. Мученики прошлого, ваши жертвы никогда не были напрасными, ибо Белое Солнце в Синем Небе ярко сияет над Совершенно Красной Землей."

 YUN_KMT_popular_support_ccc_idea: "Легитимность Партии: §aК лучезарному будущему§!"
 YUN_KMT_popular_support_ccc_idea_desc: "$YUN_KMT_popular_support_desc$\n\nНе случайно нация и партия почти впали в моральное вырождение и паразитов изнутри. И все же при этой новой реорганизации Гоминьдана мы теперь стремимся с всегда сильным виталистическим прогрессом к истинно моральной нации верующих в волю и идеалы Партии. Этот новый Китай превзойдет Китай славы прошлого, вступив в новое светлое будущее под Белым Солнцем, в котором соединенная ответственность граждан в сочетании с технологическими ноу-хау приведет Национальную революцию к поистине яркому будущему."

 YUN_KMT_popular_support_dai_jitao_idea: "Легитимность Партии: §PДуховное спасение нации§!"
 YUN_KMT_popular_support_dai_jitao_idea_desc: "$YUN_KMT_popular_support_desc$\n\nДолгое время Гоминьдан был разделен своими либеральными перебежчиками и левыми фракционными агитаторами, но теперь партия объединилась под единой истинной линией доктрины, интерпретируемой не кем иным, как президентом Дай Цзитао. Для президента победа Новых правых обеспечит логическое соединение между мудрецами прошлых веков, такими как Конфуций, и доктором Сунь Ятсеном. Достигая этого логического вывода, нужно смотреть в сторону духовного и морального спасения нации, люди должны усвоить, что они будут ведомы и управляемы под бдительным оком и разумом национального тела, чтобы можно было достичь истинной демократии и свободы."

 YUN_KMT_popular_support_socialist_chen_cheng_idea: "Легитимность Партии: §SНарод и крестьянство ликуют!§!"
 YUN_KMT_popular_support_socialist_chen_cheng_idea_desc: "$YUN_KMT_popular_support_desc$\n\nСлишком долго партия теряла свой путь, все больше раскалываясь из-за внутренней борьбы с автократическими милитаристами и либеральными перебежчиками. Направленная на тропу войны за объединение без большего плана, увещевая страдания народа ради военных усилий. И все же среди милитаристов Вампу остался один пионер. Один человек, способный контролировать синтез всеобъемлющей Партии. При централизованном режиме «Маленького» генералиссимуса Чэнь Чэна слава и идеалы «Красного генерала» Чан Кайши и «Красного Наполеона» Дэн Яньда увидят свое воплощение. Под руководством новой партии развитие национальной экономики и народного благосостояния откроет путь к гарантии развития политической демократии. Революционная экономика, работающая на трудящихся, а не на владельцев, находится всего в одном шаге."

 YUN_KMT_popular_support_chen_cheng_idea: "Легитимность Партии: §PНациональная революция будущего§!"
 YUN_KMT_popular_support_chen_cheng_idea_desc: "$YUN_KMT_popular_support_desc$\n\nВ финальном пути против путей старого, молодая гвардия действительно торжествует! Больше не сдерживаемая махинациями тех, кто верит в догматизм, или тех, кто склонен к ортодоксии или социализму вместо немедленных прагматичных действий. Узко следуя обоими путями, генералиссимус Чэнь Чэн руководил возрождением Новых правых в существо будущего. При его централистском режиме Китай предвидит десятилетие славного процветания под руководством «Маленького» генералиссимуса. Поклявшись, что он сломает циклический характер войны и мира в Китае посредством обширных усилий по земельной реформе, Чэнь стремится, наконец, решить проблему более тысячелетия вечных страданий для Китайской нации."

 YUN_KMT_popular_support_peoples_generalissimo_idea: "Легитимность Партии: §SНародный Генералиссимус§!"
 YUN_KMT_popular_support_peoples_generalissimo_idea_desc: "$YUN_KMT_popular_support_desc$\n\nКарточный домик генералиссимуса Хэ Инциня поистине ощутим. Оставшись без опыта в политическом управлении, как у его дорогого друга Чана, новый генералиссимус, несомненно, доказал неправоту своих критиков. Управляя не только Третьей армией, но и Гражданскими фракциями, Кликами Вампу и престижными Старыми правыми, Хэ действительно возвысился до управления нацией. Под его бдительным руководством и его группой одних из самых передовых идеологов и архитекторов Новых правых спасение китайской нации почти гарантировано. Полагаясь на загадочного «Маленького генералиссимуса» и его Клику гражданского строительства, Вампу обязательно приведет нацию к Народному режиму, заботящемуся только о ее интересах."

 YUN_KMT_popular_support_revolutionary_generalissimo_idea: "Легитимность Партии: §aРеволюционный Генералиссимус§!"
 YUN_KMT_popular_support_revolutionary_generalissimo_idea_desc: "$YUN_KMT_popular_support_desc$\n\nКарточный домик генералиссимуса Хэ Инциня поистине ощутим. Оставшись без опыта в политическом управлении, как у его дорогого друга Чана, новый генералиссимус, несомненно, доказал неправоту своих критиков. Управляя не только Третьей армией, но и Гражданскими фракциями, Кликами Вампу и престижными Старыми правыми, Хэ действительно возвысился до управления нацией. Под его бдительным руководством и его группой одних из самых передовых идеологов и архитекторов Новых правых спасение китайской нации почти гарантировано. При поддержке великого архитектора Новых правых Дай Цзитао и всей мощи Центрального клуба, Вампу почти гарантировал построение тонко спроектированного китайского будущего. Такого, в котором спасение и прогресс нации удерживаются в тотальности."

 YUN_KMT_popular_support_lucky_generalissimo_idea: "Легитимность Партии: §PУдачливый Генералиссимус§!"
 YUN_KMT_popular_support_lucky_generalissimo_idea_desc: "$YUN_KMT_popular_support_desc$\n\nКарточный домик генералиссимуса Хэ Инциня поистине ощутим. Оставшись без опыта в политическом управлении, как у его дорогого друга Чана, новый генералиссимус, несомненно, доказал неправоту своих критиков. Управляя не только Третьей армией, но и Гражданскими фракциями, Кликами Вампу и престижными Старыми правыми, Хэ действительно возвысился до управления нацией. Под его бдительным руководством и его группой одних из самых передовых идеологов и архитекторов Новых правых спасение китайской нации почти гарантировано. Не имея абсолютно равных на китайском политическом поле битвы, генералиссимус Хэ руководил осторожно управляемым Партийным государством. Таким, в котором ни одна фракция не является слишком сильной или слишком доминирующей. Все обязаны верностью Генералиссимусу, они враждуют друг с другом, ожидая от него благосклонности. Поистине Хэ Инцинь — одна из самых удачливых фигур, вышедших из Эры милитаристов."

 YUN_KMT_popular_support_liberal_generalissimo_idea: "Легитимность Партии: §mЛиберальный Генералиссимус§!"
 YUN_KMT_popular_support_liberal_generalissimo_idea_desc: "$YUN_KMT_popular_support_desc$\n\nКарточный домик генералиссимуса Хэ Инциня поистине ощутим. Оставшись без опыта в политическом управлении, как у его дорогого друга Чана, новый генералиссимус, несомненно, доказал неправоту своих критиков. Управляя не только Третьей армией, но и Гражданскими фракциями, Кликами Вампу и престижными Старыми правыми, Хэ действительно возвысился до управления нацией. Под его бдительным руководством и его группой одних из самых передовых идеологов и архитекторов Новых правых спасение китайской нации почти гарантировано. Прислушиваясь к идеологам, технократам и государственным служащим технократической Клики политической науки, Хэ Инцинь увидел грандиозный размах амбициозного экономического планирования и умеренной политической либерализации для китайского народа. В то время как статус Опеки обсуждается, участие Данвай и других политиков в управлении государством может привести только к процветающему прогрессу в китайском будущем."

 YUN_KMT_popular_support_blueshirt_generalissimo_idea: "Легитимность Партии: §nГенералиссимус Синерубашечников§!"
 YUN_KMT_popular_support_blueshirt_generalissimo_idea_desc: "$YUN_KMT_popular_support_desc$\n\nКарточный домик генералиссимуса Хэ Инциня поистине ощутим. Оставшись без опыта в политическом управлении, как у его дорогого друга Чана, новый генералиссимус, несомненно, доказал неправоту своих критиков. Управляя не только Третьей армией, но и Гражданскими фракциями, Кликами Вампу и престижными Старыми правыми, Хэ действительно возвысился до управления нацией. Под его бдительным руководством и его группой одних из самых передовых идеологов и архитекторов Новых правых спасение китайской нации почти гарантировано. Уполномочивая скрытное, радикальное и националистическое Общество синерубашечников, Национальная революция Хэ Инциня взяла курс на полное и абсолютное повиновение Генералиссимусу. Непоколебимо китайский народ должен почитать его и Синерубашечников за их мудрое руководство. Ибо китайский Савинков, ибо только Хэ Инцинь, может открыть Новую Жизнь, Новую Эру для китайского народа. Под началом Генералиссимуса, и только Генералиссимуса, китайский народ может достичь Национального спасения."

 YUN_KMT_popular_support_blueshirt_revolution_idea: "Легитимность Партии: §nПартийное государство абсолютной чистоты§!"
 YUN_KMT_popular_support_blueshirt_revolution_idea_desc: "$YUN_KMT_popular_support_desc$\n\nКитайская нация во всей своей полноте — это высшая, священная и уникальная сущность. Обязанный тысячелетней историей, долг человека — полностью посвятить себя защите государственности нации. Отказываясь от всех махинаций эгоистичного западного своекорыстия и упадка. Партия Старого полностью отбросила любые претензии на работу для масс, полностью развеяв их надежды. Далекое от масс, ненавидимое массами, только Общество синерубашечников могло руководить его возрождением. Ибо партию нужно чтить, ибо государство почитаемо. Упадок, бессилие и смута Старой партии — это вина не наших дорогих товарищей по оружию, а плохих методов, несовершенной системы и бессодержательного наполнения. Под началом Синерубашечников будущее Китая будет идеально организовано. Наш народ никогда не будет голодать, но он никогда не впадет в заблуждения жадности и богатства. Идеальная, чистая утопия при Партийном государстве Гоминьдан."

 YUN_KMT_popular_support_correspondence_of_the_liberals_idea: "Легитимность Партии: §mВерховенство технократов§!"
 YUN_KMT_popular_support_correspondence_of_the_liberals_idea_desc: "$YUN_KMT_popular_support_desc$\n\nВ том, что, возможно, можно считать пятой попыткой ухватиться за анналы власти в Китайской Нации, похоже, что Клика политической науки наконец-то обеспечила себе постоянное место в нации. Провозглашая новую эру этатистского экономического планирования под эгидой Нового Департамента политической науки, Клика принесла умеренную либерализацию для китайского народа. Какими бы мягкими они ни казались на поверхности, новые китайские «Гэнро» наверняка будут тщательно культивировать эру технократического правления, несмотря на то, что статус Опеки горячо оспаривается. С включением Данвай и других политических движений в повседневное управление государством прекрасная клумба демократии наверняка будет посажена в диалоге технократов, бюрократов и финансовой элиты."

 YUN_KMT_popular_support_heirs_to_the_orthodox_idea: "Легитимность Партии: §cНаследники Ортодоксов§!"
 YUN_KMT_popular_support_heirs_to_the_orthodox_idea_desc: "$YUN_KMT_popular_support_desc$\n\nВозможно, одна из самых упускаемых из виду фракций Национально-революционной армии, 3-я армия НРА оказалась самой важной. Собрав силы разрозненных остатков Великого похода в Гуйчжоу, командующий 3-й армией Чжу Пэйдэ руководил реорганизацией, консолидацией и восстановлением Гоминьдана в провинции. Столкнувшись с угрозами со всех сторон, твердое руководство Чжу позволило Партии обеспечить безопасность провинции Юньнань, а позже и нации. Маршируя из Куньмина подобно своему учителю Цай Э, Чжу в конечном итоге сделал то, что не смог Цай, объединив нацию под своей эгидой. Твердо связанный с ортодоксальными суньистами партии, Чжу поддержал возвращение «Московской клики» к национальной известности через включение Ху Ханьминя в национальное управление. Теперь правя с самым ортодоксальным и принципиальным государственным деятелем нации, у Чжу и Ху есть обязанности, которые нужно выполнить."

 YUN_KMT_popular_support_reform_through_hardship_idea: "Легитимность Партии: §mРеформа через трудности§!"
 YUN_KMT_popular_support_reform_through_hardship_idea_desc: "$YUN_KMT_popular_support_desc$\n\nВозможно, одна из самых упускаемых из виду фракций Национально-революционной армии, 3-я армия НРА оказалась самой важной. Собрав силы разрозненных остатков Великого похода в Гуйчжоу, командующий 3-й армией Чжу Пэйдэ руководил реорганизацией, консолидацией и восстановлением Гоминьдана в провинции. Столкнувшись с угрозами со всех сторон, твердое руководство Чжу позволило Партии обеспечить безопасность провинции Юньнань, а позже и нации. Маршируя из Куньмина подобно своему учителю Цай Э, Чжу в конечном итоге сделал то, что не смог Цай, объединив нацию под своей эгидой. В конечном итоге национальное объединение не стало игрой Чжу, так как после растущей зависимости от Клики политической науки для поддержки его правительства внутренние партийные выборы привели к его свержению во имя революционного героя и равного Цай Э Ли Гэньюаня. Неся с собой суровые революционные заслуги, охватывающие четыре десятилетия службы, нация Ли, несомненно, будет умеренной, планистской и конституционной. Опека не в счет."

 YUN_KMT_popular_support_solidarity_of_the_people_and_nation_idea: "Легитимность Партии: §RСолидарность народа и нации§!"
 YUN_KMT_popular_support_solidarity_of_the_people_and_nation_idea_desc: "$YUN_KMT_popular_support_desc$\n\nВидя формальное низложение тех, кто считался предателями национальной революции, Чжу Дэ и Чжан Боцзюнь двинулись вперед из Куньмина, как это сделал Цай Э десятилетия назад, чтобы обеспечить Защиту Нации от тех внутренних сил, которые хотели бы видеть ее разорванной и разодранной. Теперь, действительно в состоянии нести нужды китайских крестьян и рабочих, национальная революция может продолжаться под эгидой организованного пролетариата. Защищенный мощью Национально-революционной армии, китайский народ должен только продолжать мечтать о более светлом будущем для своей нации, в котором социалистическая политика, местные демократические инициативы и поощрение классового единства принесут равенство людям раз и навсегда."

 YUN_encirclement_and_annihilation_idea: "Окружение и уничтожение"
 YUN_encirclement_and_annihilation_idea_desc: "Доктрина окружения охватывает две из трех основных целей войны, сформулированных Клаузевицем: во-первых, уничтожение военной мощи врага, и во-вторых — уничтожение его воли. Уничтожение вражеских подразделений означает сокращение протяженности вражеской территории, что дает нам большие возможности для мобилизации народной поддержки. Как показали усилия всех военных героев Юньнани до нас, самая эффективная стратегия против превосходящего противника — это самое разумное применение ограниченных сил."

 YUN_the_peoples_war_idea: "Народная война"
 YUN_the_peoples_war_idea_desc: "Со всей страны угнетенные массы нации стоят в полной солидарности с великой борьбой против истинных милитаристов и империалистов коррумпированного и дегенеративного Центрального комитета. Пока правят демагоги, такие как Ху Ханьминь и Ван Цзинвэй, не будет истинной реализации видения покойного доктора Сунь Ятсена о свободном Китае. Как таковые, мы будем поощрять молодых и старых, мужчин и женщин работать вместе и стремиться к Новому Китаю."

 YUN_last_stand_of_the_southwest_princes: "Последний бой принцев Юго-Запада"
 YUN_last_stand_of_the_southwest_princes_desc: "Пан или пропал, судьба национальной революции зависит от нас. Поскольку наши войска продолжают храбро сражаться, становится ясно, что наши ресурсы и решимость наших людей слабеют с каждым днем, поскольку Центральный комитет ужесточает свое наступление против нас. У нас есть возможность начать одно последнее отчаянное наступление в надежде, что, возможно, мы сможем добиться значительной победы. Если бы мы боялись смерти, мы бы не вступили в Национально-революционную армию."

 YUN_martyrs_of_a_lost_cause: "Мученики проигранного дела"
 YUN_martyrs_of_a_lost_cause_desc: "Несмотря на все усилия наших генералов и офицеров, на линии фронта произошел полный развал с массовым дезертирством, так как наши люди бегут перед лицом подавляющего давления. Когда все рушится вокруг нас, остается лишь слабый укол надежды, но, увы, такого чуда было бы трудно достичь в нашей нынешней ситуации."

YUN_spiritual_mobilisation: "Духовная мобилизация"
 YUN_spiritual_mobilisation_desc: "Спонсируя сам сбор китайского духа, толпы храбрых, самоотверженных людей вступают в Национально-революционную армию с надеждами, стремлениями, что их служба увидит новый Китай, построенный с нуля и инициированный ими самими. Поскольку юньнаньское общество служит моделью, есть надежда, что остальная часть нации освободится от своих оков или будет освобождена силой."

 YUN_scientific_society: "Научное общество"
 YUN_scientific_society_desc: "Поскольку национальное спасение зависит исключительно от того, как индивидуумы в китайском обществе управляют своей жизнью, крайне важно, чтобы Гоминьдан тщательно управлял и предпринимал активные шаги по структурированию политического, духовного и профессионального опыта граждан. Ибо научное общество — это образцовое общество, которое обязательно победит и призовет к возрождению китайской культуры."

 YUN_supporting_the_revolution: "Поддержка революции"

 YUN_central_political_school_idea: "Центральная академия партийных дел"
 YUN_central_political_school_idea_desc: "Доминируемая и финансируемая CC-кликой, Центральная академия партийных дел на первый взгляд является учреждением, нацеленным на подготовку нового поколения компетентных, квалифицированных и аполитичных, но революционных государственных служащих для служения целям Партии. Однако, учитывая эндемически высокую текучесть кадров магистратов в Китае, достигающую 88% на пике, учреждение также служит для усиления влияния Гоминьдана в гражданских институтах Китая."

 YUN_enacting_peoples_tutelage: "Введение народной опеки"
 YUN_enacting_peoples_tutelage_desc: "Чтобы люди действительно могли в конечном итоге участвовать в будущей китайской демократии на горизонте, крайне важно, чтобы они были образованными, энергичными и доблестными гражданами гражданского государства. Инвестируя в массовую политику и образование, мы надеемся, что коррумпированное влияние, которое привело к падению Бэйянской республики, никогда не погубит другое китайское государство."

 YUN_educating_our_officers_idea: "Образование наших офицеров"
 YUN_educating_our_officers_idea_desc: "С обновленной учебной программой, направленной на отбор способных офицеров из различных формирований и спонсирование их дальнейшего обучения, мы надеемся, что наши офицеры больше не будут чисто военными людьми без стандартного общего образования, а станут сознательными, осведомленными участниками Национальной революции."

 YUN_soothing_the_alms_of_the_peasants: "Облегчение участи крестьян"
 YUN_soothing_the_alms_of_the_peasants_desc: "Сотрудничая с такими людьми, как Янь Чжун, Чэнь Чэн предпринял массовую кампанию по снижению арендной платы, чтобы облегчить бремя, возложенное на граждан страны. Снижая арендную плату с 60-70% годового урожая до тщательно рассчитанных 37%, а также дополнительно снижая процентные ставки до 20%, мы можем добиться как экономического прогресса, так и широкой народной поддержки."

 YUN_extol_national_mobilisation: "Восхваление национальной мобилизации"
 YUN_extol_national_mobilisation_desc: "Только через мобилизацию политически убежденного и сознательного населения китайская нация может противостоять ползучему влиянию синдикализма и оставаться чистым, революционным движением. Приняв меры по поощрению патриотизма как среди молодежи, так и среди пожилых, мы не позволим таким западным концепциям, поддерживаемым Интернационалом или их псами в Левом комитете, извратить нацию."

 YUN_total_adherence_to_the_party: "Полная приверженность партии"
 YUN_total_adherence_to_the_party_desc: "Решение всех проблем нации — это полная приверженность. Снова и снова люди отказывались от интересов нации ради интересов собственного «я». Больше такие акты наглого эгоизма не будут возможны в новом Китае. Обязанность каждого гражданина — полное подчинение своего тела, разума и души прихотям Гоминьдана, единственной организации, которая принимает близко к сердцу истинные интересы нации."

 YUN_bureau_of_public_safety: "Кантонское бюро общественной безопасности"
 YUN_bureau_of_public_safety_desc: "Наш образцовый полицейский институт, Кантонское бюро общественной безопасности, вдохновлен трудными уроками, извлеченными предприимчивым Ли Шичжэнем и другими экспертами полиции как в Гуйчжоу, так и в ходе изучения иностранных полицейских институтов. В сочетании с отделами ликвидации Общества синерубашечников, полицейским опытом Чжан Цюня и трудолюбивым Центральным клубом, Бюро стало неусыпным оком для диссидентов."

 YUN_bis_idea: "Бюро расследований и статистики"
 YUN_bis_idea_desc: "Всегда бдительное, Бюро расследований и статистики (БРС) обязано отслеживать и сообщать об антиреволюционной деятельности внутренних элементов внутри партии и вне ее. Организованное CC-кликой, Бюро под руководством всегда амбициозного Чэнь Лифу разделено на три секции (одна для гражданской контрразведки под руководством Сюй Эньцзэна, одна для военной контрразведки и одна секция общих дел под руководством Дин Моцуня). Обученное методам западноевропейских разведывательных департаментов, таких как британское БРС и российская ЧК, БРС всегда присутствует, чтобы гарантировать чистоту функций партии от диссидентских элементов."

 YUN_tewu_idea: "Департамент специальных служб «Тэу»"
 YUN_tewu_idea_desc: "Во тьме — всегда сжатый кулак. Специальные службы или Тэу — это эвфемизм, который относится к особым средствам операций, таким как убийства, похищения и другие методы жестокого политического угнетения. Партия должна править только страхом; через верховенство закона и полную абсолютную жестокость рыцари революции должны очищать партийные элементы от дегенеративных сил. Вдохновленный японской Кемпейтай, основатель Тэу Ли Шичжэнь стремился организовать свои силы в две ветви. Детективный отдел включал бы Военную секретную службу под руководством Ван Болина и Специальную секретную службу под руководством Гу Цзяньчжуна. Отдел ликвидации включал бы Бюро общественной безопасности и Корпус крови и железа, возглавляемый Гу Шуньчжаном."

 YUN_exorcising_the_excess: "Изгнание излишеств"
 YUN_exorcising_the_excess_desc: "В нашу эпоху слабости, в нашем самом раздробленном состоянии, казалось бы, нация пала жертвой пороков и болезней милитаристов, бандитов, бюрократов и клептократов. В то время как первых можно победить на поле битвы, а бюрократы — это инструмент, который нужно использовать, те, кто находится под влиянием темных щупалец коррупции, требуют не меньше, чем полного изгнания из нации. Они могут брыкаться и кричать, но ни одна душа не прольет слезы."

 YUN_supporting_our_brethren: "Поддержка наших братьев"
 YUN_supporting_our_brethren_desc: "Необходимо, чтобы каждая шестеренка в машине способствовала большей производительности всей системы, и, выполняя нашу часть в машине Национальной революции всегда послушно, мы тоже должны делать авансы и выплачивать дивиденды Центральному комитету, ибо помощь их администрации в управлении катапультирует саму Партию к национальной известности и объединению, даже если это будет стоить кратковременных затрат нашим согражданам в провинции."

 YUN_uplifting_the_sister_party: "Поддержка сестринской партии"
 YUN_uplifting_the_sister_party_desc: "Объединенные в революционном братстве для освобождения рабочих и крестьян от их вечных страданий, Китайская синдикалистская партия и Гоминьдан связаны вместе с момента провозглашения Объединенного фронта в 1924 году. Сохраняя революционный союз даже в сумеречные годы Северного похода, многие члены партии КСП сохраняют двойное членство с Гоминьданом, и, несмотря на протесты правых в Партии, их взаимопонимание с профсоюзами и рабочими городских центров Китая не стоит порочить. Давайте поддержим местные отделения нашей сестринской партии, чтобы достичь революционного будущего вместе."

 YUN_the_golden_handshake: "Золотое рукопожатие"
 YUN_the_golden_handshake_desc: "Используя свои обширные сети, которые охватывают технократические корпуса всей нации и даже международные рынки, Клика политической науки начала использовать эти связи для дальнейшего взращивания класса национальной буржуазии под эгидой Партийного государства и планируемого государственного социализма. В то время как недоброжелатели обвиняют [ROOT.GetLeader] в допущении развращающего влияния в Партию или в фаворитизме и поддержке государственно-капиталистической системы, Партия остается стойкой и сильной в своих убеждениях, пока китайская экономика трансформируется из феодального состояния в состояние процветания."

 YUN_the_intellectual_cornucopia: "Интеллектуальный рог изобилия"
 YUN_the_intellectual_cornucopia_desc: "Вокруг [ROOT.Capital.GetCapitalVictoryPointName] развилась новая бурная сцена радостных интеллектуальных размышлений и творчества, соперничающая даже с Пекином или Чанша. Сотрудничая с провинциальной администрацией, эти предприимчивые люди слова раскрутили колесо прогресса к новой эре просвещения с [ROOT.Capital.GetCapitalVictoryPointName] в центре. Хотя такое щедрое финансирование, предоставленное провинцией, начало немного сжимать бюджет."

 YUN_mass_education_efforts: "Усилия по массовому образованию"
 YUN_mass_education_efforts_desc: "Эксперт в области образования и сам ученый-каллиграф-педагог, Юй Южэнь курировал широкое расширение системы образования коренных китайцев, сотрудничая с такими людьми, как Дай Цзитао. Используя опыт Юя в создании множества школ в Шэньси и Шанхайского университета, наряду с собственным опытом Дая в секторе образования, дуэт стремился внедрить проконфуцианскую, пробуддийскую учебную программу для всей нации. Начиная с планов переориентации национальной учебной программы на ценную полевую работу для студентов, есть надежда, что все в стране будут избавлены от бедствия неграмотности."

 YUN_stimulated_civil_bureaucracy: "Стимулированная гражданская бюрократия"
 YUN_stimulated_civil_bureaucracy_desc: "После грандиозного шествия Белого Солнца по стране стало совершенно очевидно, что скромная модель гражданской бюрократии Юньнани не способна в своем нынешнем виде справиться с новообретенной территорией Гоминьдана. Чтобы исправить это, [ROOT.GetLeader] проконтролировал расширение бюджетных ассигнований на гражданскую службу, что привело к потоку энергичной подготовительной работы для соединения разрозненных административных тупиков провинций. Даже если это привело к дальнейшей внутренней борьбе гражданских фракций за то, кто какую должность заслуживает."

 YUN_disgruntled_whampoa_idea: "Недовольная Вампу"
 YUN_disgruntled_whampoa_idea_desc: "Военная академия Вампу. Детище бывшего генералиссимуса Чан Кайши и доктора Сунь Ятсена, академия служила своей цели рождения нового поколения революционных китайских генералов и офицеров, посвященных спасению своей страны, опустошенной веком иностранного унижения. Со времени Второго Северного похода роль Вампу в национальной политике была, безусловно, заметной, но возвращение гражданского правительства в Гоминьдане привело к беспорядкам и неудовлетворенности среди многих высших военных чинов, которые чувствуют себя все более отстраненными в этот период национальной реконструкции."

 YUN_disgruntled_whampoa2_idea: "Омоложение Вампу"
 YUN_disgruntled_whampoa2_idea_desc: "В соответствии с принципами, изложенными Дай Цзитао, Национально-революционная армия предназначена быть и должна быть исключительно инструментом Национальной революции. Поскольку мы начинаем медленный и трудный процесс национальной демобилизации, давайте поощрять новых ветеранов Второго Северного похода и Второй японо-китайской войны служить народу, чтобы их таланты и труд использовались для служения людям, а не для превращения в простых бандитов."

 YUN_unruly_opposition_idea: "Непокорная оппозиция"
 YUN_unruly_opposition_idea_desc: "Гоминьдан действительно может быть партией широкого охвата, но эта фракционность полностью свидетельствует о состоянии беспорядка внутри партии и о крупных подрывных и дегенеративных элементах, которые проникли в ее идеологию. От либералов в Демократической лиге Китая, которые пытаются утвердить свою позицию в нашей недавно объединенной Республике, до предателей-социалистов в левом крыле партии, оппозиция будет продолжать только расстраивать и задерживать прогресс революции, если с этим ничего не будет сделано."

 YUN_unruly_opposition2_idea: "Слабеющая оппозиция"
 YUN_unruly_opposition2_idea_desc: "Последствия гражданских беспорядков и беспорядка в Китайской Республике привели к экономическому спаду, поскольку месяцы спекуляций лопнули, что привело к тому, что многие иностранные граждане вывели свои акции и интересы из Китая. CC-клика и их союзники в политбюро Гоминьдана полны решимости гарантировать, что экономика будет восстановлена и станет даже более великой, чем прежде, с интенсивным планом технократической национализации, который направит курс экономики к успешному национальному омоложению."

 YUN_woes_of_nationalism_idea: "Беды национализма"
 YUN_woes_of_nationalism_idea_desc: "Последствия гражданских беспорядков и беспорядка в Китайской Республике привели к экономическому спаду, поскольку месяцы спекуляций лопнули, что привело к тому, что многие иностранные граждане вывели свои акции и интересы из Китая. CC-клика и их союзники в политбюро Гоминьдана полны решимости гарантировать, что экономика будет восстановлена и станет даже более великой, чем прежде, с интенсивным планом технократической национализации, который направит курс экономики к успешному национальному омоложению."

 YUN_woes_of_nationalism2_idea: "К единому органу"
 YUN_woes_of_nationalism2_idea_desc: "Один разум, одно тело. Эти концепции проиллюстрированы великим теоретиком Гоминьдана Дай Цзитао, и они являются важными планами для понимания того, как должна управляться экономика этой великой страны. Китай — великая страна, наполненная обильными природными ресурсами, и долгое время она была прикована к прихотям иностранных империалистов, которые эксплуатировали права и ресурсы китайского народа ради собственной выгоды. Теперь, когда все ресурсы находятся под контролем народа, мы наконец можем практиковать миньшэн и приблизить наше общество к полной гармонии."

 YUN_youth_paramilitarism_idea: "Военизированная молодежь"
 YUN_youth_paramilitarism_idea_desc: "Будущее принадлежит молодежи, и, таким образом, естественный прогресс революции будет зависеть от наших возможностей культивировать энергичную молодежь, наполненную революционным витализмом, который позволит будущим поколениям Китая продолжать революционную работу, заложенную их предшественниками. В духе революции молодежь должна быть научена подчиняться своим начальникам, практиковать концепции сыновней почтительности и послушания, описанные в Аналектах, и стать аскетичными хранителями непревзойденных трудов покойного доктора Сунь Ятсена; чтобы они могли дорожить этими концепциями и нести факел революционного триумфа."

 YUN_technocratic_administration_idea: "Технократическая администрация"
 YUN_technocratic_administration_idea_desc: "Раздутая бюрократия Гоминьдана была тщательно очищена от демагогов и идеологов, и Партия теперь может сосредоточиться на том, чтобы быть действительно эффективной и проводить столь необходимые реформы. Кроме того, мы пригласим тех, кто прошел иностранную подготовку, чтобы помочь расти и реформировать наше правительство. Поистине, мы должны превратить партию в функционирующий и дышащий орган, способный к бесконечным революционным успехам."

 YUN_ideology_as_the_nervous_system: "Идеология как нервная система"
 YUN_ideology_as_the_nervous_system_desc: "В политической партии не остается никакой основы для единства, кроме идеологии. Идеология — это сама нервная система партии. Идеология составляет кровеносные сосуды партии, те самые сосуды, по которым проводятся политические действия. Без нервной системы и кровеносных сосудов животное больше не могло бы быть животным. Без связной, сплоченной и общей идеологии партия больше не может считаться партией."

 YUN_pursuit_of_social_harmony: "Стремление к социальной гармонии"
 YUN_pursuit_of_social_harmony_desc: "Только в духовном ядре Древнего Китая сохраняется концепция «Утопии Великой Гармонии». Шагая вперед к этому идеалу, Партия должна подчеркивать и обращаться к присущей Китаю стабилизирующей силе: Конфуцию. Ибо с конфуцианской социальной гармонией как связующей перспективой китайской нации, концепции, поддерживаемые чуждыми идеологиями, такими как классовая борьба, никогда не приживутся в нации. «Люди должны существовать коллективно, и поэтому мы должны следовать универсальному принципу, что мир принадлежит всем»."

 YUN_rampant_hyperinflation: "Безудержная гиперинфляция"
 YUN_rampant_hyperinflation_desc: "Вокруг нас китайская нация может быть свидетелем бесплодных результатов капиталистических начинаний в китайской национальной экономике. Эра милитаристов, гражданские распри, Северный поход и, наконец, Вторая японо-китайская война отправили Китай в практическое свободное падение. Многочисленные иностранные инвесторы выводят свои акции и интересы, японские вклады в Маньчжурии явно несущественны, а Посольства продолжают беспокоить или иным образом относиться к Революционному режиму с опаской и осторожностью. Однако под своими законными защитниками китайская экономика будет восстановлена сильнее, чем когда-либо. Ибо активов и опыта Вампу много, с многочисленными способными экономистами в их распоряжении."

 YUN_last_gasp_of_democracy: "Последний вздох демократии"
 YUN_last_gasp_of_democracy_desc: "В воздухе висит напряжение. Не слишком отличающееся от первоначальной Реорганизации 1924 года. В тенях, в своих интеллектуальных кругах, своих кофейных клубах и встречах книжных клубов, китайская образованная элита напугана. Напугана тем, что китайская демократия будет раздавлена полностью раз и навсегда. Совершенно несовершенные, режимы, которые были раньше, по крайней мере, сохраняли видимость «демократии». Но с крестовым походом Партии по обеспечению правдивой и верной китайской демократии после периода Опеки моральный дух нашего народа падает. Это чувствуется не только в общей атмосфере, но и в моральном духе наших солдат. Вампу не должна притворяться: Китай, который выйдет из Национальной революции, будет лучше, чем раньше, с массовым участием каждого китайского гражданина в выборе своего руководства."

 YUN_political_dysfunctionalism: "Политическая дисфункциональность"
 YUN_political_dysfunctionalism_desc: "Поскольку наши усилия полностью направлены на военные действия, казалось бы, что только разрушение, изоляция и злоба остались в их следе. Партийные передовицы осуждают правление Гоминьдана как такое, которое «рассеяло надежды масс». Мало того, они настаивают на том, что Партия «стала далекой от масс, а во многих местах просто ненавидима массами!». Стало совершенно очевидно, что полное отсутствие политических и военных решений проблем, с которыми сталкивается Китай в результате борьбы за выживание, явилось результатом абсолютного провала партии и ее правительственных органов."

 YUN_ending_government_inanity: "Конец правительственной бессмыслицы"
 YUN_ending_government_inanity_desc: "Слишком долго партия правила довольно иррационально, амбивалентно к истинным потребностям и желаниям китайского народа. Демонстрируя произвольный процесс принятия решений, который иногда даже обходит Центральный исполнительный комитет, бюрократический рост Партийного государства стал раком его собственного существа. Существуя и питаясь своими собственными инстинктами самосохранения, а не желанием эффективного управления. «Гражданское строительство» предложило ряд радикальных и весьма спорных реформ, которые предусматривают внедрение формы полуконституционного правления. Хотя они далеки от формальной конституции, их концепции видят молниеносное внедрение."

 YUN_in_pursuit_of_a_revolutionary_democratic_future: "В погоне за революционным демократическим будущим"
 YUN_in_pursuit_of_a_revolutionary_democratic_future_desc: "Многие недоброжелатели Партии осудили бы ее как просто автократический режим, одетый в революционную краску. И они бы ужасно ошибались. Трехэтапная Национальная революция, изложенная доктором Сунь Ятсеном, просто вводится в действие в полном соответствии. Рука об руку, Вампу марширует вперед к Революционному и Демократическому будущему, увлекая за собой китайский народ."

 YUN_invigorating_the_cadres: "Укрепление кадров"
 YUN_invigorating_the_cadres_desc: "Внедряя кадровую систему, Партия стремилась усилить свое влияние на жизнь своих членов, чтобы предотвратить расколы и внутреннюю борьбу прошлого. Через процесс отбора, который включает выборы, рекомендации, экзамены или обучение, кадры сортируются по трем различным категориям. Кадры партийной работы, отвечающие за партийные комитеты, политические кадры для служения кандидатами на политические посты и кадры массового движения, которые служат кандидатами на посты глав общественных организаций или кооперативных советов. Обеспеченные обучением Трем принципам, проверенные на партийную лояльность и способности с обширными проверками биографии, мы надеемся, что это новое поколение политически вовлеченных членов партии вдохнет новую юношескую энергию в Гоминьдан."

 YUN_the_organic_economy: "Органическая экономика"
 YUN_the_organic_economy_desc: "Учитывая фактические условия в каждой китайской провинции и в соответствии с существующими законами и принятием единых законов и правил, Клика гражданского строительства создала настоящую китайскую экономику. Такую, которая функционирует для каждого человека и его потребностей, а не для прибыли немногих. Внедряя такие процессы, как снижение арендной платы с привлечением экономических экспертов, ученых и государственных органов, наряду с надзорными агентствами для контроля за усилиями по земельной реформе, «Маленький генералиссимус» надеется наконец положить конец тысячелетнему циклу бедности и процветания Китая. Гарантируя, что будет достигнуто новое будущее, построенное на устойчивости."

 YUN_institute_of_revolutionary_practice_idea: "Институт революционной практики"
 YUN_institute_of_revolutionary_practice_idea_desc: "Именно благодаря успеху Партии нам удалось достичь того, что мы имеем за последние годы. Однако наша работа не закончена. По всей этой великой стране остается потребность обучать партию, правительство и военных нести вперед революционный дух 1924 года и реализовать успех видения доктора Сунь Ятсена о свободном Китае. Вводя такие меры для обеспечения партийной строгости, Институт революционной практики стремится обучить новое поколение политически лояльных членов партии."

 YUN_national_voluntary_labour_movement: "Национальное движение добровольного труда"
 YUN_national_voluntary_labour_movement_desc: "В то время как западный капитализм порабощает рабочих их трудом, наша программа гарантирует, что хороший, честный труд будет спасен из лап западного империализма. Профсоюзы будут работать в тандеме с государством, чтобы защищать права китайских рабочих и способствовать единству классов в согласии с нашей нацией."

 YUN_uplifting_chinas_national_character_idea: "Подъем национального характера Китая"
 YUN_uplifting_chinas_national_character_idea_desc: "Хотя старыми путями китайского общества можно восхищаться, китайская культура должна претерпеть сдвиг, чтобы быть реконструированной в современном образе. Что еще более важно, Китай должен быть защищен от декадентского материализма и индивидуалистических свобод Запада. Через Гоминьдан китайская нация возродится заново!"

 YUN_primacy_of_the_peoples_vanguard_army: "Первенство Народной авангардной армии"
 YUN_primacy_of_the_peoples_vanguard_army_desc: "Наша Революция должна вестись примером, и Специальная оперативная группа возглавит эти усилия. Специальная оперативная группа будет сформирована только из самых элитных членов нашей Партии и обеспечит, чтобы Национальная революция никогда не была подорвана. Пусть Гоминьдан приведет нашу Нацию к величию, которого никогда раньше не видели!"

 YUN_eliminating_unnecessary_bureaucracy_idea: "Устранение ненужной бюрократии"
 YUN_eliminating_unnecessary_bureaucracy_idea_desc: "Наша Партия всегда страдала от раздутости и коррупции, которые угрожали святости Национальной революции. Общество синерубашечников обеспечит, чтобы эта эпоха упадка в Партии была подавлена с рвением. Контрреволюционеры и дегенеративные предатели будут утверждать, что это навредит экономическому росту нации, но нам не нужно прислушиваться к банальностям западных прихвостней."

 YUN_blueshirt_national_revolution: "Национальная революция синерубашечников"
 YUN_blueshirt_national_revolution_desc: "Партия никогда не должна забывать бессмертные цели нашей Революции. Мы не стремимся просто свергнуть старую феодальную систему, Национальная революция идет гораздо дальше простой передачи власти. Китайское общество, культура, государственность и независимость оказались прогнившими от дегенеративного маньчжурского правления и зараженными западным материализмом. Китай будет переделан заново в горящем огне Революции, и Гоминьдан обеспечит, чтобы это пламя ярко горело десять тысяч лет!"

 YUN_reforming_confucian_doctrine: "Реформирование конфуцианской доктрины"
 YUN_reforming_confucian_doctrine_desc: "Чтобы возродить Китай, массам нужна новая догма, которая привьет истинные ценности нашей нации. Учения Конфуция будут переделаны, чтобы вписаться в рамки современной китайской цивилизации; та, которая включает спасительные столпы национализма и морали, станет доктриной, достойной китайского народа."

 YUN_unity_of_state_and_media: "Единство государства и СМИ"
 YUN_unity_of_state_and_media_desc: "Чтобы по-настоящему тронуть сердца и умы масс, Партия должна использовать СМИ, чтобы расширить нашу хватку на всех уровнях общества. Лаобайсин (простой народ) придет к признанию Генералиссимуса нашим великим отцом, и Гоминьдан будет пользоваться поддержкой народа."

 YUN_restoring_spiritual_balance_idea: "Восстановление духовного равновесия"
 YUN_restoring_spiritual_balance_idea_desc: "Блестящий Чэнь Лифу пришел к революционному осознанию того, что человеческие проблемы вызваны дисбалансом конкурирующих экономических сил потребления и производства. В то время как материалистический Запад сосредоточился на производстве, Гоминьдан найдет необходимый баланс между потреблением и производством на благо всех народов."

 YUN_reaching_a_republican_concord: "Достижение республиканского согласия"
 YUN_reaching_a_republican_concord_desc: "Хотя наша Партия стремится изменить направление Китайской Республики, управление требует хорошо отлаженной машины с компетентными бюрократами. В то время как Пекинское правительство управлялось отвратительными милитаристами, Гоминьдан должен использовать их способных подчиненных, которые обеспечат правильное проведение китайской реконструкции. Гоминьдан приветствует всех, кто любит эту страну!"

 YUN_reshuffle_the_executive_yuan_idea: "Перестановка в Исполнительном Юане"
 YUN_reshuffle_the_executive_yuan_idea_desc: "Исполнительный Юань укомплектован ревностными популистами, придерживающимися идей фанатичной революции, которые не заинтересованы в продвижении Китая вперед, а вместо этого превращают массы в безумную орду. Этот Юань должен найти себе новых членов, которые лояльны истинному делу Партии, а не мятежной демагогии."

 YUN_competing_economic_demands: "Конкурирующие экономические требования"
 YUN_competing_economic_demands_desc: "В свете объединения нации [ROOT.GetLeader] стало все более очевидным, что раздробленная и разъединенная политическая сцена китайской нации имеет несопоставимые желания и потребности для удовлетворения своих желаний и ожиданий. Крестьяне требуют немедленных результатов от земельной реформы, дворянство и землевладельцы решительно выступают против таких действий. Рабочие в городских центрах Китая требуют выполнения обещаний Партии избавить их от нищеты, в то время как Либеральные элиты и Интеллектуалы ожидают быстрого улучшения экономического положения нации."

 YUN_power_vacuum_in_the_provinces: "Вакуум власти в провинциях"
 YUN_power_vacuum_in_the_provinces_desc: "Поскольку [ROOT.GetLeader] лишь номинально управлял частью китайской нации, его крестовый поход против тех, кто сбил бы Национальную революцию с пути, привел к тому, что в различных провинциях, которые изначально находились вне его контроля, царит пограничная анархия. Поскольку многие предыдущие государственные служащие и бюрократы бежали от конфликта по мере его приближения к их домам, учреждения в указанных провинциях лишены своих смотрителей, и потребуются большие усилия для восстановления их администраций."

 YUN_political_outsiders: "Политические аутсайдеры"
 YUN_political_outsiders_desc: "Находясь на периферии политической сцены Гоминьдана, немногие ожидали, что [ROOT.GetLeader] достигнет какой-либо позиции в Национальном руководстве благодаря своим собственным заслугам, и все же история часто бывает капризной вещью. Независимо от причины их возвышения, они поддерживают меньшее окружение союзников по сравнению со своими соперниками и современниками, и симфония голосов, выступающих против их правления, становится все громче."

 YUN_mass_modernisation_programme: "Программа массовой модернизации"
 YUN_mass_modernisation_programme_desc: "Хотя партизанская война и иррегулярные подразделения сыграли решающую роль в усилиях по объединению Китая под красным флагом, новый Китай не может надеяться защитить себя от империалистических стервятников без современных вооруженных сил. Морские пути Китая будут защищены сильным флотом, а его небо будет принадлежать великим военно-воздушным силам!"

 YUN_hundred_flowers_campaign_idea: "Кампания «Сто цветов»"
 YUN_hundred_flowers_campaign_idea_desc: "Хотя наша революция, несомненно, в первую очередь социалистическая, она также и демократическая. Наши граждане должны иметь возможность высказываться и консультировать правительство по поводу недостатков, чтобы рука об руку мы могли построить новую и лучшую Китайскую Республику. Пусть расцветают сто школ мысли!"

 YUN_a_nation_built_on_sacrifice: "Нация, построенная на самопожертвовании"
 YUN_a_nation_built_on_sacrifice_desc: "Никто не знает значения слова «жертва» лучше тех, кто отдал свои жизни за сохранение китайской нации и ее тысячелетней культуры. Ибо без наших храбрых солдат нация почти расколота. По всей стране, в основном благодаря усилиям Ли Гэньюаня, строятся различные военные памятники. На них начертаны имена героев войны нашей нации, ибо их утрата остается подобна тлеющим углям пламени."

 YUN_unity_under_the_party_state: "Единство при партийном государстве"
 YUN_unity_under_the_party_state_desc: "Тунмэнхой породил множество революционных движений на застойной политической сцене Китая, и все же многие из них принесли мало плодов, кроме партии Отца нации. Самые ярые соперники Гоминьдана, Федералистское движение, продолжали отстаивать дело, которое было первостепенным для отделения различных провинций нации. Вместо того чтобы содействовать единству, они просто способствовали разделению. Однако период Данго (партийного государства) Гоминьдана продвигает высшую форму федерализма, при которой нация действует в унисон для улучшения своего целого, а не разрозненных частей."

 YUN_the_mutually_beneficial_deal: "Взаимовыгодная сделка"
 YUN_the_mutually_beneficial_deal_desc: "Хотя большая часть партии очернила бы сотрудничество с иностранными экономическими интересами, стало совершенно очевидно, что китайские рынки должны снова привлекать инвестиции, если они хотят стимулировать модернизацию и развитие нации. В обмен на наши богатые ресурсы и развивающуюся экономику нация получит средства, необходимые для того, чтобы стать сильнее. Ибо Китай будет соперничать даже с сильнейшей сверхдержавой мира всего через несколько десятилетий самоотверженных усилий и прогресса."

 YUN_ashes_of_the_whampoa_model: "Пепел модели Вампу"
 YUN_ashes_of_the_whampoa_model_desc: "Считавшаяся революционной военно-политической структурой, которая принесла Национально-революционной армии ее величайшие победы, время политической индоктринации Вампу, сосредоточения на боевом духе и развивающегося радикализма прошло. С объединением нации и радикальными выпускниками академии, находящимися в сильной оппозиции правлению [ROOT.GetLeader], было сочтено необходимым экспортировать модель Куньминской академии на остальную армию. Ибо чего бы это ни стоило, верность идеологии меркнет перед патриотизмом и пылким национализмом по отношению к своей стране."

 YUN_handshakes_in_the_business_world: "Рукопожатия в деловом мире"
 YUN_handshakes_in_the_business_world_desc: "Сказать, что Клика политической науки является партией городских деловых интересов, было бы, пожалуй, преувеличением, однако заметная группа банкиров и других людей в костюмах работает вместе с планирующим технократическим классом, доминируя в эшелонах относительно эгалитарной клики. Используя этих влиятельных лиц, можно задействовать правильные рычаги в деловом мире Китая, чтобы стимулировать экономическую производительность и инвестиции при жестком, но осторожном государственном планировании."

 YUN_the_temple_of_heaven_draft_constitution: "Проект Конституции Храма Неба"
 YUN_the_temple_of_heaven_draft_constitution_desc: "Написанный и курируемый некоторыми из величайших юридических умов нации, «Проект Конституции Храма Неба» был первоначальной конституцией, провозглашенной предшественником Общества политической науки, партией Миньсянь. Сосредоточенная на закреплении конституционной политики в свете растущей милитаризации и на консолидации демократической системы, конституция была знаковым законодательным актом. Получила свое прозвище из-за того, что была составлена в Зале молитв об урожае в Храме Неба в Пекине.\n\nПостоянно дорабатываемая, конституция в конечном итоге так и не увидела свет, несмотря на нажим со стороны парламента Бэйяна. Однако с первенством Клики политической науки конституционный комитет был наконец созван вновь и включил высшие эшелоны правительства Партии. Провозглашая широкий спектр неоспоримых гражданских прав, ограничений президентства, использование двухпалатной системы, независимость судебной власти и многое другое, конституция является удивительно либеральным поворотом для властной технократии периода Опеки."
###- UPC Political Ideas -###

 YUN_support_szc_idea: "Поддержка сычуаньских федералистов"
 YUN_support_gxc_idea: "Поддержка гуандунских федералистов"
 YUN_support_hnn_idea: "Поддержка хунаньских федералистов"

 YUN_joint_committee_of_the_gentry_idea: "Объединенный комитет знати"
 YUN_joint_committee_of_the_gentry_idea_desc: "Заботясь о том, чтобы каждый в стране вносил свою справедливую долю в возрождение нации, под эгидой Чжан Тайяня была создана организационная структура под названием «Объединенный комитет знати». Выступив с вкладом своих активов и финансов в последующую кампанию объединения нации, они поддержали национальную программу взаимной обороны между провинциями в обмен на последующий вывод дуцзюней и реструктуризацию политического порядка в будущих освобожденных провинциях."

 YUN_mobilising_the_peoples_patriotism: "Мобилизация народного патриотизма"
 YUN_mobilising_the_peoples_patriotism_desc: "Гоминьдан считает себя истинной партией масс, единственной партией масс. Но это вопиющая ложь. Партия народного правительства включает массы в саму свою структуру. Она не стремится «возглавлять» их, а возвышать их до их надлежащего статуса в республике. Находясь под властью жестоких милитаристов и амбициозных революционеров, немногие задавали себе вопрос: «Как сделать бедные массы счастливыми»? Через принятие национальной гордости, патриотизма и антиимпериалистических настроений, конечно!"

 YUN_pursuing_the_federalist_revival: "Стремление к возрождению федерализма"
 YUN_pursuing_the_federalist_revival_desc: "Все знают это, единственную настоящую проклятую истину всей борьбы федералистов. Тан Цзияо всегда был ее самым ярым сторонником. Ад не знает пощады, он выезжал снова и снова ради спасения нации. В восстании Двойной девятки, Войне в защиту республики, против деспотов в Гуйчжоу и Юньнани, против негодяев в Гуанси, Гуандуне и всегда против тиранов в Пекине.\n\nКаждая провинция должна сохранить право избирать своего губернатора и собрание, нация должна быть против милитаризма, она должна поддерживать истинное Народное правительство, а милитаристы должны быть побеждены. Именно Тан Цзияо поднимал знамя истинного федерализма в течение десятилетия, и именно Тан Цзияо будет следить за его возрождением."

 YUN_UPC_popular_support_desc: "Современный китайский федерализм поднимался и падал в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала это было отвергнуто как северным, так и южным правительствами. Успешное объединение силой Чжили дискредитировало движение, и многие стали ассоциировать движение не более чем с прикрытием для милитаризма.\n\nКак одному из самых сильных и искренних сторонников федерализма на протяжении десятилетий, немногие начали верить в Тан Цзияо и его пророчества о новой Федеративной Республике. Настаивая на антимилитаризме, провинциальных выборах и конституционном правлении, он, тем не менее, правил Юго-Западом как диктатор бессрочно, несмотря на это. Восстановить веру и надежду в федералистское движение — несомненно, трудное препятствие, которое нужно преодолеть, но юньнаньские федералисты могут быть теми людьми, которые это сделают."

 YUN_UPC_popular_support_1: "Марш защитников нации: §RДеморализованы§!"
 YUN_UPC_popular_support_1_desc: "$YUN_UPC_popular_support_desc$"

 YUN_UPC_popular_support_2: "Марш защитников нации: §OНе в ладах§!"
 YUN_UPC_popular_support_2_desc: "$YUN_UPC_popular_support_desc$"

 YUN_UPC_popular_support_3: "Марш защитников нации: §nРастущий энтузиазм§!"
 YUN_UPC_popular_support_3_desc: "$YUN_UPC_popular_support_desc$"

 YUN_UPC_popular_support_4: "Марш защитников нации §CСинхронизированное безумие§!"
 YUN_UPC_popular_support_4_desc: "$YUN_UPC_popular_support_desc$"

 YUN_UPC_popular_support_5: "Марш защитников нации: §GФедеральное правительство оправдано§!"
 YUN_UPC_popular_support_5_desc: "$YUN_UPC_popular_support_desc$"

 YUN_UPC_endgame_popular_support_desc: "Современный китайский федерализм поднимался и падал в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала это было отвергнуто как северным, так и южным правительствами. Несмотря на проблемы на этом пути, однако, казалось бы, что 1920-е годы были лишь спотыканием на пути к успеху для федералистов."

 YUN_UPC_popular_support_rule_of_the_expertocracy: "Марш защитников нации: §lПравление экспертократии§!"
 YUN_UPC_popular_support_rule_of_the_expertocracy_desc: "$YUN_UPC_endgame_popular_support_desc$\n\nВынужденные бежать в Юньнань из-за общенациональных репрессий, немногие ожидали, что подъем Общества полумесяца будет таким стремительным. Группа выпускников Цинхуа, получивших образование в Америке, сделала совершенно очевидным, что поэзия и проза были не единственными вещами, которым они научились в Америке. Англо-американская либерально-консервативная форма политики, отстаивание свобод, прав, уважение к верховенству закона и способности государства обеспечивать соблюдение такого закона. Занимая позицию между бредящими революционерами и неуравновешенными автократами, Общество полумесяца сияет в одиночестве во тьме. От книжного магазина до политической клики, немногие могут усомниться в законном правлении Экспертов, новых Ученых-чиновников, в открытии китайской демократии."

 YUN_UPC_popular_support_anathema_to_popular_revolt: "Марш защитников нации: §SАнафема народному восстанию§!"
 YUN_UPC_popular_support_anathema_to_popular_revolt_desc: "$YUN_UPC_endgame_popular_support_desc$\n\nВыйдя из провинциального отделения Демократической лиги Китая, преданность и приверженность Цунь Шушэна своим собственным идеалам социалистических демократических реформ зажгли спичку степного пожара с амбициями охватить всю нацию. Сдерживая руку революционеров, Цунь и Су Хунган решительно выступали за борьбу, патриотизм и освобождение через образование, все в оппозиции тирании партийного государства или во вред китайской демократии. Не поддаваясь тонкому налету авторитарных практик, которые пропагандирует «Экспертократия», Юньнаньская демократическая лига Китая фокусируется на истинных принципах своей организации — демократии."

 YUN_UPC_popular_support_grand_republican_statesman: "Марш защитников нации: §mВеликий республиканский государственный деятель§!"
 YUN_UPC_popular_support_grand_republican_statesman_desc: "$YUN_UPC_endgame_popular_support_desc$\n\nПродвигаясь за пределы дозволенного и неся вперед наследие как своего отца, так и Великого республиканского альянса, Тан Сяоин и его итерация ВРА остались верны своему одноименному тезке. Объединяя не только Партию народного правительства и Партию общественных интересов, руководство нового Великого республиканского альянса охватывает всех тех членов различных гильдий старых республиканцев-федералистов. Общество обновления народа, Банда девяти, Форум демократии и науки и другие более мелкие группы. Точно так же ВРА сделал многочисленные авансы Демократической лиге Китая, в конечном итоге стремясь построить новое, демократическое и федеративное будущее для всех китайцев."

 YUN_UPC_popular_support_arbiters_of_the_nation: "Марш защитников нации: §cАрбитры нации§!"
 YUN_UPC_popular_support_arbiters_of_the_nation_desc: "$YUN_UPC_endgame_popular_support_desc$\n\nДолгое время будучи желанной и, возможно, совершенно самодовольной мечтой Тан Цзияо быть «Первым среди равных» на китайском политическом поле битвы, похоже, он наконец достиг своего желания. Вполне вероятно, считаясь Отцом Республики, Тан вышел из-под своей авторитарной вуали, чтобы стать человеком, который придерживается своих идеалов и верен своему слову. Как он и предопределил, он добивался быстрого провозглашения как китайского федерализма, так и демократии только после объединения нации, и, хотя это в конечном итоге ново, чувство надвигающегося оптимизма остается в воздухе, поскольку Тан работает над тем, чтобы сбалансировать потребности народа, потребности нации и потребности провинций в своей новой республике."

 YUN_UPC_popular_support_bearers_of_our_fathers_torches: "Марш защитников нации: §gНесущие факелы наших отцов§!"
 YUN_UPC_popular_support_bearers_of_our_fathers_torches_desc: "$YUN_UPC_endgame_popular_support_desc$\n\nДолгое время в Китайской Республике доминировали фигуры, родившиеся в эпоху династий или эпоху Юань Шикая. И, несмотря на роль молодежи в таких событиях, как 4 ноября, 30 мая или любых движениях радикальных студенческих действий, они, тем не менее, видели, как их усилия были растрачены стареющими политиками и оторванными от жизни государственными деятелями. Однако, поскольку это старшее поколение уходит в эфир, новое поколение должно подняться, чтобы нести и их факелы, и их грехи. Ведя молодежь вперед в неопределенные времена первых лет Федеративной Республики, Тан Сяоин может только надеяться соответствовать примеру, поданному его отцом."

 YUN_UPC_popular_support_masters_of_the_eastern_continent: "Марш защитников нации: §gВладыки Восточного континента§!"
 YUN_UPC_popular_support_masters_of_the_eastern_continent_desc: "$YUN_UPC_endgame_popular_support_desc$\n\nНет более великого человека, героя, патриота, революционера или милитариста, чем Тан Цзияо. Истинный Отец Нации, он доблестно сражался, чтобы защитить добродетели и ценности Синьхайской революции с момента восстания Двойной девятки, и дарованный ему как протеже Цай Э долг воина — продолжать такую добродетельную миссию. Его клика Юньнань, полностью подчиненная, закрепилась как новый набор творцов королей в китайской политике. С благожелательно авторитарным правлением, возможно, в будущем будет создана либеральная и более свободная демократическая республика. Однако на данный момент, поскольку опасности нарастают, централистская и федералистская республика подойдет."

 YUN_initiation_of_progressive_taxation_idea: "Введение прогрессивного налогообложения"
 YUN_initiation_of_progressive_taxation_idea_desc: "Это не кампания богатых, состоятельных, тех, кто сидит в своих надменных городских люксах, законодательствуя, вертя делами и торгуя в свое удовольствие. Если они настолько склонны хотя бы пробираться через политические трясины нации, следует ожидать, что богатые внесут свой значительный вклад обратно в национальное правительство. Их богатство было построено на спине нации, и пришло время им платить десятину."

 YUN_licking_our_wounds_idea: "Зализывание ран"
 YUN_licking_our_wounds_idea_desc: "Невыразимые раздоры и разобщенность нанесли нации большие, глубокие и несообразные раны значительных масштабов. Семьи разорваны, провинциальные казначейства разграблены, бандиты бесчинствуют, а проекты милитаризации полевых командиров привели к раздутым экономическим расходам. Все вместе взятое, путь войны нации к объединению потребует длительного периода реконструкции, который национальное правительство может быть обязано выполнить."

 YUN_declaration_of_the_middle_class_revolution_idea: "Объявление революции среднего класса"
 YUN_declaration_of_the_middle_class_revolution_idea_desc: "Навсегда это должен быть новый класс, находящийся между элитной правящей автократией и подчиненным крестьянством, который должен вести нацию к новому началу. Ученые-литераторы, потомки тех, кто был одарен бразды правления династий эпохи назад, их интеллектуальные потомки — это те, кому привиты те же ценности хорошего управления и мудрого руководства; мы должны лишь стимулировать их экономический прогресс, а также их политический."

 YUN_the_phase_of_national_healing_idea: "Фаза национального исцеления"
 YUN_the_phase_of_national_healing_idea_desc: "Злоба и внутренняя борьба практически укоренились в мягком культурном мышлении Севера и Юга нации. Непокорный Юг, последним подчинившийся иностранным династиям, с его пересеченной местностью и воинственным народом, в отличие от обширного севера с плоскими и сочными равнинами и в целом апатичным политическим взглядом. Но по сути, разве мы не потомки Хань? Чжоу? Сун? Мин?"

 YUN_return_to_the_original_solution_idea: "Возвращение к исходному решению"
 YUN_return_to_the_original_solution_idea_desc: "Федерализм никогда не проповедовал той силовой демократии, которая сейчас распространена среди некоторых его мыслителей! Речь шла об истинной независимости его провинций в возможностях и действиях, о защите нации от иностранных посягательств. С его провинциями, свободными от вмешательства Центрального правительства, нация и ее народ могут действительно считаться свободными и удачливыми."

 YUN_by_presidential_decree_idea: "Президентским указом"
 YUN_by_presidential_decree_idea_desc: "Какая глупость объявлять конфедерацию? Видеть, как милитаристы получают свою легитимность, а нация превращается в прославленную тюрьму, просто содержащую провинции в своих стенах. Сильная, мудрая и просвещенная исполнительная власть является необходимым проводником, чтобы отговорить от регионализма и сепаратизма. Тирания? Лучше тирания избранного представителя народной воли, чем тирания провинциальных диктаторов и их лакеев."

 YUN_walking_the_tightrope_idea: "Хождение по канату"
 YUN_walking_the_tightrope_idea_desc: "Наш баланс деликатен. Нация долгое время была втянута в конфликт между милитаристами, гражданскими, интеллектуалами и массами. Но именно умеренности и доброй совести подвластны бразды правления. Больше идеологические или вопиющие корыстные отношения не будут иметь приоритета над мудрым и стабильным принятием решений."

 YUN_uncertain_economic_future_idea: "Неопределенное экономическое будущее"
 YUN_uncertain_economic_future_idea_desc: "Объединение позволило китайской экономике, застопорившейся из-за многолетней войны, наконец снова начать расти. Однако непосредственная послевоенная экономическая ситуация оказалась чрезвычайно сложной, поскольку военная экономика демонтируется и медленно переводится на гражданские рельсы. Истинная реконструкция займет не менее поколения, но насущные проблемы гиперинфляции, высоких расходов и ограниченных доходов должны быть решены новым правительством, если новая экономика должна быть построена на прочной основе."

 YUN_demobilisation_tensions: "Напряженность демобилизации"
 YUN_demobilisation_tensions_desc: "Распространение региональных армий внесло значительный вклад в нестабильность Китая, как позволяя местным милитаристам насильственно защищать свою независимость, так и вешая жернов на шею местным казначействам. Прекращение этого кризиса потребует демобилизации региональных воинских частей, чему, как многие ожидают, будут сопротивляться местные жители, опасающиеся тирании центрального правительства и внезапной безработицы тысяч молодых людей."

 YUN_demands_for_democracy_idea: "Требования демократии"
 YUN_demands_for_democracy_idea_desc: "После завершения объединения люди из всех секторов Китая призвали правительство выполнить свои давние обещания о федералистской демократии. Должна быть разработана национальная конституция, и проведены выборы. Но различные концепции демократии, двойные страхи перед чрезмерным вмешательством центрального правительства или неспособностью контролировать милитаристов, а также отсутствие сильных демократических традиций бросают тень на нацию. Предстоит многое сделать, пока нация стремится разрешить эти разногласия... мирным путем, если это возможно."

 YUN_building_chinese_federalism_idea: "Построение китайского федерализма"
 YUN_building_chinese_federalism_idea_desc: "Построение нации требует огромных усилий. Построение традиции, возможно, требует еще большего. Китайские эксперименты с федерализмом ранее завершились провозглашением Конституции Цао Куня в 1923 году с ее дальнейшими уточнениями в 1928 году. Якобы федералистская, она была одновременно неосведомленной, плохо исполняемой и совершенно неспособной служить национальной конституцией в значительной степени из-за того, насколько она была расплывчатой. Отказываясь совершать глупую ошибку своих предшественников, юньнаньские федералисты клянутся обеспечить соответствие новому китайскому федерализму, основанному на историях успеха: Хунань, Юньнань. А не на глупом захвате власти харизматичными шарлатанами.\n\nОднако китайский федерализм — зверь громоздкий, с многочисленными противоположными интерпретациями. Для юньнаньцев они разделены на краю пропасти; придерживаясь идеалов, ценимых Чжан Тайянем, предоставляя широкую автономию провинциям в формате почти конфедерации. Или двигаясь к лянгистскому направлению мысли; сильной, централизованной и авторитарной форме федералистской демократии, на которой может быть построена китайская традиция гражданского участия масс."

 YUN_pursuing_the_liangist_ideal_idea: "Стремление к идеалу Ляна"
 YUN_pursuing_the_liangist_ideal_idea_desc: "Решив следовать традиции Ляна (Лян Цичао) в построении демократического государства, проект китайского федерализма принял строго централистский оборот. Желая не только сильной внутренней политики, но и сильной внешней политики, широкие права провинций нации, естественно, отошли на второй план перед политикой центрального правительства. Но не заблуждайтесь, идеал Ляна и федералистская мечта одинаково совместимы, и Тан Цзияо намерен показать достоинство своих слов."

 YUN_forging_the_great_commercial_circle: "Создание Великого коммерческого круга"
 YUN_forging_the_great_commercial_circle_desc: "Фундаменты, на которых построены такие нации, как Германия, Россия, Британия, Франция или Америка, имеют решающее значение и тройственны. Сельское хозяйство, торговля, промышленность. Три великих драйвера модернизации и прогресса в мире, это те принципы, на которых должна сосредоточиться собственная модернизация Китая, и, в конечном итоге, стать вершиной. Отменить Век унижений, создать «великий коммерческий круг», чтобы конкурировать с западными бизнесменами и государственными предприятиями, это высокие цели. Но, возможно, это начало китайского экономического века, не столь отдаленного в будущем."

 YUN_buddhism_as_national_binding_idea: "Буддизм как национальная скрепа"
 YUN_buddhism_as_national_binding_idea_desc: "Как предписано Чжан Тайянем, буддизм занимает уникальное место в китайской культурной сфере. Своего рода индивидуалистическая религия, она не требует от своих последователей ничего, кроме веры, служения и набора моральных принципов для соблюдения. Хотя объявление буддизма какой-то государственной религией является абсолютной ересью для наших республиканских ценностей, он все же служит общей связью для многих в стране. Индивидуум должен быть в приоритете, благосостояние людей и подаяние должны быть обеспечены, но мы все в конечном итоге связаны общей культурой, традициями и историей. Заботясь друг о друге в общинном духе, возможно, даже соблазн социализма может быть подавлен."

 YUN_equalisation_of_the_land_yes_equalisation_of_wealth_no_idea: "Уравнивание прав на землю — да! Уравнивание богатства — нет!"
 YUN_equalisation_of_the_land_yes_equalisation_of_wealth_no_idea_desc: "Государство должно быть сильным, это неоспоримая истина. Тайянь заигрывал и с полной конфедерацией, компромиссом и централизованными усилиями, и точно так же в экономике он был во многом таким же. Уравнивание прав на землю наряду с принципом «Земля — пахарю», это лишь естественные и своевременные ответы на почти феодальное состояние Китая. Однако правительство не может обеспечить абсолютное уравнивание богатства; перераспределения или апроприации. Ибо это, естественно, посеяло бы хаос в хрупком балансе Китая. Подчиняя знать государству и собирая их в советы, они могут заставить свой голос быть услышанным через соответствующие каналы, в то время как люди одновременно находят свою должную справедливость."

 YUN_the_promotion_of_positive_thinking_idea: "Продвижение позитивного мышления"
 YUN_the_promotion_of_positive_thinking_idea_desc: "Чтобы исправить десятилетия культурного и социального недуга, правительство предприняло кампанию «Продвижения позитивного мышления», в рамках которой конфуцианские мораль и ценности вновь прививаются населению. Точно так же среди масс должны культивироваться передовые интеллектуалы, и предотвращение любого дальнейшего ухудшения морального компаса общества должно быть дополнительным приоритетом. Чтобы продвинуться за пределы Эры милитаристов, нация должна быть всегда оптимистичной и осознавать свое место в мире, и долг интеллектуального класса — привить такой дух."

 YUN_mandatory_public_education_idea: "Обязательное государственное образование"
 YUN_mandatory_public_education_idea_desc: "Юньнань долгое время была рассадником образования и интеллектуализма на Юго-Западе. При этом Куньмин быстро расширялся, становясь рогом изобилия как революционной, так и интеллектуальной мысли. Усиленный склонностью Тан Цзияо благоволить интеллектуальному классу и приемом различных групп, спасающихся от репрессий, таких как Общество полумесяца, он действительно стал гражданской утопией. В качестве модели для подражания провинциальные усилия, впервые увиденные в Юньнани, стали обязательными во всех провинциях. С правительством, укомплектованным духовными преемниками ученых-чиновников, обычная неграмотность станет лишь вымыслом прошлого через поколение или два."

 YUN_the_anti_partisan_civil_service_idea: "Беспартийная гражданская служба"
 YUN_the_anti_partisan_civil_service_idea_desc: "Бюрократический недуг часто был проклятием многих сменявших друг друга китайских правительств. Некомпетентность, коррупция, фаворитизм; Синьхай одновременно высвободил эгалитаризм в массы и эгоизм в некогда прославляемые классы ученых-чиновников. Немногие сопротивлялись вопиющему покровительству предыдущих Центральных правительств, и те, кто сопротивлялся, часто оказывались изолированными от истинных арсеналов власти, за исключением, пожалуй, Дипломатического корпуса. Тем не менее, беспартийная гражданская служба должна быть моделью, к которой стремится нация. Как впервые показано в лучшем свете в Америке и поддержано Вашингтоном и Джефферсоном, бюрократы должны быть патриотического калибра, без привязанности к каким-либо политическим партиям. Чиновники должны, прежде всего, ставить на первое место страну, а не политику."

 YUN_declaration_of_total_war: "Объявление тотальной войны"
 YUN_declaration_of_total_war_desc: "Эта война — тотальная война! Война против деспотизма! Война против тирании! Война против тех, кто погрузил бы Китай во всепоглощающую пустоту автократии! Юньнань не может сидеть сложа руки, пока Республика, за которую она сражалась, разрывает себя на части все дальше и дальше. Не может быть никакого возмездия для головорезов и никакой пощады предателям. Юньнань была рассадником профессиональной солдатчины с начала века, движимый чувством долга, каждый юньнаньский солдат дисциплинирован, послушен и готов пожертвовать собой ради сохранения национальной целостности."

 YUN_the_legacy_of_decades_of_revolt: "Наследие десятилетий восстаний"
 YUN_the_legacy_of_decades_of_revolt_desc: "Юньнань, безусловно, является наиболее подготовленной провинцией для того, чтобы гарантировать, что наследие Синьхая не погибнет здесь. Избранный президент должен был бы создать общее национальное государство, и все же в его следе не было ничего, кроме хаоса. Нет обеспечения выживания, а только подрыв политических институтов Республики и злоупотребление полномочиями в личных целях. Повторение махинаций Юань Шикая может обмануть других, но юньнаньцы знают лучше, и наша судьба, передаваемая через десятилетия, — построить национальное единство через эмансипацию кровопролития."

 YUN_before_lights_out: "Перед отбоем"
 YUN_before_lights_out_desc: "Свобода! Свобода — это то, за что мы сражаемся! Чтобы вернуть уверенность Китая и его позицию на мировой арене! Не может быть неудачи на пути к нашей триумфальной победе! Прижатые спиной к стене, мы должны лишь наносить безжалостные удары, сжигая все на своем пути, чтобы обеспечить возвращение Поднебесной к стабильности и гармонии, а не тирании или деспотизму."

 YUN_dead_men_walking: "Ходячие мертвецы"
 YUN_dead_men_walking_desc: "Разве мы не были достойны? Наши ряды сломлены. Наш боевой дух разбит. У наших людей больше нет воли сражаться... Если Китай действительно должен быть отправлен в неизбежную диктатуру, мы можем только надеяться, что история оправдает нашу борьбу..."

 YUN_all_power_to_the_constitutional_government: "Вся власть конституционному правительству"
 YUN_all_power_to_the_constitutional_government_desc: "Федералистский проект не может быть проектом одного лишь одинокого титана, нет. Это миссия освобождения каждой провинции и каждого гражданина Китая, и как таковая требует перекрестного сотрудничества между всеми желающими союзниками. В знак этого правительство провинции Юньнань начало переправлять промышленные ресурсы и материалы в ведущую провинцию федералистского движения, чтобы укрепить их совместный союз."

 YUN_empowering_of_local_assemblies: "Наделение полномочиями местных собраний"
 YUN_empowering_of_local_assemblies_desc: "Долг движения за местное самоуправление — гарантировать, что китайский народ готов и желает участвовать в истинной гражданской демократии. В результате необходимо, чтобы различные федералистские провинциальные движения, по крайней мере, насколько мы можем видеть, наделили полномочиями и экспериментировали с демократией на местном уровне. Провинциальное и национальное конституционное правление, безусловно, может подождать, сначала люди должны познакомиться с управлением по-своему."

 YUN_paying_the_cost_for_peace: "Плата за мир"
 YUN_paying_the_cost_for_peace_desc: "Всегда беспокойное ружье у нас за спиной, клики Мэнцзы и Лун Юня из клики Юньнань долгое время поддерживали непростой и напряженный мир с Королем в Куньмине. С фокусом на островной политике неизбежно, что нелояльные комиссары обороны должны будут быть призваны к порядку, и, будучи всегда опытным политиком, губернатор знает, что ни один генерал не может устоять перед пушечным выстрелом в 20 000 серебряных долларов. Это может быть дорого сейчас, но это обеспечит наше состояние в будущем."

 YUN_pursuit_of_the_insular_policy: "Проведение политики изоляции"
 YUN_pursuit_of_the_insular_policy_desc: "В связи с геополитической ситуацией в Китае, позволяющей проводить островную политику реконструкции и примирения в свете дополнительного буфера на границах провинции, Мяо Юньтай был призван к действию для проведения всех и любых его реформ экономической политики. Эффективно отступая от активных военных попыток навязать единство Китаю, по крайней мере, когда это возможно, Юньнань со временем станет метрополией."

 YUN_support_for_patriotic_labour_unions: "Поддержка патриотических профсоюзов"
 YUN_support_for_patriotic_labour_unions_desc: "Вполне естественно, что рабочие получают свое должное представительство в китайском обществе. Они являются лишь истинной, серьезной, честной и искренней частью великой индустриализации Китая. Однако они не могут быть сбиты с пути революционерами, которые стремились бы злоупотреблять ими в своих собственных целях, и они не могут позволить своей роли в обществе стать политизированной самой по себе. Аполитичный патриотизм — это добродетель, к которой мы все должны стремиться, и вполне справедливо, что рабочие тоже заботятся об этом понятии."

 YUN_expansion_of_the_fudian_bank: "Расширение банка Фудянь"
 YUN_expansion_of_the_fudian_bank_desc: "С момента постепенного сокращения центральной власти из-за упадка Цин иностранные банкноты частично вытеснили национальную китайскую валюту в пограничных провинциях. Естественно, с началом Синьхая, низложением Цин и практической независимостью пограничных провинций такие проблемы были увеличены «предприимчивыми» финансистами, надеющимися сбалансировать свои бюджеты с помощью более сильной валюты. Намереваясь контролировать свою собственную валюту и финансовые резервы, Юньнаньское провинциальное бюро общественных денег было реорганизовано в банк Фудянь.\n\nВыпуская свои собственные банкноты и неуклонно развивая влияние, банк имел ограниченное влияние на границы провинции, пока нынешние правительственные усилия не начали быстро расширять охват банка. Разделяя провинцию на Северную и Южную экономические зоны, постепенное развертывание и расширение отделений банка Фудянь начало укореняться."

 YUN_the_promotion_of_education_to_the_masses: "Продвижение образования в массы"
 YUN_the_promotion_of_education_to_the_masses_desc: "Истинный источник неравенства и несчастья Китая — это не только тяжелое положение крестьянства, но и их грамотность. Их образование. Фундаментом любого современного развитого общества является стандартный уровень образования, поддерживаемый и гарантируемый государством. Когда вряд ли какой-либо гражданин умеет читать, как они могут голосовать? Как новый интеллектуальный рог изобилия нации, Юньнань должна возглавить усилия по повышению национальной грамотности."

###- NPA Political Ideas -###
 YUN_NPA_popular_support_desc: "Популярный образ милитариста — это образ произвольного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью и окруженного декадентским двором порока и подхалимов. Реальность гораздо более нюансирована. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Кроме того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономической элиты, общественных деятелей и интеллектуалов.\n\nПолитическая легитимность — чрезвычайно ценная валюта. Хотя не каждый милитарист был обязательно «популярен», они зависели от видимости стабильности и порядка, чтобы оправдать свое правление и поддерживать свои неформальные личные сети. Как следствие, большинство проводило свои рабочие часы, встречаясь с различными фигурами со всего общества, поддерживало провинциальные собрания и щедро жертвовало на благотворительность — в дополнение к надзору за казнями и обширным аппаратом безопасности.\n\nНе будучи чуждыми такому положению дел, клика Юньнань наконец обрушилась на своих младших и утопистов. Они сражались и проливали кровь за Китай и слишком хорошо знают ужасные последствия идеализма в этом жестоком мире. Выжить могут только сильные, а не те, кто витает в облаках."

 YUN_NPA_popular_support_endgame_desc: "Популярный образ милитариста — это образ произвольного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью и окруженного декадентским двором порока и подхалимов. Реальность гораздо более нюансирована. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Кроме того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономической элиты, общественных деятелей и интеллектуалов.\n\nНе будучи чуждыми такому положению дел, клика Юньнань наконец обрушилась на своих младших и утопистов. Они сражались и проливали кровь за Китай и слишком хорошо знают ужасные последствия идеализма в этом жестоком мире. Выжить могут только сильные, а не те, кто витает в облаках."

 YUN_NPA_popular_support_1: "Стабильность республиканского бастиона: §RТрубадуры и змеи§!"
 YUN_NPA_popular_support_1_desc: "$YUN_NPA_popular_support_desc$"

 YUN_NPA_popular_support_2: "Стабильность республиканского бастиона: §OРазбита§!"
 YUN_NPA_popular_support_2_desc: "$YUN_NPA_popular_support_desc$"

 YUN_NPA_popular_support_3: "Стабильность республиканского бастиона: §nВременный ремонт§!"
 YUN_NPA_popular_support_3_desc: "$YUN_NPA_popular_support_desc$"

 YUN_NPA_popular_support_4: "Стабильность республиканского бастиона: §CУкрепленные стены§!"
 YUN_NPA_popular_support_4_desc: "$YUN_NPA_popular_support_desc$"

 YUN_NPA_popular_support_5: "Стабильность республиканского бастиона: §GПравительство национальной защиты§!"
 YUN_NPA_popular_support_5_desc: "$YUN_NPA_popular_support_desc$"

 YUN_NPA_popular_support_the_democratic_fortress: "Стабильность республиканского бастиона: §gДемократическая крепость§!"
 YUN_NPA_popular_support_the_democratic_fortress_desc: "$YUN_NPA_popular_support_endgame_desc$\n\nБлизкий ко многим членам зарождающейся в Китае Федерации китайских демократических партий и Демократической лиги Китая, Лун Юнь сумел изобразить себя демократом, несмотря на все представления о его железной хватке в Юньнани. Теперь президент Китайской Республики, Лун стремится экспортировать свою модель «Демократической крепости» на национальную сцену. При поддержке различных ключевых демократических фигур, кажется, что Дракон Дянь доволен тем, что видит нацию на пути к демократической эмансипации, пока он является ее неотъемлемой частью."

 YUN_NPA_popular_support_the_guided_revolution: "Стабильность республиканского бастиона: §gУправляемая революция§!"
 YUN_NPA_popular_support_the_guided_revolution_desc: "$YUN_NPA_popular_support_endgame_desc$\n\nВряд ли готовый поднять Белое Солнце в лучшие времена, Лун Юнь долгое время сочувствовал революционным движениям Китая. Но, поклявшись в своем долге и своей роли Дракона Юньнани, Лун вряд ли считал членство в партии или какие-либо открытые действия стоящими свеч. Тем не менее, провозглашая свою собственную одноименную клику, укомплектованную придворными революционной веры, Лун создал технократическое правительство, украшенное революционными атрибутами, но движимое конечным прогрессом для Китая."

 YUN_NPA_popular_support_all_under_the_great_commander: "Стабильность республиканского бастиона: §PВсе под Великим Командующим§!"
 YUN_NPA_popular_support_all_under_the_great_commander_desc: "$YUN_NPA_popular_support_endgame_desc$\n\nЗаискивая перед политиками и военными офицерами всех мастей, Ху Жоюй сумел подняться не только в рядах клики Дянь, но и на национальном тотемном столбе. Считающийся послушником Чжили, посторонним в их семье, он сумел занять их место в нации под своей собственной кликой Мэнцзы. Объединяя силой, Ху представляет образ, похожий на дерзкую натуру Цай Э, его духовного праотца, и пока правит Ху Жоюй, благоприятное управление гарантировано."

 YUN_NPA_popular_support_the_new_age_of_export_militarism: "Стабильность республиканского бастиона: §PНовая эра экспортного милитаризма§!"
 YUN_NPA_popular_support_the_new_age_of_export_militarism_desc: "$YUN_NPA_popular_support_endgame_desc$\n\nВозможно, проявляя величайшие добродетели легендарных юньнаньских героев древности, Лу Хань придал новый смысл фразе «выживает только сильнейший». Поднимаясь в рядах клики Дянь, Лу обошел как своего двоюродного брата Лун Юня, так и своего соперника Ху Жоюя, чтобы взойти на высший пост во всей нации. Авантюрный, категоричный, политический хамелеон в своем лучшем проявлении, Лу объединился с революционерами, демократами и милитаристами в равной степени, надеясь сохранить инициативу в китайском милитаризме и закрепить роль нации на мировой арене."

 YUN_celebrating_revolutionary_tradition: "Celebrating Revolutionary Tradition"
 YUN_celebrating_revolutionary_tradition_desc: "Modern China is a nation born within the flames of revolutionary fervour, there can be no denying it. It is a nation of sacrifices, of courage, and as such it is only natural that government's embrace, celebrate, and extol such virtues. In this all consuming civil war, you cannot deny the righteous Chinese youth and citizens their right to exhibit their anger at the cruel state of the nation's affairs, instead you must harness it to see a new China form from the ashes."

 YUN_hinging_everything_on_total_victory: "Hinging Everything on Total Victory"
 YUN_hinging_everything_on_total_victory_desc: "Ever in pursuit of that decisive victory, that first kick in the door that shall cause the obliteration of the enemy's lines and morale, this is what the Kunming Military Academy trained the Yunnan Army for. Vigour, the endurance of hardship, and the upholding of a revolutionary republican ideal. Only through such difficulties, may the nation exhibit reform and progress."

 YUN_chinas_praetorians: "China's Praetorians"
 YUN_chinas_praetorians_desc: "Defending China's republican institutions, the constitution, and her frontier border with their lives, the Yunnan Army is the last line of defence for many Chinese. Called upon once more to fight for the values often forgotten by those in the Capital, the Yunnanese shall not allow autocracy, or the flagrant abuse of law and judiciary to see the sundering of Five Races Under One Union."

 YUN_faltering_hopes: "Faltering Hopes"
 YUN_faltering_hopes_desc: "And to what end? To what end did so many brave soldiers die? Without order, or without reason, it would appear that the morale of the Yunnanese lines have utterly collapsed, welcoming mass defections, surrendering of key positions, and an ultimate sense of defeatism within the ranks. Whilst the high command insists to the Governor that they can push on, few share their optimism."

 YUN_increasing_isolationist_politics: "Increasing Isolationist Politics"
 YUN_increasing_isolationist_politics_desc: "To combat increasing hostilities outside of the sphere of Yunnan's control, the provincial administration has adopted a policy of isolationism, outwardly stating their abandoning of national ambitions, hoping to retain their corner of the Southwest alone. In conjunction with this reorientation, the Governor has ordered an increase in the development of fortifications and trenches at key weakpoints within Yunnan and Guizhou."

 YUN_culling_incompetents: "Culling Incompetents"
 YUN_culling_incompetents_desc: "Many within the Yunnan Army still retain loyalties to Tang Jiyao, or other spectres of the past administration, and without a stable control on the military arm, few can expect to survive years in office as Governor of any province, let alone one as militarised as Yunnan. By conducting a swift and thorough army purge, reorganising and slimming divisions, alongside promoting key loyalists, the Yunnan Army is undergoing a stringent period of reconstruction."

 YUN_continuation_of_the_tang_policy: "Continuation of the Tang Policies"
 YUN_continuation_of_the_tang_policy_desc: "Whilst Governor Tang may no longer hold the reigns in his steadfast grip, much of his old administration has managed to survive both the recent coup and turmoil before that. Indispensable in their efforts to keep the provincial bureaucracy from falling to anarchy, the new Governor has deigned it a pragmatic yet unpopular move to retain much of the existing civil servants, whilst continuing the reform plans implemented and produced by Tang Jiyao's administration."

 YUN_tribute_for_autonomy: "Tribute for Autonomy"
 YUN_tribute_for_autonomy_desc: "Whilst not wholly conquered, the Yunnan Clique has at least nominally sworn fealty to another Chinese warlord with far more national ambitions. In order to preserve local autonomy, and to prevent another disastrous offensive war, the Yunnan provincial administrations has begun to forward materiel and industrial aid to their allies, as a sort of tithe."

 YUN_maintaining_open_mindedness: "Maintaining Open Mindedness"
 YUN_maintaining_open_mindedness_desc: "Ever the pragmatist, Long Yun has often kept his options ever open and ever available in matters involving Yunnan's external positioning. Be it Reformist, Warlord, or Chairman, Long has shaken hands with associates of all backgrounds, and cast himself equally as a democrat, a principled Governor, or resilient revolutionary. But at home, make no mistake, the King of Yunnan rules with a harsh policy, annihilating any potentially destabilising force foolish enough to rear its head."

 YUN_revival_of_export_militarism: "Revival of Export Militarism"
 YUN_revival_of_export_militarism_desc: "Foolishly, previous Yunnanese administrations sought to retreat entirely from their duties and investments outside of provincial control. Opting to abandon national ambitions and isolating the Clique from the rest of China, they bore witness to a great diminishing of Yunnan's capacity to exert itself. Not only within the nation, but on the borders in the West, and Southeast. Yunnan is a province known for being the kingmaker of the Southwest, and it is time that it acts like it."

 YUN_the_yunnan_provincial_economic_committee: "The Yunnan Provincial Economic Committee"
 YUN_the_yunnan_provincial_economic_committee_desc: "Founded by Lu Chongren, Miao Yuntai, Li Peiyan, Zhang Banghan, and many others, the Yunnan Provincial Economic Committee's purpose is to rectify the dire economic situation that the province has recently found itself in. With an increased period of warfare and a collapse in financial stability alongside trade, the YPEC has been tasked with finding novel solutions to Yunnan's current difficulties. Through methods such as the reformation of the tax services, establishment of new bureaus and collection networks alongside the levying of new taxes, monopolies on opium and other goods, and nationalisation of provincial banking services, the YPEC has been granted a relatively free hand to conduct itself as it sees fit to save Yunnan's economy."

 YUN_spartan_education: "Spartan Education"
 YUN_spartan_education_desc: "Held to the highest regard for his service in local provincial educational matters, Cun Shusheng has been granted the spotlight by the Yunnan provincial government to popularise his methods of \"Spartan Education\". By teaching students to be self-sufficient warriors capable of surviving the harsh reality of a nation with thousands of years of tradition under-siege, he hopes to cultivate a sense of duty, honour, pragmatism and adherence to new ideas amongst Yunnan's future generations."

 YUN_establishing_a_provincial_monopoly_idea: "Establishing a Provincial Monopoly"
 YUN_establishing_a_provincial_monopoly_idea_desc: "Devised by Lu Chongren, the Yunnan's new economic model revolves around the concept of finance sustaining production, which there onwards enriches finance. By expanding state-owned enterprises and vigorously improving local production methods whilst enforcing a strict state monopoly, Lu hopes to create an infinitely sustainable economic growth model. Competing with Miao Yuntai, Lu's Provincial Enterprise Bureau and four major banks have become the bedrock of his ambitious economic reforms."

 YUN_architect_of_a_new_china: "Architect of a New China"
 YUN_architect_of_a_new_china_desc: "Perhaps one of the greatest economists to have offered his services during the Warlord Era, and having served every Yunnanese provincial administration, Miao Yuntai rose to fame initially after his tenure as general manager of the Yunnan Tin Company saw the drastic rise in profits of the local tin industry, and as president of the Fudian Bank, alongside the provincial Chamber of Commerce. The Architect of much of Yunnan's economic success, he has once again managed to secure a lucrative economic deal with various foreign contractors to Yunnan's great benefit."

 YUN_industrialisation_by_the_train_track: "Industrialisation by the Train Track"
 YUN_industrialisation_by_the_train_track_desc: "Whilst railways may have led to the collapse of the Zhili Clique, it is an ever present fact that the interior of China still remains relatively untouched by modern track. With the Kunming-Haiphong Railway being the largest arterie in and out of Kunming, it serves almost exclusively to export goods such as tin and opium to Indochina, and onto further markets. If China is truly to be a modern nation, it must equally have plentiful modern track to sustain its industrialisation."

 YUN_devastating_economic_catastrophe: "Devastating Economic Catastrophe"
 YUN_devastating_economic_catastrophe_desc: "With the pursuit of unification of the nation, China has underwent a myriad of terrible troubles along such an unsteady path. Perhaps the worst of them all however, is that of the economic consequences of decades of warfare and warlordism. Hyperinflation, rampant militarism, civil war, banditry, and a general lack of financial stability or cohesion amongst the provinces has resulted in the mass withdrawal of investors, the general inability to efficiently collect taxes, or for there to be a unified national currency or tax system in the first place. AS the nation recovers, it is imperative that its best minds work swiftly to repair the presently dire economic straits."

 YUN_inexperience_and_lack_of_cohesion: "Inexperience and Lack of Cohesion"
 YUN_inexperience_and_lack_of_cohesion_desc: "Politically, the Dian Clique is far from a unified outfit. Appealing to all manner of local politicians, officers, and bureaucrats, the only ruling ideology of the day was inherent republican pragmatism. Similarly, Yunnan provincial political dynamics would ensure that the deciding fact of one's own success in the province was commonly that of one's own strength. Yet having emerged to rule the national stage, matters have become incredibly complex, requiring a certain level of skillful tact to navigate, all the while various organised political outfits besiege the Central Government for some sort of agenda."

 YUN_the_state_within_the_state: "The State Within the State"
 YUN_the_state_within_the_state_desc: "As the heirs to a legacy of Chinese militarism and the foundations of modern warlordism, it should become no surprise that the inherent vices of the Dian Clique have re-emerged with their new successes and conquests. Requiring the administration of vast swathes of territory far outside their home province, the National Army has become something of a hyper militarised and over-inflated goliath. With various attempts at insubordination since unification, and a certain level of \"Napoleonic\" belief in their own right to steer the nation, the army has in-effect become a state within the state, holding China hostage under its whims."

 YUN_of_many_cultures_and_many_histories: "Of Many Cultures and Many Histories"
 YUN_of_many_cultures_and_many_histories_desc: "Built upon the foundations of Five Races Under One Union, the Beiyang Republic has long espoused the notion of harmony between the Han, Manchu, Mongols, Hui, and Tibetans. Constructing the \"whole\" Chinese identity as a nationally binding sentiment, it still falls short of the necessary qualities to represent the many peoples that contribute towards the Chinese nation-state. In Hulunbuir and Barga, the Daur people once advocated for a six-nation republic, and in 1911 Cai E himself advocated for a seven-nation republic, adding Miao and Liao to the original five.\n\nBut China is a nation of many more: Zhuang, Yi, Tujia, Buyei, Dong, Yao, and other minorities constitute the Chinese identity. As such, representative of all Chinese, and ruled by a Yi President, the nation must embrace its multi-cultural identity, enshrining protections for minority cultures, and reflecting upon our joint history."

 YUN_the_roulette_of_backstabbing_and_betrayals: "The Roulette of Backstabbing and Betrayals"
 YUN_the_roulette_of_backstabbing_and_betrayals_desc: "With no clear cut \"leader\", the closest having been Tang Jiyao in his prime, the Dian Clique has perhaps been one of the most bloody and servile Warlord cliques of the whole era. With blood brother killing blood brother, and various coups having been conducted, or otherwise attempted, it must be of no surprise that with external enemies subdued, the tornado of malice would turn inwards. Like Luo Peijin, Zhu De, Gu Pinzhen, Long Yun, and Tang Jiyao before them, Lu Han and Hu Ruoyu have engaged in a brutal and bitter spat to declare their supremacy. And the stakes could not be any higher, for whomever emerges on top will not only secure the Dian Clique and Yunnan, but China as a whole."

 YUN_national_youth_league_affairs_bureau: "National Youth League Affairs Bureau"
 YUN_national_youth_league_affairs_bureau_desc: "Originally a provincial organisation started under the auspices of the Dian Clique to oversee the training of the future generations, the Yunnan Youth League Affairs Bureau has served as a model to be constituted all around the nation. Not only enshrining the values of the administration within the youth, but preparing them for their future as soldiers and contributing citizens to the Chinese nation-state, the Youth League informs them of their responsibilities to the national whole, and of their obligations towards the government and army. With personal politics remaining one's own sphere, the National Youth League Affairs Bureau strives for apolitical training, and influence within the youth, without the trappings of similar initiatives from the Kuomintang, or Young China Party."

 YUN_obligations_of_the_military_idea: "Obligations of the Military"
 YUN_obligations_of_the_military_idea_desc: "It is only natural that the warriors of unification, national self-strengthening, and the Republican revolution be the same men to lead the Chinese nation-state onto a new era of prosperity. Obligated to defend China's interests at home and abroad, the professional soldier should conduct himself in national politics akin to that of their career in the common soldiery. Whilst it is preferable that the men of words remain in their civilian spheres, and the men of guns in their military spheres, should the nation be at risk of subversion or otherwise, officers must but only seize the initiative to correct China's course."

 YUN_striking_a_mutually_beneficial_deal: "Striking a Mutually Beneficial Deal"
 YUN_striking_a_mutually_beneficial_deal_desc: "Long having been the backbone of China's prosperity, the gentry have seen much of their rights and say in national politics diminished under the stature of wartime conditions, and the necessity to sacrifice anything, and pursue any course, in order to defend the nation from imperialist invasion. Yet with the resumption of peacetime, they have begun to chafe under the authority of not only military governors and administrators all around China, but under the stresses of the masses, and of bandits.\n\nBy reassuring the gentry of their status in China's national harmony, and protecting them from their greatest threats, the government will be able to extract incredible usefulness in economic advancement, and political stability, as they aid in the restoration of order and finances. Albeit, some sympathetic to the plight of the masses raise concerns that the so-called \"mutually beneficial deal\" is a short term solution, with long term consequences."

 YUN_fallout_of_the_gentry_deal: "Fallout of the Gentry Deal"
 YUN_fallout_of_the_gentry_deal_desc: "Despite assurances to the contrary, the so-called \"mutually beneficial deal\", what was at least unofficial and handled by handshake and promises, has become a publicised controversy against the Central Government. With various tabloids and newspapers producing a series of dismissals and rebuttals of the government's land reform strategy, the publicisation of a clear preference for the \"Local Gentry and Evil Bullies\" over the plight of the common man has resulted in the masses protesting severely. Not only that, but with their increasing influence and amassment of wealth, the gentry have begun to avoid even their obligations to the state, skirting tax duties and otherwise ignoring state intrusions into their affairs."

 YUN_responsibility_for_the_nation_state: "Responsibility for the Nation-State"
 YUN_responsibility_for_the_nation_state_desc: "The President of China is expected in his role to serve in the creation of a shared nation-state, in which every citizen could assume their respective responsibility for the well-being of the nation state, and its survival. As such, the President's priorities must always align with constitutionalism and national unity, not partisan politics or other loyalties. Under a strong president, and a strongly centralised republic, China should be guaranteed stability, progress, and harmony. And should any such facet fail or be disregarded, the state's veto above all else is that of its Praetorian Guard, the armed forces."

 YUN_economic_regulation_committee: "Economic Regulation Committee"
 YUN_economic_regulation_committee_desc: "Consolidated as an outgrowth of local provincial efforts to modernise the Yunnan tax systems and reduce inefficiencies, the now national Economic Regulation Committee is a multi-faceted governmental organisation tasked with a myriad of duties to rectify state finances, incentivise investments, and provide for the nation's people. Abolishing all previous loans and levies, streamlining currencies into that of a new resilient paper currency and affirming taxes to the rate of five paper dollars for every existing silver dollar, and applying extra taxes on luxury goods are but a few of the many tasks the committee is involved with.\n\nIn conjunction, it serves to enhance and strengthen the state monopoly on various key nationalised industries, the advancement of local and international investments, repaying of foreign debts, and the further industrialisation of China wholesale."

YUN_the_three_trainings_and_three_commandments: "Три обучения и три заповеди"
 YUN_the_three_trainings_and_three_commandments_desc: "Пропагандируемые Ань Эньпу в клике Дянь, Три обучения и три заповеди — это серьезный modus operandi, которым должна руководствоваться армия, чтобы укрепить строгую дисциплину и исправить свои ошибки. Так, Три обучения — это внушение ценностей, что «честность священна», что «усердие всемогуще» и что «эгоизм — зло». Точно так же Три заповеди — это запрет эгоизма, азартных игр и других пороков.\n\nСтрого охраняя от коррупции день и ночь, солдатам нужно напоминать об их обязанностях и чести, уклоняясь от взяток, обмана людей или нарушения законов, которые они защищают, во вред обществу."
