 ### Ideas ###

 HND_influence_of_the_mahatma: "Влияние Махатмы"
 HND_influence_of_the_mahatma_desc: "Мохандас Карамчанд Ганди, широко известный просто как \"Махатма\", потенциально является самым важным человеком не только в Индийском национальном конгрессе, но и в Индии в целом. Его влияние ощущают и уважают все, кто участвует в политической жизни республики, даже те, кто питает к нему неприязнь из-за его жизненно важной роли в обеспечении прекращения огня после первой революции. Несмотря на то, что его неизменный пацифизм все больше и больше приводит к разногласиям с милитаристами из ИНК, мало кто может усомниться в его роли великого объединяющего лидера индийского народа."

 HND_rise_above_the_scars_idea: "Залечить свои раны"
 HND_rise_above_the_scars_idea_desc: "Возможно, потребуются столетия, чтобы по-настоящему оправиться от разрушений, от которых Индия пострадала с первых дней революции, но правительство Республики твердо направило Индию по пути не только восстановления, но и настоящего процветания."

 HND_arms_of_the_revolution_idea: "[HND_GetArmsOfTheRevolutionIdeaName]"
 HND_arms_of_the_revolution_idea_desc: "[HND_GetArmsOfTheRevolutionIdeaDesc]"
 HND_arms_of_the_revolution_idea_default: "Оружие Революции"
 HND_arms_of_the_revolution_idea_default_desc: "Хотя Индия, возможно, и заслужила свою свободу, стало очевидно, что ей нужно будет продолжать бороться за сохранение этой свободы. С этой целью [socialist_india_events.GetNameDef] выделила значительные средства на строительство оружейных заводов и производство огнестрельного оружия, чтобы гарантировать, что все желающие защищать свободу своей страны будут должным образом экипированы для этого."
 HND_arms_of_the_revolution_idea_non_socialist: "Оружие нации"
 HND_arms_of_the_revolution_idea_non_socialist_desc: "$HND_arms_of_the_revolution_idea_default_desc$"

 HND_army_reform_1: "Неготовая армия"
 HND_army_reform_1_desc: "После нескольких лет, когда конфликт в Индии был заморожен в условиях неустойчивого мира, армия Бхаратии постепенно пришла в упадок, оказавшись неготовой к тому, что война действительно возобновится, и многие в высшем командовании настаивают на ее немедленном реформировании."
 HND_army_reform_french: "Пример Франции"
 HND_army_reform_french_desc: "Черпая вдохновение и значительную помощь у родины революции, [FRA.GetNameDef], индийская армия постепенно пытается модернизировать себя по образцу своих европейских коллег. Хотя военная промышленность Индии, возможно, и не настолько сильна, чтобы сравняться с современными европейскими армиями, есть надежда, что эти реформы дадут ей серьезное преимущество перед их региональными врагами."
 HND_military_railways_idea: "Военные железные дороги"
 HND_military_railways_idea_desc: "Логистика всегда помогала выигрывать войны, и с тех пор, как появились поезда, военные действия часто оказывались неразрывно связанными с железнодорожными линиями, которые обеспечивают войска питанием и вооружением. Благодаря постоянному развитию и расширению железных дорог [socialist_india_events.GetNameDef] надеется гарантировать, что, когда их людям понадобятся боеприпасы, они никогда не будут ждать их прибытия."
 HND_army_reform_traditional: "Традиционная армия"
 HND_army_reform_traditional_desc: "Избегая тактики и технологий своих союзников на Западе, [socialist_india_events.GetNameDef] вместо этого решила обратиться к традиционным методам ведения войны индейцами и усовершенствовать их для современной эпохи. Есть надежда, что со временем их армия превзойдет своих соперников и, возможно, даже представителей Запада, на которых они не обращали внимания."
 HND_gunpowder_legacy_idea: "Наследие пороха"
 HND_gunpowder_legacy_idea_desc: "На протяжении многих веков порох доминировал на Индийском субконтиненте, способствуя как подъему, так и падению многих могущественных империй, которые установили свой контроль над его территориями. Индийская армия не из тех, кто пренебрегает традициями, и они позаботились о том, чтобы артиллерия заняла прочное место в ее войсках."

 HND_indigenous_innovation_idea: "Местные инновации"
 HND_indigenous_innovation_idea_desc: "Вместо того, чтобы просто получать доступ к чертежам самолетов от своих союзников и дружественных по отношению к ним стран, [socialist_india_events.GetNameDef] вместо этого решила профинансировать создание собственных конструкций самолетов, при этом основные средства будут направлены ученым, экспериментирующим с тем, как обеспечить свои военно-воздушные силы необходимым преимуществом."
 HND_foreign_designs_idea: "Использовать зарубежные наработки"
 HND_foreign_designs_idea_desc: "Имея довольно ограниченные собственные военно-воздушные силы, [socialist_india_events.GetNameDef] решила опереться на свои международные связи и лицензировать чертежи для проектирования самолетов у тех, с кем они могут заключить выгодную сделку."
 HND_fighter_idea: "Доминирование в воздушном бою"
 HND_fighter_idea_desc: "Для индийских военно-воздушных сил победа в битве истребителей является наивысшим приоритетом, и поэтому они позаботились о том, чтобы их самолеты были оснащены броней самого высокого качества, какую только могут предоставить, что гарантирует их долговечность в бою."
 HND_cas_idea: "Смертельный дождь над полем боя"
 HND_cas_idea_desc: "Стремясь помочь своим пехотинцам, военно-воздушные силы Индии значительно усовершенствовали самолеты ближней поддержки, способные бомбить поле боя, что, по их мнению, даст им преимущество, необходимое для победы над любым противником."
 HND_navalbomber_idea: "Двойной театр"
 HND_navalbomber_idea_desc: "Понимая, что дешевые самолеты могут легко обеспечить им преимущество в морской войне, [socialist_india_events.GetNameDef] решил профинансировать разработку эффективных и доступных по цене военно-морских бомбардировщиков. Есть надежда, что эти бомбардировщики помогут выровнять ситуацию в условиях численного превосходства великих военно-морских сил мира."
 HND_combined_air: "Общее развитие ВВС"
 HND_combined_air_desc: "Несмотря на то, что индийские военно-воздушные силы начинали практически с нуля, за несколько коротких лет они превратились в грозную силу. Те, кто недооценивал их, быстро смирились и в конце концов осознали свою гордыню, только когда увидели летящую на них бомбу."
 HND_rule_the_skies_idea: "Коснись неба славой"
 HND_rule_the_skies_idea_desc: "$HND_combined_air_desc$"

 HND_grand_fleet_idea: "Владыки Индийского Океана"
 HND_grand_fleet_idea_desc: "Индийский океан огромен, и [socialist_india_events.GetNameDef] не скрывает своего желания приручить его необъятность. Они выдвинули свои грандиозные амбиции по созданию военно-морского флота, способного обеспечить превосходство во всем океане, и они не потерпят никаких отступлений от этой цели.."
 HND_trade_protection_idea: "Защита морской торговли"
 HND_trade_protection_idea_desc: "Еще в I веке индийские торговцы добирались почти до всех уголков старого света, и их товары можно было найти от Рима до Лояна. Именно благодаря этому наследию военно-морской флот Индии по-прежнему действует в наши дни, защищая свои торговые суда от врагов, независимо от того, являются ли они более похожими на пиратов древности или являются группами подводных лодок их врагов."
 HND_rule_the_waves_idea: "Благославление Варуны"
 HND_rule_the_waves_idea_desc: "С момента своего скромного основания на нескольких кораблях, захваченных после революции, военно-морской флот Индии превратился в респектабельный военно-морской флот, способный бросить вызов своим врагам и защитить Индию от иностранного вторжения в любых водах."

 HND_operation_thunder_idea: "Oперация \"Гром\""
 HND_operation_thunder_idea_desc: "Операция "Гром", кодовое название которой - вторжение Бхаратии на территорию конкурирующих правительств субконтинента, сейчас в самом разгаре. Действуя по приказу маршала Кариаппы, индийская армия надеется быстро нанести удар по самому слабому из своих противников, пронзив его насквозь подобно удару молнии, а затем нанести удар по другому противнику."

 HND_unity_and_brotherhood_idea: "Единство и братство"
 HND_unity_and_brotherhood_idea_desc: "Руководство Индии убеждено, что любой человек, родившийся и выросший в любой точке страны, от Бенгалии до Пенджаба, в глубине души является индийцем, независимо от его веры или взглядов. Однако они уважают то, что между ними все еще существуют различия, как и между братьями, и радуются этим различиям. Они верят, что в конечном счете, какими бы разными они ни были, их по-прежнему объединяет общая кровь и братство."
 HND_swadeshi_idea: "Принцип Свадеши"
 HND_swadeshi_idea_desc: "По мнению председателя Найду, свадеши - это не просто самодостаточность отдельного человека или даже защита нашей собственности от угнетателей, это способность всей нации жить с тем, что ей предоставлено, используя то, что необходимо, а не пытаться погрязнуть в капиталистических пороках. С этой целью [socialist_india_events.GetNameDef] уделяет особое внимание внутренней автаркии, а не внешней торговле, в рамках своих усилий по подъему нации."
 HND_satyagraha_idea: "Продвижение принципов Сатьяграха"
 HND_satyagraha_idea_desc: "После победы аграриев ИНК остался тверд в своей вере в то, что именно благодаря их деятельности в качестве сатьяграхи нация была освобождена. Они также верят, что эти методы также начали освобождать их народ от присущего многим из них угнетения, и поэтому их правительство позаботилось о дальнейшей интеграции этих идеалов во все аспекты национального законодательства и жизни.."
 HND_sarvodaya_idea: "Сарводайя"
 HND_sarvodaya_idea_desc: "Концепция сарводайи, всеобщего возвышения всех народов Индии, выражалась Махатмой Ганди на протяжении десятилетий. Существует убеждение, что когда ситуация улучшается для целого, она улучшается и для отдельного человека; и когда парикмахер подстригает волосы мужчине или строитель заканчивает установку двери, они оба в равной степени трудятся на благо общества. Аграрная фракция ИНК долгое время придерживалась этой веры и благодаря своему недавнему руководству объединила ее с социалистической мыслью, создав уникальную индийскую систему социалистической теории."
 HND_untouchability_banned_idea: "Запрет неприкасаемости"
 HND_untouchability_banned_idea_desc: "Массовая дискриминация далитов уже давно является серьезной проблемой в Индии, одним из главных недостатков кастовой системы для многих реформаторов. В соответствии с конституционной поправкой, эта дискриминация была полностью объявлена вне закона в Бхаратии, при этом были приняты серьезные правовые меры защиты от любых форм дискриминации по кастовому признаку."

 HND_spiritual_guidance_idea: "Духовное руководство"
 HND_spiritual_guidance_idea_desc: "Хотя влияние Ганди на ИНК, возможно, уже не так сильно, как раньше, его роль номинального главы как партии, так и нации по-прежнему вызывает большое доверие у индийского народа, и хотя у председателя могут быть свои собственные идеи и убеждения, он по-прежнему прислушивается к советам Махатмы."
 HND_grow_more_food_campaign_idea: "Кампания борьбы за урожай"
 HND_grow_more_food_campaign_idea_desc: "Индия столкнулась с бесчисленным количеством случаев голода, несмотря на то, что у нее есть потенциал легко прокормить все свое население. В рамках своей кампании по решению этой проблемы председатель Неру направил значительные финансовые средства на совершенствование сельскохозяйственного оборудования, рационализацию использования сельскохозяйственных угодий и строительство крупных ирригационных сетей, чтобы обеспечить Индию достаточным количеством продовольствия для постоянного поддержания жизни."
 HND_five_year_plan_idea: "5-летний план индустриализации"
 HND_five_year_plan_idea_desc: "In order to truly implement syndicalist ideology in India, it is believed that the nation must advance from a primarily agrarian one to an urbanised state. As part of this effort, a great five year economic plan has been laid out, potentially the first of many, to bring India firmly into the 20th century."
 HND_french_blueprint_idea: "По французским проектам"
 HND_french_blueprint_idea_desc: "Как авангарду синдикализма и нации, которая тоже пострадала и поднялась после разрушительной гражданской войны, [socialist_india_events.GetNameDef] может кое-чему поучиться у французов, и в рамках своего влияния они начали моделировать многие законы и социальные аспекты в соответствии со своими французскими союзниками."
 HND_strong_legal_protections_idea: "Надежная правовая защита"
 HND_strong_legal_protections_idea_desc: "Полагая, что угроза со стороны злонамеренного руководителя может легко привести республику к краху, были приняты значительные меры защиты, ограничивающие ранее в значительной степени неконтролируемые полномочия председателя, позволяющие ему просто осуществлять свою волю без надзора."
 HND_socialist_swaraj_idea: "Социалистические свараджи"
 HND_socialist_swaraj_idea_desc: "Хотя Индия, возможно, и получила независимость от Великобритании после окончания гражданской войны, председатель считает, что истинное освобождение наступит только после полного уничтожения как феодализма, так и капитализма, при полном переходе Индии к социализму. Несмотря на то, что до этого перехода еще много лет, есть надежда, что Индия уже полностью встала на путь создания такой системы."

 HND_empowered_president_idea: "Усиленная власть Председателя"
 HND_empowered_president_idea_desc: "Вместо того, чтобы пытаться осуществить разделение властей, Председатель предпочел еще больше укрепить чрезвычайные полномочия Председателя исполнительной власти, полагая, что ограничения его полномочий просто будут сдерживать нацию."
 HND_middle_road_idea: "Срединный путь"
 HND_middle_road_idea_desc: "Председатель Бос, во многом схожий с тоталитарными движениями на Западе, уже давно придерживается мнения, что сильная националистическая идея таких движений, как народничество в России, может быть легко согласована с социализмом, чтобы создать более эффективное и репрезентативное направление мысли, чем то и другое вместе. Именно на этот \"Срединный путь\" сейчас вступает Индия со своим \"Нетаджи\" во главе."

 HND_reconstruction_crews: "Бригады строителей"
 HND_reconstruction_crews_desc: "В рамках усилий правительства, направленных как на восстановление страны, так и на возвращение к работе многих новых безработных, в городах были созданы организованные государством бригады по восстановлению.."
 HND_prioritising_the_urban_worker_idea: "Приоритет городских рабочих"
 HND_prioritising_the_urban_worker_idea_desc: "При восстановлении страны руководство Республики решило уделить приоритетное внимание усилиям по восстановлению городов, полагая, что, если города страны и рабочие смогут снова полноценно функционировать, восстановление сельской местности произойдет естественным образом."
 HND_putting_the_farmer_first_idea: "Поставить крестьянина на первое место"
 HND_putting_the_farmer_first_idea_desc: "При восстановлении страны руководство Республики решило уделить приоритетное внимание оказанию помощи сельским фермерам и общинам, полагая, что страна не сможет по-настоящему восстановиться, пока не будут должным образом восстановлены ее аграрные основы жизнедеятельности."

