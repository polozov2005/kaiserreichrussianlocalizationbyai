### Bookmark ###
 HND_KR_gathering_storm_desc: "В последние дни существования Соединенного Королевства те, кто поднимался по всей Индии в знак сочувствия к своим товарищам-социалистам, были жестоко подавлены войсками, надеявшимися сохранить хоть какое-то подобие порядка. Это подавление быстро привело к обратным результатам: Индийский национальный конгресс взял на себя руководство революцией, провозгласив Пурна Сварадж, полную независимость, и создав повстанческое правительство в Калькутте. Последовавшая за этим кровопролитная гражданская война закончилась спорным перемирием, которое по сей день определяет политику республики. Все фракции партии сейчас жаждут крови, надеясь оказаться на вершине, как только империализм будет, наконец, изгнан с субконтинента."

