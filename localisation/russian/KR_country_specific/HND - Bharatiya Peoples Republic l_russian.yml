 HND_balasaheb_gangadhar_kher_advisor_desc: "§YРодился:§! §LAugust 24th, 1888, in Ratnagiri, Bombay Presidency, British India§!\n§YБиография:§! §LAn accomplished lawyer, Kher fled Bombay for Gujarat in the chaos that followed the dissolution of the British Raj. Kher rose in political prominence by advocating for the protection of the rights of India's lower castes, and it is from these lower caste's that he draws the greatest support. Kher is known for his compassion for the less fortunate outside politics as well; he is known to personally involve himself in charitable endeavours, and is as likely to be found attending to his political duties, as assisting in the construction of a new orphanage or staffing a soup kitchen.§!"

