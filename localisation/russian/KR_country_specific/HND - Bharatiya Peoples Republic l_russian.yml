### Economic Focuses ###

 HND_chittagong_development_plan: "План развития Читтагонга"
 HND_chittagong_development_plan_desc: "Некогда большое поселение Читтагонг сегодня едва ли может считаться городом, но оно явно предназначено для чего-то большего. Это идеальное место для дальнейшего роста городов, в чем отчаянно нуждается наша страна, и поэтому оказание ему помощи должно стать первоочередной задачей."
 HND_allahabad_expressway: "Аллахабадский экспресс"
 HND_allahabad_expressway_desc: "Город Аллахабад является идеальным транспортным узлом, соединяющим крупные города Бенгалии с центральными центрами страны, такими как Канпур и Лакхнау. Развитие инфраструктуры в этом регионе с помощью расширенной скоростной автомагистрали позволит еще больше объединить эти жизненно важные промышленные регионы."
 HND_expand_raipur_ferrochromium_plants: "Расширение производства феррохрома в Райпуре"
 HND_expand_raipur_ferrochromium_plants_desc: "Было бы легко расширить добычу полезных ископаемых в горах Райпура, чтобы лучше использовать огромные залежи хромита под ними, но без надлежащего оборудования для переработки сырой руды это дало бы нам мало что, кроме причудливых пород. Вместо этого нам следует сосредоточиться на дальнейшем расширении перерабатывающих мощностей в самом городе, что позволит как увеличить производство феррохрома, так и создать множество новых рабочих мест в этом районе."
 HND_fording_the_narmada: "Вброд через Нармаду"
 HND_fording_the_narmada_desc: "Могучая Нармада делит регион Малва пополам и в течение многих лет служила одним из естественных барьеров, отделяющих нас от Декана. Строительство мостов в регионе, чтобы перейти вброд не только его, но и близлежащий Тапи, в долгосрочной перспективе принесет большую отдачу, особенно когда мы начнем перебрасывать через него войска."
 HND_reaping_the_fruits_of_investment: "Пожинание плодов инвестиций"
 HND_reaping_the_fruits_of_investment_desc: "Наши грандиозные инфраструктурные проекты наконец-то приносят свои плоды, поскольку нация начинает все дальше отходить от руин революции, вступая в великую новую эру. Давайте же воспользуемся этими благами и используем их для еще большего инвестирования в развитие страны!"

 HND_rise_above_the_scars: "Залечить свои раны"
 HND_rise_above_the_scars_desc: "В то время как большая часть Индии была разорвана на части или уничтожена в ходе революционных сражений, нация никогда по-настоящему не погибнет, пока есть храбрые индийцы, готовые видеть ее процветающей. Пришло время начать наш подъем над разрухой и сделать Индию такой могущественной, какой она всегда должна была быть."
 HND_foster_native_growth: "Способствовать естественному росту"
 HND_foster_native_growth_desc: "Несмотря на некоторую помощь со стороны наших союзников в Европе, Республика оказалась довольно изолированной от внешних связей, и многие предпочли поддержать оккупантов против нас. У нас не остается другого выбора, кроме как расти самостоятельно, несмотря на их попытки уничтожить нас; но это не проблема для нашей могущественной нации, народ которой полностью готов служить ей при достаточной поддержке правительства."
 HND_growth_of_mining_unions: "Рост числа горняцких профсоюзов"
 HND_growth_of_mining_unions_desc: "Индия обладает огромным количеством неиспользованных богатств, к которым мы можем получить доступ, но многие шахты в стране оказались заброшенными после революции, а их иностранные владельцы бежали при мысли о том, что больше не смогут угнетать своих работников. Мы должны поддержать восстановление этих горных предприятий, на этот раз принадлежащих самим рабочим, объединившимся под эгидой своих профсоюзов."
 HND_the_slums_clearance_project: "Проект по расчистке трущоб"
 HND_the_slums_clearance_project_desc: "Самые бедные из нас живут в грязных лачугах, заполняя трущобы, которые окружают многие крупные города страны. Ликвидация этих трущоб и замена их надлежащим жильем для наших людей должны быть первоочередной задачей, поскольку никто не должен страдать от унижений, связанных с проживанием в таких условиях."
 HND_the_rural_development_plan: "План развития сельской местности"
 HND_the_rural_development_plan_desc: "Несмотря на наши высокие амбиции, мы не можем замалчивать тот факт, что Индия в целом является аграрной страной, населенной сельскими поселками, на территории которых лишь изредка встречаются города. Изменить это не просто в одночасье, но лучше всего начать сейчас, чтобы через несколько десятилетий мы могли увидеть значительный прогресс в урбанизации."
 HND_arms_of_the_revolution: "Оружие Революции"
 HND_arms_of_the_revolution_desc: "Насилие - это единственный язык, который по-настоящему понимают оккупанты, и они явно не стесняются навязывать свой язык индийскому народу. Мы обеспечим, чтобы на них ответили тем же, чтобы как можно больше людей вооружились для защиты своей родины и были готовы бороться за свою свободу."
 HND_more_than_ishapore: "Больше чем Ишапур"
 HND_more_than_ishapore_desc: "В рамках эмбарго на поставки индийского оружия, одной из неудачных попыток избежать повторения первой войны за независимость, единственной фабрикой, которой было разрешено производить винтовки на всем субконтиненте, была фабрика в Ишапоре. Когда мы восстали против британского правления, завод перешел под наш контроль, поставляя оружие, необходимое для обеспечения армии, но этого недостаточно само по себе. Если эмбарго не остановит нас, мы должны сосредоточиться на строительстве новых оружейных заводов, которые будут служить нам так же, как Ишапор.."
 HND_optimising_existing_infrastructure: "Оптимизация существующей инфраструктуры"
 HND_optimising_existing_infrastructure_desc: "Стране не нужно тратить ценные ресурсы на строительство огромного количества военных заводов, в то время как она могла бы гораздо проще повысить производительность существующих заводов, сосредоточив свои усилия на развитии в других местах. Замена старого, выходящего из строя оборудования, повышение квалификации работников и другие подобные идеи - вот простой способ для нас добиться этого без особых усилий с нашей стороны, и это должно быть сделано как можно скорее."
 HND_strive_for_more: "Стремление к большему"
 HND_strive_for_more_desc: "Мы являемся родиной революции в Азии, и мы не можем просто почивать на лаврах, даже если думаем, что у нас достаточно оружия для наших собственных войск. Необходимо строить все больше и больше заводов, чтобы каждый революционер от Китая до Аравии мог вооружиться против издыхающих псов старого порядка.."

### Army Focuses ###

 HND_preparing_for_the_final_push: "Подготовка к последнему удару"
 HND_preparing_for_the_final_push_desc: "Хотя мы, возможно, и превосходим Бомбейский пакт численностью солдат, мы все еще совершенно не готовы к тому, чтобы на самом деле изгнать этих империалистов с субконтинента. Как утверждал маршал Кариаппа, армия должна быть реформирована как можно скорее, чтобы мы могли, наконец, провести операцию "Гром".."

 HND_the_french_example: "Пример Франции"
 HND_the_french_example_desc: "Наши союзники в Париже помогали нам на протяжении многих лет, особенно в военных вопросах. Поэтому вполне естественно, что мы просим их о дальнейшей помощи в совершенствовании нашей армии, поскольку мы можем легко уничтожить наших врагов, используя их превосходную тактику и современное оборудование, которое они могут нам предоставить."
 HND_a_war_of_shells: "Война снарядов"
 HND_a_war_of_shells_desc: "Один артиллерийский расчет может легко уничтожить сотни людей, не понеся при этом никаких потерь, особенно если он оснащен лучшими орудиями, которые ему могут предоставить наши союзники. Когда мы двинемся на города, оккупированные нашими противниками, мы будем делать это под градом артиллерийских залпов, и мало кто сможет нас остановить."
 HND_coordinated_offences: "Скоординированное наступление"
 HND_coordinated_offences_desc: "Хаос часто является эффективной стратегией на поле боя, но она сопряжена с большим риском, когда в этом хаосе оказываются замешаны ваши собственные солдаты. Вместо того, чтобы делать ставку на успешное использование брешей в рядах противника, мы должны уделять приоритетное внимание скоординированным и методичным действиям, что сделает наши победы практически гарантированными."
 HND_importance_of_mobility: "Приоритет мобильности"
 HND_importance_of_mobility_desc: "Малейший прорыв в тылу противника может быть легко использован потоком моторизованных дивизий, а последующий хаос может быть усилен нашей основной линией фронта. Хотя в настоящее время у нас нет возможностей самостоятельно производить большое количество машин для проведения таких атак, при поддержке союзников и местных инвестициях мы можем легко снабдить наши подразделения достаточным количеством грузовиков, чтобы перехитрить наших врагов и окружить их."
 HND_a_machine_of_many_parts: "Механизм из множества частей"
 HND_a_machine_of_many_parts_desc: "Армия - это не просто люди на передовой, это все, от тех, кто штурмует окопы, до тех, кто возвращается на базу и ремонтирует поврежденную технику после последнего рывка. С одинаковым уважением относясь к каждому аспекту деятельности нашей армии и обеспечивая полное использование рот поддержки, которые помогают нашим линейным батальонам, мы сможем легко победить любого, кто осмелится выступить против нас."
 HND_the_new_nridurga: "Новая Нридурга"
 HND_the_new_nridurga_desc: "На протяжении веков ведение войны индейцами определялось правильным использованием фортов, и те, кто контролировал эти форты, контролировали поле боя. В наши дни у нас есть крепость нового типа, на этот раз передвижная на гусеницах, которые ее передвигают, и благодаря им наши солдаты будут продолжать доминировать на полях сражений, надежно укрывшись за своими стенами."
 HND_rapid_rathas: "Скоростные колесницы"
 HND_rapid_rathas_desc: "На территории Индии и против наших наиболее вероятных врагов большие мощные танки будут просто громоздкими и ненужными. Вместо этого нам следует уделять приоритетное внимание производству более компактных и быстрых танков, поскольку их, скорее всего, будет достаточно для удовлетворения наших потребностей, а более низкие затраты позволят нам легко выпускать их в большем количестве, даже при наших довольно ограниченных промышленных мощностях по сравнению с более сильными державами мира."
 HND_unbreakable_behemoths: "Несокрушимые исполины"
 HND_unbreakable_behemoths_desc: "Если мы хотим победить наших врагов с помощью технологического преимущества, зачем довольствоваться чем угодно, кроме самого лучшего. Наши танки будут сеять разрушения на своем пути, смогут выдержать даже самые разрушительные удары и сокрушат любое сопротивление своим мощным весом."
 HND_restructured_engineering_corps: "Преобразованный инженерный корпус"
 HND_restructured_engineering_corps_desc: "Несмотря на огромную важность инженеров и саперов для армии, наш инженерный корпус практически не продвинулся вперед с тех пор, как многие из них все еще получали приказы от короны. С небольшой помощью наших французских друзей мы должны начать оснащать их современной тактикой и снаряжением, чтобы они могли более эффективно выполнять свою жизненно важную роль."
 HND_military_railways: "Военные железные дороги"
 HND_military_railways_desc: "Логистика всегда помогала выигрывать войны, и с тех пор, как появились поезда, военные действия часто оказывались неразрывно связанными с железнодорожными линиями, которые обеспечивают войска питанием и вооружением. Благодаря постоянному развитию и расширению железных дорог для обслуживания наших вооруженных сил, мы сможем гарантировать, что, когда нашим солдатам понадобятся боеприпасы, они никогда не будут ждать их прибытия."
 HND_develop_the_bengali_automotive_industry: "Развивать автомобильную промышленность Бенгалии"
 HND_develop_the_bengali_automotive_industry_desc: "Калькутта вполне могла бы в один прекрасный день составить конкуренцию Детройту или Мюнхену по производству автомобилей, несмотря на возражения многих сомневающихся, которые считают эту цель смехотворной. При достаточной государственной поддержке для создания новых фабрик и производственных линий мы быстро поставим скептиков на место и с легкостью превзойдем по производству всех наших врагов."
 HND_relaying_through_radios: "Интегрировать радио в систему управления"
 HND_relaying_through_radios_desc: "Разведка жизненно важна для обеспечения прорыва, необходимого для крупных наступательных операций, а также для гарантии того, что наши враги не застигнут нас врасплох, когда мы будем вынуждены занять оборонительную позицию. Благодаря использованию раций всеми нашими разведчиками и наблюдательными пунктами, мы можем быть уверены, что о каждом передвижении противника будет сообщаться на наши базы еще до того, как информация достигнет их собственных командиров, что дает нам преимущество, необходимое как в нападении, так и в обороне."
 HND_indian_lightning: "Индийская молния"
 HND_indian_lightning_desc: "Способность быстро реагировать и извлекать выгоду из любого преимущества - это то, что отличает победителей от побежденных, и мы не можем позволить себе оказаться в числе последних. Приоритетом нашей армии всегда должна быть скорость, позволяющая нам реагировать на любую угрозу в ту же секунду, как она возникает, а также позволяющая нам использовать любую брешь, которую нам удается создать в тылу противника."
 HND_european_instructors: "Европейские инструкторы"
 HND_european_instructors_desc: "Вот уже много лет мы получаем помощь от наших союзников в Европе в виде военных инструкторов, которые хорошо поработали над тем, чтобы сделать из наших офицеров настоящих лидеров, а не просто ополченцев с громким голосом. Поскольку на горизонте маячит война, мы должны усилить эту подготовку, еще больше оттачивая их навыки, чтобы, когда придет время сражаться, это уже стало для них второй натурой."

 HND_traditional_army: "Традиционная армия"
 HND_traditional_army_desc: "Тактика Интернационала может быть передовой и впечатляющей на бумаге, но глупо думать, что мы можем просто воплотить идеи, предназначенные для промышленно развитых европейских стран, в нашей разрушенной стране. Вместо этого мы должны продолжать оттачивать тактику, с помощью которой всегда велись войны в Индии, однако обновлять ее, чтобы использовать преимущества последних технологических достижений."
 HND_replacing_the_enfields: "Замена Ли-Энфилд"
 HND_replacing_the_enfields_desc: "Даже после того, как британцы были изгнаны из Ишапура, фабрика в течение последнего десятилетия производила только "Энфилдс", и единственным реальным отличием теперь является отсутствие королевского клейма. Важно, чтобы мы начали двигаться дальше и разрабатывать нашу собственную конструкцию винтовки, более подходящую для наших целей, вместо того, чтобы продолжать производить оружие прошлых лет."
 HND_formulating_doctrinal_foundations: "Формулировка доктринальных основ"
 HND_formulating_doctrinal_foundations_desc: "Сердцем любой хорошей армии является доктрина, которая ею руководит, однако беспорядочный характер, из которого изначально формировалась наша армия, часто делает доктрины, которым мы следуем, запутанными и противоречивыми. Мы должны должным образом обеспечить их надлежащую переоценку и прочно заложить основы, на которых должны основываться все аспекты деятельности армии."
 HND_sailing_the_seven_rivers: "Хождение по семи рекам"
 HND_sailing_the_seven_rivers_desc: "Земли Индии изобилуют реками, в первую очередь семью священными, которые прокладывают свой могучий путь по ландшафту. В случае любого конфликта на субконтиненте нам неизбежно придется переплывать эти реки, чтобы нанести удар по нашим врагам, и мы должны быть готовы к такому повороту событий, а наши войска должны быть обучены правильному и эффективному использованию речных судов, чтобы быстро переправляться, оставаясь готовыми к бою в любой момент.обратите внимание."
 HND_supplying_the_frontlines: "Снабжение линии фронта"
 HND_supplying_the_frontlines_desc: "В то время как Индия изобилует обширной сетью железных дорог, мы видели, как быстро эти железные дороги и поезда, курсирующие по ним, могут быть разрушены в разгар войны. Мы должны обеспечить себя большим запасом локомотивов и другими способами снабжения наших войск, чтобы несколько бомбардировщиков не могли просто уничтожить всю нашу логистическую сеть в любой момент."
 HND_prioritising_the_infantrymen: "Приоритет пехоты"
 HND_prioritising_the_infantrymen_desc: "В конечном счете исход войны всегда будет решаться тем, что один человек убьет другого, независимо от того, какую изощренную тактику или стратегию он выберет. Поэтому наши пехотинцы должны быть вооружены самым лучшим снаряжением, которое мы можем предоставить, и иметь поддержку дополнительных батальонов, чтобы, когда придет время, они не остались в числе погибших."
 HND_coordinating_the_militias: "Координация ополченцев"
 HND_coordinating_the_militias_desc: "Несмотря на то, что ополченцы, составляющие значительную часть наших вооруженных сил, теоретически автономны, в конечном счете они всегда будут выполнять приказы, отданные им нашим высшим руководством. При наличии надлежащих каналов связи между их руководителями и нашими командирами они могут легко стать такими же эффективными, как и любое другое подразделение под нашим командованием."
 HND_courage_of_the_lion: "Ярость льва"
 HND_courage_of_the_lion_desc: "Лев не просто пасется на своем пастбище, слишком напуганный, чтобы напасть на свою жертву, он берет инициативу в свои руки и успешно наносит удары по ней. Как и лев, наши люди тоже должны быть обучены всегда наносить удары, несмотря ни на какие трудности, потому что благодаря их храбрости любые трудности будут преодолены с легкостью."
 HND_jungle_fighting: "Война в джунглях"
 HND_jungle_fighting_desc: "Восточные районы Индии и многие другие районы Азии в целом полностью покрыты могучими джунглями, которые представляют собой непреодолимую преграду для тех, кто не знаком с этой местностью. Однако именно здесь у нас есть большое преимущество, поскольку многие из наших солдат знакомы с этой землей и могут обучать своих сослуживцев жить и сражаться в этих джунглях, как будто это их второй дом."
 HND_spirit_of_bajirao: "Дух Баджирао"
 HND_spirit_of_bajirao_desc: "Именно с помощью кавалерии великий Баджирао дал отпор колонизаторам и унизил жалкие армии Низама своей огромной мобильностью. Возможно, его идеи - это то, что нам самим нужно сделать, нанося быстрые удары по нашим врагам и заманивая их на благоприятную территорию, где их можно легко уничтожить."
 HND_terrain_adaptability: "Приспособляемость к рельефу"
 HND_terrain_adaptability_desc: "Почти все биомы и географические объекты, о которых вы только можете подумать, присутствуют на Индийском субконтиненте и соседних с ним регионах, и именно в каждом из них нашим солдатам придется сражаться. Они должны быть готовы к любой ситуации, способны сражаться в один прекрасный день в великих Деканских горах, а на следующий - в пустыне Тар, и именно благодаря этой приспособляемости наши войска превзойдут своих противников."
 HND_utilising_knowledge_of_the_land: "Использование знаний о местности"
 HND_utilising_knowledge_of_the_land_desc: "Именно благодаря знанию нами окружающей местности мы можем определить, где после битвы будет самое безопасное место для отступления и откуда будет наиболее выгодно нанести следующий удар. Обладая этим знанием, мы гарантируем, что любой чужак, желающий вновь подчинить наш народ, быстро осознает свою глупость в последние минуты жизни."
 HND_sponsor_artillery_developments: "Спонсирование артиллерийских разработок"
 HND_sponsor_artillery_developments_desc: "С момента своего освобождения от англичан завод по производству лафетов в [1057.GetCapitalVictoryPointName] сослужил нам хорошую службу, поскольку смог значительно расшириться без каких-либо дополнительных ограничений. При дальнейшей государственной поддержке он легко сможет удовлетворить наш постоянный спрос на производство новейших моделей артиллерии, готовых разнести в клочья наших врагов."
 HND_gunpowder_legacy: "Наследие пороха"
 HND_gunpowder_legacy_desc: "На протяжении многих веков порох доминировал на Индийском субконтиненте, способствуя как подъему, так и падению многих могущественных империй, которые установили свой контроль над его территориями. Мы не из тех, кто пренебрегает традициями, и когда наши знамена будут развеваться высоко над всем субконтинентом и за его пределами, им будет отдан салют под грохот нашей могучей и бесчисленной артиллерии."

### Air and Naval Focuses ###

 HND_developing_the_indian_airforce: "Развитие индийских ВВС"
 HND_developing_the_indian_airforce_desc: "У Индии на самом деле никогда не было собственных военно-воздушных сил, а несколько британских самолетов, захваченных во время революции, были совершенно непригодны для боевых целей. Однако в современной войне сторону, не имеющую самолетов, обычно называют "проигравшей", и поэтому мы должны немедленно предпринять шаги по созданию собственных военно-воздушных сил."
 HND_expansion_of_airfields: "Расширение аэродромов"
 HND_expansion_of_airfields_desc: "Те немногие аэродромы, которые есть в стране, представляют собой не более чем любительские взлетно-посадочные полосы, реквизированные для военных целей, но все должно с чего-то начинаться. Мы должны выделить ресурсы на расширение этих взлетно-посадочных полос и превращение их в настоящие авиабазы, способные поддерживать крупные военно-воздушные силы, которые мы планируем создать."
 HND_guarding_the_skies: "Система ПВО"
 HND_guarding_the_skies_desc: "Мы не всегда можем гарантировать, что у нас будет преимущество в воздухе, даже над нашими центральными районами, и поэтому мы должны предпринять шаги для подготовки к бомбардировкам наших городов. Вблизи наиболее важных городских центров должны быть установлены мощные противовоздушные установки, готовые отразить любые попытки противника атаковать их."
 HND_indigenous_innovation: "Местные инновации"
 HND_indigenous_innovation_desc: "Использование разработок, приобретенных у наших союзников, всегда будет ставить нас в невыгодное положение по сравнению с передовыми военно-воздушными силами мира, даже если это быстрее и дешевле, чем разрабатывать новые технологии самостоятельно. Мы должны сосредоточиться на создании отечественных индийских самолетов, независимо от затрат, если хотим оставаться на высоте."
 HND_rely_on_foreign_designs: "Использование зарубежных наработок"
 HND_rely_on_foreign_designs_desc: "У нас едва ли есть авиационная промышленность, не говоря уже о том, чтобы начать разрабатывать собственные проекты. Вместо этого мы должны обратиться к нашим союзникам, которые уже потратили десятилетия на оттачивание своего мастерства, и заключить соглашения о лицензировании их для нашего собственного использования."
 HND_basic_module_advancements: "Базовые самолетные модули"
 HND_basic_module_advancements_desc: "Нам не составит труда понять, как изготавливать самые простые из современных самолетных модулей, особенно при небольшой помощи наших союзников за рубежом. Приложив к этому достаточно усилий, мы сможем в кратчайшие сроки изготовить их самостоятельно."
 HND_dominating_the_dogfight: "Доминирование в воздушном бою"
 HND_dominating_the_dogfight_desc: "В сфере воздушной войны самое важное в конечном счете - выжить, чтобы прожить еще одну жизнь, даже если при этом вы не уничтожите своего врага, поскольку долговечность гарантирует наше господство в небе. Мы должны позаботиться о том, чтобы наши самолеты были сконструированы надлежащим образом и имели наилучшую защиту, с которой мы можем справиться, чтобы не сжигать пилотов быстрее, чем мы сможем научить их продолжать полет."
 HND_battlefield_rain: "Дождь с небес на поле боя"
 HND_battlefield_rain_desc: "Даже при ограниченном количестве самолетов несколько удачно размещенных бомб, сброшенных сверху, могут полностью разрушить позиции противника или прорвать его укрепления, давая нашим людям на земле преимущество перед их врагами. Поэтому мы должны уделять приоритетное внимание обучению наших пилотов навыкам бомбометания, чтобы мы могли начать менять ситуацию в свою пользу, когда это будет необходимо."
 HND_bomber_development: "Развитие бомбардировщиков"
 HND_bomber_development_desc: "Как только мы начнем ориентироваться за пределы нашей родины, бомбардировщики станут все более и более востребованными, поскольку мы, вероятно, столкнемся с бесчисленными ситуациями, когда наши контролируемые аэродромы будут находиться слишком далеко от линии фронта, чтобы другие самолеты могли принести какую-либо пользу. Поэтому обеспечение быстрого развития в этой области является для нас довольно важной целью."
 HND_touch_the_sky_with_glory: "Коснись неба славой"
 HND_touch_the_sky_with_glory_desc: "Скоро небеса станут нашими владениями, царством, куда никто не сможет проникнуть без нашего разрешения. Наши самолеты будут украшать небо, как облака над головой, готовые нанести удар по нашим врагам, когда придет время."

 HND_foundations_of_greatness: "Основы величия"
 HND_foundations_of_greatness_desc: "Индия никогда по-настоящему не славилась своим военно-морским флотом, во многом из-за табу на морские путешествия, но, несмотря на это, в стране есть много людей, особенно неиндуистов, которые готовы служить на наших судах. Мы должны воспользоваться этим, чтобы, наконец, создать отличный военно-морской флот для Бхаратии и распространить наше влияние по всему миру."
 HND_the_dual_theatre: "Двойной театр"
 HND_the_dual_theatre_desc: "Как и сражения на суше, сражения на море все больше и больше зависят от господства в воздухе. Дешевые самолеты, запускаемые авианосцами или с близлежащих аванпостов, могут легко вывести из строя даже самые крупные корабли, мгновенно меняя ход сражения. Если мы хотим выигрывать сражения, даже с меньшим военно-морским флотом, мы должны уделять приоритетное внимание разработке бомбардировщиков для оказания помощи нашим кораблям в этом направлении."
 HND_fortify_coastline: "Береговые укрепления"
 HND_fortify_coastline_desc: "Береговая линия нашей страны обширна, вдоль нее разбросаны десятки портов, которые коварный враг может легко захватить и использовать в своих целях. Еще больше укрепив наши базы, мы сможем защищать их гораздо меньшим гарнизоном, освободив наших людей для отправки в другие места, особенно на наши основные линии фронта."
 HND_domestic_dockyards: "Собственные верфи"
 HND_domestic_dockyards_desc: "Хотя у нас есть несколько заводов в Бенгалии, способных производить для нас корабли, многие конвои и другие небольшие суда, которыми мы в настоящее время располагаем, были приобретены в результате торговли с нашими международными союзниками. Однако мы не можем гарантировать их помощь в этом отношении вечно, и мы должны начать дальнейшее строительство верфей в нашей собственной стране, чтобы удовлетворить наши потребности в долгосрочной перспективе."
 HND_the_merchant_marine: "Торговый флот"
 HND_the_merchant_marine_desc: "Торговля по суше сопряжена со многими трудностями, поскольку нет реального способа импортировать и экспортировать товары наших крупнейших союзников, не пересекая океан. Таким образом, улучшение наших транспортных возможностей является жизненно важным шагом для обеспечения того, чтобы мы не оказались полностью отрезанными и изолированными от внешнего мира, если ситуация вокруг нас ухудшится."
 HND_indias_ocean: "Наш океан"
 HND_indias_ocean_desc: "Здесь нет места компромиссам или урезанию наших амбиций, военно-морской флот Бхаратии должен быть самой мощной силой в Индийском океане, и мы не согласимся на меньшее. Наши верфи должны быть ориентированы на создание крупных судов, способных должным образом отстаивать нашу власть и влияние настолько, насколько нам это необходимо, и даже дальше, если мы пожелаем."
 HND_fighters_of_the_sea: "Морские истребители"
 HND_fighters_of_the_sea_desc: "В то время как такие острова, как Диего-Гарсия, могут служить полезными авиабазами в Индийском океане, есть большие участки открытого океана, где нет ни единого места для посадки. С этой целью нам понадобятся авианосцы, если мы хотим, чтобы наши амбициозные планы увенчались успехом, и нам понадобятся самолеты, способные летать с этих авианосцев бок о бок с ними."
 HND_the_moving_islands: "Плавучие острова"
 HND_the_moving_islands_desc: "Сейчас, когда началась работа над палубными самолетами, нам пора начать производство собственных авианосцев, оптимизированных для работы на больших расстояниях, необходимых в нашем Южном океане. Со временем у нас будет достаточно мощный флот, чтобы обеспечить контроль над воздушным пространством, куда бы ни бежали наши враги."
 HND_balanced_bulwarks: "Сбалансированные бастионы"
 HND_balanced_bulwarks_desc: "Крейсера, которые занимают промежуточное положение между самыми крупными линкорами и самыми маленькими судами, являются экономически эффективным способом увеличения нашей военно-морской мощи, и к тому же их можно производить в разумные сроки. Их разработка должна быть приоритетом для нашего военно-морского флота, независимо от того, как мы хотим это сделать."
 HND_coastal_defence: "Береговая линия обороны"
 HND_coastal_defence_desc: "Вряд ли стоит фантазировать о завоевании отдаленных островов и разгроме наших врагов в открытом море, если мы не можем даже помешать врагу атаковать наши берега. Разработка моделей эсминцев для охоты на любые подводные лодки, которые нападут, как только наши корабли покинут порт, пойдет на пользу этим усилиям."
 HND_disrupting_trade: "Подорвать вражескую торговлю"
 HND_disrupting_trade_desc: "Пребывание в обороне никогда не сработает в долгосрочной перспективе, нам нужно нанести ответный удар по нашим врагам, используя их собственную тактику, чтобы они разделили свое внимание между защитой своих берегов и нападением на наши. В конечном счете это должно сработать в нашу пользу, особенно против врагов, которые чрезмерно полагаются на победу в морском сражении против нас."
 HND_expanding_shipping_routes: "Расширение морских маршрутов"
 HND_expanding_shipping_routes_desc: "Мы не должны прожить остаток вечности в страхе перед вражескими подводными лодками, особенно в связи с нашими попытками создать флот для защиты наших конвоев. Вместо этого пришло время развивать нашу морскую торговлю, отправляя торговые суда в отдаленные места, в которые мы, возможно, когда-то боялись заходить."
 HND_a_mercantile_direction: "Коммерческое направление"
 HND_a_mercantile_direction_desc: "Бессмысленно тратить так много наших и без того небольших ресурсов на создание грандиозного военно-морского флота, который может быть потоплен в одно мгновение, если его застигнут в неподходящий момент. Вместо этого наш военно-морской флот должен сосредоточиться на поддержке нашего торгового флота, защищая его от врагов, которые достаточно подлы, чтобы нападать на ни в чем не повинных торговцев. В долгосрочной перспективе это не только обойдется намного дешевле, но и начнет окупаться по мере улучшения нашего положения."
 HND_varunas_grace: "Благославление Варуны"
 HND_varunas_grace_desc: "Море станет нашим вторым домом, где даже самым опытным морякам будет комфортно на волнах, будь то шторм или снег. Когда наши храбрые люди покидают порт, мы не сидим сложа руки, опасаясь известий об их гибели, потому что знаем, что они вернутся домой победителями."

### Early Politics Focuses ###

 HND_third_internationale: "Конгресс Интернационала"
 HND_third_internationale_desc: "Девятый конгресс Третьего интернационала завершился, и теперь мы можем обратиться за помощью к нашим товарищам на Западе."
 HND_anglo_indian_trade: "Англо-индийское торговое соглашение"
 HND_anglo_indian_trade_desc: "Было представлено предложение, направленное на систематизацию и упорядочение социалистического англо-индийского сотрудничества - предоставление правительству Индии жизненно важной помощи в промышленных и военных вопросах, в то же время обеспечивая народу и правительству Великобритании постоянный приток экзотических товаров, таких как бананы, каучук и, что наиболее важно, неограниченный доступ к чайным плантациям Ассама."
 HND_aid_from_britain: "Помощь от Британии"
 HND_aid_from_britain_desc: "Интернационал пообещал нам дальнейшую военную помощь на Девятом конгрессе, и мы в полной мере воспользуемся этим обещанием. У британцев есть большие запасы истребителей, а также лопаты, бинокли и другое подобное снаряжение, в котором мы отчаянно нуждаемся. Мы должны направить нашу просьбу о помощи непосредственно им, поскольку наличие у нас наконец-то собственных военно-воздушных сил станет серьезным преимуществом перед нашими врагами."
 HND_aid_from_france: "Помощь от Франции"
 HND_aid_from_france_desc: "Интернационал обещал нам дальнейшую военную помощь на Девятом конгрессе, и мы в полной мере воспользуемся этим обещанием. У французов все еще имеются значительные запасы ружей и артиллерийских систем времен Великой Войны, и, хотя они постепенно отказались от этого оборудования в пользу более современных образцов, мы все равно получили бы от него большую пользу. Поэтому наша просьба будет передана в Париж, и мы надеемся, что они сделают все, что в их силах.."
 HND_launch_operation_thunder: "Начать операцию \"Гром\""
 HND_launch_operation_thunder_desc: "После столь долгого ожидания, наконец, настал день расплаты. Пришло время нанести удар по омертвевшему сердцу британского правления, которое все еще гноится в Лахоре, а также изгнать тирана Хайдарабада из его роскошного дворца, чтобы вся Индия наконец была освобождена!"
 HND_unite_india: "Индия едина"
 HND_unite_india_desc: "Индийская революция наконец завершилась, и дворняжки империи были изгнаны из Индии! Такая победа, однако, горько-сладкая, поскольку большая часть страны лежит в руинах, и те, кто хочет увидеть, как она будет восстановлена по их образу и подобию, снова обнажают ножи. Тем не менее, это день, который нужно отпраздновать, независимо от того, что может принести будущее."

### Reconstruction Focuses ###

 HND_rebuilding_our_future: "Перестраивая наше будущее"
 HND_rebuilding_our_future_desc: "Теперь, когда нам не нужно беспокоиться о каких-либо непосредственных угрозах, у нас есть большое количество трудоспособных мужчин, готовых быть задействованными в любой момент. Их необходимо направить на восстановительные работы, чтобы однажды мы смогли восстановить хотя бы некоторое подобие нормальной жизни в Индии."

 HND_integrating_the_reclaimed_lands: "Интеграция отвовоеванных земель"
 HND_integrating_the_reclaimed_lands_desc: "Земли, отвоеванные у ложного владычества, долгое время подпитывались пропагандой их хозяев о предполагаемом зле нашего правления, и их жители были вынуждены жить в страхе перед тем, что теперь может произойти, если над ними установится наше правление. Мы должны показать им, что им нечего бояться, поскольку мы - один сплоченный народ, как бы ни старались британцы разделить нас."
 HND_fate_of_princes: "Судьба раджей"
 HND_fate_of_princes_desc: "Князи Юга - не более чем коллаборационисты, которые ухватились за возможность хоть раз подержать в руках кнут, что бы они ни говорили о своих мотивах. Хотя они уже были свергнуты и лишены власти, они по-прежнему напрямую владеют большими участками земли, и мы должны решить, что нам следует делать как с ними, так и с их владениями."
 HND_amnesty_for_native_soldiers: "Амнистия простым солдатам"
 HND_amnesty_for_native_soldiers_desc: "Мы не можем держать зла на многих местных солдат, которые сражались на стороне наших врагов, поскольку у них, вероятно, не было выбора в этом вопросе или они просто были введены в заблуждение ложью наших врагов. Мы должны объявить амнистию простому человеку, который служил под их командованием, хотя такая полная амнистия не должна распространяться на их командиров, к которым мы должны обратиться отдельно."

 HND_union_reconstruction_crews: "Бригады строителей"
 HND_union_reconstruction_crews_desc: "Стране потребуется бесчисленное количество работников, чтобы начать устранять ущерб, нанесенный всей стране, и, как и все работники страны, они также должны быть членами соответствующих профсоюзов, чтобы обеспечить справедливые условия для них и их надлежащее представительство на национальном уровне."
 HND_reconnecting_the_nation: "Воссоединение нации"
 HND_reconnecting_the_nation_desc: "Многие города по всей Индии оказались функционально изолированными от внешнего мира, их основные артерии были перерезаны минометными снарядами, баррикадами и другими остатками войны. Даже те, кто избежал этого разрушения, по-прежнему оказываются отрезанными от границ, установленных первоначальным соглашением о прекращении огня, и все это должно быть вновь соединено воедино, чтобы нация могла стать единым целым."

 HND_prioritising_the_urban_worker: "Приоритет городских рабочих"
 HND_prioritising_the_urban_worker_desc: "Социалистическое общество не может просто продолжать существовать, опираясь на крестьян, ему нужен сильный класс пролетариев, который выступал бы в качестве его движущей силы, и правительство должно в первую очередь учитывать их потребности. Мы должны обеспечить, чтобы в первую очередь были восстановлены крупнейшие города страны, чтобы затем наши работники могли начать помогать другим в их собственном восстановлении."
 HND_all_india_labour_federation: "Всеиндийская федерация труда"
 HND_all_india_labour_federation_desc: "Хотя AITUC(Всеиндийский конгресс профсоюзов) был основан как федерация всех профсоюзов Индии, гражданская война, которая вскоре расколола страну, привела к тому, что ее влияние стало ощущаться лишь в нескольких местах за пределами Калькутты и Дели. Мы должны обеспечить, чтобы она вновь служила всей нации, и даже новые профсоюзы, создаваемые на отвоеванных территориях, были включены в ее состав."
 HND_union_work_projects: "Проекты профсоюзов"
 HND_union_work_projects_desc: "Попытка организовать индийских рабочих целиком и полностью на основе государственных заказов вряд ли является оптимальным способом осуществления национального восстановления, особенно когда у нас так много профсоюзов, на которых мы можем положиться в решении этих задач за нас. Мы должны составить список замечательных проектов, которые они могли бы реализовать, и позволить профсоюзам самим руководить повседневной деятельностью по их реализации."
 HND_rebuilding_the_western_cities: "Перестройка западных городов"
 HND_rebuilding_the_western_cities_desc: "Так называемый Доминион, возможно, и был обанкротившимся государством-обрубком, но в нем все еще находилось множество крупных городов этой страны, от растущего порта Карачи до их бывшей временной столицы Лахора. Приложив достаточные усилия, мы можем помочь вернуть этим городам их былую славу, возместив значительную часть ущерба, нанесенного во время войны, и должным образом интегрировать их в наши растущие планы развития урбанизированного общества."
 HND_indian_industrial_ownership: "Промышленная собственность индусов"
 HND_indian_industrial_ownership_desc: "Теперь, когда революция восстановила порядок на отвоеванных землях, мы вступили во владение многими фабриками, шахтами и другими подобными предприятиями, чьи бывшие буржуазные владельцы теперь мертвы, заключены в тюрьму или сосланы. Было предложено, чтобы эти объекты недвижимости были переданы тем, кто когда-то в них работал, а право собственности было разделено между всеми, кто непосредственно вносит свой вклад в их успех."
 HND_mass_nationalisation_of_private_holdings: "Массовая национализация частных предприятий"
 HND_mass_nationalisation_of_private_holdings_desc: "Долг государства - владеть частным производством, оставшимся после миллионеров, которые когда-то занимали его, поскольку только государство может по-настоящему обеспечить максимальную эффективность его работы, без мелких межличностных споров или личных корыстных побуждений. Поэтому владения, захваченные в Доминионе и на землях Федерации, должны быть национализированы в интересах всех жителей Республики."

 HND_putting_the_farmer_first: "Поставить крестьянина на первое место"
 HND_putting_the_farmer_first_desc: "Если мы не сосредоточимся на оказании помощи фермерам страны, мы просто пригласим голод, который придет и уничтожит нас. Эти люди, многие из которых слишком бедны, чтобы помочь себе сами, должны быть в центре внимания усилий по восстановлению, поскольку ни один работник, как бы усердно он ни работал, не сможет продолжать это делать без еды, которая поддерживала бы его на плаву."
 HND_the_ashram_approach: "Продвижение \"ашрамов\""
 HND_the_ashram_approach_desc: "Многие ашрамы, которые уже давно существуют в Индии, можно рассматривать как нечто похожее на идеи общинного ведения сельского хозяйства, которые так полюбились западному социализму. Таким образом, общинные практики в этих ашрамах могут быть легко объединены с западными идеями сельскохозяйственных кооперативов, что обеспечивает уникальный индийский подход к будущему сельского хозяйства."
 HND_southern_shram_bhakti: "Южные шрам-бхакти"
 HND_southern_shram_bhakti_desc: "Хотя идея Шрам Бхакти уже давно нашла свое место в индуистском спиритуализме, недавно она была адаптирована в качестве метода, с помощью которого можно вести общинное сельское хозяйство на благо всего нашего народа. В Южной Индии есть много людей, которые также придерживаются подобной практики, и поэтому было бы разумно начать распространять эти идеи среди них, в дальнейшем интегрируя их в наши новые системы."
 HND_bringing_swadeshi_to_bombay: "Привести свадеши в [GetVictoryPointName_1349]"
 HND_bringing_swadeshi_to_bombay_desc: "Многие предприятия в Бомбее при прежних оккупантах служили не индийскому народу, а англичанам, французам, немцам и всем, кто хотел использовать наш народ в качестве дешевой рабочей силы. Жизненно важно, чтобы жители крупных городов были освобождены от этого гнета, обеспечив, чтобы их работа приносила пользу их соотечественникам, а не богатым аристократам за границей."
 HND_redistribution_of_occupied_land: "Перераспредление занятых земель"
 HND_redistribution_of_occupied_land_desc: "Многие земли, принадлежащие простым людям, исторически были изъяты у них в интересах богатых, будь то принцы, заминдары или иностранные магнаты; все они преследуют общие цели угнетения и эксплуатации. Эти земли должны быть возвращены их первоначальным владельцам, чтобы они могли непосредственно пожинать плоды своего труда, а не быть украденными своими так называемыми хозяевами."

### Post-unification Political Focuses ###

 HND_first_united_congress: "Первый объединенный конгресс"
 HND_first_united_congress_desc: "Наконец-то вся Индия была освобождена под великим флагом независимости. Впервые можно провести заседание с участием представителей со всех уголков Индии, и с этой целью Хак созвал такое заседание, на котором будут изложены грандиозные планы."

 HND_the_gentle_way_to_shake_the_world: "Потрясти мир мягким способом"
 HND_the_gentle_way_to_shake_the_world_desc: "Сароджини Наду, а вместе с ней и воплощение идей Ганди, одержали победу на специальной сессии, и теперь она возглавляет нацию. Нам пора обратиться внутрь себя и сосредоточиться на исцелении оставшихся шрамов, а не пытаться просто выплеснуть свою боль наружу."
 HND_vision_of_the_mahatma: "Видение Махатмы"
 HND_vision_of_the_mahatma_desc: "Именно благодаря великому Махатме Индия была окончательно освобождена, и именно благодаря его видению национальное освобождение будет продолжаться и дальше. Его слова и идеалы будут пронизывать все аспекты нашего управления, и мы позаботимся о том, чтобы все граждане страны, наконец, поднялись над любым низким статусом, который они могут занимать."
 HND_daridra_narayana_seva: "Даридра Нараяна Сева"
 HND_daridra_narayana_seva_desc: "Великие идеалы Свами Вивекананды - это те, которыми Бапу всегда очень дорожил, и к которым должны быть близки все индуисты и даже многие мусульмане. Кормление и служение бедным - это святое деяние, поскольку оно равносильно тому, чтобы делать то же самое для Вишну, и мы должны поощрять эту практику на национальном уровне, чтобы помочь бедным и нуждающимся на нашей земле."
 HND_unity_and_brotherhood: "Единство и братство"
 HND_unity_and_brotherhood_desc: "Человек, родившийся и выросший в любой точке страны, от Бенгалии до Пенджаба, в душе остается индусом, независимо от его веры или взглядов. Однако мы должны уважать тот факт, что между нами все еще существуют различия, как существуют различия между братьями, и радоваться этим различиям. Ибо, в конце концов, какими бы разными мы ни были, нас все равно объединяет общая кровь и братство, и мы встанем плечом к плечу, когда придет время.."
 HND_sarva_dharma_sama_bhava: "Сарва Дхарма Сама Бхава"
 HND_sarva_dharma_sama_bhava_desc: "Независимо от веры человека, все пути, которые он может выбрать для достижения просветления, приведут его к этой цели, если он действительно придерживается своих собственных истин. Именно с этой целью мы не должны ставить одну веру выше другой, ибо мы - страна индуистов, сикхов, мусульман, буддистов, христиан и многих других; однако мы все вместе стремились к свободе и даже сейчас твердо стоим на пути к лучшему будущему.."
 HND_outlaw_untouchability: "Обьявить неприкасаемость вне закона"
 HND_outlaw_untouchability_desc: "Жизненно важно, чтобы неприкасаемые, такие же жители Индии, освободились от своего угнетения, а варварские обычаи неприкасаемости были полностью отменены. Эти практики не принесли ничего, кроме отделения группы индуистов от основного сообщества по причинам, о происхождении которых сегодня никто толком не знает. Это должно быть исправлено, и индуистская нация вновь станет единой."
 HND_revolutionised_education: "Революционизировать образование"
 HND_revolutionised_education_desc: "Система образования, оставленная британцами, - это позор, направленный на то, чтобы попытаться \"воспитать\" из индусов покорных британских отпрысков, вместо того чтобы на самом деле обучать наш народ их собственной истории и тому, как подняться выше. Мы должны позаботиться о том, чтобы остатки этой системы были полностью уничтожены и была введена новая система, позволяющая должным образом обучать наших людей так, как они должны быть обучены."
 HND_national_swadeshi: "Принцип Свадеши"
 HND_national_swadeshi_desc: "Свадеши - это не просто самодостаточность отдельного человека или даже защита нашей собственности от наших угнетателей, это способность всей нации жить с тем, что ей предоставлено, используя то, что необходимо, а не пытаться погрязнуть в капиталистических пороках. Наша национальная политика должна отражать это, уделяя больше внимания внутренней автаркии, а не неудачным попыткам поднять страну с помощью внешней торговли."
 HND_integration_of_satyagraha_ideals: "Принцип Сатьяграха"
 HND_integration_of_satyagraha_ideals_desc: "Именно благодаря нашей практике Сатьяграхи нам удалось не только освободить индийскую нацию, но и начать освобождать ее народ от присущего ему угнетения, от которого многие из них страдают. Мы должны продолжать интегрировать эти принципы во все аспекты национального законодательства, поскольку благодаря им мы станем единой нацией."
 HND_realising_sarvodaya: "Реализация принципа Сарводайя"
 HND_realising_sarvodaya_desc: "Основные убеждения Сарводайя, выраженные Бапу, - это те, с которыми мало кто в стране может не согласиться. Ибо когда что-то улучшается для целого, это улучшается и для отдельного человека; и когда парикмахер подстригает волосы мужчине или строитель заканчивает устанавливать дверь, они оба в равной степени трудятся на благо общества. Мы позаботимся о том, чтобы те, кто служит нации всеми способами, были одинаково вознаграждены, и все вместе мы будем стремиться к всеобщему возвышению нашего народа."

 HND_aaram_haram_hai: "Аарам Харам Хай"
 HND_aaram_haram_hai_desc: "Сменив Хака, Неру добился избрания на пост президента страны и решил не только продолжить дело Хака, но и создать свое собственное наследие. Нация должна продолжать идти по пути социализма, вдохновленного западом, решая ключевые проблемы, которые все еще беспокоят нацию, даже несмотря на ее недавнее объединение."
 HND_bapus_guidance: "Рукводство Бапу"
 HND_bapus_guidance_desc: "Слова и идеалы великого Ганди всегда будут занимать место в наших сердцах и умах, но мы не должны ожидать, что он будет просто диктовать всю национальную политику. Страна должна продолжать продвигаться вперед по пути реализации социализма под чутким руководством Махатмы, гарантирующего, что мы не свернем с нашего курса."
 HND_cities_of_steel: "Города из стали"
 HND_cities_of_steel_desc: "Сталь потенциально является самым важным ресурсом для любой растущей страны, без нее можно производить лишь немногие отрасли промышленности, не привязывая себя к экспорту других стран. С этой целью было предложено начать строительство нескольких запланированных городов, ориентированных в первую очередь на полную переработку стали, начиная с начальной добычи чугуна и угля и заканчивая линиями окончательной сборки. С них мы начнем наш путь к сталелитейной промышленности Свадеши."
 HND_grow_more_food_campaign: "Кампания борьбы за урожай"
 HND_grow_more_food_campaign_desc: "В неспокойные времена, которые мешают импорту продовольствия и еще больше ограничивают число стран, желающих импортировать продовольствие в нашу республику, мы должны обеспечить, чтобы Индия могла производить достаточно продовольствия не только для себя, но и для оказания помощи всем союзникам, в которых она нуждается. Должна начаться масштабная кампания по увеличению количества обрабатываемых земель в стране и повышению производительности на уже созданных участках, чтобы решить эту насущную проблему."
 HND_five_year_industrialisation_plan: "5-летний план индустриализации"
 HND_five_year_industrialisation_plan_desc: "Нация должна быть индустриализирована как можно быстрее, прежде чем те, кто сильнее ее, снова попытаются подчинить индийский народ своей власти. Должен быть реализован грандиозный план "сверху вниз", направленный в первую очередь на электрификацию страны, улучшение нашей национальной инфраструктуры и значительное, насколько это возможно, развитие нашей нынешней промышленной базы."
 HND_codify_the_separation_of_powers: "Закрепить разделение властей"
 HND_codify_the_separation_of_powers_desc: "Хотя Председатель, конечно, руководствуется наилучшими намерениями нации, мы не можем гарантировать, что так будет всегда. Должно быть четкое разделение властей, а законодательная власть и суды должны поддерживать высокий уровень авторитета, чтобы защитить нацию от любых потенциальных диктаторов, которые однажды могут появиться и угрожать ей."
 HND_the_french_blueprint: "По французским проектам"
 HND_the_french_blueprint_desc: "Франция, родина революции, вдохновила социалистов по всему миру, даже убедив многих аполитичных или умеренных людей размахивать красным знаменем в союзе со своими собратьями. Их страна быстро выбралась из руин Великой войны и своей собственной гражданской войны, став передовой державой глобального социализма. Мы можем учиться у них и подражать их действиям, применяя их, когда это необходимо, в Индии, чтобы, надеюсь, добиться успеха там, где это сделали они."
 HND_tryst_with_destiny: "Свидание с Судьбой"
 HND_tryst_with_destiny_desc: "Нация была освобождена, и благодаря этому освобождению мы стремились принести свободу и возможности простым людям, крестьянам и рабочим Индии; бороться с бедностью, невежеством и болезнями и покончить с ними; построить процветающую, демократическую и прогрессивную нацию, а также создать социальную, экономическую и политическую систему. институты, которые обеспечат справедливость и полноту жизни каждому мужчине и каждой женщине. Наши дети будут благодарны нам за то, чего мы достигли сегодня."

 HND_forward_upon_the_middle_road: "Вперед, по Срединному пути"
 HND_forward_upon_the_middle_road_desc: "Именно мать Бенгалия дала нам Субхас Чандру Бос, и именно Субхас Чандра Бос отплатил за это тем, что привел всю страну к свободе. Теперь он поведет нас вперед по новому пути, который приведет в соответствие националистические идеалы, объединяющие нас, с социалистическими идеалами, возвышающими нас."
 HND_unify_the_executive: "Унификация исполнительной власти"
 HND_unify_the_executive_desc: "Это провал буржуазной демократии, которая просто награждает самого громогласного демагога контролем над нацией за то, что он убедил последнего крестьянина, что он на их стороне. Наши просвещенные системы не страдают от такого недостатка, и поэтому их не нужно сдерживать теми же мерами предосторожности, которые должны соблюдать капиталистические страны. Сняв эти ограничения, Председатель может должным образом реализовать свое видение страны, не принижая ни одного из его аспектов."
 HND_the_fathers_retirement: "Уход \"Отца\" в отставку"
 HND_the_fathers_retirement_desc: "Хотя роль великого Махатмы в нашем окончательном освобождении нельзя отрицать, его значительное противодействие политике, необходимой для продвижения нации вперед, без сомнения, вскоре станет занозой в заднице правительства. Похоже, пришло время поощрить уход на пенсию нашего великого \"Отца нации\", теперь, когда его стремление к созданию полностью независимой Индии, наконец, осуществилось."
 HND_national_education: "Национальное образование"
 HND_national_education_desc: "Попытки навязать нации западные системы образования привели к полной катастрофе. Система образования, которая игнорирует индийские условия, требования Индии, а также историю и социологию Индии, слишком ненаучна, чтобы рассчитывать на какую-либо рациональную поддержку. Для того чтобы Индия двигалась вперед, необходимо создать систему образования, которая, прежде всего, отвечала бы потребностям индийского народа."
 HND_reconstructing_society: "Реконструкция общества"
 HND_reconstructing_society_desc: "Нельзя допустить, чтобы беднейшие слои населения страны страдали так, как они страдают, в то время как их богатые соседи купаются в роскоши. Мы должны должным образом перераспределить землю и собственность в пользу тех, кто больше всего в этом нуждается, и перестроить общество на гораздо более справедливых началах."
 HND_the_nation_of_the_netaji: "Нация и Нетаджи"
 HND_the_nation_of_the_netaji_desc: "Именно благодаря Нетаджи нация была освобождена, и именно благодаря Нетаджи нация будет продолжать освобождаться. С тех пор, как он был простым протеже покойного Даса, он боролся за свободу нации, будучи одним из первых, кто взял в руки оружие, когда призыв революции прозвучал для всех патриотов, а также против правителей Камбоджи и их союзников-принцев. Его лидерство всегда должно быть признано за ту неоспоримую роль, которую оно сыграло в нашей независимости."
 HND_ittefaq_itmad_qurbani: "	Иттефак, Итмад, Курбани"
 HND_ittefaq_itmad_qurbani_desc: "Единство, вера, самопожертвование. Три слова, которые всегда вели наших людей к победе, независимо от любых альтернатив, выдвигаемых пацифистами-скептиками. Именно благодаря этим трем словам они знают, за что борются, и, руководствуясь ими, они будут продолжать бороться, каким бы трудным ни было испытание, с которым они столкнутся."
 HND_jai_hind: "Джай Хинд!"
 HND_jai_hind_desc: "Ни одна фраза так не сплачивала наш народ, как два простых слова \"Джай Хинд\", Победа за Индию. Мы - народ, которого посторонние люди так долго приучали ожидать только неудач и поражений, но именно благодаря этим словам мы освободились от этой обусловленности и осознали, что мы побеждаем, когда индийские мужчины и женщины сражаются вместе за общее дело. Мы будем продолжать превозносить это до небес, пока не будет больше побед, Джай Хинд!"
 HND_equality_through_liberation: "Равенство через освобождение"
 HND_equality_through_liberation_desc: "Когда Нетаджи призвал патриотов прийти к нему на помощь в освобождении страны, к нему присоединились не только многие мужчины, готовые поднять оружие против угнетателей, но и бесчисленное множество женщин. Эти женщины были одними из наших самых яростных бойцов, и мы должны признать, что нет никаких причин не относиться к ним как к равным мужчинам, с которыми они сражались бок о бок, поскольку это равенство они действительно заслужили своими действиями."
 HND_give_me_blood_ill_give_you_freedom: "Дайте мне вашу кровь, а я дам свободу!"
 HND_give_me_blood_ill_give_you_freedom_desc: "В то время как Индия была освобождена благодаря действиям бесчисленных храбрых мужчин и женщин, многие из которых проливали кровь и умирали за правое дело, любую беспорядочную толпу можно заставить истекать кровью, но только те, у кого есть надлежащее руководство, могут чего-то добиться от своей жертвы. Именно под руководством Нетаджи некогда беспорядочная толпа, которая когда-то потерпела неудачу в освобождении Индии, смогла, наконец, рассеять оккупантов, и именно под руководством Нетаджи они будут делать это до тех пор, пока он жив!"

 ### ForPol Focuses ###

 HND_future_of_the_hermit_kingdom: "Судьба королевства отшельников"
 HND_future_of_the_hermit_kingdom_desc: "Поскольку наш контроль над Индийским субконтинентом обеспечен, пришло время обратить внимание на нашу северную границу. В Китае появляются новые великие державы, и мы должны обеспечить свой контроль над королевством Бутан в качестве буферного государства в Гималаях. Мы превратим это реакционное захолустье в новое социалистическое государство, если потребуется, силой."
 HND_resolving_the_nepal_conflict: "Разрешить конфликт с Непалом"
 HND_resolving_the_nepal_conflict_desc: "В хаосе, последовавшем за Вельткригом, Непал вторгся в индийские низменности. Настало время восстановить наши владения на этих территориях."
 HND_claim_goa: "Претензии на Гоа"
 HND_claim_goa_desc: "Анклав Гоа - не более чем заноза в заднице нашей гордой нации. Это по праву наша территория, и она должна быть возвращена."
 HND_claim_pondicherry: "Претензии на Пондичерри"
 HND_claim_pondicherry_desc: "Анклав Пондичерри - не что иное, как заноза в боку нашей гордой нации. Это по праву наша территория, и она должна быть возвращена."
 HND_dealing_with_the_sister_republic: "Отношения с братской республикой"
 HND_dealing_with_the_sister_republic_desc: "Бирма, как и мы, когда-то находилась под властью подлых империалистов, которые присваивали ее богатства и независимость, как комары - кровь. Мы сражались бок о бок, освобождая всю их нацию, в то время как наша терпела поражение. За прошедшие годы наша дружба быстро переросла во враждебность, и обе стороны списывали это на действия друг друга, но теперь, когда наша собственная революция наконец завершилась, пришло время, так или иначе, разрешить наши разногласия."
 HND_avenging_the_36th_war: "Месть за 36-ую войну"
 HND_avenging_the_36th_war_desc: "Сиамское королевство было одним из наиболее предприимчивых \"государств-стервятников\", которые воспользовались беспорядками, вызванными падением Раджа. Поскольку молодая бирманская нация страдала от родовых схваток, а население нашей страны было слишком малочисленным, чтобы помочь, правительство Сиама жестоко захватило обширные территории на востоке в ходе так называемой "36-й бирманско-сиамской войны". Жизненно важно, чтобы мы исправили эту ошибку и поставили этих империалистов на место!"
 HND_liberating_the_frontier_tracts: "Освобождение приграничных районов"
 HND_liberating_the_frontier_tracts_desc: "Когда Индия погрузилась в хаос, когда ее народ попытался сбросить оковы британского господства, тибетцы воспользовались возможностью оккупировать пограничный регион [858.GetName] и заставили живущих там людей подчиниться их несправедливому правлению. Нельзя допустить, чтобы такая несправедливость сохранялась, и она должна быть немедленно исправлена."
 HND_restoring_the_unity_of_kashmir: "Восстановление единства Кашмира"
 HND_restoring_the_unity_of_kashmir_desc: "Когда страна, наконец, объединилась, у нас появилась возможность видеть более отдаленные угрозы, защищая революцию даже от самых маловероятных угроз из-за пределов наших границ. В настоящее время самая северная часть Кашмира все еще находится в руках местных полевых командиров, которые изводят население своим жестоким правлением. Мы должны нанести удар, пока еще есть такая возможность, и восстановить весь Кашмир как часть нации."
 HND_claim_ceylon: "Претензии на Цейлон"
 HND_claim_ceylon_desc: "По праву Цейлон, Мальдивские и Андаманские острова являются частью нашей страны. Колониализм на ними должен подойти к концу."
 HND_red_raj: "Место Красного Раджа"
 HND_red_raj_desc: "Теперь, когда Индия объединена правительством Калькутты, кабинет начал обсуждать, какой курс мы должны предпринять на международном уровне."

