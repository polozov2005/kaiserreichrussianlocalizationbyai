### Events ###

 socialist_india_events.1.t: "Дебаты по поводу кандидатуры заместителя"
 socialist_india_events.1.d: "Отставка заместителя председателя Бхогараджу Ситарамайи в конце прошлого года стала настоящим шоком для многих в стране, за исключением тех членов партии, которые уже довольно давно готовили его свержение. С тех пор как Фазлул Хак сменил Ладжпата Рая на посту председателя, по всем свободным землям Бхараты раздались выстрелы, и многие в Индийском национальном конгрессе хотели, чтобы руководство страной перешло к ним. С момента назначения Ситарамайи эти потенциальные узурпаторы постарались переложить вину за все неудачи на его заместителя, а катастрофическое столкновение на границе с Аджмером прошлой осенью стало последним гвоздем в крышку гроба, который побудил Хака подать в отставку, надеясь сохранить хоть какое-то достоинство.\n\nТеперь, когда в течение ближайших нескольких недель ожидается назначение нового заместителя, мало кто в стране менее известен о своем желании выдвинуть эту кандидатуру, чем Субхас Чандра Бос, лидер так называемой фракции максимистов в Конгрессе и единственный кандидат, бросивший вызов руководству Хака в 1933 году. Как утверждается, Бос, вдохновленный возвышением своего идеологического союзника в Великобритании, заместителя председателя правления Мосли, с самого начала был одним из главных сторонников отставки Ситарамайи в рамках своего плана по получению этой должности для себя. Только время покажет, окупился ли его план в конце концов."
 socialist_india_events.1.a: "Трудно представить, какой еще выбор есть у Хака..."

 socialist_india_events.2.t: "Неожиданный выбор"
 socialist_india_events.2.d: "Поскольку в Калькутте все были единодушны в том, что назначение Боса заместителем было предрешено, заявление председателя о назначении Джавахарлала Неру на эту должность шокировало даже некоторых членов кабинета Хака. Джавахарлал, сын покойного председателя Мотилала Неру, был важной фигурой в партии еще до ухода своего отца на пенсию, а в последние годы позиционировал себя как одного из самых сильных союзников председателя. Хотя при любых нормальных обстоятельствах назначение кого-то вроде Неру заместителем не должно вызывать удивления, попытка перехитрить Боса подобным образом, безусловно, является смелым шагом.\n\nПо сообщениям, сам Бос, услышав эту новость, пришел в ярость и поклялся сместить Хака и Неру с их постов, как только представится такая возможность."
 socialist_india_events.2.a: "Если раньше ножи были спрятаны, то теперь они точно пойдут в ход."

 socialist_india_events.3.t: "Намбияр требует должности в Правительстве"
 socialist_india_events.3.d: "Ни для кого не стало неожиданностью, что максимистам не потребовалось много времени, чтобы сделать свой первый шаг в ответ на пренебрежительное отношение Хака к Босу. Их первые действия привели к тому, что они начали усиливать свое влияние на весь ИНК, собирая союзников, чтобы попытаться добиться назначения Аратила Намбияра в недавно обновленный кабинет Хака. Намбияр, близкий союзник Боса, явно ставит перед собой высокие цели, и, как сообщается, он претендует на пост министра иностранных дел, чего Хак никогда не допустит, но и не может позволить себе просто отрицать.\n\nОдним из простых способов решить эту дилемму было бы просто предоставить Намбияру более низкую позицию в рейтинге, что могло бы привести к облегчению и реабилитации, поскольку он не мог бы отказаться от одной должности и ожидать, что люди поддержат его в другой. Предоставление ему какой-либо должности все равно было бы расценено максималистами как победа, какой бы незначительной она ни была, и дало бы им плацдарм для саботажа правительства. Вместо этого эту должность можно было бы предложить правой руке Найду Махадеву Десаи, поскольку аграрии, безусловно, поддержат нас в этом, и максималистам было бы трудно обвинить нас в предвзятости в выборе. Просто передать его нейтральной стороне также может быть лучшим вариантом, поскольку попытка вообще избежать этого конфликта, скорее всего, принесет нам наибольшую пользу в долгосрочной перспективе."
 socialist_india_events.3.a: "Назначьте его на низшую должность, чтобы задобрить."
 socialist_india_events.3.b: "Передайте позицию Махадеву Десаи, чтобы избежать предвзятости."
 socialist_india_events.3.c: "Передайте его нейтральному гражданскому служащему."

 socialist_india_events.4.t: "Подготовка к \"Операции Гром\""
 socialist_india_events.4.d: "Согласно первоначальным планам, которые были разработаны в начале прошлого года, сегодня должен был быть издан приказ о полной мобилизации, завершающийся вторжением в страны обоих участников Бомбейского пакта в течение следующих нескольких недель под кодовым названием \"Операция Гром\". Катастрофические неудачи армии во время нашей схватки с доминионом в Аджмере привели к тому, что эти планы были отложены, поскольку армия явно еще не была готова, даже с учетом обещанной поддержки со стороны наших европейских союзников. Однако растущая нестабильность, охватившая мир после Черного понедельника, заставила пересмотреть эти планы.\n\nРанее сегодня на встрече с председателем маршал Кодандера Кариаппа рекомендовал возобновить ранее отложенную операцию \"Гром\". Согласно этим планам, новой датой вторжения должен был стать май следующего года, а промежуточный год был использован для подготовки армии и экономики к тотальной войне против правительств Лахора и Хайдарабада. После долгих обсуждений Хак согласился с возрождением плана и отдал Кариаппе приказ немедленно приступить к его повторной реализации."
 socialist_india_events.4.a: "Несмотря ни на что, мы должны быть готовы."

 socialist_india_events.5.t: "Найду призывает к диалогу с Бомбейским Пактом"
 socialist_india_events.5.d: "За последние годы многие поняли, что если где-то в Республике есть секрет, то кто-то, кому это не предназначено, неизбежно узнает его. На сегодняшнем заседании Сароджини Найду выдвинула предложение, явно вызванное возобновлением операции \"Гром\", попытаться возобновить мирные переговоры между Республикой и правительствами оккупантов. В то время как в предыдущие годы любые попытки мирного воссоединения с южными князьями быстро пресекались, поскольку ни один дипломат не мог выдержать более часа в обществе низама, при Ладжпате Рае было предпринято немало попыток присоединения Доминиона.\n\nРай верил, как и старший Неру до него, что, если британцы предоставят индийцам на западе самоуправление, они быстро захотят свергнуть короля-императора и присоединиться к Республике. Однако реальность вскоре поставила под сомнение эти убеждения, поскольку новые правительства Доминиона совершенно не желали уступать свои властные позиции \"радикальному режиму\", подобному нашему, что привело к тому, что переговоры ни к чему не привели.\n\nОдним из первых действий Хака после того, как он стал председателем, было окончательное прекращение этих переговоров, что привело к цепочке обострений, приведших к Бомбейскому пакту и столкновению в Аджмере. Аграрии уже давно критикуют Huq за это, полагая, что этой эскалации можно было избежать путем дальнейших переговоров, и, хотя предложение Найду продиктовано нашими военными планами, очевидно, что в первую очередь это очередная атака против руководства Хака.\n\nОтвет на это предложение путем отправки символических представителей, конечно, был бы воспринят аграриями как победа, но на данный момент это, скорее всего, успокоило бы их, так что внимание можно снова сосредоточить на Босе. Однако Найду гораздо более благоразумна, чем подхалимы Боса, и простое обращение к ней с просьбой отклонить ходатайство в частном порядке, вероятно, также сработает в краткосрочной перспективе, не придав смелости ее фракции, оставляя оба варианта открытыми для ответа Хака."
 socialist_india_events.5.a: "Мы пришлем представителя для проведения символических переговоров."
 socialist_india_events.5.b: "Вежливо сообщите ей, что время дипломатии прошло."

 socialist_india_events.6.t: "Бос требует места в Париже"
 socialist_india_events.6.d: "В связи с тем, что через несколько недель должен состояться Девятый конгресс Третьего интернационала, правительство решило в этом году на этот раз начать подготовку к приему своей делегации пораньше, а заместитель председателя возглавит группу, которую мы направим в великий город Париж. Однако быстро осознанная проблема, связанная с такой ранней подготовкой, - это проблема, которая мучает нас уже несколько месяцев: Bose. Услышав, что Неру собирается возглавить делегацию, он немедленно выступил с решительным возражением против этих планов, заявив, что такая делегация на самом деле не представляет всю широту индийского социализма. Вместо этого он потребовал, чтобы наряду с отрядом Неру была представлена группа максималистов во главе с самим Босом, по-видимому, надеясь сделать мероприятие посвященным исключительно ему самому и создать свой собственный имидж в глазах социалистического мира.\n\nИ снова председатель находится в трудном положении, поскольку, хотя требования Боса явно возмутительны и полностью эгоцентричны, многие в партии были введены в заблуждение, думая, что он прав. Отправка Боса, конечно, подарит нам несколько недель тишины и покоя, хотя он, очевидно, воспользуется этим, чтобы собрать сторонников по всему миру для поддержки будущих действий против нас. Зная его, мы, вероятно, также должны принести извинения [FRA.GetLeader] за то, что заставили их терпеть его так долго.\n\nЕсли мы все же хотим попытаться найти способ не расширять полномочия Боса, отправка Ганди вместе с Неру - это еще один вариант, поскольку даже Бос не может зайти так далеко, чтобы попытаться заменить Махатму. Хотя Бапу не совсем социалист по западным меркам, его сторонники-аграрии легко трансформировали его убеждения в социалистические идеи, так что он не был бы так уж неуместен в Париже. Многие западные социалисты также питают сильную слабость к Махатме, что, вероятно, хорошо скажется на нас в долгосрочной перспективе, и поэтому Хаку стоит рассмотреть этот вариант."
 socialist_india_events.6.a: "Отпустим его,это даст хотя бы несколько недель покоя."
 socialist_india_events.6.b: "Отправьте Махатму вместе с Неру, он не сможет возражать против этого."

 socialist_india_events.7.t: "Битва в бассейне Тапи"
 socialist_india_events.7.d: "С тех пор, как война на юге зашла в тупик, наша западная граница с так называемой Федерацией проходит по реке Тапи, начинающейся в Бераре и протекающей к побережью к северу от Сурата. Хотя в целом граница остаётся довольно стабильной, обширный бассейн реки усеян множеством островков, где статус оккупации часто остаётся неопределённым. Для поддержания порядка река регулярно патрулируется речными бригадами с обеих сторон, действующими с небольших застав на некоторых из этих островков.\n\nОднако сегодняшняя проблема возникла после того, как один из наших, пожалуй, чрезмерно ревностных патрулей высадился на одном из форпостов Федерации и объявил о его возвращении Республике. Хотя, конечно, любая отвоеванная территория — это шаг в правильном направлении, высшее командование флота было не в восторге от этого внезапного вторжения. Они рекомендовали отступить с острова до того, как новости дойдут до Хайдарабада, чтобы пока избежать дальнейшей эскалации ситуации. Как следует приказать действовать флоту?"
 socialist_india_events.7.a: "Почему мы должны отступить?Джай Хинд!"
 socialist_india_events.7.b: "Покинуть остров, не стоит нагнетать обстановку в данный момент."

 socialist_india_events.8.t: "Битва в бассейне Тапи"
 socialist_india_events.8.d: "С тех пор, как война с Севером зашла в тупик, наша западная граница с социалистическим режимом проходит по реке Тапи, начинающейся в Бераре и протекающей к побережью к северу от Сурата. Хотя в целом граница остаётся довольно стабильной, обширный бассейн реки усеян множеством островков, где оккупация часто остаётся нестабильной и неопределённой, даже несмотря на патрулирование нашими речными экипажами. Калькутта, очевидно, внимательно следит за нашими патрулями, поскольку рано утром местные патрули сообщили нам о захвате социалистическими войсками одного из наших форпостов, в то время как несколько солдат, находившихся там, возвращались на берег за припасами.\n\nХотя изначально мы опасались, что это начало гораздо более масштабного вторжения, до сих пор мы не видели никаких подвижек со стороны войск Республики, а разведка докладывает нам, что они, похоже, тоже в замешательстве по поводу происходящего. Однако войска на острове, находящиеся под чужим флагом, похоже, продолжают укреплять свои позиции, что говорит о том, что они не собираются уходить в ближайшее время. Маршал Саид Эль-Эдрус уже начал подготовку контингента для попытки вернуть остров, утверждая, что мы не должны отдавать ни пяди, даже если это приведёт к дальнейшему обострению ситуации. Однако Доминион рекомендовал нам сдать этот \"бесполезный камень\", поскольку мы не можем рисковать эскалацией, но кто они такие, чтобы нам приказывать?"
 socialist_india_events.8.a: "Как они посмели, отбейте остров немедленно!"
 socialist_india_events.8.b: "Пусть они это сделают, мы скоро нанесем ответный удар."

 socialist_india_events.9.t: "Федерация отступает"
 socialist_india_events.9.d: "Возможно, наши опасения по поводу ответа Федерации были напрасны, поскольку трусы, похоже, покинули аванпост, и мы не видим никаких признаков того, что они планируют вернуть его.\n\nНаши войска на острове уже начали праздновать, а высшее командование уже рассматривает возможность дальнейшего укрепления острова, чтобы помочь нам в операции «Гром»."
 socialist_india_events.9.a: "Не удивитель от этих трусов."

 socialist_india_events.10.t: "Федерация отвоевывает аванпост"
 socialist_india_events.10.d.hnd: "Новости с форпоста Тапи крайне разочаровывают: наши патрули сообщают о прибытии федеральных войск на остров, одержавших победу над нашими после короткого боя.\n\nНасколько нам известно, трое наших солдат погибли в бою, а двое остальных взяты в плен, хотя Федерация пока не пыталась шантажировать нас этими новыми козырями. Это печальный день для Республики, хотя со временем мы отомстим."
 socialist_india_events.10.d.prf: "Сегодня утром мы получили отличные новости с форпоста Тапи: наши бойцы одержали победу над социалистами после короткого боя.\n\nЧто ещё лучше, мы не понесли потерь в бою, хотя один человек получил лёгкие ранения от пулевого ранения во время боя. Трое вражеских бандитов убиты, ещё двое доставлены в тюремную камеру, что даёт нам потенциально ценный козырь в будущем, в схватке с Калькуттой."
 socialist_india_events.10.a: "Пешки Калькутты будут знать, что лучше не повторять эту попытку."
 socialist_india_events.10.b: "Еще один промах..."

 socialist_india_events.11.t: "Атака Федерации отбита"
 socialist_india_events.11.d.hnd: "Сегодня утром мы получили отличные новости с форпоста Тапи: наши бойцы отразили попытку вторжения федеральных войск, высадившихся поздно вечером вчера. Их атака быстро захлебнулась, поскольку наши бойцы успели убить командира и ещё одного солдата, стоявшего рядом с ним, прежде чем противник успел понять, где они находятся. Ещё один солдат погиб, когда они начали отступать.\n\nЕщё один солдат, которого наши войска изначально считали погибшим, также был захвачен в плен, что может стать потенциальной разменной монетой в будущем. Наши войска на острове уже начали праздновать победу, и высшее командование рассматривает возможность дальнейшего укрепления острова для помощи в проведении операции «Гром»."
 socialist_india_events.11.d.prf: "Новости с форпоста Тапи крайне разочаровывают: наши патрули сообщают нам о победе социалистов на острове. Сообщается, что четверо наших бойцов погибли в бою, ещё двое получили ранения.\n\nЭтих двоих поспешно доставили на берег оставшиеся четверо, которые организовали отступление после того, как катастрофическое нападение явно провалилось. Хотя наши люди уже жаждут мести, мы должны выждать время, прежде чем снова нанести ответный удар по Калькутте, и когда это произойдет, мы покажем им, что такое настоящая месть."
 socialist_india_events.11.a: "Великий первый шаг к освобождению Деккана."
 socialist_india_events.11.b: "Калькутта скоро заплатит..."

 socialist_india_events.12.t: "Земельный спор в Райпуре"
 socialist_india_events.12.d: "Когда революция охватила Индию, многие беднейшие и нуждающиеся жители страны были по праву возвращены на свои исконные земли, экспроприированные у британских колонизаторов и тиранических заминдаров, ранее занимавших их. Однако, к большому огорчению самых радикальных индийских революционеров, многие из этих заминдаров и мелких землевладельцев по-прежнему владеют обширными участками плодородной земли в личных целях, в то время как их бывшие крепостные часто оказывались среди низов. Попытки дальнейшего решения этой проблемы на национальном уровне часто приводили к противодействию и разногласиям, возглавляемым теми, кто считал это слишком опасным и радикальным, что побуждало многих крестьян брать инициативу в свои руки.\n\nВ городе Кота, примерно в 130 километрах к северу от Райпура, конфликт между местными крестьянами и одним из бывших заминдаров обострился вплоть до офиса Хака. Группа из примерно 20 фермеров последние несколько недель занимает земли вышеупомянутого заминдара, утверждая, что земля ранее принадлежала их двум семьям, прежде чем была передана нынешнему владельцу британцами. В последние дни произошло несколько стычек, когда нанятые владельцем люди пытались вернуть землю, нападая на фермеров с палками. Опасения дальнейшей эскалации насилия заставили местного губернатора обратиться за разрешением ситуации к вышестоящему начальству.\n\nХотя, очевидно, не существует мира, в котором заминдару вернут землю, а офицеры будут направлены, чтобы избавиться от его наёмных головорезов, что с ней делать — настоящая загадка. Конечно, очевидным вариантом было бы передать её фермерам, но это ещё больше подтолкнёт других крестьян к копированию их действий, а дальнейшее поощрение таких устаревших взглядов на собственность не принесёт ничего хорошего. Другой вариант — изъять землю у государства, что позволит фермерам продолжать работать на ней, как они делали до сих пор, но, безусловно, вызовет немало недовольства. В конечном счёте, выбор, конечно же, остаётся за председателем."
 socialist_india_events.12.a: "Земля полноправно является собственностью крестьян."
 socialist_india_events.12.b: "Государственная собственность — лучший способ прекратить эти мелкие споры."

 socialist_india_events.13.t: "Возрождение плана Агры"
 socialist_india_events.13.d: "Летом 1934 года был разработан план дальнейшей индустриализации города Агра, который лучшие умы страны назвали просто \"План Агры\". Копирование идей, впервые опробованных в Великобритании, должно было привести к гарантированному успеху, плоды которого мы уже пожинали и будем продолжать пожинать ещё долгие годы.\n\nВесь проект быстро обернулся полной катастрофой, поскольку назначенные на него рабочие не смогли добиться ничего существенного. Самое главное, один из главных планировщиков был быстро разоблачён в хищении средств, причём это разоблачение, предположительно, было организовано лагерем «максимистов». Поскольку формально бывший заместитель председателя был официальным руководителем проекта, это стало одним из последних гробов, побудивших его уйти в отставку.\n\nОднако сегодня оставшиеся планировщики снова обратились к Хаку с просьбой поддержать возрождение плана в менее официальном формате, на этот раз в городе Ахмадабад. Их главный аргумент основан на убеждении, что сам план не был ошибочным, а просто неудачные обстоятельства привели к его провалу, и что он может легко быть реализован на новом месте. Хотя риск для правительства здесь гораздо меньше, чем прежде, поскольку ни «Хак», ни Неру не связаны напрямую с новым планом, повторение прошлых ошибок всё ещё может легко привести к обвинению Хака. Однако меньший риск делает эту идею заманчивой, поскольку даже незначительный успех может принести дивиденды стране, но, конечно, этого может быть недостаточно, чтобы компенсировать потенциальный ущерб."
 socialist_india_events.13.a: "Пусть попробуют, может, на этот раз действительно получится."
 socialist_india_events.13.b: "Нет смысла снова пытаться реализовать провальный план."

 socialist_india_events.14.t: "Уход мадам Камы"
 socialist_india_events.14.d: "Один из самых ревностных ранних индийских революционеров, Бхикхаджи Рустом Кама, скончался сегодня во время выздоровления от лихорадки.\n\nРазвернув первый индийский национальный флаг на Международной социалистической конференции в Штутгарте в 1907 году, мадам Кама пользовалась большим авторитетом как среди отечественных, так и среди международных революционеров.."
 socialist_india_events.14.a: "Мы будем идти вперёд! Пока вся Индия не станет свободной!"

 socialist_india_events.15.t: "Митинг в Патиале"
 socialist_india_events.15.d: "Не будет ошибкой предположить, что операция Гром уже началась, когда улицы приграничного города Патиала заполонили демонстранты в военной форме. Однако вместо войны эти люди маршируют под знаменем очередной попытки Боса заручиться поддержкой, на этот раз организовав националистический митинг в присутствии Доминиона. Официально этот митинг был вызван предполагаемым бездействием правительства в вопросе возвращения субконтинента – давним предметом спора максимистов. Они всегда утверждали, что главная слабость руководства Республики заключалась в ошибочной уверенности в том, что со временем Доминион, а в перспективе и Федерация, согласятся объединиться в единое свободное индийское государство под руководством Калькутты.\n\nВыйдя на сцену, чтобы в очередной раз донести до людей своё несогласие с подходом предыдущих администраций, Бос зашёл так далеко, что даже начал обвинять самого Махатму в пропаганде пацифизма, хотя и скрывал свою критику, не называя его имени напрямую. На протяжении большей части своей речи он ясно давал понять своим последователям, что если бы не пацифистские идеалы, мир с оккупантами никогда бы не был подписан, и что если бы лидеры того времени думали так же, как он, и продолжали бороться, от британского правления не осталось бы и следа. После его выступления митинг завершился последним маршем к границе, где Бос в последний раз поклялся, что, став лидером, он проведёт свой следующий митинг прямо по ту сторону границы, в Лудхияне."
 socialist_india_events.15.a: "Он прав, знаешь."
 socialist_india_events.15.b: "Как он смеет так плохо говорить о Махатме!"

 socialist_india_events.16.t: "Плохие урожаи Харифа"
 socialist_india_events.16.d: "Хотя в этом году в стране выпало много осадков, вплоть до затопления некоторых районов, урожай в Харифа в этом году во многих районах оказался значительно ниже, чем в предыдущие годы. Как обычно после подобных бедствий, все, у кого есть своё мнение, начали обмениваться идеями о потенциальных виновниках. Однако те, кто отвечает за ликвидацию последствий стихийных бедствий, были гораздо больше озабочены тем, как помочь фермерам, которые теперь потенциально сталкиваются с нехваткой продовольствия, особенно учитывая необходимость финансирования в других областях.\n\nВидные представители Аграриев, конечно же, призвали оказать этим фермерам максимальную поддержку, даже если для её покрытия придётся перенаправить средства с других проектов. Хотя такая помощь потенциально парализует работу правительства в других областях, она должна заслужить немалую поддержку со стороны простых людей, которые делают всё возможное и даже больше. Просто дать то, что мы можем, — тоже разумный вариант, хотя вряд ли заслужит уважение кого-либо, кроме Агриев, которая изначально настаивала на этом. В качестве альтернативы мы всегда можем просто дать самый минимальный ответ, чтобы сэкономить ресурсы для других целей, даже если это разозлит тех, кто пострадает от последствий. В конце концов, скоро начнется война, и нам нужно выделить на неё все силы, даже если фермерам придётся немного пострадать."
 socialist_india_events.16.a: "Окажем им всевозможную поддержку"
 socialist_india_events.16.b: "Мы отдадим то, что можем сэкономить"
 socialist_india_events.16.c: "К сожалению, мы не можем позволить себе такие расходы"

 socialist_india_events.17.t: "Кампания по распространению слухов"
 socialist_india_events.17.d: "Даже после своего \"грандиозного\" митинга, похоже, Бос и его приспешники продолжают находить новые способы нападать на Хака и Неру. Зловещие слухи о национальном руководстве постепенно расползаются как по правительству, так и по всей стране. Эти слухи варьируются от самых абсурдных утверждений, например, о том, что Хак хочет присоединения Республики к Британскому Союзу для «восстановления» британского правления, до тех, в которых есть доля правды, например, о том, что Хак, вероятно, уйдёт в отставку в пользу Неру в случае воссоединения.\n\nХотя многие просто отмахнулись от этих слухов, назвав их бессмысленными сплетнями, несомненно, распространёнными вражескими шпионами, Председателю стало очевидно, что за этим стоит кто-то из окружения Боса, и эту змею необходимо поймать как можно скорее, прежде чем имиджу Хака будет нанесён ещё больший урон."
 socialist_india_events.17.a: "Немедленно выследите эту змею!"

 socialist_india_events.18.t: "Ганди призывает к единству"
 socialist_india_events.18.d: "Недавние нападки Боса не только на правительство, но и на самого Махатму не остались незамеченными даже теми, кто не был напрямую вовлечен в ежедневные клеветнические баталии. Ганди, вероятно, под влиянием действий Боса против него, вновь вмешался в партийную политику, призывая к единству членов ИНК. Конечно, давая понять, что он, возможно, не полностью согласен с правительством во всех его действиях (что в наши дни шокирует немногих), он заявил, что нашему народу жизненно важно быть единым, если мы действительно хотим полной независимости для всего субконтинента.\n\nПодобные слова, как только они дошли до Боса, были восприняты довольно негативно его последователями. По иронии судьбы, его максималисты начали тайно подталкивать правительство к цензуре Махатмы, утверждая, что подобные «жёсткие нападки» на членов партии недопустимы, и что Ганди следует посоветовать не вмешиваться в партийную политику. Хотя они, очевидно, мотивированы партийными соображениями, в их аргументах есть определенная обоснованность, и, возможно, было бы хорошей идеей попросить Бапу не втягиваться еще больше в этот спор, даже если Бос был тем, кто его начал в первую очередь."
 socialist_india_events.18.a: "Махатма снова показывает свою мудрость."
 socialist_india_events.18.b: "Ему следует знать, что не следует вмешиваться в дела правительства."

 socialist_india_events.19.t: "Охота на кобру"
 socialist_india_events.19.d: "После быстрого расследования нелепых слухов, с которыми правительство столкнулось в последние месяцы, уверенность Хака в их происхождении подтвердилась. Источник этой лжи теперь установлен – Рамчандр Сахарам Руикар, член фракции Максимистов и бывший лидер Всеиндийского конгресса профсоюзов. Действуя явно по указанию Боса, он распространял слухи в рамках общей схемы по свержению правительства. Хотя у нас есть веские доказательства его причастности к этому, любые свидетельства о связях Боса с ним пока не более чем слухи, но у нас достаточно данных, чтобы свергнуть Руикара, если мы того пожелаем.\n\nОткрытое выступление против одного из союзников Боса, конечно же, рискованно, поскольку любое публичное действие, такое как его исключение из партии, несомненно, вынесет наши внутренние разногласия на широкую общественность, которая сочтет это проблемой всей партии. Всегда можно лично предъявить ему доказательства, поскольку это, вероятно, заставит его замолчать в будущем, но мало что повлияет на заговор Боса. Конечно, есть и другой вариант: не предпринимать никаких действий, поскольку эти слухи, несомненно, со временем сами собой утихнут, а последствия, вероятно, будут гораздо меньше, чем дальнейшее публичное обсуждение, даже если это может принести Босу выгоду в краткосрочной перспективе."
 socialist_india_events.19.a: "Немедленно отстранить его от партиийных дел."
 socialist_india_events.19.b: "Решите вопрос в частном порядке."
 socialist_india_events.19.c: "Не стоит еще больше усугублять ситуацию."

 socialist_india_events.20.t: "Соловьиный марш"
 socialist_india_events.20.d: "Похоже, Бос — не единственный член партии, обожающий митинги, хотя сегодняшний митинг в Калькутте, к счастью, гораздо менее язвительный, чем в Патиале. Найду, возглавляя большую процессию женщин, вместе с Ганди и видными аграриями, прошла по столице, призывая к дальнейшей помощи женщинам страны. Их требования, как видно на плакатах и баннерах, включают в себя более широкую поддержку женского образования, официальную государственную поддержку Всеиндийской женской конференции и обещание содействовать освобождению женщин по всей Индии в случае воссоединения.\n\nПравительство всегда решительно поддерживало права женщин, и, по некоторым данным, положение женщин в Республике лучше, чем где-либо ещё в Азии, однако аграрии часто заявляли, что этого недостаточно. Хотя правительству было бы довольно просто согласиться на их просьбы, есть и те, кто считает, что Найду делает это лишь для улучшения собственного имиджа, а не для поддержки других женщин. Они утверждают, что нам следует пока отклонить её просьбы и сосредоточиться на других вопросах, а затем вернуться к правам женщин, как только фракционность партии станет менее выраженной, а конкурирующие правительства будут разгромлены. Однако решение должен принять Хак, независимо от того, насколько громко каждая из групп отстаивает свою позицию.."
 socialist_india_events.20.a: "Правительство, конечно, поддерживает их цели."
 socialist_india_events.20.b: "Разве мы уже недостаточно сделали для женщин?"

 socialist_india_events.21.t: "Дальнейшая интеграция Всеиндийского конгресса профсоюзов"
 socialist_india_events.21.d: "есмотря на то, что страна к настоящему времени твёрдо привержена делу социализма, в первые дни революции Индия была менее идеологически ортодоксальной, и значительная часть её руководства была связана с социализмом только через союзы с Западом. В результате, несмотря на важную роль таких профсоюзных организаций, как Всеиндийский конгресс профсоюзов, между ними и правительством всегда сохранялась значительная дистанция. Однако после прихода к власти Хака наблюдается постепенная тенденция к дальнейшей интеграции этих профсоюзов по британскому и французскому образцу, чего всегда особенно активно добивался заместитель Неру.\n\nС этой целью Неру сегодня предложил предоставить Всеиндийскому конгрессу профсоюзов (AITUC) ещё больший контроль над индийской рабочей силой, предложив профсоюзам, действующим под эгидой AITUC, фактический контроль над многими государственными предприятиями. По словам Неру, это не только повысит эффективность их работы, но и даст рабочим, входящим в эти профсоюзы, более непосредственную заинтересованность в обеспечении успеха своих предприятий, что должно привести к повышению эффективности труда.\n\nАграрии, давно критикующие смещение умеренных на запад, также выразили своё несогласие с этим предложением. Они утверждают, что попытки зеркально отразить западные идеалы в Индии никогда не работали, и что расширение прав и возможностей профсоюзов в стране с преобладанием аграрного сектора просто маргинализирует большинство населения, которое никогда не ступало на фабрику. Возможно, они правы, но всё же, возможно, стоит уже сейчас встать на этот путь, чтобы, когда Индия наконец станет индустриальной страной, она была полностью готова к социализму."
 socialist_india_events.21.a: "Увеличить роль Конгресса профсоюзов в индийской промышленности."
 socialist_india_events.21.b: "Мы не можем просто копировать Запад, надеясь что все сработает."

 socialist_india_events.22.t: "Последние почести"
 socialist_india_events.22.d: "Сегодня печальный день для страны, независимо от ваших политических взглядов. Сегодня утром поступило известие о кончине великого Лал Ладжпат Рая после непродолжительной болезни. Послание от его семьи передал старший сын Рая, Амрит. Ещё до того, как стать председателем, Рай был одним из самых отважных борцов за свободу в истории Индии. Вместе с Балом Тилаком и Бипином Палом он совершил революцию в движении за независимость, входя в триумвират Лала Бал Пала. Даже после смерти Тилака и ухода Пала на пенсию Рай продолжал бороться, не только добившись нашей нынешней независимости, но и вдохновив целое поколение индусов на борьбу за полную свободу.\n\nНесмотря на разногласия Хака с Раем в последние годы его жизни, они по-прежнему глубоко уважали друг друга, и неудивительно, что председатель распорядился провести для Рая полноценные государственные похороны. Согласно желанию его семьи, похороны пройдут скромно, насколько это вообще возможно для государственных похорон, а после кремации Рая его прах будет развеян над Гангом, чтобы однажды он мог унестись в океан в Калькутте."
 socialist_india_events.22.a: "Мы будем хранить его великое наследие"

 socialist_india_events.23.t: "Кариаппа готовит операцию Гром"
 socialist_india_events.23.d: "После года напряженного планирования и подготовки, похоже, время великого освобождения наконец-то близко. На встрече с Председателем сегодня утром маршал Кариаппа сообщил Хаку, что, хотя, вероятно, можно сделать больше, армия, скорее всего, готова как никогда к началу операции «Гром», и теперь просто ждет приказа о начале. Он также рекомендовал Хаку отдать приказ как можно скорее, поскольку разведка предполагает, что Доминион, возможно, узнал об этих планах и может рассмотреть возможность нанесения превентивного удара, если тот не будет нанесен достаточно быстро."
 socialist_india_events.23.a: "Жаль, что Рай не дожил до окончательного освобождения."

 socialist_india_events.24.t: "Первая цель"
 socialist_india_events.24.d: "Хотя операция Гром предполагает удар как по Доминиону, так и по Федерации, до сих пор неясно, против кого именно будут сосредоточены усилия, чтобы избежать потенциальных утечек информации шпионам Доминиона.\n\nБыстрая атака на главный порт Доминиона, Карачи, безусловно, является вариантом, поскольку это лишит их любой внешней поддержки со стороны союзников по Антанте, но взятие Хайдарабада и обезглавливание южного змея — не менее заманчивый вариант. Какой бы ни был выбран вариант, армия готова выполнить приказ."
 socialist_india_events.24.a: "Сосредоточьтесь на отрезании Карачи."
 socialist_india_events.24.b: "Быстрый удар на юг легко подорвет Федерацию."

 socialist_india_events.25.t: "Калькутта на тропе войны"
 socialist_india_events.25.d.raj: "Благодаря блестящим усилиям Чарльза Тегарта по поддержанию шпионской сети в регионах Индии, неподконтрольных нашему правительству, он только что сообщил нашему правительству, что Республика, по всей видимости, готовит внезапное возобновление гражданской войны. Он представил подробные отчёты о передвижениях войск, приближающихся к границам в районах Гуджарата и Патиалы. Теперь, когда активные боевые действия снова на горизонте, в министерствах царит тревога и страх.\n\nМы можем лишь надеяться, что мы должным образом подготовились к этому моменту, поскольку, если военные не смогут защитить границы и вернуть себе остальную часть Индии, это будет означать конец Доминиона и новый Красный Радж, нависший над всем континентом. Началась пропагандистская кампания, призванная мобилизовать индийский народ и обеспечить его лояльность, и эта новость была оперативно передана в Хайдарабад, чтобы там тоже могли начать подготовку."
 socialist_india_events.25.d.prf: "До нас дошли срочные новости, переданные лахорскими шпионами с максимально возможной оперативностью: социалисты завершили разработку планов вторжения как на нас, так и на Доминион. Доминион уже отдал приказ о полной мобилизации, и нам тоже стоит подумать о том же.\n\nПохоже, время, к которому мы готовились десять лет, наконец настало."
 socialist_india_events.25.d.ent: "До нас дошли срочные новости, переданные так быстро, как только смогли, нашими друзьями из Лахора: социалисты Калькутты завершили разработку планов вторжения как в Доминион, так и к мятежным принцам на юге.\n\nХотя мы не можем с точки зрения логистики взять на себя обязательство по полному вмешательству в этот конфликт, учитывая, насколько сильно перегружен наш альянс, мы, безусловно, должны отправить им на помощь небольшой отряд, а также как можно больше материальных средств."
 socialist_india_events.25.a: "К оружию!"
 socialist_india_events.25.b: "Индия не должна пасть!"

 socialist_india_events.50.t: "Англо-индийское торговое соглашение"
 socialist_india_events.50.d: "Сотрудники нашего консульства в Калькутте только что передали сотрудникам Министерства иностранных дел Великобритании весьма интересное предложение. На фоне всё более тревожных событий в других индийских государствах, ставших наследниками империалистической Индии, наши добрые друзья и братья-пролетарии в [From.GetNameDef] предлагают  экономическое соглашение, призванное укрепить основы их и без того шаткого правительства, при участии технических и промышленных консультантов из нашего Британского Союза.\n\nВзамен рабочие Великобритании получат стабильные поставки бананов, чая и других экзотических товаров, а его благосклонное правительство получит доступ к жизненно важным ресурсам, таким как каучук. Р. Х. Тоуни, опытный политик с прочной социалистической репутацией и хорошими связями с представителями Конгресса в Индии с первых дней существования нашего Союза, ожидает одобрения Лондона, прежде чем отправиться на корабль в Калькутту для конкретизации сделки."
 socialist_india_events.50.a: "Ричард Тоуни снова отплывает в Калькутту!"
 socialist_india_events.50.b: "Ни в коем случае! Международная торговля — предвестник капитализма!"

 socialist_india_events.51.t: "[From.GetName] отказался"
 socialist_india_events.51.d: "[From.GetAdjective]ое правительство отклонило торговую сделку."
 socialist_india_events.51.a: "Тогда никакого чая для британцев!"

 socialist_india_events.52.t: "Обмен чая на оружие"
 socialist_india_events.52.d: "Ричард Тоуни, человек, обеспечивший тёплые отношения между Калькуттой и Лондоном в смутные дни распада Британской империи, снова прибыл в Индию! Он привёз приветствия наших дорогих друзей-пролетариев из [From.GetNameDef] и обещания нового, более эффективного промышленного сотрудничества между трудящимися наших стран.\n\nТоуни сам руководил первой зарождающейся отправкой британских железнодорожных инженеров, и, будучи глубоко укоренённым в индийской земле, он полон решимости обеспечить успешное развитие этого нового этапа сотрудничества. Остаётся лишь, чтобы наше правительство озвучило свою заявку в обмен на техническую поддержку Лондона."
 socialist_india_events.52.a: "Давайте запросим промышленную и инженерную помощь."
 socialist_india_events.52.b: "Попросим их помочь нашим ВВС."
 socialist_india_events.52.c: "Давайте попросим помочь их нашему флоту."

 socialist_india_events.53.t: "Ричард Тоуни вернулся"
 socialist_india_events.53.d.industry: "В Калькутте наш представитель на переговорах, народный делегат Ричард Тоуни, сообщил, что индийское правительство желает заключить договор об облегчении британской промышленной помощи и развития в обмен на доступ к большему количеству огромных богатств Индии.\n\nНаши коллеги в Бенгалии с нетерпением ждут нашего ответа."
 socialist_india_events.53.d.airforce: "В Калькутте наш представитель на переговорах, народный делегат Ричард Тоуни, доложил, что индийское правительство желает заключить договор об облегчении британской военной помощи и развития в обмен на доступ к большему количеству огромных богатств Индии.\n\nНаши коллеги в Бенгалии с нетерпением ждут нашего ответа."
 socialist_india_events.53.d.navy: "В Калькутте наш представитель на переговорах, народный делегат Ричард Тоуни, сообщил, что индийское правительство желает заключить договор об облегчении британской военно-морской помощи и развития в обмен на доступ к большему количеству огромных богатств Индии.\n\nНаши коллеги в Бенгалии с нетерпением ждут нашего ответа."
 socialist_india_events.53.a: "Конечно, Солидарность навсегда!"
 socialist_india_events.53.b: "Они должно быть шутят."

 socialist_india_events.54.t: "Прибытие британской помощи"
 socialist_india_events.54.d: "После опасного месяца в море помощь развитию, которую мы запросили у наших друзей в Великобритании, наконец прибыла в доки Калькутты.\n\nС такой огромной поддержкой нашего государства мы, возможно, сможем сокрушить реакционеров по всему субконтиненту — от Хайберского прохода до мыса Коморин."
 socialist_india_events.54.a: "Узрите силу пролетарского сотрудничества!"

 socialist_india_events.100.t: "Место Красного Раджа в мире"
 socialist_india_events.100.d: "После того, как Индия объединилась вокруг правительства Калькутты, а провинции претендентов на власть перешли под социалистическое управление, кабинет министров начал обсуждать, какой курс нам следует выбрать на международной арене. Логичным решением было бы вступить в союз с Интернационалом и таким образом официально занять своё законное место среди великих синдикалистских стран мира.\n\nДругие, однако, утверждают, что нам следует создать собственный блок альянсов – силу социализма с восточным лицом. Такой курс, безусловно, даст нам большую свободу в распространении революции, но может стоить нам технологических преимуществ, которые дает связь с великими армиями Интернационала."
 socialist_india_events.100.a: "Мы будем мечом Интернационала в Азии!"
 socialist_india_events.100.b: "Своими силами Азия станет КРАСНОЙ!"

 socialist_india_events.101.t: "Индия желает присоединится к Интернационалу"
 socialist_india_events.101.d: "Раздробленные остатки британского владычества наконец-то воссоединились под эгидой левого правительства Калькутты.\n\nКак будто этого было недостаточно для мирового пролетариата, новое индийское правительство обратилось с просьбой о присоединении в качестве члена Интернационала!"
 socialist_india_events.101.a: "Пролетарии всех стран, соединяйтесь!"
 socialist_india_events.101.b: "Нам не нужны большевики в тюрбанах..."

 socialist_india_events.102.t: "[From.GetName] отказали нам"
 socialist_india_events.102.d: "[From.GetAdjective]ое правительство сообщило, что Интернационал не нуждается в союзе с нами."
 socialist_india_events.102.a: "Серьезно?"

 socialist_india_events.103.t: "[socialist_india_events.GetNameDefCap] предлагает индо-китайский союз"
 socialist_india_events.103.d: "Успехи индийской и китайской революций стали источником гордости не только для народов Азии, но и для всех социалистов мира. Неудивительно, что [socialist_india_events.GetLeader] сегодня предложил единый альянс между нашими двумя сферами – грандиозное партнёрство для освобождения всей Азии.\n\nТакое предложение, конечно же, было с одобрением воспринято многими в правительстве, хотя вновь обострился острый вопрос о приграничных районах, поскольку индийцы по-прежнему претендуют на суверенитет над территорией, которая по праву принадлежит Китаю. Хотя многие готовы согласиться на союз без каких-либо условий, всё ещё существует сильное давление с требованием положить конец их претензиям, прежде чем будет достигнуто какое-либо соглашение."
 socialist_india_events.103.a: "Наше сотрудничество освободит Азию!"
 socialist_india_events.103.b: "Требуйте признания Таванга и Аксайчина в первую очередь китайскими."
 socialist_india_events.103.c: "Нет, этот союз закончится неудачей."

 socialist_india_events.104.t: "Китай требует делимитации границы"
 socialist_india_events.104.d: "Хорошие и плохие новости пришли из [CHI.Capital.GetCapitalVictoryPointName]. Хотя они проявили интерес к нашему предложению, они выдвинули возмутительное требование об официальном признании частей Кашмира и Пограничных районов китайскими.\n\nНесмотря на ценность союза с Китаем, многим трудно смириться с передачей ему части Индии. Сейчас активно продвигается идея прекратить переговоры, а не рассматривать это безумие, хотя некоторые всё ещё считают, что эта жертва окупится в долгосрочной перспективе."
 socialist_india_events.104.a: "Ладно, мы не позволим нескольким деревням упустить эту возможность."
 socialist_india_events.104.b: "Скажите [CHI.GetLeader], пусть заберут это из наших холодных мертвых рук."

 socialist_india_events.105.t: "Индия соглашается на союз"
 socialist_india_events.105.d: "В шаге, который удивил многих в правительстве, индийцы согласились признать суверенитет Китая над приграничными регионами, готовые оставить этот спор позади и отдать предпочтение мирному сотрудничеству.\n\nПоскольку у нашего альянса больше нет никаких препятствий, [socialist_india_events.GetLeader] прибыл в [CHI.Capital.GetCapitalVictoryPointName], чтобы подписать договор о признании нашего нового партнерства."
 socialist_india_events.105.a: "Давайте поддержим азиатское единство!"

 socialist_india_events.106.t: "Переговоры провалились"
 socialist_india_events.106.d: "Хотя многие надеялись на будущее китайско-индийского сотрудничества, похоже, наши новые «друзья» не смогли просто оставить позади свой мелкий национализм, и вопрос о китайско-индийской границе привел к провалу дальнейших переговоров.\n\nПока что давайте надеяться, что худшим последствием этого пограничного спора будет просто срыв переговоров."
 socialist_india_events.106.a: "Они об этом пожалеют"

 socialist_india_events.110.t: "Решение Народной Республики Бхаратия"
 socialist_india_events.110.d: "Несмотря на то, что [socialist_india_events.GetNameDef] отклонил нашу просьбу о союзе, они не являются единственными лидерами мировой революции.\n\nУ нас по-прежнему остается возможность обратиться напрямую к Интернационалу и попытаться заключить союз с его руководством, если мы все еще хотим занять место на мировой арене."
 socialist_india_events.110.a: "Немедленно свяжитесь с [INT.Capital.GetCapitalVictoryPointName]."
 socialist_india_events.110.b: "Мы сами по себе"

 socialist_india_events.111.t: "[From.GetNameDefCap] хочет присоединится к Интернационалу"
 socialist_india_events.111.d: "Сегодня мы получили интересный запрос от [From.GetNameDef], сообщающий о том, что они хотят искать прямого союза с нами в связи с отказом [socialist_india_events.GetNameDef] от их первоначального предложения о союзе.\n\nНеобходимо принять решение, следует ли нам принять это предложение или выгнать их, как это сделали индийцы."
 socialist_india_events.111.a: "Согласиться и принять их запрос."
 socialist_india_events.111.b: "Мы и так уже перегружены, они сами по себе."

 socialist_india_events.112.t: "[From.GetName] отказали нам"
 socialist_india_events.112.d: "[From.GetAdjective]ое правительство сообщило, что Интернационал не нуждается в союзе с нами."
 socialist_india_events.112.a: "Поразительно!"

 socialist_india_events.115.t: "[FROM.GetName] ищет союза с [ROOT.GetNameDef]"
 socialist_india_events.115.d: "По мере того, как революционный огонь охватывает Азию, потребность в солидарности и сотрудничестве между недавно освободившимися народами становится всё более очевидной. Осознавая опасность нейтралитета на быстро меняющейся мировой арене, наши товарищи из [From.GetNameDef] подали заявку на вступление в [ROOT.GetFactionName].\n\nПринятие этой заявки расширит наше влияние в Азии, однако голоса несогласных предупреждают о втягивании в ненужные иностранные авантюры."
 socialist_india_events.115.a: "Мы привестсвуем наших [From.GetAdjectiveCap]их товарищей."
 socialist_india_events.115.b: "В этом нет необходимости, давайте отклоним их петицию."

 socialist_india_events.201.t: "Судьба вражеских офицеров"
 socialist_india_events.201.d: "Национальное правительство наконец-то избавилось от последних остатков колониализма на индийском субконтиненте и установило подлинно местную систему управления в неспокойных северо-западных и южных провинциях. Теперь, когда их хозяева были разгромлены, эти псы, некогда служившие им, выразили желание продолжать служить Матери-Индии, поставив страну выше политических интересов.\n\nОднако, если мы наймём этих людей, мы можем столкнуться с проблемами со стороны наших собственных офицеров, которые не желают служить бок о бок с бывшими врагами."
 socialist_india_events.201.a: "Допустите только тех, кто служил Доминиону, а не заминдаров."
 socialist_india_events.201.b: "Пустите только южан, они хотя бы боролись за независимость."
 socialist_india_events.201.c: "Примите их всех, нам нужны люди."
 socialist_india_events.201.e: "Никогда, они должны считать себя счастливчиками, что их не расстреляли!"

 socialist_india_events.250.t: "Начало первого обьединенного Конгресса"
 socialist_india_events.250.d: "Теперь, когда вся страна объединена под одним знаменем, председатель Хак счел нужным созвать специальную сессию, на которую приглашены представители со всей Индии.\n\nХотя решение Хака было вполне ожидаемым, поскольку партии необходимо будет подумать о том, как ей следует поступить с этой новой главой в истории Индии, все еще циркулируют слухи о том, что может произойти в течение следующих нескольких недель."
 socialist_india_events.250.a: "Будем надеяться, что все пройдет гладко."

 socialist_india_events.251.t: "Хак объявляет о своем уходе"
 socialist_india_events.251.d: "Похоже, некоторые слухи последних недель были правдой, поскольку в начале сегодняшней специальной сессии Хак сделал важное заявление о своей отставке с поста председателя. Заявив, что, по его мнению, он выполнил свой вклад в объединение нации и что задачу её исцеления лучше всего оставить новому поколению, он, что неудивительно, поддержал Неру в качестве своего преемника.\n\nВ, вероятно, неудачной попытке отвести неизбежные вызовы для Неру, Хак завершил свою речь призывом к единству ИНК в это смутное время и к тому, чтобы оставить фракционность позади, пока страна восстанавливается."
 socialist_india_events.251.a: "Никаких призов за то, чтобы угадать, кто выступит следующим..."

 socialist_india_events.252.t: "Бос бросает вызов лидерству Неру"
 socialist_india_events.252.d: "Никого не удивило, что призыв Хака к единству в конце его речи был почти сразу же прерван: Бос встал и объявил о намерении бросить вызов Неру за пост лидера страны.\n\nПосле неизбежной яростной перепалки между Максимистами и Умеренными, годами полными желчи друг на друга, Неру вышел на трибуну и заявил, что принимает вызов Боса. Когда толпа немного успокоилась, он заявил о своей просьбе провести выборы руководства в ближайшие несколько недель, чтобы окончательно решить судьбу партии."
 socialist_india_events.252.a: "Столкновение неминуемо"

 socialist_india_events.253.t: "Найду выставляет свою кандидатуру"
 socialist_india_events.253.d: "До сих пор Аграрии считали целесообразным держаться в тени, пока Хак и Бос открыто ссорились, но объявление о выборах лидера наконец-то позволило им сделать ход.\n\nВ ответ на опровержение Неру Босом, Найду сразу же объявила о своей выдвижении кандидатуры против них обоих. Похоже, в ближайшие недели партию ждёт очень жетская борьба за лидерство, и пока никто точно не знает, кто окажется победителем."
 socialist_india_events.253.a: "Пришло время посмотреть, кто сможет добиться большего расположения всех."

 socialist_india_events.254.t: "В поисках поддержки Сардара"
 socialist_india_events.254.d: "Хотя ИНК официально заявил о своей поддержке социализма, давно поддерживая социалистические державы Европы, значительная часть партии по-прежнему довольно не привержена столь радикальным идеям. Те, кто остался в партии, но дистанцировался от её социалистических идей, с тех пор объединились вокруг Валлаббхаи Пателя, чья сильная позиция в Конгрессе гарантировала, что их голоса не будут заглушены.\n\nС таким влиянием заручиться его поддержкой соперники считают жизненно важным для обеспечения поддержки Центра партии в их борьбе за лидерство, хотя открытое противодействие Пателя Босу заставило максимистов быстро отказаться от их поддержки. Это привело к тому, что борьба развернулась между Неру и Найду: первый пытался склонить Пателя на свою сторону, заверяя его в готовности пойти на уступки Центру, а второй апеллировал к их общей непоколебимой вере в видение Махатмы. Оба теперь с замиранием сердца ждут его решения."
 socialist_india_events.254.a: "Неру удается заручиться поддержкой Центра."
 socialist_india_events.254.b: "Патель решает выразить поддержку Найду"

 socialist_india_events.255.t: "Милитаризм и Махатма"
 socialist_india_events.255.d: "Несмотря на многочисленные нападки Максимистов на Ганди и его идеалы, он долгое время избегал прямого ответа на их подстрекательские заявления, предпочитая вместо этого повторять свою точку зрения о единстве, о том, что разделенный дом не может устоять и достичь Пурна Сварадж.\n\nОднако теперь, когда Индия объединена, многие внутри партии начали призывать Махатму дать отпор нападкам, направленным против него последователями Боса, и, как особенно поддерживают аграрии, опровергать собственные доводы Боса о том, что именно его милитаризм в конечном итоге привел к независимости.\n\nС этой целью Наиду даже предпринял шаги, попросив личного одобрения Махатмы, надеясь наконец ослабить контроль Боса над партией, а Ганди попросил время, чтобы сначала обдумать его ответ."
 socialist_india_events.255.a: "Ганди отказывается сидеть сложа руки и открыто поддерживает Найду."
 socialist_india_events.255.b: "Махатма вновь предпочитает сохранять нейтралитет в этом конфликте."

 socialist_india_events.256.t: "Поддержка Всеиндийского Конгресса Профсоюзов"
 socialist_india_events.256.d: "Для тех в партии, кто полностью разделяет более ортодоксальные социалистические убеждения, поддержка AITUC может стать важным фактором в выборе кандидата. Неудивительно, что и Бос, и Неру по отдельности предприняли попытки добиться поддержки федерации.\n\nОба начали добиваться максимального расположения руководства профсоюзов, входящих в федерацию, и изо всех сил опирались на свои социалистические убеждения, чтобы перетянуть на свою сторону тех, с кем они не так тесно связаны. Приложив достаточно усилий, особенно для привлечения нужных людей на нужные должности, любой из них мог бы получить эту жизненно важную поддержку."
 socialist_india_events.256.a: "Конгресс профсоюзов соглашается поддержать Неру."
 socialist_india_events.256.b: "Максимисты добились поддержки для Боса."

 socialist_india_events.257.t: "Начало голосования"
 socialist_india_events.257.d: "После нескольких недель такой энергичной борьбы избирательная кампания по выборам лидера наконец-то подошла к концу, и партия собралась в [socialist_india_events.Capital.GetCapitalVictoryPointName], чтобы провести два тура голосования.\n\nОднако даже до самого конца агитация продолжается, и отчаянные члены каждой фракции пытаются убедить своих соотечественников поддержать их кандидата, как только они входят в здание."
 socialist_india_events.257.a: "На данный момент это все еще чья-то игра."

 socialist_india_events.258.t: "[HND_loc_united_election_event_title]"
 socialist_india_events.258.t.nehru: "Претенденты побеждены"
 socialist_india_events.258.t.bose: "Победа Нетаджи"
 socialist_india_events.258.t.naidu: "Попытка перебить Найду"
 socialist_india_events.258.d.nehru: "После завершения голосования всем почти сразу стало очевидно, что победителем мог стать только Неру, ещё до объявления результатов первого тура. Хотя фактические результаты могли показаться весьма близкими, поскольку Бос отставал от Неру всего на несколько голосов, сильное сопротивление аграриев и других гандистов его кандидатуре практически гарантировало, что они единодушно перейдут на сторону Неру. Эти предположения, конечно же, быстро подтвердились результатами последнего тура, обеспечив Неру убедительную победу, которую партия, несомненно, заслужила.\n\nНемедленно воспользовавшись столь убедительной победой, присутствовавшие члены Конгресса собрались вместе с большей частью руководства Конгресса для произнесения победной речи Неру. Неру сначала поблагодарил делегатов за поддержку его лидерства как в партии, так и в стране, но быстро перешёл к благодарности как Бос, так и Найду за их вызовы, заявив, что они помогли «не дать руководству страны расслабиться».\n\nПосле речи Неру и Боса, и Найду получили возможность выступить, хотя согласился только Найду, а Бос предпочёл уйти вместе со своей фракцией. Хотя маловероятно, что Бос смирится с этим поражением, похоже, его надежды на приход к власти окончательно рухнули."
 socialist_india_events.258.d.bose: "После завершения голосования результаты оказались шокирующими для значительной части партии: Субхас Чандра Бос одержал победу. Его победа была практически предопределена уже в первом туре, но ему не хватило примерно дюжины голосов до абсолютной победы, что потенциально могло полностью пропустить второй тур. После выбывания Найду из борьбы умеренные всё ещё были уверены в победе, полагая, что смогут одержать победу благодаря поддержке избирателей-аграриев. Однако их уверенность оказалась напрасной, поскольку Бос опередил Неру во втором туре всего на три голоса, что стало бы победой, какой бы сложной она ни была.\n\nПытаясь сохранить цивилизованность, Неру получил возможность произнести речь о признании поражения, в которой он вновь повторил предыдущие призывы Хака к единству, хотя и с явным разочарованием в голосе. Найду, в свою очередь, отклонила предложение выступить с собственной речью, и победная речь Боса была перенесена после речи Неру. Хотя её речь была помпезной по своей сути, её в конечном итоге омрачил ранний уход аграриев в середине выступления, хотя, судя по громким крикам максимистов по её завершении, можно было подумать, что зал всё ещё полон."
 socialist_india_events.258.d.naidu: "После завершения голосования, похоже, Конгресс решил не вознаграждать ни одну из двух фракций, которые последние несколько лет враждовали. Наиду одержала победу как над Неру, так и над Босом. В первом туре голосования Наиду стала явным победителем, Неру отставал от неё, а Бос занял с большим отрывом третье место. Хотя это не исключало полностью возвращение Неру, особенно учитывая, что многие ожидали, что максимисты поддержат его как меньшее зло, поскольку у них много общих идеалов, многие максимисты, включая самого Боса, просто покинули зал, услышав о его поражении. В результате подтверждение победы Наиду во втором туре на тот момент было не более чем формальностью.\n\nПосле этого Наиду предпочла произнести короткую скромную победную речь, поблагодарив союзников за поддержку, а затем быстро уступила место Неру для речи о признании поражения. Хотя со временем отношения между умеренными и аграриями, вероятно, сохранятся, поскольку они никогда по-настоящему не враждовали, Бос вряд ли смирится с этой потерей. Однако сейчас, похоже, его надежды на приход к власти окончательно рухнули, и руководство партии вновь перешло к гандистскому крылу."
 socialist_india_events.258.a: "Именно с Неру Индия пойдет в будущее."
 socialist_india_events.258.b: "Конгресс полностью доверяет Хамаре Нета!"
 socialist_india_events.258.c: "Я уверен, что Бапу гордится тем, чего она достигла.."

 socialist_india_events.259.t: "Выборы нового заместителя"
 socialist_india_events.259.d.patel: "Поскольку должность заместителя теперь вакантна после восхождения Неру на пост председателя, первым делом Неру необходимо назначить своего заместителя. Ещё до того, как он поддержал Неру, Сардар Патель рассматривался в качестве основного кандидата на эту должность, поскольку Неру хотел заручиться поддержкой многих скептически настроенных к его руководству. С избранием Неру председателем Патель остаётся основным кандидатом, хотя рассматривались и два альтернативных варианта.\n\nПервым из них была бы сама Найду, а вторым — Раджендра Прасад. Учитывая, что попытки Боса расколоть партию, по всей видимости, всё ещё продолжаются, назначение первого может быть именно тем, что необходимо для прекращения разъединяющей партии. Однако решение о назначении более «нейтрального» Прасада может быть именно тем, что необходимо для отделения должности заместителя от партийной политики, с которой она теперь так тесно ассоциируется, и реального подавления партийной фракционности."
 socialist_india_events.259.d.default: "В связи с тем, что должность заместителя стала вакантной после восхождения Неру на пост председателя, первым шагом Неру станет назначение своего заместителя. Изначально основным кандидатом на эту должность был Сардар Патель, но из-за его отказа поддержать Неру вместо Найду от такого назначения было решено отказаться. Вместо него рассматриваются два основных альтернативных варианта: сам Найду и Раджендра Прасад.\n\nПоскольку попытки Боса расколоть партию, по всей видимости, всё ещё продолжаются, назначение первого может быть именно тем, что необходимо для прекращения разъединяющей партии. Однако, в равной степени, решение о назначении более «нейтрального» Прасада может быть именно тем, что необходимо для отделения должности заместителя от партийной политики, с которой она теперь так тесно ассоциируется, и реального подавления партийной фракционности."
 socialist_india_events.259.a: "Поддержка Пателя была жизненно важна для победы, выбирите его."
 socialist_india_events.259.b: "Важно в трудные времени идти на компромисс, поэтому пригласите Найду."
 socialist_india_events.259.c: "Прасад, более нейтральный заместитель был бы идеальным кандидатом."

 socialist_india_events.260.t: "Бос порывает с Конгрессом"
 socialist_india_events.260.d: "Не видя реальных путей к лидерству в самом ИНК после поражения от [socialist_india_events.GetLeader], Бос сегодня объявил о намерении выйти из партии вместе со своими сторонниками-максимистами и создать собственную партию, конкурирующую с Конгрессом. Он заявил, что его новая партия, будет чисто социалистической и не допустит в свои ряды умеренных, на которых Бос не раз возлагал вину за своё поражение на выборах.\n\nВ то время как потенциальные члены этой новой партии начали праздновать то, что они считают новым путём для страны, большинство просто увидело в этом агонию медленно умирающего движения Боса."
 socialist_india_events.260.a: "С его уходом, возможно, мы наконец обретем мир и покой."

 socialist_india_events.261.t: "Бегство Центра"
 socialist_india_events.261.d: "Избрание Боса председателем вряд ли можно назвать всеобщей популярностью в партии, и даже сейчас открытое противодействие его руководству остаётся обычным явлением. Хотя предпринимались попытки ограничить эту критику, последняя попытка цензуры дала обратный эффект: центристы партии во главе с Сардаром Пателем наконец решили, что с них хватит, и объявили о своём массовом выходе из партии.\n\nОбычно такие новости подрывают веру в лидера, но максимисты, включая Боса, как сообщается, восприняли эту новость спокойно, полагая, что самоочищение этих умеренных просто сняло с них тяжкий груз с шеи страны."
 socialist_india_events.261.a: "Нетаджи уже настолько продвинулся вперед, что мусор выносится сам собой!"

 socialist_india_events.262.t: "Парад Победы"
 socialist_india_events.262.d: "Выполняя обещание, данное в Патиале, Председатель организовал грандиозный митинг, который состоялся сегодня в Лудхияне, где когда-то проходила граница между Республикой и Доминионом. Этот митинг, изначально задуманный как парад в честь победы нации над оккупантами, был сосредоточен не только на Боса и его образе, как многие полагали. Вместо этого значительная часть победной речи Боса была посвящена Ганди, и, что довольно шокирует, его слова о Махатме впервые оказались весьма позитивными.\n\nХотя на протяжении всей речи Бос неоднократно давал понять, что не во всем согласен с Ганди, он также внушал мысль о том, что страна не была бы свободной без неустанного труда Махатмы. Однако самой шокирующей частью речи, возможно, стало ее заключение, в котором председатель не только объявил, что день рождения Ганди 2 октября станет постоянным национальным праздником, но и сделал неожиданное заявление о том, что это будет сделано в честь человека, \"который ушел из общественной жизни\".\n\nНикто не был так потрясён этим последним заявлением, как сам Махатма, которому новость передал один из последователей несколько часов спустя. Зная лучше, чем кто-либо другой, что у него нет планов отойти от дел, он быстро распознал суть этого плана: Бос наконец-то нашёл способ обойти одну из последних заноз в своём теле. Хотя Ганди когда-то твёрдо стоял против подобной лжи, даже он смог понять, что пришло время признать поражение и спокойно принять вынужденную отставку. В конце концов, признал он, Индия обрела полную свободу, и если её народ желает, чтобы Бос правил им так, как он намерен, он не имеет права противиться их выбору."
 socialist_india_events.262.a: "Мы всегда будем уважать Отца, даже если он неуважает нас."

 socialist_india_events.300.t: "Кончина Рабиндраната Тагора"
 socialist_india_events.300.d: "Верный друг Ганди и, вполне возможно, величайший ученый-поэт, которого Индия видела за сотни лет, скончался вчера поздно вечером в окружении своей скорбящей семьи.\n\nЕго место среди аграриев занял выдающийся крестьянский лидер Панджабрао Дешмукх."
 socialist_india_events.300.a: "Теперь он там, где разум не знает страха."

 socialist_india_events.400.t: "Судьба раджей"
 socialist_india_events.400.d: "Суверенитет южных принцев был полностью уничтожен, а принцы, которые предпочли остаться верными британской короне, также были отстранены от власти. Тем не менее, несмотря на это, многие были возмущены предполагаемым бездействием правительства в отношении их дальнейшей судьбы. Хотя они, возможно, больше не имеют никакой прямой власти, многие князи, решившие остаться в Индии, смогли сохранить большую часть своих личных земель и поместий.\n\nКак ИНК, так и широкая общественность неоднократно призывали не только к экспроприации этой земли у бывших членов королевской семьи, но и к дальнейшему изгнанию их из страны за их преступления против простого человека. Однако это мнение не является всеобщим, и многие выступают за то, чтобы просто оставить их жить как частных лиц, поскольку они уже лишены какой-либо реальной власти для дальнейшего угнетения наших народов."
 socialist_india_events.400.a: "Они могут продолжать жить как частные лица, без крайних излишеств."
 socialist_india_events.400.b: "Изгнать их и передать их состояние нуждающимся."

 socialist_india_events.500.t: "What path does HND go down?"
 socialist_india_events.500.d: "This will tell the AI what to do"
 socialist_india_events.500.a: "Syndie"
 socialist_india_events.500.b: "RadSoc"
 socialist_india_events.500.c: "Totalist"

### Decisions ###

 Join_HNDs_faction_decision: "Присоединиться к Восточному Синдикалистскому Союзу"
 HND_propose_the_sino_indian_bloc: "Предложить создание Индо-Китайского Блока"
 HND_propose_the_sino_indian_bloc_desc: "Учитывая успех Революций как в Китае, так и в Индии, с нашей стороны было бы глупо не стремиться к дальнейшему сотрудничеству с нашими друзьями из [CHI.Capital.GetCapitalVictoryPointName]. Хотя вопрос о границе между нами по-прежнему остается острым, мы надеемся, что этот мелкий национализм не положит конец азиатскому единству."

 HND_factions_category: "Внутрение фракции Конгресса"
 HND_factions_category_desc: "\n\n\n£GFX_IND_INC_cat_texticon\n\n\n\n\n\n\nС тех пор как Ладжпат Рай ушел в отставку с поста президента страны, руководство Индийским национальным конгрессом перешло в руки партийного крыла под руководством Абул Касема Фазлула Хака, известные как §rУмеренные§!, которые больше всего вдохновляются своими европейскими коллегами-социалистами. Лидерство Хака долгое время оспаривалось теми членами партии, которые сами стремились занять первое место, и теперь, после спорного назначения Неру заместителем, две основные альтернативные фракции, стремящиеся захватить власть, по-настоящему вступили в борьбу.\n\nГлавными среди тех, кто держит в руках ножи, являются §oМаксимисты§! Субхас Чандры Боса, представляющие самую большую внутреннюю угрозу для администрации Хака. Как и умеренные, это крыло в основном черпает вдохновение у европейских социалистов, но пытается согласовать эти убеждения с теми, которые провозглашаются сильными националистическими движениями мира, с целью найти \"золотую середину\" между ними.\n\nОднако §RАграрии§!, которых ранее возглавлял Ладжпат Рай, придерживаются более сдержанного подхода к хаосу, и с тех пор руководство фракции объединилось вокруг Сароджини Найду. В то время как неоспоримое влияние великого Махатмы Мохандаса Карамчанда Ганди, конечно, ощущается во всей партии, нигде это не проявляется так сильно, как в этом крыле и в основном доморощенных взглядах, которых они придерживаются, что обеспечивает им значительное влияние по всей стране; влияние, которое, как они надеются, однажды приведет к тому, что нация будет руководствоваться их идеями.\n\nНа данный момент, §rУмеренные§! имеют [?HND_syndicalist_score_percentage_var|%1G] очков §Gвлияния§!\nНа данный момент, §oМаксимисты§! имеют [?HND_totalist_score_percentage_var|%1G] очков §Gвлияния§!\nНа данный момент, §RАграрии§! имеют [?HND_radsoc_score_percentage_var|%1G] очков §Gвлияния§!\n\nКак только Индия будет обьединена, фракция, обладающая наибольшим влиянием, почти наверняка добьется победы на последующих выборах."

 HND_union_support_decision: "Поддержка от профсоюзов"
 HND_union_support_decision_desc: "Профсоюзы страны, объединенные под эгидой AITUC(Всеиндийский конгресс профсоюзов), значительно укрепили свое влияние под руководством Хака. Оказывая достаточную помощь, мы можем гарантировать, что они используют свое новое положение, чтобы должным образом отплатить своему великому благодетелю за его помощь, укрепляя позиции председателя."
 HND_mobilise_workers_decision: "Мобилизовать рабочих"
 HND_mobilise_workers_decision_desc: "Если и есть что-то, в чем Умеренные не могут победить, так это то, как они начали революционизировать индийскую промышленность, за исключением, конечно, плана Агры. Продолжая инвестировать в развитие промышленности, мы можем не только улучшить имидж умеренных как великих модернизаторов, но и довести национальное производство до необходимого нам уровня."
 HND_centre_compromise_decision: "Компромисс с Центром"
 HND_centre_compromise_decision_desc: "Несмотря на наше стремление к социализму, большая часть ИНК по-прежнему придерживается своих старых взглядов, не отвергая полностью социализм руководства, но и не принимая его. Поддержка этих людей жизненно важна для достижения поставленных целей, и, возможно, стоит пересмотреть некоторые политики, чтобы сохранить их благосклонность."
 HND_jai_hind_decision: "Джай Хинд!"
 HND_jai_hind_decision_desc: "Именно революция принесла Индии свободу, и именно революция освободит остальные ее народы, все еще находящиеся под колониальным гнетом. Каждый трудоспособный мужчина и даже женщины, желающие этого, должны быть готовы дать отпор оккупантам и освободить всю Индию!"
 HND_fighting_for_our_freedom_decision: "Битва за нашу свободу"
 HND_fighting_for_our_freedom_decision_desc: "Солдаты - ничто без оружия, с которым можно сражаться, и наращивание военного производства должно быть приоритетом, несмотря на возражения пацифистов, которые все еще верят, что Индия может воссоединиться мирным путем. Оккупанты говорят только о насилии, а мы ответим пулями."
 HND_denounce_the_middle_road_decision: "Отказ от \"Срединного Пути\""
 HND_denounce_the_middle_road_decision_desc: "Мысль о том, что \"национал-популизм\" Савинкова может быть каким-либо образом согласован с социализмом, была бы смехотворной, если бы не была такой опасной. Председатель должен четко заявить о своем несогласии с подобными идеями, поддерживаемыми максимистами, прежде чем кто-либо еще попадется в ловушку сладких речей Боса."
 HND_weaving_together_our_liberation_decision: "Сплетая воедино наше освобождение"
 HND_weaving_together_our_liberation_decision_desc: "Снова и снова британцы терпели поражение из-за свадеши, и это будет продолжаться до тех пор, пока они будут оккупировать Индию. Продолжая поощрять наших людей к созданию собственной одежды и товаров, мы сможем перепрофилировать эту отрасль на более важные цели, даже если аграрии будут считать это победой своих убеждений."
 HND_promoting_satyagraha_decision: "Продвижение принципов Сатьяграха"
 HND_promoting_satyagraha_decision_desc: "Как бы кто-то ни относился к этому, мы не можем отрицать влияния Ганди и его взглядов на население, и мы были бы глупцами, если бы, по крайней мере, не поддержали его идеалы. Даже если мы не верим, что Индия воссоединится мирным путем, люди будут довольны и активны, если они поверят, что могут стремиться к достижению этой цели."
 HND_discrediting_pacifism_decision: "Дискредитировать пацифизм"
 HND_discrediting_pacifism_decision_desc: "Настойчивые заявления аграриев о том, что Индия освободится мирным путем, постепенно становятся для страны камнем преткновения. Мы должны дискредитировать эти идеи и еще больше убедить рядовых индийцев в том, что война - это единственный выход, если мы хотим, чтобы они были готовы взяться за оружие, когда придет время."

 HND_renovate_bombay_agra_road: "Восстановить дорогу Бомбей-Агра"
 HND_renovate_bombay_agra_road_desc: "Дорога Бомбей-Агра находилась в плачевном состоянии со времен революции, она была повреждена не только во время войны, но и в запущенном состоянии в последующие годы. Поскольку танк больше не является единственным способом передвижения между этими двумя странами, мы должны позаботиться о его восстановлении и воссоединении нации."
 HND_restore_the_delhi_madras_plan: "Мадрас-Дели"
 HND_restore_the_delhi_madras_plan_desc: "До революции существовали грандиозные планы строительства железной дороги, соединяющей Мадрас с Дели, но за прошедшие годы они, очевидно, были сорваны. Поскольку большая часть пути уже проложена, а близлежащие пути можно использовать повторно, в конечном итоге осуществить этот план будет относительно легко.."
 HND_calcutta_hyderabad_highway: "Экспресс Калькутта-Хайдарабад"
 HND_calcutta_hyderabad_highway_desc: "За годы существования Федерации Хайдарабад превратился в один из самых важных городов на субконтиненте, даже сейчас, когда его предполагаемый лидер бежал как трус. Обеспечение прямого маршрута между ним и Калькуттой должно значительно способствовать росту страны и, как мы надеемся, надлежащей интеграции города в состав Республики.."
 HND_renovating_karachis_docks: "Обновление доков Карачи"
 HND_renovating_karachis_docks_desc: "Революция свела остатки Британии к единственному крупному порту - Карачи, который благодаря помощи Антанты превратился в один из самых важных на субконтиненте. Сокращение поддержки Доминиона после Великой депрессии и ущерб, нанесенный в последующие годы, привели к тому, что он начал приходить в упадок. При достаточной поддержке мы сможем вернуть порт к жизни и использовать его лучше, чем когда-либо делал Доминион.."
 HND_rebuilding_lahore: "Восстановление Лахора"
 HND_rebuilding_lahore_desc: "Если и есть какой-то город, который Доминион отказался бы сдать без боя, так это их последняя столица Лахор, город, которому потребовалось две войны, чтобы окончательно перейти к Республике. Разрушения, обрушившиеся на город из-за того, что они цеплялись за него, не будут устранены в одночасье, но усилия по этому направлению должны начаться немедленно, если мы хотим, чтобы однажды он вернулся к своим великим высотам."
 HND_srinagar_urbanisation: "Урбанизация Сринагара"
 HND_srinagar_urbanisation_desc: "Сринагар, некогда одна из столиц бывшего княжеского штата Кашмир, ныне представляет собой жалкое подобие поселения, заброшенного в течение многих лет под властью доминиона. Однако этот город обладает огромным потенциалом, и теперь, когда за него отвечает действительно компетентное правительство, мы можем легко начать превращать его в настоящий современный город, каким ему было суждено стать."
 HND_hyderabad_industrialisation: "Проект индустриализации Хайдарабада"
 HND_hyderabad_industrialisation_desc: "Несмотря на рост, наблюдаемый при Федерации, отдаленные районы Хайдарабада, по-видимому, на столетия отстают от остальной Индии, поскольку многие из его бедняков подвергались жестоким формам пограничного рабства при тирании Низама. Теперь, когда его жители освобождены, мы должны обеспечить их возвращение к работе в гораздо более справедливых условиях, чтобы они оба снова встали на ноги и чтобы регион наконец-то вступил в 20-й век.."
 HND_orissa_mining_expansion: "Расширение добычи в Ориссе"
 HND_orissa_mining_expansion_desc: "Индия, как и большая часть Азии, не известна как производитель бокситов, однако алюминий является жизненно важным ресурсом в современную эпоху, особенно когда речь идет о производстве самолетов. Крайне важно, чтобы в таких регионах, как Орисса, где добывается эта драгоценная руда, добыча велась в полном объеме, а в близлежащих поселениях были созданы перерабатывающие предприятия для облегчения добычи."
 HND_mysore_chromite_mining: "Добыча хромита в Майсуре"
 HND_mysore_chromite_mining_desc: "Несмотря на то, что режим бывшего махараджи сильно истощил шахты в Майсуре, они по-прежнему полны хромита в большом количестве, готового к добыче и переработке для нужд республики. Мы должны позаботиться о том, чтобы многие из тех, кто остался без работы из-за войны, занялись добычей полезных ископаемых в регионе, убив одним выстрелом двух зайцев."
 HND_dacca_roadworks: "Стройка дорог в Дакке"
 HND_dacca_roadworks_desc: "Дакка уже давно является городом, стремящимся к росту, но сдерживаемым слабой инфраструктурой по сравнению с тем, что необходимо современному городу для процветания. Мы должны позаботиться о том, чтобы те, кто остался без работы, улучшили дороги в городе, и побудить тех, кто потерял свои дома во время войны, построить новые в этом цветущем мегаполисе."
 HND_formulating_the_retaken_states: "Административный передел взятых провинций"
 HND_formulating_the_retaken_states_desc: "Административная ситуация, которую мы унаследовали на Юге, - это не что иное, как кошмар, с границами, очерченными так, чтобы соответствовать феодальным владениям мелких тиранов, а не служить интересам людей, которые там живут. Нам следует позаботиться о надлежащем изменении этих границ, вероятно, разделив их по лингвистическому признаку, а не сохраняя их прежнюю архаичную структуру."
 HND_local_elections_in_the_south: "Локальные выборы на Юге"
 HND_local_elections_in_the_south_desc: "Южные штаты никогда не знали истинной свободы или демократии, и любое их подобие было не чем иным, как уступками со стороны высших элит, направленными на расширение прав и возможностей тех, кто стоял на ступеньку ниже по служебной лестнице. Мы должны позаботиться о проведении надлежащих выборов в регионе, чтобы люди могли наконец освободиться, даже если на данный момент они могут проголосовать неправильно."
 HND_andhran_farming_collectives: "Сельскохозяйственные коллективы Андхрана"
 HND_andhran_farming_collectives_desc: "В основном аграрном регионе Андхра когда-то большая часть сельскохозяйственных угодий принадлежала землевладельцам и обрабатывалась крестьянами, эксплуатируемыми этими землевладельцами. Теперь, когда эти крестьяне свободны, а земля освобождена от ее владельцев, появилась прекрасная возможность передать ее крестьянам в коллективную собственность, что является гораздо более справедливым и продуктивным подходом, чем старая система."
 HND_land_clearance_in_vizagapatnam: "Расчистка земель в Визагапатаме"
 HND_land_clearance_in_vizagapatnam_desc: "Большая часть полезных и пахотных земель в бывшем пограничном регионе Визагапатам оказалась занята не фермерами и их скромными хозяйствами, а военными лагерями и укреплениями. Теперь, когда юг освобожден, а регион свободен от каких-либо непосредственных конфликтов, мы должны позаботиться о том, чтобы расчистить и ликвидировать эти военные насаждения и вернуть землю фермерам, которым она когда-то принадлежала."
 HND_supporting_keralam_rubber_plantations: "Развивать каучуковые плантации Кералама"
 HND_supporting_keralam_rubber_plantations_desc: "Каучук - один из самых важных ресурсов в нашу современную эпоху, и землевладельцы на юге заботились только о том, чтобы извлечь из него как можно больше пользы, а не о благополучии своих работников. Теперь, когда эти плантации переданы тем, кто на самом деле ими управлял, мы должны позаботиться о том, чтобы они могли быстро возобновить производство и, надеюсь, даже превзойти прежние показатели при гораздо большем желании рабочей силы."
 HND_electrify_the_northeastern_villages: "Электрификация деревень Северо-Востока"
 HND_electrify_the_northeastern_villages_desc: "Многим деревням в Ассаме и южных районах вокруг Манипура еще предстоит обзавестись полноценной сетью электроснабжения. Хотя поддержка этих изолированных районов была ограниченной из-за сложной ситуации, с которой мы столкнулись, когда не контролировали всю Индию, мы должны показать индийцам Ассама, что о них не забыли."
 HND_divide_the_nizams_land: "Раздел земель Низама"
 HND_divide_the_nizams_land_desc: "Когда его земли пали, трусливый Низам не стал сражаться как мужчина и не согласился с тем, что Республика является истинным правительством Индии. Вместо этого он бежал за границу, ища поддержки у всех, кто был готов слушать о его восстановлении, одновременно распространяя ложь о том, как обращались с его бывшим подданным при их освободителях. Поскольку он, очевидно, больше не в состоянии защищать их, мы должны разделить его огромные владения между его бывшими подданными, чтобы теперь они могли владеть землей, которую он когда-то заставлял их обрабатывать ради собственной выгоды."
 HND_repossess_the_lands_of_landlords: "Вернуть народу земли помещиков"
 HND_repossess_the_lands_of_landlords_desc: "Большая часть земель в Пенджабе на протяжении десятилетий находилась в ведении землевладельцев, и многие из них фактически управляли правительством Доминиона, хотя они и пытались утверждать, что выступают от имени народа Индии. У этих тиранов должны быть отобраны их земли и переданы народу, который, как они ложно утверждали, они представляют, а для самых злостных нарушителей предусмотрена ссылка."
 HND_redevelop_the_dharavi: "Начать перепланировку Дхарави"
 HND_redevelop_the_dharavi_desc: "Федерация не только мало что сделала для решения проблемы огромных трущоб, которые постепенно формировались в Бомбее, но и фактически усугубила ситуацию своим бездействием. Нельзя допустить, чтобы наш народ жил в таких убогих условиях, и поэтому необходимо направить рабочих для оказания помощи в восстановлении и реконструкции региона, обеспечении надлежащего жилья и уровня жизни наших соотечественников, вынужденных там жить."

### Characters ###

 HND_subhas_chandra_bose: "Субхас Чандра Бос"
 HND_subhas_chandra_bose_leader_desc: "§YРодился:§! §L23 января 1897 года, Каттак, Бенгальское президентство, Британская Индия§!\n§YБиография:§! §LБудучи мальчиком, Субхас Чандра Бос однажды напал на британского школьного учителя за то, что тот опорочил его любимую Индию; после этого его изгнание вызвало у Боса почти бешеную жажду мести. Будучи протеже революционного лидера Читтаранджана Даса, Бос пережил резкий взлет в новообразованной Народной Республике после его кончины. Энергичный характер Боса привлек большие массы индийского населения к социалистическому делу зажигательными речами против Доминиона и Федерации, а также против бездействия в борьбе с ними. После его успешного избрания на пост председателя Бхаратийская Народная Республика в целом начала придерживаться аналогичных милитаристских взглядов, готовая полностью освободить не только свой народ, но и народы всей Азии.§!"
 HND_subhas_chandra_bose_commander_desc: "§YРодился:§! §L23 января 1897 года, Каттак, Бенгальское президентство, Британская Индия§!"

 HND_abul_kasem_fazlul_huq: "Абул Касем Фазлул Хак"
 HND_abul_kasem_fazlul_huq_leader_desc: "§YРодился:§! §L26 октябоя 1873, Сатурья, Бенгальское президентство, Британская Индия§!\n§YБиография:§! §LФазлул Хак, бывший секретарь Бенгальской мусульманской лиги, а ныне признанный синдикалист, возглавляет Народную республику Бхаратия с 1933 года, сменив на этом посту бывшего председателя Ладжпата Рая после его отставки. В своей предвыборной кампании он выступал за индустриализацию, ориентированную на профсоюзы, и постепенное проведение социалистических реформ. Однако, несмотря на свой успех на выборах, Хак по-прежнему сталкивается с жесткой оппозицией со стороны оппозиционных фракций Индийского национального конгресса. Как бы то ни было, видение Хака о процветании исторически бедной восточной Индии, а в один прекрасный день, возможно, и всего субконтинента, кажется, по крайней мере, его сторонникам, все более достижимым.§!"

 HND_jawaharlal_nehru: "Джавахарлал Неру"
 HND_jawaharlal_nehru_leader_desc: "§YРодился:§! §L14 ноября, 1889, Аллахабад, Северо-Западные провинции, Британская Индия§!\n§YБиография:§! §LДжавахарлал Неру - бесспорно самый тактический политик Коммуны. После падения Раджа, Неру, не покладая рук, работал над тем, чтобы объединить и примирить вс враждующие индусские фракции. И хотя завистники называют его трусом, аккуратные политические манёвры вознесли Неру на вершину политической сцены Коммуны. Может быть, под началом Неру, вражда между фракциями Конгресса утихнет.§!"
 HND_jawaharlal_nehru_sic_desc: "§YРодился:§! §L14 ноября, 1889, Аллахабад, Северо-Западные провинции, Британская Индия§!"

