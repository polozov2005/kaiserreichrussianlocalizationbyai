 GBP_harold_macmillan_leader_desc: "§YBorn:§! §LFebruary 10th, 1894, in Chelsea, London, England§!"
 GBR_anti_partisan_league_leader: "Коллективное лидерство"

 GBR_anthony_ludovici: "Энтони Людовичи"
 GBR_anthony_ludovici_leader_desc: "Полиглот и ультраправый писатель Антони Людовичи имел бурный период жизни в Союзе, часто был вынужден бежать за контрреволюционную деятельность и свои заметные реакционные подпольные работы. Во время своего изгнания и подпольной политической деятельности Людовичи общался с такими же ультраправыми деятелями и бывшими консерваторами, готовыми сотрудничать с иностранными захватчиками, чтобы добиться краха Союза. Сейчас, находясь у власти, Людовичи и его сторонники, несомненно, будут проводить безжалостную кампанию по 'очищению' Великобритании от ее павших социалистических хозяев и подавлению инакомыслия любыми средствами."

 GBR_charles_iii: "Карл III"
 GBR_charles_iii_leader_desc: "Так называемый 'принц-предатель', перешедший на сторону Германии во время Вельткрига, Карл Эдуард Саксен-Кобургский и Готский в конечном итоге выбрал правильную сторону, но был опустошен, увидев, что его родная страна пала перед синдикализмом, что еще больше толкнуло его в объятия реакционных немецких сил. Лояльности Германии было достаточно, чтобы он стал королем собственной Великобритании; в искаженном варианте Карл был полуабсолютным монархом в прусском стиле, властвующим над кабалой прогерманских деятелей в Тайном совете. Для Карла его правление, несомненно, будет ненавистно, и его будут помнить как короля-предателя и пособника врага Британии."

