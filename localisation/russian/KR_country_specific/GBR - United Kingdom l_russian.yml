 united_kingdom_events.69.d.can: "Несколько месяцев британский парламент обсуждает принятие билля о доминионах, одним из которых является [CAN.GetNameDef] — де-факто получивший независимость со времён распада Соединённого Королевства в 1926 г. [GBR.GetNameDef] было восстановлено и текущий правовой статус доминионов теперь закреплён в декларации: бывшие доминионы признаются "юридически независимыми, свободными в поиске своего пути в мире, в составе Содружества или вне его, как равные партнёры государства [GBR.GetNameDef]". Некоторые считают декларацию признанием сложившегося более десятилетия положения дел, которая лишь окончательно закрепит статус правительств доминионов."
