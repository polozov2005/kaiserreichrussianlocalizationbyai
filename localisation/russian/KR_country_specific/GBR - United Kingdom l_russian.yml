 united_kingdom_events.69.d.saf: "Несколько месяцев британский парламент обсуждает принятие билля о доминионах, одним из которых является [SAF.GetNameDef] — де-факто получивший независимость со времён распада Соединённого Королевства в 1926 г. [GBR.GetNameDef] было восстановлено и текущий правовой статус доминионов теперь закреплён в декларации: бывшие доминионы признаются "юридически независимыми, свободными в поиске своего пути в мире, в составе Содружества или вне его, как равные партнёры государства [GBR.GetNameDef]". Некоторые считают декларацию признанием сложившегося более десятилетия положения дел, которая лишь окончательно закрепит статус правительств доминионов."
 united_kingdom_events.69.a: "Ура, ура!"
 united_kingdom_events.69.b: "Видимо, мы остались сами по себе."
 united_kingdom_events.69.c: "Интересно."

 united_kingdom_events.99.t: "Наши претензии на Северную Ирландию"
 united_kingdom_events.99.d.promise: "В 1921 году, после ирландской войны за независимость, Соединённое Королевство подписало с Ирландией мирный договор. Согласно этому договору, мы отказались от наших претензий на Северную Ирландию... но мы заключали его с другим правительством, когда Ирландия находилась в составе Британской империи и Содружества. Однако, во время восстания в 1925 году, Ирландия вышла из британской сферы влияния и провозгласила республику. С нашим возвращением, мы могли бы вновь объявить свои претензии... хотя мы обещали этого не делать. Сохраним ли мы обещание, даже если нам придётся отказаться от прежнего названия и претензий?"
 united_kingdom_events.99.d: "В 1921 году, после ирландской войны за независимость, Соединённое Королевство подписало с Ирландией мирный договор. Согласно этому договору, мы отказались от наших претензий на Северную Ирландию... но мы заключали его с другим правительством, когда Ирландия находилась в составе Британской империи и Содружества. Однако, во время восстания в 1925 году, Ирландия вышла из британской сферы влияния и провозгласила республику. Перед нами стоит вопрос: заявить ли нам вновь о своих претензиях на Северную Ирландию и помочь живущим там протестантам, или отказаться от прежнего названия и претензий?"
 united_kingdom_events.99.a: "Мы несём ответственность перед Ольстером."
 united_kingdom_events.99.b: "Нам следует уважать мирный договор."
 united_kingdom_events.99.c: "Мы сдержим своё обещание."

 united_kingdom_events.100.t: "Британцы вернулись"
 united_kingdom_events.100.d: "В 1921 году Соединённое Королевство подписало мирный договор, в котором оно отказалось от претензий на Северную Ирландию... однако это было соглашением между Британией и свободной Ирландией - страной, которая когда-то входила в состав Британской империи и Содружества. В 1925 году, когда была провозглашена синдикалистская республика, мы отказались от исполнения договора, но сейчас Соединённое Королевство вернулось в мировую политику. Его представители утверждают, что Королевство несёт ответственность перед юнионистами Ольстера, который принадлежит им по праву, и вновь заявило о своих претензиях на северные территории. Судя по всему, мирно решенить ситуацию получится только если мы отдадим британцам наш север."
 united_kingdom_events.100.a: "Определённо нет!"
 united_kingdom_events.100.b: "Если это сохранит мир, да будет так."

 united_kingdom_events.101.t: "Возвращение Северной Ирландии"
 united_kingdom_events.101.d: "Пускай и с заметной неохотой, ирландцы решили что между нашими странами лучше сохранить мирные отношения и согласились вернуть нам Северную Ирландию."
 united_kingdom_events.101.a: "Неожиданно."

 united_kingdom_events.102.t: "Ирландия покинула [Root.GetFactionName]"
 united_kingdom_events.102.d: "В своём споре с Великобританией по поводу правового статуса Северной Ирландии, [IRE.GetNameDef] в гневе покинула [Root.GetFactionName]. Ирландцы полагают, что в альянсе, который будет претендовать на территории своих участников, нет защиты."
 united_kingdom_events.102.a: "Нехорошая ситуация..."

 united_kingdom_events.103.t: "[IRE.GetNameDefCap] отказывается"
 united_kingdom_events.103.d.faction: "Ирландцы отказались отдавать Северную Ирландию, что было ожидаемо. Наш следующий шаг следует сделать с умом и стоит иметь в виду, что [IRE.GetNameDef] имеет союзников. Ирландия является частью [IRE.GetFactionName], и любые прямые агрессивные действия в её сторону могут спровоцировать масштабный конфликт. Возможно, нам следует поговорить с [irish_leader.GetNameDef] и рассмотреть варианты урегулирования ситуации без дальнейшего конфликта?"
 united_kingdom_events.103.d.factionamerica: "Хотя это вряд ли можно назвать сюрпризом, ирландцы отказались сдать нам Северную Ирландию. Однако наш следующий шаг не так легко определить, поскольку [IRE.GetNameDef] не изолирован. Он является членом [IRE.GetFactionName], и любые прямые действия против него приведут к началу более масштабной войны. Однако, поскольку американцы на нашей стороне, возможно, стоит поговорить с [irish_leader.GetNameDef] и узнать, не захочет ли [irish_leader.GetAdjective]ое правительство оказать давление на ирландцев, чтобы предотвратить дальнейший конфликт?"
 united_kingdom_events.103.d.nofaction: "Ирландцы отказались отдавать Северную Ирландию, что было ожидаемо. Учитывая что у ирландцев нет союзников, нам не придётся долго думать над следующим шагом в этом вопросе."
 united_kingdom_events.103.a: "Обсудить вопрос с [irish_leader.GetAdjective] и его правительством."
 united_kingdom_events.103.b: "Мы отказываемся от претензий."
 united_kingdom_events.103.c: "Пришло время взять ситуацию в свои руки."

 united_kingdom_events.104.t: "Соединённое Королевство отказывается от Северной Ирландии"
 united_kingdom_events.104.d: "Во время ирландской войны за независимость, в 1921 году британское и ирландское правительства заключили мирный договор, согласно которому британцы отказываются от своих претензий на Северную Ирландию. Однако это соглашение было подписано с прошлым ирландским правительством, когда Ирландия была частью Британской империи и Содружества... до провозглашения ирландцами суверенной национальной республики в 1925 году. С возвращением королевской семьи на родные острова и восстановлением Соединённого Королевства, вновь встал вопрос о статусе Северной Ирландии - вопрос, на который наконец был дан чёткий отрицательный ответ. Это означает не только мир с ирландцами, но и смену названия государства и флага. Соединённое Королевство вновь станет Королевством Великобритании."
 united_kingdom_events.104.a: "Всё ради мира."
 united_kingdom_events.104.b: "Эти сумасшедшие ушли от нас!"
 united_kingdom_events.104.c: "Интересно."

 united_kingdom_events.105.t: "Обращение британцев"
 united_kingdom_events.105.d: "Соединённое Королевство восстановилось и снова хочет влиять на Европу. Объявление британцами претензий на Северную Ирландию было неизбежно... ведь их государство , в конце концов, называется Королевством Великобритании и Северной Ирландии. Поэтому вопрос положения Северной Ирландии в мире они просто не могут не игнорировать. Наши ирландские союзники, разумеется, не хотят отдавать часть своей земли британцам, и поэтому последние обратились к нам с целью сохранения мирных отношений. Что нам делать - надавить на Ирландию, чтобы она уступила свою северную провинцию, или поддержать её в этом вопросе, рискуя развязать войну с британцами?"
 united_kingdom_events.105.a: "Мы безоговорочно поддержим Ирландию."
 united_kingdom_events.105.b: "Надавить на ирландцев."

 united_kingdom_events.106.t: "[From.GetNameDef] давит на нас"
 united_kingdom_events.106.d: "К нашему удивлению, британцы обратились к нашим [From.GetAdjective]им союзникам и попросили их вмешаться в североирландский вопрос... что они и сделали! [From.GetAdjective]ое правительство утверждает, что возникший вопрос весьма деликатен, и наш отказ подтолкнёт два альянса на войну, в которой они не хотят участвовать."
 united_kingdom_events.106.a: "Выметайтесь вместе с британцами!"
 united_kingdom_events.106.b: "Видимо, у нас нет выбора."

 united_kingdom_events.107.t: "Мы просчитались?"
 united_kingdom_events.107.d: "Ирландцы, очевидно, теряют присущую им рациональность, когда дело доходит до статуса Ольстера. Они предпочли покинуть [Root.GetFactionName] и не отдавать Ольстер... очень сильно обозлившись на нас."
 united_kingdom_events.107.a: "Так и быть"

 united_kingdom_events.108.t: "Ирландцы зажрались"
 united_kingdom_events.108.d: "Судя по всему, обращение к [irish_leader.GetNameDef] ни к чему не привело. Не смотря на то, что [irish_leader.GetAdjective]ое правительство надавило на [IRE.GetNameDef], как мы этого и просили, ирландцы воспротивились и в гневе покинули своих союзников, наотрез отказавшись отдавать Ольстер. Видимо, в этом вопросе мы вернулись на исходную позицию."
 united_kingdom_events.108.a: "We should give up this pursuit of Northern Ireland."
 united_kingdom_events.108.b: "Хватит нам гоняться за Северной Ирландией."

 united_kingdom_events.109.t: "[From.GetNameDefCap] поддерживает Ирландию"
 united_kingdom_events.109.d: "[From.GetAdjective]ое правительство дало чёткий ответ: оно не только не будет оказывать давление на ирландцев по нашей просьбе, но и объявило о готовности взяться за оружие для защиты ирландского суверенитета."
 united_kingdom_events.109.a: "We should give up this pursuit of Northern Ireland."
 united_kingdom_events.109.b: "Хватит нам гоняться за Северной Ирландией."

 united_kingdom_events.112.t: "Гибралтарская скала"
 united_kingdom_events.112.d.spanish: "Согласно Утрехтскому договору 1713 года, Гибралтар является нашей территорией - уступкой, с которой Испания никогда не хотела мириться. Не смотря на это, Гибралтар населён преимущественно британцами и ни один из них не считает себя испанцем. Конечно же, [gibraltar_owner.GetNameDef] не придаёт этому значения, и скорее предпочтёт объявить нам войну, чем признать Гибралтар нашей территорией. Речь даже не идёт о ключевом стратегическом положении Гибралтара в качестве входа в Средиземноморье. Для них это вопрос чести."
 united_kingdom_events.112.d: "Согласно Утрехтскому договору 1713 года, Гибралтар является нашей территорией, которую даже сегодня населяет около 20,000 британцев. Даже если она не играет важной роли в охране входа в Средиземное море, мы все еще несём ответственность перед нашими подданными, проживающими там. Однако, стратегическая позиция Гибралтара означает, что [gibraltar_owner.GetNameDef] просто так его не отдаст. Выдвижение наших претензий скорее всего будет означать столкновение с [gibraltar_owner.GetAdjective]ими интересами."
 united_kingdom_events.112.a: "Гибралтар по праву принадлежит нам."
 united_kingdom_events.112.b: "Бесполезно претендовать на него."

 united_kingdom_events.113.t: "Фолклендские острова"
 united_kingdom_events.113.d.arg: "Фолклендские острова — незначительная колония в Южной Атлантике, в которой проживает британская диаспора из нескольких тысяч человек. [falklands_owner.GetNameDef]. правительство считает острова своей неотъемлемой территорией, которую явно не хочет отдавать просто так... однако фолклендцы считают себя гражданами Британии и никогда не хотели присоединяться к [falklands_owner.GetNameDef]. Перед нами стоит следующий вопрос: поддержим ли мы местных и хотим ли вернуть себе острова, даже если велика вероятность открытого конфликта с [falklands_owner.GetAdjective]им правительством?"
 united_kingdom_events.113.d.ally: "Фолклендские острова — незначительная колония в Южной Атлантике, в которой проживает британская диаспора из нескольких тысяч человек. Фолкленды не имеют стратегической важности, однако британцы считают тамошних жителей гражданами Британии, и в связи с этим они попросили нас поддержать их претензии на острова. На данный момент, [falklands_owner.GetNameDef]. правительство контролирует Фолкленды, поэтому вопрос их возвращения в состав британской сферы влияния, возможно, не доставит нам больших проблем."
 united_kingdom_events.113.d: "Фолклендские острова — незначительная колония в Южной Атлантике, в которой проживает британская диаспора из нескольких тысяч человек. У островов нет какой-либо стратегической значимости, но местные британцы считают себя гражданами Великобритании и просят нас пересмотреть наши претензии на острова... и [falklands_owner.GetNameDef]. правительству это точно не понравится. Перед нами стоит следующий вопрос: поддержим ли мы местных и хотим ли мы вернуть себе острова, даже если велика вероятность открытого конфликта с [falklands_owner.GetAdjective]им правительством?"
 united_kingdom_events.113.a: "Фолкленды по праву принадлежат нам."
 united_kingdom_events.113.b: "Бесполезно претендовать на них."

 united_kingdom_events.115.t: "[From.GetAdjective]ое правительство требует"
 united_kingdom_events.115.t.ally: "[From.GetAdjective]ое правительство просит"
 united_kingdom_events.115.d: "[From.GetAdjective]ое правительство обратилось к нам с требованием: немедленно вернуть им провинцию [demand_state.GetName], которую они считают [From.GetAdjective]ой территорией."
 united_kingdom_events.115.d.ally: "Наши союзники в [From.GetAdjective]ом правительстве обратились к нам с просьбой: перевести администрацию провинции [demand_state.GetName] под их контроль, поскольку они считают провинцию территорией, которая по закону принадлежит [From.GetAdjective]ому правительству."
 united_kingdom_events.115.a: "Очень хорошо."
 united_kingdom_events.115.b: "Мы не согласны."

 united_kingdom_events.116.t: "Провинция [demand_state.GetName] была возвращена"
 united_kingdom_events.116.d: "[From.GetAdjective]ое правительство приняло взвешенное решение и посчитало, что лучше вернуть провинцию [demand_state.GetName] в наши руки."
 united_kingdom_events.116.d.ally: "Наши союзники в [From.GetAdjective]ом правительстве с радостью вернули нам провинцию [demand_state.GetName]."
 united_kingdom_events.116.a: "Отлично."

 united_kingdom_events.117.t: "[From.GetNameDefCap] отказывается"
 united_kingdom_events.117.d: "Ответ [From.GetAdjective]ого правительства не заставил себя долго ждать: они не согласны с [Root.GetAdjective]ими претензиями на [demand_state.GetName] и не намерены возвращать провинцию в руки [Root.GetNameDef]."
 united_kingdom_events.117.a: "Мы не удивлены."
 united_kingdom_events.117.b: "У нас нет выбора."

 united_kingdom_events.118.t: "[From.GetAdjective]ое правительство просит"
 united_kingdom_events.118.d: "С нами связались наши союзники из [From.GetAdjective]ого правительства. Они утверждают, что [From.GetNameDef] встало на ноги и поэтому они хотели бы вернуть себе контроль над [colony_country.GetNameDef], которую они считают [From.GetAdjective]ой колонией. Их просьба была весьма вежливой, её ни в коем случае не стоит расценивать как требование, однако это потому, что они не видят причин, по которым мы можем им отказать."
 united_kingdom_events.118.a: "Они правы."
 united_kingdom_events.118.b: "Они ошибаются, [colony_country.GetNameDef] — наша земля."

 united_kingdom_events.119.t: "[From.GetNameDefCap] соглашается"
 united_kingdom_events.119.d: "[From.GetAdjective]ое правительство приняло нашу просьбу и перевела [colony_country.GetNameDef] под наш контроль."
 united_kingdom_events.119.a: "Отлично."

 united_kingdom_events.120.t: "[From.GetNameDefCap] отказывается"
 united_kingdom_events.120.d: "[From.GetAdjective]ое правительство отвергло нашу просьбу. Они утверждают, что территория [colony_country.GetNameDef] досталась им с большим трудом, и пока они не решат иначе, эти земли следует считать [From.GetAdjective]ой колонией."
 united_kingdom_events.120.a: "Какое разочарование."

 united_kingdom_events.121.t.ally: "[From.GetAdjective]ое правительство просит"
 united_kingdom_events.121.t: "[From.GetAdjective]ое правительство требует"
 united_kingdom_events.121.d.ally: "С нами связались наши союзники из [From.GetAdjective]ого правительства. Они утверждают, что [From.GetNameDef] встало на ноги и поэтому они хотели бы вернуть себе контроль над всеми колониальными владениями, находящимися под контролем [Root.GetAdjective]ого правительства. Их просьба была весьма вежливой, её ни в коем случае не стоит расценивать как требование, однако это потому, что они не видят причин, по которым мы можем им отказать."
 united_kingdom_events.121.d: "С нами связались представители [From.GetAdjective]ого правительства. Они утверждают, что [From.GetNameDef] встало на ноги и поэтому они хотели бы вернуть себе контроль над всеми колониальными владениями, находящимися под контролем [Root.GetAdjective]ого правительства. В их просьбе не было должной вежливости и, судя по всему, если мы откажем и пригрозим им применением силы, то они откажутся от своих требований."
 united_kingdom_events.121.a: "Вернуть им землю."
 united_kingdom_events.121.b: "Нет, мы оставим всё себе."
 united_kingdom_events.121.c: "Мы должны немедленно сообщить нашим владыкам..."

 united_kingdom_events.122.t: "[From.GetNameDefCap] соглашается"
 united_kingdom_events.122.d: "[From.GetAdjective]ое правительство приняло нашу просьбу и перевела колонии под наш контроль."
 united_kingdom_events.122.a: "Отлично."

 united_kingdom_events.123.t: "[From.GetNameDefCap] отказывается"
 united_kingdom_events.123.d: "[From.GetAdjective]ое правительство отвергло нашу просьбу. Оно утверждает, что требуемые нами территории достались им с большим трудом, и пока не будет решено иначе, эти земли следует считать [From.GetAdjective]ой колонией."
 united_kingdom_events.123.a: "Какое разочарование."
 united_kingdom_events.123.b: "Они не оставляют нам выбора."

 united_kingdom_events.124.t: "Судьба [WIF.GetNameDef]"
 united_kingdom_events.124.d: "[WIF.GetNameDefCap] является своеобразным государственным образованием - де-юре независимым скоплением довоенных колоний, чьи административные ресурсы были объединены, чтобы оградить их от хаоса, который охватил их британских и французских покровителей. [WIF.GetNameDefCap] не имеет никаких причин существовать, однако каким-то образом она продолжает это делать. Многие говорят о том, что федерация исчерпала себя и пришла пора вновь разделить колонии. Другие же утверждают, что [CAF.GetNameDef] заслужила своё право на существование... по крайней мере за то, что помогла нам в борьбе за нашу свободу."
 united_kingdom_events.124.a: "Пришло время распустить федерацию."
 united_kingdom_events.124.b: "Оставить под нашим контролем в текущем виде."
 united_kingdom_events.124.c: "Вся федерация будет наша."
 united_kingdom_events.124.e: "Она может остаться независимой."
 united_kingdom_events.124.f: "Мы дадим ей независимость."

 united_kingdom_events.125.t: "Возвращение Французских Карибов"
 united_kingdom_events.125.d: "До войны, [WIF.GetNameDefCap] была создана как временная мера по обеспечению безопасности бывших французских и британских колоний. Теперь, когда [From.GetNameDef] вернулась в мировую политику, федерация была поглощена и французские колонии были возвращены под наш контроль."
 united_kingdom_events.125.a: "Мы одобряем."

 united_kingdom_events.126.t: "Мы остаёмся [From.GetAdjective]им субъектом"
 united_kingdom_events.126.d: "[From.GetAdjective]ое правительство обсудило наш статус в качестве федерации колоний - несомненно, в их глазах мы никогда не должны были существовать как единая страна. Наше государство считалось временным, пока Британию и Францию не охватил хаос. Теперь, когда они восстановились, они приняли решение не разделять нашу федерацию. По их словам, федерации удалось пережить войну, а значит у неё, наверное, есть право на будущее."
 united_kingdom_events.126.a: "Приятно слышать."

 united_kingdom_events.127.t: "[From.GetAdjective]ое правительство требует"
 united_kingdom_events.127.d: "[From.GetAdjective]ое правительство обсудило наш статус в качестве федерации колоний - несомненно, в их глазах мы никогда не должны были существовать как единая страна. Наше государство считалось временным, пока Британию и Францию не охватил хаос. Теперь, когда они восстановились, они приняли решение не разделять нашу федерацию... но только при условии, если мы вернёмся под [From.GetAdjective]ий контроль. По их мнению, мы ещё не заслужили независимость."
 united_kingdom_events.127.a: "Если так надо..."
 united_kingdom_events.127.b: "Нет! Мы обрели свободу не просто так!"

 united_kingdom_events.128.t: "Мы останемся независимыми"
 united_kingdom_events.128.d: "[From.GetAdjective]ое правительство обсудило наш статус в качестве федерации колоний - несомненно, в их глазах мы никогда не должны были существовать как единая страна. Наше государство считалось временным, пока Британию и Францию не охватил хаос. Теперь, когда они восстановились, они приняли решение не разделять нашу федерацию и более того, дать нам независимость. Они наградили нас суверенитетом за всё то, что мы сделали во время войны! Также они надеятся на то, что мы не будем дипломатически отдаляться от них и продолжим быть в составе Содружества."
 united_kingdom_events.128.a: "Приятно слышать!"

 united_kingdom_events.129.t: "Мы получили независимость"
 united_kingdom_events.129.d: "[From.GetAdjective]ое правительство обсудило наш статус в качестве федерации колоний - несомненно, в их глазах мы никогда не должны были существовать как единая страна. Наше государство считалось временным, пока Британию и Францию не охватил хаос. Теперь, когда они восстановились, они приняли решение не разделять нашу федерацию и более того, дать нам независимость. Они наградили нас суверенитетом за всё то, что мы сделали во время войны! Также они надеятся на то, что мы не будем дипломатически отдаляться от них и продолжим быть в составе Содружества."
 united_kingdom_events.129.a: "Чудесно!"

 united_kingdom_events.130.t: "Восстановление Британской Империи"
 united_kingdom_events.130.d.promise: "[Root.GetNameDef] было восстановлено, осталось решить вопрос, который давно уже у всех на устах: будем ли мы восстанавливать Британскую Империю? По всему миру раскиданы наши бывшие колонии, которые объявили независимость, либо перешли под контроль других государств... включая Германию, которой мы пообещали покинуть наши бывшие колониальные владения. Если мы не нарушим это обещание, то нам придётся забыть о крупной части наших вкладов в Африке и Юго-Восточной Азии. Стоит также отметить, что сама идея восстановления нашей колониальной империи не очень популярна на родине. Большинство наших подданных считает, что время империи прошло и нам следует сосредоточиться на благополучии страны."
 united_kingdom_events.130.d.nopromise: "[Root.GetNameDef] было восстановлено, осталось решить вопрос, который давно уже у всех на устах: будем ли мы восстанавливать Британскую Империю? По всему миру раскиданы наши бывшие колонии, которые объявили независимость, либо перешли под контроль других государств. Возвращение всех наших бывших территориальных владений определённо не обойдётся без войны, чего Антанта явно не хочет. Также стоит отметить, что сама идея восстановления колониальной империи не очень популярна на родине. Большинство наших подданных считает, что время империи прошло и нам следует сосредоточиться на благополучии страны."
 united_kingdom_events.130.a: "Хватит империализма, начать деколонизацию."
 united_kingdom_events.130.b: "Мы восстановим империю, но без немецких земель."
 united_kingdom_events.130.c: "Мы ПОЛНОСТЬЮ восстановим Британскую Империю."
 united_kingdom_events.130.e: "Мы восстановим Британскую Империю."

 united_kingdom_events.131.t: "Статус Мальты"
 united_kingdom_events.131.d: "[From.GetNameDef] смогло восстановиться и теперь требует от нас возвращения Мальты - поскольку остров юридически никогда не был под [Root.GetAdjective]ой юрисдикцией, а открыто заявляют о своём желании вернуться под британский контроль."
 united_kingdom_events.131.a: "Конечно!"
 united_kingdom_events.131.b: "Нет, думаю мы пока не готовы."

 united_kingdom_events.132.t: "Требования британцев"
 united_kingdom_events.132.d: "Посол из [From.GetNameDef] вышел на связь с [Root.GetAdjective]им правительством, требуя немедленно сдаться и вернуться в состав британских владений."
 united_kingdom_events.132.d.puppet: "Посол из [From.GetNameDef] связался с нами, требуя от нашего марионеточного правительства [return_country.GetAdjective]ого государства немедленно перейти под их контроль. Они считают [return_country.GetNameDef] неотъемлемой частью [From.GetNameDef] и если мы не примем их требования, то это вероятно приведёт к эскалации конфликта с ними."
 united_kingdom_events.132.a: "Ну, раз так..."
 united_kingdom_events.132.b: "Нет!"

 united_kingdom_events.133.t: "Они согласились"
 united_kingdom_events.133.d: "[From.GetAdjective]ое правительство согласилось с нашими требованиями. [return_country.GetNameDefCap] вновь принадлежит нам."
 united_kingdom_events.133.a: "Отлично!"

 united_kingdom_events.134.t: "Они отказались"
 united_kingdom_events.134.d: "[From.GetAdjective]ое правительство отказалось, мотивируя это своим несогласием с нашими претензиями на [return_country.GetNameDef]."
 united_kingdom_events.134.a: "К чёрту их!"
 united_kingdom_events.134.b: "Они не оставили нам выбора!"

 united_kingdom_events.135.t: "Требования британцев"
 united_kingdom_events.135.d: "С нами связалось британское правительство. Оно требует немедленного возвращения оккупированных нами территорий, считая их своей неотъемлемой частью."
 united_kingdom_events.135.a: "Думаю, следует подчиниться..."
 united_kingdom_events.135.b: "Нет."

 united_kingdom_events.136.t: "Они согласились"
 united_kingdom_events.136.d: "[From.GetAdjective]ое правительство  согласилось с нашими требованиями. Британские острова снова принадлежат нам."
 united_kingdom_events.136.a: "Отлично!"

 united_kingdom_events.137.t: "Они отказались"
 united_kingdom_events.137.d: "[From.GetAdjective]ое правительство отказалось, утверждая, что у него есть право пользоваться британскими землями и не подчинятся нашим требованиям."
 united_kingdom_events.137.a: "К чёрту их!"
 united_kingdom_events.137.b: "Они не оставили нам выбора!"

 united_kingdom_events.140.t: "[GBR.GetAdjective]ое требование"
 united_kingdom_events.140.d: "С [From.GetNameDefCap] связалось [GBR.GetAdjective]ое правительство, которое заявило, что - теперь, когда [GBR.GetNameDef] снова встала на ноги, - они хотят вернуть себе право на владение любыми колониальными землями, которые в настоящее время находятся под [From.GetAdjective]им контролем. Их просьба не является вежливой, и они, похоже, готовы подкрепить свое требование силой, если мы будем настаивать на этом."
 united_kingdom_events.140.a: "Скажите [From.GetNameDef], чтобы согласился."
 united_kingdom_events.140.b: "Скажите [From.GetNameDef], чтобы отказался."

 united_kingdom_events.141.t: "Мы должны отказаться"
 united_kingdom_events.141.d: "[From.GetAdjective]ое правительство посмеялось над [GBR.GetAdjective]им требованием и велело нам немедленно отказаться. У нас нет выбора."
 united_kingdom_events.141.a: "Посмотрим, как все пройдет..."

 united_kingdom_events.142.t: "Мы должны согласиться"
 united_kingdom_events.142.d: "[From.GetAdjective]ое правительство видит значимость [GBR.GetAdjective]ого требования и сказало нам немедленно с ним согласиться. У нас нет выбора."
 united_kingdom_events.142.a: "Ну ладно!"

 united_kingdom_events.143.t: "Северная Ирландия хочет присоединиться к Антанте"
 united_kingdom_events.143.d: "Шесть графств Ольстера, составляющие Северную Ирландию, отделились от Ирландии, и восстановили лоялистское правление. Сейчас они просят нас присоединиться к Антанте."
 united_kingdom_events.143.a: "Как будто мы скажем нет!"

 united_kingdom_events.144.t: "Реставрация Соединённого Королевства"
 united_kingdom_events.144.d: "После недавних событий, правительство Британского Союза пало и роялисты под эгидой дома Виндзоров возвращаются на острова. Эдуард VIII был ещё раз коронован в Вестминстерском аббатстве; его мечта всей жизни исполнилась - он отомстил за изгнание отца и революцию, лишившую его трона.\nХодят слухи, что король лично дал добро на искоренение любых следов левого правительства. И хотя новый порядок пришёл на эту землю, менталитет людей не сможет измениться в одночасье, многие всё ещё верят в идеалы синдикализма. Многие, затаив дыхание, следят за тем, как Соединённое Королевство поведёт себя на мировой арене."
 united_kingdom_events.144.a: "Новый порядок, или возвращение старого?"

### Characters ###
 GBR_george_frederick_windsor: "Георг V"
 GBR_george_frederick_windsor_king_exiled_leader_desc: "§YBorn:§! §LJune 3rd, 1865, in Marlborough House, Westminster, Middlesex, England§!\n§YBackground:§! §LBorn the second son to the future Edward VII, there was little expectation that George Windsor would become King and as such he was destined for a career in the navy. But following the death of his older brother to influenza in 1892, he was made Duke of York and second in line to the throne, ending his naval career. Having grown close during the shared period of mourning for his brother, George would marry Princess Mary of Teck, his brother's fiancé and so would begin a loving, if little publicly expressed relationship. But his world would once again be thrown into turmoil when in 1910 his father would die, and George was forced to ascend to the throne as King George V. George had taken power at a politically turbulent time with the rising temper of the Irish Home Rule movement and the Liberals' growing conflict with the lords. While the constitutional crisis would ultimately see the reform of the Lords and a civil war temporarily averted in Ireland, the world would be cast into the fires of war as the Great War broke out with a despondent George at the helm. Despite his attempts to appease British nationalism by abandoning his German titles and adopting the name Windsor, Britain's loss in the Weltkrieg caused the already growing republican movement to experience a steady uptick in support. After years of poor governance and politicking, the British Revolution would break out and amid his dithering refusal to intervene in the political crisis, the King would be forced to flee Britain into exile and watch his home, along with his Empire, tumble into the abyss.\n\nThe King-Emperor, as he styles himself still, has reigned over the British Empire, what's left of it, since his flight into exile. The loss of the Weltkrieg to his own cousin, the loss of his youngest son, John, and the final devastating loss of Britain itself have combined to break much of George V's spirit despite his unending resolve to maintain his stature. With his health having worsened since the flight to Canada, which George privately refers to as \"a frozen prison\", he has gradually lost any interest in participating in domestic affairs, delegating such ceremonial duties as he may to his son, Prince Edward. He now lives on to spend what little time remains with his family and perhaps one day, the return to Britain, but this prospect grows dimmer by the day...§!"
 GBR_george_frederick_windsor_king_GBR_leader_desc: "§YBorn:§! §LJune 3rd, 1865, in Marlborough House, Westminster, Middlesex, England§!\n§YBackground:§! §LThe King-Emperor, as he styles himself still, has reigned over the British Empire, ever since Britain's triumphant victory in the Great War. With his own cousin, the Kaiser, defeated and the once mighty German Empire humbled it would appear that Britain and her King may rest on their laurels. But there are those would whisper that a great tumult is on the horizon, with Stanley Baldwin's government still struggling to handle the Depression and the resurgent German Reich speaking of conquests that would run roughshod over Europe. With his heir to be the maligned Prince Edward, it remains to be seen if the King, a gallant defender of British hegemony, will succumb to his age or continue to rule the Empire on which the Sun shall never set.§!"

 GBR_edward_windsor: "Эдуард, принц Уэльский"
 GBR_edward_windsor_regnal: "Эдуард VIII"
 GBR_edward_windsor_desc_body: "The first son of King George V, Edward VIII was born in the outskirts of London, named such after this late uncle. With a traditional childhood and tutoring, the young Prince was initially destined for a military schooling in the navy, first at Osborne and then Dartmouth. While a course of two years and entry into the navy was planned, this was cut short following his father's ascension to the throne. Preparations to prepare Edward for future leadership were started in earnest, being sent to Magdalen College at Oxford, despite allegations of being underprepared intellectually, ultimately leaving Oxford after eight terms, without any academic qualifications. By the time of the Great War, Edward was of legal age to join and enthusiastically signed into the Grenadier Guards but was refused deployment to the frontlines in case the heir apparent be captured or killed. Nevertheless, he would travel to the frontlines as often as he could and undertook military flights from 1918 onwards, making him deeply popular among veterans for his eagerness to fight alongside them. But Edward would return to a country that was disillusioned by its defeat and suffering from economic depression, a fact Edward note on during his many tours of poverty-stricken areas of Britain to meet with local people and take on board their concerns. But despite his efforts to reach out to the common populace, Edward would be evacuated with his family to Canada in 1925 amid the British Revolution despite his proposal that he return to the frontlines to fight the syndicalist menace."
 GBR_edward_windsor_king_exiled_leader_desc: "$GBR_edward_windsor_leader_desc_body$\n\nВ изгнании молодой Эдуард постепенно взял на себя многие из обязанностей, которые когда-то выполнял его отец, став регентом только по имени. Но после смерти отца Эдуард Виндзорский был коронован на пышной церемонии в Оттаве со всей пышностью и торжественностью, присущей его предшественникам. Молодой монарх, отличавшийся особой торжественностью при вступлении на престол, унаследовал империю, несомненно, являющуюся тенью своей былой славы, и королевство, оккупированное революционерами-синдикалистами. Не успокоившись, король Эдуард уже доказал, что склонен вмешиваться в политику со своими радикальными взглядами и является человеком похотливого скандала наравне с Освальдом Мосли. Но превыше всего он сохраняет желание, чтобы знамя Соединенного Королевства однажды гордо реяло над родными островами, а империя была восстановлена в своей славе..."
 GBR_edward_windsor_king_GBR_leader_desc: "$GBR_edward_windsor_leader_desc_body$\n\nЭдуард исполнил эту мечту, и при его правлении британские изгнанники восстали из своих ледяных крепостей за морем, чтобы нанести ответный удар и вернуть себе право первородства. Не останавливаясь на достигнутом, поумневший и навсегда изменившийся король Эдуард все еще продолжает объезжать опустошенные руины Британии, порой встречая обожание, а порой - презрение. Каким бы он ни казался своим подданным, любили они его или ненавидели, король Эдуард навсегда останется в памяти как человек, вернувший Британию, король, при котором Империя нанесет ответный удар."

 GBR_albert_windsor: "Альберт, герцог Йоркский"
 GBR_albert_windsor_regnal: "Альберт I"
 GBR_albert_windsor_governor: "Принц Альберт"
 GBR_albert_windsor_king_exiled_leader_desc: "Родившись в декабре 1895 года, юный принц Альберт не ожидал, что станет королем. Выросший в Великобритании, он всегда находился в тени своего брата, принца Эдуарда. Альберт I всегда был известен как робкий и замкнутый человек, вплоть до начала Вельткрига, когда в 1909 году он поступил в академию, а в 1913 году стал моряком. Несмотря на постоянную морскую болезнь, он участвовал в Ютландском сражении на борту HMS Collingwood, а затем служил командиром эскадры до ранения в ноябре 1918 года, оставшись в Великобритании до конца войны.\n\nПосле войны Альберт продолжал жить в Великобритании вплоть до революции, бежав в Канаду. Принц был относительно малозначимым вплоть до возведения его брата на престол, будучи следующим в очереди на трон. После отречения брата от престола новый король Альберт I воспринимается как равный, если не лучший, чем его предшественник, поскольку он охотнее сотрудничает с канадским правительством и британскими изгнанниками. Хотя король страдает от постоянных болезней, британские изгнанники видят в нем маяк надежды. К лучшему или к худшему, но Альберт I возглавит наступление на Родные острова."
 GBR_albert_windsor_king_GBR_leader_desc: "На протяжении всей войны к голосу короля Альберта прислушивались многие страны Антанты, чтобы услышать обнадеживающие слова короля, призывающие солдат и граждан бороться за победу.\n\nСейчас возвращение короля в Лондон вызвало неоднозначную реакцию в Британии. Многие считают, что возвращение короля стало последним признаком распада Союза, в то время как другие видят в его выступлении в Канаде в качестве короля-фигуранта то, что Британия вернется к демократии, которой она когда-то была, а король Альберт I станет знаком новой эры восстановления и процветания Британии. Только время покажет, как новый король будет справляться с новой Британией."
 GBR_albert_windsor_governor_CAN_leader_desc: "Принц Альберт Виндзорский, младший брат британского короля Эдуарда VIII, был назначен генерал-губернатором Канады. Хотя в детстве Альберта высмеивали за его заметное заикание, он вырос в собранного и послушного человека. Хотя канадцы высоко ценят добродетель Альберта, многие в правительстве страны ожидали, что назначение на пост генерал-губернатора будет передано на усмотрение канадского парламента. Однако, несмотря на разочарование некоторых, Альберт пользуется заслуженной популярностью. В то время как Эдуард занят восстановлением недавно завоеванной Британии, Альберт усердно трудится, чтобы обеспечить надлежащее управление Канадой."
 GBR_albert_windsor_governor_AST_leader_desc: "Принц Альберт Виндзорский, старший брат покойного принца Георга, был назначен генерал-губернатором Австралазии. Хотя в детстве Альберта высмеивали за его заметное заикание, он вырос собранным и послушным человеком. Хотя австралийцы высоко ценят добродетель Альберта, многие в правительстве страны ожидали, что назначение на пост генерал-губернатора будет возвращено на усмотрение парламента Австралазии. Однако, несмотря на разочарование некоторых, Альберт пользуется заслуженной популярностью. Пока страна все еще оплакивает трагическую авиакатастрофу, Альберт усердно трудится над тем, чтобы Австралазия управлялась должным образом."

 GBR_henry_windsor: "Генри, герцог Глостерский"
 GBR_henry_windsor_regnal: "Генри IX"
 GBR_henry_windsor_governor: "Принц Генри"
 GBR_henry_windsor_king_exiled_leader_desc: "§YBorn:§! §LMarch 31st, 1900, in York Cottage, Sandringham, Norfolk, England§!\n§YBackground:§! §LThe third-born son of George V, young Henry was regarded as an extremely nervous child, but Henry grew into an active and modest man. He excelled at sports, attended Eton College, and pursued a military career in-exile. All this prepared the unassuming prince to inherit the Crown when destiny played its hand. The new King Henry IX is well liked. He is seen as a stable and strong monarch, who is nonetheless of democratic stock. Now it is his duty to lead the British through the tumultuous waters ahead. And deep within, King Henry IX knows it is his sacred duty to reunite the British people...§!"
 GBR_henry_windsor_king_GBR_leader_desc: "§YBorn:§! §LMarch 31st, 1900, in York Cottage, Sandringham, Norfolk, England§!\n§YBackground:§! §LThroughout the war, King Henry's voice was one that many across the Entente tuned into to hear. The King's hopeful words of encouragement to the soldiers and citizens alike to push through inspired our brave soldiers.\n\nNow in Britain, the King's return to London was a topic of mixed reactions by the liberated population. Many believe the King's return is the last sign of the Union's destruction, while the others see his performance in Canada as a unifying figure as the ingredient that will return Britain to the democracy it once was. Only time will tell how the principled King will handle the rift within the new Britain.§!"
 GBR_henry_windsor_governor_AST_leader_desc: "§YBorn:§! §LMarch 31st, 1900, in York Cottage, Sandringham, Norfolk, England§!\n§YBackground:§! §LPrince Henry of Windsor has been appointed Governor-General of Australasia. Though regarded as an extremely nervous child, Henry grew into an active and modest man. While Australasians appreciate Henry's virtue, the expectation among many in its government was that appointment to the post of Governor-General would be restored to the discretion of the Australasian parliament. Regardless of the disappointment of some, however, Henry is well liked. With the country still mourning from such a tragic air-crash, Henry toils diligently to ensure that Australasia is properly governed.§!"
 GBR_henry_windsor_commander_desc: "§YBorn:§! §LMarch 31st, 1900, in York Cottage, Sandringham, Norfolk, England§!"

 GBR_george_windsor: "Георг, герцог Кентский"
 GBR_george_windsor_regnal: "Георг VI"
 GBR_george_windsor_governor: "Принц Георг"
 GBR_george_windsor_king_exiled_leader_desc: "§YBorn:§! §LDecember 20th, 1902, in York Cottage, Sandringham, Norfolk, England§!\n§YBackground:§! §LThe fifth child and fourth son of George V never expected what the future had in store for him. The young George studied in the British Navy and graduated soon before the Revolution, but he was whisked away along with the other members of the royal family. In exile, he continued his military career. Eventually, channelling his passion for aviation and becoming an RAF officer. This earned the young prince something of a daredevil reputation. Sometimes making headlines for his military duties and personal scandals. However, destiny placed him squarely in the limelight. Now, it is the job of this unlikely monarch to lead the nation to war, so that the banner of the United Kingdom will one day proudly fly above the Home Isles and the Empire shall be restored to its glory. Time can only tell if the young monarch has what it takes...§!"
 GBR_george_windsor_king_GBR_leader_desc: "§YBorn:§! §LDecember 20th, 1902, in York Cottage, Sandringham, Norfolk, England§!\n§YBackground:§! §LThroughout the war, King George's voice was one that many across the Entente tuned into to hear. The King's hopeful words of encouragement to the soldiers and citizens alike, as well as frequent visits to the frontline, boosted our soldiers' morale. Once, a young monarch brought to prominence by unlikely circumstances; King George VI, came into his own. But the King faces his greatest challenge yet, as the figurehead now has to unify a divided people. Some in the Home Isles welcome the return of the King, but others don't feel any particular affection to their new ruler. Now, King George VI must support efforts to mark a new era of rebuilding and prosperous times in Britain.§!"
 GBR_george_windsor_governor_AST_leader_desc: "§YBorn:§! §LDecember 20th, 1902, in York Cottage, Sandringham, Norfolk, England§!"

 GBR_hugh_gaitskell: "Хью Гейтскелл"
 GBR_hugh_gaitskell_sic_desc: "§YBorn:§! §LApril 9th, 1906, in Kensington, London, England§!"
 GBP_hugh_gaitskell_leader_desc: "Получив образование в Оксфорде в 1924 году, он увидит первые капли революции и в отличие от многих своих студенческих сверстников поддержит всеобщую забастовку. Когда разразилась революция, Гейтскелл быстро поддержал ее и стал непосредственным свидетелем политического подавления рабочего движения консервативным правительством. Несмотря на его поддержку революции, жестокие репрессии против 'реакционных агитаторов' вскоре заставили его примкнуть к более умеренным взглядам и стать твердым сторонником возрожденной Фабианской Лейбористской партии. Пребывание в тюрьме за контрреволюционную деятельность еще больше спровоцировало его скачок вправо, и Гейтскелл стал одним из самых умеренных деятелей в партии до ее роспуска. Теперь, когда Союз мертв, Гейтскелл сумел реорганизовать старую Лейбористскую партию под руководством наиболее умеренных элементов в надежде создать безболезненный переход от синдикализма к демократическому и свободному обществу."

 GBR_herbert_samuel: "Герберт Сэмюэл"
 GBP_herbert_samuel_leader_desc: "Один из многих либералов, поддержавших революцию против тирании правительства консерваторов. После раскола партии Сэмюэл возглавил ее и ввел ее в новый режим, дружески соперничая с Лейбористской партией Клемента Этли. В начале 1930-х годов Сэмюэл подвергся огромным подозрениям и в конце концов был арестован за контрреволюционную деятельность, став одним из самых известных политических заключенных Союза. Теперь, когда ему удалось заручиться поддержкой, чтобы возглавить постсоюзный порядок, Сэмюэл, несомненно, будет стремиться к более быстрым и похожим на шоковую терапию мерам по десиндикализации Союза, сохраняя при этом некоторые из систем социальной защиты, которые он помог создать."

