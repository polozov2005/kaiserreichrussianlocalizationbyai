 GBR_victoria_idea_desc: "Британцы воздвигли памятник в честь успехов Канады в деле возвращения монархии на Британские острова, восхваляя нас как спасителей традиций и демократии!"

### Decisions ###
 GBR_support_britain: "Поддержать британцев"
 GBR_support_britain_desc: "[GBR.GetNameDefCap]. правительство имеет дело с масштабной послевоенной разрухой. Мы должны предоставить ему любую помощь, которую только сможем!"
 GBR_rebuilding_empire: "Восстановление империи"
 GBR_rebuilding_empire_desc: "Задача восстановления британской экономики и правительства имеет наивысший приоритет, но после этого должно последовать восстановление Британской империи. По всему миру есть места, где проживают британцы, либо видят в них направляющую силу, и если мы ещё не готовы позволить солнцу вновь взойти над этой славной империей, то мы должны вернуть всех её подданных."
 GBR_demand_england: "Потребовать британские земли"
 GBR_demand_england_desc: "[From.GetNameDefCap]. правительство на данный момент владеет землёй, которая принадлежит Великобритании. Мы должны вернуть то, что принадлежит нам по праву."
 GBR_demand_uk_state: "Потребовать [From.GetNameDef]"
 GBR_demand_uk_state_desc: "[From.GetNameDefCap] - часть Соединённого Королевства, которая не должна быть независимой. Мы должны немедленно найти способ вернуть наши земли."
 GBR_restore_order_in_ireland: "Восстановить порядок в Северной Ирландии"
 GBR_restore_order_in_ireland_desc: "Лоялисты Серверной Ирландии с радостью хотели бы вернуться в состав Великобритании. Проблема в том, что они лишь часть населения Серверной Ирландии, которая не представляет большинство. Нам придётся приложить усилия по восстановлению порядка в регионе с последующим его возвращением в состав Соединённого Королевства."
 GBR_restore_order_falklands: "Восстановить порядок на Фолклендах"
 GBR_restore_order_gibraltar: "Восстановить порядок в Гибралтаре"
 GBR_restore_order_malta: "Восстановить порядок на Мальте"
 GBR_demand_northern_ireland: "Потребовать Северную Ирландию"
 GBR_demand_northern_ireland_desc: "Нам удалось восстановить Соединённое Королевство, пришла пора решить североирландский вопрос. Во время подписания мирного договора в 1921 году мы не потребовали этот регион, однако независимая Ирландия отказалась от выполнения договора, после провозглашения себя республикой. Ради защиты интересов северных протестантов, мы должны пойти на диалог с ирландцами и решить этот вопрос, либо навсегда отказаться от нашего права называться Соединённым Королевством."
 GBR_demand_gibraltar: "Потребовать Гибралтар"
 GBR_demand_gibraltar_desc: "Согласно Утрехтскому мирному договору 1713 года, Гибралтар является нашей территорией, которая открывает нам доступ к Средиземноморью. Мы должны потребовать её возвращения."
 GBR_demand_falklands: "Потребовать Фолклендские острова"
 GBR_demand_falklands_desc: "Находящиеся в Южной Атлантике Фолклендские острова не представляют для нас особой важности, однако на них проживают несколько тысяч британцев, которые желают вернуться в состав Соединённого Королевства. Мы должны уважать их желание и потребовать возвращения островов."
 GBR_invade_ireland: "Вторгнуться в Ирландию"
 GBR_invade_ireland_desc: "Ирландское правительство не оставило нам выбора. Мы должны провести вторжение и решить ирландский вопрос, вернув остров под наш контроль."
 # GBR_fund_loyalists: "Fund the Loyalists"
 # GBR_fund_loyalists_desc: "There are yet Loyalists in Northern Ireland struggling to be free. Taking overt military action to assist them might be off the table, but there is nothing stopping us from quietly funding and supplying the Loyalists under the table, and letting them take matters into their own hands."
 GBR_decide_wif_fate: "Решить судьбу [From.GetNameDef]"
 GBR_decide_wif_fate_desc: "[From.GetNameDefCap] никогда не было независимым государством, которое было создано для удобства в управлении британскими и французскими колониями в Карибском море, пока их метрополии охвачены хаосом. Такое положение дел никогда не планировалось как постоянное решение и сейчас настал момент решить судьбу [From.GetNameDefCap]."
 GBR_ask_for_malta_control: "Попросить о возвращении Мальты"
 GBR_ask_for_malta_control_desc: "Мальтийцы де-факто никогда не находились под властью французов и всё это время хотели вернуться под крыло Британии. И вот сейчас, когда мы вновь встали на ноги, нам следует немедленно вернуть Мальту."
 GBR_ask_for_carib_control: "Попросить контроль над [From.GetNameDef]"
 GBR_ask_for_carib_control_desc: "[From.GetNameDefCap] по праву является [Root.GetAdjective]ой колонией и именно поэтому мы должны вступить в диалог с её покровителями и попросить вернуть наши бывшие карибские территории."
 GBR_ask_for_colony_control: "Попросить контроль над [From.GetNameDef]"
 GBR_ask_for_colony_control_desc: "[From.GetNameDefCap] по праву является [Root.GetAdjective]ой колонией и именно поэтому мы должны вступить в диалог с её покровителями и попросить возвращения этой территории под наш контроль."
 GBR_ask_for_colonies: "Попросить о возвращении колоний"
 GBR_ask_for_colonies_desc: "На данный момент, [From.GetNameDefCap] контролирует землю, которая когда-то была британской колонией. Учитывая что они стали нашими союзниками, у нас не должно возникнуть никаких проблем с передачей назад наших законных территорий."
 GBR_retake_colony: "Вновь занять [From.GetNameDef]"
 GBR_retake_colony_desc: "Пришло время вновь занять [From.GetAdjective]ие землю, которая когда-то была нашей колонией."
 GBR_demand_colonies: "Потребовать возвращения колоний"
 GBR_demand_colonies_desc: "[From.GetNameDef] контролирует некоторые бывшие британские колонии. Пришло время потребовать их возвращения."
 GBR_reconstruction_decisions: "Восстановление Британии"
 GBR_reconstruction_decisions_desc: "Годы войны опустошили Великобританию. Кроме того, более десятилетия острова находились под властью синдикалистов. Второй раз для большинства британцев перевернулось мировосприятие. Пройдут суды, страна будет восстановлена с нуля, а старое вновь станет новым."
 GBR_fight_syndicalists: "Борьба с синдикалистским Сопротивлением"
 GBR_fight_syndicalists_desc: "Мы не позволим синдикалистскому ополчению изгнать нас вновь. Они уже проиграли войну за Британию и проиграют её снова!"
 GBR_land_settlement_act: "Принять Закон о регулировании земельных участков"
 GBR_land_settlement_act_desc: "Многие ветераны вернутся домой, в Британию, и будет иметь смысл раздать им уже ничейную землю в знак благодарности от правительства."
 GBR_abercrombie_plan: "Внедрить план Аберкромби"
 GBR_abercrombie_plan_desc: "Ущерб, нанесённый столице страны оставил многие тысячи горожан бездомными. Для её восстановления должна будет проделана колоссальная работа, но эта ситуация также даёт нам возможность обновить городскую инфраструктуру для исправления последствий столетий бурного роста населения и спонтанной застройки."
 GBR_create_relief_council: "Создать Совет агентств по оказанию помощи"
 GBR_create_relief_council_desc: "Многим агентствам по оказанию помощи, таким как CARE и Красный Крест, не терпится открыть свои филиалы в Британии. Нам определённо нужна их помощь, но нам также нужно агентство, которое бы регулировало их деятельность... не говоря уже о том, что синдикалисты и немцы захотят воспользоваться бедственным положением большей части британского населения и оказывать им помощь для пропаганды и распространения своего влияния."
 GBR_expand_power_system: "Расширить систему энергоснабжения"
 GBR_expand_power_system_desc: "С окончания войны, система энергоснабжения Великобритании находится в плачевном состоянии, являясь устаревшей и зависимой от поставок угля. Граждане вынуждены долгое время терпеть отсутствие электроэнергии. Нам следует как можно быстрее отремонтировать и усовершенствовать нашу систему энергоснабжения."
 GBR_reduce_taxation: "Урезать налогообложение для рабочих"
 GBR_reduce_taxation_desc: "Использование старых методов налогообложения не будет эффективно работать на рабочем классе - он и так переживает не лучшие времена, которые пришли с крахом экономики. Нам необходимо ввести некоторые налоговые послабления и быть готовыми к тому, что этот вопрос будет горячо обсуждаться в Палате общин."
 GBR_new_towns_act: "Принять закон о новых городах"
 GBR_new_towns_act_desc: "Сейчас в наших городских районах полный бардак, им требуется масштабный ремонт. В частности, трущобы стали почти неконтролируемыми. Закон, позволяющий создавать новые поселения в административных районах, чьё развитие будет передано частным корпорациям, поможет нам провести децентрализацию населения — по крайней мере, до тех пор, пока города снова не начнут расти."
 GBR_national_housing_project: "Финансировать национальный жилищный проект"
 GBR_national_housing_project_desc: "Из-за войны значительная часть британского населения осталась без дома. Национальный жилищный проект постарается предоставить временное укрытие всем желающим и начнёт финансировать починку жилплощади для тех, кто не может себе позволить самостоятельно оплатить ремот."
 GBR_farming_subsidies: "Ввести фермерские субсидии"
 GBR_farming_subsidies_desc: "Торговые ограничения во время войны привели к тому, что большинство британцев в течение многих лет находилось на нормах военного времени, а расширение нашего импорта должно улучшить ситуацию. Также нам необходимо субсидировать фермерские хозяйства, чтобы они могли помочь нам в восстановлении запасов продовольствия. Субсидировать также понадобится меры нормирования до тех пор, пока частные компании не смогут самостоятельно производить продовольство."
 GBR_business_subsidies: "Ввести субсидии для предпринимателей"
 GBR_business_subsidies_desc: "Между корпорациями, которые уже развернули деятельность в Великобритании и теми, кто только начал возвращать в страну свой бизнес из за рубежа, необходимо приложить все усилия по реорганизации своей деятельности на территории Соединённого Королевства. Если мы не введём для них программу субсидирования, то нам следует ожидать волну банкротств и целую серию связанных с этим проблем."
 GBR_new_employment_act: "Принять закон о трудоустройстве ветеранов"
 GBR_new_employment_act_desc: "У нас тысячи тысяч солдат, не говоря уже о вернувшихся изгнанниках, которым нужна работа. Безусловно, мы найдём чем их занять, однако создание руководящего агентства не только поможет облегчить процесс трудоустройства, но также поспособствует пресечению дискриминации изгнанников со стороны местных."
 GBR_beveridge_report: "Отчёт Бевериджа"
 GBR_beveridge_report_desc: "Известный либеральный экономист Уильям Беверидж сослался на необходимость сбора данных о текущем состоянии британского общества для последующего решения выявленных проблем. На сбор информации потребуется время и даже сам факт обработки отчётов успокоит тех, кто считает что правительство сидит сложа руки."
 GBR_pigou_report: "Отчёт Пигу"
 GBR_pigou_report_desc: "Не всем понравилось предложение Бевериджа, некоторыми чиновниками оно рассматривается как пропаганда социализма. Вместо этого было предложено рассмотреть отчёт известного экономиста Артура Сесила Пигу, который делает ставку на восстановлении экономики, а не на полной концентрации на проблемах общества."
 GBR_desyndicalisation: "Десиндикализация экономики"
 GBR_desyndicalisation_desc: "Синдикалистам не понадобилось много времени, чтобы наложить свои лапы на каждую составляющую британской экономики. Избавление от ориентированных на рабочих законы и введение некоторых ограничений, безусловно, поможет, однако мы также должны установить новые правила, чтобы сложившаяся экономическая система не рухнула под собственным весом. Британской экономике потребуется время чтобы снова научиться работать согласно принципам свободного рынка."
 GBR_pass_insurance_act: "Принять закон о государственном страховании"
 GBR_pass_insurance_act_desc: "Отчёт Бевериджа предоставил правительству ряд рекомендаций, одной из которых является создание национальной программы социальной защиты. У нас никогда не было даже подобия государства всеобщего благосостояния, которым так бахвалятся синдикалисты, но очевидно, что идея создания большой сети общественной безопасности будет крайне популярна в народе."
 GBR_central_banking_act: "Принять закон о централизованном кредитовании"
 GBR_central_banking_act_desc: "Одним из рекомендованных в отчёте Пигу предложений является создание системы беспроцентных кредитов, предлагаемых подконтрольными правительству центральными банками. Эти выплаты позволят частным лицам выступать в качестве предпринимателей, что приведёт к созданию нового класса бизнесменов, которые постепенно заберут влияние у профсоюзов. Суть предложения Пигу не только в том, чтобы подстегнуть развитие частного предпринимательства, без которого Британия оставалась в течение десятилетий, но и ради предотвращения безудержной инфляции."
 GBR_national_health_service: "Национальная служба здравоохранения"
 GBR_national_health_service_desc: "Другой предложенной Бевериджем рекомендацией является создание единой британской системы бесплатного здравоохранения под патронажем НСЗ. Данное решение значительно улучшит условия жизни в стране, а также успокоит тех, кто считает что жизнь при синдикалистском режиме была лучше."
 GBR_privatisation_act: "Принять закон о приватизации"
 GBR_privatisation_act_desc: "Процесс десиндикализации был завершён и правительство может начать процесс изымания у профсоюзов бывшей собственности крупных компаний и возвращения её в частные руки. Благодаря отчёту Пигу, мы располагаем системой, которая обеспечит справедливость распределения собственности и побудит многих новых предпринимателей брать кредиты у государства для развития своего бизнеса."
 GBR_legacy_revolution_generic: "[GBR_GetReduceLegacyRevolutionFlavourName]"
 GBR_legacy_revolution_generic_desc: "[GBR_GetReduceLegacyRevolutionFlavourDesc]"
 GBR_rent_control_act: "Принять закон о регулировании арендной платы"
 GBR_rent_control_act_desc: "До тех пор, пока мы не разберёмся с серьёзной нехваткой домов, нам следует ввести контроль над арендной платой. Создание по всей стране условий для установления справедливой арендной платы между арендодателем и арендатором (в соответствии с рекомендацией комитета Ридли), судя по всему, является наилучшим решением давно нерешённой проблемы."
 GBR_progressive_reconciliation: "Помириться с левыми"
 GBR_progressive_reconciliation_desc: "Одной из целей, которую перед собой поставили Лейбористы, является достижение согласия между всеми прогрессивными политическими течениями страны. Для того, чтобы заслужить их доверие, мы проведём чреду социальных реформ, которые позволят им объединиться с Лейбористами в борьбе против реакционных решений, предлагаемых консерваторами. Предложения социалистов считаются несовместимыми с новой британской администрацией и мы должны быть теми, кто будет отстаивать их интересы и гарантировать равный достаток среди граждан."
 GBR_parliamentary_reform: "Парламентская реформа"
 GBR_parliamentary_reform_desc: "В текущей политической системе, голосование проводится парламентом, в котором нет народных представителей. Партия с меньшинством голосов может получить большинство в Палате общин. Учитывая сложившуюся ситуацию, мы должны реформировать систему голосования, позволив избирателям формировать списки желаемых кандидатов, а также наложить определённые ограничения на богатых, возложив на них дополнительные расходы в случае их про-государственной агитации."
 GBR_female_equality: "Принять равенство полов в Британии"
 GBR_female_equality_desc: "Семья — основа жизни нашей страны. Либералы были первыми кто потребовали введения семейного пособия, и полны решимости обеспечить надлежащий достаток для матерей и детского здравоохранения. Сейчас Либеральная партия требует признания равенства между мужчинами и женщинами в возможностях и гражданском статусе, что означает равную оплату за равный труд и равные возможности в использовании общественных служб."

### Focuses ###
 GBR_british_reconstruction_authority: "Реставрационная администрация"
 GBR_british_reconstruction_authority_desc: "Экономика поставлена с ног на голову. Многие остались без дома. Война опустошила страну и нам нужно незамедлительно принять ряд решений по её восстановлению. Именно с этой целью будет создана Британская реставрационная администрация."
 GBR_fate_of_unions: "Судьба профсоюзов"
 GBR_fate_of_unions_desc: "Синдикализм ушёл, но множество профсоюзов никуда не делись и не могут найти себе места в Соединённом Королевстве. Следует ли их распусить? Стоит ли позволить им хоть как-то представлять интересы рабочих? Необходимо принять решение."
 GBR_fate_of_leaders: "Начать судебные процессы"
 GBR_fate_of_leaders_desc: "Судьба профсоюзов мало связана с их руководством. В частности, люди, которые управляли Британским Союзом, приняли решение стравливать британских солдат между собой. Члены синдикалистского руководства должны предстать перед судом, их дальнейшая судьба станет примером для тех, кто разделяет их взгляды."
 GBR_question_of_labour: "Лейбористский вопрос"
 GBR_question_of_labour_desc: "Нам нужно решить судьбу Лейбористов. Следует ли нам позволить им дальше вести политическую деятельность или их сотрудничество с синдикалистами следует расценивать как измену?"
 GBR_returning_aristocracy: "Возвращение аристократов"
 GBR_returning_aristocracy_desc: "Многие богатые изгнанники начали возвращаться в Британию. Видимо для того, чтобы увидеть уже не принадлежащие им земли, дома и национализированный бизнес. Они хотят вернуть свою собственность... но это означает, что её придётся у кого-то отобрать."
 GBR_reorganise_bureaucracy: "Реорганизовать бюрократию"
 GBR_reorganise_bureaucracy_desc: "Британский госаппарат был низвергнут и переделан для служения профсоюзам и установлению государства всеобщего благосостояния. Сейчас перед нами стоит задача создать бюрократическую систему, которая не будет вставлять нам палки в колёса на каждом шагу."
 GBR_hold_elections: "Свободное правительство"
 GBR_hold_elections_desc: "Последним действием Б.Р.А должно стать возвращение власти над Соединённым Королевством гражданскому правительству, путём проведения первых за последние десятилетия свободных выборов."
 GBR_guided_parliament: "Управляемый парламент"
 GBR_guided_parliament_desc: "Б.Р.А должна понять, что ситуация в Соединённом Королевстве непростая, поскольку причиняемый синдикалистами ущерб всё ещё останется неподвластным гражданскому правительству. Если мы сейчас передадим власть гражданским чиновникам, то восстание 1925 года повторится вновь."
 GBR_end_of_bra: "Завершение Реконструкции"
 GBR_end_of_bra_desc: "Б.Р.А сыграла решающую роль в восстановлении Великобритании и её досиндикалистского наследия, теперь администрации пора сложить полномочия. Британцы наконец-то могут вновь поднять головы и смотреть в светлое будущее без пагубного влияния левых идей."

 GBR_the_exchequer: "Восстановить Казначейство"
 GBR_the_exchequer_desc: "Восстановление полномочий Казначейства позволит нам вернуть экономику страны в верное русло."
 GBR_foreign_investment: "Иностранные инвестиции"
 GBR_foreign_investment_desc: "В руках британцев и британского правительства слишком мало денег для восстановления экономики, нам стоило бы заняться поисками иностранных инвестиций и вместе с этим обеспечить недопущение иностранного влияния."
 GBR_restore_bbc: "Новая Би-би-си"
 GBR_restore_bbc_desc: "Во время революции, "Британская вещательная корпорация" была низложена администрацией синдикалистов. Пришло время восстановить её величие и порвать поводок, на котором она была последние двадцать лет."
 GBR_royal_society: "Финансирование Королевского общества"
 GBR_royal_society_desc: "Королевское общество всегда являлось группой светлейших умов Британии. Предоставив им финансы и направив их усилия на восстановление британского общества, мы сможем извлечь максимальную выгоду из их знаний и навыков."
 GBR_imperial_chemical: "Имперская химическая сделка"
 GBR_imperial_chemical_desc: "Говоря прямо, Соединённому Королевству нужно топливо. Частично его недостаток обусловлен войной с синдикалистами, нам нужно заключить контракты с частным сектором, чтобы в будущем самим стать производителями топлива, а не остаться теми, кто полагается только на импорт."
 GBR_regulate_growth: "Регулировать рост промышленности"
 GBR_regulate_growth_desc: "Если мы не проявим должную осторожность, многочисленные "предприниматели" будут пользоваться текущим положением британской экономики для получения власти и эксплуатации британцев. Мы должны с осторожностью регулировать рост промышленности и не позволять ему слишком сильно расти или замедляться."
 GBR_marconi_deal: "Сделка с "Маркони""
 GBR_marconi_deal_desc: "Marconi electronics is one of the largest companies still active in the United Kingdom. They are relieved to have been released from their syndicalist shackles, and so are willing to return the favour by giving the government a favourable deal in re-starting the country's manufacturing sector."
 GBR_civilian_1: "Финансирование гражд. промышленности"
 GBR_civilian_1_desc: "Большая часть гражданской промышленности Соединённого Королевства потерпела убытки или была уничтожена во время войны. Мы должны сконцентрироваться на её восстановлении."
 GBR_civilian_2: "Продолжить финансирование гражд. промышленности"
 GBR_civilian_2_desc: "Большая часть гражданской промышленности Соединённого Королевства потерпела убытки или была уничтожена во время войны. Мы должны сконцентрироваться на её восстановлении."
 GBR_royal_charters: "Привелегированные компании"
 GBR_royal_charters_desc: "Британские изгнанники вернулись в страну вместе со своими сбережениями. Мы должны найти хорошее применение этим финансам и создать несколько высококлассных корпораций, которые технически будут относиться к частному сектору, но на деле жёстко регулироваться правительством. Данное решение значительно ускорит рост экономики."
 GBR_arms_deal: "Сделка с производителями оружия"
 GBR_arms_deal_desc: "Нам нужно значительно расширять вооружённые силы, не говоря уже о том, что нам также нужно чем-то снабжать полицию по всей стране. Это означает, что нам нужно заключить контракт хотя бы с одним крупным национальным производителем оружия."
 GBR_military_1: "Финансирование военпрома"
 GBR_military_1_desc: "Большая часть оружейной промышленности Соединённого Королевства потерпела убытки или была уничтожена во время войны. Мы должны сконцентрироваться на её восстановлении."
 GBR_military_2: "Продолжить финансирование военпрома"
 GBR_military_2_desc: "Большая часть оружейной промышленности Соединённого Королевства потерпела убытки или была уничтожена во время войны. Мы должны сконцентрироваться на её восстановлении."

 GBR_ministry_of_defence: "Восстановить Министерство обороны"
 GBR_ministry_of_defence_desc: "Комитет начальников штабов некомпетентен в вопросе координирования деятельности всех трёх видов наших вооружённых сил, которые нужны нам для восстановления обороноспособности Британии. Нам нужно восстановить Министерство обороны, которое решит данный вопрос."
 GBR_reform_army: "Реформировать Британскую армию"
 GBR_reform_army_desc: "Британская армия на протяжении двадцати лет была под контролем синдикалистов, которые пичкали наших солдат пропагандой и неэффективными тактиками. Мы хотим с нуля воссоздать наши сухопутные силы."
 GBR_syndicalist_soldiers: "Синдикалистский вопрос в армии"
 GBR_syndicalist_soldiers_desc: "Большое количество солдат, которые сражались за синдикалистов, хотят записаться в ряды новой армии. Возник вопрос: стоит ли им позволить нести службу?"
 GBR_call_to_arms: "Новый призыв к оружию"
 GBR_call_to_arms_desc: "С восстановлением Британской армии, пришло время вновь организовать призыв! Мы позволим мужчинам и женщинам свободного Соединённого Королевства занять позиции на оборонительной передовой, чтобы все мы никогда больше не почувствовали на себе хватку тирании."
 GBR_retraining_efforts: "Кампания по переподготовке"
 GBR_retraining_efforts_desc: "В наших рядах хаос и смятение, нам следует немедленно покончить с этим и приобщить всю Британскую армию к практикам, которые мы позаимствовали у канадцев."
 GBR_restore_MI6: "Восстановить МИ-6"
 GBR_restore_MI6_desc: "МИ-6 всегда была службой внешней разведки Его Величества. Её директора ушли в изгнание вместе с королём и сейчас пришло время восстановить службу и начать возвращение Британии на передовую международной разведки."
 GBR_royal_marines: "Новая морская пехота"
 GBR_royal_marines_desc: "К счастью, большая часть опытных морпехов бежала в Канаду вместе с нами. Они сыграли решающую роль возвращении родных островов. Эти бойцы, которые проявили отвагу на берегах Британии, помогут нам возродить Королевскую морскую пехоту."
 GBR_reform_navy: "Реформировать Королевский флот"
 GBR_reform_navy_desc: "Британский Королевский флот, один из престижнейших флотов мира, должен быть восстановлен с нуля. Чтобы сделать это мы будем должны пойти на Гераклов подвиг, хотим мы того или нет."
 GBR_fleets_in_exile: "Флоты в изгнании"
 GBR_fleets_in_exile_desc: "С падением Соединённого Королевства в 1926 году, тихоокеанский и атлантический флоты ушли к берегам Австралазии и Канады. Часть этих кораблей отправилась на дно или была восстановлена австралазийцами и канадцами. К счастью, они готовы помочь нам восстановить наши старые корабли."
 GBR_rebuild_the_fleet: "Восстановить Славный флот"
 GBR_rebuild_the_fleet_desc: "Создание нового Британского флота будет непростой задачей - мы должны подготовить верфи для сверхурочной работы, ведь мы хотим провести самое масштабное строительство флота в истории!"
 GBR_dockyards_1: "Финансирование новых верфей"
 GBR_dockyards_1_desc: "Если мы хотим приблизиться к величию старого флота, то должны построить новые верфи по всей стране."
 GBR_shipbuilding_deal: "Сделка с кораблестроителями"
 GBR_shipbuilding_deal_desc: "Мы не можем построить наши новые корабли в одиночку - нам потребуется помощь владений империи, чтобы восстановить великий британский флот."
 GBR_reform_air_force: "Реформировать RAF"
 GBR_reform_air_force_desc: "Королевские военно-воздушные силы, которые в какой-то момент были крупнейшими в мире, являются предметом нашей гордости. Пришло время восстановить их и будет просто замечательно если они станут лучше, чем прежде!"
 GBR_take_to_the_air: "Подняться в воздух"
 GBR_take_to_the_air_desc: "У нас большой авиапарк старых самолётов, некоторые из них были сделаны ещё при синдикалистах. Их всё ещё можно будет использовать после небольшого ремонта и усовершенствования."
 GBR_hawker_deal: "Сделка с "Хокер""
 GBR_hawker_deal_desc: "Hawker is one of the best airplane design companies that exist, and one that is more than willing to help us redesign and build a brand new fleet of airplanes for the RAF."
 GBR_jet_propulsion: "Реактивный двигатель"
 GBR_jet_propulsion_desc: "Ни для кого не секрет, что следующее поколение самолётов будет иметь реактивный двигатель. Если мы хотим восстановить наши ВВС, то мы должны постараться сделать их самыми современными из всех, что когда-либо видел мир!"
 GBR_defending_the_coasts: "Защита нашего неба"
 GBR_defending_the_coasts_desc: "Самолёты находятся на острие военных технологий и современная война без них немыслима, в то время как Британские острова очень легко могут подвергнуться атакам бомбардировщиков. Для гарантии безопастности нашего неба, нам необходимо построить ПВО по всей стране."
 GBR_maud_committee: "Комитет Томсона"
 GBR_maud_committee_desc: "Ядерное оружие станет следующей ступенью развития обороны нашей страны. Столкнувшись с угрозой ядерного удара, врагу предстоит несколько раз подумать, прежде чем нападать на нас."
 GBR_priority_land: "Приоритет: Армия"
 GBR_priority_land_desc: "Из трёх видов наших вооружённых сил, армия заслуживает наибольшего внимания. Всё оружие мира не будет значить ничего, если у нас не будет профессиональных бойцов, которые будут держать его в своих руках. Наши людские ресурсы ограничены, каждый солдат - бесценен!"
 GBR_priority_sea: "Приоритет: Флот"
 GBR_priority_sea_desc: "Из трёх видов наших вооружённых сил, флот заслуживает наибольшего внимания. Если мы контролируем моря, значит мы контролируем и торговлю. Имея мощный флот, мы сможем диктовать свои условия всему миру и обезопасим наши берега от вражеского вторжения."
 GBR_priority_air: "Приоритет: Авиация"
 GBR_priority_air_desc: "Из трёх видов наших вооружённых сил, ВВС заслуживают наибольшего внимания. Контроль неба - залог нашей неприступности."
 GBR_porton_down: "Открыть Портон-Даун"
 GBR_porton_down_desc: "Портон-Даун - лаборатория химических исследований, основанная во время Первого Вельткрига. Во время правления синдикалистов он был использован для своих гнусных целей, но с восстановлением порядка мы сможем вновь открыть его и сделать центром наших военных исследований." 

 GBR_foreign_office: "Восстановить Форин-офис"
 GBR_foreign_office_desc: "Мы восстановили экономику и правительство, пришла пора Соединённому Королевству вернуть своё положение в мире."
 GBR_entente_leadership: "Лидер Антанты"
 GBR_entente_leadership_desc: "Антанта всегда была альянсом, который возглавляли британцы. Канада слишком долго исполняла свой долг, пришла пора вернуть нам руководящую роль."
 GBR_five_eyes_program: "Программа "Пять глаз""
 GBR_five_eyes_program_desc: "Каждый член Антанты имеет свою разведывательную программу, но что если "бюро" всех стран альянса будут работать сообща? Вместо того чтобы следить друг за другом, не могли бы мы объединить наши усилия и сконцентрировать внимание на наших врагах?"
 GBR_imperial_preference: "Программа имперских преференций"
 GBR_imperial_preference_desc: "Британское правительство предложило запустить программу выгодных тарифов и соглашений о свободной торговле между бывшими членами империи с целью укрепления единства стран Содружества для нашей защиты от агрессивных торговых практик изменяющегося мира."
 GBR_special_relationship: "Восстановить особые отношения"
 GBR_special_relationship_desc: "Соединённому Королевству и Франции удалось то, что считалось невозможным. Вместе, мы должны заверить друг друга, что взаимоотношения наших стран останутся тёплыми и в будущем."
 GBR_westminster_declaration: "Вестминстерская декларация"
 GBR_westminster_declaration_desc: "Многочисленные доминионы проявили себя, в их заслугах не стоит сомневаться. Они больше не колонии, но страны со своими правами и признанием с нашей стороны. Кому-то это может показаться бесмысленным, но в Вестминстерской декларации мы собираемся закрепить независимость наших доминионов."
 GBR_returning_the_favor: "Отблагодарить Канаду"
 GBR_returning_the_favor_desc: "Никакой из наших доминионов не заслуживает такого уважения как Канада, которая осталась лояльной нам даже после того, как мы отпыли от её берегов. Мы должны выразить благодарность нашим замечательным канадским поданным. Они должны знать что мы чтим их жертву."
 GBR_irish_question: "Ирландский вопрос"
 GBR_irish_question_desc: "Формально, мы являемся Соединённым королевством Великобритании и Северной Ирландии... без Северной Ирландии. В прошлом мы заключали мирный договор со свободной Ирландией с отказом от своих территориальных претензий, однако сейчас мы вернулись и можем вновь заявить о своих претензиях."
 GBR_gibraltar_question: "Гибралтарский вопрос"
 GBR_gibraltar_question_desc: "Гибралтар - наши ворота в Средиземноморье и не смотря на отсутствие у нас могучего флота, который когда-то был, в Гибралтаре всё ещё проживает много британцев и для некоторых вопросом гордости является принятие решения по возвращению скалы в состав Великобритании."
 GBR_falklands_question: "Фолклендский вопрос"
 GBR_falklands_question_desc: "Фолкленды весьма далеки от нас и находятся под контролем Аргентины, но тем не менее на этих островах проживают тысячи британцев. Мы должны вернуть себе свою потерянную колонию вместе с британцами, которые по праву должны находиться под нашей защитой."
 GBR_west_indies_question: "Вест-индийский вопрос"
 GBR_west_indies_question_desc: "Вест-Индийская Федерация была сделана из соображений уже удовлетворённой коллективной потребности некоторых стран. Что нам делать - распустить федерацию и вернуть колонии своим хозяевам или позволить Вест-индии существовать в качестве нового, независимого государства?"
 GBR_the_empire_debate: "Обсуждение имперской реставрации"
 GBR_the_empire_debate_desc: "С восстановлением нашей былой мощи встал ряд вопросов: время Британской империи окончательно прошло или нам следует её возродить? Нужно ли нам возвращать свои колонии в Африке и Азии? Следует ли нам сохранить единство нашего альянса или броситься на поиски старой славы? На все эти вопросы нужно дать ответы."

### Restoration of the UK ###
 united_kingdom_events.1.t: "Освобождение Соединённого Королевства"
 united_kingdom_events.1.d: "После долгих лет изгнания и борьбы, королевская семья с триумфом вернулась в Соединённое Королевство. Сегодня славный день для Британии и империи, который бы не настал без участия [Root.GetNameDef]. подданных, который следует благодарить за отважную службу делу сохранения традиций и порядка во всём мире. Боже, храни короля!"
 united_kingdom_events.1.a: "Возродить Соединённое Королевство! (Играть за Великобританию)"
 united_kingdom_events.1.b: "Возродить Соединённое Королевство!"

 united_kingdom_events.3.t: "Возрождение Соединённого Королевства"
 united_kingdom_events.3.d: "Наконец-то настал этот момент. Сегодня, [CAN_king_full_name] вошёл в Вестминстерское Аббатство для того, чтобы короноваться должным образом - так, как это делали все английские и британские монархи до него. Сегодня славный день, который ознаменует новое начало для Соединённого Королевства. Однако, после завершения коронации, король и его правительство заметили, что стоящая перед ними задача восстановления страны - только начало. Положение армии в подвешенном состоянии, экономика в упадке, а судьба бывшего синдикалистского руководства Британии пока остаётся нерешённой."
 united_kingdom_events.3.a: "Боже, храни короля!"

 united_kingdom_events.4.t: "День Свободы"
 united_kingdom_events.4.d: "По всей территории Соединённого Королевства закрыты магазины и фабрики, поскольку в национальный день памяти британцы собираются в честь тех, кто погиб в борьбе с синдикализмом. Основные мероприятия дня проходят в Лондоне, где в годовщину смерти останки Георга V были похоронены в специальном хранилище на сложной церемонии в Вестминстерском Аббатстве, на которой присутствовали король [CAN_king_first_name], его семья и ведущие политические и военные деятели. Эта торжественная церемония наконец исполняет предсметрное желание покойного короля - вернуться домой. С завершением церемонии, король [CAN_king_first_name] возглавил шествие к восточному концу Мэлла, где был открыт памятник Герогу V. Король заявил, что памятник увековечивает память всех тех, кто пал жертвой прежнего режима, и что синдикализм никогда больше не будет угрожать свободе британцев. Чтобы почтить память жертв синдикализма и освежить воспоминания о том, что было почти потеряно и высокой ценой возвращено. Отныне, каждый год этот день будет отмечаться как День Свободы."
 united_kingdom_events.4.a: "За короля и страну!"

 united_kingdom_events.5.t: "День Свободы"
 united_kingdom_events.5.d: "По всей территории Соединённого Королевства закрыты магазины и фабрики, поскольку в национальный день памяти британцы собираются в честь тех, кто погиб в борьбе с синдикализмом. Основные мероприятия дня проходят в столице, на которых присутствуют король [CAN_king_first_name], его семья и ведущие политические и военные деятели. В своей речи, произнесённой народным массам, находящимся в Мэлле, король [CAN_king_first_name] пообещал, что синдикализм больше никогда не будет угрожать свободе британцев. "Сегодня мы чтим жертву тех, кто пал в борьбе - сказал он, - и храним память о том, что было почти потеряно и высокой ценой возвращено"."
 united_kingdom_events.5.a: "За короля и страну!"

 united_kingdom_events.7.t: "Помощь британцам"
 united_kingdom_events.7.d: "[GBR.GetNameDefCap] столкнулось с огромными разрушениями, и британцы, безусловно, могут воспользоваться любой помощью, которую может предложить [Root.GetNameDef]!"
 united_kingdom_events.7.a: "Мы достойны большего!"
 united_kingdom_events.7.b: "Пока и этого хватит."

 united_kingdom_events.8.t: "[From.GetAdjective]ое правительство присылает нам помощь"
 united_kingdom_events.8.d: "[From.GetAdjective]ое правительство накануне выслало столь необходимую помощь, которая сегодня прибыла к нам!"
 united_kingdom_events.8.d.more: "[From.GetAdjective]ое правительство накануне выслало столь необходимую помощь, которая сегодня прибыла к нам! Поставки были очень щедрыми!"
 united_kingdom_events.8.a: "Спасибо, [From.GetName]!"

### The British Reconstruction Authority ###
 united_kingdom_events.10.t: "Реставрационная администрация"
 united_kingdom_events.10.d: "Мы восстановили монархию на Британских островах, однако многие политики считают, что стране необходимо пройти через тяжёлый процесс "десиндикализации". Синдикалистский режим оставил глубокий отпечаток на британской культуре и обществе, не говоря уже о том, что мы должны отремонтировать дома по всей стране, ведь многие из них во время войны сровняло с землёй. Стоя на ступенях разрушенного Вестминстерского парламента, премьер-министр [GetBritishExilePM] заявил воодушевлённой толпе о том, что Б.Р.А (Британская реставрационная администрация) вскоре организует свою работу и получит широкие полномочия, чтобы процесс восстановления страны прошёл как можно быстрее."
 united_kingdom_events.10.a: "Будем надеяться, что это сработает!"

 united_kingdom_events.11.t: "Местные недовольны вернувшимся изгнанникам"
 united_kingdom_events.11.d: "Те из граждан Британии, которые покинули Соединённое Королевство после установления синдикалистской диктатуры, столкнулись с недовольством со стороны местного населения. Постоянно возникают споры о том, в чьей собственности находятся покинутые дома и усадьбы. Даже в среде вернувшихся не всё спокойно - многие из них таят обиду на богатых изгнанников, которые возвращаются в Британию "нетронутыми войной и бедностью". Король [CAN_king_first_name] обратился к британцам по радио, напомнив им, что изгнанники - это та основная причина, по которой местные смогли вернуть себе свободу. Несмотря на это, многие считают, что пройдёт много лет, прежде чем Британия сможет избавиться от социального разрыва между местными и бывшими изгнанниками."
 united_kingdom_events.11.a: "Тревожная ситуация."

 united_kingdom_events.12.t: "Синдикалистское ополчение проявляет активность"
 united_kingdom_events.12.d: "Большинство британцев считает, что война окончена и их воля к борьбе угасла, однако некоторые оставшиеся группы синдикалистского ополчения всё ещё продолжают свою деятельность. Они продолжают скрываться по всей стране - от северных предгорий до крупных городов. По сообщениям, лидеры ополчения пытаются поднять восстание против короля и его "деспотичной реставрационной администрации". Пока успех их деятельности весьма незначителен, но есть риск того, что им удастся привлечь на свою сторону больше людей в том случае, если Б.Р.А будет действовать неосмотрительно и вызовет недовольство социалистов."
 united_kingdom_events.12.a: "Нам следует проявлять осторожность."

 united_kingdom_events.13.t: "Солдаты-синдикалисты возвращаются в города"
 united_kingdom_events.13.d: "Война окончена и выжившие солдаты, которые воевали за Британский Союз, начали возвращаться в города. Некоторые из них всё ещё страдают от ран, в то время как другие просто боятся последствий недавней капитуляции. Многие из них хотят вновь вернуться на службу, но Британская армия ещё не готова принять их в свои ряды. Даже если они вернутся на службу, стоит ли к этим людям относиться как к ветеранам? В случае утвердительного ответа, мы возложим на себя обязанность ухода за ними и выплаты пособий. Большая часть британцев симпатизирует им... но ведь эти же люди совсем недавно убивали их сограждан ради идеалов синдикализма. Стоит ли проявлять милосердие к побеждённым?"
 united_kingdom_events.13.a: "Мы не поддерживаем предателей."
 united_kingdom_events.13.b: "Мы окажем им небольшую помощь, но без выплат."
 united_kingdom_events.13.c: "Они просто выполняли приказы, оказать им посильную поддержку."

 united_kingdom_events.14.t: "Помощь изгнанникам"
 united_kingdom_events.14.d: "Не смотря на то, что британцы не совсем рады их присутствию, вернувшиеся изгнанники, несомненно, находятся в лучшем положении, и способны предложить помощь тем, кто сильно пострадал от последствий войны. Первым подал пример лорд Маунтбаттен, который потратил миллионы фунтов на строительство приютов для бездомных в сердце таких городов как Манчестер и Ливерпуль. Он призвал всех платежеспособных изгнанников оказывать посильную помощь тем, кому повезло меньше, чем им. По всей стране появились палаточные городки и суповые кухни, некоторые из них финансируются правительством за счёт многих богатых изгнанников, большинство которых, как и лорд Маунтбаттен, заявили о своей обязанности помочь тем, кто больше всего в этом нуждается."
 united_kingdom_events.14.a: "Приятное зрелище."

 united_kingdom_events.15.t: "Волна банкротств"
 united_kingdom_events.15.d: "Сегодня компания "Воксхолл Моторс Лимитед" закрывает двери своей штаб-квартиры в Лутоне и объявляет себя третьим крупным банкротом с момента создания Б.Р.А. Во время диктатуры синдикалистов, большинство подобных крупных компаний было передано в собственность профсоюзов и вот сейчас, когда будущее профсоюзов находится под серьёзным вопросом, эти компании оказались в затруднительном положении. Б.Р.А готовится вмешаться в ситуацию и на время забрать собственность тех корпораций, которые находятся на грани банкротства. В планы Администрации не входит продолжение производства на этих предприятиях и ограничится только принятием мер по предотварщению их закрытия. Если ситуация не будет вскоре решена, то в течении нескольких месяцев Британия столкнётся с рекордным уровнем безработицы."
 united_kingdom_events.15.a: "Нехорошо получается..."

 united_kingdom_events.16.t: "Б.Р.А начинает свою деятельность"
 united_kingdom_events.16.d: "С восстановлением парламента, стоящий возле короля премьер-министр вышел к публике, чтобы объявить об официальном начале деятельности Британской реставрационной администрации. Во время речи, по выражению лиц в толпе можно было определённо увидеть надежду на то, что всё скоро вернётся на круги своя. Несколько протестующих, которые держали профсоюзную символику, не смогли помешать церемонии и вскоре были разогнаны полицией. Члены парламента потоком устремились в зал своего первого заседания, в котором пройдёт обсуждение по вопросам введения экстренных ограничений на импорт."
 united_kingdom_events.16.a: "Отличный день!"

 united_kingdom_events.17.t: "Страна начала восстанавливаться"
 united_kingdom_events.17.d: "Получив зелёный свет от Б.Р.А, по всей стране начало свою деятельность огромное количество ремонтных проектов. Благодаря ослаблению или, в некоторых случаях, снятию кредитных ограничений, строительные компании смогли нанять тысячи рабочих и начать активный процесс восстановления домов для огромного числа бездомных по всей Великобритании. Многие наблюдатели утверждают, что впервые за последние месяцы почувствовали надежду, когда увидели возведение каркасов первых домов."
 united_kingdom_events.17.a: "Чудесно!"

 united_kingdom_events.18.t: "Артур Хорнер сдался полиции"
 united_kingdom_events.18.d: "Пока многие из членов руководства Британского Союза скрываются или, на примере Освальда Мосли, покидают страну, Артур Хорнер сегодня решил самостоятельно сдаться британской полиции. Прекрасно осознавая что его будут судить, он сказал: "Я не могу отвергнуть своих социалистических братьев и сестер не запятнав свою совесть. Мы проиграли войну, но рабочие по всему миру всё ещё сражаются за свою свободу и если они должны предстать перед судом за свою продолжающуюся борьбу с угнетением, то должен и я." Большая толпа собралась поддержать Хорнера, но народ только тихо стоял и смотрел как Хорнера увозят в тюрьму. Судя по всему, его действия вызвали поддержку синдикализма, которая, как считалось, окончательно угасла к концу войны."
 united_kingdom_events.18.a: "Интересно."

 united_kingdom_events.19.t: "Окончание нормирования продовольствия"
 united_kingdom_events.19.d: "Сегодня страна узнала хорошие новости: военное нормирование, с которым большинство британцев справлялось в течении года, а то и дольше, было официально отменено указом Б.Р.А. Запреты на импорт были отменены, на полки британских магазинов вернулись мясо, сыры и фрукты, которые исчезли с приходом синдикалистов. Для многих британцев это стало знаком резкого улучшения ситуации в стране."
 united_kingdom_events.19.a: "Прекрасно."

 united_kingdom_events.21.t: "Судьба профсоюзов"
 united_kingdom_events.21.d: "Поражение Британского Союза привело к закрытию старых профсоюзов, которые поддерживали синдикалистский режим. Однако никуда не делся вопрос о том, стоит ли британским рабочим иметь организации, которые бы отстаивали их интересы. Разумеется, уже сейчас появились группы рабочих, которым не терпится вновь начать профсоюзную деятельность, им всего лишь нужно одобрение правительства. Одна часть чиновников выступает за полный запрет профсоюзной деятельности, однако стоит помнить, что рабочие точно не будут в восторге от данного решения. Другая часть предлагает открыть контролируемые правительством профсоюзы, а деятельность остальных запретить. Остальные продолжают утверждать, что профсоюзы следует просто оставить в покое, поскольку, как утверждается, избавление от них может привести к катастрофе."
 united_kingdom_events.21.a: "Позволить профсоюзам продолжать работу."
 united_kingdom_events.21.b: "Создать контролируемые профсоюзы, остальные запретить."
 united_kingdom_events.21.c: "Британии не нужны профсоюзы - запретить их все!"
 GBR_protests_will_fade: "Протестов станет меньше\n"

 united_kingdom_events.22.t: "Богатые недовольны политикой в отношении профсоюзов"
 united_kingdom_events.22.d: "В то время как большинство британцев одобрило решение правительства в отношении профсоюзов, некоторые, в частности состоятельные бывшие изгнанники, выражают своё недовольство. Они не вышли протестовать на улицы, но начали критиковать правительство и попросили проявить бдительность, чтобы не допустить восстания, подобное тому, что произошло в 1925 году."
 united_kingdom_events.22.a: "Спасибо за совет."

 united_kingdom_events.23.t: "Новые протесты из-за запрета профсоюзов"
 united_kingdom_events.23.d.control: "Сегодня сторонники Лейбористов заполонили улицы городов по всей стране, неистово требуя отменить запрет профсоюзов. Факт того, что некоторые из них всё ещё продолжают свою деятельность под контролем государства, судя по всему, толпу тоже не устраивает. "Вы что, опять революции хотите?" - заявила журналистам женщина из толпы, - "Если мы им это позволим, то правительство снова захочет растоптать нас!". На помощь полиции прибыли армейские части, но боясь накала ситуации, они не предпринимали каких-либо действий в отношении протестующих."
 united_kingdom_events.23.d.ban: "Сегодня сторонники Лейбористов заполонили улицы городов по всей стране, неистово требуя отменить запрет профсоюзов. "Вы что, опять революции хотите?" - заявила журналистам женщина из толпы, - "Не осталось профсоюзов, только корпорации, которые хотят делать с нами всё, что им вздумается. Нас хотят лишить права голоса!". На помощь полиции прибыли армейские части, но боясь накала ситуации, они не предпринимали каких-либо действий в отношении протестующих."
 united_kingdom_events.23.a: "Пускай забирают свои профсоюзы."
 united_kingdom_events.23.b: "Мы не уступим."
 united_kingdom_events.23.c: "Немедленно подавить протесты."

 united_kingdom_events.24.t: "Рабочие недовольны новым руководством профсоюзов"
 united_kingdom_events.24.d: "Не смотря на то, что правительство не стало трогать профсоюзы, почти все они были вынуждены сменить людей на руководящих постах, поскольку тем, кто сотрудничал с правительством Британского Союза, запрещено оставаться на своих прежних должностях. Это единственное и наиболее мягкое условие, которое Соединённое Королевство поставило перед профсоюзами, но тем не менее, в Шотландии и Уэльсе по этому поводу наблюдается ряд протестных шествий. Самые бескомпромиссные протестующие утверждают, что профсоюзы "встали на скользкий путь сотрудничества с монархистами, которые вновь хотят заковать рабочих в кандалы". Одна из протестных акций вышла из под контроля и была усмирена полицией, с тех пор никаких форс-мажорных ситуаций более не происходило."
 united_kingdom_events.24.a: "Понятно."

 united_kingdom_events.25.t: "Рост недовольства запретом профсоюзов"
 united_kingdom_events.25.d: "В связи с запретом деятельности профсоюзов продолжаются протесты, особенно их активность замечена в Уэльсе и Шотландии. Руководство Лейбористов настаивает, что позволение правительству иметь контроль над профсоюзами неизбежно приведёт к их корыстной эксплуатации. К счастью, запал протестующих начал угасать... однако в то же время появились свидетельства того, как в синдикалистском ополчении значительно увеличилось число новобранцев."
 united_kingdom_events.25.a: "Могло быть и хуже..."

 united_kingdom_events.26.t: "Суд над синдикалистами"
 united_kingdom_events.26.d: "Сегодня началась серия судебных заседаний над пойманными лидерами синдикалистов, среди которых Артур Хорнер, который не так давно самостоятельно сдался полиции. Суд над Хорнером привлёк заметное внимание британских СМИ, в своей речи он заявил о необходимости Британии "смириться со своей историей трудовых отношений и своим будущим". Некоторые недовльны тем, что Хорнеру вообще дали право говорить, поскольку он, кажется, заручился поддержкой многих неравнодушных граждан. Некоторые политики предлагают сделать из судебных заседаний чреду показательных расправ над предателями, другие говорят о том, что суровые решения только приведут к росту популярности Сопротивления."
 united_kingdom_events.26.a: "Приговоры не должны быть жёсткими."
 united_kingdom_events.26.b: "Судить всех показательно, в т.ч. Хорнера."

 united_kingdom_events.27.t: "Протесты против 'показных судов'"
 united_kingdom_events.27.d: "Судебные заседания над синдикалистами подходят к концу, они привлекли к участию в протестах многих рабочих, в том числе сторонников Артура Хорнера. То, что вынесенные приговоры были довольно мягкими, похоже, успокоили общественность, но, несмотря на это протестующие утверждают, что судебных заседаний над синдикалистской верхушкой не должно было быть вообще. Как гласят надписи на некоторых транспарантах, "Им не за что извиняться!". Британская полиция пристально следила за протестами, которые, к счастью, не переросли в волну насилия."
 united_kingdom_events.27.a: "Им нет конца..."

 united_kingdom_events.28.t: "В Олд-Бейли прогремел взрыв"
 united_kingdom_events.28.d: "Протесты против судебных процессов над синдикалистами достигли своей точки кипения, когда рабочие пришли в ярость после того как суд зачитал свой вердикт - виновный по всем статьям, Артур Хорнер получает не менее трёх сроков пожизненного заключения. Начавшийся мятеж в зале суда был подавлен почти сразу же, но даже после этого ночью произошёл всплеск насилия, когда в здание Олд-Бейли влетела бомба. К счастью, во время взрыва, в здании никого не было, однако несколько человек получили ранения."
 united_kingdom_events.28.a: "Какой ужас."

 united_kingdom_events.29.t: "Лейбористский вопрос"
 united_kingdom_events.29.d.notinpower: "Сейчас, когда в перспективе появилась возможность проведения свободных выборов, правительство должно подумать: когда и если состоятся выборы, стоит ли разрешить Лейбористской партии принимать в них участие? Во время заседания парламента, Клемент Эттли, отстаивая позицию своей партии, заявил, что не смотря на то, что Лейбористы сотрудничали с правительством синдикалистов, у них не было большого выбора. Он утверждает, что Лейбористская партия никогда не приходила к власти в Британском Союзе, а всё то, что партия могла себе позволить, ограничивалось лишь попытками облегчить жизнь обычных граждан, и что рабочее движение не должно быть наказано. Есть те, кто ставит под сомнение мотивы Эттли и полагает, что его личное сотрудничество с Союзом само по себе преступно, но также очевидно, что Лейбористы имеют огромную поддержку среди населения. Возможный запрет партии определённо не обойдётся без последствий."
 united_kingdom_events.29.a: "Простить Лейбористов."
 united_kingdom_events.29.b: "Лейбористы могут остаться, но Эттли придётся уйти."
 united_kingdom_events.29.c: "Запретить Лейбористов."

 united_kingdom_events.30.t: "Массовые протесты сотрясают страну"
 united_kingdom_events.30.d: "Запрет Лейбористской партии и арест Клемента Эттли явно не обрадовали британскую общественность. По стране прокатилась волна насилия, в Бирмингеме и Ливерпуле прогремели взрывы, некоторые протесты переросли в столкновения с полицией. Многие считают, что это может быть переломным моментом и может вновь произойти революция, как это уже было в 1925 году. Для помощи полицейским в поддержании порядка были вызваны британские военные. До текущего времени, новых крупных столкновений более не происходило."
 united_kingdom_events.30.a: "Удручающе."

 united_kingdom_events.31.t: "Возвращение аристократов"
 united_kingdom_events.31.d: "Вернувшиеся на родину британские изгнанники, обнаружившие что их земельные угодья поделены, а их дома и поместья больше им не принадлежат, потребовали возвращения своей собственности. Проблема в том, что новые хозяева получили свою собственность законно и, согласно законодательству Британского Союза, лишать их домов незаконно. Вернувшаяся после революции 1925 года аристократия лишь подливает масла в огонь, народ требует решить остро стоящий вопрос собственности раз и навсегда."
 united_kingdom_events.31.a: "Вернуть собственность прежним хозяевам."
 united_kingdom_events.31.b: "Вернуть собственность и выплатить компенсации."
 united_kingdom_events.31.c: "Выплатить компенсацию аристократам."

 united_kingdom_events.32.t: "Объявлены свободные выборы"
 united_kingdom_events.32.d: "После нескольких месяцев приготовлений, временное правительство заявило, что готово провести первые после освобождения Великобритании свободные выборы. Король официально издал приказ о формировании в Палате общин мест для 660 представителей, после чего партии начали проводить свою агитацию. Народ ждёт и волнуется, многие сомневались в намерениях правительства, но теперь они чувствуют, что свобода близка как никогда."
 united_kingdom_events.32.a: "Замечательно!"

 united_kingdom_events.33.t: "Британские выборы [GetYear] года"
 united_kingdom_events.33.d: "Наконец настал тот момент, когда со времени освобождения страны начались первые свободные выборы. Одна из партий наверняка получит большинство мест в парламенте, победителями окажутся..."
 united_kingdom_events.33.a: "Тори."
 united_kingdom_events.33.b: "Либералы."
 united_kingdom_events.33.c: "Лейбористы."

 united_kingdom_events.34.t: "Выборы [GetYear] года"
 united_kingdom_events.34.d: "Британские граждане вновь возвращаются к урнам чтобы проголосовать за партию, которая будет править парламентом в течение следующих четырёх лет. Главными победителями на выборах становятся..."

 united_kingdom_events.35.t: "Отмена свободных выборов"
 united_kingdom_events.35.d: "Сегодня состоялось экстренное заседание парламента, в нём принял участие король [CAN_king_full_name]. Премьер-министр предоставил королю доказательство того, что страна, которая пребывает в большом потрясении, не готова к восстановлению демократии и нуждается в "управляемом парламенте". Как результат, это приведёт к ненадобности проведения выборов в ближайшем будущем. Король [CAN_king_first_name] дал своё согласие и Палата общин проголосовала за кандидатуру Генри Пэйдж Крофта на пост премьер-министра, который он будет занимать по меньшей мере пять лет. Новость об отмене выборов для публики была подобна всплеску холодной воды в лицо. Незамедлительно по всей стране прокатилась волна протестов, британские военные были подняты по тревоге когда до них дошли слухи о том, что синдикалистское ополчение начало проявлять заметную активность."
 united_kingdom_events.35.a: "К хорошему это не приведёт..."

 united_kingdom_events.36.t: "Ночь красных ножей"
 united_kingdom_events.36.d: "При поддержке ополченцев-синдикалистов, на протяжении последней недели бушует восстание. Сегодня ситуация достигла своей кульминации, когда ополченцы предприняли попытку захватить Букингемский дворец и убить короля [CAN_king_first_name] - сделать то, что в случае успеха могло повергнуть в шок всю страну. К счастью, к утру синдикалисты не располагали ни должной поддержкой, ни снаряжением. Ополченцы были разбиты и разбежались, и хотя гнев британцев не угас, для нас очевидно, что повторения революции 1925 года не произойдёт. Со временем, общественный порядок был восстановлен."
 united_kingdom_events.36.a: "Какое облегчение!"

 united_kingdom_events.37.t: "Отчёт Бевериджа"
 united_kingdom_events.37.d: "Ко всеобщей радости, Уильям Беверидж закончил свою работу. Он представил парламенту доклад, официально названный как "Социальное страхование и смежные услуги". В своём докладе, Беверидж в деталях описал пять так называемых "зол", которые вредят гармоничному обществу и мешают восстановить Британию: нищета, невежество, дефицит, праздношатание и болезнь. Для их устранения рекомендуется создать государство всеобщего благосостояния и национальную службу здравоохранения для предоставления бесплатной помощи населению. Излишне говорить, что отчёт Бевериджа оказался чрезвычайно популярен у общественности и нам не составит труда выполнить большинство его рекомендаций."
 united_kingdom_events.37.a: "Неплохие идеи."

 united_kingdom_events.38.t: "Отчёт Пигу"
 united_kingdom_events.38.d: "Ко всеобщей радости, известный экономист Артур Сесил Пигу закончил свою работу. Он представил парламенту доклад, официально названный как "Восстановление частного предпринимательства в британском обществе". В своём докладе, Пигу обрисовывает в общих чертах ряд шагов по честному отъёму британского бизнеса из рук профсоюзов, при этом не передавая богатым все рычаги власти. Наиболее важным шагом на этом этапе является денежная реформа, в которую входит основание новой системы беспроцентного кредитования через новое правительственное банковское агентство. Не смотря на крайнее одобрение правительством, отчёт был раскритикован публикой - многие утверждают, что новая система приведёт к ещё большему социальному неравенству. Однако, правительство не принимает во внимание эти голоса, считая их провокацией синдикалистских агитаторов."
 united_kingdom_events.38.a: "Неплохие идеи."

 united_kingdom_events.54.t: "Вопрос о новобранцах-синдикалистах"
 united_kingdom_events.54.d: "Теперь, когда британская армия была поставлена на ноги, на призывных пунктах толпятся мужчины, которые хотят зачисления... или повторного зачисления, учитывая что многие из них ранее служили в вооружённых силах Британского Союза. В связи с этим возник вопрос: вернём ли мы этих людей в строй? Да, многие из них делают то, что мы им говорим, но среди них точно есть те, которые симпатизируют синдикалистам. Можем ли мы рискнуть и позволить им вступить в ряды нашей армии?"
 united_kingdom_events.54.a: "Пока не будем принимать синдикалистов."
 united_kingdom_events.54.b: "Примем несколько, после тщательного обследования."
 united_kingdom_events.54.c: "Нам нужны люди, принять всех желающих."

 united_kingdom_events.55.t: "Сделка с производителями оружия"
 united_kingdom_events.55.d: "На данный момент, множество британских компаний борются за госзаказ на производство оружия для нашей армии. Ответ на вопрос о том, какую компанию выбрать, зависит от того, на какой части армии мы сосредоточимся. В конце концов, мы приняли решение и пришли к выводу, что выполнение госзаказа следует поручить..."
 united_kingdom_events.55.a: "Webley & Scott"
 united_kingdom_events.55.b: "Birmingham Small Arms Company"
 united_kingdom_events.55.c: "Morris Motors"

 united_kingdom_events.56.t: "[FROM.GetNameDefCap] требует вернуть британские корабли"
 united_kingdom_events.56.d: "As a consequence of the Syndicalist occupation of Britain it largely fell upon the [ROOT.GetAdjective] nation to maintain Britannia's rule of the waves, with many of Britain's fleets ending up under our command in the aftermath. With [FROM.GetNameDef] now liberated and finally beginning to retake its rightful place back on the world's stage, they have requested the return of these ships in order to place them once again under one unified command structure."
 united_kingdom_events.56.a: "Время пришло."
 united_kingdom_events.56.b: "Мы оставим их себе."

 united_kingdom_events.57.t: "[FROM.GetNameDefCap] возвращает британские корабли"
 united_kingdom_events.57.d: "The [FROM.GetAdjective] government has approved of our recent request regarding the transferring of ships, and have placed their navies back under our command to be reorganised into new flotillas as needed."
 united_kingdom_events.57.a: "Отлично."

 united_kingdom_events.58.t: "Государство [FROM.GetNameDefCap] отказалось вернуть корабли"
 united_kingdom_events.58.d: "The [FROM.GetAdjective] government has rejected our recent request regarding the transferring of ships, arguing that it will be more effective if they remain under [FROM.GetAdjective] command for the time being."
 united_kingdom_events.58.a: "Чёрт."

 united_kingdom_events.59.t: "Государство [FROM.GetNameDefCap] требует главенства в Антанте"
 united_kingdom_events.59.d: "Having elevated itself once more back to a global power, [FROM.GetNameDef] has requested that control over the Entente be restored to their leadership, putting them once more in charge of unified foreign policy and granting them control over the IEDC and ISAC."
 united_kingdom_events.59.a: "Конечно."
 united_kingdom_events.59.b: "Время их лидерства прошло."

 united_kingdom_events.60.accepted.t: "[FROM.GetNameDefCap] передало пальму первенства в Антанте"
 united_kingdom_events.60.accepted.d: "Following discussions with the [FROM.GetAdjective] government and its military leadership the Entente has once again been placed under [ROOT.GetAdjective] control, including authority once more over the IEDC and ISAC. It once again falls upon us to guide our allies forward, now from our rightful home once more."
 united_kingdom_events.60.accepted.a: "Отлично."

 united_kingdom_events.60.refused.t: "[FROM.GetNameDefCap] оставило за собой лидерство в Антанте"
 united_kingdom_events.60.refused.d: "Following discussions with the [FROM.GetAdjective] government and its military leadership, our request for the Entente to be placed back under our control has been scorned. It seems that they have decided that it would be more beneficial if it remained under their control for the time being."
 united_kingdom_events.60.refused.a: "Черт."

 united_kingdom_events.61.t: "[From.GetNameDefCap] становится лидером Антанты"
 united_kingdom_events.61.d: "Восстановив свои вооружённые силы и правительство, [From.GetNameDef] вновь вернуло себе лидерство над Антантой. Британские чиновники встретились с военным руководством [old_leader.GetAdjective]ого государства с целью передачи власти и проведения церемонии в Лондоне, на которой [CAN_king_full_name] поблагодарил [old_leader.GetNameDef] за службу и жертву, которою государство понесло ради возвращения Соединённого Королевства на мировую арену."
 united_kingdom_events.61.a: "Мы приветствуем вернувшихся британцев."
 united_kingdom_events.61.b: "Надеемся, будет лучше, чем в прошлый раз."

 united_kingdom_events.62.t: "Программа 'Пять глаз'"
 united_kingdom_events.62.d: "[From.GetNameDefCap] запускает инициативу под названием Программа "Пять глаз", целью которой является обеспечение сотрудничества и объединение усилий разведывательных служб стран Антанты. Если члены альянса согласятся не шпионить друг за другом, а объединят все имеющиеся у них разведданные, то это позволит им работать намного эффективнее."
 united_kingdom_events.62.a: "Давайте приложим усилия."
 united_kingdom_events.62.b: "Это того не стоит."

 united_kingdom_events.64.t: "Программа имперских преференций"
 united_kingdom_events.64.d: "Британское правительство связалось с нами с предложением вступить в их новую инициативу, которые они называют "имперскими преференциями". Ещё до революции эта программа ставила перед собой цель сблизить и поддерживать тесные связи стран Содружества. Развивающиеся страны становятся более агрессивными в своих торговых практиках, и данная система свободной торговли в пределах Содружества позволит не только укрепить наши торговые взаимоотношения, но и упростит взаимопроникновение наших рынков."
 united_kingdom_events.64.a: "Да, приступайте."
 united_kingdom_events.64.b: "Нет, нам это не нужно."

 united_kingdom_events.65.t: "Британско-французские отношения"
 united_kingdom_events.65.d: "Находясь в составе Антанты, отношения между британцами и французами всегда отличались долгой и плодотворной историей, которые, не смотря на неудачи во время Великой Войны, позволили двум странам пережить невзгоды и оказаться на тех местах, которые они занимают сейчас. Британское правительство связалось с французским, желая сделать две вещи: первая, обменяться бывшими колониальными владениями, которых лишились обе страны во время восстаний синдикалистов; вторая, возобновить взаимное соглашение о дружбе и сотрудничестве, поскольку обе страны вступают в новый этап европейской истории."
 united_kingdom_events.65.a: "Конечно."
 united_kingdom_events.65.b: "Разумеется, мы согласны!"
 united_kingdom_events.65.c: "Мы в этом не заинтересованы."

 united_kingdom_events.66.t: "Французы отказываются"
 united_kingdom_events.66.d: "Удивительно, но текущее французское правительство отказалось от нашего простого предложения. Неужели их представления о наших взаимоотношениях значительно отличаются от наших?"
 united_kingdom_events.66.a: "Почему французы постоянно ведут себя как французы..."

 united_kingdom_events.67.t: "Судьба [return_state.GetName]"
 united_kingdom_events.67.d: "[From.GetNameDef] было восстановлено, его представители обратились к правительству [Root.GetAdjective]ого государства с просьбой вернуть территорию [return_state.GetName], которую [From.GetAdjective] считает своей законной частью."
 united_kingdom_events.67.a: "Конечно, мы вернём им землю."
 united_kingdom_events.67.b: "Нет, думаю нет."

 united_kingdom_events.68.t: "Виктория Британия"
 united_kingdom_events.68.d: "Сегодня британское правительство объявило о завершении строительства "Виктории Британии" - расположенной на холме над бухтой Галифакса 120-футовой (36-метровой) статуи, которая чествует победу Канады над Британским Союзом и благодарит канадцев за оказанную британской монархии помощь в возвращении на родные острова. Британский премьер-министр [GetBritishExilePM] произнёс речь перед огромной, полной энтузиазма толпой, превознося канадские правительство и вооружённые силы, обещая, что отныне [CAN.GetNameDef] и [GBR.GetNameDef] будут всегда иметь особенно дружеские отношения. Церемония завершилась минутой молчания в честь тех, кто погиб в борьбе за освобождение Британии, и после, торжественным обещанием премьер-министра, что такие усилия и жертвы союзников Британии больше никогда не понадобятся."
 united_kingdom_events.68.a: "Более благодарными мы быть не можем."
 united_kingdom_events.68.b: "Мы ценим данное начинание."
 united_kingdom_events.68.c: "Достойный момент."

 united_kingdom_events.69.t: "Вестминстерская декларация [GetYear] года"
 united_kingdom_events.69.d.allthree: "Несколько месяцев британский парламент обсуждает принятие билля о доминионах, таких как [CAN.GetNameDef], [AST.GetNameDef] и [SAF.GetNameDef] — все они де-факто обрели независимость со времён распада Соединённого Королевства в 1926 г. [GBR.GetNameDef] было восстановлено и текущий правовой статус доминионов теперь закреплён в декларации: бывшие доминионы признаются "юридически независимыми, свободными в поиске своего пути в мире, в составе Содружества или вне его, как равные партнёры государства [GBR.GetNameDef]". Некоторые считают декларацию признанием сложившегося более десятилетия положения дел, которая лишь окончательно закрепит статус правительств доминионов."
 united_kingdom_events.69.d.canast: "Несколько месяцев британский парламент обсуждает принятие билля о доминионах, таких как [CAN.GetNameDef] и [AST.GetNameDef] — оба де-факто обрели независимость со времён распада Соединённого Королевства в 1926 г. [GBR.GetNameDef] было восстановлено и текущий правовой статус доминионов теперь закреплён в декларации: бывшие доминионы признаются "юридически независимыми, свободными в поиске своего пути в мире, в составе Содружества или вне его, как равные партнёры государства [GBR.GetNameDef]". Некоторые считают декларацию признанием сложившегося более десятилетия положения дел, которая лишь окончательно закрепит статус правительств доминионов."
