 MIT_mitteleuropa_modifier_desc: "Официально именуемый Центральноевропейским экономическим союзом, Миттельевропы - это таможенный и экономический союз, объединяющий Германию и ее сферу влияния, созданный после Великой войны. Государства - члены Центральной Европы оценивают влияние этого соглашения неоднозначно - в то время как экономические связи с Германией выгодны, соглашение в значительной степени тяготеет к Германии."

