 mitteleuropa_open_button: "§YМиттельевропа§!"
 mitteleuropa_open_button_desc: "[ROOT.GetMitteleuropaButtonDesc]"
 mitteleuropa_open_button_desc_enabled: "Центральноевропейский таможенный союз, также известный как §HМиттельевропа§!, является экономическим альянсом, объединяющим германский блок, неудобным компромиссом между превосходством Германии и прогрессивным видением общеевропейского сотрудничества.Его внутренняя структура сложна, но его ключевыми институтами являются §HКонференция Миттельевропы§!, саммит делегатов из всех государств-членов, который проводится каждые шесть месяцев, и §HКомиссия Мительевропы§!, бюрократический орган, контролируемый государствами-членами, §HПрезидент§! которого переизбирается на каждой конференции.\n\nВо §Hвкладе§! Миттельевропа, вы можете узнать кто Президент сейчас, кто является членом Миттельевропы, и список возможных §Hповесток§! на следующую конференцию. Каждый член Миттельевропы может инвестировать §Hполитическую власть§! для продвижения выгодной им повестки дня или попыться выдвинуться в §HПрезиденты Миттельевропы§!. В конце цикла и в начале следующей конференции Президент выберет и активирует §Hодну§! повестку дня из трех наиболее популярных. Затем состоятся новые президентские выборы, и цикл продолжится.\n\nКак основатьль, и как самая сильная страна, §H[GER.GetNameWithFlag]§!имеет доступ к дереву фокусов, чтобы открывать новые типы повесток дня и инициировать реформу Миттельевропы - так же как §Hсклонить конференцию к их выгоде...§!\n\nПрезидентом Миттельевропы является §Y[MIT.GetNameWithFlag]§!\nСледующее заседание Миттельевропы состоится примерно через §Y[GER.GetMitteleuropaNextElection]§!."
