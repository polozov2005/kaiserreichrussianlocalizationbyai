 princely_federation_events.348.t: "Слухи об измене"
 princely_federation_events.348.d: "Сказать, что Низам в настоящее время непопулярен в Федерации, было бы всё равно, что сказать, будто русские были несколько обеспокоены Брест-Литовским миром. Его неоднократные вето на основные правительственные решения, правительство, поддержанное и избранное большинством избирателей страны, привели к тому, что его тщательно продвигаемый образ спасителя нации разрушался быстрее, чем земли вокруг Тисты.\n\nВ результате этой растущей непопулярности остатки социалистов реорганизовались вокруг остатков Коммунистической партии Индии, создав значительную силу, нацеленную на свержение Низама и проведение реформ, которые он так долго блокировал. Хотя обычно эта группа не имела бы большого влияния и была бы просто раздавлена вместе с другими диссидентами, начали распространяться слухи о сотрудничестве между Хинду Масахабха и этими повстанцами из-за их общей ненависти к Низаму.\n\nОпасаясь, что сам Рао вскоре может поддержать это потенциальное восстание, Разви и его Разакары предложили попытаться арестовать Рао и устранить этих социалистов, как только будет отдан соответствующий приказ. Готов ли Низам зайти так далеко, пока неясно..."
 princely_federation_events.348.a: "Рао никогда не следовало доверять, прикажите его арестовать!"
 princely_federation_events.348.b: "Любые действия только усугубят ситуацию, не вмешивайтесь."

 princely_federation_events.349.t: "Декканское восстание"
 princely_federation_events.349.d: "Хотя Рао, возможно, и выражал в частном порядке свой гнев по поводу чрезмерной власти Низама, до тех пор, пока ему не просочились новости о его аресте, он даже не начинал думать о восстании. Однако почти сразу же действия Низама толкнули его прямо в объятия повстанцев, а взаимные контакты между Хинду Масахабха и КПИ быстро спровоцировали восстание при поддержке правительства. Учитывая теперь катастрофическую популярность Османа, мало кто был готов прийти ему на помощь, и большая часть армии встала на сторону правительства против него. Сами Разакары быстро разгромлены, хотя сам Разви до сих пор не найден.\n\nУвидев зловещие предзнаменования, Низам и его семья сообщили, что бежали на самолёте, хотя, похоже, никто пока не знает и не согласен с точным местом. Тем временем в стране Рао и его новые союзники поспешили воспользоваться этим моментом и провозгласили республику. Рао был приведён к присяге в качестве президента, а лидер КПИ П. Кришна Пиллаи – новым Диваном. Сам Совет принцев также был распущен, хотя переговоры между принцами и правительством позволили их штатам продолжить существование в качестве субъектов федерации, пусть и с несколько урезанными полномочиями.\n\nХотя с падением Низама ситуация, казалось бы, быстро стабилизировалась, мало кто может точно сказать, что ждёт новую республику в будущем, и многие принцы всё ещё опасаются, что их дни сочтены, если коммунисты получат достаточно влияния. Однако пока большинство людей просто рады избавиться от тирана, не желая отвлекаться на будущие заботы."
 princely_federation_events.349.a: "Тирании Османа пришел конец!"

 princely_federation_events.350.t: "Окончательное уничтожение Раджа"
 princely_federation_events.350.d: "После торжественного заявления Совета, подписанного Низамом, все оставшиеся территории Федерации, за исключением, конечно, Мадраса, вновь оказались в руках индийского правителя. Будь то округа, освобождённые от социалистов, или провинции, присоединённые к Доминиону, теперь они должным образом разделены и переданы законным владельцам. Даже в Дели великий дом Бабура был восстановлен на троне в знак признания роли династии Моголов в изначальной войне за независимость, которая, к сожалению, привела к их изгнанию Великобританией.\n\nПочти сразу же Совет принял решение праздновать этот день как государственный праздник, отмечая, по их словам, \"окончательное уничтожение британского владычества\". Впервые за столетия страна наконец-то по-настоящему освободилась от внешнего господства и, наконец, получила возможность стать той великой державой, которой ей всегда было суждено быть."
 princely_federation_events.350.a: "Все возвращается на свои места."

 princely_federation_events.351.t: "Раздел Мадраса"
 princely_federation_events.351.d: "Союз с Мадрасом всегда вызывал споры, поскольку многие желали уничтожения и замены этого несостоявшегося остатка британского правления, а не принятия его как равного. Однако он всегда рассматривался как необходимое зло, пока социалисты представляли собой активную угрозу, во многом схожую с союзом, заключенным с Британским Доминионом. Как союз с Доминионом был расторгнут после разгрома социалистов, так же должен быть расторгнут и союз с их тамильским наследником.\n\nСегодня утром Совет опубликовал новое заявление, наконец-то положившее конец этому нерешённому вопросу. Аргументируя, что его действия необходимы для окончательного оформления независимости страны от Великобритании, Совет постановил упразднить автономию Мадраса, а его земли разделить между князьями. Единственным исключением из этого раздела на данный момент является сам город Мадрас, по которому пока не принято решение о том, кто его получит. Протесты в Мадрасе против этих действий были быстро подавлены федеральными войсками, и хотя правительство Мадраса решительно возражало против этих действий, никто пока не проявил достаточно смелости, чтобы перейти от слов к действиям."
 princely_federation_events.351.a: "Ошибка наконец-то исправлена."

 princely_federation_events.352.t: "Первое заседание Палаты князей"
 princely_federation_events.352.d: "После принятия закона Советом, автоматически утвержденного Османом, как это сейчас принято, Палата князей была полностью преобразована в полноценное законодательное собрание. Новая Палата князей была сегодня торжественно открыта самим диваном, а Осман присутствовал на церемонии в сторонке. Поскольку это была первая сессия, всё, конечно, началось довольно непросто, поскольку многие принцы всё ещё пытались понять, что именно означает для них новая ситуация. Тем не менее, даже если они ещё не до конца это осознали, общее настроение в Палате было довольно позитивным, и многие старшие члены были рады наконец стать частью индийской нации, которая действительно уважает их роль, в отличие от былых времён британского правления."
 princely_federation_events.352.a: "Правильно! Правильно!"

 princely_federation_events.170.t: "Федерация хочет присоединиться к [Root.GetFactionName]"
 princely_federation_events.170.d.japan: "Национальное правительство в Хайдарабаде недавно объединило государства-преемники субконтинента. Новое индийское правительство выразило желание присоединиться к нашему альянсу и способствовать пробуждению народов Азии.\n\n Каково мнение имперского кабинета?"
 princely_federation_events.170.d.germany: "Национальное правительство в Хайдарабаде недавно объединило государства-преемники субконтинента. Новое индийское правительство выразило желание присоединиться к системе Рейхспакта и продолжить борьбу с синдикализмом в Азии.\n\nОднако ожидается, что индийцы потребуют уступок в отношении наших колоний на субконтиненте."
 princely_federation_events.170.d.russia: "Национальное правительство в Хайдарабаде недавно объединило государства-преемники субконтинента. Новое индийское правительство выразило желание присоединиться к нашему альянсу ради укрепления стабильности и национального согласия во всей Евразии.\n\nС таким союзом сипай и казак, несомненно, будут доминировать на континенте!"
 princely_federation_events.170.a: "Конечно, мы приветствуем их!"
 princely_federation_events.170.b: "Нет,спасибо."

 princely_federation_events.171.t: "Федерация Раджей присоединяется к [From.GetFactionName]"
 princely_federation_events.171.d.japan: "[FROM.GetNameDefCap] приняли наше предложение и позволили нам присоединиться к [From.GetFactionName]!"
 princely_federation_events.171.d.germany: "Немцы рады видеть, что мы присоединяемся к общему делу уничтожения проклятых синдикалистов. Теперь мы часть [From.GetFactionName]а!"
 princely_federation_events.171.d.russia: "Русские приняли наше предложение! Сегодня родился новый глобальный альянс, который определит судьбу мира!"
 princely_federation_events.171.a: "Отлично!"

