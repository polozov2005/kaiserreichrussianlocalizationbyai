### Bookmark ###
 PRF_KR_gathering_storm_desc: "Когда по Индии прокатилось восстание, оно вселило большой страх во многих раджей, которые верили, что мятежники вытеснят их, как они вытеснили британцев. Считая Раджу полностью разрушенным, они провозгласили бы свою независимость как \"Всеиндийскую федерацию\" под руководством Османа Али Хана, в просторечии известную как Федерация Раджей. Несмотря на первоначальные неудачи, Федерация продержалась до прекращения огня в 1927 году и вскоре после этого заключила оборонительный пакт с новым доминионом. Однако выживание Федерации все еще находится в состоянии нестабильности, а оппозиция авторитарному правлению Османа усиливается с каждым днем."

