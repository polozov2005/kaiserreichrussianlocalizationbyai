 PRF_guide: "§MПринять тутул Кайсар-и-Хинд§! / §MОтец Федерации§! (§PПатернализм§!)\n£white_dot Имейте баланс сил на уровне §MЧастичный контроль Низамом§!, §MСильный контроль со стороны Низама§! или §MПолное господство Низама§! на январь 1937.\n£white_dot После объединения Индии вы сможете провозгласить Федеративную империю Индии, а Осман примет титул Кайсар-и-Хинд.\n\n§MФедеральные выборы§! (§aАвторитарная демократия§! / §mРыночный либерализм§!)\n£white_dot Имейте баланс сил на уровне §MОспариваемое господство§! на январь 1937.\n£white_dot Во время национальных выборов, назначьте Мадапати Рао главой §mАндхра Махасабха§!, возьмите власть в свои руки или назначьте Рамасвами Айера главой §aНационального правительства§! и сдерживайте радикалов.\n\n§MПравление Раджей§! (§aАвторитарная демократия§!)\n£white_dot Имейте баланс власти на уровне §MЧастичный контроль раджей§!, §MСильный контроль раджей§! или §MПолный контроль раджей§! на январь 1937."

### Events ###
 princely_federation_events.1.t: "Непростая годовщина"
 princely_federation_events.1.d: "В преддверии зимних каникул, когда Федерация вступает в десятый год своего существования, члены Великого Совета Раджей вновь отправились в Хайдарабад на предстоящую сессию. Хотя эти сессии никогда не отличались особой теплотой, особенно в последние годы, начали циркулировать слухи о том, что может произойти на этот раз, в связи с растущим недовольством между низамом, главой Совета, и его четырьмя остальными членами. Хотя эти князья, которых в разговорной речи называют \"Большой четвёркой\", не сходятся во мнениях по всем вопросам, они стали практически единым целым в своём противостоянии авторитаризму Османа.\n\nСуть их разногласий с ним кроется в особом статусе, предоставленном Осману в соответствии с учредительной конституцией Федерации, которая наделила его полномочиями, изначально предназначенными только для чрезвычайных ситуаций. Однако с каждым годом, прошедшим с момента основания Федерации, низам всё чаще прибегал к этим полномочиям, накладывая вето даже на самые обыденные предложения по, казалось бы, самым незначительным причинам.\n\nВ качестве одного из последних действий перед зимними каникулами низам наложил вето на предложение, поддержанное всеми четырьмя другими князями, о финансировании расширения Бомбейского университета, по всей видимости, исключительно из-за незначительной ссоры с одним из преподавателей, что привело к бурному спору. Слухи об этом споре быстро распространились среди широкой публики, и последовавшие за ним слухи о тайных встречах «Большой четвёрки» неудивительно, что люди ожидают чего-то важного в ближайшие дни."
 princely_federation_events.1.a: "Трудно сказать, проживет ли Федерация еще десять лет, если так пойдет и дальше..."

 princely_federation_events.2.t: "Собрание Совета"
 princely_federation_events.2.d: "Поскольку зимние каникулы уже закончились, а члены Совета благополучно прибыли в Хайдарабад, первые несколько дней этой сессии пока прошли на удивление спокойно, несмотря на сильное напряжение, витавшее в воздухе.Несмотря на то, что вопросы, которые обсуждались в течение этих первых нескольких дней, вряд ли были спорными, Низам еще не воспользовался возможностью наложить вето ни на один из них, и обсуждения в целом продвигались устойчивыми темпами. По всему Хайдарабаду, похоже, многие начали пренебрегать слухами предыдущих недель, хотя, возможно, еще слишком рано говорить об этом..."
 princely_federation_events.2.a: "Я полагаю, что это достаточно приличное начало."

 princely_federation_events.3.t: "Предложение о Национальном Диване"
 princely_federation_events.3.d: "Вполне ожидаемо, что в Совете недолго царило согласие, и, наконец, между Большой четвёркой и Низамом разгорелся новый серьёзный спор. Почти сразу после того, как Низам решил наложить вето на предложение о расширении железной дороги в Каликуте по причине высокой цены, внезапно было представлено новое предложение. Похоже, во время перерыва был составлен план, возглавляемый махараджей Читхирой Тируналом из Траванкора, по решению проблемы чрезмерного использования низамом зарезервированных полномочий. Согласно этому предложению, многие из нынешних полномочий Османа должны были быть переданы Национальному Дивану, который должен был избираться из числа членов Совета путём выборов, проводимых Палатой князей – институтом, унаследованным от прежней британской администрации, в состав которой входят младшие князья Федерации.\n\nПоследовавший за этим поворот событий, пожалуй, оказался ещё менее неожиданным: Низам немедленно воспринял это предложение как прямой выпад против себя, что привело не только к немедленному вето, но и к дальнейшему использованию своих полномочий для временного приостановления работы Совета на оставшуюся часть сессии. Не дав времени на разгоревшийся спор, Осман немедленно покинул здание. Согласно последним слухам, приостановление работы Османа ещё больше возмутило Большую четвёрку, и даже Парамасиван Суббараян, наблюдатель от Мадраса, как говорят, в частном порядке выразил свою поддержку членам, несмотря на несогласие с большей частью их предложения. Что бы ни случилось дальше, очевидно, что этот кризис — только начало, и что Совет не продержится ещё год без радикальных перемен."
 princely_federation_events.3.a: "На этом этапе кажется, что пережить еще один год, не говоря уже о десятилетии, уже слишком щедро."

 princely_federation_events.4.t: "Черный Понедельник достигает Федерации"
 princely_federation_events.4.d: "Несмотря на хаос, охвативший весь мир в результате крушения немецкой авиатехники, многие в Федерации всё ещё были уверены, что он не доберётся до Индии, сознательно игнорируя ситуацию в надежде на новый кризис, наступивший всего через несколько дней после предыдущего. К сожалению для страны, эти надежды не оправдались, и Федерация также пострадала от последствий, во многом благодаря экономическим интересам Германии как в Индии, так и в более широком азиатском регионе.\n\nОднако, как многие считают, кризис в Совете, похоже, пока отошёл на второй план, поскольку низам предпринял неординарный шаг, отменив своё решение о приостановке работы Совета в попытке пережить бурю. Хотя «Большая четвёрка» явно не избавилась от ненависти к Осману за несколько дней, они, по крайней мере, согласились оставить разногласия в стороне и начали возвращаться в Хайдарабад для возобновления сессии."
 princely_federation_events.4.a: "Ничто так не объединяет людей, как хороший кризис."

 princely_federation_events.5.t: "Забастовка на фабриках в Бомбее"
 princely_federation_events.5.d: "Хотя последствия Чёрного понедельника сильно ударили по всем, мало кто пострадал сильнее, чем бедные рабочие фабрик в промышленном центре страны, Бомбее. Выражая свой гнев против системы, рабочие нескольких фабрик в Гирангаоне вышли на забастовку, которая вскоре переросла в аресты многих из этих бастующих после обращения владельцев фабрик в полицию. Вскоре после этого тысячи людей вышли на улицы Бомбея в знак протеста. Между полицией и протестующими вспыхнули стычки, в результате которых пострадали многочисленные люди и был нанесён значительный ущерб местной собственности. После этого было арестовано ещё больше протестующих, в частности, Бхалчандра Тримбак Ранадиве, известный социалистический агитатор, почти наверняка поддерживаемый Калькуттой.\n\nХотя эти беспорядки, похоже, пока подавлены, существуют опасения, что любая искра в настроениях Бомбея всё ещё может легко привести к новой волне насилия. Однако с арестом Ранадиве появилась возможность попытаться хоть как-то успокоить рабочих. Возложив вину на шпионов Калькутты и простив тех, кого они просто ввели в заблуждение, можно попытаться успокоить обстановку и заработать правительству столь необходимое ему расположение."
 princely_federation_events.5.a: "Простите забастовщиков, наказанию будут подвергнуты только шпионы Калькутты."
 princely_federation_events.5.b: "Этим вандалам повезло, что их всего лишь арестовали!"

 princely_federation_events.6.t: "Андхра Махасабха зачищает Мадрас"
 princely_federation_events.6.d: "Несмотря на многочисленные кризисы, обрушившиеся на страну, автономный регион Мадрас не позволил этому помешать проведению выборов, и их результаты начали поступать в последние несколько дней, представляя результаты, которые мало кого шокировали. Партия справедливости, правившая Мадрасом с момента первых выборов в регионе в 1920 году, оказалась разгромленной подъёмом партии Андхра Махасабха, которая теперь является крупнейшей партией в Законодательном совете.\n\nБлиже к концу предыдущего десятилетия Махасабха едва ли могла считаться политической партией, поскольку изначально была создана как группа давления в поддержку языка телугу. Под руководством Мадапати Хануманты Рао она, однако, начала попытки реформироваться в полноценную партию, чтобы участвовать в выборах 1929 и 1933 годов. Хотя поначалу они добились значительных успехов в северных телугуязычных районах Мадраса, в других местах, особенно на преимущественно тамильском юге, успех оказался незначительным.\n\nС 1933 года настроения в Мадрасе довольно резко изменились, во многом из-за ощущаемого застоя в Мадрасе под властью Партии справедливости и её неэффективной реакции на кризис Чёрного понедельника, но, что ещё важнее, из-за гораздо более активного сопротивления Махасабхи вытеснению тамильского языка любым северным языком. Сейчас принято считать, что Сураварам Пратапа Редди, глава партии в Мадрасе, будет назначен президентом провинции первым министром, а Парамасиван Суббараян вновь будет назначен нейтральным наблюдателем штата в Совете Раджей."
 princely_federation_events.6.a: "Мадрас вступает в новую эру, надеемся, к лучшему."

 princely_federation_events.7.t: "Дебаты по поводу налога на соль"
 princely_federation_events.7.d: "Хотя до сих пор Совет в целом придерживался единодушного мнения о политике борьбы с экономическим кризисом, в конечном итоге неизбежно возникнет вопрос, который станет предметом столкновения между Низамом и Большой четвёркой. Сегодняшним вопросом является налог на соль. Соль в Индии облагается налогом уже давно, но при британском правлении этот налог достиг непомерных размеров, и многие называют его удвоение в 1923 году одной из главных причин революции, которая вспыхнула вскоре после этого. Когда Федерация только образовалась, Низам и Большая четвёрка коллективно согласились отменить повышение 1923 года, но даже сейчас налог на соль остаётся одним из основных источников федерального дохода.\n\nОднако в условиях продолжающегося экономического кризиса даже нынешний налог на соль постепенно стал восприниматься почти таким же грабительским, как и при британцах, что, по-видимому, особенно усугубили социалистические агитаторы с севера границы, где такого налога больше нет. Для Большой четвёрки снижение налога кажется очевидным решением, даже если это может привести к значительному сокращению доходов Федерации.\n\nТакое предложение встретило решительное сопротивление со стороны Низама, человека, чья часто известная скупость не позволила бы ему заплатить даже три анны за порцию мороженого, если бы он считал его недостаточно качественным. Однако принятие этого предложения не считается совершенно невозможным, поскольку низама часто удавалось склонить на свою сторону с помощью подходящих моральных аргументов, поэтому только время покажет, удастся ли раджам добиться успеха с таким подходом."
 princely_federation_events.7.a: "Народ не может больше страдать, снизьте налоги."
 princely_federation_events.7.b: "Мы не можем позволить себе поддаться жадности крестьян."

 princely_federation_events.8.t: "Предложения касательно государства Махараштра"
 princely_federation_events.8.d: "Хотя южная Индия теперь, возможно, и свободна от британского правления, ей ещё предстоит полностью избавиться от административных шрамов, оставленных этим правлением, и многие территории по-прежнему находятся в неловком внутреннем неопределённом положении. В то время как бывшее Мадрасское президентство, возможно, мирно вошло в состав Федерации в качестве составного штата, этого нельзя сказать о Бомбейском президентстве, чьё отсутствие сильного совета привело к его быстрому разделению местными князьями. На юге президентства Колхапур особенно воспользовался возможностью значительно расширить свои границы, ещё больше укрепив свой статус в Совете. Всё закончилось тем, что низам издал указ о том, что все земли к северу от Пуны будут находиться под управлением Хайдарабада до достижения надлежащего соглашения о разделе земель, возникшего из-за стычек между князьями.\n\nНесмотря на некоторые официальные изменения, внесённые в последующие годы, в частности, на передачу Насика и прилегающих территорий Бароде в качестве новой столицы, в то время как сама Барода оставалась под социалистической оккупацией, ситуация практически не изменилась со времён революции. Однако, в попытке исправить положение, идея, витавшая в Палате князей, наконец-то добралась до Совета. Согласно этому решению, оставшиеся земли в Бомбее будут объединены с землями, всё ещё принадлежащими Бароде, в штат Махараштра, возглавляемый Саяджирао Геквадом, а Барода будет передана другому члену династии в случае её восстановления.\n\nХотя это предложение, несомненно, пользуется популярностью и рассматривается как справедливая компенсация члену Совета, Осман по-прежнему не желает отказываться от контроля над территорией, особенно над самим городом Бомбей. Склоняясь к сохранению контроля, низам также рассматривал альтернативное предложение Акбара Хидари о разделе оставшейся территории между всеми местными князьями, при этом Бомбей останется под прямым контролем Османа. Поскольку территория находится под контролем низама, решение о её будущем полностью зависит от него."
 princely_federation_events.8.a: "Было бы справедливо, если бы Геквад получил компенсацию."
 princely_federation_events.8.b: "Бомбей будет разделен между местными князьями."
 princely_federation_events.8.c: "Эта земля по праву принадлежит Низаму!"

 princely_federation_events.9.t: "Создание Декканской футбольной федерации"
 princely_federation_events.9.d: "Уже около полувека в Индии регулярно играют в футбол – один из немногих импортированных из Великобритании видов спорта, который до сих пор пользуется большим уважением в Федерации. Поддержка его развития – пожалуй, единственная общая политика Федерации и калькуттского режима. Хотя этот вид спорта исторически был наиболее популярен в Бенгалии, нельзя недооценивать его популярность в Кочине и Траванкоре, а после распада Индии он довольно быстро распространился по всей Федерации, и в Майсуре даже появилась команда, спонсируемая Махараджей Вадияром.\n\nВ связи с растущей популярностью футбола в Федерации и увеличением числа команд в последние несколько лет ведутся разговоры об объединении футбольных ассоциаций Майсура и Мадраса в единую организацию, ответственную за управление этим видом спорта на всей территории страны. Похоже, на прошлой неделе эти переговоры наконец-то принесли плоды. В ближайшие месяцы планируется создание «Федерации футбола Декана», штаб-квартира которой, как ожидается, будет располагаться в Бангалоре. Уже предпринимаются попытки организовать общефедеральную лигу, и клубы «Фергюсон» и «Мадрас Спортинг» уже согласились присоединиться к такому проекту. Хотя ситуация может оставаться напряжённой как в стране, так и за рубежом, подобные достижения в спортивном мире должны, по крайней мере, помочь среднестатистическому человеку легче пережить это."
 princely_federation_events.9.a: "Ничто так не отвлекает, как старая добрая игра."

 princely_federation_events.10.t: "Назначение нового председателя Верховного Суда"
 princely_federation_events.10.d: "По мере того, как страна медленно оправляется от последствий Чёрного понедельника, Совет полностью вернулся к полноценному режиму заседаний, не связанных с чрезвычайными ситуациями, хотя, как и ожидалось, обстановка по-прежнему напряжённая. Сегодняшние разногласия вполне типичны, если не считать того, что Низам, похоже, впервые воздержался от злоупотребления своими полномочиями. Предыдущий председатель Верховного суда Пажаманери Айер объявил о своей отставке несколько месяцев назад в связи с преклонным возрастом. Назначение нового председателя Верховного суда, как правило, должно осуществляться Советом, который в последние месяцы был довольно рассеян. Теперь, когда этот вопрос наконец-то решён, Большая четвёрка и Низам по-прежнему решительно расходятся во мнениях относительно того, кто должен стать его преемником.\n\nВыбранным кандидатом от Большой четвёрки стал Шринивас Варадачариар, известный судья из Мадраса и протеже Пажаманери. Варадачариар рассматривается как естественный преемник на эту должность, а его нейтралитет в отношении текущей федеральной политики считается одним из главных плюсов его назначения. Низам же, в свою очередь, поддерживает Алама Али-Хана по противоположным причинам: Али-Хан родом из Хайдарабада и имеет связи с семьёй как с Османом, так и с его отцом, что делает вероятным его поддержку Низама по ключевым вопросам. Тем не менее, Али-Хан не является чисто кумовским кандидатом, к тому же у него есть свой богатый послужной список, и остальные члены Совета всё ещё могут поддержать его кандидатуру, если Осман откажется от изменений; хотя, поскольку он вряд ли наложит вето на Варадачариара, принцы могут просто стоять на своём и голосовать за него."
 princely_federation_events.10.a: " Варадачарияр отлично справится с этой работой."
 princely_federation_events.10.b: "Низам надеется, что Али-Хан будет править более справедливо."

 princely_federation_events.11.t: "Серебряный юбилей Низама"
 princely_federation_events.11.d: "Сегодня серебряный юбилей Низама, двадцать пятая годовщина его восшествия на престол после, к сожалению, ранней кончины его отца. В то время как в честь этой великой вехи, конечно, были проведены праздничные мероприятия, особенно в связи с тем, что жителям самого Хайдарабада был предоставлен выходной день, чтобы отпраздновать это событие, Осман объявил о еще более масштабном праздновании дурбара, которое состоится в феврале.\n\nЗаявление Низама в целом было хорошо воспринято, несмотря на недавние события, хотя некоторые обратили внимание на кажущийся подозрительным подтекст в его заявлениях о \"великих переменах\", которые совпадут с этим событием, однако многие просто отвергли это как необоснованные домыслы."
 princely_federation_events.11.a: "Долгих лет ему!"

 princely_federation_events.12.t: "Разакары осуждают Совет"
 princely_federation_events.12.d: "С момента своего основания в первые годы существования Федерации, \"Маджлис-и-Иттехадуль Муслимин\" был одним из самых громких голосов в поддержку правления Низама, порывая со многими, чтобы поддержать его постоянное использование вето и других подобных полномочий. Однако сегодня они стали ещё более отчимом, чем когда-либо прежде: их лидер Мухаммад Бахадур Хан открыто призывает к упразднению Совета князей и поддерживает прямое правление Низама Федерацией. Он ясно дал понять, что считает, что Совет лишь сдерживает развитие Индии, заявив, что именно Низам спас Юг от разрушения наступающими на него социалистических банд. Хан также утверждал, что Федерацию следует реформировать для защиты интересов мусульман, а законы Федерации должны быть построены по принципам шариата, при этом заверяя, что индуисты будут освобождены от некоторых положений.\n\nХотя, по слухам, низам в частном порядке поддерживает заявления Хана, он быстро столкнулся с огромным давлением, требующим от него публично дистанцироваться от этих радикальных заявлений, со стороны не только Большой четвёрки, но и многих его ближайших советников. Они ясно дали ему понять, что даже если он и считает Хана правым, было бы глупо хотя бы не успокоить других принцев публичным заявлением. Однако им остаётся лишь надеяться, что Низам прислушается к их доводам по этому вопросу."
 princely_federation_events.12.a: "Такой радикализм не может быть поддержан."
 princely_federation_events.12.b: "А ведь он прав, почему бы и нет?"

 princely_federation_events.13.t: "Продвижение реформы Палаты князей"
 princely_federation_events.13.d: "Палата князей, изначально созданная британцами для того, чтобы голоса индийских князей были услышаны, в Федерации практически не изменилась, за исключением того, что теперь её решения направляются в Совет, а не вице-королю. Хотя иногда предложения из Палаты доходят до Совета, официально вносимые одним из членов Совета, Палата до сих пор оставалась не более чем площадкой для рассмотрения жалоб. Сегодняшнее предложение, выдвинутое Раджарамом III, направлено на изменение этой ситуации, предоставляя Палате консультативную роль в процессе принятия законов. В рамках этого предложения сначала будут представлены на рассмотрение Палаты, прежде чем они вообще попадут в Совет, а князья Палаты дадут свои отзывы и при необходимости потребуют внесения изменений. Затем предложение будет возвращено члену Совета, который сможет доработать его и повторно представить Палате или направить непосредственно в Совет.\n\nКак и ожидалось, низам ясно дал понять о своём несогласии с этой идеей, и, несмотря на свою сдержанность в последние месяцы, он, по крайней мере, дал понять, что может просто наложить вето на предложение, как он делал это уже много раз. Пока что единственное, что остановило его, – это совет его доверенного советника Акбара Хидари, который вместо этого предложил Осману поддержать предложение, утверждая, что оно в конечном счёте даёт Палате мало полномочий, но с его поддержкой он мог бы легко представить его как крупный подарок принцам. Такой подарок, конечно же, значительно укрепил бы позиции низама среди менее влиятельных членов Федерации, что может оказаться полезным, если ему понадобятся союзники против Большой четвёрки, в то время как наложение вето может лишь подтолкнуть людей к их решению. Прислушается ли Осман к этому совету, остаётся только гадать."
 princely_federation_events.13.a: "Знайте, что Низам даровал им эти привилегии."
 princely_federation_events.13.b: "Если так пойдет и дальше, эти возгордившиеся заминдары в следующий раз попросят дворцы самого Низама!"

 princely_federation_events.14.t: "Прокламация о входе в храм"
 princely_federation_events.14.d: "Хотя каста пронизывает все аспекты жизни индуистов в Федерации, вопрос о том, как закон с ней взаимодействует, всегда был вопросом, переданным на усмотрение каждого штата и решаемым им по-своему. В королевстве Траванкор, под управлением старшего махарани и регента Сетху Лакшми Байи, это проявилось в решительном сопротивлении правительства любой правовой защите далитов и жестком соблюдении табу на морские путешествия. Однако правление Байи в качестве регента было весьма спорным из-за ее авторитаризма и первоначального спорного назначения британцами. Когда Читира Тирунал достиг совершеннолетия, он немедленно решил отменить многие из ее решений.\n\nНеудивительно, что сегодня махараджа издал новое заявление, представленное широкой публике его диваном Четпутом Паттабхираманом Рамасвами Айером. В этой декларации молодой махараджа заявил, что \"ни одному из его подданных-индуистов не будет отказано в мире и утешении индуистской веры по причине его рождения, касты или общины\". И, следовательно, ни одному из его подданных никогда не будет отказано в праве посещать храмы в Траванкоре или молиться в них. Хотя эта декларация уже вызвала споры среди некоторых представителей национальной элиты, особенно среди раджи соседнего Кочина, в целом она была воспринята очень хорошо, и другие штаты теперь начинают задумываться о том, стоит ли им сделать аналогичный шаг.\n\nОднако в Хайдарабаде реакция Османа была совершенно иной: Низама мало заботили детали того, как индуисты хотят контролировать друг друга. Вместо этого его внимание привлек Айер, человек, которого многие считали главной силой, стоящей за троном, с момента восхождения махараджи на этот пост. Несмотря на трудности в остальной части Федерации, Траванкор при Айере непропорционально процветал, и хотя Осман ранее знал об этом человеке, теперь он не может не задаваться вопросом, является ли Айер тем решением, которое ему нужно."
 princely_federation_events.14.a: "Низаму нужны такие люди, как Айер...."

 princely_federation_events.15.t: "Встреча с Айером"
 princely_federation_events.15.d: "Не в силах выбросить эту мысль из головы, Низам недавно обратился к Айеру с частной просьбой о встрече в Хайдарабаде. По прибытии Айера Осман немедленно начал излагать подробности своего конфликта с Большой четвёркой, с которыми Айер уже был близко знаком. Подготовившись, через несколько мгновений после того, как низам попросил его о помощи в разрешении конфликта, Айер начал представлять свой план. Дав понять, что Большая четвёрка никогда не отступит, пока власть низама остаётся бесконтрольной, Айер вместо этого предложил способы контроля над низамом без дальнейшего расширения полномочий остальных членов Совета. Для этого его план предполагает, что вместо того, чтобы член Совета исполнял обязанности национального дивана, следует учредить выборную национальную ассамблею, из которой Осман будет назначать дивана для выполнения большинства ежедневных задач Федерации.\n\nАйер также ясно дал понять, что, хотя этот план, конечно, ограничит власть низама, он ещё больше ограничит власть его соперников, поскольку Осман по-прежнему сохранит право назначать диванов, а также право накладывать вето на законы, принятые собранием. Хотя Низам поначалу не был убеждён в этой идее, он насторожился, услышав это объяснение. Его мнение ещё больше укрепилось, когда Айер объяснил, что, исходя из своих отношений с Вармой, он точно знает, что «Большая четвёрка» будет умиротворена таким сценарием, поскольку, по их мнению, это ограничит Низама и укрепит их собственные позиции, поскольку они начали втайне беспокоиться о том, как долго Федерация сможет просуществовать без демократизации. Хотя он и не зашёл так далеко, чтобы сразу принять предложенную идею, очевидно, что низам убеждён в её обоснованности аргументами Айера и, безусловно, будет иметь этот план в виду, когда придёт время."
 princely_federation_events.15.a: "Предложение Айера, безусловно, следует рассмотреть."
 princely_federation_events.15.b: "Такой план вряд ли кажется необходимым, но о нем следует помнить."

 princely_federation_events.16.t: "Разви и разакары"
 princely_federation_events.16.d: "Несмотря на то, что точные подробности встречи низама с Айером не были раскрыты ни с кем, кроме двух присутствовавших, некоторые быстро догадались, что низам ищет помощи для разрешения кризиса в Совете. Одним из тех, кому это удалось, был Касим Разви, генерал федеральной армии и лидер военизированных формирований \"Разакаров\" – радикальной группировки, связанной с \"Маджлис-и-Иттехадуль Муслимин\", берущей начало от оборонительных ополчений, сформированных во время революции. Используя своё положение в армии, он смог быстро организовать встречу с низамом под видом официальной встречи, и именно с неё он начал представлять свой план урегулирования конфликта с Большой четвёркой.\n\nВ разительном контрасте с тактичным и тонким подходом Айера, Разви вновь повторил призывы Бахадур-хана распустить Совет князей и передать власть Осману над Федерацией. В своих аргументах он подчёркивал, что низам, как великий мусульманский правитель, имеет право быть единоличным лидером Федерации. По его мнению, дальнейшее сотрудничество с индуистскими принцами Совета ослабит Федерацию, не позволяя ей отразить вторжение Республики, которая отдаст весь Хайдарабад \"индуистскому сброду\".n\nВ то время как низам оставался неубежденным в жизнеспособности этого плана, Разви дал обещание, что если будет дан приказ, он и его разакары немедленно выступят в защиту Низама, и что, хотя Хан еще не одобрил никаких действий, когда придет время, он тоже поддержит Османа."
 princely_federation_events.16.a: "Если придет время, Низам знает, к кому обратиться."
 princely_federation_events.16.b: "Сотрудничество с радикалами вряд ли кажется разумным..."

 princely_federation_events.17.t: "Грохот в Хайдарабаде"
 princely_federation_events.17.d: "В течение следующих нескольких недель должен начаться большой дурбар по случаю серебряного юбилея низама, который будет отодвинут на второй план тайными заговорами низама против Совета.\n\nХотя никто, кроме Османа, на самом деле не знает, что он замышляет, похоже, другие постепенно начали понимать его козни, и, несмотря на то, что широкая общественность ничего не знает, все постепенно пришли к выводу, что все пойдет не так, как планировалось..."
 princely_federation_events.17.a: "Похоже, конфликт наконец-то достигает своей кульминации."

 princely_federation_events.18.t: "Юбилейный путч" #Princes
 princely_federation_events.18.d: "Намереваясь начать Дурбар с размаха, отдав приказ Разакарам схватить Большую четвёрку и начать роспуск Совета, Осман был весьма удивлён, когда вооружённые люди, ворвавшиеся в его кабинет, направили оружие на него, а не на сопровождавших их принцев. Прослышав о плане Османа, войска, верные «Большой четвёрке», арестовали Разви и его сторонников практически сразу после того, как низам отдал им соответствующий приказ. Затем они двинулись к дворцу короля Коти, вернув ситуацию к настоящему.\n\nНе дав Осману даже слова, Саяджирао Геквад дал понять, что они уличили низама в заговоре и не потерпят его попытки самовольного переворота. Сообщив Осману об аресте Разви и ложно заявив, что в случае его отказа они получат дальнейшую поддержку от своих союзников в Доминионе, а также от Германской империи, они начали излагать планы дальнейших действий.\n\nВскоре после этого Осман был вынужден подписать закон, устанавливающий пересмотренную версию предложения Национального Дивана, полностью лишающую его всех полномочий в Федерации, хотя и подразумевающую символическую уступку ему церемониальной роли лидера для поддержания национальной стабильности. Затем ему сообщили, что вместо объявления о роспуске Совета его главным заявлением станет введение этого закона в действие и немедленная подготовка к выборам в соответствии с ним."
 princely_federation_events.18.a: "Похоже, это конец амбициям Османа..."

 princely_federation_events.19.t: "Юбилейный путч" #Nizam
 princely_federation_events.19.d: "Получив наконец возможность раз и навсегда избавиться от буйных князей, низам прошлой ночью отдал Разви приказ схватить Большую четвёрку, направлявшуюся в Хайдарабад для участия в предстоящем Дурбаре. Низам, доставленный к Осману ранним утром под вооружённой охраной, вкратце объяснил им, что он распускает Совет и что все четверо будут стоять рядом с ним, когда он объявит об этом на предстоящем Дурбаре. Столь смелое заявление вызвало немедленную вспышку гнева у принцев, однако быстрый удар Вармы в живот от «Разакара» быстро успокоил их. Они потребовали объяснений, что будет с ними, даже если они поддадутся угрозам Османа. Им сообщили, что он не желает им дальнейшего вреда и что им будет позволено продолжать управлять своими штатами в составе Федерации до тех пор, пока они будут подчиняться руководству Османа. Дав понять, что Разакары будут направлены в их штаты для обеспечения соблюдения этих \"разумных\" требований, Большая четверка вскоре поняла, что у них не осталось другого выбора, кроме как подчиниться."
 princely_federation_events.19.a: "Эти капризные принцы больше не будут сдерживать Федерацию!"

 princely_federation_events.20.t: "Гамбит Низама"
 princely_federation_events.20.d: "Поскольку многие, особенно Большая четверка, нервничали из-за слухов о заговоре Низама, их приглашение встретиться с Османом в Хайдарабаде перед началом дурбара заставило их беспокоиться о том, что это повлечет за собой. К их удивлению, по прибытии в кабинет Османа их приветствовал не только Низам, но и представители Андхра Махасабхи, Партии справедливости и даже сам Айер. Когда все эти люди собрались вместе, Низам жестом пригласил Айера вперед, чтобы начать излагать планы демократически избранного национального дивана в качестве замены первоначально предложенной Большой четверкой концепции. Шок от такого заявления немедленно ошеломил всех гостей, и никто из присутствующих не знал, как на самом деле реагировать как на саму идею, так и на мысль о том, что Низам готов так добровольно отказаться от своей власти.\n\nЗапросив перерыв для личного обсуждения, Большая четверка воспользовалась этой возможностью, чтобы обсудить представленную идею между собой. Поначалу они считали это всего лишь дешёвой уловкой Османа, но вмешательство Айера показало им, что это действительно может быть правдой, и хотя такое предложение не даст им того уровня власти, к которому они изначально стремились, его принятие всё же решит большую часть их непосредственных проблем, связанных со злоупотреблениями Османа. В конечном итоге, согласившись принять предложение, встреча вскоре возобновилась, и, услышав об их согласии, низам прямо объявил им о своём намерении объявить это изменение частью дурбара и назначить выборы через несколько недель. Хотя все, кроме Айера, покинули встречу с неприятным чувством, что этот компромисс слишком хорош, чтобы быть правдой, они, по крайней мере, были уверены, что на данный момент конфликт разрешён без насилия."
 princely_federation_events.20.a: "Удачный компромисс оставляет всем возможность для интриги."

 princely_federation_events.21.t: "Прокламация Дурбара"
 princely_federation_events.21.d.princes: "После первого долгого дня празднования толпам, присутствовавшим на великом дурбаре, было приказано собраться перед большой сценой, установленной в самом сердце Хайдарабада. Вскоре Низам, в окружении с обеих сторон членов Большой четвёрки, подошёл к микрофону, установленному на сцене. Именно здесь он объявит, что пересмотренная версия проекта Национального дивана принята и подписана им. Закон вступит в силу немедленно после его объявления в этой речи, а полный текст закона будет опубликован публично как можно скорее.\n\nОн также объявил, что через шесть недель состоятся выборы среди членов Палаты князей, которые определят, кто станет первым Национальным диваном, заявив, что и Вадияр, и Варна выдвинули свои кандидатуры на эту должность. Его отсутствие энтузиазма и неестественная манера речи были быстро замечены, и хотя многие просто отмахнулись от этого, посчитав это единичным случаем, быстрый уход Османа со сцены после окончания речи заставил многих задуматься о том, что же на самом деле произошло за закрытыми дверями, что заставило его изменить свое мнение."
 princely_federation_events.21.d.osman: "После первого долгого дня празднования толпам, присутствовавшим на великом дурбаре, было приказано собраться перед большой сценой, установленной в самом сердце Хайдарабада. Вскоре Низам, в окружении членов Большой четвёрки с обеих сторон, подошёл к микрофону, установленному на сцене. Именно здесь он должен был объявить, что после долгих раздумий Совет князей распускается, решение вступает в силу немедленно, и что, по крайней мере, на данный момент низам будет править самостоятельно с помощью доверенных советников.\n\nПотрясённые возгласы толпы быстро потонули в ликовании, исходившем, по-видимому, от большой группы мужчин, рассредоточенных в толпе, с которыми «Большая четвёрка» была близко знакома несколько дней назад. Покинув сцену под громкие крики \"Йа Осман\" и восхваления Аллаха, Низам был уверен, что его новая власть теперь надёжно закреплена на все времена, пока существует Федерация."
 princely_federation_events.21.d.dem: "После первого долгого дня празднования толпам, присутствовавшим на великом дурбаре, было велено собраться перед большой сценой, установленной в самом сердце Хайдарабада. Вскоре Низам, в окружении с обеих сторон членов Большой четвёрки, подошёл к микрофону, установленному на сцене. Именно здесь он объявил, что после встречи с Советом и крупнейшими политическими партиями Федерации было достигнуто соглашение о создании национального законодательного органа по образцу Мадрасского, из состава которого будет избран национальный диван, который возглавит правительство Федерации.\n\nТолпа немедленно разразилась бурными аплодисментами, но после довольно долгой паузы Осман смог продолжить свою речь. Прождав достаточно времени, он объявил, что первые выборы состоятся через шесть недель, а распределение мест будет опубликовано в течение следующих дней и уже предоставлено основным партиям Федерации. После этого пятеро мужчин уйдут со сцены под новые аплодисменты собравшихся."
 princely_federation_events.21.a: "Да начнется правление князей!"
 princely_federation_events.21.b: "Федерация наконец-то сбросит свои оковы."
 princely_federation_events.21.c: "Страна вступает в современную эпоху."

 princely_federation_events.22.t: "Выборы Национального Дивана"
 princely_federation_events.22.d: "Шестинедельный период предвыборной кампании завершился, и махараджи Траванкора и Майсура собрали все возможные благосклонности, и теперь настало время для принцев Палаты проголосовать за первый в стране Национальный диван.\n\nНа данном этапе сложно сказать, кто победит, поскольку, хотя образ Вармы как великого реформатора и модернизатора снискал ему множество сторонников, его юный возраст в сочетании с опасениями, что он будет лишь исполнять волю своего собственного дивана, обеспечил большую поддержку старшему Вадияру. Только окончательный подсчёт голосов сможет ответить на этот животрепещущий вопрос."
 princely_federation_events.22.a: "Молодой махараджа Траванкора одерживает победу"
 princely_federation_events.22.b: "Мудрый Вадияр побеждает своих собратьев-князей"

 princely_federation_events.23.t: "Первые федеральные выборы"
 princely_federation_events.23.d: "По прошествии шести недель предвыборной кампании результаты выборов постепенно начали поступать со всей Федерации. Хотя окончательные результаты ещё не подведены, они показывают, что значительное большинство мест получила партия Махасабха, хотя многие оставшиеся места достались независимым кандидатам и мелким партиям, а также наблюдается небольшое возрождение конкурентов Махасабхи – Партии справедливости. Хотя эти результаты в целом соответствуют ожиданиям, пока неясно, что они означают для выборов дивана.\n\nЛидер Махасабхи Мадапати Хануманта Рао представляется очевидным кандидатом, поскольку его партия получила наибольшее количество мест, хотя отсутствие большинства и радикальные предложения не позволяют Низаму предоставлять им власть. Вместо этого Низам, по-видимому, начал рассматривать назначение Айера, поскольку Айер ушёл с поста дивана Траванкора, чтобы представлять Королевство на национальном уровне. В случае назначения Айера ожидается, что он возглавит беспартийное национальное правительство, состоящее из представителей нескольких партий, включая Махасабху, что, как ожидается, позволит сдержать наиболее радикальные идеи. Тем не менее, подобные действия могут быть расценены как очередной перегиб Низама, и, возможно, для него будет проще всего позволить радикалам выжечь себя, столкнувшись с реалиями политики после назначения Рао."
 princely_federation_events.23.a: "Было бы справедливо назначить Рао Диваном."
 princely_federation_events.23.b: "Айер будет назначен для того, чтобы держать этих радикалов под контролем."

 princely_federation_events.24.t: "Прибытие помощи из Доминиона"
 princely_federation_events.24.d: "Даже несмотря на то, что кризис в Совете остался в прошлом, важно не забывать об истинном враге на севере. Поскольку разведка Доминиона начинает предполагать, что вторжение на обе страны может начаться в ближайшие месяцы, они выявили уязвимости в оборудовании наших вооружённых сил.\n\nХотя они не могут полностью решить эту проблему, они отправили нам крупную партию оружия, чтобы помочь подготовиться к, казалось бы, неизбежному столкновению, раньше, чем кому-либо хотелось бы."
 princely_federation_events.24.a: "Похоже, этот час уже совсем скоро настанет..."

 princely_federation_events.50.t: "Уход Кришнараджи Вадияра IV" #TODO maybe rewrite to improve
 princely_federation_events.50.d: "Один из самых могущественных (и богатых) индуистских правителей страны, Кришнараджа Вадияра IV, скончался поздно вечером в своем королевском дворце в Майсуре.\n\nЕго преемником на посту правителя штата Майсур стал его племянник, тучный и артистичный Джая Чамараджендра."
 princely_federation_events.50.a: "Весь [Root.GetNameDef] оплакивает его кончину!"

 princely_federation_events.51.t: "Смерть Саяджирао Геквада III из Бароды" #TODO maybe rewrite to improve
 princely_federation_events.51.d: "Внушительный и решительный правитель Саяджирао Гэквад скончался сегодня утром в своём дворце в Бароде. Многие скорбели о нём, но Саяджирао был независимым правителем, мало уважавшим британцев и их владычество.\n\nЕму наследует внук, известный расточитель Пратап Сингх Геквад, который, как известно, разделяет националистические взгляды своего деда."
 princely_federation_events.51.a: "Прощай."

 princely_federation_events.52.t: "Смерть Раджарама III"
 princely_federation_events.52.d: "Представитель штата Колхапур сегодня утром сообщил о кончине своего великого махараджи, Раджарама III, которому было всего 43 года. Он был членом «Большой четвёрки» и одним из ключевых основателей Федерации, его наследие останется на века, он пользовался уважением даже у врагов.\n\nУ махараджи была только дочь, и близких взрослых родственников не было, поэтому его наследником был назначен его племянник Шахаджи, нынешний махараджа Деваса-старшего. Отрекшись от престола Деваса в пользу сына, он взошел на трон Колхапура под именем Шахаджи II."
 princely_federation_events.52.a: "Такая раняя смерть для великого человека."

 princely_federation_events.150.t: "Судьба вражеских офицеров"
 princely_federation_events.150.d: "Хотя многие офицеры, сражавшиеся на стороне наших врагов, делали это из идеологических убеждений или личной преданности, среди них всё ещё немало тех, кто делал это просто в силу обстоятельств. Многие бывшие офицеры Калькутты, включая, главным образом, Кодандеру Кариаппу, а также немногочисленные местные жители Лахора, предложили присоединиться к нашим вооружённым силам и поделиться своим опытом в обмен на помилование.\n\nТакое предложение, конечно, заманчиво, поскольку всегда есть потребность в хороших, опытных людях, но помилование этих людей, особенно тех, кто служил социалистам, вряд ли станет популярным шагом, и поэтому теперь необходимо принять непростое решение об их судьбе."
 princely_federation_events.150.a: "Примите их в наши ряды, они могут искупить свои грехи."
 princely_federation_events.150.b: "Принять лахорцев,а головорезам из Калькутты отказать."
 princely_federation_events.150.c: "Этим людям нет искупления, изгоните их навсегда!"

 princely_federation_events.151.t: "Судьба князей-\"лоялистов\""
 princely_federation_events.151.d.default: "Когда Осман объединил южных князей вокруг Национального правительства, не все представители местной королевской семьи Индии встали на его сторону. Многие северные княжества решили присоединиться к остаткам британской власти и добровольно присоединились к их несостоявшемуся Доминиону. Хотя легко понять, что они просто заботились о спасении собственной шкуры, трудно считать их неизменную лояльность на последнем этапе войны чем-либо иным, кроме предательства.\n\nТем не менее, князья сыграли невероятно важную роль в поддержании порядка в регионе, и их полное отстранение было бы слишком поспешным шагом, хотя требование их отречения в пользу более терпимых преемников, безусловно, является вариантом. В качестве альтернативы, хотя это может быть и нелегко, возможно, было бы разумнее интегрировать их в нынешнем составе в действующую администрацию, включив их в состав Федерации и Палаты. При желании это могло бы даже зайти так далеко, чтобы предоставить Хари Сингху из Кашмира место в Совете, положение, которого он заслуживает как могущественный и престижный правитель, и это, скорее всего, во многом убедит этих лоялистов в полной мере сотрудничать с Федерацией."
 princely_federation_events.151.d.osman: "Когда Осман объединил южных князей вокруг Национального правительства, не все представители местной королевской семьи Индии встали на его сторону. Многие северные княжества решили присоединиться к остаткам британских войск и добровольно присоединились к их несостоявшемуся Доминиону. Хотя легко понять, что они просто заботились о спасении собственной шкуры, трудно считать их неизменную лояльность на последнем этапе войны чем-либо иным, кроме предательства.\n\nПоэтому было предложено устроить им показательный пример, объявив их земли конфискованными и конфисковав их для нужд как Османа, так и федерального правительства, ведь разве доктрина прекращения полномочий не является частью британского правления, к которому они так стремятся? Однако такая мера вряд ли получит поддержку, в то время как правительству она крайне необходима, если оно не хочет стать свидетелем нового восстания, и поэтому, возможно, было бы разумнее оставить их как есть, ведь они уже были полностью нейтрализованы своим последним поражением."
 princely_federation_events.151.a: "Требуйте отречься от престола наиболее пробритански настроенных князей, им нельзя доверять."
 princely_federation_events.151.b: "Они будут полностью интегрированы, но Сингх не войдет в Совет."
 princely_federation_events.151.c: "Полностью интегрировать их и предоставить Кашмиру место в Совете."
 princely_federation_events.151.e: "Пусть остаются на своих позициях, никакой угрозы они нам не представляют."
 princely_federation_events.151.f: "Если они так сильно хотят британского правления, покажите им новую доктрину отмены власти!"

 princely_federation_events.250.t: "Назначение Дивана"
 princely_federation_events.250.d: "Хотя власть Османа над страной может быть всеобъемлющей, даже он понимает, что один человек не может управлять буквально всеми аспектами управления такой большой страной, как Индия. У него, конечно, есть советники, но наличие достойной правой руки, которая обеспечит доведение его воли до тех, кто в конечном итоге её исполнит, крайне необходимо. С этой целью он рассмотрел потенциальных кандидатов и сузил свой окончательный выбор до двух человек.\n\nПервый — Акбар Хидари, один из ближайших советников [PRF_GetOsmanTitle], которого Осман уже рассматривал в качестве дивана для Хайдарабада. Второй — Мирза Исмаил, кандидат, имеющий гораздо более слабые связи с [PRF_GetOsmanTitle], чем Хидари, но неоднократно доказавший своё мастерство, побывав в разных штатах страны. Оба кандидата одинаково хороши, и [PRF_GetOsmanTitle] может легко выбрать любого из них, когда примет решение."
 princely_federation_events.250.a: "Акбар Хидари, Садар-и-Азам Хайдарабада, возглавит правительство."
 princely_federation_events.250.b: "Мирза Исмаил исполнит волю Османа."

 princely_federation_events.251.t: "Новый человек на павлиньем троне"
 princely_federation_events.251.d: "Никто никогда не называл низама скромным человеком, за исключением, пожалуй, самого низама, но теперь его неутолимая жажда величия достигла высот, о которых мало кто мог раньше мечтать. Ещё до того, как Дели был отвоеван федеральной армией, грандиозное желание Османа отобрать у британцев императорскую мантию обсуждалось так широко, что едва ли можно было считать это секретом полишинеля, а скорее просто стало достоянием общественности. Спустя несколько дней после капитуляции Доминиона он уже распорядился провести в Дели пышную коронацию, за которой вскоре последовало воззвание об образовании новой империи.\n\nЦеремония началась с перевозки Османа через Дели. Улицы величественного города были до краев заполнены огромными толпами, состоявшими из самых ярых сторонников низама, тех, кто пришёл просто поесть, и даже самых ярых недоброжелателей Османа, желавших осудить его высокомерие. Его целью была большая сцена, установленная перед Красным фортом, поскольку само здание было повреждено и непригодно для проведения церемонии. На этой сцене, возможно, располагалось самое грандиозное из всех украшений – копия могольского Павлиньего трона, на котором Осман должен был восседать, когда его короновали в качестве нового императора.\n\nСама коронация прошла довольно быстро из-за опасений, что наспех собранная сцена не выдержит долгого веса, и уже через несколько минут Осман спустился на другую сцену, чтобы произнести речь, призванную ещё больше укрепить его имидж освободителя Индии. Вскоре после этого он вернулся к своей карете и поехал обратно тем же путем, что и прибыл, вернувшись домой не как Низам, а как великий Кайсар-и-Хинд."
 princely_federation_events.251.a: "Йа Осман!"
 princely_federation_events.251.b: "Знаете, это, возможно, немного претенциозно..."

 princely_federation_events.252.t: "Декларация [ROOT.Capital.GetCapitalVictoryPointName]"
 princely_federation_events.252.d: "Воссоединение Индии и роль Османа в этом процессе – это то, о чём он, вероятно, никогда не позволит никому забыть. Хотя многие ожидали, что низам воспользуется своей славой, чтобы вернуть себе императорскую мантию, принадлежавшую британцам, сегодня он опроверг эти предположения, выступив с величественной декларацией в [ROOT.Capital.GetCapitalVictoryPointName]. Выступая перед большой толпой, состоявшей как из местных жителей, так и из тех, кто приехал в [ROOT.Capital.GetCapitalVictoryPointName] со всей Федерации, чтобы послушать его, Осман заявил о своей приверженности делу восстановления величия страны.\n\nВспоминая свою важнейшую роль в основании Федерации и почти мифологизированную битву при Годавари, он ясно дал понять, что с самого начала никто не был так предан Федерации, как он. Отвергнув любые претензии на трон, он решил вновь укрепить свой имидж великого \"отца Федерации\", заявив далее, что у него в жизни есть только два желания — служить индийскому народу и служить Аллаху, и что принятие императорского титула не принесет пользы ни тому, ни другому.\n\nТакая речь была хорошо принята, особенно теми, кто считал, что консолидация власти Османом обернётся гибелью Федерации. Многие, однако, быстро заметили, что речь не давала никаких гарантий того, что Осман не будет править как император, и не упоминала о планах замены или реформирования Совета князей, а также о прекращении его «временного» бесконтрольного правления страной. Хотя Осман, возможно, пока и отверг этот титул, для этих людей остаётся очевидным, что Федерация по-прежнему остаётся не более чем вотчиной Низама, которой он может править исключительно по своему усмотрению."
 princely_federation_events.252.a: "Низам снова спас нацию!"

 princely_federation_events.275.t: "Триумф разакаров"
 princely_federation_events.275.d: "То, что произошло сегодня утром в [ROOT.Capital.GetCapitalVictoryPointName], можно описать многими словами, но ни одно из них не сравнится с просто \"хаос\". Очевидно, воодушевлённые чрезмерной зависимостью Низама от них, Разакары захватили контроль над столицей, а Диван и все его приближенные были арестованы. Согласно речи, произнесённой Разви, оправданием этого действия является предполагаемая измена. Он заявил, что Диван планировал свергнуть Османа и восстановить полную власть распущенного Совета князей, и что они не могут допустить такой капитуляции.\n\nСам Осман узнал об этом перевороте, когда проснулся от вооружённых Разакаров, ворвавшихся в его спальню, а через час прибыл сам Разви, чтобы объяснить ситуацию. После долгих споров и «убеждений» Разакаров было достигнуто соглашение, по которому Разви был объявлен новым диваном, что предоставило ему неограниченные полномочия пресекать любые дальнейшие предполагаемые измены по всей стране. Беспорядки охватили страну, и большинство её жителей, особенно индусы, опасаются нового ада, обрушившегося на них."
 princely_federation_events.275.a: "Нам следовало застрелить Разви, когда у нас была возможность..."

 princely_federation_events.300.t: "Андхра Махасабха объявляет о cоздании всеиндийской платформы"
 princely_federation_events.300.d: "Несмотря на воссоединение страны, многие северные территории по-прежнему фактически изолированы от остальной части Федерации, особенно в политической сфере, где бывшая правящая партия Индийский национальный конгресс полностью запрещена, а многие её лидеры сейчас мертвы или находятся в заключении. Такая ситуация не может долго продолжаться, особенно учитывая, что отвоёванные территории постепенно интегрируются в Национальную ассамблею, и поэтому в рамках разъяснительной работы Андхра Махасабха объявила о новой грандиозной всеиндийской платформе.\n\nВ рамках этой платформы партия решила сменить название на Хинду Махасабху, что ознаменовало её окончательное превращение из местной группы давления в современный облик индийской политики. Новые офисы Махасабхи вскоре откроются на северных территориях, и один из них уже открылся в Калькутте. Кроме того, что вызывает немало споров, многие из наиболее умеренных членов ИНК и тех, кто сотрудничал с калькуттским режимом, оказались приняты в партию с распростёртыми объятиями. Хотя подобные действия быстро породили уничижительные высказывания, в которых партию называли \"Комитетом возрождения Конгресса\", люди в целом приняли их действия, полагая, что эти действия необходимы для того, чтобы по-настоящему представлять всех индийцев на национальном уровне."
 princely_federation_events.300.a: "Новый Конгресс для новой эпохи?"

 princely_federation_events.301.t: "Угасающий факел и новое пламя"
 princely_federation_events.301.d: "Несмотря на небольшое возрождение во время первых федеральных выборов, несколько недель назад Партия справедливости подтвердила своим членам, что не будет стремиться к расширению деятельности за пределы исконных земель Федерации и, вероятно, отдаст приоритет консолидации своей оставшейся политической базы в Мадрасе, а не борьбе за места в других округах. Это практически подтвердило, что Партия справедливости никогда больше не станет соперницей Махасабхи, и освободилось место для новой оппозиции, и сегодня эта оппозиция наконец-то появилась.\n\nНа конференции в Лакхнау группа видных политиков не только из земель бывшей Республики, но и из Доминиона объявила о создании \"Демократического альянса Бхаратии\". Эта новая партия была сформирована преимущественно остатками Националистической партии Конгресса, организации, в которую перешли многие антисоциалистические члены ИНК, когда руководство стало открыто исповедовать эту гнусную идеологию Запада и её покровителей в Париже и Лондоне.\n\nВо главе с основателем ПНК Маданом Моханом Малавией, БДА быстро завоевал поддержку во многих регионах Индии, особенно в некоторых районах Пенджаба и Синда. Несмотря на то, что партия изначально консервативная, она столкнулась с немалым числом случаев ухода из Либеральной партии, с которой у неё много общего по вопросам индуизма и поддержки среднего класса. Хотя им пока не удалось получить ни одного места, поскольку выборы на севере ещё не проводились, весьма вероятно, что эта партия станет основным конкурентом Махасабхи в обозримом будущем."
 princely_federation_events.301.a: "Сильня оппозиция это хорошо"

 princely_federation_events.302.t: "Выборы на освобожденных территориях"
 princely_federation_events.302.d: "Прошёл примерно год с тех пор, как страна наконец воссоединилась, и были достигнуты значительные успехи в деле полноценного возвращения всех отвоеванных земель, независимо от того, насколько они были коррумпированы за годы правления репрессивных режимов. Именно благодаря этим усилиям на отвоеванных землях наконец-то удалось провести выборы, что позволило им получить представительство наряду с ранее избранными должностными лицами из бывшего ядра Федерации.\n\nПолученные на данный момент результаты ясно показали, что нынешняя система управления, вероятно, не будет нарушена, поскольку Альтернативное движение за независимость (AIM) продолжает успешно работать по всем направлениям, хотя им снова удалось получить лишь относительное большинство, а не полное большинство. Как и ожидалось, партия BDA также добилась неплохих результатов, хотя, возможно, и не таких монументальных, как многие ожидали: многие места, которые они решили оспорить, были завоеваны независимыми кандидатами.\n\nОднако весьма примечательные результаты были получены в Бенгалии, где, похоже, влияние социализма ещё не полностью искоренено. Две партии, претендующие на право наследования власти от ИНК, получили тревожное количество мест в регионе, и, хотя они заявляли о своей лояльности Федерации, мало кто верит их словам. Однако в целом выборы прошли без сучка и задоринки, что может свидетельствовать о том, что худшие годы для Индии уже позади."
 princely_federation_events.302.a: "Убедитесь, что эти новые радикалы находятся под тщательным контролем, просто чтобы быть в безопасности."

 princely_federation_events.303.t: "Человек из Мадраса"
 princely_federation_events.303.d: "Включение Мадраса в Федерацию, наряду с особым статусом, предоставленным ему благодаря республиканскому устройству, всегда было спорным решением. В рамках компромисса, который изначально позволил этому случиться, Мадрасу не было предоставлено равное место в Совете, которое естественным образом предполагалось его размерами и полномочиями. Вместо этого местному правительству было разрешено лишь направлять наблюдателя для защиты интересов штата, но не голосовать за него. Однако сегодня ситуация наконец изменилась: Совет наконец согласился повысить Мадрас до уровня полноправного члена, предоставив ему равные права со всеми, кроме Османа.\n\nДивану пришлось прибегнуть к немалому количеству одолжений, чтобы добиться этого радикального изменения статус-кво. Особенно это касалось «Большой четвёрки», которая не желала рассматривать вопрос о наделении полномочиями человека, не являющегося представителем их собственной партии, хотя в конечном итоге, благодаря достаточному количеству обещаний, они были склонены на свою сторону. С другой стороны, Низам был довольно легко склонен на свою сторону, поскольку, по его мнению, дальнейшее разделение традиционного силового блока «Большой четверки» могло бы только улучшить ситуацию для него, хотя он и не питает иллюзий, что избранный представитель, скорее всего, не сойдется с ним по большинству вопросов.\n\nЧто касается человека, избранного на пост первого полноправного представителя Мадраса в Совете, то неудивительно, что местное правительство вновь рекомендовало Суббарайана. Поскольку он уже много лет занимал прежнюю должность, особенно во время кризиса в Совете, и считался нейтральным кандидатом, вряд ли вовлечённым в партийную политику, его повторное назначение стало практически обыденным. Теперь, когда он стал полноправным членом, именно благодаря ему голоса простых людей наконец-то будут услышаны в великом Совете королевства, что позволит стране сделать ещё один шаг к современности."
 princely_federation_events.303.a: "Будем надеяться, что Суббараян сможет держать обе стороны под контролем."

 princely_federation_events.304.t: "Проблема Андхра-Прадеш"
 princely_federation_events.304.d: "С тех пор, как Хинду Масахабха существовала как Андхра Махасабха, объединение народа телугу в рамках Федерации, пожалуй, было их главной целью. Даже сейчас, находясь у власти, эта цель была труднодостижима, поскольку земли телугу в настоящее время разделены между Мадрасом и личным владением низама. Однако недавнее решение о предоставлении Мадрасу статуса полноправного члена совета завоевало их поддержку в этом вопросе, поскольку они предварительно согласились передать Андхру в состав будущего штата телугу. Однако, как и во многих других случаях, последним препятствием вновь стало убеждение низама.\n\nХотя низам, возможно, и потерял значительную часть своих полномочий в пользу дивана, будучи главой государства одного из членов Федерации, он по-прежнему сохраняет полную власть над своим штатом, и нет другого выбора, кроме как получить его одобрение на любые изменения. Одним из возможных вариантов решения этой проблемы было бы присоединение Андхра к Хайдарабаду, при этом территории телугу в пределах Хайдарабада станут автономией с языком телугу в качестве официального. Однако такое расширение Хайдарабада почти наверняка будет заблокировано другими членами Совета, через которых всё равно придётся принимать решение.\n\nВ качестве попытки компромисса был представлен другой план: присоединить Андхру к Хайдарабаду, отделив Берар и другие нетелегуязычные части Хайдарабада в новый штат, возглавляемый его сыном Моаззамом Джахом или другим родственником низама. Этот план, похоже, имеет гораздо более прочную основу, поскольку частные обсуждения с другими членами Совета подтвердили, что они не будут против, даже если некоторым эта идея в целом не нравится. Однако окончательное решение, конечно же, принимает низам, и пока план не будет ему представлен, невозможно сказать, согласится ли он на такую уступку земель."
 princely_federation_events.304.a: "После некоторых раздумий Осман соглашается на предложение."
 princely_federation_events.304.b: "Низам отказывается подчиниться такому крайнему требованию."

 princely_federation_events.305.t: "\"Я твой раб, хозяин, я кланяюсь твоим ногам\""
 princely_federation_events.305.d: "Полная отмена системы принудительного труда Веттичакири уже много лет является одной из главных целей Хинду Масахабха, уступая лишь истовому отстаиванию языка телугу. Такая практика существует на юге Индии уже много веков и осуществляется дорасами, служащими заминдарам и князьям, причём правление тех, кто придерживается системы веттичакири, известно своей суровостью. В то время как более прогрессивно настроенные князья, и даже те, кто придерживается консервативных взглядов, до сих пор склонны к отмене этой практики, видя экономическую выгоду от отказа от такой феодальной системы, Низам отнюдь не \"прогрессивно настроен\". Крайне маловероятно, что он когда-либо согласится на полный запрет этой практики на своих землях, даже если федеральное правительство попытается её пресечь.\n\nОдин из вариантов, который рассматривают Рао и правительство, чтобы обойти эту проблему, — это запретить эту практику на федеральном уровне, но предоставить низаму исключение, при условии, что он обеспечит максимальное ограничение самых вопиющих проявлений системы. Хотя «АИМ» и не готова пойти на такую лёгкую уступку, это может быть необходимым компромиссом для искоренения этой практики в долгосрочной перспективе. Однако вопрос о том, готов ли низам пойти даже на это, пока остаётся открытым."
 princely_federation_events.305.a: "Дора будет сдержана, и ничего больше."
 princely_federation_events.305.b: "Как Рао смеет выдвигать столь абсурдное требование!"

