### Ideas ###
 #Starting Ideas
 PRF_disorder_in_council: "Разногласия в Совете"
 PRF_disorder_in_council_desc: "Первоначально созданный во время Индийской Революции, Совет князей задумывался как способ для главных шишек Южной Индии коллективно управлять новой независимой нацией. Однако с годами уникальное привилегированное положение, занимаемое низамом в Совете, постепенно привело нацию к тому, что страной руководил исключительно Осман. В подобной ситуации другие члены совета отказались заседать, и теперь только время покажет, продержится ли совет еще долго."

 #Economic Ideas
 PRF_black_monday: "Последствия Черного Понедельника"
 PRF_black_monday_desc: "В то время как растущая зависимость от рынков Германии была необходима для выживания в постимперском мире, крах Берлинской биржи в результате нанес огромный ущерб индийской экономике, как и мировой."
 PRF_federal_railways: "Федеральная железнодорожная компания"
 PRF_federal_railways_desc: "Исторически железные дороги в Индии были разделены между широким кругом собственников, начиная от иностранного капитала и заканчивая самим Османом Али Ханом. В попытке усовершенствовать эту систему, все эти разрозненные железные дороги были переданы в ведение одного центрального федерального предприятия."
 PRF_growth_of_indigenous_business_idea: "Рост местного бизнеса"
 PRF_growth_of_indigenous_business_idea_desc: "Как утверждают ведущие бизнесмены страны, если страна хочет выжить в современную эпоху, она должна способствовать росту местных компаний, а не так сильно привязывать себя к иностранному импорту, как это было исторически. С этой целью правительство [PRF.GetNameDef] вложило значительные средства в местные компании, надеясь построить самодостаточную экономику."

 #Armed Forces Ideas
 PRF_new_federal_army_idea: "Новая Федереальная Армия"
 PRF_new_federal_army_idea_desc: "Первую федеральную армию вряд ли можно было назвать профессиональной силой, поскольку она была поспешно собрана в хаотичные годы индийской революции. Стремясь устранить вызванные этим недостатки, правительство Федерации провело масштабные реформы, чтобы полностью преобразовать его в силу, способную победить любого врага индийского народа."

 PRF_the_first_federal_navy: "Первый федеральный Флот"
 PRF_the_first_federal_navy_desc: "Хотя у Федерации всегда было несколько кораблей, их вряд ли можно назвать военно-морским флотом, поскольку это скорее то, что можно было спасти после распада Британии. Однако такая ситуация не могла продолжаться долго, особенно с учетом того, что [PRF_GetCountryTitle] начинает расправлять крылья, и поэтому их правительство начало финансировать создание надлежащего военно-морского флота, который будет служить нации."
 PRF_divert_funding_to_the_navy_idea: "Перенаправленные средства на флот"
 PRF_divert_funding_to_the_navy_idea_desc: "В стремлении значительно увеличить объем производства военно-морских сил.[PRF.GetNameDef] решила сократить финансирование менее важных проектов, а сэкономленные средства перенаправить в военно-морской флот страны."

 PRF_deccan_air_school_idea: "Декканское авиационное училище"
 PRF_deccan_air_school_idea_desc: "Декканское авиаучилище - ведущая школа пилотов в Хайдербаде. Благодаря государственным инвестициям у нас будут лучшие пилоты на субконтиненте."

 #Osman Ideas
 PRF_father_of_the_federation_idea: "Отец Федерации"
 PRF_father_of_the_federation_idea_desc: "В то время как Осман, возможно, теперь является единоличным правителем Индийской федерации, Низам избегает каких-либо символических повышений статуса, вместо этого предпочитая укреплять свой имидж основателя Федерации. Несмотря на то, что на практике Низам обладает полномочиями, подобными полномочиям национального монарха, он решил изобразить себя просто "первым среди равных", чье великодушное правление приведет Индию к величию."
 PRF_rule_by_firman_idea: "Управление по фирманам"
 PRF_rule_by_firman_idea_desc: "Когда Осман был просто низамом Хайдарабада, в его владениях мало что происходило без его прямого указа, подтверждающего это. Теперь, когда он стал могущественным императором субконтинента, такая администрация распространилась на всю Индию; ожидается, что местные министры и советы будут выполнять его волю, выраженную в фирмане, как можно быстрее."
 PRF_one_nation_under_osman_idea: "Единая нация под руководством Османа"
 PRF_one_nation_under_osman_idea_desc: "Хотя Осман, возможно, и мусульманин, он ясно дал понять, что не намерен править страной как завоеватель, навязывая свои убеждения другим и ставя в невыгодное положение представителей других вероисповеданий. Хотя не всех в стране убеждают такие обещания, его великая чистка от разакаров во многом убедила людей в его намерениях."
 PRF_right_of_conquest_idea: "Право завоевателя"
 PRF_right_of_conquest_idea_desc: "Как заявил лидер разакаров Касим Разви, право Османа править Индией вытекает исключительно из его завоевания ее народов, и побежденным не должно быть предоставлено никаких уступок. Поскольку Осман предоставляет Разакарам неограниченную власть, чтобы гарантировать, что его правление останется безальтернативным, те из \"побежденных\", кто хочет противостоять такому господству, быстро оказываются в центре внимания насилия Разакаров."
 PRF_fight_against_famine: "Борьба с голодом"
 PRF_fight_against_famine_desc: "На протяжении тысячелетий голод был одной из величайших угроз индийскому народу, убивая больше людей, чем любой завоеватель. С учетом того, что в последние десятилетия в мире были достигнуты значительные успехи в области искусственных азотных удобрений, ликвидация голода не за горами, и с этой целью Осман решил массово финансировать эти усилия, чтобы это великое зло никогда больше не угрожало народу Индии."
 PRF_royal_sadaqah_idea: "Королевская Садака"
 PRF_royal_sadaqah_idea_desc: "Авторитарное правление Османа - это не то, с чем индийский народ так легко соглашается, но в том, чтобы быть самым богатым человеком в мире, есть свои преимущества, даже если ему больно тратить одну рупию. Чтобы заручиться поддержкой как можно большего числа своих подданных, Осман увеличил свои личные расходы на многие грандиозные проекты по всему королевству на благо маленьких жителей страны, и, конечно же, назвал эти проекты в свою честь, чтобы напомнить народу об их великом благодетеле."
 PRF_the_charitable_miser: "Милосердный скряга"
 PRF_the_charitable_miser_desc: "$PRF_royal_sadaqah_idea_desc$"

 #Princes Ideas
 PRF_image_of_rajarshi_idea: "Имидж раджарши"
 PRF_image_of_rajarshi_idea_desc: "Раджарши, или царственные мудрецы, - это те представители индуистской правящей касты, которые действительно проявляют чистую преданность и заботу о своем народе, всегда предпочитая обогащать нацию, а не самих себя. Не называя себя таковыми напрямую, руководство Совета князей начало неофициально поощрять продвижение образа каждого из них как раджарши, благородно ведущих нацию вперед и отдающих все, что у них есть, на благо низших каст, которыми они по праву правят."
 PRF_new_supreme_council_idea: "Верховный Совет Индии"
 PRF_new_supreme_council_idea_desc: "Во времена Ост-Индской компании Верховный совет Бенгалии действовал как высший орган власти в Индии, состоящий из четырех основных членов, а пятую должность занимал генерал-губернатор в качестве эффективного главы Совета, хотя, что примечательно, у него не было права вето на принятие решений. Теперь, более века спустя, подобная система возникла снова, но теперь ею управляют местные правители субконтинента, а не колониальные лидеры. Именно через этот новый \"Верховный совет\" выражается истинная воля индийского народа; по крайней мере, по мнению тех, кто его возглавляет."
 PRF_royal_patronage_fund_idea: "Поддержка аристократии"
 PRF_royal_patronage_fund_idea_desc: "Богатые люди должны приносить пользу обществу, и теперь, когда князи Федерации действуют в едином порыве, был создан коллективный фонд, позволяющий каждому князю делать пожертвования на достижение общей цели. Затем этот фонд расходуется на инфраструктуру и развитие по всей стране, коллективно присваиваясь каждому принцу, гарантируя, что каждый индус признает жизненно важную роль, которую каждый князь играет в возвышении нации, а не просто выделяет самых богатых среди них."
 PRF_wall_street_of_asia: "Уолл-стрит Азии"
 PRF_wall_street_of_asia_desc: "Город Мадрас долгое время был важным финансовым центром Индии, и теперь, благодаря усилиям правительства, провозгласившего его \"Уолл-стрит Азии\", в город стало стекаться большое количество иностранных бизнесменов, что принесло значительные экономические выгоды и связи стране."

 #Dem and Iyer Ideas
 PRF_cultivation_of_the_administration: "Совершенствование управления"
 PRF_cultivation_of_the_administration_desc: "Поскольку власть разделена между Советом князей, Национальным собранием и даже партиями внутри Собрания, создание эффективной администрации является, казалось бы, невыполнимой задачей. Однако если и есть кто-то, кто может успешно это сделать, то это Рамасвами Айер, человек, который до сих пор чрезвычайно успешно справлялся с такой сложной задачей."
 PRF_revitalising_the_council: "Оживление Совета"
 PRF_revitalising_the_council_desc: "Хотя исторически сложилось так, что Совет принцев предоставлял право голоса исключительно своим членам королевской крови, представитель Мадраса всегда занимал в Совете место наблюдателя. Теперь, в попытке оживить Совет и еще больше приблизить нацию к современности, Мадрасу был присвоен полноправный статус в Совете, что, наконец, обеспечило дальнейшее представительство простых граждан страны."
 PRF_building_a_mass_movement: "Создание массового движения"
 PRF_building_a_mass_movement_desc: "Всего несколько лет назад Андхра Махасабха, возможно, и была не более чем региональной группой давления, но теперь, став партией, ведущей страну, новая Махасабха добилась больших успехов в привлечении представителей со всей Индии, гарантируя, что она действительно представляет народные массы."
 PRF_the_new_federation_dem: "Новая Федерация"
 PRF_the_new_federation_dem_desc: "Индийская демократия, возможно, не так развита, как в других великих странах мира, но под руководством Хинду Махасабха Федерация добилась больших успехов на пути к созданию подлинно демократической системы, представляющей интересы всего народа страны; это далеко не то же самое, что управляемое принцами государство прошлых лет."
 PRF_the_new_federation_iyer: "Новая Федерация"
 PRF_the_new_federation_iyer_desc: "Индийская демократия, возможно, не так развита, как в других великих странах мира, но под руководством Всеиндийской Махасабхи Федерация добилась больших успехов на пути к созданию подлинно демократической системы, представляющей интересы всего народа страны; это далеко не то же самое, что управляемое принцами государство прошлых лет."
 PRF_the_sovereign_statesman_idea: "Суверенный штатгальдер"
 PRF_the_sovereign_statesman_idea_desc: "Несмотря на то, что Совет князей на бумаге сохранил за собой большую власть, председатель парламента Рамасвами Айер своими реформами добился того, что истинным правителем страны является сам Айер, и ни Совет, ни Ассамблея не могут оспорить его позицию. Несмотря на то, что власть Айера сейчас, возможно, практически абсолютна, он по-прежнему непоколебим в своей цели донести свое видение до нации, а не просто обогатиться, полагая, что он один может по-настоящему модернизировать нацию и повести Индию вперед как новую великую державу."
 PRF_defending_the_downtrodden: "Защита угнетенных"
 PRF_defending_the_downtrodden_desc: "Почти с тех пор, как люди существуют в Индии, среди них всегда была угнетенная группа, будь то далиты, женщины, этнические или религиозные меньшинства. Такое притеснение рассматривается правительством Федерации как пережиток прошлого, которое поставило своей миссией обеспечить защиту и возвышение этих угнетенных групп, чтобы они могли играть равную роль в обществе."

 #Modifiers
 PRF_madras_autonomy_modifier: "Автономия Мадраса"
 PRF_madras_autonomy_modifier_desc: "В соответствии с соглашениями, достигнутыми между новообразованной Всеиндийской федерацией и Законодательным советом Мадраса во время индийской революции, бывший британский президент присоединился к федерации в качестве отдельного члена. В соответствии с этими соглашениями штат Мадрас продолжал функционировать во многом так же, как и при британском правлении, находясь в необычном положении внутри Федерации, поскольку функционирует как демократически избранная республика, а не как абсолютная или исполнительная монархия, как другие штаты.\n\nКроме того, в соответствии с соглашениями, вопросы, касающиеся самого Мадраса, были почти полностью переданы его Законодательному совету, а представитель, выбранный его членами, входит в Совет князей, якобы для того, чтобы Мадрас мог влиять на национальные законы, которые также могут влиять на них."

 PRF_southern_autonomy_modifier: "Автономия для Юга"
 PRF_southern_autonomy_modifier_desc: "В рамках соглашения о воссоединении между Доминионом и Федерацией югу страны была предоставлена значительная автономия для ведения своих собственных дел, в то же время признавая правительство в [RAJ.Capital.GetCapitalVictoryPointName]."

 #Decisions

 PRF_industrialising_the_nation_category: "Индустриализация Индии"

 PRF_begin_the_rajasthan_canal: "Проложить канал в Раджастане"
 PRF_begin_the_rajasthan_canal_desc: "Регион Раджастхан уже давно нуждается в надлежащей ирригационной системе, и интересное предложение главного инженера Bikaner Канвара Саина было одобрено Диваном. В соответствии с этим предложением начнутся работы по забору воды из водохранилища Харике, питаемого многими крупными реками Гималаев, и направлению ее по каналу для снабжения большей части западного Раджастана. Хотя на полное завершение проекта, вероятно, уйдут десятилетия, это, безусловно, проект, в который стоит инвестировать, и даже краткосрочные выгоды могут быть плодотворными."
 PRF_malwa_canal_network: "Развитие сети каналов в Малве"
 PRF_malwa_canal_network_desc: "Подверженный засухе регион Малва в Центральной Индии уже давно нуждается в дополнительных каналах, и, к счастью, Нармада, протекающая через этот район, идеально подходит для этой цели. Вскоре начнутся работы по строительству сети каналов вдоль реки и других небольших близлежащих водоемов, чтобы помочь предотвратить наихудшие последствия любой засухи."
 PRF_expand_doab_irrigration_channels: "Расширить ирригационную систему в регионе Доаб"
 PRF_expand_doab_irrigration_channels_desc: "Верхний Доаб на севере Индии является одним из важнейших регионов по производству продовольствия во всей стране, производя не только большую часть пшеницы в стране, но и конкурируя с Бенгалией по производству риса. Оказание помощи фермерам в регионе путем массового расширения оросительных каналов почти наверняка приведет к еще большему росту производства в регионе."

 PRF_dig_in_digboi: "Раскопки в Дигбое"
 PRF_dig_in_digboi_desc: "Дигбой, как гласит легенда, был назван так после того, как канадский инженер У.Л. Лейк, увидев первые признаки нефти, приказал своим людям "Копайте, ребята, копайте!". Несмотря на то, что нефть была впервые обнаружена почти столетие назад, скважина, по-видимому, почти не эксплуатировалась, и поэтому мы должны приложить все усилия, чтобы исправить эту ошибку и еще больше заработать на этом черном золоте."
 PRF_orissa_bauxite_extraction: "Добыча бокситов в Ориссе"
 PRF_orissa_bauxite_extraction_desc: "Орисса является родиной одних из самых богатых запасов бокситов во всей Азии, однако для сбора и переработки этого все более ценного сырья делается очень мало. Тем не менее, сейчас не так много времени, чтобы приступить к работе, и поэтому расширение нашей горнодобывающей инфраструктуры в регионе должно стать приоритетом."
 PRF_hematite_in_bailadila: "Байладилский гематит"
 PRF_hematite_in_bailadila_desc: "В жизни есть две вещи, которые кажутся неизбежными: первая - это смерть, а вторая - постоянная потребность человека в большем количестве железа. Горный массив Байладила является родиной гематитовой руды довольно высокого качества, которая должна помочь удовлетворить этот большой спрос."
 PRF_bridging_the_teesta: "Наведение мостов через Тисту"
 PRF_bridging_the_teesta_desc: "В регионах Дарджилинг и Сикким много разрозненных населенных пунктов, отделенных друг от друга мощными ущельями, образованными рекой Тиста. Хотя исторически существовали планы по строительству надлежащего моста через реку, они были отложены на второй план из-за революции и ее последствий. Однако сейчас представляется прекрасная возможность возродить эти планы."
 PRF_rebuilding_the_dufferin_bridge: "Перестройка дафферинского моста"
 PRF_rebuilding_the_dufferin_bridge_desc: "Мост Дафферин через Ганг когда-то был одним из величайших мостов в Индии, но был в основном разрушен в ходе битвы за Варанаси. Важность моста для местного города означает, что мы не можем просто позволить ему оставаться разрушенным, и поэтому необходимо приложить огромные усилия, чтобы он снова заработал в полную силу."
 PRF_paving_baluchistan: "Улучшение дорог в Белуджистане"
 PRF_paving_baluchistan_desc: "Возможно, для большинства приграничные районы Белуджистана и представляют собой нечто большее, чем захолустье, но они по-прежнему являются важной частью нации, которую следует развивать вместе со всеми остальными странами. С этой целью мы должны стремиться к созданию надлежащей современной дорожной сети в регионе, позволяющей легко добираться до крупных близлежащих городов, таких как Карачи и Кветта, и обратно, а также путешествовать по региону между Калатом и Хараном."
 PRF_expand_the_sukkur_barrage: "Расширение плотины Суккур"
 PRF_expand_the_sukkur_barrage_desc: "Плотина Суккур обеспечивает орошение фермеров в засушливом регионе Синд, поставляя воду из реки Инд в регионы, которые в противном случае получают очень мало воды. Укрепление ее сооружений и расширение связанных с ней каналов значительно облегчат жизнь местным фермерам."
 PRF_the_pallivasal_hydro_electric_project: "Проект гидроэлектростанции в Палливасале"
 PRF_the_pallivasal_hydro_electric_project_desc: "Гидроэлектростанция Палливасал - это предложение по строительству гидроэлектростанции, которая увеличит выработку электроэнергии в штате Траванкор, а также предоставит новые возможности для ирригации в регионе. Благодаря принятию и дальнейшему внедрению этой установки развитие региона значительно ускорится."
 PRF_subsidise_the_chakhao_plantations: "Субсидировать плантации Чакао"
 PRF_subsidise_the_chakhao_plantations_desc: "Чахао, также известный как черный рис Манипури, является очень питательным растением, выращиваемым в регионе Манипур. Его яркая фиолетовая окраска делает его экзотическим продуктом питания для стран-импортеров за рубежом. Щедрая серия субсидий должна привести к значительному процветанию региона.."
 PRF_uplift_delhi_to_modern_standards: "Приведение Дели к современным стандартам"
 PRF_uplift_delhi_to_modern_standards_desc: "На месте бывшего султаната Дели, бывшей столицы британского Домиона и, возможно, самого желанного города для любого завоевателя, желающего установить контроль над обширным индийским континентом. Однако социалистическое правление не принесло городу абсолютно ничего хорошего. Многие улицы переполнены, индийцы, как сардины, ютятся в плохо построенных квартирах, а трущобы появляются сразу после того, как другие были расчищены. Благодаря масштабным проектам общественных работ Дели, наконец, получит статус города века."
 PRF_invest_in_jubbulpore_armaments: "Инвестиции в оружейную промышленность Джуббалпора"
 PRF_invest_in_jubbulpore_armaments_desc: "В городе Джаббалпур развита военная промышленность, которая сильно пострадала во время гражданской войны. Направив часть капитала в этот сектор, мы будем вознаграждены более мощной военной промышленностью, чем у нас была до этого."
 PRF_karachi_shipyard_project: "Проект судоверфи в Карачи"
 PRF_karachi_shipyard_project_desc: "У порта Карачи была самая неспокойная история за последнее время, он пережил забастовку во время первых последствий Черного понедельника и с трудом справлялся со спросом как единственная крупная гавань бывшего доминиона. Ряд усовершенствований и апгрейдов позволит устранить любые проблемы, которые могут возникнуть в будущем с производительностью, и еще больше улучшить нашу отечественную судостроительную отрасль.."
 PRF_fund_kashmiri_carpet_exports: "Финансировать экспорт кашмирских ковров"
 PRF_fund_kashmiri_carpet_exports_desc: "Кашмирские ковры ценятся богатыми людьми и элитой мира за их замысловатую красоту и исключительное качество изготовления. Мы профинансируем рекламную кампанию и будем субсидировать местных ковроткачей, чтобы наша великая нация получала прибыль от экспорта этого роскошного товара.."

 PRF_issue_executive_firman: "Вопрос о исполнительных фирманах"
 PRF_issue_executive_firman_desc: "В то время как большинство законов проходят через Совет, низам по-прежнему сохраняет за собой право обходить их, когда это необходимо, и принятие закона, который поможет обеспечить благоприятное развитие событий, безусловно, является ситуацией, которая, по его мнению, того требует."
 PRF_rely_on_the_razakars: "Опора на Разакаров"
 PRF_rely_on_the_razakars_desc: "Разакары могут быть опасными жестокими головорезами, но они - опасные жестокие головорезы Низама, и они позаботятся о том, чтобы тем, кто плохо отзывается о нем на публике, напомнили, почему такие действия обычно совершаются за закрытыми дверями."
 PRF_buying_good_will: "Покупка доброй воли"
 PRF_buying_good_will_desc: "Те, кто обладает богатством и властью, обязаны обеспечивать надлежащий уход за своими подопечными, и "Большой четверке", безусловно, не привыкать к такой заботе. В свою очередь, ожидается, что те, кто обеспечен, будут гораздо более охотно поддерживать цели своих благодетелей."
 PRF_combatting_the_nizams_propaganda: "Борьба с пропагандой Низама"
 PRF_combatting_the_nizams_propaganda_desc: "Как так называемый \"Отец Федерации\", Низам проделал значительную работу по созданию национальной легенды вокруг себя, начиная от простых слухов о его добрых делах и заканчивая заявлениями о том, что он сам возглавил атаку, чтобы помешать социалистам перейти Годавари. Приложив немного усилий, такие экстраординарные заявления можно легко опровергнуть как вопиющую ложь, которой они являются на самом деле."
 PRF_concessions_to_the_assemblies: "Уступки Ассамблеям"
 PRF_concessions_to_the_assemblies_desc: "В то время как большинство законопроектов, проходящих через Совет, разрабатываются советниками членов или первоначально в Палате представителей, в некоторых случаях консультативным ассамблеям в каждом штате разрешается представлять свои собственные законопроекты через соответствующего принца. При необходимости принятие ассамблеями некоторых дополнительных законопроектов могло бы усилить влияние этих ассамблей на процесс законотворчества, помогая сбалансировать ситуацию в Совете."

### Focuses ###

 #Economic focuses
 PRF_the_berar_road: "Проложить дороги в Бераре"
 PRF_the_berar_road_desc: "Поскольку с каждым днем становится ясно, что война скоро вернется в Индию, необходимо немедленно начать подготовку к такому повороту событий. В случае нападения с севера Берар почти наверняка станет наиболее активным участком фронта, поскольку является наименее защищаемым участком границы, и поэтому мы должны гарантировать надлежащую сеть снабжения между Хайдербадом и Берарским фронтом, если хотим сохранить хоть какую-то надежду на удержание этого района."
 PRF_merging_the_railways: "Унификация железных дорог"
 PRF_merging_the_railways_desc: "Несмотря на жизненно важную роль, которую играют железные дороги страны, до сих пор не существует центрального органа, осуществляющего надзор за ними всеми. Вместо этого контроль распределен между частными компаниями, иностранными собственниками и многими самими князьями. Чтобы должным образом упорядочить эту неразбериху, было бы разумно объединить эти разрозненные компании, действующие через существующую администрацию гарантированной государством железной дороги Низама."
 PRF_hyderabad_madras_express: "Экспресс Хайдерабад-Мадрас"
 PRF_hyderabad_madras_express_desc: "Мадрас - третий по значимости город на юге Индии, уступающий только Бомбею и самому Хайдарабаду, однако связи между сердцем страны и Мадрасом слишком долго, к сожалению, отсутствовали. Сейчас самое подходящее время, чтобы, наконец, решить эту проблему и установить правильную прямую связь между ними."
 PRF_bombay_to_bangalore: "От Бомбея к Бангалору"
 PRF_bombay_to_bangalore_desc: "Бангалор является важным транспортным узлом, связывающим крайний юг с остальной частью страны, и большая часть сырья, производимого в этих районах, направляется через него в промышленный центр Бомбея. Расширение железнодорожной инфраструктуры между этими двумя городами должно значительно способствовать дальнейшему промышленному росту."
 PRF_importing_european_models: "Импорт европейских моделей"
 PRF_importing_european_models_desc: "Мы не можем с легкостью позволить себе направить значительные средства нашей тяжелой промышленности на производство современных дизельных и электрических поездов полностью с нуля, но их приобретение стало бы большим благом для страны. Чтобы исправить это, мы должны позаботиться об импорте значительного количества моделей из Европы, а также о приобретении сложных в изготовлении деталей, из которых нам будет легче собирать собственные поезда."
 PRF_finish_the_nizam_sagar_dam: "Достроить плотину Низам Сагар"
 PRF_finish_the_nizam_sagar_dam_desc: "Хотя строительство плотины Низам Сагар было начато много лет назад, в результате революции проект так и не был полностью завершен. Поскольку плотина уже находится в почти готовом состоянии, было бы глупо просто не выделить ресурсы, необходимые для того, чтобы довести ее до конца, особенно учитывая огромные преимущества в области электроснабжения и ирригации, в которых мы остро нуждаемся."
 PRF_shroff_development_plan: "План развития Шроффа"
 PRF_shroff_development_plan_desc: "В ответ на кризис Черного понедельника команда экономистов и промышленников во главе с Ардеширом Шроффом разработала план развития, призванный обеспечить быстрое восстановление после этого временного экономического шока. Сам по себе план предусматривает более активное вмешательство в интересах индийского бизнеса, импорт новых сортов сельскохозяйственных культур для обеспечения более высоких урожаев и более активное вовлечение местных компаний в эксплуатацию наших многочисленных неиспользованных ресурсов."
 PRF_hope_wheat_trials: "Урожай надежды"
 PRF_hope_wheat_trials_desc: "Опасения, что нас отделяет всего один неудачный сезон от массового голода, и количество времени, которое необходимо уделять сельскому хозяйству, чтобы просто поддерживать нацию, - это две самые серьезные проблемы, стоящие перед потенциалом роста Федерации, особенно на западе, зависящем от пшеницы. В попытке решить обе эти проблемы мы договорились об испытании новых сортов сельскохозяйственных культур, происходящих из Америки, которые, как утверждается, устойчивы к таким распространенным заболеваниям, как ржавчина, и при этом значительно повышают урожайность."
 PRF_andhra_irrigation_schemes: "Ирригационные системы Андхры"
 PRF_andhra_irrigation_schemes_desc: "Регион Андхра является одним из самых важных районов производства риса на всем субконтиненте, и нам еще предстоит приблизиться к пределам потенциального урожая, которого мы можем достичь. При достаточных инвестициях в улучшение ирригационной инфраструктуры в регионе мы сможем расширить жизнеспособные сельскохозяйственные угодья, а также обеспечить дальнейшее производство риса в сезон Раби."
 PRF_prioritise_indigenous_business: "Приоритет внутреннему производителю"
 PRF_prioritise_indigenous_business_desc: "В условиях полностью свободной системы многие индийские предприятия просто не смогут сравниться со своими гораздо более прочными иностранными конкурентами. Чтобы страна снова не оказалась под властью иностранного бизнеса, мы должны гарантировать экономическую защиту, чтобы наши собственные предприятия могли процветать достаточно долго, чтобы конкурировать с этими иностранными тяжеловесами.."
 PRF_favouring_a_private_approach: "Предпочтение частным подрядчикам"
 PRF_favouring_a_private_approach_desc: "Хотя мы можем гарантировать защиту индийскому бизнесу, мы не можем рисковать, просто отказываясь от основ капитализма, чтобы не стать второй Калькуттой. Поэтому важно обеспечить, чтобы там, где это возможно, мы поддерживали частный бизнес, а не прибегали к усиленной национализации, к чему призывают некоторые."
 PRF_increased_federal_intervention: "Усиление федерального вмешательства"
 PRF_increased_federal_intervention_desc: "Есть определенные сферы экономики, в которых, как бы ни старались частники, они никогда не будет эффективнее правительства в предоставлении важных услуг. Поэтому мы должны продвигаться к национализации там, где это необходимо, в этих ключевых областях, чтобы обеспечить наиболее эффективное использование национальных ресурсов."
 PRF_exploiting_the_chandradrona_deposits: "Разработка месторождений Чандрадрона"
 PRF_exploiting_the_chandradrona_deposits_desc: "Горный массив Чандрадрона является богатым и, по большей части, нетронутым источником железной руды, в которой остро нуждается страна. Надлежащая эксплуатация этих месторождений и расширение мощностей по переработке стали должны стать одним из наших важнейших экономических приоритетов."
 PRF_strengthen_madrasi_heavy_industry: "Наращивание тяжелой индустрии Мадраса"
 PRF_strengthen_madrasi_heavy_industry_desc: "Несмотря на то, что Бомбей является промышленным центром Южной Индии, важность Мадраса в этой области трудно переоценить. При достаточной государственной поддержке промышленность всего региона Мадрас может легко достичь такого положения, при котором он мог бы конкурировать с Бомбеем, а возможно, и обогнать его, и такой сценарий принес бы огромную пользу стране."

 #Army focuses

 PRF_phasing_out_british_equipment: "Постепенный отказ от британского оборудования"
 PRF_phasing_out_british_equipment_desc: "Нация не выживет в дальнейших конфликтах, вооруженная только старыми винтовками из Ишапора и тем, что осталось от бомбейского гарнизона. Поэтому жизненно важно, чтобы мы начали производить новые винтовки самостоятельно, используя все, что у нас есть."
 PRF_developing_the_poona_officers_academy: "Расширение офицерской академии в Пуне"
 PRF_developing_the_poona_officers_academy_desc: "Индия долгое время испытывала недостаток в хороших офицерах-туземцах, и это была очень продуманная политика британцев в их неудачной попытке предотвратить повторение событий 1857 года; очевидно, что у них это так хорошо получалось. Чтобы исправить этот недостаток, несколько лет назад в Пуне была создана академия для подготовки большего числа офицеров, и мы должны помочь обеспечить максимальное развитие этой академии."
 PRF_streamlining_the_command_structure: "Упорядочение командной структуры"
 PRF_streamlining_the_command_structure_desc: "Первоначальная часть Федеральной армии была поспешно сформирована в хаотические дни революции и состояла из личных армий княжеств, британских перебежчиков и всех, кто был готов поднять оружие против социалистов. Несмотря на то, что в последние несколько лет предпринимались медленные усилия по устранению неразберихи в подразделениях, мы должны ускорить эти усилия, чтобы оставаться на плаву."
 PRF_the_new_federal_army: "Новая Федеральная Армия"
 PRF_the_new_federal_army_desc: "Несмотря на то, что наши усилия по реформированию, возможно, только начинаются, впервые за нашу короткую историю Федеральная армия теперь действительно достойна такого названия; она больше не является сборищем солдат. Надеюсь, когда придет время, этого будет достаточно, чтобы не только защитить страну, но и вернуть ей былое величие."
 PRF_negotiating_equipment_deliveries: "Переговоры о поставках вооружения"
 PRF_negotiating_equipment_deliveries_desc: "Завоевать дружбу индийского народа, который не просто следует приказам британского короля или новых красных королей Калькутты в Лондоне, - очень привлекательная перспектива для многих крупных держав мира. Такой интерес - это то, что мы можем легко использовать, чтобы заполнить многочисленные пробелы, которые все еще остаются в арсеналах нашей армии."
 PRF_support_the_bangalore_defence_industry: "Поддержка оборонной промышленности Бангалора"
 PRF_support_the_bangalore_defence_industry_desc: "Почти сразу после окончания революции махараджа Вадияр IV начал масштабную кампанию по строительству новой оборонной промышленности в старом британском военном городке Бангалора. Такие усилия, несомненно, принесут большие плоды для Федерации, и мы должны направить федеральное финансирование на оказание помощи Майсуру в продвижении этих усилий в интересах национальной безопасности."
 PRF_updating_shivajis_tactics: "Улучшение тактики Шиваджи"
 PRF_updating_shivajis_tactics_desc: "Первое королевство маратхов было создано великим Махараджей Шиваджи, который осознал, что для победы в войнах не нужна большая передовая армия, если человек по-настоящему понимает местность вокруг и правильно использует гибкую иррегулярную армию. Тактика, которую он разработал, все еще остается актуальной даже в наше время, за исключением, конечно, значительного усовершенствования технологиями нашей эпохи."
 PRF_prioritising_adaptability: "Приоритет приспосабливаемости"
 PRF_prioritising_adaptability_desc: "Мы не победим наших врагов, если будем просто ожидать, что каждое поле боя будет нам на руку. Вместо этого мы должны сосредоточиться на том, чтобы в любой ситуации наши люди могли не только сражаться в полную силу, но и сражаться непрерывно, даже если они окажутся отрезанными от наших линий снабжения."
 PRF_learn_from_the_battle_of_ahmadabad: "Уроки битвы за Ахмадабад"
 PRF_learn_from_the_battle_of_ahmadabad_desc: "Ахмадабад был настоящей катастрофой, в которой многие хорошие люди погибли от рук бандитов-социалистов в последней доблестной битве за город. Допущенные ошибки, которые привели к такой бойне, не могут быть повторены, и в следующий раз, когда нашим солдатам придется сражаться на улицах, они будут готовы."
 PRF_a_new_generation_of_armoured_cars: "Новое поколение бронеавтомобилей"
 PRF_a_new_generation_of_armoured_cars_desc: "Британские ограничения на импорт привели к тому, что исторически сложилось так, что многие наши солдаты были вынуждены использовать бронированные автомобили, а не гораздо более мощные танки, которыми они снабжали своих верных домашних собачек. Однако полученный нами опыт научил нас тому, что мы не должны недооценивать бронеавтомобиль, поскольку он широко используется в качестве вспомогательного средства разведки и при правильном оснащении может производиться гораздо дешевле, чем любой приличный танк, идеально подходящий для такой гибкой армии, как наша."
 PRF_integrating_elephants_into_the_sappers: "Интегрировать боевых слонов в Инженерный Корпус"
 PRF_integrating_elephants_into_the_sappers_desc: "Боевые слоны, вторгающиеся в ряды противника, могут быть не чем иным, как исторической реликвией, но было бы ошибкой думать, что слоны все еще не могут служить важной цели в современной армии. В условиях местности, неподходящей для механизированных подразделений, слоны отлично зарекомендовали себя в составе инженерных войск, поскольку идеально подходят для наведения мостов на пересеченной местности и транспортировки крупногабаритного оборудования там, где другие варианты просто невозможны."
 PRF_guerrillas_of_the_deccan: "Партизаны Декана"
 PRF_guerrillas_of_the_deccan_desc: "Ганими Кава - это схема, на которой основаны многие формы асимметричной войны, схема, которая была доведена до совершенства в великих горах Декана, которые мы называем своим домом. Мы надеемся, что, вернув этот стиль ведения войны в Гхатах и даже за их пределами, мы одержим победы, о которых мечтаем, как это произошло с Шиваджи."
 PRF_refine_mahadajis_legacy: "Совершенствовать наследие Махададжи"
 PRF_refine_mahadajis_legacy_desc: "Именно при Махададжи Синдии правители Южной Индии впервые осознали, что, просто полагаясь на мужество и доблесть, вы не получите ничего, кроме богатого наследия, о котором расскажут только ваши покоренные сыновья. Если мы не хотим, чтобы нас постигла такая участь, армия должна быть не только модернизирована в соответствии с европейскими стандартами, но, и надеемся, когда-нибудь даже превзойдет их!"
 PRF_modernising_ayurveda: "Модернизация Аюрведы"
 PRF_modernising_ayurveda_desc: "Больной солдат без надлежащего лечения с таким же успехом мог бы стать мертвым, и на протяжении веков Аюрведа использовалась для того, чтобы помочь ему встать на ноги. В наши дни более мистические аспекты системы постепенно исчезают, уступая место новому, более научному подходу, и хотя многие скептики по-прежнему считают ее не более чем лженаукой, трудно отрицать, что она ставит наших солдат на ноги, даже если это всего лишь плацебо."
 PRF_refitting_the_lancers: "Переоснащение улан"
 PRF_refitting_the_lancers_desc: "Наши многочисленные уланские подразделения долгое время были гордостью армий всех штатов Южной Индии, но без постоянного продвижения вперед эта гордость быстро превратится в не более чем пережиток. Эти люди должны быть оснащены новейшим оружием и артиллерией, разработанными в соответствии с их высокой мобильностью, чтобы они могли продолжать оставаться быстрым молотом, сокрушающим наших врагов."
 PRF_encouraging_native_innovation: "Поощрение отечественных инноваций"
 PRF_encouraging_native_innovation_desc: "'Этого достаточно' - слишком долго было девизом многих наших квартирмейстеров, потому что этого всегда достаточно, пока вы не столкнетесь с врагом, который превосходит вас по численности, а ваше оружие не развалится на куски. Жизненно важно, чтобы наши солдаты как можно скорее были оснащены новейшими технологиями, разработанными внутри страны, а не импортированными из-за рубежа спустя годы после того, как они впервые попали в руки наших врагов."
 PRF_reforming_the_deccan_invincibles: "Новые \"Непобедимые\" Декканцы"
 PRF_reforming_the_deccan_invincibles_desc: "Деканские "Непобедимые" когда-то были великими элитными подразделениями, выигравшей множество сражений на стороне маратхов. В наши дни таких достижений добиваются специальные элитные войска, которые при необходимости наносят удары, превышающие их вес, - морские пехотинцы, альпинисты и даже парашютисты. Если мы хотим повторить успехи Непобедимых, нам следует создать собственные подразделения специальных войск, чтобы одержать победу."
 PRF_strengthening_the_gardi_core: "Усилить ядро нашей армии"
 PRF_strengthening_the_gardi_core_desc: "В основе любой армии лежат ряды пехоты, поскольку от избытка элиты, готовой сокрушить армию противника, мало толку, если ваши линии рогнут до того, как у них появится такая возможность. Обеспечение того, чтобы даже самый слабый солдат был экипирован и готов сражаться изо всех сил, станет самым важным шагом в создании армии мирового класса для индийской нации."
 PRF_growing_the_iisc: "Расширение ИНИ"
 PRF_growing_the_iisc_desc: "Институт Тата, или, более формально, Индийский научный институт, является одним из самых важных исследовательских учреждений во всей Индии, и содействие его росту - это дело, с которым даже самые спорящие правители могут легко согласиться. Обеспечение того, чтобы [PRF_GetCountryTitle] оставалась на переднем крае науки, поможет не только в повседневной жизни, но и в разработке передовых технологий для наших вооруженных сил, что, как мы надеемся, даст большое преимущество."

 #Recovery focuses
 PRF_india_united: "Индия едина!"
 PRF_india_united_desc: "Социалистическая угроза с севера отступила, и правящий режим заднецеголовых князей с Запада наконец-то побежден. Теперь наш долг - вернуть Индии былую славу, оправиться от ущерба, который принесла эта разрушительная война, и повести всю Индию в светлое новое будущее."

 PRF_reconstructing_the_nation: "Реконструкция страны"
 PRF_reconstructing_the_nation_desc: "Индия лежит в руинах, опустошенная двумя крупными войнами в течение десятилетия, но она никогда не будет побеждена. Устранение ущерба должно стать первоочередной задачей правительства, и, надеюсь, со временем мы сможем не только оправиться от разрушений, но и даже превзойти уровень дореволюционных лет."
 PRF_fate_of_the_loyalist_rulers: "Судьба князей-'лоялистов'"
 PRF_fate_of_the_loyalist_rulers_desc: "Когда Осман провозгласил независимость, чтобы спасти Индию от социализма, многие трусливые принцы на Севере отказались поддержать его, будучи слишком напуганными, чтобы отстаивать свою свободу. Те, кому посчастливилось избежать вторжения во время революции, смогли сохранить свое положение при британцах, и хотя они, возможно, решили поддержать наших врагов, мы все равно должны подумать, следует ли позволить им сохранить свои позиции."
 PRF_restoring_the_ousted_princes: "Реставрация"
 PRF_restoring_the_ousted_princes_desc: "Члены Федерации, возможно, и упорно боролись с бандитами-социалистами, но этого было недостаточно, чтобы спасти их всех. Многие из их земель были захвачены, и многие хорошие люди погибли; даже великий дом Синдия был изгнан со своих земель в Гвалиоре, и с тех пор они жили в Хайдарабаде. Теперь пришло время исправить эту несправедливость и вернуть эти земли их законным правителям."
 PRF_federal_reorganisation: "Реорганизация Федерации"
 PRF_federal_reorganisation_desc: "Думать, что мы можем просто повернуть время вспять, ко времени до революции, восстановив все княжеские владения в том виде, в каком они были тогда, - это не что иное, как фантазия. Калькуттский режим настроил их народ против них, и насильственное возвращение принцев на престол лишь спровоцирует дальнейшие беспорядки в будущем. Вместо этого землями следует управлять как федеративными государствами, реорганизовав их по мере необходимости, чтобы включить в состав администрации."
 PRF_armed_forces_rehabilitation: "Амнистия для вражеских солдат"
 PRF_armed_forces_rehabilitation_desc: "В конце концов, обычный человек редко сражается за свои идеологические убеждения, родись он в нескольких милях отсюда, и он с такой же легкостью будет сражаться под другим знаменем. Поэтому мы должны объявить полную амнистию рядовым военнослужащим наших врагов, надеясь, что это поможит заслужить их расположение, и обсудить, какой должна быть судьба их более преданных делу офицеров."
 PRF_reversing_socialist_destruction: "Обратить вспять разрушение социалистов"
 PRF_reversing_socialist_destruction_desc: "Социалисты сеяли хаос везде, где им удавалось протянуть свои щупальца, прикрываясь ложными заявлениями об освобождении индийского народа от угнетения. Потребуются годы, может быть, даже десятилетия, чтобы должным образом устранить этот ущерб, но сейчас мы можем, по крайней мере, начать с устранения некоторых аспектов их экономического саботажа."
 PRF_protecting_the_farmers: "Защита крестьянства"
 PRF_protecting_the_farmers_desc: "Сельское хозяйство - это основа нации, без которой все рухнуло бы, и все же война опустошила бесчисленные поля и фермы от минометных снарядов и гусениц танков. Обеспечение того, чтобы эти фермеры встали на ноги и продолжали производить достаточно продовольствия как для поддержания страны, так и для поддержания разумного объема экспорта, должно быть одним из наших главных приоритетов."
 PRF_bridge_and_road_project: "Строительство дорог и мостов"
 PRF_bridge_and_road_project_desc: "Город - это не что иное, как изолированный остров, если его жители не могут легко выйти за его пределы, а состояние дорог в стране на данный момент является ничем иным, как катастрофой. Однако, приложив достаточно усилий, мы, возможно, сможем вновь объединить большую часть страны, способствуя дальнейшему росту и восстановлению.."
 PRF_increasing_agricultural_exports: "Увеличить экспорта с\х продукции"
 PRF_increasing_agricultural_exports_desc: "Без капитала многие проекты, необходимые для восстановления страны, представляют собой не более чем мелочи, стоимость которых меньше, чем бумага, на которой они написаны. Даже несмотря на ущерб, сельское хозяйство остается нашей основной статьей экспорта, и поэтому, чтобы собрать деньги, необходимые для финансирования этих грандиозных проектов, мы должны увеличить наш экспорт в этой области настолько, насколько это возможно."
 PRF_urban_restoration_projects: "Проекты восстановления городов"
 PRF_urban_restoration_projects_desc: "Нигде в ходе недавнего конфликта не было такого запустения, как в крупных городах страны, даже в таких поселениях, как Нагпур, на данный момент больше развалин и могил, чем домов. Нация не может надеяться на продвижение вперед, пока эти городские центры не будут должным образом восстановлены, и поэтому это должно стать одним из первых крупных проектов, к реализации которых мы приступим."
 PRF_focus_on_capital_growth: "Сосредоточиться на росте капитала"
 PRF_focus_on_capital_growth_desc: "Хотя простое восстановление до уровня прошлых лет значительно улучшило бы жизнь многих наших людей, глупо полагать, что одного этого будет достаточно для реального восстановления нации. Мы должны продолжать оказывать прежнюю поддержку индийскому бизнесу, в значительной степени полагаясь на его помощь в усилиях по восстановлению, чтобы мы могли не только восстановиться, но и продолжать процветать и расти еще больше."
 PRF_competitive_industry: "Конкурентоспосбная промышленность"
 PRF_competitive_industry_desc: "При британском правлении индийскую промышленность намеренно сдерживали, чтобы остановить ее истинный рост, и британские правители прекрасно понимали, что без этих ограничений индийская промышленность может легко вывести из строя все британские фабрики. Теперь, когда нас больше не сдерживают, пришло время доказать правильность их опасений и встать на путь вытеснения европейского производства."
 PRF_tapping_indias_potential: "Использование потенциала Индии"
 PRF_tapping_indias_potential_desc: "Природные богатства земли на протяжении веков давали возможность превратить даже самого бедного нищего в самого богатого принца, если он сможет должным образом управлять дарами природы и распоряжаться ими. Даже несмотря на то, что большая часть территории страны по-прежнему опустошена, можно привлечь значительные средства, уделяя приоритетное внимание добыче сырьевых ресурсов, таких как нефть и железо, и продавая их тому, кто предложит самую высокую цену, особенно отчаявшимся странам, охваченным войнами, у которых нет другого выбора поставщиков."
 PRF_using_our_natural_wealth: "Использование наших природных богатств"
 PRF_using_our_natural_wealth_desc: "Хотя расширение многих существующих шахт, карьеров и других подобных предприятий до сих пор хорошо помогало нам утолять нашу жажду ресурсов, этого недостаточно, поскольку многие из этих объектов быстро окажутся истощенными. Поэтому мы должны начать осваивать новые участки, которые обладают большим потенциалом для добычи больших объемов ресурсов, если уделить им должное время и внимание. Используя их, мы можем легко удовлетворить наши потребности и значительно увеличить объем экспорта."

 #Political focuses
 PRF_greatness_belongs_to_osman: "Величие принадлежит Осману!"
 PRF_greatness_belongs_to_osman_desc: "Местные князьки-деспоты были возвращены на свои места, и великий Низам теперь волен править Индией так, как считает нужным. Эпоха Османа принесет индийскому народу новую светлую эру!"
 PRF_declare_the_kaisar_i_hind: "Принять титул Кайсар-и-Хинд"
 PRF_declare_the_kaisar_i_hind_desc: "Теперь, когда низам прочно удерживает власть, пришло время объявить о переменах: украденный титул \"Кайсар-и-Хинд\" наконец-то будет возвращен у британцев, а сам Осман станет императором страны. Вся власть будет принадлежать ему, и народ будет приветствовать его как великого восстановителя страны!"
 PRF_father_of_the_federation: "Отец Федерации"
 PRF_father_of_the_federation_desc: "Хотя некоторые могли бы предположить, что Низам питал имперские амбиции, истина заключается в том, что он намеревался исключительно сосредоточить государственную власть в своих руках на благо всех. С раджами страна больше не в состоянии продолжать рост и их вечными междоусобицами, пришло время Федерации стать великой державой, которой ей всегда было суждено стать."
 PRF_harness_the_razakars: "Снарядить разакаров"
 PRF_harness_the_razakars_desc: "Хотя с раджами, возможно, и покончено, узурпаторам, желающим вновь погрузить страну в хаос, никогда не будет конца. Поэтому мы должны положиться на разакаров, чтобы должным образом внушать страх перед любыми потенциальными угрозами и пресекать в зародыше любого, кто недостаточно умен, чтобы испугаться."
 PRF_ensure_muslim_supremacy: "Обеспечить господство мусульман"
 PRF_ensure_muslim_supremacy_desc: "Как утверждал лидер разакаров Касим Разви, мусульманское господство над Индией оправдывается исключительно правом завоевания, поскольку лучшего оправдания и не требуется. Побежденным не должно быть сделано никаких уступок, и поэтому мы позаботимся о том, чтобы все важные посты были заняты мусульманами, как они того заслуживают."
 PRF_dissolve_the_razakars: "Распустить разакаров"
 PRF_dissolve_the_razakars_desc: "Жестоким головорезам Касима Разви доверять нельзя, и они уже изжили себя. Пришло время позаботиться о том, чтобы их разогнали, а с самим Разви быстро разобрались."
 PRF_protector_of_all_faiths: "Защитник всех религий"
 PRF_protector_of_all_faiths_desc: "Попытка править всеми многочисленными народами Индии, вместо того чтобы править вместе с ними, приведет лишь к катастрофическим результатам. Поэтому мы должны обеспечить равную правовую защиту и продвижение по службе для всех индусов, будь то индуисты, мусульмане, христиане, буддисты или кто-либо еще; и мы также позаботимся о том, чтобы они знали, что эти преимущества проистекают исключительно из великой благожелательности самого Османа."
 PRF_appoint_a_national_diwan: "Учредить Национальный Диван"
 PRF_appoint_a_national_diwan_desc: "Хотя Осман может быть высшей властью в стране, власть теряет смысл, если нет никого, кто мог бы обеспечить выполнение вашей воли. Таким образом, непосредственно Османом будет назначен Национальный Диван, который будет выступать в качестве главного исполнителя распоряжений Османа."
 PRF_establish_the_national_executive_council: "Учредить Национальный исполнительный совет"
 PRF_establish_the_national_executive_council_desc: "Будучи правителем Хайдарабада, Осман принял решение создать Исполнительный совет, который консультировал бы его по важным вопросам и помогал бы обеспечивать выполнение его воли настолько эффективно, насколько это было возможно. Теперь, когда вся Индия действует под его руководством, вполне логично создать аналогичный совет на национальном уровне, состоящий из тех, кто действительно продемонстрировал свою лояльность и полезность."
 PRF_assert_authority_over_the_realm: "Утвердить власть над Страной"
 PRF_assert_authority_over_the_realm_desc: "Хотя автономия Мадраса существует едва более десяти лет, она уже превратилась в устаревший пережиток ушедшей эпохи. Пришло время ликвидировать эту бесполезную автономию и полностью утвердить власть Османа над всем Царством, вместо того чтобы продолжать позволять их порочному демократическому правительству процветать."
 PRF_royal_sadaqah: "Королевская садака"
 PRF_royal_sadaqah_desc: "Как добропорядочный мусульманин, и особенно как самый богатый человек в мире, Осман обязан обеспечивать своих подданных: заблудших путешественников, тех, кто обременен долгами, и особенно самых бедных из них. Именно благодаря Осману обо всех этих людях будут должным образом заботиться, и они обязательно будут ассоциировать его имя с доброжелательностью."
 PRF_expand_the_main_experimental_farm: "Расширить \"Главную экспериментальную ферму\""
 PRF_expand_the_main_experimental_farm_desc: "На протяжении тысячелетий голод был одной из величайших угроз индийскому народу, убивая больше людей, чем любой завоеватель. С учетом того, что в последние десятилетия в мире были достигнуты значительные успехи в области искусственных азотных удобрений, ликвидация голода не за горами, и с этой целью мы должны расширить существующую Главную экспериментальную ферму, превратив ее в крупный сельскохозяйственный университет; мы надеемся, что Индия станет лидером в области развития сельского хозяйства, чтобы возглавить борьбу с голодом.."
 PRF_begin_agricultural_reforms: "Начало сельскохозяйственных реформ"
 PRF_begin_agricultural_reforms_desc: "На протяжении веков среднестатистический крестьянин практически не добивался технического прогресса в сельском хозяйстве, за исключением, может быть, сеялки. Однако, поскольку механизированное сельскохозяйственное оборудование становится дешевле и проще в производстве, мы стоим на пороге новой великой технологической революции в сельском хозяйстве, и при достаточной поддержке мы можем начать путь к массовой механизации сельского хозяйства Индии."
 PRF_enshrine_compulsory_primary_education: "Закрепить обязательное начальное образование"
 PRF_enshrine_compulsory_primary_education_desc: "Для того чтобы Индия превратилась из колониального захолустья, каким она была при Британии, в современную великую державу, мы не можем продолжать оставаться обществом, в котором подавляющее большинство населения абсолютно неграмотно. Поэтому жизненно важно, чтобы мы сделали начальное образование обязательным для всех индийцев и значительно расширили государственное финансирование образования, чтобы гарантировать, что как можно больше детей получат надлежащее образование и будут готовы по-настоящему внести свой вклад в жизнь общества."

 PRF_reign_of_the_princes: "Правление Раджей"
 PRF_reign_of_the_princes_desc: "После того, как амбиции Османа были полностью подавлены, "Большой четверке" пришло время реализовать свои собственные амбиции. Будущее индийской нации, наконец, будет определяться ее собственными правителями, которые, несомненно, больше всего подходят для управления страной."
 PRF_the_image_of_the_rajarshi: "Имидж раджаршей"
 PRF_the_image_of_the_rajarshi_desc: "Раджарши, или царственные мудрецы, - это те представители индуистской правящей касты, которые действительно проявляют чистую преданность и заботу о своем народе, всегда предпочитая обогащать нацию, а не самих себя. Хотя, конечно, они прямо не называют себя таковыми, было бы очень полезно побудить общественность воспринимать руководство Совета как настоящих раджарши, благородно ведущих нацию вперед и отдающих все, что у них есть, на благо низших каст, которыми они по праву правят.."
 PRF_royal_patronage_fund: "Княжеский патронаж"
 PRF_royal_patronage_fund_desc: "Богатые люди должны отдавать долг обществу, и, поскольку принцы Федерации сейчас действуют очень слаженно, имеет смысл создать коллективный фонд, который позволил бы каждому принцу делать пожертвования на достижение общей цели. Этот фонд будет потрачен на инфраструктуру и развитие по всей стране, коллективно приписываемое каждому принцу, гарантируя, что каждый индеец признает жизненно важную роль, которую каждый принц играет в возвышении нации.."
 PRF_a_path_for_every_village: "Дороги к каждой деревне"
 PRF_a_path_for_every_village_desc: "Многие маленькие деревушки по всей стране почти полностью изолированы от внешнего мира, а те немногие связи, которые у них есть, зачастую представляют собой не более чем грунтовые тропинки и разрушающиеся дороги, проложенные столетия назад. Идеальным использованием нового фонда будет надлежащее подключение этих деревень к современным дорожным сетям, что, как мы надеемся, окажет большую помощь в их будущем развитии."
 PRF_redistribute_the_presidencies: "Перераспределение британских президенств"
 PRF_redistribute_the_presidencies_desc: "Бывшие президентства Британской империи представляют собой не что иное, как земли, украденные иностранными захватчиками у их законных правителей. Теперь, когда они были возвращены, перед нами встал вопрос о том, что с ними делать. С этой целью было предложено разделить их между принцами, перешедшими на сторону Федерации, а также лояльными младшими заминдарами и высокопоставленными командирами, которые сыграли роль в нашей победы."
 PRF_undermine_the_special_status: "Подорвать особый статус"
 PRF_undermine_the_special_status_desc: "Наступление на Мадрас в конечном счете принесет мало пользы из-за нестабильности, которую оно вызовет. Вместо этого было бы гораздо эффективнее медленно лишать их автономии, пока мы не уничтожим ее полностью, и к тому времени у них не будет сил остановить нас."
 PRF_control_the_opposition: "Контролировать оппозицию"
 PRF_control_the_opposition_desc: "Партия Справедливости, возможно, и потерпела крах перед лицом Андхры Махасабхи, но это только делает их еще более полезными для наших целей. Благодаря поддержке правительства по неофициальным каналам Партия справедливости может легко добиться значительного подъема в Мадрасе, и в обмен на такой подъем она, несомненно, будет соответствовать интересам своих благодетелей."
 PRF_partition_the_madras_autonomy: "Раздел Мадраса"
 PRF_partition_the_madras_autonomy_desc: "Было ошибкой допустить создание автономии Мадраса, ошибкой, которая должна быть исправлена в срочном порядке теперь, когда Федерация в состоянии это сделать. С этой целью сам Мадрас должен быть полностью ликвидирован, а его земли будут разделены между соседними князьями, которым он принадлежит по праву."
 PRF_madras_financial_zone: "Мадрасская экономическая зона"
 PRF_madras_financial_zone_desc: "Несмотря на то, что автономия Мадраса, возможно, исчезла, а его земли были разделены, сейчас перед нами стоит вопрос о том, что делать с самим городом Мадрас, учитывая его огромную ценность. Поэтому было предложено, чтобы вместо того, чтобы просто передать город кому-либо из принцев, он стал особым административным районом с пониженной налоговой ставкой по сравнению с остальной частью страны, направленной на привлечение как можно большего количества иностранного капитала, чтобы превратить его в азиатскую Уолл-стрит.."
 PRF_house_of_princely_representatives: "Палата представителей"
 PRF_house_of_princely_representatives_desc: "Палата раджей может предоставить нижестоящим членам нашей великой федерации право голоса, но этого недостаточно для того, чтобы обеспечить им активную роль в управлении страной. Поэтому она должна быть преобразована в Палату представителей, где сначала разрабатывается законопроект и по нему проводится голосование, а затем Диван представляет его Совету на утверждение."
 PRF_the_new_supreme_council: "Новый Верховный Совет"
 PRF_the_new_supreme_council_desc: "Во времена Ост-Индской компании Высшим органом власти в Индии был Верховный совет Бенгалии, состоявший из четырех членов, а пятую должность занимал генерал-губернатор в качестве главы Совета, хотя, что примечательно, у него не было права вето на принятие решений. Теперь, более столетия спустя, подобная система возникла вновь, но теперь ею управляют местные правители, а не колониальные лидеры, и через нее теперь будет выражаться истинная воля индийского народа."

 PRF_iyers_national_government: "Национальное правительство Айера"
 PRF_iyers_national_government_desc: "Хотя Айер, возможно, и был назначен Низамом для управления беспартийным кабинетом при поддержке основных партий Федерации, Низам ошибался бы, если бы полагал, что это будет просто продолжением его правления. Скоро единственным человеком в стране, у которого действительно будут все козыри, станет Диван, и ни низам, ни Совет даже не поймут, что произошло."
 PRF_extend_the_temple_entry_proclamation: "Распространить новость о вступлении в храм"
 PRF_extend_the_temple_entry_proclamation_desc: "Несмотря на противодействие некоторых высокомерных представителей элиты, которые возражают против любого прогресса, независимо от его масштаба, объявление Вармой о вступлении в Храм - одно из самых популярных действий Совета за последние годы. Поскольку Совет полностью согласен с этим, а Низам вряд ли сможет больше возражать, его следует распространить на федеральный уровень, что придаст правительству столь необходимый импульс популярности."
 PRF_finalise_kongunadu_dam_projects: "Завершение проекта плотины Конгунаду"
 PRF_finalise_kongunadu_dam_projects_desc: "До революции на юге Индии было начато множество крупных проектов ГЭС, в первую очередь строительство плотины Кришна Раджа Сагара на реке Кавери. Революция и последовавшие за ней денежные проблемы привели к тому, что эти проекты были заброшены, однако теперь, когда мы находимся в гораздо лучшем положении, было бы проще простого завершить их, обеспечив орошение фермерских хозяйств региона и значительное количество электроэнергии для растущих городских центров Майсура."
 PRF_the_canal_campaign: "Кампания строительства каналов"
 PRF_the_canal_campaign_desc: "Индия изобилует водоемами, от самого маленького горного ручья до могучего Ганга, однако, несмотря на это, большие районы страны по-прежнему страдают от засухи. Такую проблему можно легко решить с помощью большого комплекса общественных работ, направленных на создание каналов и ирригационных сетей по всей стране, что должно значительно помочь национальным фермерам."
 PRF_establish_the_fact_plant: "\"ФАКТ\""
 PRF_establish_the_fact_plant_desc: "Завод химических удобрений Траванкора, или, как многие, участвующие в планировании, стали называть его просто \"ФАКТ\", станет крупным заводом по производству удобрений и химикатов, построенным в штате Траванкор при поддержке самого Вармы. С помощью этого завода мы сможем производить большое количество сульфата аммония и других современных удобрений, что, как мы надеемся, значительно увеличит урожайность сельскохозяйственных культур и защитит нас от неурожаев и голода."
 PRF_sponsoring_education_institutions: "Спонсирование образовательных учреждений"
 PRF_sponsoring_education_institutions_desc: "Даже после Революции многие крупные университеты по всей стране продолжали функционировать в полном объеме, хотя многим из них не хватало необходимого финансирования для дальнейшего расширения или даже просто устранения физического ущерба, нанесенного многолетними боевыми действиями. Увеличение государственного финансирования этих учреждений для устранения этих недостатков в долгосрочной перспективе значительно окупится, поскольку знания являются одной из самых мощных вещей, которыми мы можем обладать."
 PRF_cementing_the_diwanship: "Укрепить власть Дивана"
 PRF_cementing_the_diwanship_desc: "Назначение Айера Диваном вместо кандидата от Махасабхи можно описать многими словами, но \"бесспорное\", безусловно, не входит в их число. Привлечь на свою сторону не только их, но и множество более мелких партий, включая Партию Справедливости в Мадрасе или Юнионистов в Пенджабе, безусловно, будет трудной задачей; необходимо будет заручиться поддержкой многих из них и использовать личные отношения на полную катушку. Если такая задача действительно выполнима, то нет человека, который справился бы с ней лучше, чем Айер."
 PRF_reforming_the_electorates: "Избирательная реформа"
 PRF_reforming_the_electorates_desc: "Наскоро сколоченную избирательную систему в Федерации вряд ли можно назвать совершенной, поскольку система Мадраси унаследована от многих недостатков, созданных британцами в интересах самих себя и их покровителей. Необходимо приложить огромные усилия, чтобы реформировать эту систему, гарантируя, что голоса всех жителей страны будут услышаны, а не будут просто подавлены самыми громкими из них."
 PRF_subverting_the_council: "Подкоп под Совет"
 PRF_subverting_the_council_desc: "Идея о существовании "Большой четверки" прочно укоренилась среди оппозиции Осману, и теперь, когда его тирания еще более усилилась, видимость единства может быть легко разрушена. С помощью правильных слов, частных бесед и тайных сделок привлечь на свою сторону достаточное количество членов Совета, чтобы добиться чего-либо, будет несложной задачей."
 PRF_princely_patronage: "Покровительство Князям"
 PRF_princely_patronage_desc: "Люди редко действуют вопреки своим собственным интересам, даже самые безумные из принцев часто меняют свое мнение, если ситуация начинает складываться в их пользу. При достаточном количестве смазки даже могущественного Низама можно заставить делать все, что пожелаешь, и, как человек, хорошо знакомый с каждым членом Совета, Айер находится в идеальном положении, чтобы воспользоваться этой слабостью."
 PRF_reshaping_the_governorships: "Преобразование губернаторств"
 PRF_reshaping_the_governorships_desc: "В качестве своего рода наследия британского правления, по крайней мере полезного наследия, мелкие князья Федерации часто объединялись в различные административные единицы, чтобы им было легче справляться со своими нуждами. Однако эти губернаторства по-прежнему строго соответствуют требованиям британской администрации, но при достаточной предусмотрительности их можно легко изменить, чтобы они гораздо эффективнее работали в интересах федерального правительства."
 PRF_the_sovereign_statesman: "Суверенный штатгальлдер"
 PRF_the_sovereign_statesman_desc: "В то время как Низам и "Большая четверка" считают себя победителями в конфликте друг с другом, единственным человеком, которого на самом деле можно считать победителем, является не кто иной, как Айер, и этот исход был спланирован с самого начала. Низам может думать, что у него есть полезная марионетка, а принцы могут думать, что они все еще командуют, но, в конце концов, единственным сувереном Федерации является их \"верный долгу\" диван."

 PRF_the_spirit_of_andhrodyamam: "Дух Андхродьямы"
 PRF_the_spirit_of_andhrodyamam_desc: "Голос народа Индии наконец-то был услышан, и он взывал к свободе. Победила Махасабха, чтобы тот осуществил их волю, и Диван Рао будет бороться за это изо всех сил."
 PRF_elevate_the_status_of_madras: "Повысить статус Мадраса"
 PRF_elevate_the_status_of_madras_desc: "Непредставленность Мадраса в Совете, несмотря на его огромный размер и значимость, является не чем иным, как пародией. Мы надеемся, что, если будет оказана достаточная помощь и будут произнесены правильные слова, Совет сможет убедить Мадрас принять его в полноправные члены, что, наконец, исправит эту несправедливость."
 PRF_absorb_congress_remnants: "Поглощение членов ИНК"
 PRF_absorb_congress_remnants_desc: "Индийский национальный конгресс не был по-настоящему социалистической организацией, его просто подхватил ветер Революции и ввели в заблуждение некоторые из его наиболее ярых членов. Все еще есть бесчисленное множество людей, разделяющих их ценности независимой и свободной Индии, нации, которая может обеспечить себя сама, а не зависеть от других, и этим людям должен быть предоставлен новый дом как часть Махасабхи."
 PRF_linguistical_reorganisation: "Языковая реформа"
 PRF_linguistical_reorganisation_desc: "Хотя все мы индусы, мы не можем забывать, что мы все еще телегусы, бенгальцы, тамилы и многие другие. Провинции и остальные федеральные штаты страны должны отражать эти внутренние разногласия, а не затушевывать их, как это сделали британцы, чтобы они могли процветать как равноправные аспекты индийской культуры, а не подавляться гегемонией хинди."
 PRF_restrict_the_vettichakiri: "Запрет Веттичакири"
 PRF_restrict_the_vettichakiri_desc: "Система принудительного труда Веттичакири - один из самых варварских пережитков ушедшей эпохи, сохранившихся в стране, и доры, которые насаждают ее, ничем не лучше самых отъявленных преступников преступного мира. Его полная отмена должна быть осуществлена как можно скорее, даже если в краткосрочной перспективе потребуется достичь компромисса с его практиками."
 PRF_prioritise_rural_growth: "Приоритет развития сельской местности"
 PRF_prioritise_rural_growth_desc: "Сельские районы страны действительно являются ее сердцем и душой, поскольку никто не является более истинным индусом, чем скромный фермер, который обеспечивает себя и свою семью. Однако эти люди по-прежнему являются одними из самых уязвимых в стране, их легко оставить позади, в то время как крупные городские районы стремительно развиваются. Мы должны сделать так, чтобы этого не произошло и чтобы наше сельское население получало такие же выгоды, как и жители городов."
 PRF_protecting_the_rights_of_dalits: "Защита прав неприкасаемых"
 PRF_protecting_the_rights_of_dalits_desc: "Это варварство - считать, что из-за своей кастовой принадлежности они не могут даже ходить по дороге с другими людьми или даже носить обувь в присутствии так называемых высших. Мы должны ввести широкий спектр мер защиты для этих далитов, адиваси и всех других угнетенных классов, чтобы бороться с этой дискриминацией."
 PRF_subsidise_indian_business: "Субсидирование индийского бизнеса"
 PRF_subsidise_indian_business_desc: "Даже при значительной государственной поддержке предприятия Федерации по-прежнему отстают от своих современников по всему миру. Этого нельзя допустить, и необходимо предоставлять дополнительные субсидии, чтобы в конечном итоге обеспечить им выход на первое место в мире."
 PRF_strengthen_the_industrial_centres: "Расширение промышленных центров"
 PRF_strengthen_the_industrial_centres_desc: "Несмотря на ущерб, нанесенный в ходе многочисленных войн, промышленные центры страны, такие как Ахмадабад, по-прежнему являются нашим главным шансом на долгосрочный рост. Восстановление их не только до прежних высот, но и дальнейшее развитие должно стать одним из важнейших приоритетов правительства."
 PRF_fund_local_language_libraries: "Спонсирование библиотек на местных языках"
 PRF_fund_local_language_libraries_desc: "Почти все те, кто говорит по-английски или на хинди, не могут осознать, что они могут зайти в библиотеку и не понять ни одной книги на полках. Для миллионов людей по всей стране это просто стало фактом жизни, и вместо этого их заставляли изучать эти навязанные языки. Мы больше не будем этого терпеть и поможем профинансировать создание новых библиотек по всей стране на местных языках, чтобы у каждого была возможность читать."
 PRF_support_the_navjeevan_mandali: "Поддержка Навдживан Мандали"
 PRF_support_the_navjeevan_mandali_desc: "Махила Навдживан Мандали уже много лет является женским крылом Махасабха, и это помогло значительно улучшить жизнь многих женщин страны. Их усилия заслуживают высокой оценки, и поскольку партия сейчас возглавляет правительство, ее ключевым членам следует предоставить видные посты, направленные на улучшение положения индийских женщин."

 PRF_controlling_the_rivers: "Контроль над реками"
 PRF_controlling_the_rivers_desc: "Северные районы Декана защищены от внешних захватчиков не только величественными горами, но и могучими реками, которые протекают по территории страны. Обеспечение контроля над этими реками с помощью частых морских патрулей жизненно важно для того, чтобы наши враги не смогли перейти их вброд.."
 PRF_strikes_from_the_sky: "Удар с неба"
 PRF_strikes_from_the_sky_desc: "Создание хорошего военно-морского флота - одно из самых дорогостоящих предприятий, за которое может взяться государство, хороший корабль может обойтись государству в миллионы только для того, чтобы ввести его в эксплуатацию, даже не включая постоянные эксплуатационные расходы. К сожалению для этих кораблестроителей, простой самолет, изготовленный за небольшую плату, может полностью уничтожить даже огромный боевой корабль при помощи достаточно точной атаки, и мы воспользуемся этим, чтобы уравнять наши шансы."
 PRF_found_the_federal_marine_force: "Основать федеральный корпус морской пехоты"
 PRF_found_the_federal_marine_force_desc: "Кажется почти гарантированным, что в один прекрасный день нашей стране понадобятся десантные войска, особенно если учесть, что многие острова в Индийском океане подпадают под нашу сферу действия. Мы должны действовать на опережение и отдать приказ о формировании таких сил при первой же возможности."
 PRF_fund_mass_dockyard_expansions: "Финансировать расширение верфей"
 PRF_fund_mass_dockyard_expansions_desc: "Сказать, что инфраструктура для строительства судов в Индии находится в плачевном состоянии, было бы преувеличением. По всей стране мало предприятий, способных производить что-либо, напоминающее военный корабль, и исправление этого должно быть первоочередной задачей, если мы хотим создать собственный военно-морской флот."
 PRF_conquest_of_the_beaches: "Завоевание береговых линий"
 PRF_conquest_of_the_beaches_desc: "Высадиться на береговую линию - довольно простая задача при наличии подходящего оборудования, пережить высадку и даже воспользоваться ее преимуществами? Это самое сложное. Мы должны обеспечить надлежащую подготовку наших людей с помощью иностранных советников, чтобы мы просто не бросили их на верную смерть, как только они ступят на берег."
 PRF_ambitious_navy: "Амбициозный план для ВМФ"
 PRF_ambitious_navy_desc: "К черту критиков, даже с нашей ограниченной инфраструктурой мы построим самый грандиозный военно-морской флот, который когда-либо видел мир! Скоро ни один корабль не сможет выйти в Индийский океан без разрешения Федерального военно-морского флота, и любой, кто думает иначе, столкнется со всей мощью нашего флота."
 PRF_defend_coast: "Защитить наши воды"
 PRF_defend_coast_desc: "Даже если бы большой военно-морской флот был большим источником гордости для нации, мы не можем тратить миллионы только для того, чтобы подпитывать свое высокомерие, и должны мыслить логически. Стране будет гораздо лучше с небольшими силами, которые будут уделять приоритетное внимание обороне нашей береговой линии и обеспечивать наши связи с внешним миром от любого противника."
 PRF_restoring_facilities_from_the_reclaimed_lands: "Восстановление специнфаструктуры на отвоеванных территориях"
 PRF_restoring_facilities_from_the_reclaimed_lands_desc: "Поскольку оставшаяся часть Индии теперь полностью находится под нашим контролем, у нас появилась прекрасная возможность для дальнейшего расширения нашей военно-морской инфраструктуры. Многие предприятия на отвоеванных землях были повреждены войной, но все еще до краев заполнены полезными инструментами и оборудованием, которые можно легко восстановить или перепрофилировать, что дает нам отличную возможность начать дальнейшее производство."
 PRF_commission_a_cruiser_fleet: "Крейсерский флот"
 PRF_commission_a_cruiser_fleet_desc: "Крейсера занимают промежуточное положение по сравнению с боевыми кораблями, являясь крупными судами, которые могут победить эсминцы, но при этом далеко не дотягивают по стоимости до линейных кораблей или авианосцев. Заказ на создание полного парка таких кораблей с использованием современных технологий производства принесет большую пользу Федеральному военно-морскому флоту."
 PRF_divert_funding_to_the_navy: "Перенаправление средств на развитие ВМФ"
 PRF_divert_funding_to_the_navy_desc: "Хотя у нас, возможно, и нет бюджета, чтобы покрыть все расходы, и мы не можем финансировать огромный военно-морской флот, кто сказал, что мы действительно должны покрывать все расходы? Есть много вещей, которые получают федеральное финансирование, которое можно просто сократить на год или около того, и вместо этого направить эти средства на дальнейшее производство боевых кораблей."
 PRF_regular_fleet_exercises: "Регулярные учения ВМФ"
 PRF_regular_fleet_exercises_desc: "Бессмысленно тратить такие деньги на большой военно-морской флот, если люди, стоящие за штурвалом, даже не знают основ управления своим судном. Флот должен тренироваться как можно чаще, когда он не используется, чтобы гарантировать, что наши моряки знают каждый дюйм своего корабля, и наказывать тех, кто не соответствует нашим стандартам.."
 PRF_furthering_destroyer_technology: "Совершенствование конструкций эсминцев"
 PRF_furthering_destroyer_technology_desc: "В современную эпоху любой, кто знает, как построить корабль, может сконструировать для вас эсминец, и поэтому почти каждая подводная лодка проектировалась с учетом этого. Если мы хотим защитить наши конвои от этой подводной угрозы, нам понадобятся гораздо более современные и специализированные суда, способные справиться с ними."
 PRF_furthering_maritime_exports: "Содействие расширению морского экспорта"
 PRF_furthering_maritime_exports_desc: "Мы не можем делать вид, что морская торговля не имеет жизненно важного значения для будущего страны, даже если большая часть населения считает пересечение кала-пани табу. Те, кто готов отправиться в морское путешествие, должны работать в нашем торговом флоте, ввозя как можно больше импортных и вывозя больше экспортных товаров, с которыми мы можем справиться."
 PRF_improving_our_depth_charges: "Совершенствование глубинных бомб"
 PRF_improving_our_depth_charges_desc: "Подводная лодка может быть уязвима, когда всплывает на поверхность, но мы не можем гарантировать, что всегда сможем поймать ее, когда она это сделает. Повышение мощности наших глубинных бомб и скорости их погружения должны способствовать увеличению числа уничтожаемых подводных лодок и повышению безопасности наших конвоев."

 PRF_deccan_air_school: "Авиационное училище Деккана"
 PRF_deccan_air_school_desc: "Декканская авиашкола была основана в Хайдарабаде, чтобы за короткие межвоенные годы модернизировать наши военно-воздушные силы. Мы должны продолжать инвестировать в наших пилотов, хотя бы мы и остались позади."
 PRF_develop_air_industry: "Основание декканского авикосорциума"
 PRF_develop_air_industry_desc: "У нас нет собственного производства авиации. Чтобы выстоять в противостоянии с нашими северными конкурентами, мы должны объединить деловые интересы в управляемый консорциум и начать производство."
 PRF_foreign_instructors: "Зарубежные авиаинструкторы"
 PRF_foreign_instructors_desc: "Хотя в наших военно-воздушных силах есть несколько офицеров, прошедших обучение за рубежом, нам понадобится больше иностранных инструкторов в авиашколе Deccan, если мы хотим подготовить целое поколение новых пилотов. Пришло время обратиться за опытом к Германии и Японии."
 PRF_air_fields: "Передовые авиабазы"
 PRF_air_fields_desc: "В неизбежном столкновении за судьбу Индии будет крайне важно, чтобы наши военно-воздушные силы имели базы достаточно близко, для того чтобы наносить удары по врагу."
 PRF_air_research_council: "Учредить Совет авиаисследований"
 PRF_air_research_council_desc: "Недостаточно привести военно-воздушные силы в соответствие с современными стандартами. Чтобы покорить субконтинент, нам нужно будет собрать совет экспертов, который продвинет наши военно-воздушные силы в будущее."
 PRF_joint_officer_exercises: "Совместные офицерские учения"
 PRF_joint_officer_exercises_desc: "Многие наши офицеры настаивают на том, что военно-воздушные силы будут играть вспомогательную роль для наших наземных войск. Нам следует провести несколько совместных учений армии и военно-воздушных сил для развития координации."
 PRF_forward_air_defenses: "Создание системы ПВО"
 PRF_forward_air_defenses_desc: "Мы не единственное государство на субконтиненте, которое инвестирует в военно-воздушные силы. Чтобы подготовиться к бомбардировкам наших крупных городов, мы должны разработать систему противовоздушной обороны."
 PRF_bomber_focus: "Авиапушки"
 PRF_bomber_focus_desc: "Чтобы осадить великие города севера, нам понадобятся новые авиационные пушки. Новые бомбы ужасающего действия уже продемонстрировали разрушительный эффект."
 PRF_flying_cavalry: "Крылатые хузуратские всадники"
 PRF_flying_cavalry_desc: "Элитная хузуратская кавалерия армии маратхов однажды наводила ужас на весь субконтинент. Наши пилоты вернут себе свое наследие."
 PRF_princes_of_the_air: "Владыки неба"
 PRF_princes_of_the_air_desc: "По мере развития наших военно-воздушных сил многие пилоты показали, что они на голову выше остальных. Смелые подвиги, безупречная работа - эти повелители воздуха доказали, что они играют решающую роль в наших военных действиях. Мы должны поощрять их и вкладывать средства в их повышение."
 PRF_aeronautics_council: "Декканский авиаконсорциум"
 PRF_aeronautics_council_desc: "Декканский авиаконсорциум - это объединение авиационных концернов, которые были объединены для содействия созданию федеральных военно-воздушных сил."
 PRF_princes_of_the_air_idea: "Владыки неба"
 PRF_princes_of_the_air_idea_desc: "Благодаря руководству элиты, [PRF.GetNameDef] развила образовательный, производственный и исследовательский потенциал Федеральных военно-воздушных сил. Новые владыки воздуха будут господствовать в небе всего субконтинента."

 PRF_our_own_sphere: "Наща собственная сфера влияния"
 PRF_our_own_sphere_desc: "Индия освободилась от гнета как Британии, так и социализма, так почему она должна искать новый сапог, чтобы под него заползти? Пришло время создать наш собственный альянс, подходящий для такой нации, как наша, которой суждено стать великой!"
 PRF_join_the_world_stage: "Выйти на мировую арену"
 PRF_join_the_world_stage_desc: "Хотя у нас могут быть амбиции однажды возглавить собственную великую сферу, мы должны признать реальность того, что наша изоляция от великих держав остального мира была бы ничем иным, как саботажем, замаскированным под браваду. Вместо этого мы должны объединиться с одним из самых великих союзов мира, который помог нам объединить субконтинент, по крайней мере, до тех пор, пока мы не сможем действовать самостоятельно в отдаленном будущем."
 PRF_bhutan: "Разобраться с Бутаном"
 PRF_bhutan_desc: "Поскольку наш контроль над Индийским субконтинентом гарантирован, пришло время обратить внимание на нашу северную границу. В Китае появляются новые великие державы, и мы должны обеспечить свой контроль над королевством Бутан в качестве буферного государства в Гималаях. Они будут выступать в качестве щита от китайских вторжений, нравится им это или нет."
 PRF_nepal_claims: "Разобраться с Непалом"
 PRF_nepal_claims_desc: "В хаосе, последовавшем за Вельткригом, Непал вторгся в индийские низменности. Настало время восстановить нашу власть на этих территориях."
 PRF_claim_ceylon: "Претензии на Цейлон"
 PRF_claim_ceylon_desc: "Цейлон, Мальдивы и другие острова Индийского океана являются частью законной территории нашей страны. Их колониализму должен быть положен конец."
 PRF_incorporate_burma: "Включить в состав Бирму"
 PRF_incorporate_burma_desc: "Теперь, когда угроза со стороны колониализма и социализма устранена, мы можем смотреть за пределы наших нынешних границ, думая о будущем. Хотя Бирма отличается от остальной Индии историей и культурой, она также находилась под британским правлением и находится в нашей естественной сфере влияния. Пришло время включить его в нашу расширяющуюся сферу деятельности."
 PRF_claim_goa: "Претензии на Гоа"
 PRF_claim_goa_desc: "Анклав Гоа - не более чем заноза в заднице нашей великой нации. Это по праву наша территория, и она должна быть возвращена."
 PRF_claim_pondicherry: "Претензии на Пондишери"
 PRF_claim_pondicherry_desc: "Анклав Пондишери - не более чем заноза в заднице нашей великой нации. Это по праву наша территория, и она должна быть возвращена."
 PRF_incorporate_siam: "Бирманские территории в Сиаме"
 PRF_incorporate_siam_desc: "Сиамское королевство было одним из наиболее оппортунистических из "государств стервятников", которые использовали беспорядок при кончине Раджа. Когда молодая бирманская нация сильно пострадала от социалистических восстаний в Ассаме и Бенгалии, правительство Сиама просто занимало несколько районов и префектур, включая город Мулмейн, упомянутый в знаменитой поэме Киплинга. Эти земли должны быть возвращены!"
 PRF_tibet: "$HND_liberating_the_frontier_tracts$"
 PRF_tibet_desc: "$HND_liberating_the_frontier_tracts_desc$"
 PRF_aksai_chin: "$HND_restoring_the_unity_of_kashmir$"
 PRF_aksai_chin_desc: "$HND_restoring_the_unity_of_kashmir_desc$"

