### Characters ###
 PRF_osman_ali_khan_emperor: "Осман Али Хан I"
 PRF_osman_ali_khan_leader_desc: "§YРодился:§! §L6 апреля, 1886, Пурани Хавели, Хайдерабад, Индия§!\n§YПолитическая карьера:§! §LОсман Али Хан, низам Хайдарабада, официально известный под своим царственным именем Асаф Джах VII, когда-то был всего лишь подданным могущественной Британской империи. Он объединил южные княжества в хаосе, последовавшем за распадом британского владычества, провозгласив независимость "Всеиндийской федерации\", чтобы дать отпор повстанцам, базировавшимся в Калькутте. Однако по мере того, как Федерация развивалась, возникли трудности, связанные с самой природой национального правительства. Осман Али Хан должен теперь вывести Федерацию из смертельной хватки многочисленных препятствий и привести к более стабильному будущему.§!"
 PRF_osman_ali_khan_emperor_leader_desc: "§YРодился:§! §L6 апреля, 1886, Пурани Хавели, Хайдерабад, Индия§!\n§YПолитическая карьера:§! §LОсман Али Хан, император Индии, когда-то был всего лишь подданным могущественной Британской империи. Он объединил южные княжества в хаосе, последовавшем за распадом британского владычества, провозгласив независимость "Всеиндийской федерации", чтобы дать отпор повстанцам, базировавшимся в Калькутте. После успешной централизации своего королевства и доказательства народу Индийского субконтинента, что только он достоин возглавить их, он теперь является правителем молодой, но могущественной империи.§!"
