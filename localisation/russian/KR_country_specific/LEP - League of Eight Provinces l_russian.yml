 #郭懺
 LEP_guo_chan: "Го Чань"
 LEP_guo_chan_commander_desc: "§YОписание генерала\nРодился:§! §g18 апреля 1894, Чжуцзи, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_guo_chan_bio$§!"

 #周碞
 LEP_zhou_yan: "Чжоу Янь"
 LEP_zhou_yan_high_command_desc: "§YBorn:§! §LDecember 26th, 1895, in Sheng County, Zhejiang Province, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LZhou Yan's father, who studied at the Zhejiang Military Academy, was a non-commissioned officer of the Zhejiang Army and a Guangfuhui member who participated in an uprising in Zhejiang after the Wuchang uprising in 1911. This act inspired his own son to be a soldier.\n\nLike his father, Zhou Yan studied in a primary military school in Zhejiang, and would later study in a secondary military school in Wuchang. In 1914 Zhou enrolled in the 3rd Class of the Baoding Military Academy, where he studied artillery. After his graduation in 1916, he was sent to the Zhejiang army as a junior artillery officer, beginning his military career. Before enrolling in the 7th Class of the Staff College in 1924, he would already be an artillery company commander of the 2nd Division of the Zhejiang Army, under the command of Zhou Fengqi.\n\nHowever, his studies in Beijing were interrupted by the chaotic warfare in the north and he had to return to his unit in the south, continuing his duties. When the National Revolutionary Army attempted to march into Jiangsu, Zhou Yan, who was then a regimental commander, successfully held them off with field fortifications and secured the logistic line of the League Army. Later he would take part in various military actions of Sun Chuanfang's army (including the suppression of syndicalists during the 1932 Shanghai Uprising) and was promoted to divisional commander.\n\nAs the size of the League Army now grows and the demand for able commanders increases, Zhou Yan rises naturally as a choice with his remarkable victories and reliable ability.§!\n\n§YNotes: An entrusted and able former subordinate of Zhou Fengqi, Zhou Yan seems to lack the interest in the politics of his superiors. Promoted solely for his merits rather than connections.§!"

 #李忍濤
 LEP_li_rentao: "Ли Жэньтао"
 LEP_li_rentao_high_command_desc: "§YBorn:§! §L1904, in Heqing, Yunnan Province, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LDespite being born in one of China's poorest regions, Li Rentao's achievements were not limited by his background. Before attending Tsinghua University, this diligent student graduated in 1920 from a Normal School in his home province. Thanks to his exceptional performance in Tsinghua, Li received a government sponsorship to study abroad, paving his way to become one of the best-educated men in China.\n\nHis military career began in 1926 at an unreachable point to most of his colleagues, as Li Rentao went to the Virginia Military Institute and the United States Army Infantry School, finishing his infantry training in Fort Benning. Later he enrolled at the University of Chicago. However, his overseas studies did not end in the US. This remarkable cadet received another round of sponsorships to continue his studies and this time he would go to the Prussian Staff College to study chemistry and chemical warfare, a brand new form of war in the Chinese context.\n\nAfter returning to China with his German wife in 1931, this military talent was immediately sent to Sun Chuanfang's army under German referral. He was appointed as both a military tutor and the commander of a special training unit for German-educated officers.§!\n\n§YNotes: This stout, square-faced, thick-browed, big-eyed general is the most notable advocate of chemical warfare (if not the first and only) and wrote several textbooks on it. He is also well-known for his strict discipline and training, it is said that his unit's motto is \"I see, I come, I obey\".§!"

 #徐培根
 LEP_xu_peigen: "Сюй Пэйгэн"
 LEP_xu_peigen_air_chief_desc: "§YBorn:§! §LDecember 30th, 1895, in Xiangshan, Zhejiang Province, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LKnown for his quick wit and intelligence at a young age, Xu Peigen would graduate from his early schooling as a top mark student. However due to lack of finances, Xu wouldn't be able to continue his schooling. Instead recommended to study at Zhejiang Army Primary School in 1909, Xu would then enlist in the Third Wuchang Army Secondary School. During the Xinhai Revolution, Xu would join his fellow revolutionaries and fight in a student battalion.\n\nApplying for the Baoding Military Academy post-Xinhai in 1914, Xu would study infantry in the 3rd Class of the academy and be a classmate of Bai Chongxi. Graduating in 1916, Xu would soon become an officer, being admitted to the 6th Class of the Staff College in 1919, and graduating 3 years later. Assigned to the 1st Regiment of the 1st Division of the Zhejiang Army, he would be promoted in 1926 to commander of the 4th Regiment of the 2nd Brigade.\n\nOnce second only to Sun Chuanfang in Jinling Military Academy's staff, he was assigned to the 1st Division under Chen Yi. Seeing fierce fighting in the Northern Expedition, Xu remained steadfast on the frontlines. Selected to study at the Prussian Staff College in 1928 for his meritorious leadership in the Northern Expedition alongside the likes of Li Rentao, he would return to China in 1931. Appointed principal of the Jinling Military Academy, Xu would also later become principal of Hangzhou Jianqiao Central Aviation School.§!\n\n§YNotes: A capable, well-educated, and diligent commander, Xu lacks any concrete political loyalties and is focused on publishing books on modern tactics, military science and military history of China. During his studies in the German Staff College, Xu was among the best in his class and some German officers commented that Xu would be \"Moltke in the East\".§!"

 #方本仁
 LEP_fang_benren: "Фан Беньжэнь"
 LEP_fang_benren_commander_desc: "§YОписание генерала\nРодился:§! §g1880, Туаньфэн, Хубей, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_fang_benren_bio$§!\n\n$LEP_fang_benren_notes$"

 #李世甲
 LEP_li_shijia: "Ли Шицзя"
 LEP_li_shijia_navy_chief_desc: "§YBorn:§! §L1894, in Houguan County, Fujian Province, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LEnrolled in the 6th Class of the Yantai Naval Academy in 1908, Li Shijia studied Warship driving and graduated in the same year of the Xinhai Revolution. Yet his military study did not cease with the collapse of the Great Qing. Before going to the US in 1915 to study submarine warfare, Li entered the Nanjing Naval Military Academy (formerly Jiangnan Naval Academy) in 1913 and studied for two years. After returning to China, he served in the Ministry of Naval as a junior officer and staff for the Beijing Government.\n\nAlthough the Chinese naval staff was divided into factions in the chaotic struggle of warlord regimes, Li Shijia did not have a role to play as he was a junior naval commander under Yang Shuzhuang, who secured his position in Fujian thanks to his connection with Du Xigui, closely connected to Wu Peifu. Soon after Sun Chuanfang declared himself as the League Marshal, Li was appointed as a commander of a small gunboat that can be traced back to the Self-Strengthening Movement. Throughout the 1930s, Li was involved in various conflicts as a subordinate of Yang Shuzhuang and the Zhili Clique. After a series of complicated events and conflicts, Li Shijia rose as a rising naval commander of Sun Chuanfang's League, specialising in unconventional sea warfare.§!\n\n§YNotes: As an admiral who is committed to his military career, Li Shijia does not have a strong political opinion.§!"

 #吳振南
 LEP_wu_zhennan: "У Чжэньнань"
 LEP_wu_zhennan_navy_chief_desc: "§YBorn:§! §L1882, in Yizheng, Jiangsu Province, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LFollowing a standard education, Wu Zhennan would enlist in Nanjing Naval Academy at the age of 15, studying English, arithmetic, astronomy, navigation and other courses all of which Wu took a particular liking towards, ranking first in each subject. After a tour of field service on two different ships, Wu became an instructor at his old Academy. Sent abroad to Britain to study their warships, he would travel around the world in the British Eastern Fleet.\n\nHe would return to China only to be sent back to study in Britain at the Naval University in Greenwich, and two Portsmouth naval schools. Wu Zhennan would return once again to become the backbone of the Navy of the Republic of China, teaching numerous future seafarers. Joining the Revolutionaries in Xinhai, Wu would become President of the Provisional Naval Association, and would slowly rise up the ranks of the admiralty.\n\nAttending the Spa Peace Conference, he would resolutely oppose the imperialist machinations of the Central Powers, but would ultimately be powerless to stop them. Returning to his nation, Wu would serve as director of the National Coast Guard Division, overseeing inland sea meteorological reports and shipwreck rescue reports. Operating out of Shanghai, Wu is one of the more capable Admirals in the nation's retinue, albeit his relationship to the League itself leaves much to be desired.§!\n\n§YNotes: Wu is quoted as saying \"Many well-known admirals in the Japanese Navy studied in the United Kingdom like me. Their talents are not outstanding, but they can display their talents in the Japanese Navy. Our Chinese Navy does nothing, and does not fight. How can it not be frustrating when the talents of a weak country are not as good as those of a strong country?\"§!"

 #王壽廷
 LEP_wang_shouting: "Ван Шутин"
 LEP_wang_shouting_high_command_desc: "§YBorn:§! §L1888, in Zhenjiang, Jiangsu Province, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LGraduating from the sixth driving class of Jiangnan Naval Academy, Wang Shouting would go on to serve in a series of gunboats as First Mate. Continuing to travel up the admiralty totem pole, he would advance to Adjutant of the First Fleet Command, achieving the rank of Captain, and would later become a lieutenant commander. In 1916 he was awarded the first-class gold medal, and the year after the fifth-class Wenhu medal. Commanding his own ship in 1918, he would become a lieutenant colonel, and would become a first-class staff officer of the Navy Commander-in-Chief and Navy Department.\n\nAwarded the third-class Wenhu Medal, he would receive the fourth-class Jiahe medal, and in 1921 would become captain of another gunboat, \"Yongjian\". Achieving the rank of naval colonel, he would be transferred to the headquarters of the First Fleet in 1925, becoming captain of a cruiser in 1926. In 1927 he would endeavour to remain with the Beiyang forces as the Northern Expedition faltered, instead opting to continue his work as a captain in the Navy Department. In 1932 he was promoted to the commander of a torpedo guerrilla team, and became director of the Navy Department in 1934. He is a purely apolitical naval officer, only hoping to continue his career.§!"

 #沈覲宸
 LEP_shen_jingchen: "Шэнь Цзинчэнь"
 LEP_shen_jingchen_high_command_desc: "§YBorn:§! §LMarch 11th, 1881, in Houguan County, Fujian Province, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LEntering the sixth manufacturing department of Fuzhou Shipbuilding Academy in 1897, Shen Jingchen would become a candidate for the imperial exam in 1903, which he successfully passed. In 1907 Shen would be appointed censor, and in 1913 he would travel to France to study shipbuilding and aircraft manufacturing, albeit transferring to Lausanne in Switzerland to continue his studies to the Great War. Receiving a degree in aircraft manufacturing engineering, he would serve as secretary of the embassy in Britain, and secretary of the Chinese Delegation at the Spa Peace Conference. Returning to China in 1919, he would be appointed director of the Shipping Department, and later Principal of the Naval Manufacturing School.\n\nAwarded the title of Naval Armament Superintendent in 1921, he would transfer to the position of principal of Beijing Nanyuan Aviation School, supervising operations on behalf of the Aviation Administration. In 1925 Shen would become the Director of the Mawei Aircraft Manufacturing Department, and later Chief Supervisor of Naval Armament Manufacturing. Appointed Technical Supervisor of the Naval Ministry and Principal of Fuzhou Naval Academy, Shen would continue his service until 1930, were he became Colonel Technical Supervisor of the Naval Ministry.§!"

 #Ministers

 #田文炳
 LEP_tian_wenbing: "Тянь Вэньбин"
 LEP_tian_wenbing_sic_desc: "§YBorn:§! §L1891, in Xinxiang County, Henan Province, Great Qing§!\n§YAlignment:§! §MSouthern Zhili§!\n§YBackground:§! §LEnrolling in the Hubei Military Academy as a teenager to secure a living, Tian Wenbing graduated in 1909 and joined the Qing Army as a platoon commander. Like many of his peers and fellow cadets, Tian stood against the corrupted and incapable Qing court and joined the Revolutionary Army as the Wuchang Uprising broke out in 1911. In the Republic, this humble officer served first as a staff in his home province, Henan, before being transferred to the Office of the President under Li Yuanhong and the General Staff as a junior officer in 1916.\n\nTian did not stay long in Beijing as in the next year he was appointed a staff officer in Jiangsu, where he would meet his superior, Qi Xieyuan, then the military governor of the province. As a loyal and diligent staff member of Qi, Tian supported Qi in the conflict of 1924 and followed him when Qi went into exile. Qi Xieyuan returned to Eastern China after the Shanghai Conference and Tian has now become his most entrusted subordinate as he is one of the few that followed Qi from the beginning and the end.§!\n\n§YNotes: As a humble subordinate of Qi, Tian rarely questions his decisions, and would always willingly support and execute his orders at his best.§!"

