 LEP_qian_zongze_commander_desc: "§YОписание генерала\nРодился:§! §g23 октября 1891, Ханчжоу, Чжэцзян, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §g$LEP_qian_zongze_bio$§!\n\n$LEP_qian_zongze_notes$"

 #汪鎬基
 LEP_wang_haoji: "Ван Хаоцзи"
 LEP_wang_haoji_high_command_desc: "§YBorn:§! §L1884, in Tongxiang, Zhejiang Province, Great Qing§!\n§YAlignment:§! §MSouthern Zhili§!\n§YBackground:§! §LWang Haoji enrolled in the 5th Chinese Class of the Imperial Japanese Army Academy and studied cavalry. Returning in China after a year of studying, he would then serve as a tutor of history and military science in Beijing. After the establishment of the Republic of China, in 1912, he held the rank of cavalry colonel and was sent to serve in Zhejiang in 1914, where he began his career under Sun Chuanfang.\n\nIn 1920, he became a commander of an infantry brigade with the rank of major general under Zhou Fengqi. Afterwards, he commanded different infantry units under Sun Chuanfang's League Army for more than a decade, fighting against various uprisings and enemies of the League during the Anti-Fengtian War and the Northern Expedition of the KMT. It was not until the late 1930s that Wang was appointed as the Director of Cavalry of the League Army, and he was promoted to lieutenant general at the beginning of 1936.§!\n\n§YNotes: Despite being trained and interested in cavalry warfare, Wang Haoji spent almost half of his military career in Sun Chuanfang's army commanding infantry, but hopefully things will change.§!"

 #葛敬恩
 LEP_ge_jingen: "Гэ Цзинъэнь"
 LEP_ge_jingen_high_command_desc: "§YBorn:§! §LJuly 30th, 1889, in Jiaxing, Zhejiang Province, Great Qing§!\n§YAlignment:§! §cZhejiang Clique§!\n§YBackground:§! §LGe Jing'en, like many Zhejiang people, was born to a merchant family, but he would not pick the path of inheriting his family business. In 1904, he enrolled in the Zhejiang Military Academy and became a military tutor there upon his graduation two years later.\n\nDuring his studies, the famous revolutionary Qiu Jin swayed members of the new army to join the revolutionary cause, and Ge was thus heavily influenced by revolutionary ideals as he grew discontent with the corrupted Qing authority. Joining the Tongmenghui in 1907, Ge Jing'en would join the uprising in Hangzhou in November 1911 following the Wuchang uprising, where he drafted the operation plan and helped to secure a revolutionary foothold.\n\nHe also served as a staff of the uprising army in Nanjing and helped secure the city. After the establishment of the Nanjing Government in 1912, Ge was appointed as the head of military transportation and one of the representatives to attend the negotiation between the Beiyang and the Nanjing governments. Afterwards, Ge continued his military studies, studying at the Staff College from 1913 to 1916. Two years later he was sent to the Army War College of Japan and returned to China in 1921. His service in the Zhejiang Army would begin under the invitation of Chen Yi in 1924.\n\nThis talented commander would serve as Chen's Chief of Staff for more than a decade, but he is not particularly enthusiastic about fighting his compatriots in the Kuomintang.§!\n\n§YNotes: A good friend of Chen Yi. This revolutionary veteran is more interested in staying with his friend than serving the League.§!"

