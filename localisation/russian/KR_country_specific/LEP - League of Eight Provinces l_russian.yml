### Focuses ###
 #Starter
 LEP_suns_year_of_glory: "Sun's Year of Glory"
 LEP_suns_year_of_glory_desc: "Marshal Sun Chuanfang is one of the greatest warlords in all of China. Under his leadership, Eastern China has always known peace of prosperity. Even the great Wu Peifu fears his old protege, for he knows that while he grows older, Marshal Sun only grows stronger. The two-faced Jade Marshal can no longer stop his former student, and soon Marshal Sun will rule all of China. History will recall 1936 to be the year of Sun Chuanfang!"

 #League War
 LEP_qi_rules_nanjing: "Ци правит Нанкином"
 LEP_qi_rules_nanjing_desc: "Ци Сеюань, уважаемый генерал, управляющий большим количеством войск возле Нанкина, захватил контроль над городом, что делает его номинальным приемником Суня. Теперь он стал главой Нанкинской  Клики. Но бывшие территории Лиги погрузились в хаос, и губернаторы не спешат признавать главенство Ци."

 LEP_north_south_west: "Север, юг или запад"
 LEP_north_south_west_desc: "Враги Нанкинской Клики окружают её с юга, севера и запада. Наши территории разрозненны, Аньцинская Клика находится совсем рядом с нашей столицей. Нужно выбрать, на каком враге мы сфокусируемся в первую очередь. Также, нам нужно восстановить связь с бывшими губернаторами Лиги и убедиться в их верности."

 LEP_jiangnan_loans: "Кредиты в Цзяннани"
 LEP_jiangnan_loans_desc: "Чёрный Понедельник сильно ударил по ОАК, и они не смогли вовремя оплатить аренду за многие концессии. Это недопустимо, но мы ничего не можем с этим поделать, так как мы слишком сильно зависим от их поддержки. Цзяннаньский Консорциум перенёс кризис без особых проблем и предложил нам кредит, который нам необходимо взять, чтобы финансировать наши армии и правительство."

 LEP_aog_gun_shipments: "Поставки вооружения от ОАК"
 LEP_aog_gun_shipments_desc: "Хотя ОАК ещё не привела своё положение в норму, ситуация начала стабилизироваться. У них есть большие запасы вооружения, поставку которого мы должны обеспечить, так как наша армия испытывает большие нехватки снаряжения. Наша способность произвести своё собственное оружие ограничена, что делает их поддержку ещё более критичной."

 LEP_qis_central_command: "Центральный штаб Ци"
 LEP_qis_central_command_desc: "Неорганизованность и децентрализованность губернаторских армий станет причиной нашего провала в настоящем конфликте. Нам нужно создать объединённый главный штаб. Губернаторы сохранят контроль над своими армиями, но решения теперь будут приниматься и исполняться согласованно."

 LEP_enforce_officer_loyalty: "Обеспечить верность офицеров"
 LEP_enforce_officer_loyalty_desc: "Преданность наших офицеров сомнительна. Костяк нашей армии находился под контролем Ци многие годы, но теперь под нашим командованием находятся ещё и армии различных губернаторов и бывшие отряды Суня. Гоминьдан и Шаньцин не прекращают секретную вербовку, и нам надо убедиться, что все наши офицеры верны делу Нанкинской Клики."

 LEP_emergency_industry_reallocation: "Срочная эвакуация промышленности"
 LEP_emergency_industry_reallocation_desc: "Большая часть нашей промышленности дезорганизована. Нам нужно навести порядок и сфокусироваться на военной промышленности. Своих ресурсов у нас на это нет, так  что придётся вновь положиться на Цзяннаньский Консорциум и ОАК. Мы передадим часть предприятий под их контроль, чтобы наши собственные безалаберные офицеры не учинили ещё больше проблем."

 LEP_price_controls: "Ввести контроль цен"
 LEP_price_controls_desc: "После коллапса Лиги инфляция начала расти с умопомрачающей скоростью и валюта обесценилась почти полностью. Хотя контроль цен не является идеальным решением проблемы, нам создать хотя бы временный барьер для девальвации, чтобы сохранить за собой возможность платить зарплаты солдатам. Стоит надеяться, что это также приостановит рост цен на продукты и снизит беспокойство в сельской местности."

 LEP_suppress_student_unions: "Подавить студенческие организации"
 LEP_suppress_student_unions_desc: "Так называемые 'патриотические' студенческие организации уже давно стали помехой нашему правительству. Они являются главной силой антиконцессионных движений, продолжающих разводить беспорядки в городах. Если мы прикроем их способы организации, мы, стоит надеяться, сможем полностью подавить движение."

 LEP_enforce_media_controls: "Ввести контроль СМИ"
 LEP_enforce_media_controls_desc: "СМИ приняли участие в коллапсе Лиги и продолжают публиковать негативные статьи о нашем правительстве и очернять имя Ци. Мы должны взять контроль над информацией в свои руки, чтобы предотвратить распространение информации, которая может помешать достижению наших целей."

 #Foreign Policy
 LEP_the_marshal_stands_triumphant: "Маршал торжествует"
 LEP_the_marshal_stands_triumphant_desc: "The uppity fools following Governor Chen and the damnable spirits of the Kuomintang thought they could supersede the League! Yet we have undeniably put them back in their place! With the formal ascension of Qi Xieyuan to the role of League Marshal following Sun's truly tragic death, the duty falls upon us to continue the plans of the \"Smiling Tiger\"."

 LEP_two_marshals_under_the_sky: "Два маршала под небом"
 LEP_two_marshals_under_the_sky_desc: "Сунь Чуаньфань оказался в странной ситуации. Будучи якобы протеже Нефритового маршала, он ни в коем случае не был его официально признанным преемником. Он был слишком отчужденным, ему не доверяли остальные жители Северной Чжили. Неважно! Ци Сюэюань - неуловимый хамелеон! Вместе Нефритовый маршал и маршал Лиги восстановят порядок в Срединном царстве и утвердят господство Чжили!"

 LEP_deepen_the_zhili_schism: "Углубить раскол в Чжили"
 LEP_deepen_the_zhili_schism_desc: "Вероломные северные Чжили считают своих южных собратьев лишь выскочками, крайними, несущественными! Используя нас в качестве пешек для своей игры, они глубоко заблуждаются. Сунь Чуаньфань оставил нам легитимность, чтобы воплотить в жизнь задуманное, стать истинными наследниками наследия Бэйяна. Контролируя Южную столицу, мы будем идти вперед!"

 LEP_joint_training_with_beijing: "Совместная тренировка с Пекином"
 LEP_joint_training_with_beijing_desc: "Воистину, многие наши командиры могли бы почерпнуть немало военных знаний и опыта у наших северных коллег. Ведь наша скромная Цзиньлинская академия не сравнится с легендарной Баодинской военной академией. Даже в личном плане многие из наших высших командиров не имеют формального военного образования. Проводя совместные учения, Чжили обязательно укрепит свои позиции."

 LEP_negotiate_with_the_nationalistic_elite: "Вести переговоры с националистической элитой"
 LEP_negotiate_with_the_nationalistic_elite_desc: "Благородный форум демократии и науки - это объединение либеральных, националистических и прогрессивных интеллектуалов, проживающих в Шанхае и Пекине. Они с искренним презрением относятся к авторитарной природе провинций, управляемых Чжили. Взаимное неприятие, тем не менее, является разумным шагом привлечь этих людей слова за стол переговоров, чтобы создать видимость искренних намерений."

 LEP_utilize_the_jingxing_society: "Использовать общество Цзинсин"
 LEP_utilize_the_jingxing_society_desc: "Одним из самых любопытных интеллектуалов в свите Нанкина является молодой, шумный и остроумный Ли Линьси. Вместе с ним он создал Общество Цзинсин, которое представляет собой группу интеллектуалов и гражданских лиц, гораздо более терпимых к Чжили и, в свою очередь, поддерживающих углубление прогерманских отношений. Отвергнутая большинством, но не всеми, их поддержка может оказаться неоценимой в грядущих планах."

 LEP_foster_economic_cooperation: "Укреплять экономическое сотрудничество"
 LEP_foster_economic_cooperation_desc: "Одним из самых больших преимуществ обширных немецких инвестиций и развития на территории Лиги является огромный потенциал проецирования экономической мощи, который демонстрирует Лига. Однако существует большое неравенство, поскольку на каждый Чжэцзян приходится Фуцзянь. Если мы будем сотрудничать с Пекином и интегрировать наши экономики, возможно, у нас появится свой собственный Золотой водный путь."

 LEP_end_southern_intransigence: "Покончить с южной несговорчивостью"
 LEP_end_southern_intransigence_desc: "В, возможно, самый мутный момент Лиги, в наш самый темный час, губернаторы Хунаня, Гуандуна и Гуанси наконец разорвали отношения. Долгое время отдаляясь от нас с момента своего неофициального присоединения, южане могли бы в будущем нанести удар по нашим владениям. Чтобы сохранить наше наследие, мы должны быть быстрее их!"

 LEP_secure_german_support: "Обеспечить поддержку Германии"
 LEP_secure_german_support_desc: "Наши любящие союзники, наши настоящие друзья! Без немцев Лига была бы лишь зависима от махинаций в Пекине. Для реализации наших грандиозных амбиций нам необходима еще более грандиозная поддержка. Через наши связи, установленные ранее, давайте увеличим объем немецкой помощи для нашей восстанавливающейся экономики и армии. Взамен мы обеспечим им влияние в Китае."

 LEP_heir_to_the_jade_marshal: "Наследник Нефритового маршала"
 LEP_heir_to_the_jade_marshal_desc: "Воистину, именно Южные Чжили являются наследниками махинаций Нефритового маршала! Когда-то это был Сунь Чуаньфан, и, возможно, у маршала Ву есть свои идеи, как у слабого Бай Цзяньву, но без славного маршала Лиги Ци Сеюаня, Чжили вполне могли бы встретить свою гибель в руках Гоминьдана или Фэнтяня. Это знает даже Ву, и, конечно, Пекин должен оказать нам заслуженное уважение."

 LEP_last_son_of_the_family: "Последний сын семьи"
 LEP_last_son_of_the_family_desc: "Северные Чжили отбросили все притязания на дело Фэн Гочжана! Они отрезали все ветви покровительственной сети, кроме своей собственной! Не У, Цао или Ван являются наследниками Ли Хунчжана, а Юг! Настоящие последние наследники наследия китайского Бисмарка! С нашими амбициями, которые становятся все больше и больше, пришло время идти на север..."

 LEP_the_new_beiyang: "The New Beiyang Star"
 LEP_the_new_beiyang_desc: "Our Republic has suffered greatly in the past couple of decades. European imperialists took advantage of our moment of weakness and even the Japanese upstarts attempted to forge an empire greater than China itself. This age of humiliation is over, and Marshal Qi Xieyuan shall lead the Chinese people into a new epoch of glory and prosperity. Zhonghua Minguo Wansui!"

 #Economics/Politics
 LEP_government_by_coercion: "Репрессивное правительство"
 LEP_government_by_coercion_desc: "Теперь мы правим Лигой и должны любой ценой предотвратить её повторный коллапс. Мы не повторим таких же ошибок, которые учинил Сунь Чуаньфан. Мы создадим сильное государство, и не будем стесняться применять силовые методы чтобы гарантировать его существование."

 LEP_finish_sun_investigation: "Завершить расследование убийства"
 LEP_finish_sun_investigation_desc: "Мы достаточно долго затягивали публикацию результатов расследования убийства бывшего главы Лиги, Суня Чуаньфан. Пришло время подвести работу к концу и позволить общественности узнать правду. Стоит надеяться, мы сможем представить результаты в форме, которая позволит нам усилить нашу позицию."

 LEP_undermine_sun_loyalists: "Репрессировать виновных"
 LEP_undermine_sun_loyalists_desc: "В данный момент в правительстве есть много людей, на поддержку которых мы не вполне можем рассчитывать. Воспользовавшись результатами расследования, а также объявив нашу оппозицию виновниками коллапса Лиги, мы сможем создать оправдание их ареста и чисток в правительстве."

 LEP_university_oversight_board: "Бюро Наблюдения за Университетами"
 LEP_university_oversight_board_desc: "Мы видели, насколько большой угрозой смогут стать студенты, когда они действуют организованно. Они были основой антиконцессионного движения, и будут продолжать быть угрозой нашей стабильности, если мы не будем вести за ними наблюдение. Бюро Наблюдения за Университетами будет создан для нейтрализации любых 'опасных' лиц в наших ВУЗах."

 lep_governor: "After the traitorous uprising of the Governor of Anhui, Chen Tiaoyuan, we now once again control his province. We must decide who replaces Chen as Governor of Anhui and make sure that our replacement does not repeat Chen's mistake. Furthermore, we should also finish formalising relations with the other governors, not all of whom agree with Qi's ascension."

 LEP_governor_question: "Вопрос о губернаторах"
 LEP_governor_question_desc: "[getlepgovernor]"

 LEP_track_down_kmt: "Уничтожить группировки Гоминьдана"
 LEP_track_down_kmt_desc: "Мы выбили армию Гоминьдана из Фуцзяня, но их партизаны продолжают свою операции на нашей территории. Есть опасения, что члены Гоминьдана проникли в наше командование. Нам нужно выследить их последние базы и уничтожить всех, кто смеет сопротивляться."

 LEP_crack_down_rural_bandits: "Облавы на бандитов"
 LEP_crack_down_rural_bandits_desc: "Изо дня в день сельские бандиты, некоторые из которых даже бывшие солдаты, продолжают терроризировать наших граждан и чиновников. Такие негодяи, как Красные копья и Игуаньдао, продолжают нагнетать обстановку. Мы должны начать официальное подавление этих смутьянов, аналогичное кампаниям по окружению, если хотим подавить их движение."

 LEP_reconstitute_baojia_system: "Восстановить систему баоцзя"
 LEP_reconstitute_baojia_system_desc: "Система баоцзя представляет собой создание самостоятельных ополчений для поддержания правопорядка. Она направлена на поддержание стабильности и самоуправления. Хотя подобная система и подвела Китай в прошлом, в данный момент она может оказаться крайне полезной, так как позволит нам патрулировать провинции в обход губернаторов."

 LEP_xiangyong_inspections: "Инспекции сянъюн"
 LEP_xiangyong_inspections_desc: "Если мы хотим убедиться в успехе баоцзя, мы должны держать сянъюн, отряды баоцзя, под наблюдением. Подобные инспекции позволят нам контролировать деятельность ополчения и не беспокоится о вмешательстве губернаторов.."

 LEP_water_infrastructure_commission: "Комиссия Водной Инфраструктуры"
 LEP_water_infrastructure_commission_desc: "Война повредила огромное количество инфраструктуры, целью которой является защита городов от затопления. Плотины, дамбы, насыпи – всё находится в плачевном состоянии. Нам нужно создать специальную комиссию с надлежащим финансированием, чтобы немедленно восстановить эти сооружения. Если мы будем с этим затягивать, мы рискнём жизнью миллионов китайцев."

 LEP_peace_in_countryside: "Мир вне городов"
 LEP_peace_in_countryside_desc: "Теперь, когда мы справились с самыми острыми проблемами, вызванными войной, мы можем начать восстановление порядка в сельской местности. Вот уже несколько месяцев люди боялись перемещаться между населёнными пунктами из-за количества бандитов и повстанцев. Но при введении необходимых регуляций и реформ стоит ожидать быстрого возвращения спокойствия на дорогах страны."

 LEP_selective_enforcement: "Выборочная законность"
 LEP_selective_enforcement_desc: "Нам не достичь легитимности нашего правительства законами. Нам остаётся лишь создать стабильное правительство, которому никто не посмеет перечить. Это значит, что законы будут применяться так, как мы пожелаем. Предоставив некоторым лицам и компаниям экстралегальные права, мы сможем заручиться их поддержкой в сражении с нашими врагами."

 LEP_reform_public_security: "Реформы общественной безопасности"
 LEP_reform_public_security_desc: "Одной из проблем, с которой Сунь Чуаньфан  часто сталкивался, являлась отсутствие сети надёжных агентов, поддерживающих внутреннюю безопасность. Но Ци изменит ситуацию созданием Нанкинской Гвардии. Его агенты будут повсюду, что позволит ему оперативно расправляться с угрозами и поддерживать мир."

 LEP_redoubts_for_revenue: "Редуты за ресурсы"
 LEP_redoubts_for_revenue_desc: "Последствия недавней войны вместе с нестабильностью за границами нашей страны вынуждают губернаторов заботиться об организации обороны в провинциях. Мы поможем им возвести фортификации и бункеры в обмен на дополнительное налогообложение."

 LEP_tackle_local_corruption: "Сражение с мелкой коррупцией"
 LEP_tackle_local_corruption_desc: "Мелкая коррупция – серьёзная проблема. Она вредит нашей способности собирать налоги, утяжеляет и без того не лёгкую ношу крестьян и наполняет деньгами карманы тех, кто этого не заслуживает. Нам нужно антикоррупционную кампанию, которая, к тому же, позволит нам заполучить больше контроля над администрацией провинций."

 LEP_green_gang_dealings: "Сделки с Зелёной Бандой"
 LEP_green_gang_dealings_desc: "Мы можем попробовать заполучить поддержку Зелёной Банды из Шанхая. Связи с этими преступниками, занимающимися в основном торговлей наркотиками, позволят в будущем оказывать влияние на потенциальных инвесторов из концессии." 

 LEP_public_media_campaigns: "Кампании улучшения общественного мнения"
 LEP_public_media_campaigns_desc: "Наше правительство имеет не лучшую репутацию. Многие считают, что мы продались немцам и убиваем патриотов, желающих возродить Китай. Мы должны убедиться, что подобное восприятие останется в прошлом, воспользовавшись подконтрольной нам прессой. Кроме того, мы сможем уничтожить репутацию нас критикующих."

 LEP_appoint_civilian_magistrates: "Назначить гражданских чиновников"
 LEP_appoint_civilian_magistrates_desc: "Большая часть провинций контролируется офицерами, использующими подвластные им войска для сохранения своего влияния. Тяжело вынудить их слушаться без кровопролития. Нужно начать назначать гражданских чиновников на государственные позиции и медленно увеличивать количество доступной им власти. Так нам будет проще контролировать Лигу."

 LEP_public_repression: "Репрессия общественности"
 LEP_public_repression_desc: "Мы не будем обманывать себя заявлениями об открытость и либеральности нашего правительства. Нет, мы признаём, что единственным способом восстановить порядок и законность в стране являются репрессии высказывающихся против нас лиц. Лишь после истребления этих мятежных элементов общество сможет быть уверенно в своей безопасности."

 LEP_shut_down_intellectual_circles: "Прикрыть кружки интеллигенции"
 LEP_shut_down_intellectual_circles_desc: "Различные группы и круги широко уважаемой интеллигенции, многие члены которой поддерживали антиконцессионное движение, приведшее к падению Сунь Чуаньфана, продолжают высказываться против нашего правительства продолжают высказываться против нас. Мы больше не можем терпеть подобную инсубординацию и вынуждены запретить подобные встречи."

 LEP_crush_urban_unions: "Подавить городские профсоюзы"
 LEP_crush_urban_unions_desc: "Как и студентские организации, профсоюзы рабочих постоянно создают для нас проблемы. Их забастовки подрывают эффективность промышленности, и нет никаких гарантий, что они не сотрудничают с левым Гоминьданом. Мы должны воспользоваться своим влиянием в городах, чтобы разогнать эти профсоюзы и предотвратить повторную организацию рабочих."

 LEP_pacification_commissioner_qi: "Комиссар Умиротворения Ци"
 LEP_pacification_commissioner_qi_desc: "Выдача себе большого количества различных титулов и позиций является традиционным способом повысить свой авторитет в новоприобретённых землях. Теперь Ци Сеюань не только маршал Лиги, но комиссар умиротворения, что даёт ему возможность подавлять общественные движения военными силами."

 LEP_pressure_jiangzhe_caifa: "Надавить на цайфа Цзянчжэ"
 LEP_pressure_jiangzhe_caifa_desc: "The Jiangzhe caifa, meaning the Jiangsu and Zhejiang zaibatsu, is a group of powerful bankers who control the major banks in the Legations. Using our newly acquired connections, we should attempt to pressure the Jiangzhe caifa to provide us with loans and resources, like they have done to others in the past."

 LEP_solicit_legations_investments: "Переманить инвесторов"
 LEP_solicit_legations_investments_desc: "Города-Концессии являются финансовым центром востока. Иностранные инвесторы чаще всего решают инвестировать именно в них, что вынуждает китайские компании перемещать штабы своих компаний. Нам нужно стать привлекательной целью для потенциальных инвесторов, что, учитывая расширение нашего влияния в концессиях и открытие экономики, не должно стать слишком тяжёлой задачей."

 LEP_expand_jiangnan_arsenal: "Расширить Цзяннаньский Арсенал"
 LEP_expand_jiangnan_arsenal_desc: "Цзяннаньский Арсенал является краеугольным камнем нашей военной промышленности. Во время общего развития экономики мы должны уделять особое внимание Арсеналу, так как это позволит нам увеличить количество производимого в стране оружия и снаряжения."

 LEP_lower_yangtze_development: "Развитие нижней Янцзы"
 LEP_lower_yangtze_development_desc: "Сердце Пяти Провинций, а также главный источник сил Ци, находится в регионе нижней Янцзы. Развитие этой территории будет наиболее выгодным для маршала, так как он напрямую её контролирует и облагает налогами. Кроме того, удобное географическое расположение привлечёт большое количество инвестиций."

 LEP_eastern_railway_construction: "Строительство восточной ж/д"
 LEP_eastern_railway_construction_desc: "Железные дороги стали новыми артериями Китая. Без них торговля и промышленность не может развиваться. Нужно начать инвестиции в создание новых путей и реновацию уже существующих. Германия, скорее всего, тоже захочет принять участие, так что нам нужно решить, как именно мы будем реализовать имеющиеся планы."

 LEP_heavy_industrial_investments: "Инвестиции в тяжёлую промышленность"
 LEP_heavy_industrial_investments_desc: "В данный момент промышленность Китая по большей части направленна на внутренний рынок. У нас нет возможности поддерживать тяжёлую промышленность. Но если мы надеемся развить нашу экономику, это должны измениться. При помощи опыта Германии и инвестиций правительства мы убедимся, что тяжёлая промышленность Китая получит шанс на развитие."

 LEP_new_economic_development: "Новое экономическое развитие"
 LEP_new_economic_development_desc: "Лига стабилизируется, а индустриализация достигает новых успехов, и нам необходимо этим воспользоваться. Мы открыты для мира, что даёт нам преимущество над остальным Китаем в скорости модернизации. Нам нужно делать всё возможное для увеличения инвестиций в развитие промышленности и экономики."

 LEP_subsidize_local_communities: "Субсидии сёлам"
 LEP_subsidize_local_communities_desc: "Мы потеряли поддержку большей части городского населения. Но, стоит надеяться, с развитием экономики они смирятся с нашим правлением. В данный момент нам лучше будет сфокусироваться на остальной части населения – селянах. Создание новых субсидий направленных на развитие сельской местности поможет нам перевести их на нашу сторону."

 LEP_revitalize_the_tea_trade: "Восстановить торговлю чаем"
 LEP_revitalize_the_tea_trade_desc: "Торговля чаем в прошлом восточного и южного Китая была намного более популярным занятием. Оживление и развитие этого традиционного дела позволит многим бедным крестьянам зарабатывать небольшое количество денег, что интегрирует их в новую, современную экономику и поспособствует последующему развитию страны."

 LEP_patronize_xiangshen: "Выручить сяншень"
 LEP_patronize_xiangshen_desc: "Сяншэнь, мелкие землевладельцы, являются крайне ценными союзниками. Если мы заручимся их поддержкой, мы одновременно заручимся и поддержкой крестьян. Мы должны воспользоваться полученной властью над региональными правительствами и доказать, что мы являемся их главным сторонником. Это также усилит наше влияние над губернаторами."

 LEP_modern_agriculture: "Современное сельское хозяйство"
 LEP_modern_agriculture_desc: "Хотя в прошлом Китай был знаменит своими эффективными методами ведения сельского хозяйство, что отчасти, помогло его населению достигнуть огромных размеров, это преимущество давно было утрачено. Больше отставать нельзя, а значит, необходимо ввести западные технологии и методики."

 LEP_cult_of_personality: "Культ личности"
 LEP_cult_of_personality_desc: "Если Ци Сеюань, маршал нашей Лиги, планирует по-настоящему укоренить свою власть и влияние, то ему нужно поработать над созданием полумифической персоны. Сомнительно, что появятся люди, готовые противоречить человеку, которому поклоняются, словно божеству. Начать следует с публикации немного переработанной версии его биографии, включающей его предзнаменованное рождение и подвиги на поле боя."

 LEP_network_of_allegiances: "Сеть альянсов"
 LEP_network_of_allegiances_desc: "Никто не правит в одиночку. А поэтому Ци необходимо поддерживать сеть союзников по всей Лиге. Эту сеть надо будет старательно поддерживать и расширять, иначе последствия будут трагичны как для Лиги, так и для самого маршала."

 LEP_dubious_practices: "Сомнительные методы"
 LEP_dubious_practices_desc: "Для сохранения позиции власти Ци придётся использовать все доступные ему методы. Хотя Сунь Чуаньфан часто говорил о принципах и морали, на деле большая часть его действий было направленно на сохранение своего первенства. Ничто не мешает новому маршалу делать то же самое. Учитывая большее количество контроля над Нанкином и поддержку Германии, Ци, возможно, может позволить себе даже больше свободы в выборе методов."

 LEP_tsingtau_collaboration: "Коллаборация с Циндао"
 LEP_tsingtau_collaboration_desc: "Наше главное преимущество над остальными военными правителями заключается в поддержке Германии. Коллаборация с немцами предоставляет нам продвинутые технологии, эффективные армии и возможность индустриализации. Мы должны оберегать наши отношения любой ценой."

 LEP_german_reconstruction_crews: "Немецкие ремонтные бригады"
 LEP_german_reconstruction_crews_desc: "Ситуация в Лиге плачевна. Война привела к разрушениям невиданного масштаба: тысячи и тысячи людей погибли, железные дороги уничтожены, города сожжены дотла, фабрики разбомблены. Хотя у нашей страны и есть рабочие, готовые начать восстановительные работы, им не хватает экспертизы и финансирования."

 LEP_krupp_industrial_methods: "Промышленные процессы Круппа"
 LEP_krupp_industrial_methods_desc: "Китай, модернизируясь, должен учиться на опыте преуспевающих. Крупп является одним из самых сильных конгломератов Германии, оперирующих в концессиях ОАК. Мы должны пригласить их представителей для обучения наших инженеров и администраторов. Китаю для достижения успеха необходимо перенять немецкое устройство промышленности."

 LEP_german_research_aid: "Немецкая технологическая помощь"
 LEP_german_research_aid_desc: "Технологическое развитие Германии значительно превосходит наше. Мы смогли бы значительно увеличить темпы модернизации страны, если бы у нас был доступ к последним её наработкам. Нам нужно положить начало сотрудничеству между университетами и исследовательскими группами Германии и Китая."

 LEP_nanjing_university_expansion: "Расширение Нанкинского Университета"
 LEP_nanjing_university_expansion_desc: "Нанкинский Университет мал, не получает необходимого финансирования и предоставляет в основном устарелое образование. Это надлежит изменить, если мы хотим увидеть прогресс в нашей технологической сфере. Расширение университета необходимо для обучения нового поколения студентов современными методами."

 LEP_westernized_school_curriculum: "Западная школьная программа"
 LEP_westernized_school_curriculum_desc: "Китайская система образования крайне устарела. Реформы требуются не только школам сёл городов, но и большим университетам. В данный момент дети изучают вещи, практически не используемые в современных реалиях. Нам нужно создать стандартизированную школьную программу на основе западной, которая, стоит надеяться, поспособствует внедрению новых технологий в наше общество."

 LEP_deutsch_asiatische_loans: "Кредиты Дойч-Азиатише"
 LEP_deutsch_asiatische_loans_desc: "Дойч-Азиатише Банк значительно расширился за последние несколько лет и стал важным партнёром ОАК и одним из основных немецких инвесторов в Китае. Мы не пользуемся его услугами эффективно. Названный банк признан международно и может предоставить нам большие кредиты на развитие промышленности и инфраструктуры."

 LEP_opening_the_interior: "Открытие внутренних регионов"
 LEP_opening_the_interior_desc: "Китайская глубинка всегда оставалась относительно огороженной от иностранного влияния, что привело к простаиванию значительного количества ресурсов. Мы уверенны, что Германия будет крайне заинтересована  в разработке нетронутых залежей ресурсов, и нам нужно поскорее этим воспользоваться."

 LEP_improved_tungsten_extraction: "Расширение добычи вольфрама"
 LEP_improved_tungsten_extraction_desc: "Под нашим контролем находится несколько месторождений вольфрама и других ценных металлов. Мы должны заручиться поддержкой немцев в улучшении методов добычи и значительном расширении объёма добываемой и перерабатываемой руды."

 LEP_schantung_eisenbahn_expansion: "Расширение ШЖК"
 LEP_schantung_eisenbahn_expansion_desc: "Шаньтунгская Железнодорожная Компания создала планы по расширению и обновлению магистралей в центре нашей страны. Мы должны позволить им воплотить свои планы в реальность. Компания станет важной частью развития инфраструктуры на севере страны, так как финансирование и последующий контроль этих путей ОАК, скорее всего, будет принят холодно."

 LEP_eastern_resources_commission: "Комиссия по Ископаемым Востока"
 LEP_eastern_resources_commission_desc: "В Китае много полезных ископаемых. Слишком много, чтобы спонтанно начинать их разработку.  Мы должны организовать совместную Сино-Немецкую Комиссию по Ископаемым Востока, которая будет организовывать поиск и разработку залежей. Эта организация значительно ускорит процесс модернизации страны и позволит более эффективно индустриализировать страну."

 LEP_tolerate_vice: "Смириться с пороками"
 LEP_tolerate_vice_desc: "Азартные игры, проституция и торговля опиумом аморальны. Но они также крайне прибыльны. У нас нет желания начинать подобный бизнес, но прибыль слишком высока, чтобы запретить полностью. Мы не будем освещать нашу мягкость по отношению к подобной деятельности, но мы можем ввести дополнительные 'налоги', которые убедят нас не обращать внимания на нарушения."

 LEP_facilitate_german_prospecting: "Способствовать немецкой георазведке"
 LEP_facilitate_german_prospecting_desc: "Наши внутренние регионы были открыты немецким инвестициям, и региональные правительства должны способствовать геологической разведке Германии. Наши беднейшие провинции обогатятся благодаря разработке полезных ископаемых."

 LEP_inland_development_zones: "Внутренние Зоны Развития"
 LEP_inland_development_zones_desc: "Одной из форм ускорения развития глубинки страны, которая не нанесёт Китаю слишком много вреда, является создание 'Внутренних Зон Развития'. На них не будут распространяться регуляции и меры, которые предпримет региональное правительство. Концентрируя расселение иностранцев подобными мерами мы сможем также эффективнее их защищать."

 LEP_friendly_monopolies: "Дружба с монополиями"
 LEP_friendly_monopolies_desc: "Для гарантии безопасности нашего режима мы должны периодически идти на уступки нашим союзникам и партнёрам. Позволив определённым группам и предприятиям игнорировать ограничения в определённых сферах, мы сможем обеспечить себе поддержку с их стороны. Кроме того, это привлечёт большое количество инвестиций с их стороны ."

 LEP_five_provinces_one_marshal: "Пять провинций, один маршал"
 LEP_five_provinces_one_marshal_desc: "Пять провинций вновь вернулись под контроль одного маршала, Ци Сеюаня. Несмотря на весь хаос, разразившийся после смерти Суня, Ци выстоял и воссоздал Лигу в своём собственном видении. Для Нанкинской Клики наступила новая эпоха."

 #Military tree
 LEP_fallout_of_the_league_war: "Последствия войны Лиги"
 LEP_fallout_of_the_league_war_desc: "Самый мрачный момент Лиги, к счастью, миновал. Непокорный губернатор Чен решил, что сможет обезглавить маршала Лиги быстрым ударом в момент его слабости, а остатки Национально-революционной армии на юге решили, что это их последнее "ура." И все же Лига выстояла в этой буре. Теперь должен последовать период восстановления."

 LEP_reinstill_discipline: "Восстановить "Дисциплину""
 LEP_reinstill_discipline_desc: "После потери всякого подобия власти в Лиге стало очевидно, что без такта, связей и уважения Улыбающегося Тигра провинциальные армии - не более чем своекорыстные бродячие банды. Поскольку война Лиги, возможно, стала нашим худшим выступлением, маршал Лиги должен укрепить свою власть в качестве верховного главнокомандующего всеми провинциальными армиями."

 LEP_recoup_the_lost_divisions: "Восстановить потерянные дивизии"
 LEP_recoup_the_lost_divisions_desc: "Во время распада Лиги, и, что особенно важно, после восстания губернатора Чена, ряд старых армий Лиги стремились к дезертирству или восстанию аналогичным образом. Поскольку некоторые из наших рядов перешли в армию Аньхой или Гоминьдана, в нашем командном составе и иерархии образовались заметные пустоты. Чтобы восстановить Лигу, мы должны сначала восстановить армию."

 LEP_eliteheer_model: "Модель Элитхира"
 LEP_eliteheer_model_desc: "К большому счастью и благоразумию для армий Лиги, мы стали настоящим полигоном для испытания германской военной миссии и всех ее преимуществ. Широко сотрудничая с немецкими советниками, в отличие от вмешательства У Пэйфу или посредственных обрезков, которые получили Хунань и Лянгуань, истинное место рождения Элитхира находится в Нанкине! А не в Пекине!"

 LEP_new_model_officer: "Офицер нового образца"
 LEP_new_model_officer_desc: "Офицерский корпус Германии, безусловно, является самым превосходным в мире. Чтобы одержать свою самую фантастическую победу в Великой войне, Heer не смогли бы обойтись без обширного штаба способных офицеров, дополняющих каждый план. Воссоздавая немецкую советническую миссию, мы должны превознести роль младшего "офицера нового образца", если хотим добиться триумфа на поле боя."

 LEP_innovation_breeds_victory: "Инновации порождают победу"
 LEP_innovation_breeds_victory_desc: "Современные танки, современные самолеты, современные корабли, современные пушки - вот ключ к доминированию Германии на международном поле боя. Аналогичным образом следует модернизировать и китайские армии, особенно испытывающие недостаток в новейшей технике. И такие действия должны проводиться быстро, без остановок. Чтобы переломить ход конфликта, необходимо ускорить развитие современной гонки вооружений."

 LEP_staff_officer_school: "Школа штабных офицеров"
 LEP_staff_officer_school_desc: "Генералы и солдаты не могут добиться победы в одиночку, ведь посредники, офицерский корпус и местные командиры - это те, кто идет вперед в бою. Координируя ведение войны на местах, они должны следовать общей стратегической цели, в то время как тактические планы лучше всего оставить в их руках. Обучение наших офицеров местной автономии в командовании позволит Лиге никогда не быть парализованной нерешительностью."

 LEP_thorough_logistics: "Тщательная логистика"
 LEP_thorough_logistics_desc: "За грандиозными стратегическими маневрами и дерзкой реализацией локальных тактик часто забывают о кабинетной работе. Штабные офицеры, те, кто следит за тем, чтобы все наши бравые солдаты носили в руках оружие и боеприпасы к нему. Зарождающаяся логистическая инфраструктура Китая не дотягивает до европейской, это правда. Но Лига будет первой, кто внедрит современные методы логистики."

 LEP_disrupting_supply: "Нарушение снабжения"
 LEP_disrupting_supply_desc: "Аналогично, благодаря знаниям, позволяющим нам понять целостность снабжения, мы должны убедиться, что линии снабжения противника настолько хрупки, непрочны или прозрачны, насколько это возможно. Ведь битву можно выиграть благодаря стойкости солдат и гениальности командиров, но войну выигрывает способность армии сохранять темп."

 LEP_overtures_to_berlin: "Инициатива к Берлину"
 LEP_overtures_to_berlin_desc: "Проводя реконструкцию армии Лиги в соответствии с планами, заложенными в первоначальном плане 80 дивизий, возможно, настало время, наконец, воссоздать Германскую консультативную миссию? Чтобы по-настоящему подражать победоносным Heer, нам необходим опыт и мудрость их покорных слуг и воинов. Используя наши связи с Обществом Цзисина, давайте пошлем оливковую ветвь в Берлин."

 LEP_raining_thunder: "Дождь с громом"
 LEP_raining_thunder_desc: "Артиллерия - король войны. Немцы доказали это, и в войне, которая обычно ведется на Центральных равнинах и на побережье, доминирует размер пушки. Любая сила, имеющая более крупное орудие, более точного оператора и умелого командира, обязательно одержит абсолютную победу. Опираясь на опыт наших немецких советников, наша промышленность должна максимально повысить эффективность производства артиллерии."

 LEP_emphasising_mobility: "Подчеркивая мобильность"
 LEP_emphasising_mobility_desc: "Все военные теоретики современной эпохи, будь то китайские или европейские, понимают первичность и важность мобильной войны. Допуская экстравагантные тактические маневры, скудные силы могут зажать в клещи и окружить гораздо более крупные силы, сделав их пустыми. Точно так же можно захватить огромные территории и избежать уничтожения или дезинтеграции, просто сохраняя мобильность."

 LEP_symphony_of_factory_and_firepower: "Унисон промышленности и армии"
 LEP_symphony_of_factory_and_firepower_desc: "Провозглашенная немецкими военными теоретиками, такими как Макс Бауэр, и уважаемая большинством других фракций в их идеологических кругах, армия и промышленный сектор должны работать в прекрасной симфонии, если они хотят достичь общей синергетической цели. Используя наши особые деловые контакты с ОАК, а также при посредничестве Общества Цзиньсин, армия и промышленность будут работать в полном унисоне."

 LEP_primacy_of_the_engineering_corps: "Главенство инженерного корпуса"
 LEP_primacy_of_the_engineering_corps_desc: "Кто строит траншеи? Укрепления? Передовые оперативные базы? Если бы в нашей армии не было инженерного корпуса, наши солдаты были бы без защиты, просто сидячими утками для вражеского града огня. Современная война требует наличия преданных, сильных и выносливых военных инженеров, которые позволят нам проводить передовые операции."

 LEP_shattering_their_walls: "Сокрушая их стены"
 LEP_shattering_their_walls_desc: "Наша промышленность может быть на высоте, помогая нашим армиям иметь самое большое количество пушек на Юго-Востоке, но каково их качество? Чтобы по-настоящему навести страх на врагов, наши залпы должны быть не только многочисленными, но и разрушительными. С помощью составления серии курсов артиллерийской стрельбы и других методов мы должны научить наших артиллерийских командиров обрушивать на врагов адский огонь."

 LEP_artillery_of_the_sky: "Артиллерия неба"
 LEP_artillery_of_the_sky_desc: "Многие очерняют китайские военно-воздушные силы, разделенные усилиями региональных военачальников, многие сомневаются в возможности даже центрального правительства использовать современные авиационные методы или даже иметь на вооружении современные самолеты. Однако такие теоретики, как Цзян Бэйли, продолжают настаивать на внедрении "Артиллерии неба." Ведь Запад наглядно продемонстрировал великолепие третьего способа ведения войны."

 LEP_artillery_of_the_sea: "Морская артиллерия"
 LEP_artillery_of_the_sea_desc: "Наследие, оставленное нам Бэйянским флотом, достойно восхищения. Входивший в десятку лучших флотов мира по тоннажу и огневой мощи, Бэйянский флот был железной стеной океана. Покалеченный и оставленный на произвол судьбы китайско-японской войной, его современное воплощение скудно и вряд ли достойно китайской нации. Используя нашу огромную промышленность, мы снова будем править волнами с неугасающей сталью!"

 LEP_fortifying_our_positions: "Укрепление наших позиций"
 LEP_fortifying_our_positions_desc: "Когда мы смотрим на горизонт, все, что мы видим, охвачено лучами восходящего солнца. Если мы хотим выдержать натиск, а он действительно неизбежен, наше нападение должно быть многогранным, но мы не можем позволить нашей обороне отстать. Возводя бетонные щиты, лабиринты траншей, мы должны обеспечить железный фронт, который невозможно пробить."

 LEP_nanjing_air_academy: "Нанкинская военно-воздушная академия"
 LEP_nanjing_air_academy_desc: "Возможно, самым прискорбным является отсутствие координации в китайских ВВС. В Баодине есть своя академия, в Куньмине - аналогичная. У Вэмпоа была своя, а военачальники между ними демонстрируют свою собственную грубую реализацию воздушных сил. Как это ни прискорбно, но мы должны объединить все родные авиационные академии Нанкина, из которых вышли такие великие личности, как "китайский Линдберг", в одно учебное заведение. Если мы хотим иметь шанс в будущем."

 LEP_cult_of_aviation: "Культ авиации"
 LEP_cult_of_aviation_desc: "Хотя наши асы-истребители не могут выиграть воздушную войну в одиночку, они, тем не менее, служат обожаемыми звездами инновационного третьего направления войны. Используя методы пропаганды, мы можем представить этих (обычно молодых) солдат как отважных асов, ставящих на кон свою жизнь во славу китайской нации. Восхваляя героизм и храбрость, это будет способствовать воспитанию стойкости у наших пилотных кадров."

 LEP_china_air_fleet: "Воздушный флот Китая"
 LEP_china_air_fleet_desc: "Слишком долго китайцам приходилось терпеть вопиющие контракты от западников и империалистов, чтобы приобрести лишь несколько скудных, устаревших и совершенно бесполезных самолетов. Конечно, они все равно прекрасно справлялись со своей работой, в основном из-за отсутствия сильной оппозиции. Однако по мере того, как мир снова наступает на Китай, только самые трудолюбивые регионы могут претендовать на звание Родины ВВС Китая."

 LEP_through_fire_and_war: "Сквозь огонь и войну"
 LEP_through_fire_and_war_desc: "Будь то грязь, кровь, огонь или сталь, наши солдаты будут идти вперед всегда. Непоколебимые, с саблей у бедра и винтовкой в руках, наши люди должны служить примером истинной способности китайского солдата. Без наших воинов нет и никогда не будет будущего, в котором мы объединим китайскую нацию! Они не должны дрогнуть!"

 LEP_the_pinnacle_of_chinese_soldiery: "Идеал китайского солдата"
 LEP_the_pinnacle_of_chinese_soldiery_desc: "Истинное завершение стремлений немецкой военной миссии - создать новую армию, достойную того, чтобы войти в анналы китайской истории наряду с такими, как Цзингуоцзюнь, Ангуоцзюнь или Хугуоцзюнь. Наши солдаты не дрогнут и не сдадутся, столкнувшись с жестокостью этого мира! Наши солдаты идут вперед! Наши солдаты неистовствуют! Наши солдаты сражаются!"

### Bookmark ###
 LEP_KR_gathering_storm_desc: "Лига Сунь Чуаньфана образует южную половину оси, которая доминирует в Китае уже почти десять лет. Годы мира оказались благодатной почвой для амбиций, а вместе с ними и для зависти. Хотя Нанкин и Пекин остаются единым фронтом против внешних врагов, они стали не только союзниками, но и конкурентами. Некоторые говорят, что издержки этого соперничества уже начали сказываться.\n\nКак и многое в Китае, Лига является продуктом тщательного баланса, и великая бюрократическая пирамида Суна, возможно, уже начала трескаться и рушиться..."

### Intro Screen ###
 LEP_country_intro_background: "GFX_LEP_intro"
 LEP_country_intro_header: "Краеугольный камень Империи"
 LEP_country_intro_content: "Созданная во время войн последнего десятилетия и разросшаяся до её настоящих размеров после поражения Северной Экспедиции, Лига Суня Чуаньфана является конфедерацией провинциальных правительств со столицей в Нанкине. Хотя главным стимулом объединения провинций является страх перед Центральным Правительством, Лига остаётся краеугольным камнем Империи, работающим вместе с Пекином над разрешением внутренних проблем и сопротивлением чрезмерному влиянию иностранцев.\n\nЭтот непростой альянс принёс эпоху мира, а вместе с ней и относительное процветание. Иностранная промышленность преображает страну, а основу армии Суня составляют дивизии, обученные по немецкой методике и вооружённые немецким оружием. Маршал Лиги восседает на верхушке пирамиды бюрократии, и не смотря на появление всё большего количества проблем, не собирается покидать свой пост. Но материальная помощь Германии, необходимая для сопротивления давлению, исходящему от южных соседей и Пекина, является палкой о двух концах. Деньги немецких компаний попадают в государственные структуры всех уровней и раздразнивают и без того заметную предрасположенность государственных служащих к коррупции.\n\nЭто становится источником народных волнений, не обходящихся без агитации националистов и скрытного вмешательства остатков Гоминьдана. Кажется, что, не смотря на все усилия Суня сохранить единство членов Лиги, с каждым днём они всё больше отдаляются друг от друга. Но все междоусобицы страны кажутся незначительными по сравнению с восходящим солнцем на востоке. Лига должна быть готова сразиться с врагом не смотря на своё тяжёлое положение, ведь иначе её ждёт тотальное уничтожение.\n\nДоступны брифинги о положении в стране и её отношении с Германией и Центральным Правительством."

 LEP_country_intro_header_1: "Центральное правительство"
 LEP_country_intro_content_1: "Вместе со своим старым наставником, У Пейфу, Сунь Чуаньфан остановил Северную Экспедицию Гоминьдана, а также выбил экспансию Фэнтяня из Северной Равнины. Вместе они получили контроль над всем Китаем, но за миром последовали новые разногласия. Продолжит ли Сунь подчиняться своему давнему предводителю на севере, и позволит ли У продолжать своему ученику не считаться с его авторитетом?\n\nВ последующие года Пекинское Правительство У и Лига Суня поддерживали статус-кво, боясь вмешательства их общих врагов с севера и востока: Фэнтянского Правительства и Японии. Суню разрешается делать всё, что он пожелает, пока он будет продолжать поддерживать иллюзию единства страны. Неизвестно, долго ли это ещё продлится."

 LEP_country_intro_header_2: "Германия"
 LEP_country_intro_content_2: "Значительная роль Германии в победе над Северной Экспедицией предоставила Берлину большое количество влияние в Китае, даже не смотря на международную Шанхайскую Конференцию 1928 года, целью которой было предоставить всем странам равный доступ к китайскому рынку. Чтобы получить преимущество в обход этих 'ограничений', представители Германии предложили ряд соглашений маршалу Лиги Суню Чуаньфану и подвластным ему губернаторам. В обход международных соглашений и решений Пекина, Германия поддерживает стабильность Лиги и её автономию от Северного Чжили У Пейфу в обмен на концессии и влияние .\n\nЭто соглашение быстро потеряло поддержку простых китайцев. Контроль Германии разрастается, а плоды трудов оказываются в карманах генералов и иностранцев. Многие сомневаются в том, что Китаю действительно нужно подобное сотрудничество.\n\nОтношение Лиги с Германией в будущем, скорее всего, значительно изменится."

 LEP_country_intro_header_3: "Положение в стране"
 LEP_country_intro_content_3: "Влияние Германии и децентрализованное устройство Лиги часто приводит к локализованным беспорядкам, которые, хотя и быстро подавляются, являются симптомом больших проблем. В Лиге действует несколько антиправительственных организаций, которые не представляют из себя угрозы стране в данный момент, но должны находится под наблюдением.\n\nПартизаны Гоминьдана, оставшиеся после провала Северной Экспедиции в 1926 и второго восстания в 1932, укрываются от нас в горах Фуцзяня и глубинах городов-концессий. Последователи Игуаньдао, желающие очистить Китай от иностранного влияния и вернуть его к тысячелетним традициям, начали распространять своё влияние за пределы Шаньдуна в соседние восточные провинции. К югу, Гуандун Ань Гуанси, называемые вместе Лянгуан, а также Хуньань, де-факто автономны, и даже могут готовить планы по объявлению независимости.\n\nЗа всем этим следует наблюдать крайне внимательно."

### Events ###
 league_events.5.t: "Расследование убийства Суня"
 league_events.5.d: "Когда "Улыбающийся тигр" был сбит, в Лиге воцарилась анархия. Солдаты бунтовали, дезертировали, Чэнь Тяоюань пытался обезглавить Лигу своим наступлением, Национально-революционная армия восстала из своих повстанческих сил для последнего "ура". Говоря откровенно, тысячи людей уже погибли, и еще много смертей последует, если правление маршала Лиги Ци будет закреплено. Хотя к краху власти Лиги действительно привели многочисленные факторы, будь то заманчивая игра губернатора Чэня с властью или Гоминьдан. Некоторые, недосягаемые для маршала Ци, даже предполагают, что немцы и сам Ци способствовали гибели Сунь.\n\nОтбросив весь этот сброд, осажденный со всех сторон врагами, которых сейчас больше, чем когда-либо, маршал Ци блестяще организовал официальное расследование трагического убийства маршала Сунь Чуаньфана. Большинство, в первую очередь союзники Суня в нашем лагере, такие как Се Хунсунь, Ли Баочжан, Ян Вэнькай, Вэй Даофэн и многие другие, не верят, что убийца Ши Цзяньцяо действовал в одиночку. Все они ищут ответы в этом тумане загадок. Как она могла подобраться так близко? Как Сунь мог ослабить бдительность?\n\nНекоторые предполагают, что она работала на Гоминьдан, являясь агентом Дай Чуньфэна. Другие считают, что она работала на информационные сети "Северного Чжили" - план, который катастрофически не сработал. Некоторые считают, что она была агнеткой Чэнь Тяоюаня, поскольку являлась сестрой одного из его подчиненных командиров, Ши Ляньцая. Другие утверждают, что это была месть за жестокое обезглавливание ее отца Ши Конгбина, умершего почти десять лет назад.\n\nВ кругах сторонников Сунь даже ходят слухи, что маршал Лиги Ци Сюэюань был тем человеком, который должен был погасить пламя. По воспоминаниям и сообщениям, женщины использовали оружие немецкого производства, безопасность провинции была особенно слабой, и у нее был человек внутри. Хуже того, предположительно последним человеком, присутствовавшим на аудиенции у коматозного тела Сун, был не кто иной, как сам Ци. Никто не осмеливается говорить об этом открыто, опасаясь, что Ци или его гончие изрешетят их пулями.\n\nДля этого расследования, конечно же, должен быть следователь. Тот, кто возглавит дело и докопается до истины, или, по крайней мере, до того, что нужно Ци. Маршалу были предложены варианты. Можно выбрать близкого и преданного Суню человека, Лю Цзунцзи, который лучше всех знает его и знает, где искать. Однако он может показать Ци не в лучшем свете, так как многие преданные Суну люди считают, что Ци был готов отодвинуть Суна в сторону с излишним энтузиазмом, и подозревают его. Другой вариант - выбрать Тянь Вэньбина, лояльного Ци, который проследит, чтобы результаты не навредили маршалу Лиги. Кроме того, есть вариант с немецким следователем, который будет иметь гораздо больше доверия, чем наш. Наконец, мы можем использовать северных Жили, поскольку они не будут иметь много противоречивых лояльностей."
 league_events.5.a: "Лакеи Ци будут вести расследование"
 league_events.5.b: "Вперед, офицер Лю!"
 league_events.5.c: "Попросите немецкого следователя"
 league_events.5.e: "Свяжитесь с Чжили Лю Сянтина"

 league_events.6.t: "Чувство направления"
 league_events.6.d: "Крайне важно, что по соображениям легитимности и для того, чтобы маршал Лиги мог сосредоточиться на восстановлении Лиги, "Расследование убийства Суня" (как его окрестили) является абсолютно независимым от эгиды и влияния правительства. Это если не принимать во внимание тот факт, что следователь связан с Лигой. Тем не менее, многие в Лиге считают, что свержение Сун было всего лишь срывом целого карточного домика. И если мы хотим докопаться до причин, побудивших убийцу, маршалу следовало бы дать нашему бесстрашному следователю зацепку. А может быть, даже некоторые первоначальные предположения и мнения высшего командования о событиях, произошедших в тот день.\n\nЕстественно, это поможет расследованию, позволит ему продвинуться быстрее и решить вопрос в кратчайшие сроки. Что еще лучше для маршала Лиги лично, так это то, что он сможет в некоторой степени повлиять на ход расследования и контролировать его результаты. Хотя всегда остается вероятность того, что следователь просто проигнорирует предложение маршала, отмахнувшись от него как от предвзятого участника. Но все же остается надежда, что это хотя бы немного их переубедит."
 league_events.6.a: "\"Wu and Cao masterminded it!\""
 league_events.6.b: "\"It was Dai Chunfeng! I'm sure of it!\""
 league_events.6.c: "\"Sun's friends are all two faced, like him...\""
 league_events.6.e: "\"Chen's connection is undeniable!\""
 league_events.6.f: "\"The woman sought revenge.\""

 league_events.7.t: "Отчет почти готов"
 league_events.7.d: "Даже в бюрократической и гниющей структуре Лиги внутренние расследования, касающиеся безопасности, персонала, лояльности и всего остального, что на уме у маршала Лиги, проходят быстро. Сверхбдительная натура Сунь Чуаньфана вновь оказалась весьма полезной. В то время как многие чиновники бежали с документами и, конечно, богатством, наш следователь сообщил нам, что отчет о расследовании Сунь быстро дорабатывается.\n\nПосле многих недель настойчивых и, возможно, слишком неудобных для Ци Сюэюаня вторжений, следователь начал оформлять и собирать воедино все разрозненные компоненты. Нарисовав картину, маршалу Ци понравилось или нет, но расследование осталось относительно независимым от прямого вмешательства, несмотря на наше первоначальное ощущение направления. Ошеломляющая победа за подлинность и легитимность отчета, но те, кто в лагере Ци, все еще опасаются, что следы были замечены недостаточно хорошо..."
 league_events.7.a: "Еще больше людей может погибнуть, если они не будут осторожны"

 league_events.8.t: "Северное Чжили виновно!"
 league_events.8.d: "Во дворце маршала Лиги висела напряженная атмосфера. Заранее пришло известие, что независимый следователь, нанятый маршалом Ци, завершил свой отчет и исследование ужасного убийства Сунь Чуаньфана. Как и ожидалось, следователь и его команда намерены получить аудиенцию у маршала Ци и Тянь Вэньбиня, чтобы раскрыть "откровения" маршалу Лиги. Конечно, маршал уже знает, кто виновен, и хотя он не сотрудничал с другими игроками, которые подстрелили Улыбающегося Тигра, он, тем не менее, великолепно лавировал через трясину и манию. Наконец-то он занял предпоследнее место, и любая информация в отчете о расследовании, которая может привести к Ци, несомненно, не покинет этот дворец.\n\nСидя в своем кабинете, он терпеливо ждал, когда в дверь постучат, и в логово маршала ворвется Тянь в сопровождении следственной группы. Сев в единственное кресло напротив маршала, Тянь встал рядом со своим хозяином, а следователь достал из портфеля запечатанную папку. Протянув ее маршалу Лиги, Ци с вызовом раскрыл папку, и следователь начал излагать выводы своей команды.\n\nПохоже, что в результате расследования выяснилось, что Северные Чжили участвовали в убийстве Сунь Чуаньфана! Согласно докладу, Ши Цзяньцяо, стрелявшая в Сунь, была на содержании у Ван Юйцзя, самого выдающегося шпиона Цао Куня. Естественно, этот вывод имеет подкрепление, ведь Северная Чжили с 1929 года стремится подчинить себе властные структуры Южной Чжили. После встречи с Лу Сяньтином, известным шпионом Лиги благодаря его предыдущей связи с Сунем, она была отправлена в Нанкин, чтобы действовать от его имени в качестве оперативного сотрудника. Однако, очевидно, она действовала нечестно. После покупки ОАК железной дороги Чжегана и усиления беспорядков Ши увидел в этом прекрасную возможность покончить с Сунем раз и навсегда."
 league_events.8.a: "\"Seems Cao lost control of his rat.\""

 league_events.9.t: "Гоминьдан виновен!"
 league_events.9.d: "Во дворце маршала Лиги висела напряженная атмосфера. Заранее поступили новости о том, что независимый следователь, нанятый маршалом Ци, завершил свой отчет и исследование ужасного убийства Сунь Чуаньфана. Как и ожидалось, следователь и его команда намерены получить аудиенцию у маршала Ци и Тянь Вэньбиня, чтобы раскрыть "откровения" маршалу Лиги. Конечно, маршал уже знает, кто виновен, и хотя он не сотрудничал с другими игроками, которые сбили Улыбающегося Тигра, он, тем не менее, великолепно лавировал через трясину и манию. Наконец-то он занял предпоследнее место, и любая информация в отчете о расследовании, которая может привести к Ци, несомненно, не покинет этот дворец.\n\nСидя в своем кабинете, он терпеливо ждал, когда в дверь постучат, и в логово маршала ворвется Тянь в сопровождении следственной группы. Сев в единственное кресло напротив маршала, Тянь встал рядом со своим хозяином, а следователь достал из портфеля запечатанную папку. Протянув ее маршалу Лиги, Ци раздраженно вскрыл папку, и следователь начал излагать выводы своей команды.\n\nПохоже, что в результате расследования выяснилось, что Лига Десяти Гоминьдана участвовала в убийстве Сунь Чуаньфана! Согласно докладу, Ши Цзяньцяо, женщина, стрелявшая в Суня, была на содержании у Дай Чуньфэна, красного премьера партийного государства. Ши, управлявшая своей печально известной бандой гангстеров, шанхайских мафиози и приверженцев партии, была завлечена обещаниями отомстить. Воспользовавшись беспорядками после покупки ОАК железной дороги Чжэган, Дай увидел момент, когда Минганьское повстанческое движение могло окончательно сбросить оковы Суня, и санкционировал убийство."
 league_events.9.a: "Партийное государство поглощает другое"

 league_events.10.t: "Соратник Суня виновен!"
 league_events.10.d: "Во дворце маршала Лиги висела напряженная атмосфера. Заранее пришло известие, что независимый следователь, нанятый маршалом Ци, завершил свой отчет и исследование ужасного убийства Сунь Чуаньфана. Как и ожидалось, следователь и его команда намерены получить аудиенцию у маршала Ци и Тянь Вэньбиня, чтобы раскрыть "откровения" маршалу Лиги. Конечно, маршал уже знает, кто виновен, и хотя он не сотрудничал с другими игроками, которые сбили Улыбающегося Тигра, он, тем не менее, великолепно лавировал через трясину и манию. Наконец-то он занял предпоследнее место, и любая информация в отчете о расследовании, которая может привести к Ци, несомненно, не покинет этот дворец.\n\nСидя в своем кабинете, он терпеливо ждал, когда в дверь постучат, и в логово маршала ворвется Тянь в сопровождении следственной группы. Сев в единственное кресло напротив маршала, Тянь встал рядом со своим хозяином, а следователь достал из портфеля запечатанную папку. Протянув ее маршалу Лиги, Ци с вызовом раскрыл папку, и следователь начал излагать выводы своей команды.\n\nПохоже, что в результате расследования выяснилось, что убийство Сунь Чуаньфана было организовано не кем иным, как одним из его соратников! Согласно отчету, Ши Цзяньцяо, женщина, стрелявшая в Сунь, была знакомой преступника. Будучи человеком амбициозным, он уже пытался сместить Суня в 1920-х годах и, похоже, попробовал свои силы еще раз. Рассматривая Суня как препятствие на пути к провинциальному губернаторству, он предоставил Ши доступ во дворец после ежегодного губернаторского собрания, состоявшегося в начале года. Хотя в отчете не было собрано достаточно доказательств, чтобы предположить, кто является его сообщником, он дает несколько предположений. Губернатор Дэн или губернатор Чэнь И.\n\nНесмотря на то, что Ци был так близок к обвинению..."
 league_events.10.a: "\"Enemies pretending to be friends...\""

 league_events.11.t: "Чэнь виновен!"
 league_events.11.d: "Во дворце маршала Лиги висела напряженная атмосфера. Заранее пришло известие, что независимый следователь, нанятый маршалом Ци, завершил свой отчет и исследование ужасного убийства Сунь Чуаньфана. Как и ожидалось, следователь и его команда намерены получить аудиенцию у маршала Ци и Тянь Вэньбиня, чтобы раскрыть "откровения" маршалу Лиги. Конечно, маршал уже знает, кто виновен, и хотя он не сотрудничал с другими игроками, которые сбили Улыбающегося Тигра, он, тем не менее, великолепно лавировал через трясину и манию. Наконец-то он занял предпоследнее место, и любая информация в отчете о расследовании, которая может привести к Ци, несомненно, не покинет этот дворец.\n\nСидя в своем кабинете, он терпеливо ждал, когда в дверь постучат, и в логово маршала ворвется Тянь в сопровождении следственной группы. Сев в единственное кресло напротив маршала, Тянь встал рядом со своим хозяином, а следователь достал из портфеля запечатанную папку. Протянув ее маршалу Лиги, Ци с вызовом раскрыл папку, и следователь начал излагать выводы своей команды.\n\nСудя по всему, в результате расследования они пришли к выводу, что убийство Сунь Чуаньфана было организовано не кем иным, как губернатором Аньхой Чэнь Тяоюанем! Согласно отчету, Ши Цзяньцяо, женщина, стрелявшая в Суня, была шпионкой Чэня. В пользу такого вывода говорит и тот факт, что ее родной брат, Ши Чжунчэн, был одним из главных подчиненных Чэня. Работая на него в течение многих лет, Чэнь использовал свой шанс с покупкой ОАК железной дороги Чжегань, чтобы одним стремительным ударом обезглавить Лигу."
 league_events.11.a: "Чёртов дурак"

 league_events.12.t: "Женщина искала мести!"
 league_events.12.d: "Во дворце маршала Лиги висела напряженная атмосфера. Заранее пришло известие, что независимый следователь, нанятый маршалом Ци, завершил свой отчет и исследование ужасного убийства Сунь Чуаньфана. Как и ожидалось, следователь и его команда намерены получить аудиенцию у маршала Ци и Тянь Вэньбиня, чтобы раскрыть "откровения" маршалу Лиги. Конечно, маршал уже знает, кто виновен, и хотя он не сотрудничал с другими игроками, которые сбили Улыбающегося Тигра, он, тем не менее, великолепно лавировал через трясину и манию. Наконец-то он занял предпоследнее место, и любая информация в отчете о расследовании, которая может привести к Ци, несомненно, не покинет этот дворец.\n\nСидя в своем кабинете, он терпеливо ждал, когда в дверь постучат, и в логово маршала ворвется Тянь в сопровождении следственной группы. Сев в единственное кресло напротив маршала, Тянь встал рядом со своим хозяином, а следователь достал из портфеля запечатанную папку. Протянув ее маршалу Лиги, Ци с вызовом раскрыл папку, и следователь начал излагать выводы своей команды.\n\nСудя по всему, расследование показало, что убийство Сунь Чуаньфана было всего лишь заговором на почве ярости! Стремясь отомстить за жестокое обезглавливание своего отца Ши Кунбина, Ши Цзяньцяо сумела в одиночку внедриться в штаб Суня. Соответственно, никаких реальных политических связей у Ши не обнаружилось. Похоже, Улыбающийся тигр наконец-то получил должное вознаграждение."
 league_events.12.a: "Похоже, умы могут думать одинаково..."

 league_events.13.t: "Немцы виновны!"
 league_events.13.d: "Во дворце маршала Лиги висела напряженная атмосфера. Заранее пришло известие, что независимый следователь, нанятый маршалом Ци, завершил свой отчет и исследование ужасного убийства Сунь Чуаньфана. Как и ожидалось, следователь и его команда намерены получить аудиенцию у маршала Ци и Тянь Вэньбиня, чтобы раскрыть "откровения" маршалу Лиги. Конечно, маршал уже знает, кто виновен, и хотя он не сотрудничал с другими игроками, которые сбили Улыбающегося Тигра, он, тем не менее, великолепно лавировал через трясину и манию. Наконец-то он занял предпоследнее место, и любая информация в отчете о расследовании, которая может привести к Ци, несомненно, не покинет этот дворец.\n\nСидя в своем кабинете, он терпеливо ждал, когда в дверь постучат, и в логово маршала ворвется Тянь в сопровождении следственной группы. Сев в единственное кресло напротив маршала, Тянь встал рядом со своим хозяином, а следователь достал из портфеля запечатанную папку. Протянув ее маршалу Лиги, Ци с вызовом раскрыл папку, и следователь начал излагать выводы своей команды.\n\nСудя по всему, в результате расследования они пришли к выводу, что убийство Сунь Чуаньфана было организовано не кем иным, как Нанкинской комиссией, ОАК и немецким консульством! Согласно отчету, Ши Цзяньцяо, женщина, застрелившая Суня, работала по заказу немцев. Действуя в Нанкине в качестве политического шпиона для ОАК, доклад заходит на самую неудобную для маршала Лиги территорию. В нем утверждается, что Берлин заставил ОАК купить железную дорогу Чжегань, чтобы посеять раздор, а затем позволил Ши отомстить. Очевидно, немцы опасались, что Сун снова перейдет на антиконцессионную позицию и в любой момент отвергнет их. Вместо этого немцы действовали первыми, желая заполучить кого-то, более отвечающего их интересам.\n\nОстановившись на обвинении Ци Сеюаня, если бы отчет был опубликован как есть, он, несомненно, вызвал бы отторжение у его немецких сторонников."
 league_events.13.a: "Так близко и так далеко"

 league_events.14.t: "Ци виновен!"
 league_events.14.d: "Во дворце маршала Лиги висела напряженная атмосфера. Заранее пришло известие, что независимый следователь, нанятый маршалом Ци, завершил свой отчет и исследование ужасного убийства Сунь Чуаньфана. Как и ожидалось, следователь и его команда намерены получить аудиенцию у маршала Ци и Тянь Вэньбиня, чтобы раскрыть "откровения" маршалу Лиги. Конечно, маршал уже знает, кто виновен, и хотя он не сотрудничал с другими игроками, которые сбили Улыбающегося Тигра, он, тем не менее, великолепно лавировал через трясину и манию. Наконец-то он занял предпоследнее место, и любая информация в отчете о расследовании, которая может привести к Ци, несомненно, не покинет этот дворец.\n\nСидя в своем кабинете, он терпеливо ждал, когда в дверь постучат, и в логово маршала ворвется Тянь в сопровождении следственной группы. Сев в единственное кресло напротив маршала, Тянь встал рядом со своим хозяином, а следователь достал из портфеля запечатанную папку. Протянув ее маршалу Лиги, Ци с вызовом раскрыл папку, и следователь начал излагать выводы своей команды.\n\nСудя по всему, расследование показало, что убийство Сунь Чуаньфана организовал не кто иной, как... сам маршал Лиги! Согласно отчету, женщина, убившая Сунь, Ши Цзяньцяо, не была связана с Ци. Фактически она действовала независимо! Вместо этого в отчете говорилось о последствиях, о подозрительной активности Ци после того, как Сунь впал в кому. Воспользовавшись случаем, выпавшим после покупки ОАК, Ци завершит начатое Ши, убив Суня во сне.\n\nСледственная группа уже предрешила свою судьбу, войдя в ту комнату. По сообщениям из вторых рук, после короткого переполоха в дворцовых садах раздалась серия выстрелов. Однако они не привлекли особого внимания, поскольку перестрелки стали обычным явлением в Нанкине."
 league_events.14.a: "\"I warned them.\""

 league_events.15.t: "Время обнародовать результаты"
 league_events.15.d: "После того, как напряженная атмосфера разрядилась, а следователям позволили выйти живыми из Дворца маршала Лиги, на администрацию Ци легло бремя обнародования результатов, чтобы окончательно пресечь любые дальнейшие слухи и антикитайские настроения. Интеллектуалы, бюрократы и бизнесмены, которые требуют от Нанкина какого-то окончательного заключения, не сомневаются, что содержание отчета изменит общественное мнение в сторону того, кто является виновником.\n\nОднако маршалу Лиги и Тянь Вэньбину стало ясно, что есть интересное предложение. Когда отчет в наших руках, возможно, было бы разумно... немного подправить факты? Изменить их так, чтобы они соответствовали той версии, на которую наше правительство хочет направить общественное негодование. Разумеется, всегда есть почетный вариант - остаться при своих результатах. В конце концов, они не содержат конкретных обвинений в адрес Ци."
 league_events.15.a: "Мы должны придерживаться результатов"
 league_events.15.b: "Конечно, это было Северное Чжили!"
 league_events.15.c: "Должно быть, это был Гоминьдан"
 league_events.15.e: "Должно быть, Чэнь виноват!"

 league_events.16.t: "Отчёт о расследовании"
 league_events.16.d_cao_kun: "\"At 6:23 a.m. Marshal Sun Chuanfang awoke and was served his morning breakfast. At 6:51, he got out of bed and put on his Marshal uniform and went to a meeting with some of his officers. At this point, Shi Jianqiao, the assassin, had put on her disguise as a serving woman, and had infiltrated Suns serving staff. Following Sun's meeting, Sun then went out to the courtyard, where some troops were being trained. As he watched the training exercise, idle for only a moment, Shi approached from behind him, drew a German Luger pistol, and shot at Sun three times; once in the centre of his back, once in his shoulder, and one bullet flying past his head. Shi was quickly apprehended by Sun's bodyguards, and Sun was rushed to medical assistance. However, he lost blood very quickly, and so passed from his coma a few weeks later.\n\nEvidence collected by an investigatory body has concluded that Shi Jianqiao was an agent for President Cao Kun, whom intended to keep tabs on the League Marshal due to receiving little clear facts about the havoc. Albeit the assassin had other plans...\""
 league_events.16.d_sun: "\"At 6:23 a.m. Marshal Sun Chuanfang awoke and was served his morning breakfast. At 6:51, he got out of bed and put on his Marshal uniform and went to a meeting with some of his officers. At this point, Shi Jianqiao, the assassin, had put on her disguise as a serving woman, and had infiltrated Suns serving staff. Following Sun's meeting, Sun then went out to the courtyard, where some troops were being trained. As he watched the training exercise, idle for only a moment, Shi approached from behind him, drew a German Luger pistol, and shot at Sun three times; once in the centre of his back, once in his shoulder, and one bullet firing past his head. Shi was quickly apprehended by Sun's bodyguards, and Sun was rushed to medical assistance. However, he lost blood very quickly, and so passed from his coma a few weeks later.\n\nEvidence collected by an investigatory body has concluded that Shi Jianqiao was an agent for a provincial governor under Sun, who saw the instability of the time as an opportunity for personal gain.\""
 league_events.16.d_kuo: "\"At 6:23 a.m. Marshal Sun Chuanfang awoke and was served his morning breakfast. At 6:51, he got out of bed and put on his Marshal uniform and went to a meeting with some of his officers. At this point, Shi Jianqiao, the assassin, had put on her disguise as a serving woman, and had infiltrated Suns serving staff. Following Sun's meeting, Sun then went out to the courtyard, where some troops were being trained. As he watched the training exercise, idle for only a moment, Shi approached from behind him, drew a German Luger pistol, and shot at Sun three times; once in the centre of his back, once in his shoulder, and one bullet firing past his head. Shi was quickly apprehended by Sun's bodyguards, and Sun was rushed to medical assistance. However, he lost blood very quickly, and so passed from his coma a few weeks later.\n\nEvidence collected by an investigatory body has concluded that Shi Jianqiao was an agent for the Kuomintang's League of Ten, who saw the instability of the time as an opportunity to bring the League down, and restore their National Revolution.\""
 league_events.16.d_wom: "\"At 6:23 a.m. Marshal Sun Chuanfang awoke and was served his morning breakfast. At 6:51, he got out of bed and put on his Marshal uniform and went to a meeting with some of his officers. At this point, Shi Jianqiao, the assassin, had put on her disguise as a serving woman, and had infiltrated Suns serving staff. Following Sun's meeting, Sun then went out to the courtyard, where some troops were being trained. As he watched the training exercise, idle for only a moment, Shi approached from behind him, drew a German Luger pistol, and shot at Sun three times; once in the centre of his back, once in his shoulder, and one bullet firing past his head. Shi was quickly apprehended by Sun's bodyguards, and Sun was rushed to medical assistance. However, he lost blood very quickly, and so passed from his coma a few weeks later.\n\nEvidence collected by an investigatory body has concluded that Shi Jianqiao was working alone, seeking revenge against Sun after the brutal beheading of Shi Congbin in the 1920s.\""
 league_events.16.d_ger: "\"At 6:23 a.m. Marshal Sun Chuanfang awoke and was served his morning breakfast. At 6:51, he got out of bed and put on his Marshal uniform and went to a meeting with some of his officers. At this point, Shi Jianqiao, the assassin, had put on her disguise as a serving woman, and had infiltrated Suns serving staff. Following Sun's meeting, Sun then went out to the courtyard, where some troops were being trained. As he watched the training exercise, idle for only a moment, Shi approached from behind him, drew a German Luger pistol, and shot at Sun three times; once in the centre of his back, once in his shoulder, and one bullet firing past his head. Shi was quickly apprehended by Sun's bodyguards, and Sun was rushed to medical assistance. However, he lost blood very quickly, and so passed from his coma a few weeks later.\n\nEvidence collected by an investigatory body has concluded that Shi Jianqiao was an agent for the Germans, who feared that Sun was drifting away from their influence and instead wanted someone more loyal as League Marshal.\""
 league_events.16.d_chen: "\"At 6:23 a.m. Marshal Sun Chuanfang awoke and was served his morning breakfast. At 6:51, he got out of bed and put on his Marshal uniform and went to a meeting with some of his officers. At this point, Shi Jianqiao, the assassin, had put on her disguise as a serving woman, and had infiltrated Suns serving staff. Following Sun's meeting, Sun then went out to the courtyard, where some troops were being trained. As he watched the training exercise, idle for only a moment, Shi approached from behind him, drew a German Luger pistol, and shot at Sun three times; once in the centre of his back, once in his shoulder, and one bullet firing past his head. Shi was quickly apprehended by Sun's bodyguards, and Sun was rushed to medical assistance. However, he lost blood very quickly, and so passed from his coma a few weeks later.\n\nEvidence collected by an investigatory body has concluded that Shi Jianqiao was an agent for the traitor warlord Chen Tiaoyuan, who saw the viewed the instability of the time as an opportunity to seize the position of League Marshal for himself.\""
 league_events.16.a: "Наконец-то с этим можно покончить"

 league_events.17.t: "Силы Ци контролируют арсенал Нанкина"
 league_events.17.d: "Сегодня, рано утром, силы Ци смогли полностью взять под свой контроль арсенал Нанкина. После смерти Суня и прихода Ци к власти гарнизон Нанкина разделился на сторонников Суня и сторонников Ци. Многие из солдат и офицеров считают, что Ци не готов править, а некоторые даже заявляют, что Ци сам подготовил смерть Суня ради заполучения позиции маршала Лиги. Сражения в Нанкине не прекращались с момента захвата властью Ци. Отряды Суня находились в основном возле арсенала Нанкина, снаряжения в котором было достаточно, чтобы держать оборону долгое время. Но теперь он, наконец, пал в наши руки, что стало знаком окончательной победы наших сил в Нанкине."
 league_events.17.a: "Отлично"

 league_events.18.t: "Протесты в Нанкине затихают"
 league_events.18.d: "После того, как наши силы захватили контроль над арсеналом Нанкина, верные Суню отряды рассеялись. Но многие солдаты присоединились к протестующим против Ци гражданам города. Многие хотят положить конец произволу милитаристов в Китае. Есть даже те, кто считают, что Гоминьдан может быть лучшей альтернативой, чем маршал Ци! К счастью, при помощи оружия, найденного в арсенале, наши войска смогли быстро разогнать толпы бунтарей. Граждане разошлись по домам, верные нам отряды прочёсывают улицы, и Нанкин безоговорочно находится под нашим контролем."
 league_events.18.a: "Нанкин наш"

 league_events.19.t_1: "Север, юг или запад?"
 league_events.19.t_2: "Запад или юг?"
 league_events.19.d_1: "Собрав экстренное совещание высшего военного командования в Маршальском дворце, маршал Ци собрал всех возможных участников высшего эшелона армии Лиги. Поскольку губернаторы Дэн, Чжоу и представители других провинций за пределами Нанкина не смогли присутствовать, делегировать стратегический план действий пришлось тем, кто находился непосредственно в городе. В штабном совещании под руководством Лю Цзунцзи участвовали Ли Баочжан, Мэн Чжаоюэ, Се Хунсунь, Ван Хаоцзи и молодой гвардеец Сюй Пейген.\n\nТри различных плана были разработаны и предложены на окончательное рассмотрение Ци Сюэюань. Каждый план отличается тем, какие силы и на какой цели следует направить.\n\nПервый план направлен на маневрирование силами, верными Се Хунсуню, на север, заставая солдат [SQI.GetLeader] врасплох, как это уже делал Се почти десять лет назад, и захватить Цзинань без особого сопротивления. Второй план, предложенный Ли Баожаном и Лю Цзунцзи, предполагает удар на юг, используя силы под командованием Ли совместно с губернатором Дэн и силами провинции Чжоу. Третий план, поддержанный Ван Хаоцзи и Сюй Пэйгэном, нацелен на запад. Сокрушив ближайшую угрозу Нанкину, он позволит армии Лиги выдержать натиск Гоминьдана, разгромить Шаньдун, а затем двинуться на юг, как только Национально-революционная армия потеряет присутствие духа.\n\nВсе стратегические планы имеют свои положительные и отрицательные стороны, как в военном, так и в политическом плане, по крайней мере, для правления Ци Сеюаня. Однако собравшиеся в полном составе довольно нехотя заверили маршала Лиги, что проведут любую инициативу по его выбору."
 league_events.19.d_2: "Собрав экстренное совещание высшего военного командования в Маршальском дворце, маршал Ци собрал всех возможных участников высшего эшелона армии Лиги. Поскольку губернаторы Дэн, Чжоу и представители других провинций за пределами Нанкина не смогли присутствовать, делегировать стратегический план действий пришлось тем, кто находился непосредственно в городе. На совещании под руководством Лю Цзунцзи присутствовали Ли Баочжан, Мэн Чжаоюэ, Се Хунсунь, Ван Хаоцзи и молодой гвардеец Сюй Пейген.\n\nДва различных плана были составлены и предложены на окончательное рассмотрение Ци Сюэюаню. Сосредоточившись на быстром ведении мобильной войны, чтобы обойти и окружить многочисленных противников Лиги, оба плана расходятся в том, какие силы и на какую цель следует направить.\n\nПервый план, предложенный Ли Баожаном и Лю Цзунцзи, направлен на удар в южном направлении, используя силы под командованием Ли в сочетании с губернатором Дэн и собственными силами провинции Чжоу. Второй план, поддержанный Ван Хаоцзи и Сюй Пэйгэном, нацелен на запад. Сокрушив ближайшую угрозу Нанкину, он позволит армии Лиги выдержать натиск Гоминьдана, разгромить Шаньдун, а затем двинуться на юг, как только Национально-революционная армия потеряет присутствие духа.\n\nУ обоих стратегических планов есть свои положительные и отрицательные стороны, одновременно в военном и политическом плане, по крайней мере, для правления Ци Сюэюаня. Однако собравшиеся в полном составе довольно нехотя заверили маршала Лиги, что проведут любую инициативу по его выбору."
 league_events.19.a: "На север к Шаньдуню!"
 league_events.19.b: "На юг к Гоминданю!"
 league_events.19.c: "На запад к предателю Ченю!"

 league_events.20.t: "Чистка нелояльных офицеров"
 league_events.20.d: "Сколько себя помнит маршал Лиги, армия Лиги была укомплектована людьми с не слишком четкой лояльностью. Конечно, у вас есть сторонники и приверженцы Солнца, которые составляют большинство, но в провинциях обычно присягают на верность губернатору провинции, а не маршалу Лиги. Поэтому возникала шаткая ситуация, в которой личная связь Суна с губернатором провинции была тонким барьером между другом и врагом.\n\n После окончательного предательства Чэнь Тяоюаня стало очевидно, что такая система не может сохраниться. Те, кто не верен Нанкину, в будущем могут стать мятежниками. Как будут функционировать наши вооруженные силы, если местные офицеры не будут хранить абсолютную верность Ци Сеюаню?\n\n Для решения этой проблемы в последние несколько дней была проведена массовая чистка офицерского состава Лиги. Этой работой занимался недавно созданный Комитет военной лояльности - орган следователей, которые проверяют все истории офицеров и их прошлые связи. Допрашивая многих в Нанкине, не входящих в свиту Ци, они уже провели множество арестов.\n\nОфицеры, уличенные в связях с Гоминьданом, бандитами или другими военными военачальниками, причем некоторые связи насчитывают не одно десятилетие, были заключены в тюрьму на неопределенный срок. Хотя есть сообщения о внесудебных казнях, совершаемых за завесой."
 league_events.20.a: "Преданность гарантируется пулей"

 league_events.21.t: "Арестованы авторы газет"
 league_events.21.d: "Только сегодня утром многочисленные группы военной полиции совершили налет на многочисленные редакции газет, арестовав сотни писателей, редакторов и владельцев компаний. Действуя от имени маршала Лиги Ци, ему стало очевидно, что газеты причастны к развалу Лиги, и хотя Лига находится в осаде многочисленных врагов, они продолжают распространять ложь и клевету на маршала Лиги.\n\nПишут такие богохульства о злоупотреблениях властью, казнях, им удалось создать бессовестный нарратив вокруг маршала Лиги. Не как спасителя, а как тирана. По иронии судьбы, многие из этих предприятий намекают на то, что маршал Лиги был одним из действующих лиц в развале Лиги, намекая на то, что он убил Суна, когда тот был наиболее слаб.\n\nНесмотря на то, что в такой пародии есть возможность. Подобные издания доказали свою потенциальную ценность в производстве пропаганды, и это нельзя игнорировать. Поэтому газетным компаниям были предложены новые писатели и редакторы, якобы для того, чтобы заменить всех тех, кто был заключен в тюрьму. Хотя на самом деле они были тщательно проверены на лояльность, и у них были стимулы писать в пользу Нанкина."
 league_events.21.a: "Предательство должно быть наказано"

 league_events.22.t: "Чистка сообщников"
 league_events.22.d: "Не желая завершать работу наполовину, маршал Лиги успешно защитил свою власть от врагов извне, но остается еще и внутренний элемент. Не обращая внимания на известные факторы, такие как многочисленные шпионские сети, которыми руководили Лю Сянтин, Ду Сицзюнь, Дай Чуньфэн и другие, многие люди, начиная с крестьянства и заканчивая высшими офицерами, были соучастниками краха Лиги Восьми Провинций.\n\nВыступления против наших любимых немецких союзников, за лучшее жалование и другие унизительные производные от свободы. Естественно, единственным ответом на такие вопросы является свинец. При проведении последней чистки стало ясно, что многие из представленных нам групп велики, обширны и всеохватывающи. Чтобы эффективно провести такую акцию, было бы разумно сосредоточить все наши усилия на одной из основных противостоящих нам групп.\n\nВ настоящее время многие из непосредственной свиты Ци Сюэюаня считают молодых студентов Китая местом зарождения инакомыслия и мятежа. Радикалы, связанные с Гоминьданом, Чжэцзянским движением за автономию, Форумом демократии и науки и другими интеллектуальными группами, расширяют свои ассоциации. Естественно, они не являются друзьями военного положения Ци Сюэюаня. Разумеется, остаются и проблемы самого партийного государства, а также различных сельских бандитских группировок, ведущих непрекращающуюся кампанию резни на нашей территории. Наконец, что касается лично маршала Лиги, существуют старые друзья, сообщники, соратники и союзники Сунь Чуаньфана. Относясь к маршалу Ци с неизменным подозрением, они сами показали, что им нельзя доверять."
 league_events.22.a: "Между студентами распространяется роптание"
 league_events.22.b: "Мы должны уничтожить Гоминьдан изнутри"
 league_events.22.c: "Бандиты - настоящая угроза миру"
 league_events.22.e: "Сунь ушёл, его друзья тоже должны уйти"

 league_events.23.t: "Насколько суровыми мы будем?"
 league_events.23.d: "Маршалу Лиги, как всегда, поручено решать, насколько экстремальным будет проведение этой "Чистки Соучастников". Очевидно, что можно выбрать моральный вариант - просто изгнать их полностью или позволить им вечно гнить в тюрьме. В конце концов, в любом из этих вариантов они будут бессильны бросить вызов маршалу Лиги. Однако в этой группе остаются преступники и мятежники, которые, получив шанс, приведут к концу стабильность и общество, каким мы его знаем.\n\nПотенциально это может привести к очередному краху Лиги и убийству маршала Ци, многие в свите маршала советуют ему прибегнуть к немедленной казни. Никаких полумер. Как и в первом случае, если они мертвы, то не могут оспаривать правление маршала. В любом случае, окончательный выбор остается за Ци."
 league_events.23.a: "Изгнание или тюрьма для предателей"
 league_events.23.b: "Высшая мера будет необходима"

 league_events.24.t: "Очистить залы Тигриного логова"
 league_events.24.d: "Последние несколько недель Лига была полностью захвачена террором. Все началось с простых расследований и малозаметных арестов "диссидентов" и врагов государства. Вскоре это переросло в полицейские рейды, перестрелки, казни. Элитная военная полиция маршала Лиги Ци зачищала улицу за улицей от возможной оппозиции маршалу Лиги, а тюрьмы Лиги стали переполняться врагами режима. Не щадили даже деревню: в сельских районах часто заменяли местных магистратов и советников или вывозили их в переплетах.\n\nНа пирамиде предательства, страха и жестокости стоит маршал Лиги Ци. Человек, которого десять лет назад отправили в изгнание, теперь один из самых могущественных людей во всей стране. Конечно, Ци все еще остается в тени Сунь Чуаньфана, но, несомненно, скоро он затмит Улыбающегося Тигра."
 league_events.24.a: "На свалку истории!"

 league_events.27.t: "Встреча с Большеухим Ду"
 league_events.27.d: "Не слишком хорошо знакомый с темным преступным миром городских центров Китая, Ци Сюэюань все же оставался странной уткой среди тех беспринципных личностей, которые числились в его убежищах. Отправив своего всегда верного Тянь Вэньбина на многонедельные уговоры, Ци удалось привлечь внимание некоего Ду Юэшэна. Это печально известный в Шанхае гангстер, прославившийся всеми видами незаконных действий. Торговля людьми, отмывание денег, похищения - если вы назовете это, Ду, скорее всего, подтвердит, что он этим занимался. Хотя Ци также знает о связях Ду со шпионом Гоминьдана Дай Чуньфэном, и этот секрет он хранит как заряженный пистолет.\n\nОдин из главных лидеров Зеленой банды, известного преступного "предприятия", как называет его Ду, в Шанхае, установление рабочих деловых отношений между Лигой и Зеленой бандой, несомненно, окажется взаимовыгодным.\n\nРасположенный в тихом зале на маленькой улочке в Уси, любой прохожий был бы совершенно не осведомлен о том, какие подлые сделки заключаются в его стенах. В зале находились маршал Лиги Ци, Тянь Вэньбин и еще несколько высокопоставленных офицеров Лиги. Напротив сидели, пожалуй, самые вопиющие представители вопиющей безнравственности по эту сторону Великой стены. Ду Юэшэн и его шанхайские мафиози, попыхивая сигарами, положили ноги на стол для обсуждения.\n\nБольшинство высокопоставленных чиновников даже не знали об этой встрече, и на ней присутствовала лишь минимальная охрана. Обсуждение длилось несколько часов, причем Ду в большинстве случаев играл особенно уклончиво на ухаживания Ци. Однако в конце концов план был разработан и согласован. Неофициально названный  "Схема Ду-Нанкина", он предусматривает, что Ду, используя свои высокопоставленные и теневые деловые связи, будет направлять через Нанкин больше капитала, позволяя Ци поддерживать стабильный валютный баланс. Чтобы оплатить это, Нанкин будет держать Ду в прямом подчинении, договорившись, что 40% его зарплаты будет использоваться для продвижения прокитайского бизнеса в Городах-Концессиях.\n\nПожав руку Ци в перчатке на крепкой руке Ду, двое мужчин и их соответствующие стороны кивнули, расходясь в темноте ночи. После этой встречи было улажено множество дел со свидетелями, и стали поступать платежи. С обеих сторон."
 league_events.27.a: "Выгодное соглашение"

 league_events.28.t: "Влияние из Нанкина"
 league_events.28.d: "Мы начали замечать, что многие крупные бизнесмены, большинство из которых связаны с "Зеленой бандой", стали отдавать предпочтение инвестициям в Нанкин. Совершенно очевидно, что этих бизнесменов подкупают, чтобы они отдавали предпочтение Нанкину. В то же время многие китайские предприятия получили более высокую прибыль, чем ожидалось, что свидетельствует о возможных тайных инвестициях из самого Нанкина."
 league_events.28.a: "Интересно"

 league_events.29.t: "Зеленая банда плетёт сеть в Нанкине"
 league_events.29.d: "Связи "Зеленой банды" далеко идущие и широко охватывающие. Имея связи с бизнесом в Тяньцзине и Гонконге, они даже поддерживают связи с деятелями обычно идеалистических организаций, такими как братья КК из Гоминьдана. Хотя они ведут многочисленные дела по всей стране, главным центром их предприятий всегда был и будет Шанхай. Однако после недавних тайных соглашений, заключенных между Ду Юэшэном и Ци Сюэюанем, "Зеленая банда" начала проникать и в городские дебри Нанкина.\n\nХотя полиция Нанкина при Сунь Чуаньфане обычно должна была вмешаться и попытаться обуздать рост незаконных банд, похоже, что комиссар полиции Нанкина прекратил подобные явления. Он заявил, что полиция должна сосредоточиться на избиении "врагов государства". Естественно, многие предполагают, что он был подкуплен "Зеленой бандой". Однако на самом деле комиссар полиции презирает взятки и не брал их.\n\n Возможно, тот факт, что маршал Лиги Ци недавно казнил комиссара полиции Сун и заменил его по своему личному выбору, имеет некоторое значение..."
 league_events.29.a: "Добро пожаловать в Нанкин!"

 league_events.30.t: "Группы антимаршальских активистов набирают популярность в Нанкине"
 league_events.30.d: "Возможно, заявление маршала Лиги о полной победе над населением Нанкина было преждевременным. Хотя так можно сказать только задним числом. В Нанкине вновь возникла напряженность, отчасти вызванная появлением многочисленных групп активистов против власти маршала. Неожиданно получив приток огромного количества валюты, оружия и боеприпасов, они вновь начали проявлять насилие. Военная полиция вступает в столкновения с антилиговскими террористами и протестующими, и угли беспорядков разгораются с новой силой.\n\nРассматривая варианты и гадая, кто их новый благодетель, маршал Лиги Ци не давал публичных комментариев по поводу роста насилия в Нанкине, хотя ходят слухи, что он разрабатывает план, чтобы в последний раз победить этих немыслимых смутьянов."
 league_events.30.a: "Этому насилию должен быть положен конец"

 league_events.31.t: "Лидеры антимаршальских активистов найдены мертвыми в Нанкине!"
 league_events.31.d: "Газеты Лиги этим утром были наводнены сообщениями о различных жестоких казнях, произошедших по всему городу прошлой ночью. Тринадцать высокопоставленных членов различных антикитайских группировок найдены мертвыми на складе. Пятерых из них застрелили, шестерых зарезали, а еще двоих забили до смерти тупыми предметами. Подобная история сопровождается сообщением о том, что еще два тела были найдены выброшенными на улицу в трущобах Нанкина. Эти две жертвы были идентифицированы как высокопоставленные активисты движения против маршала Ци. Они также были забиты до смерти, а следы от веревок на их руках и следы от побоев свидетельствуют о том, что их пытали.\n\nВосемь мужчин с разными характеристиками были арестованы по подозрению в совершении этих жестоких преступлений. При ближайшем рассмотрении все они оказались членами личного полицейского подразделения маршала Лиги Ци. Просидев в камере всего пять часов, они были быстро освобождены, а маршал Лиги Ци сообщил комиссару полиции Нанкина, что они не имеют никакого отношения к убийствам. Сам Ци появился перед журналистами, чтобы официально объявить о создании группы для расследования этой серии смертей. Хотя прогресс в этом деле маловероятен.\n\nПосле опроса восьми человек маршал узнает, что все пятнадцать жертв были связаны с "Зеленой бандой", хотя и не более чем материальной поддержкой и финансированием. Несмотря на это разоблачение, главари антикитайских протестов были уничтожены, и город снова стал безопасным."
 league_events.31.a: "\"Du can play his own tricks, it would seem.\""

 league_events.32.t: "Деловые инвестиции от Городов-Концессий"
 league_events.32.d: "После того, как несколько месяцев назад мы заключили несколько сделок с Ду Юэшэном и не увидели никакой выгоды от наших денег, многие в администрации маршала Лиги забеспокоились, что Зеленые банды успешно обманули Лигу. Особенно учитывая недавнюю информацию об их связях с антикитайскими группами сопротивления, которые начали разрастаться после нашей сделки. Тем не менее, маршал Лиги понимает бессердечную и жестокую природу китайского преступного мира.\n\nВ последнее время количество наших инвестиций от бизнесменов Легации в Нанкине резко возросло, открываются новые фабрики, нанимаются рабочие и поднимается наш экономический сектор. Несмотря на свои настроения, Ду, несомненно, человек слова, и он добился успеха, направив бизнес Легации на нужды Лиги."
 league_events.32.a: "\"Cheers, Du!\""

 league_events.41.t: "Засада партизан"
 league_events.41.d: "Группа солдат, патрулирующих [getlepattacklocationkmt], попали в засаду партизан Гоминьдана и ввиду численного превосходства противника, были быстро уничтожены. Были высланы поисковые группы, но они не достигли успеха."
 league_events.41.a: "Чёрт"

 league_events.42.t: "[getlepattacklocationkmt] потрясён терактом"
 league_events.42.d: "Остановившись на подбор снаряжения в [getlepattacklocationkmt], железнодорожный состав был заминирован агентами Гоминьдана, незаметно проникнувшими на станцию. После отправления поезда взрывчатка была активирована, что привело к потере поезда, снаряжения, им перевозимого, и отрезка железной дороги. Эти террористы так и не были выслежены, и сейчас, скорее всего, скрываются в домах крестьян."
 league_events.42.a: "Когда же это закончится?"

 league_events.43.t: "Офицеры убиты в [getlepattacklocationkmt]"
 league_events.43.d: "Положение на юге остаётся нестабильным и нам приходится отправлять всё больше и больше войск и военной полиции для сохранения контроля над регионом. [getlepattacklocationkmt], где проходят тренировки новой военной полиции, был неожиданно атакован агентами Гоминьдана, переодетыми в униформу призывников. До того, как военные смогли справиться с диверсантами, несколько офицеров было убито в бою. Кроме того, после окончания сражения были активированы бомбы, ранившие трёх и нанёсшие большой урон базе."
 league_events.43.a: "Чёрт бы их побрал"

 league_events.44.t: "Саботаж на фабрике в [getlepattacklocationkmt]"
 league_events.44.d: "Не смотря на дополнительные меры безопасности, принятые на фабриках, [getlepattacklocationkmt] вновь стал жертвой агентов Гоминьдана. Примерно в полночь в промышленный район был разбужен взрывом, почти полностью уничтожившим один из заводов. Это точно не пойдёт на пользу нашей экономике."
 league_events.44.a: "Вот чёрт"

 league_events.45.t: "Перестрелка в [getlepattacklocationcitykmt]"
 league_events.45.d: "Несмотря на поражение председателя Вана Цзинвэя, [getlepattacklocationcitykmt] остаётся горячей точкой.  Симпатии населения к Гоминьдану, как и количество военных, дислоцированных в провинции, не идёт на спад. Ситуация была обречена на эскалацию, что и произошло сегодня. Человек, одетый как простой крестьянин, неожиданно выхватил пистолет и открыл огонь по проходящему мимо патрулю военных. Он был быстро убит ответным огнём, но на самом деле это было лишь отвлекающим манёвром: пока военные были отвлечены на него, ещё несколько солдат Гоминьдана атаковало их со спины. Весь день в сражение вступало всё больше и больше правительственных и повстанческих сил. Десятки, а может даже и сотни жизней было потерянно в этой злополучный день, но, к счастью, к вечеру битва затихла, и порядок был восстановлен."
 league_events.45.a: "Это не последнее подобное происшествие, уж поверьте"

 league_events.46.t: "Серьёзный саботаж в [getlepattacklocationkmt]"
 league_events.46.d: "Хотя Гоминьдан и потерпел поражение на поле боя, кампания устрашения продолжается. Сегодня была приведена в исполнение кампания по подрыву промышленному потенциалу Лиги, и [getlepattacklocationkmt] потерял предприятие в одном из главных промышленных комплексов.  Жертв среди рабочих не было, но фабрика была серьёзно повреждена и будет выведена из эксплуатации на долгое время. Нам, скорее всего, придётся свыкнуться с подобными событиями, пока мы не избавимся от Гоминьдана окончательно."
 league_events.46.a: "Чёрт бы их побрал"

 league_events.47.t: "Битва за [getlepattacklocationcitykmt]"
 league_events.47.d: "[getlepattacklocationcitykmt], остающийся центром деятельности Гоминьдана, сегодня стал свидетелем большой конфронтации. Около 400 солдат-повстанцев прибыло на главную площадь города, и убив всех находящихся на ней солдат и офицеров полиции, они приступили к поспешному возведению укреплений. Нам понадобилось провести несколько атак, перед тем как мы смогли вернуть площадь под свой контроль и очистить её от партизан, часть которых смогла оперативно отступить задними аллеями и укрыться в домах крестьян. Но офицер, командующий атакой на укрепления Гоминьдана, решил полностью отчистить [getlepattacklocationcitykmt] от присутствия врага. Сотни мирных граждан были выстроены у стен и расстреляны по подозрению в сотрудничестве с врагом, большое количество зданий в городе было разграблено и сожжено. Когда Ци услышал о происходящем, уже успевшем получить название “Резня [getlepattacklocationcitykmt]”, офицер был взят под стражу, но это произошло уже слишком поздно."
 league_events.47.a: "Это всё вина Гоминьдана"

 league_events.48.t: "Горные засады на юге"
 league_events.48.d: "За последние несколько недель значительное количество патрулей, обозов и других необходимых мероприятий в бывшей повстанческой зоне Мингана подверглись нападению ряда горных засадников. Стреляя с высоты и исчезая через несколько минут, эти люди, которых многие считают партизанами Гоминьдана, оставляли после себя только смерть и разрушения. Проблема настолько серьезна, что многие местные жители теперь отказываются предоставлять свои услуги по перевозке грузов через эти районы, сколько бы им ни платили.\n\nОфициальные лица в регионе заверили нас, что эта проблема будет решена в кратчайшие сроки, несомненно, путем давления на гражданских лиц и удвоения патрулей. К сожалению, потребуется нечто большее, чем удвоение патрулей, чтобы действительно вылечить эту гоминдановскую болезнь сердца."
 league_events.48.a: "Я уже подумываю о том, чтобы самому отправиться туда!"

 league_events.49.t: "Множественные взрывы на заводах"
 league_events.49.d: "Ранним утром на юге нашей страны были разбомблены несколько заводов. Очевидно, что атаки тщательно координировались, и такое организованное, систематическое уничтожение может быть произведено Лигой Десяти Гоминдана. Однако после недавних нападений наши собственные солдаты были размещены на таких объектах. И поэтому после этого трагического нападения многие наши люди подверглись жестокому обращению."
 league_events.49.a: "Переиграли? Опять?"

 league_events.50.t: "Победа над штаб-квартирой зверя"
 league_events.50.d: "Наконец-то мы сделали это! После месяцев упорного отслеживания деятельности Гоминьдана, месяцев срыва их усилий, месяцев планирования. Все это наконец-то принесло свои плоды. Используя связи в "Зеленых бандах" Шанхая, нам удалось захватить нескольких основных членов гоминьдановской Лиги десяти. После жестоких пыток, проведенных лично, маршал Лиги Ци Сюэюань сумел выведать штаб-квартиру последнего отряда Дэн Яньда. Казнив всех членов Лиги Десяти, маршал спланировал свой следующий шаг.\n\nРасположенный в провинции Фуцзянь, маршал Ци лично руководил окружением и уничтожением комплекса. Полностью разрушенный до основания, он не оставил ни одного узнаваемого лица. Что самое обидное, таких ключевых фигур, как Дэн Яньда, Дай Чуньфэн и Е Тин, не было видно даже среди дыма. Неважно, что их ресурсы были полностью исчерпаны, а второе повстанческое движение задушено в колыбели, маршал Лиги Ци официально объявил движение Левого Гоминьдана уничтоженным."
 league_events.50.a: "Смерть идеализма..."

 league_events.51.t: "Склад опиума в Сюйчжоу разграблен"
 league_events.51.d: "Естественно, потеря всякой власти в Лиге привела к широкому распространению многочисленных бандитских группировок. Бродя по сельской местности, они борются не за идеалистическую революцию, как Гоминьдан, а просто за собственное выживание и прибыль. Их естественная склонность к последнему привела к росту числа нападений и налетов на различные нелегальные опиумные склады по всей Лиге. В последний раз это произошло в Сюйчжоу.\n\nХотя уменьшение количества опиума не обязательно является негативным фактором, есть опасения, что они продолжат продавать и распространять опиум, укрепляя черный рынок. В ходе рейда им удалось убить и контрабандистов опиума, и наших солдат, а затем скрыться с незаконно нажитым имуществом."
 league_events.51.a: "Варвары"

 league_events.52.t: "Нападение на купеческие караваны на севере"
 league_events.52.d: "Продолжая непрерывно поддерживать хаос, резню и анархию, различные бандитские группировки ограбили ряд торговых караванов на севере Лиги, убив или похитив всех, кто путешествовал вместе с караванным поездом. Обратившись к местным властям с требованием выкупа за тех, кого они захватили, местным магистратам не оставалось ничего другого, как заплатить им, причем довольно крупную сумму. Подобные акты вопиющего вымогательства со стороны этих проклятых бандитов показали поразительную слабость нашего управления, особенно в провинции Цзянсу, которая непосредственно принадлежит Ци Сюэюаню."
 league_events.52.a: "\"Now they're on.\""

 league_events.53.t: "Солдаты атакованы в Северной деревне"
 league_events.53.d: "Регулярные патрули солдат Лиги - нормальное, ежегодное явление после распада Лиги. После войны Лиги сельский бандитизм начал расти, и даже наши люди не защищены от его лап. На солдат, патрулировавших одну из северных деревень, ни с того ни с сего напала большая банда из десятков хорошо вооруженных бандитов. Эти люди, потерявшие все во время войны Лиги, занялись грабежом и мародерством, чтобы прокормиться. Подобные деяния стали печально известны в местной деревне, и местный магистрат ввел патрулирование. Но все равно деревня не была безопасной, так как около двадцати ее ополченцев и десять наших солдат были убиты."
 league_events.53.a: "Как вас избивают прославленные крестьяне?"

 league_events.54.t: "Город захвачен сельскими разбойниками!"
 league_events.54.d: "Снова массовая потеря власти в провинции Цзянсу привела к массовому хаосу. Однако на этот раз одному из крупных бандитских кланов удалось захватить целый город. Набрав прежних жителей и посадив в тюрьму тех, кто сопротивлялся, солдаты под командованием Чжэн Цзюньяна отправились на расследование. Вскоре они обнаружили, что весь город забаррикадирован, укреплен и готовится к осаде. Привлекая большее количество солдат, подчиненный Чжэн Цзюньяна сумел отогнать бандитов, позволив освободить заключенных в тюрьму жителей деревни. Несмотря на то что было убито несколько сотен бандитов, многие из них бежали из деревни вместе с новобранцами, восполнив потери. В то время как наши люди, которые погибли, не увидят столь быстрого подкрепления."
 league_events.54.a: "Ты, наверное, шутишь"

 league_events.55.t: "Бандитские группировки захватывают военные казармы"
 league_events.55.d: "В ответ на недавние военные кампании по окружению, предпринятые против толп бродячих бандитских кланов, они решили нанести ответный удар и захватить военный комплекс на окраине города в Цзянсу. Сотни людей ворвались в казармы, убили множество солдат, после чего забаррикадировались внутри. Вскоре в городе воцарился хаос, а мародерство приобрело массовый характер. Под руководством маршала Лиги, губернатора Цзянсу, элитным немецким подразделениям Ци удалось захватить казармы и восстановить власть в городе с минимальными потерями. Однако такое событие вообще не должно было произойти и является вопиющим проявлением недостатка власти Ци."
 league_events.55.a: "Долго так продолжаться не может"

 league_events.56.t: "Захват железной дороги в Цзянсу"
 league_events.56.d: "Сегодня несколько бандитских групп забаррикадировали и заняли участки железной дороги за пределами важнейшего железнодорожного узла в Сюйчжоу, а на некоторых участках даже разрушили ее. Поскольку это территория, находящаяся под покровительством Чжэн Цзюньяна, то она попала под его командование, чтобы увидеть быстрое возмездие. Окружив бандитов, Чжэн приступил к планомерному уничтожению их войск. Победа над всеми бандитами привела к многочисленным потерям с нашей стороны.\n\n Более важным, по крайней мере, для маршала Лиги, является инфраструктурный ущерб, который нанесли бандиты. В то время как они в основном занимались захватом городов, нападением на патрули и прочими устранимыми неприятностями, наибольшую тревогу вызывает разрушение инфраструктуры, используемой его немецкими благодетелями. Практически это те самые вены, по которым течет кровь нашей страны, на которых держится большая часть нашей экономики. Бандиты вполне могут потопить Лигу."
 league_events.56.a: "\"I have toppled whole regimes! I can deal with bandits!\""

 league_events.57.t: "Резня членов банды"
 league_events.57.d: "Эскалируя конфликт против сельских бандитов на севере, маршал Лиги санкционировал жестокую политику крайних предрассудков. Возможно, рассматривая такое восстание в своей собственной провинции как личное оскорбление, он проконтролировал прямую "эвтаназию", как он это называет, болезни бандитов. Обнаружив один из местных лагерей, расположенный в опасной близости от сельской деревни, Ци приказал своим солдатам окружить деревню и подстрекать бандитов к нападению.\n\nБыстро развивались события, жители деревни были напуганы и в страхе начали отступать, но тут к ним подошли бандиты. Когда солдаты разворачивались, чтобы казнить мародеров, на них нападали местные жители. В результате началась кровавая бойня, погибло около тысячи человек. Хотя Ци уволил местного офицера за чрезмерное применение силы, СМИ уже пронюхали об этой бойне и доносят на маршала Лиги о его жестокости."
 league_events.57.a: "Это выглядит не очень хорошо"

 league_events.58.t: "Конец сельских разбойников"
 league_events.58.d: "Наконец, все кланы сельских бандитов, появившиеся после падения власти в Цзянсу, были нейтрализованы. Последний клан был лично окружен Чжэн Цзюньяном, его члены были арестованы и брошены в тюрьму. Чжэн поставил на карту свою карьеру, чтобы добиться реабилитации бандитов, утверждая, что они всего лишь жертвы обстоятельств. Тем не менее, для восстановления порядка в Северной деревне было потеряно много жизней, но Цзянсу снова можно считать полностью безопасным. Ущерб, нанесенный провинции прогнившими бандитами, несомненно, будет долго жить в бесславии, но сейчас наступил период восстановления и ревизии."
 league_events.58.a: "Думали, что смогут переиграть маршала?"

 league_events.59.t: "Деловая хватка маршала Лиги"
 league_events.59.d: "По сравнению с сомнительной встречей с Ду Юэшэном, встреча Ци с банкирами Цзянчжэ Кайфы была глотком свежего воздуха. Встретившись в одном из особняков банкиров в Шанхае, Ци и несколько его офицеров были угощены вкусной едой, которую подавали горничные и слуги банкиров. Вооруженные наемники стояли на страже вокруг здания, пока прибывали банкиры. Предварительные беседы были приятными и спокойными, но когда группа перешла к делу, отношение изменилось.\n\nМаршал Лиги Ци четко обозначил свою позицию: чтобы Цзянчжэ Кайфа продолжала вести такой же большой бизнес, как и во всей Лиге, они должны предложить Нанкину ресурсы и кредиты, которые будут использоваться "для защиты их деловых интересов для них самих." Конечно, банкиры не отреагировали на это, заявив, что они могут защитить свои собственные финансовые учреждения, и в любом случае, их прибыль от Лиги была незначительной по сравнению с прибылью, которую они нашли в Городах-Концессии.\n\nЦи был готов к этой линии, так как он ясно заявил, что если они не дадут эти ресурсы Нанкину, "Зеленая Банда сделает так, что вы больше никогда не будете вести дела в Шанхае." Несколько человек были шокированы услышанным. Возможно, Ци совершил ошибку. Многие банкиры откупались от "Зеленой банды" и, скорее всего, имели лучшие отношения с ее лидерами, чем Ци, который встречался с Ду Юэшэном лишь однажды.\n\nПосле того, как банкиры начали обсуждать ресурсы, которые нужно отправить в Нанкин, Ци почувствовал облегчение. После еще нескольких часов обсуждения решение было принято, и кредиты и ресурсы начнут поступать в ближайшее время."
 league_events.59.a: "Какой прекрасный бизнесмен Ци"

 league_events.60.t: "Откаты из Шанхая"
 league_events.60.d: "По сообщениям, министерство финансов Лиги сообщило о крупной, загадочной партии денег и оружия. Хотя клерки министерства не знают о его происхождении, ясно одно: он адресован маршалу Лиги. Похоже, что дела маршала Ци с банковским кланом Цзянчжэ Кайфа наконец-то принесли плоды. По сути, речь идет о постоянной взятке, чтобы обеспечить функционирование их бизнеса в Лиге, Ци сделал еще один шаг к превращению Лиги в поистине коррумпированную сеть страха и покровительства."
 league_events.60.a: "Надежды и мечты умирают в объятиях Лиги"

 league_events.100.t: "Господство узурпатора"
 league_events.100.d: "После напряженных последствий расстрела Сунь Чуаньфана мало кто представлял, что Лига когда-нибудь оправится. Сунь Чуаньфан, Улыбающийся Тигр, он был Лигой в той же степени, что и Лига - им. Смогут ли они выстоять без маршала? А что будет в будущем? Сунь сумел пережить бурю благодаря искусной дипломатии, убежденности и военному гению. Мало кто верил, что узурпатор Ци Сюэюань, которого высмеивали даже его собственные союзники, сможет использовать хотя бы малую толику государственного таланта Суня.\n\n И все же, вот он. После многих месяцев опустошительных боев, осажденных со всех сторон, Лига Пяти Провинций остается. Умело разгромив соперничающую с Аньхой армию Чэнь Тяоюаня, Национально-революционную армию на юге и многих других диссидентов, Ци оказался на вершине карточного домика.\n\nВсе предатели, члены Гоминьдана, сельские бандиты и антиконцессионисты, несомненно, должны быть раздавлены железным кулаком Ци. Однако его лидерство далеко небезопасно. Хотя гоминьдановцы уже в третий раз потерпели поражение от Лиги, поступают сообщения о том, что отряды, объединившиеся вокруг Дэн Яньда, продолжают вести партизанскую войну против Лиги. Аналогичным образом, сельские бандиты поддерживают свою собственную, хотя и неорганизованную, форму сопротивления.\n\n Еще хуже то, что интеллигенция, студенты и антиконцессионисты продолжают преследовать маршала. Как показало предательство Чэнь Тяоюаня, даже те, кто заявляет о своей лояльности маршалу Лиги, не защищены от преследований. Кто знает, не затаились ли они, чтобы нанести Лиге удар в спину. И, конечно, призрак Улыбающегося Тигра маячит перед глазами. Теперь, когда борьба улажена, соратники Суня обратили свое внимание на Ци с подозрением в глазах."
 league_events.100.a: "Ах, победа"

 league_events.102.t: "Губернаторский вопрос"
 league_events.102.d_1: "Маршал Лиги Ци никогда не доверял Чэню Тайоюаню. Последний был против присутствия немцев, упорно отрицал очевидные плюсы их присутствия, а также постоянно переходил со стороны Суня Чуаньфана на сторону Фэньтянской Клики в Маньчжурии и обратно. Его восстание, приведшее Лигу на грань смерти, не стало большим сюрпризом. Экономическая недальновидность Ченя привела к отставанию процесса модернизации и обогащения провинции. Это делает вопрос о назначении нового губернатора Анхуэя одним из важнейших для нас.\n\nНа деле нам надо выбрать из двух вариантов. Можно выбрать Се Хунсюня, относительно маловлиятельного офицера и бюрократа из Нанкина. Его единственным положительным качеством является близость к Суню Чуаньфану. Многие продолжают принимать Ци за узурпатора, так что назначение лоялиста Суня на такую позицию будет популярно среди народа, а низкий политический вес Се сделает его податливой марионеткой.\n\nНо есть и альтернативный кандидат. Все проблемы начались с откола Анхуэя, и это является поводом для дополнительной централизации Лиги. Самоназночение маршала Лиги Ци Сеюаня на пост губернатора Анхуэя для поддержания более близкого контроля над всем регионом возможно, но будет малопопулярно с населением страны."
 league_events.102.d_2: "Маршал Лиги Ци никогда не доверял Чэню Тайоюаню. Последний был против присутствия немцев, упорно отрицал очевидные плюсы их присутствия, а также постоянно переходил со стороны Суня Чуаньфана на сторону Фэньтянской Клики в Маньчжурии и обратно. Его восстание, приведшее Лигу на грань смерти, не стало большим сюрпризом. Экономическая недальновидность Ченя привела к отставанию процесса модернизации и обогащения провинции. Это делает вопрос о назначении нового губернатора Анхуэя одним из важнейших для нас.\n\nНа деле нам надо выбрать из трёх вариантов. Можно выбрать Се Хунсюня, относительно маловлиятельного офицера и бюрократа из Нанкина. Его единственным положительным качеством является близость к Суню Чуаньфану. Многие продолжают принимать Ци за узурпатора, так что назначение лоялиста Суня на такую позицию будет популярно среди народа, а низкий политический вес Се сделает его податливой марионеткой. Второй - Шангуань Юньсян, генерал с репутацией очень способного человека. Во время восстания Чэня его лояльность была куплена обещанием губернаторства в Аньхой и Ханчжоу. Хотя его будет труднее контролировать, выполнение этого обещания обеспечит его постоянную лояльность.\n\nНо есть и третий вариант. Поскольку проблема началась с отсоединения Аньхой, возможно, настало время немного усилить централизацию Лиги. Маршал Лиги Ци Сеюань - вариант, позволяющий держать Аньхой под контролем Нанкина, хотя это может быть не очень популярно среди населения."
 league_events.102.a: "Се Хунсюнь сойдёт."
 league_events.102.b: "Ци расширяет свою власть."
 league_events.102.c: "Шаньгуань Юньсян доказал свою преданность."

 league_events.112.t: "Поддержать наших друзей в Китае?"
 league_events.112.d: "Вот уже многие годы мы зарабатываем баснословные суммы на ситуации в Китае. Хотя мы официально работаем с Цин, большинство операций немецких предпринимателей заключает договоры с его соседом к югу – Сунем Чуаньфанем. Но недавно он был убит, а его Лига Восьми Провинций готова быть разорвана гражданской войной. К счастью, его приемник в Нанкине, Ци Сеюань, готов работать с нами ещё обширнее. Сохранение власти Ци в Китае находится в наших интересов, а значит мы должны отправить ему поставку пехотного оружия."
 league_events.112.a: "Конечно"
 league_events.112.b: "У нас есть дела поважнее"

 league_events.113.t: "Прибытие немецкого оружия"
 league_events.113.d: "В разгар хаоса войны Лиги оружие и боеприпасы имеют значение для выживания различных группировок, борющихся за власть. Поскольку Чэнь Тяоюань получал оружие и боеприпасы от своих сторонников, а Гоминьдан - от Интернационала, Лиге пока приходилось полагаться на свои запасы и Нанкинский арсенал. Однако, похоже, наши немецкие благодетели не забыли о нашем бедственном положении. Недавно Лига получила партию различных видов пехотного снаряжения, переправленного через Шанхай. С клеймом Германской восточноазиатской администрации, похоже, Адмиралтейство и Колониальное ведомство обратили внимание на ситуацию в Лиге. Опасаясь потерять свое влияние в Китае, они несут неофициальное признание власти маршала Лиги Ци. По крайней мере, с немецкой стороны."
 league_events.113.a: "\"Seems the admiralty took notice...\""

 league_events.114.t: "Новый губернатор Чжэцзяна"
 league_events.114.d: "Искоренение клики Чжэцзюнь в провинции Чжэцзян привело к тому, что местная администрация осталась без руководства. Без клики Чэнь И или сил Шангуань Юнсяна провинция была переведена на военное положение до тех пор, пока не будет назначен новый губернатор для восстановления порядка. Поскольку губернатор Чэнь И долгое время был довольно отчужденным фактором среди необходимого руководства Лиги, неудивительно, что он перешел на сторону Чэнь Тяоюаня, когда ситуация ухудшилась. Забрав с собой большинство членов Чжэцзянской клики, он оставил очень мало вариантов для замены губернатора Чжэцзяна. Хотя остается как минимум три основных кандидата.\n\nПервый - это Чжоу Фэнци, неохотный командующий гарнизоном Нанкина. Будучи ярым сторонником движения за автономию Чжэцзяна, Чжоу с подозрением смотрел на него после восстания Ся Чао в 1920-х годах. Поставленный Сунем в Нанкин, Чжоу был вынужден подавить Шанхайское восстание 1932 года. Затаив обиду на Суня, он оказался бы приемлемым вариантом для губернатора. Хотя он и выступает против централизации.\n\nВторой вариант - Мэн Чжаоюэ. Еще один сторонник Сунь Чуаньфана, Мэн оказался одним из самых стойких последователей Сунь Чуаньфана. Работая вместе с Чжоу Фэнци, он занимал должность объединенного командующего гарнизоном. Командуя 10-й сводной бригадой Чжэцзяна, он получил широкую популярность среди населения и правительства. Хотя его связи с Сунь Чуаньфаном и оппозиция Ци Сеюаню оказались особенно неприятны."
 league_events.114.a: "Чжоу Фэнци"
 league_events.114.b: "Мэн Чжаоюэ"

 league_events.115.t: "Губернатор Фуцзяни"
 league_events.115.d: "Назначенный губернатором Фуцзяни в середине 1920-х годов, когда Сунь Чуаньфан устремился на север, чтобы реализовать свои грандиозные планы по созданию Лиги пяти провинций, Чжоу Иньжэнь долгое время был ненавистным автократом Фуцзяни. Будучи компетентным генералом, Чжоу прославился тем, что взимал непомерные налоги с местного населения, что привело к массовому развитию движения Гоминьдан. Тем не менее Чжоу командовал различными окруженными кампаниями против Национально-революционной армии, проводившимися под руководством немцев, и обеспечил такой уровень контроля над Фуцзянью, которого не смогли достичь предыдущие губернаторы. К сожалению, главным минусом Чжоу стала его чрезвычайно тесная дружба с покойным Сунь Чуаньфаном. Много лет назад они были одноклассниками, и их отношения всегда были близкими.\n\nХотя Фуцзянь при Чжоу развивалась замечательно, она по-прежнему остается одной из самых бедных провинций в стране. Естественно, маршалу Лиги пришло в голову решение о замене Чжоу, так как это устранит потенциального соперника и, возможно, завоюет поддержку населения провинции.\n\nВ настоящее время его потенциальной заменой является Кун Чжаотун. Служивший в армии Сунь Чуаньфана с 1913 года, он стал командиром 13-й дивизии Бэйянской армии и оставался на стороне Сунь, переживая бурю на протяжении всех 1920-х годов. Кун, как известно, не скрывает своих чувств и лояльности по отношению к Гоминьдану, Антиконцессионистскому движению и другим интеллектуальным группам. Единственная причина, по которой он попал в поле зрения маршала Лиги Ци, - это его податливость и тот факт, что назначение радикала укрепит поддержку как в Фуцзяни, так и во всей Лиге."
 league_events.115.a: "Чжоу Иньжэнь останется губернатором"
 league_events.115.b: "Губернатор Кун хорошо звучит"

 league_events.116.t: "Губернатор провинции Цзянси"
 league_events.116.d: "После прискорбной гибели губернатора Дэн Жучжуо во время войны с Лигой, которую многие связывают с беспечным отношением Ци Сюэюаня, Цзянси осталась без губернатора провинции, который бы возглавил ее администрацию. Воюя между силами Лиги и Гоминьдана, она уже некоторое время находится на жестоком военном положении.\n\nДля его замены у маршала Ци есть только один вариант. Фан Беньжэнь. Родом из Хубэя, Фан был переведен в канцелярию губернатора Цзянси в 1913 году, а в 1920-х годах стал командующим гарнизоном западной и южной частей провинции. Служа при губернаторе Цзянси Цай Чэнсюне, Фан стал свидетелем того, как Цай был смещен после приказа атаковать революционеров в Гуандуне, к которым Фан питал симпатии.\n\nСтав губернатором, он стал человеком, который официально включил Цзянси в Лигу пяти провинций Сун, однако год спустя У Пейфу вынудил его уйти в отставку. Недолго заигрывая с Гоминьданом, Фан служил командующим его 11-й армией, но бежал, как только немецкая интервенция захватила Гуанчжоу. Сообщалось, что он уже делал предложения Ци и Чэнь Тяоюаню о возможном повторном назначении в Цзянси. Естественно, не назначить его на эту должность было бы очень опасно, учитывая его огромное влияние в провинции."
 league_events.116.a: "Мы молимся за успех губернатора Фана"

 league_events.117.t: "Губернатор провинции Цзянси"
 league_events.117.d: "Еще одна из самых бедных провинций страны, провинция Цзянси - это провинция с низким уровнем развития. Под руководством Дэн Жучжуо в течение почти десяти лет. При нем в провинцию пришло небывалое количество процветающих инвестиций от немецких бизнесменов и представителей консорциума Цзяннань. При нем экономика провинции резко возросла и стала все более процветающей. Губернатор Дэн - вечно амбициозный человек, ранее планировавший переворот Сун во время Северного похода. Тем не менее, он остался и пользуется огромным уважением со стороны военного истеблишмента.\n\n Однако у него появился претендент на пост губернатора. Это его бывший начальник в те дни, когда они жили в Цзянси, Фан Беньжэнь. Родом из Хубэя, Фан был переведен в канцелярию губернатора Цзянси в 1913 году, а в 1920-х годах стал начальником гарнизона западной и южной частей провинции. Служа при губернаторе Цзянси Цай Чэнсюне, Фан стал свидетелем того, как Цай был смещен после приказа атаковать революционеров в Гуандуне, к которым Фан питал симпатии.\n\nСтав губернатором, он стал человеком, который официально включил Цзянси в Лигу пяти провинций Сун, однако год спустя У Пейфу вынудил его уйти в отставку. Недолго заигрывая с Гоминьданом, Фан служил командующим его 11-й армией, но бежал, как только немецкая интервенция захватила Гуанчжоу. Сообщалось, что он уже делал предложения Ци и Чэнь Тяоюаню о возможном повторном назначении в Цзянси. Естественно, не назначить его на эту должность было бы очень опасно, учитывая его огромное влияние в провинции."
 league_events.117.a: "Мы молимся за успех губернатора Фана"
 league_events.117.b: "Губернатор Дэн должен остаться"

 league_events.200.t: "Комиссия Нанкина просит нас вмешаться в пятую войну Чжифэна"
 league_events.200.d: "Хотя мы действительно можем быть связаны честью с Северными Чжили, поскольку они оказали нам поддержку во время войны Лиги, это вряд ли означает, что мы будем участвовать в их войнах и конфликтах. Маршал Ци, конечно, благодарен У Пэйфу и Цао Куню за помощь, но он - король Юго-Востока, и его владения вряд ли могут быть вовлечены в ад, охвативший Север.\n\n Так мы считаем. Однако у наших благодетелей из Нанкинской комиссии, Германского консульства и ОАК другие планы. В совместном заявлении, направленном маршалу Лиги, они выразили свое "глубокое разочарование" отсутствием помощи в войне с Пекином и призвали Южные Чжили поддержать своих северных коллег. Чтобы подсластить сделку и задобрить маршала, они также пообещали поставлять современное немецкое оружие и капитал для помощи в наших военных усилиях.\n\nХотя мы можем отказаться, это принесет больше пагубных недостатков, чем положительных, поэтому сотрудники Ци Сюэюаня предпочитают согласиться. Однако сможет ли маршал Лиги терпеть, когда им командуют вероломные европейцы?"
 league_events.200.a: "С неохотой принимаем их просьбу"
 league_events.200.b: "Ублюдки, вы знаете, кто я?"

 league_events.201.t: "Пекин просит нас вмешаться в пятую войну ЧжиФэна!"
 league_events.201.d: "Хотя мы действительно связаны честью с Северными Чжили, поскольку они оказали нам поддержку во время войны Лиги, это вряд ли означает, что мы будем участвовать в их войнах и конфликтах. Маршал Ци, конечно, благодарен У Пэйфу и Цао Куню за помощь, но он - король Юго-Востока, и его владения вряд ли могут быть вовлечены в ад, охвативший Север.\n\nИсторическая вражда между Северной и Южной ветвями Чжили, естественно, означала, что ни маршал Ван Чэнбин, ни Нефритовый маршал У Пэйфу не пытались вовлечь маршала Лиги Ци Сюэюаня в войну Чжифэн. И все же, похоже, даже такие отчаянные времена, как сейчас, способны преодолеть все разногласия. Сегодня утром в маршальском дворце в Нанкине была получена совместная телеграмма на имя маршала Ци. Подписанная президентом Цао, маршалом У и маршалом Ваном, она красноречиво просит вмешательства Лиги в войну против Фэнтяня.\n\nНе притворяясь, она признает, что Ци вряд ли согласится, но практически умоляет маршала отложить свои грандиозные выступления и интриги для демонстрации краткого единства, чтобы обе клики Чжили не были побеждены Японией."
 league_events.201.a: "Они правильно рассуждают. Давайте преодолеем раскол!"
 league_events.201.b: "Они были бы правы, мы не согласимся"

 league_events.205.t: "[league_events.GetName] размышляет об интервенции"
 league_events.205.d_ger: "Согласно нашим шпионам в [league_events.Capital.GetCapitalVictoryPointName], [league_events.GetLeader] и его старший командный состав в настоящее время рассматривают возможность открытия нового фронта в нашей войне против [QIE.GetName]. Как сообщается, Германская Нанкинская Комиссия готовит законопроект о крупной поставке оружия, но [league_events.GetLeader] имеет тесные отношения с центральным правительством, и об этом хорошо известно.\n\nКакое бы решение ни было принято в [league_events.Capital.GetCapitalVictoryPointName], мы должны быть готовы."
 league_events.205.d_noger: "Согласно нашим шпионам в [league_events.Capital.GetCapitalVictoryPointName], [league_events.GetLeader] и его старший командный состав в настоящее время рассматривают возможность открытия нового фронта в нашей войне против [QIE.GetName]. В случае падения [QIE.GetName], [league_events.GetName] наверняка будет следующим, но [league_events.GetLeader] хорошо известны слабые отношения [league_events.GetLeader] с центральным правительством.\n\nКакое бы решение ни было принято в [league_events.Capital.GetCapitalVictoryPointName], мы должны быть готовы."
 league_events.205.a: "Еще одно препятствие на пути к восстановлению."

 league_events.206.t: "Чэнь Сюэчжао"
 league_events.206.d: "Дочь крестьян, Чэнь Сюэчжао родилась в 1906 году в Хайнине в провинции Чжэцзян. Она получила образование в женской нормальной школе в уезде Наньтун, а затем получила высшее образование в Шанхайском патриотическом женском колледже. Здесь она вступила в литературную школу Цяньчао и в 1923 году опубликовала свою первую работу Wo suo qiwang de xin funü 'Женщины моего нового идеала'. Кроме того, Чэнь опубликовала статью в журнале 'Новые женщины', в которой попыталась исследовать феномен женщин, предпочитающих оставаться незамужними.\n После непродолжительной преподавательской деятельности в Чжэцзяне и Пекине, Чэнь переехала в Париж в 1927 году, восхищенная новым социалистическим режимом. Будучи ярым леваком, Чэнь восхищалась революцией во Франции и часто встречалась с изгнанниками из леворадикального Гоминьдана, такими как Ван Цзинвэй. После получения степени доктора философии в университете Клермон-Феррана в 1935 году она вернулась в свою родную страну Чжэцзян в Лиге Восьми Провинций. Однако сокрушение леворадикального Гоминьдана и подавление социализма после победы Лиги, не отбили у Чэнь охоту писать. Писательница подготовила 'Беседы в Париже об искусстве и литературе', документ, объясняющий движение к искусству пролетариата и содержащий выдержки из произведений влиятельных французских художников, таких как Андре Бретон. Хотя ее работы могут быть невинными и безусловно, привлекательными для масс, интересующихся искусством за рубежом, многие считают ее работы не более чем радикальной социалистической пропагандой."
 league_events.206.a: "Какой от этого может быть вред?"
 league_events.206.b: "Хватит! Заставьте ее замолчать!"

 league_events.207.t: "Жу Пеон, мастер живописи с Востока" 
 league_events.207.d: "Сюй Бэйхун родился в 1895 году в сельской местности Исин в Цзянгу, с раннего возраста обучался искусству классических китайских работ и каллиграфии. После учебы в Фуданьском университете и Токио он выучил французский язык и по приглашению педагога Цай Юаньпэя начал преподавать в художественной школе Пекинского университета. Выиграв стипендию в престижной Национальной высшей школе искусств в Париже в 1919 году, он отправился в десятилетнее путешествие по Европе. Его пребывание в Париже было неожиданным, поскольку французская нация переживала революцию, а новый социалистический режим начал входить в силу и влиять на искусство. Сильно вдохновленный европейскими традициями классического искусства и культуры, Сюй взял себе имя Жу Пеон, находясь во Франции, и учился в престижной Высшей национальной школе изящных искусств. Он включал в свои работы творческие и инновационные элементы, вдохновляясь так называемым искусством 'пролетариата'. Его путешествие по Европе закончилось в 1927 году, и он поселился в Нанкине, где начал преподавать в Национальном центральном университете.\n\n В 1933 году Сюй организовал выставку современного китайского искусства, которая побывала во Франции, Германии и Бельгии. Работы Сюя не только подчеркивали классические стили, предпочитаемые европейской публикой, но и демонстрировали сцены китайской жизни и культуры - все это было очень увлекательно. Для европейцев, таких как немцы, блеск китайской техники кисти и туши Сюя в сочетании с западной перспективой и композицией были признаком растущей современности Китая."
 league_events.207.a: "Воистину мастер живописи!"

 league_events.208.t: "Теорема Цена"
 league_events.208.d: "Родившийся в бедной семье рыбака в Наньчане провинции Цзянси, Чжунцзе Ц. Цен был вынужден из-за бедности делать перерывы в учебе, чтобы работать. В 1917 году он сдал вступительные экзамены и был принят в Первый провинциальный нормальный колледж провинции Цзянси в Наньчане. После окончания колледжа в 1920 году он продолжал преподавать в начальных и средних школах и поступил в Национальный университет Вучан, специализируясь на математике. В 1928 году Цен отправился учиться за границу в Германию и посещал Геттингенский университет, где изучал алгебру под руководством Эмми Ноэтера. В 1934 году он получил докторскую степень, а его диссертация о квазиалгебраической замкнутости привела к доказательству фундаментальной теоремы, которая была названа в его честь. В 1937 году Цен вернулся в Китай, чтобы преподавать в Ханчжоу.\n\n Несмотря на хаос войны Лиги, Цен продолжал активно работать в научных кругах и недавно опубликовал свою третью работу в журнале Китайского математического общества. Как профессор математики и свободно читающий по-немецки, его работа демонстрирует, что Китай действительно может догнать стандарты западного образования."
 league_events.208.a: "Его работа будет полезна!"

 league_events.209.t: "Золотой голос Китая"
 league_events.209.d: "Ее красивый и уникальный голос звучит из граммофонов от самых модных клубов Шанхая до величественных залов Нанкина - Чжоу Сюань взорвала популярность по всему Китаю. Поскольку политическая ситуация в Китае постоянно находится на грани, а страна страдает от внутренних и внешних проблем, музыка Чжоу Сюань остается надежной опорой в неспокойные времена. Возможно, убедительной является ее личная история жизни - жизнь, полная бедности и горя, которую многие слушатели могут соотнести с ней.\n\n Родилась Су Пу и была разлучена с родными родителями в раннем возрасте, в три года ее продал родственник. В возрасте 13 лет она взяла себе сценический псевдоним Чжоу Сюань, что означает 'прекрасный нефрит'. И действительно, как прекрасный нефрит, которым восхищаются, она выпустила хиты, популярные во всем Китае, такие как 'Ночи Шанхая/Ye Shanghai', 'Цветущие цветы и полная луна' и 'Песня четырех сезонов'. Однако, несмотря на гламур, в ее личной жизни были неудачные браки, незаконнорожденные дети и даже попытки самоубийства. Тем не менее, ее жизнь дает передышку от хаоса в Китае, поскольку ее путь от лохмотьев к богатству, несомненно, вдохновит других. Выступая по всему Китаю и производя впечатление на иностранных высокопоставленных лиц, музыка Чжоу Сюань несет свет в темный период для китайского народа."
 league_events.209.a: "Наша собственная Лили Марлен!"

 league_events.211.t: "Восстановление утраченных провинций"
 league_events.211.d: "Долгое время оставаясь за пределами нашей истинной власти, западные провинции Восьми Провинций, а именно Хунань, Гуандун и Гуанси, являются неуловимой группой. Расширившись якобы для охвата этих провинций в 1928 году, влияние Лиги окончательно распространилось на них только в 1929 году, да и то с трудом. После Четвертой войны Чжифэн маршал Лиги Сунь и Нефритовый маршал вступили в противостояние между кликами Северной и Южной Чжили. Весь Юго-Запад стал полем битвы за власть, в которой участвовали такие рычаги, как автономия или защита от посягательств другой стороны.\n\n И вот такое равновесие было нарушено в результате распада Лиги. После формального совместного выхода из Лиги Гуанси и Гуандуна, а затем и Хунаня, Лига оказалась втянута в борьбу за свое выживание. Слишком сосредоточившись на работе на Востоке, она вряд ли могла протестовать против независимости западных провинций, чего, впрочем, следовало ожидать, поскольку они периодически отдалялись друг от друга с момента своего создания.\n\nКак бы то ни было, мы здесь. Вернулись и стали лучше, чем когда-либо прежде. Наши провинции восстановлены, армии обучены, а командиры разрабатывают военные планы, и мы начинаем кампанию по возвращению западных провинций Лиги. В конце концов, нас поддерживает Центральное правительство, нам нужно только официально оформить все с помощью наших вечно любезных маршалов У Пэйфу и Ван Чэнбина."
 league_events.211.a: "Конечно, Пекин согласится..."

 league_events.212.t: "Расширение Южного Чжили?"
 league_events.212.d: "Сегодня в штаб-квартиру маршала Ванга и маршала Ву поступила серия сдвоенных телеграмм. Якобы адресованные обоим маршалам в самой красноречивой манере, они, судя по всему, поступили от маршала Лиги в Нанкине. Не успев расшифровать текст, маршал Ву позвонил маршалу Вану, сообщив ему о скором собрании военного совета в Лояне для рассмотрения телеграммы. Удивленный и, как обычно, слегка воинственный, маршал Ван согласился, сказав, что уже собирался позвонить Ву и спросить то же самое.\n\nБыстро собравшись, маршал Ву оставил за собой свиту и компанию Чжан Цихуана, Бай Цзяньву и Ли Бинчжи. Вслед за маршалом У в зал заседаний вошли губернатор Сяо Яонань, министр Гао Линьвэй и генерал Цай Чэнсюнь. Расположившись, как обычно, по разные стороны стола, Ван в кои-то веки позволил Ву говорить первым. Зачитав содержание телеграммы, он начал:\n\n "Уважаемый маршал У Пэйфу,\n "Я, ваш покорнейший союзник и соратник маршал Ци Сюэюань, очень прошу официального разрешения центрального правительства вернуть территории Лиги восьми провинций, которые были потеряны после поистине ужасного низложения Сунь Чуаньфана. В обмен на ваше согласие Лига станет оплотом славной клики Чжили на юге и поможет в национальном объединении страны."\n "Подпись: маршал Лиги Ци Сеюань."\n\nТишина в комнате была практически оглушительной, прежде чем министр Гао заговорил: "Это... это? Он хочет втянуть Чжили в еще одну развратную войну ради бесполезных иллюзий величия?" Многие в зале не знали, как к этому отнестись: наглость, глупость, прямота. Обычно такие вопросы передаются на рассмотрение Кабинета министров и Военного министерства, однако сотрудничество с таким беспринципным человеком, как Ци Сюэюань, непопулярно в Пекине.\n\nТем не менее, решение должно быть принято, а поскольку оба маршала согласны с общей политикой, их директива обязательно будет исполнена."
 league_events.212.a: "Этот ублюдок слишком хлопотный, бросьте ему кость."
 league_events.212.b: "И разыграть нас, как Сунь в 1929 году?"

 league_events.213.t: "Слава маршала лиги"
 league_events.213.d: "Наша покорнейшая просьба к Северному Чжили ранее была принята под самые... неохотные аплодисменты! В совместной телеграмме маршалов Вана и У выражается официальная поддержка и помощь в грандиозных усилиях маршала Лиги по возвращению западных территорий Лиги. Остановившись на том, чтобы полностью признать власть Лиги над всеми восемью провинциями, они, тем не менее, присоединятся к нам в предстоящем конфликте.\n\nНормально это было бы поводом для празднования в Нанкине, однако за все время правления Ци, его друзей становилось все меньше и меньше. Когда большая часть окружения Суня и его многочисленные друзья либо вычищены, либо отказываются общаться с маршалом Лиги, ему остается лишь сидеть в одиночестве в пустых залах маршальского дворца, планируя свой следующий шаг."
 league_events.213.a: "Мы сказали им, что вернемся..."

 league_events.214.t: "Предательство Северной Чжили"
 league_events.214.d: "Похоже, даже Нефритовый маршал способен на непостоянный прилив горечи. Надеясь, что маршал Ван, представляющий военное крыло фракции Цзиньбао, будет достаточно соблазнителен, чтобы вновь увидеть расширение Лиги, надежды Ци были быстро развеяны. Оба маршала не были впечатлены телеграммой маршала Лиги, их вероломное военное министерство ответило полным отказом от кампании по захвату Запада.\n\nСсылаясь на неустойчивые элементы национальной целостности на Севере, они ожидают, что Южные Чжили присоединятся к остальным Чжили и помогут Кабинету в защите Центрального правительства. Такой проступок не может остаться безнаказанным! Те немногие, кто еще держится в окружении маршала Лиги, уже сообщают о его постоянном возмущении тем, что Пекин играет с ним. Некоторые даже предлагают маршалу Лиги попытаться устроить открытый мятеж..."
 league_events.214.a: "Я убил Суня, придётся убить ещё одного маршала?"
 league_events.214.b: "К черту маршалов! Будь проклят кабинет министров! Будь оно все проклято!"

 league_events.215.t: "Послание от Фана Беньжэня" #событие для ANQ или LEP, в зависимости от того, кого поддержал У (он присоединится к другому)
 league_events.215.d: "В связи с хаосом, развернувшимся из-за недавних событий, многие оппортунисты, интриганы и беглецы вышли из тени, чтобы снова оказаться в центре внимания. Большинству из них отказано, поскольку это не их конфликт и не их дело. Большинство просьб даже не попадают на стол [ROOT.GetLeader], но вот наконец-то появилось заманчивое предложение.\n\nБывший губернатор провинции Цзянси, ярый враг У Пейфу и соперник действующего губернатора Дэн Жучжуо, Фан Беньжэнь имел богатую историю, полную многочисленных противоречий. Служивший под началом губернатора Цай "Тигра Цай" Чэнсюня во время его пребывания в Цзянси, Фан Беньжэнь был единственным, кто был достаточно силен, чтобы изгнать его из провинции. Заменив его, Фан стал тем человеком, который ввел Цзянси в Коалицию пяти провинций Сунь Чуаньфана, и Фан был вознагражден увольнением У Пэйфу.\n\nЗамененный губернатором Дэном, Фан ненадолго бежал в ссылку, а затем в провинцию Гуандун, чтобы присоединиться к Национально-революционной армии, где он стал командующим ее 11-й армией. Однако и это было недолго: Фан испытал на себе сталь, гром и кровопролитие Северного похода, обеспечив безопасность своих людей, но полностью распустив армию. Теперь, живя гражданской жизнью в Цзянси, он предложил служить в нашей армии. Разумеется, за определенную плату.\n\nВ обмен на свои бесчисленные умения и всех людей, которых он может собрать, он требует губернаторство в Цзянси после окончания конфликта. Предложение, естественно, заманчивое, поскольку дает немедленную выгоду, хотя в будущем положение в Цзянси может оказаться довольно... несостоятельным из-за возвращения губернатора Фана на сцену." 
 league_events.215.a: "Конечно, мы можем договориться!"
 league_events.215.b: "Вашему мелкому багажу не место в Лиге"

 league_events.216.t: "Гнев Фана"
 league_events.216.d: "К сожалению, генерал Фан Беньжэнь не из тех, кому можно перечить. Вступив в наши войска по официальному соглашению, даже встретившись непосредственно с [ROOT.GetLeader], пожав ему руку и разделив с ним празднества, он был уверен, что губернаторство в Цзянси ему обеспечено. При его правлении Цзянси снова будет свидетельствовать о процветании, а не о бесхозяйственности вероломного Дэн Жучжуо.\n\nОчевидно, его вера в [ROOT.GetLeader] была совершенно неуместной. Преданный в очередной раз, губернатор Дэн, похоже, одержал верх в их маленьком соперничестве, и Фан Беньжэнь не так-то легко проиграл. Разъяренный предательством своего соглашения, он одновременно понимает, что открытое восстание против нового маршала Лиги было бы самоубийством. Однако он мобилизовал всех верных своей новой "Повстанческой армии Цзянси" для участия в военной кампании в Цзянси.\n\nХотя обычно это не вызывает беспокойства, поскольку история провинций Лиги изобилует восстаниями и жестокими репрессиями, Фан пользуется поддержкой большинства жителей провинции, а его умение командовать партизанскими отрядами не стоит недооценивать. Очевидно, что наши усилия по присоединению Цзянси займут гораздо больше времени, чем ожидалось."
 league_events.216.a: "Вот ублюдок!"

 league_events.217.t: "Многозначительный нефритовый маршал"
 league_events.217.d: "Не всем нравится Нефритовый маршал, это правда. Его властная экстравагантность, его неспокойное спокойствие в любой ситуации, его дерзкое безрассудство и псевдоученые познания сродни "конфуцианскому ученому-воину." Естественно, он сжег множество мостов. Федералисты, Гоминьдан, почти Южный Чжили. И все же он самый могущественный человек во всей стране, это совершенно неоспоримо. И поэтому для нас было естественным отплатить ему тем же, ведь мы были бы глупцами, если бы Сунь Чуаньфан продолжал возвеличивать свою нанкинскую сферу.\n\n Естественно, это вызвало бурю недовольства как среди сторонников Сунь Чуаньфана, так и среди тех, кто презирает У Пэйфу. В то время как Цао Кунь в большинстве случаев проявляет доброту, У Пэйфу становится объектом ярости и недовольства. Особенно заметным и недавним пополнением в высшем командовании Лиги является генерал Фан Беньжэнь. Обладая огромным влиянием, он сразу же подал в отставку после заключения официального союза между Южным Чжили и Северным Чжили.\n\nОчевидно, генерал Фан так и не оправился от того, что У Пейфу заставил его покинуть Цзянси десять лет назад, и до сих пор таит огромную обиду. Когда Фэн снова уходит в отставку, его люди тоже отказываются работать с армией, которая предала их лидера."
 league_events.217.a: "Пропади они проавдом!"

 league_events.218.t: "Ци разбирается с ситуацией"
 league_events.218.d: "Пуля, оборвавшая жизнь Сунь Чуаньфана, привела его Лигу в полное и абсолютное смятение. Любые новости и известия из Нанкина ждали с большим нетерпением, и они были бесценны для всех, чьи интересы были связаны с Лигой. Поскольку сегодня состоится первое официальное объявление после трагической гибели Суня, бесчисленное множество репортеров, как иностранных, так и местных, а также иностранных атташе, собрались в главном зале маршальской канцелярии в Нанкине под строгими мерами безопасности. Все они с нетерпением ждали первого официального заявления, предназначенного для их заголовков и дипломатических отчетов.\n\nИз боковых дверей Ци Сеюань, сопровождаемый охранниками с немецкими винтовками и своими самыми доверенными сотрудниками, спокойно и твердо вошел в зал. Стоя на подиуме, медали Ци на его парадной форме блестели под вспышками иностранных камер, делая этого невысокого военного таким же престижным и высоким, как и присутствующие западные военные атташе, несмотря на то, что он был самым низкорослым среди своей группы. Пробежав по залу быстрым взглядом, Ци сначала начал с вроде бы скорбных банальностей, а затем продолжил.\n\n "Сегодня мы оплакиваем смерть маршала Лиги; завтра мы заставим заговорщиков заплатить! Лига не допустит ни оскорбления собственного благополучия, ни вмешательства в нашу политику!"\nПосле того, как Ци успокоил иностранную, особенно немецкую аудиторию, он продолжил:\n "Наша великая Лига, объединенная общей печалью, стольких из нас объединила одна потеря, мы стали единым целым. Наши социалистические друзья с Запада, несомненно, ответят за свое преступление! Грех соучастия в позорном убийстве маршала Суня!"\n\nНаправляя истоки покушения на социалистов Гоминьдана, Ци практически подтвердил, что он унаследует наследие покойного маршала Лиги. Его слова тут же записывают зрители. Микрофон, стоящий перед ним, как ни забавно, чуть ли не выше его самого, означал, что его слова будут транслироваться по всем провинциям. Завершив свою речь последним заявлением о том, что он, как действующий маршал Лиги, выведет Лигу из хаоса, несмотря ни на что, Ци без колебаний направился к выходу, игнорируя все вопросы аудитории. Так как пресс-конференция закончилась неожиданным уходом Ци, охрана офиса попросила аудиторию покинуть помещение.\n\nПочти все вопросы, касающиеся будущего Лиги, не были решены. Однако две вещи несомненны: Лига теперь находится в руках этого маниакального автократа, и иностранные интересы в Лиге будут сохранены любой ценой."
 league_events.218.a: "Пусть будущее хранит добро..."

 league_war_character_events.34.t: "Сунь Лижэнь предлагает свои услуги"
 league_war_character_events.34.d: "Разрушение клики Аньцина и падение антиконцессионного движения Чэнь Тяоюаня оставили в беде многих его соотечественников-националистов. В то время как младшие чины в большинстве своем либо влились в другие фракции, либо продолжили преподавать в "школе зеленого леса", подавляющее большинство высшего руководства Чэня бежало в легации, Японию или куда-либо еще, где они могли бы найти работу. Немногие даже не рассматривали возможность вступления в наши ряды, поэтому было несколько неожиданно, когда к нам обратились генерал Сунь Лирен и несколько офицеров из его штаба. Желая послужить антиконцессионному и националистическому делу, он попросил назначить его в наши растущие армии.\n\nУроженец Аньхой, Сунь в молодости был одним из немногих участников протестов против правительства Дуань Цируй в 1919 году. Учился за границей в университете Пердью, но его антиимпериалистические настроения привели к поступлению в Виргинский военный институт. Окончив его сразу после окончания Северной экспедиции, он стал представителем нового поколения офицеров в Китае. Учитывая его историю и огромное количество других потенциальных кандидатов, мало кто стал бы сомневаться, если бы мы сказали "нет". Однако его уникальная подготовка и юношеский энтузиазм воплощают в себе надежды молодого поколения офицеров-антиимпериалистов."
 league_war_character_events.34.a: "Против империалистов мы все должны быть едины"
 league_war_character_events.34.b: "Против предателей мы должны быть осторожны"

 league_war_character_events.35.t: "Сунь Лижэнь предлагает свои услуги"
 league_war_character_events.35.d: "Уничтожение клики Аньцина и падение антиконцессионного движения Чэнь Тяоюаня оставило многих его соотечественников-националистов на произвол судьбы. В то время как младшие чины в большинстве своем либо влились в другие фракции, либо перешли на преподавательскую работу в "школу зеленого леса", подавляющее большинство высшего руководства Чэня либо бежало в легации. Другие, однако, остались непоколебимы в своей верности китайскому делу. Привлеченная нашим растущим антиконцессионистским направлением, группа офицеров во главе с генералом Сунь Лиреном попросила назначения в наши армии.\n\nУроженец Аньхой, Сунь в молодости был одним из немногих участников протестов против правительства Дуань Цируй в 1919 году. Учился за границей в университете Пердью, но его антиимпериалистические настроения привели к поступлению в Виргинский военный институт. Окончив его сразу после окончания Северной экспедиции, он стал представителем нового поколения офицеров в Китае. Учитывая огромное количество других потенциальных кандидатов и продолжающуюся нестабильность, вызванную провалом Лиги, мало кто стал бы сомневаться, если бы мы сказали "нет". Однако его уникальная подготовка и юношеский энтузиазм воплощают в себе надежды молодого поколения антиимпериалистических офицеров."
 league_war_character_events.35.a: "Он и такие, как он, спасут Китай от позора"
 league_war_character_events.35.b: "Мы должны принимать победителей, а не пораженцев"

 league_war_character_events.36.t: "Сунь Лижэнь предлагает свои услуги"
 league_war_character_events.36.d: "Разрушение клики Аньцина и падение антиконцессионного движения Чэнь Тяоюаня оставили в беде многих его соотечественников-националистов. В то время как младшие чины в большинстве своем либо влились в другие фракции, либо продолжили преподавать в "школе зеленого леса", подавляющее большинство высшего руководства Чэня бежало в легации, Японию или куда-либо еще, где они могли найти работу. И все же любопытно, что молодой командир по имени Сунь Лирен вместе со свитой таких же единомышленников обратился к нам в надежде найти службу в наших рядах, испытывая отвращение к решению центрального правительства продолжать поддерживать концессионную политику.\n\nУроженец Аньхой, Сунь в молодости был одним из немногих участников протестов против правительства Дуань Цируй в 1919 году. Учился за границей в университете Пердью, но его антиимпериалистические настроения привели к поступлению в Виргинский военный институт. Окончив его сразу после окончания Северной экспедиции, он стал представителем нового поколения офицеров в Китае. Хотя, судя по всему, мы не были его первым выбором, он, тем не менее, твердо клянется в своей верности, если мы его примем. Другие же осуждают его как очередного наемника и потенциального военачальника на разделенной земле и настаивают на его задержании."
 league_war_character_events.36.a: "Солдат достойного дела находит свой дом в другом"
 league_war_character_events.36.b: "Чэнь Тяоюань и ему подобные были предателями, и Сунь не лучше!"

 league_war_character_events.37.t: "Ма Дэнъин бежит из хаоса"
 league_war_character_events.37.d: "Разрушение клики Аньцина и падение антиконцессионного движения Чэнь Тяоюаня оставили в беде многих его соотечественников-националистов. В то время как младшие чины в большинстве своем либо влились в другие фракции, либо продолжили преподавать в "школе зеленого леса"\, подавляющее большинство высшего руководства Чэня бежало в легации, Японию или куда-либо еще, где они могли найти работу. Однако его самый ценный подчиненный и правая рука Ма Дэнъин обратился к [ROOT.GetNameDef] с интересным предложением.\n\nОн хотел бы предложить нашему правительству свои уникальные навыки и услуги в обмен на работу и зарплату. Считая клептократическую трясину Лиги восьми провинций оскорбительной и позорной, Ма Дэнъин - человек принципиальный и стойкий в своем антиконцессионизме. В соответствии со своей идеологической позицией, Ма - способный командир, который поднялся по карьерной лестнице Лиги, несмотря на коррупцию. Хотя он, несомненно, предпочел бы компанию своего друга Чэнь Тяоюаня, он все равно может стать ценным сотрудником нашей армии."
 league_war_character_events.37.a: "О, вы тоже человек высокой культуры"
 league_war_character_events.37.b: "Известный предатель, намеревающийся снова сменить флаг"

 league_german_influence_events.1.t: "Встреча с Нанкинской Комиссией"
 league_german_influence_events.1.d: "Во время Северной экспедиции Германская империя стала главным благодетелем Клики Чжили. В то время как Северная клика Чжили под руководством У Пэйфу и Цао Куня предпочитала держать Берлин на расстоянии, Сунь Чуаньфан вопреки здравому смыслу позволил тогдашнему губернатору Цзянсу Ци Сеюаню наладить с немцами более тесные связи во имя военной модернизации. Немецкая военная миссия под влиянием идей генерала Макса Бауэра внушила Ци, что военная модернизация требует и экономической модернизации, а значит, необходимо укреплять экономические связи между Берлином и Нанкином.\n\nЗа спиной улыбающегося тигра Ци позволил немецким корпорациям, таким как Krupp, развивать экономику Цзянсу. Ци всегда старался держать маршала Лиги в неведении, поскольку Сунь разделял отвращение У к иностранному сотрудничеству. Тихие интриги Ци достигли предела в 1932 году, когда жители Шанхая были сыты по горло растущей коррупцией со стороны властей, и Сунь позволил Ци рьяно подавить восстание. Это едва не привело к развалу Лиги, так как Чэнь Тяоюань начал предпринимать попытки взять Лигу под свой контроль, которые он предпринял после "Черного понедельника"\n\nПопытка переворота Чэня и "трагическая" смерть маршала Лиги Суня едва не привели Лигу к полному краху, но благодаря своевременному вмешательству маршала Лиги Ци, Лига не только выжила, но и возродилась, вытеснив "Дурака" из Аньхой и окончательно покончив с гоминьдановской угрозой в Мингане. Однако теперь сельская местность опустошена в результате конфликта, и друзья Ци в Берлине нужны как никогда, чтобы спасти китайскую нацию. Настало время Лиге расширить сотрудничество с ОАК, начав с их главного военного и политического подразделения - Нанкинской комиссии."
 league_german_influence_events.1.a: "Рука руку моет"

 league_german_influence_events.2.t: "ОАК открывает новые офисы"
 league_german_influence_events.2.d: "Во имя китайско-германского единства ОАК объявила об открытии новых офисов в городе, что еще больше укрепило связи между нашим правительством и немецкой администрацией. Ранее, при Сунь Чуаньфане, явное немецкое влияние держалось в стороне от территорий, непосредственно контролируемых маршалом Лиги. Широкое немецкое влияние распространялось только на районы Цзянсу к северу от Янцзы и часть Шанхая. Чжэцзян был в основном свободен от немецкого влияния, в то время как немцы иногда проникали в Аньхой. После устранения предательских элементов в Лиге сотрудничество маршала Лиги Ци с Берлином может достичь новых высот, поскольку современность проникнет во все уголки Южной Чжилийской клики. Маршал Лиги уже отправил приветственную партию, чтобы встретить немцев в Нанкине."
 league_german_influence_events.2.a: "Улыбающийся Тигр был глупцом, когда пренебрег дружеской рукой Берлина"

 league_german_influence_events.3.t: "Немецкая причастность к убийству"
 league_german_influence_events.3.d: "Истинным стержнем Лиги всегда был Сунь Чуаньфань, Улыбающийся Тигр. Благодаря ему различные правители клики Южного Чжили были связаны между собой, и в единстве Лиги свершались великие дела. Однако его убийство разрушило карточный домик, и маршалу Лиги Ци предстоит вновь собрать некогда великую коалицию восьми провинций.\n\nПоскольку никто так не стремится к справедливости, как маршал Лиги, Ци направил много ресурсов на расследование убийства Суня. Однако в ходе расследования возникла сложная ситуация.\n\nХотя пока ничего не доказано, следователи обнаружили возможную связь между преуспевающим немецким директором в Нанкине и убийцей. Получив информацию о наших подозрениях, ОАК сообщила нам, что этот человек абсолютно невиновен, и просит исключить его из сферы нашего расследования."
 league_german_influence_events.3.a: "Если немцы говорят, что человек невиновен, значит, он невиновен!"
 league_german_influence_events.3.b: "Виновен он или нет, но уличить его будет полезно"

 league_german_influence_events.4.t: "Восстановление железной дороги Чжегана"
 league_german_influence_events.4.d: "С тех пор как западные державы впервые открыли Китай, развитие китайских железных дорог всегда было предпочтительным методом модернизации. Железные дороги помогали своевременно перебрасывать больше ресурсов, что приносило большую прибыль французам, британцам и русским. Немцы также тратили значительную часть своих усилий в Китае на строительство и улучшение железнодорожных линий, особенно в тех районах Лиги, где "Улыбающийся тигр" имел меньше контроля. Сотрудничество Ци с немцами способствовало широкому развитию железных дорог в Цзянсу, но также привело к инциденту в Уху, вызвав гнев Чэнь Тяоюаня. Большая часть Центрально-Китайской железной дороги была повреждена во время распада Лиги, как протестующими, так и перебежчиками. Получив контроль над Восточным Китаем, Ци должна начать восстанавливать разрушенную Южную клику Чжили, начиная с ее инфраструктуры. Поскольку государственные доходы должны быть направлены на все аспекты управления маршала Лиги, Ци надеется обратиться к Берлину за помощью в восстановлении железнодорожных линий, поскольку в интересах всех будет, чтобы поезда снова ходили вовремя."
 league_german_influence_events.4.a: "Любая денежная помощь поможет в ремонте китайских рельсов"
 league_german_influence_events.4.b: "Берлин может ремонтировать рельсы независимо от нашего надзора"

 league_german_influence_events.5.t: "Неоплаченная концессионная аренда"
 league_german_influence_events.5.d: "Хотя немцы часто были основными заемщиками Китая, "черный понедельник" ударил по Берлину сильнее всего. То, что когда-то было очень прибыльным предприятием, теперь испытывает нехватку средств, и ОАК оказалась в некотором кризисе. Зависимая от прибылей различных операций и предприятий Лиги и субсидий из Берлина, "Черный понедельник" и война Лиги практически опустошили финансовые активы ОАК. По воле судьбы именно ОАК оказалась не в состоянии должным образом оплачивать концессионные платежи. Хотя маршал Лиги Ци до сих пор с пониманием относился к своим друзьям в Берлине, он не намерен мириться с продолжающейся неспособностью немцев внести свой вклад в китайско-германское партнерство. Ци планирует в ближайшее время обсудить с правлением ОАК вопрос об оплате."
 league_german_influence_events.5.a: "Вы получите еще один кредит, но только на этот раз!"
 league_german_influence_events.5.b: "Наше партнерство не бесплатно!"

 league_german_influence_events.6.t: "Контроль концессионных заводов"
 league_german_influence_events.6.d: "Хотя нынешняя финансовая слабость ОАК нанесла ущерб и финансам Лиги, это также время возможностей. После вмешательства Германии в Северную экспедицию немецкие бизнесмены и заинтересованные группы хлынули в Китай, преследуя свои собственные интересы. К досаде маршала Лиги Суня, на побережье было открыто множество иностранных фабрик. Череда удач ОАК закончилась в "черный понедельник", и стоимость многих активов в Китае резко упала. Это дает маршалу Ци прекрасную возможность укрепить свое мнение среди населения, выкупив немецкие заводы, чтобы вернуть их нации.\n\nКонечно, большая часть активов, вновь приобретенных правительством, останется в руках государства во имя предотвращения злоупотреблений коррумпированных бизнесменов, но лаобайсинг, несомненно, сплотится вокруг администрации Ци как защитника китайского народа! Другая дополнительная ценность заключается в том, что со временем эти захваченные фабрики помогут Лиге восстановить свои доходы, так что опиумные дорожки Цзянсу не будут единственным крупным источником денежных поступлений маршала Лиги, как это было во время первоначального правления Ци в Цзянсу и почему контроль над Шанхаем был так ценен для него. Разумеется, Сунь Чуаньфань пресек употребление опиума в непосредственно контролируемых районах Цзянсу к югу от Янцзы, но Ци, конечно, может исправить эту ошибку."
 league_german_influence_events.6.a: "Бизнес процветает!"

 league_german_influence_events.7.t: "Немецкий инвестиционный совет"
 league_german_influence_events.7.d: "Во время длительного сотрудничества Ци с немцами влияние ОАК в основном ограничивалось прибрежными районами северной Цзянсу, но иногда заглядывало в соседние области, что приводило к беспорядкам, которые сами по себе привели к Шанхайскому восстанию 1932 года и Ухускому инциденту. Широкое немецкое влияние по большей части ограничивалось Цзянсу из-за неприязни Сунь Чуаньфана к немецкому альянсу, кроме как в сфере военной модернизации и сотрудничества, а Чэнь Тяоюань в Аньхой занял ярую антиконцессионную позицию, чтобы заручиться поддержкой местных жителей из клики Южного Чжили и компенсировать то, что Сунь отодвинул его на второй план в пользу Ци.\n\nОднако теперь, когда Улыбающийся Тигр и Дурак ушли, у ОАК появилась прекрасная возможность предотвратить неизбежный хаос, вызванный настоящей золотой лихорадкой, и создать инвестиционный совет для регулирования немецкого бизнеса в регионе. Хотя это, несомненно, является благом, некоторые пришли к маршалу Лиги с опасениями по поводу чрезмерного влияния Германии, в то время как другие, такие как Ли Линси, высоко оценили укрепление китайско-германских связей, чтобы противостоять японскому империализму."
 league_german_influence_events.7.a: "Замечательно"
 league_german_influence_events.7.b: "Их помощь не нужна"

 league_german_influence_events.8.t: "Немецкий импорт для реконструкции"
 league_german_influence_events.8.d: "В 1930 году из-за сильных разногласий по поводу демобилизации и относительной слабости пекинского правительства после 4-й Чжифэнской войны Сунь Чуаньфан воспользовался возможностью включить в Лигу клики Хунань, Гуанси и Гуандун, хотя и с большей автономией, чем основные пять провинций. Однако южные губернаторы всегда опасались посягательств Лиги на их автономию и решили выйти из Лиги после убийства Улыбающегося Тигра.\n\nХотя губернаторы были политически автономны, большая часть внутренней экономики Лиги была связана во имя развития и модернизации. Потеря южных территорий привела к некоторой ресурсной катастрофе в нашей стране, поскольку многие традиционные отрасли внутренней промышленности теперь отрезаны от нас. Чтобы смягчить ситуацию, ОАК предложила смягчить правила ввоза немецкой продукции в страну, но только до тех пор, пока наша внутренняя экономика не выправится."
 league_german_influence_events.8.a: "Для блага Китая"
 league_german_influence_events.8.b: "Сунь был прав, когда держал их на поводке..."

 league_german_influence_events.9.t: "Борьба с инфляцией"
 league_german_influence_events.9.d: "Китайская валюта, юань, никогда не была особенно стабильной. Хотя у юаня был короткий период процветания в десятилетие после 4-й Чжифэньской войны, "черный понедельник" и крах Лиги поставили юань на колени. К счастью, Китаю удалось избежать худших последствий Черного понедельника благодаря отсутствию связи с глобальной торговлей со стороны менее развитых регионов, но наша денежная ситуация по-прежнему находится в состоянии риска.\n\nЧтобы предотвратить полный финансовый крах, ОАК пообещала поддержку DAB в поддержке Юаня в обмен на различные финансовые уступки. Укрепление финансовой поддержки, безусловно, поможет маршалу Лиги Ци заявить о способности своего правления. Разумеется, маршал Ци понимает, что немцы преследуют свои интересы, и не всегда финансовая зависимость от Берлина может быть лучшим вариантом действий."
 league_german_influence_events.9.a: "Последствия будут незначительными после возвращения Лиги к финансовой стабильности"
 league_german_influence_events.9.b: "Лига сможет пережить бурю без помощи"

 league_german_influence_events.10.t: "Кредиты DAB: Начало"
 league_german_influence_events.10.d: "Дойч-Азиатише Банк - крупнейший из сохранившихся финансовых институтов в регионе, находящийся под контролем ОАК. При Сунь Чуаньфане ДАБ и Лига контактировали, но существенная финансовая помощь ограничивалась только региональным правительством в Цзянсу. Когда Ци контролировал всю Лигу, расширение сотрудничества с ДАБ помогло бы омолодить экономику Лиги и вновь превратить ее в третью великую державу Китая. Конечно, политическая цена такого сотрудничества, по всей вероятности, вызовет антиконцессионные настроения среди китайского населения. Однако маршал Лиги готов ко всем вариантам развития событий и не позволит непокорной толпе диктовать будущее Китая."
 league_german_influence_events.10.a: "Банки возродят Лигу!"

 league_german_influence_events.11.t: "Кредиты DAB: Размер"
 league_german_influence_events.11.d: "DAB согласился помочь маршалу Лиги в восстановлении экономики Лиги с помощью низкопроцентных кредитов с молчаливым расчетом на то, что германскому бизнесу будут предоставлены привилегии на территории Лиги. Сейчас главная задача Ци - определить размер займов, которые он возьмет. Более крупный заем будет более выгодным, но он сделает маршала Лиги гораздо более обязанным уступать интересам Берлина в будущем, тогда как меньшего займа, скорее всего, будет достаточно для стимулирования роста в Лиге, но при этом будет меньше капитала для работы."
 league_german_influence_events.11.a: "Играй по-крупному или иди домой"
 league_german_influence_events.11.b: "Маршал Лиги не может отказаться от халявных денег"
 league_german_influence_events.11.c: "Просите немного, маршал Лиги предпочитает быть сам себе хозяином"

 league_german_influence_events.12.t: "Кредиты DAB: Назначение"
 league_german_influence_events.12.d: "Восточный Китай, один из самых богатых регионов страны, является экономическим стержнем Китая. Поскольку устье Янцзы находится в ведении Лиги, торговля по Янцзы находится под нашим контролем. Конечно, именно поэтому Лига решила обосноваться в Шанхае, чтобы и он мог регулировать торговлю Янцзы. Прибрежные города стали богатыми регионами и одними из единственных частей Китая, которые хорошо интегрировались в капиталистическую систему.\n\n ОАК, хотя теперь и может пересекать все территории Лиги, все еще базируется в провинции Цзянсу, где находится сердце ее операций, благодаря дружбе маршала Ци с ними. Хотя война Лиги и "черный понедельник" нанесли большой ущерб нашей экономике, Лига решительно выступает против всех предателей и социалистических повстанцев. Ци было предложено, чтобы из-за разной степени разрушений Нанкин выбрал, какую отрасль в первую очередь поощрить заемными деньгами, чтобы добиться максимального эффекта."
 league_german_influence_events.12.a: "Приоритет отдавать потребительскому производству"
 league_german_influence_events.12.b: "Приоритет усилий по строительству железных дорог"
 league_german_influence_events.12.c: "Приоритет военной промышленности"

 league_german_influence_events.13.t: "ОАК требует досрочного погашения!"
 league_german_influence_events.13.d: "Сотрудничество с великими державами всегда было для Китая палкой о двух концах. Хотя западные инвестиции действительно помогли продвинуть китайскую экономику к модернизму, всегда есть и недостатки. Великие державы приходят в Китай не из соображений благотворительности или паназиатского идеализма, а чтобы извлечь выгоду для себя.\n\nТак что неудивительно, что ОАК показала свое лицо и потребовала от правительства Лиги погасить займы DAB раньше оговоренного срока, якобы под предлогом роста финансовой напряженности в Восточном Китае. Маршал Лиги Ци уже согласился на новые условия, выдвинутые немцами. К сожалению, немцы держат в своих руках большую часть карт в этих отношениях, и мы ничего не можем сделать."
 league_german_influence_events.13.a: "Эти иностранные крысы!"

 league_german_influence_events.14.t: "Банковское дело ОАК расширяется"
 league_german_influence_events.14.d: "В то время как влияние Германской империи во многих регионах мира ослабевает, интересы Берлина в Китае, похоже, только укрепились. Из-за экономической нестабильности, последовавшей за "Черным понедельником", и разрушений, вызванных Ченом и Гоминьданом, маршал Лиги Ци согласился на множество сделок с ОАК и ДАБ, которые они использовали для расширения своей финансовой монополии в регионе. Хотя она все еще не столь обширна, как японский контроль на Северо-Востоке, их значительное влияние заставляет многих беспокоиться о будущем Китая. Однако на данный момент маршал Лиги Ци готов терпеть это, поскольку это приносит прямую пользу экономике Лиги, а процветание в его глазах является конечной целью Китая."
 league_german_influence_events.14.a: "Хорошо для них и хорошо для нас"

 league_german_influence_events.15.t: "DAB выкупает банки Лиги"
 league_german_influence_events.15.d: "Для маршала Лиги Суня было крайне важно, чтобы так же, как и Китай, он сам распоряжался своей судьбой. С этой целью Сунь начал денежные реформы в Лиге, что привело к развитию многих банков в регионе, особенно в Чжэцзяне и Цзянсу. Однако эти банки сильно пострадали от "черного понедельника", так как многие инвестиции оказались неудачными, а банковские операции стали обычным делом. Так, Немецко-азиатский банк начал выкупать обанкротившиеся банки Лиги по всему региону. Это большой удар по амбициям маршала Лиги Ци и предательство наследия Сунь Чуаньфана. Усилия Германии по подрыву экономики побудили многих членов правительства обратиться к маршалу Лиги Ци с просьбой защитить права китайского народа от этой иностранной эксплуатации и капиталистической игры."
 league_german_influence_events.15.a: "Пусть свободный рынок делает то, что хочет..."
 league_german_influence_events.15.b: "Банки останутся в руках китайцев, это наш предел"

 league_german_influence_events.16.t: "Открытие внутренних регионов: Начало"
 league_german_influence_events.16.d: "Хотя Лига уже открыла свои двери для ограниченной немецкой экспансии во внутренние районы, такое соглашение еще не было официально оформлено. Маршал Лиги Ци решил, что наконец-то настало время официально закрепить доступ Германии во внутренние районы Лиги, в результате чего он мало в чем уступит, но при этом заслужит расположение немецкого лобби. Немецкая делегация только что прибыла в Нанкин, чтобы обсудить условия с Ци. Маршал Лиги надеется заключить наилучшую сделку для себя и своей Лиги.\n\nХотя Ци и не Сунь Чуаньфань, многолетний опыт общения с немцами в Цзянсу делает его уникальным специалистом для ведения переговоров с немцами. Цзяннаньский консорциум направил своего делегата, чтобы обеспечить учет интересов китайских купцов и бизнесменов. Общество "Цзинсин" также направило одного из своих членов на переговоры, чтобы способствовать развитию китайско-немецкого партнерства, но при этом обеспечить отношение к Китаю как к равному партнеру. Немецкая делегация надеется, что те же привилегии, которыми они пользовались в Цзянсу, будут распространены на всю Лигу."
 league_german_influence_events.16.a: "Лучше бы все прошло хорошо"

 league_german_influence_events.17.t: "Открытие внутренних регионов: Статус китайцев"
 league_german_influence_events.17.d: "Сейчас, когда ведутся переговоры об открытии внутренних районов Лиги для немецких предпринимателей, для маршала Лиги первостепенным вопросом является судьба китайских предприятий в этом регионе. Сунь Чуаньфань помог создать множество лояльных предпринимателей, которые помогли организовать Цзяннаньский консорциум, лигу купцов, работающих в рамках Лиги. Хотя официальное вступление Германии во внутренние районы Китая открывает большие возможности для бизнеса, Консорциум вызывает опасения по поводу рисков конкуренции.\n\nНемецкие предприятия, пользующиеся субсидиями из Берлина, опасаются, что они догонят и перегонят местные китайские предприятия, разрушив средства к существованию многих купцов в регионе. Поэтому Цзяннаньский консорциум направил на переговоры своего представителя для отстаивания интересов китайского бизнеса, надеясь, что маршал Лиги Ци Сеюань будет настаивать на жестком регулировании деятельности немецких предприятий. Немцы, в свою очередь, попросили маршала Ци предоставить их бизнесу привилегированный статус во всей Лиге, а в качестве стимула предложили щедрое пожертвование правительству Ци."
 league_german_influence_events.17.a: "Немецкие предприятия будут регулироваться для защиты китайских интересов"
 league_german_influence_events.17.b: "Китайские и немецкие предприятия будут подчиняться одному и тому же свободному рынку"
 league_german_influence_events.17.c: "Берлин приводит убедительные аргументы..."

 league_german_influence_events.18.t: "Открытие внутренних регионов: Статус немцев"
 league_german_influence_events.18.d: "После того как вопрос о китайских делах внутри Лиги был решен, маршал Ци поднял второй вопрос для переговоров. С тех пор как западные державы выделили себе концессии на побережье, граждане европейских держав пользовались привилегиями и более высоким статусом, чем местные китайцы.\n\nЕсли Ци не беспокоит статус европейцев в их концессиях, то внутренняя территория Лиги - совсем другое дело. В отличие от прибрежных концессий, немцы не обладают никакими особыми правами в этом регионе. Внутренние привилегии никогда не обсуждались заранее, поскольку Сунь Чуаньфань настаивал на том, чтобы немецкое влияние ограничивалось побережьем. Цзяннаньский консорциум протестовал против предоставления немецким гражданам привилегий во внутренних делах и просил маршала Лиги Ци разработать новый свод законов, касающихся только немецких граждан.\n\n Общество Цзинсин выдвинуло предложение рассматривать немецких и китайских граждан как равных во внутренних делах, чтобы способствовать установлению равноправных отношений. Немецкая делегация предложила выплатить правительству Лиги щедрую сумму, чтобы распространить концессионные привилегии на все территории Лиги."
 league_german_influence_events.18.a: "Граждане Германии должны действовать по новым правилам"
 league_german_influence_events.18.b: "Китайцы и немцы будут равны перед законом"
 league_german_influence_events.18.c: "Немцы получат свои привилегии!"

 league_german_influence_events.19.t: "Открытие внутренних регионов: Прибытие немцев"
 league_german_influence_events.19.d: "Поскольку большинство переговоров уже завершено, немецкие предприятия уже начали расширять свою деятельность из Цзянсу и прибрежных концессий во внутренние районы Лиги. Маршал Лиги Ци Сиюань надеется, что увеличение немецкого присутствия в Лиге приведет к росту прибыли в регионе, которая, в свою очередь, будет облагаться налогом и, таким образом, принесет пользу правительству.n\nОбщество Цзинсин назвало переговоры историческим моментом в отношениях Китая с Западом и надеется, что китайская торговля с Берлином положительно повлияет на имидж Китая на Западе. Цзяннаньский консорциум с осторожностью относится к вхождению Германии во внутренние районы Лиги и готовит предприятия региона к конкуренции с немецким бизнесом. ОАК уже официально приступила к реализации нескольких проектов в сельской местности Цзянси."
 league_german_influence_events.19.a: "Маршал Лиги уверен, что все закончится хорошо"

 league_german_influence_events.20.t: "Открытие внутренних регионов: Конфликт интересов!"
 league_german_influence_events.20.d: "К несчастью для маршала Лиги Ци Сюэюаня, похоже, что вступление Германии во внутренние помещения Лиги вызвало немало проблем. Несколько китайских предприятий подали жалобы в Цзяннаньский консорциум, утверждая, что немцы эксплуатируют ресурсы сельских районов Лиги, особенно запасы вольфрама в Цзянси. Кроме того, они утверждают, что немцы пытаются монополизировать экономическую власть в регионе и финансово запугивают местные китайские предприятия в регионах, куда идут значительные немецкие инвестиции. Консорциум Цзяннань передал свои опасения маршалу Лиги, что побудило ОАК заявить, что китайские чиновники и бизнесмены недостаточно сотрудничают, а иногда и вовсе препятствуют действиям немецких деловых кругов в регионе. Напряжение нарастает, и маршал Лиги должен решить, какой стороне верить."
 league_german_influence_events.20.a: "ОАК следует уйти, пока они впереди"
 league_german_influence_events.20.b: "Консорциум должен прекратить создавать проблемы"
 league_german_influence_events.20.c: "Обе стороны могли бы извлечь урок из этого момента... "

 league_german_influence_events.21.t: "Открытие внутренних регионов: Конец"
 league_german_influence_events.21.d: "После того, как первый прилив инвестиций наконец-то улегся, наш интерьер вошел в новое нормальное состояние. Хотя все последствия нашего решения будут ощущаться только в ближайшие десятилетия, мы уже видим зачатки таких изменений в нашей экономике. ОАК прекратила агитацию против китайских предприятий в регионе, а Цзяннаньский консорциум успокоился после первоначальных трений. На данный момент китайские и немецкие предприятия работают бок о бок, коллективно укрепляя региональную экономику Аньхой, Цзянси и Фуцзянь. Хотя маршал Лиги надеялся, что проблем не будет вообще, новое состояние мира его вполне устраивает."
 league_german_influence_events.21.a: "Наконец-то вся эта суматоха закончилась"

 league_german_influence_events.22.t: "Расширение Шантунг-Айзенбан"
 league_german_influence_events.22.d: "После того как вступление Германии во внутренние районы Лиги было урегулировано, железные дороги во внутренних районах стали новым центром обсуждения между китайскими и немецкими дипломатами. Немцы, чтобы добывать и перевозить больше ресурсов, всегда уделяли большое внимание развитию железных дорог и инфраструктуры на протяжении всей китайско-германской дружбы, и просят маршала Лиги Ци предоставить Schantung Eisenbahngesellschaft полный контроль над железными дорогами во внутренних районах.\n\n ОАК утверждает, что это поможет ускорить строительство железных дорог, и маршал Лиги будет пользоваться самыми развитыми железными дорогами во всей стране, и сможет показать остальному Китаю свое великое управление. Чиновники, связанные с Консорциумом Цзяннань и Обществом Цзинсин, попросили, чтобы маршал Лиги сохранил определенный уровень контроля над рельсами. Консорциум Цзяннань попросил маршала Лиги даже национализировать железные дороги, принадлежащие Германии, если Schantung Eisenbahngesellschaft злоупотребит своей властью."
 league_german_influence_events.22.a: "Маршал Лиги будет уважать немецкий выкуп."
 league_german_influence_events.22.b: "Ци требует, чтобы правительство сохранило равные права собственности!"

 league_german_influence_events.23.t: "Железнодорожные платежи"
 league_german_influence_events.23.d: "Для развития внутренней инфраструктуры правительство Лиги запросило у Немецко-Азиатского банка крупный кредит для инвестирования в проекты строительства железных дорог. Маршал Лиги Ци решил вложить деньги в первую очередь в Schantung Eisenbahngesellschaft, что, безусловно, помогло ускорить развитие сельских районов.\n\nНо прибыль внутренних районов еще не вернулась за первоначальный кредит. Нанкинская комиссия вежливо напомнила нам, что ожидается разумное погашение, причем в ближайшее время. Маршал Лиги Ци должен будет найти способ расплатиться со своими немецкими союзниками, хотя у него есть мысль просто проигнорировать платеж, хотя это, вероятно, будет иметь последствия."
 league_german_influence_events.23.a: "Немцы получат свои деньги обратно"
 league_german_influence_events.23.b: "Немцы могут принять дерегулирование своего бизнеса в качестве оплаты..."
 league_german_influence_events.23.c: "Какие платежи?"

 league_german_influence_events.24.t: "Шантунг-Айзенбан расширяется"
 league_german_influence_events.24.d: "При нашей постоянной поддержке Шантунгский Айзенбан продолжает развивать железнодорожную инфраструктуру внутренних районов страны. В настоящее время железнодорожная инфраструктура Цзянси конкурирует с инфраструктурой Цзянсу, а в Фуцзяни налажено железнодорожное сообщение между всеми крупными городами на побережье и во внутренних районах страны. Несмотря на это, консорциум Цзяннань продолжает испытывать беспокойство по поводу нынешнего соглашения, но даже они не могут отрицать, что немцы умеют заставить поезда ходить вовремя."
 league_german_influence_events.24.a: "Превосходно"

 league_german_influence_events.25.t: "Железнодорожные налоги?"
 league_german_influence_events.25.d: "Лига не может продолжать финансировать Schantung Eisenbahngesellschaft в надежде на быструю отдачу, поскольку очевидно, что Ци не сможет вернуть столько кредитов ОАК. Несколько интеллектуалов выдвинули идею, первоначально поднятую в Пекине, о взимании железнодорожного налога с населения для оплаты дальнейшего расширения. Это позволило бы маршалу Лиги не слишком зависеть от немцев в плане финансирования.\n\nЦи все еще мог бы использовать свою впечатляющую бизнес-модель в Schantung Eisenbahngesellschaft. Некоторые члены правительства выразили озабоченность по поводу этого курса действий, так как налогообложение населения сделало губернаторов Мингана очень непопулярными, что привело непосредственно к восстанию Гоминьдана. Другие напомнили Ци, что Сунь выступал против налогообложения крестьянства, и его приверженность этой идее помогла ему стать очень популярным правителем."
 league_german_influence_events.25.a: "Каждый будет платить свою долю!"
 league_german_influence_events.25.b: "Мы освободим крестьянство от налогов во имя Суня"

 league_german_influence_events.26.t: "Немцы просят освободить их от налогов"
 league_german_influence_events.26.d: "Хотя новый железнодорожный налог прошел на удивление гладко, ОАК выдвинула ряд требований. Проявляя высокомерие, ОАК потребовала, чтобы все немецкие предприятия были освобождены от нового железнодорожного налога. Они утверждают, что налог вредит их экономическим интересам в регионе, и что если Ци заботится о китайско-немецкой дружбе, то Лига должна предоставить им привилегии в этом вопросе. Тот факт, что мы подняли этот налог, чтобы оплатить их железные дороги, похоже, их не волнует, и они весьма настойчивы в этом требовании. Ожидается, что маршал Лиги ответит немцам утром."
 league_german_influence_events.26.a: "Мы окажем немцам услугу"
 league_german_influence_events.26.b: "Этим высокомерным шутам следует прочитать номер"

 league_german_influence_events.27.t: "Комиссия по восточным ресурсам: Введение"
 league_german_influence_events.27.d: "Комиссия по восточным ресурсам, состоящая в основном из китайских бизнесменов и монополистов ОАК, сумела отложить в сторону свои многочисленные разногласия, преследуя общую цель: прибыль. В то время как китайские интересы обеспечивают местоположение и рабочую силу для добычи ресурсов, немцы предоставляют технические ноу-хау и оборудование для правильной добычи этих ресурсов. В удивительном единстве Цзяннаньский консорциум и делегация ОАК в Нанкине высоко оценили усилия Комиссии по восточным ресурсам."
 league_german_influence_events.27.a: "Стремление к наживе создает странных соседей, я полагаю"

 league_german_influence_events.28.t: "Статус немцев в Комиссии"
 league_german_influence_events.28.d: "Очевидно, недовольная нынешним статус-кво, ОАК потребовала перестановки в Комиссии по восточным ресурсам, утверждая, что немецкие интересы не представлены в ней должным образом. Под этим они, вероятно, подразумевают, что не имеют полного контроля над комиссией и хотят это исправить. Хотя это и является захватом власти, без поддержки ОАК комиссия практически бесполезна.\n\nКонсорциум Цзяннань осудил ОАК за разрушение первоначального единства Комиссии по Восточным ресурсам и попросил маршала Лиги Ци отклонить предложение ОАК и призвать Общество Цзинсин предоставить местных экспертов, чтобы компенсировать потерю немецкого технического ноу-хау. Общество Цзинсин, в свою очередь, рекомендовало маршалу Лиги принять требования ОАК, но при этом продвигать свою собственную высшую власть над Комиссией."
 league_german_influence_events.28.a: "Немцы могут получить свое большинство..."
 league_german_influence_events.28.b: "Последнее слово все равно останется за маршалом Лиги, понятно?"

 league_german_influence_events.29.t: "ОАК требует пересмотра немецких прав"
 league_german_influence_events.29.d: "После того, как Комиссия по Восточным Ресурсам вернулась к своей работе и стала приносить прибыль всем участникам, ОАК выступила с очередным амбициозным запросом. Хотя немцы получили некоторые привилегии во внутренних делах Лиги, они все еще не были столь же основательными, как привилегии в концессиях.\n\nГерманская делегация в Нанкине попросила маршала Лиги предоставить немецким гражданам и предприятиям равные привилегии с теми, что есть в прибрежных концессиях, на вечной основе, обещая ему дальнейшие немецкие инвестиции в Schantung Eisenbahngesellschaft. Маршал Лиги понимает, что привилегии, которых добивается ОАК, несомненно, повредят китайскому бизнесу во внутренних районах, о чем так часто напоминает ему Цзяннаньский консорциум, но остается неуверенным."
 league_german_influence_events.29.a: "Очень хорошо, наслаждайтесь своим повышенным статусом, господа"
 league_german_influence_events.29.b: "Я не склонен удовлетворить вашу просьбу"

 league_german_influence_events.31.t: "ОАК вводит исключительные экономические зоны"
 league_german_influence_events.31.d: "Несмотря на то, что наши отношения с фрицами являются взаимовыгодными, есть случаи, когда администрация маршала Лиги... сдерживается обещаниями берлинским бизнесменам. В последнее время, используя свое непропорциональное влияние в Лиге, ОАК ввела ряд исключительных экономических зон среди городских центров. Таким образом, они закрепили за собой монополию на инвестиции Лиги. Хотя это в основном простое признание существующей реальности, оно вызвало обеспокоенность тем, что ОАК способна управлять правительством Лиги и подстраивать его под свои прихоти"
 league_german_influence_events.31.a: "Это на благо Китая"

 league_german_influence_events.33.t: "Немецкий экономический захват"
 league_german_influence_events.33.d: "Проклятые новости достигли дворца маршала Лиги! Будучи медленно вторгающимся влиянием, которое поначалу приветствовалось маршалом, ОАК постепенно вгрызается во все аспекты нашего беспринципного правительства. С помощью подкупа, назначений и угроз экономических последствий фрицам удалось завершить свои маскировочные махинации. В ходе последнего экономического переворота власти Германской Восточной Азии, похоже, полностью германизировали Лигу. Немецкие банки, немецкие заводы и немецкие магазины заполонили улицы. Марка используется гораздо чаще, чем юань, немецкий язык используется в качестве делового языка так же часто, как и китайский. Маршал Ци опасается, что, возможно, его разыграли, ведь Лига фактически является немецким государством-сателлитом."
 league_german_influence_events.33.a: "Что... я наделал?"

 league_german_influence_events.50.t: "Отношения между Лигой и Остазией"
 league_german_influence_events.50.d: "В то время как наши технические обязательства связаны с Aufsichtsrat der Ostasiatischen Generalverwaltung, эта квазиправительственная организация действует как продолжение Германской Восточно-Азиатской Администрации, разделяя ее руководящий Наблюдательный Совет. Поскольку интересы ОАК тесно связаны с интересами Колониального управления Восточной Азии, они являются всего лишь посредниками в махинациях кайзера в Берлине. Однако в знак искреннего сотрудничества ОАК попросила нас направить официальные дипломатические предложения в адрес Германской восточноазиатской администрации, чтобы скрепить наши общие экономические интересы."
 league_german_influence_events.50.a: "Лучше друзья, чем враги"

 league_german_influence_events.51.t: "ОАК просит нашей поддержки!"
 league_german_influence_events.51.d: "Похоже, что Лига - не единственное государство, страдающее от развала порядка и власти. Германская Восточноазиатская администрация, получив свои колонии в качестве трофеев в Великой войне, никогда не могла по-настоящему сохранить контроль над Индокитаем, в частности. Восстание произошло совсем недавно, в начале этого десятилетия, и, похоже, что индокитайцы снова пробуют свои силы в серьезном освобождении.\n\n Ситуация стала настолько тяжелой, что Адмиралтейство и ОАК вежливо попросили Лигу прислать им боеприпасы, оружие и другие материалы. Многие в правительстве маршала Лиги возражают против такого требования, как будто Лига не занимается своими собственными проблемами, где такие материалы были бы невероятно ценными.\n\n Тем не менее, германофилы в нашем правительстве, а также Общество Цзисина под руководством Ли Линси, усиленно лоббируют согласие маршала Лиги, поскольку это докажет, что китайско-германские отношения находятся в равных условиях."
 league_german_influence_events.51.a: "Они получат нашу полную поддержку!"
 league_german_influence_events.51.b: "Отправьте им оборудование"
 league_german_influence_events.51.c: "Предъявляете мне требования? Забавно"

 league_german_influence_events.53.t: "Связь между Лигой и Остазией углубляется"
 league_german_influence_events.53.d: "Расширение наших связей с ОАК способствует не только укреплению наших взаимных экономических соглашений с их предприимчивыми бизнесменами, но и с колониальным управлением, дергающим их за ниточки. Германская восточноазиатская администрация направила во дворец маршала телеграмму с предложениями, восхваляя его изобретательность и государственную мудрость. Хотя маршал видит, что это неприкрытая лесть, ОАК подсластила сделку. Они разработали новое, официальное, экономическое торговое соглашение с местными предприятиями, находящимися под их контролем, которое фактически было обложено пошлинами в нашу пользу."
 league_german_influence_events.53.a: "Всегда хорошо иметь друзей"

 league_german_influence_events.54.t: "ОАК запрашивает право на базирование для Остазии"
 league_german_influence_events.54.d: "Несмотря на то, что в Шаньдуне находятся китайские порты, являющиеся предметом договора, и обладающие одними из лучших и самых больших в стране доковых сооружений, Aufsichtsrat der Ostasiatischen Generalverwaltung направил телеграмму в Маршальский дворец. В ней содержится смиренная просьба к маршалу Лиги разрешить германскому Тихоокеанскому и Восточно-Азиатскому флоту использовать верфи Лиги в сочетании с собственными мощностями. Они прикрывают свое вопиющее вторжение в суверенитет Лиги, уверяя маршала, что это простая мера предосторожности на случай хаотических военно-морских действий в Восточно-Китайском море."
 league_german_influence_events.54.a: "Лучше защитите нас от Японии"
 league_german_influence_events.54.b: "Пусть держат свои корабли в Циндао"

 league_german_influence_events.55.t: "ОАК запрашивает военный доступ для Остазии"
 league_german_influence_events.55.d: "В маршальский дворец поступила еще одна вероломная телеграмма, написанная Ауфсихтсратом Остасианского генерал-губернаторства от имени их немецких колониальных владык Восточной Азии. В своей самой дерзкой просьбе AOg просит маршала Лиги разрешить военный доступ для немецких колониальных войск Восточной Азии, чтобы они могли пересечь территорию Лиги и остаться на ней. Якобы для защиты немецких интересов в Китае, но многие, включая самого маршала Ци, считают, что это всего лишь уловка, чтобы затянуть петлю на его шее. Практически уступая немцам значительную часть нашего суверенитета."
 league_german_influence_events.55.a: "К сожалению, мы должны согласиться"
 league_german_influence_events.55.b: "Вы шутите, да? Нет."

 league_german_influence_events.56.t: "ОАК запрашивает полную военную гарантию"
 league_german_influence_events.56.d: "Возможно, это одна из более разумных, но все же экстраординарных просьб, Aufsichtsrat der Ostasiatischen Generalverwaltung направил телеграмму маршалу Лиги, настаивая на том, чтобы Лига предоставила полную военную гарантию их колониальным владениям в Азии. Ссылаясь на растущую напряженность в отношениях с Страной Восходящего Солнца, они требуют от Лиги полной поддержки немецких колоний в Азии и обещания ответных действий со стороны Лиги в случае любого посягательства на их суверенитет. Фактически бросая Лигу вместе с Рейхспакетом, независимо от остального Китая, это, тем не менее, кажется неизбежным заключением. Учитывая, что Фэнтянь и их японские сторонники стремятся к новому конфликту."
 league_german_influence_events.56.a: "Китайцы и немцы, рука об руку"
 league_german_influence_events.56.b: "Вы прекрасно знаете, что мы не можем этого обещать"

 league_german_influence_events.57.t: "Передача концессий"
 league_german_influence_events.57.d: "Похоже, что наше "партнерство" с немецкой колониальной администрацией достигло точки невозврата. Вопиющим образом демонстрируя свою экстерриториальную власть и влияние на Лигу, ОАК решила, без разрешения маршала Лиги, передать прямой контроль над концессиями на территории и побережье Лиги из рук Лиги. В то время как армия Лиги готовилась силой захватить землю, ее встретила вся мощь колониальной армии Германии. Не имея возможности осуществить возмездие, маршал Лиги Ци повел Китай прямиком в новое столетие унижений."
 league_german_influence_events.57.a: "Возможно, в некоторых местах я зашел слишком далеко"

### Decisions & Missions ###

 LEP_governor_replace_decisions: "Губернаторский вопрос"
 LEP_governor_replace_decisions_desc: "Правительство Лиги Восьми Провинций было запутанной сетью из бюрократов, офицеров и генералов. На самой верхушке системы были губернаторы провинций, которые правили относительно автономно и подчинялись только маршалу Лиги Суню Чуаньфана. После распада Лиги и восстания Чэня Тайоюаня эта сеть распалась. Многие восстали против Нанкина и захватили контроль над отдельными участками Китая, а губернаторам пришлось отступить к относительно безопасной столице. Теперь, когда Лига вернулась к относительной стабильности, нам надо начать восстановление позиций этих губернаторов, или найти новых, чтобы предотвратить простаивание важной работы."

