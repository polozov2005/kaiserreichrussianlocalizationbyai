 LEP_Tsingtau_Collaboration0_desc: "The informal arrangements between the League and Germany, facilitated by the AOG, do come at a cost despite their benefits. German businesses have received special privileges in a number of coastal cities, transforming them into concessions in all but formal name and national law."
 LEP_Tsingtau_Collaboration1_desc: "Неформальные соглашение между Лигой и Германией насчёт деятельности ОАК приносят прибыль, но не задаром. Немецкие предприятия получили ряд привилегий в прибрежных городах, что превратило их в де-факто концессии. Теперь влияние ОАК начинает распространяться за пределы прибрежного региона вглубь страны."
 LEP_Tsingtau_Collaboration2_desc: "Неформальные соглашение между Лигой и Германией насчёт деятельности ОАК приносят прибыль, но не задаром. Немецкие предприятия получили ряд привилегий в прибрежных городах, что превратило их в де-факто концессии. Теперь влияние ОАК начинает распространяться за пределы прибрежного региона вглубь страны.\n§GЭкономическая помощь: Ограниченная§!\n§GЭкономический контроль: Ограничен§!\n§GПолитический контроль: Военный доступ§!"
 LEP_Tsingtau_Collaboration3_desc: "Неформальные соглашение между Лигой и Германией насчёт деятельности ОАК приносят прибыль, но не задаром. Немецкие предприятия получили ряд привилегий в прибрежных городах, что превратило их в де-факто концессии. Теперь влияние ОАК начинает распространяться за пределы прибрежного региона вглубь страны.\n§GЭкономическая помощь: Очень Низкая§!\n§GЭкономический контроль: Крайне низкий§!\n§GПолитический контроль: Военный доступ§!"
 LEP_Tsingtau_Collaboration4_desc: "Неформальные соглашение между Лигой и Германией насчёт деятельности ОАК приносят прибыль, но не задаром. Немецкие предприятия получили ряд привилегий в прибрежных городах, что превратило их в де-факто концессии. Теперь влияние ОАК начинает распространяться за пределы прибрежного региона вглубь страны. Если Лига продолжит проводить подобную политику, Циндао сможет получить гораздо больше власти.\n§GЭкономическая помощь: Очень Низкая§!\n§GЭкономический контроль: Крайне Низкий§!\n§GПолитический Контроль: Крайне Низкий§!"
 LEP_Tsingtau_Collaboration5_desc: "Внимание, которое Германия уделяет Лиге, приносит большое количество пользы. Но коллаборация с Циндао имеет и свои недостатки, особенно в виде всё разрастающихся концессий. Количество концессий достигает новых высот, а правительство Лиги отдаёт всё больше, получая всё меньше взамен.\n§GЭкономическая помощь: Очень Низкая§!\n§GЭкономический контроль: Очень Низкий§!\n§GПолитический контроль: Крайне Низкий§!"
 LEP_Tsingtau_Collaboration6_desc: "Внимание, которое Германия уделяет Лиге, приносит большое количество пользы. Но коллаборация с Циндао имеет и свои недостатки, особенно в виде всё разрастающихся концессий. Количество концессий достигает новых высот, а правительство Лиги отдаёт всё больше, получая всё меньше взамен.\n§GЭкономическая помощь: Очень Низкая§!\n§GЭкономический контроль: Низкий§!\n§GПолитический контроль: Очень Низкий§!"
 LEP_Tsingtau_Collaboration7_desc: "Внимание, которое Германия уделяет Лиге, приносит большое количество пользы. Но коллаборация с Циндао имеет и свои недостатки, особенно в виде всё разрастающихся концессий. Количество концессий достигает новых высот, а правительство Лиги отдаёт всё больше, получая всё меньше взамен.\n§GЭкономическая помощь: Низкая§!\n§GЭкономический контроль: Низкий§!\n§GПолитический контроль: Очень Низкий§!"
 LEP_Tsingtau_Collaboration8_desc: "Внимание, которое Германия уделяет Лиге, приносит большое количество пользы. Но коллаборация с Циндао имеет и свои недостатки, особенно в виде всё разрастающихся концессий. Количество концессий достигает новых высот, а правительство Лиги отдаёт всё больше, получая всё меньше взамен. Если Лига продолжит свой курс то она рискует потерять самые важные из своих свобод.\n§GЭкономическая помощь: Средняя§!\n§GЭкономический контроль: Низкий§!\n§GПолитический контроль: Низкий§!"
 LEP_Tsingtau_Collaboration9_desc: "Внимание, которое Германия уделяет Лиге, приносит большое количество пользы. Но коллаборация с Циндао имеет и свои недостатки, особенно в виде всё разрастающихся концессий. Эти концессии позволяют представителям Германии иметь большой вес в правительстве Лиги. .\n§GЭкономическая помощь: Высокая§!\n§GЭкономический контроль: Средний§!\n§GПолитический контроль: Средний§!"
 LEP_Tsingtau_Collaboration10_desc: "Внимание, которое Германия уделяет Лиге, приносит большое количество пользы. Но коллаборация с Циндао имеет и свои недостатки, особенно в виде всё разрастающихся концессий. Эти концессии позволяют представителям Германии иметь большой вес в правительстве Лиги.\n§GЭкономическая помощь: Высокая§!\n§GЭкономический контроль: Средний§!\n§GПолитический контроль: Средний§!"
 LEP_Tsingtau_Collaboration11_desc: "Внимание, которое Германия уделяет Лиге, приносит большое количество пользы. Но коллаборация с Циндао имеет и свои недостатки, особенно в виде всё разрастающихся концессий. Эти концессии позволяют представителям Германии иметь большой вес в правительстве Лиги. Если Лига ничего не сделает, чтобы остановить экономическую экспансию Германии, то она рискует потерять свой суверенитет.\n§GЭкономическая помощь: Очень Высокая§!\n§GЭкономический контроль: Высокий§!\n§GПолитический контроль: Средний§!"
 LEP_Tsingtau_Collaboration12_desc: "Внимание, которое Германия уделяет Лиге, приносит огромное количество поддержки. Но коллаборация с Циндао имеет и свои значительные недостатки, особенно в виде огромных концессий. Эти концессии позволяют Германии беспрепятственно наводить свои собственные порядки в стране.\n§GЭкономическая помощь: Очень Высокая§!\n§GЭкономический контроль: Очень Высокий§!\n§GПолитический контроль: Высокий§!"
 LEP_Tsingtau_Collaboration13_desc: "Внимание, которое Германия уделяет Лиге, приносит огромное количество поддержки. Но коллаборация с Циндао имеет и свои значительные недостатки, особенно в виде огромных концессий. Эти концессии позволяют Германии беспрепятственно наводить свои собственные порядки в стране. Если Лига предложит Германии ещё больше, они получат почти полный контроль. \n§GЭкономическая помощь: Очень Высокая§!\n§GЭкономический контроль: Крайне Высокий§!\n§GПолитический контроль: Высокий§!"
 LEP_Tsingtau_Collaboration14_desc: "Внимание, которое Германия уделяет Лиге, приносит огромное количество поддержки. Но коллаборация с Циндао стоила Лиге почти полной потери контроля над страной. Немецкие предприятия почти в полной мере выполняют обязанности правительства Лиги. \n§GЭкономическая помощь: Очень Высокая§!\n§GЭкономический контроль: Чрезвычайно Высокий§!\n§GПолитический контроль: Очень Высокий§!"
 LEP_Tsingtau_Collaboration15_desc: "Внимание, которое Германия уделяет Лиге, приносит огромное количество поддержки. Но коллаборация с Циндао стоила Лиге почти полной потери контроля над страной. Немецкие предприятия почти в полной мере выполняют обязанности правительства Лиги.\n§GЭкономическая помощь: Очень Высокая§!\n§GЭкономический контроль: Почти Полный§!\n§GПолитический контроль: Чрезвычайно Высокий§!"
 LEP_Tsingtau_Collaboration16_desc: "Внимание, которое Германия уделяет Лиге, приносит огромное количество поддержки. Но коллаборация с Циндао стоила Лиге полной потери контроля над страной. Страна стала марионеткой интересов Германии.\n§GЭкономическая помощь: Очень Высокая§!\n§GЭкономический контроль: Почти Полный§!\n§GПолитический контроль: Почти Полный§!"

