#Deal with KMT and Bandit remnants
 LEP_reestablish_control: "Навести порядок"
 LEP_reestablish_control_desc: "Хотя мы и выиграли войну, хаос в нашей стране никуда не исчез. Нам придётся много работать, чтобы избавится всех грозящих нам проблем.\n[getlepreestablishcontrolkmt][getlepreestablishcontrolyiguandao]"

 lep_reestablish_control_kmt_desc: "\n§gНастоящий §YУровень беспорядков Гоминьдана§!: §H[?lep_kmt_unrest_level]§! §R([getlepunreststrengthtextkmt])§!"
 lep_reestablish_control_banditry_desc: "\n§gCurrent §YBandit Unrest Level§!:§! [?lep_rural_unrest_level|H] §R([getlepunreststrengthtextbanditry])§!"

 LEP_temp_suppress_kmt: "Подавить деятельность Гоминьдана"
 LEP_temp_suppress_kmt_desc: "Левый Гоминьдан продолжает сеять смуту по всему южному побережью, особенно в провинции Фуцзянь. В данный момент у нас нет ресурсов для повсеместной борьбы с революционерами, а также у нас нет чёткого плана, и нам остаётся лишь подавлять их деятельность.\n§RЧтобы окончательно избавится от присутствия Гоминьданя надо выполнить фокус §Yуничтожить группировки Гоминьдана§!!§!"

 LEP_decision_lower_kmt_unrest: "Кампании против Гоминьданя"
 LEP_decision_lower_kmt_unrest_desc: "Теперь, когда мы выделили и окружили все оставшиеся базы террористов и выловили всех их агентов, пришло, наконец, время очистить Фуцзянь и соседние регионы от красной угрозы."

 LEP_temp_suppress_rural_banditry: "Suppress Bandit Activities"
 LEP_temp_suppress_rural_banditry_desc: "The rural bandits endemic in the north, attacking innocent travellers and causing great unrest in Jiangsu. We do not have any assets left over to fully end the threat, so we can only temporarily suppress them for now. We need to truly focus all our efforts if we want to get rid of them.\n§RIn order to be able to permanently remove the bandit presence, complete the §YCrack Down on Rural Bandits§! focus!§!"

 LEP_decision_lower_bandit_unrest: "Облавы на бандитов"
 LEP_decision_lower_bandit_unrest_desc: "Теперь, когда мы начали улучшать ситуацию на северных территориях и избавились от большинства зачинщиков, пришло время для полномасштабных репрессий. Мы должны найти и отследить сборища всех бандитских кланов и решительно покончить с ними, чтобы навести порядок в нашей стране."

