 WIF_thomas_cubitt: "Томас Кабитт"
 WIF_thomas_cubitt_commander_desc: "§YОписание Генерала§!\n§YРодился:§! 9 апреля, 1871, в Грейт-Ярмуте, Норфолк, Англия\n§YВоенная Карьера:§! Каббит является широко известным ветераном Великой Войны, вступившим в Королевскую Артиллерию в 1891 и сражавшимся против Государства Дервишей, став заместителем комиссара Сомалиленда. Он отчаянно пытался подавить сомалийское восстание, но не достиг больших успехов ни в чём, за исключением разрушения укреплённых пунктов повстанцев. Он запросил перевод на фронт в 1916 году и был назначен на пост командующего линкольширского полка и 57-ой бригады. Позже получил контроль над 38-ой уэльской пехотной дивизией. После капитуляции Франции он продолжал сражаться во всех уголках мира до самого подписания Версальского договора в 1919. За свою службу был награждён орденом Бани, орденом Святых Михаила и Георга, а также орден "За выдающиеся заслуги". После войны служил в Индии, когда Империя пала перебрался в Канаду. Этот больной 65-летний старик потерял всю тягу к военному делу с окончанием Великой Войны и воспринимают свою позицию губернатора Бермуды как подготовку к окончательной отправке на пенсию.\n§YВажные Заметки:§! -Губернатор Бермуды Governor \n-Теряет интерес в военном деле, отказывается пересмотреть свою тактику и стратегию.\n-Готовится уйти не пенсию в возрасте 65 лет."

 WIF_reginald_hildyard: "Реджинальд Хилдьярд"
 WIF_reginald_hildyard_army_chief_desc: "§YBorn:§! §LDecember 11th, 1876, in Frimley, Surrey, England§!\n§YBackground:§! §LSir Reginald John Thoroton Hildyard is the son of General Sir Henry Hildyard, and joined the British Army in 1896. Serving in the Second Boer War from 1899-1902, earning the Queen's Medal with four clasps and the King's Medal with two clasps. He served in many odd jobs in South Africa for the army, rising up the ranks partially due to his family's influence in the army. Once the Great War began, he was known for trying to communicate as much as possible with the high command, earning further promotions during and after the war. Serving in the Canadian army as a general starting in 1933, he has been put as governor of Bermuda in March of 1936, already managing to gain massive influence in the army trying to put his values into its formation.§!\n\n§YNotes: Became governor of Bermuda following the retirement of Thomas Cubbit. Unlike his predecessor, he is still highly interested in military matters and how he can assist the West Indies army grow.§!"

 WIF_geoffrey_archer: "Джеффри Арчер"
 WIF_geoffrey_archer_commander_desc: "§YBorn:§! §LJuly 4th, 1882, in Kensington, London, England§!"

 WIF_bede_clifford: "Бед Клиффорд"
 WIF_bede_clifford_army_chief_desc: "§YBorn:§! §LJuly 3rd, 1890, in the Colony of New Zealand§!\n§YBackground:§! §LSir Bede Edmund Hugh Clifford is a New Zealand born general, diplomat, and colonial administrator. His family is the Baron Cliffords of Chudleigh, a peerage within England itself. As such, one of his more hidden ambitions is to reclaim 'his land' for his family and father, William Hugh Clifford, 10th Baron Clifford of Chudleigh. Also before this serving as a merchant navy officer and a surveyor, he became an Army Captain during the Great War earning the Order of St Michael and St George, Order of the Bath, and the Royal Victorian Order. He is currently serving as the Governor of Trinidad and Tobago and is generally liked by the people there, despite it being one of the hot places of labour unrest.§!\n\n§YNotes: Governor of Trinidad & Tobago. Experienced in governorship serving in the Bahamas before Trinidad, he is liked by the people there personally despite the labour unrest.. Hesistant to put down protests using the power at his disposal through force.§!"

 WIF_felix_eboue: "Феликс Эбуэ"
 WIF_felix_eboue_commander_desc: "§YBorn:§! §LDecember 26th, 1884, in Cayenne, Guyane, Frecnh Republic§!"

 WIF_ralph_leatham: "Ральф Литем"
 WIF_ralph_leatham_high_command_desc: "§YBorn:§! §LMarch 3rd, 1888, in Hemsworth, West Yorkshire, England§!\n§YBackground:§! §LSir Ralph Leatham was born in Hemsworth, West Yorkshire, joining the royal navy in 1900. Serving on multiple ships during the Great War such as the HMS Yarmouth and HMS Valiant. He managed to earn the Order of the Bath for his service in the navy, but his glory would not last for long. Following the British Revolution, he was initially forced to move to Canada continuing to serve in the Royal Navy until he got offered to serve in the West Indies in 1929, which he accepted. He is currently Chief of Staff to the Commander in-Chief of the West Indies Station to Andrew Cunningham. Serving as governor of Grenada, the peoples opinions of him being neutral at best as he seems much more focused on his naval responsibilities then his governing.§!\n\n§YNotes: Governor of Grenada. Known for being more focused on the admiralty then the governorship of Grenada, resulting in a rather low approval rating on the island. Chief of Staff to the Commander in-Chief Andrew Cunningham. Proponent of having a large navy to help re-secure Britain and defend the West Indies as a strategic stronghold.§!"

