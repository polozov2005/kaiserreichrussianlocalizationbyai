 germany_puppet_events.7.t: "[RHI.GetName] Proposes Free Trade Area"
 germany_puppet_events.7.d: "The government of [RHI.GetNameDef] has reached out to us, proposing a free trade area and economic cooperation zone between the three likeminded nations south of the North Sea. This would expand upon our preexisting military obligations to one another as part of our alliance - and bring benefits to all three of our economies, if adopted."
 germany_puppet_events.7.a: "Of course."
 germany_puppet_events.7.b: "We'd rather not."

germany_puppet_events.8.t: "[RHI.GetName] просит пересмотра репараций"
germany_puppet_events.8.d: "Правительство [RHI.GetNameDef] обратилось с просьбой смягчить текущий уровень репарационных обязательств, наложенных на их государство. По их утверждению, выплаты душат экономику и делают страну уязвимой перед внешними угрозами. Пересмотр также позволил бы расширить их силы самообороны. В завершение, они настаивают, что именно Пруссия, а не Рейн, виновна в развязывании Великих войн..."
germany_puppet_events.8.a: "Это разумно."
germany_puppet_events.8.b: "Мы отказываем."
