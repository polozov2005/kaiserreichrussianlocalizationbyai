### Focuses ###
 FNG_Preservation_of_the_Xinhai_Order: "Верность Синьхайской Революции"
 FNG_Preservation_of_the_Xinhai_Order_desc: "По иронии судьбы, Фэнтянь - единственное национальное правительство, поддерживающее порядок, установленный Синьхайской революцией 1911 года, которая призвала к свержению Цин и установлению республики. Хотя его республиканские обязательства сомнительны, а освоение земель на юге в настоящее время нереально, правительство громко отстаивает обе цели, поскольку они способствуют внутренней легитимности."

 FNG_Fuguo_Qiangbing: "Фугуо Цянбин"
 FNG_Fuguo_Qiangbing_desc: "Эта пословица, грубо переведенная как 'обогащайте страну, укрепляйте армию', восходит к древним философам-законникам, но в последнее время использовалась для вдохновения реформ как в эпоху Гуансю в Китае, так и в эпоху Мэйдзи в Японии. Теперь это снова применяется в Фэнтяне, поскольку правительство стремится модернизироваться и в конечном итоге нанести удар на юг против возрождающейся Чжилийской Клики, а оттуда установить контроль над всем Китаем."

 FNG_Open_the_Propaganda_Front: "Пропагандистский фронт"
 FNG_Open_the_Propaganda_Front_desc: "Иногда самые решительные сражения происходят и побеждают в сердцах и умах. Мы вели пассивную словесную войну с [QIE.GetNameDef] с 1928 года, и теперь пришло время начать новое наступление и удвоить наши усилия. Десять тысяч лет Республике!"

#Suppress Regionalist Sentiment Branch
 FNG_Suppress_Regionalist_Sentiment: "Регионалистские настроения"
 FNG_Suppress_Regionalist_Sentiment_desc: "В течение многих лет основным политическим лозунгом Чжан Цзолиня был 'Северо-восток для северо-востока', но когда его амбиции обратились в сторону Пекина, это регионалистское послание пришлось отбросить. С тех пор оно оказался занозой для главнокомандующего, и многие до сих пор придерживаются этих старых взглядов. Пришло время положить конец этому раз и навсегда."

 FNG_Silence_Targeted_Subversives: "Подавить регионалистское движения"
 FNG_Silence_Targeted_Subversives_desc: "Регионалистское движение никогда не было организовано, но получило поддержку местной элиты, школьных учителей и правительственных чиновников. Некоторые из этих фигур становятся все более заметными, и заставив их замолчать, мы можем отрезать голову регионалистской змее. Некоторых можно подкупить, других - запугать или уволить - не говоря уже о других методах убеждения."

 FNG_Justify_Mass_Arrests: "Обоснование массовых арестов"
 FNG_Justify_Mass_Arrests_desc: "Пока регионалистское движение остается мирным, нам не хватает институциональной и общественной поддержки, чтобы решительно его подавить. Отправляя агентов, замаскированных под протестующих, мы можем подтолкнуть движение к насильственным методам, стоить им их общественной поддержки и затем оправдать массовые аресты."

#Mantetsu Collaboration Section
 FNG_Mantetsu_Collaboration: "Сотрудничество с Мантэцу"
 FNG_Mantetsu_Collaboration_name: "Mantetsu Collaboration"
 FNG_Seize_Mantetsu_Assets: "Seize Mantetsu Assets"
 FNG_Mantetsu_Collaboration_desc: "Мантэцу, также известная как "Южно-Маньчжурская железнодорожная компания", осуществляет огромный контроль над нашей экономикой, имея множество дочерних предприятий, от мукомольных заводов до больниц. К сожалению, его помощь будет иметь важное значение для развития большинства аспектов нашей экономики, требующих технических знаний Японии."
 FNG_Mantetsu_Collaboration_normal_desc: "Mantetsu, also known as the 'South Manchuria Railway Company', exerts an enormous amount of control over our economy, with numerous subsidiaries ranging from flour mills to hospitals. Its aid will unfortunately be essential to developing most aspects of our economy that require Japanese technical expertise."
 FNG_Seize_Mantetsu_Assets_desc: "Before the Japanese withdrawal, Mantetsu was one of the most influential 'private' entities in all of Dongbei, possessing a wide variety of subsidiaries and assets ranging from railways to hospitals. Now that relations have soured with Japan, seizing Mantetsu's assets should allow us to regain control of and develop our economy."

 FNG_Yamato_Hotel_Licenses: "Лицензии отелей Yamato"
 FNG_Yamato_Hotel_Licenses_name: "Yamato Hotel Licences"
 FNG_Repurpose_Yamato_Hotel_Franchises: "Repurpose Yamato Hotel Franchises"
 FNG_Yamato_Hotel_Licenses_desc: "Одно из самых успешных предприятий Мантэцу в Маньчжурии - это сеть отелей Yamato, которая обслуживает бесчисленное количество японских бизнесменов, которые каждый день едут на Родные острова и обратно. Несмотря на нежелательное влияние, которое они оказывают, их навыки и капитал имеют решающее значение. Мы должны решить их будущее."
 FNG_Yamato_Hotel_Licenses_normal_desc: "One of Mantetsu's most successful ventures in Manchuria is its Yamato Hotel franchise, which serves the countless Japanese businessmen who make their way to and from the Home Islands every day. Despite the unwelcome influence they bear, their skills and capital are crucial. We must decide their future."
 FNG_Repurpose_Yamato_Hotel_Franchises_desc: "With the departure of the Japanese, we have inherited several empty luxury hotels that won't be seeing any guests soon. Seeing as Japanese businessmen and dignitaries are unlikely to be visiting our territory any time soon, it would be helpful to convert these luxury hotels into something more useful."

 FNG_Japanese_Electrical_Expertise: "Японский электротехнический опыт"
 FNG_Japanese_Electrical_Expertise_desc: "Из-за отсталости Китая в прошлом веке и хаоса последних двух десятилетий в стране мало местных инженеров. Японская помощь будет иметь важное значение в обеспечении современности на Северо-Востоке."

 FNG_Mantetsu_Research_Wing: "Исследования Мантэцу"
 FNG_Mantetsu_Research_Wing_name: "Mantetsu Research Wing"
 FNG_Expand_Northeastern_University: "Expand Northeastern University"
 FNG_Mantetsu_Research_Wing_desc: "Исследовательское крыло Мантэцу, известное как 'Мантэцу Тёсабу', служит центральным элементом колониальной программы Японии и преследует широкий спектр научных целей. Его огромное финансирование и кадровый резерв могут быть очень полезны нам в наших собственных усилиях."
 FNG_Mantetsu_Research_Wing_normal_desc: "Mantetsu's Research Wing, known as 'Mantetsu Chōsabu', serves as the centrepiece of Japan's colonial programme, and pursues a wide variety of scientific goals. Its massive funding and talent pool could be of great use to us in our own efforts."
 FNG_Expand_Northeastern_University_desc: "Established in 1902 as Fengtian University by Zhao Erxun, the then Viceroy of the Three Northeastern Provinces, Northeastern University would eventually become indispensable to the Northeast, being our main source of technical knowledge. Since we can no longer rely on the Japanese for technical assistance, it is imperative that we expand on our ability to develop technical expertise domestically."

 FNG_Mantetsu_Civil_Engineering_Projects: "Строительные проекты Мантэцу"
 FNG_Mantetsu_Civil_Engineering_Projects_desc: "Хотя японцы могут напрямую извлечь выгоду из крупных строительных проектов в Фэнтяни, они также делают это косвенно, помогая представить наш режим как успешный в улучшении повседневной жизни граждан. В этом плане наши интересы совпадают."

#Crossover Section
 FNG_Develop_the_Northern_Frontier: "Осваивать северную границу"
 FNG_Develop_the_Northern_Frontier_desc: "В северных районах Хэйлунцзян и Синъань с незапамятных времен преобладали горные бореальные леса, обдуваемые резкими сибирскими ветрами и населенные только проходящими мимо кочевниками. Современные технологии могут позволить поселенцам проникнуть в эту враждебную среду и распространять слухи об угле, золоте и графите в горах Хингана."

 FNG_Fengtian_Society_for_Light_Metals: "Месторождения металлов"
 FNG_Fengtian_Society_for_Light_Metals_desc: "В течение многих лет известно, что в провинции Фэнтянь существуют значительные месторождения бокситов и алунитов, но недавние достижения спонсируемых Мантэцу лабораторий в Фушуне и Токио позволили производить алюминий с помощью ряда электрохимических процессов."

 FNG_Yalu_and_Songhua_Hydroelectricity: "Новые ГЭС"
 FNG_Yalu_and_Songhua_Hydroelectricity_desc: "Обильные угольные месторождения Маньчжурии являются отличным источником энергии, но сильные течения рек Ялу и Сунгари могут обеспечить дополнительную энергию при минимальных затратах. Обладая японским опытом, мы могли бы использовать эти могучие реки для снабжения энергией большего числа домов и промышленности."

 FNG_Japanese_Coal_Gasification_Methods: "Японские методы газификации угля"
 FNG_Japanese_Coal_Gasification_Methods_desc: "Стремление Японии к добыче критически важной нефти привело ее в Маньчжурию, но теперь, когда результаты разведки неутешительны, газификация угля кажется единственным логическим путем вперед. Несмотря на энергоемкость, огромные залежи угля в Фушуне могут оправдать применение сложных процессов."

 FNG_Manchurian_Model_Cities: "Маньчжурские модельные города"
 FNG_Manchurian_Model_Cities_desc: "Япония иногда делает все возможное, чтобы изобразить роль проявление благожелательного патернализма, для чего Мантэцу планирует установить современные электрические, канализационные и трамвайные системы в крупных городах Шэньян, Чанчунь и Харбин."

#Industrial Development Committee Section
 FNG_Found_the_Northeast_IDC: "Основать Северную КПР"
 FNG_Found_the_Northeast_IDC_desc: "По рекомендации Японии было выдвинуто предложение об объединении нескольких влиятельных бизнесменов и политиков в орган под названием 'Северо-восточная комиссия по промышленному развитию', который мог бы направлять промышленное развитие Фэнтяни."

 FNG_Expand_the_Anshan_Mines: "Расширить рудники Аньшань"
 FNG_Expand_the_Anshan_Mines_desc: "Огромные месторождения железа в Аньшане были описаны как имеющие 'мировое значение', и они дают около 7 миллионов тонн железа с потенциалом утроить добычу к 1942 году. Это расширение, вероятно, приведет к тому, что Аншань станет одним из крупнейших промышленных центров Восточной Азии."

 FNG_Establish_the_Jinzhou_Industrial_Zone: "Промышленная зона Цзиньчжоу"
 FNG_Establish_the_Jinzhou_Industrial_Zone_desc: "Доки Цзиньчжоу и стратегическое положение в 'коридоре Ляоси', который соединяет наземный транспорт между Северным и Северо-Восточным Китаем, делают его главной целью для развития, стимулируемого государством. Еще неизвестно, будут ли применяться особые правила к этой зоне в пользу китайских или японских компаний."

 FNG_Expand_the_Fushun_Mines: "Расширить шахты Фушунь"
 FNG_Expand_the_Fushun_Mines_desc: "Шахты вокруг Фушуня производят около 11 миллионов тонн угля в год, а месторождения обещают добыть более 4,5 миллиардов тонн угля. В то время как некоторые современные поезда и корабли на Западе используют нефть, Японская империя работает на угле, и стратегическое значение этих шахт нельзя недооценивать."

 FNG_Yingkou_Commercial_Development: "Расширить порт Инкоу"
 FNG_Yingkou_Commercial_Development_desc: "Портовый город Инкоу служит основными воротами Фэнтяня в мир и вторым по величине портом в Бохайском заливе после контролируемого Японией Порт-Артура. Огромный рост производства материалов в Фэнтянь требует столь же больших инвестиций в коммерческую инфраструктуру."

#Develop the Nine Provinces Section
 FNG_Develop_the_Three_Northeast_Provinces: "Развитие трех северо-восточных провинций"
 FNG_Develop_the_Three_Northeast_Provinces_desc: "В трех северо-восточных провинциях - Фэнтяне, Цзилине и Хэйлунцзяне - уже содержится более 30% железных дорог Китая и большая часть его тяжелой промышленности, но если Фэнтянь будет двигаться в будущее, их необходимо будет расширить и усовершенствовать. В идеале это могло бы быть достигнуто исключительно китайским народом, но реальность диктует, что японцы будут вести большую часть пути вперед."

 FNG_Wang_Yongjiangs_Legacy: "Наследие Ван Юнцзяна"
 FNG_Wang_Yongjiangs_Legacy_desc: "Превращение Маньчжурии из отсталой приграничной территории в один из самых процветающих регионов Китая стало возможным благодаря работе Ван Юнцзяна, покойного министра финансов Чжан Цзолиня. Испытывая отвращение к дорогостоящим экскурсиям главнокомандующего к югу от Великой стены в 1928 году, Ван подал в отставку и вскоре умер, его работа осталась незавершенной. Мы должны продолжить с того места, где он остановился."

 FNG_Reorganise_the_NTC: "Реорганизовать НТК"
 FNG_Reorganise_the_NTC_desc: "Национальная транспортная комиссия, основанная правительством Фэнтянь вскоре после своего создания, выполняет функции совета по планированию строительства инфраструктуры по всей стране. Японцы утверждают, что их главная цель - сорвать операции Мантэцу, и в этом утверждении может быть хоть какая-то правда."

 FNG_Support_Sino-Japanese_Joint_Companies: "Поддержка китайско-японских компаний"
 FNG_Support_Sino-Japanese_Joint_Companies_desc: "Большое количество предприятий Фэнтяня предлагают акции как китайцам, так и японцам, включая печально известный Мантэцу, но относительно немногие китайцы имеют средства для инвестиций, и в результате в большинстве совместных компаний доминируют японцы. Поддержка правительства может позволить нам предоставить средства и стимулы для китайских собратьев и постепенно изменить этот баланс."

### Beijing Tree ###

 FNG_From_Beijing_to_the_Begonia_Leaf: "От Пекина до Бегонии"
 FNG_From_Beijing_to_the_Begonia_Leaf_desc: "На протяжении десятилетий студенты и националисты сравнивали форму Китая, то есть неразделенного Китая, с формой листа бегонии. Теперь, когда Пекин в наших руках, пришло время вернуть себе всю нашу родину и превратить Лист Бегонии в реальность!"

 FNG_Suppress_the_Bandits_Collect_the_Harvest: "Разбить бандитов,собрать урожай"
 FNG_Suppress_the_Bandits_Collect_the_Harvest_desc: "В прошлый раз, когда солдаты армии Фэнтяня вошли на Северо-Китайскую равнину, некоторым подразделениям было предложено подавлять бандитизм и помогать в сборе сезонного урожая в обмен на жилье и продовольствие. Там, где такие удобства обычно просто захватывались, эта тактика, по-видимому, смягчила местные беспорядки и партизанскую деятельность. Всем командирам следовало бы последовать этому примеру."

 FNG_Continue_the_Reclamation_War: "Продолжить войну за Возрождение"
 FNG_Continue_the_Reclamation_War_desc: "Война за Национальное Возрождение не закончилась взятием Пекина. Необходимо было постепенно подчинить себе каждую из провинций Китая и вновь объединить страну."

 FNG_Integrate_Occupied_Arsenals: "Интеграция захваченных арсеналов"
 FNG_Integrate_Occupied_Arsenals_desc: "Шэньянский арсенал, несомненно, является крупнейшим в Китае, но за счет интеграции и специализации недавно захваченных арсеналов, теперь уже в рамках национальной системы снабжения, мы сможем снизить нагрузку на Шэньян и улучшить наши общие логистические возможности."

 FNG_Crush_Flies_and_Capture_Pigs: "Уничтожение мух и отлов свиней."
 FNG_Crush_Flies_and_Capture_Pigs_desc: "Коррупция и злоупотребление властью процветают в Китае на протяжении последних нескольких десятилетий, и пронизывает все уровни правительства Фэнтяна. Для восстановления доверия населения необходимо восстановить хоть какой-то закон и порядок, и будут показательно наказаны как мелкие «мухи», так и высокопоставленные «свиньи», которые жадно пожирают средства к существованию нации."

 FNG_Expand_the_Baojia_System: "Расширить систему Баоцзя"
 FNG_Expand_the_Baojia_System_desc: "Система Баоцзя — это древний метод социальной организации и вербовки в армию. Чжан Цзолинь возродил эту практику несколько десятилетий назад на северо-востоке страны, и это имело большой успех, но теперь пришло время вновь распространить эту систему на остальную часть Китая, где она в значительной степени пришла в упадок."

 FNG_Incorporate_Local_Patronage_Networks: "Внедрить местные системы патронажа"
 FNG_Incorporate_Local_Patronage_Networks_desc: "В каждой институции есть нечто большее, чем кажется на первый взгляд, и каждый хороший военачальник строит свою крепость через сеть взаимовыгодных партнерств, заключенных за закрытыми дверями. С крахом вражеской власти многие такие люди и институции не имеют четкого места в новом порядке. Есть все основания начать, по возможности, включать этих людей в наши собственные сети."

 FNG_Centralize_Provincial_Revenues: "Централизация сбора налогов"
 FNG_Centralize_Provincial_Revenues_desc: "Пожалуй, главным источником разобщенности в Китае стала децентрализация налоговой системы, начавшаяся с введения в 1853 году транзитных пошлин провинций «Лицзинь». Новое центральное правительство должно ограничить налоги в провинциях и уменьшить процент, который местные власти могут оставлять себе. В противном случае местные органы власти будут продолжать лишать страну доходов."

 FNG_Institute_Labour_Discipline: "Институт трудовой дисциплины"
 FNG_Institute_Labour_Discipline_desc: "Промышленная политика нашей страны находится под угрозой из-за все более расходящихся интересов промышленников, профсоюзных лидеров и рабочих. Профсоюзы лишь сеют раздор и недоверие, вынуждая лидеров страны идти на компромиссы. Только вмешательство, которое укрепит дисциплину и лояльность профсоюзных организаций, позволит нам достичь единства, необходимого для продвижения страны вперед."

 FNG_The_Generals_Know_Best: "Генералам виднее"
 FNG_The_Generals_Know_Best_desc: "Несомненно, централизованная армия может служить основой для централизованного государства, но огромные размеры Китая требуют иного подхода. По этой причине мы продолжим назначать военных губернаторов. Для лучшего баланса в этой системе провинциальные армии должны набирать большую часть войск из-за пределов своих провинций и ограничивать производство и использование тяжелого вооружения."

 FNG_One_Army_One_Republic: "Одна армия - одна Республика"
 FNG_One_Army_One_Republic_desc: "Если нам и следует извлечь какой-либо урок из более чем двухтысячелетней истории Китая, то это то, что когда военная сила разделена, то и страна разделена. Для построения единого Китая мы должны создать единую армию под единым знаменем, под руководством единой командной структуры. Эта мера не будет популярна ни на одном уровне власти, за исключением Кабинета министров."

 FNG_Secure_the_Rear_Area: "Обеспечить безопасность тыла"
 FNG_Secure_the_Rear_Area_desc: "Северо-Китайская равнина захвачена, но не умиротворена. На данный момент армия контролирует только железные дороги и небольшую полосу недалеко от них, а за их пределами бесчинствуют бандиты и партизаны. Китай — большая страна, и тыловые районы необходимо тщательно зачистить, чтобы обеспечить беспрепятственное продвижение к цели национального воссоединения."

 FNG_against_imperialism_of_all_forms: "Против всех видов империализма"
 FNG_against_imperialism_of_all_forms_desc: "Япония позиционирует себя как друга, способного союзника, возможно, даже равного. Но китайцы знают лучше; их планы в отношении этой страны, их стремления в отношении Азии в целом, их презрительное отношение к отчуждению от своих китайских «союзников». Они просто практикуют империализм в гораздо более изощренной форме, но им придется быть гораздо хитрее, если они хотят перехитрить старого маршала."

 FNG_faith_in_the_anguojun: "Вера в Ангоцзюнь"
 FNG_faith_in_the_anguojun_desc: "Только Армия Умиротворения Страны, военное крыло конкурирующего правительства во главе с Фэнтянем, может гарантировать сохранение наследия Синьхайской революции и объединения пяти рас под одним знаменем. Оскверненная такими фигурами, как провинциальные военачальники, федералисты, демократы «третьего пути» и революционеры, китайская революция была ужасно искажена, превращена в дикую раковую опухоль, которую необходимо усмирить. И только наши офицеры способны на это."

 FNG_ensuring_efficient_procurement: "Обеспечить эффективные закупки"
 FNG_ensuring_efficient_procurement_desc: "Стремясь обогатиться и обеспечить себе будущее, различные мелкие военачальники и бандиты захватывают «законные» поставки оружия, предназначенные для подразделений центрального правительства. Аналогичным образом, война и разрушения нанесли значительный ущерб местным арсеналам Китая, и их некогда процветающее производство в последнее время переживает спад. Логистика и снабжение выигрывают войны, поэтому необходимо уделять им должное внимание и заботу."

 FNG_revitalise_the_bank_of_communications: "Оживить Банк коммуникаций"
 FNG_revitalise_the_bank_of_communications_desc: "Банк коммуникаций когда-то держал в своих руках саму стабильность китайских правительственных кабинетов, поскольку способствовал привлечению иностранных инвестиций, что было крайне важно для поддержки правительств Юань Шикая, а позже и Дуань Цижуя. Однако после займа Нисивара и протестов Парижской мирной конференции его роль значительно уменьшилась. Вполне естественно, что возможности его сотрудников вновь проявились в ведущей роли."

 FNG_renewing_trust_in_industry: "Возобновить доверие к промышленности"
 FNG_renewing_trust_in_industry_desc: "В условиях практически бесконечной эпохи военачальников, за исключением короткого периода объединения Чжили, стабильность и вера в промышленный потенциал китайского государства особенно слабы, по крайней мере, в отношении иностранных фирм. В свете всплеска антиконцессионистских настроений накануне Шанхайского восстания и других событий, для восстановления доверия к нашим заводам потребуются согласованные усилия правительства."

 FNG_the_marshal_and_the_emperor: "Маршал и Император"
 FNG_the_marshal_and_the_emperor_desc: "Вместе Сын Неба и Старый Маршал Дунбэя шагнули навстречу новой эре процветания Азии. Было бы неправильно преждевременно заканчивать. Все, что нужно Фэнтяню, он получает от Японии, и хотя многие в правительстве предупреждают Маршала о ловушках, интригах и заговорах, связанных с японцами, для убийства Тигра Севера недостаточно простого шпиона."

 FNG_following_the_kingly_way: "Следуя царскому пути"
 FNG_following_the_kingly_way_desc: "«Царский путь», этот конфуцианский метод управления, обеспечивающий нравственность и благожелательность, традиционно применяемый к императору в отношении его двора, находит во многом схожее применение и в Маршалловом дворце. Не заблуждайтесь, в новом Китае не будет монархов, кроме Старого Маршала, Отца нации — именно его портрет висит на площади Тяньаньмэнь, и именно его примеру должны следовать китайцы."

 FNG_militarise_the_student_body: "Милитаризиция студенческого сообщества"
 FNG_militarise_the_student_body_desc: "В этот период великих потрясений и ужасного кровопролития больше всего страдает молодежь. Лишенная самых основных составляющих своего будущего — системы образования, она практически прозябает, в то время как страна все больше страдает. Но именно эта молодежь держит будущее страны в своих руках, и ее долг — бороться за Китай и за национальное освобождение."

 FNG_dictatorship_of_the_transport_ministry: "Диктатура Министерства транспорта"
 FNG_dictatorship_of_the_transport_ministry_desc: "Железные дороги приносят процветание! Или, по крайней мере, должны были бы. Однако большинство железных дорог в Китае построены западными компаниями или, по крайней мере, финансируются ими. В практическом смысле они всегда были символом одновременно прогресса и безудержного империализма. Благодаря решительным действиям такие люди, как Чан Иньхуай, вернут железные дороги из-под власти империалистов и передадут их в руки центрального правительства."

### Unification Tree ###

 FNG_dongbeis_final_victory: "Окончательная победа Дунбэя"
 FNG_dongbeis_final_victory_desc: "После многочисленных неудачных попыток, продолжавшихся более десяти лет, Фэнтянь наконец одержал победу над всеми своими врагами: Чжили, Аньхой или русские — никто не смог противостоять изобретательности и мастерству сыновей и дочерей Дунбэя. После третьего захвата Пекина остается лишь решить судьбу Китайской Республики, и на кону могут стоять многие жизни."

 FNG_the_moral_republic: "[FNG_the_moral_republic]"
 FNG_the_moral_republic_desc: "[FNG_the_moral_republic_desc]"

 FNG_rulership_as_a_family_business: "[FNG_rulership_as_a_family_business]"
 FNG_rulership_as_a_family_business_desc: "[FNG_rulership_as_a_family_business_desc]"

 FNG_denouncing_imperialist_vultures: "[FNG_denouncing_imperialist_vultures]"
 FNG_denouncing_imperialist_vultures_desc: "[FNG_denouncing_imperialist_vultures_desc]"

 FNG_from_poverty_to_extravagance: "От бедности к величию"
 FNG_from_poverty_to_extravagance_desc: "Когда-то всего лишь бандит, бродивший по пустынным землям Трех Северо-Восточных провинций, Чжан Цзолинь достиг небывалых высот, превзойдя даже самые смелые мечты мелких разбойников. Он стал не просто Великим Маршалом, а правителем всей нации. Именно ему армия подчиняется почти по каждому приказу, и именно Чжан Цзолинь обязан Республике десятью тысячами лет!"

 FNG_commencing_true_recovery: "Начало истинного восстановления"
 FNG_commencing_true_recovery_desc: "После более чем пятилетней вражды между собой, похоже, Лига восстановления наконец получила зеленый свет на укрепление своих позиций и политических достижений. Будучи основной структурой, посредством которой клика Фэнтяня реализовывала свои политические амбиции, повторное назначение Пань Фу на пост премьер-министра укрепило представление о Республике как о инструменте прогресса."

 FNG_harmonising_the_social_classes: "Гармонизация между социальными классами"
 FNG_harmonising_the_social_classes_desc: "Народные массы представляют собой мощную силу, способную вызвать политический вихрь, которому мало кто из объединений может противостоять; Аньхой осознал это, возможно, лишь задним числом. Но можно завоевать расположение масс, не становясь при этом их зависимым. Укрепляя связи между крестьянством, рабочими, дворянством и промышленниками, Китай может добиться нового процветания почти исключительно за счет собственных сил."

 FNG_the_first_party_of_the_state: "Первая партия в государстве"
 FNG_the_first_party_of_the_state_desc: "Нет ни одной другой ассоциации, лиги, партии или группы, способной представить себе возможность управления Китаем. Это явление совершенно неизвестно большинству других людей в этой области. Мы не апостолы демократии, и мы не настолько наивны, чтобы продолжать автократию; мы предлагаем единственное решение для достижения гражданских прав, благосостояния, образования и стабильности."

 FNG_clear_cut_political_economics: "Четкая политико-экономическая модель"
 FNG_clear_cut_political_economics_desc: "Это не карточная игра, на кону жизни всех китайцев, и центральному правительству нельзя доверять превращение самых скромных деревень и поселков в современные города, если его правителями являются лишь политики. Только под руководством людей с деловой хваткой и способностями Китай может быть уверен в экономическом развитии и прогрессе. Остается только надеяться, что через десять лет Китай станет мегаполисом."

 FNG_alliance_of_state_and_business: "Союз бизнеса и государства"
 FNG_alliance_of_state_and_business_desc: "Истинный ключ к восстановлению Китая после десятилетий разобщенности и потрясений — это капитал, и только через людей капитала и их активы правительство может создать необходимые средства для объединения Китая в его уязвимом положении. Заключая государственные контракты с различными крупными компаниями, они получают выгоду, в то время как правительство может направлять их ресурсы на правильное использование."

 FNG_government_as_a_machine: "Правительственная машина"
 FNG_government_as_a_machine_desc: "В государственном управлении не должно быть времени для споров или мелочности; идеология, интеллектуализм и идеализм лишь препятствуют усилиям правительства по максимально эффективному выполнению своих обязанностей. Правительство — единственный инструмент, с помощью которого нация может вернуть себе позиции на мировой арене, и поэтому оно должно управляться как машина или фабрика, ориентированная на прибыль при минимальных затратах."

 FNG_the_president_of_providence: "Предусмотрительный президент"
 FNG_the_president_of_providence_desc: "Ян Юйтин, человек долга, настойчивости, преданности и верности, долгое время не мог найти себе место. И это, прежде всего, было вызвано страхом за свои способности. Проведя большую часть Эпохи Военачальников, он лишался должностей лишь из-за вмешательства таких людей, как Сюэлян. Но теперь они не представляют угрозы для предусмотрительного Маршала и его возрожденной Республики."

 FNG_the_dragons_gambit: "Гамбит Дракона"
 FNG_the_dragons_gambit_desc: "Мало кто поверит, что кто-либо в одиночку сможет так же хорошо управлять кликой Фэнтянь, как Старый Маршал, но ведь эти люди ещё не встречались с Ян Ютином или Чан Иньхуаем. Играя в ту же игру, но выйдя победителем, Ян совершил свой самый грандиозный ход. Больше не будет притворства или некомпетентности Сюэляна, способных разрушить его планы. Да здравствуют вечно 5 народов!"

 FNG_redeeming_the_lost_patriots: "Возрождение забытых патриотов"
 FNG_redeeming_the_lost_patriots_desc: "Благодаря негласным связям, существовавшим с 1920-х годов, Ян всегда с восхищением и любопытством относился к партии младокитайцев. Хотя на северо-востоке ему не удавалось по-настоящему общаться с ними, отчасти из-за их оппозиционной позиции против Фэнтяня и союза Фэн Юна с Сюэляном, теперь, когда они оказались лицом к лицу, Ян должен лишь распахнуть объятия для своей новой группы талантливых ученых."

 FNG_the_rising_sun_and_the_waking_tiger: "Восходящее Солнце и Пробудившийся Тигр"
 FNG_the_rising_sun_and_the_waking_tiger_desc: "Чжан Цзолинь считал себя способным заключить с японцами соглашение на равных, но ему не хватало такта и навыков, необходимых для достижения такой цели. Ян Юйтин же, гораздо более способный солдат, оратор и политик, сумел завоевать подлинное расположение Токио. Теперь они не господин и подданный, а настоящие равные, и вместе они непобедимы."

 FNG_concord_of_nationalities: "Содружество национальностей"
 FNG_concord_of_nationalities_desc: "Подобно многообразию этнических групп и национальностей в Китае, «двор» правительства Ян Юйтина укомплектован множеством людей самых разных взглядов и национальностей. Это могут быть выпускники японских академий, члены Ассоциации Конкордия, представители Коммуникационной клики, члены клики Чжана, симпатизирующие Японии, или даже сами японцы. Новое правительство во многом подражает токийскому правительству, как в хорошем, так и в плохом смысле."

 FNG_freedom_of_the_five_races: "Свобода для пяти рас"
 FNG_freedom_of_the_five_races_desc: "Китай — страна, населённая множеством национальностей: ханьцами, маньчжурами, монголами, тибетцами, хуэйцами. И даже такое разграничение вряд ли является полным и всеобъемлющим. Объединяя различные национальности Китая посредством руководящих принципов «царского пути», государство может связать национальную гармонию с самой концепцией гражданства и государственности; стать нацией морали и этикета, а не революции."

 FNG_the_chinese_shogunate: "Китайский сёгунат"
 FNG_the_chinese_shogunate_desc: "Проще говоря, династия Цин отказалась от модернизации из-за собственной высокомерия и пренебрежительного отношения к небесным правам; несмотря на многочисленные предложения от различных государств, которые были чрезвычайно выгодны, двор всегда стремился воспрепятствовать модернизации. Но современные китайцы гораздо более прагматичны; если мы сможем всему научиться у Японии, мы неизбежно станем сильнее их."

 FNG_in_the_spirit_of_1912: "Во имя духа 1912"
 FNG_in_the_spirit_of_1912_desc: "Возможно, из-за безрассудства, идеализма или слабого стремления к более утопическому миру Север и Юг вновь предприняли взаимовыгодную попытку национального объединения. Их усилия, часто подвергавшиеся критике и считавшиеся ложью, напоминают события 1912 года, предшествовавшие событиям в Синьхае. Сохранение на посту губернаторов южных государств, а также назначение Чжан Цзюньмая премьер-министром, возможно, позволит добиться более гладких результатов, чем в прошлый раз."

 FNG_reconstruction_through_autonomy: "Реконструкция через автономию"
 FNG_reconstruction_through_autonomy_desc: "Одно из многочисленных обещаний, данных федералистскому движению, заключалось в создании демократически избранных провинциальных собраний, организованных в соответствии с разработанными на местном уровне провинциальными конституциями. Хотя для принятия последних требуется разрешение центрального правительства, различное делегирование полномочий позволило осуществить быструю и устойчивую, хотя и разрозненную, национальную реконструкцию."

 FNG_Twin_Dragons_Taming_the_Water: "Два дракона, укрощающие воду"
 FNG_Twin_Dragons_Taming_the_Water_desc: "После десятилетий хаоса, разобщенности и плохого управления, мирное и спокойное правление под двусторонним правлением великого маршала Чжан Цзуолиня и премьер-министра Чэнь Цзюнмина кажется поистине раем. Вместе они стали известны как «Два дракона, укрощающие воду», хотя некоторые сомневаются, сможет ли эта гармония длиться вечно."

 FNG_disavow_tokyo: "Отдалиться от Токио"
 FNG_disavow_tokyo_desc: "Япония доказала свою полезность, а возможно, даже благожелательность и выгоду в долгосрочных отношениях со многими министрами действующего центрального правительства. Однако она не способна скрыть свою жажду, своё врождённое стремление к «откатам», «уступкам» или даже территориальным привилегиям. Поистине, она ничему не научилась за последние пару десятилетий, и поэтому настало время отдалиться от Токио и двигаться к самодостаточности."

 FNG_The_Ultimatum: "Ультиматум"
 FNG_The_Ultimatum_desc: "Китай почти столетие терпел унизительные поражения и унижения под каблуком иностранных держав. Пришло время положить конец национальному унижению, и Япония должна выполнить наши условия или столкнуться с нашей жесткостью."

 FNG_entering_the_international_scene: "Выход на международную арену"
 FNG_entering_the_international_scene_desc: "Долгое время нам приходилось иметь дело с международными посредниками через Японию или, другими словами, с агентами из Шанхая, но наконец-то нам предоставили возможность вести переговоры о собственной политике Китая на его собственных условиях. Пусть же, опираясь на волю объединенной нации, истинная Китайская Республика утвердит себя против всех иностранных империалистов."

 FNG_Chunchi-Xiangyi: "Два сапога-пара"
 FNG_Chunchi-Xiangyi_desc: "Когда-то говорили, что Китай и Япония «близки как губы и зубы», и сегодня дальнейшая интеграция может означать только дальнейшее процветание. Теперь мы можем гарантировать, что Китай получит все выгоды от японского производства. Некоторые называют это воротами на китайский рынок, но нам не нужно сеять панику. Люди хотят дешевой одежды, радиоприемников и сигарет!"

 FNG_Treaty_of_Friendship_and_Cooperation: "Договор о дружбе и сотрудничестве"
 FNG_Treaty_of_Friendship_and_Cooperation_desc: "Признавая бесспорно восходящее положение Японии на Востоке, мы должны признать свою роль как равных, но подчиненных партнеров в стремлении к паназиатской мечте. Пришло время присоединиться к альянсу Японии и посвятить себя достижению его достойных целей."

