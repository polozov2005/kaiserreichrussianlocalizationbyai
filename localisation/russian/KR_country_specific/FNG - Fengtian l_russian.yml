 FNG_Sell_Anshan_Iron_and_Steel: "Продать Аньшаньскую Железокомпанию"
 FNG_Sell_Anshan_Iron_and_Steel_desc: "Аньшаньская Железокомпания была китайско-японской совместной компанией с момента ее основания в 1916 году, и обе стороны имели определенный контроль над ее управлением, прибылью и продукцией. Теперь Мантэцу хочет купить компанию и официально переименовать ее в Сёва-Сталь. Предполагается, что под их управлением работа будет более эффективной, а часть прибыли и продукта все равно будет поступать в нашу казну."

 FNG_Revise_our_Position_on_Looting: "Пересмотреть нашу позицию в отношении мародерства"
 FNG_Revise_our_Position_on_Looting_desc: "Наше решение разрешить разграбление оккупированных территорий могло быть ошибкой. К сожалению, отмена народных приказов после того, как они были даны, не говоря уже о сдерживании мужчин, будет нелегким делом."
 FNG_Looting_Beijing_Baoding: "Предотвратить грабежи в провинции Чжили"
 FNG_Looting_Beijing_Baoding_desc: "Говорят, что люди боятся солдат, как наводнение или как злобные звери - они спасаются бегством в ужасе."
 FNG_Looting_Zhengzhou_Luoyang: "Предотвратить грабежи в провинции Хэнань"
 FNG_Looting_Zhengzhou_Luoyang_desc: "Говорят, что люди боятся солдат, как наводнение или как злобные звери - они спасаются бегством в ужасе."
 FNG_Looting_Wuhan: "Предотвратить грабежи в провинции Ухань"
 FNG_Looting_Wuhan_desc: "Говорят, что люди боятся солдат, как наводнение или как злобные звери - они спасаются бегством в ужасе. Мы должны положить конец хаосу в Ухане, иначе пострадает наша национальная легитимность."

 FNG_The_Soy_Agricultural_Initiative: "Выращивание сои"
 FNG_The_Soy_Agricultural_Initiative_desc: "Значительное корейское меньшинство Фэнтяня - квалифицированные плантаторы риса, но соевые бобы стали чрезвычайно востребованной товарной культурой, поскольку они являются не только отличным источником пищи, удобрений и кормов для животных, но и маслом для промышленного применения. Мантэцу предприняли попытку обучить корейцев выращиванию сои, но реакция была неоднозначной. Теперь им нужна наша помощь, чтобы пройти через это."
 FNG_Study_Japanese_Manufacturing_Methods: "Изучить японские методы производства"
 FNG_Study_Japanese_Manufacturing_Methods_desc: "Япония создавала промышленный сектор, похожий на западный, на протяжении десятилетий, намного превосходя что-либо в Маньчжурии. Мы должны узнать все, что они нам позволят, и даже больше."
 FNG_Request_Japanese_Small_Arms: "Запросить японское пехотное снаряжение"
 FNG_Request_Japanese_Small_Arms_desc: "Япония уже давно предоставляет нам разнообразную военную технику, конечно, не помешает попросить большего."
 FNG_Request_Japanese_Artillery: "Запросить японскую артиллерию"
 FNG_Request_Japanese_Artillery_desc: "Японский арсенал "Кокура" имеет долгую историю производства качественной артиллерии, которая будет большим козырем в наших руках."
 FNG_Request_Japanese_Tanks: "Запросить японские танки"
 FNG_Request_Japanese_Tanks_desc: "Японская промышленность может производить танки в огромных количествах, намного превышающих наши собственные. Конечно, у них должны быть лишние."

 FNG_Preparing_For_The_Princes_Visit: "Подготовка к визиту принца"
 FNG_Preparing_For_The_Princes_Visit_desc: "Дядя японского императора, принц Каньин Котохито, прибудет с визитом на северо-восток в конце этого года. Для такого почетного гостя, особенно того, кто может во многом сформировать отношения между Шэньяном и Токио, мы должны сделать все, чтобы все было в высшей степени презентабельно. Слухи о националистическом заговоре против жизни принца также должны быть развеяны."
 FNG_increase_security_in_shenyang: "Повысить безопасность в Шэньяне"
 FNG_increase_security_in_shenyang_desc: "По мере того как ходят слухи о заговоре против японского принца, мы должны усилить безопасность в столице. Хотя оставшаяся часть его визита может быть непредсказуемой, не секрет, что он посетит и правительство, и главнокомандующего в Шэньяне."
 FNG_investigate_the_junior_officer_corps: "Следить за молодыми офицерами"
 FNG_investigate_the_junior_officer_corps_desc: "В то время как многие молодые офицеры-идеалисты открыто агитируют против регрессивного Чжилийского режима на юге, что уместно, другие также видят в Японии врага. Хотя их взгляды могут иметь определенное значение, мы не можем позволить этим вспыльчивым людям саботировать важные отношения между Шэньяном и Токио."
 FNG_reinforce_soldierly_discipline: "Укрепить воинскую дисциплину"
 FNG_reinforce_soldierly_discipline_desc: "Мы не можем позволить себе выставлять напоказ неряшливых солдат, когда принц Каньин Котохито посещает войска. Мы также не можем допустить присутствия опасных радикалов."
 FNG_present_chinese_modernity: "Современная китайская современность"
 FNG_present_chinese_modernity_desc: "Китай - не современная страна, но с нашими недавними усилиями и свежим слоем краски может показаться, что это так."
 FNG_Militarize_the_Minsheng_Truck: "Мобилизовать грузовики "Миншэн""
 FNG_Militarize_the_Minsheng_Truck_desc: "В начале 1930-х годов Чжан Сюэлян поручил американскому инженеру создать первый в Китае отечественный автомобиль под названием "Миншэн", или "средства к существованию народа". Эти выносливые грузовики, никогда не производившиеся серийно, с соответствующими модификациями могли быть адаптированы для использования в военных целях."
 FNG_Fortress_Manchuria: "Создать крепость Маньчжурия"
 FNG_Fortress_Manchuria_desc: "Горы Ян на юге, хребет Малый Хиган на западе и Бохайский залив на востоке создают естественную крепость вокруг Маньчжурской равнины, оставляя Шанхайский перевал в качестве единственной легкой точки входа. Северо-восток легко укрепить, когда природа уже проделала такую большую работу."

 FNG_Rebuild_the_Second_Army: "Восстановить вторую армию"
 FNG_Rebuild_the_Second_Army_desc: "Вторая армия Фэнтяня, часто называемая "армией Чжили" из-за того, что она располагалась в провинции Чжили, была одной из главных боевых сил Чжан Цзолиня во время Чжифэнских войн. Отряд потерял лидерство после дезертирства Го Сунлина в 1925 году, а в 1928 году осажденные солдаты оказались в Шаньдуне. В последующем мире это престижное подразделение постепенно распалось, поскольку ветераны, завербованные с Чжан Цзунчаном, уезжали в Маньчжурию или возвращались к своим семьям в Чжили. Теперь, когда Северный Китай снова в наших руках, пришло время поднять старое знамя Второй армии и вернуть ее имя славе!"

 FNG_Raise_Independent_Brigades_in_Dezhou: "Raise Independent Brigades in Dezhou"
 FNG_Raise_Independent_Brigades_in_Dezhou_desc: "The collapse of [QIE.GetNameDef] has left broad swathes of the North China Plain open to marauding bandits, both those native to the region and former [QIE.GetName] troops turned criminal. With our lax policies on looting, it shouldn't be hard to rally these men and reorganise them into 'independent brigades'."

 FNG_Raise_Independent_Brigades_in_Kaifeng: "Создать отдельные бригады в Кайфэне"
 FNG_Raise_Independent_Brigades_in_Kaifeng_desc: "Крах [QIE.GetNameDef] оставил широкие участки Северо-Китайской равнины открытыми для мародерствующих бандитов, как уроженцев региона, так и бывших войск [QIE.GetName], ставших преступниками. С нашей вялой политикой грабежей не составит труда сплотить этих людей и реорганизовать их в "независимые бригады"."

 FNG_Raise_Independent_Brigades_in_Ruyang: "Создать отдельные бригады в Жуяне"
 FNG_Raise_Independent_Brigades_in_Ruyang_desc: "Крах [QIE.GetNameDef] оставил широкие участки Северо-Китайской равнины открытыми для мародерствующих бандитов, как уроженцев региона, так и бывших войск [QIE.GetName], ставших преступниками. С нашей вялой политикой грабежей не составит труда сплотить этих людей и реорганизовать их в "независимые бригады"."

 FNG_Raise_Independent_Brigades_in_Guanzhong: "Создать отдельные бригады в Гуаньчжуне"
 FNG_Raise_Independent_Brigades_in_Guanzhong_desc: "The collapse of [QIE.GetNameDef] has left broad swathes of the North China Plain open to marauding bandits, both those native to the region and former [QIE.GetName] troops turned criminal. With our lax policies on looting, it shouldn't be hard to rally these men and reorganise them into 'independent brigades'."

 FNG_Raise_the_Baoding_Cadet_Corps: "Возродить Кадетский Корпус Баодин"
 FNG_Raise_the_Baoding_Cadet_Corps_desc: "Молодые кадеты Баодин были одними из самых активных сторонников маньчжурской монархии в Пекине, и наша победа в северном Китае оставила всех, кроме нескольких, в тюрьмах или отправила домой. Теперь пришло время этим людям сражаться на правильной стороне истории. Хотя некоторые могут сомневаться в вооружении бывших врагов, их патриотизм не подлежит сомнению, и в такие ужасные времена страна должна быть на первом месте."

 FNG_Centralise_the_Banks: "Централизовать банки"
 FNG_Centralise_the_Banks_desc: "В настоящее время в Фэнтянь входят четыре банка, выпускающих банкноты, а именно Банк трех восточных провинций, Банк Цзилинь, Банк Хэйлунцзян и Пограничный банк, каждый из которых является продуктом более ранних усилий по централизации. Теперь кажется уместным завершить этот процесс и объединить их всех в рамках единого Центробанка."
 FNG_Re_Introduce_the_Fengtian_Dollar: "Повторное введение фэнтяньского доллара"
 FNG_Re_Introduce_the_Fengtian_Dollar_desc: "Фэнтяньский Доллар был одним из более поздних экспериментов бывшего гражданского губернатора Ван Юнцзяна и служил валютой, не обеспеченной серебром, но все еще подлежащей уплате в виде налога, демонстрируя веру правительства в его ценность, но не требуя дополнительного серебра для печати. После огромных государственных расходов во время последней войны в Чжифэне и последующей инфляции, валюта больше не печаталась, но ее гибкость сегодня может быть полезна для привлечения дополнительных инвестиций."
 FNG_Fill_the_Silver_Reserve: "Пополнить серебряный резерв"
 FNG_Fill_the_Silver_Reserve_desc: "Фэнтяньский Юань, наша основная валюта, обеспечена серебром, а в прошлом даже выросла в цене по отношению к японской иене. В ответ на это японцы настаивали на том, что в наших резервах никогда не было достаточно серебра для надлежащего обеспечения валюты. К сожалению, в этом могла быть доля правды, и поэтому необходимо покупать больше серебра, если мы хотим привлечь дополнительные инвестиции."
 FNG_Encourage_Chinese_Investment: "Привлечение китайских инвестиций"
 FNG_Encourage_Chinese_Investment_desc: "Китайские инвестиции лежат в основе наших усилий по возвращению хотя бы некоторого контроля над экономикой Фэнтяня его народу, а не Мантэцу. Поощрения и тщательное планирование - единственный путь вперед."
 FNG_Approve_Domestic_Industrial_Materials_Investment: "Поощрение инвестиций в отечественные материалы"
 FNG_Approve_Domestic_Industrial_Materials_Investment_desc: "Обеспокоенные японским доминированием в секторе тяжелой промышленности Фэнтяня, несколько богатых бизнесменов, связанных с Коммуникационной Кликой, предложили объединить свои ресурсы для инвестирования в несколько перспективных компаний в Цзиньчжоу, а именно в керамическую компанию Чжаоцзинь, железнодорожную технику Цзиньчжоу и Северо-восточный завод химической кожи."
 FNG_Approve_Chinese_Investments_in_Heilongjiang: "Одобрить внутренние инвестиции в Хэйлунцзян"
 FNG_Approve_Chinese_Investments_in_Heilongjiang_desc: "Поскольку японские инвестиции часто приходят в тяжелую промышленность и горнодобывающую отрасль, группа местных инвесторов решила объединить свои ресурсы, чтобы поддержать две китайские компании, борющиеся с конкуренцией Мантэцу. Компания Dongdai Fertiliser и Shanjing Packing Plant будут продолжать помогать растущей соевой промышленности Фэнтяня расширяться на северо-восточную границу."

 FNG_Encourage_Japanese_Investment: "Привлечение японских инвестиций"
 FNG_Encourage_Japanese_Investment_desc: "К сожалению, иностранный капитал имеет решающее значение для наших усилий по развитию, и поэтому мы должны предпринимать попытки привлечь японских инвесторов наряду с китайскими. Хотя они не получат тех же стимулов, что и наши граждане, их должно утешить наше недавнее пополнение серебряных резервов."
 FNG_Japanese_Glass_Paper_Textiles: "Инвестиции Mitsui в легкую промышленность"
 FNG_Japanese_Glass_Paper_Textiles_desc: "Представители Mitsui Zaibatsu надеются инвестировать значительные средства в местные предприятия, в частности в Dongxing Dye & Textile Company, Fengtian Industrial Paper и Dongbei Glass. Имея контрольные пакеты акций во всех трех компаниях, Mitsui, вероятно, будет доминировать в нашей стекольной, бумажной и текстильной промышленности в обозримом будущем, а конкуренцию ей составит только Мантэцу."
 FNG_Sino-Japanese_Shipping_Tourism: "Японские инвестиции в судоходство и туризм"
 FNG_Sino-Japanese_Shipping_Tourism_desc: "Мантэцу активно продвигает туризм в Китае уже много лет, привлекая состоятельных туристов и представителей среднего класса прокатиться по 'экзотическим пейзажам' Маньчжурии на своих самых современных железных дорогах. Однако ее амбиции никогда не распространялись на море.\n\n Небольшая группа богатых инвесторов из Токио надеется вступить в партнерство с несколькими местными судоходными компаниями и создать альтернативу железнодорожному туризму Мантэцу на водном транспорте, оказывая при этом услуги по перевозке грузов на стороне, создавая таким образом 'Бохайские предприятия водного транспорта'.\n"
 FNG_Japanese_Minerals_and_Metals: "Инвестиции Sumitomo в минералы и металлы"
 FNG_Japanese_Minerals_and_Metals_desc: "После переговоров с представителями правительства Sumitomo Zaibatsu согласилась частично финансировать поиски металлов и минералов на территории Фэнтяня, в обмен на пропорциональную долю в любых компаниях, созданных для добычи обнаруженных ресурсов. Учитывая слухи о золоте в горах Хиган и вольфраме в провинции Фэнтянь, их инвестиции, скорее всего, оправдаются."
 FNG_Japanese_Steel: "Одобрить дальнейшее расширение производства в Аньшане"
 FNG_Japanese_Steel_desc: "Учитывая недавнее расширение шахт в Аншане, финансируемое правительством, и атмосферу, благоприятную для инвестиций, компания Мантэцу надеется инвестировать дальнейший капитал в модернизацию и расширение своей деятельности в Аншане и его окрестностях."

 FNG_Encourage_Russian_Investment: "Solicit Russian Investors"
 FNG_Encourage_Russian_Investment_desc: "With the souring of relations with the Japanese, we no longer have access to our main source of foreign capital. While relations with the Russians recently have not been the best, we may be able to entice certain powerful Siberian businessmen to invest in our provinces along the border."
 FNG_Upgrade_Harbin_Port_Facilities: "Upgrade Harbin Port Facilities"
 FNG_Upgrade_Harbin_Port_Facilities_desc: "Since its construction at the end of the 19th century, Harbin's port has been an important economic asset to the area surrounding it, allowing goods to be shipped along the Songhua and Amur rivers. With the departure of the Japanese, Dalzavod is willing to invest in expanding Harbin's port facilities, resulting in increased trade between Northeastern China and the Russian Far East."
 FNG_Amur_Minerals_Deal: "Heilongjiang Minerals Investment"
 FNG_Amur_Minerals_Deal_desc: "With rumours of gold being discovered in northern Heilongjiang, the Amur Gold Mining Society is seemingly willing to invest in gold mining and prospecting operations along the Russian border. While they would get a significant portion of any resources extracted, it may prove useful in developing remote communities and provide our government with much needed wealth, as well as expanding general resource extraction capabilities in those regions."

 FNG_railways: "Железнодорожное строительство"
 FNG_railways_desc: "На Северо-Востоке больше железных дорог, чем в любом другом регионе Китая, но самые важные из них принадлежат и обслуживаются Мантэцу от имени правительства Японии. Национальная Транспортная Комиссия хочет расширить меньшую сеть, принадлежащую китайцам, для улучшения нашей инфраструктуры, но, что более важно, для уменьшения нашей стратегической зависимости от японцев."
 FNG_Liaoning_Infrastructure: "Развитие инфраструктуры в Ляонине"
 FNG_Liaobei_Jilin_Infrastructure: "Развитие инфраструктуры в Ляобэй и Цзилинь"
 FNG_Nenjiang_Songjiang_Infrastructure: "Развитие инфраструктуры в Нэньцзинане и Сонцзяне"
 FNG_Railway_Construction_Jilin_Shenyang: "Завершение строительства линии Цзилинь-Шэньян"
 FNG_Railway_Construction_Jilin_Shenyang_desc: "Первым крупным проектом реорганизованной НТК является завершение строительства железной дороги Цзилинь-Шэньян. Первоначально это было запланировано в 1927 году Чжаном Цзосяном как способ противодействия японскому влиянию в его провинции. К сожалению, проект столкнулся с серьезными задержками из-за начала войны на юге и попыток Японии приостановить строительство. Линия работает с ограниченной пропускной способностью с 1931 года, но по-прежнему не способна выполнять свое истинное назначение - обеспечивать контролируемую Китаем стратегическую альтернативу главной линии Южно-Маньчжурской железной дороги. В качестве дополнительного бонуса это привело бы к дополнительному экономическому развитию районов провинции Цзилинь, не связанных с основной линией Южно-Маньчжурской железной дороги."
 FNG_Railway_Construction_Pingqi: "Завершить строительство линии Пинцзи"
 FNG_Railway_Construction_Pingqi_desc: "Следующим крупным проектом является линия Сипин-Цицихар, или линия Пинцзи, которая первоначально была предложена японцами как часть более масштабного проекта по соединению небольших провинциальных линий Мантэцу с центральными линиями, проходящими через крупные города. Строительство, близившееся к завершению в конце 1927 года, было приостановлено из-за беспорядков на юге и необходимости в других источниках финансирования. Хотя Мантэцу в настоящее время по-прежнему значительно контролирует эту линию, завершение строительства должно дать нам необходимое преимущество для контроля над ней. Однако, что наиболее важно, её завершение позволит нам обходить Южно-Маньчжурскую железную дорогу при переброске войск на север, в сторону Хэйлунцзяна, тем самым уменьшая контроль Японии над нашими стратегическими решениями. Кроме того, модернизация линии Пинци должна также принести столь необходимое экономическое развитие относительно неразвитым северным районам провинции Фэнтянь."
 FNG_Railway_Construction_Shenyang_Chengde: "Модернизация линии Шэньян-Чэнде"
 FNG_Railway_Construction_Shenyang_Chengde_desc: "Благодаря недавнему масштабному строительству железных дорог, что обеспечивает большую стратегическую гибкость в перемещении войск и ресурсов на северо-востоке, он наконец может обратить внимание на нашу конечную цель — возвращение Пекина. С открытием линии Цзиньчэн в 1934 году, как продолжения существовавшей ранее железной дороги Шэньян-Шаньхайгуань, Рехэ был соединен с остальной частью северо-восточной железнодорожной системы, что позволило расширить логистические возможности в этом районе. Модернизация этой линии должна обеспечить лучшее снабжение наших войск у Великой Китайской стены, когда неизбежно наступит конфликт с нашими южными врагами."
 FNG_The_Jinhan_Railway: "Железная дорога Цзиньхань"
 FNG_The_Jinpu_Railway: "Железная дорога Цзиньпу"
 FNG_The_Yuehan_Railway: "Железная дорога Юэхань"
 FNG_reclaiming_railway_cf: "Сейчас проводится восстановление железной дороги"

 FNG_Japanese_Interests_in_Manchuria: "Японские интересы в Маньчжурии"
 FNG_Japanese_Interests_in_Manchuria_desc: "Япония обладала постоянно растущим присутствием в Маньчжурии со времен русско-японской войны. Сегодня она монополизирует значительную часть тяжелой промышленности и железнодорожной системы Маньчжурии, олицетворением которой является "Южно-Маньчжурская железнодорожная компания", также известная как "Мантэцу". Некоторые называют японцев союзниками, другие - врагами, но большинство считает их простыми союзниками для удобства. Как бы то ни было, они здесь, и с ними нужно разбираться во всех смыслах, которые подразумевает это слово."

 FNG_foreign_policy: "Путь к восстановлению"
 FNG_foreign_policy_desc: "Конец последней Чжили-Фэнтянской войны в 1928 году ознаменовался изгнанием когда-то процветавшего республиканского движения Китая на северо-восток. С тех пор наши силы противостояли [QIE.GetAdjective]им войскам в Шанхайгуане, в то время как Германия и Япония вели тихую шпионскую войну в прибрежных городах. В один прекрасный день Китай будет возвращен и воссоединен..."
 FNG_japanese_influence_desc: "\n\nЯпонское влияние на данный момент составляет [?FNG.FNG_JAP_influence_variable|j%0],с нашей стороны было бы разумно снизить этот уровень и оставить наши возможности открытыми."
 FNG_japanese_influence_expelled_desc: "\n\nЯпонское влияние отныне §Yисключено§!, сейчас нам остается полагаться только на самих себя."

 FNG_National_Irredentism: "Продвигать национальный ирредентизм"
 FNG_National_Irredentism_desc: "Несмотря на наши успешные попытки подавить северо-восточное регионалистское движение, определенная доля апатии остается среди населения в целом. Чтобы заручиться полной поддержкой, необходимой для Национального возрождения, мы должны начать широкомасштабную пропагандистскую кампанию!"
 FNG_The_Yanshan_Plan: "The Yanshan Plan"
 FNG_The_Yanshan_Plan_desc: "The most straightforward and realistic strategy for reclaiming the South involves an assault through the Province of Rehe and across the Yan Mountains to the South. With the pass at Shanhaiguan so narrow, mountain troops must be trained and equipped to widen the front."
 FNG_Denounce_Qing_Monarchism: "Осудить Цинский монархизм"
 FNG_Denounce_Qing_Monarchism_desc: "Регрессивная Империя Цин утверждает, что черпает силу из своего прошлого, но на самом деле это только делает ее слабее. Мы похороним их старые идеи под неумолимой тяжестью современности!"
 FNG_Denounce_Qing_Monarchism_Countdown: "Отречься от монархизма Цин"
 FNG_Denounce_Qing_Monarchism_Countdown_desc: "Регрессивная Империя Цин утверждает, что черпает силы в своем прошлом, но на самом деле это делает ее только слабее. Мы похороним их старые идеи под неумолимым весом современности!"
 FNG_Denounce_German_Imperialism: "Осудить Германский империализм"
 FNG_Denounce_German_Imperialism_desc: "Германия - последняя из западных держав, которая пытала и унижала Китай. Мы снова станем гордой страной, но только после того, как кайзер и его предатели будут брошены в море!"
 FNG_Denounce_German_Imperialism_Countdown: "Отречься от германского империализма"
 FNG_Denounce_German_Imperialism_Countdown_desc: "Германия - лишь очередная из западных держав, пытающих и унижающих Китай. Мы снова станем гордой страной, но только после того, как кайзер и его предательские лакеи будут сброшены в море!"
 FNG_Wu_Wang_Zai_Ju: "Наша Цзюй"
 FNG_Wu_Wang_Zai_Ju_desc: "Древняя китайская идиома "Не забывай того, что случилось в Цзюй" намекает на отчаянную защиту Цзюй, состояния последнего бастиона Ци, из которого она провела успешную кампанию по возвращению всех потерянных территорий. Маньчжурия будет нашим Цзюй, у которого мы отвоевываем весь Китай!"
 FNG_Shanhaiguan_Infiltration: "Проникнуть в Шаньхайгуань"
 FNG_Shanhaiguan_Infiltration_desc: "Поскольку Цинско-Фэнтяньская граница гористая и сильно милитаризована, даже нападение на Шаньхайгуань будет затруднено. Некоторые предлагали облегчить наше проникновение путем заброски отрядов тыл и как только начнется война, они атакуют защитников Цин с тыла."
 FNG_Escalate_the_Propaganda_War: "Эскалация пропагандистской войны"
 FNG_Escalate_the_Propaganda_War_desc: "Мы поддерживаем периодическую пропагандистскую войну против Цинского Правительства в течение последних восьми лет. Теперь мы должны поднять голос и расширить охват!"
 FNG_The_Grand_Marshals_Proclamation: "Заявления Великого Маршала"
 FNG_The_Grand_Marshals_Proclamation_desc: "Великий Маршал в своем торжественном заявлении денонсировал незаконность [CHN.GetNameDef] и их [GetBeijingGovernmentIdeology] и объявит конец эпохи восстановления и сокращения штатов. Новая эра, руководимая идеалами, выдвинутыми революцией, будет эпохой завоеваний и национальной славы!"
 FNG_Begin_the_War_of_National_Reclamation: "Начать войну за Национальное Возрождение"
 FNG_Begin_the_War_of_National_Reclamation_desc: "Настал момент, когда мы так долго наращивали свои силы и выжидали время, чтобы объявить о начале Войны за Национальное Возрождение! Десять тысяч лет Республике! Десять тысяч лет главнокомандующему! Вперед в Китай!"
 FNG_Ask_Japan_for_Aid: "Запросить вмешательство Японии"
 FNG_Ask_Japan_for_Aid_desc: "Мы рискуем пасть от рук [608.Owner.GetNameDef], нам понадобится вмешательство наших японских союзников, если мы хотим иметь шанс переломить ситуацию!"

#FNG Side
 FNG_japanese_patience_runs_thin_mission: "Терпение японцев на исходе"
 FNG_japanese_patience_runs_thin_mission_desc: "Императорский двор, по приказу Тяньцзиньской армии, неохотно предложил свою поддержку нашей войне за национальное возрождение. Но мы на коротком поводке - Квантунская армия и другие опасаются возможности потери контроля над Маньчжурией и сомневаются в нашей способности добиться окончательных результатов. Если мы не сумеем вовремя захватить ключевые объекты, в первую очередь Пекин, или, что еще хуже, будем отброшены назад, Квантунская армия может воспользоваться моментом и привести к власти одну из своих марионеток."

 FNG_buy_time_with_emperor_decision: "Выиграть время перед императором"
 FNG_buy_time_with_emperor_decision_desc: "Чжан всегда с осторожностью относился к своим отношениям с Японией, никогда не желая казаться покорным, чтобы не обидеть китайских националистов, но и сохраняя дружелюбный вид, чтобы обеспечить постоянный приток японской помощи. К настоящему времени хорошо известно, что императорский двор не имеет полного контроля над своими армиями, но это не значит, что мы также можем игнорировать их. Отстаивание нашей позиции перед японскими официальными лицами при посредничестве армейской фракции Тяньцзиня поможет сдержать давление Японии."

 FNG_crack_down_on_sedition_decision: "Борьба с крамолой"
 FNG_crack_down_on_sedition_decision_desc: "Различные японские агенты пытались проникнуть в главные органы нашего правительства, подкупая и коррумпируя наших чиновников и командиров. Они стремились расширить влияние Японии на гражданские дела, привлекая в свою сферу представителей различных фракций Фэнтяньской Клики. Все это подорвало контроль Чжана над его собственным правительством, и подача примера нескольким главарям послужит надлежащим сигналом о лояльности по всему Дунбэю."

 FNG_curtail_the_shikan_clique_decision: "Свергнуть клику Шикань"
 FNG_curtail_the_shikan_clique_decision_desc: "В военной сфере японские советники обхаживали различных офицеров, занимающих высокие и низкие посты в командной иерархии, чтобы усилить их влияние в армии. В частности, клика шикан была любимчиками Квантунской армии, многие из них воспитывались во время своего раннего обучения военному делу в Японии. Смещение их с видных постов, устранение любых открыто недовольных и разрушение их сетей сведут к минимуму их влияние, даже если это подорвет военные усилия и подтвердит их убеждения в том, что эта война изнурительна."

 FNG_concessions_to_concordia_decision: "Соглашение с Конкордией"
 FNG_concessions_to_concordia_decision_desc: "Ассоциация "Конкордия" - это гражданский фронт японского империализма, группа бюрократов, бизнесменов и политиков, которые якобы выступают за развитие паназиатизма и китайско-японских торговых связей. Расширяя японский контроль над нашими железными дорогами, они быстро распространились на горнодобывающую промышленность и правительство. Хотя в конечном счете они представляют угрозу нашей независимости, нам, возможно, придется сотрудничать с ними, чтобы сдерживать их более радикальных коллег из Квантунской армии."

 FNG_empower_japanese_advisors_decision: "Наделить полномочиями японских советников"
 FNG_empower_japanese_advisors_decision_desc: "Япония направила множество \"советников\" для поддержки наших вооруженных сил, помогая нам не отставать от наших поддерживаемых Германией чжилийских соперников. Но их конечная цель - не помочь нам, а обеспечить японское господство на континенте. Предоставление им права голоса в процессе принятия решений поможет им успокоиться, но также даст им дополнительные полномочия в будущем. Они наверняка воспользуются этим, чтобы расширить влияние своих фаворитов в нашем правительстве и укрепить свою власть над нами."

#JAP Side
 JAP_faith_in_zhang_runs_out_mission: "Вера в Чжана иссякает"
 JAP_faith_in_zhang_runs_out_mission_desc: "Мы поддерживаем Чжан Цзолиня и Фэнтяньскую клику уже несколько десятилетий, но он в лучшем случае ненадежный партнер. Его война за восстановление страны сопряжена с риском, и мы можем позволить себе только короткий поводок - многие в Квантуне опасаются, что его последняя авантюра может привести к потере контроля США над Маньчжурией. Тяньцзиньская армия обещает добиться окончательных результатов в кратчайшие сроки, но если они не смогут вовремя помочь Чжану в достижении ключевых целей (в первую очередь Пекина) или, что еще хуже, будут отброшены назад, Квантунская армия может попытаться оказать нам давление и втянуть нас непосредственно в конфликт."

 FNG_JAP_search_for_helpful_collaborators: "Найти хороших коллаборантов"
 FNG_JAP_search_for_helpful_collaborators_desc: "Поскольку вера в способность чрезмерно амбициозного \"великого маршала\" Чжан Цзолиня выиграть войну за восстановление страны ослабевает, подразделения наших вооруженных сил, дислоцированные в Китае, начали искать альтернативы. Во всех основных кликах Фэнтяня есть прояпонские элементы, начиная от нетерпеливых паназиатцев и заканчивая прагматиками поневоле и пораженческими \"пацифистами\", которые стремятся к миру и стабильности, которые можем обеспечить только мы. Вербовка этих гражданских лиц через доверенных лиц, таких как ассоциация Конкордия в Маньчжурии, \"Новое народное общество\" в Тяньцзине и других агентов, поможет усилить нашу власть над правительством Фэнтяня."

 FNG_JAP_rein_in_the_extremists: "Обуздать экстремистов"
 FNG_JAP_rein_in_the_extremists_desc: "Контроль имперского правительства над своими людьми на местах в Китае всегда был ограничен как географической удаленностью, так и политической необходимостью правдоподобно все отрицать и растущей автономией - иногда граничащей с бунтарством - офицеров. В Токио растет опасение, что наши офицеры, возможно, замышляют что-то, выходящее далеко за рамки разрешенного - бесконечные десятилетия тщательно продуманной политики. Мы должны отстранить от дел злостных нарушителей, чтобы предотвратить кризис."

 FNG_JAP_deploy_emergency_economic_aid: "Развернуть оказание срочной экономической помощи"
 FNG_JAP_deploy_emergency_economic_aid_desc: "Хотя Маньчжурия когда-то была наиболее промышленно развитой частью Китая, экономический спад и решительные попытки Чжилийцев наверстать упущенное сократили разрыв. Правительство Фэнтяня изо всех сил старается поддерживать свои военные позиции, и поскольку наши интересы так тесно переплетены с их экономикой, мы должны предоставить экстренную финансовую помощь для поддержки их военных усилий. Мы направим деньги, технических экспертов и оборудование через Ассоциацию Конкордия, и, если повезет, они проживут достаточно долго, чтобы расплатиться с нами по своим долгам."

 FNG_JAP_send_emergency_arms_shipment: "Отправить срочную партию оружия"
 FNG_JAP_send_emergency_arms_shipment_desc: "Снабжение войск, способных вести крупную войну, таких как армия Фэнтяня, - непростая задача, и она быстро опережает возможности их военно-промышленной базы в этой области. Наши планировщики предложили отправить крупную партию винтовок, артиллерии и других припасов, чтобы удержать фэнтяньскую армию на поле боя (особенно подразделения, симпатизирующие нам) и, надеюсь, переломить ход войны в нашу пользу."

 FNG_JAP_reinforce_our_armies_in_china: "Отправить подкрепления в Китай"
 FNG_JAP_reinforce_our_armies_in_china_desc: "Реальность ситуации такова, что Чжан Цзолинь, несмотря на все его притворство, всего лишь пешка в наших играх. Армия Фэнтяня - это бледная копия нашей собственной, и она сражается на поле боя против своих соперников. Только поддержка наших \"советников\" удерживает их от разгрома, но мы получаем тревожные сообщения о том, что их нынешней численности недостаточно. Нам нужно направить в бой больше людей, что неизбежно затянет нас еще глубже в трясину. Но какой у нас есть выбор?"

 FNG_Annex_Shandong_Anqing_Puppet: "Взять под свой контроль Шаньдун"
 FNG_Annex_Shandong_Anqing_Puppet_desc: "По договоренности с Анциньской Кликой, теперь, когда мы находимся в состоянии войны с [QIE.GetNameDef], они передадут нам контроль над Шаньдунем."

 FNG_cut_aid_to_japan: "Сократить поставок продуктов питания в Японию"
 FNG_cut_aid_to_japan_desc: "Пока не закончится засуха в Японии и Корее, мы будем делать большие поставки продовольствия и помощи им... если, конечно, мы не передумаем.\n\n§RПРИМЕЧАНИЕ§!: Выбирайте это решение, только если вы хотите уменьшить поставки. В противном случае они будут поставляться нормально."

 FNG_anqing_infiltration: "Влияние на правительство Аньцина"
 FNG_anqing_infiltration_desc: "Имея агента, устанавливающего тайные контакты с правительством Аньцина, мы можем влиять на них и управлять их решениями, даже если они этого не замечают, обеспечивая гораздо больший прогресс, чем если бы мы делали все открыто."

 FNG_bribe_government_officials_phase: "Подкуп должностных лиц Аньцина"
 FNG_bribe_government_officials_phase_desc: "Чтобы установить контакты, мы должны подкупить ряд правительственных чиновников Аньцина. Это не должно быть трудным, поскольку правительства милитаристов заведомо коррумпированы даже при таком человеке, как Чэнь Тяоюань."
 FNG_bribe_government_officials_phase_outcome: "Мы успешно подкупили ряд правительственных чиновников Аньцина, получив влияние и рычаги давления на них."

 FNG_steer_government_decisions_phase: "Постановления правительства под руководством Аньцина"
 FNG_steer_government_decisions_phase_desc: "Если мы действительно хотим использовать контакты, которые мы установили, мы должны надавить на подкупленных чиновников, направляя политику правительства в нашу пользу."
 FNG_steer_government_decisions_phase_outcome: "Мы смогли повлиять на политику правительства Аньцина, используя наших подкупленных чиновников, постоянно увеличивая наше влияние."

 FNG_Restoring_Order: "Восстановление порядка в Маньчжурии"

 FNG_Coerce_the_Chambers_of_Commerce: "Торговая Палата"
 FNG_Coerce_the_Chambers_of_Commerce_desc: "Торговая палата, базирующаяся в Шэньяне, и ее многочисленные партнерские организации по всей Маньчжурии, лежат в основе торговли сырьевыми товарами на Северо-Востоке и имеют право коллективно диктовать условия всем, кроме самых влиятельных фигур. В связи с недавней сменой правительства они надеются на новое соглашение, более благоприятное для них самих."

 FNG_Crush_the_Old_Guard: "Сокрушить Старую Гвардию"
 FNG_Crush_the_Old_Guard_desc: "Некоторые из оставшихся в живых подчиненных Чжан Цзолиня, верные до конца, сплотились в Харбине, стратегически важное место в центре Трансманчжурской железнодорожной сети. Там они встанут, и там мы их уничтожим."

 FNG_Secure_the_Northern_Frontier: "Защитить Северную границу"
 FNG_Secure_the_Northern_Frontier_desc: "Северная провинция Хэйлунцзян известна своими продуваемыми ветрами горами и густыми сосновыми лесами, которые поистине являются одной из последних границ Китая. Мы должны сделать так, чтобы наш авторитет чувствовался даже здесь."

 FNG_Secure_the_Northern_CER: "Защитить КВЖД"
 FNG_Secure_the_Northern_CER_desc: "Русские построили северную часть Китайско-Восточной железной дороги, и она эксплуатировалась ими почти двадцать лет. Чжан Цзолинь ухватился за это, но, поскольку он теперь мертв, а наше правительство только что создано, нельзя допустить, чтобы оно снова попало в их руки."

### Modifiers ###

 FNG_mantetsu_monopoly: "§YЖелезнодорожная монополия Мантэцу§!\n"
 FNG_mantetsu_monopoly_desc: "§WЭтот§! §Yмодификатор§! §Wможет быть удален§! §Yрешением§!§W, или по§! §Yспециальным событием.§!\n\nМантэцу, Южно-Маньчжурская железнодорожная компания, обладает фактической монополией на стратегические перевозки в Маньчжурии. Ее основные магистрали, проходящие через территорию размером с Францию и Германию вместе взятые, в настоящее время являются единственным способом разумного перемещения людей и военного имущества. Компания может быть избирательной, когда речь идет о том, кто и когда использует железные дороги.\n"

 FNG_old_guard_resistance_modifier: "§RСопротивление Старой Гвардии§!\n"

 FNG_resistance_modifier: "§RНесоблюдение требований местных властей§!\n"

 FNG_merchants_resistance_modifier: "§RБойкот торговой палаты§!\n"

 FNG_logistical_mastery: "Логистическое мастерство"

 FNG_enshrined_regionalism: "Воплощение регионализма"
 FNG_enshrined_regionalism_desc: "В большинстве провинций Китая царит атмосфера федерализма, гарантируемая как президентом, так и местными провинциальными армиями, ассамблеями и различными другими влиятельными лицами, заинтересованными в том, чтобы оставаться в стороне от Центрального правительства. Естественно, что такие усилия наиболее активны в Южных провинциях, где федералистскому движению было легче всего закрепиться. Хотя мало кто верит, что такой порядок может сохраняться вечно, многие влиятельные фигуры Юга, по крайней мере, какое-то время будут продолжать извлекать выгоду."

 FNG_constructing_the_chinese_zaibatsu_modifier: "Создание китайских дзайбацу"
 FNG_constructing_the_chinese_zaibatsu_modifier_desc: "Чтобы способствовать подлинному возрождению и процветанию китайской экономики, Министерство финансов решило объявить районы страны зонами \"свободного предпринимательства\", с конечной целью обеспечить массовую индустриализацию ключевых городских центров под руководством лучших и талантливых бизнесменов Китая. Предвидя капиталистическое экономическое развитие как путь вперед, мы надеемся, что блага и выгода, которые получают сами капиталисты, будут реинвестированы в укрепление нации."

