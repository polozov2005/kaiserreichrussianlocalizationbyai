 FNG_chinese_tanks: "Местная программа бронетанковой войны"

 FNG_beiyang_popular_support_intro: "Популярный образ военачальника - это образ деспотичного тирана: жестокий, необразованный автократ, который мало заботится о человеческой жизни, неуемно жаден и окружен декадентским двором, состоящим из порока и подхалимов. В реальности гораздо больше нюансов. Многие военачальники были хорошо образованы и были в курсе международных политических тенденций, и хотя большинство из них отличались жестокостью, в Китае это не было чем-то необычным. Более того, хотя большинство из них были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономической элиты, общественных деятелей и интеллектуалов."

 FNG_popular_support_twin_dragons_taming_the_water: "Дух федералистов: §cДва дракона, укрощающие воду§!"
 FNG_popular_support_twin_dragons_taming_the_water_desc: "Современное китайское федералистское движение пережило взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов объединилась на фоне продолжающегося тупика между Севером и Югом в разгар эпохи военачальников. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику, получили определенный отклик, но после многообещающего начала были отвергнуты как северными, так и южными правительствами, а дальнейшая дискредитация произошла после успешного объединения Чжили силой. В том, что кажется почти жестокой шуткой, похоже, что последняя попытка преодолеть раскол между Севером и Югом оказалась наиболее плодотворной; наконец, спустя десятилетия, страна объединена на относительно дружелюбных условиях. Хотя ситуация далека от подлинной. После того, как Чжан Цзюньмай был вынужден занять компромиссную должность премьер-министра при президенте, который предпочитает наслаждаться гедонистическими удовольствиями, а не заниматься управлением государством, правительство оказалось удивительно неэффективным даже в самых элементарных аспектах управления. На первый взгляд, правительство кажется единым, но достаточно одного взгляда, чтобы увидеть все трещины, проявляющиеся в наспех созданных структурах республики."

 FNG_popular_support_the_finely_oiled_machine: "Политическая легитимность: §cИдеально отлаженный механизм§!"
 FNG_popular_support_the_finely_oiled_machine_desc: "$FNG_beiyang_popular_support_intro$\n\nУправляя страной подобно предпринимателю, различные маэстро, мастера и чиновники под руководством отстраненного президента Сюэляна вновь обрели смелость вести государственную политику так, как считают нужным. Наделенные активами, влиянием, знаниями и опытом, «Клика коммуникаций» поднялась далеко за пределы своего некогда низкого положения, достигнув национального превосходства. Каждый, кто чего-то стоит или хочет добиться, должен способствовать работе политической машины Клики Коммуникации, и взамен получит щедрое вознаграждение за свои усилия. Политика и вмешательство политиков могут отойти на второй план, поскольку экономическое управление и реконструкция являются необходимым противоядием от бед Китая."

 FNG_popular_support_in_the_eye_of_the_beiyang_tiger: "Политическая легитимность: §gВзгляд Бэйянского Тигра§!"
 FNG_popular_support_in_the_eye_of_the_beiyang_tiger_desc: "$FNG_beiyang_popular_support_intro$\n\nЧудесным образом, похоже, уроки, усвоенные Дуань Цижуем и его Аньхойской кликой, не исчезли вместе с потерей ими статуса; их методы были изучены, исследованы и укреплены, превратившись в совершенно новый метод господства. Когда-то представлявшая собой разношерстную группу изгнанных политиков и неудачников, Лига Возрождения сумела укрепить свои ряды, привлекая неоспоримых экспертов под видом Пяти Рас, и благодаря усилиям таких людей, как Пань Фу, Гу Вэйцзюнь и Ван Итан, желание Старого Маршала, похоже, исполнилось: государство, полностью подчиненное ему и его семье, укомплектованное мудрыми учеными, подобными тем, что были в былые времена."

 FNG_popular_support_stewardship_of_providence: "Политическая легитимность: §nУправление Провидением§!"
 FNG_popular_support_stewardship_of_providence_desc: "$FNG_beiyang_popular_support_intro$\n\nМало кто поверил бы в то, что карьеризм и меритократия являются физическими барьерами на пути к продвижению по службе, но ведь эти люди не были бы влиты в клике Фэнтяня. Ян Ютин и его клика Шикан, давний враг молодого маршала и его последователей, сумели преодолеть семейные неурядицы Фэнтяня и свергнуть многолетнее господство семьи Чжан. В наполеоновской манере поведения, опираясь на уроки, извлеченные из японского опыта, и сотрудничая с кликой Коммуникаций и молодой китайской партией, президент Ян восстановил современность, прогресс и жизнеспособность в приходящей в упадок Поднебесной."

 FNG_popular_support_a_chinese_shogun: "Политическая легитимность: §PКитайский Сегун§!"
 FNG_popular_support_a_chinese_shogun_desc: "$FNG_beiyang_popular_support_intro$\n\nКак ни странно, похоже, что подавляющее большинство противников \"равноправного\" паназиатского партнерства между Китаем и Японией было развеяно с приходом к власти президента Ян Юйтина. Освободившись от многолетнего господства клана Чжан, президент Ян обратился не к своей собственной клике Шикан, хотя её роль по-прежнему первостепенна, а к разношерстной Ассоциации Конкордия. Проповедуя подлинные принципы паназиатского сотрудничества и стремление к лучшему будущему для Азии, так называемый \"китайский сёгун\" сохраняет прагматичный курс на сотрудничество с Токио; ведь неизбежно, что со временем Китай вернет себе доминирующее положение в Азии."

 FNG_popular_support_the_marionette_regime: "Политическая легитимность: §nМарионеточный режим§!"
 FNG_popular_support_the_marionette_regime_desc: "$FNG_beiyang_popular_support_intro$\n\nОкончательно расколотая Поднебесная наконец-то оказалась под каблуком у страны Восходящего солнца. Учитывая обстоятельства, стоящие за провозглашением Реформированного правительства, Квантунская армия расширила свои операции за пределы Маньчжурии и совместно с японскими войсками в Тяньцзине, Шанхае и других местах взяла на себя руководство формированием нового китайского "национального" правительства. Обретя податливую пешку в лице Чжана Цзинхуэя, бывшего Фэнтяня и бывшего чжилийца, человека тусклого и мрачного, марионеточный режим на самом деле управляется теми, кто окружает президентский двор; японцы, клика хранителей Информации и всевозможные другие оппортунисты."

 FNG_popular_support_beiyangs_compradors: "Политическая легитимность: §gБэйянские компрадоры§!"
 FNG_popular_support_beiyangs_compradors_desc: "$FNG_beiyang_popular_support_intro$\n\nПроявив умение выживать в политических условиях в самых неожиданных обстоятельствах, президент Ван Итан и различные члены Лиги Возрождения, некогда простые придворные маршала Чжана, сумели объединить силы Пяти Рас под одним Союзом в новую Бэйянскую Республику, многообещающе находящуюся под японским надзором. Не подчиняясь прихотям автократов или вышестоящих лиц, за исключением Токио, Ван получил все полномочия, предоставленные его должностью, для реализации желаемой социальной политики, напоминающей времена расцвета клуба \"Аньфу\". Как бы то ни было, политика Вана в первую очередь служит интересам японцев, а во вторую — его народа, даже если он сам этого не желает."

 FNG_popular_support_governance_of_monopolies: "Политическая легитимность: §cПравительство монополистов§!"
 FNG_popular_support_governance_of_monopolies_desc: "$FNG_beiyang_popular_support_intro$\n\nПосле того, как после ноябрьских беспорядков Новая коммуникационная клика была признана политически бесполезной, ее пребывание в тени привело к кратковременному возрождению ее старых соперников из Старой коммуникационной клики - Ляна Шии и Чжоу Цзыци. Однако в конечном счете, благодаря опоре фэнтяньской клики на Японию и возрождению прояпонской политики, такие люди, которых когда-то считали предателями, как Чжан Цзунсян, Лу Цзунъюй и Цао Жулинь, смогли вернуть себе былую значимость. Более того, восходящая к власти при японском правительстве стремится завершить свою миссию 1910-х годов: индустриализировать и модернизировать страну и получать при этом прибыль."

 FNG_waging_the_war_of_minds_and_bodies: "Ведение войны за тело и разум"
 FNG_waging_the_war_of_minds_and_bodies_desc: "Реформированное правительство Китая является маяком закона и порядка, резко контрастирующим с хаосом, охватившим Китай со времен войны за национальную защиту. Однако правительство должно продолжать укреплять контроль над внутренними районами страны, поскольку повстанцы продолжают протестовать против нового порядка в Азии. В конечном итоге люди потеряют уважение к нашему правительству, если эти мятежники продолжат оскорблять администрацию. Реформированное правительство должно искоренить этих паразитов и принять соответствующие меры."

 FNG_war_of_national_pacification: "Война за Национальное Умиротворение"
 FNG_war_of_national_pacification_desc: "Хотя Япония и Китай по-прежнему остаются двумя столпами азиатского превосходства, Дракон не может и дальше питаться исключительно от рук Восходящего Солнца. Новый Китай должен организовать армию, достаточно сильную, чтобы самостоятельно укрепить позиции страны против всех подстрекателей, стремящихся погрузить нашу нацию в самые темные времена. Хэпин Цзяньгоцзюнь стоит твердо, Хэпин Цзяньгоцзюнь стоит непоколебимо. Чжунхуа Минго ваньсуй!"

 FNG_preparing_the_students: "Подготовка студентов"
 FNG_preparing_the_students_desc: "Возможно, страна и разобщена, но на горизонте маячит еще большая угроза. Наш бывший «союзник», Японская империя, смотрит на правительство Фэнтяня лишь как на пешек в более масштабной игре. И поэтому в любой надвигающейся войне за национальное спасение студенческое сообщество, бездействующее, должно быть готово. Ибо, хотя их нельзя принуждать к войне, война все равно может прийти к их порогу. Благодаря военизированной подготовке, прививанию национальных принципов и непоколебимой вере в Китай, каждый дееспособный человек восстанет, чтобы защитить нацию."

 FNG_reviving_chinese_financial_stability: "Восстановление финансовой стабильности Китая"
 FNG_reviving_chinese_financial_stability_desc: "Достаточно сказать, что финансовая ситуация в Китае далека от идеальной. Поскольку большая часть банковских активов сосредоточена в прибрежных городах, таких как Тяньцзинь, Гонконг или Шанхай, финансовая стабильность страны во многом зависит от нее самой. Аналогичным образом, десятилетия военных действий и отсутствие настоящего, сильного и жизнеспособного Центрального правительства привели как к недоверию к китайским кредитам, так и к чрезмерному притоку местной валюты и даже к накоплению активов во времена великой борьбы. Это потребует колоссальных усилий, но правительство может, по крайней мере, работать над восстановлением торговли Китая."

 FNG_pacification_by_chinese_might: "Умиротворение с помощью китайской мощи"
 FNG_pacification_by_chinese_might_desc: "Как и во времена династии Цзинь, президент Юань Шикай не смог поддерживать порядок в Поднебесной, и государство вновь погрузилось в хаос, поскольку возникли два правительства, каждое из которых претендовало на представительство всего Китая. Правительство маршала [ROOT.GetLeader], наследики Бэйянской армии, самой праведной и модернизирующей силы во всем Китае.\n\nТем временем, подлое правительство Гуанчжоу заявляет о преемственности от мерзкого Сунь Ятсена, который в своем безумии принес бич марксизма в сердце нашей священной нации. Против либералов, которые по глупости называют себя гуманными и социалистическими бандитами, грабящими как богатых, так и бедных, правительство Аньгоцзюня движется вперед, чтобы восстановить не только порядок, но и духовное возрождение нации, страдающей от болезни империализма."

 FNG_maximising_production_line_efficiency_idea: "Повышение эффективности производства"
 FNG_maximising_production_line_efficiency_idea_desc: "На Западе развитое производство привело к сдвигу границ и падению империй. Хотя Фэнтянь может похвастаться крупнейшей промышленной базой во всем Китае, такая промышленная мощь бесполезна, если ее не использовать в полной мере. Японская империя на Востоке и Русский медведь на Севере обладают гораздо более совершенными производственными методами, чем наши собственные, и если Китай хочет освободиться сам, то правительство Ангуджуна должно ввести столь необходимые производственные правила и организацию, чтобы производить достаточно военной техники, чтобы гарантировать, что Ангуджун останется лучшим поставщиком сила в нации."

 FNG_intolerable_political_realities: "Невыносимые политические реалии"
 FNG_intolerable_political_realities_desc: "Хотя правительство Фэнтяня вновь выступает в качестве истинного центрального правительства, базирующегося в Пекине, правительство традиций и порядка, похоже, по-прежнему ускользает от китайского народа. Ангуоцзюнь продолжает поддерживать эти высокие идеалы, но временное правительство, которое ранее управляло только в Шэньяне, в настоящее время не подходит для эффективного управления провинциями к югу от Великой Китайской стены. Управление едва распространяется за пределы городских стен, и многие административные должности остаются вакантными, поскольку [ROOT.GetLeader] и его администрация изо всех сил пытается заполнить все эти должности."

 FNG_endemic_economic_malaise: "Повсеместный экономический спад"
 FNG_endemic_economic_malaise_desc: "В 1926 году Чжан Цзуолинь обнаружил, что фэнтяньский доллар с трудом удерживает свою стоимость, и надеялся получить иностранные займы для поддержания ослабевающей экономики. Северная экспедиция лишь усугубила и без того хрупкую экономику, и фэнтяньский доллар рухнул после того, как клика Чжили У оттеснила Чжана обратно за Великую Китайскую стену. Состояние экономики Северо-Востока было настолько плачевным, что русские оппортунисты попытались посягнуть на китайские земли, что было остановлено только капитуляцией перед японцами. Хотя японская помощь в значительной степени стабилизировала финансы Аньгоцзюня, похоже, что Война за национальные ресурсы вновь поставила экономику Фэнтяня на грань краха. Многие иностранные предприятия отказываются работать на наших землях, пока в городских центрах процветают бандитизм и насилие, а многие китайские предприятия, работавшие по указу Чжили, теперь оказались вытеснены в Новый Китай. Маршал [ROOT.GetLeader] должен решить экономические проблемы, иначе рискует потерять поддержку народа."

 FNG_crippling_army_rivalries: "Разрушительное соперничество в армии"
 FNG_crippling_army_rivalries_desc: "Хотя клика Фэнтяня остается одной из наиболее сплоченных военных клик, действующих в Китае, она также была склонна к расколу. В то время как маршал Чжан Цзолинь и его названые братья изначально составляли ядро армии, в последующие годы армия Фэнтянь создала свой собственный набор группировок Молодой гвардии. Старший сын Чжана, Чжан Сюэлян, после окончания военной академии Фэнтянь создал свой собственный внутренний круг в вооруженных силах Фэнтянf, который стал известен как клика Шаошуай. Когда Чжан пригласил Ян Ютина и других сержантов, прошедших японскую подготовку, в вооруженные силы Фэнтяня, эти офицеры образовали клику Шикан, которая призывала к военным реформам, вдохновленным Японией.Третья прогрессивная группировка "Молодая гвардия" была основана фэнтяньским офицером Го Сонглином, который крайне презирал Яна и его клику Шикан. В конечном счете, Го возглавил восстание после 2-й Чжили-фэнтянской войны, которая привела к его смерти и уничтожению его отряда, но шрамы от антифэнтянского восстания продолжают ощущаться в армии Ангоцзюна. Чжан Сюэлян так и не простил Яну казнь своего старого друга и наставника, и эта вторая победа Фэнтяня вновь привела к росту амбиций и обострению напряженности."

 FNG_an_army_of_traitors: "Армия предателей"
 FNG_an_army_of_traitors_desc: "Какой долг или честь можно извлечь из учреждения, используемого против собственных соотечественников? Этот вопрос долгое время занимает умы многих рядовых солдат Хэпиньского гарнизона. Деньги, конечно, являются стимулом, но они не могут очистить душу. Те немногие талантливые военные, которые выбрали сотрудничество, остаются немногочисленными и разрозненными, в то время как сама армия невероятно сильно зависит от японского оружия и техники для поддержки даже самых элементарных гарнизонных операций."

 FNG_hollowed_out_economy: "Опустошенная экономика"
 FNG_hollowed_out_economy_desc: "Оккупационная власть преобразовалась в новое государство, и мало кто возлагал бы большие надежды на экономическое положение реформированного правительства после обретения \"независимости\", и все же ситуация намного хуже, чем любой предыдущий экономический спад, который когда-либо переживал Китай. Нация подверглась жестокому обращению со стороны своих новых надсмотрщиков, целые города были превращены в руины, фабрики и населенные пункты разрушены. Более того, единственные области, в которых возможна экономическая продуктивность, остаются в руках японцев или их компрадоров, и они, похоже, вряд ли готовы отказаться от своей добычи."

 FNG_collaboration_the_great_evil: "Сотрудничество: Великое зло"
 FNG_collaboration_the_great_evil_desc: "Ханьцзянь. Этот термин они используют для описания тех, кто находится в нынешнем правительстве. Предатели не только своей страны, но и всего китайского народа. Но сотрудничество - это сложная конструкция, и все люди, собравшиеся под стенами новой китайской администрации, по разным причинам попали в объятия Токио. Среди них: искренняя симпатия, материальные условия, несогласие с предыдущими структурами власти и так далее. Однако не все коллаборационисты равны, особенно те, кто не желает этого или принужден каким-либо иным образом. Тем не менее, грех, который они совершили, велик, и нация не скоро забудет его."

 FNG_the_new_oligarchy: "Новая олигархия"
 FNG_the_new_oligarchy_desc: "В имперскую эпоху обществом руководили процветающий дворянский класс и образованные ученые. Такие люди будут и в Новом Китае занимать высокое положение, но реалии нашей страны требуют новой элиты, которая возглавит движение вперед. На Западе экономическую модернизацию осуществили плутократический класс и предприимчивые бизнесмены, и китайский народ должен учиться на их успехах, избегая при этом их ошибок. Вчерашний Китай — это Великая империя прошлого, сегодняшний Китай — это спящий тигр, а завтрашний Китай — это возрожденный дракон."

 FNG_achieving_national_statism: "Обретение национального государства"
 FNG_achieving_national_statism_desc: "Цзэн Ци и его друзья многому научились из своих ссор со старыми друзьями-марксистами. Хотя они и пребывали в заблуждении относительно международного социализма, Цзэн понимал, что социализм лучше всего применять только на благо родной страны. Выдвинув такую идеологию, как национальный этатизм, она стала опорой партии младокитайцев. Китай возродится не в результате смерти Старого Китая, а в результате торжества как Старого, так и Нового Китая, чтобы по-настоящему воплотить мечту 1911 года и создать националистический, корпоративистский и конфуцианский Китай."

 FNG_true_equality_of_the_five_races: "Настоящее равенство для пяти рас"
 FNG_true_equality_of_the_five_races_desc: "В отличие от южных повстанцев, которые сражались за ханьский Китай, Новый Китай, построенный на опыте Северо-Востока, сражается за все расы под своим флагом. Ассоциация \"Конкордия\" была основана с целью установления этнической гармонии по всему Дунбэю, и теперь эти мечты воплотятся в жизнь не только в Хэйлунцзяне, но и в отдаленных уголках страны, от Куньмина до Хулунбуира, от Кашгара до Харбина! Вместе равноправные народы построят более справедливый Китай, который откроет новую эру мира и процветания."

 FNG_financing_reformed_reconstruction: "Финансирование реформированной реконструкции"
 FNG_financing_reformed_reconstruction_desc: "Искусные дипломаты и эксперты в управлении бизнесом, представители «Новой коммуникационной клики», сумели обеспечить себе выгодные кредиты, выгодные торговые сделки и заручиться поддержкой других промышленных и торговых групп в Китае для финансирования своих грандиозных планов по восстановлению национальной экономики. Хотя наблюдатели могут осуждать создание монополий и крупных конгломератов предприятий, необходимые усилия государства для национального возрождения не могут быть осуществлены лишь за счет мелкого капитала."
