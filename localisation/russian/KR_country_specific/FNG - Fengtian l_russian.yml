 #張作霖
 FNG_zhang_zuolin: "Чжан Цзолинь"
 FNG_zhang_zuolin_bio: "Чжан Цзолинь родился в обедневшей семье недалеко от Шэньяна и начал свой стремительный взлет как бандит, используя хаотичную военную ситуацию конца эпохи Гуансюй. После Синьхайской революции Чжан смог установить контроль над своей родной провинцией Фэнтянь. Многочисленные союзы Чжана, состоявшие из местных бэйянских офицеров и старых друзей-бандитов, составили ядро Фэнтяньской клики, которая стала одним из основных осколков Бэйянской клики.\n\nЧжан первоначально заключил союз с Дуань Цируем, чтобы использовать его японские связи для получения огнестрельного оружия, но затем обратился против Аньхойской клики вместе с Чжилийской кликой. Впоследствии эти две группировки военачальников стали заклятыми врагами, и такое положение дел сохраняется до сих пор. Некоторое время Чжан был единственным контролером Пекина, но в 1927 году клика Чжили восстановила свой контроль над городом.\n\nПосле реставрации Цин Чжан добился независимости Северо-Востока от власти Пекина и бросил вызов их прямым полномочиям управлять Китаем, заявив о себе как о мантии Синьхайской революции и законном наследнике правительства Бэйяна. Истинная приверженность Чжана демократическому республиканству в лучшем случае сомнительна, но если старый маршал сможет использовать республиканскую риторику для восстановления своего статуса международно признанного правительства, то так тому и быть."
 FNG_zhang_zuolin_leader_desc: "§YОписание лидера\nРодился:§! 19 марта 1875, Хайчэн, Шэнцин, Империя Цин\n§YПолитическая карьера:§! $FNG_zhang_zuolin_bio$§!"
 FNG_zhang_zuolin_army_chief_desc: "§YBorn:§! §LMarch 19th, 1875, in Haicheng County, Shengjing District, Great Qing§!\n§YAlignment:§! §PZhang§!\n§YBackground:§! §L$FNG_zhang_zuolin_bio$§!\n\n§YNotes: Despite his poor literacy and lack of a formal education, the Old Marshal is a capable and self-aware leader with a knack for delegating. His pragmatic nature has many describing him as ideologically 'Pro-Zhang'.§!"

 #張學良
 FNG_zhang_xueliang: "Чжан Сюэлян"
 FNG_zhang_xueliang_desc_body: "Zhang Xueliang was born into the opposite conditions when compared to his father, the Old Marshal. While Zhang Zuolin was born into poverty and had no formal education, he ensured that his son would be born into a life of privilege and had access to private tutors. Zhang Xueliang would grow up much more open to Western ideas than his conservative father who was disliked by China's intellectual class. Seeking to follow in his father's footsteps, Zhang enrolled in the Fengtian Lecture Hall.\n\nAfter graduating from the artillery department, Zhang Zuolin promoted his son to brigade commander of the guards brigade of the Northeast. When the Fengtian Clique was defeated by the Zhili Clique in the 1st Zhifeng War, Zhang Xueliang was tasked by his father to negotiate a peace. In order to avenge his defeat, Zhang Zuolin began a great modernisation effort in his armies, and Zhang Xueliang was made supervisor of the Northeast Aviation Office, tasked with delivering his father a modern air force which he achieved via the purchase of foreign planes.\n\nThe efforts of the 'Young Marshal' paid off in the 2nd Zhifeng War, which saw the Fengtian Clique secure control of Beijing and dominate Chinese politics."
 FNG_zhang_xueliang_leader_desc: "§YОписание лидера\nРодился:§! 3 июня 1901, Тайянь, Шэнцин, Империя Цин\n§YПолитическая карьера:§! Чжан Сюэлян родился в противоположных условиях по сравнению со своим отцом, старым маршалом. В то время как Чжан Цзолинь родился в бедности и не имел формального образования, он позаботился о том, чтобы его сын родился в привилегированной жизни и имел доступ к частным репетиторам. Чжан Сюэлян вырос гораздо более открытым для западных идей, чем его консервативный отец, которого недолюбливали представители интеллектуального класса Китая. Стремясь пойти по стопам отца, Чжан поступил в Фэнтяньский лекторий.\n\nПосле окончания артиллерийского факультета Чжан Цзолинь повысил своего сына до командира бригады гвардейцев Северо-Востока. Когда клика Фэнтянь потерпела поражение от клики Чжили в 1-й Чжифэньской войне, Чжан Сюэлян получил от отца задание провести мирные переговоры. Чтобы отомстить за поражение, Чжан Цзолинь начал модернизацию своих армий, а Чжан Сюэлян стал начальником Северо-Восточного авиационного управления, которому было поручено обеспечить отца современными военно-воздушными силами, чего он добился путем закупки иностранных самолетов.\n\nУсилия "молодого маршала" окупились во время 2-й Чжифэньской войны, в ходе которой клика Фэнтянь установила контроль над Пекином и стала доминировать в китайской политике. Хотя Чжаны потеряли Пекин год спустя, клика Фэнтянь снова захватила Пекин и теперь является законным правительством Китая. Молодой маршал полон амбиций, и только время покажет, справится ли он с задачей возглавить нацию."
 FNG_zhang_xueliang_army_chief_desc: "§YBorn:§! §LJune 3rd, 1901, in Bajiaotai, Shengjing District, Great Qing§!\n§YAlignment:§! §aShaoshuai Clique§!\n§YBackground:§! §L$FNG_zhang_xueliang_desc_body$ Unfortunately for the Zhangs, the Zhili Clique restored their control of Beijing just a few years later. Zhang Xueliang has since been helping his father with further modernisations so that one day, father and son can once again rule the Middle Kingdom.§!\n\n§YNotes: He has been known to frequent the Legation Cities to smoke, gamble, and carousing with women, to his father's dismay. Despite this, Zhang shows a genuine interest in politics, being notably more anti-Japanese than his father.§!"

 #馮庸
 FNG_feng_yong: "Фэн Юн"
 FNG_feng_yong_desc_body: "Лучший друг Чжан Сюэляна, они были близки с детства, Фэн Юн - старший сын Фэн Делиня, который был одним из старых ветеранов клана Фэнтянь и союзником Чжан Цзолиня. Носивший то же имя, что и Сюэлян, и выросший вместе, Фэн сопровождал Сюэляна в лекционный зал Северо-Восточной армии, а также в офицерскую школу армии Баодина. Служа штабным офицером в авиационном департаменте Фэнтянь, он сыграл ключевую роль в создании Северо-восточных военно-воздушных сил.После Первой Чжили-Фэнтянской войны в 1922 году Фэн почувствовал отвращение к концепции войны, уволился из армии и стал генеральным директором металлургического завода Дайе, занимаясь производством вооружения, и по совместительству директором инженерной школы завода Дайе. В 1926 году он пожертвовал 3,1 миллиона юаней на создание университета Фэн Юн, став его директором — первого университета западного образца на северо-востоке. Благодаря бесплатному обучению и тому, что он придавал большое значение военному и физическому воспитанию, его идеи оказали значительное влияние на студентов Северо-Востока.После начала Четвертой и Пятой войн Чжифэна Фэн вышел из отставки по приказу Сюэляна, но не для того, чтобы сражаться с Чжили. Организовав свои собственные силы, Фэн вместо этого сосредоточился на пресечении японских операций в Маньчжурии, якобы с согласия Старого маршала."
 FNG_feng_yong_commander_desc: "§YРодился:§! §L23 октября 1901 года в Хайчэне, округ Шэнцзин, Великая Цин.§!\n§YПринадлежность:§! §nМладокитайцы§!\n§YБиография:§! §L$FNG_feng_yong_desc_body$§!\n\n§YПримечания: За время своего пребывания на посту ректора Фэн сблизился с партией младокитайцев, превратив свой университет в одну из самых активных площадок для расширения влияния этой партии. Хотя он и не полностью привержен деятельности Партии молодого Китая, он является её полноправным членом.§!"

 #唐紹儀
 FNG_tang_shaoyi: "Тан Шаои"
 FNG_tang_shaoyi_leader_desc: "§YОписание лидера\nРодился:§! 2 января 1862, Сианшань, Гуандун, Империя Цин\n§YПолитическая карьера:§! Что за унижение? Вынужденный уйти в отставку, чтобы танцевать на конце японских струн. Преданный государственный деятель, которого некоторые сочли бы героем, превратился в развалину, якобы "президент" от имени своих японских похитителей. Однако Тан Шаои имеет богатую историю как один из первых республиканских государственных деятелей Китая.\n\nБыв близким другом Юань Шикая в ранние годы, он поднялся в гражданской бюрократии империи Цин, следуя за Юанем, куда бы тот ни пошел. Получив в 1906 году повышение в Министерстве иностранных дел за умелое решение ситуации в Тибете, Тан ненадолго стал губернатором Фэнтяня, министром почт и связи, а затем принял участие в Синьхайской революции в качестве гражданского рупора Юань Шикая. Приняв участие в мирных переговорах между Севером и Югом, Тан Шаои стал первым премьер-министром Республики.\n\n Вскоре после этого он подал в отставку, ссылаясь на пренебрежение Юань Шикаем верховенства закона, осужденного им во время Войны за национальную защиту. Тан работал в одном из кабинетов Дуань Цируй, а затем отправился в Движение защиты конституции на юге, возглавляемое доктором Суном. С ростом авторитаризма Суня, который отражался и в Пекине, демократ и парламентарий в Танге увял и умер. Живя в уединении в 1927 году, он в конце концов возвращается в 1929 году, чтобы служить уездным магистратом, участвуя в античилийских кругах.\n\nВернувшись в Шанхай, японские оккупационные войска вытащили Тан Шаои из его дома и поставили его во главе своего режима. Считает ли он себя мучеником или добровольным коллаборационистом - вопрос, который продолжает обсуждаться.\n\n§YПримечания: Его зять - знаменитый В.К. Веллингтон Ку.§!"

