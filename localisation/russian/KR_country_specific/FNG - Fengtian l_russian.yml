### Scripted Loc ###
 FNG_the_moral_republic_zhang: "Нравственная Республика"
 FNG_the_moral_republic_yang: "Восстановить легитимность республиканизма"

 FNG_the_moral_republic_desc_zhang: "Китай как нация, похоже, полностью утратил себя; свой национальный характер, саму структуру, благодаря которой семьи объединяются и общество процветает. С 4 ноября наблюдается сильное отторжение достоинств конфуцианства, однако неоконфуцианство, в свою очередь, возродило всеобъемлющую национальную философию, и такие традиции необходимо уважать."
 FNG_the_moral_republic_desc_yang: "Представление о Китайской Республике за долгие десятилетия республиканского эксперимента затуманилось и стало непонятным. Не сумев по-настоящему осознать свою истинную цель, а порой даже ненадолго возвращаясь к автократическому деспотизму, Республика остро нуждается в подлинной легитимности; легитимности, не запятнанной неэффективным управлением и клептократией, и подпитываемой искренним стремлением к сильному и устойчивому национальному государству."

 FNG_rulership_as_a_family_business_zhang: "Страна как семейное дело"
 FNG_rulership_as_a_family_business_yang: "Царствование достойных"

 FNG_rulership_as_a_family_business_desc_zhang: "Неподходящий для роли президента — то ли из-за апатии, то ли из-за желания оставаться в центре военных дел, то ли из-за неуверенности, учитывая его репутацию в Китае, — старый маршал, наконец, счел нужным передать бразды правления молодому маршалу, разумеется, под чутким руководством отца. Молодые и открытые реформам, отец и сын республики с оптимизмом смотрят в светлое будущее Китая."
 FNG_rulership_as_a_family_business_desc_yang: "В отличие от подлой семьи Чжан, Ян Ютин, Чан Иньхуай, Юй Чжэнь и И Цзицяо понимают, что Китаем больше нельзя управлять на основе семейных уз; Цао Кунь доказал это в худшем свете, и Чжан Цзуолинь, вероятно, последует его примеру. Страной должны управлять самые квалифицированные специалисты, технократы и надежные управляющие, ибо страна должна выйти за рамки непотизма."

 FNG_denouncing_imperialist_vultures_zhang: "Осуждение империалистических стервятников"
 FNG_denouncing_imperialist_vultures_yang: "Рационализация класса и общества"

 FNG_denouncing_imperialist_vultures_desc_zhang: "Китай долгое время считался второсортной державой, площадкой для вмешательства и вражды великих держав; если это были не британцы, то русские или немцы. И даже сейчас, в эпоху, далёкую от расцвета колониализма, великие державы продолжают сохранять контроль над ключевыми уступками по всей стране; как можно допустить такую ​​катастрофу в эту новую эпоху?"
 FNG_denouncing_imperialist_vultures_desc_yang: "Хотя в любой ситуации, кроме правления Ян Юйтина, они могли бы быть врагами, партия «Молодой Китай» и Ассоциация «Конкордия» чудесным образом нашли общий язык. Стремясь к созданию нового государства, управляемого корпоратизмом и представляющего собой всеобъемлющее национальное целое, они укрепили правительство Юйтина в форме, в которой все слои населения Китая и все категории граждан будут работать на благо национального прогресса."
