 FNG_mukden_tiger: "Тигр Севера" 
 FNG_mukden_tiger_desc: "§LУроженец провинции Фэнтянь, Чжан Цзолинь прошел путь от самых трущоб Шэньяна до должности великого маршала Ангоцзюня. Обладатель множества имен и способный стратег, Цзолинь, несомненно, свиреп, как тигр.§!"
