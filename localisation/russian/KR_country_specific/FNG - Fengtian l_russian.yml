### New Fengtian Events ###
 fengtian_events.1.t: "Слухи вызывают возмущение регионалистов"
 fengtian_events.1.d: "Хотя никаких планов не было обнародовано, уже начали распространяться слухи о том, что армия Фэнтянь готовится выступить на юг и захватить Пекин в течение следующего месяца. Разрозненные новости, поступающие с юга, вызвали мощную смесь волнения и беспокойства, и в чайных, барах и других общественных местах уже вспыхнули столкновения между ярыми националистами и членами регионалистской "Партии Дунбэй". \n\n"Партия Дунбэй" не является политической партией в прямом смысле слова, и более того, это прозвище, которое недоброжелатели используют для выражения любых сомнений в отношении миссии Чжан Цзолиня по воссоединению страны. Значительное количество местных чиновников и бюрократов, включая школьных учителей, разделяют такой скептицизм и начали организовывать протесты, критикуя то, что они считают дорогостоящей и ненужной войной. \n\nЕстественно, правительство не станет опровергать слухи, так как это может высвободить руки Пекина для вмешательства в кризис Лиги."
 fengtian_events.1.a: "Слухи могут быть опасными..."

 fengtian_events.3.t: "Регионалисты принимают меры"
 fengtian_events.3.d1: "С криками 'Donbgei weile Dongbeiren' или 'Северо-Восток для людей с Северо-Востока' протестующие собрались возле дворца Верховного маршала, на Софийской площади в Харбине и у Медицинского колледжа Цзилиня, требуя прекратить приготовления к войне. Их количество недостаточно велико, чтобы создавать серьезные проблемы, и полиция уже направлена для поддержания порядка, но это только часть продолжающейся кампании, которая угрожает подорвать доверие общества к режиму. Если весь Северо-Восток не может быть объединен мечтой Верховного Маршала о воссоединении всего Китая, то как же она может быть реализована?"
 fengtian_events.3.d2: "Протестующие снова собрались в нескольких заметных местах в городах Северо-Востока. Их было недостаточно, чтобы создать серьезные проблемы, но это не помешало полиции жестко расправиться с толпами, ворваться в массы с дубинками и прикладами автоматов и разогнать бегущих протестующих по многолюдным переулкам. Возмущенные насилием, некоторые члены партии Дунбэй уже пообещали вернуться в еще большем количестве, но есть надежда, что этот быстрый и решительный ответ отпугнет всех, кроме сторонников жесткой линии движения, что облегчит на них облаву.\n\nБольше беспокойства вызывают разговоры членов местных торговых ассоциаций, торговых палат и городских собраний о налоговом бойкоте. В отличие от некоторых молодых студентов, эти пожилые люди помнят тяжелые времена в конце прошлого десятилетия, когда военные расходы переросли экономику северо-востока и привели ее к экономическому спаду."
 fengtian_events.3.d3: "Несмотря на усилия полиции, протесты регионалистов время от времени продолжались на Северо-Востоке и получили дополнительный вес благодаря поддержке местных торговых палат, валютных бирж и других деловых организаций, обеспокоенных экономическими издержками войны на юге. Хотя в настоящее время это выглядит позерством, неизвестно, подорвут ли эти группы военные усилия, когда наступит решающий момент, и хотя общественные протесты еще не переросли в насилие, это может быть лишь вопросом времени. Чем раньше эта проблема будет решена, тем лучше."
 fengtian_events.3.d4: "Новости о продолжающихся конфликтах на юге придали регионалистскому движению новый импульс. Попыткам подавления постоянно препятствовало нежелание некоторых сочувствующих бюрократов, начальников полиции и других должностных лиц полностью выполнять свои обязанности. Несомненно, потребуется приложить все усилия, чтобы искоренить эти неприятные элементы и навести порядок. По мере того как общественное недовольство продолжается, легитимность и сила нашего правительства постепенно истощаются."
 fengtian_events.3.a: "Не повезло..."

 fengtian_events.4.t: "Агенты-провокаторы в действии"
 fengtian_events.4.d: "Как и планировалось, наши хорошо подготовленные агенты успешно подтолкнули некоторых участников регионалистского движения к насилию. Все более ожесточенные протесты уже нанесли ущерб общественной собственности, и реакция была негативной. Это только вопрос времени, когда мы получим необходимое оправдание."
 fengtian_events.4.a: "Превосходно"

 fengtian_events.5.t: "Харбинские беспорядки"
 fengtian_events.5.d: "Прошлой ночью протест быстро перерос в тотальный беспорядок, когда протестующие столкнулись с полицией в центре Харбина. Было зарегистрировано пятнадцать смертей, при этом неизвестное количество раненых с обеих сторон, возможно, исчисляется несколькими сотнями. Особую озабоченность вызывает центральный вокзал Харбина, на котором были разбиты окна и горела крыша. Повреждение станции и нескольких единиц подвижного состава задержало движение по соединительным железнодорожным линиям, и бюрократы в Мантэцу уже заявили о своем возмущении. \n\nПрекращение этого беспорядка может занять некоторое время, но, по крайней мере, теперь у нас есть четкое оправдание действий против регионалистского движения."
 fengtian_events.5.a: "Хорошо... но плохо."

 fengtian_events.6.t: "Начинаются массовые аресты"
 fengtian_events.6.d: "Имея соответствующее оправдание, наши послушные полицейские при поддержке местной милиции и армии Фэнтянь начали облавы на подозреваемых в протестах. Большинство в конечном итоге будет отправлено домой, но не обязательно все. Надеюсь, их заключение послужит сигналом для других протестующих и любых сочувствующих, что правительство больше не будет терпеть их подрывную деятельность."
 fengtian_events.6.a: "Скатертью дорожка"

 fengtian_events.7.t: "Предложение от Кемпейтай"
 fengtian_events.7.d: "Кемпейтай, внесудебная полиция японской армии, приняла к сведению нашу регионалистскую проблему и предложила частичное решение. Имея широкую сеть информаторов, они заявляют, что располагают информацией о ряде фигур, лежащих в основе регионалистского движения - информацию - которую они предоставили добровольно. В ответ мы должны предоставить разведданные о нескольких антияпонских агитаторах и повстанцах, которые до сих пор ускользали от них; не в последнюю очередь из-за нашего вмешательства. До сих пор нам было удобно поддерживать связь с этими националистами, ожидая рассмотрения дел, когда нам нужно дать отпор японскому влиянию."
 fengtian_events.7.a: "Принять сделку"
 fengtian_events.7.b: "Нет, спасибо"

 fengtian_events.8.t: "Регионалистское движение подавлено"
 fengtian_events.8.d: ""Партия Дунбэй" и регионалистское движение в целом наконец подавлены. Хотя это не конец регионалистским настроениям на Северо-Востоке, это может продлиться еще несколько десятилетий, но на данный момент это перестало быть предметом рассмотрения, поскольку мы обращаем наше внимание на юг."
 fengtian_events.8.a: "Отлично."

#The Fate of Mantetsu Schooling
 fengtian_events.9.t: "Устранение недостатка в образовании"
 fengtian_events.9.d: "Наше целенаправленное устранение школьных учителей регионалистской 'партии Дунбэй' и других представителей интеллигенции предсказуемо привело к образовательному хаосу и серьезным перерывам в исследованиях, но сотрудники японского консульства предложили возможное решение. Мантэцу уже давно поддерживает ряд частных школ, изначально предназначенных для сыновей и дочерей сотрудников, а также для японских иммигрантов, которые гордятся тем, что предоставляют образование, сопоставимое или даже превосходящее те, которые доступны на Родных островах. По нашей просьбе японское правительство может оказать давление на Мантэцу, чтобы он открыл их для публики и предоставил персонал для восполнения временной нехватки. \n\nКак только мы откроем дверь для такого рода деятельности, ее будет очень трудно закрыть, и эти школы почти наверняка будут использоваться для распространения японской культуры и норм. Мы должны внимательно подумать."
 fengtian_events.9.a: "Отклоните предложение."
 fengtian_events.9.b: "Примите предложение."

 fengtian_events.10.t: "Скандал в кимоно"
 fengtian_events.10.d: "Скандал! При очень неудачном повороте событий младшая дочь Великого Маршала была сфотографирована в японском кимоно во время фотосессии в управляемой Мантэцу 'Хокуту Кокурицудайгаку' или 'Северо-восточной национальной академии'. Несмотря на риск ареста, слухи о фотографии уже широко распространились вместе с несколькими копиями самого изображения, хотя местные и национальные информационные агентства решили печатать другие новости, чем печатать эту клевету. Некоторые агенты из военной разведки предполагают, что изображение было намеренно сделано и распространено японцами в качестве средства наказания правительства за недавние действия, но никаких подтверждающих доказательств не появилось. \n\nОднако нет никаких сомнений в том, что наши враги воспользуются этой возможностью для распространения своей гнусной пропаганды."
 fengtian_events.10.a: "Какая досада!"
 fengtian_events.10.b: "Закройте школы Мантэцу!"

 fengtian_events.11.t: "Студенты присоединяются к Молодежной лиге"
 fengtian_events.11.d: "В ходе неприятного и глубоко разрушающего инцидента группа китайских школьников из Чанчуня недавно объявила о своем намерении присоединиться к Молодежной лиге Фэнтянь, которая активно продвигает интересы Японии в нашей стране. Очевидно, их молодые умы легко впечатлительны, но их парад по улицам их родного города, размахивая японскими флагами, вызвал у многих отвращение и вызвал открытую вражду к правительству. Родители плачут, спрашивая, как их дети могут стать такими искалеченными, и требуют альтернативы этим опасным японским школам."
 fengtian_events.11.a: "Это безобразие!"
 fengtian_events.11.b: "Закройте школы!"

 fengtian_events.12.t: "Китайская форма для китайских студентов"
 fengtian_events.12.d: "После деморализующих последствий наших суровых, но необходимых репрессий против учителей 'партии Дунбэй' наше министерство образования выступило с новой национальной школьной формой. Хотя это может показаться небольшим изменением, униформа является символом китайской независимости и национальной идентичности, выходящей за пределы любого конкретного региона. Несомненно, наших студентов ждет новое светлое будущее в составе единого Китая!"
 fengtian_events.12.a: "Предмет гордости!"

#NTC Infrastructure and Railway Construction
 fengtian_events.13.t: "Строительство линии Цзилинь-Хайлун"
 fengtian_events.13.d: "После завершения реорганизации Северо-восточного транспортного комитета было предложено построить и в некоторых случаях, достроить несколько новых железных дорог. Первый крупный проект - это железная дорога Цзилинь-Хайлун, первоначально запланированная в 1927 году, но столкнулась с серьезными задержками из-за начала войны на юге и попыток Японии приостановить строительство. Линия работает с ограниченными возможностями с 1931 года, но остается незавершенной, так как несколько небольших китайских компаний борются за контракт на продолжение строительства. \n\nЭти компании, в отсутствие Мантэцу и японских инженеров, сделают многое для демонстрации силы и независимости Китая."
 fengtian_events.13.d_jap: "После завершения реорганизации Северо-восточного транспортного комитета было предложено построить и в некоторых случаях, достроить несколько новых железных дорог. Первый крупный проект - это железная дорога Цзилинь-Хайлун, первоначально запланированная в 1927 году, но столкнулась с серьезными задержками из-за начала войны на юге и попыток Японии приостановить строительство. Линия работает с ограниченной пропускной способностью с 1931 года, но остается незавершенной и Мантэцу, и несколько небольших китайских компаний борются за контракт на продолжение строительства. \n\nЯпонцы утверждают, и возможно, правильно, что благодаря своим ресурсам и опыту они могли бы построить железную дорогу в два раза быстрее, но выбор китайской компании во многом поможет продемонстрировать силу и независимость Китая."
 fengtian_events.13.a: "Выберите китайскую компанию."
 fengtian_events.13.b: "Выберите Мантэцу."

 fengtian_events.14.t: "Линия Цзилинь-Хайлун завершена"
 fengtian_events.14.d: "После месяцев строительства и различных досадных задержек линия Цзилинь-Хайлун, наконец, завершена, что расширило досягаемость нашей основной железнодорожной системы до районов, которые в противном случае труднодоступны. После изучения планов и имеющихся ресурсов, КВЖД, несомненно, подготовится к заключению еще одного контракта."
 fengtian_events.14.a: "Отличные новости!"

 fengtian_events.15.t: "Строительство линии Чанчунь-Дайлай"
 fengtian_events.15.d: "Следующим крупным проектом КВЖД является линия Чанчунь-Далай, которая была первоначально предложена японцами для соединения небольших провинциальных линий Мантэцу с центральными линиями, проходящими через крупные города. Эта работа, в частности, служит стратегической цели, так как она должна значительно облегчить перемещение людей и материалов с севера на юг."
 fengtian_events.15.d_jap: "Следующим крупным проектом КВЖД является линия Чанчунь-Далай, которая была первоначально предложена японцами для соединения небольших провинциальных линий Мантэцу с центральными линиями, проходящими через крупные города. Эта работа, в частности, служит стратегической цели, поскольку она должна значительно облегчить перемещение людей и материалов с севера на юг. Хотя эта линия действительно имеет японское происхождение и могла бы расширить зону действия Мантэцу, разработчики КВЖД, тем не менее, отмечают ее практическую ценность. Как и прежде, Мантэцу предлагает провести строительство самостоятельно, но китайские компании готовы выполнить ту же задачу."
 fengtian_events.15.a: "Выберите китайскую компанию."
 fengtian_events.15.b: "Выберите Мантэцу."

 fengtian_events.16.t: "Линия Чанчунь-Дайлай завершена"
 fengtian_events.16.d: "Новая линия Чанчунь-Дайлай теперь является одной из самых современных в Китае, в полной мере используя новейшие технологии и наглядно демонстрируя огромный разрыв во времени между старыми линиями, возникшими в 1920-х годах. Поистине, Северо-Восток движется к светлому будущему."
 fengtian_events.16.a: "Превосходно!"

 fengtian_events.17.t: "Строительство линии Таонань-Суолунь"
 fengtian_events.17.d: "Последним из крупных строительных проектов КВЖД является линия Таонань-Суолунь, которая, как и другие недавние проекты, служит для соединения основных линий с труднодоступными районами. Однако, в отличие от предыдущей линии, она будет напрямую связана с Китайско-Восточной железной дорогой."
 fengtian_events.17.d_jap: "Последним из крупных строительных проектов КВЖД является линия Таонань-Суолунь, которая, как и другие недавние работы, служит для соединения основных линий с труднодоступными районами. Однако, в отличие от предыдущей линии, эта линия будет напрямую связана с Китайско-Восточной железной дорогой, теоретически удерживая ползучее влияние Мантэцу дальше от ее операций. Тем не менее, Мантэцу предлагает построить железную дорогу, вероятно, надеясь хоть что-то получить из ситуации."
 fengtian_events.17.a: "Выберите китайскую компанию."
 fengtian_events.17.b: "Выберите Мантэцу."

 fengtian_events.18.t: "Линия Таонань-Суолунь завершена"
 fengtian_events.18.d: "После завершения строительства линии Таонань-Суолинь Северо-восточная транспортная комиссия может сосредоточиться на более мелких проектах и на обеспечении того, чтобы железные дороги Китая оставались китайскими. Эта вторая задача, несомненно, будет проблемой сама по себе."
 fengtian_events.18.a: "Отлично!"

 fengtian_events.19.t: "Забастовка железнодорожников!"
 fengtian_events.19.d: "Китайские рабочие, жалуясь на неадекватную оплату и тяжелые условия труда, отказались вернуться на работу в результате тщательно скоординированной забастовки. Несмотря на присутствие профсоюзов железнодорожников на Северо-Востоке, их координация в данном случае предполагает участие Коммуникационной клики, возможно, как часть попытки продемонстрировать свое влияние или отомстить за некоторые предполагаемые незначительные нарушения. \n\nХотя такой поворот событий тоже влияет на них, японцы счастливы наблюдать, как мы ссоримся между собой. Забастовка закончится, но не без значительных задержек."
 fengtian_events.19.a: "Не повезло..."

 fengtian_events.20.t: "Задержки в постройке железных дорог"
 fengtian_events.20.d: "Природа ситуации прояснилась, как только появились первые признаки: необъяснимо пропавшие грузы, рельсы, проложенные под неправильным углом, достаточным для полной реконструкции, и внезапные проверки рабочей силы японскими агентами, якобы разыскивающими "опасных преступников" - инспекции - которые неизбежно потребовали приостановки работ. \n\nТа же самая тактика использовалась японцами в 1920-х годах против железнодорожных проектов клики Фэнтянь, пытаясь замедлить и дискредитировать китайское строительство, чтобы ограничить конкуренцию Мантэцу, и теперь они, похоже, снова откладывают наши усилия. К сожалению, мы мало что можем сделать."
 fengtian_events.20.a: "Разочарование."

 fengtian_events.21.t: "Задержки Мантэцу в построке ж/д"
 fengtian_events.21.d: "Несмотря на прекрасных инженеров и оборудования Мантэцу, текущий проект строительства железной дороги неоднократно откладывался, так как рабочие пропадают без вести, материалы исчезают в ночи, а бандиты совершают набеги на лагеря вдоль рельсов, но исчезают до прибытия японских войск. \n\nМестная полиция и наши разведывательные службы не хотят ничего делать для расследования или разрешения этих повторяющихся инцидентов, вместо этого предпочитая смотреть, как извиваются японцы. Тот факт, что Мантэцу получил контракт на строительство железной дороги, хорошо известен общественности, и некоторые патриотически настроенные граждане, похоже, взяли дело в свои руки."
 fengtian_events.21.a: "Какая жалость."

#Imperial Fury/Japanese Aid Cut
 fengtian_events.22.t: "Имперская ярость"
 fengtian_events.22.d: "Разъяренное правительство Японии сегодня выступило с заявлением о прекращении различных программ помощи Фэнтяньскому Правительству, в том числе таких секторов, как исследования, промышленное развитие, сельскохозяйственное развитие и военное вооружение. Помощь должна вернуться через некоторое время, так как японцы не могут позволить нам слишком ослабеть, но до тех пор многие функции нашего государства нарушены."
 fengtian_events.22.d_influence_low: "Обеспокоенное уменьшением силы своих политических доверенностей в Ассамблее, японское правительство сегодня выступило с заявлением, в котором объявило о прекращении различных программ помощи Фэнтяньскому Правительству, включая такие сектора, как исследования, промышленное развитие, сельскохозяйственное развитие и военное вооружение. Помощь должна вернуться через некоторое время, так как японцы не могут позволить нам слишком ослабеть, но до тех пор многие функции нашего государства нарушены."
 fengtian_events.22.d_fengtian_refuses_food: "Возмущенное тем, что они считают дерзостью, японское правительство сегодня выступило с заявлением, в котором объявил о прекращении различных программ помощи Фэнтяньскому Правительству, включая такие сектора, как исследования, промышленное развитие, сельскохозяйственное развитие и военное вооружение. Помощь должна вернуться через некоторое время, так как японцы не могут позволить нам слишком ослабеть, но до тех пор многие функции нашего государства нарушены."
 fengtian_events.22.d_fengtian_blames_japan: "Возмущенное нашей "серьезной наглостью", японское правительство сегодня выступило с заявлением, в котором объявило о прекращении различных программ помощи Фэнтяньскому Правительству, включая такие сектора, как исследования, промышленное развитие, сельскохозяйственное развитие и военное вооружение. Помощь должна вернуться через некоторое время, так как японцы не могут позволить нам слишком ослабеть, но до тех пор многие функции нашего государства нарушены."
 fengtian_events.22.a: "Тяжелый ситуация."

 fengtian_events.23.t: "Возврат японской помощи"
 fengtian_events.23.d: "Видимо чувствуя, что их урок послушания ясен и достаточно карает, японцы возобновили свою помощь. Мы должны быть осторожны, чтобы не провоцировать их в будущем, и не выдвигать Ассоциацию Конкордия слишком далеко из Ассамблеи, пока мы не будем готовы."
 fengtian_events.23.a: "Наконец!"

 fengtian_events.24.t: "У Цзинлянь критикует Японию"
 fengtian_events.24.d: "Ссылаясь на недавнее расширение японского военного гарнизона в Шэньяне, У Цзинлянь выступил с резкой критикой Японии и ее внешней политики из зала Ассамблеи. Хотя другие политики, как известно, пренебрегали японцами в прошлом, пост министра иностранных дел придает словам У иное значение и ставит их выше рамок Ассамблеи. \n\nНе теряя времени, генеральный консул Японии уже потребовал отстранить министра У от должности."
 fengtian_events.24.a: "Вот черт!"
 fengtian_events.24.b: "Япония - наш братский союзник..."

 fengtian_events.25.t: "Мантэцу протестует против строительства железной дороги"
 fengtian_events.25.d: "Президент компании Мантэцу, Мацуока Ёсукэ, уведомил правительство о том, что ему стало известно о нашем недавно возобновленном строительстве железной дороги. Разочарованный нашими попытками обойти удушающий контроль его компании над логистикой, Мацуока самовольно поднял цены на импортную высококачественную сталь, необходимую нам для завершения проекта. Сталелитейные заводы в Японии оказались не более сговорчивыми, вероятно, уже получив указания от японского правительства. Хотя мы можем получить материал в другом месте, затраты сделают весь проект нецелесообразным.\n\nСогласие на повышение цен будет связано со значительными политическими издержками и сокращением числа рабочих, которых мы можем нанять, но есть и другое решение. Заявив о прекращении проекта, мы могли бы продолжать получать сталь по нормальным ценам, тайно продолжая строительство. Водя сотрудников Мантэцу за нос с помощью волокиты, бюрократических препятствий и фиктивной бумажной работы, мы сможем закончить строительство до того, как кто-нибудь об этом узнает. Мы уже делали это раньше. К сожалению, из-за секретности проекта, это, скорее всего, займет гораздо больше времени."
 fengtian_events.25.a: "Деньги есть деньги"
 fengtian_events.25.b: "Они не заметят, пока не станет слишком поздно."

 fengtian_events.26.t: "Квантунская армия разрушает нашу новую железную дорогу"
 fengtian_events.26.d: "Очевидно, обнаружив наш обман, солдаты из 'Железнодорожной гвардии' Квантунской армии ворвались в наш текущий проект строительства железной дороги, жестоко разрушая рельсы и оставляя десятки мертвых рабочих; их расстреляли за якобы 'враждебное вмешательство'. Хотя японцам не удалось уничтожить все, большие участки рельсов были даже расплавлены и скручены в 'железнодорожные шпалы'. Чтобы усугубить проблемы возобновления проекта, цены на японскую сталь были подняты до небес, вероятно, по указанию Мантэцу. Хотя японцы не в состоянии полностью остановить нашу работу, теперь нам придется начинать практически с нуля."
 fengtian_events.26.a: "Эти невыносимые японцы!"

 fengtian_events.27.t: "Чжан Цзолинь строит дублирующие железные дороги!"
 fengtian_events.27.d: "Из разведывательного отдела Мантэцу до нас дошли слухи, что Чжан Цзолинь возобновил один из своих старых проектов, цель которого - обойти нашу монополию на железнодорожную сеть Маньчжурии. Построив параллельные железнодорожные линии с ВСР и ССВ, в случае начала войны между нами, Чжан сможет переправлять своих людей через регион без непосредственного вмешательства Квантунской армии, не говоря уже о том, что они не будут знать об этом. Это представляет угрозу нашим интересам, и обычно заслуживает быстрого ответа.\n\nА Квантунская армия уже требует, чтобы этим наглым китайцам не спускали с рук это наглое оскорбление нации."
 fengtian_events.27.a: "Они получат быстрый ответ!"
 fengtian_events.27.b: "У нас есть более серьезные проблемы"

 fengtian_events.28.t: "Япония игнорирует строительство железных дорог"
 fengtian_events.28.d: "Удивительно, но японцы, похоже, решили проигнорировать строительство нашей железной дороги, несмотря на то, что они обнаружили ее продолжение. Кроме 'письма с резкими формулировками', лишенного реальной силы, быстрого и жесткого ответа, которого мы ожидали, так и не последовало. Возможно, они считают, что их полное удушение маньчжурских перевозок больше невозможно, но более вероятно, что в данный момент у них есть более важные заботы."
 fengtian_events.28.a: "Мы обвели этих дураков вокруг пальца!"

 fengtian_events.29.t: "У Цзинлянь ведет переговоры о новых торговых условиях"
 fengtian_events.29.d: "[QIE.GetAdjective]о-Германское эмбарго на товары, перемещаемые на северо-восток и обратно, сильно ударило по экономике страны. Восстановление произошло в значительной степени как продукт торговли, в которой Города-Концессии выступали в качестве посредника, позволяющего обойти эмбарго, но за счет дополнительных тарифов и зависимости от третьих сторон. Поскольку шанхайские предприятия, как законные, так и нелегитимные, полностью осознают свой контроль над торговлей всего региона, торговые сделки всегда были тусклыми, несмотря на их необходимость. \n\nТем не менее, каким-то образом У Цзинлянь сумел протолкнуть годы переговоров и заключил сделку, предлагающую лучшие условия торговли. Ходят слухи, что руки были запачканы при этом, но, похоже, никто не хочет задавать вопросы."
 fengtian_events.29.a: "Отлично."

 fengtian_events.30.t: "Мантэцу отменяет ограничения на железнодорожные перевозки"
 fengtian_events.30.d: "После некоторых раздумий, несмотря на наши порой непростые отношения, правление Мантэцу решило отменить ограничения, обычно накладываемые на наши стратегические перемещения. Это, несомненно, уступка, сделанная в связи с нашей недавно начавшейся войной. Мантэцу, вероятно, снова введет ограничения, когда будет заключен мир."
 fengtian_events.30.a: "Наконец-то!"

 fengtian_events.31.t: "Мантэцу вводит ограничения на железнодорожные перевозки"
 fengtian_events.31.d: "Учитывая окончание нашей недавно завершившейся войны, правление Мантэцу решило вновь наложить ограничения на наши стратегические передвижения в Маньчжурии."
 fengtian_events.31.a: "Разумеется..."

 fengtian_events.32.t: "Новая автомобильная компания"
 fengtian_events.32.d: "Благодаря регулярному производству автомобилей "Миншэн" Шэньянским арсеналом и нашим усилиям по поощрению китайско-японского сотрудничества, группа олигархов Коммуникационной Клики объединилась с компанией Jidosha-Seizo, дочерней компанией Nihon Sangyo Zaibatsu, для финансирования создания нового автомобильного завода в провинции Фэнтянь. Группа молодых инженеров, в основном получивших образование в Японии, уже изучает перспективы более современных ориентированных на потребителя моделей, вдохновленных "Миншэн"."
 fengtian_events.32.a: "Хорошие новости."
 fengtian_events.32.b: "Участие Японии неприемлемо."

 fengtian_events.33.t: "Конец нехватке инвестиций"
 fengtian_events.33.d: "Примерно через десять лет ограниченных внешних или внутренних инвестиций, помимо собственных государственных, Фэнтянь превратился в надежное и заслуживающее доверия место для процветающего роста. Мы набираем силу, а промышленные пожары позади, и наши перспективы вернуть страну растут с каждым днем. \n\nПо мере того, как мы начинаем другие проекты развития, мы должны начать видеть, что наши инвестиционные усилия открывают соответствующие возможности."
 fengtian_events.33.a: "Наконец-то!"

 #Post-Beijing Chaos Events
 fengtian_events.34.t: "Красные копья в Цанчжоу!"
 fengtian_events.34.d: "Отряды красных копий, крестьянские отряды самообороны, которые зачастую немного лучше бандитов, в последнее время выросли в размерах и силе в Цанчжоу, особенно вдоль Чжили-Шаньдуньской границы . Как новые правители в этом районе, мы должны поддерживать мир и порядок, которые в настоящее время существенно нарушены. Было совершено нападение на несколько местных гарнизонов, сожжены деревни и совершены набеги на города. Силы уже направлены для решения этой проблемы, но, вероятно, потребуются согласованные усилия по подавлению сопротивления в тыловых районах, за нашими линиями фронта, чтобы навсегда с ними справиться."
 fengtian_events.34.a: "Вот черт!"

 fengtian_events.35.t: "Дезертиры восстают в Дамине!"
 fengtian_events.35.d: "Когда наши войска пронеслись через провинцию Чжили, они подавили все признаки организованного сопротивления, но иногда сопротивление не столь организовано. Группы дезертиров, происходящие из бывших армий нашего врага и наших собственных сил, начали организовываться, чтобы атаковать более крупные цели через Дамин. Несколько поездов в окрестностях Шимэня подверглись атаке и вызвали серьезную озабоченность наших логистов из-за большого стратегического значения линии Цзиньхан. Для решения этой проблемы будут мобилизованы местные гарнизоны, но такие вопросы, как эти, в тылу, заслуживают скоординированного ответа."
 fengtian_events.35.a: "Предателей много!"

 fengtian_events.36.t: "Милитаристы сопротивляются в Лояне"
 fengtian_events.36.d: "Не все местные силовые структуры, состоящие из неформальных сетей патронажа, могут быть задействованы нашими оккупационными силами. В данном случае несколько местных полевых командиров, ранее верных У Пэйфу, по-видимому, обиделись на нашу политику в Лояне и захватили Гунсянский арсенал в Синьяне. Несмотря на их относительную организацию и вооружение из арсенала, их войска все еще слишком малочисленны и слишком плохо оснащены, чтобы сражаться с нашими в больших масштабах, но они, тем не менее, заставят нас отвлечь силы от линии фронта. Нам нужен последовательный ответ на эти случаи сопротивления."
 fengtian_events.36.a: "Дураки."

 fengtian_events.37.t: "Бандиты захватывают Гуаньчжун"
 fengtian_events.37.d: "Горы вокруг Сиань были домом для бандитов с незапамятных времен, но теперь эти разбойники спустились с холмов и начали охотиться на незадачливых путешественников, незащищенные деревни и самое главное, на наши караваны с припасами. Из-за их разрозненного и дезорганизованного характера бандитов бывает трудно выследить и навсегда устранить. Для этого, несомненно, потребуются согласованные усилия."
 fengtian_events.37.a: "Ну чего мы ждем?"

#Soy Agricultural Initiative
 fengtian_events.42.t: "Выращивание сои"
 fengtian_events.42.d: "Соевые бобы - чрезвычайно гибкая культура, полезная для употребления в пищу человека, корма для животных, удобрений и для самых разных промышленных применений. Исследовательское подразделение Мантэцу добилось больших успехов в повышении эффективности выращивания, обработки и использования, но процент посевов по Фэнтяню остается относительно неизменным. Корейские фермеры, составляющие большинство иммигрантов в Маньчжурию, являются прекрасными плантаторами риса и как и многие китайцы, предпочитают культуры, с которыми у них больше опыта. \n\nПытаясь изменить это положение, Мантэцу начал "Сельскохозяйственную инициативу по выращиванию сои", план, направленный на обучение фермеров и стимулирование производства сои в качестве товарной культуры, но до сих пор он был плохо воспринят. Мантэцу надеется заручиться поддержкой правительства в продвижении инициативы, которая почти наверняка увеличит урожай сои и следовательно, долгосрочную прибыль. \n\nНесколько несогласных отметили, что чрезмерное производство сои может снизить продовольственную безопасность на северо-востоке, а в подходящих условиях может привести к голоду."
 fengtian_events.42.a: "Поддержите инициативу."
 fengtian_events.42.b: "Нам больше не нужна соя."

 fengtian_events.43.t: "Япония и Корея борются с засухой"
 fengtian_events.43.d_fengtian_forced: "И Япония, и Корея переживают суровые засухи, которых нам, к счастью, удалось избежать, но теперь страдают их экономики и люди, а некоторые живут на грани голода. Правительство Японии официально потребовало, чтобы мы приняли участие в программе, по которой мы поставляем рис и просо в Корею, которая, в свою очередь, будет поставлять рис в Японию. Однако этот план несколько сбивает с толку ошеломляющий успех Инициативы по выращиванию сои Мантэцу, которая заменила обширные участки рисовых участков выращиванием сои. В результате у нас почти нет риса и проса, чтобы прокормить Корею, а производство сои остается ключевым для нашей промышленности и международной торговли. \n\nБлагодаря политическому и экономическому влиянию Японии у нас нет другого выбора, кроме как подчиниться."
 fengtian_events.43.d_fengtian_normal: "И Япония, и Корея переживают суровые засухи, которых нам, к счастью, удалось избежать, но теперь страдают их экономики и люди, а некоторые живут на грани голода. Правительство Японии неофициально попросило нас принять участие в программе, по которой мы поставляем рис и просо в Корею, которая, в свою очередь, будет поставлять рис в Японию. Однако этот план несколько сбивает с толку ошеломляющий успех Инициативы по выращиванию сои Мантэцу, которая заменила обширные участки рисовых участков выращиванием сои. В результате у нас совсем не хватает риса и проса, чтобы прокормить Корею, а производство сои остается ключевым фактором для нашей промышленности и международной торговли. \n\nЭто удивительный поворот для типично отстраненных японцев, но, тем не менее, хотя мы можем отказаться, это почти наверняка встретит серьезные последствия."
 fengtian_events.43.a: "Обеспечим их едой."
 fengtian_events.43.b: "Япония сама по себе."

 fengtian_events.45.t: "Предложение по промышленной сои"
 fengtian_events.45.d: "Увеличение нашего экспорта продовольствия в целях борьбы с засухой, с которой в настоящее время сталкиваются островные государства и Корея, привело к тому, что на всей территории Фэнтяня не хватает продовольствия, и это вызвало серьезные общественные потрясения. Некоторые министры правительства предложили сократить производство промышленной сои, обеспечивая тем самым достаточное количество продовольствия, но затрудняя нашу гражданскую промышленность и некоторый экспорт до тех пор, пока кризис не будет разрешен."
 fengtian_events.45.a: "Принять предложение."
 fengtian_events.45.b: "Мы не можем себе этого позволить."

 fengtian_events.46.t: "Конец засухи"
 fengtian_events.46.d: "После нескольких месяцев лишений засуха в Корее и Японии закончилась. От нас больше не ждут помощи Японии или Корее."
 fengtian_events.46.a: "Наконец-то!"

#Hokkaido Farming
 fengtian_events.47.t: "Предложение Мантэцу"
 fengtian_events.47.d: "Представитель Исследовательского крыла Мантэцу выступил с предложением, принятие которого, как он заверяет, отвечает его интересам, но которое, по его словам, должно держаться в полной тайне. Очевидно, после засухи 1939 года Мантэцу собрал вместе экспертов по сельскому хозяйству, старших должностных лиц сельскохозяйственных организаций и ученых, обладающих соответствующими знаниями, чтобы возглавить инициативу, направленную на повышение эффективности сельского хозяйства и производства в Фэнтяни. После нескольких месяцев тестирования одна из нескольких исследовательских групп создала решение, основанное на методах ведения сельского хозяйства, используемых на Хоккайдо, которое могло бы позволить средней китайской семье обрабатывать десять гектаров земли без необходимости нанимать сезонных рабочих, тем самым улучшая производство и высвобождая рабочую силу для фабрик в Аньшане, Фушуне и Шэньяне. Чиновник Мантэцу указывает, что эти методы следует распространять путем распространения информационных листовок и китайских инструкторов, обученных японскими экспертами, и похоже, подчеркивал идею о том, что этот проект следует всячески отделить от Южно-Маньчжурской железной дороги. \n\nПосле некоторого расследования отдел армейской разведки установил, что Квантунская армия отказалась поддержать усилия Мантэцу по неясным причинам, предполагая, что две фракции могут конкурировать, или что это просто часть какой-то тщательно продуманной японской уловки. Относительно либеральные чиновники в исследовательском крыле Мантэцу и другие бюрократические чиновники, как известно, сталкивались с консервативной Квантунской Армией."
 fengtian_events.47.a: "Примите предложение."
 fengtian_events.47.b: "Отказаться от предложения."

 fengtian_events.48.t: "Методы ведения сельского хозяйства на Хоккайдо"
 fengtian_events.48.d: "Спустя много времени и усилий методы ведения сельского хозяйства на Хоккайдо, предложенные Мантэцу, похоже, приносят плоды в некоторых областях, увеличивая производство и высвобождая дополнительные земли на севере."
 fengtian_events.48.a: "Отлично."

 fengtian_events.49.t: "Открытие"
 fengtian_events.49.d: "Хотя никаких публичных заявлений сделано не было, исследовательское подразделение Мантэцу сообщило, что Квантунская армия обнаружила наши совместные фермерские усилия, и это утверждение подтверждается данными наших разведывательных служб. Говорят, что сам генерал Кекичи Уэда ворвался в кабинет президента Мантэцу, Йосуке Мацуока, и устроил громовой словесный шквал о необходимости сохранения зависимости Фэнтяня. Способность Квантунской армии наказать Мантэцу в конечном итоге ограничена, так как могущественная рота практически автономна, но нет никаких сомнений в том, что армия сделает все возможное, чтобы усложнить жизнь всем участникам. К сожалению, на этом конкретный проект сотрудничества с Мантэцу определенно закончится."
 fengtian_events.49.a: "Не повезло."

 fengtian_events.50.t: "Раскрытие"
 fengtian_events.50.d: "Хотя никаких публичных заявлений сделано не было, недавние признаки недовольства в части армейского руководства стало трудно игнорировать. Судя по всему, слухи о нашем сельскохозяйственном проекте сотрудничества с Мантэцу распространились дальше, чем мы ожидали, и по мнению некоторых националистически настроенных генералов, 'Китай должен реформировать себя', а не подчиняться 'принудительной реструктуризации, замаскированной под совместную реформу'. \n\nХотя это далеко не серьезный кризис, любая угроза продолжающемуся сотрудничеству наших генералов и других официальных лиц - не повод для смеха. Некоторые министры предполагают, что мы могли бы защищать наше сотрудничество, изображая его как пример, в котором мы можем манипулировать Мантэцу, а не наоборот. Другие предполагают, что это может просто вырыть нашу яму глубже."
 fengtian_events.50.a: "Обвинить его в клевете."
 fengtian_events.50.b: "Наши действия были законными!"

 fengtian_events.51.t: "Смена общественного мнения в нашу пользу"
 fengtian_events.51.d: "Несмотря на все шансы, защита Чжаном фермерского проекта на Хоккайдо, похоже, убедила всех, кого это касается. Воздействие смягчено, и программа может работать без перебоев."
 fengtian_events.51.a: "Прекрасные новости!"

 fengtian_events.52.t: "Публика в ярости!"
 fengtian_events.52.d: "Несмотря на все усилия нашего бюрократа и даже Чжана, многие видные военные деятели по-прежнему не убеждены в том, что Сельскохозяйственный проект Хоккайдо стоит наших усилий. В результате программа почти наверняка будет остановлена, и наше разделенное правительство столкнется с еще одним предметом спора."
 fengtian_events.52.a: "Черт!"

#Focus Tree Specific Events

 fengtian_events.53.t: "Обогатите страну, укрепите армию"
 fengtian_events.53.d: "После десятилетий упадка и нищеты необходимость прогресса и развития никогда не была столь очевидной. Однако, хотя мы не можем позволить себе стагнацию, перемены сопряжены с собственными рисками, а именно с бесхозяйственностью и общественным недовольством. \n\nЗадача правительства - ответить на призывы "Обогатить страну и усилить армию", но мы должны уделять первоочередное внимание тому или другому."
 fengtian_events.53.a: "Мы должны обогатить Страну!"
 fengtian_events.53.b: "Мы должны укрепить армию!"
 fengtian_events.53.c: "Расскажите подробнее о состоянии экономики."
 fengtian_events.53.e: "Расскажи подробнее о состоянии армии."

 fengtian_events.54.t: "Обогатить страну"
 fengtian_events.54.d: "Хотя ресурсы Маньчжурии богаты и разнообразны, а Фэнтянь является третьим по величине промышленным центром в Восточной Азии, ее экономика по-прежнему страдает от ряда структурных проблем, симптомы которых наносят ущерб государству и замедляют продвижение к Южному освоению земель. Крупнейшим инвестором Фэнтяня является само государство, возвращающее налоговые поступления в ключевые секторы, такие как производство стали, угля и сои. Тем не менее, японцы и Мантэцу лишь незначительно отстают от правительства в этом отношении и инвестируют гораздо шире, что дает им безоговорочный контроль над экономикой и обществом Фэнтянь. \n\nХотя степень этого контроля растет с каждым днем, реформа могла бы способствовать увеличению доходов правительства за счет подавления широко распространенной коррупции, создания более здоровой среды для частных инвестиций и неудачного, но необходимого сотрудничества с Мантэцу в таких ключевых областях, как инфраструктура и технологии. Пока правительство может поддерживать политическую автономию и по крайней мере, большую часть контроля над экономикой, оно может выдвигать инициативы по противодействию японскому влиянию, сохранять легитимность в глазах китайского народа и в конечном итоге достигать своих основных целей. \n\nСледует отметить, что, хотя Япония кровно заинтересована в том, чтобы мы добились успеха по сравнению с [QIE.GetNameDef], они будут оказывать помощь только в конкретных усилиях, направленных на преодоление нашей отсталой отрасли, даже когда они пытаются расширить свое и без того тревожное влияние на нашу экономику."
 fengtian_events.54.a: "Давайте обогатим страну!"
 fengtian_events.54.b: "Может, армия важнее?"

 fengtian_events.55.t: "Укрепить армию"
 fengtian_events.55.d: "Армия Фэнтяня, официально именуемая Армией Республики, является впечатляющим зрелищем по большинству китайских стандартов, хотя бледнеет по сравнению с большинством иностранных сил и только недавно восстановила большую часть своей силы после истребления в последней Чжифэнской войне. Большинство оружия и транспортных средств устарели, даже включая его стандартную винтовку, предоставленную японцами, а низкая организация является неоднородной из-за ограниченного оборудования связи. Самый большой недостаток армии - это моральный дух, отчасти из-за того, что в рядах рядов широко распространены японские офицеры, прошедшие обучение за границей. \n\nМежду тем, Фэнтяньские ВВС, официально именуемые Китайскими ВВС, являются гордостью и радостью старшего сына главнокомандующего, Чжан Сюэляна, который использовал свою страсть к авиации для обучения своих первых пилотов. Летный корпус хорошо проявил себя во время войны и потерял превосходство в воздухе над 'Чжили' только с появлением современных самолетов, пилотируемых немцами. С тех пор Корпус немного вырос, хотя его самолеты более чем на десять лет отстают от европейских стандартов. \n\nВ целом силы Фэнтянь отстают от сил [QIE.GetNameDef] и по-прежнему сильно зависят от японского оборудования и помощи. Эта помощь и все, что Фэнтянь может сделать, чтобы стать самодостаточным, будет иметь решающее значение для сокращения этого разрыва и в конечном итоге, для восстановления юга."
 fengtian_events.55.a: "Укрепим армию!"
 fengtian_events.55.b: "Но как насчет экономики?"

 fengtian_events.56.t: "Возвращение с пустыми руками"
 fengtian_events.56.d: "Несмотря на все усилия, ученые и инженеры, которых мы направили для изучения японских методов производства, вернулись с пустыми руками. Возможно, явное несоответствие в уровне сложности их технологиям и нашей собственной было помехой, а может, японцы изо всех сил старались быть бесполезными. Как бы то ни было, население в целом, похоже, было больше впечатлено очевидными достижениями наших "лучших людей", чем их неудачей, поскольку об этом по загадочным причинам не сообщалось. Насколько известно, наши ученые выезжали за границу, чтобы получить очень престижные награды."
 fengtian_events.56.a: "они 'лучшие' инженеры"

 fengtian_events.58.t: "Лицензии для отелей Yamato"
 fengtian_events.58.d: "Сеть отелей Yamato, принадлежащих Мантэцу, долгое время была основным продуктом железнодорожной зоны Южной Маньчжурии. Зона концессий перешла сначала к Императорской России, а затем к Японии после 1906 года, а затем расширилась после 21 требования 1915 года посредством довольно вольной интерпретации ее положений, включив в нее всю южную Маньчжурию. Тем не менее, хотя договорные права позволяют японцам проживать и заниматься бизнесом и производством любого рода, строительство все еще теоретически требует одобрения местного губернатора и при необходимости, самого верховного маршала. \n\nМантецу стремится построить новые отели, все из которых неизбежно станут центрами для дальнейшей деятельности Японии, и хотя строительство невозможно остановить, не рассердив правительство Японии, могут быть наложены ограничения, чтобы предотвратить влияние Японии в определенных областях. К сожалению, несмотря на то, что они являются физическим сооружением мощи Японии, отели часто посещаются японской элитой и многими сотрудниками Мантэцу, что делает их крайне важными для стремительного развития, которого мы добиваемся."
 fengtian_events.58.a: "Ограничьте строительство."
 fengtian_events.58.b: "Пусть строят, как хотят."

 fengtian_events.59.t: "Комиссия по промышленному развитию Северо-Востока"
 fengtian_events.59.d: "По просьбе Японии и без особых причин для отказа мы создали правовую и налоговую базу, позволяющую создать Комиссию по промышленному развитию северо-востока. Комиссия предназначена для надзора и управления развитием индустрии Фэнтяня, в основном за счет выделения средств и аренды. Теперь перед комиссией стоит вопрос о ее составе. \n\nОбщество Согласия предложила включить в нее ряд чрезвычайно талантливых людей с опытом работающих на Nissan и Mitsubishi в Японии, которые подчеркивают необходимость экспортно-ориентированной экономики с использованием существующих природных ресурсов Фэнтяня, в то время как генералы главнокомандующего настаивают на необходимости подхода к развитию армии и используют свои значительное влияние на обеспечение помещения военнослужащих в комиссию. Коммуникационная Клика рекомендует собственное присутствие и выступает за смешанный подход к развитию, ссылаясь на свой многолетний опыт ведения бизнеса в Китае, а также в последнее время здесь, на северо-востоке. \n\nК сожалению, компромисс с участием всех трех сторон практически невозможен, поскольку для задачи необходимо четкое видение, а внутрикомиссионные споры почти наверняка сделают ее функционально бессильной. Кроме того, хотя природа комиссии как назначенного органа допускает присутствие японцев в ее составе, общественность и большая часть Ассамблеи, скорее всего, негативно отреагируют на их присутствие. В то же время японцы не оценят исключения."
 fengtian_events.59.a: "Сделайте экспорт приоритетным."
 fengtian_events.59.b: "Армия должна быть на первом месте."
 fengtian_events.59.c: "Лучше всего смешанный подход."

 fengtian_events.60.t: "Мантэцу Чосабу"
 fengtian_events.60.d: "Исследовательское крыло Южно-Маньчжурской железнодорожной компании, в просторечии известное как "Мантэцу Чосабу", за годы выросло из простого корпоративного отдела исследований и разработок в сердце японской колониальной исследовательской программы с отделами, занимающимися всем, от сельскохозяйственных наук до сбора разведывательной информации. Огромный масштаб Mantetsu Chosabū и его амбиции привели к открытию офисов в Берлине, Ванкувере и Нью-Йорке для привлечения иностранных талантов, а также к широкому набору сотрудников из ведущих университетов Японии. Результатом является удивительно либеральное и открытое интеллектуальное сообщество, которое иногда ставит научные изыскания выше националистических проблем. \n\nПохоже, это один из тех случаев, когда к нашему правительству обратился представитель Чосабу, предлагающий в будущем помощь в одной из нескольких областей. Следует отметить, что гарнизон Квантунской Армии в [GetDalianName] был категорически против этого соглашения."
 fengtian_events.60.a: "Радарные технологии."
 fengtian_events.60.b: "Строительство."
 fengtian_events.60.c: "Эффективность производства."
 fengtian_events.60.e: "Разведывательные технологии."

 fengtian_events.61.t: "Радарные технологии Мантэцу"
 fengtian_events.61.d: "В свете недавних технологических разработок Японии в области радаров ученые из исследовательского крыла Мантэцу начали сотрудничать с нашими, чтобы мы могли скорее достичь того же уровня развития."
 fengtian_events.61.a: "Отлично."

 fengtian_events.62.t: "Радарные технологии Мантэцу"
 fengtian_events.62.d: "В свете недавних технологических разработок Японии в области радаров ученые из исследовательского крыла Мантэцу начали сотрудничать с нашими, чтобы мы могли скорее достичь того же уровня развития."
 fengtian_events.62.a: "Отлично."

 fengtian_events.63.t: "Строительные технологии Мантэцу"
 fengtian_events.63.d: "В свете недавних событий в Японии официальные лица исследовательского крыла Мантэцу начали сотрудничать с нашими, предлагая новые инструменты и передовые методы, чтобы мы могли быстрее достичь того же уровня развития."
 fengtian_events.63.a: "Отлично."

 fengtian_events.64.t: "Строительные технологии Мантэцу"
 fengtian_events.64.d: "В свете недавних событий в Японии официальные лица исследовательского крыла Мантэцу начали сотрудничать с нашими, предлагая новые инструменты и передовые методы, чтобы мы могли быстрее достичь того же уровня развития."
 fengtian_events.64.a: "Отлично."

 fengtian_events.65.t: "Производственные технологии Мантэцу"
 fengtian_events.65.d: "В свете последних технологических разработок Японии ученые из исследовательского крыла Мантэцу начали сотрудничать с нашими, предлагая новые машины и производственные методы, чтобы мы могли скорее достичь того же уровня прогресса."
 fengtian_events.65.a: "Отлично."

 fengtian_events.66.t: "Производственные технологии Мантэцу"
 fengtian_events.66.d: "В свете последних технологических разработок Японии ученые из исследовательского крыла Мантэцу начали сотрудничать с нашими, предлагая новые машины и производственные методы, чтобы мы могли скорее достичь того же уровня прогресса."
 fengtian_events.66.a: "Отлично."

 fengtian_events.67.t: "Разведывательные технологии Мантэцу"
 fengtian_events.67.d: "Опираясь на свои широкомасштабные разведывательные операции, исследовательское крыло Мантэцу предоставило серию руководств с подробным описанием специальных методов и передовых практик для наших тайных агентов. Хотя книги явно устарели, а некоторые разделы отредактированы, еще есть чему поучиться. Особый интерес представляет работа под названием 'Ракка Рюсуи', или 'Падающие цветы и текущая вода', в котором подробно рассказывается о работе Мотодзиро Акаси, главного разведчика Японии во время русско-японской войны."
 fengtian_events.67.a: "Отлично."

 fengtian_events.68.t: "Разведывательные технологии Мантэцу"
 fengtian_events.68.d: "Опираясь на свои широкомасштабные разведывательные операции, исследовательское крыло Мантэцу предоставило нашим агентам доступ к некоторым из своих тайных ресурсов, разбросанных по всему Китаю. Это значительно улучшит возможности наших оперативников."
 fengtian_events.68.a: "Отлично."

 fengtian_events.69.t: "Промышленная зона Цзиньчжоу"
 fengtian_events.69.d: "Удобное расположение Цзиньчжоу делает его превосходным для предлагаемой промышленной зоны, и несколько групп уже начали борьбу за доминирующее положение в развитии; в первую очередь это дочерняя компания Мантэцу, специализирующаяся на консервировании и обработке легких металлов, Коммуникационная клика, которая хочет создать завод по производству подвижного состава, и военные, которые настаивают на том, что зона должна использоваться для производства боеприпасов, выше чем 'личные капиталистические выгоды'. Ситуация создается несколько необычной из-за коммуникационной клики, которая обычно может выставить довольно много денег, и по слухам, некоторые члены находятся под давлением со стороны военных, чтобы они ослабили свои позиции на торгах."
 fengtian_events.69.a: "Выбрать Мантэцу."
 fengtian_events.69.b: "Выбрать Коммуникационную клику."
 fengtian_events.69.c: "Выбрать Клику Чжан."

 fengtian_events.70.t: "Пополнение серебряного резерва"
 fengtian_events.70.d: "Полный запас серебра имеет решающее значение для укрепления доверия к валюте Фэнтяня и даже более важен для привлечения иностранных инвестиций, без которых Фэнтянь никогда не сможет сравниться с Чжили на юге, которые в течение последних восьми лет были заполнены немецким капиталом. Однако серебро - дорогой товар, и оплата достаточного количества для полного заполнения резерва, несомненно, приведет к сокращению финансирования из других областей. \n\nНекоторые министры в частном порядке предлагали покупать только половину желаемого количества, так как многие считали, что перед последней Чжифэнской войной резервы были неполными, и эти слухи так и не подтвердились. Конечно, позже было трудно объяснить значительный экономический спад, последовавший за неспособностью правительства погасить свои военные долги. \n\nТем не менее, неадекватное заполнение резерва, безусловно, было бы большим риском, но, возможно, стоящим."
 fengtian_events.70.a: "Заполнить резерв."
 fengtian_events.70.b: "Нет риска - нет выгоды."

 fengtian_events.71.t: "Экономическая катастрофа!"
 fengtian_events.71.d: "После того, как Банк Японии Банк Митсуи, основные кредиторы нашего правительства, неожиданно потребовали выплатить непогашенные долги, наш Центральный банк внезапно обнаружил, что не может предоставить достаточно серебра для транзакции. Новости о ситуации быстро просочились в общественность, что спровоцировало массовый набег на банки и повсеместную финансовую панику. Ходят слухи, что кризис - это не результат вопиющего бесхозяйственности и некомпетентности правительства, что мало кого удивит в Фэнтяни, а скорее преднамеренный шаг с целью обмануть общественность. Офисы Мантэцу в Шэньяне и Харбине уже начали полномасштабное расследование, и если не будут приняты меры, они, вероятно, обнаружат очень компрометирующий документальный след. \n\nХотя есть несколько вариантов, было бы жаль, если бы некоторые правительственные файлы по необъяснимой причине пропали..."
 fengtian_events.71.a: "Сжечь доказательства!"
 fengtian_events.71.b: "Сжечь и обвинить японцев!"
 fengtian_events.71.c: "Попросить Японию о финансовой помощи!"
 fengtian_events.71.e: "Мы должны сказать правду"

 fengtian_events.72.t: "Обнаружены банковские доказательства!"
 fengtian_events.72.d: "После тщательного расследования, связанного с неисчислимыми взятками и угрозами, следователи Мантэцу пришли к выводу, что наше правительство намеренно обманывает свой народ и полностью виновато в недавней финансовой катастрофе. Мы не можем отклонить их призывы к аресту нескольких причастных к этому министров министров, но, к счастью, Великий Маршал и его ближайшие советники были избавлены от прямой вины, а директор Мантэцу Йосуке Мацуока предположил, что в обмен на политические услуги все дело может отложить на неопределенный срок."
 fengtian_events.72.a: "Принять предложение."
 fengtian_events.72.b: "Отказаться от предложения."

 fengtian_events.73.t: "Японии прислала помощь"
 fengtian_events.73.d: "Сделав шаг, который, несомненно, спасет нашу экономику, Япония согласилась дать нам серебра, достаточно для пополнения нашего резерва, и не будет больше заниматься этим вопросом. Конечно, это, вероятно, было вызвано немногим большим, чем личный интерес, но некоторые говорят, что Япония, возможно, все-таки не так уж плоха..."
 fengtian_events.73.a: "Мы спасены!"

 fengtian_events.74.t: "Япония отклонила просьбу"
 fengtian_events.74.d: "Несмотря на наши просьбы, Япония отказалась от финансовой помощи, оставив нас в том же экономическом положении, в котором мы были до того, как мы обратились с просьбой, и в придачу с большим унижением. Единственная 'серебряная подкладка' заключается в том, что многие граждане, включая некоторых сотрудников Мантэцу, потеряли большую веру в благожелательное отношение Японии к Китаю."
 fengtian_events.74.a: "Если бы это было больше, чем метафора."
 fengtian_events.74.b: "Возможно, министр Жуань сможет все сгладить."

 fengtian_events.75.t: "Состояние офицерского корпуса"
 fengtian_events.75.d: "Офицеры Фэнтяня представляют собой необычную смесь молодых китайцев, получивших образование в Военной Академии Императорской армии Японии, китайцев старшего возраста, которые служили в Гражданских войнах, и японских офицеров, участвовавших в военной миссии в Фэнтяни, всех которых объединяет общая лояльность к отдельным людям больше, чем какая-либо особая преданность государству. Обесценившаяся валюта позволяет им жить в относительной роскоши и нанимать слуг для выполнения самых черных задач, вызывая неприязнь не только их товарищей, но и местного населения. \n\nТеперь, с основанием Шэньянской национальной академии, эти офицеры воспользовались возможностью, чтобы высмеять нынешние помещения академии, которым уже несколько десятилетий и которые находятся в аварийном состоянии. В то время как поблизости возвышается новое современное здание, плачевное состояние академии в настоящее время оставляет правительство открытым для критики."
 fengtian_events.75.a: "Печально."

 fengtian_events.76.t: "Изгнать японских офицеров"
 fengtian_events.76.d: "Япония поддерживает военную миссию в Фэнтяни с момента основания правительства Фэнтянь в 1926 году, которому предшествовали более десяти лет неформальных японских операций в поддержку клики Фэнтянь Чжан Цзолиня. Миссия помогла многим аспектам развития вооруженных сил, в первую очередь за счет поставок оружия и оборудования, а также помощи в обучении и планировании. \n\nОднако, к сожалению, нехватка офицеров после гражданской войны дала Японии возможность назначать японских офицеров на командные позиции в полевых условиях и даже самостоятельно руководить нашими подразделениями. Это оказало негативное влияние на моральный дух наших людей, сделав влияние Японии слишком очевидным, даже несмотря на то, что Военная миссия пытается, а часто и преуспевает, влиять на наши правительственные дела. Чтобы наши солдаты и китайский народ уважали наше правительство, японская военная миссия должна покинуть страну."
 fengtian_events.76.a: "Выгоните их всех!"
 fengtian_events.76.b: "Давайте будем дипломатичными."

 fengtian_events.77.t: "Япония объявляет войну"
 fengtian_events.77.d: "В ответ на наше изгнание их офицеров японское правительство разорвало все связи и объявило войну! Многие сочтут это катастрофой, но, возможно, это замаскированная возможность. Истина будет найдена на поле боя."
 fengtian_events.77.d_breakaway: "В ответ на то, что они считают нарушением наших обязательств по сотрудничеству, а также тринадцати требований 1915 года, Япония впоследствии объявила войну "в защиту своих договорных прав и интересов в Китае"."
 fengtian_events.77.a: "Вперед!"

 fengtian_events.78.t: "Япония ставит ультиматум"
 fengtian_events.78.d: "Несмотря на наши смелые попытки сместить японскую военную миссию, их влияние в нашем правительстве оказалось слишком большим, что вынудило его восстановить. Единственным другим вариантом сейчас был бы отказ от ультиматума и объявление войны по указанию самого верховного маршала."
 fengtian_events.78.d_ultimatum: "Переговоры провалились, и Япония поставила простой ультиматум. Мы должны возобновить миссию, иначе они немедленно объявят войну."
 fengtian_events.78.a: "У нас нет выбора, кроме как подчиниться."
 fengtian_events.78.b: "Да будет война!"

 fengtian_events.79.t: "Речь Чжан Цзолиня"
 fengtian_events.79.d: "Великий Маршал Чжан Цзолинь произнес короткую, но яркую речь, намекая на историческое государство Ци, которое, когда оно было на грани поражения при осаде Цзюй, переломило ситуацию и в конечном итоге выиграло войну. Это должен быть наш пример, когда мы идем вперед против тех, кто хочет держать Китай слабым и разделенным."
 fengtian_events.79.a: "Прочтите текст выступления."
 fengtian_events.79.b: "Южное освоение неминуемо!"

 fengtian_events.91.t: "Эскалация пропагандистской войны"
 fengtian_events.91.d: "Департамент пропаганды уже энергично запускает разрушительный идеологический шквал, под которым регрессивный режим [QIE.GetAdjective]ого обязательно должен сломаться и рухнуть! Великий Маршал лично выступил с несколькими короткими речами, осуждающих 'марионетку кайзера в Азии' [QIE.GetLeader], назвав его 'псом' за его 'трусость и наглое сотрудничество с немецким империалистами' и за 'предпочтение интересов иностранцев интересам китайцев'."
 fengtian_events.91.d_mantetsu: "Департамент пропаганды уже удваивает свои усилия по запуску разрушительного идеологического шквала, под которым регрессивный режим [QIE.GetAdjective]ого правительства непременно должен сломаться и рухнуть! Великий Маршал лично выступил с несколькими короткими речами, осуждающих 'марионетку кайзера в Азии' [QIE.GetLeader], назвав его 'псом' за его 'трусость и наглое сотрудничество с немецким вторгшимся' и за 'предпочтение интересов иностранцев интересам китайцев'. В то же время степень влияния Японии на наше собственное правительство очевидна даже самому нищему, и поэтому наши усилия звучат лицемерием в ушах многих."
 fengtian_events.91.a: "Южное освоение неминуемо!"

 fengtian_events.92.t: "Устаревшая артиллерия из Японии"
 fengtian_events.92.d: "В ответ на наш запрос Императорская армия Японии санкционировала крупную партию устаревшей артиллерии, которая, вероятно, не использовалась со времен Вельткрига. Это разочаровывает, если не совсем бесполезно."
 fengtian_events.92.a: "Хорошо."

 fengtian_events.93.t: "Новейшая артиллерия из Японии"
 fengtian_events.93.d: "В ответ на наш запрос Императорская армия Японии санкционировала поставку значительной партии своей новейшей артиллерии из арсенала Кокура. Наши офицеры уже смотрят на обещанное оружие с особым энтузиазмом, присущим исключительно обработанной стали и взрывчатым веществам."
 fengtian_events.93.a: "Хорошо."

 fengtian_events.94.t: "Фэнтянь запрашивает артиллерию"
 fengtian_events.94.d1: "Фэнтяньское Правительство долгое время имело преимущество перед своими китайскими соперниками благодаря нашей частой материальной помощи. В данном конкретном случае у нас просят артиллерию. \n\nМы могли бы послать лучшее, что у нас есть, что должно иметь большое значение в такой отсталой стране, но мы также могли бы обеспечить большее количество дешевого устаревшего оружия с меньшими затратами для себя. Или мы всегда могли вообще ничего не отправлять."
 fengtian_events.94.d2: "Фэнтяньское Правительство долгое время имело преимущество перед своими китайскими соперниками благодаря нашей частой материальной помощи. В данном конкретном случае у нас просят артиллерию, которая особенно ценится среди арсеналов милитаристов."
 fengtian_events.94.a: "Отправить новейшее снаряжение"
 fengtian_events.94.b: "Отправить устаревшее снаряжение"
 fengtian_events.94.c: "Ничего не отправлять"
 fengtian_events.94.d: "Мы не можем себе этого позволить"

 fengtian_events.95.t: "Япония поставляет устаревшее оборудование"
 fengtian_events.95.d: "В ответ на наш запрос Императорская армия Японии санкционировала крупную поставку устаревшего пехотного снаряжения. Некоторые из них в последний раз видели боевые действия во время русско-японской войны или даже раньше. Это неутешительно."
 fengtian_events.95.a: "Хотя бы что-то."

 fengtian_events.96.t: "Япония поставляет новейшее оборудование"
 fengtian_events.96.d: "В ответ на наш запрос Императорская армия Японии санкционировала поставку крупной партии новейшего пехотного оборудования."
 fengtian_events.96.a: "Спасибо."

 fengtian_events.97.t: "Фэнтянь запрашивает пехотное вооружение"
 fengtian_events.97.d1: "Фэнтяньское Правительство долгое время имело преимущество перед своими китайскими соперниками благодаря нашей частой материальной помощи. В данном конкретном случае нас просят предоставить пехотное снаряжение. \n\nМы могли бы послать лучшее, что у нас есть, что должно иметь большое значение в такой отсталой стране, но мы также могли бы предоставить большее количество дешевого устаревшего оружия. Или мы можем вообще ничего не отправлять."
 fengtian_events.97.d2: "Фэнтяньское Правительство долгое время имело преимущество перед своими китайскими соперниками благодаря нашей частой материальной помощи. В данном конкретном случае нас просят предоставить пехотное снаряжение. \n\nВсе, что мы можем себе позволить в настоящее время, - это дешевое устаревшее оружие. Конечно, мы можем вообще ничего не отправлять."
 fengtian_events.97.a: "Отправить новейшее оборудование"
 fengtian_events.97.b: "Отправить устаревшее оборудование"
 fengtian_events.97.c: "Ничего не отправлять"

 fengtian_events.971.t: "Япония отказывается отправлять снаряжение"
 fengtian_events.971.d: "Япония отклонила наш запрос на поставку снаряжения, сославшись на собственные 'большие потребности'. По общему признанию, в этом нет ничего удивительного."
 fengtian_events.971.a: "Видимо... слишком дорого."

 fengtian_events.98.t: "Устаревшие танки из Японии"
 fengtian_events.98.d: "Хотя японцы предсказуемо отказались прислать нам свою новейшую бронетехнику, только самые циничные ожидали прибытия ржавеющих и помятых танков времен Вельткрига, которые сейчас разгружаются в Инкоу. Хотя это лучше, чем вообще ничего, это вызывает явное разочарование."
 fengtian_events.98.a: "Хорошо."

 fengtian_events.99.t: "Танки из Японии"
 fengtian_events.99.d: "Хотя японцы предсказуемо отказались прислать нам свою новейшую бронетехнику, они все же согласились отправить несколько лишних легких танков более старой, но не совсем устаревшей модели."
 fengtian_events.99.a: "Хорошо."

 fengtian_events.100.t: "Фэнтянь просит легкие танки"
 fengtian_events.100.d1: "Фэнтяньское Правительство долгое время имело преимущество перед своими китайскими соперниками благодаря нашей частой материальной помощи. В данном случае у нас просят легкие танки, которые лучше подходят для пересеченной местности и примитивной инфраструктуры Китая, чем более тяжелые модели. \n\nНовейшие бронетранспортеры будут потрачены впустую или даже опасны в руках китайцев, но у нас действительно есть избыточные запасы лишь слегка устаревших танков, которые можно было бы оценить. В качестве альтернативы мы могли бы отправить даже старое оборудование, хотя, конечно, мы также могли бы вообще ничего не отправлять."
 fengtian_events.100.d2: "Фэнтяньское Правительство долгое время имело преимущество перед своими китайскими соперниками благодаря нашей частой материальной помощи. В данном случае у нас просят легкие танки. \n\nХотя в настоящее время у нас нет современных танков, мы можем отправить партию очень старых танков эпохи Вельткрига без каких-либо реальных затрат для себя. Или мы  могли бы вообще ничего не отправлять."
 fengtian_events.100.a: "Отправьте излишки легких танков"
 fengtian_events.100.b: "Отправьте устаревшие танки"
 fengtian_events.100.c: "Ничего не отправлять"

 fengtian_events.101.t: "Прокламация Великого Маршала"
 fengtian_events.101.d: "Сегодня Великий Маршал произнес воодушевляющую речь, призвав весь Северо-Восток приложить все усилия для достижения победы в предстоящей Войне за Национальное Возрождение. Десять тысяч лет Республике!"
 fengtian_events.101.a: "Прочтите текст выступления."
 fengtian_events.101.b: "Вперед!"

 fengtian_events.102.t: "The [FNG_zhifeng_war_name]!"
 fengtian_events.102.d.no_shanhaiguan: "Назначенный час наконец настал. В ближайшие дни плоды более чем десятилетнего обширного планирования и подготовки, наконец, будут использованы против врага, и будут сделаны первые шаги на пути к национальному возрождению. Все, что остается, - это сделать шаг вперед и воспользоваться моментом. Десять тысяч лет Великий Маршалу Чжану! Десять тысяч лет Республике!"
 fengtian_events.102.d.shanhaiguan: "Назначенный час наконец настал. В ближайшие дни плоды более чем десятилетнего обширного планирования и подготовки, наконец, будут использованы против врага, и будут сделаны первые шаги на пути к национальному возрождению. Все, что остается, - это сделать шаг вперед и воспользоваться моментом. Десять тысяч лет Великий Маршалу Чжану! Десять тысяч лет Республике! \n\nВыйдя из небольших деревень и городков на северном берегу реки Чаобай, наши солдаты успешно подняли восстание, изолировав и уничтожив местные гарнизоны и удерживая ключевые переправы через реки. Мы должны продвигаться на юг как можно быстрее, прежде чем они будут подавлены ответом врага и его большим числом."
 fengtian_events.102.a: "История запомнит этот день!"

 fengtian_events.103.t: "Проникновение в Шаньхайгуань"
 fengtian_events.103.d: "Пришло время нашим солдатам претворить в жизнь наши тщательно продуманные планы и начать проникать через Шаньхайгуань в провинцию за его пределами. Их миссия будет непростой, так как любое количество вещей может пойти не так, но, если они добьются успеха, мы поднимем восстание в тылу врага, чтобы занять их и сократить снабжение."
 fengtian_events.103.a: "Удачи нашим храбрым солдатам!"
 fengtian_events.103.b: "Забудьте про это."

 fengtian_events.104.t: "Подготовка в Шаньхайгуане завершена"
 fengtian_events.104.d: "До наших разведчиков дошли слухи о том, что большинство наших проникших солдат сейчас на позициях к югу от Шаньхайгуаня. Теперь они должны лечь на дно и ждать начала Войны за Национальное Возрождение."
 fengtian_events.104.a: "Хорошие новости."

 fengtian_events.105.t: "Неудача в Шаньхайгуане"
 fengtian_events.105.d: "До наших сотрудников разведки дошли слухи, что в процессе проникновения через Шаньхайгуань наши солдаты были обнаружены и схвачены вражескими оперативниками и группами военной полиции. Если кто-то останется, они, несомненно, будут слишком рассредоточены и дезорганизованы, чтобы иметь какую-либо пользу, когда мы начнем войну, и поэтому, к сожалению, этот план следует считать провальным."
 fengtian_events.105.a: "Смелая жертва."

 fengtian_events.106.t: "Диверсанты исчезли"
 fengtian_events.106.d: "Хотя наши разведывательные службы получали сообщения о продвижении на начальных этапах проникновения в Шаньхайгуань, контакт был внезапно прерван, и наши войска исчезли к югу от Великой стены. Возможно, что некоторые были обнаружены и просто избегают обнаружения, или что все силы были уничтожены. Судьба этих храбрых солдат никогда не будет известна."
 fengtian_events.106.a: "Еще есть надежда."

 fengtian_events.107.t: "Неожиданное преимущество"
 fengtian_events.107.d: "Несмотря на прекращение всех контактов с войсками проникновения в Шаньхайгуань, сообщения дошли к северу от перестрелок и хаоса на северных берегах реки Чаобай. Кажется, что эти герои избежали всякого обнаружения, только чтобы нанести удар в подходящий момент. Поистине, это неожиданное преимущество, и мы должны продвигаться на юг, прежде чем они будут подавлены ответом врага и большим числом врагов!"
 fengtian_events.107.a: "Славьтесь!"

 fengtian_events.108.t: "Шаньхайгуаньское восстание провалилось"
 fengtian_events.108.d: "Прежде чем оно могло начаться по-настоящему, наше восстание к югу от Шаньхайгуаня было обнаружено и быстро подавлено местным вражеским гарнизоном в коротком, но ожесточенном столкновении. Хотя мы можем столкнуться с некоторыми выжившими, когда будем продвигаться на юг, у нас не будет организованной помощи с другой стороны Великой стены."
 fengtian_events.108.a: "Черт."

 fengtian_events.110.t: "Ложь в правительстве"
 fengtian_events.110.d: "Широко признано, что Лига Возрождения подвержена коррупции, как рыхлая коалиция павших генералов, губернаторов, бюрократов и политиков, изгнанных с Юга из-за краха правительства Бэйяна. Однако недавние открытия полиции вызвали необычайную тревогу. Похоже, что группа политиков Лиги Возрождения, которые были назначены мэрами поселков в провинции Цзилинь благодаря своему опыту управления на юге, на самом деле никогда не были мэрами нигде или вообще. Вместо этого они убили и заменили своих однофамильцев и с помощью запутанного обмана обманули власти, устранив всех, кто мог бы им противоречить. \n\nПаутина лжи, коррупции и убийств, необходимая для поддержания этой лжи, простирается по всей провинции, и легитимность правительства нанесен значительный ущерб."
 fengtian_events.110.a: "Отвратительно."

 fengtian_events.111.t: "Взятки в Мантэцу"
 fengtian_events.111.d: "Пара членов Ассоциации Конкордия была недавно поймана на попытке подкупа политиков Лиги Возрождение, и хотя об этой деятельности давно подозревали, это первый раз, когда она была обнаружена открыто. Хотя члены других партий подали ходатайство об удалении виновных членов, японское консульство уже передало сообщение, "настоятельно рекомендующее" не предпринимать никаких действий против членов Ассоциации Конкордия. \n\nВеликий Маршал мог сделать это в любом случае, но не без риска гнева японцев."
 fengtian_events.111.a: "Убрать их."
 fengtian_events.111.b: "Мы ничего не можем сделать."

 fengtian_events.112.t: "Аншаньский инцидент"
 fengtian_events.112.d: "Поскольку руда в Аншане залегает близко к поверхности, его шахты в основном расширялись наружу, а не вниз, поглощая близлежащие земли с ужасающей скоростью. Наше решение одобрить дальнейшее расширение компании привело к полному разрушению нескольких близлежащих ферм и половины деревни от рук японской горнодобывающей техники.\n\nЗаявленная компенсация не была получена, и среди местных фермеров быстро вспыхнули протесты, которые наша местная полиция отказалась разгонять по 'патриотическим соображениям'. В результате беспорядков было серьезно повреждено дорогостоящее горнодобывающее оборудование, что привело к привлечению японской железнодорожной охраны и применению смертоносной силы для разгона беспорядков. Эта расправа над нашими гражданами не осталась незамеченной, а существующие антияпонские настроения только разгорелись. Народ потребует от нас ответа за наши действия, но месторождения и работающие на них компании имеют большое значение для стратегических целей Японии, и наши отношения с японцами не дают нам возможности для маневра."
 fengtian_events.112.a: "Разоблачить японцев."
 fengtian_events.112.b: "Молчать."

 fengtian_events.113.t: "Япония осуждает нас"
 fengtian_events.113.d: "Назвав наше осуждение их поведения во время недавнего инцидента в Аньшане 'наглым' и 'неподходящим для японской щедрости', японское правительство выступило с резким упреком как публично, так и в письме, направленном непосредственно генеральным консулом Японии в Шэньяне. Квантунский гарнизон выполнил серию маневров с моторизованными и бронетранспортерами на виду у столицы, и их цель была ясна. Любая эскалация этой ситуации, несомненно, приведет к дальнейшим упрекам, на которые мы не сможем дать значимого ответа."
 fengtian_events.113.a: "Пусть будет так."
 fengtian_events.113.b: "Нас не запугать!"

 fengtian_events.114.t: "Появление возможности"
 fengtian_events.114.d: "С тех пор, как армия Фэнтяня отступила за Великую Китайскую стену, на юг не спускали глаз. Из-за естественного узкого прохода, созданного перевалом Шанхай, армиям Чжили всегда было трудно попасть внутрь, но и нашей собственной - выйти наружу. Любая попытка вернуть себе Китай всегда зависела от момента слабости юга. Такой момент сейчас, кажется, наступает, когда закипающие антинемецкие настроения вылились в насилие в Лиге Восьми Провинций, а губернатор Аньхоя отделился от Нанкина в надежде использовать Лигу и Центральное правительство друг против друга для его собственная выгоды. \n\nК сожалению, мы еще не готовы начать нашу долгожданную кампанию, на северо-востоке есть нерешенные вопросы, и все еще не ясно, что именно станет с ситуацией в Лиге. Мы должны смотреть и ждать подходящей возможности."
 fengtian_events.114.a: "Будем выбирать с умом."

 fengtian_events.115.t: "Инцидент с прослушкой Чжан Цзолиня"
 fengtian_events.115.d: "В ходе того, что стало известно как 'Инцидент с прослушкой Чжан Цзолиня', [QIE.GetAdjective]ая подрывная группа смогла записать откровенный разговор между главнокомандующим и его генералами и передать его по широко используемым частотам в Шэньяне в течение почти сорока минут до того, прежде чем его заглушили на близлежащей станции, принадлежащей Мантэцу. Разговор, в котором Великий Маршал описал 'врагов Севера, Юга, Востока и Запада', выражает отношения Фэнтяня с Японией в нетрадиционной резкости, нанося ущерб нашей пропаганде и интересам Японии. \n\nТрансляция была вдвойне разрушительной, так как в ней Чжан обсуждает реалии относительной промышленной и военной мощи [QIE.GetNameDef], а также степень, в которой мы должны полагаться на японцев в вопросе критически важных технологий, что мы старались скрыть от публики."
 fengtian_events.115.a: "Как и в случае с законами, лучше не видеть, как создается Хунчан."

 fengtian_events.116.t: "Распространение подстрекательских статей"
 fengtian_events.116.d: "Статья в 'Nihon Kogy Shimbun', или 'Японская Промышленная Газета', была переведена на китайский язык и широко распространилась в местных газетах, прежде чем чиновникам цензуры удалось отследить и закрыть издателя. В статье подробно описывается, в какой степени Мантэцу и другие японские компании установили контроль над большинством секторов нашей экономики, и составлен прогноз, предусматривающий почти полный контроль в течение пяти лет. По очевидным причинам статья глубоко расстроила население в целом, и мы мало что можем сделать, чтобы предотвратить распространение существующих копий."
 fengtian_events.116.a: "Безобразие!"

 fengtian_events.117.t: "Хунхуцзы атакуют в провинции Хэйлунцзян"
 fengtian_events.117.d: "Хунхузи, что буквально переводится как 'красные бороды', - это группы бандитов и грабителей, которые издавна преследуют Северо-Восток. Хотя кампания Великого Маршала по умиротворению и централизации после последней войны уменьшила их число, с тех пор были нападения. Теперь несколько ферм на юге Хэйлунцзяна были подожжены, а их обитатели ограбили ценные вещи. \n\nНекоторые предлагали организовать экспедицию, чтобы сокрушить бандитов на их базе, но другие говорят, что такая миссия не стоит центрального правительства и не стоит ни времени, ни усилий."
 fengtian_events.117.a: "Отправьте экспедицию."
 fengtian_events.117.b: "Обратитесь за помощью к японцам."
 fengtian_events.117.c: "Экспедиция - это просто глупость"

 fengtian_events.118.t: "Нападения Хунхуцзы в Синъане"
 fengtian_events.118.d: "Несмотря на усилия, предпринятые для их сдерживания, Хунхуцзы нанесли еще один удар, на этот раз в Синъане, совершив набег на фермеров и торговцев на его основных дорогах. Местный губернатор направил свой гарнизон для защиты от будущих вторжений, но пересеченная местность и неуловимый характер бандита предполагают, что они могут просто нанести новый удар в другом месте."
 fengtian_events.118.a: "Выследить их!"
 fengtian_events.118.b: "Обратитесь за помощью к японцам."
 fengtian_events.118.c: "Обратитесь за помощью к японцам снова!"
 fengtian_events.118.e: "Perhaps Lao Baifeng has had enough."

 fengtian_events.119.t: "Нападения Хунхуцзы в Ляобэй"
 fengtian_events.119.d: "Ободренные нашей неспособностью остановить их, Хунхуцзы проявили особую смелость, возглавив атаки на провинцию Ляобэй и даже отважившись приблизиться к границам Цзилиня, прежде чем сорвать пригородный поезд и ограбить его пассажиров, в том числе ряд японских граждан. Местные власти принесли свои извинения за это смущение, и в близлежащих поездах была размещена дополнительная охрана, но консульство Японии уже потребовало от нашего правительства компенсации за потерянное имущество. \n\nПозволить этому продолжаться дольше было бы позором для всей страны."
 fengtian_events.119.d_jap: "Ободренные нашей неспособностью остановить их, Хунхуцзы проявили особую смелость, возглавив атаки на провинцию Ляобэй и даже отважившись приблизиться к границам Цзилиня, прежде чем сорвать пригородный поезд и ограбить его пассажиров, в том числе ряд японских граждан. Местные власти принесли свои извинения за это смущение, и в близлежащих поездах была размещена дополнительная охрана, но консульство Японии уже потребовало от нашего правительства компенсации за потерянное имущество. \n\nПозволить этому продолжаться дольше или просить японскую помощь снова, было бы ничем иным, как национальным унижением."
 fengtian_events.119.a: "Это проблема!"
 fengtian_events.119.b: "Обратитесь за помощью к японцам."
 fengtian_events.119.c: "Попросите японцев о помощи снова!"

 fengtian_events.124.t: "Гнусное убийство в Шэньяне!"
 fengtian_events.124.d: "По пути к правительственным учреждениям член Коммуникационной Клики был публично застрелен тем, кто, похоже, был [QIE.GetAdjective]им лоялистом, набранным из числа маньчжурского населения Северо-Востока! [QIE.GetNameDefCap], как известно, вербовал шпионов и убийц и раньше, но некоторые слухи предполагают, что этот убийца вместо этого был нанят членами Ассоциации Конкордия, находящейся в конфликте с баронами железной дороги и телеграфа Коммуникационной Клики за контроль над инфраструктурой страны."
 fengtian_events.124.a: "Ужасная потеря."

 fengtian_events.125.t: "Рекордная прибыль Мантэцу"
 fengtian_events.125.d: "Компания Южно-Маньчжурской железной дороги, в просторечии "Мантэцу", долгое время доминировала в крупных секторах экономики Фэнтяня и в свою очередь, действует как основное средство влияния Японии на наше правительство. Хотя это влияние нежелательно, оно приносит важный капитал и технологии, без которых Великий Маршал никогда бы не надеялся вернуть себе Китай. \n\nСегодня компания объявила о рекордных прибылях, большая часть которых поступает правительству Японии в виде налоговых поступлений."
 fengtian_events.125.a: "Это необходимое зло?"

 fengtian_events.126.t: "Распространение фальшивых долларов"
 fengtian_events.126.d: "В целях экономии денег версия доллара Фэнтяня, распространяемая в настоящее время, такая же, как и при первом выпуске, поскольку качественное печатное оборудование очень дорого. Однако это, похоже, сделало валюту открытой для подделки, и уже, как полагают, в обращении находятся тысячи фальшивых долларов Фэнтяня."
 fengtian_events.126.a: "В конце концов их найдут."

 fengtian_events.128.t: "Прокламация Чжана"
 fengtian_events.128.d: "Великий Маршал Чжан из правительства Фэнтяня объявил, что в течение года его страна начнет Войну за Национальное Возрождение, чтобы вернуть себе Юг и воссоединить страну под его руководством. Конечно, наша помощь сыграла огромную роль в том, чтобы Фэнтянь стал там, кем он является сейчас, и уже некоторые министры предложили нам взять на себя личное обязательство присоединиться к их войне. \n\nЭто было бы в наших интересах, поскольку Фэнтянь - лучшее средство вытеснения германского влияния из Китая, но в то же время, возможно, лучше всего ограничить их амбиции, а наши ресурсы не безграничны. Великий Маршал, конечно, продолжит свое дело. От этого зависит его легитимность."
 fengtian_events.128.a: "Поддержите Фэнтянь."
 fengtian_events.128.b: "Отказать в поддержке Фэнтяня."

 fengtian_events.129.t: "Война идет с севера"
 fengtian_events.129.d: "Сегодня Великий Маршал Чжан из правительства Фэнтяня объявил, что в течение одного года он начнет свою 'Войну за Национальное Возрождение' и нанесет удар на юг против нас. Независимо от того, получит ли он поддержку Японии или нет, впереди будет большая борьба, потому что в конце концов может быть только один Китай."
 fengtian_events.129.a: "Они не пройдут."

 fengtian_events.130.t: "Япония подтверждает свою поддержку"
 fengtian_events.130.d: "Правительство Японии в частном порядке заверило, что будет способствовать нашему нападению на юг!"
 fengtian_events.130.a: "Превосходно."

 fengtian_events.132.t: "Парад на площади Тяньаньмэнь"
 fengtian_events.132.d: "Обеспечив безопасность и контроль над капиталом, мы достигли первой и возможно, самой большой цели на долгом пути к Национальному Возрождению. Скоро мир больше не сможет игнорировать наше право на признание единственного законного правительства! К сожалению, наши японские союзники тоже участвовали в боях под Пекином и уже начали организовывать парад победы на площади Тянььнаньмэнь. Местный командующий Императорской Армии Японии направил приглашение, но с опозданием, которое кажется слишком преднамеренным, и нашим войскам придется спешить, чтобы подготовиться. \n\nНекоторые из наших генералов уже предлагают запретить японцам проводить свой парад или организовать свой позже, поскольку Пекин в конечном итоге является нашей столицей, и это наш день славы. Другие, более дипломатичные члены Кабинета и Ассамблеи предлагают принять приглашение, в первую очередь это члены Ассоциации Конкордия."
 fengtian_events.132.d_mantetsu: "Обеспечив безопасность и контроль над капиталом, мы достигли первой и возможно, самой большой цели на долгом пути к Национальному Возрождению. Скоро мир больше не сможет игнорировать наше право на признание единственного законного правительства! К сожалению, наши японские союзники тоже участвовали в боях под Пекином и уже начали организовывать парад победы на площади Тянььнаньмэнь. Местный командующий Императорской Армии Японии направил приглашение, но с опозданием, которое кажется слишком преднамеренным, и нашим войскам придется спешить, чтобы подготовиться. Общество Согласия, имеющая большое влияние в нашем правительстве, затрудняет занятие жесткой позиции, хотя мы, вероятно, могли бы убедить наших местных командиров пренебрегать этим случаем. Если бы это произошло, японцы почти наверняка пришли бы в ярость."
 fengtian_events.132.a: "Это наш день!"
 fengtian_events.132.b: "Мы пойдем бок о бок!"
 fengtian_events.132.c: "Мы не будем участвовать!"

 fengtian_events.133.t: "Китайская наглость на площади Тяньаньмэнь!"
 fengtian_events.133.d: "Обеспечив безопасность столицы Китая, мы помогли правительству Фэнтяня достичь первой и возможно, самой большой цели на его долгом пути к Национальному Возрождению. Местный Командующий Императорской Армии Японии, который возглавляет штурм столицы, уже начал организацию парада победы и любезно пригласил для участия близлежащие подразделения Фэнтяня. Однако, проявив беспрецедентную дерзость, Фэнтяньское Правительство не только отклонило наше предложение, но и активно препятствовало нашему собственному параду, утверждая, что это "их день славы", а не наш! \n\nМы могли бы сделать немедленное заявление, сократив помощь со стороны Фэнтяня, но они остаются нашими союзниками, и война не утихает."
 fengtian_events.133.a: "Немедленно наказать их за эту наглость!"
 fengtian_events.133.b: "С наказанием придется повременить."
 fengtian_events.133.c: "Пусть будет так."

 fengtian_events.134.t: "Китайская наглость на площади Тяньаньмэнь!"
 fengtian_events.134.d: "Обеспечив безопасность столицы Китая, мы помогли правительству Фэнтянь достичь первой и возможно, самой большой цели на его долгом пути к Национальному Возрождению. Местный Командующий Императорской Армии Японии, который возглавляет штурм столицы, уже начал организацию парада победы и любезно пригласил для участия близлежащие подразделения Фэнтяня. Однако, проявив беспримерную дерзость, Фэнтяньское Правительство отклонило наше предложение и проведет свой собственный отдельный парад! Конечно, наши собственные великолепные войска будут их одурачивать, но их действия могут заслужить более серьезного ответа."
 fengtian_events.134.a: "Немедленно наказать их за эту наглость!"
 fengtian_events.134.b: "С наказанием придется повременить."
 fengtian_events.134.c: "Пусть будет так."

 fengtian_events.135.t: "Япония затаила обиду"
 fengtian_events.135.d: "В ответ на то, что наши силы поставили в неловкое положение во время оккупации Пекина, правительство Японии временно сократило различные формы помощи нашей стране. Кажется, гордость японцев легко запятнать, а обиды не скоро забываются."
 fengtian_events.135.a: "Не повезло."
 fengtian_events.135.b: "Мы тоже можем затаить обиду, и изгнать их военную миссию!"

 fengtian_events.136.t.annexed: "Крах Фэнтяньского правительства"
 fengtian_events.136.t.puppeted: "Предательство Фэнтяня"
 fengtian_events.136.d.annexed: "В течение всего дня в наш главный штаб военного командования стекались срочные телеграммы и судорожные звонки от бизнесменов Мантэцу. Режим [FNG.GetLeader] на китайском северо-западе Маньчжурии, похоже, попал в руки врага [716.owner.GetName]. В результате Маньчжурия - родина самых больших прибылей и ресурсов Японии - была потеряна одним махом. После одного неудачного похода за другим, некогда могущественная армия клики Фэнтянь полностью развалилась - ее солдаты и офицеры массово дезертировали к дерзкому правительству соперника [716.owner.GetName]. Его местонахождение неизвестно, но ходят слухи, что [FNG.GetLeader] либо покончил с собой, либо скрылся.\n\nПосле потери великого города Шэньян и угрозы Порт-Артуру со стороны [716.owner.GetName], наше высшее военное командование и владельцы бизнеса Мантэцу призывают к прямой военной интервенции, чтобы защитить японские интересы и граждан от хаоса и беспорядка. Тем не менее, некоторые в нашем правительстве призывают нас отступить и говорят, что война в Китае - это не то, что для нас сейчас приоритетно."
 fengtian_events.136.d.puppeted: "В течение всего дня в наш главный штаб военного командования стекались срочные телеграммы и судорожные звонки от бизнесменов Мантэцу. Режим [FNG.GetLeader] на китайском северо-западе Маньчжурии принял поразительное и возмутительное решение, сменив флаги клики Фэнтянь на флаги [FROM.overlord.GetNameDef]. Тем самым Фэнтяньская клика признает национальное правительство [FROM.overlord.GetNameDef] и, таким образом, отказывается от своих претензий на Китайскую Республику. В результате их заявления [FNG.GetLeader] объявил, что связи Фэнтяня с Японией теперь будут разорваны, и что они больше не будут поддерживать интересы Японии в Китае.\n\nВ течение многих лет [FNG.GetNameDef] выживал только благодаря нашей военной и экономической помощи их отсталой провинции. При Японии Маньчжурия стала жемчужиной Востока - провинцией, на которую равнялась вся Азия. Мы не можем рисковать унижением и позором, которые принесет нам это предательство. Наше высшее военное командование и владельцы предприятий Мантэцу сейчас призывают к прямой военной интервенции, чтобы защитить честь Японии и поставить на место мятежную клику Фэнтянь. Тем не менее, некоторые в нашем правительстве призывают нас отступить и говорят, что война в Китае - это не то, что для нас сейчас приоритетно."
 fengtian_events.136.a: "Мы не можем рисковать сейчас."
 fengtian_events.136.b: "Вперед, в Маньчжурию!"

 fengtian_events.138.t: "Основание Киноассоциации Цзилинь"
 fengtian_events.138.d: "Собрав вместе сотрудников своего фотографического отдела, режиссеров из Японии и местных актеров, Мантэцу начал процесс создания киностудии в Цзилине, которая, как он утверждает, "продемонстрирует, чего Китай может достичь современностью, через объектив камеры, в уникальном Китайском стиле". В частном порядке президент Мантэцу указал, что студия также будет использоваться для тонкого распространения анти-[QIE.GetAdjective]их посланий, но это заставило некоторых близких советников Великого Маршала задать вопрос, что еще можно было бы незаметно вставить. \n\nПравительство всегда могло дать указание губернатору Цзилиня отказать Мантэцу в разрешении на строительство, но Киноассоциация, скорее всего, просто двинется на юг, в [GetDalianName], где мы не будем иметь никакого влияния на это вообще."
 fengtian_events.138.a: "Наша цель - современность!"
 fengtian_events.138.b: "Не на нашей земле."

 fengtian_events.139.t: "Пять цветов"
 fengtian_events.139.d_1: "Киноассоциация Цзилинь сегодня выпустила свой первый полнометражный фильм, в котором подробно рассказывается о разнообразных популяциях северо-востока, от заснеженных сосен провинции Хэйлунцзян до плодородных берегов нижнего течения реки Ляо. \n\nБлагодаря поддержке правительства Ассоциация смогла легко получить доступ к ряду удаленных мест, чтобы снимать и лучше распространять свое послание о единстве и гармонии, хотя некоторая критика была высказана в отношении освещения корейцев и японцев, многие из которых также живут на Северо-Востоке, но официально не являются частью "пяти рас", обозначенных на национальном флаге. В целом, несмотря на относительно небольшой просмотр из-за ограниченного числа кинотеатров, фильм считается большим успехом."
 fengtian_events.139.d_2: "Киноассоциация [GetDalianName] сегодня выпустила свой первый полнометражный этнографический фильм с подробным описанием разнообразного населения Северо-Востока, от заснеженных сосен провинции Хэйлунцзян до плодородных берегов нижнего течения реки Ляо, поддерживая ценности национальной пятерки.\n\nХотя его послания о расовом единстве и гармонии прекрасны сами по себе, фильм подвергся критике за то, что почти половину своего времени он тратит на японцев и корейцев, многие из которых сожительствуют на северо-востоке, но официально не являются частью "пяти рас", обозначенных на национальном флаге. Тем не менее, несмотря на это и его относительно небольшой просмотр из-за ограниченного числа кинотеатров, фильм был признан успешным."
 fengtian_events.139.a: "Маленькие успехи - путь к победе!"
 fengtian_events.139.b: "Маленькие успехи - путь к победе!"

 fengtian_events.140.t_1: "Песня Белой Орхидеи"
 fengtian_events.140.t_2: "Пугающие вши"
 fengtian_events.140.d_1: "За время, прошедшее с момента его первого выпуска, Киноассоциация Мантэцу выпустила еще несколько фильмов, каждый из которых получил определенное внимание и как правило, следовал договоренностям, достигнутым при его основании. Однако последний фильм "Песня Белой Орхидеи" привлек внимание. \n\nСюжет повествует о романтических связях между японцем (Кадзуо Хасэгава) и китаянкой (Ли Сянглань), где Ли оставляет своего возлюбленного по недоразумению и присоединяется к маньчжурской бандитской группе, планирующей саботировать Южно-Маньчжурскую железную дорогу. Позже она узнает, что [QIE.GetAdjective]ие шпионы умышленно устроили это недоразумение, возобновляет свою веру в Хасэгаву и подрывает заговор. Оба главных героя кажутся ясными аллегориями для своих стран, и были высказаны опасения, но анти-[QIE.GetAdjective]ая пропагандистская ценность значительна, и мелодия фильма настолько цепляющая..."
 fengtian_events.140.d_2: "За время, прошедшее с момента его первого выпуска, Киноассоциация [GetDalianName] выпустила еще несколько фильмов, каждый из которых получил определенное внимание и как правило, следовал договоренностям, достигнутым при его основании. Последний фильм "Пугающие Вши", однако, привлек заметное внимание. \n\nЭта работа представляет собой научный и гигиенический урок для зрителей благодаря сочетанию микроскопии и "возмутительных" анимированных вшей, которые, как утверждают некоторые, "прыгают с экрана". Помимо того, что некоторые впервые зрители испугались в кинотеатре, общий посыл является унизительным, играя на японских предположениях о том, что китайцы по своей привычке грязные и зараженные вшами; в результате этот прием был весьма негативным и заставил некоторых задуматься, можно ли этого избежать, если бы правительство приняло более активное участие в производстве."
 fengtian_events.140.a: "Хорошо."
 fengtian_events.140.b: "Я не боюсь вшей!"

 fengtian_events.141.t: "Хунхуцзы раздавлен!"
 fengtian_events.141.d: "После длительной охоты хунхуцзы выследили до подножия горы, которую местные жители называют 'Хушань' или 'Тигровая гора'. Бандиты бились насмерть, почти три часа сопротивляясь нападению нескольких тысяч регулярных войск; крутые склоны, узкие тропы и скрытые пещеры помогали им в защите.\n\nБыло освобождено несколько заключенных из окрестных деревень, а также значительная сумма ценностей. Затем лагерь был подожжен, создавая зрелище, видимое на многие мили вокруг."
 fengtian_events.141.a: "Так и надо всем бандитам!"

 fengtian_events.1411.t: "Принц Каньин Котохито отправляется на Северо-Восток"
 fengtian_events.1411.d: "Японское консульство в Шэньяне передало правительственные документы с подробным описанием планируемого прибытия принца Каньина Котохито, двоюродного дядюшки правящего императора, который совершит поездку на Северо-Восток в конце этого года. Он уже бывал в Маньчжурии, и это почти наверняка будет не только выставкой для пиара, но и инспекцией. Известно, что он проявляет особый интерес к нашим планам по возвращению остальной части Китая. \n\nТочная дата его прибытия не указана по соображениям безопасности, и японские опасения небезосновательны. Хорошо известно, что в Шэньяне и во всем регионе есть экстремистские элементы, которые могут желать принцу зла. \n\nСледует приложить все усилия, чтобы он был в безопасности и был доволен во время посещения."
 fengtian_events.1411.a: "Мы должны подготовиться"

 fengtian_events.142.t: "Прибытие принца Каньина"
 fengtian_events.142.d: "Японское консульство в Шэньяне передало правительству уведомление о прибытии принца Каньина, который недавно высадился с линкора Нагато в гавани [GetDalianName]. В соответствии с его рангом, этому случаю придается вся пышность и обстановка государственного визита, и принц отправится на север, в Шэньян, где состоится официальный прием у Великого Маршала, после чего состоится поездка по стране. \n\nРазличные министры и генералы заверяли принца в безопасности, поскольку нанесение любого вреда члену императорской семьи было бы политической катастрофой."
 fengtian_events.142.d_security: "Японское консульство в Шэньяне передало правительству уведомление о прибытии принца Каньина, который недавно высадился с линкора Нагато в гавани [GetDalianName]. В соответствии с его рангом, этому случаю придается вся пышность и обстановка государственного визита, и принц отправится на север, в Шэньян, где состоится официальный прием у Великого Маршала, после чего состоится поездка по стране. \n\nРазличные министры и генералы дали заверения относительно безопасности принца, поскольку нанесение любого вреда члену императорской семьи было бы политической катастрофой, но отсутствие определенных мер безопасности оставило их в частном порядке."
 fengtian_events.142.d_school: "Японское консульство в Шэньяне передало правительству уведомление о прибытии принца Каньина, который недавно высадился с линкора Нагато в гавани [GetDalianName]. В соответствии с его рангом этому случаю придается вся пышность и торжественность государственного визита, и принц отправится на север в Шэньян для официального приема у Великого Маршала, за которым последует поездка по стране. Кажется, он уже был впечатлен учениками, которые вышли из нескольких известных школ Мантэцу, размахивая Хиномару и пели японский гимн в знак приветствия. \n\nРазличные министры и генералы заверяли принца в безопасности, поскольку нанесение любого вреда члену Императорской семьи было бы политической катастрофой."
 fengtian_events.142.d_school_and_security: "Японское консульство в Шэньяне передало правительству уведомление о прибытии принца Каньина, который недавно высадился с линкора Нагато в гавани [GetDalianName]. В соответствии с его рангом, этому случаю придается вся пышность и обстановка государственного визита, и принц отправится на север, в Шэньян, где состоится официальный прием у Великого Маршала, после чего состоится поездка по стране. \n\nРазличные министры и генералы дали заверения относительно безопасности принца, поскольку нанесение любого вреда члену императорской семьи было бы политической катастрофой, но отсутствие определенных мер безопасности оставило их в частном порядке."
 fengtian_events.142.a: "Добро пожаловать, принц Каньин!"

 fengtian_events.143.t: "В глазах тигра"
 fengtian_events.143.d: "После прибытия в резиденцию Великого Маршала в Шэньяне, принц был торжественно принят в Тигровой комнате видными членами Ассамблеи и самим [Root.GetLeader] перед тем, как совершить поездку по бывшему Дворцу династии Цин, который с тех пор был преобразован для использования правительством и Шэньянский арсенал в северо-западном пригороде города. Вечер завершился элегантным государственным ужином в китайском стиле, во время которого прозвучал тост за особые отношения между Китаем и Японией. \n\nКотохито планирует покинуть Шэньян через несколько дней, чтобы осмотреть оборону на юге, но ходят слухи, что на его жизнь может быть совершено покушение."
 fengtian_events.143.d_embarrassment: "After arriving at the Grand Marshal's residence in Shenyang, the Prince was ceremoniously received in the Tiger Room by prominent members of the Assembly and [Root.GetLeader] himself, before touring the former Palace of the Qing Dynasty, which has since been converted for use by the Government. He also took some time to visit the Shenyang Arsenal in the city's Northwest Suburbs. The evening was finished by an elegant state dinner in the Chinese style, during which a toast was made to the special relationship between China and Japan.\n\nUnfortunately, Kotohito made note of the poor state of our soldiers' equipment, and commented on it to considerable embarrassment. The Prince plans to leave Shenyang in a few days for an inspection of defences to the south, but rumours swirl that an attempt could be made on his life."
 fengtian_events.143.d_arsenal: "После прибытия в резиденцию Великого Маршала в Шэньяне, принц был торжественно принят в Тигровой комнате видными членами Ассамблеи и самим [Root.GetLeader] перед тем, как совершить поездку в бывший Дворец династии Цин, который с тех пор был преобразован для использования правительством и Шэньянский арсенал в северо-западном пригороде города, расширение которого, похоже, произвело на принца особое впечатление. Вечер завершился элегантным государственным ужином в китайском стиле, во время которого прозвучал тост за особые отношения между Китаем и Японией. \n\nКотохито планирует покинуть Шэньян через несколько дней, чтобы осмотреть оборону на юге, но ходят слухи, что на его жизнь может быть совершено покушение."                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
 fengtian_events.143.d_evac: "После прибытия в резиденцию Великого Маршала в Шэньяне, принц был торжественно принят в Тигровой комнате видными членами Ассамблеи и самим [Root.GetLeader], а затем совершил поездку по бывшему Дворцу династии Цин, который с тех пор был преобразован для использования правительством. Он также посетил Шэньянский арсенал в северо-западном пригороде города и похоже, был особенно впечатлен его недавним расширением. Вечер завершился элегантным государственным ужином в китайском стиле, во время которого прозвучал тост за особые отношения между Китаем и Японией. \n\nИз-за начала войны принц решил прервать свой визит и отправится в [GetDalianName] завтра утром."
 fengtian_events.143.a: "Большая честь."
 fengtian_events.143.b: "Визит должен быть отменен в целях его безопасности."
 fengtian_events.143.c: "Goodbye to Prince Kan'in!"

 fengtian_events.144.t: "Осмотр Южного фронта"
 fengtian_events.144.d: "В рамках общей инспекции узкой демилитаризованной зоны, разделяющей [QIE.GetAdjective]ую и Фэнтяньскую территорию, принц Каньин был встречен высокоточными военными учениями в фортах Ваньцзячжэнь, построенными в 1929 году для поддержки работы нескольких бронепоездов вдоль Линии Цзинфэн. К сожалению, с тех пор время и плохое обслуживание сделали свое дело. Котохито явно не впечатлило то, что он увидел, и использовал свой обширный солдатский опыт для критики плохого состояния нашей обороны. \n\nВместо дальнейших проверок принц остановится в недавно построенном отеле Yamato в Цзиньчжоу, а затем снова переедет на север в Харбин."
 fengtian_events.144.d_hotel: "В рамках общей инспекции узкой демилитаризованной зоны, разделяющей [QIE.GetAdjective]ую и Фэнтяньскую территорию, принц Каньин был встречен высокоточными военными учениями в фортах Ваньцзячжэнь, построенными в 1929 году для поддержки работы нескольких бронепоездов вдоль Линии Цзинфэн. К сожалению, с тех пор время и плохое обслуживание сделали свое дело. Котохито явно не был впечатлен увиденным, он использовал свой обширный солдатский опыт, чтобы критиковать плохое состояние нашей обороны. \n\nЧтобы усугубить положение, он был встревожен, обнаружив, что в отеле Yamato в Цзиньчжоу возникли значительные задержки в строительстве и он не сможет принять его. Вместо этого Императорский принц вынужден был провести несколько ночей в старом китайском отеле недалеко от центра города. \n\nКак только его инспекции будут завершены, он снова переедет на север в Харбин."
 fengtian_events.144.d_modern_defenses: "В рамках общей инспекции узкой демилитаризованной зоны, разделяющей [QIE.GetAdjective]ую и Фэнтяньскую территорию, принц Каньин был встречен высокоточными военными учениями в фортах Ваньцзячжэнь, построенными в 1929 году для поддержки работы нескольких бронепоездов вдоль Линии Цзинфэн. Впечатленный недавними пристройками фортов и других укреплений к северу, идущих параллельно Великой стене, Котохито был также удивлен профессионализмом наших солдат. Учитывая значительное звание нашего уважаемого гостя в японских вооруженных силах, вполне вероятно, что Япония будет рассматривать нас как более надежного союзника в будущем. \n\nВместо дальнейших проверок принц остановится в недавно построенном отеле Yamato в Цзиньчжоу, а затем снова переедет на север в Харбин."
 fengtian_events.144.d_hotel_and_defenses: "В рамках общей инспекции узкой демилитаризованной зоны, разделяющей [QIE.GetAdjective]ую и Фэнтяньскую территорию, принц Каньин был встречен высокоточными военными учениями в фортах Ваньцзячжэнь, построенными в 1929 году для поддержки работы нескольких бронепоездов вдоль Линии Цзинфэн. Впечатленный недавними пристройками фортов и других укреплений к северу, идущих параллельно Великой стене, Котохито был также удивлен профессионализмом наших солдат. \n\nОднако его хорошее настроение испортилось, когда он обнаружил, что в отеле Yamato в Цзиньчжоу возникли значительные задержки в строительстве и он не сможет принять его. Вместо этого Императорский принц вынужден был провести несколько ночей в старом китайском отеле недалеко от центра города. \n\nКак только его инспекции будут завершены, он позвонит в следующий раз в Харбин на севере."
 fengtian_events.144.a: "Фэнтяньская защита сильна!"
 fengtian_events.144.b: "Здесь безопаснее всего закончить визит."

 fengtian_events.145.t: "Промышленная экскурсия"
 fengtian_events.145.d: "Перед отъездом в Харбин принц Каньин удивил свое окружение, прервав установленный график, чтобы изучить развивающуюся промышленность Цзиньчжоу, являющуюся прямым продуктом новой Особой промышленной зоны. Заинтригованный ростом, который он уже наблюдал во время поездки на поезде через Аньшань, Котохито был еще более впечатлен быстрыми темпами индустриализации, присутствующими здесь, комментируя, что большая часть окрестностей во время его последнего визита была не более чем голым полем. \n\nНадеемся, этот опыт оставит неизгладимое положительное впечатление."
 fengtian_events.145.a: "Будущее - наступило сегодня!"

 fengtian_events.146.t: "Чудеса Харбина"
 fengtian_events.146.d: "Принц Канъин прибыл в город Харбин, культурная столица Северо-Востока и центр инноваций, город Харбин принял принца Каньина всего через четыре с половиной часа после его отъезда благодаря поразительной скорости 'Азиатского экспресса' Мантэцу, одного из самых быстрых локомотивов в мире. Хотя Котохито знал о существовании поезда, мало что может подготовить даже королевских особ к скорости и роскоши этого чуда света. \n\nПринц быстро перешел к экскурсии по городу, в том числе по Русскому кварталу, и получил донесения от китайских и японских гарнизонов вдоль северной границы. Его отъезд из города через несколько дней ознаменует функциональное завершение визита, хотя он остается гостем страны до тех пор, пока его поезд не вернется на арендованную территорию Квантунской Армии."
 fengtian_events.146.d_electrical_speech: "Принц Канъин прибыл в город Харбин, культурная столица Северо-Востока и центр инноваций, город Харбин принял принца Каньина после его долгого путешествия через летнюю жару. Принц быстро перешел к экскурсии по городу, в том числе по Русскому кварталу, и получил отчеты как от китайских, так и от японских гарнизонов вдоль северной границы. \n\nВскоре после этого он заявил о своем восхищении тем, чего мы достигли за последние несколько лет, а также о своем намерении использовать недавно проложенные линии связи для передачи речи по японскому радио в реальном времени. Принц заверил нас, что содержание будет только похвалой, и хотя большинство в правительстве ожидают обычного самовосхваления японцев, это отличная возможность улучшить наш национальный статус. \n\nХорошо это или плохо, но отъезд принца из города через несколько дней ознаменует функциональное завершение визита, хотя он остается гостем страны, пока его поезд не вернется на арендованную территорию Квантунской Армии."
 fengtian_events.146.d_speech: "Принц Канъин прибыл в город Харбин, культурная столица Северо-Востока и центр инноваций, город Харбин принял принца Каньина всего через четыре с половиной часа после его отъезда благодаря поразительной скорости 'Азиатского экспресса' Мантэцу, одного из самых быстрых локомотивов в мире. Хотя Котохито знал о существовании поезда, мало что может подготовить даже королевских особ к скорости и роскоши этого чуда света. \n\nПринц быстро перешел на экскурсию по городу, в том числе по Русскому кварталу, и получил донесения от китайских и японских гарнизонов вдоль северной границы. Вскоре после этого он заявил о своем восхищении тем, чего мы достигли за последние несколько лет, а также о своем намерении использовать недавно проложенные линии связи для передачи речи по японскому радио в реальном времени. \n\nПринц заверил нас, что содержание будет только похвалой, и хотя большинство в правительстве ожидают обычного самовосхваления японцев, это отличная возможность улучшить наш национальный статус. \n\nХорошо это или плохо, но отъезд принца из города через несколько дней ознаменует функциональное завершение визита, хотя он остается гостем страны, пока его поезд не вернется на арендованную территорию Квантунской Армии."
 fengtian_events.146.a: "Харбин - это мультикультурная жемчужина Северо-Востока!"

 fengtian_events.147.t: "Принц Каньин возвращается в Японию"
 fengtian_events.147.d: "Выполнив свои обязанности здесь, принц Каньин Котохито благополучно отправился в [GetDalianName]. Любые сильные впечатления могут иметь длительное влияние на наши отношения с Японией."
 fengtian_events.147.a: "Надеемся, они положительные."

 fengtian_events.1477.t: "Щедрый сюрприз!"
 fengtian_events.1477.d: "Принц Канъин-но-мия Котохито, по-видимому, очень впечатленный своим посещением северо-востока, по-видимому, потянул за различные ниточки обратно в Токио. Теперь в [GetDalianName] ждет передовая дивизия легких танков!"
 fengtian_events.1477.a: "Это будет частью наступления, чтобы помнить"

 fengtian_events.148.t: "Принц Каньин отравлен"
 fengtian_events.148.d: "Жаловавшись на головные боли и головокружение после государственного обеда, принц Каньин упал прямо возле своей комнаты в поместье Великого Маршала. Благодаря медицинской помощи, оказанной близлежащей больницей, принадлежащей Мантэцу, он, похоже, полностью выздоровел. Однако анализы крови не оставляют сомнений в том, что это было покушением на его жизнь. \n\nУтрата ответственности за безопасность и само событие представляют собой глубокое национальное смущение и серьезное оскорбление императорской семьи Японии. Совершенно очевидно, что возможны тяжелые последствия."
 fengtian_events.148.a: "Как это могло случиться?"

 fengtian_events.149.t: "Принц Каньин ранен!"
 fengtian_events.149.d: "Во время инспекции форпоста к северу от Шанхайского перевала солдат-отступник внезапно открыл огонь по принцу Каньину, убив нескольких его охранников, прежде чем был убит сам. К счастью, принц получил относительно легкие травмы, но нарушение службы безопасности и само событие представляют собой глубокое национальное смущение и серьезное оскорбление для императорской семьи Японии. \n\nНа данный момент расследование, похоже, предполагает, что солдат был частью экстремистской группировки внутри Клики Чжан, и ответ Японии может быть суровым."
 fengtian_events.149.a: "Как это могло случиться?"

 fengtian_events.150.t: "Поезд принца взорван!"
 fengtian_events.150.d: "Всего через несколько минут после отъезда со станции Хуангутунь в Шэньяне поезд принца был сотрясен мощным взрывом, уничтожившим его задние вагоны. К счастью, произошедшая в последнюю минуту перестановка привела к тому, что его вагон переместили к передней части поезда, что позволило ему сбежать с незначительными травмами. Отсутствие ответственных за безопасность и само событие представляют собой глубокое национальное замешательство и серьезное оскорбление для императорской семьи Японии. \n\nНа данный момент расследование, похоже, предполагает, что ответственность за это могут нести члены Коммуникационной Клики более низкого ранга, а реакция Японии может быть суровой."
 fengtian_events.150.a: "Как это могло случиться?"

 fengtian_events.1500.t: "Визит принца прерван"
 fengtian_events.1500.d_1: "Из-за начала войны принц решил закончить свой визит раньше и отправится в [GetDalianName] завтра утром."
 fengtian_events.1500.d_2: "Из-за начала войны принц Каньин Котохито решил отменить свой визит на северо-восток. Прискорбный поворот событий, но, естественно, война должна иметь наивысший приоритет."
 fengtian_events.1500.a: "Ну что ж."

 fengtian_events.167.t: "Ма Чжаньшань предлагает свои услуги?!"
 fengtian_events.167.d: "Общаясь через конного посыльного, генерал Ма Чжаньшань из [From.GetNameDef] предложил дезертировать, сославшись на свои когда-то близкие отношения с Чжан Цзолинем. Чжаншан известен как эффективный, хотя и эксцентричный генерал, проводящий большую часть своего времени, практикуя свою превосходную меткую стрельбу; вероятно, продукт ранней жизни, которую он провел, бродя по Северо-Восточной равнине. \n\nВсе, что бывший бандит просит взамен, - это новейшее оборудование для экипировки своих людей и три миллиона долларов золотом."
 fengtian_events.167.a: "Небольшая цена за опытного генерала."
 fengtian_events.167.b: "Перебежчик? Нам не нужна эта мразь!"

 fengtian_events.168.t: "Ма Чжаньшань перешел на сторону [From.GetNameDef]!"
 fengtian_events.168.d_start: "Whilst Yang Yuting's enemies were always numerous within the Fengtian Clique, they nevertheless had retained a sense of cordialness in action and quality in words. All under the late Grand Marshal Zhang Zuolin, neither Shikan nor the disparate Anti-Shikan Cliques, such as Shaoshuai or Heilongjiang, would have dared to act against eachother in brazen strikes. Yet with the death of the Marshal, the cause for caution has been utterly called off — with Shikan's purge of the Shaoshuai Clique and other loyalists. Scheduled to be on the chopping block, in a surprising twist it would appear that the Heilongjiang Clique — that is, Wu Junsheng alongside his protégés, Wan Fulin and Ma Zhanshan — have struck first."
 fengtian_events.168.d: "По неизвестным причинам Ма Чжаньшань внезапно перешел на сторону [From.GetNameDef], взяв с собой десять тысяч человек и получив взамен три миллиона долларов золотом. Ма давно поддерживает тесные отношения с Великий Маршалом, поэтому этот шаг стал ошеломляющим сюрпризом."
 fengtian_events.168.a: "Нет слов..."

 fengtian_events.169.t: "Ма Чжаньшань обманул нас дважды!"
 fengtian_events.169.d: "Генерал Ма Чжаньшань, который только недавно перешел в наши ряды после получения огромной взятки, обманул нас и вернулся, чтобы сражаться за [FNG.GetNameDef]; взяв с собой оружие и золото, которые мы дали ему!"
 fengtian_events.169.a: "Никогда не верь бандиту!"

 fengtian_events.170.t: "Ма Чжаньшань становится предателем!"
 fengtian_events.170.d: "Генерал Ма Чжаньшань, который только недавно перешел в наши ряды после получения огромной взятки, обманул нас и попытался вернуться, чтобы сражаться за [FNG.GetNameDef]; забрав с собой оружие и золото, которые мы дали ему! \n\nК счастью, прежде чем он смог сбежать, Ма и его люди были отрезаны и уничтожены. Генерал Ма погиб в бою."
 fengtian_events.170.a: "Никогда не верь бандиту!"

 fengtian_events.171.t: "Ма Чжаньшань возвращается героем!"
 fengtian_events.171.d: "Генерал Ма Чжаньшань, совсем недавно перешедший на сторону [From.GetNameDef], устроил дерзкое предательство и вернулся в наши ряды, принеся с собой склад оружия и золото на сумму более трех миллионов долларов, которое первоначально использовалось для "покупки" его лояльности. Ма уже называют героем, и газеты от [GetDalianName] до Харбина описывают подозрительно разные "свидетельства из первых рук" о его бесстрашном прорыве [From.GetAdjective]их границ."
 fengtian_events.171.a: "Этот великолепный ублюдок!"

 fengtian_events.173.t: "Азия-Экспресс курсирует из [GetDalianName] в Харбин!"
 fengtian_events.173.d: "Впервые модернизированный поезд Мантэцу "Азия-Экспресс" будет курсировать от оконечности [GetDalianName] до северного города Харбина со скоростью 130 километров в час, что сделает его одним из самых быстрых поездов в мире. Поездка заняла всего 21 час 30 минут. Чудо-локомотив имеет вагоны, оборудованные системой отопления, кондиционирования воздуха и роскошными залами для посетителей третьего класса, а также фирменный коктейль, который подают в баре. \n\nВ то время как безграничный успех Мантэцу послужил поводом для радости и может вызвать зависть в Пекине, другие могут лишь с растущей озабоченностью относиться к достижениям Мантэцу."
 fengtian_events.173.a: "Современное чудо!"

 fengtian_events.174.t: "Лу Жунхуан дарит Северо-Восточного коня"
 fengtian_events.174.d: "По причинам, вероятно связанным с его недавним назначением на пост министра, Лу Жунхуан подарил Великий Маршалу великолепного маньчжурского коня по кличке "Понг", редкой породы, предположительно способной к выполнению трюков, стоимостью почти миллион иен. Обмен подарками, который можно было бы интерпретировать как взятку в других странах, является обычным явлением на Северо-Востоке и во всем Китае, но глубокие карманы Лу известны тем, что производят всевозможные дорогостоящие странности."
 fengtian_events.174.a: "Никогда не смотрите дареному коню в рот."

 fengtian_events.175.t: "Железнодорожные забастовки!"
 fengtian_events.175.d: "Влиятельные члены Ассоциации Конкордия планировали завтра внести закон, усиливающий их контроль над телеграфом страны, утверждая, что некоторые участки в провинции Цзилинь были построены без разрешений, и призывая передать их "более надежным властям". Однако на основных линиях, идущих от [GetDalianName] до Харбина, внезапно произошла серия забастовок, в результате чего служба остановилась в знак протеста против предложенного закона. \n\nСтолкнувшись с этим подавляющим сопротивлением, закон был отложен на время, и кажется вероятным, что Ли Шаофэн и его широкие связи несут ответственность."
 fengtian_events.175.a: "Хорошо." 

 fengtian_events.1751.t: "Железнодорожные забастовки!" 
 fengtian_events.1751.d: "Сегодня рано утром основные железнодорожные линии, проходящие между [GetDalianName], Шэньяном и Харбином, почти полностью остановились, поскольку на них, казалось, спонтанно вспыхнули забастовки, фактически остановив экономию ресурсов страны. \n\nМантэцу и его сторонники в Ассоциации Конкордия, кажется, воспользовались возможностью, чтобы выгнать рабочих с территории Квантунской Армии, чтобы обеспечить продолжение работы основных служб, но забастовка тем не менее продолжалась."
 fengtian_events.1751.a: "Черт побери, Лян!"

 fengtian_events.176.t: "Коррупционный скандал с Пан Фу"
 fengtian_events.176.d: "Несмотря на безмерную помощь, оказанную Пан Фу, предоставив ему и его партии право управлять финансовым и денежным развитием Фэнтяня в соответствии с первоначальной политикой Ван Юнцзяна, его усилия, похоже, не увенчались успехом. Внимание Великого Маршала привлекли доказательства того, что огромные суммы денег на развитие направлялись на частные проекты и на счета по всей стране. Несомненно, в этом замешаны и другие члены его партии, и хотя некоторая степень коррупции не удивит общественность, скандал такого масштаба расстроит даже самые высокие звания в правительстве."
 fengtian_events.176.a: "Кому можно доверять?"

 fengtian_events.177.t: "Коррупционный скандал с Ли Шаогэном"
 fengtian_events.177.d: "Несмотря на безмерную веру в Ли Шаогэна, даровавшую ему и его партии право руководить финансовым и денежным развитием Фэнтяня в соответствии с первоначальной политикой Ван Юнцзяна, его усилия, похоже, не увенчались успехом. Внимание Великого Маршала привлекли доказательства, свидетельствующие о том, что огромные суммы денег на развитие были направлены на отчаянные меры по борьбе с Мантэцу по всей стране, подавляющее большинство из которых были взяты. Вдобавок ко всему, Ли злоупотребил своим положением, чтобы обеспечить благоприятные права на строительство, возглавляемое его союзниками в правительстве. Несомненно, в этом замешаны и другие члены его партии, и хотя некоторая степень коррупции не удивит общественность, скандал такого масштаба расстроит даже самые высокие звания в правительстве."
 fengtian_events.177.a: "Кому можно доверять?"

 fengtian_events.178.t: "Коррупционный скандал с Сунь Цичанем"
 fengtian_events.178.d: "Несмотря на безмерную веру в Сунь Цичана, наградив его и его партию правом управлять финансовым и денежным развитием Фэнтяня в соответствии с первоначальной политикой Ван Юнцзяна, его усилия, похоже, не увенчались успехом. До сведения Великого Маршала пришли свидетельства того, что огромные суммы денег на развитие были направлены на закупку оружия для оснащения провинциальных подразделений и телохранителей, а также в карманы выдающихся генералов. Несомненно, в этом замешаны и другие члены его партии, и хотя некоторая степень коррупции не удивит общественность, скандал такого масштаба расстроит даже самые высокие звания в правительстве."
 fengtian_events.178.a: "Кому можно доверять?"

 fengtian_events.179.t: "Коррупционный скандал с Руаном Чжэндуо"
 fengtian_events.179.d: "Несмотря на безмерную веру в Руань Чжэндуо, наградив его и его партию правом управлять финансовым и денежным развитием Фэнтяня в соответствии с первоначальной политикой Ван Юнцзяна, его усилия, похоже, не увенчались успехом. Внимание Великого Маршала привлекли доказательства, свидетельствующие о том, что огромные суммы денег на развитие направлялись в спонсируемые Мантэцу школы и больницы, каждая из которых использовала внезапное увеличение финансирования для продолжения своих усилий по продвижению китайско-японской дружбы. Несомненно, в этом замешаны и другие члены его партии, и хотя некоторая степень коррупции не удивит общественность, скандал такого масштаба расстроит даже самые высокие звания в правительстве."
 fengtian_events.179.a: "Кому можно доверять?"

 fengtian_events.180.t: "Тан Юйлинь едет на тигре!"
 fengtian_events.180.d: "Министр Тан Юйлинь был замечен смело сидящим на хищном тигре где-то в провинции Жэхе! \n\nИзображение, изображающее Тан, получило широкое распространение, появилось в газетах на Северо-Востоке, хотя его происхождение неясно. Некоторые утверждают, что изображение подделано, в то время как другие считают, что тигр только чучело, но наибольшее внимание привлекает контекст. Великого Маршала Чжан Цзолиня часто называют "Мукденским тигром", и поэтому тот факт, что Тан изображен верхом, рисует очень сомнительную картину. \n\nСо своей стороны, Тан Юйлинь утверждает, что изображение является созданием [QIE.GetAdjective]ого саботажника , но его экстравагантные вечеринки в Чаояне предполагают, что изображение, если не тигр, вполне может быть подлинным."
 fengtian_events.180.a: "Это безобразие!"
 fengtian_events.180.b: "Наверняка это подделка..."

 fengtian_events.181.t: "Налоговый спор с СER"
 fengtian_events.181.d: "Взимание кажущихся произвольными налогов для заполнения пробелов в бюджете, подлинных или нет, было давней практикой национальных, региональных и местных органов власти по всему Китаю, включая нашу собственную. На этот раз министр внутренних дел Юань оказывает давление на директора Китайско-Восточной железной дороги и министра экономики Ли Шаогэн, чтобы тот взимал дополнительные налоги с железной дороги в целях дальнейшего укрепления армии; угрожает расследованием активов Коммуникационной Клики, а также различными комиссиями, которые Совет директоров уже взимает со своих клиентов, доход от которых почти наверняка останется у многих. \n\nСуществует большая вероятность того, что, поскольку Юань сам является членом совета директоров КВЖД, это силовая игра с его стороны, чтобы ослабить его соперников, но такой налог, несомненно, поможет наполнить национальную казну, за счет подрыва конкуренции Мантэцу. Похоже, что Великий Маршал будет вынужден уладить этот спор, чтобы он не вышел из-под контроля."
 fengtian_events.181.a: "Взимать налог."
 fengtian_events.181.b: "Никаких налогов не требуется."

 fengtian_events.182.t: "Юань ведет расследование"
 fengtian_events.182.d: "Взволнованный решением предотвратить его предложение о введении железнодорожного налога, министр Юань Цзинкай продолжил свою угрозу и начал интенсивное расследование в отношении других членов Совета КВЖД, а также всей Коммуникационной Клики в целом. Силы полиции уже начали объединяться, и если в ближайшее время Великий Маршал не заступится, возрастает риск того, что расследование может раскрыть более важные секреты, которые лучше скрывать от общественности. \n\nКонечно, если его расследование будет остановлено, Юань почти наверняка уйдет с поста министра внутренних дел."
 fengtian_events.182.a: "Это недопустимо."
 fengtian_events.182.b: "Пусть расследование продолжается."

 fengtian_events.183.t: "Расследование Юаня дает результаты"
 fengtian_events.183.d_large: "Когда Юань начал свое расследование, были опасения, что оно может выявить глубокую сеть коррупции, которая, как многие полагают, существует в правительстве, и предмет этих опасений теперь сбылся. Хотя Коммуникационная Клика больше всего пострадала от этого скандала, правительство в целом понесло серьезный удар по ее легитимности, несмотря на все усилия Юаня сохранить все результаты в тайне. Хотя к Юаню были призывы уйти в отставку, приоритетом является борьба с ущербом, а министр внутренних дел заслужил большое уважение со стороны населения, как бы это ни парадоксально ни звучало."
 fengtian_events.183.d_small: "Когда Юань начал свое расследование, были опасения, что оно может выявить глубокие сети коррупции, которые, как многие полагают, существуют в правительстве, но, к счастью, его результаты прямо нацелены на членов Коммуникационной Клики, в результате чего правительство практически не пострадает. Юань почти наверняка уйдет с большей степенью контроля над КВЖД и большим уважением среди населения в целом, несмотря на его собственные "предполагаемые" теневые сделки."
 fengtian_events.183.a: "По крайней мере, это закончено."

 fengtian_events.184.t: "Расследование Юаня ничего не дает"
 fengtian_events.184.d: "Несмотря на широко распространенное мнение, что расследование Юаня неизбежно обнаружит какие-то следы коррупции Коммуникационной Клики, официальный отчет, опубликованный сегодня, показывает, что ничего не было найдено. Юань глубоко недоволен, но он мало что может сделать, кроме как эскалации конфликта таким образом, чтобы гарантированно нанести значительный ущерб его собственной репутации."
 fengtian_events.184.a: "Кто бы мог подумать?"

 fengtian_events.191.t: "Кризис в Фэнтяни"
 fengtian_events.191.d.losing: "Несмотря на всю помощь, которую мы оказывали Фэнтяньскому Правительству на протяжении многих лет, теперь ему грозит поражение, поскольку его армии начинают рассыпаться. У нас есть не только общая приверженность защите Фэнтяня политически и экономически, но и остается единственным средством, с помощью которого мы можем косвенно контролировать Китай в целом. Прямое занятие почти наверняка будет дорогостоящим, но вмешательство также может повлечь за собой собственные риски. Пришло время решать."
 fengtian_events.191.d.long: "Несмотря на всю помощь, которую мы оказывали Фэнтяньскому Правительству на протяжении многих лет, теперь оно сталкивается с риском поражения, поскольку его война продолжается бесконечно. У нас есть не только общая приверженность защите Фэнтянь политически и экономически, но и остается единственным средством, с помощью которого мы могли бы косвенно контролировать Китай в целом. Прямое занятие почти наверняка будет дорогостоящим, но вмешательство также может повлечь за собой собственные риски. Пришло время решать."
 fengtian_events.191.d.peace: "Несмотря на всю помощь, которую мы оказывали правительству Фэнтяня на протяжении многих лет, сейчас оно рискует потерпеть поражение, поскольку правительство к югу от Великой стены собирает армии, намного превосходящие по численности армию Старого маршала. Мы не только несем общую ответственность за защиту Фэнтяня в политическом и экономическом плане, но он также остается единственным средством, с помощью которого мы можем косвенно контролировать Китай в целом. Прямая оккупация почти наверняка обойдется дорого, но и интервенция может быть сопряжена со своими рисками. Пришло время принять решение."
 fengtian_events.191.a: "Япония выполняет взятые на себя обязательства."
 fengtian_events.191.b: "Чжан сам по себе."

 fengtian_events.1911.t: "Япония отказывается вмешиваться"
 fengtian_events.1911.d: "В ошеломляющем акте предательства, Япония отказалась защищать нас в самый трудный час. Теперь, похоже, мы должны обратить внимание на нашу собственную оборону, поскольку это все, что стоит между нами и забвением."
 fengtian_events.1911.a: "Предатели!"

 fengtian_events.192.t: "Япония присоединяется к войне!"
 fengtian_events.192.d: "Выполняя свою общую приверженность нашей защите, Япония присоединилась к войне."
 fengtian_events.192.a: "Вперед!"

 fengtian_events.193.t.jinhan: "Восстановление железной дороги Цзиньхань"
 fengtian_events.193.t.jinpu: "Восстановление железной дороги Цзиньпу"
 fengtian_events.193.t.yuehan: "Восстановление Юэханьской железной дороги"
 fengtian_events.193.d.jinhan: "Первоначально финансируемая бельгийской столицей, железная дорога Цзинхань проходит с севера на юг от Пекина в Чжили до Ханькоу в провинции Хубэй. На протяжении десятилетий он служил одной из основных транзитных артерий Китая, переправляя товары по всей Северо-Китайской равнине и соединяя ее через Чжэнчжоу. \n\nЗа годы, прошедшие с момента постройки, железная дорога пережила тяжелые времена, и хотя бельгийцы давно ушли, потребуется немало инвестиций, чтобы восстановить ее инфраструктуру и интегрировать ее с нашими новыми национальными железнодорожными службами."
 fengtian_events.193.d.jinhan_JAP: "$fengtian_events.193.d.jinhan$ $ask_Mantetsu_for_railway$"
 fengtian_events.193.d.jinpu: "Железная дорога Цзиньпу, финансируемая британским и немецким капиталом почти за пятнадцать лет до Вельткрига, проходит с севера на юг от Тяньцзиня до Пукоу, района Нанкина. Как и железная дорога Цзинхань, она долгое время служила одной из важнейших логистических артерий Китая, соединяя север с югом и восток с западом через Сюйчжоу. \n\nЗа годы, прошедшие после последней войны в Чжифэне, участки железной дороги в Шаньдуне и Цзянсу постепенно попадали под влияние Германской Остазии, которая обновила и расширила свою инфраструктуру. Однако, поскольку сотрудников компании увезли или расстреляли как Ханьцзяня, их нужно будет заменить. К сожалению, процесс поиска и оплаты этих лиц, не говоря уже о реинтеграции самой железной дороги, может оказаться дорогостоящим предприятием."
 fengtian_events.193.d.jinpu_JAP: "$fengtian_events.193.d.jinpu$ $ask_Mantetsu_for_railway$"
 fengtian_events.193.d.yuehan: "Железная дорога Юэхань, соединяющая Ханькоу и Гуандун, зародилась в результате конфликта между бельгийскими и американскими инвесторами, и поэтому строительство заняло необычно много времени, когда обе стороны вышли из проекта. Железная дорога была в конечном итоге завершена под наблюдением Германской Остазии в начале 1930-х годов и оставалась под ее контролем до краха Лиги Сунь Чуаньфана. \n\nПосле ухода немцев потребуется совершенно новое управление и интеграция в новую национальную железнодорожную систему. Это будет дорогостоящая задача."
 fengtian_events.193.d.yuehan_JAP: "$fengtian_events.193.d.yuehan$ $ask_Mantetsu_for_railway$"
 fengtian_events.193.a: "Отдайте это Мантэцу."
 fengtian_events.193.b: "Мы сами это будем контролировать."
 ask_Mantetsu_for_railway: "Конечно, мы всегда можем попросить Мантэцу сделать это за нас."

 fengtian_events.194.t.jinhan: "Восстановленна железная дорога Цзиньхань"
 fengtian_events.194.t.jinpu: "Восстановленна железная дорога Цзиньпу"
 fengtian_events.194.t.yuehan: "Юэханьская железная дорога восстановлена"
 fengtian_events.194.d.jinhan_mantetsu: "Операции вдоль железной дороги Цзинхань были успешно переданы бюрократам и инженерам Мантэцу. Их опыт должен иметь решающее значение для обеспечения своевременного движения поездов, несмотря на политические издержки передачи китайских железных дорог под иностранный контроль."
 fengtian_events.194.d.jinpu_mantetsu: "Операции вдоль железной дороги Цзиньпу были успешно переданы бюрократам и инженерам Мантэцу. Их опыт должен иметь решающее значение для обеспечения своевременного движения поездов, несмотря на политические издержки передачи китайских железных дорог под иностранный контроль."
 fengtian_events.194.d.yuehan_mantetsu: "Операции вдоль Юэханьской железной дороги были успешно переданы бюрократам и инженерам Мантэцу. Их опыт должен иметь решающее значение для обеспечения своевременного движения поездов, несмотря на политические издержки передачи китайских железных дорог под иностранный контроль."
 fengtian_events.194.d.jinhan_national: "После огромных усилий была собрана команда бюрократов и инженеров, чтобы взять под свой контроль железную дорогу Цзинхань. Некоторых сотрудников пришлось отозвать на пенсию, у других были сомнительные аттестаты об окончании школы, но, тем не менее, поезда до сих пор ходят вовремя."
 fengtian_events.194.d.jinpu_national: "Наконец-то собрана команда бюрократов и инженеров, чтобы взять под контроль железную дорогу Цзиньпу. Многие из новолицых сотрудников, некоторые из которых прошли обучение совсем недавно, нервничали по этому поводу. Тем не менее, восстановление этой железной дороги, когда-то принадлежавшей иностранным владельцам, является важным шагом вперед в восстановлении национальной гордости Китая."
 fengtian_events.194.d.yuehan_national: "Команда бюрократов и инженеров наконец-то собралась в штаб-квартире Юэханьской железной дороги в Гуанчжоу, и хотя вывеска на входе на китайском языке, бортовые журналы и другие документы внутри остаются в основном на немецком. Преобразование всей этой информации станет еще одной задачей, и найти немецкоязычных инженеров без опыта сотрудничества было сложно. \n\nТем не менее, это значительная пропагандистская победа."
 fengtian_events.194.a: "Отлично."

 fengtian_events.195.t: "Железнодорожная система Мантэцу"
 fengtian_events.195.d: "В связи с тем, что сотрудники Мантэцу разместились в последней "отреставрированной" железнодорожной штаб-квартире, компания решила создать два региональных филиала для контроля деятельности в Северном и Центральном Китае. Транспортная компания Северного Китая со штаб-квартирой в Пекине возьмет на себя управление операциями между Шаньхайгуань и Янцзы, а Транспортная компания Центрального Китая будет работать между этим районом и Гуанчжоу на юге. По иронии судьбы японцы теперь достигли того, чего никогда не могла сделать Германская Остазия."
 fengtian_events.195.a: "Чудо инженерной мысли."

 fengtian_events.196.t: "Национальная собственность на железные дороги"
 fengtian_events.196.d: "Центральное правительство, наконец, выполнило свою миссию по устранению влияния Запада на нашу железнодорожную систему. Это очень дорогостоящий проект, но большая пропагандистская победа, поскольку владение Западом китайскими железными дорогами долгое время считалось верхом национального унижения. В долгосрочной перспективе эти усилия приведут к увеличению доходов правительства и удешевлению дальнейшего расширения инфраструктуры."
 fengtian_events.196.a: "Очередная победа Китая над Западом!"

 fengtian_events.197.t: "Интересная находка!"
 fengtian_events.197.d_Wang: "Our agents operating in the Legation Cities have made a surprising discovery in Shanghai's Palace Hotel, which recently paid host to a Fengtian Government delegation led by noted diplomat Wang Yintai. A high-level codebook, found by hotel cleaners, provides a comprehensive look at Fengtian's decryption methods, and provides full access to their encrypted communications. This will prove a treasure trove for our spies, both at home and elsewhere.\n\nThe Fengtian Government will eventually change its codes, but for now the advantage is ours."
 fengtian_events.197.d_Ruan: "Наши агенты, работающие в Токио, сделали удивительное открытие в идзакая в Нихонбаси. Книга с шифрами, кажется, была оставлена в задней комнате, арендованной Жуаном Чжэндуо, министром иностранных дел Фэнтяня, и его окружением. Хотя подтверждение подлинности книги может занять несколько дней, тем не менее, она предлагает всесторонний обзор методов дешифрования Фэнтяня и обеспечивает полный доступ к их зашифрованным сообщениям. Это окажется сокровищницей для наших шпионов, как дома, так и в других местах. \n\nФэнтяньское Правительство со временем изменит свои кодексы, но на данный момент преимущество принадлежит нам."
 fengtian_events.197.d_Tang: "Наши агенты, работающие в Городах-Концессиях, сделали в Тяньцзине удивительное открытие, в частности, книгу с шифрами Фэнтяня, купленную у местной зеленой банды. Судя по всему, преступники получили книгу от куртизанки, которая ехала из Чэндэ, где печально известный экстравагантный министр внутренних дел Фэнтяня Тан Юйлинь, как известно, устроил пышную вечеринку. Хотя подтверждение подлинности книги может занять несколько дней, тем не менее, она предлагает всесторонний обзор методов дешифрования Фэнтяня и обеспечивает полный доступ к их зашифрованным сообщениям. Это окажется сокровищницей для наших шпионов, как дома, так и где-либо еще. \n\nФэнтяньское Правительство со временем изменит свои кодексы, но на данный момент преимущество принадлежит нам."
 fengtian_events.197.d_JAPwang: "Our agents operating in the Legation Cities have made a surprising discovery in Shanghai's Palace Hotel, which recently paid host to a Fengtian Government delegation led by noted diplomat Wang Yintai. A high-level codebook, originally pocketed by hotel cleaners, found its way into the hands of German Abteilung III agents, who were summarily relieved of their burden by our own brave operatives. Though it may take a few days to confirm that the book is legitimate, it nonetheless offers an even more comprehensive look into Fengtian's communications than we already possess.\n\nAs Fengtian's 'fraternal ally' we ought to return the book, even if it serves only to demonstrate our superiority, but we could also choose to keep it."
 fengtian_events.197.d_JAPtang: "Наши агенты, работающие в Городах-Концессиях, сделали в Тяньцзине удивительное открытие, в частности, книгу с шифрами правительства Фэнтяня, "приобретенную" у местной Зеленой банды. Бандиты явно намеревались продать книгу тому, кто больше заплатит, но, к счастью, наши храбрые оперативники просто захватили ее силой. После некоторого расследования было обнаружено, что книга попала на черный рынок во время щедрой вечеринки в Чэндэ, которую устроил министр внутренних дел Фэнтяня Тан Юйлинь. Она почти наверняка подлинная и предлагает еще более полный взгляд на коммуникации Фэнтяня, чем мы уже имеем. \n\nКак "братский союзник" Фэнтянь, мы должны вернуть книгу, даже если она служит только для демонстрации нашего превосходства, но мы также можем оставить ее себе."
 fengtian_events.197.d_JAPruan: "Столичная полиция Токио сделала интересное открытие в Nihonbashi Izakaya, где министр иностранных дел Фэнтяня и его окружение недавно арендовали подсобное помещение. Книга с шифрами, кажется, была оставлена под столом, и хотя может потребоваться несколько дней, чтобы подтвердить подлинность книги, это предлагает событие более всестороннее рассмотрение коммуникаций Фэнтяня, чем мы уже имеем. \n\nКак "братский союзник" Фэнтянь, мы должны вернуть книгу, даже если она служит только для демонстрации нашего превосходства, но мы также можем оставить ее себе."
 fengtian_events.197.d_JAPruanremoved: "Столичная полиция Токио сделала интересное открытие в Nihonbashi Izakaya, где министр иностранных дел Фэнтяня и его окружение недавно арендовали подсобное помещение. Книга с шифрами, кажется, была оставлена под столом, и хотя может потребоваться несколько дней, чтобы подтвердить подлинность книги, это предлагает событие более всестороннее рассмотрение коммуникаций Фэнтяня, чем мы уже имеем. \n\nК сожалению, пропажа книги, похоже, было замечено, о чем свидетельствует отстранение Руана от должности. Его увольнение как высокопоставленного члена Ассоциации Конкордия является оскорблением наших усилий по поддержке правительства Фэнтяня и развитию Маньчжурского региона. И Квантунская армия в Шэньяне, и министерство иностранных дел здесь, в Токио, уже требуют ответа. \n\nМы можем быть вежливыми или полностью проигнорировать их."
 fengtian_events.197.a: "Это переворот разведки!"
 fengtian_events.197.b: "Вежливо вернуть книжку с шифрами"
 fengtian_events.197.c: "Сохранить книгу с шифрами"
 fengtian_events.197.d: "Требуйте восстановления Руана!"

 fengtian_events.198.t: "Япония возвращает нашу книгу с шифрами"
 fengtian_events.198.d: "Кажется, что Япония вернуля книгу с шифрами, недавно утерянную нашим неумелым министром. Президент Мантэцу Юске Мацуока передал ее сегодня утром лично Великий Маршалу. \n\nЕсть все основания полагать, что японцы сделали копии наших сверхсекретных кодов, и Общество Согласия, несомненно, воспользуется этим в своих интересах. Но все могло быть и хуже."
 fengtian_events.198.a: "Намного, намного хуже."

 fengtian_events.199.t: "Япония требует восстановления должности Руана Чжендуо"
 fengtian_events.199.d: "Назвав отстранение нашего бывшего министра иностранных дел "неприемлемым" и сердито размахивая книгой с шифрами "потерянной" в Токио, японский дипломат потребовал немедленного восстановления Руана Чжэндуо. Не может быть никаких сомнений в том, что японцы уже скопировали наши сверхсекретные коды, и "история", предоставленная для объяснения их "открытия" в Nihonbashi Izakaya, кажется маловероятной. \n\nТем не менее, с Японией шутить нельзя, и гнев дипломата, несомненно, отражается в Токио. Мы должны сделать следующий шаг осторожно."
 fengtian_events.199.a: "Восстановить Руана в должности"
 fengtian_events.199.b: "Они должны быть благодарны, что мы не расстреляли его"

 fengtian_events.211.t: "Вспыльчивые союзники"
 fengtian_events.211.d: "Чэнь Тяоюань из Анциньской Клики, наш новый союзник, а также Чжан Цзунчан, который давно поддерживает с нами хорошие отношения и когда-то сражался на нашей стороне, не имеют хороших отношений. \n\nЧто еще хуже, так это то, что Чен считает свою клику Аньцин полноправным правителем всех пяти основных провинций, составляющих Лигу. Чжан также стремится вступить в конфликт, но, скорее всего, не будет удовлетворен, если останется ни с чем, что неизбежно произойдет, если Чен будет настаивать на контроле всех пяти провинций. Мы должны начать думать о решении, потому что мы определенно не хотим войны между нашими союзниками."
 fengtian_events.211.a: "Я надеюсь, что все закончится хорошо..."

 fengtian_events.213.t: "Шаньдун-Аньцинская военная конференция"
 fengtian_events.213.d1: "Лига Ци Сеюаня, которая считала себя преемницей Лиги Восьми Провинций Сунь Чуаньфана, распалась, поскольку на нее напали с трех сторон. Две из них, клика Аньцин и клика Шаньдун, являются нашими союзниками. Аньцинская клика Чэнь Тяоюаня успешно взяла под свой контроль все северные провинции, и только возрожденный левый Гоминьдан находится на юге. Однако это не устраивает Чжан Цзунчан из Шаньдуна, который считает, что контроль над северной провинцией Цзянсу (Сюхай, Хуайян, Наньтун) должен быть его. \n\nМы должны предотвратить войну между ними любой ценой, поскольку это может привести к их краху, и вместо этого Гоминьдан получит контроль над пятью провинциями. Должны ли мы быть посредниками между ними?"
 fengtian_events.213.d2: "Лига Ци Сеюаня, которая считала себя преемницей Лиги восьми провинций Сунь Чуаньфана, распалась, поскольку на нее напали с трех сторон. Две из них, клика Аньцин и клика Шаньдун, являются нашими союзниками. Шаньдунская клика Чжан Цзунчана захватила часть севера Лиги в провинции Цзянсу (Сюхай, Хуайян, Наньтун). Это неприемлемо для Чена, который считает себя преемником Лиги и следовательно, законным владельцем провинции. \n\nМы должны предотвратить войну между ними любой ценой, поскольку это может привести к их краху, и вместо этого Гоминьдан получит контроль над пятью провинциями. Должны ли мы быть посредниками между ними?"
 fengtian_events.213.d3: "Лига Ци Сеюаня, которая считала себя преемницей Лиги восьми провинций Сунь Чуаньфана, распалась, поскольку на нее напали с трех сторон. Две из них, клика Аньцин и клика Шаньдун, являются нашими союзниками. Шаньдунская клика Чжан Цзунчана захватила части северной провинции Цзянсу (Сюхай, Хуайян, Наньтун), но также и государства еще дальше на юг. Это совершенно неприемлемо для Чена, который считает, что Чжан контролирует слишком большую часть бывшей территории Лиги, которая, по его мнению, по праву принадлежит Аньцину. \n\nМы должны предотвратить войну между ними любой ценой, поскольку это может привести к их краху, и вместо этого Гоминьдан получит контроль над пятью провинциями. Должны ли мы быть посредниками между ними?"
 fengtian_events.213.a: "Протянуть руку."
 fengtian_events.213.b: "Не стоит посредничать между этими двумя"

 #for ANQ:
 fengtian_events.214.t: "Фэнтянь стремится к посредничеству"
 fengtian_events.214.d1: "Наша взаимная война против Нанкинской клики была успешной только благодаря нашему обещанию уважать территориальные завоевания Чжан Цзунчана. Однако Чжан Цзунчан продолжал свое безосновательное заявление о том, что Чжан Цзолинь пообещал ему провинции Аньцин. Заставить Чжан Цзолиня выступить посредником в этом вопросе должно быть просто, и мы не сомневаемся, что Чжан Цзолинь согласится с нашими требованиями к Аньцину. На случай, если оба Чжана предадут нас, мы все равно должны нести бдительность на границе Шаньдуна."
 fengtian_events.214.d2: "Наша взаимная война против Нанкинской клики была успешной только благодаря нашему обещанию уважать территориальные завоевания Чжан Цзунчана. Однако Чжан Цзунчан продолжал свое безосновательное заявление о том, что Чжан Цзолинь пообещал ему провинции Аньцин. Чжан Цзунчан даже зашел так далеко, что незаконно аннексировал часть провинции Цзянсу (штаты Сюхай, Хуайян, Наньтун). Заставить Чжан Цзолиня выступить посредником в этом вопросе должно быть просто, и мы не сомневаемся, что Чжан Цзолинь согласится с нашими требованиями к Аньцину. На случай, если оба Чжана предадут нас, мы все равно должны нести бдительность на границе Шаньдуна."
 fengtian_events.214.d3: "Наша взаимная война против Нанкинской клики была успешной только благодаря нашему обещанию уважать территориальные завоевания Чжан Цзунчана. Однако Чжан Цзунчан продолжал свое безосновательное заявление о том, что Чжан Цзолинь пообещал ему провинции Аньцин. Чжан Цзунчан даже зашел так далеко, что незаконно аннексировал критические районы провинции Цзянсу (Сюхай, Хуайян, Наньтун). Заставить Чжан Цзолиня выступить посредником в этом вопросе должно быть просто, и мы не сомневаемся, что Чжан Цзолинь согласится с нашими требованиями к Аньцину. На случай, если оба Чжана предадут нас, мы все равно должны нести бдительность на границе Шаньдуна."
 fengtian_events.214.d4: "Наша взаимная война против Нанкинской клики была успешной только благодаря нашему обещанию уважать территориальные завоевания Чжан Цзунчана. Однако Чжан Цзунчан продолжал свое безосновательное заявление о том, что Чжан Цзолинь пообещал ему провинции Аньцин. Чжан Цзунчан даже зашел так далеко, что незаконно аннексировал большую часть провинции Цзянсу (Сюхай, Хуайян, Наньтун). Заставить Чжан Цзолиня выступить посредником в этом вопросе должно быть просто, и мы не сомневаемся, что Чжан Цзолинь согласится с нашими требованиями к Аньцину. На случай, если оба Чжана предадут нас, мы все равно должны нести бдительность на границе Шаньдуна."
 fengtian_events.214.a: "Чжан остается угрозой."
 fengtian_events.214.b: "Они могут оставить весь Цзянсу."
 fengtian_events.214.c: "Они могут оставить только Цзянсу."
 fengtian_events.214.d: "Мы требуем всех пяти провинций."
 fengtian_events.214.e: "Мы не позволим им выступить посредником."

 #for SHD:
 fengtian_events.215.t: "Фэнтянь стремится к посредничеству"
 fengtian_events.215.d1: "Наша взаимная война против Нанкинской клики была успешной только благодаря нашему обещанию уважать территориальные завоевания Чэнь Тяоюаня. Однако Чэнь Тяоюань продолжал свое безосновательное заявление о том, что Чжан Цзолинь пообещал ему провинции Аньцин. Чэнь Тяоюань даже зашел так далеко, что незаконно аннексировал всю провинцию Цзянсу (Сюхай, Хуайян, Наньтун), чтобы поддержать это утверждение. Заставить Чжан Цзолиня выступить посредником в этом вопросе должно быть просто, и мы не сомневаемся, что Чжан Цзолинь согласится с нашими требованиями к Аньцину. На всякий случай, если Чжан и Чен намерены предать нас, мы все равно должны следить за границей Аньцина."
 fengtian_events.215.d2: "Наша взаимная война против Нанкинской клики была успешной только благодаря нашему обещанию уважать территориальные завоевания Чэнь Тяоюаня. Однако Чэнь Тяоюань продолжал свое безосновательное заявление о том, что Чжан Цзолинь пообещал ему провинции Аньцин. Чэнь Тяоюань даже зашел так далеко, что незаконно аннексировал части провинции Цзянсу (Сюхай, Хуайян, Наньтун), чтобы поддержать это утверждение. Заставить Чжан Цзолиня выступить посредником в этом вопросе должно быть просто, и мы не сомневаемся, что Чжан Цзолинь согласится с нашими требованиями к Аньцину. На всякий случай, если Чжан и Чен намерены предать нас, мы все равно должны следить за границей Аньцина."
 fengtian_events.215.d3: "Наша взаимная война против Нанкинской клики была успешной только благодаря нашему обещанию уважать территориальные завоевания Чэнь Тяоюаня. Однако Чэнь Тяоюань продолжал свое безосновательное заявление о том, что Чжан Цзолинь пообещал ему провинции Аньцин. Чэнь Тяоюань даже зашел так далеко, что незаконно аннексировал столицу провинции Цзянсу (Сюхай, Хуайян, Наньтун), чтобы поддержать это утверждение. Заставить Чжан Цзолиня выступить посредником в этом вопросе должно быть просто, и мы не сомневаемся, что Чжан Цзолинь согласится с нашими требованиями к Аньцину. На всякий случай, если Чжан и Чен намерены предать нас, мы все равно должны следить за границей Аньцина."
 #they have other parts:
 fengtian_events.215.a: "Мы требуем оставить только Цзянсу."
 #they dont have:
 fengtian_events.215.b: "Мы требуем, чтобы сейчас у нас была вся Цзянсу."
 fengtian_events.215.c: "Мы сохраняем все наши территории."
 fengtian_events.215.d: "Мы не позволим им выступить посредником."

 fengtian_events.216.t: "Аньцин требует от Чжана Цзунчана прекращения иска"
 fengtian_events.216.d1: "Чэнь Тяоюань прибыл в Шэньян, чтобы урегулировать территориальный спор с Чжан Цзунчаном. Хотя ни один из них не угрожает нашим завоеваниям, безусловно, Чжан и Чен способны пролить первую кровь, если Чжан Цзолинь не сможет уладить спор. Долгие часы переговоров с Чэнь Тяоюанем показывают, что он пришел к выводу, что Чжан Цзунчан и Шаньдун теперь обязаны нам. Несмотря на объем ресурсов, вложенных в Шаньдун, из разговора стало очевидно, что Чен считает, что криминальные командиры в Шаньдуне слишком опасны, чтобы работать на благо Китая."
 fengtian_events.216.d2: "Чэнь Тяоюань прибыл в Шэньян, чтобы урегулировать территориальный спор с Чжан Цзунчаном. Хотя ни один из них не угрожает нашим завоеваниям, безусловно, Чжан и Чен способны пролить первую кровь, если Чжан Цзолинь не сможет преодолеть границу. Долгие часы переговоров с Чэнь Тяоюанем показывают, что он пришел к выводу, что Чжан Цзунчан и Шаньдун теперь обязаны нам. Из-за количества ресурсов, вложенных в Шаньдун, Чен предлагает разрешить Чжану Цзунчану сохранить свои достижения в Цзянсу, но провозгласить остальную часть Аньцина. Чжан может оставить себе Цзянсу"
 fengtian_events.216.d3: "Чэнь Тяоюань прибыл в Шэньян, чтобы урегулировать территориальный спор с Чжан Цзунчаном. Хотя ни один из них не угрожает нашим завоеваниям, безусловно, Чжан и Чен способны пролить первую кровь, если Чжан Цзолинь не сможет преодолеть границу. Долгие часы переговоров с Чэнь Тяоюанем показывают, что он пришел к выводу, что Чжан Цзунчан и Шаньдун теперь обязаны нам. Из-за количества ресурсов, вложенных в Шаньдун, Чен предлагает разрешить Чжану Цзунчану сохранить свои достижения в Цзянсу, но провозгласить остальную часть Аньцина. Чжан может оставить себе Цзянсу."
 fengtian_events.216.d4: "Чэнь Тяоюань прибыл в Шэньян, чтобы урегулировать территориальный спор с Чжан Цзунчаном. Хотя ни один из них не угрожает нашим завоеваниям, безусловно, Чжан и Чен способны пролить первую кровь, если Чжан Цзолинь не сможет преодолеть границу. Долгие часы переговоров с Чэнь Тяоюанем показывают, что он пришел к выводу, что Чжан Цзунчан и Шаньдун теперь обязаны нам. Из-за количества ресурсов, вложенных в Шаньдун, Чен предлагает, чтобы Чжан Цзунчан возвратил Цзянсу, и провозгласить власть Чена над Аньцином."
 fengtian_events.216.a: "Принято к сведению."

 fengtian_events.217.t: "Шаньдун требует от Чэнь Тяоюаня прекращения иска"
 fengtian_events.217.d1: "Чжан Цзунчан прибыл в Шэньян, чтобы уладить территориальный спор с Чэнь Тяоюанем. Хотя ни один из них не угрожает нашим знаниям, безусловно, Чжан и Чен способны пролить первую кровь, если Чжан Цзолинь не сможет уладить спор. Долгие часы переговоров с Чжан Цзунчаном показывают, что он пришел к выводу, что Чэнь Тяоюань и Аньцин теперь обязаны нам. Несмотря на объем ресурсов, вложенных в Аньцин, из разговора стало очевидно, что Чжан Цзунчан считает, что командиры в Аньцине слишком опасны, чтобы работать на благо Китая. Чжан Цзунчан настаивает на том, чтобы он оставил Цзянсу себе."
 fengtian_events.217.d2: "Чжан Цзунчан прибыл в Шэньян, чтобы уладить территориальный спор с Чэнь Тяоюанем. Хотя ни один из них не угрожает нашим знаниям, безусловно, Чжан и Чен способны пролить первую кровь, если Чжан Цзолинь не сможет уладить спор. Долгие часы переговоров с Чжан Цзунчаном показывают, что он пришел к выводу, что Чэнь Тяоюань и Аньцин теперь обязаны нам. Несмотря на объем ресурсов, вложенных в Аньцин, из разговора стало очевидно, что Чжан Цзунчан считает, что командиры в Аньцине слишком опасны, чтобы работать на благо Китая. Чжан Цзунчан настаивает на том, чтобы ему отдали весь Цзянсу."
 fengtian_events.217.d3: "Чжан Цзунчан прибыл в Шэньян, чтобы уладить территориальный спор с Чэнь Тяоюанем. Хотя ни один из них не угрожает нашим знаниям, безусловно, Чжан и Чен способны пролить первую кровь, если Чжан Цзолинь не сможет уладить спор. Долгие часы переговоров с Чжан Цзунчаном показывают, что он пришел к выводу, что Чэнь Тяоюань и Аньцин теперь обязаны нам. Несмотря на объем ресурсов, вложенных в Аньцин, из разговора стало очевидно, что Чжан Цзунчан считает, что командиры в Аньцине слишком опасны, чтобы работать на благо Китая. Чжан Цзунчан настаивает на том, чтобы он сохранил всю свою новую территорию."
 fengtian_events.217.a: "Принято к сведению."

 fengtian_events.218.t: "Сделать предложение"
 fengtian_events.218.desc: "Чжан Цзолинь принял во внимание две преобладающие идеи Чэнь Тяоюаня и Чжан Цзунчан. Опасения по поводу соперничества Чжана и Чэня подтвердились в ходе этих переговоров, но Чжан Цзолиню было оказано удивительное доверие. Невозможно должным образом предсказать реакцию обоих мужчин, поэтому нет гарантии. Чжан и Чен согласятся с решением Цзолиня. Несмотря на то, что это сделано конфиденциально, сохранение существования союза, а также возможность вынесения приговора со стороны Японии имеют большое значение. После долгих раздумий Чжан Цзолинь решил, что..."
 fengtian_events.218.a: "Шаньдун остается в Шаньдуне"
 fengtian_events.218.b: "Шаньдун получает Цзянсу"
 fengtian_events.218.c: "Шаньдун получает регион Цзянсу"
 fengtian_events.218.d: "Шаньдун получает все"

 #ANQ:
 fengtian_events.219.t: "Фэнтянь делает предложение Аньцину"
 fengtian_events.219.d1: "Чжан Цзолинь передал свое решение Чэнь Тяоюаню. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун должен уступить всю территорию за пределами Шаньдуна. Для большинства военного персонала Чена это дипломатическая победа. Однако некоторые офицеры считают, что такой бешеной собаке, как Чжан Цзунчан, нельзя позволять вообще оставаться у власти."
 fengtian_events.219.d2: "Чжан Цзолинь передал свое решение Чэнь Тяоюаню. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун может и дальше оккупировать Цзянсу. Для большей части военного персонала Чэня это дипломатическое поражение и узаконивает тиранию Чжан Цзунчана. Однако мы знаем, что это только временно, и сейчас наша самая важная цель - победить Гоминьдан. Вероятно, нам следует принять это сейчас, если мы не хотим вести войну на два фронта."
 fengtian_events.219.d3: "Чжан Цзолинь передал свое решение Чэнь Тяоюаню. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун должен получить всю провинцию Цзянсу, чтобы успокоить его, по крайней мере временно. Для большей части военного персонала Чэня это дипломатическое поражение и узаконивает тиранию Чжан Цзунчана. Однако мы знаем, что после того, как с Гоминьданом будет покончено, мы можем сосредоточить все свое внимание на возвращении Цзянсу, так что, возможно, нам стоит согласиться с этим на данный момент."
 fengtian_events.219.d4: "Чжан Цзолинь передал свое решение Чэнь Тяоюаню. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун может продолжать оккупировать всю территорию, которую они отобрали у Лиги Восьми Провинций. Это было бы серьезным дипломатическим поражением, и оно показывает значительный провал со стороны Чжан Цзолиня. Мы не можем принять это."
 fengtian_events.219.a: "Принять"
 fengtian_events.219.b: "Отклонить"

 #SHD:
 fengtian_events.220.t: "Фэнтянь делает предложение Шаньдуну"
 fengtian_events.220.d1: "Чжан Цзолинь передал свое решение Чжан Цзунчану. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун должен уступить всю территорию за пределами Шаньдуна. Для военного штаба Чжан Цзунчана это серьезное поражение, поскольку мы по праву забрали эту территорию у бывшей Лиги Восьми Провинций, которой больше не существует. Чэнь Тяоюань не имеет права на эту землю, которое есть у нас."
 fengtian_events.220.d2: "Чжан Цзолинь передал свое решение Чжан Цзунчану. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун может и дальше оккупировать провинцию Цзянсу (Сюхай, Хуайян, штаты Наньтун). Это была бы по крайней мере временная победа, так как это повысит наши шансы удержать Цзянсу. Однако нам следует быть осторожными, так как Аньцин может попытаться восстановить полный контроль после того, как расправится с Гоминьданом на юге."
 fengtian_events.220.d3: "Чжан Цзолинь передал свое решение Чжан Цзунчану. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун получит провинцию Цзянсу (Сюхай, Хуайян, штаты Наньтун). Для большинства военного персонала Чжан Цзунчана это дипломатическая победа. Аньцину это не понравится, поэтому вполне возможно, что они затаят обиду и выступят против нас, как только расправятся с Гоминьданом. Нам следует быть очень осторожными."
 fengtian_events.220.d4: "Чжан Цзолинь передал свое решение Чжан Цзунчану. По вопросу о Аньциньско-Шаньдуньской границы Чжан Цзолинь заявил, что Шаньдун получит провинцию Цзянсу (Сюхай, Хуайян, штаты Наньтун). Нам также разрешено оставить за собой остальную территорию, которую мы приобрели у Лиги Восьми Провинций. Это большая победа, но Аньцин наверняка этого не примет. Однако это даст нам прочную стратегическую позицию и поможет нам в потенциальном конфликте." 
 fengtian_events.220.a: "Принять"
 fengtian_events.220.b: "Отклонить"

 fengtian_events.221.t: "Предложение Чжан Цзолиня принято" 
 fengtian_events.221.d: "Предложение Фэнтянь было принято и Чжан Цзунчаном, и Чен Тяоюанем. Возможно, это начало новой эры сотрудничества при Фэнтяне, которое приведет к объединению нации. Многие военнослужащие полны надежды, называя это триумфом, которого не смог добиться даже У Пэйфу."
 fengtian_events.221.a: "Мир... пока."

 fengtian_events.222.t: "Предложение Чжан Цзолиня отклонено" 
 fengtian_events.222.d: "Предложение Фэнтяня было отвергнуто Чжан Цзунчаном и Чен Тяоюанем. Похоже, что в обозримом будущем они останутся враждебными и откажутся от сотрудничества. Возможно, это сигнал о том, что дипломатические переговоры о воссоединении Китая обречены на провал. Некоторые военнослужащие соглашаются, ссылаясь на то, что даже У Пэйфу не смог придумать дипломатического решения."
 fengtian_events.222.a: "Прискорбно, но неудивительно."

 fengtian_events.223.t: "Шаньдун и Аньцин заключают сделку" 
 fengtian_events.223.d: "После того, как нам не удалось установить временный мир между нашими союзниками, Шаньдунем и Аньцинем, мы получили известие от дипломатов Аньцина и Шаньдуна о том, что они заключили свой собственный временный мир, поскольку они были недовольны нашими усилиями. Судя по всему, скромный дипломат пошел на уступки и предложил сделку совершенно добровольно. Хотя этот храбрый человек сделал доброе дело и установил мир в нашу пользу, он подчеркивает нашу собственную некомпетентность."
 fengtian_events.223.a: "Удивительно."

 fengtian_events.224.t: "Шаньдун и Аньцин объявляют войну" 
 fengtian_events.224.d: "Мы не уверены, что именно произошло, но похоже, что переговоры между Шаньдунем и Аньцином как-то прервались. Личности Чжан Цзунчана и Чэнь Тяоюаня были очевидными факторами в этом разрыве. Аньцин и Шаньдун, несмотря на то, что оба они выступают за победу по Фэнтяню, похоже, готовы развернуть войска друг против друга. Военный состав разделен: одни выступают за защиту наших старых инвестиций в Шаньдун через Чжан Цзунчан, а другие за защиту более богатой долины реки под Чэнь Тяоюанем."
 fengtian_events.224.a: "Остановить Чжана"
 fengtian_events.224.b: "Остановить Чена"
 fengtian_events.224.c: "Мы сделали все что могли."

 fengtian_events.225.t: "Гоминьдан побежден - конференция по новой войне" 
 fengtian_events.225.d1: "Левый Гоминьдан успешно разгромлен. Хотя это отличная новость и означает, что наши союзники контролируют Пять Провинций, что дает нам огромное преимущество перед [QIE.GetNameDef], это также создает проблемы. Вскоре после того, как появилась новость о разгроме Гоминьдана, мы получили телеграмму от Чжан Цзунчана из клики Шаньдун. \n\nВ телеграмме, которая часто идет по касательной и отказывается доходить до сути до самого конца, Чжан описывает силу нашего "Старого Альянса", и поэтому мы должны поддержать его, чтобы получить контроль над Пятью Провинциями. Это довольно возмутительно, так как это обязательно приведет к войне с Аньцинской Кликой, что будет катастрофой. Однако это правда, что Чжан Цзунчан и Чжан Цзолинь имеют долгую историю. Нам нужно будет провести еще одну конференцию, чтобы определить решение, которое устраивает и Чжана, и Чэна Тяоюань из аньцинской клики."
 fengtian_events.225.d2: "Левый Гоминьдан успешно разгромлен. Хотя это отличная новость и означает, что наши союзники контролируют Пять Провинций, что дает нам огромное преимущество перед [QIE.GetNameDef], это также создает проблемы. Вскоре после того, как стало известно о разгроме Гоминьдана, мы получили телеграмму от Чжан Цзунчана из клики Шаньдун и Чэнь Тяоюаня из клики Аньцин. \n\nВ телеграмме Чжана содержится просьба отдать дань уважения нашему старому союзу и поддержать его в выдвижении претензий на остальную часть провинции Цзянсу (Сюхай, Хуайян, штаты Наньтун), которую он контролирует лишь частично. Это правда, что Чжан Цзунчан и Чжан Цзолинь имеют долгую историю. Вместо этого Чен описывает тот факт, что как законный преемник Лиги всех Пяти Провинций должны подпадать под его власть. Он требует, чтобы ему немедленно вернули весь Цзянсу. Если все закончится хорошо, нам придется провести еще одну конференцию, чтобы определить решение, которое устраивает и Чжана, и Чэна Тяоюань из Аньцинской Клики."
 fengtian_events.225.d3: "Левый Гоминьдан успешно разгромлен. Хотя это отличная новость и означает, что наши союзники контролируют Пять Провинций, что дает нам огромное преимущество перед [QIE.GetNameDef], это также создает проблемы. Вскоре после того, как появилась новость о разгроме Гоминьдана, мы получили телеграмму от Чэнь Тяоюаня из клики Аньцин. \n\nЧен считает возмутительным, что Чжан Цзунчан из клики Шаньдун может владеть всем Цзянсу (Сюхай, Хуайян, штаты Наньтун), учитывая, что Аньцинская клика Чэня является законным преемником Лиги. Хотя он и прав, мы никогда не признавали Лигу изначально, а Чжан - наш старый друг. Если все закончится хорошо, нам придется провести еще одну конференцию, чтобы определить решение, которое устраивает и Чжан, и Чэнь Тяоюань из Аньцинской Клики."
 fengtian_events.225.a: "Подумайте о решении"
 fengtian_events.225.b: "Пусть борются с этим"

 fengtian_events.226.t: "Решение конфликта" 
 fengtian_events.226.d1: "Для нас было бы предпочтительнее, если бы Чжан Цзунчан просто отступил и позволил Чену контролировать все пять провинций. Это избавило бы нас от множества проблем. Однако с Чжаном вы никогда не можете быть уверены, как он отреагирует, и принуждение его отступить может привести к тому, что он сделает то, что он хочет, в любом случае. Конечно, он тоже мог испугаться нашей военной мощи и просто согласиться. Придется тщательно обдумать это."
 fengtian_events.226.d2: "Поскольку и Чжан, и Чэнь в настоящее время недовольны, проблему становится трудно решить. Мы могли бы заставить любого отступить и позволить другому получить то, что они хотят, но это может закончиться очень плохо. Скорее всего, нам придется идти на компромисс."
 fengtian_events.226.d3: "Было бы лучше, если бы Чэнь Тяоюань просто отступил и отдал Цзянсу Чжану. Скорее всего, это решит проблему. Однако Чен - гордый человек и видит в своей клике Аньцин истинного преемника Лиги, которая обязательно включает все пять провинций, включая Цзянсу. Его победы и поддержка населения означают, что он вряд ли просто уступит. Придется искать компромисс."
 fengtian_events.226.a: "Заставить Чжана отступить"
 fengtian_events.226.b: "Заставить Чена отступить"
 fengtian_events.226.c: "Придумайте компромисс"

 fengtian_events.227.t: "Компромиссное решение" 
 fengtian_events.227.d: "Ясно, что Чэнь не уступит, если он не сможет хоть как-то назвать себя хозяином Цзянсу (Сюхай, Хуайян, Наньтун). Чжан также никогда не обрадуется, если оставит только Шаньдун. Это означает, что нам так или иначе придется разделить Цзянсу. Одна из возможностей - просто разделить западный регион Сюхай, который отдадим Чжану, от восточного региона Хуайян, с последним, включающим Наньтун и идущим в Чен. Маловероятно, что Чен сочтет это достаточным, поскольку провинция управлялась из Сюйчжоу, где также встречаются важнейшие железные дороги провинции. Другая возможность - отделить экономический контроль от политического. В этом сценарии можно было бы официально управлять правительством Цзянсу, которым, конечно, должен был бы руководить хотя бы несколько независимый губернатор. Затем другому будет разрешено назначить вице-губернатора, который будет контролировать все ресурсы провинции и помимо прочего, сможет взимать налоги и проводить вербовку."
 fengtian_events.227.a: "Разделить Цзянсу между ними"
 fengtian_events.227.b: "Чен получает Цзянсу, права на эксплуатацию - Чжан"
 fengtian_events.227.c: "Чжан получает Цзянсу, права на эксплуатацию - Чэнь"

 fengtian_events.228.t: "Фэнтянь заставляет нас отступить!" 
 fengtian_events.228.d: "Фэнтяньское Правительство заявило, что наша бескомпромиссная позиция является причиной того, что сделка не была заключена. Они говорят, что единственное решение состоит в том, чтобы мы отступили и отозвали все наши требования, иначе им пришлось бы серьезно подумать о военных действиях. Это, конечно, возмутительно и совсем не похоже на постоянное решение. Придется блефовать."
 fengtian_events.228.a: "Давайте блефовать"

 fengtian_events.229.t: "Фэнтянь предлагает компромисс" 
 fengtian_events.229.d1split: "Фэнтяньское Правительство, пытаясь решить нашу проблему с Шаньдуном, предложило компромисс. Они говорят, что разделив провинцию Цзянсу, мы оба получим что-то ценное. Мы получим Хуайян, включая Наньтун. Конечно, мы не можем принять это, так как Сюхай - это сердце Цзянсу, а город Сюйчжоу - важный железнодорожный узел. Мы не можем согласиться с уступкой части Пяти Провинций! Фэнтяньское Правительство совершенно не сможет разрядить ситуацию."
 fengtian_events.229.d1specrzhang: "Фэнтяньское Правительство, пытаясь решить нашу проблему с Шаньдуном, предложило компромисс. Они говорят, что мы будем контролировать провинцию политически. Мы должны были бы назначить несколько независимого губернатора в знак доброй воли по отношению к Шаньдуну. Взамен Чжан получит экономический контроль над провинцией, что означает, что ему будет разрешено взимать налоги и проводить набор в армию. Это означает, что мы можем с уверенностью сказать, что контролируем все пять провинций. Предоставление Чжану такого экономического контроля - небольшая плата за мир, особенно если это делает Фэнтянь, нашего господина, счастливым."
 fengtian_events.229.d1specrchen: "Фэнтяньское Правительство, пытаясь решить нашу проблему с Шаньдуном, предложило компромисс. Они говорят, что мы могли бы позволить политическому контролю быть в руках Чжана, который назначил бы несколько независимого губернатора в знак доброй воли. Взамен мы получили бы экономический контроль над провинцией, включая взимание налогов. Хотя это хорошо, это будет означать, что на всех картах Цзянсу держит Чжан. Мы бы уступили неотъемлемую часть нашей территории, одну из пяти провинций. Это неприемлемо!"
 fengtian_events.229.d2split: "Фэнтяньское Правительство, пытаясь решить нашу проблему с Шаньдуном, предложило компромисс. Они говорят, что разделив провинцию Цзянсу, мы оба получим что-то ценное. Мы доберемся до Сюхая, в который входит город Сюйчжоу, который является важным железнодорожным узлом. Конечно, мы не можем с этим согласиться, так как это оставляет регион без выхода к морю, а также означает, что, несмотря на все наши усилия в войне, мы получаем только половину провинции! Мы не можем принять такое смехотворное предложение. Фэнтяньское Правительство совершенно не сможет разрядить ситуацию."
 fengtian_events.229.d2specrzhang: "Фэнтяньское Правительство, пытаясь решить нашу проблему с Шаньдуном, предложило компромисс. Они говорят, что Чэнь будет контролировать провинцию политически и должен будет назначить несколько независимого губернатора в знак доброй воли по отношению к нам. Взамен мы получим экономический контроль над провинцией, а это значит, что нам будет разрешено взимать налоги и проводить набор в армию. Хотя это означает, что у нас не будет территориальной экспансии для демонстрации наших усилий против Лиги, провинция Цзянсу очень богата. Это позволит нам значительно укрепить наши ряды и даст нам широкие возможности для расширения наших армий, чтобы нанести новый удар в будущем. Тем не менее, полный контроль остается идеальным, и если Чэнь сможет восстановиться, будет очень трудно когда-либо победить его."
 fengtian_events.229.d2specrchen: "Фэнтяньское Правительство, пытаясь решить нашу проблему с Шаньдуном, предложило компромисс. Они говорят, что у нас будет полный политический контроль над Цзянсу, но нам нужно будет назначить несколько независимого губернатора в знак доброй воли по отношению к Аньцину. Взамен они получат экономический контроль над провинцией, включая взимание налогов. Присоединение Цзянсу к нашему контролю означает огромный рост престижа нашего правительства, даже если это означает, что мы не сможем получить такую экономическую выгоду, как нам бы хотелось. Этот вариант очень заманчивый."
 fengtian_events.229.a: "Согласиться"
 fengtian_events.229.b: "Только война может решить это"

 fengtian_events.230.t: "[FROM.GetNameDefCap] заметили наш блеф" 
 fengtian_events.230.d: "[FROM.GetNameDefCap] заметили наш блеф, полагая, что мы не будем ничем по-настоящему рисковать и не поддержим ни Аньцин, ни Шаньдун."
 fengtian_events.230.a: "Мы не будем вмешиваться"
 fengtian_events.230.b: "Мы будем бороться"

 fengtian_events.231.t1: "Шаньдун не отступает"
 fengtian_events.231.t2: "Аньцин не отступает" 
 fengtian_events.231.d1: "Шаньдун был вынужден отступить из-за Фэнтяня, но вместо этого они начали блефовать, и Фэнтянь решил, что пришло время вмешаться."
 fengtian_events.231.d2: "Аньцин был вынужден отступить из-за Фэнтяня, но вместо этого они начали блефовать, и Фэнтянь решил, что пришло время вмешаться."
 fengtian_events.231.a: "Тогда - это война."

 #other rejects:
 fengtian_events.232.t: "Неудачный компромисс"
 fengtian_events.232.d: "Из-за отказа одной из сторон пойти на компромисс, предложенный Фэнтянем, он не был принят. Дипломатия прекращена, и наш враг мобилизуется. В конце концов, похоже, что Фэнтянь не был таким хорошим посредником."
 fengtian_events.232.a: "Тогда - это война."

 fengtian_events.233.t: "Компромисс принят" 
 fengtian_events.233.d: "Компромисс, разработанный Фэнтянем, который включает политический контроль в руках Аньцинской Клики Чэня и экономический контроль, принадлежащий Чжану, был принят всеми сторонами. Это означает, что Шаньдун и Аньцин теперь могут двигаться дальше как союзники под защитой Фэнтяня."
 fengtian_events.233.a: "Отличные новости."

 fengtian_events.234.t: "Компромисс был отклонен" 
 fengtian_events.234.d1: "К сожалению, компромисс был отклонен. Шаньдун не принял компромисс, а это значит, что он бесполезен. Однако Аньцин согласился, но нам нужно, чтобы обе стороны согласились, если мы хотим, чтобы это сработало. Это означает, что наши союзники Шаньдун и Аньцин обязательно вступят в войну. Мы можем решить поддержать одного из двух или просто подождать."
 fengtian_events.234.d2: "К сожалению, компромисс был отклонен. Аньцин не принял компромисс, а это значит, что он бесполезен. Однако Шаньдун согласился, но нам нужно было, чтобы обе стороны согласились, если мы хотим, чтобы это сработало. Это означает, что наши союзники Шаньдун и Аньцин обязательно вступят в войну. Мы можем решить поддержать одного из двух или просто подождать."
 fengtian_events.234.d3: "К сожалению, компромисс был отклонен. Шаньдун и Аньцин отказались от компромисса, сделав его совершенно бесполезным. Это означает, что наши союзники Шаньдун и Аньцин обязательно вступят в войну. Мы можем решить поддержать одного из двух или просто подождать."
 fengtian_events.234.a: "Мы не будем вмешиваться"
 fengtian_events.234.b: "Поддержать Чэня (Аньцин)"
 fengtian_events.234.c: "Поддержать Чжана (Шаньдун)"

 fengtian_events.235.t: "Поддержка Чэня" 
 fengtian_events.235.d: "В связи с нашим решением поддержать клику Аньцин, Чэнь Тяоюаня в его борьбе против Чжан Цзунчана из клики Шаньдун за контроль над Пятью Провинциями и Шаньдунем. Это означает, что мы продолжим поставлять оружие Чэню, что, надеюсь, позволит ему легче побеждать."
 fengtian_events.235.a: "Хорошо."

 fengtian_events.236.t: "Поддержка Чжана" 
 fengtian_events.236.d: "В связи с нашим решением поддержать Шаньдунскую Клику, Чжан Цзунчана в его борьбе против Чэнь Тяоюаня из Аньцинской Клики за контроль над Пятью Провинциями и Шаньдунем. Это означает, что мы перестанем доставлять оружие Чэню и вместо этого начнем доставлять его Чжану. Япония последует нашему примеру."
 fengtian_events.236.a: "Хорошо."

 fengtian_events.237.t: "Фэнтянь отступает" 
 fengtian_events.237.d: "Фэнтяньское Правительство объявило, что останется нейтральным в конфликте между Аньцином и Шаньдунем, то есть мы стоим сами по себе. Конечно, наш враг тоже стоит особняком."
 fengtian_events.237.a: "Отлично."

 fengtian_events.2371.t: "Фэньтян поддерживает Шаньдун"
 fengtian_events.2371.d: "Фэнтяньское Правительство оказало эксклюзивную поддержку Шаньдунской клике Чжан Цзунчана в недавно разгоревшемся конфликте между двумя восточными союзниками. В связи с этим нас попросили прекратить оказание помощи клике Чэнь Тяоюань в Аньцине. Несмотря на то, что мы можем отказаться, антиконцессионные цели Чэнь противоречат нашим интересам в Китае, и могущественные силы в правительстве настаивают на том, чтобы мы присоединились к требованию Чжана. Мы можем перенаправить нашу поддержку в Шаньдун, если захотим."
 fengtian_events.2371.a: "Ну, хорошо."

 fengtian_events.2372.t: "Фэнтянь поддерживает Аньцин"
 fengtian_events.2372.d: "Правительство Фэнтянь оказывает исключительную поддержку Аньцинской клике Чэнь Тяоюаня в недавно разгоревшемся конфликте между двумя восточными союзниками. В связи с этим нас попросили прекратить помощь Шаньдунской клике Чжан Цзунчана. Хотя мы могли бы отказаться, влиятельные силы в правительстве настаивают на том, чтобы мы подчинились требованию Чжана. Мы можем перенаправить нашу поддержку в Аньцин, если пожелаем."
 fengtian_events.2372.a: "Очень хорошо"

 fengtian_events.243.t: "Аньцин поможет нам в войне с Пекином"
 fengtian_events.243.d: "Аньцинская Клика приняла правильное решение и решила присоединиться к нашему альянсу и взять на себя обязательство помочь нам в Войне за Возрождение. Они взвесили множество факторов, поэтому знание того, что они все же решили присоединиться к нашему делу, - очень хорошая новость."
 fengtian_events.243.a: "Хорошо."

 fengtian_events.244.t: "Аньцин отказывается участвовать в войне с Пекином"
 fengtian_events.244.d1: "Аньцинская Клика во главе с Чэнь Тяоюанем решила отказаться от любого участия в нашей Войне за Возрождение против [QIE.GetName]! Это крайне неуважительно, поскольку и наше правительство, и японцы поддерживали их во время войны Лиги и помогли им добиться контроля над всеми пятью провинциями. Тем не менее, нам нужна любая помощь, которую мы можем получить, и поэтому мы могли бы оставить это и надеяться, что они присоединятся к войне, независимо от того, как только она начнется. Но если они в конце концов не присоединятся, это будет означать, что мы должны будем рассматривать их как еще одних милитаристов, которых нам нужно будет свергнуть, чтобы объединить Китай."
 fengtian_events.244.d2: "Аньцинская Клика во главе с Чэнь Тяоюанем решила отказаться от любого участия в нашей Войне за Возрождение против [QIE.GetName]! Это крайне неуважительно, поскольку и наше правительство, и японцы поддерживали их во время войны Лиги и помогли им добиться контроля над всеми пятью провинциями. Мы также вложили значительные средства в их реконструкцию, надеясь, что они окажутся более ценным союзником. Мы должны немедленно отменить нашу помощь в их восстановлении. Тем не менее, нам нужна любая помощь, которую мы можем получить, и поэтому мы могли бы оставить это и надеяться, что они присоединятся к войне, независимо от того, как только она начнется. Но если они в конце концов не присоединятся, это будет означать, что мы должны будем рассматривать их как еще одних милитаристов, которых нам нужно будет свергнуть, чтобы объединить Китай."
 fengtian_events.244.a: "Разорвите связи и осудите их."
 fengtian_events.244.b: "Оставить их союзником."

 fengtian_events.245.t: "Аньцин разорвал отношения"
 fengtian_events.245.d: "К сожалению, хотя мы решили пока терпеть Аньцин, они решили сами полностью разорвать связи. Это означает, что мы не можем рассчитывать на них и должны рассматривать их как очередную клику милитаристов."
 fengtian_events.245.a: "Не повезло."

 fengtian_events.246.t: "Аньцин аннексировал Шаньдун"
 fengtian_events.246.d: "Первоначально мы договорились с Аньцином о том, что они будут временно контролировать Шаньдун до начала Войны за Возрождения, поскольку у них не было на это должных прав и они признали нас национальным правительством. Теперь, когда это больше не так, Чэнь Тяоюань из Аньцина решил взять на себя полный контроль над Шаньдунем и сделать его частью своей Лиги. Это значит, что территория нам недоступна."
 fengtian_events.246.a: "Плохие новости."

 fengtian_events.247.t: "Аньцин аннексировал Шаньдун"
 fengtian_events.247.d: "Первоначально мы договорились с Аньцином о том, что они будут временно контролировать Шаньдун до начала Войны за Возрождения, поскольку у них не было на это должных прав и они признали нас национальным правительством. Теперь, когда это больше не так, Чэнь Тяоюань из Аньцина решил взять на себя полный контроль над Шаньдунем и сделать его частью своей Лиги. Это значит, что территория нам недоступна."
 fengtian_events.247.a: "Плохие новости."

 fengtian_events.251.t: "Принятие избирательного права женщин"
 fengtian_events.251.d: "Население наконец приняло идею о том, что женщины могут голосовать на местных выборах, что раньше было довольно спорным, поскольку это сравнительно радикальное изменение, учитывая очень консервативное общество Китая. Сун Цинлин объявила, что это большая победа за права женщин в Китае, и это была основная причина, по которой [FNG.GetNameDef] впервые применили эту политику."
 fengtian_events.251.a: "Победа женщин, победа демократии"

 fengtian_events.252.t: "Прорыв дамбы Желтой Реки!"
 fengtian_events.252.d_north: "В гнусной попытке остановить армии, теперь охватывающие их территорию, [QIE.GetNameDef] совершил немыслимое и прорвал дамбы Желтой реки возле Чжэнчжоу. Последовавшая за этим волна воды хлынула через Хэбэй, Дамин и Цанчжоу, унося с собой целые деревни и города. Считается, что сотни тысяч людей утонули, а катастрофическое разрушение сельскохозяйственных земель грозит голодом еще миллионам. \n\nСтолкнувшись с этой неизгладимой трагедией, народ Китая должен понять, что чем раньше [QIE.GetNameDef] исчезнет, тем лучше."
 fengtian_events.252.d_south: "В гнусной попытке остановить армии, теперь охватывающие их территорию, [QIE.GetNameDef] совершил немыслимое и прорвал дамбы Желтой реки возле Чжэнчжоу. Последовавшая за этим волна воды хлынула через Кайфэн, унося с собой целые деревни и города. Считается, что сотни тысяч людей утонули, а катастрофическое разрушение сельскохозяйственных земель грозит голодом еще миллионам. \n\nСтолкнувшись с этой неизгладимой трагедией, народ Китая должен понять, что чем раньше [QIE.GetNameDef] исчезнет, тем лучше."
 fengtian_events.252.d_north_evac: "В гнусной попытке остановить армии, теперь охватывающие их территорию, [QIE.GetNameDef] совершил немыслимое и прорвал дамбы Желтой реки возле Чжэнчжоу. Последовавшая за этим волна воды хлынула через Хэбэй, Дамин и Цанчжоу, унося с собой целые деревни и города. Несмотря на масштабные усилия по эвакуации, тысячи людей утонули, а катастрофическое разрушение сельскохозяйственных угодий грозит голодом многим миллионам. \n\nСтолкнувшись с этой неизгладимой трагедией, народ Китая должен понять, что чем раньше [QIE.GetNameDef] исчезнет, тем лучше."
 fengtian_events.252.d_south_evac: "В гнусной попытке остановить армии, теперь охватывающие их территорию, [QIE.GetNameDef] совершил немыслимое и прорвал дамбы Желтой реки возле Чжэнчжоу. Последовавшая за этим волна воды хлынула через Кайфэн, унося с собой целые деревни и города. Несмотря на значительные усилия по эвакуации, тысячи людей утонули, а катастрофическое разрушение сельскохозяйственных угодий грозит голодной смертью многим миллионам. \n\nСтолкнувшись с этой неизгладимой трагедией, народ Китая должен понять, что чем раньше [QIE.GetNameDef] исчезнет, тем лучше."
 fengtian_events.252.a: "[QIE.GetLeader] монстр!"

 fengtian_events.253.t: "Достигнута лояльность рабочих"
 fengtian_events.253.d: "[FNG.GetName] наконец-то достиг своей цели по уничтожению влияния профсоюзов, используя различные средства, такие как разрушение профсоюзов, антипрофсоюзная пропаганда, а также усиление национального контроля над ключевыми отраслями промышленности. Пропаганда привела к убеждению, что профсоюзы - это всего лишь способ разделить это общество, ослабляя нас по сравнению с Западом, в который теперь наконец верит большинство рабочих."
 fengtian_events.253.a: "Профсоюзы разделяют страну перед лицом иностранного империализма!"

 fengtian_events.254.t: "Реформа Командования завершена"
 fengtian_events.254.d: "Масштабная реформа командования нашего лидера, наконец, завершена, в результате чего в Китае создается централизованная структура управления, которую центральное правительство рассматривает как первостепенную для предотвращения нового разделения Китая в будущем. Хотя это значительно повысило эффективность армии, она очень непопулярна среди высокопоставленных генералов, поскольку лишает их прежней автономии, как и милитаристов, правящих во многих частях этой страны."
 fengtian_events.254.a: "Китай будет единым навсегда!"

 fengtian_events.255.t: "Наши враги готовятся к войне!"
 fengtian_events.255.d_1: "По словам наших шпионов в [FROM.Capital.GetCapitalVictoryPointName], [FROM.GetName] готовится вскоре объявить нам войну. Этот бой будет сражением за выживание."
 fengtian_events.255.d_2: "Глубокой ночью два поезда, длиной в тридцать четыре вагона, прошли через станцию Хуангутунь в Шэньяне в направлении плацдарма в Цзиньси примерно в 150 милях к югу. Через два часа прошли еще два поезда, а к утру всего десять. Наши шпионы теперь уверены, что за Великой стеной началось движение. И снова армии Чжан Цзолиня готовятся к походу на юг через перевал Шанхай. Мы должны снова сокрушить этих северо-восточных собак, как мы это сделали десять лет назад, как это сделали старые династии."
 fengtian_events.255.d_3: "Наши шпионы в [FROM.Capital.GetCapitalVictoryPointName] сообщают, что [FROM.GetName] готовится присоединиться к войне [FNG.GetName] против нас!"
 fengtian_events.255.a: "У нас совсем немного времени на подготовку."

 fengtian_events.256.t: "[FROM.GetName] просит помощи!"
 fengtian_events.256.d: "Новости пришли прямо из [FROM.Capital.GetCapitalVictoryPointName], наши союзники в [FROM.GetName] вот-вот будут атакованы [FNG.GetName]! Их силы уже мобилизуются, но они не могут противостоять этому противнику в одиночку."
 fengtian_events.256.a: "Надо готовиться!"

 fengtian_events.270.t: "Дело оккупации"
 fengtian_events.270.d: "Оккупация никогда не бывают легкими или простыми, но средний китайский солдат часто немногим лучше бандита с боевыми порядками. Наши войска уже начали сжигать, грабить и осквернять те города и деревни, которые наше правительство утверждает, что освобождает. Некоторые сказали бы, что мы должны позволить войскам повеселиться, но теперь, когда главнокомандующий Чжан Цзолинь снова соревнуется на национальной арене, он должен учитывать свой имидж. Когда-то он сам был бандитом, и многим здесь, на юге, нелегко проявлять уважение к бывшим преступникам или подчиняться им. Элита уже подняла нос, и хотя сила может быть легким ответом, нам действительно нужны эти интеллектуалы, землевладельцы и бизнесмены для достижения наших более высоких целей. Именно этими фигурами мы должны управлять. К счастью, нашей логистической системы достаточно, чтобы прокормить наших солдат, а это значит, что наши люди грабят не ради выживания, но, тем не менее, они будут недовольны тем, что их удерживают от того, что они считают своим правом, путем завоевания. \n\nЗдесь мы должны выбрать между двумя вариантами - освободители или освобожденные?"
 fengtian_events.270.a: "Пусть развлекаются."
 fengtian_events.270.b: "Мы больше не бандиты."

 fengtian_events.271.t: "Снабжение Северо-Востока"
 fengtian_events.271.d_food: "Распространяя нашу власть на вновь освоенные территории, мы должны гарантировать, что они тоже внесут свой вклад в движение за воссоединение. К сожалению, Северо-Китайская равнина густо заселена и потребляет больше продуктов питания, чем производит, превращая земли, облагаемые налогом, в других случаях, истощая наши ресурсы. К счастью, Маньчжурия обширна и плодородна, и благодаря нашему решению не продвигать "Выращивание сои" мы можем позволить себе прокормить большую часть населения."
 fengtian_events.271.d_exports: "Распространяя нашу власть на вновь освоенные территории, мы должны гарантировать, что они тоже внесут свой вклад в движение за воссоединение. К сожалению, Северо-Китайская равнина густо заселена и потребляет больше продуктов питания, чем производит, превращая земли, облагаемые налогом, в других случаях, истощая наши ресурсы. С одной стороны, Маньчжурия обширна и плодородна, и благодаря нашему решению не продвигать "Выращивание сои" мы можем позволить себе прокормить большую часть населения. С другой стороны, в настоящее время мы экспортируем все излишки зерна в Японию, чтобы компенсировать нынешний голод. \n\nЗдесь надо выбирать между Китаем или Японией? Ставим ли мы на первое место собственный народ или прячемся под японским военным превосходством?"
 fengtian_events.271.d_soy: "Распространяя нашу власть на вновь освоенные территории, мы должны гарантировать, что они тоже внесут свой вклад в движение за воссоединение. К сожалению, Северо-Китайская равнина густо заселена и потребляет больше продуктов питания, чем производит, превращая земли, облагаемые налогом, в других случаях, истощая наши ресурсы. К сожалению, благодаря "Выращиванию сои", большая часть зерновых культур Северо-Востока была заменена товарными культурами сои. Имея едва ли достаточно еды, чтобы накормить Северо-Восток, мы даже не можем думать о доставке еды куда-нибудь еще. \n\nСеверному Китаю придется пережить голод, который плохо отразится на нашем руководстве."
 fengtian_events.271.a: "Импорт зерна из Маньчжурии"
 fengtian_events.271.b: "Нам нужно зерно, прекратите экспорт в Японию."
 fengtian_events.271.c: "Мы не можем противостоять им."
 fengtian_events.271.e: "Эти проклятые соевые бобы!"

 fengtian_events.272.t: "Скандал в Пекине"
 fengtian_events.272.d_bad: "Определенное количество грабежей в Пекине было неизбежным. Будучи национальной столицей на протяжении веков и домом для поколений императоров, процветание города распространилось по безудержной бюрократии. Однако скандал в городе вызвал не материальное благополучие. Предположительно, некоторые из наших солдат схватили жен и наложниц правительственных министров и после совершения ужасных деяний выставили их напоказ по улицам города в качестве трофеев. Что еще хуже, некоторые были помещены на импровизированный помост и продаются как болтовня тому, кто больше заплатит. В любой дисциплинированной армии они были бы казнены за такое поведение, и мы дали гарантии как таковые местному населению, но есть большая вероятность, что милитаристы замалчивают этот вопрос."
 fengtian_events.272.d_good: "Определенное количество грабежей в Пекине было неизбежным. Будучи национальной столицей на протяжении веков и домом для поколений императоров, процветание города распространилось по безудержной бюрократии. Однако скандал в городе вызвал не материальное благополучие. Предположительно, некоторые из наших солдат схватили жен и наложниц правительственных министров и после совершения ужасных деяний выставили их напоказ по улицам города в качестве трофеев. Что еще хуже, некоторые из них были помещены на импровизированный помост и продаются как болтовня тому, кто больше заплатит. В любой дисциплинированной армии они были бы казнены за такое поведение, и мы дали гарантии как таковые местному населению. К счастью, благодаря нашему кодексу поведения и быстрой реакции менее терпимого командира, большинство этих солдат были заключены в тюрьму и ожидают наказания."
 fengtian_events.272.a: "Возмутительно!"

 fengtian_events.273.t: "Осквернение в Долине Исянь"
 fengtian_events.273.d_bad: "Тревожные новости пришли из Долины Исянь в провинции Чжили, где несколько солдат армии Фэнтянь взорвали вход в несколько гробниц Западной Цин. С момента вульгарного осквернения места упокоения вдовствующей императрицы Цыси в 1928 году косвенным подчиненным Чжана Сунь Дианином, эта тема использовалась для нанесения ущерба репутации главнокомандующего в определенных кругах. В этом новом эпизоде, столь похожем на предыдущий, настоящего восстановления может и не наступить. Точная сумма богатства, украденного из гробниц, неясна, но вовлеченные солдаты исчезли в тростниках вдоль озера Байяндянь, и большая часть, вероятно, скоро попадет на черный рынок."
 fengtian_events.273.d_good: "Тревожные новости пришли из Долины Исянь в провинции Чжили, где, по сообщениям, несколько солдат армии Фэнтянь начали закладывать динамит у входа в гробницы Западной Цин. С момента вульгарного осквернения места упокоения вдовствующей императрицы Цыси в 1928 году косвенным подчиненным Чжана Сунь Дианином, эта тема использовалась для нанесения ущерба репутации главнокомандующего в определенных кругах. В этом новом эпизоде, столь похожем на предыдущий, хорошо, что вышестоящий офицер смог предотвратить любой серьезный ущерб. Независимо от якобы республиканских намерений солдат, для национальной легитимности важно, чтобы мы уважали наших предков. Именно из их примера единого и непоколебимого Китая мы черпаем вдохновение, если не практику."
 fengtian_events.273.a: "Даже монархическую историю стоит сохранить!"

 fengtian_events.274.t: "Беспорядки в Баодине"
 fengtian_events.274.d: "Тревожные сообщения начали поступать из Военной академии Баодин, которую недавно захватила и оккупировала рота наших солдат. Поскольку это военная крепость, в которой противник продержался более недели, ожидалось повреждение здания, равно как и некоторые грабежи, но мало кто ожидал услышать, что наши люди убивают друг друга из-за добычи. Предположительно склад медалей и знаков различия учреждения был обнаружен вскоре после его захвата, в результате чего появилось несколько самопровозглашенных полковников, майоров и генералов, каждый из которых был награжден множеством почетных орденов. Эти люди, совершенно не подозревая о фактическом статусе, дарованном их регалиями, начали борьбу за первенство. К тому времени, когда из других мест прибыли войска, чтобы сменить настоящего командира, выскочки разделились на несколько группировок, занимающих разные части академии, и несколько десятков человек погибли."
 fengtian_events.274.a: "Может быть только один Великий Маршал"

 fengtian_events.275.t: "Закон возвращается в провинцию Чжили"
 fengtian_events.275.d_bad: "После волны спонтанных, а иногда и не избирательных грабежей, поджогов и других преступных действий со стороны наших войск порядок в провинции Чжили восстановился. По большому счету, солдаты просто выгорели. Этот эпизод не будет оценен по достоинству ни крестьянами, которые приняли на себя основную тяжесть насилия, ни помещиками, владельцы бизнеса или правительственные чиновники. Хотя в конечном итоге это смешается с остальными зверствами "Эпохи Милитаристов", это не сделает управление обширными территориями недавно завоеванных территорий не легче."
 fengtian_events.275.d_good: "После того, как наши войска пронеслись по провинции Чжили, большинство населения приготовилось к волне беспорядочного насилия. Но, несмотря на несколько неизбежных инцидентов, наши войска в основном соблюдают кодекс поведения, установленный маршалом Чжаном. Некоторые упрямые люди приписывают удивление продвинутой системе логистики Фэнтяня, которая уменьшила потребность наших армий жить за счет земли, вместо того, чтобы восхвалять самого Чжана. Тем не менее, даже они не могут игнорировать результаты, и это выступление будет иметь большое значение для завоевания доверия нации."
 fengtian_events.275.a: "По крайней мере, все кончено."

##Luoyang-Zhengzhou Events
 fengtian_events.276.t: "Железнодорожный хаос в Чжэнчжоу"
 fengtian_events.276.d_bad: "Видимо, как только наши войска захватили Чжэнчжоу, они спустились на его вокзал. Будучи сердцем национальной железнодорожной сети в военное время и возможно, из-за упорных попыток наших врагов защитить ее, пути были забиты подвижным составом, доверху заполненным вещами беженцев и военной техникой. Последующая оргия грабежей привела к тому, что железнодорожное движение в этом районе было остановлено на несколько дней, так как каждая последняя машина была разграблена, и хотя мы захватили определенное количество военной техники из машин, большинство теперь разбиты и непригодны для использования. Убирать их с железной дороги придется долго, и еще дольше бывшие жители города забудут о вопиющей краже их вещей."
 fengtian_events.276.d_good: "Видимо, как только наши войска захватили Чжэнчжоу, они спустились на его вокзал. Будучи сердцем национальной железнодорожной сети в военное время и возможно, из-за упорных попыток наших врагов защитить ее, пути были забиты подвижным составом, доверху заполненным вещами беженцев и военной техникой. Мародерство началось почти сразу, но, к счастью, некоторые из наших офицеров смогли ограничить деятельность только половиной вагонов, а сами офицеры забрали только четверть. Следовательно, то, что могло обернуться логистической катастрофой, когда разграбленный подвижной состав блокировал пути на несколько дней, стало относительно упорядоченным делом, которое оставило хоть что-то позади для жителей города."
 fengtian_events.276.a: "Что осталось?"

 fengtian_events.277.t: "Бандиты против бандитов"
 fengtian_events.277.d_bad: "Наши войска недавно захватили Лоян вместе с большинством крупных городов провинции Хэнань, но обеспечение безопасности в сельской местности доказало другое. Бандитизм имеет давнюю историю в провинции Хэнань, и несмотря на почти десятилетнее правление Чжили, эта проблема так и не исчезла. Большинство было просто включено в армии У Пэйфу. Теперь они пронизывают сельские районы провинции и 'перешедшие' на нашу сторону, забирают трофеи войны, которую они так и не выиграли. \n\nНаши собственные войска, чувствуя себя обманутыми, теперь участвуют в конкурентных грабежах и разрушениях, иногда переходя в локализованные, но скоординированные сражения. Запланированное прибытие в этот район еще нескольких упорядоченных войск должно снизить напряженность, чтобы можно было поймать настоящих бандитов, но ущерб уже нанесен. Комбинированные разрушения сравнивают со стихийным бедствием."
 fengtian_events.277.d_good: "Наши войска недавно захватили Лоян вместе с большинством крупных городов провинции Хэнань, но обеспечение безопасности в сельской местности доказало другое. Бандитизм имеет давнюю историю в провинции Хэнань, и несмотря на почти десятилетнее правление Чжили, эта проблема так и не исчезла. Большинство было просто включено в армии У Пэйфу. Теперь они проникают в сельские районы провинции и 'перешедшие' на нашу сторону, начали требовать трофеи войны, которую они так и не выиграли. \n\nНаши собственные войска вмешались, чтобы подавить насилие, но тщательное прочесывание холмов и берегов реки Хэнань потребует времени и энергии, и это не то, что наши войска предпочли бы тратить. По всей вероятности, активность бандитов снова возобновится через некоторое время в будущем, и все, что уже украдено, теперь находится в руках наших войск."
 fengtian_events.277.a: "Бандиты везде!"

 fengtian_events.278.t: "Закон возвращается в провинцию Хэнань"
 fengtian_events.278.d_bad: "После транспортного хаоса, повального насилия и волны слишком привычного бандитизма провинция Хэнань вернулась к относительной стабильности. Для среднего крестьянина все еще тяжелые времена, по холмам еще бродят разбойники, но в целом наши собственные войска успокоились. Хэнань, в частности, стал свидетелем изрядной доли голода, насилия и других трагедий, в которых это может быть не более чем историческая сноска, но для жизней, которых он коснулся, и конечно же, жизней, которые он унес, события [GetYear] года никогда не будут забытыми."
 fengtian_events.278.d_good: "После некоторого неизбежного насилия и волны слишком знакомого бандитизма Хэнань вернулся к относительной стабильности. В провинции случаются трагедии, поэтому относительно приличное поведение наших войск повсюду вскружило голову. Местные владельцы бизнеса, землевладельцы и правительственные чиновники ценят сдержанность наших солдат, и именно их поддержка будет иметь важное значение для управления провинцией в будущем."
 fengtian_events.278.a: "По крайней мере, все кончено."

##Wuhan Events
 fengtian_events.279.t_bad: "Разрушения в Ухане"
 fengtian_events.279.t_good: "Победа в Ухане"
 fengtian_events.279.d_bad: "Республиканская мечта Китая родилась в Ухане, и сегодня мы являемся ее факелоносцами. К сожалению, революционные идеалы были далеки от умы наших солдат, которые, столкнувшись с неожиданным сопротивлением в Учане, бросились бежать по городу, без разбора грабя. К тому времени, когда порядок был восстановлен, доки, пристани и всевозможные прибрежные предприятия были превращены в пепел вместе с большими жилыми районами. То, что в противном случае могло бы стать политической победой, превратилось в политическое поражение и позор. \n\nПоложительным моментом является то, что нашим войскам удалось вернуть запас оборудования из ныне заброшенного арсенала Ханьян, хотя есть подозрения, что большое количество оружия было вывезено на черный рынок."
 fengtian_events.279.d_good: "Республиканская мечта Китая родилась в Ухане, и сегодня мы являемся ее факелоносцами. К счастью, похоже, это было в голове у наших солдат, когда они входили в город, который пережил бои относительно невредимыми, тем более что грабежи были ограниченными. Пробившись через Северо-Китайскую равнину, кажется, что наши войска начали осознавать преимущества благодарного населения. Наша армия, состоящая из множества бывших бандитов и бродяг, возможно, никогда полностью не изменится, но сегодняшняя относительная сдержанность - это шаг вперед. \n\nЧтобы добавить к хорошей новости, наши войска восстановили склад оборудования из теперь заброшенного Арсенала Ханьян."
 fengtian_events.279.a: "Позор!"
 fengtian_events.279.b: "Какое облегчение!"

 fengtian_events.280.t: "Катастрофа на финиковых шахтах"
 fengtian_events.280.d: "Руду в Дайе добывают более двух тысяч лет, и сегодня железо из ее недр питает пожары современной промышленности в Ухане, Хубэе и Нижнем Янцзы. Это не остановило наших солдат, которые, услышав слухи о том, что здесь можно найти золото, разграбили рудник и разочаровавшись, не найдя ничего подобного, разрушили вход, заперев внутри более сотни горняков. Были предложены меры по спасению, но многие считают, что такие расходы тратятся впустую на обычных рабочих. Тем временем виновные в катастрофе дезертировали, и их нигде не найти."
 fengtian_events.280.a: "Начните спасательные операции."
 fengtian_events.280.b: "Их жизни слишком дешевые."

 fengtian_events.281.t_bad: "Трагедия в шахтах"
 fengtian_events.281.t_good: "Горняки спасены в срок"
 fengtian_events.281.d_bad: "К тому времени, как наши люди прорвались к застрявшим в ловушке шахтерам в Дайе, все погибли. Хотя это, конечно, не тот результат, на который мы надеялись, тот факт, что наши люди вообще пытались, был хорошо воспринят местным сообществом и что более важно, национальными газетами."
 fengtian_events.281.d_good: "Благодаря старым лавам Orenstein & Koppel, привезенной с соседней шахты, наши солдаты смогли вовремя прорваться и спасти десятки шахтеров. Несмотря на их первоначальные оговорки, мужчины, похоже, считают, что искренняя благодарность рабочих и их семей окупила усилия, а похвалы национальных газет компенсировали большинство политических последствий самого бедствия. \n\nЧтобы помочь нам, благодарные горняки привезли ряд ящиков с оружием, которые, по-видимому, были спрятаны там во время отступления врага не так давно."
 fengtian_events.281.a: "Какая утрата."
 fengtian_events.281.b: "Вперед!"

 fengtian_events.282.t: "Опыт полученный в Цзюйсяне"
 fengtian_events.282.d: "Годы, прошедшие с момента формирования нашего правительства, заложили для нас прочную основу для национального возрождения. Мы не боимся проблем и не беспокоимся о надвигающихся опасностях. Мы просто оплакиваем судьбу Юга, свобода которого изначально была достигнута благодаря упорным усилиям и жертвам патриотов-реформистов и с тех пор стерта старыми и устаревшими формами правления. Сегодня ее народ бессилен, а ее правители лишены честности, что приводит к медленной деградации национального положения и возвращению к состоянию полного подчинения западным странам. Эти старые способы подрывают национальную мощь Китая, расшатывают его национальные основы и порабощают его народ. \n\nТаким образом, мы оказываемся на Севере как последний бастион всего, что наши предшественники пытались построить, и как носители будущего нового Китая. Регрессивное [QIE.GetAdjective]ое правительство любит говорить, что, укрепляя северо-восток, мы 'копаем яму, чтобы умереть в ней'. На это я отвечаю: "Не забывайте, что случилось в Цзюйсяне". Именно к Цзюйсяню отступило Государство Ци, и оттуда оно отвоевало все, что было потеряно. Когда придет время, северо-восток будет нашим Цзюйсянем, а весь Китай будет нашей Ци. Наша победа неизбежна, да здравствует Республика!"
 fengtian_events.282.a: "Вперед!"

 fengtian_events.283.t: "Прокламация Великого Маршала"
 fengtian_events.283.d: "Старая пословица гласит: "Добродетель всегда в компании и он когда-нибудь найдет поддержку". Силы справедливости поднимутся, и люди доброй воли в конечном итоге будут сотрудничать в интересах честности. Нет никаких сомнений в том, что регрессивное и незаконное [QIE.GetAdjective]ое Правительство стоит на пути прогресса, угнетая и порабощая китайский народ, и я получил все заверения в том, что наши союзники поддержат нас, чтобы положить конец этой несправедливости. Со своей стороны, мы должны твердо держаться, не отрывать взор от своей цели и быть твердыми в своей решимости. Весь Северо-Восток должен продолжать с единством сердца. Окончательная победа будет за нами. Я призываю своих министров, нашу армию и наш народ удвоить свои усилия, чтобы добиться успеха. \n\nИменно в этом духе я провозглашаю начало Года праведных усилий, полных триста шестьдесят пять дней напряженных национальных усилий, из которых мы выйдем как сила, непреодолимая для достижения нашей цели. И когда этот год закончится, пятицветный флаг снова взлетит высоко в Пекине, и [QIE.GetAdjective]ое Правительство станет не чем иным, как пеплом на ветрах истории. Десять тысяч лет Республике! Вперед!"
 fengtian_events.283.a: "Вперед!"

 fengtian_events.285.t: "Фэнтяньский ультиматум"
 fengtian_events.285.d: "Представитель Фэнтяньского Правительства поставил ультиматум нашему консульству в [FNG.Capital.GetName], требуя, чтобы мы убрали наши войска из Китая в течение следующих трех месяцев и сразу же вернули им их территории. По словам военных, это вопиющее неуважение, которое стало еще более отвратительным в свете нашего давнего сотрудничества с [FNG.GetLeader], не может остаться без ответа. Однако некоторые более тихие голоса из Министерства Иностранных Дел предполагают, что это может быть единственным способом обеспечить прочный союз с Китаем."
 fengtian_events.285.a: "Наказать их за наглость!"
 fengtian_events.285.b: "Мы не можем позволить себе новую войну в Китае."

 fengtian_events.286.t: "Япония принимает наши требования!"
 fengtian_events.286.d: "Япония приняла наш ультиматум, убрав свою военную миссию и ограничив влияние своего правительства, сохранив при этом наш альянс."
 fengtian_events.286.a: "Наконец-то установились более равные отношения."

 fengtian_events.306.t: "Атаки на Южно-Маньчжурскую железную дорогу"
 fengtian_events.306.d: "Предоставленные самим себе более двух недель, лоялисты в Харбине начали серию скоординированных атак вдоль Южно-Маньчжурской железной дороги. К счастью, некоторые из наших командиров действовали по собственной инициативе и с помощью охранников Японской железнодорожной зоны смогли ограничить урон и оттеснить превосходящего численностью противника обратно в город. \n\nЗа этим последовала жестокая уличная бойня по всему городу, к которой лоялисты явно готовились, и наши потери быстро росли. В завершающем акте неповиновения противник взорвал взрывчатку на нескольких заводах, но к рассвету в городе царила тишина, нарушаемая лишь случайными выстрелами, отмечающими казни выживших. \n\nХарбин снова наш."
 fengtian_events.306.a: "По крайней мере, с ними разбираются"

 fengtian_events.307.t: "Встреча с купцами"
 fengtian_events.307.d: "Торговая палата Фэнтяня представляет интересы многочисленных торговцев в Шэньяне и на северо-востоке страны, большинство из которых несут ответственность за надлежащее функционирование нашей экономики - по крайней мере, те ее части, которые все еще находятся за пределами Японии. Их переговорная сила значительна, и с приходом новых властей в столице они надеются на новую сделку, которая будет лучше служить им самим. \n\nИзвестно, что Чжан Цзолинь застрелил нескольких купцов и банкиров за отказ от его выгодных условий, но если сделать то же самое сейчас, это создаст плохой прецедент для нашей новой администрации, которая якобы наведет порядок и цивилизацию в измученном войной Китае. \n\nОднако это создало бы столь же плохой прецедент, если бы мы приняли условия хуже, чем наш предшественник."
 fengtian_events.307.a: "Возможно, мы сможем договориться"
 fengtian_events.307.b: "Может быть, Чжан был прав"
 fengtian_events.307.c: "Сейчас - это неважно"

 fengtian_events.308.t: "Восстановление порядка в Маньчжурии"
 fengtian_events.308.d: "Несмотря на смерть Великого Маршала Чжан Цзолиня, часть его наследия все же осталась. Различные гражданские власти по всему региону либо проигнорировали, либо отклонили приказ признать нашу новую администрацию, и как сообщается, некоторые, все еще верные его делу, объединились в Харбине - возможно, чтобы дать последний бой. \n\nВ настоящее время наши ресурсы будут более ограниченными, чем мы могли бы пожелать, и мы должны сосредоточить наши усилия на возвращении контроля и хорошего правительства в Маньчжурии. Последние остатки правительства Чжана должны быть сметены."
 fengtian_events.308.a: "Вперед!"

 fengtian_events.309.t: "Северная опасность"
 fengtian_events.309.d: "Когда угроза в Харбине устранена, наши японские советники рекомендовали нам продвигаться на север по железной дороге. Эти холодные районы Маньчжурии, сами по себе такие же большие, как некоторые европейские страны вместе взятые, временами находились вне прямого контроля даже самого Чжан Цзолиня и снова оказались проблемными. \n\nОднако больше всего нас должны беспокоить русские, которые время от времени испытывали наши границы и как известно, жаждут вернуть КВЖД, захваченную у них более десяти лет назад. Японцы хотят, чтобы русских задержали на Амуре."
 fengtian_events.309.a: "Это будет сделано"

 fengtian_events.310.t: "[FNG.GetLeader] запрашивает помощь с бандитами"
 fengtian_events.310.d: "Маньчжурия издавна страдает от бандитов, особенно на ее малонаселенной северной границе. Определенное количество таких действий считается нормальным, но, очевидно, [FNG.GetLeader] попросил нашей помощи в борьбе с особенно разочаровывающей группой бандитов. Квантунская армия рекомендовала развернуть контингент своей Южно-Маньчжурской железнодорожной стражи, но министерство иностранных дел считает, что такое крупное обязательство чревато непредвиденным инцидентом. Наши солдаты, как известно, сначала стреляют, а потом задают вопросы. Другие спрашивают, почему мы должны заниматься чем-то, что, в конце концов, должно быть обязанностью [FNG.GetLeader]."
 fengtian_events.310.a: "Разверните железнодорожную стражу"
 fengtian_events.310.b: "Обеспечить их оружием и разведкой"
 fengtian_events.310.c: "Это унизит нас"

 fengtian_events.311.t: "Япония развертывает железнодорожную стражу!"
 fengtian_events.311.d: "Когда мы просили японскую помощь, мы не ожидали развертывания Южно-Маньчжурской железнодорожной стражи Квантунской армии, которая начала широкомасштабную операцию по борьбе с бандитами в [GetHonghuziLocation], дополненную воздушной разведкой. Эта демонстрация силы явно отодвигает на второй план наши собственные усилия, и уже многие из наших генералов настаивают на том, чтобы мы организовали собственную экспедицию в ответ. \n\nПрежде чем нам выкрикнули о "трусости", несколько более тихих голосов предположили, что обе силы, действующие в поле вместе, могут спровоцировать непредвиденный несчастный инцидент."
 fengtian_events.311.a: "Японцы нас не переиграют!"
 fengtian_events.311.b: "Не будем рисковать"

 fengtian_events.312.t: "Хонхузи в [GetHonghuziLocation] исчезли"
 fengtian_events.312.d: "Несмотря на все наши усилия, Чжан Гаитянь и его Хунхузи исчезли в пустыне Маньчжурии. По некоторым данным, он пересек Амур к югу от Айгуна в поисках убежища через границу с Россией. Другие полагают, что сам глава бандитов мертв, убит каким-то непокорным, оставив некогда многотысячную банду разойтись; его члены снова довольствуются обычными воровствами и вымогательством. Однако все согласны; если Старый Северный Ветер жив, он, скорее всего, вернется в свое время."
 fengtian_events.312.a: "Тогда будем надеяться, что он мертв"

 fengtian_events.313.t: "Инцидент в [GetFNGJAPClashTown]"
 fengtian_events.313.d: "В районе [GetFNGJAPClashTown] в провинции [GetHonghuziLocation] произошел инцидент, вызывающий глубокое сожаление. Видимо ошибочно принятый за бандитов контингент нашей экспедиции был обстрелян японской железнодорожной охраной СМР. Вряд ли ожидая, что у Хунхузи будет артиллерия, наши люди были плотно разбиты лагерем и впоследствии разорваны на куски японской бомбардировкой. Услышав волну издалека, другие наши силы поблизости прекратили свои операции по борьбе с бандитами и пришли в ярость, обнаружив место резни, и почти сразу же атаковали позиции японцев. \n\nКогда порядок был восстановлен, было обнаружено, что среди хаоса Хунхузи совершили дерзкий набег на японский лагерь и украли несколько сотен винтовок. Учитывая эту серию катастроф, как наши собственные силы, так и Японская железнодорожная охрана решили на время прекратить поиски."
 fengtian_events.313.a: "Какой беспорядок..."

 fengtian_events.314.t: "Япония предоставляет оружие и разведку"
 fengtian_events.314.d: "В ответ на нашу просьбу о помощи в решении нашей бандитской проблемы Квантунская армия доставила различное оружие и другие предметы снабжения, чтобы помочь нашим усилиям. Наиболее полезным является их предложение провести серию разведывательных полетов над [GetHonghuziLocation], поскольку их воздушная оптика намного превосходит нашу. Это должно существенно повысить шансы на успех нашей экспедиции."
 fengtian_events.314.a: "Отличные новости!"

 fengtian_events.315.t: "Япония отказывается от участия"
 fengtian_events.315.d: "Японцы отказались от любого участия в наших антибандитских операциях, считая этот вопрос "ниже их". Все равно продолжать?"
 fengtian_events.315.a: "Запросить снова"
 fengtian_events.315.b: "Мы сделаем это сами"

 fengtian_events.316.t: "[FNG.GetLeader] снова запрашивает помощь"
 fengtian_events.316.d: "Нас снова попросили помочь Фэнтяньскому Правительству в его борьбе с тем, что должно быть рутинным вопросом; умиротворение, казалось бы, эндемичных бандитов Китая. Похоже, что группу, доставляющую [FNG.GetLeader] необычное количество неприятностей, возглавляет некий "Лао Бэйфэн" или "Старый Северный Ветер", который в прошлом оказался трудным, а теперь совершает набег на [GetHonghuziLocation]. \n\nСтоит ли нам взяться за это предприятие?"
 fengtian_events.316.d_clash: "Нас снова попросили помочь Фэнтяньскому Правительству в его борьбе с тем, что должно быть рутинным вопросом; умиротворение, казалось бы, эндемичных бандитов Китая. Похоже, что группу, доставляющую [FNG.GetLeader] необычное количество неприятностей, возглавляет некий "Лао Бэйфэн" или "Старый Северный Ветер", который в прошлом оказался трудным, а теперь совершает набег на [GetHonghuziLocation]. \n\n Учитывая последнее катастрофическое развертывание Железнодорожной Стражи, нас убедили рассмотреть другие, менее явные варианты."
 fengtian_events.316.a: "Разверните железнодорожную стражу"
 fengtian_events.316.b: "Обеспечить их оружием и разведкой"
 fengtian_events.316.c: "Мы ничего не слышим и не знаем..."

 fengtian_events.317.t: "Бандиты разгромлены железнодорожной стражей!"
 fengtian_events.317.d: "Квантунская Армия объявила об успешном завершении операции по борьбе с бандитами в районе [GetFNGJAPClashLocation] в провинции [GetHonghuziLocation]. Хотя мы должны поверить японцам на слово, есть все основания полагать, что угроза, исходящая от этой необычайно смелой и агрессивной банды Хунхузи, исчезла. Очень жаль, что японцы смогут претендовать на большую часть, если не на всю, заслугу операции. По крайней мере, удалось избежать любого риска столкновения между нашими и их силами, и мы можем быть достаточно уверены в том, что в будущем нападения не будет."
 fengtian_events.317.d_jap: "Квантунская армия объявила об успешном завершении антибандитской операции в провинции [GetHonghuziLocation], Маньчжурия. Мы оказали помощь, запрошенную [FNG.GetLeader], и показали необходимость нашего постоянного присутствия в регионе. Поистине, теперь японский солдат должен олицетворять мир и порядок в неспокойной стране!"
 fengtian_events.317.a: "Так и надо этим бандитам!"
 fengtian_events.317.b: "Так и надо этим бандитам!"

 fengtian_events.318.t: "Прискорбный инцидент"
 fengtian_events.318.d: "Прискорбный инцидент произошел около [GetFNGJAPClashTown] в [GetHonghuziLocation], Маньчжурия. Похоже, что железнодорожная охрана SMR, которую мы развернули, приняла правительственные силы Фэнтянь за бандитов и открыла артиллерийский огонь, что привело к большим потерям. Затем наши солдаты были атакованы людьми [FNG.GetLeader], что вызвало дальнейшие ненужные разрушения, в то время как настоящие бандиты совершали набег на наш передовой оперативный лагерь и украли несколько сотен единиц оружия. \n\nЖелезнодорожную стражу нельзя винить в том, что китайская толпа жинжинья [FNG.GetLeader] неотличима от бандитов, а Квантунская армия уже потребовала извинений за вмешательство в нашу операцию. На данный момент это конец."
 fengtian_events.318.a: "Какой беспорядок..."

 fengtian_events.319.t: "Исчезновение Хунхузи"
 fengtian_events.319.d: "Несмотря на все усилия, преследующие [FNG.GetNamedef] хунхузи, по-видимому, исчезли в маньчжурской пустыне. По некоторым данным, они пересекли Амур к югу от Айгуна в поисках убежища через границу с Россией. Другие полагают, что главный вождь бандитов мертв, убит каким-то непокорным, оставив некогда многотысячную банду разойтись; его члены снова довольствуются обычными воровствами и вымогательством. \n\n На данный момент наши интересы в Маньчжурии снова защищены от этой конкретной породы мародерствующих бандитов."
 fengtian_events.319.a: "Хорошие новости"

 fengtian_events.320.t: "Успех в Маньчжурии"
 fengtian_events.320.d: "Сообщения из Маньчжурии показывают, что силы [FNG.GetNameDef] наконец-то обнаружили и ликвидировали бандитов, доставив им столько неприятностей. Теперь регион должен стать более безопасным местом для ведения бизнеса."
 fengtian_events.320.a: "Хорошие новости"

 fengtian_events.321.t: "Конец протестам"
 fengtian_events.321.d: "В последние дни Квантунская Армия или возможно, какой-то бюрократ в Токио решили, что продолжающиеся протесты по всей Маньчжурии противоречат национальным интересам Японии. Этим утром отряды японских солдат развернулись в окрестностях Шэньяна, Харбина, Чанчуня и Цзилиня. \n\nСтрельба началась около полудня и продолжалась до вечера. Те, кто пытался вмешаться, в том числе некоторые из наших солдат и полиции, были казнены без суда и следствия, а тела всех форм и размеров были разбросаны по улицам городов. \n\nБольшинство наших людей отступили, как было приказано, и японские власти, похоже, были довольны. Сообщение не могло быть более ясным."
 fengtian_events.321.a: "Они только делали свою работу"

 fengtian_events.322.t: "Ликование по поводу возвращения Городов-Концессий"
 fengtian_events.322.d: "С возвращением Шанхая и других бывших 'Городов-Концессий' под наше законное правление, народ Китая должен поблагодарить [FNG.GetLeader]. Новость уже распространилась далеко и повсюду, значительно повысив нашу легитимность."
 fengtian_events.322.a: "Славный день для Китая!"

 fengtian_events.323.t: "В Циндао развевается пятицветный флаг!"
 fengtian_events.323.d: "Впервые в этом столетии Циндао находится в надежных руках китайцев, благодаря нашим напряженным патриотическим усилиям. Народу Китая есть что праздновать!"
 fengtian_events.323.a: "Вансуй!"

 fengtian_events.324.t: "Макао возвращается Китаю!"
 fengtian_events.324.d: "Впервые за почти пять веков Макао возвращен Китаю! Праздники в порядке вещей, и наша легитимность в глазах китайского народа будет только расти!"
 fengtian_events.324.a: "Наконец!"

 fengtian_events.330.t: "Вовлечь Японию в Войну за объединение?"
 fengtian_events.330.d: "Despite [FNG.GetLeader]'s many promises to march past the Great Wall and begin a war of National Reclamation, much time has passed with little to no change in our situation. The ancient city of Beijing lies mere miles from our borders, yet with each passing day, the possibility that we may ever set foot there grows more and more distant, fading as our enemies grow stronger. Though Zhang has insisted that he is simply waiting for the right time to strike, many fear that such a time will never come, and have urged the man to play his ultimate trump card - the Empire of Japan.\n\nEven if the Japanese do not fully trust us, and we do not fully trust them, the prospect of a [608.Owner.GetAdjective] dominated China for the foreseeable future is a difficult one to swallow for the both us. Members of the Shikan Clique have encouraged [FNG.GetLeader] to secretly contact Japan to ask them that they join the National Reclamation War on our side - we may not be able to defeat [608.Owner.GetNameDef] alone, but they would sure fall before the might of a combined Fengtian-Japanese army. Of course, this proposition comes with the risk of destroying our legitimacy to the people, but we may not have a choice...."
 fengtian_events.330.a: "У нас нет выбора - связаться с Японией"
 fengtian_events.330.b: "This is a Chinese affair!"

 fengtian_events.331.t: "[FNG.GetLeader] просит нас присоединиться к их войне"
 fengtian_events.331.d: "Вытесненный в Маньчжурию после Шанхайской конференции, [FNG.GetLeader] давно планировал пройти к югу от Великой стены и вернуть себе Китай, но, похоже, его планы наталкиваются на препятствие за препятствием. Последнее из них - растущая сила государства [608.Owner.GetNameDef]. Теперь, когда его враги становятся сильнее с каждым днем, Чжан обратился к нам, чтобы мы приняли участие в войне против [608.Owner.GetNameDef]. Даже если у [FNG.GetNameDef] не хватит сил победить в одиночку, они наверняка будут разбиты нашими общими силами.\n\nАрмия и Министерство иностранных дел, в редкий момент единства, призвали наше правительство принять предложение Чжана. Амбиции военачальника уже не раз доставляли японским правительствам проблемы, и долгосрочная перспектива [608.Owner.GetAdjective]ой доминации над Китаем не отвечает нашим интересам. Если бы нам удалось привлечь [FNG.GetLeader] к борьбе на своей стороне, мы бы одним махом решили обе проблемы. Многие, однако, также весьма критически оценивают наши шансы в такой войне. Возможно, согласившись на это предложение, мы просто подпишем пакт о самоубийстве."
 fengtian_events.331.a: "Мы будем сражаться вместе"
 fengtian_events.331.b: "Гоменасорри..."

 fengtian_events.332.t: "Япония согласна присоединиться к нашей войне"
 fengtian_events.332.d: "Японская империя согласилась вступить в войну, когда она начнется, на нашей стороне. Теперь пути назад нет..."
 fengtian_events.332.a: "Превосходно..."

 fengtian_events.333.t: "Япония отказывается присоединиться к нашей войне!"
 fengtian_events.333.d: "Японская империя отказалась присоединиться к нашей войне, когда она начнется! Вместо этого они призвали нас продолжать ждать "подходящего момента" и просто заверили нас в нашей безопасности в Маньчжурии. Похоже, нам придется делать это без них... когда-нибудь."
 fengtian_events.333.a: "Мы отвоюем Китай без них!"

 fengtian_events.334.t: "[FNG.GetLeader] начинает войну"
 fengtian_events.334.d: "[FNG.GetLeader] начал свою войну за национальную рекламацию против [608.Owner.GetNameDef]. Мы обещали ему, что будем сражаться на его стороне, когда настанет день - пришло время выполнить это обещание."
 fengtian_events.334.a: "К оружию!"

 fengtian_events.501.t: "Письмо от Юй Сюэчжуна"
 fengtian_events.501.d: "Сегодня великий маршал получил письмо с мольбой и смиренной просьбой от бывшего вражеского генерала, который просил дать ему военную должность в армии Фэнтяня, чтобы он мог обеспечить себе пропитание. В наше время маршал даже не потрудился бы прочитать такое письмо, но подпись вызвала у него большой интерес, так как напомнила о ранней юности. С большой осторожностью он раскрыл его на столе.\n\nЭто письмо от Ю Сюэчжуна, бывшего чжилийского генерала, известного как выдающийся командующий обороной, который вернулся в свой родной город Пэнлай безработным; для великого маршала важно то, что он сын Ю Вэньфу, который завербовал и продвинул Чжан Цзуолиня в армию И в 1894 году. Это позволило Чжану продвинуться по иерархической лестнице как сильному человеку с северо-востока, и в какой-то степени можно сказать, что без Юя великий маршал мог остаться бедным и неизвестным рядовым в эту хаотичную эпоху. Спокойно оглянувшись в прошлое и вспомнив свою раннюю жизнь в своей резиденции в одиночестве среди ночи, гранд-маршал решил отдать этот долг благодарности, набрав способного полководца, и написал..."
 fengtian_events.501.a: ""Ваша служба очень ценится, пожалуйста, передайте привет вашему отцу...""
 fengtian_events.501.b: ""Я могу дать вам немного денег в знак благодарности, но большего предложить не могу.""

 fengtian_events.502.t: "The [FNG_zhifeng_war_name]"
 fengtian_events.502.d: "Напряженность в Китае остается высокой с 1927 года, когда вмешательство Германии временно приостановило двадцатилетний конфликт между различными фракциями. Однако за последнее десятилетие как фэнтяньское правительство в Маньчжурии, так и [608.Owner.GetAdjective] в Пекине консолидировали и укрепили свои силы. Всё готово для самого драматичного противостояния за последние десять лет.\n\nОднако, какая бы сторона ни вышла победительницей, она не будет одинока. Япония и Германия по-прежнему играют важную роль в регионе, поскольку Страна восходящего солнца жадно посягает на немецкие владения в Тихом океане, и победитель в этой войне, несомненно, также сыграет свою роль в этом конфликте."
 fengtian_events.502.a: "Битва началась"

### FNG Political Events ###
 fengtian_political_events.15.t: "Encryption Codes Leaked!"
 fengtian_political_events.15.d_Wang: "Although our encryption is by no means as advanced as that in the West, or even Japan, it still helps ensure vital information doesn't fall into the wrong hands. Unfortunately, Wang Yintai seems to have mislaid his copy of our codebook while staying at the Palace Hotel in Shanghai. Subsequently, much of our intelligence network and all of our encrypted communications are now compromised. While a new system could be implemented in short enough order in some countries, backward governance and the Northeast's sheer size means that doing so could take over two months.\n\nIf we're lucky the code book will go undiscovered for that span of time, but that seems unlikely."
 fengtian_political_events.15.d_Tang: "Although our encryption is by no means as advanced as that in the West, or even Japan, it still helps ensure vital information doesn't fall into the wrong hands. Unfortunately, general Tang Yulin seems to have lost his copy of our codebook during a lavish party in his estate in Chengde. Subsequently, much of our intelligence network and all of our encrypted communications are now compromised. While a new system could be implemented in short enough order in some countries, backward governance and the Northeast's sheer size means that doing so could take weeks.\n\nIf we're lucky the code book will go undiscovered for that span of time, but that seems unlikely."
 fengtian_political_events.15.d_Ruan: "Although our encryption is by no means as advanced as that in the West, or even Japan, it still helps ensure vital information doesn't fall into the wrong hands. Unfortunately, Ruan Zhenduo seems to have lost his copy of our codebook while conducting diplomatic business in Tokyo. Subsequently, much of our intelligence network and all of our encrypted communications are now compromised. While a new system could be implemented in short enough order in some countries, backward governance and the Northeast's sheer size means that doing so could weeks.\n\nAlso, due to Ruan's political leanings, there have already been accusations that this 'accidental' incident was in fact entirely deliberate. While there is no proof one way or the other, it seems likely that Japan will not take kindly to Ruan's treatment, should we choose to remove him."
 fengtian_political_events.15.a: "Such is fate..."
 fengtian_political_events.15.b: "Remove him from office!"

 fengtian_political_events.16.t: "Expel the Japanese Bandits!"
 fengtian_political_events.16.d: "The time has come to declare our independence, drive the Japanese intruders from China, and end a century of unbearable national humiliation! We will naturally be deprived of foreign material support, but the Chinese people now rally behind us. Onward! Zhonghua Mingguo Wansui!"
 fengtian_political_events.16.a: "Wansui!"

 fengtian_political_events.18.t: "Mantetsu Influence"
 fengtian_political_events.18.d: "Mantetsu's economic influence spreads across the country and through the assembly. While the government is, for now, committed to privately resisting, their efforts seem to grow weaker by the day."
 fengtian_political_events.18.a: "A necessary evil?"

 fengtian_political_events.19.t: "Pervasive Mantetsu Influence"
 fengtian_political_events.19.d: "Our factories rumble with activity, churning out weapons, supplies, and every-day conveniences at an astounding rate. None of this would be possible without Japan, but whispers of discontent abound. Who are we fighting for, China or Japan? Is the Republic really being strengthened, or instead brought to its knees by foreign exploitation? Is this truly necessary?"
 fengtian_political_events.19.a: "How much further can this go?"

 fengtian_political_events.20.t: "Mantetsu Dominance"
 fengtian_political_events.20.d: "Japanese expertise and Mantetsu's influence propels Fengtian forward in ways previously thought impossible, but for all intents and purposes most meaningful control has passed from the hands of the Assembly to Japan. [FNG.GetLeader], for better or worse, stands alone before Mantetsu's overwhelming power in the country. It will be up to him to determine the path forward, if there is even one to be found, even as the legitimacy of the government collapses about him."
 fengtian_political_events.20.a: "These are dire times."

 fengtian_political_events.21.t: "Disastrous Governance"
 fengtian_political_events.21.d: "With the power of other factions receding, the Recovery League has found itself in an unprecedented position of strength. However, the League is a far cry from the political party it is often believed to be, lacking functional leadership and clear direction at its higher levels; its lower levels falling prey to various special interests and personal squabbles. The result is a government unable to govern, and while the Grand Marshal is able to use his extensive powers to ensure continued order, this and the League's unscrupulous actions tear at the government's already thin veil of legitimacy.\n\nThe balance must be restored if the country is to prosper."
 fengtian_political_events.21.a: "Things are spiralling out of control..."

 fengtian_political_events.23.t: "Zhang Clique Dominance"
 fengtian_political_events.23.d: "With the power of Zhang's loyalists and immediate subordinates reaching levels unseen since the establishment of the Fengtian Government, its other political factions have begun to turn to unconventional means to stave off a total dictatorship.\n\nAt the Communication's Clique's behest, trains have stopped running on time and telegraph messages disappear, while the Japanese have stepped up both political and economic pressure to aid the Concordia Association. Even the Recovery League, usually considered politically impotent, has staged protests, rallied by a cause célèbre.\n\nThe situation is worsened by the Zhang Clique's now frequent abuses of power and attempts to retaliate through force. Though he has more power than ever before, the Grand Marshal must surely rein in his followers for the greater good of the nation."
 fengtian_political_events.23.a: "Things are spiralling out of control..."

 fengtian_political_events.25.t: "Plutocratic Exploitation"
 fengtian_political_events.25.d: "Though few might have predicted it years earlier, the Communications Clique finds itself as the most powerful faction in government, though this dominance conceals a power structure built upon nothing more than a controlling interest in infrastructure and abundant capital. Thus, Liang and his party lack a broad base of support or the means to render this absence irrelevant. Already the other factions push back as the Clique abuses its power; reaching for further control but sabotaging the national interest in the process.\n\nThis unbalanced situation cannot last forever."
 fengtian_political_events.25.a: "Things are spiralling out of control..."

 fengtian_political_events.28.t.minor: "Anti-Japanese Protests"
 fengtian_political_events.28.d.minor: "Angered by Japan's increasing control over our country, protests have broken out in Shenyang, Harbin, and Changchun. Police and military units are already on site, containing the protests, but the damage is already done."
 fengtian_political_events.28.t.major: "Major Anti-Japanese Protests"
 fengtian_political_events.28.d.major: "Angered by the overwhelming control over our country by Japan and Mantetsu, protests have broken out across the country. Police and military units are already on site, but they seem unwilling to truly press the crowds. While the protests ought to die down in a few days, they seem unlikely to end unless major changes occur."
 fengtian_political_events.28.a: "Unfortunate."

 fengtian_political_events.29.t: "Creeping Mantetsu Influence"
 fengtian_political_events.29.d: "As it has done for years, Mantetsu continues its slow but sure efforts to dominate our economy, investing in businesses, buying others up, and diversifying across the industrial sector.\n\nGiven enough time, it seems as if the whole country might be swallowed up, unless a final and decisive break is made with Japan."
 fengtian_political_events.29.a: "This must be resisted."

 fengtian_political_events.30.t: "The Generals Grow Restless"
 fengtian_political_events.30.d: "Worried by their diminishing influence in the Assembly, and throughout the government, powerful members among the Zhang Clique have begun voicing their discontent, claiming that if they so desired, the entire assembly could be dissolved in minutes by force of arms. These statements have been reinforced by a slow but steady increase in the capital's garrison, which would almost certainly overwhelmingly side with their patron generals in the event of any political upheaval."
 fengtian_political_events.30.a: "Worrying..."

 fengtian_political_events.31.t: "Railway and Telegraph Mysteries"
 fengtian_political_events.31.d: "Ministers and other government officials have strangely found themselves immensely inconvenienced as of late, with telegrams going missing or relayed to the wrong people, secrets uttered only over the telephone suddenly becoming public, and trains mysteriously arriving chronically late. Of course, many are well aware that this is merely the Communications Clique showing its discontent with its recent diminishing influence, and it seems likely that these measures it has taken will reinforce its necessity to the government's effective functioning."
 fengtian_political_events.31.a: "Such is politics."

 fengtian_political_events.32.t: "Communications Clique Leads Railroad Strikes"
 fengtian_political_events.32.d: "The Communications Clique, with its widespread influence in Chinese-owned Manchurian railroads like the CER, has resorted to encouraging union activity and strikes to compensate for its recent losses of influence in government. The Clique will likely only go so far, for risk of creating something it cannot control, but their methods have already been fairly successful in demonstrating their political and economic clout."
 fengtian_political_events.32.a: "Troubling."

 fengtian_shenyang_conference_events.1.t: "The Shenyang Conference"
 fengtian_shenyang_conference_events.1.d1: "As it stands, [QIE.GetNameDef] presents the most powerful obstacle against our ambitions for China and Asia as a whole. Although we have the means to defeat them alone, it would certainly be a daunting and costly task. Worse yet, we run a significant risk of being seen as Japan's crony if we go at it alone, allowing [QIE.GetLeader] to rally the other warlords against us. We must not allow this to happen.\n\nIn order to show to our friends in Asia that we're a legitimate power when we stand up to [QIE.GetNameDef], we have organised a conference to be held in Shenyang where we'll form a coalition against them. Not only will this strengthen our position, but it will also prove our legitimacy to the world."
 fengtian_shenyang_conference_events.1.d2: "We have been forced to already commence our Reclamation War against [QIE.GetNameDef], even though not all of our allies may have been ready. However, some may yet be swayed to our side during this conflict. We must reach out to the Anqing Clique to the south, which has just come out victorious against the League and hope to immediately get them to join our side. We cannot afford the resources now to aid them in reconstruction, as we are already occupied with the war."
 fengtian_shenyang_conference_events.1.a: "Send the invitations."

 fengtian_shenyang_conference_events.2.t: "Invited to the Shenyang Conference"
 fengtian_shenyang_conference_events.2.ddef: "Today we formally received an invitation to the Shenyang Conference hosted by [From.GetNameDef]. Its goal is to allow us to improve our coordination in future conflicts and create a broader cooperation between [From.GetNonIdeologyNameDef] and the other powers across China. As we have nothing to lose by accepting their friendly invitation and participating in the conference, we will accept and attend."
 fengtian_shenyang_conference_events.2.danq: "We have received an invitation to the Shenyang Conference hosted by [From.GetNameDef]. They hope to discuss important issues related to us joining their Reclamation War against [QIE.GetNameDef], which has already begun. As they aided us in our conflict to reunite the Five Provinces, we should hear them out. They have also let us know they currently cannot spare any resources to aid us in our reconstruction, as they are fully occupied with the war."
 fengtian_shenyang_conference_events.2.a: "Send a delegation."

 fengtian_shenyang_conference_events.3.t: "[FROM.GetName] Agrees to the Conference"
 fengtian_shenyang_conference_events.3.d: "Good news! [FROM.GetNameDefCap] has replied to our invitation and they have agreed to attend the Conference. We can expect their delegation to arrive soon."
 fengtian_shenyang_conference_events.3.d1: "Good news! [FROM.GetNameDefCap] has replied to our invitation and they have agreed to attend the Conference. We can expect their delegation to arrive soon. However, we must note that their current loyalties lie with [ANQ.GetLeader] as Anqing took Shandong in the League War and turned them into a puppet. They have promised the province to us once the war begins, however."
 fengtian_shenyang_conference_events.3.a: "Excellent."

 fengtian_shenyang_conference_events.4.t: "Negotiations with the Federalists?"
 fengtian_shenyang_conference_events.4.d.no_allies: "Our current diplomatic position leaves much to be desired. Besides Japan, we have no natural allies in the region that would be able to cooperate with us against [QIE.GetNameDef]. This leaves us with the unorthodox but still present possibility of approaching the Federalists to support us. While they are anything but insignificant, we certainly have our fair share of ideological differences. Be that as it may - if we can bridge them, they could become a potent ally in the conflict ahead."
 fengtian_shenyang_conference_events.4.d.conference: "While we have gained ground with our recent diplomatic efforts, the question of whether or not to engage the Federalists has been raised by some of our advisors. While we have our fair share of ideological differences, they argue that our growing strength and influence should allow us to overcome this hurdle and add another ally to our ranks. Thanks to our other successes however, we could always decline to do so and spare ourselves from their inevitable demands."
 fengtian_shenyang_conference_events.4.a: "Let's try to find common ground."
 fengtian_shenyang_conference_events.4.b: "Don't bother."

 fengtian_shenyang_conference_events.5.t: "An Offer from [FROM.GetNonIdeologyNameDef]"
 fengtian_shenyang_conference_events.5.d.no_allies: "Today we received a message from [FROM.GetNameDef] stating their wish to discuss possible cooperation against [QIE.GetNameDef]. While we don't see eye to eye on a lot of issues, we can perhaps attribute their more welcoming tone to the broader isolation that they're experiencing. Given their lack of allies in the region, attending would allow us to encourage them to agree to sorely needed reforms in exchange for our helping hand. How should we reply?"
 fengtian_shenyang_conference_events.5.d.conference: "In a rather surprising development, [FROM.GetNonIdeologyNameDef] has invited us to attend their conference in Shenyang. Their goal is to create a broad coalition against [QIE.GetNameDef]. So far, they seem to have had some success in bringing the other warlords on board. Perhaps if we attended, we could get them to agree to undertake some sorely needed reforms. How should we respond to their invitation?"
 fengtian_shenyang_conference_events.5.a: "Very well, let's go to Shenyang."
 fengtian_shenyang_conference_events.5.b: "We don't trust them."

 fengtian_shenyang_conference_events.6.t.accepted: "[From.GetNonIdeologyNameDefCap] Agrees to the Conference"
 fengtian_shenyang_conference_events.6.d.accepted: "Good news! [From.GetLeader] has replied to our invitation to attend the Shenyang Conference. He has agreed to attend the conference and we should expect a Federalist delegation to arrive in short order."
 fengtian_shenyang_conference_events.6.a: "Excellent."

 fengtian_shenyang_conference_events.6.t.refused: "[From.GetNonIdeologyNameDefCap] Refuses our Offer"
 fengtian_shenyang_conference_events.6.d.refused: "Perhaps unsurprisingly, [From.GetLeader] has refused our olive branch. In the letter he sent in reply to our invitation, he cited the Japanese influence as the primary reason, claiming that he doubted our ability to speak for ourselves rather than simply doing Tokyo's bidding."
 fengtian_shenyang_conference_events.6.b: "Their loss."

 fengtian_shenyang_conference_events.7.t: "Start of the Shenyang Conference"
 fengtian_shenyang_conference_events.7.d: "Delegates have arrived in Shenyang to discuss [From.GetNonIdeologyNameDef]'s initiative against the regime. A brief opening ceremony was held, culminating in an introductory speech by Zhang Zuolin. Everyone's in good spirits, though no one doubts the diplomatic challenges that lie ahead."
 fengtian_shenyang_conference_events.7.a: "Let's begin."

 fengtian_shenyang_conference_events.8.t: "Heated Discussions"
 fengtian_shenyang_conference_events.8.d: "Everyone knew that [ANQ.GetLeader] and [SHD.GetLeader] would have a hard time cooperating given their mutual dislike. Unfortunately, they've allowed their private disagreements to become a public dispute, which has now disrupted the talks. Zhang Zongchang in particular has caused a scene as his mannerisms and blatant disrespect for authority are enough to make even the most hardened warlord raise an eyebrow. We can only hope that this won't set a trend as the conference goes on."
 fengtian_shenyang_conference_events.8.a: "Cut it out, both of you!"

 fengtian_shenyang_conference_events.9.t: "Federalists Press for Reforms"
 fengtian_shenyang_conference_events.9.d: "As expected from the Federalists, [FNG_shenyang_federalist_leader.GetLeader] has been attempting to pressure Zhang Zuolin to adopt reforms. The aim of these would be the gradual liberalisation of [From.GetNonIdeologyNameDef] and ideally - for him - that these reforms at the head would trickle down to influence the other warlords as well. It's clear that the Federalists aren't prepared to support Zhang without getting something in return."
 fengtian_shenyang_conference_events.9.a: "Make vague promises."

 fengtian_shenyang_conference_events.10.t: "The Anti-Concessionist Question"
 fengtian_shenyang_conference_events.10.d.ANQ: "Fierce opponents of the Concessions to the colonial powers, the [ANQ.GetNonIdeologyNameDef] delegation has been actively pressuring Fengtian to accept a firm stance against the Concessions. Zhang Zuolin has been reluctant to make any definitive pledges on the matter so far, but that hasn't made the issue go away. It's evident that this won't last long if the conference is to move forward."
 fengtian_shenyang_conference_events.10.d.GXC: "Fierce opponents of the Concessions to the colonial powers, the [ANQ.GetNonIdeologyNameDef] delegation has been actively pressuring Fengtian to accept a firm stance against the Concessions. They've been supported in this endeavour by the Federalists, who are equally defiant against the Concessions albeit from a more liberal position. While Zhang Zuolin has been reluctant to state an official position on the matter so far, he's likely to be forced to do so soon. As the influence that the two Chens wield is gaining momentum, this issue isn't likely to go away."
 fengtian_shenyang_conference_events.10.a: "They might have a point..."

 fengtian_shenyang_conference_events.11.t: "[ANQ.GetNonIdeologyNameDefCap] and [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] Find Common Ground"
 fengtian_shenyang_conference_events.11.d: "United by a staunch Anti-Concessionist platform, the two Chens of [ANQ.GetNonIdeologyNameDef] and [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] have formed what's essentially a bloc in the conference. With broad support for their positions, Zhang Zuolin's undeclared position is becoming more and more untenable by the hour."
 fengtian_shenyang_conference_events.11.a: "This may be a problem."

 fengtian_shenyang_conference_events.12.t: "Zongchang's Drunken Rants"
 fengtian_shenyang_conference_events.12.d: "After drinking Sake by what we can only assume to be the barrel-load, [SHD.GetLeader] has created a scene today as he slurred and yelled his way through a drunken tirade. What little could be understood of his ravings were nothing short of a love letter to Japan with only his love for Japanese booze and women being comprehended by the hostage audience, if only through repetition. Most of Zhang's incomprehensible ravings were, for better or for worse, impossible to understand, which may have been a blessing in disguise.\n\nAfter creating a spectacular scene, he got up on his chair and put one boot down on the table. Before he could be made to sit down again, he declared a toast to Japan, with the rest of his speech sounded more like a man struggling to hold back vomit than actual words. To say that this has created a negative atmosphere among the conference attendants would be the understatement of the decade."
 fengtian_shenyang_conference_events.12.a: "Stop embarrassing us!"

 fengtian_shenyang_conference_events.13.t: "Yang Yuting Urges Caution"
 fengtian_shenyang_conference_events.13.d: "With Anti-Concessionist sentiments rising, Yang Yuting has come forward to urge the Old Marshal to be cautious with regards to the stance on the Concessions. Because of Japan's strong interests in them, particularly through its China Agency in the Legation Cities, they stand to lose greatly if we went ahead and declared ourselves to be against the Concessions. Because of our healthy and mutually beneficial cooperation, alienating them would be seen by Tokyo as not merely an insult, but naked aggression against them.\n\nWhile hardly unexpected, Yuting's actions prove that Japan is worried about our eventual decision. If nothing else, it's a reminder that they will not sit idly by if we join the Anti-Concessionist movement."
 fengtian_shenyang_conference_events.13.a: "A fair warning."

 fengtian_shenyang_conference_events.14.t: "The Point of Decision"
 fengtian_shenyang_conference_events.14.d: "Facing insurmountable pressure from his potential partners, Marshal Zhang must decide whether he agrees to the Anti-Concessionist stance that has overtaken the conference or tries to argue against them. Siding against the Anti-Concessionists would severely hinder our chances of forming a strong alliance. Adopting an Anti-Concessionist stance, however, would severely anger Tokyo."
 fengtian_shenyang_conference_events.14.a: "Very well, we accept."
 fengtian_shenyang_conference_events.14.b: "We cannot afford angering Japan."

 FNG_federalist_allies: "§GФедералисты объединят с нами усилия против [QIE.GetNameDef]!§!"
 FNG_anticoncessionists_angered: "§R[ANQ.GetNonIdeologyNameDefCap] и [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] будут сильно возмущены этим решением!§!"
 FNG_federalists_angered: "§R[FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] будет сильно возмущен этим решением!§!"
 FNG_anqing_angered: "§R[ANQ.GetNonIdeologyNameDefCap] будет сильно возмущен этим решением!§!"

 fengtian_shenyang_conference_events.15.t: "The Federalist-[FNG.GetNonIdeologyAdjective] Alliance"
 fengtian_shenyang_conference_events.15.d: "It wasn't easy to overcome the numerous differences between us. In the end though, pragmatism won out and enough common ground was found to make this unlikely friendship a reality. [FNG.GetNonIdeologyNameDef] and the Federalists of [FNG_shenyang_federalist_leader.GetNonIdeologyNameDef] are now on the same side following a long series of secretive negotiations. Let us hope that this alliance stands the test of time."
 fengtian_shenyang_conference_events.15.a: "Excellent."

 fengtian_shenyang_conference_events.16.t: "[ANQ.GetNonIdeologyNameDefCap] Thanks Us"
 fengtian_shenyang_conference_events.16.d: "We've received official word from [ANQ.GetLeader] that they are happy we took an Anti-Concessionist stance. However, they have not yet weighed all the matters concerning their decision to join us in our Reclamation War. We await their final decision."
 fengtian_shenyang_conference_events.16.a: "We'll have to wait."

 fengtian_shenyang_conference_events.17.t: "Victory for the Anti-Concessionists"
 fengtian_shenyang_conference_events.17.d: "Although there was no shortage of hurdles to overcome along the way, diplomacy has won the day. The Shenyang Conference has ended in a success for [Root.GetNonIdeologyNameDef], cementing their position in the region at the expense of the Beijing government. The delegates left the city after a cordial closing ceremony. Zhang Zuolin is now several steps closer to turning his ambitions into reality."
 fengtian_shenyang_conference_events.17.danq: "Zhang Zuolin has reaffirmed his position to back the Anti-Concessions Movement! Although there was no shortage of hurdles to overcome along the way, diplomacy has won the day. The Shenyang Conference has ended in a success for [Root.GetNonIdeologyNameDef], cementing their position in the region at the expense of the Beijing government. The delegates left the city after a cordial closing ceremony. It is now up to us if we will indeed put our weight behind Zhang Zuolin and join his Reclamation War."
 fengtian_shenyang_conference_events.17.a: "Next stop: Beijing!"
 fengtian_shenyang_conference_events.17.b: "We'll make the right decision."

 fengtian_shenyang_conference_events.18.t: "The Federalists Storm Off"
 fengtian_shenyang_conference_events.18.d: "Finding a compromise on the Concessions proved to be an insurmountable task. It was simply politically impossible for the Federalists to make a complete U-turn on the matter, while Zhang's refusal to budge is being publicly mocked as a simple refusal to bite the hand that feeds it. After publicly denouncing the conference as a sham, the Federalist delegation led by [FNG_shenyang_federalist_leader.GetLeader] left the conference. Any chance for an alliance between them and [Root.GetNonIdeologyNameDef] is now likely an outright impossibility."
 fengtian_shenyang_conference_events.18.a: "This will be trouble."

 fengtian_shenyang_conference_events.19.t: "Zhang Zuolin Refuses Our Demands"
 fengtian_shenyang_conference_events.19.d: "Evidently, Zhang Zuolin simply could not bite the hand that fed him. By declaring his opposition to the anti-Concessionists, he's showed his colours for all of China to see. There's absolutely no way we can side with [From.GetNonIdeologyNameDef] under these circumstances. While we'd hoped that he'd see reason, we can't say we're surprised either. Our delegation left the conference earlier today, leaving Zhang Zuolin with his Japanese cronies."
 fengtian_shenyang_conference_events.19.a: "What to expect from a Japanese puppet?"

 fengtian_shenyang_conference_events.20.t: "[From.GetNonIdeologyNameDefCap] Refuses to Denounce the Concessions"
 fengtian_shenyang_conference_events.20.d: "Despite our best efforts, our delegates could not convince Zhang Zuolin to stand against the concessions. We'll not let this go lightly, but we must not commit any rash actions and immediately denounce Marshal Zhang. Let us look at the factors and decide whether or not to join Zhang Zuolin in his Reclamation War against Beijing."
 fengtian_shenyang_conference_events.20.a: "Unfortunate."

 fengtian_shenyang_conference_events.21.t: "Tiaoyuan Decides His Position"
 fengtian_shenyang_conference_events.21.d: "The [FNG.GetNonIdeologyNameDef] stance on the Concessionist question greatly angered [ANQ.GetNonIdeologyNameDef]'s Chen Tiaoyuan. However, [ANQ.GetNonIdeologyNameDef] delegates have informed us that the decision whether or not they will join our war against Beijing and enter into an alliance with us has yet to be made. We eagerly await their final answer."
 fengtian_shenyang_conference_events.21.a: "We must be patient."

 fengtian_shenyang_conference_events.413.t: "Doomed to Failure"
 fengtian_shenyang_conference_events.413.d: "We have once again taken the city of Beijing and seem poised to reunite China, yet this is not nearly enough to cast off the shadow of Japanese influence. With our country chained to Japan more tightly than ever before, hopes of unifying China by negotiation are fated to be merely hopes. The only path left seems to be with Japan..."
 fengtian_shenyang_conference_events.413.a: "But Beijing is ours!"

#Beijing Conference

 fengtian_beijing_conference_events.000.t: "The Beijing Conference"
 fengtian_beijing_conference_events.000.d: "China, long divided, may finally find a respite from the chaos. The Five-Coloured Flag of the Chinese Republic now flies proudly over Zhengyang gate as [ROOT.GetNameDef]'s troops hold garrisons and posts throughout the country. With several major urban centers fully occupied and liberated, prospects of national unification grow ever so strong.\n\nDespite their victory, the Fengtian Clique has a massive hurdle to cross with the burdens of unification. Fengtian's economy, once one of China's greatest industrial centres, now faces hyperinflation with the sudden influx of inheriting the former national economy. With currency completely non-standard and markets utterly collapsing, the newly unified republic suffers from the possibility of a total economic depression. Furthermore, the ever-growing military of the Fengtian Clique also suffers from disarray, due to its overextended troops, undisciplined looting, and deserters. The military leadership have attempted to install discipline within the ranks but it's clear that the overextended and burdensome military will need to be addressed.\n\nZhang Zuolin, the Old Marshal, plans to use this moment of victory by hosting a National Reunification Conference in Beijing. This conference aims to bolster the Clique and Zhang's legitimacy as the true inheritor of the Republic of China. It's expected that politicians, intellectuals, industrialists, and generals from both the Fengtian Clique and China nationally will be in attendance to witness the momentous event.\n\nThe Japanese government has also been present in witnessing the unification of China unfold. Newspapers and pamphlets throughout Japan applaud Zhang's unification in driving out Western influence from Asia and achieving China's liberation from imperialism. In particular, Japan's prestigious Tianjin Army has been praised for their speed, discipline, and efficiency in assisting Marshal Zhang's advance throughout the country."
 fengtian_beijing_conference_events.000.a: "The Road to Unification lies in front of us."

 fengtian_beijing_conference_events.001.t: "Zhang Calls Conference in Beijing"
 fengtian_beijing_conference_events.001.d: "Once exiled and isolated from Beijing's halls of power, the Fengtian Clique has made a rapid turnabout with Japanese support. Grand Marshal Zhang Zuolin stands triumphant, having overrun most of his foes and is rapidly being recognised internationally as China's legal government.\n\nThe ascension of the National Pacification Army (the Anguojun) has worried many, who fear the rapid expansion of Japanese influence across China. As Zhang's foes begin to band together against Japan, within the Fengtian Clique divisions have emerged about their erstwhile \"patrons.\" Amid a changing political situation and the challenges of economic reconstruction, the Grand Marshal has called a conference to resolve lingering tensions."
 fengtian_beijing_conference_events.001.a: "The final enemy of the nation remains..."
 fengtian_beijing_conference_events.001.b: "Let us see if Marshal Zhang will play ball."
 fengtian_beijing_conference_events.001.c: "Will the Dragon remain shackled or fly free?"

 fengtian_beijing_conference_events.002.t: "Japan Divides the Conference"
 fengtian_beijing_conference_events.002.d: "Although Marshal Zhang called the Beijing Conference to discuss matters regarding national unification, it seems that much of the discussion has devolved into debates around Japan and the fate of the new Anguojun government. It is no secret that Sino-Japanese ties have proven to be a double edged sword for previous Chinese administrations, having resulted in the toppling of the Anfu Government. Zhang too was forced to rely extensively on Tokyo's aid to maintain his ailing government, his reputation too was marred and members of the Anguojun Conference have rightfully voiced concerns.\n\nThe Marshal's Zhang Clique inner circle are somewhat hesitant to maintain such close Japanese ties, with Zhang Xueliang's young guard being particularly hostile. Meanwhile, the Recovery League has split over the issue, with members like Wang Yitang calling for maintaining close ties to Tokyo, while Wu Jinglian and his supporters advise the Grand Marshal to distance himself from the Rising Sun.\n\nThe New Communications Clique is unsurprisingly also advising Marshal Zhang to maintain his ties to Tokyo on the grounds of economic recovery and development. Yang and the Shikan Clique have been somewhat split, with Chang Yinhuai's nationalist faction declaring that they've learned enough from Tokyo to go their own way, while Yang has been more passively pro-Tokyo in his stance.\n\nThe Concordia Association has been the most vocal about maintaining Japanese ties, declaring their support for the Pan-Asian project to topple European Imperialism and China's role in the New Asian Order. The New People's Society has also made a presence in the conference, funded by the Tianjin Army in hopes of challenging the Concordia Association and their Kwantung overlords. They too call for maintaining ties with Tokyo, but urge the conference to redirect its focus to unification. With so many voices declaring different concerns, Marshal Zhang recognises that his choice will be controversial no matter what."
 fengtian_beijing_conference_events.002.a: "For the good of the nation, we must maintain our ties to Tokyo."
 fengtian_beijing_conference_events.002.b: "The nation must be free, both from Germany and Japan!"

 fengtian_beijing_conference_events.003.t: "The Remnants of Beiyang"
 fengtian_beijing_conference_events.003.d: "The Beiyang Government was once a Northern Chinese government based in Beijing, held together by the united Beiyang Army. Although Yuan Shikai was able to hold the army together as its founder, his successor Duan Qirui favoured his Anhui faction above others, earning him the ire of many who coalesced into the Zhili Clique. Meanwhile in the Northeast, local Beiyang forces join with Zhang Zuolin's former bandit allies to create the Fengtian Clique.\n\nAfter the Beiyang Government was shattered by infighting, the Zhili and Fengtian Cliques remained in constant struggle, with the Zhili scooping up most of the apolitical elements and Fengtian gaining many former Anhui supporters. With the fall of the Zhili Clique as well, the Fengtian Clique has emerged as Beiyang's sole heir, leaving many old anti-japanese luminaries with a hard choice. The remaining Beiyang splinter cliques under the Zhili have been absorbed by the Fengtian factions, though such a process has not been smooth.\n\nLocal Northeast bureaucrats have been hesitant to move south, Beiyang bureaucrats are resentful of Northeasterners marching into the Northern Plains to dictate terms to them, and many Fengtian officials squabble amongst themselves for jobs. As it stands, much of the newly conquered territories will remain in states of unrest and disorder until the growth pains of the Fengtian Government subside."
 fengtian_beijing_conference_events.003.a: "Loyalty is more valuable than merit!"
 fengtian_beijing_conference_events.003.b: "Is this not a meritorious government?"
 fengtian_beijing_conference_events.003.c: "Perhaps the Beiyang factions know the Central Plains best?"

 fengtian_beijing_conference_events.004.t: "The FCDP Rally the Opposition"
 fengtian_beijing_conference_events.004.d: "With the Fengtian Clique consolidating control of Northern China, old opponents of the Zhili Clique have re-emerged. The Federation of Chinese Democratic Parties, founded as the United National Construction League, was created by liberal opposition to the Zhili Government in the aftermath of the Seven Gentleman Incident where seven prominent National Salvation Federation members were arrested on charges of treason.\n\nA coalition of the Chinese Constitutionalist Party, Political Science Clique, Endeavor Society, and National Salvation Federation, they were an influential force in Northern China until the Zhili suppressed them in 1932. In the chaos of the Fengtian reconquest, the FCDP has once again emerged as a prominent force across the Northern Plains.\n\nMany of China's intellectual and politician class dislike Zhang, viewing him as a despotic brute in comparison to the learned Wu. The FCDP is an unwieldy force, but they have some institutional power as established opposition, and Marshal Zhang recognises that ignoring them would be a grave mistake.\n\nThe FCDP has taken to the streets, where they foster support amongst nationalistic students and intellectuals, denouncing any potential alliance with Japan that Zhang may consider. Northeast People's Self-Help Association too has joined with the FCDP, with the NSF in particular, in denouncing Japanese domination. This development has been of particular concern to Zhang, who has traditionally been quite popular in the Three Northeastern Provinces."
 fengtian_beijing_conference_events.004.a: "Perhaps we can allow some level of democracy..."
 fengtian_beijing_conference_events.004.b: "Wu Peifu was too soft on these idealistic fools!"

 fengtian_beijing_conference_events.005.t: "The Great Decision"
 fengtian_beijing_conference_events.005.d: "What began with the Beijing Conference has come to a head. Pro-Japanese elements in the Fengtian Clique have increased pressure on Zhang to align his government with Tokyo, while anti-Japanese factions in the government as well as street protestors have intensified their rhetoric. Rumours circulate across the nation that non-aligned warlords and rival governments to Fengtian intend on forming a United Front to fight the Fengtian Government and public perception of Zhang is falling rapidly.\n\nIt seems that Tokyo has run out of patience with Zhang's deliberations, and the Japanese ambassador is directly pressuring the Old Marshal to sign more indepth treaties with them, including formally joining the Co-Prosperity Sphere.\n\nMarshal Zhang now finds himself facing a tough choice with two options. He could sign the treaty for joining the Co-Prosperity Sphere immediately, gambling on Japanese aid to sweep away the opposition and then negotiate for concessions later from a stronger position. The second more risky option is for him to demand the concessions as part of the agreement to join the Co-Prosperity Sphere, which would appease the nationalists but risks causing a major overreaction by the Japanese who expect to hold onto their major concessions."
 fengtian_beijing_conference_events.005.a: "We will open negotiations to join the Sphere."
 FNG_JAP_influence_high_tooltip: "§RBecause Japanese influence is 50% or above, this is the only option available.§!"
 fengtian_beijing_conference_events.005.b: "We will gamble that Japan values us more than the concessions."

 fengtian_beijing_conference_events.010.t: "Zhang Invites us to Beijing"
 fengtian_beijing_conference_events.010.d: "With Fengtian victory over their rivals in Beijing, it seems that unification is finally at hand after decades of division. In order to plan the Anguojun's next move, Marshal Zhang has called a conference in Beijing involving all major warlords that recognise his government. However, it seems that the conference has rapidly devolved into debates surrounding the future relationship between China and Japan, much to Zhang's chagrin. The Zhang Clique has argued for distancing from Tokyo, while Concordia, New People's Society, and Communications Clique have pushed for maintaining ties, and the Recovery League and Shikan Clique find themselves divided over the issue. On top of factional disputes on Japanese ties, the FCDP has re-emerged as a liberal opposition force, taking to the streets to campaign against Japanese alignment and call for an end to corruption and democratisation. The Japanese have also directly demanded Zhang to sign treaties of friendship, including formal entry into the Co-Prosperity Sphere. As a major figure in the Anguojun, [ROOT.GetLeader]'s word would surely influence Marshal Zhang's decision."
 fengtian_beijing_conference_events.010.a: "We must not ally with the Japanese Imperialists!"
 fengtian_beijing_conference_events.010.b: "Friendship with Tokyo guarantees our future."

 fengtian_beijing_conference_events.011.t: "[FROM.GetLeader] Rails Against Japan"
 fengtian_beijing_conference_events.011.d: "With Marshal Zhang's Beijing Conference well under way, it seems that the Japan question has generated strong opinions. [FROM.GetLeader] in particular has been very vocal in opposing further alignment with Tokyo, declaring it to be unthinkable. It is unknown whether he is coming from an angle of genuine patriotism, or is at least appealing to it. Cynically, perhaps [FROM.GetLeader] simply fears that Japanese dominance will result in their declining influence and eventual sidelining, or maybe they fear that the rest of China will rally against the Anguojun. For whatever reasons, Marshal Zhang must consider [FROM.GetLeader]'s stance carefully."
 fengtian_beijing_conference_events.011.a: "Their opinion is heard."
 fengtian_beijing_conference_events.011.b: "...or maybe not."

 fengtian_beijing_conference_events.012.t: "[FROM.GetLeader] Advocates for Japan"
 fengtian_beijing_conference_events.012.d: "With Marshal Zhang's Beijing Conference well under way, it seems that the Japan question has generated strong opinions. [FROM.GetLeader] in particular has been very vocal in supporting further alignment with Tokyo, declaring it to be critical to the survival of the Fengtian Government. It is unknown the true reason for why he supports the Japanese Alliance. Maybe he fears Japanese invasion and views alignment to be a better fate, and perhaps rationalises that China will inevitably have more leverage in the future in such a partnership. Cynically, perhaps he has merely been bribed by the Japanese to support their interests. For whatever reasons, Marshal Zhang must consider [FROM.GetLeader]'s stance carefully."
 fengtian_beijing_conference_events.012.a: "Their opinion is heard."
 fengtian_beijing_conference_events.012.b: "...or maybe not."

 fengtian_beijing_conference_events.013.t: "Zhang Sidelines Us"
 fengtian_beijing_conference_events.013.d: "Although we are a critical part of the Anguojun Alliance, it seems that perhaps [FROM.GetLeader] has garnered less respect than he is owed. It has become apparent that our opinion means nothing in Marshal Zhang's calculus. [FROM.GetLeader] offered his Marshal his sincere opinion in the hopes of bettering the nation, and was promptly ignored. It is clear that Marshal Zhang is nothing more than a selfish dictator who ignores his subordinates. [FROM.GetLeader] has angrily stormed out of Beijing, deliberating his next move."
 fengtian_beijing_conference_events.013.a: "We ought to reconsider our allegiance."

 fengtian_beijing_conference_events.020.t: "Zhang's Unification Conference"
 fengtian_beijing_conference_events.020.d: "After years of strife, it seems that Zhang Zuolin has defeated his rivals in Beijing and restored his status as leader of China's internationally recognised government. The Anguojun has greatly expanded, reaching deep into the Central Plains. However, success often proves to be a double edged sword, and the rest of China has become scared into banding together against both Zhang and Tokyo. We have the leverage to pressure Zhang into formally joining the Co-Prosperity Sphere as the internationally recognised China, but the Beijing Conference has produced worrying results. Many of Zhang's inner circle oppose alignment with us, and our allies and agents on the ground have been quite counterproductive. The Concordia Association's presence south of the Great Wall has been meagre to say the least, their associates in the Kwantung Army are more furious that the Tianjin Army was able to successfully carry out their plan, and the Tianjin Army has been doing premature victory laps before their eggs hatch in establishing the New People's Society to rival the Concordia Association and be their mouthpiece, and the Shanghai Garrison has not exercised any meaningful influence in the Beijing Conference. Of the Pro-Japanese elements in the Fengtian Government, many dislike each other, and are mutually suspicious of each other. We can consider trying to bring together all these disparate elements into a single cohesive Pro-Japanese front, but such a difficult effort requires substantial investment and time."
 fengtian_beijing_conference_events.020.a: "We are on the cusp of victory, we cannot fail now!"
 fengtian_beijing_conference_events.020.b: "Alas China unites but we remain divided."

 fengtian_beijing_conference_events.021.t: "Tokyo Coordinates Their Forces"
 fengtian_beijing_conference_events.021.d: "It is well-known that despite shared affinity for Japan, the various Pro-Japanese factions in the Fengtian Government have typically engaged in substantial infighting. Rivals in the Recovery League often get into squabbles with the New Communications Clique, and the Concordia Association and Kwantung Army spend more time attempting to root out Tianjin Army influence than on promoting Tokyo's interests in Shenyang, and vice versa. However, recently it seems that there has been a substantial shift in Pro-Japanese circles, as they have begun to work as one cohesive chorus guided by an invisible conductor at the helm. They have all been unanimous in urging Marshal Zhang to join the Co-Prosperity Sphere. Such a concerted effort has concerned the Old Marshal, who has traditionally played these groups against each other in his bid to prevent anyone from getting too much influence."
 fengtian_beijing_conference_events.021.a: "How much money did Japan spend to make this happen?!"

 fengtian_beijing_conference_events.200.t: "Zhang Demands the Concessions"
 fengtian_beijing_conference_events.200.d: "In the Beijing Conference, it became clear that Marshal Zhang's stance towards Tokyo would be the primary topic of discussion. Various minor warlords argued for or against us, as did Zhang's many factions in Shenyang. Of the major factions not directly aligned with us, the Recovery League was mainly divided, the New Communications Clique threw their weight in favour of us despite their recent business disputes with the Concordia Association, the Zhang Clique was mostly against us, and the Shikan Clique was divided, but leaned towards us.\n\nAlongside the debates at the highest levels of government, on the street the Federation of Chinese Democratic Parties organised protests of nationalistic students to rally against continued Japanese influence. With our ambassador directly pressuring him to sign treaties of friendship and formal entry into the Co-Prosperity Sphere, Zhang has finally made his move.\n\nHoping to throw his weight around to his advantage, the Old Marshal has demanded the return of Japanese concessions in China and the end of extra-territoriality. He has stressed that he hopes to enter the Co-Prosperity Sphere as in equal power to Tokyo. Although Zhang has not explicitly declared his intention to take control of Mantetsu or other Japanese interests in China, it is clear that Zhang already sees himself as the victor in China. Tokyo is faced with a choice to either accept Zhang's terms or stall for time while preparing our forces to \"protect\" vital interests."
 fengtian_beijing_conference_events.200.a: "We begrudgingly accept these terms."
 fengtian_beijing_conference_events.200.b: "Stall for time while our forces prepare."
 FNG_JAP_war_in_two_weeks_warning_tt: "§RIn two weeks we will enter a war with China.§!"

 fengtian_beijing_conference_events.201.t: "The Mukden Incident"
 fengtian_beijing_conference_events.201.d: "Ever since Marshal Zhang's confrontation with the Japanese, it seems that Sino-Japanese tensions were escalating rapidly and an invasion of the Northeast was imminent. In the dead of night, a section of the South Manchuria Railway near Liutiao Lake was blown up by unknown actors. Tokyo declared that Chinese dissidents connected to the FCDP were involved.\n\nDenouncing Marshal Zhang as being unable to protect Japan's interests, Tokyo mobilised the Kwantung Army and its forces in Korea to cross into Chinese territory to secure its interests. Firing at our border guards, the Japanese Imperial Army crossed the Yalu River at midnight in what was essentially a declaration of war in all but name. Marshal Zhang has called the Anguojun to meet this threat to Chinese sovereignty and defend China from the Japanese invaders.\n\nRegardless of whoever set off this bomb, it seems that China and Japan are headed towards all out war. Already Japan's youth are being called upon to \"fulfil the duty of their fathers\" who fought and died in Manchuria in 1905, and there can be no illusions about the seriousness or extent of this war - for us it will soon become one of survival or annihilation."
 fengtian_beijing_conference_events.201.a: "Perfidy!"

 fengtian_beijing_conference_events.202.t: "The Mukden Incident"
 fengtian_beijing_conference_events.202.d: "Although Marshal Zhang was widely reputed to be Japan's willing partner in China, it seems that the relationship between Shenyang and Tokyo was always more fragile than previously believed. Nationalistic street protests and pressure within the Beijing Conference has persuaded Zhang to take a more assertive stance against the Japanese, much to Tokyo's fury.\n\nA week ago a bomb went off on the South Manchuria Railway. The Japanese seized the incident as a pretext to cross the Yalu River in a full invasion of China. As the two Asian titans clash, the rest of the continent holds their breath. Should China emerge victorious, the Japanese will lose an integral part of the Imperial war machine. Should Japan win, the rest of Asia will surely bow swiftly."
 fengtian_beijing_conference_events.202.a: "Zhang will face the iron price!"
 fengtian_beijing_conference_events.202.b: "The Rising Sun breaks all who refuse to bow."

 fengtian_beijing_conference_events.210.t: "The Japanese Accept Our Terms"
 fengtian_beijing_conference_events.210.d: "Although Marshal Zhang feared a potential Japanese backlash, it seems that cooler heads in Tokyo have prevailed. Today, the Japanese ambassador has met with the Old Marshal to announce that Japan has accepted China formally into the Co-Prosperity Sphere in exchange for returning all concessions. This is a great victory for the Fengtian Government, for it has not only secured a powerful partner in the East, but also done so while undoing many of the unequal treaties imposed previously, appeasing nationalist elements in the populace. Although the various rival governments in the South will rally against us, Marshal Zhang is confident that the combined efforts of Japan and Fengtian will see them defeated and Beijing ascendant."
 fengtian_beijing_conference_events.210.a: "A toast to a beautiful friendship!"

 fengtian_beijing_conference_events.211.t: "The Sino-Japanese Pact"
 fengtian_beijing_conference_events.211.d: "Against the expectation and to the horror of [ROOT.GetLeader], it seems that Zhang has correctly assessed that Tokyo would prefer an alliance with the Fengtian Government over the continuation of Japanese concessions in China. Tokyo has agreed to hand over all concessions to Zhang's government, including the Legation Cities which have been a boon to the Japanese economy. The Shanghai Garrison has already been ordered to evacuate, and [ROOT.GetLeader] faces a difficult choice. He can choose to either go quietly and acquiesce to Fengian annexation or organise a desperate resistance against the Chinese."
 fengtian_beijing_conference_events.211.a: "A tragic betrayal!"
 fengtian_beijing_conference_events.211.b: "We will not go down without a fight!"

 fengtian_beijing_conference_events.212.t: "The Sino-Japanese Pact"
 fengtian_beijing_conference_events.212.d: "After the Fengtian victory, fears that Zhang would continue to work closely with Japan ran amuck. Zhang's Beijing Conference to discuss peaceful unification was derailed by debate surrounding China's future relationship with Japan.\n\nHemmed by anti-Japanese protests, threats of a warlord coalition against him, and pressure from within his own government, the Old Marshal made a daring gamble. Demanding Japanese concessions in exchange for entry into the Co-Prosperity Sphere, Zhang was able to enshrine his alliance while avoiding the appearance of kowtowing to Japanese interests. Though war with the rest of China is expected, he has staved off challenges to his leadership from within."
 fengtian_beijing_conference_events.212.a: "A Free China in a Free Asia!"
 fengtian_beijing_conference_events.212.b: "It seems our worst fears have been realised."

 fengtian_beijing_conference_events.300.t: "Zhang Asks to Join the Sphere"
 fengtian_beijing_conference_events.300.d: "In the Beijing Conference, it became clear that Marshal Zhang's stance towards Tokyo would be the primary topic of discussion. Various minor warlords argued for or against us, as did Zhang's many factions in Shenyang. Of the major factions not directly aligned with us, the Recovery League was mainly divided, the New Communications Clique threw their weight in favour of us despite their recent business disputes with the Concordia Association, the Zhang Clique was mostly against us, and the Shikan Clique was divided, but leaned towards us.\n\nAlongside the debates at the highest levels of government, on the street the Federation of Chinese Democratic Parties organised protests of nationalistic students to rally against continued Japanese influence. With our ambassador directly pressuring him to sign treaties of friendship and formal entry into the Co-Prosperity Sphere, Zhang has finally made his move.\n\nMuch to our approval, Zhang has agreed to join the Co-Prosperity Sphere without any stipulations. Perhaps Zhang hopes to negotiate for greater concessions after unification, where his leverage will be higher, but that will not be an issue for Tokyo. We can prevent Zhang from demanding much of anything if the Fengtian Pro-Japanese front and our agents in China work to maintain our influence in his government."
 fengtian_beijing_conference_events.300.a: "Zhang submits to reality."
 FNG_JAP_prevent_focus_tooltip: "§YAs long as our Influence remains high, the Fengtian Clique will be unable to take the focuses and decisions needed to demand the return of the concessions.§!"

 fengtian_beijing_conference_events.301.t: "Our Entry into the Sphere"
 fengtian_beijing_conference_events.301.d: "With our entry into the Co-Prosperity Sphere, we can expect much more significant Japanese aid in the struggle to come. Marshal Zhang's rivals in the South have already denounced him as a traitor to the Chinese nation, and have openly called for a United Front to jointly fight off the Anguojun and Japanese. Marshal Zhang is less concerned about the United Front, instead already looking to his ambitions after unification is carried out. The Old Marshal is already scheming to retake the coastal concessions after unification is carried out against his rivals, and keep Japanese influence at a minimum, as he did a decade ago."
 fengtian_beijing_conference_events.301.a: "Let's hope we win this game of chess."

 fengtian_beijing_conference_events.302.t: "The Fengtian Clique Joins the Sphere"
 fengtian_beijing_conference_events.302.d: "After the Fengtian victory, fears that Zhang would continue to work closely with Japan ran amuck. Zhang's Beijing Conference to discuss peaceful unification was derailed by debate surrounding China's future relationship with Japan. Brushing aside anti-Japanese protests, threats of a warlord coalition against him, and pressure from within his own government, the Old Marshal moved to enter the Co-Prosperity Sphere, gambling the Japanese support will help him crush any enemies he makes.\n\nIt seems that Zhang is heading on an inevitable collision course with his remaining rivals across China. The United Front are unlikely to win this war against the Japanese Goliath, but perhaps they will go down as the last stand of a Free China."
 fengtian_beijing_conference_events.302.a: "A Free China in a Free Asia!"
 fengtian_beijing_conference_events.302.b: "It seems our worst fears have been realised."

###FNG-JAP Mechanic Events

#FNG-JAP Mech Events Pt 1 (000-099) - Mission Events
 fengtian_japan_mechanic_events.000.t: "Our Allies in Tokyo"
 fengtian_japan_mechanic_events.000.d: "Zhang Zuolin is proud to have survived decades of China's brutal power games, but the reality is he could not have done it alone nor would his dreams of reunifying the country be realistic if it was not for the patronage of Japan. Many of our rivals paint him as a stooge for foreign imperialists, and even more embarrassing a power that China once saw as akin to a younger brother, but the reality is more nuanced.\n\nZhang Zuolin and many other politicians sympathetic to Japan do seek cooperation with Japan and are willing to make pragmatic concessions to advance their interests, but they also often believe that once China is united they will inevitably have the leverage to renegotiate treaties as equals. Their personal motivations also vary - some are cynically hoping to preserve their own power and wealth while others sincerely buy into Japanese Pan-Asian rhetoric against European powers.\n\nWhatever the case, Japan's outsized influence adds another layer of intrigue in Fengtian Clique politics. Japan expects returns on their investments, but conceding too much to Japan has brought down entire governments in the past - a lesson the exile Anhui and Communications Clique have learned the hard way.\n\nJapan's agents on the ground often fight and compete among themselves as they execute competing agendas often without Tokyo's knowledge. Zhang has been willing to exploit the lack of strategic clarity among Japanese decision-makers, but it also means that many of the deals he makes lack permanence for both sides. Managing expectations from both sides will be integral in his quest to liberate his nation."
 fengtian_japan_mechanic_events.000.a: "We will not be scorched by the rising sun."
 fengtian_japan_mechanic_events.000.tt: "§RBe careful in our dealings with Japan. When we begin our war for Beijing, it will worry many of our Japanese advisors who in turn may do something drastic should the war turn against us. Similarly, if Japanese influence is too high our options for handling reunification may be limited.§!"

 fengtian_japan_mechanic_events.001.t: "The Three Armies in China"
 fengtian_japan_mechanic_events.001.d: "We have a long history with China, but after our victory in the Sino-Japanese War it was clear that we had eclipsed the once great power. Still, our efforts at establishing a hegemony over China have been stymied, even after the Xinhai Revolution and the ensuing Warlord Era tore apart the fragile nation. In addition to surges of Chinese nationalism and also the interference of Western powers, a lack of consistent strategic clarity from Tokyo has caused our various forces on the continent to adopt their own rival agendas.\n\nWhile this strategic ambiguity does offer plausible deniability and flexibility, it has hampered the establishment of a cohesive strategy for handling Chinese affairs. The closest to the \"Official\" line taken by our government in Tokyo are the officers of the Tianjin Army. The oldest but smallest of our China garrisons, they aim to support Zhang Zuolin and the Fengtian Clique's planned War of National Reclamation, which they believe will pave the way for Japanese influence over the whole nation. This subtle, insidious strategy will allow for a Chinese leader at the helm but Japanese control behind the scenes.\n\nTheir rivals in the Kwantung Army, who protect our valuable railroad and mining concessions we won in our wars with China and Russia, oppose operations that may jeopardise those interests. They instead wish to create buffer states to protect our hard-won gains, supporting Russian adventurers in Siberia and secessionist groups in China. They have fostered the Concordia Association as a civilian front to promote our interests in Manchuria.\n\nThe last major force is the Shanghai Garrison, made up of marines and with support of the IJN. Fierce inter-service rivalries have led them to try to seek alternative collaborators in China's east and south.\n\nThe growing autonomy of these three forces are a major concern, as is the growing inevitability of conflict in China with the collapse of the League. It would appear that our fates are now intertwined."
 fengtian_japan_mechanic_events.001.a: "We will tame the Chinese dragon."
 fengtian_japan_mechanic_events.001.tt: "§ROur dealings with China are essential to the long-term health of our empire. When the Fengtian Clique begins their war of National Reclamation, it will present both opportunities and danger. We will likely be dragged into the conflict, but we can ensure it is on favourable terms and it will end to our advantage by supporting the Fengtian Clique and increasing our influence within it.§!"

 fengtian_japan_mechanic_events.002.t: "Tensions in Manchuria"
 fengtian_japan_mechanic_events.002.d: "Ever since the fall of the Anhui Clique, the Fengtian Clique and Zhili Clique have regarded each other as their principal rival. The Zhili first gained the upper hand in the First ZhiFeng war, but Fengtian nearly toppled the entire clique in 1924. However, Zhang Zuolin was ousted yet again in 1927 following Zhili victory against the KMT. For around a decade, Zhang Zuolin has sat north of the Great Wall, licking his wounds and plotting his eventual return to Beijing. It seems that this period of buildup has finally run its course, and Marshal Zhang has embarked on one final campaign to not just seize Beijing, but unify all of China.\n\nAlthough Tokyo has been allied to Marshal Zhang's government for nearly two decades, Japanese policy towards the Fengtian Clique continues to be divided and contradictory. The Tianjin Army has largely been supportive of Zhang's National Reclamation War. They hope that by aiding Marshal Zhang in his war, the Tianjin Army will be able to insert themselves as China's real rulers from behind the scenes, even perhaps eliminating their Kwantung rivals. Conversely, the Kwantung Army has long maintained their influence in Manchuria, and are very concerned of the possibility of Marshal Zhang losing the war, which would result in the loss of their own influence.\n\nEven within the Fengtian Clique, there have been those with concerns regarding the National Reclamation War's feasibility. For the moment, Zhang Zuolin has largely kept such dissident voices quiet. However Zhang Zuolin, like the pessimists in his camp, understands that this war will be an all or nothing effort - either he succeeds in establishing himself as master of all China, or he will die trying. For Japan, they largely continue to support Marshal Zhang in his war for China, but should he disappoint Tokyo with lack of progress, the Kwantung Army may be provoked into taking drastic action to secure Japan's interests."
 fengtian_japan_mechanic_events.002.a: "When you play the game of thrones, you win or you die."
 fengtian_japan_mechanic_events.002.tt: "§YThe die has been cast. Zhang has §Rlimited time§! before tensions boil over, which will increase or decrease based on battlefield success and decisions by Shenyang and Tokyo. Should time run out, the Kwantung Army will attempt to force the Imperial Court's hand and §Rdrag them into war on the continent§!. Should he §Gsucceed in capturing Beijing§! and at least one of Nanjing, Wuhan, Guangzhou, or Chongqing, Fengtian and Japanese relations will face a different reckoning §Rdepending on Japanese influence in his government.§!§!"

 fengtian_japan_mechanic_events.003.t: "The Fengtian-Japanese Alliance Victorious?"
 fengtian_japan_mechanic_events.003.d: "Although the National Reclamation War threatened to strain the Fengtian - Japanese alliance to the limit, it seems that the war has concluded with Zhang's complete victory. The Kwantung Army is no longer openly scheming to replace Marshal Zhang, and the Tianjin Army has encouraged Zhang to continue his wars of unification.\n\nOnce again, the Fengtian Clique rules in Beijing, and extends its foothold in the Central Plains. However, as Zhang continues to consolidate his authority across the rest of China, many in both Japan and China both wonder if this Sino-Japanese alliance will continue to hold.\n\nTokyo had always hoped for a more subservient partner in China than Zhang, and the Old Marshal has long viewed the Japanese with suspicion and his alliance with them as merely one of convenience. Will Japan and China both continue to maintain their ties despite mutual distrust and conflicts of interest? Or will tensions boil over and Tokyo and Beijing engage in one final war to end all wars?"
 fengtian_japan_mechanic_events.003.a: "Can China and Japan really be long-term allies?"

 fengtian_japan_mechanic_events.004.t_huanggutun: "The Huanggutun Incident"
 fengtian_japan_mechanic_events.004.d_huanggutun: "With the National Reclamation War going poorly, it seems that Marshal Zhang's luck has finally run out. Although he had hoped to win the war swiftly, the situation has evolved to become anything but. Zhang's struggles in the war have vindicated the fears of the Kwantung Army, who believe that the Old Marshal may try to negotiate to save his skin, have decided to act decisively.\n\nAs Marshal Zhang was returning to Shenyang after visiting the frontline, his train was hit by a bomb planted by the Kwantung Army. Although Zhang survived for a few hours, the Old Marshal ultimately succumbed to his wounds. Acting immediately, the Kwantung Army has driven out Zhang Xueliang, leaving Fengtian in the hands of Yang Yuting who has reluctantly taken on the position of Generalissimo of the Anguojun.\n\nThe Kwantung Army has largely acted on their own without Tokyo's knowledge or consent, but are gambling on the prospect of total Japanese defeat to force Tokyo's hand. With the Fengtian Government in utter disarray, the Japanese Government will be forced to directly intervene in the National Reclamation War to save Yang's crippled government."
 fengtian_japan_mechanic_events.004.t_manchurian: "The Manchurian Incident"
 fengtian_japan_mechanic_events.004.d_manchurian: "With the fall of Shenyang, fears have grown among Japanese decision-makers of the possibility of the total loss of Japanese influence in Manchuria - and with it decades of investment and national pride. Zhang Zuolin's incompetent handling of the war and rumours that he is attempting to negotiate a peace behind their backs has led to Kwantung Army hardliners to make a drastic move.\n\nDetonating a small amount of dynamite near a Mantetsu-owned railway (though far away enough that it would not cause any significant damage to the track), they alleged that it was an attack by the Fengtian Clique's enemies on the ostensibly neutral Japanese garrison. Utilising that pretext, the garrison then began shelling Chinese positions - pressuring initially reluctant senior Japanese officers and later Tokyo to embrace the plan.\n\nAs the Japanese moved into position for direct intervention in the conflict, they assassinated Marshal Zhang before he could potentially denounce Japanese imperialism and switch sides. His allies have fled underground and in his place Yang Yuting has assumed control over the remaining Fengtian forces in hopes of preserving some semblance of autonomy for his men."
 fengtian_japan_mechanic_events.004.a: "All eyes are on Marshal Yang to navigate us out of the crisis..."
 fengtian_japan_mechanic_events.004.b: "Marshal Zhang has failed us for the last time."

 fengtian_japan_mechanic_events.005.t: "Zhang Zuolin Assassinated"
 fengtian_japan_mechanic_events.005.d: "Although Zhang Zuolin seemed like a loyal partner to the Empire of Japan, it seems that perhaps there was greater tension in the Fengtian-Tokyo relationship than was apparent on the surface. Dissatisfied with the progress of Zhang Zuolin's National Reclamation War, disgruntled Japanese officers carried out his assassination and installed Yang Yuting in charge of the collapsing government.\n\nYang Yuting's government is unlikely to survive without Japanese aid, while Nationalist sentiment rallies his enemies across the Chinese nation. China and Japan have been drawing towards another war for Asia's future, and it seems that this one will be far more destructive and devastating than the first."
 fengtian_japan_mechanic_events.005.a: "Surely we are safe from Marshal Zhang's fate, right?"
 fengtian_japan_mechanic_events.005.b: "It seems that Zhang's time simply ran out."
 fengtian_japan_mechanic_events.005.c: "Japan has disgraced itself in the eyes of the world."

 fengtian_japan_mechanic_events.006.t: "From Traitor to Top Dog?"
 fengtian_japan_mechanic_events.006.d: "Grand Marshal Yang Yuting toured the ruined city of Beijing, one of [FNG.GetNameDef]'s recent conquests as its military began to turn the tide against their foes. He was met with a stony reception by its local citizens, the intelligentsia, and the newly restored national assembly as he reasserted his claim to leadership over the republic. Though many of the soldiers and officers are the same as Zhang Zuolin's old National Pacification Army, perceptions have drastically worsened - a great feat given how controversial Zhang when he dominated the north.\n\nMany still refuse to forgive the Shikan Clique for their part in allowing Japan to tighten its grip on the continent, even if General Yang justifies it as part of the national fight imperialism and socialism in public, and in private claims it a necessary evil to prevent the total dominantion of the Kwantung Army in the aftermath of Zhang's death. Regardless, [FNG.Capital.GetCapitalVictoryPointName] is resurgent and their influence stretches far beyond Beijing. But with that will come many more challenges as they fight to unite the country under their banner."
 fengtian_japan_mechanic_events.006.a: "China's savior or its sellout?"

 fengtian_japan_mechanic_events.030.t: "Japan Enters the Fray"
 fengtian_japan_mechanic_events.030.d: "The start of the Second Sino-Japanese War and Japan's direct participation in the war on the continent has placed [FNG.GetNameDef] in an awkward spot. Most of China has banded together against the Japanese threat and though we have not endorsed Japan's war we have quickly been branded as Hanjian and collaborators. Many of our own officers and officials have begun to waver as word of Japanese atrocities and fears of their ambitions spread.\n\nWithin the ranks of our erstwhile \"allies\", agitation has grown. The Kwantung Army craves battlefield glory and the Tianjin Army demands further coordination with Tokyo. They have pressed [FNG.GetLeader] to formally join the Co-Prosperity Sphere. Doing so would be the sensible choice, but should we lose (and possibly even if we win) we may be damned as traitors forever."
 fengtian_japan_mechanic_events.030.a: "At least this way we ensure China will have a voice in the sphere."
 fengtian_japan_mechanic_events.030.b: "Please, we just need some more time to sort out our affairs…"

 fengtian_japan_mechanic_events.031.t: "Japan Enters the Continent"
 fengtian_japan_mechanic_events.031.d: "The start of the Second Sino-Japanese War and Japan's direct participation in the war on the continent has placed [FNG.GetNameDef] in an awkward spot. Most of China has banded together against the Japanese threat and though we have not endorsed Japan's war we have quickly been branded as Hanjian and collaborators. Many of our own officers and officials have begun to waver as word of Japanese atrocities and fears of their ambitions spread.\n\nJapan's decision has blindsided [FNG.GetLeader]. The Fengtian Clique's army has yet to complete their preparations for war but Japanese entry has forced their hand. They have little choice but to join the Co-Prosperity Sphere, shrugging off accusations of treason, and hope to race the Imperial Japanese Army to secure major cities."
 fengtian_japan_mechanic_events.031.a: "It seems our time has simply run out."

 fengtian_japan_mechanic_events.032.t: "[FNG.GetNameDefCap] Joins the Sphere"
 fengtian_japan_mechanic_events.032.d: "The start of the Second Sino-Japanese War and Japan's direct participation in the war on the continent has placed [FNG.GetNameDef] in an awkward spot. Most of China has banded together against the Japanese threat and though they have not endorsed Japan's war they have quickly been branded as Hanjian and collaborators. Many of their officers and officials have begun to waver as word of Japanese atrocities and fears of our ambitions spread.\n\nThe start of the Second Sino-Japanese War has blindsided [FNG.GetLeader], a source of considerable tension. But under pressure from the Kwantung Army and Tianjin Army and a desire to claim at least a partial share of our ultimate victory, they have pragmatically decided to sign protocols bringing them formally into the Co-Prosperity Sphere."
 fengtian_japan_mechanic_events.032.a: "Together we shall triumph over Western bootlickers!"

 fengtian_japan_mechanic_events.033.t: "[FNG.GetNameDefCap] Stalls for Time"
 fengtian_japan_mechanic_events.033.d: "The start of the Second Sino-Japanese War and Japan's direct participation in the war on the continent has placed [FNG.GetNameDef] in an awkward spot. Most of China has banded together against the Japanese threat and though they have not endorsed Japan's war they have quickly been branded as Hanjian and collaborators. Many of their officers and officials have begun to waver as word of Japanese atrocities and fears of our ambitions spread.\n\nThe start of the Second Sino-Japanese War has blindsided [FNG.GetLeader], a source of considerable tension. Despite pressure from the Kwantung Army and Tianjin Army, the Fengtian government has been reluctant to coordinate more closely with our forces or formally join the Co-Prosperity Sphere.\n\nOur agents on the ground assure us however, that they are keeping a close eye on the situation. If necessary and the opportunity arises, they may take emergency action to ensure [FNG.Capital.GetCapitalVictoryPointName]'s cooperation in this great conflict."
 fengtian_japan_mechanic_events.033.a: "Let us see what happens next..."

#FNG-JAP Mech Events Pt 2 (100-199) - Decision Events for Japan
 fengtian_japan_mechanic_events.100.t: "Zhang Pleas for More Time"
 fengtian_japan_mechanic_events.100.d: "Although Zhang Zuolin is Japan's closest ally in China, he is hardly an ideal partner for Tokyo. While Zhang greets our dignitaries and businessmen with smiles and handshakes, he attempts to maintain his distance at every turn. Zhang's shifty strategy of appeasing Tokyo while in a position of weakness but spurning Japan in a position of strength has worn down the patience of the Japanese government.\n\nThrough all of our cooperation with Marshal Zhang was the hope that one day he would come to appreciate the wisdom and experience of Tokyo, but it seems he will never follow our sagely example. Once again it seems that the foolish warlord has squandered Tokyo's aid and is once again at our doorstep begging for scraps.\n\nPerhaps he has realised how much he has worn down our desire to aid him, and is attempting to salvage our strained relationship. Regardless, Tokyo has agreed to allot him a little more aid and has extended him a little more patience, but should Zhang fail to make substantial gains, it will be the last time he has played us for fools."
 fengtian_japan_mechanic_events.100.a: "We are tired of being disappointed with your lack of progress..."

 fengtian_japan_mechanic_events.101.t: "Zhang Cracks Down on Sedition"
 fengtian_japan_mechanic_events.101.d: "Zhang Zuolin, though rising from humble circumstances to become master of the Northeast with whatever means available to him, has never been one to tolerate blatant corruption. No, the Grand Marshal has worked tirelessly to promote his regime with an image of inscrutability and moral principle.\n\nMost recently, Marshal Zhang has enacted an anti-corruption purge within his administration, prompting a slew of arrests and executions for those accused of corruption, sedition, and treason. While some have noted Zhang's earnestness in promoting a relatively fair administration, many observers note that most of those purged were tied in some way to Japanese interests operating in Dongbei.\n\nAlthough Marshal Zhang has not publicly revealed the source of bribes, most understand the message he is sending to Tokyo. Japan for their part have not publicly commented on the Old Marshal's recent anti-corruption purges, but the government is undoubtedly displeased with their wayward ally in the Middle Kingdom. However, Tokyo is not in a position to or has deemed it not in their interest to punish Zhang's regime at the moment, leaving the incident largely a victory for Zhang and his Anguojun regime."
 fengtian_japan_mechanic_events.101.a: "That ungrateful fool..."

 fengtian_japan_mechanic_events.102.t: "Zhang Curtails the Shikan Clique"
 fengtian_japan_mechanic_events.102.d: "In the late Qing Dynasty, many sought out a foreign education to learn how they could best heal the ailing Chinese state. Many aspiring soldiers gravitated towards the rising Japanese Empire, which had undertaken a rapid modernisation programme spearheaded by Emperor Meiji. The Japanese for their part encouraged Chinese students to seek an education on their shores, establishing the Tokyo Shinbu Gakko Military Preparatory School, specifically catered towards giving Chinese students military training and education.\n\nWhen the Qing Dynasty was brought down by the Xinhai Revolution and warlords rose up in its place, many of China's prominent generals and leaders were Tokyo Shinbu Gakko alumni. They brought with them a wealth of knowledge on modern warfare, which made them invaluable assets to various powerful warlords. Marshal Zhang recognised the capability of Yang Yuting, who was one such NCO with Japanese education. Yang shared Zhang's ambitions of leading unification efforts, and became a crucial officer within the Fengtian Clique. Yang and other Japanese-educated NCOs formed what became known as the Shikan Clique, and have generally called for ties between Tokyo and Shenyang to be strengthened.\n\nYang's Shikan Clique in recent years has profited greatly from the increase in Japanese influence in Dongbei following Marshal Zhang's retreat from Beijing, and has courted regionalists and disgruntled officers into its camp. The increase in Shikan power has not gone unnoticed under the Old Marshal's watch, as he watches with concern at both the rise of Shikan and Tokyo's influence. Marshal Zhang has increasingly worked to curtail the Shikan Clique's activities, elevating loyalists to higher military positions."
 fengtian_japan_mechanic_events.102.a: "Does Zhang really believe he can unite China without the Shikan Clique?"

 fengtian_japan_mechanic_events.103.t: "Concessions to the Concordia Association"
 fengtian_japan_mechanic_events.103.d: "In the aftermath of the Anguojun's crippling defeat by Wu Peifu and the Zhili Clique, the Fengtian Clique was once again pushed north of the Great Wall. In this time of vulnerability and weakness, the Russians attempted to pounce on Marshal Zhang's domain, forcing him to rely further on Tokyo's support.\n\nFengtian and Japan stood together against the Russian bear and humiliated the fools like in the days of 1905. In order to consolidate the Sino-Japanese friendship between Marshal Zhang's government and our own, the Concordia Association was formed in Fengtian to promote the ideals of the Pan-Asianist dream. The Association has found a boon of support within Manchuria's ethnic minorities, and has also become the home of certain Japanese radicals who have been expelled from the Home Islands in de facto exile.\n\nRegardless, the Concordia Association remains one of the primary allies of the Shikan Clique and the Kwantung Army, assisting Yang Yuting and his allies whenever possible. While Zhang Zuolin has never truly appreciated the Association, he has been known to shore up temporary support for them in times of strife, such as now."
 fengtian_japan_mechanic_events.103.a: "Marshal Zhang has recognised the wisdom in accepting our aid..."

 fengtian_japan_mechanic_events.104.t: "Zhang Empowers Our Advisors"
 fengtian_japan_mechanic_events.104.d: "Ever since the Russo-Japanese War which saw our ascendant empire defeat the clumsy Russian Bear, the Kwantung leased territory, which was ours by right ever since the Sino-Japanese War, was returned to us. A year after, the Kwantung Garrison was established, which saw the beginnings of the Kwantung Army. The actual army was established in 1919, when Japan replaced the old governance structure of the port.\n\nSince its creation, the Kwantung Army has maintained influence in the neighbouring Fengtian Clique, and has sought to act as a guiding hand for Japan's influence in Manchuria, and ensure Marshal Zhang's compliance to Tokyo's will. With the Japanese military radicalising substantially in the late 20s, the Kwantung Army for such beliefs, becoming involved in many various coups throughout the interwar period.\n\nThe Kwantung Army stands in staunch rivalry with the Tianjin Army, who look towards the rest of China and hope to assist Zhang Zuolin in destroying the German lapdogs in the Zhili Clique, restore the Anguojun's presence south of the wall, and ensure that Zhang will maintain his ties to Tokyo thereafter, or suffer the consequences. For whatever reasons, Zhang Zuolin has usually attempted to remain aloof from the Kwantung Army's influence, but he has recently brought in some Kwantung Army advisors to assist him in modernising his military force."
 fengtian_japan_mechanic_events.104.a: "We'll show them how modern wars are fought."

#FNG-JAP Mech Events Pt 3 (200-299) - Decision Events for Fengtian
 fengtian_japan_mechanic_events.200.t: "Japan Searches for Collaborators"
 fengtian_japan_mechanic_events.200.d: "Although Zhang Zuolin is regarded by many in China as the arch-collaborator with Japanese interests thanks to years of Zhili propaganda, the people of the Three Northeastern Provinces understand the true situation. Marshal Zhang was forced to inherit the Japanese as his “allies” upon his takeover of Dongbei, and attempted to contain their influence whilst also not provoking them into taking action.\n\nIt seems that this delicate balancing act is perhaps not long for this world, as it seems that the Empire of Japan is not only unsure of the Old Marshal's ability to win the war, and are even looking for potential replacements. If true, Tokyo could choose from a large array of willing conspirators. Japan's longtime relationship with the Fengtian Clique has produced pro-Japanese elements in all major factions within the government.\n\nThe Concordia Association is already openly pro-Japanese, the Shikan Clique is generally in favour for close ties, the Communications Clique's leaders in Zhang Zongxiang and Lu Zongyu have also shown an openness to working with Tokyo, and even within the Zhang Clique, the Old Marshal's more flexible sworn brothers like Zhang Jinghui and Zhang Haipeng may even be pliable puppets.\n\nAlthough Marshal Zhang is aware of Tokyo's increasing disillusionment with his leadership, there's not much for him to do. He can only recognise the danger he presently is in. The search for collaborators began under local Japanese elements but is now receiving backing from Tokyo itself now, certainly a bad omen for Zhang's government and the fight for a free China."
 fengtian_japan_mechanic_events.200.a: "I never thought it would end like this..."

 fengtian_japan_mechanic_events.201.t: "Japan Reins in Extremists"
 fengtian_japan_mechanic_events.201.d: "Although Japan and Fengtian have been allies for two decades, Japan's policy towards us has been incredibly unclear. While Tokyo may decide one thing, the Kwantung Army will do what they have deemed Japan's best interest, as will the Tianjin Army.\n\nWhile the Tianjin Army has generally been more cooperative with the Anguojun, the Kwantung Army not only wants to keep our government contained to north of the Great Wall, and have long disliked Marshal Zhang.\n\nThe increasing radicalism in the Kwantung Army has certainly generated great concern among the Grand Marshal and his inner circle, and years of increasing tensions has certainly been unbeneficial for both powers. Recently, Tokyo has sought to give Marshal Zhang's government some relief by reining in extremist officers stationed in the Northeast, targeted primarily towards the Kwantung Army.\n\nWhile many of their officers have been demoted or recalled, Tianjin Army Officers have been elevated in their place. Tokyo's policy towards Marshal Zhang's government has certainly been made clear, and finally they have enforced the compliance of the wayward armies."
 fengtian_japan_mechanic_events.201.a: "We might actually survive this age of chaos..."

 fengtian_japan_mechanic_events.202.t: "The Japanese Aid Plan"
 fengtian_japan_mechanic_events.202.d: "While Fengtian has boasted China's strongest regional economy with most of the nation's heavy industry centred around Fengtian Province and Jilin, the financial situation of the government is no better than the rest of China. Whenever Marshal Zhang has attempted to achieve his ambitions and cross the Great Wall, there have been massive economic consequences back home.\n\nJust a decade ago, the Fengpiao currency collapsed after Zhang's government was unable to secure loans due to the existence of a rival Kuomintang government in Guangzhou, and Zhili resurgence once again relegated Marshal Zhang's government to north of the Great Wall. Recognising the dangers of economic collapse in Fengtian, Tokyo has begun funneling emergency funds to our government through Concordia Association shell organisations.\n\nIn addition to loans, Japan has sent engineers, encouraged its businesses to make contracts with the Fengtian Government, and offered a trade deal for steel. Tokyo's generosity will certainly stabilise the homefront and thus aid the front lines, but every aid package strengthens our economic reliance on Tokyo."
 fengtian_japan_mechanic_events.202.a: "A Faustian Bargain, but one we cannot afford to refuse."

 fengtian_japan_mechanic_events.203.t: "Japanese Sends Arms Shipments"
 fengtian_japan_mechanic_events.203.d: "Ever since Marshal Zhang and Tokyo came to a mutually beneficial arrangement, the Fengtian Army has boasted one of the best equipped armies in the Chinese military. During the first Zhifeng War, Wu Peifu's soldiers were dressed in tattered uniforms while the Fengtian Army was fully equipped. To our shame, Wu and his men of rags were able to defeat us.\n\nSince the early 20s, it seems that the various rival warlords have also found friends in high places. Chen Jiongming found friends in the British and Americans, Wu in the Germans, the Kuomintang in France and Russia, and Feng Yuxiang also in Russia. The Fengtian Army has experienced the effects of the modernisation of the armies of the Central Plains firsthand, with equipment attrition skyrocketing.\n\nIn order to resupply our troops in this war for Chinese unification, Japan has sent a massive arms shipment to our government. Of course, Japan has seen to it that sympathetic officers to Tokyo have seen their men resupplied first, and while Anguojun High Command will have a say in weapons distribution, it has not stopped pro-Japanese united being favoured."
 fengtian_japan_mechanic_events.203.a: "We only hope that the cost is not too high..."

 fengtian_japan_mechanic_events.204.t: "Japanese Reinforcements Arrive"
 fengtian_japan_mechanic_events.204.d: "The increasing chaos in China in recent years has intensified Tokyo's interest in the affairs of our nation, for better or for worse. While Marshal Zhang was able to contain Japanese influence in Dongbei for the first decade of his rule, the collapse of the Fengtian dollar coupled with the loss of Beijing forced previously unseen levels of Japanese influence in the Three Provinces of the Northeast.\n\nWith Marshal Zhang's government once again waging for control of Beijing and China, Tokyo has increased its talons in the Anguojun Government once again. Just yesterday, the government in Tokyo has ordered additional divisions deployed to China in order to shore up its already-stationed Kwantung and Tianjin Armies. Though this move strengthens both of their forces, it in a way weakens both of them, as Tokyo's direct footprint has been increased, now that the Japanese Government is directly involved in this war."
 fengtian_japan_mechanic_events.204.a: "It's all getting away from us..."

###FNG Endgame Events
 fengtian_endgame_events.000.t: "Unification by Dongbei"
 fengtian_endgame_events.000.d: "Perhaps the greatest ambition of the Old Marshal and his compatriots since the 1920s, the cementing of their control within China has long been a desired dream for many within the Fengtian Clique. With multiple gambits such as the First and Second ZhiFeng Wars, with the latter seeing a term of Fengtian as the beholder of the Beijing Government, their rule was ultimately not to last. Following the Third and Fourth ZhiFeng Wars, Fengtian was ejected to the Three Northeastern Provinces, alongside Rehe.\n\nContinuing to parade themselves as the legitimate successors to the Beiyang Government, the Old Marshal and his subordinates could hardly pose much of a threat in the face of the Zhili's unification of the nation, even when such a foundation was gravely shaken in 1932 and 1933; Zhang Zuolin merely withdrawing from attempted peace negotiations beforehand due to Zhili success in national elections. Yet such a situation was not to last! Rebuilding their strength, in no small part due to Japanese assistance, the army of the Anguojun managed to successfully rout defenders south of the Great Wall, and secure Beijing.\n\nAt the present, there is much jubilation and many celebrations to be held. Both in earnest, and perhaps to mask government difficulties following intense warfare all-throughout the nation-state. Nonetheless, for the third time in the nation's history, Beijing has become the seat of a Dongbei-led government. And for many citizens in China, they look towards the Northeasterners for direction, and for support."
 fengtian_endgame_events.000.a: "And so our mission is fulfilled."

 fengtian_endgame_events.001.t: "Fengtian Factionalism Rises"
 fengtian_endgame_events.001.d: "Often thought to be a united force under the strength of a single figure, the Fengtian Clique itself is split into various disparate factions, akin to most major warlord cliques in China. Yet unlike most, it is relatively responsible in its proclamations of internal unity; few would dare defy Marshal Zhang. Even in such an environment however, intense rivalries and inter-personal differences can emerge, most violently and evidently in events such as Guo Songling's rebellion of the 1920s. In-effect, Guo's legacy lives on, shattered and reconstituted both politically and military into two major factions: Shaoshuai, and Shikan.\n\nLed informally by the Young Marshal Zhang Xueliang, the Shaoshuai Clique corresponds to his immediate courtiers, and their ambitions to prop up Guo's reform-minded protégé. As the Old Marshal's de-facto successor, Xueliang has appreciated immense benefits within the Fengtian government, albeit his military and political careers leave much to be desired, so much so as to not mention his social activities.\n\nOn the opposing end lies the Shikan Clique. A group of modernisers, militarists, patriots, and the meritocratic underdogs of Fengtian's factionalism, they are led by the oft misused Yang Yuting, and his close friend Chang Yinhuai. Graduates from the Japanese Army Academy and otherwise, the clique serves as the main vector for internal opposition within the military; fiercely opposed to the seeming nepotism and incompetency of the Shaoshuai, Zhang, Heilongjiang, and other Cliques.\n\nWith the arrival of new glories arrives similarly new difficulties, and the ever simmering lid of Fengtian tensions seems to have finally burst, as whole divisions refuse to heed Central Government orders, and Shikan Clique aficionados meet increasingly with Japanese contacts..."
 fengtian_endgame_events.001.a: "The legacy of Guo Songling..."

 fengtian_endgame_events.002.t: "Failure of Government Economics"
 fengtian_endgame_events.002.d: "Suffice to say, the Chinese economic situation has never been particularly stable ever since the onset of the Warlord Era, perhaps even ever since the decline of the Qing. Industrialisation has usually been at the behest, or at the enquiring, of foreign powers and foreign investments. As such, China's fledgling Feudal land-situation combined with foreign-dominated industrialisation efforts in the urban cities has resulted in quite a tenuous situation throughout the nation.\n\nFurthermore, with the outbreak of hostilities following a brief tenure of relative peace during the Zhilo Unification, investors have fled, industrialists have cordoned their factories and arsenals, and immense damage has been wrought in both the roaring countryside and urban sprawl. In the Northeast, relatively despoiled of damage and conflict, Japanese investments and the clever management of Communications Clique, Zhang Clique, and Recovery League officials have resulted in a flourishing industrial belt stretching through Jilin and other provinces.\n\nDescending from their Northeastern sanctuary however, the Fengtian government has run into all too friendly situation for Chinese Central Governments; an inefficient tax system, local banditry, incompetence and lack of trained officials, and many more issues have resulted in piling debt, and lowering economic productivity. Whilst foreign loans present themselves as a useful bandage to prevent hemorrhaging of national finances, they are but a pittance in light of the true issues. It will undoubtedly take concerted effort to remedy the situation at present."
 fengtian_endgame_events.002.a: "Best begin searching for loans..."

 fengtian_endgame_events.003.t: "Fears of Fengtian Domination"
 fengtian_endgame_events.003.d: "Politically, Dongbei almost always seemed as a microcosm of broader Chinese currents. Relatively isolated, the Northeastern Cliques had themselves far more concerned with the Japanese to the South, Russians to the North, and the affairs of the Mongol regions to the West. Suffice to say, the provincial governments of the Northeast functioned far more off of personalities and the Fengtian Clique than most other comparable administrations in the era. With relatively little infiltration by organisations south of the Great Wall, namely the Chinese Constitutionalists, Kuomintang, and the Young China Party, various minor Fengtian organisations have managed to rise to prominence: the revived Restoration Society, for example.\n\nYet following the Third and Fourth ZhiFeng Wars, the Northeastern has become a haven for those who have burnt political bridges in the Central Plains and further. Hosting exiled Anhui aficionadoes such as Wang Yitang, Zhang Zuolin's own personal political jockeys such as Pan Fu, or even the Japanophile Communications Clique (far removed from they heyday), the character of the Marshal's rival government has truly been multifaceted, and in-effect tearing at the seams.\n\nAscending from the Great Wall southwards, the character that long loomed Marshal Zhang's government attempts of the 1920s remains large even now. Few would desire to work with Northeasterners, viewed as nothing more but militarists, and perhaps bandits. Uniquely disposed of in-regards to available political muscle, the new Fengtian Government has seemingly brought forth fears of possible domination by men of lesser standing, and even lesser know-how."
 fengtian_endgame_events.003.a: "Really? As bandits? Still?"

 fengtian_endgame_events.004.t: "A Nation Under the Northeast"
 fengtian_endgame_events.004.d.base: "Bringing unification to China has been no easy task, and yet it would appear that the consistent, ever-present rival of the Zhili Government has finally emerged on top. Residing within their Northeast sanctuary, and backed by the Japanese, the Fengtian government has finally, for the third time, retaken Beijing. Running through the consequences of national unification, their government has been beset with critical economic shortcomings, and a wasteland of political support; few have forgotten the reputation of Fengtian's aficionados.\n\nFurthermore, it would appear that despite Zhang Zuolin's best efforts, the fracturing Anguojun alliance has begun to tear itself apart. With the ambitions of Tokyo intermixed, a rapidly unfolding tornado of political rivalry and infighting has emerged under the Five Banner flag. The Shikan Clique, the Communications Clique, Recovery League, various democrats and other smaller cliques have all begun to feud over patronage positions and the direction of the government."
 fengtian_endgame_events.004.d.generic: "$fengtian_endgame_events.004.d.base$\n\nSecuring national unification through the might of the Anguojun, it would appear that the disparate Warlord alliance stewarded by Fengtian's eclectic and corrupt government has begun to mandate proper consolidation under National forces. Whilst perhaps an ideal preferred by a nation so damaged by war and bloodshed for decades, is it tolerable for [ROOT.GetLeader] to submit their government to an intolerable northerner? To permanently sunder any ambitions of their own stake to the presidency?"
 fengtian_endgame_events.004.d.shx: "$fengtian_endgame_events.004.d.base$\n\nHaving collaborated with the Old Marshal intermittently all throughout the Warlord Era, few would besmirch the Model Governor for throwing his lot once again with the Dongbei divisionaries. And yet, many within Yan's camp insist upon his inherent kingmaker role within national politics. With the capacity to descend from Shanxi onto the Central Plain in a lightning strike, the notion of Yan's own Presidential ambitions present themselves as an all-too enticing offer, but is the Model Governor willing to roll the dice? Whatever the case, the time to decide is now, as the Anguojun recoils from its unification and own internal rivalries."
 fengtian_endgame_events.004.d.shd: "$fengtian_endgame_events.004.d.base$\n\nDedicated and loyal to the utmost, Governor Zhang Zongchang has dedicated his life to serving the Old Marshal and his various governments. Being a prized lieutenant of the Anguojun itself, Zhang's securing of Shandong played a primary role in the unification of the nation, and yet, shadows loom large amongst the Old Marshal's position. As evident to anyone, knives have been unsheathed, and Governor Zhang owes his loyalty to Marshal Zhang, not to his upstart child or any other member of the Fengtian Clique."
 fengtian_endgame_events.004.a: "We can't let their corruption rule us! To arms!"
 fengtian_endgame_events.004.b: "We welcome Marshal [FNG.GetLeader]!"
 fengtian_endgame_events.004.c: "Let us send a delegation to the capital. (Switch to [FNG.GetNameDef])"

 fengtian_endgame_events.005.t: "The [FROM.GetAdjective] Rebellion"
 fengtian_endgame_events.005.d.base: "Following the realisation of Anguojun unification of China, the various cliques and power-holders in China's restored republic have begun to scramble for power and support across the country. Within regionalist sentiment lies a fear of growing government centralisation, corruption within the government ranks (all too well known to the Northeasterners), and a fear of dominance from Dongbei political cliques. With [FROM.GetLeader]'s supporters willing to back their claims with arms, a civil war is likely underway.\n\nThe Central Government of course is expected to have a major advantage, controlling China's major cities and commanding international legitimacy (at least for now) which as given them greater access to loans as well as a larger tax and manpower base to draft an army. The centralised Anguojun however still holds many disloyal regionalists within its ranks. Furthermore, [FROM.GetAdjective] regionalists are confident in the abilities of their forces and expect that others will rise up against the tyrannical dictatorship of the Central Government. And China is no stranger to upsets. What both sides can agree on, however, is that they will not tolerate another warlord era."
 fengtian_endgame_events.005.d.generic: "$fengtian_endgame_events.005.d.base$\n\n[FROM.GetLeader] and the [FROM.GetRulingParty] have been loosely tied to the Anguojun as of late, with  independent but seemingly compatible roots. Their national ambitions coincided with the Fengtian victory in the North, and rode its wave to unification. Now, however,  with the Central Government attempt to assert its authority over its former allies, it seems that [FROM.GetNameDef] is simply unwilling to accept Dongbei's domination."
 fengtian_endgame_events.005.d.shx: "$fengtian_endgame_events.005.d.base$\n\nHaving collaborated with the Old Marshal intermittently all throughout the Warlord Era, few would besmirch the Model Governor for throwing his lot once again with the Dongbei divisionaries. And yet, many within Yan's camp insisted upon his inherent kingmaker role within national politics. With the capacity to descend from Shanxi onto the Central Plain in a lightning strike, the notion of Yan's own Presidential ambitions became too much to bear, and thus, the Model Governor emerges after decades of isolation."
 fengtian_endgame_events.005.d.shd: "$fengtian_endgame_events.005.d.base$\n\nDefiantly loyal to the Old Marshal and Fengtian to the very last, the revolt of [SHD.GetLeader] has proven itself a most stinging rebuke to the Dongbei government. A man once so loyal, a practical extension of the Fengtian clique itself, having cast it all aside to secure his own ambitions. If Dogmeat revolted, then who can be trusted?"
 fengtian_endgame_events.005.a: "Is there no trust anymore?"
 fengtian_endgame_events.005.b: "Rival personalities are bound to clash."

 fengtian_endgame_events.006.t: "The End of the Provisional Presidency"

