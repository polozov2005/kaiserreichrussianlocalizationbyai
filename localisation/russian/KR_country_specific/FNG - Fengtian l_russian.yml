#Unused Loc:
#Heilongjiang, Jilin, and Fengtian, known as the 'Three Eastern Provinces' during the Qing and Beiyang periods, were split into nine smaller sub-divisions in 1931 to aid governance and economic planning. The vast majority of Fengtian's industry and mineral wealth is concentrated in the South, while the central and Northern provinces are primarily agricultural. Rehe, to the Southwest of Liaoning Province, remained untouched by the reorganisation, but has suffered thanks to the end of rail traffic through the Liaoxi Corridor, which connected land transportation between Beijing and the Northeast. Thanks to the government's new initiatives incentivising development across the provinces, prosperity will surely increase, but serious structural issues remain, and may become problematic as a result of increasing disparity in development between the north and south.

#The 'Huanghanhui', or 'Imperial Han Society', have been found to be using bribes and threats of violence to coerce low-level members of the Assembly. Unfortunately this information has gone public, even as the Assemblymen in question have been removed from office, and local police pursue additional suspects.\n\nShortly after information regarding this incident was presented to Japanese authorities, Kempeitai agents were observed entering an enclosed compound outside Shenyang, and reports indicate gunfire was exchanged. Over a dozen bodies were removed from the premises, and it would be unwise to pursue this matter any further."

#"The Imperial Han Society, a secret society with a Han-chauvinistic ideology and uncompromising hate of other ethnicities, is believed to be behind a number of killings in Shenyang, Changchun, and Harbin. The targets appear to be more or less random, linked only by their status as ethnic Russians, Manchu, Koreans, and Japanese. Mantetsu and the Japanese Consulate are demanding investigations, and the Kempeitai have already carted away a number of suspects to an unknown fate."

#Xiehehui (Concordia Association)\n§LA grouping of politicians and lobbyists with all the trappings of a party, the Concordia Association represents the interests of Mantetsu, and sometimes other Japanese Zaibatsu, in the Assembly. Their actual ideological positions vary, some using the Japanese to counter Zhang's power for their own gain, with others subscribing to Pan-Asian principles.§!\n

 KR_Fengtian: "Фэнтяньское Правительство"

### Ideas ###
 FNG_Regionalist_Sentiment: "Регионалистские настроения"
 FNG_Regionalist_Sentiment_desc: "Национальные цели нашего правительства всегда вступали в противоречие с более локализованными регионалистскими идеями, которые более привлекательны для в целом аполитичного большинства, чем возвышенные республиканские идеалы. Хотя Чжан Цзолинь когда-то придерживался регионалистских настроений до своего нынешнего положения в качестве правителя, теперь это угрожает сорвать его планы снова пойти к югу от Великой стены, завоевать Пекин и вернуть себе весь Китай."
 FNG_Regionalist_Resentment: "Возмущение регионалистов"
 FNG_Regionalist_Resentment_desc: "Вызванный слухами гнев незаметно закипает у одних слоев населения, в то время как другие начали выходить на улицы в знак протеста."
 FNG_Regionalist_Outrage: "Произвол регионалистов"
 FNG_Regionalist_Outrage_desc: "Попытки правительства подавить так называемую 'партию Дунбэй', по крайней мере временно, привели к обратным результатам, поскольку протесты быстро переросли в беспорядки в некоторых городских центрах. У правительства теперь есть все основания для того, чтобы раз и навсегда подавить и подавить это подрывное движение."
 FNG_Backward_Industry: "Отсталая промышленность"
 FNG_Backward_Industry_desc: "В то время как Фэнтяньское Правительство может содержать вторую по величине промышленную базу в Восточной Азии, за ее размером скрывается устаревшее оборудование, неэффективные методы работы и серьезная бесхозяйственность. Только обширные реформы, подкрепленные значительными инвестициями, могут преодолеть эти проблемы."
 FNG_factionalism_modifier: "Недобросовестное управление"
 FNG_factionalism_modifier_desc: "Несмотря на утверждения об обратном, Фэнтяньское Правительство страдает от повальной коррупции, некомпетентности и злоупотребления властью. Хотя в этом нет ничего необычного для Китая, это мешает нормальному функционированию правительства и ограничивает поддержку режима."
 FNG_Investment_Dearth: "Инвестиционный дефицит"
 FNG_Investment_Dearth_desc: "Экономический коллапс, последовавший за вступлением Фэнтянь в последнюю Чжили-Фэнтянскую войну, серьезно подорвал его финансовую базу и финансовое доверие, в результате чего у правительства осталось мало кредиторов, а у частного бизнеса - крайне ограниченные возможности."
 FNG_Limited_Investment: "Ограниченные инвестиции"
 FNG_Limited_Investment_desc: "Благодаря государственным стимулам инвестиции выросли, но по-прежнему наблюдается дефицит. Мы должны искать необходимые нам средства из других источников."
 FNG_Intel_Leak: "Утечка разведданных"
 FNG_Intel_Leak_desc: "Из-за большой некомпетентности или по причинам, еще более сомнительным, министр слил жизненно важные сведения врагам Фэнтяньского Правительства."
 FNG_Year_of_Righteous_Effort: "Год праведных усилий"
 FNG_Year_of_Righteous_Effort_desc: "Прокламация Верховного маршала объединила нацию в напряженных усилиях по подготовке к суровым условиям войны."
 FNG_Japanese_Aid_Cut: "Сокращение помощи Японии"
 FNG_Japanese_Aid_Cut_desc: "Япония прекратила всю помощь правительству в качестве наказания за то, что она считает неподчинением."
 FNG_Buying_Silver: "Покупка серебра"
 FNG_Buying_Silver_desc: "Серебро, по определению, дорогое, и в настоящее время государство покупает его в больших количествах. Однако, как только резерв будет заполнен, у него появится надежная валютная и кредитная база."
 FNG_Central_Bank_Collapse: "Крах центрального банка"
 FNG_Central_Bank_Collapse_desc: "Центральный банк, кажется, потерял серебро на миллионы таэлей именно тогда, когда японские банки требовали погашения своих кредитов. Как такое могло случиться?"
 FNG_The_Kwantung_Army: "Квантунская Армия"
 FNG_The_Kwantung_Army_desc: "Квантунская Армия находится в Маньчжурии на протяжении десятилетий, но их решающая роль во время восстания Го Сунлинга в 1925 году дала все рычаги воздействия, необходимые для переноса своей штаб-квартиры в Шэньян, что значительно увеличило их влияние на правительство. Теперь они де-факто действуют как военная миссия и оккупационная сила, защищая железные дороги, оказывая материальную помощь и давая "советы". К сожалению, игнорирование этого совета может иметь тяжелые последствия."
 FNG_Educational_Vacuum: "Образовательный вакуум"
 FNG_Educational_Vacuum_desc: "Внезапное отсутствие некоторых учителей, профессоров и ученых создало неприятный образовательный вакуум. Можно найти замену за рубежом и внутри страны, но по цене и не без больших неудобств."
 FNG_Post-Colonial_Chaos_1: "Постколониальный хаос"
 FNG_Post-Colonial_Chaos_1_desc: "Даже в самые ограниченные моменты хватка Мантэцу над экономикой и инфраструктурой Фэнтяня была жесткой, и теперь, когда их тщательно продуманные системы и структуры рушатся, страна в целом оказывается парализованной. На перестройку и реорганизацию потребуется время, но если бы влияние Мантэцу было больше, все могло бы быть намного хуже."
 FNG_Post-Colonial_Chaos_2: "Постколониальный хаос"
 FNG_Post-Colonial_Chaos_2_desc: "Хватка Мантэцу над политикой, экономикой и инфраструктурой Фэнтяня была крепкой, и теперь, когда их тщательно продуманные системы и структуры рушатся, страна в целом искалечена. На восстановление и реорганизацию потребуется время, но если бы влияние Мантэцу было еще больше, все могло бы быть и хуже."
 FNG_Post-Colonial_Chaos_3: "Постколониальный хаос"
 FNG_Post-Colonial_Chaos_3_desc: "Хватка Мантэцу над политикой, экономикой и инфраструктурой Фэнтяня была очень крепкой, и теперь, когда их тщательно продуманные системы и структуры рушатся, страна в целом полностью искалечена. На перестройку и реорганизацию уйдет очень много времени."
 FNG_Disastrous_Governance: "Катастрофическое управление"
 FNG_Disastrous_Governance_desc: "Тщательный захват власти Лигой Возрождения начал подрывать и без того слабое понимание легитимности государства."
 FNG_Army_Dominance: "Армейский контроль"
 FNG_Army_Dominance_desc: "Клика Чжана и Армия полностью контролируют правительство, заставляя другие политические фракции прибегать к нетрадиционным средствам ограничения своего контроля. К сожалению, эти средства и злоупотребления властью клики Чжан имеют ужасные последствия."
 FNG_Plutocratic_Exploitation: "Плутократическая эксплуатация"
 FNG_Plutocratic_Exploitation_desc: "Железная хватка Коммуникационной Клики над правительством страны позволила ему перейти на совершенно новый уровень эксплуатации и жадности, снизив легитимность государства и привлекая беспрецедентное политическое давление со стороны Японии."
 FNG_the_heilongjiang_defection_idea: "Отступниечтсво Хэйлунцзяня"
 FNG_the_heilongjiang_defection_idea_desc: "Долгое время являвшийся соперником Ян Юйтина под прикрытием правления покойного Чжан Цзолиня в трех Северо-Восточных провинциях, Ма Чжаньшань и близкие союзники Чжана со времен его бандитской деятельности, Хэйлунцзянская клика, дезертировали после того, как Юйтин стал верховным маршалом правительства Фэнтянь. Забрав с собой из резерва сумму, эквивалентную 3 миллионам серебряных долларов, они оказали пагубное воздействие на финансовые возможности администрации."
 FNG_ma_insurgency_idea: "Восстание в Хэйлунцзяне"
 FNG_ma_insurgency_idea_desc: "Получив отказ от предложения своих услуг врагу, Хэйлунцзянская клика в составе Ма Чжаньшаня, Ван Фулиня и У Цзюньшэна решила взять дело в свои руки. Распространяя призыв к национальному сопротивлению по радиоканалам на северо-востоке, они начали склонять потенциальных новобранцев на свою сторону и нападать на различные гарнизоны по всему Дунбэю. Хотя маловероятно, что это перерастет в полномасштабное восстание против новых властей Фэнтяня, тем не менее, это насущный вопрос, требующий значительного внимания правительства, большая часть которого может быть направлена во внутренние районы страны."

 FNG_Legations_Deal: "Сделка с Концессиями"
 FNG_Legations_Deal_desc: "Путем умной политики и возможно, некоторых закулисных 'переговоров' министр экономики заключил ценную торговую сделку с Городами-Концессиями."
 FNG_China_Welfare_Fund: "Фонд благосостояния Китая"
 FNG_Controversy_Women_Emancipation: "Избирательное право женщин"
 FNG_Towards_the_Third_Principle: "К третьему принципу"
 FNG_Negotiated_Provincial_Revenues: "Согласованные провинциальные доходы"
 FNG_Baojia_System: "Система Баоцзя"
 FNG_Bingzhan_Network: "Сеть Бинчжань"

 FNG_Suppressed_Labour_Movement: "Подавленное рабочее движение"
 FNG_Suppressed_Labour_Movement_desc: "Несмотря на то, что рабочие стали важной частью китайского общества, они также стали рассадником растущего китайского социалистического движения. Такие идеалы всегда были и будут болезнью сердца, и "Ангуочжун" обеспечит необходимое лечение от такого недуга."

 FNG_Worker_Loyalty: "Лояльность рабочих"
 FNG_Worker_Loyalty_desc: "Если наша нация когда-нибудь достигнет могущества, близкого к могуществу великих династий древности, то наша нация должна быть едина во мнениях. Разговоры о классовой борьбе только разделяют людей, в то время как национальный успех приносит процветание всем слоям общества. Подобно тому, как верховный маршал должен принимать во внимание интересы народа, так и все классы общества должны принимать во внимание интересы нации. Только тогда китайский народ пожнет плоды своей веры и превзойдет даже величайшие империи Запада."

 FNG_Centralized_Provincial_Revenues: "Централизованные провинциальные доходы"
 FNG_Centralized_Provincial_Revenues_desc: "В эпоху расцвета власти военачальников любой военачальник мог самостоятельно захватить Пекин или Гуанчжоу и одновременно стать президентом республики. Таким образом, провинции ревностно оберегали свои богатства от обложения налогами соперников на республиканском троне, предпочитая вместо этого использовать доходы провинций для финансирования своих собственных армий и местной экономики.\теперь, когда Ангуджун одержал победу над своими величайшими соперниками, такое время разобщенности подошло к концу. Если Китай хочет снова стать сильным, то вся нация должна руководствоваться единым видением, подобно тому, как симфонический оркестр должен подчиняться прихотям одного-единственного дирижера. Параллельные налоговые кодексы и правовые системы должны быть отменены, и все должны преклонить колени перед истинным правительством Китая."

 FNG_primacy_of_the_loyalists: "Примат для лоялистов"
 FNG_primacy_of_the_loyalists_desc: "В отличие от напыщенного У Пэйфу, который учился в великой академии Баодин, и либеральных интеллектуалов Юга, которые насмехаются над правительством Фэнтяня, наш маршал Чжан был выходцем из небытия. Он родился в крайней бедности и в юности стал бандитом. Именно в это время Чжан встретил многих себе подобных и заключил с ними братство из стали. После русско-японской войны эти братские группы были объединены в вооруженные силы династии Цин и перешли на сторону императорского правительства и армии Бэйян во время Синьхайской революции.Чжан и его братья образовали ядро Фэнтяньской клики, и эта сплоченная группа бандитов, превратившихся в полевых командиров, смогла на некоторое время добиться политического господства над Китаем. Несмотря на то, что правительство маршала Чжана в конечном итоге потеряло Пекин в 1927 году, сплоченная структура клики Фэнтянь позволила им вновь претендовать на контроль над Запретным городом. Именно благодаря друзьям и семье маршал Чжан смог одержать окончательную победу над своими соперниками, и его союзники продолжат служить ядром вооруженных сил Ангоцзюньуна."

 FNG_Command_Reforms: "Тщательная реформа командования"
 FNG_Command_Reforms_desc: "У каждой военной группировки в Китае есть свой центр, но не этот центр часто приводит к победе. Нет, это усилия и самопожертвование самых усердных, тех, кто осмеливается мечтать о величии, и тех, кто не боится к нему стремиться. В то время как японские военные провели достойные реформы, похоже, что Китай и клика Фэнтяня по-прежнему отстают в принятии таких мер. Главный маршал должен следить за тем, чтобы китайские вооруженные силы состояли не только из его друзей и семьи, но и из лучших и ярчайших молодых звезд, которые вырастают из стога сена, которые продолжат совершать великие подвиги на службе нации и, возможно, однажды возглавят ее."

 FNG_triumph_of_the_model_officers: "Триумф образцовых офицеров"
 FNG_triumph_of_the_model_officers_desc: "В Японии многие многообещающие молодые китайские студенты научились вести войну по-японски. Вернувшись домой, они привезли с собой свои знания и преобразили армию. Сунь Чжуаньфан вырос и стал не просто мелким военачальником, но и хозяином Восточного Китая. Чан Кайши стал военным руководителем Гоминьдана и отвечал за подготовку студентов Вампоа. Между тем, в клике Фэнтянь клика Шикан была ответственна за многие победы маршала Чжана. Маршал признал заслуги заслуженных людей и позволил их методам стать руководящей силой новой китайской армии."

 FNG_Japanese_Economic_Union: "Экономический союз с Японией"
 FNG_Industrial_Soy_Shortage: "Дефицит промышленной сои"
 FNG_support_ANQ_idea: "Поддержка Аньцинской клики"
 FNG_support_SHD_idea: "Supporting the Shandong Clique"
 FNG_support_SHD_idea_tt: "(§Y[SHD.GetNameWithFlag]§!) $volunteer_limit_plus_two_tt$"

 FNG_Expel_the_Japanese_Bandits: "Изгнать японских бандитов!"
 FNG_Expel_the_Japanese_Bandits_desc: "Пришло время изгнать японских захватчиков из Китая и положить конец веку невыносимого национального унижения!"

 FNG_Break_Mantetsu_Monopoly: "Нарушить монополию Мантэцу"
 FNG_Break_Mantetsu_Monopoly_desc: "Японская компания Южно-Маньчжурской железной дороги уже давно держит мертвой хваткой логистическую сеть Маньчжурии, ограничивая нашу способность быстро реагировать, если они нападут на нас или если мы нападем на них. Взять под контроль японские железные дороги будет непросто, поскольку они, без сомнения, будут саботировать все, что смогут, и наши инженеры будут вынуждены оказаться в незнакомых условиях."

 FNG_Legitimacy: "Национальная легитимность"
 FNG_Economic_Concessions: "Экономические уступки Фэнтяня"
 FNG_Economic_Concessions_To_Guangdong: "Экономические уступки Гуандуну"                                                                           

 FNG_mantetsu_influence_modifier: "£pol_idea Влияние Мантэцу"
 FNG_mantetsu_influence_idea: "Влияние Мантэцу"
 FNG_mantetsu_influence_idea_desc: "Экономическое влияние Мантэцу распространяется по стране и по всей Ассамблее - временами полезное, иногда просто благотворное, но всегда тревожное. Хотя Фэнтяньское Правительство в настоящее время стремится противостоять японскому влиянию, это не может длиться вечно."
 FNG_mantetsu_influence_effects: "[MantetsuPP][MantetsuStability][MantetsuWarSupport][MantetsuConstructionSpeed][MantetsuMaxEfficiency][MantetsuFactoryOutput]"
 FNG_efficient_rail_system_tooltip: "Изменить §HВлияние Мантэцу§! на \n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR: §G+10.00%§!\n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10.00%§!\n"

