### Renames ###
 FNG_national_unity_league: "ЛНЕ"
 FNG_national_unity_league_long: "Лига Национального Единства\n§gСформированный из смеси старых политиков Лиги Возрождения и более новых умеренных, ЛНЕ находится в частичной оппозиции к центристским и милитаристским тенденциям Клики Чжан. Партия не является органом власти, но восстановленная конституция предоставляет ей большую степень свободы действий, чем ее предшественникам.§!"
 FNG_national_unity_league_tt: "Лига национального единства (Гоцзя Тунъи Ляньмэн)"
 FNG_shikan_clique: "Клика Шикань"
 FNG_shikan_clique_long: "$FNG_shikan_clique_tt$\n§LКлика Шикан носит имя Рикугун Шикан Гакко, или \"Императорской армейской академии\"; ведущего военного учебного заведения Японии. Большинство её членов учились там или в других элитных японских школах, что привносит в Клику Фэнтянь отчетливо японский военный менталитет. Хотя они не придерживаются строго прояпонских настроений, они часто обращаются к японским соратникам за знаниями и помощью в борьбе с ожесточенным сопротивлением со стороны Клики Чжан. Под руководством таких людей, как Ян Юйтин, Юй Чжэнь, Цзи Ицяо и Чан Иньхуай, Клика Шикан излучает престиж, усердие и меритократию, будучи аутсайдерами от стереотипных семейных клик внутри Фэнтяня. Естественно, это принесло им большое уважение со стороны других приближенных двора Старого Маршала, но также и много ярости и негодования из-за их высокомерия, наполеоновских взглядов и способностей.\n\nХотя это не обязательно приводит к неподчинению, поскольку все мужчины в Шикане присягают своим начальникам, если, конечно, они достойны их уважения.§!\n"
 FNG_shikan_clique_tt: "Клика Шикан (Шигуан Пай)"
 FNG_new_peoples_society: "Новое Народное Общество"
 FNG_new_peoples_society_long: "$FNG_new_peoples_society_tt$\n§LСозданное как массовая организация политиками и бюрократами в сотрудничестве с японскими военными, Новое народное общество преследует единственную цель — поддерживать иллюзию самоуправления, одновременно служа интересам Японии. Несмотря на свою обособленность от Ассоциации Конкордия, Лиги Возрождения и Коммуникационной клики, все эти ассоциации работают в тандеме друг с другом в политических и экономических вопросах, служа своим японским хозяевам.§!\n"
 FNG_new_peoples_society_tt: "Новое народное общество (Синьминьхуэй)"

