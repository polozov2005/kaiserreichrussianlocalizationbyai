 #鄒作華
 FNG_zou_zuohua: "Цзоу Цзохуа"
 FNG_zou_zuohua_high_command_desc: "§YBorn:§! §LMay 11th, 1894, in Jilin Prefecture, Jilin District, Great Qing§!\n§YAlignment:§! §LApolitical§!\n§YBackground:§! §LBorn into a wealthy merchant family, Zou Zuohua had the privilege of attending a higher primary school and later enrolling in a series of military institutions in the Northeast and Beijing. This would culminate with his enrollment with the 5th Class of the Baoding Military Academy in 1916. A year later, alongside the likes of other talents including He Zhuguo, this brilliant student would be provided with the opportunity to study in the 12th Class of the Imperial Japanese Army Academy where he was trained in artillery.\n\nWith the situation in China deteriorating, his skills were needed for the divided nation and he returned in 1919 to serve as an artillery instructor and a battalion commander under the Anhui Clique. After the Zhili-Anhui War in 1920, many Anhui forces were incorporated into the Zhili Army, but Zou opted to join the Fengtian Army instead. Joining the Fengtian Clique as a staff officer, Zou's artillery skills made him a rising star within the Fengtian Army, becoming a regimental commander by 1922 and a brigade commander with the rank of Major General by 1925.\n\nThat same year, Zou served as Guo Songling's chief of staff in his unsuccessful rebellion against Fengtian. Zhang Zuolin ended up pardoning him on Zhang Zuoxiang's advice, and the young officer demonstrated unwavering loyalty to the Old Marshal. After Zhang Zuolin lost Beijing to Wu Peifu, Zou, appointed as the artillery director of the Fengtian Army, has been hard at work rebuilding the Northeastern Army, utilising his extensive expertise in artillery to train a new generation of soldiers for the Old Marshal.§!\n\n§YNotes: Although he was trained in Japan, Zou has no affiliation with Yang Yuting's Shikan Clique. Zou is personally loyal to Zhang Zuolin, though is considered an apolitical officer with great talent.§!"

 #何柱國
 FNG_he_zhuguo: "Хэ Чжугуо"
 FNG_he_zhuguo_high_command_desc: "§YBorn:§! §L1897, in Rong County, Guangxi Province, Great Qing§!\n§YAlignment:§! §aShaoshuai Clique§!\n§YBackground:§! §LBorn to a poor peasantry and orphaned as a child, He Zhuguo relied on his elder brother for his sustenance. After studying in a government school and a preparatory army primary school in Guangzhou, he enrolled in the 6th class of the Baoding Military Academy in 1917, and with remarkable performance, he was transferred to the 12th Class of the Imperial Japanese Army Academy to study cavalry with government sponsorship at the same year.\n\nBefore joining the Fengtian clique in 1922 upon the invitation of Zou Zuohua, who studied in the same class as He, he served as a tutor, head of a cavalry squad and a translator in Baoding after his return in 1919. When the Second Zhili-Fengtian War broke out, He, who worked as a tactic tutor and head of cavalry of the Northeastern Army Lecture Hall, was selected as the operational staff officer of Zhang Xueliang. When Guo Songling revolted against the Fengtian clique in 1925, the Young Marshal appointed him as the commander of cavalry reinforcements, with which he captured Guo Songling himself in a surprise attack together with Ma Zhanshan, and was thus promoted to a regimental commander.\n\nAfterwards, He, who was regarded by Zhang Xueliang as one of his most valued subordinates, fought for the Zhangs in various conflicts and rose in the ranks steadily. As the Fengtian army expands and loyal talents are sought, he now takes charge as a general with support from the Young Marshal.§!\n\n§YNotes: He is loyal to his patron Zhang Xueliang, and shares his distrust of Japanese influence.§!"

 #于珍
 FNG_yu_zhen: "Ю Чжэнь"
 FNG_yu_zhen_high_command_desc: "§YРодился:§! §L1887, в уезде Тилин, префектура Фэнтянь, провинция Великая Цин§!\n§YПринадлежность:§! §PКлика Шикан§!\n§YБиография:§! §LВ 1906 году Ю Чжэнь учился в Японской военной академии, окончил её и вернулся в Китай, где служил штабным офицером в канцелярии военного губернатора Фэнтяня, затем стал генеральным инспектором полиции провинции Фэнтянь, а позже — заместителем директора Специального управления полиции трёх северо-восточных провинций. В 1914 году он стал руководителем Фэнтяньской армейской дополнительной школы, адъютантом гарнизона Таоляо, начальником штаба 29-й дивизии, а также начальником управления Дуцзюня провинции Хэйлунцзян. В 1918 году Юй Чжэнь вместе с Ян Ютином стремился расширить свое влияние и власть, хотя и был уволен Чжан Цзуолинем, но вновь назначен на должность в 1921 году. В это время Юй вместе с Ян Ютином, Цзян Дэнсюанем, Хань Линчунем и Цзи Ицяо сформировал клику «Шикан», где Ян и Юй заняли ведущие позиции. Назначенный заместителем командующего 3-й армией армии Чжэньвэй, Юй в конечном итоге не принял командование из-за вмешательства Яна.\n\nВ 1927 году Юй участвовал в 3-й и 4-й войнах Чжифэн, хотя и был уволен из-за ошибок на поле боя. После 4-й войны Чжифэн он вместе с Яном отступил на север в Маньчжурию и стал начальником штаба управления Фэнтянского отделения Манчжурской железной дороги.§!\n\n§YПримечания: Ю Чжэнь, будучи соруководителем клики Шикан, является одним из самых ярых противников Японии в клике Фэнтянь, и его дом стал своего рода центром антияпонских дискуссий. Его называют \"Старым Монголом\" за его добросовестность и непоколебимость в соблюдении законов.§!"

 #劉鎮東
 FNG_liu_zhendong: "Лю Чжэньдун"
 FNG_liu_zhendong_commander_desc: "§YОписание генерала\nРодился:§! §g1893, Ишуй, Шаньдун, Империя Цин§!\n§YСимпатизирует:§! §gКлика Шаошуай§!\n§YВоенная карьера:§! §gКогда Лю Чжэньдун учился в начальной школе в своем родном городе, он считался выдающимся учеником, но, к сожалению, ему пришлось оставить учебу и вместе с отцом заняться ремеслом по дереву, чтобы прокормить семью. В 1911 году 19-летний Лю вместе с отцом переехал в Северо-Восточный Китай, чтобы заработать на жизнь.\n\nДо поступления в Северо-Восточный армейский лекторий по направлению Го Сунлина, Лю сначала работал письмоводителем, а в 1918 году поступил на службу в Фэнтяньскую армию в качестве клерка. После окончания учебы он остался в войсках Го Сунлина в качестве младшего командира и принял участие во Второй Чжили-Фэнтяньской войне. Когда Го поднял восстание против фэнтяньской клики, Лю последовал за ним в качестве дивизионного командира. Несмотря на это, Лю в конце концов помиловали, и он поступил в Штабной колледж в 1927 году, став курсантом с самым высоким званием в своем классе. Будучи образованным и увлеченным офицером, Лю выделяется в рядах клики Фэнтянь при выдвижении новых групп офицеров. Тем не менее, следует отметить, что Лю, по-видимому, имеет твердое мнение против японского присутствия в северо-восточных провинциях и про-японских элементов так называемой клики Шикана."

 #周福成
 FNG_zhou_fucheng: "Чжоу Фучэн"
 FNG_zhou_fucheng_commander_desc: "§YОписание генерала\nРодился:§! §g1897, Фэнтянь, Шэнцин, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §gКак и многие офицеры Фэнтяньской армии, Чжоу Фучэн учился в начальной школе Фэнтяньской армии, а затем поступил в 9-й класс Баодинской военной академии в 1919 году после окончания средней школы в своем родном городе. Хотя Чжоу изучал пехоту в Баодине, после окончания академии в 1923 году он начал свою военную карьеру в качестве командира взвода в войсках, дислоцированных в Хэйлунцзяне, под командованием У Цзюньшэна, известного старого кавалериста, который в то время был дивизионным командиром. Чжоу участвовал в 3-й и 4-й Чжили-Фэнтяньских войнах и поднялся по служебной лестнице благодаря тому, что был хорошо обученным офицером на фронте против чжилийских войск. К 1927 году Чжоу уже был командиром полка, а не так давно его повысили до командира дивизии, заменив неспособного начальника.\n\nКак уверенный и обученный внутри страны офицер, Чжоу получил большое признание в клике Фэнтянь (за исключением некоторых старших членов, входящих в клику Шикана), особенно от молодого маршала, который ценит таланты в армии, и именно поэтому он теперь получил командные полномочия как старший генерал. При этом Чжоу не особо интересуется политикой клики, но, похоже, его беспокоит японское присутствие в родной провинции."

 #郭恩霖
 FNG_guo_enlin: "Го Эньлинь"
 FNG_guo_enlin_commander_desc: "§YОписание генерала\nРодился:§! §g1893, Ляоянь, Шэнцин, Империя Цин§!\n§YСимпатизирует:§! §PКлика Шикана§!\n§YВоенная карьера:§! §gБудучи сравнительно молодым офицером Фэнтяньской клики, Го Эньлинь получил обширную военную подготовку, с которой вряд ли могли сравниться многие (если не большинство) его начальники и коллеги. Закончив обучение в военной начальной школе в Фэнтяне, Го в 1915 году поступил в 5-й класс Баодинской военной академии и изучал артиллерию. Вместо того чтобы завершить обучение в военной школе, Го решил продолжить свою кадетскую жизнь в Японии и поступил в 12-й класс Академии императорской армии Японии, чтобы изучать пехоту под государственной опекой. В отличие от большинства своих соотечественников, которые возвращались в Китай после учебы в академии, Го поступил в японский артиллерийский полк в качестве стажера, а затем поступил в 4-й класс Военного колледжа армии Японии в 1923 году.\n\nГо закончил свое военное обучение в Японии в 1925 году и присоединился к армии Фэнтянь в качестве старшего штаба под началом Чжан Цзуосяна, Го также отвечал за подготовку армий в Цзилине. Хотя он пропустил первые две Чжили-Фэнтяньские войны, Го все же проявил себя как способный сотрудник в двух других конфликтах с Чжилийской кликой. Как хорошо образованный офицер, изучавший современную войну в Японии, Го мог бы стать ценным специалистом. Го очень близок к клике Шикана и открыто выражал свое восхищение японской армией, что, скорее всего, связано с его образованием."

 #郭希鵬
 FNG_guo_xipeng: "Го Сипэн"
 FNG_guo_xipeng_commander_desc: "§YОписание генерала\nРодился:§! §g1890, Гайпин, Шэнцин, Империя Цин§!\n§YСимпатизирует:§! §LАполитичен§!\n§YВоенная карьера:§! §gВыходец из купеческой семьи в небольшом уезде, Го Сипэн смог получить начальное и среднее образование в своем родном городе. После непродолжительного обучения в Фэнтяньской школе права и политических наук Го поступил в Северо-восточный армейский лекторий и изучал кавалерию. Перед отправкой в Японию для получения более современной военной подготовки Го служил младшим командиром кавалерии и участвовал в Первой Чжили-Фэнтяньской войне в 1922 году.\n\nВ Японии Го учился в кавалерийской школе в Чибе (некоторые люди в Фэнтяньской армии всегда думают, что он учился в Академии Императорской японской армии), затем он поступил в Военный колледж армии Японии для изучения современной военной науки и военного дела. В 1925 году Го вернулся в качестве командира кавалерийского полка под командованием Ю Чжишаня, в следующем году он командовал кавалерийской бригадой, действуя на равнинах Чархара во время Чжили-Фэнтяньских войн в 1927 и 1928 годах. Го продолжал расти в армии Фэнтянь как способный кавалерист. Его знания о современной войне, полученные в Японии, стали бы отличным дополнением к армии Фэнтянь. Го известен тем, что не сотрудничал с Кликой Шикана или Обществом Согласия, несмотря на то, что учился в Японии."

 #戢翼翘
 FNG_ji_yiqiao: "Цзи Ицяо"
 FNG_ji_yiqiao_commander_desc: "§YРодился:§! §L1885, in Fang County, Hubei Province, Great Qing§!\n§YПринадлежность:§! §PКлика Шикань§!\n§YBackground:§! §LВыросший в провинции Хубэй Цзи Ицяо получил современное образование в школе, основанной Чжан Чжидуном, знаменитым реформатором конца династии Цин. В 1906 году правительство провинции Фэнтянь спонсировало его обучение в Рикугун Сикан Гакко в Токио. Вернувшись в Китай в 1911 году, он некоторое время преподавал в военной академии Баодин, прежде чем принять участие в Синьхайской революции в Шанхае, участвуя во взятии Нанкина. После того, как в 1912 году напряженность в отношениях между Сунь Ятсеном и Юань Шикаем достигла апогея и привела ко Второй революции, Цзи присоединился к войне на стороне революционеров, а после ее поражения отправился в изгнание. Позже по приглашению Тан Цзияо он отправится в Юньнань в качестве инструктора в Куньминской военной академии. В конце концов, в 1922 году его старый одноклассник Ян Юйтин пригласил его вступить в армию Фэнтянь в качестве начальника штаба дивизии Хань Линьчуня. С тех пор Цзи служил с отличием и зарекомендовал себя как способный командир во время Второй Чжифэнской войны, подавления восстания Го Сунлина и двух последующих Чжифэнских войн. Именно во время Третьей и Четвертой войн Чжифэн Цзи продемонстрировал свое истинное мастерство полководца, перехитрив и уничтожив значительные силы Чжили в провинции Хэнань. Несмотря на поражение Фэнтяня, Цзи оставался способным офицером и высокопоставленным членом клики Шикан Ян Юйтина.§!\n\n§YПримечания: Будучи высокопоставленным членом клики Шикан, Цзи поддерживает хорошие отношения со многими членами высшего командования Фэнтяня, включая клику Шаошуай. Он также опасается растущего японского влияния в Северо-Восточном Китае, и лично он крайне подозрительно относится к намерениям Японии.§!"

 #周亚卫
 FNG_zhou_yawei: "Чжоу Явэй"
 FNG_zhou_yawei_bio: "Чжоу Явэй, будучи прилежным и целеустремленным учеником в юном возрасте, получил стандартное образование, но в 18 лет был завербован Цю Цзинем в Общество Реставрации. Эта антицинская революционная организация, действовавшая в основном в провинциях Цзянсу и Чжэцзян, была основана такими людьми, как Тао Чэнчжан, Чжан Тайянь и Цай Юаньпэй. Они придерживались военизированной формы организации и предприняли множество неудачных попыток восстаний, в которых участвовал и Чжоу. После Синьхайской революции Чжоу недолгое время общался с Гэ Цзингэнем, прежде чем поступить в Военный университет. Женившись на своей соратнице по Обществу Реставрации Инь Жуйчжи, Чжоу окончил университет и поступил в Японский военный университет. Вернувшись в Китай в 1924 году, он служил начальником отдела военной науки правительства Бэйян и начальником штаба Третьего и Четвертого корпусов армии Фэнтянь. В 1928 году он был назначен директором отдела военной науки Командования безопасности трех северо-восточных провинций, в 1934 году стал главным инструктором Корпуса подготовки офицеров армии, а затем деканом Северо-восточного армейского университета. Под его руководством Чжоу вместе со своей женой приступил к возрождению Общества Реставрации как псевдовоенизированной националистической политической партии, хотя и добился умеренного успеха."
 FNG_zhou_yawei_leader_desc: "§YРодился:§! §LМарт 1889 года, уезд Шэнсянь, провинция Чжэцзян, Великая Цин.§!\n§YБиография:§! §L$FNG_zhou_yawei_bio$§!"
 FNG_zhou_yawei_commander_desc: "§YРодился:§! §LМарт 1889 года, уезд Шэнсянь, провинция Чжэцзян, Великая Цин.§!\n§YПринадлежность:§! §mОбщество Реставрации§!\n§YБиография:§! §L$FNG_zhou_yawei_bio$§!"

 #沈鴻烈
 FNG_shen_honglie: "Шэнь Хунли"
 FNG_shen_honglie_navy_chief_desc: "§YBorn:§! §L1882, in Tianmen, Hubei Province, Great Qing§!\n§YAlignment:§! §PZhang§!\n§YBackground:§! §LShen Honglie, when as a young man with the ambition to plough through, saw the weaknesses of the Chinese Navy very early, and decided to be a general of the navy. In 1906, he attended the Imperial Japanese Naval Academy, where he joined the Tongmenghui (the China Alliance Committee). When he returned home after graduation, he was ordered to instigate the naval anti-Qing campaign in the middle and lower reaches of the Yangtze River in Hubei, but failed to enter the naval forces. At that time, the mainstream figures of the Navy were all studied in Britain, and most of them were from Fuzhou. Obviously, Shen Honglie, who studied in Japan and was from Hubei, could not be accommodated. Later, he went to Beijing to serve as a naval attaché of the EuroWatch Regiment in 1916. After 1920, he became Zhang Zuolin's confidant, helping the latter to build the Northeastern Navy. After several Zhili-Fengtian Wars, he became the commander-in-chief of the Northeastern Navy, monopolising the power of it.\nAlthough he had a background of studying in Japan, he did not join the Concordia Association, but was a member of the Zhang Clique.§!"

 #尹祚乾
 FNG_yin_zuoqian: "Инь Цзуоцянь"
 FNG_yin_zuoqian_navy_chief_desc: "§YBorn:§! §L1887, in Zhijiang, Hunan Province, Great Qing§!\n§YAlignment:§! §L\"Apolitical\"§!\n§YBackground:§! §LTravelling to Japan to study in naval affairs at the Yokosuka Naval Gunnery School, Yin Zuoqian would graduate in 1911, and upon returning would be appointed captain of the Marine Corps of the Shanghai Military Governor's Office, and would later be appointed as a clerk in the Navy Department of the Beiyang Government. In 1913, Yin was promoted to the rank of Lieutenant Commander, and in 1920 would serve as the chief of the Code Section of the Navy Ministry.\n\nLater commanding the \"Jiangping\" and \"Liji\" ships, he would be awarded the fourth class Wenhu medal, and would go onto command further ships before the onset of the Northern Expedition and Zhifeng wars saw Yin ultimately in the position as chief instructor of the Northeast Navy's Defence Fleet.\n\nWith close ties to Japanese admiral officers due to connections made during his education, Yin Zuoqian has close connections to the Concordia Association, yet remains elusive in regards to formal membership.§!"

