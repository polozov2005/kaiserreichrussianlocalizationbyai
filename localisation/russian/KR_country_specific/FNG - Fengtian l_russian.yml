 #鮑文樾
 FNG_bao_wenyue: "Бао Вэньюэ"
 FNG_bao_wenyue_high_command_desc: "§YBorn:§! §L1892, in Fengcheng, Shengjing District, Great Qing§!\n§YAlignment:§! §aShaoshuai Clique§!\n§YBackground:§! §LDespite being a native of the Northeast and of Manchu ethnicity, Bao Wenyue spent his teenage years in Beijing, seeking refuge with his brothers from their uncle who resided there after Bao lost his father at the age of 8. Before attending the Staff College in 1919, Bao studied at the Capital Army Primary School, Qinghe Army Preparatory School, and joined the 2nd Class of the Baoding Military Academy, specialising in infantry. He also served as a junior officer in the 2nd Division stationed in Hubei.\n\nUpon his graduation from the Staff College in 1922, Bao returned home to serve the Fengtian Clique. He joined the Young Marshal's service, assuming the role of his Chief of Staff and aiding the Young Marshal in various conflicts with the Zhili Clique. Following the 3rd Zhifeng War, Zhang Xueliang's influence in the army grew significantly, prompting him to petition the Old Marshal to appoint Bao as the new principal of the Northeastern Army Lecture Hall. Bao's position enables Zhang Xueliang to wield greater influence over the emerging officers from the Northeastern Army Lecture Hall.§!\n\n§YNotes: Widely viewed as Zhang Xueliang's right-hand man, Bao is the Young Marshal's Chief Thinker for military strategy. Additionally, Bao is a co-founder and the vice-chairman of the alumni association of the Staff College and he has a good relationship with his schoolmates in Baoding and the Staff College.§!"

 #張景惠
 FNG_zhang_jinghui: "Чжан Цзинхуэй"
 FNG_zhang_jinghui_bio: "Чжан Цзинхуэй родился в крестьянской семье. В юности он последовал за отцом и стал продавать тофу, чтобы заработать на жизнь. Позже он основал "Страховую команду" в городе Бацзяотай. Чжан Цзолинь, бежавший от Цзинь Шоушаня, нашел дорогу в Бацзяотай. Там Чжаны встретились, стали заклятыми братьями и объединили свои бандитские силы. К 1906 году страховой отряд Чжан Цзолиня был включен в состав Цинской армии, а Чжан Цзинхуэй стал командиром батальона патрулирования тыла. В 1910 году Чжан Цзолинь поручил своим подчиненным Чжан Цзуосяну, Тан Юлиню и Чжан Цзинхуэю посещать лекторий Северо-Восточной армии. К 1917 году Чжан Цзинхуэй стал еще выше, а Тан Юйлинь рассорился с Чжаном.\n\nВ 1918 году Чжан обнаружил, что Сюй Шучжэн и Ян Юйцин сговорились использовать ресурсы Фэнтяня в своих корыстных целях, и сообщил об этом старому маршалу, в результате чего Ян и Сюй были изгнаны. В Первой Чжили-Фэнтяньской войне он служил главнокомандующим Фэнтяньской армии Западной дороги, но его недостаток решимости привел к краху армии Западной дороги.\n\nПосле войны Цао Кунь назначил его начальником Государственного управления шоссейных дорог, предав старого маршала. В 1925 году, после смерти матери, Чжан Цзолинь разрешил ему вернуться домой, чтобы заняться похоронами в качестве заступника Чжан Цзосяна и У Цзюньшэна. С тех пор Чжан занимал различные должности, в том числе начальника армии."
 FNG_zhang_jinghui_leader_Desc: "§YBorn:§! §LJune 21st, 1871, in Bajiaotai, Shengjing District, Great Qing§!\n§YBackground:§! §L$FNG_zhang_jinghui_bio$§!"
 FNG_zhang_jinghui_commander_desc: "§YОписание генерала\nРодился:§! §g21 июня 1871, Тайянь, Шэнцин, Империя Цин§!\n§YСимпатизирует:§! §mОбщество Согласия§!\n§YВоенная карьера:§! §g$FNG_zhang_jinghui_bio$§!\n\n$FNG_zhang_jinghui_notes$"

 #馮占海
 FNG_feng_zhanhai: "Фэн Чжаньхай"
 FNG_feng_zhanhai_high_command_desc: "§YBorn:§! §LNovember 6th, 1889, in Jinxian County, Shengjing District, Great Qing§!\n§YAlignment:§! §aShaoshuai§!\n§YBackground:§! §LIn his childhood, Feng raised pigs and attended private school. In 1917, Feng chose to join his uncle Zhang Zuoxiang in the Fengtian Clique as a serviceman. Later on, Feng joined the Northeastern Army Lecture Hall for further studies. Upon graduating, Feng served as the captain adjutant of the 108th division of the 27th army, and continued rise in rank, achieving commander status by 1925. Feng was stationed in Jilin after his uncle Zhang Zuoxiang was promoted to governor of the province. Command of the Guard Regiment of the Jilin Governor's Office fell to Feng, which he served dutifully.\n\nFeng's uncle Zhang Zuoxiang, unlike the Old Marshal's other friend Wu Junsheng, demonstrated a strong talent for administrative affairs. During his governorship, Zhang clarified the authority of officials, enforced meritocracy, cracked down on banditry, made the province free of opium, reformed taxation, fixed Jilin's fiscal deficit, and spent the surplus on public welfare, railway construction, water plants, rank embankments, asphalt roads, and primary and secondary schooling. Zhang's affinity for governance and strong moral character rubbed off on Feng, who became increasingly disgruntled with increasing Japanese influence in the Northeast in recent years.§!\n\n§YNotes: Feng is a close ally of Zhang Xueliang's faction of the Young Guard, and promotes a reformist minded agenda to his uncle in Jilin.§!"

