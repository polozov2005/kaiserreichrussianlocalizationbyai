 #王揖唐
 FNG_wang_yitang: "Ван Итан"
 FNG_wang_yitang_leader_desc: "§YBorn:§! §L1878, in Hefei County, Anhui Province, Great Qing§!\n§YBackground:§! §L$FNG_wang_yitang_desc_body$ Now entrusted with stewardship of China, many believe that Wang's ascendance to the presidency is the sign that Anhui's gambit played of.§!"
 FNG_wang_yitang_sic_desc: "§YBorn:§! §L1878, in Hefei County, Anhui Province, Great Qing§!\n§YAlignment:§! §aBeiyang§!\n§YBackground:§! §L$FNG_wang_yitang_desc_body$§!"
 FNG_wang_yitang_desc_body: "Passing the Imperial Examination in 1904, Wang Yitang would request the Qing Court to allow him to study military affairs in Japan, being sent to the Tokyo Shinbu Gakko. After graduation Wang would serve briefly as an intern in an artllery regiment, however due to difficulties with becoming accustomed to the life of a soldier, Wang would change course and study at Hosei University.\n\nReturning to China in 1907, Wang would serve as the director of the Ministry of War, Military Counseler of the Governor-General's Office of the Northeast, and commander of a brigade. Travelling to Russia in 1909 on diplomatic business, Wang would receive the Order of the Precious Star from the Tsar, and would tour a series of European and American countries to investigate military, political and transportation developments. Travelling back home once again, he would serve as General Manager of the Jilin Military Prep Department.\n\nJoining a series of Republican parties in the aftermath of Xinhai, Wang would be elected to the first Senate, joining Li Yuanhong's Republican Party, later merging into the Progressive Party. Serving in Yuan Shikai's Constitutional Conference on behalf of Anhui, Wang would support Yuan Shikai's monarchy ambitions, and after its failure would join Duan Qirui's Anhui Clique.\n\nHaving a tenure as Speaker of the Senate, Wang would organise the Anfu Club Party-State, effectively ruling China through a clique within a clique. Forced to flee to Japan following an arrest warrent after the fall of Anhui, Wang would participate in Duan's 1924 Government under Zhang Zuolin, becoming a vocal proponent and major figure. With Fengtian's withdrawal following the Third ZhiFeng War, Wang would become one of the most important members of the loose \"Recovery League\"."

 #章宗祥
 FNG_zhang_zongxiang: "Чжан Цзунсян"
 FNG_zhang_zongxiang_leader_desc: "§YРодился:§! §L1879 г., уезд Усин, провинция Чжэцзян, Великая Цин.§!\n§YБиография:§! §L$FNG_zhang_zongxiang_desc_body$§! Нынешний президент прояпонской республики вызывает у многих соотечественников лишь враждебность."
 FNG_zhang_zongxiang_advisor_desc: "§YРодился:§! §L1879 г., уезд Усин, провинция Чжэцзян, Великая Цин.§!\n§YПринадлежность:§! §cНовая Коммуникационная Клика§!\n§YБиография:§! §L$FNG_zhang_zongxiang_desc_body$§!"
 FNG_zhang_zongxiang_desc_body: "Сдав императорский экзамен в юном возрасте, Чжан Цзунсян начал свою долгую и насыщенную историю знакомства с японской культурой, отправившись туда в 1899 году. Там он учился в Первой высшей школе, на юридическом факультете Токийского императорского университета, а позже — в университете Мэйдзи. Вернувшись в Китай в 1903 году, он преподавал в Пекинском императорском университете, став придворным джиньши. Служа в различных министерствах, он даже участвовал в судебном процессе по делу о покушении на убийство регента Цзайфэна.\n\nВ 1911 году Чжан был направлен Юань Шикаем для участия в мирных переговорах между Севером и Югом с Тан Шаои. Он продолжил свою работу на службе у Юаня, став министром юстиции в 1914 году. В 1916 году он стал министром в Японии, вступив в сговор с Новой коммуникационной кликой для тайного заключения сомнительно выгодной сделки в отношении китайских долгов перед Японией. В 1918 году он подписал три кредитных соглашения с Японией на общую сумму 60 миллионов иен, предоставив Японии права на строительство железных дорог и разработку полезных ископаемых, а также согласившись на оккупацию Цзинаня и Циндао Японией. Представляя Бэйян на Мировой мирной конференции, он стал объектом критики за свои прояпонские действия, был осужден, избит, изгнан из родного города и вынужден покинуть свой пост в правительстве. В 1920 году он занимал должность генерального директора совместного китайско-японского банка, а в 1925 году — генерального директора Пекинского коммерческого банка. В 1928 году он ненадолго переехал в Циндао, после чего его старые друзья Лу и Цао отозвали его, чтобы он присоединился к их возрожденной Новой коммуникационной клике в Фэнтяне."

 #陸宗輿
 FNG_lu_zongyu: "Лу Цзунъюй"
 FNG_lu_zongyu_sic_desc: "§YРодился:§! §L1876 год, в префектуре Ханчжоу, провинция Чжэцзян, Великая Цин.§!\n§YПринадлежность:§! §cНовая Коммуникационная Клика§!\n§YБиография:§! §LРодившийся в семье торговца, Лу Цзунъюй поступил в Нанкинскую академию Вэньчжэн, а в 1899 году за свой счет поступил на юридический и экономический факультет университета Васэда. В 1902 году он вернулся в Китай и работал налоговым инспектором в Пекине, а затем преподавал в Цзиньши и полицейской академии. В 1905 году Лу стал директором патрульной полиции при Сюй Шичане, а позже стал советником Айсин-Гиоро Зайзе, министра по политическим вопросам.Сопровождая Сюй Шичана на должность генерального директора Фэнтяньского бюро иностранных дел, Лу в 1908 году последовал за Сюем в Пекин, а в 1910 году стал членом Государственного совета. Будучи помощником менеджера в Банке коммуникаций, он вскоре стал исполняющим обязанности заместителя министра финансов. В 1913 году он был членом Сената и в том же году стал послом Китая в Японии.Учитывая нейтральную позицию Китая по отношению к японской оккупации Шаньдуна, Лу был бы в авангарде Двадцати одного требования Японии, и со смертью Юаня Лу был бы отозван. Став председателем правления Банка коммуникаций, Лу был направлен Цао Жулинем на переговоры о займе Нишихары с Чжан Цзунсяном, а в 1917 году стал генеральным директором объединенного китайско-японского банка. В 1919 году он вместе с Цао Цзэдуном сформировал Новую коммуникационную клику, но в том же году был избит протестующими вместе с Чжаном и уволен. Служа в Сенате в 1925 году, Лу в конечном счете жил в Тяньцзине, пока Цао не пригласил его присоединиться к нему в Фэнтяне.§!"

 #喜多誠一
 FNG_kita_seiichi: "Кита Сейити"
 FNG_kita_seiichi_sic_desc: "§YРодился:§! §L20 декабря 1886 года, префектура Сига, Японская империя§!\n§YПринадлежность:§! §jКвантунская армия§!\n§YБиография:§! §LСын Киты Сабуро, Кита Сейити окончил вторую среднюю школу Сига, а затем в 1907 году Японскую военную академию. произведенный в лейтенанты пехоты, он служил в Тяньцзиньском гарнизоне и на различных других должностях, прежде чем поступить на службу и окончить Военное училище армии в 1919 году.\п\п В 1920 году он стал командиром роты, служил в Генеральном штабе и советником Генерального штаба правительства Бэйяна. В 1925 году он стал членом секции Бюро по военным вопросам Министерства армии, а затем занимал ряд других должностей в японском генеральном штабе и верховном командовании. Дислоцированный в Нанкине, он в 1931 году получил звание полковника пехоты.\n\nВ 1932 году он стал офицером штаба разведки Шанхайского гарнизона, а позже стал офицером штаба Квантунской армии в Дунбэе, занимая должность начальника китайского отдела Генерального штаба. Недавно он был произведен в генерал-майоры и стал официальным военным атташе при правительстве Фэнтяня.§!\n\n§YПримечания: Считаясь \"экспертом по Китаю\" в глазах японского генерального штаба, Кита путешествует между Тяньцзинем, Шанхаем, Шэньяном и Квантуном по всевозможным поручениям.§!"

