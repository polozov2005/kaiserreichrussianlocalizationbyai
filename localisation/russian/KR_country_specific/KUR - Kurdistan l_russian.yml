### Events ###
 kurdistan_events.1.t: "Хрупкое восстание"
 kurdistan_events.1.d: "Когда шейхи и агасы установили свои знамена в земле перед Великой мечетью Диярбакыр Улу Камии, многие сомневались в их способности вести эффективную войну с режимом кемалистов. Тем не менее, многие также сомневались в том, что эти силы когда-либо объединят свои силы.\n\nВ то время как железные дороги посягают на курдские владения, Вера теряет тот статус, которого она заслуживает с каждым днем, и турецкие интеллектуалы пытаются навязать свое видение нашему Великому Халифату, многие видели Свет, тем не менее, с письмами поддержки, поступающими со всего мусульманского мира, и с добровольцами, желающими сражаться за Халифа, записавшимися в Диярбакыр. Проклятым неверным столицы очень скоро будет показана ошибка пути, и улицы покраснеют от крови тех, кто против нас. Так давайте же пойдем, восстановим честь нашего Халифа и спасем весь Ислам от этой катастрофы!"
 kurdistan_events.1.a: "Аллах Акбар!"

 kurdistan_events.2.t: "Сулеймания провозглашает свою независимость"
 kurdistan_events.2.d: "Объявленный недавно вернувшимся шейхом Махмутом Барзинджи, город Сулеймания и прилегающие территории решили порвать с Османской Империей и использовать правящий хаос в Машрике, чтобы создать собственное государство. Это решение стало немного неожиданностью для его бывшего союзника из [PER.GetName], который намеревался дестабилизировать Порту, но не объявить курдское государство. Опасаясь поддержки своего дела со стороны курдского населения, в настоящее время остается неясным, обратит ли Иран свое оружие на него, прежде чем ситуация может еще больше ухудшиться."
 kurdistan_events.2.a: "Проклятый Барзинджи!"

 kurdistan_events.3.t: "Шейх Махмуд Барзанджи переговаривается с [PER.GetName]"
 kurdistan_events.3.d: "По словам наших шпионов, лидер двух неудачных попыток в Сулеймании создать Курдское королевство, печально известный шейх Махмуд вновь был замечен в контакте с представителями иранского правительства. Известный Кадири, попросил других курдов выразить благодарность за большинство его неудач, так как их нежелание подчиниться шейху было бы их падением. Османские чиновники в Ираке быстро воспользовались их разногласиями, и используя противоборствующие ему курдские силы, в частности, могущественного Джафа, был вынужден бежать через границу в Иран.\n\nПопытки иранского правительства снабдить его войска и отправить их обратно в Сулейманию, чтобы вызвать хаос на османской периферии, становились все менее успешными, так как даже его ближайшие сторонники начинали верить, что окно закрылось. Более того, турки противодействовали этой уловке собственными курдскими пешками. Курд Симки, известный военачальник иранского Курдистана и которого многие ассирийцы опасались из-за его чрезмерной жестокости возле озера Урмия во время заключительных этапов Вельткрига, нашел своего благодетеля в османском правительстве. Иногда даже заходя так далеко, как сражаясь под турецким флагом, этот полководец вызвал большой хаос и даже успешно разбил иранскую армию. Тем не менее, подкрепление из Тегерана, в конечном счете, докажет его гибель, поскольку он как и его коллега направлялся дальше на юг через границу.\n\nЭта игра туда-сюда между двумя державами закончилась в 1927 году, когда администрация Мустафы Кемаля и иранского шаха заключили Саадабадский Пакт. Обе стороны отныне прекратят разжигание курдского недовольства по другую сторону границы, так как опасность пробуждения курдского национализма рассматривалась как наносящая ущерб интересам обеих сторон. Несколько мелких нарушителей спокойствия были обменены символическим жестом, в то время как обе стороны также подтвердили османо-иранскую границу 1913 года."
 kurdistan_events.3.a: "В какую игру играют иранцы?"

 kurdistan_events.4.t: "Хаос среди Джаф"
 kurdistan_events.4.d: "Курдская племенная конфедерация Джаф, одна из самых известных в иракском Курдистане, была потрясена в начале этой недели в результате убийства их вождя. Сражаясь на стороне османской армии во время первого восстания шейха Махмуда, многие поспешили указать пальцем через иранскую границу, где изгнанный вождь, похоже, наращивал свои силы для возвращения к власти.\n\nУбийство заставило недовольных членов конфедерации порвать с центральной политикой и поддержать своего преемника, чье видение сотрудничества с османским режимом гораздо менее безопасно."
 kurdistan_events.4.a: "Тревожно"

 kurdistan_events.5.t: "Восставшие диссиденты в иракском Курдистане"
 kurdistan_events.5.d: "В связи с общим ощущением приближения войны в воздухе, стабильность в районе Сулеймании стала резко снижаться. Набеги двух могущественных племен, Хаврами и Хамаванда (союзников шейха Махмуда во время его восстания), стали настолько невыносимыми, что купцы и другие городские жители были вынуждены уехать в Киркук и Мосул, где защита со стороны местных конфедераций и османской жандармерии дает им столь необходимую передышку. Протесты против медленной реакции правительства также стали причиной всплеска в регионе, поскольку многие курды начинают терять веру в военных, пытающихся предотвратить нанесение им вреда.\n\nОднако армия послала отряд из 3000 человек и эскадрилью авиации на территорию беспокойных племен, чтобы положить конец их беспорядкам. Иранское правительство быстро отреагировало, отметив, что масштабы передвижения этих войск так близко к их границе могут быть лишь признаком того, что турки планируют вторгнуться в иранский Курдистан и вытеснить проживающих там в настоящее время курдов."
 kurdistan_events.5.a: "Еще одна потеря отважных турецких солдат..."

 kurdistan_events.6.t: "Шейх Махмуд прибывает в Сулейманию"
 kurdistan_events.6.d: "Проехав верхом во главе 500 всадников, изгнанный и самозваный "король Курдистана" вернулся домой. Никого не удивляет, что это вновь подняло боевой дух восставших курдов, которые видят в своевременном возвращении своего героя знак того, что ситуация наконец-то перевернулась. И Хаврами, и Хамаванд поспешили заявить о своей верности шейху и оба послали отряды своих племен на его оперативную базу недалеко от иранской границы. Некоторые фракции конфедерации Джаф, все еще оправляющиеся от вопиющего нападения на их руководство, также встали на его сторону, в то время как другие остаются на границе, так как поддержка Махмуда со стороны Ирана пока кажется маловероятной.\n\nКак вопиющее нарушение Саадабадского Пакта, правительство Константинии потребовало немедленного ответа со стороны Ирана в этом вопросе, чтобы объяснить, почему они не остановили возвращение шейха. Также в срочном порядке в Восточную Анатолию была направлена телеграмма с приказом вооружить остатки армии Симки и поставить их в боевую готовность для проведения подобных операций вокруг озера Урмия, если иранцы не отступят."
 kurdistan_events.6.a: "Им лучше дать нам хорошее объяснение!"

 kurdistan_events.7.t: "Пограничный конфликт в Курдистане"
 kurdistan_events.7.d: "Османо-иранская граница всегда была переменчивым зверем, не в последнюю очередь из-за большого количества курдских племен, которые не отождествляют себя ни с одной из сторон и мигрируют туда-обратно в зависимости от сезона. В 19 веке были предприняты усилия по более тщательной маркировке этой границы, на что ушло почти сто лет, когда она была утверждена в 1913 году. Тем не менее, и турки, и мы саботировали другую сторону, где только могли, и делали это с большим успехом через курдские пешки.\n\nОднако 1920-е годы положили конец этому соперничеству, так как ущерб, нанесенный поддержке курдских агитаторов с другой стороны, вызвал массивные последствия для лояльности наших собственных курдов. Таким образом, Саадабадский Пакт был создан как соглашение между нашими двумя правительствами о прекращении операций по укреплению курдских национальных настроений в 1927 году.\n\nРост арабского национализма и проблемы, созданные египетским правительством, заставили наше правительство, однако, 'пересмотреть' эту идею, так как в случае с Ближним Востоком, который, как кажется, взял курс, который может завершиться только войной, иранские ястребы отправили изгнанного шейха Махмуда Барзанджи в Сулейманию в попытке ослабить восточный фланг Порты. Как вопиющее нарушение Саадабадского Пакта, османское правительство теперь потребовало объяснений и угрожало разорвать договор, если мы не выведем его немедленно."
 kurdistan_events.7.a: "Просто всё отрицайте"

 kurdistan_events.8.t: "Иран отрицает любую ответственность"
 kurdistan_events.8.d: "В ответ на наши обвинения иранское правительство решило отрицать всю ответственность в деле Сулеймании. Они утверждают, что Махмут сбежал от своих охранников и полностью самостоятельно смог пересечь границу. Любые инциденты, которые он, возможно, спровоцировал после этого, не являются делом Ирана, за которым последовало издевательское замечание о том, что, возможно, османам стоит взглянуть на свое собственное ненадлежащее управление, вместо того, чтобы перекладывать вину на другие страны.\n\nСообщения наших агентов в Иране и Курдистане, однако, противоречат этому заявлению, так как начали поступать сообщения об иранских курдах в рядах Барзинджи. Кроме того, остается открытым вопрос о том, как он мог бы профинансировать организацию, которую он поднял, без иностранной поддержки.\n\nПоэтому совет министров официально обратился к услугам Симки, который был вооружен османскими винтовками, пулеметами и даже артиллерийскими орудиями. В его рядах также находится несколько османских пехотинцев, которые, в случае необходимости, обеспечивают его контроль со стороны правительства."
 kurdistan_events.8.a: "Похоже, что Саадабадский Пакт мертв"

 kurdistan_events.9.t: "Возвращение Симки"
 kurdistan_events.9.d: "Похоже, что в ответ на действия Махмуда Барзанджи турки послали на нашу территорию свою пешку. Симки, курд из района озера Урмия, особенно известен среди ассирийцев, которых он зверски убивал вместе с османскими войсками, когда они бежали в Иран во время Вельткрига. Однако он не остановился на этом, так как в начале 20-х годов он пытался создать свое собственное курдское государство при молчаливой поддержке османских военных. Потребовалось бы несколько позорных поражений и существенная армия, чтобы наконец-то вытеснить его, оставив регион в покое.\n\nЕго возвращение тем более тревожно, что это кажется ясным посланием со стороны османов о том, что он в очередной раз проявляет интерес к суннитским курдам Севера. Хотя у этого человека осталось мало поддержки в регионе, ущерб, вероятно, по-прежнему будет огромным, и если мы не ударим первым, в то время как Порта страдает от ударов на Западе, мы можем в скором времени обнаружить серьезное превосходство в огневой мощи."
 kurdistan_events.9.a: "Отправьте ультиматум!"
 kurdistan_events.9.b: "Мы не можем пока рисковать войной"

 kurdistan_events.10.t: "Иран ставит ультиматум"
 kurdistan_events.10.d: "В ответ на хаос, причиненный Симки, иранское правительство решило выдвинуть полноценный ультиматум в отношении нашего обращения. Требуя немедленного вывода войск Симки, экстрадиции всех курдских военных преступников за последние два десятилетия и абсолютно ошеломляющей суммы репараций за якобы нанесенный им ущерб, становится ясно, как день, что это объявление войны под завуалированным предлогом. Движение войск в Хузестане и вблизи Тебриза еще раз подтвердило это подозрение, и стало совершенно очевидно, что иранцы и турки снова вцепились друг другу в глотку. Пусть Аллах проведет нас через эти тревожные времена!"
 kurdistan_events.10.a: "Мы идем на Тегеран!"

