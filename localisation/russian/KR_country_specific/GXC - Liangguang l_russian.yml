###- Phase I Decisions -###

 ##Trouble in the Twin Provinces
 GXC_trouble_in_the_twin_provinces_decision_category: "Смута в Двух провинциях"
 GXC_trouble_in_the_twin_provinces_decision_category_desc: "Две провинции, составляющие Лянгуан («Два Гуана»), охвачены политической нестабильностью под хрупкой гегемонией Старой Гуанси. Гуанси на западе имеет три основных военно-политических региона — Байсэ, Гуйлинь и Наньнин (столица). Гуандун на востоке также разделен на три — Хайкоу, Шаогуань и их провинциальную столицу Гуанчжоу. §YЧтобы заявить о победе над Лянгуаном, три основных блока, борющихся за власть, должны утвердить полный контроль над каждым регионом!§!"

 GXC_situation_in_liangguang_title_text: "Ситуация в Лянгуане"
 GXC_situation_in_liangguang_description_text: "§YСитуация в Гуандуне:§!\nУровни силы в §YГуанчжоу§!: [?GXC.GXC_INTROGAME_GUANGZHOU_REGION_VAR:GXC_introgame_local_KMT_strength_var|c0]/[?GXC.GXC_INTROGAME_GUANGZHOU_REGION_VAR:GXC_introgame_local_UPC_strength_var|f0]/[?GXC.GXC_INTROGAME_GUANGZHOU_REGION_VAR:GXC_introgame_local_NPA_strength_var|m0]\nУровни силы в §YШаогуане§!: [?GXC.GXC_INTROGAME_SHAOGUAN_REGION_VAR:GXC_introgame_local_KMT_strength_var|c0]/[?GXC.GXC_INTROGAME_SHAOGUAN_REGION_VAR:GXC_introgame_local_UPC_strength_var|f0]/[?GXC.GXC_INTROGAME_SHAOGUAN_REGION_VAR:GXC_introgame_local_NPA_strength_var|m0]\nУровни силы в §YХайкоу§!: [?GXC.GXC_INTROGAME_HAIKOU_REGION_VAR:GXC_introgame_local_KMT_strength_var|c0]/[?GXC.GXC_INTROGAME_HAIKOU_REGION_VAR:GXC_introgame_local_UPC_strength_var|f0]/[?GXC.GXC_INTROGAME_HAIKOU_REGION_VAR:GXC_introgame_local_NPA_strength_var|m0]\n\n§YСитуация в Гуанси:§!\nУровни силы в §YНаньнине§!: [?GXC.GXC_INTROGAME_NANNING_REGION_VAR:GXC_introgame_local_KMT_strength_var|c0]/[?GXC.GXC_INTROGAME_NANNING_REGION_VAR:GXC_introgame_local_UPC_strength_var|f0]/[?GXC.GXC_INTROGAME_NANNING_REGION_VAR:GXC_introgame_local_NPA_strength_var|m0]\nУровни силы в §YБайсэ§!: [?GXC.GXC_INTROGAME_BAISE_REGION_VAR:GXC_introgame_local_KMT_strength_var|c0]/[?GXC.GXC_INTROGAME_BAISE_REGION_VAR:GXC_introgame_local_UPC_strength_var|f0]/[?GXC.GXC_INTROGAME_BAISE_REGION_VAR:GXC_introgame_local_NPA_strength_var|m0]\nУровни силы в §YГуйлине§!: [?GXC.GXC_INTROGAME_GUILIN_REGION_VAR:GXC_introgame_local_KMT_strength_var|c0]/[?GXC.GXC_INTROGAME_GUILIN_REGION_VAR:GXC_introgame_local_UPC_strength_var|f0]/[?GXC.GXC_INTROGAME_GUILIN_REGION_VAR:GXC_introgame_local_NPA_strength_var|m0]"
