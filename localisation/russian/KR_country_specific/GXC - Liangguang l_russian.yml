 #Subterfuge Phase Internal Event Chain (000-049):
 GXC.introgame.001.t: "Рушащиеся гегемонии в Китае"
 GXC.introgame.001.d: "С приближением Лунного Нового года Маршал Лиги Сунь Чуаньфан созвал губернаторов Лиги восьми провинций в Нанкин на их ежегодную конференцию. Примечательно отсутствие губернатора Чжао Хэнти из Хунани, наместника Лу Юйгуана из Лянгуана и его приемного брата, губернатора Ма Цзи из Гуанси. Шэнь Хунъин, полупризнанный губернатор Гуандуна, присутствовал, якобы вместо Старой клики Гуанси.\n\nХотя «Эра высокого милитаризма» в Китае закончилась объединением Китая под властью Чжили, политика в раздробленной нации остается сложным клубок личных связей и сетей власти, которые избегают любой четкой иерархии. На первый взгляд, Северное правительство Чжили в Пекине находится на вершине пирамиды, а Цао Кунь и У Пэйфу де-факто являются правителями страны.\n\nЛига пяти провинций Сунь Чуаньфана (основа Южной клики Чжили) расширилась до восьми в 1929 году как средство оспаривания попыток Северного Чжили централизовать нацию и разоружить милитаристов. Сунь использовал свое влияние на Хунань, Гуанси и Гуандун и ослабление хватки Северного Чжили на юге после 4-й Чжили-Фэнтяньской войны, чтобы обеспечить их формальное вступление в Лигу.\n\nШанхайское восстание 1932 года, в свою очередь, заставило Лигу отступить в свои основные пять провинций, уступив место Лу Жунтину для утверждения контроля над Гуандуном — разрушив попытки назначенного Сунь Чуаньфаном губернатора Шэнь Хунъина продвинуться на юг и обеспечив подчинение назначенного легациями мэра Гуанчжоу Чэнь Ляньбо. Надеясь сдержать власть Сунь Чуаньфана, Цао Кунь вскоре после этого восстановил титул наместника Лянгуана за Лу Жунтином.\n\nЛу Жунтин умер в 1934 году, назначив наместником своего другого приемного сына Лу Юйгуана. Два года спустя все три гегемонии — Чжили, Лига и Лянгуан — похоже, рушатся, ломаясь под тяжестью взаимного недоверия. На данный момент регионалисты в Лянгуане просто стремятся защитить свою автономию."
 GXC.introgame.001.a: "Усилить Лю Чжилу в Гуйлине на случай, если у Суня и Шэня появятся странные идеи."
 GXC.introgame.001.b: "Можем ли мы вообще доверять генералу Лю управление Гуйлинем в эти дни?"
 GXC.introgame.001.c: "Наш негласный союз с губернатором Чжао из Хунани сдерживает маршала Суня."

 GXC.introgame.002.t: "Враждующие фракции в Восточном Гуандуне"
 GXC.introgame.002.d: "Восточный Гуандун за эти годы сильно раздробился, так и не оправившись от конфликтов 1920-х годов. Находясь дальше всего от центра власти Фракции Молодого Гуанси в Наньнине и гранича с Лигой и повстанцами Миньганя, хватка Фракции Молодого Гуанси здесь слабее всего, что позволяет местным фракциям увеличиваться в размерах.\n\nНа северо-востоке находится Шэнь Хунъин и его Фракция армии Шэнь, правящие из города Шаогуань. Амбициозный милитарист из Старой клики Гуанси, назначенный Сунь Чуаньфаном губернатором Гуандуна, он проиграл борьбу за власть в Лянгуане Фракции Молодого Гуанси (часть Старой клики Гуанси) в 1932 году и был изгнан из своей традиционной базы в Гуйлине.\n\nШэнь теперь балансирует между двумя лояльностями. Вынужденный преклонить колено перед сыновьями Лу Жунтина, Лу Юйгуаном и Ма Цзи, он сохраняет значительную автономию благодаря покровительству маршала Суня, который использует его для сохранения влияния на Лянгуан во время борьбы за власть Южного Чжили с Севером. Ма Цзи, со своей стороны, был бывшим лейтенантом У Пэйфу, успешно заключившим союз с Севером для своего отца, чтобы противостоять Югу. Эта прокси-битва не позволила силам Лиги вновь войти в Гуандун, но отсутствие сотрудничества также позволило повстанцам Миньганя (которые не уважают границы провинций) проникнуть в этот район.\n\nНа юго-востоке находится череда милитаристов Старой клики Гуандуна (Армия Юэ), враждебных обеим фракциям Старого Гуанси. Мэр Чэнь Ляньбо нанял изгнанного Чэнь Цзюнмина, бывшего губернатора Гуандуна, для сбора армии для защиты автономии Гуанчжоу, и Чэнь снова доказал свое умение собирать силы вокруг своего родного уезда Хайфэн. Чэнь решил оставаться в основном в Гуанчжоу в качестве сенатора, оставив Е Цзюя управлять этой коалицией милитаристов Юэ, включая Ян Куньжу из Хуэйчжоу и Хун Чжаолиня в Чаомэй. Однако они вряд ли одиноки: крестьяне-социалисты под руководством Пэн Пая и его Фермерской ассоциации продолжают вести жестокую повстанческую борьбу против джентри, поддерживающих Юэ."
 GXC.introgame.002.a: "Лу Юйгуан прибыл в Шаогуань, чтобы разрядить напряженность с Шэнем."
 GXC.introgame.002.b: "Чэнь Цзюнмин объезжает юго-восток, чтобы сплотить лоялистов Армии Юэ."
 GXC.introgame.002.c: "Пэн Пай отправляет гонцов в Миньгань для координации операций."

 GXC.introgame.003.t: "Антиконцессионное насилие в Кантоне"
 GXC.introgame.003.d: "Проект железной дороги Чжэ-Гань, призванный стать главным доказательством китайско-германского сотрудничества, полностью провалился. AOG предприняла шаги по консолидации контроля над многими более мелкими железными дорогами с помощью коррумпированных чиновников Чжили, получив де-факто контроль над тем, что должно было быть равноправным партнерством, и вызвав массовые антиконцессионные протесты по всей стране. Это спровоцировал большую волну инакомыслия по всей стране, поскольку подавленное недовольство китайского народа экономическим неравенством, авторитаризмом Чжили и продолжающимся иностранным империализмом вырвалось наружу.\n\nВ Гуанчжоу это проявилось в нападениях на торговцев, которых считают компрадорами иностранных конгломератов. Купеческая элита, правившая Гуанчжоу после ухода немцев в 1928 году, призвала мэра Чэнь Ляньбо развернуть свой так называемый Торговый корпус для восстановления порядка в городе. Эта военизированная организация, первоначально созданная для защиты интересов торговцев от бродячих милитаристов и революционеров в городе, была реформирована и превращена в силовиков Чэня.\n\nХотя они эффективны в разгоне небольших забастовок, беспорядки, охватившие город, не наблюдались со времен Сянган-Гуанчжоуской забастовки 1925 года. Говорят, что Гоминьдан, Китайская синдикалистская партия и различные анархистские группы разжигают беспорядки через своих агентов в городских профсоюзах, но огромный выплеск ярости против иностранных концессий указывает на гораздо более глубокий гнев, чем все они вместе взятые могли бы вызвать самостоятельно.\n\nАнтиконцессионные убеждения распространяются и на класс интеллектуалов. Прогрессисты и другие члены левоцентристов, в первую очередь Китайское общество возрождения и Партия общественных интересов, также осудили AOG. Недовольные реакционными милитаристами и консервативным торговым правительством, они начали призывать к мирным, но решительным реформам в китайской политической системе. Их влияние оказывает отчетливое воздействие на студенческие группы, противодействуя более радикальным голосам."
 GXC.introgame.003.a: "Требования радикалов о вооруженном восстании воспламеняют массы."
 GXC.introgame.003.b: "Призывы реформаторов к взвешенным изменениям укореняются среди протестующих."

 GXC.introgame.004.t: "Смена лояльности в Южном Лянгуане"
 GXC.introgame.004.d: "Милитаризм — сложная тема. Границы сильно размываются между формальными военными и правительственными должностями, социальными и экономическими иерархиями и охватывающими сетями личных связей как «местных», так и «великих» милитаристов. Между ними и «великими» милитаристами, правящими целыми провинциями, находится еще одна группа «мелких» или «малых» милитаристов. В Южном Лянгуане есть треугольник из трех таких людей, каждый из которых колебался в своих привязанностях на протяжении многих лет.\n\nДэн Бэньинь — правитель Цюнъя, захвативший его у Старой клики Гуанси в 1921 году от имени правительства Гуанчжоу. Осуществив прогрессивные реформы на острове и укрепив свое правление, он встал на сторону Чэнь Цзюнмина в 1922 году, прежде чем попытаться соблюдать форму вооруженного нейтралитета. Его Союзная армия восьми уездов, поддерживаемая Чжили, была в конечном итоге разбита Гоминьданом в конце 1920-х годов, но он был восстановлен немецко-чжилийскими войсками в 1925 году.\n\nК северу от полуострова Лэйчжоу находится регион, где линии контроля размыты. На востоке находится Армия Гуанси Лю Чжэньхуаня. Амбициозный гуансийский милитарист в 1920-х годах, он имел связи с Лу Жунтином и Шэнь Хунъином, но поссорился с обоими и перешел в лагерь Гуанчжоу. Никогда толком не вписываясь в круг Чэнь Цзюнмина или Сунь Ятсена, его амбиции, казалось, всегда заключались в том, чтобы стать губернатором Гуанси, но его различные заговоры (наиболее известным из которых был союз с Юньнаньской армией Ян Симиня для формирования Армии Дянь-Гуй) в конечном итоге ни к чему не привели. Одурманенный опиумом игрок, он присягнул на верность Чэнь Ляньбо после 1927 года, но ему никто не доверяет.\n\nНа западе находится Линь Ху, часть квадриумвирата, который управляет Фракцией Молодого Гуанси. Потерпев поражение от Армии Гуандуна в 1922 году, он встал на сторону Чэнь Цзюнмина против Сунь Ятсена, но в конечном итоге потерпел поражение. Когда его названый брат Ма Цзи был назначен Чжили губернатором Гуанси несколько лет спустя, он вернулся из изгнания и разбил лагерь в Юйлине."
 GXC.introgame.004.a: "Среди неопределенных штормов мелкие милитаристы ценят стабильность."
 GXC.introgame.004.b: "Среди завывающих ветров мелкие милитаристы чувствуют, что грядут перемены."

 GXC.introgame.005.t: "Пограничье Байсэ"
 GXC.introgame.005.d: "После смерти Лю Рифу в 1933 году западная часть Гуанси становилась все менее стабильной. Рейды Гоминьдана из Гуйчжоу в этот район усилились на фоне национальных беспорядков. Бедный, гористый район оказался проницаемой границей для смешанной банды повстанцев, бандитов и ополченцев, предпринимающих разведывательные атаки.\n\nВероятно, они являются лишь прелюдией к грядущему штурму. Так называемая «Новая клика Гуанси» — это триумвират из трех человек: Ли Цзунжэня, Хуан Шаосюн и Бай Чунси. После того как армия Гуанси Лу Жунтина была разбита силами Гуандуна в конце Гуандун-Гуансийских войн, лидеры Гуандуна вскоре оказались в разногласиях и ушли из Гуанси. Это оставило большой вакуум власти, поскольку Лу попытался вернуть власть. Новая клика Гуанси объединилась с Шэнь Хунъином, чтобы положить конец попытке Лу, а затем по очереди победила Шэня.\n\nТрио присоединилось к Гоминьдану, хотя их приверженность идеологии партии в то время была шаткой. Тем не менее, они предоставили для Северного похода мощную Седьмую «Стальную» армию, и Ли Цзунжэнь, и Бай Чунси проявили себя как искусные военачальники и организаторы.\n\nОтступив вместе с остальной частью Национально-революционной армии в Гуйчжоу в рамках своего «Великого похода», они не сидели сложа руки. В то время как Ли Цзунжэнь является лидером группы, а Хуан Шаосюн — их главным администратором, Бай Чунси — блестящий военный теоретик, задумавший «систему ополчения» для Гуанси. Он открыто высказывался о своих теориях, реализуя Три Принципа милитаристским, общественным образом, а Седьмая армия была реорганизована и радикализирована в изгнании.\n\nОпасно то, что даже когда генерал Лю был еще жив, многие местные деревенские старосты, капитаны местных гарнизонов и главари бандитов в западной части Гуанси не оказывали никакого сопротивления во время вторжений Новой клики Гуанси. Из-за симпатии, страха или веры в то, что они скоро уйдут, силы Новой клики Гуанси, похоже, с каждым разом проникают все глубже и глубже в Гуанси, прежде чем встретить значимое сопротивление."
 GXC.introgame.005.a: "В Байсэ нужен новый, более молодой начальник гарнизона."
 GXC.introgame.005.b: "Генералы Новой клики Гуанси каждый раз делают тщательные заметки."

 GXC.introgame.006.t: "Военный совет Молодого Гуанси"
 GXC.introgame.006.d: "Внутренняя работа правительства Молодого Гуанси непрозрачна. Гуанси — бедная, изолированная провинция, особенно по сравнению с Гуандуном. Многие отвергают их как просто вождей бандитских кланов Гуанси, но правда сложнее.\n\nМолодая клика Гуанси — это квадриумвират. Основанная Ма Цзи, Линь Ху и Лю Чжилу как молодая гвардия Старой клики Гуанси Лу Жунтина, после падения Лу от власти Ма Цзи смог использовать свои хорошие отношения с У Пэйфу и службу при Чжили во время Северного похода, чтобы успешно претендовать на Гуанси в 1927 году.\n\nОн пригласил своего приемного отца Лу Жунтина вернуться в качестве номинального главы, и ФМГ сплотила кланы Гуанси, чтобы победить Шэнь Хунъина и утвердить гегемонию над Лянгуаном. До смерти Лу в 1934 году он долго готовил своего приемного сына (и ребенка его любимой наложницы) Лу Юйгуана в качестве своего наследника. Довольно неудачный военачальник и на десятилетие моложе своих сверстников, он тем не менее является лицом правительства.\n\nФМГ в целом склонна уважать гражданские структуры управления. Лу Жунтин создал своего рода прецедент, сотрудничая с Кликой политической науки в эпоху Хунты защиты конституции, и его наследники регулярно созывают Ассамблею провинции Гуанси. Ассамблея провинции Гуандун, базирующаяся в Гуанчжоу, в частности, отказывается признавать Шэнь Хунъина губернатором, но признала сюзеренитет Лу в начале 1930-х годов.\n\nТем не менее, в жизненно важных вопросах совещается только избранный совет. Насилие в Уху, похоже, стало поворотным моментом в Лиге: губернатор Аньхоя Чэнь Тяоюань вышел из Лиги, что может спровоцировать войну. Некоторые опасаются, что это разрушит трехсторонний баланс сил между Северным Чжили, Южным Чжили и западными провинциями. Действия против любого из них могут обнажить хрупкость собственного баланса сил Лянгуана, особенно когда политические волнения распространяются даже на обычно изолированную, консервативную военную, политическую и интеллектуальную элиту Гуанси."
 GXC.introgame.006.a: "Совет решает, что демонстрация силы удержит внешние проблемы подальше от Лянгуана."
 GXC.introgame.006.b: "Совет решает, что сплоченное послание антиконцессионизма вернет перебежчиков."
 GXC.introgame.006.c: "Для преодоления этого кризиса следует созвать больше советов и ассамблей."

 GXC.introgame.007.t: "Чёрный понедельник опустошает Кантон"
 GXC.introgame.007.d: "Точные причины Черного понедельника обсуждаются и, вероятно, станут чрезвычайно спорной темой в учебниках истории, но неоспоримым является разрушение, которое он принес мировой экономике. Поскольку американская экономика все еще вялая, крах еще одного жизненно важного торгового партнера Китая привел к резкому падению стоимости акций, проданных на Шанхайской фондовой бирже.\n\nГуанчжоу (часто называемый западными людьми Кантоном) сильно пострадал от кризиса. Так называемая «Кантонская система» в основном направляла весь китайский экспорт через Гуанчжоу в течение столетия, и хотя основная часть международной торговли с тех пор переместилась на север, в Цзяннань, крах экспорта тем не менее вызвал пагубные последствия вверх и вниз по Жемчужной реке.\n\nКрах экономики, которой уже приходилось иметь дело с кипящими беспорядками, опрокинул главный столп стабильности в Гуанчжоу. Богатые кантонские торговцы и бизнес-магнаты часто используют свое щедрое богатство для финансирования крупных благотворительных организаций и общественных проектов в Гуанчжоу, и поскольку они вынуждены сократить свое покровительство, общественные беспорядки множатся. Рабочие, многие из которых уже бастуют в знак протеста против концессионной политики, теперь находятся на грани восстания, поскольку закрываются заводы, верфи и банки. Студенты тоже, опасаясь за свое экономическое будущее, не видят особого смысла возвращаться в свои классы после недель на улицах, протестуя, что еще больше расшатывает политическую стабильность в городе.\n\nОднако наибольшую озабоченность у «Торгового правительства» Чэнь Ляньбо вызывает влияние, которое резкое сокращение бюджета окажет на их армию. Кантонского торгового корпуса, даже после расширения, никогда не было по-настоящему достаточно для того, чтобы делать больше, чем просто охранять порядок в городе. Опасаясь второй оккупации Гуанси после ухода немцев в 1928 году, Чэнь поспешил нанять список наемников, бывших милитаристов и, в конечном счете, даже перебежчиков из Гоминьдана, чтобы сформировать армию для защиты Гуанчжоу и отдаленных районов от милитаристов и социалистических повстанцев. Без денег у него будет мало средств, чтобы сохранить их лояльность."
 GXC.introgame.007.a: "Торговому корпусу просто придется активизироваться и защищать город."
 GXC.introgame.007.b: "Торговцам придется раскошелиться на общее благо."

 GXC.introgame.008.t: "Падение Улыбающегося тигра"
 GXC.introgame.008.d: "Иногда, несмотря на контроль над провинциями и армиями, командование обширными сетями политического патронажа и накопленным богатством, достаточно одного выстрела, чтобы свалить могущественного человека. А иногда достаточно падения одного человека, чтобы рухнула целая система.\n\nСунь Чуаньфан был застрелен; опасаются, что он мертв или умирает. И хотя, конечно, Лига уже шаталась от нестабильности, выбывание Суня из игры сделало плохую ситуацию намного, намного хуже.\n\nХодят слухи о возможном перевороте в Лиге, при этом Чэнь Тяоюань все еще находится в активном восстании, а Ци Сеюань, как говорят, плетет интриги из Нанкина. Лоялисты Сунь Чуаньфана настаивают, что он все еще жив и скоро поправится достаточно, чтобы возобновить контроль над ситуацией, но он еще не появлялся на публике. Лига явно находится на грани краха.\n\nМилитаристы, зависевшие от покровительства Южного Чжили, находятся в полнейшем беспорядке. «Губернатор» Шэнь Хунъин, который давно отдалился от Ассамблеи провинции Гуандун и города Гуанчжоу, увидел, как баланс сил в провинции пошел в штопор. Генералы Ли Яохань, Ян Чишэн и Ян Жусюань, которым Нанкин фактически платит за сохранение лояльности Шэню, все открыто заявляли о своих претензиях в Шаогуане.\n\nНа юго-востоке Хун Чжаолинь решительно начал выходить из орбиты Чжили обратно в сферу Чэнь Цзюнмина. Базируясь в Чаошане, лингвистически обособленном регионе Гуандуна, где доминируют Юэ, Хакка, Хаклау и Лэйчжоу Мин, он был довольно лояльным (хотя и регионалистом Чаошаня и печально известным своим кольцом торговли опиумом) подчиненным Чэня, который был в целом дружелюбен к предложениям Чжили, помогая ему восстановить контроль над Чаошанем после Северного похода. Впоследствии он занимал относительно нейтральную позицию между Шэнем и Чэнем, но его недавние эмиссары к Е Цзюю указывают на его желание укрепить их союз — крупная дипломатическая удача, если она будет завершена."
 GXC.introgame.008.a: "Шэнь Хунъин подтверждает свой контроль во время конференции в Шаогуане."
 GXC.introgame.008.b: "Е Цзюй заключает соглашение с Хун Чжаолинем от имени Чэнь Цзюнмина."

 GXC.introgame.009.t: "Война на два фронта"
 GXC.introgame.009.d: "Захват власти Ци Сеюанем в Нанкине вчера, казалось, поставил точку в крахе гегемонии Чжили по всему Китаю. Поскольку две ветви Южной клики Чжили обмениваются ударами, центральное правительство шатается от кризиса, а повстанцы Миньганя поднимают крупное восстание, порядок после 1928 года пришел к огненному концу.\n\nНа востоке генерал Чэнь Миншу и его 10-я дивизия были переброшены на юг с жизненно важной миссией: обеспечить безопасность оплота Гоминьдана в Гуандуне для революции или, по крайней мере, умереть, защищая южный фланг повстанцев. С ограниченными ресурсами неясно, смогут ли они продержаться достаточно долго, чтобы прибыло подкрепление — если оно вообще когда-либо прибудет.\n\nОднако они не одиноки. Около недели назад крупный рейд в Байсэ завершился тем, что Ли Цзунжэнь повел свою Седьмую армию в Гуанси, чтобы наступать на Наньнин. Неизвестно, координировались ли двойные вторжения и в какой степени, или у них просто возникли схожие идеи в тот момент, когда в Суня выстрелили. В любом случае, ясно одно: отступления не будет.\n\nНи одна из сил не может насчитывать более 10 000 человек. Но победа — сильный магнит, и армии Эры милитаристов, как известно, быстро расширяются и сокращаются в зависимости от того, кто побеждает и кто лучше всего может платить. В начале Северного похода, например, Национально-революционная армия насчитывала около 100 000 человек, организованных в «Армии» численностью около 10 000 человек каждая. На пике своего развития НРА достигла около 300 000 человек благодаря перебежчикам и пробужденным спящим ячейкам, но менее 50 000 из них добрались до Гуйчжоу в конце Великого похода. Возможно, еще 20 000 составили ядро будущего восстания Миньгань.\n\nОба рассчитывают на устойчивый импульс, который позволит их силам нарастать как снежный ком. Для их врагов то, где развернуть мобильную, западного образца 1-ю дивизию, которую ценил Лу Жунтин, будет иметь решающее значение для победы. После неутешительного выступления в качестве их командира в 1920-х годах Лу Юйгуан снова приказывает им вступить в бой."
 GXC.introgame.009.a: "Гуандун менее стабилен, богаче и нуждается в подкреплении."
 GXC.introgame.009.b: "Потерять Гуанси — значит потерять сердце Старой клики Гуанси."

 GXC.introgame.010.t: "Поворотный момент в Гуанчжоу"
 GXC.introgame.010.d: "Какое бы то ни было чувство законности и порядка в Гуанчжоу достигло дна. С новостями о продвижении Чэнь Миншу и Ли Цзунжэня, быстро распространяющимися по двум провинциям, пробудились радикальные спящие ячейки. Поддерживаемые Гоминьданом и КСП забастовщики парализовали город вспышкой беспорядков, к которым присоединились студенты и другие протестующие, вышедшие на улицы.\n\nПоскольку чернь начинает теснить полицейские силы, ополчение Торгового корпуса и даже военные силы, развернутые против них, сочувствующие Гоминьдану в Гуандунской армии начали плести заговор против правительства. В центре заговора находится Чэнь Цзитан, правый кантонский регионалист, который перешел на сторону победителей все эти годы назад, а теперь должен найти общий язык с социалистическими агитаторами, которых он предал.\n\nВ другом месте в городе мэр Чэнь Ляньбо надеялся получить поддержку, когда он созвал Провинциальную ассамблею, но обнаружил, что столкнулся с очередной головной болью. Его встретил сенатор Чэнь Цзюнмин, который потребовал слова немедленно — отбросив приличия и своего политического соперника: политика, связанного с Кликой политической науки, бывшего кандидата в губернаторы, шаткого союзника мэра Чэня, а теперь спикера Ассамблеи Линь Чжэнсюаня.\n\n«Предложение» сенатора Чэня состоит в том, чтобы ассамблея снова избрала его губернатором, и, используя эту власть, он обеспечит безопасность провинции в условиях хаоса. Он обещает уважать власть ассамблеи и провести множество других демократических реформ в обмен на одобрение мэра, но для мэра Чэня это «предложение» может быть равносильно приставленному пистолету. Хотя сенатор давно отошел от военных дел, хорошо известно, что он командует лояльностью значительной части Гуандунской армии, которая в любом случае уже находится в движении.\n\nПоскольку пули летят во всех направлениях, нейтральные и оппортунистические офицеры, вероятно, пытаются выяснить, какая сторона сильнее. Ни у одной из сторон нет времени на раскачку, хотя ожидается, что переговоры затянутся."
 GXC.introgame.010.a: "Чэнь Цзюнмин назван Губернатором разделенной ассамблеей и сопротивляющимся Мэром."
 GXC.introgame.010.b: "Чэнь Ляньбо, видя, что ассамблея зашла в тупик, уходит, чтобы восстановить контроль самостоятельно."
 GXC.introgame.010.c: "Чэнь Цзитан быстро организует вооруженный путч на фоне застопорившихся переговоров в ассамблее."
 GXC.introgame.010_NPA_tt: "§rВы начнете играть за §eЛянгуанских регионалистов!§!§!"
 GXC.introgame.010_UPC_tt: "§rВы начнете играть за §fЛянгуанских федералистов!§!§!"
 GXC.introgame.010_KMT_tt: "§rВы начнете играть за §cЛянгуанский Гоминьдан!§!§!"

 #Subterfuge Phase External Events (050-099):

 GXC.introgame.050.t: "Наши интересы в Гуанчжоу"
 GXC.introgame.050.d.china: "The history of Guangzhou, also known as Canton, is as rich as China itself. Resting upon the mouth of the Pearl River, for a century it was the only port foreign traders could access. This caused the broader Guangdong region (also referred to as Canton) to become a major centre of trade, enriching it significantly. Although other ports have since been opened to exports (often by force), Guangzhou's valuable nature has not changed.\n\nIt has, however, been occupied by a carousel of successive governments. National Protection, Constitutional Protection, and Sun Yat-sen's Guangzhou governments were major southern challengers to the northern establishment, the latter two anchored in the city. This, unsurprisingly, has not been good for the trade of the region, bringing a great economic downturn for business and the people. However, after the Northern Expedition, Chen Lianbo - through great political manoeuvring and extensive negotiations between the imperial powers that would form the Legation Cities - took power within the city as Mayor.\n\nChen's power rests on his democratic control of the Canton Merchant Corps, the armed militia of the local merchants. His rule has not been without conflict, pinned down by the Zhili-backed Old Guangxi Clique and their notoriously undisciplined troops. Socialist unrest has also worsened in the region, as Kuomintang remnants threaten Guangdong's stability. Feeling ignored and abandoned by both the Zhili and the Germans, Mayor Chenhas been secretly courting the Fengtian government and also seeking the protection of the Legation Powers, most notably the Japanese from their bases in Formosa.\n\nMayor Chen, in his desperation, has sent an envoy to us. Requesting material aid and assistance in order to quell the \"flames of chaos plaguing Guangzhou\", he has offered only promises of future debts to be repaid. Naturally, granting him assistance would stabilise the Pearl River Delta, and grant us a token of power within the region, but it is not without risks. Chen's position is precarious, and is perhaps almost entirely self-inflicted. But with the circumstances present, it remains an open offer."
 GXC.introgame.050.d.external: "The city of Guangzhou (Canton) sits at the mouth of the Pearl River and for many years was the only port foreign traders could access. As a result, the city and its surrounding province of Guangdong became a wealthy centre of trade.\n\nInstability in China has resulted in a carousel of successive governments occupying Guangdong and with turmoil once again threatening our eastern neighbor, it is essential that we protect our interests. Mayor Chen Lianbo of Guangzhou secured his rule over the city through cunning political manoeuvring and extensive negotiations between the imperial powers that would form the Legation Cities and his control over his Merchant Corps militias.\n\nThreatened by neighboring Zhili aligned warlords, he has been secretly courting the Fengtian government, the Legations, and Japanese officials stationed in Formosa. His envoy to us has requested material aid and assistance in order to \"flames of chaos plaguing Guangzhou\" with vague promises of future cooperation and protection of international commerce."
 GXC.introgame.050.a: "Мэр получит секретную партию припасов."
 GXC.introgame.050.b: "Мэр получит письмо с твердой поддержкой."

 GXC.introgame.051.t: "[FROM.GetNameDefCap] поддерживает Чэнь Ляньбо"
 GXC.introgame.051.d: "Посланник из [FROM.Capital.GetCapitalVictoryPointName] сообщил мэру Чэнь Ляньбо о полной поддержке [FROM.GetNameDef] в его усилиях по попытке сохранить контроль над регионом Гуандун. В настоящее время рассматриваемый как наиболее стабильный и легитимный высокий провинциальный чиновник в регионе, растущая известность Чэня привела к росту напряженности среди партнеров Бэйяна в Лянгуане, а именно Старой клики Гуанси. Считаясь главными соперниками Чэня, Торговец давно высказывал свое недовольство и неудовлетворение самоуверенным поведением Старого Гуанси в борьбе с беспорядками в регионе и их предполагаемыми претензиями на де-юре правление в Лянгуане.\n\nВ то время как напряженность оставалась ниже активного конфликта, учитывая, что их общие враги гораздо опаснее, Старое Гуанси продолжало определенную упрямую линию против Торгового корпуса. Чувствуя себя брошенным немцами и игнорируемым Центральным правительством Чжили, а также теряя хватку над своими союзными подчиненными-милитаристами наряду с растущим давлением со стороны повстанцев Гоминьдана, обращение Чэня к [FROM.GetNameDef] было лишь естественной эволюцией событий.\n\nОднако это вызвало еще большую ярость со стороны Старого Гуанси и их приспешников, поскольку это одновременно вовлекает новых иностранных игроков в региональную силовую политику, а также укрепляет позицию Ляньбо в регионе — с особенно сомнительной финансовой, дипломатической и материальной поддержкой."
 GXC.introgame.051.a: "Иностранные друзья пригодятся, когда это важно."
 GXC.introgame.051.b: "Старое Гуанси оказывает значительное дипломатическое давление."

 GXC.introgame.055.t: "Шэнь Хунъин, Губернатор Гуандуна?"
 GXC.introgame.055.d.china: "The history of Guangzhou, also known as Canton, is as rich as China itself. Resting upon the mouth of the Pearl River, for a century it was the only port foreign traders could access. This resulted in the broader Guangdong Province becoming inundated with trade and commerce, enriching it significantly. Although other ports have been opened to exports (often by force), Guangzhou's inherently valuable nature has not changed.\n\nLacking any true allies in the region, the Zhili Clique has long had to settle on auxiliary forces and opportunistic elements. With many ambitious warlords in the region, the North and South Zhili have largely split their support onto different horses, functioning as another extension of their split. For the North, the most charitable group is that of Lu Yuguang, Liu Zhilu, Lin Hu, and Ma Ji's Young Guangxi faction. For the South, they were left with Shen Hongying.\n\nThe nominal governor of Guangdong, at least from Nanjing's perspective, has been unable to secure control of much of the region fully. With his rival Mayor Chen Lianbo controlling a sizeable portion of the Pearl River Delta and Guangzhou, Shen has largely fallen by the wayside. Swiftly amassing an army in the interwar, the Merchant Corps have blunted any attempts for a full Old Guangxi takeover. Similarly, the Guangdong Provincial Assembly has utterly refused to recognise Shen, and his rivals in the Old Guangxi Clique. To make a bad situation worse,Young Guangxi managed to oust him from his primary base in Guilin in 1932.\n\nOnly quasi-recognised, Shen has largely languished within Shaoguan. Directly sustained through the support network stretching from Nanjing, his forces are sustained by Berlin. However, his fief is overflowing with MinGan insurgents, and if he is to stake his claim on Guangdong, he would necessitate funding. Naturally, Shen's position would endear him to any benefactor in perpetuity, and he could perhaps be more loyal than the Young Marshal of the South."
 GXC.introgame.055.d.external: "The city of Guangzhou (Canton) sits at the mouth of the Pearl River and for many years was the only port foreign traders could access. As a result, the city and its surrounding province of Guangdong became a wealthy centre of trade.\n\nInstability in China has resulted in a carousel of successive governments occupying Guangdong and with turmoil once again threatening our eastern neighbor, it is essential that we protect our interests. The region has been divided into quasi-fiefs since the German-Zhili victory in the Northern Expedition, and officers from our military mission deployed in China have identified the ambitious warlord Shen Hongying as our best avenue for maintaining our influence.\n\nGeneral Shen, based out of the city of Shaoguan, claims to be a Governor of the province though his legitimacy has been questioned. He has worked to bolster his power by courting German aid through the League and has worked with German advisors to suppress socialist insurgents operating nearby. Providing further support may help shore up Zhili rule in southern China and thus protect our northern flank."
 GXC.introgame.055.a: "Конечно, мы поможем *законному* Губернатору."
 GXC.introgame.055.b: "Неграмотный полумертвый бандит просит денег? Забавно."

 GXC.introgame.056.t: "[FROM.GetNameDefCap] поддерживает Шэнь Хунъина"
 GXC.introgame.056.d: "Похоже, у Шэнь Хунъина все еще есть пара тузов в рукаве. Используя контакты за пределами региона, а именно своих благодетелей из Чжили, Шэнь сумел обеспечить дополнительную материальную, финансовую и военную помощь от [FROM.Capital.GetCapitalVictoryPointName] в обмен на некоторое подтверждение своей преданности их интересам и власти. Вытесненный из власти фракцией Молодого Гуанси, обстоятельства привели к тому, что независимая линия последней выдвинула Шэня вперед как главного человека Чжили в регионе, даже в его изолированном состоянии.\n\nИмея сильную обиду на Молодое Гуанси за его изгнание из Гуйлиня, а также являясь соперником Чэнь Ляньбо за губернаторство Гуандуна, Шэнь оказался в трудном положении. Полагаясь исключительно на внешнюю поддержку и помощь, он лишь молчаливо признал статус Лу Жунтина как наместника в 1932 году, продолжая претендовать на свою должность губернатора при нем. Однако со смертью Жунтина в 1934 году Шэнь сменил тон, полностью отказавшись признать Лу Юйгуана новым наместником. Несмотря на это, он представляет себя меньшим из двух зол.\n\nПоскольку Восточный Гуандун кишит повстанцами Гоминьдана, стекающимися из района Миньгань, наряду с Чэнь Цзюнмином и его старыми союзниками Юэ, создающими свой собственный блок власти на юге вокруг Хуэйчжоу и Чаомэя, дополнительная поддержка от [FROM.Capital.GetCapitalVictoryPointName] окажется решающей для обеспечения его положения в будущем."
 GXC.introgame.056.a: "Лучше знакомый дьявол..."
 GXC.introgame.056.b: "Старому Гуанси удается вмешаться в поставки припасов."

 GXC.introgame.060.t: "Амбиции Юньнани в Гуанси"
 GXC.introgame.060.d: "История Юньнани, Гуанси и Гуандуна в Эру милитаристов была в значительной степени взаимосвязана. Ключевые события, такие как свержение Чэнь Цзюнмина Лун Цзигуаном или свержение Старой клики Гуанси из Гуандуна Чэнем, Эра героев Гуанси или даже попытка вторжения Тан Цзияо в 1925 году, в значительной степени способствовали общей политической динамике. Наиболее очевидным является случай переворота Гу Пиньчжэня против Тана в начале 1920-х годов, когда произошло последующее изгнание большого количества его последователей в Лянгуан — известное как Армия Юньнани в Гуандуне.\n\nВ 1925 году, после смерти Суня, Тан внезапно вернул себе титул вице-генералиссимуса правительства Гуанчжоу, настаивая на том, что он является преемником Суня, и предпринял попытку захвата власти, двинувшись на Гуанчжоу. Однако, чтобы добраться до города, ему пришлось войти в Гуанси. Сначала предложив вежливую угрозу Новой клике Гуанси, он вступил с ними в конфликт, был отброшен и ненадолго потерял власть в результате последующего переворота Лун Юня.\n\nПосле Северного похода Тан направил клику Юньнани внутрь, хотя и продолжал следить за политикой Гуанчжоу. Однако он не тот человек, который совершает одну и ту же ошибку дважды, и, оказывая влияние на Гуйчжоу, он по иронии судьбы позволил Новому Гуанси сделать это за него. Совершая рейды через их общую границу, 7-я армия Ли Цзунжэня давно жаждала вернуться в свою родную провинцию, рассматриваемую как соперника Чжу Пэйдэ и Хэ Инцинем. В ответ генералы Гуанси потребовали, чтобы Тан Цзияо увеличил свои патрули в Гуйчжоу и предотвратил дальнейшие рейды. Вариант не столь заманчивый, как сохранение статус-кво.\n\nДля Тана лично лучший вариант захватить Гуанчжоу — связаться со старым союзником, Лю Чжэньхуанем. Работая вместе в попытке вторжения 1925 года, Лю давно желал губернаторства Гуанси. Нерешительный союзник федерализма и демократии, возможно, Лю мог бы оказаться правильным игроком, чтобы наконец подчинить Гуанси делу федералистов."
 GXC.introgame.060.a: "Откопать старые каналы связи с нашим другом Лю."
 GXC.introgame.060.b: "Возможно, Ли окажется полезной пешкой?"
 GXC.introgame.060.c: "Наша последняя схватка в Гуанси чуть не погубила нас. Сосредоточиться на Гуйчжоу."

 GXC.introgame.061.t: "Интриги Лю Чжэньхуаня в Гуанси"
 GXC.introgame.061.d: "Благородный и искренний революционер с юных лет, Лю Чжэньхуань долгое время был региональным влиятельным игроком в Лянгуане. Помогая Лу Жунтину, Армии национальной защиты, Правительству защиты конституции, ведя переговоры с Сунь Ятсеном, Чэнь Цзюнмином, Ян Симинем, Ли Гэньюанем и Тан Цзияо, он долгое время позиционировал себя как посредника, объединяющего революционеров реформ и революции одновременно. Неуловимо связанный с Кликой политической науки на Севере, он несет в себе определенный уровень помпезного либерализма «среднего пути», по крайней мере, в зависимости от ситуации.\n\nДостаточно сказать, однако, что его репутация в Лянгуане далека от идеальной, поскольку его солдаты совершили многочисленные злоупотребления десять лет назад. Кроме того, его вечные амбиции на губернаторство Гуанси заставляли его вступать в союз с многочисленными контрастными союзниками, чтобы захватить эту должность. Сначала с Сунь Ятсеном, а затем с Тан Цзияо вместе с Чэнь Цзюнмином, схема Лю с Ян Симинем стала одним из последних актов регионального сопротивления против Гоминьдана перед Северным походом. После своего поражения Лю предпринял нерешительный поворот к делу федералистов и демократическому активизму, продвигая деятельность Объединенной лиги национального строительства, а затем Федерации китайских демократических партий.\n\nСнова став местным влиятельным игроком в регионе, похоже, вечно амбициозный Лю снова обратился к Тан Цзияо, и вместе они начали попытки обеспечить перебежчиков среди недовольных членов клики Гуанси. В частности, их присутствие в значительной степени ощущалось среди гарнизона Линь Ху в Юйлине — в основном из-за взаимных связей с Политической наукой и ассоциации с Чэнь Цзюнмином. Хотя его влияние распространялось по провинции в целом."
 GXC.introgame.061.a: "Не то чтобы он преуспел в первый раз."
 GXC.introgame.061.b: "Перебежчиков можно перекупить."

 GXC.introgame.062.t: "Ли Цзунжэнь усиливает свои рейды"
 GXC.introgame.062.d: "Один из величайших военных тактиков и стратегов, когда-либо спускавшихся на Китай в Эру милитаристов, Ли Цзунжэнь, обычно объединяемый со своим близким другом и правой рукой Бай Чунси, снова и снова доказывал свою ценность для революционного дела. Первоначально учитель физкультуры, Ли был вдохновлен долгом и достойной службой, присутствующими в китайской армии. Стремясь изменить ее имидж от хулиганов или низкой карьеры для прославленных бандитов, он попал под возможное наем Лу Жунтина, губернатора Гуанси. Поднимаясь по служебной лестнице, он впервые вышел на региональную сцену после свержения Лу и Эры героев Гуанси. Объединившись с Бай Чунси и коллегой-подчиненным Лу Хуан Шаосюном, трио сформировало Новую клику Гуанси — связанную с Гоминьданом в Гуандуне через связи Бай Чунси.\n\nСохраняя умеренную хватку над провинцией вплоть до и во время Северного похода, 7-я Стальная армия по-прежнему представляла значительную угрозу власти Старого Гуанси в провинции, несмотря на их полное изгнание в соседний Гуйчжоу. Действуя сродни собственному сопернику внутри остатков Гоминьдана в Гуйчжоу, они в значительной степени действовали самостоятельно, часто совершая рейды на Байсэ и экспериментируя со своей моделью гражданина-солдата.\n\nХотя обычно их держат на относительно сдержанном поводке из-за страха, что губернатор Тан Цзияо из Юньнани наконец сокрушит их администрацию в Гуйчжоу, похоже, что верный губернатор закрыл глаза на похождения Нового Гуанси через границу. В сочетании с тем, что Гоминьдан, по-видимому, жаждет избавиться от своей «проблемы», Ли-Бай и Два Хуана (Шаосюн и Сюйчу) стали смелее в своих попытках захватить Гуанси, удвоив усилия на Западе. Поскольку недовольство текущим статус-кво в Лянгуане еще больше помогает их усилиям, Новому Гуанси даже удалось завоевать некоторые симпатии в самой столице."
 GXC.introgame.062.a: "Упрямый просроченный революционер вряд ли является приоритетом."
 GXC.introgame.062.b: "Сокрушить банды Ли и отправить послание губернатору Тану."

 GXC.introgame.065.t: "Наши южные соседи"
 GXC.introgame.065.d: "Губернатора Чжао часто определяют по его друзьям на Севере, однако, несмотря на это, он поддерживает важные связи с теми, кто находится в двух Гуанах, хотя его связи с Гуанси ослабли со смертью Лу Жунтина. В Гуандуне, однако, есть его старый союзник Чэнь Цзюнмин. Во время краткого пребывания Чэня у власти в Гуандуне в качестве губернатора двое мужчин работали вместе над проектом федералистов, пытаясь договориться об объединении с У Пэйфу. После Северного похода губернатор Чжао решил не присоединяться к Великому республиканскому альянсу Чэня из-за его подпольного характера, но много раз выступал в его пользу изнутри Чжили.\n\nНесмотря на то, что у Хунани и ее губернатора были старые друзья на юге, они не всегда ладили с двумя Гуанами. Из-за положения Хунани между Гуанчжоу и Пекином любой конфликт между севером и югом неизбежно охватил бы Хунань пламенем войны, причем Северный поход был самым последним примером.\n\nОднако ход истории, похоже, отворачивается от Чжили: Сунь Чуаньфан недееспособен, а Лига втянута в войну, Хунани нужны союзники и друзья. Чэнь Цзюнмин, который использует хаос на юге, чтобы вернуть власть, — это именно тот друг, который может понадобиться Хунани. Человек, который верит в переговоры с Севером, и такой же федералист, как губернатор Чжао, Чэнь — наш лучший вариант, чтобы предотвратить повторное погружение Хунани в войну. Это, конечно, при условии, что Чжао сможет убедить Ассамблею выделить средства на такое внепровинциальное дело.\n\nОднако есть и другая проблема: небольшие очаги контроля Гоминьдана разрастаются из-за местной поддержки и их отказа уважать границы провинций. Эти очаги используются для переправки войск и оружия из Миньганя и Гуйчжоу в Лянгуан. Хотя это и не вредит нам напрямую, возможно, лучше всего использовать эти средства для искоренения Гоминьдана в этих регионах вместо поддержки Чэня, учитывая личную неприязнь губернатора Чжао к Гоминьдану."
 GXC.introgame.065.a: "Мы должны отправить нашу поддержку Чэню ради безопасности Хунани."
 GXC.introgame.065.b: "Нам нужно сосредоточиться на себе, пусть Юг сам разбирается."
 GXC.introgame.065.c: "Доктрина Монро существует не просто так."

 GXC.introgame.066.t: "Хунань помогает возрождению федералистов?"
 GXC.introgame.066.d: "В начале 1920-х годов федералисты Чэнь Цзюнмин и Чжао Хэнти работали вместе как союзники. Однако с изгнанием Чэня из Гуандуна и Северным походом союз заметно охладел, и Чжао отказался открыто поддержать Великий республиканский альянс Чэня из-за страха перед репрессиями Чжили.\n\nОднако с отменой выборов 1933 года Чжао обнаружил, что сближается со своими идеологическими союзниками на Юге. Чжао Хэнти и Чэнь Цзюнмин поддерживали тайные, но все более открытые каналы связи друг с другом, и по мере роста напряженности на юге Чжао отправил ресурсы Чэню, чтобы помочь ему в его попытках обеспечить Лянгуан для движения федералистов."
 GXC.introgame.066.a: "Чэнь отправляет телеграмму Чжао, чтобы поблагодарить его за помощь."
 GXC.introgame.066.b: "К сожалению для Чэня, бандиты захватили это оружие до того, как оно смогло добраться до него."

 GXC.introgame.067.t: "Контрабандные операции Гоминьдана в Хунани"
 GXC.introgame.067.d: "Официальный губернатор Хунани Чжао Хэнти поддерживал Чжили и лично связан с движением федералистов. Несмотря на это и проигрыш Гоминьдана в Северном походе, повстанческие ячейки и сочувствующие фигуры сохраняют контроль над горсткой уездов в южной части Хунани.\n\nИменно через эти уезды, особенно с помощью восстания Миньгань, Гоминьдан может переправлять оружие и людей из Гуйчжоу, Фуцзяни и Цзянси в два Гуана. Их надежда ясна: они хотят взять под контроль самые северные части двух провинций и использовать это как плацдарм на юг."
 GXC.introgame.067.a: "И через эти тропы создается северная база."
 GXC.introgame.067.b: "Припасы остановлены на границе и конфискованы у контрабандистов."

 GXC.introgame.070.t: "Чэнь Миншу запрашивает средства"
 GXC.introgame.070.d: "Гуандун долгое время был колыбелью революции Гоминьдана и, таким образом, выступал столицей для различных революционных правительств, многие из которых возглавлял почитаемый отец нации, сам Сунь Ятсен. Как таковая, потеря такого символического города нанесла тяжелый удар по нашим амбициям по освобождению Китая, но эта новая волна хаоса на Юге может стать нашим вторым дыханием в регионе.\n\nДаже после фиаско Северного похода и раскола ГМД Гуандун все еще выступает как очаг революционного пыла. Сельские ячейки ГМД и КСП продолжают саботировать инфраструктуру милитаристов и давать отпор местным властям. Точно так же различные профсоюзы в городе и его портах были инфильтрированы синдикалистскими агитаторами. За пределами городских центров Гуанчжоу Пэн Пай сплотил крестьянские группы на революционное дело. Тем временем в Миньгане генерал Чэнь Миншу, командир 10-й дивизии НРА, интенсивно выступает за возвращение своей родной провинции.\n\nСвоего рода политический диссидент, Чэнь верен в первую очередь левому крылу ГМД, находя союзников во Временном комитете действий, возглавляемом Дэн Яньда и Сун Цинлин. Однако Чэнь также имеет связи с Кликой Индии и Ли Цзишэнем из-за сильных братских уз 4-й армии, офицеры которой все родом из Гуандуна.\n\nОднако в последнее время Чэнь Миншу стал более непреклонным в своих требованиях отправиться на юг, и до верховного командования дошли отчеты о его предстоящем отбытии в Гуандун в ближайшие дни. Для такого предприятия члены штаба Чэня вместе с самим Чэнем запросили средства у Центрального комитета вместе с разрешением реквизировать некоторое количество огнестрельного оружия из провинциальных запасов для его подразделений. Однако недавнее начало нашей кампании против реакционных элементов на Севере сделало нашу способность помочь генералу Чэню в лучшем случае шаткой, а в худшем — совершенно невозможной, но мяч, безусловно, на нашей стороне, и выбор только за нами."
 GXC.introgame.070.a: "Генерал Чэнь вернет революционную колыбель!"
 GXC.introgame.070.b: "Мы желаем ему удачи, но наши руки связаны."

 GXC.introgame.071.t: "Миньгань укрепляет свой южный фланг"
 GXC.introgame.071.d: "С момента Шанхайского восстания 1932 года и дальнейшего отступления Гоминьдана из городских центров Китая в предгорья Цзянси и Фуцзяни генералы истеблишмента Лянгуана и Китая в целом считали их истощенной силой. Но почти десятилетие партизанской войны и сельской агитации доказали, что милитаристы ошибались. С крахом Лиги остатки Гоминьдана в Гуандуне, родной провинции революции ГМД, стали только смелее в своих ударах.\n\nЗа последние несколько дней региональные гарнизоны Мэйчжоу и Шаогуаня заметили, что Чэнь Миншу, главный командир Гоминьдана на границе Гуандуна и Фуцзяни, готовится мобилизовать своих людей для штурма в направлении Гуанчжоу. Естественно, эта новость распространилась на юг, проникая как на тихие холмы, так и на шумные улицы Гуандуна. Это предвещает дальнейшие проблемы для шаткой гегемонии, которая удерживала две провинции, поскольку агенты ГМД сплотились на дело, вступая в столкновения с местными властями и готовясь к прибытию ГМД. В Гуанчжоу мэр Чэнь Ляньбо приказал более тщательно патрулировать окраины города, а офицеры армии Шэнь Хунъина проводят инвентаризацию своего оружия, готовясь пережить надвигающуюся бурю."
 GXC.introgame.071.a: "Чэнь Миншу готовит своих людей..."
 GXC.introgame.071.b: "...но мы будем готовы к его следующему шагу!"

 GXC.introgame.075.t: "Гоминьдан получает подкрепление"
 GXC.introgame.075.d: "Сильно высмеиваемый большинством обладателей власти в Китае и когда-то считавшийся не более чем изгнанниками, томящимися в Париже и Москве, наряду с упрямыми партизанами, ведущими бесполезную войну насмерть против все медленнее затягивающейся петли кампаний по окружению, по крайней мере в Миньгане, Гоминьдан, похоже, нашел свою возможность. Поставив все на карту в смелой стратегии «сейчас или никогда», они подтолкнули свои молодые подразделения к пределу, мотивированные революционной яростью и чистым упорством ради лучшего Китая. Рейды в Гуанси, организованные Ли Цзунжэнем и его 7-й армией, проводились совместно с рейдами из Миньганя, главным образом под руководством Чэнь Миншу при поддержке Тан Шэнчжи в Хунани.\n\nУдваивая свои усилия в регионах Лянгуана, которые они контролируют, призыв к действию прозвучал правдиво для их солдат и мучеников. Со знаменами, развевающимися на ветру, ружьями на плечах, саблями на поясе, кровь революции пылает, как дикий прилив. Получив обширную поддержку, они подготовились к последней дерзкой операции по обеспечению безопасности места рождения революции. Будущие битвы отброшены в сторону, Национально-революционная армия следует по тропе войны своих предшественников десятилетней давности."
 GXC.introgame.075.a: "Поднимите знамя Белого Солнца!"

 GXC.introgame.076.t: "Федералисты получают подкрепление"
 GXC.introgame.076.d: "Некогда считавшееся пережитком прошлого, отброшенным в свете побед Чжили и Фэнтяня, наряду с ростом доминирующего Гоминьдана, дело федералистов в Гуандуне оставалось скрытым течением, поддерживаемым страстными интеллектуалами и джентри. Поддерживая, по крайней мере номинально, союзные силы в Восточном Гуандуне, их единственными настоящими союзниками были те немногие голоса в городских центрах, наряду с губернаторами Тан Цзияо и Чжао Хэнти. Но эти связи окажутся полезными в самый подходящий момент. Армии Юэ удалось отбить все сопротивление, укрепив свою хватку в Двух провинциях.\n\nПолучив поддержку от своих бывших союзников в соседних провинциях, они удвоили свои усилия и укрепили свой контроль. С изобилующей уверенностью, высоким моральным духом и снабженными людьми, большинству было очевидно, что дело федералистов находится на подъеме, возможно, даже на взлете.\n\nРассматривая свои варианты, стало ясно, что время использовать преимущество против оппозиции настало. Установив коммюнике с союзными силами за пределами региона, Чэнь Цзюнмин, Е Цзюй, Ма Юйхан и другие начали наступление против Гоминьдана и сил Старого Бэйяна, стремясь вытеснить их раз и навсегда."
 GXC.introgame.076.a: "Гуанси для гуансийцев! Гуандун для гуандунцев!"

 GXC.introgame.077.t: "Истеблишмент получает подкрепление"
 GXC.introgame.077.d: "Долгое время являясь устойчивыми правителями региона, силы истеблишмента Бэйяна (свободно сгруппированные вокруг Старой клики Гуандуна и Старой клики Гуанси) сумели отбить все сопротивление и укрепить свои нынешние позиции в Двух провинциях. Получив поддержку от своих бывших союзников в Пекине и других местах, они смогли удвоить свои усилия, чтобы укрепить свой контроль и преодолеть лоскутную систему правления, которую они установили. С изобилующей уверенностью, высоким моральным духом и снабженными людьми, большинству было очевидно, что Старые клики находятся на подъеме, возможно, даже на взлете.\n\nРассматривая свои варианты, стало ясно, что время использовать преимущество против оппозиции настало. Установив коммюнике с силами Чжили за пределами региона, Лу Юйгуан, Ма Цзи, Шэнь Хунъин, Чэнь Ляньбо и все другие номинальные подчиненные получили официальное одобрение на наступление против Гоминьдана и сил Старых федералистов, стремясь вытеснить их раз и навсегда."
 GXC.introgame.077.a: "Стабильность и реформы, а не радикализм и революция!"

 GXC.introgame.080.t: "Наши усилия в Лянгуане подавлены"
 GXC.introgame.080.d: "Несмотря на значительные инвестиции от имени [ROOT.GetLeader], похоже, что наша авантюра в борьбе за власть в Лянгуане в конечном итоге оказалась напрасной. Потерянные в миазмах милитаристов, как крупных, так и мелких, наши деньги и припасы оказались не в тех руках или вообще едва покинули наши территориальные границы! Поскольку наши усилия были отвергнуты, потребуется значительное время для перегруппировки, и в конечном итоге многие в администрации охладели к участию в делах Гуанси или Гуандуна, по крайней мере, в ближайшем будущем."
 GXC.introgame.080.a: "Пусть они сражаются между собой."

 #Political Tree Events (100-149):
 GXC.introgame.100.t: "Общее будущее для двух Гуанов"
 GXC.introgame.100.d: "Лянгуан сегодня может быть разделен и полон обид, но у него значительная общая история. Наместничество Лянгуан, что буквально переводится как Два Гуана (Гуандун означает Восточный Гуан, Гуанси означает Западный Гуан), было впервые создано в 1452 году императором Цзинтай династии Мин. Обе провинции свергли цинского наместника в ходе Синьхайской революции 1911 года, но в последующие годы разные фракции пытались доминировать в регионе.\n\nСтарая клика Гуанси под руководством губернатора Лу Жунтина из Гуанси, работая с губернатором Гуандуна Цэнь Чуньсюанем, связанным с Кликой политической науки, доминировала в Правительстве защиты конституции после изгнания бэйянского губернатора Лун Цзигуана и оттеснения Сунь Ятсена. Они, в свою очередь, попытались вести переговоры с Бэйяном, но плохое поведение их войск и угасающая политическая поддержка дали возможность Чэнь Цзюнмину и другим офицерам армии Гуандуна собрать армию в Фуцзяни и изгнать хунту, вернув Сунь Ятсена к власти.\n\nЭто привело к двум Гуандун-Гуансийским войнам, которые Гуанси проиграла. Затем два лидера Гуандуна поссорились, заставив их отступить, но в вакууме власти возникла хунта Новой клики Гуанси, ориентированная на Гуанчжоу. После провала Северного похода милитаристы Старого Гуанси, работающие с Чжили, доминировали в Лянгуане, но боролись между собой за власть. В ходе особенно красочного инцидента в 1932 году Лу Жунтин приказал импровизированным бомбардировщикам атаковать силы Шэнь Хунъина в Гуандуне. Тем временем оставшиеся гуандунские милитаристы и Ассамблея провинции Гуандун сплотились вокруг мэра Чэнь Ляньбо в Гуанчжоу.\n\nЛу Жунтин обеспечил свою гегемонию над Лянгуаном в 1932 году, причем Пекин, Наньнин и Гуанчжоу признали его положение наместника. С его смертью в 1934 году бразды правления взяли его менее компетентные сыновья. И теперь Лянгуан разделен и полон обид, и многие ждут своего шанса захватить его будущее."
 GXC.introgame.100.a: "Будущее принадлежит наследникам Лу Жунтина!"
 GXC.introgame.100.b: "Революция Сунь Ятсена продолжает гореть ярко!"
 GXC.introgame.100.c: "Пришло время Чэнь Цзюнмину получить честный шанс на правление."

 #Fluid Phase Events (150-199):
 GXC.introgame.150.t: "Лянгуан скатывается в гражданскую войну"
 GXC.introgame.150.d: "С Гуанчжоу в огне и новостями о кризисе, быстро распространяющимися вверх и вниз по реке, Лянгуан снова был ввергнут в анархию. Войска мобилизуются, и собирается ополчение, поскольку три основные коалиции — Националисты, Федералисты и Регионалисты — готовятся к битве. С глубокими личными связями, которые соединяют различные фигуры в Лянгуане, ожидаются дезертирства, но с глубоким идеологическим расколом между ними компромисс невозможен.\n\nЛянгуану не привыкать к политической раздробленности, но после последних нескольких лет относительной стабильности никто не желает возвращаться к состоянию длительного конфликта. Поэтому ожидается, что боевые действия будут текучими и хаотичными. Импульс будет иметь важное значение, так как местные командиры, вероятно, перейдут на сторону победителя поблизости, что будет нарастать в региональном масштабе по взаимосвязанным провинциям."
 GXC.introgame.150.a: "Пусть победа придет скоро."
 GXC.introgame.150_tt: "§YКаждый месяц регионы, в которых частично доминирует одна сторона, будут консолидироваться в ее пользу, а полностью контролируемые регионы будут помогать в обеспечении безопасности своих родных провинций. §rНеспособность полностью обезопасить Лянгуан в течение шести месяцев повлечет за собой штрафы§!, и война закончится так или иначе через восемь месяцев.§!"

 GXC.introgame.160.t.KMT: "Силы Гоминьдана выступают из Гуандуна"
 GXC.introgame.160.t.UPC: "Силы федералистов выступают из Гуандуна"
 GXC.introgame.160.t.NPA: "Силы регионалистов выступают из Гуандуна"
 GXC.introgame.160.d.KMT: "Принеся свою революцию в Гуандун, Гоминьдан собрал свои армии, чтобы идти вверх по реке в Гуанси. В то время как их основные силы двинулись к крупным населенным пунктам, таким как Наньнин и Гуйлинь, более мелкие подразделения рассредоточились по сельской местности, чтобы обеспечить капитуляцию колеблющихся гарнизонов и соединиться с лоялистскими ячейками, которые восстали на фоне разгрома. Война может закончиться или не закончиться этим наступлением, однако это тем не менее серьезный удар по соперникам Гоминьдана."
 GXC.introgame.160.d.UPC: "Освободив Гуандун от господства Гуанси, федералисты собрали свои армии, чтобы идти вверх по реке в Гуанси. В то время как их основные силы двинулись к крупным населенным пунктам, таким как Наньнин и Гуйлинь, более мелкие подразделения рассредоточились по сельской местности, чтобы обеспечить капитуляцию колеблющихся гарнизонов и соединиться с лоялистскими ячейками, которые восстали на фоне разгрома. Война может закончиться или не закончиться этим наступлением, однако это тем не менее серьезный удар по соперникам федералистов."
 GXC.introgame.160.d.NPA: "Подчинив Гуандун своей пяте, регионалисты собрали свои армии, чтобы идти вверх по реке в Гуанси. В то время как их основные силы двинулись к крупным населенным пунктам, таким как Наньнин и Гуйлинь, более мелкие подразделения рассредоточились по сельской местности, чтобы обеспечить капитуляцию колеблющихся гарнизонов и соединиться с лоялистскими ячейками, которые восстали на фоне разгрома. Война может закончиться или не закончиться этим наступлением, однако это тем не менее серьезный удар по их соперникам."
 GXC.introgame.160.a: "Мы несем революцию в Гуанси!"
 GXC.introgame.160.b: "Гуанси будет освобожден нашими действиями!"
 GXC.introgame.160.c: "Мы подкрепляем наших товарищей в Гуанси!"
 GXC.introgame.160_tt: "§YЭто произошло из-за полного контроля этой стороны над всеми регионами Гуандуна.§!"

 GXC.introgame.161.t.KMT: "Силы Гоминьдана продвигаются в Гуанчжоу"
 GXC.introgame.161.t.UPC: "Силы федералистов продвигаются в Гуанчжоу"
 GXC.introgame.161.t.NPA: "Силы регионалистов продвигаются в Гуанчжоу"
 GXC.introgame.161.d.KMT: "Обезопасив отдаленные районы Гуандуна, Гоминьдан почувствовал смелость ударить прямо в сердце провинции Гуандун: город Гуанчжоу. Хотя у них уже были лоялисты в этом районе с разной степенью контроля над местными районами и кварталами, их продвижение подняло боевой дух и ослабило боевой дух их противников. Ожидается, что бои продолжатся, но победа в Гуанчжоу будет решающей в битве за провинцию."
 GXC.introgame.161.d.UPC: "Обезопасив отдаленные районы Гуандуна, федералисты почувствовали смелость ударить прямо в сердце провинции Гуандун: город Гуанчжоу. Хотя у них уже были лоялисты в этом районе с разной степенью контроля над местными районами и кварталами, их продвижение подняло боевой дух и ослабило боевой дух их противников. Ожидается, что бои продолжатся, но победа в Гуанчжоу будет решающей в битве за провинцию."
 GXC.introgame.161.d.NPA: "Обезопасив отдаленные районы Гуандуна, регионалисты почувствовали смелость ударить прямо в сердце провинции Гуандун: город Гуанчжоу. Хотя у них уже были лоялисты в этом районе с разной степенью контроля над местными районами и кварталами, их продвижение подняло боевой дух и ослабило боевой дух их противников. Ожидается, что бои продолжатся, но победа в Гуанчжоу будет решающей в битве за провинцию."
 GXC.introgame.161.a: "Мы возвращаем место рождения нашей революции!"
 GXC.introgame.161.b: "Гуанчжоу скоро будет нашим!"
 GXC.introgame.161.c: "Мы возвращаем порядок в город!"
 GXC.introgame.161_tt_one: "§YЭто произошло из-за контроля этой стороны над Шаогуанем или Хайкоу.§!"
 GXC.introgame.161_tt_two: "§YЭто произошло из-за контроля этой стороны над Шаогуанем и Хайкоу.§!"

 GXC.introgame.162.t.KMT: "Силы Гоминьдана движутся в сельскую местность Гуандуна"
 GXC.introgame.162.t.UPC: "Силы федералистов движутся в сельскую местность Гуандуна"
 GXC.introgame.162.t.NPA: "Силы регионалистов движутся в сельскую местность Гуандуна"
 GXC.introgame.162.d.KMT: "Захватив столицу Гуанчжоу и ее отдаленные уезды, Гоминьдан смог реорганизовать и дать отдых своим войскам, что дало им значительное преимущество в борьбе за провинцию Гуандун. Следующим шагом была работа по обеспечению безопасности остальной части провинции, переброска войск из Гуанчжоу в сельскую местность, чтобы помочь переломить ход событий в свою пользу. Простой контроль над столицей никогда не является гарантией контроля над провинцией, но это, безусловно, положительный знак."
 GXC.introgame.162.d.UPC: "Захватив столицу Гуанчжоу и ее отдаленные уезды, федералисты смогли реорганизовать и дать отдых своим войскам, что дало им значительное преимущество в борьбе за провинцию Гуандун. Следующим шагом была работа по обеспечению безопасности остальной части провинции, переброска войск из Гуанчжоу в сельскую местность, чтобы помочь переломить ход событий в свою пользу. Простой контроль над столицей никогда не является гарантией контроля над провинцией, но это, безусловно, положительный знак."
 GXC.introgame.162.d.NPA: "Захватив столицу Гуанчжоу и ее отдаленные уезды, регионалисты смогли реорганизовать и дать отдых своим войскам, что дало им значительное преимущество в борьбе за провинцию Гуандун. Следующим шагом была работа по обеспечению безопасности остальной части провинции, переброска войск из Гуанчжоу в сельскую местность, чтобы помочь переломить ход событий в свою пользу. Простой контроль над столицей никогда не является гарантией контроля над провинцией, но это, безусловно, положительный знак."
 GXC.introgame.162.a: "Мы маршируем из города на поля!"
 GXC.introgame.162.b: "Наша база теперь в безопасности, мы подкрепляем наших союзников-джентри!"
 GXC.introgame.162.c: "Город наш, и провинция скоро будет нашей!"
 GXC.introgame.162_tt: "§YЭто произошло из-за контроля этой стороны над Гуанчжоу.§!"

 GXC.introgame.163.t.KMT: "Силы Гоминьдана добиваются случайных успехов в Гуандуне"
 GXC.introgame.163.t.UPC: "Силы федералистов добиваются случайных успехов в Гуандуне"
 GXC.introgame.163.t.NPA: "Силы регионалистов добиваются случайных успехов в Гуандуне"
 GXC.introgame.163.d.KMT: "Поскольку боевые действия пересекают провинцию, битва за Гуандун оказалась изменчивой. Вооруженные отряды ополченцев, наемников и повстанцев сражаются за контроль над местными деревушками и селами, в то время как более крупные подразделения обученных солдат (и то, что в наши дни сходит за регулярные войска) сражаются за города и основные дороги. Маленькие, непредсказуемые преимущества медленно накапливаются: блестящий младший офицер здесь, удачная засада там, бесстрашная оборона в другом месте. Их имена никогда не попадут в учебники истории — некоторые даже не запомнятся как местные легенды, — но эти храбрые, безымянные мужчины и женщины могут решать судьбы наций. Революция Гоминьдана оказалась бенефициаром этой случайности среди тумана войны, завоевывая позиции ценой крови своих мучеников."
 GXC.introgame.163.d.UPC: "Поскольку боевые действия пересекают провинцию, битва за Гуандун оказалась изменчивой. Вооруженные отряды ополченцев, наемников и повстанцев сражаются за контроль над местными деревушками и селами, в то время как более крупные подразделения обученных солдат (и то, что в наши дни сходит за регулярные войска) сражаются за города и основные дороги. Маленькие, непредсказуемые преимущества медленно накапливаются: блестящий младший офицер здесь, удачная засада там, бесстрашная оборона в другом месте. Их имена никогда не попадут в учебники истории — некоторые даже не запомнятся как местные легенды, — но эти храбрые, безымянные мужчины и женщины могут решать судьбы наций. Федералистское движение оказалось бенефициаром этой случайности среди тумана войны, завоевывая позиции ценой крови своих мучеников."
 GXC.introgame.163.d.NPA: "Поскольку боевые действия пересекают провинцию, битва за Гуандун оказалась изменчивой. Вооруженные отряды ополченцев, наемников и повстанцев сражаются за контроль над местными деревушками и селами, в то время как более крупные подразделения обученных солдат (и то, что в наши дни сходит за регулярные войска) сражаются за города и основные дороги. Маленькие, непредсказуемые преимущества медленно накапливаются: блестящий младший офицер здесь, удачная засада там, бесстрашная оборона в другом месте. Их имена никогда не попадут в учебники истории — некоторые даже не запомнятся как местные легенды, — но эти храбрые, безымянные мужчины и женщины могут решать судьбы наций. Коалиция регионалистов оказалась бенефициаром этой случайности среди тумана войны, завоевывая позиции ценой крови своих мучеников."
 GXC.introgame.163.a: "Герои революции, мы дерзаем умереть!"
 GXC.introgame.163.b: "Чемпионы демократии, мы сражаемся за свободу!"
 GXC.introgame.163.c: "Защитники порядка, мы защищаем наши земли!"
 GXC.introgame.163_tt: "§YЭто произошло, потому что ни одна сторона не имела явного преимущества — либо ни одна сторона полностью не контролировала регион в Гуандуне, либо две разные стороны контролировали его.§!"

 GXC.introgame.164.t.KMT: "Силы Гоминьдана выступают из Гуанси"
 GXC.introgame.164.t.UPC: "Силы федералистов выступают из Гуанси"
 GXC.introgame.164.t.NPA: "Силы регионалистов выступают из Гуанси"
 GXC.introgame.164.d.KMT: "Революционеры Гоминьдана захватили контроль над Гуанси, подняв свое знамя над Наньнином и приведя остальную часть провинции к подчинению. Это позволило им организовать крупное наступление вниз по течению в Гуандун, делая ходы по основным целям, таким как Гуанчжоу, Шаогуань и Хайкоу. Их успехи сплотили их союзников в провинции, а также убедили многих мелких милитаристов и их людей перебежать на их сторону. Это может быть не последнее наступление войны, но, вероятно, оно будет решающим."
 GXC.introgame.164.d.UPC: "Федералистские милитаристы захватили контроль над Гуанси, подняв свое знамя над Наньнином и приведя остальную часть провинции к подчинению. Это позволило им организовать крупное наступление вниз по течению в Гуандун, делая ходы по основным целям, таким как Гуанчжоу, Шаогуань и Хайкоу. Их успехи сплотили их союзников в провинции, а также убедили многих мелких милитаристов и их людей перебежать на их сторону. Это может быть не последнее наступление войны, но, вероятно, оно будет решающим."
 GXC.introgame.164.d.NPA: "Старая клика Гуанси сохранила контроль над Гуанси, подняв свое знамя над Наньнином и приведя остальную часть провинции к подчинению. Это позволило им организовать крупное наступление вниз по течению в Гуандун, делая ходы по основным целям, таким как Гуанчжоу, Шаогуань и Хайкоу. Их успехи сплотили их союзников в провинции, а также убедили многих мелких милитаристов и их людей перебежать на их сторону. Это может быть не последнее наступление войны, но, вероятно, оно будет решающим."
 GXC.introgame.164.a: "Вперед, товарищи, в Гуандун!"
 GXC.introgame.164.b: "Гуанси сегодня, Гуандун завтра!"
 GXC.introgame.164.c: "Наш тыл в безопасности, мы идем вперед!"
 GXC.introgame.164_tt: "§YЭто произошло из-за полного контроля этой стороны над всеми регионами Гуанси.§!"

 GXC.introgame.165.t.KMT: "Силы Гоминьдана продвигаются в Наньнин"
 GXC.introgame.165.t.UPC: "Силы федералистов продвигаются в Наньнин"
 GXC.introgame.165.t.NPA: "Силы регионалистов продвигаются в Наньнин"
 GXC.introgame.165.d.KMT: "Обезопасив крупные отдаленные районы в Гуанси, Гоминьдан начал готовить почву для осады в центре провинции: города Наньнин. Реорганизуя свои войска и получая отчеты от шпионов в городе, их авангард уже начал продвигаться к столице провинции. Их неуклонное продвижение, вероятно, встретит сопротивление, но для многих победа уже кажется близкой. И победа в Наньнине вполне может означать победу над всем Лянгуаном в конечном итоге."
 GXC.introgame.165.d.UPC: "Обезопасив крупные отдаленные районы в Гуанси, федералисты начали готовить почву для осады в центре провинции: города Наньнин. Реорганизуя свои войска и получая отчеты от шпионов в городе, их авангард уже начал продвигаться к столице провинции. Их неуклонное продвижение, вероятно, встретит сопротивление, но для многих победа уже кажется близкой. И победа в Наньнине вполне может означать победу над всем Лянгуаном в конечном итоге."
 GXC.introgame.165.d.NPA: "Обезопасив крупные отдаленные районы в Гуанси, Старая клика Гуанси начала готовить почву для осады в центре провинции: города Наньнин. Реорганизуя свои войска и получая отчеты от шпионов в городе, их авангард уже начал продвигаться к столице провинции. Их неуклонное продвижение, вероятно, встретит сопротивление, но для многих победа уже кажется близкой. И победа в Наньнине вполне может означать победу над всем Лянгуаном в конечном итоге."
 GXC.introgame.165.a: "Мы идем на Наньнин!"
 GXC.introgame.165.b: "Мы наконец возвращаемся в Наньнин!"
 GXC.introgame.165.c: "Наньнин наш и всегда будет нашим!"
 GXC.introgame.165_tt_one: "§YЭто произошло из-за контроля этой стороны над Байсэ или Гуйлинем.§!"
 GXC.introgame.165_tt_two: "§YЭто произошло из-за контроля этой стороны над Байсэ и Гуйлинем.§!"

 GXC.introgame.166.t.KMT: "Силы Гоминьдана движутся в сельскую местность Гуанси"
 GXC.introgame.166.t.UPC: "Силы федералистов движутся в сельскую местность Гуанси"
 GXC.introgame.166.t.NPA: "Силы регионалистов движутся в сельскую местность Гуанси"
 GXC.introgame.166.d.KMT: "Падение Наньнина и его ближайших окрестностей дало Гоминьдану крупную стратегическую базу для работы по завоеванию Гуанси. Крупный логистический центр, населенный пункт, а также дом арсенала и военной академии Гуанси, полный контроль над этим районом даст им доминирующее положение над остальной частью провинции. Кроме того, контроль над столицей провинции оказался крупной политической победой — чистым признаком того, кто побеждает в Гуанси. Хотя война продолжится на окраинах и в отдаленных городах, победа здесь, вероятно, является предвестником того, что будет дальше."
 GXC.introgame.166.d.UPC: "Падение Наньнина и его ближайших окрестностей дало федералистам крупную стратегическую базу для работы по завоеванию Гуанси. Крупный логистический центр, населенный пункт, а также дом арсенала и военной академии Гуанси, полный контроль над этим районом даст им доминирующее положение над остальной частью провинции. Кроме того, контроль над столицей провинции оказался крупной политической победой — чистым признаком того, кто побеждает в Гуанси. Хотя война продолжится на окраинах и в отдаленных городах, победа здесь, вероятно, является предвестником того, что будет дальше."
 GXC.introgame.166.d.NPA: "Падение Наньнина и его ближайших окрестностей дало Старой клике Гуанси крупную стратегическую базу для работы по завоеванию Гуанси. Крупный логистический центр, населенный пункт, а также дом арсенала и военной академии Гуанси, полный контроль над этим районом даст им доминирующее положение над остальной частью провинции. Кроме того, контроль над столицей провинции оказался крупной политической победой — чистым признаком того, кто побеждает в Гуанси. Хотя война продолжится на окраинах и в отдаленных городах, победа здесь, вероятно, является предвестником того, что будет дальше."
 GXC.introgame.166.a: "Наши революционные патриоты освобождают фермы и поля!"
 GXC.introgame.166.b: "Медленно, но верно мы освободим землю."
 GXC.introgame.166.c: "Мы вскоре восстановим контроль над сельской местностью."
 GXC.introgame.166_tt: "§YЭто произошло из-за контроля этой стороны над Наньнином.§!"

 GXC.introgame.167.t.KMT: "Силы Гоминьдана добиваются случайных успехов в Гуанси"
 GXC.introgame.167.t.UPC: "Силы федералистов добиваются случайных успехов в Гуанси"
 GXC.introgame.167.t.NPA: "Силы регионалистов добиваются случайных успехов в Гуанси"
