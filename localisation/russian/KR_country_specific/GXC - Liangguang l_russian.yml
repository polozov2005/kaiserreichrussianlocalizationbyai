 GXC_GIMA_party: "АПЗП"
 GXC_GIMA_party_long: "$GXC_GIMA_party_long_tt$\n§LАссоциация поддержки зерновой промышленности была создана местными шэньши Хайфэна в ответ на рост Всеобщей ассоциации крестьян уезда Хайфэн с целью защиты своих земельных интересов и противодействия крестьянской организации. Ассоциация прошла через несколько итераций за свою историю, неоднократно распускалась и реформировалась по мере того, как менялись политические ветры Гуандуна. Она была распущена, когда ее первый председатель Чэнь Юэбо бежал в Гонконг перед лицом неблагоприятных политических условий, и снова, когда Чэнь Цзюнмин был вытеснен из Гуандуна Гоминьданом.\n\nКогда Северный поход захлебнулся, а Хайфэн перешел под контроль Е Цзюя, ассоциация была реформирована под председательством Цю Цзинъюня. Поскольку многие ее члены имеют тесные связи и даже родственные отношения с Чэнь Цзюнмином, ассоциация возобновила свою политическую поддержку Чэня в Провинциальной ассамблее, а также помогла его союзнику Е Цзюю в искоренении остатков Ассоциации крестьян в Хайфэне.§!\n"
 GXC_GIMA_party_long_tt: "Ассоциация поддержки зерновой промышленности (Лянъе Вэйчи Хуэй)"

