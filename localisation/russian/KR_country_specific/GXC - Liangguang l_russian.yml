 GXC_KR_gathering_storm_desc: "Наследник наследия правительства Гуанчжоу, маршал Лу Юйгуан оказывается на перекрестке судьбы. Хотя его Старая клика Гуанси является хозяином Гуанси и Гуандуна, приемный сын Лу Жунтина находит свой режим под давлением со всех сторон. С востока федералисты и недовольные кантонские элементы стремятся положить конец десятилетию доминирования Гуанси. С запада Гоминьдан готов восстановить националистический контроль над Югом. Выдержит ли Молодой маршал Юга грядущую бурю, или он будет поглощен приливами Революции и Федерализма?"

 GXC_country_intro_background: "GFX_GXC_intro"
 GXC_country_intro_header: "§RThe Hotbed of Revolution§!"
 GXC_country_intro_content: "Long the champion of anti-Northerner influence within the nation, the Pearl River Delta's history in the Warlord Era is marred by revolt, struggle, banditry, and revolution. With a looming anti-Qing struggle occurring within the region since the end of the §YTaiping Heavenly Rebellion§!, the Pearl of the South is naturally home to many of China's present day great revolutionaries. Forming revolutionary groups such as the §lTongmenghui§! and other likeminded revolutionaries, Liangguang (referring to the joint region of §YGuangxi§! and §YGuangdong§!) had its own precursor uprisings before §lXinhai§! such as the §lSecond Guangzhou Uprising§!. These groups finally played their part in the §lXinhai Revolution§! as a republican stronghold. With the seizure of Guangdong by §lChen Jiongming§! and §aHu Hanmin§!, and §YGuangxi§! by §PLu Rongting§!, the region would remain steadfast in the hands of the Republicans. With the declaration of the §YSecond Revolution§!, and its ultimate failure, §aHu Hanmin§! was ousted as Governor, and replaced by §lChen§!, only for him to be ousted similarly and replaced by §PYuan§! Loyalist §PLong Jiguang§!.\n\nWith the onslaught of the §lNational Protection War§!, §YGuangxi§! tepidly announced their support after the §aHuguojun§! saw initial outstanding successes, and marched into §YGuangdong§! to depose the §PYuan§! loyalists. After a brief interim Southern Government hosted by National Protection leaders such as §SLiang Qichao§!, §mLi Genyuan§!, §aCen Chunxuan§!, and others, the §POld Guangxi Clique§! effectively united §YLiangguang§! under their dominion, at least on paper. With the chaos of the Warlord Era now in full swing, §eBeiyang§! infighting would see the proclamation of the §aConstitutional Protection Government§! in 1917, with its capital in §YGuangzhou§!. Led by the legendary §aSun Yat-sen§!, it included the likes of §lChen Jiongming§!, §cXu Chongzhi§!, §aTang Jiyao§!, §PLu Rongting§!, §lTang Shaoyi§!, §aHu Hanmin§!, §cLi Liejun§!, and numerous others. Eventually being hijacked and ousting §aSun§!, the §aConstitutional Protection Government§! attempted peace talks with the North.\n\nHaving been driven into §YFujian§!, §lChen Jiongming§! and §cXu Chongzhi§! initiated the §lFirst Yue-Gui War§! in 1920, successfully ousting the §POld Guangxi clique§!, and instating §lChen§! as governor of §YGuangdong§!. With §aSun§! insisting upon a new extraordinary government that would grant him executive powers, a political schism with §lChen§! formed, and after fighting the §lSecond Yue-Gui War§! in 1921, which sent §YGuangxi§! into practical anarchy, the two clashed over the §YNorthern Expedition§!, Unification by Negotiation or by Subjugation, and Federalism over Centralism. Tensions ultimately culminated in the §YJune 16th Incident§!, with the attempted shelling of §aSun's§! Palace by §aYe Ju§! and the §aOld Yue Clique§!.\n\nEngulfed in consistent conflict, many individuals would clash, and then defect or otherwise. With the rise in influence of warlords such as §PDeng Benyin§!, §mLiu Zhenhuan§!, §aYang Ximin§!, §PShen Hongying§!, §aLin Hu§!, §PHong Zhaolin§!, and numerous others, §YGuangdong§! effectively became a patchwork of influences. With the region inflamed further by the §YMerchant Corps Incident§! of 1924, wherein §YGuangzhou's§! capitalists rose up to protect themselves in fear of §kKMT§! atrocities, the §PWhampoa Training Corps§! and §PAcademy§! were formed that same year, and would soon drive out both §lChen Jiongming§! and §mChen Lianbo's§! forces. No longer willing to endure alliances with warlords in order to see unification of the nation, §aSun Yat-sen§! initiated the Reorganisation of the Kuomintang. Meanwhile, in exile, §lChen Jiongming§! founded the §lPublic Interest Party§! in 1925."

 GXC_country_intro_header_1: "§lМеждоусобицы Партийного государства и Северный поход§!"
 GXC_country_intro_content_1: "Политически §kГоминьдан§! радикально трансформировался. Поскольку реформисты и федералисты стекались к различным лидерам федералистов в стране, Партия была реорганизована в 1924 году, установив демократический централизм формы организации, союз с §RИнтернационалом§! и Единый фронт с §rКитайской синдикалистской партией§!. Поскольку §aСунь§! направился на север для участия в мирных переговорах, Партия раскололась еще больше из-за отсутствия руководства §aСуня§! на Юге. После смерти §aСуня§! исполняющий обязанности генералиссимуса §aХу Ханьминь§!, предполагаемый преемник §aСуня§!, вступил в борьбу за власть с §RВан Цзинвэем§!, §PЧан Кайши§!, §RЛяо Чжункаем§!, §cЧжу Пэйдэ§! и §cСюй Чунчжи§!. Одновременно §aТан Цзияо§! попытался вторгнуться в §YЛянгуан§!, но был остановлен недавними §kсоюзниками Гоминьдана§!, §PНовой кликой Гуанси§!.\n\nПоскольку многие правые члены партии переехали в штаб-квартиру в §YШанхае§! из-за растущей активности §Rлевых§! в §YГуандуне§!, §aХу§! был смещен §YСоветом национального правительства§!. Почти сумев вырвать победу из рук §RВана§! и §PЧана§!, покушение на §RЛяо Чжункая§! вызвало массовую чистку правых внутри Партии врагами §aХу§!. Оживленный, Единый фронт держался крепко, и раскол между §aСтарым правым§! и §RЛевым§! крыльями партии рос. Разочаровавшись, §aСтарые правые§! провели §cКонференцию Западных холмов§! в конце 1925 года, а затем были исключены §kЦентральным Исполнительным Комитетом§!, позже бежав в §YШанхай§!. С политической ситуацией, несколько стабилизированной в пользу Единого фронта, §kГоминьдан§! начал свой §YСеверный поход§! из §YЛянгуана§! под руководством §RВана§! и §aЧана§! в июле 1926 года.\n\nНачав экспедицию с недавно сформированной §PНационально-революционной армией§!, она состояла из реорганизованных и преданных союзных армий милитаристов наряду с новой элитной §Pрожденной в Вампу 1-й армией§!, возглавляемой §PЧаном§! и §PХэ Инцинем§!. Наряду с §P1-й§!, это были §c2-я Тань Янькая§!, §c3-я Чжу Пэйдэ§!, §l4-я Ли Цзишэня§!, §a5-я Ли Фулиня§!, §a6-я Чэн Цяня§!, §P7-я Ли Цзунжэня§! и §r8-я Тан Шэнчжи§!. Изначально успешный, достигнув §YУчана§! в сентябре, §YСеверный поход§! был подорван Немецкой интервенцией в октябре, захватившей §YГуанчжоу§! к ноябрю. Поскольку §k4-я армия§! пыталась оказать разумное сопротивление, §a5-я§! распалась, заставив §PЧана§! переориентировать §P1-ю армию§! на юг в попытке снять осаду. Воспринятое как оставление фронта, это невероятно непопулярно, и их интенсивный штурм привел к провалу.\n\nС §YГуанчжоу§! в руках немцев, их относительно высокие потери привели к их отказу двигаться дальше, вместо этого они предпочли, чтобы их союзники из §zЧжили§! закончили работу; назначив §mЧэнь Ляньбо§! мэром в промежутке. Провал §PЧана§! привел к его смещению §RВаном§! при поддержке §lЛи Цзишэня§!, §lЧжан Факуя§!, §RТан Шэнчжи§!, §cТань Янькая§! и §cЧжу Пэйдэ§!. Встретившись наедине с §PХэ Инцинем§! и §PБай Чунси§!, §PЧан§! ушел в отставку, а §lЛи Цзишэнь§! занял его место. Поскольку §P1-я§! больше не отвечала на приказы, слушая только непосредственно §PЧана§!, §RДэн Яньда§! и §Rлевые§! ополчения организуют забастовку в §YГуанчжоу§!. В январе 1927 года §YБитва при Цзиньхуа§! ведется §l4-й армией§! при содействии §c3-й§! и §R8-й§!, что привело к фактическому распаду §l4-й§! и §R8-й§! армий, поскольку они отступили, чтобы сформировать партизанскую борьбу в §kМиньгане§!.\n\nВернувшись к власти из-за провала §lЛи§!, §PЧан§! быстро инициировал политический брак с §aСун Мэйлин§!, запугал §PХэ Инциня§! обратно в запуганный союз, и со страхом перед влиянием левых был поддержан §cЧжу Пэйдэ§! и (неохотно) §PЛи Цзунжэнем§!, наряду с невероятно опасающимся §aЧэн Цянем§!, на должность Генералиссимуса. Приказав §YВеликий поход§! на запад в §YГуанси§!, §YГуйчжоу§! и юго-западный §YХунань§!, §RВан Цзинвэй§! и §RЛяо Чжункай§! повели §RЦентральный Исполнительный Комитет§! в изгнание.\n\nС переходом §nЮань Цзумина§! на сторону §eБэйяна§! и попыткой вторжения еще раз со стороны §aТан Цзияо§! ранее, §YВеликий поход§! стал беспорядочным, и после убийства §PЧана§! в начале февраля привел к массовому дезертирству и принятию контроля над §PНРА§! §cЧжу Пэйдэ§!. Теперь прохладно базируясь в §YГуйчжоу§! (из-за собственных междоусобиц §aЮньнаньской клики§!, предотвративших их изгнание) и частях §YГуанси§!, §kГоминьдан§! медленно вытеснялся глубже в первый, и §YСеверный поход§! официально завершился в феврале 1927 года, когда Партийное государство продолжило свою борьбу в §YГуйчжоу§!, §kМиньгане§! и §YШанхае§!."

 GXC_country_intro_header_2: "§gМеждуцарствие Лянгуана§!"
 GXC_country_intro_content_2: "Оставив хаос после своего ухода, наступающие армии §zСеверного§! и §MЮжного Чжили§! начали использовать иррегулярные и вспомогательные формирования из местных фракций для дальнейшего укрепления контроля, поскольку §eФэнтянь§! инициировал §Y3-ю Чжили-Фэнтяньскую войну§! в феврале 1927 года. Спровоцированные столкновениями между §PЧжан Цзунчаном§! и §cУ Пэйфу§!, §zЧжили§! ловко расправились с §PЧжан Цзолинем§! и §eФэнтяньской кликой§!. В то же время §PСтарая клика Гуанси§! и §aСтарая клика Гуандуна§!, члены которых либо бежали к линиям §zЧжили§!, либо ушли в отставку, были возвращены к власти и влиянию в своих местностях. С §MЮжным Чжили§!, довольно двусмысленно остановившимся на §PШэнь Хунъине§! в качестве губернатора §YГуандуна§!, §mЧэнь Ляньбо§! сохранил свое назначенное немцами и подтвержденное §zЧжили§! мэрство в §YГуанчжоу§!, отчасти из-за переговоров, необходимых для вывода немецких войск. Ни один из них не контролировал большую часть провинции, и благодаря приобретению бывших милитаристов на зарплате §mЧэня§! и §PШэня§! она еще больше раздробилась на вотчины.\n\nВ §YГуанси§! различные разрозненные кланы соперничают за объединение в пустоте, оставленной отступлением §PНового Гуанси§!, что в конечном итоге привело к тому, что §PЛу Жунтин§! (к удивлению многих) сумел маневрировать обратно к власти. С его почтенным возрастом и репутацией, сглаживающими любые проблемы контроля, он неохотно признается Губернатором §YГуанси§! со стороны §zСеверного Чжили§!. На юге, в §YЦюнъя§!, §aДэн Бэньинь§! возвращается к власти на острове после согласованных усилий §mЧэнь Ляньбо§! и немцев, установив прохладный союз между §YЦюнъя§! и §YГуанчжоу§!.\n\nМедленно расширяя свои сферы контроля, сам §mЧэнь Ляньбо§! начал нанимать бывших офицеров §aГуандунской армии§! (как §kГоминьдана§!, так и федералистов), чтобы еще больше укрепить свой §mТорговый корпус§!, что привело к найму таких людей, как §aЧэнь Цзитан§!, §lЧэнь Цзюнмин§! (хотя он отказался от военной должности), §aЕ Цзюй§! и других. В сочетании с этим он нанял таких людей, как §mЛю Чжэньхуань§! и §aЯн Симинь§!. С завершением §Y4-й Чжили-Фэнтяньской войны§! и §YКонфликта на КВЖД§! §zЧжили§! объявили о запланированных выборах, а тем временем §PСунь Чуаньфан§! официально включил Хунань, §YГуанси§! и §YГуандун§! в §YЛигу пяти провинций§! в 1929 году, ставшей §YЛигой восьми провинций§!.\n\nС новыми выборами 1929 года, приведшими к убедительной победе §aАссоциации Гармонии§!, §lОбъединенная лига национального строительства§! формируется демократически настроенными китайскими интеллектуалами из §nПартии младокитайцев§!, §cДемократической конституционной партии§!, §mКлики политической науки§! (недавно легализованной), §lПартии общественных интересов§!, §cПартии народного правительства§! и многих других, хотя включение таких, как примыкающие к §kГоминьдану§! §RЧжан Боцзюнь§! и §RТань Пиншань§!, вызывает пристальное внимание. С отказом §PЧжан Цзолиня§! вести переговоры об объединении после убедительной победы §zЧжили§! на выборах, §PСунь Чуаньфан§! спровоцировал §YКризис Лиги§! 1930 года, двусмысленно отвечая на предложения §PЧжан Цзолиня§! о возобновлении гражданской войны.\n\nПродвижение федералистской риторики для защиты автономии §YЛиги§!, среди других силовых игр, привело к взрыву §YШанхайского восстания§! в 1932 году. Приведя к катастрофическим отголоскам по всей стране, оно вызвало бегство интеллектуалов во внутренние районы, а вытекающая внутренняя политика самой §YЛиги§! привела к отступлению сторонников §PШэнь Хунъина§!, подорвав его позиции. Быстро §PЛу Жунтин§! скоординировал союз с §mЧэнь Ляньбо§! и §aДэн Бэньинем§!, вытеснив §PШэня§! с основных позиций в §YГуанси§! и §YГуандуне§!. В ответ §zСеверное Чжили§! признало §PЛу§! §YНаместником Лянгуана§!, чтобы сдержать §PСунь Чуаньфана§!. Аналогичным образом §PЛу§! подписал тайное соглашение о взаимной обороне с §cЧжао Хэнти§!; на случай, если §PСунь§! попытается вновь утвердить себя в Юго-Западных провинциях.\n\nКогда наступил 1934 год, §PЛу Жунтин§! умер естественной смертью, оставив большую часть своей работы по централизации провинций §YЛянгуана§! незавершенной. Его приемные сыновья, §aЛу Юйгуан§! (его подготовленный преемник и Молодой маршал Юга) и §aМа Цзи§! заняли его место. Выводя свою фракцию §aМолодого Гуанси§! из §PСтарой клики Гуанси§! на передний план, это триумвират, даже квадриумвират, между §aЛу§!, §aМа§!, §aЛю Чжилу§! и §aЛинь Ху§!. §PШэнь§! остается, едва держась, в то время как §lЧэнь§! продолжает свои номинально «демократические» операции в §YГуанчжоу§!."

 GXC_country_intro_header_3: "Политическая диаспора в Юэ-Гуй"
 GXC_country_intro_content_3: "§MКлики Гуанси и Гуандуна§!\nВ хаосе и анархии краха §kГоминьдана§! многие партии и фракции, как старые, так и новые, вернулись или иным образом появились на переднем крае политики §YЛянгуана§!. Главными среди них являются §PСтарая клика Гуанси§! и ее разрозненные внутренние фракции, федералисты в стране, джентри и торговцы, и все прочие личности. Фактически являясь самой мощной группой в регионе, §PСтарая клика Гуанси§! остается разобщенной, разделенной между §aФракцией Молодого Гуанси§! и §PФракцией армии Шэнь§!, с мелкими кланами в их рядах.\n\n§aФракция Молодого Гуанси§! исповедует широкую идеологическую тенденцию к старой республиканской революционной политике, имея связи с §mКликой политической науки§! и различными другими политическими группами. В конечном счете довольно прагматичные, они остаются сосредоточенными на расширении своего влияния на юге страны. Их главными соперниками являются поддерживаемая §MЮжным Чжили§! §PФракция армии Шэнь§!, базирующаяся вокруг одноименного §PШэнь Хунъина§!. Больной и пожилой, бандит, ставший государственным деятелем, давно жаждет заявить о своих правах на пост губернатора §YГуандуна§! даже в ухудшающихся обстоятельствах. Имея прохладный союз с §aОбществом Цзинсин§! и другими прогерманскими группами интересов Южного Чжили в регионе, его разрозненная банда бандитов стремится подтвердить свою власть, обещанную им в 1927 году.\n\nВ городском центре §YГуанчжоу§! действуют те, кто увлекается махинациями, с твердым рукопожатием, маскирующим менее чем благородные намерения. С мэром §mЧэнь Ляньбо§!, осуществляющим власть через свой §lвдохновленный американцами§! §mКантонский торговый корпус§! и обширные деловые связи в провинции, ему удалось нанять и пригласить многочисленных интеллектуалов и независимых в свою паству. В основном представленные сенатором §lЧэнь Цзюнмином§!, основателем и лидером §lПартии общественных интересов§! (основанной в 1925 году), отстаивающей федерализм и демократию в регионе. На его фланге находится §SОбщество национального возрождения§! под руководством Чжан Цзюньмая, сформированное в 1932 году как подсекция §cКитайской конституционной партии§!. Сосредоточенное на адаптации немецкой социал-демократии к Китаю, оно несет заметный социалистический оттенок с такими членами, как §RЧжан Дунсунь§!, отстаивающими гильдейский социализм.\n\nТочно так же к ним присоединяются независимые члены политического поля битвы, такие как §mЛинь Чжэнсюань§!, спикер Ассамблеи и член §mКлики политической науки§!. Другими связанными лицами являются такие, как §aЛинь Ху§!, §mЛю Чжэньхуань§! и §aЯн Симинь§!. Точно так же джентри представлены через местную §cАссоциацию по поддержанию зерновой промышленности§!; долгое время будучи сторонниками и друзьями §lЧэнь Цзюнмина§!, они возобновили свои силы для защиты своих интересов. Кроме того, местные милитаристы, такие как §aЯн Жусюань§! и §aЧишэн§!, наряду с §aДэн Бэньинем§! среди прочих, разбредаются, чтобы защитить свои интересы. Вряд ли являясь рогом изобилия демократии, §YГуанчжоу§! тем не менее остается Жемчужиной в дельте реки.\n\n§MГоминьдан§!\nХотя §kГоминьдан§! имеет очень мало явного влияния в регионе, он все еще сохраняет значительное неофициальное влияние. Стычки ополчения на востоке §YГуанси§!, сельское движение §rПэн Пая§! в крестьянских трущобах §YГуандуна§! и различные иррегулярные формирования §kМиньганя§!, снующие через границу, сосуществуют с влиянием «легитимных» акторов: §aЧэнь Цзитана§! и его §aНовой клики Гуандуна§!, §aВэй Банпина§! и его старых связей, и других сочувствующих мелких акторов. Однако в истинной приверженности остается один человек, который нацелился вернуться в Китай после почти десятилетия изгнания. Самый ортодоксальный преемник §aСунь Ятсена§! и его легитимист §aХу Ханьминь§!. Глава §aПравого Гоминьдана§! и §aМосковского Центрального Исполнительного Комитета§!, он имеет тесные связи с такими людьми, как §aЧэнь Цзитан§! в Гуандуне и §cЧжу Пэйдэ§! в Юньнани.\n\nВ его лагере находится остальная часть «Старых правых». Следуя курсу ортодоксального саньминизма, §aХу§! стремится в полной мере реализовать волю §aДоктора Сунь Ятсена§!, применяя Три народных принципа сродни формуле. Слева от него находится (заочно) базирующаяся на Гавайях §lФракция Реконструкции§! §lСунь Фо§!, которая поддерживала связи как с §RВаном§! в Париже, так и с §aХу§! в Москве. Поддерживая более немедленно «демократическую» интерпретацию §RТрех принципов§!, основанную в первую очередь на досоциалистических трудах §aДоктора Суня§!, они стремятся быстро внедрить этап Опеки, за которым быстро последует Конституционный период.\n\nАналогичным образом существует §cКлика Сишань§!, возглавляемая §cЦзюй Чжэном§!, §cЛинь Сэнем§!, §cЦзоу Лу§!, §cСюй Чунчжи§! и §cЛи Лецзюнем§!. Они убежденные легисты, конституционалисты и антисоциалисты, решительно выступающие против Единого фронта. Считающаяся странной среди относительно связанных с гражданскими упомянутых фракций — это §PКвадриумвират Новой клики Гуанси§!. §PУльтрамилитаристские§! и сосредоточенные на своей системе ополчения, §PЛи Цзунжэнь§!, §PБай Чунси§!, §PХуан Шаосюн§! и §PХуан Сюйчу§! стремятся реализовать свою собственную интерпретацию §RТрех принципов§!.\n\nНаконец, существует левое крыло партии и их ключевые игроки. §SЧэнь Миншу§! из §SНовой 4-й армии§! §PНРА§!, связанный с §rВременным комитетом действий§!, но со своей собственной интерпретацией отношений с истеблишментом. §rТань Пиншань§!, один из основателей §rВременного действия§!, который был смещен §rДэном§! и §rСун§!, со своим §rГуандунским отделением Временного действия§!, сосредоточенным на синтезе синдикализма с традиционным аграрным социализмом §rВКД§!. Наконец, есть §rПэн Пай§!, герой крестьянства §YГуандуна§! и борец сопротивления против тирании джентри. Он сосредоточен на облегчении аграрного положения сельских масс Китая посредством крестьянской программы."

 GXC_guide: "§MПравый Гоминьдан - ФР - КС - КЭР - НГД - НГС§! ($social_liberal_coloured$ / $social_conservative_coloured$ / $authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot Чтобы §cГоминьдан§! пришел к власти в Лянгуане, они должны сначала выиграть §YБеспорядки в Двух Провинциях§!.\n£white_dot Чтобы §cПравый Гоминьдан§! пришел к власти, они должны выиграть мини-игру §YБитва за Кантон§!.\n\n§MФракция Реконструкции§! ($social_liberal_coloured$)\n£white_dot §cРеволюционное рвение§! должно быть выше или равно 65% перед противостоянием Ху Ханьминя и Ли Цзунжэня\n£white_dot После объединения §lСунь Фо§! должен выиграть партийные выборы\n£white_dot §YПримечание: Желательно иметь высокую популярность партии §lСоциал-либералов§!§!\n\n§MКлика Сишань§! ($social_conservative_coloured$)\n£white_dot §cРеволюционное рвение§! должно быть выше или равно 65% перед противостоянием Ху Ханьминя и Ли Цзунжэня\n£white_dot После объединения §cЦзюй Чжэн§! должен выиграть партийные выборы\n£white_dot §YПримечание: Желательно иметь высокую популярность партии §cСоциал-консерваторов§!§!\n\n£white_dot Альтернативно, §cРеволюционное рвение§! должно быть ниже 65% перед противостоянием Ху Ханьминя и Ли Цзунжэня\n£white_dot Популярность партии §cСоциал-консерваторов§! должна быть выше, чем популярность партий §PПатерналистов-автократов§! и §aАвторитарных демократов§! перед объединением\n£white_dot После объединения §cКлика Сишань§! закрепит за собой правительство\n\n§MКлика Старейшин§! ($authoritarian_democrat_coloured$)\n£white_dot §cРеволюционное рвение§! должно быть выше или равно 65% перед противостоянием Ху Ханьминя и Ли Цзунжэня\n£white_dot После объединения §aХу Ханьминь§! должен выиграть партийные выборы\n£white_dot §YПримечание: Желательно иметь высокую популярность партии §aАвторитарных демократов§!§!\n\n£white_dot У §aХу Ханьминя§! есть две концовки; §YБыстрая Опека§! и §YТщательная Опека§!\n£white_dot §YБыстрая Опека§! требует среднего количества популярности партий §lСоциал-либералов§! и §cСоциал-консерваторов§!, в то время как §YТщательная Опека§! — нет\n\n§MНовая клика Гуандуна§! ($authoritarian_democrat_coloured$)\n£white_dot §cРеволюционное рвение§! должно быть ниже 65% перед противостоянием Ху Ханьминя и Ли Цзунжэня\n£white_dot Популярность партии §aАвторитарных демократов§! должна быть выше, чем популярность §cСоциал-консерваторов§! или §PПатерналистов-автократов§! перед объединением\n£white_dot После объединения §aЧэнь Цзитан§! и §aХу Ханьминь§! закрепят за собой правительство\n\n§MНовая клика Гуанси§! ($paternal_autocrat_coloured$)\n£white_dot §cРеволюционное рвение§! должно быть ниже 65% перед противостоянием Ху Ханьминя и Ли Цзунжэня\n£white_dot Популярность партии §PПатерналистов-автократов§! должна быть выше, чем популярность §cСоциал-консерваторов§! и §aАвторитарных демократов§! перед объединением \n£white_dot После объединения §PНовая клика Гуанси§! закрепит за собой правительство\n\n§MЛевый Гоминьдан - Н4А - ГФА - Г-ВКД§! ($social_democrat_coloured$ / $radical_socialist_coloured$ / $syndicalist_coloured$)\n£white_dot Чтобы §cГоминьдан§! пришел к власти в Лянгуане, они должны сначала выиграть §YБеспорядки в Двух Провинциях§!.\n£white_dot Чтобы §RЛевый Гоминьдан§! пришел к власти, они должны выиграть мини-игру §YБитва за Кантон§!.\n\n§MНовая 4-я армия§! ($social_democrat_coloured$)\n£white_dot Держите популярность партии §SСоциал-демократов§! высокой до захвата Пекина\n£white_dot Пусть §SЧэнь Миншу§! выиграет последующую борьбу за власть в Гуандуне против §rТань Пиншаня§! и §RПэн Пая§!\n£white_dot Позже вы можете предать Центральный Комитет и объединить Китай на своих собственных условиях\n\n§MГуандунская фермерская ассоциация§! ($radical_socialist_coloured$)\n£white_dot Держите популярность партии §RРадикальных социалистов§! высокой до захвата Пекина\n£white_dot Пусть §RПэн Пай§! выиграет последующую борьбу за власть в Гуандуне против §rТань Пиншаня§! и §SЧэнь Миншу§!\n£white_dot Позже вы можете предать Центральный Комитет и объединить Китай на своих собственных условиях\n\n§MГуандунское Временное действие§! ($syndicalist_coloured$)\n£white_dot Держите популярность партии §rСиндикалистов§! высокой до захвата Пекина\n£white_dot Пусть §rТань Пиншань§! выиграет последующую борьбу за власть в Гуандуне против §RПэн Пая§! и §SЧэнь Миншу§!\n£white_dot Позже вы можете предать Центральный Комитет и объединить Китай на своих собственных условиях"

 GXC_guide_1: "§MФедералисты - ДСП - ПОИ - ЮЭ - ПНР§! ($social_democrat_coloured$ / $social_liberal_coloured$ / $authoritarian_democrat_coloured$)\n£white_dot Чтобы §fФедералисты§! пришли к власти в Лянгуане, они должны сначала выиграть §YБеспорядки в Двух Провинциях§!.\n\n§MДемократическая социалистическая партия§! ($social_democrat_coloured$)\n£white_dot Вы должны поддерживать §fДемократический энтузиазм§! выше уровня §YРазвивающийся реализм§! и успешно провести выборы\n£white_dot Изберите §SЧжан Цзюньмая§! и избегайте §Rотката демократии§!, поддерживая §fДемократический энтузиазм§! высоким\n£white_dot §YПримечание: Желательно иметь высокую популярность партии §SСоциал-демократов§!§!\n\n§MПартия общественных интересов§! ($social_liberal_coloured$)\n£white_dot Вы должны поддерживать §fДемократический энтузиазм§! выше уровня §YРазвивающийся реализм§! и успешно провести выборы\n£white_dot Изберите §lЧэнь Цию§! и избегайте §Rотката демократии§!, поддерживая §fДемократический энтузиазм§! высоким\n£white_dot §YПримечание: Желательно иметь высокую популярность партии §lСоциал-либералов§!§!\n\n§MКлика Юэ - Откат демократии§! ($authoritarian_democrat_coloured$)\n£white_dot Вы должны поддерживать §fДемократический энтузиазм§! выше уровня §YРазвивающийся реализм§! и успешно провести выборы\n£white_dot После избрания вашего кандидата (проще всего, если §SЧжан Цзюньмай§!), снизьте ваш §fДемократический энтузиазм§! до низкого уровня, и §aЕ Цзюй§! стабилизирует правительство\n\n§MКлика Юэ - Чрезвычайное правительство Чэнь Цию§! ($authoritarian_democrat_coloured$)\n£white_dot Вы должны поддерживать §fДемократический энтузиазм§! ниже уровня §YРастущий идеализм§! и не должны проводить выборы в первый раз\n£white_dot После выборов, но до объединения, поддерживайте §fДемократический энтузиазм§! на уровнях либо §YЗарождающийся идеализм§!, либо §YЗарождающийся реализм§!\n£white_dot §SДЛК§! провалит свой переворот против §lЧэнь Цзюнмина§!, и §lЧэнь Цию§! стабилизирует правительство\n\n§MКлика Юэ - Чрезвычайное правительство Е Цзюя§! ($paternal_autocrat_coloured$)\n£white_dot Вы должны поддерживать §fДемократический энтузиазм§! ниже уровня §YРастущий идеализм§! и не должны проводить выборы в первый раз\n£white_dot После выборов, но до объединения, держите §fДемократический энтузиазм§! ниже уровня §YЗарождающийся реализм§!\n£white_dot §SДЛК§! убьет Чэнь Цзюнмина, и §PЕ Цзюй§!, в свою очередь, объявит военное положение\n\n§MПравительство национальной реконструкции§! ($authoritarian_democrat_coloured$)\n£white_dot Вы должны поддерживать §fДемократический энтузиазм§! ниже уровня §YРастущий идеализм§! и не должны проводить выборы в первый раз\n£white_dot Убедитесь, что вы наняли §cЛи Цзишэня§! после победы над §RВосстанием Миньгань§! и владения провинциями §YЦзянси§! и §YФуцзянь§!\n£white_dot После выборов, но до объединения, вы должны поднять §fДемократический энтузиазм§! выше §YЗарождающегося идеализма§!, чтобы §SДЛК§! мог успешно свергнуть §lЧэнь Цзюнмина§!\n\n£white_dot У §cЛи Цзишэня§! есть две концовки; §cОриентированная на Гоминьдан§! §YОпека производящего народа§! и §SОриентированная на ДЛК§! §YКитайский Ренессанс§!\n£white_dot Чтобы выбрать любую концовку, просто выберите необходимый взаимоисключающий фокус: §YОтодвинуть «Двух Чжанов»§! и §YОчистить Клику Юэ§! соответственно"

 GXC_guide_2: "§MРегионалисты - КПН - АВССГ - СГК-МФГ - ОЦ - СГК-ФАШ§! ($market_liberal_coloured$ / $social_conservative_coloured$ / $authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot Чтобы §eРегионалисты§! пришли к власти в Лянгуане, они должны сначала выиграть §YБеспорядки в Двух Провинциях§!\n\n§MКлика политической науки§! ($market_liberal_coloured$)\n£white_dot §aЛу Юйгуан§! должен подчиниться §eФэнтяню§!\n£white_dot §YПримечание: требуется, чтобы §eОриентированный на Фэнтянь§! милитарист выиграл в Войне Лиги§!\n£white_dot После начала Второй японо-китайской войны §cЧэнь Ляньбо§! должен захватить Гуандун и свергнуть §aЛу Юйгуана§! \n£white_dot §YПримечание: желательно иметь высокую популярность партии §cСоциал-консерваторов§!§!\n£white_dot После объединения пусть §mЛю Чжэньхуань§! выиграет национальные выборы\n\n§MАссоциация всех сословий по спасению Гуандуна§! ($social_conservative_coloured$)\n£white_dot §aЛу Юйгуан§! должен подчиниться §eФэнтяню§!\n£white_dot §YПримечание: требуется, чтобы §eОриентированный на Фэнтянь§! милитарист выиграл в Войне Лиги§!\n£white_dot После начала Второй японо-китайской войны §cЧэнь Ляньбо§! должен захватить Гуандун и свергнуть §aЛу Юйгуана§!\n£white_dot §YПримечание: желательно иметь высокую популярность партии §cСоциал-консерваторов§!§!\n£white_dot После объединения пусть §cЧэнь Ляньбо§! выиграет национальные выборы\n\n§MСтарая клика Гуанси - Молодая фракция Гуанси§! ($authoritarian_democrat_coloured$)\n£white_dot §aЛу Юйгуан§! должен пережить все попытки переворота или иным образом объединить Китай на своих условиях\n£white_dot У §aЛу§! есть две концовки; §YЗащитник традиций§! и §YПрогрессивный генерал§!.\n£white_dot Вам разрешено свободно выбирать, какую концовку преследовать после объединения\n\n§MОбщество Цзинсин§! ($authoritarian_democrat_coloured$)\n£white_dot §aЛу Юйгуан§! должен подчиниться §zЧжили§!\n£white_dot После начала Второй японо-китайской войны §PШэнь Хунъин§! должен захватить Гуандун и свергнуть §aЛу Юйгуана§!\n£white_dot §YПримечание: желательно иметь высокую популярность партии §PПатерналистов-автократов§!§!\n£white_dot После объединения §PШэнь Хунъин§! умрет от старости, и вы должны выбрать его премьер-министра §aЧжу Цзяхуа§! в качестве преемника\n\n§MСтарая клика Гуанси - Фракция армии Шэнь/Чжао§! ($paternal_autocrat_coloured$)\n£white_dot §aЛу Юйгуан§! должен подчиниться §zЧжили§!\n£white_dot После начала Второй японо-китайской войны §PШэнь Хунъин§! должен захватить Гуандун и свергнуть §aЛу Юйгуана§!\n£white_dot §YПримечание: желательно иметь высокую популярность партии §PПатерналистов-автократов§!§!\n£white_dot После объединения §PШэнь Хунъин§! умрет от старости, и вы должны выбрать его среднего союзника §PЛи Яоханя§! из Армии Чжао и его сына Шэнь Жунгуана в качестве преемника"

