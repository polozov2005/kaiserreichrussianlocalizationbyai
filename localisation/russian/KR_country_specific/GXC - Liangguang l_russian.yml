#Traits
 GXC_puppet_president: "Марионеточный президент"
 GXC_puppet_president_desc: "§LНазванный даже иностранной прессой «Марионеточным президентом Линем», скромный Председатель Гоминьдана склонился перед требованиями военных не вмешиваться в дела. Однако, несмотря на его возраст, хитрый ум продолжает работать.§!"
 GXC_puppet_president_tt: "Линь Сэнь получит черту §YМарионеточный президент§!, которая модифицирует §YЛинь Сэня§!:\n -$MODIFIER_POLITICAL_POWER_FACTOR$: $RIGHT|+=$§G-10%§!\n -$MODIFIER_COMMAND_POWER_GAIN_MULT$: $RIGHT|=$§R10%§!"

 GXC_man_of_principle: "Человек принципа"
 GXC_man_of_principle_desc: "§LХу Ханьминь — это многое, но даже его величайшие недоброжелатели признают, что он неизменный последователь учений доктора Суня, жестко применяющий их даже в ущерб политической целесообразности.§!"
 GXC_man_of_principle_1: "Защитник принципа"
 GXC_man_of_principle_1_desc: "§L«Мы абсолютно не позволим никому отрезать одну часть Трех народных принципов, чтобы использовать ее в интересах своего собственного класса. Это означало бы отказ от доктрины в целом».§!"
 GXC_man_of_principle_tt: "Ху Ханьминь получит черту §YЧеловек принципа§!, которая модифицирует §YХу Ханьминя§!:\n -$MODIFIER_POLITICAL_POWER_FACTOR$: $RIGHT|+=$§G10%§!\n -$MODIFIER_COMMAND_POWER_GAIN_MULT$: $RIGHT|=$§R-10%§!"
 GXC_man_of_principle_dummy: "Человек принципа"

 GXC_man_of_steel_hos: "Человек из стали"
 GXC_man_of_steel_hos_desc: "§LЛи — человек прямой, честной искренности и, подобно его Стальной армии НРА, совершенно непоколебимый.§!"

 GXC_the_exceptional_legislator_trait: "Исключительный законодатель"
 GXC_the_exceptional_legislator_trait_desc: "§LВозможно, один из самых опытных политиков, когда-либо украшавших Азию, мало кто не согласится с способностью Ху Ханьминя, когда дело доходит до навигации в политических трясинах.§!"

 GXC_father_of_chinas_legal_system: "Отец правовой системы Китая"
 GXC_father_of_chinas_legal_system_desc: "§L«Если сохранять честность и самодисциплину, можно добиться успеха; если быть морально безупречным, можно быть счастливым и свободным от забот. Усердие может компенсировать недостатки, а бережливость может способствовать честности».§!"

 GXC_heir_of_the_guofu: "Наследник Гофу"
 GXC_heir_of_the_guofu_desc: "§L«Люди не понимают, что без прохождения периода надлежащей политической подготовки страна не готова принять конституционное правительство. Если люди не были обучены, конституция была бы просто клочком бумаги».§!"

 GXC_king_of_the_peasants: "Король крестьян"
 GXC_king_of_the_peasants_desc: "§LСреди пролетарских масс Китая никто не пользуется большим уважением, чем великий Пэн Пай, спаситель и освободитель крестьян.§!"

 GXC_democracys_iron_will: "Железная воля демократии"
 GXC_democracys_iron_will_desc: "§L«Я не ищу быстрых результатов и не спрашиваю о будущем урожае. Давайте подождем десять, двадцать, тридцать, сорок или пятьдесят лет. Тогда мы сможем сравнить преимущества и недостатки нового с этим старым обществом».§!"

 GXC_son_of_the_republic_dem: "Первый сын Республики"
 GXC_son_of_the_republic_dem_desc: "§LСпаситель Республики и ближайший союзник Чэнь Цзюнмина с первых дней, Е Цзюй стоял как боец на передовой за федералистский проект. В то время как Чэнь — Отец Нации, Е, безусловно, первый Сын Республики.§!"

 GXC_chinas_von_bulow: "Китайский фон Бюлов"
 GXC_chinas_von_bulow_desc: "§LС беспрецедентным героизмом китайский народ сражался и вел войну ценой огромных жертв, и Е Цзюй проследит, чтобы его безопасность и независимость были навсегда обеспечены в новой Республике.§!"

 GXC_chinas_von_caprivi: "Китайский фон Каприви"
 GXC_chinas_von_caprivi_desc: "§LС ясной головой, добрым сердцем и усердным характером Чэнь Цию работает над тем, чтобы наследие Чэнь Цзюнмина о демократической федеративной республике было выполнено, независимо от того, сегодняшнее это поколение или следующее.§!"

 GXC_lone_star_of_the_blue_sky: "Одинокая звезда голубого неба"
 GXC_lone_star_of_the_blue_sky_desc: "§LУбежденный в идеалах и решительный в действиях, Ли Цзишэнь возродил революционную мечту Вечного Премьера в сотрудничестве с демократической элитой Китая.§!"

 GXC_democratic_dashuai: "Демократический Дашуай"
 GXC_democratic_dashuai_desc: "§LУправляя правительством мягкой рукой, Ли Цзишэнь правит бессрочно. Но не просто при поддержке силы оружия, а при подлинной гражданской поддержке.§!"

 GXC_young_marshal_of_the_south: "Молодой маршал Юга"
 GXC_young_marshal_of_the_south_desc: "§LОбученный Лу Жунтином быть его преемником, Лу Юйгуан получил прозвище, похожее на прозвище Чжан Сюэляна на Севере.§!"

 GXC_young_marshal_of_the_south_2: "$GXC_young_marshal_of_the_south$"
 GXC_young_marshal_of_the_south_2_desc: "§LУтвердив себя неоспоримо, Лу Юйгуан вознесся к большей славе, чем даже мог мечтать его отец.§!"

 GXC_the_chinese_monroe: "Китайский Монро"
 GXC_the_chinese_monroe_desc: "§L«Именно знание того, что у всех людей есть слабости и что у многих есть пороки, делает правительство необходимым».§!"

 GXC_the_technocrat: "Технократ"
 GXC_the_technocrat_desc: "§LСтавя во главу угла образование, патриотизм и административную эффективность, Чжу Цзяхуа не дает пощады в войне прогресса.§!"

 GXC_last_of_the_romans: "Последний из римлян"
 GXC_last_of_the_romans_desc: "§LНекогда работавший бок о бок с такими людьми, как Лу Жунтин, Лян Цичао и Ли Лецзюнь, пожилой Ли Яохань — один из последних из поколения Милитаристов.§!"

 GXC_the_comprador_president: "Президент-компрадор"
 GXC_the_comprador_president_desc: "§L«Предлагая подарки: Деньги уместны, и один размер подходит всем».§!"

#Dynamic Modifiers
 GXC_dongjiang_river_column_dyna_mod: "Колонна реки Дунцзян"
 GXC_dongjiang_river_column_dyna_mod_desc: "Колонна реки Дунцзян (иногда переводится как Колонна Восточной реки) — это группа социалистических антиимпериалистических партизан, которые стремились противостоять иностранной оккупации. Организованные как оставленная в тылу сила, они были обучены смешиваться с местным населением и саботировать усилия врага по укреплению своего контроля над ценной торговой сетью Южного Китая. Хотя их численность варьируется, их усилия были мифологизированы в официальной правительственной пропаганде."

 GXC_qiongya_autonomy_dynamic_modifier: "Автономия Цюнъя"
 GXC_qiongya_autonomy_dynamic_modifier_desc: "Получив влиятельную должность в правительстве, Дэн Бэньинь смог почти полностью отделить остров Цюнъя как свою собственную вотчину, почти запросив статус провинции, Дэн вместо этого решил сохранить паритет с правительством. Пока у него есть уши в высших палатах власти, он доволен поддержкой провинциальных и национальных амбиций."

 GXC_five_year_plan_effect: "Пятилетний план"
 GXC_five_year_plan_effect_desc: "В соответствии с амбициозными планами Демократических социалистов все Пограничье Китая и регионы к северу от Великой стены были предназначены для непрерывного и согласованного экономического развития. Преобразование обширных участков пустыни, гор и степи в экономически продуктивную землю — немалое предприятие, но уже различные регионы увидели значительное экономическое улучшение."

 GXC_encouraging_free_enterprise_effect: "Поощрение свободного предпринимательства"
 GXC_encouraging_free_enterprise_effect_desc: "Выделяя участки различных промышленных зон внутри страны для иностранных инвестиций и промышленного развития, правительство продвинуло ряд «экономических зон», где может процветать капитализм. Благодаря совместным усилиям национального и международного бизнеса надеются, что дополнительный капитал продвинет регионы к процветанию, и в ответ позволит остальной части Китая последовать этому примеру."

 GXC_entrenched_yue_dominance: "Укоренившееся доминирование Юэ"
 GXC_entrenched_yue_dominance_desc: "С дальнейшим «усовершенствованием» политических и военных назначений в национальном правительстве в пользу поклонников Клики Юэ и тех, кто входит в Камарилью Президента, Гуандун получил особый интерес к государственным инвестициям. Поскольку провинциальное правительство считается оплотом Клики Юэ, это практически маленькая модель самого национального правительства."

 GXC_economic_self_sufficiency_modifier: "Особая экономическая зона"
 GXC_economic_self_sufficiency_modifier_desc: "На пути к укреплению Китайской Республики нация может достичь истинной независимости и утвердить себя на международной арене только в том случае, если она сможет достичь определенного уровня экономического развития, независимого от иностранных предприятий. Поскольку страны отказываются от экономической политики невмешательства при постепенном переходе к социализму, сам Китай должен сохранять зоны капиталистического экономического развития. При этом надеются, что их экономическое процветание распространится по всей стране."

 GXC_privileges_granted_to_monopolies_modifier: "Привилегии, предоставленные монополиям"
 GXC_privileges_granted_to_monopolies_modifier_desc: "Чтобы культивировать истинное возрождение и процветание китайской экономики, Министерство финансов решило под давлением Торговцев определить районы страны как зоны «Свободного предпринимательства» с конечной целью обеспечения массовой индустриализации ключевых городских центров под надзором лучших и ярчайших бизнесменов Китая. Предвидя капиталистическое экономическое развитие как путь вперед, надеются, что блага и выгоды, которые получают сами Торговцы, будут реинвестированы в укрепление нации."

 GXC_balancing_the_levers_of_government: "Балансировка рычагов управления"
 GXC_balancing_the_levers_of_government_desc: "Гармоничный баланс — это добродетель, к которой должны стремиться все китайские правительства, и текущая итерация Бэйянской республики не является исключением. Навязанные поклонниками Старого Гуанси, различные необходимые союзы и старые друзья были объединены под понятием продолжения администрации и проведения кампании национального укрепления. Центральное правительство разделилось на три лица: Клика политической науки, Общество Цзинсин и различные соотечественники Старого Гуанси и Клики Чжили. Вместе они отражают любые попытки внешних влияний вмешаться в их управление."
