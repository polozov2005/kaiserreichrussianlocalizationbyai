 GXC_reorganising_the_dsp_effect_tt: "§LРеорганизация Демократической социалистической партии, чтобы подчинить ее воле Чжан Цзюньмая, является весьма дорогостоящим мероприятием. Вы потеряете стабильность пропорционально тому, сколько влияния §cСоциал-консерваторов§!, §RСиндикалистов§!, §oТоталистов§!, §rРадикальных социалистов§! и §nНационал-популистов§! у вас было, поскольку различные члены откалываются от партии.§!"

 GXC_chen_jiongmings_legacy_effect_tt: "§LЧэнь Цзюнмин достиг практически статуса божества в стране за свое руководство и управление объединением. Вы потеряете стабильность пропорционально тому, сколько влияния §mРыночных либералов§!, §RСиндикалистов§!, §oТоталистов§!, §rРадикальных социалистов§! и §SСоциал-демократов§! у вас было, поскольку различные группы боятся роста культа личности Адвоката-Генерала.§!"

