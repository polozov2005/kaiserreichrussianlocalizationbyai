## Grain Industry Maintenance Characters (GIM)

 #丘景雲
 GXC_qiu_jingyun: "Цю Цзинъюнь"
 GXC_qiu_jingyun_bio: "Крупный землевладелец в Хайфэне, Цю Цзинъюнь, как и многие шэньши, все больше беспокоился из-за растущей популярности Ассоциации фермеров. В ответ была создана Ассоциация поддержки зерновой промышленности с Чэнь Юэбо в качестве председателя и Ван Цзосинем в качестве заместителя председателя. Эта итерация ассоциации просуществовала недолго, так как она была немедленно распущена, когда Чэнь Юэбо ушел в отставку и бежал в Гонконг.\n\nВскоре Цю стал уездным магистратом 12 мая 1923 года, к совместному сопротивлению Ассоциации фермеров и местного академического сообщества. Его срок на посту уездного магистрата длился недолго, так как Ван был вскоре назначен уездным магистратом 27 мая. Ассоциация поддержки зерновой промышленности была вскоре восстановлена Ван Цзосинем, Цю Цзинъюнем и Линь Доувэнем, только чтобы снова распасться после того, как Чэнь Цзюнмин ушел в отставку, и Гоминьдан начал свое правление в Гуандуне.\n\nКогда Северный поход вскоре раскололся, ассоциация была вновь возрождена под председательством Цю в сотрудничестве с Е Цзюем для восстановления положения шэньши и подавления крестьянской активности в Хайфэне.\n\n§YЗаметки:§! Старый наставник Чэнь Цзюнмина, его отношения с бывшим учеником остаются крепкими."
 GXC_qiu_jingyun_leader_desc: "§YРодился:§! §Lв провинции Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_qiu_jingyun_bio$§!"
 GXC_qiu_jingyun_sic_desc: "§YРодился:§! §Lв провинции Гуандун, Великая Цин§!\n§YПринадлежность:§! §cАссоциация поддержки зерновой промышленности§!\n§YБиография:§! §L$GXC_qiu_jingyun_bio$§!"

 #林鬥文
 GXC_lin_douwen: "Линь Доувэнь"
 GXC_lin_douwen_commander_desc: "§YРодился:§! §Lв провинции Гуандун, Великая Цин§!\n§YПринадлежность:§! §cАссоциация поддержки зерновой промышленности§!\n§YБиография:§! §LЧлен Общества Чжэнци и Тунмэнхоя Хайфэна, Линь Доувэнь был ранним союзником Чэнь Цзюнмина, став директором сил безопасности уезда, когда Чэнь был губернатором Гуандуна. В качестве директора Линь защищал земельные интересы, собирая ренту с фермеров силой, вызывая сильное негодование среди крестьянства.\n\nЭто бремя обострило напряженность между шэньши и крестьянством, так как все больше фермеров стекалось в Ассоциацию фермеров под руководством Пэн Пая. После того, как срок полномочий Чэнь Цзюнмина в качестве губернатора закончился его поражением от Гоминьдана, Ассоциация поддержки зерновой промышленности была вынуждена самораспуститься, в то время как Всеобщая ассоциация фермеров Хайфэна присоединилась к Гоминьдану и стала Ассоциацией фермеров провинции Гуандун.\n\nКогда Северный поход захлебнулся, и Гуандун избавился от Гоминьдана, Линь вернулся к своей роли главы сил безопасности, когда Ассоциация поддержки зерновой промышленности была восстановлена. В Хайфэне царил хаос, так как и шэньши, и крестьянство предпринимали ответные действия друг против друга, остановленные только военным присутствием Е Цзюя в уезде.§!\n\n§YЗаметки: Однажды его выгнали из одной деревни, а впоследствии избили в другой деревне во время сбора ренты.§!"

 #陈月波
 GXC_chen_yuebo: "Чэнь Юэбо"
 GXC_chen_yuebo_advisor_desc: "§YРодился:§! §Lв уезде Хайфэн, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cАссоциация поддержки зерновой промышленности§!\n§YБиография:§! §LКрупный землевладелец и ранний союзник Чэнь Цзюнмина с самого начала, Чэнь Юэбо был одним из основателей Тунмэнхоя Хайфэна и помог создать «Автономную газету Хайфэна» вместе с Чэнь Цзюнмином. Помогая собирать средства и организовывать эскадроны смерти Хайлуфэна как для восстания Новой армии Гэнсюй, так и для Второго восстания в Гуанчжоу, Чэнь Юэбо в конечном итоге принял участие в восстании Таньшуй Чэнь Цзюнмина во время Синьхайской революции.\n\nВ 1922 году формирование Всеобщей ассоциации фермеров Хайфэна Пэн Паем ознаменовало кульминацию растущей напряженности между шэньши и крестьянством. В противовес этой растущей угрозе Чэнь Цзюнмин поручил Чэнь Юэбо сформировать Ассоциацию поддержки зерновой промышленности вместе с другими местными землевладельцами. Первоначально намереваясь раздавить Ассоциацию фермеров, суеверный Чэнь впоследствии с позором ушел в отставку и бежал в Гонконг после получения плохого предзнаменования, хотя неблагоприятные политические ветры также могли сыграть роль в этом решении.\n\nИзгнание Чэня длилось недолго, однако, когда он вернулся после возвращения Хайфэна Е Цзюем во время хаоса краха Северного похода.§!\n\n§YЗаметки: Член Гуандунской ассоциации поддержки зерновой промышленности, Чэнь поддерживает тесные связи с Чэнь Цзюнмином.§!"

 #鍾秀南
 GXC_zhong_xiunan: "Чжун Сюнань"
 GXC_zhong_xiunan_commander_desc: "§YРодился:§! §L1877, в уезде Хайфэн, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cАссоциация поддержки зерновой промышленности§!\n§YБиография:§! §LОкончив Гуандунский педагогический университет, Чжун Сюнань был одним из самых ранних последователей Чэнь Цзюнмина, будучи одним из основателей Тунмэнхоя Хайфэна и ранним лидером Партии общественных интересов. Наряду с вступлением в Китайскую группу убийц и участием во Втором восстании в Гуанчжоу, Чжун также последовал за Чэнем в изгнание в Юго-Восточную Азию после неудачного восстания Чэня против Юань Шикая в 1913 году.\n\nСлужа главой финансов Чэнь Цзюнмина в Южной Фуцзяни, Чжун был назначен исполняющим обязанности министра финансов Гуандуна в ноябре 1921 года Сунь Ятсеном. Когда Чэнь ушел в отставку в начале 1923 года, когда Гоминьдан захватил Гуандун, Чжун отказался работать на правительство Гоминьдана и уехал с Чэнем в Гонконг.\n\nКогда Северный поход начал рушиться, и Хайфэн был возвращен Е Цзюем в хаосе, Чжун был приглашен обратно, чтобы временно служить уездным магистратом при Е Цзюе. За время своего пребывания в должности он курировал подавление остатков Ассоциации фермеров, связанной с Гоминьданом, а также процесс реконструкции уезда с помощью Ассоциации поддержки зерновой промышленности.§!\n\n§YЗаметки: Косвенно связанный с шэньши Хайфэна, он остается верным своему старому другу Чэнь Цзюнмину.§!"

## Beiyang (BEI)

 #邓本殷
 GXC_deng_benyin: "Дэн Бэньинь"
 GXC_deng_benyin_commander_desc: "§YРодился:§! §L27 августа 1879 года в уезде Фанчэн, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LБросив школу, Дэн записался в армию в 1899 году. В августе 1913 года Дэн Бэньинь поступил на службу в Армию Цзи Лун Цзигуана, и Дэн продолжил службу с Луном во время Войны в защиту республики. В 1916 году войска Дэн Бэньиня были реорганизованы в личную армию Чжу Цинланя, но были отвергнуты от принадлежности к Старой клике Гуанси. В соответствии с договоренностью с Сунь Ятсеном о формировании Армии помощи Фуцзяни из подразделений клики Гуандун, Дэн оказался под командованием Чэнь Цзюнмина и Е Цзюя.\n\nПолучив приказ вступить в бой со Старой кликой Гуанси в 1920 году, он сражался с такими людьми, как Е Цзюй, Сюн Люэ, Хун Чжаолинь, Ло Шаосюн и другими, успешно взяв Гуанчжоу, а затем Гуандун. Оккупировав Цюнъя в 1921 году, он получил фактическое феодальное владение над островом. Быстро строя инфраструктуру, дороги и восстанавливая различные поврежденные здания, он начал продвигать форму псевдофедерализма: «Народ Цюн управляет Цюнъя». Успешно захватив южное побережье Лянгуана по приказу Чэнь Цзюнмина, Дэн в конечном итоге встал на сторону Чэня во время Инцидента 16 июня.\n\nПосле поражения Чэня Дэн больше не находился под эгидой Гуандунской клики. Собрав силы численностью более 30 000 человек, он был назначен Защитником Цюнъя Пекином и сохранял «нейтралитет» в деле Сунь-Чэнь. После попытки убийства Ляо Чжункайя Дэн был изгнан из Цюнъя и бежал в Шанхай. Инсценировав свою смерть в 1926 году, он снова появился в 1927 году после краха Гоминьдана, снова захватив контроль над Цюнъя в молчаливом союзе с Кликой Юэ.§!\n\n§YЗаметки: Относительно честный и патриот, Клика Цюнъя Дэна является заметным и решающим игроком на юге Лянгуана.§!"

 #洪兆麟
 GXC_hong_zhaolin: "Хун Чжаолинь"
 GXC_hong_zhaolin_high_command_desc: "§YРодился:§! §L3 апреля 1876 года в уезде Нинсян, провинция Хунань, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LСын из бедной семьи, Хун Чжаолинь вступил в батальон Юнцзы Гуандунской армии в возрасте 20 лет, став капитаном как раз перед Синьхайской революцией. Подстрекаемый Чэнь Цзюнмином и Дэн Кэном, он присоединился к революционерам в Хуэйчжоу. В 1912 году он был назначен главой Смешанного корпуса Гуандунской армии и Директором по умиротворению Хуэйчжоу. Сражаясь во Второй революции, он в конечном итоге был вынужден бежать в изгнание в Японию.\n\nВернувшись в Хуэйчжоу в 1914 году, он планировал свергнуть Лун Цзигуана, но после неудачи бежал в Гонконг, где был арестован местными властями. Освобожденный революционерами, он снова вернулся в Хуэйчжоу в 1916 году, чтобы свергнуть Луна, на этот раз успешно, и был назначен помощником директора Хуэйчжоу новым губернатором Чжу Цинланем. Служа в Армии Гуандун-Фуцзянь, он сражался против Ли Хоуцзи в Фуцзяни, а в Первой войне Юэ-Гуй под началом Чэнь Цзюнмина, став местным милитаристом Чаомэй.\n\nСохраняя паритет с Чэнь Цзюнмином после 16 июня, Хун обманул Гоминьдан, присоединился к Цао Куню и Чжилийской клике, а затем приветствовал возвращение Чэнь Цзюнмина в 1923 году. Назначенный Защитником Чаомэй Пекином, Хун сражался в Восточном походе и упорно удерживал район Чаошань. Серьезно раненный в бою, Хун был вынужден отступить для восстановления сил. Ненадолго приглашенный Сунь Чуаньфаном присоединиться к нему в его армии, Хун был отправлен Сунем в Гуандун во время борьбы за Лянгуан в 1927 году, сплотив силы в Чаошане, действуя как неудобный союзник Шэнь Хунъина под тем же хозяином, имея связи с Е Цзюем.§!\n\n§YЗаметки: Он печально известен тем, что управлял безудержной контрабандой опиума под эгидой Чэнь Цзюнмина в 1920-х годах, и находится на внешней ступени политики Хайфэна и Юэ.§!"

 #刘震寰
 GXC_liu_zhenhuan: "Лю Чжэньхуань"
 GXC_liu_zhenhuan_bio: "В юном возрасте Лю Чжэньхуань был окружен богатой семьей и множеством друзей. Наслаждаясь радостным детством, он вступил в Тунмэнхой в 1911 году и вел революционную деятельность вплоть до Синьхайской революции. Немедленно отправив бандитов, таких как Шэнь Хунъин, на помощь революции, Лю организовал свое местное ополчение, а в 1912 году стал официальным командиром в армии Гуанси. Выступая за немедленную поддержку Второй революции, Лю оказался в Гонконге, а затем в Шанхае от имени Гоминьдана.\n\nВернувшись в Гуанси в 1916 году, чтобы помочь в Войне в защиту республики, он сражался против Лун Цзигуана в 1918 году и помогал Гуандунской армии в 1921 году сражаться со Старой кликой Гуанси. Помогая Тан Цзияо в его возвращении в Юньнань, Лю в конечном итоге встал на сторону Сунь Ятсена во Второй войне Юэ-Гуй и снова во время восстания Шэнь Хунъина.\n\nНедовольный Реорганизацией Гоминьдана, Лю начал злоупотреблять своим положением, и его и без того слабая дисциплина среди солдат вызывала большое возмущение. В 1925 году он попытался вместе с Тан Цзияо вытеснить Новую клику Гуанси и Сунь Ятсена, но после провала он заключил союз с Ян Симинем, Дэн Бэньинем, Чэнь Цзюнмином, Дуань Цижуем и другими и восстал против Гоминьдана в 1925 году, что в конечном итоге привело к его собственному смещению. Сокрушаясь в изгнании в Гонконге, Лю был нанят своим старым другом Чэнь Ляньбо в 1927 году для контроля западных подходов к Гуанчжоу."
 GXC_liu_zhenhuan_high_command_desc: "§YРодился:§! §L1890, в уезде Лючжоу, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §mКлика политической науки§!\n§YБиография:§! §L$GXC_liu_zhenhuan_bio$§!\n\n§YЗаметки: Он хороший друг Лун Юня и Юньнаньской клики в целом, являясь при этом членом Старой клики политической науки и общаясь с другими демократами, такими как Ло Лунцзи.\nОн известен как «Мятежный мальчик» за предательство Старой клики Гуанси во Второй войне Юэ-Гуй.§!"
 GXC_liu_zhenhuan_leader_desc: "§YРодился:§! §L1890, в уезде Лючжоу, провинция Гуанси, Великая Цин§!\n§YБиография:§! §L$GXC_liu_zhenhuan_bio$§!\n\nПоднявшись до статуса президента Китая, Лю представляет собой новую страницу зарождающихся республиканских традиций китайского Пьемонта, и многие с замиранием сердца ждут, оправдает ли милитарист, ставший государственным деятелем, оптимизм своей юности или потворство своим тридцати годам."

 #李福林
 GXC_li_fulin: "Ли Фулинь"
 GXC_li_fulin_army_chief_desc: "§YРодился:§! §L1874, в уезде Паньюй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LВ залах Национально-революционной армии многие из ее высших армейских командиров были одними из лучших офицеров страны: Чэн Цянь, Ли Цзунжэнь, Чан Кайши, Хэ Инцинь. И все же, для Пятой Национально-революционной армии у них был только Ли Фулинь. Сын крестьянина, в детстве Ли был по натуре благородным, обожал боевые искусства. Собрав множество своих соотечественников, он сформировал банду и занимался разбоем.\n\nБежав в Сингапур в 1907 году, Ли вступил в Тунмэнхой и участвовал в неудачном восстании Хуан Минтана. Участвуя в Синьхайской революции, Ли решил присоединиться к Лун Цзигуану в 1913 году и пользовался особой благосклонностью Юань Шикая. С поражением Луна в 1916 году Ли затем присоединился к Старой клике Гуанси, а в 1920 году перебежал к Сунь Ятсену и Гуандунской армии.\n\nСражаясь под началом Чэнь Цзюнмина, он присоединился к Суню во время войн Юэ-Гуй и последующих экспедиций, став начальником полиции Гуанчжоу и даже мэром. В 1925 году он сражался против Лю Чжэньхуаня и Ян Симиня, а позже в том же году стал командиром Пятой армии НРА. В основном оставаясь в тылу во время Северного похода, прославленная пестрая банда разбойников Ли быстро распалась после немецкого вторжения в Гуанчжоу в 1927 году, а сам Ли быстро «ушел в отставку».\n\nОставшись со значительной собственностью в Гонконге и Гуанчжоу, Ли стал одним из уважаемых местных шэньши и, получив своеобразные предложения от своих старых друзей в Гуандуне, снова получил армейское назначение.§!\n\n§YЗаметки: Склонный к растрате средств, участию в контрабанде и в остальном лишенный военных навыков, качества Ли заключаются в его способности вербовать, патриотизме и относительном благодушии.§!"

 #杨希闵
 GXC_yang_ximin: "Ян Симинь"
 GXC_yang_ximin_army_chief_desc: "§YРодился:§! §L1886, в Биньчуане, провинция Юньнань, Великая Цин§!\n§YПринадлежность:§! §mКлика политической науки§!\n§YБиография:§! §LСын крестьянской семьи, Ян Симинь поступил в Юньнаньскую военную академию в 1909 году и участвовал в Восстании двойной девятки, а затем в Сычуаньской кампании. В 1912 году он поступил в Цзянсийскую военную академию и участвовал во Второй революции. В конечном итоге вернувшись в Юньнань, он сражался в Войне в защиту конституции под началом Цай Э. Отправленный в качестве подчиненного Гу Пиньчжэня в Сычуань, он участвовал в перевороте 1920-х годов против Тан Цзияо, и после смерти Гу Ян и оставшиеся заговорщики отступили в Гуйчжоу, а затем в Гуандун.\n\nПоскольку Юньнаньская армия в Гуандуне разделилась между избранием Лу Дао или Яна в качестве замены главнокомандующему, Ян был назначен исполняющим обязанности командующего и сражался против Чэнь Цзюнмина от имени Сунь Ятсена. После захвата Гуанчжоу Ян стал местным милитаристом для финансирования своей армии, что привело к безжалостному распространению коррупции в его рядах.\n\nУпорно сражаясь против восстания Шэнь Хунъина и их союзников из Чжили, Ян вышел победителем. Выступая против Реорганизации Гоминьдана и создания Вампу, он участвовал в антигоминьдановском заговоре 1925 года с Лю Чжэньхуанем и другими, будучи немедленно смещенным. Переехав в изгнание в Гонконг, Ян был снова нанят Чэнь Ляньбо для наращивания его военной мощи.§!\n\n§YЗаметки: Уроженцы Юэ относятся к Яну сурово за его обращение с ними в прошлом десятилетии.§!"

 #林正煊
 GXC_lin_zhengxuan: "Линь Чжэнсюань"
 GXC_lin_zhengxuan_sic_desc: "§YРодился:§! §L1883, в уезде Учуань, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §mКлика политической науки§!\n§YБиография:§! §LСдав имперский экзамен, Линь Чжэнсюань получил образование в Высшей школе Гуандун-Гуанси и служил в Гуандунском провинциальном совете в качестве провинциального сенатора в 1911 году и даже директором Тунмэнхоя Гуандуна в 1912 году. Служа в Войне в защиту республики в качестве помощника Ян Юнтая, Цай Э и Сюн Кэу, он вернулся, чтобы стать спикером Провинциального парламента Гуандуна.\n\nПредставляя Цэнь Чуньсюаня, он сотрудничал с доктором Сунем для борьбы с Чэнь Цзюнмином, хотя и был изгнан Чэнь Цзюнмином после Первой войны Юэ-Гуй. Уйдя в изгнание в Шанхай, он объявил ассамблею приостановленной, только чтобы вернуться в январе 1923 года после захвата Шэнь Хунъином части Гуанчжоу. Вновь войдя в Провинциальную ассамблею, он объявил ее возобновленной, вновь возглавив ее в качестве спикера. После восстания Шэнь Хунъина Линь вместе с остальной частью Клики политической науки бежал из Гуанчжоу.\n\nНазначенный во временный сенат Дуань Цижуя в 1925 году, он вернулся в Гуандун с падением Северного похода, заняв видное место на политической сцене Гуанчжоу. Помогая в переговорах с различными чиновниками Бэйяна и обеспечивая хотя бы молчаливое спокойствие с Шэнь Хунъином и Линь Ху, Линь стал незаменимым в политике Гуандуна.§!\n\n§YЗаметки: Вместе с Ян Симинем и Лю Чжэньхуанем троица образует местное провинциальное отделение конфедератов КПН, и, как и Лю, он благосклонен к демократам Третьей партии.§!"

 #黄大伟
 GXC_huang_dawei: "Хуан Давэй"
 GXC_huang_dawei_high_command_desc: "§YРодился:§! §L1886, в уезде Хуанпи, провинция Хубэй, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LОкончив Королевскую военную академию в Бельгии и Университет Мэйдзи в Японии, Хуан Давэй вступил в Тунмэнхой во время своего пребывания в Европе и вернулся в 1911 году, чтобы сражаться в Синьхайской революции. Служа военным офицером Временного президентского дворца в Нанкине, он был произведен в полковники армейской артиллерии и генерал-майоры в 1912 году. В 1917 году он служил офицером Офиса генералиссимуса во время Правительства защиты конституции, а в 1920 году служил командиром первого маршрута Гуандунской армии.\n\nВ 1922 году он служил в прерванном Северном походе, но после Инцидента 16 июня Чэнь Цзюнмина он повел свои войска отступать в Фуцзянь с Сюй Чунчжи и стал местным милитаристом Чаошаня и главнокомандующим силами на границе Фуцзянь-Гуандун. Позже в том же году он служил командиром первой армии под началом Сюй Чунчжи, а в 1923 году был повышен Офисом генерала Бэйяна.\n\nВ начале 1923 года Хуан переметнулся из просуньского лагеря к Чэнь Цзюнмину и служил командиром 7-й армии Чэнь Цзюнмина и директором пограничной обороны Чаошаня. С июля 1923 по февраль 1924 года он вместе с Лай Шихуаном, Лю Чжилу, Линь Ху и Ван Сяньчэнем создал Правительство офиса объединенных сил в Чжанчжоу, Фуцзянь. Распавшись в 1924 году из-за дезертирства и наступления просуньских сил, он бежал в Гонконг с остальными союзниками Чэнь Цзюнмина. Вернувшись в 1927 году под наем Чэнь Ляньбо, он борется с Хун Чжаолинем за контроль над регионом Чаошань.§!\n\n§YЗаметки: Известен высокомерием и неподчинением приказам из-за эго.§!"

 #杨池生
 GXC_yang_chisheng: "Ян Чисэн"
 GXC_yang_chisheng_commander_desc: "§YРодился:§! §L1891, в уезде Шипин, провинция Юньнань, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LОкончив кавалерийский факультет Юньнаньской военной академии, и будучи близким другом Ян Жусюаня, Ян Чисэн участвовал в Восстании двойной девятки и Войне в защиту республики. Сражаясь под началом Цай Э, он был произведен в 1917 году в командиры полка в Хугоцзюнь, а позже в командиры бригады. Поддержав переворот Гу Пиньчжэня против Тана, он был изгнан из Юньнани и оказался в составе Юньнаньской армии в Гуандуне. Работая с Ян Симинем и Ян Жусюанем, чтобы исключить Чжан Кайжу из власти, он избрал Симиня главнокомандующим Юньнаньской армии в Гуандуне.\n\nСражаясь против Чэнь Цзюнмина от имени Гоминьдана, он в конечном итоге был снят со своей должности в 1925 году как командир дивизии и изгнан из Гуандуна из-за сотрудничества с У Пэйфу и Чжилийской кликой. Сотрудничая отчасти из-за маневров Ян Симиня, он затем полностью переметнулся и служил командиром 1-й дивизии Юньнаньской армии под началом У Пэйфу и командиром гарнизона южной Цзянси.\n\nВо время Северного похода он сражался против 4-й, 7-й и 14-й армий Национально-революционной армии в Цзянси, успешно торжествуя, когда Национально-революционная армия рухнула. Перейдя в Гуандун в погоне за отступающей НРА, Ян оказался в сфере контроля Шэнь Хунъина как милитарист своего собственного калибра с Ян Жусюанем. Имея напряженные отношения с самим Шэнем, Ян держит дистанцию с фракцией Армии Шэня, формируя свою собственную субклику с Ян Жусюанем, застряв между молотом и наковальней.§!"

 #楊如軒
 GXC_yang_ruxuan: "Ян Жусюань"
 GXC_yang_ruxuan_high_command_desc: "§YРодился:§! §L1895, в уезде Биньчуань, провинция Юньнань, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LВступив в армию вместо своего брата, Ян Жусюань поступил в Юньнаньскую военную академию как одноклассник Чжу Дэ, Чжу Пэйдэ, Цзинь Хандина, Ян Чисэна, Фань Шишэна и других. Приглашенный учиться в специальном классе с 99 другими, он участвовал в Восстании двойной девятки как член Тунмэнхоя. Окончив ее в 1913 году, он участвовал в подготовке к Войне в защиту республики и сражался под началом первой армии Цай Э в шестом полку под командованием Чжу Дэ. Храбро и яростно сражаясь, он был серьезно ранен и повышен за свои заслуги.\n\nУчаствуя в попытке переворота Гу Пиньчжэня в 1920 году, он сражался с бандитами в Южной Юньнани, эффективно уничтожая их. По просьбе Сунь Ятсена изгнанники Юньнаньской армии отправились из Гуйчжоу в Гуандун, чтобы сражаться против Чэнь Цзюнмина, а затем против армии Гуанси под руководством Шэнь Хунъина. Назначенный командиром Второй дивизии Юньнаньской армии в Гуандуне, с Чисэном в качестве командира Первой дивизии, он был оскорблен Ян Симинем и начал общение с У Пэйфу.\n\nВыставленные Ян Симинем как потенциальные перебежчики к У Пэйфу, Жусюань и Чисэн были уволены Сунь Ятсеном, а затем переметнулись к У должным образом как командиры Юньнаньской армии под началом Чжили. Сражаясь против Национально-революционной армии, с ним связался Чжу Пэйдэ, чтобы он переметнулся, но в конечном итоге он отказался после неудач Гоминьдана на поле боя. Влившись в Гуандун в погоне за Гоминьданом, он сформировал субклику с Ян Чисэном в зоне контроля Шэнь Хунъина.§!\n\n§YЗаметки: Он сочувствует революционерам.§!"

 #李慶文
 GXC_li_qingwen: "Ли Цинвэнь"
 GXC_li_qingwen_navy_chief_desc: "§YРодился:§! §Lв городе Маомин, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LВ 1905 году Ли Цинвэнь был принят в первый класс средней школы Гаочжоу, а после окончания был принят в 15-й класс Военно-морской академии Хуанпу в 1911 году. Служа в ВМС Гуандуна после окончания в 1916 году, он служил добросовестно и в 1927 году был повышен до заместителя командующего береговой обороной Гуандуна и заместителя командующего Первым флотом. В 1932 году он служил заместителем директора Военно-морского департамента штаба Гуандунской армии и заместителем командующего Провинциальным флотом с Тан Тингуаном в качестве командующего. В 1935 году он стал начальником штаба Гуандунского флота и служит командующим флотом речной обороны Гуандуна наряду с директором Военно-морской школы Хуанпу.§!"

 #湯廷光
 GXC_tang_tingguang: "Тан Тингуан"
 GXC_tang_tingguang_navy_chief_desc: "§YРодился:§! §L1865, в уезде Хуасянь, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LОкончив Военно-морскую академию Хуанпу, Тан Тингуан был отправлен изучать флот в Великобританию. Вернувшись в Китай, он сражался в японо-китайской войне в 1894 году капитаном корабля Динъюань. За свои заслуги на службе он был произведен в военно-морские командиры и служил капитаном крейсера Хайчэнь. Назначенный капитаном военного корабля Хайци в 1909 году, он сопровождал Чэн Бигуана в качестве представителей на коронацию Георга V Английского, а позже посетил Белый дом и встретился с президентом Тафтом.\n\nНагражденный медалью Юань Шикая в 1913 году, он последовал за Чэн Бигуаном и другими морскими офицерами в Правительство защиты конституции в 1917 году и был назначен Сунь Ятсеном военным офицером в Офис генералиссимуса, а затем заместителем министра ВМС. Сражаясь с кликой Гуанси в 1919 году, он стал губернатором Гуандуна во время временного хаоса и передал эту должность Гуандунской армии. Был вознагражден должностью министра ВМС нового правительства.\n\nВо время Инцидента 16 июня он написал открытое письмо с Вэй Банпином и Е Цзюем с требованием прекратить боевые действия, но его подчиненные решительно поддержали Сунь Ятсена, и он ушел в отставку в сентябре. Назначенный Чэнь Сижу обратно на должность, он остался, когда Сунь Ятсен вернулся в 1923 году. С 1925 года он ушел в отставку и работал в своем местном уезде, прежде чем был снова призван Чэнь Ляньбо служить министром ВМС в его провинциальном правительстве.§!"

 #周天禄
 GXC_zhou_tianlu: "Чжоу Тяньлу"
 GXC_zhou_tianlu_high_command_desc: "§YРодился:§! §Lв провинции Гуанси, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LПодчиненный Чэнь Цзюнмина и бывший член Старой клики Гуанси, Чжоу Тяньлу был ярым сторонником использования морских мин во время Инцидента 16 июня и сохранил свою квалификацию и предпочтение тактике морского минирования на протяжении всей своей дальнейшей службы в ВМС Гуандуна. От Чэнь Цзюнмина до изгнания и Чэнь Ляньбо, Чжоу продолжал свою службу независимо ни от чего, кроме революционной политики.§!"

 #魏邦平
 GXC_wei_bangping: "Вэй Банпин"
 GXC_wei_bangping_high_command_desc: "§YРодился:§! §L1884, в уезде Сяншань, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LПоследовав за своим отцом в Японию в возрасте 13 лет, Вэй Банпин учился в Кобе, прежде чем поступить в Сикан Гакко для изучения военного дела. Рекомендованный для получения официального финансирования, он учился на кавалерийском факультете Японской военной академии и вернулся в Китай в 1909 году после окончания. Служа инструктором в Военной академии Гуандуна, участвовал в Синьхайской революции с отличием. Командир в Гуандунской армии и директор полицейского департамента, Вэй был изгнан из-за Лун Цзигуана.\n\nВ 1915 году Вэй сражался в Войне в защиту республики на стороне Цай Э и победил силы Лун Цзигуана в Гуандуне, став главнокомандующим 5-й Армии национальной защиты под началом Мо Жунсиня. Видя, что Старая клика Гуанси противостоит Сунь Ятсену, он попытался уйти в отставку, но был удержан Чжу Цинланем. Служа с Ян Юнтаем, он работал в Муниципальном офисе Гуанчжоу, а в 1920 году начал восстание в поддержку Чэнь Цзюнмина с Ли Фулинем против Мо Жунсиня. Продолжая сражаться с армией Гуанси, он стал командиром гарнизона Гуанчжоу.\n\nСопроводив Сунь Ятсена в безопасное место накануне Инцидента 16 июня, он также сумел воссоединить Сунь Цинлин с ее мужем и стал правящим членом правительства Гоминьдана 1923 года вместе с Ху Ханьминем, Ли Лецзюнем, Сюй Чунчжи и Цзоу Лу. Задержанный и смещенный Шэнь Хунъином и Ян Симинем, он был освобожден благодаря вмешательству Суня. Уйдя в отставку в том же году, он подозревался в деле Ляо Чжункайя и ушел в изгнание в Японию. Вернувшись в 1931 году по просьбе Чэнь Ляньбо служить директором Полицейского департамента Гуанчжоу, он по-прежнему питает теплые чувства к Гоминьдану и является известным соратником Чэнь Цзитана.§!\n\n§YЗаметки: Он последовательно отказывался вступать в Гоминьдан, настаивая на том, что «у военных нет партии».§!"

 #丁穎
 GXC_ding_ying: "Дин Ин"
 GXC_ding_ying_advisor_desc: "§YРодился:§! §L25 ноября 1888 года в городе Гаочжоу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LПоскольку его отец считал, что бедняки часто подвергаются жестокому обращению со стороны шэньши из-за необразованности, Дин Ин был отправлен в частную школу, первым в своей семье. Преуспевая в школе, он познакомился с революционными идеалами в своем учреждении и активно вступал в студенческие группы. Намереваясь изучать сельское хозяйство, чтобы улучшить жизнь фермеров, пропуск экзаменационного периода привел к его поступлению на факультет музееведения Гуандунского педагогического университета.\n\nУчась в Японии в 1912 году, он выучил японский язык и участвовал в публичных протестах под руководством китайских студентов в 1919 году. Вернувшись в том же году, он преподавал в местных школах, но вернулся в Японию в 1921 году, чтобы учиться в Токийском императорском университете. Получив степень бакалавра сельского хозяйства, он преподавал в Государственной сельскохозяйственной школе Гуандуна, позже в Национальном университете Сунь Ятсена, Колледж сельского хозяйства. Создав экспериментальные рисоводческие фермы, он вывел в общей сложности 110 сортов риса, а в 1934 году получил первый в мире гибридный сорт риса с диким рисом.\n\nБлагодаря усилиям Дина Гуандун стал центром селекции риса в Южном Китае, а сам он считается кем-то вроде местной иконы и знаменитости.§!\n\n§YЗаметки: Ведет особенно простую и скромную жизнь, жизнь столь же самоотверженную, сколь и философскую.§!"

 #淩鴻勛
 GXC_ling_hongxun: "Лин Хунсюнь"
 GXC_ling_hongxun_advisor_desc: "§YРодился:§! §L15 апреля 1894 года в уезде Паньюй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LОбучаясь у матери и изучая классику с дядей, в 1910 году Лин Хунсюнь был принят в Шанхайскую высшую промышленную школу Министерства почт и коммуникаций на государственное обучение. Изучая английский язык, он был переведен в младший колледж по специальности гражданское строительство. После Синьхайской революции он отрезал косу и участвовал в различных студенческих спортивных ассоциациях. В 1915 году он окончил учебу и был рекомендован для прохождения стажировки в American Bridge Company в Нью-Йорке, учился в Колумбийском университете, а также участвовал в Ассоциации китайских выпускников Нью-Йорка.\n\nВ 1918 году он был назначен государственным служащим Цзинфэнской железной дороги благодаря семейным связям, и с этого момента начался его интерес к китайским железным дорогам. Выполняя разную работу, он стал исполняющим обязанности администратора Национального университета Цзяотун и вернулся на железную дорогу Пекин-Ханькоу, чтобы строить мост через Желтую реку. Главный инженер Министерства коммуникаций, он был уволен Гао Эньхуном в 1922 году и преподавал в Наньянском университете на полную ставку. В 1924 году он стал президентом университета и оставался на этой должности до 1927 года.\n\nПо приглашению правительства Гуанси он отправился в Учжоу, чтобы служить директором Бюро общественных работ, налаживая связи со Старой кликой Гуанси. В 1929 году он вернулся на службу в Министерство железных дорог Центрального правительства, прежде чем вернуться в Лянгуан, чтобы сосредоточиться на строительстве местных провинциальных железных дорог.§!"

 #丁纪徐
 GXC_ding_jixu: "Дин Цзисюй"
 GXC_ding_jixu_air_chief_desc: "§YРодился:§! §L1902, в Дунгуане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LОкончив среднюю школу Пэйин в Гуанчжоу, Дин Цзисюй отправился во Францию изучать медицину, прежде чем переехать в Германию изучать авиацию. После окончания учебы он женился на немке и вернулся в Гуандун в 1926 году со своей семьей. Сначала работая в Арсенале Шицзин в Гуанчжоу, он позже служил главным летным инструктором в Авиационной школе Гуандуна. В феврале 1927 года он был снова отправлен во Францию на учебу и вернулся в Гуанчжоу в начале декабря в совершенно другую провинцию. Вернувшись в авиационную школу в качестве директора полетов, он стал полковником ВВС провинции Гуандун, а позже капитаном в штабе ВВС Гуандуна.§!\n\n§YЗаметки: Не особо интересуется политикой.§!"

## Neutral

 #馮璜
 GXC_feng_huang: "Фэн Хуан"
 GXC_feng_huang_air_chief_desc: "§YРодился:§! §L8 октября 1900 года в уезде Жун, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LСын фермера, он поступил в частную школу в 1907 году, в начальную школу Наньхэ в 1912 году, а затем бросил учебу в последнем семестре шестого класса из-за проблем с финансированием. Его отец продолжал позволять ему учиться в свободное время, надеясь, что он станет врачом в будущем. Однако вместо этого он был принят в Образцовый батальон Ма Сяоцзюня армии Гуанси в качестве кадета. В 1918 году он закончил учебу и служил командиром отделения, позже будучи переведенным во Вторую роту Ся Вэя в качестве сержанта-клерка. В 1919 году он был повышен до командира взвода и принят в Военную академию Гуанси. Видя плавную серию повышений в течение 1920-х годов, он сражался в Северном походе в 7-й армии Национально-революционной армии Новой клики Гуанси.\n\nДостаточно молодой, чтобы выжить невредимым, Фэн влился в новую армию Старой клики Гуанси, и в 1927 году был отправлен в школу Сейджо в Токио изучать японский язык. С 1928 по 1930 год он учился в Армейской пехотной школе в Японии и вернулся в Китай в 1931 году, чтобы служить в Первой армии Главного штаба армии Гуанси. В 1933 году он служил капитаном студентов Авиационного департамента Главного штаба армии Гуанси и главой отдела общих дел. В следующем году он был назначен заместителем директора Авиационного департамента Гуанси, а затем вице-президентом Авиационной школы Гуанси.§!\n\n§YЗаметки: Молодой офицер гвардии с живым интересом и способностями к авиации, его не заботит фракционная политика.§!"

 #李浴日
 GXC_li_yuri: "Ли Юйжи"
 GXC_li_yuri_theorist_desc: "§YРодился:§! §L12 апреля 1908 года в уезде Хайкан, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LИзвестный военный теоретик в рядах Цзян Байли, Ли Эркана, Ян Цзе или Тан Цзайли, Ли Юйжи принадлежит к молодому поколению китайских теоретиков. Учась в старшей школе Гуандунской провинциальной средней школы № 1 в Гуанчжоу, он служил военным инструктором в Вампу, прежде чем был задержан в Гуанчжоу в 1927 году. Освобожденный после краха Гоминьдана и передачи немецкого контроля администрации Чэнь Ляньбо, он посещал Национальный университет Цзинань в Шанхае. После окончания он отправился в Японию учиться на факультете политических наук Университета Тюо в Японии. После Шанхайского восстания 1932 года Ли участвовал в пропаганде и протестах после жестокого подавления революционеров Ци Сеюанем.\n\nВернувшись в свой родной город, он служил директором его бюро образования, а в 1933 году отправился в Ассоциацию гражданского образования уезда Дин в провинции Хэбэй и продолжил обучение в Японии. Собрав свои широкие военные теории, он недавно опубликовал черновик своего «Всестороннего исследования искусства войны Сунь-цзы», и после окончания Центрального университета в Японии в 1937 году был приглашен курировать модернизацию вооруженных сил Гуандуна и строительство новой военной академии в Гуандуне.§!\n\n§YЗаметки: Полностью преданный военной науке, он очень мало заботится о политике, кроме национализма.§!"

###- Theorists -###
 #張子柱
 GXC_zhang_zizhu: "Чжан Цзычжу"
 GXC_zhang_zizhu_leader_desc: "§YРодился:§! §L1896, в районе Синьхуэй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LХотя он рос, изучая шелководство, после Синьхайской революции Чжан отрезал косу, еще учась в школе, и начал работать учителем, сотрудником полиции, репортером и сборщиком налогов. Протеже Ян Юнтая, тогдашнего директора провинциальных финансов Гуандуна, он был рекомендован в офис уезда Синьхуэй, который спонсировал его обучение за границей во Франции в 1920 году. Там он поступил в Парижский университет, изучая экономику, и стал соучредителем «Herald Weekly» с Ху Говэем. В 1924 году он помог основать Младокитайскую партию вместе с Цзэн Ци, Ли Хуаном и другими и был избран их директором по пропаганде. После возвращения в Китай он преподавал экономику в Шанхайском университете Дася, Университете Хосэй и Уханьском университете Чжунхуа. Он также ненадолго ездил в Юньнань, чтобы работать старшим советником Тан Цзияо, помогая руководить недавно созданным колледжем Миньчжи, а также преподавал в Университете Дунлу и работал политическим инструктором в Куньминской военной академии.\n\nПосле периода преподавания зарубежным китайцам во Вьетнаме он вернулся в Китай в 1928 году, чтобы преподавать и писать в Гонконге. Он также занимал различные должности в гражданских организациях Кантона и мелкие правительственные должности. Поскольку большинство высшего руководства МКП базируется на Севере, Чжан был свободен управлять южными делами так, как считает нужным.§!"

 GXC_RUS_theorist: "Российская военная миссия"
 GXC_RUS_theorist_desc: "§YПредыстория:§! §LВ соответствии с договоренностями, достигнутыми между правительствами России и Лянгуана, множество российских военных советников было отправлено для помощи в развитии Национально-революционной армии и возрождении академии Вампу. Номинально возглавляемая русским ветераном Петром фон Глазенапом, служащим главным связующим звеном между Россией и Китаем, миссия направлена на интеграцию современных российских методов на поля сражений Китая.\n\nДругими ключевыми фигурами в миссии являются Георгий Эльфенгрен, идеологический организатор армии, стремящийся подчеркнуть идеологическую чистоту в войне, и Всеволод Иванов, знаменитый кавалерийский чтец, писатель и известный евразиец, который намерен привить китайскому солдату мышление «Тотальной войны». Номинально аполитичная военная миссия, члены миссии рассматривают себя вне политических дрязг Гоминьдана и почти полностью сосредоточены на военных аспектах китайского революционного дела.§!"

 GXC_mission_militaire: "МВМК — Лянгуанское отделение"
 GXC_mission_militaire_theorist_desc: "§YЛянгуанское отделение Международной военной миссии в Китае§!\n§YПредыстория:§! §LРазвернутая в Китае Третьим Интернационалом после Войны Лиги, МВМК является эволюцией предыдущих социалистических усилий по помощи китайской революции. Изначально состоявшая из красных русских эмигрантов, бежавших от гражданской войны и отправленных на помощь доктору Суню в 1924 году, с тех пор она привлекла офицеров со всего социалистического мира в рамках международных усилий, подобающих ее спонсорам.\n\nНынешним главой Миссии является француз Андре Мальро, который выполняет двойную роль: советника Национально-революционной армии и ее популяризатора на родине. Среди других фигур — Дэвид Рамсей из Британии, Манабендра Нат (М.Н.) Рой из Индии, Жан Фонтенуа из Франции, Ингвальд Берентин Осе из Норвегии и Яков Рудник (Поль Рюгг) с Украины.\n\nСмесь политических и военных офицеров, их мотивы разнятся. Некоторых влечет азарт приключений на другом конце света, других — заманчивая перспектива славы и продвижения по службе, которых они не могли бы достичь дома. Некоторые просто хотят исполнить интернациональный долг, в то время как другие питают слабость к ориентализму.\n\nМногие молодые офицеры НРА, особенно те, кто обучался за границей или сочувствует синдикализму, весьма любят своих инструкторов из МВМК. Однако они вызвали критику за свою готовность участвовать в китайской политике, что рассматривается многими в Старой гвардии как неправомерное вмешательство во внутренние дела. МВМК, с другой стороны, считают себя необходимым противовесом реакционным влияниям в высшем командовании НРА.§!"

 GXC_german_military_mission: "Немецкая военная миссия"
 GXC_german_military_mission_theorist_desc: "§YПредыстория:§! §LОпираясь на опыт Китайско-германской военной миссии 1920-х и 1930-х годов, растет число прогерманских кадетов и офицеров, получивших образование в академиях Европы, которые обеспечили благодатную почву для дальнейшего возобновления китайско-германского сотрудничества. В то время как первоначальная Китайско-германская военная миссия была реализована довольно скупо в регионах за пределами Лиги восьми провинций, несомненно, были извлечены тяжелые уроки относительно пределов, в которых немцы могут проявлять себя в китайских военно-политических сферах.\n\nВ значительной степени ограничиваясь молчаливым давлением в политике, обновленная Китайско-германская военная миссия фокусируется в основном на сфере войны, привнося с собой подходы ведущих военных групп Германии: тотальную войну, механизацию и мобильность или усовершенствование проверенных методов прошлой Мировой войны. В любом случае, возобновление присутствия немецких офицеров в китайских штабах может стать знаком новой зари для китайского военного дела.§!"

