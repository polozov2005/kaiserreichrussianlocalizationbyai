 GXC_awaken_the_peoples_consciousness_effect_tt: "§YОппозиция Гуандунской провинциальной фермерской ассоциации Пэн Пая многочисленна внутри левой сферы. Вы потеряете стабильность пропорционально тому, сколько влияния §SСоциал-демократов§! и §rСиндикалистов§! у вас было.§!"

 GXC_the_third_party_prevails_effect_tt: "§YОппоненты Тань Пиншаня никогда не сдаются, и их кинжалы всегда обнажены. Вы потеряете стабильность пропорционально тому, сколько влияния §SСоциал-демократов§! и §RРадикальных социалистов§! у вас было.§!"

 GXC_sunset_of_the_white_sun_effect_tt: "§YОкруженная со всех сторон радикалами, умеренная позиция Партии производящего народа неизбежно спровоцирует конфликт. Вы потеряете стабильность пропорционально тому, сколько влияния §RРадикальных социалистов§! и §rСиндикалистов§! у вас было.§!"

 GXC_expel_the_landlords_tt: "§YМы избавим Китай от его величайших воров, Помещики и Злые Джентри будут бояться, что когда-либо обидели Китайского Крестьянина! Вы получите политическую власть и потеряете стабильность пропорционально тому, сколько влияния §OСоциал-либералов§!, §mРыночных либералов§!, §cСоциал-консерваторов§!, §gАвторитарных демократов§! и §PПатерналистов-автократов§! у вас было.§!"

 GXC_mass_collectivisation_efforts_tt: "§CВзятие этого фокуса разблокирует решения для §Yувеличения количества наших ячеек для строительства§! во всех китайских провинциях!§!"

