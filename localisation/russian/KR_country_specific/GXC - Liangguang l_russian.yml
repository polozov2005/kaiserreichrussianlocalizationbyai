## Yue Clique (YUE)

 #陳炯明
 GXC_chen_jiongming: "Чэнь Цзюнмин"
 GXC_chen_jiongming_bio: "Изначально будучи юристом, Чэнь вошел в политику как член недолговечной Гуандунской провинциальной ассамблеи, сформированной в 1909 году. Чэнь быстро сделал себе имя успешного и полного энтузиазма, хотя и радикального, реформатора, а его республиканские и антицинские наклонности были открытым секретом для местных чиновников.\n\nКогда в 1911 году началась Синьхайская революция, Чэнь, будучи членом Революционного альянса, стал командующим Гуандунской армией и сыграл важную роль, помогая Сунь Ятсену из Гоминьдана организовать Движение в защиту конституции. Однако у этих двух мужчин возникло ожесточенное соперничество из-за идеологических разногласий, которое выплеснулось наружу в 1922 году, когда Чэнь восстал против Суня. Центральный комитет Гоминьдана так и не простил Чэню его «предательство», что обеспечило серьезную напряженность между двумя наиболее видными республиканскими движениями в Китае.\n\nКогда Северный поход Гоминьдана захлебнулся из-за вмешательства Германии, Чэнь Цзюнмин вышел из своего изгнания в Гонконге, присоединившись к своему старому другу Чэнь Ляньбо, который стал мэром после вывода немецких войск из Гуанчжоу. Отказавшись от какой-либо военной должности, Чэнь Цзюнмин вместо этого добился места в Гуандунской ассамблее.\n\nПосле Шанхайского восстания 1932 года и резни многие либералы бежали из Лиги Сунь Чуаньфана, и Чэнь приветствовал многих в Гуанчжоу. Хотя ситуация в Китае остается мрачной, Чэнь сохраняет надежду, что Китай сможет обрести свободу и мир, в которых он так отчаянно нуждается."
 GXC_chen_jiongming_leader_desc: "§YРодился:§! §L18 января 1878 года, в Хайфэне, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_chen_jiongming_bio$§!"
 GXC_chen_jiongming_advisor_desc: "§YРодился:§! §L18 января 1878 года, в Хайфэне, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §lПартия общественных интересов§!\n§YБиография:§! §L$GXC_chen_jiongming_bio$§!\n\n§YЗаметки: Как основатель ПОИ, Чэнь многими считается лидером федералистского движения.§!"

 #葉舉
 GXC_ye_ju: "Е Цзюй"
 GXC_ye_ju_bio: "Е Цзюй начал свою карьеру, окончив первый класс Военной академии Гуандуна. Стремясь к карьере в военном образовании, Е Цзюй служил преподавателем в академии, а также в Академии права и политики. Во время Синьхайской революции он участвовал в организации Гуандунской армии Северного похода, служа начальником штаба ее Третьей смешанной бригады, а затем командиром 1-й бригады 2-й дивизии.\n\nПрисоединившись к Чэнь Цзюнмину после Революции 1913 года, он и Чэнь завязали дружбу на всю жизнь. Е Цзюй последовал за Чэнем в Фуцзянь и стал его начальником штаба во время Движения в защиту конституции в 1918 году, а в 1920 году вернулся в Гуандун. В 1922 году, когда Сунь и Чэнь поссорились, Е приказал своим войскам обстрелять Президентский дворец Суня. Заслужив вечную ненависть Суня и Гоминьдана, Е Цзюй участвовал в различных конфликтах против Гоминьдана на стороне Чэня, пока они не были побеждены и вынуждены бежать в Гонконг.\n\nКогда Северный поход начал распадаться, Е Цзюй вернул Хайфэн в хаосе, управляя им как своим феодальным владением. Координируясь с Чэнь Цзюнмином в Гуанчжоу, Е Цзюй создал небольшую сеть альянсов в Восточном Гуандуне и вступает в ограниченное сотрудничество с силами Чэнь Ляньбо в Гуанчжоу."
 GXC_ye_ju_leader_desc: "§YРодился:§! §L1881, в уезде Хуэйян, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_ye_ju_bio$§!"
 GXC_ye_ju_army_chief_desc: "§YРодился:§! §L1881, в уезде Хуэйян, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gКлика армии Юэ§!\n§YБиография:§! §L$GXC_ye_ju_bio$§!\n\n§YЗаметки: Как правая рука Чэнь Цзюнмина в военных делах, его преданность делу федерализма неоспорима, хотя его искренняя вера остается под вопросом.§!"

 #罗献祥
 GXC_luo_xianxiang: "Ло Сяньсян"
 GXC_luo_xianxiang_commander_desc: "§YРодился:§! §L5 августа 1891 года, в уезде Сыхуэй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LЛо Сяньсян начал свою военную карьеру после окончания Военной академии Баодин в 1916 году, вступив в Гуандунскую армию. В последующие годы Ло служил командиром 17-го отряда Провинциальной оборонительной армии Гуандуна, адъютантом командования Четвертой маршрутной армии Гуандунской армии помощи Фуцзяни, командиром и заместителем командира Шестого пехотного полка Третьей бригады 13-й дивизии Гуандунской армии Чэнь Цзюнмина.\n\nВ 1924 году Ло был побежден Гоминьданом в Восточном походе и впоследствии был поглощен Национально-революционной армией. Служа командиром гарнизона в Гуанчжоу, Ло был побежден немецкими интервенционными силами. После того как Германская империя покинула Гуанчжоу, Ло был завербован силами Чэнь Ляньбо в Гуанчжоу, чтобы уберечь город от падения в анархию. Ло недолго служил магистратом уезда Яншань в 1932 и 1933 годах и прославился своими образовательными и административными реформами и антикоррупционной политикой. В 1934 году Чэнь Ляньбо призвал его обратно на службу в качестве штабного офицера в силах обороны Гуанчжоу.§!\n\n§YЗаметки: Кадровый офицер, Ло не считается особо близким к какой-либо политической фракции и просто выполняет свой долг.§!"

 #馬育航
 GXC_ma_yuhang: "Ма Юйхан"
 GXC_ma_yuhang_sic_desc: "§YРодился:§! §L1881, в уезде Хайфэн, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §lПартия общественных интересов§!\n§YБиография:§! §LМа Юйхан участвовал в ранней революционной деятельности против Цин. Ма и Чэнь помогли создать Общество Чжэнци и участвовали в неудачном восстании Новой армии Гуандуна. Ма и Чэнь бежали в Гонконг, а затем обратно в Хайфэн. В Синьхайской революции Ма планировал логистику для восстания Хуанхуаган. В 1920 году Чэнь назначил Ма директором Финансового бюро Шаньтоу. В качестве директора по финансам Ма управлял логистикой и финансами Гуандунской армии, обеспечивая их хорошее снабжение. Когда Сунь и Чэнь поссорились в 1922 году, Ма был отправлен на переговоры с Ван Цзинвэем в Гонконг.\n\nЧэнь, пытаясь наладить контакт с Чжилийской кликой, отправил Ма на север для продвижения провинциальной автономии в Тяньцзине и Пекине. Позже в том же году Армия Юэ согласилась назначить Ма директором Департамента по политическим делам штаб-квартиры Гуандунской армии. Когда Гоминьдан разбил силы Чэнь Цзюнмина в Восточном походе, Ма уехал в Гонконг. Когда Северный поход рухнул, Ма сопровождал Чэня в Гуанчжоу, теперь под контролем Чэнь Ляньбо. Чэнь стал сенатором Ассамблеи Гуандуна, а Ма оставил своего друга, чтобы помогать администрации Е Цзюя в Хайфэне. Последнее десятилетие он помогал снабжать армии Е Цзюя, готовясь к дню, когда хрупкий баланс в Гуандуне рухнет.§!\n\n§YЗаметки: Как старейший и ближайший друг Чэнь Цзюнмина, нет сомнений, на чьей стороне симпатии Ма Юйхана.§!"

 #翁式亮
 GXC_weng_shiliang: "Вэн Шилян"
 GXC_weng_shiliang_high_command_desc: "§YРодился:§! §L1880, в уезде Хуэйян, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LОкончив Военную академию Гуандуна в Хуанпу, Вэн вступил в Тунмэнхой в 1910 году. Во время Синьхайской революции он повел своих людей на захват Хуэйчжоу. В декабре 1911 года он стал штабным офицером Чэнь Цзюнмина, губернатора Гуандуна. После революции Вэн был вознагражден должностью директора Военной академии Гуандуна в Хуанпу и стал генерал-майором республики. В декабре 1920 года он служил директором адъютантского отдела Гуандунской армии, а позже служил командиром второй независимой бригады Гуандунской армии.\n\nВ октябре 1921 года он повел свои войска для участия в кампании по подавлению старых милитаристов Гуанси и служил командиром левого крыла Армии помощи Гуанси Гуандунской армии и главнокомандующим авангардной армии Центральной армии. Когда Сунь и Чэнь поссорились, Вэн сплотил своих людей в поддержку Чэня. В последующие годы он сражался против Гоминьдана и был произведен Бэйянским правительством в генерал-лейтенанты. В 1924 году он покинул армию, чтобы заняться бизнесом в Гонконге. В 1932 году Чэнь Ляньбо вызвал Вэна из отставки, чтобы он служил директором сил обороны Гуанчжоу.§!\n\n§YЗаметки: Хотя когда-то он был полон революционных убеждений, Вэн теперь обременен старостью и растущим чувством усталости.§!"

 #熊略
 GXC_xiong_lue: "Сюн Люэ"
 GXC_xiong_lue_high_command_desc: "§YРодился:§! §L1889, в префектуре Цзяин, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gАрмия Юэ§!\n§YБиография:§! §LОкончив Военную академию Гуандуна в Хуанпу, Сюн вступил в Тунмэнхой в 1910 году. В раннюю республиканскую эпоху Сюн продвигался по служебной лестнице в Гуандунской армии, став командиром Восьмой маршрутной армии в 1916 году. В 1917 году Сюн присоединился к Чэнь Цзюнмину в Фуцзяни, сражаясь с Чжэцзянской армией. Во время 1-й войны Юэ-Гуй Сюн занял Чаоань, а во время 2-й войны Юэ-Гуй взял Учжоу. Когда Е Цзюй решил обстрелять Гуанчжоу во время растущего конфликта Суня с Чэнем, Сюн отвечал за командование осадой.\n\nНе желая убивать его, он сказал своим доверенным лицам передать Суню, чтобы тот бежал из города. В феврале 1923 года войска Сюна двинулись в Чжаоцин. В апреле войска Сюна и войска Ян Куньжу ожесточенно сражались с войсками Лю Чжэньхуаня в Шилуне и других местах. В июле Сюн повел свои войска на поддержку Даньшуя, вел кровопролитный бой день и ночь и отбросил коалиционные силы. В 1925 году Сюн был наголову разбит в Восточном походе и бежал в Гонконг. Когда силы Гоминьдана рухнули в Северном походе, Сюн последовал за Е Цзюем обратно в Гуандун, помогая ему вернуть Хайфэн. Сюн был расквартирован на севере на территориях Е Цзюя, наблюдая за любыми движениями Шэнь Хунъина, номинального губернатора Гуандуна.§!\n\n§YЗаметки: Ветеран Гуандунской армии Чэнь Цзюнмина, Сюн может считаться одним из более надежных сторонников Чэня.§!"

 #揚坤如
 GXC_yang_kunru: "Ян Куньжу"
 GXC_yang_kunru_high_command_desc: "§YРодился:§! §L1884, в уезде Болоу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gАрмия Юэ§!\n§YБиография:§! §LВоенная карьера Ян Куньжу началась в 1917 году, когда он был завербован в Старую клику Гуанси во время Войны в защиту конституции. Однако с расколом Движения в защиту конституции Ян перешел в Гуандунскую армию Чэнь Цзюнмина. Во время 1-й войны Юэ-Гуй он был произведен в командиры бригады, а во время 2-й войны Юэ-Гуй он возглавлял 5-ю дивизию при захвате Учжоу. После инцидента 16 июня Ян получил приказ от Чэнь Цзюнмина и Е Цзюя защищать Хуэйчжоу.\n\nВ 1923 году Ян был вытеснен из Хуэйчжоу в результате переворота при поддержке Ляо Чжункайя, возглавляемого Ло Фэнсяном, его начальником штаба. Ян предложил свои услуги Сюй Чунчжи, а затем отбил Хуэйчжоу у Ло. Однако когда Сунь умер, Ян поднял восстание против Военного правительства Гуанчжоу, вновь примкнув с Хуэйчжоу к Чэнь Цзюнмину. Чан Кайши отбил Хуэйчжоу, используя стратегию Ло Фэнсяна, и Ян бежал в Гонконг в одиночку. С поражением Северного похода Ян вернулся в Гуандун вместе с Е Цзюем. Е Цзюй собрал небольшую армию, чтобы вернуть Хайфэн, и назначил Яна обратно в Хуэйчжоу, где он продолжает дислоцироваться уже десять лет.§!\n\n§YЗаметки: Ян стремится лишь сохранить свое феодальное владение в Хуэйчжоу и сменит союзников, когда это будет необходимо, чтобы удержаться у власти.§!"

 #葛肇煌
 GXC_ge_zhaohuang: "Гэ Чжаохуан"
 GXC_ge_zhaohuang_high_command_desc: "§YРодился:§! §L1894, в уезде Боло, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gАрмия Юэ§!\n§YБиография:§! §LОтносительно поздний новичок на политической сцене Гуандуна, Гэ присоединился к 4-й армии Национально-революционной армии под командованием Чэнь Миншу в 1925 году. В следующем году он участвовал в Северном походе. Когда Гоминьдану грозило неизбежное поражение от рук немцев и Чжилийской клики, Гэ бросил националистов на произвол судьбы, бежав в город Гуанчжоу сразу после того, как немцы ушли, и Чэнь Ляньбо взял контроль.\n\nГэ присоединился к криминальному миру в качестве члена Юго-западной штаб-квартиры китайского Хунмэня «Пять континентов». За последнее десятилетие Гэ сделал себе имя в кантонском преступном мире, сотрудничая с властями в обмен на любую разведывательную информацию, которая могла быть у него под рукой. В частности, Гэ получал прибыль от сотрудничества с хайфэнским милитаристом Е Цзюем, поставляя ему оружие и расширяя свое влияние в Восточном Гуандуне.\n\n§YЗаметки:§! Коррумпированный, скрытный и националистичный, Гэ является убежденным антисоциалистом и не доверяет Берлину, при этом хвастаясь амбициями завоевателей.§!"

 #陈席儒
 GXC_chen_xiru: "Чэнь Сижу"
 GXC_chen_xiru_sic_desc: "§YРодился:§! §L1859, в уезде Сяншань, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §lПартия общественных интересов§!\n§YБиография:§! §LВторой сын зарубежного китайского бизнесмена Чэнь Фана, Чэнь Сижу нечасто жил между Гавайями и Гуандуном, вплоть до того, что был одноклассником Сунь Ятсена в возрасте 11 лет. Поступив в Йельский университет и встретив будущего первого премьер-министра Тан Шаои, Чэнь стал его близким другом и вернулся на Гавайи, чтобы помогать отцу в бизнесе. В 1890 году его отец вернулся в Гуандун, чтобы остепениться, и Сижу решил последовать за ним.\n\nПринятый Сунь Ятсеном, который учился в Гонконге, Чэнь профинансировал молодого Суня на один миллион гонконгских долларов и основал газету «China Daily». После выхода отца на пенсию Сижу унаследовал его бизнес-империю, работая генеральным менеджером пароходной компании Douglas и председателем Китайско-японского банка в Гонконге, наряду с сохранением множества инвестиций в Гуандуне.\n\nВо время прогрессивных кантонских правительств в Эру милитаристов Чэнь Сижу часто жертвовал большие суммы денег для помощи в их финансировании. Во время инцидента 16 июня 1922 года Чэнь Сижу был выдвинут Чэнь Цзюнмином в качестве потенциального губернатора провинции Гуандун, и после изгнания последнего Сижу последовал за ним в Гонконг. Все больше разочаровываясь в Цзюнмине, Сижу подумывал о том, чтобы бросить запоздалого бывшего милитариста, но остался с ним, финансируя Партию общественных интересов и устанавливая связи с Чэнь Ляньбо.§!\n\n§YЗаметки: Он имеет частые контакты с Тан Шаои.\nОн болен и особенно слаб, и Сижу сам готовится передать свою бизнес-империю своему выжившему сыну и дочери.§!"

 #陈其尤
 GXC_chen_qiyou: "Чэнь Цию"
 GXC_chen_qiyou_bio: "Родившийся в состоятельной семье на закате династии Цин, Чэнь Цию был одним из первых китайцев, познакомившихся с западными идеями через новую среднюю школу в Хайфэне. Чэнь был очарован революционным мучеником Цзоу Жуном и сильно сочувствовал революционному движению за свержение Цин. В 1909 году, изучая медицину, Чэнь встретил членов Тунмэнхоя и присоединился к движению в 1911 году.\n\nЧэнь участвовал в неудачном восстании Хуанхуаган, он помог убить Фэншаня, ханьского знаменного. Во время Синьхайской революции Чэнь помог взять Хуэйчжоу. После революции Чэнь Цзюнмин признал многообещающее будущее молодого человека и отправил его в Токийский университет Тюо изучать политическую экономику. По окончании учебы Чэнь пошел работать в финансовый департамент Бэйянского правительства. После того как Сунь Ятсен объявил Движение в защиту конституции и соперничающее правительство в Гуанчжоу, Чэнь покинул Пекин, чтобы работать на юге.\n\nВ качестве секретаря Армии Юэ Чэнь Цзюнмина Чэнь Цию оказался вовлечен во многие политические дела Чэнь Цзюнмина, став одним из основателей ПОИ. После возобновления политической карьеры Чэнь Цзюнмина после Северного похода Чэнь Цию сыграл важную роль в восстановлении влияния федералистов в Гуандуне, и поскольку стареющий лидер федералистов разменял седьмой десяток, его все чаще рассматривают как потенциального преемника своего наставника."
 GXC_chen_qiyou_leader_desc: "§YРодился:§! §L1892, в уезде Хайфэн, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_chen_qiyou_bio$§!"
 GXC_chen_qiyou_sic_desc: "§YРодился:§! §L1892, в уезде Хайфэн, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §lПартия общественных интересов§!\n§YБиография:§! §L$GXC_chen_qiyou_bio$§!\n\n§YЗаметки: Чэнь Цию помогал Партии общественных интересов идти в ногу со временем, поскольку новые демократические движения возникают по всему Китаю, вдыхая свежий воздух в стареющее федералистское движение.§!"

 #陈演生
 GXC_chen_yansheng: "Чэнь Яньшэн"
 GXC_chen_yansheng_sic_desc: "§YРодился:§! §L1875, в уезде Хайфэн, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §lПартия общественных интересов§!\n§YБиография:§! §L$GXC_chen_yansheng_bio$§!\n\n§YЗаметки: Обладая праведным и милосердным характером, Чэнь Яньшэн горд и стоек. Воплощая общественный девиз о том, что за каплю воды нужно отплатить родником, Чэнь будет бороться за свободный Китай, пока дышит.§!"

## Democratic Socialist Party (DSP)

 #張君勱
 GXC_zhang_junmai: "Чжан Цзюньмай"
 GXC_zhang_junmai_bio: "Поступив в Школу диалектов Гуандуна Цзяннаньского арсенала в Шанхае в 1899 году, Чжан Цзюньмай сдал экзамен уезда Баошань и стал ученым в 1902 году. В 1906 году он изучал политическую экономию в Университете Васэда в Японии в рамках студенческой программы Цин, и, находясь там, встретил своего наставника на всю жизнь Лян Цичао и своего близкого друга Чжан Дунсуня. В 1907 году он присоединился к Обществу политических новостей Ляна, а в 1910 году вернулся в Китай, сдав имперский экзамен по политическим наукам.\n\nВ 1912 году он организовал дискуссию о республиканском строительстве с Тан Хуалуном и работал над продвижением реформистских политических сил, пригласив Лян Цичао вернуться в Китай. Формально вступив в Демократическую партию и избрав Ляна лидером, он был отправлен в Германию по договоренности со своим наставником, получив докторскую степень по политическим наукам. Снова вернувшись в 1915 году по приглашению Ляна, он поддерживал Аньхойскую клику, но после поддержки Чжили в 1917 году вышел из правительств милитаристов.\n\nСтав связанным с Цзян Байли и Дин Вэньцзяном, Чжан учился у Анри Бергсона и сопровождал Ханса Дриша во время его пребывания в Китае. Печально известный тем, что вызвал дебаты о науке и метафизике в 1924 году, Чжан проникся ростом социализма в Китае и даже стал соучредителем журнала с основателем МКП Ли Хуаном. Оказавшись в кругу ближайшего окружения Сунь Чуаньфана, он основал свой Национальный институт политических наук в Нанкине. В конечном итоге подвергнутый чистке в 1932 году за связь с левыми делами, он сформировал Общество национального возрождения как левую секту Китайской конституционной партии."
 GXC_zhang_junmai_leader_desc: "§YРодился:§! §L18 января 1887 года, в уезде Цзядин, провинция Цзянсу, Великая Цин§!\n§YБиография:§! §L$GXC_zhang_junmai_bio$\n\nПосле участия в возрожденном федералистском правительстве Чэнь Цзюнмина Чжан смог обеспечить себе лидерство в Демократической лиге Китая и был возведен в должность президента. Убежденный социал-демократ с автократическими наклонностями, все взгляды прикованы к Чжану, пока он ведет Китай к неизведанному будущему.§!"
 GXC_zhang_junmai_advisor_desc: "§YРодился:§! §L18 января 1887 года, в уезде Цзядин, провинция Цзянсу, Великая Цин§!\n§YПринадлежность:§! §SДемократическая социалистическая партия§!\n§YБиография:§! §L$GXC_zhang_junmai_bio$§!\n\n§YЗаметки: Очарованный СДПГ в Германии, Чжан является воплощением социал-демократа в западном смысле.\nОн считается де-факто преемником Лян Цичао.\nОн славится своим упрямым характером.§!"

 #張東蓀
 GXC_zhang_dongsun: "Чжан Дунсунь"
 GXC_zhang_dongsun_sic_desc: "§YРодился:§! §L2 июня 1886 года, в уезде Цяньтан, провинция Чжэцзян, Великая Цин§!\n§YПринадлежность:§! §SДемократическая социалистическая партия§!\n§YБиография:§! §LПотомок семьи чиновников, Чжан Дунсунь был отправлен в Японию в 1905 году учиться на факультете философии Токийского императорского университета и Частного института философии. Встретившись с Чжан Цзюньмаем, Лань Гунъу и Лян Цичао, он стал учеником последнего и близким другом первого. В 1912 году он присоединился к Нанкинскому временному правительству в качестве секретаря в Министерстве внутренних дел, а затем вступил в Гоминьдан, поддерживая тесные связи с Лян Цичао и Прогрессивной партией. Занявшись журналистикой, он опубликовал большое количество политических статей, атакующих реставрацию Юань Шикая, но также порочащих Вторую революцию, и пытаясь преодолеть разрыв между реформистами и революционерами.\n\nВ 1917 году он сменил Чжан Цзюньмая на посту редактора «Шиши Синьбао» Клики исследований, став одним из лидеров клики в 1918 году. Участвуя в выборах того года, Клика исследований в конечном итоге проиграла клубу Аньфу, что привело к отказу Чжана от прямой политики. В 1920 году он инициировал лекционное общество с Ляном и пригласил философа гильдейского социализма Бертрана Рассела посетить Китай. Увлекшись гильдейским социализмом, он участвовал в Обществе социалистических исследований, организованном Чэнь Дусю, но отказался вступить в Китайскую синдикалистскую партию.\n\nСлужа на факультетах различных университетов и редактируя множество статей с критикой революционной борьбы, он служил профессором философии в Национальном институте политических наук Чжан Цзюньмая и в конечном итоге работал с Цзюньмаем в рамках Китайской конституционной партии, сформировав Общество национального возрождения в 1932 году.§!\n\n§YЗаметки: Один из немногих членов ближайшего окружения Чжан Цзюньмая, кто может не согласиться с ним и остаться безнаказанным.§!"

 #徐傅霖
 GXC_xu_fulin: "Сюй Фулинь"
 GXC_xu_fulin_advisor_desc: "§YРодился:§! §L1879, в уезде Хэпин, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §SДемократическая социалистическая партия§!\n§YБиография:§! §LПреуспев в учебе в юном возрасте, Сюй Фулинь сдал имперский экзамен в 1896 году и последовал за братом, поступив в Академию Сюньчжоу Фэнху, позже перейдя в Пекинскую юридическую школу. Окончив ее с отличием, он отправился в Японию, поступив в Университет Васэда и получив степень бакалавра права. Во время своего пребывания там он вступил в Тунмэнхой и вернулся в Гуандун в 1908 году, чтобы работать адвокатом. В 1912 году он стал членом Временного сената в Пекине и служил в Первой национальной ассамблее. После ее роспуска в 1914 году он отправился в Японию и вступил в Гэминьдан, но вышел из него из-за недовольства выбором флага, отличного от флага Пяти рас.\n\nПрисоединившись к Обществу по изучению европейских дел (предшественнику прото-клики политической науки), он продолжил инициировать Общество поддержки республики в 1915 году вместе с Ян Юнтаем и Гу Чжунсю. Занимая гражданскую должность в Юньнани во время Войны в защиту республики, он вернулся в Ассамблею в 1916 году и основал Общество политической науки вместе с Яном, Гу, Ли Гэньюанем и другими. В 1917 году он служил в Правительстве защиты конституции Сунь Ятсена, занимая пост министра юстиции и председателя Верховного суда. В 1924 году он выразил открытое презрение к Реорганизации Гоминьдана и вышел из него.\n\nВ 1927 году он вернулся в Гуандун, собирая средства на строительство школ, утраченных из-за Северного похода. В 1929 году он присоединился к Национальному институту политических наук Чжан Цзюньмая в качестве преподавателя и помог сформировать Общество национального возрождения в 1932 году. В 1934 году, последовав за Чжаном в Гуандун, он основал Академию Сюэхай в Гуанчжоу.§!\n\n§YЗаметки: Абсолютно преданный демократии, он откажется участвовать в любой форме авторитаризма.§!"

 #張嘉璈
 GXC_zhang_jiaao: "Чжан Цзяао"
 GXC_zhang_jiaao_advisor_desc: "§YРодился:§! §L13 ноября 1889 года, в уезде Цзядин, провинция Цзянсу, Великая Цин§!\n§YПринадлежность:§! §SДемократическая социалистическая партия§!\n§YБиография:§! §LИзучая французский язык в Шанхайской академии Яньвэнь, Чжан Гунцюань (Цзяао) сдал имперский экзамен в 1904 году, а в 1906 году поступил в Университет Кэйо в Японии по специальности экономика. Вернувшись в Китай, он поступил в Министерство почт и коммуникаций Цин, а после Синьхайской революции служил секретарем губернатора Чжэцзяна. В 1913 году он был назначен заместителем управляющего Шанхайского отделения Банка Китая, начав свою долгую карьеру в банковском секторе продолжительностью 22 года. Искусно управляя своим чжэцзянским отделением Банка Китая, его отделение стало известно как «ядро финансовой группы Цзянсу-Чжэцзян», собрание элитных экономических интересов в одном из самых богатых районов Китая.\n\nУлучшив кредит Банка Китая, отказавшись поддаваться давлению с требованием приостановить наличные платежи, он был повышен до вице-президента Головного офиса Банка Китая, а позже до генерального менеджера. Введя коммерческие акции в Банк, он намеревался избавить Банк Китая от влияния манипуляций милитаристов и смены режимов. Точно так же в 1923 году Чжан начал реформировать Банк Китая в соответствии с современными банковскими требованиями, переняв западный бухгалтерский учет и улучшив правила.\n\nПутешествуя по миру в конце 20-х годов для изучения западных банков, Чжан вернулся в Китай в 1929 году, чтобы реформировать кадровую систему Банка Китая, внедрить систему экзаменов и назначений для набора людей на основе заслуг, улучшить правила обслуживания, обеспечить строгую организационную дисциплину и усилить обучение. Введя свой «фермерский кредит» в 1932 году, Чжан позволил Банку Китая предоставлять льготные кредиты различным сельским общинам для создания кооперативов, вливая драгоценные средства в районы, наиболее остро в них нуждающиеся.§!\n\n§YЗаметки: Чжан провозглашен одним из великих финансовых умов Китая, приведшим Банк Китая к международной репутации.\nОн младший брат Чжан Цзюньмая.§!"

 #孫寶剛
 GXC_sun_baogang: "Сунь Баоган"
 GXC_sun_baogang_high_command_desc: "§YРодился:§! §L1909, в уезде Цзиньшань, провинция Цзянсу, Великая Цин§!\n§YПринадлежность:§! §SДемократическая социалистическая партия§!\n§YБиография:§! §LОкончив физический факультет Университета Сучжоу, он отправился в Японию на учебу и поступил в Сикан Гакко. Вернувшись в Китай в 1935 году, Сунь Баоган сначала стал учителем физики в Университете Фэн Юн. Однако после растущего притока реформистских интеллектуалов, движущихся на юго-запад, Сунь вступил в армию Чэнь Ляньбо и присоединился к Обществу национального возрождения в том же году. Молодой и в конечном счете непроверенный на поле боя, Сунь оказывается одним из немногих в секте Чжан Цзюньмая, имеющим хоть какой-то военный опыт или командный потенциал.§!\n\n§YЗаметки: Он известен своей яростной оппозицией любому авторитаризму и жесткому характеру лидерства Чжан Цзюньмая.§!"

## Li Jishen Clique (LJS)

 #李民欣
 GXC_li_minxin: "Ли Миньсинь"
 GXC_li_minxin_high_command_desc: "§YРодился:§! §L1890, в уезде Паньюй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКлика Ли Цзишэня§!\n§YБиография:§! §LОкончив Военную среднюю школу Гуандун-Гуанси, Ли Миньсинь служил стажером-командиром взвода в местной армии и клерком в Армейском департаменте. За время своего пребывания там он познакомился с Ли Цзишэнем из Армейского университета, установив глубокую дружбу. В 1912 году он вступил в Гоминьдан, служа полковником штаба во время Второй революции. Бежав в Макао, он периодически занимался различной революционной деятельностью.\n\nВ 1924 году он был назначен начальником штаба Офиса помощи Сицзяна, чтобы помогать Ли Цзишэню в работе по оказанию помощи в этом районе, а в 1925 году был назначен магистратом уезда Сыхуэй. В 1927 году он был назначен генеральным директором Департамента по борьбе с контрабандой Министерства финансов Временного правительства Гуанчжоу. Позже он служил директором по военным делам и адъютантом Главного командования, директором по налогообложению и комиссаром по транспортировке соли Гуандуна и Гуанси в правительстве Чэнь Ляньбо.\n\nПоддерживая контакт с Ли Цзишэнем в Миньгане и сотрудничая с Чэнь Цзитаном, Ли переправлял средства и финансы Ли в его борьбе против Лиги восьми провинций — деятельность, неофициально поддерживаемая Чэнь Ляньбо, поскольку она ослабляла покровителя Шэнь Хунъина, Сунь Чуаньфана.§!"

 #李章达
 GXC_li_zhangda: "Ли Чжанда"
 GXC_li_zhangda_sic_desc: "§YРодился:§! §L1890, в уезде Дунгуань, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКлика Ли Цзишэня§!\n§YБиография:§! §LРодившийся в некогда процветающей семье землевладельца, Ли Чжанда сначала получил традиционное образование, а затем поступил в Начальную военную школу Вампу в 1906 году, а позже в Военную среднюю школу Нанкина в 1909 году. Во время пребывания там он начал распространять революционную пропаганду среди студентов, позже вступив в Тунмэнхой. Одноклассник таких людей, как Чэнь Миншу и Цзян Гуаннай, он предпринял с ними действия для участия в Синьхайской революции. Последовав за Чжу Чжисинем на юг в 1912 году, он затем поступил в Военную академию Баодин и участвовал во Второй революции, начатой Ли Лецзюнем.\n\nОкончив артиллерийский факультет Баодина, он служил майором штаба в Хугоцзюнь в 1916 году и перешел в Гуандунскую армию в 1917 году, чтобы служить штабным офицером Дэн Кэна для Правительства защиты конституции Сунь Ятсена. Изучая революционную теорию с Сунем и Чжу Чжисинем, а также английский с Ляо Чжункайем, Ли развил глубокую дружбу с Ляо и Чжу в частности.\n\nПосле смерти Чжу в 1920 году он служил командиром инженерного батальона в Гуандунской армии. Во время инцидента 15 июня Ли Чжанда отвечал за оборону Президентского дворца от натиска Е Цзюя и сражался против Чэнь Цзюнмина в войнах Юэ-Гуй. Уйдя с военной должности в 1924 году, чтобы помогать Ляо в Едином фронте, он сотрудничал с такими людьми, как Пэн Пай, и во время Северного похода служил в правительстве Гуандуна в качестве директора общественной безопасности. После падения Гуанчжоу и краха Северного похода Ли продолжал поддерживать связи с повстанцами Миньгань благодаря Ляо Чжункайю, но в остальном оставался в Гуанчжоу.§!"

 #谢文炳
 GXC_xie_wenbing: "Се Вэньбин"
 GXC_xie_wenbing_commander_desc: "§YРодился:§! §L1882, в уезде Байфан, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКлика Ли Цзишэня§!\n§YБиография:§! §LПерейдя в Военную академию Гуанчжоу после недолгого пребывания в Гуандунской армии, Се Вэньбин встретил Хуан Сина и вступил в Тунмэнхой прямо перед участием в Восстании в Гуанчжоу в 1911 году в качестве члена Корпуса смертников. Храбро сражаясь под началом Хуана, он служил командиром взвода и роты в Гуандунской армии в течение 6 лет. В 1917 году он служил охранником Президентского дворца Сунь Ятсена, сражаясь в Войне в защиту конституции и против губернатора Фуцзяни Ли Хоуцзи. В 1920 году Се сражался против Мо Жунсиня и Ли Гэньюаня, а позже в 1921 году против Шэнь Хунъина, закончив 1922 год командиром дивизии в Гуандунской армии.\n\nСражаясь в войнах Юэ-Гуй на стороне Гоминьдана, Се продолжал верно служить Сюй Чунчжи до своего задержания Чан Кайши в ходе борьбы за власть в Гоминьдане в середине 20-х годов. Теперь, оставшись без хозяина, Се участвовал в Северном походе как командир 48-й армии Национально-революционной армии, однако после краха на нескольких фронтах он был ненадолго задержан Чаном перед убийством Генералиссимуса.\n\nПосле этого уйдя в функциональную отставку, Се служил в минимальном качестве, помогая Ли Цзишэню в его борьбе в Миньгане, добровольно сражаясь с остатками НРА в ряде случаев. Как подчиненный Хун Чжаолиня, он смог обеспечить поставки от милитариста для Миньганя.§!\n\n§YЗаметки: Известен как «рябой белый человек».§!"

 #王亞樵
 GXC_wang_yaqiao: "Ван Яцяо"
 GXC_wang_yaqiao_advisor_desc: "§YРодился:§! §L7 февраля 1887 года в городе Хэфэй, провинция Аньхой, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LСын врача, Ван Яцяо далеко отошел от гуманитарной практики своего отца. Вступив в Тунмэнхой в ранние годы, он организовал совместное восстание в тандеме с Синьхайской революцией. После провала восстания он бежал в Шанхай, встретив Цзин Мэйцзю в 1913 году и впоследствии присоединившись к «Группе анархистских исследований». С тех пор Ван начал пропагандировать использование пропаганды делом и публичного террора для противодействия любой власти. В 1921 году он организовал выходцев из Аньхоя для создания землячества в Шанхае, которое было переименовано в «Банду Топоров» и соперничало с триадами, такими как Хуан Цзиньжун и Ду Юэшэн, за власть, территорию и влияние.\n\nНакануне войны Цзянсу-Чжэцзян 1924 года Ван Яцяо был использован Лу Юнсяном для убийства Сюй Голяна, начальника Шанхайского полицейского управления и важного подчиненного Ци Сеюаня. Приняв назначение Лу отправиться в Хучжоу в качестве командира Чжэцзянской колонны, он недолго служил на поле боя со своими учениками, будущим известным мастером шпионажа Дай Чуньфэном и Ху Цзуннанем.\n\nПосле поражения Лу от рук Ци и Сунь Чуаньфана Ван бежал в Шанхай, а после Шанхайского восстания 1932 года организовал Группу «Железная кровь против предателей» с планом убить Лу Сянтина в Шанхае. Однако попытка Вана провалилась, так как он убил секретаря Лу вместо него, и после еще одной неудачной попытки убить самого Суня Ван стал сотрудничать с корейским правительством в изгнании, чтобы попытаться убить японского императора. Установив контакты с повстанцами Миньгань через Чжэцзянское общество революционных товарищей и Банду десяти, Ван остался беспринципным союзником Ли Цзишэня в частности.§!\n\n§YЗаметки: Он известен как «Король убийц».§!"

