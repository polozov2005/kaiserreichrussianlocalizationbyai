 GXC_vision_of_the_elders_clique_tt: "§YНесмотря на то, что Ху Ханьминь пережил бурю и успешно одержал победу над Ли Цзунжэнем, симпатии к Новой клике Гуанси все еще сохраняются внутри партии. Вы потеряете стабильность пропорционально тому, сколько влияния §PПатерналистов-автократов§! у вас было.§!"

 GXC_enforce_mass_demobilisation_tt: "§LОпека держится на лезвии ножа! С завершением этапа Военного правления большинство непрофессиональных дивизий будут расформированы и демобилизованы!§!"

 GXC_victory_of_the_reconstruction_faction_effect_tt: "§LФракция Реконструкции рассматривается в кругах Гоминьдана не более чем как либеральные дилетанты. Вы потеряете стабильность пропорционально тому, сколько влияния §PПатерналистов-автократов§!, §gАвторитарных демократов§!, §RСиндикалистов§!, §oТоталистов§!, §rРадикальных социалистов§! и §nНационал-популистов§! у вас было.§!"

 GXC_triumph_of_the_western_hills_effect_tt: "§LКлика Сишань остается бескомпромиссной в своем крестовом походе за партийную «чистоту». Вы потеряете стабильность пропорционально тому, сколько влияния §PПатерналистов-автократов§!, §RСиндикалистов§!, §oТоталистов§!, §rРадикальных социалистов§! и §nНационал-популистов§! у вас было.§!"

 GXC_political_consultative_conference_effect_tt: "§YРазработка постоянной конституции является, пожалуй, одной из самых спорных политик Демократической фракции! Вы потеряете политическую власть пропорционально тому, сколько влияния §PПатерналистов-автократов§!, §SСоциал-демократов§!, §gАвторитарных демократов§! и §nНационал-популистов§! у вас было, но получите стабильность пропорционально влиянию §OСоциал-либералов§! и §cСоциал-консерваторов§!.§!"

 GXC_the_cabinet_takes_the_lead_tt: "§LЭтот фокус даст нам разные эффекты в зависимости от того, назначены ли советники §YХу Ханьминь§!, §YЛинь Сэнь§! и §YУ Чаошу§!. Если у нас есть все советники, мы получим дополнительный эффект!§!"

 GXC_draft_a_provisional_constitution_tt: "§LМы получим уникальный эффект для этого фокуса в зависимости от нашего текущего §YВторого человека в государстве!§!§!"

