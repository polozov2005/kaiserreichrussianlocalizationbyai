 GXC_UPC_popular_support_the_party_of_washington: "Федералистский дух: §lПартия Вашингтона§!" #PIP Dominant
 GXC_UPC_popular_support_the_party_of_washington_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nОснованная в изгнании и прозябающая до аннулирования ошибочного режима Гоминьдана в 1927 году, Партия общественных интересов стала свидетелем поистине метеоритного взлета. Победив всю оппозицию, выступая за народ и вечно ведя его к светлому будущему, Партия стала нарицательной сущностью. Чэнь Цзюнмин — не просто очередной милитарист, а сам отец-основатель Китайской Республики! Вашингтон нации, глашатай новой эры демократии! Слава Первой партии нации! Пусть они продолжают вести китайский народ!"

 GXC_UPC_popular_support_republic_of_yin_and_yang: "Федералистский дух: §SРеспублика Инь и Ян§!" #PIP -> DSP
 GXC_UPC_popular_support_republic_of_yin_and_yang_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nХотя это правда, что китайская демократия была введена под эгидой Общественных интересов, им нельзя было доверить бразды правления нацией или народную поддержку. Открыв канонаду по вопиющему авторитаризму, практикуемому Кликой Юэ, именно демократические социалисты завершили китайскую демократическую миссию. С мирной передачей власти, возможно, будущее под правлением буржуазных джентльменов будет светлым."

 GXC_UPC_popular_support_socialism_of_all_mankind: "Федералистский дух: §lСоциализм всего человечества§!" #DSP -> PIP
 GXC_UPC_popular_support_socialism_of_all_mankind_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nИзначально отступив после того, как привела нацию к федерально-демократическому идеалу, Партия общественных интересов сумела восстановиться. Неся вперед наследие целого движения, мирная передача власти от действующих лиц к оппозиции знаменует собой переломный момент в китайской истории. При Чэнь Цию и Чэнь Яньшэне нация облегчит страдания угнетенных и предложит помощь тем, кто находится в конфликте. Под правлением сострадания Китай будет преследовать «социализм всего человечества»."

 GXC_UPC_popular_support_democracy_by_decree: "Федералистский дух: §SДемократия по указу§!" #DSP Dominant Party
 GXC_UPC_popular_support_democracy_by_decree_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nИдеалом нации является управление полностью централизованной формой консенсуса. При одной доминирующей партии, способной к немедленным и решительным действиям и в сотрудничестве со всеми другими партиями в рамках правящего соглашения, именно Демократическая социалистическая партия была наделена такой властью и возможностями. При последовательном одобрении поддержки со стороны китайского населения Демократический конституционный социализм находится всего в одном периоде партийного правления."

 GXC_UPC_popular_support_harmonious_state_machine: "Федералистский дух: §gГармоничная государственная машина§!" #Ye Ju Auth Dem
 GXC_UPC_popular_support_harmonious_state_machine_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nВ условиях неспособности населения или оппозиции по-настоящему поддерживать целостность нации, судьба Объединенных провинций подпала под необходимые меры для обеспечения ее выживания. Поддерживаемые избирателями и Партией общественных интересов, эффективность и прогресс являются новой целью федерального проекта, и Президент-Маршал был бы глупцом, если бы позволил запятнать ее каким-то высокомерным элитаристам."

 GXC_UPC_popular_support_the_party_in_pursuit_of_democracy: "Федералистский дух: §gВ погоне за демократией§!" #Chen Qiyou transitional democracy
 GXC_UPC_popular_support_the_party_in_pursuit_of_democracy_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nНесмотря на все притворства и карабканье к какому-то далекому идеалу федералистской демократии, движение еще не доказало, что оно намного больше, чем его репутация, по мнению недоброжелателей. Но это не омрачило наследие китайского Бисмарка, Чэнь Цзюнмина. Ибо в общении с остальными легальными участвующими партиями Партия общественных интересов возвестит о новой эре демократии, будут ли этому противостоять милитаристы, революционеры или введенные в заблуждение массы или нет."

 GXC_UPC_popular_support_the_new_revolution: "Федералистский дух: §aНовая революция§!" #Li Jishen - Li Zhangda
 GXC_UPC_popular_support_the_new_revolution_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nМногие полагали, что Национальная революция нашла своего создателя, окончательно прошла точку невозврата после последних умирающих углей 1930-х годов. И мало кто мог предположить, что Федеративная Республика могла быть сохранена среди борьбы за власть ВРА и ДЛК. Еще меньше верили, что именно революционер станет этим спасителем. Не контролируемый жаждой власти или эго, Президент-Маршал притупил прославление радикализма и насилия, которые когда-то управляли Национальной революцией. В конечном итоге гарантируя, что наследие Гофу живет под наследием Партии народных производителей."

 GXC_UPC_popular_support_the_new_democratic_norm: "Федералистский дух: §aНовая демократическая норма§!" #Li Jishen - Two Zhangs
 GXC_UPC_popular_support_the_new_democratic_norm_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nДемократия — это норма политики, а не просто одна политическая система среди прочих. Автократия и диктатура — всего лишь «политический недуг». Таким образом, быть демократичным — значит не только отвергать враждебные отношения между правителями и управляемыми и реализовывать общую волю, но и относиться к человечеству как к цели самой по себе, а не просто как к средству. Это то, что «Новая демократическая норма» должна стремиться принести."

 GXC_UPC_popular_support_governed_under_the_gun: "Федералистский дух: §PУправление под дулом пистолета§!" #Ye Ju Pat Aut
 GXC_UPC_popular_support_governed_under_the_gun_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами, с дальнейшей дискредитацией успешным объединением силой Чжили.\n\nОчевидно, что элитаристы, милитаристы и революционеры хотели бы ввергнуть зарождающуюся китайскую демократию в идеалистическое безумие хаоса и нестабильности. Всё для масс, всё моля о массах, нацией скорее управлял бы бродячий популизм, чем подлинное действие. Хотя некоторые могут осуждать власть оружия, Президент-Маршал принес свободу, справедливость и безопасность республике, которую построили он и Чэнь."

 GXC_financing_guangxis_reconstruction_idea: "Финансирование реконструкции Гуанси"
 GXC_financing_guangxis_reconstruction_idea_desc: "Контролируемая сильно милитаризированной Старой кликой Гуанси, а до этого столь же милитаризированной Новой кликой Гуанси, провинция Гуанси видела мало стабильности с момента первого смещения Лу Жунтина в начале 1920-х годов. Вступив в собственную мини-Эру милитаристов, Эпоху героев Гуанси, она была втянута в борьбу Лянгуана, вынуждена отбиваться от Юньнаньской армии, а затем оказалась в ловушке с отступающим Гоминьданом и преследующими следопытами Старой Гуанси. С ее величайшим периодом стабильности в последнее время, она снова была ввергнута в кровопролитие и хаос, поскольку покровители Старой Гуанси изгоняются или перебегают.\n\nЕсли Китай должен следовать федералистскому проекту и быть реорганизован в новое, полное надежд будущее, он не может быть отягощен актами прошлой несправедливости. Хотя Гуандун сам по себе требует помощи, он не может оставить свой Близнец Гуан в стороне. В силу обстоятельств, давайте проведем период великой реконструкции в Гуанси."

 GXC_fixed_pricing_for_rifles_idea: "Фиксированные цены на винтовки"
 GXC_fixed_pricing_for_rifles_idea_desc: "Чтобы финансировать новую схему местного ополчения для контроля над бандитизмом, необходимо вооружить этих храбрых местных дружинников местными боеприпасами. Благодаря вмешательству государства Кантонский арсенал получил запрос на поставку оружия по фиксированной цене 150 долларов за винтовку и 200 патронов. Хотя это может повредить военному производству в долгосрочной перспективе, это обеспечит достаточную стабильность и запасы винтовок в краткосрочной перспективе."

 GXC_wheeling_and_dealing_in_canton_idea: "Интриги и сделки в Кантоне"
 GXC_wheeling_and_dealing_in_canton_idea_desc: "Такова природа кантонской гибридной демократической политики: истинными двигателями перемен в Гуандуне являются торговцы, шэньши и бизнесмены. Крепкими рукопожатиями и блеском в глазах они сумели сдвинуть горы, накопить значительные богатства и заставить даже самого могущественного милитариста поклониться или, по крайней мере, выразить доверие. Губернатор Чэнь может быть правителем Гуандуна, но мэр Чэнь по-прежнему контролирует буквальный трон из тени. Однако его влияние и власть могут быть использованы для улучшения общества."

 GXC_putting_forward_the_educational_budget_idea: "Продвижение образовательного бюджета"
 GXC_putting_forward_the_educational_budget_idea_desc: "Предотвращение излишеств Эры милитаристов и строительство новой нации может начаться только с образования ее строительных блоков. Простой гражданин едва умеет читать, как можно ожидать, что он выполнит свой гражданский долг и примет участие в современной либеральной демократии? «Будь что будет, давайте просвещать народ», как однажды заявил плодовитый ученый Ху Ши. Итак, необходимо добиться того, чтобы 20% провинциального бюджета выделялось на образование и не более 30% — на армию. Наряду с такими вопросами крайне важно, чтобы Провинциальный комитет по образованию провел переоценку провинциального образования, установив бюджет, уволив некомпетентный персонал и омолодив китайское образование."

 GXC_dancing_with_the_triads_idea: "Танцы с триадами"
 GXC_dancing_with_the_triads_idea_desc: "Гуань Вэньсэнь, сотрудник Общества национального возрождения и помощник Чжан Цзюньмая, является известным членом общины зарубежных китайцев из Наньяна. По собственной инициативе он начал организовывать Комитет спасения родного города зарубежных китайцев Хуэйчжоу и в ходе дискуссий с Ассоциацией родного города Хайлуфэн, Молодежной ассоциацией Хуэйян Гонконга и Обществом Юй Сяньлэ сумел создать Группу обслуживания возвращения на родину зарубежных китайцев Дунцзяна (сокращенно Дунтуань), чтобы помочь Гуандуну в борьбе против концессий и империалистов. Собирая людские ресурсы и материалы в Малайзии, они привели к созданию партизанского отряда Народных антиконцессионистов Дунцзяна.\n\nОднако не все так гладко с открытыми переговорами с общиной зарубежных китайцев. Похожая на секту Тяньдихуэй, от которой происходят Партия общественных интересов и Гуань Вэньсэнь, Триады также бросили свою шляпу на ринг. Имея ключевые связи с Армией Юэ через ключевого офицера, такого как Гэ Чжаохуан (ведущий член гонконгских триад), они начали «помогать» Армии Юэ и Партии общественных интересов в начинаниях, хотя и по теневой цене."

 #NPA Political Ideas
 GXC_NPA_popular_support_desc: "Популярный образ милитариста — это образ деспотичного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью, окруженного декадентским двором порока и подхалимов. Реальность гораздо сложнее. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Более того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономических элит, общественных деятелей и интеллектуалов.\n\nПолитическая легитимность — чрезвычайно ценная валюта. Хотя не каждый милитарист был обязательно «популярен», они зависели от видимости стабильности и порядка, чтобы оправдать свое правление и поддерживать свои неформальные личные связи. Вследствие этого большинство проводили свое рабочее время, встречаясь с различными деятелями со всего общества, поддерживали провинциальные ассамблеи и щедро жертвовали на благотворительность — в дополнение к надзору за казнями и обширным аппаратом безопасности."
 GXC_NPA_popular_support_1: "Политическая легитимность: §RНичтожная§!"
 GXC_NPA_popular_support_1_desc: "$GXC_NPA_popular_support_desc$"

 GXC_NPA_popular_support_2: "Политическая легитимность: §OСлабая§!"
 GXC_NPA_popular_support_2_desc: "$GXC_NPA_popular_support_desc$"

 GXC_NPA_popular_support_3: "Политическая легитимность: §nРастущая популярность§!"
 GXC_NPA_popular_support_3_desc: "$GXC_NPA_popular_support_desc$"

 GXC_NPA_popular_support_4: "Политическая легитимность §CУкоренившаяся поддержка§!"
 GXC_NPA_popular_support_4_desc: "$GXC_NPA_popular_support_desc$"

 GXC_NPA_popular_support_5: "Политическая легитимность: §GНациональное правительство§!"
 GXC_NPA_popular_support_5_desc: "$GXC_NPA_popular_support_desc$"

 GXC_confucian_character_progressive_ideals: "Конфуцианский характер, прогрессивные идеалы"
 GXC_confucian_character_progressive_ideals_desc: "Китайская культура до сих пор связана практиками и идеалами Конфуция; они поддерживают порядок, гармонию и чувство принадлежности в нации, которая настолько многокультурна и обширна. Однако в последнее время конфуцианские практики начали показывать свой возраст, они были признаны «устаревшими», по крайней мере, теми, кто поддерживает движение Новой культуры 4 ноября. Но это не так! Неоконфуцианство нового века и эры может адаптировать конфуцианство к настоящему времени, к современности, к прогрессивным идеалам, мы должны только продвигать его; одними из первых продвигать неоконфуцианство на уровне провинциального государства."

 GXC_harmonious_state_model: "Модель гармоничного государства"
 GXC_harmonious_state_model_desc: "Нельзя управлять государством только тиранией и страхом; мы честные государственные деятели, и именно бедственное положение крестьян толкает их к революционерам и к тем вероломным демократам, которые дергают их за струны души и шепчут сладкие пустяки. Наш долг — обеспечивать, и наш долг — повышать уровень жизни крестьянства; и поэтому наш долг — предоставлять государственную помощь, чтобы облегчить их страдания."

 GXC_the_nine_charitable_halls_of_guangdong: "Девять благотворительных залов Гуандуна"
 GXC_the_nine_charitable_halls_of_guangdong_desc: "Берущие свое начало в неправительственных благотворительных учреждениях поздней Цин, «Девять благотворительных залов Гуандуна» относятся к набору местных благотворительных организаций, которые широко рассматриваются как значимые влиятельные игроки в местной политике. В значительной степени поддерживаемые местными шэньши и торговцами, они продвигают «нравственное» образование, финансируют провинциальное правительство и влияют на местную политику, часто в интересах своих консервативных покровителей. Поскольку Торговцы, и особенно Чэнь Ляньбо, имеют тесные связи с Девятью благотворительными залами, они предложили усилить его влияние в регионе в обмен на собственные откаты."

 GXC_lasting_legacy_of_the_cohong: "Долговечное наследие Гунхана"
 GXC_lasting_legacy_of_the_cohong_desc: "Гунхан — это имя, данное китайской купеческой гильдии, которая запрашивала и управляла печально известной монополией на импорт-экспорт в Кантоне во время династии Цин, и какое-то время была единственной точкой доступа для европейцев на китайских рынках. Получая огромные прибыли и практическую монополию на внешнюю торговлю от цинского двора, Гунхан стал свидетелем быстрого расширения финансов в Кантоне, превратив его в настоящую Жемчужину Востока. Однако с окончанием Первой опиумной войны Гунхан был распущен, хотя это и не стало концом доминирования кантонских торговцев.\n\nПереходя от конфуцианской бюрократической модели «купец-купец» династии Цин, преемники Гунхана трансформировались в модель «дипломатической» торговой системы Британской империи, сохраняя свою рыхлую монополию на рынках Гуандуна. Теперь их нынешние преемники составляют основную часть Ассоциации всех сословий по спасению Гуандуна, и их торговая смекалка продолжает пронизывать залы кантонского управления."

##Military Ideas
 GXC_CHI_canton_coup_idea: "Кантонский переворот"
 GXC_CHI_canton_coup_idea_desc: "Увы, неудачный переворот Хромого генерала не станет нашей последней попыткой обезопасить родные провинции революции. С хаосом, вспыхнувшим по всему Лянгуану, мы должны перехватить инициативу и использовать эту возможность, чтобы полностью сокрушить правых! Вперед!"

 GXC_liangguang_intrigue_unravelled_idea: "Раскрытые интриги Лянгуана"
 GXC_liangguang_intrigue_unravelled_idea_desc: "С нашим неповиновением меняющимся политическим течениям в Лянгуане нити интриг были разорваны. Пока наши границы подвергаются вторжению внешних сил, стремящихся навязать свое влияние, силы внутри работают, чтобы саботировать наши военные усилия."

##Economic Ideas
 GXC_begin_the_yuegui_three_year_plan_idea: "Трёхлетний план Юэ-Гуй"
 GXC_begin_the_yuegui_three_year_plan_idea_desc: "В рамках амбициозного экономического плана для региона правительство стремится ввести государственную гармоничную форму экономического производства между мощным центром промышленной торговли, которым является провинция Гуандун, и богатыми ресурсами аграрной провинции Гуанси, названную планом «Юэ-Гуй» в честь Гуандуна и Гуанси соответственно."

 GXC_agricultural_reform_base: "Основное сельскохозяйственное развитие провинции Гуанси было направлено не на благо народа, а на создание товаров и накопление сырого богатства, создавая экономику, полностью зависящую от приливов и отливов ее экспорта. Контролируемая местными шэньши через сеть могущественных землевладельцев, магистратов и союзных ополчений, нестабильность из-за ренты и налогообложения провоцировала конфликты на протяжении поколений.\n\nНесмотря на то, насколько важен экспорт, и Гуандуну, и Гуанси часто не хватает достаточного количества дорог (или, по крайней мере, достаточно ухоженных) для массовой транспортировки сельскохозяйственной продукции. Лянгуан, как часть Китая, обремененная неравноправными договорами, не может контролировать импортные пошлины. Нехватка капитала из-за бедности, политической коррупции и эндемического бандитизма (и необходимости нанимать солдат для защиты от него) не позволила двум провинциям (особенно внутренней Гуанси) эксплуатировать пахотные земли, водные и минеральные ресурсы."
 GXC_agricultural_reform_idea1: "Сельское хозяйство, ориентированное на товарные культуры"
 GXC_agricultural_reform_idea1_desc: "$GXC_agricultural_reform_base$\n\nВнутренняя нестабильность вплоть до 1932 года и падение экспорта из-за Великой депрессии в Америке продолжали препятствовать развитию сельской экономики в двух провинциях. Казалось бы, в Лянгуане мало что меняется."
 GXC_agricultural_reform_idea2: "Рухнувший сельскохозяйственный сектор"
 GXC_agricultural_reform_idea2_desc: "$GXC_agricultural_reform_base$\n\nС катастрофическим экономическим коллапсом, пережитым во всем мире к «Черному понедельнику», и без того израненный и хрупкий сельскохозяйственный сектор Гуанси ушел в полное свободное падение, с быстрым истощением валютных и торговых потоков. Ибо кому нужен шелк и минералы, когда они едва могут прокормить свою семью?"
 GXC_agricultural_reform_idea3: "Восстанавливающийся сельскохозяйственный сектор"
 GXC_agricultural_reform_idea3_desc: "$GXC_agricultural_reform_base$\n\nБлагодаря мудрым и последовательным реформам, реализованным [ROOT.GetLeader] и его правительством, экономическая ситуация в нашем сельскохозяйственном секторе несколько стабилизировалась, хотя наши бизнесмены и фермеры лоббируют правительство, чтобы оно провело долгосрочные значимые реформы, чтобы предотвратить повторение такой катастрофы."
 GXC_agricultural_reform_idea4a: "Крестьянское сельское хозяйство"
 GXC_agricultural_reform_idea4a_desc: "$GXC_agricultural_reform_base$\n\nРаньше в нашем сельскохозяйственном секторе доминировали фермеры-арендаторы, те, кто не владел землей, на которой они без устали работали ежегодно. Учитывая обширные злоупотребления соглашениями между землевладельцами и работниками, мы внедрили ряд ограничений на аренду земли, чтобы предотвратить такие вопиющие акты террора в погоне за бессмысленной прибылью."
 GXC_agricultural_reform_idea4b: "Реформированное сельское хозяйство товарных культур"
 GXC_agricultural_reform_idea4b_desc: "$GXC_agricultural_reform_base$\n\nЧтобы никогда не повторять ошибки и глупости, проявленные нашими предшественниками в управлении экономикой Гуанси, мы стремились внедрить гарантии в нашем обновленном подходе к производству товарных культур, с возмещением местной прибыли в виде местных льгот для людей и с ограничениями на экспроприацию."
 GXC_agricultural_reform_idea5a: "Продуктивное крестьянство"
 GXC_agricultural_reform_idea5a_desc: "$GXC_agricultural_reform_base$\n\nОбеспечивая безопасность и продуктивность крестьянства, правительство наконец начало серию тщательных кампаний, направленных на истребление мерзкой бандитской заразы, используя местные ополчения под командованием магистратов; кампании увенчались заметным успехом."
 GXC_agricultural_reform_idea5b: "Современные сельскохозяйственные методы"
 GXC_agricultural_reform_idea5b_desc: "$GXC_agricultural_reform_base$\n\nРеализуя серию инфраструктурных проектов, создавая большие сети дорог и шоссе, соединяющих провинции и деревни, правительство теперь наконец пожинает истинные плоды своего обновленного и современного сельскохозяйственного сектора."

 GXC_guangdong_cooperative_idea: "Создание кооперативов"
 GXC_guangdong_cooperative_idea_desc: "С провозглашением Гуандунской кооперативной комиссии по всем провинциям была создана сеть местных кооперативов для помощи в экономическом развитии наших сельских владений, даже ценой местной автономии."

 GXC_corvee_labour_system_idea: "Принуждение рабочих"
 GXC_corvee_labour_system_idea_desc: "В связи с тем, что наша экономическая ситуация требует экстренных мер, местным органам власти были предоставлены полномочия по обеспечению трудовой повинности для национальной реконструкции. Как бы они ни плакали, жертвы необходимы для нашего светлого будущего."

 GXC_production_bonus: "Мобилизованные синдикаты Гуанчжоу"
 GXC_production_bonus_desc: "По всему Гуандуну располагается ряд очень активных, революционных синдикатов и союзов, и посредством надлежащего государственного стимулирования мы начали использовать рабочих для обеспечения дальнейшей экономической производительности, в противовес Торговому корпусу."

 GXC_foreign_assets: "Национализация иностранных активов"
 GXC_foreign_assets_desc: "Поскольку вечно бдительные глаза иностранных капиталистов и империалистов отведены, сосредоточившись на своих собственных экономиках в свете «Черного понедельника», настало время наконец начать избавлять Китай от постыдных концессий, и с некоторой помощью правительства их активы вернутся в руки китайских бизнесменов."

 GXC_exports: "Поощрение экспорта"
 GXC_exports_desc: "Хотя концессионеры и иностранные империалисты продолжают относиться к нашему народу с определенным уровнем неравенства, экономические выгоды, приносимые их инвестициями, продолжают быть фантастическим благом для китайской экономики, и мы должны поощрять такую торговлю и активность."

 GXC_merchant_alliance: "Пробизнес-политика"
 GXC_merchant_alliance_desc: "Торговый корпус начал поддерживать и снабжать свои военизированные формирования своим огромным богатством; чтобы противостоять этому, правительство стремилось внедрить ряд экономических стимулов для бизнеса, чтобы успокоить Торговцев и способствовать более широкому сотрудничеству и производству богатства для Лянгуана."

 GXC_liangguangs_developing_economy1: "Развивающаяся экономика Лянгуана"
 GXC_liangguangs_developign_economy_base: "Хотя Гуандун и его маяк Гуанчжоу являются сияющим городом на горизонте, расположенным в дельте Жемчужной реки, они всего лишь развиваются по сравнению с остальным миром. Его экономическая мощь была создана так называемой «Кантонской системой» между 1757–1842 годами, которая направляла весь китайский иностранный экспорт в город и создала ряд монополий, удерживаемых местными торговцами, известными как Гунхан. Это позволило Гуанчжоу (также известному как Кантон) стать крупным перевалочным пунктом, а доступ к иностранному капиталу и торговле позволил расти местным ремесленникам и фабрикам. Однако этот рост был неравномерным, в основном в интересах иностранных держав и их местных компрадоров, что стимулировало беспорядки и экономическую нестабильность."
 GXC_liangguangs_developing_economy1_desc: "$GXC_liangguangs_developign_economy_base$\n\nВнутренняя нестабильность и Великая депрессия в Америке сильно ударили по Лянгуану, и неясно, сколько еще ущерба он сможет выдержать."
 GXC_liangguangs_developing_economy2: "Разрушенная экономика Лянгуана"
 GXC_liangguangs_developing_economy2_desc: "$GXC_liangguangs_developign_economy_base$\n\nГлобальный финансовый кризис «Черного понедельника» практически задушил зарождающуюся промышленность Лянгуана в колыбели. Безработица процветает, а лянгуанский юань становится бесполезным. Необходима радикальное вмешательство правительства, иначе контроль над ситуацией возьмут более радикальные элементы."
 GXC_liangguangs_developing_economy3: "Начальная стабилизация"
 GXC_liangguangs_developing_economy3_desc: "$GXC_liangguangs_developign_economy_base$\n\nСочетание внутренней нестабильности, Великой депрессии в Америке и глобального «Черного понедельника» потрясло экономическую систему Лянгуана до основания. Однако благодаря вмешательству правительства в падающую экономическую ситуацию Лянгуана нам удалось ее несколько стабилизировать, по крайней мере, в соответствии с глобальными тенденциями экономического восстановления. Мы должны работать над тем, чтобы наш промышленный сектор восстановился до еще больших высот, ибо мы не можем допустить, чтобы такая пародия повторилась с нами снова."

 GXC_liangguangs_developing_economy4a: "Стимулируемое государственное вмешательство"
 GXC_liangguangs_developing_economy4a_desc: "$GXC_liangguangs_developign_economy_base$\n\nВремена, когда концессионеры и их лакеи управляли китайской экономикой, прошли! С оживленным интересом правительства к экономике мы движемся вперед с целью полной самодостаточности в торговле и управлении экономикой."

 GXC_liangguangs_developing_economy4b: "Зарождающаяся капиталистическая экономика"
 GXC_liangguangs_developing_economy4b_desc: "$GXC_liangguangs_developign_economy_base$\n\nЛюбая идея не использовать экономические возможности, предоставляемые чужаками, — это глупость, ибо наша экономика продолжает крепнуть благодаря стимулируемым внешним инвестициям."

 GXC_liangguangs_developing_economy5a: "Сердце национальной реконструкции"
 GXC_liangguangs_developing_economy5a_desc: "$GXC_liangguangs_developign_economy_base$\n\nСам Лянгуан служит прекрасным примером для подражания другим провинциям. Хотя мы еще не достигли истинной самодостаточности, мы добились больших успехов в отмене неравноправных договоров и их катастрофических последствий для китайского народа и экономики. Пусть наши провинции станут образцом для Национальной реконструкции!"

GXC_liangguangs_developing_economy5b: "Кантонское экономическое чудо"
 GXC_liangguangs_developing_economy5b_desc: "$GXC_liangguangs_developign_economy_base$\n\nПока остальной Китай сражается за любые жалкие объедки, до которых может дотянуться, Кантон и Лянгуан в целом продолжают сиять над другими провинциями как сияющий город на холме во мраке Эры милитаристов. Пусть наше процветание продолжается вечно!"

 GXC_peasant_and_autarkic_reform: "Производительные провинции Лянгуана"
 GXC_peasant_and_autarkic_reform_desc: "Благодаря акценту на самообеспечение и крестьянство, граждане Лянгуана полностью уверены, что экономика и правительство работают на их благо, а не на какого-то иностранного капиталиста."
 GXC_peasant_and_free_trade_reform: "Реформированная Кантонская система"
 GXC_peasant_and_free_trade_reform_desc: "Вследствие наших усилий по приоритетной экономической интеграции с мировыми рынками и обеспечению благосостояния нашего крестьянства, Лянгуан зарекомендовал себя как убежище и для рабочего, и для капиталиста."
 GXC_modernized_and_autarkic_reform: "Образцовая провинция Лянгуан"
 GXC_modernized_and_autarkic_reform_desc: "Ориентация правительства на модернизацию аграрных методов при сохранении национальной независимости рынков привела к рекордным прибылям нашей растущей экономики, которая обязательно превзойдет все остальное в Китае."
 GXC_modernized_and_free_trade_reform: "Дракон Лянгуана"
 GXC_modernized_and_free_trade_reform_desc: "Эксперты в максимизации прибыли как от крестьянства, так и от иностранных капиталистов, правительство Лянгуана заслужило прозвище «Дракон Лянгуана», ибо его экономический успех и сила — это чудо Азии, настоящий образец для подражания!"

###- Phase III Ideas -###

 ##Socialist Ideas

 GXC_support_the_nanjing_government_idea: "Поддержка Нанкинского правительства"
 GXC_support_the_nanjing_government_idea_desc: "В рамках нашей открытой поддержки заявки Нанкина на национальную легитимность, а также легитимности всей организации Гоминьдан, нам было поручено поддержать Национально-революционную армию нашими арсеналами и запасами, предоставляя материальную помощь Национальному революционному правительству для подготовки к полному объединению нашей страны."

 GXC_sound_heart_sound_mind_sound_body_idea: "Здоровое сердце, здоровый дух, здоровое тело!"
 GXC_sound_heart_sound_mind_sound_body_idea_desc: "Непоколебимая решимость, искренняя преданность и полная самоотдача. Пусть все, кто стремится освободить свою страну от тиранов, милитаристов, землевладельцев и империалистов, возвысят свои голоса в самом ликующем крике за освобождение. Пока солдаты революции преданы сердцем, разумом и телом идеалам Национальной революции, мы не потерпим неудачу, и наша победа, несомненно, настанет."

 GXC_the_urban_revolution_idea: "Городская революция"
 GXC_the_urban_revolution_idea_desc: "Многие ставят под сомнение обоснованность городской революции, ссылаясь на то, что китайский народ еще не достиг промышленного потенциала для стимулирования роста городского пролетариата. Однако это просто ложь, так как успех революций в Париже, Лондоне и Италии показал истинный непревзойденный потенциал мобилизации рабочих нации в настоящий революционный авангард. Наш долг — убедить наших угнетенных братьев и сестер в Посольских городах и крупных промышленных центрах Китая восстать! Мы должны направить курс революции на рабочих, у которых гораздо более развито классовое сознание, чем у крестьян этой нации."

 GXC_the_revolution_of_the_people_idea: "Народная революция"
 GXC_the_revolution_of_the_people_idea_desc: "Мы, простые люди, особенно крестьяне в деревнях, виноваты в жалком положении Китая из-за отсутствия у нас самосознания и попустительского отношения к угнетению. Но именно крестьянство заслуживает похвалы за дух честности, праведности и верности своему классу. Будучи угнетенными, они искренне ждут, когда их поведут к революционной славе — когда революционное сознание крестьянства будет реализовано. Чтобы осуществить это, долг революционного авангарда — помочь крестьянам организоваться, трансформировать их сознание, чтобы полностью пробудить Китай."

 GXC_LKMT_ongoing_fourth_army_resistance: "Продолжающееся сопротивление Четвертой армии"
 GXC_LKMT_ongoing_fourth_army_resistance_desc: "Хотя Чэнь Миншу потерпел неудачу, а Нанкин оставил их, социалисты Лянгуана продолжают сопротивляться директивам хунты Гоминьдана. Будь то крестьянские повстанцы Совета Хайлуфэн, синдикалистские смутьяны в Кантоне или непокорные офицеры в реорганизованной Гуандунской армии, их коллективные усилия поставили под сомнение искренность «Единого фронта». Требуется подавление."

##Political Ideas
 GXC_the_public_security_bureau_idea: "Бюро общественной безопасности"
 GXC_the_public_security_bureau_idea_desc: "Чтобы обезопасить нашу Национальную революцию и правительство в целом, ведущие чиновники выступили за создание Бюро общественной безопасности для подавления любого инакомыслия со стороны милитаристов и реакционеров по всей стране, обеспечивая стабильность общества под бдительным оком партийного государства."

 GXC_paying_the_masters_tithe: "Уплата десятины хозяину"
 GXC_paying_the_masters_tithe_desc: "В любом соглашении от хороших подданных всегда ожидается, что они будут следовать прихотям хозяина и делать то, что он говорит. С этой целью необходимо, чтобы различные провинциальные налоги и долги, которых администрация «лишила» Центральное правительство в последние годы, были выплачены немедленно и в полном объеме. В конце концов, мы составные части единого национального целого, не так ли?"

 GXC_elevating_the_poor_peasantry_idea: "Подъем бедного крестьянства"
 GXC_elevating_the_poor_peasantry_idea_desc: "Крестьянские массы составляют подавляющее большинство населения Китая. От Синьцзяна до Дунбэя, и от Центральной равнины до дельты Жемчужной реки, они возделывают поля страны и поддерживают ее жизненную силу. И поэтому не может быть возмутительным ожидание того, что правительство будет заботиться об их разуме и благополучии. Слишком долго они были угнетены или иным образом игнорировались не самыми великодушными правителями. Пусть клики Юэ-Гуй продемонстрируют свое благоволение и то, что они являются арбитрами прогресса, а не упадка."

 GXC_shaking_hands_with_the_triads: "Рукопожатие с Триадами"
 GXC_shaking_hands_with_the_triads_desc: "Возможно, неприятная реальность для большинства, но развивающееся китайское подполье нависает не только над Шанхаем и Чжэцзяном. В кантонских культурных центрах Гонконга и Гуанчжоу тоже растет призрак гнусных сделок. Имея связи с Кликой Юэ и высокопоставленными чиновниками в истеблишменте провинции Гуандун, номинально возглавляемые Хунмэнь Триады стали своего рода добровольными помощниками в повседневной деятельности провинциальной администрации. Позволяя финансам течь через руки правительства в обмен на прикрытие, отношения стали в некоторой степени взаимовыгодными, пусть и за счет простого человека."

 GXC_rejuvenated_training_curriculums: "Обновленные учебные программы"
 GXC_rejuvenated_training_curriculums_desc: "С новым акцентом на инвестиции в местные военные академии Гуанси, такие как Офицерский институт Наньнина и Школа ускоренной подготовки армии Гуанси, провинциальная администрация вдохнула новую жизнь в военную культуру Гуанси, направив ее на совершенствование стандартов офицеров, переобучение унтер-офицеров, муштру простых солдат и подготовку всесторонне элитных сил. Пусть Гуанси, а не Вампу, определяет военные верительные грамоты Лянгуана."

##Military Ideas

 GXC_prepare_guerrila_cells_idea: "Подготовка партизанских ячеек"
 GXC_prepare_guerrila_cells_idea_desc: "Есть много способов, которыми народ может сражаться. Хотя мы можем уступать численно, в вооружении и в производстве нашим промышленно превосходящим врагам, годами сельские провинции Южного Китая привыкли защищать себя во времена кризиса. Пока наши основные конвенциональные силы отступают на более приемлемые оборонительные позиции, мы подготовим укрытия и сети для партизанских сил, чтобы развязать неконвенциональную войну и сеять хаос на линиях снабжения и в моральном духе врага."

 GXC_republic_of_china_air_force_idea: "ВВС Китайской Республики"
 GXC_republic_of_china_air_force_idea_desc: "В то время как предыдущие проекты китайского воздушного флота никогда не оказывались чем-то более сильным, чем несколько устаревших машин, почти полностью затмеваемых их врагами, возобновленное создание ВВС КР позволит китайским солдатам патрулировать китайское воздушное пространство, гарантируя, что нашим гражданам никогда не придется бояться небес."
 GXC_republic_of_china_air_force_idea2: "ВВС Китайской Республики"
 GXC_republic_of_china_air_force_idea2_desc: "$GXC_republic_of_china_air_force_idea_desc$"
 GXC_republic_of_china_air_force_idea3: "ВВС Китайской Республики"
 GXC_republic_of_china_air_force_idea3_desc: "$GXC_republic_of_china_air_force_idea_desc$"
 GXC_republic_of_china_air_force_idea4: "ВВС Китайской Республики"
 GXC_republic_of_china_air_force_idea4_desc: "$GXC_republic_of_china_air_force_idea_desc$"

 GXC_military_aviation_programme_idea: "Программа военной авиации"
 GXC_military_aviation_programme_idea_desc: "Воодушевленные нашими успехами на полях сражений Китая, мы постарались завоевать и воздушную войну тоже, навеки песня авиационной школы Гуанси будет жить в наших сердцах: «Воздушное пространство, воздушное пространство Китая, небо огромно и бесконечно! Авиация, ПВО, наши герои в воздухе. Смотрите: страна Китай захвачена, мы должны сражаться против великих держав, мы должны убивать врагов за нашу страну, наша храбрость проходит через радугу! Приходите, работайте вместе, готовьтесь и будьте авангардом национального омоложения!»."

 GXC_one_thousands_sons_one_thousand_soldiers_idea: "Выжженная земля"
 GXC_one_thousands_sons_one_thousand_soldiers_idea_desc: "Хотя нас могут превзойти в обычном бою, мы гордимся необъятностью нашей великой страны. Веками варварские нации всегда смотрели на Китай с вожделением, и снова и снова, от монголов до маньчжуров, мы показывали иностранным захватчикам трудности в коммуникациях и логистике, чем дальше они продвигались вглубь нашей страны. Поскольку мы в настоящее время испытываем военные неудачи, в военном командовании раздается все больше голосов, выступающих за преднамеренное разрушение мостов, ферм и всего, что может быть полезно врагу — в надежде замедлить их продвижение и измотать их силы."

 GXC_republic_of_china_navy_idea: "ВМС Китайской Республики"
 GXC_republic_of_china_navy_idea_desc: "Предшественник современного китайского республиканского флота восходит к ранним дням Синьхайской революции, когда Министерство военно-морского флота было сформировано во Временном правительстве Китайской Республики. Бывший адмирал династии Цин Лю Гуаньсюн стал первым министром военно-морского флота в этот неспокойный период. После Эры милитаристов и последующей Реставрации Сюаньтуна многие элементы ВМС Китайской Республики бежали на юг в опорные пункты Гоминьдана и федералистов, в то время как многие другие решили остаться верными правительству в Пекине. Теперь, когда китайская страна наконец номинально объединена под одним знаменем, снова пришло время оживить и восстановить ВМС Китайской Республики, чтобы они были действительно достойны защищать великие морские интересы Китая."

 GXC_republic_of_china_navy_idea2: "ВМС Китайской Республики"
 GXC_republic_of_china_navy_idea2_desc: "$GXC_republic_of_china_navy_idea_desc$"

 GXC_republic_of_china_navy_brownwater_idea: "ВМС Китайской Республики"
 GXC_republic_of_china_navy_brownwater_idea_desc: "$GXC_republic_of_china_navy_idea_desc$"

 GXC_republic_of_china_navy_battleships_idea: "ВМС Китайской Республики"
 GXC_republic_of_china_navy_battleships_idea_desc: "$GXC_republic_of_china_navy_idea_desc$"

 GXC_blockade_runners_idea: "Прорыватели блокады"
 GXC_blockade_runners_idea_desc: "Наши драгоценные конвои везут людей и ресурсы, отчаянно необходимые для удовлетворения нужд как фронта, так и тыла. В ситуациях, когда враг имеет преимущество и блокирует наши пути, мы должны приложить усилия, чтобы обойти и избежать их кораблей с помощью наших собственных более быстрых судов."

 GXC_six_year_programme_idea: "Шестилетняя программа"
 GXC_six_year_programme_idea_desc: "Амбициозная «Шестилетняя программа» направлена на быстрое развитие возможностей военно-морского производства Китая. Хотя большинство китайских кораблей на протяжении многих лет были либо реликвиями, либо иностранными закупками, как часть Военной революции нации — неизбежно, что мы стремимся модернизировать наши стандарты военно-морского производства до уровня Запада или Японии. Используя огромные людские ресурсы нации, наши верфи будут постоянно заполнены переоборудованными и новыми военными кораблями."

##Economic Ideas

###- Phase IV Ideas -###

##Political Ideas
 GXC_finish_the_revolutionary_mission_idea: "Завершить революционную миссию!"
 GXC_finish_the_revolutionary_mission_idea_desc: "Несмотря на наше впечатляющее восстание из пепла и объединение нации, все еще остается много незаконченных дел, которыми нужно заняться, ибо сейчас время решать будущее нации."

 GXC_stimulated_civil_bureaucracy: "Стимулирование гражданской бюрократии"
 GXC_stimulated_civil_bureaucracy_desc: "После грандиозного шествия Белого Солнца по стране стало очевидно, что скромная модель гражданской бюрократии Гуандуна недостаточно способна в ее нынешнем виде приспособиться к новообретенной территории Гоминьдана. Чтобы исправить это, [ROOT.GetLeader] курировал расширение бюджетных ассигнований на гражданскую службу, что привело к потоку энергичной подготовительной работы для соединения разрозненных административных тупиков провинций."

 GXC_stimulated_civil_bureaucracy_weak: "$GXC_stimulated_civil_bureaucracy$"
 GXC_stimulated_civil_bureaucracy_weak_desc: "$GXC_stimulated_civil_bureaucracy_desc$"

 GXC_stimulated_civil_bureaucracy_tier_2: "$GXC_stimulated_civil_bureaucracy$"
 GXC_stimulated_civil_bureaucracy_tier_2_desc: "$GXC_stimulated_civil_bureaucracy_desc$"

 GXC_stimulated_civil_bureaucracy_max: "$GXC_stimulated_civil_bureaucracy$"
 GXC_stimulated_civil_bureaucracy_max_desc: "$GXC_stimulated_civil_bureaucracy_desc$"

 GXC_equalising_national_prosperity: "Уравнивание национального процветания"
 GXC_equalising_national_prosperity_desc: "Революционная партия масс не может просто сидеть сложа руки, пока шэньши увеличивают свое богатство, а крестьянство продолжает стенать! Чтобы достичь Народного благосостояния и по-настоящему всерьез продемонстрировать заботу Партии о массовом движении, необходимо, чтобы мы начали программу постепенного перераспределения богатства. Пусть они брыкаются, пусть кричат, но если мы хотим «стать громом, который сокрушит старый мир», то старый мир должен быть приведен в новый."

 GXC_bringing_the_revolution_to_the_forests: "Революция в лесах"
 GXC_bringing_the_revolution_to_the_forests_desc: "Как теоретизировал Шэнь Динъи и провозгласил во время своего пребывания в качестве члена Сельскохозяйственного департамента Центрального особого комитета, Шэнь Динъи начал серию амбициозных инфраструктурных проектов земельной реформы с целью модернизации не только экономики Китая, но и его окружающей среды. Разрабатывая планы по ремонту плотины Бэйхай, Шэнь также предложил рекультивировать озеро Сянху и планирует наладить сотрудничество с Движением сельского восстановления."

 GXC_mass_education_efforts: "Усилия по массовому образованию"
 GXC_mass_education_efforts_desc: "Эксперт в образовании и сам ученый-каллиграф-просветитель, Юй Южэнь курировал широкое расширение системы отечественного китайского образования, сотрудничая с такими людьми, как Цзоу Лу. Используя опыт Юя в основании различных школ в Шэньси и Шанхайского университета, наряду с собственным опытом Цзоу в основании Университета Сунь Ятсена и управлении кампусом в изгнании, дуэт стремился внедрить этот опыт во всей стране. Впервые начав с планов Северо-западного сельскохозяйственного и лесного колледжа в Янлине, есть надежда, что все в стране будут избавлены от бедствия неграмотности."

##Military Ideas

 GXC_war_of_attrition_idea: "Война на истощение"
 GXC_war_of_attrition_idea_desc: "Китайская нация не является современной, это правда, однако то, чего нам не хватает в возможностях для современной войны, мы с лихвой компенсируем хитростью и изобретательностью. Наши солдаты готовы пожертвовать не только землей, но и жизнью, чтобы вести войну на истощение против наших врагов, ибо чем глубже проникают наши враги, тем слабее они становятся."

 GXC_defensive_lines_idea: "Оборонительные линии"
 GXC_defensive_lines_idea_desc: "Хотя нашим армиям не хватает современного оружия, танков, кораблей, даже самолетов, мы нация, которая отбивалась от завоевателей тысячелетиями, и знаем, что могут дать великие укрепления. Имея это в виду, наши солдаты готовят траншеи и форты, чтобы построить линии непробиваемой обороны, гарантируя, что наши враги истекут кровью, прежде чем смогут подчинить нашу нацию."

 GXC_extol_the_warrior_spirit_idea: "Восхваление воинского духа"
 GXC_extol_the_warrior_spirit_idea_desc: "Вдохновленные кодексом Бусидо, солдаты армии [Root.GetAdjectiveCap] стремятся быть не похожими ни на кого другого. Вселяя истинный страх в своих врагов, они сражаются с полным упорством и свирепостью против превосходящих сил. Непоколебимые и решительные в своем деле, солдаты, выпускаемые Вампу, проходят строгую муштру, чтобы быть преданными и неумолимыми."

 GXC_modern_arms_idea: "Современное вооружение в новую эпоху"
 GXC_modern_arms_idea_desc: "Во всем мире быстрое развитие превосходных вооружений, будь то танки, самолеты или корабли, продолжает вовлекать друг друга в стремительном темпе. Дуэли происходят между немецкими «Панцерами» и русскими моделями серии Т, и японцы точно так же разработали свою собственную линейку моделей танков. Если мы хотим по-настоящему стать военной силой в новом национальном мировом порядке, крайне важно, чтобы Китай развил свои собственные танковые колонны."

 GXC_constructing_our_own_hindenburg: "Строительство собственной линии Гинденбурга"
 GXC_constructing_our_own_hindenburg_desc: "Недостаточно того, что наши храбрые солдаты и их еще более свирепые души сражаются и сталкиваются с иностранными империалистами день за днем, ибо даже человеческая плоть может не выдержать давления. Их дух может быть закален, но мы можем помочь им еще больше. Благодаря объединенным национальным усилиям со строительными магнатами, бизнес-магнатами и государственными предприятиями, весь Китай выдвинет новую Великую стену! Нашу собственную линию Гинденбурга!"

 GXC_prioritised_artillery_production_idea: "Приоритетное производство артиллерии"
 GXC_prioritised_artillery_production_idea_desc: "В наших усилиях создать силы, способные уничтожить всех врагов, противостоящих китайской нации, мы предприняли амбициозное предприятие по увеличению запасов наших артиллерийских орудий в десять раз, чтобы по-настоящему разрушить оборону противника и позволить нашим мобильным дивизиям воспользоваться прорывом."

 GXC_stalwart_souls_daring_minds_idea: "Стойкие души, дерзкие умы"
 GXC_stalwart_souls_daring_minds_idea_desc: "Наши солдаты, возможно, одни из лучших в мире. Решительные в планировании, бесстрашные в исполнении, преданные до самого конца. Поистине они движутся быстро, используя любую возможность, чтобы посеять хаос в рядах врага, и продвигаются все время вперед."

 GXC_fallout_of_the_kmt_yue_gui_split: "Последствия раскола Юэ-Гуй"
 GXC_fallout_of_the_kmt_yue_gui_split_desc: "Националистическое правительство разделилось на лагеря, базирующиеся в Гуандуне (Юэ) и Гуанси (Гуй), с катастрофическими результатами. Едва сохраняя видимость единства против внешних врагов, объединение по иронии судьбы устранило любое притворство единства — проблема, усугубившаяся после отставки президента Линь Сэня. Два соперничающих комитета издают дуэльные приказы и директивы, офицеры и магистраты выбирают стороны, и изобилуют страхи перед гражданской войной. Все это сделало центральное правительство опасно уязвимым для кружащих стервятников."

##Economic Ideas
 GXC_embrace_autarky_idea: "Принятие автаркии"
 GXC_embrace_autarky_idea_desc: "Экономисты и планировщики Национальной комиссии по реконструкции придерживаются практики автаркии, вдохновленной российским Александром Вознесенским и Высшим советом народного хозяйства. Если Китай действительно хочет освободиться от цепей империализма, то он должен искать свое собственное экономическое будущее, возвращая свои собственные природные ресурсы и богатства для исключительного использования и блага китайского государства."

## Socialist Phase IV ideas
 GXC_fallout_of_the_baise_uprising_idea: "Последствия восстания в Байсэ"
 GXC_fallout_of_the_baise_uprising_idea_desc: "Крах Новой клики Гуанси в восстании в Байсэ снова вверг Лянгуан в политическую суматоху. Поскольку Ассоциация фермеров Гуандуна, Партия народных производителей и Временный комитет действий Тань Пиншаня борются за превосходство в результате вакуума власти в провинции, общественная поддержка и моральный дух правительства были серьезно ослаблены, наряду с общим снижением энтузиазма в военных рядах."

 GXC_encirclement_and_annihilation_idea: "Окружение и уничтожение"
 GXC_encirclement_and_annihilation_idea_desc: "Доктрина окружения охватывает две из трех основных целей войны, оговоренных Клаузевицем: во-первых, уничтожение военной мощи противника, и во-вторых — уничтожение его воли. Уничтожение вражеских подразделений означает сокращение протяженности вражеской территории, что дает нам большие возможности для мобилизации народной поддержки."

 GXC_the_peoples_war_idea: "Народная война"
 GXC_the_peoples_war_idea_desc: "По всей стране угнетенные массы нации стоят в полной солидарности с великой борьбой против истинных милитаристов и империалистов коррумпированного и дегенеративного Нанкинского правительства. Пока такие демагоги, как Ван Цзинвэй, продолжают править, не будет истинной реализации видения покойного доктора Сунь Ятсена о свободном Китае. Поэтому мы будем поощрять молодых и старых, мужчин и женщин работать вместе и стремиться к Новому Китаю."

 GXC_last_stand_of_liangguangs_revolution: "Последний рубеж революции Лянгуана"
 GXC_last_stand_of_liangguangs_revolution_desc: "Сделай или умри, судьба национальной революции зависит от нас. Пока наши войска продолжают храбро сражаться, становится ясно, что наши ресурсы и решимость наших людей слабеют с каждым днем, поскольку Нанкинское правительство усиливает свое наступление против нас. У нас есть возможности начать последнее отчаянное наступление в надежде, что, возможно, мы сможем добиться значительной победы."

 GXC_total_military_collapse_idea: "Полный военный крах"
 GXC_total_military_collapse_idea_desc: "Несмотря на все усилия наших генералов и офицеров, на передовой произошел полный развал с массовым дезертирством, так как наши люди бегут под натиском подавляющего давления. Совершенно очевидно, что конец близок, если не произойдет отчаянное чудо."

 GXC_prepared_for_the_long_war: "Готовность к затяжной войне"
 GXC_prepared_for_the_long_war_desc: "Особым указом Центрального исполнительного комитета был введен ряд строгих военных мер для подготовки провинций к реалиям конфликта с другими великими державами. Были созданы запасы продовольствия, боеприпасов и других припасов, обновлены списки призывников именами молодых людей со всей страны, были введены дополнительные налоги для многострадальных семей Китая. Надежда состоит в том, чтобы иметь работающую систему до неизбежной крупной войны и, таким образом, уменьшить потрясение, когда она разразится, но это, естественно, крайне непопулярно и изобилует коррупцией. Но война требует жертв, и никакая жертва не может перевесить славу национальной революции!"

## UPC Phase IV Ideas
 GXC_progressive_taxes_idea: "Реформы прогрессивного налогообложения"
 GXC_progressive_taxes_idea_desc: "Фискальные требования управления современным национальным государством означают, что необходимо современное состояние налогообложения. Частью этого является тщательный, общенациональный пересмотр национальной налоговой системы, включающий многоуровневые, основанные на средствах категории для налогов на прибыль, наследство и сверхприбыль. Такая программа обречена быть непопулярной среди богатых, но это необходимость, если Китай хочет выжить в современную эпоху."

 GXC_nationalising_socialism_idea: "Национализация социализма"
 GXC_nationalising_socialism_idea_desc: "ДСП считает, что единственный способ, которым социализм может быть действительно реализован в долгосрочной форме, — это выход национализма на центральную сцену. Китайская раса должна преодолеть оковы империализма и ловушки капитализма через смешанную экономическую систему и пламенное принятие национализма. Частная собственность, конечно, будет уважаться, но общественная собственность имеет приоритет. Точно так же будут уважаться индивидуальные свободы, но благо национального государства всегда должно быть на переднем плане наших умов!"

 GXC_a_utopian_vision_for_china_idea: "Утопическое видение Китая"
 GXC_a_utopian_vision_for_china_idea_desc: "Чэнь Цзюнмин однажды написал, что «Счастье полного равенства — это не тот вид ложной надежды, что Небеса автоматически благословят каждую душу на земле. Скорее, оно дает человеческому духу возможность для возрождения. Если мы хотим реализовать это счастье равенства и возможность для духовного возрождения, нам не нужно больше искать. Нам нужно великое пробуждение каждого ума, чтобы все могли освободиться от преобладающего ошибочного мышления, что "каждый должен бороться за свое существование без какой-либо заботы о жизни и смерти других"... Как только мысль трансформируется, человечество может легко порвать со старой жизнью и старыми институтами. На пути эволюции мир в целом найдет новую жизнь и новые институты, чтобы в конечном итоге достичь стадии, где не будет границ между государствами, между нациями или между индивидуумами».\n\nПоиск этой утопии может занять поколения, но если мы сможем хотя бы направить Китай на правильный путь при нашей жизни, это будет того стоить."

 GXC_protecting_regional_autonomy_idea: "Защита региональной автономии"
 GXC_protecting_regional_autonomy_idea_desc: "Суть федералистского движения заключалась в защите автономии провинций и наделении провинциальных ассамблей и их губернаторов полномочиями принимать решения самостоятельно, а не полагаться на диктат центрального правительства. Заключив мир с различными региональными губернаторами, мы можем положить конец бесконечным циклам конфликтов между центром и периферией и направить Китай на путь к миру."

## NPA Phase IV Ideas

 GXC_emphasising_intellectual_freedoms: "Акцент на интеллектуальных свободах"
 GXC_emphasising_intellectual_freedoms_desc: "Торможение прогресса трудолюбивых студентов и всегда блестящих интеллектуалов — это, пожалуй, величайший позор для любого политика. Студенты, писатели, мыслители — все должны быть свободны в исследовании идей и выражении своего мнения, желает того правительство или нет. Наука — это тот самый корень, благодаря которому Китай будет двигаться к современности, и нужно сделать всё для её продвижения."

 GXC_experimental_rice_cultivation: "Экспериментальное выращивание риса"
 GXC_experimental_rice_cultivation_desc: "Получив образование на одних из лучших сельскохозяйственных факультетов Китая и Японии, Дин Ин стал пионером в экспериментах с плодовитыми сортами риса, выведя в общей сложности 110 сортов, а к 1934 году вывел первый гибридный сорт с диким рисом. Под его руководством Гуандун стал центром селекции риса в Южном Китае, но теперь, когда его методы популяризируются по всей стране, есть надежда, что весь Китай больше никогда не столкнется с голодом."

 GXC_expansion_of_the_charitable_halls: "Расширение Благотворительных залов"
 GXC_expansion_of_the_charitable_halls_desc: "Благотворительные залы, учреждения эпохи Цин, значимость которых то возрастала, то убывала в Эру милитаристов, были фундаментом различных правительств в Гуанчжоу с 1910 года. Благодаря их давлению и настойчивости правительство начало финансировать расширение этих благотворительных учреждений по всей стране, возрождая их роль в предоставлении помощи нуждающимся, а иногда и в финансировании местных органов власти при необходимости."

 GXC_connecting_disparate_china: "Соединяя разрозненный Китай"
 GXC_connecting_disparate_china_desc: "Железные дороги приносят процветание. Так принято считать, и в этом утверждении есть правда. Без железных дорог нация не может индустриализироваться эффективно, а во внутренних районах Китая во многих городах и деревнях едва ли есть дороги, не говоря уже о современных путях. Именно в таких условиях правительство должно отчаянно начать соединять каждый крупный финансовый, сельскохозяйственный и промышленный узел с помощью железных дорог."

 GXC_elevating_a_new_plutocracy: "Возвышение новой плутократии"
 GXC_elevating_a_new_plutocracy_desc: "Торговцы — истинные финансисты Китая, и именно под правлением милитаристов, политиков и революционеров они видели, как их статус сильно падал, несмотря на то, что они финансировали многих своих потенциальных благодетелей, подобно шэньши. И поэтому при этом псевдо-купеческом правительстве должна возникнуть новая плутократия, ибо если нация хочет быть современной, сильной и богатой, её должны возглавлять те, кто контролирует богатство нации своим торговым мастерством."

 GXC_glorifying_guangxi_militarism: "Прославление милитаризма Гуанси"
 GXC_glorifying_guangxi_militarism_desc: "Гордость Гуанси в том, что его люди выносливы, сильны и стойки. Благодаря своей измученной битвами провинции и десятилетиям войн с захватчиками и бандитами, народ стал настоящим образцом для подражания в масштабах всей страны. Пассивный гражданский милитаризм, как в рамках подготовки к потенциальному иностранному вторжению, так и в самих вооруженных силах, гарантирует, что независимо от врага, будь то иностранный империалист или кто-то другой, китайский народ нанесет удар со свирепостью и жестокостью."

 GXC_reintroducing_discipline_to_the_corps: "Возвращение дисциплины в Корпус"
 GXC_reintroducing_discipline_to_the_corps_desc: "Торговые корпуса по всей стране можно было сравнить разве что с богатыми бандитами; где потребность грабить и мародерствовать заменялась азартными играми и попойками. Без надлежащей подготовки или тщательного отбора рекрутов солдаты Торгового корпуса — это практически правительственные головорезы, и такое положение дел плохо отражается как на бизнесе, так и на нации. С помощью усовершенствованной муштры, запрета на пороки и обязательного военного образования для некоторых офицеров Корпуса, возможно, удастся создать образ собрания утонченных солдат, сражающихся за людей, а не за их активы."

 GXC_banquets_with_the_merchants: "Банкеты с торговцами"
 GXC_banquets_with_the_merchants_desc: "Торговцам Гуандуна не привыкать к тому, какую роль могут сыграть угощение и развлечение предприимчивых гостей или их поклонников в заключении хорошей сделки или гарантии покупки, и то же самое происходит в их торговой форме политиканства. Устраивая роскошные банкеты, играя на эго и банальной лести, правительство может обеспечить мир, финансовое развитие и политическую поддержку."

 GXC_shen_hongying_the_folk_hero: "Шэнь Хунъин: Народный герой"
 GXC_shen_hongying_the_folk_hero_desc: "Шэнь Хунъин — не просто бандит, нет, он борец за права людей, за их свободу, за стабильность нации и силу её армии. Скромный, заслуженный и знающий лично каждого солдата в своем контингенте армии, Шэнь культивировал этот образ мудрого мастера, человека, ввергнутого в свое положение необходимостью нации, а не ради личной выгоды — что бы ни изображали его физические действия."

 GXC_restoring_harmony_to_a_wounded_nation: "Восстановление гармонии в израненной нации"
 GXC_restoring_harmony_to_a_wounded_nation_desc: "Китай — это нация, которая наносила себе вред в тщетной смертельной борьбе между идеологиями, личными амбициями и владениями милитаристов с момента краха безраздельного господства Цин в 1850-х годах. Конфуцианство, когда-то бывшее клеем, скреплявшим нацию через взаимное чувство веры и идентичности, было отброшено и сочтено «ограничивающим» во время Движения 4 ноября 1919 года. Но оно вряд ли ограничивающее и вряд ли заслуживающее полного порицания; чтобы восстановить гармонию, нужно осознавать свою роль и положение в национальном государстве, и крайне важно, чтобы конфуцианские принципы вернули свое законное место в культурной и социальной динамике."

 GXC_defending_chinese_liberty: "Защита китайской свободы"
 GXC_defending_chinese_liberty_desc: "Казалось бы, очарование автократии и персонализма нависает над нацией. Что бы ни говорили о нынешнем правительстве Лянгуана, можно по крайней мере сказать, что Юг всегда будет возмущаться любой формой навязывания Севером ограничений китайских свобод и вольностей. Против Цин, против Юань Шикая, против Дуань Цижуя и против Сунь Ятсена. Милитаристы Лянгуана восставали снова и снова, и было бы глупо ожидать, что они останутся в стороне от следующей битвы за свободу."

 GXC_forced_mustering_of_the_people: "Принудительная мобилизация народа"
 GXC_forced_mustering_of_the_people_desc: "Сколько помнит себя крестьянин из Гуанси, солдат всегда был этим многоликим злом: «защищать» тебя от бандитов, но затем навязывать тебе определенную форму ограничительного порядка или призывать тебя в саму армию. В то время как Эра милитаристов загоняла множество крестьян в различные формирования милитаристов, так как им обещали плату или еду, многие были демобилизованы в общины, которые относились к ним с отвращением, неспособные найти работу, и, таким образом, обращались к бандитизму.\n\nОднако сейчас не время для реформ или пересмотра десятилетий милитаризма и среды ветеранов. Если народ не сражается, его нужно заставить, ибо на кону не только их средства к существованию, но и сама провинция, её культурная идентичность, рискующая быть подавленной навязыванием северянами политического порядка, который ни один южанин не сможет вынести."

 GXC_one_last_battle_for_glory: "Последняя битва за славу"
 GXC_one_last_battle_for_glory_desc: "История не добра к тем, кто терпит неудачу в восстании или мятеже, и не может быть такого, чтобы милитаристы и торговцы Лянгуана были так же выброшены в мусорную корзину. Это невозможно без одного последнего выступления против несправедливости, и если какой-либо солдат сложит оружие, это должно произойти силой. Смерть — это ничто, но жить побежденным и бесславным — значит умирать ежедневно."

 GXC_tsunami_of_dissent: "Цунами несогласия"
 GXC_tsunami_of_dissent_desc: "Увы, оказалось, что вся мобилизация милитаризма Гуанси и финансов Гуандуна, все потерянное оружие и люди — всё было напрасно. Народ восстал против своих же защитников, стремясь присоединиться к вторгшимся армиям и свергнуть тех, кого они сочли худшим злом. Солдаты почти не сражаются или же восстают и дезертируют, и стало совершенно ясно, что время милитаристов Лянгуана стремительно уходит."
###- Phase V Ideas -###

##Political Ideas
 GXC_nationalist_youth_orgs: "Националистические молодежные организации"
 GXC_nationalist_youth_orgs_desc: "Доктор Сунь считал, что молодежь тоже должна участвовать в национальной революции. Молодежь — это фундамент революционного будущего, и дух Китайской национальной революции, а также китайский национализм должны передаться следующим поколениям, если Китай хочет быть сильным. Ибо слабости Китая кроются в отсутствии единства, и если мы пренебрежем молодежью — мы не подготовим их к революционной борьбе в будущем. Давайте обратимся к молодежи через националистические организации и будем поощрять членство как мальчиков, так и девочек, чтобы они изучали и несли дальше «Три народных принципа» доктора Суня."

 GXC_continuing_resistance: "Продолжающееся сопротивление"
 GXC_continuing_resistance_desc: "Несмотря на бумажный статус нашего номинального правления, доминирующего в центре Китая, под чистой поверхностью скрывается нация, раздираемая конфликтами и оппозицией. Различные местные милитаристы, остатки оппозиционных партий и интеллигенция одинаково преследуют наше правительство и армию, в конечном итоге резко ослабляя нашу способность управлять. Неважно, их сопротивление в конечном итоге бесполезно, ибо все будут поглощены Белым Солнцем и Тремя народными принципами, так или иначе."

 GXC_republican_disappointment: "Республиканское разочарование"
 GXC_republican_disappointment_desc: "Возможно, по нашей собственной глупости, многие интеллектуалы, студенты и даньвай искренне верили, что поддержка Гоминьдана приведет к внезапному, в последнюю минуту, повороту к немедленным демократическим выборам. Поскольку это явно не так, многие в этих группах и даже в нашей собственной партии разочарованы нашим управлением и начали протестовать на улицах. Заверения партийного аппарата оставляют только неприятный осадок, и совершенно очевидно, что действия, а не слова, являются необходимым противоядием от этого национального вируса."

 GXC_economic_disappointment: "Экономический недуг"
 GXC_economic_disappointment_desc: "То, что когда-то было славно цветущим экономическим чудом в Китае, превратилось в разрушенную катастрофу. Инфраструктура разрушена, инвестиции бегут, а безудержные долги начали разгонять наше правительство в сторону гиперинфляции. В этот период великой национальной реконструкции крайне важно, чтобы Партия и нация объединились и сотрудничали, чтобы увидеть более сильную, единую китайскую экономику. Такую, которая твердо стоит на ногах, которая следует принципам национального капитализма и Миньшэн."

 GXC_exporting_the_guangxi_model_modifier: "Сань-ю Чжэнцэ"
 GXC_exporting_the_guangxi_model_modifier_desc: "Выкристаллизовавшаяся как фундаментальная организационная структура Движения за реконструкцию Гуанси, «Модель Гуанси», как ее называют, является отличительным продуктом уникального опыта Новой Гуанси в изгнании и внутри самой Гуанси. Опираясь на историческую основу, лежащую в государстве Ци древнего Китая, династиях Ся, Шан, Чжоу, Хань и Тан, наряду с ее недавней итерацией против восстания тайпинов, система ополчения является детищем квадрумвирата Новой Гуанси.\n\nОснованная на политике тройной опоры на собственные силы (Сань-ю): Самооборона, Самообеспечение, Самоуправление, Модель Гуанси исповедует свою собственную уникальную своеобразную форму тридемистской философии Сунь Ятсена, где ополчение используется как оружие для введения Миньшэн, культивирования Миньцюань и защиты Миньцзу. Создавая сильный, милитаризованный и дееспособный Китай, Модель Гуанси в целом надеется преодолеть разрыв между военным и гражданским населением, в конечном итоге переплетая их в одно целое."

 GXC_unity_with_the_liberals: "Единство с либералами"
 GXC_unity_with_the_liberals_desc: "По правде говоря, либеральные и реформистские элементы китайского общества долгое время презирались революционной партией; ибо они не перенесли испытаний и невзгод, которые перенес доктор Сунь, ибо они хватаются за свои жемчуга в искренней надежде на катарсис, который принесет один «хороший» милитарист. В эту новую эру единого Китая милитаристов не осталось, и все же либералы упорствуют. Хотя мы можем не сходиться во взглядах на методологию, наши общие конечные цели породили новые захватывающие отношения."

 GXC_scientific_progress_idea: "В погоне за научным прогрессом"
 GXC_scientific_progress_idea_desc: "Критически важным для прогресса общества является прогресс науки. Вместе, нога в ногу, инвестиции партии в науку позволят Китаю перейти в новую эпоху, а вместе с ней, как предписано доктором Сунем в его научном применении Трех принципов, завершить Национальную революцию. Ибо это революция, построенная не на традициях прошлого, не на глупости конфуцианства и буддизма, а на современности и справедливости."

 GXC_liangguang_piedmontism_effect: "Лянгуанский Пьемонтизм"
 GXC_liangguang_piedmontism_effect_desc: "Будучи первыми в объединении китайской нации, провинции Гуандун и Гуанси получили многочисленные особые преимущества, отражающие их статус и важность в Национальной революции. Включая более высокое выделение национальных средств в провинциальные бюджеты, первенство в национальных делах и другие блага, Лянгуан стал новым центром и точкой опоры китайской нации."

 GXC_champion_local_democratic_initiatives_effect: "Местные демократические инициативы"
 GXC_champion_local_democratic_initiatives_effect_desc: "В качестве искренней демонстрации доброй воли по отношению к демократическому правлению, Новая клика Гуанси поддержала коалицию «Крестовый поход за свободный демократический Китай» в различных провинциях для помощи в развитии местной демократии. Надеясь продвинуть Национальную революцию к Конституционному правлению, считается, что коалиция сможет научить людей отбросить концепцию, что военная сила может решить проблемы нации, и что только национальная реконструкция позволит нации выйти из Эры милитаристов."

 GXC_intensify_local_self_government_programmes_effect: "Усиленные программы местного самоуправления"
 GXC_intensify_local_self_government_programmes_effect_desc: "С истинным намерением реализовать принцип Миньцюань, Ху Ханьминь сумел протолкнуть различные программы по всей стране, предписывающие различные предприятия местного самоуправления. Изменяя психологию, лидерство, образование и этику людей, правительство должно стремиться преодолеть заблуждение о том, что китайский народ неспособен к самоуправлению."

 GXC_civilian_control_over_military_idea: "Обеспечение гражданского контроля над армией"
 GXC_civilian_control_over_military_idea_desc: "Поистине размахивая мечом как способный государственный деятель и новейшее лицо либерализма в Китае, Центральный исполнительный комитет под эгидой Председателя [ROOT.GetLeader] курировал реализацию различных антикоррупционных и антибюрократических программ в Национально-революционной армии. В конечном итоге стремясь подчинить армию прихотям гражданского правительства, многие начали приветствовать неожиданное обуздание безудержных военных свобод, даже если Новая Гуанси держит карты в Комиссии по военным делам."

 GXC_control_the_means_of_the_masses_idea: "Контроль над средствами масс"
 GXC_control_the_means_of_the_masses_idea_desc: "Установив тщательный правительственный контроль над СМИ и прессой, Революционная диархия обеспечила, чтобы только поддерживающие правительство источники получали внимание, ибо Ли Цзунжэнь доказал, что могут сделать массы, когда они выходят из-под контроля. Больше их не будут дергать за ниточки, заставляя плясать под дудку деспотов. Диархия здесь для их спасения, поддерживаемая не только умом, но и силой оружия."

 GXC_organ_of_the_executive_state: "Орган исполнительной власти"
 GXC_organ_of_the_executive_state_desc: "Несмотря на все наши усилия продолжать заверять в нашей искренней заинтересованности и убежденности в улучшении будущего китайского народа, различные милитаристы, империалисты, местные тираны и злые шэньши продолжают препятствовать нашим усилиям по проведению Трехэтапной национальной революции. Хуже того, различные социалистические элементы продолжают будоражить крестьянство своими ложными идолами, порождая социальную анархию. Благодаря введению частных предприятий под официальный контроль правительства и Партии наряду с субсидированием Бюро общественной безопасности, Китай никогда не впадет ни в туман социализма, ни в другую Эру милитаристов."

 GXC_enforce_mass_demobilisation_idea: "Принудительная массовая демобилизация"
 GXC_enforce_mass_demobilisation_idea_desc: "Милитаризм, который Ху Ханьминь определяет как государство, организованное в первую очередь для военных целей, принес другим только страдания. Изначально человек организовывался в военном отношении для самообороны, но теперь государства начали вступать на преднамеренно агрессивные пути. Такой порядок не может устоять, ибо если у милитаристов нет цели, они неизбежно обращаются внутрь. Благодаря реорганизации Китая в различные военные зоны и постепенной демобилизации Национально-революционной армии под эгидой правительства, есть надежда, что Армия будет подчинена Гражданскому крылу Партии, а не наоборот."

 GXC_six_years_of_necessary_tutelage_idea: "Шесть лет необходимой опеки"
 GXC_six_years_of_necessary_tutelage_idea_desc: "Большинство сочло бы это глупой затеей — пройти период Опеки всего за шесть простых лет, и все же для многих Ху Ханьминь — именно тот исключительный человек, который необходим для воплощения такого идеала в жизнь. Обладая необходимой государственной мудростью и полной поддержкой партии и народа, Премьер обеспечит радикальные перемены в Китае и его готовность к демократии.\n\n«Если мировая революция может быть достигнута с помощью единой идеологии, которая может разрушить национальные границы, то эта революция должна отражать потребности людей мира. Если нет, то это не революция. Как же тогда можно сказать, что так называемая уникальная идеология — это что-то большее, чем жесткая формула?»"

 GXC_expositor_of_the_three_principles: "Толкователь Трёх принципов"
 GXC_expositor_of_the_three_principles_desc: "Национальная революция и Три принципа могут быть уникальным китайским начинанием, это правда. И также верно, что Три принципа уникально характеризуются Китайской революцией, настолько, что экспорт с Запада, такой как синдикализм или национальный народнизм, в настоящее время не может существовать на поле битвы Китайской революции. Тем не менее, Три народных принципа могут служить шаблоном для всех революций по всему миру, поскольку собственная Национальная революция Китая является одной из самых молодых и успешных в новейшей истории. Работая над достижением этой цели, крайне важно, чтобы Партия напоминала китайскому народу о революционной вере, которую она защищает и исповедует."

 GXC_hu_hanmin_tutelage_modifier: "Фаза опеки"
 GXC_hu_hanmin_tutelage_modifier_desc: "В сущности, фаза Опеки, описанная Гофу, следует принципам просвещения китайского народа об их правах в современной демократии, их обязанности участвовать в ней и конечном введении местного самоуправления как преамбулы к этапу Конституционного правления. Благодаря процессам местных программ обучения для осуществления самоуправления, реализации принципа «Земля пахарю», сокращению неграмотности в стране и дополнительно программам обучения персонала для партии, чтобы позволить ее кадрам лучше приспособиться к Опеке, есть надежда, что Китай будет революционно преобразован. Двигаясь вперед к Датун (Великому Единению), сама Опека должна вечно сохранять дух благожелательности и прощения.\n\nОднако Партия не может успокаиваться, она не может просто довольствоваться заполнением вакуума, оставленного милитаристами, шэньши и социалистами до нее. Партия должна придерживаться своего мандата в шесть лет, и под эгидой «Китайского Кемаля» это вполне может сбыться. Ибо Гофу оставил нам идеологию практической и научной теории, основанной на законах социальной эволюции человека, а не метафизики или материализма."

 GXC_democratic_awakening: "Демократическое пробуждение"
 GXC_democratic_awakening_desc: "С захватом рычагов власти более демократическими элементами Гоминьдана шумный хор криков, требующих демократизации государства, ободрился и продолжает становиться все громче, серьезно затрудняя способность нового правительства поддерживать повседневные функции государства."

 GXC_warlord_intransigence: "Непримиримость милитаристов"
 GXC_warlord_intransigence_desc: "Несмотря на то, что на бумаге мы стремимся к централизованному правительству, управляющему всеми регионами Китая, в реальности позиция предыдущего правительства требовала создания альянсов и соглашений с различными мелкими и крупными региональными милитаристами для обеспечения успеха его военных кампаний. С ростом [ROOT.GetRulingParty] различные милитаристы продолжают осуществлять свой полный контроль над своими региональными силами, снижая эффективность наших армий."

 GXC_student_agitation: "Студенческая агитация"
 GXC_student_agitation_desc: "С ростом политической активности молодого китайского населения многие студенты начали создавать группы давления, чтобы агитировать против правительства в своем стремлении к системе, которая действительно функционирует не только для стабилизации революционного государства, но и для обеспечения стабильности и благосостояния для каждого человека, независимо от его убеждений."

 GXC_return_of_the_vanguard: "Возвращение авангарда"
 GXC_return_of_the_vanguard_desc: "Считающаяся старейшим членом Гоминьдана, Клика Сишань пережила возрождение как жизненной силы, так и популярности, больше не нуждаясь в том, чтобы быть младшим партнером Ху Ханьминя, но теперь являясь силой сама по себе. Двигаясь вперед, они надеются довести до конца поиск «чистой» партии и идеологии, свободной от влияния по своей сути некитайских концепций."

 GXC_cabinet_takes_the_lead_tier_1: "Кабинет берет руководство на себя"
 GXC_cabinet_takes_the_lead_tier_1_desc: "Перевод Национальной революции с рельсов Демократического централизма на рельсы Демократического консенсуса — непростая задача, но благодаря сотрудничеству истинного членства Гоминьдана, тех, кто был наиболее лоялен и стоек к Суню, все возможно. Пусть Китайская Республика станет сияющим примером для подражания международному сообществу."

 GXC_cabinet_takes_the_lead_tier_2: "$GXC_cabinet_takes_the_lead_tier_1$"
 GXC_cabinet_takes_the_lead_tier_2_desc: "$GXC_cabinet_takes_the_lead_tier_1_desc$"

 GXC_cabinet_takes_the_lead_max: "$GXC_cabinet_takes_the_lead_tier_1$"
 GXC_cabinet_takes_the_lead_max_desc: "$GXC_cabinet_takes_the_lead_tier_1_desc$"

 GXC_empowering_the_national_legislature_idea: "Наделенный властью национальный законодательный орган"
 GXC_empowering_the_national_legislature_idea_desc: "Крайне важно, даже особенно насущно, чтобы нацией больше не управляла винтовка. Ибо продвижение конституционного правительства и реализация демократической политики должны быть главными целями государственного строительства. Чиновничество — это не путь к власти, а путь к служению народу. Сильный законодательный орган наряду с принятием общей культуры, которая выступает за соблюдение закона и культивирование привычки к верховенству закона, — это станет фундаментальным решением десятилетий хаоса и кровопролития в стране."

 GXC_new_kmt_constitution_modifier: "Конституция Китайской Республики"
 GXC_new_kmt_constitution_modifier_desc: "Формируя Основной закон, по которому управляется Республика, Конституция Китайской Республики служит последним шагом на долгом пути к истинному конституционному правлению в китайской нации. Разработанная Политическим консультативным советом, объединившим некоторые из величайших юридических умов Китая из Гоминьдана, а именно Фракцию реконструкции Сунь Фо, Клику Сишань Цзюй Чжэна, Клику старейшин Ху Ханьминя и даже некоторых второстепенных участников, таких как Клика политической науки Хуан Фу, она является свидетельством долга, служения и усердия Гоминьдана в проекте государственного строительства Китая.\n\nВыделяя Три народных принципа как руководящие принципы, по которым должна управляться нация, и концепцию суверенитета народа, конституция также четко оговаривает защиту свобод и гражданских прав народа, собственное разделение властей центрального правительства на пять правительственных органов — Пять юаней, и систему местной автономии.\n\nЗатмевая предыдущие попытки конституционного правления в китайской нации, такие как Конституция Цао Куня или Проект конституции Храма Неба, это по своей сути прогрессивный законодательный акт. Состоящая из трех частей: Конституции свободы, Конституции правительства и Конституции суверенитета, она содержит в общей сложности 175 статей, разделенных на 14 глав."

 GXC_breaking_their_hilts: "Ломая их рукояти"
 GXC_breaking_their_hilts_desc: "Считавшееся революционной военно-политической структурой, принесшей Национально-революционной армии ее величайшие победы, время политической индоктринации Вампу, фокуса на воинском духе и развитии радикализма исчерпало себя. Поскольку нация едина, а радикальные выпускники академии наряду с гнусными кликами милитаристов находятся в сильной оппозиции к [ROOT.GetLeader], было сочтено необходимым искоренить индоктринацию. Чего бы это ни стоило, верность идеологии меркнет перед патриотизмом и пылким национализмом за свою страну, независимо от вероисповедания."

 GXC_flourish_of_the_liberals: "Расцвет либералов"
 GXC_flourish_of_the_liberals_desc: "Хотя либеральные силы Фракции реконструкции когда-то считались истощенной силой внутри Гоминьдана, они доказали неправоту всех скептиков. Благодаря их большому успеху многие вступают в их ряды в надежде на возможную китайскую демократию, скорее раньше, чем позже. Наделенная новой страстью, энергией и целью, Фракция реконструкции, несомненно, увидит завершение Национальной революции, ибо Опека — это лишь вопрос времени."

 GXC_revolution_by_the_railway: "Революция по железной дороге!"
 GXC_revolution_by_the_railway_desc: "Движимый опытом, полученным от своего отца и во время пребывания на посту министра железных дорог, [ROOT.GetLeader] все больше осознает, что национальное процветание и Национальная революция могут быть реализованы только через инфраструктуру. Без инфраструктуры правила бы Британия морями? Нашла бы Германия свое место под солнцем? Укротила бы Америка запад? Пришло время бедности Китая быть решенной поездом!"

 GXC_consolidation_of_the_bureaucracy: "Консолидация бюрократии"
 GXC_consolidation_of_the_bureaucracy_desc: "Якобы авторитарная партия, Гоминьдан изобилует оппозицией нашему более либеральному взгляду. Чтобы исправить это, мы начали постепенную реорганизацию партии и правительства. Перетасовывая министров и назначенцев, мы надеемся, что нация станет правительством, свободным от бюрократических зол. Чтобы Китай достиг демократической системы, он должен сначала иметь мудрое политическое руководство, способное позволить Китаю и его народу двигаться к цели демократической политики."

 GXC_demonstrating_the_democratic_spirit_modifier: "Местные демократические выборы"
 GXC_demonstrating_the_democratic_spirit_modifier_desc: "Гоминьдан придерживается убеждений доктора Сунь Ятсена о том, что права народа — это способность осуществлять выборы, отзыв, референдум и инициативу. Однако этим правам должна обучать и учить Партия, под руководством Гоминьдана и созданием местных органов власти с помощью Партии — может ли такая демократия процветать? Цель Партии состоит в том, чтобы, обучая массы, однажды народ стал полностью способен к демократии."

 GXC_constitutionalism_triumphs_regionalism_modifier: "Правительство Пяти юаней"
 GXC_constitutionalism_triumphs_regionalism_modifier_desc: "Представляя собой многоорганную структуру правительства Гоминьдана, власть Пяти юаней зависит от поддержки населением зарождающихся идей конституционного правления и, в конечном счете, демократии.\n§YЭффекты этой идеи изменяются в зависимости от вашей текущей популярности партий §gАвторитарные демократы§!, §OСоциал-либералы§! и §cСоциал-консерваторы§!.§!"
 GXC_constitutionalism_triumphs_regionalism_modifier_tt: "§CДобавляет динамический модификатор, эффекты которого зависят от вашей текущей популярности партий §cСоциал-консерваторы§!, §OСоциал-либералы§! и §gАвторитарные демократы§!.§!\n§YТекущие эффекты:§!\n - Фактор прироста политической власти: §R-15%§!\n - Урон гарнизонам: [?GXC.party_popularity@social_conservative|%-=]\n - Модификатор стабильности от штрафа войны: [?GXC.party_popularity@social_liberal|=%+]\n - Скорость снижения сопротивления: [?GXC.party_popularity@authoritarian_democrat|=%+]"

 #LKMT

 GXC_counter_revolutionary_resistance: "Контрреволюционное сопротивление"
 GXC_counter_revolutionary_resistance_desc: "К огорчению как внутренних, так и международных наблюдателей, концепция зарождающегося социалистического движения Лянгуана, вытесняющего поддерживаемый Интернационалом Центральный исполнительный комитет и повстанцев Миньгань, нанесла хаос способности нашего правительства функционировать. Номинально вынужденные бороться с ожидаемой оппозицией со стороны бандитизма, милитаристов и правых, даже наши собственные братья-социалисты направляют кинжалы нам в спину, рассматривая нас как выскочек, крадущих революцию."

 GXC_crumbling_red_army: "Красная армия рушится"
 GXC_crumbling_red_army_desc: "Будучи созданной как главный социалистический меч в революционной войне против отчаявшихся милитаристов, империалистов и клептократов, Национально-революционная армия когда-то стояла могучей и высокой, возвышаясь над всеми своими современниками. Однако теперь она лишь тень своего прежнего «я», практически разорвав себя в гражданской войне, мало кто хочет сражаться, а моральный дух находится на самом низком уровне."

 GXC_economic_turmoil: "Масштабные экономические потрясения"
 GXC_economic_turmoil_desc: "Хотя этого и следовало ожидать от такого радикального перехода в государственной политике, нынешняя катастрофа, известная как национальная экономика, является результатом очень малого количества реальных действий правительства, ибо у них было мало времени для правления. На самом деле состояние экономики можно отнести к разрушительному правлению милитаристов, Северному походу и дальнейшей гражданской войне, которые объединились, чтобы погасить любые потенциальные угли производительности."

 GXC_mass_collectivisation_efforts_idea: "Усилия по массовой коллективизации"
 GXC_mass_collectivisation_efforts_idea_desc: "Поскольку наша славная революция в самом разгаре, мы приступили к обеспечению уравнивания земли, так или иначе. Будь то силой, принуждением или иным образом, капиталист и буржуа вернут свою землю народу, это только вопрос времени!"

 GXC_longing_for_the_lost_golden_age_idea: "Тоска по утраченному Золотому веку"
 GXC_longing_for_the_lost_golden_age_idea_desc: "Шли ожесточенные споры о природе китайской бедности, и такие люди, как Ху Ши, винили внутренние проблемы, такие как коррупция и невежество. Но руралисты, такие как Лян Шумин и Пэн Пай, утверждают, что империализм является главным корнем современных бед, ускоряя обнищание через вторжение, милитаризм и навязывание товарной экономики. Жизнь была тяжелой и тогда, но крестьянин, по крайней мере, мог позволить себе некоторые приятные вещи, такие как общинные собрания — то, о чем нам следует помнить в будущем."

 GXC_the_peasant_soldier_idea: "Наш крестьянин-солдат"
 GXC_the_peasant_soldier_idea_desc: "Хотя Национально-революционная армия доказала свою доблесть в предыдущих битвах за освобождение рабочего, поистине сила нашей нации заключается в крестьянстве. С милитаризацией крестьян в иррегулярные дивизии наша армия обязательно будет безграничной по численности и неумолимой в преследовании капиталистов."

 GXC_expanding_nation_wide_rural_services: "Расширение сельских услуг"
 GXC_expanding_nation_wide_rural_services_desc: "Благодаря тщательным инвестициям государственных средств в наши самые обездоленные провинции, создание дорог, инфраструктуры и других форм социального обеспечения наводняет жизнь нашего сельского крестьянства, радикально повышая их уровень жизни. И их поддержку нашего правительства."

 GXC_revolutionary_theatrics_idea: "Революционная театральность"
 GXC_revolutionary_theatrics_idea_desc: "Многие полагают, что теории и доктрине революции нужно учить только по книгам и читая сложную политическую теорию социалистов, таких как Маркс, Энгельс, Сорель и Бланки. Тем не менее, чтобы достучаться и привлечь истинных лаобайсин (простой народ) страны, мы должны делать это так, чтобы они понимали; мы будем поощрять рост революционной популярной культуры, такой как оперы и песни, чтобы помочь привить цели и идеалы революции."

 GXC_peoples_commune_effect: "Народная коммуна АФПГ"
 GXC_peoples_commune_effect_desc: "Вдохновленный своими местными провинциальными коммунами Гуандуна во время партизанской войны против милитаристов Чжили и Торгового корпуса, Пэн Пай настаивал на создании ряда провинциальных Народных коммун в самых сельских китайских провинциях, чтобы лучше мобилизовать и организовать крестьянство."

 GXC_harmonious_land_distribution_effect: "Гармоничное распределение земли"
 GXC_harmonious_land_distribution_effect_desc: "На протяжении большей части китайской истории крестьяне сильно страдали от произвола имперского правительства и местных помещиков. Синьхайская революция была направлена на решение этих проблем, но для среднего крестьянина мало что изменилось после революции. Гоминьдан обещал критическую помощь крестьянам и рабочим Китая, но не смог выполнить свои цели. Теперь, когда Партия народных производителей обеспечила контроль над Китаем и создала правительство производящего народа, она сочла целесообразным предоставить землю всем китайцам, независимо от прежнего классового статуса. Пусть народ радуется, ибо мечта о Датун (Великом Единении) все ближе и ближе!"

 GXC_courting_liberty_effect: "Заигрывание со свободой"
 GXC_courting_liberty_effect_desc: "Партия народных производителей — это далеко не просто партия крестьян и рабочих, скорее это партия для всего китайского народа, независимо от класса. Таким образом, Партия народных производителей должна протянуть руку совместимым патриотическим либеральным организациям и партиям, чтобы мы могли построить новый Китай, где все могут процветать. Производящие народы и интеллектуалы вместе нанесут критический удар по бедности и отсталости рука об руку!"

 GXC_peoples_revolutionary_army_effect: "Народно-революционная армия"
 GXC_peoples_revolutionary_army_effect_desc: "Народно-революционная армия — это авангард китайской революции, защищающий интересы производящего народа, отбивающий империализм и гарантирующий, что рабочие и крестьяне будут наслаждаться процветанием и безопасностью в Новом Китае."

 GXC_united_front_effect: "Истинный Единый фронт"
 GXC_united_front_effect_desc: "В то время как старый Центральный комитет Гоминьдана протягивал руки только Лиге китайских синдикалистов для Единого фронта, ПНП протянет руку совместимым либеральным партиям и другим дружественным патриотическим партиям, также стремящимся принести гармонию китайскому народу."

 GXC_achieving_minsheng_idea: "Достижение Миньшэн"
 GXC_achieving_minsheng_idea_desc: "У этого революционного правительства производящего народа нет более великой цели, чем оказать критическую поддержку больному крестьянству и больным рабочим, чьим средствам к существованию невероятно угрожают реакционные милитаристы и жадные помещики. ПНП будет неустанно идти к миньшэн (народному благосостоянию), чтобы однажды сама бедность была искоренена."

 GXC_rural_reconstruction_efforts_idea: "Усилия по сельскому восстановлению"
 GXC_rural_reconstruction_efforts_idea_desc: "После краха власти Цин и роспуска лиги безудержные бои и гражданские войны опустошили сельскую местность. В то время как Партия народных производителей выступает за всех китайцев независимо от класса, крестьянство всегда было хребтом народа и революции. Время их страданий прошло, теперь пришло время восстановления."

 GXC_progressive_spirit_idea: "Дух прогресса"
 GXC_progressive_spirit_idea_desc: "Партия народных производителей создала правительство, состоящее не только из патриотов-социалистов и прогрессивно мыслящих людей, но и из патриотов-либералов. Это правительство производящего народа командует поистине широким спектром политической мысли, и народ обязательно почувствует дух прогресса в воздухе, пока мы дюйм за дюймом продвигаемся к Датуну."

GXC_deradicalisation_line_idea: "Линия дерадикализации"
 GXC_deradicalisation_line_idea_desc: "Более радикально настроенные члены нашей партии твердо придерживаются идеи, что Партия народных производителей существует для крестьян и рабочих. Хотя это и не является неправдой, поскольку пролетариат служит корнем и ядром партии, ПНП должна охватывать интересы всех китайцев, независимо от классового статуса. Если они не могут этого понять, то, возможно, этим людям пора на покой."

 GXC_heroes_of_revolution_idea: "Герои революции"
 GXC_heroes_of_revolution_idea_desc: "Если бы не усилия Цай Тинкая, Цзян Гуанная и Хромого генерала, китайское государство осталось бы в состоянии упадка и разложения. Наши герои революции отдали все ради спасения Китая в его самый критический час, и такой героизм должен быть признан!"

 GXC_peoples_revolutionary_army_effect_tt: "§CДобавляет динамический модификатор, эффекты которого зависят от вашей текущей популярности партии §SСоциал-демократы§!.§!\n§YТекущие эффекты:§!\n - Скорость мобилизации: §G+20.00%§!\n - Фактор призывного населения: §G+20%§!\n - Модификатор стабильности от популярности партии: [?GXC.party_popularity@social_democrat|=%+]"

 GXC_proclaim_a_true_united_front_effect_tt: "§CДобавляет динамический модификатор, эффекты которого зависят от вашей текущей популярности партий §SСоциал-демократы§! и §rСиндикалисты§!.§!\n§YТекущие эффекты:§!\n - Стоимость политического советника: [?GXC_social_democrat_pop_temp_var|=%-]\n - Сохранение эффективности производства: [?GXC.party_popularity@syndicalist|=%+]"

 GXC_courting_liberty_effect_tt: "§CДобавляет динамический модификатор, эффекты которого зависят от вашей текущей популярности партии §OСоциал-либералы§!.§!\n§YТекущие эффекты:§!\n - Скорость исследований: [?GXC.party_popularity@social_liberal|=%+]"

 GXC_ministry_of_the_peasantry_idea: "Министерство по делам крестьянства"
 GXC_ministry_of_the_peasantry_idea_desc: "Через недавно созданное Министерство по делам крестьянства правительство желает помочь освободить верных тружеников земли от их тиранических хозяев. Ибо Китай — это нация и крестьян, и рабочих, и мы не можем бросить никого из них."

 GXC_local_peasants_associations_effect: "Местная ассоциация крестьян"
 GXC_local_peasants_associations_effect_desc: "Используя ранее созданные крестьянские организации и распространение новых ассоциаций, поддерживаемых правительством, в различных провинциях наблюдается рост местных коллективов, обучающих крестьянство важности их роли в обществе и политизирующих их участие."

 GXC_shaoshuren_geming_effect: "Шаошужэнь Гэмин"
 GXC_shaoshuren_geming_effect_desc: "Описывая революцию меньшинства, «Шаошужэнь Гэмин» является одним из основных убеждений Тань Пиншаня и его Третьей партии. Вера в то, что только просвещенное меньшинство может принести революцию китайскому народу."

 GXC_expand_provincial_party_committees_tt: "§YМодифицирует $GXC_shaoshuren_geming_effect$ двумя эффектами, которые зависят от вашей текущей популярности партий §SСоциал-демократы§! и §RРадикальные социалисты§!.§!"

#UPC Phase V Ideas

 GXC_unprecedented_financial_strain_idea: "Беспрецедентное финансовое напряжение"
 GXC_unprecedented_financial_strain_idea_desc: "Едва ли сильная экономика в лучшие времена, экономическая ситуация в Китае вошла в гораздо более страшную спираль гибели, чем когда-либо прежде. Отягощенное финансовой нестабильностью, выплатами по внешним долгам, бегством бизнеса и валюты, экономической разрухой, беженцами и целым рядом других проблем, Федеральное правительство оказалось в особенно плохом положении. Только при согласованных усилиях по восстановлению экономики они, возможно, смогут пережить шторм, но еще предстоит увидеть, вмешается ли федеральная политика в такие вопросы."

 GXC_the_military_dilemma_idea: "Военная дилемма"
 GXC_the_military_dilemma_idea_desc: "Хотя это и предполагалось в конечном итоге разумной позицией для любой функционирующей формы вооруженных сил, объявление Федеральным правительством своей грандиозной программы централизации и национализации привело истеблишмент в бешенство. Милитаристы и экстремисты провинциальной автономии объединились, чтобы выступить против сокращения провинциальных сил и интеграции их армий в Армию национальной обороны. В нормальных обстоятельствах Центральное правительство смогло бы прорваться, но оппозиция проавтономистских федералистов доказала, что так называемая «Военная дилемма» действительно является серьезным препятствием."

 GXC_a_nation_without_its_leader_idea: "Нация без лидера"
 GXC_a_nation_without_its_leader_idea_desc: "Чэнь Цзюнмин долгое время был духовным и буквальным знаменосцем Гуандунского федералистского движения с момента его создания. Продвинув свое движение от провинции к нации, само правительство зависело от силы его личности и связей, чтобы поддерживать себя как финансово, так и политически. Но с недавним объявлением о его уходе на пенсию политическая сцена была ввергнута в хаос, как и бюрократия. И все же его реальная политическая власть во многом оставалась неактуальной в отношении нагнетания страха и беспокойства по поводу потери нацией своего уважаемого «Отца». Очевидно, Чэнь оставляет после себя место, которое трудно заполнить..."

 GXC_reinvigorated_five_year_plan_idea: "Обновленный пятилетний план"
 GXC_reinvigorated_five_year_plan_idea_desc: "В различных социалистических и других государственно-управляемых экономиках наблюдается концепция Многолетнего плана. Будучи новой концепцией для Китая, в значительной степени зависящего от иностранных рынков или местных капиталистов, власть, полученная с объединением нации, позволила правительству реализовать собственный довольно амбициозный Пятилетний план. Благодаря введению режима жесткой экономии, автаркической торговой политики и созданию коллективных хозяйств на бесплодных рубежах за Великой стеной есть надежда, что нация быстро преобразится. Через 10 лет деревня превратится в город, а еще через 10 — в международный экономический центр. От Шанхая до Дихуа весь Китай станет промышленным гигантом."

 GXC_rule_of_the_democratic_literati_0: "Правление демократической интеллигенции"
 GXC_rule_of_the_democratic_literati_0_desc: "Интеллектуалы Китая доказали, что являются истинными потомками ученых-чиновников. Несмотря на отмену системы государственных экзаменов на закате династии Цин, их интеллектуальная традиция перешла к подающим надежды студентам того времени, которые теперь являются ведущими писателями и политиками современности. «Историческая миссия» действовать как арбитры разума и морали; совесть общества и единственный сектор населения с благородными устремлениями; долг современного класса интеллектуалов — поддерживать эти добродетели. Благодаря их сотрудничеству с сельскими массами Китай искоренит всех эксплуататоров-помещиков, всех злых шэньши и всех коррумпированных чиновников. И без необходимости насильственной революции."

 GXC_a_new_workers_utopia: "Новая утопия для рабочих"
 GXC_a_new_workers_utopia_desc: "При новом правительстве права китайских трудящихся наконец-то получили должное вознаграждение. Гарантируя минимальный уровень жизни, помощь военным беженцам, улучшенные условия для солдат, государственных служащих и учителей, нация стремится к дальнейшему расширению государства всеобщего благосостояния. Введя шкалу минимальной заработной платы, восьмичасовой рабочий день, планы по созданию общественных медицинских учреждений и широкую программу страхования от всех видов недугов, партии-реформисты одержали великую победу для китайского пролетариата."

 GXC_in_pursuit_of_the_federalist_ideal: "В погоне за идеалом федерализма"
 GXC_in_pursuit_of_the_federalist_ideal_desc: "Первая итерация федералистского движения ставила перед нацией множество высоких целей: отмена провинциальных и местных военных правительств, демобилизация автономных армий провинций и создание автономных региональных правительств под гражданским контролем. Именно под этим набором требований возникли различные федеральные конституционные проекты по всей стране, пытаясь вырвать контроль у военных диктаторов и коррумпированного национального правительства и вернуть его провинциальному гражданскому правлению.\n\nИспользуя низовую гражданскую мобилизацию, федералистское движение в конечном итоге подпитывалось неудачами усилий центрального правительства по объединению и централизации нации. Не принося плодов, появились идеологические теоретики, такие как Чжан Шичжао и Чжан Тайянь, чтобы культивировать концепцию федералистского идеала. Хотя дальнейшая интерпретация их идей варьировалась повсеместно, идеал оставался в основном тем же: суверенитет народа заключается в создании автономных провинций, действующих в соответствии с их собственной конституцией.\n\nИменно к этому идеалу мы стремимся, и ни ярость преисподней, ни властные демагоги-централисты, ни праздные милитаристы больше никогда не разорвут движение на части. Объединяя либералов, социалистов, конституционалистов под одним зонтиком и благодаря доброй воле Национальной армии, федерализм еще увидит свой звездный час."

 GXC_the_steady_hand_at_the_wheel: "Твердая рука на штурвале"
 GXC_the_steady_hand_at_the_wheel_desc: "Революционеры, неблагодарные, милитаристы, полевые командиры, бандиты и прочие гнусные личности хотели бы, чтобы зарождающаяся китайская демократия была растрачена под силой их оружия или позерства. Почти погрузив нацию в деспотизм, только храбрые люди из Клики Юэ сумели ворваться в час расплаты и уберечь демократию Китая от падения в лапы автократии снова. Меры, которые правительство должно принять для дальнейшей защиты масс, могут быть крайними, но любая жертва стоит того ради сохранения демократической мечты."

 GXC_vanquishing_the_overly_ambitious: "Победа над чрезмерно амбициозными"
 GXC_vanquishing_the_overly_ambitious_desc: "Самая большая угроза демократии — это, пожалуй, ее самопровозглашенный крупнейший авангард. При всех их разглагольствованиях о бдительности и защите демократического государства, Клика Юэ стала не более чем заменой Бэйянских милитаристов, свергнуть которых люди так усердно работали. Благодаря сотрудничеству с другими заговорщиками из некогда ослабленных клик, таких как Старая Гуанси и Новая Гуандунская клика, есть надежда, что продвижение офицеров не из Клики Юэ на руководящие должности приведет к обезвреживанию гадюки Юэ, но в конечном итоге только время покажет..."

 GXC_UPC_multi_partisan_democracy_modifier: "Многопартийная китайская демократия"
 GXC_UPC_multi_partisan_democracy_modifier_desc: "Свидетельством окончательного стремления к идеализму движения Юго-Западных федералистов Китая является его инновационный бренд многопартийной демократии. Опираясь на низовую мобилизацию интеллектуалов 1920-х и 30-х годов, федералистское движение процветало и питалось из-за отсутствия стабильности после краха Чжили. Поскольку каждая китайская провинция составляла свою собственную провинциальную конституцию в надежде на практику местной демократии и гражданских прав, национальная конституция стала композицией провинциального целого.\n\nОбъединяя демократических социалистов, неоконфуцианских интеллектуалов, печально известных либералов, традиционных ученых, милитаристов, шэньши, торговцев, буржуазию и пролетариат, федералистское движение является поистине всеобъемлющим движением многих оттенков, объединенных идеалистическими или, возможно, оппортунистическими интерпретациями нового китайского будущего. Пройдя, возможно, единственную по-настоящему мирную и гражданскую передачу власти по требованию всенародных выборов, Федеративная Республика уже выделила себя на фоне своих предшественников из Бэйяна."

 GXC_absolute_freedom_in_education_idea: "Абсолютная свобода в образовании"
 GXC_absolute_freedom_in_education_idea_desc: "Должна быть абсолютная свобода в преподавании и исследованиях! Правительство не может сдерживать процветающую интеллектуальную сцену внутри нации, равно как и не может ущемлять права гражданской демократии. Благодаря полной гарантии учителям выполнения их обязанностей и входа в образовательную профессию, запрету на существование любой политической партии или организации в образовательных и культурных учреждениях и обеспечению равенства образовательных возможностей для всех масс, есть надежда, что десятилетия китайской неграмотности останутся далеко позади нации, и что в ее народе проявится стойкий демократический дух."

 GXC_rumours_of_a_military_plot_idea: "Слухи о военном заговоре"
 GXC_rumours_of_a_military_plot_idea_desc: "Поскольку оппозиция растущему упадку правящей администрации Юэ становится все сильнее, она стала почти непреодолимой; оппозиция растет как сорняки, и армия Юэ едва может остановить развитие военного неповиновения и даже потенциального переворота. И не только Демократическая лига Китая разжигает инакомыслие; милитаристы стекаются в их ряды из-за национализации армии, а различные члены Партии общественных интересов и Клики Юэ даже начали нарушать субординацию, в конечном итоге разжигая хаос."

 GXC_on_the_verge_of_failure_idea: "На грани провала"
 GXC_on_the_verge_of_failure_idea_desc: "С завершением объединения нации ожидалось, что Федеральный проект будет провозглашен в стабильных условиях, при которых ни чрезмерное рвение, ни огромный цинизм не смогут ослабить прогресс. Увы, поскольку тяжелая военная рука все еще присутствует во всем политическом процессе, многие начали сомневаться в том, сбудется ли так называемое обещание «Демократии» в Федеральном проекте, или это будет просто циклическое повторение Бэйянской республики, где доминируют военные диктаторы."

 GXC_the_national_army_commission: "Национальная военная комиссия"
 GXC_the_national_army_commission_desc: "По предложению членов кабинета и политической арены была создана общенациональная Национальная военная комиссия как орган при Министерстве внутренних дел. С конечной целью межпартийного сотрудничества и координации комиссия служит для сокращения численности вооруженных сил до простого уровня национальной обороны по сравнению с раздутыми размерами Эры милитаристов, и в результате уменьшения финансового бремени на государство. Она также выполняет двойную функцию: окончательная национализация вооруженных сил и проверка всех назначений для обеспечения лояльности действующему правительству."

 GXC_the_national_army_commission_2: "Министерство национальной безопасности"
 GXC_the_national_army_commission_2_desc: "С дальнейшим продлением чрезвычайного положения при Маршале-Президенте Е Цзюе правительство сочло целесообразным преобразовать Национальную военную комиссию в само Министерство правительства. Обязанное поддерживать все бюро общественной безопасности в стране, Бюро национальной безопасности тесно сотрудничает с военными, чтобы гарантировать, что инакомыслие будет подавлено как можно быстрее, и что поддержание гармонии и порядка сохранится по всей стране."

 GXC_alms_to_the_veterans_idea: "Подаяния ветеранам"
 GXC_alms_to_the_veterans_idea_desc: "Китай трудился, истекал кровью и жертвовал на протяжении всего XX века. И все же, возможно, он достиг особенно разрушительной точки к завершению Войн за объединение и Второй японо-китайской войны. В этих условиях развился огромный социальный класс ветеранов и тех, кто был лишен прав из-за военной разрухи, которые так отчаянно требуют внимания; их подаяния, чтобы помочь им жить нормальной жизнью. И долг правительства — предоставить любую помощь своим храбрым бойцам."

 GXC_working_towards_the_federalist_ideal: "Работа над идеалом федерализма"
 GXC_working_towards_the_federalist_ideal_desc: "Идеал федерализма, то есть Конституционной, Свободной и Демократической Федеративной Республики, не мертв. Нет, на самом деле наследие Чэнь Цзюнмина порождает новую, возрожденную борьбу за достижение такого идеала. Народ и политическая оппозиция, возможно, доказали, что их изменчивая природа может оседлать демократию в ее младенчестве, но разве это может отговорить Клику Юэ от продолжения упорства в достижении этого вечно эфемерного идеала? Ведя за собой все остальные партии и политиков, Партия общественных интересов и Клика Юэ должны подавать пример для подражания, чтобы в будущем народ мог радоваться своей функционирующей демократии."

 GXC_rejuvenation_of_chinese_culture: "Омоложение китайской культуры"
 GXC_rejuvenation_of_chinese_culture_desc: "Дух человека, возможно, связан с самим процветанием государства в целом. Если чей-то дух приходит в уныние, это почти гарантия его поражения. Точно так же дух и культура нации являются неотъемлемой частью ее постоянного морального духа и процветания. Китай пережил невыразимые раздоры и борьбу в последнее Столетие унижения, но нельзя оставаться угнетенным вечно! Китай как нация существует тысячи лет, и он будет продолжать существовать до тех пор, пока народ остается убежденным и гордым китайской культурой."

 GXC_revising_democracy_idea: "Пересмотр демократии"
 GXC_revising_democracy_idea_desc: "Опека партийного государства, предписанная доктором Сунь Ятсеном, по своей сути является порочной системой, она недемократична и как таковая отличается от демократической системы, которую она должна установить при Конституционном правлении; и как же можно ожидать, что народ будет практиковать демократию? Только при «Ревизионистской демократии» нация может по-настоящему обучить массы культивировать демократический дух. Быть «Ревизионистом» — значит взять концепцию западной либеральной демократии и соотнести ее с условиями, существующими в Китае. Исправляя ее недостатки, вызванные необузданным капитализмом и безудержным индивидуализмом, вся нация укрепится."

#NPA Phase V Ideas
 GXC_NPA_popular_support_unbridled_modernisers: "Политическая легитимность: §gНеобузданные модернизаторы§!"
 GXC_NPA_popular_support_unbridled_modernisers_desc: "Популярный образ милитариста — это образ деспотичного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью, окруженного декадентским двором порока и подхалимов. Реальность гораздо сложнее. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Более того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономических элит, общественных деятелей и интеллектуалов.\n\nПолагаясь на Общество Цзинсин для замены своего политического плана, борьба за власть в Старой клике Гуанси после смерти Маршала Шэнь Хунъина привела к тому, что некогда подчиненное Общество вытеснило Милитаристов и подтвердило первенство костюмов и галстуков над винтовками и саблями. Вдохновленное прогрессом мировых гегемонов в Европе, Общество Цзинсин надеется, что перекрестное сотрудничество между восточной культурой, историей и традициями в сочетании с западной индустриализацией, наукой и искусством принесет новую эру Китайской Республике. Кроме того, предпочтение президента Чжу Цзяхуа студенческим свободам и академической автономии принесло обновленный и молодой облик Пяти Расам в Едином Союзе."

 GXC_NPA_popular_support_rule_of_the_iron_men: "Политическая легитимность: §PПравление Железных людей§!"
 GXC_NPA_popular_support_rule_of_the_iron_men_desc: "Популярный образ милитариста — это образ деспотичного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью, окруженного декадентским двором порока и подхалимов. Реальность гораздо сложнее. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Более того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономических элит, общественных деятелей и интеллектуалов.\n\nБалансируя на грани между милитаризмом, реформизмом и революцией, Старая клика Гуанси отражает множество нарративов о своем управлении и мировоззрении. Безжалостные грабители и бандиты, но в то же время поборники республиканских идеалов и демократического понятия Синьхайской революции. Соперник Лу Жунтина, компрадор Чжилийской клики, создавший свою собственную изобретательную фракцию Старой клики Гуанси, наследие Шэнь Хунъина во многом таково же: милитаристы, доминирующие в органах власти под идеей продолжения стабильности и экономического прогресса."

 GXC_NPA_popular_support_the_young_consul: "Политическая легитимность: §PМолодой консул§!"
 GXC_NPA_popular_support_the_young_consul_desc: "Популярный образ милитариста — это образ деспотичного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью, окруженного декадентским двором порока и подхалимов. Реальность гораздо сложнее. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Более того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономических элит, общественных деятелей и интеллектуалов.\n\nБалансируя на грани между милитаризмом, реформизмом и революцией, Старая клика Гуанси отражает множество нарративов о своем управлении и мировоззрении. Безжалостные грабители и бандиты, но в то же время поборники республиканских идеалов и демократического понятия Синьхайской революции. Выбранный наследником знаменитого Лу Жунтина, Лу Юйгуан придерживался понятия стабильности и конфуцианской государственной мудрости, которое когда-то пропагандировали Чжили. Работая в тандеме со своим приемным братом Ма Цзи, дуэт решил идти путем осторожности, но в то же время балансирования на грани войны сильной руки. Став президентом в молодом возрасте, Китай будет стабильным до тех пор, пока дышит Молодой Маршал Юга."

 GXC_NPA_popular_support_sword_of_progress: "Политическая легитимность: §gМеч прогресса§!"
 GXC_NPA_popular_support_sword_of_progress_desc: "Популярный образ милитариста — это образ деспотичного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью, окруженного декадентским двором порока и подхалимов. Реальность гораздо сложнее. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Более того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономических элит, общественных деятелей и интеллектуалов.\n\nБалансируя на грани между милитаризмом, реформизмом и революцией, Старая клика Гуанси отражает множество нарративов о своем управлении и мировоззрении. Безжалостные грабители и бандиты, но в то же время поборники республиканских идеалов и демократического понятия Синьхайской революции. Выбранный наследником знаменитого Лу Жунтина, Лу Юйгуан прислушался к значительному прогрессивному контингенту внутри своей клики, встав на амбициозный и сложный путь к китайской демократии. Охраняя ее своей саблей, Президент-Маршал обеспечит стабильность своей республики, силой, если это необходимо."

 GXC_NPA_popular_support_the_chinese_plutocracy: "Политическая легитимность: §cКитайская плутократия§!"
 GXC_NPA_popular_support_the_chinese_plutocracy_desc: "Популярный образ милитариста — это образ деспотичного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью, окруженного декадентским двором порока и подхалимов. Реальность гораздо сложнее. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Более того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономических элит, общественных деятелей и интеллектуалов.\n\nСтильный, богатый и вечно безжалостно амбициозный, бывший мэр Гуанчжоу и лицо политических амбиций китайского купечества, Чэнь Ляньбо представляет собой многое. В равной степени он деспотичен, готов протащить желаемое Торговое правительство, не задумываясь. Однако, правя через номинально демократический мандат, аллюзия и слабый свет демократии остаются вечно присутствующим угольком в Китайской республике Чэня, даже если зловещая атмосфера элитарной кантонской демократии в британском стиле нависает действительно очень сильно."

 GXC_NPA_popular_support_apostles_of_democracy: "Политическая легитимность: §mАпостолы демократии§!"
 GXC_NPA_popular_support_apostles_of_democracy_desc: "Популярный образ милитариста — это образ деспотичного тирана: жестокого, необразованного автократа, мало уважающего человеческую жизнь, с бесконечной алчностью, окруженного декадентским двором порока и подхалимов. Реальность гораздо сложнее. Многие милитаристы были хорошо образованы и были в курсе международных политических тенденций, и хотя у большинства была безжалостная жилка, это вряд ли было редкостью в Китае. Более того, хотя большинство были автократами, они вряд ли правили в одиночку: их поддерживала сложная сеть политиков, генералов, экономических элит, общественных деятелей и интеллектуалов.\n\nНа протяжении всей Эры милитаристов различные политические ассоциации, клики и группы усиливали и ослабляли свое влияние. От контроля над президентством до сведения к неактуальности, способность группы сохраняться на протяжении долгих десятилетий потрясений и борьбы является лишь свидетельством ее гибкости, открытости или принципиальности. Для Политической науки это в конечном итоге смесь всех трех. Тем не менее, снова контролируя пути исполнительной и законодательной власти, Клика политической науки выдвинула Третий партийный демократический фронт в Бэйянской республике. Тот, который надеется принести элитарный патрицианский либерализм в Китай, чтобы взрастить будущую демократию."

 GXC_relentless_military_regionalism_1: "Неумолимый военный регионализм"
 GXC_relentless_military_regionalism_1_desc: "В результате самой природы объединительных войн и широкой опоры на силы милитаристов, наряду с неустанным продвижением прав региональной автономии, зарождающееся Китайское республиканское правительство столкнулось с катастрофической проблемой, созданной им самим. Милитаристы, как новые, так и старые, начали ограждать свои владения от интриг Центрального правительства, заменяя то, что должно было быть национальным объединением, лишь видимостью единства на поверхности. Игнорируя директивы Центрального правительства, налоговые платежи и неустанно выступая против инициатив по централизации провинций или вооруженных сил, милитаристы, похоже, стали заложниками одного неопровержимого факта: если они хотят сохранить свое богатство, власть и влияние, то им, вполне возможно, придется взяться за оружие против самого нового правительства."

 GXC_deteriorating_financial_sector_1: "Ухудшение финансового сектора"
 GXC_deteriorating_financial_sector_1_desc: "Из-за десятилетий коррупции, экономического империализма иностранных держав, нестабильности из-за национальных кризисов, разобщенности и гражданской войны, наряду с множеством других факторов, китайская экономика, мягко говоря, находится в довольно плохом состоянии. Инвесторы уклоняются от потенциальных возможностей, гиперинфляция привела к обесцениванию валюты, бандиты продолжают совершать набеги на любую оставшуюся внутреннюю торговлю или аграрную деятельность. Постоянно возникают проблемы, такие как постоянная дилемма земельной реформы и межпровинциальной экономической интеграции; местные общины даже требуют немедленной экономической помощи, идя на компромисс с недавним объединением нации. Несомненно то, что нация нуждается в стабильном управлении экономикой и национальной реконструкции."

 GXC_the_democratic_cordon_sanitaire: "Антидемократический санитарный кордон"
 GXC_the_democratic_cordon_sanitaire_desc: "Несмотря на заявления о борьбе за республиканские ценности и добродетели Синьхайской революции, достижения в национальной демократии были чем угодно, только не сопоставимыми с высокими идеалами различных демократов Китая. Множество должностей, от министра до магистрата, были предоставлены не тем, кто наиболее достоин, или тем, кто избран, а тем, кто входит в «семью» ответственной действующей администрации. В районах без надзора Центрального правительства коррупция остается высшим порядком дня, а лоскутное одеяло неофициального владычества по своей природе представляет собой феодальные структуры. Мало кто поверит в намеки на то, что новая Китайская Республика содержит хоть какую-то сущность демократии, и различные демократические группы уже начали борьбу против воспринимаемого «Антидемократического санитарного кордона» нового правительства."

 GXC_reaffirming_professionalism: "Подтверждение профессионализма"
 GXC_reaffirming_professionalism_desc: "То, что когда-то было пестрой командой разрозненных сил милитаристов, теперь раздутая, неэффективная и очень протекционистская «национальная» армия; армия Республики, во многом сродни ее внутренней динамике, представляет собой лоскутное одеяло из подразделений Центральной армии вперемешку с дивизиями сил милитаристов. Номинально заявляя о служении Главнокомандующему, частые случаи неповиновения доказывают обратное. Как таковое, стало крайне необходимым не только для эффективности армии на поле боя, но и для стабильности Китая, чтобы Министерство военных дел подтвердило приверженность аполитичной природе военной должности, переработало учебные программы военных академий и распустило все силы с бандитским происхождением. Но задача, безусловно, нелегкая, так как провозглашения искреннего долга службы, жертвенности и государственности мало что значат для тех, у кого нет порыва поддерживать их."

 GXC_zenith_of_chinese_capital_idea: "Зенит китайского капитала"
 GXC_zenith_of_chinese_capital_idea_desc: "Имея прямой доступ к исполнительной власти, класс китайских торговцев и бизнесменов по-настоящему утвердил себя на вершине своей роли в нации. Теперь, будучи неотъемлемой функцией китайской реконструкции, предприимчивые китайские капиталисты стали одним из самых авторитетных голосов в нации. Курируя стремительный экономический прогресс и постоянно растущие прибыли после десятилетий войны и кровопролития, бизнесмены Китая являются архитекторами обновления нации, финансистами ее военной консолидации и переговорщиками ее финансовой независимости."

 GXC_rule_of_the_iron_willed: "Правление железной воли"
 GXC_rule_of_the_iron_willed_desc: "В правительстве нет места тем, кому не хватает качеств рыцарства, харизмы или решительности. Только те, у кого железная воля, те, кто сражался на полях сражений или в высоких кабинетах, достойны того, чтобы им доверили национальное лидерство. Чтобы направить Китай к новому рассвету, требуются убежденность, мужество и храбрость. И эти добродетели служат примером в залах нового Центрального правительства. Хотя вопросы инакомыслия, разногласий или коррупции могут просочиться в новостные издания, подавляющее присутствие национального фронта бюрократов и технократов разубеждает любые наступающие представления о предполагаемой слабости."

 GXC_pursuing_new_policy: "Проведение «Новой политики»"
 GXC_pursuing_new_policy_desc: "По инициативе Чжу Цзяхуа Бэйянская республика начала все чаще импортировать европейских политологов, исследователей, профессоров и бизнесменов с конечной целью реализации амбициозной кампании президента «Новая политика». Стремясь синтезировать западные достижения в научной, экономической и промышленной сферах с восточной культурой, традициями и национализмом, кампания «Новая политика» также возродила международный интерес к китаеведению. Различные иностранные правительства уже стремились помочь, инвестировать или иным образом содействовать китайскому возрождению, и еще предстоит увидеть, достаточно ли гамбита Чжу, который, несомненно, продлится десятилетия, для возрождения израненной нации."

 GXC_order_and_progress_idea: "Порядок и прогресс"
 GXC_order_and_progress_idea_desc: "Мало политики, много администрирования. Роль Центрального правительства заключается не в том, чтобы стать рабом идеологии, или персоналистских диктаторов, или даже интеллектуалов, монархов или ученых. Обеспечение экономического прогресса, какой бы ценой это ни было достигнуто, гарантирует, что Китай навсегда останется сильной нацией. Китайцы больше не будут купаться в Столетии унижения. Проводя политику кнута и пряника, людям будут гарантированы счастливая жизнь и успешная карьера, пока они придерживаются линии действующего правительства."

 GXC_the_gentlemans_republic: "Республика джентльменов"
 GXC_the_gentlemans_republic_desc: "Управляемая личным соглашением, рукопожатием или банкетом, новая Китайская Республика во многом похожа на старую; политика, управляемая личностями, а не идеологией. Люди имеют большее значение, чем предполагаемый политический план политического архитектора, и как таковая национальная политика в высшей степени благоприятствует разнообразию, прагматизму и реализации необходимых мер для обеспечения непрерывного прогресса на фронтах национальной реконструкции, экономического развития и утверждения позиции Китая на мировой арене."

 GXC_the_washingtonian_republic: "Вашингтонская республика"
 GXC_the_washingtonian_republic_desc: "Названный «Китайским Вашингтоном» его близкими друзьями и союзниками в СМИ Гонконга, роль Чэнь Ляньбо как основателя Китайской Республики вызвала скудные сравнения между ним и американским отцом-основателем, однако правительство Торговцев не могло бы быть более отличным. Капитал — это в конечном счете то, что определяет политику, а целью управления почти всегда является экономическое обогащение. Хотя Торговцы подстегнули значительную индустриализацию, элитарная форма правления в высших кругах министерств укрепила довольно уникальную форму правления; напоминающую Рим или Венецию."

 GXC_the_monrovian_republic: "Монровианская республика"
 GXC_the_monrovian_republic_desc: "Провозглашая эру мира, стабильности и политической гармонии, собственный фокус Клики политической науки на антипартийной демократии привел к созданию широкого единого фронта, возглавляемого Политической наукой и к которому присоединились другие третьи партии по всем направлениям. Долго стремясь вытеснить господство авторитарных милитаристов из коридоров исполнительной власти, их победа над Торговцами принесла период национального спокойствия, впервые за десятилетия. Всегда стремясь к широкому консенсусу в политике, новая Китайская Республика начала сближение с различными политическими партиями и политику восстановления достоинства политической должности, которую когда-то порицали."

 GXC_a_new_republic: "Новая республика"
 GXC_a_new_republic_desc: "Возглавляемая некоторыми из самых выдающихся бойцов ранних дней Китайской Республики, новая Бэйянская республика выдвинула свою собственную уникальную интерпретацию летописи Пяти рас в Едином союзе и наследия Синьхайской революции. Стремясь оживить республиканское движение после болезненных последствий десятилетий милитаризма и коррупции, Молодой маршал Юга и его союзники из Молодой Гуанси приводят новое поколение политиков в китайский национальный офис. Личности, которые едва помнят Цин или иначе восстали против нее. Однако, глядя на новые горизонты, многие старые союзники Молодого маршала, имеющие связи с Чжилийской кликой, советуют проявлять осторожность или опасение при стремлении к тотальному прогрессу."

 GXC_ode_to_xinhai: "Ода Синьхаю"
 GXC_ode_to_xinhai_desc: "Не могло быть Китайской Республики без храброго самопожертвования ее бойцов в Тунмэнхое и Синьхайской революции, и было бы лишь очернением их памяти введение нового чувства автократии или авторитаризма над их демократическими устремлениями. Хотя нация не может по-настоящему осуществлять Четыре гражданских права, необходимых для успешного демократического управления, Центральное правительство тем не менее может работать над тщательным культивированием и улучшением жизни своих граждан в надежде, что в будущем, как бы далеко это ни было, Китай сможет по-настоящему реализовать зарождающуюся мечту 1911 года."

 GXC_a_moral_republic: "Моральная республика"
 GXC_a_moral_republic_desc: "Стремиться к полному прогрессу любой ценой — глупая игра; Китай — нация с тысячелетней цивилизацией, и, несомненно, неразумно отбрасывать любые достижения предыдущих эпох китайской цивилизации ради глупости демократического управления. Демократия — это воля народа, а разделение властей — принцип такой демократии. Служа фундаментом политики нации, передача власти народу — это лишь определенность. Однако в промежуточный период крайне важно, чтобы нацией управляли Хорошие люди, эксперты в своих областях, подобные ученым древности. Только оглядываясь на традиции, нация может начать двигаться вперед."

 GXC_studying_european_political_science: "Изучение европейской политологии"
 GXC_studying_european_political_science_desc: "Какими были первоначальные намерения предшественника Клики политической науки, Общества по изучению европейских дел, и каким является modus operandi Ассоциации всех сословий по спасению Гуандуна и ее демократического управления в кантонско-британском стиле, так и для китайской демократической республики совершенно необходимо быть созданной по образцу успешных примеров на Западе. Хотя демократия переживает тяжелые времена в последнее время, различные нации по-прежнему осуществляют и уважают волю народа, согласие народных масс и представительную политическую власть через избранных должностных лиц. Если Китай когда-либо хочет стать по-настоящему демократической нацией, он должен только изучить, подвергнуть критике и усовершенствовать методы существующих международных демократических государств. Уже различные чиновники были отправлены в разные страны для анализа их методов и заключения о наиболее подходящем их применении в китайском контексте."

