 GXC_demonstrating_the_democratic_spirit_tt: "§LТестовые программы местных демократических выборов будут инициированы в доверенных провинциях, которые продемонстрировали свою лояльность партии и революции в прошлые годы (Цзянсу, Аньхой, Чжэцзян, Фуцзянь, Цзянси и Гуандун).§!"

 GXC_new_kmt_constitution_event_tt: "§CАспекты новой§! §YКонституции§! §Cбудут решены в ходе серии событий§!" #Opening tt
