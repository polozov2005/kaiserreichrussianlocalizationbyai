###Section 3c (400-599): Mid Game KMT Political Events

 ##RKMT First Congress Chain (400-429)
 GXC.midgame.400.t: "Возвращение Председателя"
 GXC.midgame.400.d: "После напряженного путешествия Ху Ханьминь, загадочный лидер правого крыла Гоминьдана, наконец, впервые за десять лет ступил на китайскую землю. Его блестящий ум и внушительная фигура отбрасывают длинную тень на хунту милитаристов, почти мгновенно затмевая их своим влиянием.\n\nПреданный революционер, Ху Ханьминь держался в стороне от фанфар, сопровождавших его возвращение, поприветствовав толпу, прежде чем быстро сосредоточиться на более насущных делах. Встречаясь с различными влиятельными фигурами Лянгуана, включая Чэнь Цзитана, Ли Цзунжэня и Чэнь Миншу, он вел себя сердечно, выражая благодарность за поддержку, при этом оставляя мысли об их грубости при себе.\n\nОртодоксальный и старательный в подходе к интерпретации Трех народных принципов, Ху Ханьминь является, пожалуй, главным экспертом по истинным намерениям своего покойного наставника, доктора Сунь Ятсена. Во время своего горького изгнания он оформил свои мысли, написав «Взаимосвязь Трех народных принципов», содержание которой, похоже, заложило основу не только для Первого съезда после возвращения, но и для движения Гоминьдана в целом.\n\nНачало партийного съезда также ознаменовало грандиозное возвращение Московского комитета и избрание четвертого Центрального исполнительного комитета. Насчитывая в общей сложности 24 члена, Центральный исполнительный комитет теперь включает ключевые фигуры из Москвы, такие как Ху Ханьминь, Линь Сэнь, Цзюй Чжэн, Цзоу Лу, Ли Лецзюнь, Юй Южэнь, Дин Вэйфэнь, Гу Инфэнь, У Хэлин, Е Чуцан, Цинь Чжэнь, Ши Цинъян, Ши Ин, Шэнь Динъи, Е Чуцянь и Фу Жулинь, наряду с более региональными фигурами: Чэнь Цзитаном, Линь Ичжуном, Ли Цзунжэнем и Бай Чунси.\n\nЦентральный наблюдательный комитет был сформирован в составе Чжан Цзи, Се Чи, Линь Юньгая и Мао Цзуцюаня.\n\nПримечательно отсутствие «Фракции реконструкции» Сунь Фо, что соответствует отсутствию самого Суня, У Чаошу и Ван Куньлуня в ЦИК, а также Лян Ханьцао в ЦНК. Это служит открытым приглашением для Гавайской клики, перед которым, как твердо верит Ху, Сунь вряд ли устоит; многие полагают, что его переход на сторону Кантона — лишь вопрос времени."
 GXC.midgame.400.a: "Воодушевляющее возвращение, Председатель!"

 GXC.midgame.4000.t: "Национальное правительство в Гуанчжоу"
 GXC.midgame.4000.d: "Когда Гоминьдан впервые вернул контроль над Гуанчжоу, возникли вопросы о направлении, которое выберет революционная хунта. Теперь этот вопрос, похоже, решен: правые офицеры Чэнь Цзитан и Ли Цзунжэнь успешно переиграли левого Чэнь Миншу и взяли под контроль Лянгуан.\n\nОни пригласили Ху Ханьминя и его изгнанный правый центральный комитет вернуться из Москвы. Ху, выдающийся ученик Сунь Ятсена, по иронии судьбы потерпел поражение в аналогичной борьбе за власть между враждующими триумвирами после смерти Суня, но на этот раз он не намерен проигрывать. Он уже объявил о планах восстановить партийное государство в Гуанчжоу и подготовиться к новому Северному походу для воссоединения Китая под знаменем Трех народных принципов."
 GXC.midgame.4000.a: "Полагаю, скоро он будет ждать от нас послов."
 GXC.midgame.4000.b: "Пусть мы поскорее найдем новых союзников для нашего дела."
 GXC.midgame.4000.c: "Крыса-ревизионист возвращается в Гуанчжоу..."
 GXC.midgame.4000.e: "Еще одно правительство в Гуанчжоу?"

 GXC.midgame.401.t: "Империализм против Антиимпериализма"
 GXC.midgame.401.d: "В благоприятном начале Первого съезда Гоминьдана Ху Ханьминь позволил своему интеллектуальному мастерству расцвести. Развивая тезисы, которые он выдвинул много лет назад в «Взаимосвязи Трех народных принципов», он продемонстрировал свое глубокое понимание и интерпретацию Трех принципов, нанося ответный удар по империализму во всем мире.\n\nРассуждая о том, что мир является полем битвы между двумя антагонистическими силами — империализмом и контр-империализмом, он утверждал, что капиталистическая система порождает милитаристское и враждебное общество. Подобно Марксу до него, Ху Ханьминь счел капитализм сам по себе архи-фундаментом западных политических институтов. Будучи вечно развращенными влиянием бюрократического поклонения абсолютному этатизму, капитализму и милитаризму, эти государства заручаются поддержкой капитализма для продвижения своей имперской славы. В свою очередь, капиталисты питаются за счет бюрократов, используя их как рупоры своей системы для высасывания соков из наций. В сочетании с этим, как силы бюрократов, так и капиталистов используют армию для продвижения своих коллективных интересов и завоевания других наций.\n\nБолее того, Ху заявил, что все это началось в далеких 1500-х годах, когда зарождающиеся колониальные империи конкурировали за земли и влияние, что вызвало рост меркантилизма. Считая это прототипом капитализма, он начал эволюционировать вместе с политической либерализацией и экономическим laissez-faire в последующие периоды мира, кульминацией чего стала современная глобальная экономическая система. Неоимпериалистические колониальные силы объединили внутренний национализм с империалистическими целями, чтобы подчинить Китай до полуколониального статуса.\n\nСвязывая свою теорию с Национальной революцией, он провел четкую параллель между антиимпериализмом и доктриной Саньминь, которая наполнена знаниями трех прошедших веков революций, утверждая, что Гоминьдан должен объединить Китай с освободительными движениями по всему миру, чтобы привести империализм к краху."
 GXC.midgame.401.a: "Долой империализм!"
 GXC.midgame.401.b: "Он же не может говорить это серьезно?"

 GXC.midgame.402.t: "Национализм на Востоке и на Западе"
 GXC.midgame.402.d: "Словно вихрь, Ху Ханьминь продолжил свою лекцию об империализме сегодняшним выступлением о Первом народном принципе — Национализме. Он заявляет, что, хотя национализм не является уникальной концепцией Принципов, Запад извратил свою идею о нем, используя его как силу империализма и рабства. Доктор Сунь, напротив, превратил его в механизм освобождения и свободы.\n\nПроводя сравнения между Востоком и Западом, Ху заявил, что основной единицей общества на Западе является индивид, и его индивидуализм создал вакуум между индивидом и государством, порождая разлад между ними. В результате Западу не хватает «целостности нации», народа в Трех народных принципах.\n\nТем временем в Китае, как указал Ху, исторический клан сформировал основу общества, обеспечив преимущество в формировании нации и в воспитании зарождающегося национализма. Ху Ханьминь утверждал, что из-за развития национализма на Западе вокруг пылкого индивидуализма, они естественным образом стали архитекторами эгоизма и империализма. В то же время кланово-ориентированный национализм Китая был неотъемлемой частью построения национализма, заложенного в Трех принципах, который объединяет нацию на пути к Датун — Великому единению народа.\n\nУтверждения Ху особенно поразительны, поскольку традиционные интеллектуалы долгое время рассматривали кланы как камень преткновения для зарождающегося национализма Китая. Многие видят в кланах источник регионализма, и критики Председателя считают, что у него нет плана по органичному сочетанию интересов нации, национализма и клановой единицы."
 GXC.midgame.402.a: "Национализм для нового Китая!"
 GXC.midgame.402.b: "Много мыслей, но мало конкретных планов."

 GXC.midgame.403.t: "Демократия и анархизм"
 GXC.midgame.403.d: "Словно по часам, Ху Ханьминь начал обсуждение Второго народного принципа — Демократии (Народовластия). Черпая вдохновение в универсализме и гуманизме, Председатель верит, что Три народных принципа являются превосходным методом достижения идеального состояния человеческого общества. Универсализм, анархизм и синдикализм, государственный институционализм, национализм и капитализм — все они потерпели неудачу.\n\nВ то время как Принцип Национализма нацелен на достижение свободы и равенства для наций во всем мире, он заявил, что свобода и равенство внутри страны не могут быть достигнуты без одновременного выполнения принципов Народовластия и Народного благосостояния. Как только все нации достигнут этого тройственного национализма, наступит эра универсализма.\n\nПроводя сравнения между Принципом Демократии и анархизмом, он заявил, что это влечет за собой контроль народа над политической властью в одной стране, за которым следует политическое равенство. Хотя обе идеологии разделяют цели по прекращению существования государства, анархизм оставил пустоту в вопросе того, где будет сосредоточена политическая власть.\n\nСогласно Саньминь, власть будет разделена между суверенитетом и административной властью. Первая будет непосредственно принадлежать народу и осуществляться им, состоя из четырех прав: избрания, законодательной инициативы, референдума и отзыва. Вторая будет косвенно передана народу через пять юаней: исполнительный, законодательный, судебный, экзаменационный и контрольный. Это правительство из пяти ветвей станет инструментом народа для достижения истинного самоуправления.\n\nВопреки распространенному заблуждению, Ху Ханьминь утверждает, что Прудон и Кропоткин предусматривали отмену государства, но не правительства. С Саньминь избранные правительственные чиновники и народ будут работать в тандеме в общественных интересах, и, лишенное политической власти, государство отомрет в пользу абсолютной личной свободы. Таким образом, Три принципа разделяют идеалы анархизма, но Гоминьдан фактически дает реальную программу для их достижения."
 GXC.midgame.403.a: "Только Принципы могут дать нам демократию."
 GXC.midgame.403.b: "Ходите по тонкому льду, Председатель..."

 GXC.midgame.404.t: "Народное благосостояние и социализм"
 GXC.midgame.404.d: "Вновь в своем шквале теории Председатель Ху Ханьминь сосредоточил внимание на Третьем народном принципе — Народном благосостоянии (Миньшэн). Проводя сравнения между Народным благосостоянием и зарождающимися социалистическими и синдикалистскими движениями по всему миру, он отметил радикальное различие между этими тремя в реализации.\n\nХотя все они намеревались достичь идеального общества, только Три принципа были оснащены инструментами для превращения этих общих идеалов в реальность, включая уравнивание прав на землю и регулирование капитала. Как только частная собственность на землю и капитал будет отменена, социально-экономическая несправедливость уйдет вместе с ней, и удастся избежать саморазрушительной классовой борьбы. Вместо насилия национальная эксплуатация конгломератов железных дорог, а также горнодобывающих и сталелитейных компаний будет приносить прибыль непосредственно народу.\n\nСделав небольшое отступление в своей речи, Ху Ханьминь провел сравнение анархизма и марксизма, восхваляя таких анархистов, как Бакунин и Кропоткин. Этот анархический социализм сохранял структуру общества и индивидуальность личности; Председатель даже заявил, что школа Бакунина-Кропоткина близка к Саньминь, в отличие от марксистской диктатуры пролетариата и веры в анархистскую оппозицию любой форме социального порядка. В заключение Ху заявил, что правительства, которые наслаждались марксистской политической диктатурой и полным контролем над богатством нации, были более склонны к тоталитаризму.\n\nЗавершая свою речь о Народном благосостоянии, Ху Ханьминь процитировал доктора Суня: «...Стремление человечества к выживанию было движущей силой социального прогресса... классовая борьба на самом деле была социальной болезнью в ходе этого прогресса», добавив, что классовая борьба возникала только тогда, когда человек чувствовал себя вынужденным восстать ради выживания. Этим он указал, что Маркс перепутал причину со следствием и наоборот, при этом Ху заявил, что Три принципа создадут новый мир, желаемый всеми революционными движениями."
 GXC.midgame.404.a: "На помощь Народу!"
 GXC.midgame.404.b: "Нужно ли напоминать вам, что мы не левые?"

 GXC.midgame.405.t: "Развитие революции"
 GXC.midgame.405.d: "Заручившись благоприятным, хотя, возможно, иногда неохотным официальным одобрением партии своих предыдущих заявлений, Ху Ханьминь переключил свое внимание на практическую реализацию Принципов, едва давая кому-либо время на отдых после дискуссий.\n\nПредседатель начал с заявления, что политика уравнивания прав на землю и регулирования капитала направит национальную экономику к возможному общественному владению национальным богатством, Гунъю, и что два главных врага экономического равенства, как государственный, так и частный капитализм, будут впоследствии устранены. Совместные экономические усилия правительства и народа при тесном сотрудничестве между ними в конечном итоге приведут к Гунъю.\n\nНаучная организация производства сократит рабочую нагрузку и повысит производительность людей, еще больше освобождая их умы и энергию от тяжелой работы. Благодаря этому люди смогут посвятить себя творческой, культурной и общественной работе и, в конечном итоге, взять на себя местные обязанности, что проложит путь к самоуправлению. Как только это научное производство будет достигнуто, начнется совместное пользование общественным богатством (Гунсян).\n\nПриветствуя сциентификацию как ускорение процесса достижения Гунсян, в идеальном мире, который представляет Ху Ханьминь, древние идеалы «От каждого по способностям, каждому по потребностям» станут социальной реальностью. Однако Председатель уточнил, что он не считает абсолютное равенство необходимым, пока каждый член общества свободен от всех видов нужды."
 GXC.midgame.405.a: "Управляющий Революцией!"
 GXC.midgame.405.b: "Мы едва начали объединять нацию!"

 GXC.midgame.406.t: "Революционное будущее"
 GXC.midgame.406.d: "В смелой демонстрации своего восстановленного авторитета в качестве Председателя Центрального исполнительного комитета и номинального лидера правых сил Гоминьдана, Ху Ханьминь недвусмысленно заявил, что воля доктора Суня заключалась в том, чтобы Три народных принципа — Национализм, Народовластие, Народное благосостояние — были введены в действие немедленно, одновременно и на каждом этапе Национальной революции.\n\nПрезирая ловушки и гнусные сделки, которые заключали его соперники Чан Кайши и Ван Цзинвэй, Ху Ханьминь настаивает на том, что даже на этапе военного правления каждый принцип должен быть введен в действие, чтобы верные революционные солдаты не превратились просто в новых милитаристов, принявших более приятную форму. Фактически, он сделал особый акцент на том, что партия никогда не должна пренебрегать интересами народа на этапах революции, самым важным из которых является период опеки.\n\nПодтверждая свою репутацию человека, обладающего наиболее ортодоксальным пониманием идеалов доктора Суня, Ху Ханьминь далее заявил, что новая Национальная революция будет следовать Плану национальной реконструкции, изложенному доктором Сунем, с непоколебимой абсолютностью. Конституционный этап будет введен в провинциях только после того, как их уезды достигнут местного самоуправления. Как только более половины провинций достигнут этой стадии, будет созвано национальное собрание для провозглашения национальной конституции.\n\nВ своем заключительном слове Ху Ханьминь выразил желание достичь Датун — Великого Единения — сказав, что агапэ следует лелеять как основу в стремлении человека к существованию. В то время как многие из его покровителей-милитаристов уже начали сомневаться в приглашении его вернуться, на сияющий миг генералы почувствовали себя маленькими, когда слова Ху достигли аудитории. С его эклектичной смесью китайских социальных идеалов, христианского социализма и современного научного прогресса Ху обещает объединить их все в истинную формулу для достижения человеком Великого Единения. Купаясь в революционной славе, аудитория взревела аплодисментами."
 GXC.midgame.406.a: "К светлому будущему!"

 GXC.midgame.407.t: "Судьба Четвертой армии"
 GXC.midgame.407.d: "Среди участников Первой конференции находится группа лиц, наиболее несогласных с новым курсом нашего правительства. Бывшие офицеры Минь-Гань, связанные с Чэнь Миншу и его старой Десятой дивизией, были приглашены на конференцию в знак единства между крыльями Гоминьдана.\n\nПримкнув к левоцентристам, Чэнь и его союзники оказались между молотом и наковальней. Не находя друзей и вызывая значительный гнев на конференции, они понимают, что их переиграл Чэнь Цзитан. В то же время они опасаются последствий со стороны своих бывших левых союзников, которые давно осуждают их за сотрудничество с правыми в любом качестве.\n\nИх очевидное двуличие наконец настигло их: Ху Ханьминю был представлен вариант исключить их из конференции за их связи с Ван Цзинвэем. Многие из их бывших соперников в Гуандуне, такие как Чэнь Цзитан, давили на Председателя, требуя их изгнания, уже намечая планы агрессивной военной кампании и политической чистки.\n\nХу, однако, был более осмотрителен. Протягивание оливковой ветви ослабило бы комитет Вана и уравновесило бы его зависимость от Чэнь Цзитана, а в случае успеха могло бы еще больше продемонстрировать его способность возглавить Революцию. С другой стороны, известно, что Чэнь Миншу является проводником левого проникновения, и терпимость к нему может иметь последствия."
 GXC.midgame.407.a: "Никакой пощады нашим противникам."
 GXC.midgame.407.b: "Благожелательность — это добродетель."

 GXC.midgame.408.t: "Четвертая армия отступает"
 GXC.midgame.408.d: "На стол Ван Цзинвэя легли доклады о том, что различные левые офицеры из провинции Гуандун бежали от преследований со стороны действующего там правительства. Их лидерами являются генерал Чэнь Миншу и его лейтенанты Цзян Гуаннай и Цай Тинкай, которые обладают ценными навыками и знаниями, которые могут быть очень полезны в будущем.\n\nНесмотря на это, Чэнь Миншу явно доказал свою несостоятельность, потеряв контроль над одной из самых ценных провинций Китая, а его политический момент был раздавлен Ху Ханьминем и его союзниками-милитаристами. Однако его неспособность выполнить свою миссию — вряд ли единственное препятствие на пути к его примирению: многие отчеты указывают на его колеблющуюся лояльность нашему центральному комитету и его глупые заигрывания с правыми.\n\nТаким образом, их перспективы на искупление весьма туманны. Хотя он умолял дать ему еще один шанс доказать свою преданность Национальной революции, предлагая использовать свои знания о Лянгуане в наших интересах, даже его бывшие союзники в Минь-Гане неохотно заступаются за него. В конечном итоге его судьба будет решена на закрытом заседании центрального комитета."
 GXC.midgame.408.a: "Вперед, вместе."
 GXC.midgame.408.b: "Наказать его за неудачу."

 GXC.midgame.409.t: "Четвертая армия дезертирует"
 GXC.midgame.409.d: "Тревожные сообщения поступают о ситуации в Кантоне, новости достигают стола Председателя о последствиях Первого съезда репатриантов нашего конкурирующего комитета. Сообщается, что наш ключевой агент в Гуандуне, Чэнь Миншу, перешел на сторону правых, уводя с собой большую часть Четвертой армии.\n\nУже сейчас различные фигуры внутри партии полны гнева из-за предательства того, что должно было стать одной из наших самых элитных армий, и вся поддержка Чэнь Миншу и его движения прекращена. Несмотря на наше возмездие за такой наглый поступок, он заявил, что, оставаясь в конкурирующем аппарате, он может служить мостом между левыми и правыми, будучи способным обеспечить дипломатическую связь между Ван Цзинвэем и Ху Ханьминем. Фактически он зашел так далеко, что подал прошение Сунь Фо, чтобы тот лоббировал снисхождение, предполагая, что его сердце искренне предано нашему делу, и он продолжает настаивать на реализации Трех принципов."
 GXC.midgame.409.a: "Какая наглость!"
 GXC.midgame.409.b: "Он все еще может быть полезен..."

 GXC.midgame.410.t: "Блудный сын Гавайев"
 GXC.midgame.410.d: "Хотя много было сказано о трех великих наследниках Сунь Ятсена (Ван Цзинвэе, Ху Ханьмине и Чан Кайши) и соответствующих им крыльях партии, светило Гоминьдана на самом деле оставил после себя одного ребенка, активного в политике: своего единственного сына Сунь Фо. Получивший образование в Америке, довольно успешный мэр Гуанчжоу, известный своими успехами в реформировании городской администрации и проведении общественных работ в эпоху Хунты защиты конституции, даже до смерти Суня он был оттеснен своим отцом из-за своего противодействия реорганизации и неспособности (или, возможно, нежелания) выжать дополнительные средства из доверенного ему города на военные нужды.\n\nСмерть старшего Суня в 1925 году оставила Сунь Фо и его «Клику наследного принца» на милость жестоких политических ветров, поскольку он безуспешно пытался найти опору — сначала присоединившись к правым на Четвертом пленуме, прежде чем быть принужденным к подчинению Ваном и левыми. Крах Северного похода заставил Суня бежать на Гавайи со многими своими последователями, тщетно пытаясь способствовать примирению между изгнанными комитетами Москвы и Парижа. В то время он и его союзники сотрудничали с журналом «Обозрение реконструкции», который стал центром его «Фракции реконструкции».\n\nХотя многие отвергают его как дилетанта, недостойного мантии своего отца, это не помешало и Ху, и Вану обхаживать его, особенно потому, что он успешно сохранил значительные связи своего отца в китайских диаспорах Юго-Восточной Азии через свою «Комиссию по делам заморских китайцев». Крах левых сил привел к возвращению Сунь Фо в Гуанчжоу, всегда бесстыдного в своем оппортунизме. Тем не менее, Председатель Ху был весьма учтив в своем приеме, и столь прославленные связи и престиж Суня заставили многих левоцентристских партийных деятелей вернуться в лоно партии, включая его близких союзников из так называемой «Индийской клики»."
 GXC.midgame.410.a: "Каков следующий шаг нашего генерального плана?"
 GXC.midgame.410.b: "Эм, тебе нельзя приводить друзей."

 GXC.midgame.411.t: "Новости из Гуанчжоу"
 GXC.midgame.411.d: "Поражение Гоминьдана в Северном походе не привело к краху Китайской национальной партии. В то время как основная часть Партии бежала за границу в радикальный центр — Париж, Ху Ханьминь и правые ведущие члены Гоминьдана искали убежища в Москве. Кадры важных лидеров Гоминьдана, заявивших о своей преданности и верности революции Сунь Ятсена, создали отдельное конкурирующее правительство в изгнании с Центральным комитетом.\n\nРоссия предложила китайским изгнанникам убежище из-за общей ненависти к империализму Германии. Для нас Германия разорвала нашу великую страну на части, разграбила наши ресурсы и стремится сохранить Россию слабой. Для китайцев немцы раскромсали их страну своими колониальными анклавами и восстановили плачевную имперскую династию, сокрушив их стремление к независимости. Было вполне естественно, что наши народы объединились и надеялись на реализацию уничтожения как японского, так и немецкого империализма, чтобы стремиться к миру, свободному от цепей Берлина и Токио.\n\nБолее того, как китайские изгнанники, так и российское правительство объединены общим недоверием к большевизму. В 1928 году Кремль решил сотрудничать с правительством Гоминьдана в изгнании с молчаливого одобрения. Поддержка в основном поступала в виде пожертвований и закупок военной помощи, хотя отношения между Россией и китайскими националистами пошатнулись во время войны на КВЖД, в которой победа Фэнтяня привела к тому, что более экстремистские российские фракции осудили китайских изгнанников в России.\n\nТем не менее к 1936 году этот гнев в основном утих, и мы получили новости о том, что Гоминьдан одержал победу в своей бывшей провинции Гуандун под руководством российских изгнанников. Мы желаем им всего наилучшего в их стремлении к национальному объединению, и только время покажет, сможет ли Гоминьдан действительно возродиться снова."
 GXC.midgame.411.a: "Мы будем наблюдать за ними с большим интересом."

 ##RKMT Political Event Chain (430-459)
 GXC.midgame.430.t: "Внутренние махинации"
 GXC.midgame.430.d.1: "После создания нового Революционного правительства [ROOT.GetLeader] в [ROOT.Capital.GetCapitalVictoryPointName], Председатель приложил огромные усилия для поддержания сплоченности всего движения и избежания явного фаворитизма. Даже в своем комитете в изгнании в Москве [ROOT.GetLeader] поддерживал строгую ортодоксальность в отношении структуры правительства, никогда не позволяя официальному — или неофициальному — заместителю проявить себя. Следуя суньизму до самых корней, на текущем этапе революции только Председатель Партии должен оказывать основное влияние на ее направление, поскольку Премьер-министр и Премьер Исполнительного Юаня не существуют до конституционного этапа согласно непреклонной партийной доктрине.\n\nОднако это не означает, что Председатель не опирается на множество людей за советом и их уникальными точками зрения в моменты, когда его собственная оказывается ошибочной. Многое изменилось с тех пор, как [ROOT.GetLeader] в последний раз ступал на китайскую землю, и влиятельные игроки в Кантоне в чем-то изменились, оставаясь при этом прежними. Чтобы успокоить региональных милитаристов и поддержать силы, которые вообще приветствовали его возвращение, Председатель мог бы использовать опыт Чэнь Цзитана в таких вопросах или, возможно, сыграть на фракционной лояльности и опереться на своего надежного протеже Ли Вэньфаня. Почтенный Цзоу Лу также представляет собой приемлемый выбор, мудрый благодаря годам опыта в политике, хотя личные трения, несомненно, присутствуют. Или, возможно, необходимо обратиться к Ли Цзунжэню, чтобы укрепить армию. Это решение не следует принимать легкомысленно, ибо кто знает, какое влияние каждая фракция может извлечь из доверия Председателя..."
 GXC.midgame.430.d.2: "После создания нового Революционного правительства [ROOT.GetLeader] в [ROOT.Capital.GetCapitalVictoryPointName], Председатель приложил огромные усилия для поддержания сплоченности всего движения и избежания явного фаворитизма. Даже в своем комитете в изгнании в Москве [ROOT.GetLeader] поддерживал строгую ортодоксальность в отношении структуры правительства, никогда не позволяя официальному — или неофициальному — заместителю проявить себя. Следуя суньизму до самых корней, на текущем этапе революции только Председатель Партии должен оказывать основное влияние на ее направление, поскольку Премьер-министр и Премьер Исполнительного Юаня не существуют до конституционного этапа согласно непреклонной партийной доктрине.\n\nОднако это не означает, что Председатель не опирается на множество людей за советом и их уникальными точками зрения в моменты, когда его собственная оказывается ошибочной. Многое изменилось с тех пор, как [ROOT.GetLeader] в последний раз ступал на китайскую землю, и влиятельные игроки в Кантоне в чем-то изменились, оставаясь при этом прежними. Чтобы успокоить региональных милитаристов и поддержать силы, которые вообще приветствовали его возвращение, Председатель мог бы использовать опыт Чэнь Цзитана в таких вопросах или, возможно, сыграть на фракционной лояльности и опереться на своего надежного протеже Ли Вэньфаня. Почтенный Цзоу Лу также представляет собой приемлемый выбор, мудрый благодаря годам опыта в политике, хотя личные трения, несомненно, присутствуют. Или, возможно, необходимо обратиться к Ли Цзунжэню, чтобы укрепить армию, и есть даже недавно обосновавшиеся либералы, собравшиеся вокруг Сунь Фо, которые могли бы дать западный взгляд на проблемы. Это решение не следует принимать легкомысленно, ибо кто знает, какое влияние каждая фракция может извлечь из доверия Председателя..."
 GXC.midgame.430.a: "Чэнь Цзитан пользуется моим вниманием."
 GXC.midgame.430.b: "Ли Вэньфань, уделите минутку."
 GXC.midgame.430.c: "Цзоу Лу, мне нужен твой опыт."
 GXC.midgame.430.e: "Кто я без армии?"
 GXC.midgame.430.f: "Сунь Фо, помогите мне, если можете."

 GXC.midgame.431.t: "Разделенная революция"
 GXC.midgame.431.d: "Возможно, величайшая ирония Гоминьдана заключается в том, что, несмотря на их настойчивость в строгой однопартийной ортодоксии (основанной как реакция на громоздкость старого Тунмэнхоя), Партию всегда преследовали бесконечные внутренние распри. Или, возможно, сама их авторитарная природа ведет к такому фракционализму. Так или иначе, наследники доктора Суня боролись за его наследство еще до его смерти, при этом партия сначала раскололась на регионалистские блоки, а затем на правые и левые фракции под руководством Ху Ханьминя и Ван Цзинвэя. Чан Кайши вскоре сформировал свою клику, основанную на военных Вампу, в центре партии, правые и левые разделились на более мелкие враждующие фракции и так далее — разделение, которое продолжалось даже после длительного изгнания.\n\nВ Лянгуане партия остается жестоко разделенной. Для подчинения двух провинций потребовались совместные усилия трех армий, каждая со своим видением Китая. Тем не менее, для [ROOT.GetLeader] еще не поздно залечить расколы, даже если шрамы останутся.\n\nЛевые Гуандуна представляют собой широкий спектр недовольных городских синдикалистов, радикализованных крестьян и более умеренных левых революционеров. Целенаправленные усилия по привлечению последней группы могут быть тем, что необходимо для изоляции экстремистов и представления послания о примирении.\n\nЗа пределами Лянгуана республиканизм сохраняет множество сторонников, включая многих богатых либеральных доноров, которые чувствовали себя маргинализированными из-за реорганизации партии и отхода от ее более демократических, вдохновленных Западом корней. Самой крупной фракцией, непосредственно связанной с Гоминьданом, является Комиссия по делам заморских китайцев, в которой доминируют, но не ограничиваются ими, Сунь Фо и его союзники. Их связи в китайских диаспорах по всей Юго-Восточной Азии делают их бесценными.\n\nКонечно, правое крыло Гоминьдана само по себе довольно фракционировано. Сосредоточение внимания на укреплении нашей собственной базы поддержки и укреплении единства внутри нашей существующей коалиции, возможно, в конечном итоге лучше, чем давать пустые обещания тем, кто нас покинул."
 GXC.midgame.431.a: "Объединенный фронт с левыми устранит разногласия."
 GXC.midgame.431.b: "Мы заслужим доверие, вернувшись к нашим демократическим корням."
 GXC.midgame.431.c: "Иногда лучше всего верить в себя."

 GXC.midgame.432.t: "Система «Три в одном»"
 GXC.midgame.432.d: "Поскольку Гоминьдан стремится встряхнуть закостенелые местные структуры власти по всему Лянгуану, Новая клика Гуанси начала объединять должности старосты деревни, начальника ополчения и директора школы в рамках своего текущего проекта по внедрению системы гражданского ополчения. Это не совсем беспрецедентно; Китай страдает от серьезной нехватки компетентного персонала и денег на зарплаты.\n\nДля Гуанси, однако, цель состоит не только в экономии средств для бедной провинции. Придумав лозунг «чтобы создать новое правительство, нанимайте новых людей», клика рекламировала свою программу за пределами провинции в очень идеологических терминах. Сторонники утверждают, что концентрация власти в одной паре рук не только смягчает нехватку способных людей и сокращает расходы, но и связывает воедино жизненно важные функции правительства, армии и образования.\n\nРеакция была жесткой. Традиционно должность старосты деревни была добровольной, что означало, что только шэньши обычно занимали такую неоплачиваемую должность. Многих из этих новых лидеров высмеивали как высокомерных, несмотря на то, что они прошли всего 6–18 месяцев государственной подготовки, часто сравнивая с миниатюрными императорами с прозвищами вроде «Сороконожка, летящая в небо» и «Железноголовый старец».\n\nРастут сообщения о том, что недавно назначенные чиновники становятся жертвами заговоров смещенных местных элит, включая нападения наемных бандитов. Решение этого кризиса разделило руководство провинции. Некоторые выступали за железную руку, разрабатывая «Положения о наказании местных деспотов и злых шэньши» и призывая к развертыванию войск в неспокойных районах, таких как Гухуа и Жун. Другие советовали тактическое отступление, разделяя больше власти с традиционной элитой и подчеркивая временный характер этих программ. Неспособность сделать это может привести к саботажу внедрения гражданского ополчения недружелюбными местными лидерами, что система «Три в одном» и была призвана предотвратить."
 GXC.midgame.432.a: "Жестко расправиться с этими контрреволюционерами!"
 GXC.midgame.432.b: "Наша судьба не может зависеть от незрелых карьеристов..."

 GXC.midgame.433.t: "Правительство в Гуандуне"
 GXC.midgame.433.d: "Губернатор Гуандуна Чэнь Цзитан недавно запустил ряд предприятий в своей родной провинции, направленных на подготовку нового поколения чиновников низкого уровня для партии. В действительности Чэнь Цзитан довольно отстранен от таких вопросов гражданского управления, и, похоже, эти инициативы возглавляет его близкий союзник Линь Ичжун. «Курс углубленного политического обучения», как он известен, представляет собой новый набор предметов и тем, доступных в Военно-политической академии Гуандуна. Якобы лояльные Национальной революции, некоторые в партии опасаются, что их лояльность на самом деле принадлежит самому Чэнь Цзитану, а не идеалам Гоминьдана. Наряду с этим, Новая клика Гуандуна также запустила «Трехлетний административный план», направленный на создание «образцового, нового Гуандуна». Будучи довольно непричастными к реальным гражданским делам, подчиненные Чэнь Цзитана все еще продолжают управлять этими схемами под его надзором.\n\nЕго незаинтересованность в таких делах не может быть более очевидной, чем тот факт, что при проверке расписания Провинциального правительства Гуандуна можно увидеть, что Чэнь Цзитан едва ли присутствует в каком-либо официальном качестве, за исключением одного случая, когда он был наблюдателем без права голоса. Быстро укомплектовав правительство своими союзниками и дружками, он даже зашел так далеко, что предоставил должности Лю Цзивэню, зятю члена «Клики старейшин» и Центрального исполнительного комитета Гу Инфэня, и даже Линь Юньгаю, члену Наблюдательного комитета и протеже самого Ху Ханьминя. В дальнейшей демонстрации политического маневрирования его школы «местного самоуправления» и Кооперативное движение Гуандуна еще больше захватили местные администрации.\n\nОчевидно, что некоторые в партии стремятся критиковать такое вопиющее расширение его влияния и уже призывают к официальному осуждению его действий, однако другие опасаются последствий, учитывая, что Чэнь Цзитан был ключевым игроком в восстановлении Комитета, и его влияние как губернатора Гуандуна."
 GXC.midgame.433.a: "Нужно быть мудрым, чтобы закрыть на это глаза."
 GXC.midgame.433.b: "Отвратительное поведение!"

 GXC.midgame.434.t: "Недобросовестные влияния"
 GXC.midgame.434.d: "В ходе Национальной революции всегда присутствовал вечный вопрос о финансах для операций правительства. В прошлом у Гоминьдана было множество финансовых покровителей разной степени приверженности, однако в нынешнем империалистическом мире, который имеет подавляюще недружелюбное мнение о нашем движении, и без позиционирования себя как ручных собачек Парижа или Лондона, мы лишены вариантов финансирования нашего правительства — чему не способствует недавний глобальный экономический кризис. Предприимчивый вариант, который, к сожалению, широко используется региональными милитаристами в Китае, заключается во влиянии на торговлю опиумом внутри и за пределами провинции, и наши союзники-милитаристы выбрали два совершенно разных подхода к таким вопросам.\n\nВ Гуанси Провинциальное правительственное управление по борьбе с опиумом Новой клики Гуанси — как следует из названия — взялось за обложение высокими налогами и подавление торговли опиумом в провинции, получая такие абсурдные доходы, что они составляют 50% от общих доходов провинции в год. Однако в противоположном направлении в Гуандуне Чэнь Цзитан применил стратегию влияния и контроля над торговлей опиумом, используя множество закулисных тактик, таких как подавление контрабанды, но сохранение запасов опиума для распределения в Бюро по борьбе с опиумом при необходимости.\n\nТакие действия — возможно, косвенно — привели к значительной потере доходов для Новой клики Гуанси, поскольку опиум обычно перемещается между провинциями, и Ли Цзунжэнь направил шквал требований [ROOT.GetLeader], настаивая на том, что Чэнь Цзитан должен прекратить свое наглое посягательство на экономику Гуанси. С другой стороны, очернение Чэнь Цзитана таким действием может привести к сжиганию бесценных мостов, необходимых для сохранения курса в Национальной революции."
 GXC.midgame.434.a: "Прискорбно, но необходимо."
 GXC.midgame.434.b: "Эти препирательства и воровство нас ни к чему не приведут!"
 GXC.midgame.434.c: "Чэнь Цзитан должен немедленно прекратить!"

 GXC.midgame.435.t: "Революционная молодежь"
 GXC.midgame.435.d: "По мере продвижения волны Национальной революции нельзя оставлять молодежь позади. Еще до обреченного Северного похода существовал ряд запланированных инициатив по включению молодежных движений в партийный аппарат. Теперь у партии есть возможности для реализации таких проектов.\n\nХу Ханьминь и его союзники опирались на его предыдущие труды, исследующие социофизиологическую привлекательность левого активизма для молодежи. Он утверждает, что современная китайская молодежь находится в коллективном состоянии депрессии, мужественная, но лишенная направления, но с жаждой всего, что может предложить жизнь. В таких обстоятельствах естественно, что их привлекают массовые движения, чтобы направить свою ярость и разочарование. Чтобы противодействовать этому, Председатель разработал серию скаутских движений, направленных на тщательное управление молодежью обоих полов для обучения продуктивным навыкам и внесения вклада в общество.\n\nСходные по реализации, но не по подходу, либеральные члены партии, включая Сунь Фо, стали партнерами Янь Цзялиня и вдохновленных Западом Скаутов Китая. Надеясь использовать уже существующие программы для простоты реализации, они надеются, что этот подход научит молодежь как патриотизму, так и личной независимости в жизни.\n\nВ резком контрасте Новая клика Гуанси осудила распущенный, отступнический образ жизни молодежи. Обвиняя их в отсутствии страха перед общественным мнением или законом, Ли Цзунжэнь стал называть их «новыми учеными шэньши», чья единственная цель в жизни — как можно скорее заработать деньги, сбежать от сельской жизни, построить дом в западном стиле и наслаждаться комфортом прибрежного столичного образа жизни. Вместо того чтобы позволить этой испорченной молодежи создавать злую атмосферу в обществе, они и другие консерваторы продвигали ряд милитаристских инициатив, чтобы подготовить их вместо этого стать дисциплинированными, образцовыми гражданами и возродить китайскую культуру."
 GXC.midgame.435.a: "Как всегда, Ху Ханьминь прав."
 GXC.midgame.435.b: "Инициатива бойскаутов Фракции реконструкции многообещающая..."
 GXC.midgame.435.c: "Идеи Ли Цзунжэня придадут им твердость!"

 GXC.midgame.436.t: "Жилы войны"
 GXC.midgame.436.d: "В провинции Гуандун среди ее жителей всегда была неизменная жилка независимости — на что указывает то, что она является рассадником революционеров — и это зашло так далеко, что распространилось даже на местную валюту. Постоянно провинциальные правительства Гуандуна чеканили свою собственную специальную валюту, функционирующую параллельно с центральной валютой, контролируемой Пекином. Однако это не новая практика, поскольку еще до начала века Гуандун чеканил свою собственную местную провинциальную серебряную валюту.\n\nХотя объединение страны неуклонно продвигается, приток поддельных и региональных валют начал циркулировать в нашей экономике, причем многие из них имеют сомнительную ценность. Мы могли бы приказать банкам принимать все валюты как сравнимые по стоимости, и в обмен выпустить более централизованную валюту, чтобы в конечном итоге достичь выравнивания в нашей экономике, медленно выводя из обращения незаконные региональные валюты. Однако это был бы медленный и постепенный процесс, и он все еще мог бы создавать головную боль на долгие годы.\n\nДругой вариант, представляющийся нашему правительству, — вместо этого отчеканить совершенно новый набор центральной валюты, реформируя валюту централизованно вокруг той, спрос и предложение которой мы можем контролировать. Хотя это, естественно, привело бы к большому возмущению граждан, поскольку их валюта может вскоре обесцениться, это может быть необходимым шагом, требуемым для истинного объединения нации.\n\nВнутри Гоминьдана существуют большие разногласия по таким вопросам, причем регионалисты в кликах Новой Гуанси и Нового Гуандуна поддерживают постепенный отказ от региональных валют, в отличие от резкой централизации, желаемой Кликой старейшин и ее союзниками."
 GXC.midgame.436.a: "Сохранить прием всех валют."
 GXC.midgame.436.b: "Выпустить новый набор валюты для всей нации."

 GXC.midgame.437.t: "Здоровье народа, здоровье нации"
 GXC.midgame.437.d: "С первых дней движения Гоминьдан связывал инициативы общественного здравоохранения Китая с духовным здоровьем нации. Уместно, так как их основатель также получил образование врача, прежде чем он стремился исцелить болезнь, терзающую нацию. В Гуандуне различные партийные интеллектуалы и администрация провинции продолжили существующие программы здравоохранения, популярное дело как слева, так и справа, многие из которых начались во время первоначального правления партии в Гуанчжоу в 1920-х годах.\n\nВ Гуанси, где широко распространена нехватка доступа к здравоохранению, реализуется еще более амбициозный проект. Новая клика Гуанси начала централизованно планируемые усилия, разделив провинцию на регионы общественного здравоохранения. В каждом регионе должна была быть финансируемая провинцией больница, открывая новые, если таковых не существовало, которая, как ожидалось, будет проводить прививки, собирать статистику здоровья, возводить карантинные станции и предоставлять различные другие услуги. Для поддержки этой расширенной системы были организованы комитеты общественного здравоохранения для управления ею, а Университет Гуанси открыл новую медицинскую школу для предоставления дополнительного персонала, и в Учжоу была открыта фармацевтическая фабрика для производства лекарств, бинтов и косметики.\n\nЭти больницы станут центром системы здравоохранения региона, окруженными десятками запланированных районных клиник для обслуживания сельской местности. Чтобы обойти нехватку обученных врачей и средств, есть планы разместить фельдшера в каждой деревне. Во многих районах, и даже в интеллектуальных кругах Гоминьдана, традиционная китайская медицина местных целителей и аптекарей остается популярной, добавляя еще одно измерение к процессу исцеления. Ее практики утверждают, что их методы исцеляют не только тело, но и дух.\n\nНесмотря на большие надежды, фактическая эффективность этих программ в конечном итоге зависит от суммы финансирования, которую они получают из и без того напряженного бюджета партийного государства. Более того, в ближайшей перспективе фактическая отдача от этих проектов кажется более политической, чем практической."
 GXC.midgame.437.a: "Традиционные китайские практики помогают людям обходиться в трудные времена."
 GXC.midgame.437.b: "Надежные усилия в области общественного здравоохранения исцеляют людей и спасают нацию."
 GXC.midgame.437.c: "Тщательные реформы Гуанси следует не только хвалить, но и имитировать!"

 GXC.midgame.438.t: "Новое платье милитариста"
 GXC.midgame.438.d: "В резком контрасте с его обычным modus operandi, лицо Новой клики Гуанси, Ли Цзунжэнь, изменил свое отношение к интеллектуалам-либералам и даже северным консерваторам. Уделяя заметно больше внимания их желаниям и даже иногда осыпая их банальностями. Ли Цзунжэнь пошел дальше, протянув руку региональным меньшинствам Китая, таким как мусульмане — возможно, под влиянием своего близкого соотечественника Бай Чунси — и другим, проявляя неслыханный уровень благожелательности и заботы об их борьбе, проблемах и взглядах на Национальную революцию. Но это еще не все, так как недавно поступили сообщения, что он переписывался с Чжан Цзюньмаем, Джеймсом Йеном и даже далеким Ху Ши. Возможно, милитарист действительно и полностью изменил свое сердце?\n\nЕстественно, более скептичные и циничные в различных Центральных кликах отвергают такой оптимизм, предполагая, что Ли Цзунжэнь явно просто пытается провести ребрендинг своего имиджа как благожелательного лидера, позиционируя себя, чтобы в конечном итоге бросить вызов Председателю за трон Гоминьдана. Однако все еще остается обнадеживающее скрытое течение: до какой степени нужно бежать от своих собственных принципов только ради более сильной попытки захвата власти?"
 GXC.midgame.438.a: "Возможно, он действительно изменился..."
 GXC.midgame.438.b: "В Революции нет места милитаристам."

 GXC.midgame.439.t: "Мэн-цзы и социализм"
 GXC.midgame.439.d: "В триумфальном возвращении Ху Ханьминя на передовую китайской политики многие пытались понять, за что выступает этот революционер. Нет лучшего источника для понимания Председателя, чем его революционные труды и журналы давно минувших дней, хотя не все они были приняты однозначно. Один из них, вызвавший особое раздражение даже у его близких союзников в Клике западных холмов, — это «Мэн-цзы и социализм», чрезвычайно спорная работа, в которой Председатель утверждает, что традиционная китайская философия на самом деле невероятно совместима с социализмом.\n\nВ этой работе он восхвалял великого китайского философа Мэн-цзы и его позицию по разделению труда: тех, кто занимался умственным трудом, и тех, кто выполнял физический труд. Веря в справедливую систему, в которой все будут иметь право на труд и достойную жизнь, Председатель согласился с Мэн-цзы, что у человека есть врожденные различия в таланте и способностях, и что отмена уровней социализмом была неправильной, поскольку люди должны вознаграждаться пропорционально их вкладу.\n\nОднако, обеспечивая права людей на достойную жизнь, Ху предложил создание подлинной конституционной демократии, полагая, что идеалы социализма также имеют ценность в Китае, так как те, кто заботился о бедных, на протяжении его долгого прошлого давно искали решение этого вечного явления.\n\nЕстественно, яростно антисоциалистическая позиция внутри Правого Гоминьдана привела к серии едких писем, попавших на стол Председателя, обвиняющих его в предательстве доктора Суня или даже в уступке левым. Председатель мог бы защитить свои предыдущие работы, показав, что он имеет истинную и полную приверженность революции здесь и сейчас. Он мог бы, однако, просто проигнорировать протесты и негативную реакцию и сосредоточиться на своей работе, ибо что могут сделать его политические оппоненты в свете результатов, которых он достигнет?"
 GXC.midgame.439.a: "Позорное зрелище!"
 GXC.midgame.439.b: "Председатель защищает свою позицию!"

 GXC.midgame.440.t: "Кадры, кооперативы и деревня"
 GXC.midgame.440.d: "Для мобилизации народа националистическое правительство способствовало расширению кооперативов как средства реформирования местных органов власти Китая. Хотя Гоминьдан вряд ли одинок в оплакивании упадка китайской деревни, их опасения, что новые кооперативы отойдут от намеченного Партией курса, заставили их действовать решительно, с тесным участием на каждом этапе. По словам партийных чиновников, эти кооперативы выполняют шесть обязанностей местного самоуправления во время опеки: во-первых, составление современной переписи. Во-вторых, разрушение понятий частной собственности. В-третьих, финансирование общественных работ и развития инфраструктуры. В-четвертых, улучшение управления зерном, хранения зерна и социального обеспечения. В-пятых, открытие новых земель для культивации и лесовосстановления. И в-шестых, продвижение местного самоуправления.\n\nСами кооперативы спроектированы с параллельными структурами провинциальному и национальному правительству, с Мандатными комитетами, созданными по образцу Экзаменационного Юаня, Управляющими комитетами, действующими аналогично Исполнительному и Судебному Юаням, и Инспекционными комитетами, имитирующими Контрольный Юань. Гоминьдан теоретизирует, что участие людей в этих органах превратит жителей деревни в граждан, обучая их Четырем правам, установленным доктором Сунем.\n\nНа местах эти усилия по созданию кооперативов встретили смешанный прием: многие молодые идеалисты всем сердцем приняли программу, в то время как более циничные товарищи сопротивляются этим программам, опасаясь последствий преждевременной передачи власти неграмотным деревенщинам. Тем не менее, поколение партийных «кооперативных гидов» рассредоточивается по сельской местности, проводя месяцы за пропагандой и следственной работой и продвигая совместные встречи партийных, правительственных и образовательных учреждений для предоставления информации о районе и людям района. Что бы ни говорили лидеры партии в [ROOT.Capital.GetCapitalVictoryPointName], эти безымянные кадры решат судьбу кооперативного движения."
 GXC.midgame.440.a: "Энтузиазм молодых активистов вдохновляет народ!"
 GXC.midgame.440.b: "Соблюдение ортодоксии позволяет последовательно внедрять изменения."
 GXC.midgame.440.c: "Твердая рука верных партийцев защищает от подрывной деятельности."

 ##RKMT Popularity Ladder Events (460-489)
 GXC.midgame.460.t: "Критика критики исторического материализма"
 GXC.midgame.460.d: "Во времена, не столь отдаленные от наших, сам Председатель представлял своеобразную ветвь революционного социализма, и по мере роста его национальной известности его ранние политические взгляды также вышли на свет. Однако не все его прежние, более радикальные работы высмеивались как наивность молодости, поскольку старая статья, написанная во времена революционного социализма [ROOT.GetLeader], всплыла на поверхность и начала служить основополагающим литературным произведением для современного дела Гоминьдана.\n\nВ своей «Критике критики исторического материализма» Председатель полностью защищал исторический материализм, утверждая, что теория социального прогресса Карла Маркса и теория эволюции Чарльза Дарвина в сочетании полностью объясняют моральные заповеди человечества. В глазах Председателя экономическая деятельность была центральным элементом общественной жизни и фундаментальной движущей силой исторической эволюции. Он утверждал, что Маркс не исключал влияния других факторов на человеческое развитие, но выделял экономику как самую важную силу.\n\nМожно процитировать [ROOT.GetLeader]: «Производительность в обществе составляла основу для изменения методов производства в нем. Хотя новые методы производства также подвержены влиянию различных факторов, будучи сформированными, они обладали силой определять процесс всех аспектов надстройки в обществе. Верно, что все новые методы производства обязаны своим изобретением мысли человека, на которую, тем не менее, сначала влияла материальная жизнь. Мысль человека развивалась в ответ на социальные потребности, таким образом служа средой для социального прогресса».\n\nНесмотря на споры вокруг статьи, Председатель и его союзники все больше видят, как она интегрируется в философию Гоминьдана, принимая марксистский материализм, но отвергая сопровождающую его классовую борьбу. Естественно, его критики обвинили его в социалистическом проникновении и неспособности возглавить Национальную революцию Гоминьдана."
 GXC.midgame.460.a: "Воистину вестник Революции!"
 GXC.midgame.460.b: "Неужели он ничем не отличается от Вана?"

 GXC.midgame.461.t: "О классе и школах мысли о нравах"
 GXC.midgame.461.d: "В своей стремительно растущей популярности [ROOT.GetLeader] наконец-то может подкрепить действием идеи, которые он сформулировал во время своего изгнания и даже раньше, в 1920-х годах, и поэтому возрождение идей Председателя начало популяризировать их среди его последователей и более широкого движения Гоминьдана. Некоторые из наиболее заметных были выдвинуты на передний план.\n\nОдна из самых своеобразных концепций, возникших в это время его жизни, заключается в том, что Председатель утверждает, что Китай всегда был классовым обществом, где правящие классы (Император, Отец, Муж) навязывали свою этику управляемым классам (Министр, Сын, Жена) к выгоде первых. Одновременно они обладали абсолютной властью, и поэтому, как следствие, шла классовая борьба, поскольку управляемые классы пытались перевернуть традиции, которые были иррациональными, произвольными или бесчеловечными. К сожалению, мало что изменилось со времен династии Цинь, так как методы производства остались столь же неизменными.\n\nПереходя к более широкому охвату, Председатель утверждает, что исторически было 3 этапа развития. До Цинь существовало Пять кодексов или Пять учений: отец должен действовать со справедливостью, мать с доброжелательностью, старший брат с братской любовью, младший брат с уважением, а сын с сыновней почтительностью. В период Сражающихся царств Конфуций и Мэн-цзы создали Пять этик, чтобы управлять князьями, однако это было искажено в Три устоя, которые требовали полного подчинения Императору, Отцу и Мужу, что длилось 2000 лет."
 GXC.midgame.461.a: "Мудрость Ху Ханьминя не знает границ!"

 GXC.midgame.4610.t: "Связывая легизм Цинь с освобождением женщин"
 GXC.midgame.4610.d: "Обсуждая связь между экономикой и моральными заповедями в обществе, [ROOT.GetLeader] утверждает, что они прошли через три фазы: В до-поздний период, когда клановые и семейные узы связывали людей с общей землей и ресурсами, чему лучше всего соответствовали Пять учений. После Чжоу социально-экономический разлад и развитие класса безземельных крестьян привели к Пяти этикам, в надежде восстановить мир и порядок в обществе. После Цинь Китай вернулся к клановой ориентации, отцовская власть возросла до абсолютизма, что привело к созданию нравов Трех устоев.\n\nЧтобы решить такую пародию, Председатель предположил, что подъем кланового общества был обусловлен аграрной экономикой первобытного общества, и когда возникла частная собственность на землю, возник и социально-экономический разрыв. Полагая, что промышленная революция разрушила патриархат, обесценив мужскую физическую силу, он также верил, что клановая система — наряду с современной нуклеарной семьей — распадется по мере распада капитализма, и поэтому лучшим решением было бы, чтобы каждый член общества занялся профессией, наиболее совместимой с его талантом и способностями.\n\nВ качестве заключительного примечания Председатель утверждал, что в современной нуклеарной семье существует противоречие, в котором женщины вынуждены выбирать между ведением домашнего хозяйства и профессией, и поэтому естественная тенденция будет направлена на освобождение женщин от заточения к их участию в рабочей силе."
 GXC.midgame.4610.a: "Мудрость Ху Ханьминя не знает границ!"
 GXC.midgame.4610.b: "Он действительно потерялся в своих теориях."

 GXC.midgame.462.t: "Рыцарь Гуандуна"
 GXC.midgame.462.d: "Несмотря на падение с трона, которое пережил Ху Ханьминь в последнее время, Чэнь Цзитан продолжает лихорадочно работать, чтобы гарантировать, что, несмотря на потерю своего покровителя, Новая гуандунская клика не падет вместе с ним. В своих усилиях восстановить свою популярность и продолжать привлекать поддержку, Чэнь Цзитан предпринял ряд инициатив, укрепляющих положение его клики внутри нации.\n\nНедавно губернатор пообещал своим гражданам облегчить налоговое бремя, чтобы облегчить их беды, однако становится совершенно очевидно, что он не намерен этого делать; ибо его операции на национальной арене требуют много средств для их поддержки. Первоначально применявшиеся всякий раз, когда доходы провинции были низкими, бурный период недавней национальной политики привел к тому, что губернатор перевел сборы и налоги в более постоянную силу в провинции. В некоторых случаях был даже применен налог на экскременты.\n\nРаботая со своим близким союзником Цюй Фанпу, губернатор начал централизовать сбор налогов, открывая их для торгов и гарантируя, что провинциальное правительство получит свою долю. Однако возникли некоторые проблемы, поскольку в районах, где размещаются воинские части, взимается дополнительная плата из-за междоусобиц. К счастью, губернатор создал комитет, чтобы помочь контролировать распределение доходов, полученных таким образом. Что спорно, губернатор ввел строгий налог на опиум и азартные игры.\n\nНесмотря на острую потребность в средствах и доходах, Чэнь Цзитан по-прежнему обязан положить конец различным поборам, и поэтому публично принял политику по их сокращению — однако большинство сборов просто заменяются другими, и поэтому бремя на самом деле не было облегчено. Идя дальше, губернатор даже публично попытался реформировать устаревшую систему земельного налога с помощью своего нового «временного земельного налога», хотя, как и большинство его схем, новый налог якобы был призван быть более справедливым, но на самом деле привел к повышению налогов наряду со старыми налогами."
 GXC.midgame.462.a: "Цель оправдывает средства..."
 GXC.midgame.462.b: "Наглый коррумпированный мошенник!"

 GXC.midgame.463.t: "Пешки и кукловоды"
 GXC.midgame.463.d: "После разрушительного смещения старого Председателя и его падения в немилость, многие думали, что звезда Ху Ханьминя закатилась и никогда больше не вернется. Бежав в Гуанчжоу, многие думали, что он просто уйдет на покой и будет жить жизнью неудачливого революционера. Однако он продолжал писать статью за статьей, критикуя как нынешний подход Гоминьдана к национальным вопросам, так и влияние Ли Цзунжэня и предательство его союзников в кликах Сишань и Фракции реконструкции.\n\nНикто не выразил свою поддержку экс-председателю более явно, чем губернатор провинции Гуандун Чэнь Цзитан. Причин для такой поддержки множество, однако наиболее очевидной является личное оскорбление, которое Чэнь Цзитан получил от уроженца Гуанси Ли Цзунжэня, развив затяжную обиду на Новую клику Гуанси в целом. Однако следует отметить, что Чэнь Цзитан никогда не проявлял никакого желания покинуть Гуандун и занять трон для себя, поскольку его любовь к родной провинции слишком сильна, чтобы отделить его от нее. Поэтому считается, что он намерен подтолкнуть Ху Ханьминя вперед, чтобы тот снова поднялся до национальной известности, одолев узурпаторов и вернувшись на свой законный трон.\n\nОднако в этом соглашении Ху Ханьминь, как сообщается, не был так уж готов вступать в сговор. Будучи твердо принципиальным революционером ушедшей эпохи, он отказался даже от намека на позирование перед таким коррумпированным регионалистом, как Чэнь Цзитан, что привело к тому, что многие даже усомнились в том, может ли такой союз осуществиться после присущих разногласий в характере между ними. К счастью для Чэнь Цзитана, недавняя суматоха, похоже, пошатнула убеждения пылкого революционера, и из прагматизма — или, возможно, отчаяния — Ху Ханьминь согласился сотрудничать с губернатором в новой попытке вернуться к национальному лидерству еще раз. Их отношения, теперь дуополия, заставили многих в стране задавать один и тот же вопрос. Кто господин, а кто слуга?"
 GXC.midgame.463.a: "Смертельный союз?"
 GXC.midgame.463.b: "Это выходит из-под контроля!"

 GXC.midgame.464.t: "Централизация Гуанси"
 GXC.midgame.464.d: "В своей неуклонно растущей национальной популярности Новая клика Гуанси не позволила новому рогу изобилия возможностей пропасть даром. Быстро переходя к использованию своего новообретенного влияния, они начали еще больше централизовать свое почти автократическое правление в провинции Гуанси, практически отстраняя любых чиновников из Центрального правительства. Благодаря таким действиям они сумели превратить свою родную провинцию в свое личное феодальное владение внутри нации и начали использовать его для проецирования своей власти за пределы провинциальных границ, создавая устойчивый политический блок даже в рамках недавно сформированного правительства. С новыми союзниками и пылкой решимостью лидеры Новой клики Гуанси смогли прыгнуть выше головы в численных показателях и богатстве, и они быстро соперничают с теми, кто находится в [ROOT.Capital.GetCapitalVictoryPointName] на национальной арене и за ее пределами, формируя то, что равносильно правительству внутри правительства.\n\nВ своих последующих захватах власти и укреплении своих позиций Клика Гуанси продвинулась вперед в создании нового комитета, известного как «Объединенная комиссия партии, правительства и армии Гуанси», укомплектованного почти полностью членами Новой Гуанси. С численностью, затмевающей само национальное правительство, комитет зеркально отражает все четыре органа власти, полностью компрометируя нашу национальную структуру. Как и ожидалось, такой шаг вызвал много критики и гнева со стороны врагов Новой Гуанси, поскольку он затмевает уже существующих глав каждого правительственного органа, наряду с множеством других важных высокопоставленных офицеров в армии. Некоторые обвиняют их в вопиющей фракционности, в разложении революции, даже в предательстве памяти доктора Суня в первую очередь, но они не могут сделать ничего, кроме как кричать в глухие уши."
 GXC.midgame.464.a: "Гуанси меняется еще раз..."
 GXC.midgame.464.b: "Кто-то должен что-то сделать!"

 GXC.midgame.465.t: "Открытый заговор"
 GXC.midgame.465.d: "Власть Новой Гуанси почти затмила само солнце. С их подъемом от простого набора милитаристов и их мини-государств в Гуанси, до катастрофического падения Северного похода под немецким сапогом, до снова их возвращения к известности как в Гуанси, так и в национальном масштабе. Никто не мог предсказать продолжающуюся стойкость, проявленную членами клики, но тогда они никогда не встречали уроженца Гуанси. Во всех этих событиях Ли Цзунжэнь, Бай Чунси и остальная часть руководства постоянно переживали шторм, что бы ни было брошено на их пути. Медленно, но верно расширяя свое влияние и помогая усилиям Национальной революции, они, возможно, достигли вершины того, чего они могут достичь при Центральном правительстве.\n\nЭто нигде не проявляется так явно, как в делах самой Национально-революционной армии. Снова и снова престижные должности, несущие неисчислимое влияние на правительственную и военную политику, захватываются Новой Гуанси и их офицерами, становясь все более доминирующей силой в армии, практически подавляя правительственный контроль. В еще одном неудачном повороте событий даже не присоединившиеся офицеры в делах различных фракций начали соглашаться с линией мышления Новой Гуанси, и, следовательно, армия выросла, чтобы стать еще одним оружием клики Новой Гуанси в их целях контроля над нацией. В противном случае многие, не связанные с кликой, отодвигаются в неактуальность, и поспешно вся оппозиция становится все более самодовольной ситуацией."
 GXC.midgame.465.a: "Естественный ход событий..."
 GXC.midgame.465.b: "Они когда-нибудь остановятся?"

 GXC.midgame.466.t: "Возвращение Наследного принца"
 GXC.midgame.466.d: "Описывая различных ведущих деятелей Гоминьдана, один человек сказал: «Если вы шли к Ху Ханьминю, он говорил так красноречиво, что у вас никогда не было шанса открыть рот. Если вы шли к Чану, он слушал вас, но мало говорил. Если вы шли к Ван Цзинвэю, он был очень учтив, и вы оба много беседовали. Если вы шли к Сунь Фо, ни одному из вас нечего было сказать». Никогда это не становилось более очевидным, чем в великодушном возвращении биологического сына доктора Суня, Сунь Фо, в национальную политику.\n\nБежав за границу после провала Северного похода, Сунь Фо создал клику, состоящую из различных западных либералов и хуацяо, номинально известную как «Гавайская клика» — названную в честь места их изгнания. Как уменьшительно известный «Наследный принц», Сунь Фо имеет связи как с левым, так и с правым крылом Гоминьдана, и оба номинально уважают то, что он говорит. После провала операций Восстания Миньгань в Фуцзяни, Сунь Фо решительно сделал своим — и своей Фракции реконструкции — новым домом Гуанчжоу.\n\nЭклектичное собрание разнообразных фигур, «Несгибаемый либерал» служит лицом и хозяином своей центристской фракции в Гоминьдане, в которую входят те, кого можно считать левыми, такие как Ван Куньлунь, фигуры с национальным превосходством, такие как прославленный У Чаошу, гавайские либералы, такие как Хуан Ханьлян, и даже их собственная клика в Национально-революционной армии, известная как «Индийская клика» — с участием Чжан Факуя.\n\nС этой разнообразной группой под своим руководством Сунь Фо смог вплести себя в национальную политику Гоминьдана как силу либерализма в море авторитарных тенденций и посвятил себя обеспечению того, чтобы Опека получила свою конечную точку."
 GXC.midgame.466.a: "Центристский Гоминьдан?"
 GXC.midgame.466.b: "Смотри, где стоишь, Сунь Фо."

 GXC.midgame.467.t: "Против милитаризма"
 GXC.midgame.467.d: "Известный своей оппозицией вопиющему и бесконтрольному милитаризму, Сунь Фо использовал рост популярности своей фракции, чтобы критиковать и выступать против военного правления, опираясь на множество милитаристов, рожденных от сверхамбициозных и неконтролируемых генералов, наряду с собственным Чан Кайши из Гоминьдана, он открыто осуждал влияние военных в правительственных делах. Намереваясь сломать психологическую хватку милитаризма и милитаризма над людьми, заявляя, что предыдущие неудачи в Национальной революции произошли из-за того, что военные не смогли завоевать поддержку масс и не стали их опекуном. Вместо этого он считает, что сила революции должна исходить от масс, чтобы у Революции была хоть надежда на успех.\n\nИдя дальше, его цитируют, говоря: «Военные дела отличаются от политики. Чтобы управлять армией, можно отдавать приказы от высших чинов к низшим. Однако, чтобы управлять нацией, нельзя использовать военный порядок», и даже начал публикацию серии статей, в которых излагает свое желание прекратить военное правление и начать внедрение правительственной структуры Пяти юаней.\n\nЕстественно, это вызвало много гнева со стороны различных армейских клик внутри Гоминьдана, которые ставят под сомнение компетентность Сунь Фо в военных вопросах, учитывая, что он никогда не служил и не командовал, а различные гражданские фракции критиковали слишком раннее прекращение Опеки, опасаясь, что демократия может быть задушена в колыбели."
 GXC.midgame.467.a: "Милитаристам нет места!"
 GXC.midgame.467.b: "Кто-нибудь, заткните его!"

 GXC.midgame.468.t: "Умеренные и экстремисты"
 GXC.midgame.468.d: "Берущая свое начало в Реорганизации Гоминьдана 1924 года, Клика Сишань может быть связана с первоначальным Тунмэнхоем, с его более западной революционной ориентацией, несущей значительную массу различных политических мнений. Поистине, однако, клика формально возникла во время вышеупомянутой Реорганизации, сильно выступая против интеграции КСП. Самые откровенные противники в то время были мягко удалены после Реорганизации, хотя большинство в клике держали язык за зубами из уважения к доктору Суню.\n\nПосле смерти Суня номинальные члены Клики Сишань сплотили ряды и решительно выступили против продолжения сотрудничества между Гоминьданом и Китайской синдикалистской партией. Однако внутри самой клики росла фракционность, поскольку возник раскол между радикальным и умеренным крыльями, причем последнее стремилось к сближению с Ван Цзинвэем и левыми Гоминьдана при изгнании КСП. Первые победили, тем не менее, и растущий разрыв между крыльями партии привел к титульной Конференции Сишань с намерением провести ее в Пекине.\n\nХотя номинально радикалы превосходят по силе и влиянию в клике, они приняли «умеренных экстремистов» партии — таких как Цзюй Чжэн и Чжан Цзи — в свои ряды, чтобы создать единство в своем блоке правительства. Несмотря на их решимость в оппозиции к влиянию синдикалистов внутри партии, направление партии довольно бесцельно, поскольку [ROOT.GetLeader] разделяет их анти-КСП настроения, и поэтому их кинжалы обнажены, но цели не видно.\n\nНекоторые в клике хотят укрепить свою популярность среди революционных масс в попытке обеспечить высшую должность, как только нация будет объединена, в то время как другие желают перестраховаться и решительно поставить вес клики за Председателя, опасаясь, что он будет вытеснен врагами как Старейшин, так и клики Сишань."
 GXC.midgame.468.a: "Быть авангардом!"
 GXC.midgame.468.b: "Мы должны поддержать Председателя."

 GXC.midgame.469.t: "Свободные от оков"
 GXC.midgame.469.d: "Поднявшись до национальной известности в последнее время, роль Клики Сишань как младшего партнера и союзника Клики старейшин Ху Ханьминя больше не так очевидна, как кажется. Хотя они по-прежнему имеют отношение к видению Председателя для нации, многие в клике требуют, чтобы они стали независимой силой в партии, не требующей доброй воли и покровительства Ху Ханьминя, чтобы оказывать какое-либо влияние на китайскую политику. Несмотря на это, отношения между Ху Ханьминем и Кликой Сишань были дружественными и устойчивыми, изначально сформировав союз из-за того, что Сишань нуждалась в сильном лидере, чтобы дать отпор синдикалистскому посягательству Гоминьдана, их связь развивалась дальше, поскольку и Клика старейшин, и Клика Сишань начали составлять большинство должностей в изгнанном Московском комитете.\n\nИзвестные своим влиянием видения покойного Сун Цзяожэня для партии и Китая; нации, в которой конституционализм закреплен в ее основных ценностях, и с сильной парламентской системой, Клика Сишань и их динамика с Ху Ханьминем, похоже, идеально зеркально отражают и повторяют старые личные столкновения Сун Цзяожэня с его боссом Сунь Ятсеном, причем руководство клики состоит из различных близких друзей Председателя. В своей новой известности Цзюй Чжэн, Линь Сэнь и Цзоу Лу — все борются, чтобы примириться с новой силой их группы, разрываясь между личной преданностью и убеждениями. Пойдет ли клика своим путем, нанеся удар? Или продолжит поддерживать Председателя?"
 GXC.midgame.469.a: "Партия «Чистых» — это партия правильных."
 GXC.midgame.469.b: "Повернуться спиной к Ху? Мы были бы не лучше Вана."

 GXC.midgame.470.t: "Революционная бледность"
 GXC.midgame.470.d: "В последние пару дней странная атмосфера окружает большинство провинциальных правительственных зданий на нашей территории, даже в [ROOT.Capital.GetCapitalVictoryPointName]. Они кажутся жутко пустынными, и, судя по лицам клерков и чиновников внутри, воздух кажется ледяным, хотя отопление и электричество — там, где оно доступно — кажется, в рабочем состоянии. Наше некогда гордое, но теперь выцветшее знамя колышется на легком ветру, время от времени запутываясь, но некому его поправить — люди на улице проходят мимо него с опущенными головами, возможно, даже быстрее, чем обычно ходят. Очевидно, им наплевать на флаг или наше правительство, которое обещало им новый и более справедливый Китай, и подвело их — во второй раз.\n\nШироко распространенный цинизм населения по отношению к Гоминьдану уже проник в каждую часть функционирования государства. Ли Цзунжэнь был вынужден заметить это во время недавней военной инспекции штаба Второй армии. Нельзя отрицать, что ветеран-генерал не возражал против угасания рвения движения, поскольку все это ограничивало влияние Ху Ханьминя. Но, возможно, он слишком сильно подорвал авторитет Ху? Может быть, ему следовало медленнее строить свое собственное видение, потому что теперь оно просто рухнет, прежде чем он сможет что-то сделать? Трудно сказать, что творилось в голове у Ли, когда он слушал совместный брифинг командиров дивизий в деревянной хижине, глядя вдаль на флаг с белым солнцем, медленно исчезающий в утреннем тумане.\n\nНо Ли был не одинок в этом выводе. Его соперник во всех смыслах этого слова, Ху Ханьминь, также заметил общий скептицизм и сомнения, исходящие от населения, и не отреагировать на это очень серьезное предупреждение было бы политическим выстрелом себе в ногу. Было разработано несколько популистских мер и план кампании по быстрой социально-политической мобилизации населения, но действительно напрашивается вопрос, не слишком ли это мало и не слишком ли поздно."
 GXC.midgame.470.a: "Это какое-то проклятие?"
 GXC.midgame.470.b: "Требуется срочный экзорцизм!"

 GXC.midgame.471.t: "Неизбежная трясина"
 GXC.midgame.471.d: "Когда мы вернулись к власти, в правительственных кругах возникло то, чего явно не должно было быть — патронаж. Это не незнакомое явление в кругах Гоминьдана: это была неотъемлемая часть организации Гоминьдана еще до Северного похода, и это ставило даже Чан Кайши в сложные ситуации не раз. К сожалению, в отличие от многих наших товарищей, этот призрак пережил Северный поход и теперь вернулся со всеми его проблемами и значительными угрозами. Поскольку наша правительственная структура все еще далека от полного единства, пронизана конкурирующими фракциями и соперничающими людьми, патронаж — как основной метод назначения — становился все более распространенным как инструмент в этой паутине конфликтов. Хотя, конечно, Ху Ханьминь по-прежнему считается «лично неподкупным», признаки трещин начинают проявляться вокруг него. Многочисленные недавно назначенные чиновники совершенно некомпетентны для своей должности, и у них, похоже, есть какое-то довольно уникальное чувство правительственной иерархии. Они часто советуются со своими покровителями, а не с начальством по различным вопросам, директивы сверху вниз регулярно теряются в пути или передаются в измененном виде, не только замедляя различные процессы, но и препятствуя повседневному функционированию государственного аппарата.\n\nИзлишне говорить, что вся эта система стала рассадником коррупции, которую начинают замечать даже простые люди. Несколько столь необходимых планов реформ были закрыты до того, как они смогли возыметь действие, сильно повредив влиянию Ху Ханьминя в процессе. Различные милитаристы, и даже Ли Цзунжэнь, извлекают большую выгоду из вытекающих последствий, и, не беспокоясь о каких-либо репрессиях — так как руки Ху связаны, если он хочет остаться у власти — они могут продолжать плести свои сложные интриги."
 GXC.midgame.471.a: "Конверт под столом никому не повредит..."
 GXC.midgame.471.b: "Больше никаких «дядей» и «племянников», только товарищи!"

 GXC.midgame.472.t: "Лояльная оппозиция"
 GXC.midgame.472.d: "Все чаще и чаще появляются все более критические голоса в адрес Ху Ханьминя и его круга доминирующих фигур в Гоминьдане. Основными пунктами критики являются повсеместная коррупция и высокие налоги, не обязательно не связанные друг с другом. Одним удивительным фактом является то, что одна из главных критик исходила не от Ли Цзунжэня, который открыто враждебен председателю, а от двух старших фигур в клике Сишань, Линь Сэня и Цзюй Чжэна. Они утверждают, что плохое управление и коррупция являются врожденными пороками раннего периода, но мы не должны упускать из виду эти проблемы. Оба на самом деле являются лояльными сторонниками Ху, так что это довольно неожиданный поворот, но это не обязательно предательство, скорее, возможно, признак того, что влияние Ху Ханьминя не так широко распространено в Гоминьдане, как он пытается показать широкой партии.\n\nПоскольку мы каждый день движемся вперед к нашей цели единого Китая, ясно, что мы не можем и не достигнем ее без необходимых жертв. Но мы должны быть осторожны: если мы отбросим слишком много нашей мечты, основы веры людей в нас, мы больше не будем верны самим себе и будем обречены на падение."
 GXC.midgame.472.a: "Только время покажет."
 GXC.midgame.472.b: "Белое солнце будет реять над Китаем!"

 GXC.midgame.473.t: "Партия и Армия"
 GXC.midgame.473.d: "Недавние слушания по военному бюджету были неожиданно довольно насыщенными событиями. Неустанные вопросы Ху Ханьминя о перерасходе средств военными поставили Бай Чунси, лейтенанта и де-факто адъютанта Ли Цзунжэня, в довольно неловкое положение, до такой степени, что самому Ли пришлось вмешаться, чтобы вытащить его из затруднительного положения. Председатель всегда скептически относился к милитаризму и армии и никогда не рассматривал ее как элемент, ведущий государство. В идеале, считает он, гражданские лица должны управлять повседневными делами партии и государства. Поскольку разделение этих ролей в настоящее время недостаточно четкое, существует постоянный конфликт, который более или менее виден общественности, но эти слушания ясно показали усилившуюся позицию и влияние Ху Ханьминя внутри Гоминьдана.\n\nПоскольку партия становится все более мощной и энергичной с каждым днем, мы не должны забывать простых людей, которые сплачиваются под нашим флагом. Их вера в революцию Гоминьдана — это все для нас, и без их поддержки наше видение рухнет. Мы не можем допустить, чтобы наши жертвы были напрасными!"
 GXC.midgame.473.a: "Армия — единственный способ для нас увидеть объединение."
 GXC.midgame.473.b: "Партия — это то, что позволяет нам видеть дальше него."

 GXC.midgame.474.t: "Раскалывающееся движение"
 GXC.midgame.474.d: "Плоды неустанных усилий Ху Ханьминя и Гоминьдана явно окупаются. Наше знамя гордо реет не только в [ROOT.Capital.GetCapitalVictoryPointName], но и во многих других городах Южного Китая и гордо возвещает о триумфах нашего движения. Общее настроение среди простых людей довольно восторженное, и кажется, что наш задуманный новый Китай — это уже вопрос не «если», а «когда».\n\nОднако текущая ситуация не без проблем. Возможно, из-за чрезмерного энтузиазма, опираясь на наши прошлые достижения, все больше и больше голосов призывают к различным реформам, изнутри и извне правительства. Это поставило наше руководство в очень трудное положение, потому что эти реформы в большинстве случаев немного более радикальны, чем то, что позволило бы наше текущее видение, поэтому эти голоса остаются неудовлетворенными. В свою очередь, это привело к своевольному населению, которое трудно контролировать, наиболее типичным проявлением чего является появление нескольких самоорганизующихся революционных кружков. Эти организации полностью локальны, отделены друг от друга и все верят и доверяют партии, но сомнительно, если тенденция роста нашего революционного рвения продолжится, не принесут ли они нам больше головной боли.\n\nДругим недостатком является то, что становится все труднее и труднее добиться сотрудничества от верховного командования армии. Они, во главе с Ли Цзунжэнем, все более скептически относятся к этому росту рвения, но они мало что могут с этим сделать, за пределами структуры вооруженных сил, где в ближайшие недели ожидаются несколько реорганизаций."
 GXC.midgame.474.a: "Все идет хорошо, верно?"
 GXC.midgame.474.b: "Мы должны держаться вместе!"

 GXC.midgame.475.t: "Вершина революции"
 GXC.midgame.475.d: "На недавних заседаниях подкомитетов более чем несколько раз Ху Ханьминя и нескольких других высокопоставленных членов перекрикивали другие члены, что быстро привело к тому, что эти встречи превратились в перепалку между более радикальными лагерями. Но Ху нигде не было слышно. Принципиальный голос стареющего председателя, который когда-то пронизывал всю комнату, все чаще отсутствует на этих встречах. В политических советах он также предпочитает — довольно нехарактерно — сидеть тихо, не критикуя других и не говоря о них плохо, можно подумать, что ему все равно, что там происходит, но это далеко от истины. Вот уже несколько дней он одержим проблемой чрезмерного рвения внутри партии. Из-за крайней революционной энергии Гоминьдан начал фрагментироваться и проявляет признаки разрушения под собственным весом. Сейчас трудно определить курс или контролировать различные местные отделения партии, в основном из-за самоорганизующихся революционных кружков, которые не следуют линии партии в строгом смысле и стоят вне партии. Уже поступают сообщения о местных инцидентах, когда товарищи по партии линчевали друг друга из-за идеологических разногласий или патрулировали улицы группами, чтобы выявлять лиц, которых они воспринимали как не сочувствующих Гоминьдану.\n\nХу Ханьминь сейчас сталкивается с огромной задачей обуздания того, что никогда не следовало выпускать из-под контроля, и за это придется заплатить высокую цену. Но он должен что-то с этим сделать и сделать это быстро, прежде чем пожар революционного рвения пожрет изнутри все, чего мы достигли кровью и потом в прошлом."
 GXC.midgame.475.a: "Грядет термидор..."
 GXC.midgame.475.b: "Вы идете на следующую политическую лекцию? Нет?! Я не спрашивал..."

 ##Second Congress Chain (490-519)
 GXC.midgame.498.t: "Отомстили за Северный поход"
 GXC.midgame.498.d: "Наконец-то Пекин пал перед наступающими силами Гоминьдана. Столица Великой Цин и цитадель Юань Шикая и его потомков Бэйяна, захват города долгое время был мечтой их соперников из южного правительства. [ROOT.GetLeader] поспешил прокомментировать момент, начав с речи, обсуждающей значение города. Затем он перешел к более насущной мольбе:\n\n«...единственная миссия Национального правительства — подчиняться команде Гоминьдана и завершить Национальную революцию, провозглашенную доктором Сунем. Гоминьдан был создан самим Вечным премьером, никто не должен опрокинуть или уничтожить его. Три народных принципа были основаны самим Премьером; никто не должен искажать или подавлять их. Мы должны завершить Национальную революцию под руководством Гоминьдана Премьера и Трех народных принципов, сделав это, мы исполним невыполненные желания Премьера. Сейчас общество еще не поняло истинную природу Гоминьдана, его идеологию и его революционную политику. Революционная политика Гоминьдана вся родилась из Трех народных принципов Премьера. Политика, которая не рождена из Трех народных принципов Премьера, является контрреволюционной политикой; Партия, которая не основана на Трех народных принципах, не будет Гоминьданом... Если мы включим то, что никогда не было сказано Премьером, в политику Премьера, то мы будем предателями по отношению к нему. Мы должны сначала установить этот критерий, чтобы мы могли определить, кто является последователем Премьера, а кто предателем».\n\nОн заканчивает словами, предупреждающими партию не успокаиваться и быть начеку на предмет подрывной деятельности изнутри. С падением Пекина взгляды всего мира теперь прикованы к Гоминьдану, так как многие задаются вопросом, что будет дальше. Экономика в руинах, и поступают тревожные сообщения о значительных трудностях, возникающих в недавно победившей армии. Но, несмотря ни на что, ясно, что над Китаем встает новый день."
 GXC.midgame.498.a: "Бэйян мертв, да здравствует истинная Республика!"
 #Based off Hu Hanmin's \"Speech at the Celebration of the Establishment of Nanjing as the Capital of the Nationalist Government\" 國民政府建都南京慶祝大會演講詞

 GXC.midgame.499.t: "Два солнца в небе"
 GXC.midgame.499.d: "Когда заходила речь о Японии, Ху Ханьминь часто любил передавать пророческие слова, которые он приписывает самому доктору Суню: «действительно невыносимо, когда наши территории оккупированы и когда нас унижает друг. Но более чем невыносимо, когда младший брат, вместо того чтобы сотрудничать со старшим братом, оккупировал его территории и унизил его».\n\nВеликая битва маячит на горизонте. Более угрожающая, чем наши битвы с милитаристами. Более угрожающая, чем наши войны с Бэйяном. Более значимая, чем те, что у нас были внутри нашей партии. Действительно, Японская империя, когда-то считавшаяся любимым младшим братом китайского народа, решила пойти на нас войной, палящие лучи Восходящего солнца бросают вызов любому, кто осмелится бросить им вызов. Уже начали падать бомбы и греметь пушки, пока сверкают штыки.\n\nЭтот конфликт мы давно знали как неизбежный, несмотря на благородные усилия нескольких хороших людей с обеих сторон избежать его. Он решит судьбу не только китайского народа, но и всех народов Азии. В то время как Белое солнце выступает за истинное освобождение континента от цепей колониализма, Красное солнце сияет для жестокой пародии на паназиатизм — меняя европейский империализм на азиатский.\n\nЭто не та война, которую мы хотели. Японцы сделали свой выбор десятилетия назад, когда впервые вступили на тропу войны. Но у нас нет выбора. Мы либо победим вопреки всему, мобилизовав силу народов по всей земле для титанической борьбы и освободив их от японской агрессии. Либо мы умрем славными мучениками в их защиту."
 GXC.midgame.499.a: "И одно закатится..."

 GXC.midgame.500.t: "Второй национальный конгресс"
 GXC.midgame.500.d: "Благодаря недавним событиям в [ROOT.Capital.GetCapitalVictoryPointName] был созван чрезвычайный Национальный партийный конгресс Гоминьдана. Несмотря на короткое уведомление, ключевые светила стеклись со всей страны, возможно, осознавая срочность ситуации. Это не значит, что Конгресс идеально репрезентативен, и действительно объединение остается далеким. Но при всех его недостатках пути назад нет.\n\nХу Ханьминь является вступительным оратором, и он решает продолжить свои предыдущие предупреждения о коррупции в партии, пересказывая ее историю, подробно описывая, как предательство Чэнь Цзюнмина в 1922 году, восстание Торгового корпуса в 1924 году, дезертирство Ян Симиня и Лю Чжэньхуаня в 1925 году и, наконец, предательство социалистов на Четвертом пленуме саботировали предыдущие попытки объединения страны. Он утверждает, что синдикалисты особенно достойны осуждения, потому что, в то время как Чэнь, Ян и Лю открыто восстали, межпартийные элементы сломали партию изнутри. Это была их уловка — сфабриковать демагогические лозунги, такие как «левые», «правые», «новые левые», «новые правые», и навязать их Гоминьдану, чтобы сломить их товарищество. «Поэтому», заключает он зловеще, «каждый раз, когда революционная сила растет, мы должны запускать внутреннюю чистку. Каждый раз, когда мы запускаем внутреннюю чистку, революционная сила Гоминьдана будет одерживать победу над нашими внешними контрреволюционными врагами из числа милитаристов, империалистов и бюрократов!»\n\nНациональные партийные конгрессы должны проводиться каждые четыре года, хотя на практике они были приостановлены. Это вполне может быть последним шансом для различных грандов Гоминьдана обратиться ко всей партии перед объединением, и они хорошо осознают этот факт. Наблюдатели отчаянно пытались прочитать барометры, чтобы получить представление о преобладающих настроениях, пока ведущие наследники доктора Суня решают направление партии. Некоторые задаются вопросом, станет ли этот Конгресс концом политической борьбы Гоминьдана... или, возможно, только началом."
 GXC.midgame.500.a: "Стойкий лидер в меняющиеся времена."
 GXC.midgame.500.b: "Перемены необходимы для тяжелых времен."
 #Based off Hu Hanmin's \"Speech at the Celebration of the Establishment of Nanjing as the Capital of the Nationalist Government\" 國民政府建都南京慶祝大會演講詞

 GXC.midgame.501.t: "Проект программы национального спасения"
 GXC.midgame.501.d_sun: "Хотя ожидается, что полный Конгресс официально соберется только через две недели, неформальные политические фракции усердно работали, занимаясь политиканством и взаимной поддержкой на различных небольших официальных заседаниях комитетов и кулуарных дискуссиях. С образованием Колумбийского университета и глубокими связями с интеллектуальными, деловыми и партийными лидерами, обычно неловкий Сунь Фо чувствовал себя как дома в этой среде, агрессивно лоббируя от имени своей «Фракции реконструкции».\n\nЕго способность влиять на направление партии выросла за пределы просто его связей со старыми кликами «Наследного принца» и «Гавайев» или даже с Комиссией по делам зарубежных китайцев, которую он долгое время считал своими надежными союзниками. Он также стал уважаемым членом «Шанхайских членов комитета», клики членов Центрального исполнительного комитета, часто конфликтующих со своими коллегами-милитаристами.\n\nВсего через несколько коротких дней Сунь стал более уверен в обнародовании своего плана для Конференции. Наконец, сегодня он представил «Проект программы национального спасения», первый рабочий документ, который был представлен общественности. В нем он и другие авторы (многие из которых являются коллегами-гражданскими) выступили против дальнейшей милитаризации, требуя, чтобы 50% всех государственных доходов шли на реконструкцию. Он обвинил высокие военные расходы в том, что они были необходимым злом во время войн за объединение, но теперь, когда они замедлились, партия должна начать переход к помощи людям, иначе она падет от коррупции, которой поддался Бэйян до них.\n\nНесмотря на первоначально робкое начало, по мере того, как он говорил, он казался заряжающимся энергией, говоря с рвением перед собравшимися интеллектуалами, которых он надеялся склонить на свою сторону. Несмотря на благоприятную базу, многие не решаются поддержать его план. Хотя многие в аудитории (и, безусловно, сам Сунь, который входит в Комитет по реконструкции) могут выиграть от расширения расходов на реконструкцию, снижение внутренних боев явно больше связано с растущей угрозой Японии. Сунь, кажется, отстранен от этого факта (намеренно или нет), но его глаза сканируют толпу, чтобы увидеть, не остаются ли его мольбы не забывать полные надежд обещания его отца народу без внимания."
 GXC.midgame.501.d_nosun: "Хотя ожидается, что полный конгресс официально соберется только через две недели, неформальные политические фракции усердно работали, занимаясь политиканством и взаимной поддержкой на различных небольших официальных заседаниях комитетов и кулуарных дискуссиях. С американским формальным образованием и известными дипломатическими верительными грамотами, наряду с глубокими связями с различными членами партии, стойкий и торжествующий У Чаошу чувствовал себя как дома в этой среде осторожной диалектики и осторожных дебатов. Вместе с молодым и энергичным помощником «Наследного принца», Лян Ханьцао, дуэт агрессивно лоббировал от имени «Фракции реконструкции» своего хозяина.\n\nИх способности влиять на направление партии выросли за пределы просто их связи со старыми кликами «Наследного принца» и «Гавайев» или даже с Комиссией по делам зарубежных китайцев, которая долгое время считалась их надежными союзниками. Они стали уважаемой когортой «Шанхайских членов комитета», клики членов Центрального исполнительного комитета, часто конфликтующих со своими коллегами-милитаристами.\n\nВсего через несколько коротких дней У Чаошу взял на себя ответственность за обнародование их плана для Конференции. Наконец, сегодня он представил «Проект программы национального спасения», первый рабочий документ, который был представлен общественности. В нем он, Сунь Фо и другие авторы (многие из которых являются коллегами-гражданскими) выступили против дальнейшей милитаризации, требуя, чтобы 50% всех государственных доходов шли на реконструкцию. Он обвинил высокие военные расходы в том, что они были необходимым злом во время войн за объединение, но теперь, когда они замедлились, партия должна начать переход к помощи людям, иначе она падет от коррупции, которой поддался Бэйян до них.\n\nКак акклиматизировавшийся дипломат, У Чаошу говорил со своей обычной свирепостью перед собравшимися интеллектуалами, которых он надеялся склонить на свою сторону. Несмотря на благоприятную базу, многие не решаются поддержать его план. Хотя многие в аудитории (и, безусловно, сам У, который входит в Комитет по реконструкции) могут выиграть от расширения расходов на реконструкцию, снижение внутренних боев явно больше связано с растущей угрозой Японии. У все время осознает этот факт, но считает себя ответственным за то, чтобы определить, забыла ли толпа обещания Гофу обеспечить благосостояние людей, даже во время войны."
 GXC.midgame.501.a: "Даже на войне мы не можем забывать о нуждах людей."
 GXC.midgame.501.b: "Война надвигается, даже если засунуть голову в песок!"

 GXC.midgame.502.t: "Комитет исследований реконструкции Гуанси"
 GXC.midgame.502.d_nosun: "У Чаошу, Лян Ханьцао и их союзники были далеко не единственными, кто надеялся повлиять на направление партии во время этой Конференции. Возможно, подстегиваемый смелым обращением Реконструкции в последние несколько дней, $GXC.midgame.502.d_body$"
 GXC.midgame.502.d_sun: "Сунь Фо и его союзники были далеко не единственными, кто надеялся повлиять на направление партии во время этой Конференции. Возможно, подстегиваемый смелым обращением Сунь Фо в последние несколько дней, $GXC.midgame.502.d_body$"
 GXC.midgame.502.d_body: "Комитет исследований реконструкции Гуанси решил представить свои выводы публично при гордой поддержке Ли Цзунжэня. Комитет был создан Новой кликой Гуанси для организации плана реконструкции военного времени и сбора идей послевоенной реконструкции, задуманный как высокоуровневый инкубатор идей.\n\nИх идеи делают сильный акцент на необходимости психологически подготовить нацию к войне посредством мощных доз пропаганды на уроках граждановедения в школах, речей магистратов, показа пропагандистских фильмов и призывов к общественной поддержке войск. Комитет также подчеркнул необходимость улучшения и поддержания морального духа среди призывников, обращаясь с ними хорошо (в отличие от регулярного жестокого обращения, на котором строилось большинство китайских армий), быстро обеспечивая их едой, питьем, одеялами, униформой и москитными сетками, а также дружелюбными офицерами-ветеранами. Офицерам было рекомендовано проводить разведку, чтобы подготовить чистые места для лагеря, ограничивая марши максимум 70 ли в день.\n\nС другой стороны, они рекомендовали агрессивные меры против дезертирства, препятствуя им арестами и суровыми наказаниями. Традиционное наказание в виде тюремного заключения члена семьи на месяц было признано неадекватным, хотя практику разрешения призывникам платить за замену следует разрешить продолжить. Было запрошено дополнительное финансирование для этих мер в дополнение к дальнейшим инициативам по расширению военного производства и обучения.\n\nНесмотря на свое скромное и иногда грубое милитаристское наследие, Новая клика Гуанси оказалась весьма искусной и в политике. Они работали, чтобы впечатлить других в военном руководстве этими планами, стараясь представить себя как гордых защитников нации. Хотя неясно, было ли их решение поделиться этим планом поспешным ответом их соперникам в Шанхайском комитете, ясно то, что Ли Цзунжэнь был счастлив купаться в лучах прожекторов. Очевидно, что его амбиции выросли далеко за пределы Гуанси, хотя суровый характер его повестки дня обеспокоил многих."
 GXC.midgame.502.a: "В мрачные времена герои принимают вызов!"
 GXC.midgame.502.b: "В отчаянные времена стервятники кружат."

 GXC.midgame.503.t: "Судьба Единого фронта"
 GXC.midgame.503.d: "Несмотря на разговоры о примирении и компромиссе, левое крыло партии в значительной степени чувствовало себя маргинализированным в структуре Гоминьдана, где доминируют правые. Большинство решений принимаются за кулисами до заседаний Центрального комитета, и многие даже не обсуждаются на заседаниях Центрального комитета. Ху Ханьминь, давний заклятый соперник Ван Цзинвэя и Ляо Чжункайя, не проявлял ничего, кроме презрения к левым, делая необходимый минимум, чтобы показать единство партии.\n\nВ то время как Ли Цзунжэнь, Бай Чунси, Чэнь Цзитан и другие милитаристы часто были жестоко антисоциалистическими и репрессивными, гражданские правые всегда вызывали особый гнев у левых. Клика Сишань из-за их упорного сопротивления любому союзу с синдикалистскими державами, и Фракция реконструкции за их слабовольный характер и корыстные попытки «компромисса». Но хуже всех Ху Ханьминь, истинный и бесспорный революционер, хорошо начитанный в суньизме, марксизме и анархизме — который, несмотря на это, решил предать социалистический характер революции ради мелкой власти.\n\nНо по мере того, как в партии начинают меняться течения, и позиция Ху кажется все более осажденной его мнимыми союзниками, когда Сунь и Ли тянут в совершенно разные стороны, левые с радостью воспользовались возможностью вырваться из своей изоляции и вернуть себе некоторое влияние в партийном дискурсе. В различных речах разные деятели старой партии, как присутствующие на Конгрессе, так и находящиеся в изгнании, критиковали неспособность правых защитить нацию от империализма или обеспечить социальные реформы и экономическую помощь, которые партия должна была предоставить. Другими словами, партия под руководством Ху Ханьминя не смогла соответствовать Трем принципам.\n\nТем не менее, даже самый закоренелый левый понимает к этому моменту, что они не могут напрямую узурпировать контроль над партией к этому моменту, хотя при такой нестабильной ситуации их совокупное влияние может легко изменить траекторию конференции. Единственный вопрос заключается в том, что для них важнее: неохотно поддержать Сунь Фо и его украденную, разбавленную политику или, наконец, обеспечить свою месть Ху Ханьминю и разоблачить его лицемерие."
 GXC.midgame.503.a: "Революция создает неудачных партнеров."
 GXC.midgame.503.b: "Злоба — мощный мотиватор."

 GXC.midgame.504.t: "Призрак Директора"
 GXC.midgame.504.d: "Наследие знаменитой Военной академии Вампу сложное. Основанная Сунь Ятсеном и многими ведущими партийными деятелями, включая Ху Ханьминя, Ван Цзинвэя, Ляо Чжункайя, Дай Цзитао и других, как средство создания армии, чисто лояльной партийному государству (в отличие от непостоянной лояльности армий милитаристов), она быстро начала развивать собственную независимую идентичность. Военные люди с политическими амбициями, такие как Чан Кайши, Дэн Яньда и Чжоу Эньлай, начали создавать свою собственную базу власти в школе, связывая радикальное рвение кадетов со своими культами личности через сложные цепи лояльности, наставничества и братства.\n\nХотя много можно сказать о левых в академии, культовым элементом современного наследия академии является ее роль в порождении крайне правой ветви Гоминьдана. Продукт опеки Чана, эта «Клика Вампу» теперь возглавляется Хэ Инцинем, еще одним инструктором и ведущим заместителем Чана. Твердо радикализованные годами войны и принявшие менталитет «удара в спину» в отношении гражданского руководства партии и неудачного Северного похода, многие предпочитают тенденцию партии к сильной милитаризации.\n\nТем не менее, когда дело доходит до назревающей борьбы за власть в партии, многие испытывают сложные чувства по отношению к Ху и Ли. Когда разбитые остатки НРА отступили на свои базы в Гуйчжоу, Ли Цзунжэнь и его Седьмая армия сражались и жили бок о бок с Хэ Инцинем и его Первой армией. Это товарищество было запятнано продолжающимся соперничеством между кликами. Действительно, многие офицеры Вампу самодовольно считают себя лучше мелких милитаристов. Некоторые более мелкие фракции, возглавляемые такими людьми, как Чэнь Чэн и Чжан Цюнь, даже предпочитают фокус на реконструкции, и Чэнь, в частности, пренебрежительно писал о системе ополчения Ли.\n\nПо прошествии дней дух Чан Кайши продолжает преследовать конференцию так же, как он когда-то делал это как третий, «центристский» триумвир между Ху и Ваном. И Ли Цзунжэнь, и Ху Ханьминь были главными подозреваемыми в убийстве Чана во время Великого похода, что усложняет усилия их соответствующих сторонников по привлечению раздробленных клик Вампу. Поскольку многие ведущие генералы возражают, кажется, что не будет никакого формального окончательного решения, скорее много мелких, принятых сердцами отдельных солдат."
 GXC.midgame.504.a: "Братья по оружию держатся вместе."
 GXC.midgame.504.b: "Вампу была воспитана быть лояльной партии."

 GXC.midgame.505.t: "Председатель и Небесный король"
 GXC.midgame.505.d_nosun: "Внезапный вызов его лидерству стал чем-то вроде сюрприза для Ху Ханьминя, всегда уверенного в своей бесспорно превосходящей квалификации для Председательства. Дерзкий и упрямый, как обычно, он продолжал вести себя с обычным высокомерным видом, подчеркивая необходимость единства и напоминая своей аудитории, что уважаемый доктор Сунь уже изложил всеобъемлющий план объединения и реконструкции. Однако очевидно, что он не так беспечен, как притворяется, и Ху был замечен на встречах с «Шанхайскими членами комитета», что свидетельствует о растущей озабоченности по поводу его способности удержать власть.\n\n$GXC.midgame.505.d_body$"
 GXC.midgame.505.d_sun: "Внезапный вызов его лидерству стал чем-то вроде сюрприза для Ху Ханьминя, всегда уверенного в своей бесспорно превосходящей квалификации для Председательства. Дерзкий и упрямый, как обычно, он продолжал вести себя с обычным высокомерным видом, подчеркивая необходимость единства и напоминая своей аудитории, что уважаемый доктор Сунь уже изложил всеобъемлющий план объединения и реконструкции. Однако очевидно, что он не так беспечен, как притворяется, и Ху был замечен на встречах с Сунь Фо и «Шанхайскими членами комитета», что свидетельствует о растущей озабоченности по поводу его способности удержать власть.\n\n$GXC.midgame.505.d_body$"
 GXC.midgame.505.d_body: "Уверенность в так называемом «Наследнике доктора Суня» начала колебаться у Новой гуандунской клики, поскольку Чэнь Цзитан начинает взвешивать свои варианты. Ху и его старейшины, слишком маленькие, чтобы быть мощными сами по себе, часто зависели от гражданской клики Сишань и клики милитаристов Нового Гуандуна, чтобы быть их столпами поддержки. Последняя всегда была источником смущения для Ху, легкой мишенью для обвинений в лицемерии и источником насмешек со стороны потенциальных либеральных союзников. Теперь, когда позиция Ху осаждена генералом Ли, и Председатель надеется добавить еще одну ножку к табурету, обхаживая Сунь Фо, его существующие союзники в Гуанчжоу оказались более неохотными приходить ему на защиту.\n\nТем не менее, между кликами Гуандуна и Гуанси нет любви. Их переплетенная история вынудила к большой степени сотрудничества, но также и взаимного злоупотребления — обе вторгались и оккупировали друг друга в период милитаризма. Отношения между Чэнь Цзитаном и Ли Цзунжэнем вежливые, но холодные; оба разделяют общее желание автономии своей собственной провинции при сохранении силы нации, тяжелый милитаризм и социальную инженерию, и определенное презрение к напыщенным интеллектуалам. Среди неопределенности и противоречивых обещаний Чэнь Цзитану, «Небесному королю Юга», предстоит прочитать ситуацию в свою пользу."
 GXC.midgame.505.a: "Лучше знакомый Дьявол..."
 GXC.midgame.505.b: "Ху злоупотребил гостеприимством."

 GXC.midgame.506.t: "Когда холмы начинают дрожать"
 GXC.midgame.506.d: "Клика Западных холмов с момента своего основания всегда считала Ху Ханмина законным лидером партии, хотя такая лояльность также не является безусловной. Лидерство Ху всегда зависело от его способности защитить партию от проникновения синдикалистских сил и подрывной деятельности полевых командиров, и восхождение Ли на престол вызвало вопросы у его союзников о способности Ху выполнить свой мандат по установлению конституционного правления в Китае. В то время как лидеры фракции Западных холмов готовы сражаться за него, мало кто готов пойти ко дну вместе с ним.n\nТаким образом, некогда высокий и непоколебимый бастион Председателя начал колебаться, их высокомерный тон сменился раздражительным. Хотя мало кто верит заявлению Ли о приверженности демократическим принципам, некоторые деятели, такие как Хуан Чжилу, Се Чи и Мао Цзуцюань, начали проявлять некоторую симпатию к призыву генерала к решительной обороне перед лицом японской агрессии. Другие, такие как Чжу Чжэн и Цзоу Лу, однако, не проявили ничего, кроме презрения к неподчинению военачальника, призвав собрание сплотиться для защиты Ху Ханьмина. В центре сидят такие люди, как Линь Сен, Ли Лежжун и Чжан Цзи, которые сновали туда-сюда, пытаясь стать посредниками между враждующими правыми сторонами. Отдавая приоритет единству, они также начали спокойно оценивать ситуацию для себя.n\n По мере того, как возможности для мирного урегулирования сужаются, "гора" правого Гоминьдана, как говорят, повернулась внутрь, и его высшие лидеры собрались на закрытое заседание в частном конференц-зале после медитации в близлежащем храме. Они совещались до глубокой ночи, но их окончательное решение окажет значительное влияние на рядовых игроков".
 GXC.midgame.506.a: "Холм, на котором стоит умереть".
 GXC.midgame.506.b: "Дальше все пойдет под откос".

GXC.midgame.507.t: "Схватка в Центральном комитете"
 GXC.midgame.507.d_intro: "С ростом напряженности раскол между фракциями вышел за рамки финансовых вопросов, и наблюдатели быстро определили, что истинный разрыв происходит между теми, кто готов принять власть Ху Ханьминя, и теми, кто предпочел бы видеть у руля кого-то другого. Накануне созыва Национального съезда Центральный исполнительный комитет решил собраться в последний раз перед инаугурацией нового ЦИК.\n\nОбычно процедурный вопрос, но быстро стало очевидно, что это не будет сессия «хромой утки». В попытке утвердить свой неоспоримый авторитет Ху Ханьминь начал заседание с напряженной, но энергичной речи, защищая свой послужной список и утверждая, что революция идет по плану к объединению. Он подчеркнул свою роль преемника доктора Суня и необходимость единого лица Центрального исполнительного комитета в соответствии с принципами демократического централизма, на которых была основана партия, предупреждая об опасностях внутрипартийных разногласий."
 GXC.midgame.507.d_nosun: "$GXC.midgame.507.d_intro$\n\nЕго быстро встретил агрессивный залп, нанесенный лично Ли Цзунжэнем, который раскритиковал Ху как претенциозного шарлатана, обвинив его в поддержке У Чаошу и его призывов выделить пятьдесят процентов государственных доходов на гражданское строительство, несмотря на очевидную и серьезную опасность, грозящую нации. Ли зашел так далеко, что обвинил Ху в государственной измене, назвав его агентом социалистического, а затем и российского империализма, вороша старые раны и напоминая о явной роли Ху в Первом объединенном фронте с синдикалистами, покушении на Ляо Чжункай и последовавшем расколе партии, а также загадочном убийстве Чан Кайши во время Великого похода.\n\n$GXC.midgame.507.d_outro$"
 GXC.midgame.507.d_sun: "$GXC.midgame.507.d_intro$\n\nЕго быстро встретил агрессивный залп, нанесенный лично Ли Цзунжэнем, который раскритиковал Ху как претенциозного шарлатана, обвинив его в поддержке Сунь Фо и его призывов выделить пятьдесят процентов государственных доходов на гражданское строительство, несмотря на очевидную и серьезную опасность, грозящую нации. Ли зашел так далеко, что обвинил Ху в государственной измене, назвав его агентом социалистического, а затем и российского империализма, вороша старые раны и напоминая о явной роли Ху в Первом объединенном фронте с синдикалистами, покушении на Ляо Чжункай и последовавшем расколе партии, а также загадочном убийстве Чан Кайши во время Великого похода.\n\n$GXC.midgame.507.d_outro$"
 GXC.midgame.507.d_outro: "Когда конфликт между ними обнажился, разгневанные члены комитета обменивались оскорблениями и обвинениями в последующих речах. Когда враждебность в зале накалилась, Ху выступил с опровержением, прежде чем умолкнуть, механически выполняя свои обязанности Председателя, пока его разум начал просчитывать. Даже когда сторонники в зале кричали друг на друга, реальность такова, что дискуссия закончится только одним из двух способов: падением Ху или Ли. Хотя ни один из мужчин не прерывал зрительного контакта, за их взглядами их умы быстро пытались подсчитать предполагаемые голоса. Наконец, Ху попросил тишины, чтобы внести предложение перед ошеломленным залом."
 GXC.midgame.507.a: "Ху предлагает немедленно провести закрытое голосование Центрального исполнительного комитета Гоминьдана."
 GXC.midgame.507.b: "Ху призывает к публичному голосованию на Национальном партийном съезде Гоминьдана завтра."

 GXC.midgame.508.t: "Председатель побеждает!"
 GXC.midgame.508.d: "Несмотря на шквал атак, обрушившихся на него, Ху Ханьминь устоял и переломил ситуацию против своего соперника-милитариста. После напряженного, но все же убедительного голосования Ху Ханьминь стал сильнее, чем прежде, и при поддержке Национального съезда обеспечил, чтобы новый Центральный исполнительный комитет был укомплектован лоялистами. Другие комитеты вскоре последуют этому примеру.\n\nВ партии, известной своей горькой местью диссидентам, неудачливых претендентов часто ждет мрачная судьба — их быстро бросают союзники. Как карточный домик, блок Ли рухнул, а опоздавшие быстро вернулись в безопасные лона своих предыдущих клик, отрицая какую-либо причастность к планам Ли. Через несколько часов лишь немногие смельчаки были готовы ассоциироваться с ныне опальным генералом Ли.\n\nНовости о его неудавшемся гамбите быстро достигли Гуанси. Губернатор Хуан Шаосюн, один из его главных союзников и номинальный глава провинции, отрекся от любого знания о заговоре Ли и лично позвонил Ху Ханьминю, чтобы заверить его в лояльности провинции — вплоть до объявления Ли персоной нон грата. Хуан Сюйчу, в свою очередь, как говорят, был задержан делегацией Гуанси в [ROOT.Capital.GetCapitalVictoryPointName] по подозрению в «коррупции».\n\nЛи Цзунжэнь стоически принял свою судьбу, молчаливо сидя на обсуждениях в надлежащей военной манере Гуанси. Бай Чунси остался на его стороне, не проявляя никаких признаков того, что он может отдать приказ о военных действиях, которые могли бы составить мятеж. Единственным актом, который можно было истолковать как мольбу о милосердии, было краткое заявление Ли о его желании смиренно продолжать служить революции так, как сочтет нужным Председатель.\n\nХотя их действий недостаточно, чтобы изгнать их из партии, Председатель должен гарантировать, что они не поднимутся снова. Военный министр Сюй Чунчжи и генерал Чэнь Цзитан предложили назначить их на отдаленные военные посты — поместив Ли директором штаба Военной комиссии (бессильная должность недалеко от линии фронта), а Бая — «специальным советником военного министра» в столице, таким образом держа их далеко друг от друга и от Гуанси. Ли Вэньфань (протеже Ху) и министр иностранных дел У Чаошу вместо этого посоветовали отправить обоих за границу, возможно, в Москву и Константинополь, в качестве «военных атташе» — проверенный и верный метод устранения соперников."
 GXC.midgame.508.a: "Ли может наслаждаться командованием кухонным персоналом."
 GXC.midgame.508.b: "Надеюсь, им понравится время за границей и они многому научатся!"

 GXC.midgame.509.t: "Председатель пал!"
 GXC.midgame.509.d_body: "Залп Ли Цзунжэня оказался смертельным ударом для «китайского Кемаля» и его мечты перестроить Китай по своему образу и подобию. После незначительного, но все же решающего перевеса голосов Ху Ханьминь потерпел поражение — не сумев заручиться достаточной поддержкой для еще одного срока. Вместо того чтобы ждать и искать назначения на почетную (и, вероятно, бессильную) должность, Ху с позором ушел в отставку со всех постов, которые он занимал в партии.\n\nЛинь Сэнь, почтенный и уважаемый лидер клики Западных холмов, был инаугурирован в качестве нового Председателя в рамках более широкого компромисса, заключенного между враждующими фракциями Гоминьдана. Ожесточение в зале было настолько горьким, что Ху едва смотрел своему преемнику в глаза во время передачи полномочий, сделав краткое заявление и коротко пожав руку, отказавшись вообще признавать роль Ли Цзунжэня в событиях.\n\nНеспортивное поведение Ху, казалось, едва ли смутило Ли, который быстро перешел к действиям. По мере того как зачитывался список военных назначений, становилось все более очевидным, кто был истинным победителем ночи: Ли Цзунжэнь был приведен к присяге в качестве председателя Военной комиссии, Хуан Сюйчу выбран военным министром, а Бай Чунси назначен директором Вампу и начальником штаба Генерального штаба. Ли также был удостоен титула генералиссимуса, чести, которой не видели со старых времен военного штаба Сунь Ятсена в Гуанчжоу.\n\nДругие ведущие военные назначения были распределены как трофеи Новой клике Гуанси и их протеже, вытесняя многие соперничающие военные клики с желанных позиций. Этот наглый захват власти, похоже, оттолкнул генерала Чэнь Цзитана и Новую клику Гуандуна, которые, как было видно, кипели от злости при новостях: очевидно, что им обещали гораздо больше за их дезертирство, чем они получили. Это завершает долгую неделю предательств, поскольку проводятся новые линии фронта. В то время как Новая клика Гуанси поднимает тост за свою новообретенную гегемонию над армией, клика Западных холмов отчаянно охраняет гражданское правительство от дальнейших посягательств. Никто не ожидает, что это соглашение продлится вечно."
 GXC.midgame.509.d_sun: "Атакуемый со всех сторон и едва сумевший прийти к соглашению с Сунь Фо, $GXC.midgame.509.d_body$"
 GXC.midgame.509.d_nosun: "Атакуемый со всех сторон и едва сумевший прийти к соглашению с У Чаошу, $GXC.midgame.509.d_body$"
 GXC.midgame.509.a: "Председатель Линь сплачивает защитников демократии."
 GXC.midgame.509.b: "Генералиссимус Ли выступает на защиту Китая."

 GXC.midgame.510.t: "Интриги Второго национального съезда"
 GXC.midgame.510.d: "На фоне недавних крупных событий в стране [GXC.GetLeader] приказал провести экстренное заседание Национального партийного съезда Гоминьдана. Юридически предназначенные для регулярного проведения, эти съезды в основном были импровизированным делом на протяжении всего периода национального освобождения. Как крупным региональным лидерам, территориям под нашим контролем были выделены делегаты на уездной основе. С делегатами, представляющими все провинции Китая, это редкий шанс для политиков, чтобы их мнения были услышаны всей нацией или, по крайней мере, теми частями, которые находятся под властью Гоминьдана.\n\nВоспользовавшись этой возможностью, так называемые «Шанхайские члены комитета», коалиция фракций во главе с Сунь Фо (единственным сыном почитаемого основателя партии Сунь Ятсена), предложили амбициозную программу экономического национального восстановления, включая обязательство выделять 50% всех государственных доходов на гражданские цели. Эта «Программа национального спасения» встретила вызов со стороны конкурирующего Исследовательского комитета реконструкции Гуанси, который по указанию Ли Цзунжэня предложил решительную дальнейшую милитаризацию общества по партийной линии.\n\nХу Ханьминь, нынешний Председатель, столкнувшись с восстанием как гражданско-интеллектуального, так и военно-милитаристского крыльев партии, поспешил разрядить обстановку, хотя предварительные обсуждения показывают, что он стремился заручиться поддержкой Сунь Фо и Шанхайского комитета. Действительно, конкурирующие видения будущего революции стали большей прокси-битвой за судьбу лидерства Председателя Ху, поскольку он ищет мандат для завершения национального освобождения.\n\nСторонники обеих фракций отводили наших людей в сторону, надеясь заручиться их поддержкой. В то время как некоторые склонны поддаваться угрозам или взяткам [ROOT.Capital.GetCapitalVictoryPointName], многие смотрят на [ROOT.GetLeader], чтобы принять окончательное решение в будущем."
 GXC.midgame.510.a: "Мы будем защищать статус-кво."
 GXC.midgame.510.b: "Мы выступаем за смещение Председателя."

 GXC.midgame.511.t: "[FROM.GetAdjectiveCap] делегаты выступают за стабильность"
 GXC.midgame.511.d: "Хотя милитаристы известны своей непостоянностью, регионалистские настроения не обязательно исключают национальный патриотизм или стремление к стабильности — особенно в условиях перетягивания каната китайской эры милитаристов. Быстро уловив интриги Второго национального съезда, делегаты из [FROM.GetName] разделились в привязанностях под сильным давлением конкурирующих угроз, взяток и симпатий. В то время как было много тех, кто самостоятельно связал свою судьбу с Ху Ханьминем или против него, «центр» подчинился желаниям [FROM.GetLeader] и подчинился директивам [FROM.GetRulingParty], чтобы избежать поддержки любых внутрипартийных движений, считающихся «подрывными».\n\nГубернатор [FROM.GetLeader] лично позаботился о том, чтобы его видели пожимающим руку Председателю Ху, что является ясным заявлением о его ориентации. Тем не менее, поскольку на кону так много, Ли Цзунжэнь и его сторонники усердно работают, чтобы подорвать этот очевидный союз, надеясь, что [FROM.GetAdjectiveCap] блок расколется под тяжестью их лоббирования. С большим пространством для «продвинутых маневров» битва еще не закончена."
 GXC.midgame.511.a: "Их голоса признаны."
 GXC.midgame.511.b: "Запугать их до подчинения!"

 GXC.midgame.512.t: "[FROM.GetNameDefCap] выступает против Председателя"
 GXC.midgame.512.d: "Милитаристы всегда были непостоянным зверем, которого трудно приручить и который склонен восставать против любого хозяина, пытающегося затянуть поводок. Похоже, что естественным следствием возвышения Ху Ханьминя является отчуждение им региональных фигур, и последним, кто воспротивился власти Председателя, стал [FROM.GetLeader]. Быстро уловив интриги Второго национального съезда, делегаты из [FROM.GetName] разделились в привязанностях под сильным давлением конкурирующих угроз, взяток и симпатий. В то время как было много тех, кто самостоятельно связал свою судьбу с Ху Ханьминем или против него, «центр» тяготел к оппозиции с благословения [FROM.GetRulingParty].\n\nГубернатор [FROM.GetLeader] был замечен на публичной встрече с Ли Цзунжэнем, что является ясной демонстрацией его мнения по этому вопросу. Этот очевидный союз не следует рассматривать обязательно как тесный — милитаристы склонны менять свои привязанности, чтобы подорвать сильнейшего. Ху Ханьминь и его союзники начали агрессивную кампанию как в [ROOT.Capital.GetCapitalVictoryPointName], так и в [FROM.Capital.GetCapitalVictoryPointName], надеясь расколоть [FROM.GetADjective] блок под лавиной репрессий. С большим пространством для «агрессивных переговоров» битва еще не закончена."
 GXC.midgame.512.a: "Мы уважаем их право на мнение."
 GXC.midgame.512.b: "Подавить их голоса!"

 GXC.midgame.513.t: "Ху Ханьминь побеждает!"
 GXC.midgame.513.d: "В конце концов, множества сил, собранных против Ху Ханьминя, оказалось недостаточно, чтобы сломить хватку давнего Председателя Гоминьдана. Атаку против него возглавил генерал Ли Цзунжэнь из Гуанси, который безуспешно добивался смещения Председателя Ху с помощью различных союзников среди недовольных членов партии и военных. Теперь, когда голосование за смещение Ху провалилось, похоже, мало противников Председателя можно найти. Большинство ускользнуло из центра внимания, отрицая какое-либо участие в заговоре Новой Гуанси, оставив генерала и его немногочисленных верных сторонников ни с чем.\n\nСама Гуанси перестроилась под Ху, навсегда сломив власть Ли. Председатель и его союзники укрепили свои позиции, начав быструю контратаку, чтобы сместить всех оставшихся сомневающихся с постов на территориях, контролируемых центральным правительством. К счастью, чистка в основном пощадила отдаленные провинции, такие как наша, но это напоминание об опасностях, с которыми сталкиваются проигравшие в опасных играх за власть в Китае. Что касается Национального правительства, похоже, что они будут придерживаться направления с большим доминированием гражданских лиц, хотя с его последним соглашением с «Шанхайскими членами комитета» толка Сунь Фо и стойкой поддержкой Клики Западных холмов под руководством Цзюй Чжэна, столь явно сыгравшей роль в политическом выживании Ху, очевидно, что он еще не вышел из леса."
 GXC.midgame.513.a: "Новая Гуанси пала..."

 GXC.midgame.514.t: "Ху Ханьминь пал!"
 GXC.midgame.514.d: "В конце концов, множество сил, собранных против Ху Ханьминя, оказалось достаточно большим, чтобы сломить хватку давнего Председателя Гоминьдана. Атаку против него возглавил генерал Ли Цзунжэнь из Гуанси, который успешно добился смещения Председателя Ху с помощью различных союзников среди недовольных членов партии и военных. Теперь, благодаря успешному голосованию за смещение Ху, новое правительство под руководством так называемого «марионеточного президента» Линь Сэня было возведено, чтобы придать легитимность захвату власти Новой кликой Гуанси.\n\nХу Ханьминь подал в отставку, и его преимущественно кантонские союзники были оттеснены новой администрацией. Новая клика Гуанси начала быструю кампанию по смещению любых инакомыслящих с основных постов власти в центральном правительстве, хотя чистка в основном пощадила отдаленные провинции, такие как наша. Тем не менее, это мрачное напоминание об опасностях потери власти в Китае. Что касается Национального правительства, похоже, они будут придерживаться направления с большим военным уклоном, хотя с союзниками Линь Сэня в Клике Западных холмов, сплотившимися вокруг него, и лоялистами Ху Ханьминя, сплотившимися в Гуанчжоу, ясно, что победа Ли еще не полная."
 GXC.midgame.514.a: "Новая Гуанси побеждает..."

 ##Digesting Other Factions Events (520-539):
 GXC.midgame.520.t: "Падение левых"
 GXC.midgame.520.d: "С нашим успешным завоеванием восточного побережья Китая правое крыло Гоминьдана восстановило себя как доминирующую фракцию партии. Возрождение нашей удачи произошло за счет старых левых сил партии, которые были раздроблены на составляющие их фракции, уничтоженные как нашими победами, их поражениями, так и непрекращающейся внутренней борьбой китайских социалистов.\n\nКак бы то ни было, остановка левого импульса создала вакуум на китайской республиканской сцене. Левый центральный комитет долго гордился тем, что является «гражданским крылом партии», удобно игнорируя собственные гражданские корни Московского комитета. Сунь Фо и его Фракция реконструкции увидели всплеск энергии, работая над тем, чтобы извлечь выгоду из кончины своих старых союзников, заманивая многих умеренных в свой лагерь обещаниями амнистии или даже должностей в нашем правительстве.\n\nХотя мало кто возражал против приглашения Сунь Фо в наше правительство, многие из этих уступок ему не принадлежали, и многих, в свою очередь, раздражает то, что он действует так, как будто это так — без сомнения, попытка подкрепить свои амбиции по захвату контроля над партией в качестве компромисса между правыми и левыми. Его самыми непосредственными обращениями к центральному комитету являются подборка левоцентристских военачальников, в целом согласных с его видением — наиболее заметным из которых является Ли Цзишэнь, давний союзный Гоминьдану кантонский милитарист, оказавшийся в союзе с левыми. Он и другие, намеченные к помилованию лоббированием Суня, — это многие бывшие лидеры старой Четвертой армии Национально-революционной армии, базирующейся в Гуандуне, что укрепляет их кандидатуру в вечно базирующемся на юге движении."
 GXC.midgame.520.a: "Что ж, поздравляю, вы получили работу."
 GXC.midgame.520.b: "В списках, которые я только что подал в партию, значусь я, мои люди, Сунь Фо, но никого из вас!"

 GXC.midgame.521.t: "Ассоциация товарищей по реорганизации распадается"
 GXC.midgame.521.d: "Соперничество между Ху Ханьминем и Ван Цзинвэем трудно недооценить, их жгучая ненависть друг к другу была значительным фактором в появлении Чан Кайши и армейского центра, которые почти затмили их обоих в играх за власть до 1926 года. Осуждение Ху Вана и его покровителей из Интернационала было недвусмысленным: находясь в изгнании, он писал, что «Союз Британии — это пролетарская диктатура по названию, но на самом деле это диктатура Лейбористской партии; это диктатура Лейбористской партии по названию, но на самом деле диктатура Манна и его фракции», при этом язвительно характеризуя французский синдикализм как неуправляемый и находящийся на грани полного социального краха.\n\nСунь Фо, позиционируя себя как посредника, несмотря на свой собственный относительно недавний переход, стремился вклинить свою фракцию как бастион компромисса между враждующими кликами. Помимо обычных банальностей, Сунь Фо внушил Председателю более практическую мотивацию: необходимость заверить прогрессивных сторонников в приверженности Гоминьдана гражданскому правлению и возможной демократии. Хотя мало кто из умеренных расстроен тем, что социалисты потерпели неудачу в своем донкихотском стремлении принести насильственную классовую борьбу в Китай, многие обеспокоены вторжением военных в ряды нашей партии и хотели бы видеть компромисс.\n\nВан Цзинвэй, со своей стороны, быстро перестроился после своего поражения, что является свидетельством его гибкости и воли к выживанию как политика. Представляя себя левым националистом и демократом, он опирался на свое ранее периферийное и преимущественно интеллектуальное «умеренное» крыло Ассоциации товарищей по реорганизации (АТР) Гоминьдана, дистанцируясь от марксистской риторики «радикальной» АТР. Поступая так, он отдалил себя от экстремистов, что стоило ему его ранее в значительной степени неоспоримого лидерства над левыми, хотя, поскольку их шансы на независимое обеспечение Китая фактически мертвы, эта авантюра может быть его последним шансом на значимость."
 GXC.midgame.521.a: "Он крупная фигура в партии... к сожалению."
 GXC.midgame.521.b: "Почему Сунь Фо вообще отказался от нашего предложения в пользу их?"

 GXC.midgame.522.t: "Множество мучеников Минь-Гань"
 GXC.midgame.522.d: "Когда Северный поход потерпел крах, выжившие в катастрофической битве при Цзиньхуа ушли в подполье. Они стали ядром крупного восстания на восточном побережье Китая, кульминацией которого стало неудавшееся Шанхайское восстание 1932 года. Не испугавшись, Сун Цинлин (вдова покойного Сунь Ятсена) и генерал Дэн Яньда реорганизовали своих лоялистов во Временный комитет действий Гоминьдана (ВКД), продолжая сопротивление в зоне Цзянси-Фуцзянь, несмотря на давление со стороны все более успешных «Кампаний окружения» Лиги.\n\nИх восстание во время Войны Лиги, похоже, было их последним ура: каких бы успехов они ни достигли, сейчас они в основном истощенная сила. В отличие от Вана, они известны своей сильной идеологической приверженностью, часто осуждая нас и Вана (которого они обвиняют в провале левых) как «ложных революционеров». Несмотря на их очевидную негибкость, некоторые в их лагере, такие как Чэнь Южэнь и Сун Цзывэнь, выразили готовность заключить соглашение, работая через посредников в надежде на сделку.\n\nСунь Фо, как обычно, стремился сыграть роль «честного маклера», хотя и выбрал несколько иной угол зрения, приводя свои доводы: он утверждает, что командиры Минь-Гань являются необходимым противовесом для предотвращения переворота. Маршал Ли Лецзюнь выдвинул на первый план искренние убеждения таких людей, как Дэн Яньда, и то, как он продолжал отстаивать дело Гоминьдана по-своему.\n\nГенерал Бай Чунси резко выступил против аграрных популистов ВКД, утверждая, что Китай остается на докапиталистической стадии развития и что он желает развивать социалистическое общество, не подвергаясь потрясениям, связанным с капитализмом. Вместо этого он утверждает, что Саньминь обеспечивает одновременную политическую, национальную и экономическую революцию, которая обходит необходимость в социализме. Битва Китая тогда — это битва национальная, а не классовая, и хотя империализм должен быть остановлен силой, мир — единственный способ преодолеть бедность."
 GXC.midgame.522.a: "Много лояльности для неудавшегося революционера..."
 GXC.midgame.522.b: "Они сражались не так уж хорошо."

 GXC.midgame.523.t: "Общество Мира и парадокс анархистов"
 GXC.midgame.523.d: "Синдикализм — широкое глобальное движение, но нашел нишу даже на преимущественно аграрной китайской социалистической сцене. Хотя он широко осуждается правыми, выступая в качестве raison d'etre Клики Западных холмов и последующего раскола в партии, Ху Ханьминь лично проявил некоторую симпатию к более либертарианским, утопическим элементам движения и был одним из последних правых, порвавших с Реорганизацией. Действительно, со своей стороны, некоторые лидеры Конференции Западных холмов утверждали, что они готовы продолжать Единый фронт с Лигой китайских синдикалистов, но не желали одобрять разрешение членам ЛКС иметь членство в Гоминьдане.\n\nДо того как была сформирована КСП, а затем создана ЛКС, анархистское Общество Мира было недолго доминирующей фракцией на социалистической сцене. Их руководство включало высокопоставленных членов Гоминьдана, наиболее заметными из которых были «Четверо старейшин» Чжан Жэньцзе, У Чжихэй, Цай Юаньпэй и Ли Шицзэн, получившие французское образование анархисты-интеллектуалы, которые стали ожесточенно противостоять КСП. Ху Ханьминь выразил симпатию к этим людям и высказал возможность реабилитации Общества Мира. Это также привлекло некоторую поддержку со стороны «Токийского отделения» китайского анархистского движения, включая гранда Клики Западных холмов Чжан Цзи (сам бывший участник публикаций Общества Мира), который часто утверждал в их публикации «Естественная справедливость», что китайское конфуцианство и даосизм сделали Китай гораздо более восприимчивым к анархизму, защищая его от имперского произвола.\n\nТем не менее многие консерваторы настроены скептически. Ли Цзунжэнь поспешил выступить от их имени, ссылаясь на свое глубоко укоренившееся крестьянское консервативное происхождение и выражая «моральное возмущение» распущенным, дегенеративным образом жизни интеллектуалов-синдикалистов. В то время как Ху и другие могут рассматривать анархизм как идеалистическое конечное состояние, Ли и циники считают его не более чем абсурдной фантазией."
 GXC.midgame.523.a: "Если бы мы это осуществили, смог бы Китай по-настоящему жить?"
 GXC.midgame.523.b: "Они бы обрушили нашу революцию, не оставив выживших."

 GXC.midgame.524.t: "Неукротимая революция"
 GXC.midgame.524.d: "При всех своих недостатках левые Гоминьдана никогда не были лишены фанатичных людей, готовых пожертвовать всем ради национального дела, что вызывало жалость, отвращение, а иногда и восхищение правых. Величайшим проявлением фанатизма Вампу является Китайское общество реконструкции (КО-Р), фракция ультранационалистически настроенных сотрудников, выпускников и воспитанников, которые еще больше радикализировались во время своего изгнания за границу.\n\nНесмотря на их бурлящую ксенофобию, многие с энтузиазмом приняли европейские доктринальные разработки и оружие, интегрируя их со своей собственной воинственной смесью бусидо, партийной догмы и братства Вампу. Их радикализм оттолкнул большинство, даже обычно чрезмерно доверчивую Фракцию реконструкции, от стремления к какому-либо примирению с ними. Однако, по странному стечению обстоятельств, Ли Цзунжэнь выразил некоторое сочувствие их методам, отметив свое восхищение способностью как русских, так и синдикалистов мобилизовать массы, включая их «пропагандистов партизанского стиля», которые были готовы пойти на многое, чтобы заручиться поддержкой целых наций.\n\nРуководство КО-Р, особенно их более прагматичный лидер генерал Ху Цзуннань, выразило некоторую готовность присоединиться к нашему правительству в нашем общем стремлении изгнать иностранных захватчиков и завершить революцию Гоминьдана. Однако Ху Ханьминь не хочет становиться еще одним Керенским — зажатым между правыми и левыми экстремистами, использующими друг друга как оправдание для подрыва правительства. Мало кто осудил бы его за отказ от предложения КО-Р, но искушение всегда остается."
 GXC.midgame.524.a: "Огонь революции разгорается!"
 GXC.midgame.524.b: "Для нас это было бы крайне болезненно."

 GXC.midgame.530.t: "Наследие Генералиссимуса"
 GXC.midgame.530.d: "Не все ветви Революционной партии сохранили чувство лояльности к насмешливо названному «Московскому комитету» Ху Ханьминя. Наиболее вопиюще это касается левого крыла партии, обязанного верностью либо тем, кто участвует в борьбе Минь-Гань, либо тем, кто находится в Парижском Центральном исполнительном комитете Ван Цзинвэя. Однако и само правое крыло не едино и не целостно, учитывая появление «Новых правых», выросших из идеологической доктрины Дай Цзитао, одного из самых близких помощников и секретарей Гофу. Захватив молодых и радикальных членов партии штурмом, он сумел интегрироваться с довольно идеологически прагматичным Хэ Инцинем, наследником покойного Генералиссимуса Чан Кайши и его клики «Вампу» в Национально-революционной армии.\n\nОккупировав Гуйчжоу силой и умом в течение почти десятилетия, Гоминьдан в Гуйчжоу укомплектован не полностью представителями Новых правых, поскольку есть много лоялистов, которые остались верны изгнанному Центральному исполнительному комитету. Главным среди них является Чжу Пэйдэ и его 3-я армия НРА, который правил как главная фигура в регионе, контролируя свою хунту из 5 человек в межвоенный период. С вхождением Ли Цзунжэня и 7-й НРА в Гуанси и последующей оккупацией Гуйчжоу нашими силами было много дискуссий о судьбе партизан-правых.\n\nСторонники интеграции разрозненной партии настаивают на добросовестности, демонстрации партийного единства и необходимых навыках, предоставляемых элитой НРА. Оппоненты, главными среди которых являются старые соперники «Новых правых», такие как фракции Старейшин, Западных холмов и Реконструкции, выступают против открытия дверей тем, кого считают одними из самых опасных для своей власти в политике партии."
 GXC.midgame.530.a: "Троекратное ура партийному единству!"
 GXC.midgame.530.b: "«Новые» вряд ли могут рассчитывать на победу над «Старыми»."

 GXC.midgame.531.t: "Спичка революции"
 GXC.midgame.531.d: "Провинция, инициировавшая в конечном итоге обреченный Северный поход, долгое время была домом для многих раздоров, страданий и войн в Эру милитаристов. Созревшая для условий, способствующих появлению собственных регионалистских членов партии Гоминьдан, партийные кадры из Хунани были одними из самых преданных и одними из самых смешанных. Стойкие приверженцы партии, такие как Чэн Цянь, который долго терпел путь революционной борьбы, или любезный Тань Янькай, один из самых надежных союзников доктора Суня, обязаны провинции своей преданностью. Точно так же радикальные смутьяны, базирующиеся среди сельского населения аграрной провинции, такие как Тан Шэнчжи, оказались костяком собственной борьбы левой фракции.\n\nИ вот возникает вопрос: с оккупацией Чанша и фактическим господством над провинцией Хунань, какова будет судьба местных членов партии? Не считая левых, многие из молодых партийных кадров, и особенно Новая клика Гуанси, выступили против любых и всех соображений об истинной амнистии для Гоминьдана Хунани. Настаивая на том, что их время прошло, или иначе, что они — истощенная сила, готовая вести переговоры с Бэйяном.\n\nВ оппозиции большая часть старого членства партии, такая как Западные холмы или Старейшины, открыла каналы связи с Чэн Цянем и его 6-й армией, наряду с Тань Янькаем и его 2-й. Возможно, ручаясь за их неизменную преданность идеалам Национальной революции и их относительно аполитичное отношение во внутрипартийных делах, их призывы к интеграции прозвучали правдиво для большей часть нейтрального членства партии. Однако опасения по поводу того, что Старая гвардия будет доминировать в партийном аппарате, остаются, и их яростнее всего отстаивают Ли Цзунжэнь и Чэнь Цзитан."
 GXC.midgame.531.a: "Остались ли у старого тигра зубы?"
 GXC.midgame.531.b: "В лучшем случае — раскольники. В худшем — предатели."

 GXC.midgame.532.t: "Отчужденные северяне"
 GXC.midgame.532.d: "Весьма любопытным политическим событием Эры милитаристов является появление Гоминьцзюня. Изначально фракция в клике Чжили, лояльная Фэн Юйсяну, они медленно прокладывали свой собственный курс массового крестьянского популизма, даже если и особенно жесткого. Предав Чжили во Второй Чжили-Фэнтяньской войне, Гоминьцзюню удалось даже захватить Пекин. Однако, поскольку против них была создана коалиция бэйянских милитаристов, они были отброшены.\n\nОтступив на Северо-Запад, Фэн Юйсян ненадолго ушел в отставку, и они потеряли лояльность семей Ма в их собственном восстании. Ненавидимые местными монголами и неспособные вырваться из региона, они вступили в непростое соглашение и союз с Янь Сишанем на время межвоенного периода. Обменявшись позитивными подтверждениями с Гоминьданом, Фэн принял Уюаньскую клятву, провозгласив верность Саньминьчжуи и Партии. Хотя он и не смог предотвратить провал Северного похода, он продолжал отстаивать те немногие аспекты Гоминьдана, которые остаются на Севере.\n\nОккупировав свою базу в Шэньси, Гоминьцзюнь вышли толпами, неся белые флаги и предложения искренней преданности и лояльности партии, нации и армии. Многие из пессимистов и скептиков внутри партии поставили под сомнение искренность Фэн Юйсяна в его провозглашениях, учитывая его склонность предавать союзников в любой момент, или даже обвиняя его в том, что он союзник левых. Другие, более оптимистичные или иным образом уже связанные с ГМЦ, такие как Юй Южэнь или Клика Западных холмов, настаивали на их революционной преданности. Поздно обращенные, как бы то ни было, они отстаивали революцию по-своему и вели свою собственную революционную борьбу рука об руку с массами. Многие даже упоминали их роль в проведении Конференции Западных холмов, Гоминьдан Внутренней Монголии или их работу с Политической наукой как доказательство их заслуг."
 GXC.midgame.532.a: "Вопреки здравому смыслу, добро пожаловать на борт!"
 GXC.midgame.532.b: "Мы учли, сколько раз они предавали союзников?"

 ##LKMT Satellite Narrative (540-559)
 GXC.midgame.540.t: "Органический закон Гуандуна"
 GXC.midgame.540.d: "В недели, последовавшие за переворотом Чэнь Миншу, левые Гуандуна почувствовали свободу выйти из тени, консолидируя свою новообретенную власть посредством «Органического закона провинциального правительства Гуандуна». Этот законопроект, принятый единогласно собравшимися делегатами, направлен на упрощение провинциального управления путем устранения уровня префектуры правительства и распределения его обязанностей между провинциальным и уездными правительствами. У руля стоит Гуандунский провинциальный правительственный комитет, состоящий из одиннадцати членов, набранных из разных департаментов, пять из которых действуют как постоянный комитет.\n\nЕстественно, Чэнь Миншу был назначен губернатором Гуандуна (примечание переводчика: формально Гоминьдан использует титул председателя, а не губернатора, но во избежание чрезмерного усложнения мы будем использовать «губернатор»), используя свой контроль над армией. Тань Пиншань был назначен генеральным секретарем провинциальной администрации, вступив в союз с местными профсоюзами, которые контролируют большую часть города. Пэн Пай был признан секретарем Ассоциации фермеров Гуандуна, чтобы умиротворить сельские ополчения, бродящие по сельской местности. Замыкают постоянный комитет два чиновника, присланные на юг из [CHI.Capital.GetCapitalVictoryPointName]. Лян Ханьцао, бывший секретарь Ван Цзинвэя, а теперь близкий протеже Сунь Фо, был назначен секретарем партии Гуанчжоу, а Чэнь Яоцзу (зять Ван Цзинвэя) был назначен мэром. Очевидно, центральное правительство продолжает проявлять особый интерес к городу.\n\nПродолжается много споров о том, как долго может продлиться эта договоренность. У ведущих членов правительства Гуандуна мало общего теперь, когда Чэнь Цзитан ушел. На западе Ли Цзунжэнь и Новая клика Гуанси ревностно охраняют свою власть. Им придется действовать быстро, однако; реакционеры остаются нервными, центральное правительство ожидает результатов, а народ требует революции!"
 GXC.midgame.540.a: "Путь умеренности обеспечит построение нашей революции на прочной почве."
 GXC.midgame.540.b: "Воодушевление радикализма пробуждает героизм в каждом революционере."

 GXC.midgame.541.t: "Мятеж в Наньнине"
 GXC.midgame.541.d: "Успешное завершение Северного похода дало надежду левым по всему Китаю, что восходит новая заря. Падение Пекина, традиционной столицы нации, рассматривается как знак свержения старого порядка и вдохновило многих восстать против угнетателей по всей стране.\n\nНесколько генералов Новой клики Гуанси взяли инициативу в свои руки, организовав попытку путча в Наньнине против Ли Цзунжэня. Возглавляемые кузенами Ли Минжуем, Юй Цзоюем и Юй Цзобаем, при помощи левого активиста Вэй Бацюня, они быстро захватили контроль над Учебным корпусом Гуанси, Четвертой бригадой гвардии Гуанси и Пятой бригадой. Новая клика Гуанси бросилась давать отпор, и ожидается эскалация насилия.\n\nХотя перемирие между левыми и правыми всегда было хрупким, и сопротивление правлению Новой клики Гуанси продолжалось, особенно в сельских районах, чистая скорость и упорство восстания ошеломили даже самых преданных идеологов партии. Мало кто ожидал, что красные симпатии в провинции распространяются даже на старших офицеров. Город, столица провинции Гуанси, был переведен на военное положение, поскольку различные подразделения хаотично наводняют его. Ожидается, что инцидент, слишком крупный, чтобы его скрыть, вдохновит беспорядки по всему Лянгуану и будет иметь серьезные последствия для региона."
 GXC.midgame.541.a: "Наньнин падает перед повстанцами в решительном натиске!"
 GXC.midgame.541.b: "Социалистов отбрасывают обратно в деревню."

 GXC.midgame.542.t: "Гуанси в огне"
 GXC.midgame.542.d: "Успешное завершение Северного похода дало надежду левым по всему Китаю, что восходит новая заря. Падение Пекина, традиционной столицы нации, рассматривается как знак свержения старого порядка и вдохновило многих восстать против угнетателей по всей стране.\n\nНесколько генералов Новой клики Гуанси взяли инициативу в свои руки, организовав попытку путча в Наньнине против Ли Цзунжэня. Возглавляемые кузенами Ли Минжуем, Юй Цзоюем и Юй Цзобаем, при помощи левого активиста Вэй Бацюня, они быстро захватили контроль над Учебным корпусом Гуанси, Четвертой бригадой гвардии Гуанси и Пятой бригадой. Новая клика Гуанси бросилась давать отпор, успешно убив Ли Минжуя в бою, и насилие быстро переросло в различные восстания в Байсэ и Лунчжоу. Поскольку противоречивые приказы и зашифрованные сообщения ввергают армию Гуанси в беспорядок, вся провинция погружается в хаос.\n\nМестные члены левого комитета умоляли [CHI.GetLeader] вмешаться, но любой ответ был бы осложнен тем фактом, что [CHI.Capital.GetCapitalVictoryPointName] уже признал Ли Цзунжэня губернатором Гуанси. Отзыв признания имел бы ужасные последствия для легитимности центрального правительства, хотя поддержка его подорвала бы наш авторитет среди социалистов.\n\nПоскольку центральная армия перенапряжена, а центральная власть в Лянгуане ограничена, задача фактической поддержки этих повстанцев, вероятно, ляжет на соседнюю Гуандунскую армию. Действительно, многие предполагают, что Четвертая армия может предпринять действия по собственной инициативе, избавляя нас от какой-либо вины за результат, но потенциально выставляя [ROOT.GetLeader] бессильным. Последствия вмешательства могут быть ужасными: вовлечение Гуандуна дестабилизирует весь Лянгуан. Взятие на себя лидерства, следовательно, несет свои риски, но то же самое относится и к молчанию по этому вопросу и позволению вещам идти своим чередом."
 GXC.midgame.542.a: "Неужели никто не избавит меня от этого буйного милитариста?"
 GXC.midgame.542.b: "Сделать краткое заявление с призывом к спокойствию."

 GXC.midgame.543.t: "Заявление из [CHI.Capital.GetCapitalVictoryPointName]"
 GXC.midgame.543.intro: "Хотя некоторые надеялись, что ситуация в Гуанси будет быстро разрешена (так или иначе), факт остается фактом: кризис только усугубился. Восстания вспыхнули в Байсэ и Лунчжоу, в то время как очаги Наньнина остаются спорными. Гуанси де-факто находится в состоянии гражданской войны, и гротескные истории о насилии текут вниз по Жемчужной реке, разжигая возмущение в Гуандуне."
 GXC.midgame.543.closing: "Инструкции, четкие или нет, мало что сделали для решения того, насколько горько разделился комитет Гуандуна. Провинция также переживает значительные потрясения, вдохновленные падением Пекина, а теперь и восстаниями в Гуанси, когда многие агитаторы все чаще нацеливаются на «мелкую буржуазию», составляющую большую часть администрации Чэнь Миншу. Генерал Чэнь, в свою очередь, подозревает и Тань Пиншаня, и Пэн Пая в разжигании пламени, порождая растущее недоверие, поскольку они призывают отправить Четвертую армию на помощь повстанцам Гуанси, открыто намекая, что генерал Чэнь больше симпатизирует генералу Ли, чем народу. Тем не менее, это армия Чэня, и решение принимать ему..."
 GXC.midgame.543.d.orderedout: "$GXC.midgame.543.intro$\n\nПриказы, на которые многие надеялись и которых многие боялись, из Центрального комитета прибыли: «Четвертую армию попросили помочь в восстановлении мира в Гуанси». Короткая телеграмма, конечно, содержала и другие строки, в основном преамбульные заявления и цветистые аксиомы, которые ходят вокруг да около главной проблемы. Последствия ясны: нота сформулирована туманно, чтобы [CHI.GetLeader] не пришлось брать на себя ответственность за последствия.\n\n$GXC.midgame.543.closing$"
 GXC.midgame.543.d.orderedcalm: "$GXC.midgame.543.intro$\n\nМногие надеялись и многие боялись, что Центральный комитет прикажет вмешаться, хотя, когда телеграмма наконец прибыла, большинство было озадачено. Длинная и бессвязная, наполненная банальностями о мире, единстве и верности национальной революции, она тем не менее говорила очень мало. Никто не говорит этого вслух, но, вероятно, она сформулирована туманно, чтобы [CHI.GetLeader] мог снять с себя ответственность за последствия.\n\n$GXC.midgame.543.closing$"
 GXC.midgame.543.a: "Мы выступаем на рассвете, ради наших братьев-революционеров."
 GXC.midgame.543.b: "Мы стоим на своем, чтобы Гуандун не был ввергнут в анархию."

 GXC.midgame.544.t: "Чэнь Миншу выступает"
 GXC.midgame.544.d: "Генерал Чэнь тщательно разделил свои силы, отбирая, какие дивизии взять с собой в Гуанси, и скрупулезно выбирая те, которые он мог позволить себе (и доверить) оставить позади, чтобы стоять на страже. Через несколько дней авангард уже прошел Учжоу, держась реки для безопасности и снабжения. Разрозненные формирования Гуанси стояли перед ними, но немногие оказали какое-либо сопротивление — они скоро прибудут в Наньнин.\n\nТем не менее, нерешительность Чэня уже стоила ему дорого. Вера в него падала в Гуанчжоу, и сообщения о жестоких боях в Гуанси вызвали опасения по поводу затяжной трясины среди многих семей военных. Распространились также истории о плохом поведении Четвертой армии, клеветнические рассказы об их трусости и о том, как они грабят бедных, защищая шэньши как бандиты. Многие из этих историй вызывают схожие тропы старых армий милитаристов, фактически некоторые из них — просто пересказы старой пропаганды.\n\nВ любом случае, армия генерала Чэня движется вперед, сражаясь не только со своими противниками в Гуанси, но и битву за свою репутацию дома. Чэнь Миншу стремился поддерживать видимость, неоднократно появляясь на публике на остановках по пути и поощряя своих людей писать благоприятные письма своим друзьям и семьям домой. Но слухи делают свое дело..."
 GXC.midgame.544.a: "Честные и правдивые всегда распознают правду."
 GXC.midgame.544.b: "Ни одно доброе дело не остается безнаказанным..."

 GXC.midgame.545.t: "Заявление Тань Пиншаня"
 GXC.midgame.545.d: "Тань Пиншань, как исполняющий обязанности главы провинциального правительства, пока Чэнь Миншу находится в походе, увидел, что его позиции внезапно значительно укрепились теперь, когда основная часть Четвертой армии находится за пределами провинции. Его власть едва ли безгранична, совет по-прежнему фактически в тупике, и Чэнь пытался заставить его поклясться не принимать никаких важных решений без него, но все же Тань главный. Как долго это продлится, однако, зависит от продолжительности экспедиции в Гуанси.\n\nНе все хотят ждать и выяснять. Лидеры КСП, с которыми он вступил в союз, вместе с некоторыми радикальными членами ВКД потребовали, чтобы он воспользовался моментом. Уже многие профсоюзы начали стихийные забастовки с требованием смещения Чэнь Миншу, осуждая Хромого генерала как ревизиониста и обвиняя его в том, что он не сверг генерала Ли раньше. Поскольку оставшиеся силы безопасности едва могут их сдержать, это может быть началом конца правления Чэня.\n\nЛян Ханьцао едва избежал линчевания на партийном собрании в Гуанчжоу, а Первая леди Чэнь Бицзюнь приказала Ли Шицюню и отряду президентской охраны лично вывезти ее брата Чэнь Яоцзу из города. Звонки наводнили офис Таня. Сердитый звонок от президента с требованием порядка. Умеренные члены ВКД, лоялисты Чэнь Миншу, кадры АТР и сочувствующие ФР умоляли его призвать к спокойствию. Люди на улицах кричат о революции. Тань Пиншань поднимается на трибуну, и через мгновение он обратится к бастующим напрямую."
 GXC.midgame.545.a: "Объявить Кантонскую коммуну!"
 GXC.midgame.545.b: "Выступить против милитариста Ли Цзунжэня."

 GXC.midgame.546.t: "Пэн Пай — делатель королей"
 GXC.midgame.546.d: "Тань Пиншань — не единственный, кто выиграл от того, что армия Чэнь Миншу находится в движении. Пэн Пай мобилизовал свои крестьянские отряды, захватывая и разоружая аванпосты Четвертой армии, во многих случаях без боя. Изолированные и неукомплектованные, иногда состоящие из рудиментарной «крепости», состоящей из местного полицейского участка или большого дома, им мало что оставалось делать, кроме как отступать.\n\nСмелые шаги поощряют дальнейшие действия. Некоторые начали преследовать саму Четвертую армию, когда она движется в Гуанси, видя в Чэнь Миншу и Ли Цзунжэне птиц одного полета. Восстание в Байсэ придало большой авторитет аграрному видению Пэн Пая, но в то же время многие из его сельских лоялистов уже отправились в Гуанси по собственной инициативе, чтобы поддержать революцию там.\n\nСтолкнувшись с чрезмерным растяжением своих сил, у Пэна мало времени на принятие решения. Даже с его теперь хорошо развитыми тайными сетями связи, слово требует времени, чтобы достичь его в значительной степени децентрализованных ополчений. Отрезать и уничтожить сельские гарнизоны — это одно, но захватить настоящие опорные пункты в городах — задача не из легких. Это потребует численности, координации, возможно, некоторых членов пятой колонны. Трудно, но не невозможно для сельского ополчения. Особенно такого закаленного и сплоченного, как его.\n\nИстинная власть в Гуандуне находится в Гуанчжоу. С рассеянными армиями Чэня, хаосом в городах и революционным радикализмом в воздухе, это может быть моментом Пэна — если только он достаточно храбр, чтобы воспользоваться им!"
 GXC.midgame.546.a: "Перерезать дороги на Гуанчжоу!"
 GXC.midgame.546.b: "Сплотить поддержку повстанцев Гуанси."

 GXC.midgame.547.t: "Военный совет в Наньнине"
 GXC.midgame.547.d: "Теперь даже самым наивным очевидно, что Чэнь Миншу предали. В его штаб поступили противоречивые сообщения о масштабах хаоса, но ясно то, что во всех крупных городах вспыхнули беспорядки, а сельская местность наводнена хулиганами. Головорезы, поддерживаемые шэньши, буржуазией и гангстерами, возродились, добавляя ощущение аномии.\n\nПоскольку Чэнь Яоцзу был отозван в [CHI.Capital.GetCapitalVictoryPointName], Лян Ханьцао — последний умеренный член постоянного комитета, оставшийся в Гуандуне, его письма становятся все более безумными, поскольку он изо всех сил пытается сохранить порядок в Гуанчжоу. Он умоляет генерала Чэня как можно скорее вернуться домой, забаррикадировавшись в собственном офисе из страха за свою жизнь.\n\nПрибытие Четвертой армии в Гуанси привело к тому, что Седьмая армия Новой клики Гуанси распалась почти за ночь, и многие перешли на сторону Четвертой армии ради защиты. Это увеличило его ряды и позволило им быстро обезопасить Наньнин, хотя контроль Чэнь Миншу над провинцией еще более шаткий, чем в Гуандуне.\n\nВ шторме наметился просвет — Ли Цзунжэнь и Бай Чунси предложили сдаться Чэню, уйдя с поста губернатора и предложив свои армии, чтобы помочь Чэнь Миншу восстановить порядок. Принятие этого предложения будет расценено как великое предательство среди левых, подтверждающее их обвинения Чэнь Миншу в оппортунизме, но это может быть именно тем преимуществом, которое ему нужно, чтобы одержать победу."
 GXC.midgame.547.a: "Сделка принята."
 GXC.midgame.547.b: "Они нам не нужны."

 GXC.midgame.548.t: "Четвертое восстание в Гуанчжоу"
 GXC.midgame.548.intro: "Последние несколько недель ознаменовали еще один поворотный момент в бурной истории Лянгуана. Последствия мятежа в Наньнине против губернатора Гуанси Ли Цзунжэня вынудили соседнего губернатора Гуандуна Чэнь Миншу действовать. Генерал, крайне непопулярный среди радикальных левых, послал свои войска для восстановления порядка в Гуанси, дестабилизируя Гуандун в процессе. Почувствовав вакуум власти, радикальные союзы Гоминьдана и Синдикалистской партии под руководством Тань Пиншаня объявили всеобщую забастовку, в то время как крестьянские ополчения под руководством Пэн Пая восстали, оба надеясь добиться смещения Чэня в свою пользу. Осознав ситуацию, Чэнь Миншу поспешил домой."
 GXC.midgame.548.d: "$GXC.midgame.548.intro$\n\nЛянгуан едва избежал погружения в гражданскую войну благодаря быстрой победе Тань Пиншаня. Успешно захватив крупные города и большие поселки, городские ополчения и перешедшие на сторону повстанцев подразделения Четвертой армии сломили плохо организованные попытки осады Пэн Пая и защитили свои позиции от контратак Чэнь Миншу. В течение нескольких дней они контролировали все основные склады и арсеналы в провинции.\n\nВидя, куда дует ветер, обе соперничающие армии испарились почти за ночь. Аналогичным образом, Ван Цзинвэй и Центральный комитет расценили победу Таня как свершившийся факт, признав его губернатором Гуандуна. Поскольку Лян Ханьцао и Чэнь Яоцзу бежали из провинции, он — последний уцелевший член старого постоянного комитета. Цзо Юйбай был назначен губернатором Гуанси, но поскольку провинция лежит в руинах, он не более чем префект Таня."
 GXC.midgame.548.a: "Кто такой революционер, как не предатель, который побеждает?"
 GXC.midgame.548.b: "Поздравляю, губернатор Тань..."
 GXC.midgame.548.c: "...но не забывайте, на кого вы работаете."

 GXC.midgame.549.t: "Аграрная революция в Лянгуане"
 GXC.midgame.549.d: "$GXC.midgame.548.intro$\n\nЛянгуан едва избежал погружения в гражданскую войну благодаря быстрой победе Пэн Пая. Одержав быструю победу в сельской местности, он уверенно приказал своим людям войти в города, ожидая небольшого сопротивления. Этот смелый гамбит окупился, избежав каких-либо крупных осад, поскольку городские ополчения и перешедшие на сторону повстанцев подразделения Четвертой армии либо отказывались стрелять, либо бежали перед лицом их наступления. Командуя лояльностью как крестьян, так и рабочих, Пэн Пай триумфально вошел в Гуанчжоу во главе большой процессии.\n\nВидя, куда дует ветер, обе соперничающие армии испарились почти за ночь. Аналогичным образом, Ван Цзинвэй и Центральный комитет расценили победу Пэна как свершившийся факт, признав его губернатором Гуандуна. Поскольку Лян Ханьцао и Чэнь Яоцзу бежали из провинции, он — последний уцелевший член старого постоянного комитета. Вэй Бацюнь был назначен губернатором Гуанси, но поскольку провинция лежит в руинах, он не более чем префект Пэна."
 GXC.midgame.549.a: "Кто такой революционер, как не предатель, который побеждает?"
 GXC.midgame.549.b: "Поздравляю, губернатор Пэн..."
 GXC.midgame.549.c: "...но не забывайте, на кого вы работаете."

 GXC.midgame.550.t: "Железная армия восстанавливает порядок"
 GXC.midgame.550.d: "$GXC.midgame.548.intro$\n\nЛянгуан едва избежал погружения в гражданскую войну благодаря быстрой реакции Чэнь Миншу: несмотря на свое прозвище «Хромой генерал», он действовал довольно быстро. В ходе скоординированной серии штурмов дисциплинированная «Железная армия» смела ополчения как Пэна, так и Таня, чтобы освободить позиции лоялистов в городах. Разоружив своих врагов и арестовав ключевых зачинщиков, они смогли быстро восстановить контроль над своей провинцией.\n\nВидя, куда дует ветер, обе соперничающие армии испарились почти за ночь. Аналогичным образом, Ван Цзинвэй и Центральный комитет расценили победу Чэня как свершившийся факт, оказав поддержку действующему губернатору и приказав всем остальным отступить или столкнуться с возмездием центрального правительства. Лян Ханьцао был ранен во время боев и отправился на север для лечения, в то время как Чэнь Яоцзу еще не вернулся, оставив Чэнь Миншу последним уцелевшим членом старого постоянного комитета. Цзо Юйбай был назначен губернатором Гуанси, но поскольку провинция лежит в руинах, он не более чем префект Чэня."
 GXC.midgame.550.a: "Губернатор берет бразды правления..."
 GXC.midgame.550.b: "Вам повезло в этот раз, губернатор Чэнь..."
 GXC.midgame.550.c: "...но не забывайте, на кого вы работаете."

 GXC.midgame.551.t: "Раскол триумвирата"
 GXC.midgame.551.d: "Нежелание Чэнь Миншу вмешиваться в дела Гуанси не понравилось Гуандунскому провинциальному комитету. Когда были вызваны все одиннадцать членов, обсуждение превратилось в жаркую перепалку, поскольку его соперники обвинили его в затягивании решения вопроса. Их настояние на том, чтобы он уехал в Гуанси, быстро переросло в требование, чтобы он вообще покинул власть, причем оппоненты обвинили его в неисполнении служебных обязанностей, политическом кумовстве, финансовых махинациях и всевозможных преступлениях против революции. Тань Пиншань и Пэн Пай, главные зачинщики, официально призвали к импичменту губернатора Чэня.\n\nЛян Ханьцао, представляющий Фракцию реконструкции, выступил в защиту генерала, и Чэнь Миншу, естественно, также выступил против резолюции. Шесть непостоянных членов комитета разделились по схожим идеологическим линиям. Чэнь Яоцзу, представитель Ассоциации товарищей по реорганизации, тем временем положился на своего зятя, позвонив президенту Вану и Первой леди Чэнь Бицзюнь, чтобы узнать их мнение. В любом случае, утверждает он, именно президент по закону решает вопрос о губернаторе."
 GXC.midgame.551.a: "И теперь все, что мы можем сделать, это ждать и смотреть..."
 GXC.midgame.551.b: "Давайте напишем нашим друзьям в [CHI.Capital.GetCapitalVictoryPointName]..."
 GXC.midgame.551.c: "Конечно, все видят, что пришло время перемен..."

 GXC.midgame.552.t: "Кантонская ссора"
 GXC.midgame.552.d: "Последствия мятежа в Наньнине вызвали большое смятение в соседней провинции Гуандун. Нежелание губернатора Чэнь Миншу вмешиваться в дела Гуанси разрушило его и без того бурные отношения с соперниками, которые обвинили его в медлительности. Их настояние на том, чтобы он уехал в Гуанси, быстро переросло в требование, чтобы он вообще покинул власть, причем оппоненты официально обвинили его в неисполнении служебных обязанностей, политическом кумовстве, финансовых махинациях и всевозможных преступлениях против революции. Тань Пиншань и Пэн Пай, главные зачинщики, официально призвали к импичменту губернатора Чэня.\n\nЛян Ханьцао, представляющий Фракцию реконструкции, выступил в защиту губернатора, и Чэнь Миншу, естественно, также выступил против резолюции. Видя тупик, Чэнь Яоцзу, наш местный представитель АТР, положился на своего зятя, позвонив президенту Вану и Первой леди Чэнь Бицзюнь, чтобы узнать их мнение. В любом случае, утверждает он, именно президент по закону решает вопрос о губернаторе.\n\nСун Цинлин, Чэнь Дусю, Ли Лисань и, что удивительно, Чэнь Гунбо неохотно высказались в пользу Тань Пиншаня, сварливого лидера Южного ВКД, имеющего связи с КСП. Цай Юаньпэй, Ли Цзишэнь, Сунь Фо и Гу Мэнъюй посоветовали, что Чэнь Миншу является практическим источником стабильности и умеренности. Мало кто высказался в пользу Пэн Пая, свободолюбивого аграрного радикала, который обладает тревожным влиянием в регионе и угрожает отказать в Гуандуне как АТР, так и ВКД."
 GXC.midgame.552.a: "Тань Пиншань возьмет на себя его обязанности."
 GXC.midgame.552.b: "Пэн Пай — темная лошадка."
 GXC.midgame.552.c: "Чэнь Миншу останется на месте."

 GXC.midgame.553.t: "Тань Пиншань назначен губернатором"
 GXC.midgame.553.d: "У Таня есть друзья на высоких постах. Хотя у него были бурные отношения с Сун Цинлин и Дэн Яньда, которых он винит в том, что они вытеснили его из его же Временного комитета действий, он все еще считается одним из них. Аналогичным образом, несмотря на то, что он покинул Китайскую синдикалистскую партию в основном в плохих отношениях, национальное отделение в основном поддержало его. Говорят, что даже его бывший коллега Чэнь Гунбо заступился за него перед Ван Цзинвэем, так что, по-видимому, он не сжег все мосты. Итак, в конце концов Тань получил то, что хотел: одной телеграммой Чэнь Миншу был уволен, и Тань стал губернатором.\n\nЕсли здесь и есть какой-то урок смирения, то Тань его не усвоил. Если уж на то пошло, это укрепило его веру в то, что он единственный, кто может объединить враждующие социалистические фракции. И он не скрывал этого. Хотя Чэнь Миншу и Пэн Пай номинально остаются в правительстве, постоянный комитет был оттеснен, а власть была централизована в руках Таня вместе с новым генеральным секретарем провинции (и секретарем партии КСП Гуандуна) Дэн Чжунся. Войска были введены в Гуанси, хотя к тому времени, когда они прибыли, восстания в Байсэ и Лунчжоу оказались гораздо более мощными, чем считалось ранее. Тань назначил Юй Цзобая губернатором Гуанси, ясно дав понять, кто является истинным хозяином Лянгуана."
 GXC.midgame.553.a: "Полезно знать нужных людей."

 GXC.midgame.554.t: "Пэн Пай, темная лошадка"
 GXC.midgame.554.d: "Телеграмма стала шоком для всех. Увольнение Чэнь Миншу не было сюрпризом, учитывая обстоятельства, но никто не думал, что на его место будет назначен Пэн Пай. Даже Пэн казался искренне ошеломленным, когда он «милостиво» принял должность, что не помешало ему самодовольно смотреть на мрачных Чэня и Таня.\n\nПочему был выбран именно он, остается загадкой. Некоторые полагают, что он был компромиссным выбором среди Центрального комитета, аграрием, как и Сунь, но с подозрением относящимся к Временному комитету действий. Может быть, люди в [CHI.Capital.GetCapitalVictoryPointName] считают его более умеренным, чем он есть на самом деле, или признают его популярность, или, может быть... они даже симпатизируют ему? Возможно, Ван выбрал его именно потому, что он настолько радикален — слишком радикален, чтобы быть реальной национальной угрозой.\n\nНо национальная политика может подождать, Пэн Пай сосредоточен на настоящем. Хотя Чэнь Миншу и Тань Пиншань номинально остаются в правительстве, постоянный комитет был отодвинут на второй план, а власть была централизована в руках Пэна вместе с его главным заместителем Гу Дацунем. Войска хлынули в Гуанси, хотя к моменту их прибытия восстания в Байсэ и Лунчжоу оказались гораздо более мощными, чем считалось ранее. Пэн назначил Вэй Бацюня губернатором Гуанси, дав понять, кто является истинным хозяином Лянгуана."
 GXC.midgame.554.a: "Итак, вы хотите играть с магией?"
 #Boy you should know what you're falling for..

 GXC.midgame.555.t: "Чэнь Миншу утвержден губернатором"
 GXC.midgame.555.d: "Несмотря на согласованные усилия радикалов, Гуандун просто слишком ценен для центрального правительства, чтобы позволить его дестабилизировать. Ван Цзинвэй отправил открытое заявление, напоминающее всем, что Чэнь Миншу является губернатором и ему следует оказывать соответствующее уважение. Не называя имен, телеграмма предостерегает от предательского поведения, объявляя его противоречащим духу партийного единства. Гамбит против Чэня провалился.\n\nСообщение продолжилось болтовней о продолжающейся революции и доверии, но мало кто читал дальше. Чэнь одержал победу, и кризис сделал его имя нарицательным в Лянгуане и за его пределами, привлекая внимание к его убеждениям и позволяя ему представить себя как умеренную, доброжелательную фигуру перед лицом растущего социалистического радикализма.\n\nХромой генерал не колебался. Хотя Чэнь Миншу и Тань Пиншань номинально остаются в правительстве, постоянный комитет был отодвинут на второй план, а власть была централизована в руках Чэня вместе с его главным лейтенантом Цзян Гуаннаем. Отряд был отправлен в Гуанси, хотя к моменту его прибытия восстания в Байсэ и Лунчжоу оказались гораздо более мощными, чем считалось ранее. Чэнь назначил Юй Цзобая губернатором Гуанси, дав понять, кто является истинным хозяином Лянгуана."
 GXC.midgame.555.a: "Порядок возвращается в Лянгуан."

 GXC.midgame.556.t: "Крах Центрального правительства"
 GXC.midgame.556.d: "Центральное правительство пало, повергнув лоялистов Гоминьдана в хаос. Юго-восточные провинции всегда были довольно автономными образованиями, но даже они с трудом переживают крах, поскольку многие другие сдались нашим наступающим врагам. Большинство лидеров старого центрального правительства бежало за границу, не желая быть во власти «мелких милитаристов», а [ROOT.GetLeader], со своей стороны, попытался захватить контроль в качестве исполняющего обязанности президента.\n\nОн сталкивается с трудной задачей переломить ситуацию, поскольку его генералы с трудом интегрируют другие провинциальные подразделения, а многие деморализованные солдаты растворяются в сельской местности, оставляя «призрачные» бригады и дивизии. Экономика также ввергнута в хаос, а также растут сомнения в нашей способности выплачивать долги.\n\nПоскольку ситуация быстро становится ужасной, необходимы решительные действия, и как дом нашего движения, Гуанчжоу, как ожидается, снова понесет знамя революции. Но единство быстро распадается, поскольку пораженцы настаивают на капитуляции, а лоялистов старого центрального комитета обвиняют в саботаже наших усилий. Разгневанные слухами о потенциальном дезертирстве, социалистические повстанцы присоединились к бескомпромиссным армейским офицерам в Гуанси, чтобы организовать крупное восстание в Гуанси, угрожая свергнуть правление Ли Цзунжэня.\n\nГуандун справляется немногим лучше. Чэнь Миншу и его армейские офицеры попытались взять на себя командование новой революционной хунтой, но ему бросил вызов Тань Пиншань, который попытался отстоять свою позицию через свой союз с радикальными городскими профсоюзами. Пэн Пай и его сельские коммуны также отказались быть проигнорированными, ввергнув регион в дальнейший хаос. Кто бы ни вышел победителем, это должно произойти скоро, иначе революция обречена."
 GXC.midgame.556.a: "Чэнь Миншу сплачивает армию и сокрушает своих соперников."
 GXC.midgame.556.b: "Тань Пиншань захватывает контроль над Гуанчжоу, а вместе с ним и над Лянгуаном."
 GXC.midgame.556.c: "Пэн Пай и его повстанцы захватывают все опорные пункты в молниеносной кампании."

##RKMT Satellite Narrative (560-569)

 GXC.midgame.560.t: "Смена партнеров"
 GXC.midgame.560.d: "Битва за Кантон закончилась, как и большинство битв Гоминьдана, тупиком. Не в силах сломить хватку выскочки генерала Чэнь Цзитана над Гуанчжоу с помощью интриг генерала Чэнь Миншу, левый Центральный исполнительный комитет решил пойти на компромисс. После интенсивных переговоров между двумя фракциями, ориентированные на правых милитаристы Гоминьдана Гуандуна и Гуанси, возглавляемые Чэнь Цзитаном и Ли Цзунжэнем соответственно, были признаны официальными губернаторами провинции при [CHI.Capital.GetCapitalVictoryPointName]. Взамен оба согласились подчиниться власти президента [CHI.GetLeader] и участвовать в предстоящих национально-революционных войнах. Объединив силы Гоминьдана в Нанкине и Гуанчжоу, левых и правых, партия в целом значительно укрепилась — выигрыш для обеих сторон.\n\nСамым большим проигравшим в этой договоренности, похоже, являются Чэнь Миншу и другие левые Лянгуана. Использованная и выброшенная как неудачная, Новая 4-я армия фактически потеряла свое влияние в одночасье с приказами Центрального правительства подчиниться власти мстительного Чэнь Цзитана. Их финансирование и поставки оружия перекрыты теперь, когда Гуанчжоу «надежно» в руках Гоминьдана, участие Чэня в Комитете провинции Гуандун становится все более номинальным. Другие социалистические фракции в регионе, испытывая отвращение от того, что их продали, пошли своим путем в тщетных надеждах свергнуть новый порядок."
 GXC.midgame.560.a: "Один Чэнь вместо другого..."
 GXC.midgame.560.b: "Кантон стоит Чэня."

 GXC.midgame.561.t: "Восстание в Байсэ"
 GXC.midgame.561.d: "Успешное завершение Северного похода дало надежду левым по всему Китаю, что восходит новая заря. Падение Пекина, традиционной столицы нации, рассматривается как знак свержения старого порядка и вдохновило многих восстать против угнетателей по всей стране.\n\nАктивисты-социалисты в Гуанси перехватили инициативу, организовав вооруженные восстания по всей сельской местности в надежде оказать давление на Центральное правительство, чтобы оно вмешалось. Во главе с Вэй Бацюнем они продвинулись к Байсэ и Лунчжоу, надеясь спровоцировать более широкое восстание, но, похоже, армия Новой Гуанси устояла, усиленная союзом с Новой гуандунской кликой. Хотя среди нескольких бригад армии Гуанси вспыхнул мятеж, города Наньнин и Гуйлинь никогда не были в очень серьезной опасности благодаря быстрому развертыванию войск Гуандуна [GXC.GetLeader].\n\nДругие попытки восстаний профсоюзов КСП в Гуанчжоу и радикальных аграриев Пэн Пая в Хайлуфэне были аналогичным образом подавлены до того, как Центральное правительство Гоминьдана смогло вмешаться, положив конец надеждам социалистов на красный Лянгуан. [CHI.GetLeader] мог сделать немногое, кроме как призывать к спокойствию и единству, унизительный признак слабости. Напротив, южный альянс правых милитаристов Гоминьдана только консолидировался в пользу Гуандуна, предупреждение о грядущей напряженности."
 GXC.midgame.561.a: "Новая Гуандунская клика укрепляет свою хватку."

 GXC.midgame.562.t: "Предательство в Байсэ"
 GXC.midgame.562.d: "Успешное завершение Северного похода дало надежду левым по всему Китаю, что восходит новая заря. Падение Пекина, традиционной столицы нации, рассматривается как знак свержения старого порядка и вдохновило многих восстать против угнетателей по всей стране. Активисты-социалисты в Гуанси попытались перехватить инициативу, организовав вооруженные восстания по всей сельской местности в надежде оказать давление на Центральное правительство, чтобы оно вмешалось. Во главе с Вэй Бацюнем они продвинулись к Байсэ и Лунчжоу, надеясь спровоцировать более широкое восстание, только чтобы обнаружить, что армия Новой Гуанси устояла, усиленная союзом с Новой гуандунской кликой. Хотя среди нескольких бригад армии Гуанси вспыхнул мятеж, города Наньнин и Гуйлинь никогда не были в очень серьезной опасности.\n\nДругие попытки восстаний профсоюзов КСП в Гуанчжоу и радикальных аграриев Пэн Пая в Хайлуфэне были аналогичным образом подавлены до того, как Центральное правительство смогло вмешаться, положив конец надеждам социалистов на красный Лянгуан. [CHI.GetLeader] мог сделать немногое, кроме как призывать к спокойствию и единству, унизительный признак слабости. Напротив, южный альянс правых милитаристов Гоминьдана только консолидировался в пользу Гуандуна.\n\nСлухи о жестком подавлении социалистических повстанцев уже дошли до [CHI.Capital.GetCapitalVictoryPointName]. Наш союз с правыми губернаторами всегда вызывал пристальное внимание, и мудрость этого поступка была поставлена под сомнение, поскольку жесткие репрессии уничтожили надежды на то, что эти милитаристы когда-либо увидят свет социализма. Это ужесточило мнения против дальнейшего сотрудничества с нашими так называемыми товарищами из Правого Гоминьдана, и многие призвали ЦИК предоставить убежище лидерам повстанцев в наших рядах. Тем не менее, исход сомнительно обученных повстанцев на территорию, контролируемую центральным правительством, может означать только дальнейший беспорядок и радикализацию. Это также заставило бы нас признать нашу ошибку в работе с правыми."
 GXC.midgame.562.a: "Мы принимаем беженцев, каких можем..."
 GXC.midgame.562.b: "Мы работаем, чтобы сохранить лицо."

 GXC.midgame.563.t: "Ху Ханьминь возвращается в игру"
 GXC.midgame.563.d: "Альянс Гоминьдана Лянгуана с левыми не разрешил напряженность между ними. Слишком многое поставлено на карту, слишком много плохих воспоминаний, слишком много безжалостности, чтобы любая из сторон поддалась ложному чувству безопасности, созданному пактом. Губернатор Чэнь Цзитан, всегда опасающийся вторжений в свою базу власти, отчаянно искал способы минимизировать социалистическую мысль в Гуандуне различными способами. Центральное правительство, в свою очередь, стремилось подорвать его правление, ища возможности свергнуть беспокойное правительство и захватить его ценную провинцию.\n\nГубернатор Чэнь сегодня пошел на обострение, совершив политический переворот. Встреча губернатора с делегациями стариков вряд ли была бы новым зрелищем, если бы не тот факт, что эти люди провели большую часть последнего десятилетия в Москве. Их лидер, Ху Ханьминь — недолго бывший вторым генералиссимусом правительства Гуанчжоу и преемник Сунь Ятсена — заклятый враг Ван Цзинвэя в партии, возможно, даже больше, чем покойный маршал Чан. Его последователи включают многих гражданских правых в партии, которые разорвали ряды после Четвертого пленума и бежали за границу, вместо того чтобы участвовать в Северном походе. И похоже, что губернатор Чэнь пригласил их остаться.\n\nБолее того. Чэнь объявил Ху Ханьминя председателем Южного совета по политическим делам, якобы для координации партийных дел в регионе. Этот ответный удар выходит за рамки обычного отказа от власти [CHI.Capital.GetCapitalVictoryPointName] в местных провинциях во время обычных перепалок милитаристов — это прямой вызов [CHI.GetLeader] и претензиям левого комитета на власть над всем Китаем. Пограничное с предательством поведение правых, вероятно, приведет к столкновению партии, но пока ни одна из сторон не кажется готовой к борьбе, по крайней мере, до объединения. Пока что Сунь Фо и другие умеренные члены партии пытались успокоить напряженность, но они не будут успешны долго."
 GXC.midgame.563.a: "Добро пожаловать домой, господин Ху!"
 GXC.midgame.563.b: "Этот мятеж будет наказан очень скоро..."

 GXC.midgame.564.t: "Крах Центрального правительства"
 GXC.midgame.564.d: "Центральное правительство пало, повергнув лоялистов Гоминьдана в хаос. Юго-восточные провинции всегда были довольно автономными образованиями, но даже они с трудом переживают крах, поскольку многие другие сдались нашим наступающим врагам. Большинство лидеров старого центрального правительства бежало за границу, не желая быть во власти «мелких милитаристов», а [ROOT.GetLeader], со своей стороны, попытался захватить контроль в качестве исполняющего обязанности президента.\n\nОн сталкивается с трудной задачей переломить ситуацию, поскольку его генералы с трудом интегрируют другие провинциальные подразделения, а многие деморализованные солдаты растворяются в сельской местности, оставляя «призрачные» бригады и дивизии. Экономика также ввергнута в хаос, а также растут сомнения в нашей способности выплачивать долги.\n\nПоскольку ситуация быстро становится ужасной, необходимы решительные действия, и как дом нашего движения, Гуанчжоу, как ожидается, снова понесет знамя революции. Но единство быстро распадается, поскольку пораженцы настаивают на капитуляции, а лоялистов старого центрального комитета обвиняют в саботаже наших усилий. Разгневанные слухами о потенциальном дезертирстве, социалистические повстанцы присоединились к бескомпромиссным армейским офицерам в Гуанси, чтобы организовать крупное восстание в Гуанси в отчаянной попытке сохранить надежды красных.\n\nНо Ли Цзунжэнь и Новая клика Гуанси были непоколебимы, жестоко подавив восстание. Чэнь Цзитан и Новая гуандунская клика уперлись, очистив Гуандун от любых оставшихся левых. Они пригласили Ху Ханьминя и Московский комитет вернуться из изгнания в качестве номинального главы их нового правительства, хотя может потребоваться некоторое время (и некоторые гарантии стабильности Гуанчжоу), прежде чем они действительно ступят обратно в Китай. Две провинции, похоже, полны решимости сражаться до конца, хотя сколько это продлится, еще предстоит увидеть."
 GXC.midgame.564.a: "Правый Гоминьдан восстает снова."

 ##LKMT Political Event Chain (570-579)
 GXC.midgame.570.t: "Беспорядки в Гонконге"
 GXC.midgame.570.d: "Гоминьдан, китайская революционная и националистическая партия, пережил значительные расколы, но всегда был един в своей враждебности к иностранным миссиям. Их постоянный выбор базы в Гуанчжоу (Кантоне) породил враждебность с соседними концессиями в Гонконге и Макао. Такие инциденты, как беспорядки в Шаки и протесты Гонконг-Кантон, способствовали вмешательству Германии в Северный поход.\n\nРасширение китайских концессий, включившее множество крупных городов вдоль восточного побережья, только ухудшило антипатию китайских националистов к иностранцам, и с возвращением Гоминьдана в Гуанчжоу Гонконг снова оказался в их прицеле. Воодушевленные присутствием левого правительства провинции Гуандун, китайские синдикалисты и профсоюзные организаторы Гоминьдана скоординировали массовую всеобщую забастовку в Гонконге. Усилия по ее усмирению спровоцировали бунт, на разгон которого уйдут дни. Похоже, что пока существует Красный Китай, концессии останутся геополитической горячей точкой."
 GXC.midgame.570.a: "Им это не сойдет с рук!"
 GXC.midgame.570.b: "Нация — это всё."
 GXC.midgame.570.c: "Держитесь подальше от нашей территории!"
 GXC.midgame.570.e: "Обуздать протесты и предложить оплатить ущерб."

 GXC.midgame.571.t: "Как Железная армия получила свое имя"
 #NOTE: Some significant alt history here since the Iron Army actually got its name from the Siege of Wuchang
 GXC.midgame.571.d: "Гуандунская армия была основана как основная сила Правительства защиты конституции в 1917 году. Сунь Ятсен назначил Чэнь Цзюнмина командующим Армии Гуандун-Фуцзянь, которая отбила соперничающих южных милитаристов, прежде чем обратить свой взор на север. Предательство Чэнь Цзюнмина не умалило ее значимости, и она была реорганизована в Четвертую армию Национально-революционной армии в 1925 году.\n\nТеперь под командованием Ли Цзишэня, последствия покушения на Ляо Чжункайя привели к тому, что 4-я армия стала противовесом влиянию правых в армии. Маршируя в Хунань с другими армиями НРА, она изначально должна была продолжить с ними путь в Учан, но в конечном итоге была оставлена в резерве, поскольку геополитическая напряженность в дельте Жемчужной реки обострилась. Худшее произошло в октябре 1926 года, когда немецкие войска атаковали Гуанчжоу, заставив их вести кровопролитные арьергардные бои. Несмотря на неравенство сил, Четвертая армия смогла сдерживать наступление мирового гегемона достаточно долго, чтобы прикрыть эвакуацию ЦИК из города.\n\nЧтобы отметить их достижение, патриотически настроенные члены местного шэньши и класса торговцев заказали железный щит в их поддержку с надписью: «Кровь мучеников — цветок доктрины. Великие достижения Четвертой армии далеко идущие. Умейте соблюдать дисциплину и не хвастайтесь своими способностями. Если вы можете любить народ, вы можете служить стране. Побуждать фронт к битве так же сильно, как железо. Бремя революции подобно железному плечу. Функция подобна железу, и народ полагается на нее. Пусть ваша жизнь будет долгой, как железо, и продлится миллиарды лет».\n\nЧетвертая армия в конечном итоге была развернута в Цзиньхуа, где они вели ожесточенную последнюю оборону. Впоследствии ее остатки стали костяком восстания Миньгань, а видные командиры заняли ключевые роли в сопротивлении. Легенда о «Железной армии» продолжает расти, даже когда она борется с тем, что именно означает ее имя."
 GXC.midgame.571.a: "Мы идем на фронт с сердцами из железа!"
 GXC.midgame.571.b: "Люди, которых мы любим и которым служим, полагаются на нас как на железо."
 GXC.midgame.571.c: "Мы несем бремя революции железным плечом."

 GXC.midgame.572.t: "Первоначальный комитет действий"
 GXC.midgame.572.d: "Через некоторое время после краха Северного похода небольшая группа разочарованных лидеров Гоминьдана оказалась в Шанхае, балансируя на грани между изгнанием и восстанием. Вытесненный из Китайской синдикалистской партии, Тань Пиншань объединился с другими членами Гоминьдана, чтобы разработать планы новой «Китайской революционной партии», свободной от обоих. Не найдя особой военной поддержки, он не видел другого выбора, кроме как пригласить таких фигур, как Дэн Яньда, стать ее председателем.\n\nПровал Шанхайского восстания 1932 года ослабил китайское социалистическое движение и заставил их отступить на свои оставшиеся базы в Миньгане. Сунь Цинлин, Ли Цзишэнь и Дэн Яньда официально опубликовали «Декларацию революционному народу в Китае и мире», объявив о создании Временного комитета действий Гоминьдана на основе кружков Китайской революционной партии. Это фактически провозгласило независимое руководство Миньганем от изгнанного Парижского комитета, но избежало отказа от ярлыка Гоминьдана мужа Сунь. При Сунь и Дэне Тань вскоре оказался оттесненным от своей собственной партии.\n\nОзлобленный, Тань кипел, пока наконец не получил второй шанс с захватом власти социалистами в Гуандуне. Под руководством Таня ветви ВКД в Миньгане и Гуандуне быстро разошлись. Северная фракция ВКД имеет преимущественно аграрную и военную народную базу, рассчитывая на крестьянские правительства и ВКДВМА (Военный комитет действий) для влияния. Южная фракция тяготеет к городской и интеллектуальной базе, стремясь к поддержке профсоюзов и «классических социалистических» кадров. Тань сохраняет обиду, особенно потому, что Дэн и Сунь остаются более популярными среди народа и имеют лучшие связи среди элиты, чем он. Он все еще мечтает о третьей партии, независимой от недостатков Гоминьдана и КСП, но ему предстоит пройти долгий путь, если он хочет увидеть это."
 GXC.midgame.572.a: "Нам нужно сделать наше послание более приемлемым для образованных кругов."
 GXC.midgame.572.b: "Как и наши братья из Миньганя, мы не должны забывать о крестьянах."
 GXC.midgame.572.c: "Как единое целое, наше третье движение принесет мировую революцию в Китай!"

 GXC.midgame.573.t: "Совет Хайфэна"
 GXC.midgame.573.d: "Пэн Пай начал как молодой директор Бюро образования уезда Хайфэн при поддержке Чэнь Цзюнмина и местного студенчества. Уже вдохновленный Французской революцией, он начал конфликтовать со своими собратьями-шэньши, прежде чем был уволен за организацию празднования Первомая. Не обескураженный, он основал Всеобщую ассоциацию фермеров уезда Хайфэн.\n\nЭта ассоциация с далеко идущей социальной политикой резко выросла в популярности. Предоставляя медицинскую помощь, сельскохозяйственные консультации, личную защиту и посредничество в спорах о браке, долгах и владении землей — ее всеобъемлющий характер означал, что она легко могла стать основой параллельного правительства. Распространяя наглядные брошюры и устную пропаганду для неграмотных крестьян, а также защищая фермеров в суде по делам о задолженности по аренде в нескольких громких делах, к середине 1920-х годов она представляла более ста тысяч фермеров в Хайфэне (почти четверть населения) и быстро распространилась по всему Гуандуну.\n\nСеверный поход ограничил амбиции Пэн Пая его родной базой Хайфэн, и его (переименованная) Ассоциация фермеров Гуандуна отделилась от основного Гоминьдана. Несмотря на разрыв большинства связей после Шанхайского восстания 1932 года, возвращение Гоминьдана вернуло их в лоно, но ясно, что к этому моменту они де-факто являются отдельными движениями.\n\nПэн и его лейтенанты оставили свои возможности открытыми. Возвращение в основное социалистическое движение было бы благородным поступком в соответствии с линией партии, но доверить им защиту наших интересов — трудная задача. Были разговоры о расширении нашего охвата на городской пролетариат, поскольку, несомненно, крестьяне и рабочие не так уж и отличаются, но до сих пор у них было мало влияния в городах из-за КСП. Как бы то ни было, Хайфэн остается мощной базой операций и, вероятно, продолжит оставаться таковой в ближайшем будущем."
 GXC.midgame.573.a: "Гоминьдан, КСП и АФГ должны объединиться!"
 GXC.midgame.573.b: "Сражаясь за крестьян, мы прокладываем свой собственный путь!"
 GXC.midgame.573.c: "Мы должны прийти в города ради рабочих!"

 GXC.midgame.574.t: "«Хороший» милитарист Гуанси"
 GXC.midgame.574.d: "С самого начала Гоминьдан брал под свое крыло различных «патриотичных» милитаристов, игнорируя прошлые правые наклонности и заметая их злоупотребления против народа под ковер ради революционного прагматизма. В свою очередь, ожидается, что эти милитаристы на словах поддержат идеалы Трех принципов и подчинятся центральному комитету.\n\nНа практике это непростое соглашение, и нигде это не видно так явно, как в Лянгуане. Хотя Ли Цзунжэнь и Новая клика Гуанси заметно переориентировали свою политическую идентичность с регионального провинциализма на принятие доктора Суня, они остаются обиженными на доминирование Гуандуна в отношениях. Теперь, когда левые правят Гуанчжоу, напряженность высока. Множество левых в Гуанси вышли из тени, формируя свои собственные профсоюзы, партийные отделения и учебные группы, независимые от провинциального комитета. Ходят слухи, что даже некоторые члены верховного командования попали под их влияние. И наоборот, Ли обвиняют в укрывательстве правых, бегущих от преследований из Гуанчжоу, и поддержании контактов с кантонской элитой, которая надеется, что левое правление — это всего лишь еще одна проходящая фаза в истории Гуанчжоу.\n\nЕстественно, эти жалобы были переданы губернатору Чэнь Миншу для разбирательства. Многие в нашем собственном провинциальном комитете призвали его занять более жесткую позицию в отношении губернатора Ли, используя контроль Гуандуна над торговлей по Жемчужной реке, чтобы подтолкнуть Гуанси к более «Ортодоксальной» линии."
 GXC.midgame.574.a: "Чэнь Миншу работает над смягчением напряженности."
 GXC.midgame.574.b: "Радикальные активисты настаивают на дальнейших изменениях."

 GXC.midgame.575.t: "Клика Наследного принца"
 GXC.midgame.575.d: "Давным-давно, когда Гуанчжоу был главным оплотом Гоминьдана, свежий выпускник Колумбийского университета и единственный сын Вечного премьера был назначен мэром города. Вокруг этого (пренебрежительно названного) «Наследного принца» был круг молодых, либеральных и получивших западное образование технократов, который стал известен как «Клика Наследного принца». Многие из них остались с ним на протяжении многих лет, объединившись в свое современное воплощение как «Фракция реконструкции».\n\nЛян Ханьцао, одновременно занимая множество престижных национальных должностей (синекуры такого рода — обычная практика в партийном государстве), мигрировал на юг со свитой на буксире, без сомнения, по приказу Сунь Фо, чтобы восстановить их южную базу власти. Заняв должность партийного секретаря Гоминьдана в Гуанчжоу, он поставил себе целью ухаживать за местным интеллектуальным и деловым классом, быстро схлестнувшись с гораздо более радикальным партийным секретарем КСП Гуандуна Дэн Чжунся.\n\nПосле нескольких стычек за сравнительно незначительные должности в Гуанчжоу и устав от торгов, Лян продвинулся вперед в своих усилиях по назначению главных союзников Сунь Фо на ключевые руководящие должности в администрации Гуандуна, включая имеющего хорошие связи У Чаошу, банкира Хуан Ханьляна и политически приемлемого Ван Куньлуня. КСП при поддержке Тань Пиншаня решительно выступила за блокирование этих назначений, угрожая дальнейшими беспорядками на улицах."
 GXC.midgame.575.a: "Провинциальный совет утверждает этих назначенцев, чтобы успокоить умеренных."
 GXC.midgame.575.b: "Провинциальный совет отклоняет этих назначенцев, чтобы поддержать единый фронт."

 GXC.midgame.576.t: "Политика синдикализма в Гуандуне"
 GXC.midgame.576.d: "Гуанчжоу всегда был одним из двух центров китайского синдикализма, и теперь, с новым левым правительством, он намного безопаснее Шанхая. Под поверхностью синдикалистская сцена в Гуандуне может быть довольно сложной. Первоначальная Лига китайских синдикалистов была движением широкого охвата, состоящим из любого социалиста, которого КСП могла найти, который не хотел быть в первую очередь связанным с Гоминьданом. Какую идентичность они должны принять за пределами этого, всегда было спорным вопросом.\n\nГлавным лидером КСП Гуандуна является Дэн Чжунся. Дэн — известный организатор труда и один из основателей ЛКС и Всекитайской федерации профсоюзов. Это позволило ему сыграть важную роль в забастовке Кантон-Гонконг вместе с Су Чжаочжэном. Су — видный лидер Союза моряков, следующий по статусу после Дэна в КСП Гуандуна. Оба в целом придерживаются «Ортодоксальной» линии КСП, хотя связи с национальным отделением в Нанкине стали напряженными. Тань Пиншань приводил доводы в пользу того, чтобы они отделились вместе с ним, чтобы сформировать независимое синдикалистское движение.\n\nРешительно против этого предложения выступает Янь Ханьчжан, агрессивно ставящий во главу угла вооруженное восстание в городах под руководством рабочих и распространение революции на всю страну. Этот ультра-городской подход вызвал критику за его радикализм, негибкость и сомнительную эффективность. Многие говорят, что эта тактика сыграла только на руку правым, которые сплотились против них и сделали Гоминьдан более приемлемым.\n\nВ стороне местные радикалы КСП нашли своего лидера в лице Чжан Тайлэйя. Один из нескольких молодых китайских синдикалистов, которые отправились в Европу вместе с Чэнь Шаоюем и Цюй Цюбо, Чжан Тайлэй командует относительно маргинальными последователями. Радикалы считают, что социальное освобождение дает право всем пролетариям, даже бандитам и ворам, восстать и тем самым изгнать империалистов и реакционеров из Гуанчжоу, чтобы возглавить авангард истинной рабочей коммуны."
 GXC.midgame.576.a: "Линия Ли Лисаня должна быть обеспечена, черт с ними, с последствиями."
 GXC.midgame.576.b: "Наше национальное руководство потерпело неудачу, но мольбы Таня кажутся многообещающими."
 GXC.midgame.576.c: "Все эти разговоры лишь скрывают отсутствие независимых действий с нашей стороны!"

 GXC.midgame.577.t: "Реорганизованные товарищи Гуандуна"
 GXC.midgame.577.d: "Чэнь Яоцзу приехал на юг из [CHI.Capital.GetCapitalVictoryPointName], чтобы править как новый мэр Гуанчжоу. Брат первой леди Чэнь Бицзюнь, очевидный непотизм в его назначении скрывает тот факт, что он не дурак. Как и его сестра, он родился в богатой малайзийской китайской купеческой семье, что позволило ему получить образование в Гуандуне и Японии. У него долгая история работы в администрациях Гоминьдана в городе — действительно, Ваны и Ассоциация товарищей по реорганизации в целом изначально базировались в Кантоне.\n\nИ, возможно, именно поэтому его истинный приказ от сестры, которая часто навещает его, — выкроить кантонское владение, лояльное Ван Цзинвэю. Чэнь Бицзюнь — расчетливая женщина и сила сама по себе, прекрасно осознающая, что смещение центра власти партии в Нанкин оставило большой вакуум власти в Гуанчжоу. Нелояльность, по ее мнению, процветает, и она полна решимости не потерять Гуанчжоу.\n\nК сожалению для нее, Чэнь Яоцзу не так волевой и хитер, как она, и, несмотря на его высокое положение, его контроль над городом, не говоря уже о провинции, ограничен частями гражданской администрации и партийного аппарата. Это сделало его фактически зависимым от Чэнь Миншу и его сестры, его усилия еще больше осложняются постоянными разногласиями в лагере Вана на национальном уровне. Фракция Резиденции Чэнь Бицзюнь (пренебрежительно переводимая как Дворец) часто находится в противоречии с Ассоциацией товарищей по реорганизации Чэнь Гунбо. Чэнь Яоцзу — один из немногих членов Фракции Резиденции, официально вступивших в АТР, что отражает их отчаяние в восстановлении плацдарма в городе, который они когда-то называли домом. Несмотря на его очевидную слабость, его решения могут оказаться решающими в будущем."
 GXC.midgame.577.a: "Нас превзошли в вооружении, в людях, в численности и в планировании!"
 GXC.midgame.577.b: "Нам нужны смелые шаги АТР, если мы хотим победить!"
 GXC.midgame.577.c: "Нам нужно убедить больше людей сдерживать предателей."

 ##LKMT Domestic Affairs (580-589)

 GXC.midgame.580.t: "Тайные общества Гуандуна"
 GXC.midgame.580.d: "В провинции, известной тем, что в ней за последние несколько десятилетий размещалось несколько революционных правительств, неудивительно, что тайные общества повсеместны. Для Гоминьдана самым спорным было Хунмэнь (буквально переводится как «Огромная семья»). Хунмэнь, возможно, имели свои корни в лоялистах Мин после завоевания Китая Цин в 1700-х годах, задуманные как форма взаимопомощи для южных китайцев. Вскоре это превратилось во взаимную защиту, когда власти Цин запретили их, побудив многих стать революционерами.\n\nБратский, тайный союз небольших групп, Хунмэнь сравнивали с масонами в Европе. Отделения были созданы за границей в XVIII веке, и они стали основным вкладчиком в Тунмэнхой Сунь Ятсена.\n\nИх деятельность после революции 1911 года была менее похвальной в кругах Гоминьдана. Оставшись без цели после победы над Цин, Хунмэнь разделились на фракции. Некоторые стремились свергнуть колониальное правление в Гонконге, в то время как многие крупные в конечном итоге поддержали Чэнь Цзюнмина и его гуандунскую армию. Другие стали связаны с организованной преступностью и были названы британскими властями «триадами», хотя границы часто размываются, когда дело доходит до революций. Хунмэнь остаются спорными внутри партии, некоторые выражают им больше сочувствия, в то время как другие призывают к жесткому подавлению их деятельности."
 GXC.midgame.580.a: "Их яростные революционные действия заслуживают похвалы, а не позора!"
 GXC.midgame.580.b: "Ценные, какими они когда-то были, они не более чем бандиты."

 GXC.midgame.581.t: "Народ ли"
 GXC.midgame.581.d: "Народ ли, также часто называемый народом лай, — это этническая группа, населяющая южный Китай и северный Вьетнам, с большой концентрацией на острове Цюнъя. Традиционно анимисты, легенды ли гласят, что каждый из их кланов происходит от брака женщины и божественного животного. Обладая уникальным языком и культурой, [GXC.GetLeader] и другие лидеры правительства Лянгуана поставили перед собой задачу посетить в этом году Фестиваль быков, крупное событие весны. Быки играют важную роль в экономической жизни ли, поэтому на восьмой день третьего лунного месяца ли почитают их, чтобы обеспечить хороший урожай в этом году.\n\nУченые предполагают, что ли возникли на полуострове Лэйчжоу, прежде чем мигрировать на юг в Цюнъя и большую часть побережья. Растущая миграция ханьцев в 1700-х годах привела к возникновению напряженности, поскольку династия Сун централизовала власть и пыталась ассимилировать их, хотя многие остались в относительно бедных горных районах. Это могло способствовать их поддержке социалистических движений (хотя и немногих сепаратистских движений), что сделало их мишенями жестких репрессий со стороны реакционных сил. Их деревни несколько раз разрушались, а еда кралась оккупационными силами. Тем не менее, с победой левых в Лянгуане их лояльность была вознаграждена. Центральное правительство одобрило создание нескольких автономных уездов на острове. Можно надеяться, что это позитивный знак для будущих отношений."
 GXC.midgame.581.a: "Пусть все в Китае будут вознаграждены так же."
 GXC.midgame.581.b: "Ах, но сепаратистские движения?"

 GXC.midgame.582.t: "Ма Большебородый"
 GXC.midgame.582.d: "Любопытно, что в дискурсе базы операций Гоминьдана в Лянгуане появилась новая учебная программа. От институтов подготовки крестьян вдоль Жемчужной реки до собраний рабочих в глубине промышленного сектора Гуанчжоу — политические инструкторы с радостью учат своих амбициозных учеников читать труды великого «Ма Большебородого» и его товарища Энгельса в их крестовом походе против капитализма.\n\nПортреты Маркса украшают каждый класс, и не только Маркса, но и видных социалистов, таких как Джек Рид, Владимир Ленин, Том Манн и Жан Жиромоский, часто упоминаются быстро говорящими партийными комиссарами и инструкторами. Для многих крестьян и городских пролетариев Гуандуна последствия «Черного понедельника» действительно, казалось, оправдывали слова Маркса о гибели капитализма. Политические инструкторы часто осуждают местную сельскую элиту и капиталистов Гуандуна, таких как Торговый корпус, — как оправдание освободительной войны, необходимой не только против империалистов, но и против их презренных порождений капитализма.\n\nВ южном Китае, где мало кто может отрастить такую впечатляющую растительность на лице, как уважаемый политический мыслитель, эти учения и ежедневные лекции понравились тем из региона Ганьсу, кто проживает в революционном Лянгуане. Те, кто служил под началом клики Ма, выразили удивительный энтузиазм по поводу великого революционера, считая себя учениками еще одного члена всегда большой семьи «Ма»."
 GXC.midgame.582.a: "Посоветуйте исправить учебную программу, что за чушь они проповедуют?"
 GXC.midgame.582.b: "Все услышат хвалу великому «Ма Большебородому»!"

 GXC.midgame.583.t: "Маленькие красные дьяволята"
 GXC.midgame.583.d: "По мере того как иностранные журналисты и корреспонденты пересекают новое революционное правительство, базирующееся в Лянгуане, многие иностранцы приходят к пониманию, что китайская социалистическая революция проявляется не в большей части общества, чем в молодых мальчиках и девочках в крестьянских коммунах, таких как Кампания Хайлуфэн. Партийная пропаганда часто восхваляет усилия молодых, которые готовы пожертвовать своей невинностью и детством ради национальной революции.\n\nПрозванные «Маленькими красными дьяволятами», революционное правительство в Гуанчжоу отдало приоритет поощрению плодотворного политического образования, охватывающего такие темы, как Три народных принципа и Социализм. С раннего возраста детей в организованных партией коммунах, таких как Коммуна Хайлуфэн, поощряют проходить базовую военную подготовку и политическое образование, надеясь, что они станут послушным будущим авангардом Китайской национальной и пролетарской революции. Некоторые из этих детей сами являются сиротами, потерявшими отцов и матерей в результате жестоких реакционных репрессий, без дома, который мог бы их принять — они были найдены и завербованы в растущий партийный аппарат для воспитания молодежи Китая. Для многих из них участие в Национально-революционной армии и национальной революции представляет возможность получить миску риса, шанс вырваться из нищеты и все более близкую мечту о реализации социализма в Китае."
 GXC.midgame.583.a: "Закаленные в сердцах, наши Дьяволята никогда не плачут!"
 GXC.midgame.583.b: "Пусть молодежь наслаждается детством, пожалуйста."
 GXC.midgame.583.c: "Политическая подготовка необходима, но милитаризация?"

 GXC.midgame.584.t: "Живые газеты"
 GXC.midgame.584.d: "Иностранные корреспонденты из стран Третьего Интернационала много писали о представлении «живых газет» в рамках Националистической революции, проходящей в настоящее время в Лянгуане. Они с живым энтузиазмом описывают, что народ Китая, по-видимому, расширяет свои идеи и понятия классового сознания и что Китай, несмотря на то, что является довольно доиндустриальным обществом, переживает возрождение и революцию, сродни той, что была в Патагонском рабочем фронте и революции в Испании.\n\nПоскольку большинство сельского крестьянства Лянгуана все еще не умеет читать и писать, политические инструкторы прибегли к организации собраний для обучения сложным вопросам, таким как классовый конфликт и империализм. Члены шанхайских актерских трупп с сильными социалистическими наклонностями прибыли в провинцию, чтобы присоединиться к продолжающимся усилиям по национальной революции, представляя пьесы как часть революционного образования и учебной программы.\n\nКак отмечают корреспонденты, эти пьесы ничто по сравнению с великими операми, проводимыми в Москве и Вене, но тем не менее вовлекают само крестьянство, которое взяло на себя создание самодельных костюмов для таких персонажей, как У Пэйфу, злые капиталисты и другие дегенеративные элементы западного империализма. Общие темы этих пьес включают истории о том, как армии милитаристов или помещики угнетают чистый и невинный сельский и городской пролетариат, прежде чем быть покоренными праведной и похвальной храбростью революционеров и Национально-революционной армии. Часто изображаются битвы, особенно многочисленные стычки Восстания Миньгань и Войны Лиги, где дети используют метлы в качестве реквизита для винтовок."
 GXC.midgame.584.a: "Китай — истинный признак независимого революционного духа!"
 GXC.midgame.584.b: "Неграмотность наших крестьян не заслуживает аплодисментов..."

 GXC.midgame.585.t: "Новый человек"
 GXC.midgame.585.d: "С революцией в полном разгаре, хотя партия говорит о революции масс и коллективной силе, они вряд ли забывают об индивидууме. Действительно, вдохновленный утопическими идеалами «Новых людей» и «Новых женщин», а также социальным дарвинизмом, изложенным доктором Сунем, последний порыв правительства [GXC.GetAdjective] был направлен на поощрение индивидуального размышления и развития для создания лучшей породы китайских революционеров.\n\nИспользуя лозунги, заимствованные у более ранних групп, таких как YMCA, это движение стремится создать «Образцовых граждан», которые являются пиком физического развития, продуктивными и трудолюбивыми экспертами в своей области, самоотверженными по характеру и, что, пожалуй, самое важное, хорошо образованными в социалистической теории. Параллельное движение за «Реформу мысли» было навязано интеллектуальным секторам, поскольку ведущие китайские социалисты призывают их перестроить свой образ мышления, отойдя от буржуазного вырождения, которое отметило предыдущую эпоху, и переориентироваться на грядущее социалистическое будущее.\n\nМотивы этих усилий довольно очевидны. С надвигающимися войнами и иностранной помощью за тысячи миль, национальная революция потребует чрезвычайных усилий как в борьбе, так и в производстве для победы. С другой стороны, для этого есть значительные идеологические подоплеки. Многие члены партии являются социал-дарвинистами, считающими, что слабые люди и слабые народы вскоре будут уничтожены, и подчеркивание физической и умственной стойкости своих последователей — это способ утверждения морального превосходства в противовес популярному образу коррумпированных, неумелых и наркозависимых солдат-милитаристов. Аналогично, идея «Нового человека», идущая рука об руку с грядущей новой эрой цивилизации, в неизбежность которой верят многие социалисты, кажется естественной, иногда принимая почти религиозные оттенки. Хотя общественный прием может быть прохладным, от верных партии ожидается стремление к здоровому духу и здоровому телу, чтобы стать здоровыми революционерами."
 GXC.midgame.585.a: "Только сильные могут принести социализм."
 GXC.midgame.585.b: "Чистая безжалостность? У вас нет сердца?"
 GXC.midgame.585.c: "Реформа мысли? Вы серьезно?"

 ##LKMT Satellite Affairs (590-599)
 GXC.midgame.590.t: "Гуанчжоу, революционный форпост"
 GXC.midgame.590.d: "Центральное правительство в [CHI.Capital.GetCapitalVictoryPointName] приказало восстановить свое министерство иностранных дел под руководством Чэнь Южэнь. Хотя претензии националистического правительства на Китай остаются лишь квази-признанными даже в Интернационале, это все же важный шаг вперед в построении нового правительства для нации. Вокруг Гоминьдана крутятся многие братские партии, состоящие из более мелких левых националистических движений, вдохновленных Гоминьданом, надеющихся освободить свои родины в Восточной и Юго-Восточной Азии.\n\nЛянгуан всегда был дружественной базой для этих отважных борцов за свободу, независимо от правительства. Гоминьдан, Чэнь Цзюнмин и даже Лу Жунтин всегда с симпатией относились, в частности, к вьетнамским националистам, сопротивляющимся французскому, а затем немецкому колониализму. Многие группы свободно пользовались Гуанчжоу для планирования и организации, и даже для запуска трансграничных рейдов из Гуанси. Их склонность к контрабанде опиума, чтобы свести концы с концами, привлекла некоторое внимание Чэня, но по большей части их терпели или даже поддерживали сменявшие друг друга правительства Лянгуана.\n\nСегодня в этом районе присутствуют три основные вьетнамские группы. Леворадикальная ВНДП (VNQDD) является крупнейшей, с их «Зарубежным министерством Вьетнамской националистической партии», традиционно представленным пожилыми политическими фигурами, такими как Фан Бой Чау. Более идеологически умеренные, они в основном избегали проблем. ВНПВ (VNQPH) имеет базы в Гуйлине, с правыми и либерально настроенными ячейками, которые держатся на некотором расстоянии от остальных. Наконец, Коммунистическая лига сохраняет некоторое присутствие в Гуанчжоу, хотя и сильно сокращенное из-за неблагоприятных отношений с Чэнем и Лу. Немало членов их Зарубежного командного комитета предпочитают Макао в качестве убежища, перемещаясь между ними по мере необходимости.\n\nВосстание в Индокитае в значительной степени опустошило провинцию от более активных бойцов. Тем не менее, некоторые остаются в этом районе и стали объектом восхищения для многих более интернационалистски настроенных членов партии."
 GXC.midgame.590.a: "ВНДП всегда была нам как сестра."
 GXC.midgame.590.b: "У ВНПВ правильные идеи."
 GXC.midgame.590.c: "Коммунистическая лига — поразительная банда."

 GXC.midgame.591.t: "Новый Законодательный Юань"
 GXC.midgame.591.d: "Центральное правительство в [CHI.Capital.GetCapitalVictoryPointName] наконец-то пришло к созданию временного Законодательного Юаня, который начал созывать делегатов от каждой провинции. Поскольку Гуандун является домом для непропорционально большого числа существующих лидеров Гоминьдана, многие места, предназначенные для Гуандуна, были «зарезервированы» светилами Гоминьдана. Протесты, особенно со стороны более молодых и менее политически укоренившихся кадров, о том, что у нас мало права голоса в отношении наших лидеров, несмотря на наш значительный вклад, были отметены. Некоторые возражают, говоря, что это цена, которую мы платим за то, что Гуандун также получает непропорционально большое количество патронажных должностей в бюрократии.\n\nПоскольку центральное правительство не желает отступать от количества мест, выделенных Гуандуну, а на многие места претендуют лица, тесно связанные с национальным правительством, за оставшиеся места идет жесткая борьба. Точные правила пребывания в должности во время политической опеки также еще не полностью определены, при этом некоторые советуют провинциальному комитету представить наш список в короткие сроки, в то время как другие предлагают провести партийные выборы, чтобы было некоторое подобие демократии. Небольшое количество мест должно было быть зарезервировано для независимых и наших союзников по Единому фронту, но будет ли кого-то действительно волновать, если они будут «перераспределены» более достойным кандидатам?"
 GXC.midgame.591.a: "Провинциальный комитет может решить быстро и справедливо."
 GXC.midgame.591.b: "Партийные кадры должны избирать своих представителей."
 GXC.midgame.591.c: "Мы должны освободить место для большего количества членов Гоминьдана."

 GXC.midgame.592.t: "Закон о земельной реформе [GetYear] года"
 GXC.midgame.592.d: "Неотъемлемой частью плана политической и экономической реконструкции Гоминьдана является обещание земельной реформы. Доктор Сунь Ятсен включил Уравнивание прав на землю как часть своего первоначального Плана национальной реконструкции, находясь под сильным влиянием джорджизма. На протяжении многих лет предпринимались различные импровизированные попытки земельной реформы как в Гуандуне, так и во время восстания Миньгань, но редко хватало устойчивых усилий или стабильности для того, чтобы какая-либо программа существенно повлияла на проблему.\n\nНовое правительство в Нанкине решило поиграть мускулами, приняв ряд директив, касающихся сельскохозяйственной политики. Наиболее значимой является пилотная программа земельной реформы в Цзянсу (недалеко от Нанкина), призванная стать образцом для подражания. Естественно, лидеры ВКД в Цзянси и Фуцзяни проявили инициативу и начали перераспределять землю самостоятельно, продолжая предыдущие усилия Миньганя. Как одна из крупнейших и богатейших провинций, к нам звучали призывы запустить собственную пилотную программу, помогая нашим собственным борющимся крестьянам в их беде. И, по общему признанию, это может быть возможностью показать себя перед национальным правительством, пока мы этим занимаемся.\n\nДва широких течения конкурируют за наше внимание. Была предложена более умеренная повестка дня, которая ввела бы давно желаемое ограничение арендной платы за землю в 37,5%, которое будет сочетаться с принудительной покупкой правительством неиспользуемых или избыточных земель у землевладельцев со смесью прямой компенсации, государственных облигаций и акций государственных предприятий. Купленная земля затем будет продана со скидкой крестьянам, уже работающим на ней.\n\nБолее радикальное предложение — организовать насильственный захват земли у шэньши. Некоторые стратегические регионы будут полностью национализированы, а другие останутся в руках мелких землевладельцев, но основная часть будет преобразована в крестьянские кооперативы. Конечно, вместо того чтобы преследовать любой из вариантов, возможно, лучше всего дождаться результатов других пилотных программ для дальнейшего изучения."
 GXC.midgame.592.a: "Мы проводим умеренную программу «земля пахарю»."
 GXC.midgame.592.b: "Нам нужно радикальное перераспределение земли!"
 GXC.midgame.592.c: "Мы должны быть осторожны и ждать директив."

 GXC.midgame.593.t: "Власть Единому фронту"
 GXC.midgame.593.d: "Единый фронт всегда был спорным вопросом внутри партии, но широко поддерживался левыми в конце первоначального раскола партии Гоминьдан. Китайская синдикалистская партия была основана независимо от Гоминьдана, получив приказ объединить силы с Гоминьданом из Парижа в обмен на поддержку Китайской революции Интернационалом, но договоренность всегда была непростой. КСП пыталась сохранить дальнейшую автономию, сформировав Лигу китайских синдикалистов, но Лига также была громоздкой.\n\nВозвращение Центрального комитета Гоминьдана из изгнания во Франции не уменьшило сложность ситуации. Знакомство многих изгнанников с жизнью во Франции и Британии сделало многих изгнанников сочувствующими, хотя другие ожесточились против того, что они воспринимают как революционные излишества в Британии, хаос «демократии» во Франции или восприятие лицемерного расизма в Европе. Те, кто никогда не уезжал, смотрят на возвращенцев с некоторой скрытой насмешкой, считая их трусливыми и чрезмерно ксенофильными саквояжниками.\n\nПоскольку Единый фронт восстанавливается на севере, некоторые в Лянгуане задаются вопросом, должны ли они последовать примеру Нанкина. Гуанчжоу всегда был более восприимчив к радикальной профсоюзной деятельности, но это не всегда выливалось в поддержку синдикализма, который остается для многих чуждым понятием. Многие умеренные обвиняют синдикализм в провоцировании разрушительной немецкой интервенции во время Северного похода, хотя другие вспоминают мужество синдикалистских активистов в сопротивлении оккупации. Ясно одно: если синдикализм не найдет своего дома в Гуанчжоу, он не будет иметь успеха нигде в Китае."
 GXC.midgame.593.a: "Мы должны всем сердцем принять этот союз."
 GXC.midgame.593.b: "Мы должны остановить распространение этого иностранного безумия!"
 GXC.midgame.593.c: "Мы сделаем необходимый минимум, чтобы принять их."

 GXC.midgame.594.t: "Революционная культура, Революционный народ"
 GXC.midgame.594.d: "Больная династия Цин и ее слабость перед лицом иностранного империализма отвратили многих от китайского традиционализма, который они представляют. Движение за новую культуру, по иронии судьбы вдохновленное реформами поздней династии Цин, возникло после Синьхайской революции, открыв дискурс о состоянии китайского общества, который часто граничит с иконоборчеством. Призывая к более широкому использованию китайского разговорного языка, изменению семейной структуры, эгалитаризму, национализму и ориентации на будущее, оно требует, чтобы экономическая модернизация Китая шла рука об руку с социальной модернизацией. Оно также вызвало значительную негативную реакцию со стороны консерваторов за свои крайности, особенно в сочетании с революционными действиями.\n\nГоминьдан как партия имел сложные отношения с Движением за новую культуру. Бесспорными в партии являются такие вопросы, как эмансипация и равенство женщин — особенно такие вопросы, как ликвидация бинтования ног у женщин и, в меньшей степени, полигамии. Однако, когда движение заходит на неудобную территорию, связанную с сексуальными и социальными нормами, возникает сопротивление со стороны некоторых из тех самых интеллектуалов, которые первыми сформулировали принципы движения.\n\nТочно так же в политической сфере призыв к тому, чтобы Господин Наука и Господин Демократия взяли на себя инициативу, имеет много сторонников среди левых, но активисты также критиковали неотъемлемые части доктрины Гоминьдана, такие как необходимость опеки и авангардной партии. Нападки на китайскую культуру и конфуцианские ценности также плохо сочетались с патриотической риторикой партии, особенно среди правых.\n\nЦентральное правительство попыталось внести свой вклад, приказав своим органам пропаганды и образования помочь создать (некоторые говорят, синтетически) революционную культуру, подходящую для нового Китая. Насколько восприимчивы будут люди Лянгуана (и наше собственное правительство) — это другой вопрос."
 GXC.midgame.594.a: "Времена меняются, и мы тоже должны!"
 GXC.midgame.594.b: "Мы можем смешать революцию и традиции."
 GXC.midgame.594.c: "Есть бунт, и есть..."

###Section 3d (600-799): Mid Game UPC Political Events

 ##Guangzhou Federalist Conference Event Chain (600-619)
 GXC.midgame.600.t: "Гуанчжоуская конференция федералистов"
 GXC.midgame.600.d: "Теперь, когда Лянгуан твердо находится под контролем Чэнь Цзюнмина, губернатор обратил свое внимание на национальные вопросы. Пригласив федералистских деятелей со всей страны, Чэнь и его союзники дали понять свои амбиции всей нации: восстановить казалось бы мертвое федералистское движение и создать новое национальное правительство в Гуанчжоу.\n\nЭта конференция является своего рода духовным преемником серии федералистских конференций, проведенных в 1920-х годах, в частности, во время разработки Конституции Хунани в 1920 году, и «Конференции по общественным делам» 1922 года в Шанхае, проведенной различными гражданскими организациями.\n\nЧто касается Гуандуна, сам Чэнь провел две конференции в Шаньтоу в 1924 году. Майская конференция вращалась вокруг отношений с Гоминьданом и включала представителей фракций Аньхой, Чжили и северных федералистов. Вторая, в ноябре, была более мрачной по тону — она проводилась после инцидента с Торговым корпусом и включала представителей из Цзянси, Хунани, Фуцзяни и Юньнани. Там было принято судьбоносное решение не посещать Пекинскую конференцию по воссоединению 1925 года и начать обреченную в конечном итоге кампанию против Гуанчжоу. И, конечно, Партия общественных интересов была основана в Сан-Франциско в 1925 году на отдельной конференции.\n\nТаким образом, подобные конференции оказали значительное влияние на историческое федералистское движение, и эта, вероятно, не будет исключением. Проводимая под знаменем «Великого республиканского альянса», большинство присутствующих партий базируются в Лянгуане: ДСП Чжан Цзюньмая, АВСГ Чэнь Ляньбо и, конечно, ПОИ Чэнь Цзюнмина. Намеренно или нет, другие федералистские группы, такие как Партия народного управления Тан Цзияо, Движение за автономию Чжэцзяна Чу Фучэна, Общество обновления народа Чжао Хэнти, Подготовительное управление провинциальной федеральной автономии Сюн Кэу и различные независимые федералисты, такие как Чжан Тайянь, прислали наблюдателей, но вместо этого были отодвинуты Чэнем на второй план."
 GXC.midgame.600.a: "Поистине момент, чтобы Чэнь Цзюнмин засиял!"
 GXC.midgame.600.b: "Демонстрация единства всех федералистов, оставшихся в Китае!"

 GXC.midgame.601.t: "Правительство федералистов Гуанчжоу"
 GXC.midgame.601.d: "Федералистское движение, которое, как думало большинство, ушло в небытие после начала 1920-х годов, вернулось. Возглавляемое гуандунским милитаристом Чэнь Цзюнмином и его «Великим республиканским альянсом» различных федералистских партий, они собрали различных интеллектуалов и представителей южных провинций в Гуанчжоу для нескольких недель обсуждений. Хотя ожидается, что дебаты будут оживленными, результат предрешен: в конце «Губернатор» Чэнь Цзюнмин станет «Президентом» Чэнь Цзюнмином нового конкурирующего правительства на юге. Как долго оно просуществует, вероятно, будет решено на поле боя."
 GXC.midgame.601.a: "Наши представители там будут следить за ситуацией."
 GXC.midgame.601.b: "Сепаратистское движение поднимает свою уродливую голову."
 GXC.midgame.601.c: "Блестящий успех для Чэнь Цзюнмина!"

 GXC.midgame.602.t: "План национальной реконструкции Чэня"
 GXC.midgame.602.d: "Первой важной темой обсуждения стал План национальной реконструкции Чэнь Цзюнмина. Во многом похожий на тот, который он опубликовал в мае 1922 года, накануне войны между ним и Сунь Ятсеном, он описывает умеренное федералистское будущее для Китая — особенно по сравнению с радикалами, такими как Чжан Тайянь, которые стремились к фактическому демонтажу центрального правительства.\n\nСмоделированная по образцу американского правительства, республика Чэня будет разделять власть между провинциями (которые останутся такими же, как и нынешние). Провинции будут избирать сенаторов для представления интересов провинций, а палата представителей будет формироваться из местных органов для представления интересов народа. Центральное правительство будет иметь исключительную компетенцию в отношении вооруженных сил, национальной безопасности и внешних отношений, но провинции не будут нести ответственность за поддержку армий, а военное и гражданское управление будут строго разделены. Финансы будут разделены между центральным правительством и провинциальными правительствами, а ответственность за судебную систему, образование, промышленность и связь будет решена позднее.\n\nСамым радикальным отходом от его плана 1922 года является то, как достичь своей цели. В то время Чэнь предложил три шага для объединения. Во-первых, все провинции должны взять на себя обязательство достичь этого федералистского видения. Затем они направят представителей на конференцию для разработки окончательной версии. Наконец, воссоединение будет достигнуто путем добровольного создания Федерации. Он также предложил Сунь Ятсена и Дуань Цижуя в качестве главных кандидатов на пост президента и вице-президента [Примечание переводчика: Чэнь старался избегать использования титула президента, предпочитая использование главного исполнительного директора, но для простоты мы будем использовать исключительно президент].\n\nПровал переговоров в 1923 году и объединение силой в 1927 году в значительной степени дискредитировали этот подход, и все могут согласиться, что, вероятно, потребуется сила оружия. И все знают, кто является главным кандидатом на пост президента в [GetYear]."
 GXC.midgame.602.a: "Этот план, несомненно, будет способствовать сотрудничеству провинций!"
 GXC.midgame.602.b: "Давно пора нам проснуться и увидеть реальность ситуации в Китае."

 GXC.midgame.603.t: "Программа из десяти пунктов ДСП"
 GXC.midgame.603.d: "ДСП, другие группы и различные независимые, которые недавно присоединились к ВРА (большинство из них ветераны Федерации китайских демократических партий, которая стремилась поощрять демократию изнутри правительства Чжили в начале 1930-х годов), разработали Программу из десяти пунктов для нового правительства федералистов Гуанчжоу. Открываясь преамбулой о единстве, пункты включают клятвы:\n\n1. Сопротивляться иностранному империализму и полностью восстановить территориальную целостность Китая — выступая против компромисса с иностранными державами.\n2. Реализовать дух многопартийной демократии и подготовиться к разработке конституции.\n3. Укрепить внутреннее единство и разрешить межпартийный конфликт.\n4. Помочь ВРА в выполнении их Плана национальной реконструкции.\n5. Твердо установить единство национальной власти и правильно разделить центральную и местную власть.\n6. Обеспечить, чтобы вооруженные силы принадлежали нации и были лояльны ей, а не военным или региональным кликам, и предотвратить их использование для решения внутренних споров.\n7. Осуществлять верховенство закона и защищать свободы жизни, собственности и личности людей от незаконных наказаний.\n8. Уважать интеллектуальную и академическую свободу, в частности свободу слова, публикаций, собраний и ассоциаций.\n9. Подчеркнуть беспартийность в армии, школах, правительстве и государственных финансах. Чиновники должны отбираться на основе моральных качеств и способностей.\n10. Энергично проводить экономические, административные и надзорные реформы для содействия экономической реконструкции.\n\nБыли некоторые дебаты по поводу его предстоящей публикации. Разработанный независимым лицом, Чжан Цзюньмай и другие лидеры ДСП колебались в публикации 10 пунктов полностью, опасаясь, что некоторые из них могут заставить Армию Юэ и других милитаристов рассматривать их как угрозу. Но многие из более идеалистичных независимых требуют опубликовать его полностью, иначе они уйдут. Был предложен компромисс: опубликовать его анонимно под несуществующим лейблом ФКДП."
 GXC.midgame.603.a: "К черту власти, пусть знают, за что мы выступаем!"
 GXC.midgame.603.b: "Скрываясь за анонимностью, демократы выдвигают свои пункты полностью."
 GXC.midgame.603.c: "Прагматичная самоцензура обеспечивает стабильность и дипломатию."

 GXC.midgame.604.t: "Флаги и символы федералистов"
 GXC.midgame.604.d: "Хотя правительство федералистов Гуанчжоу официально поднимает флаг Пяти рас в Едином союзе, символ Республики 1911 года, для облегчения идентификации рядом с ним часто развеваются партийные флаги. Как и большинство вещей в федералистском движении, даже флаг дался нелегко.\n\nНаходясь в изгнании в Японии, лидеры Тунмэнхоя начали дебаты о партийном флаге. Двумя финалистами были флаг Белое солнце, Синее небо и Полностью красная земля (модификация дизайна Лу Хаодуна) и сине-бело-красный флаг «Цзин», разработанный Ляо Чжункайем. Иероглиф «Цзин» (напоминающий поле для игры в крестики-нолики) является символом традиционной системы колодезных полей в Китае — на каждые восемь участков земли, находящихся в индивидуальной собственности, средний девятый обрабатывался для общего блага (или местного лорда). Столетия спустя он стал символом общественной солидарности.\n\nСунь Ятсен решительно поддержал флаг Белое солнце, Синее небо и потребовал его принятия — спровоцировав ожесточенную, затяжную борьбу между изгнанными революционерами. В конце концов, вопрос был отложен, хотя Сунь в конечном итоге принял Белое солнце в качестве своего партийного флага. Для его противников в Тунмэнхое инцидент стал символом раннего авторитаризма Суня, и федералисты в конечном итоге приняли флаг Цзин — ПОИ (а теперь и ВРА) приняла его как свой партийный флаг, а Чэнь Цзюнмин использовал вариант для своего флага Маршала.\n\nДемократическая социалистическая партия также приняла флаг с символом Цзин. «Ярко-красный, чисто-белый и железно-черный» партийный флаг с зеленой эмблемой Цзин в центре, где красный, как говорят, олицетворяет теплое сострадание, белый — открытость и социальную справедливость, а черный — твердую волю и дисциплину. Зеленый символ Цзин олицетворяет колодезные поля, «которые являются своего рода социалистической системой, присущей нашей стране», а зеленый символизирует мир. Таким образом, говорят они, флаг воплощает цель партии реализовать умеренный социализм."
 GXC.midgame.604.a: "Воодушевляющий символ человеческой солидарности, который превосходит тысячелетия."
 GXC.midgame.604.b: "Трагическая история о том, как легко людей разрывают мелкие споры."

 GXC.midgame.605.t: "Конституционализм среди федералистов"
 GXC.midgame.605.d: "Конституционализм — еще один важный столп федералистского движения, хотя на протяжении всей истории Китая он не обязательно был синонимом демократии. Китайские юристы имели долгую, гордую правовую традицию, включающую такие понятия, как «Сяньфа», древний общий термин для правил и законов, прежде чем он стал синонимом «Конституции», и «Фа Тун» (букв. «преемственность права»), который относился к правилам, установленным основателем династии, которые продолжали передаваться из поколения в поколение до конца династии.\n\nКонституционализм был впервые принят в 1890-х годах реформаторами поздней Цин, которые стремились укрепить институты Цин против иностранного империализма. Они представляли Конституцию как свод правил, которые управляли как правителями, так и их подданными, связывая их вместе. Такие люди, как Лян Цичао, предприняли серьезную попытку установить конституционную монархию в 1908 году, разработав конституцию в стиле Мэйдзи, создав провинциальные ассамблеи и ограниченные выборы и вызвав десятилетия дебатов.\n\nБэйянская республика 1911 года началась с временной конституции, вдохновленной 3-й французской республикой, которая стремилась создать парламентскую республику. Она в значительной степени игнорировалась все более могущественными президентами, начиная с Юань Шикая, который в 1914 году заменил ее «Новым конституционным пактом», сделавшим его пожизненным президентом. Вскоре после этого он попытался сделать себя Императором. Попытка его преемника Дуань Цижуя переписать временную конституцию спровоцировала Войну в защиту конституции в 1917 году. В 1923 году Цао Кунь принял значительно более либеральную конституцию с гарантиями гражданских прав и сочетанием централизации и федерализма, что было возобновлено в 1929 году. Но в обоих случаях конституция игнорировалась, когда это было неудобно.\n\nНа юге были разработаны различные провинциальные конституции, хотя немногие из них были успешно реализованы. Тем не менее, мечта о конституционном правительстве живет, что подчеркивается консервативными элементами."
 GXC.midgame.605.a: "Прочная конституция — единственный способ привести Китай к миру."
 GXC.midgame.605.b: "Уважение к конституции — основа китайской демократии."
 GXC.midgame.605.c: "Мы боремся за конституционное будущее, но до тех пор должны быть практичными."

 GXC.midgame.606.t: "Милитаристы, регионалисты и федералисты?"
 GXC.midgame.606.d: "Третьим важным компонентом федералистского движения, собравшимся в Гуанчжоу, являются регионалисты. Хотя противники федерализма долгое время обвиняли идеологию в том, что она является лишь прикрытием для милитаристов, чтобы оправдать их неповиновение центральному правительству, реальность была и остается сложной. Так же, как не каждый федералист — милитарист, не каждый милитарист — федералист.\n\nХотя идея уважения провинциальной автономии может быть привлекательной для многих провинциальных милитаристов, создание федерального правительства вызывает споры. Китай традиционно был централизованным государством в теории, даже если на практике автономия отдаленных провинций породила пословицу «Небо высоко, а император далеко». Федерализм, особенно более децентралистские варианты, выдвигаемые федералистскими мыслителями, рассматривается некоторыми как разделение страны — равносильно государственной измене.\n\nМногие милитаристы по иронии судьбы являются националистами или, по крайней мере, используют националистическую риторику, и в конечном итоге желают сильного центрального правительства, с которым они связаны (если не являются его непосредственной частью), и видят себя агентами этого правительства. Другие связаны личной или партийной лояльностью и не желают переходить на сторону непроверенного движения. Для них автономия является временной (хотя и бессрочной), заслуженной их верностью в неопределенные времена.\n\nСреди милитаристов-федералистов многие искренне верят, что федерализм — единственный способ по-настоящему восстановить Китай. Как и подобает такому децентрализованному движению, многие вступали в ожесточенные конфликты друг с другом — опровергая представление о едином фронте федералистов. Идеи федерализма были включены и в другие фракции, что еще больше замутило воду.\n\nВ правительстве Чэнь Цзюнмина не все заинтересованы в ведении войны во имя федерализма. Многие кантонские деятели следуют за Чэнем из-за личных связей, в то время как многие милитаристы подчиняются ему из-за его господства на юге, но видят мало пользы в ведении наступательной войны."
 GXC.midgame.606.a: "Пусть Чэнь Цзюнмин сохранит мир дома."
 GXC.midgame.606.b: "Мы надеемся, что Чэнь Цзюнмин продолжит уважать нашу автономию."

 GXC.midgame.607.t: "Конференция закрывается"
 GXC.midgame.607.d: "По мере того как Гуанчжоуская конференция федералистов подходит к концу, становится ясно, что федералистское движение держится на трех китах: Демократии, Конституционализме и Регионализме. Для идеалистических демократов правительство федералистов Гуанчжоу — это их шанс наконец-то достичь некоего подобия представительной демократии в Китае. Конституционалисты возлагают свои надежды на Чэнь Цзюнмина, юриста и давнего члена Ассамблеи провинции Гуандун, надеясь, что он внедрит и будет уважать конституцию, придя к власти. Для регионалистов федерализм обеспечит, чтобы голос местных жителей не был заглушен на национальном уровне.\n\nФедералистское движение имеет спектр фигур, некоторые из которых чрезвычайно громко заявляют о своих идеалах, в то время как другие гораздо более прагматичны в своих делах. В конце концов, однако, ожидается, что новое правительство федералистов Гуанчжоу будет действовать более или менее так же, как старое правительство Гуандуна. Чэнь Цзюнмин перешел от губернатора к президенту после голосования на конференции с небольшим сопротивлением, стареющий кантонский бизнесмен и революционер Чэнь Сижу, вероятно, станет губернатором Гуандуна.\n\nПока Конференция продолжает пытаться определить Федерализм, под лаком правительство удерживается вместе мощью Армии Юэ, бюрократии Гуанчжоу и союзных магистратов-шэньши. Как и большинство милитаристов, Чэнь Цзюнмин является незаменимым центром паутины личных связей, и хотя он пытается прикрыть это местными ассамблеями и парламентским процессом (по благожелательным или манипулятивным причинам — вопрос интерпретации), его слово в конечном итоге является последним.\n\nТем не менее, это, вероятно, все же лучше, чем у многих милитаристов в Китае. И учитывая, как легко теоретики и мыслители отвлекаются или теряют связь с реальностью на местах, возможно, сильная рука — это то, что нужно, чтобы сохранить движение вместе и двигаться вперед."
 GXC.midgame.607.a: "Магистраты и бюрократы — вот что поддерживает работу Гуандуна."
 GXC.midgame.607.b: "Армия Юэ и ее офицеры держат различных милитаристов в узде."

 ##Narrative Event Chain (620-639)
 GXC.midgame.620.t: "Чэнь Сижу уходит в ночь"
 GXC.midgame.620.d: "Хотя Чэнь Сижу был избран губернатором Ассамблеей провинции Гуандун вскоре после того, как Чэнь Цзюнмин был приведен к присяге в качестве президента правительства федералистов Гуанчжоу, у него никогда не было возможности занять этот пост. Пожилой кантонский джентльмен скончался вчера вечером после долгой борьбы с болезнью, потратив свои последние силы на помощь в реконструкции Гуандуна.\n\nЧэнь Сижу был наследником богатого зарубежного китайского торговца, и, выросши в Гуандуне, он начал учиться на Гавайях, прежде чем поступить в Йель. Находясь в Америке, он стал одноклассником Сунь Ятсена и другом Тан Шаои, двух людей, с которыми его пути продолжали пересекаться вплоть до Синьхайской революции. Он и его брат Чэнь Гэнъюй унаследовали бизнес-империю своего отца, и они использовали ее для спонсирования различных политических фракций в новой Республике.\n\nПользуясь уважением в кантонских кругах, Чэнь Сижу был назначен Чэнь Цзюнмином гражданским губернатором во время инцидента 16 июня. Его пребывание в должности было кратким, и он бежал в изгнание с Чэнь Цзюнмином в Гонконг. Разочарованный, он тем не менее остался с Чэнем во имя защиты Гуандуна. Его старший сын Чэнь Юншань также был выпускником Йеля и служил в Армии Юэ, став директором Арсенала Шицзин. В 1924 году он был убит снайпером в Макао. Империя Чэня, вероятно, будет унаследована его выжившими детьми.\n\nКто займет его место губернатора самой важной провинции федералистского правительства, теперь открытый вопрос. Поскольку у ДСП нет институциональной власти для проведения заслуживающей доверия кампании, ожидается, что президент Чэнь выдвинет кандидатуру и легко добьется избрания инсайдера. За эту работу борются два его секретаря. Ма Юйхан имеет опыт в дипломатии и финансах и считается фаворитом Армии Юэ. Чэнь Цию было поручено организовать ПОИ. Менее популярные кандидаты включают Цю Цзинъюня, советника Чэнь Цзюнмина Чэнь Гуншоу, лидера торговцев, которого считают доверенным лицом Чэнь Ляньбо."
 GXC.midgame.620.a: "Ма Юйхан — один из старых, более авторитетных протеже Чэня."
 GXC.midgame.620.b: "Чэнь Цию моложе и имеет больше связей с ВРА."
 GXC.midgame.620.c: "Цю Цзинъюнь был наставником и постоянным советником президента."
 GXC.midgame.620.e: "Чэнь Гуншоу позволил бы высказаться стороннему мнению, сохраняя дела внутри."

 GXC.midgame.621.t: "Люди Чэнь Цзюнмина"
 GXC.midgame.621.d: "Чэнь Цзюнмин командовал широким кругом друзей, союзников и личных связей — то, что поддерживало его правительство и давало жизнь его федералистскому движению. Но даже когда присоединяется больше людей и его правительство расширяется, его основная сеть поддержки остается в основном прежней.\n\nВ центре его базы власти находится контроль над Армией Юэ. Преемница его Армии Сюнь (названной в честь Хуэйчжоу), Армия Юэ превратилась в нечто большее, чем просто военная сила. Многие из его высших офицеров также были одними из его самых ранних последователей, и их верность на протяжении десятилетий дала ему степень безопасности, которой не хватает другим. Конечно, их лояльность не была безусловной. В то время как такие офицеры, как Е Цзюй и Ма Юйхуан, стояли с Чэнем до победного конца, такие офицеры, как Сюн Люэ, Вэн Шилян, Ло Сяньсян и братья Чжун Сюнань и Цзинтан были готовы искать работу в другом месте.\n\nИ лояльность не исключает независимых действий — после инцидента 16 июня Чэнь Цзюнмин заявил, что переворот был спланирован без его участия: сомнительное утверждение, но в некоторой степени подкрепленное его многочисленными «отставками», когда он оставлял свою армию, и они действовали, казалось бы, без его прямого управления. Такие люди, как Хун Чжаолинь, Ян Куньжу и Хуан Давэй, либо были независимыми милитаристами с самого начала, либо создали свои собственные владения под его началом.\n\nГражданские союзники Чэнь Цзюнмина столь же разнообразны, хотя практически все они имеют корни в «Клике Хайфэна» ранних учеников Чэнь Цзюнмина из его родного уезда. Различные шэньши (включая его кровных родственников), поддержавшие Чэня, такие как Цю Цзинъюнь и Чэнь Юэбо, сформировали Ассоциацию поддержки зерновой промышленности, которая расширялась по мере роста влияния Чэня. Различные студенты, которых Чэнь организовал в свои ранние дни, такие как Чэнь Цию и Чэнь Яньшэн, с помощью Хунмэнь и связей диаспоры, превратились в Партию общественных интересов — попытку создать современную политическую партию для продвижения федералистского движения."
 GXC.midgame.621.a: "Армия Юэ всегда будет на первом месте."
 GXC.midgame.621.b: "Партия общественных интересов станет наследием Чэня."
 GXC.midgame.621.c: "Чэнь родился ученым-шэньши и остается им."

 GXC.midgame.622.t: "Состав ДСП"
 GXC.midgame.622.d: "Демократическая социалистическая партия берет свое начало (как и большинство не-гоминьдановских, реформистских партий) в учениях Лян Цичао, реформиста поздней династии Цин и отца-основателя Бэйяна. Некоторые старые члены также вышли из различных учебных ассоциаций в изгнании на рубеже веков; многие были бывшими умеренными, связанными с Кликой политической науки, такими как Сюй Фулинь и Линь Чжэнсюань.\n\nВ ее центре находится Чжан Цзюньмай, лянист, получивший образование в Германии (где он впервые вдохновился немецкой СДПГ), и который пытался консолидировать власть в партии вокруг себя. Идеологически он пытался синтезировать восточную философию с западными политическими идеями (особенно социал-демократией), с ограниченным эффектом.\n\nЧжан рассматривает партию скорее как интеллектуальную элиту (преемницу его Общества национального возрождения), чем как массовое движение, надеясь влиять на политику через связи с интеллектуалами и милитаристами. Миссия ОНВ заключалась в том, чтобы пробудить национальное сознание Китая, гармонизировать общество и позволить свободное развитие личности через силу нации, и у них есть история сотрудничества с такими милитаристами, как Сунь Чуаньфан, Чэнь Цзюнмин, и теперь, как говорят, они ухаживают за различными региональными милитаристами под началом Чэня. Чжан также имел краткий диалог с лидерами Младокитайской партии (еще одна отколовшаяся группа лянистов), такими как Ли Хуан и Цзэн Ци в 1920-х годах.\n\nЕго страхи стать просто кабинетным интеллектуалом и его авторитарные попытки контролировать свою партию заставили многих его сверстников возмущаться им, а партию сократиться в основном до него самого, его учеников и базы поддержки из педагогов, обученных за рубежом, и умеренных среднего возраста. Либералы, такие как Ло Лунцзи, и социалисты, такие как Чжан Дунсунь, оплакивали эту тенденцию, надеясь, что ДСП примет более ориентированный на низы подход к пропаганде своих убеждений. Они стремились извлечь выгоду из антиконцессионных тенденций, с лидерами, такими как Чжу Цинлань и Ло Вэньгань, выступающими против Японии и Германии."
 GXC.midgame.622.a: "Чжан Цзюньмай, как Лян до него, является направляющей рукой движения."
 GXC.midgame.622.b: "Обучая милитаристов, ДСП может конкретно влиять на политику."
 GXC.midgame.622.c: "Современная партия требует массовых призывов к национализму и социализму."
 GXC.midgame.622.e: "Широкий спектр связей ДСП позволяет ей создать работающую коалицию."

 GXC.midgame.623.t: "Старые против новых федералистов"
 GXC.midgame.623.d: "Федералистское движение можно в целом разделить на две группы фракций: те, которые были в основном основаны и активны до объединения Чжили, и те, чье мышление сформировалось после.\n\nПервоначальное федералистское движение, активное в начале 1920-х годов, было сформировано гражданской войной и казавшимся неразрешимым разрывом между Севером и Югом. Поскольку провинции отдалялись друг от друга и военное объединение не предвиделось, акцент этой ранней фазы федерализма был сделан на поиске дипломатического решения кризиса. Федерализм в эту эпоху был сосредоточен на установлении конституционной демократии на местном уровне с надеждой на воссоединение провинций через переговорную федерацию.\n\nУспешное объединение Чжили после Северного похода изменило этот расчет, и, поскольку национальное воссоединение больше не ставилось под сомнение (по крайней мере, на бумаге), а конституция Цао Куня обещала федеральное разделение власти и демократические реформы (также на бумаге), позднее федералистское движение переключилось на либерализацию Бэйяна на национальном уровне. Регионализм стал подвергаться резкой критике как непатриотичный на фоне угроз иностранного империализма и синонимичный эре милитаристов, что привело к тому, что аспект провинциальной автономии федерализма был отодвинут на второй план в пользу внедрения демократии и конституционализма.\n\nПОИ и ДСП были основаны после 1928 года, и их лидеры были активны в обе эпохи федералистского движения. Однако Чэнь Цзюнмин и его союзники более связаны с властями предержащими и более региональны, что заставляет ПОИ больше апеллировать к первому лагерю. Что касается Чжан Цзюньмая и его союзников, отсутствие у них институциональной власти и географическая разбросанность их членов привели к тому, что ДСП склоняется ко второму. У них также более свободные руки в призывах к радикальным изменениям в социально-экономической системе, поскольку они не обременены практическими реалиями правления. Ожидается, что обе стороны найдут дополнительных союзников по мере расширения федералистского правительства."
 GXC.midgame.623.a: "Старые федералисты остаются верными первоначальной цели движения."
 GXC.midgame.623.b: "Новые федералисты отражают меняющиеся ценности среди китайских интеллектуалов."

 GXC.midgame.624.t: "Поиск финансирования для ДСП"
 GXC.midgame.624.d: "Хотя социалисты долго мечтали об обществе, которому больше не нужны деньги для функционирования, по крайней мере, в эту эпоху ДСП потребуется финансирование, чтобы выжить. Зарабатывание на жизнь всегда было заботой класса интеллектуалов; им часто приходилось быть либо независимо богатыми, плодовитыми и известными писателями, чтобы получить приличную аудиторию, либо, скорее всего, получать покровительство влиятельных людей. Как следствие, политические газеты в Китае часто появлялись и прекращали публикации по мере изменения политических вкусов.\n\nБыть интеллектуалом(-ами), издающим (вероятно, временную) газету, — это одно, но быть организованной политической партией — другое. Федерация китайских демократических партий усвоила это на горьком опыте, когда рыхлая коалиция с трудом финансировала себя, не говоря уже о том, чтобы платить за Федерацию. Только Хуан Яньпэй из КДАНС, казалось, на самом деле платил деньги за ФКДП, в то время как другие постоянно испытывали нехватку наличных.\n\nЭто было в мирное время. С новой эрой конфликтов многие интеллектуалы с трудом сводят концы с концами, не говоря уже о том, чтобы платить партийные взносы или покупать партийные журналы. ПОИ эффективно поддерживается Чэнем и его богатыми сторонниками, а ВРА действует как расширение ПОИ. ДСП стала фактически единственной другой настоящей политической партией в Альянсе (хотя различные группы интересов, такие как АВСГ, сохраняются) отчасти потому, что у нее достаточно финансирования для продолжения непрерывной работы.\n\nЭтому, безусловно, способствует чрезвычайно богатая семья Чжан Цзюньмая. Его брат Чжан Гунцюань (Цзяао) работает генеральным менеджером Банка Китая — одного из двух крупнейших в стране. Его сестра Чжан Юи также является известной деловой женщиной, которая помогала своему брату в управлении финансами ДСП.\n\nКонечно, ФКДП также была печально известна тем, что брала деньги из черных касс различных милитаристов, надеющихся подорвать центральное правительство. Продолжила ли ДСП эту практику, еще предстоит увидеть, хотя Чжана видели на встречах со многими."
 GXC.midgame.624.a: "Кто бы мог подумать, что социалисты и банкиры могут поладить?"
 GXC.midgame.624.b: "Нет ничего плохого в обсуждении политики с местными политиками."

 GXC.midgame.625.t: "Трудовые вопросы сохраняются в Лянгуане"
 GXC.midgame.625.d: "Хотя Гоминьдан и другие революционеры были разгромлены во время гражданской войны в Лянгуане, социальная и политическая напряженность, которую она вызвала, сохраняется. Социалистические повстанцы в сельской местности ушли в подполье, организуя вооруженные ячейки, которые терроризируют местных шэньши. В городах радикальные профсоюзы не прекратили попытки распространять антикапиталистическую литературу. Возглавляемые агентами Гоминьдана и КСП, споры между рабочими и их боссами привели к обвинениям в преднамеренном саботаже.\n\nЕсть некоторая надежда, что Лянгуан перевернет новую страницу. Многие крестьяне и рабочие, истощенные годами конфликтов, начали отворачиваться от революционной агитации и принимать статус-кво. Новые, более умеренные союзы и крестьянские группы, сосредоточенные исключительно на экономических выгодах для своих членов, начали организовываться и занимать место своих радикальных предшественников.\n\nНо процесс заживления идет медленно, и некоторые опасаются, что восстановление трудовых отношений может занять более поколения. Для многих шэньши, торговцев и политических элит независимые профсоюзы — это одни проблемы, и их следует запретить в пользу желтых профсоюзов. В лучшие времена Чэнь Цзюнмин смог договориться с профсоюзами Гуанчжоу (преимущественно анархистскими), чтобы разрешить серию забастовок в 1922 году. Чэнь, поддерживая формирование союзов и крестьянских групп, неопределенно настаивал на том, чтобы они на время были «движением трудового воспитания», что, по-видимому, означало аполитичность и воздержание от использования забастовок для урегулирования жалоб. Его правительство, в свою очередь, помогло бы обеспечить гармонию труда и капитала.\n\nХотя временами это было неловко, активисты ДСП стремились реализовать видение своей партии и извлечь выгоду из гибели Гоминьдана, влияя на эти союзы, подстегиваемые Чжан Дунсунем, который утверждал, что в дополнение к политическим партиям различные группы интересов должны формировать гражданскую оппозицию, преследуя свои собственные убеждения, не уступая правительству или друг другу. Как и планируют ли они контролировать эту энергию — это другой вопрос."
 GXC.midgame.625.a: "Умеренные, аполитичные организации помогут просвещать рабочих."
 GXC.midgame.625.b: "Но политика и экономика связаны, и мы должны организовываться для обоих!"
 GXC.midgame.625.c: "Только должным образом проверенные организации могут существовать, если мы хотим иметь классовую гармонию."

 GXC.midgame.626.t: "Федерализм на практике"
 GXC.midgame.626.d: "В 1926 году изгнанный Чэнь Цзюнмин написал книгу «Предложение по объединению Китая», написанную на смеси китайского разговорного и классического стилей, в которой он стремился изложить философское видение Китая ПОИ.\n\nОн утверждал, что Китай настолько велик, что было бы невозможно провести подлинно представительные выборы всенародным голосованием. Вместо этого он утверждал, что организации, а не отдельные лица, должны быть основой политической системы Китая, объединяя торговые группы (новая концепция) с более традиционным представительством в правительстве по географическим подразделениям.\n\nГеографически Чэнь заявил, что Китай должен быть разделен на четыре подразделения: деревня, район, уезд или город и провинция. Каждый из пяти уровней правительства будет иметь исполнительную, законодательную и судебную ветви, а Федеральное правительство будет координировать их взаимодействие.\n\nРеализация этого видения на практике оказалась более сложной. Чэнь проповедует необходимость подхода «снизу вверх», организуя деревни и районы в выборные и самоуправляющиеся комитеты, которые могли бы сами себя контролировать и облагать налогами. Однако многие, похоже, следуют букве закона больше, чем духу. Чэнь был прав, что Китай вполне привык к самоуправлению, но местные выборы часто продолжают контролироваться местными элитами, и их независимость затрудняет для Федерального правительства влияние на них, чтобы они вели себя иначе.\n\nВ более широком масштабе надежды Чэня на то, что Гуандун может стать примером для подражания другим провинциям, также не оправдали ожиданий. Даже такие провинции, как соседняя Гуанси, оказались чрезвычайно упрямыми в своих путях, с местными милитаристами, сопротивляющимися реформам, которые доставляют им неудобства.\n\nТорговые группы также довольствовались тем, что продолжали действовать как раньше, хотя они оказались более восприимчивыми к влиянию интеллектуальной элиты. Более медленный прогресс в федерализме привел многих оптимистов в ужас, задаваясь вопросом, все ли это, чего они могли разумно ожидать."
 GXC.midgame.626.a: "Эти вещи таковы, каковы они есть, по определенной причине."
 GXC.midgame.626.b: "Мы должны быть готовы оказать давление, чтобы ускорить процесс!"
 GXC.midgame.626.c: "Перемены требуют времени, а терпение — это добродетель."

 GXC.midgame.627.t: "Четыре болезни, терзающие Китай"
 GXC.midgame.627.d: "Политические убеждения Чжан Дунсуня менялись со временем. Изначально вдохновленный Французской революцией, Чжан считал, что цивилизации проходят три фазы развития. Первой была цивилизация, построенная на религии, обычаях и суевериях, которую затем сменили цивилизации свободы, конкуренции, индивидуализма и национализма. Третьей и последней должна была стать цивилизация, основанная на социализме и космополитизме, которая сделала общество основой мысли и морали. Китай, таким образом, застрял между первой и второй фазами, но он надеялся, что «весенний дождь Великой войны прорастил семена новой цивилизации», и надеялся погреться в «солнечном свете послевоенных революций».\n\nЧжан начал отходить от более радикальных направлений социализма в пользу более умеренного гильдейского социализма в 1920-х годах. В отличие от многих западных марксистов, Чжан разочаровался в материализме, рассматривая социализм не столько через социально-экономическую призму, сколько как моральный кодекс и культурную ориентацию.\n\nОн диагностировал Китай как страдающий от четырех болезней: невежества, бедности, солдафонства-бандитизма и иностранного капитализма. Чжан выступал за необходимость появления нового класса капиталистических финансовых лордов («Цайфа»), чтобы уничтожить или реформировать милитаристов и построить экономику Китая. К этому моменту он отказался от надежды на мировую социалистическую революцию и вместо этого считал, что Китай должен пройти тот же путь экономического развития, что и Запад.\n\nТем не менее, он надеялся, что сокращение пути к социализму все еще возможно, даже если не избежать капиталистической фазы. Он верил, что рабочие будут приветствовать эту новую буржуазию, поскольку они решат проблему массовой безработицы, и в конечном итоге это позволит сформировать сильный пролетарский класс. Такое отношение вызвало значительную критику со стороны синдикалистов, таких как Чэнь Дусю, который бичевал Чжана за умаление рабочих. Но Чжан упорствовал, утверждая, что капитализм взаимовыгоден в краткосрочной перспективе и поможет импортировать жизненно важные технологии, которых не хватает Китаю."
 GXC.midgame.627.a: "Взгляды Чжан Дунсуня укореняются среди многих других интеллектуалов."
 GXC.midgame.627.b: "Чжана ненавидят консерваторы и высмеивают другие социалисты."

 GXC.midgame.628.t: "Федералистское гражданское общество"
 GXC.midgame.628.d: "Общим убеждением всего федералистского движения является необходимость гражданских групп, независимых от политических партий и правительства, для представления конкретных общественных потребностей и влияния на политику как посторонних. Действительно, политическая культура Бэйяна традиционно избегала формальных политических партий, вместо этого организуясь вокруг неформальных клик, которые ценили личные связи и индивидуальную респектабельность. Хотя некоторые политические партии, такие как Прогрессивная партия, Младокитайская партия, а на сцене Гуанчжоу ДСП и ПОИ, появились — в отличие от западных партий они, как правило, избегали массового движения в пользу того, чтобы служить социальными клубами для политиков-единомышленников. Многие законодатели продолжают баллотироваться как независимые.\n\nЭто сделало научные и образовательные группы привлекательными, служа мостом между политиками и интеллектуальными лидерами. Не требуя твердых обязательств и с приходящими и уходящими людьми, группы, подобные Обществу национального возрождения Чжан Цзюньмая, могли оказывать свое влияние на культуру, социальный дискурс и управление — традиция, которую продолжает ДСП.\n\nТочно так же, поскольку многие китайские социальные и экономические элиты имеют связи за границей, китайская диаспора обладает значительным влиянием. Общества Хунмэнь финансировали Тунмэнхой, а затем помогали в формировании ПОИ, фактически ПОИ была официально создана в Сан-Франциско в Соединенных Штатах. Их знакомство с иностранными идеями и доступ к твердой валюте помогают им формировать события на родине.\n\nУченые-федералисты также высоко отзываются о профессиональных группах. К ним относятся сельское хозяйство, рыболовство, бизнес, горнодобывающая промышленность, образование, право, журналистика, бухгалтерский учет, медицина и технические отрасли. Классовая напряженность существует внутри этих ассоциаций, конечно; при этом более богатые и специализированные люди, как правило, имеют большое влияние. Торговцы и шэньши оказались особенно хорошо организованными, используя свою власть для прямого влияния на правительство."
 GXC.midgame.628.a: "Мыслители нашей нации помогают открыть нам глаза на новые возможности."
 GXC.midgame.628.b: "Диаспора помогает знакомить нашу нацию с новыми идеями."
 GXC.midgame.628.c: "Профессионалы напоминают нам, что общество — это больше, чем солдаты и магистраты."

 GXC.midgame.629.t: "Национализм и федерализм"
 GXC.midgame.629.d: "Китайские лидеры часто оказывались в ловушке между своим желанием защищать и лелеять свои родные регионы и растущим народным желанием единства и национализма перед лицом иностранных угроз. Для Чэнь Цзюнмина было мало противоречий в его любви к Гуандуну и растущем антиконцессионном национализме в Китае. Для него оба были совершенно совместимы, и он считал, что провинции должны иметь первенство по умолчанию, особенно когда дело касается местных вопросов.\n\nВ то время как многие из его современников считали, что традиционное состояние китайских дел всегда вращалось вокруг деспотического Императорского двора, Чэнь писал, что «тоталитарные правительства в прошлом Китая были в основном неэффективны; китайский народ мог наслаждаться значительной свободой, и сильная традиция самоуправления действительно существовала в городах и деревнях по всей стране».\n\nХотя он признавал, что человеческое общество не может избежать своей политической и экономической среды, Чэнь утверждал, что традиционно правительство в основном сосредотачивалось на политических делах, в то время как внимание людей было сосредоточено на их собственной экономической ситуации. Современные общества двинулись в противоположном направлении, люди берут на себя большее самоуправление, а экономика становится все более централизованной. Таким образом, Федерализм был просто реализацией и модернизацией существующего положения дел, и он надеялся на утопический бренд интернационализма в далеком будущем, где интеллектуалы мирно преобразуют человечество в новый мир.\n\nНационализм также играл важную роль в ДСП, причем Чжан Цзюньмай сделал его одним из трех главных столпов программы их партии. Отвечая на ту же волну китайского национализма, Чжан утверждал, что баланс китайского национализма дома и сотрудничества с международным правовым/этическим порядком защитит Китай от иностранного вторжения. Они видели национализм как инструмент для преобразования китайского общества и вывода китайской экономики из пут империализма."
 GXC.midgame.629.a: "Наделяя провинции полномочиями, мы можем построить современную демократию."
 GXC.midgame.629.b: "Через единство нации мы можем восстановить силу Китая."

 ##Popularity Ladder Events (640-659)
 GXC.midgame.640.t: "Два Чжана из ДСП"
 GXC.midgame.640.d: "Хотя ДСП была первоначально основана Чжан Цзюньмаем, Чжан Дунсунем и другими, Чжан Дунсунь и Чжан Цзюньмай стали динамичным дуэтом в руководстве платформой партии. Хотя Чжаны совместно возглавляют партию без особых конфликтов из-за их крепкой дружбы, у этих двух мужчин разные взгляды на свободный Китай. Чжан Цзюньмай, со своей стороны, стал решительным сторонником социал-демократии немецкого стиля и лянистского этатизма.\n\nОднако Чжан Цзюньмай не верит, что демократические реформы снизу вверх могут быть достигнуты, скорее китайская элита должна реализовать такие реформы. Для него даже всеобщее образование не устранит необходимость в элите, поскольку политика требует «преданных патриотов» и «нескольких людей с видением», чтобы нация процветала. Чжан верит, что любые неприглядные действия, необходимые для достижения демократии, будут оправданы результатом, но все больше колеблется в этом вопросе.\n\nЧжан Дунсунь, с другой стороны, находит свои симпатии левее Чжан Цзюньмая. Утопический приверженец взаимопомощи и гармоничного сотрудничества в душе, Чжан мечтает о постепенном и мирном внедрении социализма под руководством политического класса «Буржуазных джентльменов».\n\nЭтот разрыв между двумя Чжанами привел ко многим дебатам между ними, причем большая их часть была сосредоточена на том, как быстро социализировать экономику и в какой степени вдохновения Китай может черпать у Интернационала. Оба согласны, что Китаю не хватает индустриализации или радикализованного пролетариата, будучи сельской нацией. Однако означает ли это, что они должны придерживаться умеренного или радикального подхода к вещам — это большой вопрос, и товарищи по партии внимательно следят за их дебатами. В конечном счете, дебаты между двумя Чжанами ведутся различными мировоззрениями двух мужчин, причем Чжан Цзюньмай несет социал-демократическую традицию немцев, а Чжан Дунсунь — британский демократическо-социалистический идеал, слитый с учениями Лян Цичао."
 GXC.midgame.640.a: "Сельские массы взывают к немедленной реформе против капитализма!"
 GXC.midgame.640.b: "По дороге к свободе нужно идти осторожно, иначе мы рискуем упасть в яму тирании."

 GXC.midgame.641.t: "Демократия среди демократических социалистов?"
 GXC.midgame.641.d: "С каждым днем ДСП становится все больше, поскольку все больше молодых идеалистичных китайцев вступают в ее ряды. Хотя это хорошо для ДСП, есть и сопутствующий негатив. Если есть одна большая вещь, в которую верят многие ведущие члены ДСП, так это то, что элита должна вести страну к мирной реформе в социализм. Хотя элитизм почти универсален среди интеллектуального и политического класса Китая, такой взгляд привел к негативным последствиям для того, как управляется ДСП.\n\nНесмотря на ненависть Чжан Цзюньмая к Демократическому социализму Гоминьдана и авангардистским способам управления вещами и его многочисленную критику автократии милитаристов, он заработал репутацию двуличного человека. Как и его наставник Лян Цичао, Чжан имеет авторитарную жилку, когда дело доходит до руководства партией, консультируясь только с внутренним кругом и часто принимая поспешные решения от имени партии, не получая действительно широкого мнения.\n\nЭто подтолкнуло многих членов-основателей, таких как Чэнь Бошэн, Ло Лунцзи, Цзян Юн, Пань Гуандань и Фэй Сяотун, отойти от партийных дел (если не из партии вовсе), находя трудным работать с Чжаном. Только Чжан Дунсунь и Сюй Фулинь считаются равными Чжану, а остальное руководство партии все больше укомплектовывается студентами Чжан Цзюньмая, что еще больше способствует его автократическим тенденциям.\n\nТакой авторитаризм и правление посредством декретов внутри партии привели к тому, что многие молодые члены разочаровались в лидерстве Чжана, предпочитая вместо этого создавать свои собственные небольшие организации или присоединяться к другим демократическим партиям. Чжан Цзюньмай стоит перед выбором: либо продолжать централизацию власти внутри своей партии, либо начать делиться властью."
 GXC.midgame.641.a: "Поскольку наша Партия должна стать пастырем масс, я буду пасти ДСП."
 GXC.midgame.641.b: "Возможно, Партии следует практиковать идеал, который я проповедую..."

 GXC.midgame.642.t: "Чэнь Цзюнмин, реформатор?"
 GXC.midgame.642.d: "Государственный деятель, не похожий ни на кого другого, первоначальное погружение Чэнь Цзюнмина в китайскую политику заставило его принять множество казалось бы противоречивых идеологий во имя омоложения китайской нации. Выступая за политическую трансформацию снизу вверх, демократическую и мирную, поддерживаемую и опирающуюся на принцип самоуправления, Чэнь выступал против все более автократической природы Сунь Ятсена и его растущего Гоминьдана. Хотя Чэнь человек из народа, он признал, что другие возьмут власть, если он этого не сделает, и оправдал свое продолжающееся использование титула Главнокомандующего.\n\nЗаинтригованный радикальными утопическими идеологиями Запада, Чэнь заинтересовался утопическим анархизмом Кропоткина. Используя анархистские убеждения, он построил свои идеи провинциального самоуправления через образовательную реформу и сельскую реконструкцию. Именно через образовательную поддержку он встретил Ван Цзинвэя, причем последний завязал крепкую дружбу с Чэнем.\n\nЧэнь встречал только больше социалистов через свою образовательную работу. Он разыскал Чэнь Дусю в надежде привлечь поддержку реформистов для своей образовательной политики и назначил его председателем Гуандунской провинциальной образовательной ассоциации. Благодаря своему продолжающемуся левому альянсу Чэнь приобрел известность как прогрессивная сила. Хотя Чэнь Дусю и Тань Пиншань в конечном итоге встали на сторону Суня после раскола Чэнь-Сунь, эти двое мужчин часто думали о своем выборе и задавались вопросом, не встали ли они на неправильную сторону.\n\nПосле переворота 1922 года против Суня Чэнь Цзюнмин увидел, как большая часть его прогрессивного альянса раскололась в пользу Гоминьдана. Несмотря на это, он начал работать с реформистскими левыми, включая группы ВРА и ДСП после своего возвращения. Однако распространенная критика нового левого альянса Чэня заключается в том, что ВРА — это коррумпированная ассоциация, запятнанная милитаристами, а ДСП — это элитарный клуб без массовой привлекательности. Еще предстоит увидеть, сможет ли Чэнь использовать эту новую коалицию или увидит, как она отойдет на второй план, как это было десять лет назад."
 GXC.midgame.642.a: "ВРА защищает провинциальную автономию от автократов в Пекине!"
 GXC.midgame.642.b: "ДСП борется за демократию, чего бы это ни стоило!"

 GXC.midgame.643.t: "ПОИ растет в размерах"
 GXC.midgame.643.d: "Партия федерализма и демократии, Партия общественных интересов, имеет историю, простирающуюся далеко за пределы ее основания в 1925 году. Ее истоки лежат в истории ее основателя, Чэнь Цзюнмина. В молодости Чэнь преследовал карьеру юриста, прежде чем увлечься революционным республиканизмом. Основав Общество Чжэнци со своими друзьями, он проповедовал свои политические идеалы и продвигал антицинское дело своим 30 ученикам в Хайфэне. Политическое ядро Чэня оставалось сильным, вступая в Республиканскую эру, причем многие из его союзников начали свою политическую деятельность в Войне в помощь Фуцзяни.\n\nПартия выступает за Федеральную, Конституционную Демократию в первую очередь, но также призывает к Отмене неравноправных договоров, Мирной экономической реформе, Социальному прогрессу и прозрачности правительства во имя борьбы с коррупцией. В настоящее время партия переживает быстрый рост, благодаря усилиям губернатора Чэня. Однако этот увеличенный размер сопровождается возросшей необходимостью определить свою собственную идентичность. Многие из новых членов — регионалисты, которых националистическое демократическое крыло обвиняет в использовании партии как средства для милитаризма. В молодой гвардии также немало бывших коммунистов, таких как Янь Сичунь и Хуан Динчэнь, которых считают предателями.\n\nВнутренний круг Чэнь Цзюнмина также подвергается все большему огню со стороны различных лагерей партии за централизацию власти. Чэнь Цию, его секретарь и соучредитель Партии Лиги Новой Азии, Партии Датун и, наконец, ПОИ, и Чэнь Яньшэн, в частности, кажутся главными лейтенантами Чэнь Цзюнмина, обладающими огромной властью в партии, к зависти многих. Другие ранние последователи, такие как Чэнь Яохуань и Чэнь Чжунъюэ, также были ранними последователями Чэнь Цзюнмина из Хайфэна. Большое количество Чэней привело к тому, что эту фракцию окрестили Кликой Чэнь (не все они кровные родственники Чэнь Цзюнмина, несмотря на их общий дом), но, возможно, точнее было бы назвать ее фракцией Хайфэна."
 GXC.midgame.643.a: "Этой партии нужна идеалистическая молодежь, чтобы наметить свое будущее!"
 GXC.midgame.643.b: "Партия должна научиться принимать новых друзей..."
 GXC.midgame.643.c: "Пародия на свободу — полагаться на этих паразитов..."

 GXC.midgame.644.t: "Кантонский либерализм в правительстве?"
 GXC.midgame.644.d: "После Опиумных войн Гонконг был передан Соединенному Королевству и оказал значительное влияние на кантонскую политическую культуру через смешение британских и китайских политических традиций. Хотя колонии не хватало демократического представительства при ее западных хозяевах, богатая китайская элита смогла найти способы влиять на местное правительство через экономические рычаги, что также перетекло в политику Гуанчжоу. Чэнь Ляньбо и его круг компрадорских элит представляют величайших из этих торговых влиятельных лиц, использующих свои ополчения, политические связи и конгломераты, такие как Банк HSBC, для контроля основных артерий политической жизни Гуанчжоу.\n\nВ резком контрасте находится Клика политической науки, средняя, но присутствующая сила на Юге. Смешанная история развития как независимой ветви основной революционно-реформистской диатрибы, они предпринимали многочисленные попытки контролировать сменяющие друг друга правительства Гуанчжоу. Сохраняя обиду на Чэнь Цзюнмина за его принудительное смещение КПН Гуанчжоу в 1921 году (и последующее принуждение остатка ассамблеи голосовать за него как за губернатора), их пиком власти стал Пекинский переворот 1924 года, в котором Хуан Фу стал президентом Китая.\n\nИх влияние значительно снизилось после 1925 года, но остатки КПН сохраняют значительное присутствие на Севере. Однако их консервативно-либеральное позерство оставило их без руля или покровителя на Юге. Они цепляются за лидерство Линь Чжэнсюаня, спикера Ассамблеи Гуандуна, который был дважды смещен Чэнь Цзюнмином — сначала в 1921 году, а совсем недавно в 1936 году. Они надеются выжить благодаря свободным связям, как с альянсом милитаристов Ян Симинь-Лю Чжэньхуань, так и со знаменитым банкиром (и братом Чжан Цзюньмая) Чжан Гунцюанем.\n\nС ростом влияния этих консервативных кантонских сил и Чэнь Цзюнмин, и Чжан Цзюньмай изо всех сил пытаются найти союзников в развивающейся политической сфере. Вопрос в том, кто выйдет победителем?"
 GXC.midgame.644.a: "Два Чэня заключают сделку!"
 GXC.midgame.644.b: "Чжан объединяется с КПН."

 GXC.midgame.645.t: "Губернатор и его мэр"
 GXC.midgame.645.d: "В постоянно меняющемся политическом динамизме [ROOT.GetNameDef] подъем все более доминирующего Либерально-консервативного крыла Политической науки стал самым неожиданным и самым тревожным событием, по крайней мере для основных партий Китайской демократической лиги и Великого республиканского альянса. Однажды на пике своей власти после своего назначения немецкими переговорщиками в хаотичном междуцарствии после краха Северного похода Чэнь Ляньбо был «главным человеком» в Кантоне и прилегающих районах. Благодаря своему умному такту, осторожной дипломатии и очевидному богатству он смог договориться о ряде союзов с различными разрозненными фракциями, чтобы представить Единый фронт против доминирования Старой Гуанси в регионе.\n\nПосле инцидента с Торговым корпусом Кантона 1924 года Британия и британские торговцы по-прежнему рассматривались Гоминьданом как лояльные Чэню, даже с его полным изгнанием из города, хотя точная природа этих связей сильно оспаривается. Тем не менее, сдерживая такие контакты, Чэнь завербовал почти ушедшего на пенсию Чэнь Цзюнмина для защиты Гуанчжоу от мародерствующих милитаристов и бандитов после Северного похода, и все же мэр Чэнь в конечном итоге переоценил свои силы. Расставив свои собственные костяшки домино, Цзюнмину нужно было лишь сбить их, чтобы оказаться уже не слугой Ляньбо, а настоящим хозяином. Или так считается.\n\nСнова на подъеме, Ляньбо все больше пользуется благосклонностью Цзюнмина в плане политической и финансовой поддержки, до степени, беспрецедентной с учетом недавней истории. Гуанчжоу — важнейший город, и поскольку губернатор Чэнь приступает к преобразованию нации в рамках Федералистского проекта, нельзя забывать, где все началось. Текущая ситуация предоставляет возможность: дальнейшая интеграция торговцев в Федералистское движение или назначение прямых лоялистов на ключевые должности для обеспечения лояльности и соблюдения требований."
 GXC.midgame.645.a: "Иллюзии плутократии манят правление элиты..."
 GXC.midgame.645.b: "Мы рискуем всеми претензиями на демократию, даже рассматривая мэра Чэня."

 GXC.midgame.646.t: "Чэнь Цзюнмин и Чэни из Хайфэна"
 GXC.midgame.646.d: "Шэньши всегда играли важную роль в китайской политике, управляя и поддерживая порядок в сельской местности и поставляя сменяющим друг друга династиям постоянный поток ученых-чиновников. Сыновья шэньши, успешно сдавшие экзамен и ставшие мандаринами, встречались дома с щедрой похвалой и празднованием своей деревней. Даже когда Имперский экзамен был официально отменен реформаторами поздней Цин, на практике классический идеал джентльмена-ученого-бюрократа никогда не исчезал, он просто эволюционировал.\n\nВ Гуандуне сочувствие шэньши революционерам сыграло важную роль в ускорении падения правления династии Цин во время Синьхайской революции. В юго-восточном уезде Хайфэн Чэнь Цзюнмин стал их последним любимым сыном, подняв свое влияние как юрист и реформатор со своей группой последователей Тунмэнхоя Хайфэна и будучи избранным заместителем губернатора в 1911 году. На протяжении всей его карьеры Хайфэн был основным источником средств и последователей, а также убежищем, когда Чэнь периодически вынужден был скрываться.\n\nВерность была возвращена. Шэньши Хайфэна получили благоприятные назначения при правлении Чэнь Цзюнмина. Расширенный клан Чэнь часто был мишенью социалистической пропаганды — особенно со стороны их ненавистных врагов в лице Пэн Пая и его Ассоциации фермеров Хайфэна. Особого внимания заслуживают три влиятельных брата Чэнь, которые, вероятно, являются двоюродными братьями или родственниками губернатора Чэня.\n\nЧэнь Дашэн был ранним последователем Чэнь Цзюнмина и служил его директором Департамента по связям с общественностью, прежде чем был убит в 1922 году. Чэнь Бохуа был директором Департамента образования Гуандуна, который позже стал редактором газеты. Чэнь Юэбо считался вторым по влиянию человеком в Хайфэне после Чэнь Цзюнмина. Он был первым, кто сплотил шэньши для создания ассоциации вместе с Чэнь Кайтином. Как ярые противники земельной реформы, их растущее влияние в администрации нанесло ущерб репутации Чэня среди крестьян."
 GXC.midgame.646.a: "Любимый сын и его любимый уезд."
 GXC.midgame.646.b: "Но неужели они не могли быть добрее к крестьянам?"

 GXC.midgame.647.t: "АПЗП растет в размерах!"
 GXC.midgame.647.d: "Истоки Ассоциации поддержки зерновой промышленности лежат в реакции шэньши на Ассоциацию фермеров провинции уезда Хайфэн. Основанная Пэн Паем для расширения прав и возможностей крестьянства и сопротивления излишествам землевладельцев, Ассоциация могла насчитывать десятки тысяч членов. В то время мелкие землевладельцы класса землевладельцев, которые боялись проблем и беспокоились о еде, давно последовали резолюции Ассоциации фермеров о том, что «следует платить до трехкратного размера арендной платы», и собирали арендную плату.\n\nПоскольку остальные крупные землевладельцы становились все более реакционными, уездный магистрат и вице-президент АПЗП Ван Цзоси, глава Корпуса обороны Линь Доувэнь и ненавистный шэньши Цю Цзинъюнь решили восстановить организацию Ассоциации поддержки зерновой промышленности и провели собрание в уездном офисе.\n\nПоскольку Чэнь Цзюнмин не только взял под контроль весь Гуандун, но и доминирует в Гуанси, АПЗП быстро росла вместе со своим благодетелем. С ее влиянием в двух Гуанах Ассоциация поддержки вступала во все больший и больший конфликт с Ассоциацией фермеров провинции Гуандун, преемницей Ассоциации фермеров провинции Хайфэн. Со временем все больше и больше шэньши вступают в АПЗП, и каждый удар по социалистическому крестьянскому движению приносит все больше и больше прогресса в их искоренении раз и навсегда.\n\nЛишь квази-одобренные Чэнь Цзюнмином, они стали политическим бременем, так как многие реформаторы осуждают их влияние. Это не осталось незамеченным Демократической социалистической партией, причем Чжан Дунсунь особенно жаждет воспользоваться этим вопросом в надежде превратить ДСП в массовое движение, хотя Чжан Цзюньмай по-прежнему неохотно вредит их союзу с Чэнь Цзюнмином. Чжан предпочел бы, чтобы партия играла более пассивную роль в этом вопросе, сосредоточившись на поддержке горожан и интеллигенции, но это фактически оставит сельские реформы социалистам."
 GXC.midgame.647.a: "Мы осуждаем этот инструмент тирании шэньши!"
 GXC.midgame.647.b: "Никогда не прерывайте своего противника, пока он совершает ошибку."

 GXC.midgame.648.t: "Чэнь Цзюнмин, защитник порядка"
 GXC.midgame.648.d: "Многие хотели бы видеть Чэнь Цзюнмина человеком либерального мира, приверженцем демократических традиций, эгалитаризма и Федералистского движения. Пожимая руки землевладельцам и торговцам, он точно так же пытался ухаживать за анархистами, социалистами и синдикалистами. Под влиянием западных идеалов либеральной демократии и национального федерализма позерство и сплочение Чэня сделали его главным лидером федералистов Юга в начале 1920-х годов, отстаивая дело как одна из его самых доминирующих военно-политических сил.\n\nВ своем эксперименте поворота влево Чэнь заключил мир с печально известным аграрным социалистом и крестьянским героем Пэн Паем и Ассоциацией фермеров Гуандуна. Аналогично, он предложил оливковую ветвь Обществу Шицзе и различным анархистам в Фуцзяни; назначил синдикалистов, таких как Чэнь Дусю, на должности в сфере образования в своей администрации. Но в конечном итоге они обманули его, встали на сторону Сунь Ятсена и работали против Чэня в 1922 году.\n\nИзгнанный из Гуанчжоу в 1923 году, Чэнь впоследствии дрейфовал вправо. Укрепляя свои связи с шэньши, торговцами и милитаристами Бэйяна, его армии, сосредоточенные вокруг Восточного Гуандуна, утвердились как твердые милитаристы. Вступив в союз с такими людьми, как Линь Ху, Хун Чжаолинь, Дэн Бэньинь и Торговый корпус Кантона, восстановление Чэня в Хайфэне привело к возвращению к власти его союзников из шэньши Хайфэна и утверждению Чэня как силы еще раз.\n\nПродолжая доминировать в правительстве Чэня в его новую эру управления, он в значительной степени сформировался как консервативный реформатор, несмотря на все претензии на либерализм. Хотя это не обязательно полезно для морального духа его демократического федералистского движения, любые попытки смягчить связи правительства с его ключевыми союзниками-милитаристами, шэньши и торговцами могут дестабилизировать его правительство."
 GXC.midgame.648.a: "«Правительство остается приверженным либеральной демократии, пока я здесь...»"
 GXC.midgame.648.b: "Мы должны исправлять свои неудачи, чего бы это ни стоило."

 GXC.midgame.649.t: "Доминирование Армии Юэ"
 GXC.midgame.649.d: "Работа милитариста неизбежно ведет к раздорам, интригам и предательствам. Конечно, Чэнь Цзюнмину этот факт не чужд. Будучи политиком, милитаристом, командиром и государственным деятелем со времен Синьхайской революции, он, безусловно, повидал немало борьбы. Сражаясь против Гоминьдана, он также конфликтовал с такими милитаристами, как Лун Цзигуан, Фан Шэнтао и Лу Жунтин. Заключал сделки с самыми влиятельными людьми в стране, такими как Дуань Цижуй и У Пэйфу. Что особенно важно, он заключил прочные союзы и дружбу с такими людьми, как Чжао Хэнти и Тан Цзияо, или Чэнь Ляньбо, ближе к дому.\n\nОднако на протяжении второй половины своей карьеры он редко мог найти действительно надежных или преданных подчиненных. Но те немногие, которых он приобрел, оформились в Армию Юэ. Отстаивая дело Чэня даже в его самый темный час, мечом и щитом гуандунского федералиста долгое время управлял некто Е Цзюй; второе имя Жоцин. Кто поддерживал Чэня, когда он уходил в самоизгнание, много раз? Е Цзюй. Кто собирал армии и организовывал перевороты, даже когда Чэнь колебался? Е Цзюй. И кто поддерживал Чэня в любом сценарии? Е Цзюй. Хотя, конечно, есть споры о том, насколько независимыми были действия Е от замыслов Чэня.\n\nАрмия Юэ служит в основном политической машиной Чэня и Е, силой, навязывающей их идеологические цели нации. Состоящая из различных гражданских партнеров, таких как Хуан Цян, опубликованный социолог и верный последователь Чэня, Ма Юйхан, секретарь и финансист Чэня, знающий его с 1900 года. Вэн Шилян, наставник Чжан Факуя, Инь Цзи, друг Дэн Кэна и подчиненный, позже соперник Хун Чжаолиня, или даже Чжун Цзинтан, один из старейших друзей Чэня и союзник АПЗП. В целом, Чэнь собрал удивительно преданных последователей, но многие опасаются, что его патронажная сеть просто послужит заменой милитаристам, вместо того чтобы уйти от них."
 GXC.midgame.649.a: "«В мире, полном змей, Жоцин был моим единственным другом»."
 GXC.midgame.649.b: "Насколько истинной может быть наша приверженность демократии, если мы правим пулей?"

 GXC.midgame.650.t: "Дэн Бэньинь, прогрессивный милитарист?"
 GXC.midgame.650.d: "В прославленных залах близких союзников Чэнь Цзюнмина никто не проявляет себя более независимо мыслящим, чем регионалист Цюнъя Дэн Бэньинь. Сам «Король Цюнъя» даже не уроженец острова, он родился в деревне Датоу в Гуандуне и занял регион только в январе 1921 года. Однако до этого Дэн был скромным подчиненным Чэня, став основным членом ранней Армии Юэ наряду с такими людьми, как Сюн Люэ и Хун Чжаолинь.\n\nЭнергичный, преданный реформатор, Дэн превратил Цюнъя из захолустья в средний рай. Расширяя дороги, строя набережные, снося старую заброшенную архитектуру и перестраивая форты, он начал продвигать синонимичную форму «федерализма» для народа Цюн. Создав свою собственную независимую Клику Цюнъя, его роль против Старой клики Гуанси в 1921 году заслужила похвалу от Чэнь Цзюнмина. Сформировав Коалиционную армию восьми подчиненных, Дэн расширил свою территорию в Гуандун после поражения Чэня.\n\nРешив не помогать ни Суню, ни Чэню в 1924 году, он занял срединную позицию, продолжая свои «реформы» в Южном Гуандуне. Увеличивая налоги и трудовую повинность, он массово выпускал валюту, разрешил азартные игры и опиум, выдавал права на добычу полезных ископаемых в Цюнъя, занял 30 миллионов долларов у Соединенных Штатов и основал Промышленный банк Южного Гуандуна в Хайкоу. Со всеми этими дополнительными средствами он быстро улучшил дороги, порты и инфраструктуру и даже попытался превратить свою территорию в провинцию Гуаннань.\n\nВернувшись после Северного похода, Дэн, безусловно, продолжил свою прогрессивную линию. Однако многие сопротивляются поддержке Чэнем Дэна, учитывая, что «Король» в конечном счете является милитаристом в классическом смысле — авторитарным и регионалистом. Добавляя боеприпасов пушкам его врагов, терпимость Чэня к таким людям, как Дэн, оказалась достаточной темой для разговоров среди оппозиции, хотя удаление такого ключевого союзника может оказаться катастрофическим."
 GXC.midgame.650.a: "«Он был гораздо более лоялен, чем любой из вас!»"
 GXC.midgame.650.b: "Даже «реформистские» милитаристы все равно угнетатели народа."

 GXC.midgame.651.t: "Мелкие милитаристы Лянгуана"
 GXC.midgame.651.d: "Поскольку Чэнь все больше полагается на не самых блестящих личностей для укрепления своего движения, многие стали задаваться вопросом о точных целях Гуандунского федералистского проекта. Укомплектованные различными милитаристами пророческого усердия или даже откровенного корыстолюбия, Объединенные провинции Чэня стали сродни прославленному прикрытию для продолжения практики милитаризма. С такими людьми, как хайнаньский милитарист Дэн Бэньинь, стоящий рядом с Чэнем, он также видел, как другие старые союзники-милитаристы снова вступают в его ряды, даже среди всех новых друзей.\n\nЛинь Ху из Старой клики Гуанси долгое время был фигурой, сочувствующей революции, хотя и не обязательно союзником Чэня. Одноклассник знаменитых Ли Лецзюня и Цай Э, Линь в конечном итоге пошел другим путем, нежели его бывшие друзья. Сотрудничая с Сюн Кэу и другими, Линь в конечном итоге оказался подчиненным Лу Жунтина после участия в Войне в защиту нации. Милитарист, соперничающий с самим Чэнем, Линь сражался против Чэня в прошлом, но присоединился к Чэню после его возвращения к власти.\n\nАналогичным образом Хун Чжаолинь, еще один милитарист своего калибра, снова оказался с такими, как Чэнь. Местный милитарист Чаомэй, он был одним из самых строгих активистов против Сунь Ятсена и яростно сражался от имени своего хозяина. Однако причастность Хуна к преступному миру далеко не неясна, и хорошо известно, что он управляет опиумной сетью, причем убийство Дэн Кэна сильно связывают с ее обнаружением. Среди других заслуживающих внимания — такие, как Лю Чжэньхуань, революционер из КПН с нерешительной приверженностью демократии и федерализму, или даже Хуан Давэй, еще один мелкий милитарист региона, который сформировал режим Объединенных сил.\n\nПоскольку так много мелких местных милитаристов примыкают к движению Чэня на протяжении всего его пребывания на посту политика, многие из его критиков ставят под сомнение, является ли это просто моделью обстоятельств и прагматизма или же самым основным движущим фактором идентичности Федералистского движения."
 GXC.midgame.651.a: "Движение федералистов или движение милитаристов?"
 GXC.midgame.651.b: "Несколько паршивых овец не могут испортить все стадо, верно?"

 ##UPC Phase III Democratic Enthusiasm Events (660-679):

 GXC.midgame.660.t: "Горький реализм поглощает движение"
 GXC.midgame.660.d: "Никогда не было одного-единственного великого события, которое внезапно вызвало это, и все же чувство почти универсально во всем [GXC.GetNameDef]. Это чувство горького недомогания, растущее медленно, но верно через струйку многих, более мелких инцидентов, пока даже самый большой оптимист не стал совершенно пресыщенным.\n\nБыли некоторые случаи, которые легко определить, которые привели к этому моменту. Чэнь Гуншу и его Торговый корпус Фошаня обвиняются в превращении деревни Чжанча в свое личное феодальное владение, применяя внесудебные тюремные заключения и наказания во имя их «автономной ассоциации». Истории о местных выборах, отмененных после обвинений в массовых фальсификациях, различных злоупотреблениях со стороны солдат и безразличном поведении бюрократии.\n\nНа более высоком уровне крупные и мелкие милитаристы начали доминировать в движении — ставя под сомнение авторитет центрального правительства. Влиятельные элиты, будь то в правительстве, армии, шэньши, торговцы или иностранцы, открыто выставляют напоказ судебные решения, причем единственным средством правовой защиты являются взятки или обращение к еще более сильным людям.\n\nОднако хуже всего чувство, что никому нет дела. Что президент [ROOT.GetLeader] и его люди слишком заняты коррупцией и накоплением власти, чтобы беспокоиться о решении растущих проблем в Китае. Что интеллектуалы, которые так гордо отстаивали федералистские идеалы, слишком горды, чтобы признать, что их одурачили. Что ничего не изменилось с 1911 года, и ничего никогда не изменится."
 GXC.midgame.660.a: "Возможно, так всегда был устроен Федерализм, мы просто были слишком слепы, чтобы это увидеть."
 GXC.midgame.660.b: "Еще не поздно изменить все к лучшему, если только мы попытаемся!"

 GXC.midgame.661.t: "Междоусобица пожирает реформистов"
 GXC.midgame.661.d: "Иногда кажется, что каждый раз, когда Федералистское движение делает один шаг вперед, оно в итоге делает два шага назад. И для прогрессистов и демократов, которые когда-то стекались в это движение, [GXC.GetNameDef] далеко позади того, где они должны быть.\n\nТочные причины и решения этого кризиса веры остаются неуловимыми. И для тех, кто ищет решения в прошлом, они обнаружат, что история не была очень добра к реформистам, теряющим свой импульс. Даже в недавней истории ни Объединенная лига национального строительства, ни Федерация китайских демократических партий не имели особого единого направления в своем кратком существовании, склонные к междоусобицам среди своих составных групп, что обрекало их на отсутствие даже намека на власть.\n\nВеликая республиканская лига, которую собрал Чэнь Цзюнмин, должна была изменить это, объединив альянс демократических и конституционалистских фракций для построения новой китайской республики. Но никто, похоже, не согласен, где именно все пошло не так, кроме того факта, что по какой-то непостижимой причине это произошло. Было ли это потому, что президент Чэнь не проявил достаточно сильного лидерства? Или потому, что он был слишком силен? Была ли оппозиция виновата из-за своей неспособности контролировать его эксцессы или потому, что они не позволили правительству управлять? Не удается ли провинциям демократизироваться из-за отсутствия федерального вмешательства или его избытка?\n\nТрещины в единстве Федералистского движения начали изнашивать Великую республиканскую лигу, и все больше и больше исполнительных указов президента начали преобладать над Национальной ассамблеей. Возможно, больше беспокоит откат демократии в провинциях, где местные милитаристы и военные власти Армии Юэ часто оказывают давление на провинциальные законодательные органы. Приходится задаваться вопросом, есть ли что-то хорошее в поле зрения."
 GXC.midgame.661.a: "Федерализм начинает терять свой блеск среди реформистов."
 GXC.midgame.661.b: "Но, может быть, мы сможем вернуть немного этого блеска."

 GXC.midgame.662.t: "Злоупотребления шэньши и Армия Юэ"
 GXC.midgame.662.d: "Армия [GXC.GetAdjective] должна быть силой освобождения, а Армия Юэ должна быть примером не только на поле боя, но и дома. Их поведение при подавлении сельских повстанцев оказалось отрезвляющей проверкой реальности для многих, ослабив взгляды на движение для многих недавно инициированных.\n\nЧэнь Цзюнмин и его люди во многом сильно связаны с шэньши Гуандуна (особенно уезда Хайфэн). Чэнь родился в семье ученых-шэньши, как и многие из его высших офицеров как в армии, так и в правительстве (многие из которых также являются частью его расширенного клана). Шэньши помогали Чэню быстро набирать солдат для своих кампаний и сохранять свою власть — через свои средства, своих хорошо образованных сыновей и свой контроль над крупными учреждениями. В свою очередь, Чэнь щедро вознаграждал их назначениями на выгодные должности (особенно в качестве сельских магистратов, что помогало им легитимизировать и консолидировать свою власть) и защитой их от социалистических революционеров.\n\nЧэнь, к его чести, пытался заключить справедливый мир с сельскими активистами, такими как Пэн Пай, как минимум ради укрепления своих реформистских полномочий. Но в конечном итоге он может отклониться лишь настолько от того, что, возможно, является его второй по важности базой власти после Армии Юэ.\n\nНасколько переплетены эти двое, можно проиллюстрировать случаем братьев Чжун, оба чиновника, родившиеся в Хайфэне, как говорят, являются родственниками Чэнь Цзюнмина. Чжун Сюнань — старший из пары и соучредитель Тунмэнхоя Хайфэна с Чэнем. Говорят, что он бывший анархист, он служил как на военных, так и на гражданских должностях — в том числе в качестве магистрата Хайфэна. Чжун Цзинтан учился в школе Сейджо в Японии, чтобы стать военным офицером, и помог Чэнь Цзюнмину основать «Автономную газету Хайфэна». Находясь в Хайфэне, они стали мишенью социалистической пропаганды, обвиняемые в сговоре с местными шэньши в ряде злоупотреблений против местных крестьян."
 GXC.midgame.662.a: "Чжуны — хорошие люди, просто обеспечивающие соблюдение закона против бандитов."
 GXC.midgame.662.b: "Может быть, Армия Юэ могла бы показать людям более доброе лицо?"

 GXC.midgame.663.t: "Башня из слоновой кости и массовые движения"
 GXC.midgame.663.d: "Дельта Жемчужной реки всегда была относительным убежищем для политической мысли в Китае, причем различные интеллектуалы и активисты, которые сталкивались с китайскими властями, часто решали бежать в Гонконг за укрытием. Формирование Посольских городов ужесточило некоторый контроль над свободной прессой (в частности, призывы к колониальной демократии и антиконцессионизму), но по сравнению со многими районами Китая Гонконг и Гуанчжоу считаются убежищем для политического дискурса. В результате он был популярным центром операций для различных диссидентов, таких как те, кто в ФКДП.\n\nРаспространение различных газет, журналов и других издательских компаний (хотя часто индивидуально недолговечных) говорит о живой политической сцене. ДСП, например, известна тем, что издает еженедельную «Цзайшэн» (Возрождение) и откровенные ежедневные газеты «Гоцзя Шэхуэй». У ФКДП была одна под названием «Гуанмин» (Свет), в то время как гонконгское отделение МКП издает «Тань Хайдэн». Чэнь Цзюнмин и его союзники были вовлечены в серию недолговечных газет, начиная с «Автономной газеты Хайфэна» и временной «Газеты Кэ» (Согласие). Он также когда-то писал для анархистской «Миньсин Жибао» (Ежедневные новости Звезды Фуцзяни) и марксистской «Гуандун Цюньбао», хотя прекратил по понятным причинам. Даже шэньши издавали «Луань Дэйли».\n\nПеревод слов в массовую привлекательность — это то, с чем реформисты часто боролись, особенно по сравнению с более успешными революционерами в Гоминьдане и КСП. Часть этого, по крайней мере, была нанесена ими самими. В то время как ДСП, например, заявляет, что целью их партии является «пробуждение общего сознания нации», Чжан Цзюньмай проявил нерешительность в принятии массового движения, как его революционные социалистические сверстники. Его метафизические дискуссии о синтезе восточной и западной философии и духовных ценностей, хотя и увлекательные для его интеллектуальных коллег, мало что сделали для репутации его партии как группы элитистов."
 GXC.midgame.663.a: "Возможно, стоит обуздать прессу, прежде чем они начнут сеять инакомыслие."
 GXC.midgame.663.b: "Возможно, пришло время нам начать расширять нашу аудиторию до масс."

 GXC.midgame.664.t: "Демократическое движение активизируется"
 GXC.midgame.664.d: "Когда впервые было создано правительство федералистов Гуанчжоу, собравшиеся демократы, конституционалисты и регионалисты почти единогласно согласились, что их целью будет реформирование обещанной Республики 1911 года: испорченной реакционерами Бэйяна и революционными радикалами.\n\nПо мере того как Федералистское движение начинает расти, единство различных фракций, составляющих его, начало трещать по швам. Для различных реформистских социалистов, прогрессистов и даже некоторых левых либералов простого восстановления Бэйяна уже недостаточно. Со столькими погибшими и столькими принесенными жертвами они начали представлять себе республику, отличную от старых махинаций, которые характеризовали Бэйян в его лучшие времена. Они начали требовать демократизации не только политики, но и общества и экономики — высокая цель для правительства, которое даже не закончило объединение Китая.\n\nИх призывы к переменам, и переменам сейчас, начали сталкиваться с различными консервативными республиканцами, милитаристами, бюрократами и магистратами, и даже лидерами их собственных партий, у которых часто стиль принятия решений «сверху вниз». Для этих людей продвижение конституционализма, региональной автономии и защита хрупких институтов Китая имеют приоритет, и они боятся ущерба, который могут нанести радикальные перемены. Для них статус-кво в пределах Федеральных границ — это то, за что они борются в своем стремлении объединить Китай, и все, что выходит за рамки этого, в лучшем случае безрассудно, в худшем — внутренний саботаж.\n\nПоскольку первая группа начинает набирать силу, она начала отчуждать вторую, угрожая расколом, который делит даже внутри партий и клик. Миллионы федералистов должны будут коллективно принять решение рано или поздно о том, чего именно хочет их движение."
 GXC.midgame.664.a: "Разве конституционная, федеративная республика — не мечта, за которую стоит бороться?"
 GXC.midgame.664.b: "Не смеем ли мы мечтать об обществе без штыков и взяток?"

 GXC.midgame.665.t: "Федералистский романтизм рушится"
 GXC.midgame.665.d: "С пиком федерализма по всей стране, сохранение приверженцев внутренне децентрализованной и демократической идеологии управляемыми стало серьезной проблемой. Надежда на демократические перемены опередила способность правительства их реализовать. По мере нарастания давления и диалога движение изо всех сил пыталось найти последовательное послание.\n\nНекоторые ранние федералисты, такие как Чжан Тайянь и Чэнь Цзюнмин, были вдохновлены анархизмом, причем Чжан считал в то время, что национальная конституция, парламент и президентство были «тремя самыми смертельными ядами» в Китае, потому что они приведут Китай к централизму или бесконечным гражданским войнам. Он считал, что американская и немецкая системы вызывали бесконечные проблемы, поскольку они продолжали двигаться по централистской траектории, хотя отвергал анархистов, таких как Общество Шицзе, за их чрезмерный национализм и социал-дарвинизм. Чжан отвергал либеральную демократию и капитализм в пользу даосских и буддийских влияний, а также вдохновлял группы, такие как МКП, и федералистов, таких как Тан Цзияо.\n\nДругие, такие как Чжан Цзюньмай и Ло Лунцзи, в целом предпочитали немецкий и американский подходы к либеральной и социал-демократии, причем Чжан на самом деле был относительно мягок в своей критике Конституции Цао Куня 1923 года. Хотя он считал ее несовершенной, большая часть его критики касалась ее исполнения, а не содержания. Чжан считал, что власть и свобода незаменимы и дополняют друг друга для нации с отдельными сферами деятельности. Правительство должно иметь достаточно власти для обеспечения эффективности и скорости, но люди должны иметь свободу в социальных и культурных вопросах. Однако недавние поиски Чжана по созданию «третьего типа правительства», сочетающего сильные стороны диктатуры и парламентского правления, вызвали удивление.\n\nБольшинство, как и Чэнь Цзюнмин, оказываются где-то посередине — стремясь к Федеративной республике с балансом между центральным правительством и провинциями. Демократия, надеются они, будет медленно строиться оттуда."
 GXC.midgame.665.a: "Через свободу люди развиваются, и в этом заключается источник силы нации."
 GXC.midgame.665.b: "Настоящее самоуправление будет достигнуто не сверху вниз, а снизу вверх!"

 ##UPC Digesting Other Factions Event Chain (680-699):

 GXC.midgame.680.t: "Ли Цзишэнь и перебежчики из Гоминьдана"
 GXC.midgame.680.d: "Отношения Чэнь Цзюнмина с революционными левыми, как и у всего движения федералистов, были напряженными. Его соперничество с Сунь Ятсеном за влияние на левые группы, включая анархистов и синдикалистов, оставило его ни с чем, и с тех пор он заменил эти связи гораздо более совместимыми левыми реформистами, в частности Чжан Цзюньмаем и Чжан Дунсунем. Однако теперь, когда [GXC.GetNameDef] захватило контроль над восточными провинциями, всплыли напоминания о его прошлом.\n\nРанние кампании Чэня проходили в Фуцзяни, где он служил главнокомандующим, формально действуя от имени правительства Сунь Ятсена. Там он отметился сотрудничеством с различными анархистами, проводя образовательные, социальные и управленческие реформы. До сих пор ведутся жаркие споры о том, насколько искренним был этот союз или же он просто терпел их; к тому же оккупация не всегда была гладкой — многие офицеры Гуандунской армии сотрудничали с местными милитаристами и погрязли в коррупции. Регион Миньгань изменился с 1920-х годов, став очагом революции под руководством повстанцев Гоминьдана после Северного похода.\n\nОтношения Чэня с Чэнь Дусю, будущим основателем КПК, претерпевали схожие взлеты и падения. Чэнь Дусю был признанным просветителем и пользовался защитой Чэнь Цзюнмина, несмотря на недовольство консерваторов, однако в итоге первый решил уйти в отставку. В 1922 году он решил связать свою судьбу с Гоминьданом, осудив Чэня как милитариста, в то время как многие другие интеллектуалы, ранее симпатизировавшие ему, такие как Тань Пиншань и Чэнь Гунбо, были оттеснены на второй план.\n\nХотя отношения Чэня с высшим руководством Гоминьдана к этому моменту безнадежно испорчены, многие левоцентристы добиваются вхождения в наше правительство Ли Цзишэня, их ведущего генерала. Имея репутацию честного человека и сторонника реформистского крыла партии, он стремится способствовать приходу других перебежчиков, таких как Чэнь Миншу и Тань Пиншань, однако многие смотрят на них с подозрением."
 GXC.midgame.680.a: "Всё что угодно, лишь бы ослабить притягательность революционеров."
 GXC.midgame.680.b: "Ли Цзишэнь и его близкие друзья могут остаться, но остальные опасны."

 ##UPC Phase III Focus Tree Events (700-729)

###Section 3e (800-999): Mid Game NPA Political Events

##NPA Nanning Conference (800-829)
 GXC.midgame.800.t: "Конференция в Гуанчжоу"
 GXC.midgame.800.d: "Лу Юйгуан разослал гонцов по всему Лянгуану, приглашая милитаристов, политиков и интеллектуалов в Гуанчжоу на конференцию, якобы для обсуждения восстановления двух провинций, а также для дискуссии о национальном объединении. Значение этого шага было сразу понято приглашенными, которые начали собираться в городе.\n\nГуанчжоу является оплотом остатков старой Гуандунской клики; провести конференцию в этом городе — значит утвердить господство над Чэнь Ляньбо и его союзниками. Этот город также был фактической столицей нескольких южных правительств, и, собирая здесь южных лидеров, Лу демонстрирует желание пойти по стопам отца и возглавить альтернативное правительство на юге.\n\nЛу и триумвират «Молодой клики Гуанси» представят свои претензии на лидерство, используя две провинции как платформу для объединения южных провинций против северной тирании. Это смелый ход, учитывая, что Север традиционно выигрывал большинство войн за объединение и продолжает доминировать. Но маршала Лу это не остановит — либо Север и Юг объединятся на равных условиях, либо будет война."
 GXC.midgame.800.a: "Лу Юйгуан — истинный сын своего отца!"
 GXC.midgame.800.b: "Но в этом замешано и множество других..."

 GXC.midgame.801.t: "Альянс национальной защиты"
 GXC.midgame.801.d: "Возник новый Альянс национальной защиты, похоже, твердо решивший предпринять еще одну попытку объединения нации. Возглавляемое гуансийским милитаристом Лу Юйгуаном, приемным сыном легендарного Лу Жунлина из первоначального движения, стремившегося свергнуть Юань Шикая после его попытки объявить себя императором Хунсянь, это новое правительство стремится сплотить различные южные провинции в единую коалицию против северной тирании. Кто присоединится к ним и какую позицию они займут по отношению к своим соперникам, еще предстоит увидеть, но пока что на юге царит воодушевление."
 GXC.midgame.801.a: "Но смогут ли они достичь того, что не удалось их предшественникам?"
 GXC.midgame.801.b: "Милитаристы объединяются с другими милитаристами."

 GXC.midgame.802.t: "Лу Юйгуан настаивает на объединении"
 GXC.midgame.802.d: "Лу Юйгуан, Молодой маршал Юга, перешел сразу к делу. Выступая перед собравшимися делегатами, он предложил различным южным провинциям объединиться, чтобы ими не могли так легко помыкать северные правительства. Вряд ли это новая концепция: она предпринималась несколько раз различными милитаристами, но внутренние разногласия и окончательная победа Гоминьдана разрушили эти проекты.\n\nУ маршала Лу есть сила, чтобы обеспечить выполнение этого указа, по крайней мере, в Лянгуане. Он — темная лошадка в масштабах страны, но носит фамилию своего приемного отца, которая остается узнаваемой. Кроме того, существует множество путей к объединению, и он может извлечь выгоду из этой неопределенности.\n\nХотя он заявил о своем намерении прекратить признание власти чжилийцев, это может быть тактикой переговоров. Объединение силой будет трудным и дорогостоящим делом, и формирование конкурирующего правительства может быть просто уловкой для получения преимущества в будущих переговорах с Чжили или другой фракцией. Другой насущный вопрос заключается в том, сможет ли он убедить других за пределами Лянгуана присоединиться к нему в его походе. Даже те, кто идеологически не против Лу, могут вступить в конфликт с его правительством из-за личной вражды или амбиций."
 GXC.midgame.802.a: "Агрессивный курс действий — наша лучшая ставка на победу!"
 GXC.midgame.802.b: "Оборонительный, дипломатический подход обеспечит наше выживание."

 GXC.midgame.803.t: "Нежелание регионалистов"
 GXC.midgame.803.d: "Несмотря на помпезную прокламацию Лу Юйгуана, среди милитаристов Лянгуана сохраняется значительное сопротивление войне. Подавляющее большинство его лейтенантов и союзников можно классифицировать как регионалистов — тех, кто больше заинтересован в местных делах и сохранении местной автономии, чем в войне за объединение. Война приносит разруху, высокие налоги и политическую централизацию — ничто из этого не выглядит привлекательным.\n\nТем не менее, все, кроме самых узколобых, понимают, что объединение в той или иной форме неизбежно, и единственный способ гарантировать, что оно произойдет на их условиях — это использовать военную силу для получения уступок. Для Шэнь Хунъина и его союзников в Шаогуане решение уже принято. Чжилийцы и их немецкие союзники поддерживали его правление почти десять лет, поставляя оружие, деньги и даже склоняя его генералов в свой лагерь. Поиск нового соглашения с одним из правительств Чжили — приоритет Шэня. У Чэнь Ляньбо и Гуанчжоу чуть больше гибкости, но лишь отчасти. Их автономия защищалась в первую очередь иностранными интересами, хотя с началом Второй гражданской войны в Америке, ростом японского влияния в регионе и предпочтением Германии в пользу Старой клики Гуанси, они начали дрейфовать в круги Аньгоцзюнь.\n\nПохоже, их позиции по формированию альтернативного правительства были определены за них — ни у кого из них нет сил бросить вызов Лу после этой прокламации. Но ему следует быть осторожным в своих следующих шагах, потому что одно дело сформировать правительство, и совсем другое — начать за него войну."
 GXC.midgame.803.a: "Регионалисты стекаются к Шэнь Хунъину и его клике."
 GXC.midgame.803.b: "Регионалисты встают на сторону Чэнь Ляньбо и его правительства."

 GXC.midgame.804.t: "Демократы и объединение"
 GXC.midgame.804.d: "Среди демократов Лянгуана мнения об объединении разделились. Объединение принесет мир, который, как многие надеются, позволит в конечном итоге демократизировать правительство или, по крайней мере, усилить гражданские власти и ослабить ограничения гражданских свобод. Но создание конкурирующего правительства и ведение войны за него неизбежно станет разрушительным для различных демократических партий и гражданских групп, которые часто выходят за границы провинций и будут страдать от условий военного времени.\n\nСуществует надежда, что возможность войны встряхнет существующий статус-кво и заставит различные стороны легитимизировать себя, работая с демократическими группами, но возобновление насилия может в конечном итоге отодвинуть их на второй план в пользу военных. Таким образом, различные демократические лидеры вынуждены идти по опасной дороге, демонстрируя свою лояльность и полезность новому правительству, не отталкивая при этом потенциально своих покровителей на севере.\n\nДве партии, которые могут выиграть от этого больше всего — это Демократическая социалистическая партия под руководством Чжан Цзюньмая, у которой есть несколько отделений на севере, но которая в основном перебазировалась в Гуанчжоу, и Партия общественных интересов (Чжигундан), черпающая свое влияние в основном от старых союзников Чэнь Цзюнмина в Гуандуне и пожертвований зарубежных китайцев. Хотя они и не полностью поддерживают ни одну из основных фракций, им есть что терять меньше всего, поддержав новое правительство."
 GXC.midgame.804.a: "Лу Юйгуан работает над укреплением своей легитимности через ДСП и Чжигундан."
 GXC.midgame.804.b: "Лу лучше успокоить своих прежних союзников."

 GXC.midgame.805.t: "Правительство национальной защиты"
 GXC.midgame.805.d: "Несмотря на предстоящий трудный путь, в конечном счете маршал Лу добился своего. Делегаты, хотя некоторые и выражали озабоченность по поводу возможности войны, сплотили ряды вокруг него, когда он объявил о намерении сформировать новое Правительство национальной защиты.\n\nВступая в свою новую роль Президента, он клянется мудро править и спасти республику. На данный момент ситуация остается фактически такой же, как и прежде: триумвират по-прежнему правит Гуанси, Шэнь Хунъин правит Шаогуанем, Чэнь Ляньбо — Гуанчжоу. Но возвышение Лу Юйгуана из просто еще одного милитариста, воспринимаемого как марионетка сверстников из Старой Гуанси, в потенциального регионального, если не национального, лидера стало ощутимым. Колеблющиеся генералы и воинские части встали в строй, различные лидеры выстроились за ним, а интеллектуалы начали петь ему дифирамбы.\n\nЕго первое решение будет простым, но потенциально решающим. Перенос его личной оперативной базы из Наньнина в Гуанчжоу поможет ему укрепить свою легитимность, но поместит его глубоко на «чужую» территорию."
 GXC.midgame.805.a: "Президент Лу вступит в должность в Гуанчжоу."
 GXC.midgame.805.b: "Верховное командование базируется в Наньнине."

##NPA Popularity Ladder (830-859)

 GXC.midgame.830.t: "Новые трюки старого милитариста"
 GXC.midgame.830.d: "В Китае эры милитаристов политическая популярность обычно следовала за военной силой, и Чэнь Цзюнмин мало чем отличался — его политическая удача часто колебалась в зависимости от успехов на поле боя. Хорошо образованный представитель знати уезда Хайфэн, он добился влияния через Временную ассамблею Гуандуна, а позже как генерал Синьхайской революции. Он оказался способным командиром и логистом, собрав несколько армий в борьбе против гуансийских милитаристов, а позже и против Гоминьдана. Но бои с Гоминьданом стали причиной его краха, и он был вынужден бежать в изгнание, пока после завершения Северного похода не нашел себе роль командира, поддерживаемого знатью и связанного с правительством Чэнь Ляньбо.\n\nКогда он потерпел поражение в битве в 1936 году, большинство предположило, что это будет фактический конец его влияния, так как он был вынужден бежать в Гонконг с ухудшающимся здоровьем. Но увы, фортуна снова повернулась к нему лицом, и его трудолюбивые союзники, в частности из Партии общественных интересов, позволили ему оказывать влияние, настаивая на национальном объединении в рамках федералистской системы. Он кажется по большей части безобидным, но с ростом их власти появляются определенные опасения."
 GXC.midgame.830.a: "Давайте подрежем его влияние, как сможем."
 GXC.midgame.830.b: "Его взгляды могут оказаться полезными для наших целей."

 GXC.midgame.831.t: "Возрождение клики Юэ"
 GXC.midgame.831.d: "Несмотря на поражение в 1936 году, остатки клики Юэ Чэнь Цзюнмина сохранили некоторую устойчивую популярность в новом порядке. Большая часть старой армии Юэ и даже некоторые из их командиров были поглощены нашими союзными вооруженными силами, в то время как поддерживаемая дворянством Ассоциация поддержки зерновой промышленности, которая была тесно связана с Чэнь Цзюнмином, сменила свою лояльность в нашу пользу. Партия общественных интересов и их связи с Хунмэнь (Триадами) также обнаружили рост своего влияния в правительственных кругах.\n\nНаши решения позволили развиться определенному партнерству со старой кликой Юэ, даже если временами нам нужно держать дистанцию. Продолжение эксплуатации этого союза может открыть новые пути для извлечения выгоды из этих отношений."
 GXC.midgame.831.a: "Опытные офицеры армии Юэ помогают нашим военным."
 GXC.midgame.831.b: "Союзы со знатью стабилизируют сельскую местность."
 GXC.midgame.831.c: "Единство с Чжигундан и другими приближает нас к объединению."

 GXC.midgame.832.t: "«Мятежный отрок»; Гуансийский плейбой"
 GXC.midgame.832.d: "В залах клик Гуанси мало имен, столь же обвиняемых в предполагаемых преступлениях против Старой клики Гуанси, как имя Лю Чжэньхуаня и его Гуансийской армии. Будучи ранним лидером Гуансийского Тунмэнхуэя, Лю считался одним из главных представителей революции в Гуанси, сражаясь в Синьхайской революции и Второй революции.\n\nВернувшись для участия в Войне в защиту республики, он переметнулся к Старой клике Гуанси в 1917 году, но в 1920 году, вступив в тайные переговоры с Гуандунской кликой Чэнь Цзюнмина, снова перебежал в обмен на должность командира Первой дивизии Гуансийской армии. В последовавшей 1-й Юэ-Гуйской войне Лю помог на время уничтожить Старую клику Гуанси, погрузив регион в «Эпоху героев».\n\nБудучи пешкой в большой шахматной игре Сунь Ятсена против Чэня, Лю в конечном итоге сражался за Суня, был назначен альтернативным членом ЦИК Гоминьдана и губернатором Гуанси, прежде чем взять свою Гуансийскую армию и, вместе со своим союзником Ян Симинем, восстать в 1925 году после смерти Суня, якобы надеясь стать губернатором Гуанси при Тан Цзияо. Потерпев поражение, он был отправлен в изгнание в Гонконг.\n\nКак член клики «Политической науки» через связи с Ян Юнтаем, Шэнь Хунъином и Ян Симинем, возвращение Лю в политику Лянгуана при Чэнь Ляньбо вызвало сильную враждебность со стороны Старой клики Гуанси, которая клеймит его как предателя, второго У Саньгуя или «Мятежного отрока».\n\nОднако шаткая решимость и дисциплина Лю 1920-х годов практически исчезли в Гонконге; пристрастившись к азартным играм и кутежам, Лю стал чем-то вроде плейбоя. Харизматичный, склонный к излишествам, благодаря дружбе с такими фигурами, как Ло Лунцзи, а также Лун Юнем из Юньнаньской клики, и своей функциональной роли лица «Политической науки» в Лянгуане, он получил определенный рычаг влияния в регионе, не говоря уже о людях под его командованием или Ян Симине и Линь Ху."
 GXC.midgame.832.a: "Мы вряд ли можем унижать человека за его беды."
 GXC.midgame.832.b: "Государственное управление — не место для хронических наркоманов."

 GXC.midgame.833.t: "Западный либерализм в сегодняшнем Китае?"
 GXC.midgame.833.d: "Поддерживающая сила в китайской политике, клика «Политической науки» (Чжэнсюэси) берет свое начало в парламентском расколе Гоминьдана после убийства Сун Цзяожэня Юань Шикаем. Когда оставшиеся члены парламентского Гоминьдана — те, кто не сражался во Второй революции — сформировали Демократическую конституционную партию (Миньсянь) в 1913 году, такие фигуры, как Чжан Яоцзэн и Гу Чжунсю, объединились, чтобы практиковать конституционную политику и укреплять демократию под ее знаменем.\n\nОднако партия Миньсянь вскоре угасла, а радикалы (Гу, Чжан, Ян Юнтай) рассеялись. После создания Сунь Ятсеном Гэминьдана (Китайской революционной партии) в 1914 году с его требованием личных клятву верности, ведущие члены Миньсянь отказались, сформировав Общество исследования европейских дел для изучения Великой войны. Укомплектованное такими людьми, как Ли Гэньюань, Цэнь Чуньсюань, Ян, Гу, Чжан, Ли Шучэн и многими другими, Общество сражалось против Юань Шикая в Войне в защиту республики, впоследствии расколовшись на фракции.\n\nГу, Ли, Ян, Чжан и другие сформировали Общество политической науки в 1916 году, обсуждая достоинства централизма и федерализма, конфуцианства и парламента, а также конституционализма. Чжэнсюэси застало ограниченные реформы Бэйянского правительства, хотя после роспуска Ассамблеи Дуань Цижуем они в основном бежали, чтобы присоединиться к доктору Суню в Гуандуне.\n\nПопытавшись совершить переворот, Ян, Цэнь, Ли и Чжан бежали на север в чжилийский Пекин, и в 1923 году превратились из общества в клику, к которой присоединился Хуан Фу. После Пекинского переворота 1924 года Хуан стал премьер-министром, а Чжан занял ключевое место в кабинете. Однако после свержения Фэн Юйсяна «Политическая наука» выжила исключительно благодаря политическому мастерству, сумев получить амнистию от Чжили, когда пыль улеглась.\n\nТеперь, будучи анти-чжилийским органом, Лянгуанская Чжэнсюэси приобрела свой уникальный характер. Возглавляемая в основном Линь Чжэнсюанем, наряду с Ян Симинем и Лю Чжэньхуанем, и имея связи с Линь Ху и Шэнь Хунъином, она стала более военизированной и пополнилась милитаристами."
 GXC.midgame.833.a: "Они боролись за демократию, когда никто другой этого не делал."
 GXC.midgame.833.b: "Раскольники и предатели, все до единого."

 GXC.midgame.834.t: "Чэнь Ляньбо, Купеческий принц"
 GXC.midgame.834.d: "Чэнь Ляньбо родился в семье торговца шелком и в возрасте 16 лет устроился в Гонконгско-Шанхайскую банковскую корпорацию (HSBC), параллельно управляя бизнесом по торговле шелком и страхованию. Чэнь сколотил состояние во время Шанхайского финансового кризиса 1910 года, используя свои связи в HSBC для манипулирования рынком золота и серебра. Позже начинающий магнат расширил свою деятельность на судоходство, горнодобывающую промышленность, бумагу, чай, тунговое масло, свиней, табак, бамбук, соломенные циновки и другие местные продукты.\n\nВо время Синьхайской революции 1911 года он и другие торговцы организовали Ассоциацию поддержания общественной безопасности кантонских торговцев Гуанчжоу (более известную как Торговый корпус) для защиты своего бизнеса, и Чэнь Ляньбо неохотно возглавил ее. Милитаристы приходили и уходили, и Чэнь стремился сотрудничать с ними, чтобы минимизировать их злоупотребления, хотя он никогда им до конца не доверял.\n\nЕго отношения с Гоминьданом были особенно плохими после того, как они пришли к власти в 1922 году. Когда его заставляли присоединиться к ним, Чэнь сопротивлялся, говоря: «Мы, бизнесмены, не хотим быть окрашены политическими партиями. С точки зрения того, что поставлено на карту, политическая ситуация непредсказуема. Когда приходит одна партия, другая уходит; когда партия А у власти, партия Б рассматривается как враг или мятежник. У нас широкий спектр предприятий, и если мы вступим в партию, а ваша партия однажды потеряет власть, нам будет очень трудно перевезти нашу собственность и семью».\n\nХотя изначально у Торгового корпуса не было политических амбиций, связи Чэнь Ляньбо с британцами обострили напряженность, поскольку он считал, что их поддержка позволит ему бросить вызов Сунь Ятсену и Гоминьдану. Он работал над расширением корпуса, интегрируя ополчения торговцев Фошаня, Цзянмэня, Шилуна и других местных торговцев в подконтрольный ему «Штаб совместной обороны». У него также были контакты с такими милитаристами, как Фань Шишэн, Е Цзюй и Чэнь Цзюнмин. Хотя в то время он потерпел поражение, этот проницательный лидер сумел выжить и продолжает оставаться влиятельным сегодня."
 GXC.midgame.834.a: "Его богатство оказывается критически важным активом."
 GXC.midgame.834.b: "Его доступ к иностранному оружию жизненно важен."

 GXC.midgame.835.t: "AACSG укрепляет позиции"
 GXC.midgame.835.d: "Ассоциация всех сословий по спасению Гуандуна (AACSG) была создана Чэнь Ляньбо после инцидента с Торговым корпусом 1925 года в надежде сплотить коалицию для изгнания Гоминьдана. Но еще до этого Торговый корпус имел более старые, глубокие корни в различных купеческих ассоциациях, сформированных в разных городах.\n\nНа класс торговцев традиционно смотрели свысока, но современная капиталистическая система помогла им нарастить влияние. Их роль как компрадоров для иностранного бизнеса и связи по всей стране дают им мощную вспомогательную роль для многих правительств милитаристов. Однако в Гуандуне торговцы смогли выкроить для себя непосредственную роль в управлении после падения Гоминьдана в 1927 году.\n\nТорговый корпус официально был продолжением Торговой палаты Гуандуна, но он также включал в себя множество более мелких независимых групп, таких как Ассоциация поддержки коммерции, Бизнес-группа города Дунгуань и группы торговцев, представляющие Сянчэн, город Синьхуэй, Цзянмэнь, Шилун и Пекин.\n\nНекоторые группы имели свой уникальный характер. Торговая группа Шуньчэн под руководством Цэнь Чжицина была известна своей фирменной желтой униформой и особой приверженностью к порокам. После 1925 года она выжила, переименовавшись в Гражданский корпус Даляна под руководством Ло Банъи. Ассоциация торговцев Хуэйчэна под руководством Чэнь Дунчжана номинально имела строгие правила против курения, азартных игр, пьянства, хулиганства и ношения униформы в борделях, на лодках и в винных барах, но они плохо соблюдались. Группу торговцев Жунгуй возглавлял печально известный хвастун Ху Пэйюнь, в то время как Группа торговцев Гуаньшань была из родной деревни Чэнь Ляньбо, и он лично отбирал их лидеров.\n\nТорговцы часто были переплетены со знатью, а также использовали благотворительные организации, такие как «Девять благотворительных залов», в качестве рупора для своей политики, лоббируя против вступления в Великую войну, влияя на людей и даже вмешиваясь в местную политику милитаристов."
 GXC.midgame.835.a: "Мощь бизнес-класса позволяет нам вырваться вперед."
 GXC.midgame.835.b: "Их политическое влияние нельзя недооценивать."

 GXC.midgame.836.t: "Молодой маршал Юга"
 GXC.midgame.836.d: "Лу Юйгуан потерял отца в раннем возрасте, и его мать (вьетнамка) бежала в Китай, где встретила Лу Жунлина в Гуйлине. Старший Лу был очарован и взял ее в наложницы. Будучи сам сиротой, он усыновил Лу Юйгуана. Бывший бандит, захвативший власть в Лянгуане в 1910-х годах, был уже в возрасте 60 лет на пике своего могущества в 1920-х и стремился начать планирование преемственности. Подобно северному милитаристу Чжан Цзолиню, он начал воспитывать сына как «Молодого маршала Юга». Несмотря на юный возраст (всего 20 лет в то время), младший Лу получил командование Первой дивизией Гуансийской армии.\n\nЛу Юйгуан не был очень успешным полевым командиром, так как, по-видимому, никогда не посещал формальную военную академию или колледж штабных офицеров. Хотя его никогда официально не понижали в должности, по мере того как силы его отца терпели крупные поражения от врагов, фактическое командование его подразделениями начало переходить к другим генералам. В конечном итоге это не имело значения, так как силы Лу Жунлина были разгромлены в 1924 году. Однако старший Лу смог вернуться на сцену после Северного похода, и вместе с ним Лу Юйгуан снова оказался в центре внимания.\n\nУ его отца была легендарная репутация, как хорошая, так и плохая, и его широко уважали в Гуанси. Соответствовать этому наследию оказалось непросто, но, похоже, в последнее время его звезда начала сиять."
 GXC.midgame.836.a: "Лу Юйгуан — поистине просвещенный автократ!"
 GXC.midgame.836.b: "Лу Юйгуан — человек из народа, как и его отец!"

 GXC.midgame.837.t: "Маршал Лу и триумвиры"
 GXC.midgame.837.d: "Фракция «Молодая Гуанси» значительно выросла во влиянии, обретая форму и развивая собственную идентичность после смерти патриарха «Старой Гуанси» Лу Жунлина в 1934 году. Основанная как молодая гвардия Старой клики Гуанси под руководством Ма Цзи (приемного сына Лу), Линь Ху и Лю Чжилу, после победы Чжили и реставрации Лу Жунлина вслед за Северным походом, они стали доминирующей фракцией Старой клики Гуанси.\n\nМа Цзи — самый могущественный из триумвирата, уступающий только Лу Юйгуану. Его отец был близким другом Лу Жунлина и заставил Ма Цзи объявить того своим приемным отцом. Искусный мастер боевых искусств и выпускник военной школы Гуанси, он служил личным помощником Лу Жунлина и полевым командиром Старой клики Гуанси. Говорят, что именно он сделал первый выстрел в Войне в защиту республики.\n\nПосле поражения Лу Жунлина в 1924 году он служил начальником штаба у У Пэйфу и сражался на стороне Чжили во время Северного похода. Его дружба с У Пэйфу началась в 1918 году, когда они встретились на переговорах в Хунани, будучи представленными штабным офицером Чжили родом из Гуанси Чжан Цицзинем. Он также стал очень близок с Линь Ху, одним из немногих других формально обученных офицеров в Гуансийской армии. Эти двое стали назваными братьями, и Линь известен как один из наиболее политически ангажированных членов фракции Молодой Гуанси — он был связан с Сунь Ятсеном, Чэнь Цзюнмином и другими идеологическими лидерами. Лю Чжилу — третий из триумвирата, опытный командир, который помогал организовать Офис союзных сил в Чжанчжоу вместе с некоторыми офицерами армии Юэ. Еще один важный офицер — Го Чуньсэнь, близкий помощник Лу Жунлина с дворянским (а не бандитским) происхождением.\n\nПо мере роста власти Лу Юйгуана его отношения с триумвиратом обострились. В отличие от своего отца, он на поколение моложе триумвиров и не может полагаться на сыновнюю почтительность. Им придется разрешить свои разногласия за закрытыми дверями..."
 GXC.midgame.837.a: "Лу Юйгуан утверждает свою власть."
 GXC.midgame.837.b: "Ма Цзи — реальная сила, стоящая за троном."

 GXC.midgame.838.t: "Из бандита в милитаристы"
 GXC.midgame.838.d: "Шэнь Хунъин был хакка, родившимся в Гуанси. Он работал фермером, подрабатывая продажей травяных лекарств и демонстрируя шаолиньские боевые искусства перед публикой. Однажды его с братом ограбили местные солдаты, и Шэнь решил отомстить — убил их обидчиков, прежде чем записаться в солдаты. Во время Синьхайской революции его подразделение сражалось на стороне революционеров, в конечном итоге перейдя под командование Лу Жунлина.\n\nВ течение следующих нескольких лет он продолжал подниматься по служебной лестнице и в конечном итоге стал самостоятельным милитаристом, стравливая различные фракции, пока в конце концов не был побежден Новой кликой Гуанси. Тем не менее, он смог оправиться с помощью Чжили, и его фракция армии Шэнь доминировала в северной части Гуандуна.\n\nАрмия Шэнь, несмотря на то что часто сама состояла из бандитов, прославилась подавлением бандитизма при Лу Жунлине. Однако они стали печально известны своей жестокостью и недисциплинированностью во время расквартирования в Гуандуне, предаваясь различным порокам, грабежам и вымогательству у местных жителей. Несмотря на свою силу и оснащение, они часто проигрывали битвы из-за устаревшей тактики.\n\nС ростом власти Шэня для него и его заместителей было бы разумно привести свои дела в порядок. Установление дисциплины — нелегкий подвиг, но истинно мудрый и сильный лидер способен пройти такое испытание."
 GXC.midgame.838.a: "Шэнь — великий лидер, а великие лидеры дисциплинируют своих людей."
 GXC.midgame.838.b: "Истинно мудрый лидер знает, когда доверять своим солдатам."

 GXC.midgame.839.t: "Чжу Цзяхуа, Серый кардинал"
 GXC.midgame.839.d: "Чжу Цзяхуа был студентом школы Тунцзи в Шанхае, университета, основанного и финансируемого немцами. Он вступил в «Отряд смертников» во время Синьхайской революции в 1911 году, прежде чем продолжить свое образование в области электротехники в Тунцзи. Впоследствии он выиграл стипендию для изучения металлургии в Берлине, где, несмотря на некоторые перерывы из-за Великой войны, получил степень доктора философии. Он стал видным, получившим немецкое образование профессором Пекинского университета, прежде чем покинуть Пекин после жестокого подавления протестов 18 марта 1926 года Фэнтяньской кликой.\n\nПосле этого он отправился на юг, где преподавал в Гуандунском университете и недолго работал в правительстве Гоминьдана, но отказался вступить в партию. Он оказался успешным посредником после захвата немцами Гуанчжоу, что позволило ему сыграть важную роль в правительстве Чэнь Ляньбо перед тем, как искать должность при Сунь Чуаньфане. Он присоединился к зарождающемуся Обществу Цзинсин Ли Линьсы, которое начиналось как инструмент для китайско-немецких культурных обменов, но переросло в политическое движение за улучшение китайско-немецких связей и содействие модернизации Китая по немецкому образцу.\n\nПосле жестокого подавления Шанхайских восстаний 1932 года Чжу ушел из правительства Суня и вернулся в Гуанчжоу. Влиятельный в китайско-немецких кругах, он был нанят советником восходящим Шэнь Хунъином. Но Чжу — хитрый и амбициозный человек, и многие полагают, что именно он является истинным вдохновителем подъема ранее неуклюжей армии Шэнь."
 GXC.midgame.839.a: "Чжу посвящает свои усилия улучшению имиджа Шэня."
 GXC.midgame.839.b: "Чжу использует свои связи для укрепления позиций Шэня."

##NPA Satellite Content (860-889)
 GXC.midgame.860.t: "Юг подчиняется [FROM.FROM.Capital.GetCapitalVictoryPointName]"
 GXC.midgame.860.d.intro: "После консолидации контроля над Лянгуаном различные регионалисты региона изо всех сил пытались прийти к соглашению о том, что делать дальше. Будучи едиными в своем неприятии революционного Гоминьдана и попыток Чэнь Цзюнмина и его федералистов захватить власть, а также в своем желании защитить региональную автономию, не было недостатка в спорах о том, какое конкурирующее правительство в Китае будет уважать местное самоуправление. Некоторые даже размышляли о возможности создания собственного конкурирующего правительства."
 GXC.midgame.860.d.default: "$GXC.midgame.860.d.intro$\n\nНо в конце концов Юг решил подчиниться, возможно, стремясь избежать войны или, возможно, под давлением внешних агентов. К изумлению многих, [GXC.GetLeader] в конечном итоге решил не связывать свою судьбу ни с кликой Чжили, ни с кликой Фэнтянь, вместо этого присоединившись к [FROM.FROM.GetNameDef]. Это временно заморозило баланс сил в Гуандуне, пока Наньнин, Шаогуань и Гуанчжоу пересчитывают свои шансы, но будет ли это постоянной договоренностью или просто временным союзом с сильнейшей державой, еще предстоит увидеть."
 GXC.midgame.860.d.zhili: "$GXC.midgame.860.d.intro$\n\nНо в конце концов Юг решил подчиниться, возможно, стремясь избежать войны или, возможно, под давлением внешних агентов. [GXC.GetLeader] в конечном итоге решил связать свою судьбу с [FROM.FROM.GetNameDef], что сместило баланс сил в Лянгуане в пользу Шэнь Хунъина и его фракции армии Шэнь, которая активно лоббировала такое соглашение. В то время как Чэнь Ляньбо и его фракция остаются в Гуанчжоу, их влияние явно затмил прагматичный Шэнь Хунъин."
 GXC.midgame.860.d.fengtian: "$GXC.midgame.860.d.intro$\n\nНо в конце концов Юг решил подчиниться, возможно, стремясь избежать войны или, возможно, под давлением внешних агентов. [GXC.GetLeader] в конечном итоге решил связать свою судьбу с [FROM.FROM.GetNameDef], что сместило баланс сил в Лянгуане в пользу Чэнь Ляньбо и его фракции торговцев Гуанчжоу, которая активно лоббировала такое соглашение. В то время как Шэнь Хунъин и его союзники остаются в Шаогуане, их влияние явно затмил хитрый Чэнь Ляньбо."
 GXC.midgame.860.a: "Лу остается на вершине... пока что."
 GXC.midgame.860.b: "Маршал Лу настороженно поглядывает на губернатора Шэня."
 GXC.midgame.860.c: "Маршал Лу настороженно поглядывает на мэра Чэня."

###- Phase IV Events -###

###Section 4a (000-199): Late Game Military Events

 ##Shared Military Events (000-049)
 GXC.lategame.000.t: "Студенческая армия Гуанси"
 GXC.lategame.000.d: "В последнее время в провинции Гуанси наблюдается самое дерзкое проявление преданности нации. В свете военной ситуации с Японией собралась группа студентов, чтобы создать «Гуанси Сюэшэнцзюнь», или Студенческую армию Гуанси. Вдохновленные патриотизмом и гордостью, около 300 юношей и девушек из университетов и старших классов начали вести пропаганду среди солдат и местного гражданского населения, обычно в форме патриотических речей и пьес, воспевающих национальную борьбу. Отмечая недавние победы, некоторые офицеры Гуанси в командном составе назвали студенческое движение «первым шагом на пути к национальному возрождению».\n\nОднако в ряды растущей Студенческой армии влилось много молодых и особенно левых студентов, что привело к расхождению во взглядах и расколу как в рядах, так и в общем посыле. Вектор пропаганды начал смещаться с Войны сопротивления на Освобождение китайского пролетариата от мировых империалистов, и в результате это вызвало серьезные разногласия с определенными элементами администрации. Стремясь отвлечь студентов от вмешательства в политику, ярые консерваторы предлагают полностью распустить армию, утверждая, что пропаганда — это роль военных и правительства. Тем не менее, такой шаг может значительно подорвать моральный дух или даже спровоцировать возмездие."
 GXC.lategame.000.a: "Антиимпериализм объединяет все партии!"
 GXC.lategame.000.b: "Яд, который они изрыгают, лишь запутает военные дела."

 GXC.lategame.001.t: "Восстание горцев Ли"
 GXC.lategame.001.d: "В настоящее время большинство граждан Китая находятся в крупных городах, которые подвержены высокому риску осады или вторжения. Чтобы противостоять этому, был выдвинут план по переселению жителей Хайкоу и Цюнхая в горы Учжишань, расположенные в центральной части Цюнъя (Хайнань), чтобы обеспечить безопасное убежище от любого вторжения с побережья. Однако этот предложенный план был встречен местным населением с большим недовольством.\n\nЭтническое население ли было спровоцировано на восстание из-за опасений, что доминирование ханьцев в регионе станет более явной угрозой их образу жизни и культуре. Главным зачинщиком восстания является некий Ван Госин, лидер одной из местных деревень ли в Цюнъя. Восстание, укомплектованное в основном его родственниками, очевидно, строится на нерушимо крепких связях между деревнями.\n\nПоскольку на кону стоят вопросы национальной безопасности, члены правительства выступили за особо жесткую реакцию, некоторые даже предложили плановую казнь тысяч жителей деревень ли, чтобы подавить восстание. Отвергая такую ​​тяжелую и жестокую идею, многие представители жесткой оппозиции вместо этого настаивали на необходимых инвестициях в защиту культуры ли и местной территории. В конечном итоге их предложения были встречены контраргументами о том, что такие легкомысленные траты лишат военные усилия необходимых материалов."
 GXC.lategame.001.a: "Мы что, слепы? Развернуть гарнизон!"
 GXC.lategame.001.b: "И вы готовы допустить исчезновение их культуры?"

 GXC.lategame.002.t: "Военно-морские клики"
 GXC.lategame.002.d: "Несмотря на наше доминирование на флоте, мы все еще находимся на шаткой почве из-за многочисленных других клик, а именно из-за раскола между армией Вампу и Гуанчжоуской военно-морской кликой. Обе стремятся модернизировать флот, но их разделение основано на том, насколько централизованными должны быть флоты. Армия Вампу хотела бы взять флот под свое крыло, тогда как Гуанчжоуская военно-морская клика хочет большей независимости от армии, что выросло из их обучения, полученного от британских офицеров в Гонконге.\n\nМы могли бы вступить в дружеские отношения с одной из этих фракций, однако доступны и другие варианты за пределами вышеупомянутых клик, которые уже пустили корни в нашем правительстве. Фуцзяньская и Циндаоская клики, являющиеся представителями региональных сил. Стоит отметить различие в их развитии: так, клика Циндао переняла опыт японского и немецкого флотов, тогда как Фуцзяньская клика — это гораздо более органичная, отечественная линия мысли, которая все больше развивалась в ходе конфликтов, произошедших после неудачного Северного похода.\n\nОтветы на вопрос, с кем мы объединимся, должны быть даны как можно скорее, чтобы можно было гарантировать не только защиту наших прибрежных территорий, но и стать патриотическим примером для Китая на будущей мировой арене."
 GXC.lategame.002.a: "Пусть армия командует флотом."
 GXC.lategame.002.b: "Почему армия должна контролировать море? Отдайте бразды правления Гуанчжоуской клике."
 GXC.lategame.002.c: "Регионалисты гораздо разумнее в нашей ситуации."

 GXC.lategame.003.t: "Директор небес"
 GXC.lategame.003.d.intro: "С созданием Центральной авиационной академии [FROM.GetNameDef] делает еще один конкретный шаг к созданию современных военно-воздушных сил. Объединение нескольких существующих академий и авиационных программ, а также набор инструкторов из-за рубежа и вливание нового финансирования не стерли старого соперничества. Выбор нового директора будет иметь не только военное, но и политическое измерение."
 GXC.lategame.003.d.kmt: "$GXC.lategame.003.d.intro$\n\nТремя основными кандидатами являются Линь Вэйчэн, Ян Гуаньюй и Чжан Хуэйчан — все давние члены Гоминьдана, интересующиеся военной авиацией. Линь Вэйчэн родился в Гуандуне и изучал медицину в Соединенных Штатах, прежде чем присоединиться к группе покойного Ян Сяньи для обучения полетам в авиастроительной компании Tuqiang. Он вернулся, чтобы служить пилотом в борьбе с милитаристами, став старшим офицером ВВС НРА. Находясь в Гуйчжоу, он оказался на службе у Новой клики Гуанси и известен своими взаимно враждебными отношениями с иностранными авиаинструкторами.\n\nЯн Гуаньюй был отправлен Линь Сэнем присоединиться к группе Ян Сяньи. Он вернулся в Гуанчжоу с 12 самолетами, подаренными зарубежными китайцами, и помогал Яну с первым самолетом отечественного производства: «Лэшивэнь». Он быстро поднялся по карьерной лестнице как пилот, инструктор и руководитель производства. Находясь в изгнании в России, он продолжал изучать авиацию, а по возвращении очаровал различных деятелей Лянгуана, включая Бай Чунси и Чэнь Миншу, и продолжает играть важную роль в производстве самолетов.\n\nЧжан Хуэйчан родился в Гуандуне, но вырос в США, где поступил в авиационную школу Кертисса в Нью-Йорке. В 1918 году он вернулся в Китай и служил адъютантом Сунь Ятсена, став заместителем директора Департамента авиации и сражаясь с различными милитаристами. По возвращении в Китай он добился еще большей известности благодаря своей кампании «спасение страны через авиацию», заставляя своих учеников выполнять различные трюки и лично перелетев через всю страну, устроив грандиозное зрелище."
 GXC.lategame.003.d.upc: "$GXC.lategame.003.d.intro$\n\nНа рассмотрении находятся Чэнь Инцюань, Сяо Буюнь и Дин Цзисюй — группа офицеров ВВС, получивших образование за границей. Чэнь Инцюань был капитаном авиационной эскадрильи, созданной Гуандунской армией в Фуцзяни в июне 1919 года, и сохранил эту должность после того, как Гуандунская армия создала правительство в Гуанчжоу. Он был самым высокопоставленным офицером ВВС, перешедшим на сторону Чэнь Цзюнмина в 1922 году вместе с Линь Анем и Юй Байцзюном, и был вознагражден назначением на должность директора Авиационного бюро.\n\nСяо Буюнь был одним из первых членов Партии общественных интересов (Чжигундан) с обширными связями в китайской диаспоре. Будучи асом в сборе средств для общего дела, он вошел в доверие к Чэнь Цзюнмину. Он выучился на пилота в 1920-х годах, находясь в изгнании, а также был избран председателем отделения партии в штате Нью-Йорк. Чэнь Цзюнмин пригласил его вернуться, где он помог организовать пилотов и механиков для зарождающихся ВВС армии Юэ.\n\nДин Цзисюй был уроженцем Гуандуна, который сначала поехал во Францию изучать медицину, но вскоре решил отправиться в Германию изучать авиацию. Там он женился на немке и нашел работу, прежде чем вернуться в Гуандун в 1926 году для службы в арсенале Шицзин в Гуанчжоу, а затем инструктором в Гуандунской авиационной школе. Его отправили учиться во Францию в 1927 году, после чего он вернулся домой работать летным инструктором для изменившегося правительства. Не особенно интересуясь политикой, его свободное владение немецким языком оказалось полезным в условиях китайско-германского сотрудничества."
 GXC.lategame.003.d.npa: "$GXC.lategame.003.d.intro$\n\nТремя ведущими кандидатами являются Дин Цзисюй, Фэн Хуан и Чэнь Жуйдянь. Дин Цзисюй был уроженцем Гуандуна, который сначала поехал во Францию изучать медицину, но вскоре решил отправиться в Германию изучать авиацию. Там он женился на немке и нашел работу, прежде чем вернуться в Гуандун в 1926 году для службы в арсенале Шицзин в Гуанчжоу, а затем инструктором в Гуандунской авиационной школе. Его отправили учиться во Францию в 1927 году, после чего он вернулся домой работать летным инструктором для изменившегося правительства. Не особенно интересуясь политикой, его свободное владение немецким языком оказалось полезным в условиях китайско-германского сотрудничества.\n\nФэн Хуан родился в Гуанси и учился в Военной академии армии Гуанси. Поднявшись по служебной лестнице в 1920-х годах, но так и не получив генеральского звания, он сумел найти работу в Наньнине после краха Северного похода и был отправлен в Японскую армейскую школу в 1927 году. Когда он вернулся в 1930-х годах, он начал карьеру офицера ВВС и быстро продвинулся по службе в качестве инструктора, а затем директора Авиационной школы Гуанси.\n\nЧэнь Жуйдянь (Артур Чин) — «темная лошадка». Родился в Портленде, штат Орегон, США; его отец был из Гуандуна, а мать — перуанкой. Возмущенный иностранным империализмом в Китае, 19-летний Чэнь отправился в Китай, чтобы присоединиться к Гуандунским ВВС, созданным Чэнь Цзюнмином в 1932 году. В 1935 году он отправился в Германию для дополнительной подготовки и показал себя отличным пилотом. Красивый и популярный, прозванный «Чжао Юнем небес», этот молодой человек может стать именно той встряской, которая нам нужна."
 GXC.lategame.003.a: "Линь Вэйчэн, ветеран-националист."
 #林伟成
 GXC.lategame.003.b: "Ян Гуаньюй, популярный мастер на все руки."
 #杨官宇
 GXC.lategame.003.c: "Чжан Хуэйчан, дальновидный щеголь."
 #张惠长
 GXC.lategame.003.d: "Чэнь Инцюань, опытный лоялист Юэ."
 #陳應權
 GXC.lategame.003.e: "Сяо Буюнь, рьяный доброволец из Чжигундан."
 #蕭步雲
 GXC.lategame.003.f: "Дин Цзисюй, нейтральный эксперт."
 #丁纪徐
 GXC.lategame.003.g: "Фэн Хуан, стойкий солдат."
 #冯璜
 GXC.lategame.003.h: "Чэнь Жуйдянь, лихой истребитель-ас."
 #陳瑞鈿

 #- Eliteheer Events (020-029)
 GXC.lategame.020.t: "Меняясь в ногу со временем"
 GXC.lategame.020.d: "По мере того как правительство Гуанчжоу модернизирует свои вооруженные силы по образцу бывшей Лиги восьми провинций, среди офицеров витают новые идеи. В армии распространяются немецкие идеи ведения войны. Хотя немецкие офицеры играли лишь ограниченную роль в обучении военных Лянгуана, они принесли с собой идеи Макса Бауэра, радикального сторонника тоталитарной военной диктатуры, посвященной исключительно войне. Бауэр предлагал государственное плановое развитие тяжелой промышленности, связи и воздушного транспорта, а также надлежащее внедрение тактики современной войны, включая химическую войну. Хотя правительство менее склонно следовать идеям Бауэра о тоталитарной диктатуре, его идеи промышленного развития оказались весьма влиятельными.\n\nДействительно, трехлетний план, принятый правительством Гуанчжоу, был частично вдохновлен Бауэром. Офицеры нашей армии были весьма увлечены амбициозными теориями войны Бауэра. Военные неоднократно обращались к [GXC.GetLeader] с просьбой уделить приоритетное внимание модернизации железных дорог и связи. Несмотря на инновационное новое направление военных, еще неизвестно, насколько эффективными будут реформы. Бюрократия Китая оказалась не такой гибкой, как надеялись, и многие офицеры все еще практикуют военные стратегии нашего имперского прошлого, когда Китай натравливал варвара на варвара. Несмотря ни на что, [GXC.GetLeader] сохраняет надежду, что Китай шагнет в будущее вопреки всему."
 GXC.lategame.020.a: "Крупные фермеры тоже могут быть военными гениями..."

 GXC.lategame.021.t: "Выманивание змеи"
 GXC.lategame.021.d: "Поскольку Китай и Япония снова вступают в конфликт, становится все более очевидным, что эта война не будет похожа ни на какую другую. Японская империя и их марионетки-коллаборационисты используют жестокие и новые стратегии войны. Многие из наших планов не пережили первого контакта с захватчиками. Одни лишь оборонительные линии не остановят продвижение врага. Действительно, японцы освоили маневренную войну гораздо лучше, чем китайские военные. Мы не можем надеяться на лобовое столкновение с врагом; нет, мы должны импровизировать новую тактику для нашей текущей ситуации.\n\n[GXC.GetLeader] поручил нашим генералам сохранить как можно больше боевой мощи и отступать всякий раз, когда это необходимо. Теперь мы должны заманивать японских захватчиков все глубже и глубже в Китай, чтобы перенапрячь их логистику и коммуникации. Подобно тому, как Леттов-Форбек успешно уклонялся от британцев с ограниченными ресурсами и более слабыми военными силами, мы тоже будем стремиться пережить превосходящего врага. Когда Империя Восходящего Солнца дрогнет и появится возможность, наши офицеры начнут контрнаступление и положат конец веку невыносимого унижения!"
 GXC.lategame.021.a: "Китай никогда не падет!"

 GXC.lategame.022.t: "Уроки Вест-Пойнта"
 GXC.lategame.022.d: "В годы после неудачного Северного похода Гоминьдана Сунь Ятсена китайское правительство в Пекине искало вдохновение для новых военных методов, чтобы победить мятежного маршала Чжан Цзолиня и его японских покровителей. В духе модернизации китайская военная миссия отправилась в Соединенные Штаты Америки, чтобы понаблюдать за Вест-Пойнтом. Расположенный в Нью-Йорке, Вест-Пойн был главной военной академией федерального правительства США до Второй гражданской войны в Америке. Хотя большинство офицеров китайской военной миссии в США были верны центральному правительству Цин и Лиге восьми провинций, несколько офицеров были связаны с Гуандунской кликой.\n\nТеперь, когда гегемония Цин разрушена, а порядок в Китае навсегда изменен, задача восстановления Срединного государства ложится на правительство Гуанчжоу. Хотя Соединенные Штаты сейчас погрузились в хаос, Вест-Пойнт по-прежнему считается престижным учреждением, которое вполне может послужить вдохновением для новой Центральной военной академии. Офицеры, принимавшие участие в военной миссии, усердно работали над созданием этой новой академии по образу Вест-Пойнта, и [GXC.GetLeader] твердо уверен, что в отличие от созданной Гоминьданом военной академии Вампу, эта академия будет обучать новое поколение современному военному искусству, а не революционному фанатизму."
 GXC.lategame.022.a: "Какая печальная судьба для такой прекрасной страны..."

 GXC.lategame.023.t: "Eliteheer достигнут"
 GXC.lategame.023.d: "Хотя Германская империя — империалистическое государство, заслуживающее презрения и раздела, в ней есть что уважать, когда дело касается военной компетентности. Действительно, китайские военные реформы, предпринятые новым центральным правительством, были в первую очередь вдохновлены немецкой концепцией Eliteheer (элитной армии). Немецкие военные теории сейчас широко обсуждаются в китайских военных кругах. Хотя правительство не дошло до тоталитарной политической системы Бауэра, его идеи использования тяжелой артиллерии, развития тяжелой промышленности, модернизации железных дорог и создания современных сетей связи были приняты китайским государством. Однако список выдающихся немецких офицеров, которые пришлись по душе военным, не заканчивается на Бауэре.\n\nЛеттов-Форбек пользуется широким уважением в Китае благодаря своим достижениям в Великой войне, а идеи Гейнца Гудериана о блицкриге оказались весьма интригующими, хотя танковые технологии в Китае еще не соответствуют нашим более мощным соседям. Восходящая звезда немецких офицеров, расквартированных на Дальнем Востоке, Эрвин Роммель, также привлек внимание многих в нашей армии. Действительно, многие генералы пытаются подражать его стилю командования, чтобы заслужить прозвище «Роммель Востока». Однако самым влиятельным немецким офицером в Китае был Ганс фон Сект. Его книга «Мысли солдата» очень популярна и постоянно цитируется в военных кругах Китая. Эти реформы — только начало, Китай продолжит движение к современности, возглавляемое китайским Вермахтом!"
 GXC.lategame.023.a: "У Империи Восходящего Солнца появился новый соперник на Востоке..."

 GXC.lategame.024.t: "Превосходя Бэйян"
 GXC.lategame.024.d: "Хотя ранние попытки модернизации Китая в конечном итоге потерпели полный крах, идея современной центральной армии не была концептуально ошибочной. Сегодня, когда нация разбита на части, а региональные милитаристы захватывают контроль над отдаленными провинциями, становится все более важным, чтобы Центральное правительство обладало армией, превосходящей провинциальные силы и знакомой с современной военной тактикой.\n\nС падением Пекинского правительства Великой Цин правительству Гуанчжоу предстоит подхватить мантию Бэйяна и создать новую центральную армию, достаточно мощную, чтобы держать милитаристов в узде, сдерживать иностранных захватчиков и возглавить военную модернизацию. После многих лет военных реформ и экспериментальной тактики новое Центральное правительство наконец достигло того, чего не смогло Бэйянское правительство. Несмотря на отсутствие немецкой помощи и экономический коллапс во всех провинциях из-за хаоса распада Лиги и Черного понедельника, правительство Гуанчжоу преодолевает все препятствия.\n\nКитайские военные и правительство не должны успокаиваться на текущем успехе, который мы наблюдали в предыдущие годы, ибо путь обратно к мировой значимости долог, а внутренние и внешние угрозы все еще существуют и ждут подходящего момента, чтобы вернуть Срединное государство в состояние слабости, в котором оно находилось в разгар Эры милитаристов. Пусть эти угрозы придут и испытают себя против Армии нового образца Республики, наследницы и сменщицы Национально-революционной и Бэйянской армий!"
 GXC.lategame.024.a: "Юань и Сунь шли пешком, чтобы мы могли бежать."

 GXC.lategame.025.t: "Дракон и Орел"
 GXC.lategame.025.d: "Даже несмотря на то, что Соединенные Штаты Америки погрузились в хаос после выборов 1936 года, они остаются образцом для подражания для многих в Китае, включая, помимо прочих, Чэнь Цзюнмина, У Пэйфу и Сунь Ятсена. Действительно, военная академия США в Вест-Пойнте стала большим источником вдохновения для Центральной военной академии. Подобно тому, как Вест-Пойнт подготовил много великих офицеров, усвоивших республиканские добродетели, так и Центральная военная академия делает то же самое. Подобно вооруженным силам США до генерала Макартура, Вооруженные силы Китайской Республики клянутся не вмешиваться в политику нации, действуя просто как аполитичные стражи республики.\n\nЭти военные реформы принесли большой успех в наших усилиях во время Второй японо-китайской войны и в борьбе с мятежниками-милитаристами. Японцы пришли, ожидая увидеть слабую армию, которую можно просто сбить с ног и унизить. Вместо этого они столкнулись с модернизированной армией, которая верна не одной политической партии или человеку, а самой нации. Там, где милитаристы ожидали своекорыстную военную силу, которая довольствовалась бы своим куском Китая, они сталкиваются с националистической силой, приверженной полному объединению и прекращению эксплуатации простого народа милитаристами. Китай больше не будет сдерживаться эгоистичными оппортунистами изнутри и иностранными стервятниками, Китай будет шагать среди свободных наций мира!"
 GXC.lategame.025.a: "Снимаю перед вами шляпу. От одной республики — другой."

 #- Guangxi Style Events (030-039)

 GXC.lategame.030.t: "Возвращение к войне древности"
 GXC.lategame.030.d: "Наконец, после междуцарствия, длившегося девятьсот лет, и множества династий, китайский солдат наконец-то практикует китайский способ ведения войны. По всей стране солдат и крестьянин действуют как единый организм, функционирующий в симбиозе. В мирное время китайский гражданин занимается своим делом, семьей, средствами к существованию, а во время войны этот же гражданин берет в руки оружие, чтобы защитить свою нацию и общину. Класс солдат больше не высмеивается как буйные, неразумные грубияны, ничем не лучше бандитов, а вместо этого рассматривается как основной компонент обычного китайского общества. Не нужно далеко ходить, чтобы увидеть достоинства интеграции системы ополчения, поскольку наш ошеломляющий национальный подъем не мог бы произойти без верности и ярости, проявленных ополчением, наносящим удары вглубь врага, независимо от его размера.\n\nС новыми реформами армии и гражданского населения китайская нация, несомненно, никогда не падет до калечащей слабости и эксплуатации, которые она терпела во время упадка Цин; вместо этого над Срединным государством занялась заря новой эры, феникс восстал из пепла, предназначенный для величия. С ополчением, обеспечивающим идеальную эффективность, сплоченность и взаимное уважение во всей нашей нации, никто не может сомневаться, что в новую эру Китай вернется как доминирующая мировая держава."
 GXC.lategame.030.a: "Четыре тысячи лет войны, доведенные до совершенства!"

 #- Legacy of Whampoa Events (040-049)

 GXC.lategame.040.t: "Наши сердца и души"
 GXC.lategame.040.d: "С тех пор как много лет назад была зажжена спичка Синьхая, вечно горящий огонь республиканского революционного дела навсегда остался зажженным в Китае. От Гоминьдана до федералистов, от Чжили до Фэнтяня и всех, кто между ними, всегда находились люди, ставившие на кон саму свою жизнь, чтобы дать отпор тиранической структуре предыдущих династий. И снова, как мотыльки на пламя, эти люди откликнулись на призыв к оружию, прозвучавший по всей стране, превосходя своих современников в деле, которому они истинно преданы.\n\nЭто утверждение нигде не проявляется так ярко, как в волнах преданных, верных и яростных кадров, выпускаемых нашей академией Вампу, наносящих удары глубоко в сердце всех, кто выступает против освобождения китайского народа. Абсолютно преданные и не имеющие себе равных, солдаты наших армий маршируют все дальше к светлому будущему, занимающемуся над нацией, вечно верные и беспрекословно преданные революционному делу. Возрождение Вампу вывело китайскую армию в авангард армий мира, и никогда больше век унижений не постигнет их народ, ибо сам огонь революционного дела яростно горит в каждом солдате, и его никогда не погасить."
 GXC.lategame.040.a: "Посвятите свои сердца!"

 ##KMT Unique Military Events (050-099)

 GXC.lategame.050.t: "Колонна реки Дунцзян"
 GXC.lategame.050.d: "В разгар Второй японо-китайской войны, конфликта, который, вероятно, превзойдет по жестокости первую войну, китайская нация должна подготовить все необходимые меры для защиты своего суверенитета от предвестника империализма в Азии. Поскольку Китай не может сражаться с японцами один на один из-за их технологического превосходства, Национальное правительство прибегло к стратегии партизанской войны, в которой военные должны использовать землю и преимущество родного поля Китая против врага.\n\nСледуя примеру Центрального правительства, [GXC.GetLeader] создал колонну реки Дунцзян Народных антияпонских партизанских сил Гуандуна. Возглавляемая Гу Дацунем, Цзэн Шэнем и Ван Цзояо и насчитывающая более десяти тысяч партизан, эта партизанская сила поможет вытеснить японских захватчиков из Гуандуна. Солдаты Дунцзяна уже помогли защитить Китай, уничтожив японские опорные пункты вдоль железной дороги Гуанчжоу-Коулун, а также защищая реку Шэньчжэнь. Если Китай хочет победить Японию в этом последнем препятствии на пути к обеспечению Национальной революции, нам понадобится еще много таких сил, как колонна Дунцзян."
 GXC.lategame.050.a: "Наше время придет!"
 GXC.lategame.050.b: "Но еще не сейчас."

 GXC.lategame.051.t: "Деньги и мускулы"
 GXC.lategame.051.d: "С разгоранием конфликтов с японцами националистическое правительство начало настаивать на том, чтобы больше граждан вносили больший вклад в оборону Китая. Многие описали эту политику так: «У кого есть деньги — дают деньги, у кого есть сила — дают силу». Мало кто знает, кто придумал эту фразу, но многие указывают на генерала Ли Цзунжэня, так называемого изобретателя стратегии «Выжженной земли». Утверждая, что он разработал ее в 1933 году во время своего изгнания в Гуйчжоу, стратегия вращается вокруг заманивания врага вглубь страны, лишения сельской местности всего полезного, а затем атаки на захватчика с помощью мобильной и партизанской тактики.\n\nСледуя политике националистического правительства военного времени по увеличению численности армии, семьи солдат, как правило, обеспечивались деревнями по указу правительства. Правила 1937 года также предусматривали, что если у иждивенца солдата не было никого, кто мог бы присматривать за его делами, староста деревни мог с разрешения солдата назначить доверенное лицо. Кроме того, местный чиновник был обязан предоставлять трудовую помощь иждивенцам во время посева и сбора урожая, бесплатно для указанных иждивенцев. Иждивенцы также освобождались от любых временных дополнительных налогов.\n\nЕсли солдат был фермером-арендатором, его домохозяйство освобождалось от взносов в местную систему зернохранилищ. Если иждивенцы были неграмотными, местный чиновник был обязан действовать как писец или предоставить писца для облегчения общения между солдатом и семьей. Все дети и зависимые младшие братья и сестры солдата должны были получать бесплатное обучение и освобождались от уплаты любых прочих расходов на образование на всех уровнях образования. Наконец, семьям солдат, погибших в бою, предоставлялись единовременные выплаты и десятилетние пенсии. Эти политики военного времени в совокупности внесли большой вклад в стабильность нации в военное время."
 GXC.lategame.051.a: "Китайская нация приветствует своих доблестных защитников!"
 GXC.lategame.051.b: "Но от каждого по способностям, а не по мандату правительства."

 GXC.lategame.052.t: "Проблема резервов"
 GXC.lategame.052.d: "При написании своей книги «Три политики военной мобилизации» Бай Чунси подробно описал исторические проблемы, связанные с логистическим подкреплением Китая. В прошлом, когда солдаты погибали, не было системы, гарантирующей отправку замены для усиления армии. Исправление этого упущения стало еще более важным теперь, когда Китай идет на войну с Японией. Бай предложил, чтобы в новой системе ополчения националистического правительства каждому гражданину давалась базовая военная подготовка, чтобы у каждого была возможность действовать как солдат и потенциально быть призванным заменить павших солдат.\n\nЭта резервная модель имела большой успех в провинции Гуанси, и теперь армия Гуанси является одной из самых хорошо снабжаемых, финансируемых и боеспособных сил в Китае, несмотря на ее относительно небольшой размер. Армия Гуанси помогла одержать много побед над милитаристами Чжили и федералистами во время второго Северного похода, несмотря на их численное превосходство. Из-за успеха армии Гуанси Бай стал неофициальным главным теоретиком всей НРА, а председатель Ху предоставил ему беспрецедентное влияние на будущее направление национальной армии. С тех пор Бай неустанно работал над тем, чтобы эта резервная система стала не просто теорией, а реальностью во всем националистическом правительстве."
 GXC.lategame.052.a: "Каждый мужчина — солдат!"
 GXC.lategame.052.b: "Наверняка есть и другая работа?"

 GXC.lategame.053.t: "Фаворитизм в Вампу"
 GXC.lategame.053.d: "В свете недавних военных реформ, моделирующих нашу армию по образцу наших предков, наследие Вампу сияет ярко и сильно во всех армиях, а его курсанты светятся революционным духом. С неоспоримой преданностью как партии, так и Национальной революции, подразделения, происходящие из Вампу, провозглашаются одними из самых элитных сил, которые может предложить наша нация, и получают широкую похвалу как от правительства, так и от общественности за свои военные подвиги.\n\nОднако это позволило коррупции и гнили неуклонно расти и гноиться в нашей командной структуре, поскольку подразделения Вампу начали получать широкое покровительство со стороны верховного командования. Лично избалованные своими командирами, получающие новейшее и самое лучшее оборудование и финансирование раньше всех других подразделений; был даже отчет о том, что группе недисциплинированных курсантов Вампу, чьи действия заслуживали военного трибунала, их командир просто прочитал лекцию и попросил извиниться.\n\nВозглавляя атаку против такого вопиющего кумовства, лицо Новой клики Гуанси и ведущий военный деятель Ли Цзунжэнь обрушил шквал обвинений на правительство, обвиняя важных фигур, таких как [GXC.GetLeader], в поддержке и потворстве таким действиям. Он настаивал на том, что региональные армии должны рассматриваться как равные своим коллегам из Вампу, и что награды должны даваться по заслугам, а не за лояльность.\n\nМногое из того, что говорит Ли Цзунжэнь, звучит правдиво, ибо подразделения Вампу, как правило, не преуспевают в бою намного больше, чем армии Новой Гуанси или Нового Гуандуна. Тем не менее, хотя текущее положение дел и не одобрялось активно, оно было весьма выгодно для [GXC.GetLeader], поскольку лояльная армия обеспечивала быстрый прогресс на революционном фронте. К сожалению, залп Ли Цзунжэня становится громче и заставляет правительство занять определенную позицию."
 GXC.lategame.053.a: "Истинные революционеры на первом месте!"
 GXC.lategame.053.b: "Каждый солдат бесценен."

