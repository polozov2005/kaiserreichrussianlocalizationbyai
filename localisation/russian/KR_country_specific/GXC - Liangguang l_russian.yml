###Section 4b (200-399): Late Game Economic Events

 ##Shared Economic Events (200-249)

 GXC.lategame.200.t: "Liangguang Beyond Its Borders"
 GXC.lategame.200.d: "As our forces fight and our bureaucrats administrate in regions increasingly detached from Liangguang, and as our powerful economy endures ever further stresses, the government's economic model proves itself invaluable in these trying times. And yet, the government no longer concerns itself with just the Pearl Delta and its neighbouring regions, does it? Indomnitable in its pursuits for economic progres and modernity nonetheless, an economy of significant provincial magnitutde cannot withstand that of national needs.\n\nWhilst we can still reap the benefits, and many appraisals are handed in stride towards the Ministry of Finance, it would appear that such boons are to be increasingly sparse and limited. Liangguang's successes in economic prosperity will surely serve as model for other provinces to follow, and perhaps, even other nation-states in their own right. But until that point, we can only prepare for the inevitable shortfalls."
 GXC.lategame.200.a: "May our economy serve as the national model!"

 ##KMT Unique Economic Events (250-299)

 GXC.lategame.250.t: "Истинный смысл Гоминьдана"
 GXC.lategame.250.d: "Поскольку огромные территории Китая теперь находятся под контролем Националистического правительства, Гоминьдан должен попытаться начать эффективную и компетентную программу экономического восстановления. Хотя возникло много мнений о том, как может выглядеть это восстановление, Ху Ханьминь напомнил о статье, которую он написал, находясь в изгнании в Париже, чтобы она стала руководящей теорией экономической политики Гоминьдана. В работе под названием «Истинный смысл Гоминьдана» Ху утверждает, что Гоминьдан как партия рабочих и крестьян отстаивает интересы всего китайского народа. Подчеркивая интересы рабочих и крестьян, Гоминьдан сплотил вокруг себя всех китайцев в подготовке революции для свержения диктатуры милитаристов и возвращения политической власти народу.\n\nХу подчеркнул, что все китайцы составляют один класс людей, которые пострадали от издевательств иностранных империалистов. Отвергая критику о том, что Гоминьдан является партией мелкой буржуазии, Ху повторил, что партия является единственным революционным органом, представляющим интересы всех китайцев.\n\nВ статье Ху продолжил продвигать свою теорию единого китайского класса, обратившись к вопросу о Трех народных принципах. Он рассматривал принципы как неотъемлемый набор революционной доктрины и утверждал, что было бы недопустимо, чтобы кто-либо брал из них определенную часть для служения одной конкретной группе людей. Цитируя Суня: «Принцип народного благосостояния — это социализм, и он также известен как коммунизм», Ху заключил, что общая собственность на имущество означает достижение счастья всей нацией, отвергая марксистскую теорию классовой борьбы.\n\nНи разу в своей статье Ху не допускал возможности сближения Гоминьдана и КПК, поскольку их идеологии были слишком далеки друг от друга, призывая ЦК отойти от Синдикалистской лиги много лет назад. Конечно, председатель Ван не обратил внимания на слова Ху и привел партию к катастрофе. Теперь у Ху есть шанс исправить бардак Вана и буквально следовать видению Суня."
 GXC.lategame.250.a: "Партия обеспечит экономическое процветание для всех!"

 GXC.lategame.251.t: "Национальная финансовая конференция"
 GXC.lategame.251.d_intro: "В связи с учреждением Националистическим правительством программы Реконструкции была созвана Национальная финансовая конференция. Во имя помощи крестьянам и рабочим было постановлено, что новые дополнительные налоги не будут взиматься, а дополнительные налоги не будут превышать основной земельный налог. В свете этого 5200 дополнительных налогов должны были быть отменены. Хотя это сократит налоговые поступления на 49 миллионов, финансовые министры Гоминьдана согласны, что это необходимый шаг для восстановления сельских и городских районов."
 GXC.lategame.251.d_sun: "$GXC.lategame.251.d_intro$\n\nКонференция также рассмотрела вопрос стандартизации, стремясь стандартизировать как налоги, так и валюты на землях, контролируемых Националистическим правительством и союзными провинциями милитаристов. Сельское хозяйство и пошлина лицзинь на перемещение товаров не облагались налогом. Ведущие светила, включая Сунь Фо и Цзю Чжэна, планируют компенсировать потерю налоговых поступлений, перенаправляя деньги, предназначенные для военных, и надавили на председателя Ху Ханьминя по этому вопросу. Генералы Новой клики Гуанси решительно возражали против этих мер, утверждая, что без сильного военного бюджета НРА не сможет завершить полное объединение или отразить вторжение японцев или немцев.\n\nКонференция в конечном итоге не смогла решить, кто должен быть председателем Центрального банка, хотя список кандидатов был сужен. Первый кандидат Хуан Ханьлян не нравится многим, но является либеральным банкиром, связанным с Сунь Фо, и вряд ли доставит Ху Ханьминю много проблем. Второй кандидат, Фу Жулинь, является более безопасным выбором, будучи фаворитом Цзю Чжэна и его клики Сишань. Третий и четвертый кандидаты, Оу Фанпу и Хуан Сюйчу, не связаны с Ху, Цзю или Сунем, но многие подозревают, что они могут быть связаны с милитаристскими элементами в армии, особенно с Чэнь Цзитаном и Ли Цзунжэнем. Конференция просила председателя Ху выбрать председателя во имя единства."
 GXC.lategame.251.d_nosun: "\n\nКонференция также рассмотрела вопрос стандартизации, стремясь стандартизировать как налоги, так и валюты на землях, контролируемых Националистическим правительством и союзными провинциями милитаристов. Сельское хозяйство и пошлина лицзинь на перемещение товаров не облагались налогом. Ведущие светила, включая У Чаошу и Цзю Чжэна, планируют компенсировать потерю налоговых поступлений, перенаправляя деньги, предназначенные для военных, и надавили на председателя Ху Ханьминя по этому вопросу. Генералы Новой клики Гуанси решительно возражали против этих мер, утверждая, что без сильного военного бюджета НРА не сможет завершить полное объединение или отразить вторжение японцев или немцев.\n\nКонференция в конечном итоге не смогла решить, кто должен быть председателем Центрального банка, хотя список кандидатов был сужен. Первый кандидат Хуан Ханьлян не нравится многим, но является либеральным банкиром, связанным с сыном Отца нации Сунь Фо, и вряд ли доставит Ху Ханьминю много проблем. Второй кандидат, Фу Жулинь, является более безопасным выбором, будучи фаворитом Цзю Чжэна и его клики Сишань. Третий и четвертый кандидаты, Оу Фанпу и Хуан Сюйчу, не связаны с Ху, Цзю или Сунем, но многие подозревают, что они могут быть связаны с милитаристскими элементами в армии, особенно с Чэнь Цзитаном и Ли Цзунжэнем. Конференция просила председателя Ху выбрать председателя во имя единства."
 GXC.lategame.251.a: "Хуан Ханьлян обеспечит надлежащее финансирование."
 GXC.lategame.251.b: "Фу Жулинь — тот, кто нужен для этой работы."
 GXC.lategame.251.c: "Посмотрим, на что способен Оу Фанпу."
 GXC.lategame.251.e: "Назначение Хуан Сюйчу должно заставить генерала Ли отстать от меня."

 GXC.lategame.252.t: "Ссоры из-за излишков"
 GXC.lategame.252.d_sun: "Благодаря фондам «Боксерской контрибуции» и таможенным излишкам, помимо прочего, Националистическое правительство теперь имеет приличную сумму денег, в настоящее время не выделенную ни на какие усилия или проекты. Многие в правительстве уже подготовили официальные предложения по надлежащему распределению средств, первым среди них Сунь Фо, жаждущий использовать свои знания в качестве нового министра железных дорог. Несмотря на его обширные планы, Политический совет Гоминьдана неохотно выделяет Суню финансирование.\n\nЦзоу Лу решительно выступает против перераспределения Сунь Фо боксерских фондов, поскольку они были изначально обещаны министерству образования Сунь Ятсеном, что Цзоу Лу яростно отстаивает как ведущий сторонник народного образования. Поддерживаемая кликой Сишань, оппозиция Цзоу Лу вызывает подлинную озабоченность у многих в Политическом совете. Независимо от ссор гражданского правительства, офицеры Чэнь Цзитан и Ли Цзунжэнь также изложили свои планы по использованию дополнительных средств.\n\nЧэнь, как губернатор провинции Гуандун, надеется использовать средства для обогащения Гуандуна и укрепления своей администрации путем создания железных дорог, развития правительственных отраслей промышленности и увеличения финансирования своих провинциальных вооруженных сил. Чэнь соблазнил Ху Ханьминя обещаниями поддержки, если финансирование будет направлено ему. Многие в Политическом совете осудили Чэня за его регионалистские тенденции, что, возможно, является единственным, в чем Сунь и Цзоу могут согласиться.\n\nЛи Цзунжэнь предложил направить все средства в Национально-революционную армию, поскольку объединение далеко от завершения. Ли утверждает, что деньги, потраченные на что-либо, будут потрачены впустую, так как будущие войны все равно сорвут эти усилия. Хотя Политический совет не впечатлен предложениями ни Чэня, ни Ли, они признают значительное военное влияние, которым обладают оба человека, и не решаются иметь двух врагов, контролирующих армию. В конце концов, решение ложится на [GXC.GetLeader], чтобы выйти из тупика и выбрать, куда пойдут средства."
 GXC.lategame.252.d_nosun: "Благодаря фондам «Боксерской контрибуции» и таможенным излишкам, помимо прочего, Националистическое правительство теперь имеет приличную сумму денег, в настоящее время не выделенную ни на какие усилия или проекты. Многие в правительстве уже подготовили официальные предложения по надлежащему распределению средств, первым среди них Лян Ханьцао, который выступает за агрессивный план развития железных дорог.\n\nЦзоу Лу решительно выступает против перераспределения Лян Ханьцао боксерских фондов, поскольку они были изначально обещаны министерству образования Сунь Ятсеном, что Цзоу Лу яростно отстаивает как ведущий сторонник народного образования. Поддерживаемая кликой Сишань, оппозиция Цзоу Лу вызывает подлинную озабоченность у многих в Политическом совете. Независимо от ссор гражданского правительства, офицеры Чэнь Цзитан и Ли Цзунжэнь также изложили свои планы по использованию дополнительных средств.\n\nЧэнь, как губернатор провинции Гуандун, надеется использовать средства для обогащения Гуандуна и укрепления своей администрации путем создания железных дорог, развития правительственных отраслей промышленности и увеличения финансирования своих провинциальных вооруженных сил. Чэнь соблазнил Ху Ханьминя обещаниями поддержки, если финансирование будет направлено ему. Многие в Политическом совете осудили Чэня за его регионалистские тенденции, но, что довольно любопытно, член Нового Гуандуна Юй Ханьмоу нарушил субординацию, поддержав своего близкого друга Лян Ханьцао в его плане.\n\nЛи Цзунжэнь предложил направить все средства в Национально-революционную армию, поскольку объединение далеко от завершения. Ли утверждает, что деньги, потраченные на что-либо, будут потрачены впустую, так как будущие войны все равно сорвут эти усилия. Хотя Политический совет не впечатлен предложениями ни Чэня, ни Ли, они признают значительное военное влияние, которым обладают оба человека, и не решаются иметь двух врагов, контролирующих армию. В конце концов, решение ложится на [GXC.GetLeader], чтобы выйти из тупика и выбрать, куда пойдут средства."
 GXC.lategame.252.a: "Сунь Фо может получить свои железные дороги."
 GXC.lategame.252.b: "Лян выступает за истинную современность."
 GXC.lategame.252.c: "Цзоу Лу прав, образование превыше всего!"
 GXC.lategame.252.e: "Гуандуну нужно больше средств, Чэнь Цзитан получает мой голос."
 GXC.lategame.252.f: "Ли Цзунжэнь не ошибается, пусть он поддерживает силу военных..."

 GXC.lategame.253.t: "Интриги Сунь Фо"
 GXC.lategame.253.d_sun: "Хотя Сунь Фо приобрел большое влияние в правительстве после назначения на пост министра железных дорог, он все еще был новым лицом во главе нового министерства в Националистическом правительстве. В отличие от Цзоу Лу, Сунь не пользовался уважением партии, несмотря на свою родословную, или, возможно, вопреки ей. Чтобы сделать себе имя, Сунь Фо взял на себя смелость посвятить всю свою энергию своему министерству, чтобы утвердить его как силу, с которой нужно считаться, а также расширить свое влияние в Националистическом правительстве.\n\nПомимо своих обязанностей в отношении железных дорог Китая, Суню было поручено создание правительственной авиакомпании. Сунь купил четыре самолета у американской компании Curtis-Wright и сформировал Китайскую национальную авиационную корпорацию (CNAC), и стал ее президентом. Будучи президентом CNAC и министром железных дорог, Сунь также договорился с Curtis-Wright об авиапочтовом сообщении между крупными городами Китая, включая Шанхай, Ухань, Нанкин, Пекин и Гуанчжоу.\n\nОднако, сделав это, Сунь вызвал гнев министерства связи. Ван Боцюнь, министр связи, подал в суд на Суня за превышение полномочий и посягательство на их сферу деятельности. Ван также настаивал на том, чтобы его министерство было переименовано в Министерство связи и транспорта. В конце концов, Верховный суд Китая встал на сторону министерства связи против Суня, заставив его уступить свою должность президента CNAC Вану."
 GXC.lategame.253.d_nosun: "Без явного лидерства «Наследного принца» в партийной политике Правого Гоминьдана, его фракция Реконструкции, расколотая надвое, обнаружила, что играет в политику с одной связанной рукой. С обвинениями в предательстве, левом расколе или даже в шпионаже в пользу Парижа или Ван Цзинвэя, многим лидерам фракции Реконструкции приходилось полагаться на связи, репутацию и не совсем честные трюки, чтобы сохранить первенство. В то время как такие люди, как У Чаошу, упорствовали благодаря непрерывной службе, другие в лагере Сунь Фо менее защищены от критики и осуждения.\n\nЛян Ханьцао, считающийся искренне близким к Суню, получил обвинения в том, что он всего лишь шпион коварных разведывательных операций Парижского комитета, а именно из-за его прошлой службы у Ван Цзинвэя, хотя благодаря близкой дружбе с Юй Ханьмоу из Новой клики Гуандун, он стал «защищенным» Чэнь Цзитаном, и недосягаем ни для кого, кроме самых строгих антисоциалистов. Ли Ханьхунь аналогичным образом влился в объятия Нового Гуандуна, а именно благодаря недавнему назначению начальником штаба Чэнь Цзитана, хотя и заслужил уважение даже Ли Цзунжэня.\n\nК сожалению, и наиболее поразительно для репутации Сунь Фо, дела обстоят с Хуан Ханьляном. Коррумпированный и осуждаемый как один из преступных банкиров, продавших нацию иностранным империалистам, он не нашел никакого источника защиты ни у своей собственной фракции Реконструкции, ни у Нового Гуандуна. Совсем недавно попытки Хуана добиться изгнания Ван Боцюня, министра связи, с его должности привели к судебному делу против Хуана за превышение полномочий и посягательство на его собственную сферу. В конечном итоге Верховный суд Китая встал на сторону министерства связи против Хуана, и, похоже, Сунь Фо от этого ничуть не выиграл."
 GXC.lategame.253.a: "Неудачный поворот для Суня..."
 GXC.lategame.253.b: "Наследному принцу следует знать свое место!"

