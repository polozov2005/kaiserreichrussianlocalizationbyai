###- Phase I Ideas -###

##Black Monday Ideas
 GXC_raised_miscellaneous_taxes_and_levies_idea: "Гнев по поводу рекрутства и налогов"
 GXC_raised_miscellaneous_taxes_and_levies_idea_desc: "В качестве радикального шага по борьбе с пагубными последствиями, нанесенными экономике нашей провинции «Черным понедельником», наше правительство пошло на увеличение «различных налогов и сборов», взимаемых с населения, что вызвало значительное возмущение граждан, и одновременно нанесло хаос нашему некогда процветающему рынку опиума, от которого мы зависели."

 GXC_manipulate_the_liangguang_yuan_idea: "Валютная нестабильность"
 GXC_manipulate_the_liangguang_yuan_idea_desc: "Наши экономические эксперты рекомендовали нам быстро применить программу девальвации лянгуанского юаня, чтобы дать отпор экономическому коллапсу, однако такие действия вызвали многочисленные вспышки гнева и споров со стороны шэньши и торговцев, хотя широкие слои крестьянства поддерживают наши усилия, видя улучшение своего личного положения."

 GXC_bail_out_failing_industries_idea: "Экономическая помощь гибнущим отраслям"
 GXC_bail_out_failing_industries_idea_desc: "Чтобы спасти нашу местную отечественную промышленность и предотвратить еще большую безработицу в Лянгуане, мы обратились к местным бизнес-лидерам и торговцам, предлагая им безвозмездную денежную помощь в обмен на их продолжение работы и поддержку."

 GXC_pare_military_spending_idea: "Урезанные военные расходы"
 GXC_pare_military_spending_idea_desc: "Хотя наши собственные независимые вооруженные силы когда-то сияли как маяк провинциальной независимости на фоне вмешательства Чжили, они превратились в раздутый, неэффективный бардак. Отзыв значительного финансирования в столь критические времена ударит больно, но приходится чем-то жертвовать."

##Political Ideas
 GXC_struggling_literacy_idea: "Проблемы с грамотностью"
 GXC_struggling_literacy_idea_desc: "К началу XX века уровень грамотности в Китае достиг значительного разрыва с остальным миром, несмотря на формирование и распространение современного образования в результате растущих связей с остальным миром. Тем не менее, как регион, Гуандун является одним из самых грамотных центров Китая: по некоторым данным, уровень грамотности в мегаполисах может приближаться к 80–90%.\n\nТем не менее, сельские районы Лянгуана, такие как Гуанси, продолжают бороться с повсеместной неграмотностью, и потребуются серьезные реформы в образовании, чтобы обеспечить повсеместную грамотность в провинциях."

 GXC_shared_popular_support_0: "Незаконченные дела"
 GXC_shared_popular_support_0_desc: "Лянгуан так и не оправился полностью от политической нестабильности 1910–1920-х годов. Правительства сменяли друг друга в Гуандуне и Гуанси, пока милитаристы, революционеры и другие по очереди отбирали власть друг у друга. Поражение Национального революционного правительства Гоминьдана в Гуанчжоу от сил Чжили при поддержке Германии позволило милитаристам Старой клики Гуанси захватить власть, но их правление, поддерживаемое извне, было шатким. Гуандунские милитаристы сплотились вокруг Гуанчжоу, сохранив ослабленное, но не полностью угасшее федералистское движение. Тем временем Гоминьдан и другие революционные ячейки продолжают действовать в обеих провинциях, надеясь однажды вернуться к власти."

##Military Ideas
 GXC_german_advisors_idea: "Армия немецкого образца"
 GXC_german_advisors_idea_desc: "Вдохновленная работами Бауэра и Секта об их предложениях по реформированию армии; фокусировка на меньших, но более мобильных силах, находящихся под централизованным командованием, лояльным только государству, где каждый назначен на обязанности, соответствующие его опыту. Это также позволяет ресурсам находиться под контролем государства для обслуживания армии во время войны."

 GXC_japanese_advisors_idea: "Армия японского образца"
 GXC_japanese_advisors_idea_desc: "Япония, хоть и представляет угрозу для Китая, является идеальной моделью для отражения наших вооруженных сил, учитывая, что они первыми в Азии отбили европейскую державу полной силой духа, используя мощь пехоты и навыки авиации, следуя кодексу Бусидо, чтобы одолеть империалистических европейцев."

 GXC_anglo_american_advisors_idea: "Армия англо-американского образца"
 GXC_anglo_american_advisors_idea_desc: "Американцами и их английскими сородичами восхищаются не зря: они фокусируются на тактике с использованием артиллерии и более активном использовании промышленности для снабжения армий бесконечным запасом снаряжения, не говоря уже об их приверженности лояльности гражданским правительствам. Подражая им, мы сможем одолеть наших многочисленных врагов."

 GXC_divided_military_idea: "Разделенные региональные войска"
 GXC_divided_military_idea_desc: "В конце концов, Лянгуан — это две провинции, и с таким уникальным регионом естественным образом приходят проблемы регионализма из-за региональных, культурных и языковых различий Гуанси и Гуандуна, которые проникли в вооруженные силы провинции. Армия Гуандуна разделена на множество региональных клик и устарела по сравнению с такими силами, как Фэнтяньская клика на севере, в то время как силы Гуанси сравнивают не более чем с организованными кланами бандитов. Пока эти силы остаются разделенными и неадекватными, потенциал Гуандуна претендовать на шанс национальной значимости — всего лишь мечта глупца."

 GXC_divided_military_2_idea: "Разделенная армия"
 GXC_divided_military_2_idea_desc: "$GXC_divided_military_idea_desc$"

 GXC_controlled_military_idea: "Контролируемая армия"

 GXC_intensified_military_production_idea: "Усиленное военное производство"

 GXC_nra_1_idea: "Дух Вампу"
 GXC_nra_1_idea_desc: "Известные своей абсолютной свирепостью перед лицом превосходящих сил, кадеты Вампу были не похожи ни на каких других солдат во время Северного похода, потерпев поражение только из-за подавляющего технологического и численного превосходства врага. С открытием военной академии Вампу и возрождением ее культуры будет произведено новое поколение политически сознательных, безжалостных и стойких солдат для окончательного объединения и продвижения китайской нации."
 GXC_nra_2_idea: "Дух Вампу"
 GXC_nra_2_idea_desc: "$GXC_nra_1_idea_desc$"
 GXC_nra_2kmt_idea: "Дух Вампу"
 GXC_nra_2kmt_idea_desc: "$GXC_nra_1_idea_desc$"
 GXC_nra_3_idea: "Дух Вампу"
 GXC_nra_3_idea_desc: "$GXC_nra_1_idea_desc$"

 GXC_german_military_idea: "Модель элитной армии (Eliteheer)"
 GXC_german_military_idea_desc: "Вслед за естественным завершением немецких попыток профессионализировать армии Северного и Южного Чжили У Пэйфу и Сунь Чуаньфана соответственно, мы решили больше не считаться просто вспомогательными войсками для их элитных сил, а реализовать нашу собственную программу армии немецкого образца. С элитным ядром, окруженным меньшими силами поддержки, подражание победителям Вельткрига наверняка принесет большие успехи нашему правительству."
 GXC_german_military_2_idea: "Модель элитной армии (Eliteheer)"
 GXC_german_military_2_idea_desc: "$GXC_german_military_idea_desc$"
 GXC_german_military_3a_idea: "Модель элитной армии (Eliteheer)"
 GXC_german_military_3a_idea_desc: "$GXC_german_military_idea_desc$"
 GXC_german_military_3b_idea: "Модель элитной армии (Eliteheer)"
 GXC_german_military_3b_idea_desc: "$GXC_german_military_idea_desc$"
 GXC_german_military_3c_idea: "Модель элитной армии (Eliteheer)"
 GXC_german_military_3c_idea_desc: "$GXC_german_military_idea_desc$"

 GXC_local_officer_initiative_idea: "Инициатива местных офицеров"
 GXC_local_officer_initiative_idea_desc: "Чтобы всегда сохранять наше преимущество и хитрость на поле боя, мы делегировали тактическую инициативу офицерам, непосредственно предвидящим бой, в отличие от какого-то высокомерного генерала вдали от линии фронта. Этим мы надеемся создать культуру независимой инициативы в наших отдельных подразделениях в сочетании со всей армией, чтобы в конечном итоге достичь той же общей цели."

 GXC_guangxi_army_idea: "Гуансийская модель"
 GXC_guangxi_army_idea_desc: "Отстаиваемая известными уроженцами Гуанси, такими как Бай Чунси и Ма Цзи, суровая, наполненная бандитами горная местность Гуанси породила ряд изобретательных тактик для выживания в таком регионе. Тотальная мобилизация народа, идущая параллельно с мышлением и инициативой, направленными на то, чтобы обойти ожидания наших противников; наша армия — это армия истинных Граждан-Солдат."
 GXC_guangxi_army_2_idea: "Гуансийская модель"
 GXC_guangxi_army_2_idea_desc: "$GXC_guangxi_army_idea_desc$"
 GXC_guangxi_army_3_idea: "Гуансийская модель"
 GXC_guangxi_army_3_idea_desc: "$GXC_guangxi_army_idea_desc$"

 GXC_threefold_self_reliance_policy_idea: "Политика тройной опоры на собственные силы"
 GXC_threefold_self_reliance_policy_idea_desc: "Взяв за основу важнейшие Три народных принципа, провозглашенные доктором Сунь Ятсеном: Демократия, Благосостояние, Национализм, модель Гуанси формулирует Три принципа опоры на собственные силы: самоуправление, самообеспечение, самооборона. Китай должен быть объединен с использованием только китайского оружия, материалов и людских ресурсов, и, таким образом, нация также должна быть восстановлена теми же людьми, которые сражаются за нее."

 GXC_from_a_budding_flower_may_ferocity_grow_idea: "Молодежный полумилитаризм"
 GXC_from_a_budding_flower_may_ferocity_grow_idea_desc: "К сожалению для такого растерзанного места, как Китай, средства к существованию молодежи были полностью уничтожены вероломными милитаристами и бандитами. Чтобы защитить нацию от милитаристов и империалистов в равной степени, юных мальчиков и девочек будут с раннего возраста обучать навыкам, необходимым для выживания нации, чтобы будущие поколения никогда не испытали того унижения, которое испытали мы."

 GXC_good_iron_for_nails_good_men_serve_the_army_idea: "Пробуждение народа"
 GXC_good_iron_for_nails_good_men_serve_the_army_idea_desc: "Чтобы возродить дух нашей великой нации, необходимо, чтобы мы объединили все классы народа в общей борьбе за национальную оборону, готовясь к великому кровопролитию. Только из этого великого кровопролития наша нация может обеспечить свое существование и независимость от иностранных держав!"

 GXC_preparing_for_the_great_bloodletting_idea: "Создание современного резерва"
 GXC_preparing_for_the_great_bloodletting_idea_desc: "Само выживание нашей нации может зависеть от ее способности собрать достаточные резервы для усиления наших дивизий во времена великих распрей, поэтому, чтобы Китай восстал против иностранных держав по всему миру, мы внедрим современную систему резерва, созданную по образцу современных военных держав мира."

 GXC_unified_militia_framework_idea: "Единая структура ополчения"
 GXC_unified_militia_framework_idea_desc: "Мы не можем просто полагаться на имитацию старой провинциальной системы ополчения, изобилующей нарушениями против простых людей, коррупцией, злоупотреблениями властью и, прежде всего, казалось бы, лишенной эффективности и дееспособности. Вместо этого система Гуанси должна стремиться к единой организационной структуре с обширным регулированием и идеологической мотивацией. Только тогда мы действительно достигнем новых горизонтов современной войны."

 GXC_chinese_warfare_revitalised_idea: "Возрождение китайского военного искусства"
 GXC_chinese_warfare_revitalised_idea_desc: "Наша система ополчения не является новым изобретением, нет, на самом деле это способ ведения войны, свойственный самому сердцу китайского народа. Все древние династии практиковали нашу систему, мы просто вдохнули в нее новую жизнь, приведя ее в новую эру войны. Наши солдаты и граждане — это одно и то же, как разумный организм. Пусть единство наших народов нанесет удар по нашим врагам повсюду!"

 GXC_commissars_idea: "Политические комиссары"
 GXC_commissars_idea_desc: "Вдохновленная боевыми отрядами СЗРС и политическими комиссарами, составляющими русскую армию, а также прежним социалистическим влиянием на Вампу, воскресшая Национально-революционная армия стремится поддерживать модель комиссаров. Унтер-офицерам поручено вести своих людей в бою и в быту, демонстрируя исключительную ценность и приверженность делу национальной революции, а также проводить лекции по непогрешимой доктрине Трех народных принципов. Если Китай действительно должен быть спасен, то просвещение масс должно начаться с вооруженных сил — чтобы они были армией, действительно преданной делу революции."

 GXC_dare_to_die_idea: "Корпус смертников"
 GXC_dare_to_die_idea_desc: "Спасение приходит не к тем, кто ждет, а к тем, кто готов отдать все: свои средства к существованию, свои семьи и, прежде всего, свои жизни за свободу и вольность Китая. Когда звучит горн и революционный солдат поднимается, чтобы занять свою позицию в этот поворотный момент китайской истории, смелые и мужественные люди должны стремиться сформировать корпус смертников по образцу мучеников Синьхайской революции, чтобы они тоже могли принести свои жизни в жертву за свободный Китай."

##Economic Ideas
 GXC_workers_unrest_idea: "Массовые волнения рабочих"
 GXC_workers_unrest_idea_desc: "С начала года Крысы волна рабочих беспорядков быстро распространилась по городу Гуанчжоу — беспрецедентное количество рабочих и моряков вышло на улицы, требуя реформ после провала Шанхайского восстания 1932 года. Положение Гуанчжоу у моря и его существующие городские сети уже несколько раз пробуждались, яркими примерами чего являются забастовка Кантон-Гонконг 1925 года и недавнее восстание 1932 года.\n\nЛига китайских синдикалистов и Гоминьдан, несомненно, стоят за этой недавней волной беспорядков, которая грозит охватить и разрушить провинцию. С каждым днем тон протестующих продолжает становиться все более и более воинственным, и только время покажет, решат ли рабочие взяться за оружие на баррикадах."

###- Phase II Ideas -###

##Political Ideas

 #KMT Political Ideas
 GXC_KMT_popular_support_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии... конечно же, при поддержке своих покровителей в Париже и Лондоне.\n\nПобеды на поле боя могут сделать многое, но завоевание сердец и умов китайского народа будет тяжелой борьбой. Многие видят в правом крыле Гоминьдана не более чем опозоренное движение или неуправляемых милитаристов с националистической окраской, поддерживаемых оружием и финансированием от русского медведя с севера."
