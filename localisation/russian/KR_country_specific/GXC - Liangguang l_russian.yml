##Primarily Soc Lib Parties

 GXC_GRA_PIP_party: "ВРА-ПОИ"
 GXC_GRA_PIP_party_long: "$GXC_GRA_PIP_party_long_tt$\n§L$GXC_GRA_intro$\n\nСформированная в 1925 году как интеллектуальное детище уставшего Чэнь Цзюнмина, Чжигундан, или Партия общественных интересов, оказалась организацией в изгнании, в основном возглавляемой союзниками Чэнь Цзюнмина из общества Хунмэнь в Соединенных Штатах. Поскольку ее предшественницей была организация Американский Хунмэнь Чжигундан, существовавшая для защиты прав и интересов зарубежных китайцев, партия выдвинула Чэня своим первым председателем, а Тан Цзияо — заместителем председателя. Вскоре после окончательного изгнания Чэня с материка штаб-квартира партии была перенесена в Гонконг вместе с изгнанным милитаристом.\n\nПоддерживая федералистскую модель Чэнь Цзюнмина, основанную на древней системе «колодезных полей» (отсюда и логотип на флаге партии), партия вернулась в местную политику Гуандуна после краха Гоминьдана в 1927 году и найма Чэня Чэнь Ляньбо для организации и сбора его старых сил. Выступая за демократию, федерализм и преобразованные Объединенные провинции Китая, Партия общественных интересов является в основном идеалистическим крылом федералистского движения Чэня, вынужденным соперничать с военным крылом его движения — Армией Юэ.§!\n"
 GXC_GRA_PIP_party_long_tt: "Великий республиканский альянс — Партия общественных интересов Китая (Гунхэ Датунмэн Чжунго Чжигундан)"

