 #Victory Phase Events (200-249):
 GXC.introgame.200.t: "Моральный дух Лянгуана начинает колебаться"
 GXC.introgame.200.d: "Хотя люди Лянгуана разделены идеологией и руководством, они едины в своей неприязни к войне на своей земле. Поскольку быстрая и командная победа на поле боя оказалась неуловимой, многие разочаровались в лозунгах и призывах своих лидеров в пользу практических реалий на местах. Ненависть и горечь от боев сдерживают крупномасштабное братание между вооруженными бандами, перспектива переговоров о капитуляции и, возможно, дезертирства ради лучшей оплаты для солдат, которые были соседями всего несколько месяцев назад, стала заманчивой. Поскольку многие города и поселки все больше разочаровываются необходимостью содержать дорогостоящие постоянные силы, призывы к быстрому разрешению растут, и кажется, что война скоро закончится."
 GXC.introgame.200.a: "Только праведные и истинные доведут этот конфликт до конца."
 GXC.introgame.200_tt: "§rЕсли конфликт не будет разрешен в следующем месяце, будет применен штраф, и слабейшая фракция в целом будет устранена, а ее ресурсы распределены той стороне, перед которой она наиболее уязвима. Война закончится так или иначе в течение трех месяцев.§!"

 GXC.introgame.210.t.NPA: "Силы регионалистов теряют импульс"
 GXC.introgame.210.t.UPC: "Силы федералистов теряют импульс"
 GXC.introgame.210.t.KMT: "Силы Гоминьдана теряют импульс"
 GXC.introgame.210.d.base: "По-настоящему многосторонние гражданские войны редко длятся долго, так как большую часть времени войны имеют тенденцию сводиться к более стабильному двустороннему конфликту с незначительными дополнительными участниками. Похоже, Лянгуан стал именно таким случаем."
 GXC.introgame.210.d.NPA: "$GXC.introgame.210.d.base$ Хотя война продолжает бушевать, гегемония Лу Жунтина и его союзников, которую они годами собирали по крупицам, рассыпалась в прах. Стабильность и консервативный реформизм, которые они долго обещали, но не смогли обеспечить, нашли новых, более популярных чемпионов в лице Чэнь Цзюнмина и его коалиции, причем молодого и в значительной степени неэффективного Лу Юйгуана сравнивают не в его пользу со старшим государственным деятелем Чэнь Цзюнмином. Точно так же регионализм и провинциальная автономия, продвигаемые Старой кликой Гуанси, оказались хуже патриотического федерализма, который привлек большую толпу, особенно когда Старая клика Гуанси терпит поражения на поле боя. Война все еще будет борьбой до конца, но теперь она находится в руках федералистского и гоминьдановского движений, в которых традиционно доминирует Гуандун."
 GXC.introgame.210.d.UPC: "$GXC.introgame.210.d.base$ Хотя война продолжает бушевать, Чэнь Цзюнмин и его федералистский альянс фактически выбыли из борьбы. Федерализм как жизнеспособная идеология значительно упал в общественном воображении китайцев после того, как Чжили успешно завоевали большую часть юга силой. Шаг Чэня по борьбе с господством Чжили и Старой клики Гуанси улучшил его состояние, однако поражения на поле боя в значительной степени подорвали энтузиазм в отношении его движения, и большая часть его импульса с тех пор перешла к его более динамичным, радикальным соперникам в Гоминьдане. Война все еще будет борьбой до конца, но она превратилась в дихотомию между революционным Гоминьданом и реакционной Старой кликой Гуанси."
 GXC.introgame.210.d.KMT: "$GXC.introgame.210.d.base$ Хотя война продолжает бушевать, конфликт на данном этапе стал в основном определяться как продолжение старого конфликта Гуанси-Гуандун, поскольку Лу Юйгуан и его силы, базирующиеся в основном в Гуанси, сражаются с Чэнь Цзюнмином и его альянсом, в основном сосредоточенным в Гуандуне. Хотя Гоминьдан, всегда бывший аутсайдером, снова оказался в значительной степени бессильным, его ячейки были загнаны в подполье, а многие силы Новой клики Гуанси были поглощены рядами Старой клики Гуанси. Война все еще будет борьбой до конца, но, похоже, националисты сделали свой выстрел и промахнулись."
 GXC.introgame.210.a: "Один враг повержен, остался другой."

 GXC.introgame.220.t: "Силы соперников тают"
 GXC.introgame.220.d.base: "Поскольку две провинции были истощены войной, а ветры дули в их пользу, их враги были вынуждены просто уступить дорогу победившим захватчикам. Разруха конфликта потрясла стабильность обеих провинций, и у людей мало аппетита к дальнейшему конфликту. То же истощение, которое принесло им победу, лишило их шансов на какие-либо дальнейшие завоевания в то же время, поскольку апатичные местные жители обращаются к восстановлению. Процесс исцеления, несомненно, будет трудным, и Лянгуан может пожалеть о том, что отстал от своих соседей."
 GXC.introgame.220.d.NPA: "Лу Жунтин потратил годы, пытаясь построить стабильную систему в Лянгуане, и она оказалась устойчивой на фоне восстаний Гоминьдана и федералистов в двух провинциях. Их враги, казалось, увяли после месяцев нерешительных качелей, даже если Старой клике Гуанси не удалось нанести драматический смертельный удар, чтобы выиграть войну. В то время как лидеры врага бежали в укрытие или изгнание, большинство их лоялистов вернулись домой с оружием, чтобы охранять свои деревни, даже когда они номинально приняли новый режим. Немногим радикалам, желающим продолжать борьбу в качестве повстанцев, придется просто надеяться, что их товарищи за пределами Лянгуана скоро придут, чтобы освободить их.\n\n$GXC.introgame.220.d.base$"
 GXC.introgame.220.d.UPC: "Впервые за более чем десятилетие Чэнь Цзюнмин является хозяином Гуандуна — успешно сплотив коалицию, в которой доминирует Гуандун, к победе, обещая средний путь между радикализмом Гоминьдана и реакционизмом Старого Гуанси. Их враги, казалось, увяли после месяцев нерешительных качелей, даже если федералистам не удалось нанести драматический смертельный удар, чтобы выиграть войну. В то время как лидеры врага бежали в укрытие или изгнание, большинство их лоялистов вернулись домой с оружием, чтобы охранять свои деревни, даже когда они номинально приняли новый режим. Немногим радикалам, желающим продолжать борьбу в качестве повстанцев, придется просто надеяться, что их товарищи за пределами Лянгуана скоро придут, чтобы освободить их.\n\n$GXC.introgame.220.d.base$"
 GXC.introgame.220.d.KMT: "Как и в прошлые дни, Гоминьдан вернулся из невыгодного положения, только чтобы обезопасить Лянгуан посредством смеси удачи, идеологического рвения и прагматичных союзов на местах. Силы как федералистов, так и регионалистов увяли после месяцев нерешительных качелей, даже если Гоминьдану не удалось нанести драматический смертельный удар, чтобы выиграть войну. В то время как лидеры врага бежали в укрытие или изгнание, большинство их лоялистов вернулись домой с оружием, чтобы охранять свои деревни, даже когда они номинально приняли новый режим.\n\n$GXC.introgame.220.d.base$"
 GXC.introgame.220.a: "Мы победили, но какой ценой?"

###- Section 1b (400-799): Introgame Economic Events -###
 GXC.introgame.400.t: "Экономические перспективы Лянгуана"
 GXC.introgame.400.d: "После Чёрного понедельника группа ведущих ученых, экономистов и банкиров Лянгуана представила свой мрачный, но честный отчет [GXC.GetLeader], в котором описывается быстро ухудшающаяся экономическая ситуация в двух провинциях. Возглавляют комиссию ведущий педагог и бывший дипломат Чжу Цзяхуа, а также банкиры Чжан Гунцюань и Чэнь Ляньчжун, три самых крупных имени в политике Гуанчжоу.\n\nДве провинции едва успели оправиться от боевых действий в раннюю Эру милитаристов, наслаждаясь всего четырьмя годами относительного спокойствия после того, как Лу Жунтин установил свою гегемонию в 1932 году. Бандитизм и пиратство процветали, заставляя местные города, джентри и торговцев расширять ополчение, истощая местную казну и сокращая торговлю. С ростом стоимости ведения бизнеса и падением экспорта из-за Великой депрессии экономика была особенно уязвима для дальнейших спадов.\n\nЧёрный понедельник особенно сильно ударил по шелковой промышленности Гуандуна, которая уже боролась с последствиями Великой депрессии для Китая. В начале десятилетия существовали сотни шелковых фирм, в которых работало более двух миллионов рабочих. Сейчас их менее сотни, и все, кроме полдюжины, находятся на грани банкротства. Быстрый упадок традиционной китайской промышленности рассматривается одними как обвинительный акт безэмоциональному материализму капитализма, а другими — как символ отсталости Китая.\n\nСоциальные последствия Чёрного понедельника также были серьезными. Средние доходы в Гуандуне (сравнительно богатой провинции) упали почти до трети от того, что было в 1930 году, и продолжают ухудшаться. Говорят, что семьи продают лишних детей, а безработные молодые люди присоединяются к бандитским группам и «бандитским» повстанцам. Антиконцессионные, антикапиталистические и антиистеблишментские настроения растут, угрожая дальнейшим социальным хаосом."
 GXC.introgame.400.a: "Бандитизм, терзающий внутренние районы, должен быть остановлен!"
 GXC.introgame.400.b: "Пришло время осудить иностранных капиталистов, которые нас эксплуатируют!"
 GXC.introgame.400.c: "Мы должны спасти традиционные отрасли Гуандуна!"

###- Section 1c (800-999): Introgame Misc Events -###

###- Phase II Events -###

###- Section 2a (000-199): Early Game Military Events -##
 ##Shared Military Events (000-049)
 GXC.earlygame.000.t: "Вопрос консолидации вооруженных сил"
 GXC.earlygame.000.d: "Выдающаяся победа [ROOT.GetLeader] подавила все инакомыслие и потенциальных соперников в наших претензиях на региональное лидерство. С этим великим триумфом стабильность, наконец, может быть восстановлена в Лянгуане, и может начаться процесс восстановления. Среди других насущных вопросов в такое время — консолидация правительственной власти над нашей молодой армией. Хотя немцы и проводили номинальное обучение, Берлин никогда не рассматривал армию Лянгуана как нечто большее, чем колониальных аскари для защиты своих активов в Легации и более широких вспомогательных сил по борьбе с повстанцами для центральной армии. Крайне важно, чтобы мы решительно и безотлагательно определили наше военное направление, и с этой целью представились три варианта.\n\nЕсть, конечно, естественный вариант продолжения структурирования нашей армии по немецкому образцу. Продвигая концепцию элитного ядра подразделений, которое дополняло бы более широкую, более крупную, но менее качественную армию. Копируя успехи Германии в Вельткриге, это поддержит стабильность в нашей собственной армии и позволит нашим силам сосредоточиться на подготовке к будущему.\n\nВ качестве альтернативы, и, возможно, нетрадиционно, наша армия могла бы формироваться в соответствии с тактикой «ударил-убежал» кланов Гуанси, институционализируя стратегии, развернутые и используемые против местных выносливых бандитов Гуанси. С этой целью мы бы преобразовали нашу провинциальную армию в гражданское ополчение, размывая границы между гражданином и призывником.\n\nНаконец, мы пытаемся подражать решающим силам, созданным десятилетие назад, путем возобновления концепций, преподаваемых в Академии Вампу. Представляя собой меньшую, преданную и элитную армию, построенную по русскому образцу с элементами японского бусидо и влиянием социалистической революции, элитная подготовка Вампу может стать решающим фактором в будущем правительства [ROOT.GetLeader]."
 GXC.earlygame.000.a: "Мы строим армию, достойную Республики!"

 GXC.earlygame.001.t: "Судьба кланов Старого Гуанси"
 GXC.earlygame.001.d: "С успехом [ROOT.GetLeader] над другими соперниками в провинциях консолидация местной власти продолжилась. Во время борьбы за власть каждый претендент собирал свои собственные силы для поддержки своих притязаний, многие из которых либо бежали, либо погибли в боях. Самое любопытное, что поступали сообщения о том, что определенные силы, лояльные кланам Старого Гуанси, обращались к нашим командирам с просьбой о помиловании в обмен на продолжение службы. Известные своей неортодоксальной тактикой, силы Старого Гуанси устойчивы и выносливы. Однако эти просьбы о помиловании рассматриваются нашим верховным командованием с подозрением, поскольку их нелояльность собственному делу уже доказана. Несмотря на спорность принятия их предложения, знания, навыки и связи, которыми обладают их командиры, могут стать неотъемлемой частью нашего успеха в национальном масштабе."
 GXC.earlygame.001.a: "Поглотить силы Старого Гуанси."
 GXC.earlygame.001.b: "Горе побежденным."

 GXC.earlygame.002.t: "Судьба остатков Гоминьдана"
 GXC.earlygame.002.d: "С успехом [ROOT.GetLeader] над другими соперниками в провинциях консолидация местной власти продолжилась. Во время борьбы за власть каждый претендент собирал свои собственные силы для поддержки своих притязаний, многие из которых либо бежали, либо погибли в боях. Самое любопытное, что поступали сообщения о том, что определенные силы, лояльные армии Нового Гуанси, обращались к нашим командирам с просьбой о помиловании в обмен на продолжение службы. Известные своим военным гением, силы Ли-Бай (Ли Цзунжэня и Бай Чунси) элитны и способны. Однако эти просьбы о помиловании рассматриваются нашим верховным командованием с подозрением, поскольку многие в их рядах все еще предпочли бы ГМД, а не [ROOT.GetLeader]. Несмотря на спорность принятия их предложения, знания, навыки и связи, которыми обладают их командиры, могут стать неотъемлемой частью нашего успеха в национальном масштабе."
 GXC.earlygame.002.a: "Поглотить силы Нового Гуанси."
 GXC.earlygame.002.b: "Горе побежденным."

 GXC.earlygame.003.t: "Судьба Армии Юэ"
 GXC.earlygame.003.d: "С успехом [ROOT.GetLeader] над другими соперниками в провинциях консолидация местной власти продолжилась. Во время борьбы за власть каждый претендент собирал свои собственные силы для поддержки своих притязаний, многие из которых либо бежали, либо погибли в боях. Самое любопытное, что поступали сообщения о том, что определенные силы, лояльные федералистской армии Юэ, обращались к нашим командирам с просьбой о помиловании в обмен на продолжение службы. Известные своей превосходной организацией и финансированием среди других китайских сил, а также имеющие общую республиканскую историю, можно было бы получить много преимуществ от работы с нашими старыми союзниками снова. Однако эти просьбы о помиловании рассматриваются нашим верховным командованием с подозрением, поскольку их нелояльность собственному делу уже доказана, наряду с их предыдущим предательством собратьев-республиканцев. Несмотря на спорность принятия их предложения, знания, навыки и идеологическая лояльность, которыми обладают их командиры, могут стать неотъемлемой частью нашего успеха в национальном масштабе."
 GXC.earlygame.003.a: "Поглотить членов клики Армии Юэ."
 GXC.earlygame.003.b: "Горе побежденным."

 GXC.earlygame.010.t: "Объединить крестьян и армию"
 GXC.earlygame.010.d: "Известный уроженец Гуанси и главный эксперт по ведению войны Бай Чунси разработал и теоретизировал уникальный набор тактик и стратегий во время своего изгнания в Гуйчжоу. Благодаря неоднократным рейдам через границу провинции из Гуйчжоу в Гуанси он наконец смог конкретно выстроить новый способ ведения конфликта. Теоретизируя, что предыдущие китайские династии, такие как Ся, Шан и Чжоу, не имели профессиональных армий, и не существовало различий между солдатами или крестьянами. Это позволяло народу и армии прийти к союзу единого существа. Когда война спускалась на население, все в стране брались за оружие, а когда возвращался мир, войска расходились обрабатывать землю. Идеальная система полного слияния гражданского и солдата, известная как «Юй пин юй нун», что переводится как «Объединить крестьянство и солдатов» или даже «Армия и крестьянство едины», как это было в Ли цзи (Книге обрядов). Сам Бай считал, что эта система перешла в династии Хань и Тан, и была окончательно отменена при Сун. Рассматривая это как великую трагедию и начало ненависти крестьян к военным.\n\nПризывая Китай восстановить систему, подобную этой, Бай утверждал, что такая система существует в странах по всему миру, таких как Франция, Британия, Япония и, что важно, Швейцария. Хотя обоснованность этих утверждений под вопросом, учитывая, что Бай (и действительно большинство наблюдателей) никогда на самом деле не ступал ногой ни в Европу, ни в Японию, он задел за живое, утверждая, что только мобилизовав весь китайский народ, Китай может быть спасен от внешнего вторжения. Хотя его присутствие не обязательно приветствуется в коридорах власти, наследие идей Бая остается на его родине в Гуанси, где он считает, что ее традиции как децентрализованного, милитаризованного общества, страдающего от бандитизма, являются идеальной основой для возрождения такой системы."
 GXC.earlygame.010.a: "Интересно."

 GXC.earlygame.011.t: "Зачистка от бандитизма"
 GXC.earlygame.011.d.1: "В провинции Гуанси есть поговорка: «В Гуанси нет места без гор; нет гор без пещер; нет пещер без бандитов».\n\nБандитизм был постоянной и непрерывной чумой в Гуанси. Генерал Ли Цзунжэнь теоретизировал четыре основные причины такого постоянного присутствия бандитов. Во-первых, Гуанси остается одной из самых нищих провинций в Китае. Во-вторых, Гуанси является, пожалуй, одним из самых изолированных и отдаленных уголков Китая, где различные деревни остаются разобщенными, что усугубляется отсутствием образования. В-третьих, мультикультурные конфликты Гуанси между различными враждующими этническими группами внутри провинции культивировали выносливый и воинственный образ жизни. Наконец, методы, используемые предыдущими правительствами для подавления бандитов и бандитизма, оказались крайне неэффективными. Все это культивирует процветающую среду для бандитизма и партизан.\n\nВ соответствии с новым планом, принятым правительством, Гуанси была разделена на двенадцать регионов ополчения, над которыми окружным магистратам был предоставлен дискреционный контроль над ополчением для борьбы с бандитами и другими вопросами, считающимися необходимыми, децентрализуя борьбу с преступностью. Однако кампании по борьбе с бандитизмом были жестокими и изнурительными, требуя форсированных маршей как ополчения, так и регулярных армейских сил для атаки опорных пунктов бандитов.\n\nХотя для успешного завершения потребовалось несколько лет, мы наконец можем заявить о победе. Однако вопрос о том, что делать со всеми бывшими бандитами, теперь стоит более остро, чем когда-либо. Большинство в нашем правительстве предлагают помилование для этих людей, запрет на службу в армии и разрешение вернуться к своим семьям при условии хорошего поведения. Другие в нашем правительстве предлагают нам нанять этих людей, так как они уже обученные и способные бойцы с оружием. Наконец, мы могли бы покончить со всем притворством прощения и казнить всех за их многочисленные преступления против китайского народа."
 GXC.earlygame.011.d.2: "В провинции Гуанси есть поговорка: «В Гуанси нет места без гор; нет гор без пещер; нет пещер без бандитов».\n\nБандитизм был постоянной и непрерывной чумой в Гуанси. Генерал Лу Юйгуан осведомлен о четырех причинах их продолжающейся деятельности. Во-первых, Гуанси остается одной из самых нищих провинций. Во-вторых, Гуанси является, пожалуй, одним из самых изолированных уголков страны, где различные деревни остаются разобщенными, что усугубляется отсутствием образования. В-третьих, мультикультурные конфликты Гуанси между различными враждующими этническими группами внутри провинции культивировали выносливый и воинственный образ жизни. Наконец, методы, используемые предыдущими правительствами для подавления бандитов и бандитизма, оказались крайне неэффективными. Все это культивирует процветающую среду для бандитизма и партизан.\n\nВ соответствии с новым планом, принятым правительством, Гуанси была разделена на двенадцать регионов ополчения, над которыми окружным магистратам был предоставлен дискреционный контроль над ополчением для борьбы с бандитами и другими вопросами, считающимися необходимыми, децентрализуя борьбу с преступностью. Однако кампании по борьбе с бандитизмом были жестокими и изнурительными, требуя форсированных маршей как ополчения, так и регулярных армейских сил для атаки опорных пунктов бандитов.\n\nХотя для успешного завершения потребовалось несколько лет, мы наконец можем заявить о нашей долгожданной победе. Однако вопрос о том, что делать со всеми бывшими бандитами, теперь стоит более остро, чем когда-либо. Большинство в нашем правительстве предлагают помилование для этих людей; запрет на службу в армии и разрешение вернуться к своим семьям при условии хорошего поведения. Другие в нашем правительстве предлагают нам нанять этих людей, так как они уже обученные и способные бойцы с оружием. Наконец, мы могли бы покончить со всем притворством прощения и казнить всех за их многочисленные преступления против китайского народа."
 GXC.earlygame.011.a: "Предоставить помилование."
 GXC.earlygame.011.b: "Давайте наберем новобранцев."
 GXC.earlygame.011.c: "Никакой пощады этим подонкам!"

 GXC.earlygame.012.t: "Новая учебная программа кадетов"
 GXC.earlygame.012.d.1: "Наши лучшие военные офицеры разработали революционно новую программу обучения, потребовавшую много часов тщательной проработки 18-месячного курса для будущих курсантов армии.\n\nПри поступлении в армию в среднем возрасте 17 лет новобранцы могут ожидать учебную программу, состоящую на 33% из военной подготовки и на 66% из невоенной подготовки. Военная часть программы будет включать базовую строевую подготовку, обучение стрельбе из винтовки, обучение стрельбе из легкого пулемета наряду с обучением обращению с ручными гранатами и учениями по штурму батальона. С этим также будет проводиться одно 3-часовое ночное учение каждую неделю программы.\n\nС другой стороны, невоенная подготовка составит 12 месяцев курса, состоящего из 120 часов, каждый из которых посвящен сельскохозяйственной науке, праву и экономической реконструкции, 180 часов по политической реконструкции, 100 часов по идеям Сунь Ятсена, 20 часов по политике трех само-, 60 часов по общей культурной реконструкции и еще 60 часов по провинциальным правилам, касающимся начальных школ, 60 часов по избранным эссе, 40 часов по методам обучения и дополнительные короткие занятия по ведению дневника, проведению дискуссий, выдаче наград и наказаний и различным другим предметам. Одновременно предлагается подготовительный курс для тех, кто не окончил среднюю школу, в котором 100 часов посвящены китайскому языку, отдельные 100 часов истории наряду с географией, 80 часов естественным наукам и еще 80 часов математике, с 40 часами, посвященными гражданственности.\n\nОгромный масштаб и амбиции новой программы обеспокоили некоторых в нашем Верховном командовании, причем некоторые ключевые офицеры подчеркивают, что военной части не хватает акцента, и что невоенные аспекты дороги и делают программу больше похожей на базовое образование для взрослых, чем на образование для будущих солдат."
 GXC.earlygame.012.d.2: "Наши лучшие военные офицеры разработали революционно новую программу обучения, потребовавшую много часов тщательной проработки 18-месячного курса для будущих курсантов армии.\n\nПри поступлении в армию в среднем возрасте 17 лет новобранцы могут ожидать учебную программу, состоящую на 33% из военной подготовки и на 66% из невоенной подготовки. Военная часть программы будет включать базовую строевую подготовку, обучение стрельбе из винтовки, обучение стрельбе из легкого пулемета наряду с обучением обращению с ручными гранатами и учениями по штурму батальона. С этим также будет проводиться одно 3-часовое ночное учение каждую неделю программы.\n\nС другой стороны, невоенная подготовка составит 12 месяцев курса, состоящего из 120 часов, каждый из которых посвящен сельскохозяйственной науке, праву и экономической реконструкции, 180 часов по политической реконструкции, 100 часов по теории [ROOT.GetLeader], 20 часов по политике трех само-, 60 часов по общей культурной реконструкции и еще 60 часов по провинциальным правилам, касающимся начальных школ, 60 часов по избранным эссе, 40 часов по методам обучения и дополнительные короткие занятия по ведению дневника, проведению дискуссий, выдаче наград и наказаний и различным другим предметам. Одновременно предлагается подготовительный курс для тех, кто не окончил среднюю школу, в котором 100 часов посвящены китайскому языку, отдельные 100 часов истории наряду с географией, 80 часов естественным наукам и еще 80 часов математике, с 40 часами, посвященными гражданственности.\n\nОгромный масштаб и амбиции новой программы обеспокоили некоторых в нашем Верховном командовании, причем некоторые ключевые офицеры подчеркивают, что военной части не хватает акцента, и что невоенные аспекты дороги и делают программу больше похожей на базовое образование для взрослых, чем на образование для будущих солдат."
 GXC.earlygame.012.a: "Расширить военную часть."
 GXC.earlygame.012.b: "Включить политическую индоктринацию."

 GXC.earlygame.020.t: "Влияние Орла"
 GXC.earlygame.020.d: "С тех пор как иностранцы ступили на китайскую землю, они всегда сохраняли постоянное присутствие, хотели их видеть или нет. Хотя большая часть внимания остается на негативных аспектах иностранного влияния, таких как договорные порты и оккупации, были всплески приемлемого сотрудничества и взаимного развития, чтобы противостоять этому. Многие китайцы смогли получить образование в западных университетах, а индустриализация была поддержана иностранным оборудованием наряду с их опытом. Однако с недавним хаосом в Лянгуане и в остальном мире многие в нашем правительстве пересматривают нашу позицию и приоритеты на будущее.\n\nПосле первого Вельткрига, и частично из-за зарождающихся интересов на полях сражений Китая, Рейх отправил множество немецких советников в регион. Большинство из них были ветеранами Вельткрига и были упрямы в таком способе ведения войны, с трудом даже концептуализируя реалии войны Эры милитаристов. Чтобы приспособиться к этому, некоторые из еще более старых сотрудников, отправленных в Китай, черпали вдохновение из своего опыта ведения колониальных войн до Вельткрига. С таким мышлением был разработан план, который должен был быть реализован по всему Китаю: Южное и Северное Чжили должны были разработать и культивировать элитный — хотя и меньший — план 80 дивизий, который должен был быть дополнен местными милитаристами, предоставляющими эквивалент немецких колониальных Шутцтруппе.\n\nПоскольку китайский порядок в последнее время практически разрушен, ключевые фигуры в наших вооруженных силах решили подражать вышеупомянутому немецкому плану, но с Гуандуном в его сердце. Поистине передовое ядро, дополненное вспомогательными силами, независимыми от Нанкина и Пекина, призванное наконец воссоединить китайский народ под одним правительством — нашим правительством."
 GXC.earlygame.020.a: "Элитные силы для нового Китая!"

 GXC.earlygame.021.t: "Наши потенциальные советники"
 GXC.earlygame.021.d: "Когда дело доходит до иностранных советников и экспертизы, недостатка в наемной помощи нет. Немецкий Орел вряд ли одинок в попытках добиться кантонского влияния — японцы, американцы и даже остатки Британской империи готовы протянуть руку любой партии, которая может заплатить правильную цену. Хотя все способные имеют гордую военную историю, включающую экспедиции в Китай, каждый вариант имеет все более очевидные сильные и слабые стороны как в политическом, так и в военном отношении.\n\nНемецкое влияние повсеместно по всему земному шару, и в Китае их оружие, промышленность и персонал наводняют города. Будучи покровителями гегемонистских фракций Чжили в Китае, Орел был творцом королей 1920-х годов. Однако после краха берлинского фондового рынка их влияние отступает, и некоторые полагают, что его перья изнашиваются.\n\nСоперничая с немцами за влияние, японцы взлетели от враждующих кланов до могущественной империи, единственной азиатской нации, способной соперничать с западными державами. Этот стремительный взлет не мог бы произойти без их преданных и воинственных солдат. Некогда считавшиеся братским народом, японцы предоставляют наиболее доступный вариант с суровой репутацией, успешно победив европейцев (и Цин) ранее. Затмив нас в силе, они оказались суровыми соседями, и было бы мудро остерегаться их в будущем.\n\nНаконец, англо-американский лагерь, держава, которая когда-то простиралась по всему миру, имеет богатую историю как внутри, так и вне Китая. Их алчная погоня за китайскими рынками оказалась авангардом унижения Китая, и другие колонизаторы вскоре последовали за ними. Их правление наконец подошло к концу с разрушением Британской империи и катастрофическим экономическим спадом Америки. Несмотря на прошлую вражду, американские изгнанники и британские наемники наводняют Лянгуан через Гонконг и представляют собой дешевый вариант, практически свободный от постоянного иностранного влияния."
 GXC.earlygame.021.a: "Пойти с непоколебимыми немцами."
 GXC.earlygame.021.b: "Приобрести японский опыт."
 GXC.earlygame.021.c: "Англо-американцы имеют приоритет."

 GXC.earlygame.022.t: "Импорт оборудования"
 GXC.earlygame.022.d: "Следуя нашему выбору в сохранении иностранного обучения и средств ведения войны в наших армиях, мы начали медленно модернизировать наши внутренние возможности оборудования. Однако, чтобы компенсировать разрыв, мы начали проявлять живой интерес к зарождающемуся рынку вооружений, приобретая множество контрактов на иностранное оборудование. Индивидуальные торговцы оружием, такие как Хеншенкляйн Бёклин, дали о себе знать нам в Гуанчжоу, заключая оборонный контракт за оборонным контрактом. Хотя наша способность платить эти иногда смехотворные цены за оборудование непроста, это может быть выбором между победой или поражением в наших будущих кампаниях. В настоящее время нам доступно множество планов вооружения, включая покупку небольшого ассортимента англо-американских танкеток и бронемашин, покупку немецких инструментов промышленного производства для помощи нашим арсеналам, или, что более практично, мы можем приобрести японскую артиллерию и пехотное снаряжение для снабжения наших сил."
 GXC.earlygame.022.a: "Приобрести немецкую промышленную помощь."
 GXC.earlygame.022.b: "Приобрести японское оружие."
 GXC.earlygame.022.c: "Приобрести англо-американскую технику."
 GXC.earlygame.022.e: "Похоже, никто не хочет продавать..."

 GXC.earlygame.030.t: "Открывается новая Академия"
 GXC.earlygame.030.d: "Военная академия Вампу имеет яркую и богатую историю. После погружения Китая в политику милитаристов и хаос, Сунь Ятсен предпринял многочисленные попытки начать Северный поход со своих плацдармов в Гуандуне. Однако молодое правительство ГМД оставалось в военном отношении неспособным превзойти даже местных милитаристов, не говоря уже о Бэйяне. Чтобы решить эту проблему, было основание местной военной академии, направленной на выпуск классов революционных — и, что самое важное, лояльных — офицеров для службы в армии, соответствующих идеям доктора Суня. Сосредоточив все революционные военные таланты в одной академии, первым начальником Вампу был вундеркинд Чан Кайши, а различные другие ключевые фигуры, такие как Ляо Чжункай, Ху Ханьминь и Ван Цзинвэй, также играли важные роли в академии. Курсанты, выпущенные Вампу, были одними из самых яростных, преданных и способных солдат, когда-либо спускавшихся на китайское поле боя, готовых пожертвовать всем и собой ради освобождения нации.\n\nИмея это в виду, наше военное верховное командование разработало планы по воспроизведению упорства и успехов Вампу, возрождая концепцию меньшей, более качественной и набожной армии для удара глубоко в сердце наших врагов. С первичным влиянием красных русских и французских советников в сочетании с аспектами японского бусидо, а теперь и вдохновением от современной русской доктрины, новая Вампу будет производить революционных солдат, неслыханных в Китае, не склоняющихся ни перед каким коррумпированным влиянием и сражающихся за искреннее будущее нации."
 GXC.earlygame.030.a: "Братство, Преданность, Искренность."

 GXC.earlygame.031.t: "Политические комиссары в Новой Академии"
 GXC.earlygame.031.d.1: "Большую часть свирепой репутации и упорства, развитых курсантами Вампу, можно объяснить многим: интенсивным режимом тренировок, с одной стороны, или, что более важно, тем фактом, что они сражались за то, во что действительно и безоговорочно верили. Получив плотную политическую индоктринацию в сочетании с военной подготовкой во время своего пребывания в академии, многие курсанты были лишь продолжением яростных революционных настроений в Гуанчжоу. Их ярость и тоска были направлены на преобразование своей нации, своей родины, к лучшему, независимо от крови, которую нужно пролить. Под этим предлогом военное верховное командование решило реанимировать концепцию «политических комиссаров», стремясь преобразовать наших курсантов, чтобы они одновременно служили солдатами и пропагандистами дела. Ведущие революционеры в нашем правительстве обеспокоены тем, что революционный огонь курсантов Вампу поглотит их целиком, создав необузданную и неконтролируемую армию, и многие предлагают нам сдерживать их, чтобы они не перестали быть легко управляемыми. Однако существует также насущный вопрос о том, что добавление политических комиссаров в нашу командную цепь будет противоречить нашим доктринам, добавляя политическое вмешательство в военные дела и создавая потенциал для неподчинения со стороны бессмысленных фанатиков."
 GXC.earlygame.031.d.2: "Большую часть свирепой репутации и упорства, развитых курсантами Вампу, можно объяснить многим: интенсивным режимом тренировок, с одной стороны, или, что более важно, тем фактом, что они сражались за то, во что действительно и безоговорочно верили. Получив плотную политическую индоктринацию в сочетании с военной подготовкой во время своего пребывания в академии, многие курсанты были лишь продолжением яростных революционных настроений в Гуанчжоу. Их ярость и тоска были направлены на преобразование своей нации, своей родины, к лучшему, независимо от крови, которую нужно пролить. Под этим предлогом военное верховное командование решило реанимировать концепцию «политических комиссаров», стремясь преобразовать наших курсантов, чтобы они одновременно служили солдатами и пропагандистами дела. Ведущие чиновники в нашем правительстве обеспокоены тем, что политическая индоктринация будет доминировать в наших военных структурах, угрожая любому подобию здоровой дискуссии и демократии. Однако существует также насущный вопрос о том, что добавление политических комиссаров в нашу командную цепь будет противоречить нашим доктринам, добавляя политическое вмешательство в военные дела и создавая потенциал для неподчинения со стороны бессмысленных фанатиков."
 GXC.earlygame.031.a: "Именно через дух Синьхая мы торжествуем!"
 GXC.earlygame.031.b: "Фальшивые идеологии и древние тактики не выигрывают войны."

 GXC.earlygame.032.t: "Дилемма мобильного корпуса"
 GXC.earlygame.032.d: "Следуя нашему влиянию современной русской доктрины, мы попытались подражать многим потенциальным атрибутам, присущим «Глубокой операции». Однако ключевым компонентом такой доктрины являются мобильные подразделения, необходимые для эффективного использования прорывов в линиях противника, пробитых нашими благородными солдатами. В то время как даже русским приходится мириться с медленной механизацией вооруженных сил из-за их опоры в основном на конную кавалерию — чему не способствует влияние более упрямых ветеранов Белой армии, — Китай в целом находится в еще худшем сценарии, едва в состоянии позволить себе — не говоря уже о производстве — моторизацию любого рода. Некоторые в нашем верховном командовании предлагают нам использовать наши невероятно ограниченные ресурсы для финансирования небольшого полумоторизованного корпуса, чтобы проложить путь современной войне в Китае. Другие предлагают нам принять прагматичный вариант и сохранить кавалерийский корпус как есть, оставив моторизацию армии на более поздний срок."
 GXC.earlygame.032.a: "Внедрить экспериментальную полумоторизацию."
 GXC.earlygame.032.b: "Сохранить первенство кавалерии."

 GXC.earlygame.041.t: "Лицензирование иностранного оружия"
 GXC.earlygame.041.d: "Хотя собственная оружейная промышленность Лянгуана способна производить разнообразное стрелковое оружие, о чем свидетельствуют возможности Гуандунского арсенала, текущая мощность наших внутренних отраслей довольно недостаточна для наших национальных амбиций по воссоединению Китая. Растет страх, что арсеналы наших соперников могут давать гораздо лучшее оборудование в больших количествах, несомненно, с помощью иностранной поддержки. Поэтому некоторые из нашего военного верховного командования предложили приобрести собственные иностранные контракты, чтобы заполнить пробел.\n\nНемецкое оружие доказало свою эффективность временем своими неоднократными победами в войне и недавним принятием на вооружение по всему Китаю после реставрации. Их конкурентами являются японцы, которые могут производить азиатское вооружение, разработанное для региональных театров военных действий, возможно, лучше подходящее для китайских конфликтов. Между тем, англо-американское оборудование имеет преимущество в том, что оно находится в избытке и недорого в приобретении. Конечно, всегда есть постоянный риск того, что эти сделки с иностранным оружием не гарантированно будут длиться вечно, и поэтому, возможно, было бы мудрее поддержать нашу внутреннюю промышленность вместо этого."
 GXC.earlygame.041.a: "Немецкое оружие выиграло Вельткриг."
 GXC.earlygame.041.b: "Японское оружие для азиатской войны."
 GXC.earlygame.041.c: "Англо-американские излишки в изобилии и дешевы."
 GXC.earlygame.041.e: "Приоритет нашей растущей внутренней промышленности."

 GXC.earlygame.042.t: "Наши отечественные смельчаки"
 GXC.earlygame.042.d: "Хотя концепция китайских ВВС не является совершенно чуждой в китайской войне, она никогда не была реализована по-настоящему. Несмотря на это, были предприняты многочисленные попытки, от Чжили до Фэнтяня, и более локально, различные милитаристы Гуанси и Гуандуна создали свои собственные версии независимых авиационных программ. Большинство из них оказали очень мало реального влияния на китайские поля сражений, а устаревшие самолеты и сомнительные пилоты уменьшали любые эффекты, которые они могли бы иметь в бою. Несмотря на это, недавняя интеграция и объединение различных провинциальных авиационных программ в единую структуру обеспечивает чистый лист, необходимый для того, чтобы действительно родить достойный воздушный флот. Однако различные нынешние воздушные курсанты неопытны, высокомерны и недисциплинированны — часто они обязаны своим положением тому, что являются сыновьями богатых семей зарубежных китайцев в США. Хотя это невероятно сложная задача, некоторые предложили заменить текущий состав пилотов, чтобы получить более профессиональные и опытные кадры, в то время как другие предложили бы нам просто ужесточить наши стандарты и муштровать нынешних смельчаков до надлежащего состояния."
 GXC.earlygame.042.a: "Ввести более строгую дисциплину."
 GXC.earlygame.042.b: "Уволить их всех, начать с нуля."

 GXC.earlygame.043.t: "Программа ВВС Лянгуана"
 GXC.earlygame.043.d: "В наших усилиях по созданию значительных и достойных военно-воздушных сил, способных оспаривать наше внутреннее небо, мы решили предпринять усилия по привлечению иностранного персонала с опытом работы в ВВС. Прецедент такого шага был в недавней истории Лянгуана, когда милитаристы Гуанси наняли ассортимент британских ветеранов, предоставленных Дальневосточной авиационной компанией в Гонконге, для обучения молодого воздушного флота. Эти британские инструкторы были затем частично заменены японским военным персоналом после краха Империи.\n\nМежду тем, милитаристы Гуандуна отдавали приоритет закупке американского и британского персонала и оборудования для своих попыток создания ВВС, хотя растущее немецкое влияние убедило некоторых, что, возможно, пришло время перемен.\n\nПредприняв шаги по консолидации власти, [ROOT.GetLeader] чувствует себя достаточно уверенно, чтобы провести самую своевременную реформу: он решительно заключил, что сделка должна проводиться только с одним поставщиком, без посредников. Он с гордостью утверждает, что это сэкономит деньги и уменьшит коррупцию в программе, одновременно ставя ВВС под его контроль."
 GXC.earlygame.043.a: "Немцы доминируют в небе."
 GXC.earlygame.043.b: "Японцы могут попытаться снова."
 GXC.earlygame.043.c: "У англо-американцев есть история."

 GXC.earlygame.044.t: "Патрулирование Южно-Китайского моря"
 GXC.earlygame.044.d: "Сколько себя помнят, Южно-Китайское море было очагом войны и оспариваемых претензий, простираясь с тех пор, как европейское влияние достигло Азии, до нынешних времен. Недавно Южно-Китайское море оспаривалось между китайцами на материке, японцами на Тайване, американцами на Филиппинах, британцами в Гонконге, а теперь и немцами в бывшем Французском Индокитае. Поскольку все стороны соперничают за полную безопасность и контроль, все разработали уникальные методы оспаривания вод. Хотя мы никогда не сможем сравниться ни с одной из великих держав в их попытках контролировать море, мы все же можем попытаться заключить контракты на производство флота, использующего их методы морской войны. Немцы и их экспертное использование крейсеров в их азиатском флоте, японцы, оспаривающие воды посредством подводной войны, или англо-американская опора на линкоры — все это перспективные варианты для принятия нашим флотом."
 GXC.earlygame.044.a: "Немцы предлагают свежие идеи."
 GXC.earlygame.044.b: "Японцы хорошо знают моря."
 GXC.earlygame.044.c: "Англо-американцы давно доминируют."
 GXC.earlygame.044.e: "Мы должны усилить внутренние усилия."

 ##KMT Unique Military Events (050-099)
 GXC.earlygame.050.t: "Лянгуанская совместная военно-политическая конференция"
 GXC.earlygame.050.d: "Вслед за недавними назначениями в нашем кабинете, ведущей военной фигуре Бай Чунси была предоставлена престижная возможность выступить на Лянгуанской совместной военно-политической конференции, чтобы подготовить почву для его революционной реструктуризации армий. Бай провозгласил свою новую теорию войны, выступая за полную массовую мобилизацию китайского народа.\n\nОтстаивая «Юй пин юй нун» (Объединить крестьянство и солдатов), он утверждает, что модернизировал эту традиционную концепцию для новой эры современной войны. По его словам: «Подготовить себя к борьбе не означает только то, что мы должны обучать войска. Мы должны обучать массы. Должна быть не только военная подготовка, должна быть политическая, экономическая и культурная подготовка. Причина этого в том, что война сегодня ведется не армией против армии. Это война граждан против граждан — тотальная война. Это война не только оружия. Это война, противопоставляющая общую национальную мощь одной нации мощи другой».\n\nХотя есть те, кто оказывает широкую поддержку этим новым концепциям — в первую очередь Новая клика Гуанси — было значительное сопротивление. В частности, пристальное внимание было направлено на убеждение, что Бай предпочел бы превратить студентов в машины, нацеленные на войну, и ничего больше.\n\nТщательно отвергая эти обвинения, Бай утверждал, что он лишь насаждает «хорошие привычки», давая им новое направление и цель, отбрасывая плохие привычки, такие как эзотерика. Он даже зашел так далеко, что утверждал, что солдат — самый живой человек из всех. «Каким образом я превратился в машину?» — как сообщается, спросил он.\n\nВслед за этим многие опасаются, что безжалостное внедрение Баем новых стратегий войны вызовет раскол в наших вооруженных силах в тяжелое время острой необходимости в единстве. Другие, однако, утверждают, что бескомпромиссное революционное мышление необходимо для обеспечения завершения мечты Сунь Ятсена."
 GXC.earlygame.050.a: "Никаких компромиссов."
 GXC.earlygame.050.b: "Проявить сдержанность."

 GXC.earlygame.051.t: "Две военные системы"
 GXC.earlygame.051.d: "Наш ведущий военный теоретик, Бай Чунси, утверждал, что все вооруженные силы действуют в рамках одной из двух основных систем: «Чжэнбин» и «Мубин».\n\nЧжэнбин функционирует, используя краткосрочную военную службу как требование гражданства. Базовое качество призывников лучше, чем у добровольцев, расходы минимизированы, можно обучить больше солдат. Хотя он признает, что демобилизованные призывники, отозванные на действительную службу, будут уступать регулярным войскам, это уравновешивается тем фактом, что по мере возвращения каждого класса призывников к гражданской жизни будет мало социальных потрясений или создания бандитизма.\n\nМубин, с другой стороны, — это содержание добровольческой армии, набранной путем долгосрочного зачисления. Регулярные войска, как правило, смелые и хорошо обученные бойцы, но многие профессиональные солдаты записываются из-за того, что им нечего есть, они беспокойно хотят грабить и бродить, или являются беглецами. Их постоянное содержание, даже в мирное время, является постоянным бременем для экономики.\n\nБай разработал новую систему призыва, где в мирное время она добровольная, а во время войны — лотерея. Каждый трудоспособный мужчина призывного возраста будет тянуть номер; когда деревни получают призыв на новобранцев, те, у кого самые низкие номера, вызываемые в строгом арифметическом порядке, будут призваны, если они не смогут позволить себе специальный налог на освобождение.\n\nКаждому призывнику будет присвоена классификация ополчения. Те, кому 18-30 лет, относятся к классу А и сражаются на передовой, а те, кому 30-45 лет, относятся к классу B и действуют как резерв или поддержка тыла. Тыловые резервисты получают 10 часов базовой подготовки перед переводом в готовый резерв для периодического получения дальнейшей подготовки. При мобилизации вдали от дома все будут считаться постоянным ополчением.\n\nНесмотря на это дальнейшее уточнение его рассуждений, многие выступают против концепций Бая, утверждая, что это разбавит профессионализм нашей армии. Многие гражданские члены считают, что это шаг слишком далеко, опасаясь дальнейшей милитаризации общества."
 GXC.earlygame.051.a: "Полное объединение солдат и крестьян!"
 GXC.earlygame.051.b: "Элитные силы все еще требуются."

 GXC.earlygame.052.t: "Кадры Национальной революции"
 GXC.earlygame.052.d: "По мере реструктуризации наших вооруженных сил по всей Гуанси был создан новый набор Кадровых академий ополчения. Курсанты проходят двухмесячную учебную программу, а выпускников отправляют в штабы окружного ополчения для дальнейшего обучения или продвижения по службе. Новостные агентства Гуанси хвалят эти академии за приверженность концепции школ, тесно связанных с обществом, и образования, тесно связанного с жизнью, «пробуждая народ» в отличие от элитарных и непрактичных традиционных школ.\n\nБай Чунси не поощрял простое увеличение количества кадетских мест в существующих военных училищах, утверждая, что это создает избыток офицеров в мирное время, которые превращаются в «бродяг высокого класса». Желая милитаризованного, но мирного общества, он сосредоточился на предоставлении существующим студентам университетов дополнительной подготовки.\n\nЕго попытки распространить эту политику на другие провинции встретили негативную реакцию. Студенчество Гуандуна яростно протестовало, настаивая на свободе студентов выбирать свое образование. Новая клика Гуанси, известная своим антиинтеллектуализмом, осудила этих студентов и высмеяла их за частые протесты против бездействия правительства в отношении иностранного империализма, но нежелание рисковать собственной жизнью.\n\nЗащищая своего союзника, Ли Цзунжэнь утверждает, что военная подготовка на самом деле идет на пользу студентам, помогая им культивировать силу и преодолевать стигму против военной службы вместо легкомысленных, романтических занятий, таких как «игра на скрипках и флейтах». Бывший учитель физкультуры, он описал традиционных интеллектуалов как «людей письма, просто гордящихся тем, что они стройные и бледные, чтобы показать, насколько они действительно культурны, — не имея сил поймать курицу». Он сетует, что даже в мирных странах военные рассматриваются как почетное ремесло, однако в Китае это постоянно рассматривается как позор."
 GXC.earlygame.052.a: "Студентам место в школах."
 GXC.earlygame.052.b: "Необходимая жертва для нации."

 GXC.earlygame.053.t: "Женские подразделения образования для взрослых"
 GXC.earlygame.053.d: "В наших усилиях по дальнейшему освобождению китайского народа мы направили свое внимание на китайскую женщину. Продвигая интеграцию ополчения в китайское общество, каждая женщина получает подготовку, аналогичную своим коллегам-мужчинам, при этом такие эгалитарные усилия считаются заметной и постоянной чертой программы мобилизации.\n\nХотя это номинальная попытка равенства полов, против инициативы все еще выдвигается многочисленная критика. Мужчины по-прежнему получают более широкий спектр возможностей для трудоустройства, и существует множество произвольных правил о поддержании разделения мужчин и женщин во время службы. В качестве поразительного нового шага, направленного на дальнейшее развитие программы, руководство партии предложило концепцию, позволяющую женщинам также служить в различных боевых ролях и обязанностях наряду с их работой в ополчении. По поводу такого предложения было много дискуссий, так как вопрос многогранен: некоторые в партии приветствуют благородный шаг к истинно эгалитарному обществу, однако другие отмечают, что это может быть шагом слишком далеко, предостерегая от такого расширения — примечательно, что прародитель концепции, Новая клика Гуанси, выступает против такого расширения, заявляя, что текущая реализация достаточно достойна."
 GXC.earlygame.053.a: "Достойная программа."
 GXC.earlygame.053.b: "Расширить ее до боевых ролей."

 GXC.earlygame.054.t: "Три принципа и самообеспечение"
 GXC.earlygame.054.d: "Вернувшаяся Новая клика Гуанси призвала к участию простых людей в защите Гуанси и ее восстановлении. Хотя это и предназначалось для поощрения местного самоуправления, Клика никогда не предполагала, что ополчение, которое они вырастили, будет независимым, как армии милитаристов. Для них ополчение является продолжением принципов доктора Суня, действуя в соответствии с «Тремя принципами самообеспечения»: самооборона, самообеспечение и самоуправление.\n\nОрганизация нашей новой системы ополчения зеркально отражает армию, включая параллельные звания. Окружные магистраты также выполняют функции командиров окружного ополчения и имеют воинские звания, эквивалентные командирам бригад, а магистраты подокругов командуют полками численностью 1500 человек. Мэры также являются командирами местных батальонов ополчения численностью несколько сотен человек, а главы местных деревень или главы городских районов также содержат местные роты ополчения численностью до 100 человек.\n\nВсе должно продвигаться десятками: 10 дворов — это деревня, 10 деревень — это волость и так далее. Тем не менее, после трудностей в реализации избыточные уровни, такие как подокруга, постепенно отменяются для эффективности. Обучение ополчения осуществляется местными правительственными органами, при этом ополчению поручено участвовать в переписи населения, управлении зернохранилищами, руководстве кооперативными обществами сельскохозяйственного производства, пересадке рассады, орошении сельскохозяйственных угодий, содержании дорог, создании школьных программ и так далее.\n\nЭто укрепило двойные гражданско-военные обязанности окружных офицеров, смоделированные по образцу окружных интендантов периода Цин. Тем не менее, хотя в своих гражданских ролях они отчитываются перед местными администрациями, в своем военном качестве они отчитываются непосредственно перед провинциальным правительством, получая приказы от штаба своей группы армий. Внешние наблюдатели с благоговением или ужасом наблюдают за тем, как быстро Новая клика Гуанси преобразила свою провинцию."
 GXC.earlygame.054.a: "Новая, гениальная программа!"
 GXC.earlygame.054.b: "Искажение принципов доктора Суня."

 GXC.earlygame.055.t: "Герой 4-й армии"
 GXC.earlygame.055.d: "В эпоху Национальной революции, возможно, ни одна армия не внесла большего вклада в освобождение Китая, чем 4-я армия. И все же даже в этом ассортименте героев один человек стоит выше остальных. Цай Тинкай храбро остался в Фуцзяни после необходимого отступления Центрального комитета во Францию, ожидая шанса разжечь Четвертую революцию. Этот шанс выпал в Шанхае в 1932 году. Реакционные милитаристы Сунь Чуаньфана обескровили Восточный Китай, продав свое достоинство за немецкую поддержку.\n\nКогда китайским массам это надоело, и они подняли восстания во многих крупных городах, Цай и его друг Цзян Гуаннай не теряли времени, пробравшись в Сямэнь и добравшись до Шанхая на лодке. Находясь там, Цай быстро взял на себя ответственность и лично сражался против наступающих сил Лиги на окраинах Шанхая, организуя повстанцев в более организованную боевую силу. Хотя и неофициально, Цай и его люди назывались 19-й маршрутной армией Центральным Исполнительным Комитетом.\n\nКогда войска Лиги под командованием Ци Сеюаня наконец вошли в город, Цай и его люди сражались день и ночь на улицах в стойком сопротивлении. Когда Ци лично прибыл на передовую, чтобы наблюдать за прогрессом своих людей, шальная пуля, выпущенная Цаем, задела его правую руку. Несмотря на решимость Цая, Цзяна и 19-й маршрутной армии, Ци и Армия Цзянсу в конечном итоге смогли вернуть Шанхай и жестоко расправиться с восставшими, что привело к общему отступлению в горы Чжэцзяна.\n\nПробираясь на юг, Цай и его люди смогли уклониться от Чжэцзянской армии Лу Сянтина и соединились с остатками сил НРА в Фуцзяни под командованием Ли Цзишэня, который поглотил остатки 19-й маршрутной армии в 4-ю армию. Хотя Шанхайское восстание закончилось провалом, Цай Тинкай и 19-я маршрутная армия навсегда запомнятся своим храбрым выступлением против немецкого империализма и деспотизма Бэйяна."
 GXC.earlygame.055.a: "Троекратное ура Главному революционному герою Китая!"

 GXC.earlygame.070.t: "Новый начальник академии"
 GXC.earlygame.070.intro: "Во время героического Северного похода и его мучительного краха многие курсанты Вампу служили и погибли. Среди павших был ее печально известный начальник Чан Кайши, и вместе с ним старая академия распалась. В то время как многие из ее выпускников отступили в Гуйчжоу, другие присоединились к бандитам или другим республиканцам или ушли на покой, чтобы жить тихой жизнью.\n\nВо время своего пребывания на посту начальника Чан предпринял несколько попыток повысить важность и масштаб такой роли в революции. Подстегивая шквал глубоких межличностных отношений с различными курсантами и преподавателями, он превратил ее в важный политический пост, который оказывал значительное влияние на направление не только армии, но и революции в целом.\n\nВозродив это ключевое учреждение, возник вопрос о том, кто его возглавит. Хотя были предприняты усилия по ограничению влияния этой роли, конкуренция за эту должность тем не менее была жесткой."
 GXC.earlygame.070.d_rkmt: "$GXC.earlygame.070.intro$ Появились два фаворита. Генерал Ли Цзунжэнь — лидер Новой клики Гуанси, блестящий командир, но со своими собственными амбициями. Его соперник — генерал Ли Лецзюнь, известный южный революционный герой и ветеран партии, связанный с Кликой Сишань.\n\nДругие ведущие претенденты были исключены: Чэнь Цзитан из-за его губернаторства в провинции Гуандун, в то время как Бай Чунси снял свою кандидатуру, чтобы поддержать заявку своего друга Ли Цзунжэня. Сюй Чунчжи, со своей стороны, был назначен военным министром, и партия не желает централизовать военную власть в одних руках, чтобы избежать еще одного Чана.\n\nОкончательное решение наверняка повлияет на будущее Вампу и направление Национально-революционной армии в предстоящих войнах, и поэтому окончательное решение для Начальника академии — это..."
 GXC.earlygame.070.d_lkmt: "$GXC.earlygame.070.intro$ Исходя из относительно острой потребности в подходящем директоре или, по крайней мере, идеологически здравом, гонка свелась к двум кандидатам в частности.\n\nГенерал Е Цзяньин — вундеркинд, символизирующий новое поколение китайских солдат, соратник покойного Чана, хотя и левый, он щеголяет прошлым опытом работы инструктором в Вампу, чтобы подкрепить свою кандидатуру. Его соперник — генерал Цай Тинкай, известный герой Железной армии, близкий соратник Чэнь Миншу и один из самых опытных офицеров НРА. Хотя его катастрофическое отсутствие опыта в области преподавания было его главным недостатком.\n\nДругие претенденты в основном сняли свои кандидатуры или были исключены, такие как Чэнь Миншу или такие люди, как Дай Цзи или Цзян Гуаннай. Окончательное решение наверняка повлияет на будущее Вампу и направление Национально-революционной армии в предстоящих войнах, и даже на интеграцию секты Лянгуан в более широкую НРА. И, таким образом, окончательное решение для начальника академии — это..."
 GXC.earlygame.070.a: "Уважаемый Ли Лецзюнь."
 GXC.earlygame.070.b: "Неукротимый Ли Цзунжэнь."
 GXC.earlygame.070.c: "Герой перевала Яньлин, Е Цзяньин."
 GXC.earlygame.070.e: "Человек железной решимости, Цай Тинкай."
 GXC.earlygame.070.f: "Оставить нашего текущего начальника."

 GXC.earlygame.071.t: "Наследие Начальника"
 GXC.earlygame.071.d: "Репутация Чан Кайши среди членов партии тревожная; некоторые считают его неудачником с благими намерениями или диктатором, пытавшимся контролировать революцию; провал Северного похода под его эгидой привел к опозоренному наследию. И левые, и правые в партии редко хвалили лидерство Чана, критикуя его политические махинации и его способность привести Национально-революционную армию к победе. Вызвав неприязненное отношение к нему со стороны большей части истеблишмента внутри партии, многие из наших уважаемых ведущих деятелей или командиров разделили бы это негативное чувство. Но для простого пехотинца или свежего курсанта наследие первого Начальника является положительным — решительный лидер, который успешно довел бы Северный поход и революцию до конца, если бы его так скоро не забрало убийство. Фактически, многие из старой клики Чана внутри партии и армии разбросаны по всему Китаю, и его влияние все еще эхом отдается в залах Вампу по сей день. Поистине, некоторые даже утверждают, что нам следует пересмотреть наш взгляд на генерала, учитывая концепции бусидо, которые он привил себе и своим солдатам, создав разновидность солдата, которому нет равных, его практичный и прагматичный склад ума, позволяющий Чану принимать решения, лишенные идеологических проблем, и общую преданность революции, которую демонстрируют выпускники Вампу. Приступая к возрождению Вампу, потребуется занять официальную позицию по наследию первого Начальника, чтобы подать пример всем будущим курсантам академии."
 GXC.earlygame.071.a: "Он был мудрым наставником."
 GXC.earlygame.071.b: "Попытка стать автократом."

 GXC.earlygame.072.t: "Российские военные советники"
 GXC.earlygame.072.d: "В нашей попытке модернизировать нашу армию мы успешно пролоббировали российское правительство, чтобы оно прислало нам военных советников, которые помогут нам создать силу, структурированную по русскому образцу. Их опыт в Гражданской войне в России привел их к разработке концепции «Глубокой операции», которую мы надеемся, они смогут передать нам.\n\nДействительно, старая Вампу началась с помощью красных русских эмигрантов, и хотя эти новые советники — бывшие офицеры Белой армии, их вера в патриотическую породу солдат и вдохновляющий офицерский класс, который будет сражаться до победного конца, нам вполне знакома.\n\nОсвещает новое яркое партнерство между людьми в правительстве [ROOT.GetLeader] Петр фон Глазенап, ветеран ударных полков Корнилова. Аполитичный и стремящийся сосредоточиться на военных вопросах, он имел большое участие и опыт в последних реформах русской армии в качестве члена штаба Корнилова и Деникина. Обладая обширными знаниями о том, как организовать армию с нуля, он станет бесценным активом.\n\nСопровождает Петра Георгий Эльвенгрен, близкий как к Корнилову, так и к Савинкову. Он выполняет роль, сродни дипломату-солдату, подчеркивая важность идеологии в элитной армии и используя свой значительный опыт в организации повстанческих партизанских операций против численно превосходящего противника. Тем временем Всеволод Иванов — компетентный кавалерийский офицер с мышлением тотальной войны, подчеркивающий важность массовой пропаганды и имеющий опыт ведения боевых действий в регионах с плохой инфраструктурой.\n\nБудучи в значительной степени аполитичными в вопросах Гоминьдана, все они начали эффективно интегрироваться в структуру Вампу, и их миссия служит дальнейшему укреплению нашего военного направления и потенциально открывает новое партнерство на мировой арене. Они принесли с собой много полезных идей для направления развития наших вооруженных сил."
 GXC.earlygame.072.a: "Оттачивая стратегию, мы торжествуем!"
 GXC.earlygame.072.b: "Элитная армия прокладывает путь к победе!"
 GXC.earlygame.072.c: "Только через тотальную мобилизацию мы можем победить!"

 GXC.earlygame.073.t: "Столкновение личностей Гвардии"
 GXC.earlygame.073.d: "В такой яростной, буйной и идеологической армии, как Национально-революционная армия, неизбежно возникновение разногласий и недовольства под поверхностью. Большинство разногласий быстро гасятся их наставниками, но между генералами нашей армии начал назревать вполне реальный конфликт.\n\nСильно политизированный характер НРА позволил партийным грандам старой революции, таким как Сюй Чунчжи и Ли Лецзюнь, сохранить значительное влияние благодаря своему опыту ведения войн Национальной защиты и Защиты конституции.\n\nОднако для более молодых офицеров, таких как Ли Цзунжэнь, Бай Чунси и Чэнь Цзитан, эти фигуры старой гвардии вряд ли годятся для руководства современной армией. Конечно, эти критики не лишены оснований: Сюй Чунчжи и Ли Лецзюнь не командовали войсками в течение десятилетия из-за своего длительного изгнания, и даже до этого они были функционально отодвинуты на второй план Чан Кайши. Офицеры-милитаристы утверждают, что имеют гораздо более сильную связь с китайской войной, сражаясь и проливая кровь на местных полях сражений и оттачивая местную тактику.\n\nНесмотря на это, прежний героизм Ли Лецзюня и Сюй Чунчжи не следует сбрасывать со счетов, и оба внимательно следили за развитием русской армии. Этому дисфункциональному состоянию способствует тот факт, что немногие из наших ведущих генералов имеют прямую связь со старым Вампу, что заставляет их стремиться закрепиться в новом. Это разногласие в наших методах достигло точки, когда [ROOT.GetLeader] пришлось решать, какую сторону предпочесть: надежные методы старой гвардии или неортодоксальный подход милитаристов."
 GXC.earlygame.073.a: "Предпочесть ветеранов, Сюя и Ли."
 GXC.earlygame.073.b: "Новые идеи для новой эпохи."

 GXC.earlygame.074.t: "Душа Вампу"
 GXC.earlygame.074.d: "Больше, чем просто военное училище, мифология и дух Вампу развиваются параллельно с духом самого революционера. Рука об руку, в полной и абсолютной согласованности, Вампу продвигается вперед, неся с собой революцию. Истинный оплот национальной революции и постоянный источник гордости и силы для китайской нации, курсанты Вампу являются маяком света во времена великой тьмы.\n\nПродолжающееся развитие духа, преданности и товарищества, созданных в этих самых залах, преодолевает все препятствия, будь то противостоящие милитаристы, немцы или японцы; ничто не может встать на пути марша выпускников Вампу к освобождению. Порождая множество тесных сетей и отношений на всю жизнь, курсанты Вампу связываются через триумф и трагедию независимо от ситуации и сохранили такие связи даже во время трагедии Северного похода.\n\nУ нового поколения курсантов Вампу впереди светлое будущее, с заслугами и уроками прошлого поколения, запечатленными в следующем. В этом поколении появилась возможность, поскольку мы можем сосредоточить наши усилия на оттачивании определенного революционного аспекта для курсантов. Увеличим ли мы влияние Бусидо в учебной программе, влияние Социалистической революции с их решительной преданностью революции, или, возможно, более широкое расширение, связанное с китайским национализмом, для содействия их истинной лояльности нации."
 GXC.earlygame.074.a: "Чтобы сделать их настоящими воинами, усилить аспекты Бусидо."
 GXC.earlygame.074.b: "Преданность революции абсолютно необходима."
 GXC.earlygame.074.c: "Китайский солдат, сражающийся за китайскую нацию!"

 GXC.earlygame.090.t: "Игры власти во флоте"
 GXC.earlygame.090.d: "Несмотря на небольшой размер флота Гуанчжоу, споры, затрагивающие его, к сожалению, не столь скромны по масштабу. Со временем Чэнь Цзитан стал все более настороженно относиться к Чэнь Цэ, который пробился в руководство флотом с помощью Чэнь Миншу и других левых.\n\nЭто негодование уже привело к увольнению курсантов, которые были слишком близки к Чэнь Цэ, и губернатор поместил Военно-морскую академию под пристальное наблюдение. Чтобы контролировать флот Гуанчжоу и еще больше ограничить власть командующего, Чэнь Цзитан не чурается методов, наносящих ущерб флоту. Все чаще можно увидеть армейских офицеров капитанами самых важных судов, как показывают случаи с новейшими кораблями флота: четыре торпедных катера, приобретенные у Германии и Британского Союза два года назад, были переданы под командование свежих выпускников Гуандунской военно-политической академии.\n\nКомандование самым недавним приобретением флота, небольшим тральщиком, и речной канонерской лодкой, построенной на верфи Гуаннань в Гуанчжоу, было передано непосредственно брату Чэнь Цзитана, Чэнь Вэйчжоу, соляному комиссару по профессии. Это стало последней каплей, так как многие моряки и офицеры, связанные с левыми, отказались служить под началом назначенцев Чэнь Цзитана, в прямом неповиновении губернатору. Неудивительно, что эти мелкие склоки наложили свой отпечаток на весь флот, и предстоит пройти долгий путь, если мы хотим вернуть все в нормальное русло."
 GXC.earlygame.090.a: "Компромисс с лоялистами Чэнь Цэ."
 GXC.earlygame.090.b: "Очистить флот от диссидентов."

 ##UPC/NPA Unique Military Events (100-104)

 GXC.earlygame.100.t: "Положение дел в Военно-морском Вампу"
 GXC.earlygame.100.d: "Созданная в духе Движения самоусиления после Второй опиумной войны, Гуандунская военно-морская и сухопутная академия стала предшественницей современной Военно-морской академии Вампу. С разрешения Чжан Чжидуна, губернатора Гуандуна и сторонника модернизации, Академия была сформирована в 1887 году, и первоначально в ней работали три иностранных преподавателя — один британец и два немца. Разделенные на студентов морской навигации и инженерии, различные студенты, зачисленные в академию, приезжали со всей страны. Позже учреждение разделилось на Военно-морскую и Сухопутную школы, и в конце 1800-х годов было переименовано в Военно-морскую академию Вампу.\n\nС добавлением других учреждений, таких как Военно-морская промышленная академия и Военно-морская торпедная академия, учебная программа была обновлена, и учреждение переименовано в Гуандунскую военно-морскую промышленную академию. С пятью годами подготовительных курсов и пятью годами бакалавриата выпускники академии отправлялись за границу для дальнейшего обучения. Выпуская некоторых из лучших морских офицеров страны, ее предметы варьировались от навигации, учений с морскими орудиями и связи до математики, физики и английского языка. Переименованная после Синьхая, она столкнулась с финансовыми трудностями в Эру милитаристов и в конечном итоге была объединена с Военной академией Вампу в 1924 году.\n\nВ 1930 году местные морские офицеры подали прошение мэру Чэнь Ляньбо о возобновлении работы учреждения после его закрытия после Северного похода, но получили отказ. Теперь, считая подходящим время для возрождения Академии, [ROOT.GetLeader] получил задачу назначить ведущую фигуру нового учреждения, его директора. Появилось три варианта. Это получивший британское образование Цзян Сиюань, известный своими связями с Чэнь Цзитаном, выпускник «молодой гвардии» Ли Цинвэнь и, наконец, ветеран, бывший губернатор Гуандуна и морской министр Тан Тингуан."
 GXC.earlygame.100.a: "Тан Тингуан должен доказать лояльность."
 GXC.earlygame.100.b: "Ли Цинвэнь — восходящая звезда!"
 GXC.earlygame.100.c: "Нынешний директор хорошо справляется."

 GXC.earlygame.101.t: "Всестороннее изучение искусства войны"
 GXC.earlygame.101.d: "Хотя Китай как нация, возможно, особенно высмеивается за военные стратегии и тактики, использовавшиеся в Эру милитаристов — с заметными случаями, когда численно превосходящие силы побеждались простым моральным духом или отсутствием координации и многим другим — это все же период богатой истории нации, когда военная наука продвинулась вперед, и были предложены концепции, соперничающие даже с величайшими мыслителями Запада. Возможно, наиболее распространенной является социал-дарвинистская приверженность Тотальной войне и соображения о мобилизации народа Китая для Национальной обороны. Одним из самых известных приверженцев такой философии был покойный Цай Э и итерации, предоставленные легендарным Цзян Байли.\n\nТем не менее, нация породила многочисленные другие направления военной теории, в частности, фокус Ли Эркана на науке и модернизации в дополнение к настойчивости на Бусидо и Воинском духе, и акцент на тактических боях сражения, а не на стратегической мобилизации народа для войны. Точно так же существует класс офицеров, обученных немецким теориям войны, выступающих за мобилизацию промышленности или настаивающих на инициативе офицеров для победы в войне. Или даже теории Гоминьдана, такие как склонность Бай Чунси к гражданину-солдату, партизанская мобильная война Чжу Дэ или философия Ян Цзе «Война — это жизнь».\n\nУ Гуандуна тоже есть свои теоретические герои. Сравнимые со всеми вышеупомянутыми, теории Ли Юйжи, пожалуй, самые новые, но полные потенциала. Молодой и энергичный, Ли решил оставить свой след в международной военной истории. Сосредоточившись на более чем 2000-летней присущей Китаю воинской традиции и писаниях, он недавно опубликовал полный анализ «Искусства войны» Сунь-цзы и его приложений. Достигнув замечательного успеха, сообщается, что он надеется опубликовать военную статью под названием «Мировая военная наука», документирующую его исследования немецких теоретических школ, русской доктрины и доктрины Интернационала."
 GXC.earlygame.101.a: "Наши люди маршируют под началом великих умов!"

 ##UPC Unique Eliteheer Military Events (105-110)

 GXC.earlygame.105.t: "Состав Армии Юэ"
 GXC.earlygame.105.d: "В рамках предлагаемого Федералистского китайского проекта армия всегда была предметом больших споров. Провинциализм по своей сути конфликтовал с концепцией национальной армии, а предложения о провинциальных армиях, составляющих одну национальную армию, считались бесплодными из-за присущей неэффективности. Возможно, символическим микрокосмом такой структуры является по своей сути феодальный характер нынешней Армии Юэ. Даже до ее воссоздания после возвращения [ROOT.GetLeader] и победы над другими милитаристами Лянгуана, Армия Юэ была похожа на большинство других военных составов в Китае. Разрозненное собрание призывников и профессиональных солдат, все привязанные к своим командирам, а не к национальной идее или концепции.\n\nКонечно, такой ассортимент не был чем-то необычным для того времени, когда такие подразделения, как Национально-революционная армия с приверженностью идеологии и Сунь Ятсену, были исключением из нормы. Как указывало американское консульство, армия Чэнь Цзюнмина того времени состояла из 30 000 солдат Новой армии, 20 000 патрульных гвардейцев, 2 000 полицейских, все набранные на месте. И в настоящее время мало что изменилось, или, скорее, возможно, ухудшилось.\n\nВ настоящее время армии Лянгуана представляют собой составные силы, состоящие из смеси сил милитаристов; варьирующиеся от вспомогательных войск, приписываемых таким людям, как Хун Чжаолинь, смешанных сил Лю Чжэньхуаня, Е Цзюя, Ян Куньжу, или даже сравнительно элитных сил, набранных из дивизий Старой Гуанси. Имея в виду такой контекст и с удвоенными усилиями по военной модернизации, перед верховным командованием встала довольно озадачивающая дилемма. Должны ли они стремиться реорганизовать и уплотнить военные силы своих бывших союзников, потенциально навлекая на себя их гнев или неподчинение? Или они должны сосредоточиться на применении современной методологии и организации только к новым подразделениям, оставив милитаристам их независимость."
 GXC.earlygame.105.a: "Оптимизировать список дивизий для согласованности."
 GXC.earlygame.105.b: "Переговоры с милитаристами обеспечат их согласие."

 GXC.earlygame.106.t: "Национальная реконструкция и военная рука"
 GXC.earlygame.106.d: "Борьба за равный баланс между военной и гражданской сферами, несомненно, была громкой, насильственной и жестокой в Эру милитаристов. Милитаристы местных государств действуют как Маршалы и Президенты, причем некоторые в высших эшелонах даже занимают обе должности законно. Это, конечно, вызвало много споров, и существует вечный марш к номинальному разграничению костюма и меча. Наиболее распространенными в Федералистском движении были бы позиции губернатора Чжао Хэнти и губернатора Тан Цзияо, которые оба уподобляют себя избранным гражданским лицам, а не генералам, ведущим армию. И случай с Чэнем ничем не отличается. Предпочитая действовать в гражданском качестве — не в последнюю очередь, возможно, из-за его плохого военного послужного списка — он оставил большинство военных дел в руках Е Цзюя, своего главнокомандующего.\n\nОднако во время пребывания Чэня в качестве активного командира его величайшие успехи можно приписать поведению его военных, хотя и не на поле боя. Вместо этого успехи Чэня проистекают из усилий его армии по национальной реконструкции, таких как Кампания в Фуцзяни. Во время своего пребывания в Шаньтоу он создал арсенал в Шаньвэе, создал обширную сеть военных пунктов снабжения и программу строительства уездных дорог — для облегчения как военных, так и коммерческих перевозок, и организовал местное ополчение и партизанские отряды для подавления бандитизма.\n\nИ, похоже, точно так же армия Чэня снова участвует в таких усилиях по национальной реконструкции. Хотя, в отличие от Фуцзяни, Е Цзюй столкнулся с более упорным сопротивлением его попыткам подготовить Гуандун и местный регион к национальному объединению. И шэньши, и крестьянство не очень любезно восприняли вмешательство военных в их повседневные дела, даже если только для того, чтобы просить помощи в восстановлении провинции. Таким образом, жалобы достигли [ROOT.GetLeader], настаивая на том, чтобы он «обуздал» своих подчиненных."
 GXC.earlygame.106.a: "Люди не знают, что для них лучше."
 GXC.earlygame.106.b: "Военные должны избегать вмешательства в государственные дела."

 ##UPC Unique Whampoa Military Events (111-115)

 GXC.earlygame.111.t: "Пережитки прошлого и успех учреждения"
 GXC.earlygame.111.d: "С ироничным воссозданием Вампу под предлогом его первоначальных врагов, Федералистского движения и сопровождающих его ненадежных милитаристов, Федералистская армия оказалась в несколько странной ситуации. Вампу славилась тем, что производила, возможно, лучшую военную силу во всей нации. Их побед было много, например, в Первом Восточном походе, где непроверенные и быстро обученные курсанты Вампу сумели кровью выковать свою репутацию в битве при Мяньху.\n\nДобавляя иронии, Первый Восточный поход первоначально курировали Ян Симинь и Лю Чжэньхуань вместе с курсантами Вампу и просуньскими подразделениями Гуандуна, но в промежутке после Первого похода бывший дуэт восстал и переметнулся, только чтобы быть полностью разбитым молодой Национально-революционной армией. Во Втором Восточном походе Гуандунская армия почти убила Чана, только чтобы снова потерпеть поражение, вынудив Хун Чжаолиня и Линь Ху отступить в Фуцзянь. После изгнания Дэн Бэньиня силы про-Чэня в регионе были полностью уничтожены. И все же здесь они вернулись к власти, как под новыми, так и под старыми руками.\n\nХотя ощутимый поворот событий не ускользнул ни от кого в высшем командовании, все еще остается проблема укомплектования новой Вампу надлежащим преподавательским составом, соответствующим ценностям новой армии нации. Должность директора обладает способностью неизмеримого влияния, и поэтому за нее боролись многочисленные военные клики. Три наиболее жизнеспособных претендента начались с кандидатуры Линь Ху. Умеренно лояльный Чэню, но сила сама по себе, связи Линя со Старой кликой Гуанси делают его объектом подозрений. Во-вторых, есть Вэй Банпин, человек, который оставался нейтральным во время борьбы за власть Сунь-Чэнь, но оказался вытесненным из рядов националистов и, что примечательно, никогда не вступал в Гоминьдан. Наконец, есть Ян Симинь, делающий еще одну заявку на некоторое влияние и власть."
 GXC.earlygame.111.a: "Линь Ху может преподавать уроки Мяньху."
 GXC.earlygame.111.b: "Предоставить должность Вэй Банпину."
 GXC.earlygame.111.c: "Ян Симинь оказался самым стойким."
 GXC.earlygame.111.e: "Оставить нынешнего директора."

 GXC.earlygame.112.t: "Чжан Цзюньмай и политизированная армия"
 GXC.earlygame.112.d: "С ростом усилий по реформированию, реструктуризации и модернизации вооруженных сил многие инициативы правительства получили некоторое внимание в СМИ. Совсем недавно был довольно широко освещен случай Чжан Цзюньмая и его работ о достоинствах и недостатках как нынешних усилий по реформе Федералистской армии, так и наследия Национально-революционной армии, которой первая стремится подражать. Начиная свою статью, опубликованную в партийном периодическом издании, Чжан обращается к нынешнему положению некогда знаменитой и прославленной Национально-революционной армии, считая ее падение по завершении Северного похода не следствием отсутствия заслуг или врожденной слабости ее организационной структуры, а следствием Немецкого вмешательства.\n\nУчитывая обстоятельства, Чжан даже выдвигает гипотезу, что без высадки Германии в Гуанчжоу и полного провала 1-й и 4-й армий в предотвращении его захвата, возможно, Гоминьдану удалось бы объединить нацию. Хваля НРА за ее большие успехи в победе над большинством сил милитаристов, Чжан выделяет сильные стороны НРА в сильно политизированной учебной программе в Вампу, последующей абсолютной преданности курсантов Вампу идеологии партии и ее неизмеримой народной поддержке и дисциплине. Конечно, Чжан не относит ни один из этих комплиментов к самому Гоминьдану.\n\nВыступая за усиление политизации армии и создание истинных приверженцев Демократической идеологии, периодическое издание Чжана встретило много похвалы в кругах бывших членов Гоминьдана, но много насмешек в кликах Старых федералистов. Самым заметным противником такой инициативы является не кто иной, как ядро Армии Юэ, Е Цзюй и его соратники. Утверждая, что такой шаг может привести к тому, что армия будет держать Республику под дулом пистолета ради какого-то высокого идеала, или даже к похожему культу, как у Гофу, основанному вокруг Чэнь Цзюнмина."
 GXC.earlygame.112.a: "А что дальше? Опека?"
 GXC.earlygame.112.b: "Преданность идеологии предотвращает эксцессы милитаризма."

 GXC.earlygame.113.t: "Пестрый состав Армии национальной обороны."
 GXC.earlygame.113.d: "Казалось бы, что несмотря на все атрибуты армии, следующей образцу, заложенному Военной академией Вампу, Федералистская Армия национальной обороны, или Гофанцзюнь, врожденная раздробленная природа армии милитаристов все еще просвечивает в определенных аспектах ее военных сил. Варьируясь от лоялистов-федералистов до соотечественников Гуандунской армии, поклонников Гуанси и всего, что между ними, это поистине пестрая сила, объединенная не слишком отличающимся образом, скажем, от клик Чжили или Фэнтянь. Объединенные узами взаимных связей, лояльности или иным образом финансовыми вложениями, они тем не менее сражались бок о бок.\n\nВключая ряд революционеров старой гвардии, армия федералистов щеголяет такими людьми, как уважаемый Вэй Банпин. Известный тем, что служил офицером, получившим раннее образование в Японии, в сменявших друг друга революционных правительствах, базирующихся в Гуандуне, он твердо придерживается своих принципов, что «у военных нет партии», постоянно сопротивляясь любому членству в какой-либо политической организации. Точно так же есть случай Лю Чжэньхуаня, долгового влиятельного игрока в военно-политических событиях под руководством южан, особенно в Гуанси. В отличие от Вэя, Лю активно использует свои политические связи, в частности с Кликой политической науки и партиями Демократической лиги Китая, и особенно с силами в Юньнани и Гуанси, все для укрепления своего положения.\n\nКонечно, среди рядов есть гораздо худшие нарушители в плане эксцентричности. Чэнь Цзитан и его неформальная «Новая гуандунская клика» образуют ядро бывших офицеров Гоминьдана в рядах. На противоположном конце спектра находятся силы Дэн Бэньиня, стремящегося сохранить свою мертвую хватку над Цюнъя, и даже Хун Чжаолиня — сосредоточенного на поддержании притока богатства через торговлю опиумом. В целом, армии еще предстоит пройти долгий путь, если она хочет быть бескорыстным стражем республики."
 GXC.earlygame.113.a: "Вряд ли самая надежная группа братьев."
 GXC.earlygame.113.b: "Мы не судим о характере, только о службе."

 ##NPA Unique Guangxi Style Military Events (116-120)

 GXC.earlygame.116.t: "Роль модели Цзычжицзюнь"
 GXC.earlygame.116.d: "С реорганизацией армии на основе уникальной доктринальной философии происхождения Гуанси было много ссылок на модель дивизии Цзычжицзюнь Старой клики Гуанси, в которой местные партизанские ополчения дополнялись бы регулярными формированиями, сохраняющими достаточную мобильность, чтобы быстро избегать сражений при необходимости. Такое нововведение сохранило силу Старой Гуанси в регионе, даже когда они были полностью вытеснены, заметным случаем является быстрое возвращение Лу Жунтина после краха Национально-революционной армии. Фактически выступая в качестве предшественника новой модели ополчения Граждан-Солдат новой доктрины военных, многие из командующих офицеров-уроженцев Гуанси, особенно такие, как Линь Ху, выступали за модернизированный взгляд на организационную модель.\n\nВ противовес этому выступают новые, вестернизированные и сравнительно элитные силы под непосредственным командованием Лу Жунтина и Ма Цзи, иначе известные как 1-я дивизия и Образцовый батальон соответственно. Сосредоточенные на тактике, изученной на Западе, а именно в Немецкой военной миссии, они сохранили серьезное преимущество перед большей частью местной конкуренции, хотя и не без проблем. Из-за определенных трудностей со снабжением 1-й дивизии в преимущественно сельской среде Гуанси они нашли наибольшее применение на немногих проселочных дорогах внутренних районов или в городских центрах.\n\nКонечно, у модели Цзычжицзюнь есть свои критики, особенно среди профессионального офицерского корпуса, которые настаивают на обученных солдатах, а не на уездном ополчении, для формирования основной части армии Лянгуана. Многие из вышеупомянутых голосов исходят в основном от офицеров, не являющихся уроженцами Гуанси, например, в Гуандуне, которые не находят привязанности к гуансийскому способу ведения войны."
 GXC.earlygame.116.a: "Мобильность и храбрость могут победить любые трудности!"
 GXC.earlygame.116.b: "Образцовый батальон останется как ударное подразделение."

 GXC.earlygame.117.t: "Автономия дома, автономия в армии"
 GXC.earlygame.117.d: "Как непредвиденное следствие сосредоточенности армии на регионализме, опоре на собственные силы и местной автономии, военная доктрина «Стиль Гуанси» породила довольно необузданное чувство уездного регионализма в рядах Граждан-Солдат. В то время как традиционная китайская система ополчения обычно видела, как ополчение либо отказывалось сражаться за пределами своей местной юрисдикции, даже если бандиты часто пересекали границы, либо иначе на него смотрели свысока за пределами их родной территории, модель Гражданин-Солдат увидела еще более сильный всплеск лоялизма по отношению к уездной единице, а не к провинциальной или даже национальной.\n\nВ конечном счете, это не является реальной проблемой в местных делах, поскольку их яростная преданность своему району была довольно позитивным благом в плане операций по борьбе с бандитизмом, но это оказалось заметной головной болью в подходах к национальной сцене, поскольку собранное ополчение граждан-солдат оказывается не желающим сражаться, особенно за пределами провинциальных границ. Такие мысли еще больше усугубляются недавней историей в Лянгуане, когда солдаты Гуандуна и Гуанси одинаково плохо относились к своим коллегам, грабя и совершая набеги на их дома и поля во время оккупаций."
 GXC.earlygame.117.a: "Военный провинциализм, по крайней мере, лучше уездного регионализма."
 GXC.earlygame.117.b: "Консолидация только навредит делу."

 ##NPA Unique Eliteheer Military Events (121-125)

 GXC.earlygame.121.t: "Восстановление Немецкой военной миссии"
 GXC.earlygame.121.d: "Возможно, одним из самых плодотворных благ от китайско-германского партнерства между Чжили и Германской империей была Немецкая военная консультативная миссия. Ей было поручено преобразовать разрозненные силы мешанины призывных войск милитаристов в армию, способную соперничать не только с обученными японцами подразделениями Фэнтяньской клики, но и быть сопоставимой с модернизированной военной силой. Принеся с собой теоретические ноу-хау, технические знания, промышленный опыт и заложив основу для ведения «современной» войны на китайском фронте.\n\nБлагодаря усилиям немецких советников военная промышленность Центрального правительства увидела быструю эволюцию и инвестиции от немецких промышленников, и хотя экономическое развитие было блестящим, фактическая реформа армии оставляла желать лучшего. С милитаристами, иногда полностью отказывающимися от любых претензий на модернизацию из-за страха потерять свое влияние, так называемый «План 60 дивизий», предложенный в 1935 году немецкими советниками, предусматривал бы массовую демобилизацию лишних военных подразделений, в результате чего осталось бы всего 60 элитных, хорошо обученных дивизий для всей страны (под контролем Чжили), и все же это было половинчатое начинание.\n\nЕстественно, такое дело было встречено с сопротивлением, особенно в Лянгуане, где количество людей под вашим командованием напрямую связано с вашим влиянием и властью в его лоскутной администрации. И все же, такие опасения сбылись, поскольку немцев снова приглашают в регион. Хотя, легкая атмосфера подозрения все еще сохраняется. Не из страха потери влияния, а из страха потери государственности, поскольку немецкие финансисты в последнее время поглощают местную промышленность почти протоколониальным образом. Разжигая атмосферу зарождающегося антиконцессионного пыла, это еще больше углубило раскол между спонсируемым Обществом Цзинсин Шэнь Хунъином, антинемецким Торговым корпусом и независимо мыслящей фракцией Молодой Гуанси."
 GXC.earlygame.121.a: "Плодотворное партнерство между Орлом и Драконом!"
 GXC.earlygame.121.b: "Убедитесь, что они не чувствуют себя слишком комфортно."

 GXC.earlygame.122.t: "Ауфтрагстактик и военно-промышленная победа"
 GXC.earlygame.122.d: "Передача тактических и оперативных полномочий младшим офицерам, ведущим своих солдат на поле боя, давно доказала, что является доминирующей формой войны в эпоху Германской империи, хотя и не является полностью оригинальной теоретической концепцией, принадлежащей им. Она видела принятие, создание или использование в различных армиях по всему миру, и точно так же Китай выдвинул свою собственную форму тактики типа миссии, особенно в Хугоцзюнь Войны в защиту нации или Национально-революционной армии.\n\nХотя вышеупомянутые военные силы предпочитали революционный дух, бусидо, изолированные столкновения 1 на 1 в сочетании с маневренной войной, принятие такой доктрины в обученной немцами сфере китайской армии в значительной степени попало под знамя более крупного доктринального спора в немецком верховном командовании. Поскольку различные офицеры, отправленные для обучения китайских командиров и их солдат, приносят с собой разные интерпретации эволюции маневренной войны Германии. Однако, в конечном счете, в Лянгуане различные немецкие военные клики выдвинули кульминацию своих идей.\n\nСочетая достоинства Реформистов и Фронды, армия Лянгуана развила склонность к централизованной, профессиональной и современной армии Плана 60 дивизий, с сильным акцентом на националистическую, идеологизированную армию, сосредоточенную на промышленной мобилизации страны для ведения предсказанной «Тотальной войны» против Японии.\n\nОднако под этим доктринальным течением скрывается накопление влияния прогерманским Обществом Цзинсин, поскольку их связи с немецким экономическим сектором способствуют модернизации армии Лянгуана, и совершенно очевидно, что они желают очень конкретного исхода для политической сцены Лянгуана, знает об этом [ROOT.GetLeader] или нет."
 GXC.earlygame.122.a: "Пруссия Востока!"
 GXC.earlygame.122.b: "Нам тоже не нужно кланяться фрицам."

###- Section 2b (200-399): Early Game Economic Events -##

 ##Shared Economic Events (200-249)
 GXC.earlygame.200.t: "Избыток риса"
 GXC.earlygame.200.d: "Последствия «Черного понедельника» продолжают сотрясать Лянгуан. Пока правительство с трудом пыталось сдержать первоначальный кризис, а люди справлялись как могли, катастрофа обнажила многие основные проблемы, гноящиеся в нашем сельскохозяйственном секторе. Пожалуй, наиболее тревожным является ужасающее недоиспользование земельных ресурсов провинции и зацикленность на развитии товарных культур, что превратило Гуанси в одну из самых экономически отсталых провинций Китая.\n\nНигде это не проявляется так явно, как в текущем переизбытке риса, терзающем провинцию, где по трагически ироничному стечению обстоятельств одни деревни страдают от голода, в то время как другие — от переизбытка неэкспортируемого риса. Несомненной причиной этого кризиса, по-видимому, является низкое качество дорог в Гуанси. В течение многих лет существовала только одна автомобильная дорога между Наньнином и Умином, которая, как говорят, вела прямо к личной резиденции Лу Жунтина для его собственного потребления.\n\nВ условиях после Северного похода власти Гуанси работали над строительством 1000 миль новых шоссе, одновременно управляя несколькими новыми автобусными линиями от Гуйганя до Наньцзина и Учжоу. Эти последующие инициативы по строительству дорог имели большие перспективы, но большинство из них были плохо управляемы, не финансировались или в целом были непоследовательны в реализации. Даже сейчас многие из наших районов и деревень остаются не связанными дорогами, все еще полагаясь на неэффективную, но сложную систему деревенских троп для быков, лошадей и ручных тележек, чтобы помочь крестьянам перевозить зерно с автомобильных дорог на отдаленные рынки.\n\nВсе это привело к медленной транспортировке жизненно необходимого зерна с полей на столы. [ROOT.GetLeader] и другие члены правительства обещают, что этот год станет последним сельскохозяйственным кризисом, который когда-либо увидят люди, клянясь, что они обеспечат завершение давно обещанных программ строительства шоссе и, более того, что это лишь первый шаг в постоянном решении проблем сельской местности."
 GXC.earlygame.200.a: "Мы должны смазать колеса прогресса!"
 GXC.earlygame.200.b: "Перемены грядут, но мы должны сохранить наш политический капитал."

 GXC.earlygame.201.t: "Борьба Гуанчжоу"
 GXC.earlygame.201.d: "Разрушительные последствия трагедии «Черного понедельника» наконец материализовались. Поскольку наша некогда скудная развивающаяся экономика была разрушена крахом Берлинской фондовой биржи, правительству [ROOT.GetLeader] приходится собирать осколки. Разрушения продолжаются: заводы и магазины закрываются, рабочих продолжают выбрасывать на улицы, предметы первой необходимости остаются недоступными для многих. Артерии, качающие кровь в нашу экономическую столицу Гуанчжоу, дают сбой, и сердце истекает кровью. Вечно присутствующее экономическое неравенство только усугубилось после краха.\n\nТак было не всегда. Кантонская система, которая заставляла иностранцев торговать исключительно через дельту Жемчужной реки, сделала регион сказочно богатым. Но травматическое принудительное открытие китайских рынков иностранным империализмом, падение власти центрального правительства и последствия Синьхайской революции разрушили старый статус-кво.\n\nБорьба за власть различных фракций в Лянгуане на протяжении многих лет только добавляла неопределенности, высасывая финансирование, рабочую силу и внимание правительства для поддержки сменяющихся правительств, построенных на этом. Альянс национальной защиты, Гоминьдан, Федералисты, Торговый корпус и даже Старая клика Гуанси в разное время делали Гуандун своей базой. Все они эксплуатировали местную экономику для финансирования своих военных кампаний, и свет Кантона угас.\n\nПоступают сообщения о росте городской напряженности, классовой борьбы между торговцами и пролетариатом, а также националистических конфликтов, разрывающих саму основу идентичности Кантона. Однако не все потеряно, ведущие бюрократы стремились решить эти насущные проблемы путем реализации революционного плана «Юэ-Гуй», амбициозного трехлетнего плана, направленного на возрождение обанкротившихся отраслей и поиск долгосрочного решения наших экономических проблем. Но по мере того, как они начинают разворачивать план Юэ-Гуй, многие задаются вопросом, какую форму он примет."
 GXC.earlygame.201.a: "Осторожное партнерство с лидерами промышленности, финансистами и торговцами."
 GXC.earlygame.201.b: "Националистическая программа, направленная на уменьшение зависимости Лянгуана от посторонних."

 GXC.earlygame.202.t: "Программа образования молодежи"
 GXC.earlygame.202.d: "Несмотря на сравнительно современный вид Лянгуана и приток богатства, образование населения оставалось трудной вершиной для покорения. Несмотря на формирование современных образовательных методов в недавно финансируемых школах, эти усилия оставались в значительной степени направленными на городские районы и столичное население. Чтобы по-настоящему ввести Лянгуан в XX век, мы должны стремиться просвещать не только тех, кто в наших городах, но и одновременно тех, кто в сельской местности — особенно в Гуанси. Однако и финансирование, и учителя в остром дефиците, и неграмотность, похоже, сохранится еще одно поколение.\n\nЧтобы исправить это, некоторые радикальные, хотя и неизменно приземленные лидеры в Гуанси выступили за совершенно новый многоступенчатый подход, отличный от традиционных подходов интеллигенции. Во-первых, каждая деревня и район должны будут превратить один из своих местных храмов в начальную школу или построить новую на взносы общины. Это значительно расширит возможности образования для масс, так как каждое поселение будет иметь возможность обучать свою молодежь. Во-вторых, будет создана новая система средних школ, предлагающая параллельную академическую программу традиционному среднему образованию. Вместо академических предметов, направленных на подготовку студентов к элитарным университетам, эта новая система предоставит более практичный набор курсов и предметов. Трехлетние курсы, охватывающие науки, включая социальные науки наряду с естественными. Это упростит предметную область нынешних средних школ, ориентированную в основном на литературу, и создаст поколения будущих работников, способных прогрессировать в мире.\n\nХотя в нашем правительстве есть прагматичные голоса, поднимающие обоснованные вопросы, такие как нехватка преподавательского состава или пренебрежение воспитанием будущих интеллектуалов, другие чиновники осознают тяжелое положение в провинциях и видят необходимость решительных действий."
 GXC.earlygame.202.a: "Реализовать такую грандиозную инициативу!"
 GXC.earlygame.202.b: "Увы, мы не можем выделить ресурсы."

 GXC.earlygame.203.t: "Налоговый стимул"
 GXC.earlygame.203.d: "Сколько себя помнит Лянгуан, он жаловался на различные вымогательские налоги, возложенные на его граждан. При отсутствии стабильности и центрального контроля многие местные милитаристы или бандиты применяли дублирующие сборы, высасывая богатство из крестьян и элиты в равной степени. Естественно, провинциальное правительство (не говоря уже о центральном правительстве) почти не видит этой валюты, поступающей в их казну, так как большинство этих поборов оседает в карманах местных деспотов и их головорезов.\n\nПровинциальное правительство, однако, не свободно от вины, поскольку они тоже прибегали к различным непомерным методам извлечения доходов из населения. К ним относятся эвфемистически названный налог «Оборонный фонд» (взимаемый с азартных игр), который составляет 20% налоговых поступлений, и «Консолидированный налог», который ввел акцизы на скрученный табак, муку, хлопчатобумажную пряжу, спички и цемент, что составляет 33% налоговых поступлений и 30% общих доходов провинции. Существует также «Налог на подавление опиума», приносящий 28% всех налогов и 25% общих доходов провинции, наряду с различными другими мелкими налогами на соль, вино, марки и дополнительные таможенные пошлины.\n\nВведение всех этих разнообразных налогов и пошлин привело к бюрократическому кошмару и общей неэффективности наших рынков. Два варианта предстали перед нашим обновленным правительством. Один лагерь предлагает возможность использовать довольно... креативные методы, существующие в настоящее время, для дальнейшего извлечения доходов, конечно, оптимизируя их там, где это возможно, и искореняя налоги местных милитаристов, чтобы снизить нагрузку на правительство. Другой вариант — использовать более прагматичный подход, отменив все ненужные налоги, объединив оставшиеся, искоренив налоги милитаристов и обеспечив быстрый процесс, подобный воде. Хотя никто не возражает против оптимизации бюрократических элементов, окончательный выбор остается за [ROOT.GetLeader] и его представлением о лучшем Лянгуане."
 GXC.earlygame.203.a: "Если не можешь победить их..."
 GXC.earlygame.203.b: "Мы должны облегчить бремя."

 GXC.earlygame.220.t: "Перекресток Гуанси"
 GXC.earlygame.220.d: "Расположенная между Юньнанью и провинцией Гуандун, провинция Гуанси имеет историю, уходящую корнями так же далеко, как и китайская история. Иногда называемая Горным Королевством (шань-го), горные хребты простираются по всей провинции. Из-за этого провинция является домом для многих уникальных субкультур, изолированных своим суровым окружением. Имея лишь несколько богатых сельскохозяйственных районов, таких как Юйлинь, Гуанси является одной из беднейших провинций Китая, единственным утешением которой является ее природная красота. Действительно, красивые пейзажи Гуанси привлекали многих писателей и художников, снискав репутацию неортодоксальности.\n\nСочетание горной бедности, апатии Пекина и традиции свободы с неортодоксальной мессианской идеологией создало искру для конфликта, более смертоносного, чем Вельткриг — Восстания тайпинов. Гуанси была первой из многих провинций, охваченных революционным пылом Небесного Царя. Хотя крестовый поход Хуна закончился катастрофой, Гуанси осталась почти такой же: провинцией, раздираемой бедностью и пронизанной бандитизмом. Некоторые из этих бандитов и бывших бойцов тайпинов перешли границу во Французский Вьетнам, создавая головную боль Парижу во второй половине XIX века.\n\nОткрытие Западной реки вывело провинцию из изоляции в новый мир республиканизма и милитаризма. Сегодня навигация и коммерция Гуанси сильно зависят от рек из-за отсутствия железных дорог, причем 95,5% экспорта провинции течет вниз по течению в Гонконг и Кантон. Экономические беды провинции не остались незамеченными, и одной из целей трехлетнего плана является прекращение бедности Гуанси. Однако существуют разногласия относительно того, почему в Гуанси существует бедность. Преобладающая теория среди интеллектуалов заключается в том, что причиной является глубоко укоренившееся экономическое неравенство, однако многие коммерческие лидеры утверждают, что истинной причиной бедности является неспособность провинции использовать имеющиеся пахотные земли и ее огромные минеральные богатства."
 GXC.earlygame.220.a: "Увлекательный вопрос дня."

 GXC.earlygame.221.t: "Соревнования по строительству дорог"
 GXC.earlygame.221.d: "С проектом реконструкции Гуанси в полном разгаре мы уже ощущаем его благо. Самой успешной частью проекта является инфраструктурная инициатива, в рамках которой в Гуанси было построено столько дорог, что теперь она уступает только Гуандуну и Шаньдуну по количеству дорог. Одним из недостатков, однако, является то, что большая часть строительства пошла на пользу военным нуждам правительства, а не экономике. В сочетании с инфраструктурным проектом Гуанси правительство Гуандуна построило первую крупную сеть шоссе в Гуандуне. Эти дороги очень помогли нашим усилиям по сокращению бандитизма в двух гуанах, к радости местных жителей.\n\nПравительство также взялось за организацию соревнований по строительству дорог. В Экспериментальном подрайоне Юннин (Юннин Ши Янь Чу) различные отряды деревенской милиции соревнуются друг с другом в проектах строительства дорог. Результаты принесли большие плоды для наших усилий по модернизации транспорта. Теперь жители Гуанси могут избежать необходимости использовать медленные лодки на реках для поездок во внутренние районы. Реки Гуанси печально известны своей ненадежностью, падая на 50-60 футов на западе зимой, только чтобы быстро вырасти до больших высот в середине марта и достичь пика к июню.\n\nНесмотря на весь этот прогресс, люди увидели мало изменений в своем финансовом положении. Трудовая повинность и безработные мужчины обеспечили большую часть рабочей силы для проекта реконструкции Гуанси, и многие страдали от жестокого обращения. Новые опросы показывают, что отчаянная бедность и отсталость все еще процветают, и хотя правительство Гуанси знает об этом, только время покажет, намерены ли они исправить ситуацию радикальными мерами."
 GXC.earlygame.221.a: "Мы улучшим условия для этих бедных рабочих!"
 GXC.earlygame.221.b: "Эти люди должны быть благодарны, что вообще получили работу!"

 GXC.earlygame.222.t: "Система зернохранилищ"
 GXC.earlygame.222.d: "Нынешняя кредитная система Гуанси, как и местность провинции, грубая, жесткая и раздражающая. Фермерам Гуанси приходится конкурировать с экономической мощью оптовых торговцев зерном, что дает им мало контроля над рыночной ценой. Оптовики могли покупать во время сбора урожая, ждать до весны и продавать по двойной цене. Обычно существует три типа кредитных соглашений. Первый — это заимствование наличных. Однако денежные кредиты чрезвычайно редки. Другим кредитным соглашением была продажа сельскохозяйственных фьючерсов. Однако наиболее распространенным типом кредитного соглашения было заимствование зерна, обычно семенного. Независимо от этого, общий консенсус среди фермеров заключается в том, что процентные ставки слишком высоки — около 20-50% в год. Шестилетние кредиты взимают годовой процент в размере 30%.\n\nВ попытке контролировать предложение местное правительство пыталось создать систему зернохранилищ, которая скупала зерно во времена избытка и продавала во времена дефицита. В сегодняшнем Гуанси эта система архаична и плохо управляется. Провинциальные правила предусматривали, что если человек хотел продать землю, он сначала должен был попытаться продать ее деревенскому правительству. Зернохранилища должны были быть построены вблизи дорожных систем, но столкнулись с тремя основными препятствиями.\n\nВо-первых, правительству не хватает средств для поддержки такой системы, так как большая часть выделенных средств перенаправляется на военные расходы. Во-вторых, системе не хватает обученного персонала для ее обслуживания, частично из-за низкого финансирования. В-третьих, система не понята должным образом широкими слоями населения Гуанси, поэтому они не участвуют в ней. Возможно, в будущем в Гуанси будет справедливая система производства зерна, но сегодня это остается лишь далекой надеждой идеалистов."
 GXC.earlygame.222.a: "Мы немедленно начнем улучшения системы зернохранилищ."
 GXC.earlygame.222.b: "Система древняя, мы должны выделить ресурсы на лучшие проекты."

 GXC.earlygame.223.t: "Схемы сахарной промышленности"
 GXC.earlygame.223.d: "«Черный понедельник» сильно ударил по нашей экономике, но он также открыл для нас много возможностей. [GXC.GetLeader] вынашивал план покупки необходимого оборудования по сниженным ценам у Honolulu Iron Works в США и Skoda Works Company в Австро-Венгрии. Однако есть еще более грандиозные схемы, которые можно реализовать. Несколько хитрых министров обратились к [GXC.GetLeader] с еще более коварным планом покупки и продажи тонн сахара ради огромной прибыли. Они предлагают сделать это до того, как завершится строительство перерабатывающих заводов в рамках трехлетнего плана.\n\nОни предлагают нам купить огромное количество сахара в Гонконге, а затем загрузить его на суда по борьбе с контрабандой опиума компании Liangguang Heyi Company Хо Чжитина, чтобы обойти таможню, а затем продать по завышенной цене в Гуандуне. За этим последует повышение пошлин на импортный сахар для поощрения местного роста с помощью кредитов для защиты внутреннего рынка в сочетании с ироничным подавлением контрабанды. Это значительно увеличило бы нашу казну, но опустится ли [GXC.GetLeader] до такого уровня финансового бандитизма?"
 GXC.earlygame.223.a: "Небо голубое?"
 GXC.earlygame.223.b: "Даже у меня есть пределы..."

 GXC.earlygame.224.t: "Сделка с Королем крестьян"
 GXC.earlygame.224.d.1: "На вечно цветущем революционном поле битвы Китая восстания, бандиты, революционные движения — все они приливают и отливают, пока время течет вечно вперед. Точно так же славная революционная борьба, ведомая Сунь Цинлин, Дэн Яньда и остальной частью Восстания Миньгань, не была единственным источником недовольства отчаявшимся правлением милитаристов, ибо по всему Китаю существовали параллельные центры радикальной крестьянской агитации.\n\nПосле трагической катастрофы, которой стало Шанхайское восстание 1932 года, расцветающее китайское социалистическое движение было критически ранено, хромая к отступлению и уединению в попытке восстановить силы и численность. Самым известным из этих уединенных центров — возможно, отчасти из-за связи с ЛГМД в Париже и Лондоне — было Восстание Миньгань, хвастающееся вышеупомянутыми двумя членами Временного комитета действий, наряду с известными военнослужащими, такими как Ли Цзишэнь.\n\nБудучи движением Гоминьдана до мозга костей, их связь и влияние в их родной провинции Гуандун были сравнительно ничтожными, так как всем их потенциальным сторонникам постоянно бросает вызов воинствующий аграрий Пэн Пай, который в значительной степени прервал все контакты с Миньгань и его аффилированными ячейками, чтобы полностью сосредоточиться на культивировании и развитии собственного революционного движения, Ассоциации фермеров Гуандуна, с центрами на Юго-западе.\n\nСвоей новой властью [ROOT.GetLeader] приступил к миссии по воссоединению двух революционных движений, Гоминьдана и АФГ, чтобы получить взаимовыгодное соглашение о единстве и поддержке. Поскольку заместители [ROOT.GetLeader] успешно сумели наладить поток коммуникации с сомнительно названным «Королем крестьян», он может только надеяться, что его просьба о поддержке принесет плоды."
 GXC.earlygame.224.d.2: "На вечно цветущем революционном поле битвы Китая восстания, бандиты, революционные движения — все они приливают и отливают, пока время течет вечно вперед. Точно так же тщетная революционная борьба, ведомая Сунь Цинлин, Дэн Яньда и остальной частью Восстания Миньгань, не была единственным источником недовольства воспринимаемой несправедливостью современного Китая, ибо по всей стране существовали параллельные центры радикальной крестьянской агитации.\n\nПосле катастрофы, которой стало Шанхайское восстание 1932 года, расцветающее китайское социалистическое движение было критически ранено, хромая к отступлению и уединению в попытке восстановить силы и численность. Самым известным из этих уединенных центров — возможно, отчасти из-за связи с ЛГМД в Париже и Лондоне — было Восстание Миньгань, хвастающееся вышеупомянутыми двумя членами ВКД, наряду с известными военнослужащими, такими как Ли Цзишэнь.\n\nБудучи движением Гоминьдана до мозга костей, их связь и влияние в их родной провинции Гуандун были сравнительно ничтожными, так как всем их потенциальным сторонникам постоянно бросает вызов воинствующий аграрий Пэн Пай, который в значительной степени прервал все контакты с Миньгань и его аффилированными ячейками, чтобы полностью сосредоточиться на культивировании и развитии собственного революционного движения, Ассоциации фермеров Гуандуна, с центрами на Юго-западе.\n\nВ глазах правительства разница между Пэн Паем и Миньгань практически ничтожна, оба несут одни и те же качества насильственного, культового, массового движения, которое представляет значительную угрозу для нашей преимущественно шэньшиской базы власти. Тем не менее, бедственное положение сельского крестьянина важно для многочисленных китайских интеллектуалов, призывающих к умеренной сельской реформе. Однако Китай — это страна, в которой умеренность сжимается перед лицом радикализма, и с обеих сторон вопроса, помещика и крестьянина, умеренные, способные к компромиссу, не так многочисленны, как хотелось бы верить интеллектуалам."
 GXC.earlygame.224.a: "Мы можем прийти к соглашению."
 GXC.earlygame.224.b: "Не может быть прочного мира."

 GXC.earlygame.240.t: "Торговая ярмарка в Лючжоу"
 GXC.earlygame.240.d: "Когда Китай все больше вступал в контакт с западом, Имперское правительство в Пекине сочло целесообразным проводить политику, известную как Кантонская система, с целью контроля торговли с западом. Это происходило путем направления всей торговли в город Гуанчжоу, оставляя всю торговлю в городе под контролем китайских купцов. Эти купцы стали известны как Ханы (Хонги), управляя своими торговыми предприятиями из района за пределами Гуанчжоу, известного как Тринадцать факторий. Во время правления Цяньлуна Ханы были санкционированы как монополия, известная как Гунсин (Гунхан), после чего Гуандунский таможенный надзиратель (Ху Бу/Хоппо) и Наместник Двух Гуанов контролировали внешнюю торговлю под эгидой Гунсин.\n\nКантонская система была отменена после подписания Нанкинского договора, который открыл торговлю Китая с западом. Хотя это официально ознаменовало конец Кантонской системы, Гуанчжоу остался важным торговым портом. Город сохранял экономическую значимость на протяжении всей второй половины XIX века и даже после Синьхайской революции. В 1929 году правительство Гуанси открыло торговую ярмарку в Лючжоу, городе, граничащем с Жемчужной рекой. Также было создано Бюро экспорта с капиталом 500 000 юаней, балансирующее экспорт и импорт. С Трехлетним планом в полном разгаре многие начали обсуждать торговую политику, которая была бы наилучшей для двух провинций. Некоторые говорят, что провинция должна сосредоточиться на экспорте, что продолжило бы торговое доминирование Гуанчжоу в регионе. Другие теоретизируют о новом, более автаркичном будущем для провинции, чтобы не дать западным империалистам высасывать наши природные богатства."
 GXC.earlygame.240.a: "Будущее Кантона висит на волоске."

 GXC.earlygame.241.t: "Профсоюзы мобилизуются"
 GXC.earlygame.241.d: "Хотя организация рабочих Гуанчжоу была весьма эффективна в противодействии Торговому корпусу и их клике жадных глупцов, синдикаты действовали как обоюдоострый меч. Чтобы достичь целей Трехлетнего плана, правительство начало нормирование угля, чтобы важные проекты могли получать необходимые ресурсы. Это не осталось незамеченным рабочими, которые видят в правительстве пренебрежение народом Лянгуана. Синдикаты Гуанчжоу были особенно разгневаны, организовав крупный протест против правительства [GXC.GetLeader].\n\nХотя вряд ли это нанесет какой-либо серьезный ущерб городу, протестующие стали помехой для наших государственных предприятий, препятствуя потоку торговли. Военные разработали планы подавления протеста силой, представив свое решение [GXC.GetLeader]. Хотя это быстро закончило бы протест, это также повредило бы отношениям с рабочими и снизило бы нашу легитимность в глазах простых людей. Некоторые правительственные чиновники посоветовали [GXC.GetLeader] просто позволить протесту идти своим чередом. Это решение помогло бы усилиям правительства по увеличению народной поддержки, но наш бизнес пострадал бы в течение более длительного периода времени. Правительство ждет решения [GXC.GetLeader]."
 GXC.earlygame.241.a: "Командир, я не хочу больше видеть этих чахлых протестующих!"
 GXC.earlygame.241.b: "Оставьте их в покое, они в конце концов устанут..."

 GXC.earlygame.242.t: "Дела торговцев"
 GXC.earlygame.242.d: "Улицы Гуанчжоу кипят жизнью. Каждый день в город входят иностранные торговцы, принося больше богатства на наши улицы. Очевидно, что усилия правительства по развитию реформированной Кантонской системы уже принесли плоды. Однако за этот поток богатства приходится платить. Бизнес в основном ведут Торговый корпус, который начал напоминать монополию Гунсин имперской эпохи. Более того, союз [GXC.GetLeader] с Чэнь Ляньбо придал смелости Торговому корпусу. Многие богатые торговцы начали свои собственные войны за территорию на улицах, соперничая за доминирование со своими конкурентами. Под перекрестный огонь попадают мелкие торговцы и простые люди. Влиятельные торговцы подняли цены на товары первой необходимости до вымогательских уровней, к большому огорчению бедных.\n\nХуже того, некоторые коррумпированные бизнесмены даже начали помыкать мелкими правительственными чиновниками. Это подтолкнуло Ассамблею Гуандуна призвать Чэнь Ляньбо, лидера Торгового корпуса, к ответу за различные злоупотребления, совершенные под его началом. Чэнь извинился за то, что позволил торговым гильдиям выйти из-под контроля, но дал лишь смутные обещания свести войны за территорию к минимуму и положить конец издевательствам над мелкими правительственными чиновниками. Многие призвали [GXC.GetLeader] наказать Торговый корпус за их дерзость, чтобы убедиться, что это не повторится. Другие подталкивают [GXC.GetLeader] отпустить Чэнь Ляньбо, отделавшись легким испугом, чтобы Торговый корпус и правительство Лянгуана могли продолжить свое тесное сотрудничество, которое уже принесло много богатства в два Гуана. После долгих раздумий [GXC.GetLeader] принимает решение."
 GXC.earlygame.242.a: "Чэнь Ляньбо может быть жадным торговцем, но он наш жадный торговец!"
 GXC.earlygame.242.b: "Торговый корпус должен быть немедленно ограничен!"

 ##KMT Unique Economic Events (250-299)
 GXC.earlygame.250.t: "Зал благожелательности"
 GXC.earlygame.250.d: "«Во-первых, убедитесь, что у людей есть еда; во-вторых, убедитесь, что у них достаточно еды; и в-третьих, убедитесь, что они хорошо едят» - Чэнь Цзитан о хорошем управлении.\n\nНачиная наши реформы по оказанию помощи нашему населению в эти тяжелые времена, правительство Гуандуна приступило к поглощению различных местных частных благотворительных организаций, действующих в Гуандуне, в структуру провинциального правительства, полагая, что они были слишком независимы в работе и недостаточны в применении для эффективной помощи населению. В тандеме с этими шагами он также руководил подготовкой «бюро социального обеспечения», направленного на обеспечение благосостояния, наряду с культурным и нравственным воспитанием населения.\n\nВ рамках этого крестового похода за возвращение ответственности гражданам губернатор также разработал Трехлетний план «Исправления» и «Реконструкции», в котором его провинциальное правительство сотрудничает с различными организациями, такими как Муниципальный институт помощи Гуанчжоу, чтобы помогать бедным, старым и немощным, внедрять военную подготовку и обязательное нравственное обучение для всех. Губернатор даже зашел так далеко, что открыл три бесплатные провинциальные правительственные клиники, нацеленные на лавочников, разносчиков, лодочников, наряду с шестью дополнительными больницами, и начал помогать безработным эмигрантам. Что еще более спорно, губернатор внедрил кампанию социального обучения «Почитай Конфуция, изучай классику», призванную обеспечить упорядоченное и хорошо функционирующее общество морали.\n\nНекоторые в партии опасаются, что, предпринимая такие шаги, какими бы благожелательными они ни были, губернатор обходит само Национальное правительство. Некоторые даже утверждают, что все это — вопиющая игра за власть, чтобы укрепить роль Чэнь Цзитана в повседневной жизни жителей Гуандуна. Однако многие из его инициатив принесли реальную пользу населению, и в партии растет поддержка такой находчивости ради общего блага народа."
 GXC.earlygame.250.a: "Это переход границ, нет?"
 GXC.earlygame.250.b: "Поддержать такую инициативу!"

 GXC.earlygame.251.t: "Национальный университет Сунь Ятсена"
 GXC.earlygame.251.intro: "В наших усилиях по расширению наших образовательных учреждений для надлежащего удовлетворения потребностей населения мы возобновили финансирование «Национального университета Сунь Ятсена». Имея скромные корни как расширенная версия Национальной высшей педагогической школы Гуандуна, он позже был объединен с Национальным университетом Гуандуна, Государственным сельскохозяйственным колледжем Гуандуна и Государственным университетом Хошэн Гуандуна в крупное учреждение, названное «Университет Сунь Ятсена». После поглощения Государственного медицинского университета Гуандуна и Государственного промышленного колледжа Гуандуна он был переименован Ляо Чжункайем в «Национальный университет Сунь Ятсена» после кончины основателя партии. Ранние пионеры концептуализировали его как имеющий медицинский факультет в немецком стиле, факультет сельскохозяйственных наук в американском стиле, в то время как крыло гуманитарных наук управлялось бы подобно Пекинскому университету."
 GXC.earlygame.251.d.1: "$GXC.earlygame.251.intro$\n\nВозрождение университета получило широкую поддержку со стороны партии, многие из членов которой сыграли решающую роль в его первоначальном воплощении. Цзоу Лу, например, был первым директором, а Ху Ханьминю (генеральному советнику) Сунь поручил прочитать девиз университета и провести церемонию открытия. Однако дискуссии о его будущем руководстве остаются открытыми.\n\nЦзоу Лу представлял бы собой возвращение университета к его первоначальному руководству, стойкий союзник Ху Ханьминя в клике Сишань и старший член Гоминьдана. С другой стороны, Чжу Цзяхуа был выдвинут более консервативными фракциями как продолжение существующего руководства факультета университета, геолог с большой репутацией, относительно нейтральных республиканских политических взглядов, за исключением его отмеченной германофилии. Наконец, Ван Куньлунь был выдвинут теми, кто предполагает, что университету нужно новое направление. Давний друг Сунь Фо с обширным академическим мастерством, он также был бы подходящим директором, хотя многие ставят под сомнение его идеологическую лояльность.\n\nКак бы то ни было, [Root.GetLeader] полностью понимает огромный вес такого решения, ибо он решает не только будущее китайских студентов, но и политические махинации за кулисами."
 GXC.earlygame.251.d.2: "$GXC.earlygame.251.intro$\n\nОбразование для масс рассматривается как неотъемлемая часть платформы Гоминьдана, хотя по мере того, как партия взвешивает будущее руководство Университета, внутренняя политика быстро просочилась в уравнение. Известный педагог Сюй Чунцин занимал различные должности в сфере образования на протяжении своей долгой карьеры, его перспективы поддерживаются его тесными связями с Тань Пиншанем и Временным комитетом действий. Тем временем получивший французское образование и прославленный администратор Чжан Юнь получил поддержку от местных отделений Ассоциации товарищей по реорганизации, предлагая стабильную и осторожную руку на руле. Наконец, известный ученый, поэт и член Фракции реконструкции Ван Куньлунь; давний друг Сунь Фо и обладающий обширным академическим мастерством, он был бы подходящим директором для учреждения — хотя некоторые сомневаются в его идеологической приверженности.\n\nКак бы то ни было, [Root.GetLeader] полностью понимает огромный вес такого решения, ибо он решает не только будущее китайских студентов, но и политические махинации за кулисами."
 GXC.earlygame.251.a: "Сюй Чунцин."
 GXC.earlygame.251.b: "Чжан Юнь."
 GXC.earlygame.251.c: "Ван Куньлунь."
 GXC.earlygame.251.e: "Цзоу Лу."
 GXC.earlygame.251.f: "Чжу Цзяхуа."

 #PLACHEOLDER - 270-275

 GXC.earlygame.270.t: "Кооперативы Гуандуна"
 GXC.earlygame.270.d.1: "В международном мире различные нации внедрили так называемые «Кооперативные программы» в качестве альтернативного метода управления экономикой. В таких программах люди в сообществе сотрудничают и объединяются добровольно для удовлетворения своих общих экономических, социальных и культурных потребностей через демократически контролируемое предприятие. В своем самом революционном состоянии это можно увидеть в идеологии синдикализма, и это играет важную роль в таких странах, как Франция и Британия.\n\nОднако следует отметить, что в случае западноевропейских кооперативов они заявляют и придерживаются политики самообслуживания, будучи самостоятельными. Это противоречит предложенной китайской концепции кооператива, в которой они должны служить широким национальным интересам в первую очередь, прежде чем местным, как проповедовал доктор Сунь Ятсен.\n\nПоскольку китайское крестьянство было признано правительством неспособным создавать спонтанные, естественные кооперативы, официальная программа реализации была разработана правительством [ROOT.GetLeader]. С главной целью демонтажа власти «местных хулиганов и злых шэньши» губернатор Гуандуна Чэнь Цзитан, будучи одним из величайших сторонников программы, вложил весь свой политический вес в радикальное внедрение кооперативов, используемых для обучения местных жителей и обеспечения их освобождения.\n\nКак проповедовал Чэнь, «Кооперативизм — это форма социализма, но такая, которая использует здоровые методы для улучшения общества и мирные средства для устранения всех недостатков капитализма». Однако сторонники Новой клики Гуанси выступают против любых соображений о полном перевороте социального порядка, призывая к умеренному плану, сосредоточенному на развитии более прагматичных кооперативов, таких как транспортные."
 GXC.earlygame.270.d.2: "В международном мире различные нации внедрили так называемые «Кооперативные программы» в качестве альтернативного метода управления экономикой. В таких программах люди в сообществе сотрудничают и объединяются добровольно для удовлетворения своих общих экономических, социальных и культурных потребностей через демократически контролируемое предприятие. В своем самом революционном состоянии это можно увидеть в идеологии синдикализма, и это играет важную роль в таких странах, как Франция и Британия.\n\nОднако следует отметить, что в случае западноевропейских кооперативов они заявляют и придерживаются политики самообслуживания, будучи самостоятельными. Это противоречит предложенной китайской концепции кооператива, в которой они должны служить широким национальным интересам в первую очередь, прежде чем местным, как проповедовал доктор Сунь Ятсен.\n\nПоскольку китайское крестьянство было признано правительством неспособным создавать спонтанные, естественные кооперативы, официальная программа реализации была разработана правительством [ROOT.GetLeader]. С главной целью демонтажа власти «местных хулиганов и злых шэньши» губернатор Гуандуна Чэнь Миншу, будучи одним из величайших сторонников программы, вложил весь свой политический вес в радикальное внедрение кооперативов, используемых для обучения местных жителей и обеспечения их освобождения.\n\nКак проповедовал Чэнь, «Кооперативизм — это форма социализма, но такая, которая использует здоровые методы для улучшения общества и мирные средства для устранения всех недостатков капитализма». Однако сторонники Новой клики Гуанси выступают против любых соображений о полном перевороте социального порядка, призывая к умеренному плану, сосредоточенному на развитии более прагматичных кооперативов, таких как транспортные."
 GXC.earlygame.270.a: "Возможно, взвешенный подход лучше."
 GXC.earlygame.270.b: "Сломить власть шэньши!"

 GXC.earlygame.271.t: "Транспортные кооперативы"
 GXC.earlygame.271.d: "Независимо от реализации, концепция кооперативов поддерживалась доктором Сунем и другими теоретиками Гоминьдана как столь необходимая помощь в выполнении 6 целей местного самоуправления на этапе Опеки Национальной революции, ибо неуклонное внедрение кооперативной программы — это лишь первый шаг к воспитанию национального самосознания, достаточно способного для участия в выборах.\n\nС окончательным решением следовать более умеренному курсу в создании нашей отечественной китайской кооперативной программы правительство последовало системе шагов, к которой призывали сторонники в Новой клике Гуанси. С таким действием произошло довольно неравномерное распределение средств в пользу транспортных кооперативов из-за их способности обеспечить более широкую интеграцию железных дорог между провинциями, что в конечном итоге считается приоритетом для военных.\n\nЭто не обходится без негативной реакции, поскольку крестьянство по всей провинции шумит и призывает сосредоточиться на кредитных, потребительских и производственных кооперативах для удовлетворения своих собственных потребностей, в отличие от потребностей солдат, причем определенные массы крестьянства считают это тиранией и сопротивляются усилиям правительства по созданию большего количества кооперативов."
 GXC.earlygame.271.a: "Крестьяне не знают, что хорошо для нации."
 GXC.earlygame.271.b: "Транспорт может подождать, подаяния народу на первом месте."

 GXC.earlygame.272.t: "Кооперативы и коммунизм"
 GXC.earlygame.272.d: "Кризис поразил улицы Лянгуана, с неслыханными беспорядками. На стенах всех крупных городов появились лозунги, провозглашающие, что «Кооперативизм — это не что иное, как коммунизм», что «Кооперативы — это просто старые крестьянские ассоциации» и что «Кооперативные активисты на самом деле коммунисты!», и такие подлые заявления мобилизуют население против того, что в конечном итоге является несуществующим пугалом.\n\nХотя правительство не может установить, кто является виновниками, хотя многие указывают пальцем на различные местные капиталистические силы в Гуандуне, фактическая реализация «радикальной» кооперативной программы не такая, какой казалась. Уделяя приоритетное внимание стабильности, насколько это возможно, она в конечном итоге была нацелена на плавный переход власти от «местных хулиганов и злых шэньши» к простому населению, однако расширение кооперативного движения явно встретило поразительное сопротивление.\n\nВ сочетании с широким недоверием со стороны организованных рабочих, опасающихся потери своих промышленных рабочих мест в пользу кооперативного труда, и торговцев наряду с монопольными капиталистами, опасающихся потери контроля над своими прибылями или сетями распределения, многие в правительстве призывают смягчить программу, чтобы успокоить оппозицию. Другие, однако, придерживаются мнения, что если шэньши верят, что кооперативы — это коммунизм, почему бы не дать им его? Настаивая на том, чтобы наши учреждения удвоили усилия и отдали приоритет устранению их базы власти превыше всего."
 GXC.earlygame.272.a: "Смягчить кооперативное движение перед лицом негативной реакции."
 GXC.earlygame.272.b: "Беспочвенные обвинения, за кооперативами будущее!"

 GXC.earlygame.273.t: "Бай Чунси о сельскохозяйственных реформах"
 GXC.earlygame.273.d: "Как говорил Бай Чунси: «Кажется, что если экономические проблемы не решены, то никакие другие типы проблем не могут быть решены. Можно заметить, насколько важен вопрос экономики!», и хочет ли [ROOT.GetLeader] признать это или нет, но в этом отношении он прав. Критически важным для всех функций управления является экономика, ибо она напрямую диктует великолепие народа и богатство нации.\n\nПродолжая далее, Бай считает, что в древние времена Китая конфуцианские мудрецы не принимали во внимание экономику, отказываясь обсуждать «ли» (прибыль), только «дао дэ» (путь добродетели). Однако в те дни Китай был самодостаточным, и изучение экономики можно было игнорировать в пользу моральных принципов, причем первым древним ученым, который занялся экономикой, был Сюнь-цзы. Далее утверждая, что Запад в XIX веке вращал все вокруг влияния экономики, и это только усилилось с недавними событиями в Германии, Франции и России.\n\nЭта технологическая интерпретация китайской бедности, а не распределительная точка зрения, встретила серию оппозиционных заявлений от большинства левых ученых, хотя также нашла признание в теориях Дж. Лоссинга Бака, который утверждал, что причиной деревенской бедности в Китае было слишком высокое соотношение труда к земле. 80% китайских ферм слишком малы, чтобы быть экономичными даже в китайских условиях, и что внедрение механизированных трудосберегающих устройств создало бы еще больший избыток рабочей силы, который экономика не была готова поглотить."
 GXC.earlygame.273.a: "Бай может быть прав."
 GXC.earlygame.273.b: "Нация, однако, должна быть по-настоящему вестернизирована."

 GXC.earlygame.274.t: "Скотоводство и увеличение производства"
 GXC.earlygame.274.d: "С подчеркнутым доверием правительства к усилиям и убеждениям Бай Чунси в области сельскохозяйственной реформы, ему недавно был дан зеленый свет на реализацию ряда местных программ в провинциях Гуанси в качестве начального теста для возможного действия по всей стране. Путем бурных исследований Бай остановился на имитации успешной программы разведения крупного рогатого скота, реализованной на соседних Филиппинах, с целью быстрого увеличения поголовья скота и, следовательно, производства в скотоводческой отрасли.\n\nБлагодаря найму эксперта Родье вместе с его филиппинскими помощниками и использованию специализированных ветеринарных учебных институтов, специальная программа разведения крупного рогатого скота Бая показала значительный рост поголовья быков на начальных этапах. Однако критики высказывают опасения по поводу применимости такой программы в массовом масштабе, за пределами ее строго контролируемой среды."
 GXC.earlygame.274.a: "Изобретательные методы, Бай!"
 GXC.earlygame.274.b: "Новая программа, но вряд ли применимая."

 GXC.earlygame.275.t: "Усилия по мелиорации земель"
 GXC.earlygame.275.d: "Отвергая попытки Новой Гуанси следовать их инициативам в сельскохозяйственной реформе, выбранная правительством политика полной вестернизации привела к созданию ряда экспериментальных сельскохозяйственных станций по всем провинциям, в конечном итоге для демонстрации мелиорации земель в надежде стимулировать усилия по мелиорации в масштабах всей провинции.\n\nУвы, такие инициативы в последнее время имели ограниченный успех, в основном приписываемый некомпетентности партийных бюрократов в фактической мобилизации населения провинции для выполнения таких инициатив. Такое отсутствие успеха вызвало язвительные замечания со стороны таких, как Новая Гуанси, настаивающих на том, что их программы принесли бы гораздо больше успеха, однако некоторые в правительстве настаивают на том, чтобы оставаться стойкими и непоколебимыми, сглаживая проблемы для будущей реализации."
 GXC.earlygame.275.a: "Некомпетентность или нет, мы должны двигаться вперед."
 GXC.earlygame.275.b: "Оправдание методов Новой Гуанси!"

 GXC.earlygame.290.t: "Дворец простых людей"
 GXC.earlygame.290.intro: "Фирменной программой обновления городов Чэнь Цзитана в начале его пребывания в должности был «Дворец простых людей», спроектированный заместителем Чэня Линь Юнгаем и архитектором Чэн Тяньгу для обеспечения доступным жильем бедноты Кантона. Каждый из них включает дизайн из трех арок, символизирующих Три принципа, призванный стать масштабным физическим проявлением выполнения учений доктора Суня. Эти дворцы, или, по крайней мере, те, что показаны прессе, могут похвастаться современными удобствами, призванными возвестить о новой эре в Китае, которая наступит, как только власть милитаристов и иностранных империалистов над нашей экономикой будет сломлена."
 GXC.earlygame.290.d.rkmt: "$GXC.earlygame.290.intro$\n\nКомментатор в «Modern Canton» описал, как «просторный вход и вестибюль больше походили на вход в какую-то школу, и на самом деле общий внешний вид самого кирпичного и бетонного здания с его верандами создавал мимолетное впечатление особняка для аристократов, а не общежития для рабочих», описывая величественный характер этих проектов, особо отмечая вспомогательные фермы, которые включают «обильный запас овощей всех видов, включая рис, бобы, дыни, сахарный тростник и ананасы», в то время как овцы, крупный рогатый скот, свиньи, куры и утки также выращивались. Они также отметили, что мастерские по плетению из ротанга и бамбука уже работают, хотя ожидается открытие новых.\n\nНесмотря на величие, не все были убеждены. Критики утверждают, что те, кто на самом деле получал жилье, были в основном военными, и что эти объекты в основном служат прославленными казармами для лоялистов клики Гуандун. Политика приема до сих пор также благоприятствовала студентам и тем, кто возвращается с учебы за границей, которым приписывают помощь в возрождении Гуанчжоу, но вряд ли они являются «простыми людьми», которым эти здания должны служить. Многие потребовали пересмотреть политику приема, чтобы позволить настоящим простым людям получить место для жилья."
 GXC.earlygame.290.d.lkmt: "$GXC.earlygame.290.intro$\n\nРеальность, как это часто бывало при правом правлении, была менее гламурной. «Настоящий Дворец простых людей», по словам автора популярного журнала Qicui Guanzhu, «находится на тротуарах, под верандами городских зданий. Это единственное место, где нет арендной платы, просторно и хорошо проветривается». Действительно, когда наше новое правительство проводит инвентаризацию этих массовых жилищных блоков, проверка записей тех, кто получил жилье, показала, что большинство из них были солдатами, связанными с армией Чэнь Цзитана, или студентами, вернувшимися из-за границы. Несмотря на то, что это позиционировалось как ресурс для бедных, политика приема была стратегически структурирована так, чтобы допускать только тех, кого правительство считало ценными. Излишне говорить, что возмущение было сильным, особенно со стороны пролетарских активистов, однако искоренение статус-кво тоже нелегкий подвиг."
 GXC.earlygame.290.a: "Счастливая армия — верная армия!"
 GXC.earlygame.290.b: "Новые умы, новый Китай!"
 GXC.earlygame.290.c: "Мы должны помочь простому человеку!"

 GXC.earlygame.291.t: "Тарифный план Гуанси"
 GXC.earlygame.291.d: "Чтобы защитить хрупкую экономику Гуанси, Новая клика Гуанси сделала акцент на самообеспечении и обратилась к своим гуандунским коллегам с просьбой помочь им в их стремлении сбалансировать торговый дефицит. Особое значение для не имеющей выхода к морю провинции имеет сельскохозяйственный сектор, который составляет основную часть их экспорта, хотя они также стремились к развитию местной промышленной базы.\n\nВ Учжоу было создано торговое бюро для регулирования импорта и обеспечения контроля качества экспорта. Были введены высокие тарифы на многие импортные товары, а в некоторых случаях (как предметы роскоши) они были полностью запрещены. Попытки иностранных концессионеров обеспечить соблюдение договорных условий были в значительной степени обойдены бездействием центрального правительства, а также высоким налогообложением китайских дистрибьюторов, которые продавали иностранные товары, в результате чего иностранные сигареты и алкоголь исчезли с прилавков.\n\nДля поддержки внутреннего производства протекционистская экономическая политика была смешана с частно-государственными совместными предприятиями, которые предоставляли налоговые льготы и субсидии этим предприятиям. Большая часть этой программы финансировалась за счет массового экспорта тунгового масла, которое составляет почти треть экспорта Гуанси наряду с продукцией горнодобывающей промышленности. Каждому домохозяйству в Гуанси было приказано сажать десять саженцев тунга на каждого трудоспособного мужчину каждый год, а уездные тунговые комитеты обеспечивали соблюдение требований.\n\nОднако не каждый сектор контролировался так тщательно, как сельское хозяйство и промышленность. Критики этого жесткого государственного вмешательства указывают на то, что горнодобывающая промышленность страдает при таком управлении, несмотря на то, что составляет существенную часть региональных доходов. Правительство ранее прибегало к более мягкому подходу, продавая лицензии частным компаниям на олово и марганец, а также в значительной степени оставляя остальное частным предприятиям. Многие предлагали моделировать дальнейшую экономическую реконструкцию вокруг этой модели вместо этого."
 GXC.earlygame.291.a: "Лучшие вещи в жизни сделаны в Китае!"
 GXC.earlygame.291.b: "Смягчить наш подход, мы не можем полагаться только на наши собственные ресурсы."

 GXC.earlygame.292.t: "Разногласия по тарифам"
 GXC.earlygame.292.d: "Провинция Гуандун традиционно зависела от иностранного экспорта для своего богатства, и поэтому торговая политика является очень деликатным вопросом в кантонской политике. Чтобы собрать деньги для правительства, Чэнь Цзитан ввел множество новых тарифов, известных как «специальные налоги на иностранную сельскохозяйственную продукцию и различные товары». Хотя на бумаге это тариф на товары иностранного производства, на практике это также привело к налогообложению товаров из других провинций Китая за пределами Гуандуна.\n\nЭто положение особенно спорно, поскольку оно расходится с националистической риторикой Гоминьдана и было осуждено другими губернаторами как за пределами, так и внутри сферы Гоминьдана как эгоистичное и даже сепаратистское. Правительство Гуандуна защищалось, заявляя, что облагаются налогом только продукты, имеющие компоненты или сырье иностранного производства, и что они просто защищают китайскую промышленность от иностранного экономического империализма. Он обратился ко многим настроениям, выраженным китайскими националистами и левыми, которые исторически призывали к агрессивному подавлению внешней торговли, идущей через Гонконг и Макао, надеясь оказать давление на иностранные концессии, чтобы добиться их возвращения под китайское правление.\n\nДругие, однако, отметили, что таможенники непропорционально сосредоточили свои усилия на вытеснении товаров, напоминающих продукты, произведенные в Гуандуне, и что соевые бобы, произведенные в Маньчжурии, также облагались налогом, и, таким образом, заклеймили Чэня как оппортуниста. Некоторые даже указывали, что Чэнь Цзитан и его приспешники широко извлекают выгоду из этой политики, обогащая свою Новую гуандунскую клику за счет торговцев."
 GXC.earlygame.292.a: "Давайте начнем кампанию против иностранного концессионизма!"
 GXC.earlygame.292.b: "Давайте продолжим статус-кво."
 GXC.earlygame.292.c: "Мы не можем дискриминировать наших соотечественников!"

 ##UPC Unique Economic Events (300-349)
 GXC.earlygame.300.t: "Восстановление финансов"
 GXC.earlygame.300.d: "Пока Китай движется вперед после десятилетия Чжили, и хаос снова возвращается на берега Поднебесной, Гуандун находит толику стабильности с возвращением к власти губернатора Чэнь Цзюнмина. Первое правление Чэня в качестве губернатора Гуандуна ознаменовалось созданием множества сложных политических программ для продвижения его амбиций, и губернатор не терял времени даром, работая над восстановлением старого порядка. Для любого режима милитаристов в этот бурный период наличие стабильных финансов является краеугольным камнем успеха, и Чэнь сделал обеспечение своего финансового положения главным приоритетом с рядом финансовых реформ. Значительная часть государственной бюрократии была оптимизирована и сокращена во имя эффективности, а аудиторский департамент был восстановлен.\n\nЧэнь быстро протянул руку сотрудничества Провинциальному банку Гуандуна, учреждению, созданному им для помощи в переходе от имперских таэлей к республиканским долларам еще в 1910 году. Чтобы обеспечить стабильность банкнот, Чэнь Цзюнмин снова подписал соглашение с Гонконгской банковской корпорацией, хотя это вызвало заметное недовольство населения. Чэнь также призвал Чэнь Сижу помочь ему получить иностранные займы от ряда держав и открыто опубликовал соглашения, впервые в истории Кантона. Агитаторы Гоминьдана сильно протестовали против этого шага, осуждая Чэня как агента иностранных интересов.\n\nВ былые времена Чэнь мог рассчитывать на финансовую надежность британского правительства для поддержки, но с его падением губернатор-федералист обнаруживает острую нехватку иностранных покровителей. Без надежной иностранной помощи Чэнь все чаще подумывает о сокращении военных расходов, хотя такой шаг, несомненно, вызовет волнения в армии, в рядах которой уже много ненадежных акторов. Независимо от военных расходов, Чэнь также реформировал соляную администрацию для увеличения доходов, которые он планирует использовать для погашения займов своего правительства."
 GXC.earlygame.300.a: "Мы также пойдем на сокращение военных расходов."
 GXC.earlygame.300.b: "Да, давайте не будем обижать наших союзников уже..."

 GXC.earlygame.301.t: "Искоренение короля пороков"
 GXC.earlygame.301.d: "Одной из главных отличительных черт первого губернаторства Чэня был его полный запрет на азартные игры в 1920 году, встреченный ликованием населения. Администрация Чэня была очень строга к любым попыткам организовать лотерею, губернатор заставлял всех голосовать публично и критиковал всех, кто поддерживал это, как подкупленных. Позже в своем первом губернаторстве он сформировал Всеобщую ассоциацию по подавлению азартных игр. Всеобщая ассоциация установила смертную казнь для игроков, закрыла бордели и установила большие штрафы за опиум. Хотя запрет никогда не отменялся даже после того, как Чэня выгнали из Гуандуна, он действительно строго соблюдался только тогда, когда он был губернатором.\n\nКогда губернатор Чэнь вернулся к власти и его финансовые реформы идут полным ходом, он не терял времени на восстановление запретов на азартные игры. Хотя Чэнь Ляньбо выразил обеспокоенность губернатору Чэнь Цзюнмину относительно потери государственных доходов из-за запрета азартных игр, последний защищал запрет, объясняя, что потеря доходов правительства от азартных игр должна быть сбалансирована реформой налога на соль, устранением коррумпированных посредников и подавлением контрабанды при одновременном поощрении свободного рынка, чтобы избежать роста цен.\n\nЧтобы продвигать свободный рынок, Чэнь разделил районы добычи соли на несколько монополизированных «районов продажи», определил Гуандун и провинции, импортирующие гуандунскую соль, как монополизированные «районы покупки», и в каждом районе покупки назначил определенное количество торговцев, которые могут свободно торговать по конкурентным ценам. По его мнению, это позволит монополиям покупки и продажи свободно действовать друг против друга, сокращая государственное регулирование. Хотя реформы Чэнь Цзюнмина далеки от всеобщего признания, мало кто может сказать, что его административные реформы не являются большим улучшением по сравнению с десятилетием анархии."
 GXC.earlygame.301.a: "Губернатор знает лучше!"

 GXC.earlygame.302.t: "Погружение Китая в современность"
 GXC.earlygame.302.d: "Один из самых известных экспортных товаров Китая, шелк, в последнее время находится под пристальным вниманием губернатора. Надеясь продвинуть шелковую промышленность Гуандуна, губернатор Чэнь приказал всем уездам Гуандуна создать управление лесным хозяйством, а также восстановил инспекционную службу по шелку-сырцу и Центр по производству семян шелкопряда. Помимо шелка, Чэнь также стремился продвигать фермы по выращиванию кофе, каучука и тропических фруктов. Недавно он открыл консервный завод в Гуанчжоу и позаботился о том, чтобы Вампу снова стал глубоководным портом.\n\nЧэнь даже надеется создать крупную фондовую биржу в Гуанчжоу, приглашая китайских торговцев из Гонконга, Шанхая и Гуанчжоу принять участие в ее развитии. Ранее пришедшая в упадок в десятилетие анархии, Чэнь восстановил Выставку промышленных и коммерческих товаров. Чтобы контролировать растущую торговлю в Гуандуне, он восстановил полномочия Ассоциации торговых палат Гуандуна, которую он впервые создал в марте 1922 года.\n\nОдна из мечтаний губернатора — создать провинциальную железнодорожную систему, и он позаботился о продолжении развития ранее построенных шоссе из Хуэйчжоу и Чжанмутоу и создал Управление шоссейных дорог района Восточной реки. Чтобы модернизировать железную дорогу Кантон-Ханькоу, он обратился к немцам за еще одним займом. Помимо модернизации железных дорог, он позаботился о модернизации самого Гуанчжоу. Многие старые стены были снесены, и на их месте строятся новые бизнес-центры и общественные парки. Жители Гуандуна действительно запомнят это время как период процветания."
 GXC.earlygame.302.a: "Гуандун перестраивается шаг за шагом!"

 GXC.earlygame.303.t: "Конец Эры анархии"
 GXC.earlygame.303.d: "Чтобы избежать полного хаоса десятилетия анархии снова, совершенствование администрации было главным приоритетом для правительства Чэнь Цзюнмина. Его режим уже наметил несколько планов по оптимизации провинциального правительства, реструктуризации уездных правительств и внедрению системы оценки эффективности уездных магистратов.\n\nЧэнь излагал подобные планы во время своего первого губернаторства, но теперь, когда Гуандун полностью под его контролем, он может наконец воплотить свое полное видение без репрессий со стороны Гоминьдана или Гуанси. Чтобы стабилизировать бумажную валюту, улучшить сбор налогов, контролировать расходы и достичь сбалансированного бюджета, Чэнь продолжил свою стратегию после раскола с Сунем, ухаживая за шэньши и элитами, чтобы они могли сотрудничать с Гуанчжоу в вопросах финансов.\n\nКонечно, никакая стабильность не может быть действительно достигнута без принуждения или поддержки крестьянства, и Чэнь позаботился о том, чтобы Департамент промышленности принял новую экономическую политику для изучения способов развития горнодобывающей промышленности, ввода пустующих земель в оборот, продвижения промышленных искусств для обеспечения занятости и сотрудничества с местными фермерами. В вопросе общественной безопасности Чэнь позаботился о немедленном расширении полицейских сил во всех уголках провинции и создал полицейские академии для подготовки квалифицированных кадров."
 GXC.earlygame.303.a: "Пусть Гуандун остается вечно стабильным!"

 GXC.earlygame.304.t: "Благосклонность Вашингтона"
 GXC.earlygame.304.d: "С попытками губернатора Чэня утвердить Гуанчжоу как дружественный порт для всех торговцев, многие американцы оказались в городе, некоторые ради коммерческих возможностей, а другие просто чтобы сбежать от хаоса на родине. Хотя Чэнь публично не заявлял, что его правительство вдохновлено американской федеральной системой, его администрация все больше приобретала репутацию американофильской, что отмечали многие американские журналисты. И наоборот, его правительство также считается враждебным к франко-британским синдикалистским правительствам, которые финансировали его соперников из Гоминьдана.\n\nЕго правительство также известно своей растущей враждебностью к Токио, несмотря на присутствие прояпонских фигур, таких как Чэнь Ляньбо, в его высших эшелонах, что, несомненно, является продуктом растущего японского влияния в Дунбэе и роста напряженности во всей Азии. Хотя Соединенные Штаты впали в анархию, не слишком отличающуюся от темного десятилетия Гуандуна после Северного похода, Чэнь нашел американских торговцев и банки достаточно надежными и дружелюбными, и многие ожидают, что США найдут друга в Гуанчжоу, как только пыль осядет дома."
 GXC.earlygame.304.a: "Мы в Китае, как и вы, хотим лучшего мира, и мы должны его получить!"

 GXC.earlygame.305.t: "Коллективные переговоры"
 GXC.earlygame.305.d: "Чэнь Цзюнмин, будучи в душе идеалистом, всегда имел сложные отношения с рабочим движением. Хотя он поддерживал профсоюзы, губернатор Чэнь выступал против того, чтобы политики использовали рабочее движение для политического капитала, говоря Чэнь Дусю, что оно должно оставаться на время «движением трудового воспитания» во время пребывания последнего в администрации Чэнь Цзюнмина. Поскольку Чэнь пытается снова укрепить левый фланг в своей структуре политического альянса, вдохновленные социалистами забастовки профсоюзов заставили Чэнь Цзюнмина выбрать переговоры, призывая всех объединиться как одна большая семья, «ища компромисс, взаимопомощь и взаимопонимание для достижения прогресса».\n\nПравительству Чэня не привыкать иметь дело с забастовками, причем Хуан Яньпэй однажды описал подход правительства Гуандуна как трехсторонний. Во-первых, правительство Гуандуна поощряло профсоюзы, но строго предостерегало их от использования забастовок для урегулирования трудовых споров. Во-вторых, оно пыталось ликвидировать неграмотность среди рабочей силы, создавая вечерние школы на фабриках. В-третьих, правительство Чэня пыталось вести переговоры через прямые отношения с руководством Профсоюза машиностроителей, возглавляемым анархистами Ли Дэсюанем и Чжу Цзинли, которые готовы снова работать с правительством Чэня после десятилетия подавления Чэнь Ляньбо.\n\nКогда Профсоюз моряков Гонконга начал крупную забастовку в 1922 году, которая распространилась на Гуанчжоу, Чэнь создал Бюро помощи продовольствием для импорта риса из Хуэйчжоу и Гуанси, чтобы предотвратить спекуляцию. Впоследствии Чэнь смог стать посредником в споре между забастовщиками и британцами. В конечном счете, цель Чэня заключалась в том, чтобы профсоюзы оставались аполитичными и сосредоточенными только на экономике, хотя такое настроение вряд ли будет достигнуто в краткосрочной перспективе."
 GXC.earlygame.305.a: "Истинный герой рабочего класса и народа Гуандуна!"
 GXC.earlygame.305.b: "Народная революция, сведенная на нет бархатной перчаткой..."

 GXC.earlygame.306.t: "Повреждение двигателя революции"
 GXC.earlygame.306.d: "Один из главных визионеров нового Свободного Китая, Чжан Цзюньмай изложил свой план развития нации и спасения ее от социальной революции Гоминьдана. Во-первых, экономика Китая не должна повторять историю европейского капитализма. Обобществление предприятий должно начаться с железных дорог и шахт и управляться совместной организацией правительства, техников и потребителей.\n\nСледует стремиться к смешанной экономике, но Китай должен быть осторожен, чтобы это не была экономика, которая в основном управляется аппаратчиками в ущерб способности бедных наслаждаться равенством человеческого счастья, поскольку «зло, которое возникло бы, было бы, безусловно, более многочисленным, чем частная собственность и капитализм», по его мнению. Экспроприация также должна осуществляться чисто законными средствами, а не синдикалистской экспроприацией, с компенсацией за национализированную собственность и упорядоченным образом.\n\nЧто касается денег в политике, Чжан настаивал на том, чтобы банки и крупные отрасли промышленности облагались высокими налогами и не могли использовать свое богатство для влияния на политику. Что касается иностранных банков, Чжан настаивал на их полной ликвидации, наряду со всем иностранным экономическим влиянием в Китае. По вопросу о земле Чжан считает, что недавно застроенные торговые порты и земли должны быть муниципализированы, а неосвоенные земли не должны управляться и развиваться отдельными лицами.\n\nХотя он и является сторонником национализации земли в теории, Чжан предостерег от простой передачи ее крестьянам, потому что это просто изменит крупную частную собственность на мелкую частную собственность. Будучи критиком рабочих советов на немецких фабриках на том основании, что они не представляют рабочих, Чжан тем не менее настаивал на их постепенном создании на китайских фабриках.\n\nНезависимо от этого, Чжан рассматривает их как ступеньку и начало конституционной организации фабрик. Для многих в Гуандуне идеи Чжана уже были восприняты всерьез, и сам губернатор рассматривает их."
 GXC.earlygame.306.a: "Блестящий человек со смелым планом исцеления нации!"
 GXC.earlygame.306.b: "Он просто повторяет идеи немецкой СДПГ!"

 GXC.earlygame.307.t: "Реформа под маской революции?"
 GXC.earlygame.307.d: "Для многих Чэнь Цзюнмин представляет собой альтернативу слева Гоминьдану, без радикализации и авангардизма, к которым они были склонны. Однако многие вместо этого сочли бы Федералистское движение Чэнь Цзюнмина внутренне консервативным и реформистским, и, следовательно, не настоящей альтернативой революционному Гоминьдану. Анархистские союзники Чэня, представляющие левый фланг его движения, были отмечены своими градуалистскими взглядами, что серьезно ставит под сомнение революционный аспект федералистов. Для самого Чэня анархисты, вдохновившие его, «отличались толстовской идеей сельского самоуправления и кропоткинской концепцией взаимопомощи, проецировали умеренный, постепенный путь к социальной и политической трансформации».\n\nДаже марксисты в Федералистском движении, такие как Чэнь Дусю, Ли Дачжао и Бай Цзяньу, как известно, частично вдохновлялись Лян Цичао, который был отцом реформистов Китая. Ко второму губернаторству Чэня такие как Чэнь и Ли уже решительно примкнули к Гоминьдану, лишив федералистов их левых верительных грамот еще больше. Чжан Шичжао, крупная либеральная фигура в Пекине, считался полностью посвященным «компромиссной политике», в то время как Чжан Тайянь поддерживал федеральное самоуправление, отвергая национальное государство и считая его уникальной китайской судьбой.\n\nДругие союзники Чэня также не помогли этому имиджу. Когда клика Чжили победила Фэнтянь в 1921 году, Чэнь и другие федералисты протянули руку централисту Нефритовому маршалу, надеясь, что его националистические взгляды сделают его восприимчивым к их идеям. Протеже У пошел дальше, приняв провинциальное самоуправление для своей Лиги восьми провинций, чтобы снискать расположение местной элиты Восточного Китая, тем самым приведя федерализм в прямую ассоциацию с Чжили, которые теперь считаются главными реакционерами нации. Чэню предстоит много работы, если он планирует создать более революционный имидж для своего движения."
 GXC.earlygame.307.a: "Наше движение более революционно, чем деспотичный Гоминьдан!"
 GXC.earlygame.307.b: "Нет ничего плохого в репутации реформатора..."

 GXC.earlygame.308.t: "Образование социал-демократа"
 GXC.earlygame.308.d: "Педагог в душе, Чжан Цзюньмай провел большую часть своей карьеры, преподавая. Национальный институт политических наук, который он создал, был основан в 1924 году с помощью местных губернаторов и деятелей Чжили, включая Сунь Чуаньфана, и укомплектовал свой факультет многими сотрудниками с иностранным образованием. Философия Чжана заключалась в достижении золотой середины между подражанием и неприятием западного образования. Находясь в Национальном институте, Чжан заявил, что в политической философии есть две идеи: правление людей и правление закона. По его мнению, Китай освоил первое, в то время как Запад освоил второе. Чжан утверждал, что Китай должен искать золотую середину в этих двух системах для своей новой правительственной системы, поскольку ни одна из них не сработает сама по себе для реорганизации Китая.\n\nДля целей Национального института он принял политику культивирования способности к организации в своем студенческом корпусе и объективного изучения западных политических систем. Чтобы способствовать организаторским навыкам, он стремился научить студентов самоуправлению, предоставляя им определенную степень автономии. Чтобы преподавать западную политическую мысль, он создал четыре факультета: политики, экономики, социологии и международных отношений. По его мнению, целью Национального института было не только преподавание знаний, но и «производство хороших людей и формулирование надежных систем и программ, которые станут основой будущей реформации и реконструкции» Китая."
 GXC.earlygame.308.a: "Действительно преемник Лян Цичао!"
 GXC.earlygame.308.b: "Кем этот этатист себя возомнил?"

 GXC.earlygame.309.t: "Свободный бизнес в свободном Китае"
 GXC.earlygame.309.d: "Гуандун долгое время был убежищем для бизнесменов и торговцев, и правительство Чэнь Цзюнмина не испытывает недостатка в деловых интересах. Генерал Вэн Шилян, хотя изначально был офицером в Гуандунской армии Чэня, нашел успешную деловую карьеру после полуотставки от военных и политики. Возглавляя сахарный завод Хуэйчжоу Пинтань, Вэн сколотил состояние, и его интерес к политике только уменьшается с возрастом.\n\nДеловые подвиги старого друга Чэня Чжоу Синнаня также хорошо известны. Во время своего пребывания в армии Чэня Чжоу занимался инфраструктурой Фуцзяни, чтобы помочь военной кампании. Вернувшись в Гуандун в 1920 году, Чжоу сделал почти то же самое в Хуэйчжоу, что и в Чжанчжоу. Когда силы Чэня были отброшены из Гуандуна, Чжоу снова оказался в Сямэне и провел следующее десятилетие, строя дороги и парки.\n\nДругой соратник Чэня, Чэнь Сижу, был наследником сахарного бизнеса своего отца Чэнь «Принца бизнеса» Фана. Чэнь пожертвовал значительные средства на раннее революционное дело Тунмэнхоя и связался с Чэнь Цзюнмином позже в жизни. В начале 20-х годов Чэнь стал менеджером пароходной компании Douglas в Гонконге и директором Китайско-японского банка в Гонконге.\n\nИнь Цзи, уроженец Хунани, выпускник Военной академии Гуанчжоу, изначально служил в Старой клике Гуанси, прежде чем был вытеснен из-за ксенофобии и оказался на службе у Хун Чжаолиня. Покинув армию, Инь удалился в свой родной город в Гуйяне и занялся благотворительностью и общественным благосостоянием.\n\nЧэнь Ляньбо, хорошо всем известный, родился в богатой деловой семье и сколотил состояние на шелковой промышленности и страховании. Возвысившись над другими торговцами в Гуанчжоу, Чэнь возглавил Торговый корпус в обороне против Гоминьдана и контролировал Гуандун в течение десятилетия после этого. Даже сейчас, уступив власть Чэнь Цзюнмину, Чэнь Ляньбо продолжает быть видной фигурой как в бизнесе, так и в политике."
 GXC.earlygame.309.a: "Люди с навыками для создания нового Китая!"
 GXC.earlygame.309.b: "Давайте не будем продавать нашу нацию бизнесменам..."

 GXC.earlygame.310.t: "Марш закаленного радикала"
 GXC.earlygame.310.d: "В то время как большая часть социалистического движения в Китае находилась под влиянием большевизма в русском стиле, анархизма Кропоткина и французского синдикализма, Чжан Дунсунь увлекся английским гильдейским социализмом. Изначально увлеченный массовой демократией, Чжан продвигал эти идеи в новой республике. Однако централизация власти Юанем и диктаторские тенденции подтолкнули Чжана вместо этого искать опору для республики, чтобы она могла создать сильное современное государство. Чжан заинтересовался государственным социализмом, происходящим из Фабианского общества, которое опровергало капитализм, основываясь на условиях жизни рабочего класса, и выступало за коллективизм через государственную собственность и социальное законодательство.\n\nЧто особенно привлекло Чжана в фабианстве, так это его политический элитизм, который остался с ним до конца его политической карьеры. Хаос ранней республики привел его, Лян Цичао и Чжан Цзюньмая к вере в политическую реформацию, возглавляемую современными интеллектуалами, такими как они сами. Чжан окончательно погрузился в гильдейский социализм, когда Бертран Рассел приехал в Китай в 1920 году по приглашению Ляна и Чжана. Пиша о том, что социалистическое государство может скатиться к тирании, если накопит слишком много власти, Рассел критиковал большевистскую революцию в России как диктатуру только Коммунистической партии, а не пролетариата.\n\nТакже будучи критиком Русской революции, Чжан Дунсунь хвалил умеренный социализм, который проповедовал Рассел, и приветствовал баланс между промышленными союзами и государством для обеспечения наибольшего количества свобод трудящимся и поощрения их политического участия, одновременно накладывая на них необходимые ограничения. Рассел в конечном итоге отказался от своих надежд на достижение гильдейского социализма в Китае, что привело Чжана к мнению, что тот не совсем понимает Китай. Освободившись от следования ортодоксальной западной мысли, Чжан начал формулировать свои собственные теории гильдейского социализма, чтобы доказать его осуществимость в Китае."
 GXC.earlygame.310.a: "Какая утопическая чепуха!"
 GXC.earlygame.310.b: "Большевизм бежал, чтобы мы могли идти?"

 GXC.earlygame.311.t: "Теория социализма Чжан Дунсуня"
 GXC.earlygame.311.d: "Будучи ранним сторонником КСП, Чжан покинул группу после того, как понял, что она станет группой, посвященной французскому синдикализму, и становилась все более повстанческой. Работая с Ляном, Чжан продвигал умеренный взгляд на социализм, следуя марксистскому историческому материализму, но отвергая повстанчество, поскольку революция в том виде, в каком был Китай, привела бы к тому, что солдаты и бандиты восстали бы от ее имени, а не рабочие и профсоюзы. Таким образом, Китай должен был сначала способствовать развитию и создать класс «буржуазных джентльменов» (шэншэн цзецзи), которые стали бы основой индустриализированной современной нации. Они сформировали бы элитную группу и обеспечили сильное руководство для изгнания западного империализма.\n\nПоскольку заводы продолжают строиться, образование становится более доступным для бедных, а социалистическая пропаганда становится более распространенной, китайский рабочий класс будет достаточно крепким, чтобы уравновесить власть класса буржуазных джентльменов и призвать к социализму. Затем гильдейские социалисты укоренятся, продвигая сбалансированную социалистическую демократию, которая будет представлять все общество. Промышленность будет управляться цеховыми старостами и самоуправляющимися рабочими, в то время как государственный аппарат может оставаться в руках элиты. Признавая, что как аграрное государство, большинство населения составляли крестьяне и помещики, и защитники статус-кво. Чжан признал, что, поскольку население Китая состояло в основном из крестьян и помещиков, которые будут защищать статус-кво и будут оплотом консерватизма, он вместо этого рассматривал фабричных рабочих как свою социалистическую опору. Благодаря социалистическому образованию городские массы могли бы стать фундаментом нового социалистического общества."
 GXC.earlygame.311.a: "Гильдейский социализм с китайской спецификой?"
 GXC.earlygame.311.b: "Настоящий социалист не отверг бы классовую борьбу!"

 GXC.earlygame.312.t: "Социалистическая теория в действии"
 GXC.earlygame.312.d: "С приходом Чэнь Цзюнмина к власти в Гуандуне и Гуанси у Чжан Дунсуня появилась уникальная возможность применить свои теории на практике. Чэнь, хотя и в союзе со многими консервативными дворянами и реакционными генералами, всегда имел анархистскую жилку, покрытую градуализмом, не слишком отличающуюся от собственной интерпретации социализма Чжаном. Гуанчжоу также является одним из немногих регионов Китая, который уже принял капитализм по сравнению с более феодальными внутренними районами, и, таким образом, ему не нужно ждать так долго, пока произойдет капиталистическое развитие.\n\nГуанчжоу также является домом для многих промышленных рабочих, которые станут привлекательной аудиторией для теорий Чжан Дунсуня. Хотя Чэнь не поощрял политизацию профсоюзов, Чжан Дунсунь подтолкнул своего друга и лидера партии Чжан Цзюньмая к пропаганде их партийной платформы различным рабочим лидерам. Через Университет Сюэхай и Демократическую социалистическую партию Чжан пропагандирует свои интерпретации социализма.\n\nХотя у Чжан Цзюньмая и Чжан Дунсуня разные взгляды на социализм, они разделяют веру в политический элитизм, перенесенную от их общего наставника, Лян Цичао. Через образовательные учреждения они продвигают свои идеи следующему поколению интеллектуалов. Рассматривая Великую республиканскую лигу как политическую элиту, которая возглавит вытеснение западного империализма, Чжан уверен, что Гуандун послужит шаблоном для неизбежного прихода китайского гильдейского социализма."
 GXC.earlygame.312.a: "Гильдейский социализм? Я едва знаю ее!"
 GXC.earlygame.312.b: "Рабочий класс будет спасен шаг за шагом."

 GXC.earlygame.313.t: "Просветитель Юга"
 GXC.earlygame.313.d: "Время Чжана в Национальном институте закончилось в 1932 году, когда он был подвергнут чистке Сунь Чуаньфаном за свои левые симпатии после Шанхайского восстания, и он отправился в Гуанчжоу, где основал Институт Сюэхай вместе с Чжан Дунсунем, с молчаливого согласия Чэнь Ляньбо. Чэнь хотел подготовить таланты для своего режима и часто бодался с Чжан Дунсунем, причем последний чуть не уехал в Пекин, но его убедил остаться Чжан Цзюньмай. В Институте Сюэхай Чжан стремился возродить национальную культуру Китая в образовании, сетуя на то, что китайские учреждения новой эры отбросили свой прежний акцент на мораль, который, по его мнению, был полезен.\n\nТаким образом, он продвигал идею самосовершенствования наряду с поглощением лучшего из западных знаний. Чжан заявил, что «наш институт не цепляется за старое и не гонится за новым. Он желает одновременно развивать и усиливать сильные стороны Китая и Запада, чтобы восполнить недостатки нынешних университетов». В связи с недавним повышением Чэнь Цзюнмина до поста губернатора, Чжан предложил создать новый институт в Гуанчжоу, известный как Институт национальной культуры, который станет его главным трудом в области образования, чтобы продвигать его цели морали и обучения. Чжан не хочет, чтобы его новый институт был государственным, но для администрации Чэня, безусловно, будет благом, если образованная молодежь стечется в Гуанчжоу и будет искать карьеру в его залах."
 GXC.earlygame.313.a: "Институт национальной культуры откроет новую эру для Китая!"
 GXC.earlygame.313.b: "Разве Сюэхая недостаточно для Чжана?"

 GXC.earlygame.314.t: "Социализм через рукопожатие"
 GXC.earlygame.314.d: "По мнению Чжан Дунсуня, долговечные китайские гильдии могли бы быть преобразованы в современные промышленные союзы посредством организационной и идеологической реконструкции. Чтобы достичь этого, Чжан признал необходимость пройти через стадию капитализма, чтобы можно было создать множество рабочих мест и в ограниченной степени улучшить благосостояние рабочих, а также предоставить им институциональные каналы для консультаций с капиталистическими классами. Тем временем образование будет финансироваться богатыми, что повысит грамотность рабочих и превратит рабочий класс в полную энтузиазма аудиторию для идей социализма. В то время как буржуазия обеспечит экономические ступени к социализму, интеллектуалы принесут спасение неосведомленным массам нации. Для более радикальных марксистов в Гоминьдане и КСП идеи Чжана ждать капиталистического развития и откладывать классовую борьбу — это просто выжидательная теория, которую Китай не может позволить себе ждать. Чжана можно охарактеризовать как не особо доверяющего народу, хотя сам он называл это своей интерпретацией марксистского научного социализма."
 GXC.earlygame.314.a: "Социализм через тысячу порезов — это наше будущее!"
 GXC.earlygame.314.b: "Лянисты потеряли суть."

 ##NPA Unique Economic Events (350-399)

###- Section 2c (400-599): Early Game KMT Political Events -###

 ##KMT Early Game Political Event Chain (400-429)
 GXC.earlygame.400.t: "Возвращение Гоминьдана в Лянгуан"
 GXC.earlygame.400.d: "В конце концов, наступление Гоминьдана было неостановимым. Несмотря на поражение за поражением, неудачу за неудачей, Гоминьдан и его лоялисты никогда не сдавались. Как и Сунь Ятсен до них, националисты нашли способ вернуться к власти в Гуанчжоу, свергнув соперничающих милитаристов и еще раз бросив вызов власти Бэйяна. Благодаря мужественным усилиям генерала Чэнь Миншу и его 10-й дивизии, марширующей на юг из Миньганя при поддержке левых элементов в деревнях и городах, и генерала Чэнь Цзитана, который обеспечил своевременный переход Гуандунской армии на сторону Гоминьдана, Гуандун был освобожден от реакционного гнета. Тем временем, ворвавшись со своих баз в Гуйчжоу, остатки «7-й армии» Национально-революционной армии восстановили свой контроль над Гуанси, приведя к власти «Новую клику Гуанси» под руководством Ли Цзунжэня.\n\nБыла создана временная революционная хунта с тремя победившими генералами, представляющими свои соответствующие фракции. Называя себя Политическим советом Южного Китая, революционные генералы сохраняют широкие идеологические и личные разногласия, которые, как ожидается, обострятся по мере того, как их сторонники будут консолидировать политический контроль над своими регионами. Еще предстоит увидеть, смогут ли они действительно оправдать наследие своего основателя, или же их рвение, как и его, в конечном итоге не приведет к объединению Китая."
 GXC.earlygame.400.a: "Бог троицу любит?"

 GXC.earlygame.401.t: "Революция Гоминьдана в Лянгуане"
 GXC.earlygame.401.d: "Несмотря на неоднократные неудачи в последние несколько десятилетий и смерть своего основателя, Гоминьдан отказывается уступать в своем стремлении реализовать видение Сунь Ятсена. Нигде это не было так очевидно, кажется, как в их традиционной базе в Лянгуане, которая пала перед вторгшимися революционными силами из Миньганя и Гуйчжоу, а также восстаниями ячеек изнутри.\n\nЭто привело к власти революционную хунту во главе с победившими генералами: левым Чэнь Миншу и правым Чэнь Цзитаном из Гуандуна, а также генералом Ли Цзунжэнем из Гуанси. Как долго этот так называемый Политический совет Южного Китая сможет оставаться внутренне сплоченным, не говоря уже о том, чтобы принести свою революцию в остальной Китай, еще предстоит увидеть."
 GXC.earlygame.401.a: "Наши товарищи доказывают свое упорство."
 GXC.earlygame.401.b: "Гоминьдан, безусловно, настойчив."

 GXC.earlygame.402.t: "Напряженность в Гуандуне"
 GXC.earlygame.402.d: "Гуандун долгое время был базой операций Гоминьдана, и его возвращение стало вехой в исправлении их неудачи сдержать немецкое вмешательство во время Северного похода. Однако разделить приз оказалось непросто. Даже в лучшие времена лидеры Гоминьдана редко ладили. Теперь, когда их общие враги мертвы или в бегах, партия быстро вернулась к распрям.\n\nГуанчжоу, столица провинции, была закреплена за Новой гуандунской кликой под руководством Чэнь Цзитана. Он использовал это, чтобы утвердиться в качестве номинального главы революционной хунты из трех человек. Чэнь Цзитан был относительно низкопоставленным офицером в старой 4-й армии, которому удалось выжить в провинциальном правительстве после 1927 года. Слабо связанный с правыми, его амбиции, как говорят, носят в основном региональный характер.\n\nЕго соперник — Чэнь Миншу, сослуживец-ветеран 4-й армии, отправленный на юг правительством Миньганя. Обосновавшись в Шаогуане на северо-востоке, Чэнь вступил в союз с крестьянскими активистами и сторонниками синдикалистов. Его готовность присоединиться к хунте вызвала некоторое презрение со стороны ортодоксальных левых, но тем не менее он является их лучшим шансом на захват власти в Гуандуне.\n\nДальше на юг Новая клика Гуанси оказалась еще более амбициозной, чем предполагалось ранее. Их силы продвинулись в Бэйхай, портовый город на юго-западе Гуандуна. Бэйхай слишком мал, чтобы существенно отвлечь торговлю от Жемчужной реки для не имеющей выхода к морю Гуанси, поэтому настоящей целью, похоже, является богатый ресурсами остров Цюнъя.\n\nЧэнь Цзитан умолял Ли оставить регион под контролем его сил — заявляя об их взаимном интересе в сдерживании социализма в двух провинциях. Он утверждает, что с любовью вспоминает их прошлое партнерство в обеспечении безопасности Гуанси, хотя и неясно высказывается о каких-либо деталях будущего пакта. Ли, только что прибывший в Гуанчжоу для участия в заседаниях, хорошо осознает власть в своих руках, хотя и не хочет отдавать такой мощный козырь бесплатно..."
 GXC.earlygame.402.a: "Генерал Ли уступает Цюнъя, чтобы укрепить союз с генералом Чэнем."
 GXC.earlygame.402.b: "Генерал Ли решает выждать, прежде чем сделать следующий шаг."

 GXC.earlygame.403.t: "Восстание Новой клики Гуанси"
 GXC.earlygame.403.d: "Новая клика Гуанси сформировалась, когда Старая клика Гуанси начала распадаться после разрушительных войн Юэ-Гуй 1920-х годов. Победа над Лу Жунтином дала им контроль над провинцией, и они сыграли важную роль во время Северного похода как 7-я армия НРА. С их триумфальным возвращением большинство кланов Гуанси с тех пор присягнули на верность.\n\nНовая клика Гуанси — это не та же самая клика, которая ушла на север в Ухань. Некогда региональная сила с небольшой собственной идеологией, последующее изгнание твердо переориентировало их идентичность. Новообретенные амбиции Ли Цзунжэня на национальное лидерство теперь в полной мере проявляются в его ярком присутствии в Гуанчжоу на собраниях хунты.\n\nВнутренне клика управляется как триумвират. Близкий друг Ли, генерал Бай Чунси (вместе их часто называют «Ли Бай» в честь знаменитого поэта династии Тан), разделяет его склонность действовать на национальной арене, часто выполняя военные роли и выступая в качестве посредника. Генерал Хуан Шаохун, третья нога триумвирата и недавно назначенный губернатор Гуанси, традиционно оставался в Гуанси для управления делами провинции, пока его союзники отсутствовали.\n\nЭта вторая итерация клики ставит гражданское ополчение в центр внимания, влияя почти на все их широкие политики. Генерал Хуан Сюйчу, восходящая звезда, взял на себя инициативу по оптимизации правительственных и военных органов в один «Объединенный правительственный офис», который обладает юрисдикцией по всем вопросам экономики, реконструкции и образования.\n\nЭта централизация партийной, военной и правительственной власти, возможно, естественным образом подходит для идеала партийного правления Гоминьдана, хотя некоторые беспокоятся, что в Гуанси партия поглощается нуждами милитаристов. Это, однако, не означает, что армия всегда имеет приоритет: Ли часто рекламирует свой успех в подчинении армии строго гражданской власти. Какова бы ни была правда, возвышение Хуана породило некоторые предположения, что триумвират вскоре станет квадрумвиратом."
 GXC.earlygame.403.a: "Хуан Сюйчу и его идеи действительно доказали свою состоятельность."
 GXC.earlygame.403.b: "Два Хуана соперничают за влияние, разделяя клику."

 GXC.earlygame.404.t: "Социалисты в Гуанчжоу"
 GXC.earlygame.404.d: "Гуанчжоу долгое время был очагом левой активности. С Гуандунской армией, серьезно ослабленной недавними потрясениями, и многими подразделениями, развернутыми за пределами города, чтобы противостоять людям Чэнь Миншу и попытаться обезопасить Цюнъя, некоторые полагают, что сам Гуанчжоу уязвим для дальнейшего проникновения. Местное отделение Китайской синдикалистской партии, возглавляемое знаменитым организатором рабочих Дэн Чжунся, профсоюзным активистом и старшим партийным лидером Су Чжаочжэном, а также лидером радикальных повстанцев Чжан Тайлэйем, вышло из подполья. Они обнаружили, что их ряды растут, легко вербуя промышленных рабочих, моряков и других трудящихся в свое дело.\n\nИх действия, как всегда не самые тонкие, быстро привлекли внимание Чэнь Цзитана. Подозрительный к их намерениям и уже опасающийся растущей угрозы левых для своего контроля над Гуандуном, он набросился на собраниях партии на Китайскую синдикалистскую партию. Он осудил их как иностранных агентов, лояльных в первую очередь Парижу и Лондону, и обвинил их в саботаже революции Гоминьдана посредством таких действий, как подрывное формирование Лиги китайских синдикалистов, насильственная забастовка Кантон-Гонконг (которая потопила отношения Гоминьдана с иностранными державами) и другие действия, которые, по его утверждению, высасывали силы движения доктора Суня в пользу глобальной социалистической повестки дня.\n\nЕго желание подавить социалистическую агитацию встретило некоторое сопротивление, даже в его лагере. Не все члены Гуандунской армии обязательно придерживаются правых взглядов, и возникли некоторые вопросы о лояльности его офицеров. Однако, поскольку вакуум власти в Гуанчжоу растет по мере того, как силы Гоминьдана зачищают свою бывшую оппозицию, вспыхнуло насилие, когда связанные с синдикалистами ополченцы нападают на бывших членов Торгового корпуса и Торговой палаты Гуанчжоу. Ненавидимые многими за их подчинение иностранным державам, это, тем не менее, вызвало обеспокоенность консервативных элементов тем, что Гуанчжоу несется к анархии."
 GXC.earlygame.404.a: "Чэнь Цзитан использует инцидент как предлог для разоружения синдикалистских ополчений."
 GXC.earlygame.404.b: "Дэн Чжунся и КСП используют момент, чтобы использовать националистические настроения."

 GXC.earlygame.405.t: "Московские изгнанники"
 GXC.earlygame.405.d: "В далекой стране группа китайских старейших государственных деятелей томится в изгнании. Этот правый Центральный комитет бездействует, удерживаемый вместе чистой силой воли Ху Ханьминя. Один из ближайших доверенных лиц Сунь Ятсена, он сменил Суня на посту Генералиссимуса. Однако после тайных встреч в Шаньтоу Ван Цзинвэя, Чан Кайши, Ляо Чжункайя и других Ху был быстро вынужден уйти в отставку в пользу «Национального правительственного совета», который заменил офис Генералиссимуса. Ван стал председателем, а Ху был понижен до министра иностранных дел (непризнанного правительства).\n\nХу, несмотря на свою поддержку реорганизации, был признан лидером правых, и многие призывали его выступить против «Синдикалистского вопроса». Планы решающей битвы на Четвертом пленуме приняли крутой оборот, когда Ляо Чжункай был застрелен офицером, связанным с братом Ху. Ху избежал прямой вины, но Пленум вскоре перерос в ожесточенный раскол партии.\n\nЧан Кайши и его центристская военная фракция выступили в поддержку Единого фронта, а Ху был сослан в Париж, «чтобы узнать больше о достоинствах синдикализма». Тем временем, с победой Британской революции и отсутствием видимого разрешения противостояния, многие правые бежали в пригород Пекина Сишань (Западные холмы), надеясь заручиться поддержкой Гоминьцзюнь. Эти члены, включая восемь членов центрального комитета, быстро радикализировались и были исключены из партии. Ху, долго не желавший идти против партийной ортодоксии, увидел знамение на стене и переметнулся в Москву.\n\nФэн Юйсян позже был вытеснен из Пекина, и многие из этой «Конференции Сишань» присоединились к Ху в России, играя незначительную роль в Северном походе. Чэнь Цзитан вдохнул в них новую надежду, начав переговоры об обеспечении их возвращения в Гуанчжоу. Но Ху Ханьминь, всегда гордый, не намерен губить наследие Суня, становясь марионеткой мелкого милитариста. Он сделал камнем преткновения переговоры о правительственных постах, конституционном правлении и других требованиях."
 GXC.earlygame.405.a: "Переговоры заходят в тупик, так как Чэнь Цзитан стоит на своем."
 GXC.earlygame.405.b: "Чэнь Цзитан «милостиво принимает»... пока что."

 ##KMT Early Game Political Tree Events (430-459)
 GXC.earlygame.430.t: "Установка партийной линии"
 GXC.earlygame.430.d: "Сунь Ятсен однажды посетовал на партийном собрании 1923 года в Гуандуне, что «во время возвращения Китая [от маньчжурского к ханьскому правлению] было ложное высказывание, что "революционная партия должна быть распущена в тот самый момент, когда революционная армия успешно восстанет". Эта идея приписывалась некоему бюрократу, который с энтузиазмом поддерживал революцию, и повторялась членами партии, такими как Хуан Син, Сун Цзяожэнь и Чжан Тайянь. В то время это воспринималось как прописная истина. После того, как Тунмэнхой был реорганизован в Гоминьдан, партия была полностью преобразована в политическую партию и истощена революционным духом».\n\nДля доктора Суня провал первой революции произошел из-за решения партии сложить оружие и пойти на компромисс с армией Бэйяна, не осознавая, что старый истеблишмент должен быть сначала полностью демонтирован. Те, кто стремился к компромиссу с милитаристами, были обречены; либо убиты, либо стали неактуальными. С другой стороны, партийное правление не могло быть просто вопросом захвата государства, действия в качестве нового класса бюрократов. Партия должна взять на себя «пророческую» роль, обращая людей в истину Трех принципов подобно революционному евангелию.\n\nНо с уходом Вечного премьера партии его паства сбилась с пути. Недавно воссозданный Отдел пропаганды был реформирован в надежде распространить благую революционную весть в народе. Но точное послание, которое мы должны посылать, запутано в многослойной идентичности Гоминьдана. Партия имела свои корни как широкая либерально-демократическая партия в начале 1900-х вплоть до 1910-х годов. Она двинулась в более левом, авангардистском направлении после реорганизации 1924 года, обещая полную революцию и дисциплину. Возможно, партию во всех ее итерациях объединяет ее непоколебимый китайский национализм, призывающий своих верных спасти раздробленную землю и отбить иностранный империализм."
 GXC.earlygame.430.a: "Мы призываем к возвращению к нашим более идеалистическим, демократическим корням из лучших времен."
 GXC.earlygame.430.b: "Мы обещаем революцию, чтобы исцелить раны Китая в самом его основании."
 GXC.earlygame.430.c: "Мы клянемся спасти нацию от всех врагов дома и за рубежом — любыми необходимыми средствами!"

 GXC.earlygame.431.t: "Интеллигенция Гуандуна"
 GXC.earlygame.431.d: "В попытке представить более демократическое лицо, противопоставить себя железному правлению Бэйяна и укротить республиканский очаг, которым был Гуанчжоу 1920-х годов, предыдущие кантонские милитаристы сохраняли определенную степень политической свободы в городе. Хотя и не такая яркая, как когда-то, множество республиканцев, разочарованных циничной реакцией, обосновались в Гуанчжоу или Гонконге. Последний был особенно привлекателен для демократических изгнанников, бегущих от закона.\n\nВеликий республиканский альянс, который стремился сплотить многих из этих деятелей, с тех пор распался. Его составные организации, включая Партию общественных интересов Чэнь Цзюнмина, связанную со Старой Гуандунской армией, и широкую Китайскую демократическую лигу Чжан Цзюньмая, рассеялись в свете наступления Гоминьдана.\n\nХотя бегство их высшего руководства было, возможно, неизбежным, оставшиеся в Гуанчжоу рядовые республиканцы испытывают беспокойство. Хотя мы разделяем мечту о республике, далекой от декаданса Бэйяна, многие опасаются авторитаризма Гоминьдана и боятся репрессий нашей тайной полиции. Федералисты, связанные с Чэнь Цзюнмином, помнят ожесточенные бои между Чэнем и доктором Сунем, и многие планируют присоединиться к бегству Чэня в посольства. Более богатые интеллектуалы, многие из которых связаны с Лигой, возмущены тяжелым налогообложением военного времени, вводимым партией, заявляя, что мы еще более вымогательские и недемократичные, чем милитаристы.\n\nЭто не значит, что слишком поздно вернуть их. Более умеренные фракции в Гоминьдане, а именно Фракция реконструкции и Клика Сишань, менее склонны к долгосрочному авангардизму. Умеренные левые, такие как Чэнь Миншу, выразили открытость к диалогу с более честными республиканцами, надеясь превратить их идеализм в действие. Все же, как однажды предупреждал доктор Сунь, «знать трудно, делать легко». Некоторые из этих людей предпочли бы упрямо дебатировать, пока нация горит, в конечном итоге спасать нацию предстоит нам."
 GXC.earlygame.431.a: "Мы должны убедить их, что вместе мы можем реализовать обещание Синьхая!"
 GXC.earlygame.431.b: "Интеллектуальный дискурс — это хорошо, но они должны знать свое место."
 GXC.earlygame.431.c: "Вышвырните их. Предателям и мечтателям здесь больше не место."

 #Wang Zuoxin (王作新), Lin Douwen (林斗文), Qiu Jingyun (丘景云) - All very obscure.
 GXC.earlygame.432.t: "Борьба с шэньши"
 GXC.earlygame.432.d.rkmt: "У Гоминьдана долгое время были непростые отношения с местными элитами, которые боятся обещанных Гоминьданом далеко идущих реформ и революционного, авторитарного поворота партии. Шэньши, в частности, чувствуют угрозу от альянсов партии с различными крестьянскими группами и их долгожданных клятв об обширной земельной реформе. Это мучило как правое, так и левое крыло партии, которые часто оказывались в противоречии с шэньши, даже когда заключались и разрывались случайные союзы.\n\nПоследнее воплощение правления Гоминьдана в Лянгуане предприняло еще один толчок, чтобы утвердить власть над аграрными элитами, на этот раз нацелившись на их различные ополчения. Сформированный частично для поддержания общественного порядка перед лицом растущих волнений, «Корпус безопасности», организованный через Гуандунскую ассоциацию поддержки зерновой промышленности, действовал как рука земельных интересов.\n\nГубернатор Чэнь Цзитан стремился лишить местных шэньши возможности сопротивляться его правлению, принудительно распуская некоторые из этих «команд безопасности» и интегрируя другие. Он приказал предложить новые учебные курсы в Военно-политической академии для подготовки «лояльных» охранников, что является частью его усилий по созданию всеобъемлющей провинциальной жандармерии, преданной партии (и, что более важно, ему самому).\n\nПосле долгой кампании, похоже, АПЗП (GIMA) готова уступить; делегация, включающая их председателя Цю Цзинъюня, его заместителя Ван Цзосиня и командира корпуса безопасности Линь Доувэнь, прибыла в особняк губернатора для переговоров о плане разоружения. Однако их «капитуляция» вряд ли безоговорочна, они ожидают, что мы «защитим их право на жизнь и собственность», и ожидают некоторого права голоса в окончательной реализации земельной реформы, прецедент, который, вероятно, будет иметь далеко идущие последствия в будущем. Тем не менее, заключение мира с шэньши — тоже не худшая идея, они обеспечивают полезный противовес социалистическим элементам, и, будучи усмиренными, освободят войска для фронта."
 GXC.earlygame.432.d.lkmt: "У Гоминьдана долгое время были непростые отношения с местными элитами, которые боятся обещанных Гоминьданом далеко идущих реформ и революционного, авторитарного поворота партии. Шэньши, в частности, чувствуют угрозу от альянсов партии с различными крестьянскими группами и их долгожданных клятв об обширной земельной реформе. Это мучило как правое, так и левое крыло партии, которые часто оказывались в противоречии с шэньши, даже когда заключались и разрывались случайные союзы.\n\nПоследнее воплощение правления Гоминьдана в Лянгуане предприняло еще один толчок, чтобы утвердить власть над аграрными элитами, на этот раз нацелившись на их различные ополчения. Сформированный частично для поддержания общественного порядка перед лицом растущих волнений, «Корпус безопасности», организованный через Гуандунскую ассоциацию поддержки зерновой промышленности, действовал как рука земельных интересов.\n\nГубернатор [ROOT.GetLeader] стремился лишить местных шэньши возможности сопротивляться его правлению, принудительно распуская некоторые из этих «команд безопасности» и интегрируя другие. Радикальные крестьянские ополчения с готовностью заполнили пустоту, разбивая поместья, считающиеся «буржуазными», и жестоко подавляя попытки их остановить. Они пошли даже дальше, чем магистраты, посланные для проведения политики перераспределения земли, заслужив как восхищение, так и ненависть.\n\nПосле долгой кампании, похоже, АПЗП находится на грани краха. Тем не менее, насилие не показывает признаков прекращения, и многие призывают к сдержанности со стороны нового правительства. Сообщения о нападениях на мелких и средних землевладельцев, связанных с Гоминьданом, вызвали серьезные расколы в партийном контроле над сельской местностью, и, как говорят, в ответ организуются более умеренные левые ополчения. Тем не менее, более радикальные элементы призывают не прекращать кампанию до тех пор, пока власть шэньши не будет полностью и безвозвратно сломлена, иначе они восстановятся и вызовут дальнейшие проблемы в будущем."
 GXC.earlygame.432.a: "[ROOT.GetLeader] принимает эти условия, чтобы предотвратить сельскую анархию."
 GXC.earlygame.432.b: "[ROOT.GetLeader] не успокоится, пока шэньши не будут приведены к покорности."

 GXC.earlygame.433.t: "«Двунаганный» Коэн"
 GXC.earlygame.433.d: "Хотя наши связи с Сунь Фо и его «Гавайской кликой» часто были напряженными, многие из них имеют давние связи с Гуандуном и корыстный интерес в благополучии Гоминьдана в провинции. Наши усилия по ухаживанию за ними, и, что более важно, их обширные связи в китайских диаспорах в Юго-Восточной Азии, принесли некоторые плоды в последнее время.\n\nСоратник Сунь Фо прибыл на встречу с [ROOT.GetLeader] и другими кантонскими чиновниками. Моррис Абрахам Коэн был искателем приключений всю жизнь. Бывший телохранитель Сунь Ятсена, он родился в ортодоксальной еврейской семье в Польше, прежде чем иммигрировать в Англию. Ребенком-карманником его отправили в Канаду для (безуспешного) исправления, где он подружился с китайскими иммигрантами, работавшими на Канадской тихоокеанской железной дороге. Один из немногих белых людей, готовых общаться с китайскими рабочими, ему разрешили вступить в Тунмэнхой после того, как он защитил китайского ресторатора от ограбления.\n\nПосле периода помощи китайским иммигрантам в натурализации он сражался в Великой войне. Окончание конфликта оставило его без работы в условиях экономического спада, поэтому он отправился в Китай, чтобы помочь заключить железнодорожную сделку для Сунь Ятсена. Мужчины сблизились, чему способствовало знание английского многими из круга Суня. Адъютант и действующий полковник в армии Сунь Ятсена, он помогал обучать революционных солдат.\n\nОн стал объектом восхищения после того, как был задет пулей во время боя, что заставило его носить второй револьвер из страха, что он может потерять руку в будущем. Амбидекстр, это дало повод для его прозвища «Двунаганный Коэн» (Two-Gun Cohen). Он искал работу в наших армиях, предлагая свои услуги в качестве наемного инструктора. Хотя его китайский плох, у него есть доказанная история с партией и связи, включая видных членов расширенной семьи Сунь, таких как Сунь Фо, Сун Цзывэнь и Сун Цинлин. Все же, он стареет, и у партии достаточно опытных солдат. Мало кто осудит нас, если мы откажем ему."
 GXC.earlygame.433.a: "Пусть он послужит нам так же хорошо, как и Суню."
 GXC.earlygame.433.b: "Извините, но у нас достаточно людей на зарплате."

 GXC.earlygame.434.t: "Обязательное образование для взрослых в Гуанси"
 GXC.earlygame.434.d: "«С какой точки зрения ни посмотри, ополчение Гуанси и образование взрослых неразрывно связаны». Это проницательное наблюдение, подкрепленное недавним заявлением Бай Чунси о том, что «ополчение и образование были объединены в одно» Новой кликой Гуанси, подчеркивает, насколько фундаментально связана реализация Новой кликой Гуанси политической опеки с их мечтами об обществе, неразрывно связанном с его гражданином-ополченцем.\n\nВ то время как широкий Гоминьдан всегда продвигал образование как одну из своих основных социальных политик, а искоренение неграмотности долгое время было целью националистов, интеллектуалов и реформистов, Новая клика Гуанси пошла еще дальше в своих усилиях по перестройке своей родной провинции. Ночью начальная школа деревни или квартала должна стать центром образования для взрослых. Учителя были набраны из школьного факультета, старейшин деревни, студентов университетов на каникулах и даже примерных учеников начальной школы (названная «система маленьких учителей»).\n\nЦели этих программ четырехкратны: во-первых, конец взрослой неграмотности, во-вторых, продвижение патриотизма и подготовка ополчения. Более того, в соответствии с политическими идеалами Гоминьдана, Новая клика Гуанси стремится укрепить народный интерес к местному самоуправлению. Образование для взрослых теперь стало обязательным, причем все начальные школы обязаны зачислить половину взрослых, юридически обязанных посещать занятия в этом году, и ожидается полное посещение в следующем.\n\nВнедрение, конечно, не было полностью гладким — учителя начальных школ не получают дополнительной компенсации за преподавание вечерних классов, и хотя учебники должны оплачиваться бесплатно, с деньгами всегда туго. Действительно, компромиссы уже были сделаны. Семестры изначально были фиксированы на шесть месяцев, но теперь многие сократили их до пяти, чтобы приспособить расписание. Также есть предложение разрешить взрослым студентам бросать одну программу и продолжать в более поздней по мере необходимости. Тем не менее, темп изменений кажется непрерывным."
 GXC.earlygame.434.a: "Немного гибкости поможет сгладить ситуацию."
 GXC.earlygame.434.b: "Мы должны прививать дисциплину и культивировать обучение."

 ##KMT Leftist Coup Events
 GXC.earlygame.460.t: "Битва за Кантон начинается"
 GXC.earlygame.460.d: "Чэнь Миншу был отправлен на юг в начале восстания Миньгань в слабой надежде, что, взбудоражив крестьян и рабочих, он сможет создать отвлекающий маневр, который помешает милитаристам Лянгуана ударить нам в тыл, пока мы уязвимы. Он преуспел сверх всяких ожиданий, захватив то, что мы считали хорошо подготовленной обороной в северном Гуандуне, и установив контакты по всей провинции.\n\nНо победа таит в себе опасности. Старое сердце Гоминьдана было в Гуандуне, и с войсками Чэнь Миншу на марше многие старые левые ячейки активизировались. Это создало раздор между Чэнем и различными другими якобы «гоминьдановскими» генералами, которые вырезали свои собственные владения в двух Гуанах. Многие из них по натуре правые, подозрительно относящиеся к нашему центральному комитету и ищущие личной выгоды вместо революции.\n\nОдин из этих людей, генерал Чэнь Цзитан, появился в южном Гуандуне, сидя в старой базе Сунь Ятсена Гуанчжоу (Кантоне). Заручившись лояльностью старой Гуандунской армии, мы получили тревожные сообщения о том, что он контактирует с нашим старым соперником Ху Ханьминем, чей Московский комитет долгое время списывали со счетов как увядшую оболочку в изгнании. Если ему позволят вернуться в Китай, он вполне может развратить многих из слабеющих гражданских правых в нашей партии в свое предательское дело.\n\nДобавляя опасности, всегда были сомнения в личной преданности Чэнь Миншу. Он и его 10-я дивизия известны своей неортодоксальностью в убеждениях, решительно левые, но часто идущие вразрез с Временным комитетом действий и АТР. Многие другие левые фракции в Гуандуне стали подозрительными и ожесточенными по отношению к мейнстриму партии. Но тем не менее, Лянгуан — ценный приз. Тот, который мы не можем позволить себе потерять, находясь так близко к нашей хватке."
 GXC.earlygame.460.a: "Мы должны победить! Развернуть подкрепления!"
 GXC.earlygame.460.b: "Генерал Чэнь держит ситуацию под контролем..."

 GXC.earlygame.461.t: "Конкурирующий комитет в Кантоне"
 GXC.earlygame.461.d.YUN: "Несмотря на все наши усилия, Гуанчжоу пал перед силами, связанными с так называемым «Правым крылом Гоминьдана», оскверняя наследие доктора Суня в процессе. Отколовшееся командование Национально-революционной армии бежало в Гуйчжоу после краха Северного похода, выживая за счет коррупции и мелкого бандитизма, злоупотребляя добрым именем Гоминьдана. Они стали немногим больше, чем мелкие милитаристы, однако, несмотря на это, они каким-то образом смогли захватить существующие силы в Лянгуане.\n\nРаны 1925 года снова открылись. Хотя Чан Кайши из военного центра мертв, его союзники в лице Хэ Инциня и Дай Цзитао сумели восстановить его коалицию «Новых правых», чтобы обойти «Старых правых» под руководством Ху Ханьминя. С грубым военным биением в грудь генерала Хэ и извращенной, реакционной ложью Дай Цзитао им удалось использовать контроль над городом, чтобы подкрепить свои претензии на формирование нового правительства для борьбы за национальное лидерство.\n\nПоследствия уже ощущаются в [CHI.Capital.GetCapitalVictoryPointName], многие, якобы находящиеся в нашем лагере, начинают перебегать в Гуанчжоу. Война между левым и правым комитетами партии надвигается. Некоторые, как Сунь Фо, тщетно призывали примирить два крыла. Другие, как двуличный Чэнь Миншу, остаются в стороне, ожидая, какая сторона окажется сильнее. Но если что-то не изменится в ближайшее время, грядет финальная схватка за наследие доктора Суня."
 GXC.earlygame.461.d.GXC: "Несмотря на все наши усилия, Чэнь Миншу и его люди не смогли вытеснить Чэнь Цзитана до того, как он смог сделать свой грандиозный ход. Обойдя левых Гуандуна и при молчаливом согласии милитаристов Гуанси, Чэнь Цзитан успешно заключил соглашение с Ху Ханьминем. Ложный председатель вернулся в Кантон, оскверняя наследие доктора Суня. С ним возвращается отряд сенильных старейшин партии, бесстыдных подхалимов и русских наемников, наследие «Старых правых» партии. Раны 1925 года открылись снова. С мертвым Чан Кайши из военного центра, кажется, что выжившие двое из триумвирата вернулись, чтобы снова разделить партию между собой.\n\nРаздвоенным языком и пламенными словами Ху Ханьминь распространяет свой обман по всей земле. Он уже начал использовать свой контроль над Гуанчжоу, чтобы подкрепить свои претензии на формирование нового правительства для борьбы за национальное лидерство. Последствия уже ощущаются в [CHI.Capital.GetCapitalVictoryPointName], многие, якобы находящиеся в нашем лагере, начинают перебегать в Гуанчжоу.\n\nВойна между левым и правым комитетами партии надвигается. Некоторые, как Сунь Фо, тщетно призывали примирить два крыла. Другие, как двуличный Чэнь Миншу, остаются в стороне, ожидая, какая сторона окажется сильнее. Но если что-то не изменится в ближайшее время, грядет финальная схватка за наследие доктора Суня."
 GXC.earlygame.461.a: "Предатели возвращаются..."

 GXC.earlygame.462.t: "Переворот Новой 4-й армии"
 GXC.earlygame.462.d.CHI_initated: "После месяцев напряжения, неопределенности и колеблющихся линий фронта приказ наконец пришел. В зашифрованной телеграмме, доставленной из Комиссии по военным делам в [CHI.Capital.GetCapitalVictoryPointName], подписанной самим председателем Ваном от имени Центрального исполнительного комитета, Чэнь Миншу была поручена торжественная задача восстановления законного Гоминьдана в его старой базе в Гуандуне.\n\n$GXC.earlygame.462.shared$"
 GXC.earlygame.462.d.GXC_initated: "После месяцев напряжения, неопределенности и колеблющихся линий фронта приказ наконец пришел. Воодушевленный своей растущей силой и устав ждать вялого или, возможно, чрезмерно осторожного руководства в [CHI.Capital.GetCapitalVictoryPointName], Чэнь Миншу обратился к своим офицерам в своем штабе в Шаогуане, призывая их взять на себя торжественную задачу восстановления законного Гоминьдана в его старой базе в Гуандуне.\n\n$GXC.earlygame.462.shared$"
 GXC.earlygame.462.shared: "Последующее нападение было быстрым и хорошо скоординированным, гармонизируя разрозненные силы лоялистов [CHI.Capital.GetCapitalVictoryPointName] вместе в элегантной симфонии. Чэнь Миншу и его Четвертая армия, с 10-й дивизией в качестве ядра, двинулись на юг прямо к Гуанчжоу, смелый ход, который без всякого сомнения сигнализировал всем, что это вопрос жизни и смерти. Их оппозиция, выстроенная в казалось бы непроницаемые оборонительные линии, испарилась почти за одну ночь — недели стычек, мятежей и дезертирства истощили их силы.\n\nЛюди Чэнь Миншу, со своей стороны, казалось, хорошо знали маршрут. Хорошо размещенные шпионы и усердная разведка сорвали большинство ловушек и засад на маршруте, не давая им увязнуть. Поскольку отступление Гуандунской армии превратилось в бегство, многие их подразделения забили дороги и были уничтожены быстро наступающей Четвертой армией. Сам Гуанчжоу пал без осады, крупная всеобщая забастовка переросла в городские беспорядки, что позволило людям Чэнь Миншу штурмовать город с небольшим боем.\n\nЧэнь Цзитан и его оставшиеся лоялисты, отпрянув в полном шоке и недоверии, бежали на юг в Цюнъя. С аналогичными восстаниями, вспыхнувшими на острове, ситуация в Гуандуне кажется несостоятельной для правых. Он отправил отчаянные телеграммы Ли Цзунжэню и Новой клике Гуанси, предлагая большую долю власти за его вмешательство, но с ситуацией, казалось бы, давно упущенной, кажется, что Ли более склонен вести переговоры с левыми."
 GXC.earlygame.462.a: "Ли выступает!"
 GXC.earlygame.462.b: "Ли подчиняется реальности."

 GXC.earlygame.463.t: "Гамбит Чэнь Миншу провалился"
 GXC.earlygame.463.d: "Говорят, у победы тысяча отцов, а поражение — сирота. Однако иногда ситуация не столь однозначна. Наступление Новой 4-й армии началось мощно, 10-я дивизия шла в авангарде прямого марша на Гуанчжоу. Сопротивление Гуандунской армии Чэнь Цзитана было неэффективным, и Гуанчжоу пал после того, как крупная всеобщая забастовка позволила Четвертой армии штурмовать город.\n\nНо на этом успехи закончились. Чэнь Миншу возлагал надежды на то, чтобы заставить Ли Цзунжэня и Новую клику Гуанси принять захват власти левыми как свершившийся факт, молча стоять в стороне, пока он захватывает Гуандун, прежде чем принудить его к подчинению. Но упрямый милитарист отказался уступить, вмешавшись со своими силами в яростной попытке отбить наступление Чэнь Миншу. Чэнь Цзитан и его группа оставшихся лоялистов бежали на юг, сплотившись к югу от Жемчужной реки в Тайшане.\n\nПоскольку сопротивление правых оказалось намного выше ожидаемого, а обещанная Чэнь Миншу быстрая кампания застопорилась, Четвертая армия начала колебаться. Ясно, что они неправильно оценили политический климат и растянули свои линии, и нам нужно вмешаться напрямую, если мы хотим их спасти.\n\nУже начался раунд взаимных обвинений: Чэнь Миншу яростно обвиняет свое начальство в [CHI.Capital.GetCapitalVictoryPointName] в том, что они дали ему преждевременные приказы наступать. [CHI.GetLeader] и его офицеры, в свою очередь, обвиняют Чэня в предоставлении чрезмерно оптимистичных отчетов о ситуации в Гуандуне, рисуя его как ненадежного охотника за славой.\n\nКак бы то ни было, путаница приказов из Нанкина в Шаогуань должна прекратиться, и Комиссия по военным делам должна взять прямой контроль над Четвертой армией. Импульс может быть все еще на нашей стороне, но люди Гуанси известны как свирепые бойцы, и мы сталкиваемся с пугающей перспективой увязнуть в холмах Гуанси. Было выдвинуто неудобное предложение отступить и перегруппировать наши силы, хотя многие другие предлагают нам сражаться за наш дом."
 GXC.earlygame.463.a: "Мы должны нанести удар немедленно!"
 GXC.earlygame.463.b: "Приказать Чэнь Миншу и его людям отступить."

 GXC.earlygame.464.t: "Переворот Чэнь Миншу удался!"
 GXC.earlygame.464.d: "Операция была быстрой, синхронизированной и почти хирургической по своей эффективности. После месяцев напряжения, неопределенности и колеблющихся линий фронта Битва за Кантон пришла к ошеломляющему концу. Чэнь Миншу и Четвертая армия двинулись на юг к Гуанчжоу, его 10-я дивизия была в авангарде, смело бросая вызов Гуандунской армии.\n\nГамбит оправдался. Чэнь Цзитан и его люди, самоуверенные в своих подготовленных оборонительных сооружениях, расслабились, когда крестьянские ополчения начали захватывать сельские деревни и поселения. Лазутчики в их армии создали постоянный поток дезертирства и сеть шпионов, в то время как стычки прощупывали их линии на предмет слабых мест и изматывали боевой дух. К тому времени, когда авангард Четвертой армии достиг линий Гуандуна, их враги уже были бумажным тигром.\n\nСам Гуанчжоу показал свое истинное лицо, когда скоординированная всеобщая забастовка парализовала оборону города, избежав длительной осады. Флотилия канонерок под руководством адмирала Чэнь Цэ усилила порт, когда люди Чэнь Миншу соединились с его союзной пятой колонной. «Кантонский переворот», как его окрестили в прессе, решил судьбу Гуандуна в нашу пользу. Последний кусок встал на место, когда Ли Цзунжэнь, де-факто представитель Новой клики милитаристов Гуанси, решил подчиниться власти [CHI.GetLeader] в обмен на признание губернатором соседней (и не имеющей выхода к морю) Гуанси.\n\nПока мы празднуем эту великую победу, в ЦИК возникли некоторые опасения. Чэнь Миншу и его последователи известны своей неортодоксальностью во взглядах, не всегда идущей в ногу с партией. Хотя мы празднуем его достижение, и все улыбались, когда [CHI.GetLeader] официально назначил его губернатором Гуандуна, мы рискуем формированием внутри партии конкурирующего полюса, независимого от политики [CHI.Capital.GetCapitalVictoryPointName]. Уже некоторые члены ВКД во главе с Тань Пиншанем начали мигрировать на юг, в то время как местные левые продолжают заявлять о лояльности своему руководству."
 GXC.earlygame.464.a: "Гоминьдан возвращается в Кантон."
 GXC.earlygame.464.b: "Мы возвращаемся домой. (Переключиться на Лянгуан)"

 GXC.earlygame.465.t: "Крестьяне сплачиваются в Гуандуне"
 GXC.earlygame.465.d: "Давно принято, что доля крестьянина в жизни — трудиться на полях от зари до зари, но времена меняются. Все больше разочаровываясь в социальном порядке Китая, многие подпали под влияние харизматичных ораторов, которые выступают против помещиков и милитаристов. Их последней мишенью для оскорблений стал не кто иной, как Чэнь Цзитан и его кооперативные инициативы, которые, по их утверждению, представляют худшее из лицемерия правых Гоминьдана и пустых обещаний.\n\nВозглавляемая Пэн Паем, Ассоциация фермеров провинции Гуандун сплотила угнетенных крестьян. Они путешествуют по провинции, ускользая от сил безопасности Гуандунской армии и поддерживаемого шэньши ополчения, играя музыку и песни через граммофон, чтобы настроить людей против воспринимаемой несправедливости.\n\nЕго усилия по разжиганию беспорядков, обычно относительно сдержанные, несмотря на его грандиозные обещания, в последнее время приняли гораздо более воинственный, решительный тон. Несомненно, он восстановил связь с комитетом Гоминьдана в [CHI.Capital.GetCapitalVictoryPointName] и использует их ресурсы в своих интересах. Его усилия разожгли сельское восстание. Сельские партизанские отряды начали наносить удары по изолированным подразделениям безопасности и проникать на посты охраны. Шэньши сообщают о похищениях и убийствах в своих рядах, а в некоторых случаях были захвачены целые деревни и сожжены документы на право собственности.\n\nЭта борьба, часто далеко за линией фронта противостояния Четвертой армии и Гуандунской армии, представляет собой еще одно измерение Битвы за Кантон. Во многих районах местные полицейские силы не могут сдержать повстанцев, и вера в способность Чэнь Цзитана управлять падает. Но отвлечь его ограниченные силы тоже непростая задача. Многие офицеры решили спрятаться в укрепленных деревнях и лагерях, а не противостоять революционерам, оставив обширную сельскую местность повстанцам. Чтобы заставить их выйти на борьбу с передвижением врага, потребуется прямое, силовое управление."
 GXC.earlygame.465.a: "Чэнь Цзитан вынужден отвести свои силы в свои опорные пункты."
 GXC.earlygame.465.b: "Чэнь Цзитан чувствует себя достаточно уверенно, чтобы начать зачистку сельской местности."

 GXC.earlygame.466.t: "Синдикалистская агитация в Гуанчжоу"
 GXC.earlygame.466.d: "Китайская синдикалистская партия всегда была проблемой. Сформированная социалистами, недовольными Гоминьданом и так и не решившими, «в» они или «вне» национальной революции, их суровое подавление после провала Северного похода было в некотором роде поэтической справедливостью за их регулярное самосаботажное увлечение радикализмом. Когда Гоминьдан пал из-за преждевременных провокаций синдикалистов против иностранных держав, КСП была уничтожена вместе с ними.\n\nИ все же, как и Гоминьдан, похоже, они пережили последнее десятилетие, к большому огорчению Чэнь Цзитана. Протащив различных агитаторов, без сомнения, с помощью и по указанию [CHI.Capital.GetCapitalVictoryPointName], различные рабочие ушли со своих рабочих мест на кантонских фабриках и верфях. Они призвали к повышению заработной платы, рабочему контролю над промышленностью и объединению с левым Центральным комитетом Гоминьдана.\n\nХотя забастовка, безусловно, работала в интересах Чэнь Миншу, она была спровоцирована и продолжает возглавляться в основном офицерами КСП, включая давних активистов Дэн Чжунся, Чжан Тайлэй и Су Чжаочжэн. Они были усилены агентами фракции Временного комитета действий (ВКД), возможно, наиболее заметно неким Е Цзяньином. Прибытие офицеров Миньганя в город вызывает особую озабоченность. Сообщается, что вооруженные рабочие ополчения угрожают полиции, штрейкбрехерам и скэбам, даже если забастовщики еще не достаточно смелы, чтобы напрямую бросить вызов армии.\n\nПоскольку производство застопорилось, прибыли падают, а нестабильность сотрясает город, союзники призвали Чэнь Цзитана принять меры до того, как забастовка разрастется. Но поскольку ситуация не подает признаков смягчения, его возможности могут быть ограничены."
 GXC.earlygame.466.a: "У Чэня мало выбора, кроме как закрыть заводы и переждать."
 GXC.earlygame.466.b: "У Чэня есть средства, чтобы предложить некоторые уступки для укрощения рабочих."

 GXC.earlygame.467.t: "Интеллектуалы-республиканцы призывают к единству!"
 GXC.earlygame.467.d: "Интеллектуалы — глупая кучка, упрямая и высокомерная в своем предполагаемом моральном превосходстве, но быстрая на смену стороны, как только подует ветер. Последним cause célèbre (знаменитым делом) этих самодовольных дилетантов, похоже, является «Республиканское единство» между [GXC.Capital.GetCapitalVictoryPointName] и [CHI.Capital.GetCapitalVictoryPointName] во имя «спасения Синьхайской революции».\n\nЭтот последний раунд кабинетного активизма был спровоцирован прибытием делегации во главе с У Чаошу и Лян Ханьцао, двумя ведущими членами «Фракции реконструкции». У Чаошу, часто известный как «Си-Си Ву», — пожилой революционер из выдающейся кантонской семьи с довольно обширными связями в Юго-Восточной Азии. Лян Ханьцао моложе, протеже Сунь Фо и восходящая звезда среди либералов Гоминьдана. К ним присоединился Хуан Ханьлян, еще один банкир и интеллектуал с западным образованием, который пробовал свои силы в (плохо скрываемых) усилиях наладить связи с кантонским бизнес-сообществом.\n\nИх хозяин, Сунь Фо, является сыном доктора Сунь Ятсена и поборником либерального крыла партии. Хотя он не присутствует лично, его влияние ощущается. Хорошо известно, что он стремится стать посредником в воссоединении правого и левого крыльев партии, что, по его мнению, возвысит его до председательства в партии.\n\nМладший Сунь, который заседает в Центральном исполнительном комитете в [CHI.Capital.GetCapitalVictoryPointName], в последние дни все чаще появляется в прессе, и, похоже, он приложил руку к сокращению политических нападок на правых членов хунты Лянгуана. Но Чэнь Цзитан не наивен. Ясно, что Сунь — всего лишь самообманывающаяся пешка, и любое проявление умеренности — это всего лишь игра проницательного Председателя Вана и его дружков-социалистов. Все же, похоже, что многие купились на этот фарс, и заставить их понять, что их одурачили, будет непростой задачей."
 GXC.earlygame.467.a: "Предложить символические жесты солидарности."
 GXC.earlygame.467.b: "Цензурировать их публикации!"

 GXC.earlygame.468.t: "Прибывают подкрепления Четвертой армии"
 GXC.earlygame.468.d: "С момента очевидной победы Гоминьдана в Лянгуане две кантонские армии противостояли друг другу в северном Гуандуне. Роя траншеи и строя наспех сооруженные бункеры, армии двух генералов Чэней пытались укрепить свои позиции, одновременно дестабилизируя своих соперников. Эти усилия были сорваны реалиями ситуации: ни у одной армии нет численности, чтобы покрыть всю провинцию, ни дисциплины, чтобы помешать солдатам приходить и уходить, когда им вздумается. Тот факт, что оба якобы должны быть союзниками в рамках общей временной хунты, еще больше усложняет ситуацию, но вряд ли мешает патрулям вступать в смертельные столкновения.\n\nБаланс сил в регионе колебался, и конца этому не видно. Надеясь склонить чашу весов в свою пользу, [CHI.Capital.GetCapitalVictoryPointName] санкционировал развертывание еще одного легиона для усиления Чэнь Миншу и его Четвертой армии. Они в значительной степени отказались от секретности в этом шаге, предпочитая сделать свое пропагандируемое присутствие известным, поскольку опасения по поводу бесполезного, затяжного тупика подрывали моральный дух с обеих сторон.\n\nЧетвертая армия хвастается, что этот последний отряд включает в себя многих ветеранов успешного восстания Миньгань, хотя более опытные командиры отмечают, что, хотя эти люди, возможно, были успешными партизанами (если заявления верны), это не всегда хорошо переносится на полевые, конвенциональные сражения. Командиры из Гуандунской армии посоветовали Чэнь Цзитану подорвать нарратив Четвертой армии о неизбежной победе, начав серию прощупывающих атак вдоль линии фронта, показывая, что ситуация вряд ли изменится в ближайшем будущем. Но есть ли у нас резервы для такой операции, остается под сомнением."
 GXC.earlygame.468.a: "Армия Чэнь Миншу продолжает разрастаться..."
 GXC.earlygame.468.b: "Чэнь Цзитан приказывает провести прощупывающие атаки вдоль фронта."

###- Section 2d (600-799): Early Game UPC Political Events -###
 GXC.earlygame.600.t: "Федералисты захватывают Лянгуан"
 GXC.earlygame.600.d: "Вопреки многим сомнениям, слухи о кончине Федералистов оказались преувеличенными. Чэнь Цзюнмин сплотил разрозненные силы милитаристов правительства Гуанчжоу, несмотря на прохладную поддержку городского истеблишмента, и преодолел милитаристов Гуанси и повстанцев Гоминьдана, чтобы восстановить порядок не только в своем родном Гуандуне, но и в Гуанси. За свои усилия он был вознагражден властью над двумя провинциями и шансом реализовать свою старую мечту о федеративном Китае.\n\nЕго сторонники в Гуандуне в восторге, даже если есть вопросы о том, что будет дальше. Чэнь может рассчитывать на поддержку широкой базы, включающей его лоялистов в Армии Юэ и Партии общественных интересов, шэньши и торговую элиту, Ассамблею провинции Гуандун, различных милитаристов и либеральных интеллектуалов. Его избрание на пост губернатора, хотя и при сомнительных обстоятельствах, теперь гарантировано, поскольку ассамблея собирается вновь и, как ожидается, продлит его срок на неопределенное время.\n\nДля Гуанси настроение намного мрачнее. Гуандунская армия фактически выиграла войну, захватив Наньнин и позволив союзным бандам милитаристов (многие из которых были недавними перебежчиками) захватить другие города по мере распада Старой клики Гуанси. Хотя все теперь кланяются Гуанчжоу, преобладает ожидание, что Чэнь не сможет долго удерживать свою власть над Гуанси. Разграбление крупных городов Гуанси мстительными войсками Гуандуна и их союзниками омрачило их победу.\n\nПоскольку Чэнь работает над сбором поддержки для нового конкурирующего правительства в южном Китае, ожидается, что он столкнется с дилеммой — тот самый федерализм, который принес ему такую большую поддержку, окажется препятствием для того, чтобы покинуть Лянгуан ради других мест."
 GXC.earlygame.600.a: "Все вперед под руководством Генерала-юриста!"

 GXC.earlygame.601.t: "Возрождение федералистов в Лянгуане"
 GXC.earlygame.601.d: "Сведенный до уровня мелкого кантонского политика в 1920-х годах, Чэнь Цзюнмин из Гуандуна совершил политическое возвращение после гражданской войны в Лянгуане. Сплотив слабеющее городское правительство Гуанчжоу и отдаленные силы милитаристов Гуандуна, генерал Чэнь снова разгромил войска Старой Гуанси в кампании, напоминающей его действия в войнах Юэ-Гуй.\n\nКак новому хозяину двух провинций, Чэнь Цзюнмину был предложен второй шанс на реализацию его федералистских идеалов. Собрав коалицию, включающую его лоялистов в Армии Юэ и Партии общественных интересов, кантонских шэньши и торговцев, различных милитаристов и либеральных интеллектуалов, Чэнь стремится построить альтернативу порядку Бэйяна и радикализму Гоминьдана."
 GXC.earlygame.601.a: "Доказательство того, что федерализм вряд ли мертв."
 GXC.earlygame.601.b: "Первый раз был глупостью, этот второй раз — предательство."

 GXC.earlygame.602.t: "История китайского федерализма"
 GXC.earlygame.602.d: "Федерализм в Китае был связан с политической децентрализацией поздней династии Цин. Синьхайская революция увидела появление конкурирующих правительств Бэйяна и Гуанчжоу. Ни одно из них не смогло выйти из тупика, и оба начали терять контроль над своими союзными провинциями. Страх быть втянутым в жестокую гражданскую войну вызвал регионализм и недоверие к центральной власти, что проявилось в стремлении к провинциальной автономии.\n\nЭто также имело феодальные корни. Ученые династий Мин и Цин утверждали, что концепцию защиты местной автономии для сдерживания тиранической центральной власти можно проследить еще в древней династии Чжоу, используя ее для оправдания защиты своей собственной интеллектуальной автономии от имперского контроля. Эта концепция вновь возникла во время Стодневных реформ Кан Ювэя и Лян Цичао, которые включали местные программы самоусиления и формирование 21 провинциальной ассамблеи в 1909 году.\n\nК 1910-м годам появилось понятие Милитариста (Цзюньфа), возможно, произошедшее от японского слова Гунбацу — марксистской интерпретации японских военных клик. Почти внутренне уничижительный термин, особенно на фоне призывов интеллектуалов разделить военную и гражданскую власть, несмотря на это, существовал обширный диалог между интеллектуалами, милитаристами и политиками, размывающий границы. Эти новые интеллектуалы приняли традиционную роль конфуцианских литераторов, обучая и консультируя политических лидеров, но также взаимодействовали с массами, трудовыми отношениями и общественным образованием, что делало их незаменимыми для местных милитаристов.\n\nФедерализм, таким образом, можно рассматривать как продукт этого диалога. Сторонники утверждали, что это попытка мирно воссоединить провинции, застрявшие в военном болоте. Противники осуждали его как попытку южных милитаристов легитимизировать свою власть и разделить нацию. Первая волна федерализма угасла в 1920-х годах. Но поскольку нация снова разделена, похоже, что Китай переживает возрождение федерализма."
 GXC.earlygame.602.a: "Идеалистический проект национального единства и демократии."
 GXC.earlygame.602.b: "Практическая идеология для разделенной, воюющей нации."

 GXC.earlygame.603.t: "Оккупация Гуанси"
 GXC.earlygame.603.d: "Конец гражданской войны в Лянгуане стал полной сменой судьбы между Гуандуном и Гуанси, последним из серии конфликтов между двумя провинциями. Спустя месяцы Гуанси остается опустошенной и под оккупацией Гуандуна, пока лидеры Гуанси ведут переговоры о возвращении к самоуправлению, которое им было обещано. В августе 1921 года силы Гуандуна оккупировали Наньнин, положив конец Второй войне Юэ-Гуй после ошеломляющей контратаки. Чэнь Цзюнмин издал прокламацию из четырех пунктов, чтобы минимизировать репрессии против населения Гуанси.\n\n1. Война направлена против милитаристов Гуанси, а не против народа Гуанси. Вражеские войска приглашаются присоединиться к нашим силам.\n2. Мы помогаем народу Гуанси установить демократическое правление и поэтому должны относиться к ним как к братьям.\n3. Каждое растение и каждое дерево в Гуанси принадлежит народу Гуанси и не должно быть тронуто. При покупке или продаже товаров и продовольствия должны строго запрашиваться и выплачиваться справедливые цены.\n4. Наши прошлые успехи зависели от помощи, оказанной нам местным населением. Народ Гуанси будет приветствовать нас, если мы будем действовать нормальным цивилизованным образом.\n\nНесмотря на это, во время оккупации имели место значительные грабежи и жестокость, поскольку солдаты Гуандуна мстили. Сунь Ятсен назначил педагога Ма Цзюньу губернатором, и Ассамблея провинции Гуанси была восстановлена, но контроль Гуандуна всегда был фактически номинальным за пределами Наньнина, и армия Гуандуна отступила в течение года на фоне напряженности между Чэнем и Сунем. Вскоре после этого вооруженные банды, номинально связанные с Гуанчжоу, сражались между собой и Лу Жунтином за власть.\n\nЧэнь Цзюнмин полон решимости избежать повторения ситуации, но это непростая задача. Дисциплина Армии Юэ рухнула, чем дальше от дома они уходили. Тем временем генералы Гуанси, такие как Лю Чжэньхуань и Линь Ху, несмотря на свое соперничество, воспользовались моментом, чтобы потребовать контроля над реконструкцией."
 GXC.earlygame.603.a: "Гуанси должны управлять их собственные лидеры, чтобы нас не заклеймили лицемерами."
 GXC.earlygame.603.b: "На этот раз мы реконструируем Гуанси правильно!"

 GXC.earlygame.604.t: "Подъем китайских левоцентристов"
 GXC.earlygame.604.d: "Китайские левоцентристы долгое время оставались незамеченными по сравнению с более консервативной Бэйянской республикой и революционным Гоминьданом. Состоящие из прогрессивных и либеральных интеллектуалов, они провели большую часть Синьхайской революции и последующих лет в стороне, вступая в союз с различными «реформистскими» покровителями-милитаристами в надежде реализовать некоторые из своих идей.\n\nВ Лянгуане федералистское движение породило небольшое, но растущее левоцентристское крыло. Чэнь Цзюнмин является спонсором Партии общественных интересов, базирующейся в Кантоне политической партии с платформой, сосредоточенной на федеральной демократии; гражданских правах; свободном предпринимательстве с социальной гармонией между классами; политической прозрачности; и отмене неравноправных договоров. ПОИ является отростком более либерального крыла сторонников Чэня.\n\nПараллельно с ПОИ существует Китайское общество возрождения под руководством Чжан Цзюньмая. Чжан и подобные ему интеллектуалы верят в культурный, интеллектуальный подход к демократии — он не верит, что китайским политическим партиям в конечном итоге нужна массовая поддержка. Вместо этого, как часть «Культурного завтра Китая», он утверждал, что китайцы отличаются от европейцев и индийцев своей заботой о человеческих отношениях, и поэтому они должны использовать это преимущество в качестве основы для новой культуры. Эта новая культура должна была стать фундаментом новой политической и экономической системы.\n\nОбе группы черпали вдохновение в реформистском социализме, но имели резкий разрыв со своими революционными кузенами, утверждая вместо этого, что социализм должен реализовываться в каждой стране в соответствии с ее собственными условиями. Что касается ПОИ, вдохновленной анархистскими писателями, они считают, что деревни должны быть испытательным полигоном для развития местного самоуправления и трансформации общества в общество с социальной гармонией. С другой стороны, такие люди, как Чжан Дунсунь и Ло Лунцзи, откололись от КСП, хотя и сохранили веру в необходимость активной роли мобилизации масс."
 GXC.earlygame.604.a: "Продвигая самоуправление с уровня деревни, мы построим новую культуру."
 GXC.earlygame.604.b: "Через культуру и человеческие отношения мы можем построить новую деревенскую систему."

 GXC.earlygame.701.t: "План демилитаризации Чэнь Цзюнмина"
 GXC.earlygame.701.d: "Победа Чэнь Цзюнмина в гражданской войне в Лянгуане принесла некоторую экономическую стабильность, но война также опустошила казну Гуанчжоу. Это очень знакомая проблема для губернатора Чэня, который провел большую часть своих ранних сроков на посту губернатора, разгребая финансовый беспорядок, оставленный Сунь Ятсеном, и часто терял власть в результате. Если есть какое-то утешение, на этот раз ситуация не так плоха — война закончилась до того, как могли быть нанесены слишком большие разрушения.\n\nТем не менее, та же дилемма, которая разделила Суня и Чэня в 1920-х годах, вернулась, но теперь только он остался, чтобы решить ее. В прошлом Чэнь хотел сократить военные расходы, распустив половину из примерно 120 000 военнослужащих, которые у них были в то время, утверждая, что только 4 дивизии необходимы для вклада Гуандуна в национальную оборону. Он стремился использовать деньги для местных реформ, которые, по его мнению, в конечном итоге позволили бы провести национальные реформы после переговоров с Бэйяном. Сунь, с другой стороны, имел донкихотскую мечту о национальном объединении сверху вниз и отчаянно нуждался в деньгах для финансирования своего Северного похода.\n\nСеверный поход Гоминьдана полностью провалился, но это слабое утешение для растущего правительства Лянгуана. Политические переговоры с Бэйяном провалились в тот короткий период, когда они предпринимались, и Чжили доказали, что Китай можно объединить силой. Поскольку Чэнь Цзюнмин взвешивает достоинства сокращения военных расходов, понимается, что его верная Армия Юэ будет избавлена от большей части этого.\n\nОднако его союзные армии милитаристов (особенно те, что перебежали в конце войны) нервно ожидают своей участи. Главными обсуждаемыми подразделениями, однако, являются ценные дивизии старого порядка Лянгуана, часто построенные по западному образцу. Хотя их оружие в конечном итоге может быть заменено (хотя большая часть будет увезена домой уходящими солдатами или продана на черном рынке), сплоченности и подготовки этих войск будет не хватать."
 GXC.earlygame.701.a: "Сунь был неправ, грабя народ ради своего тщетного похода."
 GXC.earlygame.701.b: "Но наличие качественных дивизий необходимо для защиты народа."

 GXC.earlygame.702.t: "Новый губернатор для Гуанси?"
 GXC.earlygame.702.d: "Реконструкция Гуанси продолжается, и в соответствии с федералистскими принципами должны быть проведены местные выборы (обычно решаемые местными старейшинами) членов ассамблеи. После выборов Ассамблея провинции Гуанси наконец возобновит работу. Когда это произойдет, она изберет нового губернатора, который якобы будет равным партнером губернатора Чэня.\n\nНа практике понимается, что Гуанчжоу будет командовать в Наньнине. Армия Юэ Чэня будет эффективно решать, кому из законодателей Гуанси будет позволено вернуться на свои места, а какие действующие лица «не будут искать переизбрания». Большинство оставшихся лидеров Гуанси в любом случае стремятся подыгрывать своим новым повелителям.\n\nПредоставленная самой себе, ассамблея, вероятно, выбрала бы либо Лю Чжэньхуаня, либо Линь Ху. Лю Чжэньхуань — амбициозный милитарист, который долго мечтал править Гуанси. Хорошо образованный офицер вступил в конфликт с Лу Жунтином в 1910-х годах, глядя свысока на недавно назначенного губернатора как на простого бандита. В результате он провел большую часть своей карьеры, по иронии судьбы, в Гуандуне, возглавляя свою банду солдат из Гуанси и то вступая в союз, то разрывая его с Чэнь Цзюнмином. Лю считает себя естественным выбором для Гуанси, и, чтобы соответствовать видимости демократизации, он наладил связи с ФКДП.\n\nЛинь Ху был одним из триумвиров Фракции Молодой Гуанси, правившей Лянгуаном после смерти Лу Жунтина. Бывший союзник Чэнь Цзюнмина, он вступил в переговоры с Чэнем, когда его силы вошли в Гуанси, в ожидании того, что он и старый истеблишмент Гуанси останутся у власти в провинции в обмен на их подчинение.\n\n«Темной лошадкой» является Инь Цзи, офицер Армии Юэ родом из Хунани, который когда-то служил в правительстве Лу Жунтина, но в конечном итоге был вытеснен из клики Гуанси в 1917 году из-за их ксенофобии."
 GXC.earlygame.702.a: "Лю Чжэньхуаню все-таки обещали эту должность."
 GXC.earlygame.702.b: "Линь Ху обеспечит стабильный переход к Федерализму."
 GXC.earlygame.702.c: "Инь Цзи — лоялист, которому мы можем доверить надзор за реконструкцией."

 GXC.earlygame.703.t: "Правление Лю Чжэньхуаня над Гуанси"
 GXC.earlygame.703.d: "Гуанси провела большую часть последнего года или около того под руководством губернатора Лю Чжэньхуаня, который правил при поддержке Чэнь Цзюнмина, осуществлял власть через своих лоялистов «Армии Гуанси» (термин, который первоначально возник, потому что они были солдатами из Гуанси, действующими в Гуандуне, и теперь ставший избыточным), и преодолел разрыв между желанием истеблишмента Гуанси иметь уроженца с некоторой независимостью и желанием Гуандуна осуществлять контроль над Гуанси.\n\nЛю был сыном богатой семьи и получил традиционное образование, и о нем говорили как о щедром, гостеприимном и благородном человеке. Он начал в Синьхайской революции как член Тунмэнхоя, сражаясь в качестве командира ополчения в Линьчжоу под началом своего двоюродного брата Лю Гусяна. Его двоюродный брат восстал на проигравшей стороне Второй революции и был предан Шэнь Хунъином, поэтому Лю Чжэньхуань был вынужден бежать в Гонконг с небольшой группой лоялистов. Он смог медленно восстановить свои силы в Гуандуне и провел 1920-е годы как независимый актор, мечущийся между приверженностью разным фракциям в Гуанчжоу, пока он, наконец, не был побежден Гоминьданом в 1925 году.\n\nЕго изгнание в Гонконге привело к тому, что он потратил большую часть своего состояния, питая свою зависимость от опиума, проституции и азартных игр. К счастью для него, ситуация изменилась до того, как он смог растратить все это, и в 1928 году Чэнь Ляньбо поручил ему собрать армию для сопротивления господству Гуанси. Он никогда не оставлял своей мечты править Гуанси и был наконец вознагражден правительством федералистов.\n\nПравление Лю над Гуанси было не совсем таким, как хотели его покровители. Колоритная фигура, сохранившая многие из своих пороков, он тем не менее расширил гражданское правление в провинции, опираясь на свои связи со старыми бюрократами Клики политической науки и интеллектуалами ФКДП. Он использовал свой союз с Армией Юэ, чтобы подавить милитаристов Старой Гуанси, но использовал дух Гуанси, чтобы держать Гуанчжоу на расстоянии."
 GXC.earlygame.703.a: "Лю весьма искусен в сохранении своей власти."
 GXC.earlygame.703.b: "Его связи с КПН принесли некоторый либерализм в Гуанси."
 GXC.earlygame.703.c: "ДСП обхаживает его, чтобы расширить свое влияние."

 GXC.earlygame.704.t: "Гуанси отдаляется при Линь Ху"
 GXC.earlygame.704.d: "Не желая или, возможно, не имея возможности позволить себе длительную оккупацию Гуанси, Армия Юэ в основном ушла из провинции, оставив союзного генерала Гуанси Линь Ху для избрания губернатором. Фаворит истеблишмента и член старого триумвирата Молодой Гуанси, в результате мало что изменилось в Гуанси за эти годы.\n\nЛинь был кадровым военным, начав как гражданский участник Армии Черного флага Линь Юнфу на Тайване, сопротивляясь японской оккупации. Солдат под началом Хуан Сина во время Синьхайской революции, Линь неуклонно поднимался по служебной лестнице Старой клики Гуанси. После катастрофического поражения в Первой войне Юэ-Гуй Линь Ху был вынужден уйти в отставку и отправиться в изгнание. Год спустя он вернулся по приглашению Чэнь Цзюнмина (своего бывшего врага), чтобы помочь противостоять Сунь Ятсену, но в конечном итоге они были побеждены.\n\nОн провел 1923–1925 годы, ненадолго затмив Чэня в Восточном Гуандуне, став номинальным лидером Офиса объединенных сил, который стремился объединиться с Бэйяном против растущего Гоминьдана, и даже был назван губернатором Гуандуна на время. Его силы были уничтожены в битве при Мяньху, что вынудило его бежать в Шанхай. Возвращение Ма Цзи в Гуанси дало ему возможность вернуться к власти, и он снова оказался под командованием Лу Жунтина.\n\nС его независимой историей Линь в основном не нуждается в Чэнь Цзюнмине для власти после своего первоначального избрания, и он в основном направил Гуанси внутрь себя — лишь номинально принимая директивы из Гуанчжоу. Это может быть к лучшему в некоторых отношениях: послушная, изоляционистская Гуанси может быть меньшей угрозой, чем активно непокорная, и сажает Гуандун в водительское кресло. Тем не менее, Чэнь надеется хотя бы добиться некоторого сотрудничества от Линя."
 GXC.earlygame.704.a: "Линь Ху продолжает реабилитировать старых деятелей Гуанси для поддержки своей независимости."
 GXC.earlygame.704.b: "Чэнь Цзюнмин способен принудить его к военной координации."
 GXC.earlygame.704.c: "Уход Линь Ху в изоляцию усилил истеблишмент Гуандуна."

 GXC.earlygame.705.t: "Смерть губернатора Инь Цзи"
 GXC.earlygame.705.d: "Губернатор Инь Цзи, назначенный Гуандунской кликой для наблюдения за завершением реконструкции Гуанси, умер от болезни. Яркий и амбициозный молодой человек, родившийся в бедной семье в Хунани, он поступил на военную службу под началом Чэнь Чжаотана (подчиненного наместника Цэнь Чуньсюаня) и сражался с повстанцами в Гуанси. Он стал фаворитом Чэня, что позволило ему посещать Военную академию Гуанчжоу в 1905 году. Там он подружился с Дэн Кэном, но сдался, вместо того чтобы сражаться, во время Второй революции.\n\nЗатем он стал солдатом под началом Лу Жунтина во время Войны в защиту нации. Он и его войска вошли в Гуанси, маршируя за силами Лу Жунтина по пути в Чанша, и после смерти Юань Шикая И был отправлен как эмиссар Лу на переговоры с президентом Ли Юаньхуном. Однако к тому времени Клика Гуанси начала не доверять ему как не уроженцу Гуанси, и он был отстранен.\n\nЗатем И поступил на службу в Гуандунскую армию, служа под началом Хун Чжаолиня. Видимо, популярный офицер во время пребывания в Чаомэй, он тем не менее вступил в конфликт с Хуном и был вынужден уйти. В 1920-х годах и Бэйянское, и Гуанчжоуское правительства ухаживали за ним, и он решил встать на сторону Чэнь Цзюнмина, но его соперничество с Хуном вынудило его уйти в отставку еще до 1925 года.\n\nВ качестве губернатора он был надежным администратором, известным своими общественными работами и благотворительными проектами, что помогло ему укрепить свое положение, несмотря на то, что он был чужаком. Он по-прежнему зависел от поддержки Армии Юэ для сохранения своего правления, но она уменьшалась к тому времени, когда он внезапно умер от болезни.\n\nЕго смерть оставляет мало оправданий для Армии Юэ сохранять свою оккупацию; поскольку реконструкция в основном завершена, истеблишмент Гуанси стремился избрать Линь Ху его заменой. Генерал Лю Чжэньхуань, вероятно, был бы ближе всего к продлению статус-кво, хотя Чэнь Цию и руководство ПОИ предложили Лэй Жунко, гражданского мэра Наньнина от ПОИ."
 GXC.earlygame.705.a: "Хорошо, похоже, Гуанси готова к федеральному правлению при Линь Ху."
 GXC.earlygame.705.b: "С нашей помощью генерал Лю мог бы выиграть выборы и завершить миссию."
 GXC.earlygame.705.c: "Лэй Жунко станет символом нового, светлого будущего для Гуанси."

 GXC.earlygame.706.t: "Выборы уездных магистратов"
 GXC.earlygame.706.d: "Уездные магистраты являются неотъемлемой частью видения Федерализма Чэнь Цзюнмином. Служа в качестве Исполнительной власти каждого уезда, Чэнь уделял особое внимание их обучению и отбору — поручая им подавление «местных злоумышленников», разрешение споров между шэньши и крестьянами, обеспечение обязательного образования, продвижение местной экономики, управление местным ополчением и проведение политических реформ.\n\nЭта программа вряд ли уникальна для Чэня, действительно, лидеры по всей стране и политическому спектру подчеркивали роль уезда в возрождении нации. Все они сталкивались с похожими проблемами: коррупция, некомпетентность и нехватка финансирования для обучения и надзора. Чэнь стремился решить это, отправляя доверенных чиновников из уезда в уезд для проведения аудитов и подавления практики откупа зернового налога.\n\nПоскольку Чэнь пытается оживить систему магистратов по всему Лянгуану, последовали знакомые дебаты. Изначально Чэнь добивался прямых выборов магистратов, но в 1920 году он в конечном итоге внедрил компромиссную систему, в которой уездные собрания выдвигали список из трех кандидатов, из которых затем выбирал губернатор. Выборы уездных магистратов, традиционно назначаемых губернатором, тем не менее были беспрецедентными в то время. Было немало обвинений в фальсификации выборов, решение которых Чэнь передал недавно наделенной полномочиями местной судебной власти (уезд Паньюй, в частности, прославился тем, что дважды подряд объявлял выборы недействительными), но федералисты рассматривали выборы как успех, несмотря на трудности, вызванные войной (Чэнь был в Наньнине в походе)\n\nВ 1920 году попытка ввести прямые выборы была провалена союзниками Чэня в ходе жесткого голосования в ассамблее. В преддверии этих новых уездных выборов возникло новое движение за введение прямых выборов. Если оно будет реализовано, его сторонники говорят, что это будет победой демократии, но некоторые утверждают, что это просто усилит местные элиты."
 GXC.earlygame.706.a: "Как может губернатор, находящийся в военных походах, выбирать наших магистратов?"
 GXC.earlygame.706.b: "Учитывая проблему фальсификации выборов, наверняка губернатор должен иметь право голоса?"

 GXC.earlygame.707.t: "Городское правительство Гуанчжоу"
 GXC.earlygame.707.d: "В 1921 году Чэнь Цзюнмин написал временный городской устав Гуанчжоу, поместив город в прямое подчинение Провинциальному правительству. Городом должен был руководить исполнительный комитет из 7 человек, возглавляемый мэром и 6 комиссарами по финансам, безопасности, образованию, здравоохранению, общественным работам и коммунальным услугам. Также должен был быть создан муниципальный консультативный совет из 30 человек: 10 назначаются губернатором, 10 избираются общественностью, 3 торговой палатой, 3 рабочими организациями и по 1 от образовательных, медицинских, инженерных и юридических профессиональных групп.\n\nМэр должен был избираться демократическим путем, но комиссары должны были назначаться губернатором по совету мэра — что вызывало споры среди многих демократов, которые хотели, чтобы комитет был полностью выборным. Чэнь Цзюнмин, однако, утверждал, что эта система вряд ли беспрецедентна, и в любом случае временный устав должен был стать пятилетним учебным инструментом: после этого они всегда могли бы пересмотреть его.\n\nПровинциальная ассамблея, однако, выдвинула возражения против устава, приняв свою собственную версию устава и выразив разочарование по поводу того, что с ними обращаются так, «как будто они на пять лет отстают от своих соотечественников в сельских уездах [которым было разрешено избирать своих магистратов] в отношении политической осведомленности и интеллекта». Несмотря на эти протесты, Чэнь продолжил и внедрил свой устав, невзирая ни на что.\n\nВ конечном итоге тема стала неактуальной. За следующие 15 лет никогда не было демократически избранного мэра — Чэнь назначил сына Сунь Ятсена Сунь Фо мэром, режим Гоминьдана назначал своих мэров, а затем немцы назначили Чэнь Ляньбо, который остается действующим мэром. Чэнь Цзюнмин пообещал мэру стабильность, но его бывший союзник Чжан Цзюньмай выступил с резкой критикой системы, утверждая, что, поскольку мэр и комиссары назначаются, все они в основном бюрократы. Он потребовал выборов для всего комитета и совета, взъерошив перья, даже если сам мэр Чэнь, вероятно, выиграет перевыборы."
 GXC.earlygame.707.a: "Мы уже заключили сделку с Чэнь Ляньбо и муниципальным правительством."
 GXC.earlygame.707.b: "Пересмотр городского устава запоздал на десятилетие."

 GXC.earlygame.708.t: "Демократическое образование в Лянгуане"
 GXC.earlygame.708.d: "Возможно, самым гордым достижением Чэнь Цзюнмина во время его правления в 1920-х годах было создание независимой образовательной системы. Чэнь выступал против партийности образования Гоминьдана и усилий реформаторов поздней Цин подражать системе Мэйдзи в Японии, утверждая, что «образование является основой реконструкции нации. В нормальных условиях здоровая нация должна посвящать значительно более половины своих ежегодных расходов образованию... каждый пенни, который мы сэкономим, будет возвращен обществу для реформы образования».\n\nТрадиционный департамент образования был упразднен в пользу беспартийного провинциального образовательного комитета, которому было поручено развитие и управление провинциальной образовательной системой. Комитет должен был включать четырех назначенных губернатором и четырех избранных президентами и профессорами высших учебных заведений, и, несмотря на спорное влияние синдикалистов, таких как Чэнь Дусю, губернатор рассматривал проект как успешный.\n\nЧтобы обеспечить его финансовую независимость, он и комитет стремились собрать деньги для целевого фонда, но, не сумев этого сделать, они вместо этого остановились на выделении части стабильных доходов, таких как налоги на табак, спиртные напитки и земельные документы, для финансирования провинциального образования. Конституция провинции даже включала раздел, в котором говорилось, что не более 30% годового бюджета может быть потрачено на военные дела и не менее 20% должно быть потрачено на образование.\n\nЧжан Цзюньмай и его союзники высоко оценили эти усилия, но также выразили потребность в демократическом образовании. Они утверждают, что китайская раса демократична по своей природе, но нуждается в подкреплении, чтобы ценить политическую демократию, а не благожелательную диктатуру, потребность, превышающая борьбу с неграмотностью. Приняв квазирелигиозный тон, эти интеллектуалы и люди, подобные им, сделали своей миссией «просвещение масс», даже сравнивая себя с ранними христианами в своем упорстве."
 GXC.earlygame.708.a: "Ну, конечно, преподавание демократии — это часть граждановедения?"
 GXC.earlygame.708.b: "Мы должны сохранять образование строго беспартийным."

###- Section 2e (800-999): Early Game NPA Political Events -###

## NPA Political Event Chain (800-829):
 GXC.earlygame.800.t: "Старый порядок держится в Лянгуане"
 GXC.earlygame.800.d: "В конце концов, революционного рвения Гоминьдана и республиканского идеализма федералистов оказалось недостаточно, чтобы свергнуть Лу Юйгуана и его союзников. Сплотив свои силы, они отразили внешние вторжения сил Гоминьдана и подавили восстания социалистов, бандитов и кантонских милитаристов. По крайней мере, на поверхности старый статус-кво был восстановлен: Фракция Молодой Гуанси осталась доминирующей в Гуанси, Фракция армии Шэнь удерживает Шаогуань и северо-восточный Гуандун, а Чэнь Ляньбо и его кантонские союзники удерживают южный Гуандун.\n\nОднако пути назад нет. Крах старого порядка Чжили продолжает отдаваться эхом по всему Китаю. Даже в Лянгуане вакуум власти, оставленный кратким периодом беспорядков, потряс основы системы после Северного похода. Власть консолидируется от местных, мелких фракций милитаристов в руки трех оставшихся сильных людей: Лу Юйгуана, Шэнь Хунъина и Чэнь Ляньбо. Последние двое изо всех сил пытаются обеспечить контроль над Гуандуном, возобновляя давнюю битву на востоке. Победитель может даже оказаться достаточно сильным, чтобы бросить вызов Лу Юйгуану за весь Лянгуан.\n\nПока что, однако, маршал Лу и хунта Молодой Гуанси сохраняют контроль над регионом. Им придется лавировать среди неопределенных ветров, поскольку Лянгуан попадает в прицел могущественных претендентов, стремящихся объединить нацию. Возможно, они присоединятся к одной из сторон, а возможно, создадут свою собственную."
 GXC.earlygame.800.a: "Так, как было, но не совсем так, как должно быть."

 GXC.earlygame.801.t: "Регионалистские силы удерживают Лянгуан"
 GXC.earlygame.801.d: "Несмотря на рвение Гоминьдана и энтузиазм федералистов, в конечном итоге регионалистские силы смогли отразить захватчиков и подавить внутренние восстания. В течение нескольких месяцев все крупные города и опорные пункты оказались в руках старых властей в двух провинциях Гуандун и Гуанси.\n\nНаиболее доминирующей является Фракция Молодой Гуанси Старой клики Гуанси, возглавляемая Лу Юйгуаном, приемным сыном знаменитого милитариста Лу Жунтина. Он делит власть с другими кликами милитаристов, включая Шэнь Хунъина в Шаогуане и Чэнь Ляньбо в Гуанчжоу. Стремясь защитить свою автономию, они сталкиваются с трудными вопросами в будущем, лавируя в расколотой политике Китая."
 GXC.earlygame.801.a: "Порядок возвращается в Лянгуан."
 GXC.earlygame.801.b: "Мы должны готовиться к войне за освобождение!"

 GXC.earlygame.802.t: "Север и Юг"
 GXC.earlygame.802.d: "Лу Жунтин заключил несколько осторожных союзов с северными фракциями, как в надежде мирно положить конец гражданской войне, так и в надежде сохранить собственную власть и автономию региона. Эта политика перешла к правлению Лу Юйгуана, однако напряженность между Лу, Лигой и центральными правительствами Чжили помешала более глубокому сотрудничеству между тремя.\n\nОгненный крах Лиги в 1936 году позволил Лянгуану снова достичь де-факто независимости, но эта ситуация не может длиться вечно. Хотя существует значительная поддержка самоуправления и недоверие к Пекину, нет поддержки сецессии. Либо Лянгуану придется присоединиться к правительству, либо им придется создать свое собственное.\n\nКонечно, у маршала Лу есть время разыграть свои карты, и хунта Старой Гуанси будет внимательно следить за ситуацией, чтобы максимизировать свое преимущество в переговорах. Но клики Чжили и Фэнтянь — и, возможно, другие тоже — начнут оказывать давление вместе со своими иностранными покровителями и своими агентами в регионе, чтобы ввести нас в свои сферы. Поскольку внутренние и внешние дела начинают пересекаться, нам было бы разумно действовать осторожно."
 GXC.earlygame.802.a: "Мы приветствуем этих посланников мира."
 GXC.earlygame.802.b: "Мы должны найти свой собственный путь к объединению."

 GXC.earlygame.803.t: "Политика Южного Китая"
 GXC.earlygame.803.d: "Южный Китай — крайне политизированный регион, революционный очаг со времен восстания тайпинов. Он был домом для нескольких движений против Бэйяна в эпоху после Синьхая, включая Войну в защиту республики, Войну в защиту конституции, а также движения Гоминьдана и федералистов. Гуанчжоу, в частности, был временной столицей нескольких из этих правительств, что придавало ему определенную степень легитимности для тех, кто стремился объединить нацию.\n\nСторона Пекина выиграла гражданскую войну после Северного похода и стремилась подорвать политическое значение города. Они использовали тактику «разделяй и властвуй», чтобы держать юг разобщенным, и Лянгуан тем более, в надежде предотвратить появление нового претендента. Тем не менее, Гуанчжоу остается важной целью как для фракций, стремящихся заявить о своих правах на национальное лидерство, так и для северных фракций, стремящихся восстановить свой контроль над югом. Не пройдет много времени, прежде чем кто-то попытается сделать свой ход на нашей территории."
 GXC.earlygame.803.a: "Мы должны быть бдительны против этих предателей."
 GXC.earlygame.803.b: "Нам нужно представить собственное видение."

 GXC.earlygame.804.t: "Малые фракции Лянгуана"
 GXC.earlygame.804.d: "Почти предрешено, что Лянгуан достанется одному из трех главных милитаристов провинции или внешним захватчикам. Однако остаются некоторые мелкие фракции, ищущие шанс вклиниться в политическую сцену. Они в основном укоренены в космополитичном городе Гуанчжоу, но имеют некоторые филиалы глубже внутри страны.\n\nКлика политической науки — старейшая, остаток другого времени в Лянгуане. Свободная коллекция политиков, ученых, бизнесменов и милитаристов, когда-то связанных с губернатором Гуандуна Цэнь Чуньсюанем, его политическая гибель в 1918 году и свержение других связанных фигур КПН в южном Китае сломили их власть. Цэнь умер в уединении в Шанхае в 1933 году, и фигуры КПН рассеялись — примкнув к другим сильным мира сего. В Гуанчжоу их остатки собираются вокруг Линь Чжэнсюаня, которому удалось выкроить роль спикера Провинциальной ассамблеи, и опальных милитаристов Лю Чжэньхуаня и Ян Симиня.\n\nМладшие фракции разделяют с КПН увлечение Западом, хотя и по-разному. Общество Цзинсин было основано студентами, обучающимися в Германии, и росло во влиянии по мере углубления китайско-германского сотрудничества. В Гуандуне и Гуанси наиболее видными сторонниками Цзинсин являются Чжу Цзяхуа и Ма Цзюньу соответственно. Еще один ученый, получивший образование в Германии, Чжан Цзюньмай, основал Общество национального возрождения, которое стремится использовать образование для продвижения Китая к демократическому будущему по пути, сочетающему социал-демократию и лянизм. Наконец, есть Партия общественных интересов, основанная Чэнь Цзюнмином и другими китайскими Хунмэнь (описываемыми как китайские масоны), которые стремятся внедрить федерализм в Китае. Их хозяин потерпел поражение в битве, и ее остатки перебазировались в Гонконг."
 GXC.earlygame.804.a: "У КПН есть связи, необходимые для выживания."
 GXC.earlygame.804.b: "Цзинсин копирует мирового гегемона."
 GXC.earlygame.804.c: "Демократы дают ученым надежду на будущее."

 GXC.earlygame.805.t: "Идеология и регионалисты"
 GXC.earlygame.805.d: "Хотя милитаристы часто были прагматичными и своеобразными в своих убеждениях, было бы ошибкой думать, что они невежественны или необразованны. Чэнь Ляньбо и другие гуанчжоуские милитаристы из более богатых семей получили современное образование западного образца либо в элитных школах Китая, либо за границей. И даже те, кто вышел из бандитской или военной среды, как Старая клика Гуанси, часто окружают себя хорошо образованными советниками и следят за современными политическими тенденциями, как из уважения к традиционным ролям конфуцианских ученых-литераторов, так и из прагматичного стремления к легитимности и выживанию.\n\nЛянгуан — это плавильный котел убеждений. Даже когда Гоминьдан и федералисты загнаны в подполье, дебаты о конфуцианстве, Движении за новую культуру, либерализме, национализме, модернизации и других идеологиях продолжаются. Лу Жунстин, со своей стороны, придерживался смешанного подхода к прогрессу, принимая национализм и республиканскую революцию, но часто сохраняя существующие местные политические системы в Гуанси. Его усилия по сохранению порядка и строительству дорог получили высокую оценку, но его авторитаризм, недоверие к революционерам и коррупция офицеров Старой клики Гуанси привели к его падению.\n\nЕго преемники в Лянгуане, как правило, находятся на консервативном конце китайского политического спектра, хотя и не обязательно реакционны. Растет понимание того, что перемены необходимы, но как далеко и как быстро — это другой вопрос."
 GXC.earlygame.805.a: "Мы — сила современных перемен в Китае."
 GXC.earlygame.805.b: "Мы будем отстаивать традиционные ценности Китая."

## NPA Political Tree Events (830-859):
 GXC.earlygame.830.t: "Группы меньшинств в Гуанси"
 GXC.earlygame.830.d: "Гуанси — чрезвычайно разнообразная провинция. Ханьцы составляют около 60% населения, мигрировав в регион в течение нескольких поколений и часто вступая в брак с другими этническими группами. На севере и западе, как правило, говорят на южном поддиалекте мандаринского языка, в то время как кантонский диалект, как правило, распространен в центральном регионе и на юго-западе. На востоке и юго-западе разбросаны говорящие на хакка группы ханьцев в Гуанси.\n\nНарод чжуан в основном живет в западной части Гуанси вокруг Юйлиня. Они, как правило, говорят на кантонском диалекте и живут в разных кланах, у каждого из которых есть свои лидеры. Эти кланы часто описываются как временные группировки, а не как отдельные культурные образования, что добавляет динамизма политике Гуанси. Почти 37% населения Гуанси — чжуаны, и говорят, что они, как правило, ассимилированы с более широкой китайской идентичностью.\n\nМеньшие этнические группы в Гуанси включают народ яо, который говорит на варианте языковой группы хмонг-мьен. Некоторые группы, по-видимому, практикуют подсечно-огневое земледелие и мигрировали в этот район вплоть до 1870 года. Мяо традиционно утверждают, что произошли из Сибири, и также говорят на языке группы хмонг-мьен, который является тональным, односложным и не имеет письменности. Они, как правило, не любят большие деревни, но являются способными фермерами, когда оседают, умело выращивая кукурузу, несмотря на очевидное отсутствие математики или календаря. Они также, по-видимому, отличные певцы. Наконец, народ и, также описываемый как лоло, имеет некоторые ветви в Гуанси и имеет письменный, пиктографический язык, который, по-видимому, является частью тибето-бирманской семьи. Они известны своей моногамией и целомудрием.\n\nКлика Гуанси известна своей относительной терпимостью к этническим группам, предоставляя им полуавтономные племенные области. Хотя династия Цин работала над их постепенным устранением, эти указы в значительной степени игнорировались."
 GXC.earlygame.830.a: "Вместе мы сильны."

 GXC.earlygame.831.t: "Залы из нефрита, где правят тигры"
 GXC.earlygame.831.d: "Правители Китая с момента провала Северного похода и их успехов в войнах Чжили-Фэнтянь, клика Чжили, несмотря на все свои притязания, никогда по-настоящему не была едина внутри. Выступая скорее как диссидентская сила для борьбы с общими врагами, генеалогическое древо Чжили раздроблено и расколото, с подфракциями на подфракциях союзов и сделок между членами семьи.\n\nС их резиденцией власти, расположенной на Центральных равнинах, их влияние на Юге ограничено несколькими гарнизонами или лояльными компрадорами; Тан Сянмином, Ян Сэнем, Лю Цуньхоу или губернаторами Южной Чжили в Цзянси и Фуцзяни. С 1928 по 1936 год Чжили пытались продемонстрировать свою способность управлять Югом различными средствами, но в конечном итоге им пришлось полагаться на Старую клику Гуанси.\n\nРазделенные между Северной Чжили группы Тяньцзинь-Баодин и Лоянской фракцией, наряду с Южной Чжили, где доминирует Сунь Чуаньфан, «две» лошади Чжили в основном поддерживали разные стороны в гонке с начала 1920-х годов. От Чэнь Цзюнмина до Шэнь Хунъина, до Ма Цзи и различных других мелких милитаристов в Лянгуане: например, Двух Янов.\n\nЗа их усилия, и при обширной поддержке Южной Чжили, Шэнь Хунъин и его фракция армии Шэнь Старой клики Гуанси стали самым зависимым союзником Чжили, хотя Лу Юйгуан и Фракция Молодой Гуанси Старой клики Гуанси представляли собой гораздо более сильного союзника и находятся в близких отношениях с Чжили. Германия, со своей стороны, обратилась к членам прогерманского Общества Цзинсин, надеясь сохранить туз в рукаве.\n\nЧто касается их интересов, у Чжили есть гораздо более серьезные проблемы, на которых нужно сосредоточиться, чем дела Лянгуана, и поэтому та скудная поддержка, которую они могут предоставить, ограничивается в основном одной фракцией: армией Шэнь или Фракцией Молодой Гуанси и ее Молодым маршалом Юга, или, возможно, даже просто поддержкой Двух Янов; Ян Чисэна и Жусюаня, самой лояльной силы в регионе."
 GXC.earlygame.831.a: "Возможно, У Пэйфу все еще сохраняет симпатию к Ма Цзи?"
 GXC.earlygame.831.b: "Они могут быть бандитами, но это наши бандиты."
 GXC.earlygame.831.c: "Чжили решают поддержать Двух Янов."

 GXC.earlygame.832.t: "Сокрушение Гоминьдана"
 GXC.earlygame.832.d: "В четвертый раз Гоминьдан снова лежит опустошенным и побежденным. В то время как предыдущие попытки возродить Китайскую националистическую партию возглавлялись харизматичным лидером партии Сунь Ятсеном, смерть уважаемого раннего революционного и политического лидера привела к борьбе за власть между руководством партии в 1925 году. Провал Северного похода, Шанхайское восстание 1932 года, а теперь и их попытки обеспечить Лянгуан для Партии — показали сторонним наблюдателям четкую надпись на стене — что Гоминьдан теперь побежден навсегда. Книги, брошюры и журналы, принадлежащие или близкие к Гоминьдану, публично сжигаются, а лидеры повстанцев регулярно вешаются или казнятся в ходе ужасного подавления радикальных революционеров.\n\nВ то время как основные силы повстанцев были фактически разгромлены различными фракциями, борющимися за власть и легитимность по всей провинции; партизанские силы повстанцев, в том числе принадлежащие Пэн Паю или бывшей базе восстания Мин-Гань, бежали в горы и холмы южного Китая изолированными очагами. С появлением слухов о сильно ослабленных, но сохранившихся маршрутах поставок оружия из Шанхая или Гонконга; многие в правительстве выступали за то, чтобы просто раздавить эти изолированные очаги. Любые их стремления к попытке захвата провинции можно считать мертвыми, но их продолжающееся сопротивление может оказаться раздражением для местного управления и проблемой постоянного бандитизма. С другой стороны, есть те в фракциях Новой Гуанси и Нового Гуандуна Гоминьдана, кто может быть более дружелюбен к нашим республиканским идеалам. С отсутствием марксистского оттенка социализма в их идеологии; эти бывшие повстанцы и политики могут быть склонны работать с нашими рядами и обеспечить свои позиции, поняв, что мечта Гоминьдана фактически разрушена навсегда в Лянгуане."
 GXC.earlygame.832.a: "Пусть не будет покоя этим повстанцам..."
 GXC.earlygame.832.b: "...потому что они нужны нам в этой борьбе."

 GXC.earlygame.833.t: "Ликвидация клики Юэ"
 GXC.earlygame.833.d: "Возвышающийся, харизматичный и амбициозный — Чэнь Цзюнмин долгое время был заметной фигурой в местной политике Гуандуна. Уроженец хакка был игроком в регионе с первых дней в качестве революционера вместе с Сунь Ятсеном; до свержения последнего в кровавом перевороте, и хотя когда-то считалось, что он был дружелюбен к господству Чжили в Китае — ясно, что у Чэня и его армии Юэ были собственные амбиции. В их неудачной попытке узурпировать наше положение в Лянгуане; судьба Чэня и его движения федералистов фактически лежит в наших руках.\n\nАрмия Юэ, возглавляемая Е Цзюем и включающая видных военных офицеров Клики Гуандуна, таких как Ло Сяньсин и Ма Юйхан, находится в нашей власти, потерпев поражение в стычках и битвах по всей провинции. Несмотря на их противодействие, многие из их офицеров, пожалуй, одни из самых хорошо обученных во всей провинции. В их рядах, дружественных нашим принципам провинциального регионализма и республиканизма; Армия Юэ, вероятно, будет поглощена армией Чэнь Ляньбо.\n\nТо же самое относится и к провинциальным шэньши, которые, возможно, поддерживали Чэня, но в конечном итоге заинтересованы в сохранении своих земель и собственности в безопасности от радикализма коммунизма. Местные землевладельцы, старосты деревень и мэры городов поклялись в верности в обмен на сохранение своих постов. Связи с милитаристами на юго-западе, например, могут быть использованы фракцией Молодой Гуанси Лу Юйгуана в надежде заполнить местный вакуум власти, в то время как те, кто на северо-востоке, могут оказаться в лагере Шэнь Хунъина.\n\nС уходом крупных республиканских фигур с картины провинциальным демократам и хунмэнь действительно не к кому обратиться, кроме как к военным лидерам Армии национального успокоения. Поскольку идеология в Китае всегда текуча и изменчива; многие из этих городских ученых-интеллектуалов способны распознать быстро меняющуюся политическую ситуацию и адаптировать свои цели и движения к текущему состоянию политики."
 GXC.earlygame.833.a: "Чэнь Ляньбо — естественный бенефициар падения Чэня."
 GXC.earlygame.833.b: "Лу Юйгуан укрепит контроль над югом."
 GXC.earlygame.833.c: "Силы Шэнь Хунъина движутся на север."

 GXC.earlygame.834.t: "Кантонский кинематограф"
 GXC.earlygame.834.d: "В то время как опера Юэ остается одним из главных культурных институтов Гуандуна, растущее внимание на кантонской культурной сцене сосредоточено на подъеме уникальной кантонской киноиндустрии. Хотя часто затмеваемый бурно развивающейся музыкальной и киноиндустрией Шанхая, первый исключительно кантонский фильм «Две девочки, осиротевшие из-за войны» вышел в 1932 году, за ним последовал гонконгский кантонский фильм «Свадьба идиота» годом позже. Эти фильмы сыграли решающую роль в уникальной регионалистской идентичности Гуандуна.\n\nТипичные фильмы, с которыми сталкиваются кинозрители, варьируются от уникальных сюжетов до общих новостей дня. Эти фильмы проецируют идеалы общественного здравоохранения, научных и географических знаний, военных подвигов милитаристов и даже так называемые «фантомные поездки», когда камера устанавливается на локомотивах, трамваях или лодках, преодолевающих пороги, давая кинозрителям сенсационный опыт в красивых местах по всему миру. Политические лидеры также транслировали обращения на кантонском диалекте в эпоху, когда мандаринский диалект все еще незнаком в таких регионах, как Цзянмэнь и Саньшуй.\n\nКинокомпания Наньян, основанная братьями Шоу, является одной из самых известных кинокомпаний в Китае. Их недавняя работа, 84-минутная «Леди-светило», в которой Ли И-нин играет главную женскую роль, рассказывает истории Лук Мо-чин и ее приемной дочери Нг Сау-ва (которую играет Люн Тим-тим). Лук избегает принудительного брака и злополучной влюбленности, прежде чем возглавить школу для девочек — изменив свою жизнь и жизни других. Нг сталкивается с похожими невзгодами. Перед лицом такого несоизмеримого унижения они упорно продолжают начинать свою жизнь заново — создавая разоблачение систематического гендерного неравенства в Китае.\n\nВо времена продолжающихся раздоров и предстоящего конфликта как внутри Китая, так и за рубежом; многие обратились к кино за надеждой, руководством и уединением. По слухам, братья Шоу работают над новым проектом, действие которого происходит в Маньчжурии, хотя сообщается, что фильм находится на стадии планирования."
 GXC.earlygame.834.a: "Абсолютное кино."

## NPA Southern Struggle Mini-Game Events (860-889):
 GXC.earlygame.860.t: "Борьба за Юг"
 GXC.earlygame.860.d: "Лянгуан долгое время был занозой в нашем боку, принимая у себя различные революционные правительства, стремящиеся свергнуть порядок Бэйяна. Окончание Северного похода и распад региона на различные феодальные владения милитаристов, связанных с Чжили, должны были положить конец делу, но хитрый Лу Жунстин смог воссоединить регион и ослабить хватку Чжили после войн Чжили-Фэнтянь и Шанхайского восстания 1932 года.\n\nПреемники Лу были не столь успешны, и после распада Лиги Лянгуан также погрузился в гражданскую войну. Но Лу Юйгуан (приемный сын Лу Жунстина) вместе с другими регионалистскими, реакционными силами вышел победителем, вернув регион к старому статус-кво. Ну, за исключением одного момента.\n\nЛянгуан остается независимым, а различные милитаристы под руководством Лу и его союзников взвешивают свои варианты. Шэнь Хунъин, которого Южная Чжили в Гуандуне долгое время взращивала как лояльную альтернативу Гоминьдану, а позже и Лу Жунстину (который, в свою очередь, объединился с Северной Чжили против Сунь Чуаньфана), продолжает искать поддержки Чжили. Различные фракции Чжили, в свою очередь, направили к нему эмиссаров, надеясь использовать его влияние, чтобы ввести весь Лянгуан в свою орбиту. Их соперники в Китае, в свою очередь, обратили взоры на Чэнь Ляньбо и его кантонское купеческое правительство, надеясь использовать огромное влияние города (также известного как Гуанчжоу), чтобы получить власть над регионом."
 GXC.earlygame.860.a: "Мы должны победить! Удвоить наши усилия!"
 GXC.earlygame.860.b: "Надеюсь, они присоединятся сами..."

 GXC.earlygame.861.t: "[FROM.GetAdjective] помощь и похвала"
 GXC.earlygame.861.d: "Война — дорогостоящее предприятие, тем более если вы ее проигрываете. Даже для тех, кто купается в лучах славы победы над врагами, разрушения, которые так часто остаются на военных и финансах после конфликта, оставляют желать лучшего. Точно так же победа над вторжениями сил Гоминьдана была в лучшем случае пустой, ее издержки легли бременем на региональные власти Лянгуана, поскольку промышленность барахтается.\n\n[FROM.GetNameDefCap], рассматривая это как возможность легитимизировать себя как истинное представительное правительство Китая, обратилось к чиновникам Лянгуана с предложением предоставить финансовую помощь в качестве жеста доброй воли в эти трудные времена. В том, что некоторые считают попыткой лести, [FROM.GetLeader] поздравил народ и власти Лянгуана с их победоносным сопротивлением «красной угрозе».\n\nИх предложение добровольно поднять экономику Лянгуана из руин наряду с цветистыми словами похвалы, безусловно, произвели впечатление на общественность. Общественное настроение кажется восприимчивым к [FROM.Adjective] щедрости, рассматривая ее с чувством облегчения в жалком море уныния среди людей перед лицом массовой финансовой нищеты.\n\nЧто касается Лу Юйгуана, как номинального хозяина Лянгуана, он по-прежнему колеблется принимать милости [FROM.GetNameDef], подозревая, что это просто подорвет влияние Фракции Молодой Гуанси в провинциях-близнецах в пользу его региональных оппонентов, которые более чем готовы принять [FROM.Adjective] помощь."
 GXC.earlygame.861.a: "Как любезно с их стороны."
 GXC.earlygame.861.b: "Спасибо, но не надо."

 GXC.earlygame.862.t: "Сообщения о подкупе [FROM.GetAdjective] агентами"
 GXC.earlygame.862.d: "Методы вербовки в Китае отличаются по сравнению с другими странами, имеющими профессиональные армии, из-за раздробленного характера армии, когда многие местные милитаристы формируют свои собственные личные армии. От уличной вербовки, принудительного призыва и даже вербовки через семейные связи, местные армии часто подпитываются отсутствием альтернативной занятости и страдают от коррупции.\n\nДезертирство — обычное явление среди солдат, будь то из самосохранения, недовольства из-за личных проблем или взяточничества, что делает местные провинциальные армии склонными к распаду, когда начинают появляться трещины. Таким образом, высокая готовность, проявленная хунтой Молодой Гуанси в ответ на сообщения о взятках, якобы предложенных рядовым солдатам армии Гуанси [FROM.Adjective] агентами, естественна.\n\nВозможно, являясь частью более широкого заговора с целью расширения их влияния в Лянгуане, волна взяток, распространившаяся по армии, станет катастрофой для маршала Лу Юйгуана и Фракции Молодой Гуанси, если когда-либо возникнет конфликт между Лянгуаном и [FROM.GetNameDef], поскольку солдаты начнут массово переходить на другую сторону в тот момент, когда начнется битва.\n\nЧтобы противостоять этой гнили в армии, советники предложили провести всестороннюю чистку для удаления скомпрометированных элементов. Хотя это может повлиять на боевые возможности армии Гуанси в краткосрочной перспективе, учитывая хаотичную ситуацию, охватывающую весь Китай, лояльность является самой важной среди других черт солдата."
 GXC.earlygame.862.a: "Структуры начинают гнить, поскольку взятки раздаются беспрепятственно."
 GXC.earlygame.862.b: "Маршал Лу проводит тщательную чистку в армии."

 GXC.earlygame.863.t: "Военные угрозы со стороны [FROM.GetNameDef]"
 GXC.earlygame.863.d: "Существует много способов достижения политических целей: либо через войну, либо через дипломатию. Когда дипломатия недостижима, многие неохотно ищут войны для достижения своих целей. Но с высокой ценой, которую она влечет за собой, некоторые прибегают к военным угрозам как к возобновлению дипломатии другими средствами. Для [FROM.GetNameDef], похоже, это именно тот случай, поскольку телеграмма была отправлена в [ROOT.Capital.GetCapitalVictoryPointName] из [FROM.Capital.GetCapitalVictoryPointName], предупреждая об использовании военных средств, если их требования не будут выполнены.\n\nСреди прочего, они требуют, чтобы мы привлекли несколько человек в нашу администрацию. Неудивительно, что многие из перечисленных лиц, по-видимому, являются лоялистами и последователями, связанными с правительством [FROM.Adjective]. Какими бы смелыми они ни были, эта угроза оказалась довольно эффективной для распространения страха перед еще одним неизбежным вторжением в Лянгуан со стороны [FROM.Capital.GetCapitalVictoryPointName].\n\nМногие в провинциях-близнецах были поражены пораженчеством, так как в отличие от быстрого, но неорганизованного вторжения Гоминьдана, общественный страх подпитывался лучше оснащенным характером [FROM.Adjective] армии. Этому не способствовали спорадические сообщения о наращивании военной мощи на нашей границе с [FROM.GetNameDef].\n\nНесмотря на военное давление, естественная защита Лянгуана успокоила умы относительно того, может ли такое вторжение серьезно увенчаться успехом, причем некоторые считают эту угрозу не чем иным, как блефом со стороны [FROM.Capital.GetCapitalVictoryPointName]. Тем не менее, осторожность витает в воздухе провинций, поскольку даже блеф может стать искрой для другого более масштабного конфликта."
 GXC.earlygame.863.a: "Пораженчество распространяется перед лицом подавляющей силы."
 GXC.earlygame.863.b: "Настроения в Лянгуане остаются невозмутимыми перед вопиющим блефом."

 GXC.earlygame.864.t: "[FROM.GetNameDefCap] размещает местных милитаристов"
 GXC.earlygame.864.d: "Хотя вторжение Гоминьдана доставило немало хлопот региональным властям Лянгуана, спонтанные восстания, организованные бандитами и милитаристами по всем провинциям-близнецам, сделали и без того хаотичную ситуацию намного хуже. Несмотря на это, порядок вернулся в Лянгуан, когда эти восстания были подавлены наряду с отражением сил Гоминьдана. Сломанные и побежденные, эти милитаристы, казалось, были обезврежены, без базы поддержки, на которую можно было бы положиться после роспуска их личных армий.\n\nК сожалению, сообщается, что [FROM.GetNameDef] размещает этих милитаристов, предоставляя им удобную базу операций для восстановления своей поддержки, недосягаемую для властей Лянгуана. Будь то из апатичного альтруизма или как часть более широкой схемы распространения собственного влияния в провинциях-близнецах, ясно, что этот политический маневр вызвал озабоченность.\n\nХотя эта озабоченность преобладает в хунте Молодой Гуанси, они не одиноки в этом чувстве. С таким вопиющим вмешательством в и без того деликатную борьбу за власть в Лянгуане, временная демонстрация единства была предложена как путь для борьбы с растущим влиянием [FROM.GetNameDef] и их сторонников в регионе.\n\nДля маршала Лу Юйгуана поддержка его региональной оппозиции, какой бы краткой или поверхностной она ни была, необходима для обеспечения автономии Лянгуана. Однако даже при таких высоких ставках среди региональных сильных людей все еще существует недоверие, поскольку личные амбиции регионального господства все еще царят в умах некоторых."
 GXC.earlygame.864.a: "Региональная нерешительность побеждает, поскольку милитаристы сохраняют преимущество."
 GXC.earlygame.864.b: "Формируется единое осуждение против [FROM.GetAdjective] вмешательства."

 GXC.earlygame.865.t: "[FROM.GetNameDefCap] предлагает мирные инициативы"
 GXC.earlygame.865.d: "Национальное объединение было целью многих с тех пор, как Китай раскололся со смертью Юань Шикая. Будь то путем переговоров или силовыми методами, все усилия не смогли достичь этого по множеству причин. С крахом Лиги восьми провинций, когда маршал Сунь Чуаньфан был застрелен, а Ци Сеюань занял пост маршала Лиги, иллюзия китайского единства под господством Чжили была разрушена.\n\nПоскольку конфликт на Юге завершается провалом вторжений Гоминьдана в Лянгуан, в провинции-близнецы вернулось подобие стабильности и политического единства. В стремлении к национальному объединению под своим руководством [FROM.GetNameDef] обратилось к региональным властям на Юге, посылая мирные инициативы, чтобы оценить возможность воссоединения между Севером и Югом, давно разделенными в конфликте между революционерами и сильными мира сего.\n\nПриветствуемый некоторыми в Лянгуане как ступенька к единому Китаю, многие, включая маршала Лу Юйгуана и хунту Молодой Гуанси, скептически относятся к искренности [FROM.GetLeader], подозревая, что это не что иное, как попытка закрепить собственное влияние в регионе.\n\nРазжигая общественные настроения за мир и оппозицию пролитию еще большей китайской крови ради бессмысленных регионалистских конфликтов, те, кто сочувствует [FROM.GetNameDef], все больше завоевывают благосклонность общественности в Лянгуане, к огорчению руководства [ROOT.Capital.GetCapitalVictoryPointName]."
 GXC.earlygame.865.a: "Общественность приветствует этот первый шаг к объединению."
 GXC.earlygame.865.b: "Маршал Лу отвергает эту очевидную попытку подчинения."

 GXC.earlygame.866.t: "Лянгуан срывает наши усилия"
 GXC.earlygame.866.d: "Несмотря на значительные инвестиции в наши усилия воспользоваться ситуацией и расширить наше влияние в Лянгуане, региональные власти сорвали нашу схему своей бдительностью. Тем не менее, наша интрига стоила [ROOT.GetLeader] драгоценных ресурсов, которые можно было бы потратить с большей пользой в другом месте. На данный момент тем в Лянгуане, кто сочувствует нашему правительству, приходится оставаться на месте и не делать ничего, кроме как бороться в одиночку, пока мы не оправимся от этой неудачи."
 GXC.earlygame.866.a: "Перетягивание каната продолжается."

 GXC.earlygame.870.t: "[FROM.GetNameDefCap] давит на нас, требуя присягнуть на верность"
 GXC.earlygame.870.intro: "Мир, наступивший с провалом вторжения Гоминьдана в Лянгуан, никогда не должен был длиться долго, не с таким хрупким балансом сил между тремя сильными людьми: Лу Юйгуаном, Шэнь Хунъином и Чэнь Ляньбо. Хотя маршал Лу и хунта Молодой Гуанси изначально смогли выйти хозяевами Лянгуана после отражения сил Гоминьдана, их хватка над провинциями-близнецами столкнулась с вызовами со стороны региональных оппонентов, чему способствовало влияние внешних игроков."
 GXC.earlygame.870.closing: "Ставя на кон автономию Лянгуана и наследие своего отца, и столкнувшись с непреодолимым давлением преклонить колени или рискнуть гневом [FROM.Capital.GetCapitalVictoryPointName], маршал Лу обдумывает свой следующий курс действий, который повлияет на судьбу Старой клики Гуанси, а также провинций-близнецов."
 GXC.earlygame.870.d: "$GXC.earlygame.870.intro$\n\nПри мощной поддержке своих союзников из Чжили положение губернатора Шэнь Хунъина в Лянгуане значительно укрепилось в последнее время, он стал более способен противостоять доминированию Фракции Молодой Гуанси. Будучи ценным активом для [FROM.Capital.GetCapitalVictoryPointName] в регионе, возросшее влияние губернатора Шэня придало руководству [FROM.Capital.GetCapitalVictoryPointName] достаточную уверенность, чтобы начать оказывать давление на маршала Лу, требуя присягнуть на верность [FROM.GetNameDef].\n\n$GXC.earlygame.870.closing$"
 GXC.earlygame.871.d: "$GXC.earlygame.870.intro$\n\nНазначенный немцами мэром муниципального правительства Гуанчжоу, влияние Чэнь Ляньбо никогда не распространялось за пределы города Гуанчжоу и его непосредственных окрестностей. Однако при недавней помощи [FROM.Capital.GetCapitalVictoryPointName] региональное влияние Чэня выросло, особенно в Гуанси. С положением Чэня в регионе, казалось бы, обеспеченным, руководство в [FROM.Capital.GetCapitalVictoryPointName], похоже, обрело достаточную уверенность, чтобы давить на маршала Лу, требуя присягнуть на верность [FROM.GetNameDef].\n\n$GXC.earlygame.870.closing$"
 GXC.earlygame.872.d: "$GXC.earlygame.870.intro$\n\nИзначально поддерживаемый кликой Чжили, крах Чжили и приход к власти другого правительства в Пекине привели к тому, что губернатор Шэнь Хунъин оказался в изоляции без поддержки своих старых покровителей. Однако, в неожиданном повороте, [FROM.GetNameDef] решило продолжить поддержку губернатора Шэня в его стремлении править Лянгуаном в качестве своего нового покровителя. В результате влияние губернатора Шэня в Лянгуане усилилось, и Пекин, похоже, уверен в том, чтобы начать давить на маршала Лу, требуя присягнуть на верность [FROM.GetNameDef]\n\n$GXC.earlygame.870.closing$"
 GXC.earlygame.870.a: "Маршал Лу мобилизуется для защиты автономии Лянгуана!"
 GXC.earlygame.870.b: "Маршал Лу неохотно капитулирует перед [FROM.Capital.GetCapitalVictoryPointName]."

 GXC.earlygame.873.t: "Лянгуан стоит непокорно!"
 GXC.earlygame.873.d: "На протяжении большей части китайской истории Юг показывал, что обладает бунтарским духом, и постоянно бросал вызов Северу при любой возможности, от восстания тайпинов до Синьхайской революции. Это остается верным и сегодня, поскольку маршал Лу Юйгуан отстоял свою позицию и отказался прогнуться под давлением ради присоединения Лянгуана к нашему правительству.\n\nНесмотря на эту временную неудачу, наши усилия по расширению нашего влияния в провинциях-близнецах не были напрасными, поскольку по всему региону вспыхивают разрозненные восстания против хунты Молодой Гуанси, как изнутри армии Гуанси маршала Лу, так и возглавляемые нашими последователями в регионе. Тем не менее, ясно, что без нашего вмешательства это восстание было бы легко подавлено, полностью укрепив гегемонию Молодой Гуанси над Лянгуаном.\n\nСледовательно, было бы разумно начать вторжение в Лянгуан в этот краткий момент нестабильности, чтобы обеспечить наш контроль над Жемчужиной Юга. Однако в нашем правительстве также есть опасения, что такой вопиющий акт враждебности вызовет недоверие других милитаристов в других провинциях. Как бы то ни было, интрига в Лянгуане распутана, и его судьба близка."
 GXC.earlygame.873.a: "Юг был сокрушен однажды, мы сокрушим его снова!"
 GXC.earlygame.873.b: "Пусть сохраняют свою автономию, мы выждем время."

## NPA Narrative Event Chain (900-929):
 GXC.earlygame.900.t: "Восстание фракции Молодой Гуанси"
 GXC.earlygame.900.d: "Лу Жунстин был могущественным милитаристом в Гуанси, чья звезда так ярко сияла во время Войны в защиту республики, но медленно угасла во время Конституционного защитного правительства. Несмотря на свое низкое бандитское происхождение и окончательное поражение в битве, он оставался своего рода народным героем для многих, и после краха Северного похода он смог совершить политическое возвращение, подчинив своих соперников (главным образом Шэнь Хунъина) и восстановив контроль над Лянгуаном. После своей смерти в 1934 году он оставил свою империю своему любимому приемному сыну Лу Юйгуану, который был неохотно признан новым вице-королем Лянгуана Чжили и Старой кликой Гуанси.\n\nОднако реальной силой за Наньнином является триумвират, который формирует Фракцию Молодой Гуанси. Возглавляемые другим приемным сыном Лу Жунстина Ма Цзи, губернатором Гуанси и соратником У Пэйфу, вместе с генералами Линь Ху и Лю Чжилу, они и их офицеры доминируют в Старой клике Гуанси и, следовательно, в правительстве Лянгуана. Некогда Молодая гвардия Старой клики Гуанси, когда большинство старшего поколения умерло или ушло на пенсию (включая трех Великих героев Гуанси — Лу Жунстина, Чэнь Бинкуня и Цэнь Чуньсюаня), а Фракция армии Шэнь была вытеснена, ФМГ включает в себя смесь официально обученных военных, бывших бандитов и шэньши. Консервативные, регионалистские и милитаристские кланы Гуанси являются мощной силой.\n\nОднако это не мешает им быть дипломатичными. Фракция Молодой Гуанси известна тем, что в целом уважительно относится к Провинциальной ассамблее Гуанси и сотрудничает с указами Бэйяна, даже если они с подозрением относятся к превышению полномочий Чжили. Есть гражданские лица и интеллектуалы, сочувствующие их правлению, в том числе педагоги, такие как Ма Цзюньу, или различные деятели Клики политической науки, с которыми они работали на протяжении многих лет. Несмотря на яростную защиту местных прерогатив, у них также есть антиимпериалистическая жилка, отражающая растущий национализм в Китае."
 GXC.earlygame.900.a: "Лу Юйгуан и триумвиры продолжают наследие Лу Жунстина!"
 GXC.earlygame.900.b: "ФМГ работает над объединением всех кланов Гуанси."
 GXC.earlygame.900.c: "Через сотрудничество мы строим гражданское правительство."

 GXC.earlygame.901.t: "Армия Шэнь в Шаогуане"
 GXC.earlygame.901.d: "Шэнь Хунъин вырос бедным бандитом, прежде чем был завербован в армию Лю Чжэньхуаня. Во время Второй революции он встал на сторону Бэйянского правительства и предал генерала Лю, найдя работу и продвижение по службе под началом Лу Жунстина. После того, как Лу потерял власть во время войн Юэ-Гуй, он сделал ставку на лидерство в Гуанси со своей базы в Гуйлине при некоторой поддержке У Пэйфу и клики Чжили, только чтобы быть переигранным Ли Цзунжэнем и ориентированной на Гоминьдан Новой кликой Гуанси. Потерпев поражение, он бежал в изгнание, но смог вернуться в качестве вспомогательного члена клики Чжили после Северного похода. Хотя титул был обещан нескольким милитаристам одновременно, Чжили в конечном итоге остановились на Шэне как на своем губернаторе Гуандуна.\n\nШэнь никогда по-настоящему не мог править всей своей номинальной провинцией, тем более всем Лянгуаном. Гуандунские милитаристы сплотились в Гуанчжоу под своей провинциальной ассамблеей и отказались признать его. Тем временем он был разгромлен в битве с Лу Жунстином и потерял Гуйлинь. Лояльность его заместителей сомнительна — Ли Яохань и Гу Жингуан — гуандунские милитаристы, которые уже пытались отделиться от него однажды в 1923 году, но снова оказались под его командованием благодаря давлению со стороны Лиги. Аналогичным образом Ян Чисэн и Ян Жусюань — офицеры, родившиеся в Юньнани, перебежчики из лагеря Ян Симиня, которые оказались на службе у Чжили. И, таким образом, по крайней мере на данный момент, они служат Шэню.\n\nФракция армии Шэнь также имеет слабые связи с Кликой политической науки и Обществом Цзинсин. Однако КПН давно прошла свой расцвет в 1920-х годах, и многие из них тяготели к соперникам Шэня в Гуанчжоу, в первую очередь к Лю Чжэньхуаню, наставнику, с которым Шэнь поссорился. Общество Цзинсин, в целом более либеральное и западное, чем милитаристы, с которыми они работают, на самом деле связано с Шэнем только из-за немецких интересов в Лиге, от которых Шэнь зависит в плане власти. Пока мэр Чэнь Ляньбо контролирует Гуанчжоу, Шэнь никогда по-настоящему не будет править Гуандуном."
 GXC.earlygame.901.a: "Шэнь Хунъин и его близкие соратники консолидируются вокруг Гуйлиня."
 GXC.earlygame.901.b: "Без Чжили ему нужен Лу Юйгуан, чтобы помочь контролировать своих подчиненных."
 GXC.earlygame.901.c: "Губернатор Шэнь углубляет свои контакты в Гуанчжоу, чтобы утвердить свое лидерство."

 GXC.earlygame.902.t: "Политика города-государства Кантон"
 GXC.earlygame.902.d: "Кантонская система закончилась почти столетие назад, но Гуанчжоу остается ценным перевалочным пунктом. Когда немцы оккупировали его во время Северного похода, они поставили амбициозного бизнесмена Чэнь Ляньбо мэром, должность, которую он сохранил даже после того, как они окончательно ушли. Чэнь, надеясь избежать оккупации Гуанси, поспешно восстановил Гуандунскую армию с его восстановленным Торговым корпусом в качестве ядра.\n\nТорговые корпуса существуют по всему Китаю, являясь ответвлением местных торговых палат. В истерзанном войной Гуандуне торговцы стремились объединить различные ополчения в «Штаб совместной обороны» как альтернативу злоупотреблениям и вымогательству милитаристов. Членство не ограничивалось только торговцами: к нему присоединились владельцы малого бизнеса и другие гражданские лица, а позже и Ассоциация всех классов для спасения Гуандуна.\n\nКорпус стал главным противником революционного Гоминьдана, причем Чэнь Ляньбо и Чэнь Гуншу возглавляли жесткую «проактивную» фракцию, стремящуюся создать коалицию для изгнания Гоминьдана и создания Торгового правительства. Умеренную «пассивную» фракцию возглавлял Дэн Цзеши, который предостерегал безрассудных Чэней от того, чтобы «обманом» втянуть массы в восстание. Говорят, что Гань Лючи из Торговой газеты сделал похожее предупреждение, отметив, что даже если они победят Сунь Ятсена, власть в Гуандуне перейдет в руки Фань Шишэна или Чэнь Цзюнмина.\n\nИрония в том, что, несмотря на то, что Торговцы обхаживали их и пытались использовать свое положение посредника между Торговцами и Гоминьданом, милитаристы родом из Юньнани Фань Шишэн и Ляо Синчао перешли на сторону Гоминьдана, как только им предложили лучшую сделку. В какой-то момент Сунь Ятсен сказал: «Вряд ли можно быть таким же лояльным и компетентным, как эти двое!»\n\nТорговцы искали сотрудничества с Чжили, но поскольку Чжили поддерживали милитаристов Старой Гуанси, Чэнь Ляньбо начал обращаться к международной помощи и Фэнтяньской клике. Его амбиции по созданию Торгового правительства в Лянгуане не померкли со временем."
 GXC.earlygame.902.a: "Чэнь Ляньбо готовит Гуанчжоу к затяжному конфликту."
 GXC.earlygame.902.b: "АВКДСГ сотрудничает с другими гражданскими группами для легитимности."
 GXC.earlygame.902.c: "Заключение сделок с милитаристами и иностранцами — единственный способ выжить."

 GXC.earlygame.903.t: "Милитаристы, демократы и социалисты"
 GXC.earlygame.903.d: "«Демократическая» интеллигенция в Китае гораздо более податлива, чем многие ожидали бы, и с готовностью желает работать в системе милитаристов в обмен на деньги и влияние. Более успешные милитаристы, такие как Чжили, смогли культивировать имидж прогресса и использовать его в своих интересах против кажущейся ограниченной Фэнтяньской клики. Знание того, что сказать и когда пойти на уступки, может иметь большое значение для обеспечения их поддержки без ущерба для какой-либо основной политики.\n\nУ ученых в Китае есть определенные ожидания относительно их отношений с властями предержащими. Старые конфуцианские литераторы были идеализированы за то, что давали мудрые советы императору и его губернаторам, даже не занимая официальных государственных постов. Даже после падения монархии и вовлечения Китая в конфликт милитаристов эти отношения между учеными и милитаристами часто продолжались. В Лянгуане много ученых, которые готовы работать с милитаристами, особенно против их общего врага в лице тирании центрального правительства.\n\nСоциалисты, с другой стороны, представляют собой опасность, которую необходимо подавить. Не каждый социалист является членом Гоминьдана, и не каждый член Гоминьдана является социалистом, но закоренелые революционеры предпочитают погибнуть в бою, чем признать, что их движение окончено. Хотя некоторые из старой Национально-революционной армии могут быть благополучно приняты в наши ряды, попытки различных милитаристов сотрудничать с социалистическими элементами всегда заканчивались насильственным предательством."
 GXC.earlygame.903.a: "Гибкая КПН объединяется с Торговцами, на данный момент."
 GXC.earlygame.903.b: "Фракция армии Шэнь поглощает территорию Чэнь Цзюнмина."
 GXC.earlygame.903.c: "Фракция Молодой Гуанси идет на определенный риск ради легитимности."

 GXC.earlygame.904.t: "Губернатор и Ассамблея"
 GXC.earlygame.904.d: "Власть в Гуандуне была разделена между Фракцией армии Шэнь на севере со штаб-квартирой в Шаогуане и Торговым правительством Чэнь Ляньбо на юге, сосредоточенным вокруг Гуанчжоу. Шэнь Хунъин, будучи изгнанным из своей традиционной базы в Гуйлине, утверждает, что он губернатор, в то время как мэра Чэня поддерживает Провинциальная ассамблея Гуандуна. Этот тупик поддерживался режимами Лу Жунстина, а затем Лу Юйгуана, надеясь сохранить более богатый Гуандун разделенным и покорным их правительству, базирующемуся в Гуанси.\n\nПоражение Чэнь Цзюнмина и его армии Юэ в битве несколько лет назад создало возможность для кого-то захватить преимущество. Его силы, расположенные в основном на востоке вокруг уезда Хайфэн, с тех пор распались, а его союзники были поспешно поглощены либо армиями Шэнь Хунъина, либо Чэнь Ляньбо. Но переплетение деревень, ориентированных на Шаогуань и Гуанчжоу, нестабильно, и часто кажется, что конфликт может вспыхнуть в любой момент.\n\nНаньнин, конечно, будет работать над тем, чтобы не допустить уничтожения одной стороны другой, но возможность получить преимущество есть, вопрос только в том, кто ею воспользуется."
 GXC.earlygame.904.a: "Армия Шэнь, обученная немцами, громит ополчение Торговцев."
 GXC.earlygame.904.b: "Ветераны армии Юэ объединяются со своими земляками против Гуанси."

 GXC.earlygame.905.t: "Борьба за власть над Старой Гуанси"
 GXC.earlygame.905.d: "Когда Лу Жунстин был изгнан из Наньнина Сунь Ятсеном и Чэнь Цзюнмином в 1921 году, это позволило соперничающим кланам Гуанси бросить ему вызов за господство в течение следующих нескольких лет. Хотя Лу поначалу оставался доминирующим, Шэнь Хунъин и его люди объединились с Ли Цзунжэнем и его кликой, чтобы победить его, прежде чем генерал Шэнь был в свою очередь побежден Новой кликой Гуанси, поддерживаемой Гоминьданом. Даже после того, как Лу Жунстин смог вернуться после Северного похода, враждебность сохранялась между Лу и его правительством, базирующимся в Наньнине, и Шэнем, который укрепился в Гуйлине.\n\nКогда Южная Чжили была отвлечена Шанхайским восстанием 1932 года, Лу Жунстин воспользовался хаосом, вытеснив силы Шэнь Хунъина из Гуйлиня и заставив его признать себя вице-королем Лянгуана. Но со смертью Лу Жунстина его приемные сыновья и их союзники не обладают той же серьезностью, что и пожилой вице-король Лу. Шэнь планирует переманить различные кланы Гуанси на свою сторону. Это займет время, но схватка между вице-королем и его губернатором кажется неизбежной."
 GXC.earlygame.905.a: "Память о Лу Жунстине сохраняет единство Гуанси."
 GXC.earlygame.905.b: "Молодой маршал — недостойный преемник."

 GXC.earlygame.906.t: "Богатство и власть"
 GXC.earlygame.906.d: "Отношения между двумя Гуанами испортились за эти годы, взаимно жестокие оккупации нанесли ущерб тесно переплетенным провинциям. В то время как Лу Юйгуан и Фракция Молодой Гуанси работают над обеспечением «хорошего управления» для народа и утверждением своей власти над Гуандуном, они сталкиваются с Чэнь Ляньбо и его Гуанчжоуским торговым правительством, которые стремятся защитить автономию Кантона и свои деловые интересы вдоль Жемчужной реки.\n\nКонтрабанда стала главной горячей точкой между Лу и Чэнем. Поскольку Фракция Молодой Гуанси пытается обложить Гуандун более высокими налогами для финансирования армии, торговцы ответили введением некоторых собственных налогов для граждан Гуанси. Несмотря на то, что Торговый корпус является ополчением, его не следует воспринимать легкомысленно — многие из их людей обучены и возглавляются ветеранами войны, и они могут позволить себе импортное западное оружие. У них также репутация жестоких, казнящих подозреваемых социалистов, а некоторые даже обвиняют их в изъятии органов. В политическом плане они также могут быть цепкими: сражаясь с Гоминьданом, они распространяли письма с нападками на Три принципа и настаивали на том, что Гоминьдан провоцирует распри среди китайцев, обогащая иностранных империалистов.\n\nЕсли хунта Наньнина захочет подорвать их, самой легкой мишенью, вероятно, станет Ли Фулинь, амбициозный милитарист, который работал с Торговцами, используя свою личную армию для создания рэкета, прежде чем присоединиться к Гоминьдану в качестве их Пятой армии, когда ситуация изменилась, только чтобы снова присоединиться к Торговцам после окончания немецкой оккупации. Говорят, что он вернулся к своим старым трюкам, обеспечивая «охрану» торговых караванов и контрабандистов в Гуанси."
 GXC.earlygame.906.a: "Наньнин ликвидирует сеть Ли Фулиня, чтобы продемонстрировать превосходство."
 GXC.earlygame.906.b: "Дипломатия с Гуанчжоу положит конец этой бесконечной китайской междоусобице."

 GXC.earlygame.907.t: "Хайнаньский конфликт"
 GXC.earlygame.907.d: "Хотя худшие последствия Черного понедельника начали исчезать, в Гуанчжоу и других городах Гуандуна все еще много безработных, особенно тех, кто потерял работу за границей и был вынужден вернуться домой в истерзанную войной страну с небольшими возможностями или социальными услугами. Провинциальное правительство, со своей стороны, попыталось облегчить проблему бездомных, уполномочив монетный двор, Департамент финансов и тайно армию помочь им найти работу.\n\nПосле обсуждений было решено направить наемных рабочих на полуостров Лэйчжоу и остров Цюнъя (Хайнань), территорию, оспариваемую между местными милитаристами и бандитами. Многие рабочие погибли, пытаясь расчистить леса, из-за плохих условий и бандитских налетов. Регион разделен между территорией, удерживаемой соперничающими милитаристами Линь Ху и Лю Чжэньхуанем на материке, и Цюнъя автономным милитаристом Дэн Бэньинем, который много лет назад изгнал командира гарнизона Старой клики Гуанси Хэ Фучана, прежде чем укрепить свою власть над островом.\n\nЛу Юнгао, отставной военачальник Старой Гуанси, известный своим подвигом по сбору 20 000 кэтти военного риса и помощью в отвоевании Наньнина в 1922 году, был поручен этот проект, но недавно заболел. И Лю, и Дэн связаны с Гуандунской фракцией Чэнь Ляньбо, и говорят, что они усиливают свое сопротивление вмешательству Старой Гуанси. Учитывая трудности, возможно, стоит отступить."
 GXC.earlygame.907.a: "Пора нам сократить наши потери на юге."
 GXC.earlygame.907.b: "Старая клика Гуанси навяжет свою власть!"

 GXC.earlygame.908.t: "Единство и самоуправление"
 GXC.earlygame.908.d: "Лянгуан, главная провинция Южного Китая, долгое время был очагом культурного и политического суверенитета от остальных многочисленных провинций Китая. Со времен сопротивления династии Сун монголам, до освобождения Китая династией Мин от унижения варварского правления, их давнего сопротивления вторжениям чжурчжэней, и до настоящего времени — родины китайского республиканизма и оппозиции олигархам и автократам Пекина.\n\nЛидеры различных клик, таких как Старая фракция Гуанси и армия Шэнь, гордятся своей региональной независимостью. Воздерживаясь от объявления прямого отделения, поскольку многие действительно являются истинными китайскими националистами и ярыми республиканцами, они привержены объединению китайской страны на своих собственных условиях, а не от партийных диктатур, таких как Гоминьдан, или нереалистичных мечтаний о федералистской стране. Скорее, объединение должно будет произойти на их собственных условиях и, вероятно, с кончиков штыков их солдат. Шансы, конечно, всегда против этих республиканцев, но когда дело свободы достигалось легко?"
 GXC.earlygame.908.a: "Сначала мы должны объединиться под руководством маршала Лу, если хотим объединить нацию!"
 GXC.earlygame.908.b: "Как мы можем ожидать самоуправления, если не можем управлять собой?"

 GXC.earlygame.909.t: "Четвертое мая и милитаристы"
 GXC.earlygame.909.d: "То, что началось как студенческое движение в университетах Пекина (Пекинском и Цинхуа) в ноябре (мае) 1919 года, вскоре переросло в общенациональные беспорядки и протесты против империализма. Утечка и публикация различных телеграмм Антанты, обещающих японские и немецкие концессии в Шаньдуне в результате их ухудшающегося положения в Мировой войне, разожгли яростные антиимпериалистические настроения, и многие по всей стране опасались, что Китай снова будет расчленен. Дух Синьхайской революции, призванный изгнать империализм и модернизировать страну, казалось, был на грани распада после краткого правления Юань Шикая и перспективы того, что многовековая цивилизация будет разорвана в клочья по прихоти иностранных империалистов.\n\nОднако протесты Четвертого мая не просто зажгли пламя более широкого антиимпериалистического движения. Страстные революционные писатели, такие как Ху Ши, Ли Дачжао и Цай Юаньпэй, взяли на себя задачу принять «Движение за новую культуру», период быстрого интеллектуального любопытства, который отстаивал интеллектуальные триумфы, политический и общественный либерализм и принятие современных норм и обычаев. Однако их революция также сдерживалась консервативными националистами, которые стремились возродить положение Китая в мире, но также уменьшить избыток культурного вырождения. Провинциальные милитаристы Гуандуна, как правило, в значительной степени симпатизировали идеологическим течениям гораздо более консервативного движения Четвертого мая; отстаивая национальную индустриализацию и модернизацию, синтезированную с растущим китайским национализмом, а не полное осуждение китайской культуры. Поскольку наступил новый год, и положение Лянгуана снова определяется ветрами судьбы, единая политика в отношении того, как интерпретировать Движение Четвертого мая, несомненно, мобилизует поддержку от различных идеологических и политических фракций, преодолевая их разногласия и возглавляя атаку за истинное республиканское объединение для остального Китая."
 GXC.earlygame.909.a: "Только через модернизацию мы спасем нашу нацию!"
 GXC.earlygame.909.b: "Мы боремся за спасение не только нашей нации, но и нашей культуры!"

