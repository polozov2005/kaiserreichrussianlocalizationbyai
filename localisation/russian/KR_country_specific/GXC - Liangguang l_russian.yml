##Elders Clique Characters

 #胡漢民
 GXC_hu_hanmin: "Ху Ханьминь"
 GXC_hu_hanmin_bio: "Стойкий, неподкупный, упрямый. Много слов можно использовать для описания самого непреклонного протеже доктора Сунь Ятсена, и с такой карьерой это неудивительно. Один из самых выдающихся государственных деятелей Гоминьдана, Ху Ханьминь был одаренным учеником, овладевшим каллиграфией уже к 13 годам. Во время своей ранней преподавательской карьеры в 16 лет Ху увлекся трудами Кан Ювэя и Сунь Ятсена, а в 1900 году, когда его близкий друг Ши Цзяньжу стал мучеником, Ху утвердился в решимости вести революционную борьбу за спасение нации.\n\nУчась в Японии вместе с такими людьми, как Ван Цзинвэй, Ху встретил Ляо Чжункайя и помог в основании Тунмэнхоя, впервые встретившись со своим наставником, доктором Сунь Ятсеном. Очарованный этим человеком, Ху стал его самым ортодоксальным учеником, сопровождая Сунь Ятсена повсюду, куда бы тот ни пошел.\n\nСтав главнокомандующим военного правительства Гуандуна во время Синьхайской революции, Ху курировал первое воплощение принципов доктора Сунь Ятсена в стране. Помогая Сунь Ятсену как в его южных революционных правительствах, так и в проведении реорганизации 1924 года, Ху превратился в архонта «правых» сил партии, хотя сам сохранял центристскую позицию. Когда Сунь Ятсен умер в 1925 году, Ху присоединился к Ван Цзинвэю у его смертного одра, и этот дуэт, наряду с Чан Кайши, вступил в ожесточенную борьбу друг с другом за право стать его преемником.\n\nСтав исполняющим обязанности генералиссимуса в последующий период, Ху в результате интриг был понижен в должности, а после покушения на Ляо Чжункайя ему удалось избежать обвинений, несмотря на родственные связи с убийцей. Однако в том же году он был фактически выслан во Францию, а после последствий Конференции в горах Сишань переехал в Шанхай вместе с остальными участниками конференции. Позже он бежал, чтобы создать соперничающий Комитет в Москве."
 GXC_hu_hanmin_leader_desc: "§YРодился:§! §L9 декабря 1879 года в Паньюй, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_hu_hanmin_bio$\n\nВновь ступив на китайскую землю после двух десятилетий изгнания, титан Гоминьдана снова ободрил своих правых союзников, как новых, так и старых. Обладая огромным политическим опытом и поддержкой Национально-революционной армии, Ху доблестно шагает вперед как ортодоксальный преемник доктора Сунь Ятсена.§!"
 GXC_hu_hanmin_sic_desc: "§YРодился:§! §L9 декабря 1879 года в Паньюй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gКлика старейшин§!\n§YБиография:§! §L$GXC_hu_hanmin_bio$\n\nВернувшись на передовую после периода пребывания на задворках политики, самый ортодоксальный преемник доктора Сунь Ятсена вновь оказался у руля Национальной революции. И на этот раз он исполнит свой революционный долг до конца.§!\n\n§YЗаметки: Ху видит себя «молодым учеником старого мастера», защитником политической и социальной миссии доктора Сунь Ятсена, толкователем революционного дела.§!"
 GXC_hu_hanmin_advisor_desc: "§YРодился:§! §L9 декабря 1879 года в Паньюй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gКлика старейшин§!\n§YБиография:§! §L$GXC_hu_hanmin_bio$\n\nВернувшись на передовую после периода пребывания на задворках политики, самый ортодоксальный преемник доктора Сунь Ятсена вновь оказался в роли помощника правительства Национальной революции. И на этот раз он исполнит свой революционный долг до конца.§!\n\n§YЗаметки: Ху видит себя «молодым учеником старого мастера», защитником политической и социальной миссии доктора Сунь Ятсена, толкователем революционного дела.§!"

 #李文範
 GXC_li_wenfan: "Ли Вэньфань"
 GXC_li_wenfan_sic_desc: "§YРодился:§! §L20 октября 1884 года в Наньхае, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gКлика старейшин§!\n§YБиография:§! §LЯрый демократический революционер Ли Вэньфань начал свою республиканскую карьеру в 1905 году, когда после учебы в Японии за свой счет в предыдущие годы стал членом Тунмэнхоя. Вскоре после этого Вэньфань вернулся в Китай, чтобы работать преподавателем в Гуандунской школе права и политики, одновременно возглавляя гуандунское отделение операций Тунмэнхоя и даже участвуя в коротком Втором восстании в Гуанчжоу.\n\nПосле Синьхайской революции Ли стал генеральным секретарем Департамента военных дел провинции Гуандун и активно выступал против неудачной попытки Юань Шикая восстановить монархию, участвуя в Войне в защиту республики. К сентябрю 1924 года Ли был назначен директором Департамента правительственных дел провинции Гуандун при Ху Ханьмине, а позже занимал пост генерального секретаря Национального правительства. Верный союзник и друг Ху Ханьминя, Ли Вэньфань считается своего рода протеже и ключевой фигурой в Клике старейшин.§!"

 #于右任
 GXC_yu_youren: "Юй Южэнь"
 GXC_yu_youren_advisor_desc: "§YРодился:§! §L11 апреля 1879 года в Саньюане, провинция Шэньси, Великая Цин§!\n§YПринадлежность:§! §gКлика старейшин§!\n§YБиография:§! §LЗнаменитый каллиграф, писатель и убежденный республиканец, Юй Южэнь в ранние годы учился в различных учреждениях: академии Саньюань Хундао, академии Цзинъян Вэйцзин и академии Сиань Гуаньчжун. В итоге Южэнь был признан ученым в возрасте 17 лет, а позже получил степень цзюйжэня в возрасте 23 лет. В 1904 году Южэнь опубликовал «Стихи из терема полуплача-полусмеха», высмеивающие текущее состояние Великой Цин, в результате чего власти Цин объявили за него награду. Во время поездки в Японию в 1906 году Южэнь встретил доктора Сунь Ятсена, впоследствии присоединившись как к Гуанфухуэй, так и позже к Тунмэнхою.\n\nПо возвращении в Китай Южэнь основал множество журналистских агентств с целью распространения антицинских настроений. После Синьхайской революции Южэнь недолго занимал пост заместителя министра транспорта во временном правительстве доктора Сунь Ятсена и последовал за ним в изгнание в следующем году. Позже Южэнь вернулся в свою родную провинцию в 1918 году, будучи главнокомандующим Армией Цзинго, много лет сражаясь с милитаристами региона. Основав Шанхайский университет в 1922 году, Южэнь позже посетил Первый национальный конгресс Гоминьдана в 1924 году и вскоре сопроводил Сунь Ятсена на север в Пекин.\n\nНакануне провального Северного похода Южэнь попытался сплотить северный Гоминьдан и Гоминьцзюнь Фэн Юйсяна для поддержки наступления южного Гоминьдана, но без особого успеха. Хотя он особо не связан ни с одной фракцией, Южэнь наиболее тесно примыкает к ортодоксальной Клике старейшин, но остается нейтральной фигурой.§!\n\n§YЗаметки: Мастер скорописи, Южэнь известен как «Современный мудрец скорописи» и «Мудрец современной каллиграфии», считаясь одним из «Четырех великих каллиграфов» среди своих коллег-республиканцев.§!"

 #古應芬
 GXC_gu_yingfen: "Гу Инфэнь"
 GXC_gu_yingfen_bio: "Родившийся в богатстве и получивший хорошее образование, молодой Гу Инфэнь быстро подружился со своими соотечественниками, отправленными на учебу в Японию — Ху Ханьминем и Ван Цзинвэем. С тех пор Гу Инфэнь посвятил жизнь Тунмэнхою, а затем Гоминьдану, став неотъемлемой частью организации как Синьхайской, так и Второй революции 1911 и 1913 годов, провал последней из которых привел его к изгнанию. Стремясь продолжить свои усилия, Гу сыграл решающую роль в сборе средств для партии в Юго-Восточной Азии.\n\nВернувшись домой в 1917 году, Гу взял на себя задачу попытаться примирить стремительно ухудшающиеся отношения между доктором Сунь Ятсеном и Чэнь Цзюнмином. Его усилия были тщетны, и в конечном итоге он остался верен доктору Сунь Ятсену, выступив против Чэнь Цзюнмина. С тех пор Гу занимал различные финансовые должности в правительстве Гоминьдана, вплоть до провала Северного похода, после чего он снова ушел в тень, выступая в качестве финансового покровителя остатков Гоминьдана.\n\nКак один из старейших членов Гоминьдана, Гу Инфэнь является решительным сторонником уничтожения внутрипартийной фракционности, но также охотно разделяет свое презрение к Левому комитету. Ортодоксальный в своем подходе, Гу с пренебрежением относится к популистской риторике левых. Кроме того, Гу сыграл значительную роль в обеспечении возвращения Ху Ханьминя в Китай, так как он имеет обширные связи и отношения наставника с Чэнь Цзитаном."
 GXC_gu_yingfen_advisor_desc: "§YРодился:§! §L1873 год, в Гуанчжоу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gКлика старейшин§!\n§YБиография:§! §L$GXC_gu_yingfen_bio$§!"
 GXC_gu_yingfen_leader_desc: "§YРодился:§! §L1873 год, в Гуанчжоу, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_gu_yingfen_bio$§!"

 #顏漢章
 GXC_ma_chaojun: "Ма Чаоцзюнь"
 GXC_ma_chaojun_advisor_desc: "§YРодился:§! §L17 октября 1886 года в Гуанчжоу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gКлика старейшин§!\n§YБиография:§!§L Родившийся в довольно бедной семье, Ма Чаоцзюнь стремился продвинуться в китайском обществе, учась, чтобы стать ученым-чиновником, и сдав детский экзамен. Однако, сменив направление, в возрасте 15 лет он переехал в Гонконг, посещая вечернюю школу для изучения английского языка, а в следующем году переехал в Соединенные Штаты, обучаясь в школе механиков в Сан-Франциско.\n\nВо время своего пребывания в Соединенных Штатах он присоединился как к китайскому федералистскому движению, так и позже, встретив доктора Сунь Ятсена, к Тунмэнхою. Последовав за доктором Сунь Ятсеном в Японию, а затем в Гонконг, Ма Чаоцзюнь использовал свой опыт в области машиностроения, чтобы основать Китайский союз машиностроителей и различные другие локальные профсоюзные организации.\n\nСлужа дипломатом во время Синьхайской революции, где он успешно убедил армию провинции Хубэй перейти на сторону революции, Ма Чаоцзюнь работал советником Ли Юаньхуна, но позже был арестован из-за своей оппозиции Юань Шикаю. После побега из тюрьмы с помощью революционеров, Ма Чаоцзюнь служил в правительстве доктора Сунь Ятсена в Гуанчжоу в 1917 году, в котором курировал организацию рабочего движения, выполняя различные функции, связанные с координацией между рабочими и правительством.\n\nНаходясь в оппозиции к различным левым фигурам, таким как Чэнь Миншу, и поддерживая таких людей, как Сунь Фо и Ху Ханьминь, Ма Чаоцзюнь последовал за Ху Ханьминем и его Комитетом в изгнание в Москву. Укрепив свои позиции в качестве эффективного управляющего трудовыми ресурсами во время работы в правительстве доктора Сунь Ятсена, он снова вернулся к роли координатора трудовых ресурсов, обеспечивая полную поддержку Гоминьдана и его военных усилий со стороны различных профсоюзов Китая.§!"

##New Guangdong Clique Characters
 #陳濟棠
 GXC_chen_jitang: "Чэнь Цзитан"
 GXC_chen_jitang_bio: "Родившийся в семье, которая занималась земледелием на протяжении поколений, Чэнь Цзитан в юном возрасте получил то, что считалось традиционным конфуцианским образованием. В 1907 году, в возрасте 17 лет, он поступил в начальную военную школу Гуандуна, начав свой путь в мире военной политики. Во время его пребывания в школе один из инструкторов — Дэн Чжунъюань — познакомил Чэня и его одноклассника — известного Дэн Яньда — с революционной политикой Тунмэнхоя доктора Сунь Ятсена.\n\nС этого момента вовлеченный в революционную политику, Чэнь принял участие в Синьхайской революции, а позже оказался под командованием Линь Ху, получив повышение от командира роты до командира батальона. В 1920 году Чэнь был переведен в новую Первую дивизию Гуандунской армии, однако после предательства Чэнь Цзюнмином доктора Сунь Ятсена непосредственный начальник Чэня, Чэнь Миншу, ушел в отставку, и Чэнь Цзитан был повышен, чтобы занять его место.\n\nСчитая себя «стойким последователем Сунь Ятсена», Чэнь критически относился к присутствию Интернационала в правительстве, что в конечном итоге привело к тому, что Чэнь примкнул к правому крылу партии Ху Ханьминя.\n\nУчаствуя в войнах Юэ-Гуй, Чэнь служил командиром дивизии Новой 4-й армии НРА, добившись заметных успехов в Восточном и Южном походах. Тем не менее, несмотря на доблестные усилия в Северном походе, Чэнь оказался вместе со своей любимой провинцией в осаде, а Четвертая армия в конечном итоге распалась на повстанческие группы, и он и его соратники растворились в гуандунском истеблишменте. Проявив доблесть в серии войн вокруг своей родной провинции, «Небесный король Юга» чествуется как истинный герой народа Гуандуна и знает правильные методы для эффективной организации своих войск."
 GXC_chen_jitang_sic_desc: "§YРодился:§! §L12 февраля 1890 года в Фанчэнгане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gНовая гуандунская клика§!\n§YБиография:§! §L$GXC_chen_jitang_bio$§!"
 GXC_chen_jitang_leader_desc: "§YРодился:§! §L12 февраля 1890 года в Фанчэнгане, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_chen_jitang_bio$§!"

 #陳維周
 GXC_chen_weizhou: "Чэнь Вэйчжоу"
 GXC_chen_weizhou_high_command_desc: "§YРодился:§! §L1888 год, в Фанчэнгане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gНовая гуандунская клика§!\n§YБиография:§! §LУроженец Гуандуна до мозга костей, Чэнь Вэйчжоу сопровождал своего брата — Чэнь Цзитана — на его различных должностях в разных армиях, всегда служа на второстепенных вспомогательных ролях или выполняя поручения своего брата. Хотя номинально он является членом Гоминьдана, его истинная преданность принадлежит его родной провинции, и поэтому, когда начался Северный поход, Чэнь Вэйчжоу решил остаться на месте со своим братом, помогая ему отбиваться от остатков Гуандунской армии Чэнь Цзюнмина и в более поздней отчаянной обороне Четвертой армии против немецкого наступления. Последовав за Чэнь Цзитаном в примирении с Чэнь Ляньбо, он приобрел значительное влияние, управляя реками и береговой линией Гуандуна, действуя как военно-морской актив Чэнь Цзитана.§!\n\n§YЗаметки: Довольно корыстный человек и аполитичный в душе, Чэнь Вэйчжоу получил многочисленные обвинения в коррупции и контрабанде от более благородных людей в Гуандуне, а его способности к морской войне оставляют желать лучшего. Несмотря на это, Чэнь Цзитан продолжает защищать своего брата и будет делать это до тех пор, пока физически не станет неспособен.§!"

 #黄光銳
 GXC_huang_guangrui: "Хуан Гуанжуй"
 GXC_huang_guangrui_air_chief_desc: "§YРодился:§! §L5 июня 1898 года в Тайшане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gНовая гуандунская клика§!\n§YБиография:§! §LРодившийся в семье зарубежных китайцев, Хуан Гуанжуй был почти сразу увезен в Соединенные Штаты в юном возрасте. Во время пребывания в Штатах он поступил в Американскую летную школу, основанную его соотечественником Цай Сыду, получив лицензию пилота США. В 1917 году по рекомендации американского отделения Гоминьдана Хуан Гуанжуй также поступил на службу в авиастроительную компанию Guoqiang, а позже в том же году вступил в Гоминьдан.\n\nВ 1921 году он завершил свое обучение, поступив в Летную школу Северной Калифорнии, а в следующем году он сопровождал группу курсантов-пилотов из числа зарубежных китайцев, вернувшихся в Гуанчжоу с несколькими самолетами, чтобы присоединиться к растущим ВВС Гоминьдана. На протяжении своей смелой службы он служил капитаном Первых военно-воздушных сил Офиса Генералиссимуса и участвовал в подавлении восстания Чэнь Цзюнмина против доктора Сунь Ятсена, лично совершив множество вылетов против сил федералистов.\n\nВ последующие годы он служил директором авиационного бюро базового лагеря, летным инструктором Центральной авиационной школы, а затем директором этого же учреждения. В связи с предстоящим Северным походом, в 1926 году он был отправлен в Россию для закупки самолетов и обучения в тамошних авиационных школах.\n\nПозже он вернулся в Китай, чтобы служить в Северном походе в качестве капитана 1-го батальона ВВС Гуандуна. После краха Северного похода Хуан Гуанжуй последовал за Чэнь Цзитаном в Гуандун, чтобы служить при новом правительстве Юэ, работая над помощью новым ВВС Гуандуна — став теперь, скрепя сердце, союзником Чэня.§!"

 #范漢傑
 GXC_fan_hanjie: "Фань Ханьцзе"
 GXC_fan_hanjie_high_command_desc: "§YРодился:§! §L29 октября 1894 года в Дабу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gНовая гуандунская клика§!\n§YБиография:§! §LСпособный командир с юных лет, Фань Ханьцзе учился в Политехнической школе Гуанчжоу и Школе геодезии и картографии Гуандуна, позже вступив в Гуандунскую армию Чэнь Цзюнмина, где служил командиром взвода, командиром роты, майором штаба и командиром батальона. В 1918 году Фань Ханьцзе служил военным комиссаром Главного штаба Гуандунской армии — в это время у него сложились отличные отношения с директором склада Чан Кайши. Присоединившись к борьбе против восстания Чэнь Цзюнмина в 1923 году, он служил старшим офицером штаба армии Гуанси Лю Чжэньхуаня, командующим Шестой походной армией и позже даже уездным магистратом уезда Саньшуй.\n\nВ 1924 году по рекомендации Лю Чжэньхуаня и Цзоу Лу Фань Ханьцзе подал заявление в Военную академию Вампу, поступив в четвертую команду первой фазы обучения, став единственным кадетом первой фазы, достигшим звания генерал-майора. Добившись больших успехов в академии Вампу, Фань Ханьцзе продолжил службу в качестве майора штаба Первой дивизии Гуандунской армии.\n\nУчаствуя в Северном походе, Фань Ханьцзе отличился во множестве сражений, несмотря на неравенство сил — даже наладив связи с коллегами-генералами Чэнь Миншу и Цзян Гуаннаем. Однако по мере того, как немецкое наступление гремело вперед, Фань Ханьцзе последовал за Чэнь Цзитаном обратно в Гуандун — и, будучи военным до мозга костей, предоставил свой опыт для различных армейских реформ, предпринятых Чэнь Цзитаном.\n\nХотя ему не хватает номинального опыта руководства войсками в новую эпоху, Фань Ханьцзе проявил смелое упорство и отличный потенциал перед лицом превосходящих противников и точно знает, как извлечь максимум из своих людей в любой ситуации.§!"

 #李楊敬
 GXC_li_yangjing: "Ли Янцзин"
 GXC_li_yangjing_high_command_desc: "§YРодился:§! §L11 марта 1894 года в Дунгуане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gНовая гуандунская клика§!\n§YБиография:§! §LВыходец из бедной семьи, прилежный Ли Янцзин окончил начальную военную школу в Хуанпу, где встретил своего друга на всю жизнь Чэнь Цзитана. После изучения пехотного дела и недолгой службы младшим офицером в Гуандунской армии, он отправился в Учан и вступил в Тунмэнхой в 1914 году, приняв участие в восстании в Наньчане во время Войны в защиту республики против Юань Шикая. Перед тем как начать обучение в шестом классе Пекинского университета в 1919 году, он два года изучал логистику в 6-м классе Военной академии Баодин в 1917 году.\n\nЛи Янцзин вернулся в свою родную провинцию в качестве штабного офицера в звании майора и стал командиром полковой охраны доктора Сунь Ятсена в 1921 году. Год спустя, когда Чэнь Цзюнмин подверг бомбардировке и осадил революционную штаб-квартиру доктора Сунь Ятсена и его резиденцию, Ли Янцзин, который лично сопровождал мадам Сунь (Сунь Цинлин) и с боем пробивался из мятежа, был ранен в бою и был вынужден годами восстанавливаться в Гонконге.\n\nЭтот храбрый и хорошо обученный солдат возобновил свою военную карьеру, когда друг Ли, Чэнь Цзитан, стал командиром 11-й дивизии НРА в 1925 году, а Ли был назначен его начальником штаба в звании полковника. Хотя дивизия Чэня оставалась в Гуандуне во время Северного похода, Ли все же участвовал в серии безнадежных сражений, когда немецкие войска высадились в Китае. Впоследствии Ли Янцзин последовал за Чэнь Цзитаном и помогал ему в ведении военных дел. Как давний последователь и друг Чэня, Ли всегда будет подчиняться его приказам и поддерживать их.§!"

 #余漢謀
 GXC_yu_hanmou: "Юй Ханьмоу"
 GXC_yu_hanmou_high_command_desc: "§YРодился:§! §L22 сентября 1896 года в Гаояо, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gНовая гуандунская клика§!\n§YБиография:§! §LРодившийся в обедневшей семье торговца солью, Юй Ханьмоу закончил начальное обучение в возрасте 14 лет и поступил в Начальную военную школу Гуанчжоу в 1910 году, продолжив обучение в Офицерской школе Баодин в 1916 году. Во время пребывания в Баодине Юй Ханьмоу вступил в Гоминьдан и позже окончил учебу в 1919 году. Служа на различных должностях в качестве пехотного офицера, командира взвода и командира роты в Бэйянской армии, Юй перешел в Гуандунскую армию в 1920 году в качестве командира батальона.\n\nПосле реорганизации Гуандунской армии в Четвертую армию Национально-революционной армии Юй служил командиром 31-го полка 11-й дивизии, его непосредственным начальником был Чэнь Цзитан, с которым у него завязались связи на всю жизнь. Участвуя в войнах Юэ-Гуй, Юй прошел свое истинное боевое крещение в огне обреченного Северного похода, сражаясь доблестно, но в конечном итоге безуспешно.\n\nКогда Гоминьдан рушился и распадался на различные разрозненные повстанческие группы, Юй продолжал верно следовать за своими сослуживцами-офицерами Новой 4-й армии Фань Ханьцзе и Чэнь Цзитаном в Гуандун, в конечном итоге позиционируя себя в первую очередь как гуандунских регионалистов, и лишь во вторую — как революционеров Гоминьдана.§!"

##New Guangxi Clique Characters
 #李宗仁
 GXC_li_zongren: "Ли Цзунжэнь"
 GXC_li_zongren_bio: "Ли Цзунжэнь является одним из самых компетентных и опытных военачальников Национально-революционной армии, и все же его скромное происхождение противоречит такому представлению. Родившийся в бедной крестьянской семье в сельской местности Гуанси, Ли поступил в различные военные школы, в которых он встретил своих товарищей на всю жизнь Бай Чунси и Хуан Шаохуна. Накануне Синьхайской революции Ли увлекся идеалами Тунмэнхоя доктора Сунь Ятсена и присоединился к ним в 1910 году.\n\nПозже поступив в Школу подготовки военных кадров в Гуйлине, где его обучал знаменитый Цай Э, в 1916 году Ли поступил на службу командиром взвода в армию Гуанси Лу Жунтина, получив известность и славу, служа лейтенантом под командованием Линь Ху и Ма Цзи.\n\nПосле смещения Лу Жунтина в 1921 году Ли стал мелким местным полевым командиром, воссоединившись с Хуан Шаохуном и сформировав союз. Стремясь перестать быть просто случайным бандитом, амбиции Ли привели его к консолидации своего влияния в Гуанси, восстановлению связи с Бай Чунси и присоединению к движению Гоминьдан доктора Сунь Ятсена после его основания в Гуандуне.\n\nПосле второго изгнания Лу Жунтина и занятия Наньнина силами Ли, Сунь признал вновь созданную Новую клику Гуанси Ли законными правителями Гуанси. Бросив все свои силы на поддержку движения Гоминьдан — несмотря на отсутствие истинного понимания Трех народных принципов — Ли с отличием служил в обреченном Северном походе, в частности, победив Нефритового маршала на поле боя в Хунани, однако после того, как поход застопорился, Ли и Гоминьдан были вынуждены разделиться на разрозненные армии Гоминьдана, возглавив повстанческие движения в Миньгане и Гуйчжоу."
 GXC_li_zongren_leader_desc: "§YРодился:§! §L13 августа 1890 года в Гуйлине, провинция Гуанси, Великая Цин§!\n§YБиография:§! §L$GXC_li_zongren_bio$§!"
 GXC_li_zongren_sic_desc: "§YРодился:§! §L13 августа 1890 года в Гуйлине, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §PНовая клика Гуанси§!\n§YБиография:§! §L$GXC_li_zongren_bio$§!"

 #黃紹竑
 GXC_huang_shaohong: "Хуан Шаохун"
 GXC_huang_shaohong_bio: "Родившийся в знатной дворянской семье в своей родной деревне, Хуан Шаохун получил личное образование, разработанное его отцом, бывшим цинским цзюйжэнем Хуан Юйляном. Получив невероятно мягкое воспитание, он в итоге развил довольно свирепый, смелый и властный характер. Уже имея революционный склад ума, когда новости о мучениках восстания в Гуанчжоу достигли ушей Хуана, он начал действовать, разрабатывая операцию по контрабанде оружия — вместе с будущим членом Новой клики Гуанси Ся Вэем — для помощи революционерам, но был остановлен своим отцом, опасавшимся репрессий Центрального правительства в отношении собственного сына.\n\nПосле потрясений Синьхайской революции Хуан Шаохун поступил в Военную академию Баодин в 1915 году, окончив ее и вернувшись в Гуанси в следующем году. Накопив огромный опыт службы командиром в армии Гуанси Лу Жунтина и местным полевым командиром, он развил почти братские отношения с коллегами-лидерами Гуанси Бай Чунси и Ли Цзунжэнем, вплоть до того, что описывал Ли как «доброжелательного и щедрого» ко всем, кого тот встречал — позже сформировав с этими двумя Новую клику Гуанси.\n\nКак только потрясения войн Юэ-Гуй улеглись, Хуан провел переговоры от имени Новой клики Гуанси об интеграции в революционное правительство в Гуандуне, причем Хуан Шаохун был назначен председателем Провинциального совета Гуанси от Гоминьдана. Когда Ли и Бай выступили в поход, чтобы принять участие в обреченном Северном походе, Хуан решил остаться в Гуанси, чтобы сосредоточиться на восстановлении провинции, но не продвинулся далеко, так как Северный поход захлебнулся из-за немецкого наступления. Последовав за Новой кликой Гуанси в изгнание в Юньнань, Хуан выступал в качестве мозга и дипломатической руки клики, выжидая время для восстановления контроля националистов над Гуанси."
 GXC_huang_shaohong_sic_desc: "§YРодился:§! §L1 декабря 1895 года в Жунсяне, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §PНовая клика Гуанси§!\n§YБиография:§! §L$GXC_huang_shaohong_bio$§!"
 GXC_huang_shaohong_leader_desc: "§YРодился:§! §L1 декабря 1895 года в Жунсяне, провинция Гуанси, Великая Цин§!\n§YБиография:§! §L$GXC_huang_shaohong_bio$§!"

 #黄旭初
 GXC_huang_xuchu: "Хуан Сюйчу"
 GXC_huang_xuchu_commander_desc: "§YРодился:§! §L1892 год, в Жуне, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §PНовая клика Гуанси§!\n§YБиография:§! §LПроисходя из семьи ученых, как и другие лидеры Новой Гуанси, Хуан Сюйчу выбрал бесславную жизнь солдата. Окончив обучение в четвертом выпуске Пекинского военного университета, он вернулся домой в Гуанси, чтобы служить в различных местных армиях милитаристов, в конечном итоге оказавшись под командованием армии Гуанси Ли Цзунжэня. После включения армии Гуанси в Национально-революционную армию он служил в Северном походе в качестве командира бригады, командира дивизии и заместителя командующего армией.\n\nДоверенный и ценимый соратник Ли Цзунжэня, он последовал за остальной частью Новой клики Гуанси в Юньнань и использовал свою склонность к организации и администрированию, чтобы помогать Хуан Шаохуну действовать в качестве гражданского крыла Новой клики Гуанси. Одаренный вундеркинд и уважаемый командир, некоторые в клике считают, что Хуан Сюйчу выступает в качестве неофициального четвертого члена Триумвирата, и его мнение высоко ценится. Хотя пересекающиеся роли Хуан Шаохуна и Хуан Сюйчу создают напряженность внутри клики, поскольку Хуан Шаохун борется за то, чтобы оставаться военным интендантом клики.§!"

 #白崇禧
 GXC_bai_chongxi: "Бай Чунси"
 GXC_bai_chongxi_army_chief_desc: "§YРодился:§! §L18 марта 1893 года в Гуйлине, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §PНовая клика Гуанси§!\n§YБиография:§! §LРодившийся в мусульманской семье хуэй персидского происхождения в сельской местности Гуанси, Бай поступил в Школу подготовки военных кадров Гуанси в Гуйлине, где его наставником был сам Цай Э. Во время обучения Бай встретил своих товарищей на всю жизнь Хуан Шаохуна и Ли Цзунжэня, создав нерушимую связь. С началом Синьхайской революции в 1911 году Бай и Хуан вступили в корпус Студентов-смертников под руководством Чжао Хэнти, чтобы сражаться в революции. После серии различных зачислений в подготовительные военные школы, Бай посещал третий класс Военной академии Баодин в 1915 году, а после выпуска оказался на службе в армии Гуанси Лу Жунтина.\n\nПосле ранения, полученного в бою, Бай оказался в Гуанчжоу в то же время, что и лидер Гоминьдана доктор Сунь Ятсен, и, используя свои связи с Хуан Шаохуном, обратился к Сунь Ятсену с призывом организовать последнюю экспедицию для обеспечения контроля над Гуанси для Национальной революции. При такой поддержке Бай и Хуан — позже к ним присоединился Ли Цзунжэнь — пришли к власти в провинции Гуанси, защищая ее от вторжений как мелких милитаристов, так и Тан Цзияо.\n\nОфициально вступив в Национально-революционную армию в 1926 году, Бай служил заместителем начальника штаба и начальником генерального штаба 7-й армии, помогая Ли Цзунжэню в разгроме У Пэйфу в Хунани во время Северного похода. Однако после краха Северного похода Бай оказался вместе с 7-й армией и Новой кликой Гуанси в Гуйчжоу. Не привыкший сидеть сложа руки, Бай Чунси продолжал оттачивать свои навыки на поле боя, став одним из самых ярких тактических гениев НРА и даже став пионером системы ополчения Гуанси вместе с Ли Цзунжэнем и Хуан Шаохуном. Бай даже получил прозвище «Маленький Чжугэ Лян» в честь знаменитого стратега эпохи Троецарствия.§!"

 #夏威
 GXC_xia_wei: "Ся Вэй"
 GXC_xia_wei_high_command_desc: "§YРодился:§! §L2 марта 1893 года в Жуне, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §PНовая клика Гуанси§!\n§YБиография:§! §LРазвив революционное мышление в раннем возрасте, Ся Вэй не упустил возможности послужить в Синьхайской революции. Всего в 18 лет он вступил в Эскадрон смерти студенческой армии Гуйлиня — вместе с земляком Хуан Шаохуном — чтобы помочь успеху восстания против правления Цин. Как только все улеглось, он поступил в Офицерскую школу армии Баодин, окончив ее через год и получив назначение в Первую дивизию армии Гуанси от Бэйянского правительства.\n\nВ 1917 году он был переведен в Образцовый армейский батальон — вместе с будущими членами Новой Гуанси Ли Цзунжэнем, Бай Чунси и Хуан Шаохуном — участвуя в Войне в защиту республики против Юань Шикая. Накопив бесценный командный опыт в последующие годы, Ся Вэй последовал за другими членами армии Гуанси при интеграции в Национально-революционную армию. Последовав за Ли Цзунжэнем в бой во время Северного похода, Ся Вэй служил командиром шестой бригады «Стальной армии» Ли, а затем командиром Первого маршрута.\n\nОднако после быстрого распада Северного похода Ся Вэй сопровождал остальную часть Новой клики Гуанси в Юньнань, ожидая времени, чтобы вернуться в свою родную провинцию. Сосредоточившись на оттачивании своих способностей руководить дивизиями в бою, Ся Вэй многому научился у Бай Чунси и Ли Цзунжэня, мечтая о дне, когда он сможет использовать свои навыки, чтобы привести своих людей к победе.§!"

##Western Hills Clique Characters
 #林森
 GXC_lin_sen: "Линь Сэнь"
 GXC_lin_sen_bio: "Будучи республиканцем с начала века, Линь Сэнь многое повидал за свою жизнь. Сражаясь в японо-китайской войне, Линь продолжал организовывать сопротивление на Тайване, нанося тяжелые потери японцам. Он сбежал на материк, присоединившись к Синчжунхою. Встретив доктора Сунь Ятсена в 1899 году, Линь основал Фуцзяньское отделение Синчжунхоя. С основанием Тунмэнхоя Линь привел всех своих последователей к вступлению в него. Убедив Сюй Чунчжи присоединиться к рядам революционеров, Линь работал над запуском восстания в Цзюцзяне в знак солидарности с Синьхайской революцией.\n\nИзбранный председателем Временного сената и помогавший в разработке Временной конституции, Линь в конечном итоге ушел в отставку из-за злоупотреблений Юань Шикая, создав Фуцзяньское отделение Гоминьдана. Присоединившись к Гэминьдану в Японии, Линь был отправлен в Америку, чтобы помочь в сборе средств. Вернувшись в Китай в 1916 году, Линь снова стал сотрудничать с Чжан Цзи и Цзюй Чжэном для создания Конституционного клуба.\n\nПоследовав за Сунь Ятсеном в его Правительство защиты конституции, Линь стал спикером Чрезвычайной ассамблеи, а затем исполняющим обязанности министра иностранных дел. Позже Линь был избран председателем Ассамблеи. Глубоко доверенный Сунь Ятсена, Линь недолго был губернатором провинции Фуцзянь. Будучи ведущим архитектором Реорганизации, Линь руководил ее реализацией вместе с Ху и Ваном. Однако он ненавидел про-интернациональный, про-синдикалистский и популистский поворот Сунь Ятсена и провел конференцию в горах Сишань вместе с Цзоу Лу и другими, сформировав Клику Сишань.\n\nИ все же, когда молот милитаристов опустился, Линь бежал из страны, его безопасность и транспорт были обеспечены соперничающим Центральным исполнительным комитетом Ху Ханьминя в Москве. Ветеран, убежденный защитник справедливости и, прежде всего, скромный человек, похоже, что испытания Линя еще не закончились, и все же его сердце навсегда остается с народом.\n\n§YЗаметки: Линь славится своим простым, приземленным поведением, предпочитая вести простую жизнь, избегая излишеств.§!"
 GXC_lin_sen_leader_desc: "§YРодился:§! §L11 февраля 1868 года в Фучжоу, провинция Фуцзянь, Великая Цин§!\n§YБиография:§! §L$GXC_lin_sen_bio$§!"
 GXC_lin_sen_advisor_desc: "§YРодился:§! §L11 февраля 1868 года в Фучжоу, провинция Фуцзянь, Великая Цин§!\n§YПринадлежность:§! §cКлика Сишань§!\n§YБиография:§! §L$GXC_lin_sen_bio$§!"

 #居正
 GXC_ju_zheng: "Цзюй Чжэн"
 GXC_ju_zheng_bio: "Благородный человек в молодости, Ян Цзюнь — или, как его теперь называют, Цзюй Чжэн — начал свою революционную карьеру, вступив в Тунмэнхой. Цзюй готовился присоединиться к восстанию в Хэкоу в Юньнани, к сожалению, узнав, что восстание провалилось без него. Путешествуя в Сингапур, чтобы встретиться с доктором Сунь Ятсеном, он вместе с Ху Ханьминем и Ван Цзинвэем управлял газетой «Чжунсин жибао». Став главой Тунмэнхоя в Хубэе в 1910 году, Цзюй ушел в отпуск, чтобы финансировать будущее восстание, только чтобы вернуться в Хубэй и обнаружить, что Синьхайская революция уже началась без него.\n\nСражаясь во Второй революции, Цзюй помог сформировать Гэминьдан в 1914 году и вернулся в Национальную ассамблею в 1917 году, чтобы служить сенатором от Хубэя. Помогая в формировании Гоминьдана, Цзюй служил сенатором Президентского дворца Сунь Ятсена, а затем министром внутренних дел. Однако во время Реорганизации партии в 1924 году Цзюй в частном порядке открыто критиковал сотрудничество с Китайской синдикалистской партией, но не действовал из-за своей кровной клятвы Сунь Ятсену.\n\nПосле смерти Сунь Ятсена Цзюй отправился в Пекин, чтобы, во-первых, отдать дань уважения, а во-вторых, организовать конференцию в горах Сишань с Линь Сэнем, Цзоу Лу и другими. В конечном итоге он стал одним из основных членов Клики Сишань. Исключенный из партии в 1926 году за свои действия, Цзюй восстановил свое членство в 1927 году благодаря влиянию Чэн Цяня. После Северного похода Цзюй решил отправиться в Москву, а не жить в нищете Гуйчжоу или коррумпированном улье Шанхая. Путешествуя вместе с Линь Сэнем, они оба были избраны в соперничающий Центральный исполнительный комитет Ху Ханьминя.\n\nИзвестный сторонник верховенства закона и ортодоксии, Цзюй часто выступал в качестве посредника между внутренними фракциями Гоминьдана. Не заблуждайтесь, хотя Цзюй может быть «Старейшиной Гоминьдана», его конфуцианский легизм не испытывает симпатии к тем, кто извращает Национальную революцию."
 GXC_ju_zheng_leader_desc: "§YРодился:§! §L8 ноября 1876 года в Хуанчжоу, провинция Хубэй, Великая Цин§!\n§YБиография:§! §L$GXC_ju_zheng_bio$§!"
 GXC_ju_zheng_advisor_desc: "§YРодился:§! §L8 ноября 1876 года в Хуанчжоу, провинция Хубэй, Великая Цин§!\n§YПринадлежность:§! §cКлика Сишань§!\n§YБиография:§! §L$GXC_ju_zheng_bio$§!"

 #鄒魯
 GXC_zou_lu: "Цзоу Лу"
 GXC_zou_lu_sic_desc: "§YРодился:§! §L1885 год, в Чаочжоу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКлика Сишань§!\n§YБиография:§! §LПолитик, композитор, каллиграф, государственный деятель, учитель — назвать Цзоу Лу человеком многих талантов было бы преуменьшением. С юных лет веря, что только революция, за которую выступал доктор Сунь Ятсен, может стать спасением нации, Цзоу в итоге присоединился к Синчжунхою в 1900 году и к Тунмэнхою в 1905 году. Поступив в юридическую школу в том же году, он стал близким другом Чэнь Цзюнмина, и они тесно сотрудничали как революционеры в течение десятилетия. Инициировав восстание в Шаньтоу в 1910 году от имени революционеров, восстание Цзоу влилось в Синьхайскую революцию.\n\nПомогая Чэню во время Второй революции, Цзоу отправился в Японию в свете ее провала и организовал Гэминьдан вместе с Сунь Ятсеном и Ху Ханьминем. Цзоу был назначен на различные штабные военные должности, прежде чем в конечном итоге стать специальным комиссаром, ответственным за руководство подавлением его дорогого друга Чэня в 1922 году. Став министром финансов, Цзоу также был назначен президентом недавно созданного Национального университета Гуандуна, даже написав песню школы. Соглашаясь с необходимостью Реорганизации 1924 года, но не соглашаясь с политикой Единого фронта, Цзоу оставался в молчаливой оппозиции из уважения к Сунь Ятсену.\n\nОднако после быстрого ухудшения здоровья Сунь Ятсена в Пекине Цзоу сорвался с места и помчался к Гофу (Отцу нации), чтобы подписать его завещание. А в следующем году он сотрудничал с Линь Сэнем и Цзюй Чжэном, среди прочих, для проведения конференции в горах Сишань. Осудив сотрудничество с Интернационалом, популизм и политику Единого фронта с Китайской синдикалистской партией, Цзоу в конечном итоге был подвергнут чистке Центральным комитетом.\n\nЗаметив, куда дует ветер, Цзоу бежал из Китая, когда Северный поход рухнул, перегруппировавшись с Ху Ханьминем и его изгнанной Кликой старейшин в Москве. Во время своего изгнания он был главной силой в формировании учебной программы Университета Сунь Ятсена в Москве, выступая в качестве его президента. Близкий друг Ху и опытный не только в искусствах, но и в военных делах и экономическом управлении, Цзоу — сила, с которой нужно считаться.§!"

 #許崇智
 GXC_xu_chongzhi: "Сюй Чунчжи"
 GXC_xu_chongzhi_high_command_desc: "§YРодился:§! §L14 октября 1887 года в Паньюй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКлика Сишань§!\n§YБиография:§! §LПотеряв обоих родителей в раннем возрасте, Сюй Чунчжи тем не менее служил главным инструктором Военной академии Фуцзяни. Вступив в Тунмэнхой в 1911 году по настоянию Линь Сэня, Сюй возглавил восстание в Фуцзяни во время Синьхайской революции. Участвуя во Второй революции Ли Лецзюня, Сюй присоединился к Гэминьдану в 1913 году, встретив таких людей, как Чан Кайши, Цзюй Чжэн, Чэнь Цимэй, Юй Южэнь и Ху Ханьминь. Сражаясь бок о бок с Цзюем, он стал побратимом Чана и служил начальником штаба и главнокомандующим армии Сунь Ятсена в 1917 году. Лидер Второй армии Гуандуна наряду с Первой армией Чэнь Цзюнмина, Сюй защищал Гуандун от Лу Жунтина и Мо Жунсиня, изгнав их из провинции в 1920 году. Продолжая работать над подавлением амбиций Старой Гуанси, Сюй поддержал Сунь Ятсена в запуске Северного похода, но из-за предательства Чэнь Цзюнмина в 1922 году Сюй был вынужден остановить свое продвижение в Цзянси и вернуться в Гуандун.\n\nСлужа в обеих войнах Юэ-Гуй, Сюй поддерживал политику Реорганизации и Единого фронта. Назначив Чана директором Вампу, Сюй стал министром военных дел после кончины Сунь Ятсена. К сожалению, после попытки убийства Ляо Чжункайя Сюй оказался в изоляции со стороны Ван Цзинвэя и Чан Кайши. После неформального изгнания Ху Ханьминя из Китая Сюй был насильно удержан в собственном доме кадетами Вампу Чана и вынужден уйти в отставку. Сосланный в Шанхай в довольно роскошный дом в Британской концессии, Сюй вступил в отношения с Чжан Цзи, пытаясь вернуться в политику под знаменем Клики Сишань. После краха Северного похода Сюй перебрался вместе со своим имуществом в Москву по предложению Чжана, присоединившись к соперничающему Центральному исполнительному комитету Ху Ханьминя.§!\n\n§YЗаметки: Сюй однажды получил собственноручно написанную каллиграфию от Сунь Ятсена: «В большинстве случаев вещи в мире происходят не так, как ожидалось. Только будучи способными проявлять настойчивость и переносить трудности, мы можем ожидать успеха».§!"

 #李烈鈞
 GXC_li_liejun: "Ли Лецзюнь"
 GXC_li_liejun_army_chief_desc: "§YРодился:§! §L23 февраля 1882 года в Наньчане, провинция Цзянси, Великая Цин§!\n§YПринадлежность:§! §cКлика Сишань§!\n§YБиография:§! §LВозможно, одна из самых преданных, пылких и печально известных революционных фигур Китая. Имя Ли Лецзюня очень известно в южных революционных кругах и очень презираемо на Севере. Занимаясь боевыми искусствами в юном возрасте, Ли был выбран среди таких, как Оуян У, для поездки в Японию на учебу. Нацелившись на артиллерию в Симбу Гакко, Ли поступил в Школу унтер-офицеров японской армии. Подружившись с Янь Сишанем, Ли Гэньюанем, Тан Цзияо, Сунь Чуаньфаном и Чэн Цянем, Ли увлекся движением Тунмэнхой, искренне веря, что спасение Китая заключается в революции.\n\nОтправившись в Куньмин, чтобы служить военным инструктором благодаря Фэн Гочжану, Ли помогал распространять революционные настроения в академии. До такой степени, что его даже перевели в другое место из-за того, что он стал слишком открытым, и даже Ли Гэньюань не мог его покрывать. Немедленно вступив в действие в Синьхайской революции, он удержал Фэн Гочжана от продвижения вниз по Янцзы.\n\nГубернатор Цзянси в 1912 году, он восстал против Юань Шикая вместе с остальной частью Гоминьдана в 1913 году. Возможно, его самым ярким моментом стала его роль в организации Войны в защиту республики. Сотрудничая с Цай Э, Ли подтолкнул Тан Цзияо к ведению их патриотической войны. Командуя Второй армией Хугоцзюнь, Ли требовал, чтобы армия дошла до самого Пекина. Лидер Юньнаньской армии в Гуандуне, он был неотъемлемым игроком в политике региона, в конечном итоге оставшись с доктором Сунь Ятсеном. Побывав у смертного одра Сунь Ятсена, Ли примкнул к Клике Сишань, а после их изгнания в ходе борьбы за власть после смерти Сунь Ятсена, Ли последовал за ними в Москву.\n\n§YЗаметки: Доктор Сунь Ятсен однажды похвалил Ли как «редкого конфуцианского генерала нашего времени», а Юй Южэнь утверждал, что «Ли Лецзюнь всегда говорил справедливо, точно, с глубокими знаниями и своими собственными уникальными прозрениями».§!§!"

 #沈定一
 GXC_shen_dingyi: "Шэнь Динъи"
 GXC_shen_dingyi_advisor_desc: "§YРодился:§! §L1883 год, в Шуньчане, Фуцзянь, Великая Цин§!\n§YПринадлежность:§! §cКлика Сишань§!\n§YБиография:§! §LРодившийся в менее влиятельной семье в провинциальной политике, Шэнь Динъи следовал за своим отцом во время его многочисленных должностей магистрата по всей Фуцзяни и на Тайване. Благодаря своему происхождению Шэнь был назначен на различные бюрократические должности. Шэнь Динъи позже бежал в изгнание из-за своих связей с Тунмэнхоем и тайной помощи, оказанной восстанию в Хэкоу в 1908 году. Во время Синьхайской революции Шэнь участвовал в битве за Шанхай и служил командиром Шанхайского студенческого корпуса, позже работая в провинциальной ассамблее Чжэцзяна.\n\nЗапустив множество лоббистских групп и движений за независимость Чжэцзяна в 1914–1916 годах, Шэнь был объявлен в розыск и бежал в Шанхай, где сотрудничал с такими людьми, как доктор Сунь Ятсен и Ляо Чжункай, управляя политическими газетами. Участвуя в событиях 4 ноября вместе с Дай Цзитао и Сунь Дисанем, трое инициировали журнал «Еженедельное обозрение», в котором Шэнь Динъи впервые познал вкус социализма, сообщая о революциях в Европе и создании Китайской синдикалистской партии. Вступив как в КСП, так и в ГМД в середине 1920-х годов, занимая различные должности в обеих партиях, Шэнь выступил против Единого фронта между партиями вместе с такими людьми, как Дай Цзитао, и позже был исключен из КСП за свою позицию.\n\nВсе больше и больше сближаясь с такими людьми, как Ху Ханьминь и Клика Сишань, Шэнь Динъи последовал за группой в их изгнание в Москву, позже будучи назначенным в Центральный исполнительный комитет Ху Ханьминя, хотя и оставался выделяющимся членом из-за своих левых симпатий. Робко подчиняясь антисоциалистической риторике Клики Сишань, Шэнь тем не менее ставит благополучие и стабильность партии выше идеологии.§!"

##Reconstruction Faction Characters
 #梁寒操
 GXC_liang_hancao: "Лян Ханьцао"
 GXC_liang_hancao_sic_desc: "§YРодился:§! §L19 июля 1899 года в Саньшуй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §lФракция реконструкции§!\n§YБиография:§! §LОдаренный академик, жизнь молодого Лян Ханьцао наполнена жаждой знаний: научился читать в четыре года, писать в шесть, поступил в среднюю школу префектуры Чжаоцин в 12 лет, занимая первое место на каждом экзамене за время своего обучения. После смерти отца в 16 лет он начал свою карьеру в образовании, работая учителем в начальной школе Минмдэ в Цзянмэне.\n\nОднако этого ему было недостаточно, так как в 1918 году он поступил в Шанхайский университет Хуцзян, окончив его в 1923 году и наконец вступив в революционную борьбу, работая секретарем у Ван Цзинвэя. Позже, в 1924 году, Лян Ханьцао был переведен на должность секретаря партии и сотрудника отдела молодежи 4-го района Гуанчжоу, а затем работал учителем в средней школе Пэйчжэн.\n\nВ 1925 году Лян был снова завербован Ван Цзинвэем для работы пропагандистом в Секретариате Национального правительства и лектором по Трем народным принципам в различных влиятельных учреждениях. Познакомившись с идеями Сунь Фо через рекомендацию Вана, Лян тесно сблизился со стойкой поддержкой демократии и борьбы с коррупцией Сунь Фо.\n\nПроницательный законодатель и интеллектуал, Лян может считаться заместителем Сунь Фо, перегруппировавшись на Гавайях с остальной частью Фракции реконструкции.§!"

 #黄漢梁
 GXC_huang_hanliang: "Хуан Ханьлян"
 GXC_huang_hanliang_advisor_desc: "§YРодился:§! §L1893 год, в Сямэне, провинция Фуцзянь, Великая Цин§!\n§YПринадлежность:§! §lФракция реконструкции§!\n§YБиография:§! §LЭкономически мыслящая фигура, Хуан Ханьлян начинает свою карьеру, поступив в университет Цинхуа в 1911 году. Будучи одним из первых студентов, получивших стипендию Боксерской контрибуции, Хуан Ханьлян смог учиться в Мичиганском университете, Принстонском университете и Колумбийском университете.\n\nВо время своего пребывания в Соединенных Штатах Хуан Ханьлян близко познакомился с Сунь Фо, начав дружбу на всю жизнь. После окончания Колумбийского университета со степенью доктора философии он вернулся в Китай, чтобы работать президентом Гонконгского отделения банка Хо-фэн, получив опыт в банковской и финансовой торговле.\n\nИспользуя свою близкую дружбу с Сунь Фо, Хуан предоставляет свой финансовый опыт всякий раз, когда это требуется Фракции реконструкции — хотя и не без пристального внимания и непопулярности со стороны тех, кто не входит в круг наследного принца.§!"

 #伍朝樞
 GXC_wu_chaoshu: "У Чаошу"
 GXC_wu_chaoshu_advisor_desc: "§YРодился:§! §L23 мая 1887 года в Тяньцзине, Великая Цин§!\n§YПринадлежность:§! §lФракция реконструкции§!\n§YБиография:§! §LСын уважаемого политика, дипломата и ученого У Тинфана, казалось, что Чаошу суждено пойти по стопам отца. После назначения отца посланником в Соединенные Штаты, У поступил в начальную школу Фолс в Вашингтоне, а позже перешел в среднюю школу Атлантик-Сити в 17 лет.\n\nВ 1905 году У вернулся в Китай после окончания учебы и работал членом Бюро труда Гуандуна наряду с Бюро сельскохозяйственной и промышленной индустрии. Благодаря расходам, оплаченным Цин, У смог учиться в Англии, поступив в Лондонский университет и окончив его со степенью бакалавра права, получив квалификацию барристера позже в 1911 году. Вернувшись в то, что теперь было Китайской Республикой в 1912 году, он служил генеральным директором Департамента иностранных дел Хубэя и председателем Договорного комитета Министерства иностранных дел.\n\nВ 1913 году У участвовал в Палате представителей Конгресса, а позже был членом Комитета по разработке конституции. В 1915 году он снова получил должность в Министерстве иностранных дел, хотя и выступил против имперской попытки Юань Шикая и вскоре ушел в отставку.\n\nУчаствуя в Движении в защиту конституции, У позже служил заместителем министра иностранных дел и директором Департамента общих дел в Гуандуне. Во время работы в правительстве Сунь Ятсена У служил министром иностранных дел, членом Национального правительства Гуанчжоу, председателем Муниципального комитета Гуанчжоу среди прочего, и в ходе своей обширной работы в Кантоне он стал тесно связан с Сунь Фо. Отличный дипломат и опытный политик, он отдает свои способности и влияние Фракции реконструкции.§!"

 #李漢魂
 GXC_li_hanhun: "Ли Ханьхунь"
 GXC_li_hanhun_commander_desc: "§YРодился:§! §L23 ноября 1896 года в Учуане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §lФракция реконструкции§!\n§YБиография:§! §LКак и многие другие кантонские офицеры, Ли Ханьхунь учился в начальной военной школе в Гуандуне, а позже отправился в Учан. В 1916 году он поступил в 6-й класс Баодина и изучал пехотное дело. Перед тем как вернуться в Гуандун младшим офицером, он недолго служил под началом Янь Сишаня.\n\nЛи Ханьхунь служил начальником штаба 36-го полка Хуан Цисяна, а позже стал командиром этого полка под началом Чжан Факуя, командира 4-й армии, или «Железной армии», как она широко известна. После трагического краха Северного похода, как и большинство офицеров Гоминьдана, Ли Ханьхунь бежал за границу, но все же решил присоединиться к Чжан Факую в его путешествии и ненадолго принять участие в его усилиях по поддержке Фракции реконструкции Сунь Фо. Позже, когда персонал Гоминьдана воссоединился с Гуандуном, Ли также вернулся в свою родную провинцию, работая под началом Чэнь Цзитана, с которым он не сработался.\n\nНесмотря на то, что он был офицером Гуандунского Гоминьдана, как давний подчиненный и последователь Чжан Факуя, Ли Ханьхунь поддерживал тесные отношения с ним и Фракцией реконструкции. Хотя Ли не является особенно опытным офицером, как многие из его товарищей по Гоминьдану, когда дело доходит до крупномасштабной войны, он скромный и верный солдат, который всегда будет действовать наилучшим образом ради либерального Китая, свободного от угнетения.§!"

 #陳策
 GXC_chen_ce: "Чэнь Цэ"
 GXC_chen_ce_navy_chief_desc: "§YРодился:§! §L2 апреля 1894 года в Вэньчане, Гуандун, Великая Цин§!\n§YПринадлежность:§! §lФракция реконструкции§!\n§YБиография:§! §LИзвестный в англоязычном мире как Эндрю Чан Чак, Чэнь Цэ посещал Гуандунскую военно-морскую школу в юном возрасте, одновременно вступив в Тунмэнхой. После создания Китайской Республики Чэнь Цэ помогал в создании «Ассоциации товарищей морской школы» с конечной целью противостоять Юань Шикаю.\n\nПосле создания Движения в защиту нации в 1917 году Чэнь Цэ предоставил свой военно-морской опыт революционному правительству Сунь Ятсена. В инциденте 16 июня 1922 года Чэнь Цэ встал на сторону Сунь Ятсена, его морские пехотинцы сыграли важную роль в сопротивлении атаке Чэнь Цзюнмина, в то время как его корабли спасли Сунь Ятсена и вытеснили мятежников из Гуанчжоу. В результате Чэнь Цэ стал командующим Гуандунским флотом.\n\nВо время Северного похода он храбро руководил обороной старой крепости на острове Хумэнь, охранявшей морской вход в Гуанчжоу, против Немецкой экспедиции. Это стоило ему левой ноги, но его личная храбрость гарантировала, что он не будет подвергнут чистке во время возвращения Чэнь Цзюнмина. С тех пор Чэнь Цэ боролся за сохранение независимости Гуандунского флота от Армии, несмотря на его незначительный размер.\n\nБудучи в первую очередь послушным слугой Национальной революции, идеологические убеждения Чэнь Цэ и глубокая вера в демократию заставляют его чаще других примыкать к Фракции реконструкции.§!"

