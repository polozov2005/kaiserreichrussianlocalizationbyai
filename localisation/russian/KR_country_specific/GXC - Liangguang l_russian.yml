###Section 4c (400-599): Late Game KMT Political Events

 ##RKMT High Zeal Event Chain (400-429)
 GXC.lategame.400.t: "Расколы 1911 года"
 GXC.lategame.400.d: "Печально известный дуэт «Ли-Бай» был побежден, и с отступлением угрозы Новой клики Гуанси гражданское крыло партии смогло вздохнуть свободнее. Пока другие останавливаются, чтобы перевести дух, Ху Ханьминь остается в движении, предостерегая своих товарищей от самообмана удержания власти слишком долго. Поучая, как всегда, Председатель использовал недавний инцидент как урок об опасностях политического окостенения, выступая против самодовольства и коррупции, которые приходят вместе с ним.\n\nУтверждая, что Гоминьдан должен оставаться динамичной, энергичной силой, при этом имея достаточную гибкость, чтобы рассматривать альтернативные идеи, он посоветовал партии обратить внимание на англо-американскую систему. Государственные служащие были преданы народу, находясь у власти, и, что более важно, вне ее. Забавный поворот событий, безусловно, учитывая его прежнюю оппозицию представительной демократии (он высоко отзывался о прямой демократии) и осадное положение англо-американских ценностей, но, по-видимому, все же вполне искренний.\n\nПолитика, однако, также начала меняться — возможно, партия гораздо динамичнее, чем Ху ей приписывает. Председатель долгое время был поборником гражданских правых, но отчасти потому, что он был их единственным щитом от милитаристов и генералов. Хотя его по-прежнему уважают, с отступлением влияния милитаристов некоторые начинают сомневаться, действительно ли они хотят, чтобы Ху возглавил переход к демократии.\n\nДействительно, поскольку партия подвергается значительному самоанализу, наблюдатели указывают на параллели со старыми днями Тунмэнхуэя во время первоначальной революции, сродни напряженности между Сунь Ятсеном, Хуан Сином и Сун Цзяожэнем. В то время как Ху очень сильно олицетворяет старый революционный дух доктора Суня, гранды Западных холмов, такие как Линь Сэнь, Цзю Чжэн и Цзоу Лу, кажутся гораздо более склонными к конституционализму, в то время как Сунь Фо остается в своем собственном мире, мечтая о революции и возможной демократизации."
 GXC.lategame.400.a: "В духе Сунь Ятсена мы всегда остаемся в движении ради прогресса."
 GXC.lategame.400.b: "В память о Суне и Хуане мы никогда не упускаем из виду нашу истинную миссию: демократию."

 GXC.lategame.401.t: "Северный Гоминьдан"
 GXC.lategame.401.d: "Гоминьдан всегда был партией, базирующейся на юге, так как доктор Сунь имел кантонское происхождение, и многие из его главных помощников были выходцами из Гуандуна. Эта проблема усугубилась по мере возникновения конфликтов между Бэйянским правительством и южными революционерами, кульминацией которых стал десятилетний раскол между Гуанчжоу и Пекином.\n\nПоследующие поколения руководства усилили этот регионализм: лидеры Гоминьдана, офицеры и сторонники часто были выходцами из южных провинций, таких как Гуандун, Гуанси и Хунань. Основными полюсами деятельности Гоминьдана были Гуанчжоу и Шанхай, и благодаря сложным системам покровительства, а также внутренним партийным чисткам очень немногие члены Гоминьдана или офицеры Национально-революционной армии могут претендовать на северное происхождение.\n\nКак следствие, практически единодушно приветствовалась новость о том, что северные отделения партии начали расцветать по мере роста легитимности Гоминьдана. Во многом это приписывают энергичному руководству фигур северного Гоминьдана, таких как Дин Вэйфэнь и Юй Южэнь. Дин возглавлял многочисленные тайные политические органы, называемые «Великим союзом» (Датунмэн), в качестве организаций прикрытия для партии прямо под носом у бэйянских милитаристов; его слова продолжают иметь значительный вес в северных провинциях. Юй Южэнь также имеет большой авторитет, его описывают как оптимистичного, искреннего и прямолинейного. Обладая мощным телосложением и речью, он несет в себе «силу севера», несмотря на свой преклонный возраст.\n\nОба считаются старейшинами партии, и хотя их места в ЦИК когда-то рассматривались как символический жест национального единства, теперь, когда членство пополняется северянами, их позиции укрепились. В целом примыкая к фракции Сишань, которая также черпала поддержку у северян, их расширение встретило некоторое трение с нашей южной базой, которая теперь обнаруживает, что конкурирует за ценные политические посты по мере приближения объединения."
 GXC.lategame.401.a: "Мы, конечно, очень рады наконец увидеть, как нация объединяется..."
 GXC.lategame.401.b: "...но нам не следует забывать, кто сделал большую часть работы для этого."

GXC.lategame.402.t: "Кредиторы требуют долг"
 GXC.lategame.402.d: "Ли Цзунжэнь может уйти, но идеи, которые он представлял, вряд ли мертвы. Ли, как и большинство милитаристов-националистов, имел своеобразный взгляд на регионализм, часто отстаивая необходимость автономии провинций и защищая их право на полунезависимую армию, чтобы сдерживать посягательства центрального правительства. В то же время они часто сетовали на отсутствие национального единства и быстро предостерегали от любых представлений о том, что они сепаратисты.\n\nВ любом случае, их активное продвижение этих принципов нашло значительную поддержку в союзных провинциях, используя региональные, провинциальные и местные программы реконструкции и опеки Гоминьдана для увеличения собственного богатства и власти. Даже когда генерала Ли с позором вывели со Второго конгресса, мало кто сомневался, что вскоре его место займет другой. Действительно, Гуанси, как говорят, быстро вернулась к старому статус-кво.\n\nИм не нужно далеко искать. Чэнь Цзитан, губернатор Гуандуна, пожалуй, самый сильный милитарист в Китае и один из самых видных сторонников региональной автономии (по крайней мере, для Гуандуна). Его прямая и последовательная поддержка Ху Ханьминя и его якобы демократических союзников стала в этом отношении обузой, хотя и не совсем так, как Новая клика Гуанси. В отличие от Ли и Бая, Чэнь, похоже, имеет мало амбиций за пределами Гуандуна, даже заходя так далеко, что охотно помогает Ху и центральному правительству в их продвижении на север, только бы вытащить их из Гуанчжоу.\n\nИскоренение коррупции в Гуандуне — не такое простое или однозначное дело: он не представляет непосредственной угрозы центральному правительству и фактически сопротивлялся мольбам других милитаристов присоединиться к ним в мятежных коалициях против правительства. В то же время он ревностно охраняет свои полномочия, отказываясь позволить любым директивам центрального правительства обойти его офис. Большинство довольствовались тем, что «не будили спящую собаку», но вопиющее лицемерие трудно не заметить."
 GXC.lategame.402.a: "Разделение между национальным и местным правительством означает, что у каждого есть свое место."
 GXC.lategame.402.b: "...но мелкие милитаристы и эгоистичные регионалисты его не имеют."

 GXC.lategame.403.t: "Белый, красный и голубых кровей"
 GXC.lategame.403.d: "Сунь Фо был занят в месяцы после Второго конгресса. Победа «Шанхайских членов комитета», «его» победа (или так он думает), подстегнула его политические перспективы, и его последователи путешествуют по стране, агитируя за голоса на контролируемых Гоминьданом территориях. Сам Сунь Фо остался в [ROOT.Capital.GetCapitalVictoryPointName], близко к рычагам власти. Он собирал поддержку для партии или, что более уместно, для себя, проводя день за днем на встречах с новыми фигурами и выступая с речами.\n\nЧасто описываемый как тихий и книжный, предпочитающий уткнуться носом в книгу, а не участвовать в бесцельных склоках центрального комитета, меняющиеся обстоятельства зарядили молодого человека энергией — пожалуй, самого молодого серьезного претендента на власть. Разрабатывая ряд законов под одобрение общественности и выступая против коррупции, его призывы к меньшей, но элитной армии и слому военного регионализма нашли отклик у многих, кто опасается, что больших, но разделенных армий китайских милитаристов недостаточно, чтобы сдерживать врагов Китая. Потеряв надежду на создание сильного флота или военно-воздушных сил из-за растущего личного цинизма, его призывы к военным инвестициям в армию (и только в армию) вернули некоторых недоброжелателей, которые считали его слишком миролюбивым.\n\nЕго привязанность к западным трудам, известная как самая начитанная в западных трактатах среди Центрального комитета, когда-то источник легкой насмешки, обернулась в его пользу, поскольку теперь он ухаживает за молодыми интеллектуалами, возвращающимися домой, чтобы помочь восстановить нацию. Аналогичным образом, его друзья Чжун Тяньсинь и Хуан Шэньчжи создали Китайскую культурную ассоциацию, которая, среди прочего, издает журнал «Творение», укрепляя имидж младшего Суня как молодого и вдумчивого лидера, который может состязаться в уме со старейшинами в партии. Кажется, с каждым днем он все ближе и ближе к тому, чтобы претендовать на мантию, которую, как он верит, оставил ему отец."
 GXC.lategame.403.a: "Возможно, пришло время смены караула."
 GXC.lategame.403.b: "Его молодость соответствует его неопытности."

 GXC.lategame.404.t: "Председатель и партийное государство"
 GXC.lategame.404.d.Hu_ruling: "Hu Hanmin is a peculiar and often mercurial personality, though if there is one thing consistent about him its that he is a strict adherent to Dr. Sun's plans for reconstruction. As a consequence he has faithfully adapted his mentor's plans for a transitional party-state, the Kuomintang being heavily enmeshed into the inner organs of the government itself. Hu Hanmin has strategically centralised power around his office, leveraging his control over the party apparatus to his advantage.\n\nHe has largely eschewed using the title of President (sometimes translated Chairman) of the National Government, seeing that as coming more into play during the constitutional phase of the revolution. For now, he primarily rules as Chairman of the Kuomintang, in part to stress the temporary nature of the tutelage but also as a means of strengthening his own legitimacy. Likewise, while avoiding any personal cult of personality for himself, he freely ensures that the Nationalist government idolise Sun Yat-sen as virtually a secular deity. Day by day as he promulgates edicts on behalf of the \"Eternal Premier\", his power seems to grow unchecked.\n\nEven Chen Jitang, who he shares a complicated patron-client relationship with, has seen his authority diminish as the balance of power shifts in favour of the Chairman, who has openly contemplated having him replaced as Governor now that he has served his purpose. Soon, many fear, the only thing that can keep Hu in check will be his utter dedication to the principles and his stubborn unwillingness to deviate from them - the same stubbornness that has both endangered and saved the party from the warlords. As the storm clouds gather over Chen, Hu's comrades in the \"Elders Clique\" meet with him to make their opinions known."
 GXC.lategame.404.d.Hu_not_ruling: "Former Chairman Hu Hanmin was a peculiar and often mercurial personality, though if there is one thing consistent about him its that he is a strict adherent to Dr. Sun's plans for reconstruction. As a consequence he has faithfully adapted his mentor's plans for a transitional party-state, the Kuomintang being heavily enmeshed into the inner organs of the government itself. While Chairman, Hu Hanmin strategically centralised power around his office, leveraging his control over the party apparatus to his advantage.\n\nHe largely eschewed using the title of President (sometimes translated Chairman) of the National Government, seeing that as coming more into play during the constitutional phase of the revolution. His successor, [GXC.GetLeader] continues to style himself as Chairman of the Kuomintang in part to stress the temporary nature of the tutelage but also as a means of strengthening his own legitimacy. Likewise, while avoiding any personal cult of personality for himself, he freely ensures that the Nationalist government idolise Sun Yat-sen as virtually a secular deity. Day by day as he promulgates edicts on behalf of the \"Eternal Premier\", his power seems to grow unchecked.\n\nThough he has his title, the new Chairman lacks Hu Hanmin's authority and there is a growing demand among party cadres that [GXC.GetLeader] adopts a more collective style of leadership. As the storm clouds gather, his comrades meet with him to make their opinions known."
 GXC.lategame.404.a: "Все знают, что Ху — неподкупный ученик доктора Суня."
 GXC.lategame.404.b: "Власть развращает, и иногда лучше не переходить границы."

 GXC.lategame.405.t: "Политическая демократия и экономическое планирование"
 GXC.lategame.405.d: "На прошлой неделе Сунь Фо прочитал мощную лекцию под названием «Политическая демократия и экономическое планирование» классу Центрального учебного корпуса. Выступая перед молодыми кадрами, широкое присутствие отечественной и зарубежной прессы указывает на его желание еще более широкой аудитории. Вторя словам Ху Ханьминя несколько лет назад, Сунь предупреждает, что Гоминьдан стал слишком отдельной кастой, слишком высокомерной, чтобы слышать даже честную критику как со стороны посторонних, так и со стороны членов партии.\n\nЕдинственный способ противостоять этому, утверждает Сунь, — это возвращение партии к учению его отца и предоставление полной свободы слова и дискуссий. Чтобы способствовать изучению учения Сунь Ятсена и китайской культуры, он указал на недавно созданный Институт Сунь Ятсена по продвижению культуры и образования. Хотя официально он финансируется в основном за счет частных пожертвований, он получил обширную поддержку от правительства, что позволяет ему позволить себе как англоязычные публикации, такие как «Tianxia Monthly», так и отечественные журналы, такие как националистический «Сборник текущих событий».\n\nХотя инициатива получила одобрение со всей партии, агрессивная лекция Суня, а также его растущая готовность бросить вызов руководству партии вызвали обеспокоенность. Действительно, он почти осмелился бросить вызов партии подвергнуть цензуре публикацию лекции, едва балансируя на грани со своей критикой и щеголяя своим статусом «Несгибаемого». Тем не менее, пожалуй, самым раздражающим было то, как он приписывал себе коллективные решения партии, особенно когда он объявил о формировании «Народного политического совета» в конце своей речи.\n\nПредварительно одобренный на последнем заседании ЦИК, он должен был стать небольшим консультативным органом для получения мнений от политически независимых («Даньвай»), но Сунь поклялся пригласить широкое собрание интеллектуалов и даже других политических партий для перспектив разработки будущей конституции. Несмотря на его растущую смелость, не все китайские республиканцы убеждены."
 GXC.lategame.405.a: "Глоток свежего воздуха для революции."
 GXC.lategame.405.b: "Очередной болтун, просто пускающий пыль в глаза."

 ##RKMT High Zeal Closing Chain (430-459)
 GXC.lategame.430.t: "Третий национальный конгресс"
 GXC.lategame.430.d: "Наконец, Китай был объединен под одним знаменем: знаменем Гоминьдана. Это был долгий путь. Были принесены жертвы, семьи были разделены, храбрые мученики были потеряны. Но в конце концов, несмотря на все, что мир мог выставить против революции, учение доктора Суня победило. Вдохновленный вечной мудростью Трех принципов, Гоминьдан сплотил и вдохновил народ преодолеть все эти трудности, как и говорил его покойный революционный пророк.\n\nНаконец, председатель Ху Ханьминь от имени китайского народа призвал делегатов со всей страны прибыть в [ROOT.Capital.GetCapitalVictoryPointName] для обсуждения, поскольку Китай может наконец перейти к следующей странице своей истории: общенациональной политической опеке. Хотя многие опасались, что, как и провинциальные и местные опеки, процесс будет омрачен вмешательством военных, победа гражданских фракций в партии зажгла свет в конце туннеля. Впервые за десятилетия китайский народ может действительно надеяться на демократическое будущее.\n\nЭто не значит, что вокруг Конгресса нет много (заслуженного) цинизма. Действительно, когда Ху Ханьминь поднимается на трибуну, чтобы обратиться к собравшимся делегатам в начале заседаний, он повторил свои слова предостережения против самодовольной лени, вместо этого превознося необходимость постоянной революционной энергии. Через шесть лет, хвастается он, Гоминьдан завершит политическую опеку и заложит основу для последней фазы революции: Конституционной Республики.\n\nКонечно, несмотря на настойчивость Ху Ханьминя, что шесть лет — это буквальный срок, даже демонстрируя свой план того, как достичь демократии в это окно, многие подозревают, что такой график чрезмерно амбициозен. Мало кто думает, что полная демократия к концу десятилетия вероятна, но времена явно меняются, и многие становятся смелее в своих стремлениях к будущему Китая."
 GXC.lategame.430.a: "С Ху у руля демократия не за горами."
 GXC.lategame.430.b: "Ясно, что нам предстоит долгий путь."

 GXC.lategame.431.t: "Конституционный крестовый поход"
 GXC.lategame.431.d: "С момента кризиса Ли Цзунжэня немногие желали упоминать Ли или Бая на публике, надеясь забыть, что это когда-либо происходило. Но инцидент остается свежим в памяти Сунь Фо, молодого идеалиста, навсегда потрясенного угрозой военных для революции его отца. Несмотря на преобладающую ортодоксальность, установленную его отцом, настаивавшим на том, что никакая конституция не должна составляться до конституционной фазы, Сунь начал приходить к мысли, что временная конституция должна быть разработана, чтобы действовать как защита от дальнейшей нестабильности или тирании. Став почти одержимым этим вопросом, он проводил большую часть своего свободного времени, лично пытаясь составить ее.\n\nОднако для Ху Ханьминя не может быть отклонения от партийной линии, установленной Сунь Ятсеном. Причина, по которой конституция должна ждать до конституционной фазы (и также почему конституция 1912 года была отброшена), заключается в том, чтобы все партии и группы по всему Китаю могли внести свой вклад в ее разработку вместе на равных условиях. Разрабатывать временную конституцию сейчас, пока Гоминьдан наделен временной, но тем не менее полной и абсолютной властью, необходимой для завершения опеки, было бы нелогично. Более того, это несправедливо узурпировало бы власть будущего демократически избранного Национального собрания и было бы открытым признанием того, что партия не верит, что может закончить опеку своевременно.\n\nКазалось бы, в то время как многие потеряли веру в способность демократии быть достигнутой в этом поколении, Ху Ханьминь — нет. Более циничные умы, однако, указывают, что когда дело доходит до политики, Ху и Старейшины контролируют партию, в то время как другие фракции имеют влияние на бюрократию. Временная конституция, которая заранее устанавливает обещанные пять ветвей, сместила бы власть от Председателя и партийного государства к недавно основанному бюрократическому правительству. Этот вопрос обнажил глубокие идеологические разделительные линии между гражданской партией, и без компромисса в поле зрения кажется, что только одно мировоззрение победит."
 GXC.lategame.431.a: "Слишком рано начинать разработку конституции."
 GXC.lategame.431.b: "Напротив, мы слишком долго жили без нее."

 GXC.lategame.432.t: "Реконструкция нации"
 GXC.lategame.432.d: "Неотъемлемой частью Плана национальной реконструкции Гоминьдана является экономическая реконструкция, которая одновременно чрезвычайно детализирована, но также очень открыта для интерпретации, как и другие части доктрины Сунь Ятсена. В то время как больший акцент на экономических вопросах и помощи простым людям был и остается преобладающим отношением среди гражданских правых, среди более консервативных элементов партии возникло растущее чувство усталости.\n\nФракция Сишань всегда с опаской относилась к социалистическому, иконоборческому характеру партии после реорганизации, осуждая левых за разжигание классовой войны и анархии. Ошеломляющая стоимость предложенной Ху Ханьминем программы национальной реконструкции также привлекла много обеспокоенных взглядов, в сочетании с агрессивной антикапиталистической и ксенофобской риторикой многих националистов, многие инвесторы (особенно иностранные) неохотно предоставляют Республике столь необходимый капитал для расширения экономики. Альтернативой до сих пор были автаркия и высокие налоги, что вызвало значительное негодование.\n\nНаконец нарушив молчание, Цзюй Чжэн, Цзоу Лу и Фу Жулинь разработали резолюцию, призывающую к сокращению масштаба и охвата Национальной комиссии по реконструкции, надеясь сконцентрировать финансовую энергию Гоминьдана только на крупномасштабных проектах, которые внутренние инвесторы не могут финансировать самостоятельно. Они также посоветовали смягчить налогообложение и экономический контроль, продвигая более рыночно-примирительный подход к программе «Национального капитализма» Гоминьдана.\n\nЭтот умеренный, якобы «практичный» подход был осужден Ху Ханьминем, который настаивает, что политическое и национальное освобождение должно идти рука об руку с экономическим и социальным освобождением. Вновь всплыли обвинения 1911 года, когда таких людей, как Сун Цзяожэнь, обвиняли в сведении Трех принципов к Двум (опуская благосостояние), и Ху Ханьминь сурово отчитал любое представление о том, что партия должна сдерживаться от своего стремления к окончательной отмене капитализма."
 GXC.lategame.432.a: "Мудрые люди знают, когда и где открывать кошелек."
 GXC.lategame.432.b: "Подход на полном газу — единственный способ увидеть настоящую демократию."

 GXC.lategame.433.t: "Другие республиканцы"
 GXC.lategame.433.d: "Несмотря на растущее инакомыслие по поводу правдоподобности шестилетней опеки, Ху Ханьминь чувствует себя в своей тарелке. Помимо того, что он опытный политик, одаренный идеолог и красноречивый оратор, Ху — исключительный законодатель. С хорошо отработанным мастерством он начал склонять ведущих членов конгресса к своему разработанному шестилетнему плану законодательства, полудесятилетней серии законопроектов и постановлений, которые, будучи реализованными, проложат путь к перестройке нации в демократию.\n\nОбещая ключевые назначения в редакционные комитеты ведущим делегатам, Ху подчеркнул необходимость стабильной опеки, в которой партийное государство полностью мобилизует свою энергию для выполнения своей основополагающей миссии. Временный характер опеки, вместо того чтобы быть источником нестабильности, на самом деле является точкой сплочения. Его краткий характер означает, что в надлежащем демократическо-централистском стиле, как только план будет разработан, обсужден и принят, все граждане отложат свои мелкие оговорки и разногласия в пользу одной общей, немедленной цели, таким образом вкладывая всю свою энергию в реализацию плана.\n\nНаконец найдя работоспособную коалицию демократических деятелей Гоминьдана, Ху настаивает, что дальнейший компромисс не нужен до конца опеки. Другие партии и фракции могут подождать до вскоре обещанной Конституционной фазы, когда свободные выборы в каждом из тысяч уездов Китая смогут определить надлежащее влияние каждой группы. Его потенциальные партнеры по коалиции не так уверены. Цзюй Чжэн и фракция Сишань умоляли Гоминьдан включить другие партии, указывая, что, хотя Бэйянская республика была неизлечимо коррумпирована, у нее было зарождающееся правоцентристское демократическое движение, которое следует отделить и включить ради стабильности и плюрализма. Сунь Фо аналогичным образом призвал к включению заслуживающих доверия, идеалистических партий — товарищеских левоцентристских республиканских групп, базирующихся на юге. О чем умалчивается, так это о том, что эти включения продвигали бы их собственные общие интересы."
 GXC.lategame.433.a: "Как единый комитет, мы можем наконец довести опеку до конца."
 GXC.lategame.433.b: "Юг и Север должны объединиться, если Китай хочет быть единым."
 GXC.lategame.433.c: "Мы никогда не были одни в нашей борьбе за демократию."

 GXC.lategame.434.t: "Демократическое пробуждение"
 GXC.lategame.434.d: "Партийная конституция Гоминьдана гласит, что Национальный конгресс должен избирать своего Председателя, хотя на практике следующие главы партии редко вызывали много сомнений, за исключением времен серьезных бедствий, часто сопровождаемых насилием. Но впервые, возможно, за всю свою историю, партию, похоже, ждет конкурентная (хоть и внутренняя) гонка. В дополнение к Ху Ханьминю, действующему президенту, и Цзюй Чжэн из фракции Сишань, и Сунь Фо из Фракции реконструкции объявили о своих кандидатурах, стремясь вести партию через остаток политической опеки.\n\nХу почти не выказал признаков беспокойства, объявляя кандидатов, все еще чувствуя уверенность в своей неизбежной победе на выборах. В конце концов, именно он провел партию через позорное изгнание, сдерживал хищных милитаристов, отбивался от иностранных угроз и привел партию из Гуанчжоу к национальному объединению. Для него эти выборы — венец его карьеры, подтверждение представителями со всей страны, что народ доверяет ему вести их через последний мост к конституционализму.\n\nНесмотря на его уверенность, его противники вряд ли являются неизвестными выскочками. Цзюй Чжэн — верный партийный сторонник, революционный лидер в Шаньдуне во время революции 1911 года и выбранный доктором Сунем своим министром внутренних дел в 1921 году. Эффективный юрист и член-основатель Конференции Сишань, его умеренно-консервативная программа привлекла значительную поддержку со стороны большей части старой гвардии партии, северных делегатов и бюрократии.\n\nСунь Фо также стал именем нарицательным как одаренный законодатель с почти энциклопедическим знанием трудов своего отца. Его прогрессивная программа искала среднюю позицию между Ху и Цзюем. Его базу поддержки среди молодой гвардии партии, южан и интеллектуалов нельзя легко сбрасывать со счетов. После того, как каждый кандидат закончил использовать отведенное время для обоснования своего лидерства, началось голосование."
 GXC.lategame.434.a: "Ху Ханьминь обеспечивает себе еще один срок."
 GXC.lategame.434.b: "Цзюй Чжэн получает свой мандат."
 GXC.lategame.434.c: "Сунь Фо устраивает неожиданность."

 GXC.lategame.435.t: "Демократия в Гоминьдане?"
 GXC.lategame.435.d: "Гоминьдан должен действовать по принципам «демократического централизма», который на практике консолидировал власть вокруг революционной олигархии. В свою очередь, в центральном комитете часто доминировали влиятельные личности, сильнейшие часто захватывали роль Председателя. В партийных директивах было много централизма, но очень мало демократии в десятилетия после создания Гоминьдана.\n\nВчера должен был быть день, когда все изменится. В торжественной обстановке три ведущих члена Гоминьдана представили свое видение нового Китая, и после тихого голосования [GXC.GetLeader] победил с небольшим перевесом. Результаты были внутренне приняты в [GXC.Capital.GetCapitalVictoryPointName], но некоторые молча задаются вопросом, имеет ли решение значение. В конце концов, что значит, если один человек меняется, а система не может?"
 GXC.lategame.435.a: "Мы подтверждаем нашу лояльность Ху Ханьминю."
 GXC.lategame.435.b: "Мы переориентируемся на Цзюй Чжэна."
 GXC.lategame.435.c: "Мы переориентируем нашу позицию на Сунь Фо."
 GXC.lategame.435.e: "Мы постоим за себя."

 GXC.lategame.436.t: "[FROM.GetNameDefCap] подтверждает свою лояльность"
 GXC.lategame.436.intro: "С растущим чувством того, что перспективы Ху Ханьминя обеспечить еще один срок в качестве Председателя могут быть правдоподобно оспорены, многие делегаты начали взвешивать свои варианты, заглядывая в свои сердца (и кошельки), спрашивая себя, какой Китай и какого лидера они хотели бы видеть на оставшуюся часть национальной опеки. Делегаты, хотя официально избираемые местными партийными отделениями на уездном уровне, могут сильно различаться по своей автономии и принадлежности.\n\nДелегаты [FROM.GetAdjective] склонны голосовать блоком, благодаря сравнительной независимости их региона от центрального правительства. [FROM.GetLeader], лидер местного [FROM.GetRulingParty], имеет значительное влияние и накопил базу власти вдали от сферы [ROOT.Capital.GetCapitalVictoryPointName]. Хотя обычно он молчаливо избегает национальной политики, в ближайшие дни насущные вопросы, стоящие перед нацией, просто слишком велики, чтобы партийный босс [FROM.Getadjective] мог их игнорировать."
 GXC.lategame.436.d: "$GXC.lategame.436.intro$\n\nВозлагая свои надежды на революционное кредо, проповедуемое правыми реорганизаторами Клики старейшин, и, вероятно, более конкретно на действующего председателя Ху Ханьминя, [FROM.GetLeader] публично заявил о своей верности статус-кво. Хотя, возможно, он и не является полноценным сторонником более радикальных убеждений Ху, страх перед переменами в политической сфере (и сопутствующей нестабильностью) может перевесить опасения по поводу его программы, способствуя его окончательному решению. В любом случае, его поддержка высоко ценится Председателем, который, в свою очередь, похвалил «умелое ведение губернатором провинциальных дел [FROM.GetAdjective]». Его оппоненты, однако, не теряли времени даром, пытаясь ослабить хватку регионалиста над его собственной делегацией."
 GXC.lategame.436.a: "[FROM.GetLeader] и Ху Ханьминь, два человека с видением будущего."
 GXC.lategame.436.b: "Это то, что говорит [FROM.GetLeader], но что насчет его земляков?"

 GXC.lategame.437.t: "[FROM.GetNameDefCap] переориентируется на Цзюя"
 GXC.lategame.437.d: "$GXC.lategame.436.intro$\n\nПрисоединяясь к умеренному консерватизму Клики Сишань и их обещаниям сократить революционные излишества партии на время (надеемся, урезанного) этапа опеки, [FROM.GetLEader] вступил в союз с силами, стремящимися сместить действующего Председателя Ху Ханьминя. Он сделал свою благосклонность к более умеренным людям, таким как Цзюй Чжэн, публично известной, с не столь тонкими намеками на модели голосования делегации [FROM.GetAdjective].\n\nХотя он не обязательно полностью согласен с вдохновленным буддизмом традиционализмом фракции Сишань, перспективы социальной и экономической нестабильности продолжения администрации Ху Ханьминя, возможно, перевешивают его опасения по поводу политических потрясений. Независимо от этого, говорят, что Ху Ханьминь и его союзники разгневаны дерзостью губернатора, выпуская резкие заявления с требованием, чтобы региональные лидеры уважали «демократическую целостность» и избегали неправомерного влияния на избирательный процесс."
 GXC.lategame.437.a: "Вполне естественно, что местные лидеры находят утешение в Цзюй Чжэне."
 GXC.lategame.437.b: "Конечно, милитаристы предпочитают заступаться за слабое руководство."

 GXC.lategame.438.t: "[FROM.GetNameDefCap] переориентируется на Суня"
 GXC.lategame.438.d: "$GXC.lategame.436.intro$\n\nПереориентируясь на либеральный, но революционный дух Фракции реконструкции и их призывы к прогрессивному варианту существующего авангардизма, основанного на пост-реорганизации, [FROM.GEtLeader] публично поддержал Сунь Фо в его попытке заявить права на руководство партией своего отца. Он сделал свое покровительство молодому политику хорошо известным, с не столь тонкими намеками на модели голосования делегации [FROM.GetAdjective].\n\nХотя большинство полагает, что победа Суня менее важна для [FROM.GetRulingParty], чем смещение Ху Ханьминя и его радикального видения, надеясь, что последующие политические потрясения перевешиваются предполагаемым социальным и экономическим ущербом, нанесенным завершением программы Ху, выбор [FROM.GetLeader] Сунь Фо может также представлять собой подлинный сдвиг в сторону более левоцентристского видения будущего. Время покажет, какова правда, но тем временем Ху Ханьминь и его союзники настоятельно предостерегли делегацию [FROM.GetAdjective] от неправомерного политического вмешательства в избирательный процесс."
 GXC.lategame.438.a: "Сунь Фо — кандидат перемен, и люди это признают."
 GXC.lategame.438.b: "Коррупция [FROM.GetAdjective] очевидна для всех."

 GXC.lategame.439.t: "[FROM.GetNameDefCap] выступает за себя!"
 GXC.lategame.439.d: "$GXC.lategame.436.intro$\n\nВ шокирующем повороте событий [FROM.GetLeader] решил не поддерживать ни одного из трех ведущих кандидатов, вместо этого бросив свою шляпу на ринг за национальное лидерство. В серии напыщенных речей он забросил широкую сеть в надежде заручиться поддержкой, осуждая авторитаризм Центрального комитета и бесстыдно апеллируя к демократам, в то же время бичуя бездействие правительства в завершении национальной реконструкции в отчаянной попытке ухаживать за популистской базой. Он указал на свое собственное управление [FROM.GetNameDef] как на доказательство своих лидерских качеств, трубя об успехах [FROM.GetRulingParty] в построении «Образцовой провинции» [FROM.GetAdjective].\n\nОн отмел любую критику этого внезапного сдвига, превентивно обвинив [ROOT.Leader] в подтасовке голосов, предупреждая, что если ему не дадут «справедливый шанс» на «свободных выборах», могут быть ужасные последствия, посылая мурашки по всей конференции для нации, уставшей от войны. В то время как фактическое общественное положение [FROm.GetLeader] на национальном уровне в лучшем случае ограничено, его контроль над своей родной провинцией(ями) довольно неоспорим, несмотря на наши лучшие усилия. Делегация [FROM.GetAdjective] сплотилась вокруг него, и кажется, что его цель не столько в том, чтобы на самом деле выиграть голосование, сколько в подготовке предлога для захвата власти."
 GXC.lategame.439.a: "Председатель Ху начинает язвительную интеллектуальную контратаку!"
 GXC.lategame.439.b: "Цзюй Чжэн организует партийных инсайдеров в грозный оплот."
 GXC.lategame.439.c: "Сунь Фо призывает отстранить милитаристов от гонки!"

 GXC.lategame.440.t: "Наше голосование сорвано!"
 GXC.lategame.440.d: "Не желая принимать наше право свободно ассоциироваться с их политическими соперниками, конкурирующие блоки на Третьем конгрессе использовали почти любой доступный им грязный трюк, чтобы расколоть, разбавить или аннулировать влияние нашей делегации. Это включало ураган агрессивного лоббирования, политической клеветы, взяток и даже личных угроз, в надежде разделить наших делегатов против [ROOT.GetLeader]. Можно было бы ожидать большего приличия в таком официальном деле, но наши жалобы были просто отметены властями. Ясно, что они не уважают нас, видя в наших делегатах не более чем региональных деревенщин, ошибка, о которой они могут пожалеть."
 GXC.lategame.440.a: "Они заплатят за это..."

 GXC.lategame.441.t: "Новый мандат для старого Председателя"
 GXC.lategame.441.d: "Быстро, но тщательно голоса были подсчитаны. Ху Ханьминь, как и ожидалось, вышел победителем с небольшим, но достаточным перевесом. Короткий раунд празднования возник спонтанно, когда партия отметила свои первые мирные, конкурентные и относительно честные выборы, многообещающий знак того, что многие надеются увидеть впереди. Было, конечно, некоторое ворчание, особенно от тех, кто не получил достаточного одобрения, чтобы попасть в бюллетень, но и Цзюй Чжэн, и Сунь Фо поспешили пожать руки и поздравить победителя, чтобы успокоить любые опасения по поводу очередного раскола партии.\n\nХу Ханьминь вышел на сцену, поздравив их в свою очередь с хорошо проведенными выборами и поблагодарив партию за веру в него на еще один срок. Высказываясь поэтично, как он обычно делает, о философских последствиях опеки и своих теплых воспоминаниях о докторе Суне и революционерах прошлого, он затем переводит обсуждение на будущее. Впереди еще много работы, и хотя позиция Ху как главного лидера партии теперь неоспорима, противоречивые требования, предъявляемые к нему, заставили многих усомниться в его истинной позиции по направлению опеки. Нависает выбор между утопическими мечтами Ху, которые потребуют тщательной политической, социальной и экономической революции, которую он давно описывал, и невероятно быстрыми темпами прогресса, которые Ху клянется завершить. Партия сделала свой выбор сегодня, но что готовит завтрашний день, остается другим вопросом."
 GXC.lategame.441.a: "Парадокс? Или обещание?"

 GXC.lategame.442.t: "Цзюй Чжэн побеждает в голосовании"
 GXC.lategame.442.d: "Быстро, но тщательно голоса были подсчитаны. Вспышка гнева отразилась на лице Ху, когда были объявлены результаты, но он не потерял самообладания. Высокомерный человек, но еще более гордящийся своими принципами, Ху Ханьминь принял свое поражение с ледяной грацией, пожав руки и поздравив победителя перед Конгрессом. В этот момент передача власти была завершена: Цзюй Чжэн стал новым Председателем Гоминьдана. Короткий раунд празднования возник спонтанно, когда партия отметила свои первые мирные, конкурентные и относительно честные выборы, многообещающий знак того, что многие надеются увидеть впереди. Было, конечно, некоторое ворчание, особенно от тех, кто не получил достаточного одобрения, чтобы попасть в бюллетень, но согласие Ху Ханьминя и официальное признание Сунь Фо поражения на выборах вскоре после этого послали четкий сигнал: раскола партии не будет.\n\nЦзюй Чжэн вышел на сцену, поздравляя своих оппонентов с хорошо проведенными выборами и благодаря уходящего Председателя за его долгую службу нации. Он поворачивается к аудитории с твердым, уверенным голосом ученого-джентльмена. Семя демократии, ради которого партия жертвовала все эти годы, наконец проросло сегодня, и Цзюй обещает продолжать лелеять его, пока оно не расцветет. Цитируя китайскую классику и учения Сунь Ятсена с отработанным хладнокровием, его речь заверяет аудиторию в неуклонном марше к отказу от вмешивающегося влияния социализма и созданию новой китайской демократии, возглавляемой джентльменами, а не неотесанными милитаристами или радикальными смутьянами. Он заканчивает под аплодисменты, но некоторые задаются вопросом, не упускает ли он шанс партии по-настоящему изменить нацию, двигаясь слишком быстро."
 GXC.lategame.442.a: "Демократия, но будет ли у нас фундамент, чтобы сохранить ее?"

 GXC.lategame.443.t: "Сунь Фо, победитель-темная лошадка"
 GXC.lategame.443.d: "Быстро, но тщательно голоса были подсчитаны. Вспышка гнева отразилась на лице Ху, когда были объявлены результаты, но он не потерял самообладания. Высокомерный человек, но еще более гордящийся своими принципами, Ху Ханьминь принял свое поражение с ледяной грацией, пожав руки и поздравив победителя перед Конгрессом. В этот момент передача власти была завершена: Сунь Фо стал новым Председателем Гоминьдана. Короткий раунд празднования возник спонтанно, когда партия отметила свои первые мирные, конкурентные и относительно честные выборы, многообещающий знак того, что многие надеются увидеть впереди. Было, конечно, некоторое ворчание, особенно от тех, кто не получил достаточного одобрения, чтобы попасть в бюллетень, но согласие Ху Ханьминя и официальное признание Цзюй Чжэном поражения на выборах вскоре после этого послали четкий сигнал: раскола партии не будет.\n\nСунь Фо вышел на сцену, поздравляя своих оппонентов с хорошо проведенными выборами и благодаря уходящего Председателя за его долгую службу нации. Он поворачивается к аудитории с вновь обретенной энергией, сначала нервничая, но вскоре ликуя, когда его мечта всей жизни сменить отца на посту лидера партии сбылась. Говоря быстро с кантонским акцентом, многие в аудитории с трудом поспевали за его обещаниями новой конституции, включения сторонних партий и множества других реформ, сохраняя при этом принципы, на которых была построена первая реорганизация. Он заканчивает под аплодисменты, хотя многие уже решили воздержаться от суждений, пока не увидят результаты."
 GXC.lategame.443.a: "Молодой выскочка? Или главный инсайдер?"

 #Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 GXC.lategame.444.t: "Партийная демократия?"
 GXC.lategame.444.d.base: "Гоминьдан долгое время действовал по принципам «Демократического централизма», который на практике консолидировал власть вокруг революционной олигархии. В свою очередь, в центральном комитете часто доминировали влиятельные личности, сильнейшие часто захватывали роль Председателя. Было много централизма в партийных директивах, но очень мало демократии в десятилетия после создания Гоминьдана.\n\nВчера должен был быть день, когда все изменится. В торжественной обстановке три ведущих члена Гоминьдана представили свое видение нового Китая, и после тихого голосования [GXC.GetLeader] победил с небольшим перевесом. Результаты были внутренне приняты в [GXC.Capital.GetCapitalVictoryPointName], но некоторые молча задаются вопросом, имеет ли решение значение. В конце концов, что значит, если один человек меняется, а система не может?"
 GXC.lategame.444.d.generic: "$GXC.lategame.444.d.base$\n\nЧто ж, возможно, это могло бы иметь огромное значение, если бы только один человек встал! Встать непокорно против партийного государства и их бесконечных директив. Что если бы этим человеком был [ROOT.GetLeader]? Наверняка он не мог быть единственным, кто так думает? Но затем фантазия угасает, и он размышляет более трезво. Китай уже пережил десятилетия войны и разрушений, разрушенные семьи и разрушенные жизни. Теперь, когда он наконец на пороге мира и объединения, простит ли ему история, если он предпримет одну последнюю попытку остановить националистическую диктатуру? Простит ли она ему, если он этого не сделает? Какую пользу он мог бы принести, если бы китайский народ дал ему шанс? Окно возможностей ответить на это закрывается, и судьба ждет..."
 GXC.lategame.444.d.yunkmt: "$GXC.lategame.444.d.base$\n\nЧжу Пэйдэ был верным учеником партийного государства, обеспечивая безопасность Юго-запада от имени Гоминьдана. За эти годы он дал много клятв защищать партию, защищать китайский народ, поддерживать Три принципа. Голосование представляет собой то, что партия наконец выполнила свою часть сделки, предлагая небольшой аванс в качестве обещания будущего погашения. Но достаточно ли этого? После всех жертв, принесенных народом, всех погибших солдат, всех разрушений, которые перенесла земля, действительно ли центральный комитет выполнил свои обещания? Это уродливая перспектива, но, возможно, нужна одна последняя война, чтобы спасти партию от самой себя..."
 GXC.lategame.444.d.shxgmj: "$GXC.lategame.444.d.base$\n\nФэн Юйсян пришел из другой среды, независимой от Гоминьдана. Северянин с корнями в армии Бэйяна, Гоминьцзюнь сражался за демократию и революцию задолго до того, как Гоминьдан собрался с силами. Фэн стал членом Гоминьдана, затем ушел, затем снова присоединился, когда националисты вернулись. Может быть, поэтому его попытки стать серьезным кандидатом на пост председателя были проигнорированы — его даже не было в бюллетенях. «Демократия для инсайдеров», вот что Фэн хочет сказать нации. Но послушают ли они? Если бы они знали, последовали бы они за ним, чтобы бороться за настоящую демократию? Или они тихо спрятались бы в своих домах, довольные миром, который принесло объединение? Многие называют Фэна «Генералом-предателем», но если он опустит голову и предаст свои принципы, чтобы защитить свое губернаторство, кто будет настоящим предателем?"
 GXC.lategame.444.d.shxyan: "$GXC.lategame.444.d.base$\n\nЯнь Сишань присоединился к Гоминьдану из определенного прагматизма перед лицом возрождения националистов. Он известен своей способностью к политическому выживанию, и его ставка, похоже, окупилась. Китай был объединен, частично (или, может быть, даже полностью) благодаря усилиям Шаньси, Янь широко уважаем и, вероятно, сохранит свое губернаторство в ближайшем будущем, и все же что-то кажется неудовлетворительным. Янь, конечно, быстро заметил, что немногие из тех, кто стремился внести свои имена в бюллетень, были приняты, оправданием, конечно, была нехватка подписей, но Яню не привыкать к сфальсифицированным выборам. Всегда амбициозный генерал вслух задается вопросом, не слишком ли быстро нация отказалась от Бэйяна, особенно когда она кренится к партийной диктатуре."
 GXC.lategame.444.a: "Поднять знамена, это голосование — фикция!"
 GXC.lategame.444.b: "Поздравления Председателю [GXC.GetLeader]."
 GXC.lategame.444.c: "Пришло время вернуть нашу провинцию в лоно. (Переключиться на [GXC.GetNameDef])"

 GXC.lategame.445.t: "[FROM.GetLeader] оспаривает выборы!"
 GXC.lategame.445.d.base: "Многие стремились увидеть объединение Китая, даже если не все соглашались с революционной националистической повесткой Гоминьдана. Мир после десятилетий войны и разрушений был желанным зрелищем, и многие надеялись, что они наконец увидели конец Эры милитаристов. Их передышка, однако, оказалась короткой. [FROM.GetNameDefCap] восстал против Националистического правительства, отвергнув лидерство [GXC.GetLeader] и осудив результаты как недействительные, а всю систему как мошенническую. Поскольку сторонники [FROM.GetLeader] готовы подкрепить свои претензии оружием, идет гражданская война."
 GXC.lategame.445.d.generic: "$GXC.lategame.445.d.base$\n\nЦентральное правительство, конечно, как ожидается, будет иметь преимущество, контролируя крупные города Китая и обладая международной легитимностью (по крайней мере, на данный момент), что дало им больший доступ к займам, а также большую налоговую и людскую базу, чтобы позволить себе мощную центральную армию. Но [FROM.GetAdjective] регионалисты уверены в способностях своих сил, даже за пределами своей родной провинции, и ожидают, что другие присоединятся к ним, чтобы свергнуть правительство Гоминьдана. И Китаю не привыкать к потрясениям. В чем обе стороны могут согласиться, так это в том, что они не потерпят еще одной эры милитаристов."
 GXC.lategame.445.d.yunkmt: "$GXC.lategame.445.d.base$\n\nЧжу Пэйдэ долгое время был постоянным элементом политики Гоминьдана Юньнани, лидером Третьей армии старой Национально-революционной армии накануне Северного похода. Не будучи особенно известным именем за пределами провинции, его успешное возвращение земли от имени партии было значительным достижением, учитывая укоренившуюся политическую власть милитаристов региона. Более того, он заслужил значительное уважение как лидер-посредник между разбитыми остатками Национально-революционной армии после гибели Северного похода. Он собрал эти остатки в мощную армию, которая, как он надеется, сможет поддержать его рискованную заявку на национальное лидерство партии."
 GXC.lategame.445.d.shxgmj: "$GXC.lategame.445.d.base$\n\nФэн Юйсян и Гоминьцзюнь имеют сложную историю с Гоминьданом, имея независимые корни как революционное, националистическое и вдохновленное христианством ответвление базирующейся в Бэйяне клики Чжили, которое переименовало себя в северного союзника Гоминьдана во время Северного похода. Разбитый после провала похода и загнанный в горы северной Шэньси, его возвращение к власти совпало с возвращением Гоминьдана. Его популистская риторика и его осуждение авторитаризма Гоминьдана задели за живое многих, в основном северные круги, но его репутация «Генерала-предателя» опережает его. Надвигается схватка между дисциплинированным, мотивированным Гоминьцзюнем и столь же элитной и фанатичной Национально-революционной армией."
 GXC.lategame.445.d.shxyan: "$GXC.lategame.445.d.base$\n\nЯнь Сишань — губернатор Шаньси на протяжении десятилетий, известный своей амбициозной экономической и социальной программой, а также своей синкретической политикой. Известный своей нейтральностью, его решение нарушить этот нейтралитет во время Четвертой войны Чжили-Фэнтянь оказалось катастрофическим, приведя к оккупации Чжили восточной части его провинции. Это, возможно, способствовало его решению присоединиться к Гоминьдану, но, похоже, его польза для партии ослабла. Он представил свое решение восстать как попытку спасти демократию и республику Бэйян от опасных радикалов, что получило некоторое распространение, особенно среди северян, но многие задаются вопросом, будет ли он сильно отличаться."
 GXC.lategame.445.a: "Мы посрамим этих предателей!"
 GXC.lategame.445.b: "Непостижимое предательство!"

 ##RKMT Low Zeal Event Chain (460-499)
 GXC.lategame.460.t: "Линии фронта очерчены"
 GXC.lategame.460.d: "Партия всегда была спорной, полной мелкого соперничества и грандиозных идеологических разногласий. Но новая атмосфера, возникшая после Второго конгресса, была, мягко говоря, глубоко неприятной. Ху Ханьминь удалился в Гуанчжоу в мстительном позоре, отказавшись от любой партийной или правительственной работы и решив зарабатывать на жизнь писательством. Хотя он якобы «ушел» из политики, он все еще принимает политических посетителей. Ху, Сунь и Чэнь Цзитан едва разговаривают с новым правительством, последний озлоблен решением новой администрации отодвинуть на второй план самопровозглашенное «сердце революции».\n\nФракция Сишань, хотя номинально обеспечила себе Председательство и сохранила поддержку большей части гражданской бюрократии и партийной инфраструктуры, стала горько разделенной. Потомки умеренного крыла партии Сун Цзяожэня и Хуан Сина, которые тем не менее приняли авторитарную, революционную реорганизацию Суня. Падение открыто правых реорганизаторов Клики старейшин тем не менее принесло мало облегчения. У некоторых возникают сомнения, они чувствуют, что предали своего лидера, но их лидеры утверждают, что Ху не выполнил свою часть соглашения по защите их от посягательств милитаристов и что фракция Сишань сделала то, что должна была сделать. Их ведущие фигуры, Линь Сэнь, Цзюй Чжэн и Цзоу Лу, решают вести корабль лучше.\n\nПока старый Московский комитет колеблется, Гуанси остается в приподнятом настроении. С армией, все больше находящейся под их полным влиянием, вытесняя соперничающих назначенцев, Ли Цзунжэнь, Бай Чунси и их союзники стали высокомерными, но также энергичными. В дополнение к радикальным реформам в армии, они также начали наращивать свое публичное продвижение так называемой «Системы Гуанси», работая над созданием общенациональной политической машины. Переименовав себя в «Ассоциацию возрождения Гоминьдана», очевидно, что у Ли есть дальнейшие амбиции на будущее."
 GXC.lategame.460.a: "Президенту Линю брошен сложный вызов."
 GXC.lategame.460.b: "Генералиссимусу Ли дана широкая юрисдикция."

 GXC.lategame.461.t: "Раскол Юэ-Гуй"
 GXC.lategame.461.d: "С тех пор как оппозиция использовала разногласия в кантонском лагере, чтобы добиться смещения Ху Ханьминя, Гуанси и Гуандун враждуют. Напряженность продолжала расти, и Гуанчжоу стал рассадником восстания, страдая от усилий Ли Цзунжэня централизовать власть вокруг его военного штаба.\n\nДело обострилось в последние дни, когда Лян Ханьцао и Линь Юнгай, два члена Центрального наблюдательного комитета, выдвинули многочисленные обвинения против Ли Цзунжэня, обвиняя его в незаконной организации смещения Ху Ханьминя посредством угроз и присвоении диктаторских полномочий. Чэнь Цзитан использовал ситуацию, чтобы изгнать чиновников и офицеров, связанных с Новой Гуанси, из Гуандуна и призвал председателя Линь Сэня довести дело до конца и арестовать Ли.\n\nРазличные клики, собравшиеся в Гуанчжоу, поклялись создать систему комитетов для разделения власти, с ограниченным успехом. Гу Инфэнь стал политическим лицом растущей кантонской оппозиции. Гу, однако, быстро стал объектом негодования за свои политически мотивированные назначения и отказ принимать советы со стороны, что привело к появлению «Движения «Бей в барабан»» (барабан — омоним Гу) внутри отколовшегося правительства, осуждающего тиранию Гу. Неожиданно многие левые бывшие члены АТР выступили в поддержку комитета Гуанчжоу, хотя Ван вызывает глубокое недоверие из-за своего оппортунизма.\n\nСунь Фо, уже недовольный, заявил: «Ли — не обычная крыса, а чумная, которую нужно истребить», спровоцировав панику войны и крах рынка. Его оппоненты, в свою очередь, обвинили его в манипулировании ценами. Заметно отсутствует на заседаниях сам Ху Ханьминь, который воздержался, полагая (вероятно, правильно), что его прямое участие спровоцирует гражданскую войну, пока нация все еще разделена. Вместо этого он призвал к единству партии на время опеки, хотя многие отмечают, что он не давал никаких обязательств после этого."
 GXC.lategame.461.a: "Гу Инфэнь может справиться с делами тем временем."
 GXC.lategame.461.b: "Оставьте это Сунь Фо, чтобы найти достойный компромисс."
 GXC.lategame.461.c: "О, Ван Цзинвэй в этом участвует?"

 GXC.lategame.462.t: "Мадам Ли Цзунжэнь"
 GXC.lategame.462.d: "Несмотря на относительно консервативный характер нового правительства, для некоторых женщин остаются открытыми возможности для оказания значительного влияния. Го Дэцзе — сильная и волевая женщина, живо интересующаяся работой своего мужа Ли Цзунжэня. В отличие от жены Бай Чунси, которая сравнительно застенчива и находится вне внимания общественности, Го Дэцзе была официальным членом правительства провинции Гуанси и активно работала на различных должностях, включая директора женской пропагандистской группы 7-й армии, исполнительного директора Женской ассоциации Гуанси и куратора многочисленных благотворительных организаций военного времени для сирот.\n\nНеотъемлемая часть публичного имиджа генерала Ли, и учитывая, что председатель Линь Сэнь вдовец, она с радостью играла роль де-факто первой леди националистического Китая. Однако она не единственная супруга Ли. Как и большинство влиятельных китайских мужчин, Ли взял наложницу в 1924 году. Изначально в хороших отношениях, жена и наложница Ли вскоре оказались в ссоре. В противоположность ожидаемым ролям, жена родила Ли единственного ребенка (сына), в то время как наложница становилась все более влиятельной в качестве главного эмиссара своего мужа. Го была наложницей.\n\nВраждебность в доме Ли стала источником слухов в [ROOT.Capital.GetCapitalVictoryPointName], запятнав репутацию Го в элитных кругах, даже несмотря на то, что она пользуется сильным общественным имиджем. Глубоко ревнуя к своей сопернице, Ли Сювэнь, и ее статусу официальной жены Ли, говорят, она попыталась заставить сына Сювэнь Ли Юлиня называть ее матерью, что было резко отвергнуто молодым человеком.\n\nЭта мелкая ссора выплеснулась в публичную сферу во время празднования дня рождения пожилой матери Бай Чунси. Ли Сювэнь, Ли Цзунжэнь и Го Дэцзе отправили клану Бай три отдельных традиционных семейных знамени, и когда Го увидела, что знамя Сювэнь было тем, которое повесили от имени Ли, Го устроила такую яростную сцену (обвиняя Баев в том, что они смотрят на нее свысока), что все три были повешены отдельно в качестве компромисса. Председатель Линь Сэнь, давний сторонник моногамии и решения Гоминьдана номинально отменить практику наложничества, нашел время, чтобы упрекнуть Ли, указывая на печально известные истории политики императорского гарема и раздор, который полигамия посеяла в китайской политике."
 GXC.lategame.462.a: "Какая позорная гарпия."
 GXC.lategame.462.b: "Это мадам Ли Цзунжэнь для вас."

 GXC.lategame.463.t: "Контрреволюционеры и цензура"
 GXC.lategame.463.d: "Цензура широко распространена в националистическом Китае, пресса в основном вынуждена соответствовать стандартам, навязанным правительством. Степень этих репрессий варьируется: некоторые газеты напрямую связаны с Гоминьданом, в то время как другие балансируют между своей журналистской честностью и следованием государственной линии. Продолжающаяся внутрипартийная нестабильность неблагоприятно сказалась на независимости СМИ, даже когда Гоминьдан изо всех сил пытается создать для себя последовательный посыл.\n\nДаже когда различные партийные фракции борются за власть, «Положение о наказании контрреволюционеров» было успешно принято при двойственной поддержке, что еще больше усилило способность государства ограничивать нежелательные точки зрения. Различные левые, либеральные и даже прохуханьминьские газеты были закрыты, особенно в недавно завоеванных провинциях, находящихся под более строгим военным или партийным управлением. Многие редакторы жалуются, что ожидания были хаотичными, а цензоры ежедневно играют в угадайку относительно ожиданий своего начальства. Опасаясь репрессий, многие перестраховываются, еще больше подавляя издателей. В одном постыдном случае цензоры запретили распространение собственного официального заявления правительства для прессы.\n\nОдин иностранный корреспондент отмечает, что китайская цензура на порядок хуже, чем даже соседняя японская, подсчитав, что японцы вырезали менее 500 слов из одного известного американского информационного агентства за несколько лет, в то время как китайцы удалили в четыре раза больше из того же издания всего за несколько месяцев. Длинная рука китайской цензуры, как ожидается, будет только расти, поскольку новое правительство находит умные способы ограничения иностранной прессы, такой как принадлежащая британцам «North China Daily News». Находясь в концессии, газета могла безопасно печататься, но партийное государство отозвало ее почтовые привилегии, чтобы затруднить распространение.\n\nВ условиях продолжающейся революции в партии мало голосов, готовых выступить против этих ограничений. Большинство нашло некоторое убежище в Гуанчжоу, где ограничения несколько мягче, но реальных изменений в ближайшее время не ожидается."
 GXC.lategame.463.a: "Народ может и должен доверять правительству."
 GXC.lategame.463.b: "Мы приносим больше пользы прозрачностью."

 GXC.lategame.464.t: "Великие дебаты о спорте"
 GXC.lategame.464.d: "Новая клика Гуанси сделала своей миссией перековку Китая в нацию, способную отбивать захватчиков, продвигая планы по преобразованию 12 часов в неделю, отведенных на школьный спорт, во время, отведенное для военизированной подготовки. Ма Цзюньу, ведущий педагог Гуанси и, кстати, переводчик «Происхождения видов» Чарльза Дарвина, собрал ведущих интеллектуалов и законодателей, чтобы призвать превратить игровые площадки в площадки «Спасения нации». Они отвергли аргументы о том, что такие радикальные меры снизят репутацию китайского образования, утверждая, что студентам следует бояться насмешек не за неспособность играть в мяч, а скорее за неспособность защитить свою собственную страну.\n\nБай Чунси пошел дальше, заявив, что спорт в Китае следует оценивать на основе «экономичности, практичности, применимости и универсальности доступа», и военные учения соответствуют всем четырем критериям. Для него военные и смежные мероприятия, такие как бег, плавание, альпинизм, прыжки в высоту и длину, художественная гимнастика и стрельба по мишеням, были дешевыми и немедленно необходимыми, в то время как популярные виды спорта, такие как теннис, были открыты только для богатых.\n\nБай высмеивал лицемерных студентов, которые охотно участвовали в бойкотах и протестах против японского империализма, но которых нигде не было видно, когда их призывали служить своей стране. Ли высказался в схожем тоне, утверждая, что студенты — будущие лидеры страны и имеют большое влияние на массы, и если они не желают защищать свою нацию, то Китай обречен. Несмотря на свои разногласия, Цзюй Чжэн согласился, считая, что Китай должен принять японский стиль фитнеса и медицинских осмотров, дисквалифицируя изнеженных чиновников от правительства, образования и даже брака. Их резкие слова не принесли им особой поддержки среди китайского студенчества, многие из которых присоединились к педагогам, протестуя против введения этой новой политики. После голосования с небольшим перевесом..."
 GXC.lategame.464.a: "Реформы приняты!"
 GXC.lategame.464.b: "Предложение отложено."

 GXC.lategame.465.t: "Четыре великих каллиграфа"
 GXC.lategame.465.d: "Пока Гоминьдан продвигает социальную революцию, он также пошел на многое, чтобы сохранить или укрепить элементы китайской культуры, которые они сочли ценными. Китайская каллиграфия — это древняя форма искусства, считающаяся одним из четырех классических навыков китайского ученого-джентльмена (наряду с игрой на струнных инструментах, живописью и мастерством в «Го»), и действительно многие из ведущих членов Гоминьдана очень любят совершенствовать свою технику в свободное время.\n\nКаллиграфия претерпела различные трансформации за эти годы, и появились разные стили. Правительство националистов хвастается «Четырьмя великими каллиграфами Республики» в своих рядах: Тань Янькай из Хунани, специализирующийся на регулярном письме (кайшу), прославленный Ху Ханьминь на официальном письме (лишу), пожилой анархист У Чжихэй на печатном письме (чжуаньшу) и уважаемый Юй Южэнь на скорописи (цаошу). Хотя этот ярлык, безусловно, имеет пропагандистский оттенок, пытаясь продемонстрировать уважение нового правительства к почтенным традициям, Юй Южэня, в частности, хвалят за продвижение скорописи.\n\nГоворят, что он был первым, кто разработал современную стандартную скоропись, и многие считают его мудрецом в этой форме. Быстрее и легче писать и читать, сохраняя при этом точность и красоту, Юй вложил значительную энергию в исследование, организацию и каталогизацию тысяч китайских иероглифов в свою широко читаемую «Тысячу иероглифов стандартной скорописи». Он также основал «Общество стандартной скорописи» для продвижения этой новой формы.\n\nЕго каллиграфия считается настолько ценной, что различные собственноручно написанные им объявления, в том числе предупреждающие о недопустимости мочеиспускания в общественных местах, как говорят, были украдены и проданы как предметы коллекционирования. Это продвижение китайских традиционных ценностей оказалось благом для консервативных элементов Гоминьдана, затронув струну в душе старых китайских ученых-шэньши и обеспечив некоторую поддержку осажденному правительству Сишань, которое часто сетует на потерю китайской культуры из-за некультурных милитаристов и иконоборцев-социалистов."
 GXC.lategame.465.a: "Неужели в Китае не осталось места для красоты?"
 GXC.lategame.465.b: "У нас наверняка есть дела поважнее."

 GXC.lategame.466.t: "Старый столп Центрального комитета"
 GXC.lategame.466.d: "В спорных рядах соперничающих Центральных исполнительных комитетов осталось очень мало людей, которые все еще находятся в «нейтральном» пространстве, по крайней мере, как по характеру, так и по официальной позиции. Естественно, существует значительная группа людей, поддерживающих просто «партию», причем ни «левые», ни «правые» не сохраняют какого-либо статуса в Гоминьдане. Они до предела защищают единство партии, объявляя всех, кто придерживается таких фракционных настроений, сродни врагам доктора Суня и Трех принципов. Это чувство, несомненно, популярно, поддерживается такими, как Сишань (даже если их экстремистские сторонники считают, что кадры Ван Цзинвэя больше не заслуживают членства в партии), Сунь Фо и Реконструкция (если они снова потребуют перерегистрации членства в партии, чтобы исключить «плохие» элементы), и даже Ху Ханьминь, с его постоянным призывом к партийной дисциплине и организации, осуждающим раздробленный характер, который предполагает политика Единого фронта.\n\nУвы, история не была добра к единству первоначального состава Гоминьдана. Близкие товарищи 1924 года были разорваны на части революционным пылом, захватом власти и корыстными жертвами на алтарь Национальной революции. Однако некоторым людям удалось остаться непоколебимыми, неизменными в своей лояльности и преданности Партии и ее Единству. Член Центрального исполнительного комитета с момента его создания в 1924 году, Дин Вэйфэнь, вежливый человек и когда-то яростный революционер, навсегда остался столпом долга. Напоминанием о том, за что борется Партия.\n\nВступив в Тунмэнхой вскоре после его создания, Дин унаследовал титул председателя Шаньдунского отделения. Сплотив Шаньдун по зову Синьхая, Дин стал директором Шаньдунского провинциального партийного комитета Гоминьдана в 1912 году. Участвуя в Войне в защиту нации, Дин служил в Правительстве защиты конституции Суня, используя свои связи как редкого члена Северной партии для влияния на членство на Центральных равнинах. Участвуя в реорганизации, Дин принимал Сунь Ятсена, Ван Цзинвэя и других во время роковой поездки Гофу в Пекин. Симпатизируя Сишань, Дин тем не менее остался верен Кантонскому комитету, участвуя во Втором национальном конгрессе.\n\nВынужденный бежать из страны, поскольку Пять рас превзошли Белое Солнце, Дин связался с соперничающим ЦИК Ху Ханьминя и был избран одним из его членов. Дин посвятил свое время в промежутке плодотворному писательству, опубликовав «Цидунъюй» в 1931 году, «Мао Ши Шуаншэн Тунчжуаньюнь Чжэн» в 1936 году, став влиятельным экспертом в изучении конфуцианской классики, даже получив похвалу от Чжан Тайяня. Однако в официальных партийных делах на Дина по-прежнему широко полагаются в вопросах Северной партии, действуя как ее импровизированный глава."
 GXC.lategame.466.a: "Мы все можем что-то почерпнуть из его службы."
 GXC.lategame.466.b: "Старый дурак должен научиться выбирать сторону."

 ##RKMT Low Zeal Closing Chain (500-529)
 GXC.lategame.500.t: "Схватка Юэ-Гуй"
 GXC.lategame.500.d: "Объединение Китая положило конец трагической эре милитаризма, конкурирующих правительств и иностранного империализма, но Век унижений не закончится по-настоящему, пока победивший Гоминьдан не разберется со своими внутренними делами. Хотя для большей части мира очевидно, что новым правительством будет править Националистическая партия, пропасть между правительством, в котором доминирует Новая клика Гуанси (Гуй), и оппозицией, в которой доминируют кантонцы, базирующейся в Гуандуне (Юэ), стала шире теперь, когда мало внешних угроз, объединяющих их.\n\nСунь Фо взял на себя роль представителя лагеря Юэ, положив конец неофициальному прекращению огня в словесной войне, официально осудив Ли Цзунжэня, Бай Чунси, Хуан Шаохуна и Хуан Сюйчу как тираническую армейскую клику. При поддержке таких генералов, как Сюй Чунчжи, Ли Лецзюнь и Чэнь Цзитан, правительство Юэ сплотило широкий фронт, чтобы противостоять надвигающейся диктатуре, и выдвинуло ультиматум Ли Цзунжэню уйти со всех своих постов в течение следующих 48 часов. Более того, они расширили свои требования, настаивая на справедливой политике наказания и поощрения солдат (которых часто считают стоящими выше закона), устранении регионализма в армии, полной публичной прозрачности бюджета и искоренении коррупции в бюрократии, неявно возлагая вину за основные недостатки правительства на Новую клику Гуанси.\n\nВ то время как Ли Цзунжэнь отказался публично удостоить ответом, его союзники ответили огнем, обвинив Сунь Фо в том, что он дилетант американского производства, написав в официальном письме, что он «человек, богатый эмоциями, но без мудрости, с богатством вежливости, но лишенный праведности, изменчивый в личности, без личного мнения или суждения», указывая на его карусель лояльности, включая присоединение, а затем отказ от Конференции Сишань, Правительства Вана и совсем недавно правого Правительства. В свою очередь, они утверждают, что он украл миллионы на своих различных должностях, обогащая себя и своих союзников.\n\nРуководство Сишань, имеющее представителей в обоих лагерях, предпринимает усилия по созданию политического выхода и воссоединению правительств Юэ и Гуй. Однако тревожно молчит Ху Ханьминь, который остается в добровольном изгнании в своем кабинете в Гуанчжоу."
 GXC.lategame.500.a: "Диктатура Гуй должна быть пресечена в зародыше!"
 GXC.lategame.500.b: "Декаданс Юэ — это оскорбление всего, за что мы боролись!"

 GXC.lategame.501.t: "Новая одежда Генералиссимуса"
 GXC.lategame.501.d: "Хотя Линь Сэнь остается президентом Республики и председателем Гоминьдана, героем дня является генерал Ли Цзунжэнь, который позаботился о том, чтобы его восхваляли при любой возможности как отечественная, так и зарубежная пресса. Иностранцы быстро это поняли, и некоторые крупные издания открыто называют первого «Марионеточным президентом Линем» и считают Ли истинным лидером молодого правительства. Союзники Ли, безусловно, ведут себя так, будто их победа уже близка: Бай Чунси и другие генералы выступают с самодовольными обращениями к войскам, в то время как Хуан Шаохун и Хуан Сюйчу обращаются к посетителям со всей страны, расхваливая успехи Гуанси как «Образцовой провинции» для нации. Недавний тур с выступлениями мадам Ли и медиа-кампания газетных баронов Гуанси, таких как Цянь Шифу и Кан Чжэньхуа, — все сигнализировали об одном и том же: время президента Ли Цзунжэня пришло.\n\nСам потенциальный президент принял более скромный тон, отрицая какие-либо прямые амбиции на лидерство. Он предпринял согласованные усилия, чтобы привлечь либерально-демократических деятелей через Ассоциацию возрождения Гоминьдана, дистанцируясь от регионалистской идентичности Новой клики Гуанси в пользу создания образа национального героя войны. Он создал резкий контраст с интеллектуалами, которые доминируют в верхах конкурирующего правительства Юэ, изображая себя скромным солдатом из бедной семьи, который поднялся по служебной лестнице во время великой чрезвычайной ситуации. Его простой стиль речи и прагматичное мировоззрение вызвали некоторую симпатию в отличие от цветистого языка и кажущихся непрактичными видений его врагов.\n\nЛи стремился встретиться с различными северными фигурами в Пекине в своей роли «Личного военного представителя Президента в Пекине», добившись популярности среди военных и либеральных кругов, его компетентность как администратора приписывается успокоению студенческих протестов. Его дружба с Бай Чунси, китайцем-хуэй, позволила ему заручиться поддержкой китайских мусульман, и он также стремился заручиться поддержкой таких известных деятелей, как Ху Ши, Гань Хоусянь и Янь Янчу («Джеймс Йен»). При всех обвинениях оппозиции в тирании ясно, что Ли проделал значительную работу, чтобы создать для себя народный мандат."
 GXC.lategame.501.a: "Ли убеждает даже самых нерешительных перейти на свою сторону."
 GXC.lategame.501.b: "Неохотные мечтатели Бэйяна сплачивают ряды против него."

 GXC.lategame.502.t: "Гамбит Сишань"
 GXC.lategame.502.d: "Несмотря на то, что номинально они являются правящей партией в Республике, Фракция Сишань оказалась в ловушке между враждующими лагерями Юэ и Гуй. Управляя из [ROOT.Capital.GetCapitalVictoryPointName], их власть едва распространяется за пределы Президентского дворца (в котором Линь Сэнь отказался жить лично, предпочитая вместо этого скромный арендованный дом), и их лидеры часто курсируют из Наньнина в Гуанчжоу, призывая к единству.\n\nЛи Цзунжэнь приписал себе львиную долю заслуг за объединение Китая националистическим правительством, оставив правительство Сишань хронически испытывающим нехватку доверия со стороны широкой общественности. Их способность контролировать генералов или обеспечивать соблюдение условий переговоров после Второго конгресса в значительной степени угасла, так как усилия Ли Лецзюня могут зайти только так далеко. Повстанцы Гуанчжоу формально признают президентство Линя, но в значительной степени игнорируют его, не желая сотрудничать с правительством, в котором Ли занимает должность. Они умоляли Линя приказать сместить Ли, что является политической невозможностью во время войны.\n\nНесмотря на это, фракция Сишань по-прежнему полна решимости сопротивляться влиянию генерала. Негодование назревало с начала войны. Многие члены фракции начали перебегать в правительство Юэ по мере роста авторитаризма Ли. Сын Чжан Цзи умер при подозрительных обстоятельствах недалеко от полевого штаба Ли, в то время как проблемный племянник Линь Сэня погиб в бою, разбив сердце приемного отца. Пожилой Председатель, прозванный «Старик Зеленое Растение» после ценного визита на гору Цинчжи («Зеленое растение») в Фуцзяни, в результате в значительной степени разочаровался.\n\nНаходясь под постоянным давлением агентов Новой клики Гуанси, он вместе с Цзюй Чжэном, Сюй Чунчжи и Цзоу Лу созвал многих ведущих членов правительства в [ROOT.Capital.GetCapitalVictoryPointName] на важное совещание. Давно ожидаемое, с волнением одними и с ужасом другими, делается важное объявление:"
 GXC.lategame.502.a: "Линь Сэнь подал в отставку с поста Председателя..."
 GXC.lategame.502.b: "...но не раньше, чем одобрил Цзюй Чжэна в качестве своего преемника."

 GXC.lategame.503.t: "Бросая перчатку"
 GXC.lategame.503.d: "Новость о грядущей отставке Линь Сэня с поста президента разнеслась по всей стране, быстро выйдя за пределы номинально закрытого заседания Центрального исполнительного комитета. К рассвету она достигла первых полос всех крупных газет в городах по всему Китаю. Его решение выдвинуть Цзюй Чжэна своим преемником застало лагерь Гуй врасплох, но Ли Цзунжэнь остается непоколебимым, принимая собственную номинацию от главных союзников, таких как Бай Чунси и Хуан Шаохун. Несколько второстепенных кандидатов бросили свои шляпы на ринг, но ожидается, что поле очень быстро отсеется перед официальным голосованием партии.\n\nВзоры обращаются к скромному дому в Гуанчжоу, неофициальной базе фракции Юэ. Там живет единственный реальный третий претендент на власть в аппарате Гоминьдана: опальный председатель Ху Ханьминь. Кипя от своего первоначального предательства и изгнания, он отказался от какой-либо роли в новом правительстве, но отказался поддержать любой шаг по его свержению, несмотря на частые уговоры бывших союзников, таких как Гу Инфэнь, Сунь Фо и Чэнь Цзитан. Он утверждал, что доктор Сунь хотел бы, чтобы все его последователи верно придерживались руководства партии для обеспечения национального объединения.\n\nТеперь, когда это достигнуто, многие ожидали, что он выйдет из своего добровольного изгнания. Сегодня он наконец сделал это с большой помпой среди лагеря Юэ, официально приняв мантию Председателя Комитета Гуанчжоу. В громкой речи он осудил Ли Цзунжэня как военного узурпатора в духе Юань Шикая. Он призвал Гуандун взять на себя ответственность как Пьемонт Китая, выступив против Ли Цзунжэня и его клики. Что касается предстоящих выборов, он не объявил о своей кандидатуре, вместо этого заявив, что любые выборы будут нелегитимными, пока Ли Цзунжэнь остается на свободе, чтобы коррумпировать их.\n\nПриветствуемое многими, обвиняемое другими в том, что это «зелен виноград» (зависть), возвращение Ху на публичную сцену представляет серьезную угрозу амбициям Ли Цзунжэня и подрывает усилия Сишань сплотить гражданскую оппозицию. Несмотря на его браваду, собственное положение Ху в Гуанчжоу, как говорят, также ненадежно — его изгнание создало атмосферу таинственности, но его некогда возвышающийся статус тем не менее снизился."
 GXC.lategame.503.a: "Возвращение Ху оживляет Гуанчжоу!"
 GXC.lategame.503.b: "У него был шанс, и он его упустил."

 GXC.lategame.504.t: "Противостояние в [ROOT.Capital.GetCapitalVictoryPointName]"
 GXC.lategame.504.d: "Многие надеялись, что первые выборы президента новой Китайской Республики будут демократическими, с представителями от каждого из тысяч округов Китая, присутствующими на грандиозном мероприятии. Многие также надеялись, что это будет достойное событие, сочетающее величие должности с ликованием нового лидера. Ни то, ни другое не кажется особенно вероятным в [GetYear] году, и хотя какое-то голосование, как ожидается, будет сляпано в будущем, поспешно собранная внутренняя партийная конференция Гоминьдана де-факто решит, кто будет лидером нации на время политической опеки.\n\nЗаседания были в беспорядке еще до того, как начались. Делегаты, поддерживающие Юэ, решили бойкотировать конференцию, следуя примеру Ху Ханьминя, настаивая на аресте Ли. Вопиющие угрозы, взятки и шантаж усилились, омрачая законодательный этаж открытым насилием. Линь Сэнь в своих последних действиях в качестве председателя продвигал встречу, признавая, что на столе действительно только один вопрос. Его выбор оказался удачным, не дав делам полностью сойти с рельсов.\n\nКандидаты излагают свои доводы в официальных речах, хотя все присутствующие уже знают шаблонные фразы. Демократизация и примирение с Юэ для Цзюй Чжэна. Порядок и стабильное лидерство для Ли Цзунжэня. Под тенью возобновленной войны наблюдатели молча молятся за победу своей любимой стороны. Не теряя времени, бюллетени подсчитываются. С небольшим перевесом..."
 GXC.lategame.504.a: "Ли Цзунжэнь и его разношерстные союзники выиграли гонку."
 GXC.lategame.504.b: "Цзюй Чжэн и истеблишмент обеспечили неожиданную победу."

 GXC.lategame.505.t: "Противостояние Юэ-Гуй"
 GXC.lategame.505.d: "Несмотря на десятилетия неудач после Синьхая, окончательными победителями эры милитаристов стали две провинции, составляющие Лянгуан (буквально «два Гуана»): Гуандун (сокращенно Юэ) и Гуанси (сокращенно Гуй). Фракции Гоминьдана, которые первыми собрали свои силы в Лянгуане, достигли чего-то довольно редкого в китайской истории — пути объединения с юга на север. Этим Гоминьдан (Националистическая партия) утвердил себя как неоспоримую правящую партию Китая.\n\nИли, по крайней мере, так было бы, если бы не продолжающиеся разногласия в раздробленном однопартийном государстве. Продолжающиеся споры о национальном лидерстве проявились в фактическом расколе между фракцией «Гуй», номинально управляемой председателем Линь Сэнем и гражданской фракцией Сишань, но де-факто находящейся под растущим влиянием Ли Цзунжэня и Новой клики Гуанси, и конкурирующей фракцией «Юэ», которая собрала широкую коалицию для противодействия Ли Цзунжэню после его победы над бывшим председателем Ху Ханьминем во время Второго национального конгресса.\n\nДела обострились в последние дни с решением Линь Сэня уйти в отставку с поста Председателя, без сомнения, под давлением, чтобы уступить место восхождению Ли Цзунжэня на высший пост в стране. Ли с нетерпением полировал свои верительные грамоты как военного героя и как друга китайского либерализма, рисуя себя разумным, практичным человеком, способным решить проблемы Китая. В отчаянной попытке избежать того, что в противном случае рассматривалось бы как свершившийся факт, Линь одобрил своего союзника Цзюй Чжэна в качестве своего преемника, форсировав внутрипартийные выборы и надеясь, что укоренившиеся гражданские партийные интересы сомкнут ряды за Цзюем. Это ввергло правительство Гуй в беспорядок.\n\nБолее слабое правительство Юэ отреагировало сплочением вокруг Ху Ханьминя, который вернулся из своего добровольного изгнания в Гуанчжоу, чтобы взять на себя руководство. Призывая к полному изгнанию Ли Цзунжэня и его клики, они использовали традиционную роль Гуандуна как оплота партии, чтобы создать убедительное конкурирующее правительство. Юэ и Гуй, похоже, находятся на грани гражданской войны, и предстоящие выборы Гуй, вероятно, определят, можно ли разрешить кризис мирным путем. Естественно, все стороны обхаживали [ROOT.GetLeader]."
 GXC.lategame.505.a: "Мы окажем поддержку кандидатуре Ли Цзунжэня!"
 GXC.lategame.505.b: "Мы поддержим Цзюй Чжэна на национальное лидерство!"
 GXC.lategame.505.c: "Мы бросаем жребий с Ху Ханьминем и правительством Юэ!"
 GXC.lategame.505.e: "Возможно, партийное государство не так уж непогрешимо..."

 GXC.lategame.506.t: "[FROM.GetNameDefCap] поддерживает Ли Цзунжэня"
 GXC.lategame.506.d: "С беспокойством наблюдая за растущими разногласиями между Юэ и Гуй, [FROM.GetLeader] решил поддержать кандидатуру Ли Цзунжэня на пост Председателя. В то время как в нормальное время влияние отдаленных регионов было бы легко игнорировать по сравнению с «основной территорией», контролируемой националистами, в условиях кризиса центрального правительства эти одобрения региональных игроков могут иметь решающее значение. Решение [FROM.GetLeader] эффективно мобилизует вес делегации [FROM.GetAdjective] в пользу генерала Ли, что может побудить другие, более мелкие делегации последовать их примеру, каскадный эффект, который может качнуть то, что, как ожидается, будет напряженной гонкой.\n\nПочему лидер [FROM.GetAdjective] решил так поступить, неясно, особенно учитывая его удаленность от центра политики [GXC.Capital.GetCapitalVictoryPointName]. Возможно, это из-за симпатии к генералу Ли против того, что [FROM.GetRulingParty] воспринимает как коррумпированный истеблишмент, или, может быть, это для того, чтобы войти в милость к тому, кто, по их мнению, является неизбежным победителем. Или, может быть, они надеются посеять хаос, который можно использовать для своих собственных амбиций.\n\nУ союзников Цзюй Чжэна в Клике Сишань мало времени, чтобы блокировать импульс Новой Гуанси, хотя варианты остаются ограниченными. Ослабление эффектов такого публичного одобрения притупило бы методы, видимый признак неверия Цзюя в расцветающую демократию партии, что может нанести долгосрочный ущерб общественному восприятию. Более того, некоторые опасаются, что такая ловушка была запланированным ответом с самого начала, что решение [FROM.GetLeader] вмешаться в национальную политику — это ловушка, призванная дать им предлог, необходимый для осуждения партийного государства в целом. С двумя армиями, уже готовыми сражаться друг с другом, можем ли мы действительно позволить себе третью?"
 GXC.lategame.506.a: "Генерал Ли выражает свою скромную благодарность."
 GXC.lategame.506.b: "Его враги шлют привет..."

 GXC.lategame.507.t: "[FROM.GetNameDefCap] поддерживает Цзюй Чжэна"
 GXC.lategame.507.d: "С беспокойством наблюдая за растущими разногласиями между Юэ и Гуй, [FROM.GetLeader] решил поддержать кандидатуру Цзюй Чжэна на пост Председателя. В то время как в нормальное время влияние отдаленных регионов было бы легко игнорировать по сравнению с «основной территорией», контролируемой националистами, в условиях кризиса центрального правительства эти одобрения региональных игроков могут иметь решающее значение. Решение [FROM.GetLeader] эффективно мобилизует вес делегации [FROM.GetAdjective] в пользу господина Цзюя, что может побудить другие, более мелкие делегации последовать их примеру, каскадный эффект, который может качнуть то, что, как ожидается, будет напряженной гонкой.\n\nПочему лидер [FROM.GetAdjective] решил так поступить, неясно, особенно учитывая его удаленность от центра политики [GXC.Capital.GetCapitalVictoryPointName]. Возможно, это из-за симпатии к Цзюй Чжэну против того, что [FROM.GetRulingParty] воспринимает как нового Юань Шикая, или, может быть, это для того, чтобы войти в милость к тому, кто, по их мнению, является неизбежным победителем. Или, может быть, они надеются посеять хаос, который можно использовать для своих собственных амбиций.\n\nУ союзников Ли Цзунжэня в Новой клике Гуанси мало времени, чтобы блокировать импульс Сишань, хотя варианты остаются ограниченными. Ослабление эффектов такого публичного одобрения притупило бы методы, видимый признак неверия Ли в расцветающую демократию партии, что может нанести долгосрочный ущерб общественному восприятию. Более того, некоторые опасаются, что такая ловушка была запланированным ответом с самого начала, что решение [FROM.GetLeader] вмешаться в национальную политику — это ловушка, призванная дать им предлог, необходимый для осуждения партийного государства в целом. С двумя армиями, уже готовыми сражаться друг с другом, можем ли мы действительно позволить себе третью?"
 GXC.lategame.507.a: "Цзюй Чжэн принимает всю поддержку, которую может получить."
 GXC.lategame.507.b: "...но мало что из этого дойдет до [GXC.Capital.GetCapitalVictoryPointName]!"

 GXC.lategame.508.t: "[FROM.GetName] признает Ху Ханьминя"
 GXC.lategame.508.d: "С беспокойством наблюдая за растущими разногласиями между Юэ и Гуй, [FROM.GetLeader] полностью отозвал свое признание так называемого правительства Гуй, официально объявив о своей поддержке Ху Ханьминя и его правительства Юэ. В то время как в нормальное время влияние отдаленных регионов было бы легко игнорировать по сравнению с «основной территорией», контролируемой националистами, в условиях кризиса центрального правительства эти одобрения региональных игроков могут иметь решающее значение. Решение [FROM.GetLeader] ставит под сомнение легитимность выборов Гуй и повышает влияние оппозиции. Среди многих в лагере Гуй существует опасение, что это может стать началом лавины, когда более мелкие группы последуют их примеру.\n\nПочему лидер [FROM.GetAdjective] решил так поступить, неясно, особенно учитывая его удаленность от центра политики [GXC.Capital.GetCapitalVictoryPointName]. Действительно, понимается, что некоторые «неофициальные» эмиссары остаются при правительстве Гуй, сохраняя ногу в обоих лагерях на случай, если потребуется посредничество в дальнейших закулисных переговорах. Держать свои варианты открытыми — всегда мудрое решение, учитывая изменчивую природу Эры милитаристов.\n\nВремя для лоялистов Гуй ограничено, чтобы оказать давление на власть имущих [FROM.GetAdjective] обратно на их сторону или, по крайней мере, в положение нейтралитета. Хотя региональные лидеры, такие как [FROM.GetLeader], имеют огромное влияние на своей соответствующей территории, оно не абсолютно, и это создает еще более запутанную политическую динамику. С другой стороны, по мере того как раскол Юэ-Гуй ухудшается, становится все труднее скрывать масштаб кризиса от уставшей от войны широкой общественности. Более того, некоторые опасаются, что такая ловушка была запланированным ответом с самого начала, что решение [FROM.GetLeader] вмешаться в национальную политику — это ловушка, призванная дать им предлог, необходимый для осуждения партийного государства в целом. С двумя армиями, уже готовыми сражаться друг с другом, можем ли мы действительно позволить себе третью?"
 GXC.lategame.508.a: "Удача Ху Ханьминя продолжает расти."
 GXC.lategame.508.b: "...но гордость предшествует падению!"

 GXC.lategame.509.t: "[FROM.GetName] осуждает Юэ-Гуй"
 GXC.lategame.509.d: "С беспокойством наблюдая за растущими разногласиями между Юэ и Гуй, [FROM.GetLeader] призвал обе фракции в смелом обращении в [FROM.Capital.GetCapitalVictoryPointName], предложив полностью порвать с Гоминьданом Лянгуана. Возможно, как свидетельство растущей слабости центрального правительства, теперь расколотого на два лагеря на грани обмена ударами, способность регионалиста-выскочки высказываться подобным образом не сулит ничего хорошего будущему Националистического правительства.\n\nОчень публичные слова лидера [FROM.GetAdjective], вероятно, прощупывают почву, чтобы увидеть, есть ли у него политическая поддержка, чтобы сделать свою собственную заявку на власть, сплачивая недовольные и/или оппортунистические элементы против Гоминьдана. Конечно, эмиссары [FROM.GetAdjective] остаются прикрепленными к кругам Гуй и Юэ, знак того, что [FROM.GetRulingParty] еще не полностью решились на разрыв с Лянгуаном, но предупреждение очень очевидно.\n\nВремя для лагерей Юэ и Гуй, чтобы разрешить свои разногласия, уходит, и люди устали от распрей и отсутствия прогресса в улучшении их участи, созревшая среда для нового вызова новому Националистическому правительству. Верховное командование предупреждает, что восстание кажется неизбежным, и с двумя армиями, уже готовыми сражаться друг с другом, можем ли мы действительно позволить себе третью?"
 GXC.lategame.509.a: "Генерал Ли и его люди не терпят предателей!"
 GXC.lategame.509.b: "Господин Цзюй заключит быстрое, но справедливое соглашение."
 GXC.lategame.509.c: "Председатель Ху охраняет нашу революцию. Он всегда это делал."

 GXC.lategame.510.t: "Гоминьдан отвергает наши усилия!"
 GXC.lategame.510.d: "Несмотря на наши искренние попытки вмешаться в назревающий кризис между правительствами Юэ и Гуй, которые разделили Гоминьдан, похоже, единственное, в чем могут согласиться эти высокомерные фракции, — это то, что они не терпят мнений со стороны. Наши мнения были подавлены государственной цензурой, наших представителей преследовала тайная полиция, а предложения о посредничестве были отметены. Послание не могло быть более ясным: «это внутреннее дело, посторонним не нужно говорить».\n\nКакое эгоистичное, грубое отношение для партии! Они утверждают, что являются объединителями, борются за демократию, и все же люди не могут высказать свое мнение? Это унижение не было воспринято хорошо в [ROOT.Capital.GetCapitalVictoryPointName], и многие в [ROOT.GetRulingParty] призывают к действию. Независимо от того, как выпадут кости, в конце раскола Юэ-Гуй будет диктатура — так зачем ждать, чтобы увидеть, какой тиран восстанет из пепла, чтобы угнетать нас? Сейчас наша возможность, говорят они, крик, который раздается даже среди низших чинов. И все больше и больше [ROOT.GetLeader] обдумывает свои варианты."
 GXC.lategame.510.a: "Решение назревает..."

 GXC.lategame.511.t: "Новая Гуанси сокрушает оппозицию"
 GXC.lategame.511.intro: "Среди какофонии раздора и нескольких вспышек насилия среди законодателей многие сомневались, состоятся ли выборы вообще. Действительно, многие отказались даже присутствовать, кланяясь из-за страха возмездия или чтобы потратить свои с трудом заработанные взятки. Таинственная эпидемия внезапных «болезней», казалось, поразила ключевых избирателей перед собранием, но кворум был все же соблюден. Несмотря на ухудшающуюся ситуацию, на кону было слишком много, чтобы партизаны любой из сторон отступили сейчас."
 GXC.lategame.511.d: "$GXC.lategame.511.intro$\n\nПобедитель был наконец назван, но Ли Цзунжэнь потратил мало времени, наслаждаясь своей победой. Отбросив любые любезности с теперь беззубым Цзюй Чжэном и кликой Сишань, он почти немедленно обрушил вес Новой Гуанси на своих оставшихся соперников, аккуратно собранных в правительстве Юэ, чтобы быть устраненными вместе. Поскольку пропагандисты, связанные с Новой Гуанси, громили Ху Ханьминя, Сунь Фо, Чэнь Цзитана, Гу Инфэня и других, кто осмелился выступить против героя-завоевателя Китая. Бай Чунси и генеральный штаб начали составлять планы битвы, но в конечном итоге это было напрасно.\n\nПрежде чем приказы о марше могли быть распространены, правительство Юэ распалось почти за ночь. Благодаря смеси осторожных взяток и общей деморализации, большая часть элитных ВВС Гуандуна (возможно, самого высокооплачиваемого и ценимого рода войск Новой гуандунской клики) перешла на сторону центрального правительства, и к ним вскоре присоединился исход армейских перебежчиков. Долго раздираемые распрями, враждующие фракции правительства Юэ были слишком разделены, чтобы даже официально распустить свою администрацию, по отдельности уезжая в изгнание, не уходя со своих постов. Только Ху Ханьминь потрудился остаться в Гуанчжоу, его второй шанс на власть в руинах.\n\nЦентральная армия зачищает любое оставшееся сопротивление, а тайная полиция арестовывает любого, кто осмеливается продолжать высказываться, но все знают, что Ли уже победил — даже если они шокированы тем, что он сделал это в значительной степени без единого выстрела. Гражданская война в Гоминьдане была предотвращена, и некогда шаткая позиция Ли теперь надежно защищена изнутри. Теперь осталось только посмотреть, что скажут по этому поводу посторонние."
 GXC.lategame.511.a: "Они рассыпаются, как стекло."

 GXC.lategame.512.t: "Новый Гуандун свергает правительство"
 GXC.lategame.512.d: "$GXC.lategame.511.intro$\n\nПобедитель был наконец назван, но у Ли Цзунжэня было мало времени, чтобы насладиться своей победой. Почти сразу же она была осуждена как нелегитимная многими ведущими членами правительства Гуй. Цзюй Чжэн отказался признать свое поражение, и сопутствующие общественные протесты были намного масштабнее, чем ожидалось, не говоря уже о собирающихся силах под знаменем Ху Ханьминя. Война между Юэ и Гуй казалась неизбежной, пока она не перестала быть таковой.\n\nЛи Цзунжэнь был первым, кого арестовали. Шагая к своему штабу в своем новом президентском наряде, он вошел в свою военную комнату и, следовательно, попал в засаду группы специального назначения. Мрачные лица его штаба и присутствие маршала Ли Лецзюня, связанного с Юэ, указывали на то, что он не будет президентом долго. Лецзюнь зачитал предъявленные ему обвинения, но Ли отказался сдаваться без боя. Опытный солдат и ученик боевых искусств, потребовалось несколько человек, чтобы сдержать генерала Ли. Он ревел от ярости на предательство, в то время как его лейтенанты смотрели бесстрастно, но маршал Лецзюнь не дрогнул, когда Ли безуспешно бросился на него — последний акт неповиновения. Нужно было что-то делать, чтобы избежать нового раунда войны.\n\nБай Чунси был арестован в своем полевом штабе, готовясь выступить против армии Юэ, а Хуан Сюйчу схвачен в Наньнине губернатором Хуан Шаохуном, который увидел знамение на стене. Когда Ху Ханьминь прибыл в Президентский дворец в сопровождении своих ведущих сторонников, он отказался удостоить своего побежденного соперника чести видеть его в заключении. Вместо этого, пока Цзюй Чжэн и другие гранды Сишань застенчиво смотрели, он вернул себе место Председателя с огнем в глазах, когда правительство Гуй рассыпалось в прах. Вызывающе стоя в столице, он бросает вызов любым оставшимся претендентам в отдаленных провинциях, чтобы они встретились с ним и его гневом."
 GXC.lategame.512.a: "Ху Ханьминь получил свою месть..."

 GXC.lategame.513.t: "Сишань наносит ответный удар"
 GXC.lategame.513.mid: "Победитель был наконец назван, и результат стал ошеломляющим упреком Ли Цзунжэню и его захвату власти. Цзюй Чжэн, поборник партийного истеблишмента, был назван победителем и был немедленно инаугурирован, чтобы предотвратить любой вызов со стороны Новой Гуанси. Наконец одержав свою горькую победу, Клика Сишань не стала рисковать: генерал Ли был арестован еще до того, как конвент был закрыт. Результат определен, младшие чины быстро подчинились, когда карточный домик Ли рухнул сам в себя. Бай был арестован в своем полевом штабе, Хуан Сюйчу схвачен в Наньнине губернатором Хуан Шаохуном. Большинство солдат Новой Гуанси последовали примеру губернатора Хуана, выбрав выживание вместо лояльности."
 GXC.lategame.513.d: "$GXC.lategame.511.intro$\n\n$GXC.lategame.513.mid$\n\nС отпором Новой Гуанси гражданской войны внутри партии, вероятно, удастся избежать, но не без трудных переговоров. Как и было обещано, Ху Ханьминь и его делегация Юэ прибыли для обсуждения условий в торжественной процессии. Обиды сохраняются, взаимные чувства предательства омрачают обсуждения. Под давлением своих генералов, требующих скорейшего разрешения, Ху и его заместители согласились на условия, в значительной степени благоприятствующие правительству Гуй, признав Цзюя Председателем и официально распустив комитет Юэ. Хотя все участники рады оставить кризис позади, его последствия продолжают отзываться эхом. Мы можем только надеяться, что этот мир продержится."
 GXC.lategame.513.a: "...и сделка."

 GXC.lategame.514.t: "Месть кантонцев"
 GXC.lategame.514.d: "$GXC.lategame.511.intro$\n\n$GXC.lategame.513.mid$\n\nС отпором Новой Гуанси гражданской войны внутри партии, вероятно, удастся избежать, но не без трудных переговоров. Как и было обещано, Ху Ханьминь и его делегация Юэ прибыли для обсуждения условий под приветствия обожающей толпы. Обиды сохраняются, взаимные чувства предательства омрачают обсуждения. Поскольку правительство Гуй в значительной степени дискредитировано в глазах широкой общественности, и многие аплодируют Ху за обеспечение смещения Ли, Цзюй занимал значительно более слабую переговорную позицию. Осознав неизбежное, Цзюй потребовал, какие мог, условия в обмен на свою недавно полученную должность, уйдя с поста Председателя после переговоров, чтобы ознаменовать возвращение Ху Ханьминя. Хотя все участники рады оставить кризис позади, его последствия продолжают отзываться эхом. Мы можем только надеяться, что этот мир продержится."
 GXC.lategame.514.a: "В очередной раз Ху Ханьминь будет править партией. И у нас будет Датун."

 #Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 GXC.lategame.515.t: "Республика балансирует на грани"
 GXC.lategame.515.d.intro: "После спорных выборов так называемый Комитет Гуй Гоминьдана выбрал своего лидера: стремление Ли Цзунжэня к власти завершилось. Создав популярную поддержку среди военных, общественности и интеллигенции, разгромив Цзюй Чжэна и истеблишмент фракции Сишань на выборах, он смел последний вызов своей власти внутри Комитета Гуй. Это не сулит ничего хорошего будущему отношений Юэ-Гуй, поскольку конкурирующий Комитет Юэ под руководством Ху Ханьминя осуждает выборы Гуй как сфальсифицированные. Финальная, разрушительная конфронтация кажется вероятной между двумя мужчинами, пока Китай может сделать немногое, кроме как беспомощно наблюдать."
 GXC.lategame.515.d.generic: "$GXC.lategame.515.d.intro$\n\nНо не все. Здесь, в [ROOT.GetNameDef], мы давно позаботились о том, чтобы мелкие споры потенциальных тиранов оставались за пределами [ROOT.Capital.GetCapitalVictoryPointName]. По мере ухудшения ситуации многие обращаются к [ROOT.GetLeader] за лидерством, указывая на армию, которая так долго защищала регион. Некоторые, однако, задаются вопросом, не уничтожил ли Гоминьдан свою легитимность навсегда, и стоит ли ждать, чтобы увидеть, какой диктатор восстанет из пепла, чтобы угнетать нас. Может быть, ради блага нации пришло время рискнуть и принести мир в Китай навсегда."
 GXC.lategame.515.d.yunkmt: "$GXC.lategame.515.d.intro$\n\nДолжно ли так быть? Чжу Пэйдэ был верным солдатом революции с самого начала, а Третья армия — верными защитниками Трех принципов, несмотря на все невзгоды. Юньнань была местом, где родился первый Альянс национальной защиты, где верные республиканцы встали против тирании, где хорошие люди умерли, защищая конституцию. Теперь, когда высшие лидеры партии находятся на грани ударов, комитет Юньнани наблюдает с трепетом. Ухудшит ли ситуацию вмешательство, или у нас есть долг гарантировать, что генерал Ли и господин Ху не уничтожат страну и революцию в своей тщетной погоне за властью?"
 GXC.lategame.515.d.shxgmj: "$GXC.lategame.515.d.intro$\n\nЭта беспомощность характеризовала простых людей Китая на протяжении десятилетий, оставшихся без голоса, пока Императоры и тираны обменивались ударами. Но генерал Фэн Юйсян с самого первого дня своей карьеры всегда знал, что истинная сила нации заключена в людях. Когда доктор Сунь предложил нации свои Три принципа, он никогда не мог предположить, что его предполагаемые последователи так извратят их. Издалека он, должно быть, спрашивает: «Кто защитит лаобайсин от этих предателей?»"
 GXC.lategame.515.d.shxyan: "$GXC.lategame.515.d.intro$\n\nЯнь Сишань в своей мудрости предсказал это. Гоминьдан облачается в идеологию и национализм, но ими в конечном итоге движет то же, что двигало всеми до них: власть. Как только она наконец оказалась в их руках, для них было естественно убивать друг друга за нее. Губернатору Яню не привыкать к власти и ее последствиям, он пережил десятилетия политики Бэйяна. Но, может быть, это его шанс заявить на нее свои права?"
 GXC.lategame.515.a: "Если мы ни за что не стоим, за что мы падем?"
 GXC.lategame.515.b: "Умирать легко, жить труднее."
 GXC.lategame.515.c: "Когда мы уйдем, интересно, кто вспомнит наше имя? (Переключиться на Лянгуан)"

 #Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 GXC.lategame.516.t: "Последний вздох гражданского правления"
 GXC.lategame.516.d.intro: "После спорных выборов так называемый Комитет Гуй Гоминьдана выбрал своего лидера: Цзюй Чжэн и истеблишмент Сишань успешно отказали Ли Цзунжэню в его стремлении к власти. Хотя поначалу это казалось маловероятным перед лицом военной мощи генерала Ли, грубой силы оказалось недостаточно, чтобы поколебать ключевых партийных выборщиков, которые сплотили ряды вокруг Цзюя, хорошо связанного гражданского чиновника, который вел кампанию за примирение и ослабление опеки, в знак протеста против захвата власти. Это сулит хорошее будущее для отношений Юэ-Гуй, поскольку конкурирующий Комитет Юэ под руководством Ху Ханьминя высоко оценил этот недавний шаг к прекращению влияния Новой клики Гуанси. Эти недавние события, похоже, откроют путь к возобновлению переговоров."
 GXC.lategame.516.d.generic: "$GXC.lategame.516.d.intro$\n\nВероятное мирное разрешение недавнего кризиса было встречено как знак того, что насильственные методы Эры милитаристов подходят к концу. Однако не все убеждены — руководство партии едва не привело к возобновлению гражданской войны. Партия дала посторонним ограниченное право голоса в своем исходе, и хотя они заявляют о свободных выборах на своем пути, кто знает, сколько времени пройдет, прежде чем кто-то, кто не является инсайдером, как Цзюй, сможет встать у руля? С партийным государством, слабым как никогда, некоторые призывали [ROOT.GetLeader] заявить свои собственные права на власть, рискованное предложение даже в лучшие времена. Тем не менее, поскольку переговоры идут полным ходом, окно для смелых шагов закрывается."
 GXC.lategame.516.d.yunkmt: "$GXC.lategame.516.d.intro$\n\nВероятное мирное разрешение недавнего кризиса было встречено как знак того, что насильственные методы Эры милитаристов подходят к концу. Среди кадров Гоминьдана в Юньнани это хвалили как верный признак того, что партия может разрешить свои разногласия дружественным путем. Тем не менее, не все были удовлетворены результатом, возможно, из-за симпатии к генералу Ли или, может быть, из-за разочарования цирком, который привел к голосованию. Все взоры устремлены на губернатора Чжу Пэйдэ и старую Национально-революционную армию, одного из немногих лидеров Гоминьдана, которые могут правдоподобно оспорить результаты."
 GXC.lategame.516.d.shxgmj: "$GXC.lategame.516.d.intro$\n\nВероятное мирное разрешение недавнего кризиса было встречено как знак того, что насильственные методы Эры милитаристов подходят к концу, но не все убеждены. В конце концов, будет ли диктатура при Цзюй Чжэне или Ху Ханьмине сильно отличаться от диктатуры при Ли Цзунжэне? Какое дело лаобайсин, выберет ли партия гражданское лицо, которому наплевать на них или их мнение, или генерала, который делает то же самое? И те, и другие, при всех их заявлениях о демократии и революции, в конечном счете являются инсайдерами партии-завоевателя. Может быть, размышляет Фэн Юйсян (как он делал это несколько раз раньше), пришло время перемен. Другие, однако, предупреждают, что людей волнуют мир и стабильность и что история следит за всеми нами."
 GXC.lategame.516.d.shxyan: "$GXC.lategame.516.d.intro$\n\nВероятное мирное разрешение недавнего кризиса было встречено как знак того, что насильственные методы Эры милитаристов подходят к концу. Губернатор Янь, однако, не убежден. Он находится у власти со времен Синьхая, десятилетия назад, и видел, как люди приходят и уходят в круговороте политики Бэйяна. Ссоры Гоминьдана, рассуждает он, ничем не отличаются — один генерал-выскочка стал слишком сильным, и союз более слабых гражданских лиц восстал, чтобы поглотить его из страха. С устранением угрозы не пройдет много времени, прежде чем они попытаются и не смогут разделить власть, только чтобы увековечить цикл насилия. Истинный мир не может быть найден путем фиктивных выборов и недобросовестной дипломатии: в конце концов будет только один победитель. Единственный вопрос остается: может ли это быть Янь Сишань?"
 GXC.lategame.516.a: "Я не упущу свой шанс!"
 GXC.lategame.516.b: "Я готов ждать его."
 GXC.lategame.516.c: "Националисты: Мы сделали работу! (Переключиться на Лянгуан)."

 ##RKMT Political Tree Events (530-559)

 GXC.lategame.530.t: "Рассвет Белого солнца"
 GXC.lategame.530.d.1: "Наконец, после серии испытаний и невзгод, наша нация была объединена под бдительным покровительством Гоминьдана. Но со всем ликованием приходит великая скорбь по товарищам, которых мы потеряли, по жизням, которые были потеряны, разрушению домов, семей, городов. Возвышаясь над мелкими милитаристами, мерзкими империалистами и множеством других фракций, оспаривающих нашу законную заявку на лидерство нации. Революция, начатая доктором Сунь Ятсеном все эти годы назад, будет завершена теми, кто наиболее сведущ в его учениях.\n\nОднако, несмотря на этот великий успех, многие в партии чрезвычайно обеспокоены, ибо внутренние махинации и политическое маневрирование все еще происходят за кулисами. Фракционность и трещины только начинают ухудшаться, так как отсутствие внешнего врага, против которого можно объединиться, оставляет партию без направления и готовой обратиться против самой себя. Однако они не могут остановиться сейчас, ибо мудрое руководство [ROOT.GetLeader] привело их так далеко, и, безусловно, этапы национальной революции, изложенные доктором Сунем, будут пройдены быстро и решительно, ибо народ желает, чтобы революционная миссия наконец завершилась.\n\nЧто бы это ни было, следующие несколько месяцев станут определяющим крещендо Национальной революции, определяющим ее будущее и будущее самой нации. С партийным государством, работающим над стабилизацией и реконструкцией, все взоры устремлены на [Root.GetLeader], ибо принятые решения будут эхом отдаваться в грядущих поколениях."
 GXC.lategame.530.d.2: "Наконец, после серии испытаний и невзгод, наша нация была объединена под бдительным покровительством Гоминьдана. Но со всем ликованием приходит великая скорбь по товарищам, которых мы потеряли, по жизням, которые были потеряны, разрушению домов, семей, городов. Возвышаясь над мелкими милитаристами, мерзкими империалистами и множеством других фракций, оспаривающих нашу законную заявку на лидерство нации. Революция, начатая доктором Сунь Ятсеном все эти годы назад, будет завершена теми, кто наиболее сведущ в его учениях.\n\nОднако, несмотря на этот великий успех, многие в партии чрезвычайно обеспокоены, ибо внутренние махинации и политическое маневрирование все еще происходят за кулисами, угрожая погасить само пламя Революции. Смещение Ху Ханьминя с поста председателя позволило темной тени партии разрастись, и [ROOT.GetLeader] изо всех сил пытается сохранить как контроль, так и влияние. С оружием за спиной и меняющимися союзами будущее партии бурно и мрачно. С растущей гармонией голосов, призывающих к прекращению военного правления, предстоит многое сделать, и будет много последствий.\n\nЧто бы это ни было, следующие несколько месяцев станут определяющим крещендо Национальной революции, определяющим ее будущее и будущее самой нации. С партийным государством, работающим над стабилизацией и реконструкцией, все взоры устремлены на [Root.GetLeader], ибо принятые решения будут эхом отдаваться в грядущих поколениях."
 GXC.lategame.530.a: "Вперед!"

 GXC.lategame.531.t: "Четвертый Центральный исполнительный комитет"
 GXC.lategame.531.d: "С учетом того, что свет контроля Гоминьдана теперь сияет во всех уголках китайской нации, перед [ROOT.GetLeader] встал самый насущный вопрос. Будучи революцией, возглавляемой из Гуандуна и Гуанси, партия теперь охватывает все регионы Китая, и она должна признать этот факт. Как Пруссия и Пьемонт до них, партийное государство должно привести своих братьев в новую эпоху и включить их, чтобы они могли участвовать в Национальной революции. Чтобы сделать первый смелый шаг в реализации этого, члены партии стремились расширить Центральный исполнительный комитет, включив в него более разнообразный круг членов.\n\nВ связи с изгнанием Ху Ханьминя в Москву, его Второй Центральный исполнительный комитет в основном состоял из близких к нему людей и тех, кто присоединился после провала Северного похода. В результате он был почти полностью укомплектован членами Клики старейшин и Сишань — с заметным включением Сунь Фо, У Чаошу и Ван Куньлуня заочно. С возвращением Председателя на китайскую землю комитет был расширен, чтобы включить военные фракции, которые позволили такое возвращение.\n\nС захватом все большего количества городских центров, население и интеллектуалы одинаково требуют еще одного расширения ЦИК, чтобы должным образом представлять всех членов китайского общества. Ключевые члены в Гуандуне и Гуанси предлагают расширить места клик Нового Гуандуна и Новой Гуанси, другие выдвигают идею включения членов из других провинций, чтобы сбалансировать доминирование Юга, некоторые шепотом даже указывают на включение Даньвай, чтобы охватить широкий фронт демократических идеалов и регионалистских интересов.\n\nТакие решения имеют прецедент в истории партии, поскольку предыдущие комитеты предпринимали попытки сбалансировать список членов по регионам, а также приветствовали множество союзников-милитаристов, чтобы обеспечить их согласие в военных вопросах. В конечном счете, вердикт зависит от [ROOT.GetLeader] и их видения будущего."
 GXC.lategame.531.a: "Их идеи могут только помочь революции."
 GXC.lategame.531.b: "Мы не заменим Пекин Гуанчжоу."
 GXC.lategame.531.c: "Прагматизм при сохранении наших идеалов."

 GXC.lategame.532.t: "Бюро общественной безопасности"
 GXC.lategame.532.d: "Нация может быть едина, но ее народ — нет. Постоянное сопротивление контролю партии со стороны подрывных элементов, досаждающих нам, привело к развитию и созданию «Бюро общественной безопасности», новой организации, призванной подавить любое инакомыслие против правления партии и обеспечить стабильный прогресс революции. Однако такая организация не может функционировать без сильного руководства, и фракции внутри Гоминьдана выдвинули ряд избранных лиц с особой репутацией и набором навыков для такой роли. Кандидат, выдвинутый Чэнь Цзитаном и его кликой, Ли Шичжэнь, пожалуй, самый опытный из потенциальных начальников полиции, поскольку он хорошо известен тем, что был отправлен за границу для изучения полицейской тактики США, Японии и Европы, и уже является умелым администратором. Со стороны Новой Гуанси они выдвинули своего личного главу тайной полиции, имеющего очевидные связи и преданность клике Новой Гуанси, он был надежен в обеспечении их контроля над провинцией. Наконец, Клика Сишань предложила члену Центрального наблюдательного комитета и известному гражданскому лидеру Мао Цзуцюаню занять эту должность. Юрист по профессии, он может оказаться более справедливой и равноправной рукой у руля."
 GXC.lategame.532.a: "Модернизированная сила под руководством Ли Шичжэня."
 GXC.lategame.532.b: "Надежная рука Ван Гунду."
 GXC.lategame.532.c: "Стойкий и справедливый Мао Цзуцюань."

 GXC.lategame.533.t: "Новая гражданская служба"
 GXC.lategame.533.d: "Наша правительственная бюрократия остро нуждается в расширении, так как некоторые опасаются, что она достигла своего предела. Чтобы обеспечить стабильное, эффективное, хорошо функционирующее правительство, партия решила расширить и обновить текущую систему гражданской службы, чтобы приспособиться к новым землям и гражданским лицам под их контролем. Конечно, с новой и расширенной службой возникает вопрос о том, кем укомплектовать множество требуемых должностей? Многие центральные фигуры предлагают, чтобы назначения производились на основе лояльности партии и председателю, чтобы убедиться, что коррупция и корыстное отношение не будут процветать.\n\nВ противоречие этому, Клика Сишань предложила открыть должности для бывших бюрократов Бэйяна, которые занимали эти должности, поскольку их опыт может оказаться бесценным в такое время. Наряду с этим, Либералы отстаивают, что свежая, получившая западное образование молодая порода возвращающихся иностранных студентов более чем подходит для заполнения таких должностей, с их свежим взглядом и расцветающей энергией. Наконец, Клика Новой Гуанси настаивает на том, чтобы ветеранам армии — остро нуждающимся в пенсии — были предоставлены эти должности, поскольку они доказали свою преданность кровью."
 GXC.lategame.533.a: "Те, кто лоялен до конца."
 GXC.lategame.533.b: "Бывшая бюрократия доказала свою состоятельность."
 GXC.lategame.533.c: "Возвращающаяся зарубежная молодежь!"
 GXC.lategame.533.e: "Чтобы мы не забыли наших ветеранов."

 GXC.lategame.534.t: "Свободный законодательный орган?"
 GXC.lategame.534.d: "В наших усилиях по поддержанию сплоченности и решительному следованию идеалам доктора Суня недавний период партийного государства напрямую привел к тому, что все решения, большие или малые, так или иначе проходили через обширный партийный аппарат, естественным образом создавая бюрократическую систему, которая возражает против перемен и трансформации. При такой текущей системе новый законодательный орган — это перспектива с шатким фундаментом, несмотря на это многие внутренние фракции ожидают диверсификации идей, компрометирующих законодательный орган. Инициатором является, естественно, Сунь Фо и его Фракция реконструкции, требующая увеличения участия не членов Гоминьдана. Клика Сишань не отстает, возвращаясь к наследию Сун Цзяожэня, они также вложили свой вес в включение внешних партий в качестве законодателей. Даже Клика старейшин, осторожная и опасливая, как всегда, была открыта для обсуждения и идеи.\n\nНа самом деле эти должности на самом деле не выборные, а вместо этого будут назначаться партийным государством Гоминьдана для обеспечения большей демократизации нации. В практическом применении это оставляет три варианта. Во-первых, потенциальные внешние законодатели могут участвовать как Даньвай, осторожный, но столь необходимый шаг к надлежащему политическому участию. Во-вторых, они могут последовать идеям Сишань и сформировать свои собственные политические партии параллельно с Гоминьданом. В-третьих, Председатель может топнуть ногой и сохранить опеку Гоминьдана над нацией на данный момент, демократию, в конце концов, нельзя торопить."
 GXC.lategame.534.a: "Они могут участвовать как Даньвай."
 GXC.lategame.534.b: "Пусть создают партии."
 GXC.lategame.534.c: "Мы будем вести, как всегда."

 GXC.lategame.535.t: "Женщина-патриот"
 GXC.lategame.535.d: "Пока революция продвигается вперед в новую эру процветания, мы не можем просто оставить позади наших соотечественниц в такое время социальных потрясений и перемен. В своих известных трудах и теориях Ху Ханьминь продолжает беспокоиться о судьбе женщин в современном обществе, настаивая на том, что им должна быть предоставлена экономическая независимость в обществе.\n\nСледуя таким мыслям, он сам кажется довольно оптимистичным в отношении будущего роли женщин в обществе, отмечая, что со времен Промышленной революции равенство в рабочей силе приближается к балансу, а социальный статус женщин улучшился по мере увеличения их экономического вклада. Чтобы продвинуть такой процесс вперед, он предложил, что Китай нуждается в реконструкции своей социально-экономической организации для создания хорошо скоординированного, разделяющего собственность и домашнего общества. С инстинктом человечества любить других так же, как самого себя, подлинная чистая любовь во всех человеческих отношениях обязательно расцветет.\n\nПараллельно с этим Сунь Фо, естественно, принял аналогично прогрессивный взгляд на своих прекрасных соотечественниц. С дальнейшим участием женщин в обществе и правительстве, естественно, их статус будет повышен до уровня их собратьев-мужчин. Однако Сунь Фо, в частности, отверг идею о том, что контроль над рождаемостью должен быть в свободном доступе для женщин, опасаясь, что китайская нация будет испытывать нехватку рабочей силы к концу XX века, если он будет легкодоступен.\n\nВ полном противоречии с идеями своих современников, лицо Новой клики Гуанси, Ли Цзунжэнь, выдвинул почти пуританский взгляд на своих более прекрасных коллег. Хотя он считает их ключевыми участниками общества в целом, даже настаивая на постоянной мобилизации женщин в армию, кажется, что он желает пуританской, милитаризированной и грамотной секты общества, готовой служить нации. Выступая против того, что он считает безнравственностью, он призвал к контролю над женской одеждой для борьбы с распущенностью."
 GXC.lategame.535.a: "Социально-экономическая реорганизация ради чистой любви!"
 GXC.lategame.535.b: "Либеральный взгляд Сунь Фо."
 GXC.lategame.535.c: "У Ли Цзунжэня правильные идеи."

 GXC.lategame.536.t: "Запечатление Национальной революции"
 GXC.lategame.536.d: "Императивным, но часто недооцененным является неотъемлемое искусство запечатления истории по мере того, как она происходит. Искусство само по себе, китайская нация полна динамичных фотографов, остроумных журналистов и предприимчивых художников, все из которых работают коллективно, чтобы запечатлеть ужасающе бурный период Эры милитаристов. И сама Партия не является исключением из этого правила.\n\nУместный член молодой гвардии Фракции реконструкции Сунь Фо, прославленный дипломат, близкий друг У Чаошу, опытный бюрократ и, что более ярко, замечательный фотограф. Фу Бинчан — один из самых молодых политиков в свите Партии, присоединившийся к партии всего в двадцать два года. Окончив Университет Гонконга со степенью в области гражданского строительства, Фу развил живой интерес к фотографии, основав недолговечное общество Цзиньши, специализирующееся на пейзажной фотографии.\n\nПрисоединившись к Правительству защиты конституции доктора Суня 1918 года благодаря семейным связям, Фу нашел новую цель и службу в качестве секретаря У Тинфана, он развил близкое родство с У Чаошу, сыном У Тинфана. Сопровождая У Чаошу в различных дипломатических миссиях в качестве его секретаря, Фу вернулся в Китай, чтобы служить представителем министерства финансов и иностранных дел в Гонконге. Переведенный на службу в качестве инспектора таможни Гуандуна в 1923 году, Фу оказался каталогизирующим различные события борьбы за власть по мере их возникновения, недавно приобретя новую камеру к 1924 году.\n\nВ пикториалистическом стиле Фу удается запечатлеть основные моменты борьбы за власть в Гоминьдане и Северного похода. Начиная от портретов Чан Кайши и Ху Ханьминя до групповых фотографий Тань Янькая, Сунь Фо, Гу Инфэня, Ван Цзинвэя и многочисленных других старейшин партии. Коллекция фотографий Фу приобрела особую известность с возрождением Партии, поскольку очарованные зрители со всего мира смотрят на прошлое часто очерняемого Гоминьдана."
 GXC.lategame.536.a: "Какая прославленная страсть!"

 ##LKMT Political Flavor Events (560-569)
 GXC.lategame.560.t: "Горный дом Дунли"
 GXC.lategame.560.d: "Еще во времена правления императора Даогуана из династии Цин Цзян Лисян основал сад Лийинь в одной из составных деревень города Дунгуань. Судьба, однако, была немилосердна к саду. По той или иной причине сад был заброшен в Столетие унижения и оставался таковым до недавнего времени. Генерал Цзян Гуаннай, внук Цзян Лисяна и один из близких союзников Чэнь Миншу, взял на себя задачу отреставрировать сад после захвата Гуанчжоу Чэнь Миншу.\n\nОднако вместо того, чтобы восстановить сад в его первоначальном состоянии, Цзян решил построить виллу в саду. Переименовав его в Горный дом Хунли, это впечатляющее новое двухэтажное здание с железобетонной конструкцией занимает площадь 223 квадратных метра. Хвастаясь крыльцом и передним фасадом, построенным из камня, дом черпает много вдохновения из вилл в западном стиле. Действительно, его красные кирпичные внешние стены с трех сторон и колонны в стиле западных ионических капителей демонстрируют большое уважение к западной архитектуре. Закончив строительство теперь, с консолидацией власти Чэнь Миншу, Цзян Гуаннай сделал Хунли своей основной резиденцией и предметом зависти многих."
 GXC.lategame.560.a: "Этим мы делаем заявление об исцелении прошлых ошибок!"
 GXC.lategame.560.b: "Этим мы делаем заявление о построении будущего!"

 GXC.lategame.561.t: "Речь против империализма"
 GXC.lategame.561.d: "После завершения консолидации власти Хромым генералом в Гуанчжоу и разрешения ситуации с восстанием в Байсэ, Чэнь Миншу не терял времени, внедряя больше своей собственной идеологической риторики, не обремененной противоречивыми видениями Пэн Пая и Тань Пиншаня. Чтобы пробудить общественную поддержку и распространить свою повестку дня, Чэнь Миншу объявил жителям Гуанчжоу, что он произнесет речь в старой резиденции Сунь Ятсена.\n\nНачиная свою речь, Чэнь заявил: «Величайшим врагом Китая всегда был империализм. Именно Британская империя принесла заразу опиума к берегам Китая и начала Столетие унижения, именно Российская империя лишила Китай Внешней Маньчжурии и западного Синьцзяна и поощряла монгольский сепаратизм, именно Японская империя захватила Тайвань у Китая, и именно Германская империя разгромила первый Северный поход.\n\nКитайский народ больше не будет терпеть правительство, которое кланяется империалистическим державам, китайский народ должен свергнуть всех империалистических коллаборационистов и создать революционное правительство, состоящее из производящих людей! Свергнуть империализм! Свергнуть [FNG.GetLeader]! Свергнуть японский империализм, восстановить утраченные территории Маньчжурии!»"
 GXC.lategame.561.a: "Вместе мы объединяем ряды против империализма!"
 GXC.lategame.561.b: "Все должны сплотиться под нашим знаменем, пока мы маршируем!"

 GXC.lategame.562.t: "Анархисты Гуанчжоу"
 GXC.lategame.562.d: "Восхождение Тань Пиншаня к власти в Лянгуане сделало его вероятным кандидатом на лидерство в китайском синдикализме почти в одночасье. Но, к его большому огорчению, Лига китайских синдикалистов каким-то образом еще менее управляема, чем Гоминьдан. Теперь, когда КСП Гуандуна, состоящая из различных марксистских промышленных социалистов, стала союзником, Тань стремится объединить их со своими лоялистами из Гоминьдана, чтобы создать базу поддержки для борьбы с Лигой. Его следующая цель — завербовать анархистов в ЛКС.\n\nМногие анархисты, такие как Мо Цзипэн, остаются независимыми от ЛКС, пытаясь оставаться верными анархистским принципам, а не прогибаться под лицемерным авторитаризмом обоих. В Гуанчжоу основная часть анархистских мыслителей сплотилась вокруг старых кругов Лю Шифу. Лю, урожденный Лю Шаобинь, был членом Тунмэнхоя, который позже сформировал и Общество совести, и Общество крика петуха. Они жили в общем домохозяйстве с неудавшимися планами создания аграрной коммуны. Хотя в городе были и другие анархисты, долгоживущая газета Лю «Голос народа» и его сильная личность сделали его центром анархизма Гуанчжоу. Он также стал одним из первых китайских синдикалистов, организовав каменщиков, сапожников, парикмахеров и работников ресторанов в десятки профсоюзов через свой Клуб резолюции.\n\nЛю, прозванный Прудоном Китая и восхваляемый У Чжихэем (который однажды заявил, что если бы он был еще жив, китайский анархизм мог бы быть достигнут всего за 500 лет, а не за 3000), умер от переутомления в 1915 году. Его профсоюзы пережили его под руководством его брата Лю Шисиня, но медленно уступали позиции организованным промышленным союзам КСП в 1920-х годах.\n\nНедавние ухаживания Тань Пиншаня за неохотным Лю Шисинем могут быть проверкой, действительно ли он достоин стать следующим лицом китайского синдикализма. Его нынешние сторонники, однако, предупреждают, что ухаживание за печально известными непостоянными анархистами может быть ошибкой, дестабилизирующей авангардистский дух действия в пользу неэффективной «болтовни»."
 GXC.lategame.562.a: "Вместе мы сможем выйти за рамки грехов прошлого."
 GXC.lategame.562.b: "Извините, но революции не выигрываются в теории."

 GXC.lategame.563.t: "Тань Пиншань, государственный деятель часа"
 GXC.lategame.563.d: "Тань всегда был близок к Третьему Интернационалу. Избранный представителем КСП в Третьем Интернационале, он подружился с М.Н. Роем, индийским делегатом, а затем ведущим представителем Международной военной миссии в Китае (МВМК). В 1926 году Тань утверждал перед Китайским комитетом Интернационала, что национальная революция Китая движима рабочими, фермерами и городской мелкой буржуазией, но по своей природе является буржуазной революцией, а не принадлежит пролетариату. Он призвал Интернационал уделить больше внимания и руководства КСП, неявно обвиняя Гоминьдан в катастрофическом походе.\n\nРечь, произнесенная во время продолжающихся боев, была воспринята многими как дерзкая и фактически закрепила его отстранение Парижским Гоминьданом. КСП аналогичным образом исключила его в 1932 году после глубоких разногласий во время Шанхайского восстания. Тем не менее, для многих в МВМК Тань видится фигурой, которая могла бы более практически привести Гоминьдан к синдикализму, особенно после многочисленных неудач нынешнего руководства ЛКС. С момента возвращения домой Тань был готов менять курсы по мере необходимости.\n\nПоскольку его противники в Гуандуне твердо побеждены, и видя возможность в негодовании, которое многие партийные аутсайдеры (Даньвай) испытывают к партийному государству Гоминьдана, Тань начал протягивать оливковые ветви различным прогрессивным демократам и даже либеральным деятелям в надежде получить их поддержку. Однако его плохое обращение с Чэнь Миншу и Лян Ханьцао не было забыто, и многие не решаются предоставить Таню кредит доверия. Тем не менее, популярность самого [CHI.GetLeader] колебалась на протяжении многих лет."
 GXC.lategame.563.a: "Успокаивающие слова и улыбка завоевывают друзей за границей."
 GXC.lategame.563.b: "Протягивание руки через проход завоевывает нам поддержку дома."

 GXC.lategame.564.t: "Мэр Гу Дацунь и непокорный город"
 GXC.lategame.564.d: "Гу Дацунь ранее вступил в Китайскую синдикалистскую партию в 1924 году, хотя уже участвовал в революционной политике со времен Движения 4 ноября 1919 года. Гу также был участником Восточного похода, в результате которого милитарист Юэ Чэнь Цзюнмин был изгнан из провинции. Гу привел армию Дунцзян ко многим великим победам в Северном походе и организовал крестьянское массовое движение в уезде Ухуа. Он привел многих фермеров и крестьян к созданию ассоциаций фермеров, призванных бороться с тиранией помещиков и снижать арендную плату.\n\nКогда Северный поход потерпел неудачу, Гу повел своих людей на гору Басян, создав революционную базу. Хотя Пэн Пай и Гу Дацунь изначально поддерживали дружеские связи с Лигой китайских синдикалистов, линия Ли Лисаня, настаивавшая на том, чтобы Синдикалистская революция сосредоточилась на урбанизированных регионах, стала главным оскорблением для сельского социалистического движения. Порвав с Лигой синдикалистов, Гу и Пэн постоянно преследовали гуандунских милитаристов в сельской местности в течение десятилетия, прежде чем Гоминьдан вернулся.\n\nГу Дацунь, как главный лейтенант Пэн Пая, был уместно назначен мэром Гуанчжоу с инструкциями укротить вечно беспокойный город. Город, наполненный недовольными даже в лучшие времена, стал свидетелем обострения напряженности из-за подстрекателей-синдикалистов и плохого управления Лян Ханьцао и Чэнь Яоцзу. Единственное, в чем обе стороны могут согласиться, так это в том, что они не в восторге от того, что ими правит банда оборванных крестьян."
 GXC.lategame.564.a: "Мы должны перенаправить их гнев на тех, кто их подвел!"
 GXC.lategame.564.b: "Медленно, но верно мы можем заслужить их доверие."

 GXC.lategame.565.t: "Укрощение Гуанси"
 GXC.lategame.565.d: "Хотя реакция в Гуанси была обуздана, многие беспорядки сохраняются. Вэй Бацюнь, один из лидеров восстания в Байсэ, работал над тем, чтобы стабилизировать социалистическое правление там. Существует напряженность между теми, кто был бывшими солдатами Новой Гуанси, перебежавшими позже, как Юй Цзобай, и теми, как Вэй, кто всегда был сельскими повстанцами. Генерал Юй настаивает, что более умеренная программа и интеграция старой армии Гуанси завоюют консервативную провинцию, стабилизируя левое правление.\n\nВэй, однако, находится под давлением Пэн Пая в Гуандуне, который склонен выступать за другой, более эксцентричный способ сближения с людьми. Во-первых, он склонен настаивать на том, чтобы его последователи одевались как крестьяне, которым они намерены служить, подталкивая партийные кадры оставить городское интеллектуальное происхождение, которое, как правило, доминирует как в Гоминьдане, так и в Китайской синдикалистской партии. Для Пэна, самого образованного сына шэньши, это был необходимый шаг, чтобы по-настоящему стать слугой народа. Хотя его иногда критикуют за склонность отказываться от социалистической ортодоксии, мало кто может отрицать, что до сих пор это ему хорошо служило.\n\nНасколько практичными будут эти меры в Гуанси, с крестьянами, глубоко подозрительными к ханжеским чужакам, еще предстоит увидеть. Пэн определенно имеет преимущество перед своими бывшими соперниками Танем и Чэнем в этом отношении, но многие местные лидеры настаивают на необходимости более прагматичного подхода."
 GXC.lategame.565.a: "Только живя так, как живут люди, мы становимся достойными вести их."
 GXC.lategame.565.b: "Люди Гуанси храбры, и со временем они будут верно служить нам."

 GXC.lategame.566.t: "Юго-западный совет по политическим делам"
 GXC.lategame.566.d: "Теперь, когда Ху Ханьминь стал лидером Гуанчжоу по приказу Чэнь Цзитана, многие правые стеклись в Гуандун. Правые члены Гоминьдана и сочувствующие националисты по всему Китаю надеются, что Ху действительно сможет спасти Китай как от когтей империализма, так и от социалистической автократии Ван Цзинвэя. Ху Ханьминь также начал создавать свой собственный круг союзников. Сунь Фо, лидер Клики реконструкции, находится в Нанкине, но на него и его товарищей-либералов смотрят с подозрением и недоверием за то, что они не социалисты.\n\nЕсли Ван не прислушается к Суню, возможно, Ху сможет переманить его на свою сторону, если Гуанчжоу и Нанкин найдут свои разногласия непримиримыми. Здесь, в Гуандуне, также находятся Чэнь Миншу и Четвертая армия, слабо связанные с левыми в Нанкине. Хотя у них, вероятно, есть собственные амбиции, консолидация власти Чэнь Цзитана в провинции, вероятно, разрушила их надежды. Однако, хотя Чэнь Миншу пытался обхаживать обе основные фракции в Нанкинском Центральном комитете, его политические пристрастия остаются независимыми от обоих лагерей.\n\nОн мог бы быть уникально полезен Ху из-за его связей с другими ветеранами Четвертой армии в Нанкине, в частности с Ли Цзишэнем и Чжан Факуем. Конечно, самый важный союзник, которого Ху должен держать на своей стороне, — это Чэнь Цзитан и Новая гуандунская клика. Хотя у Чэнь, возможно, нет грандиозных политических амбиций, он ревностно охраняет то влияние, которое у него есть, и Ху был бы глупцом, если бы укусил руку, которая его кормит."
 GXC.lategame.566.a: "Нам понадобятся все друзья, которых мы сможем найти."
 GXC.lategame.566.b: "Гуандун должен быть защищен от всех угроз."

 GXC.lategame.567.t: "Трещины остаются"
GXC.lategame.567.d: "Чтобы задать тон левым и отточить свою риторику, Ху Ханьминь решил выступить с речью перед Гоминьданом в Гуанчжоу, причем Нанкин также был предполагаемой аудиторией. Ху начал: «Когда ваш брат Ху Ханьминь был во Франции, я встречался с членами социалистических партий со всего мира...»\n\nОн спросил: «Почему Гоминьдан должен делиться на левых и правых? Когда у вас два человека вместе, вы должны делиться на левых и правых...» Когда я услышал это, мне захотелось плакать...\n\nНаша партия революционна, и наши члены партии тоже, наша революционная армия особенно революционна, и мы — вся революционная сила. Причина, по которой мы не можем позволить другим разделять нас, точно такая же, как и почему мы не можем позволить другим свободно входить и выходить из наших животов».\n\nНесмотря на его примирительный и кажущийся полным сожаления тон, многие признают эту речь как косвенную критику Ху в адрес как вызывающего разногласия руководства Гоминьдана Ван Цзинвэя, так и анархистских и синдикалистских интриг. Другие почувствовали раздражение по поводу своих чувств к Лиге китайских синдикалистов. Ху покинул сцену очень довольный собой, отточив свою риторику и задав тон с Нанкином."
 GXC.lategame.567.a: "Какая страстная речь о примирении и единстве!"
 GXC.lategame.567.b: "Это действительно все вина Синдикалистов..."

 ##LKMT Satellite Affairs Events (570-579)
 GXC.lategame.570.t: "2-й Репатриированный конгресс"
 GXC.lategame.570.d: "С быстрым восхождением Гоминьдана от маргинального повстанческого движения до главного претендента на национальное лидерство, партия решила послать четкий сигнал, проведя еще один партийный конгресс, на этот раз в самой древней столице Пекине. Партийные деятели, собранные со всей страны и из-за ее пределов, от Синьцзяна до Сингапура, прибыли для участия в заседаниях. Темы включают создание нового Министерства образования и Национального управления здравоохранения, языковые реформы, национальную реконструкцию и даже новый национальный гимн.\n\nОднако под этими разговорами чувство беспокойства пронизывает Конгресс. Напряженность между Ван Цзинвэем и его союзниками из АТР и его противниками, в основном Сунь Цинлин и ВКД, только ухудшилась, поскольку перспективы объединения растут, а единство, в свою очередь, снизилось. Авторитаризм Вана и обвинения в неподчинении ВКД потрясли нацию, даже несмотря на то, что революционному правительству предстоит преодолеть еще много препятствий.\n\nГлавным среди них является вопрос Восходящего солнца. Хотя у Гоминьдана и японского правительства были некоторые исторические связи, мнения Токио о китайском национализме с годами померкли. Хотя падение Чжили было нам на пользу, их разочарование неспособностью Фэнтяньской клики воспользоваться ситуацией ощутимо. С нашей стороны, их власть над северо-восточным Китаем становится все более всепроникающей, и война между Белым и Красным солнцами теперь кажется неизбежной.\n\nПризывы к действию только растут, особенно среди тех, кто считает, что партия движется слишком медленно в этом вопросе. Другие, однако, советуют проявлять осторожность, отмечая, что, несмотря на быстрый темп ошеломляющих побед Гоминьдана, Япония — не бумажный тигр. Для нас в Лянгуане перспектива освобождения далекой Маньчжурии привлекла значительное внимание националистов и становится все более реалистичной возможностью. Некоторые, однако, предполагают, что остров Тайвань может быть в пределах досягаемости, если бы мы только осмелились его преследовать!"
 GXC.lategame.570.a: "В Маньчжурию мы пойдем!"
 GXC.lategame.570.b: "Мы освободим Тайвань!"

 GXC.lategame.571.t: "Академиа Синика"
 GXC.lategame.571.d: "Академиа Синика (Китайская академия) — это давно предложенный Гоминьданом схоластический проект, призванный помочь выполнить обещания партии по модернизации нации. Этот институт высшего образования будет подчиняться непосредственно канцелярии президента, жемчужине в короне запланированной новой Республикой перестройки образования в Китае. Задуманный как вершина академического обучения и координатор исследований по всей стране на самом высоком уровне, планировщики наметили факультеты по более чем дюжине тем как в естественных, так и в гуманитарных науках. Широко поддерживаемое как внутри партии, так и академиками, такими как Китайское научное общество, утверждение его устава Законодательным юанем было встречено бурными аплодисментами.\n\nФилиалы кампусов возводятся на территории, контролируемой Гоминьданом, и благодаря нашему сильному лоббированию Гуанчжоу был намечен местом расположения Института языка и истории, особенно престижного, учитывая националистический характер нашего движения. Наши ученые уже начали с волнением планировать расширение с новым Институтом физической антропологии, но они забегают вперед.\n\nСначала нам нужно будет принять решение, где на самом деле разместить этот новый институт. Университет Сунь Ятсена в Гуанчжоу — логичный выбор, поскольку у него уже есть довольно большой кампус и солидная концентрация ученых. Строительство его там наверняка порадует тех, кто уже там учится, а также преподавателей, которые оценят новообретенный престиж. Другие, однако, посоветовали нам построить совершенно новый комплекс зданий, величественных и достойных новой эры Гоминьдана."
 GXC.lategame.571.a: "Сунь Ятсен — прекрасный кампус, названный в честь достойного человека."
 GXC.lategame.571.b: "Новая эра обучения заслуживает нового здания."

 GXC.lategame.572.t: "Авторизовать специальные службы"
 GXC.lategame.572.d: "В Гуанчжоу разразилась шпионская война, поскольку конкурирующие разведывательные сети борются за контроль над преступным миром портового города. Основной причиной, по-видимому, является возросший аппетит Центрального правительства к «специальной деятельности». Главная разведывательная группа Партии известна как Тэкэ, ответвление легендарного Красного отряда Чжоу Эньлая. Их соперниками является главное разведывательное подразделение Армии, известное как Бюро расследований и статистики, сосредоточенное вокруг Дай Чуньфэна и его Лиги десяти. Оба являются безжалостными исполнителями партийной ортодоксии с обширными портфолио, охватывающими внешнюю разведку, контрразведку, контрабанду, сбор налогов (что может граничить с вымогательством) и, самое страшное, работу тайной полиции.\n\nСоперничество, разыгравшееся между двумя группами, распространилось на Гуанчжоу, где Гун Чанжун из Тэкэ бросил вызов Чжэн Цземиню из БРС. Гун — давний член КСП и лидер повстанцев, выросший в Соединенных Штатах, прежде чем вернуться в Китай для участия как в Крестьянском движении, так и в забастовке Гонконг-Кантон. Чжэн Цземинь был кадетом Военной академии Вампу, который позже учился в Университете Сунь Ятсена в Париже. Политический комиссар, связанный с радикальными кругами ОВК, он известен своей любовью к офицерам, обученным во Франции.\n\nОба мужчины уроженцы Гуандуна, но относительно недавно прибыли в провинцию. Уже там и обладая небольшим преимуществом, находится Дэн Фа, повстанец Миньгань со связями в КСП и печально известный командир социалистической тайной полиции. Тем временем Ван Яцяо, печально известный «Король убийц», оказывается еще одной неуловимой силой, вступая в союз с существующими триадами. Поскольку различные фракции сходятся в схватке, многие, попавшие под перекрестный огонь, сетуют на то, как левая рука Гоминьдана всегда кажется сражающейся с правой."
 GXC.lategame.572.a: "Обеспечить закон и порядок."
 GXC.lategame.572.b: "Приветствовать центральные правоохранительные органы."
 GXC.lategame.572.c: "Союз с местными."

 GXC.lategame.573.t: "Институт революционной практики"
 GXC.lategame.573.d: "Чтобы сохранить партийную ортодоксию и поддержать революционный дух низших кадров Гоминьдана, центральный комитет санкционировал создание Института революционной практики. Подготовительный комитет был создан в [CHI.Capital.GetCapitalVictoryPointName] для наблюдения за учебной программой, хотя с нашей местной автономией мы можем ожидать значительного права голоса в направлении, которое примет Институт в Лянгуане.\n\nУ Гоминьдана, с его разнообразной и порой противоречивой программой, есть много потенциальных углов для использования при влиянии на свое членство. Хотя высокоуровневые цели партии суммируются тремя принципами Национализма, Демократии и Благосостояния, фактическое достижение этих целей потребует того, что известно как «Трехкратная» революция (Политическая, Экономическая и Социальная), сформулированная ранними фигурами, такими как Ху Ханьминь, и возрожденная (независимо от того, как левые могут относиться к господину Ху) в недавних дискуссиях о будущем. Цель одна и та же — усилить индоктринацию на социальном уровне и поощрять низкопоставленные кадры проявлять инициативу в продвижении национальной революции."
 GXC.lategame.573.a: "Построение более справедливой системы."
 GXC.lategame.573.b: "Прекращение иностранного империализма."
 GXC.lategame.573.c: "Воспитание нового свободного общества."

 GXC.lategame.574.t: "Подготовка к долгой войне"
 GXC.lategame.574.d: "После 1911 года было предпринято множество попыток примирить Северное и Южное правительства Китая. Сам доктор Сунь предпринял одну последнюю отчаянную попытку договориться в 1925 году, умерев от рака в процессе. Сейчас, более десяти лет спустя, мы давно прошли точку компромисса. Объединение Китая потребует войны, а войны требуют жертв. Националистическое правительство начало предварительно повышать военные налоги, опасаясь, что внезапный скачок подорвет военные усилия, если разразится война с имперскими державами. Были созданы запасы, обновлены списки призывников, люди и деньги собраны с населения.\n\nЭти политики, естественно, довольно непопулярны даже среди бастионов Гоминьдана. После десятилетий нестабильности и гражданской войны большинство китайских семей с трудом сводят концы с концами. Они были еще больше разочарованы повторяющимися коррупционными скандалами."
 GXC.lategame.574.a: "Необходимая жертва ради сохранения нации."
 GXC.lategame.574.b: "Наша революция была призвана положить конец их страданиям, а не увеличивать их."

 ##LKMT Focus Tree Events (580-589)

 ##LKMT Chinese Civil War Events (590-599)
 GXC.lategame.590.t: "Инцидент в Лянгуане"
 GXC.lategame.590.d: "С нацией на грани гражданской войны [GXC.GetLeader] поспешил восстановить спокойствие и лидерство в [GXC.Capital.GetCapitalVictoryPointName]. На торжественной церемонии перед толпой отобранных сторонников и журналистов чиновники [GXC.GetAdjective] осудили правительство [CHI.Capital.GetCapitalVictoryPointName] как коррумпированное, тираническое и ревизионистское, отмахнувшись от обвинений в государственной измене, утверждая, что именно [CHI.GetLeader] предал идеалы доктора Суня. Мероприятие завершилось официальной прокламацией, отвергающей Центральный комитет [GXC.Capital.GetCapitalVictoryPointName], и призывами к созданию нового лояльными товарищами.\n\nПразднества мало что могли сделать, чтобы скрыть беспокойство, проникающее даже в высшие ряды администрации. [GXC.GetLeader] сделал смелую ставку, восстав против Центрального правительства. Недавний кризис на Третьем конгрессе пошатнул политическую легитимность [CHI.GetLeader], но вряд ли он фундаментально изменит расклад на поле боя. Несмотря на призывы [GXC.Leader], не было никаких высокопоставленных внутренних перебежчиков, даже когда [CHI.GetLeader] подавляет диссидентов изнутри. Повстанцы [GXC.GetAdjective] могут только надеяться, что другие на окраинах присоединятся к восстанию, но это не гарантировано. Пока гремит артиллерия и пехота занимает позиции, судьба Китая, вероятно, будет решаться далеко от залов власти Лянгуана."
 GXC.lategame.590.a: "Одна последняя битва за будущее нашей страны!"

 GXC.lategame.591.t: "Кантон возвращает свое лидерство"
 GXC.lategame.591.d: "Город Гуанчжоу (известный на международном уровне как Кантон) был домом для ряда правительств южного Китая после революции 1911 года, включая различные воплощения Гоминьдана. Многие из ранних членов партии были выходцами оттуда, и поэтому, если бы какой-то город мог свергнуть партийное государство Ван Цзинвэя изнутри, это был бы Гуанчжоу. Некоторые, конечно, были шокированы тем, что сердце Гоминьдана могло сыграть такую ​​ключевую роль в уничтожении старого Центрального комитета, сметая лоялистов Вана и оппозицию. Но те, кто знал работу [GXC.GetLeader] и [GXC.GetRulingParty], понимали, что они всегда питали обиду на Нанкин и мечтали о новом порядке внутри нового порядка Гоминьдана.\n\nЧто неудивительно, так это то, что [GXC.GetLeader] провозгласил новое правительство и организовал новый Центральный исполнительный комитет, тем самым захватив лидерство в старом движении Гоминьдана. С уходом старого Национального революционного правительства осталось мало тех, кто может противостоять им, но их лидерство все еще оспаривается. Будет ли у [GXC.GetLeader] блаженно быстрый путь к национальному объединению или будут дальнейшие конфликты из-за преемственности Ван Цзинвэя, определит Китай на долгие годы вперед."
 GXC.lategame.591.a: "Снова в капитанском кресле."

 GXC.lategame.5910.t: "Новое правительство Кантона"
 GXC.lategame.5910.d: "Собрав недовольных революционеров в Гуанчжоу (также известном как Кантон), [GXC.GetLeader] провозгласил новый [GXC.GetNameDef] с целью освобождения нации от тирании милитаристов, иностранного империализма и даже предательства со стороны других революционных фракций. Несмотря на поздний час для этого политического поворота, [GXC.GetLeader] считает, что Лянгуан будет достаточно мощной базой для преодоления укоренившихся врагов в Китае.\n\nСработает ли это так, как он надеется, — другой вопрос, хотя существует множество прецедентов того, что Гуанчжоу возглавлял революцию благодаря своему богатству, готовому доступу к иностранной поддержке и истории содержания больших революционных армий. Победа, однако, в конечном итоге будет зависеть от успеха на поле боя."
 GXC.lategame.5910.a: "Революционеры объединятся снова!"
 GXC.lategame.5910.b: "Предсмертный вздох или первые вдохи революции?"

 GXC.lategame.592.t: "Появляется претендент"
 GXC.lategame.592.d: "Хотя Ху Ханьминь и ориентированный на правых «Московский» комитет Гоминьдана были отстранены от китайской политической сцены более десяти лет, они вернулись домой в Гуанчжоу. Их встретил хозяин в личном особняке Чэнь Цзитана, который приветствовал старейшин партии роскошным банкетом. Наконец, после месяцев тайных коммуникаций и деликатных переговоров, губернатор Чэнь обеспечил их возвращение — хотя и с опозданием. В конце вечера Ху Ханьминь был официально приведен к присяге в качестве Председателя Гоминьдана и получил свой долгожданный шанс осуществить политическую опеку.\n\nНесмотря на его высокий титул, его полномочия значительно ограничены по сравнению с почти абсолютной властью, на которую претендовал Сунь Ятсен как Генералиссимус, титул, который Ху недолго носил после безвременной кончины Суня. Чэнь Цзитан и его фракция Новой гуандунской клики сохраняют жесткий контроль над Гуандуном и некоторыми другими окружающими провинциями, представляющими интерес, хотя в значительной степени не интересуются более широкой китайской политической ареной. Ли Цзунжэнь и Новая клика Гуанси, хотя и ослабленные, также стремились сохранить автономию Гуанси и других союзных провинций, головная боль, которая, вероятно, будет мучить партийное государство в течение поколений.\n\nТем не менее, возвращение Московского комитета оставляет некоторую слабую надежду на будущее для партии, независимое от социалистов, которые долгое время доминировали в ней. Возвращающиеся изгнанники включают членов Клики старейшин, старых революционеров, все еще придерживающихся более радикального видения доктора Суня. Сюда также входят члены Клики Сишань, еще одной фракции, более соответствующей старым лидерам Тунмэнхоя, таким как Сун Цзяожэнь и Хуан Син. Некоторые надеются, что их присутствие может убедить колеблющихся центристов в партии перебежать, если ситуация изменится."
 GXC.lategame.592.a: "Может быть, он сможет спасти нас от социализма..."

 GXC.lategame.593.t: "Рассвет Третьей партии"
 GXC.lategame.593.d: "Тань Пиншань долго ждал этого момента, и наконец возможность представилась. Хотя момент был мимолетным и риски изобиловали, Тань понял, что если есть хоть какая-то надежда на социалистический Китай, независимый от коррупции руководства Гоминьдана и Китайской синдикалистской партии, он должен действовать. Мобилизовав всю мощь Лянгуана против центрального правительства, он поднял свое знамя против Нанкина — и, к удивлению многих, он победил!\n\nКакое знамя это влечет за собой, однако, оставалось предметом обсуждения даже во время хаотичных перестрелок между Центральным правительством и силами Лянгуана. Таню были предложены различные предложения, который с нетерпением наслаждался шансом принять такое значимое (хотя в конечном итоге символическое) решение для революции.\n\nПервым было бы принять заявленную миссию Временного комитета действий по искуплению Гоминьдана. Вариант флага Белое солнце, Синее небо и Полностью красная земля уже подготовлен, включая плуг крестьян и шестерню для рабочих в его дизайн.\n\nВ качестве альтернативы, союзные члены Китайской синдикалистской партии предложили новый красный флаг с золотым «Гун» (переводится как Работа или Труд) в центре. Это было де-факто символом режима во многих областях, чтобы лучше отличать силы Лянгуана от их врагов на поле боя. Взяв на себя руководство Лигой китайских синдикалистов, мы ориентируемся прочь от неудач Гоминьдана к новому синдикалистскому будущему.\n\nНаконец, есть вариант возвращения к корням Таня и окончательного формирования поистине «Третьей партии» в Китае, Китайской революционной партии его собственного создания. Красный флаг с шестерней, представляющей пролетариат, красной звездой для партии, объединяющей их, и тремя желтыми полосами, представляющими Желтую реку, Янцзы и Жемчужную реку, идеально подошел бы для этого случая.\n\nВ любом случае ясно, что перемены грядут. Все, что имеет значение, — это посыл."
 GXC.lategame.593.a: "Мы маршировали, чтобы спасти Гоминьдан от самого себя."
 GXC.lategame.593.b: "ЛКС заслуживает новой породы лидеров."
 GXC.lategame.593.c: "Китайская революционная партия дает новую надежду!"

 GXC.lategame.594.t: "Лянгуанский тигр прыгает"
 GXC.lategame.594.d: "Когда солдаты Лянгуана маршировали на север, чтобы сражаться в еще одном раунде гражданской войны, они дерзко адаптировали старую детскую риторику (на мотив Frère Jacques) под названием «Два тигра», чтобы она соответствовала обстоятельствам. Это случалось и раньше, конечно, Куан Юн с разрешения Дэн Яньда и Го Можо создал «Национальную революционную песню» как маршевую мелодию накануне первоначального Северного похода. Но эта новая версия, названная «Аграрная революционная песня», звучит так:\n\nДолой тиранов,\nДолой тиранов,\nИ злых шэньши,\nИ злых шэньши,\nМы хотим быть хозяевами,\nМы хотим быть хозяевами,\nРазделите поля!\nРазделите поля!\n\nМожно задаться вопросом, не были бы оригинальные тексты более подходящей метафорой. В них весело описываются два тигра, один без глаз (или в других версиях, ушей) и один без хвоста. Гоминьдан подобен первому тигру, бегущему вслепую, не слушая людей, которым он якобы служит. Крестьяне подобны второму тигру, преследующему его без хвоста, чтобы стабилизировать его. Весьма странная ситуация.\n\nНо все же Пэн Пай, пожизненный бунтарь, спасет этого второго тигра. Теперь, когда он завоевал контроль над Китаем, единственный вопрос заключается в том, сделает ли он это, приручив первого, или убив его и проложив новый путь."
 GXC.lategame.594.a: "Мы откроем глаза Гоминьдану!"
 GXC.lategame.594.b: "С хвостом или без, Китайская крестьянская партия прыгает вперед!"

 GXC.lategame.595.t: "Смена нарратива"
 GXC.lategame.595.d: "Чэнь Миншу и Новая 4-я армия всегда отличались своей стойкостью в бою и верностью делу, но их решение выступить против тирании Нанкина поставило эту репутацию под сомнение. «Хромой генерал» и его клика были резко заклеймены как мятежники, ревизионисты и, что еще хуже, реакционеры.\n\nТакая история, особенно в руках искусных пропагандистов левого Гоминьдана, оказалась смертельной для репутации десятков соперников в прошлом. Несмотря на свою победу в последовавшей войне, генералу Чэню нужно действовать быстро, чтобы контролировать историю, упреждающе управляя тем, как история запомнит его движение.\n\nСамый немедленный нарратив, который мы можем наметить, заключается в том, что мы являемся защитниками истинных принципов Гоминьдана — достойными солдатами, охраняющими от посягательств тирании и коррупции со стороны высокопоставленных членов партии. Это помогло бы нам укрепить нашу позицию от тех, кто привязан к ярлыку Гоминьдана, и сделать нашу победу более легкой для принятия теми, кто провел десятилетия в партийном аппарате.\n\nОформление нашей войны как внутренней борьбы за власть между фигурами Гоминьдана имеет свои недостатки, однако, преуменьшая для некоторых масштаб борьбы и потенциально создавая апатию по поводу конечного результата. Некоторые советовали нам полностью отказаться от символов и идентичности Гоминьдана, вместо этого перековав себя в новую партию, которая стремится полностью покончить с излишествами Гоминьдана. Это было бы заметным разрывом и дало бы нам новый старт."
 GXC.lategame.595.a: "Как солдаты революции, мы поклялись защищать от врагов внутренних и внешних!"
 GXC.lategame.595.b: "Как люди Производящего народа, мы основали нашу собственную партию и нашу собственную судьбу!"

###Section 4d (600-799): Late Game UPC Political Events

 ##UPC Fall of Beijing Event Intro Chain (600-629):
 GXC.lategame.600.t: "Гуанчжоу побеждает Пекин"
 GXC.lategame.600.d: "В конце концов, не переговоры, а военная мощь вывели федерализм на передний план китайской политики. Правительство Гуанчжоу сумело провести свои армии от Кантона до Пекина, одно из редких объединений с юга на север в китайской истории. Некоторые могут сказать, что они отомстили за угнетение, которое северяне причинили югу.\n\nЕсли и было какое-то злорадство среди верховного командования Гуанчжоу, оно было приглушено, когда Чэнь Цзюнмин и его свита осматривали Пекин. Город был опустошен конфликтом, многие жители бежали, чтобы избежать боев, и чудесная столица подверглась сильному разграблению, прежде чем более дисциплинированные подразделения смогли восстановить порядок.\n\nСитуация немногим лучше в других частях Китая. Миллионы были перемещены, и хотя большинство вернется домой в ближайшие недели, когда политическая ситуация уляжется, многим другим некуда будет возвращаться. Экономика погрузилась в рецессию, поскольку кружатся сомнения в способности нового правительства выплатить жизненно важные займы и поддерживать порядок.\n\nСопротивление продолжается, некоторые подразделения отказываются сложить оружие и клянутся продолжать борьбу. Но армия Гуанчжоу истощена — перенапряжена после долгой кампании на север. Многие из их лучших дивизий поредели, теряя войска из-за потерь, истощения, дезертирства или гарнизонов. Другие были наводнены низкокачественным ополчением и интегрированными подразделениями милитаристов, снижая их общую боевую эффективность.\n\nФедералисты обеспечили свою с трудом завоеванную победу, но теперь вопрос в том, сможет ли их система пережить мир в трудные дни впереди."
 GXC.lategame.600.a: "Еще один шаг к объединению."

 GXC.lategame.601.t: "Вторая конференция федералистов"
 GXC.lategame.601.d: "Пекин пал, а вместе с ним и старая Бэйянская республика доживает последние дни. Хотя остатки старого правительства могут задержаться в различных редутах или в изгнании, для многих это явный знак того, что для нации наступает новая эра. В то время как сопротивление [ROOT.GetNameDef] продолжается, Чэнь Цзюнмин почувствовал себя достаточно уверенно, чтобы провести еще одну Конференцию федералистов в [ROOT.Capital.GetCapitalVictoryPointName].\n\nНа этот раз ожидается гораздо больший список гостей. В то время как первая конференция федералистов, проведенная в Гуанчжоу в эпоху после Чжили, отчаянно искала присутствия различных фигур — нацеливаясь на престижных интеллектуалов и либеральных деятелей, а также региональных милитаристов — на этот раз различные заинтересованные стороны по всему Китаю отчаянно требуют попасть внутрь. Мало кто хотел бы остаться в стороне от разбирательств, и многие старые члены Национального собрания Бэйяна стремятся сохранить свои позиции в приходящем правительстве.\n\nДля Чэнь Цзюнмина это его момент славы. Некогда просто региональная фигура, вызывавшая некоторый национальный интерес, теперь он, пожалуй, самая сильная власть во всем Китае. Именно он сплотил умирающее федералистское движение, именно он создал и повел армию на Пекин, и теперь именно он будет эффективно решать состав нового временного Собрания.\n\nСо всей этой властью приходит и более пристальное внимание. Его обещания новой, более справедливой республики никогда по-настоящему не подвергались испытанию до сих пор, и многие из тех либеральных интеллектуалов и губернаторов-федералистов, за которыми он ухаживал, теперь ожидают, что он сдержит свое слово. Шепот ходит по республике, пока политически мыслящие люди размышляют, будут ли (или даже могут ли быть) значимые выборы в этих обстоятельствах, и пойдет ли президент Чэнь путем своих предшественников в авторитаризме.\n\nНа данный момент, однако, вопрос дня заключается в том, будет ли членам собрания, избранным при режиме его предшественников, разрешено сохранить свои места — значимый вопрос, поскольку правительство балансирует между новым и старым."
 GXC.lategame.601.a: "Старый порядок провонял коррупцией и упадком."
 GXC.lategame.601.b: "Единство севера и юга исцелит нацию."

 GXC.lategame.602.t: "Дух великого патриотизма"
 GXC.lategame.602.d: "Пожалуй, второй самой заметной фигурой в Гуанчжоу является Чжан Цзюньмай, который недавно опубликовал свой трактат «Дух великого патриотизма». В нем он излагает свои доводы в пользу сильного и единого, но также демократического правительства в ближайшие годы, даже в условиях продолжающегося конфликта и реконструкции.\n\nОн писал о британских правительствах единства во время Великой войны, где перед лицом опасности существовала «политика лидерства», когда премьер-министрам военного времени предоставлялись чрезвычайные полномочия, но с одобрения Парламента, народа и всех политических партий. В то время как в нормальное время британские политики были свободны преследовать свои личные и партийные интересы, а народ пользовался значительными политическими свободами, в военное время гражданские свободы приносились в жертву во имя «духа великого патриотизма», так как все объединялись ради победы.\n\nЧжан также указал, что даже во время войны существовали мирные способы смены правительства — Ллойд Джордж взял на себя руководство в середине конфликта, а Г. Г. Асквит мирно перешел в оппозицию. Преобладание верховенства закона допускало четкое чувство «правил игры», допуская чувство честной конкуренции, свободной от политического насилия и вмешательства военных. Демократические традиции, таким образом, позволили британскому народу доверять своему мощному правительству военного времени.\n\nЗная, что его аргумент подрывается Британской революцией, он также приводит примеры партий в Германии, Австрии, Франции и других местах, преодолевающих партийные линии во время кризиса. Несмотря на его чрезмерно радужную оценку, его рецепт для республики отражает растущий консенсус среди прогрессистов: чтобы культивировать подобный дух великого патриотизма в нации, лишенной демократических традиций, Китай должен уважать гражданские свободы, расширять полномочия национального собрания и проводить политические реформы. В противном случае, когда центральное правительство начнет отбирать власть у милитаристов, оно начнет конфликтовать с демократическими ценностями."
 GXC.lategame.602.a: "Тогда, конечно, мы должны начать культивировать этот дух, чтобы спасти нацию!"
 GXC.lategame.602.b: "Чжан хорошо пишет, но, как и многих лянистов, его одержимость этатизмом погубит его."

 GXC.lategame.603.t: "Китайская демократическая лига"
 GXC.lategame.603.d: "Чжан Цзюньмай, иногда прагматичный лянист, может быть готов подстраховаться, когда дело доходит до президента Чэня, но его союзники в Федерации китайских демократических партий гораздо смелее. Хотя ФКДП распалась после Инцидента с семью джентльменами 1936 года, национальное объединение также вернуло движение вместе. Они убрали два иероглифа (Чжэн Туань, которые подчеркивали их партийно-доминирующую природу) из своего названия, переименовавшись в Китайскую демократическую лигу — подразумевая одну объединенную коалицию.\n\nЛо Лунцзи опубликовал «Проект принципов Демократической лиги» от имени ДЛК, который фактически был проектом национальной конституции. Он требовал двухпалатного законодательного органа с Сенатом, избираемым народом, и Народным советом, избираемым провинциальными собраниями. Он включал положения о федерализме, разделении властей, всеобщем и равном избирательном праве, доступе к образованию, защите гражданских прав, централизации вооруженных сил и смешанной экономике с конечной целью мирного перехода к социализму.\n\nВскоре после этого последовал еще более решительный документ под названием «Взгляды и политика Китайской демократической лиги относительно текущей ситуации», настойчиво продвигающий этот вопрос. «Необходимость для Китая стать демократией вышла за рамки теории; это факт», — гласил он, — «формирование демократической системы не должно откладываться до завершения реконструкции, если демократия не будет реализована в этот период, то то, что мы получим после, будет не демократией, а расколом и гибелью нашей страны».\n\nЗаявление подверглось критике со стороны ПОИ, которые видят в нем почти неявный упрек Чэню и его планам стабильного перехода к демократии — многие из союзников президента осудили его как формулу анархии. Эскалация словесной войны привела к тому, что Чжан Цзюньмай официально объявил о выходе ДСП из ВРА, где доминирует ПОИ, и о своем официальном вступлении в должность лидера ДЛК."
 GXC.lategame.603.a: "Это наглая игра за власть идиотских неблагодарных!"
 GXC.lategame.603.b: "Это единственная надежда Китая на демократию!"

 GXC.lategame.604.t: "Северяне отвечают"
 GXC.lategame.604.d: "Пока ВРА и ДЛК обмениваются резкими словами, их северные коллеги видят как риск, так и возможность. Хотя некоторые северные политики уже присоединились к какой-либо стороне (либо из оппортунизма, либо из идеологической близости), большинство сохраняют свою прежнюю партийную или клановую идентификацию. Более того, многие из их лидеров еще не взяли на себя обязательство присоединиться к новому правительству, заняв выжидательную позицию.\n\nС момента дезертирства почти ста членов Бэйянской ассамблеи в Гуанчжоу в 1917 году, положившего начало Движению в защиту конституции, северная и южная политика пошли по заметно разным путям. Даже номинальное объединение Чжили не смогло полностью залечить разрыв. Будучи в целом более консервативной, чем юг, крупнейшей официальной партией Бэйяна была партия Лян Цичао — последняя итерация под названием Демократическая конституционная партия.\n\nНо политика Бэйяна не была основана на партиях, большинство политиков баллотировались как независимые (и гордились этим) и лишь неформально присоединялись к более широким сетям. Чжили организовали Ассоциацию гармонии как свою политическую машину, а Младокитайская партия сформировала с ней симбиотические отношения. Другие крупные фракции включали Федерацию национального спасения, Старую клику политической науки, Ассоциацию сельского восстановления и Общество устремления.\n\nИх интерес к склокам южан был бы незначительным, если бы не растущая централизация власти вокруг офиса президента. Хотя Чэнь приказал местным провинциальным собраниям собираться в соответствии с федералистскими принципами, на практике он накопил значительный контроль (намеренно или нет) через армейские «Зоны подавления бандитизма», которые подчиняются непосредственно его военному штабу. Поскольку предыдущие северные лидеры шли по аналогичному пути к авторитаризму, многие опасаются, что это лучший шанс, который они получат, чтобы проверить президентскую власть.\n\nЛинии фронта очерчены, и пылкая ФНС уже присоединилась к единомышленникам из ДЛК. Но остальные борются с опасной дилеммой."
 GXC.lategame.604.a: "Старые партии ФКДП должны снова объединиться для борьбы за демократию!"
 GXC.lategame.604.b: "Партии Бэйяна должны помочь направить президента к реформам, как они всегда делали."

 GXC.lategame.605.t: "Гуанчжоу на перепутье"
 GXC.lategame.605.d: "Чжан Цзюньмай был пророком в своем предсказании, что объединение приведет к напряженности между централизацией и демократией. Но его гамбит, вероятно, задуманный только для укрепления его переговорной позиции в коалиционных переговорах, перерос в нечто гораздо большее. Демократическая волна прокатилась по интеллигенции — писатели осуждают весь предыдущий федералистский дискурс о демократии как пустые слова. Выступать против этого рискованно быть смытым приливом, выступать с этим может означать гибель... или возможность.\n\nВ лагере Чэнь Цзюнмина дискурс вышел далеко за рамки того, на что они надеялись, когда конференция была впервые созвана. Вместо звонкого одобрения Плана национальной реконструкции Чэня, он вызвал требования дальнейшей демократизации — чрезвычайно преждевременно, учитывая работу, которую еще предстоит проделать по разработке провинциальных конституций, восстановлению стабильности и прекращению иностранного империализма.\n\nНарратив вышел из-под его контроля — северные СМИ указали, что он был избран ассамблеей, которая едва представляла юг. Если он не допустит нового голосования по президенту с участием северян, он заклеймит себя лицемером. Позиция ДЛК тоже не очень надежна — хотя они утверждают, что говорят от имени масс, большинство из них — академики и профессионалы, слишком оторванные от реальности, чтобы даже осознать, как мало они знают о простых людях. И военные, безусловно, не довольны нападками на их лидера или дестабилизацией республики, за которую они так упорно боролись.\n\nЧтобы снизить напряженность, Чэнь Цзюнмин и Чжан Цзюньмай запланировали частную встречу. Они оба согласились, что ассамблея должна провести новое голосование по президенту, но растет требование прогрессистов о созыве новых выборов в ассамблею. Новые выборы займут время, будут означать риски для обоих мужчин и создадут риски для целостности республики в целом. Но их демократические верительные грамоты могут быть поставлены под сомнение в противном случае."
 GXC.lategame.605.a: "После обсуждений джентльмены согласились призвать к всеобщим национальным выборам."
 GXC.lategame.605.b: "Двое мужчин договорились о голосовании в ассамблее и обновленном правительстве единства."

 GXC.lategame.606.t: "Политическое перемирие военного времени"
 GXC.lategame.606.d: "Начало войны омрачило бы демократические выборы в любой республике, но в такой хрупкой, как Китай, перспектива национальных выборов, пока летают пули и гремят артиллерийские снаряды, пугает. Уже идут разговоры о приостановке запланированных выборов, многие комментаторы критикуют политиков за то, что они сосредоточились на политической борьбе, а не объединились против общих врагов.\n\nНадеясь успокоить эти опасения, Чжан Цзюньмай опубликовал «Политическое перемирие с целью реконструкции нации», в котором он еще раз напоминает, как западные демократии (особенно немецкая и англо-американская, с которыми он и его союзники более знакомы) способны действовать даже во время войны. Общим для них является общее уважение к конституции, способность мирно корректировать и координировать планы и предложения между партиями, постоянная забота правительства о благополучии людей и обороноспособность их наций, способная противостоять агрессии.\n\nЗатем в его статье было предложено не только политическое перемирие между различными партиями в Национальном собрании, но и продвижение нового духа, сродни реформам Мэйдзи в Японии. Хорошим идеям нужно следовать, плохую политику исправлять, старые и устаревшие идеи отбрасывать, а демократию интегрировать в повседневную жизнь.\n\nЕго слова цветисты, но в конечном итоге мало что говорят о том, следует ли проводить выборы в эти трудные времена. По крайней мере, на данный момент они пройдут, как и планировалось, но, возможно, то, чего он не сказал, было более показательным, чем то, что он сказал."
 GXC.lategame.606.a: "Как можно проводить выборы в таких условиях?"

 ##UPC Dem Election Chain (630-659):
 GXC.lategame.630.t: "Первые Федеральные выборы"
 GXC.lategame.630.d: "Как и было согласовано, будут объявлены общенациональные выборы (или, по крайней мере, на территориях под контролем Гуанчжоу), провозглашенные в союзных СМИ как победа китайской демократии. Но масштаб этих первых выборов, как ожидается, будет намного более ограниченным, чем надеются идеалисты. Это уже было представлено как фактически референдум о лидерстве Чэнь Цзюнмина, который будет служить на время выборов. Хотя ожидается, что в выборах примут участие более дюжины партий, президентство стало гонкой двух сторон еще до того, как началось.\n\nПоскольку у Федерального правительства еще нет закрепленной национальной конституции, выборы по умолчанию вернулись к старой системе Бэйяна с федералистским уклоном. Голосование является косвенным, местные собрания (некоторые проводят свежие и/или честные выборы, другие нет) выбирают представителей для отправки в столицу. Обычно ожидается, что эта система будет благоприятствовать статус-кво, однако волнение от этих новых выборов заставило гражданские группы мобилизоваться, чтобы увеличить явку там, где они могут.\n\nЧжан Цзюньмай, несмотря на многочисленные личные споры с другими членами старой ФКДП, понимается как их лучший шанс сместить президента Чэня. Он был неохотно избран председателем Китайской демократической лиги и стал де-факто главой списка. ДЛК, хотя якобы переименованная в единую партию, остается рыхлым блоком левоцентристских прогрессистов, в котором доминируют старые товарищи Чжана по ДСП.\n\nВеликий республиканский альянс также активизировался, мощный либерально-консервативный блок, в котором доминирует ПОИ. Ожидается, что они легко выдвинут действующего президента на переизбрание. Однако Чэнь еще не объявил о своей кандидатуре. Баллотироваться ожидаемо и, вероятно, это более стабильный путь. У Чэня, конечно, также есть эго, он считает себя спасителем, в котором нуждается Китай. Но поскольку возраст начинает сказываться на нем, говорят, что он обдумывает уход в сторону в пользу своего протеже Чэнь Цию — новое начало, но рискованное. Его наследие висит на волоске."
 GXC.lategame.630.a: "Чэнь Цзюнмин гордо принимает свое выдвижение на второй срок."
 GXC.lategame.630.a_tt: "§YЧэнь Цзюнмин борется не только за то, чтобы быть избранным, но и за то, чтобы быть избранным способом, который широкая общественность считает легитимным. Ему будет легче предотвратить откат демократии, если он будет избран, и если это произойдет во время выборов, это будет более плавный переход.§!"
 GXC.lategame.630.b: "Чэнь Цзюнмин одобряет Чэнь Цию, чтобы тот нес его факел."
 GXC.lategame.630.b_tt: "§YТо, что Чэнь Цию является кандидатом от ВРА, повысит легитимность выборов в глазах широкой общественности. Однако §Rесли во время выборов произойдет откат демократии, это может оказаться разрушительным для стабильности республики.§!§!"

 GXC.lategame.631.t: "Два Чэня, два Чжана, много союзников"
 GXC.lategame.631.intro: "Пока Чэнь Цзюнмин и Чжан Цзюньмай занимают центральное место, их поддерживающий состав также начал занимать позиции. Хотя и не столь заметные сразу, эти люди могут быть столь же важны для будущего обеих партий."
 GXC.lategame.631.body: "Уроженец Чжэцзяна Чжан Цзюньмай выбрал уроженца Гуандуна, старейшину политики Сюй Фулиня, возможно, подчеркивая огромную важность провинции на предстоящих выборах. Широко ожидается, что в случае победы ДЛК Чжан назначит своего давнего друга и заместителя Чжан Дунсуня премьер-министром — вероятно, спорный выбор, учитывая его социалистические взгляды.\n\nОбе стороны консолидировали верхушку своих соответствующих списков вокруг своих собственных основных союзников в старых ПОИ и ДСП, но в конечном итоге они также будут зависеть от своих общенациональных коалиций в ВРА и ДЛК для победы. ВРА — это объединение различных федералистских партий, включая Партию народного управления Тан Цзияо, Движение за автономию Чжэцзяна Чу Фучэна, Общество обновления народа Чжао Хэнти, Подготовительное управление провинциальной федеральной автономии Сюн Кэу и несколько более мелких групп.\n\nДЛК, провозглашая себя теперь единой партией, на практике остается федерацией партий, включая Общество полумесяца Ло Лунцзи, Китайскую демократическую ассоциацию национального строительства Хуан Ханьляна, Китайскую ассоциацию содействия развитию демократии Ма Сюйлуня, Федерацию национального спасения Шэнь Цзюньжу и несколько других гражданских групп."
 GXC.lategame.631.d.cj_running: "$GXC.lategame.631.intro$\n\nЧэнь Цзюнмин разочаровал многих, когда выбрал своего давнего секретаря Ма Юйхана вице-президентом, создав впечатление кантонского элитизма, хотя он клянется, что его окончательный кабинет будет включать достойных людей со всего Китая. Настоящая причина этого загадочного выбора, вероятно, в политике — становление Ма (в основном церемониальным) вице-президентом оставляет его вне рассмотрения на более важную должность премьер-министра, которая, как ожидается, достанется кантонцу Чэнь Цию.\n\n$GXC.lategame.631.body$"
 GXC.lategame.631.d.cj_not_running: "$GXC.lategame.631.intro$\n\nЧэнь Цию выбрал Ма Юйхана, чтобы присоединиться к его списку в качестве (в основном церемониального) вице-президента, оливковая ветвь более консервативному крылу движения Чэнь Цзюнмина. Отвечая на критику кантонского элитизма, не подкрепленную их вероятным выбором на пост премьер-министра уроженца Гуандуна Чэнь Яньшэна, Чэнь поклялся включить достойных людей со всего Китая в свой окончательный кабинет, если ВРА победит.\n\n$GXC.lategame.631.body$"
 GXC.lategame.631.a: "Чэнь — спаситель китайской нации, и все это знают!"
 GXC.lategame.631.b: "Скажите людям, что голос за Чжана — это голос за демократию!"

 GXC.lategame.632.t: "Другие партии отстранены"
 GXC.lategame.632.d: "Поскольку большая часть внимания нации прикована к кандидатам в президенты, внимание, которое получили ВРА и ДЛК, лишило другие партии ветра в парусах. Имея мало пространства для действий и сомневаясь, что верховное командование армии (по-прежнему в подавляющем большинстве в руках кантонских офицеров) потерпит любых других кандидатов, большинство светил других крупных партий в Китае решили вообще не участвовать в процессе — уступив центр внимания Чэню и Чжану.\n\nХотя их лидеры могли позволить себе выжидать, рядовые члены партии и активисты этих групп вряд ли могут позволить себе потерю патронажа и влияния, которую повлечет за собой отказ от кампании. Многие более мелкие партии влились в ВРА или ДЛК, но более крупные ДКП и МКП могут позволить себе выставить кандидатов, чтобы попытаться обеспечить влияние в политической среде после выборов. Лавируя в пределах федералистской демократии, они надеются получить достаточно мест, чтобы использовать свои рычаги в будущих переговорах.\n\nМногие, многие другие местные политики и связанные с ними политические машины также баллотируются, бросая вызов страхам коррупции и политического запугивания (и, возможно, участвуя в некоторых своих собственных) в надежде пережить новую эру. Отсутствие громких имен в гонке создало ощущение динамизма в ранее закостеневшей политической среде, немного открыв арену и для аутсайдеров.\n\nНекоторые социалисты также пытались баллотироваться на посты, некоторые из протеста и в надежде бросить вызов новому правительству федералистов, а другие из искренней веры в то, что они могут реформировать правительство изнутри. Но они были запрещены практически во всех гонках, либо де-юре, либо де-факто. Центральный комитет(ы) осуждал участие в выборах Бэйяна в прошлом и продолжает делать это с нашими.\n\nХотя ВРА и ДЛК фактически поделили политическую систему, которую они основали, между собой, ясно, что те, кто остался за бортом, не сдадутся без боя."
 GXC.lategame.632.a: "У организованных политических партий больше шансов выжить в эту новую эру."
 GXC.lategame.632.b: "Китай всегда ценил свободомыслящих независимых!"

 GXC.lategame.633.t: "Линии фронта очерчены"
 GXC.lategame.633.d: "Во многих отношениях ВРА и ДЛК скроены из похожей своеобразной ткани, с расплывчатыми популистскими программами политической реформы, смешанной экономической системой и китайским национализмом. Этот свободный подход хорошо сработал на пути к объединению, привлекая сторонников со всех уголков, но по мере того, как разворачиваются выборы, оказалось трудно осмысленно различить их или установить сплоченные партийные идентичности.\n\nИ Чэнь Цзюнмин, и Чжан Цзюньмай исторически делали реверансы левым (включая увлечение экстремистскими идеологиями, такими как анархизм и марксизм), но полагались на консервативные структуры власти, чтобы оставаться актуальными — синтезируя умеренные, реформистские и то, что некоторые критикуют как разбавленные платформы. Это наследие сохраняется в их соответствующих партиях, и отсутствие четкого направления, которое пронизывает как ВРА, так и ДЛК, усугубилось поглощением ими различных более мелких партий в свои блоки.\n\nВ конечном счете, направление новой политической системы, вероятно, будет зависеть от ВРА, а не от ДЛК. Помимо того, что ДЛК является правящей партией, она, как правило, считается более левой, чем ВРА — ПОИ, возможно, является самой левой из ВРА, в то время как ДСП находится ближе к левому центру ДЛК, условно говоря.\n\nПоворот влево, чтобы конкурировать с ДЛК за голоса прогрессистов и даже социалистов, вероятно, помог бы ВРА с массами, но оттолкнул бы консерваторов. ДЛК, вероятно, перепозиционировал бы себя как Демократическое движение, пытаясь ухаживать за различными либералами и конституционалистами в правоцентристском спектре — включая союзы с ДКП и МКП. Это, вероятно, представило бы ситуацию как референдум по лидерству Чэнь Цзюнмина и предполагаемому авторитаризму.\n\nПоворот вправо помог бы ВРА обеспечить голоса консерваторов (вероятно, за счет существующих правых партий), но оставил бы ДЛК свободу действий среди левых. Это, вероятно, создало бы более типичную динамику левых против правых в китайской политике."
 GXC.lategame.633.a: "ВРА борется за простых людей и утопическое будущее!"
 GXC.lategame.633.b: "ВРА выступает за конституционализм и местное самоуправление!"

 GXC.lategame.634.t: "Хаотичная лига"
 GXC.lategame.634.d: "Китайская демократическая лига начала энергично как выскочка, повстанческая партия, бросающая вызов истеблишменту, но ее традиционные проблемы (унаследованные от ФКДП до них) с организацией затруднили их способность мобилизовать голоса. Хотя их оперативный штаб находится в Гуанчжоу, их юридический штаб находится в Пекине (по-прежнему официально столица Китая), и говорят, что их де-факто столица находится в Шанхае, учитывая, сколько их членов имеют там связи.\n\nВнутренняя борьба между составными партиями ДЛК привела к тому, что постоянный комитет из 13 человек и центральный исполнительный комитет из 33 членов были расширены до 18 и 66 соответственно. ДСП доминирует в Генеральном секретариате, хотя распределила места в других комитетах между Обществом полумесяца, Китайской демократической ассоциацией национального строительства, Федерацией национального спасения и Китайской ассоциацией содействия развитию демократии.\n\nИх местные отделения воображают себя «группами пионеров», «динамо-машинами демократического движения» и «авангардом, высоко держащим путеводные факелы множества», но ДЛК остается фундаментально движением, в котором доминируют интеллектуальные и профессиональные классы. Многие сомневаются, смогут ли они действительно установить связь с трудящимися, которых они, как они утверждают, представляют.\n\nДСП и ФНС, вероятно, находятся дальше всего слева с реформистским социалистическим уклоном, хотя у первой есть и культурно-консервативная сторона. ОП, КДАНС и КАСД более либеральны по ориентации, что приводит к некоторым столкновениям. Однако ничто не разделяет ДЛК больше, чем их прагматичные союзы с различными региональными милитаристами, которые стремились противостоять гегемонии Армии Юэ. Их защита и финансирование позволили ДЛК расти, не подвергаясь преследованиям подозрительных центральных властей, и фактически гарантировать, что их кандидаты даже допускаются к участию в выборах, но оставили их обязанными интересам милитаристов."
 GXC.lategame.634.a: "Как пионеры нашего демократического будущего, ДЛК освещает путь вперед!"
 GXC.lategame.634.b: "Удовлетворяя умеренные интересы, ДЛК сохраняет свою респектабельность."
 GXC.lategame.634.c: "Сотрудничество ДЛК с милитаристами повысило их политические шансы."

 GXC.lategame.635.t: "Великая республиканская стратегия"
 GXC.lategame.635.d: "Хотя в Великом республиканском альянсе доминирует руководство старой Партии общественных интересов, ему все равно приходится иметь дело с другими составными партиями, которые помогли его основать. Крупнейшими из них являются Партия народного управления Тан Цзияо, Движение за автономию Чжэцзяна Чу Фучэна, Общество обновления народа Чжао Хэнти и Подготовительное управление провинциальной федеральной автономии Сюн Кэу — которые в основном действуют из своих родных провинций и имеют регионалистский, персоналистский уклон в сторону своих основателей.\n\nУкрепление контроля ПОИ над ВРА во время выборов, вероятно, помогло бы поддерживать партийную дисциплину и позволило бы им заручиться поддержкой их более прогрессивной, хотя иногда и своеобразной программы. Но ВРА, как правило, менее популярен, чем его составные партии в отдельных провинциях, и отчуждение других, вероятно, нанесет ущерб политической машине ВРА и создаст риск перехода в более мелкие партии и к независимым.\n\nВРА выигрывает от того, что является партией Чэнь Цзюнмина, с различными сетями политического патронажа, благотворительными и гражданскими группами и военными связями, которые Чэнь культивировал. Его наследие может быть достаточно сильным, чтобы партии не нужно было предлагать людям целостную программу — просто напоминание о том, кто построил эту республику."
 GXC.lategame.635.a: "ПОИ прорывается вперед со своими планами национальной реконструкции."
 GXC.lategame.635.b: "ВРА отдает приоритет своим любимым сыновьям и местным повесткам дня."
 GXC.lategame.635.c: "Республика никогда не забудет своего отца-основателя, и народ тоже."

 GXC.lategame.640.t: "[UPC.Capital.GetCapitalVictoryPointName] проводит федеральные выборы"
 GXC.lategame.640.d: "Падение Пекина катапультировало правительство федералистов Гуанчжоу Чэнь Цзюнмина на передний план китайской политики. Уверенный в успехе своего движения, Чэнь Цзюнмин провел еще одну крупную конференцию федералистов в [UPC.Capital.GetCapitalVictoryPointName], продвигая объединение, на этот раз с позиции силы.\n\nСила в Китае, однако, привлекает готовую оппозицию. Армия Юэ Чэня имела огромное влияние на реконструкцию освобожденных провинций, формируя местную политику по своему образу и подобию и продолжая оказывать влияние, сражаясь с местными «бандитами». Это вызвало гнев многих милитаристов, которые окружили свои повозки, чтобы защитить свою автономию. Это обеспокоило многих его демократических союзников, которые объединились в форме Китайской демократической лиги в попытке предотвратить авторитаризм.\n\nПосле тщательных переговоров президент Чэнь и лидер ДЛК Чжан Цзюньмай договорились о новых выборах в национальное собрание, которые должны состояться в ближайшие шесть месяцев. Характер выборов намного уже, чем многие надеялись — несмотря на участие десятков партий, гонка сузилась до Великого республиканского альянса Чэня и Китайской демократической лиги Чжана еще до того, как началась.\n\nКак региональное правительство со значительной автономией от центрального правительства, [FROM.GetName] имеет гораздо больше свободы действий. Поддержка списка кандидатов, связанных с ВРА или ДЛК, вероятно, сильно поможет им на предстоящих выборах. Но если [ROOT.GetLeader] или другие захотят начать заявлять о своих правах на национальное лидерство, то это может быть нашей лучшей возможностью извлечь выгоду из гнева против монополизации и централизации власти Гуанчжоу."
 GXC.lategame.640.a: "Великий республиканский альянс лучше всего представляет идеалы федерализма."
 GXC.lategame.640.b: "Китайская демократическая лига защитит конституционное правление."
 GXC.lategame.640.c: "Эти выборы — не более чем показуха для клики Чэнь-Чжан!"

 GXC.lategame.641.t: "[FROM.Capital.GetCapitalVictoryPointName] поддерживает ВРА"
 GXC.lategame.641.intro: "[FROM.GetNameDefCap] фактически управлял собой автономно на протяжении многих лет, мудро подчиняясь [ROOT.Capital.GetCapitalVictoryPointName] в попытке сохранить свое самоуправление. Это означает, что политика в [FROM.Capital.GetCapitalVictoryPointName] действует в значительной степени вне нашего контроля, ограничивая регулирование и мониторинг выборов. Политическая машина [FROM.GetAdjective] также менее интегрирована с более широкими сетями ДЛК и ВРА, чем могла бы быть, хотя местные партийные отделения существуют, хотя и с широкой свободой для отклонений."
 GXC.lategame.641.d: "$GXC.lategame.641.intro$\n\nПохоже, что местные влиятельные игроки в [FROM.GetName], с одобрения [FROM.GetLeader] или без него, склонились в пользу Великого республиканского альянса. Они сделали заявления, указывающие на то, что они, вероятно, отправят делегацию, в которой доминируют кандидаты, связанные с ВРА, на предстоящие выборы. Хотя сами по себе они могут не иметь достаточно мест, чтобы склонить чашу весов, восприятие того, что крупный силовой блок выступает в поддержку ВРА, может побудить колеблющихся склониться к стороне, обладающей импульсом.\n\nКитайская демократическая лига опротестовала ранний результат, утверждая, что предварительные заявления о выборах местных собраний в [FROM.GetName] не были ни свободными, ни справедливыми — у активистов, связанных с ДЛК, было мало времени для организации, а результаты были почти полностью предопределены. Хотя через несколько месяцев все еще будут официальные выборы, на которых могут быть избраны новые люди в местные собрания (которые, в свою очередь, выберут окончательных представителей, отправляемых в национальный законодательный орган), ДЛК утверждает, что эти преждевременные заявления окрасят гонку и отговорят многих их избирателей от похода на избирательные участки.\n\nВмешательство в избирательные процессы в провинциях противоречит федералистским принципам, изложенным правительством Гуанчжоу. Отправка дополнительных наблюдателей за выборами может разозлить местных влиятельных лиц и может ухудшить восприятие чрезмерного вмешательства центрального правительства."
 GXC.lategame.641.a: "Победа демократического федерализма повсюду!"
 GXC.lategame.641.b: "Пример сговора милитаристов!"

 GXC.lategame.642.t: "[FROM.Capital.GetCapitalVictoryPointName] поддерживает ДЛК"
 GXC.lategame.642.d: "$GXC.lategame.641.intro$\n\nПохоже, что местные влиятельные игроки в [FROM.GetName], с одобрения [FROM.GetLeader] или без него, склонились в пользу Китайской демократической лиги. Они сделали заявления, указывающие на то, что они, вероятно, отправят делегацию, в которой доминируют кандидаты, связанные с ДЛК, на предстоящие выборы. Хотя сами по себе они могут не иметь достаточно мест, чтобы склонить чашу весов, восприятие того, что крупный силовой блок выступает в поддержку ВРА, может побудить колеблющихся склониться к стороне, обладающей импульсом.\n\nВеликий республиканский альянс опротестовал ранний результат, утверждая, что предварительные заявления о выборах местных собраний в [FROM.GetName] не были ни свободными, ни справедливыми — у активистов, связанных с ВРА, было мало времени для организации, а результаты были почти полностью предопределены. Хотя через несколько месяцев все еще будут официальные выборы, на которых могут быть избраны новые люди в местные собрания (которые, в свою очередь, выберут окончательных представителей, отправляемых в национальный законодательный орган), ВРА утверждает, что эти преждевременные заявления окрасят гонку и отговорят многих их избирателей от похода на избирательные участки.\n\nВмешательство в избирательные процессы в провинциях противоречит федералистским принципам, изложенным правительством Гуанчжоу. Отправка дополнительных наблюдателей за выборами может разозлить местных влиятельных лиц и может ухудшить восприятие чрезмерного вмешательства центрального правительства."
 GXC.lategame.642.a: "Победа демократии и конституционализма повсюду!"
 GXC.lategame.642.b: "Вопиющее вмешательство милитаристов в демократию!"

 GXC.lategame.643.t: "[FROM.Capital.GetCapitalVictoryPointName] критикует выборы"
 GXC.lategame.643.d: "$GXC.lategame.641.intro$\n\nОднако они, возможно, зашли слишком далеко, когда Провинциальная ассамблея в [FROM.Capital.GetCapitalVictoryPointName] приняла резолюцию, осуждающую федеральные выборы как фарс, обвинив Чэнь Цзюнмина и Чжан Цзюньмая в сговоре с целью не допустить других кандидатов и гарантировать, что только один из них может быть избран. В нем перечислялись и другие обиды, включая чрезмерное вмешательство центрального правительства в местные дела, сомнительную конституционность многих действий правительства Гуанчжоу и обвинения в неправомерном поведении войск Армии Юэ.\n\nЯсно, что [ROOT.GetLeader] и его союзники готовятся к конфронтации в будущем, хотя, поскольку Китай далек от объединения, их возможность может появиться не скоро. Местные выборы, вероятно, все же состоятся, и они, вероятно, пошлют яростно независимый набор законодателей. Тем не менее, спор резко ухудшил отношения между центральным правительством и [FROM.GetName] и союзными провинциями. И это может дать импульс другим, кто стремится свергнуть наше правительство."
 GXC.lategame.643.a: "Несмотря на эту неудачу, я считаю, что они все равно в конечном итоге пришлют делегатов."
 GXC.lategame.643.b: "При таком недемократическом поведении мы назначим делегатов за них."

 GXC.lategame.644.t: "[FROM.Capital.GetCapitalVictoryPointName] развертывает наблюдателей за выборами"
 GXC.lategame.644.d: "Хотя наши намерения участвовать в предстоящих федеральных выборах были искренними, похоже, что центральное правительство не очень благосклонно отнеслось к нашим усилиям выразить свои политические мнения. Обвиняя нас во вмешательстве в выборы и незаконном влиянии на электорат посредством наших политических одобрений, центральное правительство направило наблюдателей за выборами для обеспечения «честного голосования». Это вопиющим образом противоречит их обещаниям уважать местные демократические процессы и представляет собой еще один пример превышения полномочий правительством. Наши местные члены собрания возмущены этим шагом, обвиняя [UPC.GetLeader] в попытке запугать провинции. Они сплотились за [ROOT.GetLeader], и поползли разговоры о возможном восстании."
 GXC.lategame.644.a: "Вот такая у них тут демократия."

 GXC.lategame.650.t: "Армия Юэ приостанавливает выборы"
 GXC.lategame.650.d.intro: "Все знали, что проведение общенациональных выборов в эпоху милитаристов будет пустой затеей, но руководство федералистов решило пойти на это в тщетной надежде, что это будет отличаться от предыдущих неудачных выборов в эпоху милитаристов. К несчастью для них, однако, такая монументальная задача значительно напрягла инфраструктуру молодого правительства, а беспорядочный характер агитации внес значительный вклад в национальную нестабильность.\n\nВоенное верховное командование, на фоне растущего недовольства интеллектуалов перспективами национальных выборов, вмешалось, чтобы предотвратить дальнейшее ухудшение ситуации. Старшие офицеры Клики армии Юэ решили «выступить посредниками в компромиссе» между ВРА и ДЛК, приостановив выборы и продлив срок полномочий существующего парламента до воссоединения и разработки новой конституции. Коалиционное правительство будет сформировано под руководством Чэнь Цзюнмина, а новые законодатели будут избраны или назначены по мере необходимости."
 GXC.lategame.650.d.closer: "После завершения переговоров Чжан Цзюньмай обратился к национальному собранию, надеясь представить результат как победу и преуменьшить обвинения в том, что ДЛК запугали до подчинения. В речи он многозначительно заявил, что «Китай не может оставаться в запутанном состоянии бесконечно. Для достижения мира и стабильности должно быть реализовано демократическое правительство». Тем не менее, он признал, что «демократия не может быть достигнута в одночасье. Нужны выносливость и терпение. Чтобы достичь мира и стабильности, люди должны быть одеты и накормлены, ибо только тогда они оценят добродетели человечности и будут вдохновлены задачей национальной реконструкции»."
 GXC.lategame.650.d.chen_retired: "$GXC.lategame.650.d.intro$\n\nЭтот поворот событий стал источником смущения для президента Чэня, который поклялся не баллотироваться на переизбрание и теперь вынужден отказаться от своих слов. Опасения по поводу военного вмешательства и того, ослабит ли когда-нибудь Клика армии Юэ свою хватку власти, охладили восприятие правительства Чэня.\n\n$GXC.lategame.650.d.closer$"
 GXC.lategame.650.d.chen_activate: "$GXC.lategame.650.d.intro$\n\nЭтот поворот событий принес Чэнь Цзюнмину, одному из ведущих кандидатов в президенты, победу в его попытке сохранить власть, но, вероятно, ценой его репутации среди демократов. Хотя на данный момент мало кто может винить его за выбор упорядоченного перехода вместо неконтролируемых выборов, многие задаются вопросом, отпустит ли он когда-нибудь свою хватку над нацией.\n\n$GXC.lategame.650.d.closer$"
 GXC.lategame.650.a: "Переговоры были короткими..."
 GXC.lategame.650_tt_giga: "§YПоскольку Чэнь Цзюнмин обещал уйти в отставку после выборов, штраф к энтузиазму демократов будет §Rбольше.§!§!"
 GXC.lategame.650_tt_mega: "§YПоскольку Чэнь Цзюнмин был существующим кандидатом на должность, штраф к энтузиазму демократов будет §Gменьше.§!§!"

 ##UPC Auth Election Chain (660-689):
 GXC.lategame.660.t: "Кабинет национального единства"
 GXC.lategame.660.d: "Чэнь Цзюнмин и Чжан Цзюньмай вышли из переговоров с обновленным пактом во имя «Национального единства», подтверждающим лидерство Чэнь Цзюнмина как Президента. ДЛК при Чжане преклонила колено в обмен на стабильность, обещания послевоенной конституции, а также должности в кабинете. Чжан Цзюньмай был назначен главой комитета, проводящего конституционные исследования, с намерением, что он возглавит процесс разработки. Он также добился обещания, что с ним будут консультироваться по поводу крупных правительственных назначений, и добился рабочих мест для своих близких союзников и протеже.\n\nНастоящим победителем, однако, является Чэнь Цзюнмин, который снова может купаться в лучах славы национального спасителя Китая, роль, которую он был полон решимости сохранить. Распределение правительственных постов ДЛК для него — не уступка, а отражение его великодушия и его власти дарить подарки тем, кто его поддерживает. С умиротворением его главного вызова легитимности, по крайней мере на данный период времени, этот герой федералистской республики сможет продолжать свои планы по формированию республики так, как он считает нужным."
 GXC.lategame.660.a: "Чэнь заслуживает своего шанса вести, он это заслужил."
 GXC.lategame.660.b: "Мы можем только надеяться, что это временная мера."

 GXC.lategame.661.t: "Оппозиция раскалывается"
 GXC.lategame.661.d: "Попытка ДЛК объединить различные оппозиционные партии была напряженной с самого начала, и многие осудили бесхребетность Чжан Цзюньмая. Хотя решение пойти на компромисс могло быть оправданным, Чжан согласился на сделку в одностороннем порядке без консультаций с другими фракциями ДЛК или даже внутри своей собственной ДСП.\n\nЭто вряд ли первый раз. Лоялисты Чжана подавляют его учеников, позволяя ему вести себя автократично. В то время как некоторые защищают его как «почти святого», другие осуждают его как нереалистично утопичного и упрямо неэффективного. Многие из его сверстников в ДСП ушли давно, включая Ло Лунцзи, Пань Гуанданя и Фэй Сяотуна. Этот последний спор заставил уйти и Чжан Дунсуня и многих северян.\n\nХудшее еще впереди. Многие функционеры ДСП зависят от патронажных постов для жизни. Те немногие, что были предоставлены Чэнем, были монополизированы внутренним кругом Чжана, включая его брата Чжан Гунцюаня и лидера старой гвардии Сюй Фулиня. Более молодые члены, у которых нет связей, необходимых для получения заветной министерской должности, объединились под руководством Сунь Баогана, который напал на диктаторское руководство Чжана на недавнем партийном собрании. Он обвинил Чжана в том, что тот окружил себя «Сяожэнь» (мелкими и ограниченными людьми). Когда Фэн Цзиньбай, один из лоялистов Чжана, потребовал узнать, кого имел в виду Сунь, Сунь воскликнул «Тебя!», что вызвало перепалку, пока собрание не было прервано досрочно.\n\nНадеясь снять напряженность, Чжан ушел в отставку с поста лидера ДСП (но не ДЛК) и попытался подтолкнуть Сюй Фулиня занять его место. Это вызвало только дальнейшие расколы, так как даже некоторые из учеников Чжана выступают против этого шага. Сунь сформировал «Фракцию реформ» ДСП, и фракции Восьми постоянных комитетов и Сян Гофу возникли в оппозиции к лидерству Сюй. Наблюдатели сетуют, что Чжан просто «ни сам не организатор, ни человек, способный выбрать способных людей для организации за него»."
 GXC.lategame.661.a: "Конечно, Чжан Цзюньмай всегда прав."
 GXC.lategame.661.b: "ДСП нужно действовать быстро, чтобы устранить разногласия."

 GXC.lategame.662.t: "Сопротивление формируется"
 GXC.lategame.662.d: "Гражданская оппозиция силовой игре Чэня может раскалываться, но это не значит, что сопротивление не растет. Пока лидеры ДЛК враждуют в [UPC.Capital.GetCapitalVictoryPointName], их лейтенанты разбежались по стране в поисках убежища в районах, недосягаемых для Армии Юэ. Они нашли готовых сторонников в различных милитаристах и сильных людях, которые присоединились к Правительству Гуанчжоу благодаря их обещаниям региональной автономии, но теперь страдают от ограничений, наложенных центральным правительством.\n\nВ некотором отношении это перетягивание каната было неизбежным. Федералистское движение было создано для объединения различных свободных провинций под одним знаменем, чтобы противостоять диктату тиранических режимов Бэйяна и Гоминьдана. Оно объединило разнообразную коллекцию южных и восточных сильных людей и интеллектуалов с взаимным интересом в сохранении своих свобод в качестве третьей силы. Но по мере того, как правительство Чэнь Цзюнмина стремится реализовать свои более глубокие политические, экономические и военные реформы, напряженность вышла на поверхность. Многие милитаристы стремятся восстановить свой контроль над своими провинциями, и многие также искренне обеспокоены коррупцией и слабостью Юэ перед лицом внешних угроз.\n\nУ ДЛК есть большой список провинций на выбор. Хотя Армия Юэ сыграла значительную роль в реконструкции многих «освобожденных» провинций, быстрое расширение территории Гуанчжоу заставило их полагаться на местные силы и власть имущих. В дополнение к их традиционным оплотам на Восточном побережье, у ДСП были ранее существующие небольшие отделения на Севере, в том числе в кликах Шаньси и Фэнтянь, у ДЛК (опираясь на их происхождение из ФКДП) также есть контакты на территории бывшей Чжили. Однако наибольшую озабоченность у Армии Юэ вызывает то, что многие бастионы федералистов также стали рассадниками сопротивления ДЛК — глубоко на территории Гуанчжоу."
 GXC.lategame.662.a: "От оппозиции к сопротивлению..."
 GXC.lategame.662.b: "Нам нужно использовать более твердую руку."

 GXC.lategame.670.t: "Сопротивление Федералистов"
 GXC.lategame.670.d: "С ростом превышения исполнительных полномочий в [UPC.Capital.GetCapitalVictoryPointName] стало ясно, что обещания демократии и автономии провинций, данные [UPC.GetLeader], на самом деле могут быть очередным фасадом, как это случалось уже много раз. И это, безусловно, заметил не только [ROOT.GetLeader]. Хотя Демократическая лига Китая (ДЛК) действительно является главной оппозицией в столице, стало очевидно, что их лидеры скорее будут грызться между собой, чем реагировать на национальный кризис. И все же возможность появилась.\n\nПутешествуя в небольшом конвое на машинах без опознавательных знаков, адъютант ДЛК в сопровождении политически лояльной охраны прибыл прямо к [ROOT.GetLeader] в состоянии крайней срочности. Сначала остановленные гарнизоном, они настояли на личной встрече с губернатором [ROOT.GetLeader], при необходимости — силой. После напряженного противостояния и шквала телеграмм губернатору, посланника поспешно провели во дворец губернатора и направили в его кабинет.\n\nКогда вооруженной охране с обеих сторон дали знак покинуть комнату, посланник, получив полные гарантии, рассказал о растущем национальном движении сопротивления против [UPC.GetLeader] и его клики приспешников. Ссылаясь на их все более авторитарное правление, пресловутую коррупцию, вопиющую ложь и плохое управление, он умолял губернатора [ROOT.GetLeader] присоединиться к сопротивлению, обещая истинную автономию и народный мандат.\n\nКонечно, имея посланника прямо в логове дракона, [ROOT.GetLeader] мог бы просто схватить этого человека одним махом, заслужив похвалу Центрального правительства. Или, возможно, не давать никаких обещаний, отправить посланника восвояси и тихо наблюдать со стороны."
 GXC.lategame.670.a: "Схватить человека и его эскорт!"
 GXC.lategame.670.b: "И что, предать моего сюзерена? Разумеется."
 GXC.lategame.670.c: "Пусть грызутся между собой."

 GXC.lategame.subjectrebelintro: "С созданием Кабинета национального единства и принудительного исполнительного правительства сопротивление со стороны членов Демократической лиги Китая и тех, кто находится за пределами двух правящих коалиций, усилилось. Намереваясь сохранить провинциальную автономию, множество милитаристов, бандитов, консерваторов и даже революционеров заявили о своих намерениях присоединиться к назревающему национальному сопротивлению. Агенты ДЛК, возможно, действуя автономно, пытались подстрекать провинциалов к поддержке.\n\nОдним из самых ценных призов стала делегация [FROM.GetAdjective]. Будучи одним из наиболее автономных региональных правительств в нашей республике, они обладают определенной свободой от партийного патронажа, что делает их ценной «темной лошадкой» в национальных интригах."

 GXC.lategame.671.t: "[FROM.GetAdjectiveCap] поддерживает Центральное правительство!"
 GXC.lategame.671.d: "$GXC.lategame.subjectrebelintro$\n\nИ, похоже, жесткое Центральное правительство одержало победу. Будь то из-за личной преданности, убеждений, веры в [UPC.GetLeader] или просто оппозиции Демократической лиге Китая, они отправили телеграмму в столицу, сигнализируя, что задержали конвой, номинально принадлежащий оппозиции. Увы, этого может быть недостаточно, так как вражда в столице развивается, а союзы продолжают меняться, но пока Кабинет национального единства может вздохнуть с облегчением.\n\nХотя с задержанием одного из их кадров Демократическая лига Китая под руководством своих более независимо мыслящих членов, таких как Федерация национального спасения, пообещала мобилизовать массы, чтобы помешать [FROM.GetAdjectiveCap] помочь [UPC.GetLeader]. Такой шаг, несомненно, ввергнет нацию в хаос, но они в любом случае не проявили никакой озабоченности по этому поводу."
 GXC.lategame.671.a: "Естественно, они подчиняются нашей воле."
 GXC.lategame.671.b: "Разве они не понимают? Демократия под угрозой!"

 GXC.lategame.672.t: "[FROM.GetAdjectiveCap] поддерживает Национальное сопротивление!"
 GXC.lategame.672.d: "$GXC.lategame.subjectrebelintro$\n\nИ, похоже, просчет Центрального правительства растет в геометрической прогрессии; будь то нахождение общего языка в идеологии, отвращение к превышению полномочий президентом, ярость из-за слабости Чжан Цзюньмая или откровенное стремление укрепить свои собственные позиции, национальному сопротивлению удалось заполучить фантастический куш в виде поддержки губернатора [FROM.GetLeader]. Впрочем, истинный масштаб их поддержки сопротивления еще предстоит увидеть, поскольку президент [UPC.GetLeader] слишком хорошо знает о присущей ненадежности базы поддержки провинциальных милитаристов.\n\nОднако Е Цзюй и армия Юэ уже мобилизовали подразделения, чтобы пресечь любую попытку [FROM.GetLeader] объединиться с сопротивлением; все, что им нужно, это исполнительный указ..."
 GXC.lategame.672.a: "И так, они выбирают хаос?"
 GXC.lategame.672.b: "Покажем им, что бывает с предателями..."

 GXC.lategame.673.t: "[FROM.GetAdjectiveCap] окапывается"
 GXC.lategame.673.d: "$GXC.lategame.subjectrebelintro$\n\nЛюбопытно, но сценарий, похоже, зашел в тупик. Из [FROM.GetAdjectiveCap] доносятся лишь тихие пересуды, так как губернатор [FROM.GetLeader] не отвечает ни на телеграммы Центрального правительства, ни на какие-либо зафиксированные предложения от оппозиции. Действуя самостоятельно, он, по-видимому, перешел в режим осады, хотя в условиях разворачивающегося национального кризиса их осуждают за выбор провинциализма вместо патриотизма."
 GXC.lategame.673.a: "Как храбро, губернатор Поживем-Увидим."

 GXC.lategame.674.t: "Наши усилия отвергнуты"
 GXC.lategame.674.d: "Примечательно, что наше вмешательство в национальный кризис между Сопротивлением и Центральным правительством не достигло кворума или, по крайней мере, не дало значительных результатов. При интенсивных маневрах с обеих сторон вполне естественно, что такая низкопробная провинциальная политика не создаст даже ряби в океане национальной борьбы. Вместо этого круги на воде исчезли при ударе, но отголоски угрожают захлестнуть весь [ROOT.GetAdjectiveCap] одним махом. В любом случае, желает того [ROOT.GetLeader] или нет, грядет новая национальная борьба, и ему придется сыграть свою роль."
 GXC.lategame.674.a: "Ложь! Обман!"

 ##UPC Auth Followup Event Chain (690-719):
 GXC.lategame.690.t: "Третий тип правления"
 GXC.lategame.690.d: "На фоне бурных дебатов о характере правительства Чэня Чжан Цзюньмай опубликовал «Третий тип правления помимо демократии и диктатуры». В ней он отметил, что сторонники сильной президентской власти, такие как Цзян Тинфу и Дин Вэньцзян, отдавали приоритет необходимости воссоединения Китая, в то время как ученые вроде Ху Ши и Чжан Цзилуаня были обеспокоены «вопросом распределения политической власти». Хотя он признал, что первое должно иметь приоритет, он раскритиковал веру Цзяна в то, что Китаю не хватало необходимой Эпохи автократии, и веру Дина в то, что демократия не может эффективно использовать китайских экспертов.\n\nЧжан Цзюньмай утверждал, что Китай ближе к раннему Новому времени, чем к феодальной Европе. Как и его наставник Лян Цичао, он утверждал, что в отличие от Европы, большие размеры Китая означают, что просто революции в столице недостаточно из-за мощных отдаленных провинций. Более того, его невежественный народ еще не готов занять позицию «хозяев в решении того, что правильно, а что нет, и в решении того, кто должен прийти к власти, а кто уйти в отставку».\n\nПредложенное Чжаном правительство стремилось устранить недостатки парламентской демократии XIX века. Для него законодательная власть была слишком сильной, чтобы быть эффективной в современную эпоху, где исполнительная власть является самым важным элементом в государстве. Их роли должны быть четко разграничены — всенародно избранное национальное собрание должно разработать и проголосовать за незыблемый Пятилетний план. Последующие парламенты все равно будут созываться, но их законодательство должно придерживаться этого плана и не «трясти правительство». Кабинет министров, сформированный вне партийных линий, должен назначаться и увольняться исключительно на основе административной эффективности — после смещения они должны быть заменены другим представителем той же партии.\n\nЭта технократическая «Национальная демократия» должна воплощать дух национального единства, быть способной действовать решительно и концентрировать власть. Она объединит лучшее из демократии и диктатуры, превзойдя и то, и другое."
 GXC.lategame.690.a: "Должно быть, Чжан пытается защитить свое соглашение с Чэнем."
 GXC.lategame.690.b: "Чжан пытается заложить фундамент для чего-то гораздо большего..."

 GXC.lategame.691.t: "Борьба за управление"
 GXC.lategame.691.d: "Трансформация «Клики Хайфэн» Чэнь Цзюнмина из уездного движения в региональную силу в раннюю Эру милитаристов была десятилетним процессом, поскольку Чэнь Цзюнмин рос во влиянии и поглощал другие кантонские фракции в свои различные правительства в Гуандуне и Фуцзяни. Рост Гуандунской клики Чэнь Цзюнмина не был равномерным или устойчивым, особенно с учетом потери Чэнем власти в 1925–1926 годах и необходимости восстанавливать ее еще одно десятилетие.\n\nРасширение его правительства от Гуанчжоу до Пекина было еще более драматичным, значительно превосходящим способности его основных последователей из Хайфэна или их расширенных организаций в Армии Юэ, Партии общественных интересов и Ассоциации поддержки зерновой промышленности Гуандуна к управлению. Мелкие разногласия между иногда враждующими подчиненными Чэня стали неактуальными, так как они и даже другие кантонские фракции, такие как AACSG Чэнь Ляньбо, слились в национальном сознании как «Клика Юэ» Чэнь Цзюнмина.\n\nХотя президент Чэнь и его близкие последователи отрицали бы (или, по крайней мере, преуменьшали) существование какой-либо «Клики Юэ», настаивая на том, что их движение является национальным, выходящим за пределы провинций и федералистским, а не регионалистским — обида все равно накапливалась. Те, кто чувствует себя отстраненным сетями гуаньси клики Юэ, возмущены воспринимаемым фаворитизмом к кантонцам при назначении на важные посты в армии и бюрократии. Даже должности, предоставленные ДЛК и другим партиям в Правительстве национального единства, как правило, оказываются в руках южан, имеющих ранние связи с движением федералистов.\n\nТакже наблюдается заметный рост вооруженных движений сопротивления по всей стране, подогреваемый недовольством интеллектуалов и милитаристов. Центральная армия (в которой доминируют офицеры клики армии Юэ) все чаще направляется для подавления «бандитизма» левых повстанцев, используя драконовские меры и часто отодвигая на второй план местные правительства — создавая впечатление, что они попирают автономию провинций. С усилением слежки и цензуры полномочия Главнокомандующего выросли."
 GXC.lategame.691.a: "Исполнительная власть должна консолидироваться вокруг Клики Юэ."
 GXC.lategame.691.b: "ПРА должна работать над увеличением представительства."
 GXC.lategame.691.c: "Армия должна положить конец сопротивлению нашим директивам."

 GXC.lategame.692.t: "36 пунктов"
 GXC.lategame.692.d: "В преддверии неминуемой победы над Японией Демократическая лига Китая составила документ из 36 пунктов под названием «Предложения для заключительного этапа Войны сопротивления». Эта политическая декларация состояла из пяти частей. В первой обсуждалась война сопротивления и необходимость улучшения состояния вооруженных сил, справедливого распределения оружия, обучения, припасов и повышений по службе во всех армиях. В третьей обсуждались мир во всем мире и международные союзы. Четвертая была посвящена послевоенному восстановлению и организации экономики. Пятая и последняя часть включала пять пунктов об образовательных и культурных реформах наряду с академическими свободами.\n\nВторая часть была самой спорной. Она требовала прекращения авторитарного правления «Клики Юэ», разработки новой конституции и создания нового коалиционного правительства, включающего все партии, для добросовестной реализации демократии. В девяти других пунктах обсуждались гражданские свободы, освобождение политических заключенных, ликвидация тайной полиции, упразднение исправительно-трудовых лагерей и создание демократических институтов.\n\nВ отличие от других публикаций военного времени, этот манифест был составлен без консультаций с ПРА, в нем ничего не говорилось о роли Чэнь Цзюнмина в послевоенной республике, и он гораздо более конкретен в своих деталях. Хотя представленные идеи не являются чем-то новым или подстрекательским и не называют какую-либо конкретную группу для их фактического исполнения, намерение кажется ясным — ДЛК ожидает права действовать независимо от ПРА, как только чрезвычайная ситуация минует.\n\nВесть об этой прокламации достигла стола президента на фоне опасений новой волны цензуры. Позволить выпустить ее для широкой общественности, скорее всего, приведет к обострению напряженности накануне того, что должно стать радостным празднованием конца войны и скорого воссоединения. Подавление документа, скорее всего, толкнет интеллектуалов ДЛК в объятия радикалов, поскольку они теряют веру в перспективу мирного демократического перехода."
 GXC.lategame.692.a: "Документ вызывает большой резонанс в интеллектуальных кругах."
 GXC.lategame.692.b: "Документ так и не увидит свет."

 ## UPC Focus Tree Events (720-749):

 #UPC DSP Focus Events (720-729)
 GXC.lategame.720.t: "Чжан Цзюньмай и культурные войны"
 GXC.lategame.720.d: "В интеллектуальных сферах Чжан Цзюньмай имеет двойственную репутацию как прогрессивного демократа, так и культурного и морального консерватора. Изначально поддерживая Движение за новую культуру, по мере того как оно начало дрейфовать в сторону левого иконоборчества, Чжан начал критиковать его как с гуманистических социалистических позиций, так и с консервативной точки зрения, подчеркивая традиционную конфуцианскую философию жизни.\n\nЭто также сформировало его взгляд на вестернизацию. Чжан подробно изучал и общался с западными учеными, такими как Эдуард Бернштейн, Карл Каутский, Филипп Шейдеман, Карл Корш, Рудольф Кристоф Эйкен и Гарольд Ласки, но он также выступал против чрезмерной вестернизации и антиконфуцианства либеральных мыслителей, таких как Ху Ши и Дин Вэньцзян. Дистанцируясь от традиционалистской реакции, Чжан утверждал, что существует кризис современности как в социально-экономическом, так и в духовном плане.\n\nЧжан утверждал, что конфуцианство и современность не просто совместимы, но и синергичны. Он верил, что его дух может быть отделен от порочного институционализма и что его всеобщая доброжелательность может направлять людей. Китай должен уметь гармонизировать старое с новым, свободу с порядком и науку с культурой и этикой, чтобы все эти концепции могли процветать.\n\nДля Чжана национализм — это и прагматичное продолжение реалистической международной политики, и коллективистское стремление преобразовать народ. Он сравнивал Китай с восходящей Германией: век назад она была несостоявшимся государством, страдающим от наполеоновского вторжения. Если Китай хочет повторить их подъем к господству, ему нужна радикальная реформа в образовании, морали и национальном духе.\n\nБудущее Китая — это не модернистский тоталитаризм или реакционная автократия, а плюралистическая демократия, управляемая моральными интеллектуалами, которые могли бы сбалансировать традиционную этику с современным прогрессом. Тирания Бэйяна подорвала правовые институты, необходимые для демократии, в то время как иконоборчество Новой культуры разрушило культурные основы для нее. Новая республика должна работать, чтобы устранить ущерб."
 GXC.lategame.720.a: "Мудрые слова умеренности."
 GXC.lategame.720.b: "Пустые слова невежественного хвастуна."
 GXC.lategame.720.c: "Традиции Китая — это не просто игрушка для последователей Ляна."

 GXC.lategame.721.t: "Битва ДСП с марксизмом"
 GXC.lategame.721.d: "Приход ДСП к власти произошел за счет их революционных соперников, завершив десятилетнюю интеллектуальную вражду. Восхищение Чжан Цзюньмая немецкой социал-демократией и его изучение французской и британской революций отвратили его от марксизма. По возвращении в Китай он решительно выступил против союзов КПК и Гоминьдана с Интернационалом и принятия ими авангардизма. «Как могут те, кого описывают как любящих свободу, — риторически спрашивал он, — не поднимать массы и не давать им возможность прогрессировать вместе, а наоборот, молиться о появлении правительства героев?»\n\nВ 1920-х годах он вступил в «Спор о науке и философии жизни» с Чэнь Дусю, где последний проклял его и заявил, что «мы верим, что только объективные материальные причины могут изменить общество, могут объяснить историю и могут определить философию жизни», прежде чем бросить вызов Чжану и другим доказать любую истину за пределами науки. Чжан язвительно ответил, что Карл Маркс не смог избежать устаревшего убеждения, что социальная эволюция имеет определенные законы, которые можно применить с помощью научного метода. Маркс утверждал, что социальная эволюция контролируется экономическими факторами, но провел большую часть своей жизни, сочиняя пропаганду — полагаясь на человеческую силу для перемен. Чжан утверждал, что западноевропейские революции были вызваны в первую очередь человеческой силой, а не холодной экономикой, и продолжает считать марксистов своими идеологическими врагами.\n\nДля других в ДСП ситуация более нюансирована. Чжан Дунсунь, например, имеет амбивалентное отношение к историческому материализму, выступая за выжидательную позицию по отношению к якобы неизбежной классовой борьбе. Он утверждает, что Китай еще не превратился в индустриальное общество с четким пролетариатом и буржуазией, и отвергает идею вооруженного восстания, поскольку его возглавят не рабочие лидеры, а бандиты, солдаты и люмпен-пролетариат. Они надеются найти способ избежать классовой войны через гуманистический гильдейский социализм."
 GXC.lategame.721.a: "КПК — это мятежники, выполняющие приказы из Парижа!"
 GXC.lategame.721.b: "Они наши попутчики на пути к социализму."

 #UPC PIP Focus Events (730-739)
 GXC.lategame.730.t: "Эволюция к утопии"
 GXC.lategame.730.d: "В 1920-х годах Чэнь Цзюнмин сотрудничал с анархистским изданием «Миньсин Бао», представляя идеалистический взгляд на будущее. В нем он описывал новый мир, который эволюционировал за пределы социал-дарвинизма и освободился от коррумпированных старых институтов в пользу духовного возрождения и нового, эгалитарного общества. Этот новый мир был бы таким, где границы между государствами, нациями и даже личностями были бы стерты — напоминая традиционный китайский утопический идеал Датун (Великое единение).\n\nНесмотря на раздробленность мира, Чэнь отверг национализм. Он утверждал, что нации — это лишь временные институты, а национализм — инструмент честолюбивых людей для одурачивания своего народа и угнетения других за рубежом. Для сильных наций национализм — это оправдание агрессии, а для слабых — краткосрочный инструмент, чтобы пробудить свой народ к борьбе за выживание. Но вскоре он развращает даже слабых, делая их высокомерными и жестокими — он риторически спрашивает, кто из сегодняшних великих держав не поднялся из слабых вчера?\n\nЧэнь утверждал, что национализм нельзя использовать сдержанно. Он либо не будет эффективным, либо выйдет из-под контроля. В частности, он осуждает ницшеанский милитаризм, который, по его мнению, угрожает опустошить мир и поработить человечество. Вместо этого Чэнь утверждает, что у людей есть естественная способность к братской любви, и что любовь следует использовать не просто для любви к нации, но для любви ко всему человечеству. Он также утверждал, что Китай должен сыграть особую роль в исцелении «искалеченной» эволюции мира. Они должны реформировать человеческий разум, реформировать свою нацию и однажды привести мир к «социализму всего человечества».\n\nДесятилетия спустя такой идеализм остается неуловимым. Китай был воссоединен через значительное кровопролитие, и прилив национализма кажется неостановимым в Китае и во всем мире. Чэнь и его движение значительно изменились. Но иногда Партия общественных интересов вспоминает свои более идеалистические корни, пока Китай открывает новую страницу."
 GXC.lategame.730.a: "Мы все еще надеемся, что однажды придем к этой утопии."
 GXC.lategame.730.b: "Времена меняются, и люди тоже. Но кровь и жертвы всегда меняют мир!"

 GXC.lategame.731.t: "Гуандунская модель образования"
 GXC.lategame.731.d: "Китайская культура всегда ценила образование, но Гуандун гордится тем, что стал первой провинцией, в которой введено обязательное государственное образование для обоих полов. Его Конституция обязывает правительство предоставлять всем мальчикам и девочкам по крайней мере шесть лет бесплатного государственного образования, начиная с 7 лет.\n\nГуандун принял систему 6-3-3, которая стала стандартом по всей стране. Это означает 6 лет начальной школы, где изучают мораль, сочинение, арифметику, рукоделие, чтение, музыку, гимнастику, науку, историю, географию, а также мандаринский и английский языки. Учебная программа средней школы (3 года) охватывает мораль, китайский язык, математику, английский язык, историю, географию, науки, искусство, музыку, гимнастику, а также домоводство для девочек и ремесло для мальчиков. Наконец, старшеклассники получают 3 года образования по трем карьерным направлениям: подготовка к колледжу, домоводство или преподавание в начальной школе.\n\nГуандун исторически финансировал программы обучения за рубежом в Японии, Америке, Франции, Британии, Германии и России — включая партнерские отношения с элитными международными университетами. Дома бюджет образования Гуандуна также использовался для бюро переводов, ораторского института для подготовки публичных ораторов, институтов для бездомных, вечерних школ для рабочих и школ искусств, библиотек и музеев.\n\nПоддержание финансирования этих программ на практике всегда было проблемой и, вероятно, будет оставаться таковой. Хотя Конституция Гуандуна предписывала тратить большую часть государственного бюджета на образование и явно не использовать его на военные расходы, нужды военных и государства часто имели приоритет. И хотя интеллектуалы и реформаторы всех мастей празднуют расширенное внимание к государственному образованию, коррупция и некомпетентность часто не давали финансированию дойти до китайских студентов."
 GXC.lategame.731.a: "Первый шаг к национальной реформе."
 GXC.lategame.731.b: "У нас есть другие приоритеты, за которыми нужно следить."

 #UPC Yue Focus Events (740-749)
 GXC.lategame.740.t: "Федерализм и система Баоцзя"
 GXC.lategame.740.d: "По мере того как Гуанчжоу двигался к объединению, его армия была вынуждена управлять большими участками «освобожденных» территорий, что привело к пестрой смеси систем в разных провинциях и внутри них. Это вызвало напряженность и затруднило проведение общенациональных реформ.\n\nВ районах, где местная провинциальная администрация в целом симпатизировала новой власти, ей обычно разрешали оставаться на месте, хотя и под различной степенью надзора со стороны военных, где доминировали старые деятели армии Юэ. В районах, подозреваемых в нелояльности, местные органы власти перестраивались с нуля, при этом армия Юэ ставила местных коллаборационистов и даже прямых лоялистов на значимые руководящие посты — замыкая деревенские, уездные и даже провинциальные властные структуры на себя.\n\nОсобенно печально известны «Зоны подавления бандитизма», созданные армией. Беря пример со старых префектур и округов Мин и Цин, магистратам в этих зонах были даны широкие исполнительные полномочия за счет местных лидеров. Им было приказано поддерживать связь вверх и вниз по военной иерархии, минуя местные собрания. Военные также восстановили традиционные ополчения Баоцзя, наделив местных лидеров и чиновников (обычно дворян и их рекрутов) полномочиями организовывать вооруженные патрули против этих «бандитов».\n\nХотя президент и его офицеры хвалят это за повышение эффективности, увеличение государственных доходов и снижение накладных расходов, содействие стабильности и возможность обучения людей без вмешательства, это вызвало негативную реакцию со всех сторон. Милитаристы и регионалисты возмущены централизацией власти, которую позволили эти зоны подавления бандитизма, и сопротивляются попыткам правительственных магистратов контролировать местную администрацию.\n\nДля многих либеральных интеллектуалов эти программы являются искажением многолетних призывов к реформам местного самоуправления. Обвинения в коррупции, отсутствии подотчетности и чрезмерной силе испортили их мнение об этих зонах."
 GXC.lategame.740.a: "Наши зоны подавления бандитизма останутся на неопределенный срок."
 GXC.lategame.740.b: "Под давлением многие из этих зон тихо расформировываются."

###Section 4e (800-999): Late Game NPA Political Events

### NPA Fall of Beijing Events (800-829):
 GXC.lategame.800.t: "Марш на Пекин"
 GXC.lategame.800.d: "В Рождество 1915 года вооруженные силы, верные Республике, осудили Юань Шикая, самопровозглашенного императора Хунсянь. Потерпев крупные поражения на поле боя от коалиции сил во главе с Цай Э, Тан Цзияо, Ли Лецзюнем и Лу Жунлином, Юань отрекся от престола, но остался президентом. Короткая война длилась всю весну и лето, пока внезапная смерть Юаня не завершила боевые действия.\n\nХотя она положила конец монархии, Война в защиту республики мало что сделала для предотвращения скатывания Китая в гражданскую войну. Был созван второй Альянс национальной защиты для освобождения страны. В отличие от первой войны, они успешно прошли маршем на Север.\n\nПекин теперь наш, но с огромными участками территории под контролем Армии национальной защиты приходит значительно больше проблем. Города и деревни лежат в руинах от яростных боев, гражданские лица сообщают о разграблении их урожая, скота и имущества, а бандитизм бродит без сопротивления в регионах, где отсутствует военная власть. Кроме того, экономика [ROOT.GetNameDef], рассчитанная на использование богатств независимого Лянгуана, теперь прогибается под тяжестью контроля над бывшим национальным правительством Китая.\n\nЭто трудное время, но и динамичное. Впервые за многие годы северное и южное правительства наконец объединены под одним республиканским знаменем. Политики со всей страны прибудут в [GXC.Capital.GetCapitalVictoryPointName], чтобы обсудить предстоящие планы для новой страны. Иностранные наблюдатели из крупных стран, вероятно, также будут присутствовать, документируя событие и представляя своим странам новости о недавнем объединении Китая, пока лихорадка воссоединения захлестывает Китай."
 GXC.lategame.800.a: "Коалиция наконец-то победила."

 GXC.lategame.801.t: "Имея дело с Бэйяном"
 GXC.lategame.801.d: "Пекин пал перед коалицией милитаристов с Юга, и приливы власти значительно изменились, но есть много тех, кто не желает видеть, как остатки режима полностью канут в Лету. Поскольку до объединения еще далеко, [ROOT.GetNameDef], стремясь установить свой твердый контроль над Китаем, принялось за стабилизацию северных администраций.\n\nБудучи местом национального управления, Пекин стал домом для различных партий и политических групп в последние несколько лет. Крупнейшими партиями являются Демократическая конституционная партия (потомки движения Лян Цичао, недавно сменившие название), националистическая Партия младокитайцев, Клика «Политической науки» и очень, очень много независимых. Узурпация многих лет правления Бэйяна теперь поставила их перед необходимостью либо искать благосклонности у новой власти, либо кануть в безвестность.\n\nИз этих групп Клика «Политической науки» (Чжэнсюэси) и Общество Цзинсин ближе всего к подтверждению статус-кво. Будучи свободной ассоциацией политиков, многие из них уже имеют союзников и общие интересы со своими южными коллегами, и поэтому они естественно впишутся в новый порядок. Южные политики Чжэнсюэси уже укомплектовывают национальную бюрократию бывшими членами Северной Чжэнсюэси, в то время как [ROOT.GetNameLeader] сделал предложения членам Младокитайцев и ДКП, обещая им прибыльные должности и награды в новом национальном правительстве. Поскольку Небесный мандат снова переходит на Юг в китайской истории, новый режим стремится не слишком раскачивать лодку и приветствовать объединение, насколько это возможно бескровное."
 GXC.lategame.801.a: "Чжэнсюэси и Цзинсин — мост между Гуанчжоу и Пекином."
 GXC.lategame.801.b: "Нам не нужно делать больше минимума, чтобы приспособить Бэйян."

 GXC.lategame.802.t: "Реформы ФКДП"
 GXC.lategame.802.d: "Несмотря на тяготение к реакционной автократии или революционной партийной диктатуре среди многих китайских интеллектуалов после Синьхайской революции, было много тех, кто продолжал бороться за конституционную демократию в Китае. Многие из этих фигур собрались под эгидой Объединенной лиги национального строительства в 1929 году после уничтожения Гоминьдана и объединения Чжили.\n\nВыборы того года привели к подавляющему большинству Ассоциации гармонии, поддерживаемой Чжили. Хотя политики, связанные с Лигой нацстроительства, получили много мест, участие интеллектуалов, близких к Гоминьдану, таких как Чжан Боцзюнь и Тань Пиншань, привлекло внимание к квазилегальному движению. Когда социалистические и левые восстания потрясли Китай в 1932 году, Чжили запретили Лигу, загнав ее в подполье. Так родилась Федерация китайских демократических партий (ФКДП), исключившая социалистических членов Лиги и продолжающая лоббировать перемены.\n\nТеперь, когда НПА контролирует Пекин, у Федерации есть шанс снова заявить о себе. Возглавляемый Демократической конституционной партией, Кликой «Политической науки» и Демократической социалистической партией, этот свободный альянс также привлекает более мелкие группы, такие как Федерация национального спасения, Форум демократии и науки, Китайское общество профессионального образования, Ассоциация сельского восстановления и Китайская национальная ассоциация демократического строительства. Будучи слабыми и дезорганизованными, они привлекают многих жаждущих перемен."
 GXC.lategame.802.a: "Конечно, ФКДП будет позволено действовать открыто."
 GXC.lategame.802.b: "ФКДП должна знать свое место в новом порядке."

 GXC.lategame.803.t: "Отодвигая соперников"
 GXC.lategame.803.d: "Лу Юйгуана называли по-разному. Бандитом, сыном иностранной шлюхи, неопытным генералом. Но он сделал то, чего не смогли многие — наконец объединил Север и Юг. Молодой маршал стал де-факто верховным военным лидером всего Китая. Возглавляя мощные вооруженные силы Гуанси и Гуандуна, фракция «Молодая Гуанси» была вынуждена пойти на компромиссы с регионалистскими блоками в Шаогуане и Гуанчжоу, но теперь укрепила свой контроль над оппозицией.\n\nА с победителями приходит добыча, и ножи снова обнажены, поскольку возникла борьба за власть между лидерами Лянгуана. Лу надеется использовать свое новообретенное положение, чтобы оттеснить продажного иностранного наймита Чэнь Ляньбо и гнусного бандита Шэнь Хунъина, тем самым навсегда поставив Гуандун под свой контроль.\n\nТриумвират Молодой Гуанси предложил назначить Линь Ху губернатором Гуандуна, ссылаясь на его предыдущий опыт работы на кантонской политической сцене в 1920-х годах. Он использует военную мощь Гуанси и свои связи в Клике «Политической науки», чтобы сокрушить влияние как Шэня, так и Чэня в регионе, твердо поставив территорию под контроль Молодой Гуанси. Однако есть опасения, что это может дестабилизировать регион, но Гуандун может быть слишком ценным, чтобы его терять."
 GXC.lategame.803.a: "Приказать Линь Ху делать то, что он должен."
 GXC.lategame.803.b: "Нет смысла тревожить улей."

### NPA Contender Followup Events (830-859):
 GXC.lategame.830.t: "Управление провинциями"
 GXC.lategame.830.d: "Впервые со времен Войны в защиту республики силы Альянса национальной защиты вышли за пределы своих родных провинций и продвинулись в широкие полосы китайской страны. По мере того как войска маршируют через горящие деревни и хутора и мимо разоренных войной полей сражений, перед вооруженными силами НПА встает тяжелая задача местного управления.\n\nСистема Баоцзя в настоящее время используется как средство администрирования нового правления военного правительства на своих территориях. Древняя практика, разработанная во времена династии Северная Сун Ван Аньши, система менялась на протяжении своей истории в императорском Китае, но, тем не менее, предусматривает небольшие общественные организации, сгруппированные по «бао», которые обычно управляют примерно десятью семьями.\n\nНовое военное правительство внедрило современные реформы в существующую систему на основе трехступенчатой системы. Первый шаг требует проведения переписи всех домохозяйств в новых и существующих регионах. Второй шаг заключается в составлении списков всех подходящих молодых людей. Последний шаг заключается в том, что все учтенные молодые люди соответствующей военной пригодности должны быть перевезены в учебную школу, где они будут служить три года в армии и находиться в резерве в течение следующих шести лет. Эта система надеется поддерживать физическую форму китайского народа, одновременно управляя местными провинциями, которые могут быть далеки от контроля центрального правительства.\n\nХотя эта реформа, безусловно, популярна среди военных правительств, некоторые советники [ROOT.GetLeader] вместо этого предложили, что местные лидеры лучше подходят для управления баоцзя. Они предложили расширить местную бюрократию, включив административные структуры в состав уездных магистратов и создав новые структуры для управления небольшими деревнями и городами под руководством старост. Затем будет внедрена система административной инспекции, соединяющая столицу провинции с этими местными административными единицами."
 GXC.lategame.830.a: "Военные знают лучше."
 GXC.lategame.830.b: "Народ знает, что лучше."

 GXC.lategame.831.t: "Кантонская опера"
 GXC.lategame.831.d: "Как одна из основных категорий китайской оперы, кантонская опера (Юэ) является одним из самых престижных и ведущих культурных институтов на кантонском языке, популярным в Гуандуне, Гуанси, Гонконге, Макао и других китайских общинах в Юго-Восточной Азии. Существуют споры о том, когда возникла опера Юэ, но общепринято, что она пришла с Севера и медленно мигрировала в южную провинцию Гуандун в период поздней Южной Сун. Поскольку монголы и другие северные варварские племена разрушили культурное превосходство северных дворов, Сун развивалась и адаптировалась к новой культурной столице Китая в Ханчжоу.\n\nСовременная опера Юэ происходит из Шанхая, так как в 1840-х годах большое количество гуандунских бизнесменов приехало в Шанхай за возможностями. Поскольку эти бизнесмены объединялись в ассоциации, развитие кантонской оперы в Шанхае значительно продвинулось, обретя популярность среди китайской элиты города.\n\nКомментаторы и поклонники гордятся тем, что опера Юэ отличается своим языком и уникальными визуальными элементами. Макияж менее преувеличен, чем на севере, а костюмы богато украшены, но отражают южные стили. Стиль пения оперы Юэ также более лиричен и мелодичен; с гаоху, еху и перкуссией, доминирующими в инструментальном треке в отличие от северных цзинху и юэцинь.\n\nСуществует два типа кантонских пьес: «Моу» (У, которые посвящены войне, с персонажами-генералами или воинами) и «Мань» (Вэнь, буквально «высокообразованные», где делается упор на поэзию, культуру и элегантность). Например, женские персонажи носят «водяные рукава» в постановках «Мань», подчеркивая свою элегантность и нежность, а также прилагая значительные усилия для создания отличительных выражений лица и жестов, чтобы выразить свои эмоции. Все эти элементы способствуют уникальной региональной культурной идентичности, которая усиливает кантонское доминирование в китайской культуре на Юге в противовес Северу."
 GXC.lategame.831.a: "Захватывающе!"

### NPA Satellite Events (900-929):
 GXC.lategame.900.t: "Начало японо-китайской войны"
 GXC.lategame.900.d.intro: "Интенсивные бои вспыхнули вдоль китайско-японской границы. Среди китайцев война также стала братоубийственной, так как некоторые разделились во мнениях, может ли партнерство и союз с Японией оказаться плодотворным против европейского империализма на континенте, или же они просто очередные империалисты, вступившие в схватку. Но для многих по всей стране это также стало моментом национального единства, когда мелкие разногласия отложены в сторону, старые враги теперь друзья, поскольку настал самый отчаянный час Китая.\n\nПо мере того как бушует война, в Гуандуне резко возросла напряженность между различными фракциями. Некоторые считают, что Лу Юйгуан слишком нелоялен к центральному правительству в то время, когда единство должно быть превыше всего, и что фракция Молодой Гуанси использует хаос войны, чтобы обеспечить себе гораздо более желательное положение по всей стране. Но гораздо более продвинутое положение Японии в конфликте благодаря их превосходящим воздушным, морским и сухопутным силам также привело националистических ястребов войны в правительстве к поддержке дела национального единства."
 GXC.lategame.900.d.chen: "$GXC.lategame.900.d.intro$\n\nЧэнь Ляньбо, мысля как истинный бизнесмен и ища возможности там, где они появляются, тихо обратился к Центральному правительству за поддержкой переворота. Будь то негласная военная поддержка или политическое покровительство, Чэнь считает, что война предоставляет возможность сместить чрезмерно амбициозного Молодого маршала и избавиться от борьбы за власть, которая долгое время терзала регион."
 GXC.lategame.900.d.shen: "$GXC.lategame.900.d.intro$\n\nШэнь Хунъин и его армия Шэнь уже давно присматриваются к уязвимому положению Гуандуна. И теперь, с возможностью всей жизни, Шэнь может наконец получить поддержку Центрального правительства для свержения Лу Юйгуана. Пока бушует война, появляется возможность запросить поддержку у столицы, чтобы сместить нелояльного Лу и обеспечить Шэню полное лидерство над провинцией."
 GXC.lategame.900.a: "Заговор зреет на Востоке."
 GXC.lategame.900.tt: "§YШансы на то, что [GXC.overlord.GetNameDefCap] поддержит переворот, зависят от популярности наших партий.§!"

 GXC.lategame.901.t: "Телеграмма из Гуанчжоу"
 GXC.lategame.901.d.intro: "Лянгуан всегда был трудной для управления провинцией: между землевладельческой знатью Гуандуна, бандитами Гуанси и революционным городом Гуанчжоу регион всегда был очагом крамолы. Две провинции-близнеца Гуанси и Гуандун (Лянгуан означает «два Гуана») номинально управляются наместником Лу Юйгуаном и его фракцией Молодой Гуанси, но их власть держится на прямом контроле над провинцией Гуанси, военизированной «Спартой» Юга.\n\nЧтобы сохранить господство над более богатым и густонаселенным Гуандуном, Лу и его отец Лу Жунлин до него держали провинцию разделенной между фракцией армии Шэнь на севере, базирующейся в Шаогуане, и Торговым правительством Гуанчжоу на юге. Если бы провинция объединилась под властью одного из этих милитаристов, Гуандун в конечном итоге стал бы доминировать над Гуанси и контролировать Жемчужную реку."
 GXC.lategame.901.d.chen: "$GXC.lategame.901.d.intro$\n\nЧэнь Ляньбо из Гуанчжоу прислал срочную телеграмму с просьбой о поддержке Центрального правительства. Мэр и его коллеги-торговцы долгое время создавали себе репутацию в Южном Китае как богатые бизнесмены со связями в Гонконге и, без сомнения, будут стремиться заручиться поддержкой нашего режима среди элиты и знати. Поскольку их мысли в основном заняты прибылью и успехом, мы не сомневаемся, что Чэнь предлагает гораздо более лояльного партнера, чем Лу. С другой стороны, учитывая его обширные связи с внешними силами, возможно, безопаснее придерживаться статус-кво и надеяться на переговоры с Лу с позиции силы позже."
 GXC.lategame.901.d.shen: "$GXC.lategame.901.d.intro$\n\nШэнь Хунъин и армия Шэнь прислали срочную телеграмму с просьбой о поддержке Центрального правительства. Шэнь давно возмущался доминированием семьи Лу и ищет способ укрепить свои позиции. Имея связи с немецкими советниками и Южными Чжили, они могут стать сильным союзником против менее надежного Лу. С другой стороны, учитывая его обширные связи с внешними силами, возможно, безопаснее придерживаться статус-кво и надеяться на переговоры с Лу с позиции силы позже."
 GXC.lategame.901.a: "Давайте предложим нашу поддержку Гуандуну."
 GXC.lategame.901.b: "Мы будем хранить молчание по этому вопросу."

 GXC.lategame.902.t: "Переворот в Гуандуне"
 GXC.lategame.902.d.chen: "Баланс сил в Гуандуне менялся уже некоторое время. Пока власть Шэнь Хунъина слабела в Гуандуне, Чэнь Ляньбо и его Торговое правительство ждали идеальной возможности для удара. Он наращивал свои силы и консолидировал свою базу власти, зная, что любое движение против Шаогуаня также повлечет за собой вмешательство Лу Юйгуана в Наньнине. Всплеск националистического гнева и масштабные потрясения японо-китайской войны наконец дали Чэню возможность, которую он искал.\n\nНанеся сильный удар по плохо обученным и деморализованным ополченцам Шэня, силы Гуанчжоу захватили Шаогуань в ходе стремительной кампании за контроль над Гуандуном. Вскоре после этого Провинциальная ассамблея Гуандуна объявила Чэня губернатором, когда он представил свои доводы в пользу единства перед лицом национального кризиса. Они также отвергли господство Гуанси над Гуандуном, бросив прямой вызов гегемонии Лу Юйгуана.\n\nФракция Молодой Гуанси мобилизует свои силы для решающей схватки. Они должны ударить быстро, прежде чем силы Гуандуна смогут консолидироваться под одним знаменем. В противном случае контроль более крупной провинции над торговлей по Жемчужной реке в конечном итоге позволит им поглотить своего соседа, не имеющего выхода к морю. Каков бы ни был исход, ожидается, что он будет дорогостоящим — добавив к существующим общенациональным разрушениям, вызванным японо-китайской войной."
 GXC.lategame.902.d.shen: "Баланс сил в Гуандуне менялся уже некоторое время. Пока власть Чэнь Ляньбо слабела в Гуандуне, Шэнь Хунъин и его армия ждали идеальной возможности для удара. Он наращивал свои силы и консолидировал свою базу власти, зная, что любое движение против Гуанчжоу также повлечет за собой вмешательство Лу Юйгуана в Наньнине. Всплеск националистического гнева и масштабные потрясения японо-китайской войны наконец дали Шэню возможность, которую он искал.\n\nНанеся сильный удар по плохо обученным и деморализованным ополченцам Чэня, силы Шаогуаня захватили Гуанчжоу в ходе стремительной кампании за контроль над Гуандуном. Вскоре после этого Провинциальная ассамблея Гуандуна подтвердила губернаторство Шэня, когда он представил свои доводы в пользу единства перед лицом национального кризиса. Они также отвергли господство Гуанси над Гуандуном, бросив прямой вызов гегемонии Лу Юйгуана.\n\nФракция Молодой Гуанси мобилизует свои силы для решающей схватки. Они должны ударить быстро, прежде чем силы Гуандуна смогут консолидироваться под одним знаменем. В противном случае контроль более крупной провинции над торговлей по Жемчужной реке в конечном итоге позволит им поглотить своего соседа, не имеющего выхода к морю. Каков бы ни был исход, ожидается, что он будет дорогостоящим — добавив к существующим общенациональным разрушениям, вызванным японо-китайской войной."
 GXC.lategame.902.a: "Переворот успешен, контратака Гуанси отбита."
 GXC.lategame.902.b: "Переворот проваливается после решительной контратаки Гуанси."

 GXC.lategame.903.t: "Переворот Чэнь Ляньбо"
 GXC.lategame.903.d: "Срочные новости из Гуанчжоу: силы, верные Чэнь Ляньбо, видному лидеру торговцев и мэру Гуанчжоу, воспользовались хаосом начала Второй японо-китайской войны, чтобы уничтожить гуандунского милитариста Шэнь Хунъина в Шаогуане. Этим стремительным ходом Чэнь смог провозгласить себя губернатором Гуандуна и сбросить ярмо господства Гуанси.\n\nПопытка лидера Гуанси Лу Юйгуана вмешаться провалилась, и с этим сокрушительным поражением Гуандун подтвердил свое господство над своим более бедным, но более военизированным соседом. Чэнь Ляньбо и его торговцы теперь имеют гегемонию над регионом Лянгуан и в прошлом обещали свою поддержку [GXC.overlord.GetLeader], но как долго они будут оставаться лояльными, еще предстоит увидеть."
 GXC.lategame.903.a: "Торговцы теперь правят Жемчужной рекой..."

 GXC.lategame.904.t: "Переворот Шэнь Хунъина"
 GXC.lategame.904.d: "Срочные новости из Гуанчжоу: силы, верные Шэнь Хунъину, бандиту, ставшему милитаристом и губернатором Гуандуна, воспользовались хаосом начала Второй японо-китайской войны, чтобы подчинить мятежный город Гуанчжоу. Этим стремительным ходом Шэнь смог устранить своих соперников в провинции и сбросить ярмо господства Гуанси.\n\nПопытка лидера Гуанси Лу Юйгуана вмешаться провалилась, и с этим сокрушительным поражением Гуандун подтвердил свое господство над своим более бедным, но более военизированным соседом. Шэнь Хунъин и его люди теперь имеют гегемонию над регионом Лянгуан и в прошлом обещали свою поддержку [GXC.overlord.GetLeader], но как долго они будут оставаться лояльными, еще предстоит увидеть."
 GXC.lategame.904.a: "Бандит теперь контролирует Жемчужную реку..."

 GXC.lategame.905.t: "Лу Юйгуан пережил переворот"
 GXC.lategame.905.d: "Срочные новости из Гуанчжоу: соперничающие диктаторы в провинции Гуандун ожесточенно боролись за контроль, пользуясь хаосом начала Второй японо-китайской войны, чтобы свести старые счеты во имя национального единства. Однако в конце концов ни один из них не одержал верх после вмешательства сил из соседнего Гуанси.\n\nЛу Юйгуан, наместник Лянгуана, смог подавить это потенциальное восстание и восстановить господство Гуанси над их более богатыми, но менее военизированными соседями. Он сохранил гегемонию, которую его отец Лу Жунлин построил над регионом Лянгуан, и продолжает обещать поддержку [GXC.overlord.GetLeader], но как долго они будут оставаться лояльными, еще предстоит увидеть."
 GXC.lategame.905.a: "Но есть ли у него амбиции отца?"

 GXC.lategame.910.t: "Центральное правительство рушится"
 GXC.lategame.910.d: "Центральное правительство пало, ввергнув Лянгуан в смятение. Юго-восточные провинции всегда были довольно автономными образованиями, но даже они с трудом переносят коллапс, поскольку многие другие сдались нашим наступающим врагам. Большая часть руководства старого центрального правительства бежала за границу, не желая быть во власти «мелких милитаристов», а [ROOT.GetLeader], со своей стороны, предпринял шаги по захвату контроля в качестве исполняющего обязанности президента.\n\nОн сталкивается с трудной задачей переломить ситуацию, поскольку его генералы пытаются интегрировать другие провинциальные подразделения, а многие деморализованные солдаты растворяются в сельской местности, оставляя «призрачные» бригады и дивизии. Экономика также погрузилась в хаос, так же как и растут сомнения в нашей способности выплачивать долги.\n\nПоскольку ситуация быстро становится ужасающей, необходимы решительные действия. Лу Юйгуан и хунта Молодой Гуанси попытались утвердить свой контроль, но их слабая хватка над Гуандуном может стать их гибелью. Как Шэнь Хунъин в Шаогуане, так и Чэнь Ляньбо в Гуанчжоу попытались бросить вызов лидерству Наньнина, и в этом хаосе Лянгуан, похоже, находится на грани распада."
 GXC.lategame.910.a: "На яростной конференции Лу подтверждает свое господство."
 GXC.lategame.910.b: "Шэнь Хунъин силой пробивается к власти среди хаоса."
 GXC.lategame.910.c: "Тот, кто контролирует Гуанчжоу, контролирует юг, а Чэнь Ляньбо контролирует Гуанчжоу."

 GXC.lategame.911.t: "Неожиданный поворот"
 GXC.lategame.911.d: "В результате внезапного поворота судьбы, похоже, милитаристам Лянгуана удалось сформировать собственное правительство. Большинство не ожидало, что это произойдет именно так, но падение старого центрального правительства дало им возможность, и некогда периферийный осколок сумел выкроить для себя роль.\n\nОднако это развитие событий не обошлось без последствий. Большая политическая власть влечет за собой большие ожидания, и новое правительство теперь несет ответственность за выплату долгов, восстановление разрушенных районов и реорганизацию перенапряженных вооруженных сил. Кроме того, идет значительная борьба за власть. Лу Юйгуан и хунта Молодой Гуанси попытались утвердить свой контроль, но их слабая хватка над Гуандуном может стать их гибелью. Как Шэнь Хунъин в Шаогуане, так и Чэнь Ляньбо в Гуанчжоу попытались бросить вызов лидерству Наньнина, и в этом хаосе Лянгуан, похоже, находится на грани распада."
 GXC.lategame.911.a: "На яростной конференции Лу подтверждает свое господство."
 GXC.lategame.911.b: "Шэнь Хунъин силой пробивается к власти среди хаоса."
 GXC.lategame.911.c: "Тот, кто контролирует Гуанчжоу, контролирует юг, а Чэнь Ляньбо контролирует Гуанчжоу."

### NPA Satellite Followup Events (930-959):
 GXC.lategame.930.t: "Лю Чжэньхуань захватывает Гуанси"
 GXC.lategame.930.d: "После катастрофической попытки Лу Юйгуана силой вернуть Гуандун в подчинение побежденный маршал столкнулся с дальнейшим унижением, когда его разбитые подразделения поплелись обратно в Гуанси. Дискредитированный дома этими политическими событиями, в плохих отношениях с центральным правительством и с Гуанси, которому теперь грозит принудительное подчинение Гуандуну, его власть испарилась. Он больше не наместник Лянгуана, а его попытка принять титул губернатора Гуанси встретила сопротивление со стороны Ма Цзи. Другие триумвиры затем отвернулись от них обоих, ввергнув провинцию в затяжной кризис.\n\nОднако в конце концов победителем вышел генерал Лю Чжэньхуань. Фактически сосланный в Гуандун после того, как он дезертировал во время Второй Юэ-Гуйской войны, его амбиции править Гуанси никогда не умирали. Теперь, при поддержке Гуандуна, он и его люди смогли выйти на вершину борьбы за власть в провинции, поскольку различные кланы Гуанси ищут защитника от кантонского господства.\n\nЕго восхождение положило конец почти годичному противостоянию между Гуандуном и Гуанси, снизив напряженность между ними. Это также отражает более широкий подъем Клики «Политической науки» в Лянгуане, поскольку этот проницательный и гибкий альянс использует свое влияние в масштабах страны и связи в Гуандуне для получения власти. Все еще номинально являясь союзниками Чэнь Ляньбо и его Торгового правительства Гуанчжоу, они, похоже, стремительно движутся к столкновению."
 GXC.lategame.930.a: "Они стали соперниками!"
 GXC.lategame.930.b: "Они принесли мир в Гуанси."

 GXC.lategame.931.t: "Торговая альтернатива"
 GXC.lategame.931.d: "За последние два года Гуандун стал местом захватывающего политического эксперимента в Китае: местом общепровинциального «Торгового правительства». Торговый корпус Кантона был основан как своего рода «альтернатива» правлению милитаристов, и, несмотря на название, членство в нем никогда не ограничивалось торговцами — гражданские лица, владельцы малого бизнеса, шахтеры, дворяне, ремесленники и их семьи могли стать членами. В дополнение к своим ополчениям у него также было собственное издание — «Вестник торговцев Гуандуна».\n\nВ плане управления он, как правило, принимал ту же правовую базу, что и существующее провинциальное правительство Гуандуна, существовавшее до полного захвата власти Гоминьданом в 1920-х годах. Даже когда торговцы не были у власти, у Торгового корпуса был сенат, который избирал своего президента. Была даже определенная степень политической агитации — говорят, что Чэнь Ляньбо отправлял подчиненных во все 10 отделений, чтобы заручиться поддержкой своей кандидатуры. Но это не значит, что правительство особенно демократично — говорят, что Чэнь Ляньбо общается исключительно с представителями высшего класса Корпуса, полагаясь на более молодого и энергичного Дэн Цзеши, который общается со средним и низшим классами, а также с представителями крестьян.\n\nЧэнь — фигура противоречивая: с одной стороны, его описывают как очень стильного и щедрого, а с другой — как агрессивного, корыстолюбивого и коварного. Его соперники обвиняют его в том, что он относится к Торговому корпусу, а затем и к AACSG просто как к еще одному коммерческому предприятию, дружа с другими лидерами торговцев, такими как Дэн Цзеши и Ли Суншао (председатель Торговой палаты Гуандуна), только ради их денег и влияния. Но у губернатора амбиции гораздо большие, чем просто управление мелким рэкетом — еще в 1925 году он пытался убедить Сунь Ятсена уйти в отставку и разрешить создание Торгового правительства Гуандуна. Наконец получив желаемое, ходят слухи, что он изучает возможность более широкого массового восстания торговцев по всему Китаю."
 GXC.lategame.931.a: "Только торговцы могут по-настоящему снова объединить Китай."
 GXC.lategame.931.b: "Чэнь Ляньбо стремится обеспечить хорошее управление Гуандуном."

 GXC.lategame.940.t: "Восхождение Чжу Цзяхуа"
 GXC.lategame.940.d: "После драматической победы Шэнь Хунъина над Гуанчжоу и Наньнином празднования были недолгими. Быстро поняв, что мало кто будет уважать «Бандитское правительство», маршал Шэнь быстро предпринял шаги по укреплению своей легитимности, назначив ведущего просветителя Чжу Цзяхуа фактически главой гражданского правительства. Беспартийный, с опытом управления и дипломатии и, по-видимому, без особых личных амбиций, этот выбор казался естественным.\n\nШэнь, возможно, получил больше, чем рассчитывал. Чжу оказался гораздо более проницательным политическим деятелем, чем многие ожидали, легко ориентируясь в политической, бюрократической и даже международной сферах. Его связи с Обществом Цзинсин, хотя и ограниченные, имеют вес среди интеллектуалов, бизнесменов и даже военных благодаря годам китайско-германского сотрудничества и желанию многих консервативных китайских лидеров провести модернизацию и объединение Китая в стиле Бисмарка. Чжу выкроил для себя значительную сферу влияния, вопрос лишь в том, как он ее использует."
 GXC.lategame.940.a: "Чжу Цзяхуа формирует собственную клику под носом у маршала Шэня."
 GXC.lategame.940.b: "Чжу Цзяхуа использует свои способности для продвижения интересов правительства."

 GXC.lategame.941.t: "Лянгуан оживает"
 GXC.lategame.941.d: "Фракция армии Шэнь значительно выросла в силе с момента объединения Лянгуана под их властью. Хотя оппозиция сохраняется в обеих провинциях, мастерство Шэнь Хунъина в управлении кланами Гуанси и союз с немецкими поставщиками оружия, такими как Ганс Кляйн, дали ему мощную, хорошо оснащенную армию. Его контроль над Гуандуном и прибыльной торговлей по Жемчужной реке обеспечил ему деньги, необходимые для финансирования этой армии и раздачи милостей своим лоялистам.\n\nИмея столько богатства и власти, о чем еще может просить маршал Шэнь? Для человека, выросшего бедным бандитом, никого бы не удивило, если бы он решил удовлетвориться сейчас, на пике своей власти. Но, как показала Эра милитаристов, амбиции порождают новые амбиции, и стоять на месте значит отставать. Некоторые задаются вопросом, почувствует ли он когда-нибудь себя по-настоящему удовлетворенным — или даже в безопасности — пока не останется никого, кто мог бы отнять это у него."
 GXC.lategame.941.a: "Шэнь нацелился на следующую мишень: Президентство."
 GXC.lategame.941.b: "Все, что мы можем пожелать, можно найти в Лянгуане."

 GXC.lategame.950.t: "Маршал и его люди"
 GXC.lategame.950.d: "Лу Юйгуан победил всех, кто бросил бы ему вызов в борьбе за власть в ходе японо-китайской войны, и укрепил свое господство над Лянгуаном, но на этом его проблемы не заканчиваются. Некогда просто номинальный глава триумвирата Молодой Гуанси, его власть и влияние значительно выросли за эти годы, и он выходит на сцену не просто как сын Лу Жунлина и поспешно подготовленный наследник, но как законный преемник наследия своего отца.\n\nОн находится в точке, где может делать больше, чем просто быть посредником в переменах между различными региональными милитаристами, обладая необходимым уважением, чтобы активно направлять их — по крайней мере, в пределах двух провинций. Некоторые в его ближайшем окружении посоветовали ему воспользоваться моментом, чтобы подтолкнуть к более традиционному, гражданскому правлению под современным правительством. Но это может не сулить ничего хорошего в долгосрочной перспективе для маршала Лу — в конце концов, когда другие милитаристы уйдут, сколько времени пройдет, прежде чем он станет следующим?"
 GXC.lategame.950.a: "Маршал Лу — лидер новой эпохи."
 GXC.lategame.950.b: "Если губы исчезнут, зубам станет холодно."

 GXC.lategame.951.t: "Амбиции Молодого маршала"
 GXC.lategame.951.d: "Более десяти лет назад Лу Жунлин изгнал Лун Цзигуана и стал хозяином как Гуанси, так и Гуандуна, и его власть над Лянгуаном позволила ему вести переговоры с центральным правительством на равных. Теперь победа Лу Юйгуана над Шаогуанем и Гуанчжоу привлекла к нему внимание всей страны, особенно со стороны тех, кто отчаянно ищет альтернативу часто тираническому правлению Центрального правительства.\n\nДействительно, неоспоримый контроль над Лянгуаном и ценной торговой сетью Гуандуна, а также возможность командовать могущественными армиями кланов Гуанси ставит маршала Лу в сильное положение. Гуанчжоу находится в политическом очаге, склонном к восстаниям против статус-кво, и является мощным символом легитимности, если представится возможность. Молодой маршал, возможно, договорился об урегулировании с [GXC.Overlord.Capital.GetCapitalVictoryPointName], но он не обязан соблюдать его..."
 GXC.lategame.951.a: "Наш момент славы скоро наступит..."
 GXC.lategame.951.b: "...но как часть большего целого."

### NPA Civil War Events (960-989):
 GXC.lategame.960.t: "Вспыхнула гражданская война"
 GXC.lategame.960.d: "Раздоры и политический хаос в Китае возобновились. [ROOT.GetLeader] и верные ему силы в Лянгуане осудили Центральное правительство и провозгласили новое движение, независимое от Пекина. Заявляя, что они являются истинными наследниками Синьхайской революции и представляют законную волю китайского народа, между Национальным правительством и [ROOT.GetNameDef] уже начались стычки.\n\nВосстание [ROOT.GetLeader], безусловно, несет риск полной неудачи. Много раз в китайской истории повстанцы возглавляли обреченные восстания, которые были жестоко подавлены и разгромлены. Но это также далеко не первый раз, когда Лянгуан восстает против власти центрального правительства, и дух «Пьемонтизма», который вел так много выскочек-движений, несомненно, последует за силами повстанцев. Судьба благоволит смелым, и в этом случае, в этот момент слабости национального правительства, Лянгуан взял свою судьбу в свои руки."
 GXC.lategame.960.a: "У нас нет иного выбора, кроме как добиваться полной победы!"

 GXC.lategame.970.t: "Лянгуан возвращает себе лидерство"
 GXC.lategame.970.d: "Снова Гуанчжоу становится столицей конкурирующего правительства, стремящегося объединить Китай под своим знаменем. Переговоры и призывы к перемирию провалились, и, снова разорвав свои последние договоренности с центральным правительством, [ROOT.GetLeader] объявил о создании нового Альянса национальной защиты под своим командованием. Он стремится сплотить оставшихся южных милитаристов, чтобы свергнуть север и освободить нацию под этим туманным националистическим движением.\n\nГуанчжоу, конечно, не новичок в такого рода делах, принимая у себя первоначальное Правительство национальной защиты и череду других революционных правительств. Это наследие придало ему определенную легитимность, помимо его существующих преимуществ в качестве оперативной базы — его расположение на Жемчужной реке оказалось решающим в обеспечении помощи, вооружения и сторонников для грядущей бури."
 GXC.lategame.970.a: "Пусть это правительство окажется удачливее предыдущих."

 GXC.lategame.971.t: "[GXC.GetLeader] претендует на лидерство"
 GXC.lategame.971.d: "Осуждая тиранию и коррупцию нынешнего китайского политического порядка, [GXC.GetLeader] объявил о новой революции в Гуанчжоу. Это знаменует собой отделение Гуанси и Гуандуна от контроля центрального правительства в очередной раз, демонстрируя, что истинное объединение между Севером и Югом остается неуловимым.\n\n[GXC.GetLeader] собрал солдат, интеллектуалов и милитаристов под новым Альянсом национальной защиты, вспоминая коалицию, которая принудила Юань Шикая к отречению. Учитывая позднее время этого развития событий, многие задаются вопросом, не упустили ли они свой лучший шанс на победу. Время покажет, продержится ли их режим или же это очередное восстание, задушенное на страницах бурной истории Китая."
 GXC.lategame.971.a: "Они спасут нацию!"
 GXC.lategame.971.b: "Стервятник, пытающийся остаться последним."

###- Phase V Events -###

###Section 5a (000-099): End Game Auth RKMT Events

 ##Shared Events (000-019)
 GXC.endgame.001.t: "Иллюзия рушится"
 GXC.endgame.001.d: "Наконец молот ударил по наковальне, и Гоминьдан исполнил свой революционный долг. Пройдя через раздоры, борьбу и невзгоды, милитаристы и империалисты склонились перед истинными объединителями и героями китайского народа. Однако, хотя на бумаге они правят безраздельно, контроль партийного государства над разрозненными провинциями остается в лучшем случае номинальным; оно не способно по-настоящему утвердить власть и влияние, пока в городских центрах продолжается анархия, а по сельской местности разгуливают бандиты.\n\nПолный паралич, вызванный недавними политическими событиями, лишь усугубил неэффективность правительства за пределами центральных территорий, а большинство милитаристов только еще больше осмелели, препятствуя нашим усилиям по налаживанию управления над подвластными им народами. Даже внутри самого правительственного аппарата инакомыслие спровоцировало неподчинение как среди бюрократов, так и среди солдат Национально-революционной армии, поскольку ни те, ни другие не удовлетворены направлением Национальной революции.\n\nВновь столкнувшись с вызовами со всех сторон, триумф [ROOT.GetLeader] оказался недолговечным: он должен действовать быстро, чтобы подавить все волнения и не дать расколу в партии и нации разрушить революционное движение."
 GXC.endgame.001.a: "Внутренние распри выходят на передний план..."

 GXC.endgame.002.t: "Великое разочарование"
 GXC.endgame.002.d: "Несмотря на то, что Гоминьдан является прежде всего революционной авангардной партией, и несмотря на реорганизацию и жесткие авторитарные меры, применяемые Премьером, многие в стране продолжали надеяться, что Гоминьдан полностью пропустит период опеки и осуществит полный переход к либеральной демократии, как только нация будет объединена. Однако это было бы оскорблением памяти и идеалов покойного доктора Сунь Ятсена, а также привело бы к тому, что многие внутри партии восприняли бы как коррумпированный фарс, имитирующий процедуры Бэйянской республики.\n\nКрайне недовольные сохранением авторитарной руки над нацией, «Данвай» (внепартийная оппозиция), наряду с различными либеральными интеллектуалами с западным образованием, студентами и даже разрозненными членами самого Гоминьдана — а именно более умеренно настроенными членами клики Сишань и фракции Реконструкции — слились в какофонию разочарованных голосов, заглушающую любые попытки [ROOT.GetRulingParty] помочь и облегчить страдания людей.\n\nЧтобы восстановить порядок, оживить нацию и вернуть доверие народа к правительству, Премьер должен продемонстрировать, что период опеки — это всего лишь процесс, необходимый для того, чтобы впоследствии могла развиться процветающая демократия."
 GXC.endgame.002.a: "Наш народ в смятении..."

 GXC.endgame.003.t: "Революционный общественный договор"
 GXC.endgame.003.d: "В то время как часть людей выражает несогласие и открыто относится к правительству с подозрением, обидой и осторожностью, большинство продолжает относиться к режиму с амбивалентностью, безразличием или даже поддержкой в некоторых случаях, ибо все еще сильна вера и надежда на твердое руководство [ROOT.GetLeader]. Однако такое положение дел сохраняется только в рамках невероятно строгого негласного общественного договора между правительством и народом: они добровольно подчинятся и пожертвуют своими политическими, экономическими и социальными свободами, если только Гоминьдан сможет добиться успеха и выполнить обещания Национальной революции, улучшив их убогий уровень жизни каким-либо значимым и очевидным образом.\n\nТакое условие возлагает тяжелое бремя на правительство, ибо они должны прислушиваться к требованиям народа и поддерживать быстрый темп выполнения чрезвычайно амбициозных предложений, представленных в Плане национальной реконструкции, если они хотят сохранить и установленную ими систему, и благосклонное отношение народа. Несмотря ни на что, революционная партия должна начинать с самого дна, ибо она унаследовала мантию разрушенной экономической системы, бегущих инвесторов и капиталов, опустошенных городов и инфраструктуры, соседствующих с огромными долгами, которые грозят окончательно обрушить экономику гиперинфляцией."
 GXC.endgame.003.a: "Впереди у нас долгий путь..."

 GXC.endgame.004.t: "Судьба контрреволюционеров"
 GXC.endgame.004.d.1: "Национально-революционная армия (НРА) теперь представляет собой левиафана по сравнению с тем, какой она была еще несколько лет назад. От шумных революционных героев, идущих на Пекин ради блага нации, до разрозненных групп напуганных повстанцев, ведущих партизанские кампании в Гуйчжоу и Фуцзяни, и множества изгнанников за границей в Париже и Москве, до возвращения звания лучших, что может предложить китайский солдат, истинной гордости нации — НРА видела все это и выдержала еще больше. Однако, несмотря на великую доблесть и достигнутые успехи, по-прежнему существуют планы демобилизации определенных армейских групп теперь, когда над китайской нацией вновь воцарился мир.\n\nОднако на столе Ху Ханьминь появились неотложные вопросы: после его успешного сохранения влияния как истинного наследника доктора Суня, НРА раскололась из-за смещения ключевых генералов, связанных с Новой кликой Гуанси. Будучи истинным экспертом в управлении рычагами и противовесами, Премьер мог бы перехватить инициативу и поманить «пряником», протянув оливковую ветвь менее ангажированным членам, связанным с Новой Гуанси, позволив им вернуться на свои прежние должности в НРА; даже клика Чэнь Миншу всплыла на поверхность в надежде снова поступить на службу. Хотя Премьер также может наконец проявить твердость, продвигая новое поколение послушных офицеров, преданных прежде всего Национальной революции, и покончить с вероломными кадрами Ли Цзунжэня раз и навсегда." #Ху Ханьминь
 GXC.endgame.004.d.2: "Национально-революционная армия (НРА) теперь представляет собой левиафана по сравнению с тем, какой она была еще несколько лет назад. От шумных революционных героев, идущих на Пекин ради блага нации, до разрозненных групп напуганных повстанцев, ведущих партизанские кампании в Гуйчжоу и Фуцзяни, и множества изгнанников за границей в Париже и Москве, до возвращения звания лучших, что может предложить китайский солдат, истинной гордости нации — НРА видела все это и выдержала еще больше. Однако, несмотря на великую доблесть и достигнутые успехи, по-прежнему существуют планы демобилизации определенных армейских групп теперь, когда над китайской нацией вновь воцарился мир.\n\nОднако для Ли наступили более неотложные времена: после его гамбита с захватом трона Гоминьдана НРА раскололась из-за смещения ключевых генералов, связанных со слабовольными кликами Сишань, Реконструкции и Старейшин Ху Ханьминя. Несмотря на враждебность, Ли — военный человек до мозга костей, уважающий общую борьбу и узы, возникшие во время службы со своими сверстниками в НРА, и, возможно, он протянет руку тем, кто готов отказаться от политических дрязг ради истинного товарищества и долга перед нацией. Впрочем, это также прекрасная возможность для Новой клики Гуанси наконец-то воцариться по-настоящему, поскольку клика может просто продвигать офицеров Гуанси, соответствующих их интересам, в награду за то, что они стали спасителями нации." #Ли Цзунжэнь
 GXC.endgame.004.a: "Их тактические умы все еще полезны."
 GXC.endgame.004.b: "Наши узы скреплены кровью."
 GXC.endgame.004.c: "Продвигать новое поколение лидеров."

 GXC.endgame.005.t: "Разбитые остатки"
 GXC.endgame.005.d.1: "В политических последствиях попыток Ли Цзунжэня осадить и свергнуть Премьера наших чиновников поразил политический и бюрократический хаос. Многие, имевшие связи с Ли и его кадрами, были смещены со своих должностей или арестованы, наряду с диссидентами из клики Сишань и фракции Реконструкции; под перекрестный огонь попали даже левые фигуры, открыто выступавшие против действий правительства.\n\nОднако некоторые оставшиеся члены партии опасаются, что принятый подход был слишком жестким, даже в свете угрозы свержения, и предложили [ROOT.GetLeader], что приглашение некоторых полезных соперников из других клик — таких как Новая Гуанси и левые — могло бы принести правительству больше пользы, чем вреда. Будучи упрямым и стойким, Премьер мог бы оценить навыки этих людей выше любых сохраняющихся политических разногласий, хотя всегда остается вариант отбросить любые надежды на проявление милосердия к людям, которые поддержали бы провал Национальной революции. Ибо нужны ли китайскому народу еще больше назойливых бюрократов?" #Ху Ханьминь
 GXC.endgame.005.d.2: "После великого триумфа Новой клики Гуанси, сокрушившей всех противников своего влияния и воссевшей на трон Национальной революции, стало очевидно, что правительство больше не будет функционировать так эффективно, как раньше. Многие квалифицированные деятели были либо арестованы и смещены, либо ушли в отставку в знак протеста против премьерства Ли Цзунжэня, что вызвало невероятное напряжение во всех органах бюрократии, которая с трудом справляется даже с повседневными функциями.\n\nНесмотря на шум, вызванный падением Ху Ханьминя, ходят слухи, что некоторые фигуры, когда-то связанные с ним, были бы готовы вернуться на свои должности в правительстве, если бы руководство Новой Гуанси предоставило им амнистию. Игнорируя политические разногласия, это представляет собой заманчивое предложение для Ли, поскольку люди из клики Сишань, фракции Реконструкции и даже Новой клики Гуандун обладают бесценными навыками, которые крайне необходимы в эти тяжелые времена. Тем не менее, это также возможность еще больше укрепить и обеспечить господство Новой клики Гуанси превыше всего, ибо они переживали и гораздо более серьезные испытания." #Ли Цзунжэнь
 GXC.endgame.005.a: "Во имя межпартийного единства."
 GXC.endgame.005.b: "Оливковая ветвь демократам."
 GXC.endgame.005.c: "Консолидировать власть для себя."

 GXC.endgame.006.t: "Китайский Пьемонт"
 GXC.endgame.006.d.1: "Будучи ревущим горнилом, в котором родилось революционное движение, Гуандун всегда считал себя самой главной провинцией в республиканском движении. Обладая впечатляющей экономикой для дальнейшего подкрепления своих высоких амбиций, провинция вызывала у международных наблюдателей сравнения с Сардинией-Пьемонтом во время войн за объединение Италии, являясь главным драйвером воссоединения китайской нации и ее народа.\n\nВыходец из этой провинции, Ху Ханьминь, очень гордится исключительным статусом Гуандуна, однако возникает ироничная дилемма: Премьер презирает тех, кто бросает вызов его правлению, и, естественно, не решается поддерживать предательские идеи, такие как автономия для других провинций, но в то же время неприкрытые проявления фаворитизма по отношению к Гуандуну не являются чем-то необычным, и провинция получает значительные льготы. Это отношение дошло даже до правительственных назначений, где большинство должностей занято уроженцами Гуандуна.\n\nКак говорится, победителю достается добыча, и никто не станет спорить, что Гуандун заслужил особое отношение, однако некоторые голоса в правительстве призывают Премьера уменьшить явный приоритет его родной провинции, а другие даже предложили идею распространения текущих привилегий на другие провинции под эгидой Гоминьдана." #Ху Ханьминь
 GXC.endgame.006.d.2: "Предоставив множество отличных солдат для революционного дела, Гуанси всегда считала себя поистине исключительной и критически важной провинцией в революционном движении Гоминьдана. Будучи первой провинцией, обратившейся к Гоминьдану накануне Северного похода, воинственный характер народа Гуанси оказался жизненно важным для побед Национально-революционной армии.\n\nЯрый защитник автономии, культуры и образа жизни провинции, Ли Цзунжэнь очень гордится исключительным статусом Гуанси, однако возникла ироничная дилемма: Новая клика Гуанси яростно выступает против любых вызовов ее суровому правлению и категорически отказывается расширять автономию для других провинций, однако их родная провинция Гуанси пользуется вопиющим фаворитизмом, привилегиями, а уроженцы Гуанси получают приоритет при назначении на правительственные должности.\n\nХотя, как говорится, победителю достается добыча, и никто в нашем правительстве не осмелится усомниться, что Гуанси заслужила свои привилегии кровью. Тем не менее, ходят слухи, что Ли Цзунжэнь мог бы умерить неприкрытые проявления фаворитизма или даже распространить такое отношение на другие провинции, чтобы сгладить любую будущую напряженность." #Ли Цзунжэнь
 GXC.endgame.006.a: "Образцовая провинция заслужила свои привилегии."
 GXC.endgame.006.b: "Нам следует сократить фаворитизм."
 GXC.endgame.006.c: "Все провинции заслуживают некоторого самоуправления."

 GXC.endgame.007.t: "Исключительный человек в необычайные времена"
 GXC.endgame.007.d: "Если и был когда-либо человек, заслуживший честь быть истинным преемником доктора Сунь Ятсена, никто не осмелился бы предложить кого-либо другого, кроме уважаемого Премьера Ху Ханьминя. Истинный ортодоксальный последователь Трех народных принципов, он выдержал бесчисленные испытания, возглавляя славную Национальную революцию, и твердо намерен следить за тем, чтобы этапы, намеченные его предшественниками, соблюдались в строгом порядке.\n\nПоистине исключительная фигура на международной политической арене, Ху Ханьминь навсегда вписал свое имя в анналы истории как один из лучших и выдающихся государственных деятелей, когда-либо выходивших на мировую сцену. Великолепное сочетание чрезвычайно умного, прилежного и трудолюбивого, принципиального, упрямого человека, сохраняющего при этом громкую народную поддержку. Способный протянуть руку через проход, нацеливаясь на множество вмешивающихся фракций одновременно, он действительно служит клеем, скрепляющим правительство. Все эти достижения способствовали росту и развитию обширного культа личности среди населения, восхваляющего усилия Премьера как второго Сунь Ятсена.\n\nКроме того, Ху Ханьминь поклялся отстаивать интересы как народа, так и страны, следуя строго изложенному шестилетнему плану, важнейшими компонентами которого являются столь необходимая земельная реформа, усилия по созданию местной инфраструктуры для местного самоуправления и реформа образования для всего населения. Ловко управляя своей великой коалицией, Ху Ханьминь получил прекрасную возможность сосредоточиться на одном из этих компонентов для начала."
 GXC.endgame.007.a: "Крестьяне долго ждали своего спасителя."
 GXC.endgame.007.b: "Мы должны посеять семена демократии на низовом уровне."
 GXC.endgame.007.c: "Как мы можем учить людей без школ?"

 ##EDC Events (020-039)

 GXC.endgame.020.t: "Ху Ханьминь и заря новой эры"
 GXC.endgame.020.d: "Среди хаоса недавней борьбы внутри Китая Ху Ханьминь сияет все ярче как маяк надежды, отстаивая ортодоксальную интерпретацию Трех народных принципов Отца нации; он долгое время мечтал о будущем для китайского народа, свободном от раздоров Эры милитаристов. Однако непоколебимая приверженность Ху Трем принципам отличает его от его менее принципиальных коллег в Гоминьдане — а именно Ван Цзинвэя и покойного Чан Кайши, — поскольку он категорически против любых сделок с внешними силами вне партии, полагаясь в основном на свое умелое политическое маневрирование и внутрипартийные союзы.\n\nСтремясь к реализации Трех принципов на каждом отдельном этапе революции, Премьер усилил фазы военного правления, за которыми вскоре должна последовать опека, так как без этой строгой процедуры храбрые революционные солдаты Национально-революционной армии могли бы просто заменить старых милитаристов. Считая, что партия до его руководства пренебрегала интересами народа, не внедряя этап опеки полностью, Премьер намерен буквально следовать Плану национальной реконструкции доктора Суня, чтобы создать китайскую нацию, которую предвидел доктор Сунь.\n\nПри переходе от Опеки к Конституционализму Ху Ханьминь придерживается концепции, что провинция готова к демократии, как только все ее уезды достигнут местного самоуправления, как предписано местными и национальными усилиями. Как только более половины провинций в стране достигнут Конституционного этапа, будет созвано национальное собрание для обсуждения и провозглашения новой национальной конституции, обеспечивающей прочную здоровую демократическую основу для нации."
 GXC.endgame.020.a: "Перед нами лежит золотой путь."

 GXC.endgame.021.t: "Революция и земля"
 GXC.endgame.021.d: "Вопрос земельной реформы, всегда актуальный со времен зловредной Великой Цин, постоянно горел в умах интеллектуалов не только Гоминьдана, но и всех политических движений нации в целом. Глубоко укоренившийся в своем одновременно социалистическом прошлом и приверженности благосостоянию народа, Ху Ханьминь выдвинул свой радикальный план земельной реформы для обсуждения в Центральном исполнительном комитете.\n\nЦентральным элементом этого плана является концепция, согласно которой простые фермеры-арендаторы Китая должны быть защищены от обычных злоупотреблений и эксплуатации со стороны землевладельцев; предусматривается, что в случае засухи, наводнения или других подобных стихийных бедствий их арендная плата будет соответственно снижена или даже полностью отменена. Двигаясь дальше, план Премьера предлагает запретить землевладельцам выселять своих арендаторов, за исключением случаев самостоятельной обработки земли. Для этого крестьянству должна помочь «сила государства», и ни в коем случае оно не должно быть «ввергнуто в беспорядок».\n\nНачав с землеустройства для инициализации вышеупомянутой политики выравнивания прав на землю, государство начнет создавать сельскохозяйственные банки, чтобы сделать доступными для крестьян низкопроцентные кредиты. Затем государство создаст кооперативы для содействия продаже продукции, тем самым помогая крестьянам избежать манипуляций рынком со стороны эксплуататоров-торговцев, и увеличить производство в долгосрочной перспективе.\n\nОднако радикальный, обширный и, возможно, бессердечный в глазах дворянства подход Ху вызвал значительную негативную реакцию со стороны консервативных членов партии. Хотя они и увековечивают укоренившееся неравенство благодаря своему контролю над землей, дворяне (шэньши), тем не менее, были одними из самых стойких сторонников Гоминьдана. Вместо этого члены клики Сишань и фракции Реконструкции предложили более постепенное сокращение власти дворян и землевладельцев, цепляясь за нить желания Ху предотвратить беспорядки в сельской местности."
 GXC.endgame.021.a: "Компромиссное соглашение убеждает Премьера."
 GXC.endgame.021.b: "Вперед, к упразднению помещиков!"

 GXC.endgame.022.t: "Китайская философия и материалистическая линза"
 GXC.endgame.022.d: "Литературные труды уважаемого Премьера, всегда блестящего и плодовитого писателя, могли бы заполнить библиотеку обильными сочинениями величайшего политического философа Китая. Для внимательного исследователя особый интерес представляет работа Ху Ханьминя «Исследование истории китайской философии с материалистической точки зрения», написанная в 1919 году, которая распространялась в интеллектуальных и партийных кругах как интересный взгляд на образ мыслей их национального лидера.\n\nТеоретизируя, что обстоятельства, в которых возникала школа мысли, демонстрировали внутреннюю связь между социально-экономическими условиями и ростом школ мысли в обществе, Ху начинает с эпохи Сражающихся царств, отмечая огромный масштаб хаоса. В результате хаос стимулировал интеллектуалов философствовать и размышлять о решениях. Когда безопасность и стабильность вернулись в династии Цинь и Хань, общество оставалось в основном мирным, что привело к атрофии интеллектуальной мысли.\n\nРетроспективно применяя свою теорию к более поздним школам мысли в династиях Хань, Сун и Тан, Ху постулировал, что даосизм, конфуцианство и буддизм возникали во времена сильного общественного стресса, причем религии теряли актуальность, как только они не могли предложить решения моральных потрясений.\n\nОн полагал, что Китай переживает социально-экономический сдвиг, не слишком отличающийся от периода Сражающихся царств, и с его искренней верой в важность социальных и экономических факторов в развитии интеллектуализма, он возлагал большие надежды на второй расцвет школ китайской философии при его жизни.\n\nИнтересное освещение ума начинающего революционера с великолепным будущим, произведение не лишено критики. Премьер многократно пускается в пространные монологи об истории, и он часто отклоняется от исторического материалистического мышления, создавая дискурс о китайской философии, лишь слегка прикрытый историческим материализмом."
 GXC.endgame.022.a: "Великолепный ум у руля."
 GXC.endgame.022.b: "Может быть, великий мыслитель, но плохой писатель."

 #Adapted from 五四運動紀念會演講詞 - Speech at the Nov 4th Movement Commemoration.
 GXC.endgame.023.t: "С мая по ноябрь"
 GXC.endgame.023.d: "В октябре 1919 года просочившиеся документы раскрыли тайные сделки правительства Бэйяна, обменивающего Шаньдун на грабительские кредиты Антанты. Это спровоцировало беспорядки 4 ноября, которые наряду с протестами 30 мая 1925 года стали символом непоколебимой борьбы китайского народа против империализма.\n\nХу Ханьминь почтил память обоих событий сегодня как патриотических движений, содержащих «дух национальной независимости, который изгоняет иностранное угнетение во все времена». Этот дух позволил Мин изгнать монголов, повстанцам Синьхая изгнать маньчжуров, а гнев студентов спас независимость Китая. Именно этот дух Сунь Ятсен вписал как свой первый Принцип: Миньцзу (Национализм).\n\nДоктор Сунь сказал: «национальная революция — это эффективное средство спасти эпоху», которая будет продолжаться «до того дня и момента, когда не будет угнетения между нациями». Однако, хотя протесты носили национально-революционный характер, они «были беспорядочными и неорганизованными, с временными действиями, но без фундаментальной защиты». Сунь понимал, что фундаментальная революция должна основываться на «национальном характере», который невозможно стереть.\n\nМаркс этого не понимал, и Второй Интернационал потерпел неудачу, потому что «несмотря на принадлежность к одному классу, они принадлежали к разным нациям, и угнетение между ними еще не было устранено, поэтому они все еще боролись друг с другом». Ху призвал молодежь не верить, что «банально обсуждать национальную революцию и новаторски говорить о классовой революции», потому что последнее неестественно и ненужно.\n\nОн предупреждает о Красном империализме Интернационала, который стремится пожертвовать миллионами китайцев для достижения своих немыслимых целей. Поэтому Ху заключает: «почему китайская молодежь должна ничего не иметь против того, чтобы жертвовать своей страной, нацией и революционным делом, чтобы польстить другим?... Если мы не разовьем дух национальной независимости, как мы можем чего-либо достичь? Естественно, тогда мы должны завершить национальную революцию под руководством Трех принципов!»"
 GXC.endgame.023.a: "Дух национальной независимости течет через партию!"
 GXC.endgame.023.b: "Мы всегда будем на страже против империализма во всех формах!"

 GXC.endgame.024.t: "Армия Национальной революции"
 GXC.endgame.024.d: "Поскольку Премьер Ху Ханьминь на протяжении всей своей карьеры был решительно гражданским лидером, положение Национально-революционной армии (НРА) по отношению к нему всегда было шатким. Без успехов НРА во Втором Северном походе революция могла бы быть подавлена во второй раз за столетие, но, возможно, величайшая угроза революционному движению в его нынешнем виде теперь — это дубина, которой оно размахивает.\n\nВсегда способный национальный лидер, Премьер призвал к признанию огромной значимости восстановления партийного авторитета и объединяющей сплоченности среди НРА не только в военных кампаниях последних лет, но и в текущей работе Национальной революции и даже в тяжелой ответственности, ложащейся на новое националистическое правительство. Если Национальная революция должна преуспеть, должна быть жесткая революционная армия и верный и доблестный Главнокомандующий. Чтобы позволить революционной армии прорвать вражеские линии, должна быть также и сильная партия.\n\nВ речи, произнесенной во время военного парада в [ROOT.Capital.GetCapitalVictoryPointName], Премьер оставил свою аудиторию слушателей с таким заявлением: «Вооруженные товарищи, вы все должны верить, что вы — революционеры. Вы все должны укреплять свой революционный характер и быть непреодолимой могучей великой силой. С такой силой ваше революционное руководство может быть укреплено. Национальная революция требует могучей великой силы. Ради Национальной революции мы должны вместе с революционной общественностью из разных провинций сформировать единый дух и силу. Стремясь к этому, мы должны поддерживать революционного лидера и консолидировать революционный фронт!»"
 GXC.endgame.024.a: "НРА и революционный народ, объединяйтесь!"

 GXC.endgame.025.t: "День труда и Китайская революция"
 GXC.endgame.025.d: "Для Ху Ханьминя и его клики Старейшин смысл Дня труда заключается в великом поминовении, ибо именно тогда рабочие и трудящиеся Соединенных Штатов доблестно боролись за установление системы восьмичасового рабочего дня. Примечательным в глазах Председателя является тот факт, что такое празднование никогда не проводилось в [ROOT.Capital.GetCapitalVictoryPointName], из-за того, что в прошлом город находился под железной хваткой милитаристов, поэтому никакие празднования не могли состояться.\n\nОднако сам факт того, что оно может состояться сегодня, разве не благодаря защите Национально-революционной армии? Защита со стороны НРА означает защиту со стороны Гоминьдана, благодаря которой каждый гражданин должен усвоить, что Гоминьдан защищает своих рабочих и стремится к их благополучию наряду с их свободой.\n\nВ более широком масштабе Премьер выдвинул идею о том, что Национальная революция — это единый фронт всех граждан, и в этом едином фронте рабочие должны быть авангардом, воздерживаясь от создания хаоса друг с другом, чтобы не возвысился конкретный класс, что приведет к угнетению других классов. Отныне рабочие могут по-дружески пожать руку Гоминьдану, собравшись вместе как истинные друзья, сотрудничая друг с другом ради подлинного освобождения.\n\nКонцепция Ху Ханьминя о прямом сотрудничестве партии с рабочими служит контрастом позиции клики Сишань, которая утверждает, что рабочие должны полностью избегать трудовых споров, и что истинный смысл Дня труда заключается в том, чтобы продемонстрировать сотрудничество между капиталистами и рабочими в общем деле повышения производительности, а не революционного освобождения.\n\nПоскольку официальная позиция партии разделена между двумя взглядами, безмолвно вспыхнули дебаты о том, является ли радикальная позиция Премьера о сотрудничестве рабочих, граничащая с социалистической мыслью, более предпочтительной по сравнению со стабильностью, обеспечиваемой тщательным и стабильным подходом Сишань."
 GXC.endgame.025.a: "Гоминьдан — истинная партия рабочих!"
 GXC.endgame.025.b: "Объедините и капиталиста, и рабочего в идеальной гармонии."

 GXC.endgame.026.t: "Демократический централизм и консенсус"
 GXC.endgame.026.d: "Непреклонный в следовании Саньминьизму и Трем принципам в ортодоксальной манере, Ху Ханьминь отверг все попытки более демократически настроенных элементов Гоминьдана настоять на принятии временной конституции в данный момент. Однако он не является человеком чистого бескомпромиссного упрямства и принял предложения нового органического закона, в котором будет реализована прототипная версия запланированного правительства пяти юаней. Таким образом, правительство начало формальное создание различных правительственных юаней, с чем пришло обсуждение сопутствующих политических назначений.\n\nПоскольку Ху Ханьминь и его союзники доминируют в Исполнительном юане, Сунь Фо и фракции Реконструкции была предоставлена свобода действий в Законодательном юане, в то время как Цзю Чжэну и клике Сишань был передан Судебный юань, а Контрольный и Экзаменационный юани были разделены между различными северянами и другими более мелкими кликами.\n\nПоскольку различные фракции вцепились в свой богатый урожай, Ху Ханьминю остается только назначить Председателя Исполнительного юаня, сродни премьер-министру в западном стиле. Хотя никто не стал бы винить его за назначение лояльного последователя, такого как его протеже Ли Вэньфань, Ху Ханьминь мог бы протянуть руку «через проход», чтобы убедить людей в своих добрых намерениях.\n\nИз двух вариантов внешнего выбора первый — близкий друг и заместитель Сунь Фо, Лян Ханьцао. Проницательный законодатель и интеллектуал, он был отличным вторым лицом во фракции Реконструкции, отражая молодое, новое революционное движение будущего. Наш второй вариант — вместо этого направить приглашение загадочному и великодушному Цзоу Лу, хорошо известному большинству как в клике Старейшин, так и в Сишань. Человек многих талантов, Цзоу Лу имеет связи с большинством в Гоминьдане и является ветераном партии с момента ее основания, и даже развил большую личную дружбу с Премьером на почве их взаимного обожания писательства."
 GXC.endgame.026.a: "Ли Вэньфань — естественный выбор."
 GXC.endgame.026.b: "Лян Ханьцао — свежее лицо."
 GXC.endgame.026.c: "У Цзоу Лу есть ценный опыт."

 GXC.endgame.027.t: "Вспоминая Двойную пятерку"
 GXC.endgame.027.d: "5 мая президент Ху произнес речь в честь своего далекого, но всегда актуального предшественника. В 1923 году Сунь Ятсен принял титул президента Республики, в момент, который, по утверждению Ху, столь же значим, как и день Двойной десятки. Ху Ханьминь вспоминает предшествующие события, включая свою первую инаугурацию в первый день Нового 1912 года в Нанкине. В изложении Ху, Сунь ушел в отставку вскоре после этого, потому что с объединением Китая Сунь почувствовал, что его работа завершена, и как «образцовый государственный служащий Республики» не искал дальнейшей власти. Вместо этого он стремился продолжать обучать членов своей партии Трем принципам и консолидировать фундамент революции.\n\nНо прошло немного времени, прежде чем Республика развалилась, разрушенная коварными генералами. Поэтому, изгнав гуансийских милитаристов, он составил грандиозный план Северного похода. Он вернул себе пост президента Республики, тогда ограниченной Лянгуаном, не из-за права, а из-за огромного чувства ответственности за национальную революцию как лидер, наставник и жертва. «Итак, — спрашивает Ху, — как наши сердца могли остаться нетронутыми?»\n\nХу продолжил свою речь с личной ноткой, с любовью описывая смирение и открытый ум Суня, но отмечает, что когда дело доходило до национальных дел, он придерживался духа «если я не сделаю это, кто еще?». С этим упорным духом Гоминьдан должен продолжать свою опеку. Он должен принадлежать народу и нести его волю, но также вести народ и показывать ему путь в великой миссии спасения страны, потому что «если Гоминьдан не сделает этого, кто еще?» Таким образом, партия должна двигаться вперед с неукротимым духом «если я не сделаю это, кто еще?», уверенная, что военное управление — это только начало, политическая опека — только переход, а конституционное правление — цель. Хотя он закончил напоминаниями о воле Вечного Премьера к Трем принципам и Мировой революции, превосходящей Маркса, истинный смысл притчи ясен:"
 #Based on Speech at the Commemoration of the Double Fifth Festival (雙五節紀念會演講詞)
 GXC.endgame.027.a: "Если Ху Ханьминь не сделает этого, кто тогда?" #舍胡漢民其誰？

 GXC.endgame.028.t: "Вспоминая Вечного Премьера"
 GXC.endgame.028.d: "На панихиде по Сунь Ятсену Ху Ханьминь произнес речь. Хотя он начал с обсуждения мировой политики и концессий в Китае, вскоре он перешел к более насущным вопросам, описывающим будущее, которое он видит для партийного государства.\n\nОбсуждая объединение, Ху заметил, что «наши военные усилия теперь должны принять двойную политику: мы должны раз и навсегда устранить разрушительные синдикалистские элементы и остатки милитаристов в Китае». Тем не менее, он предупреждает, что истинная победа невозможна без фундаментальных решений его насущных экономических и социальных проблем. С этой целью он заявляет: «наша революционная армия должна созидать, разрушая, в отличие от социалистов, которые созидают только после полного разрушения, и мы особенно должны избегать ожидания, пока вся нация будет разрушена, чтобы начать восстановление. Когда мы завершаем разрушение в одном месте, восстановительные работы там должны начинаться немедленно. Только так может быть подлинная революция».\n\nПродолжая сравнение партии с армией, он отмечает, что обе должны быть осторожными в работе, последовательными в организации и интенсивными в обучении. Точно так же, как армии охотно перенимают превосходное оружие своих врагов, партия должна быть готова принять тактику других революционеров. Другие могут злоупотреблять своей строгой организацией и непостоянными методами, чтобы разрушить общество, но если Гоминьдан примет аналогичную дисциплину в отношении реконструкции, нация будет спасена. Параллель можно найти в современной науке, которая используется империалистами для убийства, а гуманистами — для спасения жизней, потому что, хотя наука одна и та же и не имеет врожденной вины, злоупотребление ею делает человека врагом человечества.\n\nТаким образом, партия должна быть готова принять дисциплину, вдохновленную храбрыми солдатами, которые обретают силу через послушание своим генералам. «Что касается нас, — заключает он, — мы должны управлять страной посредством Партии, а не личности. Мы требуем свободы для Партии, а не для личности. Поэтому мы должны подчиняться нашей партии и соблюдать последние желания Премьера!»"
 #Based on Speech at the Prime Minister's Memorial Week on 16 May at the National Government (五月十六日在國民政府舉行總理紀念週演講詞)
 GXC.endgame.028.a: "Как и Отец нации до него, Ху сохраняет душу партии!"

 GXC.endgame.029.t: "Конец шести лет необходимой опеки?"
 GXC.endgame.029.d: "Это был долгий и трудный путь для Национальной революции Гоминьдана. Путь, полный препятствий, извилистых проходов и внезапных поворотов как влево, так и вправо. Совершенно справедливо, что этот путь был нелегким. Доктор Сунь, конечно, знал это, ибо превращение нации с населением более 400 миллионов человек в современную нацию является, пожалуй, самой непреодолимой задачей. Гоминьдан — это революционная партия, построенная на организации и доктрине, которой неуклонно руководит самый великолепный и загадочный государственный деятель Китая.\n\nШесть лет были графиком, которому нужно было следовать. Шесть лет должен был длиться этап Опеки, как предписано доктором Сунем. И это были шесть лет постоянного руководства и борьбы за модернизацию и прогресс китайской нации. Конечно, естественные тенденции властвования начали проявляться рано. Члены партии начали рассматривать партию не более как средство доминирования над народом, злоупотребления принципом партийного руководства для эксплуатации масс ради собственной выгоды, для защиты своих активов. Однако такие настроения в значительной степени утихли, были в значительной степени отбиты Человеком Принципа Китая.\n\nПри всех недостатках самоуспокоенности, которые могут преследовать любую правящую партию, возглавляющую революционное движение, они еще не смогли ухватиться за Партию Ху Ханьминя. И все же время для праздных размышлений остается дефицитным и мимолетным для Председателя, ибо даже будучи столь стойким и прилежным, даже Ху Ханьминь не смог бы преодолеть возвышающуюся тень Шестилетней опеки. Ибо под эгидой Ху Ханьминя, несомненно, были сделаны большие шаги прогресса, но придет время, когда Революционера не станет. И что тогда? Кто продолжит желания Вечного Премьера? Выбор преемника был непростым, Ху Ханьминь понимал это слишком хорошо. И все же это самый насущный вопрос, на который нужно ответить, к которому должен быть готов сам Ху."
 GXC.endgame.029.a: "Кто сможет сравниться с величайшим государственным деятелем Китая?"

 ##NGD Events (040-059)

 GXC.endgame.040.t: "Контртечение Гуандуна"
 GXC.endgame.040.d: "Премьер Ху Ханьминь недавно выступил с речью, получившей высокую оценку на последнем Национальном конгрессе Гоминьдана; самом первом конгрессе после того, как коалиция Гуандуна укрепила свое господство и пали так называемые «псевдореволюционные враги». Примечательно, что гораздо более жестко, чем в речах Ху недавнего прошлого, Премьер осудил все концепции врагов партии, все намеки на непрекращающийся милитаризм и кумовство, и заверил собравшуюся аудиторию, что Национальная революция, Национальная революция Отца нации, вернулась на правильный путь.\n\nС помощью генерала Чэнь Цзитана и коалиции Гуандуна Ху Ханьминь устранил препятствия, мешавшие его революционному делу и реализации принципов покойного Премьера, в первую очередь реакционную клику Ли Цзунжэня. Используя свои связи и ресурсы в своем Королевстве, Небесный Король Юга позаботился о том, чтобы ни один чиновник открыто не ставил под сомнение его лидерство или лидерство Ху Ханьминя; с помощью его армии все потенциальные вооруженные угрозы были нейтрализованы еще до того, как был сделан хоть один выстрел. Это позволило Ху продолжать свое дело без опасений вопреки всему, а генерал Чэнь укрепил свое место как в своей родной провинции, так и на национальной арене. Некоторые даже начали описывать это как рождение Гуандунской диархии.\n\nКогда речь Премьера завершилась под гром аплодисментов, и все участники встали, хлопая, он помахал руками всем своим товарищам в зале, заверяя их в своей решимости реализовать принципы доктора Суня, с уверенным выражением лица и огнем в глазах. Повернувшись к Чэнь Цзитану, Ху слегка кивнул своему самому большому союзнику; в ответ, держа голову прямо и выпрямив спину, генерал Чэнь торжественно встал и отдал честь Главнокомандующему Национальной революции и НРА. Хотя ходят слухи, что у двух великих людей из Гуандуна есть разногласия по различным вопросам, теперь они, несомненно, едины как одно целое."
 GXC.endgame.040.a: "Национальная революция возвращается на правильный путь."

 GXC.endgame.041.t: "Продолжающееся кооперативное движение"
 GXC.endgame.041.d: "Как подчеркивает Председатель Ху, преемник идеалов доктора Суня, реализация доктрины Миньшэн (Народное благосостояние) столь же важна, как и двух других доктрин, поскольку «они переплетены и отвечают нуждам Китая». Для этого Националистическое правительство поощряет сельские кооперативные общества, где крестьяне, которые в большинстве случаев находятся в долгах или просто обеднели, могут получать государственные кредиты для улучшения своей жизни, приобретения производственных товаров и увеличения производства после уплаты 2 юаней за долю для вступления.\n\nХу Ханьминь, ссылаясь на свой опыт в России, считает, что если правительство хочет искренне улучшить жизнь людей и тем самым реализовать доктрину Миньшэн, такие кооперативы должны быть расширены, и на них должно быть выделено больше ресурсов. Для него единственно правильным направлением является расширение этой программы и включение всего крестьянского населения сразу, чтобы китайский народ мог наслаждаться лучшей материальной жизнью и стимулировать развитие экономики за счет повышения спроса и предложения.\n\nЧэнь Цзитан, обладающий более практическим складом ума, менее прогрессивен в этом вопросе. Хотя он также является сторонником кооперативов и признает пользу, которую они принесли, Чэнь предлагает, что прежде чем активизировать какие-либо усилия, Националистическое правительство должно сначала решить проблему заоблачных государственных расходов, прежде чем планировать их увеличение. Как военный человек и Небесный Король Юга, он придерживается мнения, что когда дело доходит до развития, «целое должно поддерживаться, и каждый аспект должен адаптироваться друг к другу и продвигаться одновременно». Короче говоря, Чэнь считает, что следует принять сбалансированный подход, чтобы обеспечить благополучие Китая и китайского народа.\n\nОба мужа совершенно не смогли убедить друг друга, при этом Гу Инфэнь постоянно вел переговоры между ними, и поэтому вопрос оставлен на голосование. По мере того как делаются последние заявления в Центральном исполнительном комитете, большинство членов партии соглашаются, что:"
 GXC.endgame.041.a: "Чэнь Цзитан прав, мы должны продвигаться постепенно и закрепляться на каждом шагу."
 GXC.endgame.041.b: "Аргументы Ху Ханьминя станут твердым шагом к достижению доктрины Миньшэн."

 GXC.endgame.042.t: "Чэнь Цзитан и Движение за новую жизнь"
 GXC.endgame.042.d: "Прошло некоторое время с тех пор, как Китай был освобожден от милитаристов и возвращен Национально-революционной армией, и администрация националистов взяла курс на реконструкцию и развитие нации во всех аспектах. Будь то культурные, социальные или образовательные, ни одна область не лишена реформ. Чтобы изменить китайское общество и закрепить Три принципа Гоминьдана, полным ходом была запущена грандиозная инициатива, в просторечии известная как «Движение за новую жизнь».\n\nГубернатор Чэнь Цзитан, который считает восстановление присущей Китаю культурной морали и его традиционной объединяющей социальной атмосферы ключом к созданию нового Китая, также продвинул серию социальных реформ в своем королевстве, чтобы поддержать социальную повестку Националистического правительства. Программы губернатора Чэня включают запрет «возмутительной одежды» и ограничение того, «как люди одеваются», вплоть до строгости в отношении длины одежды в соответствии с законом.\n\nЧэнь также воспользовался этой возможностью, чтобы укрепить свой имидж в сердцах людей, продвигая то, что равносильно культу личности в его Королевстве. Он потребовал от школ сделать упор на преподавание традиционной китайской классики и принятие привычки поклоняться Конфуцию, с очевидной целью внедрить в умы своих людей основную идею быть лояльными подданными. Недавно был опубликован новый официальный учебник для средних и начальных школ в Гуандуне, и он, похоже, вызвал много внимания в связи с культом губернатора Чэня.\n\nПо этому поводу Председателю Ху удалось получить копию учебника, посылка из Гуандуна только недавно прибыла в его резиденцию в столице. Осторожно открыв коробку с большим любопытством (редко когда Ху проявлял большой интерес к чтению публикаций, кроме работ Дай Цзитао), Председатель положил учебник на стол, элегантно сел на свой скромный деревянный стул, просматривая первую строку книги, и прочитал про себя:..."
 GXC.endgame.042.a: "«Губернатор Чэнь любит меня, и... я люблю губернатора Чэня?»"
 GXC.endgame.042.b: "«Эти учебники... замените их на утвержденные Министерством образования!»"

 GXC.endgame.043.t: "Оттачивая нашу революционную силу" #磨練我們的革命力量
 GXC.endgame.043.d: "Отметив, что Национальная революция, по сообщениям, продвигается лучше, чем когда-либо прежде, Ху начал: «Теперь мы усмирили нацию, но настоящая революционная работа только началась. По этому случаю наши товарищи должны унести с собой уроки, извлеченные из прошлого, и не допустить повторного появления прежних недостатков, чтобы помешать нашему прогрессу. Крайне важно, чтобы члены партии подчинялись командованию Партии, чтобы мы отговаривали от фракционности, чтобы мы служили массам и чтобы мы приносили жертвы ради Партии».\n\n«Дисциплина нашей Партии должна быть такой же строгой, как и в армии. Дисциплина в армии не позволяет солдатам быть легкомысленными, потому что быть таковыми означает быть неспособными сражаться. Партия должна следовать тому же принципу. Если члены не соблюдают дисциплину и ведут себя рассеянно, то Партия столкнется с раздором и потеряет единство». Быстро обведя взглядом комнату, чтобы убедиться, что все активно слушают, а не просто слышат, он продолжил: «Мы должны соблюдать дисциплину, дорожить духом самопожертвования, чтобы мы могли укрепить нашу партийную организацию, улучшить наши отношения с Партией и улучшить наше понимание Партии».\n\nЗавершив свою речь твердым и ясным голосом, Ху сплотил революционный пыл и рвение Гоминьдана. «Если мы готовы идти на жертвы, мы сможем создать неоспоримую силу отдельных членов партии. Если мы сможем соблюдать дисциплину, мы сможем объединить всех членов Партии и обеспечить полное проявление силы Партии! Мы должны воплощать дух самопожертвования и дисциплины, чтобы тренировать себя для революции, и мы должны оттачивать нашу революционную силу, чтобы защитить Партию!» Как и ожидалось, сразу после его завершения разразился гром аплодисментов. Большинство членов аплодировали искренне, в то время как некоторые хлопали формально."
 GXC.endgame.043.a: "В любом случае, член партии все же отличается от солдата."
 GXC.endgame.043.b: "Мы должны оттачивать нашу революционную силу, чтобы защитить Партию!" #要磨練我們的革命力量來護黨！

 GXC.endgame.044.t: "Упадок коалиции Юэ"
 GXC.endgame.044.d: "Прогресс Национальной революции, который происходит сегодня, несомненно, следует приписать бесчисленным ветеранам революции, которые посвятили себя Трем принципам Отца нации. Для продвижения революционного дела в последние десятилетия были созданы многочисленные организации и коалиции. Среди них самой влиятельной, безусловно, была Коалиция Юэ (Гуандунская коалиция), коалиция, считающаяся оплотом силы современной Национальной революции.\n\nГуандун давно был революционной базой с конца династии Цин, и доктор Сунь базировал там свою штаб-квартиру в течение многих лет после Синьхайской революции. Без помощи товарищей из Гуандуна дело Гоминьдана, конечно, не достигло бы такого прогресса, как сейчас. Однако, как гласит старая китайская пословица, «все хорошее когда-нибудь заканчивается». Хотя кантонское братство может далеко завести людей, в некогда могущественной Коалиции Юэ появились трещины, и Чэнь Цзитан вытеснил других в качестве главного военного человека Партии.\n\nЧэнь и его армия вмешались в различные аспекты китайского общества, включая бизнес, социальные сети и гражданскую администрацию, как если бы это были их повседневные обязанности, вызвав сильную негативную реакцию. Чтобы устранить оппозицию со стороны своих старых товарищей и укрепить свое королевство, Чэнь и его армия попытались арестовать и изгнать старых чиновников Юэ за то, что они были «реакционерами», включая Линь Юнгая.\n\nУслышав эту новость постфактум, Председатель Ху, который, естественно, переключил большую часть своего внимания за пределы своей родной провинции Гуандун, немедленно позвонил губернатору Чэню в его резиденцию, в довольно взволнованной манере. В жаркой беседе Председатель Ху вступил в истинную и правильную диалектику и нюансы Саньминьчжуи, прежде чем настоять на разделении гражданских и военных дел, как предписано на этапе Опеки. Очевидно, звонок обречен быть напрасным. Перед тем как повесить трубку, последнее заявление Ху было..."
 GXC.endgame.044.a: "«Хорошо, они будут временно отстранены от своих обязанностей до дальнейшего расследования»."
 GXC.endgame.044.b: "«Теперь, когда я задумался, разве кадровые изменения не входят в полномочия Президентства? Осторожнее, губернатор Чэнь»."

 GXC.endgame.045.t: "Заговор против Чэнь Цзитана"
 GXC.endgame.045.d: "Заголовки газет по всей стране сегодня пестрят сообщениями об убийстве Чжу Чжовэнь, найденного в своей резиденции в одиночестве, лежащего бездыханным, возможно, уже несколько дней. Смерть чиновника не привлекла бы столько внимания, если бы не тот факт, что Чжу якобы был вовлечен в заговор против губернатора Чэнь Цзитана вместе с двоюродным братом Ху Ханьминя, Ху Ишэном.\n\nКарьера Ху Ишэна резко оборвалась, так как он был замешан сначала в политическом скандале, а затем в покушении на Ляо Чжункая. Уйдя в безвестность и бежав в изгнание, Ху Ишэн продолжал залегать на дно до недавнего времени. Несмотря на свое возвращение, он по-прежнему озлоблен, считая Чэнь Цзитана главным препятствием на пути к своим нынешним бедам.\n\nЧтобы найти лучшую карьеру в будущем, Ху Ишэн присоединился к Чжу Чжовэню в его амбициозном плане. Карьера Чжу также зашла в тупик, несмотря на значительный прогресс Национальной революции. Этот ветеран революции оставался незначительным местным чиновником в течение многих лет, подозревая, что Чэнь Цзитан намеренно сдерживал его продвижение по службе.\n\nПоэтому Чжу и Ху совместно основали так называемую «Армию национального спасения Датун», направив ее против Чэнь Цзитана. Эта армия никогда не казалась реальной угрозой, но губернатор Чэнь ответил на эту колоссальную дерзость твердой и железной рукой. Но Гоминьдану больше навредила не потеря ветеранского кадра, а последствия.\n\nХу Ханьминь, осудивший этот акт как нецивилизованный шаг, совершенно необоснованный революционной практикой или историей Гоминьдана, проводя аллегории со своим собственным обращением с Новой кликой Гуанси, громко заявил о своем разочаровании. Ху обрушил всю мощь исполнительной власти на губернатора Чэня, который публично защищал свой поступок как необходимый шаг для поддержания правительственного авторитета. Становится совершенно ясно, что Революционная диархия, возможно, находится в гораздо более тяжелом положении, чем считалось, и Ху, вероятно, работает с Сюй Чунчжи и Ли Люцзюнем, чтобы искоренить военное господство Чэня."
 GXC.endgame.045.a: "Это послужит хорошим предупреждением другим заговорщикам против нашего правительства."
 GXC.endgame.045.b: "«Он — полное оскорбление смысла быть революционером!»"

 GXC.endgame.046.t: "Революционная диархия возвеличена!"
 GXC.endgame.046.d: "Ху Ханьминь и Чэнь Цзитан сотрудничают, хотя, возможно, и отдалились друг от друга в течение некоторого времени. Предыдущие события, такие как убийство Чжу, всепроникающий культ личности в Гуандуне и другие игры за власть, показали, что расхождение между этими двумя великими людьми — это гораздо больше, чем просто слух. Они решительно выступали друг против друга в большинстве случаев, и некоторые даже беспокоятся, что еще одна ссора в Гуандуне неизбежна. Однако на банкете, состоявшемся в Нанкине, большинство недавно убедилось, что такие опасения беспочвенны.\n\nКак всегда, Ху с большой страстью произносил речи и поучал своих товарищей. Он похвалил успех НРА и роль военных на этапе опеки. В довольно натянутой манере Председатель ясно намекает на себя и губернатора Чэня как на основу правительства. Двигаясь дальше, Председатель начинает еще одну из своих лекций о дисциплине для своих товарищей, распространении Саньминь и нюансах будущего опеки в правительстве.\n\nЗавершив свою речь твердым и ясным голосом, напоминающим его тон на Первом Национальном конгрессе Гоминьдана после победы Коалиции Гуандуна, Ху помахал своим товарищам под аплодисменты. Довольно скромно спускаясь по ступеням сцены, Председатель Ху начал пожимать руки своим коллегам. Встретившись взглядом с Чэнь Цзитаном, губернатор без колебаний отдал честь.\n\nСтав свидетелями такой гармоничной сцены, присутствующим стало совершенно очевидно, что эти двое мужчин не особенно поддерживают лучшие отношения. Ху напоминает Чэню о его истинном положении в Партии, просто ступеньке для Председателя. И все же эта Революционная диархия составляет костяк нынешней Республики.\n\nКогда лицо губернатора Чэня озарилось скрытым страхом при словах Ху, Председатель протянул руку, сверкнув проницательной улыбкой. Ответив на предложение довольно нерешительно, со своей собственной вынужденной ухмылкой, слова речи Ху Ханьминя, произнесенные всего мгновение назад, вновь вспыхнули в умах присутствующих..."
 GXC.endgame.046.a: "«Партия служит как глаза и уши...»"
 GXC.endgame.046.b: "«...в то время как армия — это руки и ноги...»"
 GXC.endgame.046.c: "«...друг с другом мы составляем тело Доктрины Саньминь!»"

 ##NGX Events (060-079)

 GXC.endgame.060.t: "Новый Президент во дворце"
 GXC.endgame.060.d: "Несмотря на стремительный взлет нашей клики на трон Национальной революции, ставшей истинным вершителем судеб будущего китайской нации и ее народа, лишь недавно стало ясно, кто является настоящим лицом Гоминьдана, и с долгожданной отставкой слабого Линь Сэня непогрешимый вдохновитель Ли Цзунжэнь получил заслуженный титул Президента Китая.\n\nОднако не все поддерживают поворот Гоминьдана к стратократии (власти военных), и общественность продолжает сохранять «неразумное отношение» к Новой клике Гуанси. Хотя на самом деле все это не является поводом для беспокойства руководства клики, поскольку на созванном совещании квадрумвирата — Бай Чунси, Ли Цзунжэня, Хуан Шаохуна и Хуан Сюйчу, — проведенном поспешно после новостей об отставке Линь Сэня, было предписано, что роль Президента Китая будет переведена из номинальной роли и наделена полными широкими полномочиями для использования по своему усмотрению. Естественно, подразумевается, что с его новыми широкими полномочиями Ли Цзунжэнь сможет внедрить успешное управление Гуанси по всей стране с непоколебимой властью.\n\nДополнительным бонусом к престижному титулу является почитаемый, недавно построенный «Китайский Белый дом» стоимостью 100 000 долларов; хотя прозвище диссонирует с желтыми стенами и синей черепичной крышей, коннотации такого приписываемого прозвища остаются прежними. Существуя на протяжении всего срока пребывания Линь Сэня на посту президента, скромная и умеренная фигура никогда не решалась занимать шикарные апартаменты, предпочитая оставаться в своем нынешнем доме, возможно, в качестве формы протеста или даже чтобы отразить, что он находится в равном положении с простыми китайцами. В любом случае, здание теперь будет служить экстравагантной демонстрацией вновь обретенной власти и влияния его нового хозяина, ибо Китай теперь полностью находится под эгидой Новой клики Гуанси."
 GXC.endgame.060.a: "Более подходящее жилище для нового Президента."
 GXC.endgame.060.b: "Вопиющая демонстрация коррупции!"

 GXC.endgame.061.t: "Гуанси и сельская реконструкция"
 GXC.endgame.061.d: "В значительной степени по всей китайской нации сохраняется серьезный масштаб бесхозяйственности, злоупотреблений и неэффективности в землепользовании страны. Доктор Сунь Ятсен знал это и разработал свою экономическую программу для Национальной реконструкции. Хуан Сюйчу интерпретирует экономическую программу доктора Суня в гораздо более дальновидном свете, чем его сверстники. Разрабатывая ее как форму экономики с общественной собственностью на средства производства, управление всеми производственными предприятиями останется за правительством, при этом все частные концерны, имеющие важное отношение к экономическим стандартам людей или к обороне страны, подлежат принудительному государственному регулированию. Однако ключевым отличительным фактором является то, что частная собственность остается возможностью для тех, кто достаточно предприимчив, чтобы воспользоваться ею.\n\nЧто касается обучения масс, Новая Гуанси изначально экспериментировала с университетами, ориентированными на физические и биологические науки, с расширенными учебными планами и факультетами, однако это было сочтено ненужным для нужд нации, и поэтому текущая экономическая программа следует за обширной подготовкой сельских кадров с упором на банковское дело, горнодобывающую промышленность, право и управление. С этим практическим взглядом клика стремится подготовить обученный персонал, соответствующий потребностям китайского общества.\n\nБолее революционной вспышкой по сравнению с тщательным подходом Хуан Сюйчу «сверху вниз» является Движение сельской реконструкции, общий соратник Новой клики Гуанси. Возглавляемое Лян Шуньмином, движение стремится внедрять и помогать в подходе Национальной реконструкции «снизу вверх». Отличаясь в вопросе продвижения местного развития под руководством официальных местных правительственных учреждений, Лян желает, чтобы экономическая программа была проектом, созданным самими крестьянами. Другой ключевой игрок в Квадрумвирате, Бай Чунси, дал молчаливое одобрение движению Лян Шуньмина, хотя окончательное решение остается за [ROOT.GetLeader]."
 GXC.endgame.061.a: "Медленная и уверенная реализация Хуан Сюйчу не может потерпеть неудачу."
 GXC.endgame.061.b: "Движение крестьян Лян Шуньмина — это то, что нам нужно!"

 GXC.endgame.062.t: "Базовая программа Национальной реконструкции"
 GXC.endgame.062.d: "В своем неустанном крестовом походе за перенос прославленной и успешной модели Гуанси в остальные провинции Новая клика Гуанси приступила к кодификации своей программы Национальной реконструкции. Будучи номинально вдохновленной собственным планом реконструкции доктора Суня, теперь уже Национальное начинание было изменено как Хуан Сюйчу, так и Хуан Шаохуном, чтобы соответствовать милитаристским требованиям Новой клики Гуанси.\n\nВо-первых, программа считает доктрину Саньминь единственно подходящими принципами для китайской революции и всего населения. Во-вторых, крайне важно, чтобы на текущем этапе Национальной революции нация и народ объединились для борьбы против империализма и власти феодализма. Все универсальные права народа или улучшения условий жизни должны рассматриваться на основе борьбы за национальное освобождение.\n\nКроме того, для того, чтобы производить людей, которые вносят вклад в общество, необходимо повысить организацию и обучение людей. Чтобы реализовать это, клика Новой Гуанси создала «Три политики самообеспечения»: Самооборона, Самоуправление и Самодостаточность, с целью полностью посвятить людей военной реконструкции, помня при этом о руководящем принципе Народного благосостояния.\n\nВ ногу с основами программы идет акцент на политической, экономической и культурной реконструкции, с упором на борьбу с коррупцией и интеграцию с системой ополчения, земельную реформу и оживление экономики, а также всеобщее образование соответственно. Наконец, клика применила свое собственное дополнение к программе, выступая за строгое внедрение системы ополчения во всех провинциях Китая, вместе с возможным слиянием армии и ополчения.\n\nВ целом, революционная программа Национальной реконструкции Новой клики Гуанси может рассматриваться как искажение намерений доктора Суня, однако они не могут отрицать успех такой модели в родной провинции."
 GXC.endgame.062.a: "Модель Гуанси — по всей стране."
 GXC.endgame.062.b: "Это нарушение провинциальной безопасности!"

 GXC.endgame.063.t: "Пуританизм в образовании"
 GXC.endgame.063.d: "Отражая те самые корни, из которых выросла клика, высшее руководство Новой клики Гуанси разделяет очень сдержанные, строгие и пуританские взгляды на общество. Как это было в Гуанси в течение многих лет их правления, кампания по постоянному подавлению любовных песен, расточительной игры на инструментах, пропаганде патриотических и военных песен остается в силе, с планами распространить ее по всей стране. Наряду с музыкой существует подавление «тай», концепции, когда бабушки по материнской линии приносят дорогие подарки после рождения внуков — что считается необоснованной финансовой утечкой для домохозяйств — среди прочего. Более того, существует сильная оппозиция длинным косам, которые обычно носят крестьянки, из-за соображения, что они привлекают болезни и грязь, и убеждения, что коротко стриженные женщины более пуританские, военизированные, грамотные и готовые использовать свои восстановленные силы для служения нации.\n\nХотя эти программы по искоренению самовыражения были признаны успешными в провинции Гуанси, многие критики указывали, что такие инициативы препятствуют развитию интеллектуализма. В ответ на это президент Ли Цзунжэнь выразил свою твердую убежденность в том, что образование — наряду с обороной — являются обязанностями правительства, и хотя они различаются по форме, они разделяют одну и ту же реальность и остаются неразделимыми. Образование людей должно определяться потребностями их общества, поскольку сегодняшний студент — это завтрашний гражданин, а гражданин — это защитник нации в конце концов. Те, кто не обладает способностью защищать нацию, не соответствуют требованиям гражданства."
 GXC.endgame.063.a: "Жесткое подавление легкомыслия."
 GXC.endgame.063.b: "Мы не автократия!"

 GXC.endgame.064.t: "Теория демократии"
 GXC.endgame.064.d: "Как и все фракции внутри Гоминьдана, Новая клика Гуанси ничем не отличается в своей твердой вере в важность демократии в обществе, являющейся краеугольным камнем Трех народных принципов доктора Суня, однако Новая Гуанси отличается в своей интерпретации пределов демократии и того, что значит по-настоящему реализовать такую желаемую форму правления.\n\nОтказываясь позволить демократии вступать в конфликт с потребностями национальной мобилизации, определение демократии Новой Гуанси провозглашает себя ближе к «выражению общей воли». В глазах Бай Чунси самоуправление конкретно означало местное самоуправление, определяя, что местные деревни могут управлять местными делами до тех пор, пока это не противоречит высшим эшелонам власти. Во-вторых, местные органы самоуправления должны были бы организовать население в максимально возможной степени для выполнения местных общественных обязанностей, при этом демократия должна была пробудить массы к их собственным интересам, предоставить организованный голос и обеспечить организационную структуру для перевода настроений в эффективные действия.\n\nОднако концепция местных выборов была решительно отвергнута, поскольку Ли Цзунжэнь обнаружил, что большинство квалифицированных людей смотрят на политику слишком пессимистично, чтобы служить, вместо этого выбирая класс магистратов, которые будут перемещаться между районами. Если местные органы власти терпят неудачу, как может преуспеть национальное правительство? Вместо этого, на этапе политической опеки, клика стремится обучить новый класс чиновников на каждом уровне управления.\n\nНаряду с такими схемами существует принудительная программа грамотности для взрослых, обязательные деревенские собрания для предоставления информации о важных национальных делах, законах и правилах, наряду с местными, хотя в последних наблюдалось ограниченное участие, причем некоторые домохозяйства отправляли на собрание детей-представителей. Мечта о достижении демократии продолжает оставаться неуловимой и трудной, но никто не может отрицать, что Новая Гуанси действительно стремится к демократическому правлению."
 GXC.endgame.064.a: "Истинная демократия под нашей эгидой."
 GXC.endgame.064.b: "Подумать только, что все приведет к этому?"

 GXC.endgame.065.t: "По ком звонит колокол"
 GXC.endgame.065.d: "Ху Ханьминь, всегда гордый, всегда загадочный, всегда упрямый, отказался отправиться в политическое изгнание ради собственной безопасности после своего свержения, вместо этого решив остаться в своем доме в Гуанчжоу, по сути, провоцируя Ли Цзунжэня выдать ордер на арест. Ли воздержался от каких-либо открытых шагов против бывшего Председателя, предпочитая просто держать его дом под наблюдением. Только редкие визиты таких людей, как Линь Сэнь, Чэнь Миншу и Цзоу Лу, казалось, проливали свет в темное жилище Ху.\n\nПо иронии судьбы, раскрывающийся интеллект и упрямый ум бывшего Председателя, похоже, стали причиной его гибели. Во время одной из частых шахматных партий Ху Ханьминя (занятие, в котором он, по сообщениям, стал довольно известен как местный чемпион), похоже, у него случилась, к несчастью, фатальная аневризма мозга в середине матча, и позже он был объявлен мертвым на месте происшествия.\n\nМногие близкие к бывшему Председателю сообщали о явно потрясенном, растрепанном и болезненном характере Ху после того, что можно было интерпретировать только как, по его мнению, полный крах Национальной революции. Те, кто находится в высших эшелонах Новой Гуанси, выдвигают гораздо более гнусные вопросы относительно последних мгновений бывшего Председателя. В любом случае, большинство в клике сочли это счастливой случайностью, несмотря на утверждения, что ужасные условия его жилого пространства способствовали его угасанию — некоторые даже осмелились выдвинуть вопиющие обвинения в нечестной игре.\n\nТеперь, когда Ли наконец избавился, пожалуй, от своего величайшего противника, появились предложения, чтобы Президент сохранял свое внешне беззаботное отношение к лакеям клики Старейшин, возможно, даже проявив уважение к смерти некогда великого государственного деятеля. В конце концов, Ли не монстр, и у самого Ху было много близких, даже обожание нации, все из которых будут оплакивать его потерю. Однако нельзя всегда почивать на лаврах, и использование такой возможности позволило бы Ли навсегда выбросить внутрипартийную оппозицию на свалку истории."
 GXC.endgame.065.a: "Должно быть, это был сильный ход..."
 GXC.endgame.065.b: "...Давайте сделаем свой собственный."

 GXC.endgame.066.t: "Реконструируй Гуанси, возроди Китай!"
 GXC.endgame.066.d: "Итак, земля, которая долгое время была разделена, воссоединилась снова, на этот раз под руководством совершенно другого лидера. Как и многие до него, Ли Цзунжэнь происходил из скромных (но не слишком скромных) корней, прежде чем подняться, чтобы спасти свой народ. Благодаря своим военным и политическим талантам, а также талантам своих союзников, генерал Ли вышел из провинции, которую большинство списало со счетов как отсталую и слаборазвитую, чтобы стать Президентом воссоединенной Китайской Республики.\n\nЭта Республика сильно отличается от тех, что были до нее, и Ли Цзунжэнь — очень сложный человек, отличный от молодого солдата-неудачника, ставшего учителем физкультуры, который впервые присоединился к Синьхайской революции. От синьхайского революционера до солдата-милитариста, оппортунистического генерала, изгнанника из Гоминьдана, радикального сторонника ополчения и иногда либерала — Ли Цзунжэнь носил много разных масок с разной степенью убежденности. Он управляет своим кораблем так же, как когда-то управлял своей провинцией и когда-то командовал своей армией, настаивая на строжайшей дисциплине как для своих гражданских, так и для военных лейтенантов.\n\nГоминьдан тоже изменился, сформировавшись по образу своего нового Председателя. Бай Чунси однажды назвал Гуанси «колыбелью революции» — когда-то высокомерное хвастовство, но теперь реальность. С лозунгом «Реконструируй Гуанси, возроди Китай», модель Гуанси теперь стала образцом для подражания всей нации, сочетая Три принципа, которые доктор Сунь когда-то изложил для своей партии, с прагматическими потребностями нации, постоянно находящейся на страже от вторжения.\n\nКонечным результатом является Республика, которую мало кто знает. Несомненно, диктатура, но не совсем военная, даже если ее возглавляет бывший генерал. Демократия на словах, хотя и редко на деле, восхваляемая некоторыми людьми республиканских наклонностей. Государство для своих граждан, каждый из которых вооружен и обучен по закону, но укоренен в высшей цели китайского национализма. Партийное государство Гоминьдана, но без кого-либо из его первоначальных основателей. Несмотря на свои противоречия в будущем, оно объединено одной целью:"
 GXC.endgame.066.a: "Нация будет спасена!"

###Section 5b (100-199): End Game Dem RKMT Events

 ##Shared Events (100-119)

 GXC.endgame.100.t: "Дух реформ"
 GXC.endgame.100.d: "Никто бы не поверил, что почти непреодолимая позиция Ху Ханьминя может быть когда-либо побеждена, пока он правил на троне, и все же после того, как долгожданный Третий национальный конгресс начался и закончился, этот плод воображения стал реальностью. Со стабильным избранием конституционалиста [ROOT.GetLeader] на пост Премьера Гоминьдана искра демократии снова разгорается под возрожденной надеждой, что проведение выборов и окончание Опеки станет не просто зарождающейся мечтой, а гарантированной реальностью для китайской нации. Малейшие угольки более широкого политического фронта мобилизовали огромное количество энергичных политиков со всех направлений политического спектра, намеревающихся оказать свое влияние на формирование будущего для Китая.\n\nОднако такой ошеломляющий поток внезапной агитации, формирования растущих партий, ослабления влияния Гоминьдана принес с собой сильную нестабильность, и многие в партии опасаются, что если [ROOT.GetLeader] и их фракция не сумеют удержать ситуацию под контролем, партия и сама Национальная революция вполне могут рухнуть под собственным весом.\n\nВ дополнение к растущим проблемам для нового руководства, на поверхность всплыл важнейший вопрос конституции Республики, ибо клика Ху Ханьминя предпочитала править посредством Органических законов, а не писаной, кодифицированной конституции, но это было одним из самых главных обещаний, данных [ROOT.GetRulingParty]. Как бы то ни было, одно можно сказать наверняка..."
 GXC.endgame.100.a: "Демократия манит..."

 GXC.endgame.101.t: "Болезнь сердца"
 GXC.endgame.101.d: "Нация может быть номинально объединена под «Синим небом, белым солнцем и всей землей — красной», однако под поверхностью таится отвратительная чума, поразившая Китайскую нацию с незапамятных времен. Милитаристы. Даже в бесконечном, непрекращающемся крестовом походе Гоминьдана против прославленных бандитов всегда появляются новые милитаристы, чтобы заменить старых.\n\nВ дополнение к их постоянному присутствию, они осмелели от того, что они считают слабым, недействительным демократическим руководством, слишком сосредоточенным на вероломной идее «демократии», чтобы бросить хоть взгляд на их деятельность. Однако такая позиция — удел глупцов, ибо, хотя правительство и испытывает временные трудности во время монументального перехода, мощь Гоминьдана остается непогрешимой в эти времена их зенита. Задача смещения милитаристов может оказаться значительной, но Гоминьдан переживал и худшее."
 GXC.endgame.101.a: "Милитаристы беспокойны..."

 GXC.endgame.102.t: "Призыв к переменам"
 GXC.endgame.102.d: "По мере того как железная хватка, которую партийное государство когда-то имело над китайской нацией, ослабевает, пусть даже немного, гораздо более либеральная атмосфера привела к росту того, что многие в предыдущей администрации сочли бы антиреволюционной практикой. Студенты, учителя, журналисты — все объединяются в гармоничную симфонию, направленную на сплочение против того, что они воспринимают как несправедливость нынешнего революционного правительства.\n\nПривлекая внимание к критическим проблемам, таким как коррупция, социальный консерватизм и авторитаризм, многие в партии фактически приветствовали такое внимание к недостаткам нации, ибо легче проявить политическую волю для подавления таких проблем, если есть значительная народная поддержка масс. Однако это быстро переросло в более широкие призывы к изменениям в нации и администрации, которые Гоминьдан не решается поддерживать и даже предпочел бы заставить замолчать.\n\nОпасения, что такие движения перерастут в прямую оппозицию партии, привели к тому, что многие из нынешнего руководства считают это еще одной из важнейших проблем новой администрации, ибо как мы можем обеспечивать людей, если они выступают против нас на каждом шагу?"
 GXC.endgame.102.a: "Наша молодежь сетует..."

 GXC.endgame.103.t: "Торг в [ROOT.Capital.GetCapitalVictoryPointName]"
 GXC.endgame.103.d: "С инаугурацией нашего недавно помазанного Правительства пяти юаней каждый правительственный орган принес обильный урожай свежих административных и бюрократических должностей, которые должны быть делегированы так, как это будет сочтено необходимым нынешним правительством. Однако существует прецедент и даже ожидание того, что каждая должность будет тщательно сбалансирована между нынешними основными фракциями Гоминьдана — Сишань, Реконструкции и Старейшин — для поддержания сплоченной, единой силы со всех точек зрения управления.\n\nСамой желанной из всех недавно появившихся должностей является должность Председателя Законодательного юаня, должность, которую, как ожидается, передадут фигуре из другой фракции, нежели Президент, в качестве демонстрации доброй воли между разрозненными фракциями. Из двух ведущих фигур в гонке за Законодательный юань проигравший, как ожидается, будет назначен Председателем престижного, но менее влиятельного Судебного юаня, в то время как лидеры более мелких фракций, как ожидается, получат председательство в Контрольном и Экзаменационном юанях.\n\nАналогичным образом будут сбалансировано распределены другие должности в законодательном органе, такие как вице-председатель и генеральный секретарь Законодательного юаня. Занимаясь самоанализом, некоторые задаются вопросом, продвинет ли такой тщательно продуманный набор дел марш Гоминьдана к демократии, или же он просто породит все большие и большие тупики противоположных идеалов."
 GXC.endgame.103.a: "Назначить Сунь Фо."
 GXC.endgame.103.b: "Назначить Цзю Чжэна."
 GXC.endgame.103.c: "Назначить Ху Ханьминя."

 GXC.endgame.104.t: "Конференция национального спасения"
 GXC.endgame.104.d: "Не редкость среди гражданских членов Гоминьдана — хотя наиболее восторженно и, возможно, громко об этом заявлял Сунь Фо — многие сетовали на то, что ключевые фигуры Гоминьдана занимали несколько партийных и правительственных должностей одновременно, фактически концентрируя власть в руках перегруженных, неквалифицированных лиц, которые не могли эффективно оказывать помощь правительству.\n\nТаким образом, с новым конституционным поворотом Гоминьдана многие члены партии последовательно требовали применения правила, согласно которому ни один действующий военнослужащий не мог быть президентом или премьером ни одного из Пяти юаней, политики «один человек — одна должность» для премьера и даже условия, что члены не могут участвовать в нескольких советах.\n\nВ ходе совместных усилий три доминирующие фигуры нынешнего правительства, Сунь Фо, Цзюй Чжэн и Ху Ханьминь, стали соавторами «Основ принципов управления политикой в период политической опеки и методов ведения внешней политики Китая», длинного, но настойчивого документа, отстаивающего и, возможно, даже предписывающего прекращение военного правления и надлежащее начало функционирования правительства Пяти юаней.\n\nОднако такая позиция не лишена противников, поскольку ключевые фигуры в нынешней военной структуре, такие как Чэнь Цзитан, решительно выступают против любого ограничения их влияния, выступая против неточной оценки деятельности лиц, занимающих одновременно военные и гражданские должности. Однако при доминировании конституционалистских фракций Гоминьдана его крики остаются без ответа."
 GXC.endgame.104.a: "Правительство, свободное от военного влияния."

 GXC.endgame.105.t: "Политический консультативный совет"
 GXC.endgame.105.d: "Всегда будучи символическим светом, даже точкой сплочения, разработка новой конституции была постоянной целью жизни Сунь Фо, ибо он неустанно боролся против авторитарных, а иногда и произвольных решений, принимаемых правящей кастой Гоминьдана во время ее пребывания у власти. Теперь, когда демократические силы наконец вырвали контроль у более авторитарных, он возглавил движение к разработке новой конституции для нации, чтобы отразить последовательный марш к справедливому управлению, основанному на консенсусе, а не на автократии.\n\nНазначив комитет по разработке конституции, Сунь заседает в качестве председателя вместе с У Чаошу и Чжан Чжибэнем. В этот комитет входят такие люди, как Фу Бинчан, Лян Ханьцао, У Шаньин и многие другие. Сишань Цзюй Чжэна и Клика старейшин Ху Ханьминя начали переносить перо на бумагу в длительном процессе разработки, сглаживая все детали между собой. Однако раздаются все более громкие призывы даже от более радикальных членов Гоминьдана разрешить внешним партиям, Даньвай, участвовать в процессе разработки. Такое дерзкое приглашение имеет серьезные последствия, ибо объединенные усилия не только Гоминьдана, но и других означали бы, что конституция, разрабатываемая сейчас, станет окончательным продуктом.\n\nОднако такое широкое расширение признания внешних партий могло бы действительно стать разницей между процветающей демократией и застойной, где Гоминьдан просто использует выборы как оправдание своего продолжающегося правления. Тем не менее, Сишань и Клика старейшин выступили против такого понятия. Сунь и Реконструкция, со своей стороны, колеблются, ибо хотя сам Сунь говорил, что «мы должны разработать конституцию в соответствии с Тремя народными принципами, и мы не должны отклоняться ни от ее духа, ни от ее содержания, ни от ее формы», он тем не менее заинтересован в укреплении мощи Реконструкции поддержкой Даньвай."
 GXC.endgame.105.a: "Мы не отречемся от доктора Суня."
 GXC.endgame.105.b: "Нужен взгляд со стороны."

 GXC.endgame.106.t: "Права и обязанности народа"
 GXC.endgame.106.d: "Как одно из самых значительных действий в решении будущего Национальной революции и китайской нации, написание новой республиканской конституции потребует напряженных усилий и шагов к общему консенсусу между всеми сотрудничающими сторонами, чтобы гарантировать, что труд, жертвы, потрясения последних десятилетий стоили того во имя прогресса.\n\nВозглавляя атаку, [ROOT.GetLeader] решил не принимать во внимание последнюю введенную Гоминьданом конституцию, Временную конституцию 1912 года, поскольку она была признана непригодной для целей новой эры партии. Тем не менее, сохраняется желание черпать вдохновение из определенных аспектов, таких как права народа.\n\nБудучи относительно бесспорным разделом конституции, вторая глава конституции, «Права и обязанности народа», гарантирует множество свобод и прав китайскому гражданину. Различные статьи, обеспечивающие равное отношение ко всем гражданам независимо от происхождения или прошлого перед законом, свободу проживания, вероисповедания, собраний и другие.\n\nХотя это только начало, относительно немногие голоса выразили какое-либо несогласие с этим разделом конституции, и благодаря объединенным усилиям Реконструкции, Сишань и Старейшин, возможно, будущее Китая решается легче, чем у большинства."
 GXC.endgame.106.a: "Принято единогласно."

 GXC.endgame.107.t: "Роль Национального собрания"
 GXC.endgame.107.d: "Увы, такое гладкое плавание не было обещано, ибо следующая глава конституции вызвала ряд критических опасений со всех сторон политического спектра. Спорная третья глава, «Национальное собрание», поднимает концепцию учреждения правительственного органа для представления и осуществления политических полномочий от имени всего гражданства, переводя структуру правительства в трехпалатную парламентскую систему. В то время как некоторые — особенно Ху Ханьминь и его Клика старейшин — выступают против самой концепции парламентаризма, обвиняя [ROOT.GetLeader] в предательстве идеалов доктора Суня, статья, которая вызвала наибольший шум, — это статья 26.\n\nКодифицируя состав такого собрания и распределение его избранных делегатов, статья предусматривает, что «один делегат избирается от каждого сяня (уезда), муниципалитета или области эквивалентного статуса», однако с добавлением оговорки, что если его население превышает 500 000 человек, избирается дополнительный делегат на каждые дополнительные 500 000. Такое число считается необоснованным множеством членов Гоминьдана, поскольку это привело бы к тому, что Национальное собрание состояло бы, возможно, из тысяч членов, фактически крупнейшее в мире.\n\nОднако оппозиция далеко не полная, так как многие действительно видят в таком широком собрании необходимость для подлинного представления взглядов каждого отдельного китайского гражданина и выступают за его реализацию в нынешнем виде, хотя их почти сразу же отвлекают такие люди, как Цзоу Лу, Цзюй Чжэн, Чжан Цзи, Ху Ханьминь и другие менее идеалистичные государственные деятели, которые просто настаивают на том, что такой бюрократический кошмар почти создаст еще один бесполезный орган власти."
 GXC.endgame.107.a: "Полное представительство для китайского народа!"
 GXC.endgame.107.b: "Вы правда серьезно? Каждые пятьсот тысяч?"
 GXC.endgame.107.c: "Представители избираются каждой провинцией, распределяются по населению провинции."

 GXC.endgame.108.t: "Полномочия Президента Китая"
 GXC.endgame.108.d: "В еще одном препятствии на пути к обнародованию новой конституции роль и дела президента были поставлены под сомнение. Хотя все пришли к общему мнению, что роль президента не должна нести никаких истинных автократических полномочий, оставаясь вместо этого формой номинального главы, многие задаются вопросом, где именно президент должен находиться в структуре правительства.\n\nБудучи главой государства, представляющим нацию в иностранных делах, имеющим верховное командование всеми видами вооруженных сил и фактически служащим всеобъемлющим лицом правительства, некоторые в совете предложили, чтобы президент был прикреплен к Исполнительному Юаню, поскольку он функционально служит для осуществления воли исполнительной власти.\n\nВ противовес этому более ориентированные на кабинет члены совета выдвинули концепцию, что президент должен просто служить посредником между Пятью юанями, преодолевая разрыв и обеспечивая непрерывное плавное управление во времена политических потрясений. Существуя в состоянии общей власти во всех правительственных органах, президент был бы консультативной фигурой всех ветвей.\n\nСтарейшины, со своей стороны, поддержали прикрепление к исполнительной власти, надеясь сохранить некоторую силу и авторитет в роли главы государства. На противоположном конце Реконструкция сочла целесообразным настаивать на консультативной позиции президента, посылая четкий сигнал о своей вере в примат пяти ветвей. Находясь посередине в этих диалектических дебатах, Сишань подвергался уговорам с обеих сторон Совета. С некоторыми членами, склонными к сильному президенту, в то время как другие склонны к идеалу «ответственного кабинета» Сун Цзяожэня, кажется, что они являются создателями королей."
 GXC.endgame.108.a: "Посредник, непредвзятый в принципах, прагматичный в действиях!"
 GXC.endgame.108.b: "Вполне естественно, что президентство находится в исполнительной власти, нет?"

 GXC.endgame.109.t: "Вопросы вице-президентства"
 GXC.endgame.109.d: "В еще одном направлении споров, вытекающем из концепции роли президента, существование вице-президента было поставлено под сомнение. Выполняя роль, аналогичную роли президента, вице-президент также служил бы компонентом представления китайской нации остальному миру, и, не неся никакой серьезной политической власти, его слова все равно бы учитывались остальным правительством, будучи вторым по старшинству лицом. По крайней мере, на бумаге.\n\nКонечно, существование вице-президентства вызвало многочисленные возражения и обвинения, намекающие на то, что такая должность является институтом бюрократии ради бюрократии и должна быть полностью отвергнута. В частности, поднимался вопрос, что если президент погибнет на посту или иным образом не сможет функционировать, то президент Исполнительного Юаня, безусловно, сможет исполнять обязанности президента до завершения кризиса, в отличие от создания совершенно новой, практически бесполезной должности, служащей резервом.\n\nСторонники вице-президентства настаивают на модели Соединенных Штатов, проводя сравнения, которые вызвали у них особый гнев. Продвигаемый Сунь Фо и его Фракцией реконструкции, он настаивает на том, что роль вице-президента позволила бы даже президенту иметь немедленный совет, который не посвящен в интересы различных юаней."
 GXC.endgame.109.a: "Даже президенту нужен его заместитель."
 GXC.endgame.109.b: "Мы прекрасно обойдемся без еще одного бюрократа."

 GXC.endgame.110.t: "Судьба Исполнительного Юаня"
 GXC.endgame.110.d: "Поскольку вопрос о президентстве и вице-президентстве решен, конституционный совет теперь быстро переключил внимание на административные полномочия, сглаживая конкретные пределы и полномочия Исполнительного Юаня. При общем согласии, что Исполнительный Юань будет высшим административным органом государства, Исполнительный Юань будет иметь президента, вице-президента, министров, председателей комиссий и определенное количество министров без портфеля.\n\nС сохраняющимся прецедентом, что президент республики назначает всех на критические должности в правительственном органе, и с соглашением, что сам президент республики должен быть довольно слабой ролью — несопоставимой с президентами прошлого нации — с устойчивым правительством, основанным на кабинете, и сильным законодательным органом, вопрос о степени власти премьера Исполнительного Юаня был выдвинут на передний план.\n\nБольшая группа членов Гоминьдана из Клики старейшин предложила идею, что премьер Исполнительного Юаня на самом деле должен быть весомым постом, обладающим полномочиями, аналогичными полномочиям премьер-министров в таких странах, как Канада, в то время как другие из более осторожно настроенных клик, таких как Сишань, выступали за то, чтобы премьер также был слабой позицией, обязанной консенсусу кабинета."
 GXC.endgame.110.a: "Решительные действия требуют сильного премьера!"
 GXC.endgame.110.b: "Законодательный орган и кабинеты должны иметь приоритет, а не отдельные лица."

 GXC.endgame.111.t: "Решение судьбы Премьера"
 GXC.endgame.111.d: "В еще одном ударе по плавному написанию конституции те в Гоминьдане, кто выступает за сильный законодательный орган и слабую исполнительную власть, подняли свои вопросы о назначении премьера Исполнительного Юаня в первую очередь. Фактически служа основной силой в реальных административных решениях, сотрудничество президентов как Республики, так и Исполнительного Юаня в согласии с премьером Исполнительного Юаня является неотъемлемой частью хорошего, плавного управления.\n\nВ сочетании с этим нынешняя конституция прямо заявляет, что право назначать премьера предоставляется исключительно президенту Республики с согласия законодательного органа. Однако были выдвинуты многочисленные возражения, вместо этого настаивающие на том, что эксперты в Законодательном Юане должны быть приоритетной силой, стоящей за назначением премьера, а президент просто ставит печать.\n\nИх аргументация — возможно, почерпнутая из ужасов бюрократии Бэйяна — заключается в том, чтобы предотвратить кумовское объединенное соглашение о разделе власти, в котором два ключевых лица, президент и премьер, доминируют в повседневных функциях правительства, хотя многие бросали обвинения в паранойе и ненужном усложнении конституционного процесса в сторону сторонников, большинство из которых, как оказалось, составляют Фракцию реконструкции. В противовес этому ходу мыслей Клика старейшин вместо этого предложила увеличить силу президента, позволив этой должности назначать всех членов кабинета, а не только премьера."
 GXC.endgame.111.a: "Мы не будем обязаны коррумпированным личностям."
 GXC.endgame.111.b: "Президент выбирает премьера, полагаясь на свое лучшее суждение."
 GXC.endgame.111.c: "Согласиться с предложением Ху, президент не может быть связан кабинетом."

 GXC.endgame.112.t: "Дела местного самоуправления"
 GXC.endgame.112.d: "В удивительном повороте событий остальные статьи и главы конституции были приняты без единого протеста по поводу их конкретики или реализации. Роли и структура Законодательного, Судебного, Экзаменационного и Контрольного юаней, большинство из которых имеют схожую структуру Президент-Вице-президент, причем каждый имеет возможность выполнять свои конкретные функции, как это считают необходимым их члены.\n\nОднако, подобно призраку из прошлого, продолжающему преследовать Гоминьдан, вопрос о провинциальной автономии посеял хаос в недавних обсуждениях последних дней, поскольку истинная степень полномочий Центрального правительства по сравнению с местными правительствами подвергается критике со стороны тех, кто более склонен к федералистским идеалам. В нынешней системе Центральное правительство имеет законодательную и административную власть для множества критических компонентов управления страной, таких как судебная система, национальное право, национальная оборона и иностранные дела, среди прочего, однако ему было предоставлено право делегировать управление образованием, банковским делом, лесным хозяйством, промышленностью, торговлей, полицией, здравоохранением и другими местными вопросами самим провинциальным правительствам.\n\nНекоторые предлагают, чтобы вместо того, чтобы Центральное правительство просто могло предоставлять полномочия администрации провинциальным правительствам по прихоти, эти права должны быть гарантированы местным правительствам на том основании, что они могли бы лучше управлять и реализовывать эти региональные полномочия, основываясь на имеющихся местных проблемах. Это позволило бы Центральному правительству сосредоточиться на том, чтобы быть бьющимся сердцем управления.\n\nНо такое предложение встретило обширную негативную реакцию со стороны большинства Совета, практически заработав своим сторонникам политическое изгнание в тот самый момент, когда такая концепция слетела с их губ. Отвергнуть централистские принципы Сунь Ятсена, повторить ошибки прошлого и позволить провинциальным правительствам слишком большую автономию, чтобы действовать полунезависимо от Центрального правительства. Это практически святотатство."
 GXC.endgame.112.a: "Хватит этой провинциальной автономии, Центральное правительство — главное!"
 GXC.endgame.112.b: "...ирония ощутима."
 GXC.endgame.112.c: "Компромисс, провинциальные председатели назначаются централизованно."

 GXC.endgame.113.t: "Наши фундаментальные национальные политики"
 GXC.endgame.113.d: "К счастью, написание конституции и жизнь совета подходят к концу. С аналогичным общим консенсусом по поводу масштабов системы местного самоуправления, наряду с указанием различных полномочий по выборам, отзыву, инициативе и референдуму, которые предоставляются народу для использования по их усмотрению, наступают последние главы конституции.\n\nС престижно названной Главой Тринадцать: «Фундаментальные национальные политики», навсегда увековечивающей аполитичную позицию военных, роспуск политического маневрирования, в котором самое большое ружье диктовало политику, явное отделение любого военного чиновника от одновременного занятия гражданской должности и сохраняющийся приоритет национальной обороны страны.\n\nНаряду с этими статьями глава также диктует политику в области иностранных дел, национальной экономики, социального обеспечения, образования и культуры и, наконец, конкретного обращения с теми, кто находится в пограничных регионах страны. В конце этого долгого, трудного процесса отдельные члены партии могут только надеяться, что конституция, обнародованная сегодня, навсегда послужит маяком надежды, стабильности и Трех народных принципов на десятилетия вперед. Возможно, наконец-то мечта доктора Сунь Ятсена о свободной, единой, централистской и демократической Китайской Республике осуществится.\n\nСам Сунь Фо поздравил комитет по всем направлениям, сохраняя верность своему сердцу, что «мы разработали законы, которые подходят для современной нации. Законы, которые мы разработали, прогрессивны и разумны. Мы не только, несомненно, чувствуем себя очень удовлетворенными, но и, несомненно, заслужили благоприятные комментарии и похвалу от экспертов в области права за рубежом». Поскольку последняя глава указывает на принудительное исполнение и поправку конституции, если возникнет такая необходимость, все, что осталось, — это чтобы разработчики конституции в совете вписали свои имена на бумагу..."
 GXC.endgame.113.a: "И с высыханием чернил Белое солнце восходит над китайской нацией."

 ##WHC Events (120-139)
 GXC.endgame.120.t: "Сишань у руля"
 GXC.endgame.120.d: "Пыль улеглась после Третьего национального конгресса, межпартийная политическая борьба закончилась, и Сишань торжествует. Когда первый матч, Конференция Сишань, проводился в западных холмах пригорода Пекина, видение руководства Гоминьданом было далеким. Теперь старые товарищи Сунь Ятсена и Сун Цзяожэня наконец взяли штурвал власти. Плод, рожденный «Четвертой пленарной сессией Первого центрального комитета Гоминьдана», наконец-то принес дивиденды.\n\nПредседатель Цзюй немедленно изложил свое видение будущего Китая. Видение сострадания, конституционализма, благожелательности и любви. Ибо правление властных милитаристов, таких как Ли Цзунжэнь, деспотичных демагогов, таких как Ван Цзинвэй, и вероломных социалистических лазутчиков, таких как сообщники Вана, закончилось. Теперь, как первоначально предписал Гофу, Национальная революция должна быть тридемистской. Без каких-либо проникающих чуждых концепций, таких как социализм, извращающих истинную ортодоксальную революционную модель Китая.\n\nПоддерживаемая военными людьми, такими как прославленный маршал Ли Лецзюнь или достойный восхищения генерал Сюй Чунчжи, политика Председателя также была поддержана экстремистами и умеренными клики. Поскольку существование Единого фронта почти рухнуло с перспективами Центрального комитета левого Гоминьдана, больше нет необходимости быть такими раздробленными, как раньше. Однако по-прежнему существуют разные мнения относительно обращения с теми членами партии, которые присоединились или поддержали Единый фронт.\n\nС этой целью Сишань уже начала играть своими судебными, легистскими и конституционными мускулами. Желая двигаться в будущее, уважая то, что было раньше, клика Сишань, возможно, не так радикальна, как некоторые из их безрассудных товарищей в Гоминьдане, но сейчас не время для насилия Революции, сейчас время для восстановления и исцеления от ран вековой давности. Синтез традиции и революции — вот их конечная задача."
 GXC.endgame.120.a: "«Только мораль и знания являются основой страны»."
 GXC.endgame.120.b: "Построить страну под верховенством закона..."

 GXC.endgame.121.t: "Патриотическое крестьянское движение"
 GXC.endgame.121.d: "Земельная реформа является ключевой политикой для Гоминьдана, и клика Сишань в этом отношении ничем не отличается. Однако отличается их подход к вопросу. В отличие от левых и социалистов, Сишань считает, что земельная реформа не обязательно должна быть насильственным процессом и что она должна иметь четыре основные цели: 1.) Улучшить деревню. 2.) Повысить стандарты образования. 3.) Предоставить крестьянам экономическую помощь. 4.) Принять законы, защищающие статус крестьян и их основные интересы.\n\nС этой целью член Сишань Ши Ин написал план «Консервативной земельной реформы» (даже если на практике он все еще гораздо более радикален, чем когда-либо соизволил бы Бэйян). Имея три основных столпа, он гласит, что государство должно написать законодательство для распределения земель и прибыли крестьянам, создать кооперативы и предоставить крестьянам займы для начала, и, что наиболее существенно, что государство должно возделывать земли, которые в настоящее время не используются, и переселять крестьян на эти земли, чтобы они больше не пропадали зря.\n\nОднако не все в Сишань согласны с этим планом; более радикальная земельная реформа, более близкая к идеям Сунь Фо и фракции реконструкции, включающая государственный контроль над ценами на рис и использование правительства в качестве посредника между землевладельцами и крестьянами, была предложена Шэнь Динъи. Заметное исключение из-за его неоднократных прокрестьянских и псевдопопулистских усилий, Шэнь имеет богатую историю постоянной организации крестьянских реформистских ассоциаций. Среди его планов — внедрение 30-процентного сокращения земельного надела и 25-процентного снижения арендной платы. Далеко от сурового подхода основной линии Сишань, это вызвало много беспокойства в высших рядах по поводу того, что он действует как посредник для радикализма. Однако Шэнь заручился поддержкой многих фракций за пределами Сишань."
 GXC.endgame.121.a: "Земельная реформа слишком важна, чтобы идти на компромисс, выберите план Ши Ина."
 GXC.endgame.121.b: "Нам нужно всеобщее согласие, выберите план Шэнь Динъи."

 GXC.endgame.122.t: "Вспоминая Первую республику"
 GXC.endgame.122.d: "Старая Бэйянская республика была, по многим оценкам, мешаниной противоречий. То, что должно было стать первыми шагами Китая к демократии и светлому будущему, было вместо этого коррумпировано. Однако не все, кто работал в Бэйяне, были предателями. Многие были ревностными демократами, изо всех сил стараясь извлечь лучшее из плохой ситуации, пойманные в ловушку коррупцией окружающих. Для них естественно сочувствовать, конечно, поскольку Сишань обязана своим наследием Конституционному клубу, сформированному в политической системе Бэйяна Чжан Цзи и другими.\n\nТеперь, когда Партийное государство освободило Китай от коррупции Бэйяна, оно также освободило эти умы для свободной работы. Но концепция введения их в наше правительство напрямую или нет — это совсем другой вопрос. Чжан Цзи и Сюй Чунчжи справедливо указали, что Фэн Юйсян и Гоминьцзюнь предоставили им место убежища в западных холмах (Сишань) Пекина, что и дало клике ее название в первую очередь. Настаивая на том, что не отплатить за такую доброту было бы упущением клики.\n\nСам Председатель выдвинул интересную возможность работы с демократами Бэйяна, консерваторами и им подобными. Теми, кто остался идеалистом в слабеющей хватке Пяти рас. Хотя и не обязательно гоминьдановцы, они тем не менее сослужили бы службу, как только период Опеки закончится и начнется период Конституционного правления.\n\nНаконец, и наиболее привлекательным для Клики Сишань, является предложение Ли Лецзюня и Се Чи. Предложение пригласить товарищей-первенцев Гоминьдана: Клику политической науки. Хотя верно, что Политическая наука долго ставила на Пекин, даже организуя многочисленные попытки свергнуть Гофу, тем не менее достойно восхищения, что Хуан Фу, Гу Чжунсю, Чжан Яозэн, Ли Гэньюань и их старая гвардия продолжали играть с автократами на каждом шагу. Они могут быть изгоями в партии, но и Сишань когда-то была такой же."
 GXC.endgame.122.a: "Идеалисты Бэйяна могут участвовать, но не давайте им никакой реальной власти."
 GXC.endgame.122.b: "Приветствие Хуан Фу и Политической науке!"
 GXC.endgame.122.c: "Чжан и Сюй правы, мы должны отплатить Фэну за его доброту."

 GXC.endgame.123.t: "Традиционалистское возрождение"
 GXC.endgame.123.d: "Традиционные религии Китая, буддизм, даосизм и конфуцианство, являются одними из самых важных краеугольных камней китайской культуры. Большинство членов Сишань идентифицировали бы себя как буддисты, но многие также подпадают под даосизм и конфуцианство. Председатель Цзюй Чжэн даже имеет некоторые симпатии к умеренным элементам движения Игуаньдао. Как стало практической традицией и даже элементом осуждения для различных членов Сишань, членство — это эпоха конфуцианских государственных деятелей в Революционной партии. Смиренные практики каллиграфии, медитации и размышлений о своем положении в жизни и как государственного служащего, это заслужило им восхищение у многих традиционалистов Китая. И враждебность со стороны его интеллектуалов.\n\nДля Гоминьдана большая часть неоконфуцианского движения была вовлечена в связывание идеалов конфуцианства с Тремя принципами, изложенными доктором Сунем. С его самым большим сторонником в лице Дай Цзитао, архитектором «Новых правых», Сишань тем не менее соглашается с фундаментальной основой, посредством которой Три принципа информируются через конфуцианский этос нации. Дай со своей стороны в основном переориентировал свои убеждения на «Гуманистический буддизм», сместив фокус с потустороннего и мертвого на живое и более мирские занятия, такие как образование.\n\nПоддержка этих неорелигиозных движений была ключевой политикой для Сишань, поскольку, хотя Китай не может оставаться в прошлом, он должен принимать во внимание традиционные верования, которые составляют национальную цивилизацию, поскольку он движется вечно вперед. Ибо нужно восстановить уверенность в китайской культуре, если нужно завершить Национальную революцию, Национальную революцию революционными силами каждого класса. Как проповедовал Линь Сэнь: «Через традицию нация может восстановить свою национальную уверенность в себе и чувство собственного достоинства. Что бы мы ни делали, уверенность — самое главное. Пока у нас есть уверенность, мы добьемся успеха, даже если сдвинем горы и заполним море»."
 GXC.endgame.123.a: "Продолжайте двигаться вперед."
 GXC.endgame.123.b: "А я думал, что это революция против старого порядка?"

 GXC.endgame.124.t: "Сишань и искусство"
 GXC.endgame.124.d: "Премьер Цзоу Лу — человек многих талантов. Завоевав репутацию своими способностями каллиграфа и писателя. Когда он не завален работой премьера, его обычно можно найти либо оказывающим покровительство начинающим художникам, либо работающим над своим следующим произведением. Фактически, совсем недавно премьер выпустил антологию своих работ, подробно описывающую историю Гоминьдана, революционных течений Гуандуна и Китайской революции в целом.\n\nЭта коллекция — просто один пример навыков премьера Цзоу Лу как настоящего человека эпохи Возрождения. Плодовитый писатель и поэт, он также сочинил целый каталог стихов и эссе. Черпая из китайской традиционной истории и смешиваясь с революционными настроениями, работы Цзоу получили новое внимание по мере роста его положения на национальной арене.\n\nЭто еще не все, артистизм Цзоу соединяется с артистизмом маршала Ли Лецзюня. Считающийся одной из самых неотъемлемых фигур Китая современной эпохи, Ли сумел провести свободное время, культивируя свои навыки Воина-Ученого в каллиграфии и поэзии. Прилежный практик официального письма, Ли — ученик товарища-революционера Тань Янькая, одного из великих Четырех мастеров каллиграфии.\n\nРабота Ли символична своей энергией и силой. Его надписи «Всегда счастлив и спокоен» в Пещере Фей на горе Лушань наряду с «Солнце и Луна висят оба» на Солнечном камне на острове Гуланъюй, Сямэнь, сумели выдержать испытание незапамятных времен. В конечном итоге, работы Ли, ведущие хронику его легендарной карьеры, простирающейся от Синьхая до нынешней эры, стали важными справочными материалами для китайского народа. Предоставляя уникально личные взгляды на Синьхай, Вторую революцию, Войну в защиту нации и Движение в защиту конституции, Ли действительно закрепил свое наследие."
 GXC.endgame.124.a: "Люди истинного таланта!"
 GXC.endgame.124.b: "Но застрявшие в прошлом..."

 GXC.endgame.125.t: "Вспоминая Сун Цзяожэня"
 GXC.endgame.125.d: "Все по всей стране знают, кто такой Сун Цзяожэнь. Было бы невероятно безвкусно называть его просто неудачником, ибо он был всего лишь светом, погасшим слишком рано. Идеалист, тот, кто верил в искренность человеческого сострадания, патриотизма и обожания своей страны. Сун постоянно отстаивал дело Тунмэнхоя, даже когда возникали личные разногласия между Сунь Вэнем и Хуан Сином. Его молчаливая рабочая лошадка, его самый прилежный разработчик, Сун тем не менее имел свои собственные амбиции.\n\nВыступая не за Пятивластную конституцию Сунь Ятсена, а вместо этого за свою собственную конституционную концепцию разделения властей, Сун аналогичным образом сплотился против вопиющего деспотизма Юань Шикая при первом же уведомлении, настаивая на парламентаризме.\nЗастреленный в Шанхае после выборов сообщником Юань Шикая, Сун в конечном итоге скончался позже в больнице в окружении Хуан Сина, Юй Южэня и Ляо Чжункайя. Однако он никогда не терял своего идеализма, так как даже в своем последнем завещании он поручил своим друзьям телеграфировать Юань Шикаю об убийстве, надеясь, что он станет мучеником, чтобы гарантировать, что Юань защитит гражданские права.\nЗначимость Суня для Сишань критична, так как конституционные парламентские идеалы и «система ответственного кабинета», продвигаемые Сунем, наряду с его официальным введением Цзюй Чжэна в Гоминьдан, доказали свою живучесть даже после его смерти. Тем не менее, некоторые деятели в Гоминьдане критиковали его поворот к электоральной политике как причину провала первой Революции.\n\nПредседатель Цзюй Чжэн, однако, не согласился с этим мнением. В речи, которую он произнес в честь человека, который привел его в Партию, он подтвердил демократическое наследие Сун Цзяожэня перед лицом тирании. Завершая под громкие аплодисменты, Цзюй ненадолго отошел от трибуны. Глубокий вдох. Взгляд в небо, день был ясным. Если он действительно хотел почтить Сун Цзяожэня и его наследие и продолжить борьбу своего наставника, ему предстояло еще много работы."
 GXC.endgame.125.a: "Шаг за шагом."

 GXC.endgame.126.t: "Спуститься с холмов"
 GXC.endgame.126.d: "\"Benevolence and love are the cornerstone of our culture, they are also the fundamental spirit of the Revolution. Without Benevolence and Love, we cannot find a rallying point and a fundamental base for Universal Harmony. Of course, our aim is to strive for the liberty and equality of our nation, and yet the ulterior aim is to promote the progress of mankind, and by common efforts of mankind, to establish peace in the World, with the responsibility resting with China.\n\nEver since the harkening of the revolutionary call through the formation of the Tongmenghui, the members of the current Western Hills Clique have always sought the freedom and betterment of their people through revolutionary means, devoutly loyal to the Guofu in all efforts. However, socialist infiltration caused the fracturing of the Kuomintang into petty infighting, extinguishing the true heart and soul of the party, the reason they fought and continue to do so; the People's Principles.\n\nThe Western Hills Clique however, naturally have their detractors that would accuse them of an uncompromising stance, betraying the revolution's vision for the future, yet is this peace not inherent to mankind? How can one strive for Datong whilst drawing daggers at his fellows, beholden to foreign ideology? Song Jiaoren sought constitutionalism, a parliamentary democratic republic. Whilst his light was snuffed out by assassination, his ideals continue to live on in all those that lay before us now.\n\nHaving worked to implement a legal system and constitution far surpassing that of their predecessors, [ROOT.GetLeader] and the rest of Western Hills continue to work towards the fulfillment of Tutelage, whilst laying the foundations for the future of parliamentary democracy. Hand in hand, together in full unity, the whole Party free of socialist influences shall finish what was birthed in Xinhai all those decades ago: fulfillment of the true ideals of both Dr. Sun Yat-sen and Song Jiaoren, a true Chinese Republic!"
 GXC.endgame.126.a: "\"I do not mourn for Mr. Song, but for the future of the country.\""

 ##RCF Events (140-159)

 GXC.endgame.140.t: "Наследный принц и его партия"
 GXC.endgame.140.d: "Пыль улеглась, и бразды правления взял новый Председатель. Сунь Фо наконец осуществил свою мечту, возглавив Партию своего отца и получив возможность исполнить его волю. Либеральный дилетант для одних, твердолобый для других, или просто продукт доброго имени своего отца и непотизма. Восхождение Сунь Фо на столь желанный пост Председателя Партии обрушило на всех его критиков залп его усердного и трудолюбивого жизненного этоса. Посвятив себя революционному движению с юных лет, Сунь постоянно отстаивал конституционализм и демократию, даже если он менял мнение относительно их точных сроков в рамках Национальной революции.\n\nТем не менее, его энергия с тех пор, как он стал Председателем, ощутима, поскольку он взялся за работу с юношеским рвением, что соответствует его репутации. Представляя новую страницу в истории своей Партии, страницу более демократического видения, Революцию, смягченную либерализмом и построенную на надежде. Демократия — не тот зверь, которого легко приручить, особенно в стране без демократических традиций, и не заблуждайтесь: Сунь далеко не так радикален, как его соратники, в своем подходе к Национальной революции.\n\nСунь, однако, зажат между двумя другими крупными гражданскими фракциями. Либеральный революционер, зажатый между более конституционно-консервативной кликой Сишань Цзюй Чжэна и ортодоксальной революционной кликой Старейшин Ху Ханьминя. Наследный принц Гоминьдана не лишен вариантов или ума. Прагматичный в выборе союзников, Сунь и фракция Реконструкции готовы заигрывать с Левыми, Правыми и Данвай. Оставаясь верным своим либеральным ценностям и видению отца, Сунь должен соответствовать высоким ожиданиям и взращивать демократическую традицию."
 GXC.endgame.140.a: "За отца и сына Гоминьдана."
 GXC.endgame.140.b: "И других его отцов-основателей."

 GXC.endgame.141.t: "Более равная деревня"
 GXC.endgame.141.d: "Вопрос земельной реформы, естественно, является одним из самых важных вопросов, которые должен решить Гоминьдан. Вдохновленный идеями своего друга и лоялиста, получившего образование в Америке У Шанъина, Председатель Сунь уже разработал обширный план земельной реформы, который включает три принципа.\n\nВо-первых, они пересмотрят налогообложение и земельные контракты крестьян и землевладельцев, скорректируют налоговую ставку, чтобы сделать ее более справедливой для всех, и освободят их от тяжелой рабочей нагрузки. Во-вторых, они направят эти средства на модернизацию сельского хозяйства, что позволит увеличить производство и принесет больше денег как правительству, так и простому человеку.\n\nВ-третьих, они будут контролировать продажу риса вместо торговцев и, следовательно, контролировать цены на продовольствие, улучшая жизнь людей и принося больше денег правительству. Это будет сделано путем того, что фермеры будут сдавать урожай напрямую правительству, а когда землевладельцы потребуют рис в качестве арендной платы, они могут просто направить землевладельцев к правительству, которое выдаст им половину аренды наличными, а другую половину — облигациями.\n\nПлан, конечно, не лишен критиков. Вопросы расширения бюрократии являются основными. Мы могли бы, конечно, пойти навстречу клике Сишань и провести земельную реформу, более соответствующую их видению, с меньшим государственным контролем на рынке и с фокусом на выделении земель и финансировании крестьян. Построение модели земельной реформы на просвещении крестьянства, а не на мандатах от правительства. Однако это важный вопрос для Председателя, который твердо верит, что его план — лучший для всего Китая."
 GXC.endgame.141.a: "Компромисс необходим, обратитесь к Сишань."
 GXC.endgame.141.b: "План Председателя Суня — лучший."

 GXC.endgame.142.t: "Инцидент с Salvation Daily"
 GXC.endgame.142.d: "Хотя он обычно изображает себя гражданским лидером или либеральным революционером, Сунь Фо, безусловно, завел много друзей как на высоких, так и на низких постах. Имея хорошие отношения с военными, такими как Чжан Факуй и Сюэ Юэ, Председатель также имеет менее приятных союзников. Печально известный гангстер Ду Юэшэн удерживал ряд потенциально скандальных историй о Председателе от попадания в центр внимания.\n\nВлияние Ду, однако, не безгранично. Газета Salvation Daily News, возглавляемая Гун Дэбао, была главным оппонентом Сунь Фо. Недавно они даже заявили, что у него был роман с шанхайской куртизанкой по имени Лань Ни.\n\nХуже того, прежде чем Председатель смог должным образом ответить на выдвинутые против него обвинения, Чжан Факуй и Сюэ Юэ решили взять дело в свои руки. Штурмуя редакцию, они потребовали немедленного опровержения статей. Salvation Daily отказалась это сделать, что привело к драке, в которой восемь работников получили ранения, а несколько печатных станков были уничтожены.\n\nХотя Сунь Фо немедленно осудил насилие, ответ оппозиции был быстрым и зажигательным. Цзюй Чжэн выступил с речью, в которой осудил Сунь Фо за то, что тот допустил насилие. Затем выступил Цзоу Лу, указав на лицемерие Председателя Суня, позиционирующего себя как поборника свободы слова, только чтобы попытаться задушить прессу, как только она обернулась против него. Даже ушедший в отставку Линь Сэнь прокомментировал инцидент и то, как Сунь «продемонстрировал явные недостатки как лидер и как муж». Хуже всего, однако, высказался Ху Ханьминь, который заявил, что Председатель Сунь был «не более чем ребенком, пытающимся выйти из тени своего отца и пятнающим его наследие в процессе».\n\nПредседатель, оправившись от шквала критики, запланировал речь, чтобы все объяснить, отвергая все заявления о каком-либо романе. Также он работал над осуждением насилия в редакции, заявив, что обеспечит справедливую компенсацию станции и что виновные будут наказаны."
 GXC.endgame.142.a: "Какая катастрофа."

 GXC.endgame.143.t: "Революция и массы"
 GXC.endgame.143.d: "Оглядываясь на первый Северный поход и причины его провала, Председатель Сунь Фо указывает на отсутствие народной поддержки Гоминьдана во время первого похода. Он заявил, что даже если второй Северный поход был успешным, Гоминьдан все еще должен заслужить поддержку рабоче-крестьянских масс и интеллигенции нации. С этой целью он создал крупномасштабную программу, которая научит рабоче-крестьянские массы значению Революции. Сотрудничая с Шэнь Цзюньжу и Хуан Яньпэем, Сунь намерен взрастить демократическую традицию.\n\nЦзоу Лу, член клики Сишань и бывший президент Университета Сунь Ятсена, осудил план как оппортунистический захват власти, не более чем популистский ход Сунь Фо в попытке увеличить свою собственную власть. Председатель, естественно, парирует аргументы Цзоу, заявляя, что программа послужит укреплению позиций всего Гоминьдана в массах, на службе партии в целом. Подготовив красноречивую речь «Революция и массы», Сунь представил свое опровержение:\n\n«Ранее военные не могли завоевать поддержку масс или стать защитниками масс. Это привело к провалу революции. Сила революции должна исходить от масс. Судя по нынешней ситуации, мы должны дать рабоче-крестьянским массам понять значение революции, чтобы наша революционная работа все еще имела надежду на успех».\n\nПосле попыток возражений со стороны других антипопулистов внутри партии сообщается, что Председатель проигнорировал всю остальную критику, ссылаясь на то, что доктрина Сунь Ятсена должна быть принята всеми китайцами. Те, кто выступает против такого понятия или включения масс в управление направлением партии, по мнению Суня, являются предателями, социалистами, монархистами, капиталистами, помещиками или невеждами, не имеющими истинного понимания духа Трех народных принципов."
 GXC.endgame.143.a: "За революционное будущее для всех!"
 GXC.endgame.143.b: "И позволить популизму править?"

 GXC.endgame.144.t: "Демократизация Партии"
 GXC.endgame.144.d: "Как один из Трех народных принципов, вопрос о том, как полностью реализовать Миньцюань (Демократию), часто занимает мысли Председателя. Он считает, что если Китай когда-либо станет настоящей демократией, Гоминьдан должен стать ею первым и вести страну личным примером. Однако нельзя реализовать Миньцюань, не рассматривая демократизацию собственной партии. Ибо слепой не может вести слепого.\n\nС этой целью он много говорил об олигархической власти, которой обладает Гоминьдан, и о том, как она должна быть разрушена изнутри, что лидеры должны признать, что они не могут вечно быть правящей кастой Китая, иначе Гоминьдан станет величайшей угрозой для собственной Революции. Партия должна показать людям не только словами, но и делом, своим действием. И через это действие нужно представить искренний демократический дух партии.\n\nЧерез масштабные реформы плюрализма и эгалитаризма, закрепление свободы слова для всех, позволяющее любому критиковать правительство и быть услышанным как внутри Партии, так и вне ее. Кроме того, он строго обеспечил честное поведение Гоминьдана в избирательном процессе, например, честное проведение всеобщих выборов. В основном это было вызвано собственным разочарованием и недовольством Суня местными выборами, спонсируемыми партией, на которых фиктивные голоса и подсчеты были обычным делом.\n\nРасширяя далее, Председатель предложил серию планов для установления демократии в стране. Люди должны иметь возможность избирать своих представителей в какой-либо форме, и эти представители должны выбираться по заслугам, а не по партийной лояльности. Ибо учения его отца предназначены не только для Гоминьдана, но для народа в целом."
 GXC.endgame.144.a: "Смелый шаг к демократии."

 GXC.endgame.145.t: "Джентри и Революция"
 GXC.endgame.145.d: "Джентри Китая образуют самый большой оплот против революционных целей Суня. Фактически, Председатель зашел так далеко, что заявил, что джентри были главной целью Революции, что они должны быть сметены, чтобы был создан новый и свободный Китай. Председатель Сунь считает, что многие движения к «местному управлению» в эпоху милитаристов были ничем иным, как присвоением демократических настроений джентри для укрепления собственной власти. Местные деревенские лидеры были главными драйверами местного самоуправления, но более пристальный взгляд на этих людей показывает, что они всего лишь мелкие автократы, желающие сохранить свою власть.\n\nЭти местные лидеры и мелкие бюрократы, безусловно, являются самой серьезной угрозой Революции. Чтобы вычистить их, Сунь Фо предложил план масштабной бюрократической реформы, сметающей местных джентри в пользу тех, кто действительно привержен демократии, реформируя командную цепь, чтобы она стала более плавной и менее громоздкой, и, наконец, закрепляя возможность для подчиненных говорить о злоупотреблениях и плохой работе, создавая систему принуждения для защиты тех, кто высказывается.\n\nОднако это только одна половина уравнения, другая половина заключалась в продолжении реформы образования, чтобы средний гражданин был должным образом обучен ценностям демократии и тому, как действительно сиять, вместо того чтобы с ним обращались как с еще одним винтиком в большой машине. Если бы они понимали свою собственную ценность, они бы отказались позволять джентри обращаться с ними как с машинами, ломая власть, которую удерживают джентри.\n\nЗадача Председателя также нелегка, поскольку репортеры утверждают, что за закрытыми дверями он дошел до того, что раздраженно заявил: «насколько мне известно, вряд ли можно найти одного из десяти этих местных лидеров, кто был бы порядочным гражданином. В целом, они просто плохие джентри. Фактически, они являются целью нашей революции. Иронично, что теперь они занимают ключевые позиции в нашем правительстве... Это именно те люди, которых мы хотели уничтожить с момента начала нашей революции, и все же они упорствуют»."
 GXC.endgame.145.a: "И так власть переходит от немногих к многим."
 GXC.endgame.145.b: "Но джентри поддерживали революцию с самого начала!"

 GXC.endgame.146.t: "Отец Нации"
 GXC.endgame.146.d: "В конце концов, мечта Сунь Ятсена о свободной, демократической и возрожденной Китайской Республике наконец сбылась. Революционный пророк, который провел большую часть своей жизни в изгнании, должно быть, имел свою долю сомнений, но никогда не терял веры даже в конце, что его Три Принципа будут теми, кто положит конец Веку унижений. Возможно, справедливо, что Сунь Фо стал тем, кто довел это до конца. Многие называли и будут называть старшего Суня своим наставником и вдохновителем в духе, справедливо, что у Отца Республики много поклонников. Но у него был только один сын, один верный сын, который выстоял, несмотря ни на что.\n\nДля Президента Суня, второго этого имени, это больше, чем просто сбывшаяся мечта. Со школьных дней, разделенный океанами и революциями от своего далекого родителя, у него часто не было ничего, кроме чтений и писем, присланных ему от старшего государственного деятеля, чтобы связаться с ним. Найти своего отца означало найти революцию, стать ведущим мировым экспертом по Вечному Премьеру благодаря энциклопедическому знанию учений последнего в сочетании с личной способностью расшифровывать уроки, которые другие пытались исказить. Теперь, хотя Гофу трагически не может быть рядом с ним в этот момент, он живет в духе через его работу, через его дух и через кровь, которая течет в жилах Сунь Фо.\n\nСунь Фо, конечно, больше, чем просто живой сосуд для работы своего отца. Будучи верным в исполнении последней воли Вечного Премьера, он также воплощает нечто большее. Свежее лицо для нового поколения партийного государства, молодой лидер для молодой республики. Впереди будет много камней преткновения в новую эру политической опеки, в значительной степени вызванную напряженностью между высокими обещаниями перемен Суня и его обещаниями демократии, но, возможно, это действительно может стать началом того многообещающего будущего, в котором было отказано прошлым поколениям."
 GXC.endgame.146.a: "Почтен своим единственным сыном."

###Section 5c (200-299): End Game LKMT Events

 ##Shared Events (200-219)

 GXC.endgame.200.t: "Красный Пьемонт"
 GXC.endgame.200.d: "С нашими знаменами, реющими высоко над большей частью нации, можно с уверенностью сказать, что мы ушли от обвинений в том, что мы всего лишь региональные правители родины революции. Выдвигаясь из Гуанчжоу в свете деспотичного Центрального Комитета, наши храбрые солдаты рисковали всем, чтобы убедиться, что Национальная революция и Китайское национальное государство спасены из пасти тирании. Исполняя первоначальную мечту, начертанную нашими предками и Гофу все эти годы назад, это должно быть время великого веселья.\n\nИ все же не может быть ничего, кроме великой скорби. Ибо брат убивал брата, и революционер, которому суждено было стать спасением народа, принес ему все больше страданий. С неисчислимой ценой для жизни, морали и инфраструктуры, годы, которые последуют, возможно, будут самыми решающими для нации. Ибо если путь к восстановлению будет скомпрометирован, судьба нации может последовать этому примеру."
 GXC.endgame.200.a: "Разделенный Китай должен объединиться!"

 GXC.endgame.201.t: "Революционные выскочки"
 GXC.endgame.201.d: "Непредвиденное как местными, так и международными наблюдателями объединение Китая под руководством [ROOT.GetRulingParty] посеяло хаос на национальной сцене, усугубленный изнурительной гражданской войной между братскими фракциями Гоминьдана, и с окончательным изгнанием [CHI.GetLeader] они утвердили себя как единственную социалистическую силу в Китае.\n\nС выходом [ROOT.GetLeader] на сцену национальной значимости, и без того ожесточенная контрреволюционная оппозиция Гоминьдану была усилена нашей межфракционной борьбой, когда остатки милитаристов и бандиты совершают набеги на наши гарнизоны и население. Хуже того, наши товарищи по оружию, всегда считавшие ветвь Лянгуан Левого Гоминьдана не более чем изгнанными выскочками, продолжают свою революционную борьбу против тех, кого они сочли узурпаторами партии, ведя затяжную кампанию партизанской войны против нашего ослабленного правительства.\n\nТакая подавляющая контрреволюционная активность оказывается почти непреодолимой для нашего нового правительства и грозит обрушить недавно утвердившихся революционеров одной лишь силой оппозиции."
 GXC.endgame.201.a: "Что ж, это довольно усложняет ситуацию..."

 GXC.endgame.202.t: "Коллапс Красной Армии"
 GXC.endgame.202.d: "Когда вся тяжесть гражданской войны и Национальной революции обрушивается на наше новое социалистическое правительство подобно цунами, меч и щит Гоминьдана, сам вестник нашего нового величия, наконец прогнулся под огромным стрессом, который он выдержал за время своего существования. Ведя славную войну во имя Революции против сил контр-Гоминьдана, Фэнтяня и их японских повелителей, иностранных империалистов и, наконец, своих собственных братьев и сестер по оружию во время гражданской войны, моральный дух абсолютно рухнул, а воля к борьбе была разбита кажущимся предательством Центрального Исполнительного Комитета Ван Цзинвэя. Некоторые дивизии НРА даже функционально открыто бунтуют против нашего правительства, сговариваясь с контрреволюционным сопротивлением, чтобы на каждом шагу наносить удары по любым официальным действиям.\n\nБудучи созданной как первичная социалистическая армия для Национальной революции, армия функционировала на желании видеть, как Три принципа доктора Суня будут приняты и осуществлены, однако совершение окончательного деморализующего акта борьбы со своими предполагаемыми товарищами разрушило все элементы идеологической согласованности, оставив НРА лишь оболочкой ее прежнего «я».\n\nНаиболее критичным для стабильности и дальнейшего существования правительства является то, что военное командование настоятельно потребовало от [ROOT.GetLeader], чтобы армия была приведена к покорности, иначе она разорвет нацию на части в своей ярости."
 GXC.endgame.202.a: "Наш революционный щит колеблется!"

 GXC.endgame.203.t: "Хаос экономики"
 GXC.endgame.203.d: "Молот ударил трижды. Мало того, что это накладывается на продолжающуюся контрреволюционную кампанию против нашего правительства, но и с разрушающимся состоянием Национально-революционной армии то, что когда-то было относительно одной из сильнейших провинциальных экономик в Китае — содержащей Жемчужину Юга, Гуанчжоу — превратилось в шатающийся труп, вялый и находящийся в упадке. Служивший главным центром поддержки и логистики для нашего развивающегося правительства, поток торговли через Гуандун, наряду с ресурсами и рабочей силой Гуанси, обеспечивал широкую поддержку нашему растущему контингенту Национально-революционной армии.\n\nВо время гражданской войны в партии, где товарищ сражался с товарищем в борьбе за исполнение истинной мечты доктора Суня, большая часть национальной инфраструктуры и промышленности была разрушена в ходе боевых действий, видя широкое использование в боях. Точно так же после завершения кровопролития многие городские центры за пределами нашего прямого контроля превратились в очаги сопротивления против [ROOT.GetLeader], что резко ограничило их возможности для экономической производительности.\n\nС центральной властью в руинах, бандитизм, насилие и местные милитаристы начали процветать в пустоте, оставленной нашим отсутствием, а иностранные инвесторы бегут из страны из-за широкой нестабильности, вызванной некомпетентностью правительства. Все это в совокупности препятствует способности Национального революционного правительства проводить свою столь почитаемую политику благосостояния, Миньшэн."
 GXC.endgame.203.a: "Подумать только, что все так обернется..."

 GXC.endgame.204.t: "Состояние радикальной оппозиции"
 GXC.endgame.204.d: "После политических и общественных последствий гражданской войны в Гоминьдане наша бюрократия была разбита по фракционным линиям, а некогда единые комитеты и советы Гоминьдана теперь пусты; места остались пустыми после тех, кто присоединился к Центральному Комитету или иным образом был арестован за связи с [CHI.GetLeader] и его кадрами.\n\nПо всей партийной доске те, кто связан с Сун Цинлин и Временным комитетом действий, те, кто входит в Ассоциацию реорганизованных товарищей Ван Цзинвэя, обожающие либералы под началом фракции Реконструкции Сунь Фо, и даже экстремистские радикалы под эгидой неуловимого Общества возрождения Китая — все они были отброшены в бездну [ROOT.GetLeader], заклейменные как контрреволюционные предатели.\n\nХотя не все полностью отвернулись от нашего правительства, так как некоторые заместители [ROOT.GetLeader] сумели обеспечить конкретный интерес в возвращении в политический мейнстрим — оливковая ветвь мира тем, кто в конечном итоге является нашими заблудшими товарищами. С их навыками и опытом, приносящими особую пользу Национальному правительству, можно многое выиграть от такого проявления милосердия, однако политическое поле битвы беспощадно и кроваво, и никто не знает этого лучше, чем [ROOT.GetLeader], поэтому вариант быть безжалостным всегда остается на игровом поле."
 GXC.endgame.204.a: "Мы не можем оставить ВКД на обочине."
 GXC.endgame.204.b: "АРТ все еще имеет полезные связи."
 GXC.endgame.204.c: "Фракция Реконструкции поможет нам наладить связи."
 GXC.endgame.204.e: "У наших яростных революционных товарищей из ОВК все еще есть потенциал."
 GXC.endgame.204.f: "Консолидировать политическое поле битвы."

 GXC.endgame.205.t: "Судьба наших революционных братьев"
 GXC.endgame.205.d: "Будучи преимущественно революционной силой с момента своего создания, Национально-революционная армия привлекала широкий спектр революционных мнений и взглядов, естественно сочетая это с жестким идеологическим приоритетом и безжалостной свирепостью, что привело к фракционно заряженной армии, ставящей политику выше нации. Хотя это дало силу, совершенно непревзойденную на поле боя, ибо они сражаются не просто за личное спасение, но за спасение самой нации, это также привело к износу способных солдат и командиров во времена политических распрей, таких как недавняя гражданская война.\n\nМногие яркие огни потенциала в высшем командовании оказались на противоположных сторонах от национального правительства, ломая его способность вести революционную борьбу. Хотя большинство идеологически противостоит нашему правительству, отвергая все предложения о возможной амнистии, остается ключевая часть более покладистых фигур из всей политической оппозиции, готовых отложить идеологические разногласия во имя служения национальному правительству еще раз.\n\nХотя их навыки и опыт оказались бы неоценимы в реконструкции НРА, это также может привести к политическим разногласиям, о которых [ROOT.GetLeader] и партия могут не знать, и поэтому всегда остается вариант продвижения нового поколения покорных офицеров, преданных не только Национальной революции, но и идеологически соответствующих новому правительству."
 GXC.endgame.205.a: "Приветствуем наших друзей из Временного комитета действий!"
 GXC.endgame.205.b: "Проявление милосердия к Реорганизованным товарищам."
 GXC.endgame.205.c: "Прощение либералов может оказаться полезным."
 GXC.endgame.205.e: "Красной Армии нужны молодые радикалы!"
 GXC.endgame.205.f: "Революции не нужны явные предатели."

 GXC.endgame.206.t: "Труд через реформы"
 GXC.endgame.206.d: "Якобы нация расколота, инфраструктура разрушена, дома пустуют или уничтожены, и все же ее люди остаются, готовые и податливые помочь в великой реконструкции Китая. Различные предложения были выдвинуты теми, кто более склонен к авторитаризму внутри партии, чтобы провести кампанию реконструкции, используя более чем доступный пул рабочих на государственных проектах, направленных на быстрое и эффективное оживление нации.\n\nХотя это считается значительным нарушением неотъемлемых прав рабочих, вопиющим злоупотреблением государственной властью со стороны многих в партии, сторонники таких идей яростно защищают необходимость таких решительных мер в эти критически тяжелые времена.\n\nТем не менее, продолжает существовать еще более жесткая оппозиция со стороны умеренных в нашей партии, называющих такие идеи полной отменой любых идеалов, привитых членам партии Тремя принципами доктора Суня. Такие распри могут привести к еще более ухудшающейся ситуации в правительстве, хотя многим наблюдателям кажется, что это вопрос не столько национального возрождения, сколько политического позиционирования."
 GXC.endgame.206.a: "Пусть они искупят нацию своей кровью и потом!"
 GXC.endgame.206.b: "Вопиющее злоупотребление государственной властью!"

 ##PPP Events (220-239)
 GXC.endgame.220.t: "Правительство для производящего народа"
 GXC.endgame.220.d: "Когда пыль улеглась, Партия производящего народа (ППН) вышла единственным победителем в гражданской войне в Китае. Из относительной безвестности Чэнь Миншу и его союзники теперь имеют полную свободу формировать Китай так, как они считают нужным. Несмотря на предательство Центрального Комитета Гоминьдана, Чэнь и ППН уже начали связывать свою легитимность с наследием Сунь Ятсена. В связанных с правительством газетах подчеркиваются связи между политикой ППН и тремя принципами Суня, при этом обычно утверждается, что ППН лишь стремится к исполнению его воли. Многие умеренные националисты начали стекаться под знамя ППН, признавая, что новый режим никуда не денется в ближайшее время.\n\nСам Чэнь Гунбо встретился с Чэнь Миншу, где Хромой генерал предложил лидеру АРТ помилование. Любезно приняв его, Ван вернулся домой в Фошань, навсегда уйдя из политики. В попытке укрепить репутацию ППН как Гоминьдана, Сун Цинлин была предложена должность председателя в новом революционном правительстве, но она отклонила предложение на том основании, что Чэнь Миншу предал наследие ее покойного мужа. Чэнь также предложил эту должность Ху Ханьминю и Цай Юаньпэю, оба также отказались. Однако не все в бывшем Гоминьдане последовали примеру Сун, избегая нового правительства.\n\nХуан Цисян, один из близких коллег Дэн Яньда, принял предложение присоединиться к революционному правительственному совету, высшему государственному органу разработки политики. Чэнь Южэнь, другой член лагеря Сун, стал министром иностранных дел. Сам Чэнь Миншу занял должность министра внутренних дел в дополнение к должности временного председателя, а его ключевой союзник Цзян Гуаннай занял роль директора экономической комиссии. Новое правительство пообещало оказать критически важную помощь крестьянам Китая и обеспечить процветание для всех."
 GXC.endgame.220.a: "Хромой генерал у власти? Какой странный поворот событий..."
 GXC.endgame.220.b: "И только для того, чтобы привести нас к гибели..."

 GXC.endgame.221.t: "Гармоничное распределение земли"
 GXC.endgame.221.d: "Интеллектуалы определили феодализм как систему, в которой экономика существования Китая играет доминирующую роль в китайском обществе. Среди членов партии принято считать, что система феодализма является одной из величайших несправедливостей в Китае, когда помещики заставляют крестьянство трудиться без какой-либо выгоды. Хотя прибрежные городские центры Китая вышли из феодализма и вступили в капитализм, большая часть Китая все еще трудится в феодальной системе.\n\nМногие в ППН родились в феодализме и, таким образом, мотивированы освободить своих земляков от этой угнетающей системы. С созданием Революционного правительства производящего народа, наконец, может быть проведено важное дело земельной реформы. Некоторые лидеры в ППН считают, что правительство должно перераспределить всю землю людям поровну, независимо от прежнего статуса. Остатки Третьей партии, а также бывшие члены АРТ и ВКД, которые стали более социалистическим крылом ППН, поддержали этот курс действий вместе с некоторыми своими дополнениями, стремясь к более «суньистскому» подходу, при котором реализуются некоторые аспекты принципа «земля пахарю», что позволяет крестьянам получать собственную землю для обработки, и что правительство предпримет шаги для постепенной национализации земли. Однако более умеренные члены ППН верят в гораздо более умеренную земельную реформу. В их глазах более консервативный подход к земельной реформе с гораздо большей вероятностью увенчается успехом и позволит избежать потенциальных последствий социальных волнений и хаоса, которые могут возникнуть из-за более утопических мер."
 GXC.endgame.221.a: "Распределить землю справедливо, независимо от класса!"
 GXC.endgame.221.b: "Умеренная земельная реформа звучит многообещающе!"

 GXC.endgame.222.t: "Единый фронт"
 GXC.endgame.222.d: "Новый Единый фронт состоит из гораздо большего ассортимента партий, чем старый под руководством Гоминьдана. Первыми двумя младшими партиями к Партии производящего народа были, конечно, Гоминьдан и Китайская синдикалистская партия. Руководство ППН приветствовало Гу Мэнъюя в своих рядах как главу АРТ, поскольку Ван исчез. Участие Хуан Цисяна в революционном правительстве обеспечило, что ВКД будет вторым после ППН по значимости в ЕФ, в то время как ЛКС был отодвинут на второй план.\n\nВ то время как Чэнь Шаоюй осудил Единый фронт как контрреволюционный фарс, Чэнь Дусю попытался спасти влияние КСП, работая вместе с лоялистами Тань Пиншаня над продвижением социалистической политики в правительстве. Фэн Юйсян также присоединился к Единому фронту со своей Гоминьцзюнь, организованной в Национально-революционную партию, присоединившись к Гоминьдану. Хотя многие скептически относятся к приверженности Фэна трем принципам и социализму, его помощь приветствовалась Гу Мэнъюем.\n\nВ дополнение к бывшему националистическому блоку Чэнь Миншу протянул руку нескольким либеральным партиям, которые были готовы сотрудничать с Партией производящего народа. Признавая движение Чэня гораздо более умеренным, чем социалистическое крыло Гоминьдана, Чжан Цзюньмай принял предложение Чэня, сделав ДЛК 5-м членом Единого фронта. Хотя ДЛК предпочел бы немедленное прекращение опеки, они надеются убедиться, что молодая республика не падет перед социалистическим авангардизмом или революционными перегибами. К удивлению всех, МКП под руководством Ли Хуана и Цзэн Ци также приняла предложение Чэня присоединиться к Единому фронту. Недоверяемая всеми другими партиями, кроме, возможно, гибкой НРП, МКП надеется обеспечить, чтобы новое правительство не слишком склонялось к классовой борьбе. С этим большим ассортиментом партнеров Чэнь Миншу надеется продвигать демократическую репутацию ППН и продемонстрировать свою приверженность плюралистическому правительству."
 GXC.endgame.222.a: "Только время покажет, сможет ли Чэнь управлять этой грандиозной коалицией..."
 GXC.endgame.222.b: "И сотрудничать с буржуазией!"

 GXC.endgame.223.t: "Конец Реорганизации?"
 GXC.endgame.223.d: "Хотя Чэнь Миншу и Партия производящего народа пообещали продолжение революционной миссии реорганизованного Гоминьдана 1924 года, многие задаются вопросом, действительно ли Хромой генерал намерен придерживаться этого курса. Именно реорганизация 1924 года увидела, как реакционные тенденции Гоминьдана были отброшены, заменены дисциплинированной структурой партии демократического централизма, готовой пронестись через Китай очищающим огнем революции. Несмотря на это, партия не была едина в том, как будет выглядеть видение националистического Китая.\n\nХотя все члены Гоминьдана были привержены идее Национальной революции и необходимому этапу опеки, партия продолжала страдать от чумы фракционности. Во время своего губернаторства в Гуандуне Чэнь Миншу подавлял радикальные левые элементы, что нажило ему немало врагов как среди АРТ, так и среди ВКД.\n\nТеперь, когда Чэнь вышел победителем («темной лошадкой») в хаосе предыдущих лет, такая необходимость в дипломатии отпала. Многие преданные революционеры опасаются за судьбу мечты Суня и реорганизации 1924 года. Под руководством Ван Цзинвэя в целом понималось, что целями Национальной революции было достижение социализма и подъем китайского народа. Однако при Чэне многие члены Гоминьдана сомневаются в приверженности Хромого генерала социалистической революции, а некоторые даже предположили, что он стремится отменить саму Реорганизацию.\n\nДействительно, многие из более либеральных членов Нового Единого фронта взяли на себя смелость подать петицию Чэнь Миншу с просьбой сделать заявление о провалах Реорганизации, в то время как большая часть Гоминьдана потребовала, чтобы он поддерживал революционный курс Гофу. Чэнь признает, что осуждение Реорганизации не сильно повлияет на политику его правительства, одновременно заслужив уважение различных либеральных элементов в его коалиции, хотя он рискует разозлить членов ГМД."
 GXC.endgame.223.a: "Новому Китаю не нужна Реорганизация 1924 года..."
 GXC.endgame.223.b: "Реорганизация была необходима для создания этого революционного государства!"

 GXC.endgame.224.t: "Чествование наших военных героев"
 GXC.endgame.224.d: "Всего несколько коротких лет назад наша нация была жалко разделена между апатичными правительствами и корыстными милитаристами. Благодаря НРА и 4-й армии Гуандуна десятилетиям междоусобиц был положен конец, и даже Век унижений может, наконец, закончиться. Чэнь Миншу, Цзян Гуаннай, Цай Тинкай, а также многие другие офицеры 4-й армии, возглавлявшие военные усилия по освобождению Китая, справедливо были названы спасителями Китая во время невыразимой тьмы.\n\nКонечно, такие военные люди должны быть вознаграждены за свой героизм. ППН уже начала разрабатывать дополнительные права и привилегии для всех ветеранов и служащих 4-й армии, а также солдатские пенсии для всех ветеранов в целом. Правительство справедливо увидело в этом возможность тонко продвигать свой собственный имидж среди населения и, таким образом, генерировать политический импульс для продвижения большей части своей собственной повестки дня. Кроме того, сохранение лояльной армии, которая пользуется большим уважением среди людей, обеспечит стабильность правительства на долгие годы."
 GXC.endgame.224.a: "Мы должны чтить этих революционных героев!"

 GXC.endgame.225.t: "Демократическая склонность"
 GXC.endgame.225.d: "Чэнь Миншу часто говорил о необходимости революционного правительства производящего народа, но многие задаются вопросом, что станет с демократией в этом новом Китае. Ни для кого не секрет, что Гоминьдан настаивал на однопартийном государстве, которое будет управлять государством в период опеки, и после неопределенного периода времени передаст власть и объявит выборы, когда люди будут обучены тому, как быть хорошими гражданами в демократической республике. Хотя Чэнь Миншу и ППН добились больших успехов в привлечении либеральных партий, которые были менее сговорчивы с революционным социалистическим правительством старого ГМД, именно ППН сохраняет истинную политическую власть в правительстве.\n\nМногие считают новый Единый фронт не чем иным, как PR-инструментом для ППН, чтобы доказать свои демократические намерения. Действительно, правительство по-прежнему состоит в основном из членов ППН, офицеров 4-й армии, бывших членов ГМД и небольшого меньшинства либеральных политиков. Все демократические институты, созданные с момента основания нового правительства, были, что неудивительно, неустойчивыми, и мало веры в то, что реальная демократия будет реализована в краткосрочной перспективе. Несмотря на то, что будущее демократии под вопросом, большинство китайцев довольны текущим положением дел, ибо ППН искренне стремится к улучшению китайской нации и всех ее граждан, что является радикальным улучшением по сравнению с хаосом эры милитаристов и доминированием Чжили."
 GXC.endgame.225.a: "Нельзя иметь истинную демократию без принципа Миньшэн!"
 GXC.endgame.225.b: "Очередной тиран, закутанный в плащ революции..."

 GXC.endgame.226.t: "Революция спасена"
 GXC.endgame.226.d: "Революция подобна невылупившемуся яйцу — шансы на то, что оно разобьется до того, как птенец вылупится, опасно высоки, и поэтому его нужно охранять с рвением и лелеять с осторожностью. Первая революция началась с Учанского восстания 1911 года, которое завершилось свержением декадентской династии Цин и установлением республиканского правления в Китае. Однако революция была предана Бэйянским правительством, и нация была ввергнута в хаос. В 1924 году революция получила новую цель в первой реорганизации ГМД. Однако революция была уничтожена на поле боя, растоптана немецким сапогом и затравлена оппортунистическими предателями.\n\nКогда революции снова, казалось, угрожал сам ГМД, который должен был ее воплощать, ППН пришлось вмешаться, чтобы обеспечить ее выживание. Там, где старый ГМД уничтожил бы буржуазию и подрывные элементы в китайском обществе, ППН применила подход «бархатной перчатки», подчинив своему движению сговорчивых либералов и социалистов. Да, Китай может быть не истинно социалистическим, но и революция не была подорвана либеральным влиянием. ППН остается верной себе, преследуя революцию по своему собственному замыслу, чтобы обеспечить общее процветание для китайского народа. Там, где когда-то коррумпированные коллаборационисты империалистов доминировали в Срединном королевстве, Революционное правительство производящего народа стремится исправить все несправедливости, совершенные в отношении Китая.\n\nОпека ППН — необходимое зло для революции, но она не будет длиться вечно. Партия производящего народа, как и ее основатель Чэнь Миншу, перенесла бесчисленные трудности и вышла из них еще сильнее. Как и сам Китай, Чэнь несправедливо страдал от окружающих и был оклеветан за попытку обеспечить лучшее будущее. Больше ни Чэнь, ни Китай не будут подчиняться несправедливым законам судьбы, больше Китайская Республика не будет скована империализмом, и да будет известно, что именно Чэнь Миншу привел нас к этому славному будущему!"
 GXC.endgame.226.a: "Троекратное ура Хромому генералу — и не только!"

 GXC.endgame.227.t: "Исцеление разногласий 4-й армии"
 GXC.endgame.227.d: "Хотя все, кто служит в Национально-революционной армии, разделяют цель принести истинное освобождение китайскому народу согласно доктрине Саньминьчжуи, 4-я армия остается уникальной среди всех армий НРА. Состоящая из кантонских офицеров, 4-я армия пользуется уровнем братства, который оставался верным независимо от линий фронта, занятых во время гражданской войны в Китае. Это правда, что Ли Цзишэнь, Чжан Факуй и Сюэ Юэ остались с Ван Цзинвэем и Нанкинским правительством, в то время как Чэнь Миншу и Цай Тинкай осознали безумие Центрального Исполнительного Комитета, но братство 4-й армии превосходит такие разногласия.\n\nРазве не 4-я армия стояла вместе в горах Миньгань более десяти лет? Разве не 4-я армия, объединенная революционным духом, защищала китайский народ Шанхая от гнева Империализма? Это действительно было общее братство 4-й армии, которое спасло Китай от темного десятилетия под властью Чжили и немецким господством, и которое продолжало служить в 4-й Национальной революции. Чжан Факуй и Сюэ Юэ оставались приверженцами сохранения истинных интересов Национальной революции, несмотря на неправильное руководство Ван Цзинвэя Партией ради самовозвеличивания, а Ли Цзишэнь руководил Вампу с достоинством и честью, которых заслуживало такое учреждение.\n\nЭто действительно была трагедия, что Чэнь Миншу и клика Индии оказались на противоположных сторонах во время раскола Нин-Юэ, но обе стороны знали, что их братья из 4-й армии просто сражались, чтобы искупить Национальную революцию. С окончанием эпохи братских войн и ожиданием эры процветания и равенства для Китая, само собой разумеется, что 4-я армия должна продолжать пастырство над нашей исцеляющейся нацией, со всеми сынами 4-й армии, стоящими на страже."
 GXC.endgame.227.a: "Мы, сыны Гуандуна, стоим вместе!"

 ##GPA Events (240-259)
 GXC.endgame.240.t: "Третий путь в Красном Китае"
 GXC.endgame.240.d: "С прекращением артиллерийского огня и сложением оружия катастрофическая гражданская война в Китае наконец-то с грохотом остановилась. Некогда архонт двух партий, а теперь громкий лидер революционной новой третьей силы в китайской левой политике, Тань Пиншань и его новая Федерация товарищей трех народных принципов (ФТТНП) выстояли. Будучи номинально изгоями с самого начала, Тань Пиншань и его союзники уже продвинулись вперед с расширением принципа «ты — мне, я — тебе» по отношению к разрозненным членам Временного комитета действий, Центрального комитета и Китайской синдикалистской партии, привлекая тех, кого привлекает эклектичный бренд социализма Таня, берущий компоненты как из аграрных элементов ВКД, так и из радикальных профсоюзных практик КСП.\n\nУже влиятельные фигуры Гоминьдана, такие как Чжан Боцзюнь и Пэн Цзэсян, выразили открытый интерес к переходу в лагерь Тань Пиншаня, однако наиболее заметными являются разрядки напряженности между Танем, Чэнь Гунбо, Дэн Чжунся и другими промышленными социалистами, чья предыдущая история совместной работы в КСП предполагает возрожденное партнерство между группировками; некоторые отчеты даже предполагают, что Чэню была предложена должность Председателя, хотя он и отказался.\n\nС его непреодолимой властью и возрождающимся революционным пылом новое правительство пообещало, что их новая модель социализма будет сформулирована так, чтобы обеспечить безопасность, процветание и счастье как для крестьянина, так и для рабочего, в идеальной гармонии."
 GXC.endgame.240.a: "Узрите истинные революционные идеалы!"
 GXC.endgame.240.b: "Доктор Сунь переворачивается в гробу!"

 GXC.endgame.241.t: "Земельная реформа в Новом Китае"
 GXC.endgame.241.d: "Всегда будучи занозой в боку любого национального китайского правительства, земельный вопрос был постоянно присутствующей фигурой в китайской левой политической сфере, определяемой ключевыми идеологами Временного комитета действий как экономическая система существования, в которой она играет доминирующую роль в китайском обществе. В такой системе доминирование помещиков не должно было быть сюрпризом, поскольку их способность контролировать как землю, так и труд, который ее обрабатывал, позволяла джентри и помещикам накапливать неподотчетное влияние на политическом поле битвы, что приводило к монополии власти. В то время как более модернизированные прибрежные районы Китая вступили в протокапиталистическую стадию, сельские провинции внутренних районов все еще борются и трудятся под этой деспотической феодальной системой, считающейся критической проблемой [ROOT.GetLeader], и именно его новой Третьей партии предстоит найти лучшее решение проблем китайского крестьянина и рабочего.\n\nКак предпочитают более радикальные члены паствы Тань Пиншаня, Чэнь Гунбо предложил радикальный подход к земельной реформе в отношении проблемы помещиков, при котором правительство методично принимает различные земельные законы, которые позволили бы национальному правительству законно изымать землю и радикально перераспределять ее среди своих работников. Для сравнения, более умеренные ортодоксальные последователи под крылом Тань Пиншаня выступают за следование принципу доктора Сунь Ятсена «Земля пахарю», позволяя крестьянству получать собственную землю для обработки, а национализация указанной земли будет происходить постепенно, при этом земля всех тех, кто считается злоупотребляющим крестьянством, подлежит изъятию. При таком процессе вопрос о владении землей будет решен без полного подчинения правительства популизму.\n\nВ разгар поиска своей опоры в социалистической политической мысли [ROOT.GetLeader] прислушался к обоим предложениям, возможно, отражая двустороннюю монету, которой является его идеология, ибо какая бы программа земельной реформы ни была выбрана, она может определить будущее китайского синдикализма."
 GXC.endgame.241.a: "Полный вперед с радикальным перераспределением!"
 GXC.endgame.241.b: "Более взвешенный подход сохраняет свои достоинства."

 GXC.endgame.242.t: "Переопределение китайского синдикализма"
 GXC.endgame.242.d: "После возрождения Гоминьдана в результате последствий Войны Лиги, младшая партия в Едином фронте, Китайская синдикалистская партия, хромала рядом со своим хозяином под глупым руководством Чэнь Дусю. Поскольку китайские рабочие и крестьянство представляют истинное гражданство Китая, они снова были сбиты с пути ложным пророком, ибо китайские синдикаты, призванные представлять их, просто отвечали либо Гоминьдану, либо Парижу и Лондону, будучи не более чем продолжением влияния Интернационала на китайском политическом поле битвы.\n\nБудучи вечно благодарным за усердную работу и смелые жертвы, принесенные людьми и материалами его европейскими товарищами, [ROOT.GetLeader] приступил к определению собственного бренда синдикализма Китая, ибо это страна, расколотая на два лика: капиталистического рабочего и феодального крестьянина. Недостатки Китайской синдикалистской партии и Гоминьдана выставлены на всеобщее обозрение, изобилуя противоречиями в их подходе к гражданству и будучи обязанными неприменимым идеалам.\n\nС такими откровениями китайские синдикаты и профсоюзы упиваются своей вновь обретенной истинной независимостью благодаря Федерации товарищей трех народных принципов, больше не зависящей ни от Гоминьдана, ни от Интернационала. Однако вопрос определения китайского синдикализма гораздо более серьезный, чем может показаться, и партия [ROOT.GetLeader] находится на очевидном перепутье, выбирая между его революционными промышленно-социалистическими связями, вдохновляемыми такими людьми, как Чэнь Гунбо, Дэн Чжунся и другими марксистами, или его умеренными аграрными связями, связанными с фигурами ВКД, такими как Чжан Боцзюнь, и другими теоретиками, подобно анархисту Лю Шифу."
 GXC.endgame.242.a: "Синдикализм с китайской спецификой?"
 GXC.endgame.242.b: "Огрубление революционных идеалов...?"

 GXC.endgame.243.t: "Призрак Временного действия"
 GXC.endgame.243.d: "Маня к своим предыдущим связям с Временным комитетом действий и их интерпретации Трех принципов, [ROOT.GetLeader] вложил всю свою политическую поддержку в умеренных внутри своей Третьей партии и их смесь анархо-синдикализма в духе теоретика Лю Шифу с дополнительными идеями и интерпретациями, предоставленными доктором Сунь Ятсеном.\n\nС новым смелым подходом к аграрным коммунам и участием крестьянства в Китайской революции, Федерация товарищей трех народных принципов доказала, что является истинным преемником роли, которую Китайская синдикалистская партия и Гоминьдан играли в политическом ландшафте, обеспечивая гармоничное слияние обеих партий в истинную идеологию, представляющую как рабочих, так и крестьянство.\n\nС усиленным вниманием к преодолению разрыва между двумя классами трудящихся, [ROOT.GetLeader] вознамерился продвигать цели общего пролетариата, в котором проблемы обоих решаются одинаково и как одним единым телом. Такие достижения даже привели к тому, что ведущие фигуры ВКД Сун Цинлин и Дэн Яньда выступили в поддержку нового правительства за переориентацию китайского революционного движения в действительно благожелательное."
 GXC.endgame.243.a: "Мы все хотим изменить мир..."
 GXC.endgame.243.b: "Истинные революционеры, теперь перебежчики..."

 GXC.endgame.244.t: "Истинные революционные средства в новую эру"
 GXC.endgame.244.d: "Сделав смелый новый шаг для Китайской революции, [ROOT.GetLeader] решил полностью принять свои марксистские верительные грамоты, продвигаясь вперед с радикальным синдикалистским крылом своей Третьей партии. Вдохновленный действиями, продемонстрированными Дэн Чжунся в борьбе за власть в провинции и более широкой гражданской войне, [ROOT.GetLeader] стремился установить радикально революционную интерпретацию синдикализма, сосредоточившись на развивающихся промышленных союзах в Китае.\n\nПолностью сосредоточившись на будущем уничтожении капитализма, был разработан ряд предложений, которые предусматривают дальнейшее создание городских союзов для дальнейшего укрепления пролетарского единства, наряду с поощрением крестьянства объединяться в широкую гармоничную массу, чтобы трансформировать доминируемые помещиками мелкомасштабные методы ведения сельского хозяйства нынешнего Китая в крупномасштабное пролетарское сельское хозяйство будущего Китая. В частности, Тань стремился к союзу с Профсоюзом машиностроителей во главе с Ли Дэсюанем и Чжу Цзинли — одним из крупнейших профсоюзов Гуанчжоу, чтобы укрепить анархо-синдикалистский единый фронт в Китае.\n\nДалее вдохновленная трудами Чэнь Гунбо, Федерация товарищей трех народных принципов выдвинула программу государственного капитализма, полностью сосредоточенную на мобилизации пролетариата для будущей классовой борьбы. С запланированным наводнением Желтых профсоюзов, национализацией ключевых отраслей, таких как железные дороги и горнодобывающая промышленность, наряду с национализацией внешней торговли, многие в контрреволюционной оппозиции бросали обвинения в тоталитаризме в адрес [ROOT.GetLeader], однако он отверг эту клевету, открыто заявив, что присутствие его и его Третьей партии обеспечит равное процветание для всех в Китае и неизбежное продвижение социализма."
 GXC.endgame.244.a: "Вы говорите, что хотите революцию?"
 GXC.endgame.244.b: "Тоталитаризм во всей красе!"

 GXC.endgame.245.t: "Новая культура"
 GXC.endgame.245.d: "В грандиозной попытке устранить коррупцию и воспринимаемых «врагов государства» из китайского общества и правительства, [ROOT.GetLeader] начал невероятно названные кампании «Три-анти» и «Пять-анти». «Три-анти» направлены против членов партии внутри его Третьей партии, бывших членов ГМД и КСП, наряду с любыми бюрократическими чиновниками, которые не имеют партийного членства ни в одной из трех предыдущих. Это следует целям очищения и обеспечения согласованности Федерации товарищей трех народных принципов Таня после недавнего притока членов.\n\nСледуя далее с «Пятью-анти», они сосредоточены на ликвидации частной собственности в стране, извлечении средств из частного сектора для поддержки китайских рабочих, а также на дальнейшем ограничении власти класса китайских капиталистов.\n\nС созданием последней кампании большому количеству кадров и обученных рабочих в ключевых отраслях частного сектора было поручено собирать информацию о деловых делах класса капиталистов, и началось расширение антикапиталистической пропагандистской кампании, чтобы обрушить сапог на воспринимаемых обидчиков рабочего класса.\n\nНаряду с этими кампаниями Дэн Чжунся призвал интеллектуалов реформировать свое мышление, прося их «вооружиться мыслью синдикализма» и «отбросить вульгарные перспективы индивидуализма и либерализма, а также культурную мысль европейско-американской реакционной буржуазии».\n\nПоскольку такие радикальные инициативы имеют место, многие за пределами правительственных партий выдвинули многочисленные критические замечания по поводу почти мегаломаниакального поведения [ROOT.GetLeader], обвиняя его в том, что он просто использует партийных чиновников, бюрократов, капиталистов и владельцев бизнеса в качестве козлов отпущения для дальнейшего укрепления власти себя и своей Третьей партии, но, как бы они ни старались, их крики остаются без внимания."
 GXC.endgame.245.a: "Отбросьте контрреволюционное мышление."

 GXC.endgame.246.t: "Налоги на сокращение земли"
 GXC.endgame.246.d: "В своих усилиях смешать практику синдикализма с Тремя народными принципами, [ROOT.GetLeader] искал советников и союзников в искоренении тиранической земельной ситуации в стране. Направляя приглашения своим старым союзникам из Временного комитета действий, таким как Сун Цинлин и Дэн Яньда, особенно яркий свет во тьме появился на радаре ФТТНП — это член КСП Лю Шаоци, известный своей храброй революционной работой в повстанческом движении Миньгань и острой инициативой по расширению своей партии за пределы ее традиционной базы городской пролетарской власти.\n\nИзвестный своими трудами, Лю опубликовал серию статей, призывающих новое национальное правительство продемонстрировать честные проявления земельной реформы посредством метода внедрения реформированного налога на сокращение земли, чтобы смягчить экономическое неравенство, в настоящее время испытываемое между китайским пролетариатом и землевладельцами. Видя общий консенсус согласия среди обоих крыльев своей Третьей партии, [ROOT.GetLeader] предложил Лю Шаоци полные полномочия в реализации такой программы, видя в этом золотую середину между идеалами его старых союзников из Гоминьдана и КСП и необходимым лекарством для китайского крестьянства и рабочих."
 GXC.endgame.246.a: "За равенство всех, кто ее делит."

 GXC.endgame.247.t: "Истинная Китайская Революция"
 GXC.endgame.247.d: "В национальной столице [Root.capital.getcapitalvictorypointname] Председатель Тань произносит грандиозную речь, чтобы начать Всекитайское собрание народных представителей [GetYear] года. На нем присутствует широкий круг лиц из партии Таня, анархо-синдикалисты, коммунисты, члены ЛКС и, конечно же, самые провокационные из членов союза Лиги — те, кто принадлежит к Китайской синдикалистской партии.\n\nВ 1925 году, когда Китайская националистическая партия объединилась с Лигой китайских синдикалистов накануне Северного похода, мало кто мог ожидать, что хрупкий союз между революционными партиями увенчается успехом. Действительно, именно провал Нанкинского правительства почти положил конец этому сотрудничеству. Но именно Тань упорствовал и преуспел в бедственном положении китайского пролетариата, революционного рабочего, который не просто будет сопротивляться цепям иностранных империалистов, но и пойдет единым революционным авангардом к достижению уничтожения капитализма.\n\nВпервые в истории Китая акт забастовки и воля рабочих были закреплены в недавно принятой национальной конституции — разработанной не кем иным, как Танем и его последователями. Председатель приказал провести масштабные реформы, стремясь улучшить средства к существованию и благосостояние рабочих и крестьян. По всей стране, в крупных промышленных городах, таких как Шанхай и Ухань, резко возросло количество комитетов и членство в профсоюзах среди рабочих.\n\nКонечно, будущее покажет, чего китайский рабочий сможет достичь в социальной революции. Тань пообещал, что китайская революция не должна ограничиваться только Восточной Азией, но что Китай должен помочь мировой революции против разрушительных путей капитализма. И так Тань смотрит на ликующую ассамблею; он знает, что через него он может проложить курс, отличный от демагогов КСП и ГМД, новый третий путь для Китая и мира, который наконец-то можно принять."
 GXC.endgame.247.a: "Какое чудесное будущее наконец-то."

 GXC.endgame.248.t: "Возвращение гуандунских марксистов"
 GXC.endgame.248.d: "Во время губернаторства Чэнь Цзюнмина в Лянгуане прогрессивный милитарист стремился улучшить образование и трудовые реформы в провинции, пригласив Китайскую синдикалистскую партию. Сделав это, он пригласил идеологов Чэнь Гунбо и Тань Пиншаня.\n\nИ Чэнь Гунбо, и Тань Пиншань стремились создать новое культурное пространство в Гуанчжоу, в котором они надеялись, что «новая культура» сможет дойти до местных интеллектуалов и масс. Они стремились создать общественный форум, в котором доминировала бы рациональность, новую систему образования, свободную от политических сил, и обновление массовой культуры. Этот общественный форум инициировал дебаты по спорным вопросам, таким как всеобщее избирательное право, гендерное равенство в образовании и отмена конфуцианского поклонения. Они приложили значительные усилия для обновления местной кантонской культуры, включая кантонскую оперу (юэцзюй) и кантонские народные песни (юэоу), двое мужчин даже написали новую драму «Билхай Ляньсян», чтобы раскрыть абсурдность патриархата и браков по договоренности.\n\nТеперь, когда Тань Пиншань снова у власти, он пригласил своих бывших товарищей из так называемой фракции гуандунских марксистов, включая Чэнь Гунбо — формального голосового идеолога Ассоциации реорганизованных товарищей Гоминьдана. Сбежав из Китая после гражданской войны, он был любезно приглашен Танем на платформе правительственной амнистии — Танем, который стремился снова работать со своим старым товарищем над принесением социализма в Китай."
 GXC.endgame.248.a: "Товарищи снова воссоединились."

 ##GFA Events (260-279)
 GXC.endgame.260.t: "Новые начинания"
 GXC.endgame.260.d: "Поскольку последние оставшиеся полки бывшего Нанкинского правительства предлагают свою капитуляцию, новое китайское правительство теперь контролируется Пэн Паем и его последователями, которые дистанцировались от прежнего режима Гоминьдана и попытались подчеркнуть свою собственную особую идентичность. Но они вряд ли являются единственными аграриями в Китае, и по мере того, как они поглощали другие популистские движения, конфликты росли.\n\nКитайская крестьянская партия Сычуани призывает к модернизации сельского хозяйства, видя в этом истинный путь к демократии и прогрессу, но также не решается принять более радикальные аспекты Гуандунской крестьянской ассоциации. Вместо этого они требовали справедливых цен на конфискованную землю и отвергали тактику запугивания помещиков. Их соперники в Сычуани, Китайская крестьянская либеральная партия, также влились в движение Пэн Пая. Будучи либеральными по своей природе, их члены проявили больший стимул к работе с новым Председателем.\n\nЛевые и центристы китайского политического спектра не единственные, кто требует сельской реформы. Поднимая похожее знамя, правые, такие как Шэнь Дэнъи (бывший социалист) и Лян Шумин из Ассоциации сельской реконструкции, также предложили свои услуги новому правительству; находя уши Председателя особенно восприимчивыми к сельской реформе в области здравоохранения, образования и производительности. Учитывая их консервативные идеологии, вероятно, что, хотя их голоса могут быть услышаны, к ним не обязательно прислушаются."
 GXC.endgame.260.a: "Мы должны быть готовы смягчить наше послание."
 GXC.endgame.260.b: "Мы не должны компрометировать нашу основную идентичность."

 GXC.endgame.261.t: "Земельная революция"
 GXC.endgame.261.d: "Богатая земная почва, ради которой китайский фермер и крестьянин трудится всю свою жизнь, наконец-то находится в руках истинно революционного пролетариата страны. В течение многих лет Гуандунская фермерская ассоциация под руководством своего смелого и революционного оратора Пэн Пая связывала китайскую феодальную земельную систему с системой империалистического капитализма. Теперь, с недавним объединением страны после победы народа над буржуазным и коррумпированным Нанкинским правительством и их союзниками-милитаристами, вопрос о земле вышел на передний план китайской политики.\n\nДля нового Председателя китайской социалистической республики классовая борьба является неизбежной частью — если не спутником — национальной революции. Для Председателя Пэна крестьяне делились на четыре класса: крестьяне-землевладельцы, полуземлевладельцы, крестьяне-арендаторы и сельские батраки. Врагами крестьян были милитаристы, бюрократы, компрадоры, помещики и реакционные интеллектуалы, в то время как революционные интеллектуалы рассматривались как революционный авангард и союзники пролетариата.\n\nНо поскольку революция достигла своего критического апогея с успехом крестьянства над буржуазным и контрреволюционным Гоминьданом, также встал вопрос о том, должна ли революция возглавляться в первую очередь крестьянством или же крестьянство и рабочий класс должны работать вместе в новом классовом союзе. В то время как у городских синдикалистов совсем другой сценарий революции, чем у крестьянства, с новым революционным правительством — работа с такими союзниками, как синдикалист Ян Инь, может помочь преодолеть разрыв между синдикалистской и аграрной революцией. Приглашение элементов КСП создало бы обновленный единый фронт, но на этот раз исключительно между рабочими и крестьянами."
 GXC.endgame.261.a: "Земля тем, кто её обрабатывает..."
 GXC.endgame.261.b: "Вместе в солидарности."

 GXC.endgame.262.t: "Невинность крестьянина"
 GXC.endgame.262.d: "Верно, многие признают, что китайский крестьянин невежественен; ему не хватает не только понимания современного мира — ему даже не хватает понятия Чжунхуа. Для многих социалистических интеллектуалов китайский крестьянин — это класс, чье сознание нужно пробудить — до тех пор нет надежды на успех в национальной революции.\n\nЧастые сравнения проводятся сочувствующими крестьянам, такими как Пэн Пай и его последователи в Гуандунской фермерской ассоциации, между уровнями пролетариата в китайском обществе — проводятся значительные различия между сельским пролетариатом крестьянства и городским пролетариатом. Зло и тьма ассоциируются с городами; необузданная преступность и моральная деградация гноят тускло освещенные улицы в таких городах, как Шанхай, в то время как в сельских городах много свежего воздуха и счастья. По мнению интеллектуалов, таких как Янь Янчу (Джеймс К. Йен), именно в деревне можно найти истинные «выжившие добродетели китайского народа»."
 GXC.endgame.262.a: "Поистине, нет никого, подобного простым людям!"

 GXC.endgame.263.t: "Необходимость революционного авангарда"
 GXC.endgame.263.d: "Признавая историю прошлых восстаний в Китае, таких как восстание тайпинов или восстание боксеров, социалистические интеллектуалы и революционеры останавливались как на успехе массового движения в восстании против тирании западного империализма, так и на их полном и катастрофическом провале после реакционного подавления. Для китайских социалистов, особенно тех, кто считает себя коммунистами, крестьяне и рабочие должны быть объединены по классовому признаку и возглавлены революционными интеллектуалами для преобразования их сознания.\n\nСиндикалисты считают, что рабочие должны возглавить рабоче-крестьянский союз — то есть профсоюзы, — но в действительности в партийном руководстве Гуандунской фермерской ассоциации вряд ли много организованных рабочих, способных возглавить синдикалистскую революцию. Большинство высших кадров Пэн Пая — интеллектуалы, получившие образование как в Китае, так и за рубежом, которые стремятся донести свои знания марксизма, социализма и революции до китайского пролетариата.\n\nВ ведущей марксистской теории, конечно же, именно революционные интеллектуалы участвуют в этих, казалось бы, неравных отношениях. Интеллектуал должен быть лидером, который приведет необразованного и угнетенного крестьянина к революционному катарсису. В это драгоценное время революционных перемен важно, чтобы китайский народ понимал, что вопросы и сомнения должны быть заглушены в пользу послушания и верности делу. Ибо именно дисциплина Партии поможет воспрепятствовать путанице, дезорганизации и разногласиям — и именно следуя за единым сплоченным революционным авангардом, истинная демократия и любовь смогут существовать раз и навсегда."
 GXC.endgame.263.a: "Лидер ведет, народ следует."

 GXC.endgame.264.t: "Культ Короля крестьян"
 GXC.endgame.264.d: "В своих усилиях сплотить крестьянство Китая сочувствующие крестьянам, такие как Пэн Пай и Шэнь Дэнъи, давно поощряли городских интеллектуалов устранять области различий между городским и сельским пролетариатом страны. Председатель Пэн давно инструктировал своих последователей использовать разговорный язык и одеваться просто, в одежду обычного крестьянина.\n\nНесмотря на номинальное недоверие и ненависть социализма к тому, что Маркс называл «опиумом народа», последователей Пэн Пая давно поощряли не проявлять неуважения к местным богам и духам предков. Хотя сам Председатель говорил, что это не обязательно означает, что Китай должен «капитулировать перед религиозными суевериями», он, тем не менее, поощрял политинструкторов и учителей уважать местные суеверия и верования. При этом по всей стране возник культ личности, и многие крестьяне ставили его как божество наряду с местными деревенскими духами; многие из них часто называли его «Бодхисаттва Пэн» или «Король крестьян». Учитывая важную роль Председателя в обеспечении победы простого народа, его последователи взяли на себя задачу продолжать сплачивание и поощрение этого нового культа нового социалистического председателя Китая.\n\nПэн Пай, возможно, сам происходил из семьи землевладельцев, но такое знание знакомо только тем, кто входит в его близкое окружение, или рассеялось в опасных слухах. Многие последователи Председателя, поскольку его движение сильно выросло, взяли на себя смелость переписать его личную историю; и вместо этого с момента его рождения настаивали, что Пэн Пай всегда был одним из лаобайсин."
 GXC.endgame.264.a: "Пусть люди верят во что должны..."

 GXC.endgame.265.t: "Сельско-городской разрыв"
 GXC.endgame.265.d: "Общий аргумент в современном китайском социализме касается двух основных вопросов. Первый вопрос — что определяет природу сельского Китая: производительные силы или производственные отношения. Некоторые ученые считают, что согласно марксизму, производительные силы формируют базу общества и, следовательно, определяют природу производственных отношений и природу общества. Поскольку многие новые сельскохозяйственные методы, оборудование и технологии были импортированы в Китай после промышленной революции, все больше и больше сельского крестьянства низводится до наемных рабочих и теперь участвует в том, что кажется капиталистическим обществом. В результате Китай является полностью капиталистической страной от своих сельских окраин до переполненных городских центров; и как таковые, фокусы революции должны быть полностью сосредоточены на ее сельских центрах.\n\nОднако другие, особенно в ортодоксальном крыле Китайской синдикалистской партии, утверждают, что Китай не является полностью капиталистическим — что производительные силы важны, но не так решительно значимы, как такие аспекты, как средства производства. Они видят Китай как феодальное некапиталистическое государство и что именно рабочие и профсоюзы должны вести революцию к ее следующему логическому завершению.\n\nОбе эти стороны признают, что капитализм проник в городскую экономику Китая, но борьба продолжается между социалистами по всей стране; где сосредоточить цели и выражения социальной революции. Склоняясь на сторону ортодоксального крыла китайской синдикалистской партии, Председатель Пэн мог бы счесть преимуществом примирение с профсоюзами городов и объявление плодотворных отношений между рабочими и крестьянами."
 GXC.endgame.265.a: "На полях Хайфэна родилась революция."
 GXC.endgame.265.b: "Это революция и рабочих, и крестьян!"

 GXC.endgame.266.t: "Деревня освобожденная"
 GXC.endgame.266.d: "В маленькой деревне в центре китайской глубинки, как только школьный звонок сигнализирует об окончании дня, пятнадцатилетний мальчик надевает свой красный галстук и выбегает за дверь вместе с остальными своими нетерпеливыми и полными энтузиазма одноклассниками. Несколько лет назад вряд ли можно было представить, что школа будет доступна для деревенских детей, так как веками было так, что в бедной деревне, подобной их, дети играли роль в полях. Но времена быстро изменились, и с тех пор средства к существованию жителей деревни, казалось бы, кардинально изменились к лучшему.\n\nНаправляясь домой, он приходит помочь своей матери на кухне местной коммуны. Несколько семей могут собраться в столовой коммуны, чтобы разделить общие трапезы под грандиозным портретом товарища Пэна. После еды комиссар местной коммуны воодушевляет ее членов пламенной речью, восхваляя еженедельное сельскохозяйственное производство коммуны и обещая, что к следующему месяцу они только утроят урожай. Комиссар хвалит юношу за его успехи в учебе и тяжелую работу в поле, чем он заслужил блестящую грамоту.\n\nВытирая пот со лба, вернувшись в поля, он не мог не думать о шепоте, который он слышал в школе в тот день, что один из учителей его школы, который не возвращался на работу три недели, по заявлению директора школы просто взял отпуск, чтобы изучать великие труды Председателя Пэна.\n\nОн отбрасывает эти мысли в сторону, вместо этого шепча тихую молитву благодарности Бодхисаттве Пэну за его руководство в принесении мира в местную деревню. В конце концов, в последние несколько лет они видели бесконечные раздоры и конфликты, теперь, наконец — наступил мир, и дни попрошайничества объедков с пола у злых буржуазных помещиков давно закончились. Он смотрит на заходящее вдали солнце и улыбается, зная, что его истинная амбиция — быть не более чем нержавеющим винтиком для славного революционного дела Председателя."
 GXC.endgame.266.a: "Нашей восходящей красной заре нет конца!"

###Section 5d (300-499): Endgame Dem UPC Events

 ##UPC Dem Shared (300-329):
 GXC.endgame.300.t: "Час федеральной демократии?"
 GXC.endgame.300.d: "Кто бы мог подумать, что скромное движение федералистов, возглавляемое интеллектуалами, действительно доведет дело до конца? Их амбициозные планы объединения путем голосования, несмотря на все оговорки, были завершены мечом, и все же их проект действительно только начинается. Тем не менее, предстоит еще много работы, но федералисты восстали из могилы 1920-х годов и шагнули вперед, чтобы демонстративно выступить против революционеров и милитаристов как единственная истинная представительная сила масс. От демократических социалистов до конфуцианских ученых, их мириады интерпретаций федералистского движения одинаково красочны и разнообразны.\n\nС опасениями по поводу Федерации, Конфедерации, роли провинции против роли государства, избирательной инфраструктуры, Границы и ее роли, и даже международного положения Китая на мировой арене, несомненно, у молодой республики полно дел. Тем не менее, все еще предстоит достичь поразительного прогресса в кратчайшие сроки. Поскольку различные провинции уже разработали свои местные конституции или почти накануне завершения процесса разработки, наконец настало время, как и предписано, для Объединенных Провинций разработать свою собственную национальную конституцию.\n\nСобрав самые светлые умы нации и представителей всех провинций, которые в настоящее время свободны от военной оккупации, сцена похожа на ту, что была во время испытания Конституции провинции Хунань. Объединение ярких доктринеров-федералистов, таких как Чжан Цзюньмай, Чжао Хэнти, Тан Цзияо, Чжан Шичжао, Ху Ши, Хуан Яньпэй и многих других, всех ради конечной цели процесса разработки конституции, несколько подняло дух.\n\nНо остается вечно нависающее присутствие того, что это, возможно, пик, возвышающийся над пропастью; можно ли действительно доверять различным союзникам, приобретенным на этом пути, в том, что они откажутся от своей власти? Можно ли усмирить милитаристов надолго? А что насчет революционеров, бесчинствующих вокруг?"
 GXC.endgame.300.a: "И так завершается Цайтгайст 1920-х."

 GXC.endgame.301.t: "Национализация армии"
 GXC.endgame.301.d: "Возможно, рассматриваемое самыми ярыми милитаристами и сторонниками провинциальной автономии как пускание пыли в глаза, официальное объявление о национализации армии под управлением Центрального правительства было сделано и уже полным ходом реализуется. С контролем над высшими эшелонами армии, твердо находящимся под управлением Армии Юэ и ее союзников, любая форма сопротивления мало что может сделать, чтобы действительно остановить их интеграцию в Центральную армию. И все же это не прекращает кипящую напряженность со стороны милитаристов и губернаторов, которые боятся потери своей военной мощи, но это и не внезапный вывод.\n\nКак то, что обычно считалось свершившимся фактом Великого республиканского альянса и Демократической лиги Китая, национализация армии давно была основным доктринальным компонентом их демократических теорий. При формировании Объединенных Провинций армии Китая будут реорганизованы в Армию национальной обороны, состоящую всего из четырех дивизий. Под командованием Министерства войны армия будет нести ответственность исключительно перед министерством за оплату, снабжение и назначение районов дислокации, при этом провинции освобождаются от какой-либо ответственности.\n\nС принудительной деполитизацией армии, национализацией провинциальных сил и мандатом на разделение властей между гражданской и военной сферами многие искренне верят в похоронный звон милитаризма. И все же, в равной степени есть те, кто наиболее яростно протестует против сокращения прав провинций. Чжао Хэнти и хунаньские федералисты провели тщательную кампанию против этого процесса, настаивая на том, что каждая провинция абсолютно должна сохранять свои собственные провинциальные силы для обороны, сродни национальной гвардии в Соединенных Штатах."
 GXC.endgame.301.a: "Дихотомия между Нацией и Провинцией углубляется."

 GXC.endgame.302.t: "Восстановление из разрухи"
 GXC.endgame.302.d: "Достаточно сказать, что китайская экономика никогда не была особенно сильным зверем. Даже не учитывая международное положение, китайский рынок долгое время был объектом желания, но не на благо его народа. Массы долгое время подвергались злоупотреблениям колониальной эксплуатации для сбора природных ресурсов Китая и экспорта их для экономической выгоды компрадоров и иностранных предприятий. Хуже того, сменявшие друг друга правительства держались на частом использовании иностранных займов, чтобы оставаться на плаву, или иным образом продавали себя иностранным партнерам. В сочетании с обширной милитаризацией, разрухой от войны, коррупцией, непрекращающимся налогообложением и ассортиментом многочисленных мелких проблем, удивительно, что нация избежала полного абстрактного банкротства.\n\nИ все это было до объединения. С завершением военных кампаний и началом кампаний по окружению, разработкой национальной конституции и поднятием провинциального правительства экономика рухнула на фоне общественного безумия.\n\nИностранные компании начали требовать свои долги, с определенной долей неопределенности относительно того, сможет ли правительство вообще полностью расплатиться. Инфляция взлетела до небес из-за вопиющего увеличения военных расходов, множество районов на передовой, таких как Дунбэй, были уничтожены в ходе боевых действий и еще больше ограничены из-за военной оккупации. И без того высокое налогообложение, усугубляемое инфляцией, привело к полному отсутствию каких-либо финансовых прогнозов, и, чтобы выжить, многие чиновники обратились к коррупции, чтобы прокормить свои семьи."
 GXC.endgame.302.a: "Они даже не дали нам момента передохнуть!"

 GXC.endgame.303.t: "Ухудшающееся здоровье нашего Отца-основателя"
 GXC.endgame.303.d: "Поскольку он уже довольно долго живет взаймы, стало совершенно очевидно, что здоровье Отца Нации, Чэнь Цзюнмина, далеко от стабильного. Хотя он с самого начала не вел особенно спартанский или здоровый образ жизни, у Чэня и раньше были проблемы со здоровьем; во время его пребывания в Гуанчжоу в начале 30-х годов. И в течение некоторого времени это стало еще более насущной проблемой. Он начал делегировать все больше и больше обязанностей своим сотрудникам, таким как Чэнь Яньшэн, Чэнь Цию, Ма Юйхан, Хуан Динчэнь, Янь Сичунь и другие. И они могут сделать очень мало, кроме как смотреть, как их ведущая фигура и друг угасает на своем посту.\n\nХотя Чэнь не особенно стар, ему тем не менее пришлось перенести невыразимый стресс для своего физического тела, руководя нацией в военное время, а до этого в 1920-х годах, когда ему приходилось руководить силами в набегах милитаристов, что усугубилось его ужасной иммунной системой. И в конечном счете время вышло — объявив по секрету нескольким своим соратникам, он обозначил свое намерение уйти из политики вообще после следующих выборов.\n\nОчевидно, новость распространилась как лесной пожар и в значительной степени способствовала ощущению политической нестабильности. Призывы к новой конституции и новым выборам, лишь приглушенные силой личности Чэня, усилились. Большую часть пыла внесла молодая гвардия, которая постоянно критиковала состояние федеральной демократии за отсутствие энергии; что их компромиссов и непрекращающегося градуализма высшего руководства ВРА и ДЛК просто недостаточно."
 GXC.endgame.303.a: "Вы хотите сказать, мы должны делать это без него?"

 GXC.endgame.304.t: "Объявление новых выборов?"
 GXC.endgame.304.d: "С принятием новой Федеральной Конституции возникли вопросы о текущем правительстве. [ROOT.GetLeader] был избран совсем недавно, по условиям новой конституции он имеет право на четырехлетний срок, который он еще не отбыл. [ROOT.GetRulingParty] утверждала, что проведение выборов так скоро будет дестабилизирующим и что им следует позволить полностью завершить свой срок.\n\nОппозиция, жаждущая еще одного шанса на власть, призвала к немедленным выборам, которые должны состояться через шесть месяцев. Их предложение быстро нашло поддержку у различных третьих партий, особенно тех, кто выиграет от проведения кампании в районах, недавно освобожденных правительством. В частности, они критиковали продолжающееся присутствие законодателей из неосвобожденных районов, которые часто были «избраны» из групп изгнанников, если не были прямо назначены Президентом.\n\nПрезидент [ROOT.GetLeader], понимая, что его блок в меньшинстве, предложил компромисс, согласно которому он отслужит оставшиеся два года своего срока. Он также обхаживал многих законодателей, которым самим предстоят трудные перевыборы, и обратился к другим, взывая к их чувству политической честности. Ведущие государственные деятели со всей национальной ассамблеи собрались в Президентском дворце, чтобы обсудить следующий курс действий Китая."
 GXC.endgame.304.a: "Выборы будут объявлены через шесть месяцев."
 GXC.endgame.304.b: "У Президента будет еще два года."
 GXC.endgame.304.b_tt: "§YВыбор этого варианта будет эквивалентен победе текущей правящей партии на второй срок!§!"

 #Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 GXC.endgame.310.t: "Рассвет федеральной демократии?"
 GXC.endgame.310.d.base: "Федералистский проект долгое время был идеалистическим движением, построенным на практике провинциальной автономии, местной демократии и обеспечении стабильности на международной арене. В результате он принял на себя невероятно тяжелую ношу разнообразных политических идеологий и колоритных персонажей. Анархисты, демократические социалисты, либералы, консерваторы и даже автократы или милитаристы взяли на себя мантию провинциалистского проекта. Объявив о своей отставке, Чэнь Цзюнмин оставил большой вакуум в политической сфере, даже не просто среди самой Партии общественных интересов, но и на широкой сцене.\n\nПартии начали бороться за заполнение пустоты, оставленной Отцом Республики, и все это время экономика вступает, возможно, в свой самый бурный период. Хуже того, кажется, что Федеральное правительство сделало шаг, чтобы отказаться от своих обещаний о Федеральной автономии. Под эгидой Президента была проведена мандатная «национализация» вооруженных сил, насильственно расформировывающая провинциальные силы и интегрирующая их в «Армию национальной обороны»."
 GXC.endgame.310.d.generic: "$GXC.endgame.310.d.base$\n\nС разработкой национальной конституции и ожиданием, что провинции последуют этому примеру, федералистское движение практически стало движением Гуанчжоуского мандата. Пока нация исцеляется от Войны Сопротивления, тем не менее, внутри [ROOT.GetLeader] и его ближайшего окружения присутствует чувство срочности, что, возможно, время созрело, чтобы заявить о своих собственных претензиях на нацию. Если мы не хотим быть низведены до унизительного положения просто еще одного федерального бюрократа, то нет лучшего времени, чем сейчас, чтобы нанести удар!"
 GXC.endgame.310.d.yunfed: "$GXC.endgame.310.d.base$\n\nКак уже было заключено в Юньнани, различные провинции начали быструю разработку или формализацию своих провинциальных автономий в ответ на призыв к созданию национальной конституции. И все же такое устройство оставило Хозяина Восточного Континента позади! При всех наших жертвах ради движения, кажется, что «Президент» [UPC.GetLeader] стремится украсть все лавры! В сочетании с национализацией провинциальных сил они, похоже, желают абсолютного сокращения любой власти Юньнани в национальном правительстве!\n\nКонечно, это нельзя так оставить? Может ли [ROOT.GetLeader] действительно ждать своей собственной эффективной политической экстрадиции? Герой нации, низведенный до простого бюрократа и генерала? Цай Э не ждал такого приговора, и, возможно, нет лучшего времени, чем сейчас, чтобы доказать, что Короли Юго-Запада все еще могут быть спасителями Республики!"
 GXC.endgame.310.d.hnnfed: "$GXC.endgame.310.d.base$\n\nДолгое время имея решительную и устойчивую провинциальную конституцию, возможно, даже самую успешную в федералистском движении, Хунаньское федералистское движение всегда было движением провинциальной автономии в высшей степени. Отличаясь от Юньнани, Сычуани, Гуандуна или Севера, Чжао Хэнти и Хуан Яньпэй гордятся почти конфедеративным характером своего федерализма. Но с процессом разработки национальной конституции, идущим полным ходом, кажется, что Гуандун намерен доминировать в шоу.\n\nУводя нацию от провинциальной автономии своим желанием национализации армии, они спровоцировали только самую сильную критику со стороны хунаньской федералистской интеллектуальной базы. Некоторые офицеры в командном составе предложили довольно наглую идею открытого восстания, последнюю стойку неповиновения. Но может ли Чжао Хэнти действительно пролить еще больше крови ради какой-то мелкой идеологической разницы? Если мы собираемся следовать этому курсу... нет лучшего времени, чем сейчас."
 GXC.endgame.310.d.szcfed: "$GXC.endgame.310.d.base$\n\nВ сущности, федералистское движение Сюн Кэу всегда было драматически затенено его современниками. Они видят в нем и союзника, и врага, возможно, жалкого неудачника? Человек, разрывающийся между двумя мирами: Революционным и Реформистским. Человек, чья собственная наивность стоила ему всего Королевства, и он никогда не мог вернуть себе свое положение, по крайней мере, до недавнего времени. Пережив невыразимую травму и невзгоды и даже будучи преданным Чэнь Цзюнмином в какой-то момент, в какой степени он действительно обязан своей верностью Гуанчжоуским федералистам?\n\nС их национализацией провинциальных сил это выглядело бы как последняя капля, чтобы изолировать Сюна до чисто провинциальной роли, до просто еще одного рядового солдата. С созданием национальной конституции и ратифицирующим ответом формализации собственной конституции Сычуани, Сюн и его Банда Девяти могли бы прекрасно выполнить роль своего Подготовительного офиса провинциальной федеральной автономии и удалиться. Но было бы это правильно? Просто подчиниться еще раз?"
 GXC.endgame.310.a: "Редко можно далеко уйти, играя вторую скрипку."
 GXC.endgame.310.b: "Мы приветствуем Президента [UPC.GetLeader]!"
 GXC.endgame.310.c: "Давайте отправим делегацию в столицу. (Переключиться на [UPC.GetNameDef])"

 GXC.endgame.311.t: "Восстание [FROM.GetAdjective]"
 GXC.endgame.311.d.base: "Вслед за реализацией федералистской мечты Китая и последующей отставкой Чэнь Цзюнмина партии в новой федералистской демократии Китая начали бороться за власть и поддержку по всей стране. В регионалистских настроениях кроется страх растущей централизации правительства (особенно после мандатной национализации вооруженных сил), коррупции в рядах правительства и страх доминирования кантонских политических клик. Поскольку сторонники [FROM.GetLeader] готовы подкрепить свои претензии оружием, гражданская война, вероятно, уже идет.\n\nЦентральное правительство, конечно, как ожидается, будет иметь значительное преимущество, контролируя крупные города Китая и обладая международной легитимностью (по крайней мере, на данный момент), что дало им больший доступ к займам, а также большую налоговую и людскую базу для призыва армии. Централизованная Федеральная армия, однако, все еще содержит много нелояльных регионалистов в своих рядах. Кроме того, регионалисты [FROM.GetAdjective] уверены в способностях своих сил и ожидают, что другие восстанут против тиранической диктатуры Центрального правительства. А Китаю не привыкать к потрясениям. В чем обе стороны могут согласиться, так это в том, что они не потерпят еще одной эры милитаристов."
 GXC.endgame.311.d.generic: "$GXC.endgame.311.d.base$\n\n[FROM.GetLeader] и [FROM.GetRulingParty] в последнее время были слабо связаны с федералистским движением, имея независимые, но, казалось бы, совместимые корни. Их национальные амбиции совпали с победой федералистов на Юге и оседлали ее волну к объединению. Теперь, однако, когда Центральное правительство пытается утвердить свою власть над своими бывшими союзниками, кажется, что [FROM.GetNameDef] просто не желает принимать федеральное доминирование."
 GXC.endgame.311.d.yunfed: "$GXC.endgame.311.d.base$\n\nЮньнань, юго-западный бастион республиканизма, с момента Синьхайской революции стал одним из главных прибежищ политических изгнанников и надеющихся, полных решимости реализовать мечту о Китайской Республике. Прошлые годы показали развитие уникального федералистского движения, отдельного от Гуандуна в провинции, но, похоже, годы растущей напряженности и разочарования привели к тому, что Юньнань осудила власть Центрального правительства. Ссылаясь на то, что общественный договор между провинциями в Конституции был нарушен, Юньнань фактически отделилась от Объединенных Провинций Китая и мобилизовала свои военные силы в рамках подготовки к борьбе с Центральной армией."
 GXC.endgame.311.d.hnnfed: "$GXC.endgame.311.d.base$\n\nХунань, долгое время имевшая решительную и устойчивую провинциальную конституцию, придерживается провинциальной автономии в высшей степени, гордясь погранично конфедеративным характером своего федерализма. Кантонское доминирование над разработкой конституции и их открытые амбиции национализировать провинциальные вооруженные силы спровоцировали их на открытое восстание, поскольку они отчаянно пытаются отбиться от хватки [UPC.GetLeader], пока не стало слишком поздно."
 GXC.endgame.311.d.szcfed: "$GXC.endgame.311.d.base$\n\nФедералистское движение Сычуани всегда было драматически затенено их современниками — и даже рассматривалось некоторыми как враг, вступая в конфликт с федералистами Юньнани и Гуандуна в разные моменты. Национализация провинциальных сил, по-видимому, стала последней каплей для них, стремящихся загнать их в чисто провинциальную роль. Отказываясь подчиниться директивам центрального правительства, [FROM.GetLeader] решил восстать в попытке переопределить федерализм на своих собственных условиях."
 GXC.endgame.311.a: "Милитаристы будут сокрушены."
 GXC.endgame.311.b: "Федералисты восстают друг против друга."

 GXC.endgame.320.t: "Чэнь Цзюнмин уходит в отставку"
 GXC.endgame.320.d: "С завершением долгожданного раунда выборов в стране и окончательным обнародованием проекта конституции заря начала заходить над легендарной политической карьерой Чэнь Цзюнмина. Истинный сын Хайфэна, рожденный в местной дворянской семье, Чэнь поднимался, чтобы встретить каждый вызов с решимостью и твердой верой. Обученный быть ученым и имеющий образование юриста, Чэнь оказался революционным генералом, политиком и героем, по крайней мере для тех людей, которые не были особенно близки к доктору Сунь Ятсену. Даже на склоне лет он продолжал усердно работать как для дела федералистов, так и для китайской демократии.\n\nНаконец, можно действительно сказать, что его тяжелый труд окупился. Завершив миссию своей жизни, Чэнь начал готовиться к уходу с политической арены, надеясь передать бразды правления новому преемнику, чтобы нести факел общественных интересов. Будь то Чэнь Яньшэн, Чэнь Цию, Е Цзюй, Сюн Люэ или Ма Юйхан, каждая фигура в партии признает довольно большие туфли, которые нужно заполнить в отсутствие Отца Нации. Надеясь провести свои славные дни со своими пятью дочерьми и восемью сыновьями, многие верят, что молодой Чэнь Динъянь, возможно, сможет продолжить политическую волю семьи Чэнь в далеком будущем.\n\nТем не менее, у Президента есть одна последняя обязанность, которая требует его пристального внимания. Приводя себя в порядок перед камерой, Чэнь совершит еще один исторический момент в истории Китая: первую в стране телевизионную речь Президента. Хотя природа такого события горькая, с общим ощущением завершения эпохи. Произнося пронзительные формальности о федеральном правительстве, правлении демократии и передаче факела новому поколению, Чэнь на мгновение задумался...\n\nВ хаотичном вихре мыслей, которые танцуют в его голове, одна сияла ярко как день. На какой ноте должно закончиться его пребывание в качестве лидера народа? Какое последнее послание он хочет передать?"
 GXC.endgame.320.a: "Что народ всегда должен поддерживать ПОИ."
 GXC.endgame.320.b: "Что нация должна всегда оставаться сильной и бдительной."
 GXC.endgame.320.c: "Что дух демократии должен поддерживаться."

 GXC.endgame.321.t: "Чэнь Цзюнмин скончался"
 GXC.endgame.321.d: "Рикошет скорби разлетелся по всей стране сегодня. Отец Федеративной Республики и вечный лидер ее политики в конечном итоге уступил неумолимому течению времени и возраста — возможно, единственному зверю, который мог бы свалить такую титаническую фигуру китайской истории. Почитаемый по всей стране, скромный уход Чэнь Цзюнмина в Хайфэн после завершения его монументального срока руководства видел мало активности в промежутке. В основном довольствуясь тем, чтобы проводить столь необходимое время со своими детьми, с редкими приглашениями друзей в свое скромное жилище, Чэнь оставался в значительной степени в стороне от национальной политики. Отставка — это действительно отставка, и ею очень редко наслаждается государственный деятель, который все еще пользуется очевидным уважением большинства нации.\n\nЗанимая в некотором роде неформальную президентскую роль, несмотря на все его лучшие пожелания уйти в отставку, он в значительной степени жил поразительно взаймы. В момент былой слабости казалось, что великий уравнитель нанес удар.\n\nСраженный сильным приступом брюшного тифа, хрупкое тело Чэня едва могло выдержать. Навещая Чэня в то время, Ма Юйхан и Чжун Сюнань могли только смотреть, как Чэнь в беспорядочном и прикованном к постели состоянии мог только бормотать извинения за то, что покинул свою семью, и невнятные упоминания «Республика! Республика!». После его кончины двое мужчин накрыли его тело флагом Пяти рас, и его похороны — сначала частное дело, перед национальным объявлением и минутой молчания — состоялись в последующие дни.\n\nЕго мемориальная запись содержала сочинения от его товарищей, таких как Чжан Луцунь и Чэнь Яньшэн, другие от общественных деятелей, таких как Бай Цзяньу или У Чжихуэй. Многие пришли от зарубежных китайцев, и в частности, одно прибыло от Хуан Гуйчжи, которая хвалила Чэня за его работу в феминистском движении. Похороненный на холме Цзывэй в Хуэйчжоу, Чэнь навсегда остался в городе, который видел начало и конец его пожизненной борьбы за демократическую республику."
 GXC.endgame.321.a: "Его наследие — это демократия и свобода."
 GXC.endgame.321.b: "Его наследие — это сила и стойкость."
 GXC.endgame.321.c: "Его наследие — это наследие всей нации."

 ##DSP Events (330-359):

 GXC.endgame.330.t: "Первая семья ДСП"
 GXC.endgame.330.d: "На приеме в 1923 году, устроенном пекинскими культурными кругами в рамках подготовки к визиту Тагора, Чжан встретился взглядом с Ван Шиин, выпускницей китайского факультета Пекинского женского педагогического колледжа, и влюбился с первого взгляда. В ней было что-то, кроме ее физической красоты, что пленило Чжана. Интеллект и остроумие Шиин, ее способность вести долгие политические дискуссии и ее литературный талант в видных студенческих журналах очаровали Чжана, который начал постоянную переписку с увлеченной студенткой, на тринадцать лет моложе его.\n\nНесмотря на первоначальную нерешительность в отношении ухаживаний Чжана, они продолжали сближаться, и к 1925 году Ван приняла предложение Чжана, и они поженились. У них родилось пятеро детей, к сожалению, пятый ребенок умер в раннем детстве из-за болезни. Поскольку теперь Президент Чжан проводит свои дни, запершись в своем кабинете и со своим кабинетом министров, Ван Шиин взяла на себя ответственность за воспитание Первой семьи.\n\nБрат Чжана Гунцюань — видный банкир, свободно владеющий французским языком и разбирающийся в природе шанхайской политики. Проработав в банковской индустрии два десятилетия, Гунцюань был вознагражден постом в кабинете Чжана — диктуя растущую индустриализацию китайской нации.\n\nЛюбимая сестра Чжана, Юи, была близка с Президентом с юности, когда Цзюньмай пообещал позаботиться о ней после того, как их мать посетовала, что никто не женится на Юи за отказ бинтовать ноги. После краткого периода преподавания немецкого языка в Сучжоу она взяла на себя управление Шанхайским женским коммерческим сберегательным банком и спасла его от почти полного банкротства. После реструктуризации она открыла компанию по производству одежды и занялась торговлей акциями, став одной из самых успешных деловых женщин Китая. Теперь, когда ее брат стал Президентом Китая, она заняла партийный пост в управлении финансами ДСП."
 GXC.endgame.330.a: "Первая семья Нации."

 GXC.endgame.331.t: "Размышления Премьер-министра"
 GXC.endgame.331.d: "Как новый Премьер-министр Китая, Чжан Дунсунь также был занят, недавно опубликовав три статьи, описывающие его политические взгляды и понимание. Неудивительно, что они были встречены как одобрением внутри ДСП, так и критикой извне Партии.\n\n«Мысль и общество» и «Разум и демократия» сочетают социологию с эпистемологией, широкими мазками рисуя полотно интеллектуального любопытства в отношении уникального метанарратива. В этих статьях он описывает капитализм как экономическое явление и состояние общества, но осуждает его как идеал. Скорее капитализм был инструментом для роста и развития, необходимым шагом в Китайской революции, но не особенно тем, который мог бы действительно освободить китайский народ.\n\nВ «Демократии и социализме» Чжан пишет, что социализм — это идеология и идеал, но, в отличие от капитализма, берет свое начало в христианстве. Социализм — это жестокосердное христианство, а христианство — это мягкосердечный социализм, пишет он. Действительно, все социальные реформы восходят к коллективному желанию найти спасение, причем марксизм является одной из этих возможностей достичь духовного освобождения, которое вытеснит капитализм. Однако Чжан уклонился от классовой борьбы, выступая вместо этого за мирную реконструкцию. В конце концов, именно в этом потерпела неудачу революция Гоминьдана. Быть демократичным означало быть конфуцианским моралистом, движимым любовью и страстью ко всем классам, расам и странам.\n\nИз этих принципов экономическое равенство будет достигнуто не перераспределением или революцией, а увеличением производства. Общество, движимое прогрессом и эстетикой, станет обществом, где царят разум, природа и воспитание. Естественно, труды Чжана вызвали критику как со стороны консерваторов, так и со стороны социалистов. Премьер-министр отверг этих критиков, ссылаясь на то, что его исследования предлагают комплексный план национального восстановления. С Чжан Дунсунем у руля вместе с Чжан Цзюньмаем, есть ли действительно кто-то, кто может им противостоять?"
 GXC.endgame.331.a: "Идеалистический мечтатель, еще не столкнувшийся с реальностью."

 GXC.endgame.332.t: "Новая мысль для древней нации"
 GXC.endgame.332.d: "Теперь, как направляющая рука нации, опыт Чжан Цзюньмая как педагога доказывает свою эффективность, поскольку его кабинет планирует свою политику по образованию будущего китайской нации.\n\nЧжан считает, что образование может быть либо «прямым», либо «косвенным». Прямые средства образования относятся к школам и университетам, в то время как косвенными средствами образования могут быть библиотеки, кинотеатры, музеи, театры и радио. Изучив немецкую модель образования и некоторое вдохновение от социалистических французских стандартов образования, Чжан Цзюньмай предложил профессиональное обучение для рабочих и трудовые академии для рабочих и крестьян, чтобы помочь им, возможно, поступить в университет (наряду с ночными и вечерними школами).\n\nВпервые познакомившись, как и многие другие, с социализмом во время Движения 4 мая, Чжан Дунсунь также был активен в своем продвижении социализма. Премьер-министр читал лекции в известных университетах, таких как Пекинский университет и Цинхуа, где он выступал за принятие страной социалистических принципов. Он осудил кровожадную революцию автократического Гоминьдана, но скорее утверждал, что социализм — это общее направление общественного развития, которое может быть достигнуто классами мира, работающими в тандеме. Шаг за шагом, кирпичик за кирпичиком, социализм может быть достигнут волей масс без необходимости насильственной революции, но сталелитейными заводами растущей индустриализации. По мере того как люди будут богатеть, они, естественно, будут работать вместе, чтобы гарантировать, что плоды доброй земли будут разделены со всеми."
 GXC.endgame.332.a: "Президент Чжан приведет нас в рай."

 ##PIP Events (360-399):
 GXC.endgame.360.t: "Возвышение клики Юэ"
 GXC.endgame.360.d: "Поскольку правительство Гуанчжоу распространилось на все уголки Китая, мелкие разногласия между региональными фракциями становились все менее и менее значимыми по мере того, как их новое национальное правительство начало обретать форму. К лучшему или к худшему, контроль над центральным правительством всегда давал лидерам мощный центр тяжести для формирования нации по своему вкусу, и из администрации [ROOT.GetLeader] возникает так называемая «Клика Юэ».\n\nЭта Клика Юэ, названная в честь Гуандуна, откуда родом большинство ее основных членов, является наследием правления сильной руки Чэнь Цзюнмина. Чэнь на протяжении своей десятилетней политической карьеры смог привлечь в свою орбиту множество групп и институтов, и хотя он с тех пор ушел из политики, [ROOT.GetLeader] занял его место в этом сплетении кантонских политических фракций.\n\nКлика Юэ, когда она едина, обладает огромной властью, особенно на китайском юге, где впервые укоренилось федералистское движение. Чэнь Цию, Чэнь Яньшэн и Гуан Вэньсэнь командовали теперь уже расширенной политической машиной Партии общественных интересов, которая теперь доминирует в Великом республиканском альянсе и сохраняет сильное влияние на партийный аппарат, сообщество зарубежных китайцев и межпартийное взаимодействие.\n\nВ центральном правительстве ветераны клики Армии Юэ укомплектовывают большую часть высшего военного командования, а такие офицеры, как Е Цзюй, Сюн Люэ и Ян Куньжу, продвигают своих протеже на руководящие должности. Благодаря контролю [ROOT.GetLeader] над Президентством, Клика Юэ во главе с Ма Юйханом также заполнила бюрократию лоялистами и оппортунистами со всего Китая. Правительство также пользуется поддержкой многих крупных финансовых институтов благодаря своим связям с торговцами, джентри и банками, которые жаждут стабильности, которую может обеспечить центральное правительство.\n\nВнутри Клики Юэ идет много борьбы между различными фракциями. Но для посторонних наблюдателей часто может казаться, что они всегда будут ставить интересы своей Клики на первое место."
 GXC.endgame.360.a: "Партия и ее местные связи управляют движением."
 GXC.endgame.360.b: "Бюрократия и военные контролируют рычаги власти."
 GXC.endgame.360.c: "Доминирование Клики Юэ порождает негодование..."

 GXC.endgame.361.t: "Искусство и кино в Китае"
 GXC.endgame.361.d: "С 1920-х годов особым увлечением Партии общественных интересов — разделяемым многими другими в Китае — было культурное возрождение. В то время как конфуцианство, Новая культура и другие темы высокого уровня остаются предметом жарких дебатов среди китайских интеллектуалов, существует широкая поддержка переориентации на деятельность «мирного времени», такую как кинопроизводство и искусство.\n\nВ то время как киноиндустрия Китая в значительной степени доминируется Шанхаем, создающим такие эпопеи, как «Судьба в слезах и смехе», кантонские фильмы вызвали особый национальный интерес. Такие релизы, как «Маленький круг», «Любовь опасна» и «Армейская мечта», укоренились. Продукция Хунмэнь, такая как «Девушка Золотых ворот», также получила внимание.\n\nТочно так же художественные выставки рассматривались как часть «социального образования» правительства Гуандуна для людей. Знак как современности, так и традиции, национальное правительство под руководством [ROOT.GetLeader] инвестировало в различные художественные фонды, выставки и конкурсы. Правительство попыталось продвигать разнообразный выбор стилей, включая традиционное китайское и искусство западного стиля.\n\nОсобого внимания заслуживает «Школа живописи Линнань», возглавляемая тремя мастерами Гао Цзяньфу, Гао Цифэном и Чэнь Шурэнем. Вдохновленные западными художественными стилями и революционным динамизмом Синьхайской революции, они стремились создавать искусство под влиянием природы, интегрируя китайские, японские и западные техники и стили. Они основали художественные институты, такие как Художественная академия Чуньшуй в Гуанчжоу, и вдохновили других художников, таких как Чжао Шаоан, Ли Сюнцай, Гуань Шаньюэ и Ян Шаньшэнь. Наряду с кантонской оперой и гуандунской музыкой, школа Линнань считается одной из «Трех красавиц Линнань»."
 GXC.endgame.361.a: "Пусть Китай разовьет свой собственный Голливуд!"
 GXC.endgame.361.b: "Искусство и культура поднимают наш народ на новые высоты."

 GXC.endgame.362.t: "Работа Хуан Цяна"
 GXC.endgame.362.d: "Хуан Цян, также известный как Мо Цзин, является своего рода человеком эпохи Возрождения — швейцарским армейским ножом для Чэнь Цзюнмина и Армии Юэ. Выпускник Военной академии Баодин, он участвовал в Синьхайской революции. После этого он учился за границей в Европе, прежде чем вернуться домой в Гуанчжоу, чтобы служить под началом Чэнь Цзюнмина, курируя таможню.\n\nОн стал доверенным лицом Чэня, следуя за ним во время его поездки по долине Янцзы. Чэнь выбрал его своим представителем на переговорах, в том числе в дискуссиях с кантонскими деятелями по поводу различных кризисов, связанных с Лу Жунтином и Сунь Ятсеном. После того как Чэнь потерял власть в 1925 году, он служил в Национально-революционной армии Гоминьдана во время Северного похода в качестве штабного офицера в Фуцзяни, прежде чем вновь присоединиться к Чэнь Цзюнмину, когда тот поспешно собирал кантонские силы, чтобы противостоять тотальному доминированию Гуанси над Лянгуаном.\n\nВ течение десятилетия Чжили Хуан работал на острове Цюнъя и полуострове Лэйчжоу в качестве связного, помогая в различных проектах строительства и развития. Он также начал свою деятельность как социолог, публикуя материалы о своей исследовательской работе в Цюнъя. Затем Хуан последовал за правительством Гуанчжоу, когда оно начало свою кампанию освобождения, занимая различные руководящие должности, в том числе работал управляющим руководителем различных городов и регионов, военачальником в Армии Юэ и представителем в конституционном конвенте.\n\nСтарший советник Президента, но без большой личной поддержки, он занял нишу своего рода нейтральной фигуры во внутриполитической борьбе Клики Юэ. Однако он искал более значимую должность, чем быть прославленным помощником Президента. Одним из предложенных проектов является общенациональное исследование Китая, хотя он также нацелился на престижную должность посла во Франции, поскольку он свободно владеет языком благодаря своему детскому образованию во французской католической школе и университетскому образованию в Лионе. И то, и другое удалило бы его из [GXC.Capital.GetCapitalVictoryPointName] и оставило бы Президента без помощника."
 GXC.endgame.362.a: "Мы с нетерпением ждем результатов вашего исследования, господин Хуан."
 GXC.endgame.362.b: "Поздравляем с назначением, господин посол."
 GXC.endgame.362.c: "Ваша преданность ценится и будет вознаграждена здесь, дома."

 ##UPC Dem Epilogue Events (400-429):

 GXC.endgame.400.t: "Истинная демократия"
 GXC.endgame.400.d: "Что такое демократия, в конце концов? Со времен Синьхайской революции многие наблюдали и, возможно, даже верили, что китайский народ просто неспособен достичь демократии. Что власть, исходящая от народа и для народа, является лишь далекой мечтой, замаскированной реальностью военной мощи и автократии.\n\nУвы, этот миф был побежден руководством Демократической социалистической партии, которая привела коалицию идеалистов и демократов к истинной национальной революции. Революции, которая не является ни так называемой «классовой борьбой» марксистов, которая лишь порождает хаос и анархию, ни революцией, которая подчиняет волю народа всемогущему партийному государству. Реализуя новое будущее Китая, лидеры ДСП, Президент Чжан Цзюньмай и Премьер-министр Чжан Дунсунь, вместо этого оглядываются на блестящие лекции Лян Цичао. Это будущее создается идеей истинной Национальной демократии. В конце концов, в концепции управляемой диктатуры есть свои достоинства. При Национальной демократии, в то время как одна партия может оставаться доминирующей, другие партии могут свободно бросать вызов и обсуждать политику с потенциальной возможностью также подняться на вершину.\n\nНи материализм, ни западный либерализм не могут достичь китайской Национальной демократии. Специфическая природа этой революции понимает и принимает, что руль нации должен управляться сверху теми, кто обладает высокими моральными качествами и пригодностью, кто продемонстрировал способность к воспитанию растущего демократического сознания.\n\nКритики могут спросить, как долго продлится это устройство? ДСП пообещала реформы и изменения в свое время, но также настояла на том, что, учитывая шаткое положение младенческой демократии Китая, почва свободы должна поливаться терпением и пониманием, пока цветок сливы свободы не будет готов расцвести. Хотя ни Президент, ни его Премьер-министр не могут представить, когда наступит этот день, до тех пор их твердая рука будет вести нацию..."
 GXC.endgame.400.a: "Пусть ДСП ведет Китай в великое будущее."

 GXC.endgame.401.t: "Ветры компромисса"
 GXC.endgame.401.d: "После Синьхая бурлящая республика расцветала волной идеалистического энтузиазма. Однако первые выборы стали не триумфом свободы и прогресса, а насмешкой над свободой, когда Президент Юань Шикай убил победителя выборов Сун Цзяожэня. Это кровавое дело определило, как будут происходить все будущие переходы власти в Китае с этого момента, и республика погрузилась в хаос. Однако новая республика восстановила некоторый уровень идеализма среди населения. Первые выборы увидели, как партия демократической революции, ПОИ, была вознаграждена населением.\n\nОднако, когда их крупнейший соперник ДСП выиграл следующие выборы, Старые федералисты уступили место ДСП без капли крови. Этот мирный переход власти заложил многообещающее начало для новой республики, хотя будущее далеко от безопасности. Многие все еще боятся, что одна из двух крупных партий в конечном итоге захватит власть и установит однопартийное правление, а другие недовольны де-факто двухпартийной системой, которая укоренилась. Несмотря на это, многие все еще надеются, что дела будут продолжать улучшаться, и текущий уровень демократии уже рассматривается как достижение.\n\nДСП под руководством Чжан Цзюньмая и Чжан Дунсуня принесла с собой свои предвыборные обещания и цели в коридоры власти. В то время как ДЛК представляет собой коалицию демократических партий, разделяющих определенные цели, именно Демократическая социалистическая партия ведет стадо, факт, хорошо известный Президенту Чжану. Чжан Цзюньмай намеревается создать социал-демократическое государство во имя Лян Цичао и по образу СДПГ. Чжан Дунсунь надеется воплотить свое гильдейско-социалистическое утопическое видение Китая и сформировать класс буржуазных джентльменов, который послужит политической элитой Китая и ступенькой к реформистскому социалистическому обществу. Чжаны несут ожидания своих сторонников и ответственность за пастырство над нацией, и время покажет, выполнят ли они свои обещания."
 GXC.endgame.401.a: "От китайского Вашингтона к китайскому Адамсу?"

 GXC.endgame.402.t: "Построение лучшего будущего"
 GXC.endgame.402.d: "После Синьхая бурлящая республика расцветала волной идеалистического энтузиазма. Однако первые выборы стали не триумфом свободы и прогресса, а насмешкой над свободой, когда Президент Юань Шикай убил победителя выборов Сун Цзяожэня. Это кровавое дело определило, как будут происходить все будущие переходы власти в Китае с этого момента, и республика погрузилась в хаос. Однако новая республика восстановила некоторый уровень идеализма среди населения. Первые выборы увидели, как Чжан Цзюньмай и его ДЛК сместили временное правительство во главе с ПОИ, что стало большим потрясением.\n\nОднако Чжан не мог оставаться президентом вечно. ПОИ одержала великую победу над ДЛК на вторых выборах республики, и Президент Чжан уступил место победителям. Этот мирный переход власти заложил многообещающее начало для новой республики, хотя будущее далеко от безопасности. Многие все еще боятся, что одна из двух крупных партий в конечном итоге захватит власть и установит однопартийное правление, а другие недовольны де-факто двухпартийной системой, которая укоренилась. Несмотря на это, многие все еще надеются, что дела будут продолжать улучшаться, и текущий уровень демократии уже рассматривается как достижение.\n\nПОИ, в отличие от ДСП, не полностью движима видением своего основателя Чэнь Цзюнмина. Во время правления Чэня в Гуандуне он шел на компромиссы как со своими левыми, так и с правыми, что привело к формированию коалиции консервативных джентри и реформистских социалистов у его ног. В то время как [ROOT.GetLeader] изначально надеялся сохранить этот баланс сил, союз ВРА с различными партиями истеблишмента и федералистами в значительной степени только укрепил правый фланг ПОИ, и партия все больше и больше признается партией истеблишмента, с влиянием, переплетенным с местными влиятельными лицами и военными. Несмотря на это, китайский народ жаждет увидеть, что может сделать старый герой войны."
 GXC.endgame.402.a: "Республика приливов и отливов."

 GXC.endgame.403.t: "Партия Вашингтона"
 GXC.endgame.403.d: "Во многих отношениях китайское федералистское движение долгое время стремилось подражать тому, что продвигали авантюрные предки Американской революции. Партия общественных интересов и ее вечно верный проводник Чэнь Цзюнмин, в образе Джорджа Вашингтона, выдвинули долгожданное освобождение китайского народа из жалких тисков деспотизма Бэйяна.\n\nНикогда не действуя так самодовольно, чтобы быть корыстным, Чэнь вечно работал над улучшением жизни масс, чтобы достичь, возможно, величайшего политического наследия в современную эпоху. В отсутствие тех, кто не мог, Чэнь в конечном счете смог и бросил вызов всем законам условности. Пацифист и генерал, анархист и государственный деятель, революционер и реформист, он человек многих диаметров, и таковой является его Партия общественных интересов.\n\nОставленная под управлением его давнего секретаря, тихого серого кардинала Чэнь Цию, и партийного человека Чэнь Яньшэна, ПОИ фактически попала в дилемму. Проповедуя демократию, с одной стороны, они, тем не менее, создали величайшую политическую машину, которую когда-либо видела нация. Победа на двух выборах подряд наряду со стратегическими альянсами с различными милитаристами-федералистами Юго-Запада и огромным влиянием в отношениях с зарубежными китайцами позволили им доминировать на общественной сцене.\n\nФактически они стали постоянным институтом республики в целом; обширный контроль над назначениями в правительстве, применение связей в армии при необходимости и вечно нависающий культ личности вокруг «китайского Вашингтона» Чэнь Цзюнмина — все это способствовало тому, что критики называют «фиктивной демократией».\n\nОппозиция, будь то остатки старого порядка или ДЛК, вынуждена кланяться и играть в игру ПОИ. И их союзники в ВРА чувствуют себя не лучше. Даже если бы они каким-то образом ушли от власти, след китайского Вашингтона и его партии неизгладим."
 GXC.endgame.403.a: "Выборы свободны, но насколько они честны на самом деле?"

 GXC.endgame.404.t: "Кантонский Бэйян"
 GXC.endgame.404.d: "История Китайской Республики может казаться цикличной. Могущественный силач, обещающий принести мир и порядок, реализовать грандиозное видение будущего и спасти республику от самой себя, захватывает власть. Он сплачивает своих солдат, умасливает интеллигенцию, заискивает перед элитами и будоражит простолюдинов в своем стремлении к власти. Чэнь Цзюнмин и Клика Юэ были лишь последними в череде революционных генералов, тянущейся от Юань Шикая, чтобы пройти этот путь.\n\nБременем Е Цзюя стало продолжение последних шагов республиканского пути Синьхая. Преемник Чэня (возможно, неадекватный) смог использовать культ личности первого и свой статус давней, верной правой руки Чэня, чтобы взять власть и стабилизировать падающую республику. Хотя некоторые оплакивают «трагические» обстоятельства удаления его предшественника и его прихода к власти, никто не может отрицать, насколько эффективным был Президент Е в закреплении влияния Клики Юэ.\n\nБудь то в исполнительных министерствах, национальной ассамблее, армии, провинциальных правительствах или даже в сообществах зарубежных китайцев, Клика Юэ и их соратники являются регулярным аспектом современной китайской политики. Действуют ли они как ПОИ, ВРА или как «патриотические независимые», они выполняют волю Президента, поскольку он клянется защищать конституцию любой ценой, даже если этой ценой может быть молодая федералистская демократия Китая. Что могут сделать другие партии, кроме как изо всех сил стараться быть полезными и выскрести нишу, вращаясь вокруг нового порядка Юэ?\n\nДля многих, несмотря на их падение перед южанами, Бэйянская республика никогда не умирала — она была просто заменена. Тем не менее, китайская политика может быть цикличной, но люди все равно надеются, что дела пойдут лучше. Мир — это никогда не плохо, и это первый шаг к лучшему будущему, не так ли?"
 GXC.endgame.404.a: "Сначала мир и верховенство закона, демократия последует."

 ##Dem Back Sliding Events (430-459):
 GXC.endgame.430.t.zhang: "Правительство Чжана падает"
 GXC.endgame.430.t.chen: "Правительство Чэня падает"
 GXC.endgame.430.d: "Это назревало давно. Возможно, это была в основном вина [ROOT.GetLeader], или, может быть, ему просто не дали достаточно времени, чтобы воплотить свое видение в реальность. Возможно, виноваты внешние силы, или, возможно, это были усугубляющиеся неудачи правительства. Кто-то говорит, что [ROOT.GetRulingParty] двигалась слишком быстро, кто-то говорит, что слишком медленно. Как бы то ни было, поддержка министерства [UPC.GetSecondInCommand] наконец достигла дна.\n\nСлух о вотуме недоверия быстро распространился в Национальной ассамблее, и под давлением военных предложение было быстро принято. Премьер-министр [UPC.GetSecondInCommand] сделал все, что мог, чтобы наскрести голоса для спасения своего правительства, но к концу недели он остался без работы вместе с остальным своим кабинетом. Старшие офицеры из Клики Армии Юэ надавили на Президента, чтобы тот назначил Ма Юйхана на его место, но, видя неизбежное, [ROOT.GetLeader] предпочел уйти в отставку в знак протеста, чем продолжать служить бессильной марионеткой.\n\nПосле нескольких часов обсуждений генерал Е Цзюй был избран «временным» Президентом вместе с Чжун Сюнанем в качестве его Вице-президента. Как и ожидалось, Ма Юйхан был назначен Премьер-министром, и он вместе со своим кабинетом из ветеранов Армии Юэ, беспартийных технократов и некоторых светил ПОИ был быстро утвержден Национальной ассамблеей.\n\nМножество ведущих интеллектуалов возмущены откатом демократии, но они мало что могут сделать на данном этапе, кроме как выразить символические протесты. Массовые митинги, на которые надеялись экс-Президент и другие идеалисты, так и не материализовались, так как большинство давно смирилось с судьбой республики и опустило головы. Новое правительство обещает восстановить стабильность в республике и защитить конституцию, но они тоже будут разочарованы холодным безразличием широкой общественности."
 GXC.endgame.430.a: "Демократия в нашей федерации получила мощный удар..."

 GXC.endgame.431.t: "Парламент Юэ"
 GXC.endgame.431.d: "С завершением конституционного конвента и ратификацией большинства провинциальных конституций были объявлены общенациональные выборы в национальную ассамблею. Новый парламент будет приведен к присяге через шесть месяцев, хотя все, кроме самых упрямых идеалистов, признают, что состав Исполнительной ветви власти останется прежним.\n\nДействующий президент, Е Цзюй, не сталкивается с серьезными соперниками на пост Президента, новая конституция или нет. Он и его «Клика Юэ» (некоторые баллотируются по списку ПОИ и/или ВРА, некоторые как независимые) легко выиграют выборы в большинстве округов — выезжая на наследии Чэнь Цзюнмина. Что бы интеллектуалы ни думали об этом сейчас, факт в том, что он доказал эффективность поддерживаемого военными сильного лидера, который может сочетать прогрессивные, утопические послания с использованием связей истеблишмента — то, что Е Цзюй надеется повторить перед лицом отставки Чэня.\n\nСитуация напоминает старую Аньхойскую клику, где Дуань Цижуй объединил мощного военного лидера, тщательный гражданский аппарат в своем клубе Аньфу и многочисленные другие фракции, вращающиеся вокруг них, чтобы доминировать как в национальной, так и в местной политике. Клики Чжили и Фэнтянь последовали по их стопам, легитимизируя свое правление, помещая своих лидеров непосредственно в Президентство, и теперь, по-видимому, Клика Юэ делает то же самое — что уместно, учитывая участие Аньхойской клики в раннем федералистском движении и основании ВРА.\n\nРеакция на предстоящие выборы была сдержанной. ДЛК наименее доволен ситуацией и поклялся выставить конкурентоспособный список кандидатов везде, где сможет. Однако их самые воинственные члены уже увидели, что их деятельность ограничена, и большая часть их высшего руководства начала самоцензуру в своих рядах. Для старых Бэйянских партий, привыкших к такому положению дел, старая игра продолжается. Они намерены пережить шторм, как они всегда это делали, удерживая свои опорные пункты и прагматично работая с новыми повелителями Китая."
 GXC.endgame.431.a: "Силачи приходят и уходят, но Бэйян, по-видимому, вечен."

###Section 5e (500-599): End Game Auth UPC Events

 ##UPC Auth Shared (500-529):
 GXC.endgame.500.t: "Триумф Армии Юэ"
 GXC.endgame.500.d: "Пока звучат победные горны, и рядовые маршируют все так же славно к своим домам, много похвал должно быть воздано Армии Юэ. Считавшаяся основным компонентом более крупной национальной армии, она вынесла на себе основную тяжесть боев и принятия стратегических решений во время Объединительных войн и Второй японо-китайской войны. С невыразимыми разрушениями, нанесенными нации, эти храбрые бойцы стояли вызывающе, сопротивляясь врагу и защищая свою родину. Теперь, когда молодой мир начинает устанавливаться по всему Китаю, Армия Юэ остается в ожидании, пока вся нация смотрит на конституционный конвент, проводимый в [GXC.Capital.GetCapitalVictoryPointName].\n\nВ столице собрались делегаты от всех составных партий Великого республиканского альянса — а именно ученые-конституционалисты, такие как Хуан Яньпэй или Чжан Шичжао, — наряду с членами Демократической лиги Китая — с заметными участниками, такими как Чжан Цзюньмай, Чжан Лань и Шэнь Цзюньжу, — и различными Независимыми от конституционалистов или такими, как Ху Ши. Сбор светлых конституционных умов нации был полон шумных дебатов вокруг конституционной специфики и мелочей. Все это время на нем в значительной степени председательствовал и доминировал Чэнь Цзюнмин и его ближайшее окружение.\n\nХотя это и не строго конституционный вопрос, слишком знакомая проблема, по крайней мере для тех, кто имеет корни в Тунмэнхуэе, была поднята снова. Соображения о национальном флаге были подняты более хардкорными членами Клики Юэ, настаивающими на том, что, поскольку именно ВРА объединил нацию, он должен получить должное вознаграждение, а партийный флаг ПОИ должен служить национальным флагом. Однако такая идея была яростно оспорена большинством других присутствующих партий, даже Чэнь Цию, все из которых настаивают, что такое решение предполагает Данго Гоминьдана, а не Китайскую Республику."
 GXC.endgame.500.a: "Навеки мы — Республика!"
 GXC.endgame.500.b: "Поднимите высоко «Колодезные поля»!"

 GXC.endgame.501.t: "Угасающий свет"
 GXC.endgame.501.d: "Пока нация подсчитывает свои потери и постепенно работает над внедрением национального федерализма, можно было бы подумать, что Президент будет купаться в славе, вести нацию вперед через это время реконструкции. И все же образ, отбрасываемый Чэнь Цзюнмином, далек от образа победоносного героя военного времени. Присутствуя на многих встречах Национального конституционного конвента, многие из присутствующих отметили обширную зависимость Чэня от своих помощников и близких союзников, наряду с его довольно хрупким и бледным видом. Далекий от сходства с амбициозным и молодым утопистом в начале Эры милитаристов, время было не особенно добрым к лидеру федералистов.\n\nКонечно, доверенные лица Президента понимают его постепенное ухудшение. Переутомление, стресс, краткий период изгнания — все это сложилось в его собственное болезненное осознание: он живет взаймы. И все же предстоит сделать так много работы! Нация едва видела реализацию Федералистского проекта, не говоря уже о многопартийной демократии! Если бы он ушел в ночь, не выполнив ни одной из своих целей, какое наследие он должен был оставить? Отец Нации, но в конечном итоге жалкий неудачник?\n\nЕго противники, возможно, чувствуя слабость или возможность, начали набрасываться. Указывая на лицемерие в стремлении к свободной и справедливой демократии, но при этом полагаясь исключительно на Клику Юэ. Они начали предполагать, что Чэнь просто заменил Чжили на Юэ; правя, как Цао Кунь до него. Однако уничижительные комментарии и ехидные замечания вряд ли могут принизить человека его масштаба. Несомненно, у него все еще есть работа. Демократия должна прийти. Если не идеальный идеал? Ну, по крайней мере, что-то достаточно близкое."
 GXC.endgame.501.a: "Часики тикают..."

 GXC.endgame.502.t: "Сопротивление растет по всей стране"
 GXC.endgame.502.d_start: "Не говоря уже об оппортунизме политической оппозиции, кажется, что даже массы и армия вряд ли могут быть сдержаны умирающим Президентом. Демократическая лига Китая, вечно настаивающая на своем, недавно начала быстро расширять поддержку по всей стране. Формируя Демократическое общество молодежи, они, в частности, начали нацеливаться на студенческие группы в университетах. Организованные по принципу региональных отделений, их количество удвоилось с четырех до восьми. Заполняясь поддержкой со всех слоев нации, различные отделения возглавляются в той или иной степени видными фигурами Лиги.\n\nОсобого внимания заслуживают лидеры Южного отделения Ли Чжанда и Ли Боцю. Первый — давний революционер. Соратник Сунь Ятсена, Ли был там во время инцидента 16 июня, решительно защищая Президентский дворец от Армии Юэ. Следуя за Ляо Чжункаем между Парижем и Миньганем, он в конечном итоге был решительно против Ван Цзинвэя, настаивая, что его «левизна» была лишь фикцией. Ли Боцю, со своей стороны, еще один давний революционер, выпускник Вампу и член Временного комитета действий, который недавно присоединился к ДЛК.\n\nНе говоря уже о расширении ДЛК, даже некогда надежные милитаристы отвернулись от Президента; проявляя негодование по поводу национализации вооруженных сил."
 GXC.endgame.502.d_li: "$GXC.endgame.502.d_start$ Хуже того, сама Клика Юэ начала колебаться. Многие начали покидать Чэня, при этом более левые члены ПОИ обращаются к недавно вошедшему в доверие Ли Цзишэню как к своему маяку надежды. С поглощением других перебежчиков из ГМД они начали объединяться в собственное движение, основанное на работе Ли Цзишэня и Ли Чжанда с ДЛК.\n\nОчевидным является растущее чувство общенационального заговора против текущего правительства, поскольку люди разочаровались как в авторитаризме Юэ, так и в подхалимстве Чжан Цзюньмая. Честный, скромный и усердный характер Ли Цзишэня, в дополнение к его военным заслугам, завоевал ему большую поддержку в кругах ГМД и ДЛК."
 GXC.endgame.502.d_noli: "$GXC.endgame.502.d_start$ Хотя это и не особенно сильное оппозиционное движение без центральной фигуры, поскольку большая часть нации устала от вопиющего подхалимства Чжан Цзюньмая, это все же доказывает, что сомнительное чувство неудачи начало появляться в федералистском проекте; раздавленное весом необходимости или разочарования. Левое крыло ПОИ начало покидать партию вообще, стекаясь в ДЛК, и неподчинение в рядах национальной армии широко развилось."
 GXC.endgame.502.a: "Как быстро люди отворачиваются от своих героев."

 GXC.endgame.503.t: "Срочное обращение"
 GXC.endgame.503.d: "Эхом во всех ушах масс и в залах интеллектуалов и политиков раздался последний политический залп Демократической лиги Китая. Множество снарядов попало в заголовки новостных статей и быстро распространилось по всей политической жизни страны. Ища свободы под гарантией гражданских свобод и свободы слова, печати, собраний, организации, передвижения, проживания и выбора профессии, это было в основном заявлением общего призыва к переменам.\n\nОтмена доминирующего партийного контроля, отмена мер военного времени и всех правил о речи и публикациях, комиссия по межпартийному сотрудничеству для контроля размера армии, комиссия по корректировке персонала в соответствии с местными условиями. И даже призыв к усилению местного самоуправления от провинции вниз, чтобы достичь баланса между центральными и местными властями, — все это было найдено в тексте.\n\nОднако самым важным было довольно вопиющее требование о принудительном коалиционном правительстве с ДЛК, которое должно управлять страной и контролировать новые выборы в Национальную ассамблею и, в конечном счете, служить переходным режимом, ведущим к инаугурации полностью представительного конституционного правительства, хотя оно остается в стороне от сложности выработки того, что должна составлять такая коалиция.\n\nСлужа в основном оливковой ветвью для Клики Юэ, положительный ответ правительства вполне может стать последним шансом для Чэнь Цзюнмина принять или отвергнуть доминирующее положение ДЛК, хотя опасения выделились в его ближайшем окружении. Гнев общественной интеллигенции в последнее время растет, и не многие люди готовы верить ни в ВРА, ни в ДЛК. Еще большая часть масс больше похожа на скот, уставший и невежественный. Хуже того, заявление подразумевает, что Чжан Цзюньмай намерен порвать с текущей коалицией и потребовать пересмотра условий."
 GXC.endgame.503.a: "Их требования вряд ли абсурдны."
 GXC.endgame.503.b: "Я герой этой истории, а не ты."

 GXC.endgame.504.t: "Кризис в Наньнине!"
 GXC.endgame.504.d: "С предстоящей политической драмой, которая развернется в национальном масштабе, можно забыть, что провинции сами сохраняют свою собственную динамику. И в последнее время собственные проблемы Гуанси переплелись с политической враждой нации. Мелькая в заголовках, сообщалось, что ассамблея провинции Гуанси в значительной степени отказалась ратифицировать Конституцию Чэнь Цзюнмина. Будучи первой провинцией, которая была «освобождена», она также является наиболее независимой, будучи восстановленной после захвата.\n\nДве соперничающие фракции милитаристов в провинции, возглавляемые Лю Чжэньхуанем и Линь Ху соответственно, объединили силы, чтобы потопить предложенную конституцию, действуя, возможно, как искра для крещендо отказов ратифицировать национальную конституцию, что, в свою очередь, потопит Конституционный конвент.\n\nЭто кульминация того, как некогда молчаливые союзники Чэня отворачиваются от него, поскольку Лю Чжэньхуань работал с Тан Цзияо и Чэнь Цзюнмином в 1920-х годах, но в последнее время обратился к ДЛК. Линь Ху, со своей стороны, служил и соперником, и союзником, но его влияние в середине 1930-х годов переломило ход раннего возрождения федералистов в их пользу. Его инакомыслие, без сомнения, является признаком грядущих плохих событий.\n\nМотивированные смесью неприязни к исполнительному превышению полномочий Чэня как предательству федерализма, зависти к привилегиям, предоставленным Армии Юэ, и плану национализации, их инициатива привела к тому, что другие провинциальные правительства взвешивают аналогичный курс действий. В сочетании с этим многие подразделения не из Армии Юэ, которые были поглощены национальной армией, начали демонстрировать свою поддержку Гуанси.\n\nКак всегда, скорость — это суть игры, и Чэнь решил решительно отправиться в Наньнин с Чэнь Цию для переговоров. Но Е Цзюй настоял, чтобы Президент взял с собой вооруженную охрану для собственной безопасности, хотя есть опасения, что слишком много вооруженных людей могут быть расценены как угроза. Среди лейтенантов Чэня вспыхнули препирательства, возможно, с некоторым намерением обеспечить свое место после его смерти."
 GXC.endgame.504.a: "Взять только личный персонал Чэня."
 GXC.endgame.504.b: "Отправить батальон президентской гвардии."

 GXC.endgame.510.t: "Наньнинский инцидент"
 GXC.endgame.510.d: "Трагедия постигла Федеративную Республику! По пути в Наньнин Чэнь, естественно, прошел все контрольно-пропускные пункты, но, фактически ступив в город, он и вся его свита были схвачены местными офицерами. Начиная от лейтенантов и заканчивая даже генералами, повстанцам удалось захватить Президента и его ближайшее окружение с минимальными потерями, так как большая часть деморализованной Армии Юэ сдалась после первых выстрелов. Выдвинув немедленные требования к Президенту прямо там, они потребовали увольнения Е Цзюя, Ма Юйхана, Чжун Сюнаня, Чэнь Ляньбо и многих других, всех, кого они обвиняют в коррупции в правительстве и армии.\n\nПеремещение Президента и его свиты в безопасное место, переворот поверг [UPC.Capital.GetCapitalVictoryPointName] в полный абсолютный хаос! Линь Ху и Лю Чжэньхуань со своей стороны объявили о своей полной оппозиции заговору, настаивая на том, что ответственные заговорщики действуют против их приказов, хотя в такие заявления, безусловно, трудно поверить.\n\nВ столице помощники мечутся в офис маршала Е Цзюя и из него. Становясь все более беспорядочным по мере раскрытия Инцидента, он начал изолировать гражданских фигур Юэ от принятия решения о реакции правительства. Находясь на грани гражданской войны, Маршал отдал приказы различным подразделениям армии Юэ быстро выступить на Наньнин, одновременно отправляя армейские подразделения в штаб-квартиру ДЛК в столице с намерением схватить Чжан Цзюньмая по обвинению в заговоре и государственной измене.\n\nНо они прибыли слишком поздно, чтобы захватить трубадура. Сбежав из столицы заранее, он, похоже, замел следы; ДЛК недавно выпустил заявление с требованием мирного урегулирования. Поскольку ситуация быстро разворачивается, новости о похищении Президента привели к тому, что студенты и рабочие вышли на массовые протесты на улицах, отчасти вдохновленные левыми и агитацией ДЛК."
 GXC.endgame.510.a: "Кто выйдет победителем из этого хаоса?"

 GXC.endgame.511.t: "Переворот Ли Цзишэня"
 GXC.endgame.511.d: "Видя, что только военный ответ может дать немедленные результаты, рискуя смертью Чэнь Цзюнмина в плену, маршал Е Цзюй объявил не только о введении военного положения, но и о формальном марше на Наньнин для освобождения Чэня. И все же его продвижение остановило не сопротивление самих повстанцев, а сопротивление самой Клики Юэ. Поскольку многие опасались, что военный ответ все равно приведет к смерти Чэня, многие милитаристы и офицеры, которых когда-то считали лояльными, наотрез отказались выполнять приказы Е, а силы, которые последовали за ним, были безнадежно отброшены повстанцами Гуанси.\n\nВ этот момент нерешительности Ли Цзишэнь, по слухам, находящийся в центре общенационального движения сопротивления, перехватил инициативу. Используя ярость масс, недовольных солдат Гуандунской армии и бывших революционеров, таких как Чэнь Цзитан и Вэй Банпин, Ли сумел сместить действующее правительство ПОИ в Гуанчжоу, немедленно потребовав переговоров. Узнав о не только политическом, но и военном провале, маршал Е Цзюй и Клика Юэ почти все бежали в изгнание, как крысы с тонущего корабля.\n\nПоднявшись с относительно спорной роли лидера революционных партизан до странной птицы, окруженной федералистами, и до еще более грандиозной роли главы национального восстания, многие начали ставить под сомнение роль Ли Цзишэня как фигуральной центральной фигуры восстания Анти-Юэ. Тем не менее, с честностью и патриотизмом, не вызывающими сомнений, многочисленными связями в Гуандуне, Гуанси и во всем политическом спектре, и прежде всего прагматичным взглядом, Ли, пожалуй, единственный человек во всей Федеральной армии, способный на такую роль.\n\nОтправившись в Наньнин для переговоров с пленным Чэнь Цзюнмином, наньнинскими милитаристами и Чжан Цзюньмаем, Ли ловко разыграл каждую партию друг против друга. Добившись отставки Чэня и его ухода на пенсию как сломленного человека, Ли любезно «принял» пост временного Президента и главы Правительства национальной реконструкции."
 GXC.endgame.511.a: "Это новый Бонапарт?"

 GXC.endgame.512.t: "Армия Юэ объявляет военное положение"
 GXC.endgame.512.d: "Возможно, величайший оперативник разведки всей Армии Юэ, Гэ Чжаохуан был брошен в свою стихию. Довольно поздно прибывший в НРА Гоминьдана, Гэ смог перебежать в Армию Юэ благодаря своим связям с подпольем Хунмэнь и Триад в Гуанчжоу. Поднимаясь по служебной лестнице в армии как человек, склонный к «мокрой работе». Благодаря его усилиям ему снова удалось раскрыть доказательства истинного масштаба Антиправительственного заговора — провинциальные правительства, амбициозные милитаристы, ДЛК и революционеры.\n\nПотребовав заседания Ассамблеи, Е Цзюй, как высшее военное должностное лицо в республике, официально объявил о введении военного положения. Ссылаясь на нестабильность, спровоцированную национальным кризисом и похищением Президента, он посадил себя в кресло исполнительной власти, явно не без тяжелого груза на совести. Назначив Ма Юйхана премьер-министром, а Чжун Сюнаня — вице-президентом, в Ассамблее воцарилась тревожная тишина; возможно, возникла бы критика, если бы не присутствие вооруженного персонала и отсутствие ДЛК.\n\nОднако их реакция на смерть демократии отражает реакцию масс; привыкшие к низкому профилю, они хранили молчание. Либо из благоговения перед Чэнь Цзюнмином, страха возмездия, либо из простого безразличия. Быстро покинув здание Ассамблеи, Е Цзюй разослал шквал гонцов с приказами: Марш на Наньнин.\n\nШтурм Наньнина был кровавым. После освобождения города от контроля повстанцев Е не тратил времени на поиски местонахождения «босса», и все же перед ним лежал только труп. Пережив штурм, Чэнь Цию пересказал смерть Цзюнмина во время штурма, нелепая случайность. Явно расстроенный, Е не терял времени, приказав массово казнить множество офицеров, причастных к заговору, и провести дальнейшие аресты тысяч косвенно связанных. Вернувшись в Ассамблею, он объявил новое чрезвычайное положение, с новостями о бегстве ДСП вперемешку с запретом ДЛК."
 GXC.endgame.512.a: "Так поступают со всеми предателями!"

 GXC.endgame.515.t: "Наньнинские переговоры"
 GXC.endgame.515.d: "Хотя мало кто ожидал мирного разрешения Наньнинского инцидента, похоже, что все они недооценили способность Чэнь Цзюнмина пробуждать в людях лучшее. В своем плену несколько скудных встреч Чэня с Линь Ху и Лю Чжэньхуанем, отчасти утешительных из-за условий и хода разворачивающихся событий, сумели вытянуть некое подобие горького мира из милитаристов. Опираясь на свои давние связи, Отец Нации справился, разрядив ситуацию в Наньнине.\n\nПерехватив инициативу, пока Армия Юэ Е Цзюя оказалась в неожиданном тупике из-за мирного урегулирования, Чэнь Цию быстро сработал, чтобы договориться о рабочем соглашении с ДЛК. Обращаясь к их опасениям по поводу демократии и будущего республики в отношении их Срочного обращения, он официально согласился на их условия Коалиционного правительства национального единства на следующие несколько лет, чтобы поддержать демократический переход. Как главного представителя Партии общественных интересов, помимо самого Чэнь Цзюнмина, согласие Цию, казалось, успокоило атмосферу для ДЛК.\n\nС обещаниями соблюдать конституцию и в конечном итоге обеспечить более свободные и справедливые выборы в будущем, вооруженный ответ Е Цзюя был практически полностью отвергнут гражданским элементом Клики Юэ. Хотя и не обязательно наказанный, по возвращении Чэнь Цзюнмина, Цию и Яньшэна в столицу на фоне планов Е объявить военное положение, у Маршала были все основания с сожалением удалиться.\n\nСидя на сломанном троне, Чэнь Цзюнмин официально объявил о своей отставке Национальной ассамблее не более чем через день. Подразумевая, что он просто стал слишком истощен, чтобы продолжать, Отец Нации приступил к разделению своей фигуральной империи среди своих подданных. Чэнь Цию станет новым президентом, Хуан Цян — вице-президентом, а Ма Юйхан — премьер-министром. С обещаниями технократии многие верят, что это будет не более чем то же самое."
 GXC.endgame.515.a: "Гражданская война, едва избегнутая."

#Endgame Rebellion Event - Keep This Note So Easier for Others to Find.
 GXC.endgame.520.t: "Наньнинское восстание"
 GXC.endgame.520.d.base: "Федералистский проект долгое время был идеалистическим движением, построенным на практике провинциальной автономии, местной демократии и обеспечении стабильности на международной арене. В результате он принял на себя невероятно тяжелую ношу разнообразных политических идеологий и колоритных персонажей. Анархисты, демократические социалисты, либералы, консерваторы и даже автократы или милитаристы взяли на себя мантию провинциалистского проекта. С окончательным объединением нации под коалиционным правительством большая часть угасающего энтузиазма масс и волнующего утопического идеализма столкнулась с жестоким случаем реальности. Достигнув точки кипения, все это выплеснулось с недавним Наньнинским восстанием.\n\nС обнародованием всех провинциальных конституций под контролем федералистов было совершенно неожиданно, что Гуанси, первая провинция, «освобожденная» Чэнь Цзюнмином, станет первой провинцией, которая полностью откажется от национальной конституции. Милитаристы Линь Ху и Лю Чжэньхуань, шаткие союзники Чэня с 1920-х годов, абсолютно настаивали на своей оппозиции, вызывая гнев планами национализации армии, превышением полномочий исполнительной власти и слабой реализацией демократических выборов.\n\nНамереваясь провести переговоры, Президент Чэнь, его вице-президент, премьер-министр и другие помощники отправились в Наньнин, чтобы достичь урегулирования, но были схвачены и похищены местными офицерами в рамках массового общенационального заговора против правительства. С таким вопиющим признаком слабости Столица, фактически находящаяся под автократическим контролем маршала Е Цзюя, кажется готовой наброситься на Наньнин. И все же это представляет возможность."
 GXC.endgame.520.d.generic: "$GXC.endgame.520.d.base$\n\nНо незначительное проявление слабости, это может быть лишь началом момента славы [ROOT.GetLeader]. Центральное правительство, несомненно, находится в самом слабом положении, чреватом распрями, нестабильностью, потерей своего национального лидера и безудержным военным неподчинением. Если [ROOT.GetLeader] не хочет просто быть брошенным с неудачливыми гуандунскими федералистами или, по крайней мере, быть лишенным своей местной власти, то, возможно, не будет лучшего времени, чем сейчас, чтобы нанести удар, пока тучи сгущаются над [UPC.Capital.GetCapitalVictoryPointName]."
 GXC.endgame.520.d.yunfed: "$GXC.endgame.520.d.base$\n\nС самыми тревожными новостями о захвате Чэнь Цзюнмина в Наньнине, близость Юньнани и тесные связи [ROOT.GetLeader] с Лю Чжэньхуанем поставили провинцию в довольно сложное положение. Юньнань по своей сути не враг Чэнь Цзюнмину, и все же она была ущемлена и проигнорирована гуандунскими федералистами на протяжении большей части как войн за национальное объединение, так и Войны Сопротивления. С усилением превышения полномочий исполнительной власти, надвигающимся военным положением и общенациональным движением инакомыслия [ROOT.GetLeader] стало совершенно очевидно, что, возможно, гуандунские федералисты нуждаются в своем похоронном звоне. В конце концов, Юньнань привыкла маршировать на потенциальных автократов. Возможно, мы даже сможем спасти Чэня, пока мы этим занимаемся?"
 GXC.endgame.520.d.hnnfed: "$GXC.endgame.520.d.base$\n\nС самыми тревожными новостями о захвате Чэнь Цзюнмина в Наньнине, близость Хунани и настойчивость в отношении доктрины Монро поставили ее в довольно сложное положение. Далекая от того, чтобы быть врагом Чэня, надвигающееся превышение полномочий исполнительной власти и растущая централизация федералистского проекта под его руководством стали свидетелями, возможно, величайшего лицемерия всего испытания. Возможно, это было лишь справедливым возмездием за то, что он был захвачен за свою собственную глупость. Тем не менее, [ROOT.GetLeader] определенно не может сидеть сложа руки, чтобы мириться с постепенным размыванием привилегий Хунани, и все же любой запуск национального восстания лишь бросит тень на лидера провинции. Мы лучше, чем милитаристы?"
 GXC.endgame.520.d.szcfed: "$GXC.endgame.520.d.base$\n\nС самыми тревожными новостями о захвате Чэнь Цзюнмина в Наньнине, Сычуань оказалась в уникальном положении, что касается юго-западных федералистов. Далеко от места инцидента и далеко от Гуандуна, связи Сычуани с Линь Ху, Лю Чжэньхуанем или Кликой Юэ варьируются от несуществующих до сомнительных. С признаками растущего милитаризма, превышения полномочий исполнительной власти и безудержного развития авторитаризма, возможно, нет ничего более насущного, чем сейчас решить, где стоит Сычуань. Подчиняемся ли мы Центральному правительству, рискуя нашими идеалами? Сражаемся ли мы за них? Или мы остаемся бездействующими, ожидая, пока тучи над [UPC.Capital.GetCapitalVictoryPointName] рассеются?"
 GXC.endgame.520.a: "Мы заварили кашу, теперь расхлебываем. (Переключиться на [UPC.GetNameDef])"
 GXC.endgame.520.b: "Возможно, пора подождать и посмотреть?"
 GXC.endgame.520.c: "Они показали безумие своих путей! К оружию!"

 ##UPC Li Jishen Content (530-559):
 GXC.endgame.530.t: "Чэнь Цзюнмин умирает дома"
 GXC.endgame.530.d: "Атмосфера запоздалой, почти горькой тишины установилась по всей стране, так как из скромной и в конечном счете угасшей отставки Чэнь Цзюнмина пришли новости о том, что «Отец-основатель» Республики недавно умер. Посещаемый редко только близкими соратниками, Чэнь доживал остаток своих дней после Наньнинского инцидента в довольно жалком состоянии; сломленный, оболочка, умирающий человек с рухнувшим наследием. Утопист, жестоко разбившийся о твердые скалы идеализма, единственной оставшейся искрой в его жизни было присутствие его детей и редкие визиты его близких друзей (тех, кто остался в стране, во всяком случае).\n\nУмирая с не более чем хрипом, сообщалось, что его последними словами в присутствии друзей и семьи были слова ужаса от того, что он оставляет своих детей расти без отца или матери, и от того, что он оставляет нацию. С его состоянием, возможно, усугубленным Наньнинским инцидентом, растущей зависимостью от исполнительной власти во время его пребывания в должности и личными страданиями, похоронная процессия Чэня была в основном тихим событием.\n\nУмирая в течение года после воссоединения, это, возможно, символично для его наследия как политика. И все же нельзя забывать революционного героя, который вызвал столько перемен. Ибо без Чэня у нации не было бы надежды на демократию вообще, Гуандуну и Фуцзяни, безусловно, было бы гораздо хуже, и даже с его нежеланием демократизировать, наносящим ущерб его наследию, его карьера была поистине монументальной.\n\nДля Великого республиканского альянса и его сторонников Чэнь — настоящий герой. Для Демократической лиги Китая негодование растет при редком упоминании его имени, для остатков Бэйяна он обманут и вызывает восхищение. Как бы то ни было, его наследие, несомненно, противоречиво. Большая часть масс ожидает официального заявления от [ROOT.GetLeader], устанавливающего стандарт почтения к прошлым Президентам, но многие выступали за то, чтобы оставаться многозначительно молчаливыми или даже использовать это как политическую возможность."
 GXC.endgame.530.a: "Мы не можем забыть его наследие."
 GXC.endgame.530.b: "Воздержаться от комментариев."
 GXC.endgame.530.c: "У него все еще были союзники. Избавьтесь от них."

 GXC.endgame.531.t: "Построение Объединенного правительства"
 GXC.endgame.531.d: "Сидя на троне довольно эксцентричной и эклектичной коалиции партий, Ли Цзишэнь оказался в довольно грандиозном положении, возможно, вопреки своим стремлениям. Он никогда не искал истинно национального лидерства, но вот он здесь, вестник нового политического движения и фактически де-факто диктатор республики. Имея связи от преступного подполья Шанхая до революционных печей Гоминьдана, Президент обратил внимание на то, что сложный карточный домик, воздвигнутый на его месте, предоставил широкие возможности направить политику в определенном направлении.\n\nСвязанная с Партией общественных интересов через взаимные кантонские связи, партия в значительной степени разбрелась без истинного лидера, поскольку Чэнь Цию больше не обладает контролем над партийным аппаратом. ПОИ и, как следствие, ВРА проголосовали за признание Ли Цзишэня своим Лидером партии по приказу Чэнь Цзюнмина, преследуя некий курс национального единства. Хотя, очевидно, они не особенно лояльны, если только Президент не соизволит вознаградить их.\n\nЕстественные претенденты, ДЛК под руководством Чжан Цзюньмая и Чжан Дунсуня, по-видимому, уже прочно находятся в лагере лоялистов Президента, празднуя свою великую победу. Но на практике Две Чжана потеряли большое количество своего политического престижа внутри организации, уступив место менее дружелюбным союзникам Президента. Естественно, ДСП нуждается в патронажных должностях, чтобы сохранить свою силу в ДЛК.\n\nНаконец, и это довольно недавнее событие, это приток перебежчиков из Гоминьдана. Сплотившись вокруг Чэнь Миншу, они сформировали Партию производящего народа. На практике она довольно слаба, а реальная власть за фронтовой партией принадлежит нелегальному Гоминьдану, который ожидает прямой легализации и возвращения Ли в их лоно. Легализация, конечно, неизбежна, хотя приветствует ли их Ли или держит дистанцию — это другой вопрос, который может дестабилизировать республику."
 GXC.endgame.531.a: "Король знает, когда вознаградить своих пешек."
 GXC.endgame.531.b: "Кто еще должен получить благосклонность, как не ДСП?"
 GXC.endgame.531.c: "Святость Трех Принципов превыше всего."

 GXC.endgame.532.t: "Касательно текущей ситуации"
 GXC.endgame.532.d: "Отдалившись друг от друга с тех пор, как Чжан Цзюньмай занял все более авторитарную позицию поддержки, Две Чжана, Цзюньмай и Чжан Дунсунь, по-видимому, примирились в умеренной степени. В недавнем манифесте Демократической лиги Китая под названием «Декларация касательно текущей ситуации», автором которого является большое количество лидеров ДЛК, включая Двух Чжанов, были выдвинуты следующие требования демократии: Свобода должна быть достигнута под гарантией гражданских свобод, свободы слова, печати, собраний, организации, передвижения, проживания и выбора профессии.\n\nДля Чжан Дунсуня демократия как концепция — это культура с характеристиками, включающими политику в широком смысле. Это не просто политический метод и система правления, но также, что более важно, культура и образ жизни, основанные на разуме и созвездии ценностей. Это ценности Просвещения, которые могут быть внедрены в общество даже при отсутствии формальных демократических институтов.\n\nСвобода и равенство, естественно, являются основными ценностями, причем свобода — это позитивное и благородное понятие. Индивидуальная свобода должна означать «рост, готовность к изменениям, когда требуется модификация», но она не должна приводить к действиям, которые могут навредить другим. Существуют «небесные пределы» личных свобод, и только через упражнение в самообладании можно предотвратить вырождение этих свобод в распущенность. Существует понятие «естественного баланса» между свободой и долгом, естественного в смысле добровольного саморегулирования в противовес принуждению.\n\nСвобода мысли и слова являются базовыми и существенными, любое правительство, выступающее против этих принципов, не является демократическим; демократия — это «правление посредством свободной дискуссии». Что касается равенства, это просто отсутствие неравенства; тех искусственных привилегий, созданных для наслаждения одних за счет других. Быть равным означало устранять эти привилегии разумными и демократическими средствами, и только демократическая система придавала смысл принципу равных возможностей."
 GXC.endgame.532.a: "У Цзюньмая явно есть конкуренция."
 GXC.endgame.532.b: "Дунсунь когда-нибудь затыкается?"

 GXC.endgame.533.t: "Взгляд на клику Ли Цзишэня"
 GXC.endgame.533.d: "Великодушный и прагматичный, как всегда, внутренний круг Ли Цзишэня, его одноименная клика, представляет собой красочный ассортимент бывших милитаристов, революционеров и бывших революционеров, членов Демократической лиги Китая и даже некоторых членов Великого республиканского альянса. Хотя как глава Правительства национальной реконструкции он якобы служит беспристрастным посредником, это в значительной степени мираж из дыма и зеркал. Ибо сам Ли является довольно проницательным политическим деятелем. Используя свои заслуги героя войны в рядах Гоминьдана, большое количество его ближайшего окружения — это те, с кем он много работал в Миньгане, но в остальном был задушен Партийным государством. Се Вэньбин, Ли Чжанда, Ли Миньсинь.\n\nСледуя за ним, когда он бежал в объятия федералистов, их быстрый рост в рядах был отчасти обусловлен их навыками, а отчасти личным покровительством Ли. Но это еще не все: Ли Цзишэнь был политическим деятелем и солдатом на протяжении десятилетий, и его знакомство со многими людьми по всему спектру хорошо служит этой репутации. К его личной клике прикреплены Ван Яцяо и его Банда Топоров, или более известный как «Король убийц». Есть даже Чэнь Миншу и его Партия производящего народа, Линь Чжэнсюань и Клика политической науки, или его собственный сын Ли Пэйвэнь, функционер ДЛК.\n\nДовольно амбициозно, Ли также имеет явные связи с практически несуществующей Старой кликой Гуанси, которую однажды описали как составляющую «одну треть» клики. Конечно, нынешние союзники Ли — это не то, над чем можно ухмыляться. Великий республиканский альянс избрал его своим неформальным лидером, он почти доминирующая сила в Демократической лиге Китая, и она составляет большую часть его правительства. В общем и целом, только одна группа может быть его неизменным фаворитом."
 GXC.endgame.533.a: "Неизменно ДЛК и ПНР — это одно и то же."
 GXC.endgame.533.b: "Я бы никогда не зашел так далеко без моих друзей."
 GXC.endgame.533.c: "ВРА нужен новый Чэнь Цзюнмин..."

 ##UPC Chen Qiyou/Ye Ju Content (560-589):
 GXC.endgame.560.t: "Смерть Чэнь Цзюнмина"
 GXC.endgame.560.d: "Атмосфера запоздалой, почти эфемерной тишины установилась по всей стране, так как из скромной и в конечном счете угасшей отставки Чэнь Цзюнмина пришли новости о том, что «Отец-основатель» Республики недавно умер. Посещаемый обычно близкими соратниками, сторонниками ПОИ, друзьями и семьей, Чэнь доживал остаток своих дней после Наньнинского инцидента в довольно слабом состоянии; умирающий человек со сложной историей. Чэнь делал все возможное, чтобы советовать [ROOT.GetLeader] курс действий, как духовный наставник для нового поколения. Заботясь гораздо больше о своих детях, чем о государственных делах, чувство горько-сладкой радости, казалось, наконец снова охватило экс-Президента.\n\nСраженный брюшным тифом, и без того физически слабый Чэнь едва мог пережить это столкновение. Окруженный Чжун Сюнанем, Ма Юйханом и своей семьей в свои самые последние моменты, последними словами Чэня, как сообщается, были взволнованные возгласы «Республика! Республика!».\n\nУмирая в течение года после воссоединения, это, возможно, символично для его наследия как политика. И все же нельзя забывать революционного героя, который вызвал столько перемен. Ибо без Чэня у нации не было бы надежды на демократию вообще, Гуандуну и Фуцзяни, безусловно, было бы гораздо хуже, и даже с его нежеланием демократизировать, наносящим ущерб его наследию, его карьера была поистине монументальной.\n\nДля Великого республиканского альянса и его сторонников Чэнь — настоящий герой. Для Демократической лиги Китая негодование растет при редком упоминании его имени, для остатков Бэйяна он обманут и вызывает восхищение. Как бы то ни было, его наследие, несомненно, противоречиво. Тем не менее, ожидается, что государственная похоронная процессия состоится в ближайшие дни."
 GXC.endgame.560.a: "Уходи тихо в ночь, друг."

 GXC.endgame.561.t: "Вспоминая нашего Основателя"
 GXC.endgame.561.d: "С тяжелым сердцем нация вступила в состояние национального траура. Тело Чэнь Цзюнмина было изначально накрыто флагом Пяти рас, символический жест, чтобы продемонстрировать его преданность Республике, семья Чэнь получила поддержку, чтобы иметь свой собственный период частного траура. После восьми дней личного траура ближайших друзей и семьи была объявлена государственная похоронная процессия по всей стране, которую возглавил Президент.\n\nТолпы собирались по всей стране, пока процессия Чэня путешествовала через Нанкин, Гуанчжоу, Ухань и Пекин, прежде чем наконец вернуться и быть похороненной на холме Цзывэй в Хуэйчжоу, городе, который видел начало и конец его пожизненной борьбы за демократическую республику. В сотрудничестве с различными соратниками была создана Мемориальная запись Президента.\n\nПолучив одиннадцать панегирических эссе и более 700 панегирических стихов, она получила вклад от множества фигур. Близкие товарищи, такие как Чжан Луцунь, Чэнь Яньшэн, Е Цзюй, Чэнь Цию и другие. Некоторые были от общественных деятелей, таких как У Сяньцзы, У Чжихуэй, У Пэйфу, Хуан Фу, Ху Ши, и, что удивительно, были собраны вклады от Шэнь Цзюньжу, Чжан Ланя, Линь Ху, Чжан Дунсуня и даже Чжан Цзюньмая.\n\nОставив после себя восьмерых детей, движение Чэня практически осталось без лидера. Каждый оставшийся член Клики Юэ знал этого человека лично, отчасти из-за его мессианского культа личности или его острого отношения к тому, чтобы быть известным как национальный герой. Для Клики Хайфэн это особенно разрушительно, так как все они знали его с самого начала их пути.\n\nЧэнь Цию и Чэнь Яньшэн, лидеры либеральной стороны его движения, хотят, чтобы его наследие было наследием прогрессивного лидера. Е Цзюй и Ма Юйхан, представляющие идеосинкразическую консервативную сторону Чэня, желают, чтобы его помнили как великого военного героя, который привел к воссоединению. Чжун Сюнань, Чжоу Синнань и Чжун Цзинтан со своей стороны настаивали на том, чтобы продемонстрировать его чувство разума и морали."
 GXC.endgame.561.a: "Прогрессивный утопист, естественно."
 GXC.endgame.561.b: "Великий военный герой, очевидно!"
 GXC.endgame.561.c: "Способный государственный деятель, который выслушивал все стороны, несомненно."

 GXC.endgame.562.t: "Атлетика и боевые искусства"
 GXC.endgame.562.d: "С 1920-х годов особым увлечением Партии общественных интересов, разделяемым многими другими в Китае, было культурное возрождение. В то время как конфуцианство, Новая культура и другие темы высокого уровня остаются предметом жарких дебатов среди китайских интеллектуалов, существует широкая поддержка переориентации на деятельность «мирного времени», такую как атлетика и искусство.\n\nПоощрение спортивных встреч и других соревнований было частью правления Чэнь Цзюнмина в Гуандуне и продолжает поощряться правительством [ROOT.GetLeader]. Даже в Эру милитаристов Китай смог отправить делегацию на Олимпиаду 1924 года под знаменем Национальной спортивной ассоциации. Сюн Силин, Чжан Болин и другие организовали Третьи Национальные игры Китайской Республики в 1924 году, дав небольшую степень единства разделенной нации. В частности, в Кантоне боевые искусства несут в себе чувство культурной гордости; Кунг-фу — это кантонское заимствованное слово, а Десять тигров из Кантона — практически местные легенды.\n\nТочно так же художественные выставки рассматривались как часть «социального образования» правительства Гуандуна для людей. Знак как современности, так и традиции, национальное правительство под руководством [ROOT.GetLeader] инвестировало в различные художественные фонды, выставки и конкурсы. Правительство попыталось продвигать разнообразный выбор стилей, включая традиционное китайское и искусство западного стиля.\n\nОсобого внимания заслуживает «Школа живописи Линнань», возглавляемая тремя мастерами Гао Цзяньфу, Гао Цифэном и Чэнь Шурэнем. Вдохновленные западными художественными стилями и революционным динамизмом Синьхайской революции, они стремились создавать искусство под влиянием природы, интегрируя китайские, японские и западные техники и стили. Они основали художественные институты, такие как Художественная академия Чуньшуй в Гуанчжоу, и вдохновили других художников, таких как Чжао Шаоан, Ли Сюнцай, Гуань Шаньюэ и Ян Шаньшэнь. Наряду с кантонской оперой и гуандунской музыкой, школа Линнань считается одной из «Трех красавиц Линнань»."
 GXC.endgame.562.a: "Спорт и атлетика делают наш народ сильным и здоровым."
 GXC.endgame.562.b: "Искусство и культура поднимают наш народ на новые высоты."

 GXC.endgame.563.t: "Поляризация Хунмэнь"
 GXC.endgame.563.d: "Считающийся правительственным героем за свою роль главного офицера военной разведки Армии Юэ, Гэ Чжаохуан практически безраздельно властвовал как глава разведывательного агентства страны, так и военной полиции. И все же, похоже, он злоупотребил своим положением и не смог вовремя замести следы, прежде чем предприимчивые журналисты напали на его след. Втянув правительство в грандиозный коррупционный скандал, Гэ Чжаохуан был связан как член-основатель организации Триады Хунмэнь Чжунъихуэй. Сообщается, что злоупотребляя своими связями с местными начальниками провинциальных комиссий военного контроля и своей ролью в сообществе Хунмэнь, он создал преступное кольцо, сросшееся с самой Армией Юэ.\n\nС его коррупцией и криминальными связями, выставленными на всеобщее обозрение нации, это потребовало повышения уровня внимания к самим Хунмэнь; в значительной степени пережившим свое назначение и считающимся обузой из-за смешения с организованной преступностью. Хотя и у них есть свои клыки. С их стороны, это лишь ускорило существующую тенденцию среди Хунмэнь.\n\nНедовольные отходом Клики Юэ от демократизации, они начали формировать свою собственную организацию теперь, когда Чэнь Цзюнмин вышел из игры. Вклинившись между ДЛК и ВРА как вариант среднего пути, различные партии Хунмэнь — Партия народного правления Хунмэнь и Партия народного благосостояния и прогресса — сформировали так называемую Лигу средних партий.\n\nОхватывая Китайскую национал-либеральную партию, Китайскую демократическую партию, Китайскую партию гармонии, Китайское общество самоусиления, Партию верности и справедливости и Общество реставрации Чжоу Явэя, они попытались заручиться поддержкой избирателей среднего класса, зарубежных китайцев, недовольных сторонников ВРА или ДЛК и особенно деловых интересов."
 GXC.endgame.563.a: "Мы не можем потерять генерала Гэ, он чертов герой!"
 GXC.endgame.563.b: "Герой или нет, вычистить и его, и Хунмэнь."
 GXC.endgame.563.c: "Использовать огонь против огня. Натравить Гэ на Лигу средних партий."
 GXC.endgame.563.e: "Преступник в наших рядах? Трибунал, немедленно."

 ##UPC Auth Epilogue Events (590-599):
 GXC.endgame.590.t: "Новый Наполеон"
 GXC.endgame.590.d: "Выйдя из политического болота Китая в качестве нового Президента объединенной нации, мало кто мог предположить, что бывший Директор Вампу станет лицом такого затруднительного положения. Еще меньше людей ожидали, что он поднимется в ряды не через Гоминьдан, свою первоначальную партию, а через Демократическую лигу Китая; изначально когорту интеллектуалов из башни из слоновой кости и ученых-чиновников, превращенную в массовое движение. Но даже эта ситуация не могла длиться долго. Преследуя гораздо более идиосинкразическое направление, амбициозный «беспристрастный» посредник Правительства национальной реконструкции вместо этого направил свое движение в новом направлении, более равносильном его прошлому.\n\nС включением Двух Чжанов и Демократической социалистической партии, в конечном итоге оказавшейся бесполезной, собственная база поддержки Ли из различных национальных милитаристов, его собственной Гуандунской клики и различных перебежчиков из Гоминьдана, и даже номинального руководства Великого республиканского альянса — все заверили его в его смещении Чжанов, при этом Ли Чжанда практически совершил переворот в Демократической лиге Китая у них из-под носа.\n\nПоскольку каждая крупная партия остается под жестким контролем Ли, он фактически провозгласил правительство национального единства, как и предлагали Чжаны, но без них. Консолидируя свою роль в правительстве, стало совершенно очевидно, что нация движется к новой форме Опеки. Сродни Гоминьдану, но без атрибутов Данго. Не Национальная революция, а Институциональная.\n\nВместе с Ли Чжанда дуэт обеспечил, что Правительство национальной реконструкции здесь, чтобы остаться. На неопределенный срок. Сосредоточившись на реализации различных социальных реформ, благосостояния, инфраструктуры и эмансипации на пути к демократии, многие с ожиданием смотрят на [UPC.Capital.GetCapitalVictoryPointName], но видят лишь суету технократов, военных офицеров и высоколобых интеллектуалов. Знакомое, но странное зрелище, кажется, что новая революционная элита вытеснила старую."
 GXC.endgame.590.a: "Революция, дистиллированная реформистами."

 GXC.endgame.591.t: "Правление людей эпохи Возрождения"
 GXC.endgame.591.d: "Мало кто верил, что роль, которую Чэнь Цзюнмин выполнял в Федерально-демократическом проекте, когда-либо могла быть заполнена другим человеком, и поэтому их сомнения были так быстро развеяны революционным героем, ставшим Президентом, Ли Цзишэнем, который очень хорошо занял место Чэня. Военный человек и национальная фигура у руля широкого правительства единства, назначение Ли Чжан Дунсуня премьер-министром и Чжан Цзюньмая вице-президентом номинально предполагало бы правительство Демократической лиги Китая. И все же Правительство национальной реконструкции служит чем-то большим, чем инструментом выборной должности. Оно жаждет быть практиком демократического образования, хотя и совершенно недемократическим образом.\n\nЧто означает Демократия для среднего крестьянина? Быть обязанным своему помещику, обремененным национальными распрями? Как свидетельствует Чжан Цзюньмай, любая форма англо-американского конституционного правления является лишь невозможностью в Китае. Массы апатичны, необразованны, неспособны осуществлять свои политические права. И, что еще хуже, элиты, эти черствые, но могущественные клики, удерживающие власть, просто манипулировали бы выборами в стране.\n\nИ так, панацея от демократических бед Китая представляет себя: принудительная Коалиция правительства национального единства под председательством «беспристрастного» посредника Ли Цзишэня и охватывающая все слои Китая для обеспечения сдержек и противовесов. Шаткая ситуация и коалиция, только если новый Маршал сможет ее сохранить, но это, возможно, единственный путь вперед для китайской демократии, чтобы в конечном итоге увидеть свет дня.\n\n«Нельзя ожидать быстрых результатов, это может занять десять, двадцать, тридцать, сорок или пятьдесят лет, но только тогда можно будет сравнить преимущества и недостатки новой системы с нынешним старым обществом и старой системой правления», — как сказал вице-президент Чжан Цзюньмай на недавней конференции. Демократия, не сейчас, но демократия в будущем — вот что может засвидетельствовать это правительство."
 GXC.endgame.591.a: "Нельзя научить человека чему-либо, можно только помочь ему найти это в себе."

 GXC.endgame.592.t: "Демократический переход"
 GXC.endgame.592.d: "Медленно, но верно Чэнь Цию освоился в должности Президента. Хотя его вице-президент, премьер-министр и кабинет были фактически отобраны вручную его предшественником, так называемая Клика Юэ, похоже, работает в основном так же слаженно, как и при Чэнь Цзюнмине. Этому последнему правительству национального единства удалось стабилизировать свое правление, гарантируя, что постепенный переход к демократической, конституционной и федералистской республике, намеченный его основателем, не будет нарушен.\n\nВ речи перед Национальной ассамблеей Чэнь призвал разрозненные партии «быть едиными в мыслях и сердце, и горячо и твердо поддерживать республику». Он указал на прогресс, достигнутый Великим республиканским альянсом, ведя китайский народ ко многим гордым достижениям в построении федералистской демократии, невиданной ранее за 5000-летнюю историю Китая, и той, которая вызовет восхищение во всем мире. Руководство Чэнь Цзюнмина позволило обеспечить «долгосрочное сосуществование и взаимный контроль», что мудро «соответствует развитию китайской истории».\n\nВ соответствии с обещаниями Чэнь Цзюнмина в Наньнине, Чэнь Цию клянется гарантировать гражданские свободы и свободы слова, печати, собраний, организации, передвижения, проживания, образования и выбора профессии. Меры военного времени должны быть свернуты, а цензура и подавление малых партий и групп отменены.\n\nВ заключение он сказал, что «мы должны поощрять друг друга, укреплять единство, стремиться к прогрессу, связываться с массами и делать хорошую работу. Поскольку мы достигли многих успехов за последние несколько лет, мы должны в полной мере проявить этот дух в будущем и внести свой лучший труд в великое дело демократии».\n\nКонечно, остается много проблем: многие в Китае все еще жаждут сильного лидера, такого как Чэнь Цзюнмин, который может провести большие перемены, в то время как другие жаждут конца правления сильной руки и произвольных указов. Чэнь Цию может только надеяться, что он сможет соответствовать наследию своего наставника, пока занимается новый день."
 GXC.endgame.592.a: "Медленно мы движемся к федералистской демократии."

 GXC.endgame.593.t: "Скала Республики"
 GXC.endgame.593.d: "В более спокойные времена Чэнь Цзюнмин однажды написал личное стихотворение Е Цзюю, набожному буддисту. В нем он превозносил своего верного генерала, чтобы тот «отбросил свои заботы и вошел в сердце Дзэн, избавился от болезни и начал воспевать», при этом высоко хваля его: «Я помню, что было много талантливых генералов... но ты был единственным, кто выделялся. Ты смог прочитать книги своего отца и выделиться, и ты унаследовал учения семьи и сохранил честность». Он закончил стихотворение благословением: «Я надеюсь, что ты будешь толще и сильнее пашущего вола. Я надеюсь, что ты будешь сражаться голыми руками, как дракон и змея на суше, чтобы освежить свой дух».\n\nДух Чэнь Цзюнмина покинул Землю, оставив своих последователей продолжать без него. Несмотря на все его самопризнанные недостатки, его будет глубоко не хватать нации, которую он спас, и больше всего его товарищам и ученикам, чьих жизней он лично коснулся.\n\nКак его (для некоторых недостойный) преемник, Е Цзюй сделал то, что он часто делал раньше — выполнил волю своего начальника, даже когда тот колебался или не мог набраться смелости сделать то, что должно было быть сделано. Будь то изгнание Гоминьдана из Гуанчжоу в 1922 году или руководство Армией Юэ в битве против НРА в 1925 году, генерал всегда был той молчаливой скалой, на которую гуандунские федералисты могли положиться, чтобы защитить свою республику. Точно так же их верная Армия Юэ стояла наготове, чтобы защитить свою землю от бродячих революционных бандитов и тиранических диктаторов Пекина, и она продолжит это делать, пока Республика делает свои следующие шаги.\n\nНа данный момент у руля остается чрезвычайное правительство, в котором доминируют военные. Как и Чэнь Цзюнмин до него, Е Цзюй видит себя справедливым арбитром между различными враждующими фракциями в ассамблее, который героически проведет нацию за пределы партийной борьбы. Кто-то говорит, что демократическая мечта умерла в Наньнине, но для нового Президента Китая Федеративная Республика только началась."
 GXC.endgame.593.a: "Да подготовим мы наш дух к новой заре."

###Section 5f (600-699): End Game OGX Events

##NPA Endgame Shared (600-629):
 GXC.endgame.600.t: "Новый век под Лянгуаном"
 GXC.endgame.600.d: "Наконец, как желали так много стремящихся южных правительств, будь то Совет по военным делам Цзингоцзюнь, Правительство защиты конституции и его чрезвычайный конгресс, или даже гуандунские федералисты и революционеры Гоминьдана, нация была объединена движением под руководством Гуанчжоу. И все же постоянно присутствует нависающее чувство, что настоящие испытания и невзгоды только начались; но пока — краткая передышка и момент радостного празднования. Многие начали сравнивать [ROOT.GetLeader] с некоторыми великими деятелями китайской истории, что, несомненно, является топливом для пламени потакающей своим желаниям националистической пропаганды.\n\nУвы, однако, Север, несмотря на то, что был объединен собратьями с Юга, которые теоретически могли бы быть близкими и стойкими союзниками, был наиболее резок в своем опровержении южного доминирования. Хуже того, различные региональные и провинциальные милитаристы стали предметом долгих дебатов и разговоров в залах [GXC.Capital.GetCapitalVictoryPointName], поскольку дискуссии нарастают на грани централизации различных китайских армий и обнародования новой Конституции.\n\nТем не менее, политика начала трансформироваться в новой, свежей и возрожденной Китайской Республике. С тем, что когда-то было вопиющими разногласиями среди различных местных политических акторов Лянгуана, просто исчезающими в эфире, поскольку нация смотрит на трубадуров Лянгуана как на единую, сплоченную сущность, преодолевшую разрыв между провинциализмом и национальной политикой. И все же они одновременно осаждены старым порядком, не желающим быть вытесненным со своей роли в нации этими возмутителями спокойствия южанами."
 GXC.endgame.600.a: "Объединение, если мы сможем его сохранить."

 GXC.endgame.601.t: "Национальные военные беды"
 GXC.endgame.601.d: "С недавним завершением объединения Китая [ROOT.GetLeader] приступил к созданию новых централизованных вооруженных сил. Впервые была действительно создана армия, верная исключительно Китайской Республике, и уже нетерпеливые бюрократы в армии работают над созданием специализированных родов войск, таких как Национальный авиакорпус, или в отношении интеграции военных академий и арсеналов. Новое Национальное правительство желает полного объединения вооруженных сил с точки зрения учебной программы, обучения и доктрины от Шэньяна до Куньмина.\n\nКак таковые, местные провинциальные и региональные милитаристы, безусловно, сочли новые реформы сложными, мягко говоря. С момента краха власти центрального правительства после Синьхайской революции местные военные лидеры удерживали региональные блоки власти. Теперь, столкнувшись с реальностью национального объединения, эти милитаристы подали серьезные жалобы на новое центральное правительство. В более крайних случаях некоторые милитаристы даже провозгласили отделение своей провинции и уездов, отказываясь принимать военные реформы нового центрального правительства.\n\nКроме того, во время войн за объединение и последующей войны с Японской империей китайская армия выросла до невероятных размеров. Хроническая нехватка хорошо экипированных и хорошо обученных солдат привела к призыву десятков тысяч человек. Теперь, когда война в Китае наконец закончилась, перед новым центральным правительством стоит задача сокращения размера и расходов обременительных вооруженных сил."
 GXC.endgame.601.a: "Восстановление займет некоторое время."

 GXC.endgame.602.t: "Борющаяся национальная экономика"
 GXC.endgame.602.d: "С момента упадка династии Цин экономика Китая находится в крутом пике, условия усугубляются растущей империалистической хваткой доминирования внешней торговли. В то время как западные страны изначально искали Китай ради его прибыльных рынков и ресурсов, со временем растущее доминирование внешней торговли через неравноправные договоры привело к шатающейся национальной экономике.\n\nПосле «Черного понедельника» и последующей мировой экономической депрессии китайская экономика, которая была так неразрывно связана с немецким восточноазиатским рынком, также столкнулась с большим коллапсом. Поскольку чрезмерные спекуляции и банки управляли в Легационных городах, китайская национальная экономика только ухудшалась, и уровни производства только начали возвращаться к докризисным уровням. Региональные экономики местных милитаристов были сосредоточены в основном на поощрении местной промышленности, причем некоторые милитаристы даже открыто продавали опиум как средство получения дохода для финансирования своих частных армий.\n\nГоды разрухи от гражданской войны и войны с Японией оставили экономику в еще больших лохмотьях. Гиперинфляция и национальный дефицит привели к слабости национальной валюты, особенно учитывая, что правительство [ROOT.GetNameDef] теперь является национальным правительством. Большие секторы сельскохозяйственного и промышленного секторов страны лежат в руинах, и необходим трудоемкий процесс реконструкции, чтобы помочь Китаю догнать остальной мир. Бандитизм продолжает оставаться большой проблемой, особенно в сельской местности, поскольку инфраструктуры государственной полиции недостаточно сильна для борьбы с хорошо организованными группами. Постоянно поднимаются вопросы земельной реформы и экономической интеграции многих провинций; при этом сельские защитники и общины настаивают на немедленной помощи и компромиссе с недавним объединением."
 GXC.endgame.602.a: "Просто заставьте акции расти!"

 GXC.endgame.603.t: "Развивающаяся демократия?"
 GXC.endgame.603.d: "Многие революционеры представляли модернизацию Китая неизбежно включающей развитие Китая от монархии к республиканскому или демократическому правительству в какой-либо форме. Революционеры смотрели на естественное право, труды Локка и Монтескье и западные страны, которые приняли демократические принципы и пережили серьезный рост. Для многих демократия является необходимым и неизбежным побочным продуктом китайской революции.\n\nПрошедшие несколько десятилетий в Китае бросили вызов этому понятию и мировоззрению. Последующее возвращение монархии при Юань Шикае было полным издевательством над революцией, за которую боролись мученики 1911 года. Хотя многие правительства открыто заявляли о своей демократичности или приоритетности вхождения демократии в Китай, многим стало ясно, что даже самые революционные лидеры эры милитаристов, такие как Сунь Ятсен, тяготели близко к авторитаризму.\n\nНедавнее объединение Китайской Республики под руководством [ROOT.GetLeader] воскресило национальные страхи и сомнения относительно курса демократии. Множество новых правительственных должностей в растущей национальной бюрократии укомплектовано лоялистами [ROOT.GetLeader] или бывшими кантонскими политиками/бюрократами. На местном уровне коррупция продолжает править бал с малым надзором центрального правительства — начальники и мэры фактически управляют своими собственными частными вотчинами, не потревоженные даже объединением страны. Непотизм царит, особенно в отношении желанных военных и политических должностей, и преступность продолжает расти из-за отсутствия правительственной инфраструктуры. Поэтому необходима серьезная правительственная реформа для решения проблем нового национального правительства и укрепления местных правительств, чтобы лучше подготовить их к демократии."
 GXC.endgame.603.a: "Может быть, диктатура была бы лучше в конце концов..."

 #Endgame Rebellion Event
 GXC.endgame.610.t: "АНЗ распускается"
 GXC.endgame.610.d.intro: "Альянс национальной защиты (АНЗ) одержал победу, успешно пройдя маршем от Гуанчжоу до Пекина и свергнув всех своих соперников. Они намного превзошли эффективность его первоначальной итерации, которая свергла попытку Юань Шикая короновать себя Императором, но в конечном итоге пала из-за распрей и не смогла уничтожить Бэйянскую армию Юаня в бою.\n\nПобеда АНЗ катапультировала [GXC.GetLeader] к великой славе по всей стране, позволив ему объявить себя Президентом воссоединенной Республики. Но хотя он находится на пике своей власти, милитарист также переживает уникально уязвимый момент вскоре после своей победы. Объединение приносит большие ожидания быстрее, чем предоставляет инструменты для их удовлетворения, и [GXC.Capital.GetCapitalVictoryPointName] сталкивается с рядом экономических, военных и политических проблем, которые оставляют их открытыми для претендента.\n\nВ долгосрочной перспективе провинции могут ожидать централизации и интеграции в новый порядок. Каких бы союзников они ни приобрели на пути к объединению, они больше не нужны; их неоспоримый контроль над центральной армией и правительственной бюрократией позволяет им править без них. Это оставляет обе стороны в опасном положении, поскольку обе ждут, кто предаст другого."
 GXC.endgame.610.d.yunlong: "$GXC.endgame.610.d.intro$\n\nУ Лун Юня объединение вызывает противоречивые чувства. Оно, безусловно, удовлетворяет национализм внутри Юньнани, но есть затяжные опасения, что рано или поздно центральное правительство начнет посягать на автономию Куньмина. Нанести удар сейчас было бы не в его характере, но просто перевернуться и сдаться тоже было бы горькой пилюлей."
 GXC.endgame.610.d.yunhu: "$GXC.endgame.610.d.intro$\n\nУ Ху Жоюя объединение вызывает противоречивые чувства. Оно, безусловно, удовлетворяет национализм внутри Юньнани, но есть затяжные опасения, что рано или поздно центральное правительство начнет посягать на автономию Куньмина. Ху работал десятилетиями, чтобы наконец взять власть — оставить свою судьбу в руках далекого правительства ужасно, но даже с немецкой помощью и связями Чжили у него нет шансов... или есть?"
 GXC.endgame.610.d.shxyan: "$GXC.endgame.610.d.intro$\n\nДля Янь Сишаня это момент, которого он ждал уже некоторое время. Теперь, когда его соперники на севере подавлены, он может воспользоваться страхами Бэйяна перед южным доминированием для продвижения своих собственных целей национального лидерства. Это может, наконец, стать его долгожданным шансом объявить о своих собственных амбициях национального лидерства."
 GXC.endgame.610.d.generic: "$GXC.endgame.610.d.intro$\n\nБез сомнения, наши шансы малы, но они не станут меньше от ожидания. Если у нас есть какие-либо сомнения в лидерстве [GXC.GetLeader], сейчас самое время нанести удар."
 GXC.endgame.610.a: "Это наш момент, и мы воспользуемся им!"
 GXC.endgame.610.b: "Мы охотно переходим от союзников к подданным... по крайней мере, пока."

 GXC.endgame.611.t: "Альянс в лохмотьях"
 GXC.endgame.611.d.intro: "Объединение Китая было радостным моментом, но за закрытыми дверями оно также было вероломным. Победа вытолкнула [GXC.GetLeader] прямо в центр национального внимания, что неизбежно должно было вызвать зависть и гнев его бывших союзников. Это также возложило на него огромные ожидания, которые его правительство изо всех сил пыталось оправдать, разбираясь с различными военными, экономическими и политическими проблемами.\n\nОпасаясь неизбежной централизации страны, [FROM.GetLeader] и его [FROM.GetName] отказались переходить от союзников к подданным. Осудив Президента, которого они помогли установить не далее как год назад, они объявили о своем желании вести новую войну для защиты нации. Это казалось бы маловероятным, но они наносят удар в уникально уязвимый момент для [GXC.Capital.GetCapitalVictoryPointName] — проблемного правительства, уже осажденного трудностями после объединения."
 GXC.endgame.611.d.yunlong: "$GXC.endgame.611.d.intro$\n\nДля Лун Юня это гораздо более смелая игра, чем кто-либо мог ожидать. Известный своим замкнутым, почти изоляционистским правлением, нанесение удара за пределами его традиционной территории на юго-западе — рискованная авантюра. Но это показывает, как мало у него веры в правление [GXC.GetLeader]."
 GXC.endgame.611.d.yunhu: "$GXC.endgame.611.d.intro$\n\nДля Ху Жоюя это смелая игра. Он потратил годы, пробиваясь к власти в Юньнани, что он может легко потерять в такой отчаянной авантюре. Но, возможно, тот факт, что он пошел на такой риск, является показателем того, как мало доверия существует между милитаристами."
 GXC.endgame.611.d.shxyan: "$GXC.endgame.611.d.intro$\n\nДля Янь Сишаня это отражение его чистых амбиций. Поскольку АНЗ устранил его соперников на севере, он извлек большую выгоду из страхов Бэйяна быть затмеваемым югом. Теперь вопрос только в том, сможет ли он подкрепить свои амбиции победами на поле боя..."
 GXC.endgame.611.d.generic: "$GXC.endgame.611.d.intro$\n\nНеясно, восстанут ли какие-либо другие провинции в это время, но пока, по крайней мере, инициатива находится в руках [FROM.Capital.GetCapitalVictoryPointName]. Как долго продлится этот импульс — другой вопрос."
 GXC.endgame.611.a: "У повстанцев только одна судьба!"
 GXC.endgame.611.b: "Может быть только один хозяин Китая."

##NPA YGF Ending Events (630-659):
 GXC.endgame.630.t: "Править нацией"
 GXC.endgame.630.d: "С его победой в войнах за объединение Китая положение Президента Лу Юйгуана в новом порядке Китая было скреплено кровью. Он расправился с последними из своих врагов в бою, изгнав соперничающих претендентов на власть и подавив любых повстанцев, которые осмелились бросить ему вызов. И с этим он стал лицом национального объединения — остаются инакомыслящие, но неоспоримая власть имеет тенденцию сглаживать острые углы имиджа лидера.\n\nС этой властью приходит необходимость демонстрировать лидерство для долгое время раздробленной нации. Президенту нужно задать долгосрочное направление для своего режима, и это начинается с выбора Премьер-министра. Поскольку утверждение на данном этапе является лишь формальностью, многие ожидают, что генерал Ма Цзи будет естественным выбором: опытный генерал со связями в Чжили и опора Молодой фракции Гуанси. Его выбор укажет на желание милитаристов Гуанси воспроизвести систему Чжили, заменив Цао Куня и У Пэйфу новой хунтой сильной руки, вокруг которой будет вращаться остальная часть республики. Но, несмотря на их якобы тесный союз, у Лу также могут быть некоторые оговорки — Ма может быть достаточно силен, чтобы затмить его уже, и многие видят в нем выбор старой гвардии.\n\nЕсть много тех, кто призывал к переменам во имя «Южного духа»: теперь, когда коррумпированный Бэйянский режим свергнут, было бы правильно, если бы новое правительство перешло к гражданскому правлению. Ма Цзюньу, давний педагог и старый революционер Тунмэнхуэя, связанный с кликами Гуанси, может лучше всего подойти под этот шаблон. Высокомерный, тщеславный, но уважаемый многими за свою работу как писатель, промышленник и учитель, он скромно утверждает, что не интересуется политикой и предпочитает свои книги и поэзию. Но мало кто ожидает, что он откажется от предложения поста Премьер-министра."
 GXC.endgame.630.a: "Генерал Ма Цзи — естественный кандидат на эту должность."
 GXC.endgame.630.a_tt: "§YПопулярность партий §gАвторитарных демократов§! и §PПатерналистов-автократов§! поменяется местами.§!"
 GXC.endgame.630.b: "Ученый Ма Цзюньу будет Премьер-министром."

 GXC.endgame.631.t: "Консерватория Гуанчжоу"
 GXC.endgame.631.d: "После роспуска императорского Китая в 1911 году китайский народ почувствовал острую необходимость укрепить и оживить традиционную китайскую культуру. Музыканты начали организовывать большие ансамбли традиционных китайских инструментов, таких как смычковый струнный «эрху», щипковый струнный «чжэн» и «пипа», духовые инструменты, такие как «дицзы», и многие другие. В то же время, однако, они также привезли западные инструменты и начали организовывать секции, подобные их европейским оркестровым эквивалентам.\n\nСянь Синхай — один из этих новых инновационных композиторов родом из португальского Макао от родителей танка из Гуандуна. Поскольку его отец умер в раннем детстве, Сянь следовал за своей матерью и в конечном итоге иммигрировал в Сингапур, где поступил в начальную школу Янчжэн, что стало его первым шагом в музыкальном образовании. Позже его привезли в Гуанчжоу для дальнейшего образования, где он начал изучать кларнет в дополнение к теории классической музыки. Проучившись два года в Сингапуре с 1924 по 1926 год, Сянь поступил в Национальный институт музыки при Пекинском университете, а затем в Национальную Шанхайскую консерваторию музыки для изучения скрипки и фортепиано.\n\nСян быстро подружился с другим кантонским музыкантом, Ма Сыцуном. Сын Ма Юйхана (доверенного лица Чэнь Цзюнмина), Ма Сыцун в юности освоил как фортепиано, так и юэцинь. Влюбившись в скрипку, Ма Сыцун отправился во Францию, где учился в Парижской консерватории. Там он встретил Сянь Синхая и вместе со своим коллегой Чэнь Хуном основал Консерваторию Гуанчжоу; первую частную музыкальную школу Гуанчжоу. Гордясь тем, что она первой в Южном Китае обучает и воспитывает на высшем уровне как китайской, так и западной музыке, композиторы особенно сосредоточились на националистических и культурных темах — подчеркивая богатые исторические традиции Китая с элегантностью современности."
 GXC.endgame.631.a: "Китайская культурная сцена растет!"

 GXC.endgame.632.t: "Маршал и ФКДП"
 GXC.endgame.632.d: "Когда был основан Альянс национальной защиты, он объединил милитаристов и интеллектуалов, чтобы противостоять тирании Юань Шикая. Лу Жунтин построил свой культ личности вокруг того, что он человек из народа, изображая себя фигурой в стиле Робин Гуда, возглавляющей восстание против злого монарха. Хотя многие видели в нем вместо этого жестокого милитариста, его наследие было значительно улучшено успехом его сына, который надеется уловить тот же дух Синьхая.\n\nЛу Юйгуан сталкивается с совершенно другой республикой, чем его отец. Синьхайская революция становилась циничной даже в свое первое десятилетие. Целое поколение с тех пор пережило войну и авторитаризм при нескольких режимах. Республика воссоединилась, сначала при Чжили, а теперь при Молодой фракции Гуанси. Но объединение нации также принесло объединение оппозиции.\n\nФедерация китайских демократических партий (ФКДП) выступала за парламентскую форму правления, аргументируя это ограничениями исполнительной власти и созданием коалиционного правительства, представляющего все партии. Она также требовала легализации всех политических партий, гарантии гражданских свобод, отмены тайной полиции и исправительно-трудовых лагерей, прозрачности в правительстве и справедливости при найме. Они придумали девиз «Демократическое объединение и мирная реконструкция», используя более глубокое разочарование десятилетиями бесхозяйственности и авторитаризма.\n\nФКДП в конечном счете бессильна реально выполнить свои требования. Они были полезным инструментом для легитимации нашего захвата власти, но наши цели снова разошлись. Но это бессилие также дает им фактически полную свободу требовать того, чего они хотят, и никто не ожидает, что они выполнят это. Они могут организовывать протесты и писать критику, но это бессмысленно, когда нам противостоит мало или вообще не осталось милитаристов. Возможно, есть польза в том, чтобы предложить им некоторые уступки, но в конечном счете ясно, кто действительно держит власть в Китае."
 GXC.endgame.632.a: "Лу Юйгуан в своем благоволении выслушает их честные отзывы."
 GXC.endgame.632.b: "ФКДП может ныть, но скоро снова начнет драться за крохи."

###NPA CMC Ending Events (660-689):
 GXC.endgame.660.t: "Последний выход демократии"
 GXC.endgame.660.d: "Несмотря на их руководство объединением Китая, мало кто мог бы попытаться назвать себя преданными союзниками или друзьями Ассоциации всех сословий по спасению Гуандуна, или торговцев, или бизнесменов и промышленников. И даже среди этих групп мало кто с любовью смотрит на Чэнь Ляньбо с его высокомерием и непрекращающимися амбициями. Создавая свое собственное правительство, вряд ли сопоставимое с большинством других в Китае, Чэнь обратился к своим корням в Гуанчжоу и Гонконге, стремясь учредить то, что публицисты называют «демократией по-кантонски». В высшей степени элитарная, где голоса имеют значение, но голосующие участники — это практически исключительно богатые люди и люди с хорошими связями. Хотя внешне это не слишком далеко от демократии Бэйяна, Старая Республика, по крайней мере, несла в себе номинальные претензии на свободные, справедливые и равные выборы, даже если на практике это было не так; это все же значительный шаг вперед, почти кодифицирующий правление элиты.\n\nЗначительно сузив круг избирателей для избранных представителей, те, кто избран в Ассамблею и Сенат, и кто затем голосует за Президента, являются, безусловно, старыми представителями истеблишмента и некоторыми из новых элит, введенных Чэнем. Но при всем их величии, собственные чувства торговцев могут стать их собственной глупостью. С вопиющим фаворитизмом к югу страны и благодаря махинациям Клики политической науки (Чжэнсюэси), значительно развитый свободный альянс фигур объединился, чтобы противостоять Торговцам.\n\nСплотившись под знаменем героя войны Лю Чжэньхуаня, чьи амбиции в Гуанси сделали его соперником Чэня, Лю сумел привлечь к своему делу пеструю команду милитаристов, членов Федерации китайских демократических партий и даже случайных бывших революционеров. Выдвигая Линь Чжэнсюаня своим кандидатом на пост премьер-министра (хотя и неофициально до утверждения в должности), дуэту удалось организовать договоренность с другими фигурами КПН, такими как Хуан Фу или Гу Чжунсю, для утверждения их ролей в кабинете в обмен на единство Клики."
 GXC.endgame.660.a: "И бюллетени звучат за Чэня!"
 GXC.endgame.660.b: "Лю Чжэньхуань обеспечивает себе пост Президента!"

 GXC.endgame.661.t: "Жизнь Цзян Кунъиня"
 GXC.endgame.661.d: "Благодаря своей роли главного порта на Жемчужной реке и, следовательно, одного из самых ранних проходов, соединяющих Запад с Востоком, а также благодаря близости к британскому торговому порту и колонии Гонконг (с материковым Китаем, соединенным с Новыми Территориями и Коулуном), джентри и купеческий класс Гуанчжоу разбогатели. Хотя, по иронии судьбы, они находились в традиционно низших эшелонах китайского общества, все более глобализированный и индустриальный мир породил богатых джентри, которые наживались на поставках чая, опиума и других богатств с Востока.\n\nОдним из таких кантонских бизнесменов стал не кто иной, как Цзян Кунъинь. Родившийся в 1864 году, Цзян увидел ранний политический взлет при Кан Ювэе. После сдачи имперских экзаменов он был назначен на должность управляющего по оказанию помощи сельским районам, где он работал над подавлением бандитов. Во время своей работы в государственном управлении он также питал симпатии к революционному движению, улучшал местные сорта фруктов, построил узкоколейную железную дорогу от района Наньган до Логанвэя и начал несколько проектов по сохранению погоды.\n\nНесмотря на свою имперскую ориентацию, он также продемонстрировал симпатии к кантонским революционерам — работая с Ван Цзинвэем, Чэнь Цзинхуа и встречаясь с Сунь Ятсеном после провала Второй экспедиции в Гуанчжоу. Столкнувшись с реальностью Синьхайской революции и падением монархии Цин, Цзян помог убедить генерал-губернатора Лянгуана и адмирала флота выразить свою поддержку революционному движению и отделиться от Цин.\n\nЦзян также известен своими изысканными блюдами, известными как «Рецепты Тайши». Ведущие военные и гражданские элиты в Гуанчжоу приходили в его особняк, чтобы попробовать их, из которых наиболее известен «Суп из пяти змей Тайши». Теперь, в старости, став свидетелем поздней династии Цин, Ранней Республики, милитаристов Гуандуна и теперь национального объединения, Цзян проводит свои дни на пенсии, занимаясь кулинарией или каллиграфией."
 GXC.endgame.661.a: "Не мешайте ему готовить."

 GXC.endgame.662.t: "Вдохновляя китайскую демократию"
 GXC.endgame.662.d: "В высших коридорах правительства президента [ROOT.GetLeader] циркулируют постоянные слухи о компрадорстве. О связях с британцами или косвенно с японцами или немцами. И это правда, что президент [ROOT.GetLeader] с любовью смотрит на промышленно развитые страны, но не для того, чтобы продать Китай. А вместо этого как на модель государственного управления для подражания. Бисмарковская Германия, Япония Мэйдзи, правление вигов в Британии или Соединенные Штаты. Все государства и все партии имели свою справедливую долю историй успеха и тревожных споров, но все они были распорядителями Великих Держав, способными уверенно проявлять себя в экономических и военных делах. И именно в отношении этих государств и партий внутри Ассамблеи, Сената и даже Кабинета возникли фракции, касающиеся направления или модели, которой должны следовать Президент и его верные люди.\n\nС одной стороны, все более развивающаяся группа чиновников, технократов и тех, кто связан с промышленным лобби, которые стремятся подражать успеху своего соседа в Восточной Азии — Японии. С обильной индустриализацией, собственной Империей и смелой попыткой демократии многие искренне верят, что Япония является наиболее сопоставимым и подходящим примером, вдохновляющим Китай как благоприятная возможность для государственного развития.\n\nОднако на противоположном конце находятся те, кто верит в необходимость придерживаться еще более высокого демократического идеала. Сторонники национальной гармонии, эгалитаризма и либерального конституционализма, они объединились, чтобы выступать за политику, аналогичную политике вигов и тори в Британии (ныне либералов и консерваторов). Ссылаясь на вестминстерский парламентаризм как на коренное вдохновение для демократии на Востоке, эта группа «вестминстерцев» в значительной степени мотивирована своими националистическими тенденциями или прозападными и пробританскими связями, надеясь предотвратить любую зарождающуюся японофилию в правительстве."
 GXC.endgame.662.a: "Мы должны лишь взглянуть на восток, на Восходящее Солнце!"
 GXC.endgame.662.b: "Мы должны подражать успеху Питта, Пиля и Чемберлена."

##NPA SAF Ending Events (690-719):
 GXC.endgame.690.t: "Смерть Шэнь Хунъина"
 GXC.endgame.690.d: "Шэнь Хунъин был нездоров в течение некоторого времени, и по мере того, как празднования победы по всей стране затихают и начинается реконструкция, кажется, что жизнь генералиссимуса-завоевателя республики также подошла к концу. Он будет похоронен в грандиозной семейной гробнице с различными участками, уже подготовленными для его жен и наложниц. Его поминальная служба соберет миллионы, что станет огромным поворотом судьбы для человека, у которого был трудный путь к власти.\n\nСреди присутствующих на его похоронах есть люди, надеющиеся занять его место. Когда президент Шэнь попытался подготовить своего сына Шэнь Жунгуана в качестве преемника, (сравнительно) молодой генерал был воспринят как слишком незначительный, чтобы взять власть прямо сейчас. Его отец умер слишком рано, оставив старую Фракцию армии Шэнь в руинах.\n\nПремьер-министр Чжу Цзяхуа безжалостен, как змея. Создав свою собственную клику в правительстве, он быстро использует свои связи в Обществе Цзинсин, чтобы завоевать старый истеблишмент Бэйяна, иностранных эмиссаров и создать образ джентльмена, чтобы контрастировать с «бандитским» наследием своих соперников. В отличие от тех гуансийских «деревенщин», которые провели почти всю жизнь в отсталой провинции, космополит Чжу вырос в Восточном Китае, учился за границей и работал как в Пекине, так и в Гуанчжоу. Но его путь к власти в конечном итоге зависит от склонения ключевых фигур, таких как два Яна в армии, его соперников в Клике политической науки и коллегу по Цзинсин Ма Цзюньу, чтобы укрепить свою базу в Гуанси.\n\nЭтому дворцовому перевороту сопротивляется амбициозный генерал Ли Яохань. Его стремление к президентству сталкивается с трудностями, потому что он из Гуандуна и не пользуется особым уважением у гуансийских офицеров покойного маршала Шэня. Шэнь Жунгуан, однако, в целом может рассчитывать на поддержку людей своего отца, которые, как правило, были сплоченными. Если бы эти двое смогли объединиться достаточно быстро, они, возможно, смогли бы захватить контроль с помощью КПН. Но здесь замешаны большие амбиции и разные поколения."
 GXC.endgame.690.a: "Культурный Чжу Цзяхуа устраивает мягкий переворот, чтобы захватить власть!"
 GXC.endgame.690.b: "Ли Яохань и Шэнь Жунгуан объединяются, чтобы побороться за пост Президента!"

 GXC.endgame.691.t: "Музыка и культура в Гуанси"
 GXC.endgame.691.d: "Гуанси — это плавильный котел этнических групп и культур. Победа старой клики Гуанси сделала провинцию объектом восхищения китайских интеллектуалов, многие из которых ранее считали ее захолустьем, и которые теперь стремятся изучить причины, по которым они вышли победителями. Хотя многие сосредоточились на милитаристских аспектах общества Гуанси, также стало больше признательности (и государственной поддержки) его людям.\n\nПраздник двойной тройки (Саньюэсань), иногда называемый Праздником омовения, является общенациональным праздником, отмечаемым в апреле, когда люди чтят своих предков у реки, а затем купаются, чтобы очистить свои тела от скверны, прежде чем насладиться днем на пикниках. Праздник особенно популярен среди чжуанов, которые отмечают его песнями, танцами, играми и едой. Хотя некоторые культурологи недавно пытались использовать его как средство выделения культуры чжуанов, по большей части он стал туристической достопримечательностью.\n\nТуристы в Гуанси часто едут в старый город Гуйлинь, известный своим прекрасным видом на реку Ли и город принца Цзинцзяна. Кухня Гуанси находится под влиянием более легкой кантонской кухни и острой и кислой кухни Гуйчжоу, часто смешивая клейкий рис с острыми и кислыми приправами. Различные регионы Гуанси часто имеют свои уникальные стили вкуса.\n\nФедерация литературных и художественных кругов Гуанси также была создана в Наньнине среди работников культуры, собирая народную музыку и продвигая гуманитарные науки. Хотя музыка Гуанси сравнительно малоизвестна, она иногда может включать в себя уникальные элементы. Народ цзин известен струнным инструментом под названием дусяньцинь, а чжуаны известны своими ансамблями инструментов баинь. Их самая известная народная певица — Лю Саньцзе, чжуанский музыкант 1100-х годов, чье творчество сейчас переоткрывается. Гуанси также является родиной Гуйцзюй, похожей на Пекинскую оперу, но исполняемую на диалекте Гуйлинь."
 GXC.endgame.691.a: "Прекрасная провинция и замечательные люди."

 GXC.endgame.692.t: "Мир перевернулся с ног на голову"
 GXC.endgame.692.d: "Не так давно Чжили были в расцвете сил — победив Гоминьдан при поддержке Германии, они затем разгромили Фэнтяньскую клику и их союзников в последующих конфликтах, чтобы претендовать на Пекин и полное лидерство в Китае. В ту эпоху потрепанная Старая клика Гуанси и их враждующие генералы были вынуждены играть вспомогательную роль, наемных головорезов для Чжили, чтобы подчинить юг.\n\nЧжили затем, конечно, правили в течение десятилетия, закрепляясь в бюрократии и армии, формируя Ассоциацию Гармонии, чтобы сгонять политиков под свой зонтик, заключая эксплуататорские сделки с немцами, сражаясь между собой за влияние и в конечном итоге становясь декадентскими и высокомерными, поскольку их наемные милитаристы становились сильнее и все более недовольными, пока, наконец, их карточный домик не рухнул.\n\nТеперь Старая клика Гуанси является восходящей силой, а бывшие Чжили — это те, кто отчаянно пытается ухватиться за любое влияние, которое они могут собрать. Фракция армии Шэнь всегда была своего рода посредником между ними, осколком от более широкой Старой клики Гуанси, который получил обширное покровительство Чжили после Северного похода.\n\nКонечно, сейчас было бы не слишком сложно разделить власть, поскольку бывшие Чжили в основном сосредоточены на Севере и Востоке, в то время как клика Гуанси и союзники в основном являются южной силой. Вывод наших военных гарнизонов и разрешение гражданского правления, вероятно, стабилизировали бы страну. Но никогда не знаешь, когда произойдет следующий поворот фортуны, или что они замышляют."
 GXC.endgame.692.a: "Нам нужно работать, чтобы снова объединить весь Китай."
 GXC.endgame.692.b: "Нам нужно работать, чтобы закрепить наше правление над всем Китаем!"

##NPA Epilogue Events (720-749):
 GXC.endgame.720.t: "Меч прогресса"
 GXC.endgame.720.d: "Возможно, ничто не презирается в китайском обществе больше, чем воинствующий и корыстный милитарист. Для многих милитарист — это всего лишь бандит с самой большой палкой, чьи хобби — только самовозвеличивание и грабеж. Тем не менее, некоторые милитаристы были известны китайскому народу не как бандиты, а как герои.\n\nЦай Э навсегда запомнится как человек, который выступил против автократической империи Юань Шикая и защитил республику вопреки превосходящим силам. Сунь Чуаньфан, хозяин Восточного Китая на протяжении почти десятилетия, запомнится в Цзянсу как человек крестьянства. У Пэйфу, несмотря на его связь с терпящим крах пекинским режимом, запомнится как столп антияпонского сопротивления в стране в ее самые трудные годы. Лу Юйгуан, Молодой маршал Юга и наследник Лу Жунтина из Зеленого леса, надеется править больной нацией не как автократический бандит, оставляя Китай в худшем состоянии, чем он его нашел, а как прогрессивно мыслящий лидер с южными взглядами.\n\nТакая администрация, безусловно, встряхнет политику страны. Китай долгое время управлялся конфуцианской моралью, сначала Сынами Неба, а затем традиционалистскими милитаристами Бэйяна. И все же здесь стоит Лу Юйгуан, первый правитель всего Китая родом из Южного Китая со времен последних императоров Мин.\n\nХотя никто в здравом уме не ожидает, что он будет править как радикальный подстрекатель по образу группы социалистических революционеров Сунь Ятсена, возможно, Лу проложит путь, не слишком отличающийся от духа Прогрессивной партии Ли Юаньхуна или Исследовательской и Конституционной партий Ляна. Молодой сын Лу Жунтина окружил себя прогрессивными интеллектуалами, все они надеются, что Молодой маршал прислушается к их идеалистическим идеям. Конечно, Молодой маршал достаточно умен, чтобы не прислушиваться к советам мечтателей слишком внимательно, но, возможно, Китайская Республика наконец узнает правителя, который может облегчить страдания народа."
 GXC.endgame.720.a: "Троекратное ура Лу Юйгуану, герою дня!"

 GXC.endgame.721.t: "Естественные преемники Чжили"
 GXC.endgame.721.d: "Китайская Республика за несколько десятилетий своего существования претерпела большие изменения. В высокий период Эры милитаристов казалось, что каждый год возвещал о новом милитаристском режиме, заседающем в залах Чжуннаньхай в Пекине. Конец эры милитаристов ознаменовался реставрацией монархии Цин, но после десятилетия тяжелого существования она отошла на второй план вместе с Кликой Чжили.\n\nТеперь впервые со времен Великой Мин Срединное Королевство было объединено с Юга. Возможно, однако, эта новая Республика последует наследию правительства Чжили 20-х и 30-х годов. Ма Цзи и Лу Юйгуан делят власть так же, как Нефритовый маршал и Король Баодина, и вместе направляют Национальную ассамблею, выводя Китай из потрясений начала 20-го века в эпоху мира и процветания. Некоторые демократические процессы были восстановлены, но больший плюрализм продолжает ускользать от нового правительства.\n\nТем не менее, военные продолжают сохранять значительную власть за кулисами, а офицеры Клики Гуанси закрепляются на позициях большой власти в Республике, вероятно, чтобы сформировать основное ядро новой элиты для грядущих поколений. Это оставило многих лишенных прав бывших военных из проигравших клик и фракций ворчать на текущее положение дел, но неспособных вызвать политические изменения в свою пользу из-за повышенного состояния стабильности, в котором находится нация.\n\nКлика Гуанси приходит к власти в критический момент в истории Китая, когда усилия Японской империи по порабощению нации были сорваны, а конец Века унижений наконец наступил. Несомненно, правление Лу Юйгуана и Ма Цзи определит направление Республики на десятилетия, если не столетия, и история рассудит, хорошо ли правят приемные сыновья бандита."
 GXC.endgame.721.a: "Сыновья Гуанси ведут нас в завтрашний день через уроки вчерашнего!"

 GXC.endgame.722.t: "1000 лет коммерции"
 GXC.endgame.722.d: "Некогда доминирующий титан всех дел от Запада до Востока, расцвет торговцев и бизнеса, несущих чрезвычайно большой политический вес, вызывает мысли о более ранних веках, о давно прошедшем времени, о Ганзейском союзе, о великих торговых империях или о плутократических государствах Рима и Греции. Однако по мере развития времен менялись и формы, с помощью которых богатые проявляют свое политическое влияние и используют свои денежные средства как оружие. Становясь политиками или финансируя свои кампании, умные пожертвования, наглая коррупция, все виды менее чем благородных поисков власти. И все же в Китае действующее правительство вызывает воспоминания о более утонченном периоде; где доминируют элиты на основе истинного консенсуса о лучших путях развития китайской промышленности.\n\nС подтянутыми костюмами и свежими рукопожатиями решаются всевозможные законодательные и исполнительные вопросы, возможно, с красным конвертом от «дальних родственников» тут и там. Управляемый непосредственно теми банкирами, промышленниками и торговцами, которые остаются руками за троном во многих других странах, Чэнь Ляньбо стал своего рода магнатом или примером для подражания своим коллегам-предпринимателям и бизнесменам. Одетый в лучшее, что можно купить за деньги, и с прямой, но расчетливой формой политики, некогда простой мэр Гуанчжоу и бывший «предатель» поднялся, чтобы стать одним из самых богатых людей в мире.\n\nНаконец достигнув своих амбиций ответственного правительства под руководством торговцев, заседания кабинета Чэня укомплектованы чиновниками из всех ключевых отраслей, представляя то, что многие называют китайским дзайбацу. Не заботясь о вероломных вопросах земельной реформы, внутренняя и экономическая политика Чэня привела к грандиозным шагам индустриализации и финансового роста, хотя немногие из тех, кто трудится на полях и работает на фабриках, могли бы честно сказать разницу между старым и новым. Но позиция Китая быстро стала позицией «мировой фабрики», поскольку торговцы жаждут подняться на еще большие высоты и прибыли."
 GXC.endgame.722.a: "Деньги заставляют мир вращаться."

 GXC.endgame.723.t: "От революционера к государственному деятелю"
 GXC.endgame.723.d: "Что касается китайских революционеров, карьера Лю Чжэньхуаня, пожалуй, является самой замечательной. Вступив в Тунмэнхуэй в 1907 году, он привлек таких людей, как Шэнь Хунъин, к восстанию в Гуанси. В течение многих лет долгой, тяжелой и смертельной борьбы революционная деятельность Лю демонстрировала подлинное чувство убежденности и веры в идеалы Тунмэнхуэя и Гоминьдана. Молодой и энергичный, он был надежным солдатом революции, неоднократно организуя солдат в Гуанси, работая над продвижением революции в Юго-Восточной Азии и даже присоединяясь к Старой клике Гуанси, предав их ради Чэнь Цзюнмина и Гуандунской армии. Однако, превратившись в фактически милитариста в 1920-х годах, некогда оптимистичный революционер стал человеком, испорченным конфликтом.\n\nВопиюще не подчиняясь приказам доктора Сунь Ятсена, армия Гуанси Лю стала обузой, предпринимая действия в соответствии с Гоминьданом только в том случае, если это было выгодно самому Лю. Примкнув к Клике политической науки, Лю сотрудничал с Ян Симинем для защиты их интересов. Однако после разногласий с Реорганизацией 1924 года и с амбициями захватить Гуанси Лю попытался свергнуть правительство Гуандуна, в конечном итоге оказавшись в изгнании в Гонконге. Возвращение Лю на политическую сцену Лянгуана совпало с возвращением Политической науки к известности.\n\nИзбранный Президентом во главе межпартийной коалиции для предотвращения диктатуры Торговцев, слава Лю как героя войны, наряду с его легкими отношениями с прогрессивными демократами и другими милитаристами, позволили ему обеспечить себе президентский пост. Получив прозвище «Китайский Монро» из-за его последовательных призывов к национальному единству и беспартийному управлению, патрицианский прогрессивизм Лю отметил его как удивительного демократа. На пути к истинной демократии, похоже, Национальная революция нашла свою опору, но в самых странных попутчиках."
 GXC.endgame.723.a: "Возможно, будущее все-таки светлое."

 GXC.endgame.724.t: "Рейх Востока"
 GXC.endgame.724.d: "В течение тысячелетий Китай оставался непревзойденным как величайшая империя мира. Таким образом, императоры Цин не встретили подъем европейских колониальных держав с должной серьезностью и пострадали от последствий высокомерия. Век унижений научил китайскую нацию тому, что если Китай хочет снова стать великим, он должен извлечь уроки из опыта Запада и перенять его сильные стороны, избегая при этом его слабостей. В то время как некоторые рассматривали Великобританию или Соединенные Штаты как столпы Запада, у которых Китаю следовало бы поучиться, Британская революция и Вторая гражданская война в Америке показали их врожденные слабости.\n\nЛи Линсы, основатель Общества Цзинсин, совершил турне по Европе для продвижения китайской культуры на Западе и изучения европейских событий, и обнаружил, что Германия является истинным бьющимся сердцем Континента. В то время как Британия и Франция выродились в фанатичные рабочие государства, именно Германия продолжала развивать стабильное и рациональное правительство, которое принесло процветание своему народу. После того как Германия вмешалась в дела Китая, чтобы предотвратить распространение китайского большевизма, Цзинсин продолжало поощрять дальнейшие связи между Берлином и Пекином. Член Цзинсин Чжу Цзяхуа оказался в Гуандуне в начале 30-х годов и по стечению обстоятельств и удаче смог обеспечить себе пост Президента Республики в разгар кончины генерала Шэня.\n\nС консолидацией Китая впервые за десятилетия на Чжу ложится задача восстановления порядка во всем Срединном Королевстве и определения перспектив Республики. Убежденный германофил, Чжу стремится использовать немецкие связи, которые были предоставлены Китаю, и восстановить величие Китая на мировой арене. Бисмарковский государственный социализм, долгое время поддерживаемый элитой Китая, станет основной экономической мыслью Китая Чжу. Немецкая демократия, доказавшая свое превосходство над англосаксонской демократией, обеспечит китайскому народу надлежащий плюрализм и свободу. Дракон и Орел будут летать как одно целое, пока Дракон снова не воспарит надо всем."
 GXC.endgame.724.a: "Президент Чжу узнает успех, когда видит его!"

 GXC.endgame.725.t: "Республика под управлением железной воли"
 GXC.endgame.725.d: "Клика Чжили, естественная правящая сила во всем Китае, продолжает возглавлять усилия по возвращению нашей униженной нации на острова величия. Хотя Пекинскому правительству не суждено было существовать вечно, Цао Куню, У Пэйфу и Сунь Чуаньфану следует аплодировать за восстановление стабильности по всей стране после абсолютного хаоса Эры Высокого Милитаризма. И даже несмотря на то, что могущественные Нефритовый Маршал и Маршал Лиги не смогли остановить хаос конца 30-х годов, маршал Шэнь Хунъин смог последовать их безупречному примеру и восстановить порядок по всей стране.\n\nМаршал Шэнь отдал свою жизнь за возрождение Республики, и вся нация чтит его жертву. Как маршал Шэнь следовал по стопам У и Суня, так и маршал Ли Яохань. Пожилой человек, как Шэнь и У, маршал Ли не рассчитывает править Китаем долго. Однако приверженность маршала Ли порядку и прогрессу не имеет себе равных, и он обеспечит, чтобы управление Китаем было поставлено на правильный путь до того, как его время в этом мире подойдет к концу. Национальная ассамблея проводит законодательство для экономической и социальной реконструкции нации, а военные продолжают восстанавливать порядок по всей земле.\n\nМаршал Ли за свои семь десятилетий жизни видел, что провалилось, а что сработало, и, несомненно, будет руководить Ассамблеей своей мудростью. Администрация Ли Яоханя заявила о приверженности продолжению процветания и девелопментализма старого правительства Чжили Цао, и с силами Ли, консолидирующими контроль над всем Китаем, мало кто сомневается в его способности реализовать свои амбиции. Многие признают, что эра эгоизма и оппортунизма подошла к концу, и пожилой маршал поведет всех в расцветающий Китайский Век."
 GXC.endgame.725.a: "У того, кто правит Китаем, должно быть это железо внутри!"

####Section 5h (900-999): End Game ForPol Events
 GXC.endgame.900.t: "Белое Солнце в Куала-Лумпуре"
 GXC.endgame.900.d.RCA: "В последние десятилетия династии Цин многие китайские революционеры бежали в Юго-Восточную Азию, где сформировались многие общины зарубежных китайцев, сочувствующие республиканскому делу. Выделяясь среди остальных, Малайя стала очагом китайской революции, где будущий лидер Гоминьдана Ван Цзинвэй встретил свою жену, родившуюся в Малайе китаянку Чэнь Бицзюнь, в Сингапуре.\n\nМногие видные малайские китайские бизнесмены предлагали финансовую поддержку растущему Тунмэнхуэю и радовались за своих товарищей с материка после успеха Синьхайской революции. Однако, в то время как Китай освободился от оков дряхлой Цин, малайские китайцы продолжали трудиться под британским колониальным правлением. В то время как многие надеялись на свободную Малайю после краха Британской империи, плоды падения Британии получили не малайцы, а восходящая Германская империя.\n\nК счастью, когда военные действия в Европе вспыхнули снова, Германия не смогла удержать свою Азиатскую империю и была изгнана навсегда. После десятилетий британского и немецкого колониального правления Малайя наконец оказывается свободной от империализма, освобожденной мощью Национально-революционной армии и неукротимым духом малайского народа.\n\nПредседатель [ROOT.GetLeader], в частности, отметил вклад Чжуан Минли, председателя Всеобщего профсоюза Малайи. Родившийся в Фуцзяни, Чжуан вырос в Пинанге и стал участвовать в китайских революционных организациях. Очень сочувствующий Ассоциации реорганизованных товарищей, Чжуан получил доверие возглавить молодое правительство Малайи. Хотя он, безусловно, молод, народ Малайи уверен, что он поведет нацию в новую эпоху."
 GXC.endgame.900.d.PAC: "В последние десятилетия династии Цин многие китайские революционеры бежали в Юго-Восточную Азию, где сформировались многие общины зарубежных китайцев, сочувствующие республиканскому делу. Выделяясь среди остальных, Малайя стала очагом китайской революции, где будущий лидер Гоминьдана Ван Цзинвэй встретил свою жену, родившуюся в Малайе китаянку Чэнь Бицзюнь, в Сингапуре.\n\nМногие видные малайские китайские бизнесмены предлагали финансовую поддержку растущему Тунмэнхуэю и радовались за своих товарищей с материка после успеха Синьхайской революции. Однако, в то время как Китай освободился от оков дряхлой Цин, малайские китайцы продолжали трудиться под британским колониальным правлением. В то время как многие надеялись на свободную Малайю после краха Британской империи, плоды падения Британии получили не малайцы, а восходящая Германская империя.\n\nК счастью, когда военные действия в Европе вспыхнули снова, Германия не смогла удержать свою Азиатскую империю и была изгнана навсегда. После десятилетий британского и немецкого колониального правления Малайя наконец оказывается свободной от империализма, освобожденной мощью Национально-революционной армии и неукротимым духом малайского народа.\n\nПрезидент [ROOT.GetLeader], в частности, отметил вклад Пэн Цзэминя. Давний сторонник китайской революции, Пэн служил секретарем отделения Тунмэнхуэя в Куала-Лумпуре. Известный своей оппозицией диктаторскому контролю Ван Цзинвэя над партией, Пэн за свои заслуги и демократические убеждения был вознагражден руководством молодым правительством Малайи. Политический ветеран, народ Малайи уверен, что у Пэна есть все необходимое, чтобы вести истерзанную войной нацию в светлое будущее."
 GXC.endgame.900.d.CRS: "В последние десятилетия династии Цин многие китайские революционеры бежали в Юго-Восточную Азию, где сформировались многие общины зарубежных китайцев, сочувствующие республиканскому делу. Выделяясь среди остальных, Малайя стала очагом китайской революции, где будущий лидер Гоминьдана Ван Цзинвэй встретил свою жену, родившуюся в Малайе китаянку Чэнь Бицзюнь, в Сингапуре.\n\nМногие видные малайские китайские бизнесмены предлагали финансовую поддержку растущему Тунмэнхуэю и радовались за своих товарищей с материка после успеха Синьхайской революции. Однако, в то время как Китай освободился от оков дряхлой Цин, малайские китайцы продолжали трудиться под британским колониальным правлением. В то время как многие надеялись на свободную Малайю после краха Британской империи, плоды падения Британии получили не малайцы, а восходящая Германская империя.\n\nК счастью, когда военные действия в Европе вспыхнули снова, Германия не смогла удержать свою Азиатскую империю и была изгнана навсегда. После десятилетий британского и немецкого колониального правления Малайя наконец оказывается свободной от империализма, освобожденной мощью Национально-революционной армии и неукротимым духом малайского народа.\n\nГенералиссимус Ху Цзуннань, в частности, отметил вклад Лай Тека. Родившийся во Вьетнаме революционер, Лай нашел свой путь в Малайю и быстро стал известен. Прирожденный лидер с полосой удачи, Лай Тек и Армия трех звезд боролись за революционное дело всех малайцев. Опытный революционер с непредсказуемыми революционными протеже, Лай знает цену крови, заплаченную за свободную Малайю, и не растратит безопасность молодой нации."
 GXC.endgame.900.d.RKMT: "В последние десятилетия династии Цин многие китайские революционеры бежали в Юго-Восточную Азию, где сформировались многие общины зарубежных китайцев, сочувствующие республиканскому делу. Выделяясь среди остальных, Малайя стала очагом китайской революции, где будущий лидер Гоминьдана Ван Цзинвэй встретил свою жену, родившуюся в Малайе китаянку Чэнь Бицзюнь, в Сингапуре.\n\nМногие видные малайские китайские бизнесмены предлагали финансовую поддержку растущему Тунмэнхуэю и радовались за своих товарищей с материка после успеха Синьхайской революции. Однако, в то время как Китай освободился от оков дряхлой Цин, малайские китайцы продолжали трудиться под британским колониальным правлением. В то время как многие надеялись на свободную Малайю после краха Британской империи, плоды падения Британии получили не малайцы, а восходящая Германская империя.\n\nК счастью, когда военные действия в Европе вспыхнули снова, Германия не смогла удержать свою Азиатскую империю и была изгнана навсегда. После десятилетий британского и немецкого колониального правления Малайя наконец оказывается свободной от империализма, освобожденной мощью Национально-революционной армии и неукротимым духом малайского народа.\n\nПредседатель [ROOT.GetLeader] и Партия, в частности, признали вклад Лян Югао (Leong Yew Koh). Известный на материке как Лян Югао, Леонг вступил в Тунмэнхуэй в возрасте 16 лет и во время вторжения Японии возглавил партизанскую войну Антияпонской армии зарубежных китайцев. После укрепления китайского контроля над Малайей Леонг сформировал братскую партию ГМД в Китайской ассоциации Малайи и готов вести нацию в новую эпоху процветания и этнического равенства."
 GXC.endgame.900.a: "Малайя помогла освободить Китай от тирании, теперь пришло время вернуть долг!"

