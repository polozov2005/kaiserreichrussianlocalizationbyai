###- Phase V Decisions -###

 GXC_mass_collectivisation_category: "Коллективизация Гуандунской ассоциации фермеров"
 GXC_mass_collectivisation_category_desc: "Хотя китайская нация может быть объединена под эгидой Бодхисаттвы Пэна, изо дня в день крестьянство продолжает стенать под гнетом вероломных джентри и помещиков. Больше так не будет! Любыми необходимыми методами крестьянство сбросит свои цепи и хозяев, восстав к новой утопии!"

 GXC_mass_collectivisation: "Усилия по массовой коллективизации в [FROM.GetName]"
 GXC_mass_collectivisation_desc: "Крестьянство в [FROM.GetName] страдает под гнетом капиталистической и феодальной тирании. Пусть [ROOT.GetLeader] и его верные последователи предложат им спасение."

 GXC_revolutionary_new_culture_category: "Революционное движение за новую культуру Китая"
 GXC_revolutionary_new_culture_category_desc: "Решительный в своих убеждениях, Тань Пиншань увидел недостатки и заблуждения традиционной китайской культуры. Такие методы жизни принесли китайскому народу только потрясения, боль и страдания. Это разрушительное влияние уничтожило даже Национальную революцию наших предков. Истинная китайская культура — это революционная культура, классово сознательный народ, оправдывающий Революцию."

 GXC_revolutionary_new_culture_decision: "Обеспечить революционную культуру в [FROM.GetName]"
 GXC_revolutionary_new_culture_decision_desc: "[FROM.GetName] изобилует контрреволюционными настроениями и продолжает оставаться непросвещенным Третьей партией и нашими методами. Давайте работать над их возможной интеграцией в массовую Революцию."

