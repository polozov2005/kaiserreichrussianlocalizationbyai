 GXC_absolute_freedom_in_education_effect_tt: "§LЭтот фокус даст нам разные эффекты в зависимости от того, назначены ли советники §YХу Ши§!, §YШэнь Цзюньжу§! и §YЧжан Лань§!. Если у нас есть все советники, мы получим дополнительный эффект!§!"

 GXC_democratic_literati_effect_tt: "§LЭтот фокус даст нам разные эффекты в зависимости от того, назначены ли советники §YСюй Фулинь§!, §YШэнь Цзюньжу§! и §YЧжан Лань§!. Если у нас есть все советники, мы получим дополнительный эффект!§!"

 GXC_UPC_multi_partisan_democracy_focus_tt: "§CЭто прочное наследие федералистского движения — увидеть настоящую, честную и истинную§! §YНациональную Демократию§!§C, примененную на практике в Китайской республике.\n\nЭтот§! §YНациональный дух§! §Cпримет разные формы в зависимости от правящей партии.§!"

 GXC_reinvigorated_five_year_plan_tt: "§LКитайское Пограничье слишком долго оставалось слишком свободным и далеким от центра! Все районы к северу от Великой стены получат специальные государственные инвестиции!§!"

 GXC_encourage_free_enterprise_tt: "§LРазличные районы внутри страны будут выделены для особых экономических привилегий и стимулирования иностранных инвестиций. Это будет в основном сосредоточено вокруг тех регионов, где уже есть значительные иностранные инвестиции.§!"

 GXC_entrenching_the_yue_clique_tt: "§LВ стране нет другой организации или ассоциации, которая действительно заботилась бы об интересах народа! Сотрудничая с местными сетями, Клика Юэ практически превратит Гуандун в свою собственную вотчину.§!"

 GXC_guiding_provincial_federalism_tt: "§YНарушенные обещания и несостоявшаяся мечта растратили большую часть нашей поддержки! Вы потеряете стабильность пропорционально тому, сколько влияния §SСоциал-демократов§!, §nНационал-популистов§!, §mРыночных либералов§! и §cСоциал-консерваторов§! у вас было.§!"

 GXC_disarming_provincial_warlords_effect_tt: "§WМы получим военные фабрики в §YНанкине, Гуанчжоу, Пекине, Ухане и Чанша§!. Мы получим одну военную фабрику на город в зависимости от влияния нашей популярности §PПатерналистов-автократов§!.§!"

 GXC_reassuring_the_commercial_class_effect_tt: "§LРазличные районы внутри страны будут выделены для особых экономических привилегий и стимулирования иностранных инвестиций. Это будет в основном сосредоточено вокруг тех регионов, которые считаются «лояльными».§!"

 GXC_legacy_of_the_founder_tt: "§LМы получим уникальный эффект для этого фокуса в зависимости от нашего текущего §YГлавы государства!§!§!"

 GXC_fulfilling_our_social_promises_tt: "§LМы получим гражданские фабрики в §YНанкине, Гуанчжоу, Пекине, Ухане и Чанша§!. Мы получим одну гражданскую фабрику на город в зависимости от влияния совокупного итога половины нашей популярности §lСоциал-либералов§!, §gАвторитарных демократов§! и §PПатерналистов-автократов§!.§!"

 GXC_de_radicalise_the_three_principles_tt: "§LС нашим сближением с умеренными из Гоминьдана мы наймем членов остатков §SЛевых Чэнь Миншу§! наряду с другими приемлемыми левыми!§!"

 GXC_purify_the_yue_clique_tt: "§LПримирившись с Кликой Юэ, мы в конечном итоге возобновим отношения с некоторыми из ее менее сомнительных членов. Мы наймем приемлемых членов §gКлики Юэ§! наряду со связанными организациями.§!"

 GXC_promote_social_justice_tt: "§YМы получим гражданские фабрики и ячейки для строительства в Наньнине, Гуанчжоу, Куньмине, Ухане и Чанша. Мы получим до одной фабрики и одной ячейки для строительства на город в зависимости от совокупного влияния половины наших идеологий §SСоциал-демократов§!, §RРадикальных социалистов§!, §mРыночных либералов§!, §cСоциал-консерваторов§! и §PПатерналистов-автократов§!.§!"

 #Unification and Reconstruction Tooltips #
 GXC_unification_and_reconstruction_tt: "§YМы получим уникальный динамический модификатор, который будет усилен принятием фокусов во всем политическом дереве, чтобы помочь создать действительно современную, единую и сильную Китайскую Республику.§!"

 GXC_unification_and_reconstruction_modifier: "Объединение и Реконструкция"
 GXC_unification_and_reconstruction_modifier_desc: "Не может быть объединения нации без реконструкции, и никакой реконструкции без объединения нации! Это принципы, по которым Демократическая лига Китая привлекает всю нацию к ответственности, и именно в соответствии с этими принципами функционирует новое псевдовоенное псевдогражданское правительство Ли Цзишэня. В соответствии с этим планом политики нация должна работать над выполнением демократии и гражданских прав, независимостью и равенством нации на международной арене, объединением на принципах самоуправления, развитием производства и улучшением жизни крестьян и рабочих, продвижением национальной культуры Китая и развитием его научного духа, и прежде всего, сосредоточением на мирной реконструкции в национальном прогрессе.\n\nБлагодаря подтвержденному признанию основных политических свобод и прав человека в сочетании с правлением тех, кто занимает легитимные социальные позиции — производителей, педагогов и военнослужащих — нация выйдет за рамки партийной политики. Все под руководством целесообразного и усердного Президента-Маршала, нация будет управляться не милитаристами и не эгоизмом, и она не попадет в ловушки Партийного государства или диктатуры; чтобы в будущем, как бы далеко оно ни было, нация все же могла испытать демократию."

 GXC_unification_and_reconstruction_stab_tt: "§YУгасающий энтузиазм в Федералистской мечте снижает силу целостности государства! Вы потеряете стабильность пропорционально тому, сколько влияния §cСоциал-консерваторов§!, §nНационал-популистов§!, §PПатерналистов-автократов§! и §lСоциал-либералов§! у вас было.§!"

 GXC_economic_self_sufficiency_effect_tt: "§LДля развития собственной зарождающейся экономической мощи Китая различные регионы страны будут выделены как Особые экономические зоны.§!"

 ##NPA Tooltips

 #Beiyang of the South Tooltips
 GXC_beiyang_of_the_south_tt: "§YМы получим уникальный динамический модификатор, который будет усилен принятием фокусов во всем политическом дереве, чтобы помочь оживить Китайскую Республику.§!"

 GXC_beiyang_of_the_south_modifier: "Бэйян Юга"
 GXC_beiyang_of_the_south_modifier_desc: "Бэйянская республика, несомненно, имеет сложное наследие; с благородными намерениями революционеры разрушили автократическую и рушащуюся монархию, учредив новый республиканский национальный порядок. И все же безграничный оптимизм революционеров вряд ли может сравниться с суровыми реалиями посредничества во власти и политики истеблишмента. Под управлением таких личностей, как Дуань Цижуй, Юань Шикай и Фэн Гочжан, революция под руководством Юга стала революцией, искаженной амбициями военных диктаторов и силой оружия. Разрушенные, сломленные, а затем быстро воссоединенные вновь в 1928 году, устремления первоначальных революционеров Синьхая остались бы лишь слабым воспоминанием только у самых старых солдат и политиков. Но наследие Пяти Рас в Едином Союзе все еще сияет истиной в некоторых из его самых набожных потомков и верующих, которые занимают место власти в китайском национальном государстве.\n\nПодтверждая право южных милитаристов над северными, новая Бэйянская республика поклялась быть эволюцией предыдущих усилий по объединению и централизации китайского республиканского проекта. Несмотря на национальную апатию к новым действующим лицам, китайская нация может по крайней мере вздохнуть с облегчением, зная, что нация воссоединилась, и время восстановления обязательно последует. Какую форму примет реконструированная Республика, в конечном счете зависит от новых политических лидеров Республики."

 GXC_enshrine_regional_autonomy_tt: "§RЗакрепление региональной автономии в Республике приведет к тому, что милитаристы примут естественную предрасположенность против Центрального правительства.§!"

 GXC_constructing_a_single_economic_organ_effect_tt: "§WМы получим военные фабрики в §YНанкине, Гуанчжоу, Пекине, Ухане и Чанша§!. Мы получим одну военную фабрику на город в зависимости от влияния нашей популярности §gАвторитарных демократов§! и §cСоциал-консерваторов§!.§!"

 GXC_privilges_to_the_merchant_classes_effect_tt: "§LПод покровительством торговцев-капиталистов различные города страны будут выделены для дальнейшего развития свободного предпринимательства.§!"

 GXC_beiyang_of_the_south_effect_tt: "§LКитайские демократы и торговцы уклоняются от мысли о правлении дальнейших «аполитичных» диктаторов. Мы потеряем §Yстабильность§! пропорционально количеству популярности партий §SСоциал-демократов§!, §lСоциал-либералов§!, §mРыночных либералов§! и §cСоциал-консерваторов§!.§!"

 GXC_young_face_for_an_ancient_civilisation_tt: "§LНежелание Молодого маршала согласиться на свободные и справедливые выборы подорвало поддержку правительства. Мы потеряем §Yстабильность§! пропорционально количеству популярности партий §SСоциал-демократов§!, §lСоциал-либералов§! и §cСоциал-консерваторов§!.§!"

 GXC_triumph_of_the_crisp_handshake_tt: "§LМилитаристы не могут представить себе, что их затмят вероломные торговцы и унизительные законодатели.§!"

 GXC_order_and_progress_effect_tt: "§LОбщество Цзинсин по-прежнему сохраняет многие аспекты внутренней власти.§!"

 GXC_employ_new_people_implement_new_policies_tt: "§LМилитаристы Гуанси корчатся от роспуска их доминирования.§!"

 GXC_freedom_of_commerce_tt: "§LДемократическая коалиция, собранная против торговцев, вызовет много ярости при концепции плутократии. Мы потеряем §Yстабильность§! пропорционально количеству популярности партий §SСоциал-демократов§!, §lСоциал-либералов§! и §mРыночных либералов§!.§!"

 GXC_an_era_of_good_feelings_tt: "§LТорговцы по-прежнему сохраняют значительную власть в стране и не допустят ее растраты.§!"

 GXC_study_the_zhili_system_tt: "§LКамарилья прогрессистов Молодого маршала отречется от таких действий.§!"

 GXC_victory_of_the_southerners_tt: "§LКонсервативные союзники Молодого маршала считают это предательством принципов Чжили.§!"

 GXC_balancing_the_levers_tt: "§CЭффекты этого модификатора определяются популярностью партий §mРыночных либералов§!, §PПатерналистов-автократов§! и §gАвторитарных демократов§! соответственно§!"

