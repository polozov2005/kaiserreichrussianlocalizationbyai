## Young Guangxi Faction (YGF)

 #林虎
 GXC_lin_hu: "Линь Ху"
 GXC_lin_hu_sic_desc: "§YРодился:§! §L1 октября 1887 года в уезде Лучуань, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §gФракция Молодой Гуанси§!\n§YБиография:§! §LРодившийся от отца-ханьца и матери-чжуанки, Линь Ху поступил в Цзянсийскую военную академию в 15 лет, став одноклассником Ли Лецзюня и Цай Э. Уйдя до окончания учебы, он получил свое первое назначение в 1905 году в качестве офицера охраны в Гуанси. В 1906 году он вступил в Тунмэнхой с Цай Э. Во время Синьхайской революции Линь Ху сражался за революционеров и повел свои войска в Нанкин. В 1912 году он стал подчиненным Ли Лецзюня и участвовал во Второй революции Ли, храбро сражаясь.\n\nБежав в Японию, он вступил в Гэминьдан в 1914 году и основал Школу права и политики вместе с Ли Лецзюнем, Бай Вэньвэем и Хуан Фу. Далее основав организацию-предшественницу прото-клики политической науки, известную как Общество по изучению европейских дел, вместе с Ли Гэньюанем и Чжан Шичжао, он отправился в Сингапур с Сюн Кэу, чтобы помочь Хуан Сину. Что очень важно, Линь и Ню Юнцзянь вернулись в Гуанси в 1915 году, чтобы убедить Лу Жунтина восстать против Юань Шикая, причем Линь организовал контакт с Цай Э и Ли Лецзюнем. Сражаясь в Войне в защиту республики в качестве командира 6-й армии, он в конечном итоге стал одним из главных лидеров Старой клики Гуанси, потерпев поражение только в 1920 году от Гуандунской армии.\n\nОтказавшись от предложения амнистии Сунь Ятсена, он занимался антисуньской деятельностью, помогая Чэнь Цзюнмину связаться с Пекином в 1922 году, а в 1924 году был назначен губернатором Гуандуна Чжили. После поражения Старой клики Юэ в Восточном походе Гоминьдана Линь Ху взял на себя руководство остатками гуандунской армии, только чтобы потерять все в битве при Мяньху. Бежав в Шанхай, отставка Линя была недолгой, так как он воспользовался возможностью вернуться в центр внимания после надвигающегося краха НРА. Вернувшись в Лянгуан, он снова стал ключевым игроком в Старой клике Гуанси.§!\n\n§YЗаметки: Побратим Лю Чжилу и Ма Цзи, он одновременно является ядром Фракции Молодой Гуанси и зарождающимся союзником Е Цзюя и клики Юэ.§!"

 #刘志陆
 GXC_liu_zhilu: "Лю Чжилу"
 GXC_liu_zhilu_high_command_desc: "§YРодился:§! §L1891, в уезде Мэйсянь, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gФракция Молодой Гуанси§!\n§YБиография:§! §LПолучив базовое образование в средней школе Мэйчэн в городе Мэйчжоу, Лю Чжилу поступил в Армейскую школу Хумэнь, а позже в Военную академию Гуандунской армии. В 1910 году он вступил в Тунмэнхой и служил в Гуандунской армии на протяжении Синьхайской революции вплоть до Второй революции, где он был подвергнут чистке Лун Цзигуаном. По рекомендации друга семьи он присоединился к Старой клике Гуанси, став приемным сыном Мо Жунсиня. Получив различные важные должности от Мо, Лю помогал Старой клике Гуанси в реорганизации ее армии для участия в Войне в защиту республики.\n\nСражаясь против Лун Цзигуана, он был произведен в командующие Четвертой армией Хугоцзюнь, став милитаристом города Хуэйчжоу. В конечном итоге расширившись до Мэйчжоу и Шаньтоу, Лю снова сражался с Луном под руководством Мо Жунсиня, свергнув его в 1918 году. Став крупным милитаристом под началом своего приемного отца, Лю в конечном итоге проиграл в первой войне Юэ-Гуй, но остался под руководством Лу Жунтина. После смещения Лу в 1922 году Лю переметнулся к Чэнь Цзюнмину, став связанным со Старой кликой Гуандуна.\n\nРаботая с Хуан Давэем, Линь Ху, Лай Шихуаном и другими, он создал Офис объединенных сил от имени Чэня и вступил в бой против Гоминьдана и Национально-революционной армии. Бежав на север после Восточного похода, он влился в Чжилийскую клику и вернулся в Лянгуан после краха Гоминьдана в Северном походе. Воссоединившись со своими побратимами Линь Ху и Ма Цзи, он формирует столп Фракции Молодой Гуанси.§!\n\n§YЗаметки: У него есть связи с Ду Юэшэном и Зелеными бандами.§!"

 #馬濟
 GXC_ma_ji: "Ма Цзи"
 GXC_ma_ji_sic_desc: "§YРодился:§! §L1888, в уезде Байсэ, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §gФракция Молодой Гуанси§!\n§YБиография:§! §LСын Ма Дяньсюня, побратима Лу Жунтина, Ма Цзи был доверен Лу Жунтину в 1909 году. Крепкий, сильный и хороший в боевых искусствах, Лу относился к Ма Цзи как к собственному сыну и отправил его в Гуансийскую военную академию. Отозванный до окончания обучения, Ма Цзи стал близким доверенным лицом своего приемного отца. Когда Лу стал губернатором Гуанси в 1911 году, Ма Цзи продолжал служить его адъютантом и был одним из ведущих заговорщиков, договаривавшихся о восстании его приемного отца против Юань Шикая в 1915 году. Создав Армию Увэй от имени Лу, он выступил против Лун Цзигуана, успешно изгнав его из Гуандуна.\n\nСтав главнокомандующим Первой армии Гуандуна, он сражался в Хунани, в конечном итоге наладив хорошие отношения с У Пэйфу. Телеграфировав своему близкому другу Линь Ху о помощи, У в конечном итоге мирно ушел из Хунани, чтобы сражаться в Чжили-Аньхойской войне. В 1924 году Ма Цзи отправил подчиненного, чтобы снять осаду Гуйлиня Шэнь Хунъином, и с помощью Чжао Хэнти и Е Ци в конечном итоге позволил Лу Жунтину бежать и уйти в отставку.\n\nС тех пор влившись в Чжилийскую клику, Ма Цзи сражался в Северном походе против Национально-революционной армии в качестве начальника штаба в штаб-квартире У Пэйфу, а с возвращением Лу Жунтина в Гуанси в конце 1927 года снова занял свое место способного помощника своего больного приемного отца. Работая над консолидацией Лянгуана под эгидой Фракции Молодой Гуанси, смерть Лу Жунтина в 1934 году оставила Ма Цзи и его приемного брата Лу Юйгуана с бразды правления империей Гуанси.§!\n\n§YЗаметки: Побратим Линь Ху и Лю Чжилу.§!"

 #陸裕光
 GXC_lu_yuguang: "Лу Юйгуан"
 GXC_lu_yuguang_bio: "Приемный сын Лу Жунтина, жизнь «Молодого маршала Юга» далека от обычной. Бежав в Китай из Вьетнама со своей матерью, Лу Жунтин в конечном итоге увлекся матерью Лу Юйгуана, взяв ее в наложницы и усыновив Лу Юйгуана как собственного сына. Умный и способный, он высоко ценился Лу за свою надежность, и гуансийский милитарист начал готовить Юйгуана в качестве своего протеже и преемника. В 1915 году Лу Юйгуан был назначен главнокомандующим Объединенными союзными силами Хунань-Гуандун-Гуанси и главнокомандующим Армией Гуанси.\n\nПоскольку его приемный отец постепенно передавал власть молодому Лу Юйгуану, Молодой маршал стал командиром Первой дивизии Армии Гуанси в 1920 году, всего в 20 лет. Ввязавшись в столкновение с Шэнь Хунъином, окончательное смещение Лу Жунтина Новой кликой Гуанси в 1924 году привело к тому, что Юйгуан, как ни странно, был оставлен Квадрумвиратом Новой Гуанси в качестве мелкого штабного офицера. С началом и прекращением Северного похода Лу снова взлетел в высшие эшелоны политики Гуанси с возвращением своего отца и брата, Ма Цзи, в регион.\n\nСнова подготовленный в качестве преемника своего приемного отца, приготовления Лу принесли плоды после смерти отца в 1934 году, унаследовав пост наместника Лянгуана."
 GXC_lu_yuguang_leader_desc: "§YРодился:§! §L1900, во Вьетнаме, Французский Индокитай§!\n§YБиография:§! §L$GXC_lu_yuguang_bio$§!"
 GXC_lu_yuguang_commander_desc: "§YРодился:§! §L1900, во Вьетнаме, Французский Индокитай§!\n§YПринадлежность:§! §gФракция Молодой Гуанси§!\n§YБиография:§! §L$GXC_lu_yuguang_bio$§!"

 #郭椿森
 GXC_guo_chunsen: "Го Чуньсэнь"
 GXC_guo_chunsen_advisor_desc: "§YРодился:§! §L1876, в уезде Усюань, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §gФракция Молодой Гуанси§!\n§YБиография:§! §LУченый в династии Цин, Го Чуньсэнь начал со сдачи имперского экзамена в возрасте 19 лет. В 1905 году он отправился в Японию изучать право и политику, и во время своего пребывания там вступил в Тунмэнхой. Во время Синьхайской революции Го участвовал в Юньнаньском восстании двойной девятки, позже служа деканом по учебным делам Юньнаньской школы права и политики. Став сенатором в первом Национальном конгрессе Бэйянской республики, Го отправился на юг в Правительство защиты конституции Сунь Ятсена в 1917 году, и после своего прибытия влился в Старую клику Гуанси Лу Жунтина.\n\nНазначенный генеральным секретарем Офиса военного губернатора Гуанси, Го работал с другими сенаторами над переводом системы генералиссимуса Правительства защиты конституции на президентскую, исключив Сунь Ятсена из должности. Советуя Мо Жунсиню в конце 1910-х годов, Го удалился в изгнание в Шанхай после смещения Мо. Вернувшись в Гуанси после возрождения Старой Гуанси под руководством обновленного, но больного Лу Жунтина, Го предоставил свои полезные навыки новым королям региона: Лу Юйгуану, Лю Чжилу, Линь Ху и Ма Цзи.§!"

 #张淦
 GXC_zhang_gan: "Чжан Гань"
 GXC_zhang_gan_commander_desc: "§YРодился:§! §L1897, в Гуйлине, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §LНейтральный§!\n§YБиография:§! §LОкончив Школу ускоренной подготовки армии Гуанси, Чжан Гань начал свою военную карьеру майором-адъютантом в армии Гуанси Лу Жунтина в 1923 году. После поражения Лу войска Чжан Ганя были поглощены Новой кликой Гуанси, где он служил командиром батальона под началом Ли Цзунжэня. Гибкий и не слишком идеологически сплоченный, Чжан не особо заботился о том, за какого покровителя он сражался, пока мог защищать Гуанси. В 1926 году он стал подполковником-адъютантом и полковником-адъютантом в 7-й армии Национально-революционной армии. После краха Северного похода Чжан так же легко влился в ряды возрожденной Старой Гуанси, как и в Новую Гуанси, служа командиром дивизии под началом Линь Ху.\n\nВ 1928 году Чжан посещал и окончил Нанкинский армейский университет и вернулся служить начальником штаба 2-й армии Гуанси, роль, которую он исполняет добросовестно с тех пор. Курируя расширение Линь Ху на свободную территорию Лянгуана, Чжан является относительно нейтральным игроком во Фракции Молодой Гуанси, учитывая все обстоятельства.§!"

 #馬君武
 GXC_ma_junwu: "Ма Цзюньу"
 GXC_ma_junwu_sic_desc: "§YРодился:§! §L17 июля 1881 года в уезде Гунчэн, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §LНезависимый§!\n§YБиография:§! §LБлизкий союзник Сунь Ятсена, Ма Цзюньу был любознательным и умным ребенком, вставшим на путь становления ученым. Находясь под глубоким влиянием Кан Ювэя, который приехал в Гуйлинь для продвижения своих идей, Ма верил, что Китаю нужна вестернизация, чтобы укрепить себя. Изучая французский язык в 1900 году, Ма отправился в Сингапур, чтобы встретиться с Каном, а затем поступил в колледж Аврора в Шанхае.\n\nПолучив стипендию в Японии, Ма встретил Лян Цичао и Тан Жуя, а позже встретил Сунь Ятсена в 1902 году. Превратившись из реформиста в революционера, Ма стал близким помощником Суня, будучи одним из первых членов Тунмэнхоя и полным энтузиазма революционером. Отправившись в Германию в 1907 году, он получил степень бакалавра инженерного дела и участвовал в Синьхайской революции, а затем в новой Республике.\n\nОставаясь с Сунем с Синьхайской революции до его смерти, Ма даже был назван предпочтительным кандидатом Суня на пост губернатора Гуанси, хотя ему препятствовала Старая клика Гуанси. Ма выступил против Реорганизации 1924 года и как таковой был исключен в 1926 году за то, что стал министром юстиции в провинциальном правительстве Дуань Цижуя; хотя ушел в отставку после резни 18 марта.\n\nПриверженный реформе образования, Ма вернулся в Гуанси, чтобы помочь в строительстве Университета Гуанси, его главного труда. Работая с Пань Чжуци и реформистами Старой клики Гуанси, Ма стремился укрепить Китай посредством научных исследований, игнорируя политические споры, хотя и оказался главой провинции Гуанси развивающегося Общества Цзинсин.§!"

## Shen Army Faction (SAF)

 #沈鴻英
 GXC_shen_hongying: "Шэнь Хунъин"
 GXC_shen_hongying_bio: "Сын из бедной семьи, Шэнь Хунъин вступил в банду разбойников уже в возрасте 21 года. Став лидером в 1905 году, Шэнь расширил банду, включив в нее почти 100 человек, включая его старшего сына Шэнь Жунгуана. Связавшись с местными революционерами Синьхайской революции, такими как Лю Чжэньхуань, Шэнь решил принять их предложение об амнистии в обмен на службу. Становясь все более могущественным, он в конечном итоге предал революционеров во время Второй революции. Убивая и бесчинствуя по пути через Гуанси, Шэнь в конечном итоге оказался на службе у Лу Жунтина.\n\nУчаствуя в Войне в защиту конституции под началом Лу Жунтина, он стал близким союзником Мо Жунсиня и де-факто милитаристом Цюнъя, а затем и Восточного Гуандуна. Накануне Первой войны Юэ-Гуй Мо Жунсинь выдвинул Шэнь Хунъина в качестве своей замены на посту губернатора Гуандуна, но после вмешательства Ма Цзи его кандидатура была отклонена. Недооценив Гуандунскую армию Чэнь Цзюнмина, Шэнь в конечном итоге пробился в Хунань, где он столкнулся с Е Кайсинем и Е Ци. Используемый в качестве инструмента У Пэйфу для принудительного объединения страны, Шэнь вошел в Гуанси в 1922 году и получил поддержку Цэнь Чуньсюаня в Гуандуне.\n\nРекомендованные Цэнем Сунь Ятсену, Армия Шэня, Юньнаньская армия в Гуандуне и Армия Гуанси под командованием Лю Чжэньхуаня сражались с Чэнь Цзюнмином за Гоминьдан. Тайно связавшись с У Пэйфу, Шэнь был назначен губернатором Гуандуна Чжили, но в конечном итоге был изгнан Лю Чжэньхуанем и Ян Симинем. Вступая в конфликты с Лу Жунтином, Шэнь в конечном итоге столкнулся с зарождающейся Новой кликой Гуанси наряду с Ли Цзишэнем и Чэнь Цзитаном. Снова недооценив своего противника, он был полностью разбит Гоминьданом. Бежав в Гонконг и ведя разгульный образ жизни, Шэнь вернулся к известности после того, как Южному Чжили понадобился свой человек в Лянгуане."
 GXC_shen_hongying_leader_desc: "§YРодился:§! §L1871, в уезде Ложун, провинция Гуанси, Великая Цин§!\n§YБиография:§! §L$GXC_shen_hongying_bio$§!"
 GXC_shen_hongying_sic_desc: "§YРодился:§! §L1871, в уезде Ложун, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §PФракция армии Шэнь§!\n§YБиография:§! §L$GXC_shen_hongying_bio$§!"

 #朱家驊
 GXC_zhu_jiahua: "Чжу Цзяхуа"
 GXC_zhu_jiahua_bio: "Поступив в Немецкую медицинскую школу Тунцзи в Шанхае в 1908 году и охваченный революционным пылом, Чжу Цзяхуа вступил в Революционный корпус смертников в Шанхае во время Синьхайской революции. Вернувшись в 1912 году, он возобновил учебу в качестве инженера-электрика. После окончания учебы в 1914 году Чжу получил финансирование для учебы в Германии, где он изучал металлургию в Берлинском техническом университете. В 1917 году Чжу не смог продолжить учебу из-за Первой мировой войны и поэтому работал учителем немецкого языка в Пекинском университете.\n\nВскоре после этого он отправился в Швейцарию учиться и поступил в Бернский университет. В 1920 году он вернулся в Германию и изучал геологию в Берлинском университете, получив докторскую степень по философии в 1922 году. Вернувшись в Китай в 1924 году, он стал профессором и преподавателем немецкого языка на кафедре геологии Пекинского университета. В 1926 году после резни 18 марта Чжу обвинили в подстрекательстве студентов, и он был вынужден бежать в свой родной город.\n\nСтав главой кафедры геологии в Национальном университете Гуандуна, он стал исполняющим обязанности председателя комитета Университета Сунь Ятсена и стал членом правительства провинции Гуандун. Отказавшись вступить в Гоминьдан, Чжу вместо этого курировал мирную передачу власти от немецкой оккупации Гуанчжоу китайцам. Став довольно успешным дипломатом в администрации Чэнь Ляньбо, он перешел в свиту Сунь Чуаньфана и помогал в переговорах о немецкой военной миссии в Китае.\n\nПомогая создать Общество Цзинсин с такими людьми, как Тан Цзайли, Ли Линсы и Гу Вэйцзюнь, Чжу в конечном итоге стал главой гуандунского отделения Общества Цзинсин после Шанхайского восстания; влиятельный в китайско-германских кругах, Чжу — амбициозный человек с соответствующими навыками."
 GXC_zhu_jiahua_leader_desc: "§YРодился:§! §L30 мая 1893 года в уезде Усин, провинция Чжэцзян, Великая Цин§!\n§YБиография:§! §L$GXC_zhu_jiahua_bio$§!"
 GXC_zhu_jiahua_sic_desc: "§YРодился:§! §L30 мая 1893 года в уезде Усин, провинция Чжэцзян, Великая Цин§!\n§YПринадлежность:§! §PОбщество Цзинсин§!\n§YБиография:§! §L$GXC_zhu_jiahua_bio$§!"

 #沈榮光
 GXC_shen_rongguang: "Шэнь Жунгуан"
 GXC_shen_rongguang_sic_desc: "§YРодился:§! §L1892, в Ложуне, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §PФракция армии Шэнь§!\n§YБиография:§! §LСтарший сын уважаемого бандита, ставшего милитаристом и политиком, Шэнь Хунъина, Шэнь Жунгуан был завербован своим отцом в юном возрасте для службы в его банде. Участвуя во всех начинаниях отца, он служил офицером охраны и капитаном в армии Лу Жунтина после интеграции Шэнь Хунъина в Старую клику Гуанси. В 1916 году он вошел в Гуандун и служил командиром батальона, а затем командиром бригады под началом Лун Цзигуана. Сражаясь под началом своего отца, он служил командиром бригады в Армии пограничной обороны Гуанси, а затем в 1922 году в Гуандунской армии.\n\nСлужа в 6-й армии под началом Сунь Ятсена в 1924 году, он в конечном итоге был побежден Новой кликой Гуанси в 1925 году и последовал за отцом в изгнание в Гонконг. Вернувшись к известности после сделки своего отца с Южной чжилийской кликой, Шэнь Жунгуан действует как вечно верный приспешник своего отца. Не обремененный каким-либо чувством гордости или национализма, он бандит до мозга костей.§!"

 #李耀汉
 GXC_li_yaohan: "Ли Яохань"
 GXC_li_yaohan_bio: "Недолго проучившись в частной школе, когда он был молод, он в конечном итоге возглавил неудачный бизнес, прежде чем присоединиться к местным бандитам под предводительством своего односельчанина. Став офицером охраны и получив официальный чин, он постепенно дослужился до звания командира патрульного батальона ВМС Гуандуна и командира гарнизона уезда Дунъань. После Синьхайской революции Тунмэнхой связался с Ли и подтолкнул его присоединиться к революции. Сформировав собственный батальон, он со временем вырос в полк.\n\nИзначально поддерживая Юань Шикая в 1912 году, он помогал Лун Цзигуану и был назначен командиром гарнизона Чжаолуояна. Расширив свою армию до более чем 10 000 человек, Ли сражался в Войне в защиту конституции против Юань Шикая и непреднамеренно присоединился к Старой клике Гуанси. Вступив в должность губернатора Гуандуна после Чэнь Бинкуня в 1917 году, Ли на самом деле не занял эту должность из-за страха перед своими врагами. Отказавшись присоединиться к Правительству защиты конституции, он ушел в отставку со своей официальной должности и вернулся в Чжаолуоян, но потерял свой пост в пользу Линь Ху, а армию в пользу Мо Жунсиня.\n\nПозже решив присоединиться к Чэнь Цзюнмину из-за действий Старой Гуанси, он все равно потерял все свои войска и был понижен до должности советника. Недовольный Чэнем, он перебежал к Шэнь Хунъину в 1922 году и служил командиром 5-й армии Армии Гуанси, но был побежден Лю Чжэньхуанем и Ян Симинем. Раздумывая о дезертирстве, он вернулся в свой родной уезд Синьсин, создав там свое собственное феодальное владение. Ненадолго вытесненный, он вернулся после хаотического междуцарствия вследствие краха Гоминьдана. За неимением лучших союзников для обоих, Ли неохотно снова вступил в союз с Шэнем."
 GXC_li_yaohan_high_command_desc: "§YРодился:§! §L1876, в уезде Синьсин, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §PФракция армии Шэнь§!\n§YБиография:§! §L$GXC_li_yaohan_bio$§!"
 GXC_li_yaohan_leader_desc: "§YРодился:§! §L1876, в уезде Синьсин, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_li_yaohan_bio$§!"

## Canton Merchant Corps (CMC)

 #陳廉伯
 GXC_chen_lianbo: "Чэнь Ляньбо"
 GXC_chen_lianbo_bio: "Родившись в богатой купеческой семье, несмотря на то, что он был старшим сыном, он был усыновлен своей тетей. Чэнь Ляньбо сначала учился в частной школе, в возрасте 12 лет он отправился в Гонконг изучать английский язык в Королевском колледже и получил британское гражданство. После окончания учебы в возрасте 16 лет Чэнь присоединился к Гуанчжоускому отделению банка HSBC в Шамяне, а позже был повышен до компрадора благодаря своей выдающейся работе. Он управлял собственной шелковой лавкой, а в 1908 году основал Гуандунскую страховую компанию. Став довольно богатым, он присоединился к Гуанчжоуской генеральной торговой палате.\n\nЗнаменитость в деловых кругах Гуандуна, он монополизировал местную торговлю шелком-сырцом. Занимаясь спекулятивным бизнесом, он широко полагался на HSBC для контроля и манипулирования рынками и расширился во всевозможные экономические начинания. Он служил премьер-министром Гуандунской экспортной ассоциации и президентом Гуандунской торговой палаты в 1915 году. Служа президентом различных торговых ассоциаций, он имел контакты непосредственно с губернаторством. Вскоре в своем роскошном особняке он основал «Клуб Ливань», в котором размещалась многие представители промышленной и коммерческой элиты Гуандуна.\n\nСлужа главой Гуанчжоуского торгового корпуса, Чэнь расширил Торговое ополчение в 1910-х годах. Реформировав Торговый корпус на основе западной парламентской политики, Чэнь вступил в должность как избранный глава и главнокомандующий. Инцидент с Торговым корпусом разразился в 1924 году, когда Гоминьдан попытался подавить операции торговцев, в конечном итоге вынудив Чэня бежать в Гонконг.\n\nВо время своего пребывания в Гонконге он участвовал в различных предприятиях и благотворительных организациях и встречался с такими людьми, как Лю Чжэньхуань, Ян Симинь, Чэнь Цзюнмин, Линь Ху и Дэн Бэньинь, чтобы планировать антигоминьдановскую деятельность. Обеспечив себе пост мэра Гуанчжоу после китайско-германских переговоров в 1927 году, Чэнь начал нанимать людей и быстро расширять свое феодальное владение, охватив большую часть местной территории вокруг Гуанчжоу, и теперь является одной из самых могущественных фигур Гуандуна."
 GXC_chen_lianbo_leader_desc: "§YРодился:§! §L21 октября 1884 года в уезде Наньхай, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_chen_lianbo_bio$§!"
 GXC_chen_lianbo_advisor_desc: "§YРодился:§! §L21 октября 1884 года в уезде Наньхай, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКантонский торговый корпус§!\n§YБиография:§! §L$GXC_chen_lianbo_bio$§!"

 #陳恭受
 GXC_chen_gongshou: "Чэнь Гуншоу"
 GXC_chen_gongshou_sic_desc: "§YРодился:§! §L1877, в уезде Наньхай, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКантонский торговый корпус§!\n§YБиография:§! §LВыпускник Гуандунской полицейской школы в 1907 году, служивший патрульным офицером в Фошане, Чэнь Гуншоу стал главой Судебного департамента Полицейского департамента Гуандуна после Синьхайской революции. Поднявшись по служебной лестнице и став директором полицейского департамента, Чэнь также оказывал свои услуги в качестве консультанта табачной компании Nanyang Brothers в 1920 году. В 1924 году Чэнь основал Ассоциацию лояльности Фошаня и служил президентом Торговой палаты Фошаня и Ассоциации торговцев Фошаня. В 1924 году он был избран заместителем командующего Объединенным штабом обороны Гуандунского торгового корпуса вместе с Дэн Цзеши и помогал Чэнь Ляньбо в организации Инцидента с Торговым корпусом, но после его провала бежал в Гонконг вместе с Ляньбо.\n\nНедолго побыв буддийским монахом, Чэнь вернулся в Фошань по просьбе Чэнь Ляньбо, он построил храм Цзюлянь Шэнхуэй и собирал пожертвования от верующих, зарубежных китайцев и бизнесменов. Вернувшись на должность директора Полицейского департамента Гуандуна, Чэнь фактически является главной военной силой в Гуанчжоу, управляя его полицией подобно военизированному формированию.§!\n\n§YЗаметки: Его обвиняют в чрезмерном злоупотреблении властью.§!"

 #鄧介石
 GXC_deng_jieshi: "Дэн Цзеши"
 GXC_deng_jieshi_high_command_desc: "§YРодился:§! §Lв провинции Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКантонский торговый корпус§!\n§YБиография:§! §LИзбранный заместителем командующего Объединенным штабом обороны Гуандунского торгового корпуса вместе с Чэнь Гуншоу в 1924 году, Дэн командовал 8-м корпусом Торгового корпуса и участвовал в городских боях против Гоминьдана и бастующих рабочих в Гуанчжоу во время Инцидента с Торговым корпусом. Бежав в Гонконг с Чэнь Ляньбо и Гуншоу, Дэн в основном оставался в кругах изгнанников Торгового корпуса до возвращения Чэнь Ляньбо в Гуанчжоу в 1927 году. Последовав за своим другом, он снова занял командную должность в армии Чэнь Ляньбо вместе с Чэнь Гуншоу и другими наемными генералами.§!"

 #陈廉仲
 GXC_chen_lianzhong: "Чэнь Ляньчжун"
 GXC_chen_lianzhong_advisor_desc: "§YРодился:§! §L1884, в уезде Наньхай, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §cКантонский торговый корпус§!\n§YБиография:§! §LМладший брат Чэнь Ляньбо, Чэнь Ляньчжун, в конечном итоге стал истинным наследником состояния их богатой купеческой семьи из-за усыновления Ляньбо их тетей. В возрасте 19 лет Чэнь начал входить в деловой мир. В 1913 году он был награжден медалью Бэйянского правительства за энтузиазм в общественном благосостоянии и заслуги перед местной промышленностью. В 1919 году Чэнь Ляньбо стал главой Ассоциации торговцев Гуанчжоу, а в 1921 году был избран президентом Гуанчжоуской генеральной торговой палаты. Точно так же Ляньчжун был назначен директором Монетного двора Гуандуна, но позже ушел в отставку.\n\nОн занимал различные должности, такие как менеджер страховой компании «Общественное благосостояние», директор горнодобывающей компании «Дили», директор страховой компании «Тайхуа», и основал несколько банков в Гуандуне. Чэнь также служил финансовым директором Гуандунской ассоциации помощи продовольствием, Гуандунской благотворительной ассоциации помощи и Гуандунской ассоциации торговцев. В 1923 году он был избран президентом Гуанчжоуской генеральной торговой палаты, сменив своего брата, и в 1923 году успешно поддерживал стоимость банкнот Гуандунского провинциального банка.\n\nВ 1924 году во время Инцидента с Торговым корпусом Чэнь был вынужден бежать в Гонконг, прежде чем вернуться в 1924 году, чтобы служить компрадором Гуанчжоуского отделения HSBC в Шамяне и главой Торгового корпуса, сменив своего брата, который все еще был в изгнании. После визита Ху Ханьминя в 1925 году Чэнь отказался продолжать финансировать Национальное правительство. После поражения Гоминьдана он приветствовал возвращение своего брата в Гуанчжоу, передав ему избрание главы Торгового корпуса.§!"

 #江孔殷
 GXC_jiang_kongyin: "Цзян Кунъинь"
