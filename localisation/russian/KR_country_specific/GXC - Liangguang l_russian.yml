###- Phase I Focuses -###

 ##Phase I Political Tree
 GXC_twin_provinces_one_destiny: "Две провинции, одна судьба"
 GXC_twin_provinces_one_destiny_desc: "Две провинции, составляющие Лянгуан, Гуандун и Гуанси, очень разные, но тем не менее имеют общую историю и общую судьбу. С приближением нового года напряженность продолжает расти, поскольку агитаторы Гоминьдана и федералистов угрожают разрушить хрупкую систему, которую построил Лу Жунтин. Никто не знает, что произойдет дальше, но можно быть уверенным в том, что это произойдет вместе."

 ##Phase I Economic Tree
 GXC_initiate_economic_stabilisation: "Начать экономическую стабилизацию"
 GXC_initiate_economic_stabilisation_desc: "Когда наступил год Крысы, многие надеялись, что год принесет процветание и стабильность, но каскадное воздействие глобального экономического кризиса вызвало серьезный спад в Китае. В то время как промышленные секторы Гуандуна пострадали, сельская экономика Гуанси была опустошена падением экспорта и внутренним перепроизводством. Мы должны действовать быстро, чтобы замедлить свободное падение экономики."

 GXC_raise_miscellaneous_taxes_and_levies: "Повысить различные налоги и сборы"
 GXC_raise_miscellaneous_taxes_and_levies_desc: "«Различные налоги и сборы» — распространенный эвфемизм для изобретательных способов правительства Гуандуна повышать налоги, избегая при этом непопулярных земельных налогов, являющийся продуктом регулярного дефицита государственных финансов из-за хронической коррупции и больших военных расходов. Поскольку наша казна быстро пустеет, мы должны создать новый перечень потоков государственных доходов, иначе нам грозит банкротство."

 GXC_manipulate_the_liangguang_yuan: "Девальвировать лянгуанский юань"
 GXC_manipulate_the_liangguang_yuan_desc: "Чтобы сохранить нашу региональную независимость и вопреки усилиям центрального правительства, Лянгуан уже давно имеет де-факто собственную валюту, которая быстро обесценилась. Заинтересованные финансовые круги предостерегают от игр с ее стоимостью, однако более предприимчивые «эксперты» предлагают нам начать использовать различные финансовые тактики, чтобы выбраться из финансовой руины и защитить целостность нашего правительства."

 GXC_bail_out_failing_industries: "Спасти гибнущие отрасли"
 GXC_bail_out_failing_industries_desc: "В течение последнего десятилетия различные экономические программы Лянгуана работали над индустриализацией региона с переменным успехом. Сердцем этих усилий был Гуанчжоу, и многие компании (как частные, так и государственные) находятся на грани закрытия. Необходимо предпринять концентрированные усилия для их спасения и успокоения лидеров бизнеса, иначе мы потеряем наше промышленное преимущество перед конкурентами."

 GXC_pare_military_spending: "Сократить военные расходы"
 GXC_pare_military_spending_desc: "В рамках усилий Лу Жунтина по защите от посягательств Сунь Чуаньфана, а также приведения к покорности других милитаристов Юэ-Гуй, Лянгуан стал сильно милитаризованным. В его упорном стремлении к военному паритету с Сунем армия стала сильно раздутой и неэффективной. Большая часть денег течет в карманы различных генералов и главарей банд, чтобы поддерживать их лояльность. Им придется пойти на жертвы в эти тяжелые времена."

###- Phase II Focuses -###

##Regional Military Tree

#Initial Regional Military Tree
 GXC_lessons_of_the_german_advisory_mission: "Уроки немецкой консультативной миссии"
 GXC_lessons_of_the_german_advisory_mission_desc: "Немецкая консультативная миссия, направленная для поддержки победоносной клики Чжили в сохранении контроля над их завоеваниями после 1926 года, уделяла мало внимания различным провинциальным силам, обращаясь с ними как с колониальными сипаями, предназначенными для поглощения вражеских пуль вместо центральной армии. Тем не менее, наша близость к нескольким ключевым посольствам позволила нам получить немного больше внимания, чем другим, поскольку они стремятся защитить свои инвестиции."

 GXC_consolidate_the_regional_auxiliaries: "Консолидация региональных вспомогательных войск"
 GXC_consolidate_the_regional_auxiliaries_desc: "Хотя было бы несправедливо утверждать, что все немецкие советники относились к китайским силам как к расходному материалу, объектом их ограниченной привязанности были элитные дивизии центральной армии Сунь Чуаньфана и У Пэйфу. Даже тогда часто повторяемой критикой военных реформ эпохи после Реставрации является то, что китайская армия фактически стала «рукой посольств», предназначенной для защиты иностранных концессий."

 GXC_insistence_upon_the_stiff_arm: "Настаивание на жесткой руке"
 GXC_insistence_upon_the_stiff_arm_desc: "После окончания Четвертой войны Чжили-Фэнтянь была предпринята попытка реформирования провинциальных полицейских сил. Полиция Кантона черпала вдохновение в американских и немецких моделях полиции, взяв на себя национальное лидерство в модернизации полицейской работы. Продолжая эти реформы, необходимо создать новые полицейские академии и приложить усилия для укрепления позитивного общественного имиджа неподкупности, гражданского порядка и общественного спокойствия."

 GXC_blockhouse_tactics: "Тактика блокгаузов"
 GXC_blockhouse_tactics_desc: "Многие немецкие советники черпали вдохновение не только из своего опыта сражений в Вельткриге, но и из более ранних колониальных конфликтов в Африке. Чтобы искоренить продолжающиеся мятежи в Лиге, после Шанхайского восстания 1932 года началась серия кампаний по окружению. Укрепление ключевых опорных пунктов по всему Лянгуану лишает врагов легкого передвижения, позволяя мобильным элементам изолировать и уничтожать их."

 GXC_never_another_guangzhou: "Больше никогда Гуанчжоу"
 GXC_never_another_guangzhou_desc: "После распада Британской империи и разрыва Циндаоского соглашения «Шанхайская схватка» стала свидетелем эскалации конфронтации Германии и Японии из-за концессий. Американское вмешательство предотвратило прямой конфликт, но с отступлением Соединенных Штатов растут опасения по поводу потенциальных угроз нашим ценным портам вдоль спорного Южно-Китайского моря. В конце концов, падение Гоминьдана началось с немецкого морского вторжения в Гуанчжоу."

 GXC_from_flanders_fields_to_guangxis_mountains: "С полей Фландрии в горы Гуанси"
 GXC_from_flanders_fields_to_guangxis_mountains_desc: "Возможно, единственная константа в войне — это то, что она всегда меняется. С еще одним периодом кровопролития на горизонте мы должны работать над интеграцией уроков последних нескольких десятилетий, опираясь на опыт Вельткрига, Войн в защиту нации и конституции, Северного похода и войн Чжили-Фэнтянь. Впереди трудные времена, но нет смысла идти вслепую."

 GXC_adopt_battlefield_radios: "Внедрить полевые радиостанции"
 GXC_adopt_battlefield_radios_desc: "Одним из величайших нововведений XX века является массовое улучшение технологий связи. Это позволило генералам командовать все более крупными формированиями и имело доказанную историю склонения чаши весов на поле боя. Будь то ведение обычных сражений или борьба с сельскими повстанцами, радиостанции дадут нам преимущество, необходимое для победы."

 GXC_integrate_provincial_security_forces: "Интеграция провинциальных сил безопасности"
 GXC_integrate_provincial_security_forces_desc: "Лянгуан долгое время был домом для зверинца бандитских кланов, разбойничьих отрядов и ополчений милитаристов, соперничающих за влияние. Региональные правительства часто утверждали лишь минимальный контроль над этими мелкими диктаторами, предпочитая вместо этого натравливать их на другие правительства или стравливать друг с другом. Столкнувшись с худшим кризисом, мы теперь должны работать над утверждением нашей власти над Лянгуаном."

 GXC_primacy_of_the_southern_piedmont: "Первенство Южного Пьемонта"
 GXC_primacy_of_the_southern_piedmont_desc: "Качество китайских армий чрезвычайно разнится. Некоторые подразделения едва ли на шаг выше бандитов, в то время как другие существуют только на бумаге. Другие, особенно финансируемые центральным правительством или личные дружины сильных милитаристов, более элитны, хотя вряд ли соответствуют западным армиям. В некотором смысле это сделано намеренно, допуская почти феодальную структуру безопасности. Но так же, как Китай должен измениться, если хочет выжить, должны измениться и наши армии."

 GXC_integrate_the_baojia: "Интегрировать Баоцзя"
 GXC_integrate_the_baojia_desc: "Местные военные отряды часто организованы бессистемно, оснащены любым оружием, которое могут легко смастерить местные властители, и укомплектованы людьми, набранными с полей и деревень. Эти ополчения часто игнорировались нашими насмешливыми западными инструкторами, но мы знаем, что при правильной интеграции эти храбрые люди, защищающие свои дома, могут быть активом в асимметричных конфликтах."

 GXC_the_necessary_sin: "Необходимый грех"
 GXC_the_necessary_sin_desc: "Чтобы финансировать наши армии, мы были вынуждены экспортировать сырьевые ресурсы оптом. В частности, Лянгуан хорошо использовал торговлю дешевым вольфрамом в обмен на более современное военное оборудование от западных держав, что позволяло нам сдерживать влияние Чжили. Продолжение этой торговли имеет важное значение для финансирования наших элитных войск, даже если однажды мы надеемся вести переговоры на более равных условиях."

 GXC_tighten_the_noose_on_militarism: "Затянуть петлю на милитаризме"
 GXC_tighten_the_noose_on_militarism_desc: "Децентрализованная, клановая природа милитаризма часто была источником разочарования иностранных наблюдателей. Офицеры приходят и уходят, забирая весь свой штаб вместе с людьми и оружием, как в феодальные времена. Немцы не слишком отличались, пакуя чемоданы и убегая, как только наступали трудные времена. Мы, однако, остаемся. Мы начнем утверждать гражданский контроль над армией, начиная с мелочей, таких как проверка гражданской полицией сумок армейских офицеров на наличие контрабанды."

#Embrace Guangxi Style Branch
 GXC_embrace_the_guangxi_style: "Принять стиль Гуанси"
 GXC_embrace_the_guangxi_style_desc: "При всех недостатках Гуанси, ее люди развили гордую военную культуру, которая, если ее правильно использовать, может спасти нацию. Из изгнания Бай Чунси много писал о своих теориях, наиболее заметно призывая к «Трем политикам военной мобилизации»: Объединить армию и ополчение, Интегрировать литераторов и офицерский корпус, и Унифицировать систему добровольцев и призыва. Он мечтает о гражданской армии для Китая, и Гуанси уникально подходит для ее развития."

 GXC_literati_and_officer_corps_are_one: "Литераторы и офицерский корпус едины"
 GXC_literati_and_officer_corps_are_one_desc: "Так же, как каждый трудоспособный мужчина должен служить гражданином-солдатом, каждый студент должен быть готов стать офицером. Бай и другие военные давно критикуют класс студентов за пацифизм, жажду статуса и антимилитаризм, несмотря на трудные времена, смотря свысока на военную службу и ноя об иностранном империализме. Новый китайский студент будет агрессивным, патриотичным и самоотверженным."

 GXC_age_of_scientific_warfare: "Эра научной войны"
 GXC_age_of_scientific_warfare_desc: "Новая эра войны наступает в мире, и Китай не должен отставать в искусстве войны. Войны и ведение войны становятся экспоненциально сложными, и грамотность среди офицерского корпуса становится все более необходимой. Только гражданские школы могут предоставить грамотных офицеров вовремя и в достаточных количествах, поэтому студентов и интеллектуалов нужно привлекать к национальной службе. Умом и мускулами мы победим."

 GXC_militia_cadre_academy: "Академия кадров ополчения"
 GXC_militia_cadre_academy_desc: "Качественные офицеры отличают гражданское ополчение от обычного сброда. Хотя изначально децентрализованное обучение в кадровых учебных батальонах, размещенных в каждом районе ополчения, казалось многообещающим, мы сочли более эффективным иметь одну центральную академию в Гуанси, чтобы дать кадетам два месяца обучения. После этого они будут отправлены в региональные штабы ополчения для дальнейшего обучения. Лучшие офицеры позже станут полевыми командирами или штабными офицерами."

 GXC_encapsulating_the_warrior_society: "Воплощение общества воинов"
 GXC_encapsulating_the_warrior_society_desc: "Создавая гражданскую армию, мы должны внедрить программу обучения, радикально отличающуюся от неорганизованных милитаристов и коррумпированных профессиональных армий, которые были до нас. Вместо этого всеобъемлющая программа, начинающаяся в возрасте 17 лет и охватывающая как военные, так и невоенные вопросы, подготовит молодых людей к трудным реалиям, которые ждут впереди. В течение восемнадцати тщательно спланированных месяцев они станут новой породой солдат, и больше провинций последуют нашему примеру."

 GXC_merge_army_and_militia: "Объединить армию и ополчение"
 GXC_merge_army_and_militia_desc: "Грани между военной и гражданской сферами должны размыться. Древний этос «Объединить солдат и крестьян» должен быть модернизирован в «Объединить армию и ополчение», пробуждая и объединяя людей в одном общем деле, «как Швейцария в Европе». Каждый уезд будет набирать и обучать местных жителей для организационного использования, при этом все мужчины в возрасте от 18 до 45 лет подлежат обязательному призыву, организованному в небольшие подразделения, собранные вокруг деревень, школ, офисов и университетов."

 GXC_unify_the_volunteer_and_conscription_system: "Унифицировать систему добровольцев и призыва"
 GXC_unify_the_volunteer_and_conscription_system_desc: "В Гуанси мы перевернули старую китайскую поговорку: «из хорошего железа не делают гвоздей, хороший человек не идет в солдаты». Хотя призыв долгое время был непопулярен в Китае, мы продолжаем настаивать, стыдя любого, кто не проходит призывные тесты. Больше Гуанси не будет полагаться на наемные «профессиональные армии», вместо этого одна армия, действительно состоящая из народа и сражающаяся за народ, будет защищать землю."

 GXC_threefold_self_reliance_policy: "Политика тройной опоры на собственные силы"
 GXC_threefold_self_reliance_policy_desc: "Сунь Ятсен однажды говорил о Трех принципах для народа: Демократия, Благосостояние и Национализм. В Гуанси они составляют основу наших принципов опоры на собственные силы (Сань-ю): самоуправление, самообеспечение и самооборона. Мы не можем позволить себе зависеть от иностранных поставщиков и должны производить собственные ружья, гранаты и минометы. Более того, наши ополченцы должны быть готовы помочь в местном лесовосстановлении, посадке растений, строительстве, регистрации земли и переписи населения."

 GXC_from_a_budding_flower_may_ferocity_grow: "Из бутона цветка может вырасти свирепость"
 GXC_from_a_budding_flower_may_ferocity_grow_desc: "Молодость — слабое оправдание для кротости. Мальчиков будут учить военным навыкам, девочек — навыкам медсестер. Средняя школа будет состоять из пяти семестров обычных академических занятий, а шестой семестр будет в основном посвящен военной подготовке, включая военизированный выпускной экзамен. Студенты университетов будут обязаны посещать пять часов военной подготовки еженедельно, студентки — три. К совершеннолетию все дети научатся защищать нацию."

 GXC_chinas_sparta: "Китайская Спарта"
 GXC_chinas_sparta_desc: "Что бы ни думали о Гуанси тщеславные чужаки, никакое количество пренебрежительных замечаний о нашей «отсталости» или презрительных насмешек над нашими лидерами не может отрицать растущую доблесть нашей гражданской армии. Мы фундаментально превратили Гуанси в мощную гражданскую стратократию. С растущим уважением или, возможно, страхом, наши некогда хихикающие недоброжелатели теперь признают силу мобилизованного народа, фанатично преданного защите своей любимой нации."

 GXC_mobilisation_of_the_masses: "Мобилизация масс"
 GXC_mobilisation_of_the_masses_desc: "С дальнейшим продвижением нашей программы ополчения в недавно отвоеванные регионы Китая новые граждане в нашем правительстве с трудом интегрируются в структуру ополчения, а некоторые даже энергично протестуют. С этой целью мы должны стимулировать расширение системы ополчения дальнейшим призывом к оружию, нацеленным на крестьянство, ибо без участия китайского народа в нашей новой модели ополчения как они могут действительно занять свое место в нашем обществе?"

 GXC_understanding_of_the_land: "Понимание земли"
 GXC_understanding_of_the_land_desc: "Уроженцы Гуанси знают ее местность: суровую, гористую, выносливую. Но люди — это лишь отражение земли, на которой они развиваются, и солдаты Гуанси известны своей свирепостью в бою. Поэтому мы должны просветить остальных наших солдат в понимании земель, на которых они выросли, ибо любой враг — иностранный или иной — должен знать страх перед бойцом на его родной территории."

 GXC_heart_of_the_soldier: "Сердце солдата"
 GXC_heart_of_the_soldier_desc: "Солдат и его ружье сродни крестьянину и его плугу. Неразделимы. Поэтому мы не можем сидеть сложа руки, пока мир вокруг нас модернизирует свои винтовки и шлемы, ибо какая польза от винтовки со скользящим затвором против бронированного чудовища? Оружие наших солдат должно быть таким же сильным, как их сердца, ибо хорошая храбрость заслуживает поддержки сильной мощью."

 GXC_modern_methods_for_a_new_age: "Современные методы для новой эры"
 GXC_modern_methods_for_a_new_age_desc: "С начала века наступила новая эра войны. Автоматическое оружие, самолеты, артиллерия и танки — все сходит на поля сражений по всему земному шару. И все же китайское военное дело оставалось номинально застойным, с немногими заметными попытками модернизации армий. Хотя нам не хватает промышленности для надлежащих танковых дивизий, мы все же можем интегрировать современные транспортные средства как в наши дивизии, так и в линии снабжения."

 GXC_good_iron_for_nails_good_men_serve_the_army: "Хорошее железо — на гвозди, хорошие люди служат в армии"
 GXC_good_iron_for_nails_good_men_serve_the_army_desc: "Несмотря на то, что система ополчения закрепилась в китайском обществе, остаются те, кто возражает против системы призыва. Чтобы исправить такое недопонимание, мы должны стимулировать китайский народ к причинам служить, причинам проливать кровь. Для этого по всей стране будет объявлен новый раунд призыва. Ибо если на нас когда-либо нападет любой враг, они должны узнать, что все китайское гражданство выступит против них."

 GXC_citizen_soldier_unification: "Объединение граждан-солдат"
 GXC_citizen_soldier_unification_desc: "Вечно поразительное продвижение нашей гражданской стратократии приближается к апофеозу желаний нашего теоретика. Новое ополчение продолжает энергично обучаться и снова и снова доказывает свою эффективность в наших войнах. Наши солдаты продолжают служить нации, будь то в мирное время или во время войны, поистине сплоченное, скоординированное общество, бьющееся как живое существо. Солдаты больше не считаются неуправляемым, низшим классом, а основной частью китайского общества."

 GXC_preparing_for_the_great_bloodletting: "Подготовка к великому кровопролитию"
 GXC_preparing_for_the_great_bloodletting_desc: "Многие теоретики до сих пор критикуют отсутствие надлежащих резервов, сопоставимых с другими современными национальными государствами по всему миру. Наша постоянная армия могла бы достичь неисчислимых высот, и все же, если бы китайский солдат погиб на поле боя, наша система была бы настолько неумелой, что с трудом заменила бы его, несмотря на достаточное количество обученных граждан-солдат. Чтобы исправить это, мы абсолютно обязаны реструктурировать и модернизировать текущую систему резервов, чтобы она соответствовала нашему новому способу ведения войны."

 GXC_guangxi_tactics: "Тактика Гуанси"
 GXC_guangxi_tactics_desc: "Горная местность в Гуанси делит ее на небольшие, изолированные карманы. Такая среда является главной площадкой для разработки неортодоксальных тактик, применяемых местными жителями, и это нигде не проявляется более очевидно, чем в бандитизме провинции. Несмотря на современных, численно превосходящих врагов, с которыми они сталкивались, бандиты постоянно побеждали, используя военные действия, не встречающиеся в учебниках. Наши солдаты научатся сражаться по-гуансийски."

 GXC_unified_militia_framework: "Единая структура ополчения"
 GXC_unified_militia_framework_desc: "Бесконечно желая расширения системы ополчения, наши теоретики призвали к созданию «Единой организационной структуры» для нашего ополчения с обширным регулированием и идеологической мотивацией, направленной на то, чтобы наше ополчение функционировало как собственная экосистема."

 GXC_chinese_warfare_revitalised: "Возрождение китайского военного искусства"
 GXC_chinese_warfare_revitalised_desc: "Поистине, наша система ополчения не является революционной, на самом деле она восходит к дням, давно минувшим. Такая структура существовала в династиях Ся, Шан и Чжоу. Не существовало различий между солдатом или крестьянином, армия и народ были поистине одним существом. Поэтому наша система — это лишь естественный порядок вещей в Китае, и мы просто вернулись к нашим корням. Истинное возрождение этой традиционной китайской системы в войне текущей эпохи."

#Building the Elite Heer Branch
 GXC_building_the_eliteheer: "Создание Элитхера (элитной армии)"
 GXC_building_the_eliteheer_desc: "Логическим продолжением наших военных реформ является то, что Сунь Чуаньфан и У Пэйфу в значительной степени не смогли сделать с немецкой помощью: создать дееспособную центральную армию, которая послужит ядром вооруженных сил Китая. Мы больше не должны действовать как вспомогательные силы: если Китай должен быть спасен, должна быть создана армия для его защиты. Мы построим армию по западному образцу, продолжая уже заложенную стратифицированную структуру."

 GXC_song_and_dance_of_the_military_confucius: "Песни и пляски военного Конфуция"
 GXC_song_and_dance_of_the_military_confucius_desc: "Немцы, конечно, оставили свой след на большей части Китая, но они вряд ли единственные, кто имеет интерес к региону или гордую военную историю. Мы должны позаботиться о том, чтобы нанять дополнительных инструкторов, которые помогут нам в создании нашей армии, будь то привлечение официальных советников из иностранных держав или наем частных наемников-инструкторов с меньшим дипломатическим багажом. Все же мы мечтаем о дне, когда мы снова окажемся на переднем крае военного прогресса."

 GXC_victory_secured_through_reconnaissance: "Победа, обеспеченная разведкой"
 GXC_victory_secured_through_reconnaissance_desc: "Превосходная разведка на поле боя бесценна в век быстро улучшающихся коммуникаций и быстрого передвижения. Тщательное наблюдение, сбор разведданных и связь со штабом идут рука об руку с победой, срывая засады и поддерживая штурмы. Будь то обычные враги на передовой или контрпартизанские операции в тылу, мы должны обеспечить это преимущество."

 GXC_modern_engineering_corps: "Современный инженерный корпус"
 GXC_modern_engineering_corps_desc: "Военная инженерия — древняя часть военного искусства, которая продолжается по сей день. Действительно, наши старые немецкие советники всегда гордились своим боевым инженерным корпусом, и мы тоже должны тщательно оценить наши собственные возможности. Инженеры, которым поручено строительство полевых укреплений, прокладка дорог и преодоление препятствий, являются критически важным родом войск поддержки для любой современной армии."

 GXC_form_mobile_detachments: "Формирование мобильных отрядов"
 GXC_form_mobile_detachments_desc: "В эти дни механизированной войны, и, возможно, в сочетании с ужасами позиционной войны на Западном фронте Великой войны, часто легко забыть, что командиры ценили мобильность задолго до первого грузовика или поезда. Черпая вдохновение из «Летучих колонн», развернутых в Африке, немецкие советники давно предлагали небольшие, гибкие и элитные подразделения, способные пробивать бреши в линиях врага, в то время как другие формирования удерживают наши позиции."

 GXC_fight_without_thought_of_retreat: "Сражаться без мысли об отступлении"
 GXC_fight_without_thought_of_retreat_desc: "Чтобы выиграть современную войну, у нас должен быть современный генеральный штаб. Дееспособная армия с некомпетентной головой обречена, и стиль командования, к которому привыкли многие наши генералы, в значительной степени устарел. Мы должны воспользоваться возвращением курсантов из Военной академии Баодин и иностранных школ, чтобы создать современный генеральный штаб, как в наших отдельных армиях, так и на национальном уровне."

 GXC_thorough_logistical_chain: "Тщательная логистическая цепочка"
 GXC_thorough_logistical_chain_desc: "Превосходная логистика всегда была ключом к победе в войне, но быстрые инновации за последнее столетие сделали ее еще более мощной. С поездами, грузовиками и постоянно растущей цепочкой поставок, необходимой для питания, вооружения и пополнения современной армии, формализованная и профессиональная система имеет важное значение. Наши квартирмейстеры должны разработать тщательное и централизованное планирование и закупки, особенно если мы хотим отправить силы за пределы наших родных провинций."

 GXC_guangdongs_troughs_guangxis_peaks: "Низины Гуандуна, пики Гуанси"
 GXC_guangdongs_troughs_guangxis_peaks_desc: "То, чего у нас может не быть в оружии или технологиях, мы можем компенсировать нашим превосходным знанием местности. Иностранные захватчики могут прийти в Лянгуан, ожидая легкой борьбы, но они быстро станут жертвами наших холмов и могучих рек. Переход наших местных войск от регионального ополчения к разрушительной легкой пехоте может быть медленным, но он необходим для создания армии, способной защитить наши дома."

 GXC_local_officer_initiative: "Инициатива местных офицеров"
 GXC_local_officer_initiative_desc: "При всех улучшениях в технологиях и тактике, основы, которые делают армию великой, остаются прежними. Лидерство в малых группах и независимая инициатива вдохновляющих офицеров выигрывают маленькие битвы, которые складываются в кампанию. Часто местные командиры знают местные условия лучше, чем их далекие генералы. Мы должны научить наших людей брать на себя ответственность, при этом сохраняя общую картину в уме."

 GXC_victory_through_combined_arms: "Победа через общевойсковой бой"
 GXC_victory_through_combined_arms_desc: "В конце концов, наши советники предупредили нас, что мы всегда будем вести асимметричную войну. Тем не менее, благодаря их усилиям и нашим собственным, мы нашли способ максимально использовать все различные виды войск нашей армии к их полному преимуществу — пехота удерживает линию фронта, иррегулярные войска — сельскую местность, в то время как элитные мобильные подразделения действуют как гибкий резерв, пробивая слабые места врага по мере их появления. Вместе мы можем одолеть гораздо более сильных противников."

 GXC_strength_through_mobility: "Сила через мобильность"
 GXC_strength_through_mobility_desc: "Немецкая военная миссия в клике Чжили принесла с собой идеи маневренной войны, доктрины, сосредоточенной вокруг скорости. В то время как промышленные державы Запада используют механизированные и танковые дивизии для удовлетворения своих потребностей в скорости, мы добьемся мобильности в пехоте, вооруженной ручными пулеметами и траншейными минометами. Мы будем стремиться подражать примеру Леттов-Форбека и в конечном итоге превзойти даже его подвиги!"

 GXC_modern_communication_networks: "Современные сети связи"
 GXC_modern_communication_networks_desc: "Основой современной армии является использование новых технологий. Развитие новых технологий связи сыграло центральную роль в революции ведения войн, и наши военные должны признать это. Современная армия всегда должна следовать технологическим достижениям времени, иначе она отстанет. Мы не повторим судьбу поздней династии Цин, мы всегда будем на шаг впереди наших врагов."

 GXC_unity_of_industry_and_military: "Единство обороны и промышленности"
 GXC_unity_of_industry_and_military_desc: "Современная армия не может быть развита без необходимой промышленности для удовлетворения ее потребностей. Почти половина немецкой военной помощи Китаю носила экономический характер, и, имея в руках большие участки Северного Китая, мы будем использовать все захваченные промышленные центры и арсеналы. В то время как клика Чжили растратила их использование на мелкие споры милитаристов, мы будем использовать их, чтобы выставить армию, верную республике превыше всего!"

 GXC_modern_railway_network: "Современные железнодорожные сети"
 GXC_modern_railway_network_desc: "Чтобы иметь по-настоящему мобильную армию, транспорт по всему Китаю должен быть модернизирован. Это не только поможет нашей логистической цепочке, но и больше рельсов во многом поспособствуют эксплуатации природных ресурсов в Китае. Соединение рельсов по всей стране позволит нам более эффективно защищать все регионы и быстро реагировать на угрозы, будь то внутренние или внешние."

 GXC_an_innovative_army_corps: "Культ офицера-новатора"
 GXC_an_innovative_army_corps_desc: "Хороший офицер — это больше, чем способный тактик и боец; нет, хороший офицер проявляет инициативу, экспериментируя с новыми и революционными идеями ведения войны. Нам нужен офицерский корпус, укомплектованный теми, кто мыслит нестандартно, теми, кто может компенсировать нашу технологическую отсталость и отбить всех врагов, желающих доминировать над нашей нацией. Давайте возвеличим этот новый тип офицера как авангард китайской армии!"

 GXC_formulating_a_defensive_line: "Формирование оборонительных линий"
 GXC_formulating_a_defensive_line_desc: "Несмотря на наши усилия по модернизации, ясно, что Китай остается позади технологически по сравнению с русским медведем на севере и Империей восходящего солнца на востоке. Мы, несомненно, не можем удержать всю страну, но мы будем использовать местность и важные пункты снабжения и железные дороги, чтобы отметить районы, где мы должны консолидировать наши силы для несокрушимой обороны."

 GXC_the_nation_as_a_frontline: "Нация как линия фронта"
 GXC_the_nation_as_a_frontline_desc: "Хотя Китаю может не хватать обширной и современной промышленности, наша нация благословлена обилием людских ресурсов и земли. Враг никогда не сможет сравниться с нами кровью за кровь, и у нас есть пространство, которое можно потерять во имя времени. Мы будем выжидать, затягивать наших врагов глубже в Китай, чтобы растянуть их линии, и начнем контрнаступление, когда придет время."

 GXC_neutralising_superior_airpower: "Нейтрализация вражеской авиации"
 GXC_neutralising_superior_airpower_desc: "В эту эпоху войны сухопутные силы часто дополняются истребителями и бомбардировщиками в небе. Хотя мы стремимся использовать общевойсковой бой как можно лучше, китайские ВВС просто не могут сравниться с промышленными державами запада или Японской империей. Вместо этого мы постараемся нейтрализовать их преимущество в воздухе с помощью зенитных орудий и уравнять шансы."

 GXC_primacy_of_the_southern_school: "Первенство Южной школы"
 GXC_primacy_of_the_southern_school_desc: "В Америке лучшие и самые способные кадеты отправляются в Вест-Пойнт, где из них воспитывают способных офицеров. В Китае Гоминьдан развил Военную академию Вампу в идеалах Трех принципов и воли Сунь Ятсена. Однако мы стремимся создать не армию революционных фанатиков, а профессиональный офицерский корпус. Мы будем подражать примеру Вашингтона и создадим академию, способную произвести следующего Сунь-цзы, следующего Чжугэ Ляна!"

 GXC_prussia_of_the_east: "Пруссия Востока"
 GXC_prussia_of_the_east_desc: "Наконец-то военные реформы Китая создали современную армию. Немецкая военная мысль пронизывает весь наш новый армейский корпус, а «Мысли солдата» генерала Ганса фон Секта являются фаворитом среди наших генералов. Наша приверженность немецким военным принципам и реструктуризация по немецким линиям принесли нашей армии прозвище «Пруссия Востока». Давайте докажем правдивость этого прозвища и одержим победу, превосходящую славу Танненберга!"

 GXC_supremacy_of_the_new_model_army: "Превосходство Армии нового образца"
 GXC_supremacy_of_the_new_model_army_desc: "Унижение научило династию Цин, что реформы необходимы. Однако полная имперская некомпетентность породила Бэйянскую армию, силу, запятнанную коррупцией на всех уровнях и укомплектованную шутовскими офицерами, такими как Юань Шикай. Теперь наши реформы создали новую армию, которой Китай может гордиться, где верность принадлежит самой нации, а не кошельку. Мы стали тем, чем не могла быть Бэйянская армия, — сияющим примером современности в Поднебесной."

 GXC_the_legion_of_the_republic: "Легион Республики"
 GXC_the_legion_of_the_republic_desc: "Подобно Римской республике и Соединенным Штатам, наша республика отстаивает великие добродетели, уважаемые всеми, кто живет под ее флагом. В то время как Гоминьдан использовал лозунги хаотичного революционного рвения, мы выступаем за истинные республиканские идеалы, а не за провозглашенную верность партии, пропитанной автократией. Пока северные милитаристы сражаются в кумовских склоках, наша армия стоит за саму нацию. Мы защитим Китай, защитим республиканизм!"

#Legacy of Whampoa Branch
 GXC_legacy_of_whampoa: "Наследие Вампу"
 GXC_legacy_of_whampoa_desc: "Много лет назад в доках Вампу Гоминьданом при помощи красных русских изгнанников была создана военная академия с надеждой создать по-настоящему революционную армию. Они не были лучше всех вооружены, ими не лучше всех командовали, но при всех своих недостатках Национально-революционная армия стала легендарной благодаря своей абсолютной убежденности в деле своей партии. Будет создана новая Вампу, и на этот раз ее кадеты увидят успех своей революции!"

 GXC_will_wins_wars: "Воля побеждает в войнах"
 GXC_will_wins_wars_desc: "Будь то революционное рвение большевиков, героизм белой Добровольческой армии или кодекс Бусидо самураев, великие победы одерживались меньшими армиями благодаря абсолютному упорству и самоотверженности их солдат. Нашим людям привьют идеологический пыл, научат в мельчайших деталях высоким идеалам, за которые они сражаются. Они будут сражаться и умирать без колебаний."

 GXC_exalt_the_martyrs: "Возвеличить мучеников"
 GXC_exalt_the_martyrs_desc: "С первых дней Синьхайской революции храбрые молодые люди, вооруженные порой лишь клинком или гранатой, бросались на лучше вооруженные маньчжурские войска, прокладывая путь революционерам к свержению старого порядка. Сегодня, когда решается судьба Китая, мы должны воспитать еще одно поколение отважных мучеников, ударных бойцов, которые оросят нашу революцию своей кровью."

 GXC_establishment_of_the_zhongyangjun: "Создание Чжунъянцзюнь"
 GXC_establishment_of_the_zhongyangjun_desc: "Мы будем стремиться создать лучшую армию во всем Китае, и на острие копья будут несколько элитных дивизий, обученных в новейшем западном стиле и возглавляемых нашими самыми яркими кадетами. Вдохновленные несравненной волей и непрестанно тренируемые, они скорее умрут, чем сдадутся. Эти подразделения будут первыми прорываться в бреши, используя слабые места врага и переламывая ход битвы под прикрытием мощного артиллерийского огня."

 GXC_the_renaissance_of_methodology: "Ренессанс методологии"
 GXC_the_renaissance_of_methodology_desc: "Медленно, но верно наши люди смогут прорвать оборону даже хорошо окопавшихся отрядов милитаристов. Как по часам, сочетание корректировщиков, артиллерии и штурмовой пехоты найдет и пронзит самые слабые части передовой обороны наших врагов по всей линии фронта. После этого резервные части хлынут в прорывы, вступая в бой с вражескими резервами, пытающимися их остановить, уничтожая вражеские формирования."

 GXC_quality_at_the_forefront: "Качество на переднем крае"
 GXC_quality_at_the_forefront_desc: "Современная российская доктрина призывает к качеству вместо количества. Хотя старые стереотипы остаются как о российской, так и о китайской армиях, то, что будет отличать нас от коррумпированных, раздутых армий милитаристов, — это превосходство нашей воли и нашего оружия. У нас мало что есть, но то, что есть, будет лучшим. Мы подготовим элитную армию, должным образом оснащенную и управляемую, которая сметет тех, кто противостоит нам."

 GXC_songbirds_of_hellfire: "Певчие птицы адского огня"
 GXC_songbirds_of_hellfire_desc: "Прорыв вражеских линий потребует от нас сосредоточения большого количества артиллерии в грандиозные батареи, способные концентрировать огонь на шатких точках во вражеской линии. Артиллерия — драгоценный ресурс в Китае, а логистика часто затруднена, но благодаря обширной подготовке в координации между разведчиками, командирами, пехотой и артиллерией мы можем разрушить даже некоторые из самых укрепленных вражеских линий."

 GXC_constituting_tradition: "Учреждая традицию"
 GXC_constituting_tradition_desc: "Чтобы наилучшим образом использовать прорыв в тактических зонах противника и сеять хаос в тылу, мы должны создать эффективный кавалерийский корпус, который может быстрее передвигаться по пересеченной местности. Кавалерия — это ядро наших сил второго эшелона, сочетающее огневую мощь с мобильностью для разгрома наших врагов до того, как они смогут перегруппироваться. Они будут нацелены на узлы связи и склады снабжения, лишая их способности сражаться."

 GXC_battle_in_depth: "Глубокий бой"
 GXC_battle_in_depth_desc: "Глубокий бой — это новейшая разработка в российской военной теории, эволюция столетий войны. Интегрируя многочисленные операции фронтового масштаба на нескольких уровнях действий, мы можем сразиться даже с самыми передовыми армиями в Китае. Идти в ногу с военными доктринами и технологиями, особенно в отношении маневра, жизненно важно в условиях, когда многие иностранные державы уже потратили годы на обучение и оснащение наших соперников."

 GXC_spirit_of_the_country: "Spirit of the Country"
 GXC_spirit_of_the_country_desc: "The soldiers of the New China must love their country. They must forsake local allegiances and ties to warlords for the sake of protecting the Motherland. As such, we must instill, this spirit of enthusiasm and nationalist zeal within our ranks."

 GXC_modern_revolutionary_soldier: "Современный революционный солдат"
 GXC_modern_revolutionary_soldier_desc: "Возвышаясь над всеми своими сверстниками в Китае, Национально-революционная армия славилась своим сравнительно современным оружием и снаряжением. Возвышаясь над милитаристами, мы должны стремиться подражать такому превосходству в простом солдате. Больше китайский солдат не будет рассматриваться как отсталый бандит, а как современник и Запада, и Востока."

 GXC_instilling_the_national_bushido: "Прививание национального Бусидо"
 GXC_instilling_the_national_bushido_desc: "Восхваляя добродетели, представленные знаменитыми самураями Японии и другими элитными формированиями на протяжении всей истории, Академия Вампу гордится свирепым менталитетом, привитым ее кадетам. Никогда не колеблясь, кадры Вампу будут сражаться до победного конца за дело и нацию, и поэтому мы должны сделать особый упор на этот факт для новых поколений кадетов."

 GXC_modern_arms_in_the_middle_kingdom: "Современное оружие в Поднебесной"
 GXC_modern_arms_in_the_middle_kingdom_desc: "Успехи наших предыдущих столкновений показывают абсолютный приоритет, необходимый для сохранения нашего преимущества в глобальной гонке вооружений, ибо если какая-либо иностранная держава вступит на китайский театр военных действий, мы должны быть способны дать отпор с огромной силой. С этой целью дополнительные средства должны быть выделены нашей развивающейся отечественной оружейной промышленности, ибо китайское оружие должно быть известно во всем мире."

 GXC_suzhan_sujue: "Сучжань, Суцзюэ"
 GXC_suzhan_sujue_desc: "Наступает новый рассвет войны. С первым появлением танков в Вельткриге современная война перешла к превосходству способности нации производить и использовать быстрые механизированные и мобильные дивизии для прорыва вражеских линий и быстрого разгрома их сил. Развивая наши собственные бронетанковые силы, мы должны отдать приоритет «Сучжань, Суцзюэ» (Быстрая война, быстрое решение). Решительные атаки, которые неизбежно ведут к быстрому завершению."

 GXC_annihilate_enemy_fortifications: "Уничтожить вражеские укрепления"
 GXC_annihilate_enemy_fortifications_desc: "Известная совместным наступлением стойкой пехоты и грохочущей артиллерии, Национально-революционная армия была способна совершать стремительные наступления, независимо от того, какой форт или враг стоял на ее пути. Крайне важно, чтобы наши генералы были обучены самому первоклассному использованию артиллерии, и чтобы новые орудия поставлялись всей нашей армии, ибо мы не можем позволить себе патовую ситуацию, вызванную вражеской обороной."

 GXC_power_of_tenacity: "Сила упорства"
 GXC_power_of_tenacity_desc: "Упорство, революционный пыл, абсолютная преданность. Все это отличительные черты лучших из Вампу. Мы должны вознаградить такие добродетели, отбирая лучших из лучших и включая их в специальные подразделения, нацеленные на успех там, где обычный солдат не может. Ибо доблесть и похвала, завоеванные в таких операциях, несомненно поднимут остальную армию вместе с ними."

 GXC_amassing_dedicated_artillery: "Накопление специализированной артиллерии"
 GXC_amassing_dedicated_artillery_desc: "При нехватке промышленности и ограниченных возможностях расширения операций, врожденное желание иметь артиллерийские силы, сравнимые с лучшими армиями мира, привело нашу нацию к тому, чтобы направить все усилия на поддержание запаса лучших современных орудий, способных уничтожать вражеские дивизии. Китайскую армию будут бояться, ибо каждому наступлению пехотинца будет предшествовать ливень снарядов."

 GXC_stalwart_souls: "Стойкие души"
 GXC_stalwart_souls_desc: "Наши добродетельные солдаты отличаются способностью совершать невозможное. Снова и снова китайский солдат сталкивался с трудными шансами и выходил победителем. Никогда больше мы не опустимся до унизительного положения Цин, используемой империалистическими державами как марионетка. Китайский народ стоек в защите своей нации, и так же его армия."

 GXC_dedicated_hearts: "Преданные сердца"
 GXC_dedicated_hearts_desc: "Каждый китайский солдат понимает, что их мечты, их надежды, их моменты счастья — все это не имеет значения, когда они истекают кровью на поле боя. Все умирают. Но значит ли это, что их жизни, жизни их товарищей были бессмысленны? Память о павших служит вечным примером преданности китайского солдата. Какой бы ни была цена, они защитят то, что ценят больше всего: нацию, своих близких, всё это."

 GXC_army_for_a_nation: "Army for a Nation"
 GXC_army_for_a_nation_desc: "To unify the country, we must first unify the spirit and mind of the army. The Chinese soldier must understand they are fighting for their country of China rather than just their local provinces, towns, and villages. Now more than ever, they must dedicate their hearts to the revolutionary spirit of those before them."

#Mobilise the Pearl Delta's Might Branch
 GXC_mobilise_the_pearl_deltas_might: "Мобилизовать мощь дельты Жемчужной реки"
 GXC_mobilise_the_pearl_deltas_might_desc: "Трагическое падение Китая в Столетие унижения было ускорено его неспособностью индустриализироваться. Его последующие попытки наверстать упущенное постоянно терпели неудачу. Но мы не можем позволить себе сидеть и оплакивать прошлое. Ту промышленность, что у нас есть, мы должны использовать в полной мере, применяя китайскую выдержку и изобретательность против наших соперников дома и кружащей стервятниками империалистической падали за рубежом."

 GXC_secure_foreign_benefactors: "Обеспечить иностранных благодетелей"
 GXC_secure_foreign_benefactors_desc: "К лучшему или к худшему, продолжающийся раскол Китая и неразвитый промышленный потенциал означают, что масштабных исследований и разработок оружия проводится мало. Многие китайские образцы имеют иностранное происхождение, производятся либо по законным лицензиям, либо бессовестно скопированы и переработаны. Тем не менее, китайские инженеры нашли много областей для модификации и улучшения, что свидетельствует о нашем мастерстве."

 GXC_expand_guangdong_arsenal: "Расширить Гуандунский арсенал"
 GXC_expand_guangdong_arsenal_desc: "Гуандунский арсенал, возможно, является крупнейшим центром военной промышленности провинции. Способный штамповать винтовки для постоянно меняющихся провинциальных армий, он стал важным краеугольным камнем обороны Лянгуана. Мы должны продолжать инвестировать в дополнительное оборудование, персонал и инфраструктуру, обеспечивая нам критическое промышленное преимущество перед нашими врагами. Кантонская промышленная мощь принесет нам победу."

 GXC_swell_military_production: "Увеличить военное производство"
 GXC_swell_military_production_desc: "Нам недостаточно просто полагаться на Гуандунский арсенал или зверинец оружия, которое кланы милитаристов в Лянгуане собрали за эти годы через подпольные закупки. Если мы хотим выжить на меняющемся поле боя, мы должны быть готовы быстро расширять вспомогательные объекты военного производства, производя оборудование от винтовок до гранат и противогазов, даже рискуя производить артиллерию и грузовики."

 GXC_combine_the_aviation_programs: "Объединить авиационные программы"
 GXC_combine_the_aviation_programs_desc: "Эра милитаристов, возможно, истощила сокровища и единство нации, но она не лишила ее воображения. Люди продолжали смотреть в небо, и вскоре последовали смелые военные офицеры. Даже бедные милитаристы соревновались с центральным правительством в развитии воздушных возможностей, хотя, как и многие китайские проекты, они страдали от некомпетентности, плохого финансирования и коррупции. Но если мы объединим усилия Лянгуана, еще не поздно завоевать небеса!"

 GXC_recall_the_pilot_trainers: "Отозвать инструкторов пилотов"
 GXC_recall_the_pilot_trainers_desc: "Очарование мира парящими подвигами послевоенных авиаторов вдохновило многих молодых китайцев искать возможности научиться летать. Точно так же различные правительства и даже некоторые частные пилоты стремились ухаживать за китайскими милитаристами, используя свой (относительно редкий) авиационный опыт как мощный козырь. Если мы хотим построить воздушный флот, мы должны искать этот опыт там, где можем его найти."

 GXC_construct_aircraft_plants: "Построить авиационные заводы"
 GXC_construct_aircraft_plants_desc: "Поскольку мы стремимся построить собственные ВВС, мы не должны поддаваться искушению чрезмерной зависимости от иностранных поставщиков, особенно с учетом меняющегося международного политического климата. Реализуются планы по строительству Гуандунского авиаремонтного завода в Дуншане и расширению завода в Шаогуане. Наш штаб также разработал планы дополнительных сборочных заводов в глубине Гуанси, где они менее уязвимы."

 GXC_establish_a_central_aviation_academy: "Создать Центральную авиационную академию"
 GXC_establish_a_central_aviation_academy_desc: "С окончательной консолидацией наших сил в Китае мы можем, наконец, преследовать цели стольких разрозненных китайских фракций на протяжении всей Эры милитаристов. Слишком недофинансированные, плохо управляемые или иные, предыдущие китайские попытки создать Центральную авиационную академию и военно-воздушные силы заканчивались лишь скудным разочарованием. Однако с новыми усилиями по консолидации и интеграции наши силы скоро будут доминировать в небе."

 GXC_cultivating_a_chinese_airforce: "Культивирование китайских ВВС"
 GXC_cultivating_a_chinese_airforce_desc: "Хотя китайской промышленности и ресурсов более чем достаточно для создания подходящих ВВС, наши современники в Европе и Америке имеют годы, даже десятилетия технологического прогресса в школе полетов. Однако с многочисленными внешними связями, достаточным количеством валюты и множеством доступных экспертов, нам следует нанять иностранных специалистов для дальнейшего продвижения нашей собственной летной программы."

 GXC_air_land_integration: "Интеграция воздуха и земли"
 GXC_air_land_integration_desc: "Одним из самых разрушительных улучшений в ведении войны, принесенных современной эпохой, является интеграция комбинированных наступательных и оборонительных маневров «воздух-земля». Используя различные тактические бомбардировщики и бомбардировщики непосредственной авиационной поддержки, а также быстро движущихся солдат, китайская армия наверняка преуспеет на поле боя. Больше китайская война не будет доминировать устаревшими тактиками прошлой эпохи, но прямой авиационной поддержкой следующей."

 GXC_the_tactical_air_war: "Тактическая воздушная война"
 GXC_the_tactical_air_war_desc: "Способность наших истребителей и бомбардировщиков преследовать не только стратегические, но и тактические цели, безусловно, не должна недооцениваться. Сосредоточившись на проведении воздушных миссий, нацеленных на тактические цели, такие как военная инфраструктура, заводы и тому подобное, мы не только покалечим армии наших врагов, но и их способность вести войну."

 GXC_airborne_special_service: "Воздушно-десантная специальная служба"
 GXC_airborne_special_service_desc: "Вдохновленное событиями во всем мире, наше правительство стало свидетелем расширения и создания различных элитных парашютно-десантных дивизий, способных развертываться за линиями снабжения противника для специальных миссий, требующих максимального мастерства и подготовки. Такая смелая тактика наверняка приведет к многочисленным жертвам, но эти дивизии, безусловно, будущее войны в наших руках!"

 GXC_the_xp_zero_project: "Проект XP-0"
 GXC_the_xp_zero_project_desc: "Вдохновленный различными русскими истребителями, а именно МиГ-1, XP-0 (разработанный знаменитым офицером Чжу Цзяжэнем) является первой попыткой Китая создать собственный истребитель. Вооруженный 4x20 мм подкрыльевыми пушками Hispano-Suiza и способный дополнительно нести бомбы, цель XP-0 — снизить зависимость Китая от иностранных самолетов и вместо этого вдохновить нашу собственную отечественную авиационную промышленность."

 GXC_national_military_aviation_programme: "Национальная программа военной авиации"
 GXC_national_military_aviation_programme_desc: "При наших возобновленных усилиях по развитию собственной отечественной авиационной промышленности и академии правительство все же нашло общее количество самолетов в нашем небе и на аэродромах крайне недостаточным для защиты нации. Благодаря еще одним обновленным усилиям, с упором на оптимизацию защиты, пусть китайские ВВС всегда будут вызывать страх и восхищение!"

 GXC_prepare_air_defenses: "Подготовить противовоздушную оборону"
 GXC_prepare_air_defenses_desc: "Даже если наши доблестные истребители и пилоты неустанно служат во тьме и ночи, защищая нашу нацию, будут времена, когда даже их самоотверженный героизм не сможет предотвратить собственный воздушный флот врагов. Для таких времен мы должны призвать наших храбрых и готовых солдат укомплектовать различные зенитные установки во всех самых важных городах страны."

 GXC_centralise_air_doctrine: "Централизовать воздушную доктрину"
 GXC_centralise_air_doctrine_desc: "Хотя наши ВВС могут расцветать так чудесно, при совместных усилиях многие наблюдатели высказывали критику по поводу беспорядка в доктрине, практикуемой отдельными подразделениями, еще один призрак предыдущих попыток создания китайских ВВС. В конечном счете, чтобы изгнать этот призрак, мы должны работать над централизацией нашей воздушной доктрины в единую, понятную всем."

 GXC_defend_the_coasts: "Защитить побережья"
 GXC_defend_the_coasts_desc: "К счастью, материковый Китай расположен на евразийском континенте, и поэтому любое вторжение с Запада должно пересечь Гималаи, Сибирь или даже обширные просторы Центральной Азии. Но остается критически слабое место китайского побережья, ибо если какой-либо враг одолеет наш флот, мы будем беззащитны. Давайте инвестируем в флот морских бомбардировщиков, чтобы опустошать вражеские флоты с побережья!"

 GXC_kings_of_the_southwest_skies: "Короли юго-западного неба"
 GXC_kings_of_the_southwest_skies_desc: "Поистине герои наших ВВС — это их асы. Стремясь сражаться сверх стандартного долга службы, они продолжают послушно служить нации при жизни и в смерти. Воспитание таких чувств в наших ВВС, несомненно, породит поколения и поколения храбрых героев, осмелившихся подняться в небо за Китай! Ибо мы навсегда Короли юго-западного неба, где бы и когда бы мы ни парили!"

 GXC_expand_guangdong_naval_academy: "Расширить Военно-морскую академию Гуандуна"
 GXC_expand_guangdong_naval_academy_desc: "Гуандун, долгое время бывший центром мировой морской торговли, аналогичным образом выиграл от большого, опытного мореходного сообщества. Защита этой торговли аналогичным образом подтолкнула Гуандун к развитию собственной морской традиции, кульминацией которой стало формирование Военно-морской академии Гуандуна. Хотя потребности Эры милитаристов, ориентированные в первую очередь на сушу, привели к значительному пренебрежению, еще не слишком поздно для нас изменить курс и расширить количество мест в академии."

 GXC_purchase_light_patrol_craft: "Закупить легкие патрульные суда"
 GXC_purchase_light_patrol_craft_desc: "Традиционным фокусом провинциального правительства Гуандуна были легкие суда, способные патрулировать Жемчужную реку. Торпедные катера, тральщики и канонерские лодки, скромные по мировым стандартам, тем не менее являются фундаментом нашего флота. Укомплектование этой флотилии станет первым шагом в создании современной кантонской военно-морской традиции, способной конкурировать с нашими старыми соперниками в Фуцзяни, Шаньдуне и Цзяннани."

 GXC_invest_in_guangnan_shipyard: "Инвестировать в верфь Гуаннань"
 GXC_invest_in_guangnan_shipyard_desc: "Провинциальное правительство Гуандуна традиционно спонсировало небольшой речной флот, предназначенный для защиты внутренних рек и прибрежных портов. Но поскольку защита, которую предоставляли Посольские города и их покровители из великих держав, теперь ослабевает, критически важно, чтобы мы развили некоторые собственные военно-морские возможности, иначе мы потеряем всякую надежду на сохранение нашего суверенитета над морями. Инвестиции в верфь Гуаннань заложат новую военно-морскую традицию в новую эпоху!"

 GXC_reorganise_the_republican_navy: "Реорганизовать Республиканский флот"
 GXC_reorganise_the_republican_navy_desc: "Хотя ресурсы в настоящее время ограничены, существует множество экспертов по ведению боя в открытом море, которые недавно остались без работы. Благодаря контактам и связям со старыми остатками Республиканского флота мы можем использовать этих людей и их навыки для целей, в конечном итоге приносящих пользу нации. Хотя корабли могут быть не подлежащими восстановлению, их таланты — нет."

 GXC_refurbish_chinese_dockyards: "Обновить китайские верфи"
 GXC_refurbish_chinese_dockyards_desc: "Считающаяся устаревшим пятном на береговой линии, китайская судоходная промышленность сегодня представляет собой жалкое зрелище. Хотя она вполне способна производить для экономических и гражданских нужд, когда дело доходит до военных средств, мы сильно отстаем в инженерном отношении. Благодаря умелому использованию инвестиций и рабочей силы мы можем создать новые верфи для китайского флота завтрашнего дня!"

 GXC_modernise_coastal_defenses: "Модернизировать береговую оборону"
 GXC_modernise_coastal_defenses_desc: "Будучи постоянным слабым местом наших оборонительных стратегий, наша длинная и красивая береговая линия является практически открытым приглашением для любых захватчиков с моря. Чтобы исправить это, мы должны реструктурировать и модернизировать нашу устаревшую береговую оборону и создать непроницаемую береговую линию для современной эпохи."

 GXC_ingenuity_at_our_fingertips: "Изобретательность у нас под рукой"
 GXC_ingenuity_at_our_fingertips_desc: "В последние десятилетия морские доктрины никогда не были приоритетом для какого-либо китайского правительства, будь то Чжили или Фэнтянь; главным театром военных действий в Китае всегда была суша. Из-за этого наши противники и современные страны проводят современные учебные программы, изучая передовой опыт морской войны. Новая учебная программа, вдохновленная современными разработками, должна быть преподана нашим адмиралам."

 GXC_six_year_programme: "Шестилетняя программа"
 GXC_six_year_programme_desc: "Вдохновленные планами, предложенными правительством для достижения мощности в 600 000 тонн за 6 лет, ВМС получили добро на полную реализацию своей радикальной программы развития. Неумолимые в своем подходе, сотни кораблей должны быть построены, наряду с необходимыми верфями для их производства. Наконец китайский флот будет править открытым морем."

 GXC_chinese_wolf_packs: "Китайские волчьи стаи"
 GXC_chinese_wolf_packs_desc: "Наряду с современными достижениями морской доктрины пришел бесстрашный, скрытный марш подводной войны. Будучи просто новинкой в прошлую эпоху, теперь полностью практикуемым способом морского боя, волчьи стаи подводных лодок дают исключительную возможность совершать набеги на вражеские линии снабжения и топить тяжелые крупные корабли, не требуя почти столько же материальных вложений."

 GXC_marines_of_the_republic: "Морская пехота Республики"
 GXC_marines_of_the_republic_desc: "Будучи традицией в китайском флоте почти столько же, сколько существует сама Республика. Корпус морской пехоты Китайской Республики существовал с 1914 года, когда он был вырван из рук старого Морского часового корпуса и преобразован в разумную силу, способную проводить морские десанты. Еще раз мы вдохнем новую жизнь в нашу морскую пехоту, чтобы проецировать силу на чужие берега."

 GXC_new_spirit_of_maritime_life: "Новый дух морской жизни"
 GXC_new_spirit_of_maritime_life_desc: "Благодаря нашим усилиям китайский флот действительно получил второй шанс на жизнь. С привитой доблестью и энергией, новыми кораблями в производстве и масштабными кампаниями на горизонте, наш флот больше не является посмешищем Азии. ВМС КР наверняка составят конкуренцию Кригсмарине и Императорскому флоту Японии."

 GXC_exporting_the_revolution_overseas: "Экспорт революции за море"
 GXC_exporting_the_revolution_overseas_desc: "Как доказала немецкая победа в Вельткриге, окончательным фактором с нулевой суммой в морской войне является количество линкоров у каждой стороны. Громадные чудовища способны доминировать в любом столкновении, и с достижениями по всему миру наш флот должен работать над обеспечением своей сферы влияния. Возвышаясь среди гигантов, китайский флот будет ощущаться по всему земному шару."

 GXC_guangdongs_naval_tradition: "Морская традиция Гуандуна"
 GXC_guangdongs_naval_tradition_desc: "Превышение наших полномочий после недавнего объединения наверняка приведет к тому, что молот ударит по наковальне. Пока наш флот находится в своем относительном современном младенчестве, давайте сосредоточимся на меньших кораблях и флотах. Возрождая морскую традицию Гуандуна, Китайские моря снова станут центром китайской торговли. С намерением сосредоточиться на защите нашего побережья и конвоев безопасность китайского судоходства наверняка будет обеспечена!"

 ## Second Sino Japanese War Content
 GXC_chinas_gravest_hour: "Самый тяжелый час Китая"
 GXC_chinas_gravest_hour_desc: "Флаги развеваются, меч обнажен, ружье на плече. То, чего мы стали бояться, наконец пришло, и теперь нашей многовековой цивилизации грозит полное культурное и расовое уничтожение от рук японских империалистов. Пришло время отбросить мелкие ссоры милитаристов, зарыть топор войны и нам, китайскому народу, снова объединиться перед лицом этой беды!"

 GXC_the_chinese_hindenburg_line: "Китайская линия Гинденбурга"
 GXC_the_chinese_hindenburg_line_desc: "Обширные земельные просторы Китая означают, что враг, скорее всего, попытается осуществить морское вторжение в нашу страну, а не прямое сухопутное вторжение. Учитывая экономическую и политическую важность прибрежных регионов, мы бы поступили правильно, заранее подготовившись к вторжению врага, укрепив и подготовив береговую линию бункерами, дотами и другими оборонительными сооружениями — создав нашу собственную линию Гинденбурга."

 GXC_wartime_industry_relocation: "Перемещение промышленности военного времени"
 GXC_wartime_industry_relocation_desc: "Поскольку большая часть отечественной и военной промышленности Китая расположена вдоль прибрежных регионов страны, они, несомненно, подвергнутся давлению и атаке со стороны врага. Чтобы сохранить наши промышленные возможности, мы будем стремиться переместить не только промышленность, но и тяжелую технику и гражданское население вглубь страны, чтобы мы могли сражаться и измотать наступление врага."

 GXC_heroic_revolutionary_fighters: "Героические революционные бойцы"
 GXC_heroic_revolutionary_fighters_desc: "Наши солдаты не похожи ни на кого другого. Перед лицом полного уничтожения от иностранных захватчиков они продолжают проявлять неустанную храбрость и патриотизм. С оружием в руках, свирепостью в сердцах и бессмертной волей, да возвеличим мы наших храбрых революционных бойцов, поскольку они продолжают сражаться и в жизни, и в смерти. Вперед!"

 GXC_one_thousands_sons_one_thousand_soldiers: "Тысяча сыновей, тысяча солдат"
 GXC_one_thousands_sons_one_thousand_soldiers_desc: "Верно, что армия марширует, пока полон желудок. По мере того, как враг марширует по нашей любимой великой стране, его линии снабжения становятся все тоньше, и он будет смелеть, поскольку мы, кажется, отступаем вглубь страны. Во времена кризиса от всех ожидается, что они отдадут все, что у них есть, ради достижения окончательной победы. Мы будем стремиться использовать все полезное, что найдем в сельской местности, прежде чем атаковать наших истощенных врагов средствами партизанской войны."

 GXC_prepare_guerrila_cells: "Подготовить партизанские ячейки"
 GXC_prepare_guerrila_cells_desc: "Даже если мы не можем сравниться с врагом на море, в воздухе или в обычном бою; есть способы, которыми народ может сражаться. В каждом городе, деревне и ферме; мы будем поощрять всех, кто готов бороться за спасение своей страны, создавать группы сопротивления. Они будут лежать в засаде за линией фронта; чтобы сеять хаос и разрушение морального духа, снабжения и логистических возможностей врага."

 GXC_blockade_runners: "Прорыватели блокады"
 GXC_blockade_runners_desc: "Неспособные нанести флотам иностранного захватчика ничего большего, чем бумажный порез, мы сожалеем, что не можем распространить нашу защиту за пределы нашей непосредственной береговой линии. За пределами наших гаваней, наших рек и наших аэродромов враг вполне способен перекрыть крупные иностранные поставки, используя свой флот. Крайне важно, чтобы мы разработали стратегии и корабли, способные уклоняться от вражеских патрулей и обходить блокаду."

##Regional Economic Tree
 GXC_begin_the_yuegui_three_year_plan: "Начать Трехлетний план Юэ-Гуй"
 GXC_begin_the_yuegui_three_year_plan_desc: "Кантон (Гуанчжоу) долго процветал благодаря своему эксклюзивному доступу к внешней торговле. Кантонская система создала южную экономику, частично независимую от остального Китая, к нашему стратегическому преимуществу. Тем не менее, северные милитаристы одержали над нами верх благодаря нашим междоусобицам и их иностранной помощи. Чтобы выжить, мы должны объединить промышленную мощь Юэ (Гуандун) и материальные ресурсы Гуй (Гуанси)."

 GXC_the_good_earth: "Благодатная земля"
 GXC_the_good_earth_desc: "Жизнь в китайской деревне продолжает страдать от бедности и борьбы, пока китайская нация переворачивает новую страницу, уходя от своего аграрного прошлого. Гуанси приходится хуже из двух Гуанов, с ее пересеченной местностью, меньшим доступным капиталом и безудержным бандитизмом. Ведущие теоретики расходятся во мнениях относительно направления, которое должна выбрать провинция, отражая продолжающиеся разногласия между интеллектуалами по всей стране."

 GXC_land_rent_caps: "Ограничение арендной платы за землю"
 GXC_land_rent_caps_desc: "Многие фермеры не владеют землей, которую они бесконечно возделывают в течение года. Наиболее распространенной формой аренды является фиксированная оплата натурой, затем издольщина, а денежная аренда наименее распространена. Договоренности об издольщине часто требуют разделения 50/50, а с арендаторов часто взимают 10-20% от стоимости земли. Оплата часто ожидается даже во время неурожаев. Правила, ограничивающие арендную плату 37,5% и требующие уведомления за шесть месяцев до выселения, защитят наших фермеров от вымогательства."

 GXC_negotiate_with_peasants_association: "Договориться с Ассоциацией крестьян"
 GXC_negotiate_with_peasants_association_desc: "Ассоциации крестьян, организованные Пэн Паем и другими аграрными социалистами, долгое время были занозой в боку сменяющихся правительств в Лянгуане, сбивая с толку даже якобы левые правительства. Тем не менее, пока правительства приходили и уходили, крестьяне и их борьба остаются. Чтобы показать нашу приверженность, мы должны работать с честными добросовестно и отодвинуть на второй план радикальные фракции."

 GXC_farmers_bank_of_guangxi: "Создать Крестьянский банк Гуанси"
 GXC_farmers_bank_of_guangxi_desc: "Фермеры живут в цикле вечного долга, беря кредиты весной в надежде собрать богатый урожай осенью. Чтобы облегчить их участь, будет создан крестьянский банк для кредитования сельских зернохранилищ и фермеров, принимающий зерно в качестве залога. Кредитные офисы для простых людей должны быть развиты лавочниками под государственным регулированием для содействия сельскому бизнесу. Мы не оставим наших фермеров позади."

 GXC_root_out_guangxi_banditry: "Искоренить бандитизм в Гуанси"
 GXC_root_out_guangxi_banditry_desc: "Кампания против бандитов, подлых людей, которые грабят и запугивают трудолюбивых крестьян, начнется немедленно. Гуанси будет разделена на двенадцать районов ополчения, а районным магистратам будут даны широкие полномочия по искоренению этих бродяг. Эти ополчения будут патрулировать дороги и деревни, пока наши силы безопасности прочесывают холмы и горы. Гуанси больше не будет домом для бандитов."

 GXC_the_guangdong_cooperative_plan: "План кооперативов Гуандуна"
 GXC_the_guangdong_cooperative_plan_desc: "Гуандун был домом для нескольких попыток создания работоспособной программы сельских кооперативов, попытки организовать фермеров в работоспособные экономические единицы. Кооперативной комиссии Гуандуна было поручено возглавить последнюю итерацию этого плана, хотя приоритетом должна быть национальная интеграция, даже если это означает пожертвовать автономией деревни ради объединения."

 GXC_ambitious_water_control_projects: "Амбициозные проекты по контролю за водой"
 GXC_ambitious_water_control_projects_desc: "Гуанси ежегодно получает обильные осадки, их непостоянство вызывает либо засухи, либо наводнения. Обезлесение из-за подсечно-огневого земледелия усугубило наводнения, и около 80% сельскохозяйственных угодий, которые мы проверили, показывают чрезмерную кислотность, вызванную пропитанными корнями растительности, выделяющими углекислый газ. Если мы хотим превратить это проклятие фермера в благо, мы должны предпринять масштабные провинциальные проекты по контролю за водой."

 GXC_promote_harmonious_land_cooperation: "Продвигать гармоничное земельное сотрудничество"
 GXC_promote_harmonious_land_cooperation_desc: "Решение проблемы сокрушительной бедности в сельской местности — это не перераспределение, которое только создает хаос и делает всех одинаково бедными. Скорее, мы должны создать местный общественный капитал на благо всех людей. Финансы деревни должны идти на строительство зернохранилищ, дамб, водосборных бассейнов, рыбных прудов и рынков на благо людей, а экспроприация должна ограничиваться только необработанными землями отсутствующих владельцев."

 GXC_ally_with_the_sugar_barons: "Союз с сахарными баронами"
 GXC_ally_with_the_sugar_barons_desc: "Фэн Жуй, местный сахарный магнат, разработал план для пяти новых сахарных районов, каждый из которых оснащен тремя заводами. Жесткие правила вытеснят любых конкурентов, гарантируя нашему правительству и его союзникам эффективную монополию. Ожидается, что торговля сахаром будет чрезвычайно прибыльной, поскольку мы обеспечим дистрибьюторов по всему региону Янцзы, включая конкурентный и прибыльный рынок Шанхая."

 GXC_intensify_wet_rice_production: "Интенсифицировать производство заливного риса"
 GXC_intensify_wet_rice_production_desc: "Колледж сельского хозяйства Национального университета Гуанси и Сельскохозяйственная экспериментальная станция Гуанси проделали большую работу по увеличению урожайности заливного риса. Это включало продвижение новых штаммов семян, импортированных из Гуандуна, а также внедрение картофеля, питательной культуры, которую можно сажать осенью и зимой, пока рисовые поля обычно находятся под паром."

 GXC_corvee_labour_system: "Система трудовой повинности"
 GXC_corvee_labour_system_desc: "Принятие «Положения об обязательной трудовой службе на общественных проектах в деревнях и кварталах» даст местным органам власти право призывать людей на работу максимум на 20 дней ежегодно. Поступая так, мы эффективно превращаем деревни в кооперативы, позволяя им мобилизовать людей на национальную реконструкцию. Через взаимные жертвы мы строим общее будущее."

 GXC_guangxi_infrastructure_devlopment_scheme: "Схема развития инфраструктуры Гуанси"
 GXC_guangxi_infrastructure_devlopment_scheme_desc: "Возможно, самым видимым знаком нашей приверженности реконструкции Лянгуана являются наши массовые проекты строительства дорог и шоссе; ожидается, что и Гуанси, и Гуандун превзойдут все другие провинции, кроме, возможно, Шаньдуна. Построенные в основном с использованием трудовой повинности или путем мобилизации безработных, они имели дополнительное преимущество, помогая в наших усилиях по подавлению бандитизма, к радости местных жителей."

 GXC_rural_educational_effort: "Усилия по сельскому образованию"
 GXC_rural_educational_effort_desc: "Призыв различных реформистских интеллектуалов по всему Китаю искоренить неграмотность не должен остаться без внимания. Будь то трущобы в Гуанчжоу или самые дальние уголки Гуанси, каждый ребенок должен иметь доступ к начальному образованию — если не ради себя, то ради прогресса нации. Учителей не хватает, денег мало, но наша решимость строить новые школьные здания безгранична."

 GXC_expand_guangdong_university: "Расширить университеты Гуандуна"
 GXC_expand_guangdong_university_desc: "Гуандун является домом для нескольких крупных образовательных учреждений, хотя многие из них пришли в упадок из-за продолжающейся Эры милитаристов. Мы должны мобилизовать патриотически настроенных студентов и мыслителей провинции, инвестируя все возможное богатство в стипендии, гранты и другие образовательные программы, чтобы получить преимущество перед нашими соперниками. Наступает новая эра, и мы будем готовы к вызову."

 GXC_simplify_tax_and_duties: "Упростить налоги и сборы"
 GXC_simplify_tax_and_duties_desc: "Народ раздавлен бременем обременительного налогообложения, поскольку конкурирующие фракции и группы интересов вымогают дублирующие сборы. Это душит торговлю, вызывает серьезные беспорядки и укрепляет местных тиранов за счет провинциального правительства. Мы должны упростить налогообложение, отменить специальные пошлины и откуп налогов, сбалансировать бюджет и поставить все под контроль провинциального казначейства."

 GXC_harness_southern_industrial_might: "Использовать южную промышленную мощь"
 GXC_harness_southern_industrial_might_desc: "Промышленная часть нашего Трехлетнего плана предусматривает создание прочного фундамента для индустриализации посредством амбициозных проектов, включая строительство 24 новых заводов в Гуандуне, а также дополнительной промышленной инфраструктуры, такой как гидроэлектростанции, металлургические комбинаты и даже топливные заводы, а также обучение большой современной промышленной рабочей силы, способной укомплектовать эти новые проекты."

 GXC_develop_guangdongs_rails: "Развивать железные дороги Гуандуна"
 GXC_develop_guangdongs_rails_desc: "Отсутствие железных дорог долгое время заставляло Лянгуан зависеть от реки для транспортировки. Хотя это вряд ли изменится в ближайшем будущем, жизненно важно, чтобы мы развивали эффективную транспортную инфраструктуру там, где можем, особенно вдоль линии Гуанчжоу-Ханькоу. Более того, мы должны начать местные проекты шоссе, помогая нам очистить местность от бандитов и обеспечить большую экономическую интеграцию."

 GXC_promote_the_cement_industry: "Продвигать цементную промышленность"
 GXC_promote_the_cement_industry_desc: "Гуандун уже имеет довольно налаженную цементную промышленность в Гуанчжоу, Хэнани и Сицуне благодаря муниципальным строительным проектам, гарантирующим стабильный рынок, поэтому дополнительные капиталовложения, к счастью, не требуются. Тем не менее, мы можем наложить тяжелые де-факто пошлины на иностранный цемент и потребовать использования местного цемента, обеспечивая прибыльность отрасли, пока мы «цементируем» наследие Трехлетнего плана."

 GXC_domestic_textile_industries: "Отечественная текстильная промышленность"
 GXC_domestic_textile_industries_desc: "Ткань и пряжа представляют собой самый высокий импорт в Гуанси, и националистические деятели как в Гуандуне, так и в Гуанси призвали к расширению отечественной легкой промышленности для удовлетворения этих потребностей, вместо того чтобы продолжать полагаться на иностранные закупки. Спонсируемая правительством фабрика льняных изделий Мэйлу погрязла в задержках. При дальнейшем финансировании и внимании, один последний толчок завершит этот проект."

 GXC_qiongya_green_gold: "Зеленое золото Цюнъя"
 GXC_qiongya_green_gold_desc: "Цюнъя — чрезвычайно богатый ресурсами остров, где есть запасы железа, вольфрама, меди, золота, серебра и других ценных металлов в дополнение к различным товарным культурам. Его захват Гоминьданом в 1920-х годах стал огромным бумом для молодого правительства Суня. Мы должны извлечь максимум из острова, обеспечивая обширные инвестиции и используя его материальное богатство для подпитки нашей растущей промышленной базы."

 GXC_wealth_of_the_hinterlands: "Богатство глубинки"
 GXC_wealth_of_the_hinterlands_desc: "Горы Гуанси и ее история бедности и бандитизма долгое время препятствовали эксплуатации ее огромных запасов полезных ископаемых. Но растущие потребности нашей военной машины и консолидация контроля, которую приносит наш Трехлетний план, ведут нас глубже в провинциальную глубинку. Мы построим необходимую инфраструктуру и инвестиции, чтобы открыть то, что когда-то считалось недоступным захолустьем, для остального Китая."

 GXC_addressing_the_urban_plight: "Решение проблем городов"
 GXC_addressing_the_urban_plight_desc: "Страдания беднейших слоев Гуанчжоу не остались незамеченными. Хотя искренняя забота и подаяние милостыни существуют, многие рассматривают городскую бедноту как ресурс для эксплуатации, и даже небольшие акты помощи политизируются. Различные политические акторы, как левые, так и правые, работали либо с Десятью благотворительными залами, либо чтобы подорвать их доминирование, но теперь пришло время нашему правительству действовать по собственной инициативе."

 GXC_promote_pearl_river_trade: "Развитие торговли на Жемчужной реке"
 GXC_promote_pearl_river_trade_desc: "Жемчужная река веками была экономической кровеносной системой Лянгуана, по которой велась торговля вверх и вниз по течению. В ее устье находится дельта Жемчужной реки, где расположены крупные экспортные города, такие как Гуанчжоу (Кантон), Гонконг и Макао. Богатство, которое это принесло, создало процветание, но неравномерное. Несмотря на это, мы должны двигаться вперед, чтобы связать наши две провинции друг с другом и с миром."

 GXC_protect_trade_balance: "Защита торгового баланса"
 GXC_protect_trade_balance_desc: "Слишком долго китайский народ эксплуатировался западными империалистами и их компрадорскими лакеями. Из своих прибрежных концессий они выкачивают богатства земли, оставляя нас страдать в нищете. Мы должны изменить торговый баланс и создать самодостаточность. Мы можем начать с пропаганды более простой одежды и более дисциплинированного образа жизни для нашего народа, пока мы готовимся к длительной экономической кампании."

 GXC_mobilise_the_guangzhou_syndicates: "Мобилизация синдикатов Гуанчжоу"
 GXC_mobilise_the_guangzhou_syndicates_desc: "Гуанчжоу является центром профсоюзного активизма в Китае благодаря относительно высокой индустриализации, сочувствующим правительственным фракциям и своей истории как колыбели китайского синдикалистского движения. Их революционный, антиконцессионный пыл, если его правильно мобилизовать и контролировать, необходим для наших усилий по организации рабочих и сдерживанию власти головорезов из Торгового корпуса."

 GXC_nationalise_foreign_assets: "Национализация иностранных активов"
 GXC_nationalise_foreign_assets_desc: "Поскольку внимание мира отвлекается от Китая, а среди инвесторов растет чувство беспокойства по поводу будущих перспектив их вложений, многие решили ликвидировать свои инвестиции перед лицом «Черного понедельника». Но они не могут так же легко переместить физический капитал, и мы позаботимся о том, чтобы выкупить важнейшую инфраструктуру Гуанчжоу по справедливой цене... с небольшой «помощью» правительства, если потребуется."

 GXC_regional_fiscal_independence: "Региональная фискальная независимость"
 GXC_regional_fiscal_independence_desc: "Хотя для нас было бы невозможно достичь истинной автаркии, мы прошли долгий путь, чтобы сохранить прочную экономическую основу нашей провинции, избегая при этом чрезмерной зависимости от внешних, подрывных акторов. Иностранные договоры и их несправедливые торговые условия продолжают подрываться нашими де-факто тарифами, и пусть жалкие империалисты попробуют применить их сейчас. Любой, кто торгует с нами, должен делать это на равных условиях."

 GXC_continued_external_investment: "Поиск продолжения внешних инвестиций"
 GXC_continued_external_investment_desc: "Провинциализм долгое время был проклятием китайского развития. Несмотря на то, что подавляющее большинство экспертов, помогающих нам в экономической реконструкции в Лянгуане, родом из-за пределов двух провинций, даже те, кто из одной провинции, иногда воспринимаются как чужаки. Мы должны работать над тем, чтобы интегрировать лучшее из того, что могут предложить китайские и иностранные идеи, подталкивая Лянгуан к современности."

 GXC_facilitating_exports: "Содействие трансграничному экспорту"
 GXC_facilitating_exports_desc: "Мы должны строить и расширять наши выгодные отношения с концессиями, особенно с Гонконгом и Макао. Хотя условия торговли до сих пор были в значительной степени неравными, мы извлечем из этого максимум пользы, чтобы обеспечить более процветающее будущее для нашего народа. Кроме того, мы должны устранить торговые барьеры между нашими двумя провинциями, открывая Жемчужную реку как экономическую артерию к нашему центру."

 GXC_alliance_with_the_merchants: "Союз с торговцами"
 GXC_alliance_with_the_merchants_desc: "Торговцы Юэ объединились в Гуанчжоуской торговой палате, вкладывая огромные средства в свои ополчения из-за страха перед социалистическими радикалами и бандитскими набегами. Но это не только дестабилизирует нашу безопасность, но и сокращает их прибыли. Провинциальное правительство и буржуазия должны работать вместе как партнеры, чтобы мы могли создавать богатство, которое поднимет всех людей в Лянгуане."

 GXC_thriving_southeastern_entrepot: "Процветающий юго-восточный торговый узел"
 GXC_thriving_southeastern_entrepot_desc: "Главная проблема, терзающая Китай, заключается в том, что богатства просто не хватало на всех. Милитаристы, бандиты и социалисты сражались за объедки, разрывая друг друга и нацию на части, погружая Китай в спираль разрушения и нищеты. Истинный путь выхода из недуга Китая есть и был в том, чтобы продвигать мир и строить, а не разрушать. Благодаря нашим усилиям мы объединили Лянгуан, чтобы создать островок процветания посреди анархии Китая."

 GXC_a_model_for_the_nation: "Образец для нации"
 GXC_a_model_for_the_nation_desc: "Народ Китая, давно разочарованный постоянными неудачами центрального правительства Бэйяна, с отчаянием ищет надежду повсюду. В наших двух провинциях, какими бы разными они ни были, мы создали новое видение будущего. Модель для перемен. Чертеж процветания. Переворачивая страницу Трехлетнего плана и двигаясь вперед, что бы ни уготовила судьба, история запомнит достижения, которых мы добились в Лянгуане."

##KMT Regional Political Tree
 GXC_cradle_of_the_national_revolution: "Колыбель Национальной революции"
 GXC_cradle_of_the_national_revolution_desc: "После того как Юань Шикай и предательское правительство Бэйяна изгнали Тунмэнхой и загнали его в подполье, он возродился в Гуанчжоу. Вторые шансы вскоре стали третьими, и теперь это, возможно, наша последняя возможность освободить Китай от порабощения и исполнить волю доктора Суня. Гуанчжоу снова оказывается оплотом национального спасения и кормильцем нашего революционного будущего!"

 GXC_intensify_propaganda_efforts: "Усиление пропаганды"
 GXC_intensify_propaganda_efforts_desc: "«Сила масс велика, но массы легко обмануть, и они легко злоупотребляют властью. Поэтому наша партия должна чистосердечно направлять их и побуждать стоять рядом и сражаться вместе с нами!»\n- Чэнь Цзитан\nКаковы бы ни были наши мысли о генерале Чэне, наш воссозданный отдел пропаганды должен поднять крестьян и рабочих из их апатии навстречу судьбе нашей нации!"

 GXC_consolidate_the_revolutionary_junta: "Консолидация революционной хунты"
 GXC_consolidate_the_revolutionary_junta_desc: "Хотя нашей конечной целью является свободная, процветающая и демократическая республика, грязные реалии эры милитаристов потребовали формирования партийного государства, действующего на принципах опеки. Временный совет, управляющий Гуанчжоу, должен отличаться от окружающих его милитаристов, действуя коллегиально как настоящие товарищи в демократическо-централистской модели, сочетая дискуссию с решительностью."

 GXC_subdue_the_gentry: "Подчинение шэньши"
 GXC_subdue_the_gentry_desc: "Шэньши (землевладельцы) долгое время действовали независимо от провинциального правительства, будучи проклятием аграрной реформы и корнем крестьянских волнений. У Гоминьдана долгое время были непростые отношения с классом землевладельцев, и в наше отсутствие милитаристы, пришедшие после нас, позволили шэньши еще больше укрепиться. Мы должны сломить их надменную власть и привести их к покорности, вопрос всегда лишь в том, насколько далеко зайти..."

 GXC_revitalise_primary_school_education: "Оживление начального образования"
 GXC_revitalise_primary_school_education_desc: "Гоминьдан глубоко привержен расширению доступа к государственному образованию, включая искоренение неграмотности и надлежащее обучение масс учению доктора Суня. Гуанси, чья система образования отстает, требует значительных усилий, чтобы наверстать упущенное, включая массовое строительство или переоборудование зданий в школы в каждой деревне и четырехлетние средние школы в каждом округе."

 GXC_expand_social_services: "Расширение социальных услуг"
 GXC_expand_social_services_desc: "Третьим принципом доктора Суня является Миньшэн: гарантия благосостояния и средств к существованию нации. Потребности нашей революции предъявили такие большие требования к людям, и будет только правильно, если мы вернем их веру ощутимой защитой для бедных и страдающих. Учитывая крайнюю нищету провинции, ожидается, что Новая клика Гуанси извлечет наибольшую выгоду из этой политики, используя ее как средство вдохновения... и контроля."

 GXC_kuomintang_united_front: "Единый фронт Гоминьдана"
 GXC_kuomintang_united_front_desc: "Было время, когда китайский Гоминьдан был един, объединенный общей преданностью доктору Суню и Трем принципам. Но такое единство быстро исчезло после его смерти, и теперь партия обменивается обвинениями в том, что они иностранные лакеи и доктринальные еретики. Но в этот тяжелый период китайской истории у нас мало выбора, кроме как работать вместе, чтобы выжить. Давайте зароем топор войны, по крайней мере, на время."

 GXC_deal_with_remnants: "Разобраться с остатками"
 GXC_deal_with_remnants_desc: "Гуанчжоу долгое время был домом как для идеалистов-мечтателей, так и для циничных компрадоров. Поскольку Белое Солнце снова реет над городом, многие бежали в концессии или прячутся в своих домах, опасаясь репрессий. Тем не менее, многие остаются политически активными, несмотря на страх репрессий. Похоже, что даже когда правительства меняются, беспокойная энергия Кантона остается. Но мы должны быть готовы укротить этого зверя, иначе мы все погибнем."

 GXC_rally_the_mass_movement: "Сплочение массового движения"
 GXC_rally_the_mass_movement_desc: "Не секрет, что нашу революцию можно выиграть только при поддержке народа. Наш враг лучше вооружен, лучше обучен, и мир с ними. Но если народ с нами, ничто не сможет встать у нас на пути!"

 GXC_local_government_initiatives: "Инициативы местного самоуправления"
 GXC_local_government_initiatives_desc: "На военном этапе революции мы должны немедленно направить партийных чиновников на недавно освобожденные территории для обучения их самоуправлению. Эти кадры должны работать как авангард, отменяя чрезмерные налоги, защищая интересы крестьян и рабочих, искореняя ростовщиков и организуя общественную помощь. Это единственный способ предотвратить милитаризм и посеять семена лучшего будущего."

 GXC_reach_out_to_overseas_contacts: "Связь с зарубежными контактами"
 GXC_reach_out_to_overseas_contacts_desc: "Китайская диаспора простирается от Сингапура до Гавайев и долгое время была покровителем доктора Суня. Хотя вера в движение и финансирование, которое с ним приходило, ослабли, в этот последний шанс для спасения нашей страны мы должны обратиться с пламенным призывом о помощи. Каждый последний кусок серебра и золота, каждый переведенный доллар, каждый доброволец, возвращающийся домой — с достаточным количеством капель мы получим прилив."

 GXC_return_of_the_moscow_committee: "Возвращение Московского комитета"
 GXC_return_of_the_moscow_committee_desc: "Великая борьба только начинается. Мы возвращаем себе не только наше законное положение в партии, но и готовимся к нашей великой миссии по полному освобождению китайских народов от иностранных империалистов и их милитаристских лакеев. Ху Ханьминь, чья тень нависает над всеми правыми Гоминьдана, возвращается домой. Для всех товарищей, которые не отреклись от Трех принципов, пришло время объединиться."

##UPC Regional Political Tree
 GXC_the_second_return_to_canton: "Второе возвращение в Кантон"
 GXC_the_second_return_to_canton_desc: "Таков наш триумф! Более десяти лет назад Армия Юэ уже маршировала из Фуцзяни, обрушившись на осквернителей Гуандуна из Старой Гуанси и изгнав их из Гуандуна. И снова мы торжествуем! Мэр Чэнь Ляньбо хотел бы позиционировать себя как истинного защитника кантонских дел, но провинция знает, что только ее армия может защитить ее от несправедливости."

 GXC_rein_in_expenditures: "Обуздание расходов"
 GXC_rein_in_expenditures_desc: "В Эру милитаристов численность войск взлетела до совершенно безумного уровня. Провинциальные милитаристы тратили значительные суммы своего бюджета просто на содержание или рост своих армий. Гонка вооружений между Северным и Южным Чжили почти привела к банкротству нации и открыла путь дальнейшему концессионизму. Сократив военный бюджет, мы сможем выделить больше средств на гражданские дела и местные реформы."

 GXC_building_a_new_federalist_coalition: "Создание новой коалиции федералистов"
 GXC_building_a_new_federalist_coalition_desc: "Построение возрожденного федералистского Китая — задача не из быстрых. Некогда великая федералистская коалиция начала 1920-х годов включала в себя несколько провинций и держала в своих руках интеллектуалов Китая. Но она распалась в середине 1920-х годов и упала еще ниже после того, как Чжили доказали, что Объединение через Подчинение — это истинный путь вперед. Однако не все потеряно, и с возвращением губернатора Чэня, возможно, Федералистский проект увидит свет."

 GXC_reviving_the_guangdong_constitution: "Возрождение Конституции Гуандуна"
 GXC_reviving_the_guangdong_constitution_desc: "Конституция Гуандуна времен последнего губернаторства Чэня установила местную демократию на уровне, невиданном ранее в Китае. С местными комитетами на уровне деревень и округов были проведены реформы, позволяющие большую автономию для полиции, самоуправления и выборов. Гражданская и военная ветви были разделены, и план Чэня «Снизу вверх» создал три ветви уездного управления: местные собрания, местные суды и местные магистраты."

 GXC_democracy_from_the_bottom_up: "Демократия снизу вверх"
 GXC_democracy_from_the_bottom_up_desc: "Городские и деревенские магистраты являются краеугольным камнем построения новой федералистской демократии. Ибо каждый район составляет уезд, а они составляют провинцию. Магистрату должно быть поручено подавление местных злоумышленников, наказание шэньши, обеспечение обязательного образования, продвижение местной промышленности и создание местного ополчения. Что касается их назначения? Они должны отбираться доверенным чиновником, путешествующим из уезда в уезд и собирающим портфолио."

 GXC_canton_shows_the_way: "Кантон указывает путь"
 GXC_canton_shows_the_way_desc: "Губернатор Чэнь долгое время был вне настоящего центра власти Гуандуна, так как город был захвачен Чэнь Ляньбо и Торговым корпусом с 1927 года. Наконец, возвращаясь к власти в провинции должным образом после пребывания на задворках, Чэню необходимо перенести центр власти Армии Юэ из Хайфэна в Кантон. Оживляя город и модернизируя его, наряду с несколькими закулисными сделками, Армия Юэ никогда не будет изгнана."

 GXC_an_educational_cornucopia: "Образовательный рог изобилия"
 GXC_an_educational_cornucopia_desc: "Благодаря созданию независимой исполнительной и бюджетной системы, а также упразднению Департамента образования в пользу независимого Провинциального комитета по образованию, есть надежда, что Гуандун превратится в центр интеллектуализма и передовых приложений. Конечно, финансирование таких начинаний потребует части стабильных доходов, таких как налоги на табак и алкоголь, и как минимум 20% провинциального бюджета."

 GXC_intermixing_of_triad_and_tiandihui: "Смешение Триад и Тяньдихуэй"
 GXC_intermixing_of_triad_and_tiandihui_desc: "Возможно, неизвестным качеством Партии общественных интересов является ее происхождение в общине зарубежных китайцев Хунмэнь. С такими людьми, как Гуань Вэньсэнь и Чэнь Сяоюэ, отправленными в Юго-Восточную Азию для создания поддержки партии, смешение традиционного фуцзяньского общества Тяньдихуэй с кантонской Триадой стало неотъемлемой частью Партии. В значительной степени получив репутацию «Партии зарубежных китайцев», мы можем только надеяться использовать это прозвище."

 GXC_managing_guangxis_reconstruction: "Управление реконструкцией Гуанси"
 GXC_managing_guangxis_reconstruction_desc: "Пародия на Эру милитаристов и Смуту в Двух провинциях, Гуанси была опустошена войной и кровопролитием. С властью Старой клики Гуанси, казалось бы, сломленной в третий раз, социальная структура провинции была разрушена. Однако сама Гуанси была сильно милитаризованной провинцией до недавней борьбы и остается таковой. С остатками Старой Гуанси, вливающимися в правительство Чэня, давайте начнем время исцеления."

 GXC_laying_down_the_law_in_liangguang: "Установление законности в Лянгуане"
 GXC_laying_down_the_law_in_liangguang_desc: "Чтобы восстановить порядок в хаосе после краха Лиги, абсолютно необходимо контролировать полицию и судебную систему Лянгуана. Посредством расширения числа округов и местных судов, преимущественного использования местного ополчения, а не государственных войск, создания современной полиции и полицейской академии наряду с новыми тюрьмами, ориентированными на реабилитацию, мы совершим революцию в правосудии в Китае."

 GXC_assuring_our_honest_partners: "Заверение наших честных партнеров"
 GXC_assuring_our_honest_partners_desc: "Смута в Двух провинциях принесла только финансовый хаос и неопределенность в сельские сельскохозяйственные районы Гуанси и Гуандуна. Мобилизованные Гоминьданом, разгневанные Пэн Паем и его Фермерами, или подвергшиеся набегам милитаристов и бандитов, «честные» шэньши потребовали, чтобы Правительство восстановило гармонию в сельской местности. Конечно, при таком разгроме должны быть введены некоторые формы защиты для крестьянства."

##NPA Regional Political Tree
 GXC_heirs_of_lu_rongting: "Наследники Лу Жунтина"
 GXC_heirs_of_lu_rongting_desc: "Лу Жунтин, возможно, погиб в 1930-х годах с незавершенной миссией, но именно его наследники, Старая клика Гуанси, и его соперники, Торговцы и Клика политической науки, остаются нести факел модели Лянгуана. С оппозицией как со стороны федералистов, так и революционеров, именно старый порядок восторжествовал, и именно старый порядок должен восстановить баланс в Китае."

 GXC_putting_down_the_spectre_of_1927: "Покончить с призраком 1927 года"
 GXC_putting_down_the_spectre_of_1927_desc: "С момента провала Северного похода Гоминьдан долгое время был лишь бледной тенью самого себя. С одним последним «ура» перед лицом Шанхайского восстания в 1932 году, они продолжали оказывать все более уменьшающееся влияние внутри нации. Их Центральные комитеты находятся в изгнании в Москве и Париже, и их операции в Миньгане и Гуйчжоу, несомненно, имеют ограниченное время. Давайте поможем ускорить события."

 GXC_approaching_the_yue_clique: "Сближение с Кликой Юэ"
 GXC_approaching_the_yue_clique_desc: "Все еще грозное присутствие, несмотря на то, что ее затмевают Шэнь Хунъин и Чэнь Ляньбо, Клика Юэ проявляет себя в Чаомэй и прилегающих районах как сертифицированный оплот, по крайней мере, на словах, Федерализма. В попытке заручиться их поддержкой, или, точнее, позволить им сложить оружие, было бы благоразумно для провинциального правительства прийти к соглашению и компромиссу с подчиненными Чэнь Цзюнмина."

 GXC_legacy_of_the_cohong: "Наследие Гунхана"
 GXC_legacy_of_the_cohong_desc: "Гунхан когда-то был единственным способом для западных держав торговать на китайских рынках. Легализованная купеческая монополия Цин, Гунхан был единственным арбитром любой торговли, проходящей через и из Кантона, но в конечном итоге был распущен с окончанием Первой опиумной войны. Однако многие из его потомков составляют ряды современного кантонского купеческого общества, и именно через поколения богатства они могут утверждать свое влияние."

 GXC_relief_of_the_rurals: "Помощь сельским жителям"
 GXC_relief_of_the_rurals_desc: "Нельзя винить крестьянство за то, что оно обратилось к демагогии или массовой популистской привлекательности революционеров Гоминьдана, ибо их доля в жизни часто была тяжелой и изобиловала несправедливостью. Но это всего лишь скромный порядок китайского общества, что они служат своей цели добросовестно и без жалоб. Чтобы восстановить гармонию в сельской местности, мы должны сначала обеспечить хотя бы видимость рычагов влияния и помощи крестьянству и их проблемам."

 GXC_five_races_of_many_cultures: "Пять рас многих культур"
 GXC_five_races_of_many_cultures_desc: "Сам Лу Жунтин был представителем этнического меньшинства чжуан; при этом Гуанси и Гуандун заметно сохраняют значительное население меньшинств всех мастей и цветов. Сам Лу Юйгуан — вьетнамец, а Ма Цзи — хуэй. В самих основах Старой клики Гуанси заложено уважение культурных традиций и идентичности ее меньшинств, и как таковая государственная политика должна отражать значительную заботу и внимание, уделяемое этим меньшинствам."

 GXC_blending_confucianism_and_progress: "Смешение конфуцианства и прогресса"
 GXC_blending_confucianism_and_progress_desc: "Большинство сочло бы конфуцианство сдерживающей силой, ограничивающей прогресс и современность в китайской нации. Но конфуцианство может быть модернизировано, оно может быть адаптировано, оно может вечно служить связующей силой в общем китайском государстве, пока оно модифицируется для времени. Неоконфуцианство предоставило себе новую, обновленную интерпретацию конфуцианских идеалов, по своей сути смешанную с очарованием прогрессивизма."

 GXC_nine_charitable_halls: "Девять благотворительных залов"
 GXC_nine_charitable_halls_desc: "Девять благотворительных залов, иначе известные как Цзюшаньтан, являются сохранившимся пережитком неправительственных благотворительных учреждений поздней Цин, причем сами Девять благотворительных залов были крупнейшей дореспубликанской организацией в Гуанчжоу. Хотя их влияние ненадолго уменьшилось в середине 1920-х годов, они пережили возрождение в мировом порядке Бэйяна, и крайне важно, чтобы их ресурсы продолжали использоваться для влияния и стабильности."

 GXC_salutations_to_the_kingmakers: "Приветствие делателям королей"
 GXC_salutations_to_the_kingmakers_desc: "Именно Чжили доверили различным фракциям Лянгуана их местные государства, и именно Чжили обеспечат дальнейший успех и стабильность не только Лянгуана, но и всего Китая. И поэтому с великой грацией и подобострастием Шэнь Хунъин шлет свои лучшие пожелания своим благодетелям на Севере; возможно, они даже одолжат дивизию или, может быть, немного оружия?"

 GXC_liangguangs_destiny: "Судьба Лянгуана"
 GXC_liangguangs_destiny_desc: "Естественное состояние Лянгуана — играть ведущую роль в объединении Китая; он был резиденцией многих соперничающих правительств и практически является де-факто столицей Юго-Запада. Если нация должна быть объединена, то это должно быть решено теми, кто контролирует Кантон, и, таким образом, именно Старая клика Гуанси и Ассоциация всех сословий по спасению Гуандуна выстоят в новом китайском национальном порядке."

###- Phase III Focuses -###

##KMT Unique Phase III Focuses
 GXC_a_new_federalist_conference: "Новая конференция федералистов"
 GXC_a_new_federalist_conference_desc: "На пике Федералистского движения в начале 1920-х годов ведущие федералистские интеллектуалы, милитаристы и другие лидеры собирались вместе в разных городах, чтобы обсудить достоинства провинциальной автономии, конституционализма и национального воссоединения. Хотя в то время это не увенчалось успехом, мы можем инициировать возобновление дискуссии, проведя новую конференцию в Гуанчжоу."

 GXC_avenge_the_northern_expedition: "Отомстить за Северный поход"
 GXC_avenge_the_northern_expedition_desc: "Хотя милитаризм и регионализм остаются постоянной проблемой, настоящий раскол в стране был между Севером и Югом. Доктор Сунь признал этот факт с самого начала, тщетно призывая к Северному походу, чтобы навсегда свергнуть коррумпированную Бэйянскую республику. Годы предательства, неудачных переговоров, междоусобиц, плохого военного руководства и иностранного вмешательства отсрочили исполнение мечты доктора Суня. Но мы не сдерживаемся, и вместе мы найдем нашу судьбу в Пекине!"

 GXC_march_on_manchuria: "Марш на Маньчжурию"
 GXC_march_on_manchuria_desc: "Маньчжурия значительно изменилась со времен маньчжурского завоевания. Она превратилась из дикой границы в неотъемлемую часть Китая, но, к сожалению, иностранные хищники боролись между собой за контроль над регионом, его железными дорогами и его ресурсами. Они нашли немало коллаборационистов, чтобы помочь им в их завоевании. Больше нет — мы знаем, что Дунбэй принадлежит китайцам, и мы будем сражаться с любым, кто посмеет остановить нас!"

 GXC_seize_the_guofus_capital: "Захват столицы Гофу"
 GXC_seize_the_guofus_capital_desc: "Лига восьми провинций была создана Сунь Чуаньфаном в его безумном стремлении к власти, инструменте непостижимого угнетения и невыразимой алчности иностранных империалистов и местных компрадоров. Когда карточный домик неизбежно рухнул, это создало значительный вакуум власти на Восточном побережье. Нам предстоит освободить народ Лиги, включая город Нанкин, где доктор Сунь впервые занял пост президента Республики!"

 GXC_pacify_the_interior: "Умиротворение внутренних районов"
 GXC_pacify_the_interior_desc: "«Сначала умиротворить внутреннее, затем сопротивляться внешнему».\nЕще в 1915 году доктор Сунь признал, что растущий регионализм и раскол, вызванные десятилетиями децентрализации эпохи Цин, серьезно ослабили способность Китая сопротивляться иностранному империализму. На юго-западе высокие горы и мощные армии, созданные после Войны в защиту нации, создали огромные владения милитаристов, которые должны быть приведены к покорности."

##RKMT Phase III Satellite Focuses
 GXC_under_the_leftist_thumb: "Под пятой левых"
 GXC_under_the_leftist_thumb_desc: "Нравится нам это или нет, но у нас, товарищей по Гоминьдану, гораздо больше общего друг с другом, чем с негодяями из Бэйяна или милитаристами запада. Поэтому мы объединились, хотя бы на время, с левыми в Нанкине. Это непростой союз, но его придется придерживаться, пока обстоятельства не изменятся. С объединением Гуанчжоу и Нанкина, возможно, на этот раз у нас действительно есть шанс?"

 GXC_coopting_socialist_legitimacy: "Кооптация социалистической легитимности"
 GXC_coopting_socialist_legitimacy_desc: "Что позволило социалистам завоевать сердца людей, пока мы отставали? Что позволило им вернуться из Парижа в Нанкин до того, как мы смогли вернуть наших лоялистов из Москвы в Гуанчжоу? Ответ — дисциплина, железная дисциплина, которой социалисты злоупотребляют, чтобы вызывать страх и разрушение. Но в дисциплине нет ничего плохого, и если бы только наши собственные кадры приняли ее, мы могли бы спасти нашу нацию!"

 GXC_press_for_national_unification: "Настаивать на национальном объединении!"
 GXC_press_for_national_unification_desc: "Социалисты распространяют свои лозунги, оплакивая национальную разобщенность и иностранный империализм, чтобы получить власть, но мало что делают с этим, как только получают ее. Кто-то должен призвать их к ответу за это лицемерие, подталкивая их делать больше в отношении немецких и японских болонок севера. От нас, конечно, ожидают, что мы внесем свой вклад, но пусть народ знает, кто такие настоящие китайские патриоты!"

 GXC_return_of_the_true_chinese_patriots: "Возвращение истинных китайских патриотов"
 GXC_return_of_the_true_chinese_patriots_desc: "Левый комитет пал, свергнутый из-за их фатально ошибочного понимания Трех принципов и теми, кто был достаточно храбр, чтобы противостоять социалистической тирании. На его месте возникла пустота, так как многие глупо задаются вопросом, были ли неправы левые или вся партия. Неважно, мы окажемся на высоте положения, демонстрируя нации, что мы, верные революционные товарищи, спасем нашу нацию!"

 GXC_the_eye_of_the_storm: "Глаз бури"
 GXC_the_eye_of_the_storm_desc: "Среди хаоса социалистической революции Гуанчжоу приобрел репутацию стабильности и порядка при правом Гоминьдане. С момента нашего небольшого пакта с Нанкином произошла своего рода миграция: левые бегут на север к своим товарищам, а правые бегут на юг, чтобы найти безопасность и здравомыслие под нашим правлением. Реальность такова, что большая часть нации мало заинтересована во французском извращении, которое загрязняет нашу культуру, и по мере того, как революция набирает обороты, большинство стекается в наш лагерь."

 GXC_the_old_political_dance: "Старый политический танец"
 GXC_the_old_political_dance_desc: "Правый Гоминьдан, Левый Гоминьдан. Это фразы, которые синдикалисты придумали, чтобы разделить партию. Они завидовали видению доктора Суня, жаждая его идей и его влияния на людей для своих собственных гнусных целей. Поэтому неудивительно, что французы и их лакеи стремились разделить нас, и даже когда правые были подвергнуты чистке, они продолжали разделять левых. Мы должны играть в эту игру, влияя на центральный комитет, чтобы обеспечить наилучший результат для себя."

 GXC_clear_out_fourth_army_remnants: "Зачистка остатков Четвертой армии"
 GXC_clear_out_fourth_army_remnants_desc: "Четвертая армия была в значительной степени расформирована с тех пор, как импульс Чэнь Миншу иссяк. Тем не менее, Гуандун остается наводненным социалистическими повстанцами, и потребуется некоторое время, чтобы устранить худших деятелей навсегда. Этот процесс займет время, не идя слишком быстро, чтобы избежать гнева центрального комитета, но в конечном итоге он укрепит контроль Чэнь Цзитана над регионом, что является необходимым шагом для его будущей повестки дня."

 GXC_secure_hu_hanmins_return: "Обеспечить возвращение Ху Ханьминя"
 GXC_secure_hu_hanmins_return_desc: "Ху Ханьминь, красноречивое светило правых Гоминьдана, сидит в Москве со своим собственным центральным комитетом, ожидая в терпеливом изгнании возможности вернуться. Заклятый враг Ван Цзинвэя, его изгнание предательским Председателем Ваном и Генералиссимусом Чаном означает, что его послужной список не запятнан провалом Северного похода. Обезопасив Гуандун, мы пригласим их вернуться, чтобы принять участие в этом «Едином фронте», в который левые нас так великодушно загнали."

 GXC_form_southwest_political_affairs_council: "Формирование Юго-западного совета по политическим делам"
 GXC_form_southwest_political_affairs_council_desc: "С возвращением Ху Ханьминя временная хунта Гоминьдана, правившая Лянгуаном, была заменена более формальным Советом по политическим делам с Ху во главе. Наши трещины с Нанкином растут, но пока мы остаемся под их знаменем. Мы обращаем амбиции на юго-запад, обеспечивая политически благоприятные внутренние районы и сплачивая националистические элементы для неизбежной схватки с Центральным комитетом."

 GXC_preparing_for_a_change: "Подготовка к переменам"
 GXC_preparing_for_a_change_desc: "Перемены приходят в Китай. С тех пор как первый революционер взялся за оружие в 1911 году, конец старого порядка был неизбежен. Но люди, которые сражались и умирали за эту нацию, делали это не для красных империалистов Лондона или дегенеративных синдикалистов Парижа или непреодолимого эго Ван Цзинвэя. Они сделали это, потому что хотят настоящего, гармоничного будущего, того, которое доктор Сунь обещал все эти годы назад: Датун. Мы восстаем против Красного императора и его иностранного двора, раз и навсегда."

## RKMT Chinese Civil War Tree
 GXC_the_kuomintang_showdown: "Противостояние в Гоминьдане"
 GXC_the_kuomintang_showdown_desc: "Наконец-то дошло до этого. Конфликт между левыми и правыми в партии, назревавший со времен Первой реорганизации в 1924 году, вернулся в полную силу. Не имея иного выбора, кроме как сдать нашу любимую нацию разврату социалистов или встать и бороться против их злобы, мы решили выступить против наших бывших «товарищей». Мы сражаемся и умираем во имя Белого солнца, Синего неба и Полностью красной земли!"

 GXC_reorganise_nra_defectors: "Реорганизация перебежчиков из НРА"
 GXC_reorganise_nra_defectors_desc: "Несмотря на настойчивость Отдела пропаганды в коварном промывании мозгов солдатам Национально-революционной армии, многие китайские патриоты легко видят насквозь пустую ложь левой пропаганды. Поскольку социалистическая администрация скатилась в анархию на Третьем конгрессе, многие под покровом ночи перебрались на наши позиции. Крайне важно, чтобы мы быстро сформировали из них рабочие батальоны, чтобы дать отпор социалистическому наступлению!"

 GXC_disrupt_socialist_lines: "Нарушить социалистические линии"
 GXC_disrupt_socialist_lines_desc: "Поскольку левый комитет развалился из-за собственных внутренних противоречий, вся Центральная армия была ввергнута в полный беспорядок. От маршалов до рядовых, никто, кажется, не понимает, что происходит. Исход офицеров правого толка и умеренных из-за поспешных внутренних чисток Политического отдела дал нам преимущество. Хотя мы и в меньшинстве, мы можем разбить их неуклюжее наступление с помощью хорошо размещенных источников и ловушек."

 GXC_demonstrate_battlefield_elan: "Продемонстрировать боевой порыв"
 GXC_demonstrate_battlefield_elan_desc: "Хотя весь Китай был втянут в войну на протяжении последнего поколения, все знают, что офицеры Лянгуана — первоклассные! Мы не можем выиграть эту войну только числом и бездумными лобовыми атаками, как могут левые, но благодаря гению наших генералов и изобретательности наших офицеров мы можем одержать победу. Центральная армия может хвастаться своим блестящим новым оружием, но они не могут сравниться с нашим мастерством!"

 GXC_harness_nationalist_zeal: "Использовать националистический пыл"
 GXC_harness_nationalist_zeal_desc: "Социалисты поклоняются Марксу и материализму и убедили себя, что храбрые революционные простолюдины, которые пожертвовали стольким ради нашего дела, делают то же самое. Но правда в том, что эти мужественные мужчины и женщины сражались за нечто гораздо большее и более нематериальное: идею свободного, единого Китая! Китайский народ не потерпит марионеток Парижа, и мы изгоним последнего захватчика с нашей земли!"

 GXC_the_spirit_of_the_steel_army: "Дух Железной армии"
 GXC_the_spirit_of_the_steel_army_desc: "Седьмая армия взяла на себя инициативу во время осады Учана в ходе первого Северного похода, и хотя в конечном итоге она преуспела в разгроме войск Чжили, они вели невероятные арьергардные бои во время Великого похода. В этом Третьем Северном походе мы продолжаем тот же необычайный дух — тот, что создал эту революцию! Молниеносной кампанией мы погоним наших врагов далеко за Ухань!"

 GXC_the_cantonese_perimeter: "Кантонский периметр"
 GXC_the_cantonese_perimeter_desc: "В конце концов, похоже, что наши усилия начали буксовать. К этому моменту у нас мало выбора — мы мобилизуем все ресурсы для одной последней серии сражений, которые положат конец войне, так или иначе. Возможно, это будет грандиозное всеобщее наступление, возможно, это будет упорство в жестокой осаде, пока не придет помощь извне. В любом случае, победим мы или проиграем, пусть история навсегда запомнит нашу славу!"

##LKMT Phase III Focuses
 GXC_a_red_liangguang: "Красный Лянгуан"
 GXC_a_red_liangguang_desc: "Революция вернулась в Гуандун после короткого, но досадного перерыва. Хоть и приглушенное суровыми реалиями реакционного угнетения, пламя Китайской революции никогда не может быть погашено! Тем не менее, предстоит многое сделать, если мы хотим предотвратить повторение 1926 года, и еще больше, если мы хотим удержать революцию на правильном курсе..."

 GXC_invite_mmic_advisors: "Пригласить советников МВМК"
 GXC_invite_mmic_advisors_desc: "Солдаты, авантюристы и шпионы из Третьего Интернационала были отправлены для помощи в развитии Первого Северного похода, и теперь вернулись в Китай с возвращением Национального революционного правительства. Чтобы должным образом обучить наших офицеров и солдат как военному, так и политическому образованию, давайте пригласим отряд советников МВМК для помощи в возрожденной революции Лянгуана."

 GXC_rally_the_intellegentsia: "Сплотить интеллигенцию"
 GXC_rally_the_intellegentsia_desc: "Сунь Фо и его так называемая Фракция реконструкции могут придерживаться идеалов, которые являются более подрывными по отношению к делу социализма и освобождения Китая от истинного неравенства, но тем не менее их преданность защите принципов демократии Сунь Ятсена — это то, что мы должны консолидировать в рамках официального единого фронта. Мы должны протянуть руку мелкой буржуазии, чтобы скоординировать истинный единый фронт против милитаризма."

 GXC_escalate_rent_reduction_campaigns: "Активизировать кампании по снижению арендной платы"
 GXC_escalate_rent_reduction_campaigns_desc: "В рамках приверженности социальной революции, первоначальное националистическое руководство начало сокращать власть шэньши и привлекать больше власти к массам. Поскольку сельские массы имеют решающее значение для успеха Националистической революции, мы должны стремиться заручиться их поддержкой путем усиления кампаний по снижению арендной платы, хотя фракции внутри правительства спорят о том, достигать ли этого силой или принуждением."

 GXC_reestablish_the_pmti: "Восстановить ИКПД"
 GXC_reestablish_the_pmti_desc: "Институт подготовки крестьянского движения, или ИКПД, был создан как один из результатов первого Единого фронта между Гоминьданом и Лигой китайских синдикалистов. Идея института заключалась в том, чтобы пригласить полных надежд революционных лидеров помочь прийти и обучить сельские массы и подготовить их к национальной революции. Давайте попытаемся восстановить этот институт, чтобы увеличить поддержку нашей партии в массах."

 GXC_the_third_all_china_trade_union_congress: "Третий национальный конгресс труда"
 GXC_the_third_all_china_trade_union_congress_desc: "Второй национальный конгресс труда был проведен в Гуандуне в 1925 году и помог организовать забастовку Гонконг-Кантон, и более того, деятельность профсоюзов активно преследовалась при предыдущем режиме. С возвращением левого руководства в революционный Гуандун от синдикалистов и других коммунистов поступили призывы потребовать проведения Третьего всенационального конгресса труда, чтобы диктовать истинную рабочую революцию в городах."

 GXC_follow_the_haifeng_commune_model: "Следовать модели коммуны Хайфэн"
 GXC_follow_the_haifeng_commune_model_desc: "Это фундаментальная истина, что революция, описанная такими революционерами, как покойный доктор Сунь Ятсен, — это революция, за которую должен бороться и которую должен возглавлять авангард китайского крестьянства. Давайте последуем примеру товарища Пэн Пая в коммуне Хайфэн, чтобы создать аналогичные крестьянские ассоциации и коммуны по всему Лянгуану, чтобы подготовить страну к социальной и национальной революции."

 GXC_bolster_the_nanjing_government: "Укрепить Нанкинское правительство"
 GXC_bolster_the_nanjing_government_desc: "Успех восстания Миньгань Сунь Цинлин и возвращение Центрального комитета Гоминьдана под руководством Ван Цзинвэя воссоздали во второй раз Национальное революционное правительство, призванное реализовать идеалы доктора Суня раз и навсегда. Поскольку нация все еще остается разъединенной, мы также должны помочь укрепить их ряды и усилить революционное дело, чтобы гарантировать, что оно не потерпит неудачу снова."

 GXC_sound_heart_sound_mind_sound_body: "Здоровое сердце! Здоровый дух! Здоровое тело!"
 GXC_sound_heart_sound_mind_sound_body_desc: "Вдохновленная американской Y.M.C.A., национальная и социальная революция направлена на исправление болезней и недугов, терзающих китайский народ. Новое правительство в Лянгуане предприняло усилия по обузданию социальных излишеств, таких как курение опиума, а также по продвижению физической активности, такой как тщательная санитария окружающей среды, прыжки, баскетбол и теннис, чтобы улучшить общую силу революционеров Лянгуана."

 GXC_living_newspapers: "Живые газеты"
 GXC_living_newspapers_desc: "Чтобы продемонстрировать революционную борьбу массам, нужно обращаться не к печати и СМИ, а скорее к политическим лекциям и драматическим труппам. Эти пьесы и театральные представления должны демонстрировать военные, политические, экономические и социальные проблемы, которые национальная революция призвана решить, и отвечать на вопросы и сомнения крестьянства в юмористической и понятной форме."

 GXC_reorganise_new_fourth_army: "Реорганизовать Новую 4-ю армию"
 GXC_reorganise_new_fourth_army_desc: "Сформированная из остатков 10-й дивизии, реорганизованная Новая 4-я армия под командованием генерала Чэнь Миншу смогла обезопасить провинцию от реакционной фракции Чэнь Цзитана и олигархов кантонской военной хунты. Тем не менее, мы должны стремиться восстановить разорванные связи с некоторыми генералами, которые выразили готовность и желание служить в наших рядах, чтобы присоединиться к борьбе за Китай."

 GXC_the_pupils_of_ma_the_big_beard: "Ученики Ма Большебородого"
 GXC_the_pupils_of_ma_the_big_beard_desc: "Для каждой роты и полка существует клуб Ленина или Маркса для повышения политической сознательности. Маркс, прозванный солдатами «Ма Большебородый», заслужил ласковое благоговение революционных масс. Мы должны гарантировать, что солдаты и рабочие политически грамотны и обучены тому, что методы и средства Маркса, безусловно, являются единственным способом, с помощью которого Китай может по-настоящему постичь идеальный великий датун социализма."

 GXC_rally_hk_labour_contacts: "Сплотить рабочие контакты Гонконга"
 GXC_rally_hk_labour_contacts_desc: "Из-за своей близости к материковому Китаю Гонконг долгое время был центром политических изгнанников, однако статус полуострова как колонии империалистических держав привел к тому, что Гонконг стал одним из величайших оплотов рабоче-крестьянских революций. Закрепившись в Лянгуане, мы должны стремиться укрепить связи с нашими товарищами по ту сторону границы и работать над полным объединением нашей страны."

 GXC_form_southwest_political_council: "Сформировать Юго-западный политический совет"
 GXC_form_southwest_political_council_desc: "Несмотря на наше признание власти Нанкина, именно здесь, в Гуанчжоу, началась национальная революция, и именно объединенная сила Гуанси и Гуандуна делает Лянгуан одним из сильнейших китайских политических государств в этот фрагментированный период милитаризма. Наш долг — использовать нашу военную и экономическую мощь, чтобы попытаться объединить остальную часть страны под знаменем Гоминьдана."

##NPA Satellite Phase III Focuses
 GXC_the_south_submits: "Юг подчиняется"
 GXC_the_south_submits_desc: "Вполне естественно, что в карусели Центральных правительств и национальных претендентов клики Гуанси и Гуандуна сделали выбор в пользу сильнейшей лошади в гонке. Из соображений ожидания наилучшей возможности или игры на сильных сторонах своего регионалистского статуса, вместо того чтобы маршировать из Кантона в Пекин, произошло обратное. Запросив подчинение в обмен на автономию, Юг был приведен под Север, пока что."

 GXC_star_of_guangdong: "Звезда Гуандуна"
 GXC_star_of_guangdong_desc: "Одноименная «Жемчужина дельты реки», Кантон долгое время был мегаполисом на Юго-западе. Несметные богатства текут через город, путешествуя до самой Северной столицы с товарами из Европы и других мест. Хотя Эра милитаристов, безусловно, не была доброй к городу — в нем размещались многочисленные правительства и оккупации — он по-прежнему сопоставим с Шанхаем, Гонконгом или Тяньцзинем по своему статусу. Давайте развивать это дальше."

 GXC_fostering_a_chinese_middle_class: "Воспитание китайского среднего класса"
 GXC_fostering_a_chinese_middle_class_desc: "Относительно немногие городские промышленные центры Китая стали свидетелями большого прорыва в расцветающем среднем классе: интеллектуалы, ученые, писатели, банкиры, бизнесмены. Патриции предпринимательства и культуры, которые в последние годы сместили Эру милитаристов в менее милитаристское русло. Гуандун, в частности, благословлен, как и Гуанси, сильной промышленной базой; давайте используем эти сильные стороны для дальнейшего развития экономики."

 GXC_a_piece_in_chinese_unification: "Фигура в китайском объединении"
 GXC_a_piece_in_chinese_unification_desc: "Наиболее благоприятно, что Гуанси и Гуандун — всего лишь фигуры на шахматной доске китайского объединения. Было бы совершенно неуместно претендовать на что-то большее, по крайней мере, на данный момент. Именно Пять рас в Едином союзе провозгласили новую эру китайского процветания, и ни Колодезные поля, ни Белое солнце, ни Восходящее солнце не могут затмить его светлое будущее. Поддерживая наших союзников, мы должны полностью поддерживать объединение любой ценой."

 GXC_establishing_our_own_domain: "Создание нашего собственного домена"
 GXC_establishing_our_own_domain_desc: "Как справедливая и должная награда за нашу службу, должно быть совершенно естественно, что ведущие провинции Юго-запада управляют им в совокупности, не так ли? Гуандун долгое время был резиденцией многих южных правительств, и хотя мы якобы лояльны нашим союзникам ради их великой пользы, это лишь неизбежное качество, что Лянгуан утверждает себя на Юго-западе."

 GXC_funding_the_gui_jun_accelerated_school: "Финансирование Ускоренной школы Гуй Цзюнь"
 GXC_funding_the_gui_jun_accelerated_school_desc: "Преемница Начальной военной школы Гуанси, Ускоренная школа армии Гуанси отличалась строгой учебной программой, похожей на Военную академию Куньмина. Престижное учреждение, оно обучало Ли Цзунжэня, Ли Пиньсяня, Хуан Шаохуна и Ся Вэя. В сочетании с Офицерским институтом Наньнина, Ускоренная школа дала некоторых из лучших солдат Гуанси; и ее нынешнее состояние ветхости, несомненно, является большим позором. Давайте исправим это положение."

 GXC_on_the_merits_of_federalism_and_centralism: "О достоинствах «федерализма» и централизма"
 GXC_on_the_merits_of_federalism_and_centralism_desc: "Проверенная временем дуэль между сторонниками местной автономии и централизованного правления, дебаты о федерализме и централизме эхом отзываются в залах Китая с 1920-х годов. Хотя номинально Конституция Цао Куня и ее поправка 1928 года предусматривали федеральную конституцию, на практике страна едва ли управляется этой бумагой вообще. Поскольку во многих городах Лянгуана много федералистов, возможно, пришло время сделать им предложения?"

 GXC_annulling_the_mistakes_of_the_past: "Аннулирование ошибок прошлого"
 GXC_annulling_the_mistakes_of_the_past_desc: "Великое несчастье — быть китайским крестьянином; обычно неграмотным или иным образом далеким от государства, они обязаны большей лояльностью своему местному помещику и терпят за это великую несправедливость. Хотя Лу Жунтин и не мог по-настоящему проявить себя, он всегда был человеком скромного происхождения, и поэтому он смотрел на крестьянство с общих позиций. Пусть провинциальные правительства работают над тем, чтобы поднять тружеников, настолько, чтобы они улучшили свою участь в пределах, установленных шэньши."

 GXC_approaching_the_ivory_tower: "Приближение к башне из слоновой кости"
 GXC_approaching_the_ivory_tower_desc: "Гуанчжоу стал настоящим убежищем для интеллектуалов всех мастей, хотя над всеми ними возвышается присутствие Чжан Цзюньмая, Чжан Дунсуня, Чжан Цзяао и остальной части Общества национального возрождения. В контакте с Китайской конституционной партией к ним присоединяются другие интеллектуальные клики, такие как «Политическая наука». Готовые прислушаться к голосу разума, возможно, пришло время Торговцам и Милитаристам объединиться с интеллектуалами ради лучшего будущего."

 GXC_yues_dark_underbelly: "Темное подбрюшье Юэ"
 GXC_yues_dark_underbelly_desc: "Довольно недавнее развитие, по крайней мере, по сравнению с Зелеными бандами Чжэцзяна и Цзянсу, гонконгские Триады вонзили свои зубы в гниющее подполье городских лабиринтов Гуандуна. От Макао до Гуанчжоу и обратно в Гонконг, они, похоже, не обращают внимания на законность, совершая что угодно от убийств до похищений людей. Однако они очень влиятельны, если их можно контролировать, и, возможно, они поддаются подчинению."

###- Phase IV Focuses -###

#KMT Econ-Poliitcal Branch
 GXC_begin_national_reconstruction: "Начать Национальную реконструкцию"
 GXC_begin_national_reconstruction_desc: "С истинным возвращением надлежащего правительства на материковый Китай мы должны позаботиться о том, чтобы разрушения, нанесенные конфликтом и милитаристами, были быстро устранены. С этой целью мы создадим Комиссию по национальной реконструкции и будем курировать недавно названную 6-летнюю программу материальной реконструкции, чтобы снова вернуть процветание Китаю."

 GXC_national_capitalism: "Национальный капитализм"
 GXC_national_capitalism_desc: "В качестве нового шага для нашего революционного правительства Центральный комитет стремился внедрить состояние «национального капитализма». В котором чиновники работают над внедрением институтов социального обеспечения, уравнивания земли и регулирования капитала, и все это с конечной целью подготовки Китая к возможной общественной собственности на национальное богатство. С этим наши совместные экономические усилия правительства и народа наконец приведут к гун-ю (общественному благосостоянию)."

 GXC_establish_ministry_of_railways: "Создать Министерство железных дорог"
 GXC_establish_ministry_of_railways_desc: "Как показали примеры доктора Сунь Ятсена и его сына Сунь Фо, одним из главных скачков, достигнутых вестернизированными странами в современную эпоху, являются великие инфраструктурные проекты и железные дороги, идущие вместе с ними. С созданием Министерства железных дорог мы можем в значительной степени принести будущее в центр и глубинку Китая, ибо железные дороги всегда приносят процветание."

 GXC_mastery_over_nature: "Власть над природой"
 GXC_mastery_over_nature_desc: "Благодаря расширению правительственной власти и влияния мы можем наконец распространить такой контроль и на землю. С новыми сельскохозяйственными проектами, контролем рек, созданием реестра земельных владений, наряду с внедрением централизованной национальной системы мер и весов, сельское хозяйство Китая будет в конечном итоге модернизировано. Новые удобрения, хлопок и технологии для новой власти над природой."

 GXC_develop_social_wealth: "Развитие общественного богатства"
 GXC_develop_social_wealth_desc: "Наш народ сильно страдает. Бедность находится на критическом уровне, и существует отчаянная необходимость снова создать общественное богатство. Посредством совместного государственно-частного контролируемого транспорта для массового распределения, наряду с централизацией «работы по социальной помощи» в различных государственных учреждениях на централизованном, провинциальном, муниципальном и уездном уровнях, мы приложим единые усилия, чтобы искоренить бедность раз и навсегда."

 GXC_develop_the_heavy_industry_sector: "Развитие сектора тяжелой промышленности"
 GXC_develop_the_heavy_industry_sector_desc: "Тяжелая промышленность — это жизненная сила любой индустриальной нации. Если мы хотим занять свое законное место на мировой арене, мы должны вкладывать значительные средства в нашу тяжелую промышленность и увеличивать производство этих необходимых материалов, чтобы по-настоящему модернизировать нашу экономику."

 GXC_distribute_the_means_of_production: "Распределить средства производства"
 GXC_distribute_the_means_of_production_desc: "В то время как интересы рабочих и бизнеса традиционно сталкивались, пришло время, чтобы они работали в унисон, чтобы служить интересам марша нашей нации в современность. Партия позаботится о том, чтобы рабочие пользовались 8-часовым рабочим днем западных стран, дети больше не работали, а вместо этого сосредоточились на образовании, будут установлены сроки уведомления и будет введено участие в прибылях. При этом разрушительная классовая война уступит место гармоничному обществу."

 GXC_establish_the_academia_sinica: "Создать Академиа Синика"
 GXC_establish_the_academia_sinica_desc: "Если Гоминьдан хочет вести Китай в новую эру прогресса, китайский народ должен иметь доступ ко всем знаниям, которые только можно узнать. Академиа Синика (Китайская академия) будет национальной академией, которая будет преподавать в областях математики, физических наук, гуманитарных и социальных наук. Образование — это то, что делает нацию великой, и лучшие и ярчайшие умы Китая приведут нас в новую эпоху беспрецедентного процветания и инноваций!"

 GXC_light_the_torch_of_the_future: "Зажечь факел будущего"
 GXC_light_the_torch_of_the_future_desc: "В погоне за общим процветанием все население будет освобождено от оков бедности и неграмотности. Реакционные буржуазные элементы Бэйянской армии и их дружки-федералисты смогли установить свою несправедливую диктатуру из-за неграмотности масс и оков феодализма. Националистическое правительство исправит это с помощью массовых кампаний по ликвидации неграмотности в сельской местности в наших наименее развитых регионах."

 GXC_embrace_autarky: "Принять автаркию"
 GXC_embrace_autarky_desc: "Столетие унижения началось с того, что Китай был вынужден открыть торговлю с империалистическими державами. Если мы хотим отменить это Столетие, мы должны ударить по его корням, поэтому мы примем политику автаркии, чтобы империалисты больше не могли эксплуатировать Китай ради собственной выгоды."

 GXC_expand_special_economic_zones: "Расширить особые экономические зоны"
 GXC_expand_special_economic_zones_desc: "В нашей конечной цели формирования национального капитализма на пути к истинному социальному равенству партия решила создать ряд особых экономических зон вдоль береговой линии в важнейших городах, обеспечивая рост рынков, валюты и, в конечном счете, нашей экономики. Хотя это может изображать зависимость от мировой торговли, в конечном итоге это приведет к самообеспечению китайского народа."
 GXC_expand_special_economic_zones_tooltip: "§YЭтот фокус добавит зоны Новой экономической политики в Нанкине, Пекине, Ханчжоу и Сямэне, если мы или наш субъект контролируем эти регионы.§!"
 GXC_expand_special_economic_zones_helpful_tooltip: "§YЭтот фокус добавит зоны Новой экономической политики в Наньтуне и Тяньцзине, если мы или наш субъект контролируем эти регионы.§!"

#KMT Political Branch
 GXC_cementing_dangguo: "Укрепление Даньго"
 GXC_cementing_dangguo_desc: "Обеспечив наш плацдарм и при желании нашего правительства, мы можем, наконец, работать над обеспечением Даньго, или Партийного государства, и вместе с ним гарантировать, что Национальная революция, как она была изложена доктором Сунь Ятсеном, будет соблюдаться в максимальной степени и в ее самой ортодоксальной интерпретации. Укрепление Партийного государства и Опеки обеспечит защиту не только народа, но и нашей демократии."

 GXC_fostering_national_consciousness: "Воспитание национального самосознания"
 GXC_fostering_national_consciousness_desc: "Хотя мы можем контролировать обширные участки территории, многие граждане на нашей территории недостаточно политически сознательны или активны, чтобы участвовать в Национальной революции. С этой целью мы должны развивать и воспитывать зарождающееся национальное самосознание, ибо Гоминьдан должен вести народ к высшему проявлению его участия в управлении: демократии."

 GXC_harness_youthful_vigor: "Использовать юношескую энергию"
 GXC_harness_youthful_vigor_desc: "Китайская молодежь радикальна и готова к действию. Пережив годы эксплуатации геронтократическими бюрократами, жестокими милитаристами и злыми шэньши, кто мы такие, чтобы и дальше гасить юношескую энергию? Гоминьдан будет работать, чтобы использовать их дух, ибо они — будущие поколения, для которых создается Национальная революция!"

 GXC_the_revolutionary_woman: "Революционная женщина"
 GXC_the_revolutionary_woman_desc: "Хотя мы добились больших успехов в более широком экономическом, социальном и политическом уравнивании, мы не можем позволить нашим женщинам-товарищам отойти на второй план в марше Национальной революции. Пусть партия сотрудничает с различными феминистскими движениями для содействия их глобальной борьбе за чистое гендерное равенство. Гоминьдан должен принести освобождение для всех, независимо от пола."

 GXC_reactionary_dissent: "Подавить реакционное инакомыслие"
 GXC_reactionary_dissent_desc: "В конечном итоге наш контроль над Нацией не так решителен и конкретен, как хотелось бы партии. С местными милитаристами, бандитами и диссидентами, бродящими по нашей земле, мы должны действовать быстро, чтобы изгнать эти язвы нашего правления. С созданием Бюро общественной безопасности мы можем обеспечить контроль Партийного государства, не кланяясь никому, кроме воли народа."

 GXC_the_dawn_of_a_new_era: "Рассвет новой эры"
 GXC_the_dawn_of_a_new_era_desc: "Позаботившись о том, чтобы за Северный поход отомстили, мы наконец увидели завершение последнего начинания доктора Суня и Чан Кайши. Под его самыми принципиальными и ортодоксальными учениками и с помощью всего щита Гоминьдана и народа мы обеспечили Национальную революцию на десятилетия вперед. Для китайского народа наступила Новая эра!"

 GXC_establish_a_provisional_legislature: "Создать Временный законодательный орган"
 GXC_establish_a_provisional_legislature_desc: "После нашего восстановления в Пекине и Нанкине, наконец, необходимо создать правительственный орган, способный управлять всеми разрозненными провинциями под нашим правлением. Таким актом мы можем заверить народ Китая в нашей искренней доброй воле, поскольку мы не просто новый милитарист, а нечто действительно большее."

 GXC_expand_civil_service: "Расширить государственную службу"
 GXC_expand_civil_service_desc: "При контроле Гоминьдана на его историческом зените наша бюрократия и государственная служба оказываются исключительно недостаточными для полного удовлетворения требований правительства и государства. В конечном счете, по необходимости мы должны выделить ресурсы на расширение возможностей нашей государственной службы, чтобы обеспечить справедливое, равноправное и эффективное управление новыми провинциями."

 GXC_complete_the_revolutionary_mission: "Завершить революционную миссию"
 GXC_complete_the_revolutionary_mission_desc: "С окончательным объединением нации мы наконец увидели конец грандиозной революционной миссии, переданной нам доктором Сунем. С душой Синьхая, наконец упокоившейся, мы позаботились о том, чтобы из углей 1911 года возникла настоящая революция. Трубы Третьего национального конгресса ждут, и кому еще провозглашать его, как не исключительному Ху Ханьминю?"

###- Phase IV Socialist GXC -###
 GXC_fallout_of_the_baise_uprising: "Последствия восстания в Байсэ"
 GXC_fallout_of_the_baise_uprising_desc: "Это наконец случилось. Блестящим и быстрым ходом рабочие и крестьяне объединились в революционный авангард и изгнали реакционного милитариста Ли Цзунжэня и его контрреволюционных прихвостней из Новой клики Гуанси из Лянгуана раз и навсегда. Однако в хаосе и последовавшей политической борьбе в Лянгуане появился новый претендент... достаточно сильный, чтобы бросить вызов, возможно, легитимности Нанкина."

 GXC_in_the_dark_of_the_night: "Во тьме ночи"
 GXC_in_the_dark_of_the_night_desc: "Истинная, чистая революция требует силы и дисциплины, чтобы обеспечить успех божественной миссии, возложенной на нас. Дерзко, что в это время великой гражданской борьбы мы вкладываем наши ресурсы в «особые методы» и службы в надежде собрать ценные разведданные и посеять безжалостный террор, чтобы революция не дрогнула перед лицом реакционеров."

 GXC_the_allure_of_totalism: "Очарование тотализма"
 GXC_the_allure_of_totalism_desc: "В наших рядах есть более радикальные участники национальной революции, которые заявляют, что следуют крайней форме социализма, требуя, чтобы мы повернули курс революции к чему-то похожему на Национальный популизм Муссолини или даже Савинкова. Хотя их голоса могут быть в меньшинстве, мало кто может отрицать, что если революция должна быть обеспечена, глупые мечты вроде демократии и либерализма должны подождать до освобождения."

 GXC_expand_the_national_sun_yat_sen_university: "Расширить Национальный университет Сунь Ятсена"
 GXC_expand_the_national_sun_yat_sen_university_desc: "Национальный университет Сунь Ятсена был назван в честь любимого вечного премьера китайского Гоминьдана, и он продолжает удерживать свои позиции как вершина академического мастерства в Гуандуне. Чтобы воспитать большее национальное самосознание среди интеллектуалов и студентов, мы должны стремиться расширить учебную программу университета, включив в нее изучение марксизма и социализма."

 GXC_assert_authority_over_guangxi: "Утвердить власть над Гуанси"
 GXC_assert_authority_over_guangxi_desc: "Наконец-то мы отогнали реакционного милитариста Ли Цзунжэня и его презренных приспешников из Новой клики Гуанси далеко от колыбели революции. Это был лишь вопрос времени, когда наши силы одержат победу над реакционной фракцией в Лянгуане. Тем не менее, мы должны подготовить усилия по умиротворению и стабилизации провинции Гуанси, чтобы заслужить доверие и поддержку сельских масс в регионе."

 GXC_initiate_pioneer_reforms: "Начать пионерские реформы"
 GXC_initiate_pioneer_reforms_desc: "В соответствии с целями теорий Сунь Ятсена о достижении демократии мы должны сделать первые шаги к организации демократии в массах. Давайте поощрять не только союзы, но и сельскохозяйственные кооперативы и ассоциации фермеров практиковать местную демократию, включать как мужчин, так и женщин, и организовывать представительные советы, которые позволили бы массам быть услышанными от имени своих союзов и кооперативов."

 GXC_launch_the_liangguang_cics: "Запуск лянгуанских промкооперативов"
 GXC_launch_the_liangguang_cics_desc: "Запущенная Национальным революционным правительством в бывшей Лиге восьми провинций, программа Китайских промышленных кооперативов (Гунхэ) направлена на создание промышленных кооперативов для рабочих и служащих для поиска работы, а также для помощи в национальной обороне и реконструкции. Вдохновленное успехами программ Нанкина, наше правительство стремилось создать промкооперативы в Лянгуане, чтобы укрепить нашу экономику."

 GXC_our_revolutionary_sisters: "Наши революционные сестры"
 GXC_our_revolutionary_sisters_desc: "Женщины действительно держат половину неба. Поскольку Национальная революция нацелена на освобождение всех китайцев от цепей империализма, крайне важно, чтобы мы занялись положением наших сестер и матерей, которые также желают освобождения не только от империализма и капитализма, но и от цепей патриархата. Мы должны стремиться отменить такие декадентские практики, как бинтование ног и детские браки, чтобы обеспечить истинное освобождение женщин."

 GXC_consolidate_the_unions: "Консолидация союзов"
 GXC_consolidate_the_unions_desc: "Большинство союзов в промышленных и прибрежных городах Китая подпадают под Лигу китайских синдикалистов, и отношения между Гоминьданом и ЛКС напряженные, но взаимовыгодные, поскольку Партия действительно стремится мобилизовать городской пролетариат для работы бок о бок с ней ради национальной революции. Мы должны стремиться реорганизовать союзы под нашим руководством, чтобы укрепить партийное единство и дисциплину."

 GXC_sway_hawaiis_ambivalence: "Поколебать двойственность Гавайев"
 GXC_sway_hawaiis_ambivalence_desc: "Наследный принц и его так называемая Фракция реконструкции не ищут будущего социалистического Китая, но, тем не менее, мы, безусловно, уважаем их приверженность стремлению к конституционализму и демократии, проиллюстрированному покойным вечным премьером. Поскольку правительство Нанкина продолжает раскалываться на различные фракции, возможно, было бы разумно узнать, готовы ли члены Реконструкции работать с нами."

 GXC_reaffirm_the_united_front: "Подтвердить Единый фронт"
 GXC_reaffirm_the_united_front_desc: "Единый фронт между китайским Гоминьданом и Лигой китайских синдикалистов, организованный в 1924 году, был создан для обеспечения поддержки Третьего Интернационала и сплочения революционных масс против коррумпированного империалистического правительства Чжили. Поскольку ситуация в Китае все еще столь же ненадежна, мы должны стремиться работать вместе с нашими товарищами, чтобы снова бороться за свободный Китай."

 GXC_establish_the_rca_guangzhou_branch: "Создать отделение АТР в Гуанчжоу"
 GXC_establish_the_rca_guangzhou_branch_desc: "Пока фракции в Нанкине ссорятся из-за своих разногласий, возможно, мы найдем смысл в том, чтобы обратиться к Чэнь Гунбо и его Ассоциации товарищей по реорганизации. Долгое время связанный с политикой Гуандуна, Чэнь и его приспешники из АТР обладают значительной степенью поддержки среди рабочих и студентов, и мы можем укрепить их дело, открыв отделение ячеек АТР в Гуанчжоу."

 GXC_connections_within_the_WMARCA: "Связи внутри Временного комитета действий"
 GXC_connections_within_the_WMARCA_desc: "Настоящая революция принадлежит народу, а народ смотрит не дальше харизматичного генерала Дэн Яньда. Долгое время знакомый с политикой военных Гуандуна, влияние Дэна в Лянгуане повсеместно, и многие офицеры в НРА лояльны его ВКД. Поскольку многие наши братья долго сражались и проливали кровь с генералом Дэном, мы должны стремиться использовать эти связи для развития нашего собственного влияния."

 GXC_challenging_the_central_committee: "Бросая вызов Центральному комитету"
 GXC_challenging_the_central_committee_desc: "Центральный комитет берет и берет у народа, но дает так мало взамен. Ни свободы, ни еды, ни защиты от милитаристов и империалистов. Даже надежды. Только бесконечный марш к тирании, тому самому, против чего мы, храбрые революционеры, восстали в первую очередь. Мы все знаем, к чему это идет — лучше мы подготовимся к вероятной конфронтации сейчас, чем сдадимся судьбе."

 GXC_taking_the_reins: "Беря бразды правления"
 GXC_taking_the_reins_desc: "Так или иначе, мы свергли старый Центральный исполнительный комитет. Больше двуличный Ван Цзинвэй не будет распространять ложь китайскому народу, больше интриганка Сунь Цинлин и властный Дэн Яньда не будут выкрикивать предательские контрприказы. Теперь, после кончины старого Гоминьдана, мы должны оказаться на высоте и освободить народ от рабства. Только под нашим справедливым правлением мы можем гарантировать правильное применение революционных принципов."

 GXC_lkmt_the_kuomintang_civil_war: "Гражданская война в Гоминьдане"
 GXC_lkmt_the_kuomintang_civil_war_desc: "Наконец настало время для настоящей национальной и социальной революции. Дегенеративные партийные элементы в Нанкине пали до интересов контрреволюционеров, буржуазии, милитаристов и предателей-империалистов. Поскольку судьба революции покойного доктора Суня в опасности, пришло время нам восстать и сражаться — сплотить народ Китая за истинный новый Китай."

 GXC_rally_the_red_guards: "Сплотить Красную гвардию"
 GXC_rally_the_red_guards_desc: "Красная гвардия Гуанчжоу была создана Центральным комитетом Китайской синдикалистской партии для защиты рабочих и моряков Гуанчжоу с целью борьбы с правой контрреволюционной деятельностью, особенно со стороны Торгового корпуса. С гражданской войной против Нанкина в полном разгаре мы должны мобилизовать эти отряды для подготовки к обороне города Гуанчжоу."

 GXC_meritocracy_on_the_battlefield: "Меритократия на поле боя"
 GXC_meritocracy_on_the_battlefield_desc: "Революционная армия Лянгуана гордится не элитарной дискриминацией или коррумпированной некомпетентностью, а лучшими революционными офицерами во всем Китае — мужчинами и женщинами, которые готовы принести столько жертв, сколько потребуется, чтобы спасти Китай от разрушения. Поскольку мы значительно уступаем в численности в этом конфликте, мы увеличим количество офицеров на передовой за счет серии быстрых повышений."

 GXC_mobilise_guerrila_detachments: "Мобилизовать партизанские отряды"
 GXC_mobilise_guerrila_detachments_desc: "Хотя мы значительно уступаем численно превосходящей НРА Нанкина, все еще есть способы, которыми народ может сражаться. Достаточно винтовки, чтобы сплотить народ на войну за национальное освобождение. Мы должны сплотить партизан из крестьянских ассоциаций, которые давно привыкли к партизанской тактике, чтобы они присоединились к нам в великой пролетарской революции Китая."

 GXC_encirclement_and_annihilation: "Окружение и уничтожение"
 GXC_encirclement_and_annihilation_desc: "Против большей военной силы мы должны стремиться перехватить инициативу и использовать скорость и местность в свою пользу. Благодаря нашему исключительному знанию местности и географии мы можем найти слабые места врага на их линии фронта. Мы сосредоточим нашу доктрину на окружении врага, а затем уничтожении этих котлов со скоростью и грубой силой, что позволит нам массово захватывать вражеских пленных и снаряжение."

 GXC_the_peoples_war: "Народная война"
 GXC_the_peoples_war_desc: "Война за национальное освобождение призывает не только солдат Национально-революционной армии, но и женщин и всех трудоспособных людей сражаться за свободу Китая против капитализма и империализма. Будь то прямые партизанские действия, такие как саботаж и засады, или подрывная деятельность для раскрытия вражеской разведки, пусть все, кто ищет истинной свободы, присоединятся к нашему праведному делу против Нанкина."

 GXC_keep_the_red_flag_flying: "Пусть развевается Красный флаг!"
 GXC_keep_the_red_flag_flying_desc: "С самого начала шансы в войне были против нас просто из-за численности и экономической мощи Центрального правительства. Тем не менее, именно волей народа выигрываются революции, и ясно, что Нанкин больше не может представлять Национальную и Социальную революцию. Если мы потерпим неудачу в наших усилиях, мечты о социализме в Китае никогда не будут по-настоящему реализованы."

#UPC Phase IV Focus Tree
 GXC_the_national_unity_cabinet: "Кабинет национального единства"
 GXC_the_national_unity_cabinet_desc: "Чтобы пройти трудный путь впереди, великие партии нашей молодой Республики сформировали правительство национального единства, объединившись еще раз для защиты нашего федералистского будущего. Хотя члены кабинета якобы выбираются исключительно по заслугам, на практике доминируют ВРА и ДЛК. Тем не менее, это шаг вперед — но им предстоит еще много пройти, прежде чем они смогут по-настоящему спасти свою нацию."

 GXC_a_five_year_plan_for_china: "Пятилетний план для Китая"
 GXC_a_five_year_plan_for_china_desc: "После избрания первого парламента единого Китая ДСП настаивает на том, чтобы они собрались вместе для разработки и реализации Пятилетнего плана, который должен быть неизменным независимо от любых изменений в правительстве. Единая, эффективная и стабильная, эта политическая система стремится сбалансировать необходимость свободных дебатов с решительными действиями. Как только план будет обнародован, пути назад не будет."

 GXC_promoting_an_intellectual_revival: "Продвижение интеллектуального возрождения"
 GXC_promoting_an_intellectual_revival_desc: "Чтобы Китай действительно вернулся на свое традиционное место Великой державы Востока и чтобы Китай достиг своего демократического будущего, Чжан Цзюньмай и ДЛК считают, что должно произойти культурное возрождение, возглавляемое китайскими интеллектуалами. Оно должно включать западные технологии и политическую теорию, не отказываясь от сути китайской культуры."

 GXC_cementing_zhangs_grip_over_the_CDL: "Укрепление власти президента Чжана"
 GXC_cementing_zhangs_grip_over_the_CDL_desc: "У Чжан Цзюньмая много противников — в Республике, в ДЛК и в ДСП. Всегда кажется, что идет внутренняя борьба, будь то из-за идеологии, патронажных должностей или просто личных обид. Однако с президентской властью Чжан может наконец утвердить себя как верховного лидера ДЛК, оттеснив оппонентов и реализовав свое видение республики!"

 GXC_bringing_social_democracy_to_china: "Принесение социал-демократии в Китай"
 GXC_bringing_social_democracy_to_china_desc: "Опыт обучения в Германии у интеллектуалов СДПГ глубоко повлиял на политическое мышление Чжан Цзюньмая. Он и многие другие в ДСП находятся на переднем крае импорта европейского реформистского и либертарно-социалистического мышления в Китай, хотя и с китайским уклоном. Некогда маргинальные за пределами интеллектуальных кругов, теперь, когда Чжан у власти, многие готовы взглянуть на это по-новому."

 GXC_nationalising_socialism: "Национализация социализма"
 GXC_nationalising_socialism_desc: "ДСП считает, что национализм и раса являются важнейшими принципами в обществе. Французы смогли выжить самостоятельно, несмотря на отсутствие мировой революции в течение многих лет, благодаря своей способности национализировать свой социализм, и аналогично различные социалистические государства мира существуют как национальные государства, а не принимают чрезмерный интернационализм. Китайский путь к социализму будет аналогичным образом гармонировать с китайским национализмом."

 GXC_a_utopian_vision_for_china: "Утопическое видение Китая"
 GXC_a_utopian_vision_for_china_desc: "«Счастье полного равенства — это не тот вид ложной надежды, что Небеса автоматически благословят каждую душу на земле. Скорее, оно дает человеческому духу возможность для возрождения. Нам нужно великое пробуждение каждого ума, чтобы... человечество могло легко порвать со старой жизнью и старыми институтами. На пути эволюции мир в целом найдет новую жизнь». - Чэнь Цзюнмин, 1919 год."

 GXC_reconnecting_with_the_diaspora: "Восстановление связей с диаспорой"
 GXC_reconnecting_with_the_diaspora_desc: "На фоне нестабильности Эры милитаристов и опасений, что высшие учебные заведения Китая не соответствуют современному миру, многие состоятельные студенты уезжали учиться за границу — часто так и не возвращаясь. Другие семьи покинули родину поколениями ранее в лучшие времена, создавая свои состояния в странах за рубежом, сохраняя при этом свои родовые связи. В любом случае, их навыки и деньги нужны дома сейчас, когда мы восстанавливаемся!"

 GXC_bringing_china_into_the_modern_age: "Приведение Китая в современную эпоху"
 GXC_bringing_china_into_the_modern_age_desc: "Китайская культура всегда ценила образование, но бесконечные потребности армии за последние несколько десятилетий истощили большую часть наших средств на обучение — а вместе с ним и будущее наших детей. Если мы не хотим, чтобы у наших мальчиков и девочек не было ничего впереди, кроме военной службы и нищеты, то нам нужно бороться, чтобы вытащить Китай из упадка!"

 GXC_promoting_a_chinese_renewal: "Продвижение китайского обновления"
 GXC_promoting_a_chinese_renewal_desc: "Модернизация Китая не заканчивается просто строительством новых дорог или улучшением наших школ — чтобы Китай был современным, он должен чувствовать себя современным. Чэнь Цзюнмин всегда присматривался к «Социальному образованию», поощряя искусство, спорт, культуру и социальные науки в Гуандуне. Как президент Китая, он несет этот факел во все уголки страны!"

 GXC_a_strong_hand_in_uneasy_times: "Сильная рука в неспокойные времена"
 GXC_a_strong_hand_in_uneasy_times_desc: "Федеративная Республика была построена под сильным руководством Чэнь Цзюнмина в Гуандуне, и теперь, когда она простирается от Гуанчжоу до Пекина, правительство продолжает вращаться вокруг президента-федералиста. Чэнь будет разрешать споры между великой коалицией в законодательном органе, а его люди обеспечат дальнейшее хорошее управление исполнительной власти."

 GXC_constitutionalist_promises: "Конституционные обещания"
 GXC_constitutionalist_promises_desc: "Краеугольным камнем любой будущей демократии в Китае является обнародование Конституции и всеобщее уважение к ней впоследствии. Мелочи вроде кампаний и голосования могут подождать, пока нация не будет спасена, а конституция не будет разработана. До тех пор уважение к верховенству закона имеет первостепенное значение, от крестьянина до президента."

 GXC_protecting_regional_autonomy: "Защита региональной автономии"
 GXC_protecting_regional_autonomy_desc: "Региональная автономия — это смысл существования Федералистского движения, и ее защита является важнейшей функцией Федерального правительства. Необходимо найти определенный баланс между Армией Юэ (которая сделала так много, чтобы помочь в восстановлении провинциальных правительств) и этими неопытными собраниями. Правильное управление этими отношениями — это то, что стабилизирует наше правление."

 GXC_revising_democracy: "Пересмотр демократии"
 GXC_revising_democracy_desc: "Чжан Цзюньмай однажды сказал: «Немного демократии лучше, чем отсутствие демократии вообще, ибо это немногое накопится и составит многое со временем». Демократия — это идеал, совершенство жизни, а не изначально несовершенный, но работающий способ заниматься политикой. Она будет достигнута только постепенно — действительно, Чжан оценил бы США только на 40/100 даже до гражданской войны. Мы можем позволить себе компромисс, пока мы всегда смотрим вперед."

 GXC_continuing_federalist_reforms: "Продолжение федералистских реформ"
 GXC_continuing_federalist_reforms_desc: "По мере того как наше движение расширяет свой охват на север, крайне важно, чтобы мы продолжали внедрять различные реформы местного самоуправления, которые мы обещали в Гуанчжоу. Реформирование местных судебных органов, назначение новых магистратов и наделение полномочиями местных собраний имеют важное значение для завоевания поддержки региональных шэньши, интеллектуалов и других власть имущих, необходимых нам для стабилизации нашего правительства."

 GXC_modernising_the_federal_police: "Модернизация федеральной полиции"
 GXC_modernising_the_federal_police_desc: "Управление обширным современным национальным государством требует современной полицейской тактики и межпровинциальной координации, чтобы пресекать трансграничные преступления, такие как бандитизм, повстанческое движение или организованная преступность. Наем экспертов из-за рубежа, особенно ветеранов относительно нового американского ФБР, во многом продемонстрирует нашу приверженность современной, профессиональной полиции."

 GXC_promoting_higher_education: "Продвижение высшего образования"
 GXC_promoting_higher_education_desc: "Федералистское движение всегда признавало важность образования людей и молодежи будущего — в конце концов, демократия не может функционировать, если ее население неграмотно. В декабре 1920 года губернатор Чэнь Цзюнмин пригласил Чэнь Дусю из КСП продвигать образовательные реформы и поощрять салоны мысли, провокационные идеи и философское омоложение."

 GXC_enshrining_parliamentarianism: "Закрепление парламентаризма"
 GXC_enshrining_parliamentarianism_desc: "Ключ к функционирующей демократии — это парламент, который управляется народом и возглавляется народом. Именно здесь потерпело неудачу бывшее Бэйянское правительство, разрушив доверие к народному суверенитету. Мы создадим республиканский однопалатный законодательный орган с членами, представляющими сельскохозяйственный, промышленный, коммерческий и образовательный секторы общества, тем самым объединив истинную демократию, управляемую народом."

 GXC_the_national_mobilisation: "Национальная мобилизация"
 GXC_the_national_mobilisation_desc: "Пусть нация объединится, и дух демократии направит органы общества в истинное национальное бытие. После великой гражданской войны мы должны объединить организации для предотвращения контроля цен и накопления запасов, а также для помощи частному бизнесу в стимулировании производства и капитала."

 GXC_aid_to_recovered_areas: "Помощь освобожденным районам"
 GXC_aid_to_recovered_areas_desc: "Части сельской местности страны лежат в руинах после завершения нашей победы над Севером. Чтобы возродить эти районы и создать общественную поддержку и доверие, новое Центральное правительство направит помощь в валюте и переселении тем, кто был перемещен войной."

 GXC_safeguarding_the_peasants: "Защита крестьян"
 GXC_safeguarding_the_peasants_desc: "Новое Федеральное государство будет защищать право крестьян на землю, использование и владение частной собственностью. Однако собственность будет ограничена для борьбы с земельной конкуренцией и принятия предварительных мер по национализации. Работая с крестьянством, мы заслужим их доверие и веру, чтобы они не обратились к более радикальным идеям."

 GXC_protecting_private_property: "Защита частной собственности"
 GXC_protecting_private_property_desc: "Подразумеваемым и неотъемлемым в каждом соглашении является право каждого человека владеть своей собственностью. Чтобы успокоить консерваторов, которые опасаются, что мы можем подчиниться воле крестьянства, будет создана Комиссия по регистрации народной собственности освобожденных районов для защиты первоначальных владельцев земли и арбитража споров для обеспечения надлежащей правовой процедуры и защиты прав собственности."

 GXC_nationalising_vital_resources: "Национализация жизненно важных ресурсов"
 GXC_nationalising_vital_resources_desc: "Демократическая лига Китая настоятельно призывает и подчеркивает, что природные ресурсы и обильные сокровища земли должны использоваться на благо широкой общественности. Больше мы не будем терпеть жадных помещиков или милитаристов, накапливающих эти ресурсы; вместо этого правительство должно национализировать их для обогащения китайской нации."

 GXC_mixed_industrial_planning: "Смешанное промышленное планирование"
 GXC_mixed_industrial_planning_desc: "Китай должен догнать остальной мир. Прошлые несколько десятилетий республиканских неудач и милитаризма способствовали плачевному состоянию нашей национальной экономики, даже если у нас есть потенциал для большой промышленной базы. Производство должно быть увеличено при адекватном планировании как для частных, так и для национальных производственных предприятий. И в государственной, и в частной промышленности рабочие должны иметь право участвовать в управлении или получать консультации."

 GXC_progressive_tax_reforms: "Реформы прогрессивного налогообложения"
 GXC_progressive_tax_reforms_desc: "Должен быть проведен тщательный пересмотр налоговой системы. Мягкие налоги для богатых шэньши и землевладельцев способствовали коррупции, в то время как более высокие налоги не поощряют участников экономики тратить и, таким образом, способствовать экономическому росту. В рамках новых федеральных национальных реформ мы введем прогрессивную систему налогообложения, которая предусмотрит налоги на наследство, доход и сверхприбыль."

 GXC_the_equalisation_of_wealth: "Уравнивание богатства"
 GXC_the_equalisation_of_wealth_desc: "Сама цель Демократической лиги Китая — закрепить равенство и положить конец разрывам, которые порождали неравенство на протяжении веков феодального порядка. Мы добьемся этого не через диктатуру пролетариата, а через экономическую демократию, обеспечение адекватного уровня жизни, экономической безопасности, а также уравнивание богатства и конец неравенства."

 GXC_building_a_national_defense_industry: "Создание национальной оборонной промышленности"
 GXC_building_a_national_defense_industry_desc: "Война против Севера, возможно, выиграна, и Пекин находится в надежных республиканских руках, но враги Китая далеко не побеждены. По всему миру и внутри наших внутренних границ империалистические нации и реакционные силы представляют постоянную угрозу нашему демократическому видению. Под руководством нового Федерального правительства мы вернем бывшие арсеналы под федеральный военный контроль."

 GXC_postwar_economic_reconversion: "Послевоенная экономическая реконверсия"
 GXC_postwar_economic_reconversion_desc: "С окончанием войны в стране пришло время заняться китайской экономикой. Слишком долго промышленность была направлена на закупку стрелкового оружия и артиллерии. Когда конфликт утих, пришло время для возрождения китайской экономики с помощью решительных мер регулирования и национализации, направленных на переориентацию военной промышленности обратно на гражданские цели."

#NPA Phase IV Focus Tree
 GXC_unity_on_our_terms: "Единство на наших условиях"
 GXC_unity_on_our_terms_desc: "Нация была объединена, в какой-то степени, по крайней мере, на условиях, продиктованных теми людьми слова и оружия, у которых есть правильное видение будущего Китая. Сильная нация, богатая и процветающая — вот цель всех людей, размахивающих флагом Пяти рас в Едином союзе, и пока Китай временно шатается под собственным весом, народ может быть уверен, что нация никогда больше не пострадает от несправедливости или судьбы бесславного рабства."

 GXC_following_through_with_philanthropy: "Продолжение филантропии"
 GXC_following_through_with_philanthropy_desc: "Служа финансовым директором Гуандунской ассоциации помощи продовольствием и Гуандунской благотворительной ассоциации помощи, Чэнь Ляньчжун был просто образцовым джентльменом в плане филантропии. Посвящая большие суммы своего личного богатства с огромным энтузиазмом общественному благосостоянию и муниципальным финансам, Ляньчжун установил модель для подражания. Восхваляя его достижения и вознаграждая его службу, мы наверняка увидим больше таких торговцев, как он."

 GXC_reopen_the_guangdong_mint: "Вновь открыть Монетный двор Гуандуна"
 GXC_reopen_the_guangdong_mint_desc: "Монетный двор Гуандуна когда-то был самой ранней фабрикой в Китае, использовавшей машины для отливки серебряных и медных монет. Построенный в 1887 году по предложению Чжан Чжидуна, он был знаком истинного успеха Движения самоусиления Цин. Пережив Синьхайскую революцию, он стал заводом по чеканке монет Китайской Республики в Гуандуне, но, увы, из-за недостатка финансирования он закрылся в 1931 году. Вновь открыв монетный двор, правительство может обеспечить определенный уровень финансовой безопасности."

 GXC_modernising_the_nation_through_rail: "Модернизация нации через железные дороги"
 GXC_modernising_the_nation_through_rail_desc: "Железные дороги — проверенный пример успеха промышленной революции, и при этом внутренние районы Китая остаются относительно неосвоенными. Железные дороги в основном доминируют в центральных и прибрежных районах страны, и даже они представляют собой десятилетней давности громадины, которые плохо обслуживались или были повреждены в боях и войнах. Лин Хунсюнь, местный железнодорожный магнат, заявил о своем намерении соединить города страны, и мы должны только профинансировать его."

 GXC_exporting_the_national_guangxi_model: "Экспорт национальной модели Гуанси"
 GXC_exporting_the_national_guangxi_model_desc: "Популяризированное в Национальном университете Гуанси, созданном Ма Цзюньу и Пань Чжуци, обучение военным навыкам и боевым способностям наряду с культивированием научных знаний и рабочих навыков имело большой успех, и многие выпускники Гуанси прониклись чувством долга перед нацией. Пропаганда Ма «мотыжничества» также предусматривала компенсацию бедным семьям, и мы должны экспортировать его пресловутые методы."

 GXC_engage_in_mass_environmental_projects: "Участие в массовых экологических проектах"
 GXC_engage_in_mass_environmental_projects_desc: "Считающийся региональным героем Гуандуна и известным гурманом, Цзян Кунъинь превратился из простого цзиньши в популярного общественного деятеля, убедив генерал-губернатора Гуандуна и Гуанси выступить против Цин в 1911 году. Уйдя в отставку с тех пор, Цзян провел большую часть своей жизни, инвестируя в развитие экологических проектов. Благодаря национальной кампании, популяризированной его методами, мы снова возродим зелень Китая."

 GXC_initiating_the_agricultural_revolution: "Начало сельскохозяйственной революции"
 GXC_initiating_the_agricultural_revolution_desc: "Будучи своего рода пионером, Дин Ин стал относительно известным именем в сфере сельскохозяйственных исследований за свою революционную работу по выведению различных сортов риса, некоторые из которых смогли достичь тысяч зерен на метелку. Будучи профессором Гуандунского университета, крайне важно, чтобы государство признало его достижения и финансировало их внедрение по всей стране, чтобы подстегнуть новую сельскохозяйственную революцию."

 GXC_favouring_the_banks: "Благосклонность к банкам"
 GXC_favouring_the_banks_desc: "Без банков китайский юань был бы еще более бесполезным, чем он есть сейчас, и без банков весьма вероятно, что никто из чиновников в нынешнем правительстве не занимал бы свои посты, не говоря уже о том, чтобы быть в относительном процветании. Их контракты, выгодные кредиты и гарантированные сделки позволяли провинциальным правительствам держаться на плаву во времена отчаянной нужды, и пришло время, чтобы они получили свое должное вознаграждение."

 GXC_investing_in_the_revitalisation_of_industry: "Инвестиции в возрождение промышленности"
 GXC_investing_in_the_revitalisation_of_industry_desc: "Нация была жестоко окровавлена и избита после десятилетий почти вечных распрей, и все же ее самые богатые чиновники остаются в стороне, сидя на кучах финансов, которые не приносят никакой пользы государству, которое их обеспечило. Через кампанию в СМИ, используя массы как шахматную фигуру, богатых и состоятельных нужно заставить вкладывать свои деньги в различные государственные инвестиционные проекты; это единственно правильно."

 GXC_elevating_the_merchants_of_china: "Возвышение торговцев Китая"
 GXC_elevating_the_merchants_of_china_desc: "Торговцы — это та самая финансовая кровь, благодаря которой китайская торговля и коммерция остаются на плаву, и крайне важно, чтобы они сохранили свою долю пирога. Возможно, учреждение плутократии — это слишком экстремально, но тем не менее они должны иметь весомый голос. Вместе с бизнесменами, банкирами и торговыми палатами Китай в ближайшем будущем переживет собственную финансовую революцию, достойную соперничества с Японией или даже с Европой."

 GXC_establishing_a_nascent_petroleum_industry: "Создание зарождающейся нефтяной промышленности"
 GXC_establishing_a_nascent_petroleum_industry_desc: "Лин Хунсюнь, также отвечающий за огромные объемы железных дорог Китая, начал инвестировать в зарождающийся нефтяной рынок внутри страны. В то время как крупнейшие месторождения добываемой китайской нефти остаются в основном на Северо-западной границе, синтетическое воспроизводство нефти и каучука оказалось удивительно успешным в Европе. Лин начал обсуждать приобретение нефтеперерабатывающих заводов, и национализация его сделок, безусловно, не помешает."

 GXC_freedom_of_thought_and_inclusiveness: "Свобода мысли и инклюзивность"
 GXC_freedom_of_thought_and_inclusiveness_desc: "Как и многие другие интеллектуалы, Ма Цзюньу продолжает настаивать на понятии «свободы мысли и инклюзивности», которые вместе принесут новое процветающее интеллектуальное убежище для обсуждения и развития национального кредо. Хотя у самого Ма могут быть старые политические связи с Гоминьданом, стало совершенно очевидно, что сам он аполитичен, выступая за это как за исследовательское начинание, и мы должны пойти навстречу."

 GXC_continuing_the_crusade: "Продолжение крестового похода"
 GXC_continuing_the_crusade_desc: "Какая жалость, что сменявшие друг друга правительства Севера не смогли восстановить порядок в стране. Несмотря на то, что они загнали в угол, возможно, своего самого большого противника Эры милитаристов, Гуанчжоу, они все еще продолжали упорствовать в посягательстве на автономию, неуважении региональных прерогатив и в общем вихре самопротивостояния. Пришло время завершить то, что начал Цай Э, и сделать то, что он не смог: марш на Пекин."

 GXC_reestablish_the_military_affairs_council: "Восстановить Совет по военным делам"
 GXC_reestablish_the_military_affairs_council_desc: "Совет по военным делам Китайской Республики был кратким учреждением, основанным на угасающих огнях Войны в защиту нации как попытка политизировать крестовый поход Цзингоцзюнь против Юань Шикая и принудить к республиканскому урегулированию. Объединив милитаристов Юго-запада, Прогрессивную партию и части Клики политической науки, это было благородное учреждение, которое было преждевременно распущено, и мы должны исправить это."

 GXC_protecting_the_nation_from_itself: "Защита нации от самой себя"
 GXC_protecting_the_nation_from_itself_desc: "Революционеры и бандиты бесчинствовали и процветали в условиях рушащейся стабильности мирового порядка Чжили, и это стало такой проблемой, что само поднятие Белого Солнца на Синем Небе стало быстро очевидным; такое положение дел явно нельзя терпеть. Народ, кажется, намерен каннибализировать собственное процветание ради слов демагогов, и именно Бюро общественной безопасности должно напомнить людям о правильном пути гражданина."

 GXC_solicit_support_from_germany: "Запросить поддержку у Германии"
 GXC_solicit_support_from_germany_desc: "Угасание Китайско-германской военной миссии на большей части территорий Северного Чжили было не чем иным, как трагедией. Ибо именно с немецким вмешательством в Гуанчжоу молот обрушился на Национально-революционную армию в 1927 году, и именно этому Чжили многим обязаны. Сунь Чуаньфан был многим, но мало кто может сказать, что его прагматичные договоренности с Германией запятнали его потенциал; Цзиньбао видел выгоду, и мы тоже."

 GXC_opening_the_universities: "Открытие университетов"
 GXC_opening_the_universities_desc: "С тех пор как Эра милитаристов охватила нацию почти навечно, преподаватели и профессора оказались разбросаны по нестабильным работам, зависящим от доброй воли их местного милитариста или стабильности правительства в то время. Дрейфуя в сторону Пекинского университета, неправильное политическое мнение могло привести к тому, что вас отправят в Куньмин или Наньнин, как многие видели после восстания 1932 года. Пришло время перевернуть страницу и снова открыть университеты."

 GXC_embracing_constitutionalism: "Принятие конституционализма"
 GXC_embracing_constitutionalism_desc: "Конституционализм — это путеводная звезда, с помощью которой хорошее управление хорошими людьми может быть достигнуто, поддержано или даже ожидаемо. И это моральное достоинство каждого хорошего чиновника — вырваться из мышления милитариста или торговца и осознать, что только через законность и конституционное правление упорядоченная реализация национальной политики может быть быстрой и эффективной. Органический закон или Военное правительство — это, в конце концов, лишь предлог для вопиющей диктатуры."

 GXC_ascension_of_the_young_marshal: "Восхождение Молодого маршала"
 GXC_ascension_of_the_young_marshal_desc: "Обучаемый и взращиваемый как его де-факто преемник с 1920-х годов, Лу Юйгуан долгое время был жемчужиной политического наследия Лу Жунтина. Унаследовав пост своего отца — наместника Лянгуана, он сумел обойти как революционеров, так и милитаристов, которые видели, как попытка консолидации Жунтина в 1920-х годах осталась без ответа. В истинном образе своего отца он стал чем-то вроде популярного народного героя в Гуанси."

 GXC_a_new_baojia: "Новая Баоцзя"
 GXC_a_new_baojia_desc: "Баоцзя была благородной системой, которая, как и многие другие по всей стране, пришла в упадок, поскольку различные чиновники злоупотребляли ополчением для сбора экстраординарных «налогов» и иным образом наносили вред местным общинам. Восстановив систему, возможно, удастся снова сохранить чувство гражданского милитаризма среди китайского населения, позволяя им браться за оружие, подобно призыву, одновременно борясь с бандитами и обеспечивая мир в сельских районах."

 GXC_reconcile_with_beiyang: "Примирение с Бэйяном"
 GXC_reconcile_with_beiyang_desc: "Некоторое время казалось, что Фракция Молодой Гуанси отошла от своих корней в Национальном порядке Бэйяна, намереваясь сохранить свой региональный контроль и оспаривать пассивное влияние на Юго-западе. Однако с новым статусом Молодого маршала Юга, несомненно, необходимо снова зажечь старые сети связи с кругами северян и напомнить им, что мы всегда были соотечественниками."

 GXC_cooperate_with_southern_intelligentsia: "Сотрудничество с южной интеллигенцией"
 GXC_cooperate_with_southern_intelligentsia_desc: "Нравится это Старой клике Гуанси или нет, Лянгуан и Юго-запад в целом стали чем-то вроде рассадника политических диссидентов и различных собраний интеллигенции. Революционеры, социалисты, демократы, федералисты, все они стекаются в Гуанчжоу, или Куньмин, или Чаншу, или Чунцин. И было бы мудро, благоразумно и в конечном счете похвально сотрудничать с этими людьми слова, чтобы построить модернизированное национальное государство."

 GXC_a_legacy_of_heroism_and_chivalry: "Наследие героизма и рыцарства"
 GXC_a_legacy_of_heroism_and_chivalry_desc: "Нет более сильного призыва к оружию, чем слава или врожденный героический долг перед нацией или обществом. Составляя милитаристский народ-государство, только через чистое мужество, храбрость и преданность борьбе нации его доблестные солдаты могут продолжать. И именно это наследие правительство должно превозносить; сопротивление авторитаризму и автократии, и в которое чувство долга может быть привито массам."

 GXC_the_merchant_government: "Торговое правительство"
 GXC_the_merchant_government_desc: "В ходе всегда цветистого coup de grâce (смертельного удара) известный и национально выдающийся мэр-торговец Чэнь Ляньбо сумел обеспечить лидерство в неформальных кликах Лянгуана, привязав их к своей Ассоциации всех сословий по спасению Гуандуна и ее многочисленным ключевым финансовым активам внутри нации. Процветание — вот что держит мелочи сегодняшнего дня, а демократия — цель будущего. При губернаторе Чэне расцветет новый стиль правления — кантонско-британский."

 GXC_from_an_unscrupulous_militia_to_an_army: "От недобросовестного ополчения к армии"
 GXC_from_an_unscrupulous_militia_to_an_army_desc: "Некоторые из «Молодой гвардии» Торгового корпуса взяли на себя смелость злоупотреблять своим положением. Они вопиюще пьют, играют в азартные игры, злоупотребляют своим оружием и щеголяют своим богатством, как будто у них вообще нет обязанностей. Заставляя их проходить тяжелые тренировки утром и вечером, и ставя их на дежурство каждый день, мы скоро смоем такие отвратительные пороки внутри корпуса. Они должны быть элитой, ибо они защищают ключевые активы."

 GXC_solicit_the_third_party_vote: "Запросить голоса третьих партий"
 GXC_solicit_the_third_party_vote_desc: "Многие в стране видят в Торговом правительстве не более чем подлое попрание демократических норм в пользу безжалостно капиталистического и коммерчески доминирующего правительства, но это не полная картина. Как торговцы, естественно, что правительство ценит свои активы, однако такие люди, как Чжан Цзяао из ДСП, близки к Торговцам, и мы можем аналогичным образом доказать, что мы демократы, а также финансисты."

 GXC_thousand_years_of_kinship_not_thousand_years_of_government: "«Годы родства, а не годы правительства»"
 GXC_thousand_years_of_kinship_not_thousand_years_of_government_desc: "Торговцы долгое время стояли как столп китайского сообщества и коммерции нации. Между ними строились тысячи лет родства, и все же только годы правительства. Правительства могут приходить, правительства могут уходить, одно можно сказать наверняка: коммерция остается. И именно эта коммерция связывает каждого торговца в Китае, и именно их Чэнь Ляньбо приглашает в более широкую национальную плутократию."

 GXC_filling_the_void_in_the_nations_guanxi: "Заполнение пустоты в Гуаньси нации"
 GXC_filling_the_void_in_the_nations_guanxi_desc: "С учреждением Торгового правительства, о чем действительно только мечтали в расцвет Восстания Торгового корпуса, хрупкий баланс рукопожатий и договоренностей нации был практически перевернут. Милитаристы теперь отвечают перед торговцами в костюмах, а не перед политиками или самими собой. Таким образом, огромная дыра осталась в различных патронажных сетях по всему Китаю, и необходимо восстановить новую рабочую договоренность."

 GXC_every_evil_turned_into_good_fortune: "«Любое зло обращается во благо»"
 GXC_every_evil_turned_into_good_fortune_desc: "Фэн Цзисян, или «Любое зло обращается во благо», было благословением, дарованным гонконгской деревне, которую Шэнь купил во время своего изгнания в 1926 году. И так уж вышло, что возвращение Шэня в провинциальную, а затем и национальную политику превратило его смещение из Гуанси в 1925 году в удачу. Теперь, наконец, должным образом признанный губернатором Гуандуна, все взоры устремлены на бывшего бандита, ожидая направления, которое примет его режим."

 GXC_clearing_house_and_paying_debts: "Расчетная палата и выплата долгов"
 GXC_clearing_house_and_paying_debts_desc: "Шэнь слишком хорошо знает, что нельзя править несправедливо или без близких союзников. Так много людей приходило и уходило в ассортименте союзников Шэня, что он сам мог косвенно вызвать, что это стало удивительной проблемой для его управления. Даже так, Чжили постоянно ухаживали за ним и иногда должным образом поддерживали его в его начинаниях, и поэтому было бы благоразумно запросить их обязательства еще раз или в противном случае обратиться за помощью к Политической науке."

 GXC_reconstituting_the_confucian_order: "Восстановление конфуцианского порядка"
 GXC_reconstituting_the_confucian_order_desc: "Нация видела приток нового мышления с момента Движения 4 ноября 1919 года, но одной из его величайших пародий было настойчивое пренебрежение Конфуцианским мировым порядком, замененным порядком Новой жизни. И все же это привело лишь к неправильному мышлению или разврату, извержению ерунды и установлению дисгармоничного национального мышления. Крайне важно восстановить порядок в Китае, связанный нашими общими убеждениями."

 GXC_the_governments_handsome_face: "Красивое лицо правительства"
 GXC_the_governments_handsome_face_desc: "Несмотря на все притворства, совершенно очевидно, что Шэнь болен, и в неприглядной форме. Но есть один амбициозный и, по крайней мере, несколько уступчивый местный интеллектуал, у которого есть значительная провинциальная поддержка. Чжу Цзяхуа, всегда лихой и утонченный педагог, известный своим членством в прогерманском Обществе Цзинсин, предложил губернатору план действий, который омолодит администрацию и проследит за тем, чтобы Шэнь принес современность, а не застой."

 GXC_cutting_down_the_green_forest: "Вырубка Зеленого леса"
 GXC_cutting_down_the_green_forest_desc: "Армия Шэня в Старой клике Гуанси никогда не была особенно упорядоченной силой; конечно, Шэнь знал это, ибо он знал каждого человека в своем подразделении. Но при вступлении в должность губернатора есть, по крайней мере, ожидание, что провинциальная армия не будет непрерывно грабить и мародерствовать на работе. Пришло время отбросить корни «Зеленого леса» (бандитизма) и покончить с этим. Половина людей едва умеет читать или писать, как можно ожидать, что они будут выполнять свои команды в упорядоченном виде?"

 GXC_forever_protectors_of_national_unity: "Вечные защитники национального единства"
 GXC_forever_protectors_of_national_unity_desc: "Такова судьба тех, кто владеет Гуандуном — вечно восставать против традиционных центров власти на Севере, и именно поэтому Торговцы и Милитаристы должны взяться за оружие, чтобы защитить свои права, свою автономию и наконец исправить ужасно уродливый путь, по которому пошла Бэйянская республика. Наше прочное наследие — это Национальная защита, и наш долг — довести это до конца."

 GXC_utilising_warlord_contacts: "Использование контактов с милитаристами"
 GXC_utilising_warlord_contacts_desc: "Скупо или нет, различные друзья и союзники теперь оказались злейшими врагами между генералиссимусами и президентами, но эти узы братства все еще остаются, и неудивительно, что многие разделяют чувства нашего правительства, в отличие от своих нынешних повелителей. При правильном уровне приманки армии Гуандуна и Гуанси могли бы позаботиться о добавлении свежих солдат из других клик, пока они могут вынести любую враждебность."

 GXC_thus_unto_tyrants: "Так и с тиранами"
 GXC_thus_unto_tyrants_desc: "Во имя защиты Республиканского порядка и свержения автократического диктатора, грубо попирающего конституцию, различные милитаристы объединились и восстали против Юань Шикая в Войне в защиту нации. И снова, казалось бы, или, по крайней мере, как предполагает наша пропаганда, подобный исторический трактат разыгрался снова. Именно поэтому народ Гуанси, Гуандуна и других мест сплачивается против тирании, и именно поэтому мы преуспеваем."

 GXC_securing_victory_at_all_costs: "Обеспечение победы любой ценой"
 GXC_securing_victory_at_all_costs_desc: "Не может быть никаких ограничений, не может быть пощады. Наши враги хотели бы видеть Китай разорванным на части под политической и военной демагогией, и крайне важно, чтобы наш последний рубеж не стал одним из длинного списка неудачных восстаний XX века. Мы герои, мы победители, нет ничего непреодолимого при наличии должного мужества. Готовьте свои мечи! Мы должны обеспечить победу! Любой ценой!"

 GXC_organising_a_national_merchant_corps: "Организация национального торгового корпуса"
 GXC_organising_a_national_merchant_corps_desc: "Некогда несбыточная мечта Чэнь Ляньбо во время восстания Торгового корпуса 1925 года, теперь возможная реальность: торговцы по всей стране возмущены несправедливостью, совершенной против их товарищей из Гуандуна, и дали понять, что они тоже предпочтут умереть, защищая свои идеалы и активы, чем быть экспроприированными или арестованными. Вместе, рука об руку, финансисты нации берутся за оружие, чтобы сделать то, что не смогли солдаты."

 GXC_the_peoples_robin_hood: "Народный Робин Гуд"
 GXC_the_peoples_robin_hood_desc: "Гуанси и Гуандун изобилуют так называемыми народными героями «Робин Гудами». Крадущие у богатых, раздающие богатство бедным. Снова и снова они появлялись, совершали налет и исчезали. Именно этих людей, этих храбрых героев, которым так многие обязаны своими чашками риса, правительство призывает сражаться с нашими общими врагами."

 GXC_using_provincial_ingenuity: "Использование провинциальной изобретательности"
 GXC_using_provincial_ingenuity_desc: "Глупцы подумали бы, что война — это равное игровое поле, сродни учениям и тренировочным маневрам. Едва покидая свои железные дороги, армии Севера едва знают, как сражаться без чрезмерного использования артиллерии или способности снабжать свои установки. Люди Гуанси и Гуандуна сражались в одних из самых ужасных условий, известных нации, и при каждом вторжении на нашу территорию мы должны сжимать и окружать врага с поспешностью."

###- Phase V Focuses -###
## - DSP Victory
 GXC_reorganising_the_dsp: "Реорганизация ДСП"
 GXC_reorganising_the_dsp_desc: "Контролируя свою партию через политическое покровительство и свою сеть Гуаньси, Чжан почти стал свидетелем того, как его собственная партия раскололась по швам из-за столкновений личностей и направлений. С этой новой реорганизованной партией необходимо создать новый имидж для партии; подобный пробуждающемуся льву. Сочетая классику и любовь к своей стране — это демократический социализм, Полярная звезда нашей партии."

 GXC_the_groundwork_for_democracy: "Основа для демократии"
 GXC_the_groundwork_for_democracy_desc: "Чтобы практиковать демократию в Китае, крайне важно, чтобы существовала культурная основа для демократических перемен. Принимая западную концепцию демократии — и ее акцент на индивидуализме, свободе, равенстве, прогрессе и разуме — и культивируя обширное экономическое развитие, эти усилия высвободят те самые силы, которые привели к европейской промышленной революции и демократии."

 GXC_constructing_a_national_democracy: "Построение национальной демократии"
 GXC_constructing_a_national_democracy_desc: "Основная концепция демократии заключается в непогрешимой природе образованных и хороших людей перед развращающим влиянием политической власти. Через модифицированную западную парламентскую систему и модифицированную форму государственного социализма политические партии должны сотрудничать друг с другом, но не уничтожать друг друга или систему. При такой системе приоритет будет отдаваться нации."

 GXC_showdown_with_the_yue_army: "Схватка с Армией Юэ"
 GXC_showdown_with_the_yue_army_desc: "В конечном счете, остается практически единственное препятствие, стоящее между партией и достижением демократического прогресса: Армия Юэ. Через сотрудничество с такими людьми, как Ли Цзишэнь, Лю Чжэньхуань, Сунь Баоган и другими офицерами не из Юэ, ДСП будет работать над тем, чтобы полностью оттеснить милитаристов. Остается только надеяться, что действия Чжана будут достаточно быстрыми, чтобы удержать кинжалы Юэ на расстоянии."

 GXC_reinvigorated_five_year_plan: "Обновленный пятилетний план"
 GXC_reinvigorated_five_year_plan_desc: "Как свидетельствует большой скачок экономического развития в странах Интернационала и других странах с государственной экономикой, ясно, что предпочтение Чжан Цзюньмаем централизованных многолетних планов развития вряд ли ошибочно. Благодаря согласованным усилиям Китай восстановит контроль над своими собственными рынками, разовьет свои производственные возможности и превратит даже границу в утопию."

 GXC_liberate_productive_forces: "Освободить производительные силы"
 GXC_liberate_productive_forces_desc: "Поскольку большая часть населения проживает в сельских общинах, сельскохозяйственный сектор так же важен, как и промышленность. Хотя понятие «земля пахарю» достойно восхищения, любая земельная реформа должна быть связана с производством. Стимулируя развитие с помощью науки, технологий и коллективного земледелия, а не ликвидации помещиков, мы все же можем принести демократию нации."

 GXC_national_economic_coordination: "Национальная экономическая координация"
 GXC_national_economic_coordination_desc: "Брат Чжан Цзюньмая, Чжан Цзяао, является одним из самых богатых банкиров во всем Китае, а их сестра, Чжан Юи, также успешный банкир. Известная своими связями и богатством, смазка колес банков семьей Чжан естественным образом обеспечит эффективную обработку экономических директив правительства."

 GXC_disciplined_mass_movement: "Дисциплинированное массовое движение"
 GXC_disciplined_mass_movement_desc: "Революции сильно зависят от восхитительного укрепления стальной дисциплины в массовом движении. Чтобы избежать всех претензий на партийное государство, сохраняя при этом сущность демократии, крайне важно, чтобы правительство включило массовое движение в свою деятельность. В этом же смысле армия также должна быть приведена к покорности государству, независимо от идеологии."

 GXC_a_new_democratic_literati: "Новые демократические литераторы"
 GXC_a_new_democratic_literati_desc: "Великий проект демократизации нашей нации требует, чтобы новый класс ученых-чиновников принял вызов управления массами. И именно их духовные потомки, современные интеллектуалы, выполнят эту историческую миссию. Избавляясь от своих старых привычек и получая специальную подготовку, пусть новые литераторы станут знаменосцами демократии."

 GXC_the_unanimous_republic: "Единодушная республика"
 GXC_the_unanimous_republic_desc: "Слишком долго партии ссорились между собой, пока милитаристы свободно разгуливали, доминируя над страной. Чтобы обеспечить прогресс, все политики и все государственные служащие должны объединиться для сотрудничества с Демократической лигой Китая в едином гармоничном образовании. Народ подтвердил эту концепцию своей народной поддержкой, и чиновники должны просто подчиниться."

##- Shared Federalist Political Tree
 GXC_a_multi_partisan_democracy: "Многопартийная демократия"
 GXC_a_multi_partisan_democracy_desc: "На первом шаге к истинной плюралистической демократии необходимо обеспечить, чтобы все законодательные органы на всех уровнях власти избирались всенародным или прямым голосованием. Точно так же должны быть защищены права недавно эмансипированных — женщин, и поддержаны их возможности в трудоустройстве, образовании и политике."

 GXC_absolute_freedom_in_education: "Абсолютная свобода в образовании"
 GXC_absolute_freedom_in_education_desc: "Если Китай хочет победить своего давнего врага — неграмотность, грех, который несет самый большой крест в отношении национальной производительности, то образованию должно быть позволено процветать в высшей степени. Абсолютная свобода в преподавании и исследованиях, запрет политизации образования и определенный план борьбы с неграмотностью должны поощряться и реализовываться."

 GXC_enshrine_workers_protections: "Закрепить защиту рабочих"
 GXC_enshrine_workers_protections_desc: "Слишком долго китайский пролетариат страдал и сетовал под властью лицемерных демагогов и революционных повес. Шепча сладкие пустяки, они сделали очень мало, чтобы завоевать для рабочих причитающуюся им государственную поддержку. С гарантией минимального уровня жизни, благосостояния, улучшенных условий труда и амбициозной программы страхования мы будем первым рабочим правительством."

 GXC_a_song_of_ice_and_fire: "Песнь льда и пламени"
 GXC_a_song_of_ice_and_fire_desc: "«Социализм всего человечества» — это вера в то, что если какая-либо нация угнетается сегодня, Китай поспешит предложить ей свою помощь, не вступая в конфликт с состраданием к другим нациям. Если человек националист, почему бы не научить его любить все человеческое общество? Как лед, ДСП продвигала холодную индустрию, и как огонь, ПОИ должна разжигать угли человеческого сострадания."

 GXC_democracys_diarchy: "Диархия демократии"
 GXC_democracys_diarchy_desc: "Хотя это значительно далеко от чистого плюралистического идеала, которого придерживалось движение, в новой Федеративной Республике стало совершенно очевидно, что в игре китайской демократии действительно участвуют только две организации: ДЛК и ВРА. Поскольку надежда на многопартийную демократию маячит на горизонте, титаны демократии должны обеспечить ее надежную защиту для будущих поколений."
##- PIP Victory
 GXC_chen_jiongming_legacy: "Наследие Чэнь Цзюнмина"
 GXC_chen_jiongming_legacy_desc: "Чэнь Цзюнмин, пожалуй, действительно величайший политик в современной истории страны. Юрист по образованию, в конечном итоге оказавшийся на посту революционного генерала, он выдержал неисчислимые беды. От испытаний с доктором Сунем до дуэлей с интриганами Бэйяна, он наконец исполнил свое желание увидеть демократический Китай — истинный отец нации."

 GXC_financial_transparency: "Финансовая прозрачность"
 GXC_financial_transparency_desc: "Китайскому народу практически пришлось смириться с ролью гнусных и таинственных шэньши, или местного магистрата, или милитариста, или политика, накопивших значительное количество богатства без какого-либо объяснения того, как. Республика не может функционировать, если ее финансовые операции не являются очевидно прозрачными, иначе коррупция и взяточничество будут гноиться во тьме."

 GXC_encourage_free_enterprise: "Поощрение свободного предпринимательства"
 GXC_encourage_free_enterprise_desc: "Китай богат ресурсами, наводнен смелыми, трудолюбивыми и способными людьми, и все же его экономическое положение далеко от идеального. Конечно, были попытки исправить это: автаркические решения и иностранные капиталистические предприятия. Но только через объединение иностранного капиталиста и местного промышленника Китай может действительно достичь промышленных высот."

 GXC_rewarding_our_veterans: "Вознаграждение наших ветеранов"
 GXC_rewarding_our_veterans_desc: "Нет героя больше, чем военный мученик, и вторым после них идет военный ветеран. Через войны за объединение и против Японии Китаю пришлось столкнуться с огромными жертвами, и большое население ветеранов сравнительно осталось в пыли. Нация не была бы построена без них, и мы должны выплатить должное вознаграждение."

 GXC_funding_for_the_arts: "Финансирование искусств"
 GXC_funding_for_the_arts_desc: "Даже в самые мрачные времена в Гуанчжоу всегда была яркая художественная сцена, и кантонская элита гордится своей готовностью покровительствовать искусству, музыке, операм и другим формам высокой культуры. Будет создан ряд художественных и культурных фондов, чтобы помочь запустить национальное культурное возрождение, помогая нашей нации исцелиться от ущерба десятилетий войны."

 GXC_peace_in_the_countryside: "Мир в деревне"
 GXC_peace_in_the_countryside_desc: "Революционеры и деспоты довели бы шаткую земельную ситуацию в Китае до края своими методами радикального перераспределения или даже уничтожения целых поместий. «Земля пахарю» — это благородно, да, но это заходит слишком далеко. Крестьяне и землевладельцы должны прийти к мирной гармонии; помощь крестьянам и защита интересов землевладельцев."

##- PIP Dominant Victory
 GXC_pursuing_a_federal_democracy: "Продвижение федеральной демократии"
 GXC_pursuing_a_federal_democracy_desc: "Федеральный идеал — быть свидетелем радикальной трансформации Китая из централизованного иерархического органа, зависящего от Столицы, в орган с широкой автономией и демократическими практиками в его составных провинциях. При любой другой партии такой идеал был бы расколот под их собственной идеологией. Только ПОИ может оставаться верной Федеральной демократии."

 GXC_entrenching_the_yue_clique: "Укрепление Клики Юэ"
 GXC_entrenching_the_yue_clique_desc: "Что касается национальных политических клик в Китае, есть очевидные: Чжили, Фэнтянь, Аньхой. И все же, с их искоренением или иным включением в другие политические органы, многие верили, что время наглой патронажной сети прошло. Однако нынешняя ситуация доказала необходимость создания «Клики Юэ» — только лоялисты могут править в правительстве."

 GXC_ban_subversive_parties: "Запрет подрывных партий"
 GXC_ban_subversive_parties_desc: "Состояние Федеральной демократии нельзя полностью свалить на работу оппозиции или иностранных империалистов, ибо в действительности первые остаются верными реформистской политике, в то время как вторые слишком далеко, чтобы посягать на национальную демократию. На самом деле именно вечно присутствующие революционер и милитарист стремятся сдать демократию автократии, и с ними нужно обращаться жестко."

 GXC_yue_clique_democracy: "Демократия Клики Юэ"
 GXC_yue_clique_democracy_desc: "Далекие от совершенной идеализированной системы, Клика Юэ и Партия общественных интересов тем не менее принесли стабильность и обеспечение будущих национальных выборов под своим управлением. С оглушительным звоном победы и подавляющей поддержкой общественности и избирателей, кто скажет, что Клика Юэ не правит с наилучшими намерениями для масс?"

##- PIP Backsliding Victory
 GXC_steadying_our_democracy: "Стабилизация нашей демократии"
 GXC_steadying_our_democracy_desc: "Путь нации к демократии не был особенно стабильным, это очевидно. Но он еще не был смыт очевидным приливом истории. Абсолютным приоритетом Президента-Маршала является обеспечение того, чтобы Федералистский проект не породил еще одну Бэйянскую республику, и только Клика Юэ может действительно стабилизировать такую ситуацию."

 GXC_crackdown_on_radicalism: "Подавление радикализма"
 GXC_crackdown_on_radicalism_desc: "Революционеры сидят наготове за каждым углом, ожидая малейшего признака слабости. Они хотели бы, чтобы мобилизация масс была направлена против Федералистского движения, так же как это было в катастрофических 1920-х годах. Как бы они ни старались, движение извлекло уроки из своих ошибок. И единственный ответ на террор — равное применение силы."

 GXC_the_canton_compromise: "Кантонский компромисс"
 GXC_the_canton_compromise_desc: "Хотя сотрудничество с демократическо-социалистической частью Демократической лиги Китая, возможно, невозможно, это не обязательно исключает сотрудничество с организацией в целом. Есть те, кто, возможно, был отвергнут Чжаном или иным образом, кто оказался восприимчив к предложениям. Это было движение, возглавляемое Югом, и оно останется таковым."

 GXC_peace_with_beiyang: "Мир с Бэйяном"
 GXC_peace_with_beiyang_desc: "Глупостью Юго-Запада всегда было его неуверенное позиционирование против Бэйянской республики как самого абсолютного провала китайской государственной мудрости в наше время, но это все, чем это является, — глупостью. В час нужды Клики Юэ Чжили стояли там, чтобы защитить их от натиска революционеров, и будет справедливо, если долг будет возвращен."

 GXC_the_yue_army_prerogatives: "Прерогативы Армии Юэ"
 GXC_the_yue_army_prerogatives_desc: "Оппозиция осуждает принятие власти Президентом-Маршалом как простую ширму для увековечивания Эры милитаристов, только в федеральной одежде. Но нынешний курс — это всего лишь прерогатива армии как единственного защитника Республики. Нет другого способного политика, чтобы обеспечить конституционализм в нации, только Е Цзюй понимает, что нужно."

##- Shared Auth Federalist Political Tree
 GXC_ratify_the_constitution: "Ратифицировать Конституцию"
 GXC_ratify_the_constitution_desc: "Политическая нестабильность или нет, крайне важно, чтобы нация довела Федералистский проект до конца. На этом самом краю нация должна обеспечить ратификацию национальной конституции. Возможно, это будет сама защита от всеобъемлющей тирании и анархии, и лишь гарантия продолжения бюрократического управления."

 GXC_relief_for_war_families: "Помощь семьям войны"
 GXC_relief_for_war_families_desc: "Получив обильные военные репарации от обманутых иностранных империалистов, которые нанесли такой большой ущерб нации и ее сознанию, нация также получила множество ветеранов и перемещенных семей в результате войны и кровопролития. Естественной реакцией будет использование этих репараций для облегчения их страданий."

 GXC_intermixing_freedom_and_nationalism: "Смешение свободы и национализма"
 GXC_intermixing_freedom_and_nationalism_desc: "Под позерством милитаристов и диктаторов нация видела последовательное злоупотребление собственным национализмом для достижения гнусных целей. Но нельзя просто позволить таким предыдущим инцидентам вредить культивированию национальной гордости, и точно так же нет противоречия между национализмом и свободой мысли или академической независимостью."

 GXC_the_political_education_scheme: "Схема политического образования"
 GXC_the_political_education_scheme_desc: "Собственная стабильность и независимость нации, возможно, зависят от ее интеллектуальных и студенческих масс, которые подстегнули такой неумолимый преобразующий прилив на протяжении всей недавней истории Китая. Если правительство сможет тщательно использовать такой скрытый потенциал и силу, оно может обеспечить свое постоянное пребывание в правительстве на поколения."

 GXC_national_army_commission: "Создать Национальную военную комиссию"
 GXC_national_army_commission_desc: "Отчаявшиеся и обязанные «великодушным» милитаристам, гражданские политики слишком долго находились под господством военного истеблишмента! Создав Национальную военную комиссию, армию можно очистить от амбициозных и нелояльных элементов, наконец национализировать, одновременно сократив ее размер до уровня национальной обороны."

##- Li Jishen/Emergency Government
 GXC_unification_and_reconstruction: "«Объединение и реконструкция!»"
 GXC_unification_and_reconstruction_desc: "Сплотив широкий спектр членов ДЛК, перебежчиков из Гоминьдана и различных милитаристов, легендарный и печально известный Ли Цзишэнь сумел выстоять еще раз. Мало кто подозревал, что революционный генерал станет последней надеждой нации, и все же по его инициативе нация отпрянула от падения в автократию."

 GXC_reconcile_with_the_revolutionaries: "Примирение с революционерами"
 GXC_reconcile_with_the_revolutionaries_desc: "Федералистское движение и Гоминьдан стали непримиримо ожесточенными с момента их раскола в 1920-х годах, и все же во главе Федералистского движения стоит революционер. Вдрив Комиссию по кадровой перестройке, позволим нации возродить сотрудничество с Гоминьданом и рационально перестроить персонал в соответствии с местными условиями."

 GXC_economic_self_sufficiency: "Экономическое самообеспечение"
 GXC_economic_self_sufficiency_desc: "Все нации по всему миру стали свидетелями провала экономической политики laissez-faire. Немецкий экономический крах и его катастрофические последствия для мирового порядка оказались гибельными. Поскольку все нации неизбежно отказываются от экономики свободного рынка, Китай должен культивировать свое собственное экономическое самообеспечение, если он хочет твердо стоять среди Великих держав."

 GXC_adopt_the_four_great_policies: "Принять Четыре великие политики"
 GXC_adopt_the_four_great_policies_desc: "Концепция, разработанная и культивируемая революционерами нации, — это Четыре великие политики: управление, образование, благосостояние и национальная оборона. В рамках этой политики реконструкции нация может развить условия для сильной демократии и экономики, которая избегает ловушек западного капитализма через социалистические реформы."

 GXC_new_third_force_politics: "Новая политика Третьей силы"
 GXC_new_third_force_politics_desc: "То, что необходимо нации, — это новый «третий тип» политики, требующий сильного и эффективного правительства, способного справляться с национальными кризисами. Такого, которое может защитить гражданские свободы и права собственности, развить смешанную экономику, установить верховенство закона и управлять, опираясь на элиты в различных областях; балансируя между государством и личностью."

 GXC_democracy_sustained_by_morality: "Демократия, поддерживаемая моралью"
 GXC_democracy_sustained_by_morality_desc: "Конечная цель демократии — это лишь достижение всеобщего счастья для масс. Поскольку она служит единственной рациональной системой, согласующейся с человеческой природой, она способствовала всему социальному прогрессу. Поднимая моральный уровень личности путем освобождения его усилий для общего блага, демократия — это лишь новая цивилизация, поддерживаемая всеми силами морали."

 GXC_reform_the_warlords: "Реформировать милитаристов"
 GXC_reform_the_warlords_desc: "Традиция милитаризма глубоко укоренилась в китайском политическом ландшафте, и простое желание ее исчезновения не заставит ее уйти. Вместо этого мы должны стремиться реформировать милитаристов, превратив их из феодальных военачальников в профессиональных офицеров, служащих государству.В рамках государственной политики DSP и CDL будут использоваться для воспитания и реформирования полевых командиров, чтобы они придерживались демократических принципов, и, в свою очередь, будут уважать автономию их провинций.Через образование, интеграцию и строгое регулирование мы можем превратить меч раздора в щит республики."
##- Li Jishen/Li Zhangda
 GXC_sideline_the_zhangs: "Отодвинуть «Двух Чжанов»"
 GXC_sideline_the_zhangs_desc: "Совершенно очевидно, что Ли Цзишэнь на самом деле не нуждается и не желает видеть Чжан Дунсуня или Цзюньмая, и поддержка милитаристов, собственной Гуандунской клики и различных перебежчиков из Гоминьдана подтверждает это. С приходом Ли Чжанды ДСП будет вытеснена из руководства ДЛК. Просто формируем правительство национального единства, как предписывали Чжаны, только без них."

 GXC_de_radicalise_the_three_principles: "Дерадикализация Трех принципов"
 GXC_de_radicalise_the_three_principles_desc: "Три принципа, описанные Гофу: Национализм, Благосостояние, Демократия — все верны по сути. И все же они были так легко искажены его преемниками: разорваны на части, с приоритетом одного Принципа и низведением остальных на второстепенные позиции. Примененные неправильно, они привели к автократии, но при Двух Ли они получат свои надлежащие гарантии."

 GXC_tutelage_of_the_productive_peoples: "Опека производящих народов"
 GXC_tutelage_of_the_productive_peoples_desc: "Благодаря сотрудничеству с умеренными из Гоминьдана и другими отколовшимися от Временного комитета действий, человек, который так долго боролся за сохранение мечты Гоминьдана, наконец начнет свою собственную Национальную революцию. Не ту, где доминируют популисты и демагоги, а ту, которой управляют Производящие народы, труженики и рабочие!"
##- Li Jishen/Zhang Dongsun
 GXC_purify_the_yue_clique: "Очищение Клики Юэ"
 GXC_purify_the_yue_clique_desc: "Самые мстительные в ДЛК хотели бы, чтобы вся Партия общественных интересов пошла ко дну вместе с разгромом Клики армии Юэ, но не вся «Клика Юэ» расколола нацию под властью автократии. Бессильная, и после смерти Чэнь Цзюнмина, Ли Цзишэню потребуется лишь один грандиозный маневр, чтобы захватить контроль над аппаратом Юэ."

 GXC_promoting_social_justice: "Продвижение социальной справедливости"
 GXC_promoting_social_justice_desc: "Нация должна принять «Социальную справедливость», но в конечном итоге отвергнуть классовую борьбу и концепции, разрушающие присущую обществу гармонию. Мы лишь должны способствовать государственному управлению крупными отраслями промышленности при частной собственности, мирным методам реформирования сельского хозяйства в форму «Земля пахарю», значительному улучшению технологий и развитию сотрудничества."

 GXC_the_chinese_renaissance: "Китайский Ренессанс"
 GXC_the_chinese_renaissance_desc: "После смерти Лян Цичао высказывалось мнение, что его левые преемники в Конституционной партии лишь подчиняются линии партии, и все же они отправились создавать свое Общество национального возрождения. Увы, нация вошла в такое обещанное состояние. Полный Китайский Ренессанс! Человечество — это не просто средство, а самоцель."

##- Chen Qiyou/Ye Ju
 GXC_guiding_provincial_federalism: "Направляя провинциальный федерализм"
 GXC_guiding_provincial_federalism_desc: "Провинции и люди вошли в по своей сути нестабильное состояние с момента погружения политики нации в нестабильное русло. И все же Федералистский идеал вышел невредимым. При новой администрации Федерализм должен продолжаться, и провинции должны подчиниться. В первую очередь, ратифицировав свои провинциальные конституции."

 GXC_bringing_order_to_the_land: "Наведение порядка на земле"
 GXC_bringing_order_to_the_land_desc: "Поскольку шэньши долгое время смиренно поддерживали партию в ее управлении и администрации с ранних дней, нельзя забывать роль, которую они играют в обеспечении гармонии в нации. Защита их и их собственности обеспечит сотрудничество. Одновременно с этим крестьянин тоже должен получить уступки и защиту, чтобы сохранить эту гармонию."

 GXC_reassuring_the_commercial_class: "Успокоение коммерческого класса"
 GXC_reassuring_the_commercial_class_desc: "При присущей стабильности политической сцены с момента захвата Пекина, растущий средний класс и массы интеллектуалов оказываются нестабильной и неуверенной демографической группой в нации. Посредством провозглашения прозрачных национальных финансов, разрешения свободного предпринимательства и введения справедливого налогообложения, давайте привлечем эти классы на свою сторону."

 GXC_disarming_provincial_warlords: "Разоружение провинциальных милитаристов"
 GXC_disarming_provincial_warlords_desc: "Милитаристы доказали свою полезность, но в конечном итоге они лишь язва на национальном порядке. Многие стекались к Клике Юэ и Партии общественных интересов, полагая, что это спасет их. И все же, под национальной армией нет места для таких подонков, как они. Провинциальные армии будут ликвидированы, а Баоцзя интегрирована в национальную армию."

 GXC_promoting_chinese_culture: "Продвижение китайской культуры"
 GXC_promoting_chinese_culture_desc: "Китайский дух видел много угасания в бурные времена XX века. От падения династии Цин до провала многочисленных революций, гражданских войн и провозглашения ужасной Эры милитаристов, традиционная культура находила мало места во вражде между политиками и солдатами. Теперь, в это мирное время, давайте культивировать многовековую богатую культуру нации."

 GXC_fulfilling_our_social_promises: "Выполнение наших социальных обещаний"
 GXC_fulfilling_our_social_promises_desc: "Как и было в программной платформе Партии общественных интересов с самого ее начала, с новым рычагом власти Клике Юэ необходимо заложить основы сильного социального государства. Минимальная заработная плата, обязательный 8-часовой рабочий день, введение различных реформ и правил безопасности на рабочем месте, а также пенсии для ветеранов. Таковы наши социальные обещания массам."

 GXC_legacy_of_the_founder: "Наследие основателя"
 GXC_legacy_of_the_founder_desc: "Критики говорят, что он «потерпел неудачу» в своем долге, но его видение занимает важное место в сущности Федеративной Республики. Чэнь Цзюнмина, китайского Бисмарка, нужно не порицать, а почитать. Его силу, стойкость и бескомпромиссный утопический идеализм нужно превозносить. Он должен быть примером для подражания всем последующим президентам и нации в целом."

 GXC_bring_beiyang_back_in_line: "Вернуть Бэйян в строй"
 GXC_bring_beiyang_back_in_line_desc: "Оппозиция и революционеры скорее предпочли бы увидеть наследие Бэйяна погребенным под чистой силой ревностного пыла, и все же это было бы отбрасыванием целого конституционного и политического наследия под предлогом его безнадежности. Уроки Бэйянской республики нельзя терять, и мы должны работать с ее самыми прилежными представителями, чтобы гарантировать, что они не повторятся."
##- Chen Qiyou
 GXC_renewed_coalition_government: "Обновленное коалиционное правительство"
 GXC_renewed_coalition_government_desc: "Жесткие репрессии против оппозиции приведут лишь к еще более сильной язвительной реакции со стороны народа, с которой мы не можем мириться. Благодаря сотрудничеству с оппозицией в рамках коалиционного правительства мы будем служить лишь переходным режимом на пути к инаугурации полностью представительного конституционного управления."

 GXC_the_transitional_democracy: "Переходная демократия"
 GXC_the_transitional_democracy_desc: "Дорога была далеко не прямой, но, идя вечно вперед к прогрессу и процветанию, история может, по крайней мере, оправдать Президента и его партию за попытку. Хотя бурлящий идеализм и слабеющий цинизм, возможно, помешали формальной демократии, это не невозможно, и мы должны просто пройти через этот переходный период, чтобы достичь конечного идеала."
##- Ye Ju
 GXC_extending_martial_law: "Продление военного положения"
 GXC_extending_martial_law_desc: "Быстро стало очевидно, что первоначальный провал попытки Федералистского проекта установить свободную демократию был лишь спотыканием, намеренно вызванным революционерами и популистскими демагогами в их попытке расколоть Клику Юэ ради политической выгоды. Таким образом, чтобы по-настоящему внедрить демократию в будущем, мы просто должны установить период железного правления."

 GXC_democracys_last_line_of_defence: "Последняя линия обороны демократии"
 GXC_democracys_last_line_of_defence_desc: "Если Президенту-Маршалу Е Цзюю необходимо стать «дьяволом», который нужен Китаю для обеспечения условий демократии, то именно это он и сделает. Протолкнув законопроект, предоставляющий Президенту чрезвычайные полномочия в этот период военного положения, Президент-Маршал будет неустанно работать, чтобы обеспечить выполнение мечты Чэнь Цзюнмина."

##- RCF/WHC Dem RKMT Endgame Political Focuses
 GXC_the_tutelage_softens: "Смягчение Опеки"
 GXC_the_tutelage_softens_desc: "Наконец, после многих лет борьбы, истинно «чистые» фракции Гоминьдана вернулись к рулю, намереваясь обеспечить эффективный, быстрый и действенный период Опеки. Неся факел вечно вперед, Национальная революция больше не будет обязана вопиющим антиконституционалистам и властным демагогам, в конце концов, «быть чиновником — значит служить народу»."

 GXC_victory_of_the_reconstruction_faction: "Победа Фракции реконструкции"
 GXC_victory_of_the_reconstruction_faction_desc: "Истинный наследник своего отца и покойного Премьера, Фракция реконструкции Гоминьдана в западном стиле Сунь Фо спасла положение. Пережив шторм и кризисы, постигшие оба крыла Гоминьдана, центристы-либералы сумели захватить умы избирателей своей платформой достижения истинной демократии для китайского народа."

 GXC_demonstrating_the_democratic_spirit: "Демонстрация демократического духа"
 GXC_demonstrating_the_democratic_spirit_desc: "Поскольку либералы постоянно шагают к истинной демократии, а недавние внутренние конфликты чуть не стоили всей Национальной революции, поощрение демократических идеалов должно поощряться, чтобы подготовить народ к концу Опеки; на этом основании мы должны начать массовую образовательную кампанию, чтобы воспитать общественный интерес к политическим делам."

 GXC_national_revolution_driven_by_the_railway: "Национальная революция, движимая железной дорогой"
 GXC_national_revolution_driven_by_the_railway_desc: "Как видно по всему миру, каждая по-настоящему современная нация, каждая нация, способная утвердить себя на международной арене, имеет один общий фактор: обширные, грохочущие железные дороги. Абсолютный ключ к успешной фазе политической опеки требует решения проблемы эндемической национальной бедности Китая, и посредством расширения железных дорог страны мы вполне можем этого достичь."

 GXC_young_minds_for_a_new_age: "Молодые умы для новой эры"
 GXC_young_minds_for_a_new_age_desc: "В одном из своих последних амбициозных начинаний Сунь Фо стремился создать Институт Сунь Ятсена по продвижению культуры и образования. Созданный для распространения учений Сунь Ятсена, институт надеется развеять заблуждение, что Три принципа предназначены только для Гоминьдана. Ибо учения Гофу принадлежат всем людям, и самое главное — молодежи."

 GXC_de_caste_ifying_the_party: "Устранение кастовости в партии"
 GXC_de_caste_ifying_the_party_desc: "Хотя номинально объединенная взаимным желанием революционных идеалов партии и преданностью доктору Суню, после неудачной смерти последнего партия распалась на множество каст, клик и фракций, изобилующих распрями. Нельзя было продвинуться внутри партии, не подружившись с нужными чиновниками. Чтобы исправить это, мы абсолютно обязаны уравнять членство в партии, чтобы гарантировать продвижение по заслугам, а не по связям."

 GXC_a_coalition_for_tomorrow: "Коалиция завтрашнего дня"
 GXC_a_coalition_for_tomorrow_desc: "Полагая, что демократическая идея по своей сути является левой концепцией, Сунь Фо заявил, что Три народных принципа — это идеи «левых», а не «правых», и что сотрудничество с левыми элементами партии жизненно важно для обеспечения успеха и прогресса революции. Чтобы обеспечить демократию в Китае, партия должна вернуться от «правых» к «левым»."

 GXC_a_china_safe_for_liberalism: "Китай, безопасный для либерализма"
 GXC_a_china_safe_for_liberalism_desc: "Утверждая, что распространенность социалистической мысли в Китае является серьезной эпидемией, Сунь Фо твердо верит в примат учений своего отца как наиболее применимых к китайской среде, ибо если социализм привлечет революционную молодежь, они отойдут от Трех народных принципов. Поэтому мы должны поддерживать широкую центристскую коалицию, чтобы защитить революцию."

 GXC_true_self_government: "Истинное самоуправление"
 GXC_true_self_government_desc: "Научив людей отбрасывать ошибочную концепцию, что военная сила является решением всех проблем Китая, мы теперь должны приступить к созданию истинного местного самоуправления, ибо если мы потерпим неудачу в этом, как мы сможем осуществить реконструкцию? С этой целью мы должны изменить психологию людей, чтобы научить их тому, что местное самоуправление не так сложно, как они себе представляли, и только после этого мы сможем обучать лидеров для местного самоуправления."

 GXC_the_first_step_to_democracy: "Первый шаг к демократии!"
 GXC_the_first_step_to_democracy_desc: "Поистине революция Гоминьдана — это демократическая революция. Рожденный из огня Синьхая, первый Северный поход был поистине первым наступлением демократии, наносящим ответный удар автократам, контролирующим народ. Борясь в изгнании в Москве и Париже, в Гуйчжоу и даже Фуцзяни, после всего, что мы пережили, мы наконец можем сделать первый шаг к выстраданному демократическому идеалу Премьера."

 GXC_promote_youth_activism: "Продвигать молодежный активизм"
 GXC_promote_youth_activism_desc: "Революция не может восторжествовать без вовлечения будущих поколений в выработку политики и политический активизм; создав ранее молодежные общества, мы должны и дальше обеспечивать сотрудничество и осведомленность младших членов нашего общества. Продвигая предыдущие планы по созданию групп китайских бойскаутов и герлскаутов, следующее поколение также будет погружено в Три принципа."

 GXC_political_consultative_conference: "Политическая консультативная конференция"
 GXC_political_consultative_conference_desc: "Движение к истинному конституционному правлению — задача не из легких; чтобы достичь такого триумфа, мы должны создать межпартийную конференцию, чтобы четко и эффективно наметить наиболее эффективный переход от доминирования партийного государства к просвещенному законодательному органу, прислушивающемуся ко всем слоям китайского общества. К счастью, в Партии есть некоторые из величайших юридических умов и законодателей Китая, чтобы помочь в этом начинании."

 GXC_initiate_land_reform: "Начать земельную реформу"
 GXC_initiate_land_reform_desc: "Было бы мудро скептически относиться к массовому движению, однако, следуя доктрине, изложенной покойным премьером доктором Сунем, Гоминьдан должен начать национальную программу земельной реформы, чтобы устранить несправедливость, с которой сталкиваются в повседневной жизни китайские рабочие и крестьянство. Однако, в отличие от более радикальных фракций внутри Гоминьдана, мы открыты для того, чтобы не перегибать палку слишком сильно в одном направлении."

 GXC_draft_a_provisional_constitution: "Разработать Временную конституцию"
 GXC_draft_a_provisional_constitution_desc: "Двигаясь все дальше к демократическому идеалу, мы собрали наши лучшие умы, чтобы разработать новую Временную конституцию для Национального правительства, направленную на расширение свобод при сохранении примата законности. Однако ряд вопросов все еще нуждается в проработке — а именно президентство — и поэтому все демократические фракции должны внести свой вклад в будущее правительства."

 GXC_enshrine_the_primacy_of_law_and_order: "Закрепить верховенство закона и порядка"
 GXC_enshrine_the_primacy_of_law_and_order_desc: "Обеспечение будущего и безопасности китайского народа имеет первостепенное значение для правительства Гоминьдана. Больше они не будут обязаны милитаристам, бандитам или аристократам. Права китайского человека будут полностью защищены правительством, ибо Гоминьдан желает только улучшения положения нашего народа и счастья в его жизни. В конце концов, все равны перед законом."

 GXC_the_five_yuan_government: "Правительство Пяти юаней"
 GXC_the_five_yuan_government_desc: "Правительственная структура, изложенная доктриной Гоминьдана, следует схеме из пяти ветвей власти, каждая из которых отвечает за отдельные функции в управлении нацией. Чтобы подчеркнуть идею примирения и надежду отойти от прошлых конфликтов, назначение фигур на различные должности в правительстве будет производиться из разных фракций, охватывая истинный масштаб и идеи широкого Гоминьдана."

 GXC_valuing_the_pen_over_the_sword: "Ценить перо выше меча"
 GXC_valuing_the_pen_over_the_sword_desc: "В то время как Национально-революционная армия служит, возможно, физической силой Национальной революции, интенсивная политизация армии привела к многочисленным случаям, когда правительство должно было кланяться военным, чтобы обеспечить непрерывное функционирование и успех революции. В качестве примера этого хаос, возникший в результате силовой игры Ли Цзунжэня, подчеркнул необходимость аполитичной военной силы."

 GXC_constitutionalism_triumphs_regionalism: "Конституционализм побеждает регионализм"
 GXC_constitutionalism_triumphs_regionalism_desc: "Несчастливое напоминание о прагматизме, необходимом для обеспечения успеха Национальной революции: многие милитаристы получили амнистию или даже были интегрированы в правительственную структуру нашими предшественниками. Теперь, когда стабильность была обеспечена действующим правительством, и с переходом к конституционному правлению, мы должны нанести удар в самое сердце этих местных автократов, ибо в новом Китае нет места милитаристам."

 GXC_the_cabinet_takes_the_lead: "Кабинет берет руководство на себя"
 GXC_the_cabinet_takes_the_lead_desc: "Наконец, после десятилетий борьбы, угольки и огонь демократии ярко горят в Китае. С плавным переходом от политики Демократического централизма наших предшественников к Демократическому консенсусу сегодняшнего дня, будущее китайской нации сияет ярко для всех. Поистине, мы преуспели в видении доктора Сунь Ятсена для нации, даже если путь к его достижению был не таким прямым."

 GXC_triumph_of_the_western_hills: "Триумф Сишань"
 GXC_triumph_of_the_western_hills_desc: "Непредсказанный многими, изначальный «истинный правый» и стойкий хребет партии с самого начала выдержал шторм и преодолел все трудности. Расширившись из своей простой деревушки в Сишане, Клика Сишань наконец утвердила примат старой гвардии в делах Партии. Антисиндикалистская до крайности и ценящая конституционализм превыше всего, она представляет собой весьма своеобразный путь для революционной партии."

 GXC_reviving_the_pure_party: "Возрождение «Чистой» партии"
 GXC_reviving_the_pure_party_desc: "Те, кто пытался примирить социализм и Три принципа, те, кто пытался вести переговоры с Китайской синдикалистской партией, они лишь запятнали первоначальный замысел Суня. Сишань должен воссоздать «чистую» партию с «чистой» идеологией, ибо все те, кто действует против интересов тридемизма слева или справа, они лишь враги партии. Враги, с которыми нужно разобраться."

 GXC_empowering_the_national_legislature: "Наделение полномочиями национального законодательного органа"
 GXC_empowering_the_national_legislature_desc: "Хотя мы и знакомы с концепциями и идеями, выдвинутыми федералистским движением, мы члены Гоминьдана в первую очередь. Какие бы личные связи у нас ни были, концепция централизма является необходимой для предотвращения повторения такой катастрофы, как Эра милитаристов. Власть должна быть централизована в законодательном органе для всей нации."

 GXC_abolish_the_political_council: "Упразднить Политический совет"
 GXC_abolish_the_political_council_desc: "Хотя, естественно, будучи преданными и верными последователями Гофу, Сишань высоко ценит идеологию и действия доктора Суня, многие из его менее чем... продуманных начинаний продолжали калечить и сковывать партию. Единый фронт, например. Или, что гораздо более насущно, Политический совет. Орган, стоящий над Центральным исполнительным комитетом, стал слишком громоздким, чтобы оставаться в новом Китае."

 GXC_constructing_a_legalistic_legacy: "Создание легистского наследия"
 GXC_constructing_a_legalistic_legacy_desc: "Укомплектованная некоторыми из величайших юридических умов нации, Клика Сишань всегда отводила особое место введению конституционализма и легизма в китайской нации. Под эгидой Цзюй Чжэна приток покинутых солдат и политиков получит тщательное судебное разбирательство. Точно так же Судебная система в целом будет оживлена и акцентирована."

 GXC_vigilance_against_the_eternal_threat: "Бдительность против вечной угрозы"
 GXC_vigilance_against_the_eternal_threat_desc: "Слишком долго Ван Цзинвэй и его паства сбивали Национальную революцию с пути. Построенный на вероломной политике «Единого фронта» с подлыми китайскими синдикалистами, он почти курировал разрыв независимости Гоминьдана. Обязанный не китайскому народу, а своим хозяевам в Париже и Лондоне. Они предатели и должны быть исключены из партии, точно так же КСП не место в новом Китае."

 GXC_salvation_for_the_sinners: "Спасение для грешников"
 GXC_salvation_for_the_sinners_desc: "В наших усилиях по дальнейшему определению приоритетов чистоты, единства и силы Гоминьдана мы добились больших успехов в искоренении гнили и разлагающего влияния Партии. Однако это не окончательный вопрос, решенный полностью. Многие левые в партии могут быть искуплены, если они просто отрекутся от Единого фронта, Интернационала и своих связей с китайскими синдикалистами."

 GXC_restoration_of_self_confidence_in_chinese_culture: "Восстановление уверенности в китайской культуре"
 GXC_restoration_of_self_confidence_in_chinese_culture_desc: "Изложенная в «Философских основах суньвенизма», философская основа Принципа народного благосостояния базируется на традиционной этической и политической философии Китая. Фактически, тридемизм возник из традиционной ортодоксальной мысли Китая, то есть конфуцианства. В таком случае нужно гордиться китайской культурой, ибо она наполняет революционные движения даже сейчас."

 GXC_nation_building_from_the_root: "Нациестроительство от корня"
 GXC_nation_building_from_the_root_desc: "«Чтобы сделать китайскую нацию энергичной и нести вперед великую цивилизацию прошлых тысяч лет, нужно начать с образования. Ибо обширная земля — это не сокровище, и большого населения недостаточно, чтобы на него полагаться. Только мораль и знания являются основами жизни и страны». Как утверждал Линь Сэнь и поддерживал Цзоу Лу, образование является источником всего национального спасения."

 GXC_datong_of_benevolence_and_love: "Датун благожелательности и любви"
 GXC_datong_of_benevolence_and_love_desc: "Датун — означающее «Великое Единение» — это истинное конечное состояние, ради которого весь Гоминьдан неустанно трудится. В то время как такие люди, как Ху Ханьминь, желали своей собственной формы датун, истинная гармония может быть принесена только через принципы благожелательности и любви. Ибо они являются краеугольными камнями китайской культуры и фундаментальным духом Революции. Без этого нет фундаментальной основы для Датун."

##- EDC/NGD/NGX Auth RKMT Endgame Focuses
 GXC_the_might_of_the_revolution: "Мощь революции"
 GXC_the_might_of_the_revolution_desc: "Наконец, трансформация, начатая в 1911 году, достигла своего завершения благодаря неустанным усилиям истинных китайских патриотов. Попытки ослабить и извратить партию Гоминьдан провалились, и истинно революционные лидеры находятся у власти. Теперь, когда весь Китай по праву находится в наших руках, пришло время обратиться внутрь и восстановить страну так, как хотел бы доктор Сунь."

 GXC_vision_of_the_elders_clique: "Видение Клики старейшин"
 GXC_vision_of_the_elders_clique_desc: "Перед лицом любой возможной оппозиции, от позора в собственной партии и отправки в изгнание, до наблюдения за тем, как первый Северный поход рушится под тяжестью тирании, до столкновения с теми в гражданском и военном крыльях партии, кто пытался развратить революцию в своих корыстных целях, Ху Ханьминь выстоял и преуспел. Теперь видение покойного доктора Суня наконец будет реализовано, поскольку его истинный наследник восходит на свое законное место."

 GXC_enforce_mass_demobilisation: "Осуществить массовую демобилизацию"
 GXC_enforce_mass_demobilisation_desc: "Милитаризм стал ненасытным в своем аппетите, подчинив себе как собственных граждан, так и людей завоеванных земель. Однако милитаризм — это больше, чем просто желание земли и богатства. Погоня за пустой славой, ненависть одной расы к другой, культурное высокомерие, связанное с «высшей культурой», все это стимулировало милитаристские авантюры. Как одно из великих зол мира, оно не может существовать в Китае Ху."

 GXC_the_six_years_of_necessary_tutelage: "Шесть лет необходимой опеки"
 GXC_the_six_years_of_necessary_tutelage_desc: "Это не просто наша миссия, но наш долг — научить китайский народ, который так долго был раздавлен империалистической пятой, важности Трех принципов доктора Суня. Это время не для уныния, а для радости, так как в эти шесть коротких лет Даньго Китай будет электризован смелыми инициативами Ху в законодательстве, науке и искусстве. Теперь, когда истинный наследник доктора Суня взял на себя инициативу, нельзя не чувствовать гордость за светлое будущее Китая."

 GXC_the_exceptional_legislator: "Исключительный законодатель"
 GXC_the_exceptional_legislator_desc: "Выдающийся и превосходный писатель, теоретик и демагог, литературная карьера Ху Ханьминя столь же знаменательна, сколь и плодовита. Ворвавшись на сцену со своими поразительными статьями в «Миньбао», Ху долгое время был спичрайтером и секретарем покойного Гофу. Превосходный архитектор литературной прозы, законодательство Ху никогда не переставало переводить дыхание, пока Председатель пишет свой путь к выполнению Национальной революции, документ за документом."

 GXC_emphasize_a_speedy_tutelage: "Акцент на быстрой опеке"
 GXC_emphasize_a_speedy_tutelage_desc: "Естественно, коррупция нового положения, в котором оказалась партия, не ограничивается отдельными лицами. Ибо партия в целом может стать привилегированным классом, отделенным от народа. «В этой революции всего народа мы абсолютно не можем терпеть существование классов. Как же тогда мы можем позволить себе право стать отдельным классом?» Партия не должна задерживаться дольше своей цели: быть сосудом Национальной революции."

 GXC_compromise_on_an_organic_law: "Компромисс по Органическому закону"
 GXC_compromise_on_an_organic_law_desc: "Предпочитая проводить свою администрацию и правительство через «Органический закон» или иным образом через декреты, как предписано в плане Трехэтапной национальной революции во время Фазы опеки, стало совершенно очевидно, что такая глупая практика не может оставаться. Осаждаемые как Сишань, так и Реконструкцией, возможно, благоразумно пойти на компромисс в деталях, чтобы Партия не скатилась в автократию."

 GXC_enacting_pingminhua: "Введение Пинминьхуа"
 GXC_enacting_pingminhua_desc: "Если бы партия когда-либо оторвалась от масс, она фактически стала бы «контрреволюционной». Чтобы предотвратить это, партия должна последовательно приводить свои взгляды и стиль работы в соответствие с таковыми у простых людей. Как диктовал Ху Ханьминь, такой процесс назывался «Пинминьхуа» или иначе «Популяризация партии». Партия должна вести массы, а массы должны направлять Партию."

 GXC_principled_man_in_an_unscrupulous_world: "Принципиальный человек в беспринципном мире"
 GXC_principled_man_in_an_unscrupulous_world_desc: "Снова и снова, перед лицом постоянно растущих невзгод, Ху Ханьминь доказывал, что является самым достойным учеником Сунь Ятсена. В резком контрасте с морем коррупции и тирании, которое когда-то душило нашу нацию, Ху Ханьминь не только устоял перед искушением автократии, но и довел мечту доктора Суня о свободном и едином Китае до завершения. Поистине Молодой ученик оказался достоин Старого мастера."

 GXC_promise_a_thorough_tutelage: "Обещание тщательной опеки"
 GXC_promise_a_thorough_tutelage_desc: "Как предписано доктором Сунь Ятсеном, фаза Опеки должна длиться не более шести лет, и поэтому мы должны максимально использовать график, завещанный нам Гофу. К сожалению, доктору Суню, возможно, самому не хватало внутренней дисциплины и последовательности, чтобы позволить революционному движению и фазе Опеки быть эффективными. Однако под эгидой Ху Три принципа будут применяться тщательно."

 GXC_scientific_progress: "Научный прогресс"
 GXC_scientific_progress_desc: "Ху Ханьминь давно утверждал, что почитание научного прогресса необходимо для успеха возрождения и революции Китая. В отличие от социалистов в партии, которые почитают насильственную и ненужную классовую борьбу, Ху Ханьминь видел, что истинный метод достижения Датун лежит через чудеса науки. Чем больше мы продвигаемся, тем ближе мы подходим к Китаю, который производит изобилие на благо всех."

 GXC_revive_mans_spirit: "Возродить дух человека"
 GXC_revive_mans_spirit_desc: "Почти сломленная за свое бурное время нахождения в центре внимания и вне его, Партия довольно очевидно потеряла свой революционный дух. И если партия не сохраняет ничего из той энергии, которая у нее когда-то была, как можно побудить Человека и Массы к революционному будущему? Хорошие лидеры, наделенные высоким чувством политической добродетели, которые правят честно и искренне, позаботятся о возрождении партии."

 GXC_dream_of_a_revolutionary_future: "Мечта о революционном будущем!"
 GXC_dream_of_a_revolutionary_future_desc: "В эти годы опеки мы теперь смотрим вперед на конечную миссию Гоминьдана: стремление к Датун, «Великому Единению». Ху Ханьминь долго утверждал, что самоотверженная любовь, или «по-ай», должна быть фундаментом человеческих начинаний, и именно к этой самоотверженной благотворительности стремится наша партия сейчас. Гоминьдан играет уникальную роль в определении будущего Национальной революции, и мы должны вести массы к такой утопической мечте."

 GXC_a_true_revolutionary_in_chinas_darkest_hour: "Истинный революционер в темнейший час Китая"
 GXC_a_true_revolutionary_in_chinas_darkest_hour_desc: "Если Партия хочет достичь цели национальной революции и стать партией масс, то она не может полагаться исключительно на дух самодисциплины со стороны своего членства. Она должна обладать всеобщей и принудительной дисциплиной, которой обладает только революционная массовая политическая партия. Избегая любого культа идолопоклонства, Ху счел целесообразным, чтобы Партия, а не он сам, взяла на себя ответственность за Революцию Китая."

 GXC_training_of_the_four_rights: "Обучение четырем правам"
 GXC_training_of_the_four_rights_desc: "Одной из основ миньцюань является идея доктора Суня о четырех основных правах: правах народа на выборы, отзыв, референдум и инициативу. Наш долг как партии китайского народа — обучать, воспитывать и поощрять эти четыре основных права среди них, ибо фаза Опеки может быть завершена только населением, которое продемонстрировало способность к сознательному самоуправлению."

 GXC_dominance_of_new_guangdong: "Доминирование Нового Гуандуна"
 GXC_dominance_of_new_guangdong_desc: "По мере того как пыль национального объединения оседает, внутри Гоминьдана возникла неловкая диархия между двумя могущественными кантонцами: Ху Ханьминем, идеологом и революционером, и Чэнь Цзитаном, милитаристским регионалистом. Хотя оба человека разделяют общее кредо, обожание народа и революционное родство, ни Ху, ни Чэнь не склонны играть вторую скрипку друг другу. И все же взаимовыгодное соглашение Нового Гуандуна будет держаться, пока что."

 GXC_junmin_funzhi: "Цзюньминь Фэньчжи"
 GXC_junmin_funzhi_desc: "Идея Чэнь Цзитана о «Цзюньминь Фэньчжи», разделении гражданского и военного правительств, нашла себе не более показательное место, чем сама Диархия. Ху Ханьминь и его гражданское крыло управляют нацией, Чэнь Цзитан и Новая гуандунская клика доминируют на военных постах. С неустанным призывом Ху к Партии следовать учению Сунь Ятсена и действовать самоотверженно и преданно, возможно, это будет больше, чем фасад."

 GXC_guardians_of_the_guofus_legacy: "Хранители наследия Гофу"
 GXC_guardians_of_the_guofus_legacy_desc: "Историческая миссия последователей Саньминьчжуи — видеть защиту и распространение наследия Суня. И не будет преувеличением сказать, что сам Ху Ханьминь является хранителем наследия, которое Сунь завещал Гоминьдану. Защищая Три принципа от вероломных щупалец синдикализма и социальной анархии, Ху перешел к борьбе внутри партии; той, которую осаждают коррупция и бюрократизм."

 GXC_the_revolutionary_diarchy_exalted: "Революционная диархия возвеличена!"
 GXC_the_revolutionary_diarchy_exalted_desc: "Чэнь Цзитан, конфуцианский генерал Новой эры, и Ху Ханьминь, самый ортодоксальный ученик доктора Суня, рассматривались бы как маловероятное партнерство любым посторонним, не знакомым с политическим развитием Кантонского революционного движения. Тем не менее, на протяжении всего времени до и после изгнания, премьер Чэнь последовательно и горячо поддерживал Ху силой оружия. При Диархии Китай приближается к своей постепенной эпохе, а затем и к Датуну."

 GXC_intensify_local_self_government_programmes: "Активизировать программы местного самоуправления"
 GXC_intensify_local_self_government_programmes_desc: "Ответственность Гоминьдана — направлять и обучать аморфные массы через организацию массовых движений. Лидерство в таких массовых движениях, естественно, должно обеспечиваться представителями образованных классов. При таком разном уровне способностей вполне логично, что партия подходит к массам патерналистски, культивируя деликатное пробуждение в массах. После чего последует Конституционализм."

 GXC_control_the_means_of_the_masses: "Контроль над средствами масс"
 GXC_control_the_means_of_the_masses_desc: "«Шаг за шагом мы будем пробуждать массы, и шаг за шагом мы будем предпринимать действия от их имени. Мы не должны заставлять массы внезапно питать экстравагантные надежды, только чтобы позже испытать разочарование». Крайне важно, чтобы только Партия, и только доверенные лица внутри Партии, имели возможность влиять на процесс принятия решений Массами. Посторонние осудили бы авторитаризм, но такие действия рождаются из истинной любви."

 GXC_new_guangxi_unbowed: "Новая Гуанси не сломлена"
 GXC_new_guangxi_unbowed_desc: "История показала нам, что у Китая есть враги со всех сторон. Европейские империалисты унижали нас столетие, а Япония стремилась вторгнуться и подчинить нас напрямую. Китай должен быть самодостаточным, он должен идти своим путем, он должен быть сильным и непоколебимым. Чтобы быть маяком националистической демократии в мире, охваченном влиянием чуждой идеологии и повсеместного милитаризма, только Новая Гуанси может взять бразды правления."

 GXC_liangguang_piedmontism: "Лянгуанский Пьемонтизм"
 GXC_liangguang_piedmontism_desc: "Гуанси и Гуандун долгое время рассматривались как «образцовые провинции», и это только усилилось в недавней памяти, поскольку они стали домом революции Гоминьдана. Теперь, когда эта революция завершена, обе провинции ожидают определенного особого отношения. Хотя это якобы осуждается как «новый» милитаризм, было предложено использовать провинции Гуанси и Гуандун в качестве основы для обновления остального Китая."

 GXC_seek_unity_with_the_liberals: "Искать единства с либералами"
 GXC_seek_unity_with_the_liberals_desc: "Было бы глупо отрицать демократические амбиции Гоминьдана, поскольку, хотя это и революционная партия, проводящая Опеку и Военное правление, она тем не менее стремится к реализации всех Трех принципов. История показала, что «Третья сила» в китайской политике, то есть демократический мандат, оставалась неизменно присутствующей на всех этапах развития нации. Давайте наведем мосты ради нашего общего демократического желания."

 GXC_tighten_executive_prerogatives: "Ужесточить исполнительные прерогативы"
 GXC_tighten_executive_prerogatives_desc: "Снова и снова революция оказывалась под угрозой из-за череды предательств, распрей и нестабильности. Если огонь Гоминьдана не будет потушен внешней силой, он вполне может погибнуть от собственной ярости. Чтобы стать истинным вектором политических, социальных и военных изменений во всей нации и способствовать общему благу для народа, крайне важно, чтобы исполнительная власть сохраняла сильную власть."

 GXC_establish_kmt_revival_association: "Продвижение Ассоциации возрождения Гоминьдана"
 GXC_establish_kmt_revival_association_desc: "Под эгидой «преемников» Суня Гоминьдан видел только руины. Мелкие ссоры Ван Цзинвэя, Чан Кайши, Ляо Чжункайя и Ху Ханьминя привели партию к упадку. Теперь, когда Квадрумвират Новой Гуанси захватил власть, они сформировали Ассоциацию возрождения Гоминьдана, чтобы очистить ряды от некомпетентных. Новая Гуанси обещает полное возвращение к первоначальным идеалам доктора Суня, свободным от радикальных извращений."

 GXC_replicate_the_qi_hegemony: "Повторить гегемонию Ци"
 GXC_replicate_the_qi_hegemony_desc: "Во время древней династии Чжоу, в разгар дестабилизации, вызванной кризисом престолонаследия Весны и Осени, Государство Ци возвысилось над другими благодаря своим беспрецедентным реформам при министре Гуань Чжуне. Ци было разделено на 21 район с военными и гражданскими функциями, все под мощным и способным центральным правительством. Ци долгое время служило примером и вдохновением для Новой клики Гуанси, которая теперь стремится повторить его обширные реформы."

 GXC_champion_local_democratic_initiatives: "Поддержка местных демократических инициатив"
 GXC_champion_local_democratic_initiatives_desc: "Хотя Новая клика Гуанси сильно централизовала власть вокруг верных товарищей Квадрумвирата, у нее нет ложных претензий на абсолютную диктатуру. Создав коалицию «Крестовый поход за свободный демократический Китай», такие группы, как Фронт свободы Демократической конституционной партии, Китайский демократический альянс, Китайские масоны/Общество Хунмэнь и Ассоциация сельского восстановления, участвуют в великой симфонии под руководством дирижера Ли."

 GXC_implement_nationwide_conscription: "Ввести общенациональный призыв"
 GXC_implement_nationwide_conscription_desc: "Хребтом Гоминьдана с самого начала был народ Китая, идеологически мотивированный стать патриотами доктором Сунем и массовым движением. Если мы хотим защитить революцию дальше, мы должны ввести теорию Новой Гуанси «Юбин Ютуань» — объединения армии и ополчения. Ибо китайский гражданин должен стать подвластным государству, если он хочет увидеть Конституционное правление. Государство направляет Народ, пока тот сражается за Государство."

 GXC_ensure_civilian_control_over_the_military: "Обеспечить гражданский контроль над армией"
 GXC_ensure_civilian_control_over_the_military_desc: "Если армия не служит собственному народу, она немногим больше, чем конфедерация грубых головорезов и бандитов. Несмотря на наше скромное происхождение, Новая клика Гуанси является антитезой этому бандитизму. Присущие опасности построения национального государства сверху и из центра, управляемого подобно военной организации, — это лишь дорогостоящий и эфемерный обман китайской нации."

 GXC_a_chinese_wehrstaat: "Китайский Верштат"
 GXC_a_chinese_wehrstaat_desc: "Самая интересная копия модели Гражданского ополчения Новой Гуанси появилась в Европе. В почти параллельном направлении мысли и в общем желании избавиться от гедонистических эгоистичных ценностей, присущих современному декадентскому обществу, теоретики в Германии вынашивали концепцию программ, мобилизующих истинный потенциал граждан нации. Хотя она и отклоняется от подчинения военным, подобно «Верштату» (Военному государству), она тем не менее имеет свою пользу."

 GXC_guangxi_citizen_stratocracy: "Гражданская стратократия Гуанси"
 GXC_guangxi_citizen_stratocracy_desc: "Гений провинции Гуанси, первой мобилизовавшей народную волю в единую лояльную силу, а теперь ставшей домом победившей революции Гоминьдана, был распространен как модель для реализации по всему Китаю. Партия была тщательно очищена от бесполезных бюрократов, некомпетентных солдат и мелких фракционеров. Мы восстановили Гуанси и тем самым возродили Китай!"

 GXC_fate_of_counter_revolutionaries: "Судьба контрреволюционеров"
 GXC_fate_of_counter_revolutionaries_desc: "Милитаристы, империалисты, капиталисты и другие стремились сокрушить нашу революцию и поработить Китай снова, и теперь должны быть сурово наказаны. Однако мы не должны быть выше того, чтобы проявить милосердие к единомышленникам-генералам, готовым предоставить свое оружие. Эти контрреволюционеры могут проявить свое раскаяние, помогая нам в нашей борьбе за выполнение Опеки."

 GXC_remnants_of_the_shattered_opposition: "Остатки разбитой оппозиции"
 GXC_remnants_of_the_shattered_opposition_desc: "Оппозиция нашей партии, как внутри, так и снаружи, скатилась в хаос после нашей победы. И все же нельзя не пролить слезу в свете междоусобицы тех, кто когда-то был революционными братьями. Разве мы не стремились к одной цели? К выполнению Трех принципов? Давайте подойдем к нашему ближнему не как к врагу или противнику, а как к другу и союзнику, брату и сестре в революционной гармонии."

 GXC_initiate_national_land_reform: "Начать национальную земельную реформу"
 GXC_initiate_national_land_reform_desc: "Теперь, когда Китай объединен под одним знаменем, пришло время выполнить инструкции, данные нам великим доктором Сунем, и начать национальную земельную реформу. Несколько членов партии выдвинули разные идеи относительно масштаба земельной реформы, от мелкомасштабного перераспределения до полной национализации, но все согласны с тем, что феодализм, милитаризм и империализм будут подавлены, а народ Китая получит причитающееся."

 GXC_promote_national_literacy: "Продвигать национальную грамотность"
 GXC_promote_national_literacy_desc: "Как революция китайской народной воли, мы теперь обращаемся к народу Китая, большая часть которого все еще борется под тяжестью крайней нищеты и неграмотности. Образование — это антитеза рабства, и поэтому, следуя предписанному процессу фазы Опеки, мы проведем радикальные реформы, чтобы поощрять грамотность, образование и политическое участие. Ибо Местное самоуправление требует населения, которое может принять чудеса языка."

 GXC_form_patriotic_youth_organisations: "Формировать патриотические молодежные организации"
 GXC_form_patriotic_youth_organisations_desc: "Как способ продвижения как молодежного активизма, так и самосовершенствования, наша администрация сформировала несколько национальных скаутских организаций по всей стране. Главной среди них является Молодежная лига Саньминьчжуи, возглавляемая Чжан Чжунжэнем и Чжан Сяолин, которых хвалили и продвигали как пример для всей гордой националистической молодежи. Ибо принципы доктора Суня предназначены не только для партии, но и для всех китайцев; Молодых и Старых."

 GXC_rekindle_the_revolutionary_spirit: "Вновь зажечь революционный дух"
 GXC_rekindle_the_revolutionary_spirit_desc: "Давайте никогда не забудем бесконечное унижение, которое претерпел Китай под властью милитаристов, капиталистов и империалистов, прежде чем Гоминьдан спас его. Мы должны напомнить народу Китая о новой, полной надежд и революционной истории, высеченной в анналах истории писцами партии доктора Суня. Революционный дух масс все еще сохраняется даже в их нынешней покорности, Партия должна просто подстегнуть их пыл и направить его на Революцию."

 GXC_enshrine_the_guofu: "Почитание Гофу"
 GXC_enshrine_the_guofu_desc: "Без Гофу и его Трех народных принципов не было бы ни Синьхая, ни Гоминьдана, ни Тунмэнхоя, ни Синчжунхоя, ни Северного похода, ни какого-либо распространения ярости простого народа против своих угнетателей. С тяжелым сердцем мы сознаем, что доктор Сунь не смог продержаться достаточно долго, чтобы увидеть выполнение своей революционной миссии, однако его дух продолжает жить в доктрине Партии."

##- PPP/GPA/GFA Soc LKMT Endgame Focuses
 GXC_taking_on_the_chinese_socialist_mantle: "Взятие мантии китайского социализма"
 GXC_taking_on_the_chinese_socialist_mantle_desc: "Хотя наши высокомерные товарищи в Нанкине заняли центральное место во время национального объединения, их злоупотребления и тираническое руководство привели к тому, что мы перешли из массовки на сцену. Истина в том, что в победе всегда много рук, и хотя мы все когда-то были политическими изгоями даже среди левых, мы перевернули ситуацию и заняли свое законное место спасителей народа."

 GXC_campaign_to_suppress_counter_revolutionaries: "Кампания по подавлению контрреволюционеров"
 GXC_campaign_to_suppress_counter_revolutionaries_desc: "Несмотря на нашу славную победу в гражданской войне, страна полна контрреволюционеров, ведущих в конечном итоге обреченную кампанию сопротивления. Через акты, граничащие с терроризмом, милитаристы, остатки Центрального комитета и бандиты — все стремятся ослабить наше государство и свергнуть его. Благодаря тщательной кампании истребления, переходя от опорного пункта к опорному пункту, наше правление будет полностью обеспечено."

 GXC_fate_of_the_nanjing_nra: "Судьба Нанкинской НРА"
 GXC_fate_of_the_nanjing_nra_desc: "Поскольку основные силы Национально-революционной армии распались в ходе Гражданской войны в Китае, они сумели утянуть за собой и нашу собственную ветвь НРА. Правительство должно стремиться провести серию судебных процессов, чтобы наконец положить конец Нанкинской НРА, разобравшись с различными лидерами и остатками, с конечной целью избавить наше правительство и нашу собственную армию от их пагубного влияния."

 GXC_reform_through_labour: "Исправление через труд"
 GXC_reform_through_labour_desc: "Поскольку наша национальная экономика разорвана на части, а великий экономический недуг наступил, нашему правительству в конечном итоге требуется крайний и радикальный ответ, чтобы быстро наводнить ситуацию. Приступая к программе «Исправление через труд», мы наймем народ и диссидентов работать в гармонии, чтобы произвести великое восстановление экономики!"

 GXC_begin_the_land_reform_movement: "Начать Движение за земельную реформу"
 GXC_begin_the_land_reform_movement_desc: "Неотъемлемой частью всех революционных движений, как Гоминьдана, так и Китайской синдикалистской партии, является неотъемлемый акт инициирования национального движения за земельную реформу, ибо Китай — это страна, полная почти феодальных практик и изобилующая злыми шэньши. Наша партия будет курировать ряд предложений по земельной реформе, все они несут бремя решения будущего китайского народа."

 GXC_the_third_party_prevails: "Третья партия торжествует"
 GXC_the_third_party_prevails_desc: "Всегда балансируя на грани между Гоминьданом и Китайской синдикалистской партией, утверждение Тань Пиншаня губернатором Гуандуна и последующая победа в гражданской войне в Китае благодаря его восстанию вывели его «Третью партию» на национальную известность. Больше не обязанная идеалам Интернационала или доктора Сунь Ятсена, а являющаяся слиянием обоих, Федерация товарищей Трёх народных принципов является предвестником новой эры!"

 GXC_shaoshuren_geming: "Шаошужэнь Гэмин"
 GXC_shaoshuren_geming_desc: "Означая «Революция под руководством немногих», Тань Пиншань является решительным сторонником Революционной элиты, действующей как направляющая сила для широких масс в конечном стремлении к социализму. Однако наше движение многогранно, и перспективы революции скоро будут решены. До тех пор пусть революцию возглавляет Третья партия, и никто больше!"

 GXC_the_reign_of_terror: "Царство террора"
 GXC_the_reign_of_terror_desc: "Чтобы возглавить настоящую революцию, требуется царство террора для реализации нашей политики. Гоминьдану не хватило силы воли зайти так далеко, прячась за строгим периодом Опеки и завуалированными угрозами, в то время как Китайская синдикалистская партия была слишком бессильна, чтобы произвести много четких действий помимо мобилизации профсоюзов. Партия — это настоящие глашатаи революции, и террор будет ее направляющей силой!"

 GXC_dismantle_the_yellow_unions: "Ликвидировать Желтые профсоюзы"
 GXC_dismantle_the_yellow_unions_desc: "Гоминьдан в целом использовал различных капиталистических профсоюзных лидеров, чтобы сгонять стада масс на бойню. Эти «Желтые профсоюзы» — всего лишь ширма для деспотичных милитаристов и капиталистов, чтобы контролировать народ. Им нет места в нашей революции. Путем систематического демонтажа этих союзов мы можем обеспечить истинную преданность остальных."

 GXC_expand_provinical_party_committees: "Расширить провинциальные партийные комитеты"
 GXC_expand_provinical_party_committees_desc: "Хотя номинально революция возглавляется направляющей рукой Федерации товарищей Трёх народных принципов, в стране существуют провинциальные партии, которые могут обеспечить целенаправленное руководство, когда дело доходит до управления провинцией. Благодаря расширению провинциальных комитетов и некоторым заверениям в пределах их власти мы можем действительно видеть, что местные нужды, по крайней мере, услышаны."

 GXC_safeguard_the_workers_rights: "Защитить права рабочих"
 GXC_safeguard_the_workers_rights_desc: "Слишком долго китайский рабочий трудился под властью тиранических повелителей. Сначала династии прошлого, затем коррумпированные милитаристы Бэйяна и, наконец, заблудший Центральный комитет. Все стремились злоупотреблять рабочими в своих целях, некоторые более благожелательно, чем другие. С истинной партией рабочих, наконец пришедшей к власти, права рабочих будут тщательно защищены."

 GXC_the_passion_of_class_war: "Страсть классовой войны"
 GXC_the_passion_of_class_war_desc: "Восхваляемая всеми социалистическими движениями, Классовая война — это самый верный инструмент пролетариата для нанесения ответного удара своим хозяевам-капиталистам. Тань Пиншань знает это, как и Третья партия. Через наше Царство террора мы мобилизуем массы для борьбы в самой славной войне Революции. Восстаньте, китайские рабочие и крестьянство, сбросьте свои оковы и присоединяйтесь к Революции!"

 GXC_empower_the_council_of_public_security: "Наделить полномочиями Совет общественной безопасности"
 GXC_empower_the_council_of_public_security_desc: "Опускаться до такого гнусного правления, как массовый популизм, было бы противоположностью Революции и наверняка привело бы к бесцельному движению, склонному к насилию. Вместо этого будет создан новый правительственный орган, чтобы гарантировать, что Революция не превратится в самостоятельного зверя. Ибо если немногие не смогут контролировать многих, мы вполне можем быть свергнуты, как Чжили."

 GXC_in_the_footsteps_of_kautsky: "По стопам Каутского"
 GXC_in_the_footsteps_of_kautsky_desc: "Карл Каутский, чешско-австрийский марксистский теоретик, верил в подчеркивание ортодоксальной интерпретации марксизма, сосредоточенной на научном, материалистическом и детерминистском характере работ Маркса. Его убеждения верны для таких людей, как Тань Пиншань, который верил, что революция может прийти через постепенные революционные изменения, а не через прямое насилие, и поэтому, следуя по его стопам, Китайская революция будет построена на научных заслугах, а не на массовом насилии."

 GXC_establish_the_civic_forums: "Учредить гражданские форумы"
 GXC_establish_the_civic_forums_desc: "Чтобы поощрять революционную и новую культуру и устранять старую этику проституции, азартных игр и жадности — мы будем добиваться формирования общественных форумов в крупных городах Китая, где спорные вопросы, такие как избирательное право, гендерное равенство и отмена конфуцианского поклонения и идеологии, должны обсуждаться массами, чтобы просвещать народ."

 GXC_form_the_unemployment_relief_bureau: "Сформировать Бюро помощи безработным"
 GXC_form_the_unemployment_relief_bureau_desc: "Китай — место, лишенное сочувствия. Если вы не можете работать или иным образом производить для государства, вы просто выброшены в низшие слои общества, прося подачки. Больше такая серьезная несправедливость не останется незамеченной. С созданием Бюро помощи безработным мы можем гарантировать, что менее удачливые члены общества будут иметь средства для стабилизации своей жизни."

 GXC_establish_the_ministry_of_the_peasantry: "Создать Министерство по делам крестьянства"
 GXC_establish_the_ministry_of_the_peasantry_desc: "Третья партия — это партия, показательная своими двумя лицами. При одновременном фокусе на рабочих и крестьянах мы должны позаботиться о том, чтобы потребности обеих фракций пролетариата были удовлетворены. Чтобы помочь на фронте крестьянства, мы создадим министерство с единственной целью повышения их влияния по всей стране."

 GXC_revolutionary_new_culture: "Революционная новая культура"
 GXC_revolutionary_new_culture_desc: "В высшей степени Китайская революция должна быть построена на убеждениях истинно модернизирующейся культуры. Больше консервативные практики древнего Китая не будут перенесены в новую эпоху, а только классово сознательный народ, оправдывающий социалистические идеалы. Благодаря этому Третья партия может мобилизовать людей на борьбу против истинных Контрреволюционеров!"

 GXC_encourage_local_peasant_associations: "Поощрять местные крестьянские ассоциации"
 GXC_encourage_local_peasant_associations_desc: "Несмотря на провозглашение различных ориентированных на крестьян организаций для приоритетного удовлетворения их потребностей, крестьянство продолжает относиться к правительству с отчуждением. Неважно, с членами партии, выступающими за дальнейший подход к революции снизу вверх и опирающимися на существующие ассоциации, мы сформируем новую серию Местных крестьянских ассоциаций, чтобы постепенно политизировать крестьянство."

 GXC_reform_the_land_tax: "Реформировать земельный налог"
 GXC_reform_the_land_tax_desc: "Символизируя дисфункциональную природу прошлой эпохи, налоговая система Китая обычно применялась произвольно и без необходимости. Через единый фронт союзников, старых и новых, Тань Пиншань проследит за тем, чтобы самый тиранический из всех налогов, земельный налог, был тщательно реформирован, чтобы работать на государство, крестьянство и рабочих."

 GXC_strive_towards_universal_suffrage: "Стремиться к всеобщему избирательному праву"
 GXC_strive_towards_universal_suffrage_desc: "В нашем вечно славном марше к истинному уравниванию человечества китайская нация добилась больших успехов в последнее время. С огнями, зажженными Синьхаем, и принципиальной природой продолжающейся борьбы доктора Сунь Ятсена за демократию, Тань Пиншань и его движение должны подхватить эстафету. Вперед приливы прогресса будут вечно наступать. Вперед, за Всеобщее избирательное право для всех!"

 GXC_a_true_chinese_revolution: "Истинная китайская революция"
 GXC_a_true_chinese_revolution_desc: "В конечном счете, революции наших предков не были верны своим сердцам. Синьхай принес коррумпированную клептократию Бэйяна. Первая Национальная революция Гоминьдана привела к неудачному Северному походу, а вторая попытка Центрального комитета привела к катастрофической гражданской войне. Однако благодаря славному разуму Тань Пиншаня нация увидит Истинную китайскую революцию!"

 GXC_awaken_the_peoples_consciousness: "Пробудить народное сознание"
 GXC_awaken_the_peoples_consciousness_desc: "Наконец, с нашей победой в гражданской войне в Китае деспотическая тирания Гоминьдана подошла к концу! Крестьянство больше не будет подвергаться насилию, в гармоничном унисоне мы нанесем удар по сельскому и городскому пролетариату. Народ должен и узнает важную роль, которую каждый мужчина и каждая женщина должны сыграть в национальной и социальной революции, чтобы возродить китайскую нацию. Благодаря воле народа наша революция неизбежно преуспеет."

 GXC_begin_mass_collectivisation_efforts: "Начать усилия по массовой коллективизации"
 GXC_begin_mass_collectivisation_efforts_desc: "В сельской местности массы слишком долго страдали от капиталистических отношений, разделяемых фермером-арендатором и его арендодателем. Вполне естественно, что с успехом революции мы искореним понятие частной собственности и коллективизируем землю; чтобы приблизить нашу страну к примитивному социализму и демонтировать все оставшиеся феодальные пережитки в этой стране."

 GXC_longing_for_the_lost_golden_age: "Тоска по утраченному Золотому веку"
 GXC_longing_for_the_lost_golden_age_desc: "Двадцать лет гражданской войны тяжело давили на характер и душу крестьян, лишая их прежней простоты, трудолюбия, мира и честности — погружая их в пучины депрессии, нищеты и зависимости. Поистине, наше революционное дело — исправить это и гарантировать, что крестьянство представляет новый авангард социалистической и национальной революции."

 GXC_establish_the_peoples_communes: "Создать Народные коммуны"
 GXC_establish_the_peoples_communes_desc: "Как свидетельствует успех коммун Ассоциации фермеров Гуандуна во время партизанской войны против Чжили в Гуандуне, истинная мощь крестьянства заключается в локализованных, концентрированных центрах революционной активности. Участвуя в программе вербовки и мобилизации в наших сельских провинциях, люди действительно смогут реализовать свои основные права на самоуправление, а также поддерживать сельскохозяйственную производительность."

 GXC_the_association_of_labourer_sympathisers: "Ассоциация сочувствующих рабочим"
 GXC_the_association_of_labourer_sympathisers_desc: "По правде говоря, хотя мы можем сосредоточиться на борьбе крестьянства, китайский пролетариат составляет и другой класс. Рабочие в своих городских центрах продолжают томиться под сапогом капиталистов. Благодаря совместному правительственному сотрудничеству с «Ассоциацией сочувствующих рабочим» мы можем позаботиться о том, чтобы городской рабочий нашел согласие в Новом Китае."

 GXC_expel_the_landlords: "Изгнать помещиков"
 GXC_expel_the_landlords_desc: "Пожалуй, самый гнусный, отвратительный источник страданий и несчастий нации — помещики Китая — продолжают наживаться на усилиях крестьянства. Концептуально практикуя форму феодализма или даже рабства, пока класс помещиков существует в Китае — революционная борьба никогда не выйдет победителем. Пришло время массам принять неумолимые революционные страсти классовой войны."

 GXC_national_self_sufficency: "Национальное самообеспечение"
 GXC_national_self_sufficency_desc: "Слишком долго китайская нация подвергалась насилию со стороны иностранных капиталистов и империалистов, высасывающих из нации ее ресурсы, не оставляя почти ничего, кроме своих бесполезных «инвестиций» в качестве обещаний своей доброй воли. Такому отвратительному поведению нет места в Народной революции нового Китая! Мы должны стремиться к достижению истинного самообеспечения, чтобы сохранить согласованность в революции."

 GXC_protect_local_superstitions: "Защитить местные суеверия"
 GXC_protect_local_superstitions_desc: "Поистине представитель народа, Пэн Пай с большим уважением относится к местным крестьянским суевериям и религиозным практикам, признавая их распространенность в жизни крестьянства. Именно в этом понимании те, кто должен выполнять и наставлять волю народа к целям социальной и национальной революции; дерзко защищать и дорожить местными верованиями и празднествами сельских масс Китая."

 GXC_the_peasant_soldier: "Крестьянин-солдат"
 GXC_the_peasant_soldier_desc: "Стиль работы товарища Пая включает скромность и прагматизм китайского народа; простоту и трудолюбие китайских крестьян, а также эффективность и стойкость революционного солдата. Вечно переплетаясь в классовом союзе для освобождения Китая; мы будем стремиться поощрять образцового крестьянина как новый неукротимый революционный авангард социальной революции."

 GXC_expand_nationwide_rural_services: "Расширить общенациональные сельские услуги"
 GXC_expand_nationwide_rural_services_desc: "Честно говоря, состояние управления в сельских провинциях было отвратительным в плане реализации истинных потребностей людей. Как мы можем надеяться достичь Социалистической революции, когда ее народ страдает от безудержных болезней и неэффективного правительственного принуждения? Благодаря согласованным усилиям направленного финансирования начнется грандиозное расширение сельских услуг!"

 GXC_revolutionary_theatrics: "Революционная театральность"
 GXC_revolutionary_theatrics_desc: "Среднестатистический китайский крестьянин почти ничего не знает о сложных теоретических политических дискурсах, таких как марксизм. Чтобы расширить нашу поддержку в массах и обеспечить рост революционного сознания; мы должны достучаться до них понятными им способами, такими как пьесы и сценки, изображающие текущую революционную и антиимпериалистическую борьбу."

 GXC_the_necessary_vanguard_of_revolution: "Необходимый авангард революции"
 GXC_the_necessary_vanguard_of_revolution_desc: "В прошлом революционные восстания под руководством крестьян часто заканчивались неудачей из-за их врожденной дезорганизации. Под руководством истинного революционного авангарда, состоящего из солдат и интеллектуалов; через дисциплину, обучение и преподавание — эти массы подавят свое устаревшее крестьянское сознание ради пролетарского сознания."

 GXC_liberation_under_peng_bodhisattva: "Освобождение под Бодхисаттвой Пэном"
 GXC_liberation_under_peng_bodhisattva_desc: "Под руководством товарища Пая и революционных мучеников китайские крестьяне впервые в истории совершили поистине аграрную социалистическую революцию, возглавляемую крестьянством, которое долго трудилось и страдало от репрессий. Их революционный потенциал, когда-то скованный цепями иностранного империализма и милитаризма, станет примером для пролетариата остального мира!"

 GXC_sunset_of_the_white_sun: "Закат Белого солнца"
 GXC_sunset_of_the_white_sun_desc: "С окончанием гражданской войны в Китае Партия народных производителей выходит победителем как единственный хозяин Поднебесной. Центральный комитет, базирующийся в Нанкине, не выполнил своих обещаний освободить китайский народ от нищеты и империализма. Теперь мантия Национальной революции переходит к Хромому генералу, который, несомненно, доведет Три принципа до их естественного завершения."

 GXC_in_pursuit_of_minsheng: "В погоне за Миньшэн"
 GXC_in_pursuit_of_minsheng_desc: "Одной из главных целей Партии народных производителей является выведение китайского народа из нищеты и угнетения. Производящие массы нуждаются в правительстве, которое заботится об их нуждах, правительстве, действительно заботящемся о принципе Миньшэн. В то время как Гоминьдан справедливо определил Миньшэн как социалистический, Чэнь Миншу понимает, что для правильного следования Трем принципам Сунь Ятсена практика должна иметь приоритет над теорией."

 GXC_tend_to_the_nongmin: "Заботиться о нунминь (крестьянах)"
 GXC_tend_to_the_nongmin_desc: "Когда Синьхайская революция закончилась свержением императора и феодального порядка, люди ожидали процветания и конца нищеты. Однако милитаристы, империалисты и помещики сговорились держать Лаобайсин под своим угнетательским сапогом. Теперь этому конец, так как Партия народных производителей закрепит политическую защиту всех крестьян по всему Китаю, а все вымогательские налоги на урожай будут установлены на щадящем уровне."

 GXC_harmonious_land_distribution: "Гармоничное распределение земли"
 GXC_harmonious_land_distribution_desc: "Среди всех сторонников Национальной революции общепризнанно, что земельная реформа — это не просто необходимость, а важнейшее условие благополучия народа и нации. Платформа Партии народных производителей — освободить китайский народ от самой идеи частной собственности на землю. Каждому будет выделена равная доля земли независимо от прежнего статуса, чтобы наша земля предков была приведена в состояние гармонии."

 GXC_towards_a_realistic_datong: "К реалистичному Датуну"
 GXC_towards_a_realistic_datong_desc: "Генерал Дэн Яньда возглавлял Временный комитет действий в идеалистических надеждах, что однажды Китай сможет достичь цели датун, великого единения. Не будет денег, войны, семьи, тюрем и религии. Мы тоже стремимся достичь датун, но цель нашей партии — принести реалистичные и значимые изменения в ближайшем будущем, а не просто надежду на лучшее будущее за пределами нашей жизни."

 GXC_proclaim_a_true_united_front: "Провозгласить Истинный Единый фронт"
 GXC_proclaim_a_true_united_front_desc: "Когда Гоминьдан радикализировался после смерти Чан Кайши и военного краха, Китайский Единый фронт стал воротами для распространения влияния синдикалистов в партии. Приведя старый Гоминьдан к покорности, Партия народных производителей протянет руку не только националистам и Лиге синдикалистов, но и любым и всем партиям, желающим сотрудничать с нами в новом оживленном Едином фронте."

 GXC_pantheon_of_heroes: "Пантеон героев"
 GXC_pantheon_of_heroes_desc: "Если бы не руководство великих и способных героев революции, китайская революция потерпела бы неудачу. Так же, как Цай Э восстал против главного реакционера Юань Шикая, Чэнь Миншу сверг реакционного Чэнь Цзитана. Когда Центральный комитет опозорил Национальную революцию, великие герои революции Цзян Гуаннай и Цай Тинкай поспешили на помощь Хромому генералу против этой серьезной угрозы. Слава героям революции!"

 GXC_the_peoples_revolutionary_army: "Народно-революционная армия"
 GXC_the_peoples_revolutionary_army_desc: "Национально-революционная армия Лянгуана хорошо послужила китайскому народу. Она видела конец коррумпированного правления Чэнь Цзитана, уничтожила правительство Бэйяна, наказала предательский Центральный комитет и отбила японских захватчиков. Однако, поскольку Китай меняется, должна меняться и армия. Национально-революционная армия будет реорганизована в Народно-революционную армию и будет защищать революцию от врагов внутренних и внешних."

 GXC_towards_the_deradicalisation_line: "К линии дерадикализации"
 GXC_towards_the_deradicalisation_line_desc: "Хотя Партия народных производителей, несомненно, является партией рабочих и крестьян, многие видели, как наша партия со временем становилась более умеренной. Мы отвергаем ярлык социалистов и не стремимся достичь каких-либо марксистских видений. Давайте проясним, что Партия народных производителей уже достигла необходимой революции, и теперь мы стремимся построить государство, а не раздувать пламя революции снова."

 GXC_abrogating_treasonous_treaties: "Отмена предательских договоров"
 GXC_abrogating_treasonous_treaties_desc: "С тех пор как началось Столетие унижения, китайское правительство подписывало эксплуататорский договор за эксплуататорским договором. Неграмотный бандит Северо-востока продал наш народ Японской империи, так же как Нефритовый лицемер продал Китай корпорациям Кайзера. Народно-революционное правительство не потерпит ни одного из этих предательских договоров, все эксплуататорские договоры будут аннулированы."

 GXC_courting_liberty: "Заигрывание со свободой"
 GXC_courting_liberty_desc: "Хотя многие либералы присоединились к правительству Бэйяна против национал-революционеров Китайского Единого фронта, они в конечном итоге совместимы с нашими целями. Мы стремимся к отказу от неравноправных договоров, подъему бедных и модернизации в полной мере, целям, которым многие либералы могут сочувствовать. Те, кто наиболее восприимчив к идеалам Национальной революции и Партии народных производителей, будут приняты в партию на благо Китая."

 GXC_achieving_the_spirit_of_progress: "Достижение духа прогресса"
 GXC_achieving_the_spirit_of_progress_desc: "С окончанием эры милитаристов и достижением объединения Китая, Китай может наконец начать работу по реконструкции. На первом месте в списке наших целей — модернизация, приносящая прогресс на берега Китая. Мы позаботимся о том, чтобы дороги были перестроены по стандартам развитых стран, а сети связи расширены. Только тогда Столетие унижения наконец подойдет к концу, и начнется эра прогресса."

 GXC_the_lame_general_no_more: "Больше не Хромой генерал!"
 GXC_the_lame_general_no_more_desc: "В своем служении Национальной революции Чэнь Миншу заслужил немало презрения. Его насмешливо прозвали Хромым генералом за его слабое здоровье, объявили неудачником после первого Северного похода и рассматривали как раскольника-социалиста в Гуандунской клике Чэнь Цзитана. Несмотря ни на что и без друзей, Чэнь Миншу положил конец страданиям людей и объединил Китай. Давайте восхвалять самого прославленного спасителя Китая, больше не Хромого генерала!"

 GXC_aftermath_of_the_civil_war: "Последствия Гражданской войны"
 GXC_aftermath_of_the_civil_war_desc: "С последствиями разрушительной Гражданской войны в Китае, быстро уходящими в прошлое, мы остались с партией в лохмотьях, нацией, измученной десятилетиями декадентского правления Цин, коррумпированных милитаристов, иностранных захватчиков и, наконец, межпартийного насилия. Наша некогда стремительная Революция резко остановилась, и нужды народа отчаянно требуют внимания. Крайне важно, чтобы мы немедленно начали кампанию по реконструкции."

 GXC_rebuilding_the_peoples_army: "Восстановление Народной армии"
 GXC_rebuilding_the_peoples_army_desc: "Наша некогда славная Национально-революционная армия, которую некоторые считали первой истинной социалистической армией в Азии, была полностью разорвана. Изувеченная Вторым Северным походом, Второй японо-китайской войной и гражданской войной, брат сражался с сестрой, мучеников становилось все больше. Правительство абсолютно должно позаботиться о восстановлении НРА как истинной Народной армии!"

 GXC_young_pioneers_of_the_future: "Юные пионеры будущего"
 GXC_young_pioneers_of_the_future_desc: "Революция принадлежит молодому, новому поколению китайцев, которые вырастут в Китае, сильно отличающемся от Китая их родителей и предков. Ибо они растут в Новом Китае, приверженном как целям социальной революции в достижении коммунизма, так и Китаю, который будет твердо сопротивляться империализму. Создавая Юных пионеров, мы гарантируем, что будущее социализма в нашей стране останется светлым."

 GXC_revive_the_arms_industry: "Возродить оружейную промышленность"
 GXC_revive_the_arms_industry_desc: "Бывшая китайская оружейная промышленность, особенно та, что находилась под контролем Нанкинского правительства во время Гражданской войны, пришла в серьезный беспорядок или была повреждена в результате многолетних непрекращающихся войн. Наконец-то обеспечив контроль над страной, мы должны стремиться возродить эти разрушенные отрасли, чтобы мы могли восстановить китайскую оружейную промышленность, способную возглавить народную революцию."

 GXC_promote_rapid_industrialisation: "Продвигать быструю индустриализацию"
 GXC_promote_rapid_industrialisation_desc: "Хотя сейчас Китай находится под властью социалистического правительства, он все еще страдает от слабой промышленной базы и населения, которое все еще сильно зависит от плуга и почвы. Чтобы Китай быстро догнал Запад, дерзко важно, чтобы обширные ресурсы и усилия были направлены на поощрение тяжелого труда и быстрого промышленного роста, пока мы превращаем нашу страну в истинно социалистическую нацию."

 GXC_towards_true_socialist_education: "К истинному социалистическому образованию"
 GXC_towards_true_socialist_education_desc: "Дети и студенты должны посещать школы, чтобы узнать не только о героических поступках, совершенных мучениками во время Войны сопротивления и Войны за освобождение, но они также должны прислушиваться к революционным ораторам и героям, таким как Карл Маркс, Владимир Ленин, Том Манн и Жан Жиромоский. Посвящая усилия обучению масс и молодежи, мы готовим следующее поколение социалистов продолжать нести революцию."

##- NPA Endgame Focuses

 GXC_the_south_triumphant: "Триумф Юга"
 GXC_the_south_triumphant_desc: "Воспользовавшись своими естественными прерогативами, Юг наконец сумел свергнуть Север в борьбе за контроль над китайским национальным государством. Теперь сломленная и разрушенная нация лежит перед милитаристами Гуандуна и Гуанси, нация, которую им доверили отремонтировать и восстановить по своему усмотрению. Едва ли проповедуя революцию, совершенно очевидно, что Благоприятное Облако здесь, чтобы сиять во веки веков."

 GXC_enshrine_regional_autonomy: "Закрепить региональную автономию"
 GXC_enshrine_regional_autonomy_desc: "Наша война никогда не была навязыванием или насаждением диктатуры Гуанчжоу всей нации. Это была демократическая война, война за права и автономии всех провинций. Движение за провинциальное самоуправление в своей основе является ценным и благородным, посвященным обеспечению свобод законных правителей каждой провинции. Мы должны лишь возвысить его до уровня национальной политики."

 GXC_taking_the_brave_step_forward: "Делая смелый шаг вперед"
 GXC_taking_the_brave_step_forward_desc: "Имея в руках пути управления, пришло время заверить и организовать перспективы национального правительства. Многие до нас предпринимали попытки объединить нацию конституционализмом и законностью, и, увы, конституции, созданные в такой период, были резиновыми штампами для автократов или режимов. Должно быть так, чтобы конституция была справедливой и свободной."

 GXC_demonstrate_the_power_of_banking: "Продемонстрировать силу банковского дела"
 GXC_demonstrate_the_power_of_banking_desc: "В национальной политике нет большего источника власти, чем финансы; как часто утверждают, деньги заставляют мир вращаться. Единственный щит против правильного количества инвестиций — это упрямство или мораль. Но в Республике джентльменов, управляемой костюмами и саблями, банки являются лишь краеугольным камнем республиканского фундамента, и пришло время им проявить полную власть."

 GXC_on_the_military_and_its_excesses: "О военных и их излишествах"
 GXC_on_the_military_and_its_excesses_desc: "В то время как Юэ Цзюнь, Гуй Цзюнь и все другие провинциальные армии сражались, проливали кровь и умирали за наши победы, быстро стало очевидно, что зоны военной оккупации и другие формы временного военного правления в частях страны привели в лучшем случае к неповиновению, в худшем — к восстанию. Раздутый, нелояльный и нецентрализованный, пришло время призвать милитаризм к порядку."

 GXC_student_self_sufficiency: "Студенческое самообеспечение"
 GXC_student_self_sufficiency_desc: "Как пропагандировал Ма Цзюньу, студенты должны взять в руки мотыги и участвовать в строительстве своих учебных заведений. Их совместная работа не только будет способствовать развитию их трудоспособности и выносливости, но и позволит студентам из бедных семей получать компенсацию за свой труд, чтобы дополнить студенческую жизнь и подготовить их к трудовой деятельности."

 GXC_constructing_a_single_economic_organ: "Создание единого экономического органа"
 GXC_constructing_a_single_economic_organ_desc: "Китайскую экономику сравнивают с ошибочной игровой площадкой для иностранных венчурных капиталистов, способных попирать трудовое законодательство, справедливую заработную плату и все другие нарушения из-за слабого политического состояния нации и экономической силы. Однако, контролируя ключевые предприятия напрямую через национализацию, независимость нации будет быстро завоевана."

 GXC_privileges_to_the_merchant_classes: "Привилегии купеческим классам"
 GXC_privileges_to_the_merchant_classes_desc: "Торговцы — это само ядро китайской экономики, идя рука об руку с бизнесменами, они сигнализируют о форме местного капитализма среднего класса, который является признаком расцветающей массовой индустриализации. Предоставляя привилегии существующим торговцам и будущим предпринимателям, китайское государство будет развиваться, будучи рогом изобилия экономического прогресса."

 GXC_apotheosis_of_chinese_capital: "Апофеоз китайского капитала"
 GXC_apotheosis_of_chinese_capital_desc: "Никогда еще местные капиталистические деловые классы Китая не были так переплетены с государственным управлением и развитием; Гунхан держал экспорт нации в своих руках лишь краткий период, в конечном итоге отмененный государством. Как мечтали такие личности, как Чэнь Ляньбо, государство должно быть таким, которое отдает приоритет финансам и экономике."

 GXC_the_wealth_of_new_culture: "Богатство новой культуры"
 GXC_the_wealth_of_new_culture_desc: "Только глупцы будут так лихорадочно цепляться за господство прошлой традиции и культуры. Конечно, нельзя избавиться от тысячелетней истории Китая, но можно продвигать и модернизировать ее для времени. Синтезируя западные науки, культуру и достижения с восточными традициями, Китай станет отличительным знаком нового культурного соперника в Восточной Азии."

 GXC_a_young_face_for_an_ancient_civilisation: "Молодое лицо для древней цивилизации"
 GXC_a_young_face_for_an_ancient_civilisation_desc: "В оде своему приемному праву по рождению, Лу Юйгуан достиг высшего поста в стране в возрасте, который совершенно выдающийся среди его современников. Завершив то, что начал его отец, Лу стал Маршалом для Нового поколения китайцев."

 GXC_triumph_of_the_crisp_handshake: "Триумф крепкого рукопожатия"
 GXC_triumph_of_the_crisp_handshake_desc: "Одержав победу над милитаристами, гражданские лица Гуандуна и Гуанси из Торгового корпуса и Политической науки стали брокерами новой Бэйянской республики. Отбросив винтовку ради пера и бумаги, все взоры устремлены на Торговцев и Политиков, чтобы увидеть, кто кого одолеет, устанавливая свою собственную форму вдохновленного Западом управления через бюллетень."

 GXC_beiyang_of_the_south: "Бэйян Юга"
 GXC_beiyang_of_the_south_desc: "Хотя и не истинный сын Севера, армия [ROOT.GetLeader] и ее ассоциированные современники правили в Лянгуане и возглавляли марш объединения. Без четкого идеологического взгляда, по крайней мере в отношении послушников [ROOT.GetLeader], нация смотрит на новых маршалов и министров без страха или восклицаний; в конечном счете, это больше того же самого."

 GXC_maintaining_the_delicate_balance: "Поддержание хрупкого баланса"
 GXC_maintaining_the_delicate_balance_desc: "Управление — деликатная игра, наклонись слишком сильно в одну сторону, и все весы опрокинутся. Чтобы отдать приоритет всему достойному управлению, важно оставаться открытым и прагматичным. Массовое образование, экономическое развитие и сильная, централизованная армия — это все пункты, с которыми согласно большинство Центрального правительства, и как таковая это будет политика дня."

 GXC_employ_new_people_implement_new_policies: "Нанимать новых людей, внедрять новую политику"
 GXC_employ_new_people_implement_new_policies_desc: "Чтобы омолодить китайское государство, необходимо больше не полагаться чрезмерно на представителей старых поколений. Слишком долго государственные деятели правили вечно, достигая возраста около 70 лет и старше. Обновив каждого бюрократа от магистрата до министерств, нация сама неизбежно будет управляться новой эрой свежих, современных политиков."

 GXC_the_teacher_president: "Учитель-президент"
 GXC_the_teacher_president_desc: "Чжу Цзяхуа был не чем иным, как восходящей звездой. С помощью политического макиавеллизма, экспертной государственной мудрости или старого доброго политиканства он сумел подняться по служебной лестнице как в академии, так и в правительстве. Имея многочисленные контакты среди таких групп, как Общество Цзинсин, Чжу связывает экс-президентов, новаторов в образовании, промышленников и офицеров под своим бдительным присмотром."

 GXC_adopting_the_merits_of_jinbao: "Принятие заслуг Цзиньбао"
 GXC_adopting_the_merits_of_jinbao_desc: "Возможно, величайшим государственным деятелем Китая недавней эпохи должен быть президент Цао Кунь. Сумев собрать разрозненные фракции Чжили под одним знаменем, мало кто мог сравниться с его всегда благоприятным долгосрочным видением Китая. Хотя многие осуждали бы его за то, что он продался немецким интересам, только Цао и его фракция Цзиньбао по-настоящему понимали цену прогресса."

 GXC_order_and_progress: "Порядок и прогресс"
 GXC_order_and_progress_desc: "Порядок и Прогресс; такое понятие должно быть самим modus operandi, по которому будет действовать государство. Только при Порядке и Прогрессе китайская нация экономически взлетит. Гарантируя безопасные экономические инвестиции и свободную утопию для предприятий, Китай будет эффективным, централизованным и сильным государством. Только тогда понятия политической реформы будут жизнеспособны."

 GXC_old_guangxis_canton_comprador: "Кантонский компромисс Старой Гуанси"
 GXC_old_guangxis_canton_comprador_desc: "Возможно, немногие ожидали, что Ли Яохань, лидер Армии Чжао и независимо мыслящий союзник Шэнь Хунъина, станет Маршалом всей Нации. Имея связи с местными шэньши Гуандуна и будучи однажды почти отброшенным в огне Северного похода, пребывание Ли в должности — это ода ранним дням Бэйянской республики; всеобъемлющий маршал, курирующий прогресс."

 GXC_cult_of_the_young_marshal: "Культ Молодого маршала"
 GXC_cult_of_the_young_marshal_desc: "Лу Юйгуан — воплощение просвещенного правителя. Реализующего блага и достоинства революции и реформ без попрания традиций или потери национальной сущности. Он не продал нацию компрадорам и не предал свои идеалы. Более того, нация не была бы объединена без своего Гранд-маршала, и именно поэтому Молодой маршал — национальный герой."

 GXC_studying_the_zhili_system: "Изучение системы Чжили"
 GXC_studying_the_zhili_system_desc: "Чжили, при всех своих недостатках, несли с собой самый последний период национальной стабильности и экономического развития в нации с момента краха династии Цин. И как таковая, их система государственного управления и политиканства должна быть абсолютно изучена и улучшена; очевидно, избегая излишеств фракционности, обеспечивая при этом эффективность государственной мудрости."

 GXC_protector_of_tradition: "Защитник традиции"
 GXC_protector_of_tradition_desc: "Подобно У Пэйфу, Лу Юйгуан является самым сильным примером учтивого конфуцианского государственного деятеля. Благоприятный, ставящий во главу угла интеллектуалов и ученых, проявляя при этом доминирующую сдержанность в свете широкого рвения, он и его приемный брат Ма Цзи являются символами стабильности, бетонными столпами политики нации для будущих поколений и знаками современного Бэйяна."

 GXC_primacy_of_the_military_arm: "Примат военной руки"
 GXC_primacy_of_the_military_arm_desc: "Нет большей службы нации, чем служба в национальной армии. Защищать государство с честью и защищать его граждан — вот величайшие обязанности, которые когда-либо могли быть возложены на храбрых солдат Китая. Больше армия не будет рассматриваться со страхом или отвращением, вместо этого останется только восхищение. Слава нашим национальным защитникам!"

 GXC_victory_of_the_southerners: "Победа южан"
 GXC_victory_of_the_southerners_desc: "Якобы сохраняя свои корни на традиционно бунтарском и прогрессивном Юге нации, Старая клика Гуанси приобрела современный и обновленный взгляд в национальной политике. Балансируя на грани между Реформой, Революцией и Милитаристами, фракция Молодой Гуанси клики объединила различных бывших революционеров для продвижения национального прогресса."

 GXC_the_progressive_general: "Прогрессивный генерал"
 GXC_the_progressive_general_desc: "При маршале Лу Юйгуане и его близких союзниках Ма Цзюньу, Ма Цзи, Лю Чжилу и Линь Ху Старая клика Гуанси отбросила эры застоя при Бэйяне и принесла революционный прогресс без тирании Даньго. Идя срединным путем, нация встала на путь стабильности и, возможно, даже демократии, по крайней мере, в будущем."

 GXC_bring_down_the_eternal_enemy: "Свержение вечного врага"
 GXC_bring_down_the_eternal_enemy_desc: "Слишком долго китайское общество вынуждено было терпеть страх и смятение перед перспективой набегов бандитских кланов, мародерствующих армий и местных изгоев. И поэтому крайне важно, чтобы государство наконец применило всю свою мощь, омоложенную недавним почти полным воссоединением, и наконец искоренило бедствие бандитизма из Китая навсегда."

 GXC_looking_towards_the_whigs: "Взгляд на вигов"
 GXC_looking_towards_the_whigs_desc: "При вигах Британия пережила невыразимый социальный и политический прогресс, продвигая свободы и права, невиданные ранее на Британских островах. Управляемые прогрессивной и благожелательной олигархией, они освободили народ, продемонстрировали силу на национальной арене и отстаивали верховенство законодательной власти. Чтобы либерализовать Китай, крайне важно, чтобы мы подражали их примеру."

 GXC_freedom_of_commerce: "Свобода коммерции"
 GXC_freedom_of_commerce_desc: "Только через коммерцию и торговлю предотвращаются беды национального краха, революции и гражданской войны. И Китай давно остро нуждается в продуманном, стабильном и мудром национальном управлении экономикой. И поэтому Торговцы и Либералы среднего класса должны объединиться для содействия здоровому экономическому развитию и национальной стабильности без демагогии."

 GXC_raising_the_chinese_plutocracy: "Подъем китайской плутократии"
 GXC_raising_the_chinese_plutocracy_desc: "Многие полагали бы, что возвышение господства китайских бизнесменов и торговцев на пути законодательной и исполнительной власти было бы простой заменой диктатуры милитаристов на диктатуру капитала, но они были бы глупцами. Торговцы приносят не диктатуру, а экономическое развитие, национальный прогресс и кантонский либерализм."

 GXC_an_era_of_good_feelings: "Эра добрых чувств"
 GXC_an_era_of_good_feelings_desc: "Время гражданской войны, кровопролития и возмездия прошло. Единственной целью правительства должно быть обеспечение существования своего народа, гарантия его свобод и демократического будущего. Целью нации должна быть национальная реконструкция и прекращение партийности в политике. Разве мы не все китайцы? Объединенные общей принадлежностью к нации; Пять рас в Едином союзе?"

 GXC_the_democratic_ideal: "Демократический идеал"
 GXC_the_democratic_ideal_desc: "Нельзя ожидать, что массы поймут свои гражданские права сразу, когда большинство едва может содержать свои домохозяйства или управляется своими местными элитами. Но нельзя управлять государством через диктатуру или разделять его без необходимости через Федерализм. Демократия, пусть несовершенная, но все же демократия. С превеликим оптимизмом партии должны объединиться в гармонии."

