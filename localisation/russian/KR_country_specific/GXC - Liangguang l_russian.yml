GXC_CCP_NRS_party: "ККП-ОНВ"
 GXC_CCP_NRS_party_long: "$GXC_CCP_NRS_party_long_tt$\n§LКитайская конституционная партия, формально возглавляемая Сюй Цинем, имеет множество разрозненных отделений по всей стране. В основном возглавляемая преемниками реформистского политического учения Лян Цичао, ее главными арбитрами на юге страны являются два последних протеже Ляна — Чжан Дунсунь и Чжан Цзюньмай. Находясь рядом со своим наставником со времен его пребывания в Японии, оба Чжана были последователями политической идеологии Ляна, которая менялась на протяжении Эры милитаристов. Будучи с ним во времена Прогрессивной партии и в эпоху Клики исследований (Яньцзю), Чжан Дунсунь и Чжан Цзюньмай присоединились к обновлению и возрождению Китайской конституционной партии.\n\nВ то время как Север следовал линии правого крыла идей Ляна и его ранних, более умеренных убеждений, Юг в целом придерживался последних интеллектуальных разработок Ляна. Приняв более реформистский, социалистический взгляд на политику, Чжан Цзюньмай, чье предпочтение социал-демократии сродни Социал-демократической партии Германии, направил свое крыло конституционалистов в левый вакуум, оставшийся после провалов Гоминьдана в 1927 году. К ним присоединился видный демократический гильдейский социалист Чжан Дунсунь, и этот дуэт в значительной степени отделился от основного течения ККП.\n\nБудучи составной фракцией Объединенной лиги национального строительства, а затем и Федерации китайских демократических партий, Национальный институт политических наук Чжан Цзюньмая подвергся чистке со стороны его бывшего покровителя Сунь Чуаньфана за левые симпатии. Забрав своих последователей и отступив в Лянгуан по приглашению Чэнь Ляньбо, Дунсунь и Цзюньмай сформировали Общество национального возрождения как ассоциацию левых лянистов, во многом несогласную с партийным центром в Пекине.§!\n"
 GXC_CCP_NRS_party_long_tt: "Китайская конституционная партия — Общество национального возрождения (Сяньфа Яньцзю Хуэй Гоцзя Фусин Сехуэй)"

 #共和大同盟 中國民主社會黨
 GXC_GRA_DSP_party: "ВРА-ДСП"
 GXC_GRA_DSP_party_long: "$GXC_GRA_DSP_party_long_tt$\n§L$GXC_GRA_intro$\n\nВыросшая из Общества национального возрождения Чжан Цзюньмая, основанного в 1932 году, Демократическая социалистическая партия сформировалась под предлогом Инцидента с семью джентльменами 1936 года. Формально разорвав все связи со своей штаб-квартирой в Пекине из-за оппозиции Бэйянской линии, лево-лянистская клика Национального возрождения провозгласила свою собственную партию. Вдохновленная реформистским социализмом, Демократическая социалистическая партия сочетает идеалы политики Чжан Цзюньмая, вдохновленной немецкой социал-демократией, с демократическим гильдейским социализмом Чжан Дунсуня.\n\nОтвергая насильственную классовую борьбу в стремлении к конституционному, демократическому и республиканскому Китаю, она представляет собой скорее интеллектуальный круг, чем традиционную партию. Оказывая давление на Партию общественных интересов, чтобы та оставалась верной делу демократии, демократические социалисты довольно неумолимы в своем преследовании «Старых» федералистов, заставляя их придерживаться курса и сотрудничая для этого с другими партиями «нового» стиля.§!\n"
 GXC_GRA_DSP_party_long_tt: "Великий республиканский альянс — Демократическая социалистическая партия (Гунхэ Датунмэн Чжунго Минчжу Шэхуэй Дан)"

 #中國民主同盟 中國民主社會黨
 GXC_UPC_CDL_DSP_party: "ДЛК-ДСП"
 GXC_UPC_CDL_DSP_party_long: "$GXC_UPC_CDL_DSP_party_long_tt$\n§L$GXC_CDL_intro$\n\nФормально отделившись от Китайской конституционной партии после последствий Инцидента с семью джентльменами, Демократическая социалистическая партия действительно обрела собственную форму как самая популярная левая партия в рамках демократической структуры. Возглавляемая социал-демократом Чжан Цзюньмаем и гильдейским социалистом Чжан Дунсунем, их отказ от насильственной классовой борьбы и ориентация на конституционную демократию завоевали им большую популярность как среди народа, так и среди интеллигенции. С формированием ДЛК (Демократической лиги Китая), ДСП была выбрана лидером в избирательной гонке, намереваясь получить демократический мандат для реализации своих идеалов «Третьей силы» — демократического реформистского социализма.§!\n"
