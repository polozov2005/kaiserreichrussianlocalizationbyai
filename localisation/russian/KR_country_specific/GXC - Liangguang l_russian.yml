 GXC_frontlines_shift_in_liangguang_mission_timer: "Смена линии фронта в Лянгуане"
 GXC_frontlines_shift_in_liangguang_mission_timer_desc: "Лянгуан снова был ввергнут в хаотичную борьбу за власть, но все стороны полны решимости избежать повторения бесконечных качелей, которые определяли «Высокую» Эру милитаристов в двух провинциях. Это будет означать решительные шаги по доминированию в центрах власти в Лянгуане и утверждению долгосрочного контроля над ними. Неспособность сделать это своевременно рискует тем, что наши силы просто растают от истощения."

 GXC_introminigame_KMT_make_their_move_mission: "Гоминьдан делает свой ход"
 GXC_introminigame_KMT_make_their_move_mission_desc: "Несмотря на неудачу в организации путча в Гуанчжоу, Гоминьдан остается непоколебимым. С силами, переходящими через две границы в Лянгуан, и с различными лоялистскими силами, возникающими среди хаоса, они еще не побеждены. Они будут уделять приоритетное внимание захвату своих опорных пунктов в Гуанчжоу, Шаогуане и Байсэ, прежде чем двинуться на более враждебную территорию."
 GXC_introminigame_UPC_make_their_move_mission: "Федералисты делают свой ход"
 GXC_introminigame_UPC_make_their_move_mission_desc: "Несмотря на отказ Чэнь Ляньбо прямо поддержать схему Чэнь Цзюнмина стать губернатором, силы федералистов, связанные с ним, продолжают свою игру за власть в Лянгуане. Сплачивая политических идеалистов, напуганных сельских дворян и прагматичных милитаристов, Армия Юэ попытается захватить свои опорные пункты в Гуанчжоу, Хайкоу и Шаогуане, прежде чем двинуться в Гуанси."
 GXC_introminigame_NPA_make_their_move_mission: "Регионалисты делают свой ход"
 GXC_introminigame_NPA_make_their_move_mission_desc: "Несмотря на неспособность Чэнь Ляньбо удержать Гуанчжоу во время первого раунда конфликта, силы регионалистов продолжают сражаться за сохранение своего контроля над Лянгуаном. Пестрая коалиция лоялистов Чжили, реакционных и консервативных политиков, милитаристов Старой Гуанси и неохотных торговцев, все под слабым центральным командованием Наньнина, этот альянс будет стремиться укрепить свои позиции в Наньнине, Гуйлине и Хайкоу, прежде чем передислоцироваться на более непокорную территорию."

 GXC_introminigame_secure_state_decision: "Движение для захвата [FROM.GetCapitalVictoryPointName]"
 GXC_introminigame_secure_state_decision_desc: "Наша победа на начальных этапах борьбы за Гуанчжоу дала нашей стороне значительный импульс, но война за Лянгуан еще далека от завершения. Если мы хотим выиграть этот конфликт, нам нужно будет обезопасить все центры власти Лянгуана, начиная с [FROM.GetCapitalVictoryPointName]. Это требует большего, чем просто развертывание наших солдат и ополченцев, скорее комплексных усилий по завоеванию местного населения и их лидеров на нашу сторону и приближению Лянгуана на шаг ближе к скорому объединению."

 GXC_trouble_in_the_twin_provinces_external_decision_category: "Смута в Двух провинциях"
 GXC_trouble_in_the_twin_provinces_external_decision_category_desc: "Две провинции, составляющие Лянгуан («Два Гуана»), охвачены политической нестабильностью под хрупкой гегемонией Старой Гуанси. Гуанси на западе имеет три основных военно-политических региона — Байсэ, Гуйлинь и Наньнин (столица). Гуандун на востоке также разделен на три — Хайкоу, Шаогуань и их провинциальную столицу Гуанчжоу. §YЧтобы заявить о победе над Лянгуаном, три основных блока, борющихся за власть, должны утвердить полный контроль над каждым регионом!§!\n\nВсего §cГоминьдан§! Контроль над Лянгуаном: [?GXC.GXC_introgame_total_KMT_points_var|c0]/[?GXC.GXC_introgame_total_points_var|Y0]\nВсего §fФедералисты§! Контроль над Лянгуаном: [?GXC.GXC_introgame_total_UPC_points_var|f0]/[?GXC.GXC_introgame_total_points_var|Y0]\nВсего §mРегионалисты§! Контроль над Лянгуаном: [?GXC.GXC_introgame_total_NPA_points_var|m0]/[?GXC.GXC_introgame_total_points_var|Y0]"

 GXC_introminigame_secure_state_external_NPA_decision: "Помочь нашим союзникам в [FROM.GetCapitalVictoryPointName]"
 GXC_introminigame_secure_state_external_NPA_decision_desc: "В настоящее время Лянгуан вовлечен во многое, мягко говоря. Поскольку война за господство в Двух провинциях идет полным ходом, становится все более насущным, чтобы [ROOT.GetLeader] обеспечил сохранение интересов [ROOT.GetNameDef] в регионе, иначе к власти придет более неприятная или враждебная партия. Учитывая предыдущие договоренности с местными ключевыми игроками, отправка как людей, так и материалов нашим союзникам могла бы значительно помочь их усилиям и, возможно, переломить ход борьбы в их пользу."

 GXC_introminigame_secure_state_external_UPC_decision: "$GXC_introminigame_secure_state_external_NPA_decision$"
 GXC_introminigame_secure_state_external_UPC_decision_desc: "В настоящее время Лянгуан вовлечен во многое, мягко говоря. Поскольку война за господство в Двух провинциях идет полным ходом, становится все более насущным, чтобы [ROOT.GetLeader] обеспечил выживание дела федералистов в регионе, иначе к власти придет более неприятная или враждебная партия. Учитывая предыдущие договоренности с местными ключевыми игроками, отправка как людей, так и материалов нашим союзникам могла бы значительно помочь их усилиям и, возможно, переломить ход борьбы в их пользу."

 GXC_introminigame_secure_state_external_KMT_decision: "$GXC_introminigame_secure_state_external_NPA_decision$"
 GXC_introminigame_secure_state_external_KMT_decision_desc: "В настоящее время Лянгуан вовлечен во многие потрясения, мягко говоря. Поскольку война за господство в Двух провинциях идет полным ходом, становится все более насущным, чтобы [ROOT.GetLeader] обеспечил победу революционной борьбы внутри Лянгуана над местными милитаристами, иначе к власти придет более неприятная или враждебная партия. Учитывая предыдущие договоренности с местными революционными ячейками, отправка как людей, так и материалов нашим союзникам могла бы значительно помочь их усилиям и, возможно, переломить ход борьбы в их пользу."

##Industry stabilisation Timer
 GXC_industrial_stabilisation_mission_timer: "Стабилизация промышленности Лянгуана"
 GXC_industrial_stabilisation_mission_timer_desc: "Наш промышленный сектор рушится, заводы и местные компании закрываются, не в силах пережить шторм «Черного понедельника». Хуже того, безработица стремительно растет, и рабочие находятся на грани бунта, но свет всегда остается в конце туннеля. Постепенной стабилизацией мировой экономической системы наша собственная местная промышленность будет медленно восстанавливаться благодаря естественным силам рынка. Однако мы всегда можем принять крайние меры, чтобы исправить ситуацию раньше, какими бы ни были последствия."

##Agriculture stabilisation Timer
 GXC_agricultural_stabilisation_mission_timer: "Стабилизация сельского хозяйства Лянгуана"
 GXC_agricultural_stabilisation_mission_timer_desc: "Ситуация в нашем сельском хозяйстве критическая: фермеры лишены работы, у крестьян полно еды, но некому продавать; как бы то ни было, не все потеряно. Постепенной стабилизацией мировой экономической системы наша собственная местная сельскохозяйственная система будет медленно восстанавливаться благодаря естественным силам рынка. Однако мы всегда можем принять крайние меры, чтобы исправить ситуацию раньше, какими бы ни были последствия."

###- Phase II Decisions -###

##Clash for Canton

#GXC Side Decisions
 GXC_KMT_clash_for_canton_decision_category: "Битва за Кантон"
 GXC_KMT_clash_for_canton_decision_category_desc: "Смерть Сунь Чуаньфана дестабилизировала реакционное правление в Лиге восьми провинций, позволив множеству сил Гоминьдана свергнуть старый режим в Лянгуане, традиционном сердце партии. В Гуанчжоу (Кантоне) была создана временная хунта Гоминьдана, хотя это лишь вопрос времени, когда она развалится. §gГенерал Чэнь Цзитан и его Новая гуандунская клика§! контролируют южный Гуандун, в то время как северный Гуандун попал под влияние миньганьского §Sгенерала Чэнь Миншу и его 10-й дивизии§!. На западе кланы Гуанси присоединились к завоевателю §PЛи Цзунжэню и Новой клике Гуанси§!."
 GXC_KMT_clash_for_canton_decision_category_gui_desc: "§aЧэнь Цзитан§! стремится обеспечить возвращение изгнанного правого центрального комитета в Москве и начал переговоры с §gХу Ханьминем§!. Как только популярность §g$GXC_new_guangdong_clique_party$§! превысит 30%, он сможет взять фокус §Y$GXC_return_of_the_moscow_committee$§!, выиграв Битву за Кантон в пользу правых.\n§YВлияние §aЧэнь Цзитана§! в настоящее время составляет [?GXC.party_popularity@authoritarian_democrat|%g2] из 30.00%, необходимых ему для победы.§!\n\n[GXC_clash_for_canton_CHI_alive_scripted_loc]\n\nДжокером между ними выступает §PЛи Цзунжэнь§!. Правый с собственными национальными амбициями, он с подозрением относится к планам обоих Чэней, и его конечная лояльность может определить окончательную судьбу обеих провинций."
 GXC_clash_for_canton_CHI_is_puppet_key: "Вернувшись в Китай с помощью иностранной поддержки, §RЛевый Гоминьдан§! — это извращенная пародия на оригинальную Националистическую партию: иностранная марионетка для иностранцев, чтобы навязать Китаю еще одну чуждую систему. Поскольку большинство республиканцев Лянгуана испытывают полное отвращение к бесстыдному подчинению Центрального комитета иностранным интересам, включая многих левоцентристов, §Rмиссия Чэнь Миншу практически обречена.§!"
 GXC_clash_for_canton_CHI_is_gov_key: "Одержав громкий успех левых в Войне Лиги, §RЛевый Гоминьдан§! начал переправлять припасы 10-й дивизии, теперь расширенной до §S«Новой 4-й армии»§!, чтобы поддержать Чэня в обеспечении Лянгуана для левых. Если популярность §S$GXC_new_fourth_army_party$§! превысит 30%, они смогут попытаться совершить переворот в Гуанчжоу, подчинив его во имя [CHI.Capital.GetCapitalVictoryPointName].\n§YВлияние §SЧэнь Миншу§! в настоящее время составляет [?GXC.party_popularity@social_democrat|%S2] из 30.00%, необходимых ему для победы.§!"
 GXC_clash_for_canton_CHI_is_alive_key: "На данный момент §RВосстание Миньгань§! отвлечено борьбой за свою жизнь против своих соперников в бывшей Лиге. §SЧэнь Миншу§! и его людям было приказано оставаться на месте, собирая поддержку там, где они могут, и срывая планы правых. §RЕсли [CHI.GetNameDef] успешно сформирует правительство на севере, они смогут спонсировать левый переворот в Лянгуане!§!"
 GXC_clash_for_canton_CHI_is_dead_key: "Гибель §RВосстания Миньгань§! лишила §SЧэнь Миншу§! любого значимого шанса обеспечить полный контроль над Лянгуаном. Тем не менее, он и его люди остаются упорными, сопротивляясь усилиям §gЧэнь Цзитана§! консолидировать контроль над провинцией. Тем не менее, он может лишь отсрочить неизбежное, хотя мы можем только надеяться, что он не утянет за собой остальную революцию своим упрямством."

 GXC_execute_leftist_coup_decision: "Осуществить левый государственный переворот"
 GXC_execute_leftist_coup_decision_desc: "Поскольку власть Чэнь Цзитана в Гуанчжоу ослабевает, а на востоке поднимается красная волна, пришло время нам сделать свой ход и провозгласить истинную революцию в Кантоне. Скоординированный, решительный удар со всех сторон обрушит тираническое правление «Небесного короля Юга», как реакционеров до него, и он больше не будет загрязнять Три принципа своим смрадом."

 GXC_disseminate_leftist_agitprop: "Распространять левую агитпропаганду"
 GXC_disseminate_leftist_agitprop_desc: "По всей сельской местности Гуандуна, в трущобах Гуанчжоу и на станциях Жемчужной реки люди жаждут надежды. Десять лет они жили под сапогами тиранов. Благодаря мужественным усилиям тайных ячеек и активистов мы распространим весть (тщательно составленную и проверенную отделом пропаганды, конечно), что освобождение близко!"

 GXC_spread_nationalist_message: "Распространять националистическое послание"
 GXC_spread_nationalist_message_desc: "Свобода наконец пришла в Гуанчжоу, теперь, когда Чэнь Цзитан и Гуандунская армия изгнали всех реакционеров и предателей, которые когда-то отравляли землю своим извращением. Но работа на этом не заканчивается. Чтобы заложить основу для полного возвращения Гоминьдана, недостаточно сменить наши флаги и говорить лозунгами. Политическая машина должна быть построена, предатели подвергнуты чистке, элиты завоеваны, народ мобилизован. А время все уходит..."

 GXC_undermine_chen_jitang: "Подорвать позиции Чэнь Цзитана"
 GXC_undermine_chen_jitang_desc: "Чэнь Цзитан воображает себя революционным королем, правящим Гуандуном как феодальным владением и держащим двор в Гуанчжоу, пока богатства провинции текут в его карманы. Но мы покажем ему, кто на самом деле правит Гуандуном: кто повелевает сердцами людей, кто трудится бок о бок с ними, кто действительно заботится об их интересах. Листовка за листовкой, забастовка за забастовкой, протест за протестом, речь за речью. И он скоро обнаружит, что его власть не так сильна, как он думает."

 GXC_sideline_chen_mingshu: "Отодвинуть Чэнь Миншу"
 GXC_sideline_chen_mingshu_desc: "Чэнь Миншу допущен в Гуанчжоу только формально, как третье колесо в правящей хунте Лянгуана. Уступка, сделанная для умиротворения левых партии. Но он и его лакеи, при всей их цветистой позе, сделали мало, кроме как подстрекали толпу и причиняли бессмысленные разрушения. Людей мало волнуют слова, если бы это было так, то после речей и обращений Чэнь Миншу он наверняка правил бы не только захолустьем Гуандуна. Нет, люди хотят действий, и серьезные, порядочные люди Лянгуана дадут их им."

 GXC_call_for_unity_with_nanjing: "Призвать к единству с [CHI.Capital.GetCapitalVictoryPointName]"
 GXC_call_for_unity_with_nanjing_desc: "Мы не одни в нашей борьбе против милитаристов и империалистов. Прямо через границу наши храбрые товарищи в Миньгане продолжают сражаться, и им нужна наша помощь. Обезопасив Лянгуан, мы должны использовать его ресурсы во имя национальной революции, объединившись и подчинившись делу наследников Сунь Ятсена. Слишком долго герои революции были разделены — на этот раз мы должны маршировать вместе как единое целое!"

 GXC_crack_down_on_subversives: "Подавить левых подрывных элементов"
 GXC_crack_down_on_subversives_desc: "После десятилетия неудачных мятежей и бессмысленного разрушения террористами Миньганя и бредовых бредней и подчинения воле Парижа приспешников Ван Цзинвэя, левое крыло партии сделало мало, кроме как запятнало доброе имя революции доктора Суня. У них хватает наглости возвращаться в Гуандун, надеясь снова поработить его народ ради эго социалистических безумцев за рубежом. Мы должны работать, чтобы остановить их, подвергая цензуре их публикации и арестовывая их агитаторов."

 GXC_raid_guangdong_army_positions: "Налет на позиции Гуандунской армии"
 GXC_raid_guangdong_army_positions_desc: "Гуандунская армия считает себя элитной армией в Китае, но они даже не самые сильные в Гуандуне! Их склады снабжения лежат без охраны, их солдаты ленивы и трусливы, а их офицеры коррумпированы и некомпетентны. Как и все мелкие хулиганы, которые проводят свои дни, угнетая беспомощных крестьян, нужно немного, чтобы заставить их бежать. Вооружив народ, пришло время показать им, как выглядят настоящие защитники нации!"

 GXC_skirmish_with_fourth_army: "Стычка с Четвертой армией"
 GXC_skirmish_with_fourth_army_desc: "Победа — мощный магнит в Гуандуне, и убежденность армии в своем деле можно измерить в испытаниях стали. Так называемая «Новая 4-я армия» — лишь бледная имитация старой. Мы в Гуандунской армии — истинные преемники этой гордой революционной силы, и мы докажем это своей превосходной дисциплиной и мужеством. Они утверждают, что защищают социалистические идеалы. Мы покажем, что они не могут защитить даже себя."

 GXC_destabilise_chen_jitangs_grip: "Дестабилизировать хватку Чэнь Цзитана"
 GXC_destabilise_chen_jitangs_grip_desc: "Чэнь Цзитан короновал себя главой революционной хунты благодаря своему контролю над Гуанчжоу, но его положение вряд ли надежно. Тем временем, когда весь Гуанси твердо стоит за Ли Цзунжэнем, возможно, пришло время перемен в Лянгуане. Хотя генерал Ли вряд ли друг социализма, у него также мало терпения к зарвавшимся регионалистам. Чэнь Цзитан предал революцию в ее самый тяжелый час, отказавшись последовать за Национально-революционной армией в Гуйчжоу. С помощью некоторого тонкого подталкивания в южном Гуандуне, шепота и взяток за закрытыми дверями и нескольких своевременных слов на собраниях хунты мы гарантируем, что останутся только истинные патриоты."

 GXC_suppress_socialist_insurgents: "Подавить социалистических повстанцев"
 GXC_suppress_socialist_insurgents_desc: "Хотя большинство социалистов Лянгуана проживают на востоке, в Гуанси было несколько левых форпостов. Но ненадолго. Пока Чэни дерутся за Гуандун, Гуанси твердо попала под контроль Ли Цзунжэня. Чэнь Цзитан — в лучшем случае ненадежный союзник, хотя он ненадолго помогал Ли в старые дни войн Юэ-Гуй. И иногда лучше дьявол, которого ты знаешь, чем сеятели раздора-социалисты, которых Чэнь Миншу вдохновил своим появлением. Пришло время Ли вернуть долг, помогая подавлять левых повстанцев в Гуанси и оказывая давление на позиции левых в Гуандуне, не пуская синдикалистов в Лянгуан."

#CHI side decisions
 GXC_CHI_order_chen_mingshu_forward: "Приказать Чэнь Миншу наступать"
 GXC_CHI_order_chen_mingshu_forward_desc: "Благодаря упорству наших усилий и храбрости верных кадров в Лянгуане тираническое правление Чэнь Цзитана балансирует на грани краха. Волна социализма неизбежна в Гуандуне, как бы «Небесный король Юга» ни пытался ее сдержать. Одним последним ударом мы обрушим Гуандунскую армию. Скоординированные приказы будут отправлены генералу Чэнь Миншу и другим храбрым революционерам в Гуандуне, возвращая истинную революцию в провинцию!"

 GXC_CHI_rally_the_peasantry: "Сплотить крестьянство Гуандуна"
 GXC_CHI_rally_the_peasantry_desc: "Крестьяне Гуандуна изнывают под игом шэньши, вынужденные слушать лживые обещания Чэнь Цзитана о «кооперативах», которые служат только его собственным интересам, а не народу. Но они все знают, что это ложь, и с нетерпением слушают пламенные слова Пэн Пая и других левых активистов, которые возвещают благую весть о грядущей революции. Через тайные собрания и растущие акты неповиновения мы лишим клику Чэнь Цзитана плодов деревни, вернув их законным владельцам."

 GXC_CHI_mobilise_the_unions: "Мобилизовать кантонские союзы"
 GXC_CHI_mobilise_the_unions_desc: "Дельта Жемчужной реки, регион с относительно развитой промышленной базой и судоходством, имеет относительно зрелый пролетарский класс, восприимчивый к воспитанию классового сознания. Хотя обстоятельства не всегда были благосклонны к профсоюзам в Гуанчжоу и Гонконге, особенно после репрессий в годы, последовавшие за забастовкой Кантон-Гонконг, никогда не было недостатка в бесстрашных людях, готовых бороться за свои права. Тань Пиншань был направлен для связи с триумвиратом профсоюзных лидеров Гуанчжоу: Дэн Фа, Дэн Чжунся и Чжан Тайлэй."

 GXC_CHI_moderate_our_message: "Умерить наше послание"
 GXC_CHI_moderate_our_message_desc: "Мы никогда не были одни в Гуанчжоу, даже на пике нашей власти. В классах, в прессе и даже в буржуазных домах можно найти попутчиков, которые разделяют наши мечты о новой республике для нации. Эти «либералы» питают ошибочное восхищение несостоятельными системами старых колониальных держав, таких как Соединенные Штаты, Великобритания и Франция, тех самых, торгуя с которыми они сделали свои деньги и получили образование. Тем не менее, так же, как эти идеалы в конечном итоге подготовили почву для революции, мы используем их поддержку в своих интересах. Лян Ханьцао, главный лейтенант Сунь Фо на юге, работал с «Reconstruction Review», чтобы опубликовать серию статей, подчеркивающих общие демократические корни нашего движения с другими, и, возможно, пришло время принять некоторые из этих слов."

 GXC_CHI_reinforce_fourth_army: "Усилить Четвертую армию"
 GXC_CHI_reinforce_fourth_army_desc: "В конце концов, в революции нет замены острию штыка. Памфлеты, протесты, забастовки — слова в конечном итоге пусты без воли насаждать идеалы, стоящие за ними. Это урок, который партия трагически усвоила многократно. Чэнь Миншу не самый ортодоксальный член Гоминьдана и не пользуется полным доверием истеблишмента АТР или ВКД. Но к лучшему или к худшему, он наш человек, и ему нужна наша помощь. Его «Новой 4-й армии» потребуются дополнительные отряды для подготовки к его главной миссии по обеспечению безопасности Гуанчжоу. Хотя ресурсы Национально-революционной армии растянуты до предела, Гуандун того стоит."

##Intrigue in Lingnan

#GXC Side Decisions
 GXC_NPA_intrigue_in_lingnan_decision_category: "Интрига в Линнане"
 GXC_NPA_intrigue_in_lingnan_decision_category_desc: "Хотя старый статус-кво был номинально восстановлен, поскольку вторжения сил Гоминьдана наряду с многочисленными восстаниями были подавлены, в Лянгуане устанавливается хрупкий и непрочный мир, склонный снова раствориться в кровавом конфликте, поскольку между сильными людьми сохраняется недоверие. В Гуандуне юг остается под контролем §cЧэнь Ляньбо и его Торгового корпуса§!, сосредоточенного в городе Гуанчжоу (Кантон), в то время как север контролируется §Pгенералом Шэнь Хунъином и Фракцией армии Шэнь§!, едва цепляющимися за власть в Шаогуане. На западе в Гуанси §gмаршал Лу Юйгуан и хунта Молодой Гуанси§! удерживают свою провинцию, их гегемония над двумя провинциями все еще нетронута... пока."
 GXC_NPA_intrigue_in_lingnan_decision_category_gui_desc: "[GXC_intrigue_in_lingnan_lu_yuguang_status_scripted_loc][GXC_intrigue_in_lingnan_shen_hongying_status_scripted_loc][GXC_intrigue_in_lingnan_chen_lianbo_status_scripted_loc]"

 GXC_NPA_intrigue_in_lingnan_lu_yuguang_phase_2_key: "\n\n§gЛу Юйгуан и триумвират Молодой Гуанси§! стремятся сохранить независимость Лянгуана и оставаться нейтральными, хотя они могут присоединиться к правительству по собственному желанию. Как только популярность §g$GXC_authoritarian_democrat_party$§! превысит 35%, они смогут принять §Y$GXC_liangguangs_destiny$§! и сформировать собственное национальное правительство на Юге.\n§YВлияние §g$GXC_authoritarian_democrat_party$§! в настоящее время составляет [?GXC.party_popularity@authoritarian_democrat|%g2] из 35.00%, необходимых для формирования правительства.§!"
 GXC_NPA_intrigue_in_lingnan_lu_yuguang_phase_3_subject_key: "\n\nНе в силах сопротивляться влиянию [GXC.Overlord.Capital.GetCapitalVictoryPointName] и вынужденные примкнуть, лидерство, которое §gЛу Юйгуан и хунта Молодой Гуанси§! осуществляли над Лянгуаном, теперь оспаривается теми, кто лоялен [GXC.Overlord.Capital.GetCapitalVictoryPointName], и рискует столкнуться с переворотом со стороны своих региональных противников, если их популярность продолжит падать...\n§YВлияние §g$GXC_authoritarian_democrat_party$§! в настоящее время составляет [?GXC.party_popularity@authoritarian_democrat|%g2].§!"
 GXC_NPA_intrigue_in_lingnan_lu_yuguang_phase_3_NPA_key: "\n\nУспешно сопротивляясь влиянию внешних сил, стремившихся подчинить Лянгуан и уничтожить его автономию, §gЛу Юйгуан и триумвират Молодой Гуанси§! создали собственное правительство, базирующееся на Юге, §YКитайское правительство национальной защиты§!. Даже когда маршал Лу утвердил свое господство в двух провинциях, было бы актом чистой глупости пытаться объединить нацию в одиночку. Таким образом, сотрудничество всех народов Лянгуана необходимо для достижения полной мобилизации всех классов на реализацию мечты об объединении страны раз и навсегда."

 GXC_NPA_intrigue_in_lingnan_shen_hongying_phase_2_key: "[GXC_intrigue_in_lingnan_SZH_status_scripted_loc]\n§YВлияние §PШэнь Хунъина§! в настоящее время составляет [?GXC.party_popularity@paternal_autocrat|%P2].§!"
 GXC_NPA_intrigue_in_lingnan_shen_hongying_phase_3_success_key: "\n\nОбладая огромным влиянием в регионе, а также доверием [GXC.Overlord.Capital.GetCapitalVictoryPointName], §PШэнь Хунъин§! нацелился на главный приз: губернаторство как в Гуанси, так и в Гуандуне. Как только популярность §P$GXC_paternal_autocrat_party$§! превысит 50% и начнется война между Китаем и Японией, §Rпереворот гарантированно увенчается успехом...§!\n§YВлияние §PШэнь Хунъина§! в настоящее время составляет [?GXC.party_popularity@paternal_autocrat|%P2].§!"
 GXC_NPA_intrigue_in_lingnan_shen_hongying_phase_3_failure_key: "\n\nПоскольку Лянгуан оказался в союзе с правительством Аньгоцзюнь, §PШэнь Хунъин§! и его фракция Новой клики Гуанси оказались бессильными даже в своей базе власти в северном Гуандуне. С разрывом связей с их иностранными покровителями §PФракция армии Шэнь§! была §Yнейтрализована§! и больше не представляет угрозы для Наньнина.\n§YВлияние §PШэнь Хунъина§! в настоящее время составляет [?GXC.party_popularity@paternal_autocrat|%P2].§!"
 GXC_NPA_intrigue_in_lingnan_league_war_ongoing_key: "\n\nПоскольку Война Лиги все еще продолжается без явного победителя, поддержка §PШэнь Хунъина§! со стороны его иностранных покровителей ограничена. Как только популярность §P$GXC_paternal_autocrat_party$§! превысит 25%, §RПекин сможет оказать давление на Лянгуан, чтобы заставить его присоединиться, если будет иметь общую границу.§!"
 GXC_NPA_intrigue_in_lingnan_SZH_independent_key: "\n\nС бывшими провинциями Лиги, прочно находящимися под контролем [613.Owner.GetLeader], провозгласившего собственное конкурирующее правительство, §PШэнь Хунъин§! теперь сильно поддерживается его союзниками в Нанкине. Как только популярность §P$GXC_paternal_autocrat_party$§! превысит 25%, §RНанкин сможет оказать давление на Лянгуан, чтобы заставить его присоединиться.§!"
 GXC_NPA_intrigue_in_lingnan_SZH_subject_key: "\n\nС бывшими провинциями Лиги, прочно находящимися под контролем [613.Owner.GetLeader], заявившего о своей верности Центральному правительству, §PШэнь Хунъин§! теперь сильно поддерживается его союзниками как в Нанкине, так и в Пекине. Как только популярность §P$GXC_paternal_autocrat_party$§! превысит 25%, §RПекин сможет оказать давление на Лянгуан, чтобы заставить его присоединиться.§!"
 GXC_NPA_intrigue_in_lingnan_SZH_dead_key: "\n\nС бывшими провинциями Лиги, прочно находящимися под контролем [613.Owner.GetLeader], который противостоит Пекину, поддержка §PШэнь Хунъина§! со стороны его иностранных покровителей остается ограниченной, получая некоторую поддержку от Пекина. Как только популярность §P$GXC_paternal_autocrat_party$§! превысит 25%, §RПекин сможет оказать давление на Лянгуан, чтобы заставить его присоединиться, если будет иметь общую границу.§!"

 GXC_NPA_intrigue_in_lingnan_chen_lianbo_phase_2_key: "\n\nНаходясь под угрозой и в окружении со всех сторон Старой кликой Гуанси, §cЧэнь Ляньбо§! нашел поддержку у маловероятного, но естественного союзника в правительстве Аньгоцзюнь. Как только популярность §c$GXC_social_conservative_party$§! превысит 25%, §R[AGJ.capital.GetCapitalVictoryPointName] сможет оказать давление на Лянгуан, чтобы заставить его присоединиться, если будет иметь общую границу.§!\n§YВлияние §cЧэнь Ляньбо§! в настоящее время составляет [?GXC.party_popularity@social_conservative|%c2].§!"
 GXC_NPA_intrigue_in_lingnan_chen_lianbo_phase_3_success_key: "\n\nОбладая огромным влиянием в регионе, а также доверием [GXC.Overlord.Capital.GetCapitalVictoryPointName], амбиции §cЧэнь Ляньбо§! и его союзников-торговцев растут за пределы города Гуанчжоу. Как только популярность §c$GXC_social_conservative_party$§! превысит 50% и начнется война между Китаем и Японией, §Rпереворот гарантированно увенчается успехом...§!\n§YВлияние §cЧэнь Ляньбо§! в настоящее время составляет [?GXC.party_popularity@social_conservative|%c2].§!"
 GXC_NPA_intrigue_in_lingnan_chen_lianbo_phase_3_failure_key: "\n\nПоскольку динамика власти в Гуандуне смещается от Гуанчжоу к Шаогуаню, §cЧэнь Ляньбо§! и его союзники-торговцы оказываются запертыми в южном Гуандуне и лишенными власти. С разрывом связей с их иностранными покровителями §cАВСГ§! была §Yнейтрализована§! и больше не представляет угрозы для Наньнина.\n§YВлияние §cЧэнь Ляньбо§! в настоящее время составляет [?GXC.party_popularity@social_conservative|%c2].§!"

 GXC_reaffirm_interprovincial_hegemony: "Подтвердить межпровинциальную гегемонию"
 GXC_reaffirm_interprovincial_hegemony_desc: "При губернаторе Лу Жунтине две провинции Гуанси и Гуандун были ненадолго объединены под правлением Старой клики Гуанси, что, однако, длилось недолго, так как господство Гуанси над Лянгуаном распалось после разрушительных войн Юэ-Гуй. Хотя две провинции пережили годы огромного вакуума власти после краха Северного похода, губернатор Лу Жунтин вернулся к власти в Гуанси и благодаря своим прагматичным союзам сумел обеспечить себе положение «Наместника Лянгуана». Как наследники его наследия, когда пыль осела над истерзанными войной провинциями, мы восстановим наше господство и напомним тем, кто нам противостоит, кто является истинными хозяевами Лянгуана."

 GXC_attract_foreign_support: "Привлечь иностранную поддержку"
 GXC_attract_foreign_support_desc: "Наш контроль над территориями, которыми мы правим, ограничен, мягко говоря. Из-за отсутствия союзников в Лянгуане и того, что те, кто у нас есть, делают это только из прагматичного самосохранения, нам не хватает средств, чтобы преодолеть наше шаткое военное и экономическое положение. Несмотря на то, что остальная часть страны либо слишком занята своими внутренними раздорами, либо открыто враждебна нашему делу, мы, к счастью, все еще можем получить иностранную поддержку через наши контакты. Привлекая их благосклонность, наши неудачи будут обращены вспять, даже если это будет стоить определенную цену."

 GXC_harmony_with_the_business_class: "Гармония с бизнес-классом"
 GXC_harmony_with_the_business_class_desc: "На протяжении веков класс торговцев и бизнесменов был основой процветания Китая, накапливая богатство и создавая местную экономику посредством торговли. Если наши отношения с ними останутся гармоничными и основанными на сотрудничестве, процветание и богатство, принесенные этими торговцами, будут нам очень полезны, помогая в нашем строительстве Лянгуана. В отличие от Гоминьдана, который без необходимости противодействовал и подавлял эти торговые ассоциации, мы продолжим признавать их роль в обществе и строить спокойный мир вместе."

 GXC_rebuilding_a_southern_political_establishment: "Восстановление южного политического истеблишмента"
 GXC_rebuilding_a_southern_political_establishment_desc: "Из-за бесконечных войн и административной раздробленности вследствие политических распрей со всех сторон Лянгуан впал в состояние, близкое к анархии. Сметенный захватом Гоминьданом двух провинций, дружественный Бэйяну политический истеблишмент на Юге лежал в руинах. Даже когда наш контроль над Лянгуаном вернулся после Северного похода, политический ландшафт уже никогда не был прежним, так как местная бюрократия спотыкается, пытаясь вернуть себе хватку. С помощью местных экспертов в области управления создание более эффективной и отлаженной политической машины поможет в процессе политической централизации."

 GXC_treading_the_lawful_path: "Идя по законному пути"
 GXC_treading_the_lawful_path_desc: "Править землями железной хваткой и силой армии легко, но поддерживать стабильность и социальную гармонию трудно, если игнорируется верховенство закона, особенно правителями, которые намерены управлять своими землями. Общественное восприятие правительств в Лянгуане было на рекордно низком уровне, так как преступления остаются безнаказанными и во многих случаях поощряются как путь к социальной мобильности. С призывами к конституционализму и демократии, которые становятся все громче и громче, это удобное время для нас, чтобы убить двух зайцев одним выстрелом, восстановив общественное доверие к нашей администрации и успокоив демократические голоса, продемонстрировав нашу приверженность строгому соблюдению закона."

#Non-GXC Side Decisions

 GXC_pressure_liangguang_into_alignment: "Оказать давление на Лянгуан, чтобы он присоединился"
 GXC_pressure_liangguang_into_alignment_desc: "Наши усилия в Лянгуане начали приносить плоды, так как лояльные нашему правительству начинают обладать достаточной властью, чтобы оспаривать нынешние власти в регионе. Поскольку их мандат в двух провинциях находится на грани краха, самое время нам оказать давление на регион и мобилизовать лоялистские силы в Лянгуане для захвата контроля!"

 GXC_allure_of_money_and_flattery: "Очарование денег и лести"
 GXC_allure_of_money_and_flattery_desc: "Плачевное состояние, в котором оказался Лянгуан, — это лишь еще одна возможность для нас расширить свое влияние на Юге. Недавно отразив разрушительное вторжение Гоминьдана наряду с внутренними восстаниями бандитов и местных милитаристов, многие в Лянгуане не уверены в своем положении, финансовом и военном. Отправляя финансовую помощь для содействия их восстановлению наряду с лестными словами в адрес их руководства, они станут более восприимчивы к нашему правительству. В конце концов, у каждого есть своя цена."

 GXC_bribing_the_disaffected: "Подкуп недовольных"
 GXC_bribing_the_disaffected_desc: "Лянгуан может быть в полустабильном состоянии на поверхности, но тем, кто смотрит внутрь, ясно, что не все довольны текущими договоренностями. Будь то из-за мелких обид, идеологических разногласий со своим начальством или просто готовности сделать что угодно ради личного обогащения, многие в Лянгуане готовы сменить сторону, если их достаточно подкупить. Мы можем незаметно и легко демонтировать организационную структуру противоборствующей фракции, позволив нашему предпочтительному кандидату в Лянгуане получить контроль без особого кровопролития."

 GXC_issue_threats_to_liangguang: "Выдвинуть угрозы Лянгуану"
 GXC_issue_threats_to_liangguang_desc: "С их армией в лохмотьях, недавно вышедшей из разрухи, их неспособностью оказать значительное сопротивление, если еще одно вторжение войдет в Лянгуан, и необходимостью времени для восстановления своей армии сделали Лянгуан склонным к умиротворению. Чтобы еще больше расширить наше влияние в регионе, мы должны оказать давление на руководство в Лянгуане угрозами, и, надеюсь, они будут достаточно напуганы, чтобы выполнить наши требования о размещении нашей предпочтительной стороны в своей администрации."

 GXC_accommodate_local_warlords: "Приспособить местных милитаристов"
 GXC_accommodate_local_warlords_desc: "Помимо вторжений сил Гоминьдана, Лянгуан также страдал от восстаний, организованных бандитами и местными милитаристами. Сокрушенные региональными властями вместе с отражением сил Гоминьдана, эти милитаристы бежали по всему Югу, либо удалившись в безвестность, либо все еще безнадежно планируя возвращение, намереваясь вернуть положение, которое они потеряли в своем восстании. Имея их в нашей власти, мы могли бы приспособить и использовать их для дальнейшего расширения нашего влияния в двух провинциях."

 GXC_send_out_peace_feelers: "Закинуть удочки о мире"
 GXC_send_out_peace_feelers_desc: "Юг, как известно, был самым мятежным регион в стране, будучи хозяином Сунь Ятсена и революционного Гоминьдана, который маршировал на север в своем Северном походе. Хотя поход провалился и был безуспешным, страхи перед вторым Северным походом еще не утихли. Таким образом, необходимо, чтобы мы отправили мирные предложения в Лянгуан и гарантировали, что конфликт между нашими двумя администрациями не возникнет, а также укрепили тех в их рядах, кто симпатизирует нашему делу."

 ## Guangxi Army Decisions
 GXC_guangxi_army_category: "Расширить Систему Гуанси"
 GXC_guangxi_army_category_desc: "Концептуализированная как фундаментальная основа, в которой местные лидеры Гуанси могут организовать свое Движение за реконструкцию Гуанси, система ополчения Гуанси находит свой исторический прецедент в династиях Ся, Шан и Чжоу. Не имея профессиональных армий, не существовало различий между солдатами и крестьянами, армия и народ действовали в унисон. Когда нация сталкивалась с войной, все в нации брались за оружие. Когда возвращался мир, войска расходились возделывать свои земли. Эта система называлась «Юй Пин Юй Нун», или «Армия и Крестьянство Едины», как она появилась в Ли Цзи (Книге ритуалов).\n\nПолагают, что эта система продолжалась в династиях Хань и Тан, но в конечном итоге была отменена при Сун, и так началась вражда между крестьянином и солдатом. Еще совсем недавно ополчение использовалось в аналогичной системе во время восстания тайпинов, и ополчения последовательно собирались в периоды анархии в Гуанси.\n\nПоскольку каждый уезд обучает и набирает местных мужчин, отряды ополчения были созданы в каждой деревне, школе, офисе и университете. Каждый аспект ополчения нашел своего эквивалентного двойника в армии, и помимо военных обязанностей ополчение несет службу в общинных и кооперативных схемах, административных переписях и регистрации земель. Подражая Швейцарии, система Гуанси призвана стать моделью, в которой каждый китайский гражданин найдет свое предназначение или иным образом внесет свой вклад в нацию."
 GXC_recruit_militias: "Расширить Систему Гуанси в [FROM.GetName]"
GXC_recruit_militias_desc: "Хотя система Гуанси добилась замечательного успеха в самой Гуанси, амбиции ее создателей всегда заключались в том, чтобы увидеть ее расширение на весь Китай. Разделив [FROM.GetName] на ряд районов ополчения, районные магистраты будут обременены обязанностями по пересадке системы Гуанси в свои местные общины."

GXC_add_support_recon: "Добавить разведывательные отряды"
 GXC_add_support_recon_desc: "Включая различные кавалерийские отряды в формирования ополчения Гуанси, мы можем обеспечить превосходную боевую эффективность и возможности сбора разведданных в военизированных формированиях. Мы будем больше, чем просто старая система провинциального ополчения, мы станем новой гражданской армией."
 GXC_add_support_artillery: "Добавить артиллерию поддержки"
 GXC_add_support_artillery_desc: "Расширение огневых возможностей нашего ополчения Гуанси крайне необходимо, так как одиночная винтовка не может вызвать и подобия той бойни или страха, которые способен вызвать шквал артиллерийских снарядов. Конечно, необходимо будет включить артиллерийскую подготовку в учебную программу ополчения, но это простое дело."
 GXC_add_support_engineers: "Добавить саперную роту поддержки"
 GXC_add_support_engineers_desc: "Включение обученных специализированных саперных рот в ополчение Гуанси, несомненно, повысит их эффективность не только в полевых условиях, но и в инфраструктурных работах, а также в формировании нового китайского государства."
 GXC_add_militia_to_template_decision: "Включить дополнительные формирования ополчения"
 GXC_add_militia_to_template_decision_desc: "Хотя первоначальное формирование ополчения доказало свою успешность во всех требуемых от него аспектах, пришло время перейти от простого ополчения к полноценной добровольческой армии. Используя долгосрочные контракты и рабочую систему призыва, каждый трудоспособный мужчина призывного возраста будет обучен военному делу. Когда для китайского народа наступит неизбежная финальная борьба, каждый возьмет в руки оружие, чтобы сражаться за свою нацию."
 GXC_chinese_wehrstaat_decision: "Расширить «Верштат» в [FROM.GetName]"

##Three Year Plan Decisions
 GXC_three_year_plan_decision_category: "Решения Трехлетнего плана"
 GXC_three_year_plan_decision_category_desc: "Хотя Гуандун является богатым регионом Китая, предстоит еще много работы, если мы хотим привести эту провинцию в современную эпоху. Крах Лиги и Черный понедельник обнажили наши экономические слабости, что побудило правительство Гуанчжоу разработать планы амбициозного экономического проекта, который модернизирует и разовьет нашу экономику. Трехлетний план будет использовать материальные ресурсы Гуанси, а также промышленный потенциал Гуандуна для решения как сельскохозяйственных, так и городских проблем, чтобы принести процветание для всех и стать маяком для подражания остальному Китаю!"

 GXC_wengjiang_hydroelectric_plant: "Вэнцзянская гидроэлектростанция"
 GXC_wengjiang_hydroelectric_plant_desc: "В непосредственной близости от города Шаогуань протекает река Бэйцзян (Северная река), которая течет на юг в Гуанчжоу. Экономические планировщики правительства Гуанчжоу решили, что это лучшее место для строительства гидроэлектростанции, которая поможет с усилиями по электрификации провинции Гуандун."

 GXC_guangdong_beverage_factory: "Гуандунский завод напитков"
 GXC_guangdong_beverage_factory_desc: "Индустрия напитков является бурно развивающейся частью экономики Гуандуна. Многие в Китае, да и во всем мире, любят пить пиво и безалкогольные напитки, и архитекторы Трехлетнего плана разработали планы, чтобы воспользоваться этой возможностью, инвестируя средства в новый завод по производству напитков в Гуанчжоу, что привлечет больше торговли в Гуандун."

 GXC_guangdong_iron_and_steel_mill: "Гуандунский металлургический комбинат"
 GXC_guangdong_iron_and_steel_mill_desc: "В рамках нашего трехлетнего плана по модернизации экономики Гуандуна министерством промышленности был разработан план развития производства чугуна и стали в Гуандуне. Несмотря на изобилие ресурсов в Китае, производство стали по всей стране низкое, за исключением сталелитейного завода в Аньшане на северо-востоке. Развитие этого металлургического комбината поможет нам снизить японское влияние на нашу национальную экономику и обеспечит нам прочную основу для большего экономического развития."

 GXC_guangdong_chemical_and_fertiliser_factory: "Гуандунский завод химикатов и удобрений"
 GXC_guangdong_chemical_and_fertiliser_factory_desc: "Хотя Китай является преимущественно сельскохозяйственной страной, ему все еще не хватает современной индустрии удобрений. Экономические планировщики наметили амбициозный проект по развитию завода химикатов и удобрений в Гуанчжоу, который, как мы надеемся, даст толчок модернизации производства удобрений в Китае."

 GXC_Fuguo_Coal_Mine: "Расширить угольную шахту Фуго"
 GXC_Fuguo_Coal_Mine_desc: "Мы все еще боремся с нехваткой важных ресурсов, таких как уголь, и шахты в Фуго остаются небольшими. Их следует расширить, ибо уголь является одним из самых важных ресурсов в мире, и мы должны ограничить его импорт."

