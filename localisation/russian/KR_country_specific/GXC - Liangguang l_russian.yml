 #共和大同盟 粵軍司令部
 GXC_YAC_party: "ВРА-КАЮ"
 GXC_YAC_party_long: "$GXC_YAC_party_long_tt$\n§L$GXC_GRA_intro$\n\nНачав как милитарист в 1911 году, Чэнь Цзюнмин был избран главнокомандующим Гуандунской армии остатками провинциальной ассамблеи и вместе с Дэн Кэном возглавил армию, состоящую в основном из крестьян под командованием офицерского корпуса из бывших военных, членов тайных обществ, местной интеллигенции и зарубежных китайцев из Юго-Восточной Азии. Назвав свою армию «Сюньцзюнь», или Армия Сюнь, в честь Сюньчжоу, древнего названия Хуэйчжоу, он принял символ системы колодезных полей (井). Переименованная в Армию Юэ после окончания Войны в помощь Фуцзяни, она впоследствии провела большую часть времени в столкновениях со Старой кликой Гуанси и Гоминьданом.\n\nНоминально являясь военным крылом федералистского проекта Чэня, Клика армии Юэ провозглашает Чэня своим главнокомандующим, хотя он в значительной степени воздерживается от военного планирования. Истинные ключи от замка, похоже, находятся в руках Е Цзюя, способного и доверенного заместителя Чэня по военным вопросам. Хотя его преданность делу федерализма еще предстоит увидеть, верность Е по отношению к Чэню непоколебима. Под его началом Армия Юэ будет действовать как меч и щит гуандунского федерализма, защищая его, даже если сам Чэнь дрогнет.§!\n"
 GXC_YAC_party_long_tt: "Великий республиканский альянс — Клика армии Юэ (Гунхэ Датунмэн Юэ Цзюнь Сылин Бу)"

 GXC_YUE_national_party: "Клика Юэ"
 GXC_YUE_national_party_long: "$GXC_YUE_national_party_long_tt$\n§LИзначально просто фракция консерваторов в более широком Великом республиканском альянсе Чэнь Цзюнмина, неформально названная «Клика Юэ», развилась на фоне опасений и растущей оппозиции к Партии общественных интересов, а также как группа общих интересов консервативных федералистов. Беря свое начало от различных покровителей Чэня со времен его скромных начинаний в Гуандуне, Клика Юэ объединяет богатство Кантонского купеческого корпуса, связи Ассоциации поддержки зерновой промышленности, силу Армии Юэ и местных «неприсоединившихся» гуандунских милитаристов, ставших местными государственными деятелями, в единое целое.\n\nОбъединившись ради выживания в национальном масштабе, различия и мелочи между всеми консервативными союзниками Партии общественных интересов были отодвинуты на второй план необходимостью представить единый фронт против предполагаемого радикализма со стороны оппозиции. Верная идеалам Партии общественных интересов при ее основании, вплоть до готовности пойти против самой партии в случае необходимости, Клика Юэ служит последним авангардом стабильности и процветания новой китайской демократии, гарантируя, что шэньши и военные имеют право голоса в политике.§!\n"
 GXC_YUE_national_party_long_tt: "Клика Юэ (Юэ Си Цзюньфа)"

 GXC_NRG_party: "ПНР"
 GXC_NRG_party_long: "$GXC_NRG_party_long_tt$\n§LКитайская демократия, пожалуй, оказалась самым трудным зверем, которого нации предстояло победить и преодолеть. Отмеченное неудачами с момента своего создания в 1912 году, так называемое «Правительство национальной реконструкции» — это всего лишь еще одно из длинного списка массовых политических движений, нацеленных на стабилизацию нации, обеспечение ее долголетия и, в конечном итоге, введение некоторой формы демократического надлежащего процесса. В своей новой администрации в качестве «временного» президента Республики Ли Цзишэнь получил практически полный исполнительный мандат на реорганизацию нации по своему усмотрению. Перераспределив места в Национальной ассамблее, он обеспечил, чтобы его ПНР и ее более широкая коалиция с ДЛК сохраняли почти полное господство в политических делах страны.\n\nС конечной целью предотвращения автократии Юэ и освобождения народа, ПНР поставило перед собой цели мобилизации не только интеллектуалов, но и масс, как первый шаг к созданию местных демократических организаций и обучению масс демократическому самоуправлению. Возможно, это опека под другим названием, но в ПНР видят много сходства с Гоминьданом, к которому Ли Цзишэнь сохраняет симпатию.§!\n"
 GXC_NRG_party_long_tt: "Правительство национальной реконструкции (Гоцзя Чунцзянь Чжэнфу)"

