 #陳銘樞
 GXC_chen_mingshu: "Чэнь Миншу"
 GXC_chen_mingshu_bio: "Родившийся в сельской деревне в Гуандуне, Чэнь начал свою политическую и военную карьеру в возрасте 17 лет в 1906 году, поступив в Начальную военную школу Гуандуна и одновременно вступив в Тунмэнхой доктора Сунь Ятсена. После начала Синьхайской революции Чэнь последовал за Сун Цзяожэнем в Ухань для участия в революции, став членом Второго эскадрона смерти Центрального комитета.\n\nВновь охваченный революционным пылом, Чэнь служил в анти-юаньшикаевской армии Ли Яоханя, хотя после их поражения от Старой клики Гуанси солдаты Чэня влились под командование Линь Ху. Используя свои связи, когда Гуанси вторглась в Гуандун в 1920 году, Чэнь собрал остатки армии Ли Яоханя, поднял мятеж против Старой клики Гуанси и позже влил свои войска в Гуандунскую провинциальную армию.\n\nПосле предательства Чэнь Цзюнмином доктора Сунь Ятсена Чэнь ушел с военной службы и отправился в Нанкин изучать буддизм, однако после восстановления правления националистов в 1924 году Чэнь Миншу был лично завербован уважаемым Дэн Яньда, чтобы вернуться в Гуандун и снова предложить свои услуги. Чэнь был включен в Четвертую армию Национально-революционной армии под командованием Ли Цзишэня, став командиром 10-й дивизии.\n\nУспешно отслужив в Северном походе, Чэнь был вынужден стать свидетелем распада своей Четвертой армии под давлением немецких и милитаристских сил и присоединиться к своим людям, составив костяк повстанческого движения Миньгань. Сотрудничая с такими людьми, как Дэн Яньда, Ли Цзишэнь и Сунь Цинлин во время своего пребывания в Миньгане, Чэнь полностью находится в лагере Временного комитета действий."
 GXC_chen_mingshu_leader_desc: "§YРодился:§! §L15 октября 1889 года в Хэпу, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_chen_mingshu_bio$§!"
 GXC_chen_mingshu_army_chief_desc: "§YРодился:§! §L15 октября 1889 года в Хэпу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §SВременный комитет действий§!\n§YБиография:§! §L$GXC_chen_mingshu_bio$§!\n\n§YЗаметки: Несмотря на заметные успехи в Северном походе, Чэнь получил прозвище «Хромой генерал», так как никогда по-настоящему не затмевал своих сверстников в НРА, оставаясь при этом всегда слабым здоровьем.§!"

 #蔣光鼐
 GXC_jiang_guangnai: "Цзян Гуаннай"
 GXC_jiang_guangnai_sic_desc: "§YРодился:§! §L17 декабря 1888 года в Дунгуане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §SВременный комитет действий§!\n§YБиография:§! §LРодившийся в довольно стабильной семейной обстановке в городском Гуандуне, Цзян Гуаннай был обречен служить в армии, будучи принятым в Начальную военную школу Гуандуна в Хуанпу, а затем радикализировался в ходе Синьхайской революции. В 1912 году он был отобран Военной академией Баодин для обучения там благодаря своим впечатляющим военным заслугам и окончил первый кавалерийский факультет в 1913 году.\n\nСнова оказавшись на службе у революционеров, Цзян присоединился к Первой дивизии Гуандунской армии, позже реорганизованной в знаменитую Четвертую армию Национально-революционной армии под эгидой Ли Цзишэня. Будучи прикомандированным к 10-й дивизии в качестве заместителя командира дивизии, Цзян начал свою пожизненную ассоциацию и дружбу с командиром 10-й дивизии Чэнь Миншу, скрепив узы кровью и огнем Северного похода.\n\nУспешно отслужив в злополучном предприятии, Цзян Гуаннай последовал за Чэнем и такими людьми, как Цай Тинкай, в зону повстанцев Миньгань, когда Четвертая армия распалась, ожидая времени, чтобы вернуться к национальной известности при малейшем намеке на слабость Чжили. Исполнительный и верный, Цзян пользуется большим доверием Чэня во всех вопросах, от политики до полевого командования.§!"

 #蔡廷鍇
 GXC_cai_tingkai: "Цай Тинкай"
 GXC_cai_tingkai_high_command_desc: "§YРодился:§! §L15 апреля 1892 года в Лодине, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §SВременный комитет действий§!\n§YБиография:§! §LОкончив Офицерскую школу армии Баодин и вступив в Тунмэнхой в довольно юном возрасте, Цай Тинкай оказался на службе в качестве полицейского в районе Дапэн, где он был представлен доктору Сунь Ятсену, ранее вступив в Гуандунскую армию во время Синьхайской революции, став командиром роты в возрасте 19 лет. После службы в войнах Юэ-Гуй Цай отличился бесподобным руководством дивизией и был приписан к Первой дивизии Гуандунской армии.\n\nПозже он остался на своем посту во время ее реорганизации в знаменитую Четвертую армию Национально-революционной армии, включавшую таких людей, как Дэн Яньда, Ли Цзишэнь и его уважаемый друг Чэнь Миншу, который служил его командиром в бою, наряду с такими людьми, как Цзян Гуаннай.\n\nВновь продемонстрировав свой чистый потенциал и талант на поле боя во время Северного похода, Цай последовал за своим командиром и различными другими деятелями Гоминьдана в зону повстанцев Миньгань из-за раскола Четвертой армии, с намерением вести партизанскую войну в надежде вернуться на национальную арену. Заслужив свои нашивки в Миньгане, Цай зарекомендовал себя как самый опытный подчиненный Чэнь Миншу и заслужил похвалу как от кадров, так и от крестьян.§!"

 #戴戟
 GXC_dai_ji: "Дай Цзи"
 GXC_dai_ji_commander_desc: "§YРодился:§! §L1895 год, в Сучжоу, провинция Цзянсу, Великая Цин§!\n§YПринадлежность:§! §SВременный комитет действий§!\n§YБиография:§! §LРодившийся в бедности и потерявший родителей в детстве, Дай Цзи работал подмастерьем в магазине и пережил тяжелое детство, так как часто подвергался жестокому обращению со стороны владельца магазина. По этой причине он позже, в 15 лет, вступил в студенческую армию в Шанхае.\n\nВ 1914 году Дай Цзи поступил в 3-й класс Военной академии Баодин и два года изучал пехотное дело. После выпуска он служил младшим офицером в Аньхое, пока не проникся революционным духом во время Войны в защиту республики и не присоединился к Юньнаньской армии. Позже присоединившись к Гуандунской армии, Дай прошел путь от командира взвода до заместителя командира полка и недолго служил военным инструктором. Позже, когда в Гуандуне была сформирована Национально-революционная армия, Дай был назначен командиром 30-го полка 10-й дивизии, служа вместе с Цзян Гуаннаем и Цай Тинкаем под началом Чэнь Миншу.\n\nВо время Северного похода, после того как Хунань была захвачена НРА, Дай и его войска двинулись на Ухань. В августе 1926 года Дай Цзи возглавил штурм и сражался со своими солдатами в авангарде Динсыцяо, стратегически важного города с тяжелой обороной Чжили, и был тяжело ранен. Поскольку Северный поход закончился катастрофически весной 1927 года, разочарованный реальностью, Дай Цзи ушел в отставку и поселился в Шанхае для восстановления сил.\n\nВ 1928 году Чэнь Миншу снова пригласил Дая служить под его началом вместе со старыми товарищами в Гуандуне. Дай Цзи согласился и вернулся в качестве штабного офицера Чэня, наставника офицерского корпуса и командира дивизии. С тех пор Дай был доверенным и надежным подчиненным Чэня, помогая ему в наращивании сил.§!\n\n§YЗаметки: Дай Цзи всегда первым оказывается на передовой, независимо от того, насколько яростен огонь противника. Он также является верным последователем Чэнь Миншу и будет поддерживать его при любых обстоятельствах.§!"

 ###- GPA -###
 #譚平山
 GXC_tan_pingshan: "Тань Пиншань"
 GXC_tan_pingshan_bio: "Родившийся в семье портного, Тань Пиншань был принят в Педагогическое училище Гуанчжоу и Гуанси, а затем в среднюю школу Лэйчжоу, где он впервые вступил в борьбу радикальной политики, присоединившись к Тунмэнхою доктора Сунь Ятсена в 1907 году. Во время пребывания в Пекинском университете он участвовал в зарождающемся Движении 4 ноября, даже совершая вандализм и поджоги против правительственных чиновников, позже став одним из 32 арестованных за такие действия.\n\nПосле освобождения из тюрьмы Тань вернулся в свой родной Гуандун, а позже помог в создании Китайской синдикалистской партии в 1921 году, занимая должность секретаря Гуандунского отделения. Твердо уверенный в том, что синдикализм — это путь вперед для китайского гражданства, провал Северного похода привел к крушению его мечтаний о прогрессе в Китае и заставил его скрываться.\n\nПрисоединившись к повстанцам Миньгань и Временному комитету действий, Тань отбросил свое членство в КСП в пользу Гоминьдана, хотя никогда по-настоящему не вписывался в основной состав ВКД. Из-за его предпочтения поддерживать открытые связи с КСП последователи Таня считаются изгоями, прозябающими в Гуандуне. С возрождением Гоминьдана в Гуандуне Тань примкнул со своим отделением к довольно сговорчивому Чэнь Миншу, укрепив свои связи с Сунь Цинлин и Дэн Яньда, наряду со связями со своими старыми друзьями в КСП."
 GXC_tan_pingshan_leader_desc: "§YРодился:§! §L28 сентября 1886 года в Гаомине, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_tan_pingshan_bio$§!"
 GXC_tan_pingshan_sic_desc: "§YРодился:§! §L28 сентября 1886 года в Гаомине, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RГуандунское Временное действие§!\n§YБиография:§! §L$GXC_tan_pingshan_bio$§!"

 #葉劍英
 GXC_ye_jianying: "Е Цзяньин"
 GXC_ye_jianying_army_chief_desc: "§YРодился:§! §L28 апреля 1897 года в Мэйсяне, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RГуандунское Временное действие§!\n§YБиография:§! §LРодившийся в семье хакка, которая владела небольшим бизнесом в сельской местности Гуандуна, он преуспел в образовании в юном возрасте. Во время учебы в своей новой средней школе Е начал увлекаться различной прогрессивной литературой и служил президентом Студенческого союза, окончив школу в 1915 году. Позже, в 1917 году, Е поступил в Юньнаньскую военную академию, окончив ее в 1920 году и вступив в Гоминьдан в том же году.\n\nУчаствуя в войнах Юэ-Гуй, Е даже лично вывел Сунь Ятсена из перестрелки. Позже, во время контратаки против Чэнь Цзюнмина, Е одержал великую победу на перевале Яньлин, принесшую ему большую известность в Национально-революционной армии, и благодаря его достижениям против федералистов он был назначен начальником штаба Второй армии Гуандуна, а позже приглашен Ляо Чжункайем принять участие в основании Вампу. Во время работы инструктором в Вампу он увлекся социалистическими идеалами своих студентов, постепенно обращаясь в синдикализм, а позже, в 1925 году, подал заявление на членство в КСП, хотя его заявление было задержано из-за его связей с Чан Кайши.\n\nУчаствуя в Северном походе в составе 1-й армии, принимал участие в дополнительной организации забастовок во время немецкой оккупации Гуандуна. С разгромом Экспедиции Е Цзяньин последовал за Дэн Яньда и Сунь Цинлин в повстанческое движение Миньгань, служа источником связи между Тань Пиншанем в Гуандуне, КСП и ВКД.§!"

 #週士第
 GXC_zhou_shidi: "Чжоу Шиди"
 GXC_zhou_shidi_high_command_desc: "§YРодился:§! §L9 сентября 1900 года в уезде Лэхуэй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RГуандунское Временное действие§!\n§YБиография:§! §LУчаствуя в событиях 4 ноября будучи молодым студентом во время учебы в средней школе Цюнъя, Чжоу Шиди начал свою революционную карьеру в качестве сотрудника Студенческого союза Цюнъя. С 1920 года он был местным учителем, а в 1923 году присоединился к «Обществу обозрения Новой Цюнъя», внешней фронтовой организации Китайской синдикалистской партии. Помогая в публикации «Обозрения Новой Цюнъя», он был рекомендован Сюй Чэнчжаном для обучения в недавно открытой Военной академии Вампу.\n\nОкончив ее в 1924 году, Чжоу участвовал в качестве командира взвода команды бронемашин Националистической армии и вступил в Китайскую синдикалистскую партию в декабре того же года. Служа заместителем команды бронемашин, а затем команды прикрытия с воздуха, он подавлял восстание Торгового корпуса и вел команду бронемашин против Чэнь Цзюнмина. Сражаясь в Северном походе с Е Тином в составе 4-й армии Национально-революционной армии, Чжоу увидел, как его бронетанковый опыт используется с переменным успехом, когда 4-я армия распалась в зоне повстанцев Миньгань.\n\nПродолжая вести смелые и кровопролитные бои в качестве повстанца, Чжоу отличился среди своих товарищей-партизан и присоединился к Временному комитету действий Гоминьдана. Работая с Чэнь Миншу и 10-й дивизией для ведения партизанской кампании в Гуандуне, Чжоу все больше и больше склонялся к Тань Пиншаню и его гуандунской секте ВКД.§!"

 #黄雍
 GXC_huang_yong: "Хуан Юн"
 GXC_huang_yong_commander_desc: "§YРодился:§! §L1900 год, в Пинцзяне, провинция Хунань, Великая Цин§!\n§YПринадлежность:§! §RГуандунское Временное действие§!\n§YБиография:§! §LРаботая подмастерьем и полицейским в юном возрасте, Хуан Юн покинул Гуанчжоу в 1918 году, поступив в зал боевых искусств в 1922 году, а позже в Военную академию Вампу в 1924 году. Вступив в Гоминьдан во время пребывания в Вампу, Хуан окончил ее в 1924 году и немедленно погрузился в левую политику различных крестьянских движений вокруг Гуандуна, но в конечном итоге счел рабочую политику недавно созданной Китайской синдикалистской партии наиболее привлекательной, вступив в нее в 1925 году.\n\nСтав членом партии, Хуан Юн служил специальным комиссаром в Дунцзяне и Цюнъя, успешно организовав серию вооруженных беспорядков, даже заняв Луфэн, создав коммуну и Вторую дивизию Рабоче-крестьянской революционной армии. Однако его время в КСП не было вечным, так как после Северного похода и ориентации КСП на Интернационал, Хуан начал склоняться к мечтам, представленным отделением Временного комитета действий Тань Пиншаня, возобновив свое членство в Гоминьдане.\n\nТвердо веря в концепцию того, что китайский социализм должен быть независимого направления, Хуан Юн довольно сильно проникся политикой Третьей силы Тань Пиншаня в Китае и служит для приведения идей Таня в жизнь, если необходимо, с применением насилия.\n\nХотя Хуан Юн и не имеет большого опыта в крупномасштабных боях, он обладает подкупающей способностью довести Национальную революцию до конца и будет давать отпор капиталистам, милитаристам и бандитам в равной степени.§!"

 #项英
 GXC_xiang_ying: "Сян Ин"
 GXC_xiang_ying_high_command_desc: "§YРодился:§! §LМай 1898 года, в Учане, провинция Хубэй, Великая Цин§!\n§YПринадлежность:§! §RГуандунское Временное действие§!\n§YБиография:§! §LРодившийся как Сян Дэлун в деревне недалеко от Учана, Сян переехал с семьей в город ради карьеры отца в уездном правительстве. После учебы в начальной школе Юйцай в Учане и частной средней школе Жисинь в Учане, Сян стал подмастерьем текстильщика в возрасте 13 лет. После трех лет ученичества он стал настоящим текстильным рабочим. Четыре года спустя Сян возглавил забастовку рабочих ткацкой фабрики. В следующем году Сян создал клуб железнодорожников в Цзянъане.\n\nВ апреле 1922 года Сян вступил в зарождающуюся Китайскую синдикалистскую партию по рекомендации Бао Хуэйшэна. В октябре того же года Сян возглавил успешную забастовку на машиностроительном заводе Янцзы. В 1923 году, после зашедших в тупик переговоров с У Пэйфу, Ли Дачжао поручил Сяну начать забастовку на Пекин-Ханькоуской железной дороге, которую Нефритовый маршал подавил военной силой. Продолжая набирать известность в Лиге синдикалистов, Сян вступил в Гоминьдан благодаря Единому фронту.\n\nНаходясь в Ухане во время Северного похода, Сян готовился к входу Национально-революционной армии в город, хотя У Пэйфу в конечном итоге отбросил националистов. После падения Национального правительства Гуанчжоу Сян бежал в Шанхай, где продолжил вести профсоюзную деятельность от имени Национальной революции.\n\nСян стал ведущей фигурой в Шанхайском восстании 1932 года и оказался в Миньгане после подавления Лиги. Действуя в повстанческом движении, Сян попал в орбиту Тань Пиншаня, члена Временного комитета действий, имеющего связи с КСП. Преданный революционер, Сян продолжает мечтать о Китае, где оковы пролетариата будут разбиты.§!"

 #叶季壮
 GXC_ye_jizhuang: "Е Цзичжуан"
 GXC_ye_jizhuang_high_command_desc: "§YРодился:§! §LМай 1898 года, в Учане, провинция Хубэй, Великая Цин§!\n§YПринадлежность:§! §RГуандунское Временное действие§!\n§YБиография:§! §LВоспитанный кормилицей из-за смерти матери при его рождении, Е начал обучение, когда ему было 7 лет. После окончания учебы он сначала искал карьеру в судебной сфере, прежде чем заняться преподаванием. Преподавая в Гонконге, он основал информационное агентство и небольшую ежедневную газету. Работая главным редактором, он использовал псевдоним Е Цзинтянь. В 1925 году Е был участником Всеобщей забастовки Кантон-Гонконг, помогая мобилизовывать и организовывать массы в Цзянмэне, создав общий профсоюз и забастовочный комитет, а также возглавив рабочих в их борьбе против чрезмерного налогообложения.\n\nИз-за своей революционной деятельности он был принят в Китайскую синдикалистскую партию. Через Единый фронт Гоминьдан назначил его и Лян Синьчжи членами подготовительного комитета штаб-квартиры партии Гоминьдан уезда Синьсин. К 1926 году Е служил секретарем Цзянмэньского отделения КСП. В Синьсине Е руководил ликвидацией контролируемого шэньши общества Синсянь, организовывал рабочие и крестьянские армии и основал несколько школ. После провала Северного похода Е бежал в Макао, где продолжил свою революционную деятельность.\n\nПереехав в Гонконг после того, как не смог связаться с руководством КСП в Шанхае, Е вернулся к преподаванию и руководству «Маленькой ежедневной газетой Гонконга», официальной газетой ЛКС. После подавления властями Гонконга Е получил приказ от КСП курировать расширение синдикалистских ополчений в Миньгане. После Шанхайского восстания 1932 года в этом районе усилились повстанцы Гоминьдана, и Е тесно сотрудничал с Тань Пиншанем и ВКД. После того как Гуанчжоу был возвращен НРА, Е вернулся домой, надеясь создать революционный Китай, который сражается за рабочих и крестьян.§!"

 #劉石心
 GXC_liu_shixin: "Лю Шисинь"
 GXC_liu_shixin_advisor_desc: "§YРодился:§! §L1895 год, в Чжуншане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RГуандунское Временное действие§!\n§YБиография:§! §LВ отличие от многих кантонских деятелей, у Лю Шисиня уникальное прошлое по сравнению с большинством китайцев, так как он младший брат Лю Шифу, ветерана революции, одного из первых китайских анархистов и основателя китайского анархистского движения. Для продвижения дела анархизма Лю Шифу, скончавшийся в 1915 году в возрасте 31 года от переутомления, создал многочисленные публикации и политические организации, включая Китайский корпус убийц, который организовывал покушения на чиновников Цин. Лю Шисинь понес пылающий факел анархизма своего брата, так как находился под сильным влиянием его мыслей. Сочувствуя тяжелому положению, с которым сталкиваются простые люди, Лю Шисинь, учившийся в местной школе, принял участие в редактировании левого журнала «Рабочие».\n\nЛю по-настоящему подхватил наследие своего брата во время одного из величайших событий в мире, и все это восходит к его решению учиться в Франко-китайском институте Лиона. В течение двух лет учебы он участвовал в редактировании различных анархистских трудов и был сильно вдохновлен успешной революцией во Франции, что побудило его продолжить анархистское движение после возвращения в родную провинцию в 1923 году.\n\nПоддерживая тесный контакт с анархистами по всей стране, Лю Шисинь работал с китайскими синдикалистами, такими как Чэнь Дусю, до того, как их доктринальные расхождения разделили их. Считая, что все правительственные организации жестоки и автократичны, он старался изо всех сил продвигать анархизм в Гуандуне различными способами среди крестьянства. Лю Шисинь верит, что только реализовав анархизм, Китай и китайский народ смогут освободиться от внутренних репрессий и империалистической эксплуатации.§!"

 ###- SPO -###
 #鄧發
 GXC_deng_fa: "Дэн Фа"
 GXC_deng_fa_advisor_desc: "§YРодился:§! §L7 марта 1906 года в Юньфу, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §rКитайская синдикалистская партия — Ортодоксальная§!\n§YБиография:§! §LНачав обучение в возрасте 6 лет, образование Дэн Фа было относительно скромным, он учился в различных государственных и частных учреждениях. Однако начало Движения 4 ноября подтолкнуло молодого Дэна в радикальном направлении, приведя к его активному участию в движении. В 1921 году он бросил школу и работал на разных подработках, пока не присоединился к рабочему движению под руководством Су Чжаочжэна.\n\nВ 1925 году Дэн Фа присоединился к забастовке Кантон-Гонконг, выступая представителем Конгресса бастующих рабочих, лидером пикетной группы рабочих и руководителем отдела пропаганды. Будучи представленным Китайской синдикалистской партии Су Чжаочжэном позже в том же году, он вступил в нее и служил сотрудником партийной организации и секретарем партийного отделения.\n\nВ 1926 году Дэн Фа также вступил в Гоминьдан, служа капитаном Молодежной команды Северного похода, и участвовал в судьбоносном Северном походе. После распада экспедиции Дэн Фа вернулся в Гуанчжоу, чтобы помогать местному рабочему движению, работая в подполье под бдительным оком владельцев бизнеса и Чжили.\n\nС возрождением социалистов в его родной провинции Дэн Фа осмелел и стал действовать совместно с другими профсоюзными лидерами, такими как Дэн Чжунся и Чжан Тайлэй, отстаивая права рабочих и выступая защитником их бедственного положения.§!"

 #鄧中夏
 GXC_deng_zhongxia: "Дэн Чжунся"
 GXC_deng_zhongxia_bio: "Получив довольно обычное образование в детстве, первый шаг Дэна в революционную политику произошел в 1917 году, когда, сопровождая своего отца в Пекин и изучая философию в Пекинском университете, он увлекся марксистскими наклонностями Ли Дачжао и помог в создании Марксистской исследовательской группы в университете, где Ли был избран секретарем партии.\n\nДалее радикализировавшись из-за участия в Движении 4 ноября, Дэн стал одним из основателей Китайской синдикалистской партии, участвуя в местном рабочем движении в Пекине и помогая в создании там профсоюза. Позже, в 1922 году, Дэн был принят в ряды руководства КСП, а затем вступил в Гоминьдан во время Первого объединенного фронта.\n\nВ 1925 году Дэн сотрудничал с Обществом Шицзе наряду с КСП, чтобы объединить всех социалистов, не входящих в Гоминьдан, в Лигу китайских синдикалистов и Всекитайскую федерацию профсоюзов, а позже в том же году присоединился к таким людям, как Су Чжаочжэн, в организации забастовки Кантон-Гонконг.\n\nПосле катастрофы Северного похода Дэн отступил в городские лабиринты Гуандуна, провозглашая о бедственном положении рабочих как лидер местного отделения КСП. Яростный профсоюзный лидер и организатор рабочих, Дэн долго поднимался по политической лестнице, превознося защиту рабочих, и будет продолжать делать это, пока дышит."
 GXC_deng_zhongxia_leader_desc: "§YРодился:§! §L5 октября 1894 года в Ичжане, провинция Хунань, Великая Цин§!\n§YБиография:§! §L$GXC_deng_zhongxia_bio$§!"
 GXC_deng_zhongxia_sic_desc: "§YРодился:§! §L5 октября 1894 года в Ичжане, провинция Хунань, Великая Цин§!\n§YПринадлежность:§! §rКитайская синдикалистская партия — Ортодоксальная§!\n§YБиография:§! §L$GXC_deng_zhongxia_bio$§!"

 #颜漢章
 GXC_yan_hanzhang: "Янь Ханьчжан"
 GXC_yan_hanzhang_advisor_desc: "§YРодился:§! §L1903 год, в Хайфэне, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §rКитайская синдикалистская партия — Ортодоксальная§!\n§YБиография:§! §LОбреченный быть захваченным революционным пылом своей родной провинции, Янь Ханьчжан впервые приобщился к революционной мысли в 1921 году, когда в возрасте 18 лет, учась в средней школе своего родного города, он часто вступал в контакт со своим радикальным директором — убежденным сторонником левых, помогая крестьянскому движению Пэн Пая и одновременно распространяя революционные идеалы среди своих учеников.\n\nЕще больше увлекшись притягательностью социализма, он присоединился к одной из крестьянских академий Пэн Пая, чтобы пройти партизанскую подготовку наряду с получением революционного опыта, изучая социалистические идеалы. После успеха Восточного похода против Чэнь Цзюнмина Янь предпринял серию поездок по различным сельским деревням с целью продвижения социалистических идеалов и мобилизации крестьянства на классовую войну, успешно организовав крестьянскую ассоциацию численностью 50 000 человек.\n\nОднако Северный поход Гоминьдана провалился, а вместе с ним и вера Яня в радикальный аграрный крестьянский социализм. Следуя за рядовыми членами КСП в их различные разрозненные изгнания, Янь медленно, но верно отбрасывал свои юношеские радикальные представления о немедленных действиях и склонялся к ортодоксальному синдикалистскому подходу, отстаиваемому такими людьми, как Чэнь Дусю, стремясь достичь желаемого либертарного социалистического Китая через двухэтапную революцию КСП и тщательно следуя линии Ли Лисаня для достижения этого идеала.§!"

 #曾生
 GXC_zeng_sheng: "Цзэн Шэн"
 GXC_zeng_sheng_high_command_desc: "§YРодился:§! §L19 декабря 1910 года в Хуэйяне, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RАссоциация фермеров Гуандуна§!\n§YБиография:§! §LРодившийся в семье отца из зарубежных китайцев и матери-хакка, Цзэн Шэн имел довольно стабильное воспитание, начав обучение в возрасте 6 лет и закончив начальную школу в 10 лет, хотя из-за потрясений в Китае Эры милитаристов Цзэну пришлось использовать семейные связи, чтобы переехать в Гонконг для продолжения учебы. Однако это только подпитало радикализацию Цзэна, так как его директор во время учебы в средней школе был убежденным консерватором, выступавшим против Национальной революции доктора Сунь Ятсена, и точно так же неравенство, нагло демонстрируемое по всему Гонконгу — где коренные китайцы часто угнетаются иностранцами, а богатые эксплуатируют бедных — еще больше способствовало радикализации Цзэна.\n\nКогда отец Цзэна планировал вернуться на свою родину в Австралию в 1922 году, Цзэн сопровождал его, хотя во время путешествия в страну Цзэн стал свидетелем того, как множество различных китайских рабочих тайком пробирались на лодку в надежде, что их пункт назначения предоставит им большие возможности. Сильно осуждая это, Цзэн убедился, что Китай остро нуждается в радикальных действиях, чтобы удовлетворить потребности граждан.\n\nВернувшись в Китай в 1928 году с желанием возродить свою страну и нацию, Цзэн опоздал к участию в обреченном Северном походе Гоминьдана, но не опоздал, чтобы предложить свои услуги Ассоциации фермеров Гуандуна Пэн Пая, стремясь вести партизанскую войну против милитаристов и капиталистов в равной степени. С его недавним повышением на поле боя сердце Цзэна горит желанием помочь Пэн Паю в обеспечении истинного освобождения китайского народа, какую бы форму это ни приняло.§!"

 ###- SPR -###
 #張太雷
 GXC_zhang_tailei: "Чжан Тайлэй"
 GXC_zhang_tailei_bio: "Родившийся в бедной семье и потерявший отца в 8 лет, жизнь Чжан Тайлэй была тяжелой. Однако он поднялся над своим скудным воспитанием, поступив на юридический факультет Тяньцзиньского университета в 1915 году, а затем радикализировавшись в Движении 4 ноября, инициировав «Ассоциацию социального строительства». Такие действия привели к его исключению из университета.\n\nВ 1920 году Чжан участвовал в различных марксистских организациях под руководством Ли Дачжао в Пекине и присоединился к другим, таким как Чэнь Дусю и Дэн Чжунся, в основании Китайской синдикалистской партии. Позже присоединившись к Дэн Чжунся на время в организации рабочих движений и профсоюзов в Пекине, он вернулся в Тяньцзинь, чтобы организовать Тяньцзиньский социалистический союз молодежи. Назначенный центральным секретарем Китайского социалистического союза молодежи, в 1925 году он был переведен в Гуанчжоу для работы местным организатором КСП в провинции, среди таких людей, как его старый друг Дэн Чжунся и Дэн Фа.\n\nКогда немецкий молот обрушился на Гоминьдан и КСП, Чжан последовал за членами КСП, такими как Чэнь Шаоюй, во Францию, стремясь к идеалам «ультрасиндикализма». После возвращения в Китай Чжан Тайлэй снова присоединился к таким людям, как Дэн Чжунся и Су Чжаочжэн, участвуя в главном триумвирате КСП в Гуандуне, причем Чжана поддерживают молодые КСП-радикалы."
 GXC_zhang_tailei_leader_desc: "§YРодился:§! §L17 июня 1898 года в Чанчжоу, провинция Цзянсу, Великая Цин§!\n§YБиография:§! §L$GXC_zhang_tailei_bio$§!"
 GXC_zhang_tailei_advisor_desc: "§YРодился:§! §L17 июня 1898 года в Чанчжоу, провинция Цзянсу, Великая Цин§!\n§YПринадлежность:§! §rКитайская синдикалистская партия — Радикальная§!\n§YБиография:§! §L$GXC_zhang_tailei_bio$§!"

 ###- GFA -###
 #彭湃
 GXC_peng_pai: "Пэн Пай"
 GXC_peng_pai_bio: "Несмотря на то, что он родился в элитной семье землевладельцев и торговцев, Пэн Пай посвятил свою жизнь китайскому крестьянству после учебы в Японии, где он стал свидетелем рисовых бунтов 1918 года, а также неудачной большевистской революции, что послужило вдохновением для его перехода от реформистских взглядов к делу социализма.\n\nПэн Пай преуспел в создании Ассоциации крестьян уезда Хайфэн, которая была первой общенациональной ассоциацией крестьян в Китае, а затем в 1924 году вступил в Гоминьдан, продвигая сотрудничество с Китайской синдикалистской партией. Пэн позже помог сформировать Институт подготовки крестьянского движения для дальнейшего просвещения сельских масс.\n\nПосле неудачного Северного похода он позже создал свою базу операций в своей родной провинции Гуандун, где он стал пугающей фигурой для таких людей, как Чэнь Цзюнмин. Став не просто политическим соперником для других людей в провинциях, но и культовой фигурой, создав армию фанатиков, которые стремятся увидеть, как Китай вступает в эру коммунизма, формируя то, что он видит как «истинные коммуны», которые на практике лояльны только Пэн Паю, которого они прозвали своим лидером... «Бодхисаттва Пэн»."
 GXC_peng_pai_leader_desc: "§YРодился:§! §L22 октября 1896 года, Хайфэн, провинция Гуандун, Великая Цин§!\n§YБиография:§! §L$GXC_peng_pai_bio$§!"
 GXC_peng_pai_advisor_desc: "§YРодился:§! §L22 октября 1896 года, Хайфэн, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RАссоциация фермеров Гуандуна§!\n§YБиография:§! §L$GXC_peng_pai_bio$§!"

 #古大存
 GXC_gu_dacun: "Гу Дацунь"
 GXC_gu_dacun_sic_desc: "§YРодился:§! §L24 апреля 1897 года в Ухуа, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RАссоциация фермеров Гуандуна§!\n§YБиография:§! §LГу Дацунь — имя, неизвестное многим, но печально известное среди землевладельцев и высоко ценимое среди крестьянства Гуандуна. Выходец из сельской деревни хакка, Гу потерял отца в детстве. В 1920 году, накануне Войны в защиту конституции, Гу прибыл в Гуанчжоу и поступил в Школу права и политики Гуандуна, где Чэнь Гунбо был лектором, а Чэнь Дусю отвечал за образование в Гуандуне. Во время учебы Гу начал принимать социалистические идеи. Несмотря на то, что он учился в той же школе, что и Чэнь Цзюнмин и Цзоу Лу, Гу выбрал другой путь.\n\nКогда Пэн Пай создал первую ассоциацию фермеров в 1922 году, подобные организации возникли по всему Гуандуну, и Гу вскоре присоединился к рядам Пэна. После окончания учебы зимой 1924 года Гу присоединился к кампании против Чэнь Цзюнмина, организуя крестьянские силы. Позже он начал организовывать крестьянские движения в своем родном городе Ухуа, в то время как Пэн Пай руководил в Хайфэне. По мере роста крестьянского движения в Гуандуне Гу был назначен командиром «корпуса» крестьянского ополчения и годами боролся против репрессивных землевладельцев и властей вместе с Пэн Паем. Таким образом, Гу считается «Судьей Бао» крестьянства, который защищает крестьян силой, а не судом.\n\nЖивя и питаясь как обычные солдаты и помогая всем нуждающимся в меру своих сил, Гу заслужил уважение как рядовых, так и общественности. Хотя он никогда не проходил никакой военной подготовки, крестьянские силы пережили бесчисленные попытки почти полного уничтожения под руководством Гу, и он готов пролить свою кровь, чтобы оросить свое дело.§!\n\n§YЗаметки: Гу — ближайший соратник Пэн Пая. Пэн однажды подарил Гу саблю, а Гу ответил стихотворением: «Крови на лезвии в избытке, наше товарищество глубоко. Возложенное бремя тяжело, как я могу не относиться к жизни легко?»§!"

 #谭甫仁
 GXC_tan_furen: "Тань Фужэнь"
 GXC_tan_furen_high_command_desc: "§YРодился:§! §L1 апреля 1910 года в уезде Жэньхуа, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RАссоциация фермеров Гуандуна§!\n§YБиография:§! §LРодившийся в бедной крестьянской семье, он смог получить образование благодаря семье. Поступив в частную школу в возрасте 6 лет, образование Таня завершилось в начале Северного похода. Поскольку Гуандун был домом для различных рабочих и крестьянских движений, действующих в тандеме с Гоминьданом, Тань был захвачен революционным пылом. Вступив в Гоминьдан, он начал служить секретарем районной крестьянской ассоциации и вел пропагандистскую работу.\n\nВ ноябре 1926 года он поступил в Школу крестьянской армии Цзянбэй, созданную Ассоциацией крестьян провинции Гуандун. В 1927 году Тань ненадолго вступил в войска Хэ Луна, но потерял контакт с основными силами после того, как Тан Шэнчжи увел их на север. Не имея возможности воссоединиться с Хэ Луном и Тан Шэнчжи, Тань случайно присоединился к Национально-революционным силам в Цзянси. Когда Северный поход рухнул и Гуанчжоу пал под натиском немецких солдат, Тань и его силы продолжили действовать в регионе Миньгань, где местные милитаристы могли сохранять контроль только в городских центрах.\n\nПосле Шанхайского восстания 1932 года к остаткам Национально-революционных армий присоединилось больше сил Гоминьдана под руководством Дэн Яньда. В этот период Тань работал с другими кантонскими изгнанниками, в частности с Пэн Паем, Чэнь Миншу и Тань Пиншанем. После реставрации националистов в Гуанчжоу Тань продолжил тесно сотрудничать с Пэн Паем как ревностный сторонник крестьянской революции, к которой стремится Пэн.§!"

 #韋拔群
 GXC_wei_baqun: "Вэй Бацюнь"
 GXC_wei_baqun_high_command_desc: "§YРодился:§! §L6 февраля 1894 года в деревне Дунлань, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §RАссоциация фермеров Гуандуна§!\n§YБиография:§! §LВэй Бацюнь — человек с двумя лицами: первое — герой крестьянства в стиле Робин Гуда, вовлекающий народ чжуан в национальную революцию и интегрирующий один из отдаленных регионов Гуанси в единый Китай. Второе воплощено в его прозвище «Красный Бог» — жестокий и садистский революционер, известный чрезмерными убийствами, грабежами, поджогами и похищениями, печально известный убийством жен перебежчиков-социалистов.\n\nВо время восстания в Байсэ Вэй объединял крестьянство в более сельских районах Южного Китая, формируя крестьянские ополчения из тех деревень, которые он посещал, а также работая с Ли Минжуем и Юй Цзобаем как единая левая сила против реакционного противовеса Ли Цзунжэня — борьба, которая оказалась успешной, и подражатель китайского Цезаря теперь свергнут.§!\n\n§YЗаметки: Вэй Бацюнь является дальним соратником Пэн Пая, и их объединенные силы представляют собой значительную силу на китайском политическом ландшафте.§!"

 #俞作柏
 GXC_yu_zuobai: "Юй Цзобай"
 GXC_yu_zuobai_commander_desc: "§YРодился:§! §L1889 год, в Бэйлю, провинция Гуанси, Великая Цин§!\n§YПринадлежность:§! §RАссоциация фермеров Гуандуна§!\n§YБиография:§! §LБелая ворона среди генералов Гуанси, Юй Цзобай начал свой путь так же, как и многие другие в провинции. Учась в различных военных школах в юном возрасте, вступив в Тунмэнхой в 1911 году и, наконец, окончив Баодин вместе со своими друзьями Бай Чунси и Хуан Шаохуном, было естественно, что он оказался в Новой клике Гуанси.\n\nЮй Цзобай участвовал в войне Альянса национальной защиты против Юань Шикая, а позже служил под началом Ли Цзунжэня и Хуан Шаохуна во время войн за объединение Гуанси, участвуя в битвах против Лу Жунтина, Шэнь Хунъина и даже сил Чэнь Цзюнмина. В 1926 году он помогал Хуан Шаохуну в управлении провинциальным правительством под эгидой Гоминьдана, успешно внедряя политику, соответствующую Трём народным принципам.\n\nВо время Северного похода Юй — вместе со своим двоюродным братом Ли Минжуем — помогал рабочим и крестьянским движениям страны, поддерживая связи с Китайской синдикалистской партией, несмотря на свою преданность Новой Гуанси.\n\nПоследовав за другими лидерами Гуанси в изгнание в Гуйчжоу после провала Северного похода, его социалистические симпатии вызвали большой гнев среди его товарищей из «Старых» и «Новых» правых, однако он продолжал послушно служить Новой клике Гуанси во время их пребывания в изгнании.§!"

 #楊殷
 GXC_yang_yin: "Ян Инь"
 GXC_yang_yin_sic_desc: "§YРодился:§! §L1892 год, в уезде Сяншань, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §RАссоциация фермеров Гуандуна§!\n§YБиография:§! §LПоступив в Колледж Святого Сердца в Гуанчжоу в 1910 году, Ян Инь прервал свою академическую карьеру, вступив в Тунмэнхой в 1911 году и приняв участие в Синьхайской революции в том же году. С 1917 года он служил адъютантом охраны военного правительства Сунь Ятсена в Гуанчжоу и одновременно штабным офицером Офиса военных дел Офиса генералиссимуса. В 1922 году он вступил в недавно созданную Китайскую синдикалистскую партию, а в конце того же года был отправлен на учебу во Францию.\n\nВернувшись в Китай в 1923 году, он участвовал в рабочем движении в Гуандуне, служа исполнительным членом и секретарем отделения Четвертого округа Гоминьдана, и путешествовал по провинции для продвижения нужд рабочего движения. Тесно связанный с местными железнодорожниками, он создал Всеобщий профсоюз и представил рабочих КСП.\n\nПосетив Четвертый национальный конгресс Китайской синдикалистской партии, он служил консультантом Гуанчжоуского офиса Национальной федерации профсоюзов железнодорожников. Возглавляя бастующих рабочих в Гуанчжоу и Гонконге, он прославился во время Всеобщей забастовки Кантон-Гонконг. Став местным авторитетом КСП и ярым активистом рабочего движения, Ян активно работал с Пэн Паем и Чжан Тайлэйем, чтобы разжечь социалистическую революцию в Гуандуне.§!"

###- Other KMT Characters -###
#鄭介民
 GXC_zheng_jiemin: "Чжэн Цземинь"
 GXC_zheng_jiemin_bio: "Ранний революционер Гоминьдана, Чжэн Цземинь посещал вторую фазу Военной академии Вампу перед тем, как отправиться в Университет Сунь Ятсена в Париже. Провал Северного похода означал, что пройдет почти десять лет, прежде чем он вернется домой, став вместо этого политическим офицером под началом Хэ Чжунханя во время изгнания. Член АТР и ОВК, он нашел работу в Национальном бюро расследований и статистики (БИС), получив престижную должность начальника отделения в Гуандуне. Он известен своей любовью к офицерам, обученным во Франции, своим идеологическим фанатизмом и своей безжалостной эффективностью в разведывательной работе — воплощая два крыла ОВК.\n\nИмея мало друзей в политическом истеблишменте Лянгуана, его в лучшем случае терпят те, кто у власти. Независимый игрок и проводник в преступный мир, он все еще может найти себе применение."
 GXC_zheng_jiemin_leader_desc: "§YРодился:§! §L18 сентября 1897 года в Вэньчане, провинция Гуандун, Великая Цин§!\n§YБиография:§! $GXC_zheng_jiemin_bio$"
 GXC_zheng_jiemin_advisor_desc: "§YРодился:§! §L18 сентября 1897 года в Вэньчане, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §oОбщество возрождения Китая§!\n§YБиография:§! §L$GXC_zheng_jiemin_bio$§!"

