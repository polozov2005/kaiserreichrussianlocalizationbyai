 #共和大同盟
 GXC_GRA_intro: "Великий республиканский альянс — это квазилегальная политическая коалиция преимущественно южнокитайских партий, действующая в оппозиции к установленному Бэйянскому политическому порядку. Сформированный в 1931 году после усиления антиконцессионистской энергии и националистической агитации вследствие провала переговоров Чжили-Фэнтянь, Великий республиканский альянс ненадолго вступил в союз с отошедшим от дел Дуань Цижуем. К нему также присоединились другие «старые» федералистские группы, такие как Партия народного управления Тан Цзияо в Юньнани и Движение за автономию Чжэцзяна Чу Фучэна, создав блок неповиновения в Национальной ассамблее. В значительной степени симпатизируют ВРА, но остаются независимыми Общество обновления народа Чжао Хэнти и Подготовительное управление провинциальной федеральной автономии Сюн Кэу."

 #中國民主同盟
 GXC_CDL_intro: "Демократическая лига Китая берет свое начало осенью 1929 года, когда после выборов в Национальную ассамблею и получения большинства Ассоциацией гармонии группа инициативных интеллектуалов основала Объединенную лигу национального строительства в надежде продвигать демократию в Китае, хотя и с довольно противоречивым включением Чжан Боцзюнь и Тань Пиншаня. В конечном итоге запрещенная в 1932 году после Шанхайского восстания, входящие в нее партии продолжили встречаться в новой подпольной Федерации китайских демократических партий, уже без вышеупомянутых социалистов-революционеров.\n\nБудучи по большей части силой, объединяющей всех участвующих либералов и независимых, включая, помимо прочего, Клику политической науки, Китайскую конституционную партию, Федерацию национального спасения, Китайское общество профессионального образования и Общество устремления, ФКДП на Юге сплотилась и вышла из квазилегального статуса в полноценный политический альянс, известный как Демократическая лига Китая. Включая Демократическую социалистическую партию, Общество полумесяца, Китайскую демократическую ассоциацию национального строительства и компоненты вышеупомянутых фракций, она остается силой, возглавляющей легитимную демократию в Китае."

