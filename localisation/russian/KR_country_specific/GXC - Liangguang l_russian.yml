###- KMT Parties -###

GXC_starting_KMT_intro: "Гоминьдан, который когда-то считали вестником нового революционного мирового порядка для Китая, в последние годы значительно ослаб и раскололся. После смерти основателя и главного лидера партии Сунь Ятсена партия погрязла в жесткой фракционной борьбе за право стать истинным преемником «Гофу» (почетный титул Сунь Ятсена — «Отец нации» и вечный премьер). Согласно ортодоксальной линии, им должен был стать действующий генералиссимус Ху Ханьминь. Однако в результате политических интриг его положение было аннулировано и заменено правящим «Национальным правительственным советом», а сам Ху был понижен до должности министра иностранных дел непризнанного правительства.\n\nКогда распри достигли пика примерно во время покушения на Ляо Чжункая в 1925 году, партия уже фактически разделилась на «Правых» (выступающих против Единого фронта с китайскими синдикалистами) и «Левых» (поддерживающих Единый фронт). Почти добившись победы, Чан Кайши отверг правое крыло, что привело к сплочению «Старых правых» вокруг Ху Ханьминя. В 1925 году они провели конференцию в горах Сишань, где постановили исключить левых из партии. В конечном итоге, озлобленные после жестокого избиения бывших марксистов, ставших правыми — Шэнь Динъи и Дай Цзитао — правые были оттеснены в Шанхай в 1926 году, а затем и вовсе в Москву."

#Example
 #中國國民黨中華復興社
 #CHI_crs_party: "KMT-CRS"
 #CHI_crs_party_long: "China Revival Society (Zhongguo Guomindang zhonghua fuxing she)\n§gThe China Revival Society (CRS) is a clique formed by radical officers of the National Revolutionary Army and holds close ties with Dai Chunfeng's shadowy BIS or Juntong. Led primarily by Hu Zongnan, He Zhonghan, and Deng Wenyi, the CRS emerged as a new political faction following the First National Congress and is especially popular amongst the military's young guard.\n\nTheir ideology consists of a host of influences from far-right Savinkovism, Japanese Bushido, Maximist British economic planning, but the Sorelian necessity of revolutionary cleansing violence most inspires them. The CRS sees the complex bureaucratic nature of the Kuomintang to be the party's downfall and wishes to see the party purged of its democratic elements - with the end goal of a party led by a glorious dictator (the lingxiu). From there, they envision China to be developed into a highly militarised and equal society with the notion and ideas of class struggle eradicated in favour of a completely totalitarian and socialist nation. They look to China's antiquity and its Confucian order of old as not elements of ancient history but rather a sense of halcyon tranquillity that will eventually be achieved under the rule of the benevolent lingxiu. If China is to be saved, if she is to be liberated, and if she is to become a respected mighty power once more - she will have to be revived from the ground up.§!\n"

 #NOTES - Add pinyin but without tones in parantheses.

##Primarily Totalist Parties
 #中國國民黨中華復興社
 GXC_crs_party: "ГМД-ОВК"
 GXC_crs_party_long: "Общество возрождения Китая (Чжунго Гоминьдан Чжунхуа Фусиншэ)\n§LОбщество возрождения Китая (ОВК) представляло собой объединение радикальных военных кругов школы Вампу, сплоченных общим чувством ультранационалистического рвения. Провал недавней авантюры левого комитета в Китае подорвал влияние их идеологов, оставив от организации лишь тень былого величия. Тем не менее, небольшой осколок их движения сохранился, сформировавшись вокруг узкой группы доверенных лиц таких людей, как Ху Цзуннань, Хэ Чжунхань и Дэн Вэньи. Поскольку они укоренились в наших вооруженных силах, растет беспокойство, что наша амнистия вдохнет новую жизнь в тлеющие угли этого культа.\n§!"

 #中國工團黨-激進派
 GXC_csp_radical_party: "КСП-Р"
 GXC_csp_radical_party_long: "Китайская синдикалистская партия — Радикальная фракция (Чжунго Гунтуаньдан — Цзицзинь пай)\n§LКитайская синдикалистская партия раскололась из-за продолжающихся неудач Китайской революции. Многие разочаровались в отсутствии прогресса у Ортодоксальной фракции во внедрении синдикализма и в предполагаемой пассивности при взаимодействии с Гоминьданом в рамках Единого фронта, отколовшись в так называемую Радикальную фракцию. Они призвали к гораздо более авторитарному и конфронтационному подходу — бросая вызов как своим товарищам-социалистам, так и империалистам, милитаристам и капиталистам. Как и многие другие радикалы, Чжан Тайлэй ездил учиться в Европу, но разочаровался в главном отделении КСП-Радикалов, возглавляемом Цюй Цюбо и Чэнь Шаоюем. Гуандунское отделение отличается особым авангардизмом в требованиях социального освобождения и революционностью методов — они выступают за то, чтобы пролетариат объединился даже с бандитами и ворами, дабы изгнать империалистов и реакционеров и построить истинную рабочую коммуну в Гуанчжоу.\n§!"
##Primarily Syndicalist Parties
 #世界社
 GXC_wrd_soc_party: "Общество Шицзе"
 GXC_wrd_soc_party_long: "Новое общество Шицзе (Шицзе шэ)\n§LОбщество Шицзе (Мировое общество) имеет честь быть первой организованной анархистской организацией в Китае (анархистские группы традиционно избегают называть себя партиями). Возглавляемые «Четырьмя старейшинами» (Чжан Жэньцзе, Ли Шицзэн, У Чжихэй и Цай Юаньпэй), эти базирующиеся в Париже анархисты стали наставниками для многих видных деятелей Гоминьдана. Однако их влияние затмил подъем Китайской синдикалистской партии, особенно когда их отношения с другими анархистами ухудшились, и они были вынуждены отступить на свои позиции в истеблишменте Гоминьдана.\n\nВозвышение Ху Ханьминя дало им своего рода возможность политического реванша. Сочувствуя анархистским принципам и понимая лучше самих анархистов те компромиссы, на которые пришлось пойти «Четырем старейшинам» во время Китайской революции, Ху Ханьминь бросил спасательный круг Обществу Шицзе, финансируя их учреждения, такие как Китайский трудовой университет. Взамен Общество Шицзе стало полезным сдерживающим фактором для влияния Китайской синдикалистской партии, подавляя угрозу марксизма для анархистского влияния внутри Лиги китайских синдикалистов.\n§!"

 #中國工團黨正統派
 GXC_csp_orthodox_party: "КСП-О"
 GXC_csp_orthodox_party_long: "Китайская синдикалистская партия — Ортодоксальная фракция (Чжунго Гунтуаньдан — Чжэнтун пай)\n§LКитайская синдикалистская партия, возможно, и была основана в Шанхае, но ее главной базой долгое время был Гуанчжоу. Гуанчжоу (часто называемый Кантоном) является домом для значительной профсоюзной активности и пламенных синдикалистов, поэтому неудивительно, что город оказался особенно восприимчив к идеям синдикализма. Ортодоксальная фракция КСП была построена на компромиссе между фракцией сторонников советов Чэнь Дусю и профсоюзной фракцией Ли Лисаня, находясь под влиянием французской синдикалистской модели и разделяя марксистские идеи.\n\nГуанчжоу, как один из двух столпов Китайской синдикалистской партии, стал свидетелем небольшого расхождения с нанкинско-шанхайским отделением. Под руководством Дэн Чжунся и Су Чжаочжэна напряженность, связанная с реализацией линии Ли Лисаня, и общая удаленность от другого синдикалистского форпоста способствовали проявлению более независимого характера по сравнению с их коллегами-ортодоксами.\n§!"

 #中國國民黨臨時行動委員會
 GXC_pac_tan_party: "ГМД-ВКД"
 GXC_pac_tan_party_long: "Временный комитет действий Гоминьдана (Чжунго Гоминьдан Линьши Синдун Вэйюаньхуэй)\n§LКогда Северный поход потерпел крах, а Центральный комитет бежал в изгнание, разрыв между социалистическим руководством на местах и теми, кто находился за границей, начал расти. Тань Пиншань, Чжан Боцзюнь и другие лидеры Гоминьдана, разочарованные руководством Ван Цзинвэя, начали вынашивать планы создания «Китайской революционной партии», скрываясь в Шанхае. После Шанхайского восстания 1932 года это вылилось в образование организации, известной как Временный комитет действий Гоминьдана под руководством Сун Цинлин и Дэн Яньда. Их цели сместились от замены Гоминьдана к его реформированию, на фоне общей подозрительности к вмешательству Третьего Интернационала в дела партии.\n\nТань оказался оттеснен на край собственной партии и подумывал о выходе из нее. Будучи более благосклонным к Интернационалу, чем его коллеги, и имея в прошлом связи с Китайской синдикалистской партией, Тань при первой возможности вместе с оставшимися последователями перебрался на юг, на свою новую базу в Гуанчжоу. Там он воспользовался своими связями во всем социалистическом спектре, хотя его обиды на АТР (Ассоциацию товарищей по реорганизации), ВКД и КСП было трудно скрыть.\n§!"

 #中国国民党革命委员会
 GXC_revolutionary_committee_kuomintang_tan_pingshan_party: "РК-ГМД"
 GXC_revolutionary_committee_kuomintang_tan_pingshan_party_long: "Революционный комитет Гоминьдана (Чжунго Гоминьдан Гэминвэйюаньхуэй)\n§LВ результате окончательной (хоть и запоздалой) победы в Гражданской войне в Китае Тань Пиншань неожиданно стал передовым лидером Гоминьдана. Собрав различных партийных лидеров, особенно своих бывших союзников по Временному комитету действий, но не забыв привлечь полезные кадры из АТР и даже КСП, Тань реорганизовал партию под единым Революционным комитетом под своим контролем. Он пообещал излечить раскол между партийными фракциями и проложить третий путь, свой собственный путь вперед, чтобы сохранить революционные ценности Китая.\n§!"

 #中華革命黨
 GXC_chinese_revolutionary_party: "КРП"
 GXC_chinese_revolutionary_party_long: "Китайская революционная партия (Чжунхуа Гэминь Дан)\n§LВпервые задуманная Тань Пиншанем и Чжан Боцзюнем в Шанхае в 1931 году, Китайская революционная партия представляет собой окончательное воплощение мечты Таня о создании третьей партии, независимой от недостатков ГМД и КСП. Объединяя перебежчиков из обеих партий под руководством Тань Пиншаня, она стремится проложить новый курс, чтобы принести синдикалистскую революцию в Китай. Эта партия, освобожденная от оков бюрократии и внутренних распрей своих предшественников, стремится вывести необузданный дух китайского пролетариата на передний план и смыть старый реакционный порядок.\n§!"

 #中國工团主义同盟
 GXC_league_of_chinese_syndicalists_tan_party: "ЛКС"
 GXC_league_of_chinese_syndicalists_tan_party_long: "Лига китайских синдикалистов (Чжунго Гунтуаньчжуи Тунмэн)\n§LЛига китайских синдикалистов была впервые основана в 1925 году в ответ на Гонконг-Кантонскую забастовку. В ней доминировала Китайская синдикалистская партия, но в нее также входили различные другие фракции, такие как анархистское Общество Шицзе, а также разрозненные независимые китайские социалисты, ищущие пространство, свободное от контроля Гоминьдана. Жизнеспособность Лиги всегда была под вопросом, особенно учитывая ее постоянную нестабильность, но возвышение Тань Пиншаня и его гуандунского синдикалистского движения позволило ему затмить другие левые группы и возглавить движение. Используя мощь китайского пролетариата, Тань и его возрожденная Лига теперь стремятся донести идеи синдикализма от урбанизированного побережья до глубинки Китая!\n§!"

##Primarily Rad Soc Parties

GXC_kmt_leftist_remnant_party: "ГМД-Л"
 GXC_kmt_leftist_remnant_party_long: "Гоминьдан — Левые остатки (Гоминьдан — Цзопай Цаньбу)\n§L$GXC_starting_KMT_intro$\n\nХотя левые остатки Гоминьдана в Лянгуане и далеки от полного истощения благодаря значительному присутствию городских рабочих и аграрных крестьянских движений, в основном они сосредоточены в Ассоциации крестьян провинции Гуандун под руководством Пэн Пая. Печально известный местный революционер и пионер аграрного социализма, Пэн продолжает провозглашать дело революционного социализма против всех местных деспотов и «злых шэньши». Однако прямо за границами Гуандуна действует некий Чэнь Миншу. Возглавляя свою 10-ю дивизию Национально-революционной армии, он сотрудничает с такими людьми, как Тан Шэнчжи из 8-й НРА, ведя партизанскую кампанию в Восточном и Северном Гуандуне, действуя от имени Левого Центрального исполнительного комитета и революционеров Миньганя.§!\n"

 #中國國民黨臨時行動委員會
 GXC_pac_song_party: "ГМД-ВКД"
 GXC_pac_song_party_long: "Временный комитет действий Гоминьдана (Чжунго Гоминьдан Линьши Синдун Вэйюаньхуэй)\n§LПосле провала Северного похода разрыв между Центральным комитетом в изгнании и руководством восстания на местах начал расти. Провал Шанхайского восстания 1932 года усугубил этот раскол и подтвердил необходимость более автономной структуры руководства в зоне Миньгань. Это привело к появлению «Декларации к революционному народу Китая и мира» Сунь Цинлин и Дэн Яньда, в которой официально объявлялось о создании Временного комитета действий Гоминьдана.\n\nСледуя аграрному, авангардистскому направлению социализма, их доминирование в Миньгане превратило комитет в ведущую внутреннюю оппозицию правлению Ван Цзинвэя. Однако их ориентация на сельскую местность и подозрительное отношение к Третьему Интернационалу привели к расколам, и местные отделения в Гуандуне приняли более урбанистическую, франкофильскую позицию, отличную от основной фракции. Тем не менее, они остаются ближе к Сун, чем к Вану, даже если некоторые из них и подумывают о смене курса.\n§!"

 #廣東省農民協會
 GXC_farmers_association_party: "ГМД-АКПГ"
 GXC_farmers_association_party_long: "Ассоциация крестьян провинции Гуандун (Гуандун Шэн Нунминь Сехуэй)\n§LПэн Пай был сыном местной кантонской элиты и мог позволить себе престижное образование за границей. По возвращении он обратил внимание на бедственное положение крестьян, заняв пост комиссара по образованию уезда Хайфэн в 1921 году. Став более радикальным и приняв социалистические идеи, он сжег купчие на унаследованную им землю и объявил о создании Всеобщей ассоциации крестьян уезда Хайфэн. Это движение, обеспечивавшее взаимную защиту и помощь фермерам региона, быстро выросло в численности и было преобразовано в Ассоциацию крестьян провинции Гуандун.\n\nПодавленные Чэнь Цзюнмином и силами шэньши, они объединились с Гоминьданом и стали важным органом внутри партии для мобилизации крестьян на революцию. Провал Северного похода заставил Пэн Пая и его людей отступить обратно в Хайфэн, где они поддерживали шаткую связь с более широкой сетью повстанцев Гоминьдана. Они сохраняют упорный контроль над этим районом, сопротивляясь попыткам искоренить их.\n§!"

 #中国国民党革命委员会
 GXC_revolutionary_committee_kuomintang_peng_pai_party: "РК-ГМД"
 GXC_revolutionary_committee_kuomintang_peng_pai_party_long: "Революционный комитет Гоминьдана (Чжунго Гоминьдан Гэминвэйюаньхуэй)\n§LВ результате окончательной (хоть и запоздалой) победы в Гражданской войне в Китае Пэн Пай неожиданно стал передовым лидером Гоминьдана. Собрав различных партийных лидеров, особенно из своей бывшей Ассоциации крестьян провинции Гуандун, но не забыв привлечь полезные кадры из АТР, ВКД и даже КСП, Пэн реорганизовал партию под единым Революционным комитетом под своим контролем. Он стремится подчеркнуть роль крестьянства в национальной революции, хотя и не отвергает полностью вклад пролетариата и мелкой буржуазии.\n§!"

 #中國農民黨
 GXC_chinese_peasants_party: "ККП"
 GXC_chinese_peasants_party_long: "Китайская крестьянская партия (Чжунго Нунминь Дан)\n§LБудучи порождением старой Ассоциации крестьян провинции Гуандун Пэн Пая, Китайская крестьянская партия заменила дискредитировавший себя Гоминьдан в качестве ведущей социалистической партии Китая под правлением Пэна. Подчеркивая роль крестьянства в национальной революции, но не отвергая полностью вклад пролетариата и мелкой буржуазии, Китайская крестьянская партия быстро распространила свои идеи взаимопомощи, обороны и просвещения среди обнищавших фермеров по всей стране. Агрессивные в своей тактике и сплоченные в своей солидарности, оглядываясь назад, их победа не была сюрпризом, хотя некоторые беспокоятся о растущем культе личности Пэна.§!\n"
 #NOTE: Made Up Name - Meant to be Partially a Play off The Chinese Peasants' and Workers; Democratic Party but mostly just an extension of Agrarian Socialism. Actually apparently was a real thing, though the irl one was a more obscure group founded in Sichuan by Dong Shijun

##Primarily Soc Dem Parties
 #中國國民黨改組同志會
 GXC_rca_party: "ГМД-АТР"
 GXC_rca_party_long: "$GXC_rca_party_long_tt$\n§LАссоциация товарищей по реорганизации была основана Чэнь Гунбо, Гу Мэнъюем и другими левыми гоминьдановцами для защиты Реорганизации 1924 года, а затем для продвижения правления их лидера: Ван Цзинвэя. Внутренне АТР была разделена между Радикалами под руководством Чэня, выступавшими за насильственную классовую борьбу и марксизм, и Умеренными под руководством Гу, которые предпочитали классовое сотрудничество.\n\nРешение Ван Цзинвэя присоединиться к нашему правительству раскололо АТР: многие рядовые члены осудили его как предателя. Чэнь Гунбо воздержался от прямой критики своего друга, но ушел в тень, так как Ван бросил свой вес на поддержку крыла Гу Мэнъюя и подчеркнул свои лево-националистические взгляды. АТР сохраняет определенное влияние внутри нашей партии, особенно среди гражданской бюрократии, части интеллигенции и зарубежных отделений, но ясно, что их расцвет уже позади.§!\n"
 GXC_rca_party_long_tt: "Ассоциация товарищей по реорганизации Гоминьдана (Чжунго Гоминьдан Гайцзу Тунчжи Хуэй)"

 #國民革命軍第四軍
 GXC_new_fourth_army_party: "ГМД-Н4А"
 GXC_new_fourth_army_party_long: "Новая 4-я армия Национально-революционной армии (Гоминьгэминьцзюнь Ди Сы Цзюнь)\n§LПосле распада Лиги восьми провинций повстанцы в зоне Миньгань приказали своим осажденным войскам совершить вылазку и прорвать окружение — предприняв последнюю отчаянную попытку освободить восточное побережье. Генералу Чэнь Миншу и его Десятой дивизии было приказано двигаться на юг в Гуандун, в надежде сплотить другие левые ячейки по пути в Гуанчжоу в рамках отвлекающей операции.\n\nОни оказались успешнее, чем ожидалось, чему способствовали внезапные успехи правых ячеек по всему Лянгуану. Однако в Гуандуне возникла напряженность: более богатый юг попал под контроль генерала Чэнь Цзитана. Растущие левые силы на севере были реорганизованы в Новую 4-ю армию, претендующую на гордое звание своего предшественника времен Северного похода и символизирующую мечту об освобождении всей провинции. Будучи в союзе с радикальными левыми фракциями, умеренные позиции Чэнь Миншу и его союзников дали им доступ к сочувствующим республиканцам в Гуанчжоу.§!\n"

 #中国国民党革命委员会
 GXC_revolutionary_committee_kuomintang_chen_mingshu_party: "РК-ГМД"
 GXC_revolutionary_committee_kuomintang_chen_mingshu_party_long: "Революционный комитет Гоминьдана (Чжунго Гоминьдан Гэминвэйюаньхуэй)\n§LВ результате окончательной (хоть и запоздалой) победы в Гражданской войне в Китае Чэнь Миншу неожиданно стал передовым лидером Гоминьдана. Собрав различных партийных лидеров, особенно своих бывших союзников по повстанческому движению в Миньгане, но не забыв привлечь полезные кадры из АТР, Общества Шицзе и даже ФР, Чэнь реорганизовал партию под единым Революционным комитетом под своим контролем. Он пообещал излечить раскол между партийными фракциями и наметить более умеренный, стабильный путь развития.§!\n"

 #生產人民黨
 GXC_productive_peoples_party: "ПНП"
 GXC_productive_peoples_party_long: "Партия народных производителей (Шэнчань Жэньминь Дан)\n§LНедовольные недемократическим характером правительства Гоминьдана, его бездействием против империализма и обеспокоенные практичностью его социалистической повестки, Чэнь Миншу и Новая 4-я армия восстали и свергли коррумпированное партийное государство. На его месте они создали новую Партию народных производителей, призванную осуществлять политическую опеку более стабильными и умеренными темпами.§!\n"

##Primarily Soc Lib Parties
 #中國國民黨再造派
 GXC_reconstruction_faction_initial_party: "ГМД-ФР"
 GXC_reconstruction_faction_initial_party_long: "Фракция реконструкции Гоминьдана (Чжунго Гоминьдан Цзайцзао Пай)\n§LКлика наследного принца представляла собой свободное объединение друзей и союзников Сунь Фо (тогдашнего мэра Гуанчжоу), большинство из которых были недавними выпускниками западных университетов. Либеральная, технократическая и часто имеющая связи с богатыми спонсорами партии, она балансировала между фракциями растущего партийного раскола. После Северного похода она более официально оформилась во Фракцию реконструкции на Гавайях. Рассматривая восстановление Гоминьдана в Гуанчжоу как возможность, Сунь Фо отправил своего правую руку Лян Ханьцао в город, чтобы наладить отношения с кантонскими чиновниками, интеллектуалами и городской элитой в надежде создать базу власти для своего наставника.§!\n"

 #中國國民黨再造派
 GXC_reconstruction_faction_full_party: "ГМД-ФР"
 GXC_reconstruction_faction_full_party_long: "Фракция реконструкции Гоминьдана (Чжунго Гоминьдан Цзайцзао Пай)\n§LКлика наследного принца представляла собой свободное объединение друзей и союзников Сунь Фо (тогдашнего мэра Гуанчжоу), большинство из которых были недавними выпускниками западных университетов. Либеральная, технократическая и часто имеющая связи с богатыми спонсорами партии, она балансировала между фракциями растущего партийного раскола. После Северного похода она более официально оформилась во Фракцию реконструкции на Гавайях. Решение Сунь Фо присоединиться к нашему правительству привело за ним основную часть Фракции реконструкции, а также их мощные сети Комиссии по делам зарубежных китайцев в Юго-Восточной Азии и различных военных офицеров, связанных с Индийской кликой.§!\n"

##Primarily Mar Lib Parties
 GXC_dangwai_party: "Данвай"
 GXC_dangwai_party_long: "Независимые и ассоциированные республиканцы (Данвай)\n§LТермин «данвай» или «вне партии» относится к тем, кто участвует в законодательных органах под управлением Гоминьдана как «независимые». Инакомыслие относительно минимально из-за строгого приверженности Гоминьдана однопартийному правлению, хотя создание Единого фронта открыло двери для некоторого плюрализма. Гоминьдан терпит небольшое количество «независимых», молчаливо позволяя нечленам партии присоединяться к процессу. При этом они едва ли имеют значение для общего партийного государства Гоминьдана, но представляют республиканцев, которые готовы поддержать платформу Гоминьдана по борьбе с империализмом и милитаризмом, несмотря на свои оговорки по поводу авторитаризма партии.§!\n"

 GXC_Old_PSC_party: "Клика Чжэнсюэ"
 GXC_Old_PSC_party_long: "$GXC_Old_PSC_party_long_tt$\n§LБерущая свое начало от своей первой итерации, основанной в 1913 году членами партии Тунмэнхой, которые отвергли требование доктора Сунь Ятсена о клятвах в личной верности после провала Второй революции против Юань Шикая, Клика политической науки (Чжэнсюэ) является странной группой среди бэйянских парламентариев. Они создали Общество по изучению европейских дел в Токио, которое позже эволюционировало в Общество политической науки в 1916 году. Отвергая необходимость Северного похода для объединения Китая, провозглашенную доктором Сунь Ятсеном и его Гоминьданом, они вместо этого работали с южными милитаристами, такими как Цэнь Чуньсюань и Лу Жунтин, чтобы свергнуть Сунь Ятсена и его Правительство защиты конституции.\n\nПредпочитая вместо этого участвовать в Бэйянской избирательной системе и содействовать мирным переговорам с Северными милитаристами, они занимали многие высокие посты в сенате, ассамблее и даже кабинете министров. Когда Сунь Ятсен с помощью гуандунского милитариста Чэнь Цзюнмина изгнал Цэня и Лу из Гуандуна, к чему добавился отказ Тан Цзияо принять Гу Пиньчжэня из Юньнани, Старая клика политической науки фактически распалась. Потеряв большинство своих самых влиятельных позиций, они почти полностью подчинились Бэйянскому политическому порядку. Их последним взлетом стало правление Хуан Фу, возглавившего недолгое либеральное временное правительство после Пекинского переворота.\n\nТепло принятая обратно своими соотечественниками из Клики Сишань, Старая клика политической науки вновь оказалась в анналах власти в сфере влияния Гоминьдана. Стремясь помочь с новым конституционным путем, который начала преследовать партия, политологи быстро стали одними из величайших союзников и активов Клики Сишань.§!\n"
 GXC_Old_PSC_party_long_tt: "Старая клика политической науки (Цзю Чжэнсюэ Си)"

##Primarily Soc Con Parties
 #中國國民黨西山會議派
 GXC_western_hills_clique_party: "ГМД-КС"
 GXC_western_hills_clique_party_long: "Клика Сишань Гоминьдана (Чжунго Гоминьдан Сишань Хуэйи Пай)\n§LПосле Реорганизации 1924 года Сунь Ятсен повел партию в резко левом, авангардистском направлении. В результате многие его старые соратники по Тунмэнхою покинули правительство в Гуанчжоу, испытывая отвращение к заигрыванию с социализмом и/или присвоению Сунь Ятсеном чрезвычайных полномочий. Те, кто остался, надеялись убедить Премьера отменить реорганизацию, испытывая все большее недовольство Китайской синдикалистской партией и другими социалистами, собирающимися в городе.\n\nПосле смерти Сунь Ятсена в 1925 году многие его последователи в Пекине собрались в горах Сишань на его похороны и обсуждение будущего партии. Изначально разделившись на умеренный и радикальный лагеря по вопросу о том, как реагировать на падение Ху Ханьминя и возвышение Ван Цзинвэя, победу одержали радикалы, стремившиеся к свержению Вана. Изгнанные из партии после катастрофического Четвертого пленума, большинство из них отступили на партийные базы в Шанхае и Пекине. В конце концов, после бегства самого Ху из Гуанчжоу, они присоединились к нему в изгнании в Москве, где предоставили большое количество антисоциалистических гражданских консерваторов для его коалиции.§!\n"

##Primarily Auth Dem Parties
 #中國國民黨新粵系
 GXC_new_guangdong_clique_party: "ГМД-НКГ"
 GXC_new_guangdong_clique_party_long: "Новая гуандунская клика (Чжунго Гоминьдан Синьюэси)\n§LГуандун всегда был крупным игроком в эпоху милитаристов, обладая богатой экономической базой и давней законодательной автономией, что привело к возникновению независимой военной силы, ставшей известной как Гуандунская армия. Под командованием Чэнь Цзюнмина она приютила Сунь Ятсена и Гоминьдан во время Войны в защиту конституции, но вскоре Чэнь Цзюнмин порвал с Сунь Ятсеном. Многие из тех, кто остался верен Гоминьдану, постепенно сплотились вокруг Чэнь Цзитана, который использовал свои связи со старейшиной Гоминьдана Гу Инфэнем и другими консервативными шэньши, а также с сослуживцами по Четвертой армии (базирующейся в Гуандуне), для повышения своего статуса.\n\nНесмотря на сотрудничество с правительством Чэнь Ляньбо после краха Северного похода, генерал Чэнь успешно возглавил восстание Гуандунской армии против их номинальных хозяев, чтобы возглавить реставрацию Гоминьдана, провозгласив себя губернатором. Пользуясь укоренившейся сетью политического покровительства, которую он и его приближенные создали для себя, они стремятся защитить свои приобретения, сосредоточившись на местных делах, одновременно торгуя своей критически важной поддержкой национальных лидеров для сохранения драгоценной автономии Гуандуна.§!\n"

 #中國國民黨元老派
 GXC_elders_clique_party: "ГМД-КС"
 GXC_elders_clique_party_long: "Клика старейшин Гоминьдана (Чжунго Гоминьдан Юаньлао Пай)\n§LХу Ханьминь когда-то был ближайшим заместителем Сунь Ятсена, избранным его преемником на посту генералиссимуса правительства Гуанчжоу. Но в борьбе за власть, разгоревшейся вскоре после смерти Сунь Ятсена, Ху был обойден и понижен в должности коалицией соперников, включая вероломного Ван Цзинвэя и выскочку Чан Кайши. Преданность делу не позволила ему открыто порвать с партией, как рекомендовали многие его союзники, поэтому он провел следующие несколько лет, пытаясь вернуть партию на правильный путь.\n\nЕго ближайшие последователи стали известны как фракция Старейшин — необычная группа среди правых, поскольку они поддерживают принципы Реорганизации, хотя и отвергают Ван Цзинвэя и проникновение социалистов в партию. Авангардисты с эклектичными убеждениями, черпающие вдохновение в марксизме, анархизме, либерализме и традиционной китайской философии, они считают себя истинными последователями доктора Сунь Ятсена.§!\n"

##Primarily Pat Aut Parties
 #中國國民黨新桂系
 GXC_new_guangxi_clique_party: "ГМД-НКГс"
 GXC_new_guangxi_clique_party_long: "Новая клика Гуанси (Чжунго Гоминьдан Синьгуйси)\n§LВ войнах, разорявших Гуанси, возвышались различные кланы солдат и бандитов (границы между которыми часто размывались). Когда власть Лу Жунтина над регионом начала ослабевать, на его место пришла одна из таких групп — возглавляемая амбициозным Ли Цзунжэнем, гениальным Бай Чунси и усердным Хуан Шаохуном. Эта Новая клика Гуанси свергла старую в результате войн Юэ-Гуй, в общих чертах примкнув к правительству Гоминьдана. Их силы были организованы в Седьмую армию и отличились во время Северного похода.\n\nГорькие последствия Великого похода привели к тому, что клика была вытеснена из Гуанси в изгнание, прибегая к мелким пограничным набегам ради припасов. В это время Ли и Хуан еще больше интегрировались в аппарат Гоминьдана и полностью приняли его идеологию, в то время как Бай начал теоретизировать о радикальных реформах, необходимых Национально-революционной армии. Они вернулись в Гуанси обновленным движением, и завоевание родной провинции теперь является лишь ступенькой к их мечтам об измененном Китае.§!\n"

 GXC_warlord_remnant_party: "Милитаристы"
 GXC_warlord_remnant_party_long: "$GXC_warlord_remnant_party_long_tt$\n§LПоражение на поле боя не искоренило все пережитки эры милитаристов в Китае. По всей стране осталось множество осколков уничтоженных крупных милитаристских фракций: будь то мелкие клики, подчинившиеся новым хозяевам в нужный момент, подчиненные более низкого ранга, нанятые новой администрацией, или иногда новые диктаторы, возникшие из последовавшего вакуума власти и воспользовавшиеся своей связью с победителями. Тот факт, что многие лишь притворяются лояльными национальному делу, чтобы запугивать и эксплуатировать народ, не означает, что другие не пользуются подлинной популярностью — даже самые алчные люди эпохи высоких милитаристов заботились о создании прочных сетей гуаньси, охватывающих военные, гражданские и социальные круги. Харизматичные, имеющие связи и часто коррумпированные, те, кто пережил смену порядка, мастерски играют на региональных настроениях, а также на недовольстве статус-кво, полные решимости пережить попытки чисток. Только время покажет, сколько поколений потребуется, чтобы по-настоящему устранить мучительное наследие эры милитаристов.§!\n"
 GXC_warlord_remnant_party_long_tt: "Разношерстные регионалисты и диктаторы"

##Primarily Nat Pop Parties

 GXC_kmt_rightist_remnant_party: "ГМД-П"
 GXC_kmt_rightist_remnant_party_long: "Гоминьдан — Правые остатки (Гоминьдан — Юпай Цаньбу)\n§L$GXC_starting_KMT_intro$\n\nСосредоточенные вокруг загадочного Ху Ханьминя, правые остатки Гоминьдана в политике Лянгуана имеют очень мало влияния со стороны их далекого Центрального исполнительного комитета в изгнании. Однако на местах в регионе есть много действующих лиц, сочувствующих «Старым правым» партии, а именно Чэнь Цзитан (бывший служащий 4-й Национально-революционной армии и основатель Новой гуандунской клики) и Ли Цзунжэнь из 7-й Национально-революционной армии и Новой клики Гуанси. Поскольку они действуют как довольно независимые игроки, еще предстоит увидеть, сможет ли кто-то из них вернуть революцию на ее родину.§!\n"

 #中國國民黨黃埔系
 GXC_whampoa_clique_party: "ГМД-КВ"
 GXC_whampoa_clique_party_long: "Клика Вампу Национально-революционной армии (Чжунго Гоминьдан Хуанпу си)\n§LВоенная академия Вампу в Гуанчжоу просуществовала довольно недолго в своем первоначальном виде, но оставила мощное наследие в Национально-революционной армии. Сочетая (относительно) современную русско-французскую доктрину, идеологическую обработку в социалистическом духе и мощную личность директора Чан Кайши, она предоставила партийному государству армию фанатично преданных кадетов, готовых выполнять его директивы.\n\nЕе влияние вскоре стало мишенью для политических игроков. Левые генералы, такие как Дэн Яньда и Чжоу Эньлай, советники Интернационала и Чан Кайши вскоре начали борьбу за влияние среди студентов, причем последователи Чана сплотились в то, что стало известно как Клика Вампу. Представляя «Новых правых» партии, потеря бывшего лидера не смягчила их идеологического рвения или братских уз, которые делают их трудноуправляемыми.§!\n"

 #中國國民黨建設研究會
 GXC_reconstruction_research_committee: "ГМД-КИР"
 GXC_reconstruction_research_committee_long: "$GXC_reconstruction_research_committee_long_tt$\n§LОснованная Новой кликой Гуанси в попытке минимизировать влияние Ху Ханьминя и Московского комитета в своей провинции, Ассоциация революционных товарищей Гоминьдана стала ведущим тайным обществом Гуанси со штаб-квартирой в садовом бунгало в Наньнине. С лозунгами вроде «Восстановить Гуанси, возродить Китай» и миссией борьбы за «антиимпериалистические и антифеодальные идеи», группа охотно черпала вдохновение у европейских авангардистских и правых популистских массовых партий. Благодаря сложным ритуалам посвящения, обширной вербовке в военных школах и кругах, а также регулярным собраниям, Ассоциация революционных товарищей быстро стала продолжением культа личности Ли Цзунжэня и Бай Чунси.\n\nПо мере распространения влияния Гоминьдана распространялась и Новая клика Гуанси. Желание Ли бросить вызов Ху Ханьминю за контроль над революцией означало, что он должен был предстать чем-то большим, чем просто очередной генерал, и в рамках этого ребрендинга он переименовал Ассоциацию революционных товарищей в Исследовательскую ассоциацию реконструкции Гуанси. Они официально заявили о себе на Втором репатриированном национальном конгрессе, обнародовав обширные планы будущего Китая и представив Ли не просто региональным милитаристом, а фигурой национального масштаба с грандиозной социально-политической повесткой.\n\nС окончательным приходом Ли к власти Комитет исследований реконструкции наконец получил национальное признание как ведущий аналитический центр, так и как фанатичные исполнители повестки Новой клики Гуанси. Хотя Ли дистанцировался от эксцессов своих военизированных формирований, особенно стремясь создать более респектабельный, гражданский имидж, их власть сохраняется.§!\n"
 GXC_reconstruction_research_committee_long_tt: "Комитет исследований реконструкции Гоминьдана (Чжунго Гоминьдан Цзяньшэ Яньцзю Хуэй)"

