 GXC_RKMT_phase_iii_mechanic_explanation_tt: "§GВ то время как неукротимая личность Ху Ханьминя захватывает воображение как старых, так и новых членов Гоминьдана, возобладает ли его видение над реальностью Китая, определяется §cРеволюционным рвением§! Правого Гоминьдана. Этот драгоценный ресурс, общий для всех фракций правого Гоминьдана по всему Китаю, медленно накапливается путем достижения целей партии по национальной реконструкции, но может быть легко потерян, если легитимность партии будет поставлена под сомнение. Как лидер движения правого Гоминьдана, мы получаем особые бонусы через §YБаланс сил§!, которые отражают доминирующие настроения в отношении революции.§!"

