GXC_psc_party: "Клика Чжэнсюэ"
 GXC_psc_party_intro: "Берущая свое начало от первой итерации, основанной в 1913 году членами партии Тунмэнхой, отвергшими требование доктора Сунь Ятсена о клятвах в личной верности после провала Второй революции против Юань Шикая, Клика политической науки (Чжэнсюэ) представляет собой необычную группу среди бэйянских парламентариев. Они создали Общество по изучению европейских дел в Токио, которое позже, в 1916 году, эволюционировало в Общество политической науки. Отвергая необходимость Северного похода для объединения Китая, провозглашенную доктором Сунь Ятсеном и его Гоминьданом, они вместо этого работали с южными милитаристами, такими как Цэнь Чуньсюань и Лу Жунтин, чтобы свергнуть Сунь Ятсена и его Правительство защиты конституции.\n\nПредпочитая вместо этого участвовать в Бэйянской избирательной системе и содействовать мирным переговорам с Северными милитаристами, они занимали многие высокие посты в сенате, ассамблее и даже кабинете министров. Когда Сунь Ятсен с помощью гуандунского милитариста Чэнь Цзюнмина изгнал Цэня и Лу из Гуандуна, к чему добавился отказ Тан Цзияо принять Гу Пиньчжэня из Юньнани, Старая клика политической науки фактически распалась. Потеряв большинство своих самых влиятельных позиций, они почти полностью подчинились Бэйянскому политическому порядку."
 GXC_psc_party_long: "Старая клика политической науки (Цзю Чжэнсюэ Си)\n§L$GXC_psc_party_intro$\n\nПосле краха Северного похода Старая клика политической науки пережила своего рода возрождение в Лянгуане. Занимая видные посты, такие как спикер Ассамблеи Гуанчжоу, и поддерживая связи с ключевыми милитаристами, включая Линь Ху, Ян Симиня, Шэнь Хунъина и Лю Чжэньхуаня, которые открыто заявляли о связях с кликой, они в некоторой степени влились в политический истеблишмент, представляя более милитаристское направление фракции.§!\n"
 GXC_psc_party_national_long: "Старая клика политической науки (Цзю Чжэнсюэ Си)\n§L$GXC_psc_party_intro$\n\nКлика политической науки добилась возрождения после объединения страны под эгидой Лянгуана. Это позволило кантонскому отделению объединиться со своими коллегами в рыхлый, но более широкий блок с Лю Чжэньхуанем в качестве их номинального лидера-милитариста.§!\n"

##Primarily Soc Con Parties
 GXC_aacsg_party: "АВСГ"
 GXC_aacsg_party_long: "Ассоциация всех сословий по спасению Гуандуна (Гэцзе цзю Юэ ляньхэхуэй)\n§LАссоциация является политическим фронтом Кантонской организации общественной безопасности торговцев, более известной как Торговый корпус, начало которому было положено в неспокойные годы после Синьхайской революции. Сформированный для защиты интересов торговцев Гуанчжоу, Корпус приветствовался населением города за обеспечение безопасности во времена хаотичной неопределенности. После избрания Чэнь Ляньбо командиром Торгового корпуса и директором по финансам, численность добровольческого корпуса выросла в 1910-х годах, и он был реформирован на основе западной парламентской политики.\n\nХотя Торговый корпус сохранял нейтральное отношение к постоянной смене режимов в Гуанчжоу, в конечном итоге он вступил в конфликт с Национальным правительством Сунь Ятсена, что привело к Инциденту с Торговым корпусом 1924 года. Быстро разгромленный армией курсантов Военной академии Вампу Чан Кайши, Корпус был распущен, а многие его руководители бежали в Гонконг. Там они сформировали Ассоциацию всех сословий по спасению Гуандуна, безуспешно поддерживая Чэнь Цзюнмина во время Восточного похода.\n\nКогда немцы захватили Гуанчжоу, Чэнь Ляньбо был назначен временным мэром Гуанчжоу, где он реформировал и развернул Торговый корпус для обеспечения общественного порядка. После победы над Гоминьданом Ассоциация сохранилась как гуандунское регионалистское движение, стремящееся защитить провинцию от дальнейших посягательств Старой клики Гуанси.§!\n"

 GXC_aacsc_party: "АВСК"
 GXC_aacsc_party_long: "Ассоциация всех сословий по спасению Китая (Гэцзе цзю Чжунго ляньхэхуэй)\n§LПреемница Ассоциации всех сословий по спасению Гуандуна; костяк этого национального варианта по-прежнему составляют различные торговые ассоциации, торговые палаты и торговые корпуса, созданные по всему милитаристскому Китаю в поисках альтернативы произволу и жестокости правления милитаристов. Она представляет собой полное воплощение амбиций Чэнь Ляньбо о торговом правительстве и его самых смелых мечтаний о том, чтобы торговцы по всему Китаю объединились друг с другом и остальными для обеспечения общественного порядка и процветания.\n\nНесмотря на громкое название, в Ассоциации по-прежнему доминируют кантонские деятели и высшие классы, хотя новая ассоциация способна привлекать элиты и за пределами торговых кругов. Сюда входят различные политики, офицеры, шэньши, ученые и даже квалифицированные специалисты среднего класса.§!\n"

##Primarily Auth Dem Parties
 GXC_ogxc_ygf_party: "СКГ-МГ"
 GXC_ogxc_ygf_party_long: "Старая клика Гуанси — Фракция Молодой Гуанси (Цзюгуйси — Шаочжуан Пай)\n§L$GXC_OGXC_intro$\n\nКак наследники Лу Жунтина, стоящие у руля разобщенной Старой клики Гуанси, Фракция Молодой Гуанси сосредоточена вокруг приемных сыновей и наследников Лу, возглавляемая квадрумвиратом Лу Юйгуана, Ма Цзи, Лю Чжилу и Линь Ху. Номинальные хозяева провинций Лянгуан, где Лу унаследовал титул своего отца как наместник Лянгуана, тем не менее, сталкиваются с тем, что их власть над регионом продолжает оспариваться повстанцами Гоминьдана, а также их соперниками в Шаогуане — Фракцией армии Шэнь.\n\nПрагматичная в своем подходе и нацеленная на расширение влияния в Южном Китае, Фракция Молодой Гуанси также поддерживает связи с Кликой политической науки и различными другими политическими группами, обращаясь к наследию Старой клики Гуанси времен Войны в защиту республики.§!\n"
 GXC_ogxc_ygf_national_party_long: "Старая клика Гуанси — Фракция Молодой Гуанси (Цзюгуйси — Шаочжуан Пай)\n§L$GXC_OGXC_intro$\n\nМолодая гвардия Старой клики Гуанси во главе с триумвиратом Ма Цзи, Лю Чжилу и Линь Ху сумела организовать возрождение, помогая вернуть Лу Жунтина к власти после Северного похода. Но после его смерти он передал факел своему приемному сыну Лу Юйгуану, которому удалось ошеломить нацию, сделав то, о чем его отец только мечтал — объединив нацию под своим знаменем. Теперь все замерли в ожидании, что будет дальше.§!"

 GXC_JXS_party: "ОЦ"
 GXC_JXS_party_long: "Общество Цзинсин (Цзинсин Хуэй)\n§LОбщество Цзинсин было основано в 1921 году как личное детище эксцентричного Ли Линсы в виде свободной ассоциации интеллектуалов, получивших образование в Германии и стремящихся продвигать вестернизацию и китайско-германские отношения. Хотя ядро общества составляли ученые, оно также привлекало дипломатов, бизнесменов и даже офицеров в качестве партнеров. По мере улучшения китайско-германских связей росла и его значимость, и Общество начало спонсировать несколько крупных программ, включая создание Китайско-германской культурной и экономической ассоциации в 1935 году.\n\nЭтот проект привлек интерес Чжу Цзяхуа, инженера с немецким образованием и профессора, который помог стать соучредителем Ассоциации. Известный своими дипломатическими и административными навыками при ведении китайско-германских отношений для Чэнь Ляньбо, Сунь Чуаньфана и Шэнь Хунъина, он смог использовать это для получения важной роли в правительстве генерала Шэня. Выбранный за свою респектабельность и предполагаемую беспартийность, Чжу доказал, что сам по себе является очень способным политиком, и привлек других членов Общества Цзинсин на важные властные позиции в качестве расширения своей малой клики Чжу Цзяхуа.§!\n"

##Primarily Pat Aut Parties
 GXC_ogxc_saf_party: "СКГ-АШ"
 GXC_ogxc_saf_party_long: "Старая клика Гуанси — Фракция армии Шэнь (Цзюгуйси — Шэньцзюнь Пай)\n§L$GXC_OGXC_intro$\n\nНазначенный южными чжилийцами губернатором Гуандуна в последние дни Северного похода, позиция Шэнь Хунъина в Лянгуане была в лучшем случае шаткой, и ситуация ухудшилась, когда войска Лиги отступили из Лянгуана, чтобы сосредоточиться на подавлении Шанхайского восстания 1932 года. Эта возможность позволила Лу Жунтину скоординировать союз с Чэнь Ляньбо и Дэн Бэньинем, чтобы вытеснить Шэнь Хунъина с основных позиций в Гуанси и Гуандуне, а также выбить его из его традиционной базы в Гуйлине.\n\nИмея прохладный союз с Обществом Цзинсин, а также с прогерманскими и проюжно-чжилийскими группами в Лянгуане, Фракция армии Шэнь стремится реализовать власть, обещанную им еще в 1927 году, и взять Гуандун под свой контроль.§!"

 GXC_ogxc_saf_party_zhao_army: "СКГ-АЧ"
 GXC_ogxc_saf_party_zhao_army_long: "$GXC_ogxc_saf_party_zhao_army_long_tt$\n§L$GXC_OGXC_intro$\n\nШэнь Хунъин за годы создал собственную сплоченную фракцию, сначала на своей оперативной базе в Гуйлине, а затем в Шаогуане. Он дополнил свои силы различными оппортунистами, чжилийскими офицерами и немецкой поддержкой, что позволило ему стать «темной лошадкой» в борьбе за лидерство в Китае. Хотя он уже скончался, его последователи сплотились вокруг шаткого пакта между его сыном Шэнь Жунгуаном и его заместителем Ли Яоханем.\n\nПри Ли фракция Армии Чжао Старой клики Гуанси, похоже, собрала достаточно сил, чтобы выдвинуть его кандидатуру на пост президента, но многие опасаются, что у Ли едва ли хватит сил на полный срок.§!"
 GXC_ogxc_saf_party_zhao_army_long_tt: "Старая клика Гуанси — Фракция армии Чжао (Цзюгуйси — Чжаоцзюнь Пай)"
