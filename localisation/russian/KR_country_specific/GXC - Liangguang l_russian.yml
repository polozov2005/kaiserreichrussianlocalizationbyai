##Industrial Concerns
GXC_guangdong_university_concern: "Гуандунский университет"
 GXC_guangdong_university_concern_desc: "С возрождением системы образования в Гуандуне, пострадавшей в Эру милитаристов, Гуандунский университет теперь служит одним из передовых рубежей патриотической китайской интеллигенции. Расширение исследований в области технологий поможет Китаю не только в плане будущего народа, но и в его обороне."
 GXC_guangdong_hankou_railway_concern: "Железная дорога Гуанчжоу-Ханькоу"
 GXC_guangdong_hankou_railway_concern_desc: "Новая железнодорожная компания Гуанчжоу-Ханькоу фокусируется на модернизации путей сообщения в районах, где нам изначально приходилось полагаться на реки для доставки припасов, особенно в Ханькоу, который был ключевым примером этого. Однако с ЖДГХ добраться до таких мест, как Ханькоу, станет намного проще."

