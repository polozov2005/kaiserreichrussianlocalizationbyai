 GXC_KMT_popular_support_iron_necked_liberalism: "Легитимность партии: §OНесгибаемый либерализм§!"
 GXC_KMT_popular_support_iron_necked_liberalism_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии... пока возрождение Ху Ханьминя и его правого крыла партии не принесло успешное объединение нации.\n\nВечная «белая ворона» среди враждующих левых и правых крыльев, Сунь Фо наконец-то принял мантию своего отца, укрепив свою позицию как истинного преемника своего отца. Будучи посреднической, либерализующей и центристской силой для Гоминьдана, Сунь Фо искренне верит в миссию Гоминьдана нести просвещающую силу демократии китайскому народу, и хотя период Опеки все еще должен быть пройден, он не задержится дольше положенного."

 GXC_KMT_popular_support_western_hills_ascendant: "Легитимность партии: §cВосхождение Сишань§!"
 GXC_KMT_popular_support_western_hills_ascendant_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии... пока возрождение Ху Ханьминя и его правого крыла партии не принесло успешное объединение нации.\n\nХотя некоторые могут выдвигать обвинения в том, что консерваторы извращают Национальную революцию, превосходство Клики Сишань вернуло Гоминьдан к тому, какой партия была на самом деле до катастрофической политики Единого фронта. Партия конституционных идеалов, парламентаризма, партия Тунмэнхой! Социалисты, пренебрегающие конституционализмом, больше никогда не осквернят китайскую нацию, ибо идеалы Сун Цзяожэня живут в крови Клики Сишань."

 GXC_KMT_popular_support_harmonious_tutelage: "Легитимность партии: §gГармоничная опека§!"
 GXC_KMT_popular_support_harmonious_tutelage_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии... пока возрождение Ху Ханьминя и его правого крыла партии не принесло успешное объединение нации.\n\nБудучи всегда вдумчивым учеником своего покойного наставника, Ху Ханьминь наконец достиг истинного зенита своей карьеры, сражаясь как с вероломным лагерем Ван Цзинвэя, так и с попыткой удушения Национальной революции деспотом Ли Цзунжэнем, и все равно выстоял. С возобновленным сотрудничеством с Фракцией реконструкции, Даньвай и Кликой Сишань, Ху стремится наконец ввести Революционную опеку, на срок не более шести лет!"

 GXC_KMT_popular_support_exceptional_tutelage: "Легитимность партии: §gИсключительная опека§!"
 GXC_KMT_popular_support_exceptional_tutelage_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии... пока возрождение Ху Ханьминя и его правого крыла партии не принесло успешное объединение нации.\n\nБудучи всегда вдумчивым учеником своего покойного наставника, Ху Ханьминь наконец достиг истинного зенита своей карьеры, сражаясь как с вероломным лагерем Ван Цзинвэя, так и с попыткой удушения Национальной революции деспотом Ли Цзунжэнем, и все равно выстоял. Закрепив власть вокруг надлежащих органов управления, Ху стремится полностью внедрить все аспекты Опеки среди китайского населения, чтобы по-настоящему революционизировать и трансформировать нацию к моменту наступления здоровой демократии."

 GXC_KMT_popular_support_revolutionary_diarchy: "Легитимность партии: §gРеволюционная диархия§!"
 GXC_KMT_popular_support_revolutionary_diarchy_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии... пока возрождение Ху Ханьминя и его правого крыла партии не принесло успешное объединение нации.\n\nХотя некоторые думали, что Революция пошатнулась, что она умирает из-за вмешательства Ли Цзунжэня и его автократической Новой клики Гуанси, спаситель Гоминьдана и нации, Чэнь Цзитан, вырвал Национальную революцию из лап смерти. С новой структурой распределения власти между наказанным Ху Ханьминем и Чэнь Цзитаном, Революционная диархия доведет мечту доктора Сунь Ятсена до реалистичного завершения."

 GXC_KMT_popular_support_citizen_soldier_stratocracy: "Легитимность партии: §PСтратократия граждан-солдат§!"
 GXC_KMT_popular_support_citizen_soldier_stratocracy_desc: "Китайскому Гоминьдану не привыкать сотрудничать с милитаристами, полагаясь на различных беспринципных личностей для защиты Национальной революции от превосходящих сил противника. С, казалось бы, очевидным разрушением мечты покойного доктора Сунь Ятсена о свободном Китае, левые и правые остатки его партии продолжали бы ссориться из-за руководства партией даже в свете японского вторжения.\n\nБудучи первым «милитаристом», который присоединился к Гоминьдану, Ли Цзунжэнь и Новая клика Гуанси стремятся к более истинному применению Трех народных принципов, выше мелочного вмешательства политиков. Под его эгидой нация действительно трансформируется в современное государство граждан-солдат, чтобы никогда больше не пережить столетие унижения."

 GXC_KMT_popular_support_rule_of_the_heroic_general: "Легитимность партии: §SПравление Героического генерала§!"
 GXC_KMT_popular_support_rule_of_the_heroic_general_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии. С бурным объединением нации после ее темнейшего часа народ Лянгуана восстал против предателей в Центральном комитете и установил истинное Национальное правление.\n\nСчитавшийся многими «Хромым генералом», человеком с вечно плохим здоровьем, простым лакеем Временного комитета действий, Чэнь Миншу доказал неправоту всех своих недоброжелателей. Ибо именно он и Партия народных производителей полностью реализуют истинный смысл Трех принципов доктора Суня, ибо никто другой не может, кроме нашего Героического генерала!"

 GXC_KMT_popular_support_third_way_ascendant: "Легитимность партии: §rВосхождение Третьего пути§!"
 GXC_KMT_popular_support_third_way_ascendant_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии. С бурным объединением нации после ее темнейшего часа народ Лянгуана восстал против предателей в Центральном комитете и установил истинное Национальное правление.\n\nБудучи сборищем изгоев, никогда по-настоящему не вписывавшимся ни в рамки Временного комитета действий, ни в Китайскую синдикалистскую партию, Федерация товарищей Трёх народных принципов Тань Пиншаня возглавила новую Третью партию, чтобы обеспечить надлежащее гармоничное внедрение Трёх принципов и Социализма в китайскую нацию."

 GXC_KMT_popular_support_supervision_of_the_king_of_peasants: "Легитимность партии: §RНадзор Короля крестьян§!"
 GXC_KMT_popular_support_supervision_of_the_king_of_peasants_desc: "Китайский Гоминьдан долгое время был расколот между своими правыми и левыми фракциями после краха Северного похода. В последовавшем хаосе после провала экспедиции и, казалось бы, очевидного разрушения мечты покойного доктора Сунь Ятсена о свободном Китае, левое крыло партии по сути захватило руководство партией и провозгласило себя де-факто правящей главой партии. С бурным объединением нации после ее темнейшего часа народ Лянгуана восстал против предателей в Центральном комитете и установил истинное Национальное правление.\n\nВ ходе того, что многие считают крупной неожиданностью, массовый крестьянский аграрный культ Пэн Пая подтолкнул его и его партию к национальному объединению. Полностью сосредоточенные на проблемах крестьянства и имея за спиной преданную массу последователей, капиталисты и землевладельцы одинаково трепещут при знаках «Короля крестьян» и его пролетарских масс."

 GXC_support_CHI_idea: "Поддержка повстанцев Миньгань"
 GXC_support_CHI_idea_tt: "(§Y[CHI.GetNameWithFlag]§!) $volunteer_limit_plus_two_tt$"

 GXC_expanded_social_services_idea: "Расширенные социальные услуги"
 GXC_expanded_social_services_idea_desc: "Как провозглашено третьим принципом Миньшэн, правительство должно обеспечивать средства к существованию и благосостояние нации и ее народа. С этой целью мы стремились расширить наши социальные услуги, чтобы создать сеть поддержки, в которой наш народ нуждается в такие трудные времена."

 GXC_mass_education_programs: "Программы массового образования"
 GXC_mass_education_programs_desc: "С расширением ресурсов правительства китайская нация стремится реализовать множество кампаний и программ, направленных на расширение образовательных возможностей для масс, по образцу программ, реализованных в системе ополчения Новой клики Гуанси. Было создано большое количество начальных школ, что оказалось на удивление успешным."

 #UPC Political Ideas
 GXC_UPC_popular_support_desc: "Современные китайские федералисты пережили взлет и падение в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике Эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику получили некоторую поддержку, но после многообещающего начала они были отвергнуты как северным, так и южным правительствами. Успешное объединение силой Чжили дискредитировало движение, и многие стали ассоциировать движение лишь как прикрытие для милитаризма.\n\nВосстановить импульс, утраченный более десяти лет назад, будет трудно, но поскольку страна снова кажется безнадежно разделенной, а либерализационные усилия клики Чжили оказываются фикцией, многие надеются, что федералистское движение может стать решением проблем Китая."
