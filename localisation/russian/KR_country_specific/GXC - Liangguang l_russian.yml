 GXC_OGXC_intro: "Ведущая свое происхождение от восстания солдат «школы зеленого леса» (бандитов) в горной провинции, Старая клика Гуанси возникла после Синьхайской революции, сплотившись вокруг губернаторства Лу Жунтина в Гуанси. Как региональная сила в Южном Китае, Старая клика Гуанси играла важную роль в южной политике, сотрудничая как с Северным Бэйянским правительством, так и с правительством Сунь Ятсена в Гуанчжоу. Разбитая и распавшаяся после войн Юэ-Гуй, власть Лу Жунтина над Гуанси была восстановлена после краха Северного похода и сохранялась до его кончины в 1934 году."

