### Ideas ###

 FRP_ashes_of_syndicalism: "Тлеющие угли синдикализма"
 FRP_ashes_of_syndicalism_desc: "Для Франции капитализм сейчас - это не только новая экономическая модель, но и новый образ жизни. Демонтаж всех ключевых институтов Коммуны вызывет волну экономических потрясений по всей стране. Реорганизация займет время."
 FRP_bloc_of_rights: "Правый Блок"
 FRP_bloc_of_rights_desc: "Правительство §mЦентристов§!, §cНРД§!, и §aАграриев!, обьединено стремлением защитить новую Францию от подрывных элементов,при этом действуя в рамках демократии."
 FRP_bloc_of_rights_authdem: "Правый Блок"
 FRP_bloc_of_rights_authdem_desc: "Правительство §cНРД§! и §aАграриев§!, обьединено стремлением защитить новую Францию от подрывных элементов,при этом действуя в рамках демократии."
 FRP_republican_front: "Республиканский Фронт"
 FRP_republican_front_desc: "Правительство из §SРеспубликанской Рабочей Партии§!, §lРадикалов§!, и §cНРД§!,объединенно желанием завершить парламентаризацию новой Франции и создать новую справедливую модель экономики."
 FRP_new_national_bloc: "Новый Национальный Блок"
 FRP_new_national_bloc_desc: "Правительство,состоящее из §lРадикалов§!, §mПартии Центра§! и §cНРД§!, объединенные желанием завершить парламентаризацию новой Франции и обеспечить плавный переход к свободной экономике."
 FRP_coalition_of_expertise: "Коалиция Экспертов"
 FRP_coalition_of_expertise_desc: "Коалиция из §aКрестьянского Фронта§! и §PНационалистов§!, которые намерены устранить излишки бюрократической демократии в пользу могущественной исполнительной власти, способной поддерживать господство французского национализма."
