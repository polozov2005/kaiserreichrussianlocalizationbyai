# Introduction

 WAL_guide: "§MMonarchy§! ($authoritarian_democrat_coloured$ / $market_liberal_coloured$ / $social_democrat_coloured$)\n£white_dot To go absolute monarchy: send armed forces to deal with the trouble at Seraing.\n£white_dot To go constitutional monarchy: listen to the reds' demands at the trouble at Seraing.\n£white_dot Give in to syndicalist demands when the negotiations with them begin.\n£white_dot Complete the focus \"Hold Elections\" to select between the §mLiberals§! or §SLabour§!.\n\n§MRepublic§! ($market_liberal_coloured$ / $social_democrat_coloured$)\n£white_dot Listen to the reds' demands at the trouble at Seraing.\n£white_dot Stall the negotiations with the syndicalist, sign a reduced version of the Labour Act and have Adelbert abdicate.\n£white_dot Complete the focus \"Hold Elections\" to select between the §mPL§! or the §SPOB§!.\n\n§MLabour (Reformed)§! ($syndicalist_coloured$)\n£white_dot Do the same steps as above, elect the §SPOB§! and do the focus \"Peaceful Transition\" to elect Lucie Dujardin as the chairwoman.\n£white_dot Germany will declare war to you, select \"Syndicalism §G(G.A.)§!\" in the game rules to avoid it.\n\n§MTotalitarians§! ($totalist_coloured$)\n£white_dot Do the same steps as the republic path, elect the §SPOB§!, but don't do the focus \"Peaceful Transition\".\n£white_dot When the event \"Bloodbath at Liège\" appears, it will be followed by the \"Lahaut Assumes Control\" event, which will put the §oPTW§! in power.\n£white_dot Or, during the collapse of Flanders-Wallonia, choose to seek unification with the French Commune when the Walloons hear of Flemish victories.\n£white_dot This can result in multiple outcomes, such as the Germans declaring war, the French protecting you and making the Germans back down, or an early Second Weltkrieg. Select your preferred outcome through the game rules.\n\n§MRepublic - Rex§! ($national_populist_coloured$)\n£white_dot Either become an absolute monarchy or elect the §mPL§! as a republic or constitutional monarchy.\n£white_dot Do the focus \"Reaffirm Belgium Claims\" and once the focus \"Lobby Abroad\" is completed, the Germans should reject to help, and our government will fall as a result.\n£white_dot Choose to move the trial of Degrelle forward; the government will be couped and the §nRexists§! will come to power."

### Events ###

 wallonia_events.1.t: "The Dissolution of Flanders-Wallonia"
 wallonia_events.1.d: "Flanders has seceded from our Kingdom and has declared its independence. German citizens and the Royal Family have fled the region and are re-establishing their hold on our nation. Meanwhile the Revolution still rages on and is destabilising the region with no clear end in sight. Quick and decisive action will be required to avoid the Red Menace that wants to destroy our nation. Walloon capitalists and liberals look on however, fearing the revolution but equally unhappy with German rule. Their efforts to form a republic have proven fruitless over the last decade but a new opportunity may well have now presented itself."
 wallonia_events.1.a: "Hoist the Coq, Wallonia is born."

 wallonia_events.2.t: "Trouble at Seraing"
 wallonia_events.2.d: "With riots and protests throughout the entire Sillon Industriel, members of the Syndicalist resistance have holed up in the Seraing Steel Mills refusing to allow the factory to reopen and holding twelve members of the administration hostage. Troops retreating from Flanders are massing near Namur but a small contingent could be relocated to Liège to help quell the issue. Shareholders of the company meanwhile are desperately urging the government to leave the facility intact and are lobbying as much as possible to preserve their interests."
 wallonia_events.2.a: "Send an armed force to Seraing."
 wallonia_events.2.b: "Listen to the reds' demands."

 wallonia_events.3.t: "Negotiations With the Syndicalists"
 wallonia_events.3.d: "One of the leaders of the rebels trapped inside the mills has come out and given us their demands. They promise to leave the factory intact if the King adheres to the terms won during the 1935 strikes, signs a new Labour Act enacting the promised forty-hour working week and sets out measures providing more transparent employee-employer relations. The Liberal party has already declared their opposition to the demands as it would suppress free trade and strip privileges from them. Still, if we were to cave in to their demands we might be able to weaken support for an outright syndicalist revolution and change the mind of the more liberal POB members."
 wallonia_events.3.a: "Give in to their demands."
 wallonia_events.3.b: "Stall the negotiations."
 wallonia_events.3.c: "Send in the Feldgendarmerie."

#Stalled Negotiations

 wallonia_events.31.t: "Stalled Negotiations"
 wallonia_events.31.d: "Two days have passed since the syndicalists' demands were received and no answer has been given as of yet by the government. News of the situation has spread like wildfire throughout the nation and similar actions have been undertaken in the glass factories of Charleroi and have even struck the arms producer FN. The situation is reaching a boiling point and with terrorist attacks in Hainaut, we need to act now or the army will be spread too thin to counter large uprisings. Our commanders are advising us to make an example of the Seraing strikers and to send in the army to flush them from their stronghold. Liberal lobbyists are still warning the King not to act violently and advise him to seek a middle ground."
 wallonia_events.31.a: "Send in the Feldgendarmerie."
 wallonia_events.31.b: "Sign a reduced version of the Labour Act."

 wallonia_events.32.t: "Labour Act Adopted"
 wallonia_events.32.d: "With the promise of better working conditions and the announced Labour Act, many of the smaller strikes have been calmed and left the factories without causing too much damage. The Strikers of Seraing however are still holding out and are once more demanding the government sign the full Labour Act or to resign at once. The POB, which has seen its influence greatly increase in the last decade, has joined the syndicalists' call and have demanded the immediate resignation of the government."
 wallonia_events.32.a: "We must gain support from the liberals!"

 wallonia_events.33.t: "Liberal Party Refuses to Assist"
 wallonia_events.33.d: "Smelling their chance, the Liberals have decided to throw their own hat into the ring and have joined the POB in their demands for resignation. They state that the only way to solve this crisis now is by listening to the people and holding emergency elections."
 wallonia_events.33.a: "Where do we get our support from now?"

 wallonia_events.34.t: "Protest in La Louvière"
 wallonia_events.34.d: "It appears that in La Louvière thousands of disgruntled miners have come down to the town square to protest against the pro-German government and to demand Adelbert's abdication. Feldgendarmerie have been keeping watch on the protest and so far have been able to discourage violence between the Walloons and the much smaller counterprotest by German citizens. Though only small in size, the protest marks the end of an era. Further protests around the nation are already being organised and a general strike has now kept the nation paralysed for two weeks. The situation is becoming completely untenable with many Germans leaving the nation to avoid repression by the syndicalists."
 wallonia_events.34.a: "The monarchy is faltering!"

 wallonia_events.35.t: "The Namur March"
 wallonia_events.35.d: "Further protests are engulfing the nation, with many people leaving their homes to gather on the streets of Namur. A product of the prestigious regional glass industry, a life-sized sculpture of Adelbert has been toppled in the town square and symbolically smashed to bits with mining pickaxes. Though police were able to arrest the perpetrators it was already too late as shards of glass were quickly grabbed by bystanders permanently memorialising the events of the day."
 wallonia_events.35.a: "We must fortify the Palace."

 wallonia_events.36.t: "Royal Councillor Resigns"
 wallonia_events.36.d: "Not willing to risk his life for that of his king anymore, the royal councillor has announced his resignation and was seen leaving the palace to loud applause. The Feldgendarmerie have been used to push the crowd away from the fences and avoid violent escalation. Their efforts have been met by a grand crowd-driven performance of the Chant Des Wallons"
 wallonia_events.36.a: "Summon Parliament to the Palace."

 wallonia_events.37.t: "Final Royal Meeting"
 wallonia_events.37.d: "Only a small faction of politicians with nearly no members of the POB has answered the call and have come to attend what may be the last Royal Meeting. The King asked every single person in the room whether they believe his current predicament is solvable. He was met with no clear response until the leader of the Liberal Party, Auguste Buisseret, stepped forward and told the King that there was no way he would be able to return to power. The people have spoken and it's abdication they demand. Only then will we be able to calm down the populace and resume our work."
 wallonia_events.37.a: "Abdication is the only dignified way out."
 wallonia_events.37.b: "But what about a referendum?"

 wallonia_events.38.t: "Referendum Refused"
 wallonia_events.38.d: "In a last ditch effort to retain power Adelbert requested the government hold a referendum on the future of the monarchy but was turned down. Support for the King has almost reached single digits, making a costly referendum pointless. The proposal was put to a vote and unanimously voted down. The reign of King Adelbert is over."
 wallonia_events.38.a: "Sign the abdication papers."

 wallonia_events.39.t: "King Adelbert I Abdicates"
 wallonia_events.39.d: "Turned down by both the Flemish and the Walloons, Adelbert has finally given in and at 4pm put down his final signature as King of the Flemish and Walloons. Although German rule is far from over, the monarchy has reached its end."
 wallonia_events.39.a: "Hoist the Coq Wallon!"

 wallonia_events.310.t: "First Walloon Elections"
 wallonia_events.310.d: "After two decades of strict German rule, the first free elections have been held. Even the syndicalist branch of the POB has been allowed to participate and has spend the last week desperately amassing as much popularity as possible. The PL has also gathered substantial support and is particularly popular around the city of Namur and among the remaining German minority. However no party seems capable of achieving an absolute majority and a political impasse may drag on for multiple weeks if no agreement is reached."
 wallonia_events.310.a: "The POB wins the election."
 wallonia_events.310.b: "The PL wins a close victory."

 wallonia_events.311.t: "PL Wins the Most Seats"
 wallonia_events.311.d: "Closely beating the POB and the Catholics, the PL under its leader Auguste Buisseret has won the most seats and been given the right to begin forming a government. While a Catholic-Liberal alliance is the most likely outcome, the POB has offered to assist the PL if they can guarantee more freedom for the worker class and immediately pass the Labour Act through Parliament. A so-called 'Red-Yellow alliance' would grant almost complete control over the government but may be more difficult to keep intact than a Swedish coalition."
 wallonia_events.311.a: "The real work starts now."

#Give in to their demands

 wallonia_events.41.t: "Adelbert Caves in to the Strikers"
 wallonia_events.41.d: "With his back against the wall and his position as strong sovereign growing increasingly fragile, King Adelbert has agreed to sign the Labour Act. The syndicalists left their position and their leader could be seen shaking hands with the King, publicly indicating a curious softening of Adelbert's absolutist obsession."
 wallonia_events.41.a: "The Labour Act is signed."

 wallonia_events.42.t: "Support for the King Increases"
 wallonia_events.42.d: "Impressed by the decisive actions of their King, Parliament gave a standing ovation on their next sitting. The leader of the POB, Fernand Dehousse, gave a speech openly praising Adelbert and announcing his push for a more democratic constitutional monarchy."
 wallonia_events.42.a: "Public adulation, interesting..."

 wallonia_events.43.t: "Truce Offered to the Resistance"
 wallonia_events.43.d: "With the Liège province partially pacified, Adelbert has offered a truce to the syndicalist resistance which still fiercely defends the western villages of Hainaut. Promising a royal pardon and the option for them to create their own legal party, the King has demanded a complete end to hostilities. The syndicalist rebels however have refused this offer and increased their raids on our military camps."
 wallonia_events.43.a: "They have had their chance."

 wallonia_events.44.t: "Syndicalist Resistance Crushed"
 wallonia_events.44.d: "After the syndicalist refusal, a strike force consisting of both Walloon and German troops was assembled with orders to push into Mons and secure the city while the detachments flanked the rebels, enveloped them and began successfully clearing the villages street by street. Though two weeks of heavy fighting ensued, in the end we regained control with relatively minimal casualties."
 wallonia_events.44.a: "The Syndicalists have been defeated for now."

#Send in the Feldgendarmerie

 wallonia_events.51.t: "Troops Storm Seraing"
 wallonia_events.51.d: "Just like last year Adelbert has yet again given the order to disperse any protestors violently and break up the strikes with force. Within two hours the factory complex was cleared of all opposition. The floor is red with blood as the last of the syndicalists are slaughtered, a clear warning to all others willing to protest."
 wallonia_events.51.a: "The resistance will be quelled again."

 wallonia_events.52.t: "Mons Liberated"
 wallonia_events.52.d: "After our defeat at Mons during the Belgian revolution, our troops have been licking their wounds. Now they are however fully prepared and ready to attack the syndicalist barricades."
 wallonia_events.52.a: "Fire at will, men."

 wallonia_events.53.t: "POB Banned From Parliament"
 wallonia_events.53.d: "Though no clear connection can be found between the moderate faction of the POB who has been part of the government since 1919 and the radical syndicalist splinter faction, Adelbert has signed a royal decree outlawing the party and kicking it out of the government. Although loud protests erupted as expected, all were quelled by the prospect of prison."
 wallonia_events.53.a: "Another step towards the end of Syndicalism."

 wallonia_events.54.t: "A New Wallonia"
 wallonia_events.54.d: "Much has changed during the last two weeks, with the remaining syndicalist cells being destroyed and mass arrests throughout the Sillon Industriel. Experts estimate the death toll at about 15,300 citizens and the arrest of around 800 leading members of the organisation. German control has once again been largely established in Wallonia, kept intact by a regime of fear and repression."
 wallonia_events.54.a: "I think a toast is in order."

#Lobbying with Germany

 wallonia_events.6.t: "Search For Assistance Against Flanders"
 wallonia_events.6.d: "The political situation has stabilised and the economy is slowly recovering, yet much remains to be done. Flanders, which declared its independence during the Belgian Revolution, is still a rightful part of our country. However ti has fallen out of our sphere of influence and is now a direct member of the Reichspakt. Only by carefully manoeuvring our way on the German political battlefield can we secure their support for the reunification."
 wallonia_events.6.a: "Send word to Germany."

 wallonia_events.61.t: "Wallonia Requests Our Support"
 wallonia_events.61.d: "After the chaos of the Belgian revolution, the nation of Flanders-Wallonia split into two separate states. The Dutch speaking region of Flanders has successfully achieved its separation from the union and has become a somewhat autonomous member of the Reichspakt. Wallonia however is still under our more direct control and has finally defeated the revolution. Now they request our aid in reconquering their lost land and reuniting Flanders-Wallonia. While this may reestablish our rule over the region it may lead to further trouble in the future. Denial of their request may once again throw the nation into turmoil as the power of the government may be called into question."
 wallonia_events.61.a: "Support the Walloon cause."
 wallonia_events.61.b: "No, the Flemish are good allies."

 wallonia_events.62.t: "Germany Supports Us"
 wallonia_events.62.d: "The Kaiser has seen the right way and has acceded to our request. No German aid will be sent to Flanders in case of war and no other members of the Reichspakt will be allowed to intervene."
 wallonia_events.62.a: "Prepare the invasion."

 wallonia_events.63.t: "Germany Denies Our Request"
 wallonia_events.63.d: "The Kaiser has denied our request and expelled the emissaries who came up with this supposedly ridiculous idea. If we attack Flanders, we can be sure to feel the full wrath of the German behemoth. Unrest is already brewing in Parliament with many seeing this as the first signs of weakness. We will have to tread carefully to counter nationalist uprisings."
 wallonia_events.63.a: "Wilhelm has failed us!"

#The Government has Failed!

 wallonia_events.7.t: "The Government is Failing!"
 wallonia_events.7.d: "After the disastrous campaign to gather support against Flanders and the failure to completely solve the syndicalist problem, nationalists are flocking to the banner of Léon Degrelle who promises Wallonia for the Walloons and a strong answer to syndicalism. While the Liberals have already spoken against his outrageous populism, the Catholics seem to be unsure about whether to speak out against him. Trouble is also brewing in the army where many who joined up to defeat the Flemish are disappointed by their government and are requesting a stronger response."
 wallonia_events.7.a: "Arrest Degrelle!"

 wallonia_events.71.t: "Arrest of Degrelle"
 wallonia_events.71.d: "Although Degrelle was easily captured by our police force, this has caused massive outrage across the cities. Many see this as curbing of freedom of speech and Rexist propaganda is starting to appear on every street corner with small skirmishes occurring between police and members when caught."
 wallonia_events.71.a: "This situation is starting to escalate."

 wallonia_events.72.t: "Trouble at the University of Liège"
 wallonia_events.72.d: "The populist rhetoric of Degrelle has spread far and wide and has become a breeding ground for students having trouble finding work after the Black Monday crisis. Peaceful protests are being organised on campus and in the streets calling for his release and the creation of new jobs."
 wallonia_events.72.a: "Disperse the crowds."

 wallonia_events.73.t: "Mutiny in the Army"
 wallonia_events.73.d: "In many of the smaller kazernes troups conscripted specifically for the unification wars, Walloon soldiers seem to be plotting against their German commanders. Disobeying orders and deliberately damaging military equipment seems to have become popular passtimes amongst our young soldiery."
 wallonia_events.73.a: "Disperse these regiments across the nation."

 wallonia_events.74.t: "Message From the Vatican"
 wallonia_events.74.d: "The Pope has decided to interfere in the Degrelle case calling for clemency. It appears that supporters of Rex were able to reach the nuntius of München, Eugenio Pacelli who contacted the Pope. Impressed by Degrelle's devotion to God, the Holy Father has requested that our government grant Degrelle clemency. It would be in our best interests to keep this request secret as it may cause severe trouble if this leaks out. Cardinal Mercier has offered to speak on the prime minister's behalf in Parliament denying the whole affair."
 wallonia_events.74.a: "Allow Mercier to go ahead."

 wallonia_events.75.t: "Betrayed By Mercier!"
 wallonia_events.75.d: "Although his speech was screened by the cabinet and given to him before the speech, Mercier decided to speak out against the government questioning their resolve and explaining the Papal affair in its entirety. This evidently led to outrage in Parliament with supporters of Degrelle demanding his release and praising Mercier for his efforts in whistleblowing about the scandal."
 wallonia_events.75.a: "This is not going too well."

 wallonia_events.76.t: "Release Degrelle?"
 wallonia_events.76.d: "With popular opinion turning against the government and demand for Degrelle's release increasing by the day, we will soon be forced to decide whether to release him and hope that it calms down the crowds gathering in front of Parliament, or keep him imprisoned and risk the people's wrath. The minister for internal affairs however is pushing the prime minister to speed up the trial and have Degrelle executed before the situation gets out of hand."
 wallonia_events.76.a: "Release Degrelle."
 wallonia_events.76.b: "Move the trial forward."

#Degrelle released
 wallonia_events.77.t: "Degrelle Released"
 wallonia_events.77.d: "To avoid further escalation the government has decided not to press their case against Degrelle and dropped charges against him. Although this act served initially to stem the growing unrest, most of the damage has already been done. Pictures showing a frail and weakened Degrelle leaving the prison are front page news across the entire country. Rexists in the government are pushing for a motion of no confidence saying that the current government clearly doesn't speak for its people and should resign at once. Degrelle himself has in the meantime announced his candidature for prime minister and is helping to fuel the Rexist propaganda machine."
 wallonia_events.77.a: "A catastrophe!"

 wallonia_events.78.t: "The Motion of No Confidence Succeeds!"
 wallonia_events.78.d: "Defeated in a motion of no confidence by 103 to 75, the entire cabinet has reluctantly resigned and the government has fallen. Early elections have been called for the end of the month while all regular government affairs have ceased. It has already become clear that this going to be a close election with REX appearing to be on the verge of becoming the largest party in Wallonia."
 wallonia_events.78.a: "The POB, DC and PL band together."
 wallonia_events.78.b: "The DC speaks out in favour of Degrelle."

 wallonia_events.79.t: "Rex Wins the Election!"
 wallonia_events.79.d: "Rex has become the largest party in Wallonia closely followed by the POB. Though Rex failed to reach an outright majority, with support from the DC a working coalition has been established. The POB and PL have called for a recount but have been turned down by the Courts, with the judges stating that REX has won fair and square."
 wallonia_events.79.a: "Degrelle assumes control."

 wallonia_events.710.t: "The Grand Coalition Wins the Election!"
 wallonia_events.710.d: "By combining their efforts and denouncing REX, the grand coalition of POB, DC and PL was able to win the election. REX only achieved 19% of the votes and has been excluded from the government. Although many of Degrelle's supporters still remain, the party will most likely never achieve the same momentum."
 wallonia_events.710.a: "A victory for democracy!"

#Degrelle goes to trial
 wallonia_events.711.t: "The Trial of Degrelle"
 wallonia_events.711.d: "Thousands have gathered outside Wallonia's highest court as Degrelle is brought before the judge. After many hours of proceedings the judge has finally given his trial verdict. Degrelle has been variously found guilty of committing an attack on the nation aimed at overthrowing or changing its form of government and bringing citizens under arms against the legal state and its lawfully appointed organs. This assortment of crimes is to be punished by the death penalty, an outcome to be fulfilled before the end of the week."
 wallonia_events.711.a: "Hopefully this means an end to REX."

 wallonia_events.712.t: "Rexist Coup"
 wallonia_events.712.d: "Fuelled by the unjust condemnation of Degrelle and the severity of his punishment, ever more supporters have flocked to the Rexist banner. On Sunday night, with most government agencies closed military putschists launched a pro-Rexist coup, lifting the prime minister from his bed and capturing many key military installations. Freed by his supporters, Degrelle has declared the beginning of a new Rexist era as his troops captured the last remaining government strongholds. When the sun rose the next day, REX had fulfilled its coup objectives and assumed full control over the state."
 wallonia_events.712.a: "A new era awaits!"

#Downfall of Degrelle
 wallonia_events.713.t: "Degrelle Shot!"
 wallonia_events.713.d: "During a visit to the FN Herstal factory, Léon Degrelle has been shot dead by a factory worker. Though his bodyguards immediately returned fire, killing the assailant, with Degrelle rushed to the closest hospital, medical attention came too late and at around 16:00 our great leader died. Due to his consolidation of power over the last few years, it seems that there is no clear successor to his legacy and while the leaders of REX are fighting each other, the other parties smell a chance to recover their lost popularity. Whether or not REX will be able to retain power after the loss of their charismatic leader is to be seen but dark clouds are definitely brewing over Wallonia."
 wallonia_events.713.a: "No doubt REX will tear itself apart now."

 wallonia_events.714.t: "Infighting Within REX"
 wallonia_events.714.d: "In the wake of the death of Degrelle, his second in command Victor Matthys has wrested control of the party to the consternation of other major players like Louis Collard and the minister of propaganda Georges Prosper Remi. Matthys' leadership qualities have quickly been outed as lacklustre at best after he decided that the populace can only be kept in line with extreme repression. While it seems order has temporarily been restored, behind the façade of violence resistance keeps brewing and Matthys' rule may be short-lived."
 wallonia_events.714.a: "Yet more turbulence."

 wallonia_events.715.t: "Coup D'état in Wallonia!"
 wallonia_events.715.d: "The succession crisis seems to have finally affected the army, which has risen up in protest against the cruel massacres commissioned by Matthys to eliminate his opponents. Supported by the PL and the POB, officers have ordered their soldiers to disobey all Rexist commands and tanks have been be seen rolling through the avenues of Liège towards the party headquarters. All the same, the remaining hardliners are unwilling to give up so easily and without a surrender by the Rexists a bloodbath is almost inevitable."
 wallonia_events.715.a: "Demand they lay down their weapons."

 wallonia_events.716.t: "Consultation with Remi"
 wallonia_events.716.d: "While Louis Collard has fortified himself with the REX hardliners inside the party headquarters, Georges Prosper Remi has been cooperating with the resistance since Degrelle's death seeking a return to democracy and a peaceful transition of power. While his efforts have proven futile in avoiding armed conflict so far, he still holds some sway within the nation and has convinced many of the other Rexists outside of the capital to surrender themselves to the army. While he has tried mediating with the remaining hardliners, all have come to naught and it seems that they will not go down without a fight."
 wallonia_events.716.a: "Launch the attack."

 wallonia_events.717.t: "Georges Deffontaine Assumes Temporary Control"
 wallonia_events.717.d: "After a short but bloody siege of the party headquarters, the army has emerged victorious and has proclaimed Georges Deffontaine leader of provisionary government until elections are held. The POB and PL have immediately restarted their propaganda efforts and with REX having been disbanded by the military, Georges Prosper Remi has announced that he will be running for office to contain the remaining Rexist elements and help Wallonia on its way towards full democracy."
 wallonia_events.717.a: "We'll prepare elections!"

 wallonia_events.718.t: "Post-REX Elections"
 wallonia_events.718.d: "After the downfall of REX and the military coup, the elections are finally upon us. The POB under Fernand Dehousse has been polling excellently but has received some hits due to a damaging scandal concerning one of their party members. Auguste Buisseret is also doing well with his message of liberal democracy and has attracted many of the German capitalists. Georges Prosper Remi is, to the surprise of many, still following closely as well and might even pull a close victory out of the elections with his message of solidarity and national unity."
 wallonia_events.718.a: "Fernand Dehousse and the POB."
 wallonia_events.718.b: "Auguste Buisseret and the PL."
 wallonia_events.718.c: "Georges Prosper Remi and the UNW."

#POB wins the elections
 wallonia_events.8.t: "POB Wins the Election"
 wallonia_events.8.d: "Unsurprising to many, the POB was able to sway the voters and win a landslide victory. Internal strife however is damaging the party and long discussions can be heard in parliament discussing the future of the socialist party. Subfactions under Lucie Dejardin, Julien Lahaut and Walter Dauge are damaging Fernand Dehousse standing and may force his hand into a dangerous position. The syndicalists demand a quick and painless revolution while the more conservative faction prefers upholding the status quo with small socialist reforms."
 wallonia_events.8.a: "Difficult negotiations are approaching."

 wallonia_events.81.t: "Question of Leadership"
 wallonia_events.81.d: "As the POB tries to settle in and form its cabinet, a motion of no confidence has been proclaimed against Fernand Dehousse calling him a traitor to the working class and unfit to rule. Though the syndicalist members support this motion, other sub-factions led by Julien Lahaut and Walter Dauge are less inclined to support them as this would result in syndicalist dominance within the party."
 wallonia_events.81.a: "Fernand Dehousse remains head of the Party."
 wallonia_events.81.b: "Lucie Dujardin becomes Chairwoman."

 wallonia_events.82.t: "Bloodbath at Liège"
 wallonia_events.82.d: "With no consensus within the POB, members of the extremist syndicalist and totalist factions have decided to handle the matters their own way. During yet another failing meeting between Fernand Dehousse and members of a new social liberal faction, masked assailants stormed the room butchering Fernand Dehousse and his staff. Over sixty high-ranking members of the POB were massacred after which the assailants left. Shocked by these events, Parliament has announced a day of national sorrow mourning the casualties of the attack."
 wallonia_events.82.a: "Chaos reigns once more."

 wallonia_events.83.t: "Lahaut Assumes Control"
 wallonia_events.83.d: "With all opposition dealt with and no immediate response from the moderate syndicalists, Julien Lahaut has taken control of the POB and is starting to push for full on revolution, breaking the chains and liberating the worker class from capitalist oppression."
 wallonia_events.83.a: "Dark times are upon us."

 wallonia_events.84.t: "Military Disbanded"
 wallonia_events.84.d: "To avoid problems with the military, Lahaut has fired all officers and cut off their funding. Only a small faction called the Red Guard ahs been allowed to remain extant, a praetorian guard consisting of Lahaut's fiercest supporters."
 wallonia_events.84.a: "The military has been dismantled."

#Territorial Demands
 wallonia_events.10.t: "Walloon Ultimatum"
 wallonia_events.10.d: "The Walloon government has presented us with an ultimatum demanding our immediate reunification with them and the recreation of Flanders-Wallonia. Troops have been seen performing military exercises along our southern border and even the remnants of the former Flemish-Walloon navy have acted particularly brashly off our coast. We do technically outnumber them though so should be able to defend ourselves."
 wallonia_events.10.a: "Well, I suppose it is in both of our interests..."
 wallonia_events.10.b: "Flanders is an independent nation!"

 wallonia_events.101.t: "Ultimatum Refused!"
 wallonia_events.101.d: "The ultimatum was denied and our neighbours now fortify their border in preparation for war."
 wallonia_events.101.a: "Launch the invasion."
 wallonia_events.101.b: "We can do nothing."

 wallonia_events.102.t: "Wallonia Requests Deutsch-Wallonia"
 wallonia_events.102.d: "The Walloon government has approached us over the Walloon province we annexed after the Weltkrieg. They state that returning it to them would solve unrest in the region and strengthen our borders. We can easily deny them this land however and remind them of their defeat at our hands."
 wallonia_events.102.a: "Return German Wallonia."
 wallonia_events.102.b: "To the victor, the spoils."

 wallonia_events.103.t: "Wallonia Requests Flanders"
 wallonia_events.103.d: "Wallonia, claiming all those lands once held by Belgium, has demanded that our nation transfer control over Flanders to them."
 wallonia_events.103.a: "Return Flanders."
 wallonia_events.103.b: "To the victor, the spoils."

 wallonia_events.104.t: "Request Refused!"
 wallonia_events.104.d: "The request was denied and our neighbours now fortify their border in preparation for potential conflict."
 wallonia_events.104.a: "Damn."

#Internationale

 wallonia_events.11.t: "Wallonia Requests Entry into the Internationale"
 wallonia_events.11.d: "Our Northern neighbour has successfully broken the chains and wants to join our alliance. German repression against their revolution may be approaching though so we should consider whether we want to take this risk."
 wallonia_events.11.a: "Let them in."
 wallonia_events.11.b: "Refuse them."

 wallonia_events.111.t: "The Internationale Denies Membership"
 wallonia_events.111.d: "We have been betrayed by our socialist brothers and have to face German might all alone now."
 wallonia_events.111.a: "Is the revolution lost?"

 wallonia_events.112.t: "Syndicalism in Wallonia"
 wallonia_events.112.d: "It appears that syndicalism has spread to our puppet state of Wallonia and that Adelbert has once again been deposed. Our armies are already preparing for an invasion but may still be called off and prevent retaliation from the Commune of France."
 wallonia_events.112.a: "Prepare the attack!"
 wallonia_events.112.b: "Wallonia is no longer pressing."

#Propaganda

 wallonia_events.12.t: "POB Spreads Propaganda"
 wallonia_events.12.d: "In the days leading up to the contentious election, all parties are scrambling their best propaganda teams to advocate their strengths and denounce the others. Their main focus seems to be to portray the PL-DC coalition as the enemy and to try and instil fear in the working class."
 wallonia_events.12.a: "The election is approaching!"

 wallonia_events.121.t: "PL Spreads Propaganda"
 wallonia_events.121.d: "The PL has focused on countering the fear instilled into the middle class by the Catholics against the Socialists. 'Carnaval... after Easter, the Citizen has become wise enough to see through these lies!'"

 wallonia_events.122.t: "REX Spreads Propaganda"
 wallonia_events.122.d: "Led by their mildly popular leader Degrelle, REX is seeking to sway voters by promising the complete cleanup, or 'groote kuisch' of career politicians and to restore Wallonia to its true Belgian borders."

 wallonia_events.123.t: "DC Spreads Propaganda"
 wallonia_events.123.d: "Afraid of Catholics voting against them and for REX, DC has launched a smear campaign against Degrelle calling him alternately confused 'dwaashoofd' and mad with power, 'macht'."

 wallonia_events.124.t: "POB Spreads Propaganda"
 wallonia_events.124.d: "To remember the workers of the pre-Weltkrieg situation, POB has sought to present the image of the failed PL-DC and their cronies drowning in failures. 'After their failure to hold Belgium, do you still trust them?'"

 wallonia_events.125.t: "POB Spreads Propaganda"
 wallonia_events.125.d: "'The time for socialism is now. The PL-DC are stuck in the past where the POB looks to the future! So the reign of money can end and the reign of the worker may commence!'"

 wallonia_events.126.t: "Anti-German Propaganda"
 wallonia_events.126.d: "Hung up in the middle of the night with no witnesses, large amount of anti-German propaganda has turned up showing the invaders as swine ravaging the corpse of Belgium. Police searches were unsuccessful in finding the perpetrators but many German citizens are fearful, and outrage is spreading."

#Industrial

 wallonia_events.131.t: "Foundation of the IBA"
 wallonia_events.131.d: "Created by scientists from all Walloon Universities and even the Flemish, Ion Beam Applications has been launched aimed at boosting the high tech industry of Wallonia. With a large focus on prosthetics and cyclotron, they hope to revolutionise the niche and take the world by storm."
 wallonia_events.131.a: "Fund their projects."
 wallonia_events.131.b: "Observe their progress."

 wallonia_events.1311.t: "Return on Investment!"
 wallonia_events.1311.d: "IBA was able to expand with our subsidies into the American market and has received attention from their government as well. A contract has been signed between them and IBA, allowing easier expansion and the takeover of a biotechnology firm in the States."
 wallonia_events.1311.a: "Great success!"

 wallonia_events.1312.t: "Investment Failed!"
 wallonia_events.1312.d: "With the subsidies IBA has tried to enter the German market but was forced to sign harsh terms with their government and has been blocked off from further expansion. Even worse, it seems that one of their employees has leaked company secrets to their counterparts causing them to fall even farther behind."
 wallonia_events.1312.a: "Truly a shame!"

 wallonia_events.132.t: "Extraction of New Resources"
 wallonia_events.132.d: "To combat the reliance on coal and heavy industry, the government has launched a large scale programme to overhaul part of the Hainaut industry seeking to turn it into the glass centre of Europe. Heavily based out of Charleroi new and existing companies have been funded and expanded."
 wallonia_events.132.a: "We'll need more than that though."

 wallonia_events.1321.t: "Request From the Union Minière"
 wallonia_events.1321.d: "While the Belgian government lost our colony after the Weltkrieg, most of the Congolese economy is still controlled by our corporations. The Union Minière du Haut Katanga is the largest amongst them and has established itself as one of the world's most important players on the resource market. Mittelafrikan meddling however is starting to interfere with their interests and their government has imposed restrictions on the company. Therefore they have decided to withdraw most of their funds and to take loans with Walloon banks instead of German ones. To achieve this though, they will need support from our government and an adaption to our laws to enable them an easy transfer. While the benefits may be huge, we have to tread carefully to avoid German wrath."
 wallonia_events.1321.a: "Support the UMHK."
 wallonia_events.1321.b: "Distance ourselves from their efforts."

 wallonia_events.1322.t: "Propose New Agreement With Mittelafrika"
 wallonia_events.1322.d: "To support our citizens and the UMHK abroad, the government has drafted up a proposal for Mittelafrika. They request easier access to the mines, permission to build infrastructure in Kongo and to lease the harbour of Boma to our nation. In return, UMHK will pay an increased amount of tax and will build housing, hospitals and schools for the local population. A new trade agreement will be signed increasing Walloon imports from Mittelafrika and at the same time offering more favourable arrangements for their government."
 wallonia_events.1322.a: "We can all benefit!"
 wallonia_events.1322.b: "Let's not be hasty..."

 wallonia_events.1323.t: "[From.GetName] Seeks an Agreement"
 wallonia_events.1323.d: "To support their citizens and the Union Minière du Haut Katanga in Mittelafrika, the [From.GetAdjective] government has drafted up a proposal for us. They request easier access to the mines, permission to build infrastructure in Kongo and to lease the harbour of Boma to their nation. In return, UMHK will pay an increased amount of tax and will build housing, hospitals and schools for the local population. A new trade agreement will be signed increasing Walloon import from Mittelafrika while also granting more favourable arrangements for our government. Due to the economic troubles we are experiencing, allowing the Flemish-Walloons to invest in our nation would be hugely beneficial but would also increase their influence over the Congolese region. Turning them down however would be very costly as a very substantial part of our economy depends on the UMHK."
 wallonia_events.1323.a: "A bold but welcome suggestion!"
 wallonia_events.1323.b: "We don't sign agreements with non-entities."

 wallonia_events.1324.t: "Mittelafrika Accepts"
 wallonia_events.1324.d: "Mittelafrika seems to have agreed to our terms and have once more given UMHK free rein over the provinces of Congo. Our request to the harbour of Boma has however been refused for the time until we have accomplished our part of the bargain."
 wallonia_events.1324.a: "Very well!"

 wallonia_events.1325.t: "Mittelafrika Refuses!"
 wallonia_events.1325.d: "It appears that the brutish Mittelafrikan regime refused all of our demands and has even increased the taxes levied on our firms by another two percent. The UMHK is furious at their actions and has announced to our government that the Mittelafrikan colonial administration will pay for their vindictive actions."
 wallonia_events.1325.a: "Hopefully they don't act too drastically..."

 wallonia_events.1326.t: "Returns on Congo Investments"
 wallonia_events.1326.d: "After the expansion of the railroads connecting Boma and Katanga, the first shipments are entering the harbour of Antwerp. Due to our arrangements with the Flemish government, splitting the profits, most of the goods are reaching Liège. Copper, Uranium, Gold and much more are flowing through the Adelbert Canal ready for exporting into Europe."
 wallonia_events.1326.a: "Money is flowing in."

### Focuses ###
 WAL_Hold_On_To_The_Monarchy: "Сохранить монархию"
 WAL_Hold_On_To_The_Monarchy_desc: "Фламандцы могут выгнать нас, но правление Адальберта будет продолжаться на юге."
 WAL_Consolidate_Royal_Power: "Консолидация королевской власти"
 WAL_Consolidate_Royal_Power_desc: "В очередной раз было доказано, что только с помощью жестких действий можно держать население под контролем."
 WAL_Form_Royal_Guard: "Сформировать Королевскую гвардию"
 WAL_Form_Royal_Guard_desc: "Мы не можем продолжать зависеть от полевой жандармерии, нам нужна сильная и лояльная королевская гвардия."
 WAL_Strengthen_German_Ties: "Укрепление немецких связей"
 WAL_Strengthen_German_Ties_desc: "Хорошие отношения с Берлином жизненно важны для нашего правления, так как без них все может снова рухнуть."
 WAL_Appoint_Royal_Councillor: "Назначить королевского советника"
 WAL_Appoint_Royal_Councillor_desc: "Королевский советник является нашим прямым связующим звеном с парламентом, за которым он наблюдает и вмешивается от нашего имени. Хотя [GetSecondInCommand] хорошо служил нам в последние несколько лет, недавние восстания, возможно, привели к концу его карьеры."
 WAL_Adapt_The_Constitution: "Приспособить Конституцию"
 WAL_Adapt_The_Constitution_desc: "Политические системы нашей нации радикально изменились, и пересмотр старой конституции Фландрии-Валлона идет полным ходом."
 WAL_Give_Up_Our_Belgian_Claims: "Отказаться от бельгийских претензий"
 WAL_Give_Up_Our_Belgian_Claims_desc: "Мы больше не должны стремиться к завоеванию Фландрии. Мы сильнее сами по себе и без них можем лучше сосредоточиться на нуждах валлонского народа."
 WAL_Liberals_Strengthen_Control: "Либералы усиливают контроль"
 WAL_Liberals_Strengthen_Control_desc: "После победы на выборах и использования своей коалиции для маневрирования в идеальных позициях, они, наконец, смогут сосредоточиться на укреплении собственного контроля над общей картиной."
 WAL_Le_Chant_Des_Wallons: "Le Chant des Wallons"
 WAL_Le_Chant_Des_Wallons_desc: "Национализм усилился, нация укрепилась, и на каждом углу появляются новые возможности. Руководствуясь нашим государственным гимном и волей нашего народа, мы выйдем на горизонт!"
 WAL_Reaffirm_Belgian_Claims: "Подтвердить бельгийские требования"
 WAL_Reaffirm_Belgian_Claims_desc: "Фламандцы, может быть, и получили лучшее во время их революции, но лев зализывал свои раны под видом петуха. Скоро мы нанесем удар и вернем себе нашу законную землю."
 WAL_War_Games_On_The_Flemish_Border: "Военные действия на фламандской границе"
 WAL_War_Games_On_The_Flemish_Border_desc: "Фламандское вторжение неминуемо, и тщательное наблюдение и обучение войск вдоль границы поможет нам его предупредить."
 WAL_Lobby_Abroad: "Лоббирование за границей"
 WAL_Lobby_Abroad_desc: "После обретения независимости они смогли избежать нашего гнева под крылом Германии. Мы должны доказать Вильгельму, что мы способны удержать этот регион, и что его разделение наносит ущерб его великому виденью."
 WAL_Send_The_Ultimatum: "Отправить ультиматум"
 WAL_Send_The_Ultimatum_desc: "Пришло время войны. Фландрия поклонится петуху и присоединится к нашему союзу."

 WAL_Reform_Into_A_Republic: "Реформирование в Республику"
 WAL_Reform_Into_A_Republic_desc: "Монархия доказала свою несостоятельность и была заменена Валлонской Республикой."
 WAL_Elections: "Провести выборы"
 WAL_Elections_desc: "В условиях высокой напряженности в отношениях между БРП, ЛП и немецкими роялистами выборы должны быть проведены как можно скорее, чтобы вернуть стабильность нашей нации."
 WAL_Invite_The_Catholics: "Пригласить католиков"
 WAL_Invite_The_Catholics_desc: "Для обеспечения полного большинства в парламенте и консолидации нашей властной базы нам понадобится поддержка католиков на юге."
 WAL_Invite_The_Socialists: "Пригласить социалистов"
 WAL_Invite_The_Socialists_desc: "Мы должны расширить нашу коалицию для наших друзей в БРП, чтобы проложить путь к стабильному и процветающему обществу."
 WAL_Form_A_Government: "Сформировать правительство"
 WAL_Form_A_Government_desc: "Первый раунд переговоров оказался успешным, и теперь пришло время завершить формирование и объявить о новом валлонском правительстве."

 WAL_Syndicalist_Revolution: "Синдикалистическая революция"
 WAL_Syndicalist_Revolution_desc: "Синдикалистская революция наступила и пронизывает промышленные центры Sillon Industriel. Чтобы избежать кровопролития и насилия, нужна твердая рука."
 WAL_Peaceful_Transition: "Мирный переход"
 WAL_Peaceful_Transition_desc: "Единственный способ по-настоящему завоевать сердце рабочего класса - это справедливые и демократические выборы. С помощью прочной парламентской базы власти мы начнем реформирование и превращение Валлонии в наш социалистический идеал."
 WAL_A_BWP_President: "[BEL_HOS] БРП"
 WAL_A_BWP_President_desc: "Фернан Дехус провел партию через выборы и должен быть бесспорным лидером партии. Как первый валлонский президент, он будет направлять Валлонию в будущее."
 WAL_A_Syndicalist_Chairman: "Председатель-синдикалист"
 WAL_A_Syndicalist_Chairman_desc: "Фернан Дехусс стал мягким и отказался от всего, что поддерживала Синдикалистская революция. Его нужно будет заменить настоящим синдикалистом, чтобы революция могла продолжаться."
 WAL_Seize_Basic_Industry: "Национализировать основную промышленность"
 WAL_Seize_Basic_Industry_desc: "Сталелитейная и угольная промышленность является нашей важнейшей отраслью промышленности, но почти полностью контролируется валлонскими и немецкими капиталистами. Если мы возьмем под контроль эти важные отрасли, то сможем гарантировать, что рабочие будут поставлены выше прибыли."
 WAL_Found_National_Mining_Company: "Основать Национальную Горнодобывающую Компанию"
 WAL_Found_National_Mining_Company_desc: "Чтобы избежать промышленного коллапса в масштабах Черного Понедельника, нам необходимо создать государственную горнодобывающую компанию для контроля и субсидирования наших собственных угольных шахт, чтобы обеспечить работой наших людей."
 WAL_Expand_State_Education: "Расширение государственного образования"
 WAL_Expand_State_Education_desc: "Чтобы уменьшить влияние католиков, мы должны доказать, что государственное образование может быть таким же хорошим или даже лучше."
 WAL_Abolish_Catholic_Education: "Запретить католическое образование"
 WAL_Abolish_Catholic_Education_desc: "Через свою обширную систему образования католики контролируют ум и дух нашей молодежи. Церковь и образование должны быть полностью отделены друг от друга, и последние должны быть подконтрольны исключительно государству."
 WAL_Introduce_Voting_Rights_For_Women: "Введение женского права"
 WAL_Introduce_Voting_Rights_For_Women_desc: "Некоторые из наших избирателей начинают сомневаться, что БРП продолжит идти по революционному пути или же начнет дрейфовать в безмятежный статус-кво. Поэтому лидер партии объявил, что будет добиваться права голоса для всех граждан: мужчин и женщин."
 WAL_The_BWP_Retains_Control: "БРП сохраняет контроль"
 WAL_The_BWP_Retains_Control_desc: "После проведения большинства крупномасштабных реформ популярность БРП достигла новых высот, что позволило укрепить позиции перед предстоящими выборами."
 WAL_Disband_The_Parliamentary_System: "Расформировать парламентскую систему"
 WAL_Disband_The_Parliamentary_System_desc: "Стало ясно, что синдикалистская революция - это единственный путь для Валлонии, и поэтому БРП настаивает на полной отмене парламентской структуры, которая должна быть заменена синдикалистской системой, основанной на нашем французском соседе."
 WAL_Declare_The_Walloon_Commune: "Объявить Валлонскую коммуну"
 WAL_Declare_The_Walloon_Commune_desc: "Пришло время рабочим подняться и разорвать цепи. Валлонская коммуна будет объявлена началом новой эры!"
 WAL_Join_The_Internationale: "Присоединиться к Интернационалу"
 WAL_Join_The_Internationale_desc: "В условиях, когда связи между Валлонией и Германией полностью разорваны, нам нужна поддержка наших французских братьев и сестер по вере, чтобы обеспечить продолжение революции."

 WAL_Revolution_By_Force: "Революция силой"
 WAL_Revolution_By_Force_desc: "Очевидно, что рабочие должны быть избавлены от угнетения и объединены сильным лидером."
 WAL_Seize_Royal_Assets: "Конфисковать королевские активы"
 WAL_Seize_Royal_Assets_desc: "Королевское богатство всегда наполнялось нашей кровью. Правильно, что это имущество сразу же будет возвращено рабочему классу."
 WAL_Combat_Military_Disorder: "Борьба с военными беспорядками"
 WAL_Combat_Military_Disorder_desc: "В условиях, когда в армии вспыхивают крупные разногласия между немецкими роялистами и сторонниками демократии, для восстановления порядка необходимо провести широкомасштабную очистку от этих элементов противодействия."
 WAL_Fight_The_Establishement: "Борьба с элитой"
 WAL_Fight_The_Establishement_desc: "Правящий класс разбогател на нашей работе, и теперь ему придется расплачиваться за свою измену."
 WAL_Defeat_Loyalist_Remnants: "Разбить лоялисткие силы"
 WAL_Defeat_Loyalist_Remnants_desc: "Финансируемые валлонскими и немецкими капиталистами, ячейки сопротивления бывшей армии появились по всей стране, чтобы противостоять против Революции."
 WAL_Seize_German_Companies: "Конфисковать немецкие предприятия"
 WAL_Seize_German_Companies_desc: "Немецкие компании проникли в Sillon Industriel и использовали наше население для финансирования Германской империи. Хватит!"
 WAL_Unite_The_BWP: "Объединить БРП"
 WAL_Unite_The_BWP_desc: "БРП по-прежнему разделена из-за умеренных элементов в партии. Их нужно будет устранить или 'убедить' присоединиться к нашему делу."
 WAL_Hold_The_First_Party_Congress: "Провести первый партийный съезд"
 WAL_Hold_The_First_Party_Congress_desc: "Революция находится в полном расцвете сил, и для того, чтобы объявить о своих планах на ближайшие годы, руководство БРП объявило о проведении Первого съезда партии. Приглашены эксперты и видные деятели из Французской коммуны, Британского союза и Италии."

 WAL_The_Government_Has_Failed: "Правительство пало"
 WAL_The_Government_Has_Failed_desc: "Жалкое правительства было, наконец, свергнуто и заменено сильным и централизованным правительством, сплоченным вокруг Дегреля."
 WAL_Sideline_The_King: "Контроль парламента"
 WAL_Sideline_The_King_desc: "Власть парламента должна быть серьезно урезана, так как их постоянное вмешательство в дела правительства оказалось пагубным для нашей стабильности."
 WAL_Replace_The_Ambassador_To_Germany: "Заменить нашего посла в Германии"
 WAL_Replace_The_Ambassador_To_Germany_desc: "Для дальнейшего изложения наших изменений в политике, посол в Германии будет отозван и заменен близким другом Дегреля."
 WAL_The_Revolution_Has_Failed: "Революция потерпела неудачу"
 WAL_The_Revolution_Has_Failed_desc: "Синдикалистская революция была позорной уловкой, чтобы обмануть население, став рабами злого руководства БРП. Они должны быть счастливы, что мы 'освобождаем' их от их собственных амбиций."
 WAL_Imprison_Syndicalist_Leadership: "Заключить в тюрьму синдикалистов"
 WAL_Imprison_Syndicalist_Leadership_desc: "Мы не можем допустить, чтобы синдикалистские проповедники сплотили народ индустриального Силлона. Поэтому необходимо выследить и 'позаботиться' обо всех ведущих участниках синдикалистского сопротивления."
 WAL_Introduce_Corporatism: "Внедрить корпаративизм"
 WAL_Introduce_Corporatism_desc: "Стало ясно, что традиционный капитализм - это провал, который должен быть заменен лучшей экономической моделью."
 WAL_Military_Propaganda: "Военная пропаганда"
 WAL_Military_Propaganda_desc: "Слабая армия привела к нашему поражению в Вельткриге. Хватит! С возрожденным энтузиазмом и широкой пропагандистской кампанией наша армия станет гордостью нижних земель."
 WAL_Demand_Our_Rightfull_Land: "Потребовать наши исконные земли"
 WAL_Demand_Our_Rightfull_Land_desc: "Мы не согласимся на унижение, навязанное нам немцами и фламандцами. Вся Бельгия принадлежит Дегрелю!"

 WAL_Walloon_Expansion: "Валлонская экспансия"
 WAL_Walloon_Expansion_desc: "Земли Валлонии изобилуют неограниченным потенциалом. Пусть эта земля, наконец, будет использована для тех, кто на ней трудится. Мы должны разработать основу нового экономического плана, в рамках которого наша экономика сможет встать на ноги."
 WAL_The_Sillon_Industriel: "The Sillon Industriel"
 WAL_The_Sillon_Industriel_desc: "Sillon Industriel - промышленное сердце Валлонии, это не имеющее себе равных предприятие. Однако при администрации Фландрии-Валлона в регионе произошел ряд забастовок, которые нарушили производство и дестабилизировали обстановку в стране. Поэтому очень важно, чтобы мы успокоили население и промышленные центры региона, заручившись еще более значительной государственной поддержкой."
 WAL_Direction_of_the_Industry: "Направление промышленности"
 WAL_Direction_of_the_Industry_desc: "Валлония была бьющимся сердцем бельгийской промышленности. Нельзя отрицать, что судьба кузниц и фабрик тесно связана с судьбой всей нации. Наш промышленный статус должен быть всесторонне оценен, чтобы облегчить его расширение."
 WAL_Double_Down_On_Heavy_Industry: "Удвоить расходы на тяжелую промышленность"
 WAL_Double_Down_On_Heavy_Industry_desc: "В то время как наша экономика развивалась с течением времени, тяжёлая промышленность оставалась её основой. Мы должны и дальше индустриализировать нашу страну, предлагая щедрые стимулы для развития новых промышленных зон в средних городах страны."
 WAL_Redefine_Walloon_Expertise: "Переосмыслить валлонский опыт"
 WAL_Redefine_Walloon_Expertise_desc: "Валлония уже давно является одним из ведущих промышленных регионов Европы, и наши люди обладают навыками, необходимыми для такой экономики. Однако ветры перемен сильны, и мы должны адаптироваться. Для начала мы должны предложить увеличить финансирование передовому Научно-исследовательскому институту Солвэя."
 WAL_Future_Resource_Extraction: "Будущая добыча ресурсов"
 WAL_Future_Resource_Extraction_desc: "Природное богатство Валлонии имело решающее значение для ее индустриализации. Новые методы добычи позволяют более эффективно добывать как давно эксплуатируемые ресурсы, так и те, экономическая значимость которых еще только возрастает. Мы должны держать ухо востро и оказывать поддержку отраслям, занимающимся добычей ресурсов, в создании экспериментальных предприятий."
 WAL_Breakthrough_In_Engineering: "Прорыв в инженерии"
 WAL_Breakthrough_In_Engineering_desc: "Новые методы строительства и оптимизации зданий позволяют промышленности быть более производительными и при этом потреблять меньше ресурсов. Мы должны спонсировать перепланировку старых промышленных объектов, чтобы использовать преимущества этих современных инженерных технологий."
 WAL_Aviation_Industry: "Авиационная промышленность"
 WAL_Aviation_Industry_desc: "Наш народ не может рассчитывать на то, что даже самые близкие союзники будут поставлять достаточное количество самолетов во время войны. Чтобы наконец-то обрести душевное спокойствие, мы должны финансировать строительство новых государственных авиационных заводов."
 WAL_Build_Our_Own_Cyclotron: "Постройте собственный циклотрон"
 WAL_Build_Our_Own_Cyclotron_desc: "Циклотроны были основным средством, с помощью которого появилось множество новых открытий в области партикальной физики. Несмотря на дороговизну, при достаточном государственном финансировании, наша страна может создать свой собственный циклотрон."
 WAL_Expand_Seraing_Steel_Mills: "Расширение сталелитейных заводов"
 WAL_Expand_Seraing_Steel_Mills_desc: "Город Серен, хотя и не очень населенный и часто упускаемый из виду, стал важным центром промышленности, особенно производства стали. Мы должны предложить государственную поддержку сталелитейным заводам города и работать над тем, чтобы они стали предметом зависти для всего мира."
 WAL_Build_The_Liege_Charleroi_Highway: "Постройте шоссе Льеж-Шарлеруа"
 WAL_Build_The_Liege_Charleroi_Highway_desc: "Дорог между промышленными центрами Льежа и Шарлеруа крайне недостаточно. Мы должны построить между ними давно предлагаемую центральную автомагистраль."
 WAL_Fund_University_of_Liege: "Финансировать Льежский университет"
 WAL_Fund_University_of_Liege_desc: "Льеж был центром обучения еще со средневековья, и сегодня главный университет города является, пожалуй, самым престижным высшим учебным заведением в нашей стране. С дальнейшим финансированием и интеграцией вуза в нашу систему военных исследований и разработок, наша нация в целом может извлечь дополнительную выгоду."
 WAL_German_Investements: "Немецкие инвестиции"
 WAL_German_Investements_desc: "Связь нашего народа с Германией не только сохранилась, но и продолжает укрепляться. Безусловно, немецкие инвестиции являются ключом к обеспечению не только конца наших экономических трудностей, но и устойчивого роста в далеком будущем."
 WAL_Increase_German_Export: "Увеличить немецкий экспорт"
 WAL_Increase_German_Export_desc: "Учитывая нынешнюю политическую ситуацию, немецкие рынки как никогда важны для нашей национальной экономики. Мы должны работать с немцами над снижением взаимных барьеров в торговле и субсидировать предприятия, которые, в первую очередь, экспортируют товары в Германию."
 WAL_Krupp_Wallonia: "Валлония Круппа"
 WAL_Krupp_Wallonia_desc: "Опыт компании Крупп в производстве стали уже приносит пользу. Благодаря государственной поддержке, Крупп, несомненно, может привести нашу сталелитейную промышленность к золотому веку эффективности."
 WAL_Encourage_Frontaliers: "Поощрять Frontaliers"
 WAL_Encourage_Frontaliers_desc: "Многие наши люди работают за рубежом в странах Миттельевропы и отправляют денежные переводы домой. Это составляет значительную часть нашей национальной экономики, и хотя это в некоторой степени вредит нашим промышленным центрам из-за сокращения рынка труда, увеличение располагаемого дохода, которое эта реальность приносит, несомненно, экономически выгодно. Мы должны и дальше поощрять эту практику и вести переговоры с Германией о снижении ограничений на отдельных Frontaliers."
 WAL_Create_The_Industrial_Committee: "Создать Индустриальный комитет"
 WAL_Create_The_Industrial_Committee_desc: "Многие крупные промышленные предприятия страны активно конкурируют за малейшие экономические преимущества. Возможно, благодаря кооперации эти титаны промышленности могли бы стать еще больше. Мы должны создать исполнительный совет, в состав которого войдут представители наших крупнейших промышленных предприятий, который будет заниматься вопросами экономической политики и международной торговли."
 WAL_Exploitation_of_Charleroi_Glass_Industry: "Использовать стекольную промышленность Шарлеруа"
 WAL_Exploitation_of_Charleroi_Glass_Industry_desc: "Шарлеруа является одним из ведущих производителей стекла в мире. В то время как восстановить монополию, которая была у города во время ранней промышленной революции, практически невозможно, при поддержке государства город может вернуть себе доминирующее положение в производстве стекла."

 WAL_Tumult_In_The_Army: "Волнения в армии"
 WAL_Tumult_In_The_Army_desc: "Распад Фландрии-Валлонии оставил наше военное командование и организацию в беспорядке. Новый генеральный штаб должен быть поспешно создан, и ситуация должна быть решена любыми средствами."
 WAL_Form_Bilingual_Staff: "Сформировать двуязычный штат"
 WAL_Form_Bilingual_Staff_desc: "В то время как наследие немецкого военного контроля остается неизменным и таким образом, от этого языка нельзя полностью отказаться, мы можем начать вновь вводить французский язык в качестве основного языка обучения в военных академиях и способствовать двуязычию среди существующего генерального штаба."
 WAL_Retain_German_Staff: "Сохранить немецкий штат"
 WAL_Retain_German_Staff_desc: "Мы хотим бросить свой жребий с Германией, и нельзя отрицать военную компетентность немцев. Для того, чтобы военные операции проходили как можно более гладко, мы должны сохранить наш немецкий генерал-штаб с небольшими уступками франкоязычным офицерам."
 WAL_Trench_Warfare: "Окопная война"
 WAL_Trench_Warfare_desc: "Неисчислимое количество мужчин погибло в окопах Вельткрига. Однако такой стиль войны благоприятствует защитнику. Как небольшая нация, мы, скорее всего, будем в обороне и возможно, расширив тактику последней войны, наша нация сможет выдержать натиск войны с гигантами."
 WAL_Panzer_Doctrine: "Танковая доктрина"
 WAL_Panzer_Doctrine_desc: "Британские совместные боевые операции почти доказали заживление ранений Германской империи в Вельткриге. В отличие от многих глупых генералов, которые прятались бы в своих окопах, мы видим перспективу армии, построенной вокруг танков. Сейчас наступила эпоха бронированных войн."
 WAL_FRC: "Артиллерийский литейный завод"
 WAL_FRC_desc: "Fonderie Royale de Canons, как и знаменитый FN, базирующийся в Херстале, был основным производителем артиллерии для Бельгии и Фландрии-Валлонии. В связи с ростом потребности в артиллерии после обретения Валлонией независимости, производственные мощности фирмы должны быть расширены."
 WAL_Luxembourg_Field_Hospitals: "Полевые госпитали Люксембурга"
 WAL_Luxembourg_Field_Hospitals_desc: "Немецкое военное командование в Спа предложило финансировать грандиозное совместное расширение инфраструктуры полевых госпиталей в регионе Арденн, направленное через главный городской госпиталь в Намуре. Мы должны принять их предложение и приступить к работе по осуществлению плана."
 WAL_FN_Guns: "Оружейное производство"
 WAL_FN_Guns_desc: "Государственное предприятие FN, расположенное в Херстале, на протяжении десятилетий производит передовое огнестрельное оружие в больших количествах. Смута во времена Вельткрига, однако, оставила концерну недостаточно мощностей для удовлетворения потребностей страны и всего мира. Мы должны финансировать строительство совершенно нового завода FN."
 WAL_Light_Tank_Program: "Легкие танки"
 WAL_Light_Tank_Program_desc: "Танки с легкой броней легко изготавливается в больших количествах и способна перемещаться с большой скоростью. Чтобы максимизировать маневренность, мы должны разработать новые танки, которые, несмотря на небольшие размеры и легкую броню, могут выполнять сложные маневры с бешеной скоростью."
 WAL_Invest_in_Half_Tracks: "Инвестиции в полугусеничные автомобили"
 WAL_Invest_in_Half_Tracks_desc: "Полугусеничные автомобили эффективно работают как на дорогах, так и на пересеченной местности, позволяя нашей пехоте идти в ногу с бронетехникой и оказывать ей поддержку единым фронтом. Мы должны субсидировать заводы, которые производят такую технику."

 WAL_Project_Seagull: "Проект 'Чайка'"
 WAL_Project_Seagull_desc: "Благородный петух не очень хорош в море; с береговой линией теперь в нашей собственности, мы должны адаптироваться соответствующим образом. Мы должны научиться летать, как могущественные чайки делают это над величественными волнами, развивая свой собственный флот."
 WAL_Study_with_the_Kaiserliche_Marine: "Учеба с Кайзерлихмарине"
 WAL_Study_with_the_Kaiserliche_Marine_desc: "Поскольку мы поддерживаем прочные отношения с Германией, мы можем непосредственно изучить управление и доктрину крупнейших военно-морских сил на планете - 'Кайзерлих Марине'. Уроки, которые мы должны извлечь из такого предприятия, несомненно, будут замечательными!"
 WAL_Enlist_German_Officers: "Зачислить немецких офицеров"
 WAL_Enlist_German_Officers_desc: "Подтверждая нашу приверженность Германии, мы можем использовать огромные человеческие ресурсы и ноу-хау Императорского флота Германии. С помощью Германии и немецких офицеров в нашем штате, наш развивающийся военно-морской флот, несомненно, станет силой, на которую будут равняться."
 WAL_Establish_The_Merchant_Marine: "Создать торговый флот"
 WAL_Establish_The_Merchant_Marine_desc: "Хорошо сформированная национальная торговая флотилия имеет решающее значение для транспортировки товаров и услуг в военное время. Имея в своем распоряжении береговую линию, мы должны создать свой собственный флот."
 WAL_Maritime_Commerce: "Морская торговля"
 WAL_Maritime_Commerce_desc: "Море всегда было основным средством международной торговли. Недавно завоеванная береговая линия обеспечивает нам доступ к новым перспективным местам. Мы должны стимулировать морских торговцев к поиску новых рынков сбыта наших товаров, чтобы закрепить наше место на мировом рынке."
 WAL_Expand_Our_Drydocks: "Расширить сухие доки"
 WAL_Expand_Our_Drydocks_desc: "Расширение нашего военно-морского флота создало большую нагрузку на производственный потенциал существующей инфраструктуры, которой мы обладаем. Мы должны построить новые сухие доки и в конечном итоге удовлетворить наши национальные потребности."
 WAL_Commandeer_Trade_Vessels: "Commandeer Trade Vessels"
 WAL_Commandeer_Trade_Vessels_desc: "В то время как торговый флот эксплуатирует много больших судов, меньшие суда, организованные в самодельные конвейеры, могли бы выполнять аналогичную роль. В связи с нашей нынешней потребностью, мы должны реквизировать небольшие торговые суда и полностью передать их в ведение правительства."

 WAL_The_Flying_Rooster: "Летающий петух"
 WAL_The_Flying_Rooster_desc: "Многие ошибочно считают, что кооператив прикован к земле. Давайте расправим крылья, как гордый петух, создав поистине современные военно-воздушные силы."
 WAL_Spreads_His_Wings: "Расправить крылья"
 WAL_Spreads_His_Wings_desc: "Хотя некоторые могут утверждать, что военно-воздушные силы должны в первую очередь оказывать поддержку нашим силам на земле, мы знаем, что силы, которые не могут контролировать свое собственное небо, - это ничто. Важно, чтобы мы сосредоточились на разработке новых моделей истребителей для обеспечения господства в воздухе."
 WAL_Dives_Down: "Посмотреть вниз"
 WAL_Dives_Down_desc: "Контроль над воздухом, конечно, важен, но полностью сосредоточиться на этом - глупо. Войны в конечном итоге выигрываются и проигрываются на земле. Мы должны разработать самолеты, способные должным образом поддерживать войска."
 WAL_Air_Defence_of_the_Territory: "Система ПВО"
 WAL_Air_Defence_of_the_Territory_desc: "Независимо от того, насколько искусны наши пилоты или многочисленные самолеты, некоторые враги могут ускользнуть от них. Мы должны иметь сеть противовоздушных пунктов по всей стране."
 WAL_Invest_in_RADAR: "Инвестиции в РАДАР"
 WAL_Invest_in_RADAR_desc: "РАДАР получил широкое применение при обнаружении вражеских самолетов. Чтобы иметь возможность обнаруживать врагов в постоянно меняющихся условиях современной войны, мы должны быть на передовом рубеже технологии РАДАР."
 WAL_Fighter_Supremacy: "Превосходство истребителей"
 WAL_Fighter_Supremacy_desc: "Для того чтобы обеспечить себе господство над собственным небом, мы должны удвоить свои усилия и предпринять еще одну попытку по разработке истребителей."
 WAL_Bomber_Supremacy: "Превосходство бомбардировщиков"
 WAL_Bomber_Supremacy_desc: "Бомбардировщики могут ослабить способность противника эффективно бороться. С новыми и улучшенными бомбардировщиками и эффективной наземной поддержкой наши люди на земле будут непобедимы."
