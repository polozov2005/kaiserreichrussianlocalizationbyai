 #劉伯承
 SZC_liu_bocheng: "Лю Бочэн"
 SZC_liu_bocheng_high_command_desc: "§YРодился:§! §L4 декабря 1892 года в уезде Кайсянь, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §SPAC§!\n§YБиография:§! §LРаботая на ферме в подростковом возрасте из-за смерти отца, Лю поступил в Офицерское училище Сычуаньского военного правительства в 1912 году. После выпуска он служил под началом Сюн Кэу. Лю принял участие во «Второй революции» 1913 года против Юань Шикая, когда Сюн объявил о своей оппозиции Пекину. Однако Юань вышел победителем, и Лю отправился в изгнание в Шанхай. Там Лю вступил в Революционную партию Сунь Ятсена, предшественницу Гоминьдана.\n\nЛю вернулся в Сычуань, чтобы организовать Армию национальной защиты, когда Цай Э выступил против имперских амбиций Юань Шикая в 1915 году. Во время войны в 1916 году Лю получил два пулевых ранения в голову, в результате чего ослеп на правый глаз. В 1924 году Лю сражался против сил клики Чжили под командованием У Пэйфу и выиграл битву при Лунцюаньи. Именно в 1924 году Лю попал под влияние идей марксизма и целей Национальной революции. В 1926 году Лю официально вступил в Гоминьдан.\n\nХотя Лю поддерживал Национальное правительство Гуанчжоу в его попытке взять Ухань, не давая местным сычуаньским милитаристам помочь У Пэйфу, Гоминьдан не только не смог взять Ухань, но и полностью распался. Внезапная изоляция Лю от его союзников привела к тому, что другие сычуаньские милитаристы вытеснили Лю на окраины Сычуани, где он скрывается по сей день. Лю надеется, что однажды Гоминьдан вернется на материк, и крестьяне будут свободны от реакционного гнета.§!"

 #張瀾
 SZC_zhang_lan: "Чжан Лань"
 SZC_zhang_lan_bio: "Сын ученого и школьного учителя, Чжан Лань с юных лет учился у своего отца, сам став ученым в 1894 году и поступив в академию Цзуньцзин в Чэнду в 1902 году. Отобранный для учебы в Японии в 1903 году, он поступил в Токийскую академию Хунвэнь, вернувшись в Китай после антицысийских высказываний. Занимая различные преподавательские должности, он был избран в Сычуаньский консультативный совет в 1909 году, но отказался принять должность, предпочтя служить в реформистском конституционном движении в последние годы правления Цин.\n\nУчаствуя в Движении в защиту железных дорог Сычуани, он погрузился в синьхайские события в Сычуани, прежде чем был избран членом Ассамблеи в 1913 году. В 1915 году он принял участие в Войне в защиту республики, а в 1917 году стал губернатором Сычуани от Пекина; бежал из Чэнду с Лю Цуньхоу в 1918 году, а затем вернулся в Пекин. В 1919 году он поддержал Движение за новую культуру и помогал отправлять молодых студентов в радикальную интеллектуальную среду Европы.\n\nВ 1920 году он вернулся в Наньчун, посвятив себя образованию, а в 1925 году даже стал президентом Чэндуского университета. Отстаивая свободу мысли и академическую свободу, он способствовал деятельности различных местных революционных групп под своим покровительством. Уйдя в отставку в 1932 году из-за подавления Чжили Шанхайского восстания, он вернулся в Наньчун, чтобы заниматься вопросами образования. Участвуя в создании ФКДП (Федерации китайских демократических партий) в том же году, Чжан заслужил огромное уважение за свою преданность демократии и роль посредника."
 SZC_zhang_lan_leader_desc: "§YРодился:§! §L2 апреля 1872 года в уезде Наньчун, провинция Сычуань, Великая Цин§!\n§YБиография:§!§L$SZC_zhang_lan_bio$§!"
 SZC_zhang_lan_advisor_desc: "§YРодился:§! §L2 апреля 1872 года в уезде Наньчун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §SNCRA§!\n§YБиография:§! §L$SZC_zhang_lan_bio$§!"

 #鮮英
 SZC_xian_ying: "Сянь Ин"
 SZC_xian_ying_sic_desc: "§YРодился:§! §L1885 год, уезд Сичун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §SNCRA§!\n§YБиография:§! §LРодившийся в бедности, Сянь Ин нуждался в поддержке родственников, чтобы посещать начальную частную школу. Будучи молодым учеником Чжан Ланя, Сянь стал его особым протеже — как ученик наставника и как друг. В 1908 году Сянь Ин поступил в Сычуаньскую ускоренную школу, вступив в армию. Одновременно он присоединился к Тунмэнхою и быстро подружился с Хэ Гогуаном, Пан Вэньхуа, Ян Сэнем и Лю Сяном.\n\nСледуя за Чжан Ланем по Сычуани и в Палату представителей в Пекине, Сянь ушел в отставку вместе со своим наставником в 1914 году и поступил в Армейский университет для вида. Отправившись на юг, чтобы присоединиться к Движению в защиту республики, он оставался близок с Чжаном, запустив от его имени газету, поддерживающую Ноябрьские бунты и заигрывающую с социалистическими идеями. В 1921 году Сянь принял участие в стычках сычуаньских милитаристов, оказывая значительную помощь Лю Сяну.\n\nСначала заигрывая с промышленностью с 1920-х годов, страсть Сяня к военной службе сменилась промышленными стремлениями. Используя свои связи с Чжан Ланем, он путешествовал по стране как по делам, так и для встреч с единомышленниками, такими как Лян Шумин и Янь Янчу. Служа под началом Хэ Гогуана в 1935 году, Сянь был генеральным инспектором Наньчуна, но из-за скандала со своим секретарем Гу Синхуа, Сянь был вынужден покинуть свой пост, став управляющим средней школы Цзяньхуа Чжан Ланя в Наньчуне. Тесно связанный со своим наставником, Сянь постепенно стал сторонником политики «Третьей силы» китайской демократии.§!"

 #车耀先
 SZC_che_yaoxian: "Чэ Яосянь"
 SZC_che_yaoxian_high_command_desc: "§YРодился:§! §L27 сентября 1894 года в уезде Даи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §SNCRA§!\n§YБиография:§! §LПроведя раннюю жизнь в нищете, Чэ Яосянь поступил в частную школу в возрасте пяти лет, хотя после семейной тяжбы был вынужден бросить учебу. Продавая продукты, чтобы поддержать семью, он стал учеником торговца в 1908 году и начал проявлять пожизненный интерес к чтению; к 1911 году, в 17 лет, он стал бухгалтером. В 1912 году молодой Чэ вступил в армию, служа в Сычуаньской армии, и к 1918 году стал командиром роты, дослужившись до командира полка в армии Лю Сяна.\n\nБудучи представителем в Гоминьдане, Чэ пытался склонить Лю Сяна к переходу на их сторону, но после того как Лю отверг его усилия, Чэ уволился из армии и отправился в Японию на учебу. После поражения Гоминьдана Чэ возложил свои надежды на различные другие левые движения в стране; наиболее важным из которых был Левый ФКДП. В 1928 году Чэ вернулся в Чэнду и впоследствии тайно вступил в Гоминьдан. Используя свои связи, он присоединился к армии Лю Вэньхуэя.\n\nСплотив местные христианские группы в Чэнду для поддержки повстанцев Восточной Сычуани, Чэ инициировал создание множества патриотических христианских социалистических организаций в Чэнду, а после Шанхайского восстания осудил правительство Ян Сэня и Пекин. Едва не арестованный Сян Чуаньи, Чэ сотрудничал с Лэн Иньдуном и впоследствии служил в Баодинских армиях Лю Вэньхуэя и Дэн Сихоу. Продолжая поддерживать контакты с местными оппозиционными группами, Чэ проявляет особый интерес к усилиям Чжан Ланя в бассейне.§!"

 SZC_zhou_taixuan: "Чжоу Тайсюань"
 SZC_zhou_taixuan_advisor_desc: "§YРодился:§! §L14 февраля 1895 года в уезде Синьду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §SNCRA§!\n§YБиография:§! §LПолучив стандартное образование, Чжоу окончил среднюю школу в 1911 году, а в 1913 году последовал за Вэй Сылуанем, Ху Сюанем и другими на факультет политической экономии Китайской общественной школы. После окончания в 1916 году Чжоу работал переводчиком в шанхайской «Миньсинь дэйли», а позже в пекинских «Цзинхуа дэйли» и «Чжунхуа синьбао», а также в новостном агентстве «Чжунхуа».\n\nВ 1918 году он привел Ван Гуанци в «Цзинхуа дэйли» и через Вана познакомился с Ли Дачжао. Быстро сблизившись, Чжоу и Ли решили создать «Общество Младого Китая» в 1919 году с помощью Вана. Отплыв во Францию, он поступил в Университет Монпелье и создал Парижское новостное агентство, чтобы информировать Китай о событиях во Франции.\n\nПолучив степень магистра в области образования, Чжоу поступил в Парижский университет в 1924 году, оставаясь во Франции с 1924 по 1928 год. В 1930 году он отказался остаться в университете и вернулся в Китай по приглашению Чжан Ланя, работая в учебных заведениях Чжан Ланя в Сычуани. Сообщается, что совсем недавно, в 1936 году, Чжоу написал серию статей, критикующих капиталистический порядок в Европе, и является одним из основателей «Общества Нового Века».§!"

 #劉泗英
 SZC_liu_siying: "Лю Сыин"
 SZC_liu_siying_advisor_desc: "§YРодился:§! §L24 февраля 1895 года в Наньчуане, Чунцин, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §nYCP§!\n§YБиография:§! §LРодившийся в последнее десятилетие XIX века, Лю Сыин, как и многие его соотечественники, воспринял скрытое течение национализма того времени. Стремясь получить современное образование, Лю посещал Университет Хосэй в Японии. После окончания учебы он нашел работу в Шанхае редактором «Шанхай Цзиго Таймс». В 20-е годы Лю вступил в недавно созданную Младокитайскую партию (YCP) и сыграл решающую роль в ее деятельности. По приказу руководства партии Лю вернулся в Сычуань, чтобы работать секретарем у чжилийского милитариста Ян Сэня.\n\nЧерез Яна Лю смог наладить рабочие отношения с У Пэйфу, который искал поддержки современной массовой партии, чтобы противостоять Гоминьдану во время Северного похода. Благодаря Лю лидер партии Цзэн Ци смог значительно расширить свое влияние на севере Китая. Под руководством Ли Хуана, местного лидера YCP в Сычуани, Лю работал над распространением идей партии по всей Сычуани как через свои военные контакты, так и через свою должность в Юго-Западной общественной школе Чэнду. Благодаря его усилиям по работе с местной знатью для поддержки больных беженцев, YCP пользуется широкой поддержкой на всех уровнях сычуаньского общества.§!\n\n§YПримечания: Хотя Лю является близким союзником клики Чжили, он служит прежде всего интересам YCP, чтобы осуществить долгожданную Плебисцитарную революцию в Китае.§!"

 #熊克武
 SZC_xiong_kewu: "Сюн Кэу"
 SZC_xiong_kewu_bio: "Родившийся в семье врачей, Сюн Кэу с юных лет питал любовь к учебе. Его заинтриговали идеи демократии и модернизма, представленные Западом, и он сокрушался, что Китай серьезно отстал от остального мира. В 1903 году он посещал Сычуаньский зал восточной литературы, а позже познакомился с такими революционерами, как Дай Цзитао. Заручившись поддержкой своего дяди, Сюн отправился учиться в Японию, где встретил Сунь Ятсена и позже вступил в Тунмэнхой Суня. После Синьхайской революции Сюн служил командующим военным правительством Дахань в Сычуани до 1913 года. Юань Шикай и Бэйянское правительство изгнали силы Суня из Китая, и Сюн был вынужден бежать в Японию в изгнание.\n\nОднако поражение не удержало Сюна от мечты о свободном Китае. В Японии и Юго-Восточной Азии он собирал средства для революции и вернулся в Китай, чтобы присоединиться к Цай Э в победоносной Войне в защиту республики против Юаня. Несмотря на то, что они были товарищами в Войне в защиту республики, Сюн выступил против своего бывшего союзника Люй Чао в 1920 году и успешно изгнал его из провинции с помощью милитариста Лю Цуньхоу. В том же году он издал твердую декларацию о том, что народ Сычуани больше не будет играть вторую скрипку перед Бэйянским и Гуанчжоуским правительствами, возникшими в хаосе Эры милитаристов. Это длилось недолго, так как Сычуань погрузилась в гражданскую войну, а Лю Цуньхоу объединил силы с Бэйянским правительством, и Сюн снова был вынужден бежать в изгнание. Затем он бежал в Гуандун, вступив в Китайский Гоминьдан, и участвовал в его первом съезде в 1924 году.\n\nКраткое пребывание Сюна в Гоминьдане закончилось в 1925 году, когда он был предан Ван Цзинвэем и Чан Кайши по обвинению в сговоре с лидером китайских федералистов Чэнь Цзюнмином. После провала Северного похода и распада Гоминьдана Сюн вернулся домой в Сычуань, разочарованный политической жизнью. И все же его страсть к республиканским идеалам никогда не угасала, и хотя он не забыл предательства Гоминьдана, он прислушивается к китайским федералистам в Гуандуне."
 SZC_xiong_kewu_leader_desc: "§YРодился:§! §L26 декабря 1885 года в уезде Цзинъянь, провинция Сычуань, Великая Цин§!\n§YБиография:§! §L$SZC_xiong_kewu_bio$\n\nБлагодаря успеху в недавней гражданской войне в Сычуани, Сюн гарантирует, что Сычуань превратится в неприступную крепость республиканизма, которая поможет положить конец годам авторитаризма в Пекине.§!"
 SZC_xiong_kewu_sic_desc: "§YРодился:§! §L26 декабря 1885 года в уезде Цзинъянь, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §L$SZC_xiong_kewu_bio$§!"

 #但懋辛
 SZC_dan_maoxin: "Дань Маосинь"
 SZC_dan_maoxin_bio: "Решив посвятить свою жизнь погоне за революцией и истиной, Дань Маосинь вступил в Тунмэнхой в 1905 году по настоянию Сунь Ятсена и Хуан Сина во время учебы в Японии. Вернувшись в Китай в 1906 году, Дань служил начальником пропаганды и офицером связи, одновременно создав государственную школу в Шанхае для распространения демократических идеалов. Схваченный за свои действия во время Второго восстания в Гуанчжоу, но освобожденный, Дань вернулся в Сычуань и занимал провинциальный пост, прежде чем уйти в отставку из-за автократического правления губернатора Сычуани Ху Цзинъи.\n\nИменно в Чунцине Дань стал начальником штаба Сюна; опыт многочисленных революций закалил его решимость и убедил в необходимости революционного единства. Как таковой, Дань также был одним из немногих, кто жадно стремился работать с Юньнанью и Гуйчжоу, ссылаясь на их общее уважение к южным республиканским идеалам. Независимо от политики, Дань преданно командовал войсками против сторонников Чжили в Сычуани, таких как Ян Сэнь и Лю Цуньхоу, даже когда ситуация постепенно оборачивалась против федералистов.\n\nВ Тунжэне Дань остается заместителем Сюна и видным голосом единства в движении, открытым для сотрудничества между союзными демократическими движениями и провинциями."
 SZC_dan_maoxin_leader_desc: "Решив посвятить свою жизнь погоне за революцией и истиной, Дань Маосинь вступил в Тунмэнхой в 1905 году по настоянию Сунь Ятсена и Хуан Сина во время учебы в Японии. Вернувшись в Китай в 1906 году, Дань служил начальником пропаганды и офицером связи, одновременно создав государственную школу в Шанхае для распространения демократических идеалов. Схваченный за свои действия во время Второго восстания в Гуанчжоу, но освобожденный, Дань вернулся в Сычуань и занимал провинциальный пост, прежде чем уйти в отставку из-за автократического правления губернатора Сычуани Ху Цзинъи.\n\nИменно в Чунцине Дань стал начальником штаба Сюна; опыт многочисленных революций закалил его решимость и убедил в необходимости революционного единства. Как таковой, Дань также был одним из немногих, кто жадно стремился работать с Юньнанью и Гуйчжоу, ссылаясь на их общее уважение к южным республиканским идеалам. Независимо от политики, Дань преданно командовал войсками против сторонников Чжили в Сычуани, таких как Ян Сэнь и Лю Цуньхоу, даже когда ситуация постепенно оборачивалась против федералистов.\n\nТеперь, став президентом благодаря своей службе в военное время и тесным связям со всеми сторонами, Дань неустанно работает над тем, чтобы обеспечить антипартийное демократическое федералистское правление любой ценой."
 SZC_dan_maoxin_sic_desc: "§YРодился:§! §L1884 год, уезд Жун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §L$SZC_dan_maoxin_bio$§!\n\n§YПримечания: Как и многие его товарищи, Дань Маосинь известен своими учеными корнями, будучи искусным в поэзии и каллиграфии, а также знакомым с «Книгой Перемен» и другими конфуцианскими классиками.§!"

 #喻培棣
 SZC_yu_peidi: "Юй Пэйди"
 SZC_yu_peidi_commander_desc: "§YРодился:§! §L1889 год, уезд Цзычжун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LОтправившись в Японию учиться вместе со своим братом Юй Пэйлунем в 1905 году, Юй Пэйди учился в военной школе в Иокогаме, прежде чем вернуться в Китай в 1908 году, чтобы попытаться присоединиться к восстанию в Хэкоу, хотя узнал о его провале до того, как вернулся в Китай. Путешествуя по Китаю некоторое время, Юй провел следующие несколько лет, дрейфуя между Японией и Гуанчжоу, прежде чем услышать о мученической смерти своего брата во Втором восстании в Гуанчжоу.\n\nВернувшись в свой родной город Нэйцзян после этой трагедии, Юй принял активное участие в Движении в защиту железных дорог и формировании последующих республиканских правительств в Сычуани, присоединившись в процессе к рядам Сюн Кэу. Юй продолжал демонстрировать свои командные способности во время службы подчиненным у Дань Маосиня, следуя за «Полком девяти» в Гуанчжоу после их изгнания из Сычуани, даже когда младшие офицеры и простые солдаты возвращались в свои дома. Услышав о задержании Сюн Кэу и лишении его военного командования Гоминьданом, Юй провел промежуточные годы в Нэйцзяне, время от времени совершая поездки в Японию и Посольские города. Теперь, присоединившись к восстановленным дивизиям Сюна в Тунжэне, Юй остается надежным, хотя и немного неопытным командиром, близким доверенным лицом Сюна и видным связным с местной интеллигенцией.§!\n\n§YПримечания: За последние несколько лет Юй много раз ездил в Японию и Москву вместе с Сюн Кэу, чтобы встретиться с Ху Ханьминем, оставаясь хорошим личным другом государственного деятеля.§!"

 #余際唐
 SZC_yu_jitang: "Юй Цзитан"
 SZC_yu_jitang_commander_desc: "§YРодился:§! §L6 декабря 1888 года в Жунчане, Чунцин, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LОбучаясь в частной школе в своей деревне, прежде чем поступить в Чунцинскую академию Восточной Сычуани, Юй Цзитан был увлеченным учеником. Движимый желанием спасти Китай от его смут, Юй отправился за границу в Японию за свой счет, чтобы учиться в военных академиях, окончив Инженерное, Артиллерийское и Минно-торпедное училища.\n\nВернувшись в Китай, чтобы присоединиться к Второй революции в 1913 году, Юй был назначен командующим молодым речным флотом Сычуани, сражаясь вместе с армией Сюн Кэу, но бежал в Японию, когда операция провалилась. Юй воссоединился с Сюн Кэу во время Войны в защиту республики 1915 года, служа генерал-квартирмейстером Цай Э. За доблесть, проявленную в боях против армий Юньнани и Гуйчжоу, он был назначен командиром Шестой дивизии Сычуаньской армии. Вовлеченный в дальнейший конфликт с сычуаньскими милитаристами по мере развития 1920-х годов, Юй стал лидером одной из лучших дивизий «Армии подавления бандитов» Сюна, бежав на юг с Сюном, когда его силы были разбиты.\n\nЮй также был одним из немногих, кого задержали вместе с Сюном в крепости Хумэнь, акт предательства, который помнят по сей день. После освобождения Юй провел короткий период в Посольских городах, прежде чем снова присоединиться к Сюну в Тунжэне, где Юй отличился как один из самых квалифицированных генералов Сюна и главный сторонник «промышленного возрождения», финансируя металлургические и угольные предприятия на окраинах города.§!"

 #趙渭濱
 SZC_zhao_weibin: "Чжао Вэйбинь"
 SZC_zhao_weibin_high_command_desc: "§YРодился:§! §L1893 год, Чэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§!§LПолучив образование у Ли Пэйфу, известного ученого-реформиста в Чэнду, Чжао Вэйбинь с самого начала встал на путь антиимпериализма и патриотизма. После Синьхайской революции Чжао решительно участвовал в программе военизации студентов Сычуаньского правительства Великого Хань и перевелся в Офицерское училище Сычуаньской армии в 1912 году.\n\nВ 1914 году, после выпуска, он служил штабным офицером в 1-й дивизии сил Сюн Кэу. В 1924 году он последовал за Сюном, чтобы сражаться против Чжили, и после назначения Сюна в вооруженные силы Гоминьдана сменил различные штабные должности в разных сычуаньских вооруженных силах. В конечном итоге обосновавшись с Сюном в его партизанской кампании на границе Сычуань-Гуйчжоу-Хунань, Чжао является яростным штабным офицером с неустанной смелостью и рвением.§!\n\n§YПримечания: В свободное время он посвящает большую часть своей жизни литературным занятиям, собрав большую коллекцию личных книг: от «Собрания Юэ Чжунъу-вана» до работ Ли Дачжао, Лу Синя, Чэнь Дусю и даже Маркса.§!"

 #蕭毅肅
 SZC_xiao_yisu: "Сяо Ису"
 SZC_xiao_yisu_army_chief_desc: "§YРодился:§! §L11 декабря 1899 года в уезде Пэнъань, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LИсключенный из школы в юном возрасте за участие в революционной деятельности, Сяо Ису учился в престижной Юньнаньской военной академии при финансовой помощи своей тети. Изначально не имея каких-либо сильных политических убеждений, Сяо служил в рядах армии Ян Сэня командиром батальона, прежде чем перебежать к генералу Тан Цзымо, человеку, более связанному с сычуаньским Гоминьданом.\n\nПосле неожиданной смерти Тана в партийной чистке, организованной Чан Кайши в 1925 году, Сяо был освобожден от должности и немного разочаровался в Гоминьдане, найдя работу в рядах армии Го Жудуна. Здесь Сяо провел вторую половину 1920-х годов, командуя войсками под началом Го, оставаясь при этом восприимчивым к более республиканским идеалам. Страдая от более произвольного командования Го и будучи уволенным в 1932 году, Сяо стал апатичным, проводя время в Посольских городах. Его второе дыхание пришло позже в том же году, когда Шанхайское восстание заставило многих республиканских рупоров Китая бежать на Запад из страха быть убитыми или подавленными в Лиге. Сяо бежал в Хунань, не желая быть пойманным в хаосе, связался там с различными интеллектуалами и присоединился к Сюн Кэу, когда услышал, что его военный опыт может снова принести пользу. В офицерском корпусе Сюна он сделал себе имя, будучи трудолюбивым и усердно изучая армейское командование, подавая надежды в многочисленных битвах, которые ждут дело федералистов.§!"

 #卞稚珊
 SZC_bian_zhishan: "Бянь Чжишань"
 SZC_bian_zhishan_high_command_desc: "§YРодился:§! §L1899 год, Чунцин, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LИзначально предназначенный для карьеры в науке и искусстве, рекомендованный другом своего отца Ян Шуканем для учебы в Нанкинской академии Чжунъи, а затем за границей, Бянь вместо этого поступил в Баодинское офицерское училище. Окончив его в 1920 году, он вступил в армию Сюн Кэу заместителем командира полка, прежде чем получить повышение. Командуя войсками под началом Сюна, Бянь сражался с убеждением на протяжении 1920-х годов, даже следуя за Сюном в Хунань, а затем в Гуандун, командуя в это время небольшим кадровым офицерским училищем.\n\nПосле задержания Сюн Кэу в крепости Хумэнь Гоминьданом в 1925 году, Бянь был освобожден от должности и стал начальником пехотного отдела в Военной академии Чжу Пэйдэ, филиале Вампу. Связанный с комитетом по делам школы Вампу до помилования Сюна Ху Ханьминем, Бянь воссоединился со своим бывшим начальником в качестве генерал-адъютанта военной полиции Сюна. Относительно молодой генерал в деле федералистов Сычуани, Бянь полностью открыт для сотрудничества с другими республиканскими движениями и даже более радикальными элементами как Гоминьдана, так и КСП. За время, проведенное в Тунжэне, Бянь также стал опытным в руководстве и сборе гражданского ополчения и милиции в дополнение к своей регулярной пехоте, что оказывается полезным в искоренении бандитов и навигации на изменчивых полях сражений Сычуани.§!\n\n§YПримечания: Помимо своих обычных обязанностей, Бянь также действовал как связной Сюна и начальник как корпуса охраны безопасности, так и гражданского трудового отряда в Тунжэне.§!"

 #李蔚如
 SZC_li_weiru: "Ли Вэйжу"
 SZC_li_weiru_high_command_desc: "§YРодился:§! §L1883 год, Фулин, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LОбучаясь в Японии в 1904 году, Ли Вэйжу вступил в Тунмэнхой в 1906 году, получив задание от Сунь Ятсена вернуться в Сычуань в 1907 году, чтобы помочь усилиям Тунмэнхоя там. В сговоре с Сюн Кэу, Гао Яхэном и другими, он помогал в развитии революционных ячеек и в начальной синьхайской революции солидарности в Сычуани. В период, охватывающий более десяти лет с 1911 по 1923 год, он служил заместителем командующего Фулинским военным правительством, начальником штаба армии Шу, начальником штаба губернатора и директором Сычуаньской военной академии.\n\nВ 1924 году он уволился из армии, вернувшись к сельскому хозяйству. В 1927 году Ли служил на различных местных должностях, собирая средства для создания прогрессивных школ. Поддерживая тесный контакт с Лю Бочэном и другими, Ли в конечном итоге увлекся концепциями социализма, предписанными Левым Гоминьданом. Создав крестьянскую армию с 1926 года, Ли бросился в политическую борьбу Сычуани, сражаясь с такими людьми, как Лю Сян.\n\nЧудом избежав смерти, Ли сотрудничал с Лю и в конечном итоге с прогрессивным «Полком девяти» Сюн Кэу, чтобы вести партизанскую кампанию против Бэйянских милитаристов, оккупирующих Сычуань. Завоевав сердца и умы крестьянства, Ли оказался жизненно важным спасательным кругом для продолжающегося успеха партизан.§!"

 #劉光烈
 SZC_liu_guanglie: "Лю Гуанле"
 SZC_liu_guanglie_advisor_desc: "§YРодился:§! §L1889 год, Жэньшоу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LУчаствуя в Синьхайской революции в Китае, Лю Гуанле служил директором провинциального правительства Сычуани и представителем Юга на мирных переговорах Севера и Юга 1919 года. Позже Лю служил в различных должностях комиссара Наньчуна и Мяньяна, прежде чем изучать буддизм в Японии в 1924 году.\n\nВернувшись при поддержке других буддистов, Лю основал Институт тибетского языка при храме Цыинь в Пекине, пригласив Дордже Джуэба Геше быть инструктором по обучению тибетскому языку и тибетскому буддизму.\n\nВернувшись в свою родную провинцию после Шанхайского восстания 1932 года, Лю негласно связал себя с усилиями прогрессивного сопротивления Сюн Кэу и его «Полка девяти», работая в ограниченном объеме как сочувствующий местный чиновник.§!"

 #石體元
 SZC_shi_tiyuan: "Ши Тиюань"
 SZC_shi_tiyuan_advisor_desc: "§YРодился:§! §L1890 год, уезд Сюаньхань, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LУмный с юности, Ши Тиюань преуспел в учебе, став ученым в 14 лет. В 1911 году он окончил Сычуаньскую высшую полицейскую школу и в том же году принял участие в Движении в защиту железных дорог Сычуани. Начав антицинское восстание, он создал местное уездное военное правительство и стал членом нового революционного Временного провинциального правительства в 1912 году.\n\nВ 1914 году он стал учителем китайского языка в местной школе, прежде чем стать главным директором Чунцинской солевозной компании и президентом «Чунцин Коммершиал Дэйли». С 1916 года он служил в Армии защиты нации штабным офицером на различных должностях, прежде чем вернуться к своей преподавательской работе в 1918 году. В 1922 году он служил секретарем у Дэн Сихоу, генеральным секретарем и главным администратором гарнизона Чунцина, а также работал в провинциальном финансовом департаменте.\n\nВ 1927 году Ши стал генеральным секретарем 3-й дивизии Ян Сэня, а с 1928 года был секретарем Пан Вэньхуа, а затем Чунцинского муниципального правительства, Бюро образования и Бюро общественной безопасности. В 1932 году он стал директором Чунцинского управления товарной инспекции, а в 1933 году был генеральным менеджером «Чунцин Электрик Пауэр». С 1934 года по настоящее время Ши служит мэром Чунцина, работая над продвижением различных прогрессивных реформ в растущем городе.§!"

 #胡子昂
 SZC_hu_ziang: "Ху Цзыан"
 SZC_hu_ziang_advisor_desc: "§YРодился:§! §LМарт 1897 года, уезд Ба, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LВо время учебы в средней школе уезда Ба молодая академическая жизнь Ху Цзыана была взбудоражена Синьхайской революцией, вспыхнувшей по всему Китаю. Активно участвуя будучи молодым студентом, он позже поступил в Пекинский сельскохозяйственный колледж в 1919 году и поддерживал свою революционную жилку, участвуя в Ноябрьских бунтах. После окончания учебы в 1923 году он вернулся в Чунцин, чтобы служить учителем и директором в своей старой средней школе, президентом уездной Ассоциации фермеров и директором Бюро образования Чунцина.\n\nВступив в армию в 1926 году, он служил в армии Лю Вэньхуэя, прежде чем стать директором Управления по делам границ Сычуаньского надзорного офиса пограничной обороны в Чэнду. Помогая в развитии ферм и банков, наряду с запретом опиума и снижением налогов, он ненадолго подрабатывал в Цзянси в качестве члена Сельскохозяйственного колледжа, прежде чем вернуться в Чунцин в 1933 году.\n\nСтав соучредителем Чунцинской промышленной компании Хуаси, он курировал различные промышленные начинания по всей Сычуани, став своего рода известным промышленным магнатом в Сычуани. Сочувствуя делу ФКДП, Ху поддерживает контакты с членами CDNCA Хуан Яньпэя.§!"

 #熊哲帆
 SZC_xiong_zhefan: "Сюн Чжэфань"
 SZC_xiong_zhefan_advisor_desc: "§YРодился:§! §L1894 год, Яньцзинвань, уезд Цзинъянь, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §fUFAA§!\n§YБиография:§! §LМладший брат Сюн Кэу, Сюн Чжэфань учился во Франции в ранние годы во время величайшего периода национальных раздоров в стране. Тесно следуя за братом в его начинаниях, истинные таланты Сюн Чжэфаня проявились в его способности управлять административными делами от имени брата. Талантливый и бескомпромиссный, Сюн фактически был гражданским главой в Партизанской зоне Цзиньян-Пиншань «Полка девяти».§!"

 #李家鈺
 SZC_li_jiayu: "Ли Цзяюй"
 SZC_li_jiayu_bio: "Кадровый военный, Ли Цзяюй окончил четвертый этап Сычуаньской армейской начальной школы как раз вовремя, чтобы принять участие в студенческой армии во время Синьхайской революции. После революции он поступил на первый этап Сычуаньской офицерской академии, а в 1913 году перевелся в Нанкинскую подготовительную школу армейских офицеров. Летом того же года Ли Цзяюй принял участие в первом из многих восстаний против Юань Шикая, в конечном итоге потерпев неудачу и вернувшись в Сычуань.\n\nПоступив на третий этап Офицерской академии, Ли Цзяюй оказался в 4-й дивизии Сычуаньской армии под командованием Лю Цуньхоу, позже став командиром бригады в 3-й дивизии Дэн Сихоу. В конечном итоге получив звание генерал-майора армии в 1923 году, Ли стал командиром Первой дивизии, а в 1926 году отделился от номинального Баодинского департамента Дэн Сихоу, чтобы помочь в формировании Офицерского департамента.\n\nВо время их пребывания в изгнании Ли Цзяюй сумел сохранить факел революционного республиканизма живым в сердцах многих своих товарищей по кадрам и намерен придерживаться этого курса."
 SZC_li_jiayu_army_chief_desc: "§YРодился:§! §L25 апреля 1892 года в уезде Пуцзян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§!\n§YБиография:§! §L$SZC_li_jiayu_bio$§!"
 SZC_li_jiayu_leader_desc: "§YРодился:§! §L25 апреля 1892 года в уезде Пуцзян, провинция Сычуань, Великая Цин§!\n§YБиография:§! §L$SZC_li_jiayu_bio$§!"

 #羅澤洲
 SZC_luo_zezhou: "Ло Цзэчжоу"
 SZC_luo_zezhou_sic_desc: "§YРодился:§! §L1 июля 1890 года в уезде Пуцзян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§!\n§YБиография:§! §LЛо Цзэчжоу начал свою карьеру, обманом проникнув во второй класс Сычуаньской армейской офицерской школы под вымышленным именем, присоединившись к Второй дивизии Сычуаньской армии в качестве командира взвода в 1914 году. Вступив в армию Дэн Сихоу в 1920 году, Ло познакомился со своим начальником и будущим соратником Ли Цзяюем. Неуклонно поднимаясь по служебной лестнице и исполняя обязанности начальника полиции Чунцина в 1923 году, Ло воспользовался своими успехами против Ян Сэня в 1925 году, чтобы продвинуться в Чэнду и захватить его ключевые офисы, будучи назначенным командиром 11-й дивизии в августе того же года.\n\nПроведя вторую половину 1920-х годов в Суйнине, Ло присоединился к Ли Цзяюю в формировании Общества Цюньи, стремясь привлечь выпускников Офицерской школы в свои ряды. Ло снова принял участие в боевых действиях во время Центральной Сычуаньской войны 1929 года, взбунтовавшись против своего бывшего начальника Дэн Сихоу и поведя свои войска против Лю Сяна, в конечном итоге выйдя из конфликта со смешанными военными результатами, но твердым контролем над Наньчуном. Надежный союзник Ли Цзяюя, его относительно долгая служба ценится многими, но некоторые с подозрением относятся к его черствому и небрежному руководству.§!\n\n§YПримечания: Естественным следствием принудительного выращивания опиума в его юрисдикции является то, что почти все офицеры Ло, а также большинство его рядовых являются опиумными наркоманами с сомнительной боевой ценностью. Сам Ло пристрастился к опиуму и табаку, заработав прозвище «Ло-Сигаретный Пепел».§!"

 #赖心辉
 SZC_lai_xinhui: "Лай Синьхуэй"
 SZC_lai_xinhui_high_command_desc: "§YРодился:§! §LАвгуст 1884 года, уезд Саньтай, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§!\n§YБиография:§! §LСлужа стажером полка после окончания Юньнаньской военной академии в 1911 году, Лай Синьхуэй участвовал в восстании Двойной девятки в Юньнани, прежде чем оказаться в рядах сычуаньской армии в качестве командира артиллерийского батальона. Сражаясь в армии Лю Цуньхоу в конце 1910-х годов, Лай неуклонно рос и получал новые артиллерийские орудия из арсеналов Ханьяна, зарабатывая престиж за то, что много раз приходил на помощь своему начальнику в битвах как против Сюн Кэу, так и против других республиканских сил.\n\nВторжение в Сычуань сил из Юньнани и Гуйчжоу в течение 1920-х годов привело к тому, что Лай Синьхуэй оказался под командованием различных сычуаньских милитаристов. Однако он познакомился с Лю Чэнсюнем в 1922 году и оставался близким коллегой на протяжении последующих лет. Голос поддержки Лая правительства Чжили в 1924 году принес дивиденды, так как он был назначен командиром 1-й дивизии Сычуани, а затем губернатором Сычуани в 1925 году, хотя Ян Сэнь быстро вытеснил его.\n\nВернувшись на службу к Лю Чэнсюню, который теперь контролировал районы в Южном Сикане, Лай проводил время, уничтожая бандитов как в местном районе, так и в своих собственных рядах. Центральная Сычуаньская война 1929 года стала плохой новостью для Лая и Лю, так как оба мужчины были изгнаны из Сикана, причем Лю удалился в свой родной город Даи, а Лай присоединился к рядам Офицерского департамента, приведя с собой своих людей и десятилетия опыта.§!"

 #陳蘭亭
 SZC_chen_lanting: "Чэнь Ланьтин"
 SZC_chen_lanting_high_command_desc: "§YРодился:§! §L1887 год, уезд Шичжу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§!\n§YБиография:§! §LЯрый ученик «Школы Зеленого леса» и выходец из жизни разбойника, Чэнь поступил на военную службу, возглавив банду своих людей под командованием Лю Бочэна в 1916 году. Следуя этой полосе республиканизма и присоединившись к армии Сюн Кэу в 1920 году, Чэнь Ланьтин был повышен до командира бригады в 1923 году, прежде чем сдаться силам Лай Синьхуэя в 1924 году и стать его подчиненным.\n\nПребывание Чэня в Лучжоу в составе 3-й бригады Лай Синьхуэя прошло по большей части без происшествий, но привело к серьезной напряженности с его коллегами, такими как Ли Чжанфу. Именно эта напряженность позволила Чэню сблизиться с социалистическими партизанами в 1926 году, оппортунистически ввязавшись в восстание в Лушуне. Провал как восстания в Лушуне, так и Северного похода привел к тому, что Чэнь перебегал туда-сюда между сильными мира сего провинции, переходя из рядов Лю Сяна к Ян Сэню, затем обратно к Лай Синьхуэю, где он и оставался на протяжении 1930-х годов.\n\nКомандуя своими войсками во время хаотичной Центральной Сычуаньской войны, Чэнь был относительно второстепенным игроком, в основном занимаясь обороной Нэйцзяна и не видя особых действий в остальном.§!\n\n§YПримечания: Имея заметные связи с братскими сектами Сычуани — «Паогэ», Чэнь остается названым братом таких людей, как Фань Шаоцзэн, а также контрабандистов и знати.§!"

 #李宗昉
 SZC_li_zongfang: "Ли Цзунфан"
 SZC_li_zongfang_high_command_desc: "§YРодился:§! §L1891 год, Мэнъян, уезд Пэн, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§!\n§YБиография:§! §LВ 1909 году Ли Цзунфан поступил в четвертый класс Сычуаньской армейской начальной школы, а после Синьхая был переведен в Сычуаньскую офицерскую школу. После окончания Ли служил на различных должностях в Сычуаньской армии, от командира взвода до командира батальона, и сражался в Войне в защиту нации, Движении в защиту конституции и в различных стычках внутри Сычуани. В 1923 году он стал командиром бригады, а к 1927 году стал командиром бригады под началом Ли Цзяюя, неуклонно поднимаясь в звании и должности.§!"

 #陳離
 SZC_chen_li: "Чэнь Ли"
 SZC_chen_li_high_command_desc: "§YРодился:§! §LМай 1892 года, уезд Аньюэ, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§!\n§YБиография:§! §LВступив в ряды студенческой армии Чунцина в первые дни Синьхая, Чэнь Ли поступил на артиллерийское отделение Сычуаньской армейской офицерской школы, окончив ее в 1915 году. Его часто повышали во время его стажировки под командованием Ли Цзяюя в армии Лю Цуньхоу, и к 1925 году он командовал собственной бригадой. Будучи расквартированным в уездах бассейна Сычуани, Чэнь служил столпом стабильности в регионе, который страдал от бедности, голода и беззакония из-за близости к Чэнду.\n\nШли годы, и Чэнь, сам того не зная, принял в свою бригаду многих членов КСП, которые использовали более нейтральную позицию Чэня по отношению к социализму как возможность вербовать сторонников своего дела. Это привело к Мятежу в Гуанхане, осуществленному Западно-Сычуаньским отделением КСП в тандеме с восстанием Гуцзюньба, в ходе которого простые солдаты армии Чэнь Ли восстали против своих офицеров, намереваясь присоединиться к своим соотечественникам на востоке. К счастью для Чэня, его быстрое возвращение в район гарнизона (вместе с разгоном повстанцев силами Тянь Сунъяо) восстановило порядок в его бригаде.\n\nПрощение Дэном Чэня за его ошибку сгладило напряженность между двумя мужчинами, в результате чего Чэнь проявил амбивалентность к восстанию своих коллег Ли Цзяюя и Ло Цзэчжоу в 1929 году. Посвященный как в интересы Баодина, так и Офицеров, Чэнь придерживается линии нейтралитета, готовый поддержать того, кто выйдет победителем.§!"

 #旷继勋
 SZC_kuang_jixun: "Куан Цзисюнь"
 SZC_kuang_jixun_advisor_desc: "§YРодился:§! §L16 июня 1895 года в уезде Сынань, провинция Гуйчжоу, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§! - §SФедерация молодых солдат§!\n§YБиография:§! §LПроведя ничем не примечательную юность, Куан Цзисюнь сначала принял участие в Войне в защиту нации, сражаясь в Сычуаньской армии Лай Синьхуэя, а позже став командиром полка. Следуя за своим начальником через все трудности, врожденные прогрессивные симпатии Куана проявились в его членстве в Федерации молодых солдат. Негласно сотрудничая с такими людьми, как Лю Бочэн, в их партизанских операциях, Куан обеспечил полулегальный канал для получения социалистическими партизанами помощи и материалов со складов Сычуаньской армии.§!"

 #彭仕复
 SZC_peng_shifu: "Пэн Шифу"
 SZC_peng_shifu_high_command_desc: "§YРодился:§! §L1901 год, Пуцзян, Чэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§!\n§YБиография:§! §LПосвятив свои ранние годы военной службе, Пэн Шифу командовал 12-м полком 5-й смешанной бригады Сычуаньской армии Ли Цзяюя. В 1935 году он перешел под командование 9-го полка 3-й бригады 104-й дивизии под началом Чэнь Шаотана. Совсем недавно, в 1936 году, Пэн получил звание подполковника Сычуаньской армии. Как младший офицер, служащий под началом Ли Цзяюя, Пэн Шифу в настоящее время является командиром 619-го полка дивизии Ли Цзяюя.§!\n\n§YПримечания: Он известен своей харизматичной личностью перед лицом войны, своей безграничной преданностью Ли Цзяюю и своей непредсказуемой тактикой на поле боя.§!"

 #周從化
 SZC_zhou_conghua: "Чжоу Цунхуа"
 SZC_zhou_conghua_advisor_desc: "§YРодился:§! §L1896 год, Синьфань, Чэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §lОфицерский департамент§! - §SФедерация молодых солдат§!\n§YБиография:§! §LБросив школу в юном возрасте, Чжоу Цунхуа вступил в армию, а в 1917 году дослужился до звания командира взвода и поступил в Школу подготовки офицеров, спонсируемую Лю Сяном. После выпуска Лю служил командиром роты под началом Лю Юйцзю в Сычуаньской армии, прежде чем был переведен к Лю Сяну после поражения Юйцзю.\n\nЗачисленный в Баодинскую военную академию Лю, отчасти для того, чтобы сдерживать интриги Чжили, Чжоу своим усердием, активным мышлением, храбростью и стратегическим мастерством привлек внимание Тан Цзайли. Используя свои отношения с Таном, Чжоу передавал всю информацию, касающуюся дел Сычуани, Лю Сяну. После окончания Баодина Чжоу вернулся в Сычуань, якобы возвращаясь в армию Лю Сяна в качестве генерал-майора начальника штаба Управления по умиротворению границ Сычуани, хотя он находится под юрисдикцией Офицерского департамента Ли Цзяюя.§!\n\n§YПримечания: Твердый в своем желании спасти нацию, Чжоу начал интенсивно заигрывать с социалистической литературой, став членом Сычуаньской Федерации молодых солдат и установив контакт с ФКДП в Сычуани.§!"

 #呂超
 SZC_lu_chao: "Люй Чао"
 SZC_lu_chao_bio: "Уроженец Сычуани, Люй окончил Сычуаньскую армейскую начальную школу в 1909 году. Затем он поступил в Четвертую Нанкинскую армейскую среднюю школу, которую затем бросил, чтобы вступить в революционный Тунмэнхой Сунь Ятсена, чтобы сопротивляться и бороться за свободный Республиканский Китай. Как и многие другие из его провинции, в 1910 году он посещал Баодинскую академию, которую затем покинул, когда в 1911 году разразилась Синьхайская революция. Затем он отправился в Шанхай, где работал с Чэнь Цимэем, Ван Цзинвэем и Ли Шицзэном (видными соратниками доктора Суня), пока не был вынужден бежать в Сычуань в изгнание после того, как к власти пришел Юань Шикай.\n\nВ 1915 году разразилась Война в защиту республики для сопротивления режиму Юаня в Пекине, и Люй присоединился к земляку из Сычуани Сюн Кэу в составе армии Цай Э в Сычуани. Когда Чэнь Цзюнмин и движение федералистов попытались выгнать Сунь Ятсена из Гуандуна, Люй встал на сторону Суня и сражался против своего бывшего товарища Сюн Кэу за контроль над Сычуанью. Затем он присоединился к Суню в изгнании в Шанхае и вернулся с Сунем в Гуандун в 1923 году, став одним из доверенных союзников Суня в Гоминьдане. Во время обреченного Северного похода Люй представлял сычуаньские силы, и после провала миссии он снова бежал в родную Сычуань в изгнание. И все же, несмотря на многочисленные поражения, революционный дух, заложенный в Люе, никогда не угасал. Вместо этого он продолжал выжидать время, горячо веря в принципы, проиллюстрированные покойным вечным премьером Гоминьдана. Ожидая в изгнании при режиме Ян Сэня, который снова взял под контроль Сычуань, он поддерживал свои контакты с Гоминьданом по всей стране."
 SZC_lu_chao_leader_desc: "§YРодился:§! §L9 марта 1890 года в уезде Ибинь, провинция Сычуань, Великая Цин§!\n§YБиография:§! §L$SZC_lu_chao_bio$\n\nТеперь, с победой республиканских сил в Сычуани, Люй стал де-факто лидером напряженного союза между республиканским Гоминьданом и федералистами, готовый исполнить видение покойного президента о свободном и истинно демократическом Китае.§!"
 SZC_lu_chao_army_chief_desc: "§YРодился:§! §L9 марта 1890 года в уезде Ибинь, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PПромышленный корпус§!\n§YБиография:§! §L$SZC_lu_chao_bio$§!"

 #鄧錫侯
 SZC_deng_xihou: "Дэн Сихоу"
 SZC_deng_xihou_leader_desc: "§YРодился:§! §L24 мая 1889 года в уезде Иншань, провинция Сычуань, Великая Цин§!\n§YБиография:§! §LДэн вступил в армию в 1906 году и продолжил обучение в Баодинской академии, хотя позже прервал учебу, чтобы вернуться в Сычуань, когда произошла Синьхайская революция. Дэн продолжал подниматься по служебной лестнице на протяжении многих лет, пока не был произведен в генералы в 1923 году. Будучи более активным за письменным столом, чем на различных полях сражений в это бурное время в Китае, он заработал репутацию надежного и компетентного карьериста, хотя и не снискал особой славы и богатства в процессе. Хотя его уважали коллеги из Баодинского департамента, в конечном итоге он стал подчиненным Ян Сэня, поскольку клика Чжили отдавала предпочтение Департаменту вооружений перед Баодинским департаментом.\n\nНесмотря на отсутствие благосклонности Чжили, Баодинский департамент сумел сотрудничать с Департаментом вооружений, что позволило им заполнить вакуум в Сычуани, оставленный окончательным крахом клики Ян Сэня в Сычуаньской гражданской войне 1936 года. Как самая видная фигура в более традиционалистской части клики Баодин, его реформы сосредоточены на развитии сельских районов и улучшении положения фермеров Сычуани. Его широкая поддержка в сельской местности и армии в сочетании с более широкой поддержкой, полученной его партнером по двоевластию Лю Вэньхуэем, поставила Баодинский департамент в положение политической гибкости, редко встречающееся среди китайских клик милитаристов. Он стремится превратить Сычуань в образцовую провинцию для остального Китая, в целом ставя благополучие народа Сычуани выше идеологии или высоких экспансионистских амбиций.§!"
 SZC_deng_xihou_commander_desc: "§YРодился:§! §L24 мая 1889 года в уезде Иншань, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §cФракция Дэна§!\n§YБиография:§! §LВступив в армию в 1906 году, Дэн был принят в Сычуаньскую военную академию. После окончания в 1909 году он поступил в Баодинскую академию. После Синьхайской революции Дэн прервал учебу и вернулся в Сычуань, чтобы продолжить военную службу там. После создания Китайской Республики Дэн присоединился к Четвертой дивизии Сычуани под командованием Лю Цуньхоу. Дэн последовательно занимал пост адъютанта и дослужился до командира батальона к 1916 году, командира Пятой бригады в 1917 году и командира отдельной бригады к февралю 1918 года. С 1920 по 1923 год Дэн участвовал в различных битвах в Юньнани, Гуйчжоу и Сычуани и проявил себя достаточно хорошо, чтобы стать командиром Третьей дивизии. В декабре того же года пекинское правительство, созданное кликой Чжили, повысило его до звания генерала. Он сохранил это звание после подчинения Ян Сэню, когда тот был назначен военным губернатором Сычуани.\n\nДэн — карьерист до мозга костей, с послужным списком, в котором было больше назначений, переводов и повышений, чем реальных битв, к тому времени, когда он стал самой видной фигурой среди выпускников Баодина в Сычуани. Хотя никто не спорит, что он компетентен в том, что делает, его опыт в прошлом был гораздо более теоретическим, чем практическим, по сравнению с его более закаленными в боях сверстниками.§!"

 #田頌堯
 SZC_tian_songyao: "Тянь Сунъяо"
 SZC_tian_songyao_bio: "В 1912 году Тянь вступил в Сычуаньскую армию в составе 4-й дивизии Лю Цуньхоу. Хотя он был членом Тунмэнхоя в годы правления Цин, Тянь встал на сторону Юань Шикая во время Второй революции 1913 года. Лю Цуньхоу в конечном итоге выступил против Юаня в Войне в защиту республики несколько лет спустя, и Тянь служил капитаном. В 1917 году Лю начал кампанию по возвращению Чэнду и успешно взял Чунцин, вытеснив силы Юньнани и Гуйчжоу из Сычуани.\n\nВ декабре Тан Цзияо возобновил войну и вытеснил Лю из Чэнду. Пекин реорганизовал армию Лю в 21-ю дивизию, и Тянь был произведен в генерал-майоры. К концу года Лю поставил Тяня во главе 21-й дивизии. Лю заключил союз с Лю Сяном, и вместе они вытеснили Сюн Кэу из Сычуани. В 1920 году Сюн и Лю заключили союз против Юньнани, и они вытеснили юньнаньские силы из Сычуани. В следующем году Сюн объединился с Лю Сяном, и они вытеснили Лю из Сычуани.\n\n21-я дивизия Тяня была включена в новую структуру власти Сычуани. В 1922 году Лю Сян потерпел поражение от Лю Чэнсюня, и тот взял под контроль большую часть бывших владений Лю Сяна. Дэн Сихоу из Баодинского департамента был недоволен разделом добычи и убедил своего коллегу-выпускника Баодина Тяня присоединиться к нему против Лю, что привело коалицию к победе. Когда Лю Цуньхоу вернулся в Сычуань в качестве подчиненного Яна, Тянь переориентировался на своего бывшего командира, но на всякий случай поддерживает связи с другими милитаристами."
 SZC_tian_songyao_leader_desc: "§YРодился:§! §L1888 год, Цзяньян, провинция Сычуань, Великая Цин§!\n§YБиография:§! §L$SZC_tian_songyao_bio$§!"
 SZC_tian_songyao_high_command_desc: "§YРодился:§! §L1888 год, Цзяньян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §aФракция Тяня§!\n§YБиография:§! §L$SZC_tian_songyao_bio$§!"

 #黄隐
 SZC_huang_yin: "Хуан Инь"
 SZC_huang_yin_high_command_desc: "§YРодился:§! §L1890 год, Чэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §cФракция Дэна§!\n§YБиография:§! §LНачав свою карьеру в армии в возрасте 17 лет и будучи одноклассником Дэн Сихоу, Хуан Инь изучал артиллерию в Баодинской военной академии, прежде чем вступить в Тунмэнхой и изготавливать бомбы во время Синьхайской революции.\n\nОкончив Баодин в 1917 году и поступив штабным офицером в одну из многочисленных армий Сычуани, он оказался под командованием Лю Цуньхоу и его многочисленных подчиненных, многие из которых стали видными генералами сами по себе. Его профессионализм как командира и дружеские отношения с Дэн Сихоу сыграли ему на руку, так как он был назначен главой Сычуаньской речной оборонительной армии У Пэйфу в 1924 году. Такт Хуана в гражданской политике также проявился во время его пребывания на посту мэра Чэнду с 1927 года до начала Центральной Сычуаньской войны в конце 1929 года.\n\nНыне расквартированный в районе города Мяньян и протекающей через него реки Фу, Хуан хорошо управляет своими людьми и был молчаливо принят местным населением. Наряду с этим Хуан стремился снискать расположение местных сторонников демократии, хотя он по-прежнему глубоко опасается любой социалистической агитации, которая может последовать за этим.§!\n\n§YПримечания: Хотя Хуан занял видное положение в рядах армейского командования Дэн Сихоу, он часто отвергал предложения своих офицеров выступить против Дэна и пойти своим путем, оставаясь упрямо верным своему начальнику и коллеге.§!"

 #陳鼎勳
 SZC_chen_dingxun: "Чэнь Динсюнь"
 SZC_chen_dingxun_high_command_desc: "§YРодился:§! §L1892 год, уезд Цзяньян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §cФракция Дэна§!\n§YБиография:§! §LКак и многие его товарищи, Чэнь Динсюнь был ранним соратником Дэн Сихоу, вступив в ряды Дэна как командир роты и адъютант в штабе дивизии после окончания артиллерийского училища в Баодинской военной академии. Будучи повышенным от командира полка до лидера бригады в армии Дэна, Чэнь получил почетный титул «Генерал Цивэй» от правительства в Пекине в 1924 году.\n\nС этим новым титулом Чэнь командовал временной 3-й дивизией, номинально перейдя к командованию официальной 3-й дивизией в армии Дэн Сихоу к 1927 году. Во время Центральной Сычуаньской войны Чэнь не видел особых действий на передовой, вместо этого будучи назначенным управляющим Сун-Ли-Мао-Вэньской Туньтяньской администрации, колониального органа, созданного Дэном для надзора за делами различных племен в горном севере и западе Сычуани. Как и у многих его коллег в рядах Баодина, его текущие обязанности в Северной Сычуани заключаются в подавлении бандитизма и поддержании местного мира наряду с поддержанием все более бюрократической системы, которую провозгласил его начальник.§!\n\n§YПримечания: Хотя Чэнь продолжает выполнять свои задачи и проходить обучение, он немного разочаровался в своем явном карьерном застое. Таким образом, если представится возможность, Чэнь вполне может поддержать кого-то другого.§!"

 #孙震
 SZC_sun_zhen: "Сунь Чжэнь"
 SZC_sun_zhen_high_command_desc: "§YРодился:§! §L5 февраля 1892 года, Мяньчжу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §aФракция Тяня§!\n§YБиография:§! §LВоспитанный с хорошим образованием, но глубоко изменившийся после смерти отца и сестры в юном возрасте, Сунь Чжэнь оставил свое будущее ученого, чтобы стать солдатом, поступив в Баодинскую военную академию в 1912 году.\n\nСунь вместе со своими одноклассниками активно участвовал как в Движении в защиту железных дорог, так и в последовавших восстаниях в Учане и на восточном побережье. Однако Сунь не вернулся к учебе после проваленной Второй революции, вернувшись в Чунцин, чтобы готовиться к очередному восстанию, которое так и не осуществилось.\n\nПосле трагедии смерти матери в 1914 году Сунь оказался безработным, прежде чем один из друзей предложил ему должность командира взвода под началом Тянь Сунъяо. Сунь отличился во время Войны в защиту республики, лично возглавив штурмовой отряд из 40 человек для захвата города Наси, что привело к его повышению до командира кавалерийского полка.\n\nОн продолжал служить под началом Тянь Сунъяо в составе армии Цзинчуань Лю Цуньхоу, теперь сражаясь против сил Сюн Кэу. Именно здесь он командовал дерзкой 3-недельной кампанией против своих врагов, используя всё, от внезапных атак до тактического блефа.\n\nНаращивая свой престиж в 20-х и 30-х годах, Сунь продолжал быть одним из самых надежных командиров Тянь Сунъяо, будучи отправленным Тянем на помощь Лю Цуньхоу против партизан Восточной Сычуани и оттачивая свое мастерство в более сложной местности Сычуани.§!"

 #王銘章
 SZC_wang_mingzhang: "Ван Минчжан"
 SZC_wang_mingzhang_high_command_desc: "§YРодился:§! §L4 июля 1893 года в Великой Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §aФракция Тяня§!\n§YБиография:§! §LВоспитанный преимущественно своим двоюродным дедом Ван Синьтянем, Ван Минчжан добился отличных оценок в юности, будучи принятым в Сычуаньскую армейскую начальную школу в возрасте 16 лет. Ван участвовал во многих антицинских кампаниях, даже покинув свою провинцию и отправившись в Шанхай для штурма Цзяннаньского арсенала во время Второй революции.\n\nВернувшись в Сычуань, Ван поступил в армию Лю Цуньхоу и многократно повышался в начале 1920-х годов за свою службу как в сычуаньско-юньнаньских войнах, так и во внутренних конфликтах Сычуани, располагаясь гарнизоном в городе Дэян к 1924 году.\n\nПровал Северного похода и небольшая реорганизация армии, последовавшая за ним, привели к тому, что Ван был переведен возглавлять Четвертую дивизию под командованием Тянь Сунъяо, где он продолжал усердно работать в своей новой роли. В рамках обучения и муштры своей армии Ван также прилагал усилия для интеграции иррегулярных формирований в свои ряды, повышая свои боевые возможности.\n\nНаряду с такими людьми, как Сунь Чжэнь, Вану также была поручена роль в «подавлении бандитизма» Тянем, командуя силами против повстанцев КСП и Гоминьдана на северо-востоке, где он сделал себе имя благодаря своему уникальному стилю: дерзкий в атаке и упорный в обороне.§!"

 #董宋珩
 SZC_dong_songheng: "Дун Сунхэн"
 SZC_dong_songheng_high_command_desc: "§YРодился:§! §L1889 год, Пуцзян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §aФракция Тяня§!\n§YБиография:§! §LБросив Сычуаньскую армейскую начальную школу, Дун Сунхэн тем не менее окончил Чунцинский армейский университет, а затем Бэйянскую армейскую ускоренную академию в Баодине в 1906 году. Репатриированный и осужденный за деятельность против Юань Шикая, Дун вступил в Сычуаньскую армию национальной обороны и служил штабным офицером у Сюн Кэу и командиром батальона у Лю Цуньхоу.\n\nСражаясь в Войнах в защиту конституции и нации, Дун сражался под началом Тянь Сунъяо в 1921 году за Лю Цуньхоу. В 1924 году он продолжал расти в званиях под началом Тяня, в конечном итоге став командиром собственной дивизии в Сычуаньской армии под началом Тяня и Сунь Чжэня. В 1933 году он участвовал в различных кампаниях против революционных партизан, а к 1935 году стал заместителем командующего Сунь Чжэня в Сычуаньской армии. Совсем недавно Дун был повышен до генерал-майора.§!"

 #邱延薰
 SZC_qiu_yanxun: "Цю Яньсюнь"
 SZC_qiu_yanxun_sic_desc: "§YРодился:§! §L1891 год, Цзычжун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §cФракция Дэна§!\n§YБиография:§! §LРанний член Тунмэнхоя, Цю Яньсюнь поднялся по служебной лестнице клики Баодин от генерал-майора начальника штаба военного губернатора до начальника штаба Сычуаньской армии Дэн Сихоу и директора Бюро общественной безопасности Чэнду.§!"

 #陳書農
 SZC_chen_shunong: "Чэнь Шунун"
 SZC_chen_shunong_commander_desc: "§YРодился:§! §L1893 год, Цзяньчжоу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §cФракция Дэна§!\n§YБиография:§! §LПоощряемый членами своей семьи к вступлению в армию, прилежный характер Чэнь Шунуна был замечен Лю Цуньхоу, который обручил свою племянницу с Чэнем. Принятый в Сычуаньскую армейскую начальную школу в 1908 году, он окончил ее в 1911 году и в конечном итоге поступил в первый класс пехотного отделения Баодинской армейской офицерской академии. Вернувшись в Сычуань после выпуска, он служил в Сычуаньской армии Дэн Сихоу, неуклонно получая повышения в 1910-х годах.\n\nВ 1921 году он все еще оставался на службе у Дэн Сихоу, сражаясь под его началом против других сычуаньских милитаристов. В 1923 году он присоединился к Дэну в кампании против Сюн Кэу и был вознагражден повышением до генерал-лейтенанта свежеиспеченным губернатором Дэном в 1924 году. В 1926 году ему была предоставлена значительная сила в 10 000 солдат, и он был расквартирован в Хэчуане, во время чего он взимал тяжелые налоги, грабил и стал одним из самых богатых и коррумпированных сычуаньских милитаристов.\n\nСотрудничая с такими людьми, как Лю Бочэн, Чэнь сыграл ключевую роль в краткой борьбе за власть в Баодинском департаменте во время Центральной Сычуаньской войны конца 1920-х годов, решительно поддерживая Дэна в его делах, хотя и сохраняя союз с Лю Вэньхуэем.§!"

 #胡临聪
 SZC_hu_lincong: "Ху Линьцун"
 SZC_hu_lincong_high_command_desc: "§YРодился:§! §LЧэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §aФракция Тяня§!\n§YБиография:§! §LБлизкий соратник Тянь Сунъяо, Ху Линьцун следовал за Тянем во всех его гамбитах в Красном бассейне, поднявшись от командира взвода до командира роты, а затем и командира батальона. В 1933 году он был принят в Баодинскую военную академию и лишь недавно вернулся в Сычуань после выпуска.§!"

 #马国荣
 SZC_ma_guorong: "Ма Гожун"
 SZC_ma_guorong_high_command_desc: "§YРодился:§! §L20 сентября 1903 года в уезде Сичан, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §cФракция Дэна§!\n§YБиография:§! §LРодившийся в семье Хуэй, Ма Гожун был вынужден нести бремя поддержки своей семьи после того, как его отец умер молодым, и участвовал в перевозке местных товаров между Чунцином и Сичаном. В 1923 году Ма оставил свою транспортную карьеру, чтобы вступить в армию, поступив в первый класс Корпуса военного образования, основанного Дэн Сихоу. Окончив его в 1924 году, он поднялся по служебной лестнице до майора к 1930 году, а после перевода в Чунцин в 1933 году стал подполковником к 1935 году.§!"

 #劉文輝
 SZC_liu_wenhui: "Лю Вэньхуэй"
 SZC_liu_wenhui_leader_desc: "§YРодился:§! §L10 января 1895 года в уезде Даи, провинция Сычуань, Великая Цин§!\n§YБиография:§! §LВоенный человек до мозга костей, Лю Вэньхуэй служит в армии с тринадцати лет. Он поступил в Сычуаньскую военную академию в 1911 году, а затем в Баодинскую армейскую академию в 1914 году и окончил ее в 1916 году. Хотя он обязан многим своим успехам и влиянием кумовству и удобным связям, он тем не менее сумел стать уважаемой и влиятельной фигурой в клике. После окончания Северного похода Вэньхуэй полностью перешел на сторону Дэн Сихоу и стал одним из самых известных членов клики.\n\nПосле поражения его племянника Лю Сяна в Гражданской войне в Сычуани к власти пришел Баодинский департамент. Его дружба с Дэн Сихоу принесла ему руководящую должность в том, что стало двоевластием в стране, где он — в резком контрасте со своим племянником — представляет более реформистскую ветвь. Популярный среди военных и более урбанистического административного класса, он позволил департаменту расширить свою поддержку далеко за пределы консервативных избирателей, к которым апеллирует Сихоу. Хотя вряд ли он войдет в учебники истории как один из величайших военачальников Китая, пока продолжается сотрудничество двух друзей в двоевластии, его наверняка запомнят за его упорные усилия по быстрой модернизации Сычуани и улучшению участи граждан провинции.§!"
 SZC_liu_wenhui_high_command_desc: "§YРодился:§! §L10 января 1895 года в уезде Даи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LЛю Вэньхуэй был в армии всю свою жизнь благодаря брату, записавшему его в Сычуаньскую военную академию в 1911 году. В некотором смысле это уместно, поскольку большинство его последующих продвижений в жизни были либо благодаря кумовству через его брата Лю Вэньцая или племянника Лю Сяна, либо результатом связей с кликой, как в случае с его связями с Баодинской армейской академией, в которую он поступил в 1914 году.\n\nХотя он, по общему признанию, был преданным и самоотверженным военным с момента окончания Баодинской военной академии в 1916 году, его послужной список оставляет желать лучшего. Наиболее примечательно то, что именно под его надзором части западного Сикана были потеряны в пользу Тибета. Несмотря на то, что его ранний военный послужной список омрачен плохими результатами, его связи в Баодинском департаменте и относительная популярность в городах сделали его силой, с которой нужно считаться.§!"

 #夏首勋
 SZC_xia_shouxun: "Ся Шоусюнь"
 SZC_xia_shouxun_army_chief_desc: "§YРодился:§! §L1890 год, Цзянцзинь, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LСвидетель упадка и национальных потрясений эпохи поздней Цин, Ся был принят в Баодинскую армейскую академию и заинтересовался военными делами. После окончания Ся вступил в армию Лю Сяна командиром полка, прежде чем бежать в Японию в 1915 году, опасаясь преследования со стороны властей Юань Шикая.\n\nПосле завершения Войны в защиту республики Ся вернулся в Сычуань и присоединился к дивизии Чжун Тидао, прежде чем перейти на сторону Лю Вэньхуэя, когда Лю приобрел известность. Сражаясь в армии Лю Вэньхуэя против различных противников, он был повышен до звания командира дивизии после провала Северного похода в 1927 году.\n\nДостаточно компетентный офицер в армии Лю Вэньхуэя, он хорошо заботится о своих людях, поощряя при этом находчивость и дисциплину, когда это необходимо. Следовательно, его люди мотивированы и непоколебимо преданы, готовы прислушиваться к каждому приказу Ся в любых ситуациях.§!\n\n§YПримечания: Преданный патриот, Ся известен тем, что время от времени покидает свой гарнизонный район, чтобы вернуться в свой родной город Цзянцзинь, развивая местную промышленность, укрепляя торговлю и часто жертвуя свои собственные деньги на планирование шагов к гидроэнергетике.§!"

 #向传义
 SZC_xiang_chuanyi: "Сян Чуаньи"
 SZC_xiang_chuanyi_commander_desc: "§YРодился:§! §L1886 год, уезд Жэньшоу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LВступив в Тунмэнхой в 1902 году и участвуя в революционных кругах, Сян Чуаньи был активен в Сычуани даже за годы до Синьхая, вступив в ряды Сюн Кэу, когда пришла революция. Однако во время Второй революции Сян был вынужден бежать в Шанхай в хаосе, а затем покинул Китай, чтобы учиться в Университете Хосэй в Японии.\n\nВернувшись в Юньнань через Индокитай в 1916 году, Сян пробрался обратно в Сычуань вместе с Сюн Кэу. Служа в революционной коалиции, Сян вступил в контакт с региональными милитаристами Дэн Сихоу и Тянь Сунъяо, одновременно больше сближаясь с Промышленным корпусом, чем с Сюном. Изгнание Сюн Кэу из Сычуани сначала силами Юньнань-Гуйчжоу, а затем другими милитаристами Сычуани привело к тому, что Сян стал работать с зарождающимся Баодинским департаментом.\n\nДе-юре подчиненный Лю Вэньхуэя, на практике Сян играл роль автономного актора, лишь посвященного в интересы Баодина. Именно эта динамика привела к назначению Сян Чуаньи главой Офиса командования трех армий в 1925 году, когда Баодинский департамент контролировал Чэнду, что стало методом компромисса для триумвирата, борющегося за власть. В этой роли Сян отвечал за диалог между Лю, Дэном и Тянем, одновременно неофициально являясь начальником полиции и главой ополчения. Хотя Офис командования с тех пор был переведен в Яань из-за враждебности с Ян Сэнем, обязанности Сяна остались в основном прежними.§!"

 #劉元瑄
 SZC_liu_yuanxuan: "Лю Юаньсюань"
 SZC_liu_yuanxuan_advisor_desc: "§YРодился:§! §LАвгуст 1911 года в уезде Даи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LПлемянник Лю Вэньхуэя, Лю Юаньсюань усердно учился в юности, а в 1925 году поступил в Чэндускую среднюю школу Дачэн на один год. Вступив в армию под влиянием родственников, он был принят в местную учебную школу Сычуаньской армии своего дяди, а после выпуска служил капитаном Команды защиты торговцев Сюйфу. Будучи быстро повышенным после Центральной Сычуаньской войны, он вскоре стал командиром 13-й бригады Армии пограничной обороны Сычуани, расквартированной в Ханьюане.\n\nВ 1934 году Лю был ненадолго приписан к чжилийскому корпусу подготовки офицеров в Лушане и путешествовал из Сычуани в другие провинции и даже в Японию, что глубоко повлияло на его концепцию японского империализма. В результате он все больше склонялся к прогрессивным кругам, особенно после притока демократических интеллектуалов, выброшенных на берег во внутренних районах страны.§!"

 #吴景伯
 SZC_wu_jingbo: "У Цзинбо"
 SZC_wu_jingbo_advisor_desc: "§YРодился:§! §L1892 год, Чэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LОкончив Сычуаньскую армейскую начальную школу и Сычуаньскую армейскую ускоренную школу, У Цзинбо поступил во второй класс пехотного отделения Баодинской армейской офицерской школы и сразу же окончил это заведение в 1916 году. В 1923 году он стал директором Генерального штаба 9-й дивизии Сычуаньской армии под командованием Лю Вэньхуэя, а в следующем году стал ее начальником штаба. В 1926 году он сотрудничал с усилиями кросс-Баодина по созданию единого правительства Сычуани, а в 1927 году вернулся служить одним из штабных офицеров Лю Вэньхуэя.§!\n\n§YПримечания: У постоянно размышляет о том, чтобы уйти из армии и заняться политикой.§!"

 #汪雲翔
 SZC_wang_yunxiang: "Ван Юньсян"
 SZC_wang_yunxiang_sic_desc: "§YРодился:§! §L1886 год, Цзяньян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LПосвящение Ван Юньсяна в армейскую карьеру было строгим: он не только окончил ускоренный класс Баодинской армейской академии в 1909 году, но и был принят в Пекинский армейский университет, который окончил в 1916 году.\n\nС таким престижным военным образованием он высоко ценился тем, под чьим началом служил, недолго командуя своими войсками под началом Лю Сяна, прежде чем стать начальником штаба Лю Вэньхуэя в 1927 году. Охраняя тыловые районы северного Сикана во время Центральной Сычуаньской войны, Ван оставался приверженным укреплению культуры военного образования в своих рядах. Изучая местность и анализируя боеспособность своих войск при стычках с бандитами, он составил книгу «Военная география» для учебного отдела Лю Вэньхуэя. Это руководство дало обученным офицерам знания о влиянии горной болезни, стиле боя и технике Тибетской армии, а также стало одной из немногих региональных военных географических монографий в Китае эры милитаристов.\n\nИзлишне говорить, что Ван показал себя умелым военным тренером, планировщиком и организатором, который по-прежнему восприимчив к новым знаниям и готов перенимать новый опыт. Этот профессионализм в военном образовании, естественно, также привел к назначению Вана главой учебного корпуса Лю Вэньхуэя и тактическим инструктором в Сычуаньской армейской офицерской школе.§!"

 #冷寅东
 SZC_leng_yindong: "Лэн Иньдун"
 SZC_leng_yindong_commander_desc: "§YРодился§!: §L1894 год, уезд Даи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LВступив в Тунмэнхой через участие в Движении в защиту железных дорог в 1911 году, Лэн поступил в Сычуаньскую армейскую офицерскую школу, прежде чем дрейфовать по Китаю, занимаясь революционной деятельностью после Синьхая. Этот послужной список, наряду с его членством в Гоминьдане, привел к его заключению в тюрьму в Чэнду в 1915 году, но он был освобожден вскоре после этого, после возвращения города АЗР (Армией защиты республики).\n\nПостоянно вовлеченный в политические потрясения Сычуани, Лэн был назначен командиром батальона под началом Ло Пэйцзиня, прежде чем стать подполковником в рядах сычуаньского милитариста Чэнь Хунфаня в 1918 году. Поражение Чэня от рук Ян Сэня привело к тому, что Лэн был переведен в армию Яна, а затем в армию Лю Сяна после того, как Ян был изгнан в конце 1925 года. В армии Лю Сяна Лэн командовал 12-й дивизией, курируемой Лю Вэньхуэем, в результате чего медленно дрейфовал в круг Лю Вэньхуэя.\n\nЛэн служил на множестве должностей в офицерском корпусе Лю Вэньхуэя, одной из самых важных была его роль посредника Лю в конце Центральной Сычуаньской войны. Он также ответственен за попытки искоренения коррупции среди гражданских чиновников региона и является надежным коллегой Ван Юньсяна в качестве генерала Оборонительной армии Чуань-Кан.§!\n\n§YПримечания: Помимо борьбы с коррупцией и употреблением опиума, Лэн также работал в союзе с такими людьми, как Сян Чуаньи, над арестом и казнью оперативников и агитаторов КСП в Сикане.§!"

 #劉文彩
 SZC_liu_wencai: "Лю Вэньцай"
 SZC_liu_wencai_sic_desc: "§YРодился:§! §L1887 год, уезд Даи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LВидный землевладелец и старший брат Лю Вэньхуэя, Лю Вэньцай настолько известен в Сычуани, что получил прозвище «Лю-Тигр» за свой жесткий характер. В 1921 году, после назначения его брата командиром бригады в Ибине, Лю стал директором Ибиньского филиала Сычуаньской табачной и винной компании, Бюро судового налога Сюнань, Отдела защиты торговцев Южной Сычуани, Отдела по расследованию борьбы с опиумом Южной Сычуани, Бюро налогообложения Южной Сычуани и генерал-лейтенантом Кампании помощи сельским районам Сюнань.\n\nВзимая тяжелые налоги в южной Сычуани благодаря своему огромному влиянию, он облагал налогом всё: от цветов до туалетов и лени. В 1927 году он направил войска убить Сюй Цзинбана, ведущего члена Ассоциации фермеров в уезде Пиншань, который возглавил движение сопротивления против его тяжелых налогов. В 1928 году Лю направил военную полицию убить Ли Сяовэня и Ли Цзясюня, наряду с различными другими членами крестьянских организаций.\n\nВ 1931 году Лю вымогал более 200 000 серебряных долларов из Ибиня за 2 дня и отправил их в свой дом в Даи. К 1933 году Лю сколотил значительную земельную империю в Сычуани, включая более 12 000 акров земли, 22 банка, 5 ломбардов, 684 дома, 10 мельниц, 29 особняков и большую коллекцию золота. Несмотря на это, однако, Лю, как отмечалось, внес значительный вклад в начальное образование и помогал бедным посредством пожертвований, значительно развив провинцию Сикан.§!"

 #邵石痴
 SZC_shao_shichi: "Шао Шичи"
 SZC_shao_shichi_advisor_desc: "§YРодился:§! §Lпровинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LВысоко ценимый Лю Вэньхуэем, Шао Шичи служил способным бюрократом и верным директором интриг Лю в Чэнду, занимая пост директора офиса Лю в Чэнду. Желая продвигать демократию в Баодинском департаменте Лю, Шао выдвинул идею, наряду с другими членами окружения Лю, такими как Ма Чжэминь, Хуан Сяньчжан, Ян Бокай и Ли Сянфу, создать собственное демократическое общество в сотрудничестве с Великим республиканским альянсом. С конечной целью сохранения национального единства, упорства в антиимпериализме, оппозиции диктатуре и практики демократии, истинные способности Шао проявляются в управлении финансами Лю Вэньхуэя.§!"

 #曾庶凡
 SZC_zeng_shufan: "Цзэн Шуфань"
 SZC_zeng_shufan_advisor_desc: "§YРодился:§! §L1897 год, Наньси, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LВыпускник Пекинской школы права 1925 года, Цзэн Шуфань вернулся в Сычуань в том же году и стал учителем. Основав газету «Новая Сычуань» вместе с Чэнь Миндэ и другими, он вступил в Китайскую синдикалистскую партию в 1928 году во время учебы во Франции, проходя курс политической экономии на факультете литературы Парижского университета. Участвуя в программах «работа-учеба» и Восточной антиимпериалистической лиге, он также издавал «Вечерние новости национального спасения».\n\nНедавно вернувшись в Китай, Цзэн подал заявку на членство в ФКДП, будучи одним из ее самых строгих левых членов и близким соратником таких людей, как Чжан Лань, Чжан Дунсунь и Чжан Цзюньмай.§!\n\n§YПримечания: Он сочувствует борьбе сычуаньских партизан-повстанцев.§!"

 #李则民
 SZC_li_zemin: "Ли Цзэминь"
 SZC_li_zemin_advisor_desc: "§YРодился:§! §LУезд Шуанлю, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §cБаодинский департамент§! - §mФракция Лю§!\n§YБиография:§! §LРодившийся в семье землевладельца, семья Ли Цзэминя владеет сотнями акров земли в Чэнду и Шуанлю. Вступив в Сычуаньскую армию и дослужившись до звания генерала под началом Лю Вэньхуэя, Ли принял метод образования как ключ к национальному спасению Китая. В 1930 году, как один из самых старших офицеров под командованием Лю, он продал свою семейную собственность вокруг Чэнду, чтобы основать Частную среднюю школу Датун в Чэнду прямо в городском сердце города.\n\nВнушая своим ученикам моральный императив национального спасения наряду с формой гражданского милитаризма, Ли Цзэминь стал одним из самых популярных и уважаемых сычуаньских генералов, даже если он в значительной степени отошел от активной службы.§!"

 #劉存厚
 SZC_liu_cunhou: "Лю Цуньхоу"
 SZC_liu_cunhou_leader_desc: "§YРодился:§! §L24 января 1884 года в Цзяньчжоу, провинция Сычуань, Великая Цин§!\n§YБиография:§! §LСын богатых торговцев солью, Лю Цуньхоу скорее жестокий бандит, чем стратег, не говоря уже о губернаторе. Он посещал военную академию Сычуани в 1903 году, продолжил обучение в Японии в 1907 году и вернулся в Сычуань после выпуска в 1908 году. Он сделал себе имя во время Синьхайской революции, где изначально возглавлял небольшие антибандитские силы и перешел к командованию более крупными силами, поскольку его лояльность заслужила доверие начальства. Однако во время конфликтов, в которых он участвовал, его силы часто были больше озабочены вымогательством богатства у местных жителей, чем функционированием как надлежащая военная сила. Хотя его солдаты часто вели себя как бандиты, он сумел в процессе пробиться к позиции относительной власти в Сычуани, хотя и вряд ли полюбился народу.\n\nВо время гражданской войны в Сычуани Лю Цуньхоу едва ли способствовал прорывам Департамента вооружений, хотя его сил было достаточно, чтобы использовать те, что были созданы во время конфликта. Поскольку он в основном имел опыт антибандитских операций, его силы провели большую часть войны, выслеживая лоялистов Гоминьдана и зачищая разгромленные остатки фракции Лю Сяна из Ускоренного департамента. Благодаря этому его силы остались в относительно невредимом состоянии по сравнению с остальной частью Департамента вооружений, что в конечном итоге позволило ему переиграть своего предполагаемого союзника Ян Сэня, как только пыль войны улеглась.\n\nЕго правление в качестве губернатора Сычуани в конечном итоге станет не более чем его де-факто бандитизмом в большем масштабе. Облагая народ бесчисленными налогами и используя свою армию для вымогательства как у богатых, так и у бедных в Сычуани, он быстро вырос в ненавистного тирана, который главным образом сумел удержать власть посредством жестоких репрессий и бесстыдного взяточничества.§!"
 SZC_liu_cunhou_sic_desc: "§YРодился:§! §L24 января 1884 года в Цзяньчжоу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LЛю Цуньхоу был зачислен в Сычуаньскую военную академию в 1903 году. Он продолжил обучение в Академии Императорской армии Японии в 1907 году и окончил ее к 1908 году, после чего вернулся в Китай. Его военная карьера началась по-настоящему во время Синьхайской революции, когда он был впервые повышен до генерал-лейтенанта командирами Бэйяна. Он продолжил руководить серией антибандитских рейдов и заслужил доверие своего начальства, достаточно, чтобы в конечном итоге возглавить временные армии. Однако предполагается, что это имело меньше общего с его способностями командира и было скорее вопросом того, что он казался лояльным во времена конфликтов и хаоса.\n\nХотя он смог успешно усмирять бандитов и заслужить доверие своего начальства, он заслужил только презрение местных жителей, так как его армии вели себя не лучше бандитов, с которыми они должны были сражаться. Куда бы ни направлялись его силы, они фактически занимались рэкетом против местных жителей. Жадный и менее озабоченный дисциплиной, чем военной доктриной, он пользовался плохой репутацией у большинства своих коллег и рассматривался как человек, в значительной степени лишенный военной проницательности на протяжении большей части своей карьеры. Как бы то ни было, он все же был воплощением безжалостного милитариста и сумел накопить богатство и базу власти, с которой нужно считаться.\n\nВ конечном итоге он был подчинен Ян Сэню и ему было поручено поддерживать порядок на севере страны. Его прежняя лояльность Чжили принесла ему высокую должность в Департаменте вооружений, несмотря на его неоднозначный военный послужной список.§!"

 #廖振
 SZC_liao_zhen: "Ляо Чжэнь"
 SZC_liao_zhen_army_chief_desc: "§YРодился:§! §L1881 год, уезд Цзяньян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LОкончив Сычуаньскую ускоренную армейскую академию и тихо поднимаясь по служебной лестнице в армии Лю Цуньхоу, Ляо Чжэнь оказался в роли губернатора и уездного магистрата уезда Ваньюань в 1923 году. Начав свое управление с борьбы с агитаторами и подавления восстаний, Ляо был переведен в Суйнин в 1925 году, а затем переведен обратно в Ваньюань в следующем году.\n\nСохраняя нейтралитет на протяжении большей части внутренней борьбы в провинции Сычуань и интегрируясь в ряды Армии пограничной обороны Чуань-Шэнь Лю Цуньхоу, Ляо Чжэнь провел большую часть своего времени, командуя войсками против настойчивой Восточно-Сычуаньской Красной армии, часто прибегая к сотрудничеству с бандитами для уничтожения партизан. Это, к сожалению, привело лишь к ограниченным успехам, так как 18 пиков, составляющих горные хребты вокруг Ваньюаня, оказались сложными для ведения боевых действий, что только усугублялось плохой логистикой и дисциплиной в боевых формированиях Ляо Чжэня.\n\nТем не менее, Ляо Чжэнь продолжает трудиться на своем посту под началом Лю Цуньхоу, одного из ключевых людей, формирующих новый офицерский костяк в Департаменте вооружений.§!\n\n§YПримечания: Несмотря на его наследие жестокости против партизан в Восточной Сычуани, где он печально известен применением коллективных наказаний и массовыми убийствами семей повстанцев, Ляо также известен многим в Ваньюане как щедрый филантроп, пожертвовавший большую часть своего богатства на ремонт и обслуживание мостов и речных насыпей.§!"

 #周道剛
 SZC_zhou_daogang: "Чжоу Даоган"
 SZC_zhou_daogang_commander_desc: "§YРодился:§! §L1875 год, уезд Шуанлю, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LОкончив учебу в Японии в 1904 году, Чжоу провел следующие несколько лет в качестве руководителя и военного инструктора Сычуаньской академии вооруженных сил. После начала Синьхайской революции в 1911 году он сначала служил военным министром в Сычуани, а затем был вызван в Пекин в качестве советника, где в это время вступил в Прогрессивную партию.\n\nКогда началась Война в защиту республики, Чжоу встал на сторону сил Цай Э и был назначен командиром 1-й дивизии Сычуаньской армии. После короткого пребывания на посту губернатора Сычуани в 1917 году Чжоу в основном оставался в стороне до 1925 года, когда к власти пришел Ян Сэнь. После приглашения Яна он оказался на командной должности как раз к Северному походу. Выступая сторонником единства Сычуани, Чжоу позиционировал себя близко как к знати, Великому республиканскому альянсу, так и к Федерации китайских демократических партий.§!"

 #刘邦俊
 SZC_liu_bangjun: "Лю Банцзюнь"
 SZC_liu_bangjun_sic_desc: "§YРодился:§! §L1890 год, уезд Цзяньян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LОбучаясь в частной школе в ранние годы, Лю Банцзюнь поступил в Баодинскую армейскую офицерскую школу в 1907 году. После окончания он вступил в Первую дивизию Сычуаньской армии под командованием Чжоу Цзюня в качестве командира роты, затем батальона и, наконец, командира полка. Участвуя в мешанине сычуаньских милитаристов, он позже был повышен до генерал-адъютанта военного губернатора, директора военного снабжения, генерал-майора и, наконец, командира дивизии.\n\nУчаствуя в кампании против местных партизан, Лю был повышен до генерал-лейтенанта, а в 1935 году стал заместителем командира Офицерского учебного корпуса Эмэй.§!"

 #陈洪范
 SZC_chen_hongfan: "Чэнь Хунфань"
 SZC_chen_hongfan_advisor_desc: "§YРодился:§! §LУезд Даи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LУченик ученого Ли Сина, Чэнь Хунфань служил командиром Первой дивизии Сычуаньской армии после Синьхайской революции, а позже стал командиром 8-й дивизии. Участвуя в сычуаньской вражде милитаристов, он стал «Королем Цзядина» после расквартирования в Лэшане, так как он практически доминировал в этом районе и взимал тяжелые налоги.§!"

 #赵荣华
 SZC_zhao_ronghua: "Чжао Жунхуа"
 SZC_zhao_ronghua_high_command_desc: "§YРодился:§! §L1873 год, уезд Хуансянь, провинция Шаньдун, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LСын бедной семьи в Шаньдуне, Чжао не любил учиться и трудиться в детстве, и в 1893 году сбежал с другом в провинцию Чжили, присоединившись к армии И. Сражаясь в Корее во время японо-китайской войны, он был отмечен Ма Саньюанем за свою службу и повышен до капитана дозора. В 1900 году Чжао возглавил отряд смертников и успешно отбил Цайцунь у японцев, за что был повышен до офицера дозора. После недолгого пребывания на посту начальника гарнизона в Наньюане и уезде Юйтянь, он последовал за Чжан Сюнем в 1907 году в Цзянсу.\n\nПосле Учанского восстания Чжао восстал на стороне революционеров в Нанкине, а в 1914 году помогал подавлять Бай Лана в Хубэе. В 1917 году Чжао сражался вместе с У Пэйфу против Ли Тяньцая в Хубэе и в результате был повышен и служил генералом под началом Ван Чжаньюаня. В 1920 году Чжао уничтожил штаб У Гуансиня в Хубэе, захватив его живым, и стал местным чиновником в Хубэе. В 1923 году он был лишен власти У Пэйфу и отправлен в Сычуань помогать усилиям Чжили там.\n\nПосле Второй Чжифэнской войны в 1924 году Чжао перегруппировался с У в Ухане, служа в роли блокирующего отряда и главным инспектором Пекин-Ханькоуской железной дороги. Руководя битвой у моста Хэшэн во время Северного похода, Чжао был вынужден отступить в Ханькоу, прежде чем помочь в продвижении Чжили на юг в Хунань. С победой Чжили и отсутствием места для Чжао в Хубэе, У отправил его в Сычуань помогать Лю Цуньхоу и Ян Сэню.§!"

 #赵熙
 SZC_zhao_xi: "Чжао Си"
 SZC_zhao_xi_advisor_desc: "§YРодился:§! §L13 сентября 1867 года в уезде Жун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LРодившийся в бедной крестьянской семье, Чжао Си посещал частную школу в 1872 году, умело демонстрируя чрезвычайный интеллект в юном возрасте. Овладев классикой к 12 годам, он начал свою легендарную поэтическую карьеру в 1879 году, а в 1882 году стал ученым. В 1887 году он сдавал провинциальный экзамен, провалился и отправился учиться в Академию Цзюфэн. В 1888 году он снова провалил провинциальный экзамен, но в 1891 году наконец сдал, а затем сразу сдал императорский экзамен и, наконец, дворцовый экзамен.\n\nПосле сурового периода времени в качестве государственного чиновника и педагога, Чжао Си по-настоящему поднялся к национальной известности в 1905 году, когда его оригинальная работа «Сборник северных путешествий» стала все более популярной, вплоть до того, что он стал близким другом Лян Цичао. В 1909 году он стал цензором Цзянси, известным своей беспристрастностью и честностью. В 1911 году он встал на сторону Движения в защиту железных дорог Сычуани и бежал в Японию в 1912 году, встретившись с Кан Ювэем и Ляном. Близкий соратник Сюн Кэу и Ян Шуканя, Чжао стал отшельником в 1914 году.\n\nВ 1916 году он отказался от должности у Цай Э, вместо этого сосредоточившись на своей каллиграфии и письме. К 1929 году он опубликовал местные летописи уезда Жун, проект, который он начал в 1922 году, а в 1930 году он основал Литературный зал, и в следующем году основал литературную школу.§!\n\n§YПримечания: Местный герой в уезде Жун, Чжао аполитичен и является одним из «Пяти старейшин и семи мудрецов» Сычуани.§!"

 #尹昌齡
 SZC_yin_changling: "Инь Чанлин"
 SZC_yin_changling_advisor_desc: "§YРодился:§! §L1869 год, уезд Хуаян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LСдав императорский экзамен в 1888 году, Инь Чанлин поступил в Академию Ханьлинь в 1889 году и стал обычным чиновником после ее расформирования. Служа магистратом и префектом, он внес значительный вклад в политику реформ Цин в провинции Шэньси, став известным как «Префект восьми бюро». После Синьхая Инь служил на различных должностях в Сычуаньском военном правительстве и ушел в отставку после того, как Юань Шикай захватил президентство. В 1912 году он начал свою долгую карьеру преданной местной филантропии.\n\nСоздавая различные благотворительные организации и приюты во время первого пребывания Ян Сэня на посту губернатора Сычуани, организации Иня не были похожи на типичные Залы милосердия, встречающиеся по всему остальному Китаю, поскольку они фокусировались на материалистических решениях страданий людей; вплоть до того, что заслужили личное уважение Ян Сэня. Построив значительную промышленную и благотворительную империю, наряду с посвящением своей жизни приему тех, кто брошен обществом, он недавно стал председателем Сычуаньского провинциального комитета помощи.§!\n\n§YПримечания: Сильно сочувствуя ФКДП и ВРА, сам Инь, как отмечалось, был близок к Чжан Ланю.\nОн является одним из «Пяти старейшин и семи мудрецов» Сычуани.§!"

 #劉師亮
 SZC_liu_shiliang: "Лю Шилян"
 SZC_liu_shiliang_advisor_desc: "§YРодился:§! §L1876 год, уезд Нэйцзян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §PВооружения§!\n§YБиография:§! §LПрилежный и усердный в юности, Лю Шилян был особенно любим своими учителями. Однако, неудовлетворенный их недостатком знаний, он бросил школу, обучаясь частным образом до 1896 года, когда умер его наставник. Сочувствуя идеалам Кан Ювэя, Лю с энтузиазмом поддерживал как Сто дней реформ поздней Цин, так и Синьхайскую революцию.\n\nОднако разочарование во внутренней политике Китая привело его к созданию Шилян Суйкань в Чэнду в 1920-х годах. Критикуя сычуаньских милитаристов и других политических деятелей через юмористические скетчи, поэзию, драму и куплеты, Лю заработал прозвище «Мастер юмора в Сычуани». После того как он слишком сильно перешел границы, Лю был сослан в Шанхай теми же милитаристами, которых он критиковал. Вернулся только недавно, в 1935 году.§!"

 #楊森
 SZC_yang_sen: "Ян Сэнь"
 SZC_yang_sen_leader_desc: "§YРодился:§! §L20 февраля 1884 года в Гуанъане, провинция Сычуань, Великая Цин§!\n§YБиография:§! §LПоступив в армию в 1904 году, Ян Сэнь впервые столкнулся с политикой, когда присоединился к обществу Тунмэнхой во время учебы в Сычуаньском образовательном зале в 1906 году. После окончания в 1908 году он служил в Новой армии Великой Цин до 1911 года. Его происхождение и связи позволили ему приобрести известность, когда произошла Синьхайская революция. Служа под началом Цай Э, он в конечном итоге был произведен в генералы в 1921 году и направлен в Чунцин. Эта модель продвижения по службе через политические связи и маневрирование больше, чем через военные достижения, продолжилась, когда Ян Сэнь стал союзником У Пэйфу в 1925 году. Когда Чжили стала доминирующей кликой в полностью восстановленной Великой Цин, Ян Сэнь был возвышен до губернатора Сычуани.\n\nКак губернатор Сычуани, Ян Сэнь выделяется среди других милитаристов своей платформой быстрой модернизации как в социальной, так и в экономической сферах, возглавляемой различными инфраструктурными и образовательными проектами, которые улучшили жизнь многих в Сычуани. Хотя он достаточно компетентный военачальник, тот факт, что Ян Сэнь обязан большей частью своего успеха сделкам и поддержке нужных людей в нужное время, поставил его и Департамент вооружений в шаткое положение. Его положение еще больше подрывается тем, что его собственный образ жизни противоречит тому, что он заявляет как лучшее для Сычуани, что ограничило его общественную поддержку. Например, он вызывал гнев более консервативных элементов Сычуани, выступая против традиционных ролей для женщин и таких практик, как бинтование ног, а затем растрачивал любую добрую волю, которую он мог бы получить от реформистов, имея восемь наложниц и целых тридцать детей от них.\n\nНесмотря на его многочисленные недостатки, ему удалось удержать власть до сих пор при достаточной поддержке как армии, так и простого народа, чтобы быть силой, с которой нужно считаться. И пока он у власти, у Чжили будет надежный союзник в Чэнду.§!"
 SZC_yang_sen_commander_desc: "§YРодился:§! §L20 февраля 1884 года в Гуанъане, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aЯн Сэнь§!\n§YБиография:§! §LЯн Сэнь вступил в армию в 1904 году и посещал Сычуаньскую военную академию, которую окончил в 1908 году. Впоследствии он служил в Новой армии Цин до 1911 года. Его происхождение и образование позволили ему занять видное место в военной клике Сычуани, когда в том же году началась Синьхайская революция. В этот период Ян служил под началом генерала Цай Э, который также повысил его до одного из генералов Сычуани в 1921 году. После назначения командующим силами Чунцина, Ян Сэнь вступил во вражду с другими милитаристами провинции, в первую очередь с Сюн Кэу и Лю Сяном. Несмотря на его попытки подорвать свою оппозицию, он никогда не был полностью успешным.\n\nЕго положение военного губернатора Сычуани гораздо больше связано с его связями с У Пэйфу и кликой Чжили, чем с какими-либо военными достижениями. Тем не менее, он вряд ли является неумелым военачальником по любым меркам, проявив себя адекватно в предыдущих войнах и сохранив значимость Департамента вооружений в Сычуани на протяжении всего времени своего губернаторства.§!"

 #范紹增
 SZC_fan_shaozeng: "Фань Шаоцзэн"
 SZC_fan_shaozeng_high_command_desc: "§YРодился:§! §L1894 год, уезд Дачжу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aФракция Ян Сэня§!\n§YБиография:§! §LПрозванный «Фань Хаэр» в юном возрасте, Фань Шаоцзэн был известен тем, что не любил учиться, слушал истории в чайных и тосковал по рыцарской жизни сродни жизни Робин Гуда. Следуя таким сомнительным амбициям, Фань присоединился к одному из многих тайных обществ Сычуани, где он был представлен Тунмэнхою и другим революционным движениям.\n\nНа протяжении 1910-х годов Фань продолжал консолидировать своих последователей и участвовать в революционной деятельности в составе местного Гэлаохуэй, выступая против Цин и, позже, проюаньских элементов, присутствующих в Сычуани. Он присоединился к армии Сюн Кэу в 1920 году, но быстро порвал с ней, разочаровавшись в командовании, возможно, из-за своего менее интеллектуального происхождения. После возвышения Ян Сэня в Сычуани в 1923 году Фань быстро интегрировал свои силы, став командиром 9-й смешанной бригады и взяв под контроль большую часть сил Яна после его неудачной попытки объединения провинции в 1925 году. Продолжая служить под началом Яна во время Центральной Сычуаньской войны, Фань отличился своим универсальным и адаптивным стилем командования, часто используя иррегулярные войска или быстрые мобильные отряды.§!\n\n§YПримечания: Фань провел большую часть 1930-х годов в Посольствах, используя беспорядки Шанхайского восстания, чтобы не только наладить хорошие отношения с членами подпольной преступности, такими как Ду Юэшэн, но и переправить современное британское вооружение вверх по Янцзы для вооружения своих людей.§!"

 #賀國光
 SZC_he_guoguang: "Хэ Гогуан"
 SZC_he_guoguang_high_command_desc: "§YРодился:§! §L1885 год, уезд Пуци, провинция Хубэй, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aФракция Ян Сэня§!\n§YБиография:§! §LПоступив в Сычуаньскую армейскую школу в 1903 году, Хэ Гогуан учился вместе с такими известными именами в Сычуани, как Ян Сэнь и Лю Сян. Однако, когда разразилась Синьхайская революция, он вернулся в свой родной Хубэй и участвовал в битве за Учан. Проучившись четвертый семестр и окончив учебу в 1916 году, он некоторое время служил под началом Коу Инцзе командиром бригады, прежде чем проявить себя и быть повышенным до командира 5-й дивизии армии У Пэйфу.\n\nПоначалу неся потери во время Северного похода, Хэ успешно защитил свою родную провинцию от наступающего Гоминьдана. По всем меркам поздно прибывший во фракцию «Лоян» клики Чжили, он является членом Группы генерального инспектора. Благодаря его успехам в Хубэе ему была возложена ответственность за обеспечение демобилизации и реорганизации армии для Чжили после 1927 года.\n\nСовсем недавно Хэ был назначен ответственным за разведку и административную работу Центрального правительства в Сычуани и, как следствие, на всем Юго-Западе, где он контролирует местные военные передвижения и управляет коммуникациями между Лояном и Сычуанью.§!"

 #郭汝栋
 SZC_guo_rudong: "Го Жудун"
 SZC_guo_rudong_army_chief_desc: "§YРодился:§! §L1889 год, уезд Тунцзян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aФракция Ян Сэня§!\n§YБиография:§! §LБросив среднюю школу префектуры Чунцин в юном возрасте, Го Жудун вместо этого вступил в Тунмэнхой, а затем в Отряд Смертников в Чунцине во время Синьхайской революции. В 1912 году он поступил в Сычуаньскую армейскую офицерскую школу для изучения инженерного дела, а после выпуска поступил в 2-ю дивизию Сычуаньской армии Лю Цуньхоу в 1914 году. В 1916 году он сражался в Войне в защиту республики против Юань Шикая, заслужив множество отличий и повышение.\n\nВ 1917 году он участвовал в сычуаньско-юньнаньской и сычуаньско-гуйчжоуской кампаниях, а в 1920 году стал командиром дивизии. После очередного повышения в 1923 году и поступления на службу к Ян Сэню, Го послушно следовал за своим начальником до своего поражения. В 1925 году он ненадолго стал временным лидером сил Ян Сэня, а в 1926 году воссоединился с Ян Сэнем для свержения Лю Сяна, после чего служил в военных кампаниях против различных партизанских групп в Восточной Сычуани.§!\n\n§YПримечания: Он поддерживает отношения ученика и учителя с Ли Вэйжу и в остальном прагматичен с такими людьми, как Лю Сян.\nОн имеет чрезвычайно положительную репутацию в городе Иньцзя.§!"

 #杨汉域
 SZC_yang_hanyu: "Ян Ханьюй"
 SZC_yang_hanyu_advisor_desc: "§YРодился:§! §L1905 год, Гуанъань, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aФракция Ян Сэня§!\n§YБиография:§! §LМолодой племянник Ян Сэня, Ян Ханьюй жил с семьей Ян и поступил в 19-й класс Куньминской военной академии и 3-й класс Баодинской военной академии. В 1925 году Ян был командиром 1-й смешанной бригады Сычуаньской военной инспекции и, служа своему дяде во время Центральной Сычуаньской войны, участвовал в будущих кампаниях как против врагов своего дяди, так и против партизан-повстанцев в Восточной Сычуани.§!"

 #夏炯
 SZC_xia_jiong: "Ся Цзюн"
 SZC_xia_jiong_sic_desc: "§YРодился§!: §L1897 год, Чэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aФракция Ян Сэня§!\n§YБиография:§! §LОпытный ветеран сычуаньской рукопашной, Ся Цзюн начал свою карьеру в первом пехотном классе Лучжоуской военной академии, возглавляемой самим Ян Сэнем, быстро интегрировавшись в ряды Яна после выпуска. Во время краткого пребывания Яна на посту главы Офиса по надзору за военными делами Сычуани в 1925 году Ся служил капитаном во втором батальоне охраны Офиса. Ся продолжал продвигаться на должности, близкие к Яну, став главой полка охраны штаб-квартиры Яна в 1927 году.\n\nНаконец заняв боевой пост на передовой после Центральной Сычуаньской войны в 1934 году, Ся стал командовать различными смешанными бригадами и был отмечен Ян Сэнем как чрезвычайно эффективный лидер. Хотя он считается очень лояльным и рассматривается как заместитель Ян Сэня, он один из немногих новых генералов, которые были фактически назначены Ян Сэнем за заслуги, а не по кумовству. Таким образом, Ся часто оказывается в разногласиях с некоторыми родственниками генерала Яна, такими как Ян Ханьюй и Ян Ганьцай, которых он считает некомпетентными и недостойными военного командования. Как преимущественно военный доверенный Яна, Ся также стал более вовлеченным в гражданские дела в течение прошедших лет, имея связи с Му Цзыбинем и мастерами в Ассоциации дорожного строительства Сычуани.§!\n\n§YПримечания: Решительный и агрессивный командир, Ся почитается своими подчиненными за то, что вооружил своих офицеров охраны мечами и саблями, чтобы рубить любых солдат, которые осмелятся отступить или дезертировать с поля боя.§!"

 #周维桢
 SZC_zhou_weizhen: "Чжоу Вэйчжэнь"
 SZC_zhou_weizhen_high_command_desc: "§YРодился:§! §L1890 год, уезд Тунлян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aФракция Ян Сэня§!\n§YБиография:§! §LПосещая частную школу в своем родном городе, Чжоу Вэйчжэнь был известен своими академическими успехами, талантом и личным характером. В 1906 году Чжоу покинул свою семью и поступил в Сычуаньскую армейскую начальную школу, преуспев в учебе. Благодаря своему послужному списку он был отправлен в Учанскую армейскую третью среднюю школу в 1909 году и активно участвовал в Учанском восстании. В 1912 году он поступил в первый класс Корпуса квартирмейстеров в Баодинской армейской офицерской школе и окончил ее в 1914 году.\n\nВ следующем году Чжоу поступил на службу под началом Лю Цуньхоу штабным офицером, сражаясь в Войне в защиту нации, а в 1917 году поступил в Армейский университет для дальнейшего обучения. В 1919 году он стал тактическим инструктором в Сычуаньской ускоренной академии и служил под началом Ян Сэня. В 1929 году Чжоу служил инструктором в Центральной армейской школе квартирмейстеров, директором Квартирмейстерского департамента и старшим штабным офицером армии Ян Сэня. В 1935 году Чжоу стал заместителем директора по транспортировке из Чунцина в Лоян, получив прямую линию связи между губернатором Яном и Нефритовым Маршалом.§!\n\n§YПримечания: Будучи также искусным тактиком, Чжоу является известным музыкантом, ученым, каллиграфом и известен своим добрым сердцем.§!"

 #穆子斌
 SZC_mu_zibin: "Му Цзыбинь"
 SZC_mu_zibin_advisor_desc: "§YРодился:§! §L1892 год, уезд Ичан, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §nYCP§!\n§YБиография:§! §LОбучаясь в Академии Люи в юном возрасте, а затем в средней школе Илин, Му Цзыбинь поступил в Учанскую школу права в 1916 году. Переведясь в Пекинский университет Чаоян для изучения права, он окончил его и отправился в Японию в 1921 году для обучения в Токийской школе права за свой счет. В 1925 году он вернулся в Китай и получил должность уездного магистрата уезда Уси.\n\nПо пути к месту службы он столкнулся с бандитами, его имущество было ограблено, а его свита зарублена насмерть. Му, спрятавшись в хижине, сбежал в Ичан, получив запрет от отца когда-либо снова служить чиновником. После входа Ян Сэня в Ичан Му Цзыбинь начал служить советником генерала, управляя «Ичан Дэйли». В 1928 году Му попросил местный гарнизон Сычуани подавить крестьянский бунт и начал серию литературных публикаций в начале 1930-х годов, направленных на продвижение усилий Чжили по объединению.§!\n\n§YПримечания: Довольно коррумпированный, но стойкий в экономическом управлении, Му Цзыбинь — недавний, но преданный последователь Младокитайской партии.§!"

 #劉咸滎
 SZC_liu_xianying: "Лю Сяньин"
 SZC_liu_xianying_advisor_desc: "§YРодился:§! §L1857 год, уезд Шуанлю, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aФракция Ян Сэня§!\n§YБиография:§! §LОтобранный как студент-стипендиат в 1894 году, Лю Сяньин поднялся по социальной лестнице как знаменитый цинский конфуцианский ученый и педагог. Служа секретарем кабинета и членом Сычуаньского провинциального консультативного совета, Лю преподавал в Академии Цзуньцзин и Сычуаньском педагогическом университете, став редактором Хроники уезда Шуанлю.\n\nПреподавая в Академии Гуйсинь, в 1918 году он основал Лэшаньский общественный офис, используя 70% своих доходов от ежедневной каллиграфии для помощи при бедствиях. В 1931 году он публиковал уведомления для продвижения благосостояния и помощи местному сообществу.§!\n\n§YПримечания: Один из «Пяти старейшин и семи мудрецов» Сычуани, роль Лю при дворе Ян Сэня вызывает яркие образы ученых при дворах герцогов древности.§!"

 #劉湘
 SZC_liu_xiang: "Лю Сян"
 SZC_liu_xiang_leader_desc: "§YРодился:§! §L1 июля 1888 года в уезде Даи, провинция Сычуань, Великая Цин§!\n§YБиография:§! §LЛю Сян первоначально приобрел известность в 1920 году, когда он помог привести силы Сычуани к победе над Юньнанью. Он поднялся по служебной лестнице и в конечном итоге возглавил большой контингент сычуаньских сил против Гоминьдана во время Северного похода. Во время этого конфликта он сумел заработать репутацию опытного, хотя и безрассудного командира с многочисленными победами на своем счету. Как только Северный поход был полностью разгромлен, он вернулся в Сычуань и был назначен в Чунцин главой гарнизона города.\n\nХотя его действия во время этого конфликта позволили ему создать свою собственную клику и оставаться силой, с которой нужно считаться в Сычуани, он так и не получил губернаторство провинции, которого, по его мнению, заслуживал. Вместо этого он был подчинен Ян Сэню, верной марионетке У Пэйфу и Чжили. Лю Сян расценил это как оскорбление и мелочное кумовство. В результате он начал питать глубокую обиду как на Ян Сэня, так и на Чжили и их марионеток в Департаменте вооружений.\n\nЭта обида в конечном итоге привела к тому, что он воспользовался моментом после краха гегемонии Цин в первые дни 1936 года. Успешно сплотив своих подчиненных в Ускоренном департаменте против Ян Сэня, Лю Сян сумел заявить права на Чэнду для себя и победить как Арсенальный, так и Баодинский департаменты в серии дерзких военных гамбитов во время Гражданской войны в Сычуани. Сделав себя губернатором Сычуани и перенеся столицу провинции из Чэнду в промышленный центр Чунцин, он начал быструю модернизацию региона, надеясь в конечном итоге свести счеты с Чжили.§!"
 SZC_liu_xiang_commander_desc: "§YРодился:§! §L1 июля 1888 года в уезде Даи, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LПосле окончания Сычуаньского военного колледжа в 1909 году Лю Сян продолжил подниматься в армейских рядах, пока не стал командующим армией Сычуани в 1919 году. Когда в 1920 году разразилась война между Сычуанью и Юньнанью, Сян заработал свои первые военные успехи, оттеснив вторгшиеся силы милитаристов. Когда война закончилась в 1921 году, он был назначен командовать гарнизоном Чунцина. В это время он зарекомендовал себя как сила, с которой нужно считаться, и создал значительное влияние в промышленном центре Сычуани.\n\nКогда Гоминьдан начал Северный поход, Лю Сян повел свои силы против них. Во время этой войны он заработал репутацию смелого командира благодаря ряду оборонительных боев и иногда безрассудных контрнаступлений. Когда Гоминьдан был побежден, он вернулся в Сычуань, где был подчинен Ян Сэню, теперь губернатору Сычуани. Хотя он расценил это как оскорбление, он все же сохранил значительные силы, которые остались верны ему. Не в последнюю очередь благодаря своим успехам в подавлении Северного похода, он является уважаемым военачальником и могущественным милитаристом сам по себе.§!"

 #潘文華
 SZC_pan_wenhua: "Пан Вэньхуа"
 SZC_pan_wenhua_sic_desc: "§YРодился:§! §L16 октября 1886 года в уезде Жэньшоу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LОставив свою бедствующую семью, чтобы найти способы свести концы с концами в Чэнду, Пан Вэньхуа нашел непостоянную работу подмастерьем в шляпной мастерской, прежде чем ему посоветовали вступить в Новую армию Цин. Это ознаменовало начало его военной карьеры, где он служил ординарцем, будучи должным образом принятым в армию рядовым два года спустя.\n\nОкончив Школу ускоренной подготовки офицеров Сычуаньской армии в 1909 году одноклассником Лю Сяна, в 1910-х годах Пан сражался на нескольких постах: в Новой армии Цин в Тибете, под началом сычуаньских генералов Чжун Тидао и Лю Цуньхоу, прежде чем набрать достаточную военную мощь, чтобы некоторое время держать гарнизон в своем собственном районе. Вытесненный из своих владений вокруг Бачжуна Тянь Сунъяо в 1920 году, Пан объединился со своим хорошим другом Лю Сяном, быстро став одним из самых доверенных генералов Лю и лидером Командования умиротворения Восточной Сычуани в 1923 году. Поскольку Лю Сян консолидировал свои владения вокруг Чунцина, Пан занял должности вместе со своим братом Пан Чанъю и в гражданских делах, одновременно служа директором Управления по надзору за коммерческим портом Чунцина, прежде чем был назначен мэром Чунцина в 1929 году.\n\nВ Центральной Сычуаньской войне Пан сражался под командованием Лю Сяна, консультируя Лю в ключевые моменты конфликта. Впоследствии Пан был назначен Лю возглавить Командование по подавлению бандитизма Южной Сычуани против различных бандитов и повстанцев РКГМ (Революционного комитета Гоминьдана), возглавляемых Люй Чао вокруг Ибиня.§!"

 #唐式遵
 SZC_tang_shizun: "Тан Шицзунь"
 SZC_tang_shizun_high_command_desc: "§YРодился:§! §L1883 год, уезд Жэньшоу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LПервоначально вынужденный отцом вести жизнь ученого, Тан Шицзунь набожно ушел из жизни литературы, чтобы продолжить карьеру военного. Вступив в воинскую часть в 1906 году, Тан поступил в Школу быстрой подготовки Сычуаньской армии, попав в класс с такими людьми, как Пан Вэньхуа, Лю Сян, Ван Цзуаньсюй и Ян Сэнь. Будучи сослуживцем по 33-й бригаде с Пан Вэньхуа, дуэт в конечном итоге оказался на службе у своего старого друга Лю Сяна.\n\nПомогая Лю так же, как и Пан, Тан консультировал первого во время вторжения Цай Э в Сычуань в 1916 году, позволив Лю одержать многочисленные победы над юньнаньцами. Всегда амбициозно желая своего следующего повышения, Тан становился недовольным, так как ему постоянно приходилось терпеть жизнь в тени Лю Сяна.\n\nТем не менее, Тан продолжает консультировать Лю Сяна по военным вопросам, являясь способным подчиненным, несмотря на свои высокие амбиции.§!"

 #郭勛祺
 SZC_guo_xunqi: "Го Сюньци"
 SZC_guo_xunqi_commander_desc: "§YРодился:§! §L1895 год, уезд Хуаян, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LРодившийся в крестьянской семье, Го Сюньци вступил в Сычуаньскую армию солдатом в 1912 году и участвовал в кампании против Тибета. Вступив в ряды Пан Вэньхуа в 1915 году после возвращения в Чэнду, Го поднялся от командира взвода до командира полка. Когда Пан Вэньхуа присоединился к Лю Сяну и стал командиром 4-й дивизии Сычуаньской армии в 1921 году, Го последовал за ним и стал командиром 7-й бригады в дивизии Пана.\n\nС тех пор Го служит под началом Лю Сяна вместе с Паном и подружился с Чэнь И. Говорят, что во время Северного похода Гоминьдана Го активно участвовал в левых восстаниях в Сычуани и оказывал помощь левым лидерам, когда Сычуаньская клика подавляла местные социалистические движения.§!\n\n§YПримечания: По слухам, Го Сюньци имеет сильные левые симпатии, включая прямой контакт с такими фигурами, как Лю Бочэн, что вызвало трения и недоверие между ним и Лю Сяном.§!"

 #王陵基
 SZC_wang_lingji: "Ван Линцзи"
 SZC_wang_lingji_army_chief_desc: "§YРодился:§! §L1883 год, уезд Лэшань, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LРодившийся в семье торговца шелком, Ван учился сначала в Сычуани, а затем в Японии. Вступив в Сычуаньскую армию в 1906 году, он оставался нейтральным во время Синьхайской революции. После повышения до командира полка в 1913 году он разгромил революционные силы в Сычуани под командованием Сюн Кэу. Когда началась Война в защиту республики, он встал на сторону Юань Шикая и сражался против Альянса защиты нации. Хотя он успешно взял Чэнду, затем он проиграл Юньнаньской армии и был отстранен от командования.\n\nВ 1921 году Ван присоединился к силам Ян Сэня и стал его начальником штаба, однако, когда Ян был вытеснен из Сычуани, он стал подчиненным Лю Сяна. После завершения Северного похода он все еще оставался подчиненным Лю Сяна.§!"

 #王纘緒
 SZC_wang_zuanxu: "Ван Цзуаньсюй"
 SZC_wang_zuanxu_high_command_desc: "§YРодился:§! §L1886 год, уезд Сичун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LОдноклассник Лю Сяна, Ян Сэня и Пан Вэньхуа, Ван посещал ускоренный курс Сычуаньской армии. В эпоху Республики Ван служил в армии Лю Сяна, которая была ориентирована на Пекин. Во время Сычуаньско-Юньнаньской войны 1920 года Ван был приписан к Ян Сэню Лю Сяном. Позже в том же году Ван поднялся до должности командира бригады и правил Южной Сычуанью. Во время его правления Южная Сычуань увидела много улучшений в сельском хозяйстве, водосбережении, дорогах, тюрьмах и продвижении обучения за рубежом.\n\nВ 1922 году Ян Сэнь вступил в войну против соперничающего сычуаньского милитариста Сюн Кэу, которую первый проиграл. Ян и Ван бежали из Сычуани и сдались У Пэйфу. Благодаря покровительству У, Ян и Ван восстановили свои силы и вернулись на политическую сцену Сычуани. Ян объединился с Лю Сяном и вытеснил ориентированного на Гуанчжоу Сюна из провинции. В следующем году Ян вторгся в Чэнду и оставил Вана управлять городом. Находясь у власти, Ван развил дорогу Чуньси, построил парк Шаошэн, автобусные станции, общественные туалеты и ввел обязательное образование.\n\nВ 1925 году Ян попытался получить полный контроль над Сычуанью, но ему противостояла коалиция всех других сычуаньских милитаристов, не поддерживаемых Гуанчжоу. Вана переманили обратно в армию Лю Сяна, и Яну пришлось прекратить свою борьбу за власть. Расквартированный в Цзычжуне, Ван развивал местные образовательные учреждения.§!"

 #許紹宗
 SZC_xu_shaozong: "Xu Shaozong"
 SZC_xu_shaozong_high_command_desc: "§YBorn:§! §L1892, in Qingxian County, Zhili Province, Great Qing§!\n§YAlignment:§! §aAccelerated Department§! - §aFucheng Clique§!\n§YBackground:§! §LEntering the Sichuan Army Accelerated Training School in 1908, Xu Shaozong joined the 33rd Mixed Brigade of the Qing New Army as a platoon officer after graduation. In 1910, he entered the Sichuan Army Military Academy, studying alongside men such as Liu Xiang. Remaining in his position, and quickly becoming a team officer, after graduation, Xu would serve as a company commander in Zhou Jun's First Division of the Sichuan Army in 1912.\n\nSeeing service in all the battles within the Red Basin from that point onwards, Xu would become an indispensable part of the Accelerated Department's officer corps, and in 1934 became a Lieutenant General and Commander of the 161st Division directly under Liu Xiang.§!"

 #潘昌猷
 SZC_pan_changyou: "Пан Чанъю"
 SZC_pan_changyou_advisor_desc: "§YРодился:§! §L1901 год, уезд Жэньшоу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LСлужа под началом Ян Сэня в Чэнду и учителем под началом Пан Вэньхуа в Чунцине, Пан Чанъю стал директором муниципального казначейства Чунцина в 1928 году и стал соучредителем местного банка. В 1930 году он стал председателем Угольной компании Хуачан, а в следующем году получил должность генерального менеджера Чунцинского гражданского банка. В 1934 году он служил председателем Чунцинской банковской ассоциации и Чунцинской торговой палаты.§!"

 #刘从云
 SZC_liu_congyun: "Лю Цунъюнь"
 SZC_liu_congyun_advisor_desc: "§YРодился:§! §L1883 год, уезд Вэйюань, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LПреподавая в частной школе в ранние годы, молодой Лю Цунъюнь был естественно склонен к использованию мистики гадания и предсказания для обмана людей. В 1911 году он назвал себя «Белый журавль» и основал культ Игуаньдао. Смешивая конфуцианство, буддизм и даосизм, он проповедовал милленаристские пророчества конца света, привлекая множество последователей из-за тяжелых времен, в которые вовлекся Китай.\n\nК 1918 году у него было более 10 000 последователей в Вэйюане и прилегающих уездах, он создал 108 алтарей и шесть Тунбу (главных алтарей), причем высшая власть находилась в собственном доме Лю. В 1925 году созданное им Игуаньдао начало расширяться в военных и политических кругах, создавая различные аванпосты в Чэнду, Чунцине и Ваньсяне. Милитаристы со всей провинции начали искать влияния культа, а именно Лю Сян.\n\nНаняв Цунъюня военным советником, Лю Сян реорганизовал некоторых своих людей исключительно из последователей Цунъюня, и сам Цунъюнь сыграл ключевую роль в Центральной Сычуаньской войне, хотя его полное отсутствие военных навыков оставляет желать лучшего. Тем не менее, его отношения с его покровителем в последнее время становятся все более напряженными, поскольку другие подчиненные Лю Сяна настаивают на его казни.§!"

 #盧作孚
 SZC_lu_zuofu: "Лу Цзофу"
 SZC_lu_zuofu_advisor_desc: "§YРодился:§! §L14 апреля 1893 года в Чунцине, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LБросив школу с отличными оценками после окончания начальной из-за плохих финансов, Лу Цзофу вступил в Тунмэнхой в 1910 году и участвовал в Движении в защиту железных дорог Сычуани. В 1913 году Лу участвовал во Второй революции, и после ее провала покинул Чэнду ради Шанхая. В следующем году он встретил Хуан Яньпэя и завязал с ним глубокую дружбу. Вернувшись в Чунцин работать учителем математики, он стал редактором «Чэнду Цюньбао» и «Чуаньбао», написав множество статей с критикой социальных проблем.\n\nВ 1919 году он занял пост президента и главного редактора «Сычуань Дэйли», активно участвуя в Ноябрьских бунтах и даже вступив в Общество Младого Китая, организованное Ли Дачжао. В 1921 году он стал главой отдела образования офиса Юннин Даоинь в Сычуани, осуществляя различные схемы массового образования, хотя и прерванные из-за междоусобиц милитаристов. В 1924 году Лу был приглашен Ян Сэнем в Чэнду для создания Центра народного образования и участия в различных реформистских усилиях.\n\nВ 1925 году, после провала его экспериментов с образованием, Лу перешел в промышленность, создав Промышленную компанию Миньшэн. В 1926 году, лично собрав капитал, он начал свою транспортную карьеру и основал множество различных инфраструктурных проектов по всей Янцзы. В 1927 году он был назначен Лю Сяном в правительство провинции Сычуань, а к 1935 году закрепился как один из самых влиятельных судоходных магнатов Китая.§!"

 #劉航深
 SZC_liu_hangchen: "Лю Ханчэнь"
 SZC_liu_hangchen_advisor_desc: "§YРодился:§! §L1897 год, уезд Лу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LРодившийся у католического оператора винокурни, Лю Ханчэнь поступил на экономический факультет Пекинского университета в 1917 году. После окончания в 1922 году Лю вернулся в уезд Лу и стал директором средней школы уезда Лу. В 1926 году, после потасовки с местным бюрократом, Лю поклялся заняться политикой, и в следующем году Лю был рекомендован одноклассником Чэнь Сюэчи (тогда подчиненным Ван Линцзи) стать директором Бюро медных монет Чунцина.\n\nПроводя различные денежные реформы, Лю заслужил восхищение Ван Линцзи и поэтому был рекомендован Лю Сяну стать начальником отдела финансового департамента его армии, где он вскоре стал директором. Отходя от обычных методов милитаристов, Лю реформировал и оптимизировал местные налоги и в конечном итоге установил монополию на опиум под контролем Лю Сяна.\n\nВ 1930 году Лю предложил создать Генеральное казначейство армии, которое он использовал для выпуска эффективных государственных облигаций и казначейских векселей. Заняв должность генерального менеджера Сычуаньского провинциального банка в 1935 году, Лю недавно создал «класс подготовки финансистов», исправил земельный налог и недавно ввел 3% налог на бизнес.§!\n\n§YПримечания: Имеет заметное желание богатства и власти, сдерживаемое только его зависимостью от Лю Сяна и враждебностью с другими членами Ускоренного департамента.§!"

 #邓汉祥
 SZC_deng_hanxiang: "Дэн Ханьсян"
 SZC_deng_hanxiang_advisor_desc: "§YРодился:§! §L1888 год, уезд Пань, провинция Гуйчжоу, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LПосещая частные школы на протяжении всего детства, Дэн Ханьсян был принят в Куньминскую нормальную школу в 1905 году, позже поступив в Куньминскую военную академию и Гуйчжоускую армейскую школу. В 1909 году он учился в Хубэйской армейской школе, организуя Юньнань-Гуйчжоускую ассоциацию и работая ее президентом. Во время Учанского восстания Дэн служил капитаном студенческого батальона, а впоследствии служил на других ранних революционных должностях.\n\nПосле Синьхая Дэн стал связным между Юань Шикаем и Ли Юаньхуном, а с 1913 по 1916 год работал с Цай Э, чтобы противостоять восстановлению монархии Юанем. Став пекинским представителем Тан Цзияо, консультантом Государственного совета и военного министерства, Дэн курсировал между Юньнанью, Гуйчжоу, Чжэцзяном и Сычуанью в различных военно-дипломатических ролях.\n\nВ 1922 году Дэн служил представителем Дуань Цижуя при Сунь Ятсене, предлагая союз для свержения клики Чжили. В 1924 году он стал главным советником союзных сил Чжэцзян-Шанхай и помогал в формировании кабинета Дуань Цижуя 1925 года. В 1926 году Дэн последовал за Дуанем в Тяньцзинь, а в 1928 году вернулся в Гуйчжоу, прежде чем стать представителем Лю Сяна в Пекине. С 1935 года Дэн является одним из самых доверенных советников Лю и человеком, с которым Лю консультируется перед каждым важным решением.§!"

 #乔毅夫
 SZC_qiao_yifu: "Цяо Ифу"
 SZC_qiao_yifu_advisor_desc: "§YРодился:§! §L1885 год, уезд Мяньчжу, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §aУскоренный департамент§! - §aКлика Фучэн§!\n§YБиография:§! §LОкончив Сычуаньскую военную академию и Сычуаньскую ускоренную школу в 1909 году, Цяо Ифу стал инструктором в Куньминской военной академии и вступил в Тунмэнхой в том же году. После Синьхая Цяо вернулся в Сычуань и служил командиром батальона под началом Лю Юэхоу. В 1916 году он сражался в Войне в защиту республики.\n\nВ 1919 году он служил представителем Сычуаньской армии под командованием Лю Сяна в провинции Юньнань, а в 1921 году стал главнокомандующим Сычуаньской армии и специальным представителем губернатора Сычуани в Ханькоу. В 1927 году Цяо стал директором Департамента муниципальной полиции Чунцина. А с 1936 года стал старшим штабным офицером в Офисе по умиротворению Сычуань-Сикан.§!"

 #蒙文通
 SZC_meng_wentong: "Мэн Вэньтун"
 SZC_meng_wentong_advisor_desc: "§YРодился:§! §L16 октября 1894 года в уезде Янтин, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §LАполитичный§!\n§YБиография:§! §LСпособный цитировать Пять классиков, Четверокнижие и различные философские работы в юном возрасте, Мэн Вэньтун поступил в частную школу в возрасте пяти лет. В 13 лет он отправился в Чэнду и поселился там. В 1907 году Мэн поступил в Сычуаньскую высшую школу вместе с такими людьми, как Цзэн Ци и Го Можо. В 1911 году Мэн поступил в школу Цуньгу (позже ставшую Национальной академией Сычуани) и интенсивно обучался классике.\n\nПосле выпуска в 1916 году Мэн отправился в Чэнду, чтобы преподавать китайский язык в Провинциальной объединенной китайской школе в 1919 году, а в 1921 году переехал в Чунцин на ту же работу. В 1923 году Мэн поступил на пробную программу Внутренней академии Нанкина для изучения буддизма, а позже снова вернулся в Чунцин, чтобы продолжить преподавание. Создав свою самую известную работу «Сущность древней истории» в 1927 году, Мэн был приглашен преподавать на историческом факультете Национального центрального университета, прежде чем снова вернуться в Сычуань в следующем году, чтобы преподавать в Чэнду.\n\nУйдя в отставку из-за принудительного слияния университетов Чэнду Лю Вэньхуэем, он покинул Сычуань, чтобы преподавать в Хэнаньском университете, а затем в Пекинском университете. С восстановлением стабильности в Сычуани после Центральной Сычуаньской войны и Шанхайского восстания Мэн был приглашен Ян Сэнем вернуться в Сычуань, преподавая на историческом факультете Сычуаньского университета.§!"

 #王恩洋
 SZC_wang_enyang: "Ван Эньян"
 SZC_wang_enyang_advisor_desc: "§YРодился:§! §L1897 год, уезд Наньчун, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §LАполитичный§!\n§YБиография:§! §LУченик Оуян Цзинъу, Ван Эньян начал свою академическую карьеру в средней школе Наньчуна, прежде чем переехать в Пекин в 1919 году, чтобы слушать лекции на философском факультете Пекинского университета. Оцененный Лян Шумином, он обучался под его началом. В 1923 году Ван отправился в Китайскую внутреннюю академию в Нанкине, основанную Оуян Цзинъу, для изучения буддийских писаний и интенсивно участвовал в буддийских философских дебатах, охвативших Китай в то время.\n\nВ 1925 году Эньян стал директором и профессором специального курса Внутренней академии, а в 1927 году вернулся в Сычуань после приостановки занятий в Академии из-за Северного похода. Создав Учебную комнату Гуйшань в Наньчуне, он продолжил преподавать буддизм и конфуцианство студентам, а в 1930 году был приглашен в Буддийское общество Чэнду. На данный момент Эньян сосредоточил свои усилия на преподавании и письме, создав множество текстов по буддизму.§!"

 #溫少鶴
 SZC_wen_shaohe: "Вэнь Шаохэ"
 SZC_wen_shaohe_advisor_desc: "§YРодился:§! §L1888 год, уезд Ба, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §LАполитичный§!\n§YБиография:§! §LСын престижной семьи хуэйцев в уезде, Вэнь Шаохэ имел стандартную юность с прогрессивным образованием, что затем подтолкнуло долгую карьеру в преподавании. Став директором средней школы уезда Ба, он позже преподавал в Педагогической школе Восточной Сычуани, а с 1914 по 1921 год был инспектором Офиса по содействию образованию уезда Ба, позже став директором Бюро образования уезда Ба. В 1922 году Вэнь был отправлен представителем Чунцинской торговой палаты на Всекитайскую конференцию торговых палат в Шанхае, где встретился с различными известными деятелями, такими как Лян Цичао, Чжан Тайянь и Хуан Яньпэй.\n\nВ 1923 году он стал директором Чунцинской торговой палаты и председателем Ассоциации шелковой промышленности. В 1928 году Вэнь был переизбран в Чунцинскую торговую палату, фактически установив свое доминирование на бесчисленное количество сроков подряд. В том же году Вэнь работал в подготовительном комитете Чунцинского университета, а в 1932 году основал свою собственную среднюю школу и расширил свои учебные заведения, включив в них три школы к 1935 году.§!\n\n§YПримечания: Считающийся популярным, прилежным и аскетичным, Вэнь Шаохэ пользуется любовью среди хуэйцев, коммерсантов и милитаристов Сычуани и является одним из самых благоприятных местных деятелей Сычуани.§!"

 #李劼人
 SZC_li_jieren: "Ли Цзэжэнь"
 SZC_li_jieren_advisor_desc: "§YРодился:§! §L20 июня 1891 года в Чэнду, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §LАполитичный§!\n§YБиография:§! §LРодившийся как Ли Цзясян, Ли Цзэжэнь поступил в Сычуаньскую высшую школу в 1907 году, а в 1912 году стал главным писателем и главным редактором газеты «Чэнду Цюньбао» до 1918 года. В следующем году Ли организовал и руководил работой отделения Ассоциации Младого Китая в Чэнду, редактируя ее еженедельный журнал, и уехал во Францию в том же году на учебу. В 1923 году он написал новеллу «Сочувствие», а в 1924 году вернулся в Китай из Франции, чтобы стать главным редактором «Сычуань Дэйли».\n\nПосле закрытия газеты Ян Сэнем Ли стал профессором Университета Чэнду в 1926 году, а затем директором как факультета свободных искусств, так и подготовительного отделения. В это время Ли также работал редактором «Чэнду Миньли Дэйли». В 1930 году, из-за разрухи, приписываемой коррумпированным бюрократам и милитаристам, Ли ушел с должности в университете и стал владельцем ресторана, вернувшись к «официальной» жизни только в 1933 году, когда он стал директором Завода по ремонту машин Миньшэн в Чунцине.§!"

 #曾俊臣
 SZC_zeng_junchen: "Цзэн Цзюньчэнь"
 SZC_zeng_junchen_advisor_desc: "§YРодился:§! §L6 сентября 1888 года в уезде Вэйюань, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §LАполитичный§!\n§YБиография:§! §LРаботая подмастерьем на солеварне в юном возрасте в Лучжоу, Цзэн Цзюньчэнь уволился с работы в 1912 году и открыл зерновой магазин. В 1914 году он открыл ресторан, самый большой в Лучжоу, а в 1920 году стал партнером Ху Шаочжана и других для создания соляной компании в Чунцине. В 1922 году Цзэн основал гидроэлектростанцию, а в 1924 году стал президентом Чунцинского соляного лобби. Поддерживая тесные связи с бюрократами и милитаристами, соляной бизнес Цзэна принес ему состояние к 1928 году.\n\nВ то же время Цзэн стал соучредителем Табачной фабрики Шуи вместе с Шуй Сихэном, хотя из-за влияния Ван Цзунсюя соляной бизнес Цзэна обанкротился, и он впоследствии служил менеджером собственного бизнеса по перевозке соли Пан Чанъю. Как один из самых плодовитых и «открытых» торговцев опиумом в стране, Цзэн вел переговоры с другими ведущими торговцами опиумом Сычуани о создании массовой монополии.§!"

 #任鸿隽
 SZC_ren_hongjun: "Жэнь Хунцзюнь" #任鸿隽
 SZC_ren_hongjun_advisor_desc: "§YРодился:§! §L20 декабря 1886 года в Дяньцзяне, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §LАполитичный§!\n§YБиография:§! §LОдин из самых выдающихся ученых Китая, Жэнь Хунцзюнь начал свою академическую жизнь с поступления в Академию Дяньцзян в 1898 году. Умный, прилежный и один из лучших студентов, Жэнь сдал последний императорский экзамен в Китае, а в 1908 году отправился в Японию изучать прикладную химию. В 1909 году он вступил в Тунмэнхой по представлению Дань Маосиня и служил президентом Сычуаньского отделения Тунмэнхоя.\n\nНаписав революционный манифест с критикой Цин, Жэнь курировал спонсирование революционеров для обучения в Токио, среди которых были Чан Кайши и Чжан Цюнь. После Синьхая Жэнь был секретарем Сунь Ятсена, но ушел в отставку и отправился в США, чтобы получить степень магистра химии в Колумбийском университете. Вернувшись в 1918 году, Жэнь служил директором Департамента образования Министерства образования, профессором Пекинского университета, редактором Коммерческой прессы в Шанхае и вице-президентом Национального Юго-Восточного университета.\n\nВ 1935 году Жэнь стал президентом Сычуаньского университета, начав амбициозную программу многогранной реформы его внутренних дел. Поскольку его карьера находится на пике, самое насущное, что его беспокоит, — это отсутствие внутренней стабильности в Китае и Сычуани.§!"

 #蒋逵
 SZC_jiang_kui: "Цзян Куй"
 SZC_jiang_kui_navy_chief_desc: "§YРодился:§! §L1893 год, уезд Ба, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §LАполитичный§!\n§YБиография:§! §LОбучаясь в Чунцинской академии Гуанъи, Цзян Куй продолжил обучение в Шанхайской средней школе Наньян, прежде чем начать свою морскую карьеру в Колледже торгового флота Усун. В 1914 году, вступив во флот в качестве стажера, Цзян перешел к Третьему измерению войны в 1915 году после поступления в Пекинскую авиационную школу. Хотя после окончания Цзян вернулся во флот и дослужился до звания первого лейтенанта.\n\nВ 1920 году он отправился в Великобританию и США изучать авиастроение и летные технологии, затем вернулся в Китай в 1922 году, чтобы служить летным инструктором и директором по образованию в Пекинском авиационном учебном институте. Возглавляя военно-воздушные силы в войнах Цзянсу-Чжэцзян и Чжифэн, Цзян был повышен до заместителя командующего ВВС Третьей армии, прежде чем был переведен в Авиационное бюро в 1925 году.\n\nРассматривая возможность дезертирства во время Северного похода, Цзян остался с Бэйяном, а в 1928 году посетил Францию и Германию для изучения их воздушных флотов. Вернувшись служить снова инструктором по авиации, Цзян был нанят Лю Сяном в 1930 году, чтобы помочь в создании ВВС и ВМС в Сычуани. В 1935 году Цзян ушел в отставку, чтобы служить профессором в Чунцинском университете, однако он остается в резерве для любого сычуаньского милитариста, которому могут понадобиться его услуги.§!"

 #鄭少愚
 SZC_zheng_shaoyu: "Чжэн Шаоюй"
 SZC_zheng_shaoyu_air_chief_desc: "§YРодился:§! §L9 октября 1911 года в волости Сянду, уезд Цюй, провинция Сычуань, Великая Цин§!\n§YПриверженность:§! §L«Аполитичный»§!\n§YБиография:§! §LЧжэн Шаоюй пришел в этот мир накануне революции в Китае. Он поступил в начальную школу в возрасте семи лет и был принят в Нанкинскую среднюю школу Учжоу в 15 лет, прежде чем перевестись в среднюю школу Дунфан. Затем он поступил в военную академию в Чунцине, где подружился со своими земляками У Маодэ и Лэй Сядянем, которые питали сильные левые симпатии. Благодаря частому общению с ними он выработал политическое мировоззрение, симпатизирующее прогрессивным идеалам и левым делам.§!"

 #樂以琴
 SZC_yue_yiqin: "Юэ Ицинь"
 SZC_yue_yiqin_high_command_desc: "§YРодился:§! §L23 ноября 1914 года в уезде Лушань, город Яньань, провинция Сычуань, Китайская Республика§!\n§YПриверженность:§! §L«Аполитичный»§!\n§YБиография:§! §LЮэ Ицинь родился (как Лэ Ичжун) в семье баптистов. Его отец держал чайную и кальянный бизнес, а его мать была тибетского происхождения. В 1900 году Г.Дж. Опеншоу, миссионер из северной баптистской церкви США, прибыл в Яньань и обратил всю семью Юэ в христианство.\n\nОкончив начальную школу Лушань Миндэ в 1926 году, Юэ Ицинь поступил в неполную среднюю школу Чжанцзешань Миндэ. После окончания он поступил в старшую среднюю школу Западно-китайского объединенного университета, прежде чем посещать университет в провинции Шаньдун. Встревоженный Шанхайским восстанием в 1932 году, он вернулся домой с националистическим пылом, чтобы помочь растущим военно-воздушным силам Сычуани в качестве дерзкого аса-истребителя.§!"

