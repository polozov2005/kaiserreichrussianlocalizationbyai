l_russian:

### Parties ###
SZC_totalist_party: "КСП-ОКС"
 SZC_totalist_party_long: "Китайская синдикалистская партия — Общество красного сердца (Чжунго Гунтуаньдан — Чисиньшэ)\n§LПолитическая сила, чья популярность резко возросла в последние годы. Эта более активная и радикальная фракция сычуаньской КСП сплотилась вокруг одного из главных профсоюзных организаторов провинции, Ян Аньгуна.\n\nДействуя в союзе с У Юйчжаном и другими членами провинциальной КСП, Ян и его коллеги были ответственны за организацию забастовок и восстаний в середине 1920-х годов. Однако в политическом плане Ян по-настоящему проявил себя как глава «Общества красного сердца» — одной из многочисленных подпольных рабочих организаций в Чунцине, где рабочий класс был сосредоточен не на полях, а на многочисленных верфях, в доках и на шелковых фермах порта. Энергичные, выступающие за роль авангарда и не чурающиеся силовых акций, радикалы Яна не питают особого доверия к демократическому процессу, поскольку эра милитаристов лишь доказала, насколько корыстными и продажными являются демократические и существующие гражданские институты по всему милитаристскому Китаю.\n\nВ отличие от других провинциальных отделений КСП, которые раскололись на отдельные фракции радикалов и умеренных, сычуаньская КСП, похоже, избежала этой участи. Возможно, это связано с тем, что особенно тяжелое положение провинции способствовало большему идеологическому единству, чем в других местах, или же просто благодаря способности У Юйчжана идти на компромисс и стабилизировать левый фронт в провинции.§!\n"
 SZC_syndicalist_party: "КСП-О"
 SZC_syndicalist_party_long: "Китайская синдикалистская партия — Ортодоксальная (Чжунго Гунтуаньдан — Чжэнтун Пай)\n§LНемного отклоняясь от более урбанистического, индустриального и профсоюзного синдикализма основного течения КСП, партия в Сычуани берет свое начало в основном из группы сычуаньской интеллигенции, отправившейся во Францию по программам «работа-учеба» во время Великой войны, возглавляемой, среди прочих, У Юйчжаном.\n\nСвязанный с различными китайско-французскими образовательными инициативами и проведя время во Франции как во время войны, так и во время последовавшей революции, У Юйчжан и его товарищи-интеллектуалы вернулись в Китай, чтобы воспользоваться волнами революционного пыла, последовавшими за окончанием Вельткрига. Вдохновленный социалистической мыслью, но разочарованный отсутствием единства в китайской революции, которая раскололась на революционный и реформистский лагеря, У провел 1920-е годы за чтением трудов социалистических мыслителей, таких как Джон Рид, придя к выводу о необходимости четкой идеологической повестки дня, которую он нашел в КСП. Эта повестка была расширена в манифесте У о Сычуаньской автономной федерации, призывающем не только к трансформации социальной экономики и программам взаимопомощи для рабочих, но и к прекращению «социального паразитизма» и пересмотру устаревшей системы образования Китая.\n\nВ отличие от других провинциальных отделений КСП, которые раскололись на отдельные фракции радикалов и умеренных, сычуаньская КСП, похоже, избежала этой участи. Возможно, это связано с тем, что особенно тяжелое положение провинции способствовало большему идеологическому единству, чем в других местах, или же просто благодаря способности У Юйчжана идти на компромисс и стабилизировать левый фронт в провинции.§!\n"
 SZC_radical_socialist_party: "Красная армия Вост. Сычуани"
 SZC_radical_socialist_party_long: "Партизанские силы Красной армии Восточной Сычуани (Чуаньдун Хунцзюнь Юцзидуй)\n§LНа протяжении всей эры милитаристов Сычуань, как и ее южные соседи, была очагом активности социалистических партизан и интеллектуалов, хотя это сильно уравновешивалось репрессиями милитаристов и влиянием джентри. Будучи краеугольным камнем в сельскохозяйственном сердце Китая, аграрная природа Сычуани привела к тому, что Красный бассейн стал плодородной базой поддержки, сочувствующей делу социализма.\n\nВо время Северного похода многие члены как Левого Гоминьдана, так и КСП, некоторые из которых прошли подготовку в качестве младших офицеров в Вампу, вели нерегулярные действия, чтобы нарушить передвижения сил милитаристов. Одной из главных акций было неудачное восстание в Лучжоу-Шуньцине под руководством Лю Бочэна, Чжу Дэ и Ян Аньгуна в конце 1926 года, целью которого было поднять восстание в тандеме с возобновленным наступлением НРА и нарушить снабжение милитаристов в сычуаньской глубинке. Хотя восстание и не увенчалось успехом, оно раздуло революционное пламя среди крестьянства, усовершенствовало стратегию будущей партизанской войны и вдохновило других, таких как Ли Цзяцзюнь и Ван Вэйчжоу, также вести вооруженное сопротивление в сельской местности, что привело к удивительно успешному восстанию в Гуцзюньба в 1929 году.\n\nСмута 1930-х годов привела к тому, что крестьянские повстанцы, в основном в Восточной Сычуани, медленно оттеснялись, так как объединяющиеся милитаристы, подобные Ляо Чжэню, стремились полностью их уничтожить. Несмотря на это, сопротивление было решительным, и на место павших мобилизовывалось все больше партизанских ячеек. В последние годы эти ополченцы и революционеры были реорганизованы в Партизанские силы Красной армии Восточной Сычуани, возглавляемые комитетом во главе с Ван Вэйчжоу и разделенные на три маршрутные армии, чья мощь подкрепляется более иррегулярными формированиями, такими как Фулинская крестьянская армия и повстанческие ячейки КСП. Но при всех этих событиях еще предстоит выяснить, хватит ли у последних оплотов аграрного блока Гоминьдана и КСП в Сычуани сил, чтобы перехватить контроль над разделенной провинцией, когда придет время.§!\n"
 SZC_social_democrat_party: "Полк девяти человек"
 SZC_social_democrat_party_long: "Полк девяти человек (Цзюжэньтуань)\n§LИмея за плечами историю сопротивления Бэйянскому статус-кво и влиянию как с Севера, так и с Юга, Сюн Кэу сделал себе имя в Сычуани в хаотичные ранние годы провинции, сначала против Юань Шикая, а затем несколько раз против различных сычуаньских автократов. Он и его «Полк девяти человек» — соратники Сюна, учившиеся вместе с ним в Токийской академии Дунбин, — присоединились к политической борьбе в Сычуани, причем Сюн спорадически занимал пост губернатора на протяжении 1920-х годов, будучи известным своей верой в провинциальное самоуправление и федеральную автономию. Но среди бывших «союзников»-милитаристов их идеологические ниши вбивали клин между ними и любыми потенциальными военными лидерами, с которыми они пытались объединить Сычуань; в частности, их предали Лю Цуньхоу, Лю Сян и Лю Чэнсюнь, прежде чем они были полностью разгромлены коалицией милитаристов в конце 1923 года.\n\nПосле изгнания из Сычуани Сюн и его союзники стали еще больше симпатизировать федерализму в Хунани, основываясь на неудачных попытках конституционализма и региональной автономии, впервые предпринятых в Сычуани. Именно федералистские наклонности Сюна ускорили его официальный разрыв с Гоминьданом в 1924 году и задержание его и Юй Цзитана в крепости Хумэнь. Но с началом Северного похода и переключением внимания Чан Кайши на фронт, Сюн был тихо помилован Ху Ханьминем и отправлен в Сычуань, чтобы собрать остатки своей армии.\n\nПосле поражения Гоминьдана «Полк девяти человек» Сюна снова оказался под ударом, был быстро вытеснен из Юго-Восточной Сычуани и временно разбил лагерь в Хунани, прежде чем достичь соглашения с губернатором Хунани Чжао Хэнти о размещении вокруг города Тунжэнь. Именно здесь Сюн продолжает планировать свое возвращение, совершенствовать свои планы и вербовать новых офицеров для своего дела.§!\n"
 SZC_social_liberal_party: "Офицерский департамент"
 SZC_social_liberal_party_long: "$SZC_social_liberal_party_long_tt$\n§LВ отличие от других департаментов, которые берут свои названия от ключевых военных академий, Офицерский департамент развился из выпускников четвертого и пятого классов Сычуаньской начальной военной школы, которая также была создана при администрации Цин. Эти офицеры стали ключевым компонентом под руководством Баодина, причем Ли Цзяюй и Ло Цзэчжоу командовали своими силами под началом Дэн Сихоу до их разрыва с ним в конце 1929 года.\n\nВ 1927 году Ли и Ло были расквартированы как дивизионные командиры вокруг Суйнина, решив сформировать Общество Цуньи — свободную организацию, стремящуюся привлечь новых выпускников Сычуаньской офицерской школы. Распад Сычуаньской пограничной оборонительной армии и вынужденная отставка ее командира Лю Чэнсюня во время войны в Центральной Сычуани также привели одного из его подчиненных, Лай Синьхуэя, в Офицерский департамент, пополнив их ряды.\n\nНе решаясь связать свою судьбу с кем-либо из своих значительно более сильных противников, «Офицеры» в значительной степени преуспели в сохранении нейтралитета как к братьям Лю, так и к провинциальным лидерам Чжили на протяжении начала 1930-х годов. Однако уникально то, что командиры низшего звена этого департамента удивительно прогрессивны, и эти идеалы отстаивает даже сам Ли Цзяюй, что позволяет Офицерскому департаменту быть восприимчивым к элементам федерализма, демократии и даже некоторым аспектам Гоминьдана.§!\n"
 SZC_market_liberal_party: "Промышленный корпус"
 SZC_market_liberal_party_long: "Промышленный корпус (Шие-туань)\n§LОснованный в невоенном секторе, Промышленный корпус в основном состоит из выпускников Сычуаньской академии высшего образования, ориентированных на центр и правое крыло Гоминьдана. Не имея реального центрального лидера из-за гибридного гражданско-военного характера группы, Промышленный корпус начинал как подчиненные в кампаниях Сюн Кэу против Юань Шикая и других милитаристов в конце 1910-х годов. Хотя изначально они были союзниками, недовольство Сюна назначением Сунь Ятсеном Ян Шуканя губернатором Сычуани в 1918 году, а также удаление фигур Промышленного корпуса из армии Сюном привело к тому, что корпус воспользовался шансом во время вторжения Юньнани в 1920 году, чтобы восстать против него, что привело к изгнанию корпуса из провинции.\n\nАктивность Промышленного корпуса в Сычуани возобновилась только после возвращения Люй Чао в провинцию в июне 1923 года по приказу Сунь Ятсена. Стравив провинциальных лидеров Лю Сяна, Ян Сэня и даже Юань Цзумина друг с другом, Люй Чао оказался с небольшой зоной обороны и армией, пытаясь сплотить своих подчиненных для дела Гоминьдана перед неудачным Северным походом. После краха правительства Гуанчжоу Люй снова оказался в изоляции, зажатый вдоль границы Юньнани и Сычуани, с враждебными внешними силами, ожидающими подходящего момента для нападения.\n\nЭтот шанс появился с наступлением 1930-х годов и началом кампаний по окружению в горах. Зажатый людьми Лю Вэньхуэя с запада, Южным командованием по подавлению бандитизма Пань Вэньхуа с севера и востока, а также Комиссией обороны Чжаотуна Лун Юня с юга, у Люй Чао не было иного выбора, кроме как раствориться в сельской местности, где его потрепанные силы пытаются установить контакт с основной хунтой Правого ГМД в Гуйчжоу. Даже если сейчас они считаются истощенной силой, любая форма катастрофической нестабильности может стать вторым дыханием, в котором так отчаянно нуждается Люй.§!\n"
 SZC_social_conservative_party: "Баодинский департамент"
 SZC_social_conservative_party_long: "$SZC_social_conservative_party_long_tt$\n§LОдна из немногих военных фракций, не имеющих корней в Сычуани. Баодинский департамент — это, по сути, триумвират региональных милитаристов, которые вместе окончили престижную Военную академию Баодин и служили вместе. Три лидера Баодинского департамента — Лю Вэньхуэй, Дэн Сихоу и Тянь Сунъяо — все они поднялись как ключевые игроки в политике Сычуани, находясь в союзе против Ян Сэня в 1925 году и сформировав Офис командования трех армий в Чэнду в следующем году.\n\nВстроившись в систему «Гарнизонных зон», которая была распространена в провинции, Баодинский департамент пытался работать с теми, кому, казалось, благоволила фортуна после поражения Северного похода, коллективно контролируя большие участки севера и запада Сычуани. Связанные с местными джентри и готовые прислушаться к начинающим интеллектуалам провинции, они пытались закрепиться в провинциальной политике.\n\nНесмотря на это, усиление консолидации армий Баодина под его руководством, а также неоднозначный послужной список в военных и гражданских делах вызвали расколы в департаменте, наиболее ярко проявившиеся в восстании Офицерского департамента в начале войны в Центральной Сычуани в конце 1929 года. Даже в высших эшелонах этой клики Лю, Дэн и Тянь иногда расходятся во мнениях по вопросам управления и верности, хотя крупных столкновений, как правило, удавалось избегать благодаря объединяющему присутствию Объединенного офиса трех армий, ныне расквартированного в Яане под эгидой генерала Сян Чуаньи.\n\nКак правило, более прагматичный, в случае если провинция снова погрузится в тотальную войну, как это часто случалось в прошлом, поддержка Баодинского департамента может стать решающим фактором в определении победителя, даже если они решат забрать корону себе.§!\n"
 SZC_authoritarian_democrat_party: "Департамент ускоренного обучения"
 SZC_authoritarian_democrat_party_long: "Департамент ускоренного обучения (Сучэн Си)\n§LЯдро Департамента ускоренного обучения было подготовлено в Сычуаньском армейском корпусе «Бяньму» и Сычуаньской академии ускоренного обучения армии, созданных губернаторами Силяном и Чжао Эрсунем в 1909 году, причем генералы поднялись по служебной лестнице до провинциальной известности после Синьхайской революции. После распада центральной власти в Сычуани Департамент ускоренного обучения нарастил свою базу власти через двух ключевых игроков в сычуаньской политике: Ян Сэня и Лю Сяна.\n\nЯн Сэнь и его клика поднялись через ряды различных других армий по всей Сычуани в начале 1920-х годов, в конечном итоге став достаточно мощными, чтобы заявить о своих правах в сычуаньской милитаристской схватке, хотя они и сталкивались с неудачами в сохранении своих владений по мере колебания власти Яна. Фракция Яна в Департаменте ускоренного обучения также поддерживает тесные связи с У Пэйфу и кликой Чжили: Яну было позволено наращивать силы в Западном Хубэе с разрешения Нефритового маршала, что помогло ему вернуться во время неудачных войн за объединение Сычуани 1924 года и в триумфальном возвращении Яна в провинцию в 1926 году.\n\nСоперничая со своим коллегой, Лю Сян стал одной из главных фигур в изгнании юньнаньского контроля из Сычуани в эпоху милитаристов, используя свой политический такт, чтобы стравливать врагов друг с другом и возвышаться в процессе. Командуя одной из самых грозных армий провинции и контролируя Чунцин, Лю использовал свой контроль над рекой Янцзы, отношения со своим дядей Лю Вэньхуэем, а также договоры с маршалом Лиги Сунь Чуаньфаном, чтобы стать одним из величайших потенциальных соперников губернатора Яна.\n\nИз-за изменчивой природы сычуаньской политики Ян и Лю работали вместе во многих случаях, подписав Конвенцию Бинъинь 1926 года, а также еще одно перемирие после войны в Центральной Сычуани. Однако за последние несколько лет напряженность в Департаменте ускоренного обучения вновь разгорелась, и старая поговорка никогда не звучала правдивее: держи друзей близко, а врагов еще ближе.§!\n"
 SZC_paternal_autocrat_party: "Департамент вооружения"
 SZC_paternal_autocrat_party_long: "Департамент вооружения (Убэй Си)\n§LБерущий начало из движения за перевооружение Сычуани поздней Цин, Департамент вооружения остается старейшей из клик в Сычуани, состоящей преимущественно из высокопоставленных военных деятелей, окончивших Сычуаньскую академию вооружения, основанную в 1902 году. После захвата внутренней провинции Ху Цзинъи и Инь Чанхэном в 1911 году влияние Департамента вооружения только усилилось: все эшелоны сычуаньского командования были укомплектованы выпускниками и бывшими студентами академии. Во время правления Юань Шикая Департамент вооружения раскололся на фракцию лоялистов Ху Цзинъи и Сычуаньскую армию национальной защиты Лю Цуньхоу. Однако, когда Ху был переведен в Пекин, а его преемник Чэнь Хуань объявил о независимости провинции, новый де-юре губернатор Ло Пэйцзинь имел мало влияния в провинциальных делах, что привело к его свержению Лю Цуньхоу.\n\nЛю оставался во главе Департамента вооружения в последующие годы, возглавляя кампании против внешних сил из Юньнани и Гуйчжоу, армии Сюн Кэу и бандитов, а также принимая различные стороны в десятилетиях милитаристских склок в Сычуани, то приходя к власти, то теряя ее. В конечном итоге он был назначен Чжили главой Управления по надзору за обороной границы Сычуань-Шэньси в 1924 году, получив юрисдикцию на северо-востоке Сычуани.\n\n«Толстолицый генерал» (как его стали называть из-за его упрямого, стойкого характера) провел большую часть конца 20-х и начала 30-х годов, сотрудничая с местными джентри, объединяясь с другими регионалистами и создавая новый Офицерский корпус вооружения с такими людьми, как Ляо Чжэнь и Лю Банцзюнь. Одновременно Лю Цуньхоу был занят подавлением растущего аграрного социалистического движения в Восточной Сычуани, с переменным успехом.§!\n"
 SZC_national_populist_party: "МКП"
 SZC_national_populist_party_long: "Младокитайская партия (Чжунго Цинняньдан)\n§LРожденная из студенческого «Общества Молодого Китая», Младокитайская партия стала одним из преемников общества, поскольку оно раскололось на «националистическую», «социалистическую» и «идеалистическую» фракции, возглавляемые Цзэн Ци и Ли Хуаном, Ли Дачжао и Ван Гуанци соответственно. Отправившись во Францию на учебу, Цзэн Ци, Ли Хуан и другие члены их националистической фракции вступали в споры с другими студентами во Франции, такими как Чжоу Эньлай, Цай Юаньпэй и Ли Шицзэн.\n\nИногда переходящие в насилие споры и накопление поддержки Китайской синдикалистской партии привели к тому, что Цзэн и Ли сформировали свою собственную партию, объявив о создании Младокитайской партии в 1923 году под Парижем. Быстро развиваясь среди китайских студенческих организаций, Младокитайская партия заняла конкретную позицию против сотрудничества Гоминьдана с КСП, и МКП вернулась в Шанхай, основав ряд политических обществ и газет в 1924 году.\n\nПоскольку различные высшие представители МКП происходят из Сычуани, партия обладает популярной и укоренившейся базой поддержки среди коалиции милитаристов и гражданских институтов. Наиболее примечательно, что отделения МКП в Сычуани добились наибольших успехов в межвоенный период, предоставив милитаристам бассейна партийную платформу, которая позволяет им поддерживать идеологический паритет с системами партийных армий Гоминьдана. Функционеры МКП глубоко проникли как в сети джентри, так и в высшее военное командование Ян Сэня, Лю Цуньхоу, Лю Сяна и большей части Баодинского департамента, найдя там готовый дом. Хотя Ян Шумин является лидером провинциального отделения сычуаньской МКП, главным лидером власти в этом районе является Лю Сыин, радикальный фронтмен МКП, стремящийся реализовать националистические планы Цзэн Ци. Бок о бок с армиями милитаристов Ян и Лю работают над реализацией видения Партии китайской молодежи.§!\n"

