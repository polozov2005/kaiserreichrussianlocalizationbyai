 SZC_seeking_help: "Уже ищем помощи в борьбе с голодом в другом месте"
 SZC_chose_famine_relief: "Активно либо §Y$SZC_Service_For_Food$§!, либо §Y$SZC_Labour_Relief$§!"
 SZC_zhili_conquer_QIE_flag: "§LЦин были побеждены!§!"
 SZC_zhili_held_elections_flag: "§LБэйянская республика провела президентские выборы§!"
 SZC_purging_administration: "§RМы проводим чистку администрации.§!"

### Focuses ###
 sichuan_focus: "Фокусы [ROOT.GetName]"

 SZC_Chengdu_Chongqing_Railway: "Железная дорога Чэнду-Чунцин"
 SZC_Chengdu_Chongqing_Railway_desc: "Большая часть Сычуани по-прежнему полагается на те же грунтовые дороги, которые использовались с начала имперской эры. Мы не можем иметь современную экономику без современной инфраструктуры. Соединив наши самые важные города современной железнодорожной линией, мы создадим фундамент для новых отраслей промышленности Сычуани."

 SZC_New_Commercial_Zones: "Новые коммерческие зоны"
 SZC_New_Commercial_Zones_desc: "Государство в одиночку не может принести процветание своему народу. Выделив определенные части Сычуани в качестве особых коммерческих зон с привлекательными ценами, мы сможем привлечь инвестиции из других частей Китая, а также из-за рубежа."

 SZC_The_Yangtze_Lifeline: "Линия жизни Янцзы"
 SZC_The_Yangtze_Lifeline_desc: "Будучи страной, не имеющей выхода к морю, мы ведем большую часть нашей торговли по реке Янцзы и полагаемся на торговые суда, чтобы добраться до остальной части Китая и за его пределы. Сотрудничая с надежным производителем, мы можем гарантировать, что у нас будет достаточно судов для расширения нашей торговли по реке."

 SZC_Restart_The_Agricultural_Sector: "Перезапустить сельскохозяйственный сектор"
 SZC_Restart_The_Agricultural_Sector_desc: "Наше сельское хозяйство сильнее всего пострадало от гражданской войны и последовавшей засухи, что оставило от него лишь тень былого величия. Если мы хотим восстановиться, необходима масштабная программа ремонта систем Дуцзянъянь и восстановления ферм. Это станет первым шагом на пути к превращению Сычуаньской впадины в житницу Китая."

 SZC_Rural_Construction_College: "Колледж сельского строительства"
 SZC_Rural_Construction_College_desc: "Сосредоточенность на нашем промышленном центре оставила сельские регионы позади, и многие сельские общины выглядят так же, как во времена старых династий. При таком огромном неиспользованном потенциале было бы расточительством не привнести чудеса современной инженерии для улучшения жизни — и производительности — наших фермеров."

 SZC_Rice_And_Wheat_Improvement_Station: "Станция улучшения риса и пшеницы"
 SZC_Rice_And_Wheat_Improvement_Station_desc: "Устаревшие методы ведения сельского хозяйства приводят к значительным потерям продукции во всем нашем сельскохозяйственном секторе. Модернизация способов обработки наших культур значительно улучшит как урожайность, так и качество того, что ежегодно производят наши фермы, что должно во многом предотвратить любые будущие нехватки."

 SZC_Expand_Dujiangyan_Irrigation_System: "Расширить ирригационную систему Дуцзянъянь"
 SZC_Expand_Dujiangyan_Irrigation_System_desc: "Ремонт Дуцзянъянь поначалу был достаточным, но с ростом нашего производства и богатства пришло время модернизировать и расширить ее. С помощью навыков и знаний, предоставленных Колледжем сельского строительства, мы снова превратим эти древние каналы в жемчужину сельского хозяйства вдоль Янцзы!"

 SZC_Industrial_fabric: "Промышленная ткань"
 SZC_Industrial_fabric_desc: "Индустриализация привела к огромным улучшениям как качества, так и количества в текстильной промышленности, однако плоды этих разработок еще не получили широкого распространения на наших фабриках и в мастерских. Пришло время начать внедрять промышленные методы производства шелка в больших масштабах и обеспечить дополнительные ткани для военных."

 SZC_Tianfu_Mining_Bureau: "Тяньфуское горное бюро"
 SZC_Tianfu_Mining_Bureau_desc: "Инвестируя в расширение нашего нынешнего горнодобывающего сектора, мы сможем добраться до больших богатств Сычуани. Это будет жизненно важно не только для укрепления нашей экономики, но и поможет нам оставаться независимыми от иностранного импорта."

 SZC_Zigong_Saltworks: "Цзыгунские солеварни"
 SZC_Zigong_Saltworks_desc: "Соль была важным краеугольным камнем экономики Сычуани с древних времен. Хотя она больше не является основой, которой была раньше, в нашей индустриализированной экономике, расширяя и модернизируя наши соляные шахты, мы обеспечим, чтобы это оставалось прибыльным предприятием для нас и в будущем."

 SZC_Extract_Natural_Gas: "Добывать природный газ"
 SZC_Extract_Natural_Gas_desc: "Сычуань располагает крупнейшими запасами природного газа в Китае, но большая их часть остается нетронутой. Мы должны инвестировать в этот сектор, чтобы эти богатства не пропадали зря."

 SZC_Extract_Natural_Gas_decision: "Добывать природный газ в [FROM.GetName]"
 SZC_Extract_Natural_Gas_decision_desc: "[FROM.GetName] располагает крупнейшими запасами природного газа в Китае, но большая их часть остается нетронутой. Мы должны инвестировать в этот сектор, чтобы эти богатства не пропадали зря."

 SZC_Jialing_Coal_Fields: "Цзялинские угольные месторождения"
 SZC_Jialing_Coal_Fields_desc: "Наша промышленность преимущественно питается углем. Он поддерживает свет на наших фабриках и согревает наших людей. Мы должны убедиться, что наше производство угля может идти в ногу с нашим спросом на энергию."

 SZC_Industrial_Planning_Committee: "Комитет промышленного планирования"
 SZC_Industrial_Planning_Committee_desc: "Прежде чем запускать какие-либо крупные программы индустриализации, нам нужно создать комитет для оценки наших доступных ресурсов после гражданской войны и планирования наилучшего подхода для нашего будущего расширения. Хотя это значительно расширит бюрократический аппарат, возросшая эффективность в конечном итоге окупится."

 SZC_Import_Foreign_Machinery: "Импорт иностранного оборудования"
 SZC_Import_Foreign_Machinery_desc: "Поскольку наши промышленные центры Чунцин и Чэнду сильно пострадали от войны, нам нужно будет импортировать оборудование из-за рубежа, чтобы снова поставить нашу промышленность на ноги. Комитет по планированию уже выделил на это бюджет, и они ждут только нашего одобрения."

 SZC_Modern_Construction_Technology: "Современные строительные технологии"
 SZC_Modern_Construction_Technology_desc: "Комитет промышленного планирования пришел к выводу, что невозможно обойти тот факт, что наши методы строительства, инструменты и даже базовые ноу-хау устарели. Привлекая в Сычуань больше оборудования и консультантов, мы сможем усовершенствовать наши методы строительства."

 SZC_Study_Production_Innovations: "Изучение производственных инноваций"
 SZC_Study_Production_Innovations_desc: "Одно дело иметь доступ к передовому оборудованию, но если мы хотим соответствовать методам производства европейцев и японцев, нам нужно изучить их соответствующие подходы и применить то, что мы узнали, к нашим собственным методам производства. Как всегда, КПП заложил в бюджет соответствующие расходы."

 SZC_Urban_Modernisation_and_Sanitation: "Модернизация городов и санитария"
 SZC_Urban_Modernisation_and_Sanitation_desc: "Учитывая быстрый рост нашей промышленности и ранние успехи нашей программы урбанизации, следующим шагом будет приведение великих городов Сычуани в соответствие с требованиями двадцатого века путем модернизации их инфраструктуры до современных стандартов. Это значительно улучшит уровень жизни жителей и позволит нам расширять их дальше."

 SZC_Western_China_Academy_Of_Sciences: "Академия наук Западного Китая"
 SZC_Western_China_Academy_Of_Sciences_desc: "Важной частью нашего плана модернизации является превращение Сычуани в центр высшего образования в Китае. Создав Академию наук Западного Китая, мы сможем лучше обучать наших граждан и привлекать в нашу страну одни из самых светлых умов Китая."

 SZC_Increase_Steel_Production: "Увеличить производство стали"
 SZC_Increase_Steel_Production_desc: "Многие сталелитейные заводы и рудники Сычуани используют методы и инструменты прошлого века, а иногда эти методы даже более отсталые и устаревшие, вплоть до того, что они подвергают опасности наших рабочих. Приведение этих методов в соответствие с текущим веком превратит Чунцин в бьющееся сердце китайского производства стали."

 SZC_Rebuild_Chengdu_Machine_Bureau: "Восстановить Чэндуское машиностроительное бюро"
 SZC_Rebuild_Chengdu_Machine_Bureau_desc: "Недоиспользуемое до войны и поврежденное во время нее, Чэндуское машиностроительное бюро имеет большой потенциал благодаря предыдущим инвестициям в его инфраструктуру. Мы восстановим его и сделаем краеугольным камнем процесса индустриализации Чэнду."

 SZC_Huaxi_Machinery_Factory: "Машиностроительный завод Хуаси"
 SZC_Huaxi_Machinery_Factory_desc: "В связи с запланированными нами усилиями по быстрой индустриализации, старые способы уступают место, поскольку мы используем все больше и больше станков и транспортных средств. Чтобы не отставать от спроса, наши планировщики предложили создать предприятия в районе Хуаси, превратив его в образец индустриализации."

 SZC_Textile_Production: "Текстильное производство"
 SZC_Textile_Production_desc: "Китайский текстиль известен далеко за пределами страны своим качеством и уникальным стилем. Сычуань всегда играла большую роль в этой торговле, и с учетом возросшего спроса на эти товары и относительной безопасности бассейна в наши дни, было бы хорошей инвестицией углубить нашу роль в этой торговле."

 SZC_Xikang_Hydropower: "Гидроэнергетика Сикана"
 SZC_Xikang_Hydropower_desc: "На данный момент большая часть энергетических потребностей Сычуани удовлетворяется за счет использования угольной энергии и природного газа. Однако наши инженеры говорят нам, что в горном западе есть огромное количество неиспользованной энергии, предлагающей многочисленные возможности для строительства гидроэлектростанций. Это должно позволить нашим энергетическим потребностям идти в ногу с нашей растущей индустриализацией."

 SZC_Electrification_Efforts: "Усилия по электрификации"
 SZC_Electrification_Efforts_desc: "Стоит покинуть пределы Чэнду и Чунцина, и большая часть Сычуани по ночам освещается свечами и масляными лампами. Однако, когда наши усилия по выработке энергии принесут плоды, мы сможем, наконец, провести электричество в сельскую местность. Электричество будет освещать сельскую местность ночью, согревать наших людей зимой и сделает наши фабрики еще более производительными."

 SZC_Build_the_Electro_Steel_Mill: "Построить электросталеплавильный завод"
 SZC_Build_the_Electro_Steel_Mill_desc: "Большой частью плана индустриализации Сычуани было строительство электросталеплавильного завода в Чунцине. Но из-за многих конфликтов прошлого завод был разрушен. Теперь, когда у нас есть энергия и промышленные возможности для этого, мы можем снова материализовать этот мощный завод!"

 SZC_Modernised_Manufacturing: "Модернизированное производство"
 SZC_Modernised_Manufacturing_desc: "Наши усилия, начавшиеся с восстановления после гражданской войны, расцвели и помогли превратить Сычуаньскую впадину в небольшой, но растущий промышленный центр. Вскоре мы сможем похвастаться тем, что у нас есть одни из лучших промышленных партнеров во всем Китае, и получить еще больше наград за наш тяжелый труд."

 SZC_The_Arsenal_Programme: "Программа арсенала"
 SZC_The_Arsenal_Programme_desc: "Чунцин давно может похвастаться мощной военной промышленностью, среди которой самым крупным является Чунцинский арсенал. Комитет промышленного планирования предложил расширение арсенала с использованием приобретенных ими методов и оборудования, что позволит нам сохранить наше преимущество в военном производстве в регионе."

 SZC_Expand_Production_Artillery: "Расширить производство: Артиллерия"
 SZC_Expand_Production_Artillery_desc: "Сычуань является домом для одного из самых эффективных производств стрелкового оружия в Китае, но все еще есть возможности для улучшения, когда дело доходит до более тяжелых орудий. Так же, как арсенал Чунцина известен по всему Китаю своими эффективными винтовками, Хэйцзянский артиллерийский арсенал принесет современные методы производства артиллерии в Сычуань."

 SZC_Expand_Production_Tanks: "Расширить производство: Танки"
 SZC_Expand_Production_Tanks_desc: "Танки доказали свою ценность в Вельткриге и последующих конфликтах благодаря своей способности прорывать оборону противника. С нашей растущей промышленной базой мы наконец в состоянии начать мелкосерийное производство танков, которые помогут нам доминировать на полях сражений Азии."

 SZC_Expand_Production_Aircraft: "Расширить производство: Самолеты"
 SZC_Expand_Production_Aircraft_desc: "Самолеты, которыми часто пренебрегают китайские военные планировщики, становятся незаменимой частью любой современной армии. Из-за горной географии Сычуани наверстывание упущенного здесь может быть жизненно важным для будущих конфликтов, где самолеты будут обеспечивать наблюдение с воздуха для наших войск и артиллерии и обрушивать смерть с небес на наших врагов."

 SZC_Rebuild_The_Sichuanese_Army: "Восстановить Сычуаньскую армию"
 SZC_Rebuild_The_Sichuanese_Army_desc: "Текущее состояние армии Сычуани оставляет желать лучшего. Это устаревший и раздробленный орган, лишенный сплоченности. Нашим первым шагом будет объединение армии из ее разрозненного прошлого, чтобы наши солдаты могли более эффективно сражаться за свою родину."

 SZC_Rebuild_The_Officer_Corps: "Восстановить офицерский корпус"
 SZC_Rebuild_The_Officer_Corps_desc: "К сожалению, руководство нашей армии, раздробленное между множеством разных фракций, расколото и лишено единого чувства стратегии. Создав нашу собственную сычуаньскую военную академию, мы сможем начать прививать нашим командирам правильное понимание современной войны."

 SZC_New_Infantry_Weapons: "Новое пехотное оружие"
 SZC_New_Infantry_Weapons_desc: "Даже по стандартам остального Китая наша армия отстает во многих областях. Пришло время начать бороться с этим, предприняв шаги по модернизации наших пехотных дивизий и предоставив нашим солдатам снаряжение, необходимое им для защиты Сычуани."

 SZC_Import_Modern_Artillery: "Импорт современной артиллерии"
 SZC_Import_Modern_Artillery_desc: "В настоящее время многие из наших артиллерийских отрядов используют те же орудия, которые они использовали в конфликтах прошлых десятилетий. Это неприемлемо. Импорт иностранной артиллерии и ноу-хау очень помог бы нам в решении этой проблемы."

 SZC_Recon_Unit_Training: "Обучение разведывательных подразделений"
 SZC_Recon_Unit_Training_desc: "Большая часть территории Сычуани сурова: высокие горы и могучие реки покрывают большую часть наших земель. Знание местности может означать разницу между жизнью и смертью. Давайте убедимся, что мы на благоприятной стороне в этом уравнении."

 SZC_Mountain_Warfare: "Горная война"
 SZC_Mountain_Warfare_desc: "То, чего нашей армии может не хватать в современном оборудовании, можно легко компенсировать, используя местность в наших интересах. Поскольку большая часть Сычуани и ее соседей покрыта скалистыми горами, рота, обученная сражаться среди них, часто может стоить больше, чем дивизия регулярных солдат."

 SZC_Adopt_The_Southern_Doctrine: "Принять Южную доктрину"
 SZC_Adopt_The_Southern_Doctrine_desc: "Мы не должны слепо модернизироваться ради модернизации. Наши ресурсы делают более разумным принятие Южной доктрины и сосредоточение внимания на том, что европейцы называют нетрадиционной тактикой, но что подходит китайцам как влитое. Будь то широкомасштабные штурмы или партизанская война, мы будем мастерами в этом."

 SZC_War_Logistics: "Военная логистика"
 SZC_War_Logistics_desc: "Выставление более крупной армии означает, что нам нужно поддерживать большую цепочку поставок. Создав специализированный отдел логистики и назначив некоторых из наших более квалифицированных офицеров для надзора за ним, мы обеспечим снабжение наших войск, минимизируя при этом коррупцию и растраты."

 SZC_Asymmetric_Warfare: "Асимметричная война"
 SZC_Asymmetric_Warfare_desc: "В настоящее время нереалистично пытаться сравниться с такими странами, как Япония, с точки зрения массовых танков, авиации и артиллерии. Вместо этого мы должны свести на нет их преимущества, используя нашу собственную хитрость и поощряя наших офицеров полагаться на тактику, которая позволяет их мобильным силам выбирать условия битвы, а не жестко структурированному врагу, с которым они сталкиваются."

 SZC_Heavy_Fire_Tactics: "Тактика плотного огня"
 SZC_Heavy_Fire_Tactics_desc: "Обучая наших офицеров и солдат обнаруживать слабые места в линиях противника и быстро использовать их с подавляющей силой, мы можем легче достичь прорывов."

 SZC_Increase_Munitions_Production: "Увеличить производство боеприпасов"
 SZC_Increase_Munitions_Production_desc: "Наше производство боеприпасов должно идти в ногу с нашим расширенным использованием тяжелых орудий на поле боя. Инвестируя в дальнейшую оптимизацию наших производственных линий для снарядов и других боеприпасов, мы сможем поддерживать темп и позволить нашим офицерам на передовой безжалостно бомбардировать наших врагов без каких-либо опасений нехватки."

 SZC_Continue_The_Northern_Doctrine: "Продолжать Северную доктрину"
 SZC_Continue_The_Northern_Doctrine_desc: "То, чего нам не хватает в современном оборудовании, мы компенсируем тем, что будем адаптируемыми, быстрыми и изобретательными. Благодаря скорости и настойчивости мы перехитрим наших врагов, будь то благодаря хитрости и инициативе наших офицеров или несравненной способности наших войск маршировать и сражаться на больших расстояниях."

 SZC_Focus_On_Speed: "Фокус на скорости"
 SZC_Focus_On_Speed_desc: "Мы обучим наши войска ориентированию на местности и инвестируем в такое снаряжение, как улучшенные ботинки и шины, чтобы отладить эффективность нашей армии. Делая это, мы обязательно будем диктовать условия битвы и место, где она будет происходить!"

 SZC_Improved_Army_Training: "Улучшенная армейская подготовка"
 SZC_Improved_Army_Training_desc: "Армия необученных солдат едва ли эффективнее толпы бандитов. Хотя наши усилия по улучшению подготовки как наших солдат, так и офицеров были значительными, все еще есть возможности для совершенствования. Мы не просто хотим хорошую армию — мы должны стремиться иметь самую профессиональную во всем Китае."

 SZC_Anti_Tank_Preparations: "Противотанковая подготовка"
 SZC_Anti_Tank_Preparations_desc: "Высокие горы, глубокие долины и широкие реки. Почти каждый дюйм нашей земли — потенциальная смертельная ловушка для экипажей вражеских танков, и мы позаботимся о том, чтобы наши солдаты извлекли из этого факта максимум пользы."

 SZC_Study_Tank_Designs: "Изучение конструкций танков"
 SZC_Study_Tank_Designs_desc: "Танк доказал, что является ключевым компонентом на современном поле боя. Мы не можем позволить себе отставать в этом развитии и должны изучить конструкции танков Германии, Франции и Японии, чтобы разработать наши собственные бронетанковые роты."

 SZC_Irregular_Tactics: "Иррегулярная тактика"
 SZC_Irregular_Tactics_desc: "Горы, леса и города долгое время были единственными надежными союзниками наших вооруженных сил. Наш опыт использования асимметричной войны сослужил нам хорошую службу в прошлом, и он будет продолжать делать это и в будущем."

 SZC_Decentralised_Chain_Of_Command: "Децентрализованная цепь командования"
 SZC_Decentralised_Chain_Of_Command_desc: "Крайне важно, чтобы наши солдаты и офицеры действовали по собственной инициативе. Пока наш враг бездействует в ожидании инструкций от главы армии, наши храбрые люди будут использовать свои собственные головы!"

 SZC_Night_Warfare: "Ночная война"
 SZC_Night_Warfare_desc: "Темнота ночи может ослепить обычные армии, но мы научились использовать ее как преимущество. Даже открытое поле можно превратить в место для засады и обеспечить укрытие от обнаружения и огня противника. Мы были бы глупцами, если бы не воспользовались этим по максимуму."

 SZC_Army_Of_Shadows: "Армия теней"
 SZC_Army_Of_Shadows_desc: "Мы победим наших врагов не жертвуя нашими солдатами в лобовых атаках, а тысячей порезов из тени. В их тылу, в их городах и даже в их рядах — нигде наши враги не найдут безопасности. Обман и хитрость выиграют день, а не безрассудные жертвы солдат, которые совершают так много беспечных полководцев."

 SZC_Professional_Legacy: "Профессиональное наследие"
 SZC_Professional_Legacy_desc: "Большинство наших командиров прослеживают наши военные корни до уважаемой Военной академии Баодин, и еще больше находятся под влиянием ее учений. Мы должны опираться на это наследие и превратить армию Сычуани в профессиональную и дисциплинированную военную силу, достойную уважения."

 SZC_Military_Education_Corps: "Корпус военного образования"
 SZC_Military_Education_Corps_desc: "Слишком часто военные учения делают упор на офицеров, не уделяя должного внимания образованию солдат. При правильном образовании наши солдаты не только будут знать, как маршировать и выполнять строевые упражнения, но и будут иметь острый глаз на доктрину и ее применение на тактическом уровне."

 SZC_Well_Trained_Officers: "Хорошо обученные офицеры"
 SZC_Well_Trained_Officers_desc: "Многие из современных героев Китая научились сражаться в Военной академии Баодин. Продолжая это наследие, мы должны сделать все возможное, чтобы как можно больше будущих героев Китая обучались в наших академиях. Производя отличных офицеров, даже европейцы должны будут научиться уважать нас."

 SZC_Army_Of_Professionals: "Армия профессионалов"
 SZC_Army_Of_Professionals_desc: "Многие страдания Китая исходили от милитаристов и коррумпированных чиновников, делающих вид, что неуправляемая толпа может действовать как армия — не говоря уже о том, чтобы взять город, не ведя себя при этом как бандиты. Вместо этого мы создадим армию хорошо обученных солдат и офицеров, ту, которая будет сражаться за Китай с дисциплиной и честью в равной мере."

 SZC_Doctrinal_Innovation: "Доктринальные инновации"
 SZC_Doctrinal_Innovation_desc: "Армия хороша настолько, насколько хороша ее доктрина. Если мы не адаптируемся к современному полю боя и его условиям, мы останемся на свалке истории. Пришло время усовершенствовать нашу тактику и стратегию."

 SZC_Equipment_Standardisation: "Стандартизация снаряжения"
 SZC_Equipment_Standardisation_desc: "В дни милитаристов любой офицер логистики часто нес незавидное бремя того, что каждая местная военная банда, ополчение губернатора и отколовшаяся сила имели свои собственные винтовки, боеприпасы и форму. Нужно предпринять больше шагов для оптимизации нашего снаряжения, от самых маленьких производственных цехов до самого поля боя."

 SZC_Engineer_Units: "Инженерные подразделения"
 SZC_Engineer_Units_desc: "Наш дом Сычуань — суровый ландшафт для ведения боя с его высокими горами и широкими реками. Поэтому специализированные отряды инженеров должны использоваться как можно чаще, чтобы наши силы могли строить лучшие укрепления и преодолевать самые мощные фортификации."

 SZC_Improved_Army_Drills: "Улучшенные армейские учения"
 SZC_Improved_Army_Drills_desc: "Это правда, что, хотя наши солдаты дисциплинированы и храбры, наши методы обучения иногда оставляют желать лучшего, так как наши методы обучения не всегда поспевали за другими разработками. Нам нужно усовершенствовать наши методы и убедиться, что наши солдаты действуют в меру своих возможностей."

 SZC_Creative_Solutions: "Креативные решения"
 SZC_Creative_Solutions_desc: "Сычуань и большинство окружающих провинций негостеприимны для любой армии и трудны для пересечения. Умным и экономически эффективным решением ограничений мобильности могло бы стать широкое внедрение велосипедной пехоты, доказавшей свою эффективность в предыдущей войне в Европе даже в самых сложных зонах боевых действий."

 SZC_Chengdu_Holds_On: "Чэнду держится"
 SZC_Chengdu_Holds_On_desc: "Ни вероломный обман, ни предательский оппортунизм не могли противостоять силе и мужеству Департамента ускоренного обучения. Ян Сэнь держится за власть, несмотря ни на что, и теперь Департамент ускоренного обучения разберется с этими повстанцами раз и навсегда."

 SZC_Evict_Officer_Department: "Выселить Офицерский департамент"
 SZC_Evict_Officer_Department_desc: "Федералистские и гоминьдановские лакеи Юньнани слишком долго были занозой в нашем боку, ведя партизанскую кампанию против нас с 1920-х годов. Поскольку гражданская война выиграна, а наши враги в бегах, пришло время изгнать их из Сычуани раз и навсегда."

 SZC_Restore_Order_In_Chongqing: "Восстановить порядок в Чунцине"
 SZC_Restore_Order_In_Chongqing_desc: "Чунцин — промышленное сердце Сычуани. Несмотря на то, что Лю Сян ушел, сам город сильно пострадал в гражданской войне и остается в состоянии хаоса. Нам нужно использовать армию, чтобы восстановить контроль правительства над городом и принести стабильность его жителям."

 SZC_Bring_Peace_to_Sichuan: "Принести мир в Сычуань"
 SZC_Bring_Peace_to_Sichuan_desc: "Поскольку другие фракции ушли, а порядок восстановлен на большей части страны, осталось только зачистить последние очаги сопротивления и восстановить контроль правительства над последними несколькими деревнями в стране, пострадавшими от беспорядков и бандитизма. Вскоре худшие шрамы войны будут наконец залечены."

 SZC_Yang_Sens_Ambition: "Амбиции Ян Сэня"
 SZC_Yang_Sens_Ambition_desc: "Ян Сэнь правил Сычуанью твердой рукой со времен реставрации Цин, но внутренние распри никогда не позволяли ему осуществить свое видение Сычуани. Со всеми врагами как изнутри, так и извне покончено, он может наконец реализовать свои амбиции по созданию современной и процветающей Сычуани."

 SZC_Centralise_The_Province: "Централизовать провинцию"
 SZC_Centralise_The_Province_desc: "Чэнду может быть резиденцией правительства, но охват нашей администрации не распространяется на всю Сычуань. Реформировав нашу администрацию так, чтобы местные мэры подчинялись губернатору в Чэнду, а не своим собственным интересам, мы сделаем контроль Департамента над провинцией более эффективным."

 SZC_Armed_And_Ready: "Вооружены и готовы"
 SZC_Armed_And_Ready_desc: "Даже несмотря на то, что мир вернулся в Сычуань, скорее всего, это лишь вопрос времени, когда нам придется снова вступить в войну. Давайте расширим наше производство оружия, чтобы быть готовыми к тому дню."

 SZC_Modernising_Sichuan: "Модернизация Сычуани"
 SZC_Modernising_Sichuan_desc: "Сычуань в настоящее время далеко не полностью раскрыла свой потенциал из-за расточительности, препирательств и бездействия, вызванных нашими соперниками. Нам нужно сделать первые смелые шаги к тому, чтобы привести всю Сычуань в современную эпоху, начиная с наших городов."

 SZC_A_Break_With_Tradition: "Разрыв с традицией"
 SZC_A_Break_With_Tradition_desc: "Старые порядки не следует почитать до абсурда. Не только города и инфраструктуру нужно привести в современную эпоху, но и то, как мы думаем и действуем. Это должно найти отражение и в том, как работают наши администраторы и исследователи, конечно."

 SZC_Parks_And_Venues: "Парки и места отдыха"
 SZC_Parks_And_Venues_desc: "Красота лесов и бассейнов Сычуани чужда многим из тех, кто живет в наших крупнейших городах. Учитывая нашу цель урбанизации, справедливо будет привнести эту красоту и в города."

 SZC_Popular_Education_Institute: "Институт народного образования"
 SZC_Popular_Education_Institute_desc: "Больше не скованные старыми путями и устаревшими методами, мы должны создать современные исследовательские центры, чтобы пожинать плоды нашего тяжелого труда. Вскоре Сычуань будет известна далеко за пределами как центр мысли и исследований в Азии."

 SZC_City_Administration: "Городская администрация"
 SZC_City_Administration_desc: "Следующим шагом в нашем плане модернизации является капитальный ремонт администраций в крупных городах и их бюрократии. Они в настоящее время устарели, децентрализованы и полны трещин. Создав более эффективную административную структуру, мы наверняка увидим рост производительности."

 SZC_Road_Construction: "Строительство дорог"
 SZC_Road_Construction_desc: "Дороги, соединяющие наши города, часто выглядели бы уместно во времена династии Цинь, если предположить, что они вообще существуют. Шаг за шагом мы заменим их мощеными путями, по которым мы сможем быстро перевозить грузы, товары и солдат."

 SZC_Farmers_Markets: "Фермерские рынки"
 SZC_Farmers_Markets_desc: "Часть модернизации страны заключается в том, чтобы доставлять товары фермеров в города, предоставляя экономические стимулы для создания большего количества фермерских рынков, централизуя торговлю вокруг сельскохозяйственного сектора. Это обогатит и нас, и наших фермеров, а также облегчит жизнь в городах."

 SZC_The_Luzhou_Woodworks: "Лучжоуские деревообрабатывающие заводы"
 SZC_The_Luzhou_Woodworks_desc: "Благодаря своему расположению вдоль Янцзы, Лучжоу является отличным местом для создания новой промышленной зоны для лесоматериалов, как для нашего собственного использования, так и для торговли по реке."

 SZC_A_Man_Of_The_People: "Человек из народа"
 SZC_A_Man_Of_The_People_desc: "Правление Ян Сэня было твердым, но справедливым. Более десяти лет он вел народ Сычуани через трудности к процветанию. Не просто обычный милитарист, как другие, он действительно человек из народа и отец современной провинции Сычуань, которую он помог построить."

 SZC_Liu_Cunhous_Tradition: "Традиция Лю Цуньхоу"
 SZC_Liu_Cunhous_Tradition_desc: "Учитывая их совершенно противоречащие друг другу видения будущего Сычуани, партнерству Ян Сэня и Лю Цуньхоу не суждено было продлиться долго. Теперь, когда Лю Цуньхоу и Департамент вооружения у власти, Сычуань наконец-то узнает мир и порядок без какого-либо опасного радикализма, обременяющего нас."

 SZC_Build_Up_The_Province: "Укрепить провинцию"
 SZC_Build_Up_The_Province_desc: "Войны и раздоры оставили шрамы на нашей провинции. Прежде чем предпринимать какие-либо дальнейшие шаги, нам нужно принять меры, чтобы исцелить Сычуань нашими силами и инструментами, чтобы у нас снова был фундамент для сильной нации и народа."

 SZC_Rally_The_Warlords: "Сплотить милитаристов"
 SZC_Rally_The_Warlords_desc: "Многие силачи по всей Сычуани контролируют ополчения и играют важную роль в стране. Вместо того чтобы бороться за власть, мы должны сплотить их вокруг Лю Цуньхоу и создать единый фронт внутри Сычуани с определенной степенью автономии для них всех взамен."

 SZC_The_Daxian_Mint: "Дасяньский монетный двор"
 SZC_The_Daxian_Mint_desc: "До сих пор практика местных милитаристов и мэров создавать свои собственные деньги приводила в лучшем случае к путанице, а в худшем — к мошенническим растратам. Мы должны вместо этого превратить эту практику в жестко контролируемую государственную монополию."

 SZC_Heavenly_Announcements: "«Небесные объявления»"
 SZC_Heavenly_Announcements_desc: "Имея Сычуань твердо под нашим контролем, нам нужно пополнить нашу казну, прежде чем делать что-либо еще. «Небесные объявления» будут провозглашены Цуньхоу, и люди должны будут их оплатить. Некоторые могут назвать это жадностью, но неужели они действительно сделают это, когда наши указы подкреплены нашей верной армией?"

 SZC_Confucian_Dominance: "Конфуцианское доминирование"
 SZC_Confucian_Dominance_desc: "К сожалению, роль веры была уменьшена из-за более насущных земных дел. Теперь, когда мы наконец снова знаем мир, мы будем продвигать наши религиозные традиции как точку сбора для нашего народа, чтобы дать им надежду в трудные времена и принести стабильность нашей нации."

 SZC_Four_Virtues_Movement: "Движение четырех добродетелей"
 SZC_Four_Virtues_Movement_desc: "Мы должны активно поощрять людей участвовать в неоконфуцианских движениях государства. Активно участвуя в этих религиозных организациях, люди лучше поймут краеугольные камни конфуцианской мысли. Это поможет связать людей с их религией и привязать государство к этой религии."

 SZC_A_Nationalist_Haven: "Националистическое убежище"
 SZC_A_Nationalist_Haven_desc: "Чтобы выстоять в эти смутные времена, мы должны стать оплотом национализма. В то время как радикалы, такие как Гоминьдан, стремятся выкорчевать саму суть нашей нации, мы примем ее. Любовь к Китаю — это щит, который защищает нас от вреда, и меч, который поражает наших врагов."

 SZC_Confucian_Schooling: "Конфуцианское обучение"
 SZC_Confucian_Schooling_desc: "Если система образования будет существовать в Сычуани, она должна продвигать религиозные и традиционалистские ценности в первую очередь. Поэтому часть денег, полученных через Небесные объявления, должна пойти на финансирование строительства большего количества школ для борьбы с бичами неграмотности и безбожия, которые все еще преследуют Сычуань."

 SZC_A_Victory_From_Baoding: "Победа Баодина"
 SZC_A_Victory_From_Baoding_desc: "В очередной раз профессионализм и преданность Баодинского департамента одержали верх. С обеспечением их правления над провинцией Сычуань теперь может сама определять свою судьбу."

 SZC_The_Diarchy: "Диархия"
 SZC_The_Diarchy_desc: "В отличие от других клик, ведомых высокими амбициями одного автократа, сотрудничество между двумя фракциями уберегло их от доминирования одной внутренней клики. Хотя баланс сил может смещаться туда-сюда между ними, это сотрудничество продолжится, поскольку реформы диархии начинают формировать Сычуань."

 SZC_Repair_The_Wars_Damage: "Восстановить ущерб от войны"
 SZC_Repair_The_Wars_Damage_desc: "Большая часть Сычуани лежит в руинах после войны. От городов до сельской местности, большая часть востока и юга была поглощена боевыми действиями. Восстановление нашей инфраструктуры и городов должно стать главным приоритетом для нашей новой администрации."

 SZC_Distribute_Grain: "Распределить зерно"
 SZC_Distribute_Grain_desc: "Хотя война и засуха сильно ударили по нашей провинции, на горстке складов, удерживаемых военными, все еще есть излишки зерна. Поскольку боевые действия закончились, мы должны поручить нашим солдатам помочь распределить его по сельской местности."

 SZC_Build_Up_Support: "Нарастить поддержку"
 SZC_Build_Up_Support_desc: "Мало того, что наш департамент пришел к власти через конфликт и крах двух других клик, но наши идеи не имеют универсальной привлекательности для общественности. Если мы не приложим усилий, чтобы завоевать сердца людей, мы можем стать третьим сычуаньским режимом, который рухнет."

 SZC_Fight_Corruption: "Борьба с коррупцией"
 SZC_Fight_Corruption_desc: "Другие клики по всему Китаю заслуженно презираются за коррупцию и корыстолюбие. Мы должны доказать, что мы другие, активно искореняя коррупцию и доказывая людям, что мы заботимся об интересах провинции."

 SZC_A_Model_Province: "Образцовая провинция"
 SZC_A_Model_Province_desc: "Представляя более традиционалистскую сторону диархии, пожизненный кадровый офицер Дэн Сихоу стремится превратить Сычуань в образец для всего Китая посредством сбалансированных социальных и экономических реформ. Популярные среди сельского населения и военных, его реформы приведут к тому, что последние приобретут известность, что приведет к более дисциплинированной армии."

 SZC_Moral_Invigoration: "Моральное укрепление"
 SZC_Moral_Invigoration_desc: "Коррупция, война, голод и бесчисленные другие трудности сказались на нашем народе. Хорошее место для начала процесса исцеления и преодоления этих лет лишений — кампания по восстановлению добродетелей морали в нашем народе. С сильным духом усилия по восстановлению Сычуани будут быстрее."

 SZC_Culture_Of_Productivity: "Культура производительности"
 SZC_Culture_Of_Productivity_desc: "Сильная трудовая этика может быть мощнее любого инструмента. Наших людей следует поощрять чувствовать сильное чувство гордости за свой труд и радость от возможности внести свой вклад в свои общины и их процветание."

 SZC_Combat_Vice: "Борьба с пороком"
 SZC_Combat_Vice_desc: "Бичи зависимости, азартных игр и других безнравственностей вредят нашему народу и ведут его к бесплодной преступной жизни, а не к жизни добродетели и самореализации. Следует приложить больше усилий, чтобы помочь бороться с пороком и помочь тем, кто поглощен им, вернуться к нормальной, здоровой жизни."

 SZC_Civic_Nationalism: "Гражданский национализм"
 SZC_Civic_Nationalism_desc: "Каждый гражданин Сычуани должен чувствовать гордость за свою провинцию. Вместо того чтобы поощрять зависть и гнев, мы направим эту гордость на дальнейшее улучшение жизни сычуаньцев."

 SZC_Support_Rural_Reconstruction: "Поддержка сельской реконструкции"
 SZC_Support_Rural_Reconstruction_desc: "В мирное время сельская местность игнорировалась в пользу великих городов Чэнду и Чунцин. Во время войны она сильно пострадала от наступающих армий. Наши сельские граждане заслуживают того, чтобы наконец получить заботу, которую они заслуживают."

 SZC_Farmer_Credit: "Фермерский кредит"
 SZC_Farmer_Credit_desc: "В рамках нашей программы по облегчению бремени для наших сельских регионов мы будем выдавать государственные субсидии, чтобы помочь нашим борющимся фермерам восстановиться после недавних трудностей. Сохранение процветания и стабильности в сельской местности окупится для всей Сычуани."

 SZC_Model_Farm_Program: "Программа образцовой фермы"
 SZC_Model_Farm_Program_desc: "С восстановлением нашего сельскохозяйственного сектора пришло время опираться на него. Программа образцовой фермы для образцовой провинции, чтобы сделать наших фермеров самыми производительными и процветающими во всем Китае. Программа будет включать финансирование современного орошения и механизированного оборудования и, несомненно, приведет к сельскохозяйственному буму."

 SZC_Rural_Road_Plan: "План сельских дорог"
 SZC_Rural_Road_Plan_desc: "За пределами нескольких транзитных узлов, соединяющих крупные города, значительная часть наших дорог — это те же тропы, по которым мы ходили поколениями. Соединив наши небольшие поселки надлежащими дорогами, мы облегчим жизнь нашего сельского населения и дадим толчок их местной экономике."

 SZC_Build_Hospitals: "Строить больницы"
 SZC_Build_Hospitals_desc: "Состояние наших медицинских услуг оставляет желать лучшего из-за исторического пренебрежения на протяжении поколений. Народ Сычуани заслуживает лучшего. Мы выделим больше средств на строительство крупных больниц, местных клиник, а также на обучение врачей."

 SZC_Peoples_Welfare: "Народное благосостояние"
 SZC_Peoples_Welfare_desc: "Помощь ближнему, попавшему в беду, — это не вопрос левых или правых, не вопрос реформизма или традиционализма. Государство Сычуань будет помогать своим бедным, как это делали институты от государств до монастырей на протяжении тысячелетий в Китае. Это не меньше, чем заслуживает наш усердный и моральный народ."

 SZC_The_University_Of_Chengdu: "Университет Чэнду"
 SZC_The_University_Of_Chengdu_desc: "Планы строительства университета в Чэнду, который будет соответствовать международным стандартам, существовали давно. Пришло время наконец реализовать это видение и превратить Чэнду в один из великих центров обучения Азии."

 SZC_A_Modern_Province: "Современная провинция"
 SZC_A_Modern_Province_desc: "Лю Вэньхуэй представляет более реформистскую сторону диархии. Он стремится полностью модернизировать Сычуань с помощью реформ, которые, хотя и не являются откровенно революционными, порывают с некоторыми традиционными нормами и популярны в городах и среди административных классов. Его реформы, несомненно, приведут к более отлаженной бюрократии."

 SZC_Reform_The_Civil_Service: "Реформировать государственную службу"
 SZC_Reform_The_Civil_Service_desc: "Государственная служба устарела, это реликт прошлой эпохи препирающихся милитаристов. Первым шагом к обновлению нашей администрации должно стать реформирование наших государственных служб и создание единой структуры для них по всему региону."

 SZC_National_Government_School: "Национальная правительственная школа"
 SZC_National_Government_School_desc: "Многие из наших государственных служащих не обучены, пережиток прошлых администраций. Мы должны стандартизировать их обучение и правила, по которым они работают, чтобы каждый в Сычуани знал, что он может положиться на своих представителей правительства."

 SZC_Industrial_Modernisation: "Промышленная модернизация"
 SZC_Industrial_Modernisation_desc: "Большая часть промышленности Сычуани, даже мощные заводы в Чунцине, часто напоминают заводы прошлого века, а не этого. Следует приложить усилия, чтобы обновить их до стандартов, наблюдаемых в более развитых частях Азии."

 SZC_Institute_Of_Technical_Research: "Институт технических исследований"
 SZC_Institute_Of_Technical_Research_desc: "Наши отрасли часто полагаются на своего рода грубую силу. Числа, объем, масштаб. Однако очень мало усилий было приложено для того, чтобы уделить внимание технике и совершенствованию методов. Лучше обучая наших рабочих и техников, мы сможем максимизировать эффективность того, что у нас уже есть."

 SZC_Light_Industrial_Development: "Развитие легкой промышленности"
 SZC_Light_Industrial_Development_desc: "Промышленная экономика Сычуани в основном полагалась на огромные заводские комплексы. Расширение нашего внимания, чтобы охватить более мелкие отрасли с акцентом на более гибкую, точную инженерию и производство, диверсифицирует нашу экономику и принесет наш промышленный бум в сельскую местность."

 SZC_Shenghang_Hydropower_Plant: "Гидроэлектростанция Шэнхан"
 SZC_Shenghang_Hydropower_Plant_desc: "В гидроэлектроэнергии все еще есть много неиспользованного энергетического потенциала, и рельеф Сычуани идеально подходит для этого. Если планы строительства гидроэлектростанции в Шэнхане будут реализованы, мы сможем удовлетворить большую часть энергетических потребностей нашей страны и расширить нашу экономику."

 SZC_Attract_Foreign_Intellectuals: "Привлечь иностранных интеллектуалов"
 SZC_Attract_Foreign_Intellectuals_desc: "Мудрый человек знает, что ему многому нужно научиться, и хорошее правительство не побоится использовать лучшие таланты из-за рубежа, чтобы улучшить участь своего народа. Привлекая в Сычуань одни из самых светлых умов из Азии, Америки и Европы, мы сможем радикально улучшить наши образовательные и исследовательские усилия."

 SZC_Buddhist_Influence: "Буддийское влияние"
 SZC_Buddhist_Influence_desc: "Вэньхуэй может быть реформатором, но многие его видения имеют фундамент в буддийской мысли. Выдвигая это на передний план и получая помощь от буддийских институтов в Сычуани, мы сможем завоевать большую поддержку наших идей среди более традиционалистских элементов Сычуани."

 SZC_Break_The_Gender_Roles: "Сломать гендерные роли"
 SZC_Break_The_Gender_Roles_desc: "С развитием технологий нет причин вытеснять женщин из традиционно мужских ролей. Достижения в военных технологиях даже позволяют им вступать в бой с врагом, будь то с винтовкой в руках или в кабине самолета."

 SZC_Protect_The_Tibetans: "Защитить тибетцев"
 SZC_Protect_The_Tibetans_desc: "Хотя мы не всегда сходимся во взглядах с правительством Тибета, мы должны сделать все возможное, чтобы к тибетцам, живущим в наших границах, относились справедливо как государство, так и его граждане."

 SZC_Chongqing_Victory: "Победа Чунцина"
 SZC_Chongqing_Victory_desc: "Кости были брошены, и авантюра Лю Сяна окупилась. Чжили, возможно, отказали ему в губернаторстве в прошлом, но теперь он держит всю Сычуань в своем железном кулаке. Человек больших амбиций, он вряд ли остановится на этом."

 SZC_Consolidate_The_Province: "Консолидировать провинцию"
 SZC_Consolidate_The_Province_desc: "Война выиграна, а мелкие милитаристы побеждены, но мы не можем почивать на лаврах. Предстоит много работы, и мы должны предпринять шаги, чтобы закрепить нашу победу и расширить нашу базу власти за пределы Чунцина, силой, если другие сделают это необходимым."

 SZC_Family_Matters: "Семейные дела"
 SZC_Family_Matters_desc: "Одной из самых заметных фигур побежденного Баодинского департамента в Сычуани является Лю Вэньхуэй, милитарист Сикана, а также дядя Лю Сяна. Это прискорбное положение дел, но которое придется решать так или иначе. Лю Сян надеется, что он одумается, но тем не менее готов к худшему, если он будет упрям в своем противостоянии."

 SZC_Align_The_Minor_Warlords: "Привлечь мелких милитаристов"
 SZC_Align_The_Minor_Warlords_desc: "Даже несмотря на то, что наши соперники мертвы или изгнаны, несколько меньших милитаристов остаются со своими собственными ополчениями, представляя угрозу нашей власти. Некоторых из них можно привлечь на свою сторону, интегрировав их в наши армии и полицейские силы, а остальных, безусловно, можно будет усмирить, как только их численность станет неактуальной."

 SZC_Entice_The_Urban_Merchants: "Соблазнить городских торговцев"
 SZC_Entice_The_Urban_Merchants_desc: "Порядок нельзя поддерживать только под дулом пистолета. Если мы хотим добиться успеха, нам нужно привлечь на свою сторону богатую буржуазию региона, какой бы маленькой она ни была. С правильным сочетанием пряников и редкого кнута мы уверены, что они увидят преимущества перехода на нашу сторону."

 SZC_Form_The_National_Protection_Alliance: "Сформировать Альянс национальной защиты"
 SZC_Form_The_National_Protection_Alliance_desc: "Наконец-то пришло время для независимых губернаторов Китая заявить о себе против пекинского режима. Поэтому [SZC.GetLeader] попытается создать союз между нами и нашими единомышленниками-партнерами в регионе против Чжили. Как только с ними будет покончено, остальные, безусловно, встанут в строй за нашим руководством."
 SZC_NPA_form: "Form"
 SZC_NPA_join: "Join"

 SZC_A_Grandiose_Plan: "Грандиозный план"
 SZC_A_Grandiose_Plan_desc: "С тех пор как Лю Сяну было отказано в губернаторстве Сычуани, Чжили и их прихвостни не делали ничего, кроме как сдерживали нас. Мы можем терпеть это только до поры до времени. Давно пора [SZC.GetLeader] ввести свою армию в Пекин и разбить их раз и навсегда — объединив весь Китай под своим правлением, если придется."

 SZC_The_Lord_Of_Sichuan: "Лорд Сычуани"
 SZC_The_Lord_Of_Sichuan_desc: "С бесспорным правлением [SZC.GetLeader] над Сычуанью, ставшим фактом, эпоха препирающихся милитаристов наконец закончилась. Теперь, когда все фигуры на месте, а любая потенциальная угроза Департаменту ускоренного обучения либо уничтожена, либо усмирена, мы можем наконец продвигаться вперед и решать судьбу Сычуани сами."

 SZC_Famine_Relief_Corps: "Корпус помощи голодающим"
 SZC_Famine_Relief_Corps_desc: "Люди — или наши солдаты, если уж на то пошло — не могут прокормить себя корой, травой и глиной. Поскольку недавняя гражданская война создала бесчисленное количество военнопленных из предательских фракций, мы предложим им перспективу амнистии в обмен на обработку залежных полей и подготовку к раздаче продовольствия. Под пристальным присмотром наших солдат, конечно."

 SZC_Aggressive_Modernisation: "Ускоренная модернизация"
 SZC_Aggressive_Modernisation_desc: "Старый режим явно не утруждал себя тем, чтобы догнать остальной Китай. Вместо этого он явно пренебрег своим долгом перед своим народом, и теперь мы — захолустье Китая. Нашему народу придется много работать, чтобы компенсировать пренебрежение прошлого десятилетия, и мы позаботимся о том, чтобы это принесло плоды."

 SZC_Fund_The_Construction_Industry: "Финансировать строительную индустрию"
 SZC_Fund_The_Construction_Industry_desc: "Ян Сэнь довольствовался тем, что просто властвовал над полями опиума, которые не выглядели бы неуместно в худшие периоды XIX века. Однако если мы хотим привести Сычуань в новую эру, государству нужно будет вложить большие средства, чтобы это произошло. Не жалейте расходов сегодня, чтобы следующее поколение было процветающим!"

 SZC_The_Riches_Of_Xikang: "Богатства Сикана"
 SZC_The_Riches_Of_Xikang_desc: "Богатство Сикана лежит в основном нетронутым под горами. Нам понадобится современная сталелитейная промышленность, чтобы наши могучие военные могли идти в бой с винтовками, пушками, транспортными средствами и кораблями, которые им нужны."

 SZC_Expand_Arms_Production: "Расширить производство оружия"
 SZC_Expand_Arms_Production_desc: "Первоначальные амбиции Лю Сяна всегда учитывали неизбежность войны. Департамент ускоренного обучения приобрел известность благодаря конфликту, и мы вряд ли принесем мир в Китай без большего кровопролития. Будь то оборона или наступление, нам нужно вооружиться, чтобы отбиться и от наших будущих врагов."

 SZC_Mass_Education_Campaigns: "Кампании массового образования"
 SZC_Mass_Education_Campaigns_desc: "Старые цинские владыки и их приспешники пренебрегали не только городами, но и умами народа Сычуани. Неграмотность процветает, и большинство людей не имеют ни малейшего представления о своей богатой истории и долге перед государством. Наши грамотные офицеры будут действовать как учителя, и массы будут обучаться миллионами."

 SZC_Currency_Reform: "Валютная реформа"
 SZC_Currency_Reform_desc: "До того как мы победили наших соперников, у каждого местного провинциального милитариста была своя никчемная валюта. Это если они не были низведены до древней бартерной экономики. Теперь, когда мы у власти, пришло время искоренить эти пережитки прошлого и начать использовать одну единую валюту для одной единой Сычуани."

 SZC_Sichuan_Central_Bank: "Центральный банк Сычуани"
 SZC_Sichuan_Central_Bank_desc: "До недавнего времени большая часть экономики Сычуани была раздроблена на различные местные финансовые экосистемы под управлением местных мэров и милитаристов. Наконец создав централизованную банковскую систему с ее бьющимся сердцем, сосредоточенным в Чунцине, мы сможем сломать эту тенденцию и направить нашу экономику в одном едином направлении."

 SZC_Standardise_Land_Tax: "Стандартизировать земельный налог"
 SZC_Standardise_Land_Tax_desc: "Старая налоговая система была византийским беспорядком. В зависимости от того, в какой провинции вы находились, она была либо сломанной, либо неэффективной, либо попыткой губернатора ограбить людей до нитки. Мы покончим с этой чепухой и внедрим наш собственный централизованный налоговый закон, свободный от мошенничества и неэффективности прошлого."

 SZC_Urban_Expansion: "Расширение городов"
 SZC_Urban_Expansion_desc: "Мы не можем называть себя современной нацией, если не урбанизируемся. Мы должны поощрять людей переезжать из сельской местности и посвятить все расширению наших городов. Когда мы закончим, Чунцин и Чэнду вполне могут стать предметом зависти Шанхая и Гонконга!"

 SZC_The_Mighty_Navy: "Могучий флот"
 SZC_The_Mighty_Navy_desc: "Наша столица Чунцин находится недалеко от реки Янцзы, что делает ее довольно уязвимой для морских атак снизу по течению, но также делает ее идеальной базой для будущего флота Сычуани. В конечном итоге могучая армада кораблей будет патрулировать реки, защищая нашу торговлю и людей от бандитизма и демонстрируя нашу мощь остальному Китаю."

 SZC_The_Mighty_Air_Force: "Могучие ВВС"
 SZC_The_Mighty_Air_Force_desc: "Зачем нам взбираться на горы Сычуани, чтобы встретить каждую угрозу, когда самолеты могут просто атаковать их с воздуха? Мы начнем с импорта иностранных технологий для использования в качестве базы. Как только мы закончим, наши военно-воздушные силы будут величайшими во всем Китае, способными защитить наше небо и поразить любого врага!"

 SZC_Army_Drills: "Армейские учения"
 SZC_Army_Drills_desc: "Слишком долго милитаристы Сычуани довольствовались тем, что их силы напоминали бандитов больше, чем настоящих солдат. Чтобы отметить четкий разрыв с этим прошлым, верховное командование Чунцина готовит программу общепровинциальных армейских учений и переподготовки. Приложив достаточно усилий, мы получим солдат, которые будут самыми дисциплинированными во всем Китае!"

 SZC_Adopt_Radio_Communications: "Принять радиосвязь"
 SZC_Adopt_Radio_Communications_desc: "Современные войны все чаще ведутся с помощью радио, радаров и вычислительных машин. Поэтому для нашей программы модернизации крайне важно, чтобы мы закупали и разрабатывали новые достижения в этих областях и чтобы наши силы, вплоть до каждой роты, проходили обучение их использованию."

 SZC_Dedicated_Logistics_Units: "Специализированные логистические подразделения"
 SZC_Dedicated_Logistics_Units_desc: "Даже после того, как наша армия станет самой могущественной в Китае — по крайней мере, на бумаге — она будет беспомощна в поле без постоянного потока припасов, чтобы продолжать движение вперед. Используя промышленность Чунцина, мы создадим специализированные поезда снабжения, которым позавидуют все китайские военные планировщики!"

 SZC_Large_Front_Operations: "Операции широкого фронта"
 SZC_Large_Front_Operations_desc: "Ключом к победе в битвах является правильное использование огромных людских ресурсов Сычуани, чтобы измотать и сокрушить наших врагов. В то время как обычный милитарист просто использовал бы их как дубину, мы разработаем сложные методы использования крупных пехотных атак в качестве наших наконечников копья, включая управление и быстрое развертывание резервов."

 SZC_Reverse_Engineer_Modern_Weapons: "Реверс-инжиниринг современного оружия"
 SZC_Reverse_Engineer_Modern_Weapons_desc: "Было бы расточительством просто раздавать иностранное снаряжение, которое мы приобрели, войскам. Чтобы извлечь из него максимум пользы, мы отправим наших самых блестящих военных инженеров для его реверс-инжиниринга, чтобы мы могли производить наши собственные, превосходные варианты."

 SZC_Heavy_Firepower_Tactics: "Тактика тяжелой огневой мощи"
 SZC_Heavy_Firepower_Tactics_desc: "Ясно, что нам нужно удвоить усилия по подготовке квалифицированных артиллерийских офицеров, поскольку многие из них все еще используют свои батареи самым примитивным образом. Когда мы закончим реформировать наши методы обучения, наша артиллерия будет сотрясать саму землю мощными залпами перед каждым нашим наступлением!"

 SZC_Armament_Production_Innovations: "Инновации в производстве вооружения"
 SZC_Armament_Production_Innovations_desc: "Мы не можем назвать нашу армию по-настоящему модернизированной, пока не разработаем собственное современное вооружение. Мы вложим больше средств в наш отдел военных НИОКР, чтобы у них были средства для производства нового оружия, созданного с нуля китайскими руками."

 SZC_The_Industrial_Army: "Ускоренное развитие армии"
 SZC_The_Industrial_Army_desc: "Все наши усилия по модернизации принесли плоды. Наша теперь могучая армия усовершенствовала слияние военной и промышленной мощи для сокрушения любого врага. Благодаря нашей промышленности мы можем накопить больше оружия, пуль, бомб и снарядов для использования против наших врагов, чем кто-либо еще в Китае. Пусть они дрожат перед мощью Ускоренной армии!"

 SZC_Republican_Triumph: "Республиканский триумф"
 SZC_Republican_Triumph_desc: "Вопреки всему Офицерский департамент обеспечил контроль над провинциальным правительством. Два лидера, Сюн Кэу и Люй Чао, готовятся консолидировать свои позиции и сделать Сычуань бастионом республиканизма и демократии."

 SZC_preparing_sichuan_for_federalism: "Подготовка Сычуани к федерализму"
 SZC_preparing_sichuan_for_federalism_desc: "Хотя Сюн стоит выше всех других милитаристов после падения Ян Сэня, было бы ошибкой считать его контроль над Чуань абсолютным. Действительно, мелкие милитаристы Сычуани часто с завистью смотрели на лидера ансамбля, и Сюн Кэу должен гарантировать, что его нынешнее время под солнцем не закончится преждевременно, как это было раньше."

 SZC_establish_fundamental_laws: "Установить фундаментальные законы"
 SZC_establish_fundamental_laws_desc: "Сычуань находится в особенно тяжелом положении, даже по сравнению с соседними провинциями. Десятилетия гражданской войны внутри провинции и вторжений со стороны соседей оставили большую часть провинции обездоленной и беззаконной, и администрация Сюна увидит, как такой хаос излечивается порядком, вызванным далеко идущей серией правовых реформ и правил."

 SZC_observe_the_new_guard: "Наблюдать за новой гвардией"
 SZC_observe_the_new_guard_desc: "Чтобы разорвать цикл междоусобиц милитаристов в Сычуани, старых милитаристов нужно искоренять, реформа за реформой. Новой Сычуани нужны офицеры, которые понимают лояльность администрации Сюна как свой патриотический долг, и они со временем заполнят ряды правительства, в то время как старые паразиты будут удалены из коридоров власти."

 SZC_Our_Promise_to_the_Province: "Наше обещание провинции"
 SZC_Our_Promise_to_the_Province_desc: "Пока Сюн Кэу торжествует как губернатор Сычуани, люди будут знать его торжественное обещание провинции. Правительство Сюна стремится гарантировать, что местное самоуправление от деревни не будет растоптано оппортунистическими милитаристами, люди будут работать вместе для общего блага, и все классы со временем увидят новый горизонт."

 SZC_solicit_cooperation_between_north_and_south: "Призвать к межрегиональному сотрудничеству"
 SZC_solicit_cooperation_between_north_and_south_desc: "Хотя федералистское движение было в основном южным движением, протестующим против централизаторских тенденций Пекина, следует знать, что мы не стремимся к разрушению Бэйянской республики. Нет, наша цель — искупить Республику, чтобы она стала столпом надежды, которым она всегда должна была быть, освобождая и Север, и Юг."

 SZC_construct_new_arsenals: "Построить новые арсеналы"
 SZC_construct_new_arsenals_desc: "В это время великого хаоса политическую власть приносит не перо, а ствол пистолета. В то время как Фэнтянь владеет Шэньянским арсеналом, Пекин может рассчитывать на Ханьянский арсенал на своей стороне. Если Сычуань хочет заслужить уважение крупных милитаристов, Сюн должен позаботиться о том, чтобы Сычуань разработала собственный Арсенал."

 SZC_inter_allied_command: "Межсоюзное командование"
 SZC_inter_allied_command_desc: "Хотя мелкие милитаристы уважают право Сюна на власть, они ревностно охраняют свои собственные скудные силы. Если Сычуань хочет стать уважаемым игроком в китайской политике, все офицеры этой провинции должны объединиться в единую командную структуру. Пусть разобщенность Сычуани превратится в силу!"

 SZC_Legacy_of_the_Nation_Building_Allied_Army: "Наследие Армии национального строительства"
 SZC_Legacy_of_the_Nation_Building_Allied_Army_desc: "Возможно, величайшей армией Сычуани была Союзная армия национального строительства, мощная сила, возглавляемая Сюном в 1925 году. Провинция еще может достичь таких высот успеха снова благодаря восстановлению Сюном Школы подготовки мобильных офицеров. И снова это учреждение будет обучать лучших офицеров Сычуани, тех, кто может увидеть нацию объединенной."

 SZC_Rule_of_the_Officers: "Правление Офицеров"
 SZC_Rule_of_the_Officers_desc: "Возможно, самым неожиданным поворотом стало то, что Офицеры под руководством Ли Цзяюя и Ло Цзэчжоу утвердились в качестве лидеров провинции Сычуань. Неизвестные аутсайдеры на протяжении всей своей карьеры, Ли и Ло установили рабочие отношения с Промышленным корпусом Люй Чао, и вместе эти трое введут Сычуань в новую эру."

 SZC_overlook_our_excesses: "Не замечать наших перегибов"
 SZC_overlook_our_excesses_desc: "Даже посреди нашего триумфа мы должны признать тот факт, что наши силы все еще относительно неопытны по сравнению с другими провинциальными силами. Одним из аспектов, способствовавших нашей победе, было присутствие генералов с опытом, полученным в результате надлежащего академического обучения или боев с другими армиями. Таким образом, уместно дать этим ветеранам-командирам некоторую свободу действий, не обращая внимания на их менее важные качества, будь то наркоманы, необоснованные сторонники дисциплины или и то, и другое."

 SZC_court_the_young_soldiers_federation: "Обхаживать Федерацию молодых солдат"
 SZC_court_the_young_soldiers_federation_desc: "Незначительная фракция в коалиции Офицерского корпуса, Федерация молодых солдат — это левая и популистская организация, призывающая к большим льготам для солдат. Хотя тонкости движения ускользают от Ли, он признает преимущества поддержки такой платформы для продвижения Офицеров в управлении Сычуанью."

 SZC_no_demilitarisation_without_militarisation: "Никакой демилитаризации без милитаризации"
 SZC_no_demilitarisation_without_militarisation_desc: "Всем в Поднебесной известно, что Сычуань десятилетиями страдала от несчастий междоусобиц милитаристов. Хотя демилитаризация — мечта многих, Офицеры не могут обеспечить истинную демилитаризацию, пока другие милитаристы размахивают мечами перед нашим правительством, ибо только меч может принести мир."

 SZC_the_source_of_our_vigour: "Источник нашей силы"
 SZC_the_source_of_our_vigour_desc: "Зажатое между различными милитаристами, которые подвергли их безжалостной эксплуатации, крестьянство с большой симпатией относилось к нашему скромному делу в течение Десятилетия Чжили. Именно благодаря их поддержке Офицеры смогли вернуться в Сычуань в 1936 году, и сельские массы останутся нашей опорой!"

 SZC_repaying_the_countrys_kindness: "Отплатить за доброту страны"
 SZC_repaying_the_countrys_kindness_desc: "Даже в это неспокойное время простые люди не забыли общую добродетель, которая связывает нас всех. Как Конфуций призывал государство быть носителем принципов и доброты народа, так и Сычуань Ли Цзяюя станет столпом добродетели в море несправедливых милитаристов."

 SZC_for_the_national_cause: "За национальное дело"
 SZC_for_the_national_cause_desc: "Хотя Сычуань, возможно, обрела мир после десятилетий мучительной войны, родовая родина продолжает оскверняться угнетающими поджигателями войны. Сычуань выступает за дело лучшей Республики, и Ли Цзяюй предоставляет свой клинок для освобождения всего Китая от ига тирании и империализма."

 SZC_centralise_tax_and_customs: "Централизовать налоги и таможню"
 SZC_centralise_tax_and_customs_desc: "Во время разобщенности Сычуани различные владения милитаристов начали проводить резко расходящуюся политику, что привело к бюрократическому беспорядку для администрации Офицеров. Администрация начала работать над сокращением различных излишних региональных налогов и созданием единой общепровинциальной системы налогообложения."

 SZC_connect_rural_townships: "Соединить сельские поселения"
 SZC_connect_rural_townships_desc: "В то время как Сычуаньская впадина — это удобный низменный регион, который является нашим сердцем, отдаленные районы Чуаня представляют собой коварные горы и титанические речные системы. Чтобы установить власть по всей провинции, эти сельские поселения должны быть снова подключены к сети впадины."

 SZC_raise_the_weary_help_the_weak: "Поднять утомленных, помочь слабым"
 SZC_raise_the_weary_help_the_weak_desc: "Поистине, гражданская война в Сычуани принесла невыразимые страдания народу. Многие семьи оказались разлучены, а многие другие живут в нищете и несправедливом убожестве. Администрация [ROOT.GetLeader] сделала главным приоритетом помощь больному населению в восстановлении после этого трагического конфликта между собратьями-сычуаньцами."

 SZC_new_sichuans_14_points: "14 пунктов Новой Сычуани"
 SZC_new_sichuans_14_points_desc: "Новая Сычуань вышла из десятилетий раздоров с вновь обретенной мудростью. Новая прогрессивная администрация наметила различные пункты о том, как она будет подходить к управлению истерзанным войной Чуанем, охватывая экономические вопросы, военные проблемы, модернизацию, внешние перспективы и отношения с другими провинциями. Сычуань открывает новую страницу сегодня!"

 SZC_modernisation_through_rail_and_road: "Модернизация через железные и автомобильные дороги"
 SZC_modernisation_through_rail_and_road_desc: "На Западе впечатляющие железные дороги обеспечивают взаимосвязанность всех регионов страны. Если Китай хочет догнать мощь Европы, он должен сначала скопировать западную инфраструктуру. Железные дороги станут новой жизненной силой китайской нации, и искра, которая зажжет огонь, начнется здесь, в Сычуани!"

 SZC_control_arms_manufacturing: "Контроль производства оружия"
 SZC_control_arms_manufacturing_desc: "Пока общепровинциальное перемирие длится так долго, нарушение баланса сил может разрушить хрупкий карточный домик. Если Сычуань хочет оставаться в мире, мелким милитаристам нельзя позволять приобретать больше оружия в свои арсеналы, в то время как Офицеры должны сохранять свое военное превосходство."

 SZC_standardise_troop_numbers: "Стандартизировать численность войск"
 SZC_standardise_troop_numbers_desc: "Пытаясь превзойти друг друга, различные сычуаньские милитаристы увеличили свои армии до огромных размеров за непомерную цену. Раздутая сычуаньская армия принесла только проблемы нынешней администрации, поэтому Губернатор объявил о необходимости значительно сократить армию. Такие усилия, как мы надеемся, также ограничат власть других сычуаньских милитаристов."

 SZC_repeal_the_warlord_taxes: "Отменить налоги милитаристов"
 SZC_repeal_the_warlord_taxes_desc: "Поскольку многие мелкие милитаристы отвергали лидеров Чэнду и Чунцина, они могли надеяться финансировать свои крошечные администрации только за счет огромных налогов с местного населения. Такая чрезмерность привела к всплеску бедности, и [ROOT.GetLeader] устранит все такие налоги теперь, когда провинция признает единую политику."

 SZC_unify_provincial_currency: "Объединить провинциальную валюту"
 SZC_unify_provincial_currency_desc: "Различные милитаристы в попытке установить регионалистские автономии пытались разработать собственную валютную систему отдельно от провинциального правительства. Это оставило многие регионы более политически разделенными от администрации [ROOT.GetLeader], чем ожидалось. Эти региональные валюты будут удалены, и вся провинция будет использовать единую денежную систему."

 SZC_an_end_to_the_arbitrary: "Конец произволу"
 SZC_an_end_to_the_arbitrary_desc: "По всей провинции злоупотребления являются обычным делом. Помещики взимают непомерную арендную плату с арендаторов, фактически забирая весь урожай у производящих классов. Такое варварство не будет терпимо в Новой Сычуани, и [ROOT.GetLeader] счел нужным установить различные ограничения арендной платы по всей Сычуани."

 SZC_the_independence_of_educational_funding: "Независимость финансирования образования"
 SZC_the_independence_of_educational_funding_desc: "Предыдущая администрация Сычуани была вынуждена в значительной степени полагаться на финансовую поддержку Пекина для содержания различных образовательных учреждений. В случаях, когда Центральное правительство оказывалось в сильном смятении, школы Сычуани прекращали функционировать. Провинция должна полагаться на местных спонсоров для поддержки образования в провинции."

 SZC_solving_the_trade_issue: "О вопросе торговли"
 SZC_solving_the_trade_issue_desc: "Чтобы реанимировать больную сычуаньскую экономику, межрегиональная торговля должна быть восстановлена до прежних высот. Провинция оказалась житницей нации, и сельскохозяйственный урожай Шу, несомненно, укрепит финансовое состояние провинции. С утиханием голода и восстановлением наших запасов риса и зерна экспорт Сычуани возобновится в полном объеме."

 SZC_limit_military_meddling: "Ограничить вмешательство военных"
 SZC_limit_military_meddling_desc: "Хотя новая администрация Сычуани была создана отчасти благодаря силе оружия, правительство провинции Сычуань не будет управляться как какая-то стратократия Гуанси. Гражданские и военные власти должны быть разделены, и военным не следует позволять использовать себя как дубину для обеспечения соблюдения законов."

 SZC_create_the_sichuan_central_mint: "Создать Центральный монетный двор Сычуани"
 SZC_create_the_sichuan_central_mint_desc: "В современной экономике финансовые институты и банки играют большую роль. Если предприимчивым бизнесменам понадобится кредит, Центральный монетный двор Сычуани даст им все необходимые деньги. Этот банк станет новым центром финансов в Южном Китае и отныне будет образцом для нации!"

 SZC_putting_the_nail_in_banditry: "Покончить с бандитизмом"
 SZC_putting_the_nail_in_banditry_desc: "Поскольку большая часть провинции находится в полной нищете, многие прибегли к бандитизму, чтобы выжить. Эти негодяи оказались занозой в боку будущей стабильности Сычуани и должны быть немедленно отсеяны, теперь, когда провинция наконец обрела политическую стабильность. Пусть будет известно, что Шу оказывает этой традиции Гуанси то уважение, которого она заслуживает — никакого."

 SZC_evaluating_government_finances: "Оценка государственных финансов"
 SZC_evaluating_government_finances_desc: "Если правительство Сычуани собирается начать кампанию по объединению китайской нации под знаменем федералистов, Сюн должен убедиться, что финансовое положение Чунцина может поддержать такую высокую цель. Все предыдущие цели администрации должны стать второстепенными по отношению к новой цели национального восстановления. Хотя это может вернуть Сычуань на путь войны, когда предки призывают всех Янь Хуан Цзысунь освободить царство, мы отвечаем."

 SZC_taking_stock_of_the_military: "Инвентаризация вооруженных сил"
 SZC_taking_stock_of_the_military_desc: "В настоящее время Полк 9 человек Сюн Кэу является самой сильной военной силой Сычуани. Многие из мелких милитаристов представляют собой скудные армии, способные только подавлять буйных крестьян. В духе Армии национального строительства Сюн Кэу должен создать новую федералистскую армию из этого пестрого ассортимента сил милитаристов, которая сможет противостоять крупным милитаристам Китая."

 SZC_government_of_national_reconstruction: "Правительство национального восстановления"
 SZC_government_of_national_reconstruction_desc: "Поскольку все больше демократов и остатков федералистских армий стекаются в провинцию Сычуань, Сюн счел разумным созвать Конвенцию федералистов в Чунцине, чтобы создать Новое федералистское правительство, которое будет представлять дело Свободного Китая. Это новое Правительство национального восстановления должно быть в состоянии противостоять как внутреннему, так и внешнему давлению, иначе мечты Сюна никогда не будут реализованы."

 SZC_beyond_the_red_river_basin: "За пределами бассейна Красной реки"
 SZC_beyond_the_red_river_basin_desc: "На протяжении большей части Республиканской эры Сычуань подвергалась вторжениям своих соседей ради оппортунистической и мелочной выгоды. Наши соседи пытались поживиться на нашей разобщенности и стравить брата с братом. Теперь Сычуань стоит единой и готовой спасти весь Китай. В то время как наши соседи стремились разорвать нас на части, Правительство национального восстановления стремится только спасти наших собратьев-китайцев."

 SZC_export_militarism_avenged: "Отомщенный экспортный милитаризм"
 SZC_export_militarism_avenged_desc: "После Войны в защиту республики клика Юньнани попыталась установить господство над Сычуанью после того, как помогла нам победить клику Бэйян. В соответствии со своей доктриной экспортного милитаризма юньнаньские милитаристы постоянно вмешивались за пределами своих границ, чтобы обеспечить критически важные ресурсы. Давно пора наказать Куньмин за его внутренний империализм и освободить народ Дянь от угнетения."

 SZC_the_warpath_towards_canton: "Тропа войны к Кантону"
 SZC_the_warpath_towards_canton_desc: "В Эру милитаристов основной борьбой можно было считать борьбу между правительствами Пекина и Гуанчжоу. В то время как правительство Пекина установило господство после падения Гоминьдана, высокие идеалы правительства Гуанчжоу все еще живут с нами. Если бы Правительство национального восстановления могло захватить Гуандун, такая победа дала бы нашему правительству столь необходимую легитимность."

 SZC_descending_upon_the_central_plains: "Спуск на Центральные равнины"
 SZC_descending_upon_the_central_plains_desc: "Родовое сердце всех китайцев, Чжунъюань, была местом рождения китайской цивилизации. Хотя Синьхайская революция началась в Учане, революция не смогла охватить остальную часть Центральных равнин из-за подавления бэйянскими милитаристами. Правительство национального восстановления увидит, как федералистское движение распространится дальше на север, чем когда-либо прежде!"

 SZC_the_treasures_of_huadong: "Сокровища Хуадуна"
 SZC_the_treasures_of_huadong_desc: "Восточный Китай долгое время был экономическим сердцем китайской нации. Цзянсу и Чжэцзян всегда были центрами торговли, но развитие Шанхая в 1800-х годах превратило его в финансовый центр Востока. Освобождение Восточного Китая позволило бы Правительству национального восстановления обеспечить финансы Шанхая и гарантировать, что наши будущие военные кампании будут должным образом профинансированы."

 SZC_strike_north_of_the_great_wall: "Удар к северу от Великой стены"
 SZC_strike_north_of_the_great_wall_desc: "К северу от Пекина лежит, возможно, наш самый опасный враг — клика Фэнтянь. Прячась за Великой стеной и поддерживаемые японскими империалистами, они владеют самым промышленным регион Китая и стремятся погасить любой свет свободы в Китае. Чтобы навсегда уничтожить скверну бэйянских милитаристов, Северо-Восточные провинции должны быть закреплены за Правительством национального восстановления."

 SZC_no_preparation_too_rigorous: "Никакая подготовка не бывает слишком тщательной"
 SZC_no_preparation_too_rigorous_desc: "В нашей кампании по воссоединению Китая, вероятно, мы вступим в конфликт с нашим империалистическим соседом, Японской империей. Десятилетиями Токио охотился на нашу больную страну, надеясь извлечь как можно больше ресурсов во имя так называемого «паназиатского единства». В то время как наше правительство может надеяться сразиться с японцами на материке, японцы контролируют моря. Когда японцы спустятся с морей, мы должны быть готовы загнать их обратно на их корабли."

 SZC_to_be_inspired_not_conquered: "Быть вдохновленным, а не завоеванным"
 SZC_to_be_inspired_not_conquered_desc: "Оказавшись в Войне сопротивления против японских захватчиков, давайте не впадать в отчаяние. Китайская цивилизация охватывает пять тысяч лет богатой истории, а выскочки в Токио по глупости считают себя нашими начальниками. Давайте бороться за выживание нашей нации против этого несправедливого врага, пусть все солдаты китайских вооруженных сил сокрушат Японскую империю здесь и сейчас!"

 SZC_chinese_determination_unshaken: "Китайская решимость непоколебима"
 SZC_chinese_determination_unshaken_desc: "По мере того как разворачивается эта война за выживание, мы вступаем в новый тип войны. Эта тотальная война потребует полной энергии китайских масс, поскольку мы как один боремся против японской военной машины. В то время как японский боевой дух рушится с каждой нарастающей борьбой между двумя державами Восточной Азии, решимость китайского народа только крепнет. Победа или смерть против Японской империи!"

 SZC_lessons_of_the_nanchong_charter: "Уроки Наньчунского устава"
 SZC_lessons_of_the_nanchong_charter_desc: "Разработанный в 1921 году после месяцев обсуждений между Чжан Ланем и его союзниками-федералистами, самым важным из которых был Сюн Кэу, Наньчунский устав стал первым местным законодательным актом, выдвинувшим низовую демократию в Сычуаньской впадине; с множеством других прогрессивных реформ на буксире. Мы поступили бы мудро, извлекая уроки из его успехов и неудач."

 SZC_the_seeds_of_democracy: "Семена демократии"
 SZC_the_seeds_of_democracy_desc: "Всего несколько лет назад федералистское движение было ограничено рамками провинции Сычуань. Сегодня наше Правительство национального восстановления развевает флаг Пяти цветов в Пекине, столице нашей нации. Хотя большая часть нации попала в наши руки, борьба только началась. Военное объединение привело нас только к парадному входу реформ, и теперь усилия по демократизации должны начать обретать форму здесь, в Имперской столице."

 SZC_local_community_politics: "Политика местных сообществ"
 SZC_local_community_politics_desc: "Китайская демократия начинается не в центрах власти в Пекине. Нет, она начинается с низов, с деревенского уровня. Самый базовый уровень организации по всей стране, эти самоуправляемые деревни во главе со старейшинами станут планом новой китайской демократии. Под руководством Чжан Ланя Китай наконец узнает правительство народа, созданное народом и для народа."

 SZC_compromise_with_the_gentry: "Компромисс с джентри"
 SZC_compromise_with_the_gentry_desc: "Хотя джентри приобрели несколько негативную репутацию по всему Китаю, особенно среди низших классов, им предстоит сыграть решающую роль в новом Китае. Образованные люди Китая часто происходили из класса джентри, и поддержка землевладельческого истеблишмента насытит наши финансы. Если Китай хочет быть свободным, ему потребуется надлежащее управление, возглавляемое его умнейшими людьми."

 SZC_curb_provincial_vices: "Обуздать провинциальные пороки"
 SZC_curb_provincial_vices_desc: "Болезнь опиума укоренилась в нашей провинции во время Века унижений. Поставив нас на колени, этот наркотик почти уничтожил дух китайского народа. Хотя оппортунистические милитаристы полагались на выращивание опиумного мака для финансирования своих армий, наше правительство должно сломать эту грязь, чтобы считаться правительством, которое выступает за исправление исторической несправедливости."

 SZC_the_fruits_of_education: "Плоды образования"
 SZC_the_fruits_of_education_desc: "Поистине, никакая демократия не может сформироваться в неграмотной нации. Большая часть нашего населения не может надеяться голосовать без умения читать и писать свои мнения. Таким образом, образование станет первостепенным в нашем развитии китайской демократии. По мере того как люди будут изучать китайские ценности и функции демократического правительства, участие граждан будет постоянно расти, пока наша Республика не станет такой же высокой, как западные державы."

 SZC_freedom_of_thought_and_academics: "Свобода мысли и науки"
 SZC_freedom_of_thought_and_academics_desc: "Действуя как авангард прогрессивной мысли в Китае, университеты и интеллектуалы часто озвучивали свое видение китайской политической реформы только для того, чтобы быть подавленными реакционными милитаристами. В Новом Китае такое выражение политической мысли будет поощряться, поскольку китайское общество становится таким же инновационным, как во времена Золотого века Китая!"

 SZC_expand_chongqing_university: "Расширить Чунцинский университет"
 SZC_expand_chongqing_university_desc: "В предыдущие годы Чунцин стал бьющимся сердцем Свободного Китая. Поскольку все больше и больше интеллектуалов находят Китай все более враждебной средой и бегут в убежище Правительства национального восстановления, Чунцинский университет оказался переполнен кадрами. Чунцинский университет должен отражать новый размер своего штата и прокладывать путь для свободных университетов по всему Китаю."

 SZC_exercise_in_industrial_autonomy: "Упражнение в промышленной автономии"
 SZC_exercise_in_industrial_autonomy_desc: "В то время как большая часть Китая попирала права бизнесменов и торговцев, Чжан Лань и Правительство национального восстановления надеются попробовать другой подход. Промышленникам будет предоставлен уровень автономии от Федерального правительства для развития дружественных деловых отношений, но они тоже должны следовать красным линиям президента Чжан Ланя или лишиться своих привилегий."

 SZC_integration_of_labour_and_learning: "Интеграция труда и обучения"
 SZC_integration_of_labour_and_learning_desc: "Поистине, федералистское движение представляет интересы рабочего класса лучше, чем кто-либо другой. В то время как бэйянские милитаристы раздавили бы их железным кулаком, а Гоминьдан заманил бы их в ловушку своей так называемой Национальной революции, именно Правительство национального восстановления стремится дать им правовую защиту, а также образование. Часто неграмотные, рабочие благодаря обучению смогут лучше понимать и защищать свои права."

 SZC_revitalise_local_enterprise: "Оживить местные предприятия"
 SZC_revitalise_local_enterprise_desc: "Гражданская война в Китае привела к тому, что многие прогрессивные реформы как в Сычуани, так и в других провинциях были сорваны вооруженным конфликтом и хаосом. Правительство национального восстановления, не довольствуясь правлением над нацией из пыли и пепла, позаботилось о том, чтобы предприятия и бизнес в истерзанных войной регионах и сельской глубинке получили поддержку и, надеюсь, начали восстанавливаться, даже пока другие провинции продолжают вести боевые действия высокого уровня."

 SZC_the_professional_associations_system: "Система профессиональных ассоциаций"
 SZC_the_professional_associations_system_desc: "Как предложил Чжан Цзюньмай из Демократической социалистической партии, Правительство национального восстановления должно представлять китайский народ всех классов. Профессии, имеющие решающее значение для национальных интересов, должны поддерживаться, а для их организации должны создаваться ассоциации. Через эти организации Федеральное правительство и эти классы могут сотрудничать ко взаимной выгоде."

 SZC_abolish_tax_pre_collection: "Отменить предварительный сбор налогов"
 SZC_abolish_tax_pre_collection_desc: "Предварительный сбор налогов — это политика, которая позволяет кредиторам преждевременно закрывать счета заемщиков, от которых не ожидается погашения долга, и продавать их долг коллекторскому агентству. Хищническая политика, которая вредит рабочему классу Китая, эта отвратительная практика будет искоренена с берегов Китая, надеюсь, чтобы никогда не вернуться."

 SZC_a_new_unified_currency: "Новая единая валюта"
 SZC_a_new_unified_currency_desc: "Поскольку политические разногласия в Китае длятся десятилетиями, различные конкурирующие правительства начали выпускать разную валюту в своих соответствующих границах. Поскольку многие из этих правительств были разгромлены в военном отношении Федеральной армией, Президенту пришлось разбираться с этим беспорядком из различных валют. При поддержке Национальной ассамблеи Президент [ROOT.GetLeader] предложил народу Китая сдать свои недействительные валюты для обмена на нашу валюту."

 SZC_rally_the_intelligentsia: "Сплотить интеллигенцию"
 SZC_rally_the_intelligentsia_desc: "Поскольку различные интеллектуалы оказались в Сычуани, между разрозненными группами возникли трения. Чжан Цзюньмай постоянно пытался утвердиться в качестве ведущей силы в Федеральном правительстве, а раскол линий между Великим республиканским альянсом и Демократической лигой Китая оставил многих недовольными. Однако если наше движение хочет выжить, мы должны продолжать поддерживать единство раннего правительства, которое принесло нам успех."

 SZC_creating_a_provisional_capital: "Создание временной столицы"
 SZC_creating_a_provisional_capital_desc: "Поскольку все больше крупных городов Китая попадают под контроль вооруженных сил Федеративной Республики, становится все более насущной необходимость создания лучшей временной столицы для нашего Правительства национального восстановления. Чунцин, послужив своей цели, не обязательно является лучшим местом для управления недавно завоеванными провинциями, и хотя Пекин является традиционным центром управления, некоторые считают, что необходимы перемены."

 SZC_combatting_the_root_of_apathy: "Борьба с корнем апатии"
 SZC_combatting_the_root_of_apathy_desc: "Когда Китайская Республика была впервые создана, нацию охватил прилив идеализма. Однако годы войны милитаристов и иностранной эксплуатации оставили дух китайского народа безнадежно апатичным к политическим переменам. Если демократия должна пустить корни в Срединном царстве, необходимо провести экономические и политические реформы, чтобы вывести китайский народ из пассивности."

 SZC_overtures_to_student_radicals: "Предложения студентам-радикалам"
 SZC_overtures_to_student_radicals_desc: "Поскольку привлекательность социализма становится все более заманчивой для идеалистических студенческих групп, растет число радикальных студенческих групп, действующих в крупных университетах в рамках Правительства национального восстановления. Протестуя против условий труда, эти группы требуют от правительства делать больше. Возможно, надеясь превратить их в опору поддержки, Президент [ROOT.GetLeader] предложил этим группам некоторые уступки и Единый фронт."

 SZC_agreements_with_the_ycp: "Соглашения с МКП"
 SZC_agreements_with_the_ycp_desc: "Титаническое массовое движение, укоренившееся в Сычуани и на Центральных равнинах, Младокитайская партия — это националистическая сила, распространенная в военных и интеллектуальных кругах. Хотя падение клики Чжили нанесло ущерб их движению, они остаются жизнеспособной силой в массовой партийной политике. Хорошо знакомый с их руководством, Президент [ROOT.GetLeader] пригласил их в правительство."

 SZC_promoting_harmonious_bipartisanship: "Продвижение гармоничной двухпартийности"
 SZC_promoting_harmonious_bipartisanship_desc: "Хотя выборы, безусловно, вызвали обострение напряженности между Демократической лигой Китая и Великим республиканским альянсом, Президент Дань надеется уладить напряженность между Сюн Кэу и Чжан Ланем. Хотя Демократическая лига Китая является главной оппозиционной партией, и ВРА, и ДЛК надеются на во многом одинаковое видение Китая, и сотрудничество между двумя партиями, безусловно, будет в интересах Китая."

 SZC_the_safeguard_against_autocracy: "Защита от автократии"
 SZC_the_safeguard_against_autocracy_desc: "В то время как военные традиционно были силой милитаризма, Федеральная армия уникальна среди всех китайских армий. Цзяньгоцзюнь, как и политическое руководство Правительства национального восстановления, борется за дело демократии, и ему можно доверить вмешательство, если Президент когда-либо скатится к тирании. Народ Китая может быть спокоен, зная, что даже если правительство забудет о своих обязательствах перед демократией, Лю Вэньхуэй не забудет."

 SZC_building_a_fair_cabinet: "Создание справедливого кабинета"
 SZC_building_a_fair_cabinet_desc: "По мере того как наше Правительство национального восстановления включает в себя больше территорий и партий, справедливо, что наша администрация развивается вместе с нацией. Чтобы сохранить единство, благодаря которому Федеральное правительство стало главным правительством Китая, кабинет Президента будет включать представителей основных партий, участвующих в правительстве, а также квалифицированных технократов из профессиональных ассоциаций."

 SZC_parameters_of_the_legislature: "Параметры законодательного органа"
 SZC_parameters_of_the_legislature_desc: "В действующей республике законодательная власть должна иметь приоритет над президентской исполнительной властью. Полномочия и обязанности Федерального парламента должны быть четко определены, и он должен быть разделен на два органа: Палату представителей и Сенат. Каждая палата должна иметь спикера и заместителя спикера, избираемых ее членами, а сроки полномочий должны быть установлены Конституцией. Пусть этот орган хорошо управляет народом!"

 SZC_reviving_the_chinese_democratic_process: "Возрождение китайского демократического процесса"
 SZC_reviving_the_chinese_democratic_process_desc: "Хотя Китай никогда официально не отходил от демократии после 1912 года, она была в значительной степени выведена из уравнения после отмены выборов в 1933 году. По мере того как наше Правительство национального восстановления движется вперед, Президент [ROOT.GetLeader] стремится возродить эти устаревшие институты, которыми так часто злоупотребляли, и улучшить мизерные реформы, проведенные бэйянскими милитаристами."

 SZC_increase_troop_funding: "Увеличить финансирование войск"
 SZC_increase_troop_funding_desc: "Если Правительство национального восстановления надеется возглавить объединение китайской нации, мы должны позаботиться о том, чтобы армия была достаточно укреплена. В то время как Цзяньгоцзюнь все еще демонстрирует тревожный уровень милитаризма и фракционности, у Президента Чжана и Премьера Сюна нет иного выбора, кроме как встать на этот курс действий, или Федеральное движение умрет в Сычуани."

 SZC_recruit_sympathetic_officers: "Вербовка сочувствующих офицеров"
 SZC_recruit_sympathetic_officers_desc: "В то время как Ян Сэнь, Лю Цуньхоу и Лю Сян были оппортунистическими милитаристами, сражавшимися за свои собственные мелочные интересы, небольшое число их подчиненных либо поднялось благодаря заслугам, либо сочувствовало нашему делу. Эти офицеры могут помочь сформировать новый лоялистский блок внутри Цзяньгоцзюнь и помочь искоренить особенно вопиющих милитаристов в наших рядах."

 SZC_reach_out_to_the_baoding_department: "Обратиться к Баодинскому департаменту"
 SZC_reach_out_to_the_baoding_department_desc: "Поскольку Баодинский департамент не был в союзе с Офицерами или Полком 9 человек, когда Ян Сэнь и Лю Сян потеряли власть, триумвират потерпел серьезную неудачу в плане власти из-за возвышения Сюна до Губернаторства. Лю Вэньхуэй, со своей стороны, уже решил поддержать Сюна, но Дэн Сихоу и Тянь Сунъяо остались как вне правительства, так и вне власти. Благодаря подталкиванию Лю, Сюн неохотно пригласил других милитаристов Баодина за стол переговоров."

 SZC_renovate_arsenal_capacities: "Обновить мощности арсенала"
 SZC_renovate_arsenal_capacities_desc: "Хотя небольшие арсеналы позволили сычуаньским милитаристам оставаться региональной силой в Китае, их недостаточно для того, чтобы Правительство национального восстановления начало военную кампанию за полное воссоединение. Нет, небольшие военные арсеналы Сычуани должны быть существенно улучшены, чтобы подпитывать военные усилия федералистов Цзяньгоцзюнь в предстоящей гражданской войне в Китае."

 SZC_root_out_incompetence_and_ineptitude: "Искоренить некомпетентность и неумение"
 SZC_root_out_incompetence_and_ineptitude_desc: "Поскольку первоначальные ряды Цзяньгоцзюнь охватывают все силы милитаристов в провинции, качество армии федералистов незавидно непоследовательно. В то время как личные силы Сюна считаются элитой армии, мелкие милитаристы, действовавшие больше как бандиты, едва экипированы и не обучены для реальной войны. Если Цзяньгоцзюнь хочет стать реальной силой, Сюн должен позаботиться о том, чтобы неквалифицированные бандиты и коррумпированные офицеры были удалены и заменены достойными заменами."

 SZC_era_illuminated_by_sacrifice: "Эпоха, озаренная жертвенностью"
 SZC_era_illuminated_by_sacrifice_desc: "В это время хаоса герои и злодеи возвышались и падали по мере изменения обстоятельств. Великий Цай Э сражался за свержение имперского режима автократа Юань Шикая, даже когда его собственное здоровье угасало. Многие другие последовали его примеру, поистине герои в образе Лю Бэя и Чжугэ Ляна. Если Федералистская демократическая революция увенчается успехом, на пути к объединению, вероятно, будет принесено еще много жертв, и Республика почтит их всех, когда уляжется пыль."

 SZC_restoring_naval_projection: "Восстановление морского присутствия"
 SZC_restoring_naval_projection_desc: "Во времена династии Мин Китай имел величайший флот в мире. Поздняя Цин пыталась подражать успехам Мин, а также современным инновациям через Бэйянский флот, но он встретил печальный конец, столкнувшись с Императорским флотом Японии. С подъемом нашего Правительства национального восстановления на нас ложится задача восстановить китайскую гордость на морях и снова доминировать в водах Азии."

 SZC_soaring_in_free_skies: "Парение в свободном небе"
 SZC_soaring_in_free_skies_desc: "По мере развития современной эпохи войны стало очевидно, что военно-воздушные силы будут играть неотъемлемую роль. Федеральное правительство ранее полагалось на чисто пехотные силы в своих кампаниях по военному объединению, но по мере того, как наше правительство начинает сражаться с более современными силами в Северном Китае и соседними державами, развитие современных военно-воздушных сил стало первостепенным для военных усилий федералистов."

 SZC_the_last_bastion_of_federalism: "Последний оплот федерализма"
 SZC_the_last_bastion_of_federalism_desc: "В то время как Сычуань все еще находилась в разгаре гражданской войны, провинции Чжэцзян и Хунань уже обнародовали свои собственные провинциальные конституции. Однако, по жестокой иронии судьбы, кажется, что Сычуань вышла из своей гражданской войны только для того, чтобы обнаружить, что все другие федералистские провинции находятся во власти тиранов. Теперь Сюн Кэу стоит как последний ведущий федералист, и он не упустит свой момент на национальной сцене."

 SZC_the_vibrant_bipartisan_democracy: "Яркая двухпартийная демократия"
 SZC_the_vibrant_bipartisan_democracy_desc: "В то время как Чжан Лань был лицом нашего Правительства национального восстановления во время гражданской войны в Китае, именно Сюн Кэу и Дань Маосинь привели Цзяньгоцзюнь к окончательной победе. Признанные мечами свободы, китайский народ решительно поддержал Дань Маосиня и Сюн Кэу в качестве новых лидеров нашей Федеративной Республики. Хотя ДЛК и стала нашими политическими соперниками, мы приветствуем это как признак расцветающей двухпартийной республики."

 SZC_a_forum_for_the_level_headed: "Форум для рассудительных"
 SZC_a_forum_for_the_level_headed_desc: "Китайское управление долгое время подвергалось злоупотреблениям со стороны персонализма, идеологов и демагогии; этих символов иррационального и нетерпимого. Но здоровая демократия должна позволять руководить собой дебатам и дискуссиям; словами и законом, а не винтовкой и снарядом. С этой целью правительство должно обеспечить справедливое соблюдение требований в органах Республики, чтобы позволить истинному республиканизму процветать."

 SZC_enshrine_provincial_constitutions: "Закрепить провинциальные конституции"
 SZC_enshrine_provincial_constitutions_desc: "Проект местного самоуправления стремился исправить национальные проблемы Китая: неэффективность и неспособность управлять своими обширными владениями. Приняв достоинства системы Соединенных Штатов или Германии, он увидел бы себя свободным от множества проблем деспотизма в своем политическом центре. Учитывая роль Центрального правительства, давайте закрепим провинцию как строительный блок нового Китая."

 SZC_encourage_local_initiative: "Поощрять местную инициативу"
 SZC_encourage_local_initiative_desc: "Любая форма централизованно планируемого экономического управления наверняка закончится катастрофой; и помимо грандиозных стремлений к социализму или утопии, сама нация все еще остается в значительной степени феодальной в различных областях. Чтобы обеспечить дальнейшее экономическое развитие в это время великого исцеления, правительство должно обеспечить местные предпринимательские начинания. Ибо спасение нации может прийти только через индустриализацию."

 SZC_participation_across_class: "Участие всех классов"
 SZC_participation_across_class_desc: "Радикалы в оппозиции хотели бы, чтобы Китай разорвал себя на части в какой-то мифической классовой борьбе, обреченный перестроить себя на Национальной революции или через коварный реформистский социализм. Они не видят, что величайшая сила Китая — это общее братство, в работе над грандиозным гармоничным устройством; между джентри и крестьянином, рабочим и чиновником, гражданским и солдатом."

 SZC_national_demobilisation: "Национальная демобилизация"
 SZC_national_demobilisation_desc: "Нечестивое позволение Эры милитаристов местным военным командирам накапливать как значительное богатство, так и разрозненные банды солдат, в значительной степени способствовало неспособности нации отвергнуть иностранный империализм или иным образом восстановиться после Синьхайской революции. В то время как У Пэйфу пытался провести Национальную демобилизацию и потерпел неудачу, новая Республика несет в себе энергию, которая совершенно неумолима в преследовании милитаризма."

 SZC_cooperate_with_regional_notables: "Сотрудничать с региональной знатью"
 SZC_cooperate_with_regional_notables_desc: "Правительство не может надеяться навязать свою волю всем гражданам в равной степени, и поэтому оно отчаянно нуждается в местных союзниках. Люди, которые, не совершив явных актов государственной измены, могли бы быть привлечены для обеспечения местных усилий по работе с населением в регионах, которые в противном случае остаются в стороне от Столицы. Будь то местный крестьянский лидер, джентри или бизнесмен, все должны объединиться для улучшения нации."

 SZC_the_great_beiyang_reapproachement: "Великое сближение с Бэйяном"
 SZC_the_great_beiyang_reapproachement_desc: "Оппозиция позаботится о том, чтобы множество опытных бюрократов, политиков и магистратов были отброшены, поскольку они «запятнаны» своим предыдущим пребыванием в должности. Однако это было бы серьезной ошибкой; ибо если нация хочет объединиться, она должна признать и быть восприимчивой к успехам, достигнутым ее предыдущими попытками республиканизма. Конечно, амнистия — это предложение, от которого никто не сможет отказаться."

 SZC_depoliticise_the_ranks: "Деполитизировать ряды"
 SZC_depoliticise_the_ranks_desc: "Политика и кадры, вальсирующие рука об руку, привели к некоторым из самых недавних трагедий нации. Махинации Юань Шикая, деспотизм доктора Сунь Ятсена и его Национально-революционной армии, или то же самое у Чжили, Фэнтяня или Аньхоя. Армия — это путь не для карьеризма и самореализации идеологических целей, а для долга, чести и служения."

 SZC_bicameral_democracy_realised: "Двухпалатная демократия реализована"
 SZC_bicameral_democracy_realised_desc: "Демократия Китая, то есть ее предыдущие попытки, долгое время придерживалась идеалов, построенных на двухпалатном законодательном органе: Ассамблее и Сенате. Поскольку последний имел действующие полномочия для эффективного контроля как кабинета, так и Ассамблеи, он показал себя совершенно неспособным. С обновленным военным легализмом в правительстве сами институты Республики получили новое главенство."

 SZC_from_resistance_to_reconstruction: "От сопротивления к реконструкции"
 SZC_from_resistance_to_reconstruction_desc: "Вопреки всему Чжан Лань одержал победу на выборах, сорвав планы выскочек в Демократической лиге Китая и легко победив Великий республиканский альянс Дань Маосиня. Считающийся радикалом реакционными элементами, президент Чжан встречает сопротивление со стороны многих элементов китайского общества. Идеалистический социалист с золотым сердцем, президент Чжан готов воплотить в жизнь свой амбициозный и радикальный план по реконструкции Китайской Республики, реформа за реформой."

 SZC_the_wisdom_of_west_and_east: "Мудрость Запада и Востока"
 SZC_the_wisdom_of_west_and_east_desc: "Хотя Запад, безусловно, достиг уровня модернизации, которому Китай должен подражать, мы должны избегать отказа от нашего собственного прошлого. Наш путь в современный мир, безусловно, будет уникальным для Китая, и мы должны стремиться сбалансировать то, что мы узнаем от Запада, с нашей собственной культурой. Китай когда-то был величайшей империей в мире, и, объединив уроки прошлого и настоящего, мы можем достичь небес."

 SZC_mobilising_the_broadest_masses: "Мобилизация широчайших масс"
 SZC_mobilising_the_broadest_masses_desc: "В то время как интеллектуальный класс Китая исторически был авангардом китайской культуры и политического развития, мы не должны забывать об аграрных массах. На протяжении всей китайской истории крестьянство трудилось под властью произвольных милитаристов и тиранических императоров, и Президент сочувствует их борьбе. Больше лучшие представители общества не будут угнетать фундамент нации, ибо мы велики настолько, насколько велик наш беднейший социальный класс."

 SZC_the_gathering_of_many_minds: "Собрание многих умов"
 SZC_the_gathering_of_many_minds_desc: "Важная черта стабильной демократии — научиться править через консенсус. Поэтому президент Чжан Лань созвал конференцию самых престижных и уважаемых интеллектуалов Китая, чтобы они консультировали его по жизненно важным вопросам политики, даже пригласив своего политического соперника Чжан Цзюньмая принять участие во имя ослабления напряженности. Объединив множество светлых умов, Президент уверен, что будет предложено много решений самых насущных проблем Китая."

 SZC_form_substance_and_spirit: "Форма, содержание и дух"
 SZC_form_substance_and_spirit_desc: "Распространенная критика Чжан Ланя и других прогрессивных интеллектуалов заключается в том, что им не хватает понимания простого народа и они не предлагают никаких практических решений экономических и социальных проблем, кроме расплывчатого призыва к дальнейшей демократической реформе. Полностью осознавая критику, президент Чжан Лань планирует продемонстрировать народу практичность своего плана национальной реконструкции через значимое экономическое развитие и финансовую стабилизацию."

 SZC_rebirth_of_the_political_animal: "Возрождение политического животного"
 SZC_rebirth_of_the_political_animal_desc: "После провозглашения Республики интеллектуальные классы надеялись представлять нацию как ее ведущий политический класс. Однако китайские интеллектуалы обнаружили милитаристов, сидящих на республиканском троне. Вынужденный идти на компромисс в таких обстоятельствах, гражданский политический класс столкнулся с трудностями в продвижении значимых реформ. Поскольку военные больше не являются направляющей рукой Республики, гражданский политический класс может, наконец, принести перемены с помощью пера."

 SZC_professionalize_the_soldierly_class: "Профессионализировать солдатский класс"
 SZC_professionalize_the_soldierly_class_desc: "Хотя Цзяньгоцзюнь сыграл важную роль в создании новой Федеративной Республики, мы должны признать, что это отчаянный набор различных милитаристов Сычуани. Когда страна наконец в мире, китайские военные должны быть реструктурированы, чтобы превратить их в надлежащую военную силу, а не в раздутую смесь провинциальных сил и бандитов. Хотя Сюн Кэу и его союзники могут ворчать, новая Республика не управляется клинком."

 SZC_rein_in_army_cliques: "Обуздать армейские клики"
 SZC_rein_in_army_cliques_desc: "На протяжении всей истории Республики военные клики традиционно были ведущей силой, влияющей на политическое направление нации либо мечом, либо за закрытыми дверями. Надеясь оставить такие недемократические круги в прошлом Китая, президент Чжан Лань планирует напрямую взяться за эти военные фракции и уничтожить их раз и навсегда. Да будет известно, что антидемократическое поведение больше не будет терпимо!"

 SZC_nationwide_industrial_autonomy: "Общенациональная промышленная автономия"
 SZC_nationwide_industrial_autonomy_desc: "В такой большой стране, как Китай, было бы абсурдно ожидать, что Центральное правительство сможет эффективно удовлетворять экономические потребности регионов. Президент Чжан Лань вместо этого решил позволить провинциям ослабить контроль над экономической политикой, чтобы местный бизнес мог процветать без ненужного надзора. Нация, которая развивается естественно, — это нация, которая развивается здорово."

 SZC_democracy_as_the_key: "Демократия как ключ"
 SZC_democracy_as_the_key_desc: "В нашей Республике не всегда доминировали военные диктаторы. Во время мечты 1912 года народ Китая с энтузиазмом участвовал в первых свободных выборах в истории страны. Однако убийство Сун Цзяожэня превратило нашу мечту в бесконечный кошмар, когда милитаристы сменяли друг друга день за днем. Теперь президент Чжан Лань наконец загнал зверя милитаризма обратно в клетку, и Республика может наконец оправдать Мечту 1912 года."

 SZC_leading_by_word_and_deed: "Ведущий словом и делом"
 SZC_leading_by_word_and_deed_desc: "Китайская демократия — вещь непостоянная; немногие, похоже, могут по-настоящему овладеть ею, чтобы она не пала жертвой собственной мучительной идеологии. Время правления легализмом и красивыми речами прошло; пришло время истинным спасителям Китая привести ее к современности и спасению. Без пощады Гражданское управление будет восстановлено, и Прогресс будет достигнут."

 SZC_societys_proper_placements: "Правильное место в обществе"
 SZC_societys_proper_placements_desc: "Как только бывшим политикам и милитаристам будет нечем заняться, они просто будут сеять смуту в обществе, критиковать то и это и препятствовать правительственному порядку. Но как только им дадут работу в производственных разработках, даже если это всего лишь небольшая ответственность, их разрушительное влияние будет значительно уменьшено. Пусть каждый гражданин Китая знает свое надлежащее место в производительном обществе, управляемом современностью, а не идеологией."

 SZC_legacy_of_the_academy: "Наследие Академии"
 SZC_legacy_of_the_academy_desc: "Военная академия Баодин — возможно, величайшее военное учреждение Китая. Обучившая некоторых из величайших стратегов и тактиков страны, она является ценным учреждением, с которым обошлись совершенно несправедливо для его статуса. Слава его выпускников велика, и благодаря дополнительному финансированию, направленному на Баодин, оно может достичь еще больших высот в будущих войнах."

 SZC_enshrine_military_primogeniture: "Закрепить военное первородство"
 SZC_enshrine_military_primogeniture_desc: "Военные Китая — это одновременно его величайший враг и его сильнейший авангард. Хотя это и сокрушительная слабость, если с ней не договориться должным образом, нация находится в руках своих сильнейших вооруженных сил; и поэтому их права должны быть гарантированы и защищены. Хотя президент Лю может быть недоволен идеей повсеместного военного влияния в гражданском управлении, такова природа зверя, которого он оседлал."

 SZC_a_use_for_all: "Применение для всех"
 SZC_a_use_for_all_desc: "Финансируя программы обучения для подготовки безработных к техническим ролям, нация может как сократить свое безработное население, так и создать новую касту директоров и специалистов. Они получают выгоду от занятости, обучения, полноценной работы и надежных средств к существованию, а правительство получает выгоду от их поддержки. Дни дрейфующего бездельника прошли! Так приходит новое производительное общество!"

 SZC_the_push_for_efficiency: "Стремление к эффективности"
 SZC_the_push_for_efficiency_desc: "Китайское управление долгое время стремилось обогатить своих благодетелей посредством вопиющих злоупотреблений налогообложением и бюрократией. Путем слияния избыточных департаментов, устранения правительственных агентств, признанных бесполезными, и фильтрации капитала из бесполезных мест в области, которые отчаянно нуждаются в финансировании, индустриализация Китая ускорится с необузданной яростью."

 SZC_western_revitalisation_plan: "План западного возрождения"
 SZC_western_revitalisation_plan_desc: "Сикан и Сычуань были всего лишь захолустьем; горы и пересеченная местность. И все же благодаря умелым программам развития Лю Вэньхуэя, Дэн Сихоу, Тянь Сунъяо и всех остальных из Баодинского департамента они превратились в промышленные центры! Северо-запад Китая — это всего лишь огромный рог изобилия потенциала, и китайские граждане должны быть должным образом стимулированы, чтобы рискнуть и захватить свои собственные судьбы!"

 SZC_overcoming_internal_backwardness: "Преодоление внутренней отсталости"
 SZC_overcoming_internal_backwardness_desc: "Внутренняя конкуренция и разногласия в Китае долгое время приводили к ситуации запутанного феодального развития и грязного корыстного капитализма. Больше нет! Китай будет прогрессировать, даже если ему придется тащить каждого джентри и бизнесмена за пятки! Только через самопожертвование, выносливость, энергию и дух мы выстоим! Китайский потенциал изобилует, и каждый гражданин должен работать на благо страны!"

 SZC_streamline_county_magistrates: "Оптимизировать уездных магистратов"
 SZC_streamline_county_magistrates_desc: "Текущий массив национальных магистратов и чиновников низкого уровня показал свое истинное лицо в свете последних событий в национальной политике. Вместо этого выбрав лояльность по отношению к нелояльным и вероломным, они молчаливо отказались или иным образом протестовали против нынешнего правительства. Такую вопиющую неэффективность нельзя терпеть, и крайне важно, чтобы правительство принудительно оптимизировало внутренние администрации — в своих собственных целях."

 SZC_a_nation_not_only_of_critics: "Нация не только критиков"
 SZC_a_nation_not_only_of_critics_desc: "Нет времени на идеалистическую болтовню! Нация должна развиваться индустриально! Массы голодны, им не хватает производительной занятости, у них нет даже денег, чтобы достаточно одеться. Нации нужны рабочие и производящие классы, а не интеллектуалы и критики угнетенной нации. Какие бы возможности для диалога ни существовали, они могут подождать, пока нация не будет способна хотя бы стоять на собственных ногах."

 SZC_modernitys_five_spirits: "Пять духов современности"
 SZC_modernitys_five_spirits_desc: "Пять Духов: Науки, Выносливости, Стремления, Лояльности и Общественного долга, и Исследований — являются ключами, с помощью которых каждая нация достигает истинной Современности. Британия, Франция, Россия, Германия, Соединенные Штаты и даже Япония — все сохранили этих духовных наставников на пути к величию; и Китай должен последовать их примеру. Благодаря систематическому развитию следующее столетие вполне может стать китайским."

 SZC_to_seek_prosperity: "Искать процветания"
 SZC_to_seek_prosperity_desc: "Деньги — корень всего зла, как говорится, но правительство должно работать над тем, чтобы отвергнуть социальное отношение, что деньги неразрывно связаны с мелкими милитаристами, коварными бизнесменами и нечестными чиновниками! Каждый гражданин должен знать свои пути к прогрессу и улучшению своей жизни, он должен равняться на честных и эффективных администраторов!"

 SZC_new_style_education: "Образование нового типа"
 SZC_new_style_education_desc: "Образование должно быть для обычного человека; оно должно служить основой для самой жизни. Таким образом, правительство должно уделить должное внимание финансированию Министерства образования и раскрыть в китайской молодежи ее собственный потенциал для будущих поколений. Те интеллектуалы из башни из слоновой кости жаждут отдать приоритет университетам, но как может функционировать университет без фундаментального образования перед ним?"

 SZC_a_reliable_national_constabulary: "Надежная национальная полиция"
 SZC_a_reliable_national_constabulary_desc: "Последние несколько десятилетий китайского общественного опыта доказали очевидность одного: когда нация переживает беспорядки, бандиты, мелкие преступники и воры бесчинствуют. А поскольку армия предрасположена к национальной обороне, а не к внутренней полиции, есть только одно решение. Следуя примеру кадетов, получивших образование в Америке под руководством Августа Воллмера, Китай должен революционизировать свою полицию."

 SZC_true_purposes_of_knowledge: "Истинные цели знания"
 SZC_true_purposes_of_knowledge_desc: "Знание — ключ к успеху любой нации и к собственному личному успеху. Его можно использовать для любых целей: для достижения власти, для достижения перемен или для достижения успеха. При наличии альтруистических и корыстных применений те, у кого больше знаний, властвуют над теми, у кого их нет; таким образом, возникает вопрос: какова истинная цель знания? Для более высокой должности и политической власти? Или для продвижения Китая?"

 SZC_to_cultivate_talent: "Культивировать талант"
 SZC_to_cultivate_talent_desc: "Талант по большому счету является одним из самых важных аспектов национального развития, ибо без таланта нет культуры, нет инноваций и очень мало прогресса. А не замечая или не давая возможности проявиться такому таланту, нация находится в полном дефиците талантов. Благодаря усиленным школьным усилиям и научным грантам Китай позволит своим лучшим и умнейшим действительно добиться успеха."

 SZC_specialised_practical_schools: "Специализированные практические школы"
 SZC_specialised_practical_schools_desc: "Без тени сомнения, школы должны быть революционизированы по всей стране. Более того, еще больше школ должно быть открыто во всех местах; ибо ни один ребенок в стране не должен идти по жизни, не испытав освобождающего света образования. Стимулируя школы, ориентированные на практические навыки, нация испытает как приток рабочих, так и их собственное самопросвещение."

 SZC_appeal_to_the_disenfranchised: "Обращение к бесправным"
 SZC_appeal_to_the_disenfranchised_desc: "Китай — нация многих вероисповеданий и многих слоев общества. И все же в нем подавляюще доминируют высшие эшелоны: богатые, элита, имущие и могущественные. Те, у кого нет власти, обычно оказывались в зависимости от местных народных героев: Лу Жунтина, Чэнь Цюйчжэня, Лун Юня. Правительство не может позволить бесправным в Китае чувствовать себя еще более изолированными от своего национального государства, и оно должно работать над их дальнейшей интеграцией."

 SZC_develop_the_industrial_stepstones: "Развивать промышленные ступени"
 SZC_develop_the_industrial_stepstones_desc: "Нация не может быть индустриализирована, не достигнув сначала надлежащих ступеней к собственному процветанию; владея собственными ресурсами и обеспечивая свои собственные массы, индустриализация нации практически гарантирована. Наряду с внедрением защиты рабочих и новых законов о труде, Китай превзойдет даже революционные государства в моральном духе своих производящих классов."

 SZC_The_Zhilis_Last_Stand: "Последний бой Чжили"
 SZC_The_Zhilis_Last_Stand_desc: "Несмотря на довольно глупую попытку роялистов обезглавить нашу клику, хладнокровно убив Цао Куня и У Пэйфу, они недооценили способность нашей клики восстать из пепла, как могучий феникс. Сплотившись под эгидой Маршала Тяньцзиня и с самой благодарной помощью наших истинных товарищей Ян Сэня и Лю Цуньхоу, мы превратим Сычуань в фундаментальный базовый лагерь для уничтожения Императора."

 SZC_modernisation_of_the_desperate: "Модернизация отчаявшихся"
 SZC_modernisation_of_the_desperate_desc: "Задача, стоящая перед нами — сразиться с предателями, изгнавшими нас, — колоссальна. Если мы собираемся сразиться с Цин, истерзанная войной промышленная база Сычуани не подойдет. Нам нужно будет удвоить наши промышленные усилия, использовать каждый ресурс, которым мы только можем обладать в его самой абсолютной форме, и посвятить полную силу клики Чжили. Все ради нашего окончательного возвращения."

 SZC_partners_of_law_and_order: "Партнеры закона и порядка"
 SZC_partners_of_law_and_order_desc: "Германия долгое время была бывшим другом Чжили в прошлом, даже если временно отдалилась в последние годы. Без них клика Чжили вполне могла бы увидеть свое исчезновение в конце 1920-х годов. Благодаря нашим связям и отношениям с AOG, Легационными городами и Немецкой Восточной Азией мы в состоянии пригласить инженеров из Krupp, чтобы помочь нам в строительстве новых оружейных заводов под этим немецким надзором."

 SZC_emulating_the_smiling_tiger: "Подражая Улыбающемуся тигру"
 SZC_emulating_the_smiling_tiger_desc: "Хотя его и сильно презирают в кругах Северного Чжили, похоже, несмотря на состояние его Лиги, Сунь Чуаньфан был действительно прав кое в чем. Восстановив наши связи с Германией и процветающий бизнес, мы сможем импортировать столько немецкого оружия, сколько смогут купить наши золотые резервы. С немецким вооружением мы обязательно уничтожим плохо оснащенных солдат-роялистов."

 SZC_friends_on_the_golden_waterway: "Друзья на Золотом водном пути"
 SZC_friends_on_the_golden_waterway_desc: "«Генералы Хубэя», неформальная группировка пенсионеров, бюрократов и бизнесменов в районе Хубэя, когда-то была одним из величайших активов Сяо Яонаня. Используя свои связи, он провозгласил удушающую хватку над промышленными секторами Уханя. Хотя Генералы возглавляются Ха Ханьчжаном, который является нашим врагом, у Сяо тем не менее есть свои связи."

 SZC_friends_of_many_enemy_of_one: "Друзья многих, враги одного"
 SZC_friends_of_many_enemy_of_one_desc: "Сохраняя наши связи со времен, когда мы были законным Центральным правительством, Кабинет и остаток Ассамблеи сохраняют значительное влияние в международном сообществе. Имея это в виду, необходимость в вооружениях для финансирования нашего будущего конфликта требует большего количества оружия, чем может обеспечить наша нынешняя промышленность. Заключая новые сделки и используя наши золотые запасы, мы должны иметь возможность быстро переоснастить и переобучить нашу армию с помощью иностранной помощи."

 SZC_the_north_remembers: "Север помнит"
 SZC_the_north_remembers_desc: "Если мы будем сражаться с Цин в одиночку, то и умрем в одиночестве. Прежде чем предпринимать какие-либо дальнейшие действия против них, было бы мудро привлечь к нашему делу как можно больше потенциальных союзников в регионе. К счастью для нас, мы вряд ли единственные, у кого есть претензии к Пекину. С фракциями Чжили по всей стране и теми, кто сочувствует им, мы обязательно создадим антимонархический альянс, который сможет соперничать с Тунмэнхуэем!"

 SZC_vindicating_the_invisible_element: "Оправдание невидимого элемента"
 SZC_vindicating_the_invisible_element_desc: "Возможно, их окончательная гибель и доказательство присущего Китаю республиканского мировоззрения, Центральные равнины все еще сохраняют многочисленных республиканцев и сторонников Чжили в нынешнем владении Цин. Более чем счастливые снова нанести удар роялистам, они уже создают секты тайных сетей и общаются с нашими собственными сотрудниками разведки. Армия Цин не будет знать передышки, поскольку мы сеем хаос в их рядах из тени."

 SZC_Rally_The_Zhili_Remnants: "Сплотить остатки Чжили"
 SZC_Rally_The_Zhili_Remnants_desc: "Верные солдаты и офицеры на вес золота в этот решающий момент. Поскольку Сычуань стала последней линией обороны Чжили, крайне важно, чтобы мы обратились к нашим друзьям и союзникам с призывом, что Сычуань — это убежище, куда не дотянутся длинные руки тайной полиции Цин. Под эгидой Маршала Тяньцзиня мы, без сомнения, вернем нашу законную землю!"

 SZC_the_path_of_reform: "Путь реформ"
 SZC_the_path_of_reform_desc: "Откладывать реформы — слишком жалкая перспектива! Маршал Тяньцзиня хотел бы ввести форму военного положения до возвращения Пекина. Это просто недостаточно хорошо. Маньчжурский переворот, несомненно, продемонстрировал ошибочность старого режима Чжили, и если мы хотим по-настоящему воссоздать Бэйянскую республику и обожание народа, мы должны принять более открытую модель управления."

 SZC_administration_of_fraternity: "Администрация братства"
 SZC_administration_of_fraternity_desc: "Если мы хотим действительно провести капитальный ремонт нашей старой системы, мы должны обеспечить участие исключительных личностей, чтобы обеспечить исключительное управление. Поскольку президент Янь происходил из известного и обожаемого Дипломатического корпуса, он счел нужным пригласить дипломата Веллингтона Ку в наше правительство. Вместе они заложат основу для первых шагов к административной реформе."

 SZC_new_leaf_of_a_reborn_republic: "Новая страница возрожденной республики"
 SZC_new_leaf_of_a_reborn_republic_desc: "Больше Бэйянской республикой не будут править военные диктаторы! Больше наследие Синьхая не будет подвластно автократам! Миссия Управления хороших людей будет доведена до конца, и, приветствуя участие Клики политической науки и Независимых, мы создадим настоящую Ассамблею и Сенат, которые отвечают перед народом."

 SZC_three_cliques_one_mission: "Три клики, одна миссия"
 SZC_three_cliques_one_mission_desc: "Наша административная структура — это ужасное и поспешно составленное чудовище из местной провинциальной администрации Департамента вооружения и притока чиновников как Бэйяна, так и Чжили. Довольно неудачно собранные вместе в таких тяжелых обстоятельствах, Департамент вооружения, Клика Цзиньбао и Клика Лоян должны в конечном итоге упростить и унифицировать свои внутренние структуры, чтобы обеспечить эффективное управление."

 SZC_legacy_of_jinbao_and_luoyang: "Наследие Цзиньбао и Лояна"
 SZC_legacy_of_jinbao_and_luoyang_desc: "Самые главные из всех клик милитаристов, фракции Цзиньбао и Лоян клики Чжили, возможно, ближе всего к завершению полного перехода к хорошим, ответственным государственным деятелям. Поскольку многие члены обеих фракций вошли в гражданскую бюрократию, мы действительно доказали тот факт, что Чжили являются законными правителями Китая. Ортодоксальное и принципиальное технократическое управление гарантировано под нашим присмотром."

 SZC_following_the_king_of_baoding: "Следуя за Королем Баодина"
 SZC_following_the_king_of_baoding_desc: "Хотя Конституция Цао Куня 1923 года показала себя как радикально прогрессивный институциональный документ, она также доказала свою способность к крайним злоупотреблениям со стороны исполнительной власти. Чтобы модернизироваться и превзойти наших предков, сохраняя при этом их намерения, мы должны следовать точно по стопам Цао Куня. Разрабатывая нашу собственную конституцию, учитывая недостатки и достоинства предыдущей, мы вступим в новую эру свободы и процветания."

 SZC_a_state_run_by_competence: "Государство, управляемое компетентностью"
 SZC_a_state_run_by_competence_desc: "Слишком долго военное и гражданское продвижение в государстве зависело больше от происхождения, связей и взяток, чем от реального таланта. Теперь, когда мы вынуждены начинать с нуля, многие в кабинете и армии выступают за «Государство, управляемое компетентностью». Такое, которое отдает приоритет меритократии и служению, а не родству."

 SZC_shus_march_of_progress: "Марш прогресса Шу"
 SZC_shus_march_of_progress_desc: "Всегда наиболее способный, всегда надежная группа верных друзей, товарищей и соратников, Департамент вооружения доказал, что более чем способен интегрироваться в Клику Чжили. При поддержке Сычуани мы приведем провинцию к современности, стирая десятилетия склок милитаристов, для нового возрожденного проекта государственного строительства. Вместе, рука об руку, куется новый Китай."

 SZC_march_of_the_grieving_army: "Марш скорбящей армии"
 SZC_march_of_the_grieving_army_desc: "Правда, наша армия скорбит. Ибо она потеряла не только своего лидера, но и одного из величайших полководцев. Как бы враждебность между маршалом Ваном и маршалом У ни разрывала их на части, в конце концов у них все еще был долг. У служил до конца, выполняя свой долг. Без сомнения, пытаясь защитить Цао от града пуль. Точно так же маршал Ван и остальная часть Армии Чжили должны маршировать вечно вперед. По крайней мере, ради их памяти."

 SZC_the_return_of_tianjin: "Возвращение Тяньцзиня"
 SZC_the_return_of_tianjin_desc: "Наконец, лишняя, маленькая Клика во внутренней борьбе за власть Чжили, Тяньцзинь формально унаследовала и Баодин, и Лоян. Хотя она была объединена с Баодином, чтобы сформировать Цзиньбао, она тем не менее пережила и Цао, и У. С ее основателями, такими как покойный Цао Жуй, Бянь Шоуцзин и, конечно же, маршал Ван, Тяньцзинь раньше играл вторую скрипку после У и Цао. Больше нет."

 SZC_constitutionalism_for_the_masses: "Конституционализм для масс"
 SZC_constitutionalism_for_the_masses_desc: "Служба и жертва Цао Куня не будут забыты. Он, возможно, был убит вместе с У, но его наследие будет жить в конституции, которую он разработал в 1923 году. Знаковый законодательный акт, он обеспечит людям безопасность и свободы, которых они заслуживают, как здесь, в Сычуани, так и в Пекине, когда мы вернемся домой. Поистине, без Цао Куня не было бы нового Китая."

 SZC_government_of_one_mind_one_body: "Правительство единого разума, единого тела"
 SZC_government_of_one_mind_one_body_desc: "Слишком долго вмешивающаяся ассамблея препиралась по поводу тонкостей законодательства, прихоти бюрократов срывали хорошее управление ради своих плохо информированных планов. Их проклятые разглагольствования чуть не стоили всей клике Чжили и их драгоценной Бэйянской демократии! В этот период восстановления правительственный орган должен действовать с единым мышлением и в полном унисоне. Несомненно, даже наша оппозиция будет придерживаться этого факта."

 SZC_government_of_bread_and_circuses: "Правительство хлеба и зрелищ"
 SZC_government_of_bread_and_circuses_desc: "Несмотря на все наши усилия, все еще есть те, кто не понимает своего места, ставя личные интересы выше нации. Для этих людей мы должны умиротворить их в это время великой борьбы. Удовлетворяя самые насущные потребности и желания людей, они могут поддержать наш режим в его вечной борьбе. Реформа произойдет, но она должна подождать до отвоевания."

 SZC_primacy_of_the_central_army: "Главенство Центральной армии"
 SZC_primacy_of_the_central_army_desc: "Чтобы лучше противостоять вызовам, которые ждут нас впереди, наше общество должно быть воинствующим. Сверху донизу мы будем поддерживать добродетели военной службы и чтить Центральную армию. Ибо без Центральной армии наследие Синьхая наверняка погибло бы в перевороте. Зная это, нашим солдатам будет привито большее чувство долга и доблести, ставя их намного выше того сброда, который наверняка выставит наш враг."

 SZC_salvaging_the_lessons_of_baoding: "Спасение уроков Баодина"
 SZC_salvaging_the_lessons_of_baoding_desc: "Возможно, мы были свергнуты из самой главной из всех военных академий в стране, но ее уроки остаются с нами, куда бы мы ни пошли. Усовершенствовав местные методы обучения на основе достоинств Баодина, мы получим офицеров и солдат, вымуштрованных до такой степени, что они будут лучше подготовлены не только к адаптации к развитию событий на поле боя, но и будут более устойчивы к любой потере институциональных знаний."

 SZC_the_nations_first_line_of_defence: "Первая линия обороны нации"
 SZC_the_nations_first_line_of_defence_desc: "Мы всегда должны быть на три шага впереди наших врагов. Предоставив нашему отделу военной разведки больше свободы действовать без ограничений, мы будем знать каждый шаг нашего врага, будь то внешняя или внутренняя угроза. Одной из наших многих ошибок было то, что мы не доверяли нашим сетям военной разведки должным образом, пока не стало слишком поздно. Маршал Ван не совершит такой ошибки. Народ Китая навсегда будет в безопасности под защитой Бюро общественной безопасности."

 SZC_Prepare_The_Final_Offensive: "Подготовить Последнее наступление"
 SZC_Prepare_The_Final_Offensive_desc: "Провинция Сычуань быстро готовится к сумеречной борьбе. К последнему рывку. Все наше общество поддерживает и Военных, и Маршала. С искренней волей народа ничто не помешает нам идти вперед, чтобы вернуть то, что по праву принадлежало нам. Глупцы думали, что покончили с кликой Чжили, жестоко казнив Нефритового Маршала и Короля Баодина. Они были совершенно неправы."

 SZC_homecoming_of_vengeance: "Возвращение возмездия"
 SZC_homecoming_of_vengeance_desc: "Ненависть. Ненависть и месть. Вот что больше всего питает Маршала в настоящее время. Вместе с гражданскими, остатками Бэйяна и его вечно верными офицерами и солдатами Чжили, клика Чжили обрушит долгожданный молот на наковальню. Истинное свидетельство нашей стойкости и подготовки последних месяцев. Потерпеть неудачу невозможно! Это не просто ради наших предков, но ради самой сути Китая!"

 SZC_xinhai_all_over_again: "Синьхай снова и снова!"
 SZC_xinhai_all_over_again_desc: "Мы восстали из пепла после того, как Цин думали, что уничтожили нас. Теперь они и все остальные, кто стоял с ними против нас, были унижены нашими победами. Мы должны укрепить нашу позицию и восстановить порядок в Китае, ибо Чжили здесь, чтобы остаться. Восстановление нормальных усилий в Ассамблее, сотрудничество с Сенатом и широко ожидаемые выборы привели к новому взрыву идеализма."

 SZC_elections_of_the_victorious: "Выборы победителей"
 SZC_elections_of_the_victorious_desc: "К счастью, маршал Ван и дипломат Янь были лидерами только в самые страшные моменты для нации. С восстановлением нашего законного места в китайской нации была объявлена серия запланированных национальных выборов. Первые, которые будут проведены за многие годы. Будем надеяться, что с новым мандатом новый президент сможет предвидеть период примирения, реконструкции и новой народной поддержки."

 SZC_unity_forged_through_tragedy: "Единство, выкованное трагедией"
 SZC_unity_forged_through_tragedy_desc: "Окруженные обломками, телами наших товарищей, слезами революционеров и пеплом нации. Трудно быть патриотом китайской нации на данном этапе. И все же благодаря нашим общим страданиям создается взаимная связь. Выкованная, чтобы быть нерушимой. Наша борьба, возможно, окончена, но наша нация все еще трудится. Вместе, однако, мы идем вперед к новому горизонту."

 SZC_reconstitute_the_beiyang_navy: "Восстановить Бэйянский флот"
 SZC_reconstitute_the_beiyang_navy_desc: "Некогда гордость нации, Бэйянский флот доминировал в азиатских морях и защищал береговую линию Китая. Теперь это не более чем тень, которой пренебрегает правительство. Чтобы по-настоящему вернуть право первородства Китайской Республики, мы должны аналогичным образом возродить военно-морские традиции Китая. Известно, что аполитичный, в основном, флот работал с маньчжурами, однако мы не можем их винить. В конце концов, они хотят только плавать по морям."

 SZC_forging_modernity_through_strength: "Ковка современности через силу"
 SZC_forging_modernity_through_strength_desc: "Хотя они довольно неохотно сотрудничали с маньчжурскими роялистами, становится все более очевидным, что Младокитайская партия была просто жертвой своего собственного высокомерия. Ибо, конечно, их погоня за национальным превосходством затуманила их способность к националистическому республиканизму. Придя к нам с поджатым хвостом, МКП окажется полезным партнером для нового современного Китая!"

 SZC_idealism_revisited_in_wus_name: "Идеализм, пересмотренный во имя У"
 SZC_idealism_revisited_in_wus_name_desc: "Интеллектуалы в Пекине — одновременно и наше величайшее благо, и злейший враг. Они продолжают отстаивать свою агитацию десятилетиями и, очевидно, не исчезнут в ближайшее время. Однако некоторые интеллектуалы, такие как Ху Ши и Бай Цзяньу, были необходимы для нашего отвоевания и для существования клики Чжили. Давайте обратимся к этим смелым идеалистам во имя благородной миссии Нефритового Маршала о демократической конфуцианской республике."

 SZC_five_races_under_one_union_forever_more: "Пять рас в едином союзе навсегда!"
 SZC_five_races_under_one_union_forever_more_desc: "Эпоха милитаристов и корыстных тиранов должна прийти к концу! Через национальное объединение Бэйянская республика увидела свое восстановление и возрождение после тяжелых десятилетий 1910-х и 1920-х годов. Сплотив не только Чжили, но и интеллектуалов, республиканцев и демократов, мы создадим новый единый Китай, вместе."

 SZC_all_under_the_auspicious_cloud: "Все под Благовещим Облаком"
 SZC_all_under_the_auspicious_cloud_desc: "Считающиеся знаком доброй воли и удачи, все владения Китая, обозначенные границами Республики 1911 года, должны быть приведены под нашу добрую волю. Поскольку наши пограничные регионы часто оспариваются между нашими законными сородичами и иностранными империалистами, это, безусловно, трудная и титаническая задача. Но если мы хотим принести просвещение всему Китаю, мы должны контролировать весь Китай."

