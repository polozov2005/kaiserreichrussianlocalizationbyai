 SZC_Cross_the_Dai_River_desc: "$QIE_cross_the_dai_river_desc$"

 SZC_Destroy_the_Kuomintang: "$QIE_destroy_kuomintang$"
 SZC_Destroy_the_Kuomintang_desc: "$QIE_destroy_kuomintang_desc$"

 SZC_War_Of_National_Resistance: "Война национального сопротивления"
 SZC_War_Of_National_Resistance_desc: "С тех пор как мы проиграли войну 1894 года, агрессия Японии против Китая была непрекращающейся и беспощадной. Постоянно угрожая нашей жалкой нации в ее самом слабом состоянии, они пытались захватить Шаньдун, захватить портовые города, захватить Дунбэй. А теперь они снова ступили на наши земли. Японцы будут отброшены только огнем и сталью. Мы не пощадим тех, кто стремится унизить и уничтожить Китай!"

 SZC_Eradicate_The_Concessions: "Искоренить концессии"
 SZC_Eradicate_The_Concessions_desc: "Так называемые концессии — это пережиток европейской, американской и японской несправедливости по отношению к Китаю. Сжимаемые как проклятые жемчужины, они продолжают плевать в лицо всем хорошим китайцам. Им будет предоставлен выбор: вернуть контроль Китаю пером или мечом. Так или иначе, этот век унижений, который они сотворили, закончится здесь."

 SZC_Tie_Up_Loose_Ends: "Связать концы с концами"
 SZC_Tie_Up_Loose_Ends_desc: "Далеко от Центрального бассейна власти Центральных равнин и побережья все еще существует множество государств, которые выступают против концепции единого Китая. Контролируя нашу границу и другие места, они должны быть взяты под наш надежный контроль. Ибо эта территория принадлежит под эгиду китайского каблука, и никого другого."

 SZC_Kickstart_The_Armament_Industry: "Запустить оружейную промышленность"
 SZC_Kickstart_The_Armament_Industry_desc: "Проклятые Цин, несомненно, растратили обильные ресурсы Центрального правительства. Учитывая дальнейший конфликт на горизонте, штаб верховного военного командования предложил правительству рассмотреть период целенаправленных усилий по омоложению оружейной промышленности, если мы хотим объединить нацию полностью."

 SZC_return_to_beijing: "Возвращение в Пекин"
 SZC_return_to_beijing_desc: "Большая часть Пекина все еще несет на себе шрамы после раздоров и боев, которые город видел в последние годы. Войны Чжи-Вань, войны Чжи-Фэн, Пекинский переворот, Маньчжурский переворот. Наша храбрая Северная столица пережила столько бесплодных трудностей. Теперь, когда мы отвоевали город у Цин, мы должны усердно работать, чтобы залечить эти шрамы и восстановить древний город как промышленный и коммерческий нервный центр Китая."

 SZC_Expand_The_Jinghan_Railroad: "Расширить железную дорогу Цзинхань"
 SZC_Expand_The_Jinghan_Railroad_desc: "Всегда являясь жизненно важными артериями, по которым ведутся войны в Восточном Китае, железные дороги контролируют сам ход сражений. Позволяя большим дивизиям и большему вооружению сталкиваться в отличие от пересеченной местности. Особого внимания заслуживает железная дорога Цзинхань, законченная в 1906 году, это один из самых неотъемлемых элементов инфраструктуры на территории Центрального правительства, и крайне важно, чтобы мы позаботились о ее обслуживании и расширении."

