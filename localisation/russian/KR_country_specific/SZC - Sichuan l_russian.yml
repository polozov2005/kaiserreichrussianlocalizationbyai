 SZC_from_resistance_to_reconstruction_tt: "§YЛевые взгляды Чжан Ланя считаются некоторыми довольно радикальными! Вы потеряете стабильность пропорционально тому, сколько влияния §cСоциал-консерваторов§!, §nНационал-популистов§!, §PПатерналистов-автократов§! и §gАвторитарных демократов§! у вас было.§!"

 SZC_leading_by_word_and_deed_tt: "§YДемократия может быть ранена, но у нее все еще есть зубы! Вы потеряете стабильность пропорционально тому, сколько влияния §cСоциал-консерваторов§!, §mРыночных либералов§!, §lСоциал-либералов§! и §SСоциал-демократов§! у вас было.§!"

 SZC_the_vibrant_bipartisan_democracy_tt: "§YВряд ли можно навязать здоровую демократию через доминирование! Вы потеряете стабильность пропорционально тому, сколько влияния §gАвторитарных демократов§!, §PПатерналистов-автократов§!, §RРадикальных социалистов§! и §SСоциал-демократов§! у вас было.§!"

 SZC_the_wisdom_of_west_and_east_effect_tt: "§WМы получим гражданские фабрики в §YНанкине, Гуанчжоу, Пекине, Ухане и Чанша§!. Мы получим одну гражданскую фабрику на город в зависимости от влияния нашей популярности §SСоциал-демократов§!, §lСоциал-либералов§!, §mРыночных либералов§! и §cСоциал-консерваторов§!.§!"

 SZC_specialised_practical_schools_effect_tt: "§LЭтот фокус даст нам разные эффекты в зависимости от того, назначены ли советники §YСянь Ин§!, §YЛи Цзэминь§! и §YСюн Чжэфань§!. Если у нас есть все советники, мы получим дополнительный эффект!§!"

 SZC_the_push_for_efficiency_effect_tt: "§WМы получим военные фабрики в §YНанкине, Гуанчжоу, Пекине, Ухане и Чанша§!. Мы получим одну военную фабрику на город в зависимости от влияния нашей популярности §aАвторитарных демократов§!.§!"

 SZC_promoting_harmonious_bipartisanship_tt: "Партнеры по коалиции §mРыночные либералы§! и §cСоциал-консерваторы§! теперь вносят 75% своей партийной популярности в наш $MODIFIER_POLITICAL_POWER_GAIN$."

 SZC_to_seek_prosperity_effect_tt: "§LМы получим гражданские фабрики в §YНанкине, Гуанчжоу, Пекине, Ухане и Чанша§!. Мы получим одну гражданскую фабрику на город в зависимости от влияния совокупного итога половины наших популярностей §lСоциал-либералов§!, §mРыночных либералов§!, §cСоциал-консерваторов§! и §aАвторитарных демократов§!.§!"

### Decisions ###
 Sichuan_Famine_decisions: "Усилия по оказанию помощи голодающим"
 Sichuan_Famine_decisions_desc: "Голод, опустошивший Сычуань в 1925 году, оставил глубокий шрам на нашем народе. Хотя мы сделали все, что могли, чтобы предотвратить еще один, крах Лиги, постоянная засуха и безудержные беспорядки превратили наши худшие страхи в реальность. Теперь мы должны сделать все возможное, чтобы бороться с этим голодом.\n\n§1Голод закончится, когда его модификатор §Y$MODIFIER_GLOBAL_MONTHLY_POPULATION$§! достигнет §!§Y0%§! (сейчас [?SZC_famine_monthly_population|=%+0]).\n\nТекущие ресурсы для помощи: £convoy_texticon [?SZC_famine_PP|H0]"
 SZC_International_Famine_Relief: "Международная помощь голодающим"
 SZC_International_Famine_Relief_desc: "В последние годы Китай пережил многое, и мы можем сделать не так уж много, чтобы помочь себе самим. За границей, в местах, не тронутых войной или голодом, зерна более чем достаточно. Мы должны призвать их помочь нам в трудную минуту."

 SZC_Service_For_Food: "Служба за еду"
 SZC_Service_For_Food_desc: "Каждый трудоспособный мужчина, который может служить, должен внести свой вклад в преодоление катастрофы! Поэтому мы предложим гражданским лицам увеличенные пайки в обмен на военную службу и привлечем этих солдат к раздаче продовольствия массам."
 SZC_Labour_Relief: "Трудовая помощь"
 SZC_Labour_Relief_desc: "Еды на всех не хватает, поэтому те, кто может, должны работать, чтобы заработать свои пайки. Мы создадим программу, в рамках которой безработные и трудоспособные будут призываться в качестве рабочих и получать оплату пайками за строительство инфраструктуры и объектов, необходимых нам для более эффективной борьбы с голодом."
 SZC_Allocate_More_Government_Funds: "Выделить больше государственных средств"
 SZC_Allocate_More_Government_Funds_desc: "Чтобы бороться с голодом, нам нужно будет задействовать больше ресурсов от правительства. Однако это произойдет за счет других государственных проектов."
 SZC_Increase_Relief_Efforts: "Усилить меры по оказанию помощи"
 SZC_Increase_Relief_Efforts_desc: "Очевидно, что нужно сделать больше для распределения продовольствия в сельской местности. Местным лидерам в сельских районах Сычуани будет поручено создать программы по раздаче риса своим общинам."
 SZC_Food_Banks: "Продовольственные банки"
 SZC_Food_Banks_desc: "Правительство будет работать с фермерами и буддийскими храмами, чтобы доставлять еду народу Сычуани, лучше помогая нам охватить все уровни общества нашими усилиями по борьбе с этой катастрофой."
 SZC_Subsidise_Food_Production: "Субсидировать производство продуктов питания"
 SZC_Subsidise_Food_Production_desc: "В Сычуани много фермеров, но поскольку большинство из них не зарабатывают достаточно, чтобы полагаться на что-либо, кроме погоды и устаревших методов, призрак нового голода маячит при каждой засухе. Вмешиваясь с деньгами из собственной казны, государство может помочь фермерам бороться с отходами и повышать производительность."
 SZC_Enact_Price_Controls: "Ввести контроль цен"
 SZC_Enact_Price_Controls_desc: "Когда разразился голод, многие торговцы начали накапливать зерно и рис, взимая непомерные платы за эти товары. Государство, при необходимости опираясь на армию, позаботится о том, чтобы никто не наживался на страданиях нашего народа, введя контроль цен."
 SZC_Child_Protection_Programme: "Программа защиты детей"

 SZC_Fading_Famine: "Угасающий голод"
 SZC_Fading_Famine_desc: "С окончанием засухи наше сельское хозяйство начало медленно восстанавливаться. В течение следующих месяцев катастрофический голод наконец уйдет в прошлое... оставив после себя лишь шрамы."

 SZC_Import_Grain: "Импортировать зерно из [SZC_import_target]"
 SZC_import_target_GEA: "Немецкого Индокитая"
 SZC_import_target_other: "[From.GetNameDef]"
 SZC_Import_Grain_desc: "Поскольку засуха сделала урожайность большинства наших сельскохозяйственных угодий в лучшем случае скудной в обозримом будущем, государство выделит средства на импорт продовольствия из-за рубежа, чтобы восполнить то, что уничтожила засуха."

 SZC_Request_Aid: "Запросить помощь у [SZC_famine_relief]"
 SZC_Request_Aid_desc: "[SZC_famine_relief_desc]"
 SZC_famine_relief_QIE: "Центрального правительства"
 SZC_famine_relief_desc_QIE: "Старое центральное правительство в Пекине переживает трудные времена, как и все остальные в Китае. Как бы то ни было, они не оставят своих китайских собратьев в беде. Мы должны попросить их о помощи в борьбе с голодом."
 SZC_famine_relief_FNG: "правительства Фэнтяня"
 SZC_famine_relief_desc_FNG: ""
 SZC_famine_relief_GXC: "Гуандуна"
 SZC_famine_relief_desc_GXC: ""
 SZC_famine_relief_CHI: "Гоминьдана"
 SZC_famine_relief_desc_CHI: ""
 SZC_famine_relief_YUN: "Юньнани"
 SZC_famine_relief_desc_YUN: ""
 SZC_famine_relief_LEC: "Совета легаций"
 SZC_famine_relief_desc_LEC: "От Гонконга до Шанхая Легационные города обладают изобилием богатств и ресурсов. По сравнению с остальным Китаем, они в значительной степени не пострадали от смерти маршала Суня и последовавших беспорядков. Из-за этого они в состоянии помочь — однако захочет ли их бюрократия, это уже другой вопрос."

 Sichuan_Opium_Monopoly_decisions: "Бюро монополии продаж"
 Sichuan_Opium_Monopoly_decisions_desc: "Ситуация с опиумом на данный момент вышла из-под нашего контроля, и мы не в состоянии полностью избавиться от него. Вместо того чтобы полностью искоренять эту индустрию, мы возьмем ее под контроль государства и направим прибыль от этого порока в нашу казну.\n\nТекущий контроль опиума: £opium_texticon [?SZC_opium_control|+%1]"
 SZC_Bureaucratic_Reforms: "Бюрократические реформы"
 SZC_Bureaucratic_Reforms_desc: "Нам нужно принять меры, чтобы государственная бюрократия функционировала меньше как обычная, а больше как бизнес, что касается опиума. Внося постепенные изменения в этом направлении, мы оптимизируем наш контроль над рынком."
 SZC_Buy_Out_Merchants: "Выкупить торговцев"
 SZC_Buy_Out_Merchants_desc: "Иногда лучший способ справиться с конкуренцией — просто выкупить ее. Хотя это дорогостоящая инвестиция для государства, со временем эти расходы нашей государственной казны должны окупиться за счет прибыли, которую мы получим."
 SZC_Forced_Acquisitions: "Принудительные приобретения"
 SZC_Forced_Acquisitions_desc: "Приняв очень буквальное толкование закона, мы можем отправить полицию, чтобы принудительно закрыть несколько частных рынков и использовать их товары и собственность для расширения нашей монополии."
 SZC_Tax_Harvesting_Scheme: "Схема сбора налогов"
 SZC_Tax_Harvesting_Scheme_desc: "Чтобы увеличить доходы для финансирования наших правительственных планов, мы можем выделить дополнительные ресурсы местным администраторам и помочь их усилиям по сбору налогов — старых, текущих и новых, — причитающихся нам, и выжать каждый пенни из тех, кто думал, что они выше закона. Это будет непопулярно, но это на благо Сычуани."
 SZC_Transit_Tariffs: "Транзитные тарифы"
 SZC_Transit_Tariffs_desc: "Мы поручим военным и полиции установить контрольно-пропускные пункты на ключевых дорогах и транзитных пунктах вокруг Сычуани, чтобы облагать налогом перевозку опиума. Хотя это и доставит неудобства простолюдинам, это наполнит нашу казну и не позволит конкурентам перемещать свои товары."
 SZC_Farmer_Licensing: "Лицензирование фермеров"
 SZC_Farmer_Licensing_desc: "Каждая ферма, занимающаяся производством опиума, отныне будет нуждаться в лицензии на работу. Несоблюдение требований, конечно, заставит нас конфисковать их собственность."
 SZC_Uncontested_Monopoly: "Неоспоримая монополия"
 SZC_Uncontested_Monopoly_desc: "В Сычуани больше нет опиумного рынка, есть только государственная монополия, которую преступники и контрабандисты не могут тронуть. Если они не находятся под нашим прямым контролем, то де-факто находятся под ним через наши правила и налоги. Хотя некоторые могут сказать, что мы не лучше преступников, которых мы вытеснили, мы принесли безопасность и постоянный поток денег государству."
 SZC_Combat_Corruption: "Борьба с коррупцией"
 SZC_Combat_Corruption_desc: "Наши усилия по поддержанию контроля над рынком затрудняются тем, что некоторые из наших чиновников берут взятки, чтобы закрывать глаза на несанкционированный опиумный бизнес. Устранив их, мы оставим меньше лазеек для негосударственных субъектов."
 SZC_Combat_Smuggling: "Борьба с контрабандой"
 SZC_Combat_Smuggling_desc: "Направив нашу армию патрулировать дороги и реки страны, мы сможем значительно помешать контрабандистам, подрывающим государственную монополию. Постепенно это вытеснит их из бизнеса."

 Sichuan_Opium_Removal_decisions: "Комитет по запрету опиума"
 Sichuan_Opium_Removal_decisions_desc: "С тех пор как нам был навязан Тяньцзиньский договор, торговля опиумом опустошила Китай и принесла отчаяние миллионам китайцев. Наша вина в этом значительна — Сычуань является гнилым ядром этой разрушительной индустрии. Вызов, стоящий перед Комитетом по запрету опиума, огромен, но мы обязаны освободить наш народ от тисков опиума.\n\nТекущее распространение опиума: £opium_texticon [?SZC_opium_spread|+%1]"
 SZC_Promote_Crop_Production: "Продвигать производство сельскохозяйственных культур"
 SZC_Promote_Crop_Production_desc: "Одной из причин преобладания опиумных культур является их прибыльность. Субсидируя и иным образом продвигая выращивание обычных культур, мы должны начать видеть, как больше наших фермеров отходят от выращивания опиума."
 SZC_Poppy_Burning_Campaign: "Кампания по сжиганию мака"
 SZC_Poppy_Burning_Campaign_desc: "Мы перекроем поставки прямо у источника, отправив армию совершить налет на некоторые из наиболее известных незаконных опиумных полей, все еще действующих."
 SZC_Prohibitionist_Victory: "Победа прогибиционистов"
 SZC_Prohibitionist_Victory_desc: "Благодаря самоотверженности КЗО бич зависимости, который так долго терзал Сычуань, наконец-то сдержан, а те, кто наживался на нем, находятся за решеткой или изгнаны из наших провинций. Это действительно победа, которую стоит отпраздновать!"
 SZC_Anti_Corruption_Campaigns: "Антикоррупционные кампании"
 SZC_Anti_Corruption_Campaigns_desc: "Нашим усилиям по сдерживанию распространения опиума сильно мешают коррумпированные чиновники и государственные служащие, которые берут взятки, растрачивают средства и игнорируют закон, когда это удобно. Следует приложить больше усилий, чтобы они знали, что их значки и титулы не ставят их выше закона."
 SZC_Purge_The_Administration: "Чистка администрации"
 SZC_Purge_The_Administration_desc: "Радикальные времена требуют радикальных мер, и в настоящее время среди нас слишком много ласок, которые наживаются на трудностях нашего народа. Мы используем нашу полицию и армию, чтобы сместить их с должностей и послать четкий сигнал, что мы не потерпим коррупции."
 SZC_Anti_Smuggling_Measures: "Меры против контрабанды"
 SZC_Anti_Smuggling_Measures_desc: "Направив нашу армию патрулировать дороги и реки страны, мы сможем значительно ограничить свободу передвижения контрабандистов в нашей провинции."
 SZC_Break_The_Black_Market: "Сломать черный рынок"
 SZC_Break_The_Black_Market_desc: "Вместо того чтобы постепенно подавлять преступников, мы отправим армию и будем сражаться с ними так же, как сражались бы с любым другим врагом Сычуани, с неограниченной силой."
 SZC_Break_The_Black_Market_tooltip: "§RБандиты просто так это не оставят. Если эта операция провалится, это значительно отбросит наши усилия назад!§!"
 SZC_Set_Up_Treatment_Clinics: "Создать лечебные клиники"
 SZC_Set_Up_Treatment_Clinics_desc: "Строя новые клиники и расширяя существующие для реабилитации зависимых, мы смягчим последствия кризиса и сделаем бизнес менее прибыльным для контрабандистов."
 SZC_Set_Up_Treatment_Clinics_tooltip: "§GКак только кризис закончится, эти клиники все еще будут существовать, чтобы помогать людям с более традиционными потребностями.§!"

 Sichuan_Diarchy_decisions: "Диархия"
 Sichuan_Diarchy_decisions_desc: "В отличие от многих клик милитаристов в Китае, Баодин известен тем, что более склонен к сотрудничеству, чем к конкуренции. Если баланс будет сохранен, это принесет огромную пользу Сычуани. Обе стороны должны идти на уступки, чтобы сотрудничество работало, ибо если одна сторона станет слишком доминирующей, диархия может начать напоминать автократии, которые ее окружают."
 SZC_Favour_The_Militarists: "Благоволить милитаристам"
 SZC_Favour_The_Militarists_desc: "Поддерживая более консервативное военное крыло финансированием и милостями, наша армия пожнет плоды, одновременно давая их фракции толчок в глазах общественности. Если пренебрегать армией, это ухудшит их эффективность на поле боя. Однако если позволить им стать слишком сильными, это рискует подорвать гражданские ветви власти Сычуани. Хотя, безусловно, заманчиво отдавать предпочтение армии, особенно во время войны, мы должны быть осторожны, чтобы не спровоцировать враждебную реакцию, позволив нашим административным обязанностям рухнуть."
 SZC_Favour_The_Bureaucrats: "Благоволить бюрократам"
 SZC_Favour_The_Bureaucrats_desc: "Предоставляя больше ресурсов и общественной поддержки гражданским ветвям власти, мы увидим хорошо отлаженную бюрократию, более способную решать проблемы, с которыми сталкивается провинция. Однако если мы будем слишком сильно им благоволить, наша армия пострадает от сокращения расходов и будет хуже действовать на поле боя. Если это будет продолжаться слишком долго, мы не можем исключать, что армия возьмет меры в свои руки, чтобы исправить этот дисбаланс."

 SZC_Help_The_LEP: "Отправить помощь Лиге"

 Sichuan_Zhili_decisions: "Остатки Чжили"
 Sichuan_Zhili_decisions_desc: "Остатки Чжили под эгидой §Pмаршала Ван Чэнбиня§! сумели восстановить свои силы в [SZC.Capital.GetCapitalVictoryPointName]. Однако жестоко избитые, потерявшие много хороших людей по пути, Остаточные силы Чжили присоединяются к нашим местным армиям Сычуани как истощенная сила. С другой стороны, не все потеряно. С ветеранами войн Чжи-Фэн и интенсивным опытом борьбы с маньчжурскими армиями при отступлении, люди искусны, выносливы и слишком способны. Мы должны стремиться интегрировать и реформировать силы Чжили, чтобы мы могли нанести ответный удар на тропе войны против Роялистов и любого другого, кто посмеет встать на нашем пути национального объединения."
 SZC_Reorganise_The_Remnant_Divisions: "Реорганизовать дивизии остатков"
 SZC_Reorganise_The_Remnant_Divisions_desc: "Бежав со свитой своих самых преданных, несгибаемых солдат, §Pмаршал Ван Чэнбинь§! вместе с такими людьми, как Цзян Байли и Чжан Цихуан, привел с собой свои остаточные силы, которые раньше составляли большинство их дивизий. Некогда Центральная армия, Чжили теперь сократились до ничтожной силы, не считая внешних членов Чжили, таких как Тан Сянмин или Лига. Возможно, дорогостоящее мероприятие, но §PМаршал§! разработал план, согласно которому силы будут демобилизованы, реорганизованы и воссозданы в группу элитных дивизий «Синьгоцзюнь» (Новая национальная армия). Несмотря на стоимость, это обеспечит группу уникально квалифицированных и уникально мотивированных солдат для армии."

 Sichuan_Arms_Purchases_decisions: "Сделки с иностранным оружием"
 Sichuan_Arms_Purchases_decisions_desc: "Набожные в нашем крестовом походе против маньчжуров и их роялистов, это не обязательно означает, что мы против практик и убеждений империалистов. Пока нет. В конце концов, всему свое время, не так ли? Пока наши благородные арсеналы вооружения, такие как Чунцин и Дасянь, работают круглосуточно, чтобы производить артиллерию, снаряды, пули и винтовки, необходимые для поддержания наших армий, определился другой путь для вооружения. Сильно уменьшенный по сравнению с нашим статусом международно признанного Центрального правительства, что не имеет значения в масштабах торговли оружием. Глядя на более широкий круг благодетелей в международной сфере вооружений, мы можем вооружиться для великого отвоевания!"
 SZC_Purchase_Foreign_Guns: "Закупить иностранное оружие"
 SZC_Purchase_Foreign_Guns_desc: "С ростом военной модернизации по всему миру, явно в рамках подготовки к какому-то более широкому национальному конфликту на горизонте, международные винтовки также быстро модернизируются. В результате притока устаревших образцов, пылящихся на мировых складах, наши специалисты по логистике подготовили серию контрактов, по которым мы закупим ассортимент избыточного вооружения."
 SZC_Purchase_Support_Equipment: "Закупить иностранное снаряжение поддержки"
 SZC_Purchase_Support_Equipment_desc: "Удивительный очаг производства и разработки вооружения, датский пулемет Мадсена зарекомендовал себя как неоспоримо надежный, эффективный и замечательный ручной пулемет поддержки не только для наших солдат, но и для армий здесь и сейчас. Первый в мире настоящий ручной пулемет, производимый в больших количествах, командный состав армии особенно полюбил вспомогательное вооружение датчанина."
 SZC_Purchase_Artillery: "Закупить иностранную артиллерию"
 SZC_Purchase_Artillery_desc: "Любопытный выбор среди других наших потенциальных благодетелей военного вооружения, швейцарский военно-промышленный комплекс тем не менее остается достойной восхищения, хотя и скромной, национальной отраслью. Однако, учитывая их вечное присутствие нейтралитета, их оборудование обычно оказывается выставленным на продажу на международном рынке оружия. Слишком хорошо знакомая с тем фактом, что артиллерия — король в китайской войне, Армия была бы очень рада получить современные орудия в значительном количестве хоть раз."

 SZC_Hire_RCW_Veterans: "Нанять ветеранов Гражданской войны в России"
 SZC_Hire_RCW_Veterans_desc: "Поскольку наши отношения с Германией в лучшем случае шаткие, а другие империалисты держатся на расстоянии из-за отсутствия у нас легитимности, многие полагают, что наши грандиозные амбиции по отвоеванию лишены помощи в военном развитии. Но остается одна западная, современная нация, которая еще не выступила открыто против нас в последнее время. Россия.\n\nКонечно, многие презирают Русского Медведя из-за его предыдущей колониальной экспансионистской политики, такой как захват Внешней Маньчжурии или дальнейшее вторжение в Дунбэй после Боксерского восстания. Тем не менее, их униженные, амбициозные и пожилые офицеры доказывают, что они невероятно подходят для замены того, что могли бы предоставить немецкие советники. Явно квалифицированные почти во всех требуемых от них аспектах."

 SZC_united_anti_japanese_front: "Единый антияпонский фронт"
 SZC_united_anti_japanese_front_desc: "Восходящее Солнце над нами! И если Китай хочет выжить, он должен весь объединиться, независимо от вероисповедания, чтобы защитить тысячелетнюю цивилизацию нации. Имея налаженные связи с различными ведущими левыми фигурами по всей стране, правительство могло бы и дальше добиваться союза с некоторыми из величайших военных тактиков и стратегов страны, даже если это может бросить тень на буржуазную демократию Китая..."

 SZC_reconstruct_naval_pride: "Восстановить морскую гордость"
 SZC_reconstruct_naval_pride_desc: "Китайский флот когда-то был одним из великих флотов всего мира, занимая седьмое место по тоннажу. Увы, будучи потопленным на дно океана после японо-китайской войны, китайские морские амбиции так и не восстановились; вечно загнанные в угол Восходящим Солнцем. Получив дополнительную свободу действий после объединения нации, оставшиеся морские клики надавили на правительство, чтобы оно наконец начало грандиозную программу перевооружения военно-морского флота Китая, ибо Срединное царство пробуждается, и оно должно быть в состоянии защитить свои собственные воды."

 SZC_creating_the_chinese_airforce: "Создание ВВС Китая"
 SZC_creating_the_chinese_airforce_desc: "Разрозненные региональные программы ВВС Китая на протяжении многих лет наблюдали запутанные или иным образом сбивающие с толку партии прогресса. С самыми впечатляющими результатами, появляющимися на Юго-Западе в Куньмине и на Северо-Востоке в Шэньяне, другим местным программам повезло не так сильно. Собственная отечественная программа Лю Сяна в Сычуани, например, использовала камни, похожие на разрывные бомбы. Если Китай хочет быть настоящей великой державой, он должен быть в состоянии утвердить себя в Третьем измерении войны, и, таким образом, не может жалеть средств на быстрое развитие своего собственного воздушного флота."

 SZC_bear_the_banner_of_federalist_hopes: "Нести знамя надежд федералистов"
 SZC_bear_the_banner_of_federalist_hopes_desc: "Несмотря на нашу помощь и несмотря на любое разумное сопротивление врагам федерализма, распорядитель проекта китайской провинциальной автономии пал перед вражескими силами, которые скорее обрушат свой молот на тех, кто стремится к демократии и свободе, чем уступят ни на дюйм. Поскольку провинциальное правительство прижато к стене, пришло время [SZC.Capital.GetCapitalVictoryPointName] стать последним убежищем Китая для провинциальной автономии."

