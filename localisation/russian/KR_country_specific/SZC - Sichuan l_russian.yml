 sichuan_events.169.d.YUN: "Засуха и последствия жестокой гражданской войны привели к ужасному голоду, охватившему Сычуань. Поскольку правительство Сычуани, по-видимому, неспособно решить эти проблемы, многие просто сдались и бежали из провинции десятками тысяч на более зеленые пастбища в наши земли. Хотя они не единственные, кто попал в трудные времена в Китае, многие как среди нашего населения, так и в нашем правительстве требуют, чтобы мы что-то сделали, чтобы помочь нашим китайским собратьям. Другие считают, и вряд ли без оснований, что, учитывая нашу недавнюю гражданскую войну после падения режима Тан, мы мало что можем сделать, чтобы помочь. Учитывая масштаб ситуации, возвращение их в Сычуань только усугубит ситуацию.\n\nНезависимо от наших действий, наше правительство подало официальный запрос правительству в [SZC.Capital.GetCapitalVictoryPointName], чтобы они усилили свои усилия по решению этого кризиса."
 sichuan_events.169.a: "Попытаться помочь, чем сможем."

 sichuan_events.170.t: "Коррупция показывает свое лицо"
 sichuan_events.170.d: "Это история стара как мир. Будь то ящик с гуманитарной помощью, который просто исчез, или полковник, запрашивающий продовольственные пайки для полков, существующих только на бумаге, хаос в стране открыл двери для множества бесстыдных личностей, чтобы взять что-то лишнее для себя. Будь то отчаяние или жадность, мы не можем терпеть ничего из этого. Нужно приложить больше усилий, чтобы искоренить этот вид воровства."
 sichuan_events.170.a: "Серьезно? Воровать у голодающих крестьян?"

 sichuan_events.171.t: "Коррупция задерживает усилия по оказанию помощи"
 sichuan_events.171.d: "Недавно появились сообщения о том, что солдаты и чиновники вымогают у людей взятки, чтобы пропустить грузы помощи, называя это платой за проезд или чем-то подобным неискренним. Был издан приказ о том, что к любому, кто будет пойман за участием в такого рода деятельности, будут применены дисциплинарные меры. Это должно заставить их дважды подумать, прежде чем пытаться заработать несколько монет таким образом."
 sichuan_events.171.a: "Только не это снова..."

 sichuan_events.172.t: "Черный рынок продовольствия"
 sichuan_events.172.d: "Поскольку мешок риса стоит на вес золота, контрабанда еды стала прибыльным бизнесом как для преступных синдикатов, так и для безжалостных фермеров, выращивающих опиум. Некоторые используют накопленные ресурсы и продают их с наценкой отчаявшимся людям по всей Сычуани, в то время как более наглые преступники просто крадут пакеты с продовольственной помощью, чтобы продать их на черном рынке. Полиция делает все возможное, чтобы бороться с этой бесстыдной преступностью, но их усилий пока недостаточно для полного устранения проблемы."
 sichuan_events.172.a: "Больше наживы на страданиях?"

 sichuan_events.173.t: "Рейды Гоминьдана на поставки продовольствия"
 sichuan_events.173.d: "Китаю вряд ли привыкать к войне, и хотя мы недавно закончили нашу гражданскую войну, конфликты все еще охватывают Китай. В тревожной новой тенденции некоторые из наших международных грузов помощи подверглись нападению партизан Гоминьдана. Хотя нам еще предстоит определить, из Юньнани они, Гуанси или даже левого Гоминьдана, сражающегося в том, что раньше было Лигой восьми провинций, нам нужно усилить безопасность, чтобы предотвратить эти действия в будущем."
 sichuan_events.173.a: "Ну, это просто смешно."

 sichuan_events.174.t: "Молитвы о дожде"
 sichuan_events.174.d: "Движимый ли искренней верой или просто желанием вселить надежду в отчаявшуюся общественность, Лю Сян собрал нескольких религиозных лидеров со всей провинции, чтобы молиться о возвращении дождей в Сычуань и прекращении засухи. Хотя это, безусловно, красивое представление, оно вряд ли помогло делу на местах, так как спустя дни после того, как были созваны молитвы, на небе все еще нет ни облачка, не говоря уже о дожде."
 sichuan_events.174.a: "Это не помогает!"

 sichuan_events.175.t: "Дуцзянъянь повреждена"
 sichuan_events.175.d: "Во время гражданской войны система Дуцзянъянь для орошения территории вокруг канала Баопинкоу была нарушена, что вызвало наводнение, призванное отбросить силы Лю Сяна, не вступая с ними в бой в поле. Оказывается, однако, что, выбрав легкий путь в тот день, мы усугубили ситуацию с голодом для себя. Операция наших инженеров нанесла длительный ущерб, который теперь привел к пересыханию канала. Без каких-либо средств или орошения территории засуха поразила близлежащие поля, усугубив и без того тяжелую ситуацию. Нам некого винить в этом испытании, кроме самих себя, и теперь мы должны взять на себя ответственность за свои действия."
 sichuan_events.175.a: "Что мы наделали?"

 sichuan_events.176.t: "Личное пожертвование Джеймса Йена"
 sichuan_events.176.d: "Похоже, что, несмотря на наши ужасные условия, все еще есть друзья, готовые помочь. Одним из них является И.К. Джеймс Йен, ведущий интеллектуал в Пекине и лидер Китайской ассоциации реформ империи, а также вдохновитель Движения за сельскую реконструкцию. Мы только что получили послание от Йена, в котором он заявляет о своем желании помочь усилиям по оказанию помощи голодающим. С этой целью его Движение за сельскую реконструкцию сделало щедрое пожертвование на наши усилия по оказанию помощи, и грядет еще большая помощь."
 sichuan_events.176.a: "Спасибо, друг."

 sichuan_events.200.t: "Дела Красного бассейна"
 sichuan_events.200.d: "Сычуаньская впадина, также называемая Красным бассейном из-за красного песчаника, выстилающего почву, в настоящее время находится в плачевном состоянии. Холмистый регион может похвастаться одними из самых плодородных земель Китая, а также широкими возможностями для орошения и террасного земледелия. Однако последние десятилетия не были добры к провинции. Череда неумелых правительств с конца эры Цин оставила провинцию в застое и изоляции по отношению к китайской экономике.\n\nВ последние три десятилетия выращивание опиума стало, пожалуй, крупнейшим и самым важным экономическим сектором Сычуани из-за высокой прибыли, получаемой от выращивания мака. Опиум приносит много богатства, но он также является большой проблемой из-за его воздействия на население. Его нерегулируемый рост был одной из причин голода, а также источником конфликтов из-за преступных ассоциаций и даже сычуаньских милитаристов, пытающихся контролировать торговлю.\n\nПрежде чем мы сможем даже начать работать над улучшением нашей экономики, мы должны решить судьбу опиумной индустрии. Статус-кво неустойчив, но есть несколько вариантов, которые мы могли бы выбрать..."
 sichuan_events.200.a: "Мы должны искоренить опиум в провинции."
 sichuan_events.200.b: "Мы возьмем опиум под свой контроль."

 SZC_opium_removal_tooltip: "§RВыращивание опиума повсеместно распространено в Сычуани. Сокращение его распространения будет трудной и политически дорогостоящей задачей. Потенциальные выгоды, однако, не следует недооценивать.§!"
 SZC_opium_monopoly_tooltip: "§RТорговля опиумом чрезвычайно распространена в Сычуани, поддерживаемая полным отсутствием регулирования в последние десятилетия. Нам следует ожидать сильного сопротивления любой форме регулирования.§!"

 sichuan_events.201.t: "Оценка распространения опиума"
 sichuan_events.201.d: "Сычуань может претендовать на звание крупнейшего в мире производителя и потребителя опиума: тысячи тонн этого растения выращиваются в наших границах каждый год. Часто говорят, что Сычуань — это самое гнилое ядро китайского опиумного кризиса, и так было со времен англо-китайских войн XIX века. Учитывая огромные масштабы как производства, так и потребления опиума в Сычуани, никто не питает иллюзий, что это будет невероятно сложная задача."
 sichuan_events.201.a: "Это должно быть сделано."

 sichuan_events.202.t: "Масштаб коррупции"
 sichuan_events.202.d: "Сверху донизу каждый сегмент сычуаньского общества затронут торговлей опиумом и связанными с ней пороками, до такой степени, что повседневные функции правительства и общества нарушены. Например, солдат, получающий оплату опиумом, в то время как его командир присваивает его жалованье, является тревожно распространенной практикой. Это не только способствует коррупции и плохому моральному духу в армии, но, как трагически доказала наша недавняя гражданская война, широкое распространение опиумной зависимости в рядах привело к бессмысленным смертям и страданиям со всех сторон конфликта. Подобные практики наблюдаются и в других ветвях власти, от местных мэров, обогащающихся за счет наркоторговли, вплоть до мелких бюрократов, берущих взятки и притесняющих местное население. Даже простой человек в Сычуани не застрахован от искушений этой коррупции, несмотря на то, что чаще всего является просто ее жертвой.\n\nМы должны смириться с пугающим фактом, что коррупция заражает каждую грань нашего общества — сверху донизу — и вряд ли хоть одна организация в Сычуани избежала ее. Нам предстоит долгий и трудный путь, если мы хотим обуздать эту проблему."
 sichuan_events.202.a: "Всё *настолько* плохо?!"

 sichuan_events.203.t: "Зависимость от опиума"
 sichuan_events.203.d: "Бич опиума настолько распространен в Сычуани, что стал частью повседневной жизни провинции. Его последствия можно увидеть, куда ни глянь: от людей на улицах, которые губят свои жизни из-за него, до самой верхушки общества. Никто не застрахован от его последствий. Это поистине знамение времени, что зрелища, которые шокировали бы любого на протяжении большей части истории, рассматриваются как часть повседневной рутины в Сычуани."
 sichuan_events.203.a: "Нам придется заняться этим рано или поздно."

 sichuan_events.204.t: "План против опиума"
 sichuan_events.204.d: "Комиссия, которой поручено искоренить злоупотребление опиумом и наживу на нем в Сычуани, начала разрабатывать планы монументальной задачи избавления Сычуани от этой болезни. Предложенные меры указывают на трудный путь впереди, и даже самые оптимистичные прогнозы предполагают, что это будет невероятно дорогостоящее и трудное начинание.\n\nНекоторые из более мягких мер включают реформы и довольно обычные антикоррупционные меры. Комиссия также настаивает на срочности реабилитации наркоманов и принуждения их отказаться от зависимости, что ляжет бременем на нашу систему здравоохранения. Представитель армии также присутствовал на встрече и изложил планы того, что они могут сделать, помогая усилиям полиции по сокращению производства и контрабанды, хотя некоторые из их методов могут быть немного жесткими.\n\nНам предстоит долгий путь. Давайте доведем это дело до конца."
 sichuan_events.204.a: "Давайте начнем."

 sichuan_events.205.t: "Рост черного рынка"
 sichuan_events.205.d: "Как только правительство начало свою инициативу по борьбе с опиумной зависимостью, неизбежным побочным эффектом стал взрывной рост цен на опиум и рост черного рынка. Эта теневая экономика уже является одной из крупнейших в Сычуани по объему ВВП, и все это идет прямо в карманы преступников. Скачок цен также наверняка вызовет огромные трудности для наркоманов среди населения Сычуани, если мы не вмешаемся и не предоставим им необходимую помощь. Однако слом черного рынка должен быть нашим главным приоритетом."
 sichuan_events.205.a: "Они бандиты, и с ними разберутся."

 sichuan_events.206.t.delays: "Наши усилия задерживаются"
 sichuan_events.206.d.delays: "Поскольку опиум становится на вес золота из-за того, что поставки уходят в подполье, можно заработать много денег, закрывая на это глаза. Чиновники регулярно «забывают» сообщать о транспортировке опиума через их районы, так как искушение получить долю от черного рынка часто слишком велико. Без более строгих мер против административной коррупции эти проблемы вряд ли исчезнут."
 sichuan_events.206.t.bribery: "Скандал со взяточничеством"
 sichuan_events.206.d.bribery: "Крупный скандал потряс нашу армию. Несколько военных чиновников, которым было поручено контролировать уничтожение опиумных полей, были арестованы за распространение изъятых запасов опиума, которые они должны были уничтожить. Под их командованием призывникам также платили пакетами опиума, в то время как деньги, предназначенные для оплаты их жалованья, шли прямо в карманы офицеров. С ними обойдутся сурово, но пока на коррупции можно заработать деньги, это вряд ли будет последний случай такого рода."
 sichuan_events.206.t.no_enforcement: "Отсутствие правоприменения"
 sichuan_events.206.d.no_enforcement: "Не секрет, что ящик опиума может стоить годовой зарплаты полицейского. Они всего лишь люди, и поэтому многие ранее честные полицейские были пойманы на получении взяток или даже участии в контрабандных операциях в качестве посредников. Однако наиболее распространенной практикой является то, что офицеры просто не сообщают о том, что они видят, и закрывают глаза на вещи, все в обмен на деньги и наркотики. Похоже, нам нужно активизировать наши усилия, чтобы навести порядок в наших полицейских силах. Если они дрогнут, то и наши усилия по борьбе с опиумом тоже."
 sichuan_events.206.a: "Насколько глубоко это может зайти?!"

 sichuan_events.207.t: "Начало антикоррупционной кампании"
 sichuan_events.207.d: "Усилия по искоренению коррупции уже приносят плоды. Хотя арестов и обвинительных приговоров пока немного, мы дали понять, что никто не застрахован от длинной руки закона. Серьезная угроза быть брошенным в темницу в случае поимки заставляет многих из этих бесхребетных трусов подчиняться и выполнять свою работу. Медленно, но верно бюрократия приводится в соответствие с остальной частью нашей инициативы по борьбе с опиумом."
 sichuan_events.207.a: "Мы искореним их, по одному, если понадобится!"

 sichuan_events.208.t: "Коррупция на государственной службе"
 sichuan_events.208.d: "Даже наша администрация не застрахована от искушения быстро заработать на волне войны с опиумом. Растраты, кражи и взяточничество процветают, и уже произведено несколько весьма постыдных арестов. Похоже, предстоит еще многое сделать, чтобы избавить нашу администрацию от этих слабовольных мелких преступников."
 sichuan_events.208.a: "Как это стало таким масштабным?!"

 sichuan_events.209.t: "Коррупция в армии"
 sichuan_events.209.d: "Значительная часть нашей армии давно страдает от плохой репутации из-за повсеместного отсутствия профессионализма. Многое из этого связано с опиумом: большая часть наших сил — наркоманы, которым часто тайно платят опиумом, в то время как их командиры присваивают их реквизированное жалованье. Эти практики долгое время молчаливо принимались, но когда мы объявили о нашей инициативе по борьбе с опиумом, они вряд ли могли ожидать, что будут освобождены от закона. Это уже вызвало проблемы как с солдатами, так и с офицерами. Генералам будет трудно разобраться в этом беспорядке."
 sichuan_events.209.a: "Даже в армии?!"

 sichuan_events.210.t: "Контрабандисты в администрации"
 sichuan_events.210.d: "Учитывая количество денег, которые можно заработать на контрабанде опиума, было неизбежно, что чиновники в нашей администрации поддадутся искушению деньгами. Уже многие чиновники низшего и даже среднего звена были отправлены за решетку за помощь в контрабанде в сельской местности, как правило, путем получения взяток в обмен на то, чтобы позволить операциям по контрабанде идти беспрепятственно. Кажется, что сколько бы мы ни ловили, за каждым углом всегда есть еще больше коррумпированных чиновников."
 sichuan_events.210.a: "Очевидно, нельзя нарушить закон, если ты *и есть* закон."

 sichuan_events.211.t.committee: "Опиумный комитет замешан в контрабанде"
 sichuan_events.211.d.committee: "Возможно, самым большим позором для комитета стало то, что его высокопоставленный член был пойман с поличным в ходе полицейской спецоперации. Теперь уже бывший чиновник брал крупные взятки в обмен на сообщение о том, что операции, которые даже не проводились, на самом деле были успешными, что в некоторых случаях приводило к отвлечению ресурсов от столь необходимого правоприменения в регионе. Хотя арест — это положительное событие, тот факт, что он вообще произошел, унизил комитет."
 sichuan_events.211.t.bureau: "Бюро продаж замешано в контрабанде"
 sichuan_events.211.d.bureau: "Несколько сотрудников государственного бюро продаж были арестованы сегодня после того, как их поймали на заключении сделок с контрабандистами. Это не только повредило нашим усилиям по установлению здоровой государственной монополии в этом бизнесе, но и привело к тому, что большие суммы опиума не облагались налогом прямо у нас под носом. Арестованным теперь грозят длительные тюремные сроки, в то время как мы вынуждены наращивать наши усилия против контрабандистов, если мы хотим вернуть нашу долю рынка."
 sichuan_events.211.a: "Ну, это просто смешно!"

 sichuan_events.212.t: "Политические убийства"
 sichuan_events.212.d: "Как говорится, если ты над целью, они будут стрелять в тебя. Поскольку их доля рынка сокращается благодаря усилиям наших правоохранительных органов, военных и администрации, печальная реальность такова, что преступники будут мстить нам. Сегодня двое чиновников, которые были стойкими борцами с коррупцией, были убиты средь бела дня наемными головорезами. Преступники вскоре присоединились к ним благодаря нашей полиции, но это показывает, что контрабандисты готовы остановиться ни перед чем, чтобы выиграть эту войну."
 sichuan_events.212.a: "Должно быть, они в отчаянии!"

 sichuan_events.213.t: "Опиум исчезает"
 sichuan_events.213.d: "Усилия по борьбе с опиумом наконец дали значительные результаты. Хотя борьба была жесткой и пришлось пережить много трудностей, роль опиума в экономике Сычуани начала уменьшаться. Наркоманы на улицах становятся более редким зрелищем, а разврат, связанный с опиумными притонами, теперь постепенно вытесняется из общества. Медленно, но верно мы выигрываем эту битву."
 sichuan_events.213.a: "Мы не можем остановиться сейчас!"

 sichuan_events.214.t: "Рост производства зерна"
 sichuan_events.214.d: "Опиум как культура очень трудоемкий, требующий огромного количества работы, ресурсов и внимания для выращивания. Учитывая количество опиума, производимого в Сычуани, огромная часть пахотных земель нашей провинции была отведена под производство опиума. Однако, поскольку выращивание опиума, скорее всего, приведет к тюремному заключению или чему-то худшему, все меньше и меньше фермеров выращивают его в наши дни. Это положительное развитие, так как оно привело к постепенному, но значительному увеличению продовольственных культур, выращиваемых нашими фермерами. Пережив голод не так давно, мы, возможно, недалеко от сельскохозяйственного бума."
 sichuan_events.214.a: "Больше никакого голода!"

 sichuan_events.215.t: "Обнаружено уклонение от уплаты налогов"
 sichuan_events.215.d: "В Сычуани давно существует проблема с коррупцией. В значительной степени вызванная дисфункциональным правительством, разделенным между различными милитаристами, реликтом тех времен является то, что сбор налогов был очень неэффективным. Только 10-20% собранного, похоже, попадает в [SZC.Capital.GetCapitalVictoryPointName], в то время как остальное теряется из-за растрат и мошенничества по пути."
 sichuan_events.215.a: "Неужели нам нужно все делать самим?"

 sichuan_events.216.t: "Уклонение от уплаты налогов колоссально возрастает"
 sichuan_events.216.d: "Планы по монополизации и налогообложению опиума оказались не только крайне непопулярными, но и столкнулись с жестким сопротивлением. Уклонение от уплаты налогов, которое и раньше было большой проблемой, резко возросло с тех пор, как мы ввели наши планы в действие. Поскольку сопротивление налогообложению исходит от всех слоев общества, а не только от горстки удрученных торговцев, это будет огромным препятствием, которое нужно преодолеть, если наша монополия хочет получить легитимность."
 sichuan_events.216.a: "Избавьтесь от этих паразитов!"

 sichuan_events.217.t: "Торговцы восстают против нашей политики"
 sichuan_events.217.d: "Многие из крупнейших торговых домов и владельцев ферм Сычуани начинают оказывать жесткое сопротивление нашей монополии. Обладая объединенными ресурсами, они удерживают очень значительную базу власти в стране только за счет своего экономического влияния. Это позволило им активно игнорировать наши недавно введенные правила и налоги. Оглядываясь назад, нам, вероятно, следовало ожидать, что они окажут такое сопротивление, столкнувшись с перспективой расстаться со своими нечестно нажитыми доходами. У нас нет иного выбора, кроме как бороться с огнем огнем в этом вопросе."
 sichuan_events.217.a: "Вместе или поодиночке, они все равно будут раздавлены."

 sichuan_events.218.t: "Контрабандисты сокращают нашу прибыль"
 sichuan_events.218.d: "С введением новых налогов и оптимизацией сбора налогов контрабанда опиума стала еще более прибыльным бизнесом, чем когда-либо прежде. Высокие налоги и — якобы — «драконовские» меры государства позволили бандам снизить цены по сравнению с тем, что предлагает правительство через свои легальные каналы. Несмотря на все усилия полиции и армии, они все еще могут действовать с относительной легкостью."
 sichuan_events.218.a: "Выследите этих головорезов!"

 sichuan_events.219.t: "Незаконное производство опиума"
 sichuan_events.219.d: "До создания Бюро продаж выращивание опиума было полностью нерегулируемым и недокументированным. Это вызвало огромные трудности в установлении того, сколько именно опиума выращивается незаконно, поскольку надежных записей не существует. Наши сборщики налогов и полиция уже жалуются, что их работа похожа на поиск в темноте и что у них много трудностей с тем, чтобы взять все это под эгиду государства. Необходимо принять меры для расширения возможностей государства отслеживать и облагать налогом эти вопросы!"
 sichuan_events.219.a: "Новый закон: все производители теперь должны иметь лицензию!"

 sichuan_events.220.t: "Бюро принимает меры"
 sichuan_events.220.d: "Создание Бюро монополии продаж для контроля уже принесло некоторые успехи. Благодаря своей ранней работе им удалось создать структуру для того, как действовать и как поступать как с легальным, так и с нелегальным производством. Медленно, но верно мы можем ожидать, что их тяжелая работа наполнит нашу казну, поскольку эффективность их усилий растет с каждым часом."
 sichuan_events.220.a: "Это должно быть прибыльно!"

 sichuan_events.221.t: "Налогообложение затруднено коррупцией"
 sichuan_events.221.d: "Искушение деньгами добирается даже до лучших из нас. Мы сталкиваемся с растущей проблемой чиновников, берущих взятки, чтобы позволить контрабандистам сократить нашу прибыль. Другие просто собирают налоги и кладут деньги себе в карман, только чтобы затем сообщить об этом как о дефиците, вызванном уклонением торговцев от уплаты налогов. Кажется очевидным, что мы просто не ввели достаточно суровых наказаний за этот вид эгоистичной преступности."
 sichuan_events.221.a: "Избавьтесь от этих идиотов!"

 sichuan_events.222.t: "Прибывает первая прибыль от опиума"
 sichuan_events.222.d: "Шаг за шагом Бюро монополии продаж набирало силу, чтобы стать всеобъемлющим, общенациональным институтом. Благодаря своей тяжелой работе им удалось сократить уклонение от уплаты налогов до рекордно низкого уровня и положить конец большинству крупных операций по контрабанде в провинции. Мы уже начинаем видеть, как огромные прибыли поступают в казну государства. С количеством богатств, которые мы видим от успеха нашей монополии, у нас не должно быть проблем с финансированием будущих правительственных проектов."
 sichuan_events.222.a: "Отлично!"

 sichuan_events.223.t: "Армия сокрушает контрабандистов!"
 sichuan_events.223.d: "Используя сочетание отличной разведки и грубой силы, армия провела зачистку ряда опиумных полей и узлов контрабанды по всей Сычуани, сжигая и сравнивая с землей многие из них, а также нанося преступникам тяжелые потери. К концу дня было уничтожено большое количество незаконных полей и складов, а также значительная часть известных контрабандных судов, курсировавших по Янцзы. В целом, эта операция нанесла сокрушительный удар по преступному миру. Она не только полностью разгромила несколько банд контрабандистов, но и послала четкий сигнал преступникам: нажива на наркотиках приведет их к гибели.\n\nЭта решительная победа армии помогла нам значительно улучшить ситуацию в борьбе с опиумом и преподала нашей армии ценные уроки ведения боя с нетрадиционным противником в различных условиях."
 sichuan_events.223.a: "Режущий удар!"

 sichuan_events.224.t: "Армия сражается с контрабандистами"
 sichuan_events.224.d: "В последние дни военные предприняли крупное наступление на контрабандистов, заполонивших Сычуань. Прошла серия рейдов на незаконные фермы, склады контрабанды и другие объекты преступных группировок по всей провинции. Хотя победа не стала решающей, армия добилась успеха, понеся относительно легкие потери от врагов, вооруженных легким оружием, тайно ввезенным в страну. Эта операция также дала нашим войскам и командирам несколько ценных уроков ведения боя в лесах и городах."
 sichuan_events.224.a: "Наши солдаты сегодня сражались достойно."

 sichuan_events.225.t: "Армия испытывает трудности с контрабандистами"
 sichuan_events.225.d: "Наши недавние военные операции против контрабандистов принесли смешанные результаты. Используя оружие, оставшееся после гражданской войны, они дали отпор и втянули наши силы в серию партизанских боев, в которых мы увязли. Хотя нам удалось нарушить их операции и уничтожить нескольких преступников, их упорство позволило им эвакуировать и перепрятать большое количество опиума и оружия до того, как мы смогли их уничтожить. Несмотря на то, что потери были умеренными и некоторый прогресс был достигнут, даже самым большим оптимистам трудно представить это как победу."
 sichuan_events.225.a: "Мы достанем их в следующий раз."

 sichuan_events.226.t: "Армия обращена в бегство контрабандистами!"
 sichuan_events.226.d: "Ужасные новости с последнего этапа операций по борьбе с контрабандой. Как бы неловко это ни звучало, наши бездарные командиры позволили обычным бандитам обратить своих солдат в бегство. Используя армейское вооружение, сохранившееся со времен гражданской войны, и, вероятно, зная, где мы нанесем удар, они смогли устроить засаду и расстрелять наши силы. Сообщается о очень тяжелых потерях, а характер атак не оставляет сомнений в том, что в наших рядах может быть несколько «кротов», действующих в интересах контрабандистов. Расследование по этому делу уже ведется.\n\nЭто невозможно представить иначе как полный разгром, и, несмотря на наши попытки скрыть это, газеты в [SZC.Capital.GetCapitalVictoryPointName] уже пишут об унизительном поражении, запятнавшем репутацию [SZC.GetLeader]. Некоторые члены нашего правительства даже требуют срочно пересмотреть роль военных в нашей кампании против опиума."
 sichuan_events.226.a: "Позорное зрелище! Объявить выговор командиру!"

 sichuan_events.250.t: "Тянь Сунъяо расширяет влияние на промышленные территории"
 sichuan_events.250.d: "Поскольку Восточная Сычуань всё ещё находится в беспорядке после бегства Сяна и падения Чунцина, Тянь Сунъяо воспользовался возможностью отправить свои силы в этот регион, якобы для «восстановления порядка». Хотя он был эффективен в этом аспекте, его неприязнь к Ян Сэню хорошо известна, а его амбиции пока остаются загадкой."
 sichuan_events.250.a: "Следите за ним."

 sichuan_events.251.t: "Лю Цуньхоу расширяет влияние на территории Офицеров"
 sichuan_events.251.d: "Продолжая усилия по восстановлению порядка в Южной Сычуани после поражения Офицерского департамента в войне, мы получили несколько... интересных докладов от наших полевых командиров. Наш давний союзник, генерал и бывший губернатор Сычуани Лю Цуньхоу, проявляет необычную активность, отправляя свои войска в этот регион. Это, конечно, красивый жест и, по сути, не повод для беспокойства, но Ян Сэнь подозревает, что здесь что-то нечисто..."
 sichuan_events.251.a: "Он что-то планирует?"

 sichuan_events.252.t: "Тайные встречи"
 sichuan_events.252.d: "Из Восточной и Южной Сычуани продолжают поступать противоречивые сообщения. Хотя активность милитаристов в Сычуани не новость, похоже, происходит что-то иное. В регионе состоялось несколько встреч между мелкими полевыми командирами. Наши шпионы пока не получили много информации, но генерал Фань Шаоцзэн, заместитель Ян Сэня, сильно подозревает, что они могут планировать коалицию мелких милитаристов.\n\nС какой целью — пока неизвестно."
 sichuan_events.252.a: "Ладно, что здесь происходит на самом деле?"

 sichuan_events.253.t: "Усилия Баодина"
 sichuan_events.253.d: "Похоже, история повторяется. Армия Чэнду снова в плачевном состоянии после тяжелых боев последних месяцев. Как и в 1931 году, после первой экспедиции Офицерского департамента, Баодинский департамент взял на себя усилия по восстановлению порядка на юге. Продолжают поступать сообщения об успешном умиротворении территорий.\n\nХотя Баодин ещё может стать угрозой, пока наш союз с ними продолжает приносить дивиденды."
 sichuan_events.253.a: "Спасибо, товарищи!"

 sichuan_events.254.t: "Тянь Сунъяо клянется в верности Лю Цуньхоу"
 sichuan_events.254.d: "Неожиданные новости из Наньбу, главной базы милитариста Тянь Сунъяо на северо-востоке. Сунъяо, человек, известный своим политическим нейтралитетом — несколько месяцев назад он закрыл свои владения для всех участников гражданской войны — но также и безжалостным оппортунизмом, внезапно и публично заявил о своей верности бывшему губернатору Сычуани и лидеру Департамента вооружений Лю Цуньхоу. Сунъяо делает это не из преданности Департаменту. Происходит что-то опасное, и Лю Цуньхоу определенно в этом замешан.\n\nВозможно, мы столкнулись с предательством в наших рядах."
 sichuan_events.254.a: "Расследовать это, немедленно!"

 sichuan_events.255.t: "Предложение от Баодинского департамента"
 sichuan_events.255.d: "На фоне роста напряженности в провинции после неожиданного союза между Лю Цуньхоу и Тянь Сунъяо, мы получили послание от Дэн Сихоу. Он утверждает, что располагает ценной информацией о передвижениях и намерениях Лю. Наши шпионы пока ничего не выяснили о планах Цуньхоу, так что это заманчивое предложение. Однако их требования могут оказаться слишком высокими."
 sichuan_events.255.a: "Организуйте эту встречу. Тайно."

 sichuan_events.256.t: "Встреча с Дэн Сихоу"
 sichuan_events.256.d: "Дэн Сихоу прибыл сегодня ночью в Чэнду в обстановке строжайшей секретности. В ветхом подвале под старым маньчжурским дворцом после нескольких раундов обсуждений была заключена сделка: Дэн Сихоу сообщил, что Лю Цуньхоу недавно связался с ним, прося о публичном заявлении лояльности или хотя бы нейтралитета. В обмен на гарантии автономии и правительственного влияния для Баодинского департамента, а также большую свободу в реализации их экономических проектов, и Дэн Сихоу, и Лю Вэньхуэй поклянутся в верности Ян Сэню и Департаменту вооружений.\n\nУ Баодинского департамента свои интересы, но программа модернизации Ян Сэня во многом совпадает с их целями. Кроме того, войска Баодина — самые обученные в Сычуани и, безусловно, окажутся бесценными.\n\nОкончательное решение теперь за Ян Сэнем."
 sichuan_events.256.a: "Хорошо, мы принимаем вашу сделку."
 sichuan_events.256.b: "Дэну нельзя доверять."

 sichuan_events.257.t: "Заговоры во тьме"
 sichuan_events.257.d: "После подписания сделки и предоставления Баодину давно желаемой автономии и влияния, Дэн Сихоу передал нашим агентам всю имеющуюся у них информацию о передвижениях Лю Цуньхоу. Лю Цуньхоу планирует совершить переворот через неделю при поддержке Тянь Сунъяо и нескольких мелких милитаристов провинции, купив их поддержку обещаниями богатства, власти или влияния.\n\nИмея детальные сведения о запланированных действиях Цуньхоу и поддержку Баодинского департамента, мы можем обратить это в свою пользу. Переворот Лю станет неизбежной ловушкой, как только он начнет свой заговор."
 sichuan_events.257.a: "Мы будем готовы к его приходу."

 sichuan_events.258.t: "Декларация нейтралитета"
 sichuan_events.258.d: "Новости из Яаня и Гуаньсяня. Вслед за нашим отказом от сделки с Дэн Сихоу, как его северные войска, так и войска Сикана Лю Вэньхуэя начали планомерный отход на свои родные территории. Сегодня за этим последовала совместная декларация двух лидеров, осуждающая некомпетентность руководства Чэнду. Однако они воздержались от объявления поддержки Лю Цуньхоу и вместо этого провозгласили свой полный нейтралитет с этого момента. Наших солдат уже выдворяют из их районов."
 sichuan_events.258.a: "Возможно, мы совершили ошибку..."

 sichuan_events.259.t: "Пожары в гарнизоне"
 sichuan_events.259.d.trap: "Как только над Чэнду забрезжил рассвет, Лю Цуньхоу начал действовать, и его войска приступили к захвату маньчжурского гарнизона, где располагается штаб-квартира Вооружений. Тянь Сунъяо также находится в городе, командуя войсками для захвата нескольких стратегических точек. К его сожалению, мы хорошо подготовились к его измене..."
 sichuan_events.259.d.coup: "Рассвет застает Чэнду в абсолютном хаосе. Неожиданно для руководства Департамента, которое считало, что Лю Цуньхоу всё ещё находится на своей базе в Дасяне, его войска начали захват маньчжурского гарнизона, являющегося штаб-квартирой Вооружений. На улицах города головорезы Тянь Сунъяо быстро установили контроль над нашими сонными войсками. Внутри старого маньчжурского гарнизона, где теперь находится штаб Департамента вооружений, идут ожесточенные бои, а Ян Сэня нигде не видно."
 sichuan_events.259.a: "Захлопнуть ловушку!"
 sichuan_events.259.b: "Судьба Чэнду висит на волоске..."

 sichuan_events.260.t: "Контрпереворот"
 sichuan_events.260.d: "Спустя несколько часов после начала попытки переворота Лю Цуньхоу потерпел полную неудачу во всех своих целях. Зная о перевороте заранее, Ян Сэнь и Фань Шаоцзэн имитировали хаос в гарнизоне, что Лю Цуньхоу принял за доказательство своего успеха. Когда они попытались захватить остальную часть здания, несколько батальонов, спрятанных вокруг огромного комплекса, вступили в бой, возведя баррикады и поймав солдат Цуньхоу в ловушку. Глядя на труп Лю Цуньхоу на полу, Ян Сэнь приказывает своему верному генералу Фань Шаоцзэну зачистить здание и принудить к сдаче остатки войск Лю.\n\nВнизу, в городе, Тянь Сунъяо лежит мертвым на улице, убитый агентами Баодина, внедрившимися в толпу.\n\nПереворот окончен, и мир может наконец вернуться в Сычуань."
 sichuan_events.260.a: "Смерть предателя."

 sichuan_events.261.t: "Лю Цуньхоу берет власть"
 sichuan_events.261.d: "Бои были тяжелыми, но короткими. Застигнутые врасплох войска Ян Сэня не могли соперничать с войсками Лю Цуньхоу и Тянь Сунъяо, и к полудню большая часть города оказалась под их твердым контролем. Ян Сэнь и Фань Шаоцзэн мертвы, погибнув в перестрелке, а их войска, оставшись без лидеров, сдались.\n\nИз двора старого маньчжурского гарнизона Лю Цуньхоу объявил о принятии на себя руководства Департаментом вооружений, и в городе не осталось никого, кто мог бы ему противостоять."
 sichuan_events.261.a: "И снова Лю — губернатор Сычуани."

 sichuan_events.262.t: "Сычуань заявляет о поддержке Центрального правительства"
 sichuan_events.262.d: "Несмотря на недавние проблемы, похоже, Департаменту вооружений [SZC.GetLeader] удалось справиться с трудностями и сохранить контроль над провинцией, приведя её в нашу сферу влияния. Мы получили послание от [SZC.GetLeader], в котором он заявляет о своей лояльности нашему правительству."
 sichuan_events.262.a: "Ещё одна провинция вернулась в лоно!"

 sichuan_events.263.t: "Сычуань присылает поддержку"
 sichuan_events.263.d: "Позитивный поворот событий: наши ряды недавно пополнились постоянным потоком подкреплений от наших друзей из Сычуани. Лига, возможно, переживает не лучшие времена, но, похоже, у нас ещё есть союзники, на которых можно положиться. Мы с пользой применим эти силы, чтобы вычистить последних мятежников с наших земель!"
 sichuan_events.263.a: "Хоть какие-то хорошие новости."

 sichuan_events.264.t: "Маршал Ван Чэнбинь прибывает в Сычуань"
 sichuan_events.264.d: "После сокрушительного Маньчжурского переворота многие опасались, что Клика Северных Чжили обречена и будет выброшена на свалку истории. В ходе жестокой Чжилийско-Маньчжурской войны третий иерарх клики Чжили, маршал Ван Чэнбинь, собрал силы Чжили в последней отчаянной попытке вернуть Пекин, но потери были колоссальными. С потерей Цао Куня и У Пэйфу одним махом, рядовые члены Чжили были поначалу сильно деморализованы. Могли ли они выстоять без Нефритового Маршала? Могли ли они победить маньчжуров, не говоря уже о других милитаристах? И вот он прибыл, конь бледный, чтобы покончить с Кликой Чжили раз и навсегда.\n\nНо нашелся человек, бросивший вызов амбициям роялистов, бросивший вызов кровопролитию и смерти своего наставника Цао Куня. Военный министр маршал Ван Чэнбинь, отсутствовавший в Пекине во время попытки переворота, стал первым центром сплочения для хаотичных сил Чжили. Отстаивая чрезвычайные стратегии Гражданской войны, он сражался зубами и когтями, чтобы сохранить гегемонию Чжили, отомстить за павшего друга и даже, с сожалением, за У Пэйфу. Ибо ради чего они погибли, если их память будет предана забвению? Организовав затяжное отступление, Ван был вынужден принять на себя всю жестокость армий роялистов. Сравнивание с землей целых городов, уничтожение Лояна, бесчинства в Ухане — и всё это было напрасно.\n\nПоскольку многие полагали, что Ван Чэнбинь погиб в боях, возможно, в Лояне или Ухане, никто в [SZC.Capital.GetCapitalVictoryPointName] не ожидал скромного прибытия прошлой ночью. Колонна грузовиков, без опознавательных знаков и явно изношенных, прибыла на окраину [SZC.Capital.GetCapitalVictoryPointName]. Военный патруль приказал им развернуться. Однако, когда они остановились, патрульный не поверил своим глазам. Из первого грузовика вышел маршал Ван с рукой, замотанной пропитанной кровью повязкой, и лицом, покрытым осколочными ранениями.\n\nОхранник быстро направил колонну к резиденции [SZC.GetLeader] в центре города, где тот принял Вана и остатки командной структуры Пекина. С яростью и жаждой мести в глазах Ван умолял [SZC.GetLeader], призывая его собрать силы и подготовиться к кампании по отвоеванию земель у презираемых роялистов."
 sichuan_events.264.a: "«Последний оплот законного правительства Китая...»"
 sichuan_events.264.b: "С сожалением вернуть отчаявшегося маршала."

 sichuan_events.265.t: "Маршал Ван Чэнбинь объявляется вновь!"
 sichuan_events.265.d: "В нашем оглушительном триумфе над чжилийскими псами мы были уверены, что Король Баодина и Нефритовый Маршал погибли, ибо их тела усеяли тронный зал. Однако, будучи всегда верным Цао, бывший военный министр Ван Чэнбинь начал немедленную контратаку против переворота. В жестоких уличных боях в столице деморализованные и дезорганизованные силы Чжили в конечном итоге уступили нашей элитной Императорской гвардии под предводительством Сиця. Однако, оправившись, маршал Ван продолжил свою бесплодную и бессмысленную борьбу против Сына Неба.\n\nВедя боевое отступление к северу от Хуанхэ, Ван дал ожесточенный, даже достойный восхищения, предположительно последний бой в старой штаб-квартире Нефритового Маршала в Лояне. Его солдаты предпочли умереть, чем сдать город, что в конечном итоге вынудило нас действовать, и привело к практически полному уничтожению Лояна. Многие наши источники якобы подтверждали, что он погиб в бою. Однако, поскольку гражданская война продолжалась в других местах под руководством таких людей, как Лю Чжэньхуа, Сяо Яонань и Чжан Цихуан, мы вряд ли могли выделить людей для подсчета тел.\n\nС появлением в столице слухов о том, что самый верный союзник и друг Короля Баодина сбежал в Сычуань, кажется, что маршалу удалось склонить [SZC.GetLeader] на свою сторону. Пытаясь организовать одну последнюю кампанию по отвоеванию земель и свержению нашего Мандата, Клика Чжили показала себя чрезвычайно стойким противником. Несмотря на контроль над охваченной голодом и гражданской войной провинцией, которую многие считают захолустьем, Чжили всё ещё сохраняют значительную часть своих сил и обладают огромной волей, чтобы довести свою кампанию до конца."
 sichuan_events.265.a: "Этот проклятый маршал из Тяньцзиня!"
 sichuan_events.265.b: "В их деле есть смысл!"

 sichuan_events.266.t: "Растущий раскол"
 sichuan_events.266.d: "Долгое время являясь частью внутренней политики Клики Чжили, сама Клика четко разделена по многочисленным линиям. Северные Чжили под покровительством покойного Цао Куня, У Пэйфу и Ван Чэнбиня. Южные Чжили под прихотями Сунь Чуаньфана и Ци Сеюаня. Даже внутри этих ветвей существует динамика межличностных фракций. У Севера есть фракции Лоян и Цзиньбао, принадлежащие У и Цао. У Юга есть переменчивая лояльность всех подчиненных Сунь Чуаньфана. И даже тогда остается критический раскол между людьми оружия и людьми слова.\n\nКогда Клика Чжили восстановила контроль над Пекином в конце 1920-х годов, они попытались официально организовать себя в легитимное правительство. Поскольку большинство «людей слова» заняли должности в Ассамблее и Кабинете, «люди оружия» смирились с контролем над провинциями и своими частями провинциальных и центральных армий. Однако после смерти Цао и У сложный баланс и отношения между военным и политическим крыльями Клики были разрушены.\n\nПоскольку У и Цао правили в своих соответствующих крыльях, их отсутствие привело к тому, что Ван и его современники в костюмах начали точить ножи друг на друга. Изгнание еще больше обострило отношения, и гражданские сплотились вокруг великодушного Янь Хуэйцина. Старший дипломат, бюрократ, бывший премьер-министр и президент, он начал часто спорить с Ван Чэнбинем и остальным военным аппаратом Чжили по поводу наилучшего курса действий для будущего их правления. Из-за их конфликта многие в бывшем провинциальном правительстве Сычуани опасаются, что начинает открываться глубокий раскол."
 sichuan_events.266.a: "Мы не можем сейчас разделиться!"

 sichuan_events.267.t: "Восхождение дипломата"
 sichuan_events.267.d: "Любопытный факт: во внутренних кругах Клики Чжили многие из системы патронажа фактически считают Янь Хуэйцина чужаком. Никогда официально не принимавшийся в лоно Чжили, Янь сам представляет престижный и в основном аполитичный дипломатический корпус Бэйянской республики. Неоднократно исполняя обязанности премьер-министра или президента от имени Клики Чжили, Янь зарекомендовал себя невероятно усердным в обеспечении того, чтобы правительства Бэйяна оставались на плаву.\n\nВ очередной раз, похоже, Янь необходим для поддержания стабильности и предотвращения анархии в Чжили. Сумев заручиться достаточной поддержкой, используя свои обширные связи в бюрократии и безупречную репутацию, Янь воспользовался своим положением в правительстве, чтобы потребовать от маршала Вана следовать гражданскому пути, на что Ван согласился. Будучи избранным на пост президента (конечно, в изгнании) и при поддержке таких людей, как Гу Вэйцзюнь, Бай Цзяньу, Ван Кэминь, маршал Ван и Гао Линвэй, правительство Янь Хуэйцина напоминает правительство, тщательно сбалансированное между бэйянскими бюрократами и фанатиками Чжили.\n\nС благородной целью утверждения гражданского контроля над военными и предотвращения глупых ошибок, которые привели к Маньчжурскому перевороту, многие надеются на успех их целей. Хотя многие в равной степени скептически относятся к тому, что они достигнут чего-то значительного."
 sichuan_events.267.a: "Мы должны учиться на своих ошибках."

 sichuan_events.268.t: "Восхождение отпрыска Тяньцзиня"
 sichuan_events.268.d: "Третий Иерарх. Отпрыск Тяньцзиня. Военный министр. Маршал Республики. Предатель Чжили. Ван Чэнбинь сохраняет множество прозвищ, вызывающих смешанные чувства. Не имея национального уважения и преданности, как Нефритовый Маршал, Ван всегда играл вторую скрипку при У Пэйфу. Тем не менее, Ван был, пожалуй, единственным человеком, которого боялся У Пэйфу, ибо он действительно угрожал его положению в Клике Чжили, будучи соратником Цао Куня дольше, чем У. Поставив всё на карту, чтобы помочь своему наставнику, Ван в конечном итоге был отправлен в мягкую отставку из-за махинаций У, что привело к предательству Вана во время Пекинского переворота 1924 года.\n\nВернувшись в лоно во время третьей Чжифэнской войны, Ван показал себя самым преданным защитником президента Цао Куня в военных кругах, действуя как его рупор и постоянное напоминание о нависшей сети Короля Баодина над военным аппаратом. И в тот день Ван был одним из немногих, кто подозревал о подготовке к знаменательной попытке переворота, обсуждая с Нефритовым Маршалом доклады о напряженных маневрах войск. И всё же он физически ничего не мог сделать, чтобы спасти своего наставника или ненавистного У Пэйфу. Поглощенный собой, он тем не менее приказал провести безжалостную контратаку, пытаясь подавить восстание, пока оно не набрало силу.\n\nВ конечном счете тщетно, и теперь он здесь, мстительный дух, живой мертвец. Взлетев на передний план иерархии Чжили, Ван пользуется восхищением всей сути клики Цзиньбао, и даже некоторые члены клики Лоян ищут благосклонности маршала Тяньцзиня. Используя свой теперь уже легендарный статус, Ван сумел заставить гражданских под руководством Янь Хуэйцина преклониться перед приматом военных в такой чрезвычайной ситуации. Обещая быстрое возмездие зарождающимся, ничтожным маньчжурским силам Остаточному верховному командованию, многие в Клике и нации готовятся к последнему походу Клики Чжили."
 sichuan_events.268.a: "Рвать и кромсать... пока всё не будет кончено."

 sichuan_events.269.t: "Новая кровь в новой воде"
 sichuan_events.269.d: "Полностью разрушенная, потерявшая и главу, и заместителя, система гуаньси Клики Чжили была ввергнута в полный беспорядок после попытки переворота. Сумев собрать некоторое подобие власти, по крайней мере, достаточное для организации достойного сопротивления вместо Нефритового Маршала, новая позиция Ван Чэнбиня как абсолютного авторитета Клики Северных Чжили была лишь недавно закреплена с согласия всех других потенциальных претендентов, таких как Чжан Цихуан или Цай Чэнсюнь.\n\nОднако то, что осталось от военной иерархии Чжили — это шатающийся труп, изрешеченный пулями. Потеряв множество офицеров в боях, возникла острая необходимость в реформе, модернизации и выдвижении молодых выживших на передовую военного командования. Обвиняя У Пэйфу в нежелании и неспособности провести значимые реформы в высшем командовании из-за веры в его идеальную систему полной автономии офицеров, маршал Ван Чэнбинь написал письма ряду командиров, запрашивая имена исключительных личностей, проявивших себя сверх служебного долга.\n\nПредпринимая масштабные усилия по реформированию в свете изгнания, Маршал сотрудничал с такими людьми, как Цзян Байли, чтобы внедрить и использовать свои обширные знания военной стратегии в надежде, что новой доктрины будет достаточно, чтобы победить зарождающиеся и неопытные армии роялистов. Оглядываясь назад, остается лишь верить в лояльность и упорство простого солдата, чтобы увидеть, как месть Чжили осуществится."
 sichuan_events.269.a: "Маршируем в будущее под началом маршала Вана!"

 sichuan_events.270.t: "Возрождение Клики Чжили?"
 sichuan_events.270.d: "Долгое время периодически управляя Китаем, с 1922 по 1924 год и с 1927 по 1936 год, Клика Чжили казалась де-факто доминирующей силой во всей нации. С Пекином в их хватке, самым могущественным человеком в Китае на их стороне и многочисленными связями, используемыми Цао Кунем, многие верили, что их правление переживет любую бурю. Однако после краха Лиги и бездействия Кабинета, не вмешавшегося на стороне ни Лиги, ни антиконцессионистов, Императорский двор использовал негативные народные настроения и отчуждение немецких покровителей Чжили, чтобы воспользоваться возможностью и уничтожить гидру, отрубив ей голову.\n\nИ так маньчжурские принцы и партия Цзуншэ усомнились в упорстве, упрямстве и силе воли Клики Чжили. Сплотившись вокруг теперь уже печально известного маршала Тяньцзиня Ван Чэнбиня, Чжили нанесли огромный урон маньчжурскому правительству, отступая с боями в соседние провинции. Готовые пожертвовать собой и душой, чтобы предотвратить возвращение абсолютистской монархии, многочисленные последние бои в Чжилийско-Маньчжурской войне напоминали Синьхайскую революцию. Умирая как мученики за свое дело, маньчжуры отнеслись к ним с крайней предвзятостью. Уничтожая деревни и целые города, чтобы гарантировать истребление Клики Чжили.\n\nОднако вот они, [SZC.GetName], представители стального упорства Клики Чжили. Под покровительством [SZC.GetLeader] они обратились к [ROOT.GetLeader] с особым предложением. Предлагая равноправный пакт о лояльности и совместных военных действиях, они желают объединить усилия для изгнания маньчжурской угрозы из Пекина и восстановления истинной власти былой республиканской славы Синьхайской революции."
 sichuan_events.270.a: "Конечно! Старые друзья должны держаться вместе в трудные времена."
 sichuan_events.270.b: "Вас уже однажды разбили, кто сказал, что это не повторится?"

 sichuan_events.271.t.accept: "[FROM.GetName] принимает наш запрос!"
 sichuan_events.271.d.accept: "Видя мудрость в нашей просьбе и, возможно, восхищаясь нашими амбициями, нашим упорством, нашей яростью, [FROM.GetName] охотно принял наш запрос о соглашении о совместных военных действиях. Пообещав своих солдат, свое оружие и свое правительство нашему делу совместного истребления маньчжурских выскочек, мы скоро увидим возвращение истинного, революционного и республиканского китайского правительства! Чжунхуа Миньго Ваньсуй!"
 sichuan_events.271.a: "Тост за наших новых соотечественников!"

 sichuan_events.271.t.refuse: "[FROM.GetName] отклоняет наш запрос!"
 sichuan_events.271.d.refuse: "Слабые глупцы в [FROM.GetName], возможно, из трусости или страха возмездия со стороны Пекина, полностью отказались от нашей просьбы о соглашении о совместных военных действиях. Хотя это и не разрушительно для дела борьбы с маньчжурами, это ясно показывает, что [FROM.GetName] абсолютно не намерен следовать по стопам революционных мучеников, которые истекали кровью и страдали ради итогов Синьхая. Неважно! С маршалом Тяньцзиня мы сокрушим вероломных маньчжуров, а затем и этих неумелых отстающих!"
 sichuan_events.271.b: "Ваше время придет!"

 sichuan_events.272.t: "Клика Чжили возвращается"
 sichuan_events.272.d: "После убийства У Пэйфу и Цао Куня в Пекине во время Маньчжурского переворота и последовавшего за этим распада Клики Чжили, большинство отправило бывший альянс милитаристов на свалку истории. Однако недавние события поставили эти предположения под сомнение.\n\nХодят слухи, что маршал Ван Чэнбинь, которого считали погибшим после падения Лояна, чудом выжил и заключил союз с губернатором провинции Ян Сэнем — бывшим союзником У Пэйфу. Оба лидера теперь сплачивают разрозненные остатки Чжили, бежавшие с севера после переворота, и антиманьчжурская пропаганда уже начала распространяться в соседние провинции. Похоже, Клика Чжили гораздо более живуча, чем ей приписывали."
 sichuan_events.272.a: "Они когда-нибудь сдаются?"
 sichuan_events.272.b: "Новая угроза для маньчжуров."

 sichuan_events.273.t: "Прибытие товарища"
 sichuan_events.273.d: "Будучи всегда крепкой, адаптируемой группировкой стойких командиров и солдат, Клика Чжили пережила практически полное уничтожение множество раз в своей истории и всегда возвращалась более сильной. Во время Второй Чжифэнской войны Клика впервые столкнулась с полным уничтожением. Дезертирство Фэн Юйсяна и Ван Чэнбиня спровоцировало Пекинский переворот 1924 года, что привело к захвату Цао Куня, изгнанию У Пэйфу и большинства его штаба, а последние остатки контроля Чжили остались в руках губернатора Хубэя Сяо Яонаня.\n\nДаже в тот момент Клика возродилась: У искал убежища у Чжао Хэнти, вернул провинцию Хэнань и отвоевал провинцию Чжили с дополнительной помощью Фэнтяня. И снова, когда всепоглощающий поток революционного пыла, Национально-революционная армия, двинулась на север, чтобы изгнать всех милитаристов любой принадлежности, Северные и Южные Чжили вместе с Фэнтянем объединились, чтобы сформировать Аньгоцзюнь. Цао Кунь, используя свои связи и ум, договорился о немецком вмешательстве, и остальное стало историей.\n\nИ вот мы снова здесь, с ядром Клики Чжили и Кабинетом, бежавшими в Сычуань; никто не знал истинного масштаба потерь Клики. Предположительно, пламя жизни многих угасло в боях. Однако сегодня рано утром генерал и некоторые из его слуг добрались до Чэнду, неся с собой вооружение и небольшой запас золота."
 sichuan_events.273.a: "Ваше время еще не вышло!"

 sichuan_events.274.t: "Лоян возвращен"
 sichuan_events.274.d: "Развалины, резня, кровопролитие. Маршал Ван и его соратники слишком хорошо знакомы с недавней картиной Лояна. Будучи древней колыбелью китайской цивилизации, Лоян в своем нынешнем виде — лишь тень своего былого величия. Имея историю, восходящую к классической эпохе, Лоян был даже столицей многочисленных династий, таких как Восточная Хань, становясь центром Китая на десятилетия. Однако при таком статусе Лоян видел множество бедствий, разрушений, грабежей и всего спектра опустошения.\n\nНачиная с династии Юань статус Лояна как «Средней столицы» и естественной законной столицы был сильно снижен, так как он неоднократно полностью разрушался. Тем не менее, современный Лоян снова стал важным узлом. Считавшийся штаб-квартирой Нефритового Маршала, он привлек значительное внимание во время Второй Чжифэнской войны и всех последующих конфликтов между Чжили и их врагами.\n\nНесмотря на его исторический статус, это не помешало фанатичным солдатам-роялистам снова практически стереть Лоян с лица земли. Когда маршал Ван держал свой предполагаемый последний бой в городе, роялисты ответили с крайней предвзятостью и силой. Теперь, когда мы вернули провинцию, ясно видно то сырое опустошение, которое маньчжуры учинили в своей ярости. Первый шаг в возвращении Китая, и он горек.\n\nТем не менее, долг Чжили — сохранить и приказать восстановить, и захват Лояна является фантастической пропагандистской победой для морального духа нашей нации."
 sichuan_events.274.a: "Если бы только У мог видеть нас сейчас!"

 sichuan_events.275.t: "Падение Учана"
 sichuan_events.275.d: "Еще одна из огромных твердынь Чжили, Ухань (общее название для Учана, Ханькоу и Ханьяна), не избежала жестокости сил роялистов в их жажде крови изгнать Чжили с Центральных равнин. История города восходит к династии Шан, в его священной земле лежат 3500 лет китайской культуры и цивилизации. Один из ключевых очагов древнего конфуцианства, он дал начало «Академии Вэньцзинь», которая известна как «старейший существующий университет в Китае», находясь в одном ряду с Академией Юэлу в Хунани или Академией Дунлинь в Цзянсу.\n\nПо-настоящему расцветший и заложивший основу современного города в период Троецарствия, город превратился в культурный и экономический центр на Янцзы. Будучи резиденцией многих оппозиционных режимов, он стал действительно известным рынком для торговцев, так как его уникальное положение на берегах Янцзы и реки Хань сделало его естественным местом встречи торговцев со всего Центрального Китая. Он даже получил прозвище «Чикаго Востока» из-за промышленного, финансового, транспортного и культурного сходства с американским Чикаго.\n\nБудучи довольно процветающим и избавленным от многих возмездий по сравнению с другими китайскими центрами развития, Ухань тем не менее стал местом величайшей битвы прошлого века. Когда Ханькоу и Ханьян пали перед наступающими Национально-революционными армиями в Северном походе, сам Учан продолжал сопротивляться. После немецкого вмешательства и внутренней политической борьбы Гоминьдана Национальная революция разорвала сама себя на части, позволив силам У Пэйфу, Сяо Яонаня и Южных Чжили уничтожить остатки сил Гоминьдана.\n\nТеперь, когда наши силы захватили такой древний и любимый промышленный город, наши солдаты начали восхвалять захват как повторение «Чуда 1927 года», провозглашая маршала Вана военным гением. Уже растет чувство, что наш путь праведен, и что мы скоро вернем Северную столицу и восстановим законное правление Чжили раз и навсегда."
 sichuan_events.275.a: "Где это закончилось. И где это начнется снова."

 sichuan_events.276.t: "Падение Пекина"
 sichuan_events.276.d: "Возможно, самый важный, ценный и всемирно известный город во всем Китае. История Пекина насчитывает 3000 лет, и его роль как в нашем взлете к власти, так и в нашем падении не имеет равных. Самые ранние события истории Пекина, однако, окутаны мифами и легендами; первое исторически подтвержденное событие — свержение последнего царя Шан царем У из Чжоу. Долгое время будучи центром власти на севере, история Пекина омрачена набегами кочевников с границы и постоянным строительством все более сложной обороны для защиты от них.\n\nПо иронии судьбы, Пекин впервые приобрел значимость под названием «Нанкин» («Южная столица»), так как резиденция династии Ляо находилась в современной Внутренней Монголии. Под властью Ляо город гигантски развился, став культурным центром киданей, си, шивэй, бохайцев и ханьцев. Позже став «Чжунду», или «Центральной столицей» при Цзинь, город снова увидел удвоение своих размеров и быстрое развитие. Но наибольшего расцвета он достиг при династии Юань.\n\nКогда Хубилай-хан назвал его «Даду», или «Великая столица», он стал центром власти для всего Китая. Наконец, он получил название «Пекин» в 1403 году при династии Мин. Расцветая при Мин и Цин, неотъемлемая важность Пекина для современной китайской культуры была закреплена, и он стал самым желанным городом в Эру милитаристов. Резиденция Бэйянской республики и всех ее институтов — тот, кто правил Пекином, правил Китаем.\n\nИ вот ясно, что с возвращением Северной столицы Чжили снова реанимировали республиканскую мечту. Победив защитников-роялистов, наши элитные силы сумели методично зачистить улицы города, что привело к отчаянному последнему бою в Запретном городе, напоминающему последние бои Ляо, Мин и Цин. Тем не менее, [SZC.Capital.GetCapitalVictoryPointName] взорвался букетом празднований, поскольку последние остатки ушедшей эпохи снова свергнуты!"
 sichuan_events.276.a: "Чжунхуа Миньго Ваньсуй!"

 sichuan_events.277.t: "Свержение мальчика-императора"
 sichuan_events.277.d: "Наконец нашим силам удалось прорваться в хорошо укрепленный Запретный город. Перед нашими храбрыми солдатами лежало несколько слоев обороны, насыщенных элитными, преданными и фанатичными силами Императорской гвардии. Поскольку большая часть наших сил была отвлечена на другие фронты или зачищала улицы Пекина от декаданса, лишь небольшая группа из нескольких отрядов занималась осадой и захватом Императорского двора. Под местным командованием Го Цзицзяо, исключительного молодого командира с огромным потенциалом, была разработана отличная стратегия тщательной зачистки залов и летописей Дворца и его внешних построек.\n\nНеся тяжелые потери, но с переполняющим боевым духом, храбрые люди под началом Го осуществили методичный поиск мальчика-императора и его клана. Столкнувшись с такими защитниками, как Цзисин и Цзайтао, два маньчжурских принца в конечном итоге пали от наступающих отрядов Чжили. Возглавляя небольшой отряд, Го успешно раскопал тронный зал, найдя Пуи, спрятавшегося за Драконьим троном и дрожащего от страха. Когда они попытались вытащить его из комнаты, его брат вместе с кузеном, принцами Пуцзе и Сиця, ворвались в комнату с несколькими оставшимися гвардейцами, пытаясь самоубийственно помешать Го схватить Императора.\n\nКаким бы тщетным ни был их последний бой, много храбрых людей погибло в перестрелке, и даже Го был ранен. Тем не менее, Император захвачен, а его кукловоды мертвы! Хотя многие из наиболее радикальных членов военного штаба и кабинета требуют крови за кровь, маршал Ван и Янь успокоили страсти. Признавая, что Пуи действительно не знал о первоначальной попытке переворота, они вместо этого решили бросить Пуи в тюрьму. Ибо, хотя его нельзя винить в смерти Цао или У, его преступления против Республики многочисленны. Возможно, в будущем его можно будет освободить как примерного гражданина. А пока он гниет."
 sichuan_events.277.a: "Поздравить храброго Го! Смерть монархии!"

 sichuan_events.278.t: "Вспоминая Короля Баодина"
 sichuan_events.278.d: "Теперь, когда наше отвоевание территории Чжили и города Пекина завершено, пришло время хоронить тела, восстанавливать нацию и переживать утраты. Многие погибли в вечной борьбе республиканцев против монархии. В Чжилийско-Маньчжурской войне, в нашем отвоевании, в Синьхае и последовавшей борьбе. Нация такой красоты, любви и сострадания, постоянно хватающая своих сородичей за горло из-за вероломных идеологических убеждений, игр власти и голода милитаристов. Под миазмами всего этого, всепоглощающим потреблением убеждений и ярости, часто забывается, что все мы люди. Товарищи китайцы. Разве мы не гордимся нашей тысячелетней цивилизацией, выдержавшей испытание временем?\n\nВместо этого мы ссоримся между собой, с восстаниями, гражданской войной, в то время как иностранные империалисты становятся всё сильнее. Мученики, герои нашей нации! О, как богаты их знания и величие! Только они истинно понимали, что было на кону. И только сейчас мы полностью понимаем их послание. Попытка построить нацию из шатающейся группы военных милитаристов — непростая задача. Президент Цао и маршал У знали это слишком хорошо. И всё же они пополнили число погибших в этой борьбе. Король Баодина, осуждаемый как Президент-взяточник, истинный патриот, не желавший ничего, кроме укрепления своей нации. Нефритовый Маршал, несмотря на его постоянную вражду с маршалом Ваном, также нес в себе величие государственного строительства.\n\nВоздвигнуть памятник из обломков Китайской Республики, восстановить её в одиночку. Такова была их задача, и их смели слишком рано, чтобы увидеть её завершение. И поэтому нам, их потомкам, выпало продолжить миссию наших предков и позволить Пяти расам в одном союзе наконец гордо реять. Отмечая этот случай памяти и размышлений, [SZC.GetLeader] учредил день траура по всей стране по тем, кто пожертвовал собой, чтобы Республика продолжала жить. Это наша единственная надежда, наше единственное желание, что их угасание не было напрасным."
 sichuan_events.278.a: "Наша нация, изуродованная проклятым конфликтом."

 sichuan_events.279.t: "Оживление китайской демократии"
 sichuan_events.279.d: "Теперь, когда мантия Бэйянской республики лежит на наших плечах, нам предстоит воплотить в жизнь её высокие мечты. Рожденная из идеализма, из надежды на что-то лучшее, чем вероломные монархисты, она в конечном итоге не принесла плодов. Разорванная оголтелыми милитаристами, более склонными набивать свои карманы и сохранять влияние, чем нести свою справедливую и законную службу нации.\n\n«Хватит! Сегодня начинается новый день в истории нашей нации! Больше мы не кланяемся милитаристам, полевым командирам! Больше мы не позволим отправить демократию на гильотину! Монархия ушла, и автократия последует за ней!» Это были слова, эхом раздававшиеся от Хуан Фу на окраине Национального собрания в Пекине недавно, после объявления о новых президентских выборах. Проводимые быстро, они являются знаковым моментом в истории китайской нации. Ибо это истинное испытание способности народа проявить свою волю в отношении будущего нашей нации. Чжили, конечно, слишком хорошо знакомы с приматом демократии как самого главного метода, с помощью которого народ дарует свой голос нации. Ожидается, что они также выдвинут своих кандидатов на выборах, и многие верят, что у кандидатов Чжили есть верный путь к президентству.\n\nТем не менее, это не мешает множеству партий и фракций предлагать своих кандидатов. Среди независимых есть великодушный Ху Ши, от Политической науки — вышеупомянутый Хуан Фу, Сюй Цинь от конституционалистов, а также Шэнь Цзюньжу и Лю Чунъю от Федерации национального спасения. Все они всё больше вовлекаются в провозглашение своих президентских кампаний, а оппозиция коллективно ожидает скорого объявления кандидатуры от Ассоциации Гармонии."
 sichuan_events.279.a: "Доказательство нашего наследия!"

 sichuan_events.280.t_incumbent: "Аскетичный кандидат"
 sichuan_events.280.t_challenger: "Восхождение дипломата"
 sichuan_events.280.d_incumbent: "В конечном итоге ожидается, что стареющий и утонченный Янь Хуэйцин снова выдвинет свою кандидатуру на переизбрание. Формально человек, омытый от политики во всех смыслах этого слова, Янь тем не менее постоянно оказывался за штурвалом, чтобы гарантировать, что Бэйянская республика не самосожжется в бедствии хаоса. Понимая, что этот момент в китайской истории является водоразделом, и что нации очень нужна твердая, надежная рука наверху, он подал сигнал властям о своей кандидатуре.\n\nПоддерживаемая такими, как фракция Лоян, технократами и аполитичными в истеблишменте, кампания Яня довольно пресная. Рассчитывая, что его собственные заслуги и служба приведут его к победе, он, вероятно, прав в этом предположении, поскольку нести факел в самый темный час Китая — немалый подвиг. Однако многие в его ближайшем окружении обеспокоены тем, что ему, возможно, будет противостоять кандидат по указанию фракции Тяньцзинь маршала Вана. Если они воспользуются самодовольством Яня и отсутствием энергичных зажигательных речей, это вполне может стать триумфом."
 sichuan_events.280.d_challenger: "В конечном итоге ожидается, что стареющий и утонченный Янь Хуэйцин снова бросит вызов Маршалу, по сообщениям, вступив в борьбу. Формально человек, омытый от политики во всех смыслах этого слова, Янь тем не менее постоянно оказывался за штурвалом, чтобы гарантировать, что Бэйянская республика не самосожжется в бедствии хаоса. Понимая, что этот момент в китайской истории является водоразделом, и что нации очень нужна твердая, надежная рука наверху, он подал сигнал властям о своей кандидатуре.\n\nПоддерживаемая такими, как фракция Лоян, технократами и аполитичными в истеблишменте, кампания Яня довольно оживленная. Сосредоточившись на упрямом самодовольстве фракции Тяньцзинь, он, по сообщениям, позиционирует себя как «чистого» кандидата, свободного от Чжили. Однако многие в его ближайшем окружении обеспокоены тем, что ему, возможно, будет противостоять кандидат по указанию фракции Тяньцзинь маршала Вана. Считаясь героем войны, вписанным в анналы истории подобно У Пэйфу, кого бы ни поддержал маршал Тяньцзиня, он несомненно несет с собой всю мощь военных."
 sichuan_events.280.a: "Вперед с дипломатическим корпусом!"

 sichuan_events.281.t_incumbent: "Оруженосец Тяньцзиня"
 sichuan_events.281.t_challenger: "Кандидат Тяньцзиня"
 sichuan_events.281.d_incumbent: "Возможно, к облегчению многих и к удивлению непосвященных, маршал Тяньцзиня не строит иллюзий по поводу своей роли в демократии Китая. Предпочитая позволить политикам заниматься политикой, Маршал вместо этого решил обеспечить, чтобы его наследие, наследие Тяньцзиня, было продолжено другим членом клики. Встретившись за закрытыми дверями только со своими самыми верными, было решительно постановлено, почти единогласно, если бы не Ван Кэминь, выдвинувший себя в качестве кандидата, что уважаемый Гао Линвэй наконец достигнет вершин президентства.\n\nВсегда проницательный политик, Гао Линвэй оказывается карьерным бюрократом в мире идеалистов. Служа на различных должностях на провинциальном, а затем и на кабинетном уровне, Гао был политиком с двадцати пяти лет, и всё же это был тяжелый каменистый путь. Реализовавшись только благодаря связям с различными фигурами, такими как Чжан Чжидун, Сюн Силин и Цао Кунь, Гао снова оказывается бенефициаром чужой благосклонности. Тем не менее, он чрезвычайно способный государственный деятель и, безусловно, не лишен собственных амбиций. Имея связи по всей стране, Гао — прилежная рука, поддерживаемая героями нации."
 sichuan_events.281.d_challenger: "Не тот, кто сдается без боя, маршал Ван Чэнбинь, по сообщениям, бросил весь вес своей фракции Тяньцзинь за своего собственного кандидата на президентских выборах. Как сообщается, получив проклятия от ближайшего окружения Янь Хуэйцина, превратив то, что считалось односторонней гонкой, в разделенное голосование. Встретившись за закрытыми дверями только со своими самыми верными, было решительно постановлено, почти единогласно, если бы не Ван Кэминь, выдвинувший себя в качестве кандидата, что уважаемый Гао Линвэй наконец достигнет вершин президентства.\n\nВсегда проницательный политик, Гао Линвэй оказывается карьерным бюрократом в мире идеалистов. Служа на различных должностях на провинциальном, а затем и на кабинетном уровне, Гао был политиком с двадцати пяти лет, и всё же это был тяжелый каменистый путь. Реализовавшись только благодаря связям с различными фигурами, такими как Чжан Чжидун, Сюн Силин и Цао Кунь, Гао снова оказывается бенефициаром чужой благосклонности. Тем не менее, он чрезвычайно способный государственный деятель и, безусловно, не лишен собственных амбиций. Имея связи по всей стране, Гао — прилежная рука, поддерживаемая героями нации."
 sichuan_events.281.a: "Тяньцзинь несет наследие Чжили!"

 sichuan_events.282.t: "Кульминация великой борьбы"
 sichuan_events.282.d: "Как и подобает духу Цветка Бегонии, избирательный цикл в последнее время был сердечным, осторожным и внимательным. Даже самые ярые античжилийские кандидаты, такие как Хуан Фу и Ху Ши, действовали с уважением к Клике. Поскольку даже они признают, что без жертв Чжили они бы даже не стояли на своих нынешних позициях, и Республика, какой мы её знаем, вполне могла бы быть растрачена впустую.\n\nВ свете этого, реальными фигурами для склонения на свою сторону были многочисленные делегаты в Ассамблее и Сенате. Поскольку большинство членов Ассоциации Гармонии либо бежали, либо были заключены в тюрьму, либо убиты в свете Пекинского переворота, их прежняя хватка в органах власти далека от определенности. И поэтому представился реальный шанс для оппозиции захватить день. По крайней мере, так считают газеты и идеалисты.\n\nНа самом деле китайский народ и чиновники слишком хорошо знают, что, хотя оппозиционные партии внесли свою справедливую долю в восстановление Бэйянской республики, именно Чжили и только Чжили сплотились за «Пять рас в одном союзе» вопреки японским прихвостням и автократичным монархистам. В связи с этим выборы [GetYear], хотя и были теоретически разделены между многочисленными кандидатами, на самом деле свелись к двум. Фракции Баодин и Тяньцзинь Клики Чжили поддерживали своего предпочтительного кандидата Гао Линвэя, а фракция Лоян вместе с «технократами» Республики поддержала Янь Хуэйцина.\n\nСтавки сделаны, будущее Китайской Республики в это время примирения зависит от силы и характера этих двух давно служащих ветеранов государства. Истинное испытание для политических семей почитаемых У Пэйфу и Цао Куня."
 sichuan_events.282.a: "Гао захватывает Ассамблею!"
 sichuan_events.282.b: "Сладкие речи дипломата побеждают!"

 sichuan_events.283.t: "Потеря импульса"
 sichuan_events.283.d: "Наша миссия, наша цель, причина нашего восстания! Свержение мальчика-императора и восстановление Бэйянской республики! Это было жестоко вырвано из наших рук! Тем не менее, Бэйянская республика в её истинной форме живет в нашем правительстве. Хотя мы, возможно, не контролируем Пекин, Маршал заверил правительство, что сделает миссией своей жизни объединение страны, восстановление Ассамблеи и Кабинета на их законном месте. Однако до завершения таких дел [ROOT.GetLeader] установил переходный период.\n\nЧжили переживали и худшее, гораздо худшее, сталкиваясь с почти полным исчезновением множество раз. Сообщается, что маршал Ван собрал экстренное совещание штаба с такими людьми, как Чжан Цихуан, Цзян Байли, Бай Цзяньу и Гао Линвэй, чтобы разработать новую серию стратегических планов, используя как органы военных, так и политический кабинет, для переориентации отвоевания на восстановление Чжили и истинной Бэйянской республики, в отличие от простого изгнания роялистов.\n\nПараллельно с совещанием Маршала, похоже, ряд остатков пекинской политической сцены хлынул на наши земли. В то время как обычно они были бы немедленно задержаны при въезде на наши границы, фракция Лоян, Кабинет и остальные гражданские вложили свой политический вес в их амнистию. Предполагая, что они могут оказаться полезными в отвоевании, Маршал смягчился."
 sichuan_events.283.a: "Пекин прямо перед нами! Мы не можем дрогнуть!"

 sichuan_events.350.t: "Тянь Сунъяо снова присоединяется к Департаменту"
 sichuan_events.350.d: "Всегда будучи оппортунистом, Тянь Сунъяо покинул нас, чтобы не навлечь гнев Ян Сэня после своего неудачного переворота в 1923 году. Как только Ян впал в немилость, и мы пришли к власти, перебежчик Тянь умолял нас позволить ему вернуться в департамент."
 sichuan_events.350.a: "Приветствуйте его возвращение."

 sichuan_events.351.t: "Порядок восстановлен в Чунцине"
 sichuan_events.351.d: "После того как Сян бежал из города, Ускоренный департамент и его административные функции развалились. Голова змеи была, как говорится, отрублена. С тех пор город и прилегающие регионы страдали от массовых беспорядков. От простых людей, пытающихся справиться с хаосом, до оппортунистов, грабящих и мародерствующих на волне хаоса — город давно не знал спокойного момента.\n\nИмея это в виду, мы рады сообщить, что усилия нашей военной полиции наконец смогли подавить худшие беспорядки. По большей части порядок в городе восстановлен, и основные функции местной администрации снова запущены. Скоро дела в Чунцине вернутся в обычное русло."
 sichuan_events.351.a: "Хоть какие-то хорошие новости."

 sichuan_events.352.t: "Двоевластие"
 sichuan_events.352.d: "Баодинский департамент уникален тем, что он не контролируется одним сильным милитаристом. Вместо этого он известен тесным сотрудничеством между его самыми доминирующими фигурами. С одной стороны, Дэн Сихоу, кадровый офицер, в основном озабоченный военной теорией, социальными реформами и развитием сельских районов. С другой — Лю Вэньхуэй, дядя Лю Сяна, известный своей приверженностью академическим и административным реформам.\n\nВместе они образуют равновесие между традиционализмом и реформизмом, имея хороший опыт совместной работы. Хотя наличие системы балансировки влияний спасло департамент от скатывания во внутренние склоки и вражду, которыми отмечены многие другие клики в Китае, если этот баланс будет нарушен и кто-то получит слишком большое превосходство над другим, нет сомнений, что Баодинский департамент может пасть жертвой подобных проблем. Поэтому следует позаботиться о сохранении двоевластия и не допустить, чтобы оно рассматривалось как ещё одна китайская автократия."
 sichuan_events.352.a: "Вместе, ради лучшей Сычуани."

 sichuan_events.353.t: "Лю Вэньхуэй утверждает контроль"
 sichuan_events.353.d: "Поскольку его усилия по модернизации Сычуани приносят плоды, люди в городах и за их пределами увидели явное улучшение своей жизни благодаря ему. Это сопровождалось отлаженным административным органом и государственным аппаратом, которые, не в последнюю очередь благодаря его инициативе, помогли ему подняться на видное место. Хотя дух сотрудничества двоевластия сохраняется, нет сомнений, что успешные реформы Лю сделали его де-факто контролером Баодинского департамента на данный момент."
 sichuan_events.353.a: "Современность Сычуани станет предметом зависти всего Китая!"

 sichuan_events.354.t: "Дэн Сихоу утверждает контроль"
 sichuan_events.354.d: "После серии популярных реформ авторитет Дэн Сихоу крепчал с каждым днем. Благодаря широкой поддержке сельского населения и солдат, его реформы находятся на первом месте в сычуаньской повестке дня. Хотя двоевластие сохраняется в духе здорового сотрудничества, очевидно, что более традиционно настроенная фракция Дэн Сихоу в настоящее время выделяется как фактический контролер Баодинского департамента."
 sichuan_events.354.a: "Сычуань станет образцом для всего Китая!"

 sichuan_events.355.t: "Лю Вэньхуэй протестует против военного курса"
 sichuan_events.355.d: "Сила дружбы и сотрудничества измеряется не только позитивом, но и способностью выдерживать и преодолевать негатив. Недавно фракция Лю Вэньхуэя призвала сменить курс, так как Дэн Сихоу направил департамент в исключительно милитаристское русло. Хотя никто не может сомневаться, что у Сычуани одни из самых хорошо обученных солдат в Китае и что Дэн добился больших успехов, помогая сельским жителям, это было сделано за счет других областей реформ. Действительно, акцент на одном в ущерб другому привел к тому, что административная сторона была заброшена. Дэна призывают вернуться к более сбалансированному подходу, иначе потребуется более радикальная коррекция."
 sichuan_events.355.a: "Возможно, он прав..."

 sichuan_events.356.t: "Дэн Сихоу протестует против промышленного курса"
 sichuan_events.356.d: "В свете подавляющего внимания к индустриализации и великим проектам в крупных городах Дэн Сихоу начал выражать обеспокоенность тем, что это происходит за счет не только армии, но и развития сельских районов. Действительно, хотя никто не сомневается, что он добился успехов в своих областях, это произошло за счет армии, близкой к дезорганизации, и сельского населения, живущего сейчас немногим лучше, чем до гражданской войны. В свете этого Дэн и другие высокопоставленные члены департамента призывают к быстрой смене курса в сторону баланса, который ранее был отличительной чертой департамента. Если этого не произойдет, есть уверенность, что мы увидим более радикальные меры по коррекции курса."
 sichuan_events.356.a: "Возможно, он прав..."

 sichuan_events.400.t: "Варлорд Сикана"
 sichuan_events.400.d: "Соперничество между Лю Сяном и его дядей Лю Вэньхуэем давнее и горькое. Однако теперь, похоже, оно подходит к концу. После разгрома Баодинского департамента во время войны Вэньхуэй смог сбежать на свою базу в горном районе Сикан, к востоку от Тибета. Хотя остатки сил Баодина сильно пострадали от поражения в гражданской войне, само расстояние между Чунцином и горной крепостью Вэньхуэя делает быструю военную победу маловероятной. Один только логистический кошмар такого предприятия делает его немыслимым без серьезной подготовки.\n\nТак или иначе, эту ситуацию нужно будет разрешить, если Лю Сян хочет полностью закрепить свою победу."
 sichuan_events.400.a: "Дело, с которым нужно разобраться, рано или поздно."

 sichuan_events.401.t: "Семейный вопрос"
 sichuan_events.401.d: "С момента официального окончания гражданской войны в Сычуани продолжается конфликт между Лю Сяном и его дядей. Богатства от опиума позволили Вэньхуэю постепенно восстановить свои силы, и благодаря контролю над горами он в настоящее время удерживает инициативу. Со временем Вэньхуэй станет сильнее, делая и без того трудную задачу вторжения в его горную крепость всё сложнее с каждым днем.\n\nЛю Сян теперь должен решить, как поступить со своим своенравным дядей. Мирное решение не невозможно, но цена союза с Сяном будет недешевой. С другой стороны, открытый конфликт — это вовсе не гарантированная победа."
 sichuan_events.401.a: "Наши интересы совпадают — предложить ему союз!"
 sichuan_events.401.b: "Он подчинится, как и все остальные."

 sichuan_events.402.t: "Письмо из Сикана"
 sichuan_events.402.d: "Сегодня курьер прибыл в Чунцин, неся важнейшее послание для Лю Сяна. Скупое на формальности, оно было кратким и по существу. В нем дядя Сяна сухо заявил, что он открыт для совместной работы, хотя и за определенную цену.\n\nК разочарованию, его цена — не золото, а реформы. Он хочет увидеть, как его мечты о новой Сычуани воплощаются при правлении Сяна. С широкомасштабными социальными и образовательными реформами, которые не полностью совпадают с собственным видением Сяна для Сычуани. Согласие означало бы мирное окончание конфликта, но стоит ли платить такую цену за это?"
 sichuan_events.402.a: "Хорошо, приемлемая цена."
 sichuan_events.402.b: "Кем он себя возомнил!?"

 sichuan_events.403.t: "Союз двух Лю"
 sichuan_events.403.d: "Непростой союз сформировался между племянником и дядей, оформленный напряженной встречей в Чунцине, где пара изо всех сил старалась делать вид, что всё в порядке. Вэньхуэй явно не доверяет своему племяннику, а Сян не доволен жертвами, на которые ему пришлось пойти ради этой сделки. Руки были пожаты, фотография для прессы сделана, и встреча закончилась почти так же быстро, как и началась.\n\nХотя ситуация не идеальна, перемирие, похоже, пока держится. Приведя варлорда Сикана в свое лоно, Лю Сян теперь может вернуться к реализации своих амбиций по созданию великой Сычуани."
 sichuan_events.403.a: "Посмотрим, надолго ли это..."

 sichuan_events.404.t: "Непокорность Сикана"
 sichuan_events.404.d: "К огромному разочарованию Сяна, его дядя выжидал время в горах с момента окончания гражданской войны. Теперь кажется очевидным, что если не предпринять никаких действий, Сикан останется де-факто автономным регионом вне контроля Чунцина.\n\nНаходя эту ситуацию нетерпимой, Лю Сян теперь должен решить, как действовать. Либо устранить его тайными средствами, либо готовиться к вторжению в сам Сикан и выселить Вэньхуэя из его маленького горного королевства."
 sichuan_events.404.a: "Приказать убить его."
 sichuan_events.404.b: "Ввести войска!"

 sichuan_events.405.t: "Пуля, пролетевшая мимо"
 sichuan_events.405.d: "Хотя удаленность Яаня от остальной части Сычуани спасла его от худшего насилия гражданской войны, любые иллюзии о том, что это продлится, были разбиты сегодня, когда Сян сделал первые выстрелы в войне между ним и его дядей.\n\nРатуша, ставшая де-факто штаб-квартирой Вэньхуэя с момента прихода к власти, стала местом попытки преступления. Имея лишь узкое окно для выстрела, убийца открыл огонь из винтовки Gewehr 98k с оптическим прицелом из соседнего здания, когда Вэньхуэй выходил из машины по пути к зданию. Это был наглый акт, который почти удался. Но по счастливой случайности пуля чудом разминулась с Вэньхуэем всего на долю дюйма, оставив след, пройдя рядом с тканью его мундира, но не задев самого милитариста. Его личные телохранители быстро прикрыли его и втащили в здание, не оставив снайперу надежд на успешный второй выстрел.\n\nЖесткая охрана в городе привела к тому, что преступник был схвачен солдатами до того, как смог сбежать. Под страхом смерти он признался во всем, как будто признание участия Сяна действительно было нужно на этом этапе. В абсолютной ярости от трусости и наглости своего племянника, пытавшегося убить его, Лю Вэньхуэй приказал своим силам привести полную боевую готовность. Похоже, теперь этот вопрос решит война."
 sichuan_events.405.a: "Черт."

 sichuan_events.406.t: "Лю Вэньхуэй вторгается в бассейн"
 sichuan_events.406.d: "Сегодня рано утром реструктурированные остатки Баодинского департамента под руководством Лю Вэньхуэя вторглись в Сычуаньский бассейн. После покушения на его жизнь это рассматривалось как неизбежность. Зная, что вторжение неизбежно, Сян приказал своим войскам подготовиться, а это значило, что встреча двух армий была не за горами.\n\nПервая битва произошла между основными силами Вэньхуэя и несколькими небольшими бригадами войск из Ускоренного департамента, отправленными охранять протяженную границу с владениями Вэньхуэя. Длина этой границы, однако, означала, что Сяну было трудно создать оборонительный опорный пункт; эти силы в основном предназначались для того, чтобы сдерживать вторжение достаточно долго, чтобы отступить, когда остальная часть Ускоренного департамента мобилизуется и подготовится к контратаке. Битва закончилась вничью, солдаты Сяна были вынуждены отступить раньше, чем ожидалось, но достаточно задержали продвижение Вэньхуэя, чтобы не дать им захватить бассейн. Война далека от завершения, и пока кажется, что любая сторона может победить."
 sichuan_events.406.a: "Значит, война."

 sichuan_events.407.t: "Лю Вэньхуэй блокирует вход в Сикан"
 sichuan_events.407.d: "Как и ожидалось, марш на Яань оказался трудным предприятием. Как только его силы вошли в Сикан, они столкнулись с подготовленной обороной в горах, где почти не было дорог, а это означало, что даже небольшие отряды с пулеметами и минометами могли часами сдерживать силы Сяна и наносить им изнурительные потери, превращая узкие дороги в зоны поражения. Как бы то ни было, Ускоренный департамент продолжает марш, очевидно, решив взять горы силой, чего бы это ни стоило."
 sichuan_events.407.a: "Значит, война."

 sichuan_events.408.t: "Война двух Лю"
 sichuan_events.408.d: "То, что началось как пограничные стычки, быстро переросло в попытки двух регулярных армий продвинуться на территорию друг друга. Последовали переменные успехи, поскольку ни одна из сторон поначалу не могла получить явного преимущества. Хотя Ускоренный департамент сильнее на бумаге, их задача по взятию Яаня, мягко говоря, пугающая. И снова Сычуань погрузилась в кровавую гражданскую войну."
 sichuan_events.408.a: "Наказать эту дерзость!"

 sichuan_events.409.t: "Война двух Лю"
 sichuan_events.409.d: "После победы фракции Лю Сяна из Ускоренного департамента в недавней гражданской войне в Сычуани к власти пришел амбициозный и агрессивный Лю Сян. Многие наблюдатели как дома, так и за рубежом восприняли это как тревожное событие, так как мало кто верит хоть на секунду, что его жажда власти остановится на его собственной границе. Однако недавно появилась возможность устранить его.\n\nИзвестно о соперничестве между Лю Сяном и его дядей Лю Вэньхуэем; последний всё ещё контролирует значительную часть остатков Баодинского департамента, сражавшегося в прошлой гражданской войне. Это соперничество теперь переросло в еще одну гражданскую войну между ними. Хотя это наверняка навредит амбициям Сяна независимо от исхода, это дает возможность привести к власти гораздо менее агрессивный Баодинский департамент. Возможно, нам следует склонить чашу весов конфликта, предоставив тайную помощь усилиям Лю Вэньхуэя по свержению его племянника?"
 sichuan_events.409.a: "Отправить помощь Лю Вэньхуэю."
 sichuan_events.409.b: "Нам незачем вмешиваться."

 sichuan_events.410.t: "Тянь Сунъяо встает на сторону Лю Вэньхуэя"
 sichuan_events.410.d: "Стремление к войне, похоже, имело непредвиденные последствия для Ускоренного департамента. Перебежчик Тянь в прошлом много раз менял стороны и служил каждому господину, известному в Сычуани. Будучи предательским оппортунистом, его значительные личные силы всё же позволяли ему выживать. Похоже, теперь он официально заявил о своей верности Баодинскому департаменту и встал на их сторону, как и более десяти лет назад. Почему у него произошла эта удобная смена убеждений в разгар войны — можно только гадать, но любой, кто знает эту змею, должен понимать, что это, вероятно, не в последний раз."
 sichuan_events.410.a: "Предатель!"

 sichuan_events.411.t: "Битва при Мэйшане"
 sichuan_events.411.d: "Независимо от того, кто выстрелил первым, остатки Баодина не продержались бы долго, если бы выдвинулись в бассейн. Поэтому они преимущественно полагались на суровую местность Сикана, чтобы измотать Ускоренный департамент. Они могли с относительной легкостью и малыми силами сдерживать превосходящие силы противника, просто направляя их через подготовленную оборону. Хотя это замедляло их, это была война на истощение, где одна сторона могла восполнять потери, в то время как Сикан был лишен промышленной базы.\n\nВ конце концов, медленное продвижение Ускоренного департамента привело основные силы к городу Мэйшань, последнему крупному стратегическому препятствию на пути к Яаню. Хотя Баодин выиграл достаточно времени для подготовки обороны, они явно находились в незавидном положении, сражаясь с противником, который на бумаге превосходил их. Однако он был измотан истощением, а часть тяжелого оборудования всё ещё транспортировалась через горные перевалы.\n\nЛю Сян теперь должен выбрать: начать полномасштабный штурм без поддержки тяжелой техники департамента или дождаться её прибытия и использовать в полную силу. Атака сейчас должна дать хороший шанс на внезапность, но это рискованная авантюра против подготовленной обороны города. С другой стороны, доставка артиллерии на фронт займет как минимум несколько дней, что даст Баодину драгоценное время на подготовку."
 sichuan_events.411.a: "Штурмовать город сейчас!"
 sichuan_events.411.b: "Дождаться подкреплений перед атакой."

 SZC_meishan_assault: "Горы были их единственным союзником. Оставив их позади, они не имеют ничего. Они плохо снабжены, дезорганизованы и плохо вооружены. Даже без наших тяжелых орудий у нас должно быть достаточно огневой мощи, чтобы быстро расправиться с ними. Как только мы штурмуем город, их оборона наверняка рухнет перед мощью Ускоренного департамента."
 SZC_meishan_reinforce: "Хотя они в трудном положении, без нашей артиллерии для уничтожения их пушек и пулеметов мы понесем ошеломляющие потери. Хотя доставка орудий сюда окажется очень сложной из-за местности, более осторожные офицеры считают, что это стоит усилий."

 sichuan_events.412.t: "Штурм Мэйшаня"
 sichuan_events.412.d: "Решив атаковать немедленно, Ускоренный департамент выступил против защитников города без своего тяжелого оборудования. Однако даже без него дивизии имели гораздо больше минометов, пулеметов и легких пушек, чтобы составить конкуренцию защитникам города. Баодин уже потерял большую часть своего тяжелого оборудования на первом этапе гражданской войны, в ходе которого Сян взял Чэнду. Имея мало шансов восполнить эти потери, оборона города была, по сути, довольно простой. Траншеи, старые пулеметы и винтовки составляли её основную часть, а случайные пушки формировали горстку опорных пунктов в клиновидной схеме.\n\nХотя силы Сяна понесли тяжелые потери при взятии города, главная линия обороны была прорвана в течение нескольких часов боев. Вэньхуэй не был блестящим стратегом, и его примитивные оборонительные линии не преподнесли сюрпризов атакующим. После прорыва центральной части оборонительной линии Ускоренный департамент ворвался в город и разбил оставшиеся укрепления с флангов. Хотя Лю Вэньхуэю удалось сбежать, военнопленные уже говорят, что боевой дух низок и даже у него нет надежд на победу."
 sichuan_events.412.a: "В семейной вражде скоро будет победитель."

 sichuan_events.413.t: "Разгром в Сикане"
 sichuan_events.413.d: "Решив подождать, Сян не только дал защитникам больше времени на подготовку, но и подверг свои силы постоянным преследованиям со стороны войск Баодина в горах. Доставка припасов на фронт была логистическим кошмаром, и многие из перемещаемых артиллерийских орудий были повреждены или потеряны на опасных горных дорогах, так как Сян приказал спешить, пренебрегая безопасностью.\n\nКогда атака была готова, немногие артиллерийские орудия, добравшиеся до фронта, не сыграли большой роли. Силы Сяна были истощены тысячами из-за потерь, как от рук гор, так и от арьергардных действий Баодина. Это была деморализованная сила, которая в конечном итоге атаковала хорошо подготовленную оборону, и потери, понесенные от природы, быстро дали о себе знать. Хотя оборона вокруг города была лишенной воображения имитацией укреплений эпохи Вельткрига, немногочисленные пушки и пулеметы, которыми обладал Вэньхуэй, смогли удержать линию против врага, хотя и с трудом. После нескольких последовательных штурмов город был поврежден, оборона сильно потрепана, но авангард Сяна был уничтожен. Тысячи лежали мертвыми на земле, многие другие были ранены или взяты в плен.\n\nНе имея надежд взять город, Сян теперь вынужден отступать из Сикана. Хотя ни одна сила в Сычуани не могла сравниться с Ускоренным департаментом в поле, Ускоренный департамент был наконец побежден скорее самими горами, чем чем-либо другим. Их отступление стало катастрофой, сродни бегству Наполеона из Москвы, поскольку местность и преследователи продолжали истощать некогда могучий Ускоренный департамент. Уже идут разговоры о мятеже внутри Ускоренного департамента, и будущее Сяна кажется очень неопределенным."
 sichuan_events.413.a: "В семейной вражде скоро будет победитель."

 sichuan_events.414.t: "Первые морские учения"
 sichuan_events.414.d.landlocked: "Несмотря на то, что Сычуань — страна, не имеющая выхода к морю, Лю Сян настаивал на исключительной важности флота. Он представлял будущее, где могучие корабли, соперничающие с немецким Флотом открытого моря в его лучшие дни, будут патрулировать реку Янцзы и защищать сычуаньскую торговлю. «Первые шаги к величию» принесли Сычуани полное морское господство в регионе, конечно, но просто потому, что никто не удосужился его оспаривать. Тем не менее, победа есть победа. Вскоре было объявлено о публичной демонстрации этой новообретенной морской мощи. Чтобы впечатлить местных жителей и ужаснуть будущих врагов, разумеется.\n\nПублика была приглашена на эти первые морские учения, демонстрирующие силу ВМС. Самыми большими военными кораблями на этом участке Янцзы была горстка старых пароходов, наспех переделанных из гражданских и призванных на военную службу. На самодельные военные корабли были установлены железные листы, а также батареи орудий, взятые из местных артиллерийских полков и принудительно переделанные для этой новой роли. Как только морские учения начались в полную силу, не прошло много времени, как стали проявляться очевидные проблемы.\n\nПервый адмирал Сычуани, должно быть, вздохнул с облегчением, когда корабли смогли вообще двигаться, несмотря на увеличение брони и вооружения. Невыносимо медленно, конечно, но, по крайней мере, они не пошли на дно реки. Всё должно было завершиться тройным орудийным салютом, но когда старые гаубицы выстрелили, отдача от выстрелов едва не перевернула старый пароход. Паника охватила экипаж, и несколько человек прыгнули в Янцзы, опасаясь, что их корабль полностью перевернется. Хотя их худшие опасения не оправдались, весь этот фарс вызвал немало насмешек, поскольку чудом избегнутая морская катастрофа привела к появлению не одного сатирического стихотворения за счет Сяна. Пока люди смеются (по крайней мере, когда уверены, что тайной полиции нет рядом), этого нельзя сказать о Сяне.\n\nИли о первом адмирале Сычуани, если уж на то пошло."
 sichuan_events.414.d.not_landlocked: "Несмотря на скромное начало Сычуани как провинции, не имеющей выхода к морю, Лю Сян всегда настаивал на исключительной важности флота. Он представлял будущее, где могучие корабли, соперничающие с немецким Флотом открытого моря в его лучшие дни, будут патрулировать Южно-Китайское море, защищая растущий статус Сычуани как региональной державы. «Первые шаги к величию», конечно, не впечатлили другие морские державы региона, но Сян тем не менее заслужил внимание морских держав региона, хотя бы тем, что вообще сумел построить флот. В ознаменование этого вскоре было объявлено о публичной демонстрации этой новообретенной морской мощи. Чтобы впечатлить местных жителей и ужаснуть будущих врагов, разумеется.\n\nПублика была приглашена на эти первые морские учения, демонстрирующие силу могучего флота. «Великий Сычуаньский Флот» в настоящее время состоял только из старых пароходов, наспех переделанных из гражданских и призванных на военную службу. На самодельные военные корабли были установлены железные листы, а также батареи орудий, взятые из местных артиллерийских полков и принудительно переделанные для этой новой роли. Как только морские учения начались в полную силу, не прошло много времени, как стали проявляться очевидные проблемы.\n\nПервый адмирал Сычуани, должно быть, вздохнул с облегчением, когда корабли смогли вообще двигаться, несмотря на увеличение брони и вооружения. Невыносимо медленно, конечно, но, по крайней мере, они не пошли на дно моря. Всё должно было завершиться тройным орудийным салютом, но когда старые гаубицы выстрелили, отдача от выстрелов едва не перевернула старый пароход. Паника охватила экипаж, и несколько человек прыгнули в море, опасаясь, что их корабль полностью перевернется. Хотя их худшие опасения не оправдались, весь этот фарс вызвал немало насмешек, поскольку чудом избегнутая морская катастрофа привела к появлению не одного сатирического стихотворения за счет Сяна. Пока люди смеются (по крайней мере, когда уверены, что тайной полиции нет рядом), этого нельзя сказать о Сяне.\n\nИли о первом адмирале Сычуани, если уж на то пошло."
 sichuan_events.414.a: "Адмирал Куй, вы уволены!"

 sichuan_events.415.t: "Могучие военно-воздушные силы"
 sichuan_events.415.d: "Сегодня в Чунцин прибыла первая партия импортных самолетов для официальной инспекции не кем иным, как торжествующим Лю Сяном. Всё это дело имело скорее церемониальный оттенок, чем что-либо ещё. Это был способ продемонстрировать миру, или, по крайней мере, собравшейся китайской прессе, зачатки так называемых Могучих ВВС Сычуани. Хотя триумфальная помпезность была чрезмерной для этого случая, Сян был прав, отметив это как важное событие, знаменующее модернизацию Сычуани и быстрое принятие провинцией современных военных технологий и методов.\n\nКонечно, самолеты едва ли были чем-то впечатляющим по мировым военным стандартам. Хотя они были хорошими машинами в Вельткриге, собранная коллекция ранее законсервированных пережитков вряд ли заставит лордов в Пекине дрожать в сапогах — как и императора в Токио. Однако по меркам часто игнорируемой китайской глубинки это был огромный скачок в двадцатый век. Учитывая состояние региональных держав, эта горстка реликвий могла летать над горами и собирать информацию о позициях противника, которую было бы очень трудно получить пешком. Часто узкие ландшафты горных перевалов и открытость бассейнов означали, что даже пережиток эпохи Вельткрига с парой синхронизированных пулеметов мог эффективно беспокоить пехотные формирования, которые никогда раньше не сталкивались с бреющим полетом.\n\nПри всей его браваде о ВВС, которые могли бы доминировать в небе над Китаем, он, возможно, очень прав, по крайней мере, в том, что касается его собственного заднего двора. С учетом всего сказанного, были сделаны фотографии Сяна, пожимающего руки пилотам и инженерам, и на следующий день эти истории будут напечатаны."
 sichuan_events.415.a: "Помяните мое слово, Сычуань будет править небесами!"

 sichuan_events.416.t: "Чунцинский воздушный парад"
 sichuan_events.416.d: "Вскоре после создания «могучих военно-воздушных сил» Сычуани Лю Сян заявил, что весь Китай и даже мир должны трепетать перед их мощью. Стремясь показать союзникам и врагам, что Сычуань отныне будет доминировать в небе над Китаем, Чунцинский воздушный парад был поспешно организован для демонстрации сычуаньского воздушного господства.\n\nХотя сами ВВС были всего лишь коллекцией старых межвоенных самолетов, пылившихся на европейских и японских складах, это, безусловно, впечатлило толпы, собравшиеся посмотреть на зрелище. В конце концов, большинство крестьян и горожан Сычуани едва ли видели такие летательные машины даже на фотографиях. Поскольку некоторые из этих пилотов впервые садились в кабину, воздушный парад был далек от своих аналогов в Канаде и Германии, и пилоты-новички просто взлетали и выполняли самые базовые маневры перед посадкой, обычно без каких-либо осложнений.\n\nКаким бы простым это ни было, этого было достаточно, чтобы вызвать аплодисменты толпы, многие из которых искренне гордились тем, что их нация может похвастаться такими современными европейскими самолетами. Ближе к концу шоу Сян предложил Пан Вэньхуа, мэру Чунцина, попробовать полетать на одном из двухместных истребителей. Пан, возможно, немного уставший от знания того, насколько неопытны были эти пилоты, вежливо отклонил предложение, сославшись на свой плотный график управления столицей. Его адъютант удостоился этой чести вместо него, и так старый истребитель отправился на финальное представление дня; сам Сян приказал выжать из самолета всё возможное. Все оставшиеся зрители видели, как самолет поднялся, но изумление вскоре сменилось ужасом, когда из двигателя старого самолета начал валить черный дым. Неопытный пилот изо всех сил пытался восстановить контроль над самолетом, высота которого колебалась взад и вперед, пока, наконец, его попытки трагически не привели к остановке двигателя, отправив самолет на землю подобно комете.\n\nИ пилот, и пассажир погибли на месте, к шоку и ужасу гражданских и военных зрителей. Вскоре после этого Пан, осознав, насколько чудесным образом он обманул смерть, начал тихо подозревать, что это было покушение на него со стороны параноидального Лю Сяна. Это вызвало разлад в союзе между ним и Лю Сяном, не говоря уже о насмешках во всем регионе над фарсовым, но трагическим воздушным парадом над окраинами Чунцина."
 sichuan_events.416.a: "Кого-то расстреляют за это!"

 sichuan_events.500.t: "Успешные реформы гражданской службы"
 sichuan_events.500.d: "С момента Синьхайской революции в провинции Сычуань сложилась запутанная система из-за конкурирующих военных и гражданских клик. Когда Офицерский департамент полностью взял власть в свои руки, были предприняты усилия по тщательной реорганизации администрации. Гражданская служба, в частности, была тщательно расследована, коррумпированные элементы подверглись чистке, на вакантные места наняты способные сотрудники, а должности убраны или перемещены для большей эффективности. С одной стороны, это нарушило работу бюрократии на некоторое время, но видимые улучшения уже заметны. Потребуется ещё некоторое время, но гражданская служба Сычуани находится на пути к тому, чтобы стать чище, чем когда-либо."
 sichuan_events.500.a: "Обновленная служба для обновленной провинции."

 sichuan_events.502.t: "Новая валюта для Сычуани"
 sichuan_events.502.d: "Хотя на бумаге существует единая валюта для всего Китая, в действительности это не так уже несколько десятилетий. Отдельные, провинциальные, национальные и иностранные правительства, а также банки и так далее печатали и чеканили валюту независимо с разной степенью законности. Сычуани пришлось особенно нелегко из-за различных клик, борющихся за контроль над провинцией. Денежная реформа вступила в новую стадию с приходом к власти Офицеров. С восстановлением надлежащих финансов инфляция берется под контроль, бесполезные валюты уничтожаются, а незаконные монетные дворы закрываются. С восстановлением надлежащего выпуска валюты экономическая стабильность постепенно восстанавливается по мере улучшения способности провинциального правительства управлять финансами."
 sichuan_events.502.a: "Еще один успешный шаг вперед."

 sichuan_events.503.t: "Удар по коррупции"
 sichuan_events.503.d: "Коррупция носит повсеместный характер в Китае, и провинция Сычуань не исключение. Слишком много клик, беспринципных и амбициозных диктаторов слишком долго боролись за провинцию, и искоренение коррумпированных элементов стало серьезным вызовом для нашей благонамеренной, но молодой администрации. Несмотря на то, что в администрации отмечаются сбои, а иногда и столкновения между правительственными силами и мощными преступными организациями или наемными головорезами, приводящие к насилию и ущербу, Офицеры открыто хвастаются арестами и наказаниями различных коррупционеров. Эти события, новости о которых распространяются среди людей как можно шире, помогают восстановить доверие к администрации и, что более важно, к верховенству закона, поскольку коррупция и бандитизм достигают рекордно низкого уровня."
 sichuan_events.503.a: "От закона не убежишь. Больше нет."

 sichuan_events.505.t: "Чжунчуаньский военный акт"
 sichuan_events.505.d: "Акт Чжунчуань был разработан Сюн Кэу под влиянием Чэнь Цзюнмина с целью сокращения армии и демилитаризации провинции для снижения расходов. Раздутые армии в Сычуани были огромным бременем для правительства и, что более важно, для народа. Эта мера призвана помочь реструктурировать провинциальную армию и высвободить доходы для общественных работ и социальных программ. Поскольку вооруженная внутренняя оппозиция стала незначительной после победы Офицерского департамента, стало достаточно безопасно предпринять такой радикальный шаг против милитаризма, и оставшиеся войска сосредоточатся на борьбе с бандитами вместо того, чтобы воевать друг с другом."
 sichuan_events.505.a: "Армия теперь будет служить народу."

 sichuan_events.506.t: "Успешная армейская реформа"
 sichuan_events.506.d: "Армии в Сычуани были раздуты во время Эры милитаристов, сражаясь друг с другом, убивая и грабя без разбора. Реформы были необходимостью на протяжении многих лет, но ни одна из враждующих клик в провинции не желала открываться для атак. После окончания борьбы за власть провинциальная армия была передана обратно под контроль правительства, и были приняты меры, чтобы избежать наращивания военизированных формирований. Сокращение раздутого штата позволит направить средства в другие сферы, в то время как оставшийся военный бюджет может быть использован для модернизации наших сил и сосредоточения на борьбе с бандитизмом."
 sichuan_events.506.a: "Новая армия для новой провинции."

 sichuan_events.507.t: "Конец бандитизма"
 sichuan_events.507.d: "Бандитизм неизбежен, когда рушатся правительства, и он был эндемичным в течение многих лет в Сычуани, пока милитаристы боролись за контроль. Ситуация ухудшилась, когда соперничающие клики потерпели поражение, поскольку солдаты, не интегрированные в новые структуры, бежали в сельскую местность и сами становились бандитами. Поскольку реформы в армии и администрации идут полным ходом, Провинциальная армия смогла сосредоточиться на искоренении оставшихся оплотов бандитов в провинции, и последняя кампания стала крупным успехом. Скоро верховенство закона будет восстановлено по всей провинции."
 sichuan_events.507.a: "Больше не зона боевых действий."

 sichuan_events.509.t: "Соглашение Новой Сычуани"
 sichuan_events.509.d: "После очередной гражданской войны в Сычуани шаткий карточный домик Ян Сэня наконец рухнул. Вслед за падением Ускоренного департамента, Полк девяти во главе с Сюн Кэу и Офицерский департамент под руководством Ли Цзяюя и Ло Цзэчжо стали доминирующими силами в Сычуани, установив хрупкое перемирие. Люй Чао и его Промышленный корпус также прислушались к перемирию, несмотря на его враждебность к Сюну из-за их горькой ссоры после раскола между Гоминьданом и федералистами. Лю Вэньхуэй, один из лидеров Баодинского департамента, постарался снискать расположение как Ли, так и Сюна.\n\nПосле первоначального перемирия Сюн и Ли созвали общепровинциальный конвент во главе с различными военными силами, соблюдающими провинциальное перемирие, в надежде определить преемника губернатора Ян Сэня. Хотя было предложено много имен, Сюн Кэу и Ли Цзяюй возвысились над остальными. В то время как Сюн обладает решающим влиянием на конвенте как главный федералист Сычуани, Ли нашел большую поддержку среди мелких фракций.\n\nЛюй Чао, не решаясь обнять своего старого соперника, наладил переписку с Ли, возможно, наивно надеясь подтолкнуть его к принятию более революционных принципов. Лю Вэньхуэй, хотя и очень желал поста губернатора провинции, решил не выдвигать свое имя из страха быть полностью изгнанным из Сычуани. Вместо этого Лю решил хранить молчание на протяжении большей части конвента, надеясь, что либо Сюн, либо Ли обратятся к нему с просьбой о поддержке."
 sichuan_events.509.a: "Сюн доминирует на конвенте, как и ожидалось."
 sichuan_events.509.b: "Коалиция Ли Цзяюя переигрывает ветерана-федералиста!"

 sichuan_events.519.t: "Смелые идеалисты и великая бездна"
 sichuan_events.519.d: "Южный Китай когда-то был бастионом свободомыслящих интеллектуалов и центром прогрессивной мысли, многие из которых работали на местных губернаторов после поворота Чжили к автократии в 1932 году. В Гуандуне лянгисты (сторонники идей Лян Цичао) из Китайской конституционной партии, чьи левые симпатии подверглись усиленному вниманию на Севере, перешли под руководство Чжан Цзюньмая. В Юньнани различные интеллектуалы объединились в Общество полумесяца под руководством Ло Лунцзи. Однако, похоже, что даже Южный Китай стал негостеприимным для дела китайской демократии.\n\nДействительно, похоже, что клика Сычуани Сюн Кэу является последним крупным оплотом федерализма и свободы. ДСП Чжан Цзюньмая, Общество полумесяца Ло Лунцзи, а также многочисленные другие демократические партии, ранее связанные с Федерацией китайских демократических партий, собрались на съезд в Наньчуне, чтобы обсудить государственные вопросы с Чжан Ланем. Хотя все присутствующие партии согласились сформировать новую Демократическую лигу Китая, вопрос о руководстве стал горячо оспариваемым.\n\nВ то время как лянгисты на съезде продолжали призывать присутствующие партии признать Чжан Цзюньмая ведущей силой демократического движения в Сычуани, другие указывали на хозяина Чжан Ланя как на стабилизирующую силу и компромиссного кандидата. Хотя Чжан Лань может придерживаться левых взглядов, которые многие на съезде могут считать радикальными, никто не сомневается в его искренности по отношению к демократии. В итоге Чжан Лань был выдвинут на пост председателя Демократической лиги Китая к удовлетворению большинства."
 sichuan_events.519.a: "Нас еще не превзошли!"
 sichuan_events.519.b: "Интеллектуальное высокомерие никогда не перестает удивлять."

 sichuan_events.520.t: "Правительство национального восстановления"
 sichuan_events.520.d: "Поскольку Клика Чжили стала более враждебной к либеральной политике, многие прогрессивные интеллектуалы оказались вынуждены ехать дальше на юг в поисках более толерантного политического климата. Однако, похоже, что даже оплоты федералистов в Южном Китае пали, оставив только Сычуань единственным бастионом федералистского движения. Поскольку федералистские изгнанники и демократы Третьего пути направляются в Сычуань, стало ясно, что мантия свободы и провинциальной автономии перешла к Сюну, и создание правительства Свободного Китая имеет первостепенное значение.\n\nОсознавая эту необходимость, Сюн созвал Федералистский конвент для создания нового Сычуаньского федерального правительства. Присутствуют не только его Полк девяти, но и Баодинский департамент, Младокитайская партия, Офицерский департамент и Демократическая лига Китая. Хотя Сюн Кэу твердо решил быть исключительно мечом федералистского движения, он решил не занимать пост Временного президента, к удивлению многих наблюдателей.\n\nВместо этого Сюн призвал свою давнюю правую руку Дань Маосиня взять на себя руководство правительством. Однако этот шаг подвергся критике со стороны других присутствующих партий, обвинивших Сюна в консолидации правительства исключительно вокруг Полка девяти. В качестве компромисса Дань выдвинул Чжан Ланя из ДЛК на пост президента. С умеренным энтузиазмом Чжан Лань вышел на сцену, заявил о своей поддержке демократического Китая и поблагодарил Даня и Сюна за их поддержку. Подавляющим большинством голосов Чжан был избран и приведен к присяге в качестве Временного президента Федеративной Республики."
 sichuan_events.520.a: "Последняя надежда Китая на демократию лежит на нас."

 sichuan_events.521.t: "История Наньчунской хартии"
 sichuan_events.521.d: "Будучи частью республиканской борьбы в Сычуани с начала века, Чжан Лань стал легендарной фигурой на политической сцене как внутри провинции, так и по всему Китаю. Чжан и его союзники были популярны тем, что были особенно громкими и всеобъемлющими в своей политике, выступая за местную автономию и провинциальное самоуправление в бурную эпоху, когда присутствие центрального правительства было настолько слабым, а раскол между севером и югом настолько выраженным, что Сычуань не могла просто беспечно объединиться ни с одной из сторон.\n\nВ стремлении исправить все беды Сычуани «План временной автономии для уезда Наньчун» стал одним из основных документов, разработанных в марте 1921 года после месяцев дискуссий между Чжаном и его сторонниками-федералистами, такими как Сянь Ин и Сюн Кэу. Эти политики должны были быть сначала опробованы в уезде Наньчун, вводя ряд изменений в социальные слои уезда, которые все должны были быть реализованы в остальной части Сычуани в случае успеха. Такие идеалы Наньчунской хартии включали не только продвижение низовой демократии, взаимопомощи, регулирование налогов и оживление местного предпринимательства, но и предлагали более уникальные идеи, такие как классификация профессий по социальным группам и провинциальное правительство с отдельными ветвями, как институты на Западе.\n\nНесмотря на то, что эти понятия самоуправления и промышленной автономии были растоптаны и отброшены многими деспотами и апатичными массами Сычуани, они поддерживались многими в среде интеллигенции и самим Чжаном. С годами они продолжали развиваться, включая идеи возможностей высшего образования, а также необходимость увеличения промышленного потенциала Сычуани для доступа к большему количеству ресурсов для всех. Излишне говорить, что по мере того, как федералистское движение принимает вызов объединения, идеи демократии и автономии, впервые внедренные в Наньчуне, послужат основой, с помощью которой мы просветим народ Китая."
 sichuan_events.521.a: "Из этого горнила мы выкуем демократию, свободную и истинную!"
 sichuan_events.521.b: "Хорошие принципы, но не будем забегать слишком далеко вперед."

 sichuan_events.522.t: "Гигант на реке Цзялин"
 sichuan_events.522.d: "Хотя президентство Чжан Ланя пришлось на самый темный час Китая, почтенный ученый остается непоколебимым в своем стремлении создать подлинно федеративную республику, простирающуюся от Харбина до Кашгара. Действительно, с момента основания Республики в 1911 году президент Чжан выступал против любого наступающего авторитаризма, прокрадывающегося в залы Чжуннаньхая. После падения жалкой попытки Юань Шикая установить собственную автократическую династию, Чжан Лань поддержал Движение в защиту конституции и правительство Гуанчжоу, заявив, что временная конституция играет важную роль в основах стабильной республики.\n\nХотя Чжан Лань пытался положить конец раскольнической внутренней борьбе между сычуаньскими милитаристами, он не смог остановить боевые действия до недавнего Федералистского конвента, созванного Сюном, который возвысил его до президентства. Однако Чжан также понимает шаткое положение своего правительства. Перемирие, объявленное после падения Ускоренного департамента, не остановило мелкие стычки между военными фракциями Сычуани. Это побудило президента Чжана предпринять значительные усилия для координации гражданских и военных чиновников как более сплоченного движения.\n\nСтремясь продемонстрировать единство, премьер-министр Сюн Кэу подтвердил реформы президента, заявив, что они полезны для стабильности [ROOT.GetNameDef]. В то время как некоторые из мелких фракций в частном порядке ворчали, что Сюн просто использует президента Чжана для консолидации своего контроля над военными под предлогом национального единства, Сюн и Чжан остаются единым фронтом, и у них нет другого выбора, кроме как подыгрывать."
 sichuan_events.522.a: "Президент прав, призывая к военным реформам!"
 sichuan_events.522.b: "Премьер загоняет милитаристов в строй."

 sichuan_events.523.t: "Премьер часа"
 sichuan_events.523.d: "Хотя президент Чжан Лань быстро стал лицом нашего федералистского движения, те, кто участвует в Правительстве национального восстановления, знают, что именно премьер-министр Сюн Кэу скрепляет всё воедино. Ветеран Синьхайской революции, Войны в защиту нации и множества внутренних провинциальных конфликтов, Сюн Кэу стал ключевым участником федералистского движения в Эру милитаристов. Во время гегемонии Чжили Сюн оказался вытесненным из пентархии, созданной Ян Сэнем, Лю Сяном и Триумвиратом Баодинского департамента.\n\nОднако после того, как Ян столкнулся с вызовом со стороны крыла Лю Сяна из Ускоренного департамента, Сюн смог воспользоваться внутренней борьбой в провинции, чтобы снова стать выдающимся милитаристом Сычуани. Будучи премьер-министром Сычуаньского федерального правительства, Сюн интегрировал свою фракцию «Полк девяти» с Великим республиканским альянсом — коалиционной партией, состоящей из различных, в основном южных партий, выступающих против Бэйянского порядка, которая действовала как главная федералистская политическая организация с 1931 года.\n\nВ то время как Сюн сосредоточил свои усилия на сохранении единства Федерального правительства под руководством себя и Чжан Ланя, он поручил Дань Маосиню использовать их общее влияние в ВРА, чтобы держать его внутренние фракции как можно более согласованными с интересами Правительства национального восстановления, и использовал их политическую поддержку, чтобы не дать другим милитаристам получить слишком большое влияние в администрации Чжан Ланя."
 sichuan_events.523.a: "Нам повезло, что у руля Сюн Кэу!"
 sichuan_events.523.b: "Напомните нам, почему он снова главный?"

 sichuan_events.524.t: "Сломанный Триумвират"
 sichuan_events.524.d: "Пока премьер-министр Сюн Кэу и президент Чжан Лань занимали центральное место в новом Правительстве национального восстановления, в их тени остается всегда жизнестойкий Баодинский департамент. Пережив десятилетнюю борьбу в провинции Сычуань во время Эры милитаристов, Баодинский департамент смог заключить соглашение с Ускоренным департаментом Ян Сэня в десятилетие гегемонии Чжили. На протяжении десятилетия Баодинский департамент под руководством Дэн Сихоу, Тянь Сунъяо и Лю Вэньхуэя смог стать одной из основных фракций в политической структуре Сычуани, став тремя из «Пяти гигантов» Сычуани.\n\nОднако, когда Лига рухнула и власть Чжили отступила в их северные владения, Ян Сэнь обнаружил, что его правительство свергнуто, и Баодин вошел в неизведанные воды. Лю Вэньхуэй смог выйти из бойни с наибольшим сохранившимся влиянием, в то время как Дэн и Сун барахтались. Активно сотрудничая с офицерами Сюн Кэу и Ли Цзяюя, Лю оказался уже не в триумвирате с Дэном и Суном, а главным лидером Баодинского департамента.\n\nВ Правительстве национального восстановления Лю продвигал себя как одного из главных военных стратегов Федерального правительства, выступая за реструктуризацию армии по линиям предложенной Цзян Байли реформы «Милитаристское государство-народ». Лю также сформулировал свое собственное видение управления, которое он описал как «Три принципа продвижения» и «Три политики трансформации». Для Лю «Три принципа продвижения» призывают к осторожному продвижению, постепенному продвижению и быстрому продвижению, в то время как «Три политики трансформации» призывают к замене завоевания трансформацией, разделения — ассимиляцией, а косвенного контроля — прогрессивным развитием."
 sichuan_events.524.a: "Что это за полная чушь?"
 sichuan_events.524.b: "Нет-нет, он говорит дело."

 sichuan_events.525.t: "Прилив федералистского движения"
 sichuan_events.525.d: "Хотя многие предполагали, что федералисты не смогут оправиться от потери Юньнани и Гуандуна, президент Чжан Лань и премьер-министр Сюн Кэу доказали всем, что они ошибались. В шокирующем повороте событий Правительство национального восстановления, базирующееся в Сычуани, смогло сломить оплот Бэйянских милитаристов, передав Пекин в руки правительства, возглавляемого южанами, — подвиг, которого не смогли достичь даже революционеры Синьхая.\n\nПрибыв в Пекин к ликующей толпе, Сюн Кэу заявил массам, что это будет только началом объединительной кампании Правительства национального восстановления. Хотя Национальное восстановление, несомненно, является сильнейшим правительством, претендующим на представительство Китая, оно должно увидеть нацию полностью объединенной, прежде чем заявить о настоящем успехе. Пока президент Чжан Лань организует новое правительство Пекина, премьер Сюн Кэу готовит армию к последней борьбе Китая."
 sichuan_events.525.a: "Наше Движение восстанавливает порядок везде, куда бы мы ни шли!"
 sichuan_events.525.b: "Мы несем свободу нашей любимой Республике!"

 sichuan_events.600.t: "Победа Национального восстановления"
 sichuan_events.600.d: "Всего за несколько лет до этого казалось, что демократия в Китае находится на грани исчезновения, захваченная либо оппортунистическими реакционерами, либо революционными автократами. Однако сегодня Федеральное правительство Китая простирается от холодного Северо-Востока до гор Гуанси. Хотя это по праву признано триумфальной победой как Демократической лиги Китая, так и Великого республиканского альянса, правительство парадоксальным образом находится как в зените, так и на краю нарастающего кризиса.\n\nХотя никто не может отрицать, что Федеральное правительство контролирует большую часть Китая, победа подточила единство правительства Чжан Ланя. Союзники Сюн Кэу по ВРА вряд ли останутся довольны тем, что находятся в тени Чжан Ланя и ДЛК, и Президент должен работать над закреплением своих достижений, иначе федеральное правительство споткнется, возможно, в самый решающий час."
 sichuan_events.600.a: "Объединение было обеспечено идеалистической решимостью президента Чжана!"
 sichuan_events.600.b: "Сюн Кэу — меч победы нашего движения!"

 sichuan_events.601.t: "Жестокие реалии армии"
 sichuan_events.601.d: "В то время как Федеральная армия изначально состояла из коалиции сил милитаристов, правительственные реформы Чжана и впечатляющее количество удачи сохранили Федеральную армию в основном нетронутой во время Гражданской войны в Китае и Войны сопротивления против Японии. Однако с окончательным завершением объединения разрозненная армия наконец начала полностью разваливаться. Хотя президент Чжан Лань предложил военную демобилизацию, чтобы справиться с раздутыми вооруженными силами, он столкнулся с трудностями в убеждении военных согласиться с этим. Из-за высокой распространенности влияния милитаристов в его правительстве Чжан Лань обнаружил большие трудности в регулировании Федеральной армии.\n\nПремьер-министр Сюн Кэу, стремящийся воспользоваться кризисом, раскритиковал Президента за разрушение с трудом завоеванного единства Федерального правительства. С ростом напряженности между премьер-министром и президентом, которая наконец выплеснулась наружу, появились слухи о потенциальном перевороте, готовящемся недовольными военными офицерами, возможно, под руководством Лю Вэньхуэя. Лю со своей стороны воздержался от прямой критики Президента и занял более двойственную позицию в отношении кампании демобилизации. Для сторонних наблюдателей стало очевидным, что правительство Чжан Ланя и его большая коалиция стали несостоятельными."
 sichuan_events.601.a: "Сюн способен заставить Президента отложить демобилизацию."
 sichuan_events.601.b: "Президент Чжан твердо стоит против Премьер-министра."

 sichuan_events.602.t: "Калечащий экономический спад"
 sichuan_events.602.d: "В то время как Китай когда-то мог похвастаться одной из крупнейших экономик мира, Век унижения низвел нашу искалеченную нацию до одной из самых неразвитых экономик в мире. В то время как прибрежные регионы видели скромный рост во время гегемонии Чжили, аграрная глубинка оставалась в отсталом состоянии. Любые экономические реформы, предпринятые различными провинциальными милитаристами, видели, как тот небольшой прогресс, который существовал, уничтожался почти постоянным состоянием войны, в котором оказался Китай после краха Лиги в 1936 году, а Война сопротивления против Японской империи привела китайскую экономику в состояние гиперинфляции. Поскольку бумажные деньги быстро обесцениваются, люди начали использовать грубую систему бартера, пока правительство не сможет остановить развивающийся экономический кризис."
 sichuan_events.602.a: "Премьер Сюн расправляется с преступными бандами за накопление ресурсов."
 sichuan_events.602.b: "Президент Чжан вводит общественное распределение товаров."

 sichuan_events.603.t: "Национальное восстановление трещит по швам"
 sichuan_events.603.d: "Сычуаньское федеральное правительство было примечательно своим уровнем успеха в объединении Китая, несмотря на взаимную враждебность различных фракций в администрации Чжан Ланя. Грядущие выборы, объявленные Федеральным правительством, не помогли склеить трещащее по швам правительство. По мере усиления избирательной кампании партийность в администрации Чжан Ланя только возрастала.\n\nПрезидент, к удивлению многих, объявил о своем намерении баллотироваться на переизбрание. Этот шаг был встречен неоднозначной реакцией в Демократической лиге Китая, причем многие видные члены ДЛК критиковали этот шаг. Однако, не сумев договориться ни о каком другом подходящем кандидате, партия в основном поддержала президентскую кампанию Чжана.\n\nТем временем в лагере Великого республиканского альянса премьер Сюн в основном отстранился от активного управления, сосредоточившись на избирательной кампании. Поскольку Сюн по-прежнему отказывается баллотироваться в президенты, кампания ВРА сосредоточилась на создании имиджа. Понимая, что президентская гонка под его именем может быть омрачена восприятием её как вопиющего захвата власти, Сюн подтолкнул свою правую руку Дань Маосиня стать кандидатом в президенты от ВРА.\n\nВ Северном Китае Лю Вэньхуэй нашел удивительное количество сторонников, особенно среди бывших офицеров Бэйяна, которые видят в нем символ стабильного управления. Однако Лю Вэньхуэй до сих пор отказывался открыто баллотироваться в президенты, вместо этого надеясь стать военным министром победителя выборов, кем бы он ни оказался."
 sichuan_events.603.a: "Эти выборы ничего не решают!"
 sichuan_events.603.b: "Пусть победит сильнейший."

 sichuan_events.604.t: "Национальное восстановление спотыкается"
 sichuan_events.604.d: "С отношениями между президентом Чжан Ланем и премьер-министром Сюн Кэу на рекордно низком уровне, Правительство национального восстановления оказывается в уникально слабом положении. Поскольку Китай снова охвачен очередным политическим кризисом, возможно, [ROOT.GetLeader] предстоит собрать осколки, заявить свои права на Республику и спасти её от этой пестрой кучки ссорящихся глупцов.\n\n[ROOT.GetLeader] понимает риск восстания, но он также понимает, что лучшей возможности может никогда не представиться. Однако [ROOT.GetLeader] также знает, что вызов Федеральному правительству может быть расценен народом Китая как не более чем поступок эгоистичного милитариста, пытающегося снова ввергнуть нацию в хаос, и привести к тому, что его запомнят как одного из величайших злодеев нации на десять тысяч лет."
 sichuan_events.604.a: "[ROOT.GetLeader] — единственный человек, способный спасти Республику!"
 sichuan_events.604.b: "От этого ничего не выиграть."
 sichuan_events.604.c: "Это время исцеления, а не войны."

 sichuan_events.605.t: "[FROM.GetLeader] наносит удар!"
 sichuan_events.605.d: "С расколом между Великим республиканским альянсом Сюн Кэу и Демократической лигой Китая Чжан Ланя, растущим с каждым днем, распадающееся единство Правительства национального восстановления оставило амбициозным милитаристам и губернаторам небольшое окно возможностей для удара.\n\nДействительно, похоже, что [FROM.GetLeader], в частности, воспользовался возможностью, объявив, что внутренняя борьба президента Чжан Ланя и премьера Сюн Кэу является чумой для республиканского правительства, и провозгласил себя главой временного правительства, которое положит конец распрям в Китае."
 sichuan_events.605.a: "Что он вообще творит!?"
 sichuan_events.605.b: "Вот тебе и единство демократов."

 sichuan_events.610.t: "Отступление железного генерала"
 sichuan_events.610.d: "После длительного периода нарастания напряженности в Правительстве национального восстановления премьер-министр Сюн официально объявил о своем уходе из администрации Чжан Ланя. Вслед за этим ряд чиновников, связанных с Великим республиканским альянсом, также подали в отставку. Массовый уход оставил существенный вакуум власти в правительстве, и многие в Демократической лиге Китая пытаются заполнить вакантные должности. Возможно, в центре самых больших интриг в администрации Чжан Ланя находится пост премьера.\n\nПоскольку молчаливо подразумевалось, что следующий премьер-министр, вероятно, будет сохранен Чжаном после выборов, многие высокопоставленные члены ДЛК пытались выдвинуть свои имена в качестве потенциальных кандидатов. Среди них Чжан Цзюньмай, Хуан Яньпэй, Ло Лунцзи и Тан Хуалун были самыми популярными вариантами. Однако удивительным и противоречивым шагом Чжан Лань вместо этого выбрал Сянь Ина, своего земляка из Сычуани, своим премьер-министром. Восхождение Сянь Ина, давнего соратника и друга Президента, было истолковано многими как знак дальнейшей консолидации ДЛК под руководством её сычуаньских членов."
 sichuan_events.610.a: "Приветствуем премьера Сяня!"
 sichuan_events.610.b: "Не очень демократично для Демократической лиги."
 sichuan_events.610.c: "Мелочные глупцы с обеих сторон."

 sichuan_events.611.t: "Заглядывая под завесу"
 sichuan_events.611.d: "Демократическая лига Китая, хотя и сформированная вскоре после захвата Пекина Правительством национального восстановления, берет свое начало в Федерации китайских демократических партий. ФКДП, которая была сформирована различными либеральными, демократическими и прогрессивными элементами после победы Чжили над Фэнтяньской кликой, была организована для формирования демократической политической оппозиции Клике Чжили. ФКДП раскололась после восстания Лиги 1932 года, когда Цао Кунь отменил выборы 1933 года. Многие партии и общества, покинувшие ФКДП, оказались в Южном Китае и сплотились вокруг уже созданного федералистского движения. Хотя ДЛК состояла из различных консервативных, либеральных и социалистических элементов, под руководством Чжан Ланя она дрейфовала влево. Несмотря на это, ДЛК в значительной степени осталась нетронутой до сих пор благодаря непостижимой приверженности Чжан Ланя истинной демократии и его стойкой оппозиции всем формам авторитаризма. Председательство Чжан Ланя ознаменовалось отстаиванием автономии партий, участвующих в лиге, при одновременном подтверждении её целей достижения подлинной демократии."
 sichuan_events.611.a: "ДЛК приветствует всех, кто мечтает о Свободном Китае!"
 sichuan_events.611.b: "Не более чем сборище мечтателей."

 sichuan_events.612.t: "Роль лянгизма в Новом Китае"
 sichuan_events.612.d: "Во время амбициозных «Ста дней реформ» императора Гуансюя выше всех других реформистов стояли Кан Ювэй и Лян Цичао. Отстаивая идеи современной конституционной монархии, Кан и Лян были вынуждены бежать из Китая, когда вдовствующая императрица Цыси вместе с Юань Шикаем поместила Императора под домашний арест.\n\nВ то время как Кан оставался пылким роялистом до конца своей жизни, Лян пришел к осознанию того, что будущее Китая — за республикой, и поддерживал немецкую бисмарковскую идеологию государственного социализма. В истории Республики Лян и его ученики стали одними из самых влиятельных мыслителей, оспаривая более революционный бренд политики Сунь Ятсена.\n\nПолитический пик Ляна пришелся на правление Аньхойской клики, где он и Клика Исследований помогали формулировать политику развития и структуру партийного государства Анфу, прежде чем он поссорился с премьером Дуань Цижуем. В 20-е годы Лян дрейфовал влево, ненадолго увлекшись реформистскими направлениями социализма. Одним из последних политических шагов Ляна было создание Китайской конституционной партии, которую после его смерти возглавил Сюй Цинь.\n\nВ то время как ККП предварительно сотрудничала с Кликой Чжили до их реорганизации в ДКП, ученик Ляна Чжан Цзюньмай создал Демократическую социалистическую партию в Южном Китае в жесткой оппозиции Пекину. Хотя Младокитайская партия не является прямым политическим потомком Ляна, она также объявила его своим духовным лидером. Несмотря на то, что он считается противоречивой фигурой, мало кто будет отрицать его достижения в политическом развитии Китая."
 sichuan_events.612.a: "Слова Ляна продолжат вести Китай в будущее!"
 sichuan_events.612.b: "Лянгизм исчерпал себя."

 sichuan_events.613.t: "Чжан Цзюньмай оспаривает Чжан Ланя"
 sichuan_events.613.d: "Хотя президентская кампания Чжан Ланя на данный момент принята большинством в Демократической лиге Китая, остаются те, кто отказывается его поддерживать. Среди них Чжан Цзюньмай, лидер Демократической социалистической партии. Хотя оба мужчины заявляют, что следуют направлениям социализма, многие отмечают более консервативную позицию Чжан Цзюньмая и его напористую личность.\n\nЭгоистичный человек, непригодный для работы с другими, Чжан Цзюньмай сильно возмущался доминированием сычуаньских интеллектуалов в Лиге, считая их второстепенными игроками, которые поднялись так высоко только благодаря стечению обстоятельств. Призвав своих партийных союзников, а также другие лянгистские партии в Демократической конституционной партии и Младокитайской партии, Чжан объявил о своей собственной президентской кампании.\n\nОпираясь на ту же базу, Чжан Цзюньмай попытался перетянуть поддержку ДЛК от Чжан Ланя к себе, к разочарованию Президента. Внутренняя борьба между ДЛК и лянгистами сильно подорвала способность ДЛК функционировать. Воспользовавшись этим, Дань, Сюн и Великий республиканский альянс перехватили инициативу и теперь готовы доминировать в избирательном процессе, причем многие опасаются, что ВРА может зайти так далеко, что сфальсифицирует сами выборы, особенно среди Офицерского департамента Ли Цзяюя."
 sichuan_events.613.a: "Чжан Цзюньмай — подарок, который продолжает дарить."
 sichuan_events.613.b: "Чжан Цзюньмай с его гордостью и эго!"

 sichuan_events.614.t: "Выражение гаранта Китая"
 sichuan_events.614.d: "В условиях гражданской войны внутри Демократической лиги Китая, где Чжан Лань и Чжан Цзюньмай борются за лидерство, а Великий республиканский альянс готов одержать разгромную победу, и ходят слухи об их амбициях положить конец хрупкой демократии, Лю Вэньхуэй утвердил свое право как крупнейший и самый могущественный независимый милитарист в Правительстве национального восстановления.\n\nЛю призвал Великий республиканский альянс прекратить свои притязания на разрушение федеральной демократии, а Демократическую лигу Китая — не допустить, чтобы её внутренняя борьба вызвала гиперпартийность. Лю зловеще предупредил, что если этого не произойдет, то он применит силу для защиты демократических институтов и интересов китайского народа. Это привело к тревожной реакции общественности на возможность переворота Лю Вэньхуэя, в то время как чиновники в правительстве опасаются карьеристов и оппортунистов, которые могут воспользоваться потенциальным переворотом Лю Вэньхуэя, чтобы подняться на вершину китайского правительства."
 sichuan_events.614.a: "Чжан Лань усиливает свою кампанию против Чжан Цзюньмая."
 sichuan_events.614.b: "Сюн Кэу выбрасывает письмо Лю Вэньхуэя в мусор."

 sichuan_events.620.t: "Последний свет китайской демократии"
 sichuan_events.620.d: "По каким бы причинам это ни произошло — будь то то, что Республика воспламенилась гиперпартийностью, вызванной распрями в ДЛК, или то, что Великий республиканский альянс открыто планировал уничтожить китайскую демократию до того, как у нее появился шанс на жизнь, — похоже, что ни ДЛК, ни ВРА не окажутся победителями. За последние несколько часов солдаты Баодинского департамента и других армий милитаристов захватили стратегические объекты по всей стране и местные избирательные участки. Тем временем Лю Вэньхуэй лично руководил захватом президента Чжана, Кабинета, Сюн Кэу и Дань Маосиня. В общенациональном объявлении Лю заявил об отмене выборов. Лю также официально объявил о своем участии в выборах в промежуточный период, зная, что он по сути будет баллотироваться без конкурентов, так как все его реальные противники находятся под домашним арестом. Хотя это вопиющий захват власти, немногие, похоже, действительно готовы противостоять ему; многие либо боятся новой волны радикализма без вмешательства Лю, либо оказываются слишком апатичными, чтобы им было дело. Уже сейчас бывшие чиновники Чжили вышли из полуотставки, чтобы поддержать кандидатуру Лю, и, похоже, что разрушенный Бэйянский порядок снова утвердился."
 sichuan_events.620.a: "Pollice Compresso Favor Iudicabatur."

 sichuan_events.621.t: "Молот бьет по наковальне"
 sichuan_events.621.d: "По каким бы причинам это ни произошло — будь то то, что Республика воспламенилась страстями гиперпартийных склок, или то, что Республика оказалась поглощена волнами апатии, — похоже, что китайский эксперимент с демократией внезапно остановился. За последние несколько часов солдаты Баодинского департамента и других армий милитаристов захватили стратегические объекты по всей стране и главные правительственные здания в столице. Военный министр Лю Вэньхуэй, главный архитектор этого переворота, лично руководил захватом Президента, его Кабинета и ведущей оппозиции.\n\nОчень немногие фигуры открыто выступили против переворота Лю благодаря его тщательному политиканству за кулисами и в его должности в кабинете. Сумев добиться консенсуса, когда немногие несогласные были быстро подавлены групповым давлением, Лю был быстро приведен к присяге в качестве президента. Удивительно популярный в народе, президент Лю сумел выстроить свою собственную политическую машину как форму «Демократии твердой руки». Призывая к поддержке дворянство, крестьян, военных, Лю быстро приобрел репутацию человека из народа, который действовал решительно, чтобы спасти Республику."
 sichuan_events.621.a: "Таким образом, Лю представляет голос народа."

 sichuan_events.630.t: "Старый порядок"
 sichuan_events.630.d: "Хотя он всегда стремился соответствовать действиям идеалистов вокруг него, Лю Вэньхуэй чаще всего обнаруживал, что действует из прагматизма и оппортунизма, чем ему хотелось бы. Оппортунизм всегда был проблемой для Китая в глазах Лю, и даже когда новое правительство приходит к власти, как и многие до него, он не может не чувствовать легкого разочарования. Разве Юань Шикай не пытался захватить власть из оппортунизма? Разве действия коварных милитаристов не проистекали из того же самого места? Даже в его собственных рядах, разве его армия не сокращалась и не раздувалась в зависимости от удачи самого Лю?\n\nПоскольку Общество гражданского управления и прогресса разворачивает свои попытки реформ, Лю беспомощно наблюдает, как его коллеги работают, чтобы помешать его более прогрессивной политике, несмотря на его величайшие усилия. В Чэнду, за тысячи миль от столицы, на стол Лю попадают доклады и петиции, в которых подробно описываются речи Дэна, открыто осуждающие неэффективность демократии, назначение старых деспотичных лакеев на провинциальные посты и, конечно, гнусные махинации Лю Вэньцая.\n\nТем не менее, Лю неустанно работал, чтобы ответить на опасения своих многочисленных критиков и сгладить напряженность с оппозицией, часто преследуемой приспешниками Лю, которые используют свои новые статусы, чтобы действовать безнаказанно и душить зарождающийся демократический аппарат. Но, возможно, это просто явление, наблюдаемое в первые дни любой администрации, всё это осядет, как пыль после весеннего дождя. Важно наблюдать за путем впереди, стремиться вперед среди трудностей, ставить амбициозные цели и, прежде всего, усердно работать во всем. Лю может не быть идеальным человеком или даже идеалистом, как многие в федералистском движении, но его убеждение остается убеждением патриота, того, кто хранит дух Ноябрьских восстаний и Китая. Хотя Китай может никогда не освободиться от социальной целесообразности, и те, кто действует в личных интересах, всегда будут плести интриги в тени, пессимизм никогда не будет решением."
 sichuan_events.630.a: "Нации нужны строители, а не просто критики."

 sichuan_events.631.t: "Демократия вечно в памяти"
 sichuan_events.631.d: "Путь к федерализму из Сычуани, безусловно, не был легким, постоянно подвергаясь преследованиям и предательствам в, казалось бы, бесконечной провинциальной борьбе, поскольку местные автократы регулярно превосходили их численностью. Часто изгоняемые из своей родной провинции, Сюн и его люди выживали только благодаря доброте своих республиканских братьев, хотя даже это не обходилось без собственных разногласий. Но посмотрите, как далеко они зашли — последнее мерцающее пламя федералистской мечты, которое не было затоптано, несмотря на время.\n\nТеперь факел передан Дань Маосиню, новому лицу на политической сцене, но тем не менее ветерану республиканской борьбы, который был товарищем Сюн Кэу с конца 1910-х годов. Благодаря своему наследию сторонника гражданской дискуссии и беспартийного единства, его отношения с независимыми республиканцами, Кликой Политической Науки и умеренными членами оппозиции снискали ему большую похвалу как «человека слова», в котором Китай так отчаянно нуждался после десятилетий деспотического или фрагментированного правления. Однако Китай всё ещё новичок в этой системе, и смогут ли Дань и его кабинет предотвратить эксцессы левых радикалов, консервативных подрывников и крах коалиции по своей собственной вине — пока неизвестно. Демократия, как в местном, так и в национальном масштабе, ещё не полностью реализована на отдаленных рубежах, поскольку оставшиеся местные диктаторы пытаются консолидировать контроль, а те, кто выступает за немедленные действия, воздерживаются или действуют против системы.\n\nКонечно, текущие методы всё ещё показывают перспективы, и федералистская структура может стать способом управления Китаем на века вперед, иначе она просто будет такой же мимолетной, как и другие попытки Китая установить демократию или даже провести демократические реформы. Компромисс трудно поддерживать, и коалиции неизбежно будут меняться, но именно разногласия делают такую систему столь значимой, являясь неотъемлемой частью такого открытого рынка идей и мнений."
 sichuan_events.631.a: "Наши идеалы — это то, за что мы должны продолжать бороться."

 sichuan_events.632.t: "Доброжелательность и праведность"
 sichuan_events.632.d: "С болезненных дней Цин и последовавшей раздробленной республики многие на Западе считали Китай отсталой нацией, потерянной в тисках междоусобиц и деспотизма. Конечно, в некоторых отношениях это звучало правдиво, и нигде больше, чем в Сычуани, самой раздираемой местными милитаристами на протяжении десятилетий. Через такую борьбу Чжан Лань видел всё: истощенных крестьян, задавленных налогами, немногих бизнесменов, покидающих провинцию ради более процветающих возможностей на Востоке, и, конечно, различных военных, сражавшихся друг с другом взад и вперед по всему Красному бассейну.\n\nПройдя через политический ландшафт Китая и лично приведя современное федералистское движение к национальной известности, Чжан осознал необходимость не только западных идей — демократии для всех, свободы мысли и интеллектуальной независимости, — но и необходимость добродетелей, отстаиваемых китайскими философами много тысячелетий назад. Первая — это идея доброжелательности, которой, по мнению Чжана, не хватало многим предыдущим лидерам республики; несмотря на то, что они были хитрыми, умными и смелыми, они не завоевали сердца людей и не работали в интересах масс. Но, конечно, одна лишь доброжелательность часто была ошибочной в Китае: спотыкающаяся бюрократия Бэйяна, революционный фанатизм Гоминьдана и популизм милитаристов — все утверждали, что действуют ради грандиозной цели Национального спасения, но не смогли действовать достаточно твердо, справедливо и честно, чтобы завоевать людей. Демократическая лига Китая, однако, является кульминацией обеих этих идей, стоя на стороне нации, стремясь к единству, одновременно спасая страну и строя её заново, пока она марширует в новый век.\n\nКонечно, даже когда пушки умолкают по всему Китаю, и люди готовятся к плодам грядущей демократии, Чжан и его коллеги остаются всегда бдительными к различным силам, стремящимся отнять свободу действий у масс. Для Чжана этот энтузиазм должен продолжать использоваться, обуздываться и взращиваться массами, потому что что такое реформа, если не собственная устойчивая революция?"
 sichuan_events.632.a: "Мы будем упорствовать безжалостно! Мы никогда не уступим!"

