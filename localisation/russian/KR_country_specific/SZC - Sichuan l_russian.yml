 SZC_federal_governmental_legitimacy_democratic_reconstruction: "Последний оплот китайского федерализма: §SДемократическая реконструкция§!"
 SZC_federal_governmental_legitimacy_democratic_reconstruction_desc: "Современный китайский федералист поднимался и падал в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику, получили некоторую поддержку, но после многообещающего начала были отвергнуты как северным, так и южным правительствами. Успешное объединение силой со стороны Чжили дискредитировало движение, и многие стали ассоциировать его не более чем с прикрытием для милитаризма.\n\nКитай — нация рабочих, крестьян и интеллектуалов; построить гражданскую демократию на рабочих местах для масс — задача не из легких. Каждый человек требует своих особых нужд, и нация требует, чтобы она могла осуществлять свои Четыре гражданских права. Выполняя принципы самоуправления, развития производства и улучшения жизни крестьян и рабочих, продвижения национальной культуры Китая и развития его научного духа, надеются, что нация продвинется к демократическому идеалу."

 SZC_federal_governmental_legitimacy_democracys_five_spirits: "Последний оплот китайского федерализма: §gПять духов демократии§!"
 SZC_federal_governmental_legitimacy_democracys_five_spirits_desc: "Современный китайский федералист поднимался и падал в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику, получили некоторую поддержку, но после многообещающего начала были отвергнуты как северным, так и южным правительствами. Успешное объединение силой со стороны Чжили дискредитировало движение, и многие стали ассоциировать его не более чем с прикрытием для милитаризма.\n\nПодобно тому, как Современность сохраняет свои Пять духов Науки, Выносливости, Стремления, Лояльности и Общественного долга, и Исследований, у Демократии тоже есть свои Пять духов. Это Разделение правительственной власти, Обеспечение свобод, Защита прав, Промышленное здоровье и Культивирование. Китай явно стремится достичь как Демократии, так и Современности, но нельзя иметь первое без второго, а Китаю крайне не хватает Современности. Пока он не достигнет уровня современного индустриального национального государства, о демократии нации нужно заботиться, планируя ее под эгидой Гражданского управления и прогресса."

 SZC_federal_governmental_legitimacy_institutional_antipartisanship: "Последний оплот китайского федерализма: §lИнституциональная беспартийность§!"
 SZC_federal_governmental_legitimacy_institutional_antipartisanship_desc: "Современный китайский федералист поднимался и падал в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику, получили некоторую поддержку, но после многообещающего начала были отвергнуты как северным, так и южным правительствами. Успешное объединение силой со стороны Чжили дискредитировало движение, и многие стали ассоциировать его не более чем с прикрытием для милитаризма.\n\nКрайне необходимо, чтобы нация вышла за рамки своего раздробленного прошлого Эры милитаристов и перешла к новым начинаниям. Мир прогрессировал, пока Китай разрывал себя на части, и многое предстоит сделать, чтобы Срединное царство соответствовало темпам своих собратьев — национальных государств. Теперь нация должна сосредоточиться на себе и на своем собственном развитии, и через Сближение и Диалог институты нации должны быть выше мелких политических дрязг; это утверждение нового Китая, нации для всех слоев общества."

 SZC_martialing_of_the_vindicated: "Сбор оправданных"
 SZC_martialing_of_the_vindicated_desc: "Китай вглядывается в бездну, и она смотрит в ответ. Китайский федерализм, давно миновавший расцвет 1920-х годов, остался без корней, завещанный своему самому неожиданному сыну: Сюн Кэу. Выйдя из своей лачуги в Тунжэне в Гуйчжоу, амбициозный генерал поставил своей миссией обеспечить один последний окончательный триумф там, где его товарищи потерпели неудачу или иное. Присоединившись в значительной степени к ситуативным союзникам в департаментах Баодин и Офицерском, и в конечном счете управляемая Демократами третьей силы, военная рука китайского федерализма в значительной степени сформировалась из дисциплинированных и суровых солдат внутренних районов страны."

 SZC_industrial_autonomy: "Промышленная автономия"
 SZC_industrial_autonomy_desc: "Если Китай хочет твердо стоять на ногах, нация не может допустить, чтобы ее уже производящие местные отрасли загонялись в какие-то национальные конгломераты и монополии. Провинциальная единица священна, и поэтому их отраслям должна быть предоставлена автономия от национального правительства для ведения бизнеса и развития на своих собственных условиях, по крайней мере, с соблюдением необходимых положений для рабочих."

 SZC_start_of_the_golden_decade: "Начало золотых десятилетий"
 SZC_start_of_the_golden_decade_desc: "Нация на подъеме! С получением страной некоторой гарантированной стабильности после краха Чжили инвесторы начали возвращаться толпами, надеясь заработать на быстро развивающемся китайском рынке. С его богатыми природными ресурсами, огромным населением и умным управлением Китай обязательно станет следующей величайшей державой мира, пока продолжается рост."

 SZC_obscurations_on_military_loyalties_1: "Неясности в военной лояльности"
 SZC_obscurations_on_military_loyalties_1_desc: "То, что следовало предвидеть, в конечном итоге поразило Правительство национального восстановления как худшее предательство. Связанное обещаниями национальной демобилизации, но пытающееся навязать такой порядок под де-юре поддерживаемой милитаристами стратократией под поверхностью, Правительство обнаружило, что полностью сомневается даже в лояльности собственных сил. Обязанная больше своим местным командирам, чем Президенту, национальная армия полностью раздроблена на фракции и не подлежит восстановлению, и потребуются серьезные усилия, чтобы исправить такую пародию."

 SZC_nonsensical_economic_situation_1: "Бессмысленная экономическая ситуация"
 SZC_nonsensical_economic_situation_1_desc: "Вряд ли в этом можно винить Правительство, но экономическая ситуация в Китае, за неимением лучшей формулировки, ужасна. Разрушенная годами бесхозяйственности, возможно, даже восходящей к Цин, последующие десятилетия гражданских беспорядков, войн и иностранной эксплуатации, безусловно, не принесли пользы китайским массам. С бегством инвесторов после войны с Японией и нацией, опустошенной более чем когда-либо, экономическая ситуация в Китае плачевна, и, как всегда, люди ждут помощи от Центрального правительства."

 SZC_increasing_political_instability_1: "Растущая политическая нестабильность"
 SZC_increasing_political_instability_1_desc: "Что лучше: сдержать свои обещания ценой больших потерь для себя? Или предать своих товарищей ради сохранения стабильности? Для Правительства национального восстановления это первое. Пообещав национальные выборы после объединения нации и выполнения своей миссии, Правительство начало разрывать себя на части; уже будучи крайне дезорганизованным и нестабильным. Бывшие союзники теперь должны противостоять друг другу, готовясь к политической дуэли за управление страной, в то время как силы собираются в тени, готовясь «вмешаться», чтобы защитить нацию от ее собственных лидеров, если это необходимо."

 SZC_no_preparation_too_rigorous_idea: "Никакая подготовка не бывает слишком тщательной!"
 SZC_no_preparation_too_rigorous_idea_desc: "Мы зашли так далеко в нашем стремлении к объединению, и с нашими взглядами, устремленными на Северо-Восток и другие владения Японии, война с Империей Восходящего Солнца кажется почти неизбежной. Но мы будем готовы! Каждый человек должен быть готов отдать все ради нашей победы, и Китай больше не будет подавляться Японией, как это было с 1895 года!"

 SZC_the_chinese_determination_idea: "Китайская решимость"
 SZC_the_chinese_determination_idea_desc: "Конечно, судьба китайской нации и наше будущее могут быть сформированы только нашей решимостью — нашей готовностью работать, сражаться, сопротивляться и процветать. Когда наша нация призовет нас, мы ответим не только за нее, но и за братьев и сестер, с которыми мы стоим плечом к плечу!"

 SZC_republic_of_china_navy_federalists: "Военно-морской флот Китайской Республики"
 SZC_republic_of_china_navy_federalists_desc: "Предшественник современного китайского республиканского флота восходит к ранним дням Синьхайской революции, когда во Временном правительстве Китайской Республики было сформировано Министерство военно-морского флота. Бывший адмирал династии Цин Лю Гуаньсюн стал первым министром военно-морского флота в этот бурный период. После Эры милитаристов и последующей реставрации Сюаньтуна многие элементы Военно-морского флота Китайской Республики бежали на юг в оплоты Гоминьдана и федералистов, в то время как многие другие предпочли остаться верными правительству в Пекине. Когда китайская страна, наконец, номинально объединена под одним знаменем, снова пришло время возродить и восстановить Военно-морской флот Китайской Республики, чтобы он был действительно достоин защиты великих морских интересов Китая."

 SZC_republic_of_china_air_force_federalists: "Военно-воздушные силы Китайской Республики"
 SZC_republic_of_china_air_force_federalists_desc: "Хотя первоначальные воздушные операции начались с аэродрома Наньюань в Пекине династии Цин, Военно-воздушные силы Китайской Республики обязаны своим происхождением различным независимым воздушным программам, предложенным и пропагандируемым местными милитаристами и Центральным правительством. С нашей промышленной и военной мощью, более сильной, чем когда-либо прежде, на нас теперь возложена задача продолжить наследие, оставленное теми, кто был до нас, и создать по-настоящему мощные и современные военно-воздушные силы для китайского народа."

 SZC_rectifying_economic_disaster: "Исправление экономической катастрофы"
 SZC_rectifying_economic_disaster_desc: "Сычуань знала мир лишь мимолетно и эпизодически с момента Синьхая до настоящего времени, но она снова вступила в мир, надеясь, в достаточно надежных руках, чтобы не скатиться дальше в хаос. Наши приоритеты теперь могут и должны быть обращены к ухудшающемуся социально-экономическому положению людей этой провинции, даруя им путь к процветанию и изобилию, который мы обещали так долго."

 SZC_abolishing_abominable_tax_practices: "Отмена отвратительных налоговых практик"
 SZC_abolishing_abominable_tax_practices_desc: "Заметной особенностью милитаристской схватки в Сычуани были непомерные налоги, не только на множество вещей, но и собираемые заранее, чтобы удовлетворить волатильные денежные требования, финансировавшие армии милитаристов в Красном бассейне. Но мы посмотрим на вещи иначе, регулируя эти налоги и находя другие источники дохода, чтобы народ мог быть освобожден от такого огромного бремени."

 SZC_on_the_great_campaign: "В великом походе"
 SZC_on_the_great_campaign_desc: "Как последняя надежда федералистского движения, будет правильным, если мы переключим наше внимание на реализацию нашего истинного потенциала и подготовимся к выходу за пределы наших границ против сил чистого деспотизма, которые вполне могут уничтожить нас первыми."

 SZC_flourishing_academic_scene: "Процветающая академическая сфера"
 SZC_flourishing_academic_scene_desc: "Академические профессионалы и студенты, особенно в Сычуани и заброшенных западных провинциях, долгое время оставались в стороне в пользу более насущных проблем. Но благодаря нашим шагам по поддержке как студентов, так и учителей в последнее время, наши реформы оказались весьма успешными, поскольку сегодняшняя молодежь формируется в экспертов завтрашнего дня."

 SZC_fighting_societal_apathy: "Борьба с общественной апатией"
 SZC_fighting_societal_apathy_desc: "По всему Китаю, но особенно заметно в Сычуани, население, вечно занятое более насущными вопросами выживания, имело мало времени заботиться о более широком движении политики. Эту апатию необходимо искоренить на корню, так как истинная демократия не может надеяться выжить, если ее с самого начала атакует бесконечный цинизм общества."

 SZC_establishing_bicameral_legislation: "Установление двухпалатного законодательства"
 SZC_establishing_bicameral_legislation_desc: "Теперь, когда правительство, оппозиция и различные другие гражданские группы организуются, надлежащие детали законодательного органа также должны быть урегулированы. Предложение Чжан Ланя о двухпалатном законодательном органе стало моделью, единогласно согласованной, и, таким образом, так будет вестись вся политика, пока существуют эти демократические институты."

 SZC_cemented_delegation_of_powers: "Закрепленное делегирование полномочий"
 SZC_cemented_delegation_of_powers_desc: "Наряду с определением структуры законодательного органа и будущей администрации, мы должны предпринять шаги, чтобы естественным образом гарантировать наличие адекватных сдержек и противовесов, чтобы освободить нас из тисков автократии в будущем."

 SZC_seeing_to_domestic_student_demands: "Внимание к требованиям отечественных студентов"
 SZC_seeing_to_domestic_student_demands_desc: "Особенно в более республиканских движениях как Гоминьдана, так и федералистов, студенческие массы долгое время были одновременно поддерживающей силой и главным авангардом. Как таковые, мы должны попытаться удовлетворить некоторые из их требований взамен, хотя мы также должны попытаться прийти к компромиссу в более радикальных областях."

 SZC_two_lius_war: "Война двух Лю"
 SZC_aggressive_modernisation: "Ускоренная модернизация"
 SZC_industrial_army: "Ускоренное развитие армии"

 SZC_legitimacy_of_the_republic: "Легитимность Республики: §oУныние§!"
 SZC_legitimacy_of_the_republic_desc: "О, ирония всего этого. Будучи первоначально провозглашенной с согласия вдовствующей императрицы Лунъюй от имени мальчика-императора Пу И, Бэйянская республика была образована в 1912 году после кровавой борьбы и жертв легионов мучеников за искоренение монархии. Переполненные надеждой и оптимизмом, люди шли вперед под знаменами реформаторов и революционеров, переживая великое уравнение и плюрализацию новой, молодой и податливой республики. И все же все это было потушено махинациями деспота. Разорванная на части силачами и милитаристами, Бэйянская республика была не чем иным, как коррумпированным, некомпетентным инструментом, поднимаемым любой кликой милитаристов, контролировавшей Пекин в то время. Кабинеты держались месяцами, правительственная система менялась семь раз за все свое существование, и, несмотря на все это, все еще было чувство надежды.\n\nИзгнанные со своего законного места в Пекине, истеблишмент Бэйяна и клика Чжили были запуганы в изгнание с дружественными союзниками в Сычуани. Однако это, возможно, одна из многих ошибок, на которые пошли роялисты. Под эгидой маршала Ван Чэнбиня Чжили восстановились, и с ними наследие Синьхайской революции продолжает жить. И все же простой народ, простые массы и некоторые из наших отчужденных союзников сомневаются, насколько искренни наши чувства. Учитывая, что Чжили отбросили Республику, когда это было удобно, многие считают наш проект по созданию национального государства фикцией. Хотя они ошибаются, ибо единственное, что на уме у Маршала, — это месть."

 SZC_legitimacy_of_the_republic_1: "Легитимность Республики: §rБезнадежно§!"
 SZC_legitimacy_of_the_republic_1_desc: "$SZC_legitimacy_of_the_republic_desc$"

 SZC_legitimacy_of_the_republic_2: "Легитимность Республики: §RУбежище в захолустье§!"
 SZC_legitimacy_of_the_republic_2_desc: "$SZC_legitimacy_of_the_republic_desc$"

 SZC_legitimacy_of_the_republic_3: "Легитимность Республики: §CРастет§!"
 SZC_legitimacy_of_the_republic_3_desc: "$SZC_legitimacy_of_the_republic_desc$"

 SZC_legitimacy_of_the_republic_4_civilian: "Легитимность Республики: §lНовый Бэйян§!"
 SZC_legitimacy_of_the_republic_4_civilian_desc: "О, ирония всего этого. Будучи первоначально провозглашенной с согласия вдовствующей императрицы Лунъюй от имени мальчика-императора Пу И, Бэйянская республика была образована в 1912 году после кровавой борьбы и жертв легионов мучеников за искоренение монархии. Переполненные надеждой и оптимизмом, люди шли вперед под знаменами реформаторов и революционеров, переживая великое уравнение и плюрализацию новой, молодой и податливой республики. И все же все это было потушено махинациями деспота. Разорванная на части силачами и милитаристами, Бэйянская республика была не чем иным, как коррумпированным, некомпетентным инструментом, поднимаемым любой кликой милитаристов, контролировавшей Пекин в то время. Кабинеты держались месяцами, правительственная система менялась семь раз за все свое существование, и, несмотря на все это, все еще было чувство надежды.\n\nПоистине, политики Бэйяна — единственные способные люди обеспечить хорошее управление. Под их бдительным оком технократическая администрация работает все больше, поддерживая шестеренки политики и управления. Под их светом сходит новая, реформированная Республика. Та, что претендует на наследие политического порядка Синьхая, да, но та, что увидела его преобразованным в новую, по-настоящему усердную машину. Республика, не контролируемая милитаристами или полевыми командирами, а работающая с ними рука об руку."

 SZC_legitimacy_of_the_republic_4_military: "Легитимность Республики: §gПод началом Маршала§!"
 SZC_legitimacy_of_the_republic_4_military_desc: "О, ирония всего этого. Будучи первоначально провозглашенной с согласия вдовствующей императрицы Лунъюй от имени мальчика-императора Пу И, Бэйянская республика была образована в 1912 году после кровавой борьбы и жертв легионов мучеников за искоренение монархии. Переполненные надеждой и оптимизмом, люди шли вперед под знаменами реформаторов и революционеров, переживая великое уравнение и плюрализацию новой, молодой и податливой республики. И все же все это было потушено махинациями деспота. Разорванная на части силачами и милитаристами, Бэйянская республика была не чем иным, как коррумпированным, некомпетентным инструментом, поднимаемым любой кликой милитаристов, контролировавшей Пекин в то время. Кабинеты держались месяцами, правительственная система менялась семь раз за все свое существование, и, несмотря на все это, все еще было чувство надежды.\n\nО, великий Маршал Тяньцзиня! Его превосходное руководство видело Бэйянскую республику тщательно подготовленной к предстоящим испытаниям. Без него это был бы лишь шатающийся труп, ковыляющий вперед в ожидании своего исчезновения. С нашими закаленными солдатами, их яростными сердцами и глазами Маршала, устремленными на Пекин, ничто не встанет на нашем пути к грандиозному возвращению позиций Чжили в нации. Нефритовый Маршал вполне может с тревогой взирать на Чжили, но бремя лидерства теперь возложено на плечи Вана."

 SZC_legitimacy_of_the_republic_5_civilian: "Легитимность Республики: §9На светлом горизонте§!"
 SZC_legitimacy_of_the_republic_5_civilian_desc: "О, ирония всего этого. Будучи первоначально провозглашенной с согласия вдовствующей императрицы Лунъюй от имени мальчика-императора Пу И, Бэйянская республика была образована в 1912 году после кровавой борьбы и жертв легионов мучеников за искоренение монархии. Переполненные надеждой и оптимизмом, люди шли вперед под знаменами реформаторов и революционеров, переживая великое уравнение и плюрализацию новой, молодой и податливой республики. И все же все это было потушено махинациями деспота. Разорванная на части силачами и милитаристами, Бэйянская республика была не чем иным, как коррумпированным, некомпетентным инструментом, поднимаемым любой кликой милитаристов, контролировавшей Пекин в то время. Кабинеты держались месяцами, правительственная система менялась семь раз за все свое существование, и, несмотря на все это, все еще было чувство надежды.\n\nРуководство всегда надежного Янь Хуэйцина видело, как политический порядок Синьхая процветает и преуспевает в свете своей первоначальной огромной неудачи. Исполняя свой долг перед нацией всегда покорно, раз за разом, он сумел успешно построить нацию из обломков Маньчжурского переворота. Пять рас в едином союзе, это наследие национальной гордости, патриотизма и объединения, оно будет вечно реять с национальной гордостью! Новая надежда и оптимизм наконец приходят к китайскому народу. «Как ярко Благовещее Облако! Как широк блеск! Свет великолепен с солнцем или луной. Как он возрождается рассвет за рассветом!»"

 SZC_legitimacy_of_the_republic_5_military: "Легитимность Республики: §6Тяньцзиньская демократия§!"
 SZC_legitimacy_of_the_republic_5_military_desc: "О, ирония всего этого. Будучи первоначально провозглашенной с согласия вдовствующей императрицы Лунъюй от имени мальчика-императора Пу И, Бэйянская республика была образована в 1912 году после кровавой борьбы и жертв легионов мучеников за искоренение монархии. Переполненные надеждой и оптимизмом, люди шли вперед под знаменами реформаторов и революционеров, переживая великое уравнение и плюрализацию новой, молодой и податливой республики. И все же все это было потушено махинациями деспота. Разорванная на части силачами и милитаристами, Бэйянская республика была не чем иным, как коррумпированным, некомпетентным инструментом, поднимаемым любой кликой милитаристов, контролировавшей Пекин в то время. Кабинеты держались месяцами, правительственная система менялась семь раз за все свое существование, и, несмотря на все это, все еще было чувство надежды.\n\nНаконец он сделал это. После борьбы, великих многолетних испытаний, непрерывных трудностей, великий, великолепный Маршал Тяньцзиня проследил за восстановлением Бэйянской республики и объединением нации! В то время как многие опасались, что он будет всего лишь продолжением военных деспотов, которые играли с институтами Республики с момента ее создания, Маршал не претендует на собственное превосходство над Республикой. С завершением его миссии и стабилизацией нации может начать развиваться новая эра демократии в Китае. Под его бдительным оком, конечно."

 SZC_all_for_the_reconquest: "Все для реконкисты!"
 SZC_all_for_the_reconquest_desc: "Если мы хотим когда-нибудь снова увидеть наш прекрасный Пекин, мы должны прежде всего посвятить каждый ресурс, имеющийся в Сычуани, нашей великой и славной кампании. Ибо возвращение нашей славной Республики — это трудная задача, требующая абсолютного максимума от каждого китайского патриота на наших землях. Чего бы это ни стоило."

 SZC_assistance_of_the_german_giant: "Помощь немецкого гиганта"
 SZC_assistance_of_the_german_giant_desc: "Последний оплот процветания Чжили, провинция Сычуань, далека от того, чтобы быть устойчивым домом для институтов Республики или ее дорогой и современной военной руки. Используя наши скрытые контакты в немецких легациях, предполагая, что они не сожгли все мосты, мы пригласили ряд военно-промышленных производителей для создания новых фабрик ускоренного типа на нашей базе. С этим есть надежда, что возвращение нашей законной земли наступит достаточно скоро."

 SZC_increasing_pluralisation: "Растущая плюрализация"
 SZC_increasing_pluralisation_desc: "После того, как мы разрешили дальнейшее политическое участие в ассамблее в изгнании, похоже, что люди начали политизироваться, поддавшись мудрым словам наших политиков. Обеспечивая столь необходимую легитимность и стабильность аппарату нашего правительства, это также привело к росту народной поддержки оппозиционных партий в остатках Ассамблеи."

 SZC_legacy_of_baoding_and_luoyang_idea: "Наследие Баодина и Лояна"
 SZC_legacy_of_baoding_and_luoyang_idea_desc: "Клики Баодина и Лояна, ныне функционально вымершие из-за обезглавливания их руководства, несли с собой строгий и искренний дух милитаристов, превращающихся в политиков. Отказавшись от сабли и винтовки ради костюма и галстука, они были всерьез китайскими государственными деятелями. Прерванная ужасным государственным переворотом, их миссия искренней государственной деятельности легла на плечи Тяньцзиньской клики и остатков других, наряду с кликой бюрократов Бэйяна."

 SZC_embracing_meritocracy: "Принятие меритократии"
 SZC_embracing_meritocracy_desc: "Возможно, одна из наших величайших глупостей — это сеть патронажа Чжили. Замкнутая ассоциация непотических отношений, замаскированная под добрые конфуцианские практики, привела к тому, что верховное командование становится все более изолированным, а низшая часть офицеров — недовольной. Многие из этих офицеров помогали маньчжурам в перевороте в надежде получить должное повышение. Чтобы по-настоящему реформироваться, это должна быть не только политика, но и структура армии."

 SZC_expertise_of_the_military: "Экспертиза военных"
 SZC_expertise_of_the_military_desc: "Наша армия прошлого была чудотворцем. Под прикрытием военного гения Нефритового Маршала она выполняла немыслимые задачи и совершала подвиги, которые были почти невозможны. Конечно, отчасти это было благодаря военному гению У Пэйфу. Хотя маршал Ван, безусловно, не дурак, он и не Бог Войны. Чтобы добиться успеха, мы должны пересмотреть наши доктрины для всех аспектов ведения войны."

 SZC_cao_kun_constitution: "Конституция Цао Куня 1923 года"
 SZC_cao_kun_constitution_desc: "Замечательный образец прогрессивного законодательства, Конституция Цао Куня 1923 года, возможно, представляет собой пик бэйянского идеализма и надежды на достоинства клики Чжили. В конечном итоге получив плюралистическую поддержку большинства Северных ассамблейщиков того времени, конституция Цао Куня ознаменовала собой значительную попытку формализовать надлежащее управление в Бэйянской республике после бурной эпохи вопиющих злоупотреблений Дуань Цижуя и его клуба Аньфу. Стремясь создать структурированное, организованное и централизованное правительство, она наделяет Президента значительной исполнительной властью. Однако она содержит замечательные компоненты, такие как четкое разделение властей и изложение ясных гражданских прав китайского народа. К сожалению, ее внедрение десять лет назад было омрачено обвинениями в коррупции и автократии, поскольку оно проводилось примерно в то же время, когда завершился скандал со взяточничеством Цао. И все же ее повторное внедрение в эту новую эпоху хаоса сигнализирует о еще одной попытке быстро стабилизировать политическую ситуацию. Изобилуя потенциальными лазейками для злоупотреблений исполнительной власти, в настоящее время нужно просто верить в институты, чтобы действительно выражать волю народа."

 SZC_providing_bread_and_circuses: "Предоставление хлеба и зрелищ"
 SZC_providing_bread_and_circuses_desc: "Чтобы по-настоящему завоевать сердца людей, было бы неразумно бросать в них бессмысленные концепции «реформ». Ибо люди не желают реформ в данный момент. Им нужна еда, кров, вода и приятная жизнь. Поэтому вековая метонимическая фраза точно применима к нашей ситуации. Настоящая реформа может подождать возобновления хорошего управления в Пекине."

 SZC_embracing_militarism: "Принятие милитаризма"
 SZC_embracing_militarism_desc: "Для нашего собственного национального спасения требуется участие боевого духа каждого гражданина для наблюдения за возрождением милитаристского национального государства. Под эгидой генерала Цзян Байли народ переживает возрождение своего собственного бусидо, своей способности к самопожертвованию ради мотивов высшей цели. Больше, чем индивидуум, мы должны вернуть дух нации."

 SZC_legacy_of_the_academies: "Наследие академий"
 SZC_legacy_of_the_academies_desc: "Лишенные Баодина, лишенные Куньмина, милитаристы остались без самых колыбелей своих клик. Тем не менее, мы должны продолжать, с их опытом или без него. Ибо большинство наших офицеров и командиров являются потомками боевого духа, призванного в таких учреждениях, и мы были бы прокляты, если бы забыли о своем происхождении сейчас."

 SZC_dawn_of_the_final_offensive: "Рассвет последнего наступления"
 SZC_dawn_of_the_final_offensive_desc: "Он настал! Час суда! Истинное испытание наших новых, реформированных возможностей! Настало время великой борьбы, ибо наши враги властвуют над нашей законной национальной столицей, и если мы потерпим неудачу, клика Чжили, какой мы ее знаем, погибнет. Бэйянская республика не задерживается под эгидой этого вероломного Старого Маршала, а под Маршалом Тяньцзиня! Чжунхуа Миньго Ваньсуй!"

 SZC_old_hope_and_glory: "Старая надежда и слава"
 SZC_old_hope_and_glory_desc: "Наши люди устают, их боевой дух падает, наши заводы останавливаются, а наши рабочие жалуются. Абсолютное посвящение каждого управляемого ресурса нашей полной победе обошлось неоправданно дорого. Хотя со временем это уйдет, напряжение, слезы, они остаются с нашей нацией, просачиваясь в ее землю. Остается только надеяться, что жертвы того стоили."

 SZC_hundred_years_war_of_resistance: "Столетняя война сопротивления"
 SZC_hundred_years_war_of_resistance_desc: "Захватчики смеют посягать на нашу территорию! Иностранные империалисты, подлые японцы! Они прибыли, чтобы наконец захватить и уничтожить нашу нацию в войне за национальное выживание! Каждый мужчина, женщина и ребенок должны по-настоящему посвятить себя телом и духом сохранению тысячелетней цивилизации Китая, ибо мы должны доказать японцам, что мы можем вести Столетнюю войну сопротивления!"

 SZC_sounding_the_bugles_of_victory: "Звуки горнов победы"
 SZC_sounding_the_bugles_of_victory_desc: "Наконец-то мы сделали это! Грандиозное возвращение законного положения клики Чжили в китайском национальном государстве. Больше нас не заставят сосуществовать с вероломными монархистами, больше мы не склонимся ни перед какой иностранной державой! Клика Чжили, возможно, была свергнута, она, возможно, изначально потеряла свое руководство, но она нашла новую душу в лице маршала Вана и Янь Хуэйцина. Звучат горны победы, и народ ликует!"

 SZC_extending_a_hand_to_the_young_china: "Протягивая руку Младокитаю"
 SZC_extending_a_hand_to_the_young_china_desc: "Несмотря на свои убеждения и неохотное участие в маньчжурской бюрократии, Младокитайская партия по своей сути является националистической, патриотической и набожно республиканской. Хотя мы и расходились во мнениях раньше, многие в Ассамблее и среди солдат с гордостью смотрят на их идеологическое упорство. В то время как сторонники жесткой линии предпочли бы их исключить, сотрудничество с МКП снова может привести к оживлению китайского милитаризма и национализма."

 SZC_intellectualism_with_endeavour: "Интеллектуализм с усердием"
 SZC_intellectualism_with_endeavour_desc: "Общество усердия, давно функционирующая интеллектуальная организация и производитель статей, было основано такими людьми, как Цай Юаньпэй, Ху Ши, Ли Дачжао, Лян Шумин, Ван Чунхуэй, Тао Мэнхэ и многими другими реформистскими, а в некоторых случаях позже революционными интеллектуалами. Постоянно поддерживаемые Ху Ши в той или иной форме, они представляют собой один из многих федералистских блоков на политической сцене Севера. Разделяя общий дом во время нашего изгнания, давайте и дальше интегрировать этот аналитический центр в наше правительство, однако они многого ждут от нашего правительства. Самое главное — немедленной реформы его институтов."

 SZC_public_safety_bureau: "Бюро общественной безопасности"
 SZC_public_safety_bureau_desc: "Бюро общественной безопасности, или БОБ, — это название разведывательного агентства, подрабатывающего тайной полицией Чжили, номинально возглавляемого Лю Мэнгэном и Ван Юйцзя. Используя свои контакты на Центральных равнинах и в других местах, а также свой восхитительный опыт управления шпионскими и разведывательными сетями Цао Куня, организация была создана для того, чтобы гарантировать, что возможность маньчжурского переворота никогда больше не повторится. Шпионаж, подавление внутреннего инакомыслия и контрразведка — это лишь некоторые из многих целей, которые учреждение уполномочено решать."

 SZC_vindicating_the_invisible_element_idea: "В тылу маньчжуров"
 SZC_vindicating_the_invisible_element_idea_desc: "Они, возможно, раздавили нашу военную мощь на поверхности, но мало знают роялисты, что сети и влияние Чжили просачиваются глубоко в землю Центральных равнин. Наш любимый Король Баодина, возможно, был безжалостно убит руками маньчжурских принцев, но его сети остаются навечно сильными. И готовы использовать любую выгоду для нас ради уничтожения нашего врага."

 SZC_reconstituting_the_beiyang_navy: "Восстановление Бэйянского флота"
 SZC_reconstituting_the_beiyang_navy_desc: "Следуя довольно амбициозному плану, разработанному восстановленным министром военно-морского флота адмиралом Са Чжэньбином, значительная часть бюджета страны выделяется на государственную модернизацию и производство совершенно нового флота кораблей. Есть надежда, что к концу этого годового плана китайский флот быстро модернизируется и больше не будет плавать на кораблях десятилетней давности."

 SZC_western_revitalisation_plan_effect: "План западного возрождения"

 SZC_encourage_local_initiative_effect: "Поощрение местной инициативы"

 SZC_crafting_talent_of_the_new_generation: "Создание талантов нового поколения"
 SZC_crafting_talent_of_the_new_generation_desc: "Самым важным элементом в развитии Китая на нашем пути к современности является правильное образование масс. По мере того как массы осваивают навыки современной эпохи, все больше людей будут участвовать в политической системе и укреплять нашу новообретенную демократию. Мы стремимся к образованному населению, ведущему нашу Республику вперед!"

 SZC_vaulting_militaristic_personalism: "Преодоление милитаристского персонализма"
 SZC_vaulting_militaristic_personalism_desc: "Во время гражданской войны в Китае различные видные милитаристы приобрели большое влияние в федеральных вооруженных силах. Эти милитаристы командуют силами, верными не столько Республике, сколько своему командиру. Если демократия нашей Республики должна процветать, персонализм должен быть искоренен у самого источника."

 SZC_government_union_partnership: "Партнерство правительства и профсоюзов"
 SZC_government_union_partnership_desc: "Профсоюзы не были самой заметной силой в Китае, в основном из-за аграрного характера нации, который был нормой так долго. Однако по мере достижения объединения и выхода китайской промышленности на лидирующие позиции рабочие также должны получить представительство. Мы должны расширять и интегрировать профсоюзы, чтобы рабочие от шелковых ферм Сычуани до угольных шахт Шаньси и доков Шанхая имели свой голос."

 SZC_chinas_industrial_revolution: "Промышленная революция Китая"
 SZC_chinas_industrial_revolution_desc: "Будучи втянутым во множество потрясений до сих пор, Китай был страной, разделенной между натуральным сельским хозяйством на западе и различными заброшенными отраслями промышленности на востоке. Но больше нет! Обучая наших людей преимуществам промышленности и тому, как работать и строить, мы будем стремиться к быстрой индустриализации, используя наши ранее нетронутые ресурсы. Мы составим конкуренцию Британии через десять лет!"

 SZC_specialised_practical_schools_0: "Специализированные практические школы"
 SZC_specialised_practical_schools_0_desc: "Сформированные на основе примеров, впервые примененных в Наньчуне, были созданы специализированные практические школы, в которых появились профессиональные классы для обучения вопросам сельского хозяйства и шелководства — обеих неотъемлемых отраслей, особенно в Сычуани. В большем количестве школ также начали вводиться профессиональные классы по науке, гуманитарным наукам, традиционной китайской медицине и тяжелой промышленности. Каждый из этих специализированных классов имеет свои собственные практические мастерские, фермы и клинические стажировки, способствующие интеграции образования и производительного труда."

 SZC_finding_a_use_for_all: "Найти применение для всех"
 SZC_finding_a_use_for_all_desc: "Национальная централизация необходима, и никогда более, чем сейчас, когда Китай, наконец, в основном подпадает под новую администрацию. Бывшим политическим деятелям, будь то политик или милитарист, должна быть предоставлена работа в производственных разработках, чтобы они не занимались ничем иным, как препятствованием и критикой правительства. Аналогичным образом, безработные и праздные должны быть направлены на технические программы, чтобы подготовить их к промышленному будущему Китая, и весь технический опыт должен быть использован."

 SZC_the_national_demobilisation_programme: "Национальная программа демобилизации"
 SZC_the_national_demobilisation_programme_desc: "Теперь, когда объединение наступило, вопрос милитаризации может быть снова решен. Чрезмерная и безудержная мобилизация множеством акторов всегда была проблемой как в Сычуани, так и в милитаристском Китае в целом. Пришло время стандартизировать постоянные армии и резко сократить численность нерегулярных и автономных военных формирований, как мы и обещали народу с самого начала."

 SZC_new_style_education_scheme: "Схема образования нового типа"
 SZC_new_style_education_scheme_desc: "Отсутствие широкого образования всегда было корнем культурной отсталости во всем Китае, что воочию наблюдал генерал Лю Вэньхуэй во время своего пребывания в Сычуани. Без сомнения, статус-кво нуждается в реформе — должны быть организованы новые государственные экзамены, проведены показательные встречи, а лучшие из когорт студентов должны быть отобраны для более престижных должностей и отмечены за свои достижения."

 SZC_true_purposes_of_knowledge_civic_democracy: "Истинные цели знания: Гражданская демократия"
 SZC_true_purposes_of_knowledge_civic_democracy_desc: "Чтобы идти в ногу со временем, образование должно постоянно развиваться, чтобы соответствовать требованиям современности. С затянувшимся ядом старого мышления имперских экзаменов нужно покончить! Как педагоги и работники культуры, мы имеем исторический долг: мы должны провозгласить декларацию интеллектуальной независимости, обеспечить студентам свободу учиться, исследовать, говорить и публиковаться, и тем самым завершить демократизацию образовательного духа."

 SZC_true_purposes_of_knowledge_national_sacrifice: "Истинные цели знания: Национальное самопожертвование"
 SZC_true_purposes_of_knowledge_national_sacrifice_desc: "Чтобы идти в ногу со временем, образование должно постоянно развиваться, чтобы соответствовать требованиям современности. С затянувшимся ядом старого мышления имперских экзаменов нужно покончить! Люди не должны думать о получении образования как о ступеньке к высоким должностям и богатству. Мы должны найти способы, чтобы наши лучшие умы посвятили себя в течение пятидесяти лет не тому, чтобы стать докторами литературы или философии, а изучению животноводства и сельскохозяйственной культивации — истинному образованию народа."

