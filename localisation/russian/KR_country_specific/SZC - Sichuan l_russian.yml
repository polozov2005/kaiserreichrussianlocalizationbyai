 sichuan_silk: "Сычуаньский шелк"
 nanchuan_aircraft_manufacturing_plant: "Наньчуаньский авиастроительный завод"
 minsheng_shipping: "Судоходство Миньшэн"
 chongqing_tank_plant: "Чунцинский танковый завод"
 chongqing_tank_plan_desc: "Машиностроительный завод Юйфэн в Чунцине был недавно выбран и выкуплен армией с амбициозным планом превратить его в первый танковый завод Китая. Это будет долгий процесс расширения существующего завода и найма необходимого технического опыта, но база прочная и есть место для расширения."

### Bookmark ###
 SZC_KR_gathering_storm_desc: "Сычуань долгое время была микрокосмом многих бед Китая, разделенная и постоянно меняющая контролеров с 1911 года. Губернатору Ян Сэню удалось выйти из хаоса в качестве правителя с помощью клики Чжили У Пэйфу и Цао Куня после Северного похода, но даже его контроль далек от абсолютного.\n\nПосле войны в Центральной Сычуани Ян стал полагаться на внутренние фракции для поддержки, в первую очередь на фракцию Лю Сяна из Департамента ускоренного обучения и Триумвират Баодинского департамента. Как бы то ни было, Сычуань находится в хрупком равновесии..."

### Intro Screen###
 SZC_country_intro_background: "GFX_SZC_intro"
 SZC_country_intro_header: "§aКлика Сычуань§! в 1936 году"
 SZC_country_intro_content: "На заре 1936 года §aСычуань§! остается в очень хрупком равновесии между своими многочисленными фракциями. §aЯн Сэнь§! пока держится, поддерживаемый §PЧжили§! от его личного покровителя, §PНефритового Маршала У Пэйфу§!, и с помощью его близкого соратника и бывшего губернатора §aСычуани§!, §PЛю Цуньхоу§!, чей статус и связи, а также значительные силы, дают §aЯну§! столь необходимую стабильность и легитимность. Однако военные катастрофы последнего десятилетия заставили §aЯн Сэня§! полагаться на клики, возглавляемые §cДэн Сихоу§! и §PЛю Сяном§!, которые теперь имеют значительное влияние в правительстве и в самой Сычуани. Остатки §Rориентированного на Гоминьдан§! §SОфицерского департамента§! все еще контролируют части южной §aСычуани§!, хотя за прошедшие годы зона их контроля неуклонно сокращалась.\n\n§aСычуань§! стоит на лезвии ножа, внутренне разделенная, с множеством фракций, соперничающих за абсолютную власть в провинции. Может потребоваться лишь малейший признак слабости в §PЧжили§!, чтобы эта пороховая бочка взорвалась..."

 SZC_country_intro_header_1: "§aКлика Сычуань§!"
 SZC_country_intro_content_1: "Современная история §aСычуани§! начинается в 1912 году. Когда §lСиньхайская революция§! достигла §aСычуани§!, регион вступил в период длительной нестабильности, когда региональные милитаристы боролись за губернаторство дипломатией и силой. Между 1912 и 1926 годами регион попеременно контролировался §lреволюционерами Синьхая§!, §Rлоялистами Гоминьдана§! и §Pместными милитаристами§!.\n\nТакое положение дел продолжалось до провала Северного похода в 1926 году. При личной поддержке победоносного лидера §PЧжили§!, §cУ Пэйфу§!, §aЯн Сэнь§! смог утвердиться в качестве твердого правителя §aСычуани§!, наконец восстановив некое подобие стабильности в регионе. Однако глубокие разногласия внутри §aСычуани не исчезли§!, и §aЯн§! быстро стал заложником интересов различных внутренних клик, которые сформировались, и не мог устранить их влияние. §PЛю Сян§!, один из этих милитаристов, утвердился в §PЧунцине§!, объединившись с местной администрацией, быстро став главным соперником §aЯна§! за контроль над §aСычуанью§!.\n\nВ 1928 году §aСычуань§! столкнулась с вторжением соседней клики §aЮньнани§!. Хотя поначалу оно было успешным, вторжение вскоре было отбито силами §aСычуани§!, что привело к значительным потерям среди личных сил §aЯна§!. Вторжение §PТибета§! в 1930 году еще больше ухудшило ситуацию: войска §PТибета§! достигли реки Янцзы и напрямую угрожали столице §aЧэнду§!. Хотя вмешательство §Pклики Ма§! на севере в конечном итоге переломило ход событий против §Pтибетцев§!, §aСычуань§! была вынуждена уступить половину региона §aСикан§! §PТибету§!, и армия §aЯна§! осталась в лохмотьях."

 SZC_country_intro_header_2: "§aКлика Сычуань§! (Часть 2)"
 SZC_country_intro_content_2: "Хотя вторжение §PТибета§! было отбито, это не стало концом бед §aСычуани§!. В 1931 году группа §Rориентированных на Гоминьдан§! офицеров, §Pмилитаристов§! и §aбывших губернаторов§! §aСычуани§!, §SОфицерский департамент§!, начала свою первую экспедицию в §aСычуань§! со своих баз в северной §aЮньнани§! при молчаливой поддержке §Pреспубликанского правительства Тан Цзияо§!. Потрепанные силы §aСычуани§! под командованием §aЯна§! не могли сравниться с войсками §RГМД§!, терпя поражение раз за разом, теряя большую часть своих припасов перед наступающими силами вторжения. С §aКликой§! на грани краха, милитарист §aЯн Сэнь§!, в отчаянии, сформировал временный союз с милитаристом §PЧунцина§! §PЛю Сяном§! и его кликой, §PПромышленным корпусом§!. С помощью сил §PЛю§!, §aЯн§! смог отбить экспедицию. Дальнейшее сотрудничество с §PПромышленным корпусом§! позволило §aСычуани§! начать восстановление своей армии ценой постоянно растущего влияния §PПромышленного корпуса§! в правительстве.\n\nДругой группой, усилившей влияние в это время, был §cБаодинский департамент Дэн Сихоу§!, чьи силы помогали подавлять §SОфицерский департамент§!, пока §aЯн§! восстанавливал свои силы. Весьма заметная работа §cБаодинского департамента§! по подавлению повстанцев привела к росту популярности группы среди людей, которые все больше и больше видят в них истинных защитников §aСычуани§!.\n\nЕще одна попытка вторжения в 1933 году со стороны §aЮньнани§! в поддержку §SОфицерского департамента§! была быстро прервана, когда §PМаршал Лиги восьми провинций§!, §PСунь Чуаньфан§!, пригрозил вмешаться. Неожиданное отступление §aЮньнани§! позволило §aЯну§! частично вновь оккупировать §aюжную Сычуань§!. Хаос также позволил §aТянь Сунъяо§! утвердиться на северо-востоке как §aмелкому милитаристу§!, однако его амбиции остаются загадкой."

 SZC_country_intro_header_3: "§aСычуань§!, Разделенная"
 SZC_country_intro_content_3: "§aСычуань§! в 1936 году стоит разделенной, с множеством фракций, соперничающих за абсолютную власть.\n\nПравящей фракцией на данный момент является §aДепартамент вооружения§!, возглавляемый §aЯн Сэнем§! и его близким соратником §PЛю Цуньхоу§!. Из-за личной поддержки §cУ Пэйфу§! на протяжении многих лет §aДепартамент§! тесно связан с §Pвластями Чжили§! в §cПекине§! и §PНанкине§!. Хотя их влияние пока остается в безопасности, в последнее десятилетие §aклика§! стала зависимой от §Pподдержки Чжили§!. Если с §PЧжили§! что-то случится, власть §aЯна§! окажется под опасной угрозой.\n\nГлавным соперником §aЯна§! за контроль над §aСычуанью§! является милитарист §PЧунцина§! §PЛю Сян§!, лидер §PПромышленного корпуса§!. §PЛю Сян§! остается бывшим союзником §aЯна§! со времен экспедиции §RГМД§! в 1931 году, но §PЛю§! — амбициозный человек и не скрывает своего желания править §aСычуанью§!. Если представится возможность, §PПромышленный корпус§! может быстро пересмотреть полезность своего союза с §aЯн Сэнем§!.\n\nТретьей по важности фракцией является §cБаодинский департамент§!, клика, сформированная бывшими выпускниками §cБаодина§! — хотя это не является обязательным условием для членства — и возглавляемая генералом §aЯна§! §cДэн Сихоу§!. В последние несколько лет их весьма заметные операции против §Sанклавов повстанцев§! на юге принесли им популярность среди людей. §cБаодинский департамент§! формирует ядро поддержки §aЯна§! в регионе. Хотя §cДэн§! долгое время был верен §aЯну§!, его вполне можно считать угрозой правлению §aЯна§!.\n\nНа юге остатки экспедиции §RГМД§! в 1931 году продолжают удерживать территорию. §SОфицерский департамент§!, как их называют, — это основная группа, открыто сопротивляющаяся контролю §aЯна§! над §aСычуанью§!. Возглавляемая §aЛюй Чао§! и §lСюн Кэу§!, группа поддерживает тесные отношения с соседней кликой §aЮньнани§!, от поддержки которой они зависят, чтобы выжить."

 SZC_guide: "§MДепартамент ускоренного обучения/Департамент вооружения§! — §MАмбиции Ян Сэня§! / §MТрадиция Лю Цуньхоу§! ($authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot В событии §YВойска Лю Сяна приближаются к Суйнину§! выберите отступить на север или эвакуироваться в Чэнду\n£white_dot В событии §YНэйцзян под штурмом§! взорвите мосты\n£white_dot В событии §YВыбор плана атаки§! двигайтесь к Цзяньяну\n£white_dot В событии §YСтолкновения в Цзылюцзине§! сымитируйте атаку — гражданская война закончится через несколько дней.\n\n£white_dot Альтернативно, в событии §YВыбор плана атаки§! двигайтесь к Чунцину\n£white_dot В событии §YЧунцин под штурмом§! займите позиции на холмах — гражданская война закончится через несколько дней.\n£white_dot В событии §YВстреча с Дэн Сихоу§! примите сделку, чтобы закрепить правление §aЯн Сэня§!, или отвергните ее, чтобы §PЛю Цуньхоу§! пришел к власти.\n\n§MБаодинский департамент§! — §MОбразцовая провинция§! / §MСовременная провинция§! ($social_conservative_coloured$)\n£white_dot В событии §YВойска Лю Сяна приближаются к Суйнину§! окопайтесь и попытайтесь защищаться\n£white_dot Альтернативно, выберите отступить на север или эвакуироваться в Чэнду. Впоследствии, в событии §YНэйцзян под штурмом§!, защищайте плацдармы\n\n£white_dot В событии §YМобилизация войск Сикана§! усильте гарнизон в Чэнду\n£white_dot В событии §YГуаньсянь под тяжелой атакой§! подготовьте атаку на вражеские лагеря ночью или заблокируйте канал Баопинкоу — гражданская война закончится через несколько дней.\n£white_dot Альтернативно, в событии §YМобилизация войск Сикана§! двигайтесь на восток к Лучжоу и Чунцину\n£white_dot В событии §YМноголикий Баодин§! положитесь на ядро Лю Вэньхуэя — гражданская война закончится через несколько дней.\n\n§MДепартамент ускоренного обучения§! — §MАНЗ§! / §MЛорд Сычуани§! / §MГрандиозный план§! ($authoritarian_democrat_coloured$)\n£white_dot В событии §YВойска Лю Сяна приближаются к Суйнину§! выберите любой вариант\n£white_dot В событии §YНэйцзян под штурмом§! выберите любой вариант\n£white_dot В событии §YВыбор плана атаки§! разделите свои силы — гражданская война закончится через несколько дней.\n£white_dot Альтернативно, в событии §YВыбор плана атаки§! двигайтесь к Чунцину\n£white_dot В событии §YЧунцин под штурмом§! штурмуйте город — гражданская война закончится через несколько дней.\n\n£white_dot Альтернативно, в событии §YМобилизация войск Сикана§! усильте гарнизон в Чэнду\n£white_dot В событии §YГуаньсянь под тяжелой атакой§! окопайтесь и укрепитесь вокруг храма Эр Ван — гражданская война закончится через несколько дней.\n£white_dot Альтернативно, в событии §YМобилизация войск Сикана§! двигайтесь на восток к Лучжоу и Чунцину\n£white_dot В событии §YМноголикий Баодин§! отдайте предпочтение силам Дэна и Тяня — гражданская война закончится через несколько дней.\n\n§MПолк девяти человек/Офицерский департамент§! ($social_democrat_coloured$ / $social_liberal_coloured$)\n£white_dot В событии §YВойска Лю Сяна приближаются к Суйнину§! §Rне§! выбирайте окапываться и пытаться защищаться\n£white_dot В событии §YНэйцзян под штурмом§! взорвите мосты\n£white_dot В событии §YВыбор плана атаки§! двигайтесь к Цзяньяну\n£white_dot В событии §YСтолкновения в Цзылюцзине§! выберите захватить Цзылюцзин или атаковать Чунцин — гражданская война закончится через несколько дней.\n£white_dot В событии §YСоглашение о Новой Сычуани§! выберите либо §SСюн Кэу§!, либо §lЛи Цзяюя§!, чтобы они пришли к власти, в зависимости от того, хотите ли вы §SПолк девяти человек§! или §lОфицерский департамент§! соответственно.\n\n§MОстатки Чжили§! — §MГражданское крыло§! / §MВоенное крыло§! ($authoritarian_democrat_coloured$ / $paternal_autocrat_coloured$)\n£white_dot Установите правило игры для §cЦин§! на §YМаньчжурский переворот§! перед началом игры, и пусть §aЯн Сэнь§! или §PЛю Цуньхоу§! останутся у власти.\n£white_dot §PВан Чэнбинь§! прибудет в Сычуань через месяц после переворота.\n\n§MПравительство национального восстановления§! ($social_democrat_coloured$ / $social_liberal_coloured$ / $authoritarian_democrat_coloured$)\n£white_dot Следуйте руководству, чтобы §SСюн Кэу§! и §SПолк девяти человек§! пришли к власти\n£white_dot После 1 июля 1937 года, не будучи субъектом, владея Чунцином и не имея ранее созданных федералистских правительств, завершите фокус §YПризвать к сотрудничеству между Севером и Югом§!; затем примите решение §YНести знамя надежд федералистов§!\n£white_dot §SЧжан Лань§! будет приглашен сформировать чрезвычайное Правительство национального восстановления от имени сычуаньских милитаристов.\n\n§MДемократическая лига Китая — Научно-исследовательское общество нового века§! ($social_democrat_coloured$)\n£white_dot Объедините Китай как Правительство национального восстановления, сохраняя §fДемократический энтузиазм§! сбалансированным.\n£white_dot После объединения выберите §SЧжан Ланя§! для победы на национальных выборах.\n\n§MВеликий республиканский альянс — Объединенная ассоциация федеральной автономии§! ($social_liberal_coloured$)\n£white_dot Объедините Китай как Правительство национального восстановления, сохраняя §fДемократический энтузиазм§! сбалансированным.\n£white_dot После объединения выберите §lДань Маосиня§! для победы на национальных выборах.\n\n§MВеликий республиканский альянс — Общество гражданского контроля и прогресса§! ($authoritarian_democrat_coloured$)\n£white_dot После объединения пусть §lДань Маосинь§! или §SЧжан Лань§! выиграют национальные выборы. Затем пусть §fДемократический энтузиазм§! упадет ниже зарождающегося реализма или выше зарождающегося идеализма, и §aЛю Вэньхуэй§! совершит переворот, чтобы стабилизировать правительство.\n£white_dot Альтернативно, пусть §fДемократический энтузиазм§! упадет ниже зарождающегося реализма или выше зарождающегося идеализма во время первой избирательной кампании, и §aЛю Вэньхуэй§! совершит переворот, чтобы стабилизировать правительство.\n\n£white_dot §YПримечание: значительно легче сохранить правительства §sЧжан Ланя§! или §lДань Маосиня§!, если вы §fдеполитизируете военных§!.§!\n£white_dot §YПримечание: можно навсегда остановить §aЛю Вэньхуэя§! от переворота правительства, если вы возьмете фокусы §MНациональная демобилизация§! или §MОбуздать армейские клики§! для §lДань Маосиня§! и §SЧжан Ланя§! соответственно.§!"

### Events ###
 sichuan_events.5.t: "Беспорядки на Юге"
 sichuan_events.5.d: "После продажи железной дороги Чжэ-Гань в Лиге восьми провинций начали появляться тревожные слухи о широкомасштабных беспорядках. Начавшись как шепот о протестах, подавленных полицией Лиги, наши пограничники теперь сообщают о потоках беженцев, спасающихся от насилия, и о взрыве бандитизма, перетекающего через наши границы.\n\nПохоже, мирный протест в Уху перерос в жестокую бойню после того, как силы Лиги открыли огонь по протестующим — сцена, которая начала повторяться по всей Лиге в дни, последовавшие за тем, что теперь называют «Инцидентом в Уху». Некоторые теперь утверждают, что Лига — и порядок Чжили, который ее поддерживает — на последнем издыхании, хотя большинство все еще готово верить, что военная сила может сдержать беспорядки."
 sichuan_events.5.a: "Это пройдет, как проходило в прошлом."

 sichuan_events.6.t: "Маршал Сунь Чуаньфан застрелен убийцей"
 sichuan_events.6.d: "Тяжелые новости приходят из Лиги восьми провинций: Маршал Лиги Сунь Чуаньфан, высшая власть Чжили в регионе, лежит в коме, смертельно раненный после того, как в него выстрелил убийца. Контроль Чжили над югом уже начал рушиться, и пройдет не так много времени, прежде чем волны достигнут нас в Сычуани. Если случится худшее и юг погрузится в хаос, Пекин может быть слишком занят, чтобы помочь нам."
 sichuan_events.6.a: "Это не сулит ничего хорошего."

 sichuan_events.7.t: "Хаос на Юге"
 sichuan_events.7.d.intervention: "Наши худшие кошмары стали реальностью. Контроль Чжили над Южным Китаем полностью рухнул. В Нанкине генерал Ци Сеюань назначил себя исполняющим обязанности Маршала Лиги после захвата контроля над городом. С распадом Лиги после стрельбы в Суня, повстанцы Гоминьдана, долгое время считавшиеся подавленными, восстали в Фуцзяни в попытке восстановить Национальное правительство. Губернатор Аньцина объявил войну Ци, обвинив его в организации покушения с целью захвата Лиги. Далее на западе губернаторы Хунани, Гуанси и Гуандуна отказались признать власть нового Маршала Лиги, но пока не начали боевых действий.\n\nСитуация стала достаточно тяжелой, чтобы центральное правительство в Пекине напрямую вмешалось, и войска и припасы Цин уже направляются на юг. На данный момент кажется, что внимание Пекина полностью захвачено кризисом на юге, и мы остались одни."
 sichuan_events.7.d.no_intervention: "Наши худшие кошмары стали реальностью. Контроль Чжили над Южным Китаем полностью рухнул. В Нанкине генерал Ци Сеюань назначил себя исполняющим обязанности Маршала Лиги после захвата контроля над городом. С распадом Лиги после стрельбы в Суня, повстанцы Гоминьдана, долгое время считавшиеся подавленными, восстали в Фуцзяни в попытке восстановить Национальное правительство. Губернатор Аньцина объявил войну Ци, обвинив его в организации покушения с целью захвата Лиги. Далее на западе губернаторы Хунани, Гуанси и Гуандуна отказались признать власть нового Маршала Лиги, но пока не начали боевых действий.\n\nЧто еще хуже, правительство в Пекине отказалось вмешаться для восстановления порядка и сталкивается с массовыми протестами по поводу своего решения. Диссиденты по всему Китаю уже громко провозглашают решение У доказательством слабости и некомпетентности Чжили. Похоже, контроль Чжили над Китаем ломается, и наши враги наверняка наблюдают."
 sichuan_events.7.a: "Это катастрофа!"

 sichuan_events.8.t: "Лю Сян мобилизуется против нас"
 sichuan_events.8.d: "Поскольку хрупкий порядок в Сычуани оборачивается против нас вместе с проблемами в Лиге восьми провинций, Лю Сян решил перейти Рубикон, так сказать. Со своей большой армией он выступил из Чунцина, и верные ему солдаты были замечены по всей Сычуани, главным образом в ее восточных частях. Наши бывшие союзники предали нас, а друзья оставили нас. Однако пока Баодинский департамент решил придерживаться курса. По всей Сычуани армии мобилизуются — и мы тоже должны мобилизоваться. Пришло время и нам бросить жребий, судьба Сычуани висит на волоске."
 sichuan_events.8.a: "Мы должны остановить его!"

 sichuan_events.9.t: "Сычуань погружается в гражданскую войну"
 sichuan_events.9.d: "Сычуань погрузилась в хаос.\n\nПо всей провинции силы формально союзного Департамента ускоренного обучения сражаются друг с другом: силы Лю Сяна сражаются с силами Ян Сэня. Департамент вооружения и Баодинский департамент временно объединились с силами Ян Сэня, и к ним присоединился малый Офицерский департамент, сражаясь бок о бок против крупнейшей армии в Сычуани. Лю Сян продолжает отдавать приказы о наступлении из своего штаба в Чунцине, чтобы его войска вошли и вступили в бой со всеми силами Департамента ускоренного обучения Ян Сэня, Департамента вооружения и Баодинского департамента.\n\nВ Тунжэне федералистские силы под командованием Сюн Кэу увидели возможность вернуться в Сычуань. Присоединившись к остаткам сил Гоминьдана под командованием Люй Чао и вездесущим партизанам в Юго-Восточной Сычуани, они доказали, что способны привести тонкий порядок в Сычуани в полный беспорядок.\n\nБаодинский департамент пока остался верен Чэнду, и их силы сражаются бок о бок с силами Ян Сэня в кровопролитной войне за объединение провинции. Фасад стабильности в Сычуани разбит, и только небеса знают, что станет с провинцией."
 sichuan_events.9.a: "Немедленно свяжитесь с Пекином, нам нужна их помощь!"
 sichuan_events.9.b: "Итак, началось..."

 sichuan_events.16.t: "Департамент ускоренного обучения просит убежища"
 sichuan_events.16.d: "Гражданская война в Сычуани закончилась, и наши союзники в Департаменте ускоренного обучения и Департаменте вооружения потерпели поражение от своих врагов. Спасаясь от возможного возмездия, руководство бывшей правящей клики Сычуани прибыло, стремясь служить нашим вооруженным силам — с надеждой однажды, возможно, вернуться в свою родную провинцию."
 sichuan_events.16.a: "Старым друзьям здесь всегда рады!"
 sichuan_events.16.b: "Найдите новый дом, да — в другом месте."

 sichuan_events.50.t: "Ян Сэнь запрашивает поддержку"
 sichuan_events.50.d: "Тяжелые новости прибыли из Чэнду по телеграфу через нашего главного офицера на юго-западе Хэ Гогуана. Шаткий мир в провинции Сычуань рухнул как прямое следствие потери стабильности Национального порядка Чжили после проблем в Лиге восьми провинций. Значительно уменьшив влияние лидера Сычуани и ключевого союзника Чжили Ян Сэня, внутренние разногласия в провинции переросли в открытый конфликт. Коллега по Департаменту ускоренного обучения и милитарист Чунцина Лю Сян выступил против губернатора Ян Сэня и его сил, имея на буксире крупнейшую армию в провинции. По крайней мере, на данный момент союзники Яна в Баодинском департаменте под руководством Дэн Сихоу, Лю Вэньхуэя и Тянь Сунъяо остаются, но даже это неопределенно, поскольку ситуация выходит из-под контроля с каждым днем.\n\nКлика Чжили, часто встречающаяся за закрытыми дверями, уже начала судорожно искать ответ. Поскольку хаос охватил администрацию, многим пришлось полагаться на личность, а не на конституционализм, чтобы протолкнуть свои предложения. Хотя, несмотря на все притворства, это не фракционный раскол по вопросу Сычуани, а логистический.\n\nПри нынешнем хаосе в Сычуани нельзя исключать, что затяжной конфликт, в котором обе стороны истощат свои силы, может привести к тому, что остатки Сюн Кэу воспользуются моментом, чтобы переломить свои старые неудачи. Как будто этого было недостаточно, постоянные засухи ударили по и без того борющемуся народу Сычуани. В условиях надвигающейся катастрофы старый друг Чжили, губернатор Ян, обратился к Клике через Хэ, умоляя предложить любую поддержку, которую она может собрать. Хотя последствия поражения Яна могут оказаться серьезными для Клики в будущем, ни Нефритовый Маршал, ни Король Баодина не соизволили много комментировать, хотя в частном порядке сообщалось, что У Пэйфу подготовил небольшой пакет помощи для своего старого друга."
 sichuan_events.50.a: "Отправьте им то, что мы можем выделить."
 sichuan_events.50.b: "Мы ничего не можем выделить прямо сейчас."

 sichuan_events.51.t: "Чжили отправляет поддержку"
 sichuan_events.51.d: "После того как так много бывших «союзников» показали свои истинные лица в трудные времена, мало кто ожидал многого от Центрального правительства, уже погрязшего в крахе Лиги. И все же, как показывают последние отчеты от Хэ Гогуана, поток денег и припасов начал поступать в Чэнду, едва огибая силы Лю Сяна.\n\nВняв просьбе губернатора Яна о помощи, похоже, что Лоян обязался поддержать [SZC.GetLeader] и [SZC.GetRulingParty] в их усилиях по поддержанию стабильности в провинции. С хорошими новостями, наконец прозвучавшими в клике Ян Сэня, солдаты сообщили о повышении боевого духа, и предоставленные припасы, несомненно, окажутся бесценными, поскольку коалиция Ян Сэня сталкивается с полной мощью сил Лю Сяна."
 sichuan_events.51.a: "Как великодушно!"

 sichuan_events.52.t: "Чжили бросает нас"
 sichuan_events.52.d: "Кажется, в наши дни всех в стране постигло несчастье. Уже преданный Лю Сяном и лишь предварительно удерживающий союз с Департаментами вооружения, Баодина и Офицерским, отчаянное положение губернатора Яна привело к тому, что он бросил спасательный круг в сторону Лояна или даже Пекина. Через контакт Чжили на юго-западе, Хэ Гогуана, Ян смог использовать свою прямую связь со своим старым другом У Пэйфу, чтобы заручиться некоторой формой поддержки для своей кампании против Лю.\n\nИ все же, похоже, что Центральное правительство сочло ненужным или, возможно, слишком занято, чтобы помогать губернатору в поддержании порядка. Гораздо больше обеспокоенные внутренними делами после нестабильности в Нанкине, чем личной преданностью, Чжили отказались помогать Яну, оставив губернатора на произвол судьбы. Поскольку боевой дух уже падает, немногие из простых солдат надеются, что смогут противостоять армии Лю в людях или материальных средствах."
 sichuan_events.52.a: "Что ж, по крайней мере, не осталось союзников, которые могли бы нас предать..."

 sichuan_events.53.t: "Сюн Кэу просит поддержки"
 sichuan_events.53.d: "Военная клика Сычуани на севере погрузилась в гражданскую войну, и различные милитаристы провинции обратились друг против друга. Хотя в большинстве случаев это было бы обычным делом в Китае, район вокруг Тунжэня в Гуйчжоу был «занят гарнизоном» федералистских сил бывшего губернатора Сычуани Сюн Кэу со времен Северного похода. Хотя обычно это не событие, особенно сейчас с военной оккупацией Гоминьдана в Гуйчжоу и с собственными проблемами у Дянь, гражданская война в Сычуани предоставила редкую возможность.\n\nВойдя в провинцию для одной последней попытки вернуться к славе, Сюн обратился с довольно любопытной просьбой к [YUN.GetLeader]. Хотя отношения между Сюн Кэу и армией Дянь то улучшались, то ухудшались на протяжении многих лет, бывший губернатор отбросил враждебность, возможно, довольно нагло, чтобы попросить поддержки в своем начинании.\n\nУже диковинная просьба сама по себе, особенно от [YUN.GetLeader], Сюн попросил людей или материальные средства, чтобы помочь ему вмешаться в гражданскую войну в Сычуани. Явно отчаянно нуждаясь в любой доброй воле, мало кто мог бы упрекнуть [YUN.GetLeader] за простой отказ от его условий; они слишком дороги и приносят слишком мало гарантий возврата инвестиций в будущем. Но остается возможность отправить некоторых менее лояльных людей подальше от Куньмина. По крайней мере, до тех пор, пока это не приведет к повторению того, как в прошлый раз экспортный милитаризм потерпел неудачу в Сычуани."
 sichuan_events.53.a: "Отправьте им войска."
 sichuan_events.53.b: "Отправьте им оружие."
 sichuan_events.53.c: "Это не стоит затрат."

 sichuan_events.54.t: "Юньнань поддерживает силы Сюн Кэу"
 sichuan_events.54.d: "Хотя клика Юньнани вряд ли является процветающей провинцией или особенно стабильной в настоящее время, она все еще обладает значительной армией, и это факт, о котором они слишком часто предпочитают напоминать своим соседним провинциям Гуйчжоу, Гуанси и Сычуань. И снова, похоже, Юньнань намерена сделать ставку в местной политике Сычуани, несмотря на свою собственную разрушительную внутреннюю ситуацию.\n\nПродвигаясь вперед из Тунжэня в Гуйчжоу, подразделения Сюн Кэу оказались сильнее и намного лучше оснащены, чем предполагала предыдущая разведка, причем многие подразделения щеголяли тем, что казалось подержанными винтовками из Юньнани. Что, возможно, еще хуже, так это различные сообщения о солдатах и офицерах армии Дянь, непосредственно участвующих в битвах и стычках. Похоже, что Хозяин Восточного Континента снова ступил в Бассейн Красной реки."
 sichuan_events.54.a: "Хватит вмешиваться в наши дела!"

 sichuan_events.55.t: "Войска Лю Сяна приближаются к Суйнину"
 sichuan_events.55.d: "Поступают сообщения, что крупные силы армии Лю Сяна сумели продвинуться к Суйнину с угрожающей скоростью. Это важнейшее место имеет большое стратегическое значение из-за его близости как к базе власти Сяна, так и [ROOT.GetLeader], служа узлом дорожной сети в южном бассейне недалеко от Чунцина.\n\nЛю Цуньхоу, временный союзник Яна, заявил, что город можно защитить от превосходящих сил Лю, и что даже если они растянуты, совместные укрепления альянса в городе и вокруг него уравняют шансы в его пользу.\n\nГо Жудун, еще один способный командир альянса, выступил за более осторожный подход к [ROOT.GetLeader], утверждая, что стратегический отход позволит в настоящее время тонким линиям альянса восстановиться и продолжить сражаться с лучшей позиции в последующие дни."
 sichuan_events.55.a: "Отступить на север к Саньтаю и Мяньяну."
 sichuan_events.55.b: "Эвакуироваться в Чэнду."
 sichuan_events.55.c: "Окопаться и попытаться защищаться."

 SZC_battle_suining_santai: "§PОрганизация боевого отхода к северным городам Саньтай и Мяньян — безопасный курс действий и почти гарантированно сохранит наши войска в безопасности, но, делая это, мы передадим контроль над большой частью Бассейна силам Лю Сяна.§!"
 SZC_battle_suining_chengdu: "§gСамый быстрый путь отхода из Суйнина ведет прямо к нашей столице Чэнду, но Сян быстро продвигается в бассейн. Может не хватить времени, чтобы добраться до Чэнду до прибытия сил Лю Сяна.§!"
 SZC_battle_suining_hold: "§cСуйнин контролирует значительную часть дорожного движения в центральный бассейн Сычуани и из него, но он также намного ближе к штаб-квартире Лю Сяна в Чунцине, чем наша собственная в Чэнду. Нашим силам, возможно, придется оставаться опасно рассредоточенными, чтобы держать линии снабжения открытыми.§!"

 sichuan_events.56.t: "Бегство на Север"
 sichuan_events.56.d: "После тщательного планирования и осторожных приготовлений нашим силам удалось организовать и осуществить организованный отход из Суйнина. Мало что военного назначения было оставлено, когда они отступили на север, их численность была полностью сохранена как в людях, так и в технике. Хотя Лю Сян теперь контролирует регион, силы альянса находятся в гораздо лучшем положении, чтобы справиться с любыми будущими вторжениями его сил. Ситуация может быть далека от идеальной, но выбор безопасной альтернативы выиграл губернатору [ROOT.GetLeader] драгоценное время и спас много жизней."
 sichuan_events.56.a: "Мы, по крайней мере, вывели наши войска в безопасности."

 sichuan_events.57.t: "Битва в Цзяньяне"
 sichuan_events.57.d: "Самый быстрый маршрут был также самым предсказуемым. По пути в Чэнду силы альянса были атакованы во фланг наступающими армиями Лю Сяна. Несмотря на доблестное сопротивление, силы альянса были уничтожены, так как они были атакованы на открытой местности солдатами Лю Сяна. Хотя некоторым силам удалось вырваться из тяжелой ситуации и выжить, чтобы сражаться в другой день, ценная живая сила и техника были потеряны в поспешном отступлении."
 sichuan_events.57.a: "Это нехорошо."

 sichuan_events.58.t: "Окружены в Суйнине"
 sichuan_events.58.d: "С момента издания приказа удерживать Суйнин любой ценой уверенный в себе Лю Цуньхоу заставил свои силы окопаться и подготовиться к неизбежному штурму. Пока силы Лю окопались, силы Лю Сяна выдвинулись и окружили город своим подавляющим преимуществом в численности, в то время как защитники ничего не подозревали.\n\nБитва была травмирующе короткой, так как большинство сил Департамента вооружения сдались толпами, как только пришло осознание того, что они просто вырыли себе могилы вокруг обреченного города, принеся Лю Сяну полную победу. Опозоренный Лю Цуньхоу бежал на север к Чжили, едва избежав плена после этой стратегической ошибки."
 sichuan_events.58.a: "Катастрофа!"

 sichuan_events.59.t: "Нэйцзян под штурмом"
 sichuan_events.59.d: "Силы Лю Сяна и Ян Сэня в последнее время вели тяжелые бои за переправы через реки вокруг Нэйцзяна. Речные переправы имеют огромное стратегическое значение, так как тот, кто контролирует их, фактически контролирует ворота в Сычуаньскую впадину. Эти битвы бушевали с момента начала боевых действий, но кажется, что Лю Сян начал подготовку к началу последнего наступления для захвата плацдармов.\n\nНесмотря на численное превосходство противника, [ROOT.GetLeader] посоветовали воспользоваться возможностью направить силы Лю Сяна в хорошо подготовленную оборону вдоль вышеупомянутых плацдармов, где надеются, что их численность будет сокращена, хотя это, безусловно, будет дорогостоящей победой, если мы стремимся сдержать всю мощь его сил.\n\nДовольно изобретательно предложенное Ся Чжуном, альянс мог бы поручить своим инженерам заминировать плацдармы, чтобы взорвать их и поймать силы Лю Сяна в ловушку. Однако это оказалось бы дорогостоящим в долгосрочной перспективе, так как стратегическая инфраструктура региона осталась бы в руинах."
 sichuan_events.59.a: "Защищать плацдармы любой ценой!"
 sichuan_events.59.b: "Пусть переправляются, затем взорвать мосты."

 SZC_battle_neijiang_defend: "§gНэйцзян контролирует некоторые из крупнейших переправ и будет хорошо расположен для атаки флангов Лю Сяна, если его удержат. Однако атаки сил Лю Сяна становятся все более интенсивными с каждым днем. Если эта тенденция сохранится, наши защитники могут быть сокрушены.§!"
 SZC_battle_neijiang_blow: "§PИспользуя взрывчатку с часовым механизмом на мостах, мы можем заманить значительную часть солдат Лю Сяна в ловушку на нашей стороне реки То, а отсутствие мостов сделает ее захват бесполезным для Лю. К сожалению, она станет бесполезной и для нас.§!"

 sichuan_events.60.t: "Нэйцзян захвачен вражескими силами"
 sichuan_events.60.d: "Солдаты и инженеры [ROOT.GetLeader] день и ночь готовили оборону плацдармов вокруг Нэйцзяна. Были вырыты траншеи, уложены мешки с песком и колючая проволока, а пулеметы и минометы были размещены в эффективных зонах поражения для любого, кто осмелится к ним приблизиться. Первые волны атакующих были скошены массово, но по мере того, как часы превращались в дни, а безжалостные штурмы не прекращались, у сил альянса [ROOT.GetLeader] начали заканчиваться боеприпасы, снаряжение и солдаты перед лицом этой подавляющей атаки. Постепенно позиции были захвачены, и многие из лучших солдат Департамента вооружения были потеряны в жестоком штурме."
 sichuan_events.60.a: "Департамент вооружения не сможет выдержать еще больше этого!"

 sichuan_events.61.t: "Битва за мосты"
 sichuan_events.61.d: "Вчера вечером под покровом темноты инженеры [ROOT.GetLeader] заложили динамит вдоль ключевых опорных конструкций плацдармов вокруг Нэйцзяна. На следующее утро силы [ROOT.GetLeader] имитировали отход от мостов, и, как и ожидалось, командующий офицер противника Лю Сяна проглотил наживку. Когда армейские колонны переправились на другую сторону, взрывчатка была подорвана. Любой, кто добрался до другой стороны, попал в засаду, когда появились силы [ROOT.GetLeader], сдаваясь толпами среди паники и неразберихи, которые последовали за этим. Любой, кто остался на другой стороне, просто беспомощно наблюдал, как их товарищи по оружию были уничтожены, что сокрушило их боевой дух. Несмотря на стоимость плацдармов, для [ROOT.GetLeader] была одержана фантастическая победа."
 sichuan_events.61.a: "Победа наконец-то!"

 sichuan_events.62.t: "Дэн Сихоу берет Чэнду"
 sichuan_events.62.d: "Удар за ударом, силы Ян Сэня и Лю Цуньхоу были доведены до грани полного краха. Чтобы предотвратить грядущую катастрофу, войска Баодина под контролем генерала Дэн Сихоу вошли в Чэнду. С силами Яна, полностью окровавленными и деморализованными их неоднократными неудачами, это был фактически бескровный переворот, так как правление Яна закончилось лишь всхлипом. После захвата Чэнду Департамент Баодина взял под полный контроль прилегающие уезды, и последние несколько сил, лояльных Яну, либо дезертировали, либо присоединились к стороне Дэна. Поскольку ситуация остается такой же тяжелой, как и прежде, теперь на Департамент Баодина ложится задача завершить то, что не смогли губернатор Ян Сэнь и генерал Лю Цуньхоу."
 sichuan_events.62.a: "Мы — последний рубеж Сычуани."

 sichuan_events.63.t: "Осада Чэнду"
 sichuan_events.63.d: "Рано утром формирования армии Лю Сяна наконец прибыли под Чэнду для того, что он надеялся, будет последней битвой его кампании. Это вполне может быть так, но это, мягко говоря, игра с высокими ставками, потому что в этот важный момент большинство его армий начали уставать от недель маршей и боев.\n\nСам город окружен каналами, отведенными от дамб Дуцзянъянь вверх по течению, и укреплен стенами, датируемыми эпохой поздней Цин, до Синьхайской революции. Какими бы старыми они ни были и построенными до времени современной артиллерии, стены все еще тянутся почти на семь миль вокруг города и достигают более тридцати футов в высоту. Фактически они образуют мощную цитадель, выдержавшую испытание временем, что делает ее прорыв сложной задачей для любой атакующей армии.\n\nЗная, что лобовая атака приведет к гибели армии Чунцина, Лю вместо этого решил осадить Чэнду. Спорадические обстрелы велись между обеими силами все утро, но ясно, что у войск Лю Сяна нет надежды прорвать оборону в ближайшее время, и поэтому они окопались для долгой осады. Хотя оборона [ROOT.GetLeader] пока держится, город станет его могилой, если он просто будет ждать за его стенами.\n\nНеобходимо предпринять быстрые действия, и командный состав уже работает над попыткой представить различные разрозненные планы контратаки для снятия осады. Хотя многие в штабе командования опасаются, что распри окажутся гибелью Чэнду."
 sichuan_events.63.a: "Судьба Сычуани висит на волоске."

 sichuan_events.64.t: "Выбор плана атаки"
 sichuan_events.64.d: "Силы Лю Сяна продвинулись к Чэнду с востока и юга и начали подвергать город тщательной осаде. В воздухе висит совершенно пронзительный факт, что все будет потеряно, если [ROOT.GetLeader] не будет действовать быстро и не организует усилия по снятию осады. Его военачальники все знают, что они просто не могут переждать это и что нападение — единственная защита в этой ситуации.\n\nОдин из таких планов, предложенных командирами [ROOT.GetLeader], состоит в том, чтобы воспользоваться их тонким распределением вокруг города, чтобы попытаться отрезать и окружить силы Лю Сяна смелым наступательным ударом по Цзяньяну. При этом надеются, что они смогут заставить сдаться его основные силы, особенно его ценные инженерные подразделения.\n\nС другой стороны, поскольку большинство их опытных сил задействовано в осаде, другие члены его высшего командования считают, что они должны отрубить голову змее, атаковав Чунцин напрямую. Город должен быть слабо защищен резервными подразделениями Сяна под командованием мэра Пань Вэньхуа, и его захват массово дезорганизует усилия Лю из-за жизненно важной инфраструктуры города.\n\nНаконец, в рядах [ROOT.GetLeader] есть офицеры, которые предостерегают его от того, чтобы класть все яйца в одну корзину, призывая его вместо этого разделить свои силы и атаковать обе цели одновременно, лишая их шансов укрепить свои объекты.\n\nЕдинственное, в чем, похоже, согласны высшие командования, так это в том, что какой бы курс действий ни был выбран, его необходимо тщательно обдумать, так как права на ошибку нет."
 sichuan_events.64.a: "Двигаться к Цзяньяну, чтобы окружить его силы."
 sichuan_events.64.b: "Двигаться к Чунцину, он будет слабо защищен."
 sichuan_events.64.c: "Разделить силы на две группы и начать наступление по двум направлениям."

 SZC_troop_mobilisation_jianyang: "§lЛучшие силы Лю Сяна сосредоточены вокруг Чэнду из-за продолжающейся осады, и наши силы могут отрезать линии снабжения Сяна из Чунцина, взяв близлежащий город Цзяньян. Нам понадобятся все наши доступные силы для этого курса действий, что оставит юг без присмотра, возможно, давая Офицерскому департаменту возможность.§!"
 SZC_troop_mobilisation_chongqing: "§PПродолжающийся контроль над Чунцином абсолютно жизненно важен для военных усилий Лю, и его захват станет смертельным ударом для его дела. С другой стороны, Пань Вэньхуа командует значительным гарнизоном в городе. Если нам не удастся быстро преодолеть оборону города, мы рискуем попасть в клещи между гарнизоном и любыми войсками, которые Лю Сян отправит для противодействия нашему продвижению.§!"
 SZC_troop_mobilisation_split: "§gРазделение наших сил на две атакующие группы не позволит Сяну и Вэньхуа подкреплять друг друга, но это означает, что нашей армии придется сражаться с большей частью армии Лю Сяна одновременно. Силы Лю Сяна сильны, и наша армия может не справиться с задачей.§!"

 sichuan_events.65.t: "Гамбит Ян Сэня"
 sichuan_events.65.d: "Растянув свои силы, самые опытные войска под командованием Лю Сяна были брошены на осаду столицы [ROOT.GetLeader], в то время как фланги и тыл охранялись свежими призывниками из их резерва. Действуя быстро, его силы сумели смести тонко распределенные отряды арьергарда Лю. Их численное превосходство было потрачено на попытку окружить Чэнду, и теперь они были полностью отрезаны, застряв между основными силами [ROOT.GetLeader] и относительно нетронутым гарнизоном Чэнду."
 sichuan_events.65.a: "Не дайте им уйти!"

 sichuan_events.66.t: "Ситуация меняется"
 sichuan_events.66.d: "Силы Лю Сяна поставили себя в опасное положение, бросив своих самых опытных солдат против обороны Чэнду в попытке «все или ничего» выбить [ROOT.GetLeader] из войны. После того, как основные силы Лю Сяна были отрезаны, последовал быстрый бой между силами [ROOT.GetLeader] и пойманным в ловушку авангардом армии Лю Сяна, теперь отчаянно пытающимся вырваться из окружения. Не имея куда отступать и не надеясь на спасение, вскоре моральный дух и сплоченность подразделений в их рядах сломались, что привело к их массовой сдаче в плен.\n\nС безопасностью Чэнду [ROOT.GetLeader] получил задачу перенести инициативу прямо в сердце врага!"
 sichuan_events.66.a: "Вперед, к Чунцину!"

 sichuan_events.67.t: "Силы федералистов вторгаются в Сычуань"
 sichuan_events.67.d: "С силами Лю Сяна в беспорядке, союзные силы Сюн Кэу под руководством Юй Цзитана также перешли в Сычуань из Тунжэня в Гуйчжоу и начали занимать уезды. Хотя в обычное время такая атака не была бы серьезной угрозой, продолжающееся существование подразделений в гарнизоне Чунцина, ранее находившихся под контролем Лю Сяна, и, что более тревожно, циркулирующие слухи о контактах между Гарнизоном, силами Сюн Кэу и Офицерским департаментом, вызвали опасения по поводу нечестивого союза между тремя для противодействия Ян Сэню."
 sichuan_events.67.a: "Подождите, что?"

 sichuan_events.68.t: "Армия Лю рушится"
 sichuan_events.68.d: "Сделав большую ставку на быструю победу и потеряв все, растянутый, незащищенный и истощенный авангард армии Лю Сяна был полностью разгромлен после недель боев без оглядки на потери. Лю Сян теперь смотрит на полное поражение на фронте и предательство в тылу. Деморализованные своими многочисленными неудачами, и с потерей их жизненно важного оплота Чунцина, его оставшиеся войска начали дезертировать и массово переходить на другую сторону. Тем временем Лю Сяна нигде не найти, предположительно он бежал из Сычуани как трус, вместо того чтобы разделить судьбу своих солдат. Поскольку от этой некогда грозной силы осталось лишь символическое сопротивление, это лишь вопрос времени, когда они сдадутся полностью."
 sichuan_events.68.a: "Давно пора!"

 sichuan_events.69.t: "Альянс против Ян Сэня"
 sichuan_events.69.d: "Предательство и обстоятельства слишком часты в бассейне Красной реки, и, несмотря на полное поражение Лю Сяна, провинция далеко, далеко не едина. Поскольку слухи об альянсе для сдерживания губернатора Ян Сэня циркулируют по всей Сычуани, похоже, они должны были осуществиться. Похоже, что был заключен нечестивый союз, чтобы победить действующего губернатора раз и навсегда.\n\nВключая остатки сил Лю Сяна, вторгающуюся армию Сюн Кэу и оппортунистический Офицерский департамент Ли Цзяюя, они доказали, что почти достаточно сильны, чтобы соперничать с недавно победившими силами Альянса Ян Сэня, и, таким образом, похоже, что Сычуань вступает в новую фазу гражданской войны."
 sichuan_events.69.a: "Мы победили их раньше, и сделаем это снова!"

 sichuan_events.70.t: "Столкновения в Цзылюцзине"
 sichuan_events.70.d: "Несмотря на союз между Офицерами и Федералистами, не все потеряно. Поскольку две силы еще не соединились, Ян Сэнь все еще сохраняет инициативу в конфликте. Объединенные, они представляют собой мощную силу. Поодиночке многие из их подразделений, в частности Сюн Кэу, представляют собой разношерстную милицию и призывников против ветеранской армии, какой бы истощенной она ни была. Любой умный генерал воспользовался бы этой возможностью, чтобы нанести удар, пока они все еще разделены, и, несмотря на то, что до сих пор в этом районе наблюдались лишь небольшие стычки, большая битва между тремя силами неизбежна.\n\nСилы [ROOT.GetLeader] в этом районе возглавляет Ся Цзюн, близкое доверенное лицо Ян Сэня. Силы, которыми он командует, в основном ветераны с несколькими победами на своем счету и изрядным количеством тяжелой техники, все еще нетронутой. Его враги представляют собой силу столь же опытных, но плохо оснащенных сил федералистов во главе с Юй Цзитаном и сил Чунцина во главе с Ван Линцзи. Учитывая все прочие обстоятельства, обоих не следует недооценивать. Место битвы выбирает Ся — район вокруг Цзылюцзина представляет собой смесь холмов и равнин с большим количеством лесов."
 sichuan_events.70.a: "Захватить Цзылюцзин и использовать его как опорный пункт."
 sichuan_events.70.b: "Атаковать силы Чунцина, прежде чем они соединятся."
 sichuan_events.70.c: "Имитировать атаку, затем отступить, чтобы выманить Юй Цзитана."

 SZC_ziliujing_defense: "§lЦзылюцзин, вероятно, будет точкой, где враг намерен соединиться перед тем, как направиться в Чэнду. Мы возьмем город и превратим его в оборонительный опорный пункт. Им придется взять город, чтобы соединиться, или подставить свои фланги под нашу неизбежную атаку с этой позиции.§!"
 SZC_ziliujing_attack_headfirst: "§lСамой большой угрозой, без сомнения, является гарнизон Чунцина, предпочитая агрессивное наступление, Ся Цзюн атакует их силы в лоб, прежде чем они смогут соединиться.§!"
 SZC_ziliujing_feign_withdraw: "§PФедералистские силы могут быть свежими, но многим из них не хватает опыта, и они плохо управляются — сосредоточение атаки на них должно дать Ся Цзюну инициативу и пространство для обхода сил гарнизона Чунцина с фланга.§!"

 sichuan_events.71.t.pincer: "Штурм Туннаня"
 sichuan_events.71.d.pincer: "Считая силы Чунцина более легким противником, Ся Цзюн приказал своим уставшим, но решительным силам двигаться на восток, чтобы нанести удар по ним первыми, надеясь сокрушить их, прежде чем они смогут соединиться с силами федералистов. Хотя это не легкая добыча по любым оценкам, все же факт, что военные поражения Лю Сяна израсходовали большую часть его лучших солдат и снаряжения. Силы гарнизона были легче оснащены, особенно артиллерией. Судьба этой авантюры решится за пределами Туннаня, города к северо-западу от Чунцина.\n\nКогда две армии вступили в контакт, стало ясно, что атака опрометчивого Ся Цзюна ожидалась, и гарнизон Чунцина готовился удерживать свои позиции. Несмотря на то, что они бросили все силы в бой, силы Ся Цзюна были сильно потрепаны, прежде чем сумели выбить силы Чунцина с их оборонительной позиции. Однако цена победы была велика, и силы Офицерского департамента маневрировали в направлении Чэнду, в то время как федералистские силы подготовились противостоять измученным остаткам армии Ся Цзюна."
 sichuan_events.71.a.pincer: "Это катастрофа!"

 sichuan_events.71.t.stalemate: "Тупик в Цзылюцзине"
 sichuan_events.71.d.stalemate: "Как и ожидалось, захват самого Цзылюцзина был легкой частью, и его удержание тоже не было бы серьезной проблемой. Однако, сделав это и положившись на смесь статической и эластичной обороны против того, что оказалось очень мобильной и агрессивной силой, столкновение вокруг Цзылюцзина вскоре превратилось в клетку для его завоевателей.\n\nВместо того чтобы заглотить наживку, федералистские силы знали, что атака на такой очевидный опорный пункт будет катастрофой, и вместо этого полагались на тактику «ударил-убежал». Решив полагаться на сильную оборону, а не на мобильное наступление, Ся Цзюн уступил инициативу своим врагам. После нескольких дней спорадических боев с легкими потерями с обеих сторон прибыл резерв Ван Линцзи из Чунцина, чтобы сменить силы Юй Цзитана. Теперь ветераны-федералисты были поддержаны оставшейся мощью армии Лю Сяна с ее тяжелым оборудованием. Таким образом, форт стал ловушкой, так как артиллерия Ван Линцзи теперь обрушивалась на его стены, ограничивая передвижения его защитников. Хотя сам город был в безопасности из-за того, что ни одна из сторон не хотела рисковать жизнями его жителей, любая попытка выйти привела бы к большим потерям для сил Ся. В то время как части сил Ван Линцзи и Юй Цзитана остаются задействованными в Цзылюцзине, большой отряд был отправлен в сторону Чэнду по теперь открытой дороге, вербуя по пути обиженных гражданских лиц и дезертиров из старой армии Лю Сяна. С каждым шагом они становятся сильнее, в то время как [ROOT.GetLeader] слабеет за своими стенами.\n\nНесмотря на то, что силы Ся скованы, он уже составил планы безопасного отхода и должен быть в состоянии выбраться с большей частью своих сил нетронутыми. Плохая новость в том, что к тому времени, как он это сделает, сомнительно, останется ли Чэнду, который он сможет освободить."
 sichuan_events.71.a.stalemate: "Его армия может быть в безопасности. Чэнду — нет..."

 sichuan_events.72.t: "Падение Чэнду"
 sichuan_events.72.d: "После многочисленных сражений, дорогостоящей осады и призыва на помощь в атаке на Цзылюцзин, гарнизон Чэнду стал тенью того, чем он был когда-то. Не желая терпеть еще одну осаду без какой-либо надежды на помощь, гарнизон просто поднял белый флаг над главными воротами города, вместо того чтобы подвергать людей города и историческое наследие бессмысленной смерти и разрушению. Хотя могучие стены города остаются несломленными, этого нельзя сказать о воле к борьбе среди тех, кто за ними. Чэнду теперь находится под контролем Офицерского департамента, и, таким образом, кажется, заканчивается последний раунд гражданской войны в Сычуани. Победившие силы ликуют, празднуя на в основном пустых улицах древнего города. Его жители остаются в домах, и на данный момент большинство просто испытывает облегчение от того, что война закончилась."
 sichuan_events.72.a: "Молодые офицеры одержали победу."

 sichuan_events.73.t: "Маршрут федералистов"
 sichuan_events.73.d: "Поскольку они не участвовали в боях, кроме множества стычек на протяжении многих лет, немногие были по-настоящему осведомлены о возможностях сил Сюн Кэу. Действуя в тех же районах, что и повстанцы Восточной Сычуани или Промышленный корпус Люй Чао, Ся Цзюн решил относиться к своему противнику так же, как к своим современникам, выманивая их на открытый конфликт. Ему помогало относительное отсутствие опыта у Юй Цзитана, так как более опытные офицеры Сюна были отправлены в другое место.\n\nПлан был рискованным, но Ся — человек, известный своим предпочтением действий и тем, что жертвы неизбежны. Его основные силы должны были оставаться сосредоточенными в тылу, а несколько передовых отрядов были отправлены в качестве приманки для армии федералистов. В течение всего утра силы Юй Цзитана проводили разведывательные атаки против своих врагов. Хотя поначалу они были безуспешными, в конечном итоге Юй Цзитан пришел к выводу, что эти передовые силы, вероятно, были единственными силами Департамента ускоренного обучения в этом районе, так как они не получили подкрепления, не отступили и не сообщили о его деятельности. Осознав, что силы Юя перешли к полномасштабному лобовому штурму, передовые отряды Ся быстро отступили, так как на их пути были подавляющие силы. Потери были нелегкими, но достаточно многие из них сумели вернуться к своим позициям.\n\nИспользуя преимущество, силы Юя догнали отступающие силы, но были обстреляны артиллерией и пулеметными гнездами, которые установил Департамент ускоренного обучения. Ловушка захлопнулась, но теперь перед ними стояла незавидная задача попытаться завершить свою ловушку. Силам Цзитана не хватало тяжелого оборудования, но они все еще были грозной силой, ведомой моральным духом и упорством. К концу первого дня федералисты отступили, надеясь выманить врага на более выгодную позицию. Когда Ся Цзюн удержал свои силы на месте, вместо того чтобы попасться на свою собственную уловку, штурмы продолжались и на следующий день. Все это время силы из гарнизона Чунцина не могли оказать поддержку, так как их тяжелое оборудование означало, что пройдет не менее половины недели, прежде чем они смогут установить контакт с двумя сражающимися генералами.\n\nПосле дней боев Юй Цзитан понес сокрушительные потери и был вынужден отступить, чтобы перегруппироваться и восстановиться. Как только Ван Линцзи получил известие, что силы, с которыми он должен был соединиться, были разбиты в бою, он решил повернуть назад к Чунцину. Гамбит был дорогостоящим, но он принес победу Департаменту ускоренного обучения, и дорога на Чунцин была теперь открыта."
 sichuan_events.73.a: "Опасный гамбит принес победу."

 sichuan_events.74.t: "Падение Чунцина"
 sichuan_events.74.d: "После короткой осады сердце того, что составляло клику Лю Сяна, было захвачено решительными солдатами [ROOT.GetLeader]. Несмотря на сильное истощение в результате жестокой гражданской войны, небольшой гарнизон древнего города под командованием Ван Линцзи оказал жесткое, хотя и бесполезное сопротивление, поскольку войска Ся Цзюна зачищали их улицу за улицей в последующие дни. После нескольких дней боев Верхний город наконец пал, а с ним и промышленность города. Бои, однако, оставили части города в руинах, включая многие его заводы и критически важную инфраструктуру.\n\nПотеряв всякие надежды на победу, вместе с их бывшим союзом, большинство оставшихся войск Офицерского департамента начали отступать обратно в свои владения. Война наконец закончилась, и Ян Сэнь сохранил контроль над Сычуанью."
 sichuan_events.74.a: "Мы победили."

 sichuan_events.75.t: "Чунцин под штурмом"
 sichuan_events.75.d: "Война начала сказываться на силах Ян Сэня. Когда они приблизились к Чунцину, ветераны этих сил были полны желания наконец оказаться на грани победы, но также хорошо осознавали тот факт, что они собираются взяться за трудную задачу, которая лежала впереди. Им предстояло захватить не только последний оплот врага, но и взять один из главных промышленных центров Китая. Битва за этот город, безусловно, будет трудной, так как каждый из могучих заводов города можно было легко превратить в крепость для любого защитника.\n\nХотя время имеет существенное значение, лобовая атака — очень трудная задача. Холмистые районы вокруг города могли бы предоставить силам [ROOT.GetLeader] отличные позиции для наблюдения и размещения артиллерии, давая им огромное стратегическое преимущество. Некоторые командиры на местах предполагают, что время, которое потребуется для обеспечения этих позиций, чтобы воспользоваться ими, — это время, которого у нас просто нет, предпочитая вместо этого быстрый штурм против потрепанных остатков сил Лю Сяна."
 sichuan_events.75.a: "Занять позиции на холмах перед атакой."
 sichuan_events.75.b: "Штурмовать город, у нас мало времени!"

 SZC_chongqing_hills: "§PНаши офицеры на местах настаивают, что мы должны занять холмы и использовать их в наших интересах. Это может спасти много жизней и обеспечить большое стратегическое преимущество в предстоящей битве, как против Чунцина, так и против наших преследователей. Это, однако, требует времени и растянет наши силы.§!"
 SZC_chongqing_assault: "§gНаши генералы настаивают, что у них достаточно численности, чтобы взять город лобовой атакой. Поскольку каждая потраченная впустую минута позволяет врагу укрепиться дальше, в то время как вторая армия приближается к их флангам, этот призыв к тотальному штурму вряд ли лишен оснований.§!"

 sichuan_events.76.t: "Поражение в Чунцине"
 sichuan_events.76.d: "Столкнувшись только с трудными вариантами, прямой штурм против плохо оснащенного гарнизона казался наиболее вероятным для успеха. Не теряя времени, силы атаковали под прикрытием артиллерийского огня, штурмуя траншеи, окружающие город. После нескольких часов боев Департамент вооружения захватил эти позиции, хотя и ценой больших потерь. Поспешное развертывание также означало, что неточная артиллерия имела довольно ограниченный эффект на поле боя. Хуже того, как только траншеи были взяты, стало ясно, что Пань Вэньхуа удалось постепенно отвести свои силы по мере продвижения атакующих. Он сделал ставку на эффективную сдерживающую операцию, и это сработало.\n\nПоскольку вбегать в город ночью было бы дезорганизованным самоубийством, Департамент вооружения мог только ждать рассвета на окраинах древнего города, в то время как Пань Вэньхуа спешил подготовить новую оборону внутри самого города и эвакуировать гражданских лиц во внутренние районы Чунцина. Как только наступил рассвет, каждая фабрика и каждое правительственное учреждение были превращены в импровизированный форт. Прогресс был медленным, и Департамент вооружения вскоре увяз в уличных боях. После второй ночи с небольшим прогрессом ситуация стала отчаянной, поскольку подкрепление врага быстро приближалось. Зная, что они будут уничтожены, если окажутся зажатыми между двумя армиями, на следующий день боев не было. Вместо этого несколько солдат были отправлены с белым флагом для обсуждения их сдачи. Она была принята Пань Вэньхуа вскоре после этого, завершив короткую битву за Чунцин катастрофой для Департамента вооружения.\n\nВ конце концов, атакующая сила стала военнопленными, и с уничтожением некоторых из самых опытных солдат из их боевого порядка, теперь очень маловероятно, что Департамент вооружения сможет восстановиться. Слухи об этом поражении уже распространяются среди людей, несмотря на все усилия цензоров в Чэнду. Сказать, что их воля сопротивляться Лю Сяну уменьшилась, было бы преуменьшением."
 sichuan_events.76.a: "Теперь все кончено..."

 sichuan_events.77.t: "Падение Чунцина"
 sichuan_events.77.d: "Двигаясь ночью, холмы были взяты с относительной легкостью. Гарнизон Чунцина, очевидно, сосредоточил свою оборону на самом городе в подходе «все или ничего», вероятно, потому что у Пань Вэньхуа тоже вряд ли есть лишние солдаты. До рассвета инженеры [ROOT.GetLeader] установили позиции на холмах, после чего под покровом темноты прибыли легкая артиллерия и наблюдатели. Как только наступил рассвет, его солдаты смогли начать штурм города, в то время как вражеские силы все еще были далеко позади них. Их атака была инициирована залпом, который был столь же точным, сколь и разрушительным против укреплений защитников, и вскоре закипела битва за сам город.\n\nНесмотря на шансы, сердце фракции Лю Сяна вскоре было захвачено силами Яна. В последующие часы небольшой гарнизон древнего города оказывал неорганизованное сопротивление, пока Департамент вооружения следовал за Департаментом ускоренного обучения, зачищая их улица за улицей. Быстрота штурма и ярость бомбардировки разрушили планы Вэньхуа постепенного отступления в город, и теперь его силы зачищались быстрыми темпами. Вскоре город и его мощная промышленность окончательно пали. Бои, однако, оставили части города в руинах, включая многие его заводы и критически важную инфраструктуру. Когда пыль улеглась, Пань Вэньхуа нигде не было. Предполагается, что он либо погиб в битве за город, либо сбежал давно.\n\nГород пал так быстро, что силы, посланные для его освобождения, понятия не имели о его судьбе. Таким образом, они были встречены обстрелом с гор и огнем с окраин города, когда они приближались. Быстро поняв, что они опоздали, увидев знамена Департамента вооружения, развевающиеся над городом, они поспешили поднять белый флаг. Их капитуляция была принята без дальнейшего кровопролития, и их захват теперь означает, что силы Лю больше не являются фактором."
 sichuan_events.77.a: "Великая победа!"

 sichuan_events.78.t: "Войска Лю Сяна начинают распадаться"
 sichuan_events.78.d: "Лю Сян сделал большую ставку на быструю победу и потерял все. Растянутый, незащищенный и истощенный неделями боев без оглядки на потери, авангард его сил был полностью разгромлен. Сян теперь сталкивается с полным поражением на фронте и атаками с тыла. Деморализованные своими многочисленными неудачами и с потерей их жизненно важного оплота Чунцина, его войска начали выбрасывать свои ружья и форму, надеясь сбежать в сельскую местность как гражданские лица. Поскольку от этой некогда грозной силы осталось лишь символическое сопротивление, это лишь вопрос времени, когда они сдадутся полностью."
 sichuan_events.78.a: "Давно пора!"

 sichuan_events.79.t: "Лю Сян сбегает"
 sichuan_events.79.d: "Из Чунцина поступают сообщения, что Лю Сян бросил своих солдат и бежал из Сычуани. С отсечением головы змеи то, что осталось от его сил, прекратило всякое сопротивление, либо перейдя на сторону сил [ROOT.GetLeader], либо дезертировав вообще. Война окончена, и Ян Сэнь сохранил контроль над Сычуанью."
 sichuan_events.79.a: "Мы победили."

 sichuan_events.80.t: "Поражение по частям"
 sichuan_events.80.d: "В дерзкой авантюре «все или ничего» [ROOT.GetLeader] разделил основную часть своей оставшейся армии к югу от Чэнду и приказал им атаковать города Цзяньян и Чунцин одновременно. Поскольку большая часть сил Лю Сяна была связана длительной осадой, его армии могли атаковать в обоих местах и все равно превосходить растянутого противника. Две большие армии на марше невозможно скрыть, однако ни одна из сил никогда не достигла бы пункта назначения до того, как весть о намерениях Губернатора дошла бы до врага.\n\nПерехватив инициативу, Лю Сян быстро перенаправил свои силы, оставив символические силы, чтобы убедиться, что гарнизон Чэнду остается скованным. Поскольку его план зависел от того, что противник будет занят осадой, в тот момент, когда силы Лю Сяна пришли в движение, силы [ROOT.GetLeader] сражались со временем так же яростно, как они сражались с разведчиками и местными ополченцами из сил Лю Сяна. Однако они не знали об этом факте, пока не стало слишком поздно. Инфраструктура в Сычуани была плохой до войны, и к этому моменту армия [ROOT.GetLeader] маршировала по разбитым дорогам, а радиосвязь практически отсутствовала. Две армии не понимали, что их преследуют, пока силы Лю Сяна не атаковали их сзади.\n\nВ плане не было места для ошибки, и как только две половины армии были атакованы с тыла и флангов, любое подобие сплоченности быстро распалось, поскольку они пытались занять оборонительные позиции. Потери на стороне [ROOT.GetLeader] были сокрушительными, однако его силы едва смогли начать окапываться, прежде чем последний гвоздь в крышку гроба был забит с прибытием сил гарнизона Чунцина под умелым командованием Ван Линцзи. Безнадежно уступая в численности, атакованные со всех сторон и без каких-либо шансов на выживание, многие солдаты сдались или перешли на сторону врага. Битва была проиграна, а с ней, вероятно, и война."
 sichuan_events.80.a: "Мы рискнули и, следовательно, проиграли."

 sichuan_events.81.t.battle: "Сдача Чэнду"
 sichuan_events.81.d.battle: "За последние несколько дней до командиров в Чэнду не доходило ничего, кроме плохих новостей, и даже с армейской цензурой всем в городе было ясно, что за этими высокими стенами дела идут плохо. Когда около полудня раздавались все более скудные пайки, наблюдателей города ждал неприятный сюрприз.\n\nК городу маршировали тысячи солдат в форме Департамента вооружения, за которыми следовали силы Лю Сяна. Основная часть этих сил остановилась недалеко от стен города, и только грузовик с платформой сокращал разрыв между осаждающей армией и стенами города. Грузовик не был загружен вражескими войсками или бомбами, вместо этого транспортное средство было полно высокопоставленных офицеров из Департамента вооружения. Один офицер взял мегафон дрожащими руками, и, когда гарнизон понял, кто это, он начал обращаться к солдатам, стоящим на стенах. Ван Линцзи сказал им, что они — все, что осталось от сил помощи, что их армии разбиты, и что их так называемые лидеры бежали в Пекин. Но не бойтесь, настаивал он, потому что Лю Сян был достаточно милостив, чтобы пощадить и их, и город, если они сдадутся.\n\nОтвет не заставил себя долго ждать. Командиры, отвечающие за гарнизон, знали, что при таком низком моральном духе, как только станет известно, что вся армия Департамента вооружения была разгромлена, у них наверняка начнется восстание. Высокие стены Чэнду все еще стояли, и осада закончилась не взрывом, а поднятием белого флага над теперь открытыми городскими воротами."
 sichuan_events.81.t.sapped: "Падение Чэнду"
 sichuan_events.81.d.sapped: "Шли дни, помощь не приходила в город, и инженеры Лю Сяна медленно, но верно смогли выявить слабые места обороны эпохи Цин вокруг города. Каждую ночь они трудились, подкапываясь под стены города и закладывая взрывчатку в ключевых местах. Чуть больше месяца после начала осады эта взрывчатка наконец сработала до восхода солнца. Мощные взрывы быстро проделали большие бреши в стенах, а падающие обломки заблокировали некоторые из дамб Дуцзянъянь, окружавших город. В одно мгновение стены, которые стояли так долго, рассыпались в пыль, и десятки защитников города погибли при первых взрывах. Это ознаменовало последний штурм Чэнду, и это была бы долгая и трудная битва за большой город.\n\nНесмотря на обрушение стен и захват Восточных ворот, гарнизон все еще оказывал жесткое сопротивление атакующим силам. Используя свои знания планировки города, защитные сооружения, построенные гарнизоном Чэнду и призванными гражданскими внутри города, оказались трудными для преодоления даже для значительно превосходящих атакующих сил. Куда бы они ни пошли, их встречали пулеметы, снайперы, мины и засады пехоты. Хотя гарнизон сражался доблестно, все было напрасно. К концу первого дня с наступлением ночи наступило своего рода затишье, и треть города пала. Силы Лю Сяна перегруппировались, и утром они атаковали центр города. Однако из-за нехватки людей и боеприпасов полуголодные защитники могли продержаться всего несколько часов, прежде чем были вынуждены сдать ратушу наступающему Департаменту ускоренного обучения. Это ознаменовало полный крах обороны города, и все оставшиеся силы быстро сдались. К вечеру Чэнду наконец затих, тишина, которая вскоре была нарушена приветственными возгласами победившего Департамента ускоренного обучения и его солдат.\n\nХотя он заплатил за это высокую цену, авантюра Лю Сяна за контроль над Сычуанью окупилась."
 sichuan_events.81.a: "Конец войне."

 sichuan_events.82.t: "Мобилизация войск Сикана"
 sichuan_events.82.d: "Хотя Чэнду теперь находится под контролем Баодина, судьба самой войны все еще висит на волоске, и Баодинский департамент должен работать вместе, чтобы победить. Генерал Дэн Сихоу хорошо это понимает и отправил приказ о всеобщей мобилизации войскам Баодина, вплоть до последних резервов. Наши основные силы за пределами района вокруг Чэнду — это хорошо обученные горные войска под командованием генерала Лю Вэньхуэя, в настоящее время базирующиеся в западном регионе Сикан. Он получил письмо от Сихоу, которое предписывает ему..."
 sichuan_events.82.a: "... усилить гарнизон в Чэнду."
 sichuan_events.82.b: "... двигаться на восток к Лучжоу и Чунцину."

 SZC_xikang_troops_jianyang: "§WОтправка войск к Цзяньяну позволила бы нам отрезать линии снабжения Лю Сяна из Чунцина, но это также очевидный ход. Если ему удастся предугадать наш план, он наверняка попытается помешать нашим силам соединиться.§!"
 SZC_xikang_troops_chongqing: "§WПоскольку силы Лю Сяна сосредоточены вокруг Чэнду, южный регион Сычуани вдоль реки Янцзы должен быть слабо защищен. Мобильное наступление вдоль реки к переправе в Лучжоу должно быть в состоянии сокрушить любое сопротивление и достичь Чунцина, но Лю Сян в конечном итоге поймет, что мы действительно планируем. Если наши силы недостаточно сильны, чтобы быстро захватить Чунцин, мы рискуем попасть в клещи и быть окруженными.§!"

 sichuan_events.83.t: "Гуаньсянь под тяжелой атакой"
 sichuan_events.83.d: "Лю Сян имеет историю хитрой дерзости, и на этот раз все так же. Он, похоже, правильно вычислил запланированные передвижения войск Баодина и приказал отряду своих сил, в настоящее время осаждающих Чэнду, двигаться к бывшей столице Дэн Сихоу в Гуаньсяне, к северу от Чэнду, которой теперь командует его верный подчиненный Хуан Инь. Крайне важно, чтобы город не пал, иначе силы Баодина будут разрезаны на две отдельные группы и столкнутся с той же судьбой, что и силы Ян Сэня ранее в войне. Столкнувшись с трудным решением, генерал Хуан Инь в конечном итоге выбирает..."
 sichuan_events.83.a: "... подготовить атаку на вражеские лагеря в темное время суток."
 sichuan_events.83.b: "... окопаться и укрепить позиции вокруг храма Эр Ван."
 sichuan_events.83.c: "... заблокировать канал Баопинкоу, направив его поток во вражеские лагеря."

 SZC_guanxian_night_attack_text: "§cВместо того чтобы столкнуться с полной силой армии Лю Сяна на его условиях, мы можем свести на нет численное преимущество врага с помощью хорошо спланированной ночной атаки на их лагеря вокруг Гуаньсяня. Это вызовет беспорядок в их рядах и притупит любые будущие атаки.§!"
 SZC_guanxian_fortify_er_wang: "§gВместо того чтобы идти на ненужный риск, мы используем то немногое время, что у нас есть, чтобы создать сильный оборонительный периметр вокруг наиболее защищенного места в регионе. Превратив его в мощную крепость, Сяну придется дорого заплатить за каждый дюйм, который он попытается взять.§!"
 SZC_guanxian_flood_baopingkou: "§cУчитывая численное и огневое преимущество врага, некоторые командиры предлагают, чтобы наш первый залп был не из орудий, а чтобы вода канала смела их позиции, прежде чем мы атакуем. Наводнение рискует, однако, повредить прилегающие территории.§!"

 sichuan_events.84.t.victory: "Оборона Гуаньсяня"
 sichuan_events.84.d.victory: "У Хуан Иня было мало времени на подготовку и еще меньше на маневрирование — хотя это, похоже, не встревожило ветерана-командира. Полагая, что хитрое нападение будет лучшей защитой, он запланировал серию ночных атак на врага, при этом окончательный отход его сил будет прикрыт артиллерийскими обстрелами лагерей врага. После того как Лю будет приведен в состояние беспорядка, первые волны его сил будут разбиты смесью действий арьергарда и оборонительной артиллерии, с серией пехотных контратак, направленных на то, чтобы разбить измотанных атакующих и заставить силы Департамента ускоренного обучения отступить.\n\nХотя ночной рейд был успешным и нарушил запланированное наступление Лю Сяна, битва за сам Гуаньсянь бушевала несколько дней. Большинство планов не выдерживают первого контакта с врагом, и этот тоже не выдержал. У сил Лю Сяна и Хуан Иня были свои успехи и неудачи, поскольку земля вокруг города переходила из рук в руки. Однако любой прорыв, совершенный силами Лю Сяна, быстро встречался контратакой или артиллерийским обстрелом. После трех дней боев силы Хуан Иня были сильно повреждены, но Департамент ускоренного обучения также был сильно обескровлен до такой степени, что они отменили любые дальнейшие атаки, решив вместо этого перегруппироваться, чтобы сразиться снова в другой день. Хотя битва может быть записана как ничья в учебниках истории, это стратегическая победа, которая помешала нашему врагу продвинуться на юг против Лю Вэньхуэя."
 sichuan_events.84.t.flood: "Наводнение Баопинкоу"
 sichuan_events.84.d.flood: "По приказу Хуан Иня военные инженеры принялись не строить оборону, а блокировать канал Баопинкоу таким образом, чтобы вызвать контролируемое наводнение, которое не затронуло бы позиции Баодина и нанесло бы как можно меньше ущерба гражданскому населению. Целью было затопить силы Лю Сяна и превратить их лагеря в болото. Военные инженеры усердно работали, чтобы убедиться, что ущерб системам Дуцзянъянь и прилегающим территориям будет ограничен. Понимая, что у них мало времени, они могли надеяться лишь смягчить разрушения в лучшем случае.\n\nКак только приготовления были сделаны, каналы были заблокированы деревянными плитами, и оттуда не потребовалось много времени, чтобы окружающие дамбы переполнились в сторону от своих определенных путей, прямо в лагеря Департамента ускоренного обучения. Многие солдаты были грубо разбужены, так как их палатки не давали абсолютно никакой защиты от поднимающейся воды, которая медленно превращала землю в сырое болото. Ящики с оружием были промочены, а земля, на которой стояли многие артиллерийские орудия, быстро превратилась в мягкую грязь, которая медленно поглощала более крупные орудия. Последовало поспешное отступление, войска пытались спасти как можно больше своего снаряжения от поднимающейся воды. Излишне говорить, что их брошенное снаряжение и позиции так же бесполезны для Баодина, как и для них, но они, безусловно, не смогут сейчас начать наступление.\n\nХотя это военная победа, поступают сообщения, что, несмотря на все наши усилия, ущерб системе Дуцзянъянь был значительным, и что наводнения смыли много близлежащих посевов. Однако Баодину удалось выиграть инициативу в войне, не потеряв ни одного солдата, и только они могут судить, стоил ли риск того."
 sichuan_events.84.a: "Они не пройдут!"

 sichuan_events.85.t: "Оборона Гуаньсяня рушится"
 sichuan_events.85.d: "Несмотря на сильную оборону, созданную Хуан Инем, и различные действия арьергарда против врага, подавляющая численность врага и стратегические навыки Лю Сяна оказались слишком сложными для сил Иня. Хотя Департамент ускоренного обучения заплатил высокую цену за свою победу, в немалой степени благодаря множеству артиллерийских зон поражения, созданных заранее, к третьему дню они прорвали оборону благодаря сочетанию безжалостной агрессивности и дисциплины. Была предпринята серия контратак в попытке вернуть оборонительные позиции Хуан Иня, но в конечном итоге все было напрасно, и знамя Департамента ускоренного обучения вскоре развевалось над храмом Эр Ван.\n\nУниженные этим поражением, войска Баодина были вынуждены отступать все дальше и дальше на запад. В то время как отчаянная оборона переправ Дуцзянъянь предотвратила разгром и позволила большинству войск бежать в Писянь на юго-восток, войска Хуан Иня теперь рассредоточены, защищая дамбы, и не смогут добраться до Чэнду или Мэйшаня вовремя, чтобы присоединиться к силам Лю Вэньхуэя. Теперь они сами по себе и должны сделать все возможное, чтобы защититься от удара Департамента ускоренного обучения на юг."
 sichuan_events.85.a: "Хорошо, но плохо."

 sichuan_events.86.t: "Расплата в Мэйшане"
 sichuan_events.86.d.success: "Благодаря успеху Баодина в Гуаньсяне, предотвратившему продвижение Департамента ускоренного обучения на юг, как планировалось, войска Лю Вэньхуэя смогли достичь Мэйшаня без дальнейшего вмешательства Промышленных сил. В настоящее время они пересекают реку Минь, чтобы соединиться с основными силами в Чэнду и торжествующими резервами Дэна в Гуаньсяне. Когда армии Баодина наконец соединятся, они смогут, наконец, положить конец предателю Лю Сяну и закончить эту войну."
 sichuan_events.86.d.failure: "С крахом позиций Баодина вокруг Гуаньсяня, несмотря на доблестные усилия Хуан Иня, северный фланг Ускоренных сил теперь в безопасности. Не теряя времени, Лю Сян приказал своим торжествующим силам наступать на юго-запад к переправам через реку Минь. Прибывающие силы Сикана обнаружили, что столкнулись с окопавшимся врагом через одну из крупнейших рек Сычуани. Не желая бросать своих солдат в бесполезную атаку, Лю Вэньхуэй остановил запланированное наступление.\n\nОба лагеря наблюдают друг за другом через реку, между двумя сторонами происходят лишь спорадические стычки и снайперский огонь. Оба считают переправу через реку самоубийством, факт, который предвещает гибель для Баодина и успех для его врагов. С остановкой любой попытки помощи у реки, Чэнду был отрезан. Мы можем только молиться, чтобы его защитники совершили чудо."
 sichuan_events.86.a: "Наконец-то!"
 sichuan_events.86.b: "Теперь все кончено..."

 sichuan_events.87.t: "Битва при Лунцюаньи"
 sichuan_events.87.d: "Лю Сян знал, что идет на рискованную авантюру, осаждая Чэнду, но он все еще достаточно опытный генерал, чтобы увидеть ловушку. Начав принимать меры по укреплению своих теперь уязвимых позиций, за исключением снятия осады и отступления в Чунцин, это единственная карта, которую он, казалось, готов разыграть. И защитники это заметили. В результате одновременных перемещений обе силы пытались перехитрить друг друга, что в конечном итоге привело к их столкновению в деревне Лунцюаньи, к юго-востоку от Чэнду.\n\nТо, что началось как небольшая стычка между разведывательными отрядами, вскоре переросло в полномасштабную битву. Хотя Лю Сян поначалу имел преимущество благодаря своему мастерству и огромной численности, решительная оборона сельской местности и хорошая координация между командирами [ROOT.GetLeader] позволили его подкреплениям из Чэнду и Гуаньсяня прибыть вовремя, чтобы усилить его позиции и нанести решающий удар по силам врага. С разгромом основной части его сил, единственной сплоченной силой, оставшейся от некогда могущественного Департамента ускоренного обучения за пределами Чунцина, являются символические осаждающие силы, оставленные вокруг Чэнду, теперь зажатые между огромными армиями [ROOT.GetLeader] и стенами города. Ходят слухи, что организация Департамента ускоренного обучения начала разваливаться после этого сокрушительного поражения."
 sichuan_events.87.a: "Это конец для тебя, Лю Сян!"

 sichuan_events.88.t: "Лю Сян исчезает"
 sichuan_events.88.d: "Похоже, удача Лю Сяна наконец иссякла. После разгрома в Лунцюаньи и тяжелого поражения его сил там, некогда могущественный милитарист Чунцина, по-видимому, исчез. На данный момент неизвестно, погиб ли он на поле боя или просто бежал из Сычуани, когда его поражение стало неизбежным. Как бы то ни было, тот факт, что он исчез, вызвал шок во всем регионе, не в последнюю очередь в рядах его армии, которая теперь представляет собой деморализованную оболочку самой себя."
 sichuan_events.88.a: "Достойный конец."

 sichuan_events.89.t: "Федералистские силы вторгаются из Тунжэня"
 sichuan_events.89.d: "Поскольку силы Лю Сяна в беспорядке, силы Сюн Кэу, возглавляемые Юй Цзитаном, пересекли границу провинции из Тунжэня в Гуйчжоу и начали занимать уезды в Сычуани. Хотя в обычное время такая атака не была бы серьезной угрозой, продолжающееся существование подразделений в гарнизоне Чунцина, ранее находившихся под контролем Лю Сяна, и, что более тревожно, циркулирующие слухи о контактах между Гарнизоном, силами Сюн Кэу и Офицерским департаментом, вызвали опасения по поводу нечестивого союза между тремя для противодействия Ян Сэню."
 sichuan_events.89.a: "Подождите, что?"

 sichuan_events.90.t: "Коалиция против Ян Сэня"
 sichuan_events.90.d: "С недавним вторжением федералистов в Сычуань из Гуйчжоу, совпадающим с общим хаосом по всей провинции, немногие смотрят на губернатора Ян Сэня как на кого-то иного, кроме как неудачника. Бабник для одних, непредсказуемый патриций для других и даже деспотичный модернизатор для третьих групп, хватка Яна над провинцией практически отсутствует за пределами прямых сфер контроля его Департамента ускоренного обучения. И его слабость, но одновременно восстанавливающаяся сила очевидна не только его союзникам в Вооружении, но и его врагам.\n\nНедавно, созвав секретное совещание, в рамках Сычуаньского конфликта сформировался крупномасштабный альянс, который не является чем-то особенно редким, позиционируя себя на основе борьбы против восстановленной силы Ян Сэня. Сформированный совместно с Баодинским департаментом, Федералистами, Офицерским департаментом, остатками Департамента ускоренного обучения Лю Сяна и многими мелкими группами, кажется, что Ян Сэнь оказался в меньшинстве.\n\nХотя Коалиция против Ян Сэня далека от того, чтобы действительно вытеснить действующего губернатора, она привела конфликт к ночному тупику, и многие полагают, что губернатор Ян будет просто вынужден уйти в силу обстоятельств, а не от пули."
 sichuan_events.90.a: "И они полагают, что могут навязать мир?"

 sichuan_events.91.t: "Непростой мир"
 sichuan_events.91.d: "Несмотря на все ставки и гамбиты на жестокое разрешение гражданской войны в Сычуани, похоже, что конфликт удивил как наблюдателей, так и участников тем, что, по-видимому, является модус вивенди. Вслед за союзом против Ян Сэня между Офицерским департаментом, Баодинским департаментом, остатками Департамента ускоренного обучения Лю Сяна и многими другими мелкими группами, поддерживаемый Чжили губернатор, по-видимому, был смещен его собственными бывшими союзниками. Поскольку Департамент вооружения не желает поддерживать собственный Департамент ускоренного обучения Яна, губернатор был вынужден уйти не из Чэнду, а с должности.\n\nСохраняя крупнейшую военную силу в провинции и опираясь на значительный контроль над своей территорией, Баодинский департамент сумел утвердиться над всеми другими мелкими кликами, став, по-видимому, правителями Сычуани. Хотя его незначительно оспаривают со всех сторон, ни у одной из оппозиционных сил, похоже, нет сил, чтобы действительно противостоять Баодину в одиночку, ни возможностей отбросить свою враждебность друг к другу.\n\nЗаняв должность «Губернатора», Дэн Сихоу был в значительной степени удовлетворен своим новообретенным положением в провинции. Доминируя на участках за пределами ключевых областей, таких как Чэнду и Чунцин, контроль нового губернатора далек от полного, и уже ходят слухи, что люди в его собственных рядах, такие как Лю Вэньхуэй, начали агитировать за влияние в провинциальном правительстве."
 sichuan_events.91.a: "И так Сычуань успокаивается... без последней пули."

 sichuan_events.92.t: "Гонка за Чунцин"
 sichuan_events.92.d: "После последней битвы время имеет существенное значение. Имея мало времени и не имея права на ошибку, Лю Вэньхуэй собирает свои силы для быстрого и решительного удара по Чунцину. Держать силы такого размера в тайне долго было невозможно, и это был лишь вопрос времени, когда хитрый Лю Сян снова нападет на их след."
 sichuan_events.92.a: "Выдвигайтесь!"

 sichuan_events.93.t: "Многоликий Баодин"
 sichuan_events.93.d: "Будучи по сути триумвиратом региональных милитаристов, Баодинский департамент является одной из немногих крупных военных фракций Сычуани, не имеющей корней в бассейне Красной реки. Сформированные (в основном) из выпускников Военной академии Баодин, Лю Вэньхуэй, Тянь Сунъяо и Дэн Сихоу (хотя он и не закончил обучение), трое мужчин были давними друзьями и ключевыми игроками в ранней политике Сычуани, находясь в союзе против Ян Сэня в 1925 году. Сформировав «Объединенный офис трех армий» в 1926 году, трио накопило значительное влияние в Сычуани.\n\nПоскольку Лю Вэньхуэй контролирует большую часть Восточного Сикана, а Дэн и Тянь — многочисленные уезды на севере Сычуани, троице удалось перестать быть просто пешками в сычуаньской борьбе за власть, и им предоставилась явная возможность заявить о своих правах на власть. Однако возникла одна очевидная проблема, и она всеобъемлющая. Единственная фигура, стоящая между Баодином и успехом, — это начальная спичка: племянник Лю Вэньхуэя, Лю Сян, и его большая часть Департамента ускоренного обучения.\n\nПоскольку гонка за Чунцин в самом разгаре, Лю Вэньхуэю удалось собрать быстро реагирующее подразделение, чтобы приблизиться к городу со своей позиции на западе. Однако, услышав новости о такой авантюре, Дэн Сихоу и Тянь Сунъяо телеграфировали своему «партнеру», настаивая на том, что захват Чунцина как части их сферы влияния является их прерогативой. Хотя ни Дэн, ни Тянь, ни Лю не хотят раскола в рядах Баодина в такой ответственный момент, необходимо принять окончательное решение; и многие возлагают мало надежд на довольно непроверенную силу войск Дэна и Тяня по сравнению с элитным ядром Лю Вэньхуэя."
 sichuan_events.93.a: "Положиться на ядро Лю Вэньхуэя."
 sichuan_events.93.b: "Отдать предпочтение силам Дэна и Тяня."

 sichuan_events.95.t: "Смелый гамбит Лю Вэньхуэя"
 sichuan_events.95.d: "С самого начала этой войны у Лю Вэньхуэя был смелый план: захват Чунцина прямо из-под носа Лю Сяна, пока его люди связаны осадой Чэнду. Смелый и рискованный ход, безусловно, но гораздо более реалистичный, чем победа над огромной армией Лю Сяна в открытом бою.\n\nДержать армию такого размера скрытой долго было невозможно. Это был вопрос времени, когда силы Лю Сяна в конечном итоге узнают о махинациях армии Баодина. Как и ожидалось, Лю Сян приказал отряду своих сил покинуть осаду Чэнду, чтобы перехватить армию своего дяди. Однако весь этот план развалился среди гор и рек Сычуани, так как войска, посланные атаковать силы Лю Вэньхуэя, стали жертвами постоянных атак сычуаньских повстанцев, стычек сил федералистов и редких столкновений с Офицерским департаментом.\n\nЗасады, ловушки и перекрытые дороги означали, что любая надежда на подкрепление Чунцина была совершенно тщетной. Городской гарнизон Ван Линцзи в Чунцине теперь был сам по себе, поскольку ничто не казалось способным остановить силы Баодина на данном этапе."
 sichuan_events.95.a: "Теперь нужно сделать так, чтобы их усилия стоили того."

 sichuan_events.96.t: "Падение Чунцина"
 sichuan_events.96.d: "Отправка основной части армии Баодина в Чунцин была ставкой «все или ничего», но такой, где шансы казались в нашу пользу, благодаря нашей выгодной стратегической позиции. Хотя Лю Сян предвидел этот шаг, он не планировал непредсказуемую роль сычуаньских повстанцев, федералистов и других разнообразных групп.\n\nКак бы то ни было, Чунцин все еще был хорошо защищенным городом, будучи бьющимся сердцем промышленности Сычуани. Командиры Баодина известны своим мастерством, и это проявилось бы во время этой битвы. Выбрав методичный подход, защитники Чунцина вытеснялись по одной улице за раз. Однако, несмотря на размер города и его гарнизона, город не продержался долго. Как только Ван Линцзи узнал, что силы помощи Лю Сяна не прибудут по крайней мере еще неделю из-за непрерывных атак партизан Офицеров, он проглотил свою гордость и обратился с предложением о сдаче, вместо того чтобы видеть, как город, мэром которого он был, превращается в руины."
 sichuan_events.96.a: "Великая победа!"

 sichuan_events.97.t: "Крах Департамента ускоренного обучения"
 sichuan_events.97.d: "Чунцин был жизненно важным оплотом для сил Лю Сяна из-за множества заводов города и контроля над движением по реке Янцзы. Отрезанные от этой жизненно важной артерии после сдачи Ван Линцзи, войска Лю Сяна, в настоящее время осаждающие Чэнду, перестали получать столь необходимые припасы, такие как продовольствие, боеприпасы и оружие. Возможно, самым страшным из всего этого является то, что зарплаты солдат также перестали поступать с полным параличом административных функций Чунцина. Без оружия, зарплаты или даже функциональной структуры руководства дезертирство и неповиновение стали широко распространенными. Осада Чэнду уже пошатнулась, поскольку большинство солдат и офицеров чувствуют, что война проиграна, и в сельской местности силы Департамента ускоренного обучения начали таять по мере того, как до них доходили новости о падении Чунцина. Большинство просто выбросили свои винтовки и направились обратно в свои дома, не желая сражаться за проигранное дело.\n\nПосле того как его переиграли во взаимной игре с высокими ставками, Лю Сян полностью потерял контроль над ситуацией. Видя, как его армия распадается, и не желая отвечать перед правосудием за свое предательство, он решил бежать вместе с тем, что осталось от его ближайшего окружения. Без своей столицы, без своих заводов и без своего лидера Департамент ускоренного обучения теперь полностью побежден. Победа за нами."
 sichuan_events.97.a: "Мы торжествуем."

 sichuan_events.98.t: "Катастрофа в Бэйпэе"
 sichuan_events.98.d: "Полагаясь на силы Дэна и Тяня, Баодин двинулся к Чунцину, стремясь отбить город у Лю Сяна, одновременно сражаясь с различными повстанцами и бандитами без поддержки Лю Вэньхуэя. Предвидя этот шаг, Лю Сян смог приказать части своих основных сил двигаться на перехват наступающей армии противника, не беспокоясь о прорыве осады Чэнду. В немалой степени благодаря настойчивым преследованиям со стороны повстанцев, силы Баодина были значительно замедлены, что позволило элементам резервов Ван Линцзи из Чунцина мобилизоваться, пока Лю Сян преследовал армию Баодина. Это в конечном итоге привело к тому, что они попали в клещи между двумя наступающими Ускоренными армиями возле города Бэйпэй, к северу от Чунцина. Последовала отчаянная оборона.\n\nОкруженная и отрезанная, армия Баодина находилась в ужасном положении. Районы вокруг города не предоставляли хороших оборонительных позиций, что еще больше усугублялось ужасной ситуацией со снабжением. Каким бы опытным он ни был, у Хуан Иня были считанные часы, чтобы подготовить что-то похожее на оборону. Поставленная перед ним задача была просто невыполнима, учитывая его собственную тяжелую ситуацию и превосходство противника. Силы Баодина храбро стояли на своем, но менее чем через час реального боя импровизированная оборона рухнула под комбинированными атаками армии Лю Сяна. С разрешения Дэн Сихоу основная часть солдат и их офицеров вскоре после этого сдалась, не желая отдавать свои жизни за битву, которую невозможно выиграть."
 sichuan_events.98.a: "Теперь все кончено..."

 sichuan_events.99.t: "Лю Вэньхуэй отступает в Сикан"
 sichuan_events.99.d: "Часть того, чтобы быть хорошим офицером, — это понимать, когда ты побежден, и отступать, пока есть шанс спасти жизни твоих солдат. Хотя катастрофа в Бэйпэе ознаменовала конец любого эффективного сопротивления основной армии Баодина, их оборона против неожиданного клещевого движения позволила ему бежать со свитой своих ближайших людей. Это было на волоске, и он лишь чудом избежал плена сначала наступающими солдатами армии Лю Сяна, когда бежал на запад.\n\nПока он собирает свои оставшиеся силы в относительной безопасности гор Сикана, Чэнду и его защитники остались одни."
 sichuan_events.99.a: "По крайней мере, он выбрался целым."

 sichuan_events.100.t: "Дэн Сихоу сдается"
 sichuan_events.100.d: "Поскольку авангард Лю Сяна направился обратно на север, чтобы продолжить осаду Чэнду в полную силу, Баодинский департамент решил принять неизбежное. С разгромом сил Хуан Иня Дэн Сихоу знает, что у него нет шансов одолеть объединенные силы Департамента ускоренного обучения и что продолжение борьбы просто приведет к бессмысленной гибели его собственных солдат и людей за стенами Чэнду. В результате Дэн отправил эмиссара в полевой штаб Лю Сяна за пределами Чэнду, чтобы попросить о прекращении огня. Учитывая его слабую переговорную позицию, единственное, о чем он просит в обмен на мирную передачу Чэнду Лю Сяну, — это безопасный проход из Сычуани для Дэна и руководства Баодина. Лю Сян, зная, что разрушенный город и высокие потери не помогут ему объединить страну, все еще осаждаемую мелкими милитаристами и партизанами, поспешил принять и выполнить сделку.\n\nХотя стены Чэнду все еще стоят, ворота были открыты для торжествующих солдат Департамента ускоренного обучения. На данный момент большинство жителей Чэнду просто испытывают облегчение от того, что война скоро закончится и что они были избавлены от прямого штурма."
 sichuan_events.100.a: "Так это заканчивается. Или начинается?"

 sichuan_events.101.t: "Губернатор Сяо вторгается в Эньши"
 sichuan_events.101.d: "Регион Шихи в юго-западном Хубэе, ранее контролируемый [SZC.GetNameDef], был разделен между де-юре и де-факто губернаторством с момента завершения боевых действий в Западном Китае после реставрации Сюаньтуна. Разгневанный этим, губернатор Хубэя Сяо Яонань постоянно подавал петиции Центральному правительству с просьбой действовать и захватить территорию как законные земли Хубэя. Однако это так и не было реализовано, так как Правительство ценило стабильность и добрую волю с Ян Сэнем больше, чем подстрекательство.\n\nОднако после краха власти Цин регион был захвачен силами губернатора Сяо Яонаня в ходе независимого разбойничьего акта. Ему удалось сокрушить местные гарнизоны [SZC.GetAdjective] и получить ценный приз для своего положения в клике Чжили. Сообщалось, что Департамент ускоренного обучения организовал какое-то тщетное сопротивление большой армии клики Чжили, и Сычуань уже отправила дивизии, чтобы попытаться вернуть регион, но силы Сяо Яонаня пока смогли отбить их с относительной легкостью."
 sichuan_events.101.a: "Он не может победить целую клику в одиночку!"

 sichuan_events.102.t: "Эньши захвачен милитаристом Чжили"
 sichuan_events.102.d: "Регион Шихи в юго-западном Хубэе, ранее контролируемый [SZC.GetNameDef], был разделен между де-юре и де-факто губернаторством с момента завершения боевых действий в Западном Китае после реставрации Сюаньтуна. Разгневанный этим, губернатор Хубэя Сяо Яонань постоянно подавал петиции Центральному правительству с просьбой действовать и захватить территорию как законные земли Хубэя. Однако это так и не было реализовано, так как Правительство ценило стабильность и добрую волю с Ян Сэнем больше, чем подстрекательство.\n\nУвидев возможность, Сяо Яонань вторгся в юго-западный Хубэй. Установив временную оккупацию в городе Эньши, его силы разбили местные гарнизоны и находятся в движении. Дивизии уже отправлены на границу провинции, и между силами Лю Сяна и силами армии Чжили вспыхнули тяжелые бои."
 sichuan_events.102.a: "Лю Сяну удается отбить Чжили!"
 sichuan_events.102.b: "Кампания Лю Сяна потерпела поражение!"

 sichuan_events.103.t: "Штурм Эньши"
 sichuan_events.103.d: "Силы генерала Лю Сяна в Шихи провалили штурм города Эньши. Поскольку солдаты [SZC.GetAdjective] устали и уступали в численности, было приказано отступить, и Чжили двинулись, чтобы повторно оккупировать земли, которые они потеряли в ходе наступления Департамента ускоренного обучения. Во время отступления [SZC.GetAdjective] многие люди погибли на дороге, так как Чжили совершили жестокую атаку на отступающие силы."
 sichuan_events.103.a: "Блестящий успех Сяо!"

 sichuan_events.104.t: "Битва при Эньши"
 sichuan_events.104.d: "После того как силы Лю Сяна успешно обошли с фланга и окружили город Эньши, присутствие Чжили в Хубэе рухнуло. Оттеснив их обратно к границе [QIE.GetAdjective], генерал Лю Сян добился огромного успеха в возвращении и оккупации Хубэя. Присутствие Чжили было в основном уничтожено в регионе, а небольшие группы паникующих солдат пытались вернуться к основным силам, которые оккупировали Эньши."
 sichuan_events.104.a: "Ты дорого нам обошелся, действуя как разбойник!"

 sichuan_events.120.t: "Засуха?"
 sichuan_events.120.d: "Чуть более десяти лет назад, в 1925 году, сильный голод опустошил провинцию Сычуань. Сотни тысяч погибли, и столько же бежали из провинции. Усугубленный междоусобной войной той эпохи, голод был вызван длительной засухой и нанес непоправимый экономический и финансовый ущерб Сычуани. В течение последних десяти лет фермеры, пережившие засуху, поспешно молятся, когда солнце остается на небе более недели, — но, похоже, в этом году их молитвы остались без ответа. Дождь не выпадал в провинции больше месяца, и многие опасаются возвращения катастрофы 1925 года..."
 sichuan_events.120.a: "Дождь должен пойти скоро..."

 sichuan_events.121.t: "Транспортные связи разорваны"
 sichuan_events.121.d: "Поскольку опасения голода уже были высоки после того, как засуха не прекращалась, многие из ближайшего окружения [SZC.GetLeader] советовали запасать рис, импортируемый вниз по Янцзы. Однако теперь этот план отброшен. Высокие приливы, вызванные необычно большим таянием ледников в горах, помешали любой речной торговле достичь Чэнду в этом году, а продолжающийся хаос в Лиге в значительной степени отрезал всю железнодорожную торговлю от портов Легации, куда импортируется продовольствие. Поскольку правительство Юньнани предпринимает все более и более откровенно враждебные действия по отношению к нам, единственный путь к порту лежит через клику Лянгуан. Хотя маршрут стабилен, они не совсем наши близкие друзья, и вскоре мы можем быть отрезаны от *любой* международной торговли."
 sichuan_events.121.a: "Нам нужен альтернативный маршрут, немедленно!"

 sichuan_events.122.t: "Цены на рис резко растут"
 sichuan_events.122.d: "Поскольку импорт в нашу провинцию становится все более скудным, а общественные страхи перед голодом растут с каждым солнечным днем, на рынках по всей Сычуани наблюдается повсеместный рост цен на продовольствие. Это уже вызвало беспорядки и демонстрации от небольших горных деревень до самого Чэнду. Те, кто может себе это позволить, начали покидать провинцию, причем большинство направляется к относительной безопасности севера."
 sichuan_events.122.a: "Как будто война не была достаточно большой проблемой!"

 sichuan_events.123.t: "Голод!"
 sichuan_events.123.d: "Наши худшие опасения сбылись — нависшая угроза голода стала реальностью. Засуха и беспорядки в Лиге, отрезавшие большую часть нашего импорта, создали идеальный шторм страданий и хаоса, когда бывшие соседи набрасываются друг на друга из-за объедков еды, а чиновники по всей провинции сообщают о массовых продовольственных бунтах, мародерстве, смертях от голода. Общественный порядок рухнул, так как полицейские становятся слишком слабыми от голода, чтобы остановить преступников, а беженцы бегут из провинции любыми возможными способами. Если дожди не пойдут скоро, полная анархия неизбежна."
 sichuan_events.123.a: "Только не снова!"

 sichuan_events.124.t: "Голод вспыхивает в Сычуани"
 sichuan_events.124.d: "Провинция Сычуань долгое время боролась с голодом. Каменистая местность и непредсказуемая погода сдерживали численность населения до ранней эры Цин, когда широкомасштабная расчистка земель и стимулы к иммиграции привели в провинцию орды крестьян. В 1925 году длительная засуха превратилась в опустошительный голод, разоривший провинцию, что привело к сотням тысяч смертей и миллионам беженцев.\n\nТеперь, когда хаос в Лиге нарушил поставки продовольствия и наступила еще одна длительная засуха, призрак голода снова преследует Сычуань. Уже появляются ужасающие истории о матерях, продающих своих детей в рабство за куски хлеба, и об анархии, охватывающей даже самые богатые торговые города."
 sichuan_events.124.a: "Этот год становится только хуже!"

 sichuan_events.125.t: "Дожди возвращаются в Сычуань"
 sichuan_events.125.d: "[SZC.GetLeader] сгорбился над своим столом, отчаянно строча письмо за письмом [GXC.GetLeader], чтобы договориться об импорте риса, когда он услышал это. Это началось как случайная капля, но через несколько минут [SZC.GetLeader] услышал устойчивую барабанную дробь дождя по крыше своего здания. Едва веря в это, он выбежал наружу и почти сразу промок до нитки. Вокруг него праздновали его солдаты, и даже обычно угрюмые охранники особняка губернатора практически танцевали от радости.\n\nХотя потребуется время, чтобы вырастить новый урожай еды, дождь поможет успокоить крестьянство и положить конец анархии, охватившей большую часть провинции."
 sichuan_events.125.a: "Благословенный дождь!"

 sichuan_events.127.t: "Голод отступает"
 sichuan_events.127.d: "По мере того как все большая часть сельскохозяйственного сектора Сычуани восстанавливает свою производительность, темная туча голода неуклонно отступает от провинции. Все больше и больше ферм начали увеличивать свою производительность, в то время как разрушения гражданской войны продолжают стираться из общественной памяти. Мы, возможно, никогда не узнаем полного масштаба ущерба, но даже так, безусловно, кажется, что мы скоро сможем объявить официальное окончание голода.\n\nТем не менее, с миллионами наших граждан, погибших от этой катастрофы, голод оставил неизгладимый темный след на Сычуани, на полное устранение которого уйдут десятилетия. Даже сейчас многие районы все еще находятся в подвешенном состоянии, а поставки зерна по-прежнему нестабильны. В качестве нашего первого шага мы должны работать над полным устранением затяжных очагов голода."
 sichuan_events.127.a: "Конец темной эры."

 sichuan_events.128.t: "Сычуань подает петицию Центральному правительству"
 sichuan_events.128.d.zhili: "Как будто дела не могли стать хуже, правительство Сычуани недавно сообщило нам, что засуха, охватившая их провинцию в последний месяц, теперь превратилась в полномасштабный голод, с нарушением общественного порядка по мере того, как еда становится все более дефицитной. Впоследствии они подали петицию нашему правительству о помощи. Хотя у нас есть более насущные проблемы, провинция имеет решающее значение для нашего режима, и обеспечение лояльности их правительства будет иметь ключевое значение для воссоединения Китая."
 sichuan_events.128.d.manchu: "Хотя нашему новому правительству не хватает признания со стороны многих окружающих его милитаристов, провинциальная администрация [SZC.GetLeader] в Сычуани недавно обратилась к нашему правительству с просьбой о помощи. Это прекрасная возможность показать, что мы являемся новым «законным» правительством Китая. Сельскохозяйственные министерства, однако, все еще не оправились от шока переворота и могут потратить время на подготовку помощи, необходимой для поддержки Сычуани."
 sichuan_events.128.a: "Приказать министерствам отправить помощь."
 sichuan_events.128.b: "У нас другие заботы."

 sichuan_events.129.t: "Министерские распри!"
 sichuan_events.129.d: "Как это типично для Пекина, наш приказ различным министерствам сельского хозяйства вызвал ожесточенную войну за контракты, бюрократические распри и общее бездействие, которое характеризует вялый аппарат пекинского правительства. Один пример сегодня особенно ярко иллюстрирует эту коррупцию: мешки с рисом были собраны в Пекине, но спор о том, какая железнодорожная компания на самом деле доставит их в Чэнду, вызвал недельную серию переговоров с участием откатов, взяток и, как ни странно, обвинений в том, что владелец одной из компаний был гомосексуалистом. Пока огромные деньги переходят из рук в руки, лишь несколько зерен риса на самом деле попали в руки голодающего крестьянства Сычуани."
 sichuan_events.129.a: "Давайте уже!"

 sichuan_events.130.t: "Продолжающиеся министерские распри"
 sichuan_events.130.d.zhili: "Похоже, различные министерства сельского хозяйства до сих пор фактически не доставили ничего из еды, которую они собрали в Пекине. Мешки с зерном гниют на складах по всему городу, пока крестьянство Сычуани голодает, а положение Ян Сэня с каждым днем становится все более шатким. У Пэйфу придумал решение, чтобы сдвинуть дело с мертвой точки: угрожая уволить глав различных министерств, У надеется, что сможет разжечь огонь под их стульями и подтолкнуть их к действию. Как всегда, однако, это имеет свою цену. У придется потратить политический капитал, который он может потратить в другом месте в правительстве, на то, чтобы убедить различные сети покровителей, поддерживающие министерства, что эти угрозы на самом деле не серьезны. Или серьезны?"
 sichuan_events.130.d.manchu: "Похоже, различные министерства сельского хозяйства до сих пор фактически не доставили ничего из еды, которую они собрали в Пекине. Мешки с зерном гниют на складах по всему городу, пока крестьянство Сычуани голодает. У нового правительства есть возможность поиграть мускулами, угрожая уволить министров, ответственных за распределение продовольствия, — но это дорого обойдется."
 sichuan_events.130.a: "Оказать давление на министерства, чтобы они начали работать!"
 sichuan_events.130.b: "Пусть продолжают ссориться..."

 sichuan_events.131.t: "Помощь голодающим из Пекина"
 sichuan_events.131.d: "Хотя мы были обеспокоены отсутствием поездов из Пекина после нашего запроса о помощи — их ежедневные телеграммы о том, что она «уже в пути», вряд ли снимали опасения — похоже, им удалось заставить печально известные своей запутанностью министерства сельского хозяйства и помощи проявить некое подобие активности. Даже если некоторые из обещанных мешков с рисом были неполными — без сомнения, украденными каким-то похотливым чиновником — мы получили достаточно еды, чтобы временно облегчить худшую часть хаоса."
 sichuan_events.131.a: "Наконец-то!"

 sichuan_events.132.t: "Пекин игнорирует нашу петицию"
 sichuan_events.132.d.zhili: "Хотя Ян надеялся, что его старый союзник У Пэйфу придет ему на помощь в эту трудную минуту, похоже, у Нефритового Маршала есть дела поважнее. Хотя он телеграфировал Яну сочувственную записку, он заявил, что продолжающийся хаос в бывшей Лиге восьми провинций лишил его каких-либо ресурсов, доступных для помощи голодающим."
 sichuan_events.132.d.manchu: "Хотя мы всегда боялись, что правительство в Пекине проигнорирует наши просьбы, эти страхи полностью оправдались сегодня, когда [QIE.GetLeader] официально сообщил нам, что не может предоставить необходимую помощь для борьбы с нашим голодом. Многие подозревают, что это из-за наших «милитаристских» лояльностей, и положение [SZC.GetLeader] уже выглядит все более шатким с каждым днем."
 sichuan_events.132.a: "Мы это запомним!"

 sichuan_events.133.t: "АКИР поздравляет правительство"
 sichuan_events.133.d: "Немногие группы в Ассамблее ненавидят Ассоциацию Гармонии и Чжили больше, чем АКИР. Состоящая из наивных интеллектуалов, они часто протестуют против «милитаристской природы» нашего правительства и утверждают, что мы просто коррумпированные клептократы, больше заинтересованные в грабеже крестьянства, чем в развитии нации. Однако после нашего обещания помочь [SZC.GetLeader] и остановить голод, охвативший его провинцию, они публично похвалили наше «удивительное проявление сострадания к крестьянству Китая».\n\nНикто в АГ на самом деле не уверен, достаточно ли они наивны, чтобы верить, что мы делаем это, чтобы действительно помочь крестьянству, но поддержка, безусловно, лучше, чем их обычные громкие протесты."
 sichuan_events.133.a: "Спасибо, наверное?"

 sichuan_events.134.t: "АКИР критикует правительство"
 sichuan_events.134.d: "Наше решение отклонить запрос губернатора [SZC.GetLeader] о помощи было встречено в основном молчанием — до сегодняшнего дня. АКИР — номинально партия «крестьянства», но на самом деле не более чем группа богатых филантропов, убежденных, что они могут спасти крестьянство Китая, бросая деньги своего отца на их проблемы — громко осудила наше бездействие. Это, безусловно, не является чем-то необычным, поскольку они, кажется, протестуют против почти всего, что мы делаем. Что, однако, необычно, так это то, что люди начинают обращать на них внимание. В то время как их протестные листовки обычно распространяются только в городах, солдаты по всей нашей территории сообщали, что видели листовки, осуждающие «милитаристов, которые позволяют своему собственному народу умирать от голода на улицах», в каждом городе и деревне нашей страны!"
 sichuan_events.134.a: "Пусть кричат!"

 sichuan_events.135.t: "Международная комиссия помощи голодающим"
 sichuan_events.135.d: "Наши крики о помощи не остались без ответа! Консорциум богатых филантропов в Легационных городах собрался, чтобы организовать «Китайскую международную комиссию помощи голодающим» (КМКПГ). Хотя большинство из них помогают, желая больше международного признания, западные деньги отчаянно нужны, чтобы купить еду для наших голодающих крестьян, так как лидеры окружающих клик милитаристов, понимая наше затруднительное положение, взвинтили цены. Надеюсь, эти богатые жители Запада смогут помочь спасти Сычуань!"
 sichuan_events.135.a: "Любая помощь приветствуется."

 sichuan_events.138.t: "Отправить помощь в Сычуань?"
 sichuan_events.138.d.no_soy: "Провинция Сычуань все еще борется с массовым голодом, и теперь их представители пришли именно к нам с просьбой о помощи голодающим. Поддерживая усилия по оказанию помощи голодающим в провинции, мы могли бы значительно укрепить нашу легитимность и убедить их, что мы, а не гнусные предатели в Пекине, являемся истинными правителями Китая!"
 sichuan_events.138.d.soy: "Соевая сельскохозяйственная инициатива создала излишки зерна в Фэнтяне, в то время как на юго-западе Сычуань все еще борется с массовым голодом. Их представители пришли именно к нам с просьбой о помощи голодающим. Поддерживая усилия по оказанию помощи голодающим в провинции, мы могли бы значительно укрепить нашу легитимность и убедить их, что мы, а не гнусные предатели в Пекине, являемся истинными правителями Китая!"
 sichuan_events.138.a: "Подготовить большую партию."
 sichuan_events.138.b: "Мы ничего не можем выделить прямо сейчас."

 sichuan_events.139.t: "Партии зерна для Сычуани готовы"
 sichuan_events.139.d: "Наконец-то наши партии зерна, предназначенные для Сычуани, почти готовы к отправке. Их доставка будет сложной из-за большого количества враждебных армий между нами и собственно Сычуанью, но мы сомневаемся, что даже [GetZhiliManchu] настолько бессердечны, чтобы остановить зерно, предназначенное для пострадавших от голода."
 sichuan_events.139.a: "Доказательство нашей легитимности!"

 sichuan_events.1390.t: "Шэньян игнорирует нашу петицию"
 sichuan_events.1390.d: "Хотя мы всегда боялись, что правительство в Шэньяне проигнорирует наши просьбы, эти страхи полностью оправдались сегодня, когда [FNG.GetLeader] официально сообщил нам, что не может предоставить необходимую помощь для борьбы с нашим голодом. Многие подозревают, что это из-за наших «милитаристских» лояльностей, и положение [SZC.GetLeader] уже выглядит все более шатким с каждым днем."
 sichuan_events.1390.a: "Мы это запомним!"

 sichuan_events.140.t: "Фэнтянь отправляет помощь в Сычуань"
 sichuan_events.140.d: "Наши союзники в правительстве Фэнтяня недавно решили отправить зерно в Сычуань, как для того, чтобы помочь облегчить там голод, так и для того, чтобы улучшить свою легитимность в глазах [SZC.GetLeader]. Зерно будет отправлено по рекам под флагом Фэнтяня, что может вызвать проблемы.\n\nМы могли бы надавить на правительство Фэнтяня, чтобы они вывесили наш флаг, что, без сомнения, предотвратило бы атаку враждебных армий на транспорты из-за страха репрессий."
 sichuan_events.140.a: "Заставить их использовать флаг [Root.GetAdjective]."
 sichuan_events.140.b: "Это их выбор."

 sichuan_events.141.t: "Японские требования"
 sichuan_events.141.d: "Хотя мы надеялись, что [GetZhiliManchu] не посмеют перехватить нашу помощь голодающим, японские агенты сообщили нам, что у них есть информация, предполагающая, что предатели сделают именно это!\n\nЯпонцы предложили альтернативный вариант — вывесить их собственный флаг на наших грузах. [GetZhiliManchu] никогда не посмеют спровоцировать международный инцидент, атакуя японские корабли, хотя это выставит нас марионетками Токио в глазах тех, кто наблюдает за кораблями."
 sichuan_events.141.a: "В этом есть смысл..."
 sichuan_events.141.b: "Игнорировать их."
 sichuan_events.141.c: "Использовать их флаг, чтобы обойти Ухань, затем сменить на наш."

 sichuan_events.142.t.japan: "Фэнтянь принимает наши требования"
 sichuan_events.142.t.fengtian: "Фэнтянь игнорирует наши требования"
 sichuan_events.142.d.japan: "Фэнтянь согласился отправить зерно под нашим флагом, не давая [GetZhiliManchu] попытаться захватить или остановить поставки в Сычуань."
 sichuan_events.142.d.fengtian: "Фэнтянь отказался отправлять зерно под нашим флагом, утверждая, что это сведет на нет любые попытки представить их правительство как легитимное и вместо этого убедит крестьян, что их режим — не более чем наша марионетка."
 sichuan_events.142.a: "Отлично."
 sichuan_events.142.b: "Они высказывают дельную мысль..."

 sichuan_events.143.t: "Корабли [SZC_fengtian_grain_origin.GetAdjective] на Янцзы"
 sichuan_events.143.d.japan: "Ужасные новости! Гарнизон Уханя сообщил о флотилии барж, направляющихся вверх по реке в Сычуань под японским флагом! Похоже, они везут большое количество зерна, хотя под слоем мешков с зерном было бы очень легко спрятать оружие...\n\nМы можем потребовать от кораблей остановиться для досмотра, хотя это может сильно оскорбить японское правительство и потенциально вызвать международный инцидент."
 sichuan_events.143.d.fengtian: "Командир гарнизона Уханя сообщил о флотилии кораблей под флагом Фэнтяня, плывущих вверх по реке в сторону Сычуани, груженных зерном и припасами для помощи. Мы стоим перед дилеммой: позволить кораблям пройти значительно повысит лояльность правительства Сычуани Фэнтяню, но остановка и захват их могут вызвать еще большую негативную реакцию и риск выставить наше правительство жестоким и безразличным..."
 sichuan_events.143.a: "Предъявите им ультиматум!"
 sichuan_events.143.b: "Захватите их!"
 sichuan_events.143.c: "Пропустите их."

 sichuan_events.144.t: "Япония бросает вызов нашей блокаде"
 sichuan_events.144.d: "Наш приказ японским торговым капитанам был полностью проигнорирован! Осудив наши законы как «жестокие и нелегитимные», корабли продолжили плыть вверх по реке. Наши силы, не желая начинать войну, ничего не могли сделать."
 sichuan_events.144.a: "Черт."

 sichuan_events.145.t: "Партии зерна Фэнтяня"
 sichuan_events.145.d: "Наши силы высадились на корабли Фэнтяня, обыскали все вдоль и поперек, но нашли только предназначенные партии зерна, заявленные в грузовых манифестах. Мы можем либо позволить им продолжить свой путь, либо захватить корабль и отправить их вверх по реке под нашим флагом, создав видимость, что *мы* здесь истинно доброжелательные."
 sichuan_events.145.a: "Позволить им продолжить путь в Сычуань."
 sichuan_events.145.b: "Захватить их груз и отправить его под нашим флагом."

 sichuan_events.146.t.japan: "Партии зерна Фэнтяня захвачены!"
 sichuan_events.146.t.fengtian: "Партии зерна захвачены!"
 sichuan_events.146.d.japan: "Ужасные новости! Корабли Фэнтяня, которые мы предложили отправить под нашей защитой, были захвачены властями [GetZhiliManchu] в Ухане, и зерно перенаправлено в Сычуань под флагом [GetZhiliManchu]. Без сомнения, это можно было бы предотвратить, если бы мы поместили *наш* флаг на корабли."
 sichuan_events.146.d.fengtian: "Ужасные новости! Власти [GetZhiliManchu] в Ухане захватили наши партии зерна и отправляют их в Сычуань под *своим* знаменем! Это предательство высшего порядка, и оно только подтверждает наше утверждение, что [GetZhiliManchu] нелегитимны и являются не более чем мошенниками и гангстерами."
 sichuan_events.146.a: "Ублюдки!"
 sichuan_events.146.b: "Мы *предупреждали* их, что это произойдет."

 sichuan_events.147.t: "[SZC_fengtian_grain_origin.GetNameDefCap] отправляет продовольственную помощь"
 sichuan_events.147.d.zhili: "Отличные новости! Огромная флотилия барж с зерном и припасами для помощи только что прибыла на нашу территорию сегодня утром, неся флаг Пекина. Это несколько странно, учитывая, что они сообщили нам, что эти грузы прибудут только около трех дней назад, но [SZC.GetLeader] поспешил напомнить своим подчиненным никогда не смотреть дареному коню в зубы."
 sichuan_events.147.d.japan: "Отличные новости! Огромная партия зерна прибыла из Японии. Это необычно, однако, учитывая, что стране в настоящее время приходится импортировать продовольствие, чтобы выжить, но помощь всегда приветствуется."
 sichuan_events.147.d.fengtian: "[FNG.GetLeader], верный своему слову, прислал огромную партию зерна! Эта помощь показывает доброжелательность [FNG.GetName] и подтверждает их правление над Китаем!"
 sichuan_events.147.a: "Спасибо!"

 sichuan_events.148.t: "Хорошо выполненная работа"
 sichuan_events.148.d.default: "Пришла телеграмма из [SZC.Capital.GetCapitalVictoryPointName], подписанная [SZC.GetLeader], с благодарностью за нашу помощь в усилиях по оказанию помощи в Сычуани. Это сотворило чудеса для нашей репутации в далекой, густонаселенной провинции, помогая восстановить легитимность режима в Юго-Западном Китае."
 sichuan_events.148.d.JAP_steals_credit: "Хотя груз помощи голодающим действительно прошел через блокаду Чжили, тот факт, что корабль шел под японскими флагами, не остался незамеченным местными жителями, в то время как происхождение груза, мы, было забыто или откровенно проигнорировано. Япония присвоила себе все заслуги за операцию, воспользовавшись шансом улучшить свой собственный имидж в регионе. Наши протесты остались без внимания."
 sichuan_events.148.a: "Отлично."
 sichuan_events.148.b: "Эх..."

 sichuan_events.149.t: "Фэнтянь злоупотребляет нашим флагом"
 sichuan_events.149.d: "Ужасные новости! Похоже, что Фэнтянь злоупотребил нашим доверием и заменил наш флаг на свой собственный, как только баржи с зерном покинули Ухань! Это предательство высшего порядка и не останется безнаказанным!"
 sichuan_events.149.a: "Наглость!"

 sichuan_events.150.t: "Японский гнев"
 sichuan_events.150.d: "Япония обнаружила нашу маленькую хитрость с заменой нашего флага на их после того, как мы покинули Ухань, и они недовольны. Уже приходят гневные телеграммы из Токио, упрекающие [FNG.GetLeader] за его наглость и угрожающие сократить помощь в развитии."
 sichuan_events.150.a: "Пусть кричат."

 sichuan_events.151.t: "Голод на Севере"
 sichuan_events.151.d: "Хотя новости о голоде в провинции Сычуань уже достигли Гуанчжоу до них, официальная делегация из проблемной провинции прибыла сегодня. После частной встречи с [ROOT.GetLeader] они умоляли о поддержке [GXC.GetNameDef]. Вооружившись трогательными словами с оттенком отчаяния в сочетании с тревожными фотографическими доказательствами, они изложили свое дело перед обеими Ассамблеями провинции Гуандун в надежде заручиться поддержкой своего дела. Они также привезли свидетельские показания о голоде, и их яркие описания голода нарисовали картину человеческих страданий, намного превосходящую то, что мог бы передать любой газетный заголовок.\n\nИх мощные призывы к состраданию, национальному единству и благотворительности от богатой кантонской элиты, однако, встречают ожесточенные сердца. Лянгуан не чужд войне и страданиям, и потрясения, которые недавно охватили Лянгуан, оставили провинцию с небольшим количеством свободных ресурсов. Тем не менее, ропот несогласия указывает на то, что есть много места для споров, поскольку тема выносится на обсуждение."
 sichuan_events.151.a: "Это должно быть интересное обсуждение."

 sichuan_events.154.t: "Личное пожертвование Чэнь Ляньбо"
 sichuan_events.154.d: "Богатый кантонский бизнесмен удвоил свои прежние заявления перед Ассамблеей провинции Гуандун, сделав огромное частное пожертвование на помощь Сычуани вместе со многими своими друзьями из кантонской элиты. Оправдывая свою репутацию филантропа, Чэнь все же предупредил, что частные пожертвования, даже от богатых доноров, таких как он сам, не могут сравниться с потенциальной помощью, которую могло бы предоставить Правительство провинции Гуандун. Его заявление было четким посланием избранным представителям Провинциальной ассамблеи, даже если более пессимистично настроенные отмахнулись от него как от простого рекламного трюка богатого общественного деятеля."
 sichuan_events.154.a: "Спасибо, друг."

 sichuan_events.155.t: "Провинциальная ассамблея голосует"
 sichuan_events.155.d: "Эмоции зашкаливали во время дебатов. Скептики поспешили раскритиковать правительство провинции Сычуань, которое допустило такое ухудшение ситуации, и интенсивные фракционные споры там. Хотя мало кто мог поспорить о моральности отправки помощи, было ясно, что Сычуань страдает не только от голода, но и от повальной коррупции, которая вполне могла бы сделать любые усилия по оказанию помощи пустой тратой времени. Более того, с стремительно растущими военными расходами Гуандуна и их собственным будущим под вопросом, аппетита к дополнительным расходам мало. Некоторые язвили, что представители из Сычуани должны попросить так называемое «центральное правительство» на севере выполнить свои обязанности или даже попросить Ассамблею провинции Гуанси о благотворительности.\n\nСторонники законопроекта получили существенный импульс, когда Чэнь Ляньбо, видный кантонский бизнесмен и известный филантроп, ставший мэром города в 1928 году, решительно поддержал предложение. Чтобы усилить давление на ассамблею с целью заставить ее действовать, он и другие ведущие торговцы создали частный фонд помощи осажденной провинции, но предупредили, что одни только частные пожертвования не помогут предотвратить кризис. Учитывая его противоречивое пребывание на посту мэра, некоторые сомневаются, искренне ли его последнее благотворительное начинание, но что несомненно, так это то, что его деньги реальны. Поскольку обе стороны изложили свои аргументы, похоже, дело движется к развязке."
 sichuan_events.155.a: "Законопроект о помощи принят."
 sichuan_events.155.b: "Законопроект о помощи провалился."

 sichuan_events.158.t: "Помощь прибывает из Гуандуна"
 sichuan_events.158.d: "Первая партия помощи из провинции Гуандун наконец прибыла. Не только благодаря частным пожертвованиям многих богатых людей в провинции, но и собственный фонд помощи Провинциального правительства сможет помочь смягчить кризис в Сычуани."
 sichuan_events.158.a: "Хорошие новости, наконец-то!"

 sichuan_events.159.t: "Никакой помощи из Гуандуна"
 sichuan_events.159.d: "Несмотря на наши мольбы, Ассамблея провинции Гуандун отказалась выделить средства на помощь голодающим в Сычуани. Их публичный отказ отправить помощь послал сигнал не только нам, но и всему Китаю о состоянии морали в богатом Гуанчжоу и провинциальной демократии, которой они так хвастаются."
 sichuan_events.159.a: "Мы это запомним!"

 sichuan_events.160.t: "Едоки глины"
 sichuan_events.160.d: "Кризис голода достигает тревожных масштабов в сельской местности. Как и в 1925 году, некоторые жители деревень, которым больше не к чему обратиться, начали выкапывать глину из земли в отчаянной попытке утолить голод. Трагично, но это привело только к болезням и еще большим страданиям. Мы проинструктировали местных администраторов и полицию информировать людей об опасностях прибегания к этим мерам, хотя в сложившейся ситуации эти предупреждения, скорее всего, останутся без внимания."
 sichuan_events.160.a: "Это не поможет делу!"

 sichuan_events.161.t: "Рисовые бунты"
 sichuan_events.161.d: "Потасовки и перебранки после скачков цен в начале года — ничто по сравнению с тем, что часто происходит в крупных городах Сычуани. Слишком часто, когда мешки с рисом поступают на рынки, за них вспыхивают драки. Обвинения в накоплении запасов, сговоре о ценах и других злонамеренных практиках широко распространены и, к сожалению, зачастую небезосновательны. Поскольку гнев кипит среди голодных граждан городов, мы были вынуждены развернуть военную полицию в городах для поддержания порядка и предотвращения или, по крайней мере, смягчения любых будущих вспышек насилия и вандализма. Однако это вряд ли можно назвать постоянным решением, так как присутствие того, что некоторые могут счесть бандитами в форме, скорее всего, приведет к еще большему росту напряженности и недовольства, если мы не сможем решить эти проблемы с нехваткой."
 sichuan_events.161.a: "Нам нужно решить этот кризис, немедленно!"

 sichuan_events.162.t: "Насилие на рынках"
 sichuan_events.162.d: "Торговцы в городах часто принимают на себя основной удар гнева, вызванного отчаянной нехваткой продовольствия в городах. Крики о том, что они наживаются на голоде и накапливают еду, безудержны, и многие из них подвергаются нападениям средь бела дня на рынках. Иногда даже слуха о том, что торговец припрятал мешки с рисом для себя, достаточно, чтобы на них напали, только для того, чтобы бунтовщики узнали слишком поздно, что магазин, который они разграбили, был так же пуст, как и их желудки. Это привело к закрытию нескольких магазинов и рынков из-за страха перед большим насилием, что только усугубило ситуацию с добычей еды. Если торговцы не припрятывали свои последние несколько мешков риса раньше, они, безусловно, делают это сейчас. Для решения этих ситуаций была задействована дополнительная полиция, но ущерб уже нанесен."
 sichuan_events.162.a: "Может ли этот кризис стать еще хуже?"

 sichuan_events.163.t: "Необычные решения"
 sichuan_events.163.d: "Поедание травы, листьев и ягод стало обычным делом в Сычуани, так как люди, особенно в сельской местности, начали прибегать к довольно нестандартным решениям, чтобы прокормить себя за неимением других альтернатив. Многие обращаются к более диковинным решениям, используя различные флору и фауну, обычно считающиеся несъедобными, в качестве заменителей пищи. Творческие решения иногда почти так же тревожны, как и сам кризис, и хотя иметь что-то поесть лучше, чем ничего не есть, это только подчеркивает срочность доставки надлежащей помощи голодающим массам."
 sichuan_events.163.a: "Нам нужно следить за этим развитием событий."

 sichuan_events.164.t: "Всплеск случаев отравления"
 sichuan_events.164.d: "Недавний рост кустарных решений проблемы голода привел к трагическим, но предсказуемым результатам, несмотря на все наши усилия по распространению информации о рисках, которые несут эти практики. Больницы и сельские клиники наблюдают большой рост числа пациентов, страдающих от острых случаев отравления, если предположить, что они вообще могут туда добраться. Поскольку наши медицинские службы работают на пределе возможностей, местным администраторам было поручено информировать своих людей об опасностях этой деятельности. Однако пока голод продолжается, случаи вряд ли прекратятся."
 sichuan_events.164.a: "Нам следовало действовать быстрее."

 sichuan_events.165.t: "Рост детской бедности"
 sichuan_events.165.d: "Бедность, к сожалению, была спутником большей части Сычуани на протяжении всей нашей истории. С голодом, охватившим страну, стало только хуже, так как семьи, уже находившиеся на грани, сильно пострадали от этого кризиса. Там, где раньше был дефицит, теперь для них почти ничего нет. Без какой-либо системы безопасности в трудные времена самые молодые страдают от этого больше всего."
 sichuan_events.165.a: "Сычуань больше не может этого выносить!"

 sichuan_events.166.t: "Брошенные дети"
 sichuan_events.166.d: "Из-за ужасных условий, охвативших провинцию в последнее время, произошел массовый рост числа брошенных детей, оставленных на произвол судьбы. Иногда это происходит потому, что у их родителей просто нет средств прокормить свои семьи, хотя часто трагическая причина заключается в том, что их самих больше нет. С тысячами подобных случаев и появлением многих других каждый день, люди умоляют правительство принять меры, чтобы помочь детям провинции."
 sichuan_events.166.a: "Мы *должны* помочь им. Никто другой этого не сделает."

 sichuan_events.167.t: "Дети голода"
 sichuan_events.167.d: "Больше всего от голода пострадали дети Сычуани. Поскольку еды не хватает, а беспорядки свирепствуют, никто не застрахован от последствий голода. Сильнее всего пострадали дети, трагических историй слишком много, чтобы их сосчитать. Мы не можем этого терпеть. Вместе с нашими международными партнерами по оказанию помощи мы создали специальную правительственную операцию для защиты их и нашего будущего. Это включает в себя все: от специальных выделений продовольствия и других ресурсов помощи для предотвращения будущих трагедий, вплоть до предоставления убежища и детских домов в случаях, когда трагедия уже произошла.\n\nЭто маленькие и дорогостоящие шаги на пути к восстановлению после голода, но стоит приложить все усилия, чтобы дать нашему народу знать, что, несмотря ни на что, дети нашей провинции не будут вынуждены заботиться о себе сами."
 sichuan_events.167.a: "Мы заботимся о своих."

 sichuan_events.168.t: "Беженцы покидают провинцию"
 sichuan_events.168.d: "Не видя будущего в Сычуани, люди тысячами бегут из провинции на буквально более зеленые пастбища на севере, юге и востоке. Несколько небольших деревень превратились в города-призраки из-за огромного количества людей, покинувших их. Если мы не положим быстрый конец этому катастрофическому голоду, это будет только первая волна из многих."
 sichuan_events.168.a: "Плохие новости продолжают накапливаться..."

 sichuan_events.169.t: "Беженцы из Сычуани"
 sichuan_events.169.d.QIE: "Засуха и последствия жестокой гражданской войны привели к ужасному голоду, охватившему Сычуань. Поскольку правительство Сычуани, по-видимому, неспособно решить эти проблемы, многие просто сдались и бежали из провинции десятками тысяч на более зеленые пастбища в наши земли. Хотя они не единственные, кто попал в трудные времена в Китае, многие как среди населения, так и в нашем правительстве требуют, чтобы мы что-то сделали, чтобы помочь нашим китайским собратьям. Другие считают, и вряд ли без оснований, что, учитывая кризис после краха Лиги восьми провинций в дополнение к нашей собственной борьбе, мы мало что можем сделать, чтобы помочь. Учитывая масштаб ситуации, возвращение их в Сычуань только усугубит ситуацию.\n\nНезависимо от наших действий, наше правительство подало официальный запрос правительству в [SZC.Capital.GetCapitalVictoryPointName], чтобы они усилили свои усилия по решению этого кризиса."
