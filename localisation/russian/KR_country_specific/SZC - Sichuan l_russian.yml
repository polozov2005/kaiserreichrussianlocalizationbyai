 ###Federalist Parties
 #统一建国同志会
 SZC_CDL_ncra: "ДЛК-НИОНВ"
 SZC_CDL_ncra_long: "$SZC_CDL_ncra_long_tt$\n§L$GXC_CDL_intro$\n\nРастущая политическая сила, связанная с титаном сычуаньской политики, Научно-исследовательское общество нового века, основанное левым Чжоу Тайсуанем и ныне возглавляемое Чжан Ланем, стало точкой сбора для всех прогрессистов, новых федералистов и социалистов. Неформально объединившись из ближайших соратников Чжан Ланя в его управлении уездом Наньчун в начале 1920-х годов и его руководстве в Сычуаньской ассоциации сельского строительства в 1927 году, НИОНВ является последней версией политической коалиции Чжана по мере приближения воссоединения Китая.\n\nОсновываясь на Временном уставе автономии уезда Наньчун и ранних годах сотрудничества Чжана с республиканцами всех убеждений, политика НИОНВ сосредоточена вокруг промышленной автономии и переориентации образования для ее достижения, хотя многие по-прежнему с осторожностью относятся к усиливающемуся левому уклону нового политического аппарата Чжана.§!\n"
 SZC_CDL_ncra_long_tt: "Демократическая лига Китая — Научно-исследовательское общество нового века (Чжунго Миньчжу Тунмэн Синь Шицзи Сюэхуэй)"

 #聯省自治籌備處
 SZC_Provincial_Federal_Autonomy_party: "ПКОФА"
 SZC_Provincial_Federal_Autonomy_party_long: "$SZC_Provincial_Federal_Autonomy_party_long_tt$\n§LБудучи заключенным в администрируемой Хунанью Гуйчжоу в течение почти десятилетия, Сюн Кэу и его «Полк девяти человек» снова получили мандат не только на поле боя, но и от народа Сычуани, жаждущего перемен.\n\nКонсолидируясь и организуясь для более формального управления, Сюн сформировал Подготовительный комитет областной федеральной автономии, чтобы начать решать проблемы и жалобы провинции после недавнего прекращения боевых действий и стабилизации самой раздробленной провинции Китая. ПКОФА до сих пор был эффективен в привлечении новых интеллектуалов в свои ряды, и его члены активно доносили цели федерализма до масс. Что касается стиля управления, то Сюн и его люди частично переняли то, что они наблюдали в Ассамблее Хунани Чжао Хэнти во время своего краткого пребывания там в 1924 и снова в 1928 годах, заискивая перед местными консервативными джентри и деловыми кругами, в то же время стараясь не оттолкнуть фермеров и рабочих, составляющих большую часть Сычуани.\n\nТем не менее, ПКОФА сохраняет бдительность в отношении главных угроз Сычуани: бандитизма, нехватки ресурсов и постоянных интриг мелких милитаристов, которые являются частыми источниками социального недовольства, угрожающими запятнать репутацию Сюна в глазах общественности.§!\n"
 SZC_Provincial_Federal_Autonomy_party_long_tt: "Подготовительный комитет областной федеральной автономии (Ляньшэн Цзычжи Чоубэй Чу)"

 #公益协进社
 SZC_Public_Welfare_Society: "ООБ"
 SZC_Public_Welfare_Society_long: "$SZC_Public_Welfare_Society_long_tt$\n§LБазирующееся в уезде Даи Общество общественного благосостояния, возглавляемое братом Лю Вэньхуэя Лю Вэньцаем, стало довольно спорным институтом. Якобы созданное как филантропическая и благотворительная организация, ООБ вместо этого стало печально известным по всей Сычуани как прикрытие для обширных провинциальных сетей патронажа, тайных обществ братства, различных главарей банд и интригующих сельских помещиков. Сам Лю Вэньцай приобрел дурную славу как главный виновник некоторых из худших перегибов общества, будучи не только безжалостным помещиком, но и вымогая и облагая налогами гражданских лиц за все: от проституции до владения сельскохозяйственным инвентарем.\n\nГражданские власти по всей Сычуани, особенно на границах, часто подвергались давлению со стороны членов ООБ и ополчения, прикрепленного к этому органу. Местные суды и налоговые органы эксплуатировались исключительно в целях обогащения Лю Вэньцая и его приспешников. Связи Лю с остатками провинциальной Торговой палаты также усугубили влияние ООБ: те немногие торговцы, которые использовали свою смекалку и финансовые ресурсы для заключения тайных сделок с местными милитаристами, теперь также подпадают под власть Лю Вэньцая.\n\nПопытки Лю Вэньхуэя держать своего брата в узде до сих пор были неэффективны: ООБ и его связи в Пао-Гэ — сычуаньском Гэлаохуэй — все еще затмевают официальные административные посты в контроле экономической и общественной жизни.§!\n"
 SZC_Public_Welfare_Society_long_tt: "Общество общественного благосостояния (Гунъи Се Цзинь Шэ)"

 #自治联合会
 SZC_gra_ufaa: "ВРА-ОАФА"
 SZC_gra_ufaa_long: "$SZC_gra_ufaa_long_tt$\n§L$GXC_GRA_intro$\n\nИмея корни в ранних движениях и обществах 20-х и 30-х годов, когда различные сычуаньские интеллектуалы экспериментировали с Федеральной автономией, Объединенная ассоциация федеральной автономии является естественным преемником таких конституционалистских групп. Как и многие ее внепровинциальные избирательные союзники в Великом республиканском альянсе, ОАФА выступает за разработку провинциальных конституций, реорганизацию гражданской администрации и широкую демобилизацию национальной армии после завершения большей части боевых действий, терзавших Китай.\n\nВозглавляемая давним союзником Сюна после отхода «Генерала в длинном халате» от избирательной политики, Дань Маосинь продолжает продвигать дело федералистов, при этом ОАФА отличается от своих оппонентов большей готовностью идти на компромисс и вступать в союзы с другими республиканскими фракциями, такими как Бэйянские независимые или остатки Клики политической науки. Несмотря на небольшие разногласия с более пылкими прогрессивными элементами в Демократической лиге Китая, диалог между этими двумя основными блоками оставался цивилизованным и приемлемым благодаря тому, что члены обоих были объединены в борьбе против деспотизма в самые ранние дни сычуаньского федерализма.§!\n"
 SZC_gra_ufaa_long_tt: "Великий республиканский альянс — Объединенная ассоциация федеральной автономии (Гунхэ Датунмэн Цзычжи Ляньхэ Хуэй)"

 #民治竞进社
 SZC_gra_cgps: "ВРА-ОГКП"
 SZC_gra_cgps_long: "$SZC_gra_cgps_long_tt$\n§L$GXC_GRA_intro$\n\nС интеграцией многих ключевых фигур из сычуаньского Баодинского департамента и других фигур, которых многие идеалисты федералистского движения сочли бы просто оппортунистами, те, кто стремился укрепить свои позиции в этом новом правительстве, сплотились вокруг опытного генерала Лю Вэньхуэя и его Общества гражданского контроля и прогресса. Состоящие из коллег-милитаристов Лю, таких как Дэн Сихоу и Тянь Сунъяо, а также товарищей генерала из его собственной семьи и сетей патронажа, таких как печально известный помещик Лю Вэньцай, эти люди якобы являются членами ради самосохранения и мало или совсем не интересуются принципами подлинной демократии.\n\nКак глава ОГКП, Лю, к удивлению многих своих критиков, стремился продвигать политику новой администрации и новых методов обучения, но обнаружил, что его усилия постоянно подрываются и перехватываются многими из его номинальных союзников. Дэн, в частности, все более громко заявлял о своем собственном видении модернизации Китая, поддерживая популистскую риторику и важность решительных действий над атрибутами демократических дискуссий.§!\n"
 SZC_gra_cgps_long_tt: "Великий республиканский альянс — Общество гражданского контроля и прогресса (Гунхэ Датунмэн Миньчжи Цзинцзиньшэ)"

 ###Zhili Exile Parties
 SZC_Zhili_Clique_Civilian_party: "Клика Чжили"
 SZC_Zhili_Clique_Civilian_party_long: "$SZC_Zhili_Clique_Civilian_party_long_tt$\n§LБеря свое начало от титанического возвышения Фэн Гочжана, клика Чжили сплотилась вокруг него и его президентства, в котором он выступал за Объединение путем переговоров с Югом, в отличие от Объединения путем подчинения премьер-министра Дуань Цижуя. После смерти Фэна в 1919 году клика Чжили раскололась между тремя предприимчивыми милитаристами — Цао Кунем, У Пэйфу и Ван Чэнбинем. Вступая в соперничество с кликами Фэнтянь и Аньхой, клика Чжили одержала верх в 1922 году.\n\nДоминируя в Бэйянской республике в течение многих лет, Чжили пережила кульминационное падение власти после того, как война между Ци Сеюанем и Лу Юнсяном переросла во Вторую Чжили-Фэнтяньскую войну, где Фэн Юйсян, член Чжили в то время, предал клику и совершил Пекинский переворот 1924 года, изгнав президента Цао и У Пэйфу. Кратковременно восстановив свою власть в период междуцарствия, казалось, что Чжили были полностью изгнаны с Центральной равнины. Не вмешиваясь напрямую ни на одну из сторон в крахе Лиги, Чжили открылись для переворота со стороны ненавистного Королевского двора. В результате гибели как основного, так и вторичного лидера клики Чжили, ведение боевого отступления в провинцию Сычуань легло на третичного лидера, маршала Ван Чэнбиня.\n\nЗаключив соглашение с Ян Сэнем, Остатки клики Чжили увидели, что их сеть патронажа сильно сократилась, многие погибли в боях на Центральной равнине. Теперь объединившись вокруг уважаемого дипломата Янь Хуэйцина, умного и проницательного человека, который проявил себя как способная точка сбора, гражданская бюрократия может представить жизнеспособную альтернативу доминированию милитаристов Вана. Объединенные вместе, Гражданские надеются увидеть реформированный Бэйян, чтобы предотвратить повторение такой катастрофы.§!\n"
 SZC_Zhili_Clique_Civilian_party_long_tt: "Клика Чжили (Гражданское крыло) (Бэйцзин Чжиси (Вэньгуань Пай))"
 SZC_Zhili_Clique_Military_party: "Клика Чжили"
 SZC_Zhili_Clique_Military_party_long: "$SZC_Zhili_Clique_Military_party_long_tt$\n§LБеря свое начало от титанического возвышения Фэн Гочжана, клика Чжили сплотилась вокруг него и его президентства, в котором он выступал за Объединение путем переговоров с Югом, в отличие от Объединения путем подчинения премьер-министра Дуань Цижуя. После смерти Фэна в 1919 году клика Чжили раскололась между тремя предприимчивыми милитаристами — Цао Кунем, У Пэйфу и Ван Чэнбинем. Вступая в соперничество с кликами Фэнтянь и Аньхой, клика Чжили одержала верх в 1922 году.\n\nДоминируя в Бэйянской республике в течение многих лет, Чжили пережила кульминационное падение власти после того, как война между Ци Сеюанем и Лу Юнсяном переросла во Вторую Чжили-Фэнтяньскую войну, где Фэн Юйсян, член Чжили в то время, предал клику и совершил Пекинский переворот 1924 года, изгнав президента Цао и У Пэйфу. Кратковременно восстановив свою власть в период междуцарствия, казалось, что Чжили были полностью изгнаны с Центральной равнины. Не вмешиваясь напрямую ни на одну из сторон в крахе Лиги, Чжили открылись для переворота со стороны ненавистного Королевского двора. В результате гибели как основного, так и вторичного лидера клики Чжили, ведение боевого отступления в провинцию Сычуань легло на третичного лидера, маршала Ван Чэнбиня.\n\nЗаключив соглашение с Ян Сэнем, Остатки клики Чжили увидели, что их сеть патронажа сильно сократилась, многие погибли в боях на Центральной равнине. Теперь объединившись вокруг маршала Вана, военный костяк клики Чжили готов вернуть свою законную землю и восстановить первенство Бэйянской республики.§!\n"
 SZC_Zhili_Clique_Military_party_long_tt: "Клика Чжили (Военное крыло) (Бэйцзин Чжиси (Цзюньжэнь Пай))"

### Ideas ###
 SZC_baoding_influence: "Влияние Баодина"
 SZC_baoding_influence_desc: "Баодинский департамент выполняет значительный объем работы в правительстве, и его влияние значительно снижает нашу легитимность. Несмотря на это, их дополнительные усилия в наших рядах помогают нам гарантировать, что сычуаньская пороховая бочка не взорвется."

 SZC_internal_divisions: "Внутренние разногласия"
 SZC_internal_divisions_desc: "В последнее десятилетие наблюдалось небольшое снижение внутренних разногласий в клике Сычуань, но проблема все еще сохраняется. Влиятельный Баодинский департамент, сильная фракция Департамента ускоренного обучения под руководством Лю Сяна и молодой Офицерский департамент подготовили почву для неминуемого краха провинции при малейшем нарушении баланса власти."

 SZC_looming_agricultural_crisis: "Надвигающийся сельскохозяйственный кризис"
 SZC_looming_agricultural_crisis_desc: "Производство опиума стало чрезвычайно распространенным в Сычуани, будучи одной из немногих прибыльных культур из-за экономической изоляции провинции. Как следствие, производство зерна и риса в провинции сократилось до критического уровня, и ситуация усугубилась нестабильностью и некомпетентным управлением последних трех десятилетий. Сычуань балансирует на грани масштабного голода, если случится стихийное бедствие."

 SZC_civil_war_idea: "Гражданская война!"
 SZC_aftermath_of_the_civil_war: "Последствия гражданской войны"

 SZC_major_famine: "Крупный голод"
 SZC_major_famine_desc: "Идеальный шторм из засух, отведения пахотных земель под выращивание опиума и гражданской войны привел к тому, что голод охватил провинцию Сычуань. Как и голод 1925 года, последствия для народа Сычуани разрушительны. Государство будет частично парализовано, пока ему не удастся разрешить этот неотложный кризис."

