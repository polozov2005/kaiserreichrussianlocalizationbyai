 SZC_saint_of_sichuan_hos: "Святой"
 SZC_saint_of_sichuan_hos_desc: "§LОбъединяющая фигура спокойного и уважаемого темперамента, Чжан Лань долгое время почитался за его почти самоотверженное стремление к спасению Китая через образование и его способность сотрудничать со всеми сторонами политического спектра.§!"

 SZC_warfox_of_bashu: "Боевая лиса Ба-Шу"
 SZC_warfox_of_bashu_desc: "§LВозглавляя грандиозный проект по возрождению китайского национального государства, свирепость Лю Вэньхуэя в управлении принесла ему вполне подходящее прозвище.§!"

 SZC_old_comrade: "Старый товарищ"
 SZC_old_comrade_desc: "§LВетеран революционной борьбы с 1910-х годов, Дань Маосинь сопровождал Сюн Кэу в борьбе на протяжении десятилетий; будучи малоизвестным в высших эшелонах, он зарекомендовал себя как стабильная и жизнерадостная фигура президента.§!"
