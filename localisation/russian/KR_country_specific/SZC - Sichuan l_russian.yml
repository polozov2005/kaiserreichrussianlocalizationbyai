 SZC_federal_governmental_legitimacy_desc: "Современный китайский федералист поднимался и падал в первой половине 1920-х годов. Коалиция конституционалистов, демократов и регионалистов — они объединились на фоне продолжающегося тупика Север-Юг на пике эры милитаристов. Их призывы к различным провинциям работать над внедрением местного самоуправления, а затем мирно объединиться в федеративную республику, получили некоторую поддержку, но после многообещающего начала были отвергнуты как северным, так и южным правительствами. Успешное объединение силой со стороны Чжили дискредитировало движение, и многие стали ассоциировать его не более чем с прикрытием для милитаризма.\n\nВосстановить импульс, утраченный более десяти лет назад, будет сложно, но поскольку страна снова кажется безнадежно разделенной, а либерализационные усилия клики Чжили оказались фикцией, многие надеются, что федералистское движение может стать решением проблем Китая. Хотя немногие ожидают многого от часто разделенных клик Сычуани, они несут знамя последнего оплота китайского федерализма."

 SZC_federal_governmental_legitimacy_1: "Последний оплот китайского федерализма: §RБезнадежно§!"
 SZC_federal_governmental_legitimacy_1_desc: "$SZC_federal_governmental_legitimacy_desc$"

