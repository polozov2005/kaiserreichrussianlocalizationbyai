### Characters ###

#Main Country Leaders
MAL_burhanuddin_al_helmy: "Бурхануддин аль Хельми"
MAL_burhanuddin_al_helmy_leader_desc: "§YРодился:§! §L29 августа 1911 года, в Кота-Бару, Перак, Федеративные малайские штаты§!"

MAL_zhuang_mingli: "Чжуан Минли"
MAL_zhuang_mingli_leader_desc: "§YРодился:§! §LФевраль 1909 года, в Цюаньчжоу, провинция Фуцзянь, Цинская империя§!\n§YФон:§! §LЧжуан Минли, или Чуан Мин-ли, как его называют на малайском кантонском, родился в крестьянской семье из Фуцзяня. Многие мужчины в его семье работали за рубежом, а его отец нашел работу в качестве лодочника на британской территории Пенанга на Малайском полуострове, трагически скончавшись в 1926 году.\n\nМинли сначала поехал в Пенанг, затем в Бинджаи в Голландской Ост-Индии, где устроился работать в гараж, принадлежащий одному из его дядей. Там он начал заниматься политической деятельностью с активистами китайской диаспоры, протестуя против эксплуатации своей родины европейцами и японцами. Он присоединился к благотворительной организации, помогающей жертвам инцидента "Яшмовый ветер", и был вице-президентом молодежной группы, бойкотировавшей иностранные товары. Эти действия привлекли внимание голландцев, и его депортировали обратно в Китай.\n\nОн пытался найти работу на фабриках в Цюаньчжоу, но вскоре увлекся радикальным профсоюзным движением, что заставило его в 1930 году сбежать обратно в Пенанг, опасаясь за свою жизнь, если он останется в Китае. Минли присоединился к нескольким новым политическим организациям, таким как Конгресс китайцев за рубежом из Фуцзяня, проходивший в Сингапуре, Пенангский филоматический союз, основанный Сунь Ятсеном, а также ряду местных гильдий и профсоюзов.\n\nХотя ему было всего за 20, Минли стал одним из самых известных китайских политиков в Малайе, публикуя огненные социалистические статьи в зарубежной китайской прессе под псевдонимом "Чжуанцзя", которые в основном поддерживали Революционную ассоциацию Комрадов Гоминьдана. Его наиболее значимым достижением было создание "Комитета помощи беженцам и раненым солдатам МинГан", чтобы поддержать восстание Гоминьдана в 1936 году.\n\nКак заслуженный профсоюзный деятель и харизматичный защитник свободы и демократии, Минли стал естественным кандидатом на высокую должность в Генеральном профсоюзе труда, ведущем профсоюзе Малайи, но немногие ожидали, что его изберат его председателем. Он был компромиссом между синдикалистами, анархистами и более умеренными социалистами, молодым человеком, который, тем не менее, обладал мудростью и опытом, чтобы объединить конфликтующие фракции за общую революционную борьбу.§!"

