 ### Ideas ###

MAL_rubber_plantation_idea: "Расширение резиновых плантаций"
MAL_rubber_plantation_idea_desc: "Малайя долгое время является крупнейшим производителем резины в мире, и с тем, что местное правительство получает гораздо больший контроль над резиновыми плантациями, оно решило активно поддерживать их развитие, чтобы в будущем извлечь экономические выгоды."

MAL_perjuangan_melayu_idea: "Борьба Малайцев"
MAL_perjuangan_melayu_idea_desc: "Для правительства [MAL.GetAdjective] малайская идентичность неразрывно связана с исламской верой, которой придерживается большинство населения. Для правительства также важно, что эта страна принадлежит малайским мусульманам, и хотя оно не против представителей других этносов или вер, оно ясно дает понять, что они более похожи на терпимых гостей, чем на настоящих членов нации. Таким образом, правительство действует в системе, где приоритет отдается малайским мусульманам, при этом пытаясь следовать многим основным исламским ценностям, которые его лидеры считают фундаментальными для малайского общества."

MAL_malaya_merdeka_idea: "Малайя Мердека"
MAL_malaya_merdeka_idea_desc: "Впервые за века полуостров Малая обрел свободу в большей степени решать свое будущее, хотя, конечно, этому способствовали те, кто помогал в обретении этой свободы. С этой новой свободой правительство [MAL.GetAdjective] поставило перед собой задачу создать демократическое государство, в котором равным образом будут уважаться права как народов страны, так и государств, составляющих нацию."

MAL_the_six_pillars_idea: "Шесть Столпов"
MAL_the_six_pillars_idea_desc: "В отличие от многих стран мира, которые в последние десятилетия пошли по пути социализма, правительство [MAL.GetAdjective] воплощает в жизнь собственное видение того, как должно выглядеть государство, сочетающее социалистические убеждения с националистическими. Эти взгляды известны как Шесть Столпов: 'Объединение' народа, 'Лояльность' к нации, 'Служение' нации, 'Счастье', 'Служение народу' и проявление 'Учтивости' как лидеров народа."

MAL_satu_untuk_semua_semua_untuk_satu_idea: "Один за всех, все за одного!"
MAL_satu_untuk_semua_semua_untuk_satu_idea_desc: "'Один за всех, все за одного' — это фраза, которая представляет собой видение социализма в Малае для правительства [MAL.GetNameDef]. Для правительства социализм — это концепция, которая должна быть реализована через националистический взгляд, где малайские сообщества должны объединиться, чтобы вытащить страну за пределы колониального прошлого и поднять весь народ."

MAL_merdeka_dengan_darah_idea: "Мердека Данган Дара"
MAL_merdeka_dengan_darah_idea_desc: "Вдохновленное сочетанием китайского влияния, исламской теологии и более широкими политическими течениями Нусантары, правительство [MAL.GetAdjective] разработало социалистическое видение, где все эти вдохновения слились в единую социалистическую концепцию. Будущее страны здесь рассматривается как борьба всех ее народов за свою свободу, независимо от расы, и только через эту борьбу они смогут объединиться под единым флагом и преодолеть неравенство и разделение."

 MAL_political_tutelage_idea: "Three Principles of the People"
 MAL_political_tutelage_idea_desc: "After liberation by the National Revolutionary Army, the new Malayan Government has followed the path of the Chinese National Revolution, embarking on a phase of one party party rule to implement the Three Principles of the KMT. The new Malaya will forge a new path, built upon the shared struggle of ethnic Malays and Chinese against Imperialist powers. The Malayan People have stood up!"

MAL_malay_confederation_idea: "Малайская Конфедерация"
MAL_malay_confederation_idea_desc: "Отказавшись от сильной центральной власти, правительство [MAL.GetAdjective] решило значительно усилить права отдельных государств, которые составляют [MAL.GetName]. Хотя остается центральное правительство, которое имеет полномочия в вопросах национальных интересов и обороны, основная власть передана местным правительствам, преимущественно малайским, входящим в состав государства."

MAL_reformed_federation_idea: "Реформа Федерации"
MAL_reformed_federation_idea_desc: "Под колониальным правлением, как в британский, так и в немецкий периоды, большинство полуострова Малая управлялось как федерация, объединенная под центральной властью. Теперь, освобожденное от колониальных уз, правительство [MAL.GetAdjective] решило расширить реформированную версию такой модели на всю страну, предоставив значительные полномочия штатам, одновременно инвестируя в исполнительную власть в кабинете министров страны."

MAL_army_idea: "Вооруженные Силы [MAL.GetAdjective]"
MAL_army_idea_desc: "Хотя исторически малайские государства формировали солдат и даже свои собственные полки для своих колониальных властителей, бремя национальной обороны теперь не может быть перекладывано на другие народы. В результате были созданы Вооруженные Силы [MAL.GetAdjective], чтобы должным образом управлять не только обороной страны на суше, но и на море и в воздухе."
