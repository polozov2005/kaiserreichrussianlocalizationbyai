### Events ###
 natal_events.1.t: "Natal's Secessionist Force"
 natal_events.1.d: "The Provincial Council of Natal has overwhelmingly the declaration of loyalty to the Empire, and the Natalian population already decreed its support for the course of action, both in electing this provincial council as through their signing of the Natal Covenant.\n\nHowever, a reaction from Pretoria is likely to be forthcoming, and if Natal is to survive then a certain military backing will be required.\n\nTo this end, the Provincial Council-now-to-be-Natalian Parliament has called upon all the king-emperor's loyal subject to take up arms in defence against the vile Boers in Pretoria. To the relief of the government, the call has received an enthusiastic response, and the Natal Mounted Rifles have defected to the secessionists. Certain military leaders of the UDF also declared their support for our cause."
 natal_events.1.a: "To arms, for his majesty!"

 natal_events.2.t: "Loyalist Militias Rise!"
 natal_events.2.d: "Our choice to seize the moment and declare our independence is far from universally supported. While in both the Cape and Transvaal provinces a full-on declaration of secession could be avoided on account of the large segment of conservative Afrikaner populations that strongly support our republican cause, these provinces still have a significant white English-speaker demographic incensed by our abandonment of the Imperial fold. Certain groups of liberal Afrikaners in the Cape have also sided with the Anglo-South African cause to bring South Africa back into the imperial fold. As such, militias which have declared support for the Natal government have risen up, and it has to be concluded that the government does not exercise effective control in the Eastern Cape coast between Natal and Port Elizabeth any longer."
 natal_events.2.a: "We will crush those traitors!"

 natal_events.3.t: "Loyalist Militias Rise!"
 natal_events.3.d: "Good news! English-speaking populations and even certain liberal Afrikaner groups in the Cape have denounced the government's declaration of the republic and have risen in Natal-aligned militias throughout the country. The most they have seized effective control over a significant chunk of the east of the Cape Province between Natal and Port Elizabeth, and in the urban areas of Port Elizabeth itself, Cape Town and Johannesburg loyalist militias are skirmishing with South African Army units.\n\nThroughout the country, support for the imperial cause is present, but defeating the Boer menace will likely not be an easy task to fulfil."
 natal_events.3.a: "The Boers should be afraid!"

 natal_events.4.t: "Rejoining the Empire"
 natal_events.4.d: "We have left the treacherous and illegitimate republic by the grace of God. Now it is time to swear our fealty to the one and true legitimate king once more.\n\nRealistically speaking, the overwhelming support we are receiving here in South Africa is likely insufficient to actually defeat the Afrikaners and their professional military. Therefore, our envoy, who will be leaving from Mozambique where he will be joined by a representative from Southern Rhodesia, will also request formal recognition by the Empire and seek official reinforcement. We recognise that the focus of the exiles is at the homecoming, we do. But if we, his majesty's loyal subjects from Southern Africa, are to help them fulfil this goal, we will need their help."
 natal_events.4.a: "Safe travels!"

 natal_events.5.t: "Natal and Southern Rhodesia seek our recognition and support"
 natal_events.5.d: "The Afrikaner Nationalist government of our now-former dominion of South Africa has declared itself a republic and distanced itself from the Empire. Two provinces of South Africa, the provinces of Natal and Southern Rhodesia, which have an English-speaking white electorate, have denounced this illegal secession and declared their own independence from the newly-minted Republic of South Africa.\n\nOf course, the South African government has exerted its intention to reclaim the loyalist provinces. These provinces have now sent envoys to us begging for our recognition and our intervention to save them from near-certain domination by South Africa's Dutch-descended, numerically larger, Afrikaner settler population.\n\nThis brings forth a dilemma, for a third Boer War could become costly and distract from the homecoming to a degree, but on the other hand we can hardly condemn our loyal subjects to Boer rule."
 natal_events.5.a: "We will send what support we can."
 natal_events.5.b: "South Africa is *not* slipping from our grasp - send in the troops."

 natal_events.6.t: "The [From.GetFactionName] Promises Reinforcements"
 natal_events.6.d: "Great news: our envoys have arrived from [From.GetNameDef]. They affirm that the [From.GetFactionName] has agreed to support our cause and that reinforcements are on their way to relieve the pressure exerted by South African forces on our local forces. All we have to do now is hold out long enough for these forces from across the empire to arrive!"
 natal_events.6.a: "God save our gracious king!"

 natal_events.7.t: "The [From.GetFactionName] Joins the Fray"
 natal_events.7.d: "Great news: our envoys have arrived from [From.GetNameDef]. Any fears or scepticism about being left to our fate were put to rest, as their response exceeded all our expectations. They reaffirmed their unwavering support for our cause and promised immediate military intervention in order to put down the illegitimate republic. Thanks to their support, our victory is all but guaranteed."
 natal_events.7.a: "God save our gracious king!"

 natal_events.8.t: "The Port Elizabeth Declaration"
 natal_events.8.d: "'Recognising that the Republic of South Africa Constitution Act has never properly been granted Royal Assent and asserting that Afrikaner support can grant no mandate under any circumstance to sever the relation between South Africa's British population and the British crown, this document affirms that the Republic of South Africa does not form a legitimate and indeed sovereign state in any capacity.'\n\nThis is the opening sentence of the Port Elizabeth Declaration, a document drafted by the mayor of Port Elizabeth and signed by several prominent members of the Natal administration. The document asserts that the republican government of South Africa holds no legitimacy and radically amends the South Africa Act as it was before the Republic of South Africa Constitution Act, establishing a federal model similar to Canada or Australasia, and entrenching the monarchist form of government. The significance of the document comes forth from it being subsequently approved by the Natalian parliament, staking their claim to being not merely a secessionist entity, but a rival government to the republic intent on usurping its position after the end of the Boer War."
 natal_events.8.a: "A Federal South Africa shall rise!"

 natal_events.9.t: "The Port Elizabeth Declaration"
 natal_events.9.d: "The treacherous Natalians and their illegitimate parliament have passed the Port Elizabeth declaration, which had been drafted by the mayor of Port Elizabeth. The document denies the legitimacy of the Republic of South Africa, and makes for a Natalian claim of being the true South African government, with an amended South Africa Act that entrenches the monarchist form of government and bases itself on a federal model similar to Australasia and Canada. This declaration significantly increases the stakes of the war, because now it is either victory, or death."
 natal_events.9.a: "Oorwinning of die dood!"

 natal_events.10.t: "The Navy Defects to our side"
 natal_events.10.d: "South Africa's navy has never amounted to much, merely being a small detachment of ships acquired from the Royal Navy. The limited Royal Naval Volunteer Reserve's officer corps, as well as most people in the vicinity of its primary base, Simon's Town near Cape Town, sympathies with our stated goals and have defected to our ranks and set sail from the beleaguered Simon's Town toward Durban."
 natal_events.10.a: "Natal rules the Waves!"

 natal_events.11.t: "The Naval Volunteer Reserve Defects"
 natal_events.11.d: "Disaster, the navy of the Union of South Africa, the Naval Volunteer Reserve, has defected from our ranks and declared their allegiance to the rebels in Natal. While this isn't much of a surprise, given the sympathies held by most marine personnel and the inhabitants of the main marine base of Simon's Town, it is still considered a setback as military control could perhaps delay the influx of supplies from the British Empire or delay any potential invasion, to which we are now certainly exposed."
 natal_events.11.a: "Treachery on the land and in the sea!"

 natal_events.12.t: "Peace with [SAF.GetNameDef]"
 natal_events.12.d: "We have successfully defended [ROOT.GetNonIdeologyName] from the republicans of South Africa, and their morale is dangling as a result of the failure. We could take this opportunity to enforce peace and secure the independence of [ROOT.GetNonIdeologyName] and their loyalty to the Empire, but this would entail giving up on the hoped notion of destroying the republican government and restoring British governance throughout all of South Africa."
 natal_events.12.a: "It is time to extend the olive branch."
 natal_events.12.b: "We will not rest until those vile republicans are destroyed!"

 natal_events.13.t: "The Newcastle Convention"
 natal_events.13.d: "As our war against the Unionists drags on, and little progress has been made on either side, the secessionist government in Natal has approached us with an offer of peace. Should we agree, the rebels would give up their bid to restore the Union of South Africa under their leadership, but we would have to accept the independence of both Natal and Rhodesia.\n\nMany in our government wish to continue the war regardless, as this could very well be our last opportunity to deal with the rebels, and accepting the offer would see our nation fragmented for the foreseeable future. It is, however, unlikely that we will see an end to this conflict any time soon, and it is hard to deny that our war-weary population wants to see it end as soon as possible. Regardless, it is time to make a decision."
 natal_events.13.a: "Signed and stamped."
 natal_events.13.b: "No peace with British bootlickers!"

 natal_events.14.t: "The Newcastle Convention"
 natal_events.14.d: "[ROOT.GetNonIdeologyName] has finally secured its independence. In the Natalian industrial town of Newcastle, a historic location because of its involvement in the drafting of the Pretoria convention of 1881, representatives of [FROM.GetNameDef] and [ROOT.GetNameDef] as well as other Entente representatives have signed the treaty that ensures their continued existence. The treaty does mean that [FROM.GetNameDef] will also live to see another day, and that any pretences of an alternative South African government are forfeit. Hopefully this will serve for us to be equal and friendly members of the international community for the coming future."
 natal_events.14.a: "At least we survived..."

 natal_events.18.t: "Natives in Natal"
 natal_events.18.d: "The former Natal Province, and now the Natal dominion, is not only the heartland of the Anglo-South African diaspora: in this same region, the legendary Shaka Zulu consolidated the Zulu kingdom, which lasted until their eventual defeat to the encroaching British Empire in the Anglo-Zulu war in 1871.\n\nThis historical background is the primary reason that still today, most natives, who make up a very large majority of Natal's population, are Zulu's. Like South Africa we are a white minority-ruled state, as the province and colony of Natal were. The new government should however re-evaluate the status of the Zulu people, now that Natal has left South Africa and reattained full self-governance."
 natal_events.18.a: "To an extent, cooperation is necessary."
 natal_events.18.b: "Only repression can keep White Natalians safe."

 natal_events.19.t: "Working with the ICU?"
 natal_events.19.d: "Back when we were part of South Africa, affiliating with the ICU would have been unthinkable, and the result of such actions revealed themselves when Labour minister Walter Madely did so, causing a split in the party.\n\nOur government is not afraid to indeed work with the ICU for the betterment of Natal. The ICU has a lot of influence on the native population, but their radicalism is somewhat unsettling. Moderates exist among their ranks, however, and prime minister Boydell believes that moderate trade unionism among natives can be cultivated by recognising and working with the Natal ICU instead of constantly vilifying them. Others propose the influence of the ICU can be worn down by establishing new moderate trade unions with whom the government will engage."
 natal_events.19.a: "We can surely lure the ICU away from its radicalism!"
 natal_events.19.b: "We should organise non-radical unions instead."

 natal_events.20.t: "Recognising a Paramount Chief"
 natal_events.20.d: "Since the demise of the kingdom of Zululand, events have not fared well for the Zulu monarchy. The family has merely been recognised by the government as the chiefs of the Usuthu and to make matters worse, since the death of Solomon kaDinuZulu Zulu in 1933, this throne has been disputed between his sons: Pikokwaziwayo Victor kaSolomon Zulu, Thandayiphi kaSolomon Zulu and Cyprian BhekuZulu kaSolomon. In the meantime, the South African government had appointed Mshiyeni kaDinuZulu Zulu, Solomon's brother, as the regent of the chiefdom.\n\nThe new Natalian government's consideration is that the best defence against syndicalist infiltration among the Zulu people is to recognise a paramount chief of the Zulu nation once more to strengthen the tribal structures, but this does mean a stand will have to be taken: one of the princes' claims must be enforced in order to allow us to declare one paramount chief of all the Zulu."
 natal_events.20.a: "Prince Pikokwaziwayo, as the oldest son."
 natal_events.20.b: "Prince Thandayiphi, the regent's recommendation."
 natal_events.20.c: "Prince Cyprian, who was designated as heir in a schoolbook."

 natal_events.21.t: "Cooperation with John Dube"
 natal_events.21.d: "John Langalibalele Dube is the leader of the African National Congress (ANC) in Natal, a native rights group with some similarities to the ICU, albeit much smaller. It is the avid conservatism of this man that has attracted the attention of the government: at a time when syndicalist influence among the Zulu people is growing while the descendants of the Zulu king are busy infighting for the right to the Usuthu chiefdom, Dube is seen as a possible route towards preserving the native traditional structures, forming a defence against syndicalist demagoguery. As Dube is a native rights activist, cooperation goes both ways however."
 natal_events.21.a: "Let us invite him for a cup of tea!"

 natal_events.22.t: "Indians in Natal"
 natal_events.22.d: "Natal's Asiatic community is primarily descended from Indian indentured workers who were imported to work on the sugarcane plantations in the region. Nowadays, they make up a substantial portion of the Natalian population, one larger than the white diaspora. To the annoyance of their white counterparts, many Indians have very successful small businesses that outcompete their competition. As a result of this, the white population of Natal had curtailed their civil rights long before the Natal's inclusion in the Union of South Africa.\n\nThe Asiatic community is politically aware and treating them poorly will likely result in mass actions. However, if we are to cater to them we ought to be careful, for the white electorate will likely disapprove. With the independence of Natal asserted, a policy towards these Natalian citizens needs to be formulated."
 natal_events.22.a: "We need to work together more closely."
 natal_events.22.b: "Surely we cannot allow them to outcompete us!"

 natal_events.23.t: "Race Riots in Durban"
 natal_events.23.d: "Disaster... After an Indian man allegedly hit a Zulu girl, Zulu rioters have assaulted ethnic Indians in the Indian business district of Durban. In their rage, they have started attacking individual Indians, stoning vehicles of Indian drivers, looting Indian stores and burning Indian property. According to an informant, the Zulus are organised by troublemakers who have decided it 'is time to rid the country of Indians'.\n\nThe police is ready to follow the town council's instructions. According to the police chief intervening as soon as possible would be necessary to limit the amount of casualties to be expected."
 natal_events.23.a: "Make sure it does not become a true massacre, but don't let it end too soon."
 natal_events.23.b: "A harsh crackdown on these Zulu barbarians is warranted!"
 natal_events.23.c: "Let the Zulu have their fun."

 natal_events.24.t: "Asiatic Representation Council"
 natal_events.24.d: "The Natal government has decided to grant the Asian diaspora in Natal a certain degree of representation. Whereas they previously held no political influence at all, an Asiatic Representation Council made up of whites will now be elected by the Asiatic population of Natal, giving them at least a degree of representation, even if Natal's whites are not prepared to share power with them on an equal basis."
 natal_events.24.a: "A step in the right direction, I assure you!"

 natal_events.25.t: "General Elections of [GetYear]"
 natal_events.25.d: "With the end of the war, it is time the Natalian (white) population elects a government with a mandate. The provisional independence coalition of the Union Federal Party and the Dominion Party has dissolved and the last few weeks they have been campaigning against one another. Most expect that one of those two will secure a majority, though if parliament proves hung, there is a slim chance that a coalition of the Natal Labour Party and the leftovers of the South African Party might be able to form a government instead, banishing both the supposed larger parties to the opposition. The National Party also partakes on an unambiguous reunionist platform, but they are not expected to be competitive anywhere but in Durban-North."
 natal_events.25.a: "The Union Federal Party gains a working majority."
 natal_events.25.b: "The Dominion Party wins over half of the constituencies."
 natal_events.25.c: "A coalition between Labour and SAP proves successful."

 natal_events.26.t: "Victory in the Boer War"
 natal_events.26.d: "Once again, the British stand victorious. D.F. Malan's rebellious republic has been vanquished, and rightful imperial order has been restored. South Africa's future is once again firmly aligned with the British Empire and the Entente. It is now up to us to ensure this will have been the last time South Africa is drenched in blood. Surely the third time is the charm?!"
 natal_events.26.a: "God save the King!"

 natal_events.27.t: "Federal Elections of [GetYear]"
 natal_events.27.d: "It is time to hold our new federation's first federal elections. Much like in the Union, most of the electorate is still white, but it is most definitely different from before: large amounts of Afrikaners affiliated with the treacherous National Party, or those who fought on the Boer side during the war have been disenfranchised, making up for the demographic gap between Afrikaners and English-speaking South Africans.\n\nThe election is somewhat similar to those in the early days of the union, with Nicholls' Union Federal Party fulfilling the role of the English-speaking Unionists and the South African Party, now led by Jan Hendrik Hofmeyr following the retirement of general Smuts, being supported by Afrikaners, although most former Nationalists, insofar they are not disenfranchised, do not recognise themselves in the liberal path Hofmeyr is pulling the party towards."
 natal_events.27.a: "Victory for Nicholls, father of the Federation!"
 natal_events.27.b: "Hofmeyr's liberal programme wins the day!"

 natal_events.28.t: "Militias occupy the Houses of Parliament"
 natal_events.28.d: "'The notion that, after having defeated Afrikaner forces, the mechanics of democracy once again put the Afrikaners in power at the cost of South Africa's British population, is unacceptable.' is what the MP for Roodepoort, Charles Stallard, of the fringe Dominion Party declared. Today was supposed to be the festive assembly of the first federal parliament of South Africa, after the SAP's victory. Not so, as militias who fought for the Federal side during the Boer War occupied Cape Town's Houses of Parliament at this very day. Stallard, acting as the speaker for these rebels, directed the Governor-General directly: to safeguard the interests of the British diaspora in South Africa, parliament is to be suspended for an undetermined period and the Governor-General is to assume control of the government in a similar fashion to Australasia's situation in the 1920s, while a Dominion Party caretaker government shall assist in this task.\n\nThe Governor-General then stepped up and..."
 natal_events.28.a: "... invoked his Emergency Powers to follow up on the call!"
 natal_events.28.b: "... denounced the disrespect to the democratic process."

 natal_events.29.t: "Militias retreat from the Houses of Parliament"
 natal_events.29.d: "Following the denunciation by the Governor-General, Stallard and the militias were forced to conclude that without the requested support of the crown, their attempted coup would stand no chance. The militias then surrendered and the parliamentary process was resumed as it was originally planned. Later that day, prospective prime minister Jan Hendrik Hofmeyr, announced his understanding for the British concerns, and as a reconciliatory measure announced he would pardon all soldiers involved with the occupation besides those who orchestrated it, whose punishment he would instead personally commute to a maximum of five years in prison if they were to be sentenced more than that."
 natal_events.29.a: "A rocky start to a new beginning"

 natal_events.51.t: "Federal Elections of [GetYear]"
 natal_events.51.d: "The mandate of the federal government has run out and the governor-general has called elections once again. The South African electorate in all of South Africa's states have gathered to elect a new parliament to represent them in Cape Town. Politicians from both the UFP and SAP, having spent the season campaigning for their seats in the federal parliament, are awaiting anxiously if their hard work has been rewarded by the voter."
 natal_events.51.a: "The Union Federal Party gains the majority!"
 natal_events.51.b: "The South African Party triumphs!"

 natal_events.52.t: "General Elections of [GetYear]"
 natal_events.52.d: "With the five year mandate of parliament complete, it is time for the Natalian electorate to elect a new one. The main parties competing to form a government are the Union Federal Party of Nicholls, the Dominion Party of Stallard and the Labour Party of Boydell. Now nothing is left but to await the results..."
 natal_events.52.a: "The Union Federal Party gains a working majority."
 natal_events.52.b: "The Dominion Party wins over half of the constituencies."
 natal_events.52.c: "A coalition between Labour and SAP proves successful."

 natal_events.53.t: "The 'Coloured' Enfranchisement Act"
 natal_events.53.d: "Now that J.H. Hofmeyr has received his newly acquired majority in the new Federal Parliament in Cape Town, he has tabled his most controversial bill yet. And it is going to pass: in the federal elections Hofmeyr gambled that at least the more moderate right-wing Afrikaners, deprived of their own party which due to its involvement with the attempted secession from the Empire is now illegal, would be too dense to vote for the English-speaker Union Federal Party of Heaton Nicholls, and as such did everything within his power to have progressive candidates nominated. In this way, he created a coalition of Afrikaners and British progressives, which shattered the UFP despite the gerrymandered districts ensuring the British vote would be decisive.\n\nSeeing the writing on the wall with the SAP majority, and unwilling to alienate a clearly about to be enfranchised 'coloured' voter base, the UFP has decided to support the bill, while quietly assuring their constituents in Natal that they will allow this to be a step towards enfranchisement of the Indian population of Natal. The only opposition in the federal parliament comes from the hard-line segregationist Dominion Party, with colonel Stallard condemning the prime minister's bill, claiming ‘the new states of the South African Federation are not like the provinces of the Union which can be told what to do by Pretoria; this bill great oversteps the bounds of federal authority.' However, his objections will not stop the bill from passing. The Dominion Party is only a minor player in parliament."
 natal_events.53.a: "The bill passes comfortably!"

 natal_events.54.t: "Language Battle in Stellenbosch"
 natal_events.54.d: "We have been working hard to anglicise South Africa, and part of it was to convince institutions of higher education to drop their Afrikaans and teach in English instead. Unfortunately, one of the oldest and most prestigious universities in South Africa, the University of Stellenbosch, prides itself on a long tradition of primarily teaching in Afrikaans and shows unwillingness to comply with everything we try to do to get it so: bringing over Anglophone professionals, giving support to complying universities over them, denying grants to them. They are still actively hiring Afrikaans professors and continue to teach the vast majority of their subjects in Afrikaans. They are a lone island of Afrikaner culture which we seem to be unable to get to budge."
 natal_events.54.a: "Enough! Teach in English or be relegated to the history books!"
 natal_events.54.b: "Revoke every last privilege and Pound of funding!"

 natal_events.60.t: "[From.GetNameDefCap] Wants to Join the Entente"
 natal_events.60.d: "After we refused to help the pro-British rebels in South Africa, few thought that they would defy and defeat the republic on their own. Yet they did somehow prevail by themselves, and now, [From.GetNameDefCap] has formally applied once again to rejoin the British Empire and sphere of influence. At this point, there seems little reason to refuse them..."
 natal_events.60.a: "Let the Union Jack wave proudly once again!"
 natal_events.60.b: "Impressive, but the whole point was to ditch South Africa!"

 natal_events.61.t: "[From.GetNameDefCap] Agrees"
 natal_events.61.d: "Unsurprisingly, [From.GetNameDef] was more than happy to welcome us back this time. With the Boers defeated [Root.GetNameDef] shall stand, hopefully this time permanently, with the Empire!"
 natal_events.61.a: "Say it with me, Boer, God save the King!"

 natal_events.62.t: "[From.GetNameDefCap] rejects us once again!"
 natal_events.62.d: "Unbelievable! First the [From.GetAdjective] left us in the cold during the struggle against the Boer menace. Despite their lack of reinforcement in what beforehand seemed a hopeless struggle we still managed to prevail in our loyalty to the Empire, which we expected to promptly rejoin now that we have won. Not so unfortunately, because for whatever reason, they simply do not want us. We have been nothing but loyal, and this is our thanks?!"
 natal_events.62.a: "Maybe we should join America!"

 natal_events.63.t: "The Federation Rekindled"
 natal_events.63.d: "Event for a post-Boer War peace Natal - someone else has defeated the Boers and given them control over the rest of South Africa, so Natal reforms itself into the Federation."
 natal_events.63.a: "Victory, snatched from the jaws of defeat."
