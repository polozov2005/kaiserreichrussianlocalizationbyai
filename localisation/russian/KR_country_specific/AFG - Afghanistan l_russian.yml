### World Tension ###
 AFG_anglo_afghan_war_threat: "Пятая англо-афганская война"

### Events ###
 afghanistan_events.0.t: "5-ая Англо-афганская война?"
 afghanistan_events.0.d: "В остатках раджа, как полевые цветы, восходят ростки недовольства, связанные с восхождением на престол Эдуарда VIII. Здесь, в Кабуле, нам также приходится сталкиваться с недовольством по поводу новых реформ. Повторная победа в Англо-афганской войне могла бы укрепить наш авторитет и, к тому же, принесла бы нам новые земли!"
 afghanistan_events.0.a: "Время пришло! Настал час нашей победы!"
 afghanistan_events.0.b: "Что в Индии есть кроме коров?"

 afghanistan_events.1.t: "Вторжение Афганистана"
 afghanistan_events.1.d: "Почувствовав момент слабости после смерти Георга V, Афганистан вторгся в нашу страну! Это не первый подобный случай: после Вельткрига они напали на Северо-Западную пограничную провинцию и оккупировали ее. Мы должны защитить Доминион! Джай Хинд!"
 afghanistan_events.1.a: "Мы загоним этих шавок обратно в горы!"

 afghanistan_events.2.t: "Третий Равалпиндский договор"
 afghanistan_events.2.d: "Победа за нами! Изнеженные британские шавки в Дели повержены и наши храбрые солдаты маршируют по их столице. Пока мы ещё ведём, стоит начать переговоры и выдвинуть свои условия."
 afghanistan_events.2.a: "Потребуйте Кветту..."
 afghanistan_events.2.b: "...и Белуджистан!"
 afghanistan_events.2.c: "Берём всё и даже больше!"

 afghanistan_events.3.t: "Требования эмира"
 afghanistan_events.3.d: "Проклятье! Эти афганские псы победили и унизили нас. Афганский эмир требует от нас признать поражение и передать Кашмир. Хоть эти требования и жёстки, но лучше уж нам закончить эту войну."
 afghanistan_events.3.a: "Мы падаем ниц перед эмиром..."
 afghanistan_events.3.b: "Они, должно быть, шутят? Да здравствует Индия!"

 afghanistan_events.4.t: "Правительство Дели отклонило наши требования!"
 afghanistan_events.4.d: "Британские шавки необдуманно отказались выполнить наши требования."
 afghanistan_events.4.a: "Война продолжается!"

 afghanistan_events.5.t: "Массовое бегство шиитов"
 afghanistan_events.5.d: "На протяжении десятилетий, наши отношения с шиитским меньшинством были напряжёнными. Эта война подорвала их ещё сильнее. Шиитские имамы из провинций Герат и Фарах подбивают свою паству бежать от войны в соседнюю Персию. Нам нужны люди. Надеемся, что Персия закроет свои границы для этих трусов."
 afghanistan_events.5.a: "Предатели!"

 afghanistan_events.6.t: "Беженцы из Афганистана"
 afghanistan_events.6.d: "Началась ещё одна война между Афганистаном и Дели. Шиитское меньшинство, опасаясь ухудшения ситуации, решило начать новую жизнь в нашей стране. Если мы примем их к себе, это подорвёт наши отношения с Афганистаном."
 afghanistan_events.6.a: "Поприветствуйте их и поселите в Мешхеде!"
 afghanistan_events.6.b: "Мы не собираемся лезть в дела Афганистана, закрыть границы!"

 afghanistan_events.7.t: "Персия закрыла границы"
 afghanistan_events.7.d: "Персия сделала правильный выбор и отправила шиитов обратно к нам"
 afghanistan_events.7.a: "Ура!"

 afghanistan_events.8.t: "Реакция на поражение в войне"
 afghanistan_events.8.d: "Поражение наших армий в войне шокировало все слои населения! Секретная служба докладывает о недовольстве среди армейских элит и крестьянской черни! Даже самые радикальные проповедники теперь набирают паству, проповедуя о восстании против нас! Тяжёлые времена настали для нашей страны."
 afghanistan_events.8.a: "Король может делать, что пожелает! Подавить восстания!"
 afghanistan_events.8.b: "Install Mohammad Nadir Khan, he will be loyal to us."

 afghanistan_events.9.t: "Третий Равалпиндский договор"
 afghanistan_events.9.d: "Катастрофа! Наши армии разбегаются, побеждённые индусами. Наместник, Ганга Синдх, выдвинул условия мирного договора, по которому границы между нашими государствами вернуться к состоянию 1926 года. К несчастью, мы не можем ему отказать."
 afghanistan_events.9.d.puppet: "Катастрофа! Наши армии разбегаются, побеждённые индусами. Наместник, Ганга Синдх, выдвинул условия мирного договора, по которому мы должны стать марионеткой британских шавок. К несчастью, мы не можем ему отказать."
 afghanistan_events.9.a: "Мы смиренно склоняем головы..."

 afghanistan_events.10.t: "Хаос в Афганистане!"
 afghanistan_events.10.d: "Несмотря на все усилия, наша армия была выбита из Кабула и мы потеряли власть над страной!"
 afghanistan_events.10.a: "Traitors!"

 afghanistan_events.11.t: "Refugees from Afghanistan"
 afghanistan_events.11.d: "Yet another war has started between Afghanistan and the Dominion of India. The Shi'a minority in Afghanistan fears this will only make their situation worse, and they have decided to start a new life here. However, this situation might be more problematic than we think. If we accept these people into our nation, the government of Afghanistan will be deeply upset with us."
 afghanistan_events.11.a: "They shall be more than welcome, settle them in Meshad!"
 afghanistan_events.11.b: "This would be meddling in Afghan domestic politics, refuse them!"

 afghanistan_events.12.t: "Persia Closes Its Borders"
 afghanistan_events.12.d: "The Persians made the right choice and sent our people back home."
 afghanistan_events.12.a: "Hurrah!"

 afghanistan_events.13.t: "Domestic Reaction to Afghan Defeat"
 afghanistan_events.13.d: "The defeat of our armies has sent shock waves through Afghanistan! Our secret service reports huge dissatisfaction with the royal government amongst both the peasants and the army! Even worse, radical clerics are drumming up support for a general insurrection against the royal reform programme! These are truly dark times for our small kingdom."
 afghanistan_events.13.a: "The King can do as he likes! Suppress any rebellion!"
 afghanistan_events.13.c: "Mohammed Nadir deposes Amanullah and proclaims himself king!"

 afghanistan_events.14.t: "Притязания Надир-шаха на престол"
 afghanistan_events.14.d: "Придя к власти путём насильственного захвата, Мухаммед Надир-шах рьяно пытался придать легитимности своей персоне. Он предположил созвать 'лойя-джиргу' (Великое собрание) всех пуштунских вождей в надежде, что они одобрят его притязания на трон."
 afghanistan_events.14.a: "Созвать 'лойя-джиргу'!"

 afghanistan_events.15.t: "Надир-шах и 'лойя-джирга'"
 afghanistan_events.15.d: "Стоя перед племенными лидерами, Мухаммед Надир пытается завоевать их расположение."
 afghanistan_events.15.a: "Собрание провозгласило Надир-шаха новым монархом!"

 afghanistan_events.20.t: "Mohammed Nadir Khan's Claim to the Throne"
 afghanistan_events.20.d: "As he assumed the throne through not-so-cordial methods and his relations to the royal family, Mohammed Nadir Khan desperately needs legitimacy to shore up his regime. It is suggested that his majesty convey a 'loya jirga' (grand assembly) of Pashtun leaders to confirm his ascension."
 afghanistan_events.20.a: "Call a loya jirga to confirm my ascension!"

 afghanistan_events.21.t: "Mohammed Nadir Khan and the Loya Jirga"
 afghanistan_events.21.d: "Speaking before the Grand Assembly of tribal leaders, Nadir Khan hopes to receive enough support to continue his rule unhindered."
 afghanistan_events.21.a: "The assembly hails Mohammed Nadir as king!"

 afghanistan_events.22.t: "Nadir Khan's Royal Oligarchy"
 afghanistan_events.22.d: "With the war-torn country finally restored to some semblance of order, Nadir Khan has resolved to reorganise his cabinet to secure continued stability for Afghanistan. Packing the government with relatives would be the obvious way to bind the state apparatus to Nadir's ambitions, but reaching out to some of Amanullah's supporters might also bridge a wide gap between the radical and moderate reformists."
 afghanistan_events.22.a: "The meek academic Muhammed Ghobar shall 'lead' the cabinet!"
 afghanistan_events.22.b: "Woo Amanullah's clique and appoint Abdul Hadi Dawai!"
 afghanistan_events.22.c: "My mild mannered brother Mahmud Khan shall retain the position!"

 afghanistan_events.23.t: "Status of Amanullah's Reforms"
 afghanistan_events.23.d: "Mohammed Nadir Khan has taken control of our shaken nation after the failure of Amanullah Khan to enforce Afghan progress. Well aware that a great factor to his predecessor's downfall was the speed of his westernisation reforms, Nadir Khan nonetheless has to address the great issue of rebuilding Afghanistan."
 afghanistan_events.23.a: "Discontinue social reform, but galvanise the improvement of our infrastructure!"
 afghanistan_events.23.b: "Cave in to the traditionalists and abandon all pretence of modernity!"
 afghanistan_events.23.c: "I shall succeed where Amanullah failed and bring Afghanistan into the modern world!"

 afghanistan_events.24.t: "Sarrafs Leave Afghanistan"
 afghanistan_events.24.d: "Sarrafs are a group of Indian merchants who travel between Afghanistan and [RAJ.GetNameDef], exchanging money and trading goods in both of them. Our economy hardly depends on their visits. Now, the war has come and borders are safe no more. Only a few of these sarrafs are brave enough to continue trading with us. With most of their caravans gone, we now suffer from an economic crisis."
 afghanistan_events.24.a: "We don't need these Indian dogs anyway!"

 afghanistan_events.25.t: "Sarrafs Return"
 afghanistan_events.25.d: "The war is over and borders are now safe. Nothing more disturbs the sarrafs now and the first wave of them have already resumed their trading within Afghanistan. Soon, our economy will recover."
 afghanistan_events.25.a: "Welcome, gentlemen!"

 afghanistan_events.30.t: "Пятая Англо-Афганская война"
 afghanistan_events.30.d: "После Великой Войны Индийский Доминион оказался на грани катастрофы, и Королевство Афганистан воспользовалось моментом, аннексировав Пешавар и Кветту. Осознавая, что это лишь временная победа, король Аманула Хан пытался провести реформы, но все они натолкнулись на резкую оппозицию в стране. Теперь король Афганистана снова пытается воспользоваться кризисом, возникшим после смерти Георга V. Маленькой победоносной войной король надеется удовлетворить консервативную оппозицию и расширить свои владения. Но эксперты считают, что Афганистан не выдержит второй войны."
 afghanistan_events.30.a: "Кому есть дело до Афганистана?"

