 scientist_trait_genius_desc: "Дальновидный ум, который расширяет границы науки и техники с помощью беспрецедентных инноваций. Это своего рода талант, который проявляется только один раз в поколении."
 scientist_trait_gifted_engineer: "Одаренный инженер"
 scientist_trait_gifted_engineer_desc: "Талантливый от природы инженер, способный решать сложные технические проблемы в самых разных областях."
 scientist_trait_brilliant_theorist: "блестящий теоретик"
 scientist_trait_brilliant_theorist_desc: "Мастер абстрактных концепций и теорий, способный произвести революцию в военной стратегии и научных исследованиях."
 scientist_trait_bright: "Яркий"
 scientist_trait_bright_desc: "Острый, сообразительный учёный, который отлично схватывает новые концепции и эффективно их применяет."
 scientist_trait_fast_learner: "Быстрый ученик"
 scientist_trait_fast_learner_desc: "Быстро адаптируется к новым задачам, обучается быстрее, чем сверстники, и преуспевает в различных научных областях."
 scientist_trait_resourceful: "Находчивый"
 scientist_trait_resourceful_desc: "Всегда находит творческие решения, даже когда ресурсов мало или ситуация тяжелая."
 scientist_trait_schrodingers_trait: "Черта Шрёдингера"
 scientist_trait_schrodingers_trait_tt: "Прирост опыта учёного: §G+10%§!\nПрирост опыта учёного: §R-10%§!"
 scientist_trait_schrodingers_trait_desc: "Прежде чем наблюдатель откроет ящик, волновая функция, описывающая признак, образует суперпозицию состояний «хорошее» и «плохое»."

 scientist_trait_aircraft_specialist: "Специалист по самолетам"
 scientist_trait_aircraft_specialist_desc: "Специалист в области аэродинамики и проектирования самолетов, способный разрабатывать превосходные планеры, двигатели и конструкции, позволяющие доминировать в небе."
 scientist_trait_rocketry_specialist: "Специалист по ракетам"
 scientist_trait_rocketry_specialist_desc: "Специализируется на ракетной технике, уделяя особое внимание принципам движения в программах баллистической и управляемой ракетной техники."
 scientist_trait_electronics_specialist: "Специалист по электронике"
 scientist_trait_electronics_specialist_desc: "Специализируется на коммуникационных, радиолокационных и вычислительных системах, необходимых для современной войны."
 scientist_trait_helicopter_expert: "Эксперт по вертолетам"
 scientist_trait_helicopter_expert_desc: "Пионер винтокрылых самолетов, специализирующийся на механике вертикального полета, несущих системах и ранних моделях вертолетов."
 scientist_trait_jet_expert: "Джет Эксперт"
 scientist_trait_jet_expert_desc: "Специалист в области реактивного движения, продвигающий исследования первых реактивных двигателей и их применения в военных самолетах."
 scientist_trait_bombs_expert: "Эксперт по бомбам"
 scientist_trait_bombs_expert_desc: "Имеет навыки разработки взрывных устройств и высокоточных бомб, которые можно использовать в новых усовершенствованных стратегиях бомбардировок с воздуха."
 scientist_trait_guidance_systems_expert: "Эксперт по системам наведения"
 scientist_trait_guidance_systems_expert_desc: "Эксперт в области ранних разработок технологий наведения, имеющий опыт совершенствования систем управления беспилотными взрывными устройствами большой дальности."
 scientist_trait_armored_specialist: "Специалист по бронетехнике"
 scientist_trait_armored_specialist_desc: "Опытный инженер специализировался на проектировании и совершенствовании танков и другой бронетехники."
 scientist_trait_artillery_specialist: "Специалист по артиллерии"
 scientist_trait_artillery_specialist_desc: "Специалист по артиллерийским системам, имеющий опыт отработки дальнобойной огневой мощи и крупнокалиберных орудий."
 scientist_trait_submarine_specialist: "Специалист по подводным лодкам"
 scientist_trait_submarine_specialist_desc: "Специалист по подводной войне, занимающийся разработкой новых технологий подводных лодок, позволяющих повысить их роль в скрытных военно-морских операциях."
 scientist_trait_surface_ship_specialist: "Специалист по надводным кораблям"
 scientist_trait_surface_ship_specialist_desc: "Специализируется на проектировании, разработке и развертывании крупных надводных военных кораблей, а также на исследовании новых технологий для оснащения военных кораблей."
 scientist_trait_nuclear_specialist: "Специалист по атомной энергии"
 scientist_trait_nuclear_specialist_desc: "Физик, стоящий на переднем крае атомных исследований, глубоко погруженный в изучение ядерного деления и цепных реакций."
 scientist_trait_nuclear_warfare_expert: "Эксперт по ядерной войне"
 scientist_trait_nuclear_warfare_expert_desc: "Эксперт в области практического применения ядерной физики при разработке оружия, специализирующийся на теории конструкции атомной бомбы."
 scientist_trait_nuclear_power_expert: "Эксперт по атомной энергетике"
 scientist_trait_nuclear_power_expert_desc: "Ведущий специалист в области ядерной физики, разбирающийся в области ядерного деления с упором на производство электроэнергии."

 ############# EVENTS #############
 # Nuclear Projects
 sp_nuclear_project_events.1.t: "Утечка информации"
 sp_nuclear_project_events.1.desc: "Хотя это и совершенно случайно, нашим агентам в [FROM.GetNameDef] удалось получить информацию о явно секретном проекте. Рабочий, участвовавший в разработке секретного оружия, атомной бомбы, рассказал о своей работе на небольшом общественном собрании, на котором присутствовал также один из наших агентов."
 sp_nuclear_project_events.1.a: "Это может оказаться полезным"
