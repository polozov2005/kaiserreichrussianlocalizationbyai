 sp_air_axial_jet_engine_desc: "Первые разработанные реактивные двигатели могут сжимать воздух лишь в ограниченной степени. Возможно, можно будет подключить несколько компрессоров последовательно, чтобы еще больше увеличить тягу."

 sp_air_supersonic_jet: "Сверхзвуковой реактивный самолет"
 sp_air_supersonic_jet_desc: "Достижения в области технологии реактивных двигателей открывают путь к самолетам, способным достигать скорости 1 Маха и преодолевать звуковой барьер."

 sp_air_helicopter: "Вертолет"
 sp_air_helicopter_desc: "Разработка вертолета с его уникальной способностью зависать на месте могла бы обеспечить решающее тактическое преимущество в военных операциях."

