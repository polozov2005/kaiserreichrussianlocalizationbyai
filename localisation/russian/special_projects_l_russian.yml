 # Generic
 sp_rockets_scientist_xp_generic_reward: "Новые знания"
 sp_rockets_scientist_xp_generic_reward_desc: "Наши ученые сделали несколько новых открытий в ходе работы с новейшим прототипом."
 #sp_rockets_scientist_xp_generic_reward_option: "That is good"

 sp_rockets_political_interference_generic_reward: "Политическое вмешательство"
 sp_rockets_political_interference_generic_reward_desc: "Политики, балующиеся там, где им не следовало бы, привели к тому, что проект был вынужден переделывать то, что уже было сделано, по причинам, которые ни для кого не имеют смысла."
 #sp_rockets_political_interference_generic_reward_option: "Two steps forward, one step back"

 sp_rockets_onsite_explosion_generic_reward: "Взрыв на месте"
 sp_rockets_onsite_explosion_generic_reward_desc: "Сильный взрыв во время одного из испытаний привел к серьезным повреждениям частей объекта, но также привел к новым открытиям для наших ученых."
 #sp_rockets_onsite_explosion_generic_reward_option: "At least it wasn't totally destroyed"

 sp_rockets_generic_major_breakthrough_reward: "Главный прорыв"
 sp_rockets_generic_major_breakthrough_reward_desc: "Во время последней итерации прототипа нам удалось совершить крупный прорыв."
 #sp_rockets_generic_major_breakthrough_reward_option: "Excellent!"

 sp_rockets_generic_avionics_advancements_reward: "Достижения в области авионики"
 sp_rockets_generic_avionics_advancements_reward_desc: "За время нашей работы мы сделали много открытий в области авионики и аэродинамики, которые могут принести пользу нашему авиационному производству."
 #sp_rockets_generic_avionics_advancements_reward_option: "This will certainly prove useful"

 sp_rockets_experimental_rockets_improved_accuracy_reward: "Улучшения точности"
 sp_rockets_experimental_rockets_stability_improvements_reward: "Улучшена стабильность полета ракеты"

 # Flying Bomb
 sp_rocket_design_choice_reward: "Дальность против полезной нагрузки?"
 sp_rocket_design_choice_reward_desc: "При проектировании нашей летающей бомбы наши инженеры утверждают, что важно решить, какова основная цель конструкции бомбы. Хотим ли мы максимизировать дальность полета или полезная нагрузка является наиболее важным вопросом?"
 sp_rocket_design_choice_reward_balanced: "Сбалансированный"
 sp_rocket_design_choice_reward_range: "Диапазон"
 sp_rocket_design_choice_reward_payload: "Полезная нагрузка"

 sp_rockets_flying_bomb_technical_breakthrough_in_pulsejet_design_reward: "Технический прорыв в конструкции импульсной струи"
 sp_rockets_flying_bomb_technical_breakthrough_in_pulsejet_design_reward_desc: "Наши инженеры преодолели значительные препятствия при разработке импульсного реактивного двигателя ракеты, имеющего решающее значение для ее дальности и скорости."
 #sp_rockets_flying_bomb_technical_breakthrough_in_pulsejet_design_reward_option: "Upward and Onward!"

 sp_rockets_flying_bomb_launch_ramp_innovations_reward: "Запуск инноваций в рампе"
 sp_rockets_flying_bomb_launch_ramp_innovations_reward_desc: "Наши инженеры существенно усовершенствовали специализированные стартовые рампы, необходимые для развертывания ракет."
 sp_rockets_flying_bomb_launch_ramp_innovations_reward_option: "Добрая весть"

 sp_rockets_flying_bomb_mass_production_scaling_reward: "Масштабирование массового производства"
 sp_rockets_flying_bomb_mass_production_scaling_reward_desc: "Нам удалось усовершенствовать производство, что позволит нам гораздо быстрее перейти к массовому производству."
 #sp_rockets_flying_bomb_mass_production_scaling_reward_option: "Most beneficial"

 sp_rockets_flying_bomb_engine_optimization_breakthrough_reward: "Прорыв в оптимизации двигателя"
 sp_rockets_flying_bomb_engine_optimization_breakthrough_reward_desc: "Нашим инженерам удалось существенно улучшить дальность и надежность импульсной струи, повысив эксплуатационные возможности ракеты."
 #sp_rockets_flying_bomb_engine_optimization_breakthrough_reward_option: "Some call it luck"

 sp_rockets_flying_bomb_technological_innovation_in_guidance_systems_reward: "Технологические инновации в системах наведения"
 sp_rockets_flying_bomb_technological_innovation_in_guidance_systems_reward_desc: "В ходе последнего этапа прототипирования были внесены значительные улучшения в точность системы наведения и устойчивость к помехам, что позволило нам расширить наше технологическое преимущество."
 #sp_rockets_flying_bomb_technological_innovation_in_guidance_systems_reward_option: "We are getting closer to achieving our goal"

 sp_rockets_flying_bomb_test_flight_failures_reward: "Неудачи испытательных полетов"
 sp_rockets_flying_bomb_test_flight_failures_reward_desc: "Ранние испытательные полеты привели к отказам из-за неисправностей системы наведения и недостатков конструкции. Наши ученые многому научились из этого, но нам нужно сделать шаг назад и переосмыслить."
 #sp_rockets_flying_bomb_test_flight_failures_reward_option: "They say you learn the most from your failures"

 # Ground to Air
 sp_rockets_ground_control_improvements_reward: "Улучшения наземного управления"
 sp_rockets_ground_control_improvements_reward_desc: "[Character.GetName] удалось решить несколько нерешенных проблем с возможностью отслеживания и управления ракетой с земли. Это знаменует собой значительный шаг к возможности поражать высоколетящие самолеты противника."

 sp_rockets_vertical_launch_reward: "Система вертикального запуска"
 sp_rockets_vertical_launch_reward_desc: "После нескольких неудачных попыток [Character.GetName] наконец удалось решить проблемы, связанные с вертикальным запуском этих ракет. Новая система должна позволить ракетам без проблем запускаться и без задержек достигать больших высот."

 sp_rockets_high_speed_flight_control_reward: "Управление высокоскоростным полетом"
 sp_rockets_high_speed_flight_control_reward_desc: "Нам наконец-то удалось получить работающую систему управления, способную функционировать на высоких скоростях и реагировать на изменение динамики полета. Эти знания, безусловно, могут быть полезны и в других областях."
 sp_rockets_high_speed_flight_control_bonus: "Управление высокоскоростным полетом"

 sp_rockets_warhead_detonation_mechanisms_reward: "Механизмы детонации боеголовки"
 sp_rockets_warhead_detonation_mechanisms_reward_desc: "Важная часть всей разработки — заставить оружие взрываться в нужной точке. Похоже, [Character.GetName] удалось найти решение, которое позволит нам взорвать его в максимально благоприятное время."
 sp_surface_air_missile_warhead_detonation_bonus: "Ракета Земля-Воздух: улучшенный детонация боеголовки"
 #Ballistic missile

 sp_rocket_wind_tunnel_choice_reward: "Инженеры запрашивают аэродинамическую трубу"
 sp_rocket_wind_tunnel_choice_reward_desc: "Инженеры проекта баллистической ракеты ранее запросили строительство сверхзвуковой аэродинамической трубы для испытаний масштабных моделей своих проектов. Это быстро ускорит процесс итерации и сэкономит ресурсы в долгосрочной перспективе."
 sp_rocket_wind_tunnel_choice_reward_reject: "Ресурсы нужны в другом месте."
 sp_rocket_wind_tunnel_choice_reward_agree: "Распределите ресурсы."

 sp_rocket_glass_wool_choice_reward: "Образование льда при входе в атмосферу"
 sp_rocket_glass_wool_choice_reward_desc: "На этапе входа ракеты в атмосферу вокруг топливных баков образуется лед, который мешает работе внутренних частей ракеты. Несмотря на неудачу, наши инженеры предложили обложить резервуары стекловатой, чтобы предотвратить подобное в будущем."
 sp_rocket_glass_wool_choice_reward_accept: "Неудачно, но необходимо."

 sp_rocket_guidance_system_choice_reward: "Система наведения"
 sp_rocket_guidance_system_choice_reward_desc: "Наши инженеры обсуждают систему наведения ракеты. Некоторые хотят использовать проверенный механический компьютер, в то время как другие хотят использовать новые радиотехнологии для управления и наблюдения за запуском ракеты."
 sp_rocket_guidance_system_choice_reward_mechanical: "Механика надежна."
 sp_rocket_guidance_system_choice_reward_radio: "Радио – это будущее!"

 sp_rocket_turbo_pump_froth_reward: "Проблема с вспениванием турбонасоса"
 sp_rocket_turbo_pump_froth_reward_desc: "В ходе высотных испытаний была выявлена ​​проблема с турбонасосом. Похоже, что смазка внутри насосов начинает вспениваться в тяжелых условиях, что влияет на общую производительность и надежность нынешней конструкции."
 sp_rocket_turbo_pump_froth_reward_accept: "Мы должны это выяснить!"

 sp_rocket_relay_failure_reward: "Отказ реле"
 sp_rocket_relay_failure_reward_desc: "При подготовке к испытательному пуску было обнаружено неисправное реле, используемое в системах внутреннего управления ракеты. Инженеры считают, что нам следует заменить реле, прежде чем продолжить, но растет обеспокоенность по поводу политических последствий задержки."
 sp_rocket_relay_failure_reward_accept: "Почините эти реле."
 sp_rocket_relay_failure_reward_reject: "Мы больше не можем медлить."

 sp_rocket_outercoating_reward: "Ракетная ржавчина"
 sp_rocket_outercoating_reward_desc: "Высказывались опасения по поводу внешнего корпуса ракеты. При длительном хранении материалы часто ржавеют и подвергаются коррозии. Это может привести к тому, что ракета выйдет из строя, если решение не будет найдено."
 sp_rocket_outercoating_reward_accept: "Может, смазку применить?"

 sp_rocket_launch_site_choice_reward: "Проблемы с запуском сайта"
 sp_rocket_launch_site_choice_reward_desc: "Огромные размеры новой ракеты создают ограничения на предполагаемой стартовой площадке. Поэтому руководители проекта запрашивают финансирование для строительства новой специально построенной площадки в другом месте."
 sp_rocket_launch_site_choice_reward_reject: "Найдите способ заставить текущий сайт работать."
 sp_rocket_launch_site_choice_reward_accept: "Мы будем инвестировать в новый объект."

 SP_ROCKET_AND_SUBMARINE_SITE_REMINDER_PROJECT: "Чтобы эффективно использовать $PROJECT|Y$, нам необходимо построить ракетную площадку или иметь подводные лодки с возможностью нанесения ракетных ударов."
 SP_ROCKET_SITE_REMINDER_PROJECT: "Чтобы эффективно использовать $PROJECT|Y$, нам нужно построить ракетный сайт."

########################
  ## NAVAL PROJECTS ##
########################
 sp_naval_cruiser_submarine: "Крейсерская подводная лодка"
 sp_naval_cruiser_submarine_desc: "Подводная лодка с превосходной дальностью полета, предназначенная для преодоления больших расстояний без поддержки, была бы идеальной для нападения на корабли противника."
 sp_naval_cruiser_submarine_free_design: "Крейсерская подводная лодка"

 sp_naval_nuclear_submarine: "Атомная подводная лодка"
 sp_naval_nuclear_submarine_desc: "Мы должны быть в состоянии сделать ядерные двигатели достаточно маленькими, чтобы их можно было разместить на специализированной подводной лодке, сделав это судно бесшумным и обеспечив ему исключительную дальность полета."
 sp_naval_nuclear_submarine_free_design: "Атомная подводная лодка"

 sp_naval_rocket_launching_submarine: "Ракетная подводная лодка"
 sp_naval_rocket_launching_submarine_desc: "Оснастив наши подводные лодки ракетами и пусковыми системами, мы сможем поражать стратегические цели наших врагов где угодно и без предварительного предупреждения."

 sp_naval_torpedo_cruiser: "Торпедный крейсер"
 sp_naval_torpedo_cruiser_desc: "Мы можем нанести значительный ущерб самым важным и дорогим кораблям наших врагов, используя торпедные крейсеры, согласно концепции прошлого века - Jeune École."
 sp_naval_torpedo_cruiser_free_design: "Торпедный крейсер"

 sp_naval_fleet_submarine: "Подводная лодка флота"
 sp_naval_fleet_submarine_desc: "Подводная лодка дальнего действия, способная выполнять функции эскорта флота, но лишенная недостатков, присущих конструкции предыдущих крейсерских подлодок."
 sp_naval_fleet_submarine_free_design: "Подводная лодка флота"

 sp_naval_super_heavy_battleship: "Дредноут"
 sp_naval_super_heavy_battleship_desc: "Гонка дредноутов, возможно, ушла в прошлое уже более десяти лет... однако трудно отрицать явное величие дредноута и его потенциал беспрецедентной морской огневой мощи."
 sp_naval_super_heavy_battleship_free_design: "$ship_hull_super_heavy_1$"

 sp_naval_nuclear_missile_submarine: "Атомная ракетная подводная лодка"
 sp_naval_nuclear_missile_submarine_desc: "Если мы сможем поднять подводную лодку на поверхность, запустить ракету с ядерным зарядом, а затем снова погрузиться в воду, наш потенциал первого удара станет практически безграничным."

 sp_naval_modern_battleship: "Современный линкор"
 sp_naval_modern_battleship_desc: "Другие могут полагать, что будущее морских сражений будет зависеть от авианосцев, но мы здесь, чтобы убедить их, что они не правы."
 sp_naval_modern_battleship_free_design: "Современный линкор"

 sp_naval_midget_submarine: "Миниатюрная подводная лодка"
 sp_naval_midget_submarine_desc: "В наших военно-морских возможностях существует ниша для легкой, дешевой и универсальной подводной лодки, которую можно использовать для чего угодно — от диверсий в порту до рейдов на конвои."
 sp_naval_midget_submarine_free_design: "Миниатюрная подводная лодка"

 sp_naval_nuclear_torpedo: "Ядерная Торпеда"
 sp_naval_nuclear_torpedo_desc: "С появлением тактических боеголовок малой мощности торпеды большой дальности с прикрепленными к ним боеголовками теоретически могли быть развернуты с любой обычной подводной лодки."

 sp_naval_modern_carrier: "Современный перевозчик"
 sp_naval_modern_carrier_desc: "Благодаря новейшим разработкам в области судостроения мы могли бы построить новое поколение авианосцев со значительно улучшенными размерами и возможностями."
 sp_naval_modern_carrier_free_design: "Современный перевозчик"

 sp_naval_anechoic_tiles: "Безэховая плитка"
 sp_naval_anechoic_tiles_desc: "Это специальное резиновое плиточное покрытие для подводных лодок, содержащее между собой небольшие пустые пространства; снизить угрозы обнаружения гидролокаторами противника."
 sp_naval_anechoic_tiles_non_mtg_tt: "Включает значение улучшения скрытности подводной лодки 6 и 7."

 sp_naval_aip_engine: "Воздухонезависимая двигательная установка"
 sp_naval_aip_engine_desc: "Новая двигательная установка, которая могла бы устранить слабость подводных лодок, которым необходимо всплывать на поверхность, чтобы перезарядить свои батареи и пополнить запас кислорода."
 sp_naval_aip_engine_non_mtg_tt: "Включает значение улучшения двигателя подводной лодки 6 и 7."

 sp_naval_ice_carrier: "Ледяной авианосец"
 sp_naval_ice_carrier_desc: "Чтобы утвердить наше превосходство в воздухе над обширными океанами, нам нужны авианосцы, которые могли бы хранить и запускать дальнемагистральные регулярные самолеты, а не только авианосцы."
 sp_naval_ice_carrier_free_design: "Ледяной авианосец"

 sp_naval_underway_replenishment: "Идет пополнение"
 sp_naval_underway_replenishment_desc: "Снабжение военно-морских сил вдали от их баз всегда было ограничивающим фактором. Поскольку наши флоты работают на экстремальных расстояниях, нам необходимо разработать новые методы пополнения запасов."

 sp_naval_proximity_fuze: "Бесконтактный взрыватель"
 sp_naval_proximity_fuze_desc: "Благодаря улучшенным и более надежным радиотехнологиям мы можем разработать новый тип взрывателей, которые взрывались бы, просто находясь рядом с целью и повреждая ее."

 sp_naval_support_ships: "Корабли поддержки"
 sp_naval_support_ships_desc: "Корабли поддержки помогут нам удерживать господство в море, обеспечивая наши корабли даже во время долгих переходов."

 sp_naval_escort_carrier: "Авианосец сопровождения"
 sp_naval_escort_carrier_desc: "Для защиты линий снабжения нам нужно разработать относительно небольшие авианосцы, которые будут с меньшими затратами обеспечивать прикрытие с неба и борьбу с подводными лодками."
 sp_naval_escort_carrier_free_design: "Авианосец сопровождения"

 sp_naval_submarine_carrier: "Подводный авианосец"
 sp_naval_submarine_carrier_desc: "Мы хотим разработать новый вид подводной лодки, способный нести и запускать несколько самолетов, чтобы выполнять задачи, выходящие за рамки воздушной разведки."
 sp_naval_submarine_carrier_free_design: "Подводный авианосец"

 sp_naval_armoured_cruiser: "Бронированный крейсер" #NT!
 sp_naval_armoured_cruiser_desc: "Броненосный крейсер, или «Панцершифф», — это небольшой крупный корабль, заполняющий пробел между почтенным линкором и более поздними конструкциями тяжелых крейсеров. Они должны быть дальнобойными и способными к независимым действиям, особенно к наземным рейдам. Их широко, но ошибочно называют карманными линкорами из-за тяжелого вооружения, несмотря на размер корпуса." #NT!
 sp_naval_armoured_cruiser_free_design: "Бронированный крейсер" #NT!

#################################
  ## NAVAL PROTOTYPE REWARDS ###
#################################
 sp_naval_cruiser_submarine_unique_reward_a: "Протокол рейдов"
 sp_naval_cruiser_submarine_unique_reward_a_desc: "Хотя большие размеры наших новых подводных лодок дают возможность значительно увеличить мощность палубного вооружения, нам также следует рассмотреть возможность использования пространства для увеличения тактической дальности."
 sp_naval_cruiser_submarine_preference_a: "Гибкие операции"
 sp_naval_cruiser_submarine_preference_b: "Вооружение"

 sp_naval_fleet_submarine_unique_reward_a: "Принципы проектирования"
 sp_naval_fleet_submarine_unique_reward_a_desc: "Мы должны знать, на чем нам необходимо сосредоточить свои усилия при проектировании нового типа подводных лодок дальнего действия. Должны ли наши подводные лодки быть бесшумными и смертоносными охотниками, или мы хотим, чтобы они были более надежными и устойчивыми к опасностям?"
 sp_naval_fleet_submarine_preference_a: "Возможности атаки"
 sp_naval_fleet_submarine_preference_b: "Более прочная структура"

 sp_naval_nuclear_submarine_unique_reward_a: "Проблемы стоимости"
 sp_naval_nuclear_submarine_unique_reward_a_desc: "Поскольку мы работаем над совершенно новым типом подводной лодки, растут опасения, что затраты на производство кораблей в конечном итоге окажутся слишком высокими. Как нам следует поступить с дизайном?"
 sp_naval_nuclear_submarine_preference_a: "Срезать углы"
 sp_naval_nuclear_submarine_preference_b: "Текущие планы"
 sp_naval_nuclear_submarine_preference_c: "Высочайшее качество"

 sp_naval_rocket_launching_submarine_unique_reward_a: "Вопрос доставки полезной нагрузки"
 sp_naval_rocket_launching_submarine_unique_reward_a_desc: "Нам необходимо ответить на насущный вопрос: как лучше всего гарантировать, что наши ракеты, запускаемые с подводных лодок, достигнут наших противников?"
 sp_naval_rocket_launching_submarine_preference_a: "Диапазон"
 sp_naval_rocket_launching_submarine_preference_b: "Надежность"
 sp_naval_rocket_launching_submarine_preference_c: "Скрытность"

 sp_naval_nuclear_missile_submarine_unique_reward_a: "Побег с охоты"
 sp_naval_nuclear_missile_submarine_unique_reward_a_desc: "Если бы информация о планируемом нами ядерном ударе дошла до наших врагов, они начали бы массированные поиски наших атомных ракетных подводных лодок. Чтобы спастись от охотников, нам нужно..."
 sp_naval_nuclear_missile_submarine_preference_a: "Лежи низко"
 sp_naval_nuclear_missile_submarine_preference_b: "Сохраняйте спокойствие"
 sp_naval_nuclear_missile_submarine_preference_c: "Выдержать шторм"

 sp_naval_nuclear_torpedo_unique_reward_a: "Новый курс «Торпедо»"
 sp_naval_nuclear_torpedo_unique_reward_a_desc: "Поскольку ядерные торпеды близки к достижению конечной цели проекта, мы должны стремиться..."
 sp_naval_nuclear_torpedo_preference_a: "Мощные боеголовки"
 sp_naval_nuclear_torpedo_preference_b: "Более безопасные хранилища"

 sp_naval_midget_submarine_unique_reward_a: "Сжимая больше"
 sp_naval_midget_submarine_unique_reward_a_desc: "Мы поняли, что потенциально можем специализировать части наших сверхмалых подводных лодок, хотя это потребует некоторых компромиссов."
 sp_naval_midget_submarine_preference_a: "Немного скрытнее"
 sp_naval_midget_submarine_preference_b: "Немного меньше склонен к взрыву"
 sp_naval_midget_submarine_preference_c: "Немного больший диапазон"

 sp_naval_aip_engine_unique_reward_a: "Независимые улучшения"
 sp_naval_aip_engine_unique_reward_a_desc: "Наши ученые, работающие над этой технологией, поделились своими выводами со своими коллегами, работающими над усовершенствованием более традиционных двигателей. Пока не задерживайте дыхание, поскольку полученные улучшения, скорее всего, не будут впечатляющими."
 sp_naval_aip_engine_preference_a: "Более тихие двигатели"
 sp_naval_aip_engine_preference_b: "Более быстрые двигатели"
 sp_naval_aip_engine_preference_c: "Двигатели с меньшим потреблением топлива"

 sp_naval_anechoic_tiles_unique_reward_a: "Новые знания – строительство корпуса подводной лодки"
 sp_naval_anechoic_tiles_unique_reward_a_desc: "В ходе разработки безэховых плиток мы поняли, что можем адаптировать наши выводы к конструкции обычных подводных лодок, чтобы улучшить наши возможности скрытности или немного сэкономить на затратах, сохраняя при этом текущий уровень заметности."
 sp_naval_anechoic_tiles_preference_a: "Модели агрессивного патрулирования"
 sp_naval_anechoic_tiles_preference_b: "Уменьшенная акустическая сигнатура"
 sp_naval_anechoic_tiles_preference_c: "Снижение затрат на корпус"

 sp_naval_torpedo_cruiser_unique_reward_a: "Второй шанс - Торпедный крейсер"
 sp_naval_torpedo_cruiser_unique_reward_a_desc: "С возрождением старой концепции торпедного крейсера нам необходимо принять важное решение о его роли в нашем флоте: следует ли нам сосредоточиться на их силе – торпедах; или нам следует устранить их главную слабость — борьбу с Разрушителями?"
 sp_naval_torpedo_cruiser_preference_a: "Сила — Торпеды"
 sp_naval_torpedo_cruiser_preference_b: "Слабость – Разрушители"

 sp_naval_super_heavy_battleship_unique_reward_a: "Вопрос приоритетов — атака"
 sp_naval_super_heavy_battleship_unique_reward_a_desc: "Проектирование нового класса линкоров дает нам возможность сосредоточить наши усилия на улучшении нашей способности доминировать на поле боя на море. Что нам следует поставить в приоритет?"
 sp_naval_super_heavy_battleship_preference_a_a: "Тяжелые пушки"
 sp_naval_super_heavy_battleship_preference_b_a: "Скорость"
 sp_naval_super_heavy_battleship_preference_c_a: "Световые пушки"
 sp_naval_super_heavy_battleship_unique_reward_b: "Вопрос приоритетов – Оборона"
 sp_naval_super_heavy_battleship_unique_reward_b_desc: "Наши высшие военно-морские командиры поставили перед нами невыполнимую задачу — сделать этот корабль непобедимым — и хотя мы знаем, что это невозможно, мы можем, по крайней мере, попытаться сделать это так. Что на этот раз должно быть нашим приоритетом?"
 sp_naval_super_heavy_battleship_preference_a_b: "Усиленная броня и корпус"
 sp_naval_super_heavy_battleship_preference_b_b: "Зенитная артиллерия"
 sp_naval_super_heavy_battleship_preference_c_b: "Противоторпедные меры"

 sp_naval_modern_battleship_unique_reward_a: "Современный линкор - Надежда"
 sp_naval_modern_battleship_unique_reward_a_desc: "Хотя многие утверждают, что эпоха линкоров прошла, мы по-прежнему в них верим. У этого корабля есть шанс стать для нас новой надеждой. На каком аспекте нам следует сосредоточиться, чтобы воплотить мечту в жизнь?"
 sp_naval_modern_battleship_preference_a_a: "Чистая огневая мощь"
 sp_naval_modern_battleship_preference_b_a: "Маневренность"
 sp_naval_modern_battleship_preference_c_a: "Точность"
 sp_naval_modern_battleship_unique_reward_b: "Современный линкор – наносит ответный удар!"
 sp_naval_modern_battleship_unique_reward_b_desc: "Чтобы доказать свою точку зрения и удержать свои позиции, нам придется выдерживать удары противника. Что нам следует улучшить, чтобы иметь возможность нанести ответный удар тем, кто осмелится встать на нашем пути?"
 sp_naval_modern_battleship_preference_a_b: "Структура"
 sp_naval_modern_battleship_preference_b_b: "ПВО"
 sp_naval_modern_battleship_preference_c_b: "Торпедная защита"

 sp_naval_modern_carrier_unique_reward_a: "Современный авиаперевозчик – Цель"
 sp_naval_modern_carrier_unique_reward_a_desc: "С новым поколением авианосцев мы могли сосредоточиться на определенных аспектах нашего корабля, чтобы лучше соответствовать нашим потребностям. Где нам следует сосредоточить свои усилия?"
 sp_naval_modern_carrier_preference_a_a: "Осведомленность"
 sp_naval_modern_carrier_preference_b_a: "Скорость и защита от атмосферных воздействий"
 sp_naval_modern_carrier_preference_c_a: "Сдерживание легких кораблей"
 sp_naval_modern_carrier_unique_reward_b: "Современный перевозчик – безопасность"
 sp_naval_modern_carrier_unique_reward_b_desc: "Авианосцы, бесспорно, являются королями морской войны, однако нам необходимо обеспечить им должную защиту и безопасность. Что должно быть нашей главной заботой?"
 sp_naval_modern_carrier_preference_a_b: "Вражеская артиллерия"
 sp_naval_modern_carrier_preference_b_b: "Вражеский самолет"
 sp_naval_modern_carrier_preference_c_b: "Вражеские торпеды"

 sp_naval_ice_carrier_unique_reward_a: "Усиление ледового авианосца"
 sp_naval_ice_carrier_unique_reward_a_desc: "Вкладывая огромное количество времени в постройку этого гигантского авианосца, мы должны быть уверены, что обеспечиваем ему наилучшую возможную защиту. Что нас больше всего беспокоит?"
 sp_naval_ice_carrier_preference_a: "Силы природы"
 sp_naval_ice_carrier_preference_b: "Вражеские силы"

 sp_naval_underway_replenishment_unique_reward_a: "Масштаб пополнения запасов"
 sp_naval_underway_replenishment_unique_reward_a_desc: "Пока мы работаем над тем, чтобы система текущих пополнений работала максимально гладко, нам предстоит принять еще одно решение – хотим ли мы изменить наши первоначальные оценки или нет?"
 sp_naval_underway_replenishment_preference_a: "Больший диапазон"
 sp_naval_underway_replenishment_preference_b: "Нижнее использование конвоя"
 sp_naval_underway_replenishment_preference_c: "Найдите баланс"

 sp_naval_proximity_fuzes_unique_reward_a: "Эффективность или результативность"
 sp_naval_proximity_fuzes_unique_reward_a_desc: "Бесконтактные взрыватели значительно сокращают количество снарядов, необходимых для поражения самолетов противника. Готовясь использовать их в наших мобильных зенитных подразделениях, мы можем регулировать количество поставляемых боеприпасов, сохраняя при этом ожидаемый дневной коэффициент попаданий."
 sp_naval_proximity_fuzes_preference_a: "Отрегулируйте запасы боеприпасов"
 sp_naval_proximity_fuzes_preference_b: "Сохранить текущий запас боеприпасов"

 sp_naval_support_ships_unique_reward_a: "Вспомогательные корабли: приоритет поддержки"
 sp_naval_support_ships_unique_reward_a_desc: "Хотя ценность кораблей поддержки не оспаривается, нам необходимо решить, какова будет их оперативная направленность: целенаправленное пополнение небольшого количества кораблей или общее пополнение запасов всего флота." #NT!
 sp_naval_support_ships_preference_a_a: "Потребности немногих"
 sp_naval_support_ships_preference_b_a: "Найти баланс"
 sp_naval_support_ships_preference_c_a: "Потребности многих"
 sp_naval_support_ships_unique_reward_b: "Вспомогательные корабли: ремонтные работы"
 sp_naval_support_ships_unique_reward_b_desc: "Ключевой вопрос для нашей ремонтной судостроительной организации: либо большее количество мелких ремонтных бригад, способных медленно обслуживать большое количество кораблей, либо меньшее количество более богато оснащенных бригад, способных более комплексно ремонтировать меньшее количество кораблей." #NT!
 sp_naval_support_ships_preference_a_b: "Больший охват"
 sp_naval_support_ships_preference_b_b: "Найти баланс"
 sp_naval_support_ships_preference_c_b: "Приоритет в ремонте"

 sp_naval_submarine_carrier_unique_reward_a: "Улучшение подводных авианосцев"
 sp_naval_submarine_carrier_unique_reward_a_desc: "Наши подводные авианосцы раздвигают границы военно-морской техники и не могут быть одинаково сильными во всех областях. Должны ли мы отдать приоритет дальности, прочности корпуса или скрытности?" #NT!
 sp_naval_submarine_carrier_preference_a: "Увеличенная дальность"
 sp_naval_submarine_carrier_preference_b: "Укрепленная конструкция"
 sp_naval_submarine_carrier_preference_c: "Сниженная заметность"

 sp_naval_escort_carrier_unique_reward_a: "Проекты кораблей сопровождения"
 sp_naval_escort_carrier_unique_reward_a_desc: "Авианосцу сопровождения необходимо вместить массу возможностей в довольно небольшой корпус. Чему стоит отдавать приоритет: дальности действия, прочности корпуса или скорости?"
 sp_naval_escort_carrier_preference_a_a: "Дальность действия"
 sp_naval_escort_carrier_preference_b_a: "Более прочный корпус"
 sp_naval_escort_carrier_preference_c_a: "Повышенная скорость"
 sp_naval_escort_carrier_unique_reward_b: "Приоритет обнаружения"
 sp_naval_escort_carrier_unique_reward_b_desc: "Авиагруппа эскортного авианосца обязательно ограничена по численности. Будут ли они специализироваться на противолодочной борьбе или обнаружении надводных целей или примут универсальный, многоцелевой подход?" #NT!
 sp_naval_escort_carrier_preference_a_b: "Подводные лодки"
 sp_naval_escort_carrier_preference_b_b: "Без предпочтений"
 sp_naval_escort_carrier_preference_c_b: "Надводные корабли"

 sp_naval_armoured_cruiser_unique_reward_a: "Философия броненосного крейсера" #NT!
 sp_naval_armoured_cruiser_unique_reward_a_desc: "Из-за ограниченных размеров и ресурсов мы должны решить, на чем должны сосредоточиться наши проекты броненосных крейсеров. Сосредоточение внимания на скорости позволит кораблю обгонять более тяжелые военные корабли и преследовать более легкие, что очень похоже на более крупный крейсер или меньший линейный крейсер. Сосредоточение внимания на легкой атаке позволит создать сильную конструкцию «крейсер-убийца», способную уничтожать вражеские рейдеры и сдерживать эсминцы. Наконец, Heavy Attack сдержит крупные корабли противника, вынудив их отступить или совершить дорогостоящую атаку." #NT!
 sp_naval_armoured_cruiser_preference_a: "Скорость обеспечит большую гибкость." #NT!
 sp_naval_armoured_cruiser_preference_b: "Легкая атака для уничтожения небольших судов." #NT!
 sp_naval_armoured_cruiser_preference_c: "Тяжелая атака; дайте ему линкорные пушки!" #NT!

