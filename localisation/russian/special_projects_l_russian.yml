 sp_air_intercontinental_bomber_desc: "Огромный самолет, начиненный бомбами и топливом, созданный специально для дальних полетов на большой высоте, что дает ему возможность пересекать океаны и континенты."

 sp_air_mothership_aircraft: "Самолет-матка"
 sp_air_mothership_aircraft_desc: "Массивный самолет, который может доставлять в бой истребители и выполнять миссии по глубокому сопровождению территории противника — настоящий повелитель небес."

 sp_air_jet_engine: "Реактивный двигатель"
 sp_air_jet_engine_desc: "Реактивные двигатели гораздо мощнее винтовых, что потенциально может совершить революцию в конструкции самолетов и положить начало новой эре авиационной техники."

