 sp_nuclear_reactor: "Ядерный реактор"
 sp_nuclear_reactor_desc: "Эксперименты доказали, что расщепление атомов в результате деления высвобождает огромное количество энергии, которую можно использовать для производства электроэнергии. Или, возможно, в качестве топлива для бомб..."
 sp_commercial_nuclear_reactor: "Коммерческий ядерный реактор"
 sp_commercial_nuclear_reactor_desc: "Ядерные реакторы хороши для производства материалов для бомб. Но количество производимой энергии могло бы вместо этого обеспечить электроэнергией гражданскую и военную промышленность."
 sp_nuclear_engines: "Ядерные двигатели"
 sp_nuclear_engines_desc: "Двигатели, которые могут работать вечно – без необходимости дозаправки. Это перспектива атомной энергетики. Обещание, которое, по словам наших инженеров, мы очень близки к выполнению."
 sp_nuclear_bomb: "Проект ядерной бомбы деления"
 sp_nuclear_bomb_desc: "Бомба, использующая процесс ядерного деления для высвобождения накопленной энергии атома в один апокалиптический момент. Имея в своем арсенале такое оружие, кто осмелится противостоять нам?"
 sp_nuclear_bomb_tt: "Ядерные реакторы начинают производить §YЯдерные бомбы§!."
 sp_thermo_nuclear_bomb: "Термоядерная бомба"
 sp_thermo_nuclear_bomb_desc: "Действительно трудно представить себе что-либо, кроме бомбы деления, но с помощью ядерного синтеза можно создать взрыв, намного больший, чем все, что было создано ранее."
 sp_thermo_nuclear_bomb_tt: "Ядерные реакторы начинают производить §Yтермоядерные бомбы§!."
 sp_nuclear_warheads: "Ядерные боеголовки"
 sp_nuclear_warheads_desc: "Создав конденсированное ядерное оружие, мы сможем использовать его в качестве полезной нагрузки для широкого спектра ракетных пусковых систем, что позволит наносить удары на огромные расстояния."

