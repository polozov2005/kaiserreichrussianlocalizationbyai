 sp_rockets_ballistic_missile_desc: "Управляемая баллистическая ракета, способная доставить боеголовку на большие расстояния с беспрецедентной скоростью и точностью."

 sp_rockets_medium_range_ballistic_missile: "БРСД"
 sp_rockets_medium_range_ballistic_missile_desc: "Баллистические ракеты средней дальности позволят нам доставить боеголовку через весь континент с поразительной точностью и разрушительным воздействием."

 sp_rockets_long_range_ballistic_missile: "МБР"
 sp_rockets_long_range_ballistic_missile_desc: "Межконтинентальная баллистическая ракета, вероятно, самая крупная ракета, которую мы когда-либо создадим, способная доставить боеголовку с большой точностью практически в любую точку земного шара."

 sp_rockets_ground_to_air_missile: "Ракеты класса «земля-воздух»"
 sp_rockets_ground_to_air_missile_desc: "Большая зенитная ракета с ракетным двигателем, способная одним попаданием сбить бомбардировщик в небе. Это наверняка определит будущее ПВО."

 sp_rocket_interceptor: "Ракета-перехватчик"
 sp_rocket_interceptor_desc: "Объединив мощь ракеты с маневренностью небольшого шасси, мы создадим не имеющий аналогов самолет-перехватчик."

