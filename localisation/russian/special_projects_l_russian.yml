 sp_land_reward_stronghold_network_structural_weakness_discovered: "Обнаружена структурная слабость"
 sp_land_reward_stronghold_network_delayed_by_concrete_shortage: "Задержка из-за нехватки бетона"
 sp_land_reward_stronghold_network_underground_rail_systems: "Подземные железнодорожные системы"
 sp_land_reward_stronghold_network_integration_of_anti_blast_doors: "Интеграция противовзрывных дверей"
 sp_land_reward_stronghold_network_communication_system_overhaul: "Капитальный ремонт системы связи"
 sp_land_reward_stronghold_network_communication_system_overhaul_desc: "При тестировании внутренней сети связи испытательного комплекса команда выявила недостатки, которые можно было бы использовать для доработки аналогичных систем в традиционных конструкциях фортов."
 sp_land_reward_option_stronghold_network_communication_system_overhaul_standardize: "Стандартизировать"
 sp_land_reward_option_stronghold_network_communication_system_overhaul_further_study: "Дальнейшее исследование"
 sp_land_reward_stronghold_network_leadership_approach: "Лидерский подход"
 sp_land_reward_stronghold_network_leadership_approach_desc: "По мере продвижения проекта ведущий ученый [Character.GetName] должен решить, насколько [Character.GetSheHe] будет участвовать в повседневных операциях. [Character.GetSheHeCap] может контролировать строительство непосредственно на поле, обеспечивая точное выполнение, или оставаться в офисе, сосредоточившись на стратегии и планировании."
 sp_land_reward_option_stronghold_network_leadership_approach_oversee_work_personally: "Контролировать работу лично"
 sp_land_reward_option_stronghold_network_leadership_approach_office_planning: "Планирование офиса"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_01: "Прорыв в армировании бетона"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_01_desc: "Один из младших инженеров обнаружил новый метод усиления, который можно применить к стандартным укреплениям. Документирование этого процесса сейчас может дать нашим ученым и инженерам преимущество в будущих исследованиях."
 sp_land_reward_option_stronghold_network_breakthrough_in_concrete_reinforcement_01_apply_and_document_discovery: "Подать заявку и получить документы"
 sp_land_reward_option_stronghold_network_breakthrough_in_concrete_reinforcement_01_use_in_current_project: "Использование в текущем проекте"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_02: "$sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_01$"
 sp_land_reward_stronghold_network_breakthrough_in_concrete_reinforcement_02_desc: "Новый метод армирования, открытый одним из младших инженеров, был передан сторонней исследовательской группе для дальнейшей оценки. Хотя результаты все еще находятся на рассмотрении, этот метод все еще может быть применен к текущему проекту, если он будет сочтен целесообразным."
 sp_land_reward_option_stronghold_network_collapse_01: "Обрушение во время строительства туннеля"
 sp_land_reward_option_stronghold_network_collapse_01_desc: "Туннель под одним из главных бункеров неожиданно обрушился, в результате чего под обломками оказались несколько рабочих и ведущий ученый [Character.GetName], руководивший операциями. Необходимо принять экстренные меры для спасения застрявшего персонала, но инцидент уже привел к задержке общего прогресса."
 sp_land_reward_option_stronghold_network_collapse_01_prioritize_scientist: "Отдайте предпочтение нашему ведущему ученому"
 sp_land_reward_option_stronghold_network_collapse_01_prioritize_safety: "Уделяйте приоритетное внимание безопасности работников"
 sp_land_reward_option_stronghold_network_collapse_01_continue_without_delay: "Продолжить без промедления"
 sp_land_reward_option_stronghold_network_collapse_02: "$sp_land_reward_option_stronghold_network_collapse_01$"
 sp_land_reward_option_stronghold_network_collapse_02_desc: "Туннель под одним из главных бункеров неожиданно обрушился, в результате чего несколько рабочих оказались в ловушке, а строительство застопорилось. Необходимо принять чрезвычайные меры для разрешения ситуации и безопасного извлечения застрявшего персонала, однако инцидент уже привел к задержке общего прогресса."

