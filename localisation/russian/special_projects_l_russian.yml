 sp_nuclear_generic_industry_tech_reward: "Технологические достижения"
 sp_nuclear_generic_industry_tech_reward_desc: "За время работы над проектом наши инженеры сделали несколько новых изобретений, которые, вполне возможно, могут быть адаптированы и для использования в других областях."
 sp_nuclear_generic_reward_option_industry_tech_name: "Передовые промышленные исследования"
 sp_nuclear_scientist_xp_generic_reward_desc: "TODO_TA"
 sp_nuclear_minor_progress_generic_reward: "Незначительный прорыв"
 sp_nuclear_minor_progress_generic_reward_desc: "Наши ученые сделали несколько действительно революционных открытий, работая над новейшим прототипом. Их результаты значительно продвинули наши знания и исследования в этой области."
 sp_nuclear_generic_electronics_tech_reward: "Технологические инновации"
 sp_nuclear_generic_electronics_tech_reward_desc: "В ходе последней итерации проекта были сделаны важные выводы. Надеемся, нам удастся применить это на практике, что должно позволить нам ускорить исследования в смежных областях."
 sp_nuclear_generic_reward_option_electronics_tech_bonus_name: "Передовые исследования в области электроники."
 sp_nuclear_war_support_generic_reward: "Общественная поддержка"
 sp_nuclear_war_support_generic_reward_desc: "Успешные испытания и связанное с ними жестко контролируемое освещение в средствах массовой информации привели к тому, что общественность поняла, что мы приближаемся к разработке некоего супероружия, которое можно будет использовать для победы над любыми врагами."
 sp_nuclear_major_political_interference_generic_reward: "Крупное политическое вмешательство"
 sp_nuclear_major_political_interference_generic_reward_desc: "Проект [SpecialProject.GetName] оказался под пристальным вниманием и вмешательством со стороны политических лидеров, что привело к задержкам и потенциально привело к смене руководства проекта. Это привело [Character.GetName] в ярость. Нам необходимо справиться с этими политическими проблемами, чтобы обеспечить реализацию проекта."
 sp_nuclear_major_political_interference_generic_reward_option_keep: "Сохраните [(Персонаж?.GetName:'CAP_SCIENTIST)]"
 sp_nuclear_major_political_interference_generic_reward_option_fire: "Удалить [(Персонаж?.GetName:'CAP_SCIENTIST)]"

 sp_nuclear_bomb_theoretical_breakthrough_generic_reward: "Теоретический прорыв"
 sp_nuclear_bomb_theoretical_breakthrough_generic_reward_desc: "[Character.GetName] удалось решить сложную теоретическую задачу во время работы с последним прототипом. Это привело к упрощению конструкции бомбы, что упростит ее производство."

 sp_nuclear_bomb_critical_mass_generic_reward: "Эксперимент с критической массой провалился"
 sp_nuclear_bomb_critical_mass_generic_reward_desc: "Во время экспериментов по определению критической массы произошла критическая авария, приведшая к радиационному облучению и жертвам среди ключевого персонала."

 sp_nuclear_bomb_information_leak_reward: "Утечка информации"
 sp_nuclear_bomb_information_leak_reward_desc: "Один из сотрудников [SpecialProject.GetName], судя по всему, сливал информацию иностранным агентам. Было ли это намеренно или нет, пока неизвестно. Также сложно определить ущерб, который это нанесло проекту."
 sp_nuclear_bomb_information_leak_reward_tt: "Достигает прогресса проекта"

# Nuclear Reactor
 sp_nuclear_reactor_radioactive_leak_stabilized_reward: "Радиоактивная утечка – под контролем"
 sp_nuclear_reactor_radioactive_leak_stabilized_reward_desc: "К сожалению, во время работы с реактором произошел серьезный инцидент. Благодаря быстрому реагированию персонала ущерб был локализован, и команда смогла получить ценные данные об инциденте."
 sp_nuclear_reactor_minor_explosion_reward: "Незначительный взрыв, пострадавших нет"
 sp_nuclear_reactor_minor_explosion_reward_desc: "Во время работы над последней версией прототипа ядерного реактора произошел небольшой инцидент. Произошел небольшой взрыв, повредивший части лаборатории, но возникший пожар можно было легко потушить. После того как лаборатория будет отремонтирована, работа сможет продолжиться по плану, лишь с небольшой задержкой."
 sp_nuclear_reactor_tested_reward: "Первое успешное испытание ядерного реактора"
 sp_nuclear_reactor_tested_reward_desc: "Наш первый ядерный реактор был успешно испытан, доказав возможность управляемого ядерного деления. Этот прорыв обещает новую эру производства энергии и, возможно, многое другое."
 sp_nuclear_reactor_tested_reward_public: "Отпразднуйте достижение публично"
 nuclear_reactor_tested_reward_classify: "Держите информацию пока в секрете"
 sp_nuclear_reactor_tested_reward_public_tt: "Другие страны могут извлечь из этого выгоду"
 sp_nuclear_reactor_tested_tech_bonus: "Получена информация о ядерных испытаниях"
 sp_commercial_nuclear_reactor_concerns_reward: "Обеспокоенность по поводу ядерной безопасности"
 sp_commercial_nuclear_reactor_concerns_reward_desc: "[Character.GetName] выразил обеспокоенность по поводу отсутствия фильтров в градирнях наших новых реакторов. [Character.GetSheHeCap] настаивает на необходимости добавления фильтров, чтобы предотвратить выход радиации из реактора во время чрезвычайной ситуации. Между тем инженеры утверждают, что они значительно задержат реализацию проекта."
 sp_commercial_nuclear_reactor_concerns_reward_option_safety: "Добавьте фильтры."
 sp_commercial_nuclear_reactor_concerns_reward_option_ignore: "Полнейшая глупость!"

 # Nuclear bombs
 sp_nuclear_bomb_test_prototype_reward: "Прототип бомбы"
 sp_nuclear_bomb_test_prototype_reward_desc: "Команда [Character.GetName] создала прототип бомбы. Проведение и оценка успешного теста значительно улучшит наш прогресс. С другой стороны, у нас теперь есть ядерная бомба..."
 sp_nuclear_bomb_test_prototype_reward_test_bomb: "Протестируйте его в контролируемых формах"
 sp_nuclear_bomb_test_prototype_reward_keep_bomb: "Мы можем использовать это против наших врагов."
 sp_nuclear_bomb_espionage_threats_reward: "Шпионские угрозы"
 sp_nuclear_bomb_espionage_threats_reward_desc: "Сотрудники службы безопасности утверждают, что необходимо усилить безопасность объекта проекта ¨[SpecialProject.GetName] и всех связанных с ним мероприятий. Исследователи во главе с [Character.GetName] утверждают, что свобода передвижения и общения жизненно важна для прогресса."
 sp_nuclear_bomb_espionage_threats_reward_no: "Не повышайте безопасность"
 sp_nuclear_bomb_espionage_threats_reward_increase_security: "Повышение безопасности"
 sp_nuclear_bomb_espionage_threats_reward_increase_security_tt: "Повышенная безопасность снижает риск кражи информации."
 sp_nuclear_bomb_breakthrough_plutonium_reward: "Прорыв в производстве плутония"
 sp_nuclear_bomb_breakthrough_plutonium_reward_desc: "Наши учёные совершили значительный прорыв в технологиях производства плутония, повысив эффективность производства бомб. Мы надеемся, что это может ускорить сроки разработки."
 sp_nuclear_bomb_accident_generic_reward: "Случайный пожар"
 sp_nuclear_bomb_accident_generic_reward_desc: "На одном из складов предприятия вспыхнул пожар. Первоначальное расследование указывает на то, что это несчастный случай. Но было ли это на самом деле?"
 sp_nuclear_bomb_design_choice_reward: "Простая или сложная конструкция бомбы"
 sp_nuclear_bomb_design_choice_reward_desc: "Наши ученые разрабатывают два проекта атомного оружия, и возникли дебаты о том, как их реализовать. Одну конструкцию, известную как пушечный тип, гораздо проще создать, но она менее эффективна с точки зрения использования ядерного материала. Другой тип — имплозивный, гораздо более сложная конструкция, но теоретически более эффективная с точки зрения использования ядерного материала."
 sp_nuclear_bomb_design_choice_reward_gun_type: "Пистолет – более безопасный вариант."
 sp_nuclear_bomb_design_choice_reward_implosion: "Имплозия — это превосходный дизайн."

# Thermonuclear Bombs
 sp_thermonuclear_bomb_test_reward: "Тестовое предложение"
 sp_thermonuclear_bomb_test_reward_desc: "Чтобы подтвердить теорию термоядерной бомбы, наши ученые запросили возможность провести пробный взрыв. Это потребует выделения существующей атомной бомбы для инициирования цепной реакции, но значительно ускорит ход проекта."
