##########################
 sp_land_multi_charge_large_caliber_gun: "Многозарядная крупнокалиберная пушка"
 sp_land_multi_charge_large_caliber_gun_desc: "Благодаря многозарядной двигательной установке и большому калибру это оружие способно вести разрушительную бомбардировку на огромных расстояниях."
 sp_land_reward_multi_charge_large_caliber_gun_test_failure: "Катастрофический взрыв"
 sp_land_reward_multi_charge_large_caliber_gun_successful_test_firing: "Успешные огневые испытания"
 sp_land_reward_multi_charge_large_caliber_gun_breakthrough_in_propulsion_technology: "Прорыв в двигательной технологии"
 multi_charge_large_caliber_gun_small_size: "Малокалиберная многозарядная пушка"
 sp_multi_charge_large_caliber_gun_small_size_ns: "$multi_charge_large_caliber_gun_small_size$" #Hidden NS: no need for desc

 sp_land_super_heavy_railway_gun: "Сверхтяжёлая железнодорожная пушка"
 sp_land_super_heavy_railway_gun_desc: "Колоссальное оружие непревзойденной мощи и точности, которое станет свидетельством военного превосходства любой страны, способной его применить."
 sp_land_stronghold_network: "Сеть крепостей"
 sp_land_stronghold_network_desc: "Сложная сеть хорошо укреплённых бункеров и опорных пунктов, созданная для того, чтобы противостоять интенсивным атакам и защищать критически важные стратегические объекты от вторжений противника."
 sp_land_flamethrower_tank: "Огнеметный танк"
 sp_land_flamethrower_tank_desc: "Бронированная машина, оснащенная разрушительной огневой мощью ближнего боя, предназначенная для обрушивания потоков огня на позиции противника."
 sp_land_military_engineering_vehicles: "Военно-инженерная техника"
 sp_land_military_engineering_vehicles_desc: "Специализированная техника для повышения мобильности на поле боя, фортификационного строительства и преодоления препятствий в боевых условиях."
 sp_land_super_heavy_howitzer: "Сверхтяжелая гаубица"
 sp_land_super_heavy_howitzer_desc: "Грозное артиллерийское орудие большого калибра, способное с беспрецедентной разрушительной силой разрушить оборону противника."
 sp_land_self_propelled_super_heavy_howitzer: "Самоходная сверхтяжелая гаубица"
 sp_land_self_propelled_super_heavy_howitzer_desc: "Массивная самоходная артиллерийская установка, обладающая большей маневренностью на поле боя, чем ее буксируемый аналог, но вмещающая еще больший калибр."
 sp_land_land_cruiser: "Ленд Крузер"
 sp_land_land_cruiser_desc: "Массивный бронированный монстр, созданный для того, чтобы доминировать на поле боя. Обладая непревзойденными размерами и огневой мощью, эта машина представляет собой вершину бронетанковой войны."
 sp_air_radar: "Радар"
 sp_air_radar_desc: "Используя импульсные радиоволны и обнаруживая их отражения, мы сможем отслеживать передвижения противника с суши, воздуха и моря."
 sp_air_centimetric_radar: "Сантиметровый радар"
 sp_air_centimetric_radar_desc: "Разработка сантиметрового радара позволит обнаруживать цели гораздо меньшего размера и использовать антенны гораздо меньшего размера."

 sp_land_reward_land_cruiser_overheating: "Перегрев во время испытаний"
 sp_land_reward_land_cruiser_chassis: "Стрессовый отказ шасси"
 sp_land_reward_land_cruiser_chassis_desc: "В ходе стресс-тестирования выяснилось, что шасси [SpecialProject.GetName] не способно выдержать огромный вес, что привело к деформациям конструкции. В команде дизайнеров нет единого мнения: добавлять ли дополнительное усиление, которое еще больше увеличит вес автомобиля, или использовать более легкие материалы, что потенциально поставит под угрозу долговечность."
 sp_land_reward_option_land_cruiser_chassis_redesign: "Полностью перепроектируйте шасси"
 sp_land_reward_option_land_cruiser_chassis_redesign_bonus_name: "Модернизированное шасси"
 sp_land_reward_option_land_cruiser_chassis_reinforce: "Усиление шасси"
 sp_land_reward_option_land_cruiser_chassis_reinforce_bonus_name: "Усиленное шасси"
 sp_land_reward_option_land_cruiser_chassis_lighter_materials: "Используйте более легкие материалы"
 sp_land_reward_option_land_cruiser_chassis_lighter_materials_bonus_name: "Более легкие материалы для шасси"
 sp_land_reward_land_cruiser_engine: "Недостаточная мощность двигателя"
 sp_land_reward_land_cruiser_engine_desc: "Ранние испытания показывают, что массивная рама прототипа создает нагрузку на текущий движок, из-за чего [SpecialProject.GetName] работает медленно и не отвечает. Команда предлагает два варианта: разработать новый, более мощный двигатель или попытаться модифицировать существующий двигатель, рискуя выйти из строя."
 sp_land_reward_option_land_cruiser_engine_leave: "Оставить как есть"
 sp_land_reward_option_land_cruiser_engine_modify: "Изменить текущий движок"
 sp_land_reward_option_land_cruiser_engine_modify_bonus_name: "Улучшенный движок"
 sp_land_reward_option_land_cruiser_engine_new: "Разработать новый движок"
 sp_land_reward_option_land_cruiser_engine_new_bonus_name: "Переработанный двигатель"
 sp_land_reward_land_cruiser_turret: "Сложный турельный механизм"
 sp_land_reward_land_cruiser_turret_desc: "Огромная многобашенная конструкция вызывает серьезные проблемы с выравниванием и прицеливанием, что задерживает интеграцию оружия. Команда инженеров рекомендует упростить компоновку башни для повышения надежности, но это приведет к снижению запланированной огневой мощи [SpecialProject.GetName]."
 sp_land_reward_option_land_cruiser_turret_original: "Сохраните оригинальный дизайн"
 sp_land_reward_option_land_cruiser_turret_simplify: "Упрощение конструкции турели"
 sp_land_reward_option_land_cruiser_turret_simplify_bonus_name: "Упрощенная конструкция башни"
 sp_land_reward_option_land_cruiser_turret_redesign: "Редизайн турельного механизма"
 sp_land_reward_option_land_cruiser_turret_redesign_bonus_name: "Переработанный турельный механизм"
 sp_land_reward_land_cruiser_track: "Отслеживание сбоя системы"
 sp_land_reward_land_cruiser_track_desc: "Вес [SpecialProject.GetName] перегружал путевую систему, что приводило к постоянным поломкам во время тестирования. Варианты — усилить гусеницы, что потребует значительной модернизации, или уменьшить броню машины, чтобы облегчить нагрузку."
 sp_land_reward_option_land_cruiser_track_current: "Продолжить текущие треки"
 sp_land_reward_option_land_cruiser_track_reduce_armor: "Уменьшить броню"
 sp_land_reward_option_land_cruiser_track_reduce_armor_bonus_name: "Уменьшенная броня"
 sp_land_reward_option_land_cruiser_track_reinforce_track: "Усиление гусеничной системы"
 sp_land_reward_option_land_cruiser_track_reinforce_track_bonus_name: "Усиленная гусеничная система"
 sp_land_reward_land_cruiser_communication: "Проблема с системой связи"
 sp_land_reward_land_cruiser_communication_desc: "Огромный размер [SpecialProject.GetName] требует сложной внутренней системы связи для координации его команды. Существующая система оказывается неадекватной: заказы задерживаются или теряются. Команда предлагает перепроектировать внутреннюю планировку, чтобы улучшить коммуникацию, или установить более совершенную, но непроверенную систему."
 sp_land_reward_option_land_cruiser_communication_current: "Покинуть текущую систему"
 sp_land_reward_option_land_cruiser_communication_new: "Установить новую усовершенствованную систему"
 sp_land_reward_option_land_cruiser_communication_new_bonus_name: "Передовая система связи"
 sp_land_reward_option_land_cruiser_communication_redesign: "Переработанная внутренняя планировка"
 sp_land_reward_option_land_cruiser_communication_redesign_bonus_name: "Переработанная система связи"
 sp_land_reward_land_cruiser_assembly: "Прецизионная сборка"
 sp_land_reward_land_cruiser_assembly_desc: "На этапе сборки инженеры успешно отработали метод точного выравнивания массивных компонентов [SpecialProject.GetName], таких как кольцо башни и обшивка корпуса, что значительно снизило риск механических переломов под напряжением. Мы можем интегрировать эту инновационную технологию в рамках всего проекта, чтобы повысить надежность конструкции в целом. Как нам следует это применять?"
 sp_land_reward_option_land_cruiser_assembly_all: "На всех этапах сборки"
 sp_land_reward_option_land_cruiser_assembly_bonus_name: "Прецизионная сборка"
 sp_land_reward_option_land_cruiser_assembly_key: "Только для ключевых компонентов"
 sp_land_reward_land_cruiser_suspension: "Гидропневматическая система подвески"
 sp_land_reward_land_cruiser_suspension_desc: "Команда усовершенствовала современную систему гидропневматической подвески, которая уравновешивает огромный вес [SpecialProject.GetName], обеспечивая устойчивость и снижая нагрузку на гусеницы даже при движении по пересеченной местности. [Character.GetName] уверен, что эту приостановку можно надежно реализовать для повышения производительности в полевых условиях."
 sp_land_reward_option_land_cruiser_suspension_full: "Полная гидропневматическая подвеска"
 sp_land_reward_option_land_cruiser_suspension_rear: "Ограничение на задние подразделения"
 sp_land_reward_land_cruiser_ammunition: "Решение для хранения боеприпасов"
 sp_land_reward_land_cruiser_ammunition_desc: "Во время испытаний возникли опасения относительно безопасного хранения и транспортировки крупнокалиберных боеприпасов [SpecialProject.GetName], поскольку стандартные стойки не могли безопасно выдержать вес разрывного снаряда. Была предложена новая разделенная на отсеки система хранения с использованием усиленных переборок и гидравлических погрузчиков, позволяющая повысить безопасность обращения и ускорить заряжание снарядов в боевых условиях."
 sp_land_reward_option_land_cruiser_ammunition_current: "Поддерживать текущую систему"
 sp_land_reward_option_land_cruiser_ammunition_simplified: "Используйте упрощенную версию"
 sp_land_reward_option_land_cruiser_ammunition_new: "Примите новую систему хранения данных"

 sp_land_reward_super_heavy_howitzer_focus_preference: "Фокус дизайна"
 sp_land_reward_super_heavy_howitzer_focus_preference_desc: "По мере развития разработки необходимо принять важное решение: мы можем отдать приоритет быстрому производству и орудиям меньшего калибра, или мы можем инвестировать в более крупные и тяжелые орудия, жертвуя эффективностью производства ради беспрецедентной огневой мощи и разрушительного воздействия."
 sp_land_reward_option_super_heavy_howitzer_focus_preference_balance: "Сохраняйте баланс"
 sp_land_reward_option_super_heavy_howitzer_focus_preference_firepower: "Сосредоточьтесь на огневой мощи"
 sp_land_reward_option_super_heavy_howitzer_focus_preference_production: "Сосредоточьтесь на быстром производстве"
