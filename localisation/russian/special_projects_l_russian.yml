 # Nuclear reactor
 sp_nuclear_design_choice_reward: "Проектирование реактора"
 sp_nuclear_design_choice_reward_desc: "Пытаясь спроектировать реактор, нам нужно выбрать, какой материал использовать в качестве замедлителя. Это будет определять конструкцию всего реактора. Мы можем использовать тяжелую воду или графит, оба из которых имеют свои плюсы и минусы..."
 sp_nuclear_design_choice_reward_graphite: "Очищенный графит – лучший замедлитель"
 sp_nuclear_design_choice_reward_heavy_water: "Тяжелая вода станет дешевле"
 sp_nuclear_major_breakthrough_reward: "Крупный прорыв в ядерных реакциях"
 sp_nuclear_major_breakthrough_reward_desc: "Контролируемый эксперимент с некоторыми из наших ограниченных ядерных материалов продемонстрировал осуществимость задуманной нами конструкции. Это продвинуло проект вперед с новым энтузиазмом."
 sp_nuclear_isotope_separation_choice_reward: "Установки разделения изотопов"
 sp_nuclear_isotope_separation_choice_reward_desc: "Чтобы обеспечить наши реакторы ядерным топливом, нам необходимо определиться с процессом отделения полезных изотопов урана от остальных. Существует ряд предложений по установкам сепарации, но двумя лидерами являются газообразные и центробежные."
