 mechanized_equipment_2_short: "Механизированный II"
 mechanized_equipment_2_desc: "Механизированная пехота оснащена бронетранспортерами (БТР) или боевыми машинами пехоты (БМП) для транспортировки и ведения боя. Механизированная пехота отличается от мотопехоты тем, что ее транспортные средства обеспечивают определенную степень защиты от вражеского огня, в отличие от колесной техники с мягкой обшивкой (грузовиков или джипов) для мотопехоты."
 mechanized_equipment_3: "Механизированное оборудование III"
 mechanized_equipment_3_short: "Механизированный III"
 mechanized_equipment_3_desc: "Механизированная пехота оснащена бронетранспортерами (БТР) или боевыми машинами пехоты (БМП) для транспортировки и ведения боя. Механизированная пехота отличается от мотопехоты тем, что ее транспортные средства обеспечивают определенную степень защиты от вражеского огня, в отличие от колесной техники с мягкой обшивкой (грузовиков или джипов) для мотопехоты."

 anti_air_equipment: "Буксируемая зенитная установка"
 anti_air_equipment_short: "Зенитный"
 anti_air_equipment_desc: "Зенитная артиллерия в первую очередь предназначена для сбивания самолетов противника, хотя скорострельные пушки могут быть эффективны и против наземных целей."

 anti_tank_equipment: "Буксируемая противотанковая машина"
 anti_tank_equipment_short: "Противотанковый"
 anti_tank_equipment_desc: "Артиллерийское орудие прямой наводки, стреляющее бронебойными боеприпасами для поражения танков и других труднодоступных целей."

 anti_air_equipment_1: "Буксируемая зенитная установка"
 anti_air_equipment_1_short: "Зенитный"
 anti_air_equipment_1_desc: "Зенитная артиллерия в первую очередь предназначена для сбивания самолетов противника, хотя скорострельные пушки могут быть эффективны и по наземным целям."

 anti_tank_equipment_1: "Буксируемая противотанковая машина"
 anti_tank_equipment_1_short: "Противотанковый"
 anti_tank_equipment_1_desc: "Артиллерийское орудие прямой наводки, стреляющее бронебойными боеприпасами для поражения танков и других труднодоступных целей."

 artillery_equipment: "Буксируемая артиллерия"
 artillery_equipment_short: "Артиллерия"
 artillery_equipment_desc: "Артиллерия относится к крупнокалиберному оружию, обслуживаемому расчетом, такому как пушки и гаубицы, которые могут выбрасывать боеприпасы далеко за пределы эффективной дальности личного оружия."

 rocket_artillery_equipment: "Буксируемая реактивная артиллерия"
 rocket_artillery_equipment_short: "Реактивная артиллерия"
 rocket_artillery_equipment_desc: "Реактивная артиллерия менее точна и имеет гораздо меньшую продолжительную скорострельность, чем батареи традиционных артиллерийских орудий. Однако у них есть возможность одновременно поражать цель несколькими ракетами с разрушительным эффектом."

 artillery_equipment_1: "Буксируемая артиллерия"
 artillery_equipment_1_short: "Артиллерия"
 artillery_equipment_1_desc: "Артиллерия относится к оружию большого калибра, такому как пушки и гаубицы, управляемые расчетами, которые могут выбрасывать боеприпасы далеко за пределы эффективной дальности личного оружия."
 gw_artillery: "$artillery_equipment_1_short$"

