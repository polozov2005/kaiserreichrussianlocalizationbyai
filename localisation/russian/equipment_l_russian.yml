 light_tank_destroyer_equipment: "Легкий истребитель танков"
 light_tank_destroyer_equipment_short: "Л. Истребитель танков"
 light_tank_destroyer_equipment_desc: "Истребители танков — это гусеничные машины с более крупной, чем обычно, пушкой, установленной вместо башни. Легкие ПТ-САУ созданы на базе легких танков, а это значит, что они достаточно мобильны, но не несут особо мощных орудий по сравнению с более тяжелыми ПТ."
