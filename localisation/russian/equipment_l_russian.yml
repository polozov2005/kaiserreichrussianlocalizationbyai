 artillery_equipment_2: "Улучшенная артиллерия"
 artillery_equipment_2_desc: "Новые конструкции гаубиц, использующие преимущества новых гидравлических противооткатных устройств и более длинных стволов."
 artillery_equipment_3: "Продвинутая артиллерия"
 artillery_equipment_3_desc: "Лёгкая артиллерия, способная разбираться для транспортировки, что позволяет доставлять артиллерийскую поддержку в ранее труднодоступные районы."

 anti_air_equipment_2: "Улучшенное ПВО"
 anti_air_equipment_2_desc: "Зенитные орудия с более длинными патронами и стволами, способные поражать высоколетящие самолёты."
 anti_air_equipment_3: "Продвинутое ПВО"
 anti_air_equipment_3_desc: "Продвинутое мобильное зенитное орудие с большей дальностью и скорострельностью для борьбы даже с самыми быстрыми и высоколетящими вражескими самолётами."

 rocket_artillery_equipment_2: "Продвинутая реактивная артиллерия"
 rocket_artillery_equipment_2_desc: "Стабилизированные вращением ракеты, увеличивающие дальность более лёгких артиллерийских батарей."

 anti_tank_equipment_2: "Улучшенное противотанковое"
 anti_tank_equipment_2_desc: "Орудия большего калибра для борьбы с более тяжёлыми танками с наклонной бронёй."
 anti_tank_equipment_3: "Продвинутое противотанковое"
 anti_tank_equipment_3_desc: "Комбинируя различные виды новых технологий боеприпасов с орудиями с более высокой начальной скоростью снаряда, эти противотанковые орудия готовы к любой новой броне, которую могут разработать наши враги."

 motorized_rocket_equipment: "Моторизованная реактивная артиллерия"
 motorized_rocket_equipment_short: "Мот. Р. Арт."
 motorized_rocket_equipment_desc: "Реактивные системы залпового огня, подобные этим, доставляют взрывчатку в целевую зону быстрее, чем традиционная артиллерия, но с меньшей точностью и требуют больше времени на перезарядку. Будучи установленными на грузовиках, эта версия способна наносить удары и менять позиции до того, как противник сможет ответить огнём."
 motorized_rocket_equipment_1: "Моторизованная реактивная артиллерия"
 motorized_rocket_equipment_1_short: "Мот. Р. Арт."
 motorized_rocket_equipment_1_desc: "Реактивные системы залпового огня, подобные этим, доставляют взрывчатку в целевую зону быстрее, чем традиционная артиллерия, но с меньшей точностью и требуют больше времени на перезарядку. Будучи установленными на грузовиках, эта версия способна наносить удары и менять позиции до того, как противник сможет ответить огнём."

 amphibious_mechanized_equipment: "Амфибийные десантные машины"
 amphibious_mechanized_equipment_short: "Амтраки"
 amphibious_mechanized_equipment_desc: "Амфибийные тракторы, или амтраки, позволяют морской пехоте высаживаться на пляж под бронированной защитой. Однако это достигается ценой низкой топливной эффективности."
 amphibious_mechanized_equipment_1: "Базовый амфибийный трактор"
 amphibious_mechanized_equipment_1_short: "Базовый амтрак"
 amphibious_mechanized_equipment_1_desc: "Амфибийные тракторы, или амтраки, позволяют морской пехоте высаживаться на пляж под бронированной защитой. Однако это достигается ценой низкой топливной эффективности."
 amphibious_mechanized_equipment_2: "Улучшенный амфибийный трактор"
 amphibious_mechanized_equipment_2_short: "Улучшенный амтрак"
 amphibious_mechanized_equipment_2_desc: "Эти амтраки имеют несколько улучшений по сравнению с базовой версией, таких как задняя погрузочная рампа для более лёгкой разгрузки на пляже."

 amphibious_tank_equipment: "Амфибийные танки"
 amphibious_tank_equipment_short: "Амф. танки"
 light_tank_amphibious_chassis: "Лёгкие амфибийные танки"
 light_tank_amphibious_chassis_short: "Л. амф. танки"
