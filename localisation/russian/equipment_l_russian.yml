 modern_tank_equipment: "Современный танк"
 modern_tank_equipment_desc: "Современные танки — это маневренные многоцелевые ББМ, сочетающие в себе огневую мощь тяжелого танка с мобильностью среднего танка и являющиеся прообразом современных ОБТ."
 modern_tank_equipment_1: "Современный танк"
 modern_tank_equipment_1_short: "Мод. Танк"
 modern_tank_equipment_1_desc: "Современные танки — это маневренные многоцелевые ББМ, сочетающие в себе огневую мощь тяжелого танка с мобильностью среднего танка и являющиеся прообразом современных ОБТ."

 modern_tank_artillery_equipment: "Современная самоходная артиллерия"
 modern_tank_artillery_equipment_desc: "Современные самоходные артиллерийские машины внешне могут напоминать танки, но, как правило, они легкобронированы, слишком легко, чтобы выжить в бою прямой наводкой. Однако они защищают свои экипажи от шрапнели и стрелкового оружия."
 modern_tank_artillery_equipment_1: "Современная самоходная артиллерия"
 modern_tank_artillery_equipment_1_short: "Современная САУ"
 modern_tank_artillery_equipment_1_desc: "Современные самоходные артиллерийские машины внешне могут напоминать танки, но, как правило, они легкобронированы, слишком легко, чтобы выжить в бою прямой наводкой. Однако они защищают свои экипажи от шрапнели и стрелкового оружия."

 modern_tank_destroyer_equipment: "Современный истребитель танков"
 modern_tank_destroyer_equipment_desc: "Современные истребители танков представляют собой эволюцию более ранних легких и средних ПТ, предпочитая подвижность и скрытность тяжелой броне."
 modern_tank_destroyer_equipment_1: "Современный истребитель танков"
 modern_tank_destroyer_equipment_1_short: "Современный ТД"
 modern_tank_destroyer_equipment_1_desc: "Современные истребители танков представляют собой эволюцию более ранних легких и средних ПТ, предпочитая подвижность и скрытность тяжелой броне."

 modern_tank_aa_equipment: "Современные СП Зенитные"
 modern_tank_aa_equipment_desc: "Современная зенитная артиллерия, сочетающая в себе ракеты и скорострельные пушки, представляет смертельную угрозу для вражеской авиации."
 modern_tank_aa_equipment_1: "Современные СП Зенитные"
 modern_tank_aa_equipment_1_short: "Современный АА"
 modern_tank_aa_equipment_1_desc: "Современная зенитная артиллерия, сочетающая в себе ракеты и скорострельные пушки, представляет смертельную угрозу для вражеской авиации."

 mechanized_equipment: "Механизированный"
 mechanized_equipment_short: "Механизированный"
 mechanized_equipment_desc: "Механизированная пехота - это пехота, оснащенная бронетранспортерами (БТР) или боевыми машинами пехоты (БМП) для транспортировки и ведения боя. Механизированная пехота отличается от мотопехоты тем, что ее транспортные средства обеспечивают определенную степень защиты от вражеского огня, в отличие от колесной техники с мягкой обшивкой (грузовиков или джипов) для мотопехоты."
 mechanized_equipment_1: "Механизированное оборудование I"
 mechanized_equipment_1_short: "Механизированный я"
 mechanized_equipment_1_desc: "Механизированная пехота оснащена бронетранспортерами (БТР) или боевыми машинами пехоты (БМП) для транспортировки и ведения боя. Механизированная пехота отличается от мотопехоты тем, что ее транспортные средства обеспечивают определенную степень защиты от вражеского огня, в отличие от колесной техники с мягкой обшивкой (грузовиков или джипов) для мотопехоты."
