l_russian:
 submarine: "Подводная лодка"
 submarine_desc: "Подводные лодки — это суда, совершающие скрытные рейды. Тяжелые подводные лодки крупнее и мощнее, имеют большую дальность действия и обладают некоторыми возможностями бомбардировки по принципу «земля-земля» и с берега."
 both_cruisers_desc: "Легкий крейсер — легкий досмотровый корабль. Его основная задача — защищать крупные корабли от легких кораблей противника, но он также может выпускать мощные торпеды, которые могут повредить более крупные корабли.\n\nТяжелый крейсер — большой броненосный крейсер, который довольно гибок. Хороший выбор для стран, которые не могут позволить себе строительство более крупных крупных кораблей."
 light_cruiser: "Легкий крейсер"
 light_cruiser_desc: "Легкое досмотровое судно. Его основная задача — защищать крупные корабли от легких кораблей противника, но он также может выпускать мощные торпеды, которые могут повредить более крупные корабли."
 heavy_cruiser: "Тяжелый крейсер"
 heavy_cruiser_desc: "Большой броненосный крейсер, довольно гибкий. Хороший выбор для стран, которые не могут позволить себе строительство более крупных крупных кораблей."
 destroyer: "Разрушитель"
 destroyer_desc: "Самое легкое судно для досмотра. Его задача — защищать более крупные корабли, а также находить и уничтожать подводные лодки."
 ship_hull_light: "Легкий корпус"
 ship_hull_light_desc: "Самое легкое судно для досмотра. Его задача — защищать более крупные корабли, а также находить и уничтожать подводные лодки."
 carrier: "Перевозчик"
 carrier_desc: "Крупный корабль, способный нести в бою крылья мощных авианосных самолетов. Также полезен в качестве плавучего аэродрома, который можно расположить у берегов врага."
 battleship: "Линкор"
 battleship_desc: "Линкоры — это крупные корабли среднего уровня с универсальными характеристиками. Они сочетают в себе скорость, броню и огневую мощь, но не превосходят ни в одной области."
 armor_desc: "Самая большая и прочная броня, которую можно купить за деньги."
 battle_cruiser: "Линейный крейсер"
 battle_cruiser_desc: "Крупный корабль, часто с наступательными способностями, близкими к линкору, но с более слабой броней в обмен на более высокую скорость."
 convoy: "Конвой"
 convoy_desc: "Конвои, используемые для международной торговли товарами и ресурсами. Также используется для переправки войск и проведения морских вторжений."
 sh_battleship: "Дредноут"
 sh_battleship_desc: "Самый большой крупный корабль с самыми большими орудиями и прочной броней, который можно купить за деньги. Столь дорогостоящие инвестиции заслуживают должной поддержки со стороны небольших досмотровых судов."

 light_airframe: "Легкий планер"
 light_airframe_desc: "Легкие самолеты на базе планера"
 medium_airframe: "Средний планер"
 medium_airframe_desc: "Самолеты на базе среднего планера"
 heavy_airframe: "Тяжелый планер"
 heavy_airframe_desc: "Самолеты на базе тяжелого планера"
 jet_engines: "Реактивные двигатели"
 JET_ENGINES_SPECIAL: "Развитие реактивных двигателей является важной предпосылкой для развития реактивных самолетов. Это необходимо изучить, прежде чем вы сможете исследовать усовершенствованные самолеты."
 jet_engines_desc: "Реактивный двигатель, являющийся прорывом в технологии двигательной установки, позволит разработать совершенно новое поколение самолетов."

 convoy_1: "Конвой"

 armored_car_equipment: "Бронированный автомобиль"
 armored_car_equipment_desc: "Легкие бронированные колесные машины. Обычно используется для разведки и подавления сопротивления, но может быть оснащен более тяжелым вооружением."
 motorized_equipment: "Грузовик"
 motorized_equipment_desc: "Грузовики использовались для перевозки войск, припасов и моторизации дивизии."
 motorized_equipment_0: "Ранний грузовик"
 motorized_equipment_0_desc: "Во время Вельткрига армии начали использовать обычные гражданские грузовики для перевозки припасов и оборудования. С тех пор они стали неотъемлемой частью большинства армий."
 motorized_equipment_1: "Грузовик"
 motorized_equipment_1_desc: "Моторизация пехоты — первый этап механизации армии. Гражданские грузовики легко адаптируются к использованию в военных целях для перевозки солдат, буксировки оружия, а также перевозки оборудования и припасов. Это значительно увеличивает стратегическую мобильность пехотных частей, которые в противном случае полагались бы на марш."
 support_equipment_short: "Поддержка уравнения."
 support_equipment: "Вспомогательное оборудование"
 support_equipment_desc: "Радиостанции, джипы, понтоны и другое оборудование, используемое для поддержки войск."
 tech_support: "Вспомогательное оборудование"
 support_equipment_1: "Вспомогательное оборудование"
 support_equipment_1_desc: "Радиостанции, джипы, понтоны и другое оборудование, используемое для поддержки войск."

