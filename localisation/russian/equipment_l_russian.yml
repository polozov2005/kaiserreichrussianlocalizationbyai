 heavy_tank_amphibious_chassis_short: "Х. Амфибия. Танки"

 amphibious_tank_equipment_1: "Базовый танк-амфибия"
 amphibious_tank_equipment_2: "Улучшенный танк-амфибия"
 amphibious_tank_equipment_desc: "Танки, модифицированные для передвижения по воде. Они намного лучше других танков высаживаются на десант и переправляются через реки, но требуют больше топлива."
 amphibious_tank_equipment_1_desc: "По сути, это легкий танк, модифицированный для плавания. Эта машина обеспечивает огневую поддержку подразделений, создающих плацдарм."
 amphibious_tank_equipment_2_desc: "Средний танк, модифицированный для передвижения по воде. Дополнительная универсальность и мобильность достигается за счет снижения топливной эффективности."

