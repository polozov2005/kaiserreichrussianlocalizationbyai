 artillery_equipment: "Буксируемая артиллерия"
 artillery_equipment_short: "Артиллерия"
 artillery_equipment_desc: "Артиллерия относится к крупнокалиберному оружию, обслуживаемому расчётом, такому как пушки и гаубицы, способному доставлять боеприпасы далеко за пределы эффективной дальности личного оружия."

 rocket_artillery_equipment: "Буксируемая реактивная артиллерия"
 rocket_artillery_equipment_short: "Реактивная артиллерия"
 rocket_artillery_equipment_desc: "Реактивная артиллерия менее точна и имеет гораздо меньшую устойчивую скорострельность, чем батареи традиционных артиллерийских орудий. Однако она способна одновременно обрушить на цель множество ракет с разрушительным эффектом."

 artillery_equipment_1: "Буксируемая артиллерия"
 artillery_equipment_1_short: "Артиллерия"
 artillery_equipment_1_desc: "Артиллерия относится к крупнокалиберному оружию, такому как пушки и гаубицы, обслуживаемому расчётами, способному доставлять боеприпасы далеко за пределы эффективной дальности личного оружия."
