 light_tank_destroyer_equipment: "Лёгкая ПТ-САУ"
 light_tank_destroyer_equipment_short: "Л. ПТ-САУ"
 light_tank_destroyer_equipment_desc: "Истребители танков — гусеничные машины с орудием крупнее обычного в неподвижной установке вместо башни. Лёгкие ПТ-САУ построены на шасси лёгких танков, что означает их довольно высокую мобильность, но они не несут особенно мощных орудий по сравнению с более тяжёлыми ПТ-САУ."
