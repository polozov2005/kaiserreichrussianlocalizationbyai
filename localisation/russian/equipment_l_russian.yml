 train_equipment: "Поезд"
 train_equipment_desc: "Поезда транспортируют снабжение из столицы снабжения в узлы снабжения, соединённые железной дорогой."
 train_equipment_1: "Гражданский поезд"
 train_equipment_1_desc: "Захваченный военными из регулярных гражданских грузоперевозок, этот локомотив хорошо подходит для перевозки большого количества снабжения на большие расстояния. Однако его гражданская конструкция делает его уязвимым."
 train_equipment_2: "Военный экономичный поезд"
 train_equipment_2_desc: "Упрощённая конструкция, в которой опущены многие функции, обычно встречающиеся на обычных грузовых поездах, ради более дешёвого производства. Он всё ещё так же уязвим, как и обычный поезд, но его легче заменить."
 train_equipment_3: "Бронепоезд"
 train_equipment_3_desc: "Локомотив, заключённый в тяжёлую броню, чтобы сделать его менее уязвимым для вражеских атак. Он может перевозить столько же груза, как и любая другая конструкция, но его производство дороже."
 railway_gun_equipment: "Железнодорожная артиллерия"
 railway_gun_equipment_desc: "Тяжёлое орудие, установленное на железнодорожном лафете для транспортировки."
 railway_gun_desc: "Железные дороги дают возможность перемещать тяжёлые орудия далеко вглубь территории с разумной скоростью, позволяя нам бомбардировать вражеские позиции на большой дальности и с хорошим эффектом."
 railway_gun_equipment_1: "Железнодорожное орудие"

 floating_harbor_equipment: "Плавучая гавань"
 floating_harbor_equipment_desc: "Серия понтонов и сборных бетонных конструкций, которые можно перемещать по воде и собирать за несколько часов для создания укрытой зоны высадки для разгрузки снабжения."
 floating_harbor_equipment_1: "Плавучая гавань"
 floating_harbor_equipment_1_desc: "Серия понтонов и сборных бетонных конструкций, которые можно перемещать по воде и собирать за несколько часов для создания укрытой зоны высадки для разгрузки снабжения."

