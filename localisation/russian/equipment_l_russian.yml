 gw_tank_equipment: "Танк эпохи Мировой войны"
 gw_tank_equipment_short: "Танк эпохи Мировой войны"
 gw_tank_equipment_desc: "Танки в Мировую войну разрабатывались раздельно и одновременно Великобританией и Францией как средство прорыва тупика окопной войны на Западном фронте. Британцы предпочитают называть их «танками» — название, принятое на ранних стадиях разработки в качестве меры безопасности для сокрытия их назначения, тогда как немецкий аналог, «панцер», прижился во многих странах, находящихся под немецким влиянием. Ранние танки были вооружены пулемётами и небольшими орудиями, двигались медленно и были бронированы лишь достаточно, чтобы остановить стрелковое оружие."

