 gw_tank_equipment: "Танк эпохи Вельткрига"
 gw_tank_equipment_short: "Танк эпохи Вельткрига"
 gw_tank_equipment_desc: "Танки в Вельткриге разрабатывались отдельно и одновременно Соединенным Королевством и Францией как средство выхода из тупика позиционной войны на Западном фронте. Британцы предпочитают называть их «танками» — название, принятое на ранних этапах их разработки в качестве меры безопасности, чтобы скрыть их предназначение, в то время как немецкий аналог «Panzer» прижился во многих странах, находящихся под немецким влиянием. Ранние танки были вооружены пулеметами и небольшими пушками, двигались медленно и имели броню, достаточную только для того, чтобы остановить огонь из стрелкового оружия."

 light_tank_equipment: "Легкий танк"
 light_tank_equipment_desc: "Легкие танки — это небольшие маневренные боевые бронированные машины, способные как разведывать, так и сражаться с легкобронированными противниками."
