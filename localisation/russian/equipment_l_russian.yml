l_russian:
 submarine: "Подводная лодка"
 submarine_desc: "Подлодки — скрытные рейдерские суда. Тяжёлые подлодки крупнее и мощнее, имеют большую операционную дальность и определённые возможности для атак по надводным целям и береговой бомбардировки."
 both_cruisers_desc: "Лёгкий крейсер — лёгкое экранное судно. Его основная задача — защищать капитальные корабли от вражеских лёгких кораблей, но он также может выпускать мощные торпеды, способные повредить более крупные корабли.\n\nТяжёлый крейсер — крупный бронированный крейсер, довольно универсальный. Хороший выбор для наций, которые не могут позволить себе строить более крупные капитальные корабли."
 light_cruiser: "Лёгкий крейсер"
 light_cruiser_desc: "Лёгкое экранное судно. Его основная задача — защищать капитальные корабли от вражеских лёгких кораблей, но он также может выпускать мощные торпеды, способные повредить более крупные корабли."
 heavy_cruiser: "Тяжёлый крейсер"
 heavy_cruiser_desc: "Крупный бронированный крейсер, довольно универсальный. Хороший выбор для наций, которые не могут позволить себе строить более крупные капитальные корабли."
 destroyer: "Эсминец"
 destroyer_desc: "Самое лёгкое экранное судно. Его задача — защищать более крупные корабли и обнаруживать и уничтожать подлодки."
 ship_hull_light: "Лёгкий корпус"
 ship_hull_light_desc: "Самое лёгкое экранное судно. Его задача — защищать более крупные корабли и обнаруживать и уничтожать подлодки."
 carrier: "Авианосец"
 carrier_desc: "Капитальный корабль, способный нести крылья мощных палубных самолётов в бой. Также полезен как плавающий аэродром, который можно разместить у побережья вашего врага."
 battleship: "Линкор"
 battleship_desc: "Линкоры — капитальные корабли среднего уровня с универсальными характеристиками. Они балансируют скорость, бронирование и огневую мощь, но не превосходят ни в одной области."
 armor_desc: "Самое крупное и прочное бронирование, которое можно купить за деньги."
 battle_cruiser: "Линейный крейсер"
 battle_cruiser_desc: "Капитальный корабль, часто с наступательными возможностями, близкими к линкору, но с более слабым бронированием, принесённым в жертву ради большей скорости."
 convoy: "Конвой"
 convoy_desc: "Конвои, используемые для международной торговли товарами и ресурсами. Также используются для переброски войск и проведения морских десантов."
 sh_battleship: "Дредноут"
 sh_battleship_desc: "Самый крупный капитальный корабль с самыми большими орудиями и самым прочным бронированием, которое можно купить за деньги. Такие дорогие инвестиции заслуживают надлежащей поддержки более мелких экранных кораблей."

 light_airframe: "Лёгкий планер"
 light_airframe_desc: "Самолёты на базе лёгкого планера"
 medium_airframe: "Средний планер"
 medium_airframe_desc: "Самолёты на базе среднего планера"
 heavy_airframe: "Тяжёлый планер"
 heavy_airframe_desc: "Самолёты на базе тяжёлого планера"
 jet_engines: "Реактивные двигатели"
 JET_ENGINES_SPECIAL: "Разработка реактивных двигателей — необходимое условие для создания реактивных самолётов. Это необходимо исследовать, прежде чем можно будет исследовать продвинутые самолёты"
 jet_engines_desc: "Прорыв в технологии двигателей, реактивный двигатель позволит разработать совершенно новое поколение самолётов."

 convoy_1: "Конвой"

 armored_car_equipment: "Бронеавтомобиль"
 armored_car_equipment_desc: "Лёгкие бронированные колёсные машины. Обычны для разведки и подавления сопротивления, но могут оснащаться более тяжёлым вооружением."
 motorized_equipment: "Грузовик"
 motorized_equipment_desc: "Грузовики, используемые для перевозки войск, снабжения и моторизации дивизий."
 motorized_equipment_0: "Ранний грузовик"
 motorized_equipment_0_desc: "Во время Мировой войны армии начали использовать базовые гражданские грузовики для перевозки снабжения и оборудования. С тех пор они стали неотъемлемой частью большинства армий."
 motorized_equipment_1: "Грузовик"
 motorized_equipment_1_desc: "Моторизация пехоты — первый этап механизации армии. Гражданские грузовики легко адаптируются к военным нуждам: перевозка солдат, буксировка орудий, доставка оборудования и снабжения. Это значительно увеличивает стратегическую мобильность пехотных подразделений, которые иначе полагались бы на марши."
 support_equipment_short: "Снаряжение поддержки"
 support_equipment: "Снаряжение поддержки"
 support_equipment_desc: "Рации, джипы, понтоны и другое оборудование, используемое для поддержки войск."
 tech_support: "Снаряжение поддержки"
 support_equipment_1: "Снаряжение поддержки"
 support_equipment_1_desc: "Рации, джипы, понтоны и другое оборудование, используемое для поддержки войск."

