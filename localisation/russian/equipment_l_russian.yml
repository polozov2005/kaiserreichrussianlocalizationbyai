 light_tank_aa_equipment: "Легкий СП Зенитный"
 light_tank_aa_equipment_desc: "Зенитная артиллерия в первую очередь предназначена для сбивания самолетов противника, хотя скорострельные пушки могут быть эффективны и против наземных целей. Данная модель смонтирована на шасси легкого танка."
