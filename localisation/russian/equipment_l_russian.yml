 heavy_tank_amphibious_chassis_short: "Т. амф. танки"

 amphibious_tank_equipment_1: "Базовый амфибийный танк"
 amphibious_tank_equipment_2: "Улучшенный амфибийный танк"
 amphibious_tank_equipment_desc: "Танки, модифицированные для движения по воде. Они гораздо лучше справляются с амфибийными высадками и форсированием рек, чем другие танки, но требуют больше топлива."
 amphibious_tank_equipment_1_desc: "По сути, лёгкий танк, модифицированный для плавания; эта машина обеспечивает огневую поддержку подразделениям, создающим плацдарм."
 amphibious_tank_equipment_2_desc: "Средний танк, модифицированный для движения по воде. Добавленная универсальность и мобильность достигаются ценой снижения топливной эффективности."

