 infantry_equipment: "Пехотное снаряжение"
 infantry_equipment_short: "Пехотное уравнение."
 infantry_equipment_desc: "Личное и служебное оружие для пехоты, а также различные другие предметы снаряжения, необходимые солдату."
 infantry_equipment_0: "Основное пехотное снаряжение"
 infantry_equipment_0_short: "Основное уравнение"
 infantry_equipment_0_desc: "Базовое снаряжение пехотинца, разработанное до и во время Вельткрига."
 infantry_equipment_1: "Пехотное снаряжение I"
 infantry_equipment_1_short: "Оружие я"
 infantry_equipment_1_desc: "Личное и служебное оружие для пехоты, а также различные другие предметы снаряжения, необходимые солдату."
 infantry_equipment_2: "Пехотное снаряжение II"
 infantry_equipment_2_short: "Оружие II"
 infantry_equipment_2_desc: "Личное и служебное оружие для пехоты, а также различные другие предметы снаряжения, необходимые солдату. Модернизирован и включает большое количество пистолетов-пулеметов и противотанковых ружей."
 infantry_equipment_3: "Пехотное снаряжение III"
 infantry_equipment_3_short: "Оружие III"
 infantry_equipment_3_desc: "Личное и служебное оружие для пехоты, а также различные другие предметы снаряжения, необходимые солдату. Дальнейшая модернизация включает в себя персональные штурмовые винтовки и противотанковые ракеты."

 gw_armored_car_equipment: "Межвоенный броневик"
 gw_armored_car_equipment_desc: "Если предыдущие броневики представляли собой простые коммерческие модели с тонкой стальной обшивкой, то эта модель с нуля разрабатывалась для перевозки брони и легкого вооружения."
 armored_car_equipment_1: "Базовый бронеавтомобиль"
 armored_car_equipment_1_desc: "Улучшенная внутренняя компоновка и дополнительный боекомплект создают более эффективный бронеавтомобиль."
 armored_car_equipment_2: "Улучшенный бронеавтомобиль"
 armored_car_equipment_2_desc: "Изменения на поле боя требуют гораздо более тяжелого вооружения и более толстой брони, чтобы победить легкие подразделения противника и выжить, чтобы доложить об этом."
 armored_car_at_equipment: "Противотанковый бронеавтомобиль"
 armored_car_at_equipment_desc: "Наши легкие механизированные части в какой-то момент вступят в контакт с танковыми силами противника. Разработка специального противотанкового варианта дала бы им шанс на успех."

 tank_armor_upgrade: "Броня"
 tank_armor_upgrade_desc: "Броня лучшего качества, чем могут пробить ваши враги, является огромным преимуществом для ваших дивизий, но, вероятно, замедлит вас."
 tank_gun_upgrade: "Основное орудие"
 tank_gun_upgrade_desc: "Важно иметь оружие, способное противостоять бронетехнике противника и способное пробить его."
 tank_aa_upgrade: "Противовоздушное вооружение"
 tank_aa_upgrade_desc: "Убедитесь, что наше зенитное вооружение способно сбивать новейшие самолеты."
 tank_at_upgrade: "Противотанковое вооружение"
 tank_at_upgrade_desc: "Убедитесь, что наши истребители танков смогут победить новейшие танки противника."
 tank_art_upgrade: "Артиллерийское вооружение"
 tank_art_upgrade_desc: "Убедитесь, что наша самоходная артиллерия обладает мощной огневой мощью, способной прорвать любого небронированного врага."
 tank_reliability_upgrade: "Надежность"
 tank_reliability_upgrade_desc: "Повышение надежности приводит к уменьшению количества вышедших из строя резервуаров, которые вам придется заменять."
 mech_cost_upgrade: "Стоимость производства"
 mech_cost_upgrade_desc: "Оптимизация конструкции и замена менее важных материалов позволяют строить автомобиль быстрее, но с немного большим количеством дефектов."
 tank_engine_upgrade: "Двигатель"
 tank_engine_upgrade_desc: "Большая мобильность дает тактические и стратегические преимущества, а также позволяет увеличить броню без значительного замедления."
 ac_engine_upgrade: "Двигатель"
 ac_engine_upgrade_desc: "Большая мобильность дает тактические и стратегические преимущества, а также позволяет увеличить броню без значительного замедления."

 ship_gun_upgrade: "Пистолет"
 ship_gun_upgrade_desc: "Важно иметь оружие, способное противостоять бронетехнике противника и способное пробить его."
 ship_torpedo_upgrade: "Торпедо"
 ship_torpedo_upgrade_desc: "Торпеда — это мощная атака, которую могут запустить меньшие корабли, оказавшись в радиусе действия, с высокой вероятностью критического попадания."
 ship_armor_upgrade: "Броня"
 ship_armor_upgrade_desc: "Больше брони для защиты вашего корабля от огня противника"
 carrier_armor_upgrade: "Броня"
 carrier_armor_upgrade_desc: "Больше брони для защиты вашего корабля от огня противника"
 ship_engine_upgrade: "Двигатель"
 ship_engine_upgrade_desc: "Корабль с более мощным двигателем может контролировать дистанцию ​​до противников в бою."
 ship_reliability_upgrade: "Надежность"
 ship_reliability_upgrade_desc: "Корабль с высокой надежностью будет менее подвержен критическим попаданиям, которые могут нанести кораблю огромный ущерб без продуманной конструкции."
 ship_anti_air_upgrade: "ПВО"
 ship_anti_air_upgrade_desc: "Больше орудий, поднимающих свинец в воздух, означает больше сбитых самолетов противника!"
 ship_ASW_upgrade: "противолодочная оборона"
 ship_ASW_upgrade_desc: "Противолодочное оружие важно для обнаружения и уничтожения подводных лодок."
 destroyer_engine_upgrade: "Двигатель"
 destroyer_engine_upgrade_desc: "Корабль с более мощным двигателем может контролировать дистанцию ​​до противников в бою."
 sub_engine_upgrade: "Двигатель"
 sub_engine_upgrade_desc: "Корабль с более мощным двигателем может контролировать дистанцию ​​до противников в бою."
 sub_stealth_upgrade: "Скрытность"
 sub_stealth_upgrade_desc: "Самая сильная сторона подводной лодки – это ее способность оставаться незамеченной и наносить удары только тогда, когда у нее есть преимущество."
 sub_torpedo_upgrade: "Торпедо"
 sub_torpedo_upgrade_desc: "Торпеда — это мощная атака, которую могут запустить меньшие корабли, оказавшись в радиусе действия, с высокой вероятностью критического попадания."
 ship_deckspace_upgrade: "Место на палубе"
 ship_deckspace_upgrade_desc: "Больше места для перевозки и запуска самолетов-носителей"

 plane_gun_upgrade: "Оружие"
