 artillery_equipment_2: "Улучшенная артиллерия"
 artillery_equipment_2_desc: "Новая конструкция гаубицы с использованием новых гидравлических противооткатных устройств и более длинных стволов."
 artillery_equipment_3: "Передовая артиллерия"
 artillery_equipment_3_desc: "Легкая артиллерия, которую можно разобрать для транспортировки, что позволяет обеспечить артиллерийскую поддержку в ранее труднодоступных районах."

 anti_air_equipment_2: "Улучшенная система ПВО"
 anti_air_equipment_2_desc: "Зенитные орудия с более длинными патронами и стволами, способные поражать высоколетящие самолеты."
 anti_air_equipment_3: "Усовершенствованная система ПВО"
 anti_air_equipment_3_desc: "Усовершенствованная мобильная зенитная пушка с большей дальностью стрельбы и огневой мощью, способная бороться даже с самыми быстрыми и высоколетящими самолетами противника."

 rocket_artillery_equipment_2: "Передовая ракетная артиллерия"
 rocket_artillery_equipment_2_desc: "Ракеты со стабилизацией вращения, увеличивающие дальность действия более легких артиллерийских батарей."

 anti_tank_equipment_2: "Улучшенная противотанковая система"
 anti_tank_equipment_2_desc: "Орудия большего калибра для борьбы с более тяжелыми танками с наклонной броней."
 anti_tank_equipment_3: "Усовершенствованное противотанковое средство"
 anti_tank_equipment_3_desc: "Сочетая различные виды новых технологий боеприпасов с орудиями с более высокой начальной скоростью, эти противотанковые орудия готовы к любой новой броне, которую могут разработать наши враги."

 motorized_rocket_equipment: "Моторизованная ракетная артиллерия"
 motorized_rocket_equipment_short: "Мот. Р. Артиллерия"
 motorized_rocket_equipment_desc: "Такие реактивные установки залпового огня доставляют взрывчатку в целевой район быстрее, чем обычная артиллерия, но с меньшей точностью и требуют больше времени для перезарядки. Будучи установленной на грузовиках, эта версия способна атаковать и менять позиции до того, как противник сможет открыть ответный огонь."
 motorized_rocket_equipment_1: "Моторизованная ракетная артиллерия"
 motorized_rocket_equipment_1_short: "Мот. Р. Артиллерия"
 motorized_rocket_equipment_1_desc: "Такие реактивные установки залпового огня доставляют взрывчатку в целевой район быстрее, чем обычная артиллерия, но с меньшей точностью и требуют больше времени для перезарядки. Будучи установленной на грузовиках, эта версия способна атаковать и менять позиции до того, как противник сможет открыть ответный огонь."

 amphibious_mechanized_equipment: "Десантные машины-амфибии"
 amphibious_mechanized_equipment_short: "Амтракс"
 amphibious_mechanized_equipment_desc: "Тракторы-амфибии, или Amtracs, позволяют морским пехотинцам высаживаться на пляже под броневой защитой. Однако за это приходится платить низкой топливной экономичностью."
 amphibious_mechanized_equipment_1: "Базовый трактор-амфибия"
 amphibious_mechanized_equipment_1_short: "Базовый Амтрак"
 amphibious_mechanized_equipment_1_desc: "Тракторы-амфибии, или Amtracs, позволяют морским пехотинцам высаживаться на пляже под броневой защитой. Однако за это приходится платить низкой топливной экономичностью."
 amphibious_mechanized_equipment_2: "Улучшенный трактор-амфибия"
 amphibious_mechanized_equipment_2_short: "Улучшенный Амтрак"
 amphibious_mechanized_equipment_2_desc: "Эти Amtracs имеют несколько улучшений по сравнению с базовой версией, например, заднюю погрузочную рампу для облегчения разгрузки на пляже."

 amphibious_tank_equipment: "Танки-амфибии"
 amphibious_tank_equipment_short: "Амфибия. Танки"
 light_tank_amphibious_chassis: "Легкие плавающие танки"
 light_tank_amphibious_chassis_short: "Л. Амфибия. Танки"
 medium_tank_amphibious_chassis: "Средние плавающие танки"
 medium_tank_amphibious_chassis_short: "М. Амфибия. Танки"
