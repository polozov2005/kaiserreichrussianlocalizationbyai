 mechanized_equipment: "Механизированная"
 mechanized_equipment_short: "Механизированная"
 mechanized_equipment_desc: "Механизированная пехота — пехота, оснащённая бронетранспортёрами (БТР) или боевыми машинами пехоты (БМП) для перевозки и боя. Механизированная пехота отличается от моторизованной тем, что её машины обеспечивают определённую защиту от вражеского огня, в отличие от небронированных колёсных машин (грузовиков или джипов) для моторизованной пехоты."
 mechanized_equipment_1: "Механизированное снаряжение I"
 mechanized_equipment_1_short: "Механизированное I"
 mechanized_equipment_1_desc: "Механизированная пехота оснащена бронетранспортёрами (БТР) или боевыми машинами пехоты (БМП) для перевозки и боя. Механизированная пехота отличается от моторизованной тем, что её машины обеспечивают определённую защиту от вражеского огня, в отличие от небронированных колёсных машин (грузовиков или джипов) для моторизованной пехоты."
