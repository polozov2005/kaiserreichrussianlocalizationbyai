 light_tank_aa_equipment: "Лёгкая ЗСУ"
 light_tank_aa_equipment_desc: "Зенитная артиллерия предназначена в первую очередь для поражения вражеских самолётов, хотя скорострельные орудия также могут быть эффективны против наземных целей. Эта модель установлена на шасси лёгкого танка."
