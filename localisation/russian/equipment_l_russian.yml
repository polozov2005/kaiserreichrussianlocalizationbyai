 super_heavy_tank_equipment: "Сверхтяжёлый танк"
 super_heavy_tank_equipment_desc: "Сверхтяжёлые танки — эволюция концепции тяжёлого танка. Больше, лучше вооружены, с более мощной бронёй, но также медленнее и имеют серьёзные проблемы с мягким грунтом. Немногие мосты способны выдержать их вес."
