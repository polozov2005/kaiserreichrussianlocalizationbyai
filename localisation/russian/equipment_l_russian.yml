 train_equipment: "Тренироваться"
 train_equipment_desc: "Поезда доставляют поставки из столицы снабжения в центры снабжения, соединенные железной дорогой."
 train_equipment_1: "Гражданский поезд"
 train_equipment_1_desc: "Этот паровоз, перешедший к военным из регулярной гражданской грузовой службы, хорошо подходит для перевозки большого количества грузов на большие расстояния. Однако его гражданская конструкция делает его уязвимым."
 train_equipment_2: "Военный поезд жесткой экономии"
 train_equipment_2_desc: "Упрощенная конструкция, в которой отсутствуют многие функции, обычно встречающиеся в регулярных грузовых поездах, ради удешевления производства. Он по-прежнему столь же уязвим, как и обычный поезд, но его легче заменить."
 train_equipment_3: "Бронепоезд"
 train_equipment_3_desc: "Локомотив поезда заключен в тяжелую броню, что делает его менее уязвимым для атак противника. Он может перевозить столько же груза, сколько и любая другая конструкция, но его производство дороже."
 railway_gun_equipment: "Железнодорожная артиллерия"
 railway_gun_equipment_desc: "Тяжелая пушка, установленная на железнодорожном вагоне для перевозки."
 railway_gun_desc: "Железные дороги дают возможность перемещать тяжелые орудия далеко вглубь страны с разумной скоростью, что позволяет нам бомбардировать позиции противника на большом расстоянии и с хорошим эффектом."
 railway_gun_equipment_1: "Железнодорожная пушка"

 floating_harbor_equipment: "Плавающая гавань"
 floating_harbor_equipment_desc: "Серия понтонов и сборных бетонных конструкций, которые можно перемещать по воде и собирать за считанные часы, чтобы создать защищенную посадочную площадку для разгрузки припасов."
 floating_harbor_equipment_1: "Плавающая гавань"
 floating_harbor_equipment_1_desc: "Серия понтонов и сборных бетонных конструкций, которые можно перемещать по воде и собирать за считанные часы, чтобы создать защищенную посадочную площадку для разгрузки припасов."

