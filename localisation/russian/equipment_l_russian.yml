 super_heavy_tank_equipment: "Супер Тяжелый Танк"
 super_heavy_tank_equipment_desc: "Сверхтяжелые танки являются развитием концепции тяжелого танка. Они крупнее, лучше вооружены, имеют больше брони, но также медленнее и имеют серьезные проблемы с мягким грунтом. Лишь немногие мосты могут надеяться выдержать свой вес."
