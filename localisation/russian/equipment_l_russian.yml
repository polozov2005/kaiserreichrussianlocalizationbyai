 modern_tank_equipment: "Современный танк"
 modern_tank_equipment_desc: "Современные танки — маневренные многоцелевые ББМ, сочетающие огневую мощь тяжёлых танков с мобильностью средних, предвосхищая современные ОБТ."
 modern_tank_equipment_1: "Современный танк"
 modern_tank_equipment_1_short: "Совр. танк"
 modern_tank_equipment_1_desc: "Современные танки — маневренные многоцелевые ББМ, сочетающие огневую мощь тяжёлых танков с мобильностью средних, предвосхищая современные ОБТ."

 modern_tank_artillery_equipment: "Современная САУ"
 modern_tank_artillery_equipment_desc: "Современные самоходные артиллерийские машины могут внешне напоминать танки, но обычно они легко бронированы — слишком легко, чтобы выжить в бою прямым огнём. Однако они защищают свои экипажи от осколков и стрелкового оружия."
 modern_tank_artillery_equipment_1: "Современная САУ"
 modern_tank_artillery_equipment_1_short: "Совр. САУ"
 modern_tank_artillery_equipment_1_desc: "Современные самоходные артиллерийские машины могут внешне напоминать танки, но обычно они легко бронированы — слишком легко, чтобы выжить в бою прямым огнём. Однако они защищают свои экипажи от осколков и стрелкового оружия."

 modern_tank_destroyer_equipment: "Современная ПТ-САУ"
 modern_tank_destroyer_equipment_desc: "Современные истребители танков — эволюция ранних лёгких и средних ПТ-САУ, предпочитающая мобильность и скрытность тяжёлому бронированию."
 modern_tank_destroyer_equipment_1: "Современная ПТ-САУ"
 modern_tank_destroyer_equipment_1_short: "Совр. ПТ-САУ"
 modern_tank_destroyer_equipment_1_desc: "Современные истребители танков — эволюция ранних лёгких и средних ПТ-САУ, предпочитающая мобильность и скрытность тяжёлому бронированию."

 modern_tank_aa_equipment: "Современная ЗСУ"
 modern_tank_aa_equipment_desc: "Сочетание ракет и скорострельных орудий делает современную зенитную артиллерию смертоносной угрозой для вражеской авиации."
