 rocket_artillery_equipment_1_short: "Реактивная артиллерия"
 rocket_artillery_equipment_1_desc: "Реактивная артиллерия менее точна и имеет гораздо меньшую устойчивую скорострельность, чем батареи традиционных артиллерийских орудий. Однако она способна одновременно поразить цель множеством ракет с разрушительным эффектом."

 infantry_equipment: "Пехотное снаряжение"
 infantry_equipment_short: "Пехотное снар."
 infantry_equipment_desc: "Личное и расчётное оружие пехоты, а также различное дополнительное снаряжение, необходимое солдату."
 infantry_equipment_0: "Базовое пехотное снаряжение"
 infantry_equipment_0_short: "Базовое снар."
 infantry_equipment_0_desc: "Базовое снаряжение пехотинца, разработанное до и во время Мировой войны."
 infantry_equipment_1: "Пехотное снаряжение I"
 infantry_equipment_1_short: "Оружие I"
 infantry_equipment_1_desc: "Личное и расчётное оружие пехоты, а также различное дополнительное снаряжение, необходимое солдату."
 infantry_equipment_2: "Пехотное снаряжение II"
 infantry_equipment_2_short: "Оружие II"
 infantry_equipment_2_desc: "Личное и расчётное оружие пехоты, а также различное дополнительное снаряжение, необходимое солдату. Модернизировано с включением большого числа пистолетов-пулемётов и противотанковых ружей."
 infantry_equipment_3: "Пехотное снаряжение III"
 infantry_equipment_3_short: "Оружие III"
 infantry_equipment_3_desc: "Личное и расчётное оружие пехоты, а также различное дополнительное снаряжение, необходимое солдату. Дальнейшая модернизация, включающая личные штурмовые винтовки и противотанковые гранатомёты."

 gw_armored_car_equipment: "Межвоенный бронеавтомобиль"
 gw_armored_car_equipment_desc: "Тогда как предыдущие бронеавтомобили были простыми коммерческими моделями с тонкой стальной обшивкой, эта модель была спроектирована с нуля для несения брони и лёгкого вооружения."
 armored_car_equipment_1: "Базовый бронеавтомобиль"
 armored_car_equipment_1_desc: "Улучшенная внутренняя компоновка и дополнительное хранение боеприпасов создают более эффективный бронеавтомобиль."
 armored_car_equipment_2: "Улучшенный бронеавтомобиль"
 armored_car_equipment_2_desc: "Изменения на поле боя требуют гораздо более тяжёлого вооружения и более толстой брони для поражения вражеских лёгких подразделений и выживания с последующим докладом."
 armored_car_at_equipment: "Противотанковый бронеавтомобиль"
 armored_car_at_equipment_desc: "Наши лёгкие механизированные подразделения в какой-то момент столкнутся с вражескими танковыми силами. Разработка специальной противотанковой модификации даст им шанс в бою."

 tank_armor_upgrade: "Бронирование"
 tank_armor_upgrade_desc: "Лучшее бронирование, чем может пробить противник, — огромное преимущество для ваших дивизий, но, вероятно, замедлит вас."
 tank_gun_upgrade: "Основное орудие"
 tank_gun_upgrade_desc: "Важно иметь орудие, способное угнаться за бронированием противника и пробить его."
 tank_aa_upgrade: "Зенитное вооружение"
 tank_aa_upgrade_desc: "Обеспечьте, чтобы наше зенитное вооружение могло сбивать новейшие самолёты."
 tank_at_upgrade: "Противотанковое вооружение"
 tank_at_upgrade_desc: "Обеспечьте, чтобы наши истребители танков могли побеждать новейшие вражеские танки."
 tank_art_upgrade: "Артиллерийское вооружение"
 tank_art_upgrade_desc: "Обеспечьте, чтобы наша самоходная артиллерия имела мощную огневую мощь, способную разорвать любых небронированных противников."
 tank_reliability_upgrade: "Надёжность"
