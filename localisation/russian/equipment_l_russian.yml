 anti_air_equipment: "Буксируемое ПВО"
 anti_air_equipment_short: "ПВО"
 anti_air_equipment_desc: "Зенитная артиллерия предназначена в первую очередь для поражения вражеских самолётов, хотя скорострельные орудия также могут быть эффективны против наземных целей."

 anti_tank_equipment: "Буксируемое противотанковое"
 anti_tank_equipment_short: "Противотанковое"
 anti_tank_equipment_desc: "Артиллерийское орудие прямого наведения, стреляющее бронебойными боеприпасами для уничтожения танков и других твёрдых целей."

