 ## Short term Goals
 growing_the_faction: "Расширить Фракцию"
 growing_the_faction_desc: "Наша фракция должна иметь больше членов, чтобы к ней серьёзно относились на геополитической арене."
 spy_master_goal_name: "Назначить Мастера Шпионажа"
 spy_master_goal_desc: "Нам следует поручить одному из членов специализироваться на искусстве шпионажа и сбора разведданных, позволив ему контролировать и направлять операции нашего союза."
 convoy_sufficiency_goal_name: "Достаточность Конвоев"
 convoy_sufficiency_goal_desc: "Чтобы иметь достаточные возможности как для снабжения наших войск за рубежом, так и для обеспечения материальных потребностей промышленности за счёт импорта из-за моря, мы должны создать достаточно большой торговый флот."
 ensure_military_r_d_goal_name: "Построить Военные Научно-исследовательские Центры"
 ensure_military_r_d_goal_desc: "Мы должны убедиться, что наши военные технологии на высоте, построив объекты, предназначенные для исследований и разработок передовых прототипов и новых концепций."
 military_infrastructure_goal_name: "Построить Военную Инфраструктуру"
 military_infrastructure_goal_desc: "Хорошо развитая инфраструктура критически важна для обеспечения необходимых линий снабжения наших пограничных сил."
 a_great_fortress_goal_name: "Построить Более Мощные Укрепления"
 a_great_fortress_goal_desc: "Готовность — это ключ. Обеспечив безопасность приграничных районов и ключевых точек с помощью самых современных укреплений, мы сможем гарантировать, что враг не сможет нас победить."
 an_armored_fist_goal_name: "Расширить Наши Бронетанковые Силы"
 an_armored_fist_goal_desc: "Новые времена открывают возможности для новых методов ведения войны. Танки — это будущее. Нам необходимо, чтобы у нас, как у фракции, было достаточно сил, чтобы доминировать на поле боя."
 an_infantry_army_goal_name: "Расширить Наши Пехотные Силы"
 an_infantry_army_goal_desc: "Основа любой армии — это пехота. Нам нужна значительная пехотная армия, чтобы подкреплять наши претензии как на дипломатической арене, так и в полевых условиях."
 develop_ploiesti_oil_fields_goal_name: "Разработать Нефтяные Месторождения Плоешти"
 develop_ploiesti_oil_fields_goal_desc: "Будучи единственными нефтяными месторождениями в Европе, Плоештинские нефтяные месторождения должны быть должным образом использованы, чтобы обеспечить альянс топливом, необходимым для продолжения военных операций."
 develop_baku_oil_fields_goal_name: "Разработать Бакинские Нефтяные Месторождения"
 develop_baku_oil_fields_goal_desc: "Разработка Бакинского нефтяного региона обеспечила бы получение значительных объёмов продуктов нефтепереработки, жизненно важных для военных операций."
 fortify_panama_canal_goal_name: "Укрепить Панамский Канал"
 fortify_gibraltar_goal_name: "Укрепить Гибралтар"
 fortify_gibraltar_goal_desc: "Укрепление нашей стратегической базы на Гибралтарском проливе позволило бы нам лучше контролировать морское движение между Средиземноморьем и Атлантикой."
 expand_maltese_bases_goal_name: "Расширить Мальтийские Базы"
 expand_maltese_bases_goal_desc: "Расширение наших баз на Мальте позволило бы лучше нарушать линии снабжения противника и проецировать силу в центральном Средиземноморье."
 fortify_bosporus_goal_name: "Укрепить Босфор"
 fortify_bosporus_goal_desc: "Укрепление Босфорского пролива обеспечило бы наш контроль над всем военно-морским доступом между Чёрным морем и Средиземноморьем."
 fortify_bosporus_tooltip: "Победные очки §Y[773.Controller.GetVictoryPointName_9833]§! и §Y[340.Controller.GetVictoryPointName_11829]§! получают уровень 1 §YБерегового Форта§!, уровень 1 §YСухопутного Форта§! и укомплектованы одной дивизией."
 fortify_dardanelles_goal_name: "Укрепить Дарданеллы"
 fortify_dardanelles_goal_desc: "Укрепление Дарданелл усилило бы нашу способность контролировать движение флота и торговли из Чёрного моря."
 fortify_dardanelles_tooltip: "Каждая провинция в §YЭдирне§! и §YБурсе§!, контролирующая пролив §YДарданеллы§!, получает уровень 1 §YБерегового Форта§!, уровень 1 §YСухопутного Форта§! и укомплектована одной дивизией."
 fortify_suez_canal_goal_name: "Укрепить Суэцкий Канал"
 fortify_suez_canal_goal_desc: "Сохранение контроля над Суэцким каналом крайне важно для обеспечения нашего единоличного контроля над главной транспортной артерией между Европой и Азией."
 fortify_suez_tooltip: "Каждая провинция в §YСуэце§!, контролирующая пролив §YСуэц§!, получает уровень 1 §YБерегового Форта§!, уровень 1 §YСухопутного Форта§! и укомплектована одной дивизией."
 expand_singapore_naval_base_goal_name: "Расширить Военно-морскую Базу в Сингапуре"
 expand_singapore_naval_base_goal_desc: "Монументальная укреплённая военно-морская база в Сингапуре господствует над Малаккским проливом и регулирует движение между Индийским и Тихим океанами. Её следует укрепить ещё больше."

 # Mid term Goals
 a_large_faction_goal_name: "Пригласить Больше Стран в нашу Фракцию"
 a_large_faction_goal_desc: "Став ещё больше, наша фракция сможет проецировать своё влияние ещё дальше."
 aggressive_defense_goal_name: "Нанести Урон Агрессорам"
 aggressive_defense_goal_desc: "Мы не уступим врагу ни пяди. Наши солдаты должны понимать, что главное — не умереть за свою страну, а заставить врага умереть за свою."
 a_military_base_goal_name: "Расширить Военную Промышленность"
 a_military_base_goal_desc: "Крестовый поход против коммунизма требует оружия. Чтобы производить оружие в больших количествах, нам нужна сильная военная промышленность."
 a_military_base_tech_bonus: "Бонус цели $a_military_base_goal_name$"
 industrial_expansion_goal_name: "Промышленная Экспансия"
 industrial_expansion_goal_desc: "Лучший способ создать сильную фракцию — иметь мощную промышленную базу. Мы должны обеспечить промышленную мощь, необходимую для того, чтобы стать важной силой."
 industrial_expansion_tech_bonus: "Бонус цели $industrial_expansion_goal_name$"
 industrial_research_goal_name: "Исследовать $construction4$"
 industrial_research_goal_desc: "Чтобы стать доминирующим игроком, мы должны убедиться, что обладаем промышленными ноу-хау во всей фракции."

 marine_corps_goal_name: "Создать Корпус Морской Пехоты"
 marine_corps_goal_desc: "Расширение наших амфибийных сил значительно увеличит наши наступательные возможности и количество вражеских территорий, которым мы можем угрожать."
 marine_corps_tech_bonus: "Бонус цели $marine_corps_goal_name$"
 airborne_corps_goal_name: "Создать Воздушно-десантный Корпус"
 airborne_corps_goal_desc: "Расширение наших воздушно-десантных сил значительно повысит нашу наступательную гибкость и позволит наносить удары вглубь вражеской территории."
 airborne_corps_tech_bonus: "Бонус цели $airborne_corps_goal_name$"
 mountaineer_corps_goal_name: "Создать Корпус Горных Стрелков"
 mountaineer_corps_goal_desc: "Расширение наших горнострелковых сил значительно повысит способность нашей армии сражаться на пересечённой и труднопроходимой местности."
 mountaineer_corps_tech_bonus: "Бонус цели $mountaineer_corps_goal_name$"
 submarine_force_goal_name: "Расширить Подводный Флот"
 submarine_force_goal_desc: "Соответствующий подводный флот имеет решающее значение для подрыва линий снабжения противника."
 submarine_force_tech_bonus: "Бонус цели $submarine_force_goal_name$"
 convoy_escort_force_goal_name: "Эскортировать Конвои Через Океаны"
 convoy_escort_force_goal_desc: "Чтобы обезопасить наши линии снабжения, мы должны обеспечить достаточное количество эскортных кораблей."
 convoy_escort_force_tech_bonus: "Бонус цели $convoy_escort_force_goal_name$"
 air_superiority_goal_name: "Удерживать Господство в Воздухе"
 air_superiority_goal_desc: "Контроль в воздухе определяет успех на суше и на море. У нас должно быть достаточно истребителей, чтобы обеспечить наше господство в воздухе."
 air_superiority_tech_bonus: "Бонус цели $air_superiority_goal_name$"
 control_ploiesti_oil_fields_goal_name: "Контролировать Нефтяные Месторождения Плоешти"
 control_ploiesti_oil_fields_goal_desc: "Будучи единственными нефтяными месторождениями в Европе, контроль над Плоештинскими месторождениями неоценим для обеспечения альянса топливом, необходимым для продолжения военных операций."
 control_baku_oil_fields_goal_name: "Контролировать Бакинские Нефтяные Месторождения"
 control_baku_oil_fields_goal_desc: "Обеспечение контроля над Бакинским нефтяным регионом дало бы доступ к обширным запасам нефти, жизненно важным для военных операций."
 control_panama_canal_goal_name: "Контролировать Панамский Канал"
 control_panama_canal_goal_desc: "Контроль над Панамским каналом жизненно важен для обеспечения быстрой переброски флотов между Атлантикой и Тихим океаном, гарантируя стратегическую гибкость в обоих океанах."
 control_gibraltar_goal_name: "Контролировать Гибралтар"
 control_gibraltar_goal_desc: "Стратегическая база на Гибралтарском проливе позволила бы нам контролировать морское движение между Средиземноморьем и Атлантикой."
 control_malta_goal_name: "Контролировать Мальту"
 control_malta_goal_desc: "Обладание Мальтой позволило бы нарушать линии снабжения противника и проецировать силу в центральном Средиземноморье."
 control_bosporus_goal_name: "Контролировать Босфор"
 control_bosporus_goal_desc: "Захват Босфорского пролива позволил бы нам контролировать весь военно-морской доступ между Чёрным морем и Средиземноморьем."
 control_dardanelles_goal_name: "Контролировать Дарданеллы"
 control_dardanelles_goal_desc: "Удержание Дарданелл сделало бы возможным диктовать движение флота и торговли из Чёрного моря."
 control_suez_canal_goal_name: "Контролировать Суэцкий Канал"
 control_suez_canal_goal_desc: "Обладание жизненно важным Суэцким каналом дало бы нам единоличный контроль над главной транспортной артерией между Европой и Азией, обеспечивая быструю переброску сил и ресурсов."
 control_singapore_goal_name: "Контролировать Сингапур"
 control_singapore_goal_desc: "Монументальная укреплённая военно-морская база в Сингапуре господствует над Малаккским проливом и регулирует движение между Индийским и Тихим океанами. Она должна быть нашей."

 # Long term goals
 industrial_domination_goal_name: "Расширить Гражданскую Промышленность"
 industrial_domination_goal_desc: "Современная война — это вопрос производственных возможностей. Давайте обеспечим себе крупнейший промышленный потенциал, который когда-либо видел мир."
 rule_the_waves_goal_name: "Владычество на Море"
 rule_the_waves_goal_desc: "Чтобы по-настоящему господствовать в океане, нужен великий флот, а ключевым компонентом великого флота являются Капитальные Корабли."
 rule_the_waves_tech_bonus: "Бонус цели Владычество на Море"
 strategic_bombing_campaign_goal_name: "Непрерывная Кампания Стратегических Бомбардировок"
 strategic_bombing_campaign_goal_desc: "Крупномасштабная кампания стратегических бомбардировок будет систематически разрушать промышленный потенциал врага, позволяя нам истощать его силы."
 liberate_territory_goal_name: "Освободить Нашу Территорию"
 liberate_territory_goal_desc: "Враг оккупирует нашу территорию. Её освобождение должно стать нашей первой целью."
 great_offensive_goal_name: "Провести Великое Наступление"
 great_offensive_goal_desc: "Великое наступление с захватом вражеской территории должно стать нашим первым шагом к окончательному завершению войны."

