 FACTION_EXECUTE_CAREFUL_DESC: "Выполняя план, войска будут атаковать хорошо укрепленные пункты, только когда там никого нет. Они не будут атаковать провинции, если это в результате растянет и ослабит линию фронта.\n\n§gОбратите внимание, что это затронет подразделения альянса, контролируемые ИИ в пределах театра военных действий, но не подразделения под управлением игроков.§!"
 FACTION_EXECUTE_BALANCED_DESC: "Действуют обычные правила выполнения операций. Войска стараются наступать таким образом, чтобы линия фронта была как можно короче, и могут атаковать укрепленные пункты.\n\n§gОбратите внимание, что это затронет подразделения альянса, контролируемые ИИ в пределах театра военных действий, но не подразделения под управлением игроков.§!"
 FACTION_EXECUTE_RUSH_DESC: "Войска будут атаковать провинции, если они входят в план, даже несмотря на то, что это может растянуть линию фронта или оставить некоторые боевые единицы без защиты.\n\n§gОбратите внимание, что это затронет подразделения альянса, контролируемые ИИ в пределах театра военных действий, но не подразделения под управлением игроков.§!"

