 FACTION_COMMANDER_DESC: "Командующий театром военных действий передает часть £doctrine_mastery §Hочков освоения§!, заработанных другими участниками альянса на этом театре, собственному государству. Передаваемый объем зависит от навыков §Hатаки§! и §Hобороны§!.\nКомандующий ТВД также уменьшает §Hрасход припасов§! — на это влияют его навыки §Hлогистики§! и §Hпланирования§!.\n\n"

