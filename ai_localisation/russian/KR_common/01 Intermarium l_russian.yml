 MIE_build_forts_in_blr: "Расширение Оствалла"

 intermarium_events.1.t: "Восточноевропейское сотрудничество"
 intermarium_events.1.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества в строительство укреплений на нашей границе с Россией. Эти укрепления теперь завершены и готовы служить нашим силам."
 intermarium_events.1.a: "Отлично!"

 MIE_joint_offensive_exercises: "Совместные наступательные учения"

 intermarium_events.2.t: "Восточноевропейское сотрудничество"
 intermarium_events.2.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества в организацию совместных военных учений между восточноевропейскими государствами. Здесь генералы, ориентированные на наступление и бронетехнику, моделировали контратаку против сил противника и обменивались советами и рекомендациями друг с другом."
 intermarium_events.2.a: "Отлично!"
 MIE_all_gain_1_attack: "Все генералы государств-членов с чертой §HКомандир танковых войск§! получат §G1§! Атаки."

 MIE_joint_grand_strategy_planning: "Большая стратегия"

 intermarium_events.3.t: "Восточноевропейское сотрудничество"
 intermarium_events.3.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества в организацию военных игр среди армейских штабов восточноевропейских государств. Здесь наши генералы обсуждали полномасштабное вторжение в регион, распределяли роли между национальными государствами и занимались планированием большой стратегии для отражения атаки."
 intermarium_events.3.a: "Отлично!"
 MIE_all_gain_1_planning: "Все генералы государств-членов с чертой §HПехотный командир§! получат §G1§! Планирования."

 MIE_defense_contributions: "Ввести обязательные оборонные взносы"
 MIE_contributions: "Восточноевропейские оборонные взносы"
 MIE_contributions_desc: "Эта страна выплачивает часть своего бюджета в совместный восточноевропейский оборонный бюджет для закупки огнестрельного оружия и другого военного снаряжения."
 MIE_defense_contributions_tt: "Каждое государство-член, выплачивающее взносы, будет ежемесячно добавлять в фонд вооружений £rifle_texticon  §H20§! £support_texticon  §H10§! £unit_artillery_icon_small  §H10§!."

 intermarium_events.4.t: "Восточноевропейское сотрудничество"
 intermarium_events.4.d: "[MIE_leader.GetNameDefCap] предложило углубить сотрудничество между восточноевропейскими государствами путём внедрения системы оборонных взносов. Если мы присоединимся к системе, мы будем выплачивать часть нашего бюджета в совместный восточноевропейский оборонный бюджет, с помощью которого [MIE_leader.GetName] сможет закупать снаряжение для фонда вооружений."
 intermarium_events.4.a: "Мы подпишемся."
 intermarium_events.4.b: "Мы отказываемся."
 MIE_monthly_purchases: "Закупки вооружений"
 MIE_defense_contributions_amount: "В фонд вооружений будет добавлено £rifle_texticon  §H[?global.MIE_infantry_equipment_monthly]§! £support_texticon  §H[?global.MIE_support_equipment_monthly]§! £unit_artillery_icon_small  §H[?global.MIE_artillery_equipment_monthly]§!."

 intermarium_events.5.t: "Восточноевропейское сотрудничество"
 intermarium_events.5.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества, напрямую отправив нам партию винтовок и боеприпасов. Это снаряжение было направлено в наши запасы."
 intermarium_events.5.a: "Отлично!"

 intermarium_events.6.t: "Восточноевропейское сотрудничество"
 intermarium_events.6.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества, напрямую отправив нам партию армейского вспомогательного снаряжения. Это снаряжение было направлено в наши запасы."
 intermarium_events.6.a: "Отлично!"

 intermarium_events.7.t: "Восточноевропейское сотрудничество"
 intermarium_events.7.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества, напрямую отправив нам партию артиллерийских орудий. Это снаряжение было направлено в наши запасы."
 intermarium_events.7.a: "Отлично!"

 MIE_air_command_1: "Совместная инфраструктура ПВО"
 MIE_all_build_air_infra: "Каждое государство-член построит один дополнительный уровень §H$air_base$§! и два дополнительных уровня §H$anti_air_building$§! в своей столице, а также получит §H50§!  £unit_fighter_icon_small\n\nЭто откроет новые решения."

 intermarium_events.8.t: "Восточноевропейское сотрудничество"
 intermarium_events.8.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества в создание инфраструктуры для совместного командования ПВО между восточноевропейскими государствами. Это включает строительство новых авиабаз и предоставление истребителей для всех участников системы."
 intermarium_events.8.a: "Отлично!"

 MIE_air_command_2: "Интегрированные авиакрылья"
 MIE_joint_air_command: "Совместное восточноевропейское авиационное командование"

 intermarium_events.9.t: "Восточноевропейское сотрудничество"
 intermarium_events.9.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества в создание официального Совместного восточноевропейского авиационного командования. Это объединит авиакрылья всех участвующих стран в одну общую структуру, позволяя улучшить воздушное сотрудничество и контроль неба."
 intermarium_events.9.a: "Отлично!"

 MIE_air_command_3: "Многоязычное совместное авиационное командование"

 intermarium_events.10.t: "Восточноевропейское сотрудничество"
 intermarium_events.10.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества в проведение важных реформ Совместного восточноевропейского авиационного командования. Благодаря успешной интеграции многоязычных авиадиспетчеров и ещё более тесному сотрудничеству наших военно-воздушных сил эффективность наших ВВС несомненно возрастёт."
 intermarium_events.10.a: "Отлично!"

 MIE_international_tank_division: "Международная танковая дивизия"
 MIE_transferable_armored_division_tt: "Эта бронетанковая дивизия будет передаваться между восточноевропейскими государствами при каждой смене страны, ответственной за распределение ресурсов."

 intermarium_events.11.t: "Восточноевропейское сотрудничество"
 intermarium_events.11.d: "[MIE_leader.GetNameDefCap] решило инвестировать часть нашего совместного фонда оборонного сотрудничества в формирование международной бронетанковой дивизии, состоящей из добровольцев от каждого восточноевропейского государства. Хотя [MIE_leader.GetNameDef] включит её в свою армейскую структуру, она будет передаваться от государства к государству после их капитуляции."
 intermarium_events.11.a: "Отлично!"

 intermarium_events.12.t: "Русская угроза нейтрализована"
 intermarium_events.12.d: "Россия пала под натиском Рейхспакта, и дальнейшая необходимость в проекте Сотрудничества отпала — он выполнил свою основную цель. Теперь мы можем спать спокойно, зная, что Россия больше не будет угрожать нашей независимости."
 intermarium_events.12.a: "Великий день."

 intermarium_events.13.t: "Германия жертвует снаряжение"
 intermarium_events.13.d: "Германское военное министерство сделало щедрое пожертвование старого военного снаряжения программе ВОС. Эти старые, но надёжные Маузеры будут с пользой использованы в руках балтийских и славянских патриотов, защищающих свои дома от русской угрозы."
 intermarium_events.13.a: "Deutschland über alles."

 intermarium_events.14.t: "Прибытие Балтийской фельджандармерии"
 intermarium_events.14.d: "Из Кайзеррейха прибыло подразделение специально обученной противоповстанческой военной полиции для усиления наших сил безопасности. Имея большой опыт борьбы с партизанскими силами, такими как Лесные братья, эти люди, несомненно, окажутся полезными в сдерживании восстания на балтийских землях."
 intermarium_events.14.a: "Направить их в Латвию."
 intermarium_events.14.b: "Направить их в Эстонию."

 intermarium_events.15.t: "Германия предлагает поддержку правоохранительных органов"
 intermarium_events.15.d: "Берлин предложил нам совместную операцию против террористов из Фронта активистов. Они готовы направить несколько подразделений военной полиции из Восточной Пруссии на литовскую сторону границы и координировать совместные рейды против ЛФА. Нашими объединёнными силами мы, безусловно, окажем сильное давление на ЛФА."
 intermarium_events.15.a: "Хорошо."

 intermarium_events.17.t: "Прогерманский переворот в Беларуси!"
 intermarium_events.17.d: "Похоже, германские спецслужбы раскрыли наш заговор с белорусским правительством и приняли решительные меры. По приказу немцев реакционные элементы белорусской армии взяли под контроль Минск и арестовали председателя Тарашкевича по обвинению в государственной измене. Пока мы говорим, социалистов арестовывают в Беларуси, а буржуазные военные подавляют свободу белорусского народа. Теперь они не смогут присоединиться к нашей борьбе, когда начнётся война, но сделают всё возможное, чтобы помешать попыткам военного правительства противостоять нам. Наш братский долг — освободить белорусов от прусского гнёта!"
 intermarium_events.17.a: "На Минск!"
 GER_coup_BLR: "Прогерманский переворот в Белой Руси"

 intermarium_events.18.t: "Германское соглашение о помощи"
 intermarium_events.18.d: "Наши друзья в Берлине не оставили нас в беде! Несмотря на собственные экономические потрясения, германское правительство согласилось предоставить некоторые исключения для нашего экспорта зерна, несмотря на их в целом усиленную протекционистскую политику для защиты собственного сельскохозяйственного сектора. Кроме того, они согласились реструктурировать часть нашего национального долга перед германскими банками, значительно облегчив наше финансовое бремя. Эти исключения должны несколько смягчить проблемы в сельской местности."
 intermarium_events.18.a: "Какие милостивые у нас союзники."

 intermarium_events.19.t: "Час приближается"
 intermarium_events.19.d: "Наши разведывательные подразделения заметили большое скопление русских сил у границы. После многих лет растущей напряжённости [RUS.GetNameDef], похоже, намерено отвоевать большую часть Восточной Европы и уничтожить нашу независимость. Восточноевропейское оборонное сотрудничество постепенно наращивало военный потенциал нас и наших союзников, в дополнение к нашим собственным усилиям, так что мы готовы насколько это возможно. Германия заявила, что предпочла бы, чтобы мы могли удерживать оборону против России достаточно долго, пока они не разберутся с Интернационалом на западе, и что вынужденное отвлечение их сил на восток только усложнит войну на два фронта."
 intermarium_events.19.a: "Вы с ума сошли? Мы не можем противостоять России в одиночку."
 intermarium_events.19.b: "Мы готовы защищать себя и наших соседей!"
 intermarium_events.19.c: "Мы готовы защищать себя!"
 intermarium_events.19.b.tt: "До тех пор, пока §H[FRA.GetNameDef]§! не капитулирует, §H[GER.GetNameDef]§! и их союзники не будут отправлять дивизии к нашим границам, и мы будем противостоять русским самостоятельно.\nСтраны, участвующие в §HВосточноевропейском оборонном сотрудничестве§!, всё ещё смогут защищать нас и друг друга.\n\n§RПРЕДУПРЕЖДЕНИЕ: Это несколько усложнит войну с Россией.§!"
 intermarium_events.19.c.tt: "До тех пор, пока §H[FRA.GetNameDef]§! не капитулирует, §H[GER.GetNameDef]§! и их союзники не будут отправлять дивизии никому в рамках §HВосточноевропейского оборонного сотрудничества§!.\n\n§RПРЕДУПРЕЖДЕНИЕ: Это усложнит войну с Россией, и они получат дополнительное $infantry_equipment$.§!"

