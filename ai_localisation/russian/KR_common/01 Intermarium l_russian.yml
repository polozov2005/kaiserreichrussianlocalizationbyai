l_russian:

### EE Cooperation Mechanics ###
 intermarium_events.0.t: "Русская угроза"
 intermarium_events.0.d: "Десятилетний упадок России закончился, и теперь русские перестраиваются — они уже выдвигают претензии на свои бывшие имперские территории, и восточноевропейские государства, несомненно, станут одной из их целей.\n\nЧтобы убедиться, что русская угроза сдержана и восточноевропейские государства могут защитить свой суверенитет, лидеры и генералы Остштаатов собрались в [MIE_leader.Capital.GetCapitalVictoryPointName] для обсуждения программы взаимного сотрудничества. Был создан совместный фонд военной обороны, и [MIE_leader.GetNameDef] было поручено управлять им для финансирования совместных оборонных предприятий региона."
 intermarium_events.0.a: "Отлично!"

 MIE_decisions: "Восточноевропейское оборонное сотрудничество"
 MIE_decisions_desc: "[?global.russia.GetNameDefCap] возрождается, и безопасность восточноевропейского региона под угрозой. Когда начнётся Вторая Мировая война, нам придётся готовиться к русскому шторму — и если мы не будем работать вместе, нас уничтожат поодиночке.\n\nПосле того как [?global.russia.GetNameDef] активирует своё древо внешней политики, все восточные члены Рейхспакта получают возможность §Yобъединять ресурсы§! и распределять их между государствами-членами для устранения слабых звеньев. Страна, ответственная за распределение общего пула ресурсов, может инвестировать в другие государства-члены для §Yстроительства укреплений§!, §Yформирования дивизий§! и предоставления полезных §YНациональных духов§!.\n\nТекущие объединённые ресурсы:\n    £rifle_texticon  $infantry_equipment$: §Y[?global.MIE_infantry_equipment]§!\n    £support_texticon  $support_equipment$: §Y[?global.MIE_support_equipment]§!\n    £unit_artillery_icon_small  $artillery_equipment$: §Y[?global.MIE_artillery_equipment]§!\n\n[MIE_leader.GetNameWithFlag] в настоящее время отвечает за распределение пула ресурсов."
 MIE_intermarium_active: "§YВосточноевропейское оборонное сотрудничество§! активно."
 MIE_intermarium_formed: "Программа Восточноевропейского оборонного сотрудничества началась."
 MIE_member: "Является членом §YВосточноевропейского оборонного сотрудничества§!."

 MIE_decisions_GER: "Остполитик"
 MIE_decisions_GER_desc: "Наша империя на востоке простирается от Балтики до Чёрного моря. Остштааты — это прагматичная смесь де-факто клиентских государств, удерживаемых в узде столько же страхом перед Россией, сколько и нашей силой. Мы постоянно следим за их политическим развитием и реагируем при необходимости.\n\n[POL_in_RP]"

 POL_in_RP_yes: "Польша, возможно, сейчас является одним из наших самых лояльных субъектов, но нет гарантии, что так останется и впредь. Мы должны тщательно взвешивать наши инвестиции в Польшу, чтобы гарантировать их лояльность и экономическое сотрудничество.\n\n[POL_GER_polish_loyalty]\n"

 POL_early: "Прогнозируемый результат выборов для сторонников Августа IV: [POL_circle_chance]"
 POL_status_stable: "§GПольша лояльна и стабильна.§!"
 POL_status_restless: "§YПольша стабильна, но ситуация может измениться.§!"
 POL_status_uprising_ready: "§YПольша нестабильна, и военные неудачи могут спровоцировать восстание.§!"
 POL_status_uprising_imminent: "Восстание в Польше неизбежно!"
 POL_status_rebellious: "§RПольша мятежна!§!"

 GER_sponsor_MIE: "Спонсировать ВОС"
 GER_sponsor_MIE_desc: "Восточноевропейское оборонное сотрудничество было основано для координации военного строительства армий Остштаатов. Наш военно-промышленный комплекс участвует в нём, хотя более прямая поддержка со стороны правительства могла бы ещё больше усилить программу."
 GER_fight_forest_brothers: "Создать Балтийскую фельджандармерию"
 GER_fight_forest_brothers_desc: "Отправка временной военной полиции в Объединённое Балтийское герцогство может быть необходима, чтобы помочь им в борьбе с балтийскими сепаратистами."
 GER_fight_LAF: "Усилить литовскую полицию"
 GER_fight_LAF_desc: "Литовское правительство по горло занято якобы спонсируемым Россией Литовским фронтом активистов, террористической организацией, ответственной за многочисленные гнусные деяния. Мы могли бы отправить им специализированные силы из Пруссии для противодействия повстанцам."
 GER_BLR_coup: "Свергнуть правительство БСДП"
 GER_BLR_coup_desc: "Мы терпимо относились к экспериментам Белой Руси с левой демократией, но, видимо, это было ошибкой. Наши разведывательные источники сообщили нам, что они заключили тайный пакт с Москвой вместе с планами предать нас. Этого нельзя допустить."

 POL_GER_buy: "Инвестиции в Польшу"
 POL_GER_buy_desc: "Увеличение нашего экономического контроля над Польшей укрепит нашу власть над ней и обеспечит, что её будущая внешняя политика будет служить нашим деловым интересам."
 POL_GER_sell: "Продать польские активы"
 POL_GER_sell_desc: "Некоторые из наших деловых предприятий в Польше оказались не такими полезными, как мы надеялись. К счастью, есть множество австрийских, чешских и польских бизнесменов, готовых забрать их у нас в обмен на наличные."
 POL_GER_lobby: "Польская промонархическая кампания"
 POL_GER_lobby_desc: "[POL.GetLeader] никогда не был самым популярным королём, но это можно исправить с помощью небольшой немецкой PR-работы."

 POL_GER_promises: "Обещать автономию Польше"
 POL_promise_tt: "§CЛояльность Польши резко возрастёт.§!"
 POL_GER_agricultural_exports: "Перенаправить сельскохозяйственные товары"
 POL_promises1: "Обещала Польше независимость"

 POL_GER_recruit_poland: "Увеличить вербовку в Польше"
 POL_GER_recruit_poland_reduce: "Уменьшить вербовку в Польше"
 POL_GER_recruitment: "Вербовка польских рабочих"

 POL_invest_tt: "Финансируя сторонников Августа IV, мы обеспечим лояльность Польши."
 POL_exploit_tt: "Эксплуататорская политика в отношении Польши усилит антигерманские и революционные настроения в Польше."

 MIE_refuse_equipment_shipments: "Отказаться от поставок снаряжения"
 MIE_refuse_equipment_shipments_desc: "По нашим собственным причинам мы должны сообщить нашим союзникам, что в настоящее время не нуждаемся в поставках снаряжения, и поэтому ресурсы следует использовать в другом месте."
 MIE_allow_equipment_shipments: "Разрешить поставки снаряжения"
 MIE_allow_equipment_shipments_desc: "Хотя ранее мы говорили нашим союзникам не отправлять снаряжение, мы можем в любой момент отменить это решение."

