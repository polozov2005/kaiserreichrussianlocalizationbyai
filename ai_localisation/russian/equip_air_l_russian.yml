l_russian:
 fighter: "Истребитель"
 fighter_equipment_desc: "Истребители быстры и маневренны, способны выполнять множество задач. От завоевания господства в воздухе до защиты бомбардировщиков и перехвата вражеских бомбардировщиков."
 cv_fighter: "Истребитель (палубный)"
 cv_fighter_equipment_desc: "Истребители быстры и маневренны, способны выполнять множество задач. От завоевания господства в воздухе до защиты бомбардировщиков и перехвата вражеских бомбардировщиков."
 jet_fighter: "Реактивный истребитель"
 jet_fighter_equipment: "Реактивный истребитель"
 jet_fighter_equipment_desc: "Истребители быстры и маневренны, способны выполнять множество задач. От завоевания господства в воздухе до защиты бомбардировщиков и перехвата вражеских бомбардировщиков."
 cas: "Штурмовик"
 CAS_equipment_desc: "Самолёты непосредственной поддержки предназначены для помощи в наземных боях."
 cv_cas: "Штурмовик (палубный)"
 cv_CAS_equipment_desc: "Самолёты непосредственной поддержки предназначены для помощи в наземных боях."
 nav_bomber: "Морской бомбардировщик"
 nav_bomber_equipment_desc: "Морские бомбардировщики способны наносить удары по вражеским кораблям."
 cv_nav_bomber: "Морской бомбардировщик (палубный)"
 cv_nav_bomber_equipment_desc: "Морские бомбардировщики способны наносить удары по вражеским кораблям."
 tac_bomber: "Тактический бомбардировщик"
 tac_bomber_equipment_desc: "Тактические бомбардировщики — более мелкие и быстрые машины, способные помогать наземным войскам и бомбить вражеские здания."
 jet_tac_bomber: "Реактивный тактический бомбардировщик"
 jet_tac_bomber_equipment: "Реактивный тактический бомбардировщик"
 jet_tac_bomber_equipment_desc: "Тактические бомбардировщики — более мелкие и быстрые машины, способные помогать наземным войскам и бомбить вражеские здания."
 heavy_fighter: "Тяжёлый истребитель"
 heavy_fighter_equipment_desc: "Тяжёлые истребители обладают большой дальностью и мощным вооружением. Они хороши как для сопровождения бомбардировщиков на дальних дистанциях, так и для перехвата вражеских бомбардировщиков. Однако их меньшая маневренность означает, что они будут проигрывать в бою обычным истребителям."
 strat_bomber: "Стратегический бомбардировщик"
 strat_bomber_equipment_desc: "Стратегические бомбардировщики атакуют вражеские здания и инфраструктуру, лишая их ценной промышленности."
 jet_strat_bomber: "Реактивный стратегический бомбардировщик"
 jet_strat_bomber_equipment: "Реактивный стратегический бомбардировщик"
 jet_strat_bomber_equipment_desc: "Стратегические бомбардировщики атакуют вражеские здания и инфраструктуру, лишая их ценной промышленности."
 transport_plane: "Транспортник"
 transport_plane_equipment_desc: "Доставляет парашютистов к месту назначения."
 guided_missile: "Ракета"
 fighter_equipment: "Истребитель"
 cv_fighter_equipment: "Палубный истребитель"
 cv_fighter_equipment_short: "Палубный истребитель"
 strat_bomber_equipment: "Стратегический бомбардировщик"
 rocket_interceptor_equipment: "Ракетный перехватчик"
 rocket_interceptor_equipment_desc: "Перехватчик ближнего радиуса действия, работающий на химическом ракетном двигателе."
 suicide_craft_equipment: "Самолёт-снаряд"
 suicide_craft_equipment_desc: "Пилотируемая бомба ближнего радиуса действия, работающая на химическом ракетном двигателе."
 fighter_equipment_0: "Межвоенный истребитель"
 fighter_equipment_0_short: "Истребитель"
 fighter_equipment_0_desc: "Хотя истребители претерпели множество изменений во время Мировой войны и после неё, бипланная конструкция становится устаревшей. Мы должны начать переводить гражданские технологические достижения в военные применения."
 early_fighter: "$fighter_equipment_0$"
 early_fighter_desc: "$fighter_equipment_0_desc$"
 fighter_equipment_1: "Истребитель I"
 fighter_equipment_1_short: "Истребитель I"
 fighter_equipment_1_desc: "Лёгкие планеры революционизированы с внедрением звёздообразных двигателей, монопланной конструкции и цельнометаллической обшивки. Эта конструкция — наша попытка создать первый современный истребитель."
 fighter1: "$fighter_equipment_1$"
 fighter1_desc: "$fighter_equipment_1_desc$"
 fighter_equipment_2: "Истребитель II"
 fighter_equipment_2_short: "Истребитель II"
 fighter_equipment_2_desc: "Темпы развития истребителей поразительны, поэтому мы должны продолжать внедрять новые технологии и улучшать существующие концепции. Наш новый истребитель должен обладать высокой скоростью, отличными характеристиками на высоте и максимальной дальностью полёта. Кроме того, он должен быть хорошо вооружён."
 fighter2: "$fighter_equipment_2$"
 fighter2_desc: "$fighter_equipment_2_desc$"
 fighter_equipment_3: "Истребитель III"
 fighter_equipment_3_short: "Истребитель III"
 fighter_equipment_3_desc: "Хотя предыдущие поколения истребителей зарекомендовали себя с лучшей стороны, любые преимущества от улучшенной конструкции должны быть использованы. Этот самолёт станет вершиной развития поршневых истребителей, обладая отличной мощностью, высокой маневренностью, смертоносным вооружением и хорошей дальностью."
 fighter3: "$fighter_equipment_3$"
 fighter3_desc: "$fighter_equipment_3_desc$"
 heavy_fighter_equipment: "Тяжёлый истребитель"
 heavy_fighter_equipment_1: "Тяжёлый истребитель I"
 heavy_fighter_equipment_1_short: "Тяжёлый истребитель I"
 heavy_fighter_equipment_1_desc: "Нашим бомбардировщикам требуется эскортная защита от вражеских истребителей на всём пути до цели и обратно. Чтобы обеспечить этот эскорт, мы должны разработать истребители с дальностью бомбардировщиков. Из необходимости эти самолёты крупнее, медленнее и менее маневренны, чем лёгкие истребители, но несут значительное вооружение."
 heavy_fighter1: "$heavy_fighter_equipment_1$"
 heavy_fighter1_desc: "$heavy_fighter_equipment_1_desc$"
 heavy_fighter_equipment_2: "Тяжёлый истребитель II"
 heavy_fighter_equipment_2_short: "Тяжёлый истребитель II"
 heavy_fighter_equipment_2_desc: "Война показала, что наш тяжёлый истребитель уязвим перед более маневренными машинами, но хорошо справляется с перехватом вражеских бомбардировщиков благодаря мощному вооружению. Следующая конструкция сосредоточится на повышенной способности атаковать вражеские самолёты и даже наземные цели. Его скорость и дальность также будут улучшены."
 heavy_fighter2: "$heavy_fighter_equipment_2$"
 heavy_fighter2_desc: "$heavy_fighter_equipment_2_desc$"
 heavy_fighter_equipment_3: "Тяжёлый истребитель III"
 heavy_fighter_equipment_3_short: "Тяжёлый истребитель III"
 heavy_fighter_equipment_3_desc: "Хотя наши тяжёлые истребители показали себя adept в различных ролях, мы должны рассмотреть новую конструкцию, которая улучшит их эффективность против вражеских истребителей, а также позволит продолжать перехватывать всё более быстрых и лучше защищённых вражеских бомбардировщиков."
 heavy_fighter3: "$heavy_fighter_equipment_3$"
 heavy_fighter3_desc: "$heavy_fighter_equipment_3_desc$"
 strat_bomber_equipment_1: "Стратегический бомбардировщик I"
 strat_bomber_equipment_1_short: "Страт. бомб. I"
 strat_bomber_equipment_1_desc: "Опыт Мировой войны и последующие исследования показывают, что бомбардировки военных целей и крупных городов противника выиграют следующую войну. По крайней мере, мы должны иметь бомбардировщик, способный нанести такое разрушение. Он должен летать высоко и на хорошей скорости, неся большую полезную нагрузку. Это потребует крупного планера с несколькими двигателями. Он также будет иметь некоторые защитные возможности."
 strategic_bomber1: "$strat_bomber_equipment_1$"
 strategic_bomber1_desc: "$strat_bomber_equipment_1_desc$"
 strat_bomber_equipment_2: "Стратегический бомбардировщик II"
 strat_bomber_equipment_2_short: "Страт. бомб. II"
 strat_bomber_equipment_2_desc: "Бомбардировки доказали свою эффективность в снижении способности врага вести войну. Больше защитного вооружения и повышенная скорость позволят новой конструкции избежать уничтожения, а увеличение полезной нагрузки и дальности сделает её более эффективной."
 strategic_bomber2: "$strat_bomber_equipment_2$"
 strategic_bomber2_desc: "$strat_bomber_equipment_2_desc$"
 strat_bomber_equipment_3: "Стратегический бомбардировщик III"
 strat_bomber_equipment_3_short: "Страт. бомб. III"
 strat_bomber_equipment_3_desc: "Чтобы избежать потерь от вражеских истребителей и зенитного огня, наша следующая конструкция будет летать на большой высоте. Она будет крупнее, чтобы нести как огромную полезную нагрузку, так и больше топлива для увеличения дальности."
 strategic_bomber3: "$strat_bomber_equipment_3$"
 strategic_bomber3_desc: "$strat_bomber_equipment_3_desc$"
 jet_strat_bomber_equipment_1: "Реактивный стратегический бомбардировщик I"
 jet_strat_bomber_equipment_1_short: "Реакт. страт. бомб. I"
 jet_strat_bomber_equipment_1_desc: "Несколько реактивных двигателей позволяют новым конструкциям достигать небывалой скорости при сохранении большой полезной нагрузки и дальности. Эти самолёты созданы для новой эпохи оружия массового поражения."
 jet_strategic_bomber1: "$jet_strat_bomber_equipment_1$"
 jet_strategic_bomber1_desc: "$jet_strat_bomber_equipment_1_desc$"
 tac_bomber_equipment: "Тактический бомбардировщик"
 tac_bomber_equipment_0: "Межвоенный бомбардировщик"
 tac_bomber_equipment_0_short: "Бомбардировщик"
 tac_bomber_equipment_0_desc: "Широко распространено мнение, что следующая война будет выиграна исключительно бомбардировками противника до полного уничтожения. Крайне важно, чтобы мы начали проектировать собственный бомбардировщик, способный нести тяжёлые полезности на достаточной скорости."
 early_bomber: "$tac_bomber_equipment_0$"
 early_bomber_desc: "$tac_bomber_equipment_0_desc$"
 tac_bomber_equipment_1: "Тактический бомбардировщик I"
 tac_bomber_equipment_1_short: "Такт. бомб. I"
 tac_bomber_equipment_1_desc: "Средние бомбардировщики должны быть универсальными и быстрыми, способными выполнять широкий спектр задач. Двухдвигательная конструкция, оставаясь относительно лёгкой, сможет оставаться полезной ещё долгие годы."
 tactical_bomber1: "$tac_bomber_equipment_1$"
 tactical_bomber1_desc: "$tac_bomber_equipment_1_desc$"
 tac_bomber_equipment_2: "Тактический бомбардировщик II"
 tac_bomber_equipment_2_short: "Такт. бомб. II"
 tac_bomber_equipment_2_desc: "Более тяжёлые конструкции тактических бомбардировщиков могут увеличить дальность, полезную нагрузку и скорость, сохраняя способность самолётов выполнять широкий спектр миссий."
 tactical_bomber2: "$tac_bomber_equipment_2$"
 tactical_bomber2_desc: "$tac_bomber_equipment_2_desc$"
 tac_bomber_equipment_3: "Тактический бомбардировщик III"
 tac_bomber_equipment_3_short: "Такт. бомб. III"
 tac_bomber_equipment_3_desc: "Используя достижения в области истребителей, нестандартные материалы и формы могут сделать новые конструкции одними из самых быстрых и производительных двухдвигательных самолётов, когда-либо созданных."
 tactical_bomber3: "$tac_bomber_equipment_3$"
 tactical_bomber3_desc: "$tac_bomber_equipment_3_desc$"
 transport_plane_equipment: "Транспортный самолёт"
 transport_plane_equipment_1: "Межвоенный транспортный самолёт"
 # transport_plane_equipment_1_short: "Транспорт I"
 transport_plane_equipment_1_desc: "Самолёты, используемые для переброски войск в парашютных операциях."
 transport_plane_equipment_2: "Улучшенный транспортный самолёт"
 # transport_plane_equipment_2_short: "Транспорт II"
 transport_plane_equipment_2_desc: "Самолёты, используемые для переброски войск в парашютных операциях."
 transport_plane_equipment_3: "Современный транспортный самолёт"
 # transport_plane_equipment_3_short: "Транспорт III"
 transport_plane_equipment_3_desc: "Самолёты, используемые для переброски войск в парашютных операциях."
 nav_bomber_equipment: "Морской бомбардировщик"
 cv_nav_bomber_equipment: "Палубный морской бомбардировщик"
 cv_nav_bomber_equipment_short: "Палубный морской бомбардировщик"
 nav_bomber_equipment_1: "Морской бомбардировщик I"
 nav_bomber_equipment_1_short: "Мор. бомб. I"
 nav_bomber_equipment_1_desc: "Морская авиация будет жизненно важна в ближайшее десятилетие для противодействия новым разработкам в военно-морской войне, таким как возросшая важность подлодок. Гидропланы, способные работать как пикирующие бомбардировщики и разведывательные машины, будут полезны."
 naval_bomber1: "$nav_bomber_equipment_1$"
 naval_bomber1_desc: "$nav_bomber_equipment_1_desc$"
 nav_bomber_equipment_2: "Морской бомбардировщик II"
 nav_bomber_equipment_2_short: "Мор. бомб. II"
 nav_bomber_equipment_2_desc: "Новые технологии двигателей и аэродинамически усовершенствованные конструкции значительно повысят скорость и возможности пикирующей атаки морских самолётов."
 naval_bomber2: "$nav_bomber_equipment_2$"
 naval_bomber2_desc: "$nav_bomber_equipment_2_desc$"
 nav_bomber_equipment_3: "Морской бомбардировщик III"
 nav_bomber_equipment_3_short: "Мор. бомб. III"
 nav_bomber_equipment_3_desc: "Цельнометаллические конструкции и мощные воздушные тормоза позволяют создавать более сложную морскую авиацию. Однако самолёты будущего потребуют более крупного экипажа для управления этими передовыми системами."
 naval_bomber3: "$nav_bomber_equipment_3$"
 naval_bomber3_desc: "$nav_bomber_equipment_3_desc$"
 CAS_equipment: "Штурмовик"
 cv_CAS_equipment: "Палубный штурмовик"
 cv_CAS_equipment_short: "Палубный штурмовик"
 CAS_equipment_1: "Штурмовик I"
 CAS_equipment_1_short: "Штурм. I"
 CAS_equipment_1_desc: "Наша доктрина непосредственной поддержки требует самолёта, способного точно атаковать наземные цели. Хотя эти машины несут меньшую полезную нагрузку по сравнению с нашими крупными тактическими бомбардировщиками, они способны атаковать и уничтожать мелкие цели посредством штурмового огня и пикирования."
 CAS1: "$CAS_equipment_1$"
 CAS1_desc: "$CAS_equipment_1_desc$"
 CAS_equipment_2: "Штурмовик II"
 CAS_equipment_2_short: "Штурм. II"
 CAS_equipment_2_desc: "Опыт начала войны показал, что повышенная скорость, бронирование и маневренность необходимы для выживаемости штурмовиков перед вражескими истребителями и зенитным огнём. Это новое поколение штурмовой авиации также будет использовать более крупные бомбы, пушки и пулемёты для нанесения большего урона целям."
 CAS2: "$CAS_equipment_2$"
 CAS2_desc: "$CAS_equipment_2_desc$"
 CAS_equipment_3: "Штурмовик III"
 CAS_equipment_3_short: "Штурм. III"
 CAS_equipment_3_desc: "Постоянно растущие возможности целевой ПВО и вражеских перехватчиков требуют дальнейшей эволюции наших штурмовиков. Новая конструкция включает повышенную мощность двигателей, улучшения планера для увеличения возможностей пикирования и защиты, а также ещё большую полезную нагрузку."
 CAS3: "$CAS_equipment_3$"
 CAS3_desc: "$CAS_equipment_3_desc$"
 jet_fighter_equipment_1: "Реактивный истребитель I"
 jet_fighter_equipment_1_short: "Реакт. истреб. I"
 jet_fighter_equipment_1_desc: "Предыдущие увеличения скорости бледнеют по сравнению с появлением первых реактивных истребителей. Хотя мы ещё не научились оптимально проектировать самолёты для этих двигателей, обычные истребители не могут конкурировать с ними."
 jet_fighter1: "$jet_fighter_equipment_1$"
 jet_fighter1_desc: "$jet_fighter_equipment_1_desc$"
 jet_fighter_equipment_2: "Реактивный истребитель II"
 jet_fighter_equipment_2_short: "Реакт. истреб. II"
 jet_fighter_equipment_2_desc: "Новые конструкции со стреловидными крыльями и более лёгкие материалы позволят нам ещё дальше увеличить дальность и скорость революционных реактивных истребителей."
 jet_fighter2: "$jet_fighter_equipment_2$"
 jet_fighter2_desc: "$jet_fighter_equipment_2_desc$"
 jet_tac_bomber_equipment_1: "Реактивный тактический бомбардировщик I"
 jet_tac_bomber_equipment_1_short: "Реакт. такт. бомб. I"
 jet_tac_bomber_equipment_1_desc: "Появление реактивных истребителей требует бомбардировщиков, способных обгонять их или хотя бы соответствовать их скорости. Средние бомбардировщики первого поколения и бомбардировщики-истребители, оснащённые реактивными двигателями, заполнят эту нишу."
 jet_tactical_bomber1: "$jet_tac_bomber_equipment_1$"
 jet_tactical_bomber1_desc: "$jet_tac_bomber_equipment_1_desc$"
 jet_tac_bomber_equipment_2: "Реактивный тактический бомбардировщик II"
 jet_tac_bomber_equipment_2_short: "Реакт. такт. бомб. II"
 jet_tac_bomber_equipment_2_desc: "Не довольствуясь только скоростью, будущие реактивные бомбардировщики установят рекорды по высоте и дальности, доставляя полезную нагрузку и проводя разведку на межконтинентальных миссиях."
