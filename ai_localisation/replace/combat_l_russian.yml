#changed to British spelling
 BM_DECRYPTION_DESC: "Подразделения с преимуществом в дешифровании наносят увеличенный урон и имеют повышенную обороноспособность."
 BM_FORT_MODIFIER_DESC: "Укрепления снижают потери защитников и помогают в обороне. Для штурма сильно укреплённых провинций используйте сверхтяжёлые танки или инженеров. Атака с нескольких направлений снижает эффективность укреплений."
 BM_ENEMY_AIR_SUPERIORITY_DESC: "Трудно организовать эффективную оборону, когда противник господствует в воздухе."
 BM_ENEMY_AIR_SUPERIORITY_COUNTER_DESC: "Наличие зенитных батальонов в ваших дивизиях помогает противостоять штрафу к обороне/прорыву от господства противника в воздухе, а также сбивать самолёты, атакующие напрямую."
