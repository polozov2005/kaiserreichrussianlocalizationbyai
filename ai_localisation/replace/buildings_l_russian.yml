########################################################
### KEEP THESE IN THE SAME ORDER AS THE VANILLA FILE ###
########################################################

 landmark_statue_of_liberty: "Статуя Свободы"
 landmark_statue_of_liberty_plural: "$landmark_statue_of_liberty$"
 landmark_statue_of_liberty_desc: "§LВеличественная Статуя Свободы гордо возвышается в нью-йоркской гавани — главном пункте въезда в Соединённые Штаты для иммигрантов, стремящихся начать новую жизнь. С тех пор она стала воплощением американского идеала жизни, свободы и стремления к счастью.§!"

 landmark_big_ben: "Вестминстерский дворец"
 landmark_big_ben_plural: "$landmark_big_ben$"
 landmark_big_ben_desc: "§LВестминстерский дворец стоит на северном берегу Темзы в Лондоне. Первоначально построенный в XI веке и многократно перестраивавшийся в последующие столетия, он веками служил резиденцией британского парламента и центром государственного управления при монархии. С установлением республиканского правительства в 1925 году дворец был адаптирован под музей и общественные функции, сочетая сохранение исторической архитектуры с современными административными и выставочными задачами.§!"

 landmark_colosseum: "Колизей"
 landmark_colosseum_plural: "$landmark_colosseum$"
 landmark_colosseum_desc: "§LКолизей расположен в центре Рима. Это крупнейший древний амфитеатр из когда-либо построенных, использовавшийся римлянами, а затем и жителями города после падения Рима, для развлечений с момента его завершения императором Титом.§!"

 landmark_cristo_redentor: "Христос-Искупитель"
 landmark_cristo_redentor_plural: "$landmark_cristo_redentor$"
 landmark_cristo_redentor_desc: "§LСтатуя Христа-Искупителя возвышается над Рио-де-Жанейро; её строительство было завершено в 1931 году. Это национальный символ Бразилии, имеющий огромное значение для католиков региона.§!"

 landmark_eiffel_tower: "Эйфелева башня"
 landmark_eiffel_tower_plural: "$landmark_eiffel_tower$"
 landmark_eiffel_tower_desc: "§LЭйфелева башня названа в честь своего создателя Гюстава Эйфеля и была завершена в 1889 году. Расположенная на Марсовом поле в Париже, «Железная леди» стала всемирным культурным символом Франции и олицетворением национальной гордости.§!"

 landmark_kremlin: "Московский Кремль"
 landmark_kremlin_plural: "$landmark_kremlin$"
 landmark_kremlin_desc: "§LМосковский Кремль — укреплённый комплекс. В его пределах находится Большой Кремлёвский дворец, бывшая императорская резиденция российского императора и нынешнее место заседаний российского парламента. Кремль возвышается над Москвой-рекой на юге, Собором Василия Блаженного и Красной площадью на востоке и Александровским садом на западе.§!"

 landmark_berlin_reichstag: "Рейхстаг"
 landmark_berlin_reichstag_plural: "$landmark_berlin_reichstag$"
 landmark_berlin_reichstag_desc: "§LПленарная зона здания Рейхстага, также известная как Рейхстаг, — историческое законодательное здание на Кёнигсплац в Берлине. Это символическое сооружение, имеющее огромное значение в сердцах и умах народа.§!"

 landmark_hofburg_palace: "Хофбург"
 landmark_hofburg_palace_plural: "$landmark_hofburg_palace$"
 landmark_hofburg_palace_desc: "§LХофбург — главная императорская резиденция династии Габсбургов, обращённая к площади Героев, Народному саду, а за ними — к зданию парламента и Венской ратуше. Окружённый множеством парков, он является сердцем Габсбургской монархии.§!"

 landmark_sadabad_complex: "Комплекс Саадабад"
 landmark_sadabad_complex_plural: "$landmark_sadabad_complex$"
 landmark_sadabad_complex_desc: "§LПостроенный династией Каджаров, комплекс Саадабад на севере Тегерана служит королевской резиденцией и центром власти. Его дворцы и сады отражают изменчивый политический ландшафт Персии — от консерватизма до модернизма.§!"

 landmark_taj_mahal: "Тадж-Махал"
 landmark_taj_mahal_plural: "$landmark_taj_mahal$"
 landmark_taj_mahal_desc: "§LТадж-Махал — шедевр архитектуры Великих Моголов. Его величественные купола из белого мрамора и изысканные сады делают его одним из самых узнаваемых символов Индии, свидетельством как имперского могущества, так и непреходящего наследия.§!"

 landmark_hagia_sophia: "Собор Святой Софии"
 landmark_hagia_sophia_plural: "$landmark_hagia_sophia$"
 landmark_hagia_sophia_desc: "§LРасположенная на перекрёстке империй, Святая София была византийским собором, османской мечетью и символом меняющихся правителей Константинополя. Её массивный купол и грандиозные залы отражают как духовное значение, так и амбиции тех, кто провозглашал город своей столицей.§!"

 landmark_nanjing_presidential_palace: "Президентский дворец в Нанкине"
 landmark_nanjing_presidential_palace_plural: "$landmark_nanjing_presidential_palace$"
 landmark_nanjing_presidential_palace_desc: "§LПрезидентский дворец в Нанкине — исторический комплекс, давно связанный с китайским государственным управлением. После падения династии Цин он ненадолго стал национальной резиденцией правительства, но политическая власть переместилась в Пекин, и дворец впоследствии продолжил служить офисом провинциального губернатора.§!"

 landmark_forbidden_city: "Запретный город"
 landmark_forbidden_city_plural: "$landmark_forbidden_city$"
 landmark_forbidden_city_desc: "§LКак историческая резиденция императорской власти, Запретный город в Пекине находился в центре китайского управления со времён династии Мин. После полутора десятилетий республиканского управления император Цин возобновил проживание в нём в 1927 году.§!"

 landmark_great_wall_section: "Великая Китайская стена"
 landmark_great_wall_section_plural: "$landmark_great_wall_section$"
 landmark_great_wall_section_desc: "§LВеликая Китайская стена, строившаяся на протяжении сотен лет и десятков правлений, — логистический шедевр. Сегодня можно сказать, что она олицетворяет великое мужество и стойкость китайского народа перед лицом невзгод.§!"

 landmark_tokyo_imperial_palace: "Императорский дворец"
 landmark_tokyo_imperial_palace_plural: "$landmark_tokyo_imperial_palace$"
 landmark_tokyo_imperial_palace_desc: "§LТокийский Императорский дворец — главная резиденция императора с момента Реставрации Мэйдзи и свержения последнего сёгуната. Это символ гордости и почтения для японского народа, вдохновляющий его на усердный труд.§!"

 landmark_national_diet: "Здание Национального собрания"
 landmark_national_diet_plural: "$landmark_national_diet$"
 landmark_national_diet_desc: "§LКоккай-гидзидо — здание, где заседают обе палаты Национального собрания Японии. Завершённое в начале 1936 года, оно построено почти полностью из японских материалов с небольшими исключениями. Его предшественник был уничтожен в 1925 году, когда пожар опустошил этот район. Хотя здание собрания не раз разрушалось, на этот раз оно простоит века!§!"

 landmark_hakko_ichiu: "Монумент «Хакко Итиу»"
 landmark_hakko_ichiu_plural: "$landmark_hakko_ichiu$"
 landmark_hakko_ichiu_desc: "§LБашня «Хакко Итиу» была воздвигнута в честь 2600-летия основания Японии и как памятник, символизирующий японскую судьбу — объединение восьми углов мира под одной крышей.§!"

