 marine_desc: "Подразделения, специализирующиеся на амфибийных операциях, становятся всё более незаменимыми. Импровизированные методы и снаряжение уходят в прошлое, поскольку наша морская пехота поддерживается специализированными десантными средствами и подготовкой."
 mountaineers_desc: "Бои в горных районах подвергают войска множеству опасностей, но иногда их невозможно избежать. Обеспечив наших солдат специализированной подготовкой для этой среды, мы можем минимизировать эти риски."
 armored_car_recon: "Лёгкая бронеавтомобильная разведывательная рота"
