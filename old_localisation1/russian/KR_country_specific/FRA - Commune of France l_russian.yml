 FRA_pierre_jules_cot: "Пьер Жюль Кот"

 FRA_maurice_gamelin: "Морис Гамелен" 
 FRA_maurice_gamelin_leader_desc: "Генерал Морис Гамелин сверг якобинский режим Марселя Деа. Хотя его переворот является очевидным оскорблением уже сомнительного демократичности процессов в Коммуне, многие теперь рассматривают Гамелина как спасителя Коммуны и даже самого синдикализма."
