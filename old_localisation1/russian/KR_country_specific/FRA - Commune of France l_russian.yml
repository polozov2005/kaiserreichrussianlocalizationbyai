 FRA_marcel_gensoul: "Марсель Жансуль"
 FRA_marcel_gensoul_admiral_desc: "§YОписание адмирала\nРодился:§! §g12 Октября 1880, Монпелье, Эро, Третья Французская Республика"
 
 FRA_emile_muselier: "Эмиль Мюзелье"
 FRA_emile_muselier_navy_chief_desc: "§YРодился:§! §L17 апреля 1882 года, Марсель, Буш-дю-Рон, Французская Республика.§!\n§YФлотская карьера:§! §LЭмиль Мюзелье, один из первых старших офицеров, присоединившихся к революционному правительству, до Первой мировой войны большую часть своей карьеры провел на Дальнем Востоке и в Средиземноморье. В 1915 году он командовал подразделением морских пехотинцев на реке Изер в Бельгии, а позже стал президентом морского отдела Министерства изобретений. Его первым настоящим командиром стал авианосец «Скарп» в апреле 1918 года. Когда моряки «Скарпа» подняли мятеж, Мюзелье перешел в новый Федеральный флот. Его карьера процветала, и в конце концов он дослужился до звания вице-адмирала.§!"

 FRA_charles_platon: "Charles Platon"
