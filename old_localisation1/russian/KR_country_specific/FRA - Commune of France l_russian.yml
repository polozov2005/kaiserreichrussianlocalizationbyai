 FRA_aubert_frere: "Обер Фрер"
 FRA_aubert_frere_commander_desc: "§YОписание генерала\nРодился:§! §g21 Августа, 1881, Гревийе, Па-де-Кале, Третья Французская Республика§!\n§YВоенная карьера:§! §gРодившись шестым в семье с одиннадцатью детьми, он получил христианское образование прежде, чем поступить в военную школу в возрасте 19 лет. Большая часть его ранней карьеры прошла в Марокко, пока он не вернулся во Францию в 1912-ом. Его первым боевым крещением во время Вельткрига стала битва при Шарлеруа. Его повысили до командира батальона, после чего он сражался под Верденом и Соммой. Далее, его повысили до командира альпийского батальона. За всю войну он получили три ранения и восемь наград."

 FRA_henri_frenay: "Анри Френе"
 FRA_henri_frenay_commander_desc: "§YОписание генерала\nРодился:§! §g11 Ноября 1905, Лион, Рон, Третья Французская Республика"

 FRA_louis_buisson: "Луи Бюиссон"
 FRA_louis_buisson_commander_desc: "§YОписание генерала\nРодился:§! §g14 Декабря 1889, Ле Бурже-дю-Лак, Савойя, Третья Французская Республика"

 FRA_francois_darlan: "Франсуа Дарлан"
 FRA_francois_darlan_admiral_desc: "§YОписание адмирала\nРодился:§! §g7 Августа 1881 года, Нерак, Ло и Гаронна, Третья Французская Республика\n§YФлотская карьера:§L\nЖан Луи Ксавье Франсуа Дарлан родился в семье, давно связанной с военно-морским флотом. В 1902 году он окончил Военно-морскую школу, а во время Вельткрига служил в артиллерийской батарее в битве при Вердене. Оказавшись в хаосе революции и отвергнутый своим патриотизмом и умеренными левыми убеждениями, Дарлан возвращается в военно-морской флот Коммуны и в течение следующих нескольких лет быстро поднимается по служебной лестнице. Сейчас он один из самых уважаемых людей во французском флоте и гордится институтом, который он помог восстановить."

 FRA_raoul_castex: "Рауль Кастекс"
 FRA_raoul_castex_admiral_desc: "§YОписание адмирала\nРодился:§! §g27 Октября 1878, Сент-Омер, Па-де-Кале, Третья Французская Республика"

