### Ideas ###
FRA_communard_spirit: "Дух Коммунара"
FRA_communard_spirit_desc: "Мы - наследие Парижской коммуны, первого социалистического государства, когда-либо созданного, а затем жестоко подавленного республиканскими реакционерами. В 1920 году рабочие наконец отомстили и свергли военную хунту "Партии порядка". Мы, сыновья и дочери коммунаров, должны защищать наше государство и наш дух, нами больше не будут командовать тираны!"
 
 FRA_revanchist_rearmament: "Реваншистские настроения"
 FRA_revanchist_rearmament_desc: "Наша нация должна воспрять, если мы хотим победить империализм!"

 FRA_renseignements_generaux_lar: "Renseignements Généraux"
 FRA_renseignements_generaux_lar_desc: "Управление Общей Разведки служит глазами и глазами Коммуны, собирая информацию о внутренних и международных угрозах нашему строю.Но миссия УОР выходит за рамки простой безопасности. Они также несут ответственность за продвижение ценностей и принципов нашей социалистической революции как внутри страны, так и за рубежом. Благодаря сбору и анализу разведывательной информации они помогают формировать нашу внешнюю политику и первыми участвуют в наших усилиях по разрушению глобальных цепей капитала..\n\nПоскольку на каждом заводе, все еще принадлежащем буржуазии, есть сторонники, наши сети не имеют себе равных."

 FRA_working_women_idea: "Женщины-рабочие"
 FRA_working_women_idea_desc: "Реакционные мыслители слишком долго подавляли женщин. Даже во времена Французской республики они самоотверженно поддерживали нацию, в то время как наших братьев отправляли на бойню. Пришло время признать их вклад в развитие общества и официально закрепить права работающей женщины, как в мирное, так и в военное время."

 FRA_bhartiya_support: "Французская военная поддержка"
 FRA_bhartiya_support_desc: "Мы получаем военную поддержку от наших французских союзников. Эта бескорыстная помощь будет иметь решающее значение для победы над реакционной княжеской федерацией и империалистическим доминионом Индии. Со временем мы надеемся отплатить Франции за их помощь, но сейчас мы должны сосредоточиться на текущей задаче."

 FRA_peaceful_revolution_idea: "Мирная революция"
 FRA_peaceful_revolution_idea_desc: "Международная социалистическая революция грядет, но она будет цивилизованной. Теперь, когда основные реакционные державы Европы окончательно разгромлены, а их рабочие освобождены, мы стремимся стимулировать дальнейшие восстания, просто доказывая всему миру превосходство синдикализма."

 FRA_revolutionary_spirit: "Революционный дух"
 FRA_revolutionary_spirit_desc: "Выживание и процветание социалистического мира будет обеспечено только тогда, когда будет уничтожен последний бастион реакции. Мы должны быть готовы мобилизоваться и сокрушить все реакционные правительства по всему миру. Однажды Интернационал охватит все моря и континенты!"

 FRA_socialist_education_idea: "Социалистическое образование"
 FRA_socialist_education_idea_desc: "Образование молодежи - одна из важнейших задач, стоящих перед такой страной, как коммуна. К счастью, старая система образования Республики уже была революционной для своего времени, что дало нам хорошую основу. Социалистическая система образования, будет ориентированная на науку и искусство."

 FRA_international_avant_garde_idea: "Авангардизм и Интернационал"
 FRA_international_avant_garde_idea_desc: "Единый стиль социалистического искусства, от живописи до музыки, может стать мощным инструментом, который поможет массам в несиндикалистском мире заинтересоваться нашими идеалами - с помощью развлечений."

