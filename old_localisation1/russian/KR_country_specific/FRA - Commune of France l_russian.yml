 phalanstere_research_desc: "Во время встречи Интернационала было принято решение о создании всемирного плана по объединению технологических достижений синдикалистских стран. С тех пор этот план превратился в более амбициозный план 'Всемирный Фаланстер', направленный на помощь социалистического режимам по всему миру."
 
