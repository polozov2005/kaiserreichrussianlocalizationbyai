### Focuses ###
 commune_of_france_focus: "Фокусы Французской Коммуны"
 
 FRA_office_des_chemins_de_fer: "Office des Chemins de Fer"
 FRA_office_des_chemins_de_fer_desc: "Заседание Конгресса, посвященное состоянию инфраструктуры Франции показало дезорганизацию нашей железнодорожной системы и то, насколько отсталой она стала. Конгресс согласился с необходимостью создания нового управления, специально занимающегося развитием и обслуживанием наших железных дорог, которые соединят все части Франции воедино."

 FRA_voluntary_association: "Добровольные ассоциации"
 FRA_voluntary_association_desc: "Лучшая экономическая политика - это не та, которая диктуется сверху, а та, которая естественным образом возникает снизу, от пролетариата, от трудящихся. Мы отвергаем этатизм и вместо этого еще больше поддерживаем децентрализацию и раскрепощение французской экономики: мы добьемся успеха не за счет попыток загнать массы в угол, а за счет того, что позволим людям, освобожденным Матерью-Анархией, вступить в новую эру процветания."

 FRA_socialist_education: "Социалистическое образование"
 FRA_socialist_education_desc: "Мы должны признать, что образование при Третьей Республике было превосходным. Благодаря образованию она завоевала умы французов и посеяла семена меритократии. Однако этому препятствовали буржуазные предрассудки, и оно не делало достаточно для развития талантов из более скромных семей. Образование в эпоху революции не повторяет прежних ошибок: самые способные поднимутся и будут служить народу."

 FRA_support_workers_initiatives: "Поддержка инициатив рабочих"
 FRA_support_workers_initiatives_desc: "Нельзя недооценивать изобретательность и здравый смысл масс, наиболее тесно связанных с производством. Мы должны приложить особые усилия, чтобы помочь инициативам, исходящим из экономической базы, не просто стать реальностью, но и процветать. Это, без сомнения, не только позволит людям, участвующим в этих проектах, еще усерднее отдаваться своей работе и видеть, что их усилия вознаграждаются, но и будет иметь большой пропагандистский успех как внутри страны, так и за рубежом."

 FRA_consumer_cooperatives: "Потребительские кооперативы"
 FRA_consumer_cooperatives_desc: "Экономист Шарль Жид еще до войны создал сеть кооперативных магазинов, связанных со старым СФИО. Он надеялся создать "Кооперативную Республику" с помощью альтернативной экономики, свободной от капитализма и чрезмерных прибылей. После революции потребительские кооперативы получили повсеместное распространение, работая рука об руку с производственными кооперативами, чтобы обеспечить рабочих всеми видами товаров по справедливым ценам, расширяя масштабы обмена."

 FRA_garden_city_movement: "Движение "Город-Сад""
 FRA_garden_city_movement_desc: "Лучшая среда обитания означает более здорового и продуктивного работника. Чтобы приспособиться к миграции из сельской местности в город и поддержать развитие нашего промышленного потенциала, были одобрены крупномасштабные проекты по созданию микрорайонов на окраинах городов или в снесенных трущобах. Построенные в соответствии с идеалами движения "город-сад", они включают в себя семейные дома и жилье средней плотности застройки, общие услуги и удобства, а также большие зеленые насаждения."

 FRA_close_bureaucratic_loopholes: "Прикрыть бюрократические лазейки"
 FRA_close_bureaucratic_loopholes_desc: "Одна из постоянных критик революционного государства звучит особенно убедительно: экономическая демократия - это сложный бизнес, ведущий к невыносимой неэффективности. Мы должны работать над тем, чтобы сделать экономику более эффективной, не ставя под угрозу ее совещательные и руководимые работниками качества, и самое очевидное, с чего следует начать, - это пересмотреть нашу бюрократию и сократить чрезмерные процессы, которые приводят как к медлительности, так и к коррупции."

 FRA_modernisation_and_cartelisation: "Модернизация и картелизация"
 FRA_modernisation_and_cartelisation_desc: "Социализм - это, прежде всего, торжество экономической эффективности над капиталистической бессмыслицей. Революция уже привела к значительной рационализации экономики, промышленные федерации работают с федеральным правительством над оптимизацией производства. Однако этот процесс можно продвинуть дальше, поощряя создание специализированных промышленных ансамблей, гармонично работающих вместе, как винтики в большой машине."

 FRA_embrace_chain_production: "Управление производственными цепочками"
 FRA_embrace_chain_production_desc: "Французская промышленность на рубеже революции была разделенной. Хотя там уже существовал многочисленный пролетарский класс, многие рабочие все еще были близки к своим предкам-ремесленникам, а поточное производство и научное управление были нормой лишь в нескольких избранных отраслях. Хотя иногда это может быть непопулярно среди некоторых работников, мы должны продолжать убеждать профсоюзы принять этот важный шаг в модернизации производства."

 FRA_mass_application_of_pre_stressed_concrete: "Массовое применение преднапряженного бетона"
 FRA_mass_application_of_pre_stressed_concrete_desc: "Предварительно напряженный бетон, разработанный инженером Эженом Фрейссине, является новым шагом в современном строительстве. Было обнаружено, что бетон, любимый материал индустриальной эпохи, имеет проблемы с долговечностью и деформацией со временем и износом. Этот метод помогает снизить эти риски, особенно для конструкций, подверженных интенсивному использованию или давлению. Начнется строительство новых, более долговечных зданий, и будет запущена кампания по укреплению объектов, находящихся в зоне риска."

 FRA_develop_the_rhone_valley: "Развитие долины Роны"
 FRA_develop_the_rhone_valley_desc: "Рона, линия жизни на юго-востоке, зажатая между Центральным горным массивом и Альпами, исторически была капризной. Являясь торговой артерией между Севером и Югом, она также известна своей подверженностью наводнениям, что серьезно затрудняет развитие на ее берегах. Это было, конечно, до того, как человек приручил природу с помощью труда и технологий, а теперь мы можем направить течение реки в русло, что принесет пользу нашему промышленному развитию."

 FRA_exploit_the_massif_central: "Разработка Центрального Массива"
 FRA_exploit_the_massif_central_desc: "Экономическое и инфраструктурное развитие регионов Альп и Центрального горного массива позволяет активнее использовать имеющиеся там минеральные ресурсы. Наши старатели открыли новые месторождения полезных ископаемых, и теперь мы готовы начать их разработку в промышленных масштабах!"

 FRA_voice_of_the_people: "Глас народа"
 FRA_voice_of_the_people_desc: "Франция, бьющееся сердце Революции, должна иметь возможность достучаться до трудящихся повсюду, особенно до тех, кто все еще страдает под гнетом капитала. От Парижа до всего мира мы будем транслировать радиопрограммы на всех основных языках и дадим нашим товарищам понять, что они не одиноки. Однако это не может быть просто пропагандистской передачей: мы обеспечим наряду с новостями и социалистическими сообщениями более широкое просвещение, развлечения и хорошую музыку."

 FRA_point_du_jour_studios: "Point du Jour Studios"
 FRA_point_du_jour_studios_desc: "Седьмое искусство, несомненно, является средством массовой информации этого столетия, революцией в сфере развлечений и передачи идей. Родившись во Франции, мы должны признать, что Голливуд и Бабельсберг обогнали родину кинематографа по производственным мощностям, поставляя миру контрреволюционный материал. Мы будем поддерживать расширение производственных мощностей в парижском пригороде Бийанкур, студии Point du Jour (Sunrise) и финансировать кинематографистов-новаторов."

 FRA_build_the_autoroutes: "Строительство автомагистралей"
 FRA_build_the_autoroutes_desc: "Инженер и урбанист Анри Прост разработал план строительства автомагистралей по всему парижскому региону, чтобы соединить отдаленные пригороды. Эта идея получила широкую поддержку, и ВБТ решила финансировать новые проекты по расширению автомобильных дорог через Федерацию. Коммуны Марсель и Лион также попросили его составить планы автомобильных дорог для своих городов."

 FRA_militarisation_of_the_proletariat: "Милитаризация пролетариата"
 FRA_militarisation_of_the_proletariat_desc: "Мы не можем забывать этого: мы, рабочие, находимся в состоянии войны, мы всегда были в состоянии войны, мы всегда будем в состоянии войны. Производство - это неустанная борьба, непрекращающаяся война против ползучей реакции, против выродившейся буржуазии и всех, кто осмеливается противостоять Истории. Производители Франции должны быть на высоте положения, принять свою судьбу и работать усерднее, чем когда-либо, чтобы создать инструменты глобального освобождения."

 FRA_second_wave_of_mechanisation: "Вторая волна механизации"
 FRA_second_wave_of_mechanisation_desc: "Франция является оплотом сельского хозяйства, наша земля всегда была щедра на урожай. Однако, несмотря на наши усилия, сегодняшний урожай не слишком отличается от урожая дореволюционной, а в некоторых случаях и столетней давности. Это по-прежнему в значительной степени ручной и трудоемкий процесс, а механизация продвигается медленно. Для дальнейшей модернизации нашей экономики мы должны помочь нашим фермерам освоить новые инструменты их торговли."

 FRA_large_scale_rural_projects: "Крупномасштабные преобразования в деревне"
 FRA_large_scale_rural_projects_desc: "Мы - нация мелких землевладельцев, и когда началась революция, у нас было мало крупных поместий, которые можно было захватить, и мало фермеров-арендаторов. Это означает, что за последние десятилетия жизнь в сельской местности практически не изменилась. За некоторыми, однако, заметными исключениями: повсеместным распространением сельскохозяйственных кооперативов и экспериментами по добровольной коллективизации. Это необходимый путь экономического развития сельских районов, и мы будем поощрять их работу."

 FRA_communal_waterworks: "Коммунальное водоснабжение"
 FRA_communal_waterworks_desc: "На данный момент было бы немыслимо просить наш класс крестьян разделить их земельные участки, которые являются для них предметом большой гордости. Однако есть много аспектов сельского хозяйства, которые можно и нужно объединить, чтобы сделать их более эффективными, а наше сельское хозяйство в конечном итоге еще более продуктивным: гидротехнические сооружения - один из них. Поощрение общин к координации таких проектов позволит посеять семена дальнейшей модернизации сельской экономики."

 FRA_ploughshares_into_swords: "Перековка орал на мечи"
 FRA_ploughshares_into_swords_desc: "Сельский мир должен помочь разделить бремя великой промышленной войны, внести свой вклад в защиту революции. Децентрализованное производство, особенно товаров, требующих более кустарного подхода при их создании или сборке, сможет найти там свое пристанище. После сбора урожая крестьянин и ремесленник помогут своему товарищу солдату приобрести товары самого высокого качества, гордые потомки мастерства предков."

 FRA_new_hydroelectric_dams: "Новые гидроэлектродамбы"
 FRA_new_hydroelectric_dams_desc: "В наших горных районах в Альпах и Центральном массиве много полноводных рек, что создает идеальные условия для создания экологически чистых и долговечных источников энергии и помогает оживить отсталые сельские горные районы Франции."

 FRA_syndical_consolidation: "Консолидация синдикатов"
 FRA_syndical_consolidation_desc: "По мере приближения следующего шага в великом революционном конфликте мы должны призвать профсоюзные федерации отказаться от любого соперничества, всех межличностных конфликтов, любого корпоративизма и придерживаться производственной дисциплины. Время дебатов прошло, настало время вернуться к их истокам как инструментов классовой борьбы: есть только один рабочий класс, пусть будет единая воля синдиката."

 FRA_embrace_planism: "Принять планизм"
 FRA_embrace_planism_desc: "Научное управление экономикой - это будущее, мы не успокоимся, пока экономические силы нации не будут в полной гармонии с государством, работая над победой над врагами трудящихся. Мы не можем позволить себе отвлекаться на какие-то мелкие заботы, у нас должна быть только одна цель: выживание и триумф революции, и поэтому мы должны следовать единой линии, единой воле, единому великому плану."

 FRA_expand_manufacture_darmes_de_tulle: "Расширить производство в Тюле"
 FRA_expand_manufacture_darmes_de_tulle_desc: "В Тюле, в департаменте Лимузен, находится один из старейших и крупнейших заводов по производству оружия во Франции, где тысячи работников в основном занимаются производством стрелкового оружия. По мере того, как наша программа перевооружения набирает обороты, было принято решение о дальнейшем расширении "Ману", как прозвали его местные жители. Действительно, в отличие от других заводов, расположенных в традиционных промышленных зонах, особенно на Севере, этот находится далеко от досягаемости врага."

 FRA_directorate_for_arms_production: "Комитет военной промышленности"
 FRA_directorate_for_arms_production_desc: "Если мы хотим одержать победу в гонке вооружений против реакционных держав, мы не можем допустить, чтобы какие-либо отвлекающие факторы препятствовали нашим усилиям по обеспечению готовности к войне. Будет создан федеральный исполнительный комитет, состоящий из чиновников, экспертов, законодателей, профсоюзных лидеров, который будет использовать всю мощь пролетарского государства, чтобы взять под прямой контроль нашу оборонную промышленность, обеспечив ее идеальное соответствие нашим потребностям и устремлениям."

 FRA_maximise_production_capacity: "Максимально увеличить производственные мощности"
 FRA_maximise_production_capacity_desc: "Мы начинаем с недостатка населения и промышленной базы в борьбе с реакционными державами. Хотя мы будем стараться изо всех сил, чтобы наверстать упущенное, мы должны делать все, что в наших силах, используя то, что у нас есть. Наши свободные работники более продуктивны и квалифицированны, чем те, кто отчаянно ожидает своего освобождения. Если нам придется работать вдвое усерднее, мы это сделаем. Одно большое усилие - это все, что нам нужно, и наши товарищи более чем готовы приложить все усилия ради всех нас."

 FRA_the_working_mans_automobile: "Автомобиль для рабочих"
 FRA_the_working_mans_automobile_desc: "Социализм означает удовлетворение потребностей и желаний рабочих. Многие из наших товарищей задумываются о возможностях, которые открывает обладание собственным автомобилем, не связанным проложенными дорогами и маршрутами. Общественный транспорт никогда не будет заменен, но эта мечта должна стать достижимой для всех трудолюбивых французов. И поэтому мы обратимся к профсоюзам автомобильной промышленности с просьбой разработать новые модели, долговечные, но простые и дешевые, легко ремонтируемые."

 FRA_new_tractor_factories: "Новые тракторные заводы"
 FRA_new_tractor_factories_desc: "В связи с усилиями по механизации возникла новая потребность в большом количестве механического сельскохозяйственного оборудования, прежде всего в тракторах, которые являются основой этого оборудования. У каждого кооператива уже есть свой, но если мы хотим полностью отказаться от косы, у каждого крестьянина должен быть свой личный трактор . Чтобы избежать дальнейшей нагрузки на наши существующие заводы автомобильной промышленности, мы будем руководить созданием специализированных заводов."

 FRA_viticulture_of_the_twentieth_century: "Виноградарство двадцатого века"
 FRA_viticulture_of_the_twentieth_century_desc: "Вино - краеугольный камень французской общительности, и любой повод подходит для того, чтобы открыть хорошую бутылку. Красные вина Бордо или Бургундии, белые вина Лотарингии - у всех них есть поклонники здесь и за границей. Сбор урожая по-прежнему в основном производится вручную, и весь процесс по-прежнему носит скорее кустарный характер: хотя некоторые детали, придающие нектару его утонченный вкус, слишком важны для модернизации, мы можем помочь производству вина в этом столетии с помощью модернизированного оборудования."

 FRA_expand_the_textile_industry: "Расширение текстильной промышленности"
 FRA_expand_the_textile_industry_desc: "С первых дней промышленной революции текстильная промышленность всегда была на переднем крае экономического прогресса. В настоящее время синтетические волокна, новые машины и технологии сделали возможным массовое производство текстиля и одежды с меньшими затратами труда. Париж уже является столицей моды, скоро мы также станем родиной доступного и долговечного текстиля: наши работницы будут одеты лучше, чем все дамы Берлина."

 FRA_road_to_war: "Дорога к войне"
 FRA_road_to_war_desc: "Война с Германией неизбежна, она не только держит в заложниках наших братьев в Эльзасе и Лотарингии, но и со своими многочисленными марионетками из Рейхспакта выступает в качестве главной контрреволюционной силы в Европе, если не во всем мире, тирана, властвующего над сотнями миллионов. Этому придет конец, мы отомстим за них всех и освободим наших товарищей. Мировая война не должна была стать последней, за ней должна последовать война за независимость."

 FRA_renseignements_generaux: "Renseignements Généraux"
 FRA_renseignements_generaux_desc: "Некоторые с подозрением относятся к любым усилиям по централизации, к любым полномочиям, предоставляемым федеральным властям, особенно когда речь заходит о таких деликатных вопросах, как работа разведки. Мы понимаем их озабоченность, но мы должны адаптироваться к новым реалиям и сконцентрировать наши усилия, если мы хотим защитить революцию и продвигать ее интересы за рубежом, противостоять Второму бюро Алжира и берлинскому отделению III Б."

 FRA_the_haunting_spectre: "Бродящий призрак"
 FRA_the_haunting_spectre_desc: "В каждом порту, на каждом складе, в каждой казарме и на каждой сборочной линии каждой контрреволюционной державы у нас есть товарищ, готовый внести свой вклад в великую борьбу. Наша сеть информаторов и сочувствующих не имеет себе равных, поскольку она может быть больше, чем мировой рабочий класс: мы будем использовать ее в полной мере для дальнейшего развития нашей разведывательной деятельности."

 FRA_vanguard_of_the_revolution: "Авангард Революции"
 FRA_vanguard_of_the_revolution_desc: "Те, кто все еще борется под гнетом капитализма, смотрят на нас с большой надеждой, как на великий маяк, бьющееся сердце революции. Мы должны сделать все, что в наших силах, чтобы помочь тем, кто разорвал цепи, это наш исторический долг. Идеологическая и материальная поддержка - это одно, но мы должны пойти дальше и принять непосредственное участие в вооруженной борьбе: французы будут сражаться по всему миру за свободу всех трудящихся и одержат победу, точно так же, как мы одержали победу здесь."

 FRA_curie_research_institute: "Исследовательский институт Кюри"
 FRA_curie_research_institute_desc: "Мракобесию нет места в нашей стране. Нами руководит материализм: наша политика основана на науке, и поэтому науке следует предоставлять все необходимое для ее прогресса. Наши самые яркие умы будут работать на благо Франции, революции и, следовательно, человечества в целом. Затем мы создадим научно-исследовательский институт, призванный закрепить наше технологическое превосходство, названный в честь выдающихся физиков Пьера и Марии Кюри."

 FRA_synthetic_chemistry: "Синтетическая химия"
 FRA_synthetic_chemistry_desc: "Франция велика и богата ресурсами, но у нее есть не все. Нефть, каучук, вольфрам и хром - всего этого не хватает, и мы не должны полагаться на иностранных экспортеров в случае возникновения конфликта. Мы должны исследовать новые способы получения этих ресурсов из того, что у нас уже есть. Некоторые ученые даже предполагают, что мы, возможно, сможем разработать эти ресурсы."

 FRA_electric_machines: "ЭВМ"
 FRA_electric_machines_desc: "Несмотря на то, что вычислительная техника восходит к табулятору, с тех пор мы добились значительных успехов в области вычислительной техники. Наши математики уже уверяют нас, что эти новые машины оказывают огромную помощь в быстром и эффективном вычислении. При наличии определенного покровительства и времени мы можем только догадываться о возможностях этой новой области."

 FRA_damocles: "Проект Дамокл"
 FRA_damocles_desc: "Вдохновленная Кембриджской конференцией во время Десятого конгресса Третьего интернационала, сегодня в Кембриджском университете состоялась встреча выпускников. Группа физиков-теоретиков из Великобритании и Франции запрашивает финансирование для создания "Проекта Дамокл" - совместного британско-французского комитета по ядерным исследованиям."

 FRA_zoe_project: "Zoé Project"
 FRA_zoe_project_desc: "Хотя проект Дамокл был многообещающим, [ENG.GetName Def] отказался от участия в проекте и подорвал сотрудничество между нашими и их учеными. Несмотря ни на что, мы должны проявить настойчивость и попытаться выяснить, как мы можем использовать атом. Мы посвятим этот проект той самой женщине, которая открыла радий и направила нас по этому пути."

 FRA_fortify_the_german_border: "Укрепить границу с Германией"
 FRA_fortify_the_german_border_desc: "Укрепления вдоль границы с Германской империей были снесены после Первой мировой войны в соответствии с жесткими требованиями победителей. Мы слишком долго терпели это позорное положение вещей и должны немедленно начать строительство современной линии обороны вдоль границы с Эльзасом, оккупированной Лотарингией и Люксембургом. Непрекращающаяся война двадцатилетней давности больше не повторится, но было бы глупо оставлять нашу дверь открытой."

 FRA_extend_the_line: "Обратить взор на лимитрофов"
 FRA_extend_the_line_desc: "Наши усилия по укреплению были сосредоточены на склонах Вогезов и берегах Мааса, но очевидно, что равнины Нидерландов являются магистралью для немецких войск, нацеленных прямо в сердце революции. Мы не повторим ошибок 1914 года, никогда не допустим нового плана Шлиффена, и поэтому мы должны расширить линию укреплений вплоть до Ла-Манша."

 FRA_demand_haute_savoie: "Потребовать Верхнюю Савойю"
 FRA_demand_haute_savoie_desc: "Нелепой швейцарской оккупации Верхней Савойи, оправдываемой тайными договорами, было позволено продолжаться слишком долго, что является пережитком первых революционных дней, когда мы еще не могли противостоять реакционным угрозам. Мы будем настаивать на немедленном отводе швейцарских войск из региона и без колебаний применим силу, если они откажутся вразумиться: как они смеют прикрываться нейтралитетом, жестоко обращаясь с французскими рабочими!"

 FRA_liberate_iberia: "Освобождение Иберии"
 FRA_liberate_iberia_desc: "Прямо на нашей южной границе, сразу за Пиренеями, капитализм и империализм все еще сохраняются. Приложив усилия, мы добьемся того, чего не смог бы ни один французский империалист - полного контроля над Иберией. Но мы другие. Мы делаем это ради простых людей, а не ради имперских амбиций. Синдикализм добьется успеха в Иберии!"

 FRA_take_down_germany: "Разобраться с Германией"
 FRA_take_down_germany_desc: "Пришло время для французского пролетариата. Революция восторжествует: история на нашей стороне, кто сможет противостоять нам? Не имея в своих сердцах ничего, кроме товарищеской любви к немецкому народу, мы добьемся того, чтобы империя, которая порабощает его, была безжалостно разрушена, и чтобы юнкера заплатили за то, что они сделали с нашими отцами и братьями. Мы отомстим за них: на Рейне, на Эльбе, в Берлине и за его пределами!"

 FRA_the_red_danube: "Красный Дунай"
 FRA_the_red_danube_desc: "Народы Дуная доказали свою неспособность начать успешную социалистическую революцию в своей стране и освободиться от тирании Габсбургов. Тогда мы поможем им. Точно так же будут освобождены все народы, все еще находящиеся под тиранией этой анахроничной империи. Европа освободится от последней из реакционных империй."

 FRA_flank_the_rhineland: "В обход Рейна"
 FRA_flank_the_rhineland_desc: "Низменные равнины Нидерландов - очевидная точка входа в стратегически важную Рейнскую область, сердце немецкой военной машины. Быстрое освобождение низменностей приведет к тому, что военные действия будут перенесены в Германию, что мы не будем воевать на нашей земле: мы должны быть смелыми, время геополитических любезностей прошло, теперь есть только борьба за будущее Революции, а значит, и человечества: светлое будущее ждет нас на земле Рейна."

 FRA_world_revolution: "Мировая Революция"
 FRA_world_revolution_desc: "Теперь, когда революция в Европе прочно утвердилась, мы можем начать смотреть вперед и приступить к осуществлению грандиозного плана по освобождению всего мира от реакционеров и империалистов. Наша борьба закончится, как только последний из них предстанет перед народом за свои преступления. Да здравствует Всемирная Социалистическая Республика!"

 FRA_european_revolution: "Европейская Революция"
 FRA_european_revolution_desc: "Хотя идея мировой революции благородна, мы должны оставаться реалистами. Имея разумное влияние и не имея других реакционных сил, которые могли бы противостоять нам, мы скоро увидим, как другие континенты перейдут в синдикализм. Однако мы должны обеспечить, чтобы Европа была свободна от реакционеров. Да здравствует Европейская социалистическая Республика!"

 FRA_peaceful_revolution: "Мирная Революция"
 FRA_peaceful_revolution_desc: "Мы слышим тех, кто утверждает, что революция не может закончиться и не закончится. Однако мы не можем позволить себе постоянно вести войны во всех уголках мира без причины. Рабочие найдут свой путь, поскольку мы выступаем в роли маяка желаний. Давайте вместо этого сосредоточимся на себе. Да здравствует французская Социалистическая Республика!"

 FRA_the_congress_of_the_internationale: "Конгресс Третьего интернационала"
 FRA_the_congress_of_the_internationale_desc: "Главы социалистических, синдикалистских и тоталистских партий, главы государств и правительств, министры иностранных дел и журналисты прибыли в Париж на открытие Девятого конгресса Третьего интернационала. Мы гордимся тем, что вновь принимаем у себя Конгресс, и смиренно надеемся использовать его для укрепления наших позиций как ведущей социалистической страны мира."

 FRA_mission_to_india: "Миссия в [HND.GetNameDef]"
 FRA_mission_to_india_desc: "[HND.GetNameDefCap] попросили нашей поддержки в их борьбе против соседей, империалистов из Лахора и реакционеров из Княжеской федерации. Они просят нас прислать военных советников для обучения их офицеров и солдат. Мы обеспечим быстрое поступление этой помощи, чтобы они могли быстрее объединить Индию."

 FRA_arab_committee: "Социалистический антиколониальный комитет"
 FRA_arab_committee_desc: "Скрывающиеся в Алжире реакционные предатели во главе с дряхлым деспотом Петеном непрерывно эксплуатируют местный пролетариат в своих попытках подавить революцию. Она придет к ним и растопчет их несогласных, и это произойдет не скоро, но товарищи во главе с алжирцем Мохамедом Саилом предложили удвоить наши усилия в поддержку местных революционеров по всей Африке: мы дадим им инструмент для работы по их освобождению."

 FRA_working_women: "Женщины-рабочие"
 FRA_working_women_desc: "Во время Конгресса Хелен Кроуферд выступила на сцене со своей пламенной речью о роли женщин в Мировой революции. Мы поддержали ее доводы и теперь готовы провести реформы, основанные на здравом смысле, касающиеся статуса работающих женщин в нашем обществе. Реакционеры могут пялиться, а мы, несомненно, будем смеяться последними."

 FRA_international_avant_garde: "Авангардизм и Интернационал"
 FRA_international_avant_garde_desc: "Всемирный конгресс деятелей искусства и литературы наметил основы движения в направлении \"пролетарское исскуство \". Они поставили перед собой три цели: разорвать цепи буржуазной культуры, донести искусство до людей и помочь раскрыть творческую силу масс. Для достижения этих целей они призывают к тому, чтобы чье-то искусство было приемлемо для пролетариата, чтобы оно изображало борьбу рабочих и служило революции."

 FRA_found_the_phalanstere_international: "Основать Международный Фаланстер"
 FRA_found_the_phalanstere_international_desc: "Более тесное военное, экономическое и научное сотрудничество между социалистическими странами является следующим важным шагом в революции. Рамки для такого сотрудничества будут созданы под эгидой Интернационала. Он будет назван Международным Фаланстером в честь работы социалиста-утописта Шарля Фурье: "Создавая этот фаланстер, рабочие всего мира завоюют утопию, которую они заслужили."

 FRA_integrate_the_corps_francs: "Интеграция коммандос"
 FRA_integrate_the_corps_francs_desc: "Французский корпус, наши подразделения коммандос, доказали свою состоятельность во время Великой войны и революционных событий последних десятилетий, преодолевая безвыходные ситуации благодаря чистой воле и героизму. Проникновение и нейтрализация, создание бреши для наших регулярных войск: только самые отважные из храбрецов готовы рисковать в таких миссиях, и нам нужен этот пыл в предстоящих столкновениях с врагами революции."

 FRA_the_riflemans_friend: "Лучший друг солдата"
 FRA_the_riflemans_friend_desc: "Мы каждый день изобретаем новые способы убийства и поэтому можем забыть, что какими бы совершенными ни были наши машины смерти, торжествуют, побеждают и продвигаются вперед не они, а человек. В конечном счете, все по-прежнему сводится к человеку и его оружию. Каждый солдат - работник Революции, и он должен быть уверен, что его инструменты наилучшим образом подходят для выполнения его мрачной, но необходимой задачи."

 FRA_eyes_on_the_ligne_bleue: "Не своди глаз с голубой линии!"
 FRA_eyes_on_the_ligne_bleue_desc: "\"Голубая линия\", Вогезы, названные так в честь прекрасного утреннего оттенка древних гор, - это наша граница с немецким имперско-юнкерским миром. Наш путь к миру и победе лежит через долины и леса горного хребта, к нашим братьям в Эльзасе, к нашим товарищам в Руре. Мы не можем позволить врагу выбирать поле боя, мы должны давить, атаковать, принять бой, застать его врасплох даже на труднопроходимой местности."

 FRA_reform_the_high_command: "Реформирование Высшего Командования"
 FRA_reform_the_high_command_desc: "Наши федеральные силы слишком долго подозревались в контрреволюционных симпатиях, и это препятствовало организационным реформам. Надежное верховное командование считалось предпочтительнее эффективного верховного командования. Нельзя допустить, чтобы этот застой продолжался, иначе Франция, которая и так находится в невыгодном положении в предстоящей борьбе с реакционными силами, никогда не сможет защитить горящий факел пролетариата. Нашей целью будут приспособляемость и дисциплина."

 FRA_all_for_the_revolution: "Все для Революции"
 FRA_all_for_the_revolution_desc: "Решающим фактором в войне всегда будет воля. Воля к победе, воля к выполнению нашего предначертанного историей предназначения. Мы победим, потому что должны, потому что задача французского народа - спасти цивилизацию от буржуазного разложения. Мы победим, потому что перед нами всего лишь рабы Капитала, а не свободные люди, борющиеся за то, чтобы разорвать цепи. У них может быть крупповская сталь, но у нас есть единая воля пролетариата: Победа неизбежна!."

 FRA_our_comrades_fight_too: "Наши товарищи с нами!"
 FRA_our_comrades_fight_too_desc: "В предстоящей вооруженной борьбе против капитала мы не одиноки: мы не только можем рассчитывать на наших союзников, но и в каждой стране, на каждом заводе рабочие надеются на нашу победу, ждут своего освобождения. Некоторые пойдут дальше, сбросят свои оковы и присоединятся к нам здесь, и мы соберем великую международную армию свободных пролетариев, чтобы помочь нашим силам. Что может сделать враг против нашей объединенной мощи?"

 FRA_levee_en_masse: "Всеобщая мобилизация"
 FRA_levee_en_masse_desc: "Когда нашим предкам, участвовавшим в Революции, угрожала реакция, они мобилизовали всю нацию на защиту только что завоеванной свободы. Молодые мужчины сражались, женщины перевязывали их раны, дети и старики проповедовали принципы Свободы. Сначала мы должны соответствовать их энтузиазму в мобилизации масс, а затем мы пойдем дальше. Мы боремся за освобождение, за новую экономическую эру, и ни одно дело не заслуживает наших жертв больше."

 FRA_the_methodical_war: "Методичная Война"
 FRA_the_methodical_war_desc: "В этом столетии погибли смелые атаки, героическая последняя битва. Если и были какие-то сомнения, то Великая война окончательно доказала это: война теперь - это вопрос планирования, расписания, материально-технического обеспечения, карт. Война - это чисто материалистический вопрос. Если мы хотим, чтобы наша позиция по защите революции была успешной, мы должны стремиться не к тщеславию, а к интеллектуальному и материальному превосходству над силами Капитала."

 FRA_an_armys_stomach: ""Желудок" армии"
 FRA_an_armys_stomach_desc: "Один заклятый враг Революции однажды сказал: "Армия марширует желудком". Затем он потерпел поражение, но не от более храбрых людей или превосходящей тактики, а от растянутых линий снабжения. Он не принял чужой совет близко к сердцу, и история оставила его позади. Мы не повторим ту же ошибку, наша миссия слишком важна. Товарищ-солдат будет сражаться, одержит победу и всю дорогу будет сыт, хорошо одет и хорошо вооружен."

 FRA_principe_de_concentration: "Принцип концентрации"
 FRA_principe_de_concentration_desc: "У Франции лучшие артиллеристы в мире, мы доказали это во многих кампаниях и докажем это снова в следующей. Наши идеально рассчитанные по времени, великолепно выполненные заградительные удары сметут армии Капитала, разрушат крепости реакционеров и откроют нашим людям путь к Берлину и за его пределы! Есть только одна королева, которой мы будем подчиняться, и это она, артиллерия-королева поля боя!."

 FRA_aero_terrestrial_integration: "Интеграция воздушных сил"
 FRA_aero_terrestrial_integration_desc: "Один решающий удар по позициям противника - вот и все, что нужно. Удачный прорыв? Мы верим только в то, что видим, удача здесь ни при чем. Нам нужна идеальная координация между нашими силами, и мы будем неустанно вдалбливать это в наших людей. Авиация уничтожит наши цели, артиллерия разнесет их в щепки, бронетехника и пехота подавят любое слабое сопротивление, которое могут оказать прислужники кайзера в борьбе за освобождение."

 FRA_supremacy_of_movement: "Превосходство движения"
 FRA_supremacy_of_movement_desc: "Мы должны смотреть фактам в лицо: враг превосходит нас численностью и превосходит нас в промышленной мощи. С нами международное братство трудящихся, но план по уничтожению преимуществ Капитала не повредит. И для этого мы должны быть смелыми, следующая война не может быть позиционной, она должна закончиться до того, как они поймут, что с ними произошло. Наступайте, обволакивайте, окружайте, пока мы не будем свободны."

 FRA_la_petite_reine: "La Petite Reine"
 FRA_la_petite_reine_desc: "\"Маленькая королева\", велосипед: наши враги могут насмехаться, но этот важнейший предмет жизни рабочих станет инструментом нашего триумфа. Когда наши войска обойдут их с фланга, незаметно проникнут на их позиции, быстро продвигаясь вперед, опираясь только на пролетарскую мощь, мы увидим, кто смеется последним. Их машины выйдут из строя, у них закончится бензин, они будут вынуждены передвигаться по дорогам, а наши будут летать по сельской местности!."

 FRA_overrun_capitals_front_lines: "Прорыв линии фронта Капитала"
 FRA_overrun_capitals_front_lines_desc: "Если мы хотим сокрушить врага и свести на нет его преимущества, мы должны действовать быстро, наши войска должны пересечь огромные пространства за часы, максимум за дни. Взгляните в будущее: целые дивизии, снабжение, артиллерия и все остальное не прикованы к ограниченной энергии человека и животного, а легко переносятся машинами, готовыми вступить в бой в любой момент. Наступила новая эра, эра моторов: производство претерпело революцию, и вскоре произойдет то же самое с военными действиями."

 FRA_the_modern_comrade_soldier: "Современный коммунар-солдат"
 FRA_the_modern_comrade_soldier_desc: "Прошли те времена, когда ополченцы носили красные повязки на рукавах, ярлыки и мечтали о революции. Современный товарищ-солдат прекрасно обучен, муштрован, экипирован, чтобы справиться со всем, что обрушит на него грядущий конфликт. Его офицеры - не вчерашние тираны, они объединены одной общей целью, одной общей волей, и они тоже неустанно изучали Великую войну и различные последовавшие за ней революционные конфликты."

 FRA_expand_the_fusiliers: "Расширить ряды морской пехоты"
 FRA_expand_the_fusiliers_desc: "Остается второстепенная, но, тем не менее, вызывающая беспокойство контрреволюционная угроза со стороны Средиземного моря. Тени самих себя прежних, люди, которых мы когда-то называли братьями, изгнанники, ждут смертельного удара Истории, их пленники взывают к нам в отчаянии. Когда представится возможность, нам придется высадиться в Алжире, и поэтому нам нужно возродить наши традиции морской пехоты, чтобы стать первой славной освободительной волной на африканском континенте."

 FRA_corps_francs_hunters: "Силы Коммандос"
 FRA_corps_francs_hunters_desc: "Наши коммандос добились огромных успехов в боевых действиях, первыми сломив все отчаянные укрепления, которые по глупости воздвиг Капитал. Наконечник копья революции должен быть еще острее. И поэтому эта элита элит будет еще больше укрепляться, обучаться, неустанно трудиться до тех пор, пока вражеские командиры не поджмут хвосты при одной только возможности их присутствия на поле боя."

 FRA_deepen_the_fog_of_war: "Развеять туман войны"
 FRA_deepen_the_fog_of_war_desc: "Нет большей силы, нет большего преимущества в войне, чем знания. Мы будем знать каждое движение врага и скрывать свое собственное, заставляя его нападать на тени, прежде чем нанести удар в спину. Это будет нетрудно: везде, где мы продвигаемся вперед, мы находимся на дружественной территории, рабочие ждут нас; везде, где нас отбрасывают назад, революционная солидарность будет саботировать их усилия по сохранению секретности. Враг усомнится в своем здравомыслии, когда его сметут наши силы."

 FRA_chasseurs_portes: "Отряды егерей"
 FRA_chasseurs_portes_desc: "Быстрое развертывание имеет решающее значение как для отражения атак противника, так и для преодоления любого прорыва на фронте. Для этой цели мы сформируем специализированные мобильные пехотные войска, готовые отреагировать на любую ситуацию, которая возникнет в предстоящей войне за независимость, и действовать как клин, сокрушающий всякое сопротивление."

 FRA_corps_du_genie_militaire: "Военно-инженерный корпус"
 FRA_corps_du_genie_militaire_desc: "Наш славный инженерный корпус имеет долгую и доблестную историю, поддерживая мощь Франции по всей Европе и по всему миру, сокрушая любое сопротивление. Независимо от того, окончили ли они политехническую школу или продвинулись по службе, наши саперы переправляют нас через реки, надежно укрывают за оборонительными сооружениями и уничтожают противника. При дальнейшем обучении и использовании все более совершенных средств они будут продолжать составлять костяк наших войск."

 FRA_rapid_response_detachments: "Отряды быстрого реагирования"
 FRA_rapid_response_detachments_desc: "Революционная война означает, что нужно приносить жертвы, но это не значит, что мы должны жертвовать жизнями наших товарищей. Особенно когда Франции приходится противостоять врагам, имеющим демографическое преимущество. Быстрое лечение, опытные врачи и преданные своему делу медсестры, эффективное развертывание подкреплений - мы сделаем все, что в наших силах, чтобы свести к минимуму жертвы и не допустить, чтобы ранение стало концом нашей приверженности революции."

 FRA_legacy_of_the_grande_batterie: "Наследие великих артеллеристов"
 FRA_legacy_of_the_grande_batterie_desc: "Наши предки побеждали с помощью артиллерии, постепенно оттачивая свое мастерство. Мы являемся наследниками более чем столетних традиций, и мы напишем свою собственную славную главу, обратив в прах все, что стоит на пути Прогресса, на пути людей. Посмотрите на нас, артиллеристов прошлых лет; обратите внимание, наши потомки: триумф Революции исходит из ствола пушки."

 FRA_precise_fire_control: "Тщательное управление огнем"
 FRA_precise_fire_control_desc: "Красный раскатистый гром обрушится на врагов рабочего класса. Идеальная координация действий наших артиллеристов уничтожит любое сопротивление, которое нам могут оказать, - техника заградительного огня, уже доведенная до совершенства во время Великой войны, теперь будет верно служить нам и будет адаптирована к новым полям сражений революционных завоеваний. Мы лучшие в своей области, но всегда могли бы стать еще чуточку лучше, поскольку служим самому важному делу."

 FRA_dual_purpose_howitzers: "Пушки двойного назначения"
 FRA_dual_purpose_howitzers_desc: "Наши инженеры усердно работают над дальнейшим развитием науки о предотвращении угроз революции. Их последняя н - еще одно доказательство французской изобретательности, если таковое когда-либо требовалось: пушки, которые могут быть переоборудованы как для противовоздушной, так и для бронетанковой борьбы, чтобы сопровождать наши войска и удовлетворять их все возможные потребности."

 FRA_comrade_estiennes_heritage: "Наследие товарища Эстьена"
 FRA_comrade_estiennes_heritage_desc: "Генерал Эстьен, герой, который навсегда изменил поле боя. Вопреки устоявшейся иерархии, из-за которой жизнь пехотинца растрачивалась впустую в безнадежных наступлениях, он принес тактику бронетанковой войны и заслужил свое прозвище \"Отец танков"\. Они были инструментом триумфа на последних этапах Великой войны, который, к сожалению, не смог превратиться в победу: Война за независимость снова докажет их полезность."

 FRA_proletarian_knights: "Пролетарские рыцари"
 FRA_proletarian_knights_desc: "Кавалерия прошлых столетий, возможно, уже угасает, но ее дух ярко сияет. Рыцари, гусары, драгуны, мантия их смелого и славного наследия была принята новой кавалерией, моторизованной, бронированной, тяжело вооруженной, но все еще атакующей и сеющей ужас в сердцах врагов. Вчера крепостной не мог служить верхом, сегодня именно пролетарий обладает механическими знаниями, чтобы управлять зверями современности."

 FRA_chars_du_futur: "Танки будущего"
 FRA_chars_du_futur_desc: "Бронетехника — быстро развивающаяся область: от артиллерии на шатких тракторах двадцать лет назад мы все ближе подходим к будущим танкам, способным самостоятельно переломить ход сражений, если не самой войны. Выступают ли они в качестве поддержки нашей пехоты или острием меча, который мы вонзаем в сердце Капитала, они всяко революционны. И поэтому мы не можем позволить себе отставать ни с точки зрения технологических, ни с точки зрения стратегических разработок."

 FRA_the_battlefields_new_queen: "Новая королева поля боя"
 FRA_the_battlefields_new_queen_desc: "Артиллерия всегда будет в наших сердцах, но мы должны признать, что у нее есть конкурентка за звание королевы поля битвы: бронетехника. Она уже доказала свою бесценность в недавних конфликтах, и мы знаем, что она станет еще более важной по мере развития технологий и тактики. Однако нам не нужно выбирать между нашими возлюбленными: артиллерия проложит путь, бронетехника сметет врага, а наша истинная хозяйка, Революция, восторжествует!."

 FRA_mobile_fortresses: "Мобильные крепости"
 FRA_mobile_fortresses_desc: "Мы просто сокрушим сопротивление под тяжестью наших доспехов, наступая как прилив, медленно, но верно, и нас не остановить. Реакционеры бросят все, что у них есть, на наши мобильные бастионы, и мы от души посмеемся над их отчаянной попыткой помешать шествию пролетариата. В конце концов, спешить некуда, Клио на нашей стороне, исход этой вечной войны предопределен!."

 FRA_overwhelming_firepower: "Подавляющая огневая мощь"
 FRA_overwhelming_firepower_desc: "Слабые попытки рабов капитала сдержать мощь свободных рабочих будут сметены нашей бронированной кавалерией. Мы яростно наступаем, мы по праву наступаем на Берлин, пока кайзер не склонится перед скромной идеей Интернационала и не попросит у нас прощения. Мы не можем больше ни секунды терпеть, когда наши товарищи закованы в цепи, и поэтому мы не можем замедлять наши атаки: танки будут яростно пробивать их насквозь."

 FRA_restructure_the_marine_federale: "Реструктуризация Федерального Флота"
 FRA_restructure_the_marine_federale_desc: "Мы должны признать, что Федеральный флот видел лучшие дни, Революция и потеря Францией заморских территорий нанесли ущерб нашим военно-морским силам. Если мы хотим одержать победу над алжирским режимом и эффективно помочь нашим британским товарищам на море, нам срочно необходима жесткая программа перевооружения, а также пересмотр наших стратегических приоритетов."

 FRA_shipbuilding_union_expertise: "Экспертиза Союза судостроителей"
 FRA_shipbuilding_union_expertise_desc: "Наши арсеналы до краев заполнены талантливыми специалистами, некоторые из которых десятилетиями проработали в сфере судостроения и, таким образом, знают все тонкости каждого судна. Их опыт может быть слишком легко упущен из виду: федерация профсоюзов этих стран должна играть важную роль в нашей программе перевооружения, работая в тандеме с Федеральным военно-морским флотом. Мы всё еще отстаем, но будем наверстывать упущенное с помощью пролетарской изобретательности."

 FRA_expand_toulon_arsenal: "Расширение тулонского арсенала"
 FRA_expand_toulon_arsenal_desc: "Являясь передовой базой наших средиземноморских вооруженных сил, Тулон, несомненно, является нашим самым важным военным портом, который постоянно находится под угрозой, исходящей от Реакционного присутствия на Корсике и частых столкновений с военно-морским флотом алжирского режима. Если мы хотим утвердить свое господство на море и однажды перейти в наступление, инфраструктура Тулона должна быть расширена."

 FRA_refurbish_atlantic_bases: "Модернизировать базы в Атлантике"
 FRA_refurbish_atlantic_bases_desc: "Наши военно-морские базы, обращенные к Атлантике, в основном расположенные в Бретани, приходят в упадок: внимание обращено на Юг, а Ла-Манш и океан охраняются британцами. Это позорное самоуспокоение не может продолжаться, мы тоже должны иметь возможность противостоять кайзеру и его сателлитам на море. Верфи и базы подводных лодок будут модернизированы, и мы перепрофилируем часть местной судостроительной промышленности для использования в военных целях."

 FRA_red_fleet_old_school: "Красный флот,Старая школа"
 FRA_red_fleet_old_school_desc: "Если мы хотим восстановить наши военно-морские позиции, необходим великий флот, который сможет гордо стоять рядом с флотом наших союзников. Большие, мощные корабли будут навязывать волю народа на морях, это великолепные достижения французской инженерии и кораблестроения, вооруженные самой впечатляющей морской артиллерией, которую когда-либо имели французские корабли."

 FRA_the_aeronavales_day: "День воздухоплавателя"
 FRA_the_aeronavales_day_desc: "Теперь для нас очевидно, что большие, громоздкие корабли - это навязчивая идея морских офицеров, которым нужно что-то доказать или заставить забыть. Пусть левиафаны с трудом займут свои позиции, их встретит рой самолетов. Они не поймут, что в них попало, и окажутся на дне Пролива, прежде чем поймут, что громоздкие махины - отличная мишень для стрельбы."

 FRA_meute_tactics: "Тактика гончих"
 FRA_meute_tactics_desc: "Нам предстоит многое наверстать, поскольку мы находимся в явно невыгодном положении по сравнению с флотом нашего главного противника. Ситуация, к сожалению, хорошо знакома французскому военно-морскому флоту. Недостаток в тоннаже мы восполним храбростью и хитростью: подводные пираты будут охотиться на корабли всей стаей. Очень скоро кайзерлихский морской флот будет слишком бояться покидать свои порты, преследуемый тенями наших морских гончих."

 FRA_the_peoples_lance: "Народный гарпун"
 FRA_the_peoples_lance_desc: "Франция была пионером в области подводных технологий, и мы должны возродить это славное наследие. Подводники - отважные антигерои морской войны этого столетия, которых боятся, уважают и ненавидят. Некоторые особо идеалистичные или консервативные офицеры все еще придерживаются устаревших представлений о развитии нашего военно-морского флота, им придется привыкать к новой парадигме: в борьбе с капиталом нет слишком грязной тактики."

 FRA_the_noose_around_capitals_neck: "Петля на шее капитала"
 FRA_the_noose_around_capitals_neck_desc: "Империалистические державы зависят от торговли, от продуктов эксплуатации своих колоний. Без этого они зачахнут и умрут. Мы выполним свой пролетарский долг и ускорим этот процесс, введя полную блокаду против врагов революции. С помощью наших союзников мы будем медленно, но верно душить империи, пока они не взмолятся о пощаде и освобождении."

 FRA_peoples_shield_and_broadside: "Бортовой залп и броня"
 FRA_peoples_shield_and_broadside_desc: "В конечном счете, все по-прежнему зависит от пушек. Более крупные пушки, лучшие пушки, более маневренные, управляемые преданными моряками, которые не колеблясь поставят свои жизни на карту, чтобы защитить свои плавучие крепости от угроз. Достижения как в наших основных, так и в зенитных орудиях обеспечат нашему флоту беспрепятственное господство."

 FRA_colonnes_de_neptune: "Колонны Нептуна"
 FRA_colonnes_de_neptune_desc: "За морями все еще таятся реакционные угрозы. Морская пехота будет играть решающую роль в том, чтобы раз и навсегда разобраться с этими остатками устаревшей системы, чтобы совершить милосердное убийство. Наследие наших морских пехотинцев запятнано колониализмом: они смоют грехи своих подразделений, выковав новую славную историю как первая красная волна праведного народного возмездия, высадившаяся на берегах имперского капитализма."

 FRA_close_naval_coordination: "Тесная военно-морская координация"
 FRA_close_naval_coordination_desc: "Соперничество между родами ВМС недопустимо, наша ситуация не допускает мелкой, непродуктивной конкуренции. Морская война ведется на море, под водой и в воздухе, и каждый фронт будет тонко настроен на работу с другим, гармонично трудясь ради единой цели: славной победы, смерти Реакции!."

 FRA_chasseurs_tueurs_groups: "Группы охотников-убийц"
 FRA_chasseurs_tueurs_groups_desc: "Конечно, мы не единственные, у кого есть подводные лодки. Дворняги врага таятся, охотясь на нас: мы не позволим охотиться на себя, и поэтому мы станем охотниками. Специализированные эскадры будут вести тотальную, постоянную войну против капиталистического пиратства, которое стремится помешать коллективным усилиям мирового пролетариата против реакционной агрессии."

 FRA_protect_revolutionary_lifelines: "Защита "дорог жизни" Революции"
 FRA_protect_revolutionary_lifelines_desc: "Мощь революционного производства может компенсировать большую часть капиталистической неэффективности, но, к сожалению, мы еще не изобрели способы выращивать каучук во французской глубинке и находить нефть там, где ее нет. Мы будем накапливать, мы найдем способы производить больше с меньшими затратами, но некоторые стратегические товары должны будут собрать товарищи за границей: мы не можем позволить, чтобы морские пути, по которым их нам доставляют, были отрезаны врагом."

 FRA_naval_power_projection: "Доктрина проекции силы"
 FRA_naval_power_projection_desc: "Будущее войны на море - за авиацией, более эффективной, точной и маневренной, чем любое оружие. Наши эксперименты в этой области доказали свою эффективность, и теперь мы должны на всех парах продвигаться вперед в разработке более крупных и совершенных авианосцев, которые позволят преодолевать семь морей с грузом, превышающим наш вес."

 FRA_squadron_warfare: "Война эскадр"
 FRA_squadron_warfare_desc: "Военно-морские традиции живы и здоровы, и хорошо организованный, хорошо управляемый флот по-прежнему будет править волнами. Когда-то французский флот назывался \"Королевским\", теперь он может с гордостью называть себя \"Народным\", его корабли самые впечатляющие, их экипаж — гордость народа, вымуштрованная революционной дисциплиной: никто не сможет противостоять нам, когда мы оспариваем контроль над морями."

 FRA_brest_naval_academy: "Военно-морская академия Бреста"
 FRA_brest_naval_academy_desc: "С долгой и славной историей Военно-морское училище Бреста в Бретани было альма-матер большинства наших морских офицеров. Непрерывное обучение и формирование, гарантирующие, что они никогда не будут самодовольными, станут важным шагом в обновлении Федерального флота. Но мы также расширим его исследовательские возможности, с восстановлением придут инновации и модернизация."

 FRA_international_naval_intelligence: "Международная военно-морская разведка"
 FRA_international_naval_intelligence_desc: "Революционное товарищество распространяется на обмен разведданными: наши британские и итальянские товарищи также могут похвастаться гордыми морскими традициями, и было бы глупо упускать потенциальное сотрудничество в военно-морских вопросах. Совместными усилиями мы предотвратим любую попытку врагов Революции остаться незамеченными."

 FRA_gifts_for_enemy_ships: ""Подарки" для вражеских кораблей"
 FRA_gifts_for_enemy_ships_desc: "Возможно, мы не сможем исправить наше отставание в военно-морской гонке к тому времени, когда неизбежный грядущий конфликт обрушится на Европу. Неважно: мы будем сражаться настолько грязно, насколько это необходимо. Ла-Манш, Атлантика, Средиземное море: на трех фронтах корабли "Рейхспакта" будут встречены щедрой порцией взрывчатки. Смерть от тысячи ранений: корабль за кораблем, их флот будет сокращен, их судоходство затруднено."

 FRA_la_lutte_aerienne: "La Lutte Aérienne"
 FRA_la_lutte_aerienne_desc: "Еще в зачаточном состоянии во время Первой мировой войны авиация уже произвела революцию в военном деле. За несколько лет конфликта она достигла невероятных успехов: от разведки до воздушных поединков между доблестными рыцарями воздуха, бомбардировок и массового развертывания. С тех пор на каждом шагу самолеты доказывали свою невероятную полезность и демонстрировали дальнейший потенциал. Франция уже была пионером в этой области, она должна оставаться доминирующей."

 FRA_ecole_de_lair: "École de l'Air"
 FRA_ecole_de_lair_desc: "Поскольку недавно было принято решение о создании отдельного подразделения Федеральных сил для авиации, вполне естественно, что оно получит свою собственную школу подготовки офицеров. В Воздушной школе будущие офицеры будут обучаться у великих пилотов Великой войны и Революции, чтобы они могли передавать свой опыт. Пионеры и новоиспеченные гвардейцы, несомненно, оставят славное наследие для наших ВВС."

 FRA_naval_aerial_coordination: "Взаимодействие флота и авиации"
 FRA_naval_aerial_coordination_desc: "Небо и море, ужасающие силы природы, теперь укрощены человечеством. Они, как и все остальное, являются полем битвы: следующий конфликт, несомненно, также будет вестись там, и там же его нужно будет выиграть. Военно-воздушным силам была предоставлена ​​автономия не для того, чтобы изолировать их, а, наоборот, чтобы придать большую гибкость их миссиям. Координация с Федеральным флотом будет иметь важное значение, и любое соперничество между подразделениями должно быть пресечено в зародыше."

 FRA_hone_torpillage_skills: "Обучение торпедированию"
 FRA_hone_torpillage_skills_desc: "Торпеды вселяют страх в сердце любого моряка, это хорошо известный инструмент, но тем не менее они становятся все более изощренными и смертоносными. Естественно, их потенциал должен быть использован для нашего дела, независимо от того, придут ли они из глубин морей или с воздуха. Мы отточим нашу тактику с помощью этого самого славного из гарпунов, готового одним ударом пронзить современных морских титанов на металлолом."

 FRA_arsenal_de_laeronautique: "Arsenal de l'Aéronautique"
 FRA_arsenal_de_laeronautique_desc: "Великих и храбрых пилотов у нас предостаточно. Гениальных инженеров у нас, конечно, тоже много. Теперь мы должны объединить их усилия, чтобы создать самолет завтрашнего дня, чтобы показать, что пролетарские усилия могут сравниться и превзойти все, что могут выпустить Юнкерс, Амио или Латекоер. Будут созданы исследовательские и испытательные центры, чтобы централизовать наши усилия по разработке и гарантировать, что мы не отстанем в воздушной гонке."

 FRA_barrage_david: "Вал Давида"
 FRA_barrage_david_desc: "Наши инженеры некоторое время работали над возможностью электромагнитного обнаружения самолетов. Наконец, под руководством Пьера Давида мы вскоре сможем внедрить его в больших масштабах. Это первое поколение систем полевого бистатического обнаружения позволит нам создать невидимую стену, которая будет обнаруживать любой самолет, пересекающий ее, немедленно приводя в боевую готовность наши собственные силы и сообщая им о приблизительном местоположении противника."

 FRA_popular_aviation: "Народные ВВС"
 FRA_popular_aviation_desc: "На заре авиации она считалась хобби джентльменов, война показала, что сыновья рабочих могут летать лучше, чем самые гордые аристократы. Многие пилоты продолжали летать после Революции, а некоторые основали аэроклубы, иногда основанные на профсоюзах. Мы будем продвигать их и поощрять молодых людей вступать в них, используя эти клубы для набора талантливых и подготовки других к роли вспомогательных пилотов в грядущей войне."

 FRA_les_amazones: "Амазонки"
 FRA_les_amazones_desc: "Чтобы обеспечить как можно большее количество пилотов, мы создадим женский корпус вспомогательных пилотов. Известная спортсменка-пилот Мариз Бастье потребовала, чтобы ей разрешили присоединиться к нашим военно-воздушным силам, ее желание будет исполнено: мы надеемся, что ее известность побудит больше молодых женщин рассмотреть этот смелый путь. Действительно, хотя они будут направлены вдали от фронта, на конвойные и транспортные миссии, риск опасности все равно будет."

 FRA_politique_des_stocks: "Политика резервов"
 FRA_politique_des_stocks_desc: "Одной из наших главных проблем является массовое производство самолетов, поскольку эти сложные чудеса инженерии все еще часто собираются в почти кустарных условиях. Благодаря координации с профсоюзами мы будем работать над созданием мастерских, сборочных линий, которые позволят нам подготовить большой воздушный флот. Мы должны быть готовы к бою и не можем позволить надежде на быстрый крах капиталистических держав помешать тщательной подготовке."

 FRA_spirit_of_the_air_division: "Дух ВВС"
 FRA_spirit_of_the_air_division_desc: "Генерал Файоль в последние годы Великой войны добился больших успехов в продвижении использования самолетов в военных действиях. Новые военно-воздушные силы многим обязаны его наследию. Первые летчики, \"рыцари воздуха\", больше не летают, но их элегантные поединки все еще в памяти каждого пехотинца, который был их свидетелем. Несомненно, многие из наших летчиков будут стремиться подражать их примеру, добавляя свои имена в славный и  длинный список героев французской авиации."

 FRA_beyond_the_frontiers: "За пределами фронта"
 FRA_beyond_the_frontiers_desc: "Война — это экономический вопрос: производство — это нерв войны. Бомбардировки до сих пор были в основном тактическими, локальными, но мы должны принять технические достижения, которые позволяют стратегически использовать авиацию: мы нанесем удары по их производственным центрам, помешаем их промышленности, разрушим их инфраструктуру, их оборону до основания. Они поймут, что нет места, где можно было бы укрыться от наших законных нападений!."

 FRA_groupes_de_linfanterie_de_lair: "Отряды десантников"
 FRA_groupes_de_linfanterie_de_lair_desc: "Уже в конце Первой мировой войны среди самых смелых офицеров начала появляться идея о том, чтобы пехота сбрасывалась на парашютах за линию фронта, чтобы выходить из тупика. Поскольку самолеты становились все более внушительными, эта надежда теперь стала возможной, и первые испытания оказались убедительными. Мы соберем первую элиту парашютной пехоты, готовой взять на себя миссии, которые вчера казались глупостью, а сегодня — логичным новым шагом в тактике."

 FRA_adaptable_strike_tactics: "Гибкая тактика ударов"
 FRA_adaptable_strike_tactics_desc: "Гибкость, адаптивность станут путем к победе, мы не можем позволить себе полагаться на одну тактику, чтобы проложить путь нашим наземным войскам. Будут созданы многоцелевые бомбардировщики, которые смогут как нейтрализовать более мелкие наземные цели, так и помогать в более крупных стратегических задачах."

 FRA_assault_brigades: "Штурмовые бригады"
 FRA_assault_brigades_desc: "Чтобы открыть путь нашим войскам и устрашить врага, будут созданы специальные приспособления, которые будут проливать огненный дождь на тех, кто осмелится противостоять ходу истории. Легкие, они будут выполнять самые смелые миссии, которые позволят им максимально приблизиться к целям, чтобы не только обеспечить попадание, но и чтобы все свидетели могли засвидетельствовать мастерство наших ангелов Смерти."

 FRA_reaction_propulsion_experiments: "Эксперименты с реактивными двигателями"
 FRA_reaction_propulsion_experiments_desc: "Приведение в движение с помощью ракетного двигателя - это давно продуманное усовершенствование конструкции самолета, позволяющее достичь скорости, не сравнимой с классическими двигателями. Испытания концепций уже показали, что это возможно, и первые прототипы для использования в военных целях уже впечатляют. Все, что требуется сейчас, - это стандартизация и совершенствование технологии, и Революция заполучит полное господство в небе."

 FRA_hurricane_of_fire: "Ураганный огонь"
 FRA_hurricane_of_fire_desc: "В массах есть сила, это верно с политической точки зрения, это верно и с военной. Мы закроем небеса своими крыльями, атакуя как одна огромная воздушная пролетарская фаланга, сокрушим врага нашей объединенной огневой мощью. Красные крылья на ветру, красное небо в ночи, ничто не остановит пути прогресса, наша героическая миссия будет выполнена, только новый рассвет, с восходящим солнцем возвещает миру, что мы на один день приблизились к триумфу Великой Революции!."

 FRA_Phalanstere_internationale: "Основать Всемирный Фаланстер"
 FRA_Phalanstere_internationale_desc: "В ходе встречи в старинном Кембриджском университете было принято решение о создании всемирного плана по объединению технологических достижений синдикалистских стран. С тех пор этот план превратился в более амбициозный план "Всемирный Фаланстер", направленный на помощь синдикалистским режимам по всему миру."
 
### Bookmark ###
 FRA_KR_gathering_storm_desc: "Третья республика закончилась так же, как и началась: поражение от рук Германии и последующая революция. Всеобщая забастовка, созванная в 1919 году, привела к падению буржуазного правительства. На протяжении вот уже 15 лет, новая Французская Коммуна, ведомая Комитетом общественного спасения, является маяком мирового синдикализма. Однако, в 1936 г. ей надо реформировать страну и защитить идеалы революции, которые стали критиковать всё больше и больше, порой взывая к более радикальным методам. Цель Франции ясна, вот только какое из социалистических течений поведёт её?"

### Intro Screen ###
 FRA_country_intro_background: "GFX_FRA_intro"
 FRA_country_intro_header: "Французская Коммуна"
 FRA_country_intro_content: "Третья Республика пала так же, как и родилась: снаружи разгромлена немецким оружием, а внутри столкнувшись с коммунистической революцией. В ноябре 1919 года ВКТ объявила Всеобщую революционную забастовку, парализовавшую страну и приведшую к падению буржуазного правительства. "Партия порядка" была недостаточно сильна, чтобы положить конец беспорядкам, и в последующие месяцы французский истеблишмент был изгнан из страны коалицией левых сил в короткой, но жестокой гражданской войне. \n\nВ течение последних пятнадцати лет самопровозглашённая "Французская Коммуна" объединилась под синдикалистско-социалистической идеей во главе с Комитетом общественной безопасности. Однако к 1936 году компромисс, достигнутый в целях восстановления разрушенной страны и защиты плодов революции от иностранной угрозы, считается многими критиками всё более устаревшим, и учащаются призывы к более радикальной политике. Франция всё больше уверена в своей стабильности и своём предназначении, но французские революционные устои разрознены, и неясно, какие именно идеологические течения в ближайшие годы будут превалировать..."
 
 FRA_guide: "§MАнархисты / Ортодоксальные синдикалисты / Якобинцы / Сорелианцы§! (§RРадикальные социалисты§! / §rСиндикалисты§! / §oТоталисты§!):\n£white_dot Во время выборов 1936-го года, поддержите одну партию хотя бы 3 раза, чтобы привести её к победе.\n\n§MВыборы без большинства§! (§rСиндикалисты§!)\n£white_dot Во время выборов 1936-го года не поддерживайте ни одну из партий больше, чем 2 раза.\n\n§MРеформация радикальных якобинцев§! (§oТоталисты§!)\n£white_dot Якобинцы должны набрать большинство на выборах 1936-го года.\n£white_dot Выберите вариант покончить со старой системой.\n£white_dot Леон Блюм и Народный Фронт должны предстать перед судом.\n£white_dot Execute them.\n£white_dot Если народный фронт не будет подавлен, генерал Гамелин совершит переворот и вернёт Трудящихся к власти."

### Events ###

 france_events.1.t: "Новый флаг для Федерации?"
 france_events.1.d: "Вопрос о федеральном флаге стал предметом давних разногласий еще в революционные дни. Красный флаг, конечно, всегда был флагом пролетариата, флагом мучеников, флагом баррикад, и многие утверждали, что революция должна идти только под этими цветами, гордо заявляя о войне против буржуазии: у пролетариев нет родины, в конце концов. Однако, несмотря на то, что Триколор уже несколько десятилетий не был флагом революционного энтузиазма и превратился всего лишь в флаг банкирской республики, флаг Версаля 1871 года, многие чувствовали себя слишком привязанными к нему, чтобы отпустить его. Часть социалистического движения, особенно в СФИО, давно стремилась вырвать этот флаг из рук буржуа и вернуть ему ту силу, которая была у него, когда народ противостоял монархам Европы в Вальми и одержал победу. Или же они просто опасались, что отказ от красно-бело-голубого флага будет слишком большой провокацией для всего мира и для наших соотечественников, которые еще не до конца стали товарищами.\n\n Поэтому был найден компромисс, как и во всех других аспектах Революции. Триколор был сохранен, но украшен символами пролетарской борьбы, рабочих, мятежников, и всегда развевался рядом с красным флагом. Благодаря нашей победе на последних выборах мы получили народный мандат, чтобы окончательно разрешить этот спор: должны ли мы сохранить компромисс 1920 года и испорченный Триколор, создать новый, более красный компромиссный флаг или просто закрепить Красный раз и навсегда?"
 france_events.1.a: "Выработать новый компромисс, вперед к революционному обновлению!"
 france_events.1.b: "Красный! Рабочие не нуждаются в большем и не заслуживают меньшего"
 france_events.1.c: "Слишком многие отдали свои жизни за триколор, не нужно отправлять его на пенсию"
 
 france_events.5.t: "Отставка Марсо Пивера"
 france_events.5.d: "Несмотря на успешную организацию Конгресса синдикалистов в мае, администрация Пивера подверглась критике за отсутствие ответной реакции на репрессии в отношении профсоюзов в Германии. Сегодня на Всеобщей бирже труда оппозиция согласилась на вотум недоверия Пиверу, который объявил, что будут проведены выборы для избрания нового Комитета. Его обязанности будут временно исполняться Комитетом общественной безопасности, пока не будут получены результаты выборов."
 france_events.5.a: "Пока, товарищ Пивер."
 
 france_events.6.t: "Первый день выборов: Коммунальная армия"
 france_events.6.d: "Из-за присутствия профсоюзов в коммунальной армии она стала чрезмерно политизированной, что создаёт напряжённость в гаранте целостности страны и оружии синдикалистской революции! Это привело к отставке действующего начальника штаба, популярного генерала гражданской войны Мориса Гамелена. Прежде чем окончательно распустить армейские профсоюзы, военные лидеры, в основном сорелианцы, решили узнать у солдат, кого они хотят видеть во главе французской армии."
 france_events.6.a: "Анри Борис, (Ортодоксы) - Штурм укреплений."
 france_events.6.b: "Эрнест Петит, (Якобинцы) - Методичная Война."
 france_events.6.c: "Диего Броссе, (Сорелианцы) - Мощь Масс."
 france_events.6.e: "Эме Думенц, (Анархисты) - Превосходство Подвижности."
 
 france_events.7.t: "Второй день выборов: Управление Общей Разведки"
 france_events.7.d: "В силу своего ключевого предназначения в вопросах внешней и внутренней безопасности должность главы Управления Общей Разведки считается одним из ключей к верховной власти во Французской коммуне и имеет решающее значение в уничтожении политических соперников. Это может стать страшным оружием в руках таких экстремистских фракций, как "Сорелианцы" и "Якобинцы"..."
 france_events.7.a: "Роджер Саленгро, (Ортодоксы)."
 france_events.7.b: "Луи Валлон, (Якобинцы)."
 france_events.7.c: "Пьер Вийон, (Сорелианцы)."
 france_events.7.e: "Передайте полномочия в этой области местным ополченцам (Анархисты)."
 
 france_events.8.t: "Третий день выборов: Внутренняя безопасность"
 france_events.8.d: "Представитель фракции Ортодоксов, Шарль Раппопорт, подал в отставку с поста министра внутренней безопасности, чтобы побороться за пост министра иностранных дел. Бывший председатель Марсо Пивер, всё ещё надеясь сохранить своё политическое будущее, сумел заручиться поддержкой партии "Трудящиеся" и теперь борется за этот пост с решительным якобинцем Максом Боннафусом, сорелианцем Жан-Мари Кламамус, а также Морисом Жуе, последователем Фора."
 france_events.8.a: "Марсо Пивер, (Ортодоксы)."
 france_events.8.b: "Макс Боннафус, (Якобинцы)."
 france_events.8.c: "Жан-Мари Кламамус, (Сорелианцы)."
 france_events.8.e: "Морис Жуе, (Анархисты)."
 
 france_events.9.t: "Четвёртый день выборов: Экономические вопросы"
 france_events.9.d: "Сегодняшние выборы кажутся плебисцитом по экономической политике коммуны, проводимой в последние годы. Многие представления о будущем синдикалистской экономики, более или менее сосредоточенные на промышленности или сельском хозяйстве, конкурируют друг с другом. Все они необходимы для будущего решающего боя с Германией..."
 france_events.9.a: "Бенуа Фрашон, (Ортодоксы) - Модернизация и совершенствование."
 france_events.9.b: "Бартелеми Монтаньон, (Якобинцы) - Технократия."
 france_events.9.c: "Жак Дорио, (Сорелианцы) - Милитаризация общества."
 france_events.9.e: "Даниэль Герен, (Анархисты) - Децентрализация экономики."
 
 france_events.10.t: "Пятый день выборов: Внешняя политика"
 france_events.10.d: "С последним днём выборов встала одна из наиболее животрепещущих тем во Французской коммуне: дипломатия, которая тянет за собой двойную задачу: распространение революции по всему миру и подготовка к мести Германии. Если само существование синдикалистского Интернационала ещё не под угрозой, то сегодня же будут определены будущие театры мировой революции..."
 france_events.10.a: "Шарль Раппопорт, (Ортодоксы) - Интернационализм."
 france_events.10.b: "Марсель Деа, (Якобинцы) - Европейский социализм."
 france_events.10.c: "Пьер Комер, (Сорелианцы) - Цивилизационная война."
 france_events.10.e: "Фернан Депре, (Анархисты) - Мировая Революция."
 
 france_events.12.t: "Итоги выборов: Ортодоксы берут большинство"
 france_events.12.d: "Хотя многие и считали эти выборы концом компромисса ортодоксов, который правит коммуной со смерти Эмиля Пуже, им удалось обеспечить твёрдое большинство на выборах.\n\nТрудящиеся теперь приглядываются к русскому эмигранту Борису Суварину, который, в отличие от Пивера, способен удержать в узде радикальные фракции и привести коммуну к своей славе!"
 france_events.12.a: "Поздравляем, товарищ Суварин."
 
 france_events.13.t: "Итоги выборов: Якобинцы берут большинство"
 france_events.13.d: "Выборы окончательно привели к власти якобинцев, что позволило вернуть республиканские ценности и привести Коммуну к мировой революции! Синдикалистские структуры теперь в руках якобинцев, а сорелианские партизаны преследуются, изгоняются или уничтожаются. Теперь вновь созданному Французскому Социалистическому Союзу придется выбирать между теоретиком партии Марселем Деатом и мэром Бордо Адриеном Марке, чтобы возглавить Францию!"
 france_events.13.a: "Поздравляем, товарищ Деа."
 france_events.13.b: "Поздравляем, товарищ Марке."
 
 france_events.14.t: "[?FRA_jacobin_leader.GetName] сменяет Пьера Монатта"
 france_events.14.d: "Во время церемонии инаугурации нового Комитета общественной безопасности при Всеобщей бирже труда новый председатель КОБ обратился к своему коллеге из ВБТ Пьеру Монатту с просьбой выйти в отставку, утверждая, что союз с анархистами больше не соответствует взглядам Коммуны. Старик неохотно согласился, тем самым позволив якобинцам полностью захватить власть в коммуне. В конечном итоге был избран [?FRA_jacobin_leader.GetName]."
 france_events.14.a: "Vive la Révolution!"
 
 france_events.15.t: "Итоги выборов: Сорелианцы берут большинство"
 france_events.15.d: "Выборы предоставили власть в руки военной фракции Французской коммуны, верным последователей теорий Жоржа Сореля, впоследствии уничтоживших своих старых врагов якобинцев, которые теперь являются жертвами кровавых чисток по всей стране. За слабой политикой трудящихся началась новая веха в её истории..."
 france_events.15.b: "Поздравляем, товарищ Валуа."
 
 france_events.16.t: "Отставка Пьера Монатта"
 france_events.16.d: "Во время церемонии инаугурации нового Комитета общественной безопасности при Всеобщей бирже труда председатель ВБТ Себастьян Фор заявил о своём намерении выйти в отставку в пользу своего коллеги из КОБ Жоржа Валуа, считая, что он слишком стар для исполнения своих политических обязанностей, даже чисто номинально, и что новые испытания для Французской коммуны потребуют более молодых лидеров. Теперь Валуа должен принять решение..."
 france_events.16.a: "Объединить должности председателей ВБТ и КОБ."
 
 france_events.17.t: "Итоги выборов: Анархисты берут большинство"
 france_events.17.d: "Выборы предоставили власть анархистам, а это значит, что французский народ понял, что революция вступила в новую фазу и для управления страной нужны более молодые умы. Наиболее ограничительные правительственные структуры были распущены, ознаменовав новую эпоху либертарного социализма по всей Европе."
 france_events.17.a: "Поздравляем, товарищи."
 
 france_events.18.t: "Конец Председательства"
 france_events.18.d: "Поскольку на последних выборах в Коммуну к власти пришли анархисты, стало очевидно, что реформы должны прийти и на высшие посты. Если раньше власть Председателя не была неограниченной, то теперь, когда Коммуну возглавляет один человек, это явно ограничивающая, буржуазная концепция. Это плевок в лицо идеям победивших анархистов, которые предпочитают более коллегиальный стиль руководства."
 france_events.18.a: "Упразднить должность, пришло время коллективного руководства!"
 
 france_events.19.t: "Отставка Пьера Монатта"
 france_events.19.d: "Во время церемонии инаугурации нового Комитета общественной безопасности при Всеобщей бирже труда,председатель ВБТ Пьер Монатт заявил о своём намерении выйти в отставку, поскольку многие утверждали, что внутреннее разделение в исполнительных органах Коммуны была главной причиной политического кризиса. На выбор есть два фаворита на его замену: профсоюзник Леон Жуо и ветеран гражданской войны Бенуа Фрашон." 
 france_events.19.a: "Леон Жуо становится председателем Всеобщей биржи труда."
 france_events.19.b: "Бенуа Фрашон становится председателем Всеобщей биржи труда."
 
 france_events.20.t: "Никто не добился большинства в ходе выборов"
 france_events.20.d: "После трёх дней подсчёта голосов стало официально известно, что на последних выборах никто не добился твёрдого большинства. Себастьян Фор, председатель Всеобщей биржи труда, заявил, что он и Комитет сами изберут нового председателя для управления компромиссным кабинетом, а также чтобы избежать усиления внутренней борьбы между якобинцами и сорелианцами."
 france_events.20.a: "Монатт и Пивер формируют компромиссное правительство."
 
 france_events.22.t: "Призыв товарища Блюма к единству с Испанией"
 france_events.22.d: "Пока гражданская война опустошает Иберийский полуостров, рассказы о Белом терроре за Пиренеями ужасают наше население. По всей коммуне проводились стихийные собрания и съезды с целью сбора средств и материалов для наших испанских товарищей, чтобы продемонстрировать нашу решительность в поддержке НКТ-ФАИ.\n\nНа таком мероприятии представитель партии "Трудящиеся" Леон Блюм выступил с сильной речью, призывая правительство оказать поддержку испанским рабочим и крестьянам объединившись во Всеобщий народный фронт против реакционеров и монархистов. Эта речь о "народном фронте" была тепло встречена за выразительность и твёрдую социалистическую убежденность. Популярность месье Блюма, безусловно, увеличилась."
 france_events.22.a: "Весьма красноречиво, товарищ."
 
 france_events.25.t: "Проект 'Дамокл'?"
 france_events.25.d: "В течение последних недель в Кембриджском университете состоялось тайное собрание, вдохновлённое Кембриджской конференцией, произошедшей во время Десятого Конгресса Интернационала в мае 1937 года. Группа физиков-теоретиков из Британии и Франции во главе с Норманом Фезером, Фредериком Жолио-Кюри и Франсисом Перреном обсуждают возможности радиоактивности и ядерного деления, а также использование этих процессов: от выработки электроэнергии и применения в медицине до мощных стратегических вооружений. Они запрашивают нашу поддержку для основания проекта "Дамокл", совместного англо-французского комитета по ядерным исследованиям."
 france_events.25.a: "Основать проект 'Дамокл'!"
 france_events.25.b: "Мы не будем тратить ресурсы на такой абсурд!"
 
 france_events.26.t: "Основание проекта 'Дамокл'"
 france_events.26.d: "Правительство Британского союза приняло наше предложение о создании совместного проекта 'Дамокл'. Это грандиозное начинание позволит нам распространить синдикализм по всему миру!"
 france_events.26.a: "Отлично!"
 
 france_events.27.t: "Британия отказалась сотрудничать!"
 france_events.27.d: "Правительство Британского Союза отказалось от нашего предложения о создании совместного проекта 'Дамокл'. Нам придётся вести его в одиночку."
 france_events.27.a: "Проклятие!"
 
 france_events.28.t: "Третий Интернационал"
 france_events.28.d: "Третий Интернационал был основан в 1921 году, после революции. Наши предки создали в организации плюралистическую, большую площадку: анархисты, коммунисты, социалисты, синдикалисты, пацифисты, антиколониалисты, даже некоторые социал-демократы были созваны в надежде восстановить фундамент мирового пролетарского движения, разрушенный военными годами. Каждый год, а затем каждые несколько лет мы проводили конгрессы, чтобы обсудить и определить направление социалистической борьбы. Мы с гордостью можем сказать, что скоро мы будем готовы провести девятое собрание, прямо здесь, в Париже и его окрестностях. Это будет не просто конференция, а грандиозный праздник борьбы за пролетарское освобождение!"
 france_events.28.a: "Конгресс состоится через неделю после Дня Труда, как и планировалось!"
 
 france_events.29.t: "Девятый конгресс Третьего Интернационала"
 france_events.29.d: "Пришло время пригласить социалистических и синдикалистских лидеров, которые приедут со всего мира на Девятый конгресс Третьего Интернационала."
 france_events.29.a: "Разошлите приглашения!"
 
 france_events.30.t: "Третий Интернационал"
 france_events.30.d: "Франция закончила со своими приготовлениями к проведению Девятого конгресса Третьего Интернационала, и мы, как и ожидалось, получили приглашение. Было бы глупо не отправлять нашу делегацию."
 france_events.30.a: "Лучше начать собирать вещи!"
 
 france_events.41.t: "Все делегаты прибыли"
 france_events.41.d: "После нескольких месяцев лихорадочной подготовки в Версале открылся Девятый конгресс Третьего Интернационала. Люди со всего мира съехались сюда, чтобы помочь скоординировать усилия социалистического движения. Партиям, входящим в Интернационал, а также некоторым сочувствующим и наблюдателям было предложено прислать своих представителей, и сотни людей проделали порой нелегкий путь, чтобы быть ближе к бьющемуся сердцу пролетарской революции. Хотя теоретически Интернационал не имеет никакого отношения к французскому и британскому правительствам, представители этих передовых социалистических стран, безусловно, будут пользоваться неформальным авторитетом среди своих коллег, старейшин в деле глобального освобождения рабочего класса."
 france_events.41.a: "Теплое приветствие нашим товарищам!"

 france_events.42.t: "Торжественное открытие Конгресса"
 france_events.42.d: "В Версальском дворце состоялось торжественное открытие Девятого конгресса Третьего Интернационала, украшенного по этому случаю малиновыми знаменами с социалистическими символами и лозунгами. Предоставляя честь произнести вступительную речь, отец британской революции Джордж Лэнсбери указал на иронию созыва пролетарских сил в месте, которое когда-то было центром самодержавной монархии, - доказательство того, что революция неудержимо движется вперед, если таковое вообще требовалось. Затем последовала грандиозная речь, в которой делегаты благодарили друг друга, вспоминали революционные успехи последних лет и заряжались бодростью духа для предстоящей борьбы. В заключительном слове Лэнсбери предложил делегатам присоединиться к нему в минуте молитвы, на что французский голос быстро ответил: 'Черта с два!', что вызвало несколько минут волнения в зале. Тем не менее, старику бурно аплодировали, а представители разошлись по различным дискуссионным группам и комитетам."
 france_events.42.a: "Девятый конгресс Третьего Интернационала объявляется открытым!"

 france_events.421.t: "Интернационал показал своё истинное лицо"
 france_events.421.d: "Красные чётко дали нам понять на последней сессии Интернационала, что они решительно настроены распространять свой яд! Мы должны быть готовы ко всему...!"
 france_events.421.a: "Мы должны быть готовы..."
 
 france_events.43.t: "Синдикализм в Испании"
 france_events.43.d: "Начал своё выступление Хоакин Аскасо Будрия, который изложил ситуацию с испанской НКТ-ФАИ участникам Конгресса. НКТ-ФАИ является крупнейшей синдикалистской партией в Испании, состоящей из анархо-синдикалистов, умеренных синдикалистов и профсоюзных деятелей. Испанские революционеры собственными глазами видели Белый террор: насильственные контрреволюционные действия, направленные против рабочих. Они пришли, прося, когда потребуется, поддержки для своего дела. Резолюция о поддержке усилий испанских пролетарских сил была принята единогласно, и крики "¡Viva la Revolucion!" эхом отдавались в залах Версаля."
 france_events.43.a: "Наши иберийские товарищи могут на нас рассчитывать!"
 
 france_events.45.t: "Белый террор"
 france_events.45.d: "Мы слышали, как Хоакин Аскасо Будрия рассказывал об ужасах Белого террора, происходивших в Мадриде и Барселоне, и баварский социалист Курт Эйснер захотел углубиться эту тему, и ему было предоставлено слово. Услышав ещё больше историй, происходивших в Германии, Австрии, Венгрии, России и Финляндии, члены Конгресса были готовы принять свои решения."
 france_events.45.a: "Осудить капиталистических убийц и их социал-демократических помощников."
 
 france_events.47.t: "В самом сердце столицы"
 france_events.47.d: "Американский делегат Джон 'Джек' Рид также предоставил страстную речь: журналист по профессии, один из первых американцев, освещавших русскую и французскую революции, позже он сам вступил в политическую борьбу. Теперь, будучи уважаемым человеком в движении, он объявил о своем участии в президентских выборах 1936 года от СПА. Несмотря на критику в стране и за рубежом, что это приведет его к реформизму, перспектива увидеть у руля Соединенных Штатов убежденного социалиста слишком заманчива для делегатов, чтобы выразить серьезное беспокойство, и Конгресс предоставлял Риду теплый прием. В своей речи он подробно рассказал о текущей ситуации в Соединенных Штатах: Великая депрессия, затянувшаяся на годы, поставила американских рабочих и фермеров в ужасные условия, что привело к быстрому росту радикальной политики, усугубленному крахом в Германии. Рабочее движение становится все более мощным, СПА быстро завоевывает позиции в политических институтах, а пролетарские силы стойко противостоят полицейским репрессиям и реакционным отрядам лонгистов: кажется, что возможность обязательно представится."
 france_events.47.a: "На Уолл-стрит взметнется красный флаг!"
 france_events.47.b: "Предложите поддержку Риду и его товарищам."
 france_events.47.c: "Мы пока не можем рисковать враждой с Америкой."
 
 france_events.50.t: "Надежды Латинской Америки"
 france_events.50.d: "Далее состоялось совместное мероприятие латиноамериканских товарищей. Южная и Центральная Америка в последние годы находятся на переднем крае социалистической борьбы. Став первыми жертвами американских интересов, непрерывно эксплуатируемые международным капиталом, удерживаемые мелкими диктаторами, являющимися марионетками того или иного 'янки'-лобби, массы Америки уже сыты по горло. Каждый день все больше рабочих присоединяются к борьбе на этом фронте империализма, и, если верить нашим товарищам, весь континент находится на расстоянии одного толчка от Освобождения. Переполненная аудитория с нетерпением слушала героические рассказы патагонских революционеров, последние новости из еще свежей никарагуанской революции или рассказы ветеранов Мексиканской революции, которая вдохновила всю Латинскую Америку. Делегаты из других стран, таких как Бразилия или Куба, предоставляли подробные доклады о состоянии пролетарской борьбы в своих странах, и многие из них с большим оптимизмом смотрели на свои перспективы в ближайшие годы."
 france_events.50.a: "Начнём взращивание синдикализма в Латинской Америке."
 france_events.50.b: "Мы должны строить синдикализм в другом месте, мы должны расставлять приоритеты."
 
 france_events.51.t: "Роль женщин в мировой революции"
 france_events.51.d.FRA: "Сегодня выступила британская феминистка Хелен Кроуфорд со своей пламенной речью о роли женщин в мировой революции. По её мнению, без участия женщин в промышленности и вооруженных силах будет невозможно победить многочисленных врагов пролетариата. Однако если мы прислушаемся к этому призыву, то это, вероятно, вызовет некоторое возмущение среди более 'консервативных' элементов общества."
 france_events.51.d.other: "Сегодня выступила британская феминистка Хелен Кроуфорд со своей пламенной речью о роли женщин в мировой революции. По её мнению, без участия женщин в промышленности и вооруженных силах будет невозможно победить многочисленных врагов пролетариата. Хотя наша делегация полностью согласна с ее посланием, некоторые опасаются, что еще слишком рано действительно выдвигать вопрос об освобождении женщин и что формальное подтверждение выступления, является всего лишь ненужным внутренним беспокойством."
 france_events.51.a: "Соучастие женщин необходимо для достижения мировой революции."
 france_events.51.b: "Смелая женщина, но мы не будем отвечать."
 
 france_events.52.t: "Роль женщин в Мировой революции"
 france_events.52.d: "Вчера выступила Хелен Кроуфорд со своей пламенной речью о роли женщин в мировой революции. По её мнению, без участия женщин в промышленности и вооруженных силах будет невозможно победить многочисленных врагов пролетариата. Каким бы заманчивым этот призыв ни казался, политический климат в Британии не готов к такому решению - нам нужно дождаться осеннего Конгресса тред-юнионов, чтобы протолкнуть этот вопрос."
 france_events.52.a: "Так тому и быть."
 
 france_events.53.t: "Запрос французской поддержки в Рисорджименто"
 france_events.53.d: "Сегодня у наших делегатов на Конгрессе Третьего Интернационала появилась возможность выступить и обратиться с просьбой о международной поддержке наших усилий по воссоединению. Министр иностранных дел считает, что французская поддержка Рисорджименто может иметь ключевое значение в его успехе из-за возможного австрийского вмешательства."
 france_events.53.a: "Запросим поддержку для достижения Рисорджименто!"
 france_events.53.b: "Есть более важные вопросы."
 
 france_events.54.t: "Политика относительно Апеннинского полуострова"
 france_events.54.d: "Делегаты Итальянской социалистической республики выступили перед Первым конгрессом Интернационала с просьбой о поддержке своей страны в её усилиях по объединению всего Апеннинского полуострова против предателей за линией По, Королевства обеих Сицилий и их теократического вассала. Участие Италии в распространении революции может принести свои плоды, но также может привести к конфликту с реакционной Австрийской империей, защищающей миланский режим."
 france_events.54.a: "Обещайте нашим туринским друзьям, когда потребуется, помочь."
 
 france_events.55.t: "Мировой экономический кризис и роль Третьего Интернационала"
 france_events.55.d: "С крахом Берлинского фондового рынка, вспыхнула массовая безработица в Европе и Южной Америке, и в результате профсоюзы начали своё усиление на обоих континентах."
 france_events.55.a: "Решающая возможность!"
 
 france_events.56.t: "Состояние индийского социализма"
 france_events.56.d: "Пока Конгресс подходит к концу, начал выступать молодой Джавахарлал Неру, чтобы объяснить шаткое положение нашего революционного правительства. В своей речи он настоятельно призвал к международной поддержке в создании народной армии, которая могла бы противодействовать нашими делийским и хайдарабадским врагам."
 france_events.56.a: "Нам нужна международная поддержка в организации нашей армии!"
 france_events.56.b: "Нет, нам и так хорошо."
 
 france_events.57.t: "Коммуна Бхарата просит поддержки"
 france_events.57.d: "Коммуна Бхарата попросила поддержки в своей борьбе против делийских и хайдарабадских соседей. Они хотели бы, чтобы мы послали своих военных советников для подготовки их лидеров и войск."
 france_events.57.a: "Пошлём военных советников для обучения их армии!"
 france_events.57.b: "Мы не можем тратить наши ресурсы."
 
 france_events.58.t: "Товарищ Сейл Мохамед хочет высказаться"
 france_events.58.d: "Товарищ Сейл Мохамед, выдающийся алжирский социалист, был допущен к выступлению перед собравшимся Конгрессом. Он выступил с воодушевляющей речью о ситуации в Марокко и во Французской Африке, где арабский труд подвергается жестокому обращению и эксплуатации на благо богатого и колониального истеблишмента. Сейл призвал Конгресс немедленно положить конец этой ситуации. Он предложил создать Социалистический антиколониальный комитет, который будет работать над обеспечением местных синдикалистских антиколониальных заговорщиков в Северной Африке."
 france_events.58.a: "Мы с радостью поддержим создание Комитета."
 
 france_events.59.t: "Конец девятого Конгресса"
 france_events.59.d: "Девятый конгресс Третьего Интернационала наконец-то подошел к концу. Насыщенный событиями и эмоциями, еще раз укрепивший сплоченность международного социалистического движения и определивший его курс на ближайшее будущее, он может быть назван только успешным. Последнее голосование делегатов касалось места проведения следующего конгресса, и хотя было предложено множество городов, в итоге было решено, что он пройдет в Лондоне, другой великой социалистической столице. Многие делегаты выступили с последними словами и поблагодарили своих товарищей.\n\nПосле возвращения домой делегатам придется бороться с последствиями одного из величайших событий со времен революций, безусловно, предоставившего возможность для решительных действий. Но перед этим была организована церемония их проводов. На холме Монмартр, месте рождения Парижской коммуны 1871 года, было предоставлено большое представление, открытое для публики, демонстрирующее лучших французских артистов, региональные костюмы и традиции, а также спортивные подвиги и технологические инновации. После этого для многочисленных делегатов был организован грандиозный банкет с блюдами со всех уголков Коммуны, который продолжался до глубокой ночи. Конечно, гости завершили этот опыт радостного социалистического единения единственным возможным способом: с гордостью спев 'Интернационал'."
 france_events.59.a: "А завтра Интернационалом будет человечество!"

 france_events.61.t: "Первый ход синдикалистов"
 france_events.61.d: "Красные организовали съезд для координации своей деятельности, которая определённо направлена против порядка, который мы установили в Европе после нашей победы в Вельткриге. Мы должны внимательно следить за этой встречей и разбирать её результаты!"
 france_events.61.a: "Следить за ними!"
 
 france_events.62.t: "Французская военная поддержка"
 france_events.62.d: "После того как наши делегаты на Девятом конгрессе Третьего Интернационала обратились с просьбой о военной поддержке для организации Индийской революционной армии, Британский союз и Французская Коммуна решили направить высокопоставленных военных должностных лиц и экспертов для обучения наших главных офицеров. Надеемся, что это сотрудничество принесёт положительные результаты на полях сражений!"
 france_events.62.a: "Красная армия найдёт этим товарищам хорошее применение!"
 
 france_events.63.t: "Подъем Социалистического Антиколониального Комитета"
 france_events.63.d.NFA: "Наши специалисты по контрразведке отметили недавний всплеск синдикалистской деятельности в нашей стране. Мы знаем, что Французская Коммуна совместно с Британским Союзом создали Антиколониальный Комитет в Интернационале. Этот комитет при содействии предателя алжирского народа, проживающего во Франции, Мохамеда Саиля координирует усилия синдикалистов по поддержке антиколониальных настроений в наших африканских владениях.\n\nСиндикалистские державы направили значительное количество оружия и материалов в поддержку туземных мятежников. Они также открыли несколько тренировочных лагерей в своих самых южных районах страны. В то время как более забывчивые политики нашей страны верят, что ничего из этого не выйдет, наши генералы предупреждают нас, что мы должны быть осторожны."
 france_events.63.d.GER: "Пришло сообщение. Французская Коммуна, наряду с другими членами Интернационала, создала Социалистический Антиколониальный Комитет. Целью комитета является поддержка дела арабов и африканцев в освобождении их родины от рук колониальных держав, в частности, остатков французского государства.\nЭтот орган будет координировать действия Синдикалистских держав в Северной и Западной Африке. По данным нашей разведки, на французскую территорию также прибывает небольшой приток египетских левых радикалов, которые хотят бороться за революционное дело. Пока мы не воюем ни с Французской Коммуной, ни с какой-либо другой синдикалистской страной, мы должны быть очень осторожны."
 france_events.63.d.OTT: "Сообщение распространилось от немецких агентов во Франции. Французская Коммуна, наряду с другими членами Интернационала, учредила Социалистический Антиколониальный Комитет. Цель комитета - поддержать дело арабов и африканцев в освобождении их родины от рук колониальных держав, в частности, остатков французского государства.\nЭтот орган будет координировать действия Синдикалистских держав в Северной и Западной Африке. Насколько бы нас не радовало колониальное господство над нашими бывшими территориями в Северной Африке, эта инициатива вызывает беспокойство. Вполне вероятно, что Коммуна будет бороться за то, чтобы выдвинуть революционеров и националистов, симпатизирующих синдикализму. Эта инициатива также играет роль в попытке Египта укрепить арабский национализм на Ближнем Востоке и в Северной Африке и может укрепить нашего соперника. По этим причинам мы должны проявлять осторожность, даже если мы не станем главной мишенью."
 france_events.63.d.SPA: "Сообщение распространилось в Испанию. Французская Коммуна, наряду с другими членами Интернационала, создала Социалистический Антиколониальный Комитет. Целью комитета является поддержка дела арабов и африканцев в освобождении их родины от рук колониальных держав, в частности, остатков французского государства.\nЭтот орган будет координировать действия Синдикалистских держав в Северной и Западной Африке. Будем надеяться, что мы не станем одной из его целей, так как сейчас у нас есть другие, более важные вопросы."
 france_events.63.a: "Тревожное развитие событий."
 
 france_events.64.t: "Создание Социалистического Антиколониального Комитета"
 france_events.64.d: "Наши товарищи во Франции недавно основали Социалистический Антиколониальный Комитет. При поддержке алжирского революционера Мохамеда Саиля, Комитет стремится помочь националистическим и синдикалистским революционерам во всей Африке и уничтожить все колониальные правительства. Однако, даже если официально об этом ничего не было сказано, очевидно, что Комитет напрямую нацелен на реакционное французское правительство в Алжире, которое испытывает трудности с управлением своими колониальными владениями.\n\nФранцузы пригласили нас принять участие в работе Комитета и помочь в отправке снаряжения, оружия и пропаганды, на что мы с радостью согласились. Вместе мы сильнее, и скоро сможем освободить всех африканских рабочих из-под контроля империалистов!"
 france_events.64.a: "Солидарность навсегда!"
 
 france_events.65.t: "На чем должен сосредоточиться Комитет?"
 france_events.65.d.default: "Комитет был созван сегодня в Париже. За столом заседания присутствуют французские, британские, алжирские, сенегальские или даже тунисские представители с целью обсуждения вопроса дня. До этого было принято решение о проведении крупной операции против французского правительства в Алжире с целью ослабления их власти над Африкой. Однако оставалось только обсудить, как именно мы собираемся им навредить. Нашим вариантом может стать начало волны саботажа и мятежных ударов по их промышленности, мощная поддержка повстанческих элементов в определенном регионе, или более равномерное разжигание беспорядков по всей Африке с использованием крупной пропагандистской сети. Что же нам делать?"
 france_events.65.d.collapse: "Комитет был созван сегодня в Париже. За столом заседания присутствуют французские, британские и алжирские представители для обсуждения вопроса дня. До этого было решено провести большую операцию против остатков французского правительства в Алжире, чтобы ослабить то, что осталось от их власти над Африкой. В конце концов, было решено, что в этой ситуации единственный разумный вариант - начать волну забастовок и саботажа, чтобы навредить их промышленной базе."
 france_events.65.a: "Ослабить их промышленный потенциал"
 france_events.65.b: "Поддерживать повстанческие элементы"
 france_events.65.c: "Распространение волнений по всей Французской Африке"
 
 france_events.66.t: "Волна саботажа"
 france_events.66.d: "Без предварительного уведомления в некоторых наших промышленных базах началась большая волна ожесточенных забастовок. Эти забастовки отличаются от тех, к которым мы привыкли, они проводятся лишь небольшой частью рабочих и, похоже, не имеют четкого мотива, начальники заводов по всей стране просыпаются на оккупированной фабрике и с большим количеством разбитого оборудования. На других фабриках рабочие не занимали завод, но большая часть техники все же была найдена поврежденной или уничтоженной. Подавить забастовки и арестовать их участников было не так уж и сложно, но похоже, что это был выстрел в темноту, так как эти инциденты были четко продуманы из других мест..."
 france_events.66.a: "Проклятые коммунары!"
 
 france_events.67.t: "Синдикалисты разжигают восстание"
 france_events.67.d: "Колониальные власти и Второе Бюро сообщили нам о необычном притоке оружия и снаряжения в одну из наших колоний в последние недели. Очевидно, что все это исходит от Французской Коммуны, использующей темноту ночи для контрабанды оружия на нашу территорию, дестабилизирует нашу обстановку и подстрекает к мятежу. Однако мы слишком долго разоблачали эту схему, и теперь революционеры вооружены настолько, что их сопротивление становится все более весомым. Нам остается только надеяться, что мы сможем пережить этот шторм."
 france_events.67.a: "Предатели повсюду!"
 
 france_events.68.t: "Кампания Несогласных"
 france_events.68.d: "В последние недели мы заметили возросшую пропагандистскую активность, исходящую от националистических и синдикалистских агитаторов. Похоже, что их вдруг снабдили десятками тысяч листовок и заранее подготовленных радиопередач, распространяя по всей Африке свои слова о неправомерных действиях нашего режима. Пропаганду, тем более, когда ее поддерживает Французская Коммуна, трудно остановить, мы не можем конфисковать каждую листовку, распространяемую в наших колониях. Однако это не совсем проигранная битва, поскольку мы можем попытаться сосредоточиться на конкретном регионе, в котором наши агенты отключат радиоприемники и конфискуют каждый подозрительный документ. Сделав это, мы по крайней мере, сможем уменьшить последствия кампании в одном или двух регионах по нашему выбору..."
 france_events.68.a: "Сосредоточиться на Тунисе"
 france_events.68.b: "Сосредоточиться на Мавритании и Южном Алжире"
 france_events.68.c: "Сосредоточиться на Сенегале и Гвинее"
 france_events.68.e: "Сосредоточиться на Судане и Верхней Вольте"
 france_events.68.f: "Сосредоточиться на Чаде и Нигере"
 
 france_events.71.t: "Десятый конгресс Третьего Интернационала"
 france_events.71.d: "С началом Второй гражданской войны в США, а также рядом других конфликтов, готовых вспыхнуть в любой момент по всему миру, Интернационал должен пересмотреть свой подход к мировой революции. Поскольку последний конгресс Интернационала проходил во Франции, многие активисты считают, что было бы лучше сделать Британию следующей принимающей стороной."
 france_events.71.a: "Для нас большая честь принимать у себя Конгресс."
 
 france_events.72.t: "Десятый конгресс Третьего Интернационала"
 france_events.72.d: "Наши британские товарищи подтвердили свою готовность провести Десятый конгресс Интернационала в Лондоне. Коммуне пора подтвердить своё участие."
 france_events.72.a: "Мы будем присутствовать."
 
 france_events.86.t: "Торжественное открытие Десятого конгресса Третьего Интернационала"
 france_events.86.d: "С прибытием всех делегатов в Лондон, Десятый конгресс Интернационала начался с выступления товарища Эрика Блэра. В своей так называемой речи "О щите и мече" он подчеркнул необходимость того, чтобы Интернационал удвоил свои усилия по осуществлению проекта "Дамокл": оружия, способного уничтожить реакционеров раз и навсегда."
 france_events.86.a: "Браво, товарищ Блэр!"
 
 france_events.87.t: "Второй день: Американский вопрос"
 france_events.87.d: "Во второй день участники Конгресса обсудили самый насущный вопрос: развязывание Второй гражданской войны в США. Поскольку Лонг и Федеральное правительство подталкивают ОСА к самообороне, было принято решение выслать дополнительную помощь Риду и его сторонникам."
 france_events.87.a: "Предоставим им ресурсы, станки и оружие."
 france_events.87.b: "Отправить эскадрилью истребителей."
 france_events.87.c: "Организовать волонтерское подразделение."
 france_events.87.f: "Мы ничего не можем дать."
 
 france_events.90.t: "Прибыла французская помощь"
 france_events.90.d: "Наши французские товарищи согласились прислать нам дополнительную помощь. Транспортники, вылетевшие из Мексики, находились под постоянной угрозой со стороны Штатов и Союза, но они недавно прибыли на наши авиабазы и готовы к разгрузке."
 france_events.90.a: "Спасибо, товарищи!"
 
 france_events.91.t: "Прибыла британская помощь"
 france_events.91.d: "Наши британские товарищи согласились прислать нам дополнительную помощь. Транспортники, вылетевшие из Мексики, находились под постоянной угрозой со стороны Штатов и Союза, но они недавно прибыли на наши авиабазы и готовы к разгрузке."
 france_events.91.a: "Спасибо, товарищи!"
 
 france_events.94.t: "Прибыла мексиканская помощь"
 france_events.94.d: "Наши мексиканские товарищи согласились прислать нам дополнительную помощь. Транспортники находились под постоянной угрозой со стороны Штатов и Союза, но они недавно прибыли на наши авиабазы и готовы к разгрузке."
 france_events.94.a: "Спасибо, товарищи!"
 
 france_events.97.t: "Третий день: Речь Хемингуэя"
 france_events.97.d: "С решением американского вопроса, на сцену вышел представитель Синдикатов Эрнест Хемингуэй. Он поблагодарил всех, кто поддержал дело ОСА и призвал весь социалистический мир неустанно бороться с реакционерами. Его выступление было встречено бурными аплодисментами, особенно французской стороной."
 france_events.97.a: "Да, мы можем!"
 france_events.97.b: "Да, мы можем!"
 france_events.97.c: "Да, мы можем!"
 
 france_events.98.t: "Третий день: Речь Хемингуэя"
 france_events.98.d: "Сегодня с речью выступил представитель социалистов на Втором конгрессе Интернационала, Эрнест Хемингуэй, осуждающей наши действия против ОСА и призывающей к усилению поддержки красных в этой войне. Мы должны удвоить наши усилия и сокрушить Рида прежде, чем он получит дополнительную помощь."
 france_events.98.a: "Вперёд!"
 
 france_events.99.t: "Кембриджская конференция"
 france_events.99.d: "Наряду с дебатами в Лондоне состоялась отдельная встреча учёных из Франции и Британии в старинном Кембриджском университете. Было решено, что синдикалистские страны должны объединить свои усилия для разработки оружия, способного защитить революцию от всё более агрессивной империалистической угрозы."
 france_events.99.a: "Знание - сила."
 
 france_events.100.t: "Пятый день: Чилийский запрос международной поддержки"
 france_events.100.d: "Социалистический режим в Сантьяго окружён реакционерами, особенно враждебной Аргентиной. Кажется, что лучший способ защитить наше правительство - обратиться за международной поддержкой посредством Второго конгресса Интернационала."
 france_events.100.a: "Мы не будем одни."
 
 france_events.101.t: "Пятый день: Чили просит поддержки"
 france_events.101.d: "Чилийцы обратились за помощью в усилении своей армии перед лицом враждебных аргентинских империалистов. Гранича практически со всех сторон с врагами, положение Чили может стать чрезвычайно шатким без нашей помощи. Кроме того, они могут оказаться бесценными в деле защиты революции в Новом Свете."
 france_events.101.a: "Мы не можем позволить Чили пасть."
 france_events.101.b: "Увы, мы не можем помогать всем."
 
 france_events.102.t: "[FROM.GetAdjective]ое правительство отказывается помочь!"
 france_events.102.d: "[FROM.GetAdjective]ое правительство отклонило наши просьбы, утверждая, что Чили вполне способна защитить себя и продвинуть революцию в Южной Америке."
 france_events.102.a: "Мы справимся с этим."
 
 france_events.103.t: "[FROM.GetAdjective]ое правительство соглашается помочь!"
 france_events.103.d: "[FROM.GetNameDefCap] согласилась протянуть нам руку помощи. Мы, вероятно, получим груз через несколько дней, когда они закончат его подготовку."
 france_events.103.a: "Замечательно!"
 
 france_events.104.t: "Прибыла [FROM.GetAdjective]ая помощь"
 france_events.104.d: "Помощь, обещанная нам [FROM.GetNameDef], наконец-то прибыла. Хоть это партия и не самых новых и эффективных моделей винтовок, мы всё равно сможем использовать их по назначению."
 france_events.104.a: "Мы найдём им хорошее применение."
 
 france_events.110.t: "Заключительный акт Десятого конгресса Интернационала"
 france_events.110.d: "Со всеми важными решениями, принятыми в течение первой недели, Конгресс перешёл к менее насущным вопросам. После десяти дней переговоров, обсуждений и политиканства участники разработали единый заключительный акт: декларацию вечного братства и готовности противостоять империалистам, где бы они ни находились."
 france_events.110.a: "[FRA_workers_of_the_world_unite]"
 
 FRA_workers_of_the_world_unite_ENG: "Рабочие всех стран, объединяйтесь!"
 FRA_workers_of_the_world_unite_FRA: "Prolétaires de tous les pays, unissez-vous."
 FRA_workers_of_the_world_unite_SPA: "Proletarios del mundo, uníos!"
 FRA_workers_of_the_world_unite_ITA: "Proletari di tutti i paesi, unitevi!"
 FRA_workers_of_the_world_unite_POR: "Proletários de todos os países, uni-vos!"
 FRA_workers_of_the_world_unite_RUS: "Рабочие всех стран, объединяйтесь!"
 FRA_workers_of_the_world_unite_IRE: "A lucht oibre an domhain, aontaígí!"
 
 #france_events.116.t: "Смерть Тома Манна"
 #france_events.116.d: "Том Манн в возрасте 84 лет скончался в своем доме в Грассингтоне, Северный Йоркшир. Его авторитет и влияние в Союзе были беспрецедентными, хотя он ушёл с поста председателя уже почти год назад. Во время похорон председатель БКТ заявил: "Товарищ Сноуден покинул нас, но его идеи будут жить вечно". Церемония стала одним из величайших публичных проявлений патриотизма со времен революции 1925 года."
 #france_events.116.a: "Так проходит мирская слава..."
 
 france_events.117.t: "Смерть Тома Манна"
 france_events.117.d: "Том Манн в возрасте 84 лет скончался в своем доме в Грассингтоне, Северный Йоркшир. Будучи предателем и председателем БКТ, его имя запомнилось среди монархистов как имя нарицательное. Хотя британские социалисты и скорбят о его смерти, в Канаде же его похороны стали единственным лучом света в этой кромешной тьме."
 france_events.117.a: "Дьявол мёртв."

 france_events.124.t: "Прибыла французская помощь!"
 france_events.124.d: "Наши французские товарищи увидели тяжёлое положение испанских рабочих и отправили нам немалое число снаряжения! Также прибыло много добровольцев, готовых бороться за дело международной пролетарской солидарности!"
 france_events.124.a: "Отлично!"
 
 france_events.125.t: "Прибыла французская помощь!"
 france_events.125.d: "Сегодня в аэропорт Сантьяго наконец-то прибыла обещанная нашими французскими товарищами помощь; и тонны техники, станков и стройматериалов ждут нашего решения. Что с ними делать?"
 france_events.125.a: "Используйте её для усиления нашей армии."
 france_events.125.b: "Используйте её для улучшения нашей промышленности."
 france_events.125.c: "Используйте её для укрепления нашей границы с Аргентиной."
 
 france_events.127.t: "Исследовательская организация Всемирного Фаланстера"
 france_events.127.d: "Со временем стало очевидно, что для мировой революции нужно нечто большее, чем просто преданность своему делу. Так как Франция и Британия являются единственными высокоразвитыми социалистическими странами в мире, стало общепризнанным, что именно они должны начать долгосрочную программу помощи в области исследований для других стран. Это положило начало так называемой "Исследовательской организации Всемирного Фаланстера", как ответвлению от самого Всемирного Фаланстера, направленного на оказание технической поддержки социалистическим странам по всему миру. Теперь вопрос заключается в том, должны ли мы присоединиться к ней."
 france_events.127.a: "Звучит неплохо."
 
 france_events.128.t: "Промышленная программа Всемирного Фаланстера"
 france_events.128.d: "Многим в Интернационале стало очевидно, что достаточно развитые синдикалистские страны несут ответственность за оказание промышленной поддержки тем, что не в состоянии обеспечить себя. Теперь нам предстоит решить, должны ли мы проявить солидарность с рабочими всего мира, оказав помощь нашим французским братьям по оружию в осуществлении масштабной программы промышленной помощи."
 france_events.128.a: "Звучит как отличная идея!"
 
 france_events.129.t: "Прибыла помощь от Фаланстера"
 france_events.129.d: "В рамках плана "Всемирный Фаланстер" наши парижские и лондонские товарищи оказали нам очень необходимую помощь. Станки, шахтёрское оборудование, оружие, боеприпасы и многое другое - всё это выгружается в наших портах и аэропортах и входит в оборот по всей стране."
 france_events.129.a: "Отлично!"
 france_events.129.b: "Нам не нужна их помощь."
 
 france_events.130.t: "Якобинская реформация?"
 france_events.130.d: "Получив, наконец, контроль над коммуной, Комитет общественной безопасности, возглавляемый якобинцами, разделился. Радикалы требуют упразднения синдикалистских структур и замещения их Французской коммунистической партией, созданной по образу большевистско-ленинского государства. Однако, вполне возможно, что это сильно разделит Францию, и поэтому многие члены партии предлагают якобинцам продолжать действовать в рамках установленных синдикалистами структур ВБТ и КОБ, постепенно реформируя страну по "истинно" марксистским заветам."
 france_events.130.a: "Старая система будет сметена!"
 france_events.130.b: "Мы реформируем синдикализм изнутри."
 
 france_events.131.t: "Реструктуризация ВБТ и КОБ"
 france_events.131.d: "Синдикалистские структуры постреволюционной Франции реструктуризируются, чтобы лучше соответствовать истинному марксизму, изложенному Французской коммунистической партией. Всеобщая биржа труда преобразована в Съезд народных депутатов, а Комитет общественной безопасности был заменён Советом народных комиссаров."
 france_events.131.a: "Однозначное улучшение."
 
 france_events.132.t: "Роспуск ВКТ"
 france_events.132.d: "Теперь мы примемся за последний оплот синдикализма во Франции - Всеобщую конфедерацию труда: главный синдикат, который долгое время удерживал нас от захвата власти в коммуне. Мы можем, наконец, упразднить их власть, чтобы наш соперник более не мог сопротивляться нашей коммунистической доктрине."
 france_events.132.a: "Они противятся нашей революции."
 
 france_events.133.t: "Сообщения о военных волнениях"
 france_events.133.d: "Наши недавние реформы, принёсшие значительные результаты в направлении Франции на истинный путь социализма, взволновали многих граждан. Теперь до Центрального информбюро доходят сообщения о том, что даже в гаранте целостности страны есть несогласные..."
 france_events.133.a: "Держите ухо востро..."
 
 france_events.134.t: "Леон Блюм и Народный фронт"
 france_events.134.d: "Леон Блюм, ведущая фигура Ортодоксов, начал открыто призывать к формированию коалиции из разрозненных фракций Франции против якобинского правительства, которое, по мнению многих, развратило и предало революцию. Этот Народный фронт, несмотря на сдерживание со стороны многих государственных механизмов якобинцев, уже провёл несколько крупных забастовок и политических митингов в больших городах.\n\nОпасаясь, что этот открытый вызов может привести к прямому соперничеству за правление в коммуне, Центральное информбюро рекомендует, чтобы Совет народных комиссаров арестовал Блюма и всё ещё уважаемого генерала Мориса Гамелена, а также других лидеров Фронта."
 france_events.134.a: "Предайте их суду!"
 france_events.134.b: "Наша доблесть выдержит этих предателей."
 
 france_events.135.t: "Парижское дело"
 france_events.135.d: "Различные лидеры Народного фронта, а также другие их видные потенциальные сторонники, такие как Морис Гамелен были арестованы по обвинению в измене. Парижское дело призвано доказать, что Блюм и его соратники подорвали революцию и "ослабили Францию перед немецким врагом". Блюм, будучи одновременно адвокатом и прекрасным оратором, использовал зал суда, чтобы экспрессивно осудить якобинский режим. Гамелен же всё это время хранил своё молчание, отказываясь признавать за судом право обвинять его.\n\nСуд пошёл явно не по плану, и обвиняемые, несмотря на серьёзные махинации во время разбирательства, успешно доказали свою невиновность и заработали симпатии во внутренней неофициальной и зарубежной прессе. Это стало таким позором для нашего коммунистического режима, что некоторые руководители подумывают о том, чтобы свернуть весь этот процесс. Другие же хотят продолжать его и казнить подсудимых, несмотря ни на что, поскольку они стали слишком опасными, чтобы позволить им выйти на свободу."
 france_events.135.a: "Казнить предателей!"
 france_events.135.b: "Отменить суд."
 
 france_events.136.t: "Антиякобинские беспорядки"
 france_events.136.d: "После казни подсудимых по Парижскому делу город восстал против правительства, хотя без должного руководства или внешней помощи этот бунт будет обречён на провал."
 france_events.136.a: "Уничтожить их!"
 
 france_events.137.t: "Марш Гамелена на Париж"
 france_events.137.d: "До Центрального информбюро доходят сообщения о том, что лояльные части генерала гражданской войны Мориса Гамелена взбунтовались и присоединились к Народному фронту. Он уже идёт на Париж!"
 france_events.137.a: "Мы уничтожим этих мятежников!"
 france_events.137.b: "Мятежники захватили столицу!"
 
 france_events.138.t: "Народный фронт восстанавливает синдикализм"
 france_events.138.d: "Народный фронт захватил Париж и теперь проводит антиякобинские чистки. Коммуны по всей Франции воспользовались этой возможностью, чтобы ликвидировать свои отделения коммунистической партии. Гамелен и Блюм восстановили ранее упразднённые синдикалистские институты, и на срочных выборах Гамелен был избран председателем Всеобщей биржи труда, а Блюм назначен председателем Комитета общественной безопасности."
 france_events.138.a: "Это был последний бой..."
 
 france_events.144.t: "Коммунальные выборы 1941 года"
 france_events.144.d: "Как и планировалось в 1936 году, пятилетний срок работы нынешней Всеобщей биржи труда подходит к концу. Настало время обсудить экономическую и внутреннюю политику, а также внешние вопросы, чтобы ВБТ могла избрать новых исполнительных членов Комитета общественной безопасности."
 france_events.144.a: "Приступим к работе, товарищи!"
 france_events.144.b: "Последняя борьба уже идет, и сейчас не время для мелкого демократизма!"

 france_events.145.t: "Выборы ВБТ 1941 года: Статус армии"
 france_events.145.d: "Прошло пять лет с последней большой реформы революционных вооруженных сил, и французская армия достигла новых высот. Однако различные фракции ВКТ по-прежнему расходятся во мнениях относительно дальнейшего развития гаранта целостности страны."
 france_events.145.a: "Ортодоксы: - Модернизация и оптимизация!"
 france_events.145.b: "Якобинцы: - Нужно более независимое верховное командование!"
 france_events.145.c: "Сорелианцы: - Армия должна полностью подчиняться ВКТ!"
 france_events.145.e: "Анархисты: - Либерализация армии и поощрение добровольческой службы!"
 
 france_events.146.t: "Выборы ВБТ 1941 года: Внутренняя безопасность"
 france_events.146.d: "Поскольку Франции постоянно угрожают как внешние, так и внутренние враги, в ходе выборов был поднят вопрос о нашей внутренней безопасности."
 france_events.146.a: "Ортодоксы: - Народная милиция неплохо справляется!"
 france_events.146.b: "Якобинцы: - Военизированные жандармы будут держать всё в спокойствии!"
 france_events.146.c: "Сорелианцы: - Нужно развязать руки тайной полиции!"
 france_events.146.e: "Анархисты: - Демократизация Народной милиции!"
 
 france_events.147.t: "Выборы ВБТ 1941 года: Внешняя безопасность"
 france_events.147.d: "Пока революция шествует по миру, Центральное информбюро продолжает играть важную роль в политике страны, что, как следствие, горячо оспаривается."
 france_events.147.a: "Ортодоксы: - Текущая система удовлетворительна."
 france_events.147.b: "Якобинцы: - Информбюро должно стать профессиональной."
 france_events.147.c: "Сорелианцы: - Центральное информбюро должно принять тоталистическую доктрину!"
 france_events.147.e: "Анархисты: - Информбюро должна сосредоточиться на поддержке революционеров за рубежом!"
 
 france_events.148.t: "Выборы ВБТ 1941 года: Экономическая политика"
 france_events.148.d: "Синдикалистская экономика существенно улучшила качество жизни народа, но между четырьмя основными фракциями всё ещё есть разногласия относительно её пути развития."
 france_events.148.a: "Ортодоксы: - Идём синдикалистским курсом!"
 france_events.148.b: "Якобинцы: - Нужна централизация!"
 france_events.148.c: "Сорелианцы: - Мы должны сосредоточиться на военной промышленности!"
 france_events.148.e: "Анархисты: - Больше власти кооперативам!"
 
 france_events.149.t: "Выборы ВБТ 1941 года: Внешняя политика"
 france_events.149.d: "Безусловно, для следующего Комитета будет одним из важнейших вопросов, как уследить за радикальными переменами мира. Трудящиеся выступают за дальнейшее сотрудничество внутри Интернационала, а анархисты хотят начать волну освобождения, чтобы уничтожить старый порядок. Вместе с тем сорелианцы и якобинцы придерживаются общих воинственных взглядов."
 france_events.149.a: "Ортодоксы: - Интернационал должен гарантировать мир!"
 france_events.149.b: "Якобинцы: - Достигнем европейского социализма!"
 france_events.149.c: "Сорелианцы: - Реакционеры должны быть полностью уничтожены!"
 france_events.149.e: "Анархисты: - Красный флаг будет развеваться везде!"
 
 france_events.150.t: "Выборы ВБТ 1941 года: Ортодоксы берут большинство"
 france_events.150.d: "По мере подсчёта голосов со всех коммун нашей великой страны становится ясно, что фракция "Трудящиеся" набрала большинство на текущих выборах.\n\nОднако фракция расколота между умеренными сторонниками Леона Жуо и более воинственными членами, собравшихся вокруг Бенуа Фрашона. Вне зависимости от того, кто претендует на лидерство, Французская коммуна точно будет в хороших руках."
 france_events.150.a: "Поздравляем, товарищ Жуо."
 france_events.150.b: "Поздравляем, товарищ Фрашон."
 
 france_events.151.t: "Выборы ВБТ 1941 года: Якобинцы берут большинство"
 france_events.151.d: "По мере поступления голосов из многочисленных коммун нашей великой Федерации становится ясно, что якобинцы получили большинство в Генеральном собрании трудящихся.\n\nДюкло, известный как Красный карлик, сформирует новый Комитет, а новым председателем Всеобщей биржи труда станет Марсель Кашен, давний главный редактор газеты "Юманите". Ожидается, что высшие военные руководители останутся на своих местах."
 france_events.151.a: "Поздравляем, товарищ Деа."
 
 france_events.152.t: "Выборы ВБТ 1941 года: Сорелианцы берут большинство"
 france_events.152.d: "По мере поступления голосов из многочисленных коммун нашей великой Федерации становится ясно, что сорелианцы получили большинство в Генеральном собрании трудящихся.\n\nОжидается, что товарищ Валуа, самый блестящий лидер ортодоксальных сорелианцев, сформирует новый Комитет, а новым председателем Всеобщей биржи труда станет Жорж Валуа, дедушка всех синдикалистов."
 france_events.152.a: "Поздравляем, товарищ Валуа."
 
 france_events.153.t: "Выборы ВБТ 1941 года: Анархисты берут большинство"
 france_events.153.d: "По мере поступления голосов из многочисленных коммун нашей великой Федерации становится ясно, что анархисты получили большинство в Генеральном собрании трудящихся.\n\nАнархисты уже начали создавать советы, а должность председателя, как ожидается, скоро будет упразднена."
 france_events.153.a: "Поздравляем, товарищи."
 
 france_events.154.t: "Выборы ВБТ 1941 года: Никто не добился большинства"
 france_events.154.d: "Поскольку ни одна из фракций ВКТ не добилась большинства, их лидеры начали переговоры о возможности создания различных коалиционных правительств."
 france_events.154.a: "Блок Ортодоксы-Анархисты возвращается к власти!"
 france_events.154.b: "Левые ортодоксы и ортодоксальные сорелианцы формируют коалицию!"
 france_events.154.c: "Жорж Валуа и его тоталистские сорелианцы захватывают ВБТ!"
 
 france_events.155.t: "Коммунальные выборы 1946 года"
 france_events.155.d: "Главная проблема - реинтеграция социал-демократов, ушедших пятнадцать лет назад. Фракция "Трудящиеся", являясь на данный момент самой реформистской партией в ВКТ, хочет продолжить процесс демократизации и настаивает на политике "распростёртых объятий" по отношению к ним. Анархисты, хотя и выступают за либерализацию, против этой политики, как и ныне угасающие сорелианцы. Якобинцы, конечно же, всё ещё хотят большевистскую реформу."
 france_events.155.a: "Побеждают Ортодоксы: - Мы дадим место нашим социал-демократическим друзьям."
 france_events.155.b: "Побеждают Сорелианцы: - Нельзя отходить от революционных ценностей."
 france_events.155.c: "Побеждают Анархисты: - Пролетарской демократии не нужны социал-демократы."
 france_events.155.e: "Побеждают Якобинцы: - Коммуна готова к Конструктивной революции."
 
 france_events.156.t: "Коммунальные выборы 1951 года"
 france_events.156.d: "Тридцать лет прошло с образования Французской коммуны. Наш путь к процветанию и социализму был долгим и трудным. Теперь, когда люди выбирают новое правительство, нашей главной целью является не только развитие синдикализма, но и защита "прав человека и гражданина", таких как демократия и право на счастье."
 france_events.156.a: "Побеждают Ортодоксы: - Демократизация коммуны должна быть постепенной."
 france_events.156.b: "Побеждают Сорелианцы: - Тотализм восторжествует."
 france_events.156.c: "Побеждают Анархисты: - Грядёт общество без государства!"
 france_events.156.e: "Побеждают Якобинцы: - Мы настоящие революционеры."

 france_events.157.t: "Речь товарища Валуа"
 france_events.157.d: "Товарищ Валуа смиренно пришел к представителям трудящихся страны с одной скромной просьбой: дать ему средства для победы в борьбе с врагами Революции. Годы сорелийского правления и рационализация процедур и производства для нужд войны превратили это требование в формальность: Валуа и его правительство уже практически всемогущи. Естественно, вся видимость была тщательно соблюдена: Сорельская риторика - это радикальный синдикализм, и избрание КНС должно было стать реформой в направлении этоса революционных дней. Но медленно, верно, власть концентрировалась в руках сорелианцев. Пролетарская демократия жива, но она служит только одной госпоже: великой исторической, революционной цели всех французов - войне за спасение цивилизации от буржуазного разложения.\n\nВалуа больше по душе вежливые теоретические дебаты, чем великие речи. Его руководство отражает этот темперамент, и, хотя он часто бывает решительным, чтобы не сказать жестоким, у сорельцев довольно спокойный лидер. Товарищ Валуа не обладает задатками диктатора и не желает им быть: он считает себя лишь наделенным случайностями истории ролью недостойного проводника французского пролетариата. Но сегодня Валуа обнаружил в себе ораторское мастерство наравне с величайшими революционными трибунами. Страстно ратуя за предоставление исполнительной власти чрезвычайных полномочий, чтобы раз и навсегда восторжествовала Революция сначала в Европе, а затем и во всем мире, он завершил свою речь обещанием выследить Реакцию, где бы она ни скрывалась, под восторженные аплодисменты. Разумеется, он нашел восприимчивую аудиторию: верующие были очарованы, оставшиеся противники не хотели завтра проснуться от того, что вооруженные товарищи обвинят их в контрреволюционной деятельности. И вот голосование о предоставлении правительству широких чрезвычайных полномочий прошло почти единогласно, под крики восторженных представителей 'Да здравствует товарищ-шеф Валуа!'"
 france_events.157.a: "Смерть Реакции, где бы она ни скрывалась!"

 france_events.158.t: "Восходящее солнце"
 france_events.158.d: "Церемония награждения - частое явление в наши дни, когда наши герои получают заслуженное признание за свои усилия на фронте. Камарад Валуа, жаждущий общения со своими товарищами по оружию, никогда не бывает слишком занят, чтобы отдать им честь, послушать рассказы с фронта, услышать о героическом самопожертвовании товарища. На этот раз это была кавалерийская часть, федеральные драгуны. Хотя времена конников остались позади и теперь это была свирепая механизированная сила, острие копья, вонзенного в омраченное сердце Реакции, дух кавалерии оставался сильным: храбрым или безрассудным, критики сказали бы - аристократическим, но никто не мог отрицать их храбрости. Когда товарищ Валуа осматривал эти войска, его внимание привлекло яркое, кроваво-красное знамя, прикрепленное к ведущему танку: багровое, гордо развевающееся, украшенное огненными лучами солнца, в самом сердце - символы Революции.\n\nНевозможно ошибиться, этот символ был в каждом учебнике истории: это было специальное воспроизведение Орифламмы, священного боевого знамени древних королей Франции, золотое пламя, очищающее их врага, обновленное для служения пролетариату. Когда Валуа поинтересовался этим странным зрелищем, все более нервничающий офицер попытался объяснить, что это не более чем традиция подразделения, инициатива солдат, возрождающих детские мечты о рыцарстве. Он, несомненно, ожидал скандала, а возможно, и наказания, поскольку до того, как товарищ начальника прервал его, он пытался взять на себя всю ответственность. Вместо этого Валуа был полон энтузиазма: в самом деле, что может лучше продемонстрировать революционный характер французской нации, чем укоренить наши символы в символах славных побед наших предков? Француз всегда был движителем истории, и наше прошлое - это не повод уклоняться от него. Вождь был настолько полон энтузиазма, что пообещал, что знамя вскоре будет развеваться рядом с федеральным и красным флагами, вновь став военным знаменем Франции в ее великом цивилизационном долгу."
 france_events.158.a: "Наши товарищи могут не разделять эту точку зрения..."
 france_events.158.b: "Доверяйте безграничному творчеству масс! Вперед, под восходящим солнцем социализма!"

 france_events.159.t: "Париж потерян!"
 france_events.159.d: "Париж, "город огней", колыбель революции и столица Франции, был захвачен врагом! Пока он сталкивается с сопротивлением гражданского населения, мы должны быстро контратаковать и вернуть полный контроль над городом."
 france_events.159.a: "'Рабы восстанут...'"
 
 france_events.160.t: "Освобождение Эльзаса-Лотарингии"
 france_events.160.d: "Мы дошли до бывшей имперской провинции Эльзас-Лотарингии и взяли её под полный контроль. Германия не может устоять перед нашим превосходством, поскольку потерянные земли возвращаются Франции!"
 france_events.160.a: "'Все сплотимся на бой...'"
 
 france_events.161.t: "Празднование Четырнадцатого июля"
 france_events.161.d: "Сегодня во Франции отмечается годовщина штурма Бастилии - первого акта революции 1789 года. В каждой деревне, наряду с обычными гуляниями, пройдут грандиозные празднества: несмотря на социалистическую революцию, четырнадцатое июля остается днем больших народных гуляний. Военные парады и парады ополчения, старинные костюмы, выставки, речи, развлечения и уличные банкеты. Эти торжества считаются особенно важными для укрепления национального единства перед, казалось бы, неизбежным грядущим конфликтом: несмотря на различия, все истинные французы могут проследить свою революционную политику до падения Бастилии."
 france_events.161.a: "Да здравствует память о наших стариках в борьбе!"

 france_events.163.t: "День Труда"
 france_events.163.d: "В 1889 году делегаты Второго Интернационала проголосовали за то, чтобы назначить 1 мая днем мобилизации, который должен повторяться ежегодно. По предложению отца французского марксизма Жюля Гюста, дата была выбрана в память о мучениках Хеймаркетской бойни, убитых за то, что они осмелились требовать восьмичасового рабочего дня. Годы за годами интенсивная мобилизация в этот день приводила к новым уличным столкновениям, а зачастую и к новым жертвам. В этот Международный день трудящихся, вскоре ставший известным как День труда, пролетарии отказывались работать и шли за свои права, размахивая красным флагом, распевая "Интернационал", нося на куртках красный эглантин или ландыш, завернутый в алую ткань, в память о кровопролитии. Этот памятный, оппозиционный праздник, этот день свободы, вырванной из пасти капитала, по праву потряс буржуазию.\n\n После революции Первое мая было объявлено национальным праздником и быстро стало днем больших официальных торжеств и памятных мероприятий, маршей, народных гуляний и танцев. На родине это праздник революции и освобожденных рабочих, за границей - день борьбы, пока однажды ветер революционной свободы не подует на все уголки Земли. Наш народ ликует и помнит о пройденном пути: когда-то на фабриках Революция была лишь мечтой, но теперь она живет, процветает, ее сердце гордо бьется во Франции, вдохновляя всех наших товарищей, все еще находящихся в кандалах."
 france_events.163.a: "Нас ждет триумф в борьбе!"

 france_events.164.t: "Первый Буржский международный фестиваль искусств"
 france_events.164.d: "Сегодня состоялся Первый Буржский международный фестиваль искусств. На нём представлены многие известные синдикалистские картины в стиле реализма, заказанные французским правительством, фреска Диего Ривера, а также многие британские, русские и американские картины. Мероприятие продлится до выходных и привлекло к себе широкое внимание со стороны мировой общественности. Пока мы будем в центре внимания."
 france_events.164.a: "Он будет первым из многих последующих, и правительство об этом позаботится!"
 
 france_events.165.t: "Франция предлагает интернациональный авангард"
 france_events.165.d: "Руководство Франции обратилось к нам с предложением о революции в мировом искусстве, которое создаст новые стили, уникальные в своей новизне и неортодоксальности, невиданных доселе.\n\n Французское правительство считает, что эта инициатива поможет нам в распространении идей революции через мирные меры."
 france_events.165.a: "Запишите и нас!"

 france_events.170.t: "Альянс с Интернационалом?"
 france_events.170.d: "Интернационал, военный альянс передовых социалистических держав мира, осторожно обратился к нам с предложением вступить в его ряды, считая союз с нашей нацией в интересах всех и большим шагом вперед в долгой борьбе за освобождение международного пролетариата. Это предложение имеет неоспоримые преимущества, конечно, мы можем рассчитывать на большую поддержку: помощь против наших врагов и в достижении наших военных целей, защиту, если она когда-нибудь понадобится, и что не менее важно, поддержку в развитии наших вооруженных сил и даже нашей экономики через программу Фаланстера. Однако это предложение сопровождается, возможно, пугающими обязательствами, ставя нас на путь возможного, но определенного конфликта с Кайзером и его союзниками. Как мы должны ответить на их предложение?"
 france_events.170.a: "Сильнее вместе!"
 france_events.170.b: "Если подумать, то нет..."

 france_events.171.t: "[From.GetNameDefCap] принимает!"
 france_events.171.d: "Время радоваться! [From.GetNameDefCap] приняли наше предложение присоединиться к нашему военному альянсу, как мы и надеялись. Этим решением они заверили нас в своей неизменной поддержке как союзников в глобальной борьбе за освобождение рабочего класса, а мы получили ценного союзника против наших бесспорно могущественных врагов. Вскоре многие другие последуют за ними: 'Интернационалом станет человечество'!"
 france_events.171.a: "Превосходно!"

 france_events.172.t: "[From.GetNameDefCap] отказывается!"
 france_events.172.d: "К нашему огорчению, [From.GetNameDef] отказался от нашего предложения присоединиться к нашему военному альянсу. Возможно, его слишком напугала неоспоримая мощь наших врагов, или он просто недостаточно предан борьбе за освобождение пролетариата. В любом случае, хотя это, конечно, прискорбный результат нашей дипломатической инициативы, многие другие присоединятся к нам в этой борьбе: 'Интернационалом станет человечество'!"
 france_events.172.a: "Их потеря."
 
 france_events.200.t: "Проект Дамокл"
 france_events.200.d: "Немецкие шпионы недавно обнаружили документы программы исследований и разработок, спонсируемой членами Третьего Интернационала. Названная 'Проект Дамокл', она представляет собой обширное исследование разрушительной силы ядерного деления с целью создания 'бомб с разрушительной силой, значительно превосходящей все, что известно в настоящее время'. Известный немецкий физик Альберт Эйнштейн ранее предупреждал, что успешная 'ядерная бомба' может даже превратить целые города в пепел.\n\n\nНемецкие спецслужбы поделились информацией об этом проекте со своими ближайшими союзниками, так что, разумеется, теперь об этом знает весь мир. Некоторые отвергают этот проект как детскую фантазию, но многие эксперты опасаются прорыва."
 france_events.200.a: "Если они добьются успеха..."
 
 france_events.301.t: "Конец Третьего Интернационала"
 france_events.301.d: "Война развивалась явно не в нашу пользу. Несмотря на все усилия нас и наших солдат, силы реакции оказались слишком велики для мощи международного пролетариата - терпя долгие неудачи и поражения, британские и французские вооруженные силы неуклонно снижали свою боеспособность на протяжении всей войны. Хотя до сих пор мы сохраняли надежду, что рабочие всего мира еще поднимутся, ситуация достигла такой критической точки, что ни Британия, ни Франция не могут оказать эффективного сопротивления противостоящим силам, и ни один из оставшихся в живых членов Интернационала не обладает необходимой силой и престижем, чтобы сплотить союз - таким образом, Третий Интернационал начал распадаться.\n\nПоследствия этого ощущаются практически сразу - то, что раньше было твердой решимостью никогда не уступать реакционерам, теперь быстро уступило место почти пораженческой позиции, так как союзные повстанцы и правительства все чаще считают наше дело безнадежным и начинают размышлять о том, чтобы либо повесить винтовки, либо искать какие-то условия с врагом, а Фаланстер и другие органы Интернационала в значительной степени прекратили свое существование. Ожидается, что, если не произойдет немыслимого разворота, бывшие члены альянса, находящиеся вне досягаемости вражеских сил, вскоре прекратят открытые боевые действия, в то время как остальные будут вынуждены безоговорочно капитулировать... или иным образом подвергнуться окончательной деблокаде.\n\nКогда пламя революции догорает, а рабочие плачут от отчаяния, остается только найти спасение, какое только возможно..."
 france_events.301.a: "Только не так..."

 INT_collapse_base: "Рожденный из пепла Великой войны, Третий Интернационал за более чем 20 лет стал в равной степени величайшей надеждой мира и его величайшим страхом - альянсом первых социалистических правительств мира с грандиозными амбициями по осуществлению давней мечты о мировой революции трудящихся."

 france_events.302.t: "Крах Интернационала"
 france_events.302.d.germany: "$INT_collapse_base$\n\nОднако немецкий мировой порядок оказался слишком сильным, чтобы его сокрушить - после долгой борьбы Германия и ее союзники теперь контролируют большую часть Великобритании и Франции, а Третий Интернационал и его структуры прекратили свое существование, и ни один уцелевший союзник не смог перевернуть ситуацию. После того, как в течение многих лет мировая революция считалась все более реальной перспективой, теперь она стала невозможной на десятилетия или даже больше - если не навсегда."
 france_events.302.d.entente: "$INT_collapse_base$\n\nОднако изгнанные правительства доказали, что не желают умирать - после монументальных военных усилий Антанта в основном вернулась под контроль Британии и Франции, оставив Третий Интернационал и его различные структуры разрушенными и не имеющими ни одного союзника, достаточно сильного, чтобы объединить их. После того, как в течение многих лет мировая революция считалась все более реальной перспективой, теперь она стала невозможной на десятилетия или даже больше - если не навсегда."
 france_events.302.d.germany_entente: "$INT_collapse_base$\n\nОднако силы старого порядка оказались слишком мощными, чтобы их преодолеть - столкнувшись с врагами со всех сторон, Британия и Франция пали под натиском Германии и Антанты, а Третий Интернационал и его структуры прекратили свое существование, и ни один уцелевший союзник не смог сплотить рабочих всего мира. После того, как в течение многих лет мировая революция считалась все более реальной перспективой, теперь она стала невозможной на десятилетия или даже больше - если не навсегда."
 france_events.302.d.russia: "$INT_collapse_base$\n\nНо хотя они и одержали победу над Германией, именно то, что последовало за этим, стало их гибелью: после разрушительной войны Интернационал не смог одержать победу над своим новым врагом в России и пал в результате вторжения, оставив Третий Интернационал и его органы разрушенными, и без союзников, которые могли оказать серьезное сопротивление. Несмотря на это, поражение Германии привело к тому, что мир, каким мы его знаем, навсегда изменился - так что, хотя мировая революция может закончиться на десятилетия или более, ее наследие - это мир, радикально отличающийся от того, что было раньше."
 france_events.302.d.generic: "$INT_collapse_base$\n\nОднако их враги оказались слишком многочисленными и слишком сильными, чтобы одолеть их: социалистические правительства Великобритании и Франции потерпели поражение, а ни одна из оставшихся сил не смогла взять на себя мантию. Третий Интернационал и его различные органы прекратили свое существование. После того, как в течение многих лет мировая революция считалась все более реальной перспективой, теперь она стала невозможной на десятилетия или даже больше - если не навсегда."
 france_events.302.a: "И что это была за мечта..."
 france_events.302.b: "Мы больше никогда не будем бояться революции."
 france_events.302.c: "Все так, как и должно быть."
 france_events.302.d: "Отдай! Это не правильно! Это было наше!"
 france_events.302.e: "Мы знали, что они случится. Но они могли бы продержаться немного дольше..."
 france_events.302.f: "Сейчас никто не может отрицать, что мы заняли свое место в истории."
 france_events.302.g: "Это предвещает... что-то нехорошее."
 france_events.302.h: "Мы не могли и мечтать о лучшем результате."
 france_events.302.i: "Смерть приходит ко всем, рано или поздно."

 france_events.999.t: "Капиталистическая экономика рушится!"
 france_events.999.intro: "Последние несколько дней рабочие и крестьяне всего мира наблюдали за тем, как банкиры, капиталисты и тираны пытаются поживиться плодами труда рабочих в своих корыстных целях. Они называют это Черным Понедельником, ужасным событием, говорят они! Они говорят, что такой крах был совершенно не ожидаем, что ни один экономист не мог его предсказать! Конечно, рабочие не дураки. Народ видит их ложь насквозь.\n\nКак предсказывал великий философ Карл Маркс, такие крахи являются неизбежным результатом капитализма. По мере того, как капиталисты издеваются над рабочими и пожинают их плоды, они начинают пожирать себя заживо, как бешеные собаки. И все это при том, что они оставляют своих рабочих бороться и умирать в отходах, хватаясь за последний кусок мяса."
 france_events.999.d: "$france_events.999.intro$\n\nНаша нация, однако, отделилась от капиталистического мира и начала строительство истинно народного государства. Поэтому мы остаемся незатронутыми и можем только наблюдать, как страны мира заживо съедаются своими капиталистическими повелителями. Это великое пробуждение для крестьян и рабочих всего мира, и скоро рабочие этих стран начнут организовываться против своих угнетателей. Мы должны стоять рядом и быть настоящим примером для трудящихся всего мира!"
 #CHI has their own unique version of this event.
 france_events.999.a: "Пролетарии всех стран, объединяйтесь!"
 
 france_events.1000.t: "Гамелен марширует по Парижу"
 france_events.1000.d: "Несколько дней назад генерал Морис Гамелен совершил успешный переворот против Якобинского режима Марселя Деа. Хотя это похоже на решительную атаку на демократическую систему Коммуны, многие утверждают, что Якобинцы уничтожили бы демократическую систему, если бы не вмешательство Гамелена. Гамельен пообещал восстановить Францию в традиционном синдикализме, и процесс де-якобиницизации уже идет. До сих пор неизвестно, какими будут его планы. Мы можем только ждать..."
 france_events.1000.a: "Удивительно, мягко говоря."

 france_events.1031.t: "Ортодоксальные синдикалисты избраны во Франции"
 france_events.1031.d: "Французская Коммуна - ведущее социалистическое государство мира, объединенное в федерацию городских коммун и руководимое главным исполнительным органом - Комитетом общественного спасения. Однако с момента своего создания Вторая Коммуна не была единой в своей политике - возникло множество фракций, каждая из которых имела свое представление о том, каким путем должна идти Франция. Поскольку время мести Германии и мировой революции приближается, выборы в КОС 1936 года будут очень важными...\nНа смену опальному Марсо Пиверу пришла его собственная фракция, Ортодоксы, названные [FRA.GetLeader], которые сейчас занимают лидирующие позиции в РСК. Они выступают за расширение демократии и черпают вдохновение в децентрализации Коммуны у британцев."
 france_events.1031.a: "Интересно."

 france_events.1033.t: "Якобинцы избраны во Франции"
 france_events.1033.d: "Коммуна Франции - ведущая социалистическая страна мира, объединенная в федерацию городских коммун и управляемая Комитетом общественного спасения. Однако с момента своего создания Вторая Коммуна не была единой в своей политике - возникло множество фракций, каждая из которых имела собственное представление о том, по какому пути должна идти Франция. По мере того как приближается время реванша против Германии и мировой революции, выборы в КОС 1936 года станут очень важными...\n\nНа смену опальному Марсо Пиверу пришли якобинцы, лидером которых стал [FRA.GetLeader] - экстремистская фракция, выступающая за усиление централизации. В настоящее время они имеют большинство."
 france_events.1033.a: "Интересно."

 france_events.1034.t: "Сорелианцы избраны во Франции"
 france_events.1034.d: "Коммуна Франции - ведущая социалистическая страна мира, объединенная в федерацию городских коммун и управляемая Комитетом общественного спасения. Однако с момента своего создания Вторая Коммуна не была единой в своей политике - возникло множество фракций, каждая из которых имела собственное представление о том, по какому пути должна идти Франция. По мере того как приближается время реванша против Германии и мировой революции, выборы в КОС 1936 года станут очень важными...\n\nНа смену опальному Марсо Пиверу пришли сорелианцы; сорелианцы назначили своим лидером Жоржа Валуа, который теперь имеет большинство в КОС. Сорелианцы являются ортодоксальными синдикалистами и выступают за централизацию с Главной биржей труда ('парламентом') в качестве главного учреждения."
 france_events.1034.a: "Интересно."

 france_events.1035.t: "Анархисты избраны во Франции"
 france_events.1035.d: "Коммуна Франции - ведущая социалистическая страна мира, объединенная в федерацию городских коммун и управляемая Комитетом общественного спасения. Однако с момента своего создания Вторая Коммуна не была единой в своей политике - возникло множество фракций, каждая из которых имела собственное представление о том, по какому пути должна идти Франция. По мере того как приближается время реванша против Германии и мировой революции, выборы в КОС 1936 года станут очень важными...\n\nНа смену опальному Марсо Пиверу пришли анархисты - движение, вдохновленное украинским революционером Нестором Махно. Анархисты теперь возглавляют КОС и выступают за большую свободу регионов и резкое сокращение полномочий КОС."
 france_events.1035.a: "Интересно."

 france_events.1036.t: "Избирательный тупик во Франции"
 france_events.1036.d: "Коммуна Франции - ведущая социалистическая страна мира, объединенная в федерацию городских коммун и управляемая Комитетом общественного спасения. Однако с момента своего создания Вторая Коммуна не была единой в своей политике - возникло множество фракций, каждая из которых имела собственное представление о том, по какому пути должна идти Франция. По мере того как приближается время реванша против Германии и мировой революции, выборы в КОС 1936 года станут очень важными...\n\nЭто было настолько важно, что ни одна из четырех фракций не смогла получить большинство. Как и перед выборами, необходимо найти коалицию, но как это изменит форму политики Коммуны? Только люди в самом КОС знают."
 france_events.1036.a: "Интересно."

 france_events.1037.t: "Девятый Интернациональный Конгресс"
 france_events.1037.d: "Делегаты социалистических движений со всего мира собрались в Париже на очередной конгресс своего движения. Третий Интернационал был создан французскими социалистами после революции 1920 года и с тех пор помогает направлять усилия рабочего движения. В Интернационале доминируют синдикалисты, однако он стремится быть организацией с широкой платформой и поэтому принимает красных всех мастей. Делегаты были встречены военным парадом и зажигательной речью в Версале, одетые по этому случаю в красное.\n\nНа повестке дня - распространение революционного пыла, особенно в Азии и Северной Америке, конфликт в Испании, политика в отношении колониализма и требования к членству в военном союзе Интернационала."
 france_events.1037.a: "Интересное развитие событий."

 france_events.1038.t: "Десятый Интернациональный Конгресс"
 france_events.1038.d: "Девятый конгресс Третьего Интернационала, проходивший в Париже, был посвящен распространению идеологии за рубежом, поддержке социалистических движений и укреплению связей между существующими социалистическими странами. Благодаря успеху конгресса был созван Десятый Интернациональный конгресс, который пройдет в Лондоне.\n\nПредставителей со всего мира встречали салют британской артиллерии, хор шотландских волынок и общий теплый прием. Поскольку Европа все ближе и ближе подбирается к войне, ожидается, что главной темой обсуждения станет военное и экономическое сотрудничество между социалистами, а Франция и Британия снова будут определять политику Интернационала."
 france_events.1038.a: "Интересно."

 france_events.1039.t: "Создание Интернационального Авангарда"
 france_events.1039.d: "Несколько дней назад совместными усилиями Французской Коммуны и Британского Союза была создана программа 'Интернациональный Авангард', целью которой является создание единого художественного стиля для искусства и жанра для музыки, а также новых литературных приемов, каждый из которых должен быть социалистическим, неортодоксальным, антитрадиционалистским и антирелигиозным.\n\nПо сообщениям, в программе будут участвовать художники, писатели и музыканты со всего мира, от США до Южной Африки и Японии. Первый фестиваль, на котором будут представлены плоды этой программы, планируется провести через два года в Каннах. Неужели это рассвет нового, синдикалистского развлечения?"
 france_events.1039.a: "Солидарность навсегда!"

### Decisions ###
 FRA_liberate_europe_category: "Освобождение Европы"
 FRA_liberate_europe_category_desc: "С кайзером навсегда покончено, пришло время разрушить этот мир до основания!"
 
 FRA_invade_liberation_target: "Атака [FROM.GetNameDef]"
 FRA_invade_liberation_target_desc: "[FROM.GetNameDefCap] - слабый и унылый режим, готовый к уничтожению, вперед!"
 
 FRA_internationale_category: "Суть Интернационала"
 FRA_internationale_category_desc: "Союз всех социалистических стран мира представляет из себя великолепное зрелище. Мы будем работать вместе, чтобы сделать мир лучше для всех нас."
 
 FRA_phalanstere_category: "Всемирный Фаланстер"
 FRA_phalanstere_category_desc: "В ходе Десятого конгресса Интернационала, мы приняли решение приступить к реализации амбициозного плана промышленных и экономических инвестиций для всех развивающихся социалистических стран, которые хотят его реализовать. Мы будем работать вместе, чтобы сделать мир лучше для всех нас."
 
 FRA_join_phalanstere: "Присоединиться к Фаланстеру"
 FRA_join_phalanstere_desc: "Научная группа Фаланстер, была создана для объединения ученых из всех государств-членов Интернационала. Мы должны объединить наши знания и внести свой вклад в программу."
 
 FRA_Develop_Country: "Развитие [FROM.GetNameDef]"
 FRA_Develop_Country_desc: "[FROM.FRA_Develop_Country_desc]"

 FRA_Develop_Country_desc_ENG: "Британия, хотя и уступает только нам, все еще нуждается в нашей помощи в восстановлении их потерянной и забытой индустрии, которая когда-то была одной из лучших в мире. С нашей помощью Британия взлетит еще выше, чем ее прославленное прошлое, опозорив капиталистов и империалистов."
 FRA_Develop_Country_desc_SRI: "Наши [SRI.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. Когда Итальянская Республика с австрийской тюрьмой народов за спиной грозно бряцает оружием, покушаясь на реку По, а с юга нависает угроза фанатиков из Сицилии, мы не можем оставить союзников без поддержки."
 FRA_Develop_Country_desc_SWF: "Наши [SWF.GetNameDef]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. Когда фанатики-карлисты и бурбонские империалисты снова готовят испанцам королевский трон, мы не можем оставить союзников без поддержки."
 FRA_Develop_Country_desc_NOR: "Наши норвежские товарищи подали петицию о вхождении во Всемирный Фаланстер. Синдикализм в Норвегии достаточно молод и нов, поэтому в наших лучших интересах пристально содействовать его развитию."
 FRA_Develop_Country_desc_HND: "Наши [HND.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. Когда синдикализму в Индии угрожают империалисты из Дели и реакционеры из Федерации, мы не можем оставить союзников без поддержки."
 FRA_Develop_Country_desc_MEX: "Наши мексиканские товарищи подали петицию о вхождении во Всемирный Фаланстер. Социализм там сильнее, чем когда-либо, и мы были бы глупцами, если бы не закрепили этот опорный пункт свободы."
 FRA_Develop_Country_desc_Central_America: "Наши [FROM.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. Социализм там сильнее, чем когда-либо, и мы были бы глупцами, если бы не закрепили этот опорный пункт свободы."
 FRA_Develop_Country_desc_CEN: "Наши [FROM.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер, после их недавнего объединения. Социализм там сильнее, чем когда-либо, и мы были бы глупцами, если бы не закрепили этот опорный пункт свободы."
 FRA_Develop_Country_desc_Caribbean: "Наши [FROM.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. В условиях, когда социализм в Карибском бассейне сталкивается с нынешней угрозой канадского возмездия, мы были бы дураками, если бы не смогли закрепить эту свободу."
 FRA_Develop_Country_desc_BRA: "Наши [FROM.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. В условиях, когда социализм в Бразилии сталкивается с яростным внутренним противостоянием, целесообразно лишь помочь им в их борьбе."
 FRA_Develop_Country_desc_FOP: "Наши [FOP.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. После разрушений, вызванных Чилийско-Аргентинской войной, они остро нуждаются в нашей помощи, и мы обязаны помочь им в их борьбе."
 FRA_Develop_Country_desc_South_America: "Наши [FROM.GetAdjective]ие товарищи подали петицию о вхождении во Всемирный Фаланстер. В условиях, когда социализм в Южной Америке столкнулся с яростной оппозицией, помочь нашим товарищам в их борьбе уместно."
 
 FRA_help_SWF: "Поставки НКТ-ФАИ"
 FRA_help_SWF_desc: "НКТ колеблется на грани поражения. Необходимо убедиться в безоговорочной победе синдикализма на нашей южной границе."
 
 FRA_mobilise_the_reserves: "Мобилизовать резервы"
 FRA_mobilise_the_reserves_desc: "Несмотря на наши усилия, мы терпим неудачу. Мы должны мобилизовать наши резервы, иначе Коммуна неизбежно падет..."
 
 FRA_help_CHL: "Помочь нашим [FROM.GetAdjective]им братьям"
 FRA_help_CHL_desc: "Во время Десятого Конгресса мы обещали помочь нашим южноамериканским товарищам развивать свою страну и победить реакционное государство Аргентину. Мы не пожалеем средств, чтобы обеспечить их победу и свободу всей Америки. Нет ничего слишком хорошего для наших товарищей!"

 FRA_invite_serbia: "Предложить [From.GetNameDef] альянс"

 FRA_Sabotage: "Инициировать антиколониальные действия в [From.GetNameDef]"
 FRA_Sabotage_desc: "Французские предатели-империалисты слишком долго эксплуатировали коренное население ради своей военной машины и престижа. Мы не позволим им продолжать. Используя Социалистический Антиколониальный Комитет, мы можем организовать операции по восстанию или саботажу во французских колониальных владениях."

 FRA_end_the_algiers_regime: "Покончить с Алжирским режимом"
 FRA_end_the_algiers_regime_desc: "Наконец-то отвратительный империалистический режим, оккупирующий Алжир, уязвим - давайте покончим с этим фарсом раз и навсегда."

