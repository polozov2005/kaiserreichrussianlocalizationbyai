 FIN_sisu: "Сису"
 FIN_sisu_desc: "Сису является уникальным финским выражением жизнестойкости народа страны. Финляндия столкнулась с тяжелыми испытаниями и сделает это снова."
 
 FIN_mounting_dissent_idea: "Нарастающее недовольство"
 FIN_mounting_dissent_idea_desc: "С тех самых пор, как Белая Гвардия победила в 1918 и страной стал управлять немецкий король, среди простого народа с каждым днём всё сильнее нарастает недовольство. Люди раздражены тем, как немцы захватили всё в этой стране, от экономики, до армии и политики. Результатом этого стало всё большая симпатия к разного рода радикалам, что может привести к революции."

