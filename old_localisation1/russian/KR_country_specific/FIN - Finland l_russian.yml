 FIN_join_nordic_federation_desc: "Наши датские, норвежские и шведские товарищи объединились в федерацию. Как одно из скандинавских государств, мы можем в любое время подать заявку на вступление в федерацию, хотя это повлечет за собой отказ от части нашего суверенитета."
 FIN_join_reichspakt: "Вступить в Рейхспакт"
 FIN_join_reichspakt_desc: "С возрождением русской мощи мы не сможем защититься от них в одиночку. Поэтому, несмотря на недавний разрыв с немцами, нам следует возобновить союз с ними, поскольку даже с учетом падения их гегемонии они - наш лучший шанс на выживание."
 FIN_join_internationale: "Вступить в Третий Интернационал"
 FIN_join_internationale_desc: "Финский пролетариат освободил себя от гнёта капитализма, но реакционерная гидра империализма всё ещё угрожает нам. Мы должны присоединиться к нашим братьям из Третьего Интернационала, чтобы вместе стоять горой за будущее всего мира!"

