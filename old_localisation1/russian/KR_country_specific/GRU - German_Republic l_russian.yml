l_russian:

### Renaming Events ###
gru.1.t: "Демократизация нашей администрации"  
gru.1.d: "Чтобы порвать с старым реакционным режимом, мы должны избавиться от их влияния в каждом уголке нашей новой нации. Администрация должна быть демократизирована, учителя переобучены, а армия реформирована. Часть этого процесса — устранить награды, которые они присудили джингоистским убийцам, таким как Отто фон Бисмарк и Пауль фон Гинденбург, среди которых яркие примеры — многочисленные памятники Бисмарку по всей нашей стране, а также город Гинденбург. Наш президент предложил назвать его в честь Карла Маркса, в то время как местные жители предпочли оставить абсурдное имя."  
gru.1.a: "Переименовать в честь Карла Маркса."  
gru.1.b: "Имя, которое будет отражать его промышленное прошлое."

gru.2.t: "Восстановление старого порядка"  
gru.2.d: "После победы над нашими социалистическими врагами пришло время восстановить порядок и на местном уровне. Их режим изменил названия мест, улиц и бульваров, названных в честь героев нашей нации, потому что они считались непропорциональными или контрреволюционными. Их оригинальные названия должны быть восстановлены."  
gru.2.a: "Он должен навсегда оставаться Гинденбургом."

gru.3.t: "Запрос Германии на независимость"  
gru.3.d: "Правительство Германии потратило значительное количество времени на укрепление своей позиции. Кажется, теперь оно больше не рассматривается как наш вассал. Возможно, пришло время полностью предоставить им независимость, свободную от нашего контроля."  
gru.3.a: "Они заслужили это."  
gru.3.b: "Немцам нельзя доверять."

gru.4.t: "Операция: Брудер"  
gru.4.d: "Наш клиент в Германии пытается развязать революцию в Австрии. Их действия, вероятно, приведут к войне между ними и австрийцами. Нам стоит подумать, готовы ли мы к такой войне."  
gru.4.a: "Одобрить операцию."  
gru.4.b: "Сказать им отступить."

gru.5.t: "Операция: Веттер"  
gru.5.d: "Наш клиент в Германии пытается развязать революцию в Польше. Их действия, вероятно, приведут к войне между ними и поляками. Нам стоит подумать, готовы ли мы к такой войне."  
gru.5.a: "Одобрить операцию."  
gru.5.b: "Сказать им отступить."

gru.6.t: "Операция: Швестер"  
gru.6.d: "Наш клиент в Германии пытается развязать революцию в Пруссии, разжигая пламя германского воссоединения. Их действия, вероятно, приведут к войне между ними и правительством Пруссии. Нам стоит подумать, готовы ли мы к такой войне."  
gru.6.a: "Одобрить операцию."  
gru.6.b: "Сказать им отступить."

