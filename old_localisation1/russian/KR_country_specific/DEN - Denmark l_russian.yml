### Ideas ###
 DEN_idea_black_monday: "Экономический кризис в Миттельевропе"
 DEN_idea_black_monday_desc: "Биржевой кризис, поразивший Берлин, вскоре перекинулся и на биржу в Копенгагене. Из-за этого страдает наша экономика!"
 DEN_idea_saving_landmandsbanken: "Спасти Датский Банк"
 DEN_idea_policy_of_non_interference: "Политика невмешательства"
 DEN_idea_agricultural_depression: "Кризис сельского хозяйства"
 DEN_idea_agricultural_depression_desc: "В результате кризиса, который сотрясает Европу, датские фермеры, составляющие значительную часть датской экономики, испытывают проблемы со сбытом своей продукции, а нехватка средств с их стороны распространяет ущерб на другие сектора."
 DEN_idea_interventionist_recover: "Политика экономического вмешательства"
 DEN_idea_interventionist_recover_desc: "Следуя идеям немецких экономистов Тарнова и Бааде, Дания борется с кризисом, инвестируя в общественные работы для стимулирования экономического роста."
 DEN_idea_public_works: "Государственные строительные проекты"
 DEN_idea_public_works_desc: "Датское правительство интенсивно инвестирует в строительные проекты, надеясь этим дать безработным шанс заработать на проживание."
 DEN_idea_weak_krona: "Слабая Крона"
 DEN_idea_weak_krona_desc: "Датская Крона искусственно удешевляется, делая датские товары относительно дешёвыми и увеличивая шансы производителей на рынке."
 DEN_ger_trade: "Торговля с Германией"
 DEN_ger_trade_returns: "Выгода от торговли с Данией"
 DEN_idea_state_relief_programmes: "Государственные программы поддержки"
 DEN_idea_state_relief_programmes_desc: "Несмотря на дороговизну, крупномасштабное вмешательство правительства обеспечило среднестатистическому гражданину достойную жизнь, в то время как наша экономика постепенно возвращается в нормальное русло."
 DEN_idea_universal_healthcare: "Общедоступное здравоохранение"
 DEN_idea_universal_healthcare_desc: "Несмотря на то, что универсальная система здравоохранения является дорогостоящей, она обеспечивает благополучие всех граждан."
 DEN_idea_austerity_recover: "Экономическая политика строгой экономии"
 DEN_idea_austerity_recover_desc: "Сокращая государственные расходы и повышая налоги, Дания надеется восстановить контроль над продолжающимся кризисом."
 DEN_idea_self_sufficient_denmark: "Самодостаточная Дания"
 DEN_idea_confidence_in_government: "Высокая уверенность инвесторов"
 DEN_idea_confidence_in_government_desc: "Усилия датского правительство по увеличению веры инвесторов в Данию увенчались успехом, и они уверены в прибыльности инвестиций в страну."
 DEN_idea_investing_companies: "Частные инвестиции"
 DEN_idea_investing_companies_desc: "Компании инвестируют в Данию, открывая фабрики и магазины, ослабляя последствия осадившего Данию кризиса."
 DEN_idea_strong_krona: "Безопасная крона"
 DEN_idea_strong_krona_desc: "Правительство выделило достаточное количество золотого запаса на стабилизацию датской кроны, что сделало её более привлекательной для инвесторов."
 DEN_idea_private_welfare_system: "Частная система соцобеспечения"
 DEN_idea_private_welfare_system_desc: "Датское правительство поддержало страховые компании, что привело к появлению частной системы соцобеспечения."
 DEN_idea_danish_convoy_development: "Усилия по созданию конвоев"
 DEN_idea_danish_cinema: "Датская киноиндустрия"
 DEN_idea_danish_cinema_desc: "Датчане одними из первых инвестировали в киноиндустрию, и она до сих пор сохраняет большое влияние, даже не смотря на сужение рынка из-за Бабельсберга."
 DEN_idea_danish_defense: "Фокус на обороне"
 DEN_idea_danish_defense_desc: "Дания сфокусировалась на бороне, единственной надежде маленькой нейтральной страны в тени гегемона."
 DEN_idea_danish_defense_2: "Фокус на обороне"
 DEN_idea_danish_defense_2_desc: "С учетом того, что мы уделяем особое внимание надлежащему развитию нашей обороны, вероятность того, что Дания попадет в руки какого-либо иностранного врага, невелика."
 DEN_idea_unwavering_morale: "Непоколебимый дух"
 DEN_idea_unwavering_morale_desc: "Пока у Дании остаются силы она не сдастся! Маленький размер армии будет компенсирован её смелостью!"
 DEN_idea_motorised_military: "Моторизированная армия"
 DEN_idea_motorised_military_desc: "В наш день и век пешая армия будет просто не способна сражаться против армии, стратегически благословлённой автомобилями."
 DEN_idea_preparing_special_forces: "Учреждение специальных сил"
 DEN_idea_preparing_special_forces_desc: "Маленькая и специализированная профессиональная армия является лучшим вариантом для Дании, ведь у нас не хватит населения для создания чего-либо грандиозного!."
 DEN_idea_jaegerkorpset: "Jægerkorpset"
 DEN_idea_jaegerkorpset_desc: "Егерский корпус - элитные силы специального назначения Дании. Он ведет свое происхождение от Зеландского егерского корпуса, созданного в 1785 году для борьбы с угрозами, исходящими из Швеции, Великобритании и Пруссии."
 DEN_idea_terrain_reduction: "Jægerkorpset"
 DEN_idea_terrain_reduction_desc: "Егерский корпус - элитные силы специального назначения Дании. Он ведет свое происхождение от Зеландского егерского корпуса, созданного в 1785 году для борьбы с угрозами, исходящими из Швеции, Великобритании и Пруссии."
 DEN_idea_flyvevabnet: "Flyvevåbnet"
 DEN_idea_flyvevabnet_desc: "Мы объединили воздушные подразделения как армии, так и военно-морского флота в одни отдельные профессиональные военно-воздушные силы, которых будут бояться наши враги."
 DEN_idea_submarines: "Undervands Flåde"
 DEN_idea_submarines_desc: "Дания никогда не сможет построить достаточно большой флот, чтобы конкурировать со своими более могущественными врагами, но флот подводных лодок, способных нарушать торговлю противника, вполне подойдет."
 DEN_idea_doubtful_military: "Расколотая лояльность армии"
 DEN_idea_doubtful_military_desc: "Не все в датской армии в равной степени убеждены в том, что действия короля были правильными."
 DEN_idea_rigsfagforbund: "Rigsfagforbund"
 DEN_idea_rigsfagforbund_desc: "Ригсфагсфорбунд это контролируемый правительством профсоюз Дании, членство в котором является обязательным для всех датчан"
 DEN_idea_restoring_normalcy: "Восстановление нормальной обстановки на рабочих местах в Дании"
 DEN_idea_restoring_normalcy_desc: "Правительство делает все возможное, чтобы убедить владельцев нескольких крупных производственных объектов восстановить нормальную обстановку на рабочих местах."
 DEN_idea_rampant_inflation: "Безудержная инфляция"
 DEN_idea_rampant_inflation_desc: "Решение правительства не вводить локаут вызвало безудержную инфляцию, парализующую экономику до тех пор, пока она не будет взята под контроль."
 DEN_idea_strike: "Локаут"
 DEN_idea_strike_desc: "Чтобы добиться снижения заработной платы и предотвратить инфляцию, правительство убедило владельцев нескольких крупных производств запретить своим сотрудникам входить в помещения."
 DEN_idea_farmers_strike: "Забастовка фермеров"
 DEN_idea_farmers_strike_desc: "В знак протеста многие фермеры отказываются продавать свою продукцию, надеясь, что в результате цены вырастут."
 DEN_idea_opposition_controlled_landsting: "Ландстинг контролируется оппозицией"
 DEN_idea_opposition_controlled_landsting_desc: "Верхняя палата парламента Дании находится под контролем оппозиции, что ограничивает возможности правительства принимать законы."
 DEN_good_infrastructure: "Доступная страна"
 DEN_good_infrastructure_desc: "Наши значительные инвестиции в инфраструктуру нашей страны, которая ранее находилась в относительно плачевном состоянии, окупились. Помимо очевидных экономических выгод, это также означает, что военные могут быть легче собраны и привлечены для обучения."
 DEN_idea_fortification: "Фортификационная кампания"
 DEN_idea_KomF_general_strike: "Руководимая коммунистами всеобщая забастовка"
 DEN_idea_KomF_general_strike_desc: "Коммунистическая федерация объединила трудящихся, чтобы выступить против нового авторитарного правительства, назначенного королем. Таким образом, наша промышленность была остановлена до тех пор, пока не будет покончено с этими головорезами, спонсируемыми Интернационалом."
 DEN_idea_KomF_general_strike_2: "Руководимая коммунистами всеобщая забастовка"
 DEN_idea_KomF_general_strike_2_desc: "Коммунистическая федерация продолжает борьбу против нашего королевского и законного правительства. Наши храбрые солдаты уже заставили рабочих вернуться на фабрики, а некоторые оппозиционеры были арестованы. Однако основное руководство оппозиции остается на свободе."
 DEN_idea_KomF_general_strike_3: "Руководимая коммунистами всеобщая забастовка"
 DEN_idea_KomF_general_strike_3_desc: "Всеобщую забастовку Коммунистической федерации в основном удалось сдержать благодаря этим отважным людям, преданным делу охраны и безопасности Дании. С падением последних оставшихся лидеров тиранической Коммунистической федерации Дания может вздохнуть с облегчением, поскольку она постепенно возвращается к нормальному функционированию."
 DEN_idea_reform_relics: "Пережитки государства всеобщего благосостояния"
 DEN_idea_reform_relics_desc: "Под давлением радикально настроенных членов КНП Пюршель решил начать отменять многие реформы, проведенные Стаунингом. Хотя поворот времени вспять только сделает наш режим еще более непопулярным, это необходимый шаг для пресечения эксцессов в стране."
 DEN_idea_the_king_and_his_country: "Король и его страна"
 DEN_idea_the_king_and_his_country_desc: "Дания больше не будет бороться против тяжелого положения трудящихся, и они больше не будут объединяться против того, что дано Богом. Король Кристиан X поведет Данию в новый золотой век, и его добрая страна поможет ему в достижении этой цели. Вся Дания - его телохранитель!"
 DEN_idea_royal_conscription: "Королевский призыв"
 DEN_idea_royal_conscription_desc: "Никогда не настанет такого времени, когда Дания, оказавшись в состоянии войны, будет удовлетворена своеим призывом. Отечество может быть маленькой страной с ограниченными возможностями для набора трудоспособных мужчин, но это не повод для того, чтобы сдерживаться. Дании сейчас нужны ее сыновья, и эти храбрые новые солдаты станут мечом и щитом святой Дании.."
 DEN_idea_opposition_in_open_protest: "Оппозиция в открытом протесте"
 DEN_idea_opposition_in_open_protest_desc: "Очередной попытке подорвать датскую демократию было позволено увенчаться успехом. В то время как новое правительство заявило о своей приверженности делу поддержания демократии, оппозиция во главе с Торвальдом Стаунингом выступила с протестом против нового правительства консерваторов. Это вызвало чрезмерное волнение среди людей, и было бы разумно сделать все возможное, чтобы развеять их опасения."
 DEN_idea_spectre_of_danish_democracy: "Призрак датской демократии"
 DEN_idea_spectre_of_danish_democracy_desc: "Несмотря на все усилия Вестергаарда, стремление к возвращению демократии в Данию бесконечно. Несмотря на подавление открытых протестов оппозиции, шаги предпринимаются в тумане, и если в Данию вернется мир, возможно, правлению Вестергаарда придет бурный конец."
 DEN_idea_total_devotion: "Абсолютная преданность"
 DEN_idea_total_devotion_desc: "Наши солдаты должны сражаться с подобающей честью и славой, потому что они так хорошо сражаются, служа своему королю. Не имея себе равных на поле боя, мы должны прививать им чувство верности наряду с сильным чувством долга и ответственности."
 DEN_idea_intolerable_rule: "Невыносимое правление"
 DEN_idea_intolerable_rule_desc: "Принятое решение о постоянном воздержании от восстановления демократии и продолжения правления лицами, назначенными королем, вызвало значительные волнения по всей стране. В долгосрочной перспективе такое решение, вероятно, плохо отразится на легитимности нашего правления и только усилит недовольство, но пока Дания должна оставаться под властью КНП."
 DEN_idea_industry_rearmament: "Промышленное перевооружение"
 DEN_idea_industry_rearmament_desc: "Меллер планирует перевооружить датскую промышленность с помощью программы переоборудования некоторых гражданских предприятий в военные в течение определенного периода времени. Важно стремиться к соблюдению баланса между производством гражданских товаров и вооружений, чтобы по возможности не нарушать жизнь наших граждан."
 DEN_idea_reassure_rural_supporters: "Успокоить сторонников из села"
 DEN_idea_reassure_rural_supporters_desc: "В старой сельской организации КНП возникли сомнения в приверженности Меллера парламентской демократии. Мы должны заверить их, что по сей день поддерживаем демократию и основополагающие идеалы КФ и что мы не будем следовать автократическому крылу партии."
 DEN_idea_moller_recruitment: "План мобилизации Меллера"
 DEN_idea_moller_recruitment_desc: "План Меллера предусматривает постепенный призыв населения на военную службу в соответствии с различными потребностями наших и без того малочисленных вооруженных сил, чтобы мы могли лучше подготовиться к предстоящим сражениям."
 DEN_idea_westergaard_recruitment: "План вербовки Вестергаарда"
 DEN_idea_westergaard_recruitment_desc: "Вестергаард планирует значительно расширить Армию и официально привлечь новобранцев из его рядов для службы в специальных батальонах вооруженных сил. Несмотря на то, что большинство неопытны и молоды, многие из них преданы нашему делу, и мы сможем укомплектовать тысячи человек в течение нескольких месяцев."
 DEN_idea_purschel_support: "Поддержка Пюршеля"
 DEN_idea_purschel_support_desc: "Формальный лидер автократического крыла КФ Виктор Пюршель присоединился к стремлению Вестергаарда к власти. Вестергаард и Пюршель придерживаются схожих взглядов, поэтому вполне естественно, что остальная часть его крыла Консервативной народной партии должна поддержать движение Вестергаарда."
 DEN_idea_chaos_in_copenhagen: "Хаос в Копенгагене"
 DEN_idea_chaos_in_copenhagen_desc: "Возмущение на улицах Копенгагена вылилось в насилие. Мужчины, женщины и дети оказались под перекрестным огнем кровавых протестов, которые, несомненно, окажут длительное воздействие на город в целом."
 DEN_idea_empowered_konservative_ungdom: "Уполномоченные младоконсерваторы"
 DEN_idea_empowered_konservative_ungdom_desc: "Konservative Ungdom (Младоконсерваторы) помогли обеспечить безопасность страны от имены Вестергаарда, но на этом мы не остановимся. Младоконсерваторы будут интегрированы в конкретные бригады наших вооруженных сил, что обеспечит не только лояльность, но и укрепит наши ряды."
 DEN_idea_increased_executive_power: "Усиленная исполнительной власти"
 DEN_idea_increased_executive_power_desc: "Несмотря на то, что Джек Вестергаард по-прежнему связан партией, он стремится увеличить силу своего положения в два раза, постепенно принимая законы, лишающие парламент большей власти и его самого. Умеренные в КНП выразили обеспокоенность, но они мало что могут сделать."
 DEN_idea_protected_markets: "Защищенные рынки"
 DEN_idea_protected_markets_desc: "Обеспечение высокой степени торгового протекционизма важно для поддержки датской экономики и обеспечения стабильности датских рынков даже во время финансовых кризисов."
 DEN_idea_enforced_constitutionalism: "Использовать конституционность"
 DEN_idea_enforced_constitutionalism_desc: "Поскольку Вестергаард не в состоянии бросить вызов датской демократии, настало время применить всю полноту конституционных полномочий. Ничто не остановит этот процесс!"
 DEN_idea_middle_class_investment: "Функциональные инвестиции"
 DEN_idea_middle_class_investment_desc: "Целенаправленные экономические инвестиции, которые помогут нашей основной базе избирателей, повысят наши шансы на победу на будущих выборах, хотя оппозиция, несомненно, наверстает упущенное через десятилетия."
 DEN_idea_venstre_kf_coalition: "Коалиция Venstre-KF"
 DEN_idea_venstre_kf_coalition_desc: "Сохранение нашей коалиции с КФ было важно для обеспечения победы нашей партии на следующих выборах. Хотя многие в Венстре не одобряют требования о перевооружении страны перед лицом предстоящих войн, мы мало что можем сделать, кроме как успокоить их."
 DEN_idea_liberal_coalition: "Либеральная коалиция"
 DEN_idea_liberal_coalition_desc: "Перспектива возобновления сотрудничества Venstre и Radikale Venstre многим за рубежом может показаться крайне странной, учитывая, каким образом Radikale Venstre покинула нашу партию три десятилетия назад. Продолжающиеся переговоры и удовлетворенные требования привели к возобновлению расцвета двух либеральных партий, что может оказаться полезным только для выживания центристской партии Венстре."
 DEN_idea_farmer_support: "Поддержка от фермеров"
 DEN_idea_farmer_support_desc: "Фермеры составляют относительно большую часть избирателей Венстре, хотя массовая индустриализация за последнее столетие ослабила влияние партии. Поддержка фермеров окупится в долгосрочной перспективе, способствуя постоянным победам на выборах."
 DEN_idea_resumed_recruitment: "Возобновление мобилизации"
 DEN_idea_resumed_recruitment_desc: "Дания уже много десятилетий не видела ужасов войны, но, став свидетелем ужасов Вельткрига, Дания должна подготовиться к участию в ней, значительно увеличив численность своих вооруженных сил. К таким усилиям не следует относиться легкомысленно, но они, несомненно, будут популярны у большей части КНП."
 DEN_idea_centre_right_dominance: "Господство правоцентристов"
 DEN_idea_centre_right_dominance_desc: "Объединившись в коалицию, объединяющую умеренные правые силы KF и Venstre, датские правоцентристы, похоже, закрепили свое господство на долгие годы. В то время как Стаунинг и социал-демократы вскоре наберут обороты, как только в Данию вернется мир, Venstre и KF дадут возможность светлого будущего для каждого гражданина Дании."
 DEN_idea_rehabilitate_antimilitarists: "Перевоспитание антимилитаристов"
 DEN_idea_rehabilitate_antimilitarists_desc: "Многие радикалы Венстре отделились от нашей партии десятилетия назад, выступая против милитаризации, вместо этого поддерживая пацифизм и нейтралитет. Хотя Дания неизбежно снова будет втянута в войну, придется пойти на уступки, чтобы вернуть их поддержку и продолжить реформы по модернизации и развитию датской армии."
 DEN_idea_united_liberals: "Обьединенные либералы"
 DEN_idea_united_liberals_desc: "Неожиданным поворотом событий стало то, что собственно Venstre будет реформирована после продолжительных переговоров между Radikale Venstre и самой Venstre, включая выход Дании из военного союза с Германией. Только время может показать, выживет ли "Обьединенная Венстре" еще раз, или в будущем он снова распадется."
 DEN_idea_pure_democracy: "Истинная демократия"
 DEN_idea_pure_democracy_desc: "Крайне левые и правые силы сделают все, что в их силах, чтобы свергнуть датскую демократию. Но сегодня демократия торжествует и продолжает существовать."
 DEN_idea_opposition_anger: "Оппозиционная агитация"
 DEN_idea_opposition_anger_desc: "До сих пор прагматизм Торвальда Стаунинга пользовался двухпартийной поддержкой оппозиции, но его новые поправки к конституции и обещания, данные во время последних выборов, вызывали беспокойство у значительной части оппозиции. Оппозиция открыто предупредила Стоунинга, что поддержка будет снижаться, если Стоунинг слишком далеко отойдет от вышеупомянутого "компромисса", о котором говорилось в его предвыборной речи. Если Стаунинг будет действовать осторожно, его мечты о самом современном государстве всеобщего благосостояния во всем мире осуществятся."
 DEN_idea_extended_pensions: "Расширение пенсионного фонда"
 DEN_idea_extended_pensions_desc: "Чтобы обеспечить более комфортную жизнь на пенсии тем из нас, кто больше не может работать, правительство решило увеличить расходы на финансирование пенсий, как это было предусмотрено в законопроекте К.К. Штайнке о социальной реформе."
 DEN_idea_clarified_social_laws: "Классифицированное социальное законодательство"
 DEN_idea_clarified_social_laws_desc: "Долгое время социальные законы были неорганизованны и разделены почти на сотню различных правил и предписаний, некоторые из которых были утрачены со временем. Благодаря тщательному выявлению и разъяснению этих законов, черты современного датского человека эпохи возрождения станут известны по всей стране."
 DEN_idea_pacified_antimilitarists: "Усмиренные антимилитаристы"
 DEN_idea_pacified_antimilitarists_desc: "Независимо от того, какие средства выберет Дания для своего вооружения, вопрос о том, окажется ли она в состоянии войны или нет, обсуждению не подлежит. Война может замаячить на горизонте в любой момент, и поэтому антимилитаристские элементы, составляющие из Радикальных Венстре и Социал-демократической партии, не должны нам помешать."
 DEN_idea_expanded_welfare_bureaucracy: "Расширенная социальная бюрократия"
 DEN_idea_expanded_welfare_bureaucracy_desc: "Расширение и централизация растущей бюрократии сотворит чудеса с расширением датского государства всеобщего благосостояния и в долгосрочной перспективе станет благом для дальнейшего управления государственными расходами, направленного на улучшение жизни среднестатистического датчанина."
 DEN_idea_modern_welfare_reforms: "Современные реформы социального обеспечения"
 DEN_idea_modern_welfare_reforms_desc: "Успех социал-демократов в переговорах и достижении компромиссов с Радикальными Венстре вылился в то, что навсегда останется современным государством всеобщего благосостояния, образцом для восхищения во всем мире. Продолжающиеся инвестиции и разработка новых социальных законов К.К. Штайнке по мере их реализации только укрепят место социал-демократов в истории Дании."
 DEN_idea_halted_reforms: "Приостановленные реформы"
 DEN_idea_halted_reforms_desc: "К лучшему это или к худшему, но Радикальные Венстре одержаил победу над опозоренной Социал-демократами, а правительство рухнуло из-за непреодолимого давления на экспансивные и агрессивные реформы социального обеспечения. Хотя это новое правительство будет способствовать сохранению духа программы социал-демократов, значительная часть государственного бюджета будет перераспределена и использована с большей пользой по желанию среднестатистического гражданина Дании."
 DEN_idea_defending_the_statsraad_system: "Защита системы Статсраад"
 DEN_idea_defending_the_statsraad_system_desc: "Наша молодая социалистическая республика с момента своего основания подвергалась нападкам со стороны реакционных сил за рубежом. Хотя для достижения целей, поставленных нами на конгрессе Статсраада, потребуются годы, мы должны обеспечить защиту ее идеалов от внешних угроз."
 DEN_idea_true_danish_socialism: "Настоящий датский социализм"
 DEN_idea_true_danish_socialism_desc: "Планы Акселя, поддерживаемые харизматичным лидером фракции DVSP в Федерации, строятся вокруг внедрения системы советов, чтобы покончить с доминированием профсоюзов, а также создания массовой датской партии. Он привлек к себе большое внимание других фракций, и его планы могут дестабилизировать дух товарищества, сложившийся в будущем с момента основания Федерации, но только время покажет, как далеко он зайдет."
 DEN_idea_venstrekommunisme: "Venstrekommunisme"
 DEN_idea_venstrekommunisme_desc: "Venstrekommunisme, или Левые коммунисты, еще одно детище Ларсена. Партийная линия предусматривает предоставление рабочим широкой власти, не позволяя им попасть в ловушку бюрократических профсоюзов. Ларсен не остановится ни перед чем, чтобы помочь превратить Данию в путеводную звезду, с которой будут черпать вдохновение многие другие социалистические движения."
 DEN_idea_bridged_gap: "Преодоление разрыв"
 DEN_idea_bridged_gap_desc: "Чтобы помочь в освобождении трудящихся и способствовать прекращению эксплуатации, Ларсен объявил, что разделение Дании на сельскую и городскую части должно быть ликвидировано. Программы общественных работ будут способствовать подъему всех слоев датского общества. Сельскохозяйственный сектор Дании, в частности, резко сократился в связи с индустриализацией, поэтому ему потребуется особое внимание."
 DEN_idea_red_welfare: "Красное благосостояние"
 DEN_idea_red_welfare_desc: "Коалиция Стаунинга наконец-то завершила реализацию своих планов по созданию датского социального государства с социалистическим уклоном, разработанных с помощью Сигвальда Хелльберга и бывших радикалов из Socialdemokratiet. Реформы социального обеспечения и все новое социальное законодательство К.К. Штайнке прошли без сучка и задоринки, во многом потому, что не было необходимости полагаться на коалицию с Радикалами Венстре или оппозицией в Ландстинге, чтобы парализовать способность правительства принимать законы. Несмотря на нестабильность, Дания стремится к будущему, в котором все граждане будут равны."
 DEN_idea_sailor_socialism: "Моряцкий социализм"
 DEN_idea_sailor_socialism_desc: "Слишком долго моряки, входящие в профсоюз Søfyrbødernes Forbund, страдали от прекращения финансирования флота и перераспределения отраслей промышленности в пользу так называемого государства всеобщего благосостояния. Ричард Йенсен не потерпит этой несправедливости по отношению к самым трудолюбивым и преданным своему делу гражданам Дании, храбрым и молодым морякам. Правительство будет уделять приоритетное внимание укреплению нашего морского потенциала, устраняя при этом историческую несправедливость."
 DEN_idea_endless_revolutionary_struggle: "Непрерывная революционная борьба"
 DEN_idea_endless_revolutionary_struggle_desc: "Ричард Йенсен выступает за бесконечную революционную борьбу, которая выходит за рамки проведения конгресса Государственного совета и его прихода к власти. В отличие от многих других фракций, Йенсен отмечает, что революционная борьба рабочего класса - это непрерывная борьба, и каждый датский рабочий должен быть бдительным."
 DEN_idea_collaborative_community: "Совместное сообщество"
 DEN_idea_collaborative_community_desc: "Прошлое Ричарда Йенсена показывает, как Дания должна стать полностью сплоченным сообществом, которое вдохновляет каждого датчанина помнить о своей преданности друг другу. Датское государство построено на идее, что грех бедности должен быть искоренен; мы должны заботиться о наших соотечественниках и заботиться друг о друге."
 DEN_idea_fs_supremacy: "Господство профсоюзов"
 DEN_idea_fs_supremacy_desc: "Союз профсоюзов, или Fagoppositionens Sammenslutning, теперь будет наделен полномочиями по управлению каждым отдельным профсоюзом в Дании. Хотя отмена независимости многих профсоюзов взволновала многих работников, Кристиан Кристенсен заверил, что FS будет служить органом для поддержания и регулирования развития каждого профсоюза, обеспечивая равные возможности и представительство для датских работников."
 DEN_idea_industrial_freedom: "Промышленная свобода"
 DEN_idea_industrial_freedom_desc: "Многие представители старой гвардии  жалуются на недостаточное представительство всех отраслей промышленности и регулярно обсуждают неравенство, когда речь заходит о представительстве профсоюзов по всей стране. Вводя новые законы и нормативные акты, которые должны регулироваться и поддерживаться Федерацией профсоюзов, Кристиан Кристенсен заявил, что, освободив датскую промышленность, мы освободим и ее работников."
 DEN_idea_sexual_liberation: "Сексуальное освобождение"
 DEN_idea_sexual_liberation_desc: "Сексуальное освобождение, по крайней мере в Дании, не продвинулось вперед с момента своего появления. Кристиан Кристенсен заявил, что настоящее сексуальное освобождение должно начаться немедленно, чтобы решить проблемы, с которыми сталкивается общество."
 DEN_idea_revolutionary_springboard: "Революционный плацдарм"
 DEN_idea_revolutionary_springboard_desc: "Коммунары неоднократно заявляли, что Дания является идеальным революционным плацдармом для экспорта революции на север Скандинавии. Наши товарищи нуждаются в поддержке, даже несмотря на неудачи датского народа."
 DEN_idea_party_state_sycophancy: "Партийно-государственное подхалимство"
 DEN_idea_party_state_sycophancy_desc: "Чтобы добиться свободы для датского рабочего, нужно стать не более чем подхалимом перед государством и партией. Только благодаря искренней преданности и мужеству Дания сможет по-настоящему подавить реакционеров, которые все еще продолжают сопротивляться датскому государству. Регулярные чистки и яркая антикапиталистическая агитация - это средства, с помощью которых датский рабочий освободится от отвратительной системы прошлого."
 DEN_idea_scandinavian_arm: "Скандинавское крыло революции"
 DEN_idea_scandinavian_arm_desc: "Датской армии не хватает многих вещей, и для того, чтобы по-настоящему сражаться с государствами за рубежом, в Европе и по всему миру, датская армия должна быть значительно расширена и модернизирована. К счастью, советники из Франции и Великобритании прибывают массово именно по этой причине."
 DEN_idea_reactionary_backlash: "Ответная реакция консерваторов"
 DEN_idea_reactionary_backlash_desc: "Неудивительно, что агитаторы из Консервативной народной партии во главе с Джеком Вестергаардом начали бои на улицах Копенгагена. Это не только начало дестабилизировать наши усилия по установлению контроля над страной, но и вынудило часть нашей армии расформироваться, чтобы справиться с этой угрозой. Хотя угрозы активного государственного переворота с целью восстановления монархии нет, необходимо приложить усилия для подавления этих повстанцев, чтобы они не привели к краху нашей революции."
 DEN_idea_easy_eco_demand: "Умеренные экономические требования"
 DEN_idea_easy_eco_demand_desc: "Под давлением немецкого посла немцы потребовали от нас перенаправить торговлю в основном в сторону Германской империи, а также предоставить Германии преференциальные торговые соглашения. Хотя эти требования не приведут к полному краху датской экономики и не создадут серьезной нагрузки на нее, они все же являются помехой, с которой нам приходится сталкиваться, чтобы сохранить суверенитет."
 DEN_idea_hard_eco_demand: "Высокие экономические требования"
 DEN_idea_hard_eco_demand_desc: "Если бы не надвигающееся немецкое вторжение, Торвальд Стаунинг, возможно, был бы отстранен от должности за принятие таких требований. В соответствии с этим соглашением четверть датской промышленности направляется на помощь Германии в строительстве военной инфраструктуры, заводов и разработке месторождений природных ресурсов. Это наносит серьезный ущерб датской экономике, но если это означает, что Дания сможет сохранить нейтралитет, то выбора нет."
 DEN_idea_alone_against_all: "Одни против целого мира"
 DEN_idea_alone_against_all_desc: "Наше решение оставаться независимыми и противостоять как реакционерам, так и социалистам было непростым выбором. Правительство находится в процессе подготовки постоянного и активного законопроекта до тех пор, пока Дания остается на передовой, превратившись в одну из последних свободных наций в Европе. Гражданское ополчение, иррегулярные формирования и войска постоянного призыва готовятся по мере того, как каждый гражданин Дании готовится к неизбежному конфликту, если запад или восток начнут применять силу."
 DEN_idea_BOPA_intensity1: "BOPA атакает"
 DEN_idea_BOPA_intensity1_desc: "Датский совет свободы, возглавляемый Берге Хоуманном, активизировал свои усилия, чтобы сорвать продолжающиеся военные действия и освободить Данию от цепей, приковывающих ее к Кайзеррайху. Заявив, что датские граждане связаны с Германией как подданные цепями, они сделают все, чтобы Дания вновь обрела свою свободу, даже если их цель состоит в том, чтобы присоединиться к западному Интернационалу. Косвенно поддерживаемые фракцией "Коммунары" в Федерации, BOPA и Советом свободы станут серьезной проблемой для нас.\n\nУрегулирование этого кризиса потребует либо согласованных усилий армии, либо полиции. Однако полиция не сможет полностью пресечь эту операцию во время войны."
 DEN_idea_army_in_neglect: "Запущенная армия"
 DEN_idea_army_in_neglect_desc: "Датская армия и система обороны Дании в целом страдают от отсутствия контроля со стороны военного руководства. Значительная часть бюджета первоначально рассматривается в Ригсдаге и контролируется министром обороны. В последнее время министр иностранных дел Питер Мунк продолжает препятствовать развитию армии, стремясь в конечном итоге упразднить ее. Следовательно, в то время как правительство имеет возможность без промедления выделять средства на проекты, армия не в состоянии поддерживать оптимальный уровень численности."
 DEN_idea_outdated_navy: "Устаревший военно-морской флот"
 DEN_idea_outdated_navy_desc: "Датский военно-морской флот состоит в основном из старых эсминцев и подводных лодок, и из-за среднего военно-морского бюджета Дании и ее военно-морской промышленности мало что может быть произведено, кроме досмотровых судов. Большая часть парка в его нынешнем виде была переоборудована в соответствии с современными стандартами, но это не говорит о большой пригодности для разработки нового дизайна. Наш флагманский корабль "Педер Скрам" - это реликт времен, предшествовавших "Вельткригу", и в значительной степени устаревший корабль-побратим "Херлуфа Тролле" и "Олферта Фишера", которые были проданы на металлолом из-за катастрофических затрат на их содержание. Руководство военно-морского флота в значительной степени подчиняется воле государственного бюджета, который был направлен на другие экономические и социальные нужды."
 DEN_idea_pacifist_accord: "Пацифистское соглашение"
 DEN_idea_pacifist_accord_desc: "Пацифистское соглашение, или договоренность о нейтралитете, особенно с Радикалом Венстре Питером Мунком, прочно держится при общей поддержке Социал-демократиов и коалиции Радикальных Венстре. Конечная цель - уничтожение армии и достижение истинного нейтралитета по приказу коалиции - сдерживает любые усилия правительства по милитаризации. Оппозиция и даже король Кристиан X осудили необходимость ремилитаризации Дании, сославшись на угрозы синдикалистов в Париже и Лондоне, но социал-демократы и Радикальные Венстре хранят молчание по этому поводу.Коалиция умеренных левых намерена провести новый законопроект о демилитаризации в 1937 году, поскольку он был отклонен несколько лет назад. На данный момент ремилитаризация повлечет за собой серьезные издержки, а призыв на военную службу отменен.§!"
 DEN_idea_pacifist_accord_partial: "Пацифистское соглашение - частично действует"
 DEN_idea_pacifist_accord_partial_desc: "В рамках Пацифистского соглашения действуют многие формы ограничений, но благодаря нашим усилиям Питер Мунк день ото дня все больше убеждается в нашей правоте."
 DEN_idea_pacifist_accord_diminished: "Пацифистское соглашение - ослаблено"
 DEN_idea_pacifist_accord_diminished_desc: "В отношении армии остается всего несколько ограничений, и вероятность того, что Радикальные Венстре наложит вето на введение воинской повинности, становится все меньше. Питер Мунк получил значительную поддержку в переговорах и практически полностью согласился с этим вопросом."
 DEN_idea_delaying_units: "Подразделения поддержки"
 DEN_idea_delaying_units_desc: "Подразделения иррегулярной или легкой пехоты приступили к развертыванию в соответствии с планом Эрика Уитха регулярно укомплектовывать границу такими подразделениями. Несмотря на то, что они не пригодны для ведения боевых действий, весьма вероятно, что им, возможно, придется сражаться с регулярной пехотой, вести артиллерийские обстрелы и даже потенциально участвовать в противотанковых боях. Таким образом, расширение обучения и создание сильных иррегулярных подразделений будет иметь важное значение для нашей армии."
 DEN_idea_aerial_army: "Воздушная армия"
 DEN_idea_aerial_army_desc: "Дания не только расширит свои военно-воздушные силы, чтобы конкурировать с остальной Скандинавией, но и станет боевой силой, с которой нужно считаться. В то время как наша армия может быть сведена к небольшим, элитным, мобильным силам, наши военно-воздушные силы вселят страх в сердца любого, кто осмелится бросить вызов балансу сил в Европе. Таким образом, датские самолеты будут создаваться с учетом того, что военно-воздушные силы - это вторая организованная армия, способная с максимальной эффективностью наносить удары как по суше, так и по воздуху."
 DEN_idea_armour_experiments: "Эксперименты с бронетехникой"
 DEN_idea_armour_experiments_desc: "В настоящее время у Дании мало опыта использования бронетанковых подразделений в военных действиях, и она не предпринимала активных действий в этом направлении из-за дороговизны и неопытности в обращении с подобными образцами техники. Однако исследования по использованию бронетехники в качестве вспомогательного средства пехоты увенчались успехом, поэтому мы создали ограниченное количество единиц бронетехники для поддержки наших войск на поле боя."
 DEN_idea_developed_reserve: "Развитие резервных сил"
 DEN_idea_developed_reserve_desc: "Прямая мобилизация большей части нашего населения неэффективна и потребует больших усилий и борьбы. Вместо вышеупомянутой стратегии мы будем осуществлять непрерывную мобилизацию наших резервных сил, тем самым обеспечивая немедленную доступность датских войск для быстрого и эффективного усиления передовых подразделений.."
 DEN_idea_to_defend_danish_coasts: "Защита датских берегов"
 DEN_idea_to_defend_danish_coasts_desc: "Датский военно-морской флот будет перепрофилирован в военно-морской флот, и полностью сосредоточится на производстве высокоразвитых, дешевых и эффективных кораблей охранения, таких как подводные лодки и эсминцы. Использование наших сильных сторон и направление необходимых ресурсов в военно-воздушные силы и сухопутные войска являются приоритетом, поэтому военно-морской флот справится с поставленной задачей. Адмирал Речницер одобрил эту идею и начнет переориентировать производство на малые корабли, а не на что-либо другое."
 DEN_idea_beyond_danish_coasts: "За датскими берегами"
 DEN_idea_beyond_danish_coasts_desc: "Датский флот должен выйти за пределы датских берегов, и использование крейсеров позволит добиться именно этого. Те небольшие мощности, которые у нас есть, будут направлены на производство мощных крейсеров, которые будут служить в Северной Атлантике и смогут конкурировать с более крупными флотами при ограниченном бюджете. Хотя тяжелые корабли и даже морская авиация доставят немало хлопот, создание обновленного датского флота вполне в наших интересах."
 DEN_idea_developing_naval_theory: "Развитие доктрины флота"
 DEN_idea_developing_naval_theory_desc: "Модернизация датского флота потребует новых учебников и теории о том, как ведется морская война в современную эпоху. Прошли те времена, когда господствовало крупнокалиберное оружие и предпринимались попытки создать большой корабль с самыми мощными орудиями для подавления вражеских атак; тактика и техника постоянно совершенствуются в ходе военно-морских учений."
 DEN_idea_pride_safeguarding: "Защищая нашу гордость"
 DEN_idea_pride_safeguarding_desc: "Гордость нашего флота священна, и многие осуждают тот факт, что он остается в конечном счете уязвимым перед лицом как вражеских кораблей, так и самолетов. У адмиралов Речницера и Веделя разные планы по решению этой проблемы, хотя в конечном счете, какой бы план ни был реализован, он значительно поможет нашим усилиям."
 DEN_idea_ship_aa: "Усовершенствование корабельной ПВО"
 DEN_idea_ship_aa_desc: "Улучшение противовоздушных возможностей навесных зенитных орудий и огневых точек поможет нашим кораблям отражать воздушные атаки палубных самолетов или с континента. Наша близость к базам на севере Германии, норвежскому побережью, а также побережьям Англии и Франции означает, что нашим кораблям, возможно, придется перевозить самолеты из разных стран, поэтому мы должны быть готовы ко всему."
 DEN_idea_heavy_cruiser_spearhead: "Приоритет тяжелых крейсеров"
 DEN_idea_heavy_cruiser_spearhead_desc: "Основным направлением нашей военно-морской мощи будет использование тяжелых крейсеров; они дешевле, чем более крупные корабли, и при этом сохраняют некоторую огневую мощь. Их орудия могут иметь калибр всего около 200 мм по сравнению со средним тяжелым кораблем, который почти вдвое больше, но против экранов и более легких кораблей их снарядов будет достаточно, чтобы обрушить настоящий ад."
 DEN_idea_naval_shellstorm: "Морской шторм"
 DEN_idea_naval_shellstorm_desc: "Для борьбы с вражескими кораблями на Балтике и в Северной Атлантике можно использовать одновременный обстрел нескольких кораблей приличного калибра. Имея достаточную дальность, мы можем застать противника врасплох массированным заградительным огнем, который заставит его дважды подумать, прежде чем вступать в бой с нашим флотом.."
 DEN_idea_convoy_disruption: "Уничтожение конвоев"
 DEN_idea_convoy_disruption_desc: "Уничтожение вражеских конвоев может оказаться полезным для обеспечения безопасности торговли, транспортировки войск или военного имущества. Это особенно полезно для того, чтобы отрезать Скандинавию от запада или проводить ограниченные операции в Балтийском море."
 DEN_idea_kings_mark: "Kongemærke"
 DEN_idea_kings_mark_desc: "Kongemærke или Королевская марка - популярный сувенир, который продается по всей стране в честь 70-летия короля. Этот символ патриотизма по отношению к датскому суверенитету и королю Кристиану X является лишь одной из мер признательности населения, направленной на сбор средств для Фонда короля Кристиана X. В поддержку такой инициативы по всей стране продаются тысячи или сотни тысяч товаров."

##New Denmark ideas##
 DEN_idea_danish_arty: "Улучшенные дальномеры"
 
### Focuses ###
 ## Eco Recovery Tree - Top
 DEN_black_monday: "Черный Понедельник ударил по Дании!"
 DEN_black_monday_desc: "Крах Берлинской биржи обрушил многие сектора датской экономики. Но большая часть нашей экономики завязана на сельском хозяйстве, а значит у нас есть шанс снизить урон, нанесённый кризис воспользовавшись скорым сезоном урожая и интервенцией со стороны правительства, чтобы оживить сельское хозяйство."
 DEN_save_landmandsbanken: "Спасти Landmandsbanken"
 DEN_save_landmandsbanken_desc: "Landmandsbanken, или Фермерский банк, который является крупнейшим банком Дании, и его банкротство может иметь катастрофические последствия для экономики. Благодаря решительному вмешательству правительства и приоритету Landmandsbanken перед другими банками капиталистические финансы все еще можно спасти."
 DEN_prioritise_non_interference: "Принцип невмешательства"
 DEN_prioritise_non_interference_desc: "Согласно либеральным идеалам, банкротство крупных банков является необходимостью, и принуждение правительства взять на себя это бремя приведет к неконтролируемым долгам и ужасным расходам. Сосредоточив наши усилия на действиях после того, как кризис достигнет своей низшей точки, только тогда можно будет начать восстановление экономики."
 DEN_negotiate_with_kf: "Отношения с KF"
 DEN_negotiate_with_kf_desc: "Konservative Folkeparti, или Консервативная Народная Партия, является второстепенной партией, которая все еще пользуется большим влиянием в оппозиции под знаменем коалиции Венстре. Хотя наши основные переговоры ведутся с Венстре, влияние на их партнера по коалиции может оказаться плодотворным, хотя при этом это может расстроить нашу собственную коалицию."
 DEN_positioning_krone: "Положение кроны"
 DEN_positioning_krone_desc: "Наша нынешняя политика в отношении нашей валюты, датской кроны, была поставлена под сомнение в свете резкого обесценивания немецкой марки. Обе фракции парламента высказались за более активный подход к регулированию положения кроны на валютном рынке, а некоторые - за еще более радикальные меры."
 DEN_looming_threat_of_worker_action: ""Надвигающаяся угроза" действий работников"
 DEN_looming_threat_of_worker_action_desc: "Dansk Arbejdsgiverforening, или "Датская ассоциация работодателей", предупреждает наше правительство о том, что продолжающийся экономический кризис может ввергнуть нашу страну в состояние открытой революции. Они просят нас решительно выступить в поддержку права работодателей на прекращение незаконных забастовок любыми необходимыми средствами."
 DEN_bail_out_industries: "Помощь обанкротившимся отраслям промышленности"
 DEN_bail_out_industries_desc: "Промышленность является крупнейшим работодателем нашего времени, обеспечивая работой большую часть населения Дании. Банкротство этих компаний и закрытие предприятий - это не выход для нас прямо сейчас. Если работники останутся без зарплаты, это может не только усугубить нынешний кризис, но и привести к тому, что они попадут в руки экстремистских идеологов."
 DEN_avoid_bailouts: "Избегать финансовых влияний"
 DEN_avoid_bailouts_desc: "В то время как рост безработицы может быть результатом банкротства предприятий, известные политики утверждают, что создание новых предприятий на месте обанкротившихся является истинным решением кризиса. Если правительство позволит свободному рынку действовать, оно вовремя отреагирует должным образом."
 DEN_create_valutacentralen: "Переучреждение валютного центра"
 DEN_create_valutacentralen_desc: "Валютный центр был валютным подразделением Национального банка Дании, которое с 1924 по 1926 год контролировало размер частных валютных авуаров и выступало в качестве органа, ответственного за использование иностранной валюты. При этом она сыграла решающую роль в оказании Дании помощи в восстановлении золотого стандарта, и с учетом наших новых планов в отношении кроны ее восстановление окажет большую помощь."
 ## Eco Recovery Tree - Bottom
 DEN_kanslergaden: "Канслерградское соглашение"
 DEN_kanslergaden_desc: "К сожалению, верхняя палата парламента Дании, Ландстинг, контролируется оппозицией, что затрудняет усилия правительства без поддержки оппозиции. Если мы хотим эффективно противостоять трудностям, вызванным экономическим кризисом, нам придется сотрудничать с ними: давайте пригласим лидеров оппозиции в квартиру Стаунинга в Канслергадене."
 ## Interventionism
 DEN_interventionist_economics: "Интервенционистская экономика"
 DEN_interventionist_economics_desc: "Теории о преимуществах государственного вмешательства в экономику продвигались в кругах немецких социал-демократов, в первую очередь Фрицем Тарновым и Фрицем Бааде. Сдерживание излишеств в нашем банковском секторе, привычки которого с самого начала привели нас к этому беспорядку, в сочетании с широким расширением общественных работ должно возродить экономику Дании. В конце концов, то, что работает в Германии, наверняка сработает и у нас."
 DEN_crackdown_on_lockouts: "Борьба с локаутами"
 DEN_crackdown_on_lockouts_desc: "Воспоминания о предвыборных забастовках остаются яркими, и многие владельцы фабрик теперь нанимают целые группы охраны, готовые в любой момент "закрыть" фабрику, что уже привело к инцидентам с применением насилия как в отношении законных участников забастовки, так и в отношении работников, не имеющих к ней отношения. Это состояние паранойи продолжается уже достаточно долго, и нам следует встретиться с различными организациями работодателей Дании и обсудить, как положить конец такому положению дел."
 DEN_agreement_with_germany: "Поддерживание торговых отношений с Германией"
 DEN_agreement_with_germany_desc: "После того как Британия сгорела в огне революции, Германия и, в более широком смысле, Ближняя Европа стали нашими основными торговыми партнерами. Однако наши товары на этих рынках стоят слишком дорого. Возможно, эту проблему можно было бы решить, отменив те немногие торговые ограничения, которые все еще действуют, и получив разрешение оказывать поддержку нашим собственным фермерам, а не немцам, в обмен на другие уступки."
 DEN_devalue_the_krona: "Девальвация кроны"
 DEN_devalue_the_krona_desc: "Отчасти проблема заключается в том, что датская сельскохозяйственная продукция просто слишком дорога для немцев, страдающих от кризиса. Искусственное занижение курса кроны по отношению к марке позволит немецкому рынку дешевле покупать датскую продукцию по сравнению с другими сельскохозяйственными товарами."
 DEN_public_works: "Программы общественных работ"
 DEN_public_works_desc: "Тратя наши деньги на общественные работы, мы можем трудоустроить людей, которые в противном случае остались бы без работы, а это значит, что у них будут деньги, которые они могут потратить, возвращая рынок к жизни. В довершение всего, мы также сможем улучшить нашу инфраструктуру при относительно низких затратах."
 DEN_state_funded_industry: "Спонсированная индустриализацией государством"
 DEN_state_funded_industry_desc: "После обвала фондового рынка "Черный  большинство людей потеряли свои сбережения, будь то из-за экономического спада или падения цен на акции. Но государство этого не сделало, поэтому оно все еще может оживить экономику, производить инструменты и продукты, необходимые людям, и создавать новые рабочие места для всех с помощью программы быстрой индустриализации и крупных инвестиций."
 DEN_extended_unempl_subs: "Пособия по безработице"
 DEN_extended_unempl_subs_desc: "В результате продолжающегося кризиса многие жители Дании оказались безработными. Раньше эту функцию брало на себя частное страхование, но резкий рост безработицы привел к такому увеличению страховых взносов, что немногие по-прежнему могут себе это позволить. Обязанностью правительства является создание системы социальной защиты."
 DEN_universal_healthcare: "Всеобщая система здравоохранения"
 DEN_universal_healthcare_desc: "Обеспечение охраны здоровья всех людей является главной целью социал-демократического государства. Медицина исторически была дорогой для простого работника, но с теми средствами, которые есть у государства, было бы возможно построить новые больницы и нанять больше медицинского персонала, используя возросший размер сектора здравоохранения для заключения более выгодных контрактов с поставщиками."
 ## Austerity & Foreign Investment
 DEN_madsen_mygdal_plan: "План Мадсена-Мигдаля"
 DEN_madsen_mygdal_plan_desc: "План лидера Венстре Мадсена-Мигдаля, призывает к более сдержанному подходу правительства, сфокусированном на экономии и фискальной ответственности, вместо социал-демократического подхода, который мог бы обречь Данию на большие долги."
 DEN_strengthening_investor_confidence: "Повысить уверенность инвесторов"
 DEN_strengthening_investor_confidence_desc: "Поддерживая наши компании и сохраняя баланс в экономике, мы докажем потенциальным инвесторам что Дания является одной из самых безопасных стран для их денег, даже в эти тяжёлые времена. Прилив финансов на рынок, стоит надеяться, поможет нам вскоре разрешить кризис."
 DEN_loan_to_danish_companies: "Займы датским компаниям"
 DEN_loan_to_danish_companies_desc: "Выдавая займы датским кампаниям напрямую из казны мы сможем поддержать их и позволим им пережить время экономической нестабильности относительно невредимыми, хотя некоторые из долгов наверняка никогда не будут отплачены."
 DEN_strengthen_the_krona: "Усиление кроны"
 DEN_strengthen_the_krona_desc: "Усилив поддержку нашей валюте и этим увеличив её стоимость, мы сделаем ещё один шаг к стабилизации экономики Дании. Также это приведёт к удешевлению импорта, делая их более доступных для простых граждан."
 DEN_encourage_foreign_investment: "Увеличение иностранных инвестиций"
 DEN_encourage_foreign_investment_desc: "Теперь, когда мы доказали иностранцам, что в Данию инвестировать безопасно, мы должны дать им шанс это сделать. Деньги, прибывшие с их инвестициями помогут нам восстановиться от кризиса, столь неожиданно ударившего по Дании."
 DEN_austerity_measures: "Политика жёсткой экономии"
 DEN_austerity_measures_desc: "Мы не можем поддерживать баланс одними налогами: в будущем, эти налоги могут обернуться для нас ещё большим количеством экономических проблем. Траты придётся уменьшить тоже."
 DEN_encourage_unempl_insurance: "Частное страхование по безработице"
 DEN_encourage_unempl_insurance_desc: "Поддерживая страхование по безработице, мы можем гарантировать, что премии не поднимутся до таких крайностей, как это происходило в последние месяцы, не прибегая к излишнему вмешательству государства и не тратясь на субсидирование. Мы обязательно должны поддерживать этот бизнес!"
 DEN_strengthen_mitteleuropa_ties: "Усилить связи с Миттельевропой"
 DEN_strengthen_mitteleuropa_ties_desc: "Хотя, оглядываясь назад, можно сказать, что экономическое сближение с Германией было неудачным шагом, десять лет назад это было необходимо из-за превращения Великобритании и Франции в синдикалистские страны. Это не означает, что мы должны отворачиваться от немецкой сферы - усиление нашей поддержки в Миттельевропе в свое время принесет пользу нашей экономике."
 DEN_beyond_mitteleuropa: "За пределами Миттельевропы"
 DEN_beyond_mitteleuropa_desc: "К лучшему это или к худшему, но мы решили обойти Миттельевропы в пользу расширения торговых сделок с другими странами. В то время как экономика по всему миру переживает спад, будь то из-за Великой депрессии в Северной и Южной Америке или последствий влияния Германии, лучше всего поискать в других странах."
 ## Final Recovery
 DEN_tax_reorganisation: "Реорганизация налогообложения"
 DEN_tax_reorganisation_desc: "Нынешняя система налогообложения в Дании в корне несовершенна, и, хотя политики разных стран будут спорить о ее особенностях, на пороге кризис. Таким образом, обе стороны согласились на компромисс в виде повышения как подоходного налога, так и налогов на потребительские расходы. Это проложит путь к притоку государственных средств для снижения уровня задолженности и расширения участия за счет инвестиций."
 DEN_recovery: "Обьявить завершение кризиса!"
 DEN_recovery_desc: "Благодаря нашей разумной экономической политике Дания полностью оправилась от экономического кризиса. Сейчас, когда безработица снизилась, а доходы, а также доверие населения вернулись на докризисный уровень, мало кто может утверждать, что правительство плохо справилось с событиями, которые были."

 ## Eco Tree
 DEN_invest_in_maersk: "Инвестиции в Маэрск"
 DEN_invest_in_maersk_desc: "Компания ‘Маэрск’ была основана в 1904, и контролирует большую часть кораблестроения Дании. Инвестируя в компанию мы простимулируем расширение торговлю, расширим торговый флот и улучшим инфраструктуру страны."
 DEN_support_nordisk_film: "Поддержать Нордиск-Филм"
 DEN_support_nordisk_film_desc: "Нордиск-Филм является одной из самых старых кинокомпаний мира. Заполучив наши инвестиции, компания сможет создавать быстрее и качественнее. А также фильмы, поддерживающие Данию и её правительство, делая нас популярнее в глазах народа.."
 DEN_reinvigorate_danish_cinema: "Поддержать датский кинематограф"
 DEN_reinvigorate_danish_cinema_desc: "Наши попытки по поддержке кинематографа окупились сполна. Теперь стоит оказать надлежащую поддержку рекламе славных датских фильмов, в первую очередь о бравой армии Дании, всегда стоящей на страже народа."
 DEN_enlarge_industry: "Расширение легкой промышленности"
 DEN_enlarge_industry_desc: "С революциями в Великобритании и Франции, падением Америки и нашим положением внутри Миттельевропы; в Дании наблюдается резкое снижение доступности основных потребительских товаров для большей части нашего населения, увеличивая наше основное промышленное производство, мы можем смягчить наш дефицит, если не устранить его."
 DEN_Fyn_Development: "Проект земельной реформы Фюна"
 DEN_Fyn_Development_desc: "Фюн, будучи третьим по величине островом в нашей стране и в центре нашей нации, имеет почти полностью сельскохозяйственную и сельскую природу. Посредством масштабной земельной реформы и вырубки лесов, Фюн начнет индустриализироваться для удовлетворения потребностей остальной части Дании."
 DEN_Jutland_Development: "Промышленное развитие Ютландии"
 DEN_Jutland_Development_desc: "Ни для кого не секрет, что Датская промышленность мала, особенно по сравнению с другими странами, отчасти ввиду нашего размера. Зеландия уже достаточно индустриализирована, но в Ютландии ещё остаётся много свободного места, которое можно будет использовать для увеличения промышленного потенциала страны."
 DEN_Jutland_Highway: "Ютландская магистраль"
 DEN_Jutland_Highway_desc: "С индустриализацией Ютландии возросла и её потребность в лучшей системе инфраструктуры, для удовлетворения нужд региона. Мы посветим время и деньги для расширения и без того неплохой системы, что окажет поддержку и прочим нашим проектам в регионе."
 DEN_expand_kastrup: "Расширить Каструп"
 DEN_expand_kastrup_desc: "Аэропорт Каструп был построен совсем недавно, но тем не менее является первым гражданским аэропортом в мире и активно используется. С ростом популярности авиации по всему миру мы должны расширить аэропорт для удовлетворения растущего спроса на его услуги."
 DEN_improve_sjaelland_infra: "Расширить инфраструктуру Зеландии"
 DEN_improve_sjaelland_infra_desc: "Проекты и расширения спонсируются по всей стране, и, со временем, пришла очередь Зеландии. С увеличением экономической активности и ростом промышленности в столичном регионе инфраструктура нуждается в расширении, чтобы ускорить транспортировку товаров из и в Ютландию."
 DEN_support_the_tiftp: "Поддержка институт теоретической физики"
 DEN_support_the_tiftp_desc: "Основанный в 1921 году Институт Теоретической Физики Копенгагенского Университета стал маяком науки для всей Европы и лидером в изучении атомной и квантовой физики. Многие учёные Европы посетили его, чтобы встретится с известным Нилсом Бором и ознакомится с его работами. Если мы поддержим институт, то стоит надеяться, они смогут проводить ещё более амбициозные и результативные эксперименты."
 DEN_fund_the_copenhagen_university: "Инвестиции в университет Копенгагена"
 DEN_fund_the_copenhagen_university_desc: "Как и Институт Теоретической Физики, Университет Копенгагена является центром знаний и образования. Поддерживая и финансируя университет, мы дадим ему возможности расшириться и выпускать больше квалифицированных инженеров и учёных на благо Дании."
 DEN_expand_belt_ferry: "Расширить Великий Пояс"
 DEN_expand_belt_ferry_desc: "Паромы Великого Пояса соединяют многие острова Зеландии и позволяют автомобилям и поездам перемещаться между ними. Но на паромы часто поступают жалобы, особенно ввиду их неспособности справиться с трафиком. Развивая систему этих паромов в Зеландии и Ютландии, мы сможем удовлетворить образовавшийся запрос и соединить страну в одно целое."
 DEN_bridge_designs: "Новые конструкции мостов"
 DEN_bridge_designs_desc: "С устареванием паромов люди начали запрашивать соединение Дании мостами. Сейчас у нас нет возможности построить подобные мосты, но со временем и достаточным количеством инвестиций в инженерные разработки, мы можем создать рабочую теорию по постройке подобных мостов."
 DEN_Military_Industry: "Расширение военной промышленности"
 DEN_Military_Industry_desc: "И снова кажется, что пожары войны поглотят Европу. Для того чтобы сохранить независимость, мы должны помочь развить крепкую оружейную промышленность, чтобы наши солдаты всегда имели средства для борьбы."

 ## Mil Tree
 DEN_danish_rearmament_programme: "Датская программа перевооружения"
 DEN_danish_rearmament_programme_desc: "Наша армия сильно устарела, у нее нет многих современных военных средств, таких как пулеметы, и она не смогла бы оказать сопротивление, если бы Дания подверглась вторжению. Чтобы решить эту проблему, мы начнем реформировать структуру нашей армии и приведем ее в соответствие со стандартами 20-го века, чтобы мы могли защитить нашу страну от иностранной агрессии.."
 DEN_focus_on_defensive: "Упор на оборону"
 DEN_focus_on_defensive_desc: "Дания всегда гордилась своим нейтралитетом, и наши небольшие размеры предотвратили бы любые крупные военные нападения на наших врагов. Чтобы противостоять этому, мы сосредоточимся на обороне, построим форты на наших границах и разработаем новую оборонительную тактику, а также напомним нашим солдатам, что, если начнется война, они - единственное, что стоит между их страной и ее разрушением."
 DEN_fortify_jutland: "Укрепить Ютландию"
 DEN_fortify_jutland_desc: "Мы будем укреплять нашу сухопутную границу в Ютландии. Используя узкий фронт, мы сможем организовать эффективную оборону от вторжения по суше, особенно с учетом дальнейшего расширения в ближайшие годы."
 DEN_fortress_sjaelland: "Укрепить Зеландию"
 DEN_fortress_sjaelland_desc: "Нейтралитет Швеции может сохраняться не всегда, поэтому необходимо оборудовать современные укрепления вокруг Копенгагена. Мы должны постараться превратить Сьелланд в крепость, способную отразить любое возможное вторжение и защитить сердце нашей страны."
 DEN_fortress_fyn: "Укрепить Фюн"
 DEN_fortress_fyn_desc: "Фюн - это ступенька к нашему капиталистическому и индустриальному сердцу. Укрепления, расположенные в ключевых стратегических точках по всему острову, гарантируют, что Зеландия всегда будет оставаться вне досягаемости, пока он не падет."
 DEN_utilise_irregular_formations: "Использовать иррегулярные формирования"
 DEN_utilise_irregular_formations_desc: "Генерал Эрик Витт выдвинул идею, которая помогла бы использовать ограниченный кадровый потенциал Дании и ее промышленные мощности. В случае войны на суше, на берегах Дании или на нашей границе с Германией, развертывание легких пехотных дивизий или иррегулярной пехоты позволило бы выиграть время и позволить нашим основным силам организовать традиционную оборону."
 DEN_artillery_improvements: "Улучшения артилерии"
 DEN_artillery_improvements_desc: "Вложения в нашу артиллерию и средства обороны окупились, но еще не полностью. Мы начали оснащать нашу армию более совершенными таблицами стрельбы и дальномерами - эффективность армии как никогда высока."
 DEN_unwavering_morale: "Непоколебимый дух"
 DEN_unwavering_morale_desc: "Пропаганда среди армии и населения творит чудеса. Многие датчане добровольно идут на призывные пункты, чтобы записаться в вооружённые силы для защиты страны."
 DEN_standardised_training: "Стандартизированное обучение"
 DEN_standardised_training_desc: "Идея стандартизированной формы обучения для нашей армии нуждается в переосмыслении и модернизации в соответствии с новой современной эрой ведения войны. Прошли те времена, когда Дания могла по призыву короля собирать полки для сражения с врагом - наша постоянная армия нуждается в постоянной подготовке и усилении для ведения боя в любое время, учитывая состояние мира и его траекторию."
 DEN_doctrinal_advancements: "Улучшение доктрины"
 DEN_doctrinal_advancements_desc: "Основная военная доктрина Дании, возможно, отстает от наших соседей, и поэтому нам следует приобрести новейшие учебники по ведению войны и обеспечить тщательное изучение нашими генералами нового военного искусства. Маршал Приор позаботится о том, чтобы его командование в равной степени располагало средствами для борьбы лицом к лицу с великими державами, даже если нашей армии не хватит мощи, чтобы противостоять им."
 DEN_equipment_upgrades: "Модернизация снаряжения"
 DEN_equipment_upgrades_desc: "Долгое время военные успехи были медленными, и было достаточно иметь хорошую винтовку с затвором. Однако эти винтовки 19-го века совершенно неуместны на поле боя после Вельткрига. Мы должны перестать успокаиваться и приобрести новое снаряжение."
 DEN_motorisation_focus: "Инвестиции в моторизацию"
 DEN_motorisation_focus_desc: "В то время как остальная часть нашей армии претерпела серьезные реформы, материально-техническое обеспечение армии еще предстоит изменить. Инвестируя в моторизацию, мы можем ускорить логистику, а также использовать ее для быстрой переброски войск по всей стране в случае морского вторжения."
 DEN_legged_infantry: "Пехота справится!"
 DEN_legged_infantry_desc: "И хотя некоторые хотят сделать ставку на технику и мобильные войска, наша промышленность и география делают это невозможным. Нам хватит и обычной пехоты."
 DEN_unconventional_warfare: "Нетрадиционная армия"
 DEN_unconventional_warfare_desc: "Дания никогда не сможет создать вооружённые силы достаточно сильные, чтобы заставить гегемоны вроде Франции или Германии подумать дважды, перед тем как вторгаться в Данию; наше население слишком мало. Следует инвестировать в силы, которые смогут сражаться в любых условиях."
 DEN_form_jaegerkorpset: "Подразделения Jægerkorps"
 DEN_form_jaegerkorpset_desc: "Охотничьи отряды существовали в Дании в той или иной форме с 1785, и являются элитными спецслужбами страны. Создав официальный штаб Егерского Корпуса, мы заставим всех считаться с нашим мнением."
 DEN_reestablish_marineregimentet: "Восстановить Marineregiment"
 DEN_reestablish_marineregimentet_desc: "Создав специальный режим тренировок для морской пехоты мы сможем начать подготовку специализированных дивизий, способных положить начало полномасштабному вторжению, захватив плацдарм на побережье."
 DEN_increased_reserve_units: "Увелечить подразделения резерва"
 DEN_increased_reserve_units_desc: "Датские передовые части и подразделения резерва должны быть готовы к ведению современной войны, и крайне важно иметь хорошо укрепленный резерв, способный круглосуточно доставлять свежие войска на фронт. Увеличение резерва и обеспечение наличия большого количества обученных и боеспособных войск для ведения боевых действий в случае, если Дания окажется в состоянии войны, имеет первостепенное значение."
 DEN_offensive_air_efforts: "Боеспособные ВВС"
 DEN_offensive_air_efforts_desc: "Дания должна создать военно-воздушные силы, способные круглосуточно противостоять врагам, и за счет перераспределения средств, которые были скудно выделены на другие цели, достаточное финансирование позволит Дании обзавестись парком истребителей, бомбардировщиков и даже самолетов военно-морского базирования, которые помогут нам справиться с нехваткой промышленности. Благодаря этому нашим элитным силам больше не придется беспокоиться о том, чтобы поддерживать чистоту неба с помощью противовоздушной обороны, поскольку датские ВВС будут совершать полеты изо дня в день."
 DEN_more_special_forces: "Расширение войск спецназначения"
 DEN_more_special_forces_desc: "Несмотря на то, что датская армия, возможно, и невелика, никто не может утверждать, что она не является лучшей в элите. Расширяя программы подготовки наших солдат, мы не только увеличим их численность, но и приобретем способность по-настоящему действовать в любых условиях."
 DEN_surprise_element: "Элемент неожиданности"
 DEN_surprise_element_desc: "Никто не ожидает, что датская армия будет процветать в условиях, не соответствующих ее численности. Применяя тактику, которая поможет поддерживать постоянный поток снабжения, независимо от того, где дислоцируется армия, мы можем застать наших врагов врасплох, когда они наиболее слабы."
 DEN_armour_experiments: "Эксперименты с броней"
 DEN_armour_experiments_desc: "Датская армия сильно отстает от современной эпохи ведения боевых действий из-за того, что полагается исключительно на пешую пехоту, и, хотя она по-прежнему будет составлять основную часть датской армии, нет причин не поэкспериментировать с некоторыми ограниченными бронетанковыми подразделениями для поддержки пехоты. Хотя наши отечественные разработки могут быть ориентированы на исключительно низкую себестоимость производства в угоду надежности, эти средства ведения войны, без сомнения, будут нам полезны."
 DEN_home_air_defense: "Силы ПВО"
 DEN_home_air_defense_desc: "Дания в значительной степени подвержена бомбардировкам как с севера, так и с юга, а также с моря. Несмотря на то, что на ключевых объектах по всей стране установлены позиции противовоздушной обороны, создание ограниченных военно-воздушных сил для перехвата бомбардировщиков и обеспечения чистоты нашего воздушного пространства будет приоритетной задачей, если мы станем мишенью такой тактики."
 DEN_support_on_the_battlefield: "Поддержка с воздуха"
 DEN_support_on_the_battlefield_desc: "Инвестируя в самолеты поддержки на поле боя, мы можем гарантировать, что наши войска будут должным образом поддерживаться нашими военно-воздушными силами на поле боя, что даст им боевое преимущество в любом сражении, где это позволят условия. Легкие бомбардировщики, возможно, и не обладают такой огневой мощью или дальнобойностью, но они справятся с целями, расположенными близко к дому, гарантируя, что у нас всегда будет преимущество на домашней территории."
 DEN_invest_in_fighter: "Приоритет истребителей"
 DEN_invest_in_fighter_desc: "Если мы не будем инвестировать в истребители, то вскоре обнаружим, что наши бомбардировщики не смогут достичь своих целей и что нашим небом вскоре будет управлять враг. Вместо этого мы должны инвестировать в маневренные истребители, которые позволят нам защищать наше суверенное воздушное пространство."
 DEN_rule_the_skies: "Обеспечить господство в воздухе"
 DEN_rule_the_skies_desc: "Поднимая в воздух наши истребители, мы ясно показываем, что можем защитить наше собственное воздушное пространство и операции. Поэтому мы сможем по-настоящему управлять нашим собственным небом только тогда, когда эта задача будет выполнена должным образом."
 DEN_conventional_airforce: "Традиционные ВВС"
 DEN_conventional_airforce_desc: "Разница между нашими двумя подразделениями довольно необычна. Объединяя их, мы можем гарантировать, что наши воздушные силы смогут действовать с такой же эффективностью, как и другие военно-воздушные силы, если не лучше."
 DEN_establish_flyvevabnet: "Создать единные ВВС"
 DEN_establish_flyvevabnet_desc: "Мы должны объединить Hærens Flyvertroppen и Marinens Flyvevæsen в единое новое подразделение военно-воздушных сил нашей страны. Организация этого нового подразделения приведет к беспрецедентному сокращению бюрократии и поможет закрепить за нами статус страны с высококачественными военно-воздушными силами."
 DEN_expand_the_bomber_regiments: "Расширение бомбардировочных полков"
 DEN_expand_the_bomber_regiments_desc: "Наша армия была бы сбита с толку, если бы не было подходящих бомбардировщиков для уничтожения тыловых позиций противника, проведения стратегических бомбардировок или нанесения ударов по колоннам пехотных взводов или танковых бригад. В то время как производство больших бомбардировщиков практически невозможно, расширение потенциала легких бомбардировщиков для увеличения их производительности сотворит чудеса."
 DEN_intensify_defenses: "Усилить оборону"
 DEN_intensify_defenses_desc: "Датская оборона не может полагаться исключительно на строительство наземных укреплений для создания стационарной обороны, поэтому использование датских железных дорог для поддержки мобильных артиллерийских обстрелов, круглосуточно изматывающих войска, является необходимостью. Создание такой железнодорожной артиллерии окажется полезным для оказания помощи нашим войскам за рубежом или для защиты внутренней территории."
 DEN_self_defense_fleet: "Флот самообороны"
 DEN_self_defense_fleet_desc: "Датский флот слишком долго не получал достаточного финансирования, и адмирал Речницер согласился с тем, что необходимо что-то предпринять. Согласно его плану, бюджет, необходимый для военно-морского флота, будет не таким большим, как предполагалось ранее. Наш план состоит в том, чтобы создать флот заградителей, который помог бы защищать наши берега, а также сопровождать конвои и совершать набеги на них, проходящие в непосредственной близости."
 DEN_seaworthy_fleet: "Мореходный флот"
 DEN_seaworthy_fleet_desc: "Перестраивать датский флот для борьбы с немецким или британским было бы самоубийством, но перенос мощи за пределы наших берегов в сторону Балтийского моря или Северной Атлантики помог бы вновь укрепить военно-морскую мощь Дании. При осторожном увеличении бюджета датские верфи начнут производить крейсера, как легкие, так и тяжелые, рекордными темпами, выполняя роль боевых кораблей для нашего использования."
 DEN_modernize_Sovaernet: "Модернизировать ВМФ"
 DEN_modernize_Sovaernet_desc: "Датский флот Søværnet давно не обновлялся, но в связи с растущей глобальной напряжённостью он становится всё более необходимым. Нам следует инвестировать в модернизацию наших кораблей и, возможно, начать строительство новых, чтобы сохранить целостность наших территориальных вод."
 DEN_proper_surface_fleet: "Собственный надводный флот"
 DEN_proper_surface_fleet_desc: "Датский флот должен действовать должным образом на надводном уровне, иначе мы не сможем сравниться с противником. Флот, не нацеленный на уничтожение вражеского флота, не сможет запугать или удержать потенциального противника от вторжения в Данию."
 DEN_modern_naval_warfare: "Современная война на море"
 DEN_modern_naval_warfare_desc: "Гениальные инвестиции наших адмиралов привели к тому, что датский флот применяет тактику, близкую к тактике британского или немецкого морского флота. Несмотря на то, что нам предстоит пройти долгий путь, учитывая наш ограниченный опыт ведения боевых действий на море, применение методов, которым наши адмиралы научились в открытом море, наряду с учебой, предвещает будущие успехи."
 DEN_proper_screening: "Защитим гордость нашего военно-морского флота"
 DEN_proper_screening_desc: "Наше новое судно - гордость нашего военно-морского флота, и его необходимо беречь: представьте, как пострадает моральный дух, если с ним что-то случится. К счастью, существующие датские военно-морские силы, состоящие из небольших кораблей, готовы защитить нашу гордость, но увеличение их численности никогда не помешает."
 DEN_fleet_armament: "Вооружение для флота"
 DEN_fleet_armament_desc: "В настоящее время мощности верфей минимальны, а создание новых образцов является довольно сложной задачей из-за отсутствия военно-морского опыта последних десятилетий. Таким образом, адмирал Речницер способствовал созданию новых образцов, которые значительно улучшат наши возможности и в то же время будут внедрены в производство. Отказ от старых конструкций и переориентация мощностей верфей позволят в кратчайшие сроки спустить эти корабли на воду."
 DEN_anti_air_improvements: "Усовершенствования в ПВО"
 DEN_anti_air_improvements_desc: "Военно-морские бомбардировщики, истребители и общие бомбардировки наших кораблей станут серьезной проблемой, если мы надеемся подготовить наш военно-морской флот к боевым действиям, будь то за морем или для защиты самой Дании. В то время как наши собственные военно-воздушные силы отсутствуют, а наземные средства противовоздушной обороны помогут кораблям в порту, кораблям, действующим вблизи вражеских берегов, потребуется радикальное улучшение противовоздушных возможностей."
 DEN_fleet_bulwark: "Оплот флота"
 DEN_fleet_bulwark_desc: "Наш флот будет состоять из боевых и нестроевых кораблей, как и любой другой флот. Однако создание настоящего оплота для нашего флота - важный шаг. Военно-морской штаб будет тесно сотрудничать с Адмиралтейством в разработке точной доктрины, которой будет следовать наш военно-морской флот, чтобы повысить эффективность нашего флота".
 DEN_battle_ready_fleet: "Боеспособный флот"
 DEN_battle_ready_fleet_desc: "Как только начнется война, наш флот должен быть готов к круглосуточному реагированию и эффективному несению службы в радиусе сотен километров от наших берегов - это относится и к нашему военно-морскому персоналу. Обеспечивая надлежащую боеготовность каждого корабля, наличие обученных моряков и надлежащим образом загруженных судов со всем необходимым топливом и боеприпасами, мы не будем застигнуты врасплох профессиональными военно-морскими силами наших основных соседей."
 DEN_danish_way_of_warfare: "Датский путь войны"
 DEN_danish_way_of_warfare_desc: "Наша исконная военно-морская тактика, даже если на нее повлияли великие державы нашего времени, останется основополагающей на десятилетия вперед. Датский способ ведения войны, возможно, и не столь уникален, как в Дании, но патриотизм идет рука об руку с боевой эффективностью, и скоро все узнают об уникальной датской доблести, изобретательности и изобретательской жилке."
 DEN_danish_admiralty: "Датское адмиралтейство"
 DEN_danish_admiralty_desc: "Датское адмиралтейство с начала века прошло долгий путь, и, хотя наши ограниченные возможности препятствовали продвижению по службе других высокопоставленных морских офицеров, следует отдать должное Оге Хельгесену Веделю и Ялмару Речницеру за их усилия по перевооружению и модернизации датского военно-морского флота. Их тактика, техника и исследования принесли свои плоды; датское адмиралтейство разбирается в этом так же хорошо, как и в кораблях, которыми оно может управлять."

 ## Pol Tree
 DEN_constitutional_crisis: "Конституционный кризис"
 DEN_constitutional_crisis_desc: "Желание внести поправки в конституцию Дании в соответствии с пожеланиями [GetSecondInCommand]  было прервано незаконными интригами нашего короля. У Дании нет иного выбора, кроме как смириться с этим неблагоприятным стечением обстоятельств, и будущее Дании висит на волоске. Радикальные силы могут свергнуть нашу драгоценную демократию, или король, наконец, добьется своего и назначит правительство по своему вкусу - покажет только время."

 ## Right Side
 DEN_kings_cabinet: "Кабинет короля"
 DEN_kings_cabinet_desc: "Согласно конституции, король имеет право, нет, обязанность защищать датский народ, когда его демократическое правительство вот-вот совершит ошибку, которая уничтожит нацию. Если Германия потерпит поражение, Дания окажется обреченной на поражение от фанатиков Франции и Великобритании - все знают, что они придут сюда, чтобы подчинить датчан синдикалистской тирании!"
 ## social conservative
 DEN_the_conservative_coalition: "Консервативная коалиция"
 DEN_the_conservative_coalition_desc: "Неудача Мадсен-Мигдал привела к возрождению КНП, и король доверился Меллеру. К лучшему это или к худшему, но бывшая опора Венстре была поглощена КФ."
 DEN_rearm_danish_industry: "Перевооружение датской промышленности"
 DEN_rearm_danish_industry_desc: "Одной из основных проблем подготовки Дании к войне является ее промышленность. После успешного выхода из экономического кризиса многие заводы нуждаются в техническом перевооружении и реконфигурации, а также в более эффективном использовании для производства боеприпасов для армии."
 DEN_appeal_to_our_powerbase: "Обратится к нашим сторонникам"
 DEN_appeal_to_our_powerbase_desc: "Многие в KF разочаровались после распада партий-предшественников во время Первой мировой войны. Чтобы сохранить наше народное правление, мы должны обратиться к тем, кто поддерживал наших предшественников, а также к тем, кто видит в KF будущее Дании."
 DEN_reinvest_in_the_army: "Реинвестиции в армию"
 DEN_reinvest_in_the_army_desc: "За многие десятилетия продолжительного мира численность датской королевской армии значительно сократилась. Поскольку на горизонте маячит война, мы должны резко расширить набор и направить основные ресурсы на поощрение призывников."
 DEN_pursue_unicameralism: "Продвижение однопалатности"
 DEN_pursue_unicameralism_desc: "Однопалатность — давняя цель как Мёллера, так и KF в целом. Мечта Мёллера о построении истинной парламентской демократии в Дании не может больше откладываться, и проведение такого референдума будет во многом способствовать легитимации KF в глазах датского народа."
 DEN_sideline_parliament: "Потеснить парламент"
 DEN_sideline_parliament_desc: "Ригсдаг, или нынешний двухпалатный парламент Дании, долгое время был занозой в заднице у многих представителей автократического крыла КF, но особенно у Вестергаарда. Обойти этот ключевой принцип датской демократии будет практически невозможно... хотя, если представится случай, Вестергаард, несомненно, воспользуется им."
 DEN_subdue_the_opposition: "Подавить оппозицию"
 DEN_subdue_the_opposition_desc: "Поскольку наше правление в ближайшем будущем будет обеспечено, пришло, наконец, время расправиться с оппозицией, которая начала массовые беспорядки по всей стране в знак протеста против действий кабинета министров. Король воспользовался своими законными полномочиями, и наше правление справедливо - все, что осталось, это заставить их замолчать."
 DEN_invest_in_the_funktionaerer: "Инвистиции в бюрократию"
 DEN_invest_in_the_funktionaerer_desc: "Funktionærer – это жизненная сила нашего электората, состоящего в основном из представителей среднего класса по всей Дании, таких как клерки. Инвестируя в то, что способствует нашей поддержке, мы можем добиться того, чтобы десятилетия правления KF способствовали настоящему процветанию Дании."
 DEN_enforced_constitutionalism: "Принудительный конституционализм"
 DEN_enforced_constitutionalism_desc: "Обеспечение соблюдения конституции в полном объеме восстановит веру в наше правительство, которое было весьма непопулярно после того, как король Кристиан X назначил нас после падения кабинета Мадсена-Мигдала. Кроме того, восстановление коалиции КНП-Венстре поможет нам сохранить большинство в парламенте на долгие годы вперед."
 DEN_danish_trade_protectionism: "Датский торговый протекционизм"
 DEN_danish_trade_protectionism_desc: "Защита датских рынков - одна из наших главных забот, поскольку много лет назад в ходе восстановления после разрушительного экономического кризиса на них были наложены ограничения. Жесткая экономия, возможно, и спасла датскую экономику, но ошибки экономической политики Stauning должны быть исправлены."
 DEN_empower_the_konservative_ungdom: "Наделить полномочиями Консервативную Молодежь"
 DEN_empower_the_konservative_ungdom_desc: "После прихода Вестергаарда к власти численность КU резко возросла, и теперь он разрешает своим членам записываться в армию. Храбрые молодые люди, вступающие в ряды датчан, укрепят фронт и добавят лояльности нашим войскам."
 DEN_increased_executive_power: "Усиление исполнительной власти"
 DEN_increased_executive_power_desc: "Вестергаард не обладает полной властью над страной, но это положение может быть постепенно смягчено путем принятия нескольких законов, направленных на дальнейшее укрепление его правления. Вестергорда постоянно раздражают умеренные в КНП, а также пожелания короля, но это не помешает ему обеспечить, чтобы датская демократия оставалась парализованной на неопределенный срок."
 DEN_right_wing_coalition: "Коалиция правых"
 DEN_right_wing_coalition_desc: "Идеология Вестергаарда подходит радикальному крылу KНП, но, чтобы гарантировать, что их правительство не рухнет, Вестергаард объявил о сотрудничестве с DS и DKF. Макс Арильдсков сдержанно пообещал поддержку, в то время как DS заявила о своей полной поддержке правительства Вестергаарда. Широкая правая коалиция поможет стабилизировать ситуацию в стране и узаконить правление Вестергаарда."
 ## authoritarian democrat
 DEN_emphasise_loyalty_to_crown: "Подтверждение преданности Короне"
 DEN_emphasise_loyalty_to_crown_desc: "Некоторые не понимают, что действия короны, хотя и ограничивают существующую демократию, в конечном счете являются их последней защитой от тоталитарного правления. Мы должны подчеркнуть, что у нас самые благие намерения и что лояльность отвечает их интересам."
 DEN_secure_military_loyalty: "Обеспечение лояльности армии"
 DEN_secure_military_loyalty_desc: "Нам необходимо добиться поддержки наших действий со стороны датского парламента, чтобы он не встал на сторону Ригсдага в этом споре и не вынудил нас подчиниться. К счастью, большинство датских офицеров согласны с тем, что Дания не может позволить себе в одиночку противостоять мощи Интернационала, если германская гегемония падет под натиском рабочей милиции..."
 DEN_combat_syndie_bs: "Борьба с синдикалистской пропагандой"
 DEN_combat_syndie_bs_desc: "Подлые синдикалисты из Лондона и Парижа пытаются отравить умы датчан с помощью пропаганды и другой лжи; мы должны противостоять этому, разоблачая их ложь и распространяя наше собственное датское мировоззрение поверх этих иностранных идей, которые могут только навредить нашей нации!"
 DEN_establish_rigsfagforbund: "Создать Rigsfagforbund"
 DEN_establish_rigsfagforbund_desc: "Лучший способ борьбы с синдикализмом — объединить их любимые профсоюзы в один контролируемый государством профсоюз, который будет действительно отстаивать позицию Дании, а не порабощать Данию «международной революцией»."
 DEN_for_god_king_and_fatherland: "За Бога, Короля и Отечество!"
 DEN_for_god_king_and_fatherland_desc: "«За Бога, Короля и Отечество» — девиз Дании, и так будет всегда! Благодаря королю и его сторонникам, которые чётко отвратили страну от тщетной надежды на нейтралитет, Дания будет процветать в грядущие годы!"
 DEN_restore_democracy_question: "Восстановление демократии?"
 DEN_restore_democracy_question_desc: "Теперь, когда Дания обрела мир, встал вопрос о том, следует ли восстанавливать демократию после падения правительства Торвальда Стаунинга в условиях конституционного кризиса. Король Кристиан X назначил подходящего премьер-министра, поэтому его указом решается, восстановит ли он свободную демократию или просто продолжит однопартийную систему."
 DEN_topple_the_welfare_state: "Низвергнуть государство всеобщего благосостояния"
 DEN_topple_the_welfare_state_desc: "За время своего пребывания на посту премьер-министра Стаунинг провёл множество реформ, чтобы воплотить в жизнь свою концепцию превращения Дании в государство всеобщего благосостояния. В то время как наш народ наслаждается плодами его инвестиций, многие в нашей партии требуют изменить курс."
 DEN_unyielding_loyalty: "Непоколебимая преданность"
 DEN_unyielding_loyalty_desc: "Каждый командующий генерал и каждый солдат командира должны посвятить свою жизнь победе в сражениях, с которыми им предстоит столкнуться. Поэтому мы должны прививать не только чувство профессионализма, но и, в какой-то степени, фанатичную преданность служению королю Кристиану X. Только под началом нашего милостивого короля мы сражаемся так хорошо и побеждаем врагов, стремящихся к его свержению."
 ## shared
 DEN_denmark_rejoice: "Да возрадуется Дания!"
 DEN_denmark_rejoice_desc: "Да возрадуется Дания! Ибо спаситель отечества пришел вдохнуть новую жизнь в величайшую страну Бога. Ибо нет врага, с которым Дания не смогла бы справиться, и нет человека, который представлял бы Данию лучше, чем ее король. Да здравствует король Кристиан X! Да здравствует Дания!"
 DEN_increased_recruitment: "Увеличение призыва"
 DEN_increased_recruitment_desc: "Чтобы сохранить боеспособность Дании, король приказал своим гражданам продолжать записываться в вооруженные силы. Малочисленность населения Дании оставляет мало возможностей для дальнейшего расширения нашей армии, но король позаботится о том, чтобы датская армия стала силой, с которой следует считаться. К сожалению, расширение воинской повинности до такой степени создаст нагрузку на наш промышленный потенциал."
 DEN_reichspakt_cooperation: "Сотрудничество с Рейхспактом"
 DEN_reichspakt_cooperation_desc: "В соответствии с соглашениями, достигнутыми с кайзером Германии, датская армия получит несколько столь необходимых современных немецких винтовок для укрепления наших вооруженных сил. Кроме того, Германия решила инвестировать некоторые ресурсы в повышение промышленного потенциала нашей страны. Эта военная и промышленная помощь - именно то, что нужно Дании, чтобы помочь Германии в ее борьбе."
 DEN_danish_panzer_corps: "Датский танковый корпус"
 DEN_danish_panzer_corps_desc: "С сегодняшнего дня Германия одобрила развертывание резервных лёгких танков и моторизованной техники, что позволит сформировать первый в истории датский танковый корпус. Хотя наша армия крайне неспособна использовать эти дивизии по максимуму, нет никаких сомнений в том, что Дании нужно нечто большее, чем просто пехота для помощи в предстоящих сражениях. Мы будем тесно сотрудничать с немецкими генералами, чтобы обеспечить эффективное использование этих датских танковых корпусов."

 ## Centre
 DEN_danish_democracy: "Датская демократия"
 DEN_danish_democracy_desc: "Путь к демократии в Дании был долгим и утомительным, и даже сегодня монарх предоставляет себе права, которые, по мнению некоторых, не соответствуют той роли, которую он должен выполнять, но сегодня наша демократия находится в достойном состоянии. Однако давление оказывается как со стороны левых, так и со стороны правых, поэтому давайте сделаем все возможное, чтобы наша демократия выжила."
 ## social democrat
 DEN_staunings_denmark: "Дания Стаунинга"
 DEN_staunings_denmark_desc: "Либеральные левые в Дании набирают силу. Воодушевленная прошлыми кризисами, Дания становится сильнее, чем когда-либо. Учитывая, что обещания, данные на следующих выборах, висят в воздухе, [GetSecondInCommand] сделает все возможное, чтобы воплотить в жизнь мечты об укреплении государства всеобщего благосостояния в Дании, возможно, даже став мировым лидером среди государств всеобщего благосостояния по всей планете."
 DEN_develop_welfare_state: "Развитие государства всеобщего благосостояния"
 DEN_develop_welfare_state_desc: "В целях дальнейшего развития датского социального государства были выдвинуты предложения по увеличению числа проектов общественных работ, которые были реализованы для содействия восстановлению экономики. Хотя Дания не страдает от первоначальной потери рабочих мест и безработицы, увеличение финансирования проектов такого рода укрепит мощь датской промышленности и обеспечит работой каждую семью, в которой работает мужчина."
 DEN_improved_healthcare_standards: "Повышение стандартов здравоохранения"
 DEN_improved_healthcare_standards_desc: "Закон о национальном медицинском страховании, принятый несколько лет назад в период экономического подъема, помог обеспечить равный доступ к медицинскому обслуживанию.[GetSecondInCommand] имеет возможность сделать следующий шаг – ознакомившись с новыми законопроектами, касающимися профилактики и контроля распространения заболеваний, поддержки ухода за детьми и повышения квалификации медицинских работников, датские больницы станут самыми качественными во всем мире."
 DEN_lay_out_a_plan_for_pensions: "Разработка плана пенсионного обеспечения"
 DEN_lay_out_a_plan_for_pensions_desc: "В новом законопроекте о социальной реформе, подготовленном К.К. Штайнке, остро стоит вопрос о том, следует ли увеличивать пенсии, выплачиваемые больным или лицам, достигшим слишком преклонного возраста для работы. Radikale Venstre не согласна с каким-либо увеличением в этом секторе, но это входит в повестку дня нашего правительства."
 DEN_clarified_social_laws: "Классификация социальных законов"
 DEN_clarified_social_laws_desc: "Другой проект, реализуемый в рамках проекта К.К. Штайнке, призван внести ясность в и без того запутанный свод социальных законов Дании и дополнить его новым, в котором будет четко указано, как должен вести себя каждый гражданин Дании. Этот набор реформ является наиболее приемлемым для всех сторон, и с его проведением не должно возникнуть проблем."
 DEN_matter_of_militarisation: "Вопрос милитаризации"
 DEN_matter_of_militarisation_desc: "Камень претковения между двумя партиями, входящими в эту коалицию, заключается в том, как справиться с постоянно возникающей проблемой милитаризации. Мир накаляется, и даже если крупные державы избегнут конфликта, вторая мировая война кажется все более вероятной. Таким образом, независимо от того, выйдет Дания на ринг или нет, антимилитаристские элементы каждой из сторон должны быть умиротворены или, на худой конец, изгнаны, чтобы Дания могла выжить."
 DEN_welfare_bureaucracy: "Новая социальная бюрократия"
 DEN_welfare_bureaucracy_desc: "Для достижения наших целей по созданию современного государства всеобщего благосостояния потребуется совершенно новая, упорядоченная бюрократия, которая будет заниматься его делами. На данный момент Радикале Венстре представила свои предложения, которые лишь незначительно изменят систему, в противовес тем, кто из Социал-демократов выступает за тотальную перестройку, которая радикально изменит бюрократию в том виде, в каком мы ее знаем."
 DEN_modern_welfare_state: "Современное государство всеобщего благосостояния"
 DEN_modern_welfare_state_desc: "Программа социал-демократов увенчалась успехом, и вся Дания радуется правам и привилегиям, которые она получила, доверившись правительству. Хотя датская демократия не допустит нашего вечного правления, мы укрепили структуру, которая не рухнет в случае победы оппозиции, и счастье датских граждан больше не будет поставлено под сомнение."
 DEN_halted_reforms: "Приостановить реформы"
 DEN_halted_reforms_desc: "Социал-демократы зашли слишком далеко, государственный бюджет обвалился, а безудержные траты еще больше ухудшили жизнь датских граждан по всей Дании. Эти так называемые реформы социального обеспечения, а также новые социальные законы К.К. Штайнке не принесли ничего, кроме волнений и беспокойства - Дания должна получать реформы стабильными темпами, поэтому необходимо нажать на тормоза, прежде чем Дания скатится в катастрофу."
 ## market liberal
 DEN_venstre_denmark: "Праволиберальная Дания"
 DEN_venstre_denmark_desc: "Венстре пережили конституционный кризис, и теперь возникает вопрос: с кем мы будем продолжать править? Консервативная партия была нашим естественным союзником, но ныне опозоренная социал-демократия потеряла союзника в лице Радикальных Венстре. Некоторые члены нашей партии предлагают примирение либералов, но это, возможно, слишком радикальная идея."
 DEN_maintain_kf_coalition: "Поддержать коалицию с КНП"
 DEN_maintain_kf_coalition_desc: "Консервативная народная партия - наши естественные союзники, и мы можем легко удовлетворить их требования о перевооружении и дальнейшем наборе персонала для расширения нашей армии. Это расстроит тех в нашей партии, кто надеется избежать конфликтов в будущем, но это жертва, на которую мы готовы пойти, чтобы пережить следующие выборы."
 DEN_reconcile_radicals: "Примириться с Радикальными Венстре"
 DEN_reconcile_radicals_desc: "Радикальным Венстре было сделано противоречивое предложение о восстановлении либеральной коалиции, слегка ироничное из-за того, что две наши партии изначально были одной. До сих пор не было никаких планов по восстановлению Det Forenede Venstre, но их поддержка может оказаться полезной, хотя это и оттолкнет наших бывших партнеров из КНП."
 DEN_moderated_rearmament: "Ограниченное перевооружение"
 DEN_moderated_rearmament_desc: "Чтобы продлить наше столь выгодное соглашение с КНП, они потребовали, чтобы мы продолжили в той или иной форме перевооружение. Направив часть нашей промышленной продукции на производство новой военной техники, мы сможем удовлетворить потребности наших партнеров по коалиции, а это, в свою очередь, укрепит их поддержку коалиции Венстре-КНП."
 DEN_limited_labour_reforms: "Ограниченные трудовые реформы"
 DEN_limited_labour_reforms_desc: "Введение ряда трудовых реформ, инициатором которых является идеолог радикальной партии Питер Мунк, без сомнения, вызовет определенные волнения в партии. Однако, ограничив масштабы и расходы на эти реформы, мы можем одновременно успокоить большинство сторонников Венстре и сохранить эту новообретенную либеральную коалицию."
 DEN_venstre_survives: "Сохранение Венстре"
 DEN_venstre_survives_desc: "Искусство компромисса и переговоров старо как само время, и независимо от того, будут ли это проекты с консервативной КНП или новые проекты с Radikale Venstre, сама Venstre будет процветать в ближайшем будущем. Хотя видимость нашего дальнейшего правления зависит от поддержки правых или левых в коалиции, Венстре, тем не менее, сохранит свое влияние в Дании."
 DEN_appeal_to_farmers: "Обратиться к фермерам"
 DEN_appeal_to_farmers_desc: "Наша традиционная аудитория датских фермеров сокращается с ростом индустриализации и стремлением к урбанизации по всей современной Дании. Однако наш аграрный сектор по-прежнему процветает и продолжит оказывать нам поддержку, если мы осуществим серьезные инвестиции в сельское хозяйство."
 DEN_resumed_recruitment: "Возобновление призыва"
 DEN_resumed_recruitment_desc: "Возобновление набора в датскую армию - задача не из легких, особенно из-за неопытности датчан в ведении современной войны. Однако несомненно одно: расширение наших рядов сотворит чудеса в ходе военных кампаний по всей Европе и поможет нашим союзникам одержать победу."
 DEN_unity_propaganda: "Пропаганда единства"
 DEN_unity_propaganda_desc: "Для того чтобы вся Дания объединилась вокруг идеи противостояния опасным силам России и Интернационала, потребуется приложить значительные усилия. Мы проведем митинги по всей стране и развесим плакаты в центре каждого крупного города, чтобы у каждого добропорядочного гражданина Дании была мотивация записаться на военную службу или помочь в военных действиях другими способами."
 DEN_centre_right_dominance: "Доминирование правоцентристов"
 DEN_centre_right_dominance_desc: "Коалиция КНП и Венстре в настоящее время доминирует на политическом ландшафте Дании, поскольку была создана после того, как король Кристиан X решил добиваться более активного участия Дании в европейских делах. Дальнейшее пребывание коалиции у власти обеспечит защиту свобод каждого датского гражданина и то, что Дания не скатится к радикализму."
 DEN_push_to_equality: "Движение к Равенству"
 DEN_push_to_equality_desc: "Движение к равенству будет упорной и напряженной борьбой, особенно среди тех сторонников Венстре, которые все еще с презрением относятся к Радикале Венстре за их приверженность трудовым реформам и отстаивание больших прав датчан. Сдерживание радикальных настроений партии будет к лучшему, в то время как изменение наших реформ в соответствии с требованиями этой коалиции обеспечит дальнейшее развитие датского либерализма.."
 DEN_rehabilitate_antimilitarists: "Перевоспитание антимилитаристов"
 DEN_rehabilitate_antimilitarists_desc: "Кампания по восстановлению партии с участием Radikale Venstre окажется трудной задачей, особенно с учетом того, что только из-за нашего сближения с немецкой сферой сами Радикальные Венстре практически развалились надвое. Идя на уступки своенравным сторонникам Радикальным Венстре и доказывая, что современная военная реформа только обеспечит мир в Дании в будущем, мы можем привлечь их на нашу сторону."
 DEN_reunite_liberals_question: "Будущее датского либерализма"
 DEN_reunite_liberals_question_desc: "Будущее датского либерализма будет решено в ходе продолжительных переговоров между руководством Венстре и представителями Радикальных Венстре. Восстановленная коалиция между двумя партиями привела к появлению в политике силы, невиданной на протяжении нескольких десятилетий, но согласиться с требованиями таких людей, как Питер Мунк, нелегко."
 DEN_pure_democracy: "Истинная демократия"
 DEN_pure_democracy_desc: "В трудные времена мы должны помнить о "единомыслии" - идее общности взглядов и солидарности друг с другом. Напряженность в мире растет, и гордая датская страна, возможно, не сможет долго оставаться в стороне. Каждому добропорядочному гражданину Дании необходимо отстаивать чистую демократию, которая укреплялась на протяжении десятилетий."
 DEN_entrenched_rights: "Закрепить права"
 DEN_entrenched_rights_desc: "Права каждого гражданина Дании должны соблюдаться в максимальной степени, и их укрепление только укрепляет то, что значит быть датчанином. Наша отважная страна пережила все невзгоды и будет продолжать это делать при условии, что руководство сохранит этот уровень глубоких связей со своими гражданами."
 DEN_defend_our_democracy: "Защитить нашу демократию"
 DEN_defend_our_democracy_desc: "Защита датской демократии потребует чрезмерной нагрузки на датскую рабочую силу или вооруженные силы Дании, поэтому мы должны мудро выбирать, на что направить наши усилия. Только благодаря разумному планированию мы добьемся успеха в достижении наших целей, а нерешительность в этом вопросе только подорвет волю нашего государства."

 ## Left Side
 DEN_the_first_statsraad_congress: "Первый конгресс Статраада"
 DEN_the_first_statsraad_congress_desc: "Наконец, пришло время созвать первый в истории конгресс Статсраада, представляющий собой хрупкий союз между социалистическими реформами и попытками Торвальда Стаунинга добиться плюрализма. Теперь в Дании будет дуть гораздо более социалистическая атмосфера, но различные фракции внутри Федерации преследуют совершенно разные цели в отношении будущего Дании, и этот конгресс решит судьбу нашей страны."
 ## radical socialist
 DEN_true_danish_socialism: "Настоящий датский социализм"
 DEN_true_danish_socialism_desc: "Федерация-ДЛСП одержала победу на последнем конгрессе, и Аксель Ларсен был избран первым премьер-министром-президентом Дании. Его взгляды на будущее Дании вступают в противоречие с позицией Федеральной партии, поскольку Ларсен осудил влияние профсоюзного движения. Социализм не может быть привнесен в Данию путем заимствования революционных идеалов у наших товарищей - мы должны сами пустить корни, чтобы Дания процветала в ближайшие годы."
 DEN_councilist_destiny: "Судьба системы Советов"
 DEN_councilist_destiny_desc: "Судьба Дании, предписанная ДЛСП, связана с историей рабочих советов. Хотя эта концепция не совсем нова и многие обвиняют Акселя Ларсена в предательстве его идеалов истинно датского социализма, его ответ заключается в том, что рабочие советы - это всего лишь инструмент для достижения конечной цели. Советы станут средством, с помощью которого будет охвачен каждый работник по всему спектру интересов, и это единственный способ, с помощью которого датский работник сможет по-настоящему обрести свое представительство."
 DEN_socialism_untouched_by_foreign_influence: "Социализм, не затронутый иностранным влиянием"
 DEN_socialism_untouched_by_foreign_influence_desc: "Ларсен заявил, что, чтобы не позволить Дании стать еще одной жертвой французского или британского влияния, Дания должна следовать своим собственным курсом. Датский дух всеобъемлющ и силен, он националистический, но в то же время по-настоящему свободный, и его невозможно сломить, независимо от источника. Пусть поддерживаемая из-за рубежа клика коммунаров осуждает нас - датский социализм останется датским."
 DEN_crush_trade_union_monopoly: "Сокрушить монополию профсоюзов"
 DEN_crush_trade_union_monopoly_desc: "Датский план, предусматривающий создание сильного партийного государства с рабочими советами, в первую очередь потребует искупления засилья профсоюзов, особенно внутри самой партии. Многие стали жертвами лжи лидера партии Enhedspartiet Кристиана Кристенсена и его крепких связей с профсоюзами, что приведёт лишь к угнетению датских рабочих. Так продолжаться не будет, и монополия профсоюзов по всей стране будет немедленно подорвана и разрушена."
 DEN_danish_mass_party: "Датская партия масс"
 DEN_danish_mass_party_desc: "ДЛСП, будучи самостоятельной партией, передала свою независимость Føderationen. Хотя наш альянс имеет первостепенное значение и является средством, позволяющим Дании продолжать быть социалистической страной, справедливо признать, что наши товарищи должны быть отодвинуты на второй план в борьбе за создание по-настоящему массовой партии, которая охватит всех трудящихся всех социальных слоёв."
 DEN_end_rural_urban_divide: "Покончить с разделением села и города"
 DEN_end_rural_urban_divide_desc: "Один из планов Ларсена по настоящему объединить датских рабочих по всей стране состоит в том, чтобы покончить с разделением сельских районов на городские, которое преследует страну с начала индустриализации. Каждый житель Дании должен принять планы промышленной и сельскохозяйственной программы, которые изменят ландшафт страны, наполнив ее рабочими местами и возможностями."
 ## syndicalist
 DEN_enhedspartiet_wins: "Победа Партии Солидарности"
 DEN_enhedspartiet_wins_desc: "\"Enhedspartiet\", или Партия Солидарности, одержала победу на первых в истории выборах в конгресс Государственного совета. Разделившись между "Молодой гвардией" во главе с Ричардом Йенсеном и "Старой гвардией" во главе с Кристианом Кристенсеном, было решено, что профсоюзная монополия бывшей оппозиционной организации "Самменслютнинг" займет видное место в Дании."
 DEN_solve_party_schism: "Преодоление партийного раскола"
 DEN_solve_party_schism_desc: "После победы на съезде Статсраада вопрос о том, кто должен стать премьер-министром-президентом, всё ещё остаётся открытым, и в Enhedspartiet пройдёт голосование, чтобы определить своего лидера. С одной стороны, Ричард Йенсен, энергичный агитатор и председатель Søfyrbødernes Forbund, а с другой — давний лидер FS Кристиан Кристенсен, и оба они близки к тому, чтобы стать лидерами Enhedspartiet и Дании."
 DEN_growing_rhubarbs_aplenty: "Выращивание ревеня"
 DEN_growing_rhubarbs_aplenty_desc: "В названии еще неопубликованных и незаконченных мемуаров Кристиана Кристенсена подробно рассказывается о его юности и воспитании в сельской местности, где его семья работала фермерами. Кристенсен призывает всех граждан Дании подняться и откликнуться на призыв, когда их дом находится под угрозой; те, кто живет в бедности, не должны сидеть сложа руки, когда они и средства к существованию их семей находятся под гнетом."
 DEN_danish_workers_first: "Датские рабочие превыше всего"
 DEN_danish_workers_first_desc: "Кристиан Кристенсен давно осуждал раскол между буржуазией и пролетариатом в Дании и заявлял, что при всей своей остроте ума и воли датский рабочий будет на первом месте, и ничто не остановит прогресс. Его преданность делу объединения рабочих в региональные профсоюзы под руководством FS сломит любое сопротивление и сплотит чистоту датского рабочего класса."
 DEN_no_industry_untouched: "Устранение неравенства во всех отраслях"
 DEN_no_industry_untouched_desc: "Один из основателей датского синдикализма, Кристиан Кристенсен, давно выступает за устранение неравенства в отношении к промышленности по всей Дании. Многие бежали из сельской местности в города из-за улучшения условий труда для городских рабочих, но наши сельские рабочие уже давно ощущают трудности. Поэтому ни одна отрасль не останется незатронутой, и каждый датский рабочий, независимо от места жительства, должен получить лучшее отношение."
 DEN_sexual_liberation: "Сексуальная Революция"
 DEN_sexual_liberation_desc: "Продолжая развивать распространенную в последние несколько десятилетий тему сексуального освобождения и пытаясь воплотить в жизнь многое из того, что было изложено в книге Кристиана Кристенсена "Арбейдерне и бернефлоккен", Дания возглавит движение за сексуальное освобождение в Скандинавии. Книга "Арбейдерне и бернефлоккен" была первой книгой, посвященной этой теме в Дании, и Кристенсен ясно дал понять, что это, безусловно, спорная и важная тема, которую мы не должны игнорировать."
 DEN_exemplary_trade_union_power: "Поучительная власть профсоюзов"
 DEN_exemplary_trade_union_power_desc: "Объединившись вокруг Объединения профсоюзов Fagoppositionens Sammenslutning, Кристенсен долгое время выступал в борьбе за солидарность вместе со своими товарищами-синдикалистами из Enhedspartiet за идею превосходства профсоюзов. Партия действует по инициативе профсоюзов, управляется исполнительной властью таким образом, чтобы каждый работник по всей Дании получал руководство и цель."
 DEN_reconcile_old_guard: "Примирение со старой гвардией"
 DEN_reconcile_old_guard_desc: "Большая часть старой гвардии, друзей и союзников Кристиана Кристенсена, поддерживали его приход к власти еще на рубеже веков и должны быть вознаграждены за это. Должности в FS будут распределяться как на основе компетентности, так и на основе преданности делу, поэтому умиротворение большей части старой гвардии в Enhedspartiet будет наиболее полезным для поддержки нашей фракции."
 DEN_reformed_union_bureaucracy: "Реформа профсоюзной бюрократии"
 DEN_reformed_union_bureaucracy_desc: "Реформированная профсоюзная бюрократия в рамках FS будет служить ориентиром для всей Дании, продвигаясь к завершению и совершенствованию структуры в том виде, в каком она уже существует. Граждане Дании могут вздохнуть с облегчением и продолжать работать и радоваться своей доброй воле теперь, когда профсоюзная бюрократия была реформирована и переоборудована для эффективного удовлетворения потребностей Дании."
 DEN_everyone_to_par: "Всеобщее равноправие"
 DEN_everyone_to_par_desc: "Как и Кристиан Кристенсен, Ричард Йенсен в юности жил в бедности и в своей речи после своего избрания заявил, что все в Дании будут воспитываться на равных. Цепи, которые обрекают одних представителей рабочего класса на бедность, в то время как другие живут в роскоши, не исчезнут, и каждый гражданин Дании будет пользоваться равными правами в том, что касается свободы, раскрепощенности и возможности жить комфортно."
 DEN_fuel_to_the_fire: "Подлить масла в огонь"
 DEN_fuel_to_the_fire_desc: "Ричард Йенсен уже давно заявлял, что революция не закончилась отменой монархии и отменой большей части структуры старой буржуазной конституции. Нет, многое еще предстоит сделать, чтобы добиться истинного равенства и истинной свободы для датских рабочих, и для этого мы должны вооружиться для ведения постоянной революционной борьбы."
 DEN_empower_sofyrboderne_forbund: "Расширение возможностей Søfyrbødernes Forbund"
 DEN_empower_sofyrboderne_forbund_desc: "Søfyrbødernes Forbund – это судоходная ассоциация, председателем которой премьер-министр-президент Рихард Йенсен стал в возрасте 25 лет. Поэтому она должна получить необходимые полномочия, чтобы преданные моряки наконец-то получили вознаграждение за вложенный в них упорный труд, которым они занимались десятилетиями. Ассоциация должна обеспечить более справедливую оплату труда, особенно нашим отважным морякам, поскольку они – движущая сила отрасли, долгое время остававшейся без внимания датского правительства."
 DEN_help_each_dane: "Помощь для каждого датчанина"
 DEN_help_each_dane_desc: "Ричард Йенсен призывает народ Дании заботиться друг о друге; революционная борьба не поглотит полностью мужчин, женщин и детей, которые мужественно встанут на ее защиту. Однако большая часть населения Дании по-прежнему остается безработной или обнищавшей после ужасающего экономического спада, произошедшего много лет назад, и Ричард Йенсен не потерпит этого. Создать сообщество, в котором каждый датчанин будет помогать друг другу, - только тогда Дания обретет величие."
 DEN_constant_revolutionary_struggle: "Непрерывная революционная борьба"
 DEN_constant_revolutionary_struggle_desc: "Дания, возможно, и маленькая страна с небольшим населением и промышленностью, которая не столь представительна, как во Франции или Великобритании, но борьба не закончилась и не закончится никогда, особенно учитывая, что многие другие страны стремятся отомстить за свержение нашего монарха. Как бы то ни было, приобретение оружия и привлечение мужчин к военной службе является необходимостью, и наши граждане будут ощущать результаты наших усилий в течение десятилетий."
 DEN_sailor_socialism: "Моряцкий социализм"
 DEN_sailor_socialism_desc: "Матросы, управляющие каждым судном, выполняют тяжелую и напряженную работу, изо дня в день разгребая угли, чтобы каждое судно могло следовать своим курсом. Если сокращение рабочего дня и повышение заработной платы не решат проблему, Ричард Йенсен заявил, что он подольет масла в огонь мировой революции! Все в Дании должны уважать стойкого, закаленного и вдумчивого лидера Ричарда Йенсена, и все в Дании готовы выдержать испытание временем."
 ## totalist
 DEN_kommunarder_supremacy: "Господство Коммунаров"
 DEN_kommunarder_supremacy_desc: "\"Клика коммунаров\" одержала победу на первом конгрессе Статсраада, и многие встают под знамена так называемого "смотрителя коммунаров" Мартина Андерсена Нексе. Берге Хоуманн, лидер BOPA (Гражданских партизан), является главным преемником, но, возможно, старый смотритель пока не готов уйти в отставку. Победа "коммунаров" предвещает появление неприятного руководства, которое обязано немедленно мобилизовать Данию на войну и выступить в качестве руки Интернационала на севере."
 DEN_kommunard_caretaker_reigns: "Часовой-Коммунар берет бразды правления"
 DEN_kommunard_caretaker_reigns_desc: "Удивительно, но старый часовой, Мартин Андерсен Нексе, решил не уходить на пенсию и продолжит возглавлять коммунарскую организацию в последующие годы. Мудрость, которую он привносит в свой возраст, приветствуется, и его присутствие нравится большинству членов партии. Автор хорошо известной и читаемой книги \"Пелле Эробререн\", Нексе является популярной фигурой в партии и возглавляет группу молодых коммунистов. Он способен и готов вести Данию к величию."
 DEN_BOPA_chairman_takes_over: "Председатель BOPA берет власть"
 DEN_BOPA_chairman_takes_over_desc: "Бёрге Хоуманн взял на себя руководство партией после того, как Мартин Андерсен Нексё объявил о своей отставке, надеясь воспитать следующее поколение датских коммунистов, оставаясь за кулисами. Лидеру BOPA (Гражданских партизан) Хоуманну предстоит серьёзная работа после ухода Нексё. В его отсутствие BOPA возглавил его заместитель, Альфред Йенсен, с целью превратить Данию в страну, готовую к войне."
 DEN_springboard_of_revolution: "Плацдарм Революции"
 DEN_springboard_of_revolution_desc: "Дания, по сути, должна стать плацдармом для революции на севере, и особенно с легкодоступными ударными позициями на юге. В то время как граница с Германией остается непрочной, и Дания легко может ее разрушить в случае приближения немецких танков, контроль над проливами обеспечит Интернационалу возможность вторжения по всему северному побережью Германии."
 DEN_foster_next_generation: "Воспитание будущих поколений"
 DEN_foster_next_generation_desc: "Многие в Клике Коммунаров твердо убеждены в необходимости взращивать молодое поколение; Нексё особенно стремится следовать по стопам революций в Британии и Франции и правильно воспитывать следующее поколение, чтобы оно повело нас по пути, свободном от коррупции и греха. Франция и Великобритания олицетворяют «социалистическую мечту», которую он с любовью называет, хотя другие ветераны партии в «Федерации» высмеивают его идеализм."
 DEN_undisputed_internationale_loyalty: "Непрекословная лояльность Интернационалу"
 DEN_undisputed_internationale_loyalty_desc: "Дания должна заявить о своей твёрдой преданности Интернационалу; без Франции и Великобритании не было бы свободной Дании, и Дания сделает всё возможное, чтобы руководство Интернационала действительно знало о гордой преданности Дании. Датская армия будет обладать силой и преданностью французских солдат, а также хитростью и изобретательностью британцев, что позволит создать новые и более совершенные датские вооружённые силы."
 DEN_import_revolutionary_ideals: "Импорт революционных идеалов"
 DEN_import_revolutionary_ideals_desc: "Дания – молодая страна, нашедшая своё призвание лишь после того, как недавние чудовищные деяния заставили доблестного Торвальда Стаунинга вынудить короля Кристиана X отречься от престола раз и навсегда. Осознавая это, Дания во многом опирается на идеалы Интернационала в деле мировой революции и должна следовать тому, чему нас научили Франция и Британия. Мы многого достигли, но борьба за освобождение наших соседей – бесконечная и трудная цель, поэтому мы не должны терять себя и забывать путь к победе."
 DEN_decimate_reactionary_traitors: "Уничтожить реакционеров-предателей"
 DEN_decimate_reactionary_traitors_desc: "Разгорающийся в крупных городах конфликт требует ареста и отстранения от власти видных политических лидеров. Недостаточно просто объявить их частью «официальной оппозиции». Это демонстрирует слабость революции, и важные деятели, возглавляющие конституционалистское и автократическое крыло КНП, а также Венстре, должны быть немедленно заключены в тюрьму."
 DEN_first_domino_of_many: "Первое домино из многих"
 DEN_first_domino_of_many_desc: "Дания – первая костяшка домино, которая упадёт, возможно, в Скандинавии и, возможно, в непосредственной близости от Германии. Мы – первая страна, непосредственно взращенная лидерами, близкими к Франции и Великобритании, и послужим примером того, что синдикалистские идеалы Франции и Великобритании никуда не денутся и распространятся за пределы наших границ. Если не только на остальную Скандинавию, то на Прибалтику, затем на Центральную Европу, затем на Балканы и весь мир!"
 DEN_state_subverted_socialism: "Государство против социализма"
 DEN_state_subverted_socialism_desc: "Действия рабочих, народа Дании, будут направлены не только против государства, но и против социализма в его чистейшей форме. Клика Коммунаров, возможно, не столь могущественна, как максимисты в Великобритании, чтобы стать авангардом революции, но лишь по названию это будет нашей целью. Если наши бывшие союзники из «Федерации» предадут истинную революцию, мы без колебаний подчиним их себе во славу революции."
 ## shared
 DEN_aid_from_internationale: "Помощь от Интернационала"
 DEN_aid_from_internationale_desc: "Свежие войска и французский генерал Луи Бюссо были отправлены из Парижа в качестве экспедиционного корпуса Интернационала для укрепления нашей обороны. Хотя бронетанковые подразделения и материальные средства были бы чрезвычайно полезны, у наших союзников было мало резервов для отправки нам, особенно из-за большого расстояния по морю."
 DEN_call_on_militias: "Сбор ополчения"
 DEN_call_on_militias_desc: "В Дании нет официальной системы территориальной обороны или ополчения, поэтому их необходимо созвать, поскольку угроза немецкого вторжения является чрезвычайной ситуацией в стране. Граждане будут призваны и сформируют ополчение для защиты нашего уязвимого южного фланга и Копенгагена в случае нападения со стороны Швеции или с моря.."
 DEN_emergency_arms: "Срочное вооружение"
 DEN_emergency_arms_desc: "Какой толк от войск без оружия? Одного лишь призыва на военную службу и увеличения численности трудоспособных мужчин недостаточно; мы должны быстро реквизировать дополнительное вооружение, чтобы отправить больше людей на передовую. В краткосрочной перспективе это создаст серьезную нагрузку на нашу промышленность, но необходимость в этом оружии имеет первостепенное значение."
 DEN_genesis_of_socialist_statsraad: "Рождение социалистического Статсраада"
 DEN_genesis_of_socialist_statsraad_desc: "Система, существующая в Дании, уникальна. После заявления Торвальда Стаунинга о том, что Дании лучше оставаться республикой, чем монархией, главой государства стал премьер-министр-президент. Хотя эта система была объединена с социалистическими реформами и привлечением Федерации к участию в них, она стала настоящим примером слияния систем."

## Dynamic Focuses ## Fix These at some point lol
 DEN_radsoc_end_focus_stauning: "Красное благосостояние"
 DEN_radsoc_end_focus_stauning_desc: "Синтез между попытками Стаунинга и социалистической системой привел к созданию своего рода "Красного социального обеспечения", которое способствует максимальному равенству и правам, предоставляемым гражданам Дании. Граждане по всей Дании радуются этой возрожденной энергии и духу системы без каких-либо сдерживающих ее цепей, и каждый мужчина, женщина и ребенок могут по-настоящему принять безграничную судьбу государства всеобщего благосостояния."
 DEN_radsoc_end_focus_1: "Триумф для датских рабочих"
 DEN_radsoc_end_focus_1_desc: "Провозглашение и реформы Ларсена, а также фракции ДЛСП в Федерации привели Данию в обновленный золотой век. В то время как наши союзники из Enhedspartiet, коммунары и Стаунингерны не одобряют централизацию власти и ослабление так называемых договоренностей о создании социалистической и в то же время демократической системы, Ларсен уверяет, что это к лучшему."
 DEN_radsoc_end_focus: "[DEN_get_radsoc_end_focus]"
 DEN_radsoc_end_focus_desc: "[DEN_get_radsoc_end_focus_desc]"

### Bookmark ###
 DEN_KR_gathering_storm_desc: "Дания существует в тени Берлина. Ее отношения с новым мировым гегемоном давние, и они часто были враждебными, даже совсем недавно в 1864 из-за поражения в войне с Пруссией был потерян Шлезвиг. Тем не менее, в 1936 году отношения были теплыми, и Дания, по милости Германии оставшейся нейтральной в Вельткриге, полностью сохраняет свой суверенитет. Под руководством популярного социал-демократического премьер-министра Торвальда Стаунинга Дания наживалась на экономическом процветании Германии. Внутри страны будущее выглядит радужным, но на международном уровне сгущаются тучи. Некоторые опасаются, что Дания окажется не в том месте и не в то время..."

### Intro Screen ###
 DEN_country_intro_background: "GFX_DEN_intro"
 DEN_country_intro_header: "Дания в 1936 году"
 DEN_country_intro_content: "Дания сохранила нейтралитет в Вельткриге, но большой ценой – ей пришлось уступить свои морские территории для немецких мин. С окончанием войны, влияние Германии на датское общество и правительство не кануло в лету, и они были включены в Миттельевропу с самого дня её образования.\n\nХотя Дания и значительно разбогатела во время бума в Германии в 20-х, леворадикальной партии пришлось работать с социал-демократами под предводительством харизматичного Торвальда Стаунинга, который, за исключением перерыва с декабря 1926 по апрель 1929, непрерывно оставался премьер-министром, начиная с 1924. Но мечта Стаунинга о датском государстве всеобщего благосостояние ещё не исполнилась, ввиду того, что над верхней палатой Дании, Ландстингом, сохраняли контроль консерваторы. Многие гадают, что же будущее уготовало для Дании: станет ли она лишь марионеткой Германии? Или она сможет обеспечить для себя будущее на фоне появления новых сил, испытывающих установившийся порядок мира?"
 
 DEN_guide: "§MДемократия – Социал-Демократы§! (§SСоциал-демократы§!)\n£white_dot Во время Канслергадского соглашения, представители Венстре должны его подписать.\n£white_dot Когда начнётся Второй Вельткриг, останьтесь нейтральными.\n£white_dot Король вскоре распустит правительство и будет вынужден отречься.\n£white_dot Альтернативно, вы можете вступить в Вельткриг.\n\n§MДемократия - Венстре§! (§mРыночные либералы§!)\n£white_dot На выборах в Ландстиг оппозиция должна удержать власть.\n£white_dot Во время Канслергадского соглашения добейтесь того, что оно не будет подписано.\n£white_dot Венстре должны победить на предстоящих выборах.\n\n§MПравление короля§! (§gАвторитарная демократия§!)\n£white_dot Во время Канслергадского соглашения, представители Венстре должны его подписать.\n£white_dot Когда начнётся Второй Вельткриг, останьтесь нейтральными.\n£white_dot Король вскоре распустит правительство, но не дайте ему отречься от престола.\n£white_dot Во время беспорядков пошлите армию и добейтесь того, чтобы Стаунинг не убедил большинство.\n\n§MКороль Фредерик наследует престол§! (§SСоциал-демократия§!)\n£white_dot Идите по пути выше.\n£white_dot Во время протестов пошлите полицию и сдайтесь, когда протесты перестанут быть чисто синдикалистскими.\n£white_dot Позвольте Фредерику занять трон.\n\n§MОбъявление республики§! (§SСоциал-демократы§!)\n£white_dot Следуйте по пути выше, но в конце распустите монархию.\n§CЗаметка: Германия может напасть на вас. Если вы хотите гарантированно избежать этого, поставьте соответствующее правило в игровых правилах.§!\n\n§MРежим Статсраада§! (§rСиндикализм§! / §SCоциал-демократия§! / §lСоциал-либерализм§!)\n£white_dot Идите по предыдущему пути, но Германия должна напасть на вас.\n£white_dot Попытайтесь вступить в Интернационал и примите их требования.\n£white_dot В событиях выборах верхние опции приведут синдикалистов, средние – социал-демократов, а нижние – социал-либералов. Если вы не выбрали одну и ту же партию во всех 3 событиях, то придётся формировать коалиционное правительство."

### Events ###
 denmark_events.2.t: "Чёрный Понедельник бьёт по Дании"
 denmark_events.2.d: "Акцизный Кризис на Берлинской бирже быстро распространился по всей Европе, в том числе и Дании. Инвеститоры Børsen паникуют, и кризис начинает распространяться на прочие сферы экономики. К счастью, большая часть датской экономики построена на сельском хозяйстве, а значит правительство сможет смягчить удар просто скупив акции. Стоит только надеяться, что ко времени урожая ситуация разрешится и не принесёт нашим фермерам серьёзных проблем."
 denmark_events.2.a: "В любом случае люди будут продолжать есть!"
 
 denmark_events.3.t: "Забастовка рабочих"
 denmark_events.3.d: "Ввиду трудностей, выпавших на долю датской экономики, многие люди оказались без работы. Волнуясь за свои рабочие места, рабочие одной из крупнейших компаний Дании начали забастовку, требуя гарантии трудоустройства у владельца компании."
 denmark_events.3.a: "Пусть бастуют!"
 denmark_events.3.b: "Согласиться на компромисс!"
 denmark_events.3.c: "Вернуть их на работу силой!"
 
 denmark_events.4.t: "Беспокойство в Федерации"
 denmark_events.4.d: "Большие демонстрации были проведены сегодня так называемой 'Левой социалистической партией', возглавленной известным синдикалистом Кристианом Кристинсеном. Это собрание радикальных профсоюзов поддерживает синдикализм, а многие его члены связаны с печально известной атакой на Копенгагенскую Биржу, спонсированной Парижем. После начала кризиса Чёрного Понедельника, они были рады сообщить, что в Коммуне никакого кризиса нет, а поэтому Дания тоже должна принять синдикалистскую систему.\nХотя и было несколько инцидентов с кровопролитием, обычно при участии тоталистского крыла организации, возглавленного бывшей социал-демократической Баронессой Ольгой фон Еггерс, большая часть демонстраций проходит мирно, возможно надеясь обойтись без провокации полицейских сил. Мы не можем ничего сделать, не нарушая конституцию."
 denmark_events.4.a: "Синдикализм? В Дании?"
 
 denmark_events.5.t: "Столкновение между ДС и НД"
 denmark_events.5.d: "Начиная с создания НД (Новой Дании) Максом Арильдсковым, вдохновлённой примером партии СЗРС его друга Бориса Савинкова в 1935 году ультраправые Дании были безнадёжно разделены. До создания НД, Датское Собрание было здесь во главе. Они могут показаться похожими на первый взгляд, но на самом деле они находятся достаточно далеко друг от друга. ДС призывает к поддержки монархии и Германии, по крайней мере пока синдикализма не будет стёрт с лица земли, а НД отказывается идти на любые компромиссы по поводу оккупации Шлезвига-Гольштейна Германией, и члены партии открыто враждебны к ней. Также, НД поддерживает республиканизм, в отличии от ДС. Никто, кроме Арилдова, так называемого 'Датского Кодряну', не смог бы утвердиться в этом странном углу датской политики, но в общих чертах эти события больше навредят ультраправым Дании, чем принесут им пользы..."
 denmark_events.5.a: "ДС сохраняет свою популярность"
 denmark_events.5.b: "НД растёт..."
 
 denmark_events.6.t: "Арильдсков встречается с Вождём"
 denmark_events.6.d: "Макс Арильдсков, бывший доброволец в Русской Гражданской войне и лидер савинковистской Новой Дании, встретился со своим вдохновителем Борисом Савинковым в Москве. Во время встречи он поздравил ‘Вождя’ с новоприобретённой им властью в Российской Республике и воспользовался возможностью для осуждения Немецкого и Синдикалистского влияния в Дании.\nХотя он не представляет из себя ничего значимого, некоторые люди заметили успех его российского коллеги, что привело к небольшому росту в его движении, и возможно, даже смогут занять несколько мест в Фолькетинг на следующих выборах. Датский Совет несколько обеспокоен развитием событий, являясь главным источником поддержки партии ‘Фурера’." 
 denmark_events.6.a: "'Фурер'? Звучит глупо..."
 
 denmark_events.7.t: "Беспокоящие известия с ферм"
 denmark_events.7.d: "Датское сельское хозяйство является главной опорой экономики Дании, что изначально ограничило последствия акцизного коллапса, но теперь к нам начали приходить волнующие новости. Опровергнув все наши ожидания, свободные экономики Европы до сих пор не восстановились от последствий Чёрного Понедельника, а, следовательно, цены на продукты гораздо ниже, чем обычно. В результате, большое количество продуктов остаётся не проданной или проданной в убыток, что может привести к тому, что фермеры не смогут оплатить свои кредиты и будут вынуждены продать свои фермы. А кроме этого, уменьшение их капитала значит, что у них будет меньше возможностей покупать у других сфер датской экономики..."
 denmark_events.7.a: "Это, наверно, плохо..."
 
 denmark_events.8.t: "Призыв к восстановлению"
 denmark_events.8.d: "Развитие экономического кризиса, начавшееся с первых ударных волн, пронеслось по всей Дании; городские жители теряют работу с пугающей скоростью, а фермеры начали распродавать свои убыточные фермы с аукциона, что привело к упадку датского сельского хозяйства. Переговоры Стаунинга с кабинетом министров, а затем и с Венстре зашли в тупик, и в связи с запланированными на конец этого года выборами необходимо разработать план действий. Придется пойти на уступки, чтобы умиротворить партнёра Стаунинга по коалиции, Радикале Венстре, а также убедить лидера Венстре Томаса Мадсена-Мигдала в необходимости плана восстановления экономики.\n\nЧто касается восстановления экономики, Стаунинг представил чёткий план действий, который позволит ему вести переговоры с KF, урегулировать банковский кризис, бороться с инфляцией заработной платы, определить судьбу кроны и справиться с шоковой волной спада в датском бизнесе. Успех Стаунинга на этих переговорах может оказаться решающим для успеха Социал-демократов на предстоящих выборах в сентябре."
 denmark_events.8.a: "Теперь, когда у нас есть план действий, можно приступить к работе."
 
 denmark_events.9.t: "Фермы закрываются"
 denmark_events.9.d: "Ожидаемо, многие фермеры потеряли возможность выплачивать свои кредиты, что вынудило их продавать свои фермы на аукционах крупным землевладельцам, имеющим резервы. Многие требуют у правительства помощь фермерам, но можем ли мы это позволить?"
 denmark_events.9.a: "Помочь им, как только появится возможность!"
 denmark_events.9.b: "Таков свободный рынок!"
 
 denmark_events.11.t: "Всеобщая забастовка фермеров"
 denmark_events.11.d: "По всей стране фермеры объединяются в забастовки. Осознав, что низкие цены на продукты со временем вынудят их продать свои фермы, они удерживают продажи для повышения цен. Хотя и умный с их стороны ход, он очень сильно вредит не-фермерам, также подверженным кризису и теряющим возможность покупать пищу."
 denmark_events.11.a: "Пойти на уступки для прекращения забастовки!"
 denmark_events.11.b: "Нам просто надо истощить их!"
 denmark_events.11.c: "Остановить 'фермерскую забастовку' силой!"
 
 denmark_events.12.t: "Фермерская забастовка не сдаётся"
 denmark_events.12.d: "Не смотря на наше нежелание идти на уступки, фермеры не отступают. Они всё ещё надеются сохранить свои фермы искусственным завышением цен."
 denmark_events.12.a: "Пришло время нам сдаться!"
 denmark_events.12.b: "Скоро всё кончится, правда!"
 denmark_events.12.c: "Давно уже пора их разогнать!"
 
 denmark_events.13.t: "Забастовка фермеров идёт на спад"
 denmark_events.13.d: "В результате забастовки цены на продукты возросли, но совсем не столь значительно, как они надеялись. Помощи от правительства они тоже не дождались. С растущим количеством ферм, экспроприированными банками, фермеры начинают продавать продукты по доступным ценам и рынок вновь стабилизировался. Со временем, этот процесс будет только ускоряться."
 denmark_events.13.a: "Это хорошо, наверно..."
 
 denmark_events.14.t: "Отношения с КНП"
 denmark_events.14.d: "Консервативная народная партия (KF) – доминирующая правоконсервативная сила в Дании. Однако проблемы в партии привели к расколу: конституционалисты под руководством Джона Кристмаса Мёллера вступили в коалицию с Венстре, в то время как авторитарное крыло остаётся лишь оплотом радикализма. Чтобы иметь возможность убедить Венстре, нам будет полезно объединиться с Мёллером и KF по ряду вопросов. Значительная часть электората KF происходит из Funktionærer, то есть среднего класса, состоящего в основном из клерков, и в качестве проявления доброй воли мы могли бы пойти на уступки и вложить средства в помощь нуждающимся в кратчайшие сроки.\n\nСтаунинг организовал свой кабинет для этого, и многие выступают за обмен, предусматривающий повышение подоходного налога, но такие требования могут отпугнуть KF от согласия. Инвестиции в KF могли бы не только помочь привлечь на нашу сторону их союзников в Венстре, но и убедить их согласиться выйти из коалиции в предстоящей предвыборной гонке, что закрепило бы нашу победу."
 denmark_events.14.a: "Хорошо, мы тоже пойдем им на уступки."
 denmark_events.14.b: "Есть более важные граждане, нуждающиеся в нашей помощи и инвестициях; упадок."

 denmark_events.15.t: "Положение кроны"
 denmark_events.15.d: "Датская крона, введённая в 1875 году, является валютой Дании. За исключением десятилетия с 1914 по 1924 год, она всегда имела золотой стандарт, что обеспечивало уверенность в её жизнеспособности как платёжного средства. Однако сегодня текущий экономический кризис поставил его стоимость в шаткое положение, и политики всех политических взглядов расходятся во мнениях о том, как ей следует себя вести.\n\nОппозиция, консервативно настроенные политики, спешат предложить старую добрую политику жёсткой экономии для повышения стоимости кроны, которая, по их мнению, не только поможет восстановить доверие к нашей валюте и сдержать инфляцию, но и обеспечит доступность товаров для рядовых граждан Дании.\n\nОднако внутри правящей коалиции звучат призывы к возвращению золотого стандарта, пусть даже временному, как мы это сделали в тяжёлые годы Вельткрига, чтобы быть более гибкими в управлении инфляцией. Такой подход больше соответствует современной экономической теории и даст нам преимущество в торговле со странами Средней Европы, если мы будем регулировать инфляцию таким образом, чтобы наши датские товары стали достаточно дешёвыми, чтобы получить преимущество на немецком рынке, но достаточно дорогими, чтобы принести хорошую прибыль Дании."
 denmark_events.15.a: "Давайте попробуем эту новую схему."
 denmark_events.15.b: "Золотой стандарт сохраняется."

 denmark_events.16.t: "Требование решительных действий"
 denmark_events.16.d: "Право на забастовку в Дании гарантировано «Стандартными правилами разрешения трудовых споров», разработанными в 1907 году и редко изменяемыми. В них изложены правила объявления коллективных действий обеими сторонами, при этом основным требованием является предпринятая попытка урегулирования спора путём переговоров, сначала на местном уровне между работниками и работодателями, а затем на национальном уровне между профсоюзами и организациями работодателей, такими как Dansk Arbejdsgiverforening. Скорость развития событий такова, что как профсоюзы, так и организации работодателей с трудом поспевают за происходящим на местах. Треть датских рабочих потеряли работу, и во многих забастовках участвуют, казалось бы, не имеющие к ним никакого отношения люди, некоторые из которых – бывшие работники, а некоторые – якобы «иностранные агитаторы». Некоторые работодатели прибегают к полной изоляции рабочих на своих заводах, а те, кто не успел сделать это вовремя, утверждают, что их заводы теперь заняты воинствующими забастовщиками. В то же время мы наблюдаем беспрецедентное количество забастовок солидарности во всех отраслях промышленности, которые являются законными в соответствии с Сентябрьским компромиссом 1899 года, но в нынешней ситуации практически что угодно можно обоснованно назвать забастовкой «солидации».\n\nЧестно говоря, ситуация на датских заводах и вокруг них ужасная, и сейчас, вероятно, невозможно вынести справедливое и взвешенное суждение. Если мы последуем призывам крупнейших организаций работодателей, мы рискуем нарушить право многих людей на коллективные действия. А если ситуация действительно настолько плоха, как сообщается, последующая борьба может нанести ещё больший материальный ущерб, чем уже нанесённый.."
 denmark_events.16.a: "Штурмуйте заводы и подавляйте забастовщиков, пока они не поставили нашу промышленность на колени."
 denmark_events.16.b: "Это их право на забастовку, но заставьте их сесть за стол переговоров."

 denmark_events.17.t: "Закон о мерах по защите датской валюты"
 denmark_events.17.d: "По инициативе не кого иного, как Томаса Мадсена-Мигдала, хотя и не без разногласий внутри его собственной партии, был принят новый закон, который призван восстановить Valutacentral, или "Управление валютного контроля", и вновь возложить на него контроль за внутренними денежными делами, а также за ввозом и использованием иностранной валюты в Дании. На этот раз, однако, рассматриваются дополнительные функции, а именно корректировка торгового баланса и регулирование экономики посредством контроля за импортом. Будучи радикальной инициативой, она оттолкнула более классически либерально настроенных членов Венстре и большинства членов КНП, но была одобрена Социал-демократами.\n\nМадсен-Мигдал на этот радикальный шаг побудили не что иное, как собственные меры Германии по контролю за импортом: временное удвоение импортных пошлин на сливочное масло, применяемое к импорту, превышающему 5000 тонн, как ожидается, оставит около 25 000 тонн датского масла без немецкого покупателя. Циничные наблюдатели могли бы заметить, что предстоящие выборы также будут вызывать беспокойство у Мадсен-Мигдала, чей основной электорат составляют фермеры.\n\nПротивники предлагаемого контроля за импортом поспешили выдвинуть контрпредложение: по их мнению, введение широкомасштабных протекционистских пошлин через Valutacentral может устранить нашу зависимость от немецкой продукции в долгосрочной перспективе и привести к прогнозируемому росту доходов в краткосрочной перспективе; однако это, по всей видимости, нарушит договоры Средней Европы и, следовательно, может создать напряженность в наших отношениях с немецкой экономической сферой. Стаунинг и кабинет министров согласны: выход из Миттельевропы лишь ввергнет Данию в еще больший хаос, и заявляют, что немецкая экономика, хотя и не совсем «дружелюбная» и находится в таком же плачевном состоянии, как наша, — наша главная надежда на выживание."
 denmark_events.17.a: "Наша обязанность — проводить политику, которая будет выгодна рядовым датчанам."
 denmark_events.17.b: "Давайте посмотрим, как далеко мы сможем зайти в этой ситуации."
 
 denmark_events.18.t: "Канслергадское соглашение"
 denmark_events.18.d: "Этим утром, представители партии Венстре, прибыли в апартамент Торвальда Стаунинга на Канслергаде 10, встретившись там со Стаунингом и представителями правящей коалиции. Уже давно ясно, что для разрешения кризиса понадобится что-то значительнее, чем покупка акций для стабилизации биржи Børsen, особенно после того, как сельское хозяйство Дании попало под удар. Правительство не контролирует Ландстинг, а значит, никакая реформа не будет проведена без согласия либералов. Весь день был проведён в жарких спорах о деталях, но вечером, после некоторого количества выпивки..."
 denmark_events.18.a: "...представители Венстре согласились."
 denmark_events.18.b: "...стало понятно, что нам не договориться."
 
 denmark_events.19.t: "Выборы в Фолькетинг [GetYear] года"
 denmark_events.19.d: "Канслергадское соглашение, хотя и было тщательно спланировано, не получило поддержки либералов и консерваторов. Последовавший за этим парламентский тупик вынудил Стаунинга, кабинет которого был выведен из строя, назначить досрочные выборы. Не прошло и года после выборов 1935 года, на которых коалиция Стаунинга с легкостью одержала победу, как он уже боролся за свое политическое выживание. Последние несколько недель были полны обвинений в том, кто виноват в таком повороте событий, но, в конечном счете, теперь очередь датчан решать, по какому пути пойдет страна на пути к восстановлению. Голосование завершено, и результат ясен:"
 denmark_events.19.a: "Мадсен-Мигдаль приводит Венстре к победе."
 
 denmark_events.20.t: "Основание Ригсполитиет"
 denmark_events.20.d: "Сегодня Ригсполитиет (Королевская Полиция) приступает к работе. Эта новая организация станет высшим эшелоном датской полиции, управляемая одним 'ригсполитичифен' – шефом полиции. Эта реформа упростит датский полицейский аппарат и увеличит эффективность правоохранительных органов."
 denmark_events.20.a: "...кроме того, это создаст рабочие места."
 
 denmark_events.21.t: "Рождение принцессы Маргрете"
 denmark_events.21.d: "Счастливые новости прибыли от королевской семьи: Фредерик и его жена Ингрид Шведская сообщили, что у них родился их первый ребёнок: Маргрете. Датская конституция не позволяет женщинам наследовать трон, и эксперты предполагают, что  её шансы заполучить престол в будущем довольно малы. Но сейчас время праздновать, ведь королевская семья стала на одного члена больше!"
 denmark_events.21.a: "Ура!"
 
 denmark_events.22.t: "Открытие моста Сторструм"
 denmark_events.22.d: "После 4 лет строительства, мост Сторструм был открыт [denmark_events.GetLeader]. Мост соединяет остров Фальстер с островом Маснедо, который был соединён с Зеландией в 1935 году мостом Маснедсунд. Теперь до Фальстера можно добраться поездом из Копенгагена. Также, при помощи моста Гулдборгсунд, до Лолланда также можно будет добраться без помощи паромов."
 denmark_events.22.a: "Следующая станция: Лангеланд... Тут уже будет посложнее."
 
 denmark_events.23.t: "Смерть Ганса Наелса Андерсена"
 denmark_events.23.d: "Предприниматель и путешественник Г.Н. Андерсен умер сегодня. Андерсен был основателем так называемой ‘Восточно Азиатской Компании’, самой большой из существующих сегодня в Дании. Кроме этого, он был дипломатом, не успешно попытавшемся инициировать мирные переговоры во время Вельткрига, а также служил в Датско Консульстве в Сиаме. Он был награждён титулом Рыцаря Слона за его заслуги, и нам точно будет его не хватать!"
 denmark_events.23.a: "Это точно!"
 
 denmark_events.24.t: "Норвежские документы переданы"
 denmark_events.24.d: "Большое количество документов, связанных с Норвегией, в основном времён Дании-Норвегии, вскоре будут переправлены из наших государственных архивов, Королевской Датской Библиотеки и Библиотеки Университета в Осло. Норвежцы будут рады возвращению части их истории на родину."
 denmark_events.24.a: "Как и должно быть."
 denmark_events.24.b: "Подождите, я нашёл опечатку в документах."
 
 denmark_events.25.t: "Норвежские документы переданы"
 denmark_events.25.d: "Посылка из национальных архивов Дании, Датской Королевской Библиотеки и Библиотеки Университета Копенгагена, наконец, прибыла. Это документы, связанные с Норвегией, со времен, когда Дания и Норвегия были одной страной. Добавив их к нашим архивам, наша история будет немного более ясной!"
 denmark_events.25.a: "Спасибо, Дания!"
 
 denmark_events.27.t: "Смерть Томаса Триге"
 denmark_events.27.d: "Датский предприниматель Т.Б. Триге покинул мир живущих. Триге был основателем одноимённой компании производившей моторы для сельскохозяйственных и прочих нужд. Триге работал в Соединённых Штатах, а по окончанию войны вернулся в Данию, что временем положило начало слухам о том, что он предвидел тяжёлое будущее Америки. И несмотря не на что фабрики Триге остаются одним из главных источников рабочих мест, и мы, несмотря ни на что, должны быть благодарны!"
 denmark_events.27.a: "Покойся с миром!"
 
 denmark_events.28.t: "Смерть Харальда Скавениуса"
 denmark_events.28.d: "Нам сообщили, что наш прежний министр иностранных дел, и кузен нынешнего члена кабинета Эрика, Харальд Скавениус скончался в Гааге, где он служил дипломатом с 1828. Скавениус, считавший себя консерватором и широко известный за свои антисиндикалистические взгляды, умер, как и жил: служа за границей на благо Дании."
 denmark_events.28.a: "И впрямь..."
 
 denmark_events.29.t: "Смерть Петера Петерсена"
 denmark_events.29.d: "Инженер Петер Олуф Петерсен умер сегодня в Копенгагене. Петерсен известен за его коллаборацию с Вальдемаром Паульсеном, изобретателем беспроводной телеграфии, ставшей важным шагом в развитии радио. Начиная с 1922 Петерсен был директором Колледжа Продвинутых Технологий (Ден Политекниске Леренстальт)."
 denmark_events.29.a: "Нам будет его не хватать."
 
 denmark_events.30.t: "Смерть Торвальда Стаунинга"
 denmark_events.30.d: "Торвальд Стаунинг, один из самых влиятельных государственных рабочих Дании, умер сегодня. Стаунинг, с давних времён ставший председателем социал-демократов привёл свою партию к власти и заполучил большую долю голосов, чем кто-либо до него. Ему часто приписывают сдерживание популярности как синдикалистов так и реакционеров, и многие требуют чтобы для него были проведены государственные похороны, обычно проводимые только для датских премьер-министров."
 denmark_events.30.a: "Он заслуживает этой чести!"
 
 denmark_events.32.t: "Проблемы в НКП"
 denmark_events.32.d: "Датская Народная Консервативная Партия, в прошлом известная как Правые, является третьей партией в Фолькетинге. Но недавно они стали жертвой внутренней борьбы: партия безнадёжно разделилась на два крыла. Демократическое крыло, возглавленное Джоном Кристмасом Мёллером, в данный момент представляет партию в парламенте и поддерживает здоровую демократию Дании. Более традиционное крыло, возглавленное Виктором Пуршеллом и поддерживаемое Джеком Вестергаардом с его Консервативной Молодежью, желает возвращения власти королю и создания системы как в Германии. Две ветви ещё долго будут спорить, что позволит социал-демократам, а также их естественным соперникам, Венстре, набрать поддержку."
 denmark_events.32.a: "Раздробленная оппозиция полезна правительству."
 
 denmark_events.34.t: "Дания желает вступить в Рейхспакт"
 denmark_events.34.d: "Мудро решившись сражаться с нашими общими врагами, правительство Дании запросило у нас разрешения на вступление в альянс. У нас не весомых причин отказать им,  особенно учитывая то, что их кооперация позволит нам защитить Балтийское море от внешних угроз."
 denmark_events.34.a: "Добро пожаловать!"
 denmark_events.34.b: "Нет, спасибо!"
 
 denmark_events.35.t: "Германия соглашается"
 denmark_events.35.d: "Германия приняла нас в свой альянс. Вместе мы сокрушим наших врагов и спугнём наших соперников!"
 denmark_events.35.a: "Når tysken kommer her."
 
 denmark_events.36.t: "Германия отказывается"
 denmark_events.36.d: "Германия отказала нашей петиции по вступлении в Рейхспакт, посчитав, что у них нет свободных солдат для защиты наших территорий."
 denmark_events.36.a: "Наша гордость немного задета."
 
 denmark_events.37.t: "[GetSecondInCommand] уволен королем"
 denmark_events.37.d: "Нежданные новости прибыли из дворца: король Кристиан X отправил в отставку [getDanishPrimeMinister] и его министров, а на его место поставил Виктора Пюршеля, лидера авторитарного (роялистского) крыла НКП, аргументируя это нежеланием кабинета вступить в Вельткриг, ставящего под угрозу долговременное процветание Дании и уменьшающего шансы стран Европы выстоять под напором синдикалистской угрозы. Но король вряд ли сможет долго настаивать на своём в случае появления большого сопротивления его решению."
 denmark_events.37.a: "Стоило ли позволять его ему иметь подобную власть?"
 
 denmark_events.38.t: "Стаунинг показывает истинное лицо"
 denmark_events.38.d: "После катастрофического падения, будучи одним из ведущих и популярных премьер-министров Дании, Торвальд Стаунинг объявил шокирующую новость о продолжении своего руководства партией «Социал-демократия». Учитывая, что Дания совершила резкий поворот в политике после его неудачной попытки сформировать правительство во время Конституционного кризиса, Стаунинг решил присоединиться к Коммунистической Федерации. Стаунинг, возможно, не является убежденным социалистом, что вызывает вопросы к его решению, в котором он обратился к большей части Дании с призывом о том, что для сохранения последней надежды на демократию необходимо идти на жертвы.\n\nПоскольку, казалось бы, полный контроль короля над политикой идет на спад, неудивительно, что самой большой занозой для него стали симпатии к левым, которые более охотно поддерживают его некогда предложения о более истинной датской демократии. Он присоединился к ним не из желания, чтобы Дания стала социалистической диктатурой, а, наоборот, под влиянием радикальных бывших членов Социал-демократов.\n\nОпозоренные кризисом, а теперь и партийным руководством, не все в Socialdemokratiet убеждены в заявлениях Стаунинга и в значительной степени изменили свое отношение к поддержке народного восстания. Вильгельм Буль становится новым лидером партии и с этого момента будет руководить Социал-демократами, хотя небольшая потеря членства и упадок датской демократии после кризиса снизили ее популярность. Если уж на то пошло, маловероятно, что они вернутся на первый план в ближайшее время."
 denmark_events.38.a: "Волк в овечьей шкуре."

 denmark_events.39.t: "Dealing with the Welfare State Reforms"
 denmark_events.39.d: "Tirelessly, Pürschel has been working hard to cement his government's legitimacy after having been appointed in the face of Stauning's defeat. This involves tearing down every last relic of the old government, which has spent an overwhelming amount of the budget on state reforms. Many of these reforms coalesce into Stauning's concept of the 'Welfare State' and involve drastically diverting the efficiency of our industry in favour of the people.\n\nHowever, there is no room for excess government spending for reforms such as these, and many in the KF are demanding that we pass laws to backslide them. The King has stood firmly in favour of Pürschel's best judgement on such a matter. If we decide to accede to these demands, it will no doubt create unrest broadly across the population, but it will adhere to appeasing supporters of the KF overall. Instead, we could always choose to keep them intact and divert their legacy to our own."
 denmark_events.39.a: "Tear it all down, no mercy!"
 denmark_events.39.b: "Deal with only the most egregious reforms, and keep some intact."
 denmark_events.39.c: "Leave them alone."

 denmark_events.40.t: "[GetSecondInCommand] уволен в отставку королем"
 denmark_events.40.d: "Unexpected news arrived from the palace: King Christian X has dismissed [GetSecondInCommand] and his ministers and replaced him with John Christmas Møller, the leader of the conservative (constitutionalist) wing of the KF, citing concerns over the cabinet's incompetence, unchecked rampant corruption, and the risk this brings to the continued prosperity of Denmark. It is highly questionable, however, if the king's resolve will stay this strong if significant resistance grows to these actions. Already, Venstre has called on its party's supporters to back their new coalition leaders as their cabinet has been forcibly pushed out of power.\n\nJohn Christmas Møller has publicly declared his intentions to maintain Denmark's fragile democracy, but only time can tell if he will fulfil these promises. With the king having appointed an adequate government suited to his liking, Denmark can now formally align itself with the German hegemon."
 denmark_events.40.a: "Should we have allowed these reserve powers to persist?"

 denmark_events.41.t: "Westergaard on the Move"
 denmark_events.41.d: "Despite only having recently entered office, Møller received notice that fellow Konservative party member, Jack Westergaard, has challenged his position as Prime Minister. Jack Westergaard, the current leader of the Konservative Ungdom (Young Conservatives), has been nothing but outspoken about his views on KF's party line. Aligning with ideologues in the autocratic wing of the party, such as Victor Pürschel, Westergaard is undoubtedly unsatisfied with Møller and the constitutionalists.\n\nMost of the party is aligned with Møller, however, especially with the King's appointment legitimising his rule as Prime Minister. Westergaard is ambitious and garners attention from across the spectrum as a young upstart who seeks to drastically dismantle our precious democracy."
 denmark_events.41.a: "Young and unwieldy, yet he'll still spell trouble."

 denmark_events.42.t: "Westergaard Holds a Rally"
 denmark_events.42.d: "Westergaard gathered alongside a large crowd today in Copenhagen, meeting with thousands of his supporters. The Konservative Ungdom, made up of both young conservative supporters as well as student conservatives, hold signs and chant to the beat of Westergaard's drum. While this rally is not necessarily violent, many in the KF have displayed concerns about the effects of having such a large, organised protest remain active throughout the week.\n\nIn response, Møller has denounced Westergaard and has called on the police to maintain order. It remains unseen, however, as to whether or not this situation will erupt into violence, but the situation in Copenhagen remains tenuous."
 denmark_events.42.a: "Nothing more than a legionary copycat."

 denmark_events.43.t: "Westergaard Meets with King Christian"
 denmark_events.43.d: "The situation since Møller's appointment has reached a fever pitch, and in light of the ongoing tension, Westergaard has decided to request an audience with Christian X. Pandering towards the king's disdain towards the democratically elected governments over the past two decades, and his willingness to utilise his reserve powers, Westergaard has presented his plans to quell the opposition's protest and bring stability back to Denmark.\n\nAlongside Westergaard stands Carsten Raft, the prior leader of the Konservative Ungdom and staunch advocate for taking influence from popular right-wing movements across Europe, such as the Legionaries in Romania or Savinkov in Russia. If his plot succeeds, Westergaard's plan to end democracy in Denmark may truly come to fruition."
 denmark_events.43.a: "The traitors squabble amongst themselves."

 denmark_events.44.t: "Westergaard Delivers an Ultimatum!"
 denmark_events.44.d: "Chaos has erupted in Copenhagen! Møller and the constitutionalist wing of the KF met today after Westergaard, with the backing of the autocratic wing of the KF, presented an ultimatum demanding Møller resign from office. Taking to the streets with Carsten Raft, the Konservative Ungdom has stepped up from his rally last month and has begun organising columns by the thousands throughout the major streets in Copenhagen.\n\nWestergaard and his youth wing have decided to pick fights with those who aligned themselves with the opposition, while rallying many supporters to the KF to join them on their crusade. Møller has yet to respond to the demands and accusations of the opposition, having preferred to conjure a legitimate plan through conferences with the constitutionalist wing of the KF. King Christian X is watching the situation carefully and informs Møller that he must make a decision quickly in order to contain the situation.\n\nHaving debated with his ministers, Møller decides to..."
 denmark_events.44.a: "Call on loyal army units in Copenhagen to maintain order at all costs."
 denmark_events.44.b: "Resign, there is no other option."

 denmark_events.45.t: "The Konservative Ungdom Disperses"
 denmark_events.45.d: "Army units under General With received Møller's call to action and quickly dispatched units of the army to aid in quelling the protests. Westergaard and the Konservative Ungdom eventually stood down in the face of With's forces and withdrew from the city centre. Having secured his rule over the party and its leadership, Møller dismissed Westergaard as leader of the Konservative Ungdom and placed Aksel Møller in charge. Møller is now free to properly assess the country's situation and deal with the opposition."
 denmark_events.45.a: "With that minor interruption out of the way, time to deal with the situation at hand."

 denmark_events.46.t: "Westergaard Appointed Prime Minister"
 denmark_events.46.d: "In the face of Møller resigning, King Christian X had no choice but to accede to Westergaard's demands to be appointed Prime Minister. Many in the KF who backed Møller found his choice to be extremely distasteful, and have announced their own resignations in the face of Westergaard's appointment. Despite this, Westergaard has made a public announcement declaring that Denmark shall no longer be led astray, and under his paternal guidance, as well as loyalty to the monarchy, Denmark shall be guided into a new golden age.\n\nFollowing this address, Westergaard has appointed Carsten Raft as leader of the Konservative Ungdom in his stead, hoping to model the youth wing into a true paramilitary under Raft's guidance. Westergaard's radical transformation of Denmark has only begun..."
 denmark_events.46.a: "Perhaps we'll yet restore the glory of Højre."

 denmark_events.47.t: "The Unicameralism Referendum of [getYear]"
 denmark_events.47.d: "After a heated session in parliament, and the votes of over 60% of Danes across the country, news has finally come in of the recent referendum passed by John Christmas Møller in an attempt to finally end majority rule over the country. Møller's referendum dictates that Denmark would be better off without the Rigsdag, their bicameral parliament which was made up of the Folketing (Lower House) and the Landsting (Upper House). This move comes as a popular response to finally clarify Danish bureaucracy and improve the government's abilities to pass laws and bills without having to pass through the Landsting, which at this point only seemed to serve as a rubber stamp.\n\nClearly inscribed within the changes this referendum will hold towards the constitution include Møller's long-desired Parliamentarism of Denmark, which ensures that no government will have a majority of members in opposition. Apart from this, with the abolishment of the Landsting, the Folketing will now comprise of 179 members. Finally, the office of the Ombudsman has been added to the Folketing, which will further aid in safeguarding Danish democracy forevermore."
 denmark_events.47.a: "A triumph for Møller and the KF!"

 denmark_events.48.t: "Бунт в Копенгагене!"
 denmark_events.48.d: "Тревожные новости пришли в офис Вестергарда поздно вечером вчера после столкновения Консервативной молодёжи с членами Коммунистической Федерации. Коммунистической Федерации, долгое время организовавшаяся против самого их существования, наконец прибегла к насилию, получив оружие из неизвестного источника. Многие в KF подозревают, что французские или британские синдикалисты могли поставлять это оружие по тайным каналам, однако Вестергард решил воспользоваться этой возможностью, чтобы разработать план по окончательному захвату власти.\n\nВестергард оперативно направил военнослужащих, а также несколько недавно вооружённых бригад Консервативной молодёжи, чтобы помочь восстановить порядок. В условиях, когда судьба Копенгагена висит на волоске, все взгляды прикованы к Вестергарду."
 denmark_events.48.a: "Вестергаард должен так или иначе разрешить этот кризис!"

 denmark_events.49.t: "Passing of the Bemyndigelseslov"
 denmark_events.49.d: "The tumultuous situation in Copenhagen has reached its timely conclusion as Westergaard has pushed through a law that will help to settle things once and for all. King Christian X met with Westergaard late last night, demanding an answer towards the sudden uprising in Copenhagen, and Westergaard presented evidence that Stauning and Socialdemokratiet have been cooperating with the syndicalists in France to overthrow their fragile regime. While many of the documents presented were clearly forged, the king's bias towards them, as well as the mounting pressure to settle this crisis, has overturned any means of logic or clear thinking present.\n\nWith overwhelming support from the KF, the Rigsdag was eventually pressured into signing away their power towards Westergaard, who they see as the only means left capable of settling this crisis. Therefore, Westergaard has decided to invoke the 'Bemyndigelseslov' (Enabling Act), providing extraneous power centralised within the role of the Prime Minister and his party, while still maintaining the reserve powers of the king. Utilising this law, Westergaard has pushed to crush this uprising and ban the Kommunistisk Føderation once and for all, while also cancelling elections for the time being.\n\nThe opposition, led primarily by Peter Munch after Stauning's ungraceful fall from prominence, has protested this act, calling it truly undemocratic and an authoritarian power grab, but due to the faltering of Socialdemokratiet, it seems he is falling on deaf ears. In a speech given days after this act came to pass, Westergaard has announced that the 'National Rebirth' of Denmark is at last, and announced his plans to replace the faltering parliamentary democracy with what he dubs 'Social Nationalism'."
 denmark_events.49.a: "Westergaard is truly the man Denmark needs!"

 denmark_events.50.t: "Будущее датского либерализма"
 denmark_events.50.d: "В связи с окончанием войны в Европе,[GetSecondInCommand] объявил о встрече делегатов от Венстре и Радикальных Венстре для обсуждения будущего обеих партий. Коалиция военного времени, восстановив большую часть «Radikale Venstre», создала новый фронт либерализма в Дании, невиданный с тех пор, как партия распалась несколько десятилетий назад, что и привело к изначальному расколу. Однако [GetSecondInCommand] и Петер Мунк из Radikale Venstre обсуждают возможное восстановление «Forenede Venstre» в качестве единой партии, что, несомненно, разрушит уникальные особенности двух партий, но вновь сплотит единую либеральную партию.\n\nОдним из ключевых факторов, влияющих на возможность возвращения к славным дням 1872 года и получения большинства в парламенте, является сохранение военного союза с Германией. Петер Мунк согласился на всё, кроме продолжения войн, затянутых немецким гегемоном, заявив даже, что Германия может посягнуть на независимость Дании, если мы слишком тесно сблизимся с кайзером и его лакеями. [GetSecondInCommand] теперь имеет выбор: сохранить отдельные партии внутри этой коалиции, а также наш союз с Германией, или, возможно, возродить датский нейтралитет, вежливо попросив о выходе из военного союза."
 denmark_events.50.a: "Статус-кво вас устраивает, не беспокойтесь."
 denmark_events.50.b: "Немедленно передайте нашу просьбу министру иностранных дел Германии!"
 
 denmark_events.150.t: "Denmark Requests to Leave the Reichspakt"
 denmark_events.150.d: "Following the defeat of the Internationale and Russia to our east, our small ally to the north has delivered a request to our foreign minister, requesting that they be allowed a safe exit from our military alliance, as well as guaranteeing their neutrality. Some in our government have expressed their concerns about allowing Denmark to restore neutrality, citing the need for access through their straits as well as cooperation in future wars as a necessity.\n\nThe Danish foreign minister has alleviated some of our concerns, having agreed to maintain membership in the Central European Customs Union, as well as strong trading ties. Shall we enforce their ties within our alliance or simply allow them to depart?"
 denmark_events.150.a: "Enforce our will upon Denmark, they shall remain."
 denmark_events.150.b: "Show some benevolence, allow their departure."

 denmark_events.250.t: "Germany Refuses our Request!"
 denmark_events.250.d: "Unfortunately, Germany has refused our request to exit the military alliance, citing concerns about the need for a continued military presence within our country, as well as access to our straits. While this news does not come as a large surprise, considering the aims of the German hegemon, Peter Munch has discarded plans to pursue the restoration of Forenede Venstre. Danish liberalism will continue to endure despite this slight hitch in our plans, at the behest of Germany, who seems to have greater plans than to appeal to our request."
 denmark_events.250.a: "Unfortunate circumstances..."

 denmark_events.350.t: "Germany Agrees to our Request"
 denmark_events.350.d: "Joyous news has arrived from the German foreign minister as our request for a safe departure from their military alliance has been approved, at the behest of those who grew to see Denmark as just another dominion in the German sphere of influence. With this proposal having succeeded, Peter Munch and [GetSecondInCommand] met in Copenhagen to announce the restoration of Forenede Venstre (United Left), which tore itself apart several decades ago. This sudden news has propelled the likes of former Prime Minister Carl Theodor Zahle to make a speech to those formerly in Radikale Venstre, reconciling much of the antimilitarists, given that Denmark has returned to a position akin to nearly 50 years ago.\n\nWith parliamentarism entrenched, social liberal reforms being applied in moderation, and Peter Munch and [GetSecondInCommand] working together, the future of Denmark looks exceptionally bright."
 denmark_events.350.a: "United once more into an unbreakable and unshatterable party!"
 
 denmark_events.51.t: "Прибытие короля Кристиана"
 denmark_events.51.d: "Кристиан фон Глюксбург, бывший король Дании, прибыл в Берлин после событий на его родине: надеясь набрать достаточно влияния для входа в Вельткриг на стороне Германии, он положил начало скандалу, лишившего его Датского трона и направив страну на путь безоговорочного нейтралитета.\nНекоторые среди нашего правительства считают правильным оставить Данию в покое и не провоцировать её вступление в Интернационал, но Кристиан является Шурином герцога Мекльбурга-Шверина и кронпринцем жены Вильгельма. И с Данией будет легко разделаться, они, возможно, даже не успеют связаться с Интернационалом."
 denmark_events.51.a: "Интервенция не обсуждается."
 denmark_events.51.b: "Нет смысла погибать за Данию!"
 
 denmark_events.52.t: "Враг моего врага..."
 denmark_events.52.d: "Германия решила вспомнить все свои старые обиды: теперь мы, как и коммуна, находимся с ними в состоянии войны. Их синдикалистские идеалы далеки от наших, но, возможно, в такой войне не помешает и капля прагматизма?"
 denmark_events.52.a: "Попробовать вступить в Интернационал!"
 denmark_events.52.b: "Мы не уместимся в одной лодке с синдикалистами!"
 
 denmark_events.53.t: "Дания просит нашей помощи!"
 denmark_events.53.d: "Датские буржуи оказались в весьма деликатной позиции: они оказались в состоянии войны с нашим имперским врагом. Хотя идея о вступлении классовых предателей в Интернационал звучит ужасающе, они смогут открыть северный фронт, если выстоят достаточно долго, а после окончания войны мы сможем воспользоваться этим для реформации Дании в настоящую синдикалистскую страну."
 denmark_events.53.a: "Только если они проведут реформы!"
 denmark_events.53.b: "Мы не будем сражаться вместе с классовыми предателями!"
 
 denmark_events.54.t: "Французы требуют реформ"
 denmark_events.54.d: "Французы ответили на наш запрос требованием проведения значительных реформ, которые принесут синдикалистскую систему в Данию. Возможно и не самый приятный для нас исход, но альтернативой является превращение в сателлит Германии или Франции по окончанию войны."
 denmark_events.54.a: "У нас нет выбора..."
 denmark_events.54.b: "Мы не пожертвуем демократией!"
 
 denmark_events.55.t: "Дания соглашается"
 denmark_events.55.d: "Датчане неохотно согласились на наши требования. С разрешением политических проблем, для них открылась дорога в Интернационал."
 denmark_events.55.a: "Добро пожаловать, Товарищи!"
 
 denmark_events.56.t: "Дания отказывается от нашего предложения"
 denmark_events.56.d: "Датчане не желают реформироваться, как мы им предложили, заявив, что это противоречит их конституции. Для нас это не проблема: когда мы разделаемся с Германией, Дания будет освобождена силой и настоящая демократическая система придёт к власти."
 denmark_events.56.a: "Для нас это не проблема..."
 
 denmark_events.57.t: "Франция отказывает нам!"
 denmark_events.57.d: "Заявив, что 'буржуазные социалисты' (мы, то есть) могут навредить революции, французы отказали нам в вступлении в Интернационал."
 denmark_events.57.a: "Мы и без них справимся!"
 
 denmark_events.58.t: "Вопрос монархии"
 denmark_events.58.d: "Поддержка короля Кристиана незаконного правительства Пурсела принесла очень много вреда монархии, и её популярность находится гораздо ниже отметки в 50%. Но многие подмечают, что это, скорее, ввиду непопулярности самого Кристиана, а не большой любви к республиканизму. Король не может оставаться на своей позиции и его отречение неизбежно, но должен ли он отречься согласно стандартной процедуре и позволить своему сыну, Фредерику унаследовать трон, или нам следует принять менее ортодоксальные меры для обеспечения того, что это никогда больше не случится? Республика не кажется самым плохим выбором."
 denmark_events.58.a: "Фредерик должен унаследовать!"
 denmark_events.58.b: "Положить конец монархии и провозгласить республику!"
 
 denmark_events.64.t: "75 лет с потери Шлезвига-Гольштейна"
 denmark_events.64.d: "Три четверти века тому назад, проклятые пруссаки захватили Герцогство Шлезвиг-Гольштейн и объявили его своим собственным, обрекая этим многих датчан на жизнь под властью немецкой короны. Неудивительно, датские радикалы, в основном из Данмаркс Фолкрепубликаниске Парти, а также из Датский Совет и максимистского крыла синдикалистской Фагоппозитионс Самменслатинг держали речи в этот день.\nКНП организовали пир в честь ‘Приближающегося Освобождения Шлезвига’ рост реваншизма не обозначает ничего хорошего."
 denmark_events.64.a: "Да..."
 
 denmark_events.70.t: "20-летие атаки на Børsen"
 denmark_events.70.d: "Ровно 20 лет назад группа анархистов и синдикалистов атаковала Биржу Копенгагена, также известную как 'Børsen'. Среди синдикалистов этот день вспоминают как день, когда Дания была наиболее близка к революции. Неудивительно, что они отмечают этот сомнительный юбилей и организуют различные события в память о тех, кто был арестован в этот день."
 denmark_events.70.a: "Волнующе!"
 
 denmark_events.71.t: "Грундловсдаг"
 denmark_events.71.d: "Сегодня Грундловсдаг, или День Конституции: в этот день датчане восхваляют свою демократию; многие политики сегодня произнесут речи и большинство рабочих работают лишь полдня."
 denmark_events.71.a: "Ура!"
 
 denmark_events.72.t: "Выборы Секретаря Иностранных Дел"
 denmark_events.72.d: "Согласно требованиям Франции, правительство проходит радикальную реорганизацию. Отныне, функции Ригсдага будут исполняться новым Фагоппозитионс Самменслатинг, членами которого станут все рабочие Дании в обязательном порядке.. В отличии от многих Ортодоксальных Синдикалистских систем, эта будет гораздо более открытой, в том числе и для 'радикальных мнений', например для членов бывшей Радикальной Венстре. Сегодня будет выбираться секретарь Иностранных Дел: Иб Нурлунд от ортодоксальной синдикалистской фракции, выступающий за поддержку близких отношений с Третьим Интернационалом, Ханс Хедтофт фракции Стаунинга, выступающий за прагматичную поддержку интернационала сейчас, и за пересмотр политики по окончанию войны, а также Отто Мор, выступающий за уменьшение кооперации по окончанию войны. Революционная и Максимистская фракции также представили своих кандидатов, но они слишком малы, чтобы шансы на победу."
 denmark_events.72.a: "Ортодокс Нурлунд"
 denmark_events.72.b: "Стаунингерист Хедтофт"
 denmark_events.72.c: "Либерал Мор"
 
 denmark_events.73.t: "Выборы Секретаря Экономических Дел"
 denmark_events.73.d: "Сегодня Фагоппозитионс Самменслатинг будет выбирать секретаря Экономических Дел. Три самые влиятельные фракции вновь представляют своих кандидатов: давний синдикалист Пол Гиссеман поддерживает полную юнионизацию датской экономики; ему противостоит Стаунингерист  Вигго Кампман, желающий сохранить как можно больше свободы рынка Дании, не нарушая при этом требований Франции, а третьим кандидатом является Бертель Дальгаард, что требует сохранения свободы рынка, открыто игнорируя договорённости с французами."
 denmark_events.73.a: "Ортодокс Гиссеман"
 denmark_events.73.b: "Стаунингерист Кампман"
 denmark_events.73.c: "Либерал Дальгаард"
 
 denmark_events.74.t: "Выборы Секретаря Внутренних Дел"
 denmark_events.74.d: "Теперь Фагоппозитионс Самменслатинг начинает голосование за нового секретаря Внутренних Дел. И вновь три самых значимых фракции предоставляют своих кандидатов: от крыла ортодоксов, Мартин Андерсен Нексо, и его программа подавления антисиндикалистических движений, сохраняющих свою популярность в Дании, для сохранения датской революции; его оппоненты Альсинг Андерсен и Джорген Джоргенсен от Стаунингерист и либералов соответственно, протестующих против подобной тактики, утверждая, что это лишь усилит недоверие датчан к новой системе."
 denmark_events.74.a: "Ортодокс Нексо"
 denmark_events.74.b: "Стаунингерист Андерсен"
 denmark_events.74.c: "Либерал Джоргенсен"
 
 denmark_events.75.t: "Выборы Председателя"
 denmark_events.75.d: "Самменслатинг, наконец,  прибыл в офис председателя. Долгое время Кристиан Кристенсен находился во главе организации без какой-либо оппозиции, но с наплывом новых членов ввиду установления ФС во главе государства у него появились новые соперники: Торвальд Стаунинг, воспринимаемый людьми как спаситель Дании, заключивший союз с Францией, и Питер Мунк, поддерживаемый многими реакционерами, которым приходится играть по новым правилам.."
 denmark_events.75.a: "Кристенсен переизбран"
 denmark_events.75.b: "Стаунинг становится новым председателем"
 denmark_events.75.c: "Криптореакционеры поставили Мунка во главу государства"
 
 denmark_events.76.t: "Победа Ортодоксов"
 denmark_events.76.d: "Неожиданно, ортодоксальное крыло Самменслатинга осталось во главе своей собственной организации, не смотря на наплыв новых членов. Умеренная революция Дании может оказаться и не такой уж и умеренной..."
 denmark_events.76.a: "Французы будут рады, я полагаю..."
 
 denmark_events.77.t: "Победа Стаунингеристов"
 denmark_events.77.d: "Неудивительно, бывший премьер-министр Стаунинг заполучил контроль над синдикалистским Самменслатингом воспользовавшись своей популярностью и заявив о том, что он спас Данию, найдя для неё союзников. Это подкрепило убеждение, что несмотря ни на что, социал-демократы останутся значимой силой в политике Дании."
 denmark_events.77.a: "Ничего удивительного."
 
 denmark_events.78.t: "Победа Либералов"
 denmark_events.78.d: "Синдикалисты были побеждены в их собственной игре: Франция разрешила образование более открытой системы в Дании так как считала что маленькая Радикальная Венстре никогда не сможет стать влиятельной, но их агрессия к консерваторам и либералом стала причиной популяризации ранее маленькой партии. Многие считают, что либералы, получившие контроль над профсоюзами могут устроить контрреволюцию, когда остальные синдикалистские страны отвлекутся на что-нибудь ещё."
 denmark_events.78.a: "Очень умеренная, эта революция"
 
 denmark_events.79.t: "Нет большинства"
 denmark_events.79.d: "Наплыв новых членов привёл к безнадёжному расколу в Фагоппозитионс Самменслатинг. Ни одной из фракций не удалось достичь большинства, и придётся идти на компромисс для создания нового правительства Дании."
 denmark_events.79.a: "Стаунингерне вступит в коалицию с крылом Ортодоксов"
 denmark_events.79.b: "Стаунингерне вступит в коалицию с крылом Либералов"
 
 denmark_events.80.t: "Король Кристиан умирает..."
 denmark_events.80.d: "Его королевское величество сегодня испустило дух у себя дома, во дворце Амалиенборге. Он будет похоронен среди его предков – других членов датской королевской семьи – в Роскильдской церкви в 30 километрах от Копенгагена. Тем временем, премьер-министр объявил, что его сын, кронпринц Фредерик, стал новым королём Дании!"
 denmark_events.80.a: "Король умер, долгой жизни королю!"
 
 denmark_events.85.t: "Томас Мадсен-Мигдаль умер"
 denmark_events.85.d: "Томас Мадсен-Мигдаль, активный лидер партии Венстре, скончался сегодня в присутствии своей семьи. Занимав посты члена правительства, главного лидера оппозиции и даже премьер-министра, он, определённо, оставил свой след в политике Дании. Венстре быстро назначила Кнуда Кристенсена новым лидером партии; ему придётся приложить большие усилия чтобы повторить успехи замечательного лидера правых датчан."
 denmark_events.85.a: "На его похоронах наверняка будет полно либералов..."
 
 denmark_events.86.t: "Дания предлагает экономическую сделку"
 denmark_events.86.d: "Наш маленький сосед с севера потерпел большие убытки от чумы Чёрного Понедельника, навредившей им не меньше чем нам. Пытаясь смягчить удары, правительство Дании пытается сделать импорт датских товаров более привлекательным. Для этого они хотят уровнять обменный курс между Кроной и Маркой, двух валют, привязанных друг к другу соглашениями Миттельевропы. Взамен на наше соглашение датское правительство обещает закупать больше немецких товаров."
 denmark_events.86.a: "Хорошая сделка, мы согласны!"
 denmark_events.86.b: "Мы не предадим простых граждан Германии!"
 
 denmark_events.87.t: "Германия принимает наше предложение"
 denmark_events.87.d: "Немецкое правительство приняло наше предложение по закупке большего количества их товаров, если они помогут нам уровнять стоимость Кроны и Марки, связанных друг с другом с самого Вельткрига."
 denmark_events.87.a: "Это поможет восстановлению, отлично!"
 
 denmark_events.89.t: "Основание 'Лего'"
 denmark_events.89.d: "Магазин древесных изделий Биллунского плотника Оле Кирка Кристиансена, переживает тяжёлые времена: из-за Чёрного Понедельника, ударившего по Дании, всё меньше и меньше людей заказывает мебель в когда-то процветавшей мастерской. Ввиду этого Кристиансен решил посвятить себя проектам поменьше и начал производить игрушки для детей. Хотя процесс и не принёс большую прибыль, мастерской удалось остаться на плаву и игрушки – теперь имеющие бренд ‘Лего’, сокращение от ‘Лег годт’, т.е. ‘Играть хорошо’ – уверенно набирают популярность в Дании и Шлезвиг-Гольштейне."
 denmark_events.89.a: "Великолепный пример Датской изобретательности!"

 denmark_events.91.t: "Попросить защиты у Германии?"
 denmark_events.91.d: "К большому сожалению Норвегия и Швеция пали перед силами синдикализма, что нарушили давний статус-кво в регионе. Всё громче и громче идут разговоры о том, чтобы войти в Рейхспакт под протекторат Германии. Дания сама не сможет себя защитить от двух мастодонтов в лице Норвегии и Швеции..."
 denmark_events.91.a: "Срочно звоните в Берлин!"
 denmark_events.91.b: "Мы выстоим сами по себе!"
 
 denmark_events.92.t: "Августовские беспорядки"
 denmark_events.92.d: "По всей Дании начались беспорядки, вызванные нашим долгим нахождением в войне. Этот месяц стал особенно жёстким, так как забастовки начались практически во всех городах. К счастью, в Копенгагене пока всё спокойно... пока..."
 denmark_events.92.a: "Да мы уже почти победили!"

 denmark_events.93.t: "Syndikalistloven"
 denmark_events.93.d: "'Закон N349 о запрете синдикалистических профсоюзов и собраний' был поднят на голосование. Закон подразумевает полный запрет всех синдикалистических организаций в стране, так как они подрывают наше единство.\n\nНесмотря на нашу уверенность в правоте, многие юристы видят в данном законе нарушение прав граждан на свободные собрания."
 denmark_events.93.a: "Закон принят, несмотря на разногласия"
 denmark_events.93.b: "Закон не был принят"
 
 denmark_events.94.t: "Датская система Статсраад"
 denmark_events.94.d: "В условиях, когда ситуация в Вельткриге складывалась не совсем в пользу Германской Империи, Дания, страна, которая обычно считается находящейся глубоко в сфере влияния Германии, в целях самосохранения присоединилась к Третьему Интернационалу.\nПосле попытки переворота, предпринятой королем Дании с целью установления авторитарной гегемонии над страной, Дания распустила монархию, чтобы обеспечить свою демократию. Однако под угрозой немецкого вторжения из-за смещения короля Кристиана, новая Датская Республика согласилась вступить в Третий Интернационал для защиты, при условии, что ее правительство станет социалистическим. Несмотря на то, что была оппозиция, правительство согласилось, но только при условии, что демократические институты будут защищены."
 denmark_events.94.a: "Удар в спину, которому нет равных"
 
 denmark_events.940.t: "Провозглашение Датской Народной Республики"
 denmark_events.940.d: "После отречения короля Кристиана X многие ожидали, что Фредерик займет престол и будет править страной, но вместо этого Торвальд Стаунинг объявил о создании Датской Народной Республики и о прекращении существования конституционной монархии в Дании.\n\nПроводятся новые выборы, чтобы определить нового премьер-министра-президента Дании, и, вероятно, кандидатом на эти выборы станет Торвальд Стаунинг, который рассчитывает на победу и обеспечение своего правления в умеренной Датской республике. Многие сторонние наблюдатели критиковали решение Стаунинга; однако, учитывая потрясения, приведшие к отречению Кристиана X, Стаунинг открыто заявил, что датская демократия будет функционировать так же справедливо и свободно, как и прежде, без вмешательства монарха в политику."
 denmark_events.940.a: "Независимо от того, царит ли хаос или нет, Дания в надежных руках."
 denmark_events.940.b: "Эта революция весьма умеренна."
 denmark_events.940.c: "Идеализм наконец добрался до полуострова Ютландия."
 
 denmark_events.95.t: "Дания переходит к автократии"
 denmark_events.95.d: "Пока на европейском театре военных действий идет Второй Вельткриг, небольшое государство Дания, объединенное Рейхспактом, переживает свой собственный кризис. Датский парламент уже несколько недель не может решить вопрос о будущем своей страны в новых условиях. Удрученный неспособностью своего правительства прийти к удовлетворительному заключению, король Кристиан X, используя свое руководство датской армией, распустил демократические институты Дании и бросил весь вес датского общества на поддержку интересов Рейхспакта. Широкомасштабные протесты прошли по всей стране, немецкие гарнизоны направили войска для оказания помощи местной полиции и ополчению в подавлении масс. Хотя это решение стало шоком почти для всех, кто следил за ситуацией в Дании, теперь не остается сомнений в лояльности Ютландского полуострова."
 denmark_events.95.a: "Да здравствует король!"
 
 denmark_events.96.t: "Разразился конституционный кризис"
 denmark_events.96.d: "[GetSecondInCommand] сегодня попал в заголовки газет, представив референдум, который будет вынесен на голосование датчан в ближайшие месяцы. [DEN_get_crisis_pov_loc] Пока новость о референдуме распространялась по стране, король Кристиан X решил воспользоваться этой возможностью, чтобы потребовать от него внесения изменений, включая сближение с Германией.\n\n[GetSecondInCommand] решительно возражал против такой поправки; однако король Кристиан X воспользовался своими полномочиями, чтобы запугать правительство и вынудить его действовать. Чтобы правительство выжило в этой непростой ситуации, оно должно решить, идти ли на уступки королю, чтобы не навлечь на себя его гнев."
 denmark_events.96.a: "Поддержите короля, Дания должна приготовиться к борьбе на стороне Германии."
 denmark_events.96.b: "Мы должны противостоять этому давлению; Дания не будет подчиняться кайзеру."

 denmark_events.97.t: "Вопрос о демократии"
 denmark_events.97.d: "Виктор Пюршель сегодня встретился с королём Кристианом X, чтобы обсудить вопрос демократии, который недавно вновь вошёл в общественное сознание после успеха Дании и её союзников в Вельткриге. Используя свою королевскую власть, Виктор Пюршель был назначен главой Дании вместе с автократическим крылом KF после катастрофического проявления государственного управления в [GetYear], и его правление было легитимировано как королём, так и надвигающейся европейской войной. Однако теперь, когда война закончилась и Дания чувствует себя в безопасности и мире, многие в KF и оппозиции требуют возвращения к свободным выборам.\n\nСсылаясь на прецедент прошлых кризисов, разрешённых назначением королём подходящего премьер-министра, выборы возобновились в спокойном темпе; однако сейчас всё иначе, чем тогда. Стаунинг показал своё истинное лицо, предав страну и примкнув к подлым синдикалистам. Многие в лагере Виктора Пюршеля согласились с необходимостью периода авторитарного правления, пока Дания не подготовится к демократии. Томас Мадсен-Мигдаль, напротив, выступал за восстановление демократии, но только в рамках партий, одобренных правительством, отвергая даже умеренно-левые силы из оставшейся части Социал-демократов.\n\nДля укрепления этого режима Виктор Пюршель объявил о создании совершенно новой партии – «Новые правые» (Nye Højre). Он заявил, что его движение вышло за рамки простого крыла KF, и для укрепления его позиций необходимо начать полную реорганизацию партии, чтобы закрепить правление правых в Дании. Это решение вызвало большое недовольство KF, но в последние годы поддержка Пюршеля выросла, и это решение практически не встречает сопротивления.\n\nВсе взоры прикованы к королю и кабинету Виктора Пюршеля, которые решат судьбу Дании."
 denmark_events.97.a: "Выборы остаются приостановленными... на данный момент."
 denmark_events.97.b: "Меллер прав, выборы будут проведены еще раз."

 denmark_events.98.t: "Выборы [getYear] года"
 denmark_events.98.d: "В Дании снова наступило время выборов, и три партии объединились, чтобы баллотироваться на пост президента Дании на следующие три года, согласно конституции. Король Кристиан X одобрил участие Венстре в коалиции с «Радикале Венстре», восстановив своего рода «либеральную коалицию» после поражения Стаунинга и распада их коалиции. Также в гонке участвует недавно реформированная партия КНП во главе с Мёллером, а Венстре станет их младшим партнёром в случае победы на выборах, что позволит сформировать большинство в парламенте. Возглавив движение за восстановление свободных выборов, Мёллер стал популярным кандидатом среди народа.\n\nНаконец, Виктор Пюршель также решил участвовать в этих выборах, что вызвало волнения среди крайне левых и оппозиции, поскольку его нетрадиционное участие порадовало многих, кто поддержал его и авторитарное крыло КНП после конституционного кризиса. Виктор Пюршель объявил, что эти выборы будут «свободными и честными» среди участвующих партий, но многие подвергли его решению баллотироваться, особенно с учетом того, что король доверил ему править.\n\nБюллетени поданы, и победителем стал..."
 denmark_events.98.a: "Либеральная коалиция, возглавляемая Венстре."
 denmark_events.98.b: "Объединение KF с Venstre в качестве младшего партнера."
 denmark_events.98.c: "Пюршель и Новые Правые."

 denmark_events.99.t: "Расширенние программ общественных работ"
 denmark_events.99.d: "[GetSecondInCommand] встретился с представителями левого и правого правительств, чтобы обсудить увеличение инвестиций в финансирование проектов общественных работ по всей Дании. Эта инициатива, которая несколько лет назад стала движущей силой восстановления экономики после экономического кризиса, показала отличные результаты, и [GetSecondInCommand] представил несколько вариантов увеличения финансирования этих проектов в рамках следующего годового бюджета. Хотя это и не является абсолютно невыполнимой задачей, такое увеличение создаст некоторую нагрузку на датскую экономику, но будет способствовать как её росту, так и её устойчивости в ближайшие десятилетия. Оппозиция предложила свой вариант бюджета, который несколько уступает многим предложениям премьера. В конечном счёте..."
 denmark_events.99.a: "...принято радикальное предложение."
 denmark_events.99.b: "...смягченное предложение о компромиссе принято."

 denmark_events.100.t: "Фокус на улучшении здравоохранения"
 denmark_events.100.d: "Сегодня [GetSecondInCommand] встретился с представителями левого и правого правительств, чтобы обсудить проблему здравоохранения, которая стала более актуальной за последние два десятилетия в рамках дебатов о равенстве и качестве медицинской помощи. [GetSecondInCommand] заявил о необходимости нового Закона об уходе за детьми, который окончательно закрепит необходимость программ по охране материнства и детства. Центры помощи матерям будут и далее расширяться по всей стране и оказывать помощь семьям, испытывающим трудности с воспитанием детей после экономического кризиса. [GetSecondInCommand] также предложил совершенно новые законы, касающиеся увеличения вакцинации детей, строительства санаториев для больных туберкулезом и инвестиций в образование для подготовки медицинских работников.\n\nОппозиция ответила, заявив, что многие улучшения, хотя и полезны, приведут к чрезмерному расходу государственного финансирования, поэтому отмены избыточных законов и ограничения, предусматривающего включение только самого необходимого, должно быть достаточно. В конечном итоге..."
 denmark_events.100.a: "...принято радикальное предложение."
 denmark_events.100.b: "...принято смягченное компромиссное предложение."

 denmark_events.101.t: "Расширение пенсионного обеспечения"
 denmark_events.101.d: "[GetSecondInCommand] встретился с представителями левого и правого правительств, чтобы обсудить повышение пенсий по всем направлениям в соответствии с рекомендациями «Новых социальных законов» К.К. Штайнке. Этот пакет законов предусматривает расширение пенсий по старости, а также пенсий по болезни или нетрудоспособности и станет огромным подспорьем для поддержки программы социального обеспечения Дании. Лидер оппозиции Томас Мадсен-Мигдал осудил столь радикальное увеличение инвестиций в пенсионное обеспечение, заявив, что государственный бюджет будет урезан слишком сильно, и они примут только предложение, предусматривающее минимальное повышение пенсий в рамках текущего государственного бюджета, чтобы не перегружать себя. В конце концов..."
 denmark_events.101.a: "...принято радикальное предложение."
 denmark_events.101.b: "...принято смягченное компромиссное предложение."

 denmark_events.102.t: "Вопрос о антимилитаристах"
 denmark_events.102.d: "[GetSecondInCommand] встретился с объединённым кабинетом коалиции, чтобы обсудить проблему антимилитаристов, которые всегда присутствуют в обеих партиях. Петер Мунк и Р решительно выступают против любого исключения этих элементов или снижения их влияния в партии, поскольку они были ключевым фактором, приведшим к распаду их альянса с Venstre, и поэтому открыто пригрозили выйти из коалиции, если [GetSecondInCommand] предложит радикальные чистки. Чтобы заручиться их поддержкой в ​​случае войны, [GetSecondInCommand] предложил радикальный план, предусматривающий небольшое ограничение числа молодых датчан, призываемых в армию, с предоставлением дополнительной компенсации. Это предложение молчаливо одобрено оппозицией, но на него наложено решительное вето теми, кто поддерживает риторику Мунка. В конечном счёте..."
 denmark_events.102.a: "...принято радикальное предложение."
 denmark_events.102.b: "...принято смягченное компромиссное предложение."

 denmark_events.103.t: "Новая социальная бюрократия"
 denmark_events.103.d: "[GetSecondInCommand] встретился с объединёнными кабинетом левых и правых, чтобы обсудить расширение или, возможно, создание совершенно новой бюрократии для будущего государства всеобщего благосостояния в Дании. В частности, вопрос о кадровом составе бюрократии и доле политиков от каждой партии, приверженных этой идее, вызвал споры у оппозиции, которая стремится ограничить расширение государственного бюджета в сторону государства всеобщего благосостояния, заявляя, что это ввергнет страну в хаос. [GetSecondInCommand] и «Социал-демократия» находятся на перепутье: продолжать ли им, сохраняя контроль большинства, и значительно расшириться до оптимизированной крупной бюрократии, или же уступить коалиции ради компромисса...? В конце концов..."
 denmark_events.103.a: "...принято радикальное предложение."
 denmark_events.103.b: "...принято смягченное компромиссное предложение."

 denmark_events.104.t: "Давление оппозиции берет верх над коалицией"
 denmark_events.104.d: "[GetSecondInCommand] получил тревожные новости: Венстре и КНП официально объявили о наложении вето на предстоящее голосование по бюджету в конце года, а также о прекращении любой поддержки правительства, поскольку считают, что расходы Стаунинга на реформы системы социального обеспечения зашли слишком далеко. Хотя они не имеют официального влияния в Ригсдаге, руководство Венстре-КНП потребовало отставки Стаунинга перед лицом очередного неминуемого поражения коалиции из-за провала голосования по бюджету. Король Кристиан X созвал [GetSecondInCommand] и заявил, что правительство не может продолжать действовать самостоятельно, и что проведение внеочередных выборов может привести к новому кризису.\n\nЛидерство Стаунинга уже поставлено под сомнение, и многие в коалиции считают, что возрождение оппозиции на внеочередных выборах нанесет ущерб развитию государства всеобщего благосостояния. Вместо этого, возможно, возвращение Питера Мунка к руководству коалицией может успокоить оппозицию."
 denmark_events.104.a: "Похоже, нас ждет повторение 1926."

 denmark_events.105.t: "Приближается крайний срок"
 denmark_events.105.d: "Прошло несколько дней с тех пор, как кризис в кабинете министров стал очевиден, и многие представители различных партий предложили неожиданные решения. Радикалы в Социал-демократической партии решительно отвергают отставку Стаунинга и вместо этого хотят удвоить свои усилия, что только еще больше подстрекнет оппозицию к агрессивной реакции. С другой стороны, Радикальные Венстре заявили, что при поддержке Социал-демократов они могли бы возглавить коалицию, а Питер Мунк занял бы пост премьер-министра, что снизило бы напряженность, но в конечном итоге ослабило бы поддержку движения к созданию государства всеобщего благосостояния. Переговоры ведутся по всей коалиции, и, похоже, напрашивается только один вывод..."
 denmark_events.105.a: "Возможно, нам следует довериться Питеру Мунку"

 denmark_events.106.t: "Стаунинг объявляет об отставке"
 denmark_events.106.d: "Перед лицом давления со стороны оппозиции и даже короля, чье пристальное внимание на протяжении последнего десятилетия всегда было приковано к Стаунингу, премьер-министр Торвальд Стаунинг, долгое время занимавший этот пост, объявил о своей отставке. Народная поддержка со стороны оппозиции разрушила его мечты о неуклонном продвижении к доминирующему государству всеобщего благосостояния, и это повторение неудач в переговорах о двухпартийной поддержке дорого ему обошлось. После этого обмена мнениями министр иностранных дел Питер Мунк вступил в должность премьер-министра и объявил об отмене ряда реформ в пользу медленного и устойчивого подхода, который заручился поддержкой оппозиции в ходе предстоящего голосования по бюджету в конце года.Несмотря на то, что правление Питера Мунка знаменует возвращение доминирования Радикал Венстре в коалиции умеренных левых, это также свидетельствует о тревожном росте поддержки оппозиции, которая может добиться победы на следующих выборах на фоне этого провала."
 denmark_events.106.a: "Если бы мы были более осторожны..."

 denmark_events.107.t: "Германие желает переговоров"
 denmark_events.107.d: "Германия согласилась выслушать нас и проигнорировать требования нашего бывшего короля Кристиана X. Стаунинг и его кабинет вздохнули с облегчением, прислушиваясь к голосу разума. Будем надеяться, что требования Германии не будут слишком суровыми, но, учитывая, как обстоят дела на их стороне, весьма вероятно, что, помимо прямого участия в войне на их стороне, Германия предъявит датскому народу серьёзные требования. Стаунинг встретился со своим кабинетом, и они готовы принять и согласиться на любые требования, если только они не будут препятствовать независимости Дании."
 denmark_events.107.a: "Будем надеяться, что требования Германии разумны."

 denmark_events.108.t: "Требования в отношении военного доступа"
 denmark_events.108.d: "Первый раунд переговоров начался, и вопрос о Дании как стратегическом военном форпосте был вынесен на обсуждение. Дания занимает стратегически выгодное положение: Интернационал и Россия легко пройдут через свои проливы, если Дания сохранит абсолютный нейтралитет. Это создаёт серьёзную угрозу безопасности для нашего северного фланга, делая наше уязвимое северное побережье уязвимым для вторжений и набегов вражеских подводных лодок.\n\nС обеих сторон спектра возникли два возможных требования: во-первых, мы могли бы потребовать от Дании предоставить немецким войскам доступ к проливу, а также позволить Кригсмарине швартоваться и использовать датские порты, что было бы разумным требованием, учитывая надвигающуюся войну по обе стороны границы. Во-вторых, мы могли бы потребовать от Дании формального присоединения к Рейхспакту, ограничив при этом её участие в войне. Это гарантировало бы, что русские и Интернационал не смогут пройти через Датский пролив.\n\nКакое требование нам следует предъявить датскому правительству?"
 denmark_events.108.a: "Требуйте доступа военных, и ничего больше."
 denmark_events.108.b: "Проливы слишком ценны... это предает их стремление к нейтралитету."

 denmark_events.109.t: "Требования Германии в отношении военного доступа"
 denmark_events.109.d: "[DEN_get_mil_demands_loc]"
 denmark_events.109.a: "Мы принимаем их требования."
 denmark_events.109.b: "Ни в коем случае не накладывайте вето на эти переговоры немедленно."

 denmark_events.110.t: "Требования в отношении перераспределения торгового и экономического контроля"
 denmark_events.110.d: "Начался второй раунд переговоров, и многие призывают установить стратегический контроль над датской торговлей и экономикой, хотя последнее и является предметом серьёзных споров. Некоторые считают Данию небольшой и незначительной страной, но при этом склонной к действиям, если её независимость окажется под вопросом, как это произошло со свержением короля Кристиана X из-за скандала. Поэтому было подготовлено умеренное предложение, согласно которому Дания разрешит закупать товары по более низкой цене, а также перенаправит значительную часть торговли на рынки Германии, сохранив при этом торговые связи с другими странами, но с более высокими издержками.\n\nС другой стороны, многие обсуждают аренду нескольких датских заводов, хотя такое требование сопровождается опасениями, что это ещё больше оттолкнёт датчан. Хотя несколько заводов мало что внесут в военную машину Германии и бурно развивающуюся промышленность, это требование будет отчасти символическим, показывающим, что датчане не совсем готовы снова стать абсолютно нейтральными.\n\nКакой набор требований мы должны предъявить датскому правительству?"
 denmark_events.110.a: "Торговля, переориентированная на спрос."
 denmark_events.110.b: "Спрос переориентировал торговлю... а также сдачу в аренду многих датских фабрик."

 denmark_events.111.t: "Требования Германии в связи с переориентацией торговли"
 denmark_events.111.d: "[DEN_get_eco_demands_loc]"
 denmark_events.111.a: "Мы принимаем их требования."
 denmark_events.111.b: "Ни в коем случае не накладывайте вето на эти переговоры немедленно."

 denmark_events.112.t: "Успех на переговорах"
 denmark_events.112.d: "Когда основные вопросы были решены, датчане согласились с каждым из наших требований. Хотя, к сожалению, Дания не может присоединиться к нашему альянсу в военном отношении, чтобы мы не вынудили их к этому и, вероятно, не оттолкнули их, мы получили значительный экономический контроль и военный доступ к Дании, и мы можем вздохнуть с облегчением, поскольку отношения с новым датским государством снова нормализуются."
 denmark_events.112.a: "Перо действительно могущественнее меча."

 denmark_events.113.t: "Переговоры увенчались успехом"
 denmark_events.113.d: "Стаунинг и его кабинет встретились после того, как Стаунинг выступил с речью в Копенгагене, в которой объявил, что суверенитет Дании защищен, в договоре, который закрепляет нейтралитет Дании перед лицом ряда требований. Большинство граждан отреагировали на это с ликованием, а антимилитаристы в обеих партиях были сильно недовольны, опасаясь, что Дания будет втянута в войну в той или иной форме или способом."
 denmark_events.113.a: "Нейтралитет Дании был обеспечен."

 denmark_events.114.t: "Переговоры провалились"
 denmark_events.114.d: "Переговоры зашли в тупик, независимо от того, были ли выдвинутые нами требования слишком жесткими или нет, датское правительство плюнуло нам в лицо и наложило вето на переговоры в целом. Они публично объявили нас тиранами, стремящимися превратить Данию в еще одно немецкое марионеточное государство, подобное тем, которые мы создали на востоке, и заявили, что нейтралитет и суверенитет Дании не подлежат обсуждению. Нам ничего другого не остается, как потребовать от Дании подчиниться и согласиться с требованиями Кристиана Прайора; было ошибкой начинать переговоры с нашим маленьким соседом."
 denmark_events.114.a: "В конце концов, меч побеждает, требуйте восстановления короля Кристиана на троне!"

 denmark_events.115.t: "Йенсен vs Кристенсен"
 denmark_events.115.d: "Победа Enhedspartiet ​​на съезде поставила серьёзный вопрос: кто будет избран премьер-министром-президентом Дании? Кристенсен официально занял свою позицию, хотя в партии произошёл раскол между Молодой гвардией во главе с Рихардом Йенсеном и костяком партии – Старой гвардией во главе с Кристианом Кристенсеном. Для определения того, кто будет главой Дании, было проведено новое голосование. Рихард Йенсен первым поднялся на трибуну и, при поддержке профсоюза «Søfyrbødernes Forbund», взбудоражил публику призывами к оружию и возрождению датской судоходной отрасли, требуя расширения прав и повышения заработной платы для наших собратьев-моряков. На другой трибуне стоял Кристиан Кристенсен, номинально поддерживаемый FS, который заявил, что каждый работник будет получать равное и лучшее обращение в рамках расширения и создания Союза профсоюзов, укомплектованного преданными и способными членами его старой гвардии.\n\nБорьба была напряженной, и у этих двух деятелей есть равные шансы на победу. Йенсена и Кристенсена объединяет бедное детство, которое укрепило их дружбу и товарищество. Однако, в конечном счете, только один человек может победить в этом голосовании, и победителем становится..."
 denmark_events.115.a: "Рихард Йенсен!"
 denmark_events.115.b: "Кристиан Кристенсен!"

 denmark_events.116.t: "Открытие умеренного Статсраада"
 denmark_events.116.d: "В соответствии с планами преобразования Дании в либеральную республику, начались выборы в Государственный конгресс. Ригсдаг изберет членов нового Государственного конгресса, который, в свою очередь, определит кандидатуру нового премьер-министра-президента Дании. В состав парламента вошли преимущественно представители партий «Социал-демократия» и «Радикале Венстре», а пропорциональное представительство снижает шансы оппозиции. Предстоящие выборы будут бурными. С одной стороны, Торвальд Стаунинг практически наверняка победит на этих выборах, проявив харизму и умение маневрировать в прошлых кризисах, хотя нельзя сбрасывать со счетов и Петера Мунка из Радикальных Венстре.\n\nВ течение нескольких дней оба делегата встретятся, чтобы обсудить ряд вопросов, которые определят ход их предвыборной кампании."
 denmark_events.116.a: "Это знаменует собой рождение Дании как республики."

 denmark_events.117.t: "Обсуждение реформ социального обеспечения"
 denmark_events.117.d: "Первые дебаты, вошедшие в общественное сознание, касаются реформ государства всеобщего благосостояния. На встрече присутствуют и Петер Мунк, и Торвальд Стаунинг, которые ранее соглашались с продолжением реформ в рамках видения Стаунинга, но теперь, когда они заняли противоположные позиции, разногласия исчезли. Петер Мунк осудил планы Стаунинга по дальнейшему внедрению датского государства всеобщего благосостояния по многим причинам, а большинство членов партии Radikale Venstre согласны с тем, что темпы ускорения реформ в Дании слишком высоки, и в результате пострадает датская экономика.\n\nВ противовес этому, Торвальд Стаунинг заявил, что без его планов и программы общественных работ, а также реформы здравоохранения, направленной на обеспечение всеобщего доступа, Дания никогда бы не смогла так успешно преодолеть экономический кризис, как несколько лет назад. Планы Стаунинга популярны и многочисленны, но осторожная оппозиция вновь активизировалась благодаря сторонникам, ранее поддерживавшим Venstre и KF, и укрепила решимость Мунка. Кто же победит?"
 denmark_events.117.a: "Идеалы Стаунинга слишком обьемны."
 denmark_events.117.b: "Осторожный оптимизм Мунка покоряет всех."

 denmark_events.118.t: "Вопрос милитаризация в общественном сознании"
 denmark_events.118.d: "Милитаризация — острый вопрос бюджета, и хотя Торвальд Стаунинг и Петер Мунк уже придерживаются довольно схожих взглядов, степень демилитаризации Дании остаётся предметом споров. Петер Мунк твёрдо уверен в том, что датские вооружённые силы следует лишить финансирования и, вплоть до их упразднения, не рассматривать как необходимость. «Hvad skal det nytte» («Какой от всего этого толк?») — известный лозунг, вдохновлённый Петером Мунком по этому вопросу, который в шутку был отмечен Генеральным штабом.\n\nВ ответ на этот вопрос Стаунинг не стал особо оспаривать большую часть аргументов Мунка, но осудил тот факт, что в неспокойные времена, подобные нынешним, Дания должна иметь вооружённые силы просто для защиты от вмешательства других радикальных держав, таких как Восточный блок вокруг России, или если Интернационал решит предать датский нейтралитет и использовать его в качестве плацдарма для вторжения. Оба они приводят весомые аргументы в отношении своих кампаний, но только один из них может оказаться победителем..."
 denmark_events.118.a: "Стаунинг прав, мы должны быть осторожны."
 denmark_events.118.b: "«Hvad skal det nytte» — девиз Мунка верен."

 denmark_events.119.t: "Роль Премьер-министра-президента"
 denmark_events.119.d: "Что касается роли новообретённого лидера, премьер-министра-президента, то этот вопрос не является предметом острых дискуссий и не вызвал столь бурных дискуссий, как предыдущие два. Вместо этого Питер Мунк предложил предоставить ему право вето и расширенные полномочия в сфере законотворчества, заявив, что в трудные для новой республики времена необходимы решительные действия. Торвальд Стаунинг практически отверг это предложение, напомнив Мунку, что король обладает полномочиями, не слишком отличающимися от этих, и что эти полномочия по-прежнему представляют собой постоянную угрозу со стороны короля, который с подозрением относится к их правлению, что едва не привело к падению его собственного кабинета.\n\nПремьер-министр-президент является представителем не только Конгресса Статсраада, но и парламента, и должен придерживаться этого, – так провозгласил Стаунинг, заручившись достаточной поддержкой населения, чтобы выиграть эти дебаты. Однако народ может склониться к новой идее Мунка и его опасениям. Кто должен победить в этих дебатах?"
 denmark_events.119.a: "Стаунинг объединяет людей своей харизмой."
 denmark_events.119.b: "Озабоченность Мунка сквозит во всем."

 denmark_events.120.t: "Окончательные результаты выборов"
 denmark_events.120.d: "После долгих дебатов и многодневного голосования, а также встречи Торвальда Стаунинга и Петера Мунка в рамках подготовки к объявлению результатов, наконец, подведены итоги. Если Торвальд Стаунинг победит на выборах, продолжение реформ окажется плодотворным, и Дания, возможно, станет ярким примером государства всеобщего благосостояния. Однако, если Питер Мунк победит, Стаунингу придется ждать еще много лет, возможно, даже больше десятилетия, чтобы увидеть, как мечта о государстве всеобщего благосостояния воплотится в жизнь. В конце концов, результаты подведены..."
 denmark_events.120.a: "Торвальд Стаунинг выходит победителем!"
 denmark_events.120.b: "Неожиданно побеждает Петер Мунк!"

 denmark_events.121.t: "Будущее датского нейтралитета"
 denmark_events.121.d: "С падением германской сферы влияния кайзер скрылся далеко за пределами наших радаров, а новое правительство получило поддержку в Берлине от иностранной державы. Теперь мы в ссоре с миром, и возникло много вопросов о том, что мы можем сделать. Мы могли бы попытаться договориться с социалистами, попросить защиты от них, объединившись с Москвой, или, возможно, дружественный сосед согласился бы на взаимную оборону. Последняя альтернатива, если у нас не будет другого выбора, — укрепить наш нейтралитет, превратить Данию в неприступную крепость и внести немалую нестабильность в нашу самобытную страну, введя состояние боевой готовности, которое потребовало бы масштабной воинской повинности и милитаризации, что оказалось бы неприятным для антимилитаристов в нашей стране.\n\nВыбор только за нами; что же нам делать?"
 denmark_events.121.a: "Мы будем готовы ко всем трудностям!"
 denmark_events.121.b: "Пошлите посланника в Париж, может быть, они нас выслушают."
 denmark_events.121.c: "Свяжитесь с Москвой, нейтралитет должен быть отменен ради нашего собственного выживания."
 denmark_events.121.e: "Швеция находится в таком же положении, как и мы, отправьте петицию."

 denmark_events.122.t: "Запрос из Дании"
 denmark_events.122.d: "После завоевания немецкой сферы влияния и освобождения её территорий, а также территорий её союзников и подданных, из Копенгагена, Дания, только что прибыл посланник. Они запросили защиту, поскольку их нейтралитет поставил их между нашими силами и потенциальной угрозой их существованию. Хотя мы не испытываем давления, вынуждающего нас согласиться на их просьбу, датское правительство предложило им доступ через свои проливы и возможность размещения военных и военно-морских позиций на территории Дании, если мы будем уважать их независимость. Это ставит перед нами непростую задачу, поскольку Дания слаба, а наши силы превосходят их.\n\nУчитывая их предложение, стоит ли тратить на Данию драгоценное внимание, которое мы могли бы переключить на остальной мир?"
 denmark_events.122.a: "Согласитесь на их просьбу; они не стоят нашего времени."
 denmark_events.122.b: "Отклонено, освобождение Дании уже близко!"

 denmark_events.123.t: "Начать всё с начала"
 denmark_events.123.d: "Наши посланники потерпели неудачу, и переговоры сорвались. Так или иначе, похоже, мы должны пересмотреть наши варианты."
 denmark_events.123.a: "Начнем все с чистого листа..."

 denmark_events.124.t: "Запрос из Дании"
 denmark_events.124.d: "Удивительно, но от небольшой скандинавской страны Дании поступило заявление с просьбой присоединиться к нашему альянсу. Сохранив нейтралитет во время политического кризиса, который привел к отречению короля Кристиана X, Дания вышла из Мирового кризиса, сохранив нейтралитет, но сохранив уязвимую позицию. Нет особых причин отказывать им в просьбе, поскольку союзническая Дания блокирует нашим врагам доступ к Балтийскому морю, а также предоставляет стратегическую военную базу. Однако выбор за нами, и, возможно, приглашение Дании спровоцирует наших врагов на дальнейший конфликт."
 denmark_events.124.a: "Принять."
 denmark_events.124.b: "Отклонить."

 denmark_events.125.t: "Посланник из Копенгагена"
 denmark_events.125.d: "В то время как мир рушится вокруг нас, когда рушится Германия и устанавливается новый мировой порядок, кажется, что наш маленький сосед направил петицию о защите наших двух народов. Хотя история последних столетий, возможно, и была жестокой, отношения с Данией потеплели до такой степени, что можно было бы обсудить вопрос о заключении договора о взаимной обороне от востока и Запада. Если нашей стране будет угрожать опасность, Дания встанет на нашу защиту, и наоборот, помогая обеспечить выживание наших двух стран в мире, который, возможно, стремится к нашему уничтожению. Как мы должны ответить на их запрос?"
 denmark_events.125.a: "Принять,это же в наших интересах."
 denmark_events.125.b: "Отказ, Дания не стоит таких хлопот."

 denmark_events.1250.t: "Интернационал соглашается"
 denmark_events.1250.d: "Похоже, что наше представительство в Интернационале принесло свои плоды, и на данный момент наша безопасность будет обеспечена, хотя это соглашение не является постоянным, и если волна революции дойдет до нас, мы должны оставаться готовыми. Однако на данный момент для многих наступило временное затишье в отношении нашего статуса в Европе."
 denmark_events.1250.a: "Непрочный союз."

 denmark_events.1251.t: "Россия соглашается"
 denmark_events.1251.d: "Наш посланник в Москве вернулся с согласием, Россия и Дания теперь должны объединиться, и российским войскам уже предоставлен отпуск в Копенгагене и ряде других городов. Хотя это означает, что мы готовы сражаться бок о бок с Москвой в ее предстоящих войнах, мы будем очень признательны за их защиту от любых врагов, угрожающих нам в Европе и за рубежом."
 denmark_events.1251.a: "Лучше тот дьявол, которого ты знаешь..."

 denmark_events.1252.t: "Швеция соглашается"
 denmark_events.1252.d: "Швеция любезно приняла наше предложение, и две наши демократии будут противостоять чудовищам Европы, готовым наброситься на наш чисто скандинавский нейтралитет. Хотя две наши армии по отдельности могут быть незначительными с точки зрения численности и модернизации, вместе мы можем постараться прикрыть спины друг друга во время войны."
 denmark_events.1252.a: "Ради нашего выживания мы можем оставить старую вражду позади."

 denmark_events.126.t: "Северный Шлезвиг присоединяется к Дании"
 denmark_events.126.d: "Наше решение придерживаться нейтралитета принесло свои плоды во многих отношениях, позволив нашему народу вновь ценить нейтралитет. Однако, похоже, что сфера влияния Германского кайзеровской Германии находится на последнем издыхании, и поэтому Северный Шлезвиг перешёл на нашу сторону. Датские войска пересекли границу сразу после того, как местные полки Северного Шлезвига дали сигнал пограничникам о проведении местного референдума, на котором большинство высказалось за объединение с Данией, чтобы предотвратить её падение под натиском иностранных врагов. Хотя Германия, вероятно, ответит тем же, мало что можно сделать с полным крахом немецкого правительства и армии в продолжающейся войне.\n\nВ Копенгагене состоялся парад в честь отмены Венского договора, отделявшего Данию от таких территорий, как Северный Шлезвиг, и пока идёт празднование, многие опасаются, что датский нейтралитет может закончиться перед лицом нового мирового порядка, установленного враждебными иностранными державами."
 denmark_events.126.a: "Фреден и Вена... наконец отмена."

 denmark_events.127.t: "Нордшлезвиг переходит к Дании"
 denmark_events.127.d: "С севера пришли ужасные новости. Что еще хуже, Дания незаконно признала результаты местного референдума в земле Северный Шлезвиг и номинально аннексировала эту территорию. Были разорваны дипломатические отношения с нейтральным датским государством, которое в ходе переговоров ранее согласилось на ряд уступок в отношении сохранения своего нейтралитета. Это означает прекращение действия всех договоров, касающихся датского государства, и, если не считать вторжения, Северный Шлезвиг ускользнул из наших рук. Вторжение только усугубило бы наше положение, так что мы просто ничего не можем сделать."
 denmark_events.127.a: "Наша страна постепенно разваливается."

 denmark_events.128.t: "Рейды BOPA и Датского совета свободы"
 denmark_events.128.d: "BOPA (Borgerlige Partisaner, Гражданские партизаны) и Danmarks Frihedsråd (Датский совет свободы) сегодня начали одну из многочисленных атак в центре Копенгагена, вызвав возмущение среди гражданского населения. [GetSecondInCommand] встретился с королём в связи с последними попытками, по всей видимости, разрушить союз Дании с кайзеровской Германией, который они называют рабством по отношению к немецкому кайзеру и его военным усилиям. Под лозунгом так называемой оккупации иностранными войсками, Бёрге Хоуманн, при основной поддержке Коммунаров из Федерации, начал тайные рейды на оружейные склады и даже, казалось бы, бессистемные акты террора среди гражданского населения.\n\nК ним присоединился Датский совет свободы – организованная группа недовольных политиков, военных и гражданских лиц по всей Дании, надеющихся «освободить» Данию от немецкой оккупации, с целью присоединения к Интернационалу на западе или к России на востоке, в зависимости от того, кого вы спросите. На данный момент в помощь были развернуты резервные подразделения и датская военная полиция, но BOPA и Датский совет свободы будут для нас серьёзной занозой, пока мы находимся в состоянии войны."
 denmark_events.128.a: "Danmark vil bestå!"

 denmark_events.129.t: "Маршал Приор предлагает решение"
 denmark_events.129.d: "Маршал Уильям Приор встретился с [GetSecondInCommand], чтобы обсудить приемлемое решение проблемы BOPA и деятельности Совета свободы. Полицейские подразделения уже были направлены для подавления угрозы, задержания главарей и заключения в тюрьму саботажников, но пока безуспешно. Приор провел обсуждения и организовал меры по устранению этой угрозы для Дании, представив два плана действий.\n\nПервый план заключается в централизации резервных подразделений и полиции под руководством армии. Приор предложил заняться этим генералу Эббе Гёрцу, что со временем позволит решить проблему до того, как она станет ещё хуже. Второй план предполагает, что маршал Приор возьмёт бразды правления в свои руки. Он временно уйдёт в отставку с должностей и возглавит личный дивизион из подобранных им полков, который будет бороться со всеми предателями-синдикалистами, терзающими Данию.\n\nВыбор за [GetSecondInCommand]. Первый вариант был бы гораздо менее разрушительным и привёл бы к гораздо меньшему количеству гражданских беспорядков, но занял бы значительное время, в то время как второй вариант на какое-то время лишил Данию главнокомандующего армией и также вызвал бы серьёзные волнения среди левых. Федеральные силы могут быть возмущены этим внезапным подавлением их деятельности, и это может лишь спровоцировать дальнейшие ответные действия, но маршал Приор смог бы справиться с этой угрозой в более короткие сроки. В конечном счёте, какой план будет выбран?"
 denmark_events.129.a: "План А: Организовать полицейские и резервные подразделения под руководством Герца."
 denmark_events.129.b: "План Б: Задействуйте маршала Приора, и враги Дании падут!"

 denmark_events.130.t: "Задержаны главари BOPA"
 denmark_events.130.d: "Некоторые главари BOPA и Датского совета свободы были арестованы, что негативно скажется на результатах их сопротивления нашему правительству. Это не означает прекращения вооружённого сопротивления в Дании, и конфликт не утихнет, пока движение не будет полностью подавлено, и Дания снова не сможет обратить свой взор на зарубежные страны. Усилия наших храбрецов, неустанно работающих, скоро принесут плоды, но пока борьба продолжается."
 denmark_events.130.a: "Скоро мы вырвемся из этого кошмара.."

 denmark_events.131.t: "Атака на центр города"
 denmark_events.131.d: "Из Копенгагена поступили тревожные новости о том, что подразделения, находящиеся под надзором полиции и командования резервной армии, вступили в столкновение с членами BOPA, которые в этот день предприняли атаку на главный центр города. Казалось, их цель состояла исключительно в том, чтобы вызвать беспорядки и привлечь граждан на свою сторону, но им пока не удалось привлечь местных жителей на свою сторону для участия в забастовке и протесте. К сожалению, многие мирные жители попали под перекрестный огонь, и несколько наших людей погибли в тот день в результате эскалации конфликта, хотя, похоже, им, по крайней мере, удалось в конце концов прекратить насилие. Подобные нападения будут продолжаться по всей Дании до тех пор, пока мы, наконец, не сможем поймать и арестовать этих террористов."
 denmark_events.131.a: "Ужас."

 denmark_events.132.t: "Саботаж на фабриках"
 denmark_events.132.d: "Поступили сообщения о том, что сегодня BOPA нанесла удары по нескольким крупным заводам по всей Дании. Похоже, что их планы застали полицию врасплох, и диверсанты скрылись, нанеся серьезный ущерб заводу военной техники и гражданскому промышленному комплексу. Сообщения очевидцев и работников указанных фабрик подтвердили, что преступниками были представители BOPA, но пока не удалось задержать ни одного из этих преступников. Полицейские подразделения были развернуты для наблюдения за основными маршрутами и предотвращения любых будущих нападений."
 denmark_events.132.a: "Ужас."

 denmark_events.133.t: "Налет на арсенал"
 denmark_events.133.d: "Сегодня BOPA похитила несколько сотен винтовок после многочисленных нападений на оружейные склады по всей Дании. Многие из этих рейдов провалились, но их тактика приманки и подмены позволила им отвлечь внимание полиции и резервных подразделений от важных целей и атаковать менее защищенные объекты, не встречая реального сопротивления. Хотя наши общие запасы, возможно, и не ощутят на себе тяжести этого удара, если сотни винтовок попадут в руки этих преступников, это определенно вызовет проблемы. В настоящее время резервные подразделения перебрасываются на военные склады и оружейные склады в крупных городах, чтобы попытаться предотвратить еще одно нападение."
 denmark_events.133.a: "Ужас."

 denmark_events.134.t: "Конфликт с BOPA завершается"
 denmark_events.134.d: "С окончанием войны и возвращением Дании к мирной жизни, наконец, пришло время для BOPA и Датского совета за свободу. Удача отвернулась от них, когда вернулись крупные армейские подразделения и были предприняты решительные усилия, чтобы окончательно покончить с их режимом террора, саботажа, беспорядков и рейдов. Лидер BOPA Берге Хоуманн официально объявил о прекращении своей деятельности, и многие главари были арестованы или бежали из Дании, чтобы встретить неизвестную судьбу за границей. Дания наконец-то может вернуться к миру и процветанию."
 denmark_events.134.a: "Отбросив все наши тревоги, давайте вернемся к насущным вопросам.."

 denmark_events.135.t: "Конфликт с BOPA завершается"
 denmark_events.135.d: "Маршал Приор вернулся с полным отчетом о своих усилиях по подавлению BOPA и прямому противодействию попыткам Føderationen разрушить датское государство и подорвать его стабильность. Хотя его действия привели к многочисленным жертвам и росту гражданских беспорядков, он привлек лидера BOPA Бёрге Хоуманна к ответственности, что положило конец сопротивлению, возглавляемому BOPA и Датским советом свободы. С арестом лидера значительная часть организованного сопротивления прекратилась, и Дания может продолжать вкладывать средства в военные действия, не беспокоясь о внутренних проблемах. После этого маршал Прайор вернулся на полноценную действительную службу и внесет большой вклад в организацию помощи в борьбе с врагами с востока и запада."
 denmark_events.135.a: "Несмотря на беспорядок, маршал Приор был полезен для нашего дела."

 denmark_events.137.t: "Поддержка датской революции"
 denmark_events.137.d: "Поспешное вступление Дании в наш альянс вызвало вопрос: недавно датский военный персонал был уволен в отставку из-за лояльности к старому режиму, поэтому, возможно, нам следует направить генерала для консультирования их войск. Генерал Луи Бюиссон предложил отправиться в Данию, чтобы предоставить опыт и помочь в координации действий их вооруженных сил по отношению к нашей стране. Однако некоторые из наших сотрудников отметили, что, помимо войск и винтовок, Дания уже находится в надежных руках. Что нам следует делать?"
 denmark_events.137.a: "Пусть генерал Бюиссон отправляется в Данию."
 denmark_events.137.b: "В Дании все под контролем, давайте не будем."

 denmark_events.138.t: "Прибытие советников из Интернационала"
 denmark_events.138.d: "Специалист по бронетехнике и международный советник из Франции, генерал Луи Бюиссон, только что прибыл в Копенгаген. Вместе с несколькими тысячами солдат и другими подразделениями, которые могут быть направлены на нашу помощь из-за Северного моря, генералу Бюиссону было поручено наблюдать за нашими военными действиями и координировать их со своими собственными."
 denmark_events.138.a: "Отлично!"

 denmark_events.141.t: "Дело Приора"
 denmark_events.141.d: "Прошла почти неделя с тех пор, как Стаунинг сделал попытку обеспечить независимость Дании и своё правление, но ответа от Франции так и не поступило. Многие в армии, например, маршал Приор, выражали обеспокоенность тем, что если пройдёт слишком много времени, Дания может стать целью немецкой гаубицы. Маршал Приор и без того опасался, что Дания может скатиться к социализму, но остался в стороне, поскольку считал, что это будет своего рода слияние систем, и что Торвальду Стаунингу, вероятно, гарантирована победа на выборах, хотя, в конце концов, служение стране было его первым и главным долгом.\n\nВсё изменилось после того, как Стаунинг выступил с публичным обращением, пытаясь успокоить жителей Копенгагена. В результате маршал Приор узнал, что Франция наотрез отвергла добровольный компромисс Стаунинга в отношении его идеалов и откажется оказывать помощь Дании в этот критический момент. Времени на реакцию было мало, а немецкая армия, казалось бы, была готова вторгнуться из Нордслесвига в саму Данию, поэтому маршал Приор взял дело в свои руки. Он заручился поддержкой многих других верных генералов и совершил переворот против правительства Стаунинга, одновременно с этим сообщив прессе о своих планах по объединению Дании в синдикал и передаче страны в руки французов.\n\nПоследовал общественный резонанс, и отставка Торвальда Стаунинга была практически неизбежна. Маршал Приор назначил Виктора Пюршеля главой нового правительства. Он отправил телеграмму королю Кристиану X, находившемуся тогда в изгнании, заявив, что синдикалистская революция подавлена ​​и что он может вернуться и занять престол. Не все в Дании рады такому положению дел, но Дания избежала надвигающегося немецкого вторжения ценой своей демократии."
 denmark_events.141.a: "Игра была сфальсифицирована с самого начала."

 denmark_events.142.t: "Планы по демобиллизации"
 denmark_events.142.d: "Петер Мунк объявил кабинету министров, что в следующем году вновь попытается принять законопроект о разоружении. Этот спорный законопроект, поддерживаемый нашей коалицией, известной как «Пацифистское соглашение», является средством, продвигаемым лидером партии Радикальные Венстре Петером Мунком, для обеспечения датского нейтралитета. Однако в связи с эскалацией ситуации по всему миру, включая беспорядки в США и ряде других регионов Европы, наш нейтралитет может быть вновь поставлен под сомнение. Мунк заверил кабинет министров, что в случае войны Германия вновь возьмет на себя свою законную роль своего рода европейского полицейского и позволит Дании сохранять нейтралитет.\n\nПодобные заявления продиктованы желанием короля Кристиана провести ремилитаризацию в соответствии с позицией оппозиции по этому вопросу, но только время покажет, сможем ли мы добиться своего на этот раз. Предыдущий законопроект о разоружении несколько лет назад провалился после того, как консерваторы в ландстинге наложили на него вето, как они всегда поступали в отношении разоружения."
 denmark_events.142.a: "Наше стремление к нейтралитету может достичь апогея."

 denmark_events.143.t: "Закон о разоружении [GetYear] года"
 denmark_events.143.d: "Пришло время Питеру Мунку вновь сплотить значительную часть антимилитаристов и пацифистов, которых он поддерживал, для проведения в парламенте вышеупомянутого законопроекта о разоружении. Однако Питер Мунч, вместо того чтобы представить законопроект парламенту или кабинету министров, выступил с экстренным заявлением, в котором заявил, что не смог реализовать текущие приоритеты. Многие представители антимилитаристского крыла Radikale Venstre угрожали Питеру Мунку уходом в отставку, но он, под руководством Мунча, объяснил, что при поддержке [GetSecondInCommand] новый законопроект о разоружении — это не то, что нужно Дании.\n\nВ своей проникновенной речи Питер Мунч поблагодарил своих сторонников и укрепил доверие к правительству в вопросах управления делами, заявив, что, возможно, после его смерти армия не понадобится. Таким образом, законопроект о разоружении так и не попал в парламент и умер так же, как и жил, идеализм, подпитываемый невежеством и отсутствием самосознания в отношении окружающего мира, к большому огорчению Мунка."
 denmark_events.143.a: "Шаг за шагом Дания будет возрождаться."

 denmark_events.144.t: "Синдикализм в Дании"
 denmark_events.144.d: "В результате неожиданного поворота событий король в Копенгагене отрёкся от престола, а Торвальд Стаунинг одобрил приход к власти социалистического правительства, что, в свою очередь, приведёт к переходу страны к синдикалистской системе, гибридной с идеалами Статсраада. Хотя обычно дела материковой части страны мало что значат для нас, посол Дании в Рейкьявике объявил о выборе для Исландии. Либо мы тоже перейдём к синдикалистской системе, став независимым членом Третьего Интернационала, либо обретём полную независимость и полностью отделимся от Дании. Выбор за нами, и какой бы из них мы ни выбрали, он кардинально изменит облик Исландии в будущем."
 denmark_events.144.a: "Пригласите Партию Народного Единства сформировать правительство."
 denmark_events.144.b: "Решительно, Партия независимости набирает силу, и мы полностью отделимся."

 denmark_events.145.t: "Подготовка к референдуму [GetYear] года"
 denmark_events.145.d: "[GetSecondInCommand] сегодня обратился к своему кабинету министров с предложением представить необходимые, по его мнению, дополнения к конституции, по которым народ Дании проведёт референдум в ближайшие месяцы. [GetSecondInCommand] предложил снизить возрастной ценз для голосования с 25 до 23 лет и представил планы замены верхней палаты Ригсдага, Ландстинга, на Ригстинг. Хотя этот шаг в целом не вызывает споров, многие члены КНП раскритиковали план замены Ландстинга на Ригстинг, который в значительной степени лишит их большинства, которое они поддерживали почти столетие. В связи с этим лидеры КНП, включая Виктора Пюршеля и Джека Вестергора, встретились с королём, чтобы найти решение этой проблемы.\n\nРазве король не станет вмешиваться и использовать свои давно заслуженные полномочия для разрушения демократии, которую мы так бережно защищаем? Только время покажет, и кабинет министров держится за этот референдум, не имея никаких гарантий относительно будущего."
 denmark_events.145.a: "Результаты этого референдума могут стать поворотным моментом для страны.."

 denmark_events.146.t: "Король Кристиан встретился с Премьер-министром"
 denmark_events.146.d: "Вскоре после того, как король Кристиан X объявил о своём намерении объединить силы правительства с Рейхспактом и подготовиться к вступлению в войну в случае начала войны на востоке или западе, король Кристиан X встретился с [GetSecondInCommand], оказав на правительство серьёзное давление с целью добиться его согласия. Король Кристиан X обладает резервными полномочиями исполнительной власти, которые он может использовать, чтобы наложить вето на законопроект и отправить в отставку любое правительство по своему выбору без обоснования. Однако ни один монарх в истории нашей страны не осмеливался даже воспользоваться этими полномочиями.\n\n[GetSecondInCommand] зашёл в тупик, заявив, что внешнюю политику должно определять само правительство, а не король, чем король Кристиан X остался крайне недоволен. После этой встречи король сделал несколько назначений, как маршалу Приору, так и лидеру консерваторов Виктору Пюршелю, обсуждая возможность свержения правительства при поддержке армии. К счастью, маршал Приор осудил просьбу короля, заявив, что его пожелания были бы крайне недемократичны, и заявил о нейтралитете в этом вопросе. Этот кризис может иметь и будет иметь разрушительные последствия для Дании, если её правительство не сумеет из него выйти."
 denmark_events.146.a: "Мы сделаем все возможное, чтобы подготовить страну так, как сочтет нужным король."
 denmark_events.146.b: "Он подавится своими словами, как только мы с ним закончим."

 denmark_events.147.t: "Демонстрация обернулась жестоким подавлением"
 denmark_events.147.d: "В то время как вопросы, связанные с предстоящим референдумом, в целом вызвали апатию у датчан, а пресса сообщала об ограниченном отклике, основанном на их мнении по обсуждаемым вопросам, Петер Мунк выступил с инициативой публично заявить, что Дания ни в коем случае не отступит от своего пути нейтралитета. Бросив вызов этому митингу, Джек Вестергор провёл своих молодых консерваторов (Konservative Ungdom) сквозь толпу, фактически спровоцировав хаос в митинге, следуя приказу военных подавить бунтовщиков любыми необходимыми средствами.\n\nТрудно сказать, кто сделал первый выстрел, но, как бы то ни было, почти десяток убитых с обеих сторон, поскольку консерваторы обвиняют нескольких солдат в разжигании этого конфликта. Этот кровавый митинг и некомпетентное отношение правительства к нему усилили недовольство, и многие сомневаются, может ли [GetSecondInCommand] вообще оставаться премьер-министром."
 denmark_events.147.a: "Ужасающая трагедия."
 denmark_events.147.b: "Там, куда мы направляемся, таких людей, как Вестергаард, больше терпеть не будут."

 denmark_events.148.t: "Германия оказывает политическое давление"
 denmark_events.148.d: "Если проблемы, связанные с конституционным кризисом, были недостаточно серьёзными, посол Германии в Копенгагене выдвинул ряд требований, ожидая, что Дания скорее вступит в альянс, учитывая положение дел в мире. В качестве предварительных условий для полной интеграции в Рейхспакт послу Германии поручено потребовать неограниченного военного доступа для дальнейшего предотвращения внезапного вторжения Интернационала, ограничения доступа к проливам в Интернационал, а также полного торгового эмбарго как в отношении Интернационала, так и в отношении России.\n\nНеожиданность этих требований поставила правящее правительство в сложное положение, которое может полностью свести на нет его шансы на выживание, если оно отреагирует необдуманно. Усугубляя ситуацию, король Кристиан X встретился с послом Германии и деликатно выразил свою поддержку каждому требованию, что оказало значительное давление на наше правительство. В конечном счёте, ответ кабинета министров..."
 denmark_events.148.a: "...неопределенный, но позитивный, что Дания в свое время будет стремиться к достижению такой цели."
 denmark_events.148.b: "...пренебрежительный и негативный, мы не марионетки кайзера."

 denmark_events.149.t: "Победа в конституционном кризисе"
 denmark_events.149.d: "[DEN_concrisis_win_loc]"
 denmark_events.149.a: "На данный момент, если отбросить нейтралитет, нам нужно выиграть войну."
 denmark_events.149.b: "Датский либерализм продолжает существовать, как ему и положено."
 denmark_events.149.c: "Мы надеемся, что немцы проявят благоразумие."

 denmark_events.1000.t: "Смерть короля Георга V"
 denmark_events.1000.d: "До Копенгагена дошли новости о недавней смерти короля британских эмигрантов в Канаде. Хотя эта смерть, возможно, не касается нас лично, возможно, нам следует отправить личное послание с выражением соболезнований, поскольку наш король Кристиан X приходится ему двоюродным братом. Однако не многие в нынешнем правящем правительстве разделяют те же угрызения совести, что и либералы и консерваторы, по поводу трагической гибели бывшего императора половины планеты."
 denmark_events.1000.a: "Позвольте нам сразу же отправить вам личное сообщение."
 denmark_events.1000.b: "Не интересно."

 denmark_events.1001.t: "Дания передает сообщение"
 denmark_events.1001.d: "После смерти короля Георга V мы получили соболезнования от [FROM.GetSecondInCommand] и его кабинета от имени короля Кристиана X. Они были матрилинейными членами Ольденбургского дома, двоюродными братьями и сестрами, и хотя наши два государства не разделяют примечательных традиционных отношений, такие слова от имени королевской семьи всегда приветствуются. Поучительно, что по ту сторону Атлантики, даже такая небольшая страна, как Дания, с теплотой смотрит на нас в самый тяжёлый для нас час."
 denmark_events.1001.a: "Вежливый жест."

 denmark_events.1003.t: "Берге Хоуманн и Мартин Андерсен Нексе подписали Тоталистскую Хартию"
 denmark_events.1003.d: "После отъезда в Лондон члены Коммунарской фракции Федерации, а именно Берге Хоуманн и Мартин Андерсен Нексе, официально подписали Тоталистскую Хартию, подготовленную Освальдом Мосли и другими заинтересованными сторонами. Оба они учились и прониклись социалистическими идеями за границей. Нексе, писатель, особенно известный своим романом \"Пелле Эробререн\", придерживается идеалов, несовместимых с комфортной датской демократией, которые сохраняются и по сей день. За то, что он заботится о молодых членах Федерации, среди членов партии он получил очаровательное прозвище \"Вице-президент Коммунаров\" или "Часовой-Коммунар". Берге Хоуманн также придерживается крайних взглядов на будущее Дании. Он является молодым членом Федерации, представителем следующего поколения коммунистов, которое готовит Нексе"
 denmark_events.1003.a: "Когда мы снова увидимся, может быть, у тебя будет дом, куда ты сможешь вернуться."

 denmark_events.1005.t: "Арне Соренсен объявляет о поддержке BOPA"
 denmark_events.1005.d: "Удивительные новости пришли от датских крайне правых, которые до сих пор формально хранили молчание о событиях после того, как Дания вступила в войну на стороне Германии. В условиях протестов BOPA и Датского совета свободы по всей стране, лидер Демократической партии Арне Сёренсен выразил поддержку их делу и собрал большую толпу после выступления в Копенгагене, в котором он заявил, что датское правительство пережило последнюю каплю в вопросе союза с Германией и мобилизации датских сил. Арне Сёренсен, давний критик растущей датской парламентской системы и того, как правительство уклоняется от выполнения требований короля Кристиана X, дошёл до того, что заявил, что наряду с усилиями BOPA, Dansk Samling поддержит их дело.\n\nНарастают волнения, как в поддержку выступления Арне Сёренсена, так и против него, хотя Датский совет свободы с радостью принял поддержку от легитимной партии, занимающей довольно видное положение. Арне Сёренсен и его сторонники не имеют большой поддержки в попытках добиться отмены обязательств Дании в отношении военных действий, но он станет еще одной занозой для нас."
 denmark_events.1005.a: "Похоже, эта война привела к соглашению левых и правых, что нам во вред."

 denmark_events.1006.t: "Маленький Шлейхер"
 denmark_events.1006.d: "Новости от нашего маленького союзника на севере, Дании, редко заслуживают внимания, но сегодня ближе к вечеру на стол канцлера попало особое письмо о смене режима к лучшему в Копенгагене. Похоже, что лидер Консервативной Молодежи, а теперь и партии КНП Джек Вестергард одержал победу над датской парламентской демократией и фракционностью в своей партии, приняв закон, мало чем отличающийся от Закона о полномочиях, принятого самим Шлейхером. Хотя Вестергард правит с лаем, но без укусов бешеной собаки, и многие члены партии KU, которые намерены помешать его видению, его успехи заслуживают всяческих похвал.\n\nМногие в Министерстве иностранных дел ласково прозвали Вестергарда «Маленьким Шлейхером», имея в виду, как его работа по укреплению режима копирует нашу собственную политику. Наши две страны теперь тесно связаны и будут вечно противостоять синдикалистским предателям среди нас, и этот факт остаётся превыше всего."
 denmark_events.1006.a: "Теперь у меня есть поклонники за границей? Как мило."

 denmark_events.1007.t: "70-летие Кристиана X"
 denmark_events.1007.d: "Тысячи людей по всей стране празднуют и становятся свидетелями, того как встретились [GetSecondInCommand] с королём Кристианом X на ступенях дворца Амалиенборг после награждения короля Кристиана X по случаю его 70-летия. Будучи королём Дании в течение 28 лет и продолжая делать это в неизбежном будущем, а также проведя Данию через несколько кризисов и жестоких войн, таких как Первая мировая война, он оставил горько-сладкий привкус во рту у многих, поскольку его стремление к участию в следующей войне обошлось довольно дорого. Тем не менее, празднование витает в воздухе во многих городах Дании, поскольку продажи Kongemærke, или королевской марки, превысили 1,5 миллиона всего за месяц.\n\nKongemærke является одновременно символом короля, изготовленным из стерлингового серебра и красной эмали, с изображением букв CX и датского национального флага. Эта серия продавалась по 5 крон, хотя специальный выпуск, изготовленный из 14-каратного золота, стоил более 100 крон. Помимо праздников и радости, война занимает важное место в жизни многих, но это событие остаётся мощным моральным стимулом для неспокойной страны."
 denmark_events.1007.a: "С Днем Рождения, король Кристиан!"

 denmark_events.1008.t: "Конец Венского договора"
 denmark_events.1008.d: "Прошло почти столетие с тех пор, как Дания лишилась земель на юге, герцогство Шлезвиг оказалось под двойным владением Пруссии и Австрии, и Дания ещё десятилетиями будет сталкиваться с унижением от такой потери. Сегодняшний день смягчил этот национальный позор: падение Германской империи и переход под контроль Дании территорий, которые всё ещё составляют значительную часть датского населения; по всей стране проходят празднования по случаю воссоединения государств. Хотя на большей части территорий, которые мы контролировали столетие назад, сейчас проживает значительное количество немцев, например, живущих южнее, в Шлезвиг-Гольштейне и Гамбурге, многие датчане в Нордслесвиге рады вернуться на свою законную родину."
 denmark_events.1008.a: "Мы больше никогда не будем разделены."

 denmark_events.1009.t: "Борнхольмерсколен процветает"
 denmark_events.1009.d: "За последние месяцы крошечный остров Борнхольм принял сотни гостей, и все это из-за наплыва мирных жителей, спасающихся от продолжающейся войны или от военных действий за границей в нейтральной Дании. Наше решение сохранять нейтралитет далось нам дорого, но наградой за это стала процветающая нация, которой не приходится сталкиваться со смертями, разрушениями и масштабами конфликтов. На этом небольшом острове посреди Балтийского моря находится Борнхольмерсколен, или Борнхольмская школа художников, основанная в конце 19 века; здесь выставлялись работы таких известных художников, как Карл Исаксон и Эдвард Вейе.\п\П Эти два художника и еще несколько десятков других в настоящее время проживают на острове художники со всего мира приезжают сюда, чтобы познакомиться с природной красотой Борнхольма, которая в прошлом году вдохновила сотни произведений искусства. Посетители отмечают, что художники часто пишут в ярко выраженном классическом стиле модерн, экспериментируя с цветом, абстракцией и кубизмом."
 denmark_events.1009.a: "Настоящая датская жемчужина."

 denmark_events.1010.t: "Фредерик поддерживает Королевский Датский оркестр"
 denmark_events.1010.d: "Королевский датский оркестр – один из старейших оркестров в мире. Он выступал для короля Кристиана I ещё в XV веке. Таким образом, Королевский датский оркестр стал важной частью датской культуры и жизни, выступая перед многими королями на протяжении веков и став инициатором появления в стране многих известных произведений таких композиторов, как Моцарт. Известный датский композитор Карл Нильсен был его дирижёром в течение многих лет, вплоть до своей безвременной кончины в 1931 году, и с тех пор недавно коронованный король Фредерик IX вновь проявил интерес к финансированию и творчеству оркестра.\n\nБолее десяти лет Фредерик с удовольствием посещает концерты и поддерживает оркестр, а иногда ему разрешают дирижировать в его честь. Однако сегодня было сделано специальное объявление о том, что король Фредерик IX будет дирижировать частью Четвёртой симфонии Карла Нильсена, на создание которой оказали большое влияние боевые действия Первой мировой войны, за которыми Дания наблюдала со стороны. Большая часть страны в восторге от этого особенного представления, и билеты были распроданы в течение нескольких дней после его объявления."
 denmark_events.1010.a: "Надеюсь успеть взять билет!"

 denmark_events.1011.t: "Съезд BOPA-Датский совет Свободы"
 denmark_events.1011.d: "Партизанская организация (BOPA) и Датский совет свободы (Danmarks Frihedsråd) провели масштабный митинг недалеко от Копенгагена, привлекая представителей самых разных политических взглядов на протест против правящего правительства. Полиция не допустила перерастания в насилие, но очевидно, что в последние годы растет число протестов против правящего правительства, и в частности против короля. Привязка нашей страны к экономической сфере Германии, Центральной Европе, возможно, стала лишь первой каплей, но негодование короля по поводу сохранения нейтралитета вполне очевидно. Поэтому представители самых разных политических взглядов объединились для выработки решения на случай, если Дания будет вынуждена воевать на стороне Германии.\n\n[GetSecondInCommand] выступил сегодня в Ригсдаге, заявив, что внешняя политика будет определяться правительством, а не королем, но это не слишком успокоило протесты. Эти организации, пользующиеся тайной поддержкой «Коммунардер Клики» из Федеративной партии и всего спектра, вплоть до недавно созданного Датского сообщества, объединяют значительную часть маргинальных слоёв общества ради общей цели – нашей погибели. Хотя сейчас они мало что могут сделать, чтобы противостоять нашим усилиям, очевидно, что если Дания окажется в состоянии войны, ей будет чего опасаться как внутри страны, так и за её пределами."
 denmark_events.1011.a: "Дания будет держаться стойко, как против врагов внутри страны, так и против врагов извне."

 denmark_events.1012.t: "Открытие памятника Карлу Нильсену"
 denmark_events.1012.d: "Большая толпа собралась сегодня на одном из перекрестков Копенгагена, когда известный датский скульптор Энн Мари Карл-Нильсен, жена покойного Карла Нильсена, самого известного датского композитора на сегодняшний день, наконец-то представила свою скульптуру, изображающую конную статую Пана. Пан - греческий бог музыки, и это вполне соответствует символике отношений между этим греческим богом и ее покойным мужем; многие зрители отмечали, что лицо Пана также имеет некоторое сходство с лицом Карла Нильсена. Фремме поручил Анн-Мари разработать дизайн этого памятника, написав: \"Я хотела взять крылатого коня, вечный символ поэзии, и посадить на его спину музыканта. Он должен был сидеть там, между несущимися крыльями, и дуть на тростниковую дудочку над Копенгагеном.\""
 denmark_events.1012.a: "Дань уважения одному из величайших композиторов Дании."

 denmark_events.1013.t: "Датская народная партия"
 denmark_events.1013.d: "Интересное предложение вызвало недовольство, особенно со стороны Торвальда Стаунинга, а также членов Enhedspartiet и фракции Коммунаров, в связи с попыткой Акселя Ларсена преобразовать DVSP в настоящую массовую партию, которая отныне будет полностью доминировать в политической системе страны. Представляя то, что было задумано как «мягкое партийное государство», с изменениями в системе электората, направленными на усиление влияния местных рабочих советов, Ларсен фактически обладает всеми инструментами, чтобы продолжать править без каких-либо проблем.\n\nПротив такого шага активно выступали, особенно Торвальд Стаунинг, который осуждал эти недемократические действия, но ему остаётся лишь кричать, даже если это предложение будет принято. С другой стороны, здоровая социалистическая демократия могла бы привлечь сторонников по всему спектру и способствовать возрождению Дании, и многие из планов могли бы быть свёрнуты."
 denmark_events.1013.a: "Каким бы противоречивым это ни было, это необходимо."
 denmark_events.1013.b: "Наши товарищи этого очень не одобряют, и я, например, человек из народа."

 denmark_events.1014.t: "Реорганизация датских правых"
 denmark_events.1014.d: "С момента образования Датской Народной Республики прошёл год с тех пор, как внутренняя жизнь страны начала возвращаться в нормальное русло. Среди этих изменений – ребрендинг политических партий, поскольку датская монархия стала историей. Наиболее важным стал раскол Консервативной народной партии (KF), что привело к расколу, который произошёл из-за прежней идеи усиления власти короля. Виктор Пюршель объявил о создании партии «Новые правые» (Nye Højre), посчитав примирение с KF невозможным. После этого решения лидер KF Джон Кристмас Мёллер получил новую, неоспоримую поддержку, став лидером и способным по-настоящему отстаивать широкую поддержку новой Датской республики. Хотя многие правые не согласны с этим новообретённым республиканизмом, Мёллер начал обращаться к представителям всех партий и призвал к межпартийной поддержке правительства. Что бы ни случилось в будущем, датская демократия продолжит процветать, и только при участии населения Дания сможет по-настоящему избежать радикализма."
 denmark_events.1014.a: "Правоцентристская оппозиция активизировалась."

 denmark_events.1015.t: "Дания и Второй Вельткриг"
 denmark_events.1015.d: "[DEN_2wk_start_loc]"
 denmark_events.1015.a: "Война никогда не меняется..."
 denmark_events.1015.b: "За сохранение справедливой Европы при хороших политиках."
 denmark_events.1015.c: "За Данию и вечное будущее Европы под объединяющей волей Интернационала."

 denmark_events.1016.t: "Создание юных пионеров"
 denmark_events.1016.d: "Арне Мунк-Петерсен сегодня представил недавно созданную организацию «Юные пионеры» (Unge Pionerer), которая стремится объединить датскую молодёжь в социалистические организации и не только следовать идеалам и стремлениям нового социалистического государства, но и обучать, организовывать и, возможно, ликвидировать оппозицию в Консервативной Народной Партии (KНП). После прихода к власти в Дании социалистов значительная часть молодёжи была отравлена ​​идеей о том, что в социалистическом государстве датская молодёжь будет подвержена идеологической обработке и станет простыми марионетками в руках правительства. Эта риторика привела к нескольким мелким инцидентам, связанным с пламенными речами Джека Вестергаарда и организацией Консервативной Народной Партии как своего собственного военизированного формирования.\n\nПетерсен, с разрешения премьер-министра-президента, организовал митинг, чтобы противостоять этой реакционной риторике и также просветить молодёжь об истинных целях государства. Демократия и социализм не исключают друг друга, и Петерсен в значительной степени придерживается этого принципа электоральной самодостаточности. Хотя Петерсен является членом ДЛСП, а Аксель Ларсен горячо твердил о мечтах о превращении ДЛСП в руководящую массовую партию, возглавляющую Федерацию, Петерсен в значительной степени поддержал Ларсена, полагая, что тот сделает то, что будет лучше для страны."
 denmark_events.1016.a: "Датскую молодежь слишком долго кормили ложью."

 denmark_events.1017.t: "Макс Арильдсков едет в Эстонию"
 denmark_events.1017.d: "Недавний распад Балтийского герцогства, включавшего в себя немецкое правление над балтийскими территориями, недавно завершился крахом, и вместе с ним Эстония и Латвия гордо подняли свои знамёна. Хотя эта новость не особо примечательна, если не считать неожиданной утраты немецкого контроля над регионом, лидер НД Макс Арильдсков объявил о своём намерении посетить Эстонию с государственным визитом. К нему присоединятся Ивер де Хеммер Гудме и Рихард Густав Боргелин, оба военные.\n\nМакс Арильдсков чуть более десяти лет назад сражался с большевиками в войне за независимость Эстонии, присоединившись к своему отцу и пройдя вместе с ним от юга Эстонии до реки Даугавы. Арильдсков, Гудме и Боргелин сражались в составе единственного добровольческого корпуса, покинувшего Данию, – «Роты Боргелин». Их желание отпраздновать новообретённую независимость Эстонии не выглядит откровенно шокирующим, учитывая усиление авторитарного лидера Артура Сирка в эстонском правительстве, к которому они идеологически симпатизируют.\n\nАрильдсков, правый лидер, основавший партию «Новая Дания» (Det Nye Danmark) по инициативе партии Савинкова, встречался с «Вождём» и подружился с ним во время сражений в Архангельске. Хотя многие в Дании отчуждены от эстонского дела свободы и независимости, нет особых причин препятствовать Арильдскову в этом пути."
 denmark_events.1017.a: "Мы приветствуем новое Эстонское государство."

 denmark_events.1018.t: "Государственный визит Макса Арильдскова"
 denmark_events.1018.d: "Неожиданные новости достигли [GetVictoryPointName_3152]: несколько человек из Дании, страны, расположенной сразу за Балтийским морем, прибыли с государственным визитом. Лидер партии «Новая Дания» Макс Арильдсков, а за ним Ивер де Хеммер Гудме и Рихард Густав Боргелин прибыли в нашу столицу ранее сегодня после морского путешествия. В то время как наша страна не располагает к туризму, после восстания «Лесных братьев» и провозглашения Эстонии свободной страной, более десяти лет назад отряд из двухсот человек боролся за нашу независимость. Эти люди, наряду с другими, сражались в составе «Компании Боргелин» – единственного датского отряда, покинувшего Данию и сражавшегося за Эстонию и Латвию в трудную минуту.\n\nАртур Сирк лично встречался с этими людьми, многие из которых разделяют его идеологические взгляды, и заявили о своей поддержке его режима до тех пор, пока он остаётся у власти. Удивительно, но лидер оппозиции Отто Страндман также организовал встречу, лично встретившись с ними спустя более чем десятилетие после их марша в Таллин на параде Победы. Есть что-то особенное в память об этих двухстах отважных мужчинах, которые решили сражаться вместе с нашими силами за нашу свободу, пусть и недолговечную до сих пор."
 denmark_events.1018.a: "Мы солидарны с теми, кто помогает нам в трудную минуту."

 denmark_events.1019.t: "Король-адмирал"
 denmark_events.1019.d: "Восшествие Фредерика IX на престол вызвало важнейший вопрос: что делать с его ролью во флоте? Получив за последнее десятилетие звание контр-адмирала, Фредерик не только выполняет важнейшую задачу по обеспечению нашего флота, но и является популярной фигурой в военно-морском флоте. Будучи кадетом, он получил наставления от адмирала Веделя и на протяжении последнего десятилетия поддерживал с ним тесные отношения. Обычно королевские обязанности ставятся на первое место, поэтому Фредерик решил уйти в отставку с флота; однако сам Фредерик выступил с предложением.\n\nФредерик давно хотел преодолеть напряженную дистанцию ​​между королем и народом Дании, поэтому, возможно, выполнение какой-либо роли во флоте, одновременно являясь королем, было бы отличным решением этой проблемы. С другой стороны, Фредерик мог бы достойно уйти в отставку из флота и сохранить свою должность влиятельного конунга-адмирала, вдохновляя как молодых моряков, так и адмиралов на дальнейшее достойное развитие флота Дании."
 denmark_events.1019.a: "Фредерик решил достойно уйти в отставку. Да здравствует король-адмирал Фредерик!"
 denmark_events.1019.b: "Король-адмирал будет исполнять обе роли: на благо короны и адмиралтейства."

 denmark_events.1020.t: "От рабочей партии к народной партии"
 denmark_events.1020.d: "Баннеры с надписью «Danmark for Folket» («Дания для народа»), среди прочего, были вывешены сегодня на нескольких правительственных учреждениях Копенгагена в то время, как Торвальд Стаунинг готовил новую речь, которая привлекла внимание самых разных слоев общества. Он заявил, что «Социал-демократия» как партия должна меняться и модернизироваться по мере того, как меняется мир вокруг неё; поэтому он представил новую программу, направленную на превращение «Социал-демократии» в настоящую партию для датского народа. В этом году съезд партии «Социал-демократия» был привлечён всеобщим вниманием в связи с созданием нового комитета для пересмотра программы принципов, впервые сформулированной в 1913 году. Этот комитет состоит из членов партии, представителей профсоюзного движения и кооператива, стремящихся разработать ряд принципов и программ, которые одновременно обеспечат демократию в Дании и эффективно помогут вывести её из экономического кризиса.\n\nСтаунинг заявил в своей речи, что растущий реваншизм с Востока и Запада – от синдикалистских отрядов Интернационала до некогда доминирующего российского гегемона, ныне десятилетиями находящегося под немецким гнетом, – лишь подорвёт гармонию в Европе. Таким образом, Дания под руководством Стаунинга и Социал-демократов будет стремиться к единству рабочих и крестьян, а также капитала и рабочих. В конечном счёте, Социал-демократы станут партией народа."
 denmark_events.1020.a: "Или Стаунинг, или хаос!"

 denmark_events.1021.t: "Восстание умеренных в КНП"
 denmark_events.1021.d: "С момента «Закона о чрезвычайных полномочиях» прошли считанные недели, и многие, затаив дыхание, ждали, что из этого выйдет. Как и ожидалось, Вестергард и его сторонники задействовали все государственные средства и начали продвигать реформы, отступающие от модернизации государства, включая сокращение социальной поддержки и многие либеральные экономические реформы, при поддержке таких лидеров бизнеса, как А.П. Мёллер. Однако не всё в безопасности для этой квазидиктатуры, поскольку сегодня Йохн Кристмас Мёллер попал в заголовки газет по всей стране, осудив правление Вестергора и призвав многих к дальнейшему сопротивлению его власти.\n\nУслышав эту новость, Вестергард немедленно поспешил призвать KU подавить эту организацию, но, поскольку воспоминания о Копенгагенском восстании были ещё свежи в памяти многих, мало кто хотел поддержать радикальные меры. Министр-вестергёрдист Уле Бьёрн Крафт вместо этого начал пропагандистскую кампанию против Мёллера, но ущерб был уже нанесён, когда несколько недисциплинированных членов партии KU разгромили мирную акцию протеста у дворца Амалиенборг. Ссылаясь на агрессивную деятельность этой военизированной группировки, Мёллер и лидеры Социал-демократов, Венстре и Радикальных Венстре встретились, чтобы разработать план действий по спасению Дании изнутри."
 denmark_events.1021.a: "Нас ждет трудная поездка..."

 denmark_events.1022.t: "Основание Датской ассоциации молодежи"
 denmark_events.1022.d: "Ассоциация датской молодёжи (Dansk Ungdomssamvirket) была создана на основе кажущихся симпатий к оппозиции и преодолела раскол в Консервативной Молодежи Вестергаарда, которая активно выступала на улицах в прошлом месяце. Многие молодые люди присоединились к делу Джона Кристмаса Мёллера, опубликовав совместное заявление с Акселем Мёллером, и создали свою молодёжную группу Ungdomssamvirket для борьбы с нашими. Бывшие молодёжные организации нескольких других политических партий объединились с Ungdomssamvirket, чтобы создать народный молодёжный фронт за восстановление демократии, и начали протесты против нашего правления, что привело к многочисленным дезертирам в наших рядах. Кай Лембке выступил с речью, разжигающей националистический пыл, пытаясь вернуть себе хоть какую-то поддержку, но ущерб уже нанесён, и, похоже, многие не терпят нашего правления с момента его прихода к власти. Они объединяются ради защиты парламентаризма, суверенитета, демократии и свободы, утверждая, что эти идеалы составляют суть датскости. Эти идеи в основном были выдвинуты теологом Хэлом Кохом, сыгравшим важную роль в движении сопротивления вестергардистскому правлению, которое, похоже, является для нас постоянной занозой."
 denmark_events.1022.a: "«Закон о чрезвычайных полномочиях», похоже, также способствовал возникновению духа сопротивления."

 denmark_events.1023.t: "Реорганизация крайне правой коалиции"
 denmark_events.1023.d: "После включения Датского Собрания и Новой Дании в правящую коалицию настало время реорганизовать партию в широкий правый фронт, охватывающий всех её идеологов, руководство и членов. Сегодня Dansk Samling входит в обширное крыло вестергардистов, а Nye Danmark реорганизована в националистическое крыло савинковистов. Демократическая оппозиция лишь укрепилась в ответ на приглашение известных радикалов, замышляющих парламентский крах Дании, но их решимость согласуется лишь с решимостью Вестергарда. Вестергард выступил в Копенгагене с речью, в которой заявил, что Nye Højre будет преобразована из политической партии в фронт всех датчан и станет единым целым с государством. Потребуется время, чтобы этот «новый правый» фронт укрепился в Дании, но, учитывая, что власть практически обеспечена на ближайшее будущее, похоже, что планы Вестергарда воплощаются в жизнь."
 denmark_events.1023.a: "Шаг за шагом Дания будет переделана.."

 denmark_events.1024.t: "Основание Новых Правых"
 denmark_events.1024.d: "Отрыв умеренных консерваторов от партии «Хёйре» лишь создал для Вестергора реальную проблему. Связанный парламентом и остатками партии, которые служат лишь маркой для укрепления его власти, он решил пойти ещё дальше. Сегодня Джек Вестергор, Виктор Пюршель, Уле Бьёрн Крафт и несколько других высокопоставленных членов клики Вестергора собрались, чтобы основать совершенно новую партию — «Новые правые». Воссоздав наследие «Хёйре», распавшейся в 1915 году, и с трудом восстановившей позиции после падения правительства Й. Б. С. Эструпа на рубеже веков, партия возродилась в совершенно новой партии правых в Дании. Власть Нью-Гэмпшира закреплена в аналогичном наборе законов, которые фактически распустили Ригсдаг и укрепили власть немногих наверху.\n\nВ этой новой иерархии Вестергор и компания, сочетающие в себе националистическую риторику, стремление вернуть датское величие и обещания положить конец либеральной модернизации, а также десятилетия парламентских реформ, разрушивших подлинную датскость, оказались на вершине. С появлением новой партии, воплощающей цели и стремления Вестергора, ландшафт датских правых изменился навсегда."
 denmark_events.1024.a: "Начало чего-то великого... или катастрофического."

### Parties ###
 DEN_totalist_party: "Федерация - Коммунары"
 DEN_totalist_party_long: "Коммунистическая федерация - Коммунары\n§LНедавно возникшая в Федерации, основанная в начале 1930-х годов, коммунарская организация состоит исключительно из Мартина Андерсена Нексе, который является руководящей фигурой для молодых коммунистов. Клика коммунаров, получившая образование за границей, в Великобритании и Франции, представляет собой избранную фракцию старых коммунистических деятелей, включая Нексе, а также таких деятелей, как Берге Хоуман и Альфред Йенсен. Их идеалы строятся вокруг идеи о том, что Дания должна быть преобразована в средство процветания скандинавской революции и что Дания должна превратиться в форпост революции. Наряду с этим, коммунарская клика выступает за централизацию государства и за подхалимаж партии перед государством для достижения этого окончательного решения. Рабочие Дании будут бороться не только за свое собственное освобождение, но и за освобождение трудящихся по всей Европе. Их взгляды не особо разделяются в партии, и многие считают их максималистами, готовыми сделать все возможное, чтобы превратить Данию в социалистическое государство, не слишком отличающееся от Франции или Великобритании.§!\n"
 DEN_radical_socialist_party: "Федерация - ДЛСП"
 DEN_radical_socialist_party_long: "Коммунистическая федерация - Датская левая социалистическая партия \n§LDVSP, основанная в 1919 году и объединившаяся с синдикалистской FS Кристиана Кристенсена в 1921 году, чтобы сформировать Федерацию, в основном возглавляется Акселем Ларсеном, новым членом партии, но более молодым человеком, который приобрел известность в Федерации благодаря своим зажигательным речам и риторике, которые завоевали массу поклонников. Первоначально партию возглавляли Мари Софи-Нильсен, а также Тогер Тогерсен, который отошел от Социал-демократов на волне хаоса бурных революций по всей Европе, и теперь ею единолично руководит Ларсен, при активной поддержке Тогерсена. В то время как партия в некотором смысле поддерживает других членов, порвавших с социал-демократией и выступающих за республиканство, DVSP заняла позицию поддержки рабочих советов как основного средства достижения власти в стране. Ларсен, однако, не нравится большинству членов Федерации, и он проявляет признаки желания распустить партию и сделать DVSP единственной массовой партией, которую будут поддерживать датские рабочие и граждане. Тем не менее, его риторика о создании подлинно датского социализма, не подверженного иностранному влиянию и по сути являющегося национальным, получила широкую поддержку со стороны сельских жителей.§!\n"
 DEN_syndicalist_party: "Федерация - Партия Солидарности"
 DEN_syndicalist_party_long: "Коммунистическая федерация - Партия солидарности\n§LПартия солидарности, образованная в конце 1920-х годов в результате слияния FS Кристиана Кристенсена, одного из основателей Федерации в 1921 году, объединяет двух людей со схожим взглядами и стремлением к социалистической Дании. Кристиан Кристенсен, лидер оппозиционной партии Samenslutning и бывший социал-демократ, долгое время возглавлял этот так называемый Союз профсоюзов, желая объединить профсоюзы по всей стране в один большой профсоюз, который бы с большой эффективностью реализовывал желания и свободы трудящихся. Склонные к примирению и компромиссам, Кристенсен и ФС нравятся большинству, но не нравятся Ларсену из-за его стремления к подлинному доминированию профсоюзов в стране. С другой стороны, появляется молодой лидер Ричард Йенсен, представляющий "молодую гвардию" и пользующийся большим уважением на флоте, особенно потому, что он возглавляет Søfyrbødernes Forbund, главный профсоюз моряков и обслуживающий персонал. Он тоже получил плохое воспитание, служил на флоте и представлял. Наряду с этими взглядами последователей Йенсена вдохновляет его стремление постоянно бороться за революцию, вооружая каждого мужчину, женщину и рабочего до зубов, чтобы они сражались за свободную, социалистическую Европу.§!\n"
 DEN_social_democrat_party: "Социал-демократы"
 DEN_social_democrat_party_long: "Социал-демократы\n§LСоциал-демократы, позиционирует себя как крупнейшая партия Дании, главным образом благодаря обаятельному Торвальду Стаунингу и его популярности за последнее десятилетие. Основанная в народе как Социал-демократический союз, многие вместо этого называют ее Социал-демократией, поскольку она была основана на волне индустриализации Дании и стремления создать демократическую и социалистическую партию для этих новых рабочих. Однако популярность Социал-демократии возросла только после прихода к власти Торвальда Стаунинга в 1924 году, после провала Радикале Венстре в правительстве и назначения временного правительства консерваторов, а также назначения первой в мире женщины-министра Нины Банг. В течение последнего десятилетия Стаунинг ослаблял напряженность в отношениях с левыми в своем стремлении создать государство всеобщего благосостояния в коалиции с Радикале Венстре, направляя курс на дальнейшее процветание Дании. Долгое время выступая за расширение прав трудящихся, всеобщее медицинское обслуживание, избирательное право женщин и несколько новых пенсий, большая часть Дании поддерживает продолжающееся господство Социал-демократов.§!\n"
 DEN_market_liberal_party: "Венстре"
 DEN_market_liberal_party_long: "Venstre (Левые)\n§LОснованная в 1870 году под названием Дет Форенде Венстре, Венстре превратилась в классическую либеральную партию после ухода Радикала Венстре в 1905 году из-за антимилитаризма. Венстре выступает в качестве основного оппонента социал-демократии Торвальда Стаунинга, хотя с ростом индустриализации и переездом датчан на работу в города, а не в сельскую местность, популярность Венстре за последнее десятилетие снизилась. Несмотря на свое столкновение с консервативной партией "Хойре" в конце XIX века, либералы сейчас объединяются с Консервативной народной партией в правоцентристскую коалицию, выступающую против господства "социалов". Придерживаясь идеалов классической либеральной экономической политики, таких как поддержка свободного рынка, Венстре считается партией, неспособной к демократическому движению. идти в ногу со временем и поэтому видит ограниченную поддержку за пределами коалиции с КНП.§!\n"
 DEN_social_liberal_party: "Радикальные Венстре"
 DEN_social_liberal_party_long: "Det Radikale Venstre (Радикальные Левые)\n§LОснованная в 1905 году, как отделение от Венстре, компания Радикал Венстре за последние несколько десятилетий пережила непростую историю. Радикале Венстре выросла из культурно-радикального движения конца девятнадцатого века и объединилась с Социал-демократической партией в естественной оппозиции к более консервативным силам в датской политике. Когда-то она была доминирующей партией в этой коалиции, но из-за непопулярной политики премьер-министра Карла Теодора Захле в военное время партия стала играть вторую скрипку после Социал-демократии. По-прежнему охотно поддерживая Стаунинга в его стремлении создать государство всеобщего благосостояния, социал-либералы теперь возглавляются Питером Мунком, который возглавляет партию, придерживающуюся экономических взглядов таких мыслителей, как Генри Джордж и Джон Стюарт Милль, и осторожного взгляда на социальные реформы, омраченного сильной привязкой к демилитаризации.§!\n"
 DEN_social_conservative_party: "КНП (К)"
 DEN_social_conservative_party_long: "Консервативная народная партия - конституционалисты\n§LОснованная в 1916 году на остатках партии "Хойре" путем объединения фриконсервативной и умеренной партий Венстре, Консервативная народная партия должна была обеспечить Данию консервативной партией, подходящей для 20-го века, которая привлекала бы растущий средний класс государственных служащих и "функционеров" (хотя, конечно, и не для всех). пренебрегая своей традиционной базой в промышленности, бизнесе и землевладельцах). Хотя в 1920-е годы КНП едва ли была одной из доминирующих партий, она успешно использовала свое влияние в верхней палате парламента для блокирования более радикальной политики Стаунинга. Одним из ее основных принципов является противодействие распространению социализма, и эта позиция партии укрепилась после британской революции. Лидер консерваторов Йохн Кристмас Меллер долгое время отказывался от поддержки трудовых реформ и активной борьбы за права трудящихся. Хотя эта "красная угроза" вызвала возрождение консерватизма в датском обществе, КНП в настоящее время далека от рычагов власти, и даже ее бывший партнер Венстре не согласен с ее политикой перевооружения "для ведения борьбы за рубежом", и поэтому КНП видит себя единственным, кто выступает против антимилитаристской риторики Питера Мунка и выступает за необходимую милитаризацию и инвестиции в армию.§!\n"
 DEN_authoritarian_democrat_party: "КНП (A)"
 DEN_authoritarian_democrat_party_long: "Консервативная народная партия - автократы\n§LАвтократическое крыло КНП прошло аналогичный путь от своего основания, являясь небольшой, но известной фракцией КНП, сформированной во время "красной паники", последовавшей за британской революцией, вдохновленной новогодней речью короля в 1926 году. Автократическое крыло КНП, возглавляемое Виктором Пюршелем, стремится вернуть власть королю Кристиану X, а также объединить Данию вокруг однопартийного государства, премьер-министр которого избирается королем, по аналогии с немецкой системой. Эта партия номинально не стремится к отмене выборов, а скорее хочет контролировать государственные средства и доминировать в политике, хотя Пюршель вполне согласен с идеей о том, что Дания защищена от бед социализма, а также от разрушительного влияния того, что народ решает судьбу страны. В правительстве растет поддержка их движения, и такие фигуры, как Оле Бьорн Крафт, выступают за полное искоренение умеренного консерватизма.§!\n"
 DEN_paternal_autocrat_party: "ДЕ"
 DEN_paternal_autocrat_party_long: "Датское единство\n§LОснованная в 1930 году, "Датское Единство" - это партия, созданная бывшим социал-демократом Арне Серенсеном после избрания Стаунинга и его стремления пойти на компромисс с Германией, заставив Данию присоединиться к немецкому экономическому блоку. Его презрение к сотрудничеству с немцами, а также растущее презрение к парламентаризму стали для него последней каплей, когда из-за него Дания присоединилась к Миттельевропе. Хотя его партия в значительной степени непопулярна, он видит поддержку в армии, наряду с генералом Полом Раммом, и поддерживает связи со значительной частью недовольного высшего командования, разочарованного вмешательством правительства в их бюджет. DS, как партия, является корпоративистской, антипарламентской и выступает за национальную революцию датских граждан, желая, чтобы люди проснулись и осознали, к каким разрушениям привела Данию демократия. В народе Серенсен по-прежнему придерживается левых социальных взглядов, хотя многие из его критиков выражают обеспокоенность по поводу его приверженности таким идеям, учитывая сотрудничество с небольшими правыми партиями.§!\n"
 DEN_national_populist_party: "НД"
 DEN_national_populist_party_long: "Новая Дания\n§LОснованная в 1935 году, НД является маргинальной правой партией, возглавляемой Максом Арильдсковым, и придерживается относительно новой идеологии, известной как национал-популизм, или той, которую отстаивает Борис Савинков с момента своего прихода к власти в России в 1934 году. НД в значительной степени непопулярна и пользуется лишь некоторой поддержкой, особенно со стороны тех, кто сражался бок о бок с Арильдсковым в войне за независимость Эстонии, а также коллег-савинковцев, которые присоединились к его делу после ее создания. Большое беспокойство вызывает немецкая оккупация Нордслесвига, утраченного полвека назад, и те немногие последователи, которые у него есть, безуспешно пытались сплотить усилия для его возвращения.§!\n"

 DEN_KomF_socdem: "Федерация - Стаунгинисты"
 DEN_KomF_socdem_long: "Коммунистическая федерация - Стаунгинисты\n§LСторонники Стаунинга, в основном из радикально-социал-демократической партии, объединились на стороне Стоунинга, чтобы защитить датскую демократию, а также обойти дьявольские намерения короля Кристиана X свергнуть Стаунинга, если Дания будет вынуждена подчиниться Германии. Популярность Социал-демократов в значительной степени снизилась в связи с установлением социалистического режима, а те, кто остался, бежали, чтобы поддержать радикальное движение Мунка.§!\n"
 DEN_stauning_radsoc: "Федерация - Стаунгинисты"
 DEN_stauning_radsoc_long: "Коммунистическая федерация - Стаунгинисты\n§LХотя Стаунинг и не является убежденным социалистом, он находится в противоречии со многими радикалами Социал-демократической партии, которые присоединились к DVSP после того, как в 1924 году Социал-демократы развернулись в сторону европейской торговой политики. Эти сторонники, такие как Сигвальд Хеллберг, высоко ценили открытость Социалдемократов по отношению к левым, но чувствовали разочарование, поскольку продолжали поддерживать организацию, одержимую стремлением разрушить датский образ жизни. Сам Торвальд Стаунинг заручился этой поддержкой не столько как официальный премьер-министр-председатель других партий Федерации, сколько как номинальный лидер. До тех пор, пока будут реализовываться стремления Стаунинга к созданию государства всеобщего благосостояния, Стаунинг будет оказывать полную поддержку Федерации и расцвету социалистической демократии.§!\n"
 DEN_stauning_initial_radsoc: "Федерация - Стаунингисты/ДЛСП"
 DEN_stauning_initial_radsoc_long: "Коммунистическая федерация - Стаунингисты/Датская левая социалистическая партия"
 DEN_stauning_defect_radsoc: "Федерация - Стаунингисты/ДЛСП"
 DEN_stauning_defect_radsoc_long: "Коммунистическая федерация - Стаунингисты/Датская левая социалистическая партия\n§LТорвальд Стаунинг, который недавно заключил соглашение с Федерацией, предал Социал-демократов, встав на сторону радикалов в партии и присоединившись к крайне левым в восстании. Демократия в Дании сегодня мертва, как и легитимность ее давнего лидера, который вместе с такими влиятельными фигурами, как Фредерик Боргбьерг и Сивгальд Хеллберг, провозгласил, что демократическая Дания не может существовать бок о бок с роялистской. Этот раскол в партии привел к падению популярности Социал-демократиов и доверия к ней, поскольку Стаунинг и его союзники, к добру это или к худу, поддержали социалистическое дело.§!\n"

 DEN_westergaard_soccon: "КНП (В)"
 DEN_westergaard_soccon_long: "Консервативная народная партия - Вестергардисты\n§LИдеология Вестергаарда - это то, что выходит за рамки КНП, и большая часть партии мало прислушивается к его желаниям. Однако, поскольку правительство не предприняло никаких действий в связи с надвигающейся революцией, Вестергаард позаботился о том, чтобы передать всю полноту власти себе и тем, кто находился на самом верху, включая доверенного сотрудника Карстена Рафта. Лидер консервативного движения Ungdom или "Молодые консерваторы", одного из первых молодежных движений, создавших политическую партию, Вестергаард сплотил вокруг себя КНП, как военизированное формирование, и выразил желание превратить Данию в свою личную партию - правое государство. Он пишет, что наряду с национальным консерватизмом Дания должна придерживаться готовности к самопожертвованию и социальной солидарности, достоинства труда, планомерной социальной и экономической организации, морального вооружения против духовного упадка и распущенности.' Его идеалы основаны на идеологии социал-национализма, альтернативе демократии и парламентаризму, которая стремится возродить Данию в соответствии с видением, выходящим далеко за рамки ее основ. Его желания совпадают с идеями национального консерватизма, которые отстаивает министр КНП Оле Бьерн Крафт, и Вестергаард, похоже, возродил дух старых Хейре.§!\n"
 DEN_westergaard_authdem: "КНП (В)"
 DEN_westergaard_authdem_long: "Консервативная народная партия - Вестергардисты\n§LИдеология Вестергаарда - это то, что выходит за рамки КНП, и большая часть партии мало прислушивается к его желаниям. Однако, поскольку правительство не предприняло никаких действий в связи с надвигающейся революцией, Вестергаард позаботился о том, чтобы передать всю полноту власти себе и тем, кто находился на самом верху, включая доверенного сотрудника Карстена Рафта. Лидер консервативного движения Ungdom или "Молодые консерваторы", одного из первых молодежных движений, создавших политическую партию, Вестергаард сплотил вокруг себя КУ, как военизированное формирование, и выразил желание превратить Данию в свою личную партию - правое государство. Он пишет, что наряду с национальным консерватизмом Дания должна придерживаться "готовности к самопожертвованию и социальной солидарности, достоинства труда, планомерной социальной и экономической организации, морального вооружения против духовного упадка и распущенности".' Его идеалы основаны на идеологии социал-национализма, альтернативе демократии и парламентаризму, которая стремится возродить Данию в соответствии с видением, выходящим далеко за рамки ее основ. Его желания совпадают с идеями национального консерватизма, которые отстаивает министр КНП Оле Бьерн Крафт, и Вестергаард, похоже, возродил дух старых Хейре.§!\n"

 DEN_forenede_venstre_marlib: "Forenede Venstre"
 DEN_forenede_venstre_marlib_long: "Forenede Venstre (Обьединенные Левые)\n§LПрисоединившись к переговорам, проведенным Радикальными Венстре и Венстре, организация "Форенеде Венстре" была преобразована в движение за центр. С этой новообретенной либеральной мощью, смягченными взглядами на социальные реформы и большим одобрением демилитаризации после победы в Европе и согласия Германии на возвращение Дании к нейтралитету, Обьединенные Левые возвращаются в бой после своего распада много десятилетий назад.§!\n"
 DEN_forenede_venstre_soclib: "Forenede Venstre"
 DEN_forenede_venstre_soclib_long: "Forenede Venstre (Обьединенные Левые)\n§LПрисоединившись к переговорам, проведенным Радикальными Венстре и Венстре, организация "Форенеде Венстре" была преобразована в движение за центр. С этой новообретенной либеральной мощью, смягченными взглядами на социальные реформы и большим одобрением демилитаризации после победы в Европе и согласия Германии на возвращение Дании к нейтралитету, Обьединенные Левые возвращаются в бой после своего распада много десятилетий назад.§!\n"

 DEN_national_populist_party_monarchy: "ДЕ"
 DEN_national_populist_party_monarchy_long: "Датское единство\n§LОснованная в 1930 году, "Датское единство" - это партия, созданная бывшим социал-демократом Арне Серенсеном после избрания Стаунинга и его стремления пойти на компромисс с Германией, заставив Данию присоединиться к немецкому экономическому блоку. Его презрение к сотрудничеству с немцами, а также растущее презрение к парламентаризму привели к тому, что присоединение к Миттельевропе стало для него последней каплей, и он ушел в 1923 году.Хотя его партия в значительной степени непопулярна, он видит поддержку в армии, наряду с генералом Полом Раммом, и поддерживает связи со значительной частью недовольного высшего командования, разочарованного вмешательством правительства в их бюджет. DS, как партия, является корпоративистской, антипарламентской и выступает за национальную революцию датских граждан, желая, чтобы люди проснулись и осознали, к каким разрушениям привела Данию демократия. В народе Серенсен по-прежнему придерживается левых социальных взглядов, хотя многие из его критиков выражают обеспокоенность по поводу его приверженности таким идеям, учитывая сотрудничество с небольшими правыми партиями.§!\n"

 DEN_autdem_breakaway_party: "НП"
 DEN_autdem_breakaway_party_long: "Nye Højre (Новые Правые)\n§LВозрожденная Хойре, которая распалась в 1915 году, НП стремятся возродить наследие Й.Б.С. Эструпа и отказаться от идеи парламентаризма. Их идеалам и компромиссам с KF пришел конец, что привело к возрождению истинно правого движения в Дании. В значительной степени получая корпоративную поддержку от крупных предприятий Дании, таких как A.P. Møller, NH выступает в качестве организации, поддерживающей идеалы таких номинальных идеологов, как Джек Вестергаард. Его идеалы основаны на идеологии социал-национализма, альтернативе демократии и парламентаризму, которая стремится возродить Данию в соответствии с видением, выходящим далеко за рамки ее основ. Это движение выступает против реформ и модернизации, осуждая либеральные и социалистические идеи, которые изначально порочат величие Дании.§!\n"
 DEN_pataut_nh_wing: "НП (В)"
 DEN_pataut_nh_wing_long: "Nye Højre - Westergaardists (Новые Правые-Вестергардисты)\n§LВестергардистское крыло НП полностью состоит из преданных сторонников Вестергарда и тех, кто действительно следует его идеалам. В то время как многие в Нью-Йорке объединились, чтобы поддержать национальный консерватизм, который отстаивали такие деятели, как Оле Бьорн Крафт, другое направление, стоящее за лидером "Данск Самлинг" Арне Серенсеном, пришло поддержать новый вестергардистский блок внутри движения. Вестергаард, как известно, отстаивает такие идеалы, как социал-национализм, руководствуясь видением того, как он может по-настоящему сформировать новое общество.§!\n"
 DEN_natpop_nh_wing: "НП (С)"
 DEN_natpop_nh_wing_long: "Nye Højre - Savinkovists (Новые Правые-Савинковисты)\n§LСавинковисткое крыло НП - это своеобразная организация, состоящая в основном из немногих сторонников партии Макса Арильдскова "NYE Danmark", которая была основана как родственная партия движению Савинкова после его прихода к власти в 1935 году и является основной базой республиканства в NH. Это савинковское крыло находится в меньшинстве внутри партии, набрав силу только благодаря некоторым радикально настроенным членам КУ Вестергаарда, которые в целом поддерживают создание правой республики.§!\n"
 DEN_soccon_unified_party: "КНП"
 DEN_soccon_unified_party_long: "Консервативная Народная Партия\n§LТеперь, наконец, освободившись от власти Пюршеля, Йохн Кристмас Меллер ведет новую объединенную КНП в будущее, ставя перед собой серьезные цели по внедрению однопалатности, которая укрепит позиции правоцентристов в Дании. Его популярность и стремление к демократии в условиях раскола в партии не остались безосновательными, и многие из бывших сторонников Пюршеля присоединились к Меллеру в КНП, поддержав его стремление к созданию консервативной, но в то же время демократической Дании.§!\n"

 DEN_soccon_moderates_revolt_party: "КНП (У)"
 DEN_soccon_moderates_revolt_party_long: "Консервативная Народная Партия-Умеренные\n§LКонтроль Вестергаарда над парламентом укрепился благодаря его сторонникам и их так называемому "Новому консерватизму", который направлен на продвижение мер по контролю над страной. Меллер призвал всех, кто любит Данию, демократию и свободу, которые она принесла своим гражданам, противостоять Вестергарду и положить конец этой квазидиктатуре. Весь спектр демократических партий объединился в группу за восстановление демократии, объединившуюся под руководством Меллера. На данный момент Вестергаард надежно контролирует страну из-за продолжающейся войны, но, возможно, все изменится, как только наступит мир.§!\n"

