 DEN_tt_pacifist_accord_hindrance_partial: "§YНациональный дух \"Пацифитское Соглашение\"§! §Rпо-прежнему в значительной степени ограничивает способность нашей страны к перевооружению, и дальнейшее перевооружение дестабилизирует ситуацию в стране.§!"
 DEN_tt_pacifist_accord_hindrance_diminished: "§RНациональный дух \"Пацифитское Соглашение\"§! §Rвсе еще частично ограничивает способность нашей страны к перевооружению, и дальнейшее перевооружение дестабилизирует ситуацию в стране.§!"
 DEN_tt_incorrect_mil_path: "§RЭтот военный путь идет вразрез с пожеланиями нашего кабинета, и, следовательно, его продолжение обойдется дорого.§!"
