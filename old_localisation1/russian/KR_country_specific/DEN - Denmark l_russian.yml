 DEN_aage_hartz: "Оге Герц"
 DEN_aage_hartz_army_chief_desc: "§YРодился:§! §L19 декабря 1882 года в Оденсе, Королевство Дания§!\n§YБиография:§! §LПризванный в армию в 1902 году, Герц в 1907 году дослужился до звания первого лейтенанта. Во время Великой отечественной войны Гарц поступил на службу в Генеральный штаб, а по окончании войны был назначен подполковником и возглавил 1-й батальон, дислоцированный в Копенгагене. Будучи пехотинцем и командиром гарнизона, Гарц является не только начальником штаба, ответственным за разработку планов защиты Дании в случае приближения войны к ее границам, но и главным образом за оборонительные мероприятия вокруг столицы.§!"

 DEN_christian_forslev: "Кристиан Ферслев"
 DEN_christian_forslev_air_chief_desc: "§YРодился:§! §L27 января 1891 года в Снеслеве, округ Сорё, Королевство Дания§!\n§YБиография:§! §LСын фермеров, Фёрслев поступил в Королевский военный колледж в 1905 году в возрасте 14 лет и стал первым лейтенантом артиллерийского корпуса в 1914 году. Он окончил курс авиационной техники, а также инженерный курс в 1919 году. Фёрслев должен был отправиться во Францию ​​для прохождения дополнительной подготовки, но из-за катастрофических условий во Франции к концу Мировой войны Фёрслев был вынужден остаться дома. Вместо этого Фёрслев работал на родине в Датском воздушном корпусе, помогая обучать молодых лётчиков, а также поддерживая усилия Дании по созданию полноценных внутренних сил противовоздушной обороны. В 1934 году за свою работу в армии и военно-воздушных силах Фёрслев был повышен до звания полковника.§!"

