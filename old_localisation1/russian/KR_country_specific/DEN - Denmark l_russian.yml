### Scripted Loc ###
 getCCloc_sided_with_king: "Сегодня, после заключения соглашения с королём Кристианом X, он согласился сотрудничать в реализации своего плана сближения с немецким гегемоном. Однако его цели не совпадают с целями датского народа, который жаждет убедительных доказательств своей готовности и способности помочь Германии в предстоящей войне. Поэтому мы должны сделать всё возможное, чтобы донести до датского народа, что наше правительство готово и желает вооружить страну для войны.\n\nЭто не означает, что наша задача будет лёгкой; король Кристиан X по-прежнему следит за каждым нашим шагом и может принять резолюцию об отставке правительства, если мы не справимся с этой ситуацией. Мы должны тщательно следить за соблюдением надлежащей системы сдержек и противовесов, чтобы король не счёл нас слишком коррумпированными для дальнейшего управления страной."
 getCCloc_opposed_king: "В Копенгагене разразился кризис! Сегодня, явно вопреки нашим желаниям в правительстве, король ясно дал понять, что хочет, чтобы Дания заняла место среди ведущих мировых держав и присоединилась к ним. Кристиан X, при поддержке консервативной Дет Консервативной Народной партии, привёл в действие планы, которые могут положить конец нашему правящему правительству в том виде, в котором мы его знаем.\n\nК счастью, у нас есть один козырь – лояльность вооружённых сил. Они не полностью подчиняются королю, и мы всё ещё имеем на них сопоставимое влияние. Используя имеющиеся у нас ресурсы, мы, возможно, сможем разоблачить короля и показать, какой он тиран!"
 getMDloc_sided_with_king: "Начать военный парад в Копенгагене"
 getMDloc_opposed_king: "Отвести военных от Копенгагена"
 DEN_kommunarder_w: "Клика Коммунаров!"
 DEN_enhedspartiet_w: "Партия Солидарности!"
 DEN_dvsp_w: "ДЛСП!"
 DEN_stauninger_w: "Стаунингисты победили!"
 DEN_nobody_w: "Нет большинства..."
 DEN_easy_mil_demand_loc: "первым полученным немецким требованием был запрос на военный доступ, согласно которому немецким войскам были бы предоставлены позиции на датских военных базах в случае интернационала или российского вторжения в соседние порты или города, а также на аренду датских портов для швартовки немецких кораблей. Стаунинг начал дебаты с кабинетом министров, основанные на этих требованиях, и хотя они в некоторой степени ущемляют суверенитет Дании, это позволило бы Дании сохранять нейтралитет, пусть и с позиции «нейтрального союзника», как это делала Норвегия в прошлой войне. Однако некоторые члены кабинета министров категорически отвергли эти требования, и, таким образом, решение зашло в тупик. У Стаунинга есть последнее слово, чтобы склонить на свою сторону обе стороны в этом споре; как нам следует ответить?"
 DEN_hard_mil_demand_loc: "первым требованием Германии стала просьба о прямом членстве Дании в их военном союзе. Это вызвало полное возмущение у большей части партии, включая лидера коалиции Петера Мунка, заявившего, что это требование – призыв превратить Данию в ещё один «Остштат» для немцев. Большая часть Социал-демократов согласна с этим консенсусом, хотя альтернатива вторжения или, возможно, заключения сделки с акулами на другом конце океана не делает отклонение предложения более убедительным. Однако в кабинете министров есть те, кто считает это требование необходимым и должно быть принято, и поэтому решение зашло в тупик. У Стаунинга есть последнее слово, чтобы склонить на свою сторону обе стороны дискуссии; как нам следует ответить?"
 DEN_easy_eco_demand_loc: "вторым полученным от Германии требованием было переориентировать торговлю на Германию и установить гораздо более низкие цены на импорт и закупку датских товаров в немецких руках. Это соглашение нанесет небольшой ущерб датской экономике, но позволит Дании по-прежнему торговать со всеми, с кем она пожелает, хотя большая часть этой торговли будет направлена на немецкий рынок. Стаунинг согласился с тем, что эти требования в некоторой степени затормозят планы по внедрению в наибольшей степени государства всеобщего благосостояния; однако в кабинете есть те, кто принял эти требования, и, таким образом, принятие решения зашло в тупик. У Стоунинга есть последний шанс склонить на свою сторону любую из сторон в дебатах; как мы должны ответить?"
 DEN_hard_eco_demand_loc: "вторым полученным от Германии требованием было переориентировать торговлю на Германию, а также перевести четверть датской гражданской промышленности в руки Германии. Датские заводы, в свою очередь, будут использоваться для переработки природных ресурсов, строительства нефтеперерабатывающих заводов, а также для производства продовольственных товаров и любых невоенных материальных средств для использования в экономике Германии. Такое требование нанесло бы серьезный ущерб датской экономике и даже поставило бы под сомнение, насколько "нейтральной" может быть Дания, когда часть ее экономики сдается в аренду Германии. Сдача в аренду заводов также вызвала бурю негодования в кабинете министров, заявившем, что это требование подрывает независимость Дании и ставит ее в подчиненное положение перед правительством Германии. Кабинет министров в основном выступает против этого требования; однако последнее слово за Стаунингом, чтобы склонить на свою сторону любую из сторон в дебатах; как мы должны ответить?"
 DEN_soc_stauning_death: "многие считают, что он спас Данию, поспешно приняв социалистическую доктрину вопреки своим собственным убеждениям. Многие отмечают, что это решение было принято благодаря его популярности как номинального лидера Дании, который объединил левых и спас Данию от превращения в немецкую марионетку. Федерация организовала не только официальные похороны, но и неофициально объявила Торвальда Стаунинга одним из отцов-основателей датского социалистического государства, о котором будут помнить грядущие поколения."
 DEN_stauning_death: "ему широко приписывают сдерживание синдикализма, а также НД и ДС, и некоторые голоса призывают устроить ему государственные похороны - честь, которой обычно не удостаиваются премьер-министры Дании, но, учитывая время, которое он находится у власти, он не \"просто премьер-министр\"."
 DEN_2wk_start_failsafe: "Если вы видите это, пожалуйста, сообщите об этом, так как это ошибка."
 DEN_2wk_start_peace: "Благодаря отчаянным переговорам, экономическим субсидиям кайзеровской Германии, а также необходимости предоставлять немецким войскам отдых на датской территории в случае возможного вторжения, Дания сохранила свой нейтралитет. Это не вызывает у неё облегчения, поскольку Дания наблюдает со стороны за тем, что может обернуться новой войной, охватывающей весь мир. Добровольческие бригады формировались как слева, так и справа, а также в центре, отправляясь на поля сражений по всей Европе и за её пределами.\n\nХотя Дания, возможно, и избегала прямого союза с той или иной стороной, маршал Прайор предупредил армию о необходимости готовиться к сценарию, в котором Третий Интернационал воспользуется их изоляцией для удара по Германии. Однако большая часть правительства отвергла открытую мобилизацию и воинскую повинность, ссылаясь на то, что это нарушит ряд договоров, заключённых с Германией. Пока нам остаётся только ждать и смотреть, погрузится ли Европа в хаос или Дания окажется между западными и восточным зверями."
 DEN_2wk_start_GER: "[GetSecondInCommand] встретился с королём Кристианом X после того, как публично объявил о совместном заявлении о войне вместе с Германской империей и её союзниками. Датские войска проходили обучение и мобилизацию, а правительство проявило должное усердие, готовя страну к войне. Хотя военная мощь Дании может быть ограничена либо армией для обороны, либо мобильными элитными подразделениями для использования в составе Германской армии, либо на Восточном фронте против русских войск, Дания вошла в историю своим выбором вступить в борьбу за стабильность в Европе.\n\nОднако эта новость была негативно воспринята в Дании, и многие антимилитаристы вышли на улицы крупных городов Дании, особенно в Копенгагене, протестуя против военных действий. Хотя они не представляют серьёзной угрозы, некоторые члены нашего кабинета министров выразили обеспокоенность тем, что коварные группы внутри страны могут воспользоваться такими настроениями и воспротивиться нашему решению."
 DEN_2wk_start_FRA: "Это самый тёмный час для Дании, а может быть, и один из многих в истории, поскольку Дания борется с Германией за сохранение датской демократии и государства, пусть и под новым социалистическим правительством. Торвальд Стаунинг пошёл на самый большой риск за всю свою карьеру, и этот риск окажется решающим и определит, выживет ли Дания и будет ли она процветать или же скатится под немецкую оккупацию. К этому моменту привели неудачные переговоры, и компромисс Стаунинга в вопросе демократических идеалов ради принятия социалистической системы вызвал большое недовольство его партии и многих членов Venstre, KF и Radikale Venstre.\n\nОднако, несмотря на всю смелость его действий, Дания сейчас находится в своего рода социалистической системе, поддерживаемой войсками Франции и Великобритании, и в условиях всеобщей мобилизации; только время покажет, стоила ли эта авантюра риска."
 DEN_concrisis_win_failsafe: "Если вы видите это, пожалуйста, сообщите об этом, так как это ошибка."
 DEN_concrisis_win_socdem: "Торвальд Стаунинг одержал победу благодаря поддержке своего кабинета и тщательному политическому манёвру. Кризис, к лучшему или к худшему, наступил и ушёл, поскольку Дания теперь оказалась в союзе с Германским кайзеровским рейхом. Датские вооружённые силы уже начали мобилизацию, наряду с подготовкой ВВС и флота, готовясь к конфликту с востока на запад, который определит судьбу Европы и за её пределами. Мечты Стаунинга о нейтралитете, возможно, и потерпели крах, но справедливое датское демократическое устройство будет существовать так, как и было задумано. В связи с этим Стаунинг объявил о планах дальнейшего развития государства всеобщего благосостояния... и сокращения этих давно нерешённых резервных полномочий, которыми владеет король."
 DEN_concrisis_win_liberal: "Томас Мадсен-Мигдал одержал победу; конституционный кризис не закончится смертью датской демократии и либерализма, а скорее подготовкой Дании к войне с Интернационалом и Россией. Мадсен-Мигдал обратился к стране, заявив, что датский либерализм не умер, и что только союз с Германией позволит Дании не только выжить, но и стать частью фундамента стабильности в Европе. Он также заявил, что раскрыл планы сотрудничества КНП с королём в случае его отставки с поста премьер-министра, и что конец коалиции с КНП может быть не за горами."
 DEN_concrisis_win_republic: "Король Кристиан X поспешно бежал из страны после отречения от престола, хотя и не без пафоса, заявив, что его родственники в Германской империи будут требовать его восстановления и что капитуляция Дании перед мощью немецкого зверя — лишь вопрос времени. Торвальд Стаунинг поспешно обратился к стране с обращением, назвав короля Кристиана X тираном, который замышляет своё свержение и гибель датской демократии, заменив её авторитарной, стремящейся сохранить свою власть. Стаунинг уже отправил дипломата в Берлин для обсуждения условий новых датско-германских отношений, и только время покажет, воцарится ли мир."
 DEN_marlib_crisis_loc: "Томас Мадсен-Мигдал предложил снизить возрастной ценз с 25 до 23 лет и разработал ряд антисоциалистических законов; однако многие из них были отвергнуты Йоханом Кристмасом Мёллером. В обмен на строгие антисоциалистические законы и продолжение масштабных либеральных экономических амбиций, которые Мадсен-Мигдал стремился включить в программу своей партии, Мёллер убедил его в необходимости создания однопалатного парламента. Несмотря на доминирование либералов и консерваторов в верхней палате, Мёллер давно требовал положить конец тому, что десятилетиями было фиктивным препятствием для прогресса в области реформ. К сожалению, их планы были сорваны призраком мирских дел."
 DEN_socdem_crisis_loc: "Торвальд Стаунинг предложил планы снижения избирательного ценза с 25 до 23 лет и замены верхней палаты Ригсдага, Ландстинга, Ригстингом. Планы Стаунинга получили одобрение со стороны всех политических сил, даже Томас Мадсен-Мигдаль, сторонник классических либеральных взглядов, поддержал давнюю идею модернизации Ригсдага. Никто не препятствует этим планам, кроме мирских дел, которые вызвали резкую критику этих планов, когда-либо вынесенных на голосование."
 
