 DEN_william_prior: "Уильям Приор"
 DEN_william_wain_prior_army_chief_desc: "§YРодился:§! §L18 июля, 1876, Копенгаген, Королевство Дания§!\n§YБиография:§! §LГенерал и главнокомандующий датской армии, Приор выбрал карьеру генерала, сосредоточившись на работе в Генеральном штабе. Он начал свой путь с назначения на должность старшего лейтенанта в 1898 году. Прайор, как правило, не пользуется популярностью у большей части правительства; его надёжность, последовательность и военная компетентность – это одно, но Прайор известен своим несогласием с контролем избранного правительства над армией. Оборонная политика Дании и сокращение оборонного бюджета за последнее десятилетие были обусловлены исключительно коалицией «социалистов» Socialdemokratiet и Radikale Venstre, а также опасениями, что в случае участия Дании в войне у неё будет мало средств для самообороны..§!"
 DEN_hans_rolsted: "Ганс Ролстед"
 DEN_erik_leschly: "Эрик Лешли"
 DEN_erik_with: "Эрик Уит"
 DEN_erik_with_high_command_desc: "§YРодился:§! §L20 ноября 1869 года в Копенгагене, Королевство Дания§!\n§YБиография:§! §LAfter a brief apprenticeship in the navy, With ascended quickly through the ranks after switching to the army, achieving First Lieutenant in 1892, Captain in 1908, and then Lieutenant Colonel in 1918. In the leadup to the Weltkrieg, With served as adjutant to the general inspector of the infantry, and became head of the intelligence section of the general staff. An emboldened nationalist, his promotions to Colonel in 1924 and then to Lieutenant General in 1931 came with severe risks, as he was a strongly anti-German. However, as the world settled around looming domination by the Kaiserreich, With found himself entrenched in the idea that Germany's victory in the Weltkrieg has also cemented their seemingly dominant control over Nordslesvig.\n\nMuch of the agitation around the issue fell upon the extremes, and With heralded himself as a force of the centre, boldly drafting plans for Denmark's defence should the hostile revolutions of the west fall upon Denmark. With has strong relations with Thorvald Stauning, and while much of Socialdemokratiet labels him as a 'half-crazed war man', Stauning has taken a liking to him for his ability to act boldly in difficult situations. With has passed numerous defence plans and budget adjustments to the cabinet, but with Peter Munch's desires coalescing within the so-called 'Pacifist Accord' emboldened, With has little budget to execute on his plans.§!\n\n§YNotes: Physically and spiritually resilient, With has taken an interest in sports, shooting, and gymnastics. He won a gold medal in 1923.§!"

