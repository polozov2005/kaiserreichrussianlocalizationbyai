 danish_focus: "Фокусы Дании"

### Tooltips ###
 DEN_black_monday_hits: "§RОбвал фондового рынка в Черный понедельник опустошил нашу экономику!§!"
 DEN_idea_fortification_tooltip: "§CМы сможем возобновить эти бонусы§! §Rтолько§! §Cпока они еще активны!§!"
 DEN_black_monday_category: "Кризис в Дании"
 DEN_black_monday_category_desc: "Кризис Миттельевропы добрался и до Дании, и Торвальд Стаунинг и его правительство уже испытывают давление, требуя взять кризис в свои руки и как можно быстрее оправиться от него. К сожалению, этим желаниям в значительной степени препятствовала тупиковая ситуация в Ригсдаге, из-за которой ни один законопроект не мог быть принят без одобрения оппозиции. Этот тупик привел к переговорам с §S'Социальной' коалицией§! Стаунинга и его союзников против §mВенстре§! и оппозиции. Это окно продемонстрирует результаты предстоящих переговоров, и оно завершится, если Канслергадское соглашение вступит в силу.\n\nСохраняя уровень §Sподдержки политики правительства§! равным или чуть ниже §mуступок, которые мы можем сделать оппозиции§! гарантирует, что §mVenstre§! будут удовлетворены настолько,чтобы наш законопроект прошел. Однако, уделяя приоритетное внимание нашей собственной повестке дня, чтобы успокоить §lRadikale Venstre§! и наша коалиция понесет только вущерб, поскольку ни один из этих законопроектов не может быть принят Ригсдагом в его нынешнем виде.\n\Поддержка политики нашего правительства составляет: §S[?DEN_cabinet_policy_support]§!\n\nУровень уступок оппозиции составляет: §m[?DEN_opposition_concessions]§!\n\nКоличество взятых нами кредитов составляет: §Y[?DEN_economic_credits]§!\n§gЗа каждый экономический кредит, который мы сможем получить в конце фокусного древа, восстановление экономики будет происходить заметно быстрее. В качестве альтернативы, экономические кредиты в следующем списке могут быть потрачены на получение значительных бонусов.§!"
 DEN_recovery_preparedness: "Кабинет министров готов справиться с кризисом."
 DEN_pacifist_accord_category: "Разобраться с Пацифистским Соглашением"
 DEN_pacifist_accord_category_desc: "Питеру Мунку снова пришло время внести в парламент очередной законопроект о демилитаризации, и на этот раз он столкнулся с гораздо большим, чем просто легкое сопротивление и несогласие. [GetSecondInCommand] разработал целый план действий, чтобы убедить Питера Мунка не только отказаться от своих планов, но и убедить остальную часть правительства в том, что ремилитаризация должна состояться. Нейтралитет Дании на данный момент обеспечен, но его планы идут вразрез с идеей КФ-Венстре, поддержанной королем, о том, что Дании необходимо провести ремилитаризацию.\n\nПацифистское соглашение трещит по швам, несмотря ни на что, но мы можем ускорить этот процесс несколькими способами.\n\nВо-первых, мы можем пригласить маршала Приора на переговоры с Мунком и подчеркнуть необходимость армии в защите датской демократии и суверенитета.\n\nВо-вторых, Мунк может быть важным фактором нашей коалиции, но некоторые более серьезные угрозы, включая статус его должности и роль Радикале Венстре на важных постах в кабинете министров, могут убедить его согласиться. Однако этот шаг не будет пользоваться популярностью, и наша собственная популярность пострадает.\n\nИ, наконец, уступки Radikale Venstre в проведении реформ, которых они желают, будут иметь большое значение для обеспечения того, чтобы ремилитаризация прошла гладко. Если мы заплатим эту цену в краткосрочной перспективе, это принесет плоды нашим усилиям по ремилитаризации в долгосрочной перспективе."
 DEN_convincing_mission_1: "Первый этап ремилитаризации"
 DEN_convincing_mission_2: "Второй этап ремилитаризации"
 DEN_convincing_mission_3: "Финальный этап ремилитаризации"
 DEN_prior_munch_negotiations: "Переговоры с участием армии"
 DEN_prior_munch_negotiations_desc: "[GetSecondInCommand] начал переговоры с Мунком вместе с маршалом Приором, подчеркивая не только необходимость армии защищать демократию, но и необходимость того, чтобы Дания не впадала в крайности. Прайор подчеркнет, что главной целью армии является защита суверенитета Дании, и дальнейшая демилитаризация только расколет Данию на части, особенно если наша соседняя Германия уступит реваншистским силам с востока и запада."
 DEN_threaten_munch: "Пригрозить Мунку"
 DEN_threaten_munch_desc: "Переговоры зашли в тупик, и в связи с этим, возможно, нам следует напомнить Мунку о его должности министра иностранных дел и пригрозить уменьшить роль Радикале Венстре в кабинете министров, если он не согласится на какую-либо форму ремилитаризации. Требования такого уровня окажут дестабилизирующее воздействие на наше управление, но, зная гордость Мунка, он, скорее всего, не станет выполнять эти угрозы."
 DEN_required_party_pop_tt: "Более чем §Y2%§! поддержки [ROOT.GetRulingParty]"
 DEN_welfare_compromises: "Компромиссы касательно идеи благосостояния"
 DEN_welfare_compromises_desc: "Планы создания государства всеобщего благосостояния уже давно подвергаются критике за чрезмерные государственные расходы в секторах, с которыми Радикале Венстре не согласен. Если они перестанут беспокоиться о расходах и вместо этого перераспределят необходимые средства на усилия по ремилитаризации, у Питера Мунка не будет иного выбора, кроме как согласиться."
 DEN_social_spending: "Социальные затраты"
 DEN_social_spending_desc: "Мадсен-Мигдал и его позиция по социальным реформам, многие из которых пропагандировались во время пребывания Стаунинга на посту премьер-министра, противоречат взглядам как его самого, так и его партнера по коалиции на этот счет. Несмотря на это, Радикальные Венстре обеспечили нам большинство на последних выборах, и, возможно, внесение незначительных изменений в законы в определенных секторах смягчит его позицию в отношении активизации усилий по ремилитаризации."
 DEN_crisis_mission_category: "Урегулирование конституционного кризиса"
 DEN_crisis_mission_category_desc: "[DEN_GetConstitutionalCrisisDesc]\n\nНаш текущий уровень влияния: §G[?DEN_influence_power]§!\n\n§GЧтобы победить в этой решающей борьбе, наше правительство должно достичь более высоких результатов, чем §G10§! влияния.§!\n\n§WНаш текущий уровень коррупции: §R[?DEN_corrupt_token]§!\n\nМы должны быть осторожны, чтобы коррупция не вышла из-под контроля. Принятие слишком большого количества решений одновременно может обернуться катастрофой для нашего правительства, и король обратит на это внимание.§!\n§RЕсли наша коррупция достигнет§! §Y\"3 уровня\"§! §Rнаше правительство, скорее всего, не выживет.§!"
 DEN_crisis_resolution: "Урегулирование кризиса"
 DEN_crisis_resolution_desc: "Чтобы защитить будущее и благополучие демократии в Дании, мы должны сделать все возможное для продвижения нашей повестки дня!"
 DEN_freedom_crisis_category: "Кризис датской свободы"
 DEN_naval_research_category: "Военно-морской исследовательский институт"
 DEN_naval_research_category_desc: "Военно-морской научно-исследовательский институт будет способствовать исследованиям в области различных технологий, которые улучшат наши корабли, но это потребует времени и инвестиций. Выполняя задания в военно-морской ветви древа военных наук, мы можем получать кредиты, которые можно потратить на бонусы за исследования.\n\nФинансирование военно-морского института: [?DEN_naval_credits]"
