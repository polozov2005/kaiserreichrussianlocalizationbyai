 DEN_tt_reunite_liberals: "Этот фокус определит, сохранит ли Дания статус-кво или, возможно, проведет переговоры о восстановлении §YОбьединенных Венстре.§!\n§GСудьба датского либерализма решается.§!"
 DEN_tt_restore_democracy_focus: "Это событие определит статус нашего правления и то, будет ли восстановлена демократия или нет."
 DEN_tt_restore_democracy: "Ограниченные выборы между партиями, одобренными королем, будут проведены в течении §Gодного месяца!§!"
 DEN_tt_soclib_anger: "Реализация §Rболее трех из пяти§! планов Стаунинга приведут к разрушению нашей коалиции со стороны §lрадикальных Венстре§!."
