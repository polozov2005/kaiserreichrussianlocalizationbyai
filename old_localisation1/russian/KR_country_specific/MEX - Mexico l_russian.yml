### Decisions ###
 MEX_central_american_intervention: "Интервенция в Центральную Америку"
 MEX_central_american_intervention_desc: "Мексика имеет некоторые интересы в Центральной Америке. Стоит обратить некоторое внимание на планы по вмешательству в регион ради выгоды нашей страны." 
 MEX_support_socialists: "Поддержать наших [From.GetAdjective]из союзников"
 MEX_fight_reactionary_central_america: "Принести Революцию в Центральную Америку"
 MEX_retake_yucatan_mission: "Возвращение Юкатана"
 MEX_retake_yucatan_mission_desc: "Предатели и повстанцы поднялись с оружием в Юкатане. Нужно уничтожить их."
 MEX_claim_central_america: "Заявить о претензиях на Центральную Америку"
 
 MEX_reconquista_decisons: "Мексиканская Реконкиста"
 MEX_reconquista_decisons_descions: "Мексика должна вернуть свои земли, украденные гринго в 1848 году."
 MEX_reconquista_decision: "Отмена договора Гваделупе-Идальго"
 MEX_reconquista_complete_decision: "Закрепить границы до 1848-го года"

 MEX_join_international: "Вступить в Интернационал"
 MEX_join_international_desc: "Мы должны вступить в Интернационал и занять свое место в мировой борьбе за социализм."
 MEX_join_entente: "Вступить в Антанту"
 MEX_join_entente_desc: "У нас и у Антанты схожие стратегические интересы. Вступление в их военный союз будет весьма выгодно для нашей страны."
 MEX_intervene_csa: "Вмешательство в Гражданскую войну"
 MEX_intervene_csa_desc: "Наши союзники в Американской Гражданской войне проигрывают. Если мы не начнем действовать - мы можем столкнуться с единым и враждебным Американским государством у своих границ лицом к лицу. Время вмешаться - мы немедленно свяжемся с нашими Американскими союзникам и объявим о своем участии в конфликте."

 MEX_economic_decisions: "Экономические решения"
 MEX_nationalize_oil: "Национализировать нефтяную промышленность"
 MEX_nationalize_oil_desc: "Мы должны национализировать нефтяную промышленность, что позволит взять контроль над ней в наши руки и использовать это во благо Мексики и ее жителей."
 
 MEX_restore_order: "Навести порядок в [From.GetName]"
 
 MEX_cristero_war: "Восстание Кристерос"
 MEX_cristero_war_desc: "Повстанцы-католики начали войну против Правительства и наших законов чтобы установить свои порядки. Их нужно остановить как можно быстрее, чтобы они не нарушали мир и процветание Мексики."
 MEX_cristero_raid_mission: "Рейды Кристерос"
 
 MEX_campesinos_war: "Восстание Кампесинос"
 MEX_campesinos_war_desc: "Повстанцы-анархисты начали войну против Правительства и наших законов чтобы установить свои порядки. Их нужно остановить как можно быстрее, чтобы они не нарушали мир и процветание Мексики."
 MEX_campesinos_raid_mission: "Рейды Кампесинос"

### Focuses ###

## Totalist ##
 MEX_establish_maximato: "Установить 'Maximato'"
 MEX_establish_maximato_desc: "Плутарко Элиас Кальес, с помощью Конфедерации Мексиканских Рабочих, смог стать президентом. Он искренне считает, что лучший путь для Мексики - это набор реформ по превращению страны в истинно революционное государство. Он прозвал это 'Maximato'."
 
 MEX_new_economic_policy: "Nueva Política Económica"
 MEX_new_economic_policy_desc: "Экономическая политика Мексики мало изменилась за последнее десятилетие. Хватит это терпеть! Кальес принял решение поднять нашу экономику на новые, революционные высоты."
 MEX_peoples_factories: "Народные фабрики"
 MEX_peoples_factories_desc: "Со времен Революции в нашей стране установилась смешанная экономика, позволяя частное владение заводами, но устанавливающая определенные ограничения владельцам и права рабочим. Однако Кальес считает такое положение дел развращающим дело Революции и принял решение о начале коллективизации промышленности, чтобы позволить народу полностью распоряжаться плодами своего труда."
 MEX_peoples_mines: "Народные шахты"
 MEX_peoples_mines_desc: "Наши шахты по большей части в частных руках, как это было с нашей промышленностью. Иностранные капиталисты больше не будут получать выгоду от эксплуатации наших рабочих - мы начинаем коллективизацию нашей добывающей промышленности."
 MEX_control_ejidos: "Контроль над Эхидос"
 MEX_control_ejidos_desc: "Эхидос по определению коллективная система управления сельским хозяйством, но все они работают независимо, с целями, которые могут отличаться от удовлетворяющих всех мексиканцев. Мы должны подвести все Эхидос Мексики под руку государства для координации их труда во благо страны."
 MEX_support_crom: "Поддержка КМР"
 MEX_support_crom_desc: "'Конфедерация Мексиканских Рабочих' долгое время была союзником Кальеса. Мы должны наградить их за лояльность и объявить об официальной государственной поддержке в их борьбе против ГКР (Главной Конфедерации Рабочих). В ГКР полно наших противников, и с этого мы получим лишь выгоду."
 MEX_enforce_article_27: "Использовать статью 27"
 MEX_enforce_article_27_desc: "27 статья Мексиканской Конституции гласит, что собственность и воды внутри границ государства являются собственностью страны, и что страна имеет право диктовать условия частным владельцам во благо Народа. Нам стоит, имея такое оправдание, окончательно национализировать нефтедобычу в стране у иностранных угнетателей."
 
 MEX_calles_laws: "Законы Кальеса"
 MEX_calles_laws_desc: "Теперь "Закон о верованиях" официально вступил в силу. Его задачей являются контроль и ограничения католического влияния в Мексике. Закон снизит количество жрецов до одного на каждые шесть тысяч граждан, введет необходимость государственной лицензии и регистрации в местных органах для проведения проповедей."
 MEX_socialist_education: "Социалистическое образование"
 MEX_socialist_education_desc: "В Мексике все еще сохраняется практически не изменившаяся дореволюционная система образования. Кальесу не нравится такое положение вещей, и он приказал разработать план широкомасштабной модернизации нашей системы образования."
 MEX_state_atheism: "Государственный атеизм"
 MEX_state_atheism_desc: "Мексика больше не будет терпеть это реакционное духовенство! Мы должны забрать у них гражданские права, включая право участвовать в суде присяжных, запретить враждебные нам религиозные объединения и продолжить движение по пути создания истинно атеистического государства."
 
 MEX_strengthen_the_presidency: "Усиление Президента"
 MEX_strengthen_the_presidency_desc: "Президент в Мексике не особо отличается от Президентов других демократий. Когда нам требовалось управлять небольшими коалициями и принимать досадные компромиссы это было преимуществом. Однако же, Кальес реформист, и ему нужна вся власть, которую он может взять, для проведения реформ. Первым шагом на этом пути будет расширение исполнительных прав Президента."
 MEX_loyal_military: "Верная армия"
 MEX_loyal_military_desc: "Одной из причин успеха нашей Революции была нелояльность военных, часть из которых переметнулась на нашу сторону. Тогда это было лишь на пользу, но теперь такой порядок вещей может быть лишь угрозой нашей стабильности. Нам стоит поощрять и награждать офицеров за верность нашему правительству и, если необходимо, карать оступившихся от верного пути."
 MEX_direccion_federal_de_seguridad: "Dirección Federal de Seguridad"
 MEX_direccion_federal_de_seguridad_desc: "Хотя сейчас армия в целом верна нам, необходимо создать что-то, что будет служить предохранителем на случай смены настроя и попытки свергнуть правительство. Для этого будут созданы парамилитаристские силы, 'Dirección Federal de Seguridad', притом командовать ими будет напрямую Президент."
 MEX_lead_the_pnr: "Возглавить НРП"
 MEX_lead_the_pnr_desc: "'Partido Nacional Revolucionario' (Национальная Революционная Партия) сейчас поддерживает Кальеса. Однако Кальес не возглавляет НРП, что приводит к трениям между ним и другими влиятельными фигурами в партии. Чтобы избавиться от этой проблемы, Кальес должен стать главой этой партии. В конце концов, он и так глава государства, и нет причин, почему он не мог бы возглавить правящую вместе с ним партию."
 MEX_political_officers: "Политические офицеры"
 MEX_political_officers_desc: "Теперь, когда наше поглощение завершено, мы должны обеспечить лояльность армии. Даже если войска и офицеры заверяют нас в своей лояльности, нам нужен орган, который будет держать их под контролем на случай, если они передумают, когда мы ослабим свою бдительность..."
 
 MEX_control_congress: "Контроль над Конгрессом"
 MEX_control_congress_desc: "Конгресс в нашей стране нацелен на представление интересов народа. Однако фракционность и мелкие ссоры лишь мешают проведению необходимых реформ. Мы должны взять контроль над конгрессом и помочь им 'разобраться' в своих трениях, чтобы они пропустили наши реформы без лишних проблем."
 MEX_cult_of_personality: "Культ личности"
 MEX_cult_of_personality_desc: "Кальес укрепил свою позицию и стал бесспорным лидером Мексики. Его роль в развитии страны невозможно преувеличить, и он заслуживает награды за свою мудрость и стремление к возвышению Мексики. Мы начнем массовую пропагандистскую кампанию для дополнительного укрепления образа этого великого человека."
 MEX_purge_reactionary_thought: "Чистка реакционного мышления"
 MEX_purge_reactionary_thought_desc: "Прогресс нашей страны замедлен из-за традиционалистской и реакционной культуры населения. Теперь, когда мы преуспели в превращении Мексики в более современное и коллективистское общество, нам нужно сосредоточиться на культуре наших потомков, чтобы реакционные силы не смогли остановить прогресс будущего."
 MEX_la_dictadura_perfecta: "Идеальная диктатура"
 MEX_la_dictadura_perfecta_desc: "Кальес достигла того, что когда-то казалось невозможным: Диктатура, которую не только терпят в народе, но даже любят простые люди. Кальес медленно, но верно превращается в национальную фигуру, которая неизбежно будет записана в книгах по истории как революционный реформист..."

## Republic Survives ##
 MEX_revolutionary_democracy_survives: "Революционная демократия уцелела"
 MEX_revolutionary_democracy_survives_desc: "Несмотря на прошедшие события, наша демократия пережила этот шторм! Настало время выбрать, кто же поведет нашу страну к светлому (или не очень?) будущему в следующие пять лет. И это..."
 MEX_stable_democracy: "Стабильная демократия"
 MEX_stable_democracy_desc: "Наше правительство с гордостью объявляет об окончании реформ! Умом и силой мы стабилизировали обстановку в нашем обществе и обошли угрозу попытки переворота реакционной частью наших граждан. Viva Mexico!"

# Syndicalist #
 MEX_partido_mexicano_de_los_trabajadores: "Partido Mexicano de los Trabajadores"
 MEX_partido_mexicano_de_los_trabajadores_desc: "'Мексиканская Рабочая Партия' победила на выборах и Висенте Толедано был выбран президентом страны. Его обещания прогрессивных и индустриалистских реформ покорили население! Теперь настало время выполнять обещания."
 MEX_union_laws: "Ley Federal de Trabajo"
 MEX_union_laws_desc: "Сейчас в Мексике действуют старые законы о труде и рабочих условиях. Необходимо принять 'Федеральный Трудовой Закон', который определит права рабочих на производстве, условия, которые будут обеспечивать компании своим рабочим и роль государства, как посредника, если эти условия не выполняются."
 MEX_urbanisation: "Программа урбанизации"
 MEX_urbanisation_desc: "Экономический рост в нашей стране в последние годы сконцентрировал большую часть активности в городах, что привело к росту их населения до той точки, где они уже не способны вместить больше людей без падения уровня услуг и социального обеспечения. Нам необходимо начать программу урбанизации для ликвидации этой проблемы и повышения качества жизни."
 MEX_infrastructure_act: "Инфраструктурные задачи"
 MEX_infrastructure_act_desc: "В Мексике очень гористая земля, что делает невыгодным частные усилия по улучшению государственной инфраструктуры. Значит, нам придется использовать силы государства для развития логистики страны. Никто не сделает этого за нас."
 MEX_federalism: "Федерализм"
 MEX_federalism_desc: "Мексика уже некоторое время федеративное государство с несколькими штатами. Однако, большинство из них напрямую управляются из центрального аппарата, что привело к развитию весьма неэффективной бюрократии. Нам нужно принять меры по реорганизации этой системы и укреплению отдельных штатов."
 MEX_strengthen_teachers_unions: "Укрепить профсоюзы учителей"
 MEX_strengthen_teachers_unions_desc: "Профсоюзы учителей борются за увеличение трат на образование с 1919 года. Учитывая, сколько произошло перемен в администрации, будет честно, если мы выполним их требования и повысим расходы."
 MEX_empower_unions: "Дать власти профсоюзам"
 MEX_empower_unions_desc: "Профсоюзы нашей страны продолжают борьбу за права рабочих на государственном уровне. Нам стоит дать им больше прав и ответственности. Также им не помешает большая самостоятельность, чтобы облегчить их борьбу."
 MEX_industrial_democracy: "Промышленная демократия"
 MEX_industrial_democracy_desc: "Мексиканское общество долгое время развивалось в условиях сельского хозяйства и сельского образа жизни. Однако. если мы действительно хотим вступить в современную эпоху и внедрить новшества, которые наши европейские братья создали для социализма, мы должны начать путь к индустриальному обществу."
 MEX_agricultural_unions: "Аграрные профсоюзы"
 MEX_agricultural_unions_desc: "Наши реформы идут полным ходом. Нужно воспользоваться моментом и создать Сельскохозяйственный Профсоюз, 'Confederación Nacional Campesina', что поможет защитить права фермеров в нашей стране."
 MEX_empower_the_cgt: "Поддержка ГКР"
 MEX_empower_the_cgt_desc: "'Confederación General de Trabajadores'  (Главная Конфедерация Рабочих) долгое время  поддерживала Толедано и 'Partido Mexicano de los Trabajadores'. Мы должны наградить их за верность, дав им официальную государственную поддержку в борьбе против КМР. КМР выступает за Кальеса и Тоталистов, поэтому это нам выгодно."
 MEX_modernist_culture: "Модернистская культура"
 MEX_modernist_culture_desc: "Нам необходимо раз и навсегда вырвать традиционные корни для всеобъемлющего охвата Мексики объятиями прогресса и новых идей. Нам нужно принести в страну Модернистскую культуру, чтобы в один прекрасный день понять, что у нас новые, прогрессивные традиции."
 MEX_mexican_syndicalism: "Мексиканский синдикализм"
 MEX_mexican_syndicalism_desc: "Синдикализм сам по себе весьма хорош, но он был создан в условиях Западно-Европейской культуры, и может плохо работать в некоторых моментах в странах вне Старого Мира. Однако мы заранее обнаружили эти ошибки в теории и можем исправить их на практике, создав при этом свой вариант синдикализма."

# RadSoc #
 MEX_partido_nacional_Agrarista: "Partido Nacional Agrarista"
 MEX_partido_nacional_Agrarista: "В выборах победила 'Народная Аграрная Партия' во главе с легендарным Хосе Доротео Аранго Арамбула, более известным как Франсиско Панчо Вилья. В своей инаугурационной речи он сказал: 'Я, Панчо Вилья, человек, которого сама судьба велела сражаться за благо бедняков, и я никогда не предам и не забуду свой долг'. Теперь настало время привести эту клятву в действие."
 MEX_continue_land_reforms: "Продолжить земельные реформы"
 MEX_continue_land_reforms_desc: "Земельные реформы полным ходом идут еще с избрания Сапаты в 1932 году. Тем не менее, до конца еще далеко, и нам нужно продолжать работу. Как сказал Сапата 'Земля должна принадлежать тем, кто работает на ней своими руками'."
 MEX_native_land_reform: "Земельные реформы и аборигены"
 MEX_native_land_reform_desc: "Аборигены не всегда включались в программы земельной реформы. Нужно это исправить, чтобы все в Мексике могли надеяться на лучшую жизнь!"
 MEX_support_cgt: "Поддержка ГКР"
 MEX_support_cgt_desc: "Члены 'Confederacion General de Trabajadores' в большинстве своем на стороне МРП, но в их рядах есть сторонники нашей партии, и им мы доверяем больше, чем КМР, которая поддерживает Кальеса и Тоталистов. Логично будет поддержать наших сторонников, что мы и сделаем."
 MEX_agrarian_economy: "Аграрная экономика"
 MEX_agrarian_economy: "Долгое время Мексика была сельскохозяйственной страной. Отступление от этих традиций может быть рискованным, поэтому мы пока оставим то, что уже работает - нашу аграрную экономику."
 MEX_rural_education: "Сельское образование"
 MEX_rural_education_desc: "Как-то раз Вилья сказал: 'Никто не может сделать хорошо то, в чем он не разбирается. Более того, не может быть республики с невежественными людьми, какой бы план вы не пытались выполнить'. Теперь, став Президентом, он взял дело в свои руки и предложил амбициозную программу по финансированию сельского образования. Стоит поддержать эту идею, которую он прокомментировал словами 'Первым делом я заплачу учителю, а не генералу'."
 MEX_empower_ejidos: "Усиление Эхидос"
 MEX_empower_ejidos_desc: "Мексиканские Эхидос всегда были революционной системой, и стоит поддержать их работу и расширить права и обязанности, дополнительно к этому выделив им дополнительные средства."
 MEX_agricultural_modernization: "Модернизация сельского хозяйства"
 MEX_agricultural_modernization_desc: "Хотя мы и сельскохозяйственная страна, это не значит, что мы должны плестись в хвосте технологического развития. Многие из наших крестьян все еще работают на полях с устаревшими инструментами, что лишь замедляет и усложняет их работу. Мы должны помочь им и начать национальную программу по обновлению сельскохозяйственного снаряжения и техники, чтобы упростить работу, а, следовательно, и жизнь, нашим крестьянам."
 MEX_feed_the_people: "Накормить Народ"
 MEX_feed_the_people_desc: "Мексика не самая богатая страна, и многие из наших горожан все еще страдают от дефицита продовольствия в некоторых городах. Вилья не забыл свой долг этим бедным крестьянам и рабочим, и предложил начать государственную программу по обеспечению каждого жителя страны базовым продовольственным пайком, чтобы больше никто из них не столкнулся с голодом."
 MEX_agrian_socialism: "Аграрный социализм"
 MEX_agrian_socialism_desc: "Социализм с самого зарождения был движением рабочих и рабочего класса, которое считало крестьян союзниками, но никак не равными. Мексиканская демократия показала, что крестьянство может быть революционерами, и поэтому мы зажигаем маяк нового типа социализма навстречу нашим европейским братьям."
 MEX_empower_the_peasents: "Крестьянские полномочия"
 MEX_empower_the_peasents_desc: "Крестьяне с самого основания Мексики были самым угнетаемым классом, но, когда их герой пришел ко власти, он даст им возможности и права на улучшение жизни, как и честное представление в правительстве."
 MEX_tierra_y_libertad: "Tierra y Libertad"
 MEX_tierra_y_libertad_desc: "'Земля и Свобода'. Эти слова изначально сказал мексиканский анархист Рикардо Флорес Магон, и затем подхватил Эмилиано Сапата. Сапата больше не глава страны, но идеалы этой фразы должны быть гарантированы нашему народу доступной для труда землей и свободой жить как им удобно."

# SocDem #
 MEX_partido_laborista_mexicano: "Partido Laborista Mexicano"
 MEX_partido_laborista_mexicano: "В выборах победила 'Лабористская Партия Мексики' во главе с Паскуалем Ортисом Рубио. Народ пошел за ними на обещания о возвращении умеренных реформ Де Ла Уэрта и Обрегона. Теперь их очередь вести Мексику к светлому будущему."
 MEX_improve_workers_rights: "Дать права рабочим"
 MEX_improve_workers_rights_desc: "Мы должны запустить последовательность реформ для расширения и углубления прав рабочего класса и, впоследствии, улучшения общего уровня жизни в стране."
 MEX_improve_native_rights: "Дать права аборигенам"
 MEX_improve_native_rights_desc: "Местных жителей в нашей стране не считают достойными внимания еще с обретения независимости. Нужно исправить эту ошибку -  расширить их права, дать им большую автономию и позволить изучать родной язык в официальных школах."
 MEX_education_funding: "Выделить деньги на образование"
 MEX_education_funding_desc: "В Мексике затраты на образование всегда были на третьих ролях. Но теперь мы во власти и нам необходимо выделить на это больше денег ради лучшей Мексики."
 MEX_moderate_land_reform: "Умеренная земельная реформа"
 MEX_moderate_land_reform_desc: "Многие были рады земельной реформе Сапаты, но он отобрал некоторые земли у мелких землевладельцев, живших и трудящихся плечом к плечу со своими рабочими. Это не лучшее решение, хотя и реформы также необходимы. Мы продолжим их проведение, но дадим живущим и трудящимся на своей земле людям право оставить свою территорию."
 MEX_union_support: "Поддержка профсоюзов"
 MEX_union_support_desc: "Без поддержки Профсоюзов большинство наших реформ пройдут лишь символически. Нам нужно много сторонников и из ГКР, и из КМР. Это поможет нам провести реформы реально, а не на словах."
 MEX_industrialisation: "Индустриализация"
 MEX_industrialisation_desc: "Мексика долгое время была сельскохозяйственной страной, чем и обусловлено наше отставание от множества других стран мира. Нам необходимо запустить программу индустриализации для роста нашего экономического богатства и твердого фундамента для развития страны."
 MEX_promote_trade: "Укрепление торговли"
 MEX_promote_trade_desc: "С давних времен процветание и развитие тесно связаны с торговлей и торговыми путями. Понимая этот факт, мы должны поддерживать как импорт, так и экспорт товаров в стране, держа в уме нужды Мексики."
 MEX_new_schools: "Новые школы"
 MEX_new_schools_desc: "Мы повысили расходы на образование, но проблему грамотности нельзя решить просто, забросав ее деньгами. Многие небольшие городки в стране обеспечены учителями, которые вынуждены работать в неподходящих зданиях и даже просто на свежем воздухе. Это нужно исправить, для чего будут выделены средства на строительство новых школ по всей Мексике."
 MEX_mexican_socialism: "Мексиканский социализм"
 MEX_mexican_socialism_desc: "Мексиканское общество весьма сложно, есть множество и прогрессивных, и консервативных городков, жители которых хотят помочь друг другу, но обе стороны боятся, что другая сторона хочет подавить их. Как результат, у нас нет 'Классовой борьбы' социалистов Европы. Понимая это, мы должны работать над созданием собственного варианта социализма, который сможет приспособиться к реалиям Мексики."
 MEX_strengthen_congress: "Усиленный Конгресс"
 MEX_strengthen_congress_desc: "Последнее время в основном всю работу делал Президент. Но если мы действительно хотим стать современным демократическим государством, нам нужно создать работающий Конгресс представителей, который обеспечит такие перемены, какие хочет народ. Дополнительно, Конгресс нужно усилить, чтобы наша новорожденная демократия работала во благо страны."
 MEX_pan_y_rosas: "Pan y Rosas"
 MEX_pan_y_rosas_desc: "Нашим девизом должны стать 'Хлеб и Розы', ведь наша работа состоит в обеспечении народа справедливыми законами, хорошими условиями жизни и истинной свободой, при которой было бы хорошо жить каждому."

## Military Junta ##
 MEX_military_coup: "Военный переворот"
 MEX_military_coup_desc: "Многие фракции начали борьбу за власть вскоре после смерти Сапаты. Перестрелки на улицах, заказные убийства и крах социальной сплочённости - новые серьезные проблемы в Мексике. Чтобы защитить страну и ее граждан, а также восстановить стабильность, военные задумали переворот."
 MEX_military_junta: "Военная хунта"
 MEX_military_junta_desc: "Военная Хунта должна вернуть вытащить страну из канавы. Многие в стране будут против нашей власти, но вместе с Националистической Партией Мексики мы выстоим последующую бурю."
 
 MEX_privitisation: "Приватизация"
 MEX_privitisation_desc: "Государство имеет огромное влияние на экономику, владеет фабриками и фермами, далеко не всегда прибыльными, что ведет Мексику к крупному дефициту бюджета. На нужно начать приватизацию, чтобы избавиться от висящей мертвым грузом на нашем бюджете собственности и иметь возможность провести новые экономические реформы."
 MEX_encourage_foreign_investments: "Привлечение иностранных вложений"
 MEX_encourage_foreign_investments_desc: "Мексика крупная страна, с множеством возможностей для новых мелких предпринимателей, которые могут вырасти в крепкие и мощные компании. Нам нужны некоторые торговые льготы, которые побудят иностранные фирмы создать свои представительства в стране."
 MEX_free_market: "Свободный рынок"
 MEX_free_market_desc: "Если мы хотим экономически процветающую Мексику - нам нужен Рынок! Нам стоит снизить пошлины, которые старые режимы ввели в стране, что также поможет небольшим предпринимателям расти и приносить выгоду нашей стране."
 MEX_economic_development: "Поддержка развития экономики"
 MEX_economic_development_desc: "Прошлые правительства слишком увлеклись правами рабочих и забыли о предпринимателях, которые могут не быть рабочими. Нужно привлечь новый бизнес в Мексику, и не забыть о старом, который покинул страну после революции. Все для нашего экономического роста."

# Junta stays #
 MEX_junta_holds_on: "Хунта остается у власти"
 MEX_junta_holds_on_desc: "Несмотря на давление левых паразитов нашего общества, мы удержались и сплотились во власти. Серия реформ поможет нам укрепиться и набрать новых сторонников."
 MEX_ban_unions: "Запрет профсоюзов"
 MEX_ban_unions_desc: "Профсоюзы сейчас последний пережиток власти старых революционеров в нашем обществе. Тем самым, они представляют собою угрозу нашему правительству. Необходимо запретить Профсоюзы и противодействовать их активности, что укрепит нашу власть."
 MEX_rewrite_history: "Переписать историю"
 MEX_rewrite_history_desc: "Наши учебники истории изображают старый Порфириат как злобный, репрессивный режим диктатора Порфирио Диаса.  Нельзя терпеть такое искажение истории! Мы должны провести ревизию нашего прошлого, чтобы выставить Порфириат в хорошем свете в новых учебниках. Новое поколение будет ценить Мексику, которую мы потеряли."
 MEX_traditional_values: "Традиционные ценности"
 MEX_traditional_values_desc: "Наши приверженцы происходят из разочарованных граждан, которых вынудили принять разрушающие Мексиканскую культуру прогрессивные реформы. Нужно наградить их за верность и проследить за тем, чтобы традиционные ценности активно представлялись в нашей администрации и законодательной системе."
 MEX_end_anti_catholic_laws: "Отмена антикатолических законов"
 MEX_end_anti_catholic_laws_desc: "После революции, секуляристы и атеистические революционеры сместили Католическую Церковь на второй план, несмотря на то, что та была одной из крупнейших сил Мексики. Мы точно получим поддержку Католиков если те законы будут отменены, а церковь обретет былое влияние."
 MEX_great_ranches: "Великие ранчо"
 MEX_great_ranches_desc: "Великие Ранчо Мексики - это группа землевладельцев, держащих в руках крупные территории, на которых выращиваются растения или пасутся стада. Они действительно крупная сила внутри страны, и, помня о действиях Сапаты по ослаблению их влияния в последние годы, они поддержат правительство, которое оставит их в покое. Более того, поддержка таких людей укрепит наше влияние в стране."
 MEX_military_youth: "Юность в сапогах"
 MEX_military_youth_desc: "Многие недовольные из числа молодежи в прошлом сражались на стороне повстанцев, именно поэтому революция была так популярна у молодого поколения. Мы видим эту критичную ошибку в нашей системе, и новое видение жизни у таких людей будет коваться в Молодежные Военных Лагерях, финансируемых правительством, в которых молодежь будет учиться Мексиканским ценностям и персональной ответственности."
 MEX_purge_reds: "Чистка левых"
 MEX_purge_reds_desc: "После революции армия пропиталась офицерами левых взглядов, чье влияние теперь может угрожать нашей власти. Нужно начать полномасштабную чистку таких людей в вооруженных силах, и мы сможем быть уверены, что не получим нож в спину от казалось-бы своих."
 MEX_zealous_military: "Верная армия"
 MEX_zealous_military: "После Чистки в нашей армии остались только закаленные, патриотичные офицеры и солдаты, которые сделают все необходимое для защиты светлого будущего нашей страны. Viva Mexico!"
 MEX_la_patria_es_primero: "La Patria es Primero"
 MEX_la_patria_es_primero_desc: "В те времена, когда наша независимость стояла на кону, в горах Герреро Национальный Герой Висенте Герреро сражался со своим повстанческим движением против контратак испанцев.  Вице-король Хуан Руис де Аподака отправил отца Герреро, Педро, с обещанием индульгенции в обмен на капитуляцию. Несмотря на любовь и уважение к своему отцу, Висенте отказался, и затем произнес речь перед своими бойцами, которая закончилась словами 'Я всегда уважал своего отца... но наша родина превыше всего!'. Его дух вдохновляет нас по сей день, а эта фраза должна стать нашим девизом."

# Democratic #
 MEX_restore_democracy: "Восстановление демократии"
 MEX_restore_democracy: "Националистическая Партия Мексики непрерывно росла при нашей власти и вскоре потребовала восстановления демократии в стране. Мы решили прислушаться к этому, но введя некоторые небольшие ограничения радикально-левым партиям."
 MEX_limited_liberties: "Ограниченные свободы"
 MEX_limited_liberties_desc: "Мы пообещали восстановить демократию, значит, придется начать восстановление некоторых свобод, отозванных при нашем взятии власти. Не все гражданские права вновь войдут в действие из-за нашей продолжающейся борьбы с социалистическим сопротивлением, но некоторые вернутся и удовлетворят большую часть граждан."
 MEX_election_monitoring: "Слежка на выборах"
 MEX_election_monitoring_desc: "Выборы на носу, и мы не можем позволить социалистам, которые уже едва не привели нашу страну к краху, вернуться к власти. Мы должны тщательно мониторить выборы и при появлении любых подозрительных одиночек или организация немедленно исключать их. Не стоит рисковать..."
 MEX_new_constitution: "Новая Конституция"
 MEX_new_constitution_desc: "Старая Мексиканская Конституция не удовлетворяет наше правительство и имеет множество устаревших статей. Нам нужно создать новую конституцию для исправления ошибок старой, и добавить в нее новые статьи, защищающие демократию Мексики от экстремистов поныне и навсегда."
 MEX_education_programmes: "Образовательная программа"
 MEX_education_programmes_desc: "Мексика страна с низким уровнем образованности, что играло на руку социалистическим движениям, обещавшим обучить народ. Мы должны ослабить их влияние запустив национальные образовательные программы. Это и без того логичный ход - нам нужно образованное население для развития страны и ее общества."
 MEX_support_the_church: "Поддержка Церкви"
 MEX_support_the_church_desc: "Прогрессивные правительства во время Революции сместили Церковь на обочину, принудительно ограничив ее влияние в нашем традиционно консервативном обществе.  Мы выступаем за светское государство и не можем вводить антицерковные законы прошлых прогрессивных правительств. Значит, мы начнем поддержку Церкви, чтобы эксплуатировать ее влияние в стране, при этом не теряя нашу позицию светского государства."
 MEX_the_revolutions_legacy: "Наследие Революции"
 MEX_the_revolutions_legacy_desc: "Для большинства Мексиканцев Революция - чувствительная тема. Многие согласны с тем, что это был необходимый шаг вперед, но также она создала и вскрыла глубокие проблемы в нашем обществе. Мы не можем исправить всего, но нужно сделать все возможное, чтобы охладить бурления и навсегда убрать угрозу подобных событий в будущем."
 MEX_military_support: "Поддержка военных"
 MEX_military_support_desc: "Армия согласна оставаться на вторых ролях пока мы доказываем делом, что желаем лишь лучшего для Мексики и ее народа. Их влияние на страну и население ясно без вопросов, и поэтому их поддержка весьма важна для сохранения Мексики демократическим государством. Нужно удовлетворить потребности армии в обмен на поддержку военных."
 MEX_liga_nacional_defensora_de_la_libertad_religiosa: "Liga Nacional Defensora de la Libertad Religiosa"
 MEX_liga_nacional_defensora_de_la_libertad_religiosa_desc: "Антирелигиозные законы, продвигавшиеся прошлыми правительствами, сделали наших богобоязненных католиков весьма недоверчивыми к правительству, что привело к созданию 'Национальной Лиги Защиты Религиозных Свобод'. Они требуют свободы обучения и равных прав для католиков, католических рабочих и самой церкви. Чтобы завоевать их поддержку мы просто... дадим именно то, что они хотят."
 MEX_equidad_en_la_justicia: "Equidad en la Justicia"
 MEX_equidad_en_la_justicia_desc: "Когда наша страна была еще молода, австрийский принц Фердинанд Максимилиан Иосиф фон Габсбург Мексиканский увлекся нашей страной. Принц-либерал защищал многие из наших сегодняшних идеалов, а его неудачная казнь в руках правительства Бенито Хуареса, несмотря на просьбы о помиловании таких великих людей как Виктор Гюго и Джузеппе Гарибальди, стала несмываемым преступлением нашего народа. Для искупления нашего правительства, одна из его из самых известных цитат станет нашим лозунгом: 'Бог и ваше доверие - вот моя сила; павильон независимости - вот мой символ; мою валюту вы тоже знаете - 'справедливость в правосудии'; я останусь верным вам всю мою жизнь'."

# Sinarquist Coup #
 MEX_synarchist_coup: "Синархистский переворот"
 MEX_synarchist_coup_desc: "Видя слабость Хунты, Народная Сила и ее парамилитарное крыло Золотых Рубашек начали действовать среди членов армии, надеясь на захват аппарата власти и объявление Новой Мексики"
 
 MEX_establish_corporatism: "Установить корпоративизм"
 MEX_establish_corporatism_desc: "Для нашей страны единственный путь вперед лежит через установление корпоративистского лобби, где мы будем 'советовать' нашей лояльной местной элите создание новых предприятий, необходимых для развития страны."
 MEX_capitalist_alliance: "Союз с капиталистами"
 MEX_capitalist_alliance_desc: "Революционные правительства ограничивали наших Капиталистов, и теперь они поддержат любого, кто будет представлять их интересы. Мы должны этим воспользоваться и гарантировать союз с ними для укрепления нашей власти."
 MEX_outlaw_strikes: "Запрет забастовок"
 MEX_outlaw_strikes_desc: "С нашей стороны договора с капиталистами, мы должны гарантировать, что их предприятия будут работать как хорошо смазанные и заведенные часы, хотя принятые в последнее время законы о правах рабочих мешают нашим действиям. Мы запретим забастовки, и заводы смогут работать так, как им удобно, без сопротивления этих надоедливых социалистов."
 MEX_control_unions: "Контроль над профсоюзами"
 MEX_control_unions_desc: "Чтобы помочь Мексике стабилизироваться и удовлетворить потребности экономики и государства нам необходимо начать забирать контроль над Профсоюзами страны. Нам нужно, чтобы различные боссы и лидеры этих объединений работали на наши нужды. Эти Чаррос (Мексиканский аналог) хорошо нам послужат."
 MEX_protect_our_industry: "Защита промышленности"
 MEX_protect_our_industry_desc: "Мексиканская промышленность еще в пеленках и не может выстоять против иностранных фирм. Мы должны ввести налоги на иностранные продукты и ресурсы для защиты нашей экономики от зарубежных попыток свести нас с рельс к величию."
 MEX_nationalise_industry: "Национализация промышленности"
 MEX_nationalise_industry_desc: "Теперь, когда власть в наших руках, мы должны сосредоточиться на укреплении Мексиканской казны, и очевидным способом станет национализация некоторых предприятий и прямой поток их доходов в бюджет."
 
 MEX_supremo_poder_ejecutivo: "Supremo Poder Ejecutivo"
 MEX_supremo_poder_ejecutivo_desc: "В прошлом, власть в стране была децентрализована в бессмысленных попытках избежать автократии. Это и привело к тому хаосу прошлого, и так как мы не согласны с теми идеалами, эти законы будут отменены, а взамен будет введена Высшая Исполнительная Власть."
 MEX_state_catholicism: "Государственный католицизм"
 MEX_state_catholicism_desc: "'Революционные' правительства атаковали и осквернили Католическую Церковь. Но не теперь. Католическая Церковь должна быть не просто государственной религией, но еще и частью правительства. Мы поддержим Церковь, она поддержит нас, а народ будет нам за это благодарен."
 MEX_hispanidad: "Hispanidad"
 MEX_hispanidad_desc: "Hispanidad - это вера в то, что Испанская раса превосходит все прочие. На самом деле, мы истинно верим в эти идеалы. Чтобы продвигать эту идею буду внедрены несколько новых законов, включая строгие законы о межрасовых браках и предотвращении порчи Испанской расы в Мексике. Будь это иностранцы, особенно вероломные и кровожадные Американские Гринго, или же варвары-аборигены."
 
 MEX_cleanse_mexico_of_syndicalism: "Очистить Мексику от Синдикализма"
 MEX_cleanse_mexico_of_syndicalism_desc: "Сегодня Мексика - это один сплошной, учиненный синдикалистами, беспорядок. Нужно начать репрессии против них и их прихлебателей. Скоро они поймут, что от правосудия нигде не скрыться!"
 MEX_new_military: "Новая армия"
 MEX_new_military_desc: "Красные отравили даже армию. Нам нужно полностью ее распустить и начать с нуля, и в этот раз новая Мексиканская армия будет состоять из настоящих патриотов."
 MEX_accion_revolucionaria_mexicanista: "Acción Revolucionaria Mexicanista"
 MEX_accion_revolucionaria_mexicanista_desc: "Мы должны интегрировать 'Золотых Рубашек' в нашу новую армию. Они возьмут на себя дело наблюдения и предотвращения опасных действий в Мексике и ее обществе из тени."
 MEX_promote_synarquismo: "Продвижение Синархизма"
 MEX_promote_synarquismo_desc: "Политическое, социальное и культурное движение, защищающее национализм, антисиндикализм и католические идеалы, иными словами, Синархизм, стал нашей государственной идеологией, и мы должны активнее продвигать его Народу Мексики."
 MEX_education_reforms: "Реформы образования"
 MEX_education_reforms_desc: "Мексика сильно нуждается в реформах образования. Не только из-за неэффективности текущей системы, но и из-за продвижения старых революционных идеалов, которые мы пытаемся убрать из общества. Мы повысим траты на образование и изменим учебные программы, чтобы будущие поколения следовали нашим путем."
 MEX_work_camps: "Трудовые лагеря"
 MEX_work_camps_desc: "Пуля - самый простой способ справиться с диссидентом, но не самый эффективный. В нашей стране достаточно преступников и поддерживающих социализм и либерализм, нужно использовать таких людей, поместив их в 'Лагеря Переобучения', где они смогут отработать свои преступления против государства."
 
 MEX_reconquista: "Реконкиста"
 MEX_reconquista_desc: "Договор Гуадалупе-Идальго стал нашим национальным позором, вынудив передать некоторые территории Мексики Американским империалистам! Мы были настолько слабы, что нас разбили их мизерные войска, но из пепла поднялась новая Мексика, сильнее чем когда либо, а США теперь слабее чем когда либо. Мы должны отомстить и вернуть отобранные псами империализма земли."
 MEX_military_glory: "Блеск штыков"
 MEX_military_glory_desc: "Лучший путь доказать наше расовое превосходство - это продемонстрировать всему миру нашу военную мощь. Каждый, кто возьмет в руки оружие за Мексику и ее народ, получит свою долю славы."
 MEX_religion_independencia_union: "Religión, Independencia, Unión"
 MEX_religion_independencia_union_desc: "Мексиканская борьба за независимость базировалась на трех основных принципах: освободиться от Испанского владычества, установить Католическую церковь единственной в стране и создать союз всех социальных классов. Мы должны придерживаться того, за что сражались и уничтожать всех, кто посягает на эти принципы."

## Military ##
# Army #
 MEX_modernise_the_army: "Модернизация армии"
 MEX_modernise_the_army_desc: "Мексиканская армия все еще использует устаревшее вооружение времен Вельткрига, да и наши доктрины и тактики недалеко оттуда ушли. Наша страна - крупный игрок в Северной и Центральной Америках, поэтому армию нужно расширить и модернизировать."
 
 MEX_guerilla_warfare: "Партизанская война"
 MEX_guerilla_warfare_desc: "Ландшафт Мексики крайне суров, сочетая в себе пустыни, горные цепи и джунгли. Во время Революции партизанская тактика показала свое превосходство в таких условиях, не позволяющих крупные и тяжеловооруженные армии."
 MEX_study_the_mexican_revolution: "Изучить мексиканскую революцию"
 MEX_study_the_mexican_revolution_desc: "Партизанская тактика успешно одержала победу над федералистскими силами во время мексиканской революции. Если мы разработаем и усовершенствуем эту тактику, то сможем отразить любое иностранное вторжение."
 MEX_night_ambushes: "Ночные засады"
 MEX_night_ambushes_desc: "Один из столпов партизанской войны - быть незамеченными до самого начала стрельбы. Ночью легко скрыться и подойти к врагу поближе, а это очень влияет на успешность засад."
 MEX_citizen_soldier: "Солдаты и гражданские"
 MEX_citizen_soldier_desc: "Партизанские войска состоят не только из профессиональных военных, но и из каждого гражданского, способного сражаться с врагом. Сформировав гражданское ополчение, мы будем уверены, что каждый житель страны способен выполнить свой долг."
 MEX_decentralised_command: "Децентрализованное командование"
 MEX_decentralised_command_desc: "Из Мехико сложно управлять партизанами в пустынях Соноры или джунглях Юкатана. Наша командная структура должна быть децентрализованной, а местные командиры должны иметь достаточно автономии для успешных партизанских атак."
 MEX_recon_scouts: "Отряды разведчиков"
 MEX_recon_scouts_desc: "Засады могут быть весьма успешными, что показали Афганцы в своих непрерывных войнах против Британских империалистов. Однако, засада бесполезна, если враг в нее не попал. Профессиональные разведчики, способные точно доложить о позициях и перемещениях врага, могут свести такие случаи к нулю."
 MEX_small_unit_tactics: "Тактика малых групп"
 MEX_small_unit_tactics_desc: "Засадные отряды обычно небольшие, от отделения до взвода, поскольку целая дивизия не сможет хорошо спрятаться на небольшой территории. Наша армия должна воевать малыми силами, что требует переработки тактик и командной структуры."
 MEX_die_standing: "Стоять до конца"
 MEX_die_standing_desc: "Ни единый метр Мексиканской земли не должен попасть под сапог контрреволюционеров и империалистов! Наши доблестные бойцы защитят каждый уголок Мексики и никогда не сдадутся! Неважно, какой ценой, но Мексика останется свободной."
 
 MEX_legacy_of_the_revolution: "Наследие Революции"
 MEX_legacy_of_the_revolution_desc: "Мексиканская Революция была одним из самых масштабных конфликтов на континенте за последнее время. Она принесла с собой много нового в плане военной тактики и вооружений. Мы должны строить свою армию на уроках этой войны."
 MEX_improved_officer_training: "Обучение офицеров"
 MEX_improved_officer_training_desc: "В наш век современной войны, крайне важно совершенствовать методы подготовки наших офицеров и армейских командиров."
 MEX_desert_training: "Учения в пустыне"
 MEX_desert_training_desc: "Один из наших крупнейших врагов на континенте - это Соединенные Штаты Америки, вечно пытающийся подорвать свободу Мексики. Мексикано-Американская граница в основном проходит среди пустынь и засушливых гор, и мы должны научить наших солдат как остановить войска США в этих враждебных условиях."
 MEX_jungle_training: "Учения в джунглях"
 MEX_jungle_training_desc: "Революция началась в джунглях Южной Мексики, и она должна распространиться через джунгли Центральной и Латинской Америк. Наша армия должны приспособиться к этому чрезвычайно враждебному ландшафту, который станет полем боя наших будущих войн."
 MEX_soldaderas: "Soldaderas"
 MEX_soldaderas_desc: "Многие женщины сражались во время Революции за ее идеалы. Эти 'soldaderas’ доказали свою силу и волю на поле боя, но женщины все еще не очень приветствуются в войсках. Мы должны покончить с дискриминацией и позволить им сражаться в наших вооруженных силах."
 MEX_future_of_war: "Будущее войны"
 MEX_future_of_war_desc: "Будущее войны зависит от того, каким оружием будут воевать. Чтобы приготовиться к конфликтам будущего, которые непременно будут угрожать целостности и свободе Мексики, уже сейчас пора подумать о снаряжении будущего."
 MEX_industrial_warfare: "Промышленная война"
 MEX_industrial_warfare_desc: "Мексиканские солдаты сильны, но наша артиллерия еще сильнее. Нужно вооружить войска тяжелыми средствами огневой поддержки для улучшения боевых качеств против сил противника."
 MEX_mechanised_warfare: "Механизированная война"
 MEX_mechanised_warfare_desc: "Мексиканские бойцы сильны, артиллерия сильнее, но наши танки превосходят их все! Нужно механизировать наши войска, чтобы ни один враг не мог их разбить."
 
 MEX_general_staff_reforms: "Реформы главнокомандования"
 MEX_general_staff_reforms_desc: "Самый эффективный инструмент войны - это профессиональная, хорошо управляемая регулярная армия. К сожалению, наши вооруженные силы сейчас нечто противоположное. Нам нужно реформировать армию, и мы начнем с главнокомандования и командной структуры."
 MEX_modern_division_structure: "Современная дивизионная структура"
 MEX_modern_division_structure_desc: "Современная дивизия является сложной взаимосвязанной структурой, тогда как Мексиканская дивизия представляет из себя лишь несколько пехотных батальонов. Нужно полностью переработать дивизионную структуру наших войск."
 MEX_new_military_colleges: "Новые военные училища"
 MEX_new_military_colleges_desc: "Важной частью профессиональной армии является крупный и хорошо обученный офицерский состав. У нас мало опытных офицеров на всех уровнях командной структуры, так что нам потребуется расширить армейские училища для получения новых командиров."
 MEX_professional_army: "Профессиональная армия"
 MEX_professional_army_desc: "Целью наших крупных военных реформ является создание современной, профессиональной армии. Мы обновили наше вооружение и тактики, но нужно, чтобы каждый солдат знал свои обязанности и исполнял их в любых условиях."
 MEX_centralised_command: "Централизованное командование"
 MEX_centralised_command_desc: "Если мы дадим местным командирам слишком много самостоятельности, то наши войска и штабы погрузятся в хаос, как только мы встретимся с врагом, и никто не будет точно знать, что именно происходит на фронтах. Нам нужна управляемая, централизованная командная структура для эффективного управления войсками."
 MEX_logistic_companies: "Батальоны снабжения"
 MEX_logistic_companies_desc: "Из-за нашего сложного ландшафта и неразвитой инфраструктуры будет сложно хорошо снабжать крупную армию с множеством тяжелых вооружений. Нужны специальные отряды, которые будут отслеживать потребности и снабжать войска."
 MEX_flexible_planning: "Гибкое планирование"
 MEX_flexible_planning_desc: "Хельмут фон Мольте Старший точно выразился: 'Ни один план не переживет столкновения с противником', и это было лишний раз доказано во время хаотичных стычек и битв Мексиканской Революции. Наши планы должны быть достаточно гибкими, чтобы быстро приспосабливать их к меняющимся условиям."
 MEX_siempre_leales: "Siempre Leales"
 MEX_siempre_leales_desc: "Армия всегда будет верно служить Мексике, независимо от цены. Она всегда защитит нашу прекрасную страну, в войне или мире, от любых угроз, внешних или внутренних. 'Siempre Leales', Всегда Верен."

# Navy #
 MEX_armada_de_mexico: "Armada de México"
 MEX_armada_de_mexico_desc: "Наш флот не способен справиться с флотами Антанты и Соединенных Штатов, но не стоит его недооценивать. У Мексики длинная береговая линия, и наши моряки и капитаны готовы ее защитить."
 
 MEX_grand_navy: "Великий флот"
 MEX_grand_navy_desc: "В море нет джунглей или гор, в которых мог бы спрятаться флот. Небольшие, скрытные отряды способны сражаться на суше, но наш флот сможет победить только крупными кораблями с огромной огневой мощью."
 MEX_naval_glory: "Блеск стволов"
 MEX_naval_glory_desc: "Одного вида броненосца Anáhuac достаточно, чтобы поразить большинство людей, а его 234 мм пушки больше, чем любое артиллерийское орудие наших сухопутных войск. Нам следует гордиться нашим флотом, храбро защищающим побережье Мексики."
 MEX_battleship_development: "Разработка линкоров"
 MEX_battleship_development_desc: "Сейчас Anáhuac - самый крупный корабль нашего флота, но он в строю уже более 30 лет и не способен справиться с современными линкорами и крейсерами. Мы должны создать свой собственный линкор, который в будущем станет новым флагманом нашего флота."
 MEX_produce_our_titans_of_the_sea: "Разработка морских титанов"
 MEX_produce_our_titans_of_the_sea_desc: "Производственный потенциал наших верфей весьма ограничен, поэтому создать флот линкоров будет проблематично. Мы должны создать в поддержку нашим крупным кораблям чуть меньшие, но все так же эффективные линейные крейсера."
 MEX_carrier_development: "Разработка авианосцев"
 MEX_carrier_development_desc: "Во время Вельткрига появился новый тип кораблей - авианосец! Изначально они предназначались для летающих лодок, но новые, крупные авианосцы, способны нести на себе целую эскадрилью и поддерживать флот большими, несущими торпеды и бомбы, самолетами."
 MEX_dominate_the_sea_from_the_air: "Морская авиация"
 MEX_dominate_the_sea_from_the_air_desc: "Авиация стала важной частью вооруженных сил. Некоторые сомневаются в эффективности авиаударов по сравнительно небольшим целям, но большинство считают, что самолеты еще сыграют свою роль в будущих сухопутных и морских сражениях. Наш же флот запросил создание подразделений морской авиации."
 
 MEX_fuerza_de_infanteria_de_marina: "Fuerza de Infantería de Marina"
 MEX_fuerza_de_infanteria_de_marina_desc: "Иногда проще обойти противника по морю, чем прорываться через укрепленные позиции по трудному ландшафту. Морские операции вроде Дарданельской провалились, но десант с моря вполне может стать рабочей тактикой."
 
 MEX_protect_trade: "Защита торговых путей"
 MEX_protect_trade_desc: "Наш флот просто никогда не сможет справиться с крупными морскими державами, поэтому, не пытаясь достичь недостижимого, мы сосредоточимся на защите наших торговых путей. Мы не сможем разбить флот США, но мы сможем уничтожить пиратов и рейдеров."
 MEX_coast_guard: "Береговая охрана"
 MEX_coast_guard_desc: "У нашей страны длинная береговая линия, которая граничит и с Тихим Океаном, и с Карибским морем, что позволяет легко прятаться рейдерам и контрабандистам. Нам нужно патрулировать наши берега чтобы остановить этих преступников."
 MEX_destroyer_development: "Разработка эсминцев"
 MEX_destroyer_development_desc: "Крупные корабли слабо подходят для сопровождения конвоев. Лучше вложиться в небольшие эсминцы, которые смогут дешевле и надежнее защищать наши торговые пути"
 MEX_protecting_our_trade: "Защищая нашу торговлю!"
 MEX_protecting_our_trade_desc: "С развитием нашего военно-морского потенциала, который постоянно растет. Необходима дальнейшая подготовка. Используя наш более крупный флот в маневрах сопровождения, мы смогли разработать более эффективный и практичный подход к обеспечению безопасности наших торговых линий!"
 MEX_submarine_development: "Разработка подводных лодок"
 MEX_submarine_development_desc: "Защита наших торговых путей важна, но это не повод отказаться от рейдерских атак на конвои противника. Подводные лодки идеально для этого подходят, поэтому нам стоит вложиться в тихую смерть из глубин океана."
 MEX_death_from_below: "Смерть с глубин"
 MEX_death_from_below_desc: "Мы вложили огромные средства в наши подводные жнецы, и все, кто выступает против нас и считает себя в безопасности в океане, вскоре пожалеют об этом, когда окажутся под ударом наших субмарин. Нам не нужно специализироваться на крупномасштабных сражениях, ведь мы - смерть с глубин"
 
# Air Force #
 MEX_fuerza_aerea_mexicana: "Fuerza Aérea Mexicana"
 MEX_fuerza_aerea_mexicana_desc: "Наш воздушный флот точно не справится с Британским, но он идеально подходит для военных операций в Центральной и Латинских Америках. Нам стоит расширить ВВС, поскольку авиация играет важную роль на поле боя."
 MEX_pilot_training: "Обучение пилотов"
 MEX_pilot_training_desc: "Наш воздушный флот все еще довольно мал, и нам не хватает обученных пилотов. Самолет бесполезен, если пилот не умеет на нем летать, и поэтому нам надо расширить наши курсы летной подготовки."
 MEX_build_airports: "Постройка аэродромов"
 MEX_build_airports_desc: "Самолет не способен взлететь из джунглей... ну, мы еще не пытались, но это похоже на правду. Необходимо строить аэродромы на ровной территории, чтобы авиация смогла взлететь на защиту небес Мексики."
 MEX_air_defence: "Воздушная оборона"
 MEX_air_defence_desc: "Мы не единственные, кто создает воздушный флот... далеко не единственные. Наша авиация в основном будет обороняться, если им придется воевать с крупными силами контрреволюционеров и империалистов, поэтому летчикам стоит помочь с земли."
 MEX_air_supremacy: "Воздушное превосходство"
 MEX_air_supremacy_desc: "Для эффективной поддержки наших сухопутных и морских сил, а также для защиты от вражеских бомбардировок, наша авиация должна сосредоточиться на захвате и удержании превосходства в воздухе."
 MEX_fighter_research: "Разработка истребителей"
 MEX_fighter_research_desc: "Довольно трудно завоевать превосходство в воздухе на больших и неуклюжих бомбардировщиках. Вместо них нам нужны быстрые, маневренные и хорошо вооруженные самолеты, которые смогут эффективно перехватывать и уничтожать вражескую авиацию."
 MEX_army_air_support: "Поддержка с воздуха"
 MEX_army_air_support_desc: "Многие из наших противников, особенно контрреволюционных стран Центральной Америки, не имеют сильных военно-воздушных сил, поэтому нам стоит сосредоточиться на поддержке с воздуха. Мы не сможем справиться с авиацией Антанты, поэтому лучше сфокусироваться на эксплуатации слабостей наших более маленьких врагов."
 MEX_bomber_research: "Разработка бомбардировщиков"
 MEX_bomber_research_desc: "Небольшие самолеты, вооруженные одними лишь пулеметами, не могут справиться с уничтожением вражеской инфраструктуры и промышленности. Нам нужны большие самолеты с несколькими двигателями, способные доставить до противника большой груз бомб."
 MEX_radar_development: "Создание РЛС"
 MEX_radar_development_desc: "РЛО, или радиолокатор обнаружения, это новое изобретение, весьма полезное для нашей авиации. С радиолокационными станциями мы можем засекать самолеты далеко за горизонтом, что даст нам время поднять по тревоге наши истребители."
 MEX_expand_airports: "Расширение аэродромов"
 MEX_expand_airports_desc: "Наш воздушный флот непрерывно расширяется, а аэродромы за ним не поспевают. Скоро их максимальная вместимость будет превышена, а практика показала, что самолеты не взлетают из джунглей... нам нужно скорее увеличить аэродромы."
 MEX_paratroopers: "Воздушный десант"
 MEX_paratroopers_desc: "Дарданельская операция показала, что морской десант весьма сложен в осуществлении, но вот высадку с воздуха еще не пытались провести. Нам нужно создать подразделения воздушных десантников, которые смогут прыгать за пределами линии фронта, нападать на линии снабжения и ловить в засадах отступающих."
 MEX_rule_the_skies: "Контроль небес"
 MEX_rule_the_skies_desc: "Мексиканская авиация правит небом... ну, как минимум, небом Центральной Америки. Чтобы сравниться с авиацией Антанты нам потребуется еще много времени..."

### Bookmark ###
 MEX_KR_gathering_storm_desc: "Мексика вышла из мексиканской революции измененной. В течение 1920-х президентов Альваро Обрегона и Адольфо де ла Уэрты улучшились отношения с Соединенными Штатами Америки, стабилизировавшие страну от революции. Великая депрессия в Америке позволила Мексике принять идеи Революции, которую они начали, когда избрали Эмалиано Сапату президентом в 1932 году. Теперь, когда до конца его срока осталось два года, революция, по-видимому, свершилась. Сапата надеется проложить будущий курс для Мексики."

### Intro Screen ###
 MEX_country_intro_background: "GFX_MEX_intro"
 MEX_country_intro_header: "Мексика - Несколько лет назад"
 MEX_country_intro_content: "В последние годы Мексика изменилась. В 1910 году началась Мексиканская Революция, направленная против Порфирио Диаса, и продлившаяся почти десятилетие. В 1917 году президентом стал Венустиано Карранса, однако он быстро разжег следующую революцию своей попыткой уничтожить политических противников, включая Сапату. Это привело к Манифесту Агуа Приета, составленного несколькими военными и политическими лидерами, и становлению Альваро Обрегона Президентом Мексики. После этого хаос революции стал утихать, а правительство Мексики начало стабилизировать ситуацию.\n\nПервый срок Альвара Обрегона был отмечен улучшением отношений с Соединенными Штатами, особенно после того, как Панчо Вилья стал послом во Французской Коммуне, а Адольфо де ла Уэрта смог заставить Янки наконец-то признать текущее правительство Мексики легитимным. Экономика начала улучшаться, особенно на юге, где управлял Сапата, который мог внедрять земельные реформы более глубоко чем где-либо в стране. Обрегон работал над улучшением трудовых прав, хотя это и привело к конфликту между двумя большими профсоюзами - Confederación Regional Obrera Mexicana или CROM (Конфедерация Мексиканских Рабочих или КМР) и более синдикалистской Confederación General de Trabajadores или CGT (Главная Конфедерация Рабочих или ГКР). Однако, не все в Мексике шло хорошо - среди Католиков росло недовольство драконовыми антирелигиозными законами, вписанными в Конституция и направленными против Католической Церкви.\n\nПосле Обрегона был Адольфо де ла Уэрта, который в целом продолжил линию предыдущего Президента. Однако, его срок ознаменовался крупными международными событиями. Особенно стоит отметить Британскую Революцию и Великую Депрессию в Соединенных Штатах, которая своей ударной волной накрыла экономику Мексики и южных стран. Это спровоцировало конфликты в Центральной Америке, особенно в Никарагуа, где Сапата хотел попытаться распространить революционные идеалы на юг. Однако, самым спорным деянием де ла Уэрта было изменение сроков правления. Он переписал их таким образом, что позволит Обрегону баллотироваться на второй срок. И он победил.\n\nВ 1932 году на Социалистической и популистской платформе был избран Сапата. При его сроке произошла модернизация Эхидосов как часть его концентрации на экономике, особенно в сельском хозяйстве. Он продолжал работать над улучшением прав крестьян и аборигенов внутри страны. Однако, его политикой были сильно недовольны консерваторы, особенно Католики. Также он снова изменил сроки правления - теперь, как и прежде, Президент Мексики мог руководить лишь один срок, пускай и увеличенный до пяти лет, что противники Сапаты назвали захватом власти. Его заигрывания с Интернационалом и начавшееся перераспределение земель вызвали трения с Соединенными Штатами. На заре 1936 года многие гадают, какое же будущее теперь ждет Мексику."
 
 MEX_country_intro_header_1: "Мексика в 1936 году"
 MEX_country_intro_content_1: "Обрегона сменил Адольфо де ла Уэрта, который в основном продолжал ту же общую политику. Однако в течение его срока ему пришлось столкнуться с рядом международных инцидентов. В частности, Британская Революция и последующая Великая Депрессия в Соединенных Штатах, которая пошлет шоковые волны на юг и повлияет на экономику Мексики. Все это вызвало конфликты в Центральной Америке, в частности в Никарагуа, куда Сапата отправился, чтобы помочь распространить свои революционные идеалы на юге. Однако все это не было самым спорным поступком де ла Уэрты. Это было переписывание ограничений на срок полномочий, чтобы Обрегон мог баллотироваться на второй срок, что конечно же Обрегон и сделал.\n\nВ 1932 году Сапата был избран на социалистической и популистской платформе. Сапата сосредоточился на экономике, особенно на аграрном секторе, улучшая условия труда и права крестьян эхидос, или общинных земель, находящихся в узуфруктальной собственности. Работа по улучшению прав крестьян и коренных жителей Мексики будет его основным направлением в течение первого срока. Однако его политика еще больше разозлила консерваторов и католиков. Более непопулярной мерой среди консерваторов было изменение избирательного законодательства, ограничивающее максимальный срок до 1 года, но увеличивающее продолжительность каждого срока до 5 лет. Его обращение к Интернационалу вызвало напряженность в отношениях с США, как и его политика перераспределения земли.\n\nНа рассвете 1936 года многие задаются вопросом о том, какую форму примет будущее Мексики."

 MEX_guide: "§MCalles Seizes Power§! (§oTotalist§!)\n£white_dot Choose that Zapata is slain in the assassination attempt.\n£white_dot In the aftermath, let Calles seize the Palacio Nacional.\n£white_dot Shortly after taking the focus \"Establish the Maximato\", the Cristero War will break out.\n£white_dot Lower the Cristero Strength through a combination of decisions and random events to zero to secure Calles' rule.\n\n§MJunta Holds on to Power§! (§PPaternal Autocrat§!)\n£white_dot Choose that Zapata is slain in the assassination attempt.\n£white_dot In the aftermath, let Garza and Treviño form a Junta.\n£white_dot The Campesinos War will break out.\n£white_dot Do NOT take the Sinarquista offer.\n£white_dot Lower the Campesinos Strength through a combination of decisions and random events to zero to secure Garza's rule.\n£white_dot After the war is over, choose to hold on to power.\n\n§MJunta Restores Democracy§! (§gAuthoritarian Democrat§!)\n£white_dot Same as above, but when the war ends choose to restore democracy.\n\n§MSinarquistas Take Charge§! (§NNational Populist§!)\n£white_dot Same as the Junta Holds on to Power, but take the Sinarquista's offer.\n£white_dot The war must last at least 75 days for the offer event, and an additional support event to trigger for the coup to eventually fire.\n£white_dot After doing so, the §NUnión Nacional Sinarquista§! will successfully seize power.\n\n§MRubio Election / Villa Election / Toledano Election / Calles Election§! (§SSocial Democrat§! / §RRadical Socialist§! / §rSyndicalist§! / §oTotalist§!).\n£white_dot Choose that Zapata survives the assassination attempt, or if he is slain, that Villa and Toledano form a government.\n£white_dot Empower the desired party in the 1937 election.\n£white_dot Re-elect the desired party in 1942 and 1947.\nNote: If elected, Calles and the §oPartido Nacional Revolucionario§! will go on to form a dictatorship."

### Events - assassination and first elections ###
 mexico_events.2.t: "Попытка убийства Президента"
 mexico_events.2.d: "Срочные новости из Мехико. Неизвестный убийца смог подобраться к Президенту Сапате и сделать несколько выстрелов, прежде чем был убит охраной. Сапата был срочно доставлен в больницу, и многие задаются вопросом о дальнейшей судьбе Тигра Юга."
 mexico_events.2.a: "Сапата смог выжить"
 mexico_events.2.b: "Убийца добился своего!"
 
 mexico_events.3.t: "Смерть Сапаты"
 mexico_events.3.d: "Этим утром скончался Герой Революции и Президент Мексики Эмилиано Сапата, смертельно раненый террористом в Мехико. Сразу же после его смерти несколько групп, от верных политиков до генералов-реакционеров, начали бурную борьбу за власть над правительством и армией."
 mexico_events.3.a: "Плутархо Кальес и его клика заняли Palacio Nacional"
 mexico_events.3.b: "Реакционные генералы Гарса и Тревино создали Хунту"
 mexico_events.3.c: "Панчо Вилья и Висенте Толедано сформировали коалиционное правительство"
 
 mexico_events.4.t: "Президентские выборы [GetYear] года"
 mexico_events.4.d.zapata_alive: "После покушения на его жизнь Сапата объявил о своей отставке, и в стране проходят внеочередные выборы, чтобы определить следующего лидера Мексики. Граждане собираются, чтобы проголосовать за то, кто возглавит Мексику в отсутствие Сапаты, и несколько партий борются за лидерство, кто же выйдет на первое место?"
 mexico_events.4.d.zapata_dead: "Смерть Сапаты в прошлом году привела к созданию коалиционного правительства во главе с Висенте Толедано и Панчо Вилья. Однако сегодня день выборов, и скоро мы узнаем, кто станет следующим президентом после великого Героя Сапаты. "
 mexico_events.4.a: "Partido Nacional Revolucionario."
 mexico_events.4.b: "Partido Mexicano de los Trabajadores."
 mexico_events.4.c: "Partido Nacional Agrarista."
 mexico_events.4.e: "Partido Laborista Mexicano."
 
 mexico_events.5.t: "Расследование"
 mexico_events.5.d: "Убийца и сам был застрелен, но несмотря на это мы нашли доказательство того, что он действовал не один. Мы должны начать охоту за заказчиками по всему Мехико."
 mexico_events.5.a: "Мы должны найти террористов"
 
 mexico_events.6.t: "Найдены заказчики убийства"
 mexico_events.6.d1: "Мы нашли стоящих за спиной убийцы. Ими оказалась клика генералов с правыми взглядами, недовольных реформами Сапаты. Они все отрицают, но доказательства намного сильнее. Предатели умрут смертью предателей."
 mexico_events.6.d2: "Мы выяснили, кто стоял за убийцей. Оказывается, это был Плутархо Элиас Кальес, который хотел избавиться от Сапаты, чтобы укрепить свои позиции во власти. Его ждет смерть предателя."
 mexico_events.6.a: "Вздернуть этих предателей"
 
 mexico_events.8.t: "Похороны Сапаты"
 mexico_events.8.d: "Сегодня в Мехико прошли похороны Героя Революции Эмилиано Сапаты. В честь убитого президента на улицы вышли многие и был закрыт почти каждый магазин. Траур на улицах явственно выражал скорбь народа по погибшему, и это было особенно заметно на лицах людей из бедных сельских регионов, приехавших в город чтобы проявить свое почтение павшему лидеру."
 mexico_events.8.a: "Он умер твердо стоя на ногах"

### Calles / Maximato Events ###
 mexico_events.10.t: "Ley de Tolerancia de Cultos"
 mexico_events.10.d: "Президент Кальес только что издал новый закон в поддержку Конституционного секуляризма. Согласно законы, священники и монахи будут серьезно штрафоваться за нарушение антирелигиозных законов. То же самое ожидает священников, критикующих власть или носящих религиозные одеяния на публике. Для более легкого исполнения закона, Кальес также подготовил несколько указов по национализации церковной собственности, выдворению иностранных священников и закрытию монастырей, конвентов и церковных школ. Некоторые из верных губернаторов выпустили похожие законы в подражание Президенту."
 mexico_events.10.a: "Конституция должна действовать"
 
 mexico_events.11.t: "Президентские выборы [GetYear]-го года"
 mexico_events.11.d: "Настал год выборов, и президент [MEX.GetLeader], безусловно лидируя в гонке, скорее всего будет переизбран. "
 mexico_events.11.a: "Президент переизбран"
 
 mexico_events.12.t: "Восстание Кристерос"
 mexico_events.12.d: "Недовольные законами Кальеса монахи, священники и миряне не захотели подчиниться. В Центральной Америке они собрались в то, что они назвали Кристерос и решили сражаться за христианскую веру силой оружия, а не слов. Кальес призвал к уничтожению этой угрозы Мексике."
 mexico_events.12.a: "Мы должны защитить Революцию"
 
 mexico_events.14.t: "Восстание Кристерос - стычки по всей стране"
 mexico_events.14.d: "По всей стране идут стычки и целые бои. К счастью, большинство городов осталось под федеральным контролем, однако множество маленьких городков оказалось в руках так называемой Армии Кристерос. Похоже на то, что это закончится совсем не скоро."
 mexico_events.14.a: "Мы должны уничтожить врагов революции"
 
 mexico_events.15.t: "Восстание Кристерос - диверсии на фабриках"
 mexico_events.15.d: "Кристерос атаковали фабрику в штате [attack_state.GetName], нанеся крупный урон и убив множество людей. Федеральные власти работают восстановлением порядка, а местные офицеры Мексиканской армии рвутся в бой, чтобы ответить этим террористам-реакционерам."
 mexico_events.15.a: "Нужно остановить их"
 
 mexico_events.16.t: "Восстание Кристерос - диверсии на военных заводах"
 mexico_events.16.d: "Кристерос атаковали военный завод в штате [attack_state.GetName], нанеся крупный урон и убив множество людей. Федеральные власти работают восстановлением порядка, а местные офицеры Мексиканской армии рвутся в бой, чтобы ответить этим террористам-реакционерам."
 
 mexico_events.17.t: "Восстание Кристерос - атаки на железные дороги"
 mexico_events.17.d: "Кристерос заложили несколько бомб в штате [attack_state.GetName]. Взрывы нанесли крупный урон железным дорогам, уничтожили множество поездов и убив бесчисленное множество невинных людей."
 
 mexico_events.18.t: "Восстание Кристерос - Битва при Тепатитлане"
 mexico_events.18.d: "Мексиканская федеральная армия начала штурм города Тепатитлан, занятого армией Кристерос. Очень быстро стало понятно, что это будет кровавая битва. У офицера Пабло Родригеза, возглавляющего атаку, есть два выбора. Он может отступить, что может позволить ему убить командующего со стороны Кристерос. Или он может перехватить противника во время отступления, что тоже имеет свои преимущества."
 mexico_events.18.a: "Город остался в руках Кристерос"
 mexico_events.18.b: "Город взят штурмом"
 
 mexico_events.19.t: "Восстание Кристерос - Битва при Эль Фреснал"
 mexico_events.19.d: "Мексиканская армия стоит лицом к лицу с укрепившейся в городе Эль Фреснал армией Кристерос. Хесус Феррейра, командующий атакой федеральных войск, считает, что он сможет выбить их, но это дастся дорогой ценой. Уже через несколько часов..."
 mexico_events.19.a: "Победа в руках Кристерос"
 mexico_events.19.b: "Победа Мексиканской армии"
 
 mexico_events.20.t: "Восстание Кристерос - Битва при Мансанильо"
 mexico_events.20.d: "Армия Кристерос пытается занять город Мансанильо. Гелиодор Чарис Кастро, местный генерал, сосредоточился на удержании города. У Кристерос больше людей, как и шансов взять город. Однако в округе есть корабль, обстреливающий армию восставших. Что предпримут мятежники - попытаются занять город или уничтожить корабль?"
 mexico_events.20.a: "Город был взят"
 mexico_events.20.b: "Атака Кристерос отбита"
 
 mexico_events.21.t: "Восстание Кристерос - Боестолкновения"
 mexico_events.21.d: "Недавно в штате [attack_state.GetName] произошла стычка, стоившая жизней нескольких людей как из Мексиканской армии, так и из армии Кристерос. Просто еще одно столкновение в кровавой борьбе против террористов. В этой конкретной битве победитель..."
 mexico_events.21.a: "Мексиканская армия"
 mexico_events.21.b: "Армия Кристерос"
 
 mexico_events.22.t.defeat: "Победа Кристерос"
 mexico_events.22.t.victory: "Победа Федерального правительства" 
 mexico_events.22.d.defeat: "Произошло невозможное, и сегодня в Мехико реет флаг Кристерос. Они захватили власть и обещают новую и лучшую Мексику."
 mexico_events.22.d.victory: "В конце концов армия террористов была уничтожена. И хотя еще происходят отдельные столкновения в регионах, закон в целом был восстановлен. Президент [MEX.GetLeader] выдохнул с облегчением - его враги наконец-то повержены."
 mexico_events.22.a: "Viva cristo rey! Вива ля Мексика! (Авторитарные демократы)"
 mexico_events.22.b: "Viva cristo rey! Вива ля Мексика! (Национал-Популисты)"
 mexico_events.22.a: "Вива ля Мексика!"
 
 mexico_events.24.t: "Смерть Кальеса"
 mexico_events.24.d_1: "К сожалению, доктора в Мехико сегодня объявили о смерти Плутарко Элиаса Кальеса, el Jefe Máximo. После его смерти началась борьба за власть, в которой лидируют трое возможных будущих правителей Мексики: Ласаро Карденас, Эмилио Портес Хиль и Абелардо Родригес."
 mexico_events.24.d_2: "Чудесные новости сегодня, похоже, что социалистический ублюдок Кальес умер. Теперь вопрос только в том, кто возглавит его грязное движение."
 mexico_events.24.a: "Ласаро Карденас"
 mexico_events.24.b: "Эмилио Портес Хиль"
 mexico_events.24.c: "Абелардо Родригес"                                       
 
 mexico_events.25.t: "Путь Карденаса"
 mexico_events.25.d: "Карденас стал новым лидером Мексики. Ходят разные слухи о том, что он будет делать во власти. Он был верным сторонником Кальеса, но его больше нет. Некоторые верят, что Карденас отменит Максимато, другие - что наоборот, поддержит всеми силами."
 mexico_events.25.a: "Продолжить Максимато"
 mexico_events.25.b: "Отменить Максимато"

### Revolution Democracy ###
 mexico_events.26.t: "Президентские выборы [GetYear] года"
 mexico_events.26.d: "В Мексике настало время очередных президентских выборов. Срок [MEX.GetLeader] ограничен Конституцией, так что кто же станет следующим Президентом?"
 mexico_events.26.a: "Partido Mexicano de los Trabajadores"
 mexico_events.26.b: "Partido Nacional Agrarista"
 mexico_events.26.c: "Partido Laborista Mexicano"
 
 mexico_events.28.t: "Основана академия языка Майя"
 mexico_events.28.d: "Сегодня в Юкатане, в городе Мерида, Альфредо Баррера Васкес и несколько экспертов в языке Майя создали Academia de la Lengua Maya(Академия языка Майа). Основная цель академии поддерживать и продвигать этот язык. Кроме того, она сотрудничает с правительственными службами для помощи тем, у кого язык Майя - основной."
 mexico_events.28.a: "Давайте возродим его"
 
 mexico_events.29.t: "Мексиканский мурализм"
 mexico_events.29.d: "Еще с 1920-х годов в Мексике идеалам революции помогали распространятся артистические движения. Города по всей Мексике должны иметь живопись на стенах общественных зданий, на которой изображаются различные социальные и политические послания Мексиканского национализма. Самыми авторитетными в этих движениях являются Диего Ривьера, Хосе Клементе Ороско и Давид Альфаро Сикьерос."
 mexico_events.29.a: "Живопись каждому городу"
 
 mexico_events.30.t: "Liga de Escritores y Artistas Revolucionarios"
 mexico_events.30.d: "Для продвижения идеалов Революции и Синдикализма по всей стране была создана Liga de Escritores y Artistas Revolucionarios (Лига Революционных Писателей и Артистов). Лига будет распространять свои идеи с помощью картин и литературы. Более того, она имеет контакты с Третьим Интернационалом и даже его поддержку."
 mexico_events.30.a: "Искусство для Народа"
 
 mexico_events.31.t: "Памятник Революции"
 mexico_events.31.d: "Сегодня в Мехико наконец-то был завершен Памятник Революции, работы архитектора Карлоса Обрегона Сантакалия. Он был построен на месте незаконченного здания суда, которое приказал построить еще Порфири Диаз. Однако это не только памятник - это еще и мавзолей для некоторых из наиболее известных революционеров. Монумент был построен на Plaza de la Repúblic, и уже становится одним из самых культовых мест города."
 mexico_events.31.a: "Мы будем помнить всегда"
 
 mexico_events.32.t: "Национальные парки"
 mexico_events.32.d: "Когда Сапата стал президентом, он решил создать несколько Национальных Парков. Но прошли годы, и он решил ускорить программу, сконцентрировавшись в основном на окрестностях Мехико."
 mexico_events.32.a: "Мы должны защитить природу Мексики"
 
 mexico_events.33.t: "Regeneración"
 mexico_events.33.d: "Regeneración - это анархистская газета, основанная Хесус Флорес и его братьями, которых обычно называют Братья Магон. Изначально это издание сообщало о событиях в Мексике во время Революции. Однако чуть позже Хесус Флорес был выслан из страны, и газета осталась на обочине. Но ближе к нынешнему времени она была восстановлена, а ее анархистская позиция превратилась скорее в сапатитскую. Когда основатель газеты стал членом правительства Сапаты, он увеличил ее выпуск и спонсирование."
 mexico_events.33.a: "Идеи Магона живут"
 
 mexico_events.34.t: "Congreso Nacional de Mujeres"
 mexico_events.34.d: "Сегодня для национального решения вопроса о правах женщин был созван Congreso Nacional de Mujeres (Национальный женский конгресс). Наиболее важная из обсуждаемых проблем это женские избирательные права, хотя и другие проблемы, вроде проституции, женского образования, здоровья, абортов и прочего также обсуждались. Хотя это первый конгресс, уже был запланирован съезд следующего."
 mexico_events.34.a: "Viva Mujeres"
 
 mexico_events.35.t: "Право голоса для женщин"
 mexico_events.35.d: "Президент [MEX.GetLeader] выдвинул закон, дающий женщинам избирательные права, ход, который превозносят женские объединения по всей Мексике. Конечно, закон должен сперва пройти через Мексиканский Конгресс, и сможет ли он?"
 mexico_events.35.a: "Закон принят"
 mexico_events.35.b: "Закон не прошел"
 
 mexico_events.36.t: "Мексиканская Анархистская Федерация"
 mexico_events.36.d: "Сегодня, взяв вдохновение из Европейских движений, и в особенности Интернационала, была создана Мексиканская Анархистская Федерация. Она поможет объединить различные анархистские организации по всей Мексике и будет работать над поддержкой Анархизма и Анархо-Синдикализма внутри страны."
 mexico_events.36.a: "Viva Anarchismo"
  
 mexico_events.40.t: "Земельный захват"
 mexico_events.40.d: "Вдохновленные словами [MEX.GetLeader] о продолжении Земельных Реформ жители территорий близ Мехикали, у дельты реки Колорадо в Нижней Калифорнии сформировали новое движение. В этой части Мексики много крупных ферм, принадлежащих американцам. и следуя духу Земельных Реформ, крестьяне взяли власть во владениях в свои руки и создали собственные Эхидос и сельские профсоюзы. Народ Долины Мехикали весьма доволен после возвращения земель."
 mexico_events.40.a: "Tierra Y Libertad!"
 
 mexico_events.41.t: "Дела с Бизнес-Картелями"
 mexico_events.41.d: "Экономическое развитие Мексики в 19 веке проходило очень похоже на США. Здесь были монополии, бароны-разбойники, захват земель и эксплуатация трудящихся. Наша великая Революция - это сплав прогрессивных идеалов Северной Америки с социализмом Европы. И наша неспособность справиться с промышленными монополиями все более постыдна. Десятилетия продолжительной эксплуатации рынка компаниями, запасающими интеллектуальную собственность законным путем но неэтичными мерами, должна быть остановлена. Мы временно аннулируем принадлежность интеллектуальной собственности монополиям для поддержки конкуренции на рынке."
 mexico_events.41.a: "Конкуренция поведет Мексику к процветанию"

### Dirty War ###
 mexico_events.42.t: "Начало восстания Кампесинос"
 mexico_events.42.d: "Присвоение власти Военной Хунтой, после смерти Сапаты, привело к недовольству народа. Особенно заметно это в бедных сельских регионах, поддерживающих реформы Сапаты. Панчо Вилья и Рубен Ярамилло возглавили компанию против Хунты и за возвращение революционной демократии. Похоже, что это затянется надолго."
 mexico_events.42.a: "В Мексику нужно вернуть порядок"
 
 mexico_events.43.t: "Предложение Синархистов"
 mexico_events.43.d: "Синархисты предложили нам сделку в обмен на их вступление в правительство Мексики. Они утверждают, что способны защитить Мексиканский народ, и смогут лучше скоординировать свои силы, если войдут в правительство. Стоит ли принять их предложение?"
 mexico_events.43.a: "Принять их предложение"
 mexico_events.43.b: "Они нам не нужны"
 
 mexico_events.44.t: "Поддержка синархистов"
 mexico_events.44.d: "Синархисты верны своему слову, и вместе мы одержали несколько побед над повстанцами и предателями. Конечно, некоторые в Хунте обеспокоены ростом доверия и популярности нашего союзника. Однако, сейчас мы побеждаем повстанцев."
 mexico_events.44.a: "Вива Мексике"
 
 mexico_events.45.t: "Синархистский заговор"
 mexico_events.45.d: "Синархисты показали свое настоящее лицо. Хосе Антония Уркиза вошел в Мехико как герой. Он и его золотые рубахи строем вошли в Palacio Nacional и заняли здание без единого выстрела. Очевидно, солдаты больше поддерживают их, нежели Хунту. Вот так, быстро и без жертв Синархисты взяли власть в свои руки. Теперь они обещают возвращение Мексиканской славы и что никакие повстанцы больше не будут угрожать Мексике."
 mexico_events.45.a: "Чертовы предатели"
 
 mexico_events.46.t: "Восстановить демократию?"
 mexico_events.46.d: "Возможно, что некое подобие демократии поможет в борьбе с восстанием. Хунта, очевидно, сохранит свое влияние, но внешне демократия будет возвращена и во главе страны будет стоять Националистическая Партия Мексики. Это может дать нам некоторые преимущества в этом конфликте."
 mexico_events.46.a: "Восстановить Демократию"
 mexico_events.46.b: "Нам не нужна ширма"
 
 mexico_events.47.t: "Восстание Кампесинос - Стычки по всей стране"
 mexico_events.47.d: "По всей стране идут стычки и целые бои. К счастью, большинство городов осталось под федеральным контролем, однако множество маленьких городков оказалось в руках так называемой Армии Освобождения. Похоже, что это закончится совсем не скоро."
 mexico_events.47.a: "Нужно вернуть Закон и Порядок"
 
 mexico_events.48.t: "Восстание Кампесинос - Диверсии на фабриках"
 mexico_events.48.d: "Кампесинос атаковали фабрику в штате [attack_state.GetName], нанеся крупный урон и убив множество людей. Федеральные власти работают восстановлением порядка, а местные офицеры Мексиканской армии рвутся в бой, чтобы ответить этим террористам-реакционерам."
 mexico_events.48.a: "Нужно остановить их"
 
 mexico_events.49.t: "Восстание Кампесинос - Диверсии на военных заводах"
 mexico_events.49.d: "Кампесинос атаковали военный завод в штате [attack_state.GetName], нанеся крупный урон и убив множество людей. Федеральные власти работают восстановлением порядка, а местные офицеры Мексиканской армии рвутся в бой, чтобы ответить этим террористам-реакционерам."
 
 mexico_events.50.t: "Восстание Кампесинос - Диверсии на железной дороге"
 mexico_events.50.d: "Кампесинос заложили несколько бомб в штате [attack_state.GetName]. Взрывы нанесли крупный урон железным дорогам, уничтожили множество поездов и убив бесчисленное множество невинных людей."
 
 mexico_events.51.t: "Восстание Кампесинос - Гвадалахарская операция"
 mexico_events.51.d: "Мексиканская армия столкнулась с так называемой Армией Освобождения, которую возглавляет Панчо Вилья, у города Гвадалахара. Командир федеральной армии, Педро Охеда, готовится к обороне города, и он считает, что независимо от исхода, это будет кровавая битва. Когда пороховой дым унесло ветром, стороной, одержавшей победу, оказалась..."
 mexico_events.51.a: "Мексиканская Армия"
 mexico_events.51.b: "Армия Освобождения Кампесинос"
 
 mexico_events.52.t: "Восстание Кампесинос - Битва при Селайе"
 mexico_events.52.d: "Мексиканская армия встретила укрепившуюся в городке Селайя войска Кампесинос. Хесус Феррейра, командующий наступлением федеральных войск, считает, что сможет выбить противника с позиций, но дорогой ценой. Победитель же в этой битве..."
 mexico_events.52.a: "Мексиканская Армия"
 mexico_events.52.b: "Армия Кампесинос"
 
 mexico_events.58.t: "Восстание Кампесинос - Боестолкновения"
 mexico_events.58.d: "Недавно в штате [attack_state.GetName] произошла стычка, стоившая жизней нескольких людей как из Мексиканской армии, так и из армии Кампесинос. Просто еще одно столкновение в кровавой борьбе против террористов. В этой конкретной битве победитель..."
 mexico_events.58.a: "Мексиканская армия"
 mexico_events.58.b: "Армия Кампесинос"
 
 mexico_events.59.t.defeat: "Победа повстанцев"
 mexico_events.59.t.victory: "Победа федерального правительства"
 mexico_events.59.d.defeat: "Панчо Вилья и Рубен Ярамилло вошли в Мехико как герои. Военная хунта, управлявшая страной после смерти Сапаты, разбежалась. Победители провозгласили, что идеалы революции не умерли, но были испытаны, и что будут созданы сдержки для невозможности появления новой Хунты в будущем. Более того, они обещали, что вскоре будут проведены новые президентские выборы."
 mexico_events.59.d.victory: "Восставшие разбиты и вновь восстановлен порядок. [MEX.GetLeader] чествуется как герой по всей Мексике за разгром предателей и возвращение нормальной жизни."
 mexico_events.59.a: "Победа революции"
 mexico_events.59.b: "Закон и Порядок вернулись на земли"

### Military Junta and Auth-Dem ###
 mexico_events.61.t: "Новая Конституция"
 mexico_events.61.d: "В Мехико сегодня была опубликована новая Конституция. Конституция [GetYear] года схожа с таковой 1917 года, однако имеет некоторые заметные отличия. Она не содержит такой же антирелигиозности, земельных реформ и прочих радикальных частей прошлой Конституции. Она скорее более умеренная, более демократичная. Встреченная с фанфарами в Мехико, новая Конституция была принята с очевидным недовольством в сельской местности."
 mexico_events.61.a: "В Мексике наступает новый день"
 
 mexico_events.62.t: "Наследие Революции"
 mexico_events.62.d: "Наследие Мексиканской Революции - это то, над чем идут ожесточенные споры в Мексиканском Конгрессе. Некоторые полагают, что все связанное с ней это ужасно и следует осудить всех причастных. Другие считают, что нужно посадить лишь таких радикалов как Сапата и Вилла. Что мы решим?"
 mexico_events.62.a: "Приговорить лишь Сапату и прочих радикалов"
 mexico_events.62.b: "Посадить всех"
 
 mexico_events.63.t: "Законы против аборигенов"
 mexico_events.63.d: "Пришло предложение отменить законы Сапаты касательно аборигенов. Эта идея имеет большую поддержку среди правого крыла, так как они называют эти законы просто еще одним шагом бывшего Президента к уничтожению Мексики. Очевидно, что это будет встречено в штыки коренными Мексиканцами, особенно Майя и их союзниками в Юкатане."
 mexico_events.63.a: "Принять закон"
 mexico_events.63.b: "Не принимать закон"
 
 mexico_events.64.t: "Юкатанское восстание"
 mexico_events.64.d: "Пока мы укрепляли власть и отменяли законы Сапаты, народ Полуострова Юкатан решил объявить о своей независимости. Штаты Юкатана, Кампече и Кинтана Роо решили дружно вступить в новообразованную Республику Юкатан."
 mexico_events.64.a: "Мы должны уничтожить этих предателей"
 mexico_events.64.b: "Свобода или смерть (Игра за Юкатан)"
 
 mexico_events.65.t: "Мексика не способна утихомирить Юкатан"
 mexico_events.65.d: "[MEX.GetLeader] обещал разгромить повстанцев в Юкатане меньше чем за год - и он не справился. Наша армия отступила, объявлено прекращение огня, а это значит, что [MEX.GetLeader] должен быть осторожнее, или он рискует получить нож в спину и слететь со своего поста."
 mexico_events.65.a: "Поворачиваться спиной стало опасно..."
 
 mexico_events.66.t: "Юкатан удержался"
 mexico_events.66.d: "Мы смогли выбить Мексиканцев и впервые стать свободной и независимой республикой. Теперь, с окончанием войны, нам нужно восстановить страну и, конечно, не забывать о подлых Мексиканцах, которые хотят отобрать наши земли."
 mexico_events.66.a: "Вива Юкатан!"
 
 mexico_events.67.t: "Юкатан усмирен"
 mexico_events.67.d: "Бунтовщики и предатели в Юкатане были усмирены. Этот регион больше никогда не принесет проблем Мексике."
 mexico_events.67.a: "Вива Мехико"
 
 mexico_events.68.t: "Объединиться с Мексикой?"
 mexico_events.68.d: "Правые силы, совершившие переворот в Мексике, были уничтожены, и законы Сапаты постепенно возвращаются в силу, среди которых есть и указы о защите туземных поселений Мексики. Стоит ли нам прекратить борьбу и вернуться в состав страны или продолжить борьбу за независимость раз и навсегда?"
 mexico_events.68.a: "Возвращаемся. (Конец игры)"
 mexico_events.68.b: "Продолжим борьбу за Независимость!"
 
 mexico_events.69.t: "Конец Юкатанского восстания"
 mexico_events.69.d: "Восстание в Юкатане завершилось благодаря действиям [MEX.GetLeader] по восстановлению принятых Сапатой законов. Эти законы и гарантии сохранения автономности, уважения традиций и жесткой кары предателям, начавшим этот конфликт, помогли Юкатану решиться на воссоединение со страной."
 mexico_events.69.a: "Вива Мексика"
 
 mexico_events.70.t: "Юкатан продолжает борьбу"
 mexico_events.70.d: "Юкатанцы решили, что они лучше продолжат борьбу за независимость, несмотря на наши усилия по возвращению законов Сапаты и кары предателей. Ну что же, тогда Юкатан скоро будет усмирен."
 mexico_events.70.a: "Нужно их разбить."

### Military Democracy ###
 mexico_events.81.t: "Президентские выборы [GetYear] года"
 mexico_events.81.d: "В Мексике настало время новых президентских выборов. Срок [MEX.GetLeader] ограничен конституцией, и всем интересно, кто же станет новым Президентом?"
 mexico_events.81.a: "Вива демократия!"
 
 mexico_events.84.t: "Palacio Legislativo Federal"
 mexico_events.84.d: "Во время Порфириата, Диаз имел планы на строительство нового здания для Федерального Законодательного Органа, но Революция надолго отложила этот проект. Теперь, когда пыль улеглась, мы можем закончить работу и получить прекрасное новое здание для нашего правительства."
 mexico_events.84.a: "Наконец-то оно закончено"

### National Populist events ###
 mexico_events.100.t: "Отечество или La Raza"
 mexico_events.100.d: "Синархизм как идеология все еще в ранней стадии своего развития, а его цемент составляет неприятие либерализма и секуляризма. Под этим флагом есть и Легионаристы, следующие идеалам Железной Гвардии, и сторонники Ла Разы. Трения между ними вызывают их разные взгляды на расовую политику. Синархистская верхушка во главе с Сальвадором Абаскалем считают традиционную кастовую систему Мексики самым верным строем, как и роль Католических священников. Ла Раза, возглавляемые Хосе Васконселосом продвигают идею Испанской расы как истинный идеал Мексиканского патриотизма. Эти идеи больше походят на бразильский Интегрализм, нежели на Легионаризм. А тем временем из-за недовольной малой поддержки членов Ла Разы внутри назревает раскол. Что мы будем с этим делать?"
 mexico_events.100.a: "Нужно успокоить недовольных"
 mexico_events.100.b: "У них нет выбора, можно не вмешиваться"

 mexico_events.106.t: "Juventudes Sinarquistas"
 mexico_events.106.d: "Juventudes Sinarquistas - это молодежная организация, созданная [MEX.GetLeader]. Ее основное назначение в обучении детей идеалам Синархизм и традиционным католическим ценностям. По своей структуре она схожа со скаутами в других государствах и контролируется Мексиканским правительством. Juventudes Sinarquistas разделена на два крыла, для мальчиков и для девочек. Вся молодежь быстро зачисляется в эти ряды, и правительство может не беспокоиться об отступлениях от принятых идеалов."
 mexico_events.106.a: "Будущее в юности"
 
 mexico_events.108.t: "Завершение Реконкисты"
 mexico_events.108.d: "Толпы преданных сторонников синархистов и других собрались в Мехико, чтобы послушать речь Хосе Антонио Уркизы после того, как храбрые мексиканские войска отвоевали давно потерянные территории, уступленные по договору Гваделупа-Идальго. Быстро приняв меры после того, как Америка погрузилась в хаос, и мобилизовав столь элитную, столь многочисленную и столь захватывающую дух армию, долгие десятилетия американской тирании наконец-то закончились. Хотя эти недавно освобожденные земли еще десятилетия могут оставаться «американскими», Хосе Антонио Уркиза и его Синархический союз планируют распространить Синарквизм на обширные территории, которые теперь составляют современную Мексику.\n\nХосе Антонио Уркиза и несколько высокопоставленных мексиканских генералов объявили о планах полного освобождения континента от иностранной оккупации, чтобы еще больше оградить Мексику от иностранного влияния. Однако, какими методами он планирует распространить 'Испанидад' за пределы Мексики, пока неизвестно."
 mexico_events.108.a: "Годы унижений были отомщены!"

### General Flavor Events ###
 mexico_events.125.t: "Выход фильма 'Ahí está el detalle'"
 mexico_events.125.d: "Сегодня в прокат вышла новая комедия под названием 'Ahí está el detalle', в титрах которого такие люди как Кантинфлас, Хоакин Пардаве, Сара Гарсия, София Альварес и Долорес Камарилло. Фильм вдохновлен историей преступника Альваро Чапа и историями режиссера Хуана Бустилло Оро, работавшего адвокатом в Карселе-де-Белен. Фильм заслуженно получил высокие оценки критиков."
 mexico_events.125.a: "Кантифлас снова превзошел себя"
 
 mexico_events.126.t: "Выход фильма 'María Candelaria'"
 mexico_events.126.d: "Сегодня с оглушительным успехом в кинотеатрах начали прокат фильма 'María Candelaria'.  Это драма о жизни коренных народов Мексики, снятая Эмилио Фернандесом, с Долорес дель Рио и Педро Армендарисом в главных роях. Это был первый Мексиканский, да и вообще первый в Латинской Америке фильм, прокаченный на международном фестивале в Каннах, при этом получивший награду Гран-При."
 mexico_events.126.a: "Кино, которое всем стоит посмотреть"
 
 mexico_events.127.t: "Выход фильма 'Flor silvestre'"
 mexico_events.127.d: "Сегодня с оглушительным успехом вышел в прокат фильм 'Flor silvestre' (Дикий цветок). Это драма о сыне богатого землевладельца, вставшего на сторону Революции и женившегося на крестьянке. В фильме снялись Долорес дель Рио, Педро Армендарис и Мигель Анхель Ферриз, срежиссирован же он был Эмилио Фернандесом. Фильм был снят в сотрудничестве между режиссером, которого часто называют Эль-Индио, и Августином Финком, президентом 'Films Mundiales'. Дикий цветок был тепло встречен по Мексике,  это было отражено собранной фильмом кассой. Похоже, столь плодотворное сотрудничество продолжится."
 mexico_events.127.a: "Что они сделают дальше?"
 
 mexico_events.128.t: "Кубок Мексики 1939 года"
 mexico_events.128.d: "Кубок Мексики, национальный чемпионат страны, подходит к финальной игре между Астурией и Некаксой, и всех интересует, кто именно получит славу чемпиона?"
 mexico_events.128.a: "И победитель?"
 
 mexico_events.129.t: "Астурия победила"
 mexico_events.129.d: "Одержав победу со счетом 1-0, Астурия забирает Кубок Мексики. На улицах Мехико фанаты вовсю празднуют это событие."
 mexico_events.129.a: "Команда вновь на коне"
 
 mexico_events.130.t: "Некакса победила"
 mexico_events.130.d: "Это был захватывающий матч, и со счетом 2-1 Некакса победила и сохранила за собой Кубок Мексики. Чуть ли не весь город Агуаскальентес вышел на улицы, празднуя победу."
 mexico_events.130.a: "Кубок остался у сильнейших"
 
 mexico_events.131.t: "Эль-Санто выходит на ринг"
 mexico_events.131.d: "Сегодня на ринг вышел боец в маске под псевдонимом Эль Санто. Он победил в бою против восьми других бойцов одновременно, а акробатические пинки и броски стали его визитной карточкой. Эль Санто стал известен еще и за отказ снимать свою маску цвета серебра, закрывающую его лицо."
 mexico_events.131.a: "Серебряный Святой!"
 
 mexico_events.132.t: "Землетрясение в Оризабе 1937 года"
 mexico_events.132.d: "В Оризабе, Веракрус, произошло землетрясение силой до 7.3 по шкале Рихтера. В городе более 30 погибших и бесчисленное множество раненых, а толчки ощущались даже в Мехико. Президент [MEX.GetLeader] призвал народ на помощь пострадавшим в бедствии."
 mexico_events.132.a: "Reza por México"
 
 mexico_events.133.t: "Землетрясение в Эль-Сентро 1940 года"
 mexico_events.133.d: "Между штатом Калифорния США и регионом Нижняя Калифорния Мексики произошло землетрясение. Эпицентр находится в городе Эль-Сентро в Штатах, но также затронуло здания на Мексиканской стороне. 9 человек погибли, более 20 серьезно ранены, а суммарный ущерб превышает 6 миллионов долларов США. Землетрясение серьезно повредило ирригационную систему региона и последствия этого на фермах не заставят себя долго ждать. Это первое крупное землетрясение, которое было записано на сейсмограф-акселерометр, располагавшийся неподалеку от пострадавшего региона."
 mexico_events.133.a: "Неприятно"
 
 mexico_events.134.t: "Землетрясение в Колиме 1941 года"
 mexico_events.134.d: "Сильное землетрясение разрушило город Колима, убив более 90 человек и уничтожив более 8000 зданий. Вторичные толчки ощущались от Тихоокеанского побережья в соседних штатах Халиско и Мичоакан до самого Мехико-сити. За землетрясением последовали оползни, а правительство направило армию на помощь пострадавшим."
 mexico_events.134.a: "Reza por México"
 
 mexico_events.135.t: "Морелийские детки"
 mexico_events.135.d: "С самого начала гражданской войны в Соединенных Штатах в Мексику пробил путь ручей беженцев, ищущих укрытия от насилия и террора. Немалую часть этого потока составляют дети. Для помощи им правительство разворачивает программу по строительству домов, и большая часть этих домов строится в городе Морелия. Пресса уже прозвала будущих жителей 'Морелийскими детками'."
 mexico_events.135.a: "Беженцам нужно помогать"
 
 mexico_events.136.t: "Bohemia Poblana"
 mexico_events.136.d: "Bohemia Poblana - это группа людей, посвятивших себя повышению культурного уровня людей по всей Мексике. Они организуют поэтические концерты, выставки, конференции писателей, продвигают и спонсируют различные журналы, в том числе и свой рупор. Группа сперва стала известна за свои званые обеды в Пуэбле. На них приглашались известные и почетные люди, от поэтов до музыкантов и подобных творческих личностей."
 mexico_events.136.a: "Интересно"
 
 mexico_events.137.t: "[MEX.GetLeader] провозглашает Максимато"
 mexico_events.137.d: "Мексиканский революционер Эмилиано Сапата скончался, и с его смертью Мексика вновь погрузилась в хаос. В то время как наиболее горячо преданные члены правительства все еще верили в скорое выздоровление, борец за свободу и до сегодняшнего дня лидер Мексики оставил после себя вакуум власти, который будет нелегко исцелить.\n\nПосле смертельного выстрела Сапаты на улицах Мехико, клика под руководством лидера [MEX.GetLeader] стремительно двинулась вперед и захватила правительственные объекты и учреждения, обещая поднять мексиканский социализм на новую высоту."
 mexico_events.137.a: "Мексиканская демократия умерла, как и жила."
 mexico_events.137.b: "Революция продвигается."

 mexico_events.138.t: "Военные захватывают власть в Мексике"
 mexico_events.138.d: "Мексиканский революционер Эмилиано Сапата скончался, и с его смертью Мексика вновь погрузилась в хаос. В то время как самые горячо преданные члены правительства все еще верили в скорое выздоровление, борец за свободу и до сегодняшнего дня лидер Мексики оставил после себя вакуум власти, который будет нелегко преодолеть.\n\nВ разгар смертельного расстрела Сапаты на улицах Мехико, правые элементы в армии воспользовались своим шансом. Находясь в оппозиции к мексиканским правительствам с момента прихода к власти Обрегона, они теперь полностью контролируют Мексику и стремятся восстановить законное правление, чтобы остановить разгул хаоса."
 mexico_events.138.a: "Мексиканская демократия умерла, как и жила."
 mexico_events.138.b: "Наконец-то в Мексике будет наведен порядок."

 mexico_events.139.t: "Создание демократической коалиции в Мексике"
 mexico_events.139.d: "После недавней смерти мексиканского революционера Эмилиано Сапаты Мексика оказалась в вакууме власти с неясным руководством и неработающими правительственными структурами. Хотя самые горячо преданные члены правительства все еще верили в скорое выздоровление, смерть борца за свободу показала Мексике, что демократическое правительство, вдохновляемое синдикалистами, нуждается в серьезных реформах, чтобы продолжить свою деятельность.\n\nПосле смертельного выстрела Сапаты на улицах Мехико, коалиция демократических партий решила пойти на компромисс, в попытке обуздать насилие, которое терзает страну, и двигаться дальше к стабильности."
 mexico_events.139.a: "¡Viva México!"

### Foreign Events ###
 mexico_events.200.t: "[From.GetNameDefCap] хочет вступить в Интернационал"
 mexico_events.200.d: "Недавно просвещенные о преимуществах социалистического правительства, государство [From.GetNameDefCap] выдвинуло предложение об официальном входе страны в Интернационал. Полезен ли нам столь далекий союзник?"
 mexico_events.200.a: "Конечно! Приветствуем вас"
 mexico_events.200.b: "Они нам не нужны"
 
 mexico_events.201.t: "Отказ [From.GetNameDefCap]"
 mexico_events.201.d: "[From.GetAdjective]ое правительство отказало нам во вступлении в альянс. Возможно, мы недостаточно синдикалисты по их меркам, или просто не стоим того. В любом случае, ответ ясен - нет."
 mexico_events.201.a: "Неудачное решение с их стороны"
 
 mexico_events.202.t: "[From.GetNameDefCap] хочет вступить в Антанту"
 mexico_events.202.d: "[From.GetNameDefCap] отправили посла на встречу с Королем и премьер-министром для переговоров о вступлении в Антанту. Стоит ли принять [From.GetAdjective]ое предложение?"
 
 mexico_events.210.t: "Прибыло мексиканской снаряжение"
 mexico_events.210.d: "Дабы помочь нам в построении единой социалистической Центроамерики, наши товарищи из Мексики посылают нам снаряжение."
 mexico_events.210.a: "Viva la revolución!"
 
 mexico_events.212.t: "Мексика претендует на Центральную Америку"
 mexico_events.212.d: "Новое правительство мексиканских синархистов положило глаз на Центральную Америку. Они называют себя полноправными хозяевами этих земель, и вопрос о военном вторжении мексиканцев повис над всеми нами."
 mexico_events.212.a: "Безумцы, все до единого."
 
 mexico_events.213.t: "Мир с [FROM.GetNameDef]?"
 mexico_events.213.d: "После [FROM.GetAdjective]ой победы на коста-риканской территории, наши офицеры морской пехоты посоветовали нам искать мирное урегулирование конфликта, так как кампания против Америки оказалась бы для нас слишком дорогостоящей и не принесла бы никакой пользы. Как мы должны реагировать?"
 mexico_events.213.a: "Центральная Америка не стоит этих проблем."
 mexico_events.213.b: "Ерунда, [ROOT.GetFactionName] защищает своих союзников!"
 
 mexico_events.214.t: "[FROM.GetNameDefCap] предлагает мир"
 mexico_events.214.d: "После нашей победы в Центральной Америке, [FROM.GetAdjective]ое правительство наконец-то увидели надпись на стене и обратились к нам с просьбой подписать мирное соглашение, отказавшись от конфликта и оставив Центральную Америку в нашем владении. Как мы должны реагировать?"
 mexico_events.214.a: "Принять их условия"
 mexico_events.214.b: "Никаких сделок с империалистами!"
 
 mexico_events.215.t: "[FROM.GetNameDefCap] отказывается от мира"
 mexico_events.215.d: "Неожиданно, [FROM.GetAdjective]ое правительство решило отказаться от нашего предложения о мире и настаивали на том, что они останутся в состоянии войны на обозримое будущее. Хотя крайне маловероятно, что они планируют начать трансатлантическую операцию, мы все же должны следить за тем, чтобы они не решили помочь нашим врагам...."
 mexico_events.215.a: "Они будут сожалеть об этом."
 
 mexico_events.500.t: "Мексика угрожает нам"
 mexico_events.500.d: "По мере того как наша молодая страна выходит на международную арену, мы уже окружены стервятниками оппортунистического толка, которые стремятся притеснить нас. Мексиканское правительство отказывается признать наше правительство законным, и наши доклады свидетельствуют о том, что они собирают свои войска на наших границах, очевидно, с намерением вести против нас войну. Мы должны подготовиться, если хотим одержать победу..."
 mexico_events.500.a: "К оружию!" 
 
 ### Cristero & Campesino War events ###
 mexican_civil_war_events.1.t: "Начало войны с [MEX_rebel_type]"
 mexican_civil_war_events.1.d.campesino: "Приход к власти военной хунты после смерти Сапаты вызвал недовольство населения. Это особенно заметно среди сельской бедноты, которая поддержала реформы Сапаты. Панчо Вилья и Рубен Харамильо начали кампанию против военной хунты и за восстановление революционной демократии. Не похоже, что это закончится в ближайшее время."
 mexican_civil_war_events.1.d.cristero: "Священники, монахини и миряне, возмущенные законами, введенными Кальесом, взялись за оружие. В Центральной Америке некоторые из этих людей объединились в так называемую \"армию Кристеро\", которая борется за свою христианскую веру силой оружия. Кальес призвал уничтожить их как угрозу Мексике."
 mexican_civil_war_events.1.a: "Порядок в Мексике должен быть восстановлен."
 mexican_civil_war_events.1.b: "Мы будем защищать революцию."

 mexican_civil_war_events.2.t.defeat: "Победа [MEX_rebel_type_plural]"
 mexican_civil_war_events.2.t.victory: "Федеральное правительство одерживает победу"
 mexican_civil_war_events.2.d.calles_defeat: "Произошло немыслимое, и сегодня в Мехико знамя Кристерос развевается вместе со знаменем Мексики. Они взяли под свой контроль правительство и пообещали создать новую и лучшую Мексику."
 mexican_civil_war_events.2.d.reactionary_defeat: "Панчо Вилья и Рубен Харамильо вошли в Мехико как герои. Военная хунта, правившая Мексикой после смерти Сапаты, распущена. Они заявили, что идеалы революции не умерли, а подверглись испытанию, и что они будут работать над мерами предосторожности, чтобы предотвратить появление новой хунты в будущем. Кроме того, они заявили, что в ближайшем будущем проведут новые президентские выборы."
 mexican_civil_war_events.2.d.calles_victory: "Наконец-то армия террористов уничтожена. Хотя в стране все еще продолжаются стычки, в Мексике наконец восстановлен порядок. Президент [мексиканский лидер] испытывает облегчение от того, что его враги наконец уничтожены."
 mexican_civil_war_events.2.d.reactionary_victory: "С мятежниками покончено, и порядок в стране восстановлен.Большинство мексиканцев считают, что [MEX.GetLeader] герой, ведь он положил конец мятежу и восстановил закон и порядок в стране."
 mexican_civil_war_events.2.a: "¡Viva Cristo Rey! ¡Viva México!"
 mexican_civil_war_events.2.b: "Революция была спасена."
 mexican_civil_war_events.2.c: "Порядок был восстановлен."

 mexican_civil_war_events.3.t: "Протесты против антирелигиозных законов"
 mexican_civil_war_events.3.d: "Неприкрытая враждебность президента Кальеса по отношению к Церкви нажила ему множество врагов, особенно среди мексиканских верующих. Но поскольку раны, нанесенные кампесинской войной, все еще были в процессе заживления, а самые рьяные реакционеры были уничтожены всего несколько месяцев назад, никакое организованное сопротивление, достаточно сильное, чтобы свергнуть правительство, не могло собраться.Тем не менее, протесты вспыхнули как в городах, так и в сельской местности, и акты сопротивления со стороны многих священников и монахинь можно наблюдать по всей Мексике, что побуждает правительство реагировать, часто с применением силы."
 mexican_civil_war_events.3.a: "МЫ должны идти вперед."

 mexican_civil_war_events.10.t: "Война с [MEX_rebel_type] - столкновения по всей стране"
 mexican_civil_war_events.10.d: "Боевые действия вспыхнули на большей части территории страны. К счастью, различные города находятся под федеральным контролем, однако многие более мелкие населенные пункты перешли под так контроль так называемых [MEX_rebel_type]. Не похоже, что этот конфликт закончится в ближайшее время."
 mexican_civil_war_events.10.a: "Мы уничтожим врагов революции."
 mexican_civil_war_events.10.b: "Закон и порядок будут восстановлены."

 mexican_civil_war_events.11.t: "Война с [MEX_rebel_type] - фабричный саботаж"
 mexican_civil_war_events.11.d: "Сегодня диверсанты [MEX_rebel_type] напали на фабрику, причинив огромный ущерб и унеся много жизней. Федеральные власти работают над тем, чтобы остановить это, а один из местных офицеров мексиканской армии поклялся уничтожить этих террористов."
 mexican_civil_war_events.11.a: "Мы должны сокрушить этих мятежников."

 mexican_civil_war_events.12.t: "Война с [MEX_rebel_type] - налет на военный завод"
 mexican_civil_war_events.12.d: "Боевики [MEX_rebel_type] совершили налет на оружейный завод, что помешало нам производить оружие и привело к гибели многих людей. Уже предпринимаются усилия по возобновлению работы завода, чтобы обеспечить снабжение наших войск в борьбе с этими бандитами."
 #mexican_civil_war_events.11.a

 mexican_civil_war_events.13.t: "Война с [MEX_rebel_type] - атака на железные дороги"
 mexican_civil_war_events.13.d: "Боевики [MEX_rebel_type] взорвали серию бомб, причинив значительный ущерб железным дорогам, уничтожив множество поездов и унося жизни бесчисленного количества невинных людей."
 #mexican_civil_war_events.11.a

 mexican_civil_war_events.14.t: "Война с[MEX_rebel_type] - боестолкновения с армией"
 mexican_civil_war_events.14.d: "Сегодня произошло сражение, которое стоило жизни нескольким солдатам мексиканской армии, а также [MEX_rebel_type]. Это всего лишь еще одно сражение в кровавой борьбе с террористами [MEX_rebel_type]. Эта конкретная битва была выиграна..."
 mexican_civil_war_events.14.a: "Мексиканской армией."
 mexican_civil_war_events.14.b: "Армией [MEX_rebel_type]."

 mexican_civil_war_events.15.t: "Война с Кристерос - Битва при Тепатитлане"
 mexican_civil_war_events.15.d: "Недалеко от города Тепатитлан, который был захвачен армией Кристеро, федеральная армия Мексики предприняла штурм города. Однако вскоре стало очевидно, что это будет кровопролитное сражение. У Пабло Родригеса, офицера, возглавляющего атаку, есть два варианта. Он может отступить, что может позволить ему убить командира кристеро, или же он может продолжить наступление, а их командир отступит, что приведет к увеличению издержек."
 mexican_civil_war_events.15.a: "Город остается под контролем Кристерос."
 mexican_civil_war_events.15.b: "Город захвачен."

 mexican_civil_war_events.16.t: "Война с кристеро - битва при Эль-Фреснале"
 mexican_civil_war_events.16.d: "Мексиканская армия столкнулась с армией Кристеро близ города Эль-Фреснал, где скрываются кристеро. Хесус Феррейра, командующий мексиканской армией, ответственный за атаку, считает, что он может выбить их оттуда; однако он также знает, что это будет кровопролитная битва. В конце концов, однако..."
 mexican_civil_war_events.16.a: "... победили кристерос."
 mexican_civil_war_events.16.b: "... победила мексиканская армия."

 mexican_civil_war_events.17.t: "Война с кристеро - Битва при Эль-Френале"
 mexican_civil_war_events.17.d: "Армия Кристеро стремится захватить город Мансанильо. Гелиодоро Чарис Кастро, командующий войсками в регионе, сосредоточился на удержании города. Армия Кристеро многочисленнее и, похоже, может взять город. Однако в этом районе находится корабль, который атакует армию Кристеро. Вопрос в том, будут ли они сосредоточены на захвате города или уничтожении корабля."
 mexican_civil_war_events.17.a: "Город взят."
 mexican_civil_war_events.17.b: "Атака Кристеро отбита."

 mexican_civil_war_events.18.t: "Война с кампесино - Битва при Гвадалахаре"
 mexican_civil_war_events.18.d: "Мексиканской армии противостоит так называемая Армия освобождения, возглавляемая Панчо Вильей, которая стремится захватить город Гвадалахара. Командующий мексиканской армией Педро Охеда готовится к обороне города, однако он опасается, что независимо от исхода, это будет кровопролитная битва. Когда кровь и пыль улягутся, победа будет за..."
 mexican_civil_war_events.18.a: "Армией освобождения."
 mexican_civil_war_events.18.b: "Мексиканской армией."

 mexican_civil_war_events.19.t: "Война с кампесинос - Битва при Селайи"
 mexican_civil_war_events.19.d: "Мексиканская армия столкнулась с армией кампесино близ города Селайя, где скрываются кампесинос. Хесус Феррейра, командующий мексиканской армией, ответственный за атаку, считает, что сможет выбить их оттуда, однако он также знает, что это будет кровопролитная битва. В конце концов, хотя..."
 mexican_civil_war_events.19.a: "Победа кампесинос."
 mexican_civil_war_events.19.b: "Победа мексиканской армии."

##Army Generals##
 MEX_emiliano_zapata_salazar_commander_desc: "§YОписание генерала\nРодился:§! §gАвгуст 8, в Аннекуилко, Морелос, Мексика\n§YВоенная карьера:§! §gВоенная карьера Эмилиано Сапаты Салазара началась вскоре после начала его политической деятельности, когда он был насильно призван в 9-й кавалерийский полк под командованием Альфонсо Прадильо в 1908 году, где он начал испытывать на себе преимущества и недостатки военной жизни. С вступлением в силу Плана Сан Луис и смертью Пабло Торреса Бургоса, Эмилиано был выбран Южной Революционной Хунтой в качестве нового революционного вождя Южной Мадеристской Армии. Его первым планом действий был захват Куаутлы у сил Порфиристы, который прошел успешно, несмотря на тяжелые потери. Чтобы увеличить набор в армию, он обещал каждому солдату, который записался с ним в обмен на помощь в революции, кусок пахотной земли для себя, и эта тактика оказалась чрезвычайно успешной среди лишенных гражданских прав крестьян мексиканской деревни."
 MEX_francisco_pancho_villa_commander_desc: "§YОписание генерала\nРодился:§! §gИюнь 5, 1878 года в Сан-Хуан-дель-Рио, Керетаро, Мексика\n§YВоенная карьера:§! §gХосе Доротео Аранго Арамбула, более известный под своим псевдонимом Франсиско Вилья или  'Панчо Вилья', стал живой легендой для народа Мексики. Он начал свое приключение, когда Лауреано Лопес Негрете, владелец ранчо Сомбретильо, где работала Доротео, надругался над его старшей сестрой. В отместку он застрелил Лауреано, а затем скрылся от властей, после чего скрылся в близлежащих горах, где его нашла банда бандитов во главе с человеком по имени Франсиско Вилья. Он сопровождал бандитов в течение многих лет, совершая набеги и грабя вокруг Дуранго, пока Франсиско Вилья не был застрелен в перестрелке, и назначил Доротео своим преемником, чтобы возглавить банду. Тогда Доротео принял имя своего спасителя и продолжил свою преступную деятельность. Когда руководство бандой было обеспечено, Вилья решил объединить усилия с Игнасио Паррой и начал свои попытки остановить, иногда насильственно, злоупотребления, совершаемые помещиками по отношению к крестьянам в Чиуауа. В конце 1910 года он присоединился к движению Мадериста, и благодаря хитрости и храбрости 'Панчо Вилья' достиг высших чинов мексиканской революционной армии с прозвищем 'Кентавр Севера' и даже сумел вскоре стать губернатором Чиуауа. Он разозлил американское правительство в 1916 году после нападения на маленький городок Колумбус в Нью-Мексико, что привело к карательной экспедиции во главе с Джоном Першингом, который так и не смог поймать Вилью, несмотря на все его усилия. С тех пор Вилья играл важную роль в революционной армии и политике Мексики. Он уважаемый член Генерального штаба, хотя в последнее время его видели больше занимающимся политикой, чем изучением военной стратегии.\n§YВажные замечания:§L-член и один из главных кандидатов Национальной аграрной партии."
 MEX_plutarco_elias_calles_commander_desc: "§YОписание генерала\nРодился:§! §gСентябрь 25, 1877, в Гуайнасе, Сонора, Мексика\n§YВоенная карьера:§! §gФрансиско Плутарко Элиас Кампусано, родившийся в семье помещика, окончил школу в качестве учителя в 1894 году и посвятил себя своей преподавательской профессии в Эрмосильо и Гуайнасе, пытаясь управлять семейным бизнесом. Когда он переехал в Агуа-Приета, губернатор Хосе Мария Майторена назначил его заместителем. После Трагической Декады Кальес начал вербовать людей из Агуа-Приета, чтобы противостоять Викториано Уэрте, и в 1913 году присоединится к революционным силам для борьбы. Кальес оказался под прямым командованием Альваро Обрегона и к концу 1913 года стал полковником и командиром Эрмосильо. В октябре 1914 года Кальес успешно оборонял город Нако в течение трех месяцев, сумев продержаться вопреки всему, и благодаря этому к февралю 1915 года он был превращен в бригадного генерала. С успехом плана де Агуа Приета и приходом к власти Обрегона Кальес стал его заместителем и стал жизненно важным членом штаба на долгие годы, хотя в последние годы он все больше увлекался политикой.\n§YВажные замечания:§L- Член и один из главных кандидатов Национальной революционной партии.\n -У него очень строгие моральные нормы, и он видит как алкоголь, так и религию опасными для ума как своих солдат, так и своего народа."
 MEX_juan_gonzales_cabral_commander_desc: "§YОписание генерала\nРодился:§! §gАпрель 3, 1883, в Минас-Приетас, Сонора, Мексика\n§YВоенная карьера:§! §gХуан немецкий Кабрал работал шахтером прежде чем достичь двадцати лет, после чего он переехал в Кананеу, участвуя в всеобщей забастовке 1906 года, где он встретил своих будущих соратников в мексиканской революции. Он был одним из первых революционеров, поднявших оружие против Порфирио Диаса, и принял участие в нескольких ранних сражениях революции. В мае 1911 года он взял Кананею и Нако, и благодаря этому сам Франсиско Мадеро был возведен в звание полковника кавалерии. Он станет командующим в феврале 1912 года, а в 1913 году присоединится к войскам Викториано Уэрты. Затем он был выбран для проведения операций с низким риском и был выбран военным губернатором Обрегона как более миролюбивый человек, чем его коллеги, такие как Майторена и Кальес. С тех пор он принял участие в нескольких дипломатических миссиях в других южноамериканских странах и остается очень уважаемым членом штаба, будучи известен как 'самый чистый военный человек революции'."
 MEX_pablo_quiroga_escamilla_commander_desc: "§YОписание генерала\nРодился:§! §gИюнь 7, 1875, в Сьенага-де-Флорэс, Новый Леон, Мексика\n§YВоенная карьера:§! §gПабло Кирога Эскамилья вошел в состав конституционной армии в 1913 году и находился под командованием Мануэля М. Дьегеса. Вместе с корпусом добровольцев и 13-м батальоном улан, Эскамилла возглавил несколько экспедиций в Соноре, Синалоа, Наярит и Халиско. Он участвовал в битве при Санта-Росе, осаде Гуаймаса и сражался за Оредайн. Он получил звание полковника в 1914 году, участвуя в еще одной серии операций в Силао-и-Тринидаде, Гуанахуато, Керетаро и Дуранго. В 1915 году он получил звание бригадного генерала и примет участие еще в 25 экспедициях на протяжении всей революции и в послереволюционную эпоху. Будучи опытным членом генерального штаба, он медленно, но верно терял интерес к своей военной карьере и, возможно, вскоре захочет уйти в отставку."
 MEX_joaquin_amaro_dominguez_commander_desc: "§YОписание генерала\nРодился:§! §gАвгуст 16, 1889, в Сомбререте, Сакатекас, Мексика\n§YВоенная карьера:§! §gХоакин Амаро Домингес родился в семьи коренного населения Мексики, и он был среди первых революционеров из Мичоакана подняв оружие против правительства. Первоначально он находился под командованием Гертрудиса Г. Санчеза, но постоянно переходил на другую сторону во время революции, пока не присоединился к оперативной армии под командованием Альваро Обрегона. Он был награжден За храбрость в битве при Селайе. В 1916 году он сражался в Морелосе и Мехико против Запатистких сил, казнив нескольких мирных жителей, опасаясь, что они предадут войска Обрегона. В 1918 году он действовал в Дуранго и Чиуауа против Виллистов, а в 1920 году присоединился к плану Агуа Приета, который повысил его в ранг бригадного генерала. С тех пор он был назначен директором военного образования в Heroico Colegio Militar, и с тех пор он занимал свой пост, поощряя дисциплину и техническую экспертизу над сырой рабочей силой, а также пропагандировал спортивные и культурные мероприятия через популярные библиотеки в казармах.\n§YВажные замечания:§L-его отношения как с Сапатой, так и с Вильей в лучшем случае кислые. Борьба с ними во время революции заставила Хоакина очень настороженно относиться к своим новым коллегам."
 MEX_francisco_luis_urquizo_benavides_commander_desc: "§YОписание генерала\nРодился:§! §gИюнь 21, 1891, в городе Сан Педро де Лас Колинас, Коауила, Мексика\n§YВоенная карьера:§! §gФранциско Луис Бенавидес Уркизо присоединился к революции в 1911 году в Коахиле по приказу Эмилио Мадеро, где он позже будет назначен бойцом личной гвардии Франсиско Мадеро, сражаясь бок о бок с Мадеро в Трагической Декаде. После смерти Мадеро Уркисо бежал из Мехико и присоединился к войскам Каррансы, организовав добровольческий саперный батальон из сограждан Коауилы. Со своим батальоном он  сражался и захватил Канделу и Каррансу, он примял участие в захвате Торреона и помог в нападении на Северную дивизию Монтеррея Франсиско Вильи. В 1916 году он был произведен в бригадные генералы и занял несколько важных государственных постов в Веракрусе, основав штабную Академию как продолжение Heroico Colegio Militar. Он присоединится к плану Агуа Приета и будет преданно служить Обрегону в усилиях по стабилизации постреволюционной эпохи. Плодовитый писатель, он проводил свое свободное время, сочиняя рассказы о своих приключениях во время революции и пересказывая события, которые навсегда изменили Мексику."
 MEX_pablo_macias_valenzuela_commander_desc: "§YОписание генерала\nРодился:§! §gНоябрь 15, 1891, в Лас-Кабрас-де-Эль-Фуэрте, Синалоа, Мексика\n§YВоенная карьера:§! §gПабло Валенсуэла Масиас вошел в штаб мексиканских революционеров в 1912 году, где он был перенесен на север и получил звание лейтенанта 4-го батальона  Сонора под непосредственным командованием Альваро Обрегона. Во время своей военной деятельности он получил свои должности, поднимаясь по служебной лестнице За заслуги в кампании. Среди наиболее важных должностей, которые он занимал до сих пор, - начальник военных операций в штате Наярит, Северном округе Нижней Калифорнии и штате Синалоа; начальник 4-го, 7-го, 9-го, 10-го и 24-го штабов военных операций; начальник 9-й и 17-й военных зон и командующий 15-й и 29-й военными зонами. Хотя он не так закален в боях, как его коллеги, его административные навыки не подвергаются сомнению.\n§YВажные замечания:§L - Член Национальной революционной партии."
 MEX_abelardo_rodriguez_lujan_commander_desc: "§YОписание генерала\nРодился:§! §gМай 12, 1889, в Гуйамасе, Сонора, Мексика\n§YВоенная карьера:§! §gАбелардо Родригес Лухан, который принял более американизированное имя после временного переезда в Америку в 1906 году под именем Абелардо л. Родригес, вернулся в Мексику в 1912 году и был застигнут в разгар Революции. Он был завербован для участия в революции в марте 1913 года под командованием Обрегона и быстро поднялся по служебной лестнице, приняв участие в захвате Кульякана, кампании Бахио, подавлении восстания яки в Соноре и борьбе с Сапатистами в других местах. В 1916 году он был произведен в полковники, а позже принял участие в 'плане Агуа Приета', который принес ему достаточно престижа, чтобы стать военным губернатором Нижней Калифорнии до 1930 года. С тех пор он посвятил себя преподаванию в Heroico Colegio Military, где совсем недавно был повышен до бригадного генерала."
 MEX_maximino_avila_camacho_commander_desc: "§YОписание генерала\nРодился:§! §gАвгуст 23, 1891, в Тесьютлане, Пуэбла, Мексика\n§YВоенная карьера:§! §gМаксимино Авила Камачо присоединились к революции, как обычный призывник, и с тех пор медленно поднялся по карьерной лестнице. В 20-е годы он решил присоединиться к Heroico Colegio Militar, чтобы изучать военную стратегию, и недавно окончил ее и поступил в Генеральный штаб. В целом неопытный, но верный генерал.\n§YВажные замечания:§L- Член Лейбористской партии Мексики."
 MEX_manuel_perez_trevino_commander_desc: "§YОписание генерала\nРодился:§! §gJune 5th, 1890, в Вилья-де-Герреро, Коауила, Мексика§!\n§YВоенная карьера:§! §gНедавно получивший звание дивизионного генерала, он последовательно отстаивал свои революционные идеалы. Изначально студент инженерного факультета, он присоединился к революционерам и служил на артиллерийских позициях под руководством консервативного генерала Пабло Гонсалеса Гарсы. Позднее, в 1920-е годы, благодаря общению с умеренными президентами, он поднялся по политической лестнице и даже вошел в президентский кабинет, но с приходом к власти радикального президента Сапаты его известность пошла на убыль. Теперь Тревиньо вступил в сговор с Гонсалесом Гарсой, чтобы свергнуть радикальный 'синдикалистский' строй и раз и навсегда исправить ход революции в соответствии с 'подлинными мексиканскими революционными ценностями'.§!\n\n§YЗаметки: В 1920-х годах он прославился тем, что якобы разработал пушку Тревиньо, что первоначально воспринималось как великое патриотическое достижение. Однако вскоре выяснилось, что эта пушка была не более чем ловко замаскированной адаптацией старой французской конструкции, к его вечному стыду."

### Characters ###
 MEX_plutarco_elias_calles: "Плутарко Элиас Кальес"
 MEX_plutarco_elias_calles_leader_desc: "Плутарко Кальес захватил бразды правления Мексикой. И хотя тоталитаризм и антиклерикализм весьма характерны и для других социалистических фракций Мексики, его ярый отказ от продолжения аграрной политики Сапаты и желание полностью интегрировать индейцев в мексиканскую культуру делают Кальеса очень радикальным тоталистом."

 MEX_lazaro_cardenas_del_rio: "Ласаро Карденас дель Рио"
 MEX_lazaro_cardenas_del_rio_leader_desc: "Ласаро Карденас, умеренный политик, победил на президентских выборах. Его политическая программа направлена на примирение левых и правых сил и создание компромиссной коалиции для стабильности будущего Мексики."
 
 MEX_emilio_candido_portes_gil: "Эмилио Кандидо Портес Хиль"
 MEX_abelardo_rodriguez_lujan: "Абелардо Родригес Лухан"
 
 MEX_vicente_lombardo_toledano: "Висенте Ломбардо Толедано"
 MEX_vicente_lombardo_toledano_leader_desc: "Висенте Толедано, персональный советник президента Сапаты, занял его пост. Он предлагает компромисс между традиционным европейским социализмом и мексиканским аграризом, но также ратует за массовую индустриализацию и централизацию эхидос."
 
 MEX_fidel_velazquez_sanchez: "Фидель Веласкес Санчес"
 MEX_rosendo_salazar_alamo: "Росендо Саласар Аламо"
 
 MEX_emiliano_zapata_salazar: "Эмилиано Сапата Саласар"
 MEX_emiliano_zapata_salazar_leader_desc: "Эмилиано Сапата, герой мексиканской революции, победил на президентских выборах в 1932 году. С этого самого момента он много сил посвятил созданию коллективных хозяйств, эхидос, а также сближению Мексики с Третьим Интернационалом. Сапата, однако, вынужден отбиваться от давления и критики как собратьев-социалистов, так и от остатков прежнего буржуазного режима."

 MEX_francisco_pancho_villa: "Франсиско 'Панчо' Вилья"
 MEX_francisco_pancho_villa_leader_desc: "Франциско 'Панчо' Вилья вошёл в историю как знаменитый полководец и генерал времён революции, чей тактический гений наносил поражения войскам диктатора Уэрты в самых неожиданных боях. Вилья, хоть и не всегда соглашался с Сапатой в вопросах политики, стремится продолжать его аграрные реформы и развивать эхидос."
 
 MEX_antonio_irineo_vilarreal_gonzalez: "Антонио Иринео Вильярреаль Гонсалес"
 MEX_ruben_jaramillo_menez: "Рубен Харамильо Мендес"
 MEX_pascual_ortiz_rubio: "Паскуаль Ортис Рубио"
 MEX_manuel_avila_camacho: "Мануэль Авила Камачо"
 MEX_miguel_aleman_valdes: "Мигель Алеман Вальдес"
 MEX_juan_andreu_almazan: "Хуан Андреу Альмасан"
 
 MEX_pablo_gonzalez_garza: "Пабло Гонсалес Гарса"
 MEX_pablo_gonzalez_garza_leader_desc: "Генерал Пабло Гонсалес Гарса раньше был ярым соратником президента Карранзы. После смерти друга и прихода к власти Обрегона, Гарса пустился в бега, ожидая удобного момента, когда он сможет очистить родную Мексику от красной заразы. Недавний военный переворот показал, что недавние политические события были тем самым моментом. Теперь, Гарса возглавляет военную хунту, чья политика полностью расходится с политикой прежних левых сил."
 
 MEX_jose_antonio_urquiza: "Хосе Антонио Уркиса"
 MEX_jose_antonio_urquiza_leader_desc: "Хосе Антонио Уркиса, ревностный католик и противник социализма, обставил всех своих подельников-военных и теперь занял пост президента. Уркиса и его синархизм направлены на возвращение власти церкви и построении настоящего католического государства, идеологией которого станет вера в Бога."
 
