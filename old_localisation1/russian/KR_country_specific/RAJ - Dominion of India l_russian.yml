### Ideas ###
 RAJ_bombay_pact_idea: "Бомбейский Пакт"
 RAJ_bombay_pact_idea_desc: "После Индийской Революции южные князья, опасаясь полного краха старого порядка под натиском социализма, решили провозгласить независимость от Британской Индии в качестве объединенной федерации. [HND.GetNameDefCap], однако, отказались признать это заявление и продолжат свои попытки захватить юг, несмотря ни на что. Это перенапряжение позволило бы британским индийским войскам провести реорганизацию на Западе, ослабив опасения по поводу их развала, и в конечном итоге завело бы войну в тупик и привело бы к нелегкому прекращению огня.После провозглашения независимости обе стороны быстро осознали бы, что им придется работать сообща в случае возобновления войны.\n\nВ то время как неофициальное сотрудничество продолжалось в следующие годы, возросшая воинственность социалистов привела к подписанию в 1933 году официального оборонительного союза, известного как Бомбейский пакт. В рамках этого альянса обе стороны договорились значительно расширить текущее военное сотрудничество между ними и пообещали прийти друг другу на помощь в случае любых новых вторжений социалистов.\n\nОднако важно отметить, что не было согласовано никакого официального признания независимости Федерации или планов относительно того, как Индия будет реорганизована в случае поражения Бхаратцев.\n§RПоэтому широко распространено мнение, что после поражения социалистов в Калькутте Бомбейский пакт просто перерастет в дальнейший конфликт между двумя подписавшими его сторонами§!."
 RAJ_rural_poverty: "Всеобщая бедность в сельской местности"
 RAJ_rural_poverty_desc: "Даже до революции и последующей гражданской войны Индия была страной, живущей в условиях крайней нищеты, а ее население, в основном, сельское, было значительно более обездоленным, чем в других странах, находящихся под властью британской короны. В сочетании с разрушениями, вызванными гражданской войной, Индия находится в шокирующей отсталости."
 RAJ_princely_power: "Власть раджей"
 RAJ_princely_power_desc: "Доминион остался на своём месте лишь благодаря верности северных князей. Вроде как они подчиняются центральному правительству, однако это подчинение крайне архаично. Малейшие постановления сверху выполняются крайне долго."
 RAJ_indian_expeditionary_force: "Индийский экспедиционный корпус"
 RAJ_indian_expeditionary_force_desc: "Будучи не в состоянии полностью задействовать все свои армии в войне, руководство альянса Антанты организовало крупный экспедиционный корпус, чтобы помочь доминиону Индии в возобновившейся гражданской войне в Индии."
 RAJ_black_monday: "Влияние Черного Понедельника"
 RAJ_black_monday_desc: "Крах Берлинской фондовой биржи нанес удар по нашей экономике. Это привело к сокращению экспорта  нашего сельского хозяйства и промышленности, и нанесло удар по целостности правительства."
 RAJ_agricultural_tariffs_idea: "Ввод тарифов на с/х продукты"
 RAJ_agricultural_tariffs_idea_desc: "Чтобы лучше защитить нашу внутреннюю базу, были введены жесткие тарифы на всю импортируемую сельскохозяйственную продукцию."
 RAJ_improved_wage_standards: "Увелечение минимальной зарплаты"
 RAJ_improved_wage_standards_desc: "В попытке стабилизировать как экономику, так и политическую ситуацию, Доминион Индия принял Закон о выплате заработной платы, чтобы защитить работников от несправедливой оплаты труда."
 RAJ_industrialisation_drive_idea: "Стремление к индустриализации"
 RAJ_industrialisation_drive_idea_desc: "Стремясь привести нашу промышленную базу в соответствие с современными стандартами, правительство объявило об уделении особого внимания индустриализации. Однако последствия этого, вероятно, постепенно укрепят позиции Либеральной партии Индии и Всеиндийской партии самоуправления."

 RAJ_karachi_strike: "Забастовка в Карачи"
 RAJ_karachi_strike_desc: "В ответ на невыплату заработной платы и угрозу увольнений докеры в главном порту Доминиона-Карачи начали масштабные забастовки. В надежде заставить правительство пойти на уступки в области охраны труда торговля через порт практически полностью прекратилась, а рыбопромысловые порты, такие как Дамб, были спешно перепрофилированы для обработки самых срочных грузов."

 RAJ_expanded_gurkha_rifles: "Расширенный гуркхский стрелковый корпус"
 RAJ_expanded_gurkha_rifles_desc: "В гуркхские стрелковые полки вкладываются значительные средства с целью создания более элитных и профессиональных подразделений для армии."
 RAJ_empowered_young_guard: "Наделенная полномочиями Молодая Гвардия"
 RAJ_empowered_young_guard_desc: "С уходом в отставку бывшего главнокомандующего Филипа Уолхауза Четвода реформистски настроенная т.н "Молодая гвардия армии Доминиона" стала доминировать в доктринальных дисскусиях. Они выступают за создание армии, основанной на мобильности, полагаясь на помощь своих союзников по Антанте, которая даст им преимущество перед соперниками."
 RAJ_nascent_motor_industry: "Nascent Motor Industry"
 RAJ_nascent_motor_industry_desc: "В Индии всегда не было собственной промышленности по производству автомобилей, особенно после того, как разрушения, вызванные гражданской войной, отпугнули любые внешние инвестиции в эту отрасль. Однако теперь, имея прямые военные контракты с вооруженными силами Доминиона, автомобильные компании начали осуществлять свою деятельность в Лахоре, чтобы удовлетворить потребности Доминиона в военной технике."
 RAJ_immovable_objects_idea: "Неподвижные цели"
 RAJ_immovable_objects_idea_desc: "В рамках своих попыток создать надлежащие танковые силы армия Доминиона решила сосредоточиться на тяжелобронированных машинах, полагая, что эти тихоходные чудовища дадут им необходимое преимущество."
 RAJ_immortal_bulwarks_idea: "Неприступные бастионы"
 RAJ_immortal_bulwarks_idea_desc: "$RAJ_immovable_objects_idea_desc$"
 RAJ_unstoppable_forces_idea: "Неостановимая сила"
 RAJ_unstoppable_forces_idea_desc: "В рамках своих попыток создать надлежащие танковые силы армия Доминиона решила сосредоточиться на легких и быстрых танках, полагая, что такая скорость даст им значительное преимущество по сравнению с более тяжелыми бронированными машинами."
 RAJ_steel_dragoons_idea: "Железные драгуны"
 RAJ_steel_dragoons_idea_desc: "$RAJ_unstoppable_forces_idea_desc$"
 RAJ_the_pragmatic_approach: "Прагматичный подход"
 RAJ_the_pragmatic_approach_desc: "Вместо того чтобы уступить место "Молодой гвардии", генерал-губернатор подтвердил, что главнокомандующий Филипп Уолхауз Четвод. Есть надежда, что та же тактика, которая предотвратила полное уничтожение Раджа много лет назад, теперь приведет к тому, что его преемник восстанет из пепла."
 RAJ_indian_martial_culture: "Индийская боевая культура"
 RAJ_indian_martial_culture_desc: "Пытаясь повторить успехи гуркхов в индийской армии, вооруженные силы Доминиона приступили к дальнейшему реформированию бригад так называемых \"Боевых народов\", чтобы, как мы надеемся, привести их к тем же стандартам, что и у гуркхов."
 RAJ_streamlined_small_arms_production_idea: "Оптимизированное производство стрелкового оружия"
 RAJ_streamlined_small_arms_production_idea_desc: "Потеря Ишапора во время Индийской Революции стала тяжелым ударом для британских вооруженных сил, и в межвоенный период было создано множество небольших предприятий взамен утраченного завода. Эти сколоченные вместе заводы уже давно были признаны неоптимизированными и ветхими, и поэтому в рамках усилий по реформированию эти предприятия были национализированы в попытках упорядочить и оптимизировать производство стрелкового оружия."
 RAJ_the_chetwode_motto_idea: "Девиз Четвуда"
 RAJ_the_chetwode_motto_idea_desc: "$RAJ_the_pragmatic_approach_desc$"
 RAJ_the_most_feared_army_of_the_entente_idea: "Самая страшная армия Антанты"
 RAJ_the_most_feared_army_of_the_entente_idea_desc: "$RAJ_the_pragmatic_approach_desc$"

 RAJ_subsidised_domestic_air_industry_idea: "Спонсируемая авиапромышленность"
 RAJ_subsidised_domestic_air_industry_idea_desc: "В рамках стремления превратить военно-воздушные силы Доминиона в крупную силу, с которой следует считаться, авиастроительным компаниям по всему содружеству были предоставлены значительные субсидии на строительство заводов в Индии, что, как мы надеемся, позволит местной авиационной промышленности должным образом развиваться."
 RAJ_deconceptualise_their_logistics_idea: "Снесите к черту их логистику!"
 RAJ_deconceptualise_their_logistics_idea_desc: "Поскольку большинство их соперников в Азии не имеют возможности защищаться от ударов бомбардировщиков, военно-воздушные силы Доминиона еще больше усовершенствовали и расширили свои бомбардировочные возможности, стремясь нарушить линии снабжения противника и уничтожить его логистические сети."
 RAJ_improved_interservice_coordination: "Улучшенное межродовое взаимодействие"
 RAJ_improved_interservice_coordination_desc: "В рамках расширения своих военно-воздушных сил Доминион назначил специальных координаторов, которые будут выступать в качестве посредников между своей армией и военно-воздушными силами, с целью лучшей координации воздушных бомбардировок с атаками своих наземных войск."
 RAJ_domination_of_the_skies: "Превосходство в воздухе"
 RAJ_domination_of_the_skies_desc: "Военно-воздушные силы Доминиона осознали важную роль превосходства в воздухе в современной войне и начали масштабные учебные программы, которые, как мы надеемся, подготовят самых опытных пилотов истребителей, а также инженерные схемы для дальнейшего совершенствования боевых возможностей их самолетов."
 RAJ_continental_airforce_idea: "Континентальные военно-воздушные силы Индии"
 RAJ_continental_airforce_idea_desc: "Наконец-то были собраны плоды крупных инвестиций в военно-воздушные силы Доминиона, и теперь они являются одними из самых совершенных в мире. Мало кто может рассчитывать на то, что, столкнувшись с этим, он останется на ногах, не говоря уже о победе."

 RAJ_navy_entente_trade: "Дорога жизни Антанты"
 RAJ_navy_entente_trade_desc: "Помощь от их союзников за рубежом была жизненно важна для Доминиона на протяжении более десяти лет, и в условиях неопределенности на горизонте были предприняты серьезные усилия по расширению этой помощи, чтобы гарантировать, что Доминион не падет перед своими противниками."
 RAJ_navy_marines: "Индийская особочная лодочная служба"
 RAJ_navy_marines_desc: "Морская пехота уже давно признана одной из самых важных частей армии, особенно полезной на большей части территории Индии и соседних стран. С этой целью Генеральный Штаб заявил о создании соответствующего постоянного подразделения морской пехоты, надеясь, что эти силы специального назначения справятся с любым противником, который бросится на них."
 RAJ_navy_intense_docks: "Ускорение наращивания военно-морского флота"
 RAJ_navy_intense_docks_desc: "Поскольку Доминион отчаянно нуждался в новых кораблях, отвечающих требованиям военно-морского флота, значительные ресурсы были переведены с обычных производственных линий на производство деталей для новых кораблей в качестве временной меры."
 RAJ_navy_battleships: "Индийская Армада"
 RAJ_navy_battleships_desc: "В рамках своих усилий по установлению превосходства во всем Индийском океане Доминион решил сосредоточиться на линкорах и других крупных судах, стремясь сокрушить своих противников превосходящей огневой мощью."
 RAJ_navy_carriers: "Доминирование военно-морской авиации"
 RAJ_navy_carriers_desc: "В рамках своих усилий по установлению господства над всем Индийским океаном Доминион решил сосредоточиться на авианосцах, полагая, что доминирование военно-морской авиации будет иметь жизненно важное значение для обеспечения контроля над военно-морскими силами."

 RAJ_reconstruction: "Восстановление Индии"
 RAJ_reconstruction_desc: "Во второй раз за это столетие Индия оказалась опустошенной ужасами гражданской войны, и от крупных городов остались лишь жалкие остатки того, что они были раньше. Однако, в отличие от прошлого раза, Индия вновь обрела единство, и есть надежда, что при наличии достаточного количества времени и усилий она сможет, наконец, оправиться от этого разрушения."
 RAJ_reconstruction_resistance: "Сопротивление воссоединению"
 RAJ_reconstruction_resistance_desc: "Несмотря на то, что нация сейчас объединена, в Индии есть много людей, которые отказываются признавать власть нового правительства, сопротивляясь попыткам восстановить порядок любыми возможными способами. Хотя маловероятно, что они когда-либо будут представлять организованную угрозу нашему правлению, подавление этого инакомыслия должно стать приоритетной задачей, будь то путем примирения или репрессий."
 RAJ_unitedindia: "Индия едина!"
 RAJ_unitedindia_desc: "После долгих лет смертей и разрушений индийский народ наконец-то увидел свет в конце туннеля. На улицах, которые когда-то были завалены обломками, теперь кипит бурная деятельность, на фермах, изрытых воронками, теперь прорастает урожай, а на заводах, которые когда-то были всего лишь мусором, снова выстраиваются очереди."

 RAJ_the_new_dawn: "Новый рассвет"
 RAJ_the_new_dawn_desc: "Несмотря на огромные разрушения, от которых пострадала Индия, ее народ не сдался. Были приложены огромные усилия, чтобы не только восстановить утраченное, но и построить что-то на руинах, положив начало новому этапу развития индийской нации."

## Liberal Federation Ideas
 RAJ_growing_middle_class: "Растущий средний класс"
 RAJ_growing_middle_class_desc: "Благодаря нашей экономической программе средний класс Индии медленно, но верно растет."
 RAJ_flourishing_middle_class: "Процветающий средний класс"
 RAJ_flourishing_middle_class_desc: "Благодаря нашей экономической программе средний класс Индии значительно вырос!"
 RAJ_uniform_civil_code_idea: "Единый Гражданский Кодекс"
 RAJ_uniform_civil_code_idea_desc: "По всей Индии был введен в действие единый гражданский кодекс, гарантирующий, что индийцы всех слоев общества подчиняются одним и тем же законам."
 RAJ_secularised_administration: "Светская администрация"
 RAJ_secularised_administration_desc: "Религия была отстранена от любого участия в управлении государством, что отодвинуло многообразие предыдущей администрации в прошлое."
 RAJ_illiberal_democracy: "Нелиберальная демократия"
 RAJ_illiberal_democracy_desc: "Несмотря на то, что номинально мы это демократия, в стране нет всеобщего избирательного права, и перспективы его расширения очень и очень туманны."
 RAJ_torch_of_liberalism: "Светоч либерализма"
 RAJ_torch_of_liberalism_desc: "Доминион является светочем либерализма по всей Азии, подавая пример другим демократическим странам и движениям по всему континенту!"

## All-India Home Rule Ideas
 RAJ_social_justice_idea: "На пути к социальной справедливости"
 RAJ_social_justice_idea_desc: "Правительство приняло программу, обеспечивающую, чтобы справедливость и улучшение положения людей были приоритетными задачами в управлении страной."
 RAJ_princely_support: "Поддержка раджей"
 RAJ_princely_support_desc: "Принцы с энтузиазмом поддерживают наше правительство, поскольку наша политика приносит им огромные выгоды."
 RAJ_female_suffrage: "Избирательные права для женщин"
 RAJ_female_suffrage_desc: "Женщины Доминиона получили избирательные права и официальное приглашение принимать участие в политической жизни. В то время как подавляющее большинство женщин по-прежнему де-факто не могут голосовать из-за действующего законодательства, касающегося предоставления избирательных прав всем индийцам, те, кто принадлежит к богатым семьям и владеет землей, теперь имеют равные шансы на то, чтобы их голоса были услышаны."
 RAJ_confederalised_provinces: "Конфедеративный Доминион"
 RAJ_confederalised_provinces_desc: "Провинциям и штатам Индии была предоставлена большая автономия, чтобы обеспечить минимальное воздействие на мусульманские провинции со стороны потенциального индуистского федерального правительства, и наоборот."
 RAJ_mixed_economy: "Смешанная экономика"
 RAJ_mixed_economy_desc: "Отвергая западную экономику, которая с трудом вписывается в жизнь Индии, для обеспечения большей справедливости по всей стране была внедрена смешанная экономика."
 RAJ_the_dominion_reborn: "Возрожденный Доминион"
 RAJ_the_dominion_reborn_desc: "Сегодняшний Доминион значительно отличается от того, который был вчера. Индия возрождается и полна сил для предстоящих испытаний."

## Unionist Ideas
 RAJ_support_from_the_elites: "Поддержка со стороны элит"
 RAJ_support_from_the_elites_desc: "Элиты Индии являются ключевыми представителями власти, играющими важнейшую роль в избирательной политике и ее реализации. Благодаря их поддержке наша способность управлять страной значительно возрастает."
 RAJ_sikh_autonomy_modifier: "Сикхская автономия"
 RAJ_sikh_autonomy_modifier_desc: "Автономия Сикхистана - это специально выделенный округ в Индии, дающее сикхскому большинству больше права голоса в управлении своей повседневной жизнью."
 RAJ_pronounced_loyalty_to_the_commonwealth: "Верность Содружеству"
 RAJ_pronounced_loyalty_to_the_commonwealth_desc: "Содружество было тем, кто даровал Индии демократию, кто помог спасти ее от тисков княжеского абсолютизма и социалистического догматизма. Наша верность Антанте - это не просто услуга за услугу, это наш моральный долг."
 RAJ_entrenched_pluralism: "Укоренившийся плюрализм"
 RAJ_entrenched_pluralism_desc: "Будущим правительствам теперь будет ужасно трудно свести на нет работу, проделанную профсоюзными деятелями для обеспечения того, чтобы управление и законодательство Индии осуществлялись в соответствии с плюралистическими ценностями."
 RAJ_economy_at_the_rural_level: "Аграрнориентированная экономика"
 RAJ_economy_at_the_rural_level_desc: "При разработке экономической политики во главу угла ставятся потребности сельского хозяйства. Фермеры никогда не останутся обездоленными в пользу городов."
 RAJ_the_masters_of_india: "Хозяева Индии"
 RAJ_the_masters_of_india_desc: "Находясь на передовой в палатах представителей и во время гражданской войны, именно мы овладели разнообразным индийским политическим полем и реформировали нацию в соответствии с нашим видением."

## Extra Ideas
 RAJ_exotic_exports: "Экзотический экспорт"
 RAJ_exotic_exports_desc: "Благодаря нашим инвестициям в местную промышленность, экспорт экзотических товаров увеличился, что принесло доход нашей великой стране."
 RAJ_exotic_exports_2: "Экзотический экспорт"
 RAJ_exotic_exports_2_desc: "Благодаря нашим инвестициям в местную промышленность, экспорт экзотических товаров увеличился, что принесло доход нашей великой стране."

### Decisions ###
 RAJ_modernise_maduras_roads: "Модернизировать дороги в провинции Мадура"
 RAJ_modernise_maduras_roads_desc: "Дороги в провинции Мадура, мягко говоря, в запущенном состоянии. Деревни в горах соединены между собой ужасными тропинками, а те, что там есть, с твердым покрытием, уже разрушаются. Приведение всего этого в соответствие с современными стандартами, мягко говоря, крайне необходимо."
 RAJ_resume_the_bristow_plan: "Возобновить план Бристоу"
 RAJ_resume_the_bristow_plan_desc: "Роберт Бристоу - портовый инженер, который в начале 1920-х годов разработал весьма амбициозный план расширения порта Кочин, однако ничего из этого не было реализовано из-за финансовых трудностей, а затем из-за катастрофы Индийской Революции. Теперь, когда Траванкор вернулся в строй, мы можем начать реструктуризацию порта в соответствии с идеями Бристоу."
 RAJ_sawai_man_singh_ii_buildup_plan: "План наращивания сил Ман Сингха"
 RAJ_sawai_man_singh_ii_buildup_plan_desc: "Махараджа Джайпура Савай Ман Сингх II разработал масштабный план городского развития своего ныне возвращенного княжества. Будучи не в состоянии самостоятельно покрыть расходы, он обратился за финансовой помощью к правительству."
 RAJ_rebuild_the_manchester_of_india: "Восстановить Индийский Манчестер"
 RAJ_rebuild_the_manchester_of_india_desc: "Ахмадабад, прозванный \"Манчестером Индии\" из-за своей развитой текстильной промышленности, сильно пострадал как во время гражданской войны, так и во время правления социалистов. Мы должны восстановить былую мощь его промышленности, одновременно инвестируя в развитие химической промышленности в городе."
 RAJ_expand_the_singareni_collieries: "Расширить Singareni Collieries"
 RAJ_expand_the_singareni_collieries_desc: "Компания Singareni Collieries является крупной угледобывающей компанией в штате Хайдарабад и прилегающих районах. Мы заботимся о том, чтобы эта жизненно важная отрасль не только выжила, но и процветала."
 RAJ_chota_nagpur_plateau_electrification: "Электрификация плато Чота-Нагпур"
 RAJ_chota_nagpur_plateau_electrification_desc: "Плато Чота-Нагпур - крупный регион в Центральной Индии, который за последние несколько десятилетий отстал в плане электрификации. Тщательный план строительства и подключения позволит привести это географическое положение в соответствие с современными стандартами"
 RAJ_bringing_power_to_baluchistan: "Расширить бюрократию до Белуджистана"
 RAJ_bringing_power_to_baluchistan_desc: "Белуджистан - одна из самых отсталых провинций во всем Доминионе, если не самая децентрализованная и заброшенная. Благодаря масштабным усилиям по электрификации, мы увидим, что после десятилетий упадка он, наконец, вернется в 20-й век.."
 RAJ_expand_the_sharda_canal_system: "Расширение системы каналов Шарда"
 RAJ_expand_the_sharda_canal_system_desc: "Система каналов Шарда является основной ирригационной сетью в Ауде, предназначенной для повышения жизнеспособности сельского хозяйства в регионе, хотя в этой сети все еще есть серьезные недостатки. Благодаря значительным усилиям по расширению, эти недостатки будут устранены, и фермы по выращиванию натуральных/товарных культур в регионе будут по-настоящему процветать."
 RAJ_unleash_andhras_fishing_industry: "Дать волю рыбной промышленности Андхры"
 RAJ_unleash_andhras_fishing_industry_desc: "Андхра является родиной одной из самых процветающих рыбопромышленных компаний во всем мире. Использование этого потенциала будет наиболее благоприятным для нашей экономики."
 RAJ_support_berars_oilseed_export: "Поддержка экспорта масличных культур из Берара"
 RAJ_support_berars_oilseed_export_desc: "Производство товарных культур в Бераре сосредоточено на масличных культурах, в первую очередь кунжуте. Гражданская война нанесла ущерб фермерам в регионе, но, поддерживая их усилия по восстановлению, мы добьемся больших успехов в восстановлении этого сельскохозяйственного сектора."

 RAJ_impending_election: "Предстоящие выборы"
 RAJ_impending_election_desc: "Должны состояться первые выборы после воссоединения Индии, которые, несомненно, определят будущее Доминиона на предстоящий век."

### Focuses ###
## Pre-War Econ/BM Tree
 RAJ_infrastructure_act: "Закон об инвестициях в инфраструктуру 1936 года"
 RAJ_infrastructure_act_desc: "Состояние дорог в горах Кашмира и пустыне Тар, мягко говоря, неудовлетворительное. Закон об инфраструктуре предусматривает выделение поддержки и средств на улучшение основных дорог в этих местах."
 RAJ_relief_indebtedness_act: "Закон об облегчении долгового бремени"
 RAJ_relief_indebtedness_act_desc: "Правовая база, регулирующая выплату долгов, расплывчата, и многие банки и кредиторы злоупотребляют ею. Что еще хуже, после "черного понедельника" система подверглась злоупотреблениям, и у многих людей конфисковали землю и урожай из-за неоплаченных долгов, предполагаемых или нет. Закон об облегчении долгового бремени создаст надлежащие советы по урегулированию долговых споров и обеспечит лучшую защиту должников, обеспечивая большую стабильность нашей хворающей экономике."
 RAJ_state_aid_to_industries_act: "Закон о государственной помощи промышленным предприятиям"
 RAJ_state_aid_to_industries_act_desc: "На данный момент у нашего правительства недостаточно возможностей для оказания прямой поддержки пострадавшим отраслям промышленности и сельскому хозяйству. Закон о государственной помощи промышленным предприятиям обеспечит надлежащую правовую основу для предоставления помощи в виде займов отдельным отраслям, что еще больше залечит кровоточащие раны, нанесенные Черным понедельником."
 RAJ_reinforce_the_western_coal_industry: "Укрепить угольную промышленность на Западе"
 RAJ_reinforce_the_western_coal_industry_desc: "На дальней западной границе Белуджистана и Кветты находятся богатые запасы угля, которые нам еще предстоит полностью использовать. Мы обеспечим финансирование и безопасность этих шахт для продолжения работы на благо нашей сырьевой отрасли."
 RAJ_promote_the_kashmir_silk_industry: "Стимулирование кашмирского шелководства"
 RAJ_promote_the_kashmir_silk_industry_desc: "Шелководство относится к способу разведения шелкопрядов для производства шелка-сырца и выращиванию тутовых деревьев для их прокорма. В конце 19 века шелковая промышленность превзошла по экспортной стоимости кашмирские платки, что сделало ее самой важной отраслью промышленности в регионе. Ее продвижение значительно повысит экономическую ценность штата."
 RAJ_incentivise_kangra_tea_cultivation: "Стимулировать чаеводство Кангра"
 RAJ_incentivise_kangra_tea_cultivation_desc: "Когда-то кангрский чай был популярной культурой в долине Кангра, его выращивали как в черном, так и в зеленом вариантах. Землетрясение в Кангре в 1905 году опустошило регион и привело к тому, что британцы распродали плантации. С тех пор производство чая - это лишь малая часть того, чем оно было раньше. Мы должны стимулировать его выращивание, чтобы повысить экономическую ценность региона."
 RAJ_incorporate_the_liberal_economic_platform: "Ввести либеральную экономическую политику"
 RAJ_incorporate_the_liberal_economic_platform_desc: "Национал-либеральная федерация Индии уже давно выступает за то, чтобы открыть наши экономические двери для международных интересов, вместо того, чтобы придерживаться протекционистской экономики, которую поддерживает платформа Юнионистской партии. Учитывая ущерб, нанесенный нашей торговой сфере, возможно, нам следует прислушаться к их призывам и попытаться привлечь инвестиции международного сообщества."
 RAJ_champion_the_unionist_tariff_policy: "Отстаивать тарифную политику профсоюзов"
 RAJ_champion_the_unionist_tariff_policy_desc: "Фермерские хозяйства в сельской местности сильно пострадали от последствий Черного понедельника. Чтобы поддержать нашу отечественную продовольственную экономику в условиях замедления экспорта, мы должны поддерживать политику протекционистской экономики, проводимую профсоюзами, и привлекать больше средств в нашу казну в процессе."
 RAJ_crush_the_karachi_dockworker_strike: "Санкционировать принудительный труд"
 RAJ_crush_the_karachi_dockworker_strike_desc: "Забастовка в порту Карачи усугубляет и без того ужасный экономический кризис. Мы должны дать понять этим синдикалистским агитаторам, что не потерпим подобной чепухи, и санкционировать применение силы для разгона забастовок и восстановления порядка в наших жизненно важных промышленных центрах.."
 RAJ_payment_of_wages_act: "Закон о выплате заработной платы"
 RAJ_payment_of_wages_act_desc: "Мы должны умерить гнев имеющих работу лиц низшего класса, обеспечив более надежную защиту стабильности их заработной платы. Закон о выплате заработной платы четко определит, когда работодатель может, а когда не может удерживать заработную плату работника, и дополнительно ограничит процент, который он может удерживать."
 RAJ_prepare_industrial_machine: "Подготовить промышленное оборудование"
 RAJ_prepare_industrial_machine_desc: "Наша промышленность находится в поистине плачевном состоянии, наши производственные мощности недостаточно подготовлены к тому, чтобы справиться с возобновлением войны с нашими противниками на Индийском субконтиненте. Мы должны очень спешить и осуществлять масштабную программу индустриализации, чтобы быть уверенными, что сможем превзойти в производстве и вооружении любого, с кем столкнемся!"

 ## Pre-Split Army Tree
 RAJ_modernise_the_indian_army: "Модернизация индийской армии"
 RAJ_modernise_the_indian_army_desc: "Армия Доминиона, на которую, безусловно, нечем любоваться, демонстрирует свои недостатки и нуждается в дальнейшей проверке и модернизации. Если мы хотим выжить под натиском Народной Республики Бхаратия и, возможно, даже вероломных афганцев, мы должны позаботиться о том, чтобы армия не испытывала недостатка и не надеялась на случайность."
 RAJ_the_rails_of_the_frontline: "Пути снабжения"
 RAJ_the_rails_of_the_frontline_desc: "Войны выигрываются благодаря превосходным линиям снабжения. Для нас крайне важно убедиться, что наши войска на передовой получают достаточно снаряжения для поддержания наших военных операций. Мы также отремонтируем бронированный вагон и создадим рельсотронную пушку, чтобы удивить и шокировать наших непосредственных противников, которые связаны с нами железной дорогой."
 RAJ_update_aging_equipment: "Обновление устаревевшего оборудование"
 RAJ_update_aging_equipment_desc: "Большая часть снаряжения нашей армии - старое, оно относится ко временам Великой войны и даже к более ранним. Мы приложим все усилия для оптимизации исследований нового современного снаряжения."
 RAJ_expand_the_gurkha_rifles: "Расширить гуркхский стрелковый корпус"
 RAJ_expand_the_gurkha_rifles_desc: "Самые свирепые и уважаемые полки состоят из гуркхов, профессиональных бойцов, которые из поколения в поколение служат в индийской армии. Мы должны извлечь выгоду из их силы и увеличить их набор в нашу армию, потому что они будут нашей самой ловкой фигурой на шахматной доске поля боя!"

 RAJ_quetta_command_and_staff_college: "Расширить командно-штабной колледж в Кветте"
 RAJ_quetta_command_and_staff_college_desc: "Командно-штабной колледж Кветты - престижный военный университет, который, несомненно, подготовит новое поколение офицеров. Выделив им больше средств, мы обеспечим строительство нового исследовательского корпуса и светлое будущее вооруженных сил Доминиона.."
 RAJ_advanced_land_warfare_innovations: "Передовые инновации в наземной войне"
 RAJ_advanced_land_warfare_innovations_desc: "До нашего сведения дошло, что в искусстве ведения наземной войны было совершено много прорывов, которые ждут финансирования и возможностей для их наиболее эффективного осуществления. Мы обеспечим себе преимущество над врагом, поддержав усилия наших тактиков и исследователей."

 ## Ideas of the Young Guard Tree
 RAJ_ideas_of_the_young_guard: "Предложения Молодой Гвардии"
 RAJ_ideas_of_the_young_guard_desc: "\"Молодая гвардия\" сильно разочарована в решительном неприятии Филипом Уолхаусом Четводом моторизации армии, утверждая, что, не сумев воспользоваться преимуществами современного боя, наши войска станут просто лежачими полицейскими для грузовиков и танков противника. Мы должны попросить его уйти в отставку, чтобы их идеи и видение могли быть реализованы."
 RAJ_rectify_disorderly_communications: "Улучшение системы связи и управления"
 RAJ_rectify_disorderly_communications_desc: "Связь между нашими подразделениями находится на низком уровне и изобилует неадекватными методами и отсутствием надлежащего оборудования. Мы должны исправить это, чтобы этот аспект нашей армии соответствовал профессиональным стандартам."
 RAJ_elevated_engineering_methods: "Расширить роль инженерского корпуса"
 RAJ_elevated_engineering_methods_desc: "Роль инженерных войск недооценивается и используется в недостаточной степени. Мы расширим их роль в наших подразделениях и создадим нерушимые оборонительные рубежи против наших врагов."
 RAJ_new_training_initiatives: "Новые стандарты подготовки"
 RAJ_new_training_initiatives_desc: "Стандарты подготовки в армии низки и сильно устарели. Мы пересмотрим наши учения и внедрим совершенно новые методы и инициативы, чтобы наши войска были должным образом экипированы для боя."
 RAJ_motorise_the_sowars: "Моторизация соваров"
 RAJ_motorise_the_sowars_desc: "Кавалерия - это давно вышедший из моды вид боя, особенно сейчас, когда механизация и танки вошли в моду среди западных стран. Мы будем моторизовывать наши кавалерийские подразделения и продвигать использование грузовиков в военных целях."
 RAJ_military_industry_buildup: "Расширение ВПК Индии"
 RAJ_military_industry_buildup_desc: "Военная промышленность Индии, возможно, и не дотягивает по мощи до таких стран, как Германия или Россия, но мы, безусловно, можем посеять семена того, что когда-нибудь станет грозным соперником. Автомобильная промышленность - это хорошее начало, и мы будем предоставлять субсидии, где это уместно, для развития собственной промышленности.."
 RAJ_immovable_objects: "Неподвижные цели"
 RAJ_immovable_objects_desc: "Самые эффективные танки на поле боя - это слои брони, которые вселяют страх в сердце солдата, когда он видит их на горизонте. Мощные, тяжелые танки должны стать основой нашего бронетанкового корпуса."
 RAJ_immortal_bulwarks: "Неприступные бастионы"
 RAJ_immortal_bulwarks_desc: "Индийский бронетанковый корпус должен предстать на поле боя как колоссы войны, стальные мамонты, которые будут известны во всем мире как машины, выбранные для "мрачного жнеца с косой". Индийский танк должен быть таким, перед которым невозможно устоять.."
 RAJ_unstoppable_forces: "Неостановимая сила"
 RAJ_unstoppable_forces_desc: "Легкие танки являются наиболее эффективными, экономичными и скоростными, обеспечивая отличные возможности для окружения и легкого преодоления позиций противника. Они станут основой нашего бронетанкового корпуса."
 RAJ_steel_dragoons: "Стальные драгуны"
 RAJ_steel_dragoons_desc: "Стальные драгуны Индии пройдут сквозь наших врагов, как ножи сквозь масло, дезориентируя их и вызывая панику. Наши командиры-танкисты смогут высоко держать голову, потому что они будут вести себя достойно и вернутся домой легендарными героями."

 ## Maintain Chetwode's Primacy Tree
 RAJ_maintain_chetwodes_primacy: "Подтвердить главенство Четвуда"
 RAJ_maintain_chetwodes_primacy_desc: "Прагматичный подход Филипа Уолхауза Четвода к ведению войны на индийском континенте - единственный, который Доминион сможет разумно поддерживать. Нереалистичные концепции молодых выскочек должны оставаться такими, какими они есть, концепциями.."
 RAJ_the_honourable_sowars: "Достопочтенные совары"
 RAJ_the_honourable_sowars_desc: "Совары - лучшие всадники на всем азиатском континенте. Мы предоставим ветеранам этих полков высокие награды и расширим их роль в нашей армии как экономически эффективных маневренных подразделений."
 RAJ_the_indelible_role_of_artillery: "Неоценимая роль артеллирии"
 RAJ_the_indelible_role_of_artillery_desc: "Роль артиллерии в войне, несомненно, огромна, она способна с относительной легкостью уничтожать самолеты, танки, крепости и линии фронта. Мы должны использовать ее наилучшим образом."
 RAJ_streamlined_small_arms_production: "Упрощенное производство стрелкового оружия"
 RAJ_streamlined_small_arms_production_desc: "Производство стрелкового оружия в Доминионе в настоящее время недостаточно для того, чтобы соответствовать потребностям войны, охватывающей весь континент. Мы оптимизируем его производство, чтобы никогда не остаться без винтовки в руках."
 RAJ_the_chetwode_motto: "Лозунг Четвуда"
 RAJ_the_chetwode_motto_desc: "\"Безопасность, честь и благополучие вашей страны всегда стоят на первом месте. Честь, благополучие и комфорт людей, которыми вы командуете, на втором месте. Ваша собственная легкость, комфорт и безопасность всегда стоят на последнем месте.\""
 RAJ_promote_a_martial_culture: "Пропаганда культуры войны"
 RAJ_promote_a_martial_culture_desc: "Чтобы повысить престиж армии и готовность людей сражаться с врагами на наших границах и за их пределами, мы должны пропагандировать военную культуру, во многом схожую с культурой гуркхов. Простая пропагандистская кампания станет отличным началом для достижения этой цели."
 RAJ_improve_our_support_companies: "Усовершенствование подразделений поддержки"
 RAJ_improve_our_support_companies_desc: "Наши роты поддержки играют жизненно важную роль в усилении наших подразделений и обеспечении их преимуществ перед врагом. Мы будем инициировать улучшения там, где это необходимо, и обеспечим, чтобы они были на голову выше остальных!"
 RAJ_the_most_feared_army_of_the_entente: "Самая страшная армия Антанты"
 RAJ_the_most_feared_army_of_the_entente_desc: "Индийская армия - это та, которую вы видите марширующей по холмам, чьи пули заслоняют солнце и заставляют всех, кто осмеливается противостоять ей или переходить ей дорогу, пожалеют о том, что они когда-либо это делали. Индийская армия должна стать величайшим оружием Антанты и вершителем судеб на поле боя!"

 ## Airforce Tree
 RAJ_refurbish_the_indian_air_force: "Модернизировать военно-воздушные силы Индии"
 RAJ_refurbish_the_indian_air_force_desc: "Перед лицом потенциальной борьбы за господство в воздухе, нашим долгом должно стать обеспечение того, чтобы военно-воздушные силы были в отличной форме."
 RAJ_india_rules_the_radio_waves: "Правь, Индия,радиоволнами!"
 RAJ_india_rules_the_radio_waves_desc: "Именно современные технологии определяют победителей в будущем! Если Британия будет править волнами, то Индия будет править радиоволнами!"
 RAJ_aerial_transports: "Транспортные самолеты"
 RAJ_aerial_transports_desc: "Улучшенное материально-техническое обеспечение и возможность переброски целой дивизии в тыл врага делают транспортные самолеты, возможно, самыми выгодными инвестициями в наши военно-воздушные силы."
 RAJ_indian_paratroopers: "Крылатые пегасы Индии"
 RAJ_indian_paratroopers_desc: "Парашютно-десантные бригады способны повреждать линии снабжения, захватывать целые города и нарушать целостность вражеских позиций. Такой шахматный ход, несомненно, ослабит организованность противника."
 RAJ_improved_air_defenses: "Улучшение ПВО"
 RAJ_improved_air_defenses_desc: "Угроза того, что бомбардировщики будут терроризировать наши ценные промышленные сектора, поистине ужасна. Создание систем противовоздушной обороны в нашей столице и других ключевых местах позволит предотвратить любые потенциальные стихийные бедствия, которые могут обрушиться с неба."
 RAJ_subsidised_domestic_air: "Субсудирование воздушной промышленности"
 RAJ_subsidised_domestic_air_desc: "Такие промышленники, как Джехангир Дадабхой Тата (Jehangir Dadabhoy Tata) и Невилл Винтцент (Nevill Vintcent), внесли значительный вклад в становление индийской авиаиндустрии с появлением авиакомпании Tata airlines. Поддержать их усилия было бы весьма предприимчивым начинанием."
 RAJ_deconceptualise_their_logistics: "Снесите к черту их логистику"
 RAJ_deconceptualise_their_logistics_desc: "Материально-техническое обеспечение является важнейшим фактором, определяющим силу армии. Таким образом, необходимо, чтобы противник был лишен таких возможностей в такой степени, что с таким же успехом он мог бы вообще никогда не обладать такими возможностями."
 RAJ_interservice_coordination: "Усилия по межродовой координации"
 RAJ_interservice_coordination_desc: "Благодаря стандартизации усилий по координации действий сил на земле и в воздухе наше наступление на позиции противника будет столь же мощным, сколько и устрашающим."
 RAJ_dominate_the_skies: "Превосходство в воздухе"
 RAJ_dominate_the_skies_desc: "Мудрые нации не только обладают абсолютным господством на суше и на море, они также осознают важность господства в небе. Контроль над воздушным пространством охватывает три аспекта и обеспечивает огромное преимущество."
 RAJ_birds_of_prey: "Хищники"
 RAJ_birds_of_prey_desc: "Поведение наших военнослужащих в небе должно быть столь же элегантным, сколь и беспощадным. Мы обрушимся на наших противников, как ястреб на свою добычу!"
 RAJ_continental_airforce: "Индийские континентальные ВВС"
 RAJ_continental_airforce_desc: "Наши ВВС обладают властью не только над отдельными регионами, но и над целым континентом. Индейцы по всей стране могут смотреть в небо и проливать слезы гордости, зная, что ни одна другая нация не может сравниться с нами по мощи."

 ## Navy Tree
 RAJ_from_the_indus_to_the_sea: "От Инда до моря"
 RAJ_from_the_indus_to_the_sea_desc: "Разве это огромное водное пространство за нашими берегами не называется \"Индийский океан\"? Очевидно, что наше предназначение - создать военно-морской флот, настолько мощный, что тем, кто пересекает наши воды, не нужно знать его названия, чтобы знать, что он наш."
 RAJ_the_ganga_strategy: "Стратегия Ганга"
 RAJ_the_ganga_strategy_desc: "Мы не должны позволить многочисленным бурным рекам Индии помешать нашему продвижению. Благодаря тщательному предварительному планированию и инновационным стратегиям переправиться через реку станет не сложнее, чем перешагнуть через камешек.."
 RAJ_prioritise_naval_assaults: "Приоритет атак с моря"
 RAJ_prioritise_naval_assaults_desc: "Наши морские пехотинцы являются одними из самых элитных наших подразделений. Мы воспользуемся их мастерством и мощью с максимальной пользой!"
 RAJ_acquire_bombers_from_fairey: "Приобрести бомбардировщики у Fairey"
 RAJ_acquire_bombers_from_fairey_desc: "Fairey Swordfish, созданный нашими друзьями за океаном, - это испытанный бомбардировщик-торпедоносец, который хорошо служит им уже много лет. Зачем утруждать себя разработкой собственного самолета, когда наши союзники более чем готовы предоставить чертежи, чтобы начать его производство в Индии?"
 RAJ_protecting_the_entente_lifeline: "Защитить линии снабжения Антанты"
 RAJ_protecting_the_entente_lifeline_desc: "Поставки от стран Антанты и Содружества имеют жизненно важное значение для нашего выживания. Наши враги будут стремиться нарушить наши морские пути, но мы не позволим им этого сделать."
 RAJ_increase_convoy_production: "Увеличение производства конвоев"
 RAJ_increase_convoy_production_desc: "Благодаря новым контрактам и квотам мы позаботимся о том, чтобы запланированное нами расширение индийского торгового флота прошло быстро и гладко!"
 RAJ_new_navy: "Новый флот"
 RAJ_new_navy_desc: "Теперь, когда мы объединили континент, мы должны смотреть в будущее и представлять себе военно-морской флот, который точно отражает мощь страны, которой он служит!"
 RAJ_accelerate_naval_buildup: "Ускорить строительство ВМФ"
 RAJ_accelerate_naval_buildup_desc: "Время поджимает, поскольку военно-морские державы по всему миру занимаются наращиванием своей мощи гораздо дольше, чем мы. Мы должны приложить больше усилий, если хотим сравняться с лучшими в мире!"
 RAJ_an_indian_armada: "Индийская Армада"
 RAJ_an_indian_armada_desc: "С помощью армады линкоров и тяжелых крейсеров любое морское сражение, в котором мы участвуем, будет иметь только один возможный исход - наша решающая победа."
 RAJ_aerial_conquest_of_the_sea: "Покорение моря с воздуха"
 RAJ_aerial_conquest_of_the_sea_desc: "Будущее военно-морского флота не ограничивается волнами; оно также стремится использовать ветры. Инвестируя в авианосцы и распологая на них наш новый флот, мы будем на шаг опережать устаревшие военно-морские силы прошлого."
 RAJ_warriors_of_the_sea: "Воины моря"
 RAJ_warriors_of_the_sea_desc: "Храбрые индийские солдаты, которые переходят реки вброд и штурмуют пляжи, демонстрируют воинственный дух, не имеющий аналогов ни у кого на земле. Наши морские пехотинцы - это морские воины, чей силуэт на горизонте должен быть виден только при появлении белого флага."

 ## Reconstruction Tree
 RAJ_indian_nightmare: "Конец кошмара"
 RAJ_indian_nightmare_desc: "Кошмар, который начался после того, как ИНК провозгласил "\Пурна Сварадж"\, положив начало, возможно, самой травмирующей эпохе в истории Индии, наконец-то подошел к концу. Теперь нам осталось собрать осколки и восстановить Доминион ради нашего больного народа."
 RAJ_reintegration: "Воссоединение континента"
 RAJ_reintegration_desc: "Пришло время окончательно устранить разногласия между нашей первоначальной базой на северо-западе и остальной частью континента. Несмотря на то, что все еще существует сопротивление нашему новому правлению, мы позаботимся о том, чтобы это продлилось недолго."
 RAJ_rebel_prince_debacle: "Разрешить вопрос мятежных раджей"
 RAJ_rebel_prince_debacle_desc: "Мятежные раджы представляют собой довольно сложную ситуацию, поскольку они довольно долго правили своими родными землями. Однако именно британское владычество обеспечило их дальнейшее выживание, и теперь именно нам решать, что будет сделано с теми, кто нас предал."
 RAJ_rebel_soldiers: "Разобраться с мятежными солдатами"
 RAJ_rebel_soldiers_desc: "Мятежные солдаты бывшей Народной Республики Бхаратия предали Индию, сражаясь на стороне социалистической угрозы, однако многие в правительстве защищают свою честь и утверждают, что они виновны только в том, что были призваны на военную службу и сражались за свою страну. Мы должны окончательно определиться с тем, какой будет наша политика по отношению к ним."
 RAJ_damaged_dominion: "Восстановление разрушенного Доминиона"
 RAJ_damaged_dominion_desc: "По всей Индии свирепствует голод и разруха, вызванные жестокой гражданской войной, которая закончилась совсем недавно. Наш долг - облегчить страдания нашего народа, залечив нанесенный ущерб."
 RAJ_redouble_infrastructure: "Удвоить развитие инфраструктуры"
 RAJ_redouble_infrastructure_desc: "Инфраструктура Индии исторически никогда не была особенно развитой. У нас есть возможность обеспечить, чтобы дороги и хайвеи не оставляли Индию в изоляции. В конце концов, разве раньше мы не владели такой значительной частью Великого Шелкового пути?"
 RAJ_mass_electrification: "Компания массовой электризации"
 RAJ_mass_electrification_desc: "Чтобы принести Доминион в современную эпоху, мы электрифицируем каждую деревню, какой бы изолированной она ни была. Электричество и свет должны осветить каждую деревню!"
 RAJ_auction_industries: "Аукцион обобществленной промышленности"
 RAJ_auction_industries_desc: "Обобществленные отрасли промышленности Восточной Индии оказались заброшенными и находятся на грани разорения из-за падения правительства ИНК. Благодаря волшебству частного предпринимательства мы больше не оставим эти ценные отрасли экономики на произвол судьбы!"
 RAJ_maintain_momentum: "Набрать обороты"
 RAJ_maintain_momentum_desc: "Восстановление Индии привело к экономическому чуду, благодаря массовому созданию рабочих мест в новых отраслях промышленности и повсеместному осуществлению проектов общественных работ по заказу правительства. Мы не позволим этому импульсу ослабнуть!"
 RAJ_indian_granary: "Процветай, индийская житница!"
 RAJ_indian_granary_desc: "Индия, столь разнообразный в географическом отношении и аграрный континент, может стать одним из крупнейших экспортеров продовольствия в мире. Теперь, когда Индия снова твердо стоит на ногах, индийская житница проявит свою праведную щедрость и обеспечит продовольствием миллионы людей!"
 RAJ_servants_of_india: "Задействуйте общество слуг Индии"
 RAJ_servants_of_india_desc: "Слуги Индии - это гражданская волонтерская организация, которая продвигает местные инициативы и общественные работы. Кроме того, у них много общего с Национальной либеральной федерацией Индии. В любом случае, они станут большим подспорьем в деле восстановления Индии.."

 ## Political Tree
 ## Liberal Tree
 RAJ_ascendance_of_the_liberals: "Восхождение либералов"
 RAJ_ascendance_of_the_liberals_desc: "Национал-либеральная федерация Индии была создана в ответ на растущий экстремизм ИНК; многие умеренные националисты предпочитали конституционную реформу и мирные переговоры революционным методам, которые использовала ИНК. Учитывая, что Джинна не понравился индийцам, привыкшим к социализации в Народной Республике Бхаратия, а юнионисты подорвали к ним доверие, вполне естественно, что либералы выкарабкались!"
 RAJ_support_middle_class: "Поддержка среднего класса"
 RAJ_support_middle_class_desc: "Большинство наших сторонников - индусы из элиты и средний класс. Чтобы выполнить свой долг перед избирателями и способствовать развитию новой Индии, мы должны направить наши ресурсы на поддержку и расширение среднего класса!"
 RAJ_prioritise_urban_centres: "Приоритет городских центров"
 RAJ_prioritise_urban_centres_desc: "Стремление к созданию городских районов внесет существенный вклад в развитие Индии как современной нации, не говоря уже об увеличении политического капитала, который мы получим."
 RAJ_growth_of_indian_capitalism: "Массовое распространение бомбейского капитализма"
 RAJ_growth_of_indian_capitalism_desc: "Промышленный капитализм в Индии лучше всего виден на улицах Бомбея, где бурно развивающаяся текстильная промышленность оказала огромное влияние на развитие города и значительно увеличила численность его рабочего класса. Мы должны повторить его успех и обеспечить, чтобы все городские центры наслаждались славой экономического успеха в западном стиле!"
 RAJ_indian_leap_forward: "Рывок вперед для Индии"
 RAJ_indian_leap_forward_desc: "В результате беспрецедентного экономического успеха, достигнутого индийским континентом после гражданской войны, наступила новая эра гениев и интеллектуалов, призванных поддержать развитие индийского народа. Мы приветствуем их инновации и должны оказать существенную финансовую поддержку, поскольку их усилия позволят Индии войти в пантеон международных сверхдержав!"
 RAJ_unified_civil_code: "Учреждение единого гражданского кодекса"
 RAJ_unified_civil_code_desc: "Гражданский кодекс в настоящее время регулирует личные права, основанные на религиозных текстах, которой придерживается каждый индус. Это, конечно, бессмысленная система, которая служит лишь для узаконивания сектантских разногласий между тем, что должно быть единым индийским народом. Мы должны унифицировать гражданский кодекс и обеспечить, чтобы эти законы применялись одинаково, независимо от того, являетесь ли вы индуистом, мусульманином, сикхом, джайном или даже буддистом."
 RAJ_maintain_limited_suffrage: "Ограниченное избирательное право"
 RAJ_maintain_limited_suffrage_desc: "Печальная реальность такова, что если бы избирательное право было распространено на все население Индии, мы бы в значительной степени вымерли в наших городских округах. Это происходит потому, что землевладельцы и олигархические политики из таких партий, как юнионисты, манипулируют системой и принуждают своих арендаторов голосовать за них, пренебрегая их собственными интересами. Мы прекратим дебаты о всеобщем избирательном праве и сохраним существующую систему."
 RAJ_integrate_the_mahasabha: "Интеграция Хинду Махасабха"
 RAJ_integrate_the_mahasabha_desc: "Из-за своего разнообразного членства "Хинду Махасабха" потерпела огромное фиаско после того, как оказалась не по ту сторону линии прекращения огня, несмотря на то, что была крайне маргинализирована ИНК. Тесные связи М.Р. Джаякара с этой организацией привели к ее возрождению, и нам кажется разумным официально вступить в коалицию с их организацией. членов и реинтегрировать их в политическую жизнь."
 RAJ_abolish_reserved_seats: "Ликвидация закрепленных мест"
 RAJ_abolish_reserved_seats_desc: "Значительная часть мест в парламенте зарезервирована, в частности, по религиозному признаку. Мы должны уничтожить этот пережиток нелиберального политического раздувания и освободить места для честно избранных политиков."
 RAJ_enshrine_secularism: "Укрепление светского правительства"
 RAJ_enshrine_secularism_desc: "Светское правление - это единственный путь вперед для Индии, если она хочет, чтобы к ней относились с таким же уважением, как к современным национальным государствам. Существующая система дает сикхам и мусульманам чрезмерно широкое участие в политике и приведет лишь к господству меньшинства над большинством."
 RAJ_the_fundamental_rights_of_indians: "Основные права всех индусов"
 RAJ_the_fundamental_rights_of_indians_desc: "Кастовость, антилиберализм и неприкасаемость - все это подпитывает изначальную сдерживающую силу, которая была наложена на индийский народ. Мы закрепим в законодательстве основные права и проложим путь к будущей деконструкции касты, как только общество станет достаточно стабильным, чтобы приспособиться к таким изменениям."
 RAJ_the_torch_of_liberalism_burns_bright: "Факел либерализма сияет ярко"
 RAJ_the_torch_of_liberalism_burns_bright_desc: "С завершением наших реформ факел либерализма зажег свое очищающее пламя по всей Индии и уничтожил деспотизм раджей и синдикалистский экстремизм. Сегодняшняя Индия свободна, демократична и готова к тому, что произойдет в ближайшие столетия!"
 ## Shared between Liberals and AIHRP
 RAJ_exploit_unionist_divisions: "Использовать разногласия юнионистов"
 RAJ_exploit_unionist_divisions_desc: "У юнионистов много сектантских разногласий и группировок внутри самой партии. С помощью осторожных маневров мы воспользуемся этими разногласиями и ослабим их влияние, чтобы они никогда больше не смогли отравить умы индийцев!"
 RAJ_absorb_minor_parties: "Поглощение малых партий"
 RAJ_absorb_minor_parties_desc: "Мы должны использовать изменчивое политическое поле и расширять свое влияние, продвигаясь к образу главного авангарда индийского народа. Поступая таким образом, мы обеспечим продвижение нашей программы и видения с минимальными помехами со стороны эгоистичных регионалистов и тех, кто не заботится о нуждах всей Индии.."
 RAJ_encourage_minor_parties: "Поддержка для малых партий"
 RAJ_encourage_minor_parties_desc: "Для укрепления здоровой демократии мы должны поощрять развитие небольших партий и организаций, представляющих различные потребности огромного индийского континента. Это обеспечит стабильность индийской политики и нации в целом на десятилетия вперед."
 ## AIHRP Tree
 RAJ_the_aihrp_triumphs: "Триумф Всеиндийской партии самоуправления"
 RAJ_the_aihrp_triumphs_desc: "Созданная как отколовшаяся партия Мухаммедом Али Джинной в ответ на стремления ИНК к социализму, Всеиндийская партия самоуправления официально претендует на наследие одноименной лиги, основанной Анни Безант. Продвигая конфедеративную и прогрессивную программу, направленную на перестройку индийского общества в позитивном направлении, теперь перед нами стоит задача довести ее до конца."
 RAJ_social_justice: "Приверженность социальной справедливости"
 RAJ_social_justice_desc: "Наше правительство должно руководствоваться принципом неотчуждаемойй и нерушимой социальной справедливости. Мы будем подчеркивать это перед народом, опираясь на лучшие элементы социальной справедливости в исламском стиле, которые должны быть распространены по всему континенту."
 RAJ_princely_patronage: "Патронаж раджей"
 RAJ_princely_patronage_desc: "Верховенство раджей - это реальность, которую мы, к сожалению, должны принять, если хотим провести наши самые амбициозные реформы через парламент."
 RAJ_achieving_the_confederal_dominion: "На пути к конфедеративному Доминиону"
 RAJ_achieving_the_confederal_dominion_desc: "После принятия нашей законодательной реформы теперь можно приступить к реализации самого амбициозного проекта нашей платформы. Провинциям будет предоставлена автономия, а федеральная система преобразуется в конфедеративную, создавая новую форму индийского континента, которая сохранится на века!"
 RAJ_reform_legislatures: "Реформа законодательных органов"
 RAJ_reform_legislatures_desc: "Мы сформируем все выборные органы, которые будут основаны на принципах надлежащего представительства всех меньшинств, гарантируя при этом, что ни одно большинство не может быть несправедливо сведено к меньшинству. Отдельные избирательные округа останутся, и больше не будет господства одного класса, племени или группы над другим!"
 RAJ_recognise_the_role_of_women: "Вовлечь женщин в политическую жизнь"
 RAJ_recognise_the_role_of_women_desc: "Основатель партии Мухаммад Али Джинна всегда верил в огромные возможности женщин в области управления и лидерства. Мы повысим их место в обществе, расширив их избирательное право и предоставив им пространство для того, чтобы их голоса были услышаны."
 RAJ_help_workers_help_themselves: "Дайте рабочим помочь самим себе"
 RAJ_help_workers_help_themselves_desc: "Многие партийные функционеры, в том числе и сам Джинна, были связаны с умеренными и несиндикалистскими профсоюзами. Все индийские рабочие должны быть примером самостоятельности и развития своих сообществ. Мы будем направлять рабочий класс к эффективной патриотической организации, чтобы они могли своими собственными заслугами обеспечить своим общинам более светлое будущее."
 RAJ_reject_deleterious_economics: "Отвергнуть пагубную западную экономику"
 RAJ_reject_deleterious_economics_desc: "Западную экономику редко можно применить к культуре и обществу мусульман и индуистов. Мы должны стремиться к созданию государства всеобщего благосостояния со смешанной экономикой, поскольку именно оно лучше всего подходит для того, чтобы вывести Индию из кризиса 19-го века."
 RAJ_reverse_educational_backwardness: "Обратить вспять отставание в образовании"
 RAJ_reverse_educational_backwardness_desc: "Отсталость в сфере образования характерна для Индии по всему континенту. Мы должны спонсировать наше будущее, финансируя новые школы и укрепляя будущее образования в стране, чтобы не остаться далеко позади в ближайшие десятилетия."
 RAJ_the_father_of_the_nation: "Отец Нации"
 RAJ_the_father_of_the_nation_desc: "Мухаммед Али Джинна успешно реализовал свое видение по всему континенту и преобразил нацию в соответствии со своим видением. Его лидерство больше не подвергается сомнению в самой партии, и индийцы по всей стране теперь признают его Отцом нации. Индия восстала из пепла гражданской войны и доказала всему миру, что ее не сломить!"
 ## Shared between AIHRP and Unionists
 RAJ_uplifting_muslim_regions: "Развитие мусульманских регионов"
 RAJ_uplifting_muslim_regions_desc: "Мусульманские регионы, к сожалению, являются одними из самых бедных во всем Доминионе. Мы должны сосредоточить наши усилия на том, чтобы поднять эти провинции до уровня их индуистских аналогов, чтобы они не оказались в невыгодном положении."
 RAJ_against_hindu_rashtra: "Против индуистской теократии"
 RAJ_against_hindu_rashtra_desc: "Такие партии, как Национал-либеральная федерация Индии, стремятся лишь укрепить господство большинства над меньшинством. Решительная кампания против их рядов и шовинистической индуистской махасабхи станет гарантией того, что наша Индия не станет жертвой тирании большинства."
 ## Unionist Tree
 RAJ_the_unionists_hold_on: "Юнионисты выстояли"
 RAJ_the_unionists_hold_on_desc: "Юнионистская партия изначально была основана как организация, ориентированная на Пенджаб, которая должна была представлять интересы высшего класса. С приходом к власти в Индии она стала придерживаться плюралистической аграрной программы. Пережив яростные нападки НЛФИ и ВПС после кризиса Черного Понедельника, профсоюзные активисты выстояли и завоевали значительный авторитет."
 RAJ_concessions_to_shiromani_akali_dal: "Уступки Широмани Акали Дал"
 RAJ_concessions_to_shiromani_akali_dal_desc: "Широмани Акали Дал (Shiroman Akali Dal) - организация, ориентированная на сикхов, которая выступает за расширение автономии регионов, в которых доминируют сикхи, и представляет интересы сикхов в Индии. Они являются нашими парламентскими союзниками в силу нашей плюралистической повестки дня, и мы должны обеспечить выполнение наших обещаний, чтобы не предать их и не подорвать доверие к нам."
 RAJ_pluralism_without_compromise: "Плюрализм без компромиссов"
 RAJ_pluralism_without_compromise_desc: "Плюрализм в Индии - это единственный реальный способ примирить религиозные разногласия, связанные с невероятно разнообразными верованиями, которых придерживаются миллионы индийцев. Не должно быть компромиссов, и никто не должен быть забыт, все религии должны быть представлены в равной степени и быть услышаны, чтобы они не разочаровались в необходимости единого владычества Индии.."
 RAJ_reinforce_reserved_seats: "Укрепить роль зарезервированных мест"
 RAJ_reinforce_reserved_seats_desc: "Зарезервированные места в парламенте гарантируют представительство конфессий, а также то, что землевладельцы и князья будут должным образом услышаны, а не вынуждены практически молчать. Многие политические силы не совсем согласны с этой идеей, поэтому мы должны укрепить их главенство и обеспечить, чтобы они были здесь, чтобы сказать свое слово.."
 RAJ_reward_loyal_princes: "Награждение лояльных князей"
 RAJ_reward_loyal_princes_desc: "Лояльные князья на северо-западе индийского континента, включая, в частности, махараджу Джамму и Кашмира, сыграли незаменимую роль в обеспечении выживания доминиона против предательских сил Османа и социалистических коварств ИНК. Мы продемонстрируем нашу признательность за их лояльность и подадим убедительный пример того, что лояльность - это всегда правильный выбор."
 RAJ_propound_party_anglophilia: "Поддержка англофилии"
 RAJ_propound_party_anglophilia_desc: "Наша приверженность делу Антанты должна подкрепляться их поддержкой дела Доминиона. Юнионисты - самая англофильская партия в Индии, и мы будем подчеркивать это, поскольку хорошие отношения с короной могут принести нам только плоды."
 RAJ_empower_panchayati_raj: "Расширить возможности Панчаяти Радж"
 RAJ_empower_panchayati_raj_desc: "Панчаяти Радж - это система местных собраний старейшин, которые разрешают споры и руководят общинами на муниципальном уровне. Мы расширим их административные, финансовые и законодательные возможности и повысим роль системы в местном управлении."
 RAJ_institute_price_controls: "Ввести контроль за ценами на с\х продукцию"
 RAJ_institute_price_controls_desc: "Определенная практика на сельскохозяйственном рынке привела к тому, что фермеры были вынуждены снижать цены, в результате чего они не получали достаточной прибыли для управления своими собственными участками. В долгосрочной перспективе это будет иметь разрушительные последствия, поэтому для обеспечения стабильности сельской экономики и наших источников продовольствия мы должны ввести контроль за ценами, чтобы фермеры могли продавать с прибылью, не беспокоясь."
 RAJ_regrow_the_zamindar_system: "Восстановите утраченных заминдаров"
 RAJ_regrow_the_zamindar_system_desc: "Система заминдаров в восточной и центральной Индии была в значительной степени ликвидирована незаконной бывшей Народной республикой Бхаратия. Мы восстановим утраченных заминдаров и обратим вспять разрушительную \"земельную реформу\", которую оккупанты провели для укрепления своего авторитарного контроля."
 RAJ_peasant_educational_initiatives: "Образовательные инициативы крестьян"
 RAJ_peasant_educational_initiatives_desc: "Образование среди крестьян никогда не было на должном уровне. Мы будем финансировать государственные инициативы, направленные на то, чтобы бедные индийцы от мала до велика имели доступ к образованию, необходимому для того, чтобы они могли максимально эффективно служить своей стране и общинам."
 RAJ_cemented_unionist_legacy: "Закрепить наследие юнионистов"
 RAJ_cemented_unionist_legacy_desc: "Мы выдержали испытания, перед которыми большинство из нас сдались бы и молили о пощаде. Мы боролись изо всех сил и продвигали нашу программу и наследие на благо Индии, и мы преуспели. Юнионисты распространили партийные отделения по всей Индии и в настоящее время являются главным органом, представляющим интересы консервативной Индии!"

 RAJ_the_preemptive_strike: "Превентивный удар"
 RAJ_the_preemptive_strike_desc: "Повстанцы на востоке неизбежно нападут на нас, независимо от того, как долго мы хотели бы затянуть конфликт. Однако, если Республика откажется от какого-либо плана вторжения, было бы глупо не нанести по ним удар первой, пока они все еще пребывают в замешательстве; и поэтому мы должны быть готовы к вторжению, если это произойдет."
 RAJ_bhutan: "Разобраться с Бутаном"
 RAJ_bhutan_desc: "Теперь, когда наш контроль над Индийским субконтинентом обеспечен, пришло время обратить внимание на нашу северную границу. В Китае набирают силу новые силы, а Гималаи снова находятся на переднем крае новой большой игры. Мы должны восстановить наш контроль над нашими старыми союзниками в Бутане, будь то путем заключения договора или применения силы."
 RAJ_nepal: "Разобраться с Непалом"
 RAJ_nepal_desc: "В хаосе, последовавшем за Вельткригом, Непал вторгся в индийские низменности. Настало время восстановить наши владения на этих территориях."
 RAJ_madras: "Интеграция декканских территорий"
 RAJ_madras_desc: "Народы южной Индии должны либо добровольно присоединиться к Индии, либо быть завоеванными - выбор за ними."
 RAJ_siam: "Бирманские территории в Сиаме"
 RAJ_siam_desc: "Сиамское королевство было одним из наиболее предприимчивых государств-стервятников, которые воспользовались беспорядками, вызванными падением Индии. Поскольку молодая бирманская нация находилась под сильным давлением социалистических восстаний в Ассаме и Бенгалии, правительство Сиама просто оккупировало несколько округов и префектур, включая город Моулмейн, упомянутый в знаменитой поэме Киплинга. Эти земли должны быть возвращены!"
 RAJ_goa: "Заявить претензии на Гоа"
 RAJ_goa_desc: "Анклав Гоа - не более чем заноза в заднице нашей гордой нации. Это по праву наша территория, и она должна быть возвращена."
 RAJ_pondicherry: "Заявить претензии на Пондичери"
 RAJ_pondicherry_desc: "Анклав Пондичери - не более чем заноза в заднице нашей гордой нации. Это по праву наша территория, и она должна быть возвращена."
 RAJ_ceylon: "Заявить претензии на Цейлон"
 RAJ_ceylon_desc: "По праву Цейлон, Мальдивы и другие острова Индийского океана являются частью законной территории нашей страны. Их колониализму должен быть положен конец."
 RAJ_burma: "Завоевать Бирму"
 RAJ_burma_desc: "Несмотря на отличие от остальной части Раджастана в истории и культуре, Бирма когда-то находилась под его властью. Как и в остальной части Раджастана, некоторые ее части находились под прямым управлением, в то время как другие находились под контролем местных правителей, аналогичных княжествам, и находились под твердой властью британской короны. Разобравшись с мятежными социалистическими и королевскими правительствами, мы не можем позволить, чтобы часть Раджей оставалась независимым примером для будущих предателей и мятежников."
 RAJ_tibet: "Подтвердить линию Макмагона"
 RAJ_tibet_desc: "Пока мы были заняты борьбой с социалистической угрозой и князьями-предателями, претензии, которых мы добились путем тщательных переговоров с Тибетом, были аннулированы и снова перешли в руки местных властей. Благодаря нашим недавним победам, восстановившим нашу власть над субконтинентом, у нас появилась новая возможность заявить о своих правах на эти регионы и новый импульс для защиты королевства от внешних угроз."
 RAJ_aksai_chin: "Восстановить линию Ардага - Джонсона"
 RAJ_aksai_chin_desc: "Первоначально созданная для обеспечения мощного передового присутствия против тогдашней угрозы со стороны царской России, линия Ардаг–Джонсон по-прежнему остается самой дальней северной границей королевства, независимо от того, какие угрозы сейчас таятся за ее стенами. Обеспечение его безопасности вновь обеспечит нам надежную защиту, если мы снова подвергнемся угрозе из-за гор."

### Bookmark ###
 RAJ_KR_gathering_storm_desc: "Попытки реформировать Раджистан, предпринятые после Вельткрига, были слишком слабыми и запоздалыми, и не могли связать жемчужину британской короны с Империей. Когда на Альбионе вспыхнула Революция, в Индии последовали восстания единомышленников. За этим последовала кровопролитная гражданская война, закончившаяся лишь временным прекращением огня в начале 1927 года. Даже те, кто оставался верен Великобритании во время этой войны, больше не могли мириться с существующим положением вещей, и правительство в изгнании вскоре уступило их требованиям о предоставлении статуса доминиона. Теперь эти лоялисты заключили оборонительный пакт с южными князьями, готовясь к тому, что повстанцы, наконец, возобновят конфликт."

### Intro Screen ###
 RAJ_country_intro_background: "GFX_RAJ_intro"
 RAJ_country_intro_header: "История Индийской Революции"
 RAJ_country_intro_content: "Когда началась Великая война, ни одно место под солнцем Британской империи не проявило большей лояльности, чем Индия. "Мечи воинственных князей выскочили из ножен", - как выразился один репортер. От окопов Западного фронта до пустынь Аравии войска Доминиона упорно сражались за своего короля-императора и боевую славу. Однако зарождающееся индийское национальное движение также ожидало, что их полная поддержка военных усилий, в свою очередь, приведет к политическим реформам внутри страны после завершения войны.\n\nНесмотря на все усилия войск Антанты, к 1919 году война была фактически проиграна, а массовые мятежи, последовавшие за битвой при Сен-Михеле, стали последним гвоздем в крышку гроба. Был подписан мирный договор, который в значительной степени был выгоден немцам, хотя Британия, а следовательно, и Индия избежали худшей из контрибуций. Поражение не остановило индийское реформаторское движение, которое теперь громко требовало введения в действие гомруля. Когда вместо этого эти призывы были встречены вялым внедрением системы передачи полномочий в форме двоевластия наряду с драконовским расширением чрезвычайной власти, гнев начал нарастать по всей стране, распространяя идею Свараджа по всей Индии.\n\nКогда убийство 41 бастующего шахтера в Уэльсе ввергло Альбион в революционный поток, их примеру последовали единомышленники-революционеры-националисты в Индии. Хотя эти первоначальные восстания были быстро подавлены, жестокость, с которой они происходили, вскоре привела к массовым беспорядкам по всему субконтиненту. Эти беспорядки в конечном итоге привели к провозглашению Пурна Свараджа руководством Индийского национального конгресса и созданию временного независимого правительства в Калькутте. Результатом такого заявления стала бы кровопролитная гражданская война между теми, кто верен империи, и теми, кто верен новому правительству.\n\nПоскольку Метрополия погрязла в трясине хаоса, британские войска в Индии в конечном итоге оказались бы сами по себе в борьбе с этими повстанцами, особенно после того, как волна раннего дезертирства лишила их возможности подавить восстание в зачаточном состоянии. Войска повстанцев, лояльные правительству Калькутты, быстро захватили контроль над большей частью страны, и падение временной британской столицы в Дели широко праздновалось как знак победы повстанцев. Однако это высокомерие в конечном счете привело бы к их гибели, поскольку повстанцы начали перенаправлять свои усилия на захват Юга.\n\nОпасаясь низложения в случае победы правительства Калькутты и полагая, что британцы полностью разгромлены, многие разрозненные князья Юга объединились под руководством Османа Али Хана из Хайдарабада, чтобы провозгласить свою независимость как \"Всеиндийскую федерацию\", которая стала известна в просторечии как \"Всеиндийская федерация\" как Федерация Раджей. Это заявление не было признано Калькуттой, которая начала предпринимать нападения на княжеские армии Федерации, поначалу с большим успехом. Крупные штаты, такие как Индаур и большая часть Бароды, перешли бы под власть повстанцев, однако это перенапряжение привело бы к реорганизации британских войск в Пенджабе.\n\nДействуя теперь из Лахора, британская контратака привела бы к возвращению Раджпутаны и большей части восточного Пенджаба и закреплению за ними оставшейся территории в регионе. Неспособность Калькутты вести эту войну на два фронта быстро привела к тому, что обе линии фронта стали неподвижными, а британцы и Федерация смогли закрепиться и консолидировать свои владения. Поскольку конца войне не было видно, в начале 1927 года были проведены переговоры о якобы временном прекращении огня между всеми сторонами, что в конечном итоге привело к фактическому завершению гражданской войны для большинства сторон."

 RAJ_country_intro_header_1: "От межвоенных лет до настоящего времени"
 RAJ_country_intro_content_1: "Даже если бы был достигнут мир, хаос, вызванный гражданской войной, оказал бы значительное влияние на всех воюющих сторон. На западе оставшиеся территории Британской Индии и княжеств, все еще находившиеся под британским сюзеренитетом, были преобразованы в объединенный доминион, управляемый избранным местным правительством. На первых выборах в 1929 году правительство возглавили либералы, но в 1934 году оно уступило место юнионистам Хизара Тиваны. Наряду с этим, в 1933 году махараджа и герой войны Ганга Сингх был назначен первым местным генерал-губернатором, что в значительной степени способствовало нормализации работы нового правительства.\n\nОднако на востоке переходный период был гораздо более неспокойным. После прекращения огня будет разработана конституция новой республики, разработанная по образцу конституции их коллег-революционеров из Британского союза. Вскоре после этого лидер военного времени Мотилал Неру ушел в отставку со своего поста и с политической сцены в целом, а партия избрала Лайпата Рая в качестве его преемника, который должен был стать объединяющей фигурой среди партийных крыльев. При Rai Республика проводила бы более примирительную политику по отношению к соперничающим правительствам, полагая, что при наличии достаточного количества времени и те, и другие войдут в состав Республики.\n\nПосле ухода самого Рая на пенсию в 1933 году единство в партии начало распадаться. Несмотря на то, что Фазлул Хук был бы избран председателем, Субхас Чандра Бозе предпринял бы заметную неудачную попытку, и отказ Хука от примирительных позиций Раи и его более тесное сближение с Третьим интернационалом привели бы к значительным разногласиям внутри партии. Катастрофическое столкновение на границе в Аджмере в 1935 году также сильно ослабило позиции Хука, что привело к отставке его заместителя, но пока Хуку удается удерживать свой пост председателя.\n\nТем временем на юге федеральное правительство также начало уступать позиции оппозиции своему лидеру. Хотя изначально предполагалось, что это будет федерация равных, где ее самые могущественные лидеры будут сотрудничать через Совет князей для обеспечения взаимной выгоды, растущее злоупотребление Османом предоставленными полномочиями привело к падению деспотизма. Несмотря на свои разногласия, четыре других члена Совета со временем объединились в оппозиции к автократии Османа, став известными многим как \"Большая четверка\". С наступлением нового года многие ожидают, что эта, казалось бы, несостоятельная система, так или иначе, наконец рухнет."

 RAJ_guide: "§MОбещанные выборы§!\n£white_dot Завершите фокус §YКонец кошмара§! для активизации миссии, связанной с предстоящими выборами.\n\n §MЮнионисты выстояли§! (§cСоциал-консерватизм§!)\n£white_dot За §cЮнионистов§! имейте больше популярности чем §mЛибералы§! и §lВПС§! во время миссии,связанной с предстоящими выборами.\n\n §MВосхождение либералов§! (§mРыночный либерализм§!)\n£white_dot За §mLiberals§! имейте больше популярности чем §cЮнионисты§! и §lВПС§! во время миссии, связанной с предстоящими выборами.\n\n §MТриумф Всеиндийской Партии Самуоправления§! (§lСоциал-либерализм§!)\n£white_dot За §lВПС§! имейте больше популярности чем §mЛибералы§! и §cЮнионисты§! во время миссии, связанной с предстоящими выборами."

### Events ###

 dominion_of_india_events.3.t: "Уход Георга V"
 dominion_of_india_events.3.d: "Свергнутый король Великобритании, Георг V наконец-то поддался болезни, мучившей его с тех пор, как на родных островах прокатилась революция. Как глава государства Доминиона Индии, Дели, его смерть, безусловно, вызовет проблемы среди конкурирующих фракций бывшего Раджа до коронации его сына, Эдуарда."
 dominion_of_india_events.3.a: "Антанта вступает в состояние траура."

## Black Monday Events ##

 dominion_of_india_events.2.t: "Черный понедельник ударил по Индии!"
 dominion_of_india_events.2.d: "Ударная волна экономического коллапса Германии наконец докатилась и до Индии. Хотя, по прогнозам, мы, безусловно, пострадаем не так сильно, как Европа и другие страны, более тесно связанные с немецкой экономической сферой, перебои в торговле с соседними регионами и проблемы, с которыми сталкиваются другие доминионы, неизбежно повлияют на нас. Одна из проблем, которая быстро стала очевидной, - это паранойя наших банковских учреждений и кредиторов, которые теперь более агрессивно преследуют своих должников, опасаясь, что экономические последствия могут привести к тому, что они не получат свои деньги обратно.\n\nДополнительную - и, возможно, самую серьезную - озабоченность вызывает город Карачи, крупный портовый город на юге страны, экономика которого в значительной степени зависит от международной торговли. Что больше всего беспокоит, так это замедление экспорта пшеницы и хлопка, которые составляют значительную часть нашего экспорта и поддерживают нас на финансовом плаву в свете продолжительного кризиса на большей части Индийского субконтинента. Если это и дальше будет становиться проблемой, то не только наша экономика рухнет, но и может разразиться масштабный сельскохозяйственный кризис, которым, несомненно, воспользуются наши враги в Калькутте при первой же возможности. Отсутствие судов, прибывающих и покидающих порт Карачи, несомненно, вызовет большие разногласия среди работающих там докеров, поскольку их и без того скудная заработная плата еще больше сократится..."
 dominion_of_india_events.2.a: "Твою мать!"

 dominion_of_india_events.7.t: "Забастовка докеров в Карачи!"
 dominion_of_india_events.7.d: "Действительно, перебои в торговле в Карачи и за его пределами привели к очередному каскаду событий, вызванных волнами Черного понедельника. Ранее этим утром стивидоры и рабочие, занятые в порту Карачи, официально организовались и начали забастовку, ссылаясь на невыплату заработной платы и угрозу увольнений. В результате мы столкнулись не с резким сокращением объемов торговли, а с переполненными судами, стоящими в гавани, и значительным волнением со стороны торговых партнеров, которые у нас по-прежнему есть, поскольку импорт / экспорт теперь обрабатывается через ужасно маленькие и гораздо менее способные порты в Белуджистане и Синде.\n\nПолитические последствия были жесткими, поскольку в палатах растет паника из-за того, что социалистическое движение может получить дальнейшее развитие внутри страны, учитывая угрозу со стороны ИНК, которая находится прямо по ту сторону нашей границы. Землевладельцы и магнаты в равной степени требуют от нашего правительства ответа, чтобы воспрепятствовать аналогичным движениям, формирующимся в городах на севере, на которых Либеральная партия и Всеиндийская партия самоуправления теперь начали спекулировать в попытке свергнуть нашу политическую гегемонию. Быстрое реагирование представляется крайне важным, поскольку без прямого вмешательства ситуация вряд ли значительно улучшится."
 dominion_of_india_events.7.a: "Черт возьми!"

 dominion_of_india_events.8.t: "Окончание забастовки докеров Карачи"
 dominion_of_india_events.8.d: "Под давлением премьер-министра Тиваны власти Карачи принудительно прекратили забастовку в порту Карачи, подкрепленную устрашающим видом военного корабля HMS Calcutta, маячившего в поле зрения бастующих на набережной. Как только стало очевидно, что значительная группа бастующих откажется отступать, была применена жестокая сила, что привело к нескольким ранениям с обеих сторон и в общей сложности аресту 121 человека. В последующие дни город потрясла серия рейдов, спровоцированных красным террором, и несколько человек, обвиненных в сочувствии ИНК и работе на нее, были дополнительно заключены в тюрьму. Согласно отчету управления начальника полиции Карачи, в ближайшие несколько месяцев может потребоваться усиление присутствия властей, но ожидается, что в целом недовольство будет незначительным.\n\nРеакция общественности на этот разгром была неоднозначной: большинство негативных оценок действий правительства в отношении забастовки были приглушены из-за боязни прослыть \"синдикалистским смутьяном\". Те, кто обеспокоен подходом профсоюзных активистов к защите трудовых прав, похоже, нашли фигуру, за которую можно объединиться, в лице Мухаммеда Али Джинны. Джинна ясно дал понять, что он полностью и безоговорочно недоволен жесткими мерами, принятыми для прекращения забастовки, утверждая, что такие меры только подтолкнут больше индийцев к очарованию социализма и рискуют взбудоражить и без того обнищавший индийский рабочий класс.\n\nВсеиндийская партия самоуправления Джинны апеллирует к избирателям, которые по большей части все еще не имеют избирательных прав, однако его стремление к полной конфедерализации Доминиона поддерживается некоторыми более независимо мыслящими княжескими штатами, такими как Джамму и Кашмир. Как бы то ни было, на данный момент он представляет незначительную угрозу для нашего управления и остается не более чем раздражающей занозой в боку."
 dominion_of_india_events.8.a: "Джинна продолжает цепляться."

 dominion_of_india_events.9.t: "Дебаты по поводу сферы действия Закона о выплате заработной платы"
 dominion_of_india_events.9.d: "Чтобы предотвратить в будущем такие события, подобно забастовке докеров в Карачи, и помочь обеспечить более бедных индийцев после экономического спада, юнионистская партия официально разработала "Закон о выплате заработной платы", направленный на ограничение вычетов из заработной платы работников. Поддержанный большинством членов партии и даже получивший одобрение некоторых функционеров Либеральной партии Индии, этот закон будет принят с минимальными потрясениями. Премьер-министр Тивана надеется, что это улучшит мнение бедных индийцев о юнионистской партии и, как мы надеемся, расширит наше влияние в городских центрах - демографическом регионе, в котором юнионисты ведут борьбу за пределами Лахора. Как обычно, Мухаммед Али Джинна позиционирует себя как вечный противник юнионистов и критикует законопроект в парламенте, утверждая, что он дает слишком мало и слишком поздно.\n\nДжинна и члены его партии потребовали, чтобы без принятия закона, предусматривающего повышение минимальной заработной платы, это было равносильно пощечине индийским рабочим, и они продолжат радикализировать индийцев в угоду агитациям Всеиндийского конгресса профсоюзов и махинациям Народной Республики Бхаратия в отношении наша граница. Магнаты и промышленники, представленные в палате, горячо осуждают любые попытки введения такого закона, заявляя, что шок от "черного понедельника" привел к тому, что большинство предприятий в одностороннем порядке не смогли позволить себе повышение минимальной заработной платы. Эту оппозицию разделяют либералы, которые теперь заявляют, что партия объединится для одностороннего осуждения этого акта, если мы уступим упертости Джинны.\n\nЗаручиться поддержкой AIHRP будет означать, что поддержка либералов будет совершенно необязательной при принятии закона. Некоторые профсоюзные деятели советуют Тиване, что если он выполнит предложение Джинны, это только повредит нашим отношениям с важнейшей базой поддержки и увеличит поддержку социального класса, который почти не участвует в выборах. И наоборот, Чхотту Рам поддержал предложение Джинны и высказал свое мнение о том, что Индия и индийский бизнес могут только выиграть от того, что у индийца будет больше денег, которые он сможет потратить в своей общине. В конце концов, Тивана решила:..."
 dominion_of_india_events.9.a: "Прислушайться к Джинне и расширить сферу действия этого закона."
 dominion_of_india_events.9.b: "Отвергнуть это утопическое предложение, которое только навредит собственникам."

 dominion_of_india_events.10.t: "Мукунд Рамрао Джаякар критикует Юнионистскую партию"
 dominion_of_india_events.10.d: "В ответ на двукратное снижение действующим правительством тарифов на импорт продовольствия и сельскохозяйственной продукции в парламенте вспыхнул переполох. М.Р. Джаякар, возможно, самый ярый член Либеральной партии Индии, выступил против нашей \"враждебной торговле\" политики после того, как импорт сократился до минимума. В Карачи все шло черепашьим шагом. "Мое недоверие превзошло все, что я когда-либо мог себе представить, прочитав в газете, что Тивана придерживается одной из самых разрушительных политик, проводимых его администрацией, несмотря на то, что всем здравомыслящим людям ясно, что тарифы прямо сейчас равносильны выстрелу себе в ногу, и затем в обе коленные чашечки.\" это одна из цитат, которая повторялась во многих публикациях в Пенджабе и Карачи. Джинна почти не колебался, когда ему представилась возможность нанести еще один удар по юнионистам, согласившись с замечаниями Джаякара и добавив, что юнионисты, похоже, намерены потопить корабль перед лицом того, что их каденция быстро сокращается.\n\nКонечно, на местах плоды сделанного нами выбора созревают ожидаемыми темпами. Сектор натурального хозяйства сохранил устойчивость во время шторма, и фермеры обнаружили, что их рынки остаются сильными и активными. В условиях слабой иностранной конкуренции фермеры находят спасение в том, что их клиенты не обращаются к более дешевому импорту в это кризисное время. Городское население Карачи, конечно, не в восторге от нашей программы, и, похоже, она подтолкнула многих жителей региона в гостеприимные объятия либералов. Хотя это, безусловно, прискорбно, в этом нет ничего удивительного. Карачи всегда был главным бастионом либералов, и он всегда был готов к тому, что они будут все ближе и ближе подползать к нему. Тем не менее, Тивана по-прежнему уверен, что \"Мелкие заминдары\" по-прежнему одобряют его политику, поскольку их лояльность гораздо важнее, чем у тех, кто в любом случае всегда склонялся бы к Либералам или ВПС."
 dominion_of_india_events.10.a: "Слезами горю не поможешь."

 dominion_of_india_events.11.t: "Худшее позади"
 dominion_of_india_events.11.d: "По мере того как солнце снова встает над Карачи, а сразу за ним и над Лахором, последствия Черного понедельника постепенно перестают ощущаться. Фермеры продают свои продукты на рынках, торговля экзотическими товарами постепенно пробуждается от своего пресловутого сна, и винтики промышленности работают с обычной скоростью. Заводы снова набирают персонал, поезда ходят по расписанию, а порт Карачи возвращается к нормальной работе. Руководство Тиваны получило признание в газете, и те, кто был разочарован в профсоюзных активистах, теперь находят способ избавиться от соблазнительных чар оппозиции. Худшие экономические последствия остались далеко позади, и теперь индийцы с оптимизмом смотрят в свое будущее, чего всего несколько месяцев назад у них едва ли было вообще.\n\nВстреча генерал-губернатора Ганги Сингха и Тиваны подтвердила уверенность Сингха в том, что эта должность позволит воссоединить доминион под властью Виндзорской короны. Сингх убежден, что после объединения сила Индии возрастет, и она получит огромные рычаги влияния в Содружестве и, как следствие, в альянсе Антанты. Восстановление экономики только укрепило это убеждение, поскольку, несомненно, Индия, объединившись, обладает потенциалом стать промышленной державой, которая будет соперничать с Соединенными Штатами и Германией. На данный момент юнионисты остаются любимцами сына представителя короля в Индии, и мы надеемся, что эта привилегия выдержит испытание временем. Все, что нужно сделать сейчас, - это насильственно реинтегрировать восточных социалистов и подавить вероломных южных князей."
 dominion_of_india_events.11.a: "Это трудный путь, но то, что ждет нас в конце, того стоит."

 ## Pre-War Political Events ##

 dominion_of_india_events.12.t: "Шриниваса Шастри уходит с поста лидера либералов"
 dominion_of_india_events.12.d: "Шринваса Шастри долгое время занимал пост главного партийного руководителя Национал-либеральной федерации Индии, придя к власти после подавления восстания и подтвердив лояльность партии Доминиону. Примерно столько же времени он также был одной из самых влиятельных фигур общества "Слуги Индии" и лично следил за тем, чтобы оно оставалось лояльным Доминиону и чтобы оно оставалось номинально аполитичной организацией (хотя многие в НЛФИ, также связанные с организацией, все еще используют ее в качестве неофициального рупора).\n\nПолитическая карьера Састри длилась десятилетия, и в 1936 году он, наконец, решил уйти в отставку. Объявив о своем уходе в парламенте сегодня утром, он завершил свою речь, подчеркнув важность сотрудничества между партиями, поскольку дальнейший раскол будет только усиливаться из-за угрозы существованию по ту сторону границы. Это хорошая мысль, но любой здравомыслящий и знающий человек сразу же поймет, что она идеалистична и нереалистична. Сейчас Либеральная партия Индии нуждается в новом лидере и, возможно, в новом кандидате. На первый план вышли два кандидата, оба с высокой квалификацией, и они в равной степени рассматриваются в рамках НЛФИ.\n\nПервый кандидат - Мукунд Рамрао Джаякар, возможно, самый яростный оратор в НЛФИ. Политические связи Джаякара обширны и невероятно колоритны, он был лидером ныне несуществующей партии Сварадж, прежде чем окончательно перейти в NLFI. Он также является известным членом и влиятельной фигурой Хинду Махасабха, которая номинально разделилась на две части после того, как ситуация на фронтах застопорилась, и действует как в Доминионе, так и в Республике. Джаякар открытый антиюнионист и в настоящее время поддерживает ожесточенное политическое соперничество с Джинной.\n\nВторой кандидат, Тедж Бахадур Сапру, придерживается гораздо более умеренных взглядов. По-прежнему поддерживая секуляристские взгляды NLFI, Сапру является умеренным членом партии, заинтересованным в окончательной отмене кастовой системы. Будучи также членом Хинду Махасабха, он, как утверждается, не является сторонником индуистского превосходства (в отличие от Джаякара), и благодаря своему авторитетному опыту и популярности (будучи любимым сыном Шастри) он является очень сильным кандидатом на выдвижение.\n\nВ конце концов, может быть выбран только один из них. НЛФИ должна делегировать свое руководство..."
 dominion_of_india_events.12.a: "Мукунд Рамрао Джаякару, известному активисту!"
 dominion_of_india_events.12.b: "Теджу Бахадур Сапру, любимцу партии!"

 dominion_of_india_events.13.t: "Ход реконструкции в Кветте"
 dominion_of_india_events.13.d: "Примерно год назад, 31 мая 1935 года, в Кветте и Белуджистане произошло сильнейшее землетрясение. Это было самое сильное землетрясение, когда-либо зарегистрированное в регионе, оно привело к десяткам тысяч жертв и почти полностью сравняло с землей несколько деревень. Наибольший ущерб был нанесен городу Кветта, который был почти полностью сровнен с землей и понес наибольшее количество жертв. Тысячи жителей деревни были вынуждены покинуть свои дома, и только недавно были восстановлены основные транспортные пути, ведущие в Кветту и обратно. Теперь, среди разрушенных деревень, вдоль горных перевалов и даже на основных дорогах, свирепствует бандитизм. Заражая местность, как пандемия, бригады по восстановлению и оказанию гуманитарной помощи с трудом добираются хотя бы до половины пути к месту назначения, не попадая в засаду.\n\nПо этой причине было предложено сосредоточить больше ресурсов на восстановлении в регионе. Командиры, отвечающие за этот район, согласны с этой идеей и предположили, что денежные вливания и ожесточенная кампания по борьбе с бандитизмом позволили бы решить проблемы, с которыми сталкиваются власти по восстановлению, и значительно ускорить этот процесс. Финансово сознательные члены правительства предложили нам не выделять еще больше жизненно важных государственных ресурсов и вместо этого создать общественный фонд помощи, собирающий пожертвования от предприятий, князей и частных лиц, чтобы помочь увеличить бюджет на реконструкцию. Однако в связи с недавними экономическими последствиями крайне маловероятно, что этот фонд покроет расходы, запрошенные местными властями."
 dominion_of_india_events.13.a: "Мы дадим столько, сколько сможем."
 dominion_of_india_events.13.b: "Общество должно взять на себя это."

 dominion_of_india_events.14.t: "Мухаммед Али Джинна прибывает в Шринигар"
 dominion_of_india_events.14.d: "Возникшее после Первой англо-сикхской войны княжество Джамму и Кашмир было собрано из различных регионов, где проживали индуисты, сикхи, мусульмане и даже некоторые тибетцы. Сегодня, после почти столетнего правления Догра-Раджа, Джамму и Кашмир, как считается, находится во власти индуистской элиты, несмотря на то, что большинство его населения составляют крестьяне-мусульмане.\n\nЭто может быть лучше всего отражено на политической арене региона, где царит крайне поляризованная атмосфера, разделенная между двумя силами. Махараджа Хари Сингх является воплощением истеблишмента и ревностно защищает автономию своего государства. Хари Сингх, одна из важнейших опор выживания Доминиона во время восстания, остается по нашу сторону баррикад; хотя некоторые опасаются, что он может приветствовать войска Османа, если они решат перейти границу и покончить с Доминионом раз и навсегда. Второй полюс кашмирской политики возглавляет шейх Абдулла, который основал партию Найя Кашмир и объединил ее с Всеиндийской партией самоуправления Мухаммеда Али Джинны вскоре после создания Доминиона. Абдулла и кашмирский политик-пандит Прем Нат Базаз были главными выразителями прогрессивизма, выступая в качестве защитников философии Кашмириата против жесткого правления династии Догра.\n\nИ вот, в солнечный день, Мухаммед Али Джинна прибыл в столицу Джамму и Кашмира Шринигар. Его миссия состоит в том, чтобы расширить свое влияние в регионе и укрепить позиции своей партии, которая борется с огромным влиянием и покровительством НЛФИ и Партии Юнионистов. Джинна получил два противоречащих друг другу приглашения, которые усложняют ситуацию в Кашмирской долине. Шейх Абдулла предложил Джинне встретиться и вместе выступить с воодушевляющей речью, которая укрепит позиции их партий в регионе. Второе приглашение исходит от самого Хари Сингха, который предложил принять его во дворце Шер Гархи, чтобы обсудить предложенную Джинной реформу, направленную на создание конфедеративной Индии, а не федеральной.\n\nПридерживаться своего первоначального плана и сначала встретиться с шейхом Абдуллой, по-видимому, является наиболее последовательным планом в отношении поддержания общественного имиджа Джинны. Однако, несмотря на то, что влияние шейха Абдуллы довольно велико, заручиться покровительством такого чрезвычайно влиятельного государственного принца - это преимущество, над которым абсолютно нельзя издеваться. В любом случае, его будет ждать процессия чрезмерно восторженных людей, что, по крайней мере, немного утешает. Джинна, тем не менее, решает..."
 dominion_of_india_events.14.a: "Укрепить союз с Найей Кашмир, отказавшись от союза с махараджой."
 dominion_of_india_events.14.b: "Отдать уважение династии Догра, отвергнув шейха Абдуллу."

 dominion_of_india_events.15.t: "Кризис в Удрасаре Кисане Саммелане"
 dominion_of_india_events.15.d: "Штат Биканер, дом нынешнего генерал-губернатора Ганга Сингха, стал местом большой тревоги, которую подняли многие люди, обеспокоенные нашей национальной безопасностью. Много лет назад, во время мятежа правительства Калькутты, бывший полицейский Вайдхья Магарам перешел на сторону повстанцев и возглавил небольшое восстание на сельской окраине Биканера. Это восстание было быстро подавлено, хотя Магарам избежал поимки и, согласно нашим источникам, обосновался в Калькутте, основав \"Биканер Праджамандал\". Это городское движение поддерживает ячейки в княжествах Раджпутаны и их окрестностях, которые все еще находятся под крылом нашего правительства, агитируя против \"феодальных и колониальных пережитков, которыми заражено правительство Доминиона\". Благодаря эффективной работе обширной сети информаторов Чарльза Тегарта, большая часть их деятельности тщательно отслеживалась, и многие активисты, связанные с ИНК, Праджамандалами, были арестованы и пресечены любые сомнительные действия по подстрекательству толпы.\n\nНесмотря на наши усилия, похоже, что его пылкая предвыборная кампания достигла своего апофеоза. За несколько дней до этого состоялась конференция крестьян-фермеров, известная как "Удрасар кисан саммелан", целью которой была организация крестьянского движения против местного правительства за сотрудничество и сохранение феодальных структур, которые их угнетают. Что больше всего беспокоило, так это присутствие Вайдхьи Магарама, который, по-видимому, пересек границу в попытке скоординировать Биканер Праджамандал с крестьянским движением. После быстрого реагирования полиции вспыхнула драка, переросшая в жестокую драку, в результате которой погибли четыре человека и около шестидесяти семи получили ранения, хотя сообщалось о минимальных потерях со стороны правоохранительных органов. Магарама задержали на месте преступления и отправили в тюрьму в ожидании справедливого судебного разбирательства за его подстрекательскую деятельность.\n\nОднако сегодня утром в Биканере вспыхнули массовые протесты. Арест Магарама только сплотил вокруг него местное крестьянское сообщество и только усилил его позицию. Перед дворцом Лалгарх, где Ганга Сингх в настоящее время навещает свою семью, было сосредоточено большое количество полиции, и напряженность начала нарастать. Настроение во дворце действительно тоже скверное, поскольку Ганга Сингх и его семья опасаются, что это может стать началом восстания и что на кону могут оказаться их головы.\n\nВозможны два варианта: либо полиция принудительно прекратит акцию протеста, восстановив порядок за счет большого недовольства крестьянства в княжеском государстве. В качестве альтернативы, мы можем ослабить напряженность, решив некоторые из их проблем и дав несколько полупустых обещаний о серьезной реформе институтов, существующих в Биканере (за счет недовольства князей)."
 dominion_of_india_events.15.a: "Покончите с этим кризисом до того, как Ганга Сингх пойдет по пути Романовых!"
 dominion_of_india_events.15.b: "Бархатная перчатка - это то, что нужно."

 dominion_of_india_events.16.t: "Завершение реставрации форта Лоди"
 dominion_of_india_events.16.d: "Провинция Пенджаб является одним из самых важных районов доминиона, и город Лудхиана расположен недалеко от линии соприкосновения с правительством Калькутты. Недавние усилия по восстановлению цитадели Лоди были предприняты только благодаря ее важному расположению, и сегодня эти усилия, наконец, принесли свои плоды.\n\nОбъявив об окончании официальной реконструкции крепости, премьер-министр Хайат Тивана председательствовал на церемонии и выступил с речью, в которой повторил миссию Доминиона. Порицая правительство Калькутты как всего лишь второе британское правление, только при авторитарных воинствующих социалистах, а не просто при британцах, Тивана подчеркивал, что форт символизирует приверженность Лахора защите прав всех индийцев от ядовитых змей из ИНК. К сожалению, речь Тиваны изобиловала заиканиями и неловкими моментами молчания, что подчеркивало недостаток опыта публичных выступлений у этого человека и приводило к легкому смущению перед толпой. Несмотря на это, послание дошло до всех, и присутствовавшие в толпе солдаты были довольны тем, что их правительство действительно очень серьезно относится к вопросам военной безопасности."
 dominion_of_india_events.16.a: "В этот знаменательный день мы высоко держим головы."

 dominion_of_india_events.17.t: "Дело Шахидганджа"
 dominion_of_india_events.17.d: "Расположенный между железнодорожным вокзалом и историческими воротами Дели в Лахоре, комплекс занимает значительный участок земли, управляемый сикхами и функционирующий как Гурдвара после разрушения бани Великих Моголов. Споры разгорелись в прошлом году, когда община сикхов начала планировать снос 250-летней мечети, которая долгое время не использовалась по своему обычному назначению и использовалась сикхами как лангар и складское помещение. Новость о планируемом сносе вызвала фурор среди мусульманской общины, но, несмотря на протесты, все судебные апелляции и решения будут приниматься в пользу сикхов.\n\nТе, кто обращался к правительству с просьбой спасти мечеть, также не нашли желаемых ответов, поскольку премьер-министр Тивана избегал выступать от имени мечети, опасаясь нанести серьезный ущерб мнению сикхов о юнионистской партии. Это частично привело к обратным результатам, поскольку Мухаммед Али Джинна выступил в качестве посредника в отсутствие профсоюзных активистов, особенно после межконфессиональных беспорядков, в результате которых погибли 3 мусульманина и 2 сикха. Джинна поддержал и выдвинул ряд законопроектов и апелляций, которые в достаточной степени отсрочили процесс сноса по крайней мере до 1936 года, и поклялся ослабить волнения мусульманской общины.\n\nТем временем было проведено несколько встреч между влиятельными лидерами общины, и еще несколько демонстраций привели к арестам и хаосу на улицах Лахора. Жаркий спор между Мухаммедом Икбалом и мастером Тарой Сингх вылился в серию случаев межконфессионального насилия по всей провинции Пенджаб. Икбал зашел так далеко, что опубликовал стихи, в которых воспылал страстью к сикхским общинам, и удвоил свои призывы к доминиону отказаться от притязаний на Индию и вместо этого основать исламскую республику. Неспособность правительства принять решительные меры привела к расследованию дела об убийстве недалеко от афганской границы, когда два путешественника-индуиста, как утверждалось, были убиты исламскими фундаменталистами. Это дело с ограниченной достоверностью, которое все еще находится в стадии тщательного расследования, тем не менее вызвало гнев НЛФИ, которые теперь осуждают бездействие правительства и поддерживают все более активную позицию сикхов.\n\nВмешательство в дела сикхов внесет серьезный вклад в наши отношения с Широмани Акали Дал и обеспечит Либералам выгодное положение среди них. С другой стороны, если мы выполним решения судов и позволим сносу продолжаться, мусульманская община еще больше отдалится от нас в объятия Джинны."
 dominion_of_india_events.17.a: "Это насилие должно прекратиться, мечеть Шахидгандж не падет."
 dominion_of_india_events.17.b: "Мы не имеем права вмешиваться в решения судов."

 dominion_of_india_events.18.t: "Хан Калата против Шахи Джирги"
 dominion_of_india_events.18.d: "Княжество Калат, расположенное в центре Белуджистана, является одним из наиболее важных центров белуджского национализма. В регионе появилось несколько партий, в том числе Анджуман-и-Иттехад-и-Белуджистан и ее радикальное ответвление, Национальная партия штата Калат, реваншистская и белуджская ультранационалистическая партия, которая пользуется тактичной поддержкой со стороны очень независимо мыслящего хана Калата Ахмада Яр Хана. Темперамент и непримиримость Ахмада сдерживает только тот, кого он называет своим "политическим отцом", Мухаммед Али Джинна, чья платформа дальнейшей конфедерализации во многом соответствует целям хана. Это не означает, что Джинна обладает какой-либо монополией в регионе, поскольку Анджуман и Шахи джирга (административный орган племени, обладающий зарезервированными местами в парламенте, а также обладающий исполнительной, судебной и законодательной властью над пуштунскими и белуджскими племенами) твердо поддерживают юнионистов.\n\nУ Шахи Джирги и Ахмада Яр Хана были очень плохие отношения друг с другом. Многие попытки хана провести модернизацию и реформы были пресечены Джиргой, включая отмену биджара (налога на празднование), Пурси (налога на смерть) и Мали (ежегодного налога), которые, по мнению хана, в значительной степени не нужны. Теперь хан Калата пытается полностью свергнуть Шахи Джиргу, заменив ее роль представительного органа в Калате на наделенный полномочиями кабинет и модернизированную законодательную систему с ограниченным правом голоса. Критики этого шага утверждают, что эти места предназначены для того, чтобы их заняли союзники хана и КСНП, отстраняя Анджумана и Джиргу от государственной политики и укрепляя его деспотическое правление.\n\nНесомненно, Джирга и местные сардары, которые ее поддерживают, за последние несколько лет сильно коррумпировались, накапливая богатства и мало что делая для улучшения отсталости региона. Тем не менее, это по-прежнему важный противовес заигрыванию хана с независимым Белуджистаном. Анджуман сыграл важную роль в продвижении юнионистских программ в регионе, и его свержение значительно ослабило бы наш контроль. Используя тщательный патронаж, чтобы заручиться поддержкой муниципалитета для подкрепления решения исполнительной власти, направленного против хана, мы можем гарантировать, что он не сможет осуществить желаемую перестройку местной системы. Однако мы должны быть вынуждены задуматься о следующем: стоит ли вкладывать капитал в такой отдаленный, слаборазвитый регион, чтобы защитить наше влияние?"
 dominion_of_india_events.18.a: "Мы кое-кому поможем, и Шахи Джирга не будет распотрошена."
 dominion_of_india_events.18.b: "Возможно, хан воспользуется своим новообретенным мандатом во благо?"

 dominion_of_india_events.19.t: "Неудавшаяся Революция в Порт-Блэр!"
 dominion_of_india_events.19.d: "Андаманские и Никобарские острова - это территория доминиона, расположенная в Бенгальском заливе и являющаяся одним из наших ключевых объектов для военно-морского базирования. В крупнейшем населенном пункте, Порт-Блэре, находится \"Сотовая тюрьма\" - огромный тюремный комплекс, в основном используемый для содержания революционеров и политических заключенных. За последнее десятилетие защита и безопасность этого учреждения, а также островов претерпели множество улучшений из-за враждебного режима в Калькутте, представляющего угрозу существованию тюрьмы. Однако, похоже, этого было недостаточно, поскольку взрыв во втором крыле, за которым последовали действия нескольких повстанцев, которые, как теперь установлено, принадлежали к Индостанской социалистической республиканской ассоциации, едва не привел к тому, что весь комплекс был охвачен жестокими беспорядками. Сотрудники службы безопасности ответили тем же, ликвидировав революционеров и поймав беглецов в течение тридцати часов после инцидента.\n\nПо мере того как ситуация налаживается, по всему Порт-Блэру прокатывается массовая волна арестов, в том числе популярного местного поэта по имени Диван Сингх Диллон, за которым полиция тщательно следит на предмет предполагаемых связей с гандистской сектой ИНК. Чтобы продемонстрировать, что действия имеют свои последствия, была вынесена массовая волна смертных приговоров как недавно заключенным (включая Диван Сингха), так и некоторым из самых тяжких преступников, находящихся в тюрьме."
 dominion_of_india_events.19.a: "Последствия настигают тех, кто к ним стремится."

 dominion_of_india_events.20.t: "Смерть Бхупиндера Сингха"
 dominion_of_india_events.20.d: "Изгнанный махараджа Патиалы Бхупиндер Сингх долгое время был защитником владычества Индии и выдающимся англофилом после возвышения независимо мыслящих деканских князей. Сумев вывезти свое огромное богатство во время революции, он пользовался большим влиянием в королевских кругах и был неутомим в своих усилиях по установлению сердечных отношений и сотрудничества между правительствами Лахора и Хайдарабада. Однако по прибытии в порт Карачи после роскошного банкета в Кочине у него случился сердечный приступ, и он потерял сознание прямо на причале. После целого дня неопределенности было объявлено, что он скончался.\n\nВнезапность его смерти породила множество заговоров, а его сын и преемник Ядавиндра Сингх в частном порядке утверждал, что его, должно быть, отравили южные принцы. Когда новостные издания начали спекулировать на этих теориях, премьер-министр Тивана выступил на его похоронах и решил публично опровергнуть эти теории, вместо этого возложив вину на агентов AITUC и INC в попытке предотвратить дипломатический конфликт между Доминионом и королевским правительством. Этот недовольный Ядавиндра, который холодно отнесся к премьер-министру и позже признался другу в своем раздражении по поводу Тиваны за "политизацию" похорон его отца. Было ли это противоречивой хвалебной речью Тиваны или естественным результатом симпатий, которые принц питал в течение довольно долгого времени, но Ядавиндра, как сообщается, пожертвовал значительную сумму денег индийской либеральной партии и начал лоббировать ее интересы в кругах индусских князей."
 dominion_of_india_events.20.a: "В любом случае, Ганга Сингх торжественно оплакивает своего старого друга."

 dominion_of_india_events.21.t: "Массовые беспорядки в Синде"
 dominion_of_india_events.21.d: "Во время муниципальных выборов в Карачи в 1936 году Абрахам Рубен, где проживала самая значительная еврейская община доминиона, стал первым в Индии евреем, избранным должностным лицом (в качестве члена городского совета). С тех пор член городского совета Рубен посвятил себя представлению маргинализированной еврейской общины в местной политике и помог провести реконструкцию синагоги "Магайн Шалом", которая завершилась две недели назад. Это, однако, вызвало гнев местной мусульманской общины, которая уже более десяти лет ходатайствует о восстановлении заброшенной мечети Манзилга в северном городе Суккур. Зафар Али Хан, влиятельный мусульманский поэт, подверг резкой критике поспешность реконструкции мечети Магайн-Шалом в противовес монолитному прогрессу, с которым продвигались планы по строительству мечети Манзилга, и призвал мусульман настойчиво добиваться восстановления мечети любой ценой. Восстановление в основном замедлилось из-за индуистского храма Садху Бело на острове прямо за рекой, поскольку индуистская община в городе решительно выступает против строительства действующей мечети так близко к почитаемому храму.\n\nНынешний губернатор провинции Синд Гулам Хуссейн Хидаятулла сохранил статус-кво в отношении мечети, поскольку опасается отчуждения индуистского населения провинции. Зафар Али Хан вновь обратился с прямым призывом к Гуляму, который в очередной раз отказался продвигать какие-либо планы по восстановлению. В ответ Али Хан и его сторонники объявили бойкот индуистским товарам по всей провинции и массово заняли территорию Манзилги, что привело к многочисленным арестам и переполненности местных тюрем. Эта нестабильность фактически привела к тому, что Гулам поколебался в своей позиции и дал полупустое обещание тщательно изучить возможность восстановления, что вызвало бурное ликование мусульманской общины.\n\nНапротив, Б.С. Мунье и индуистская махасабха пригрозили губернатору, что, если в Манзилге будут проводиться какие-либо ремонтные работы, к индусам Синда будет обращен призыв прекратить всякую поддержку его правительства. Это заставило Гуляма отказаться от своих заявлений и еще больше обострило ситуацию. Хинду Махасабха созвала демонстрацию в городе, которая вскоре привела к разрушительным столкновениям между мусульманами и индуистами, в результате которых погибли 198 человек, а город был полностью закрыт. Гулам теперь обратился непосредственно к нашему правительству за советом о том, как действовать дальше, опасаясь, что насилие на религиозной почве распространится за пределы Суккура на Синдхи, Хайдарабад и Карачи."
 dominion_of_india_events.21.a: "Посоветуйте, как можно скорее восстановить мечеть Манзилга."
 dominion_of_india_events.21.b: "Сохраните статус-кво и предложите другое место для строительства новой мечети."

## Army Events ##

 dominion_of_india_events.22.t: "Разногласия в верховном командовании"
 dominion_of_india_events.22.d: "Армия доминиона Индия уже давно страдает от недостатков, многие из которых унаследованы от военного истеблишмента британского владычества. В ее состав входят как индийские, так и белые офицеры, и, как правило, большое влияние оказывают генералы старой гвардии и консервативно настроенные. Задачей интеграции таких институтов, как Вооруженные силы индийских штатов, и надлежащей реструктуризации армии был Филип Уолхаус Четвод, ветеран Второй англо-бурской войны и Великой Отечественной войны. Четвод сыграл важную роль в наблюдении за индианизацией армии и привел ее к "современным" стандартам, последний из которых в последнее время оспаривается некоторыми.\n\nМногие из новых и более амбициозных генералов и военного персонала стали выступать за скорейшее внедрение профессиональной механизации армии, имитируя достижения немецкой и российской армий. Настойчиво проводя эти реформы, можно добиться существенного превосходства над армиями Народной Республики Бхаратия и, в худшем случае, над Княжеской федерацией на юге. У Филипа Уолхауза Четвода есть гораздо более скромный план на будущее армии, который прямо отвергает танки как нереалистичные для того, насколько развита территория, контролируемая Доминионом. Вместо этого он предпочитает воспитывать у солдат чисто личную выдержку и полагаться на кавалерию в качестве танков на поле боя, предсказывая, что Республика не сможет должным образом использовать танки, по крайней мере, в течение следующих пяти лет.\n\nОпасаясь, что его упрямство только ослабит позиции армии, эти сотрудники более чем недвусмысленно высказали свое мнение премьер-министру и генерал-губернатору. К нам поступило несколько неофициальных просьб об отставке Четвода, чтобы в армии могли расцвести новые идеи, - просьб, на которые мы должны дать окончательный ответ как можно скорее."
 dominion_of_india_events.22.a: "Не было бы армии без внутренних конфликтов, не так ли?"

 dominion_of_india_events.23.t: "Филип Уолхаус Четвуд уходит в отставку"
 dominion_of_india_events.23.d: "Три дня назад генерал-губернатор [dominion_of_india_events.GetLeader] отвел главнокомандующего сухопутными войсками в сторону для серьезного обсуждения военного будущего Доминиона. Встал на сторону различных раздраженных генералов в высшем командовании и, учитывая преклонный возраст Четвуда, предложил ему уйти в отставку в пользу кого-то другого. Защищаясь, Четвод попытался отстаивать свою точку зрения и апеллировать к "чувству рационализма", но вместо этого отнесся к генерал-губернатору весьма покровительственно.\n\nНесмотря на это кратковременное нарушение, Четвод в конечном счете подчинился своему званию и подготовил заявление об отставке. Несмотря на довольно резкие разногласия в армии по поводу его методологии и руководства, его отставка была встречена единодушным проявлением уважения со стороны всего рядового и штабного состава. Несмотря на уход с поста главнокомандующего сухопутными войсками, Четвод в обозримом будущем останется фельдмаршалом, а это означает, что его карьера еще не совсем закончена."
 dominion_of_india_events.23.a: "Хотя он, конечно, сожалеет, что все это не закончится более престижно."

 dominion_of_india_events.24.t: "Филип Уолхаус Четвуд остается"
 dominion_of_india_events.24.d: "Три дня назад генерал-губернатор [dominion_of_india_events.GetLeader] отвел главнокомандующего сухопутными войсками в сторону для серьезного обсуждения военного будущего Доминиона. В конечном счете, согласившись с тем, что предложения Четвода были более реалистично ориентированы на текущую реальность военной промышленности Доминиона и модернизации, он заверил Четвода, что тот полностью поддерживает его в том, чтобы он оставался главнокомандующим сухопутными войсками.\п\п[dominion_of_india_events.GetLeader] отправил служебную записку, которая была получена рангом и штаб упомянул о недовольстве военных руководством Четвода и заявил, что, хотя все опасения были внимательно выслушаны, Четвод останется на посту главнокомандующего сухопутными войсками в обозримом будущем. Ходят слухи, что, как только континент вновь объединится, он уйдет со своего поста, довольный тем, что воссоединение стало жемчужиной его карьеры. Несмотря на их прежние протесты, похоже, что непримиримые представители руководства подчинятся без какого-либо сопротивления, принимая реальность ситуации такой, какая она есть."
 dominion_of_india_events.24.a: "Такой опытный человек, как Четвод, приведет нас к победе."

 dominion_of_india_events.25.t: "Филип Уолхаус Четвуд уходит в отставку"
 dominion_of_india_events.25.d: "После успешного воссоединения Индии Филип Уолхаус Четвод с удовольствием почивает на лаврах. Наслаждаясь чашечкой горячего чая на балконе своего дома, он размышляет о своей карьере. Более чем довольный тем, что, несмотря на противодействие, его армейское руководство привело Доминион к победе над его противниками, он теперь уверен в нерушимой истории успеха своей карьеры и наследия. Вернувшись в дом, чтобы написать свою речь об отставке и уйти с поста главнокомандующего армией, он не забывает отметить, что все равно выполнит свой долг, если Доминион решит, что он нужен ему для службы."
 dominion_of_india_events.25.a: "Остается надеяться, что ему не удастся запятнать свое наследие, если его вновь призовут на службу."

## Election Events

 dominion_of_india_events.30.t: "Объявлены выборы после объединения!"
 dominion_of_india_events.30.d: "Выполняя обещания нашего правительства организовать выборы после воссоединения Индии, премьер-министр Тивана призвал провести выборы через шесть месяцев. Кроме того, он официально распространил избирательные права на отвоеванные территории, чтобы гарантировать, что голосовать смогут жители всего континента, а не только северо-запада. Конечно, ограниченное избирательное право все еще действует, поэтому в бывшей Народной Республике Бхаратия голосовать могут сравнительно меньше людей, чем в бывшей княжеской федерации и северо-западных лоялистских штатах. Ожидается, что на выборах практически будут участвовать только Всеиндийская партия самоуправления, Национальная либеральная федерация Индии и юнионистская партия, поскольку все остальные партии либо слишком малочисленны, либо тесно связаны с одной из "большой тройки".\n\nЮнионисты, будучи правительством, ответственным за окончательное отвоевание континента, за последние несколько лет столкнулись с целым рядом сложных внутренних проблем. Ожидается, что у них будет надежная база на юге, где ВПС также будет привлекать сторонников на основе своей платформы конфедеративной реорганизации. Ожидается, что ВПС также добьется успеха в бывшей Народной Республике, что объясняется поддержкой Джинной смешанной экономики. Наконец, либералы, похоже, готовы нанести удар по городским центрам, апеллируя к своей обычной электоральной базе в надежде одержать победу на выборах. Только время покажет, кто окажется на вершине."
 dominion_of_india_events.30.a: "Удачи всем участникам."

 dominion_of_india_events.31.t: "Широмани Акали Дал призывает сикхов голосовать за юнионистов"
 dominion_of_india_events.31.d: "Давний союзник Юнионистской партии и главный лидер широмани Акали Дал и сикхской общины, мастер Тара Сингх, публично заявил о своей поддержке юнионистов на предстоящих выборах. Хотя Джинна предпринимал попытки обхаживать их, стремясь создать в доминионе государство сикхов с большой автономией, Сингх в конечном счете не доверял ему и сохранил свой ранее существовавший союз.Поддержка Нсинга долгое время была жизненно важна для профсоюзных активистов в поддержании их широкой сети и плюралистических взглядов, и его поддержка значительно укрепляет наше влияние."
 dominion_of_india_events.31.a: "Замечательные новости."

 dominion_of_india_events.32.t: "Избирательная кампания в Бенгалии"
 dominion_of_india_events.32.d: "В политической кампании в Бенгалии в основном доминировали Всеиндийская партия самоуправления и Национал-либеральная федерация Индии. Здесь, в бывшей столице Народной Республики Бхаратия, по-прежнему сильно влияние националистов и социалистов. После того как подавляющее большинство ее бывших лидеров было арестовано, в Калькутте и остальной Бенгалии после окончания войны образовался большой вакуум в распределении власти. Две фигуры, в частности, воспользовались возможностью политического влияния, и обе они являются противниками в борьбе за лидерство в Доминионе. Хаваджа Назимуддин, друг Мухаммеда Али Джинны, является верным союзником AIHRP. Он начал ожесточенную политическую кампанию, делая упор на бенгальский национализм и обращаясь непосредственно к бенгальским мусульманам. Он обладает огромным влиянием в городе Дакка, где преобладают мусульмане, и пользуется поддержкой большей части возвращающейся, но сильно ослабленной аристократии Бенгалии.\n\nШьяма Прасад Мукерджи - бывший вице-канцлер Калькуттского университета и фигура, которая не слишком увлекалась политикой во время правления Красного раджа в Калькутте, оставаясь независимой на местном уровне. Однако недавно он присоединился к Хинду Махасабха и стал тесно связан с ней. Используя влияние, приобретенное благодаря его связи с Махасабхой, он создал сеть влияния в самой Калькутте и активно выступал против ВПС в пользу либералов, нагнетая страх перед правительством Индии, в котором доминируют мусульмане.\n\nБенгалия оказалась расколотой между этими двумя противоборствующими личностями, однако только один из них сможет успешно перевернуть недавно реинтегрированную провинцию в пользу своей предпочтительной партии."
 dominion_of_india_events.32.a: "Назимуддин успешно агитирует Бенгалию голосовать за ВПС!"
 dominion_of_india_events.32.b: "Мухерджи за счет своих связей убеждает бенгальцев голосовать за Либералов!"

 dominion_of_india_events.33.t: "Джинна посещает Хайдарабад"
 dominion_of_india_events.33.d: "Хайдарабад - регион с вопиющим имущественным неравенством и историей крестьянских волнений, не говоря уже о значительном мусульманском меньшинстве в нем. Это делает его идеальным местом для того, чтобы AIHRP могла вонзить в него свои зубы, что привело к тому, что Джинна впервые после воссоединения Индии отправился в турне по региону. Выступал с речами перед несколькими бедными фермерами-мусульманами, а также встречался с местной элитой и заручался как можно большей поддержкой своего движения.Располагая ограниченными ресурсами, Юнионистская партия провела разведку в регионе и пытается привлечь на свою сторону влиятельных лиц из числа заминдаров штата. Экономическая платформа юнионистов, поддерживающая контроль над ценами на сельскохозяйственные товары, очень популярна среди заминдаров и может принести нам победу на выборах в Хайдарабаде, если мы будем уделять ей достаточное внимание. После нашей ожесточенной конкуренции с Джинной за поддержку и влияние, Хайдарабад в конечном счете окажется в руках..."
 dominion_of_india_events.33.a: "Юнионистов, основываясь на своей экономической политике и поддержке заминдаров!"
 dominion_of_india_events.33.b: "ВПС, основываясь на их привлекательности как для мусульманской бедноты, так и для элиты!"

 dominion_of_india_events.34.t: "Изгнанные принцы возвращаются в свои земли"
 dominion_of_india_events.34.d: "Принцы Ориссы, Раджпутана и Бенгалии начали, наконец, восстанавливать свое влияние и власть над своими бывшими владениями. В Ориссе и Раджпутане лояльность принцев сильно разделена между всеми тремя основными партиями Доминиона. В то время как юнионисты обычно являются естественными фаворитами любого принца, некоторые из наиболее шовинистически настроенных индуистских принцев предпочитают платформу либералов, в то время как другие находят многообещающую поддержку дальнейшей конфедерализации от ВПС. Представители власти теперь наводняют свои недавно восстановленные поместья в надежде заручиться ценным княжеским покровительством, поскольку мало что в политическом ландшафте Доминиона значит больше, чем поддержка регионального князя.\n\nЛоббисты-юнионисты повторяют успехи партии в объединении нации и настаивают на том, что их дальнейшее лидерство необходимо для сохранения единства Индии теперь, когда она наконец-то была вновь собрана. Юнионисты, кроме того, являются самой проконсульской партией в политике, поэтому, естественно, принцев не нужно особо убеждать присоединиться к ним. Либеральные лоббисты обещают, что, благодаря их экономической поддержке широкого распространения свободного предпринимательства, принцы найдут множество экономических возможностей для инвестиций на благо своей страны и для себя самих. Наконец, лоббисты ВПС утверждают, что без программы конфедерализации Джинны принцам будет трудно сохранить свою автономию, и что политика либералов и юнионистов неустойчива в свете пробужденного политического сознания рядового индуса. Их усилия успешно убеждают большинство поддержать..."
 dominion_of_india_events.34.a: "Юнионистов, выступающих за гарантированное процветание."
 dominion_of_india_events.34.b: "Либералов, чтобы извлечь выгоду из взрывного экономического роста."
 dominion_of_india_events.34.c: "ВПС, поскольку они лучше всех осведомлены о том, как удержать Доминион."

 dominion_of_india_events.35.t: "Антилиберальная агитация в Дели"
 dominion_of_india_events.35.d: "Крупный столичный регион Дели, один из самых густонаселенных районов во всей Индии, стал свидетелем ожесточенной кампании между юнионистами и либералами. Бывшая резиденция Британского владычества и некогда крупный город империи Великих Моголов, он отличается большим разнообразием и содержит значительное количество мусульман, сикхов и индуистов, хотя последние составляют большинство. Поскольку реконструкция продолжается, а свободное предпринимательство восстанавливается, либералы воспользовались этим, обратившись за поддержкой к богатым индусским торговцам.\n\nЮнионистская кампания в первую очередь сосредоточена на своей плюралистической программе и на том, насколько быстро город выиграет от правительства, которое делает упор на религиозной гармонии. Юнионистская кампания финансировала рекламу по всему городу, изображающую либералов сторонниками индуистского превосходства, которые будут насаждать секуляризм как способ удержать бедных мусульман, сикхов и другие касты на дне общества. Хотя некоторые жители города, имеющие избирательные права, на самом деле видят в этом причину голосовать за либералов, это, тем не менее, нанесло ущерб их репутации как партии, способной поддерживать единство Доминиона, и вызвало гнев многих видных либералов. Против профсоюзных активистов был подан иск, в котором утверждается, что партия проводит \"клеветническую кампанию\" и использует закулисные уловки для сохранения своей власти. Маловероятно, что этот процесс будет продвигаться достаточно быстро, чтобы иметь значение до выборов, но ущерб, нанесенный нашему авторитету и общему престижу в целом, несомненно, ляжет пятном на нашу репутацию и нанесет ущерб целостности нашей зарождающейся индийской демократии. Либералы предложили прекратить судебный процесс, если мы сократим рекламу и опубликуем извинения в местных газетах."
 dominion_of_india_events.35.a: "Мы прекратим кампанию и принесем извинения, процедив это сквозь стиснутые зубы."
 dominion_of_india_events.35.b: "Да, нет, мы этого делать не будем."
 dominion_of_india_events.35.c: "Да ладно? Давайте увеличим тираж и напечатаем это в Канпуре и Лакхнау."

 dominion_of_india_events.36.t: "Либралам удается завоевать Бомбей"
 dominion_of_india_events.36.d: "Город Бомбей, один из самых промышленно развитых городов Доминиона, считается самым успешным примером индийского капитализма. Это происходит благодаря бурно развивающейся текстильной промышленности и порту Бомбей, одному из старейших морских портов Индии, за который город получил популярное прозвище "Ворота в Индию". Джинна лично провел несколько встреч в городе, пытаясь заручиться поддержкой своей кампании, учитывая его историю в городе (как выпускника Бомбейского университета), однако это не смогло поколебать то влияние, которое либералы с легкостью приобрели в городе.Высокая доля торгового населения Бомбея и высокий уровень индустриализации делают его образцовым городом для либералов, которые хотят повторить успех таких городов, как Бомбей и Карачи, в других густонаселенных центрах Доминиона. Это не означает, что база, к которой они обращаются больше всего, преобладает в Бомбее, а это означает, что, несмотря на усилия ВПС и профсоюзных активистов, Бомбей является отличным дополением в колекции Национал-либеральной федерации Индии."
 dominion_of_india_events.36.a: "Ничего не поделаешь..."

 dominion_of_india_events.37.t: "Обхаживание электората в Мадрассе"
 dominion_of_india_events.37.d: "Мадрас, регион, в котором в значительной степени доминирует региональная Партия Справедливости, по прогнозам, станет одним из самых важных регионов для определения победителя предстоящих выборов. Жесткая антибрахманская позиция Партии Справедливости помешала попыткам либералов пробиться на политическую сцену (бывший лидер В.С. Шриниваса Шастри был брамином, и этого было достаточно, чтобы подорвать влияние либералов), хотя кастово-прогрессивное крыло партии заслужило некоторую поддержку со стороны партии Справедливости.\n\nПриверженность Джинны региональной автономии была главным аргументом в пользу тех, кому его партия покровительствовала в регионе, и некоторые считают, что правительство, возглавляемое Джинной, в конечном итоге приведет к ослаблению господства брахманов в политике. Однако социально и экономически прогрессивные идеи Джинны беспокоят многих влиятельных мадрасских консерваторов.\n\nЧто касается юнионистов, то экономическая и социальная политика во многом совпадают, и кампания юнионистов в регионе имеет большой успех, а это означает, что у партии, возможно, просто нет работы для них. Несмотря на различные результаты жеребьевки "Большой тройки" партий, Мадрас в конечном счете отдаст свои голоса..."
 dominion_of_india_events.37.a: "Всеиндийской партии самоуправления, поскольку она может наилучшим образом содействовать справедливости."
 dominion_of_india_events.37.b: "Юнионистам, поскольку их взаимная политика совпадает."
 dominion_of_india_events.37.c: "Либералам под руководством Сапру!"

 dominion_of_india_events.38.t: "Южные князья отдают голоса Юнионистам"
 dominion_of_india_events.38.d: "После успешного объединения нашего правительства с южными принцами многие предсказывали, что в случае выборов они в конечном итоге отдадут свои голоса за Юнионистскую партию. Это предположение подтвердилось, поскольку принцы-консерваторы внесли значительный вклад в юнионистскую кампанию в последние месяцы.Несмотря на то, что Джинна приложил немало усилий, чтобы понравиться Осману и принцам в частности, его самые выгодные предложения были фактически перехвачены юнионистами, и принцы получили широкую автономию на юге. Это привело к тому, что юнионисты добились значительных успехов на юге Индии, а взносы в предвыборную кампанию позволили активизировать кампанию в остальной части северной и центральной Индии, в то время как у двух других партий с каждым днем становится все меньше средств на предвыборную кампанию."
 dominion_of_india_events.38.a: "Наша успешная дипломатия принесла нам заслуженные плоды!"

## NLFI Events
 dominion_of_india_events.40.t: "Либералы одерживают победу!" # Jayakar
 dominion_of_india_events.40.d: "После ожесточенной шестимесячной кампании между тремя основными партиями Доминиона Национал-либеральная федерация Индии вырвала победу из лап юнионистов и ВПС. Лидеру партии с 1936 года Мукунде Рамрао Джаякару приписывают проведение ожесточенной кампании и успешное обращение к городской индуистской элите по всему Доминиону, получившему избирательные права.\n\nПообещав положить конец разрушительной сектантской политике юнионистов и создать \"правительство, руководимое здравым смыслом, для всех граждан Индии, независимо от вероисповедания\", Джаякар теперь обладает внушительными полномочиями по реформированию правительства в соответствии со своими взглядами."
 dominion_of_india_events.40.a: "Победа за нами!"

 dominion_of_india_events.41.t: "Либералы одерживают победу!" # Sapru
 dominion_of_india_events.41.d: "После ожесточенной шестимесячной кампании между тремя основными партиями Доминиона Национал-либеральная федерация Индии вырвала победу из лап юнионистов и ВПС. Лидеру партии с 1936 года Теджу Бахадуру Сапру приписывают проведение ожесточенной кампании и успешное обращение к городской индуистской элите по всему Доминиону, получившему избирательные права.\n\nОбещая защиту свобод для всех индийцев и создание \"правительства, руководимое здравым смыслом, для всех граждан Индии, независимо от вероисповедания\", Сапру теперь обладает внушительными полномочиями по реформированию правительства в соответствии со своими взглядами."
 dominion_of_india_events.41.a: "Победа за нами!"

 dominion_of_india_events.42.t: "Посягательство на господство индуистов"
 dominion_of_india_events.42.d: "После насильственной секуляризации правительства, включая реформы в области представительства и избирательной политики, политический ландшафт Доминиона значительно изменился после окончания правления юнионистов. По мере того как постоянно проводятся реформы, индуистское большинство де-факто начинает обладать все большей властью, значительно превосходя численностью мусульман и сикхов, что приводит к тому, что некоторые критикуют как нездоровый дисбаланс власти.\n\nРезкой критике подвергся Мухаммед Али Джинна, который утверждает, что наше правительство \"коварно установило господство индуистов над индийскими мусульманами, создав тиранию большинства\". К сожалению, это привело к усилению влияния джиннов среди мусульманского населения и активизации оппозиции. Это не означает, что эту политику поддерживают все индуисты, поскольку некоторые выражают недовольство политикой, которая, по их мнению, только разожжет недовольство и потенциальный сепаратизм. Тем не менее, мы по-прежнему пользуемся поддержкой большинства в отношении программы партии и будем продолжать в том же духе, будь проклята поддержка Джинны."
 dominion_of_india_events.42.a: "Мы это начали,поэтому посмотрим что можно сделать."

 dominion_of_india_events.43.t: "Возрождение Хинду Махасабхи"
 dominion_of_india_events.43.d: "Хинду Махасабха, отодвинутая на задворки политики после раскола во время индийской революции, в последние месяцы переживает возрождение после победы либералов. При молчаливой поддержке премьер-министра Джаякара Махасабха в значительной степени интегрировалась в кабинет министров и теперь официально входит в коалицию с партией. Как следствие, их философия начала входить в мейнстрим, отстаивая "естественное господство" индуистов над "законной индуистской землей".Несмотря на то, что премьер-министр Джаякар явно не одобрял индуистский национализм, он использовал секуляризм как средство для закрепления превосходства индуистов в политических вопросах, в значительной степени превосходя численностью избирателей, в которых преобладают мусульмане. Митинги в настоящее время становятся все более массовыми, а риторика - более радикальной, чем когда-либо прежде, что вызывает беспокойство на международной арене и у простых индийцев по поводу того, каким будет будущее Индии."
 dominion_of_india_events.43.a: "Политическая свадьба, которую многие предвидели."

 dominion_of_india_events.44.t: "Выступление Сапру"
 dominion_of_india_events.44.d: "В своем выступлении, которое транслировалось по телевидению и передавалось по радио по всему континенту, премьер-министр Сапру выступил с речью, призывающей к постепенному реформированию проблемы зарегистрированных каст. Назвав их существование просто унижением единства индийцев и институтом, который будет только сдерживать развитие нации в ближайшие десятилетия, он официально пообещал позаботиться о возможном освобождении угнетенных каст. Однако, встретив бурную поддержку среди прогрессивно настроенных индусов, это вызвало гнев некоторых консервативных индуистов.\n\nНесмотря на этот удар по избирательной базе Национал-либеральной федерации Индии, он был сведен на нет расширением поддержки среди далитов и других индийцев, даже несмотря на то, что лишь немногие из них имеют реальную власть у избирательных урн."
 dominion_of_india_events.44.a: "Действительно ли возможно равноправное будущее в Индии?"

 dominion_of_india_events.45.t: "Великое расширение Университета Бомбея
 dominion_of_india_events.45.d: "С тех пор, как Доминион восстановил контроль над Бомбеем, его одноименный университет отказался от участия в более неотложных усилиях по восстановлению на субконтиненте. Однако, кто мы такие, чтобы пренебрегать благотворительностью молодых индийцев? Каждая гордая нация имеет в своем составе престижное исследовательское учреждение и высшую школу, что отличает ее от обедневших феодальных государств, которые едва могут оправдать свою способность управлять. Именно поэтому были выделены специальные средства на окончательную реконструкцию и расширение Бомбейского университета. В сочетании с формализацией функций и полномочий основные расширения кампуса включают спортивные площадки, новое медицинское исследовательское крыло и официальные исследовательские гранты на изучение, прогнозирование и борьбу с голодом до того, как он может разразиться.\n\nНа церемонии перерезания ленточки, посвященной расширению, генерал-губернатор [dominion_of_india_events.GetLeader] выступил с речью, в которой отметил заслуги индийских выпускников перед своей родиной. Он также подчеркнул, что без империи университет подвергся бы идеологическому вмешательству и демагогии со стороны социалистического народного правительства Бхаратии."
 dominion_of_india_events.45.a: "Грандиозное повторное открытие грандиозного заведения!"

 dominion_of_india_events.46.t: "Современный Гражданский Кодекс"
 dominion_of_india_events.46.d: "В соответствии с последним указом, принятым Национальной либеральной федерацией Индии, в гражданский кодекс доминиона были внесены радикальные изменения. Теперь все индусы, независимо от вероисповедания, в равной степени обязаны соблюдать законы, касающиеся брака, развода, наследования, запрета полигамии и всех других личных законов.\n\nВ ответ на это разразились резкая критика и споры, в первую очередь со стороны видных профсоюзных деятелей и, что самое вопиющее, со стороны Мухаммеда Али Джинны, и даже ряд индусов весьма обеспокоены последствиями, которые эти реформы могут иметь для общества. Критика Джинны сосредоточена главным образом на предвзятом отношении кодекса \"равенства\" к традиционному индуистскому гражданскому кодексу. Он гневно потребовал, чтобы был сформирован комитет для расследования политики нашего правительства и разоблачения его вопиющего индуистского шовинизма, и мы согласились с этим требованием при условии, что комиссию возглавит В.С. Шриниваса Шастри."
 dominion_of_india_events.46.a: "Мы не виноваты ни в чем, кроме модернизации нашей страны."

 dominion_of_india_events.47.t: "Результаты отчета Шастри"
 dominion_of_india_events.47.d: "Несмотря на то, что в состав комитета входило много интеллектуалов и юристов, связанных с профсоюзами и Всеиндийской партией самоуправления, вердикт всегда был бы одним и тем же. Задержки усилились из-за бумажной волокиты, которая усилилась после того, как члены организации были признаны \"слишком предвзятыми\" из-за их связей с такими организациями, как Всеиндийская мусульманская лига и различными другими политическими группами, которые, как было установлено, имеют сильные предубеждения по отношению к индуистам и либеральному правительству (в некоторых обвинениях даже упоминалось взяточничество).\n\nТеперь, после нескольких месяцев расследования, в отчете Шастри были выявлены минимальные нарушения со стороны действующего правительства, лишь рекомендация о создании консультативного комитета для более эффективной разработки политики в отношении различных индийских меньшинств. Это не удовлетворило Джинну, Тивану или кого-либо из наших оппонентов, если уж на то пошло... но этот вопрос, несомненно, решен до конца нашего срока."
 dominion_of_india_events.47.a: "Мы провели собственное расследование... и не обнаружили никаких нарушений."

 dominion_of_india_events.48.t: "Наследие Гокхал"
 dominion_of_india_events.48.d: "Несмотря на то, что В.С. Шриниваса Шастри уже некоторое время находится на пенсии, он по-прежнему занимается политикой и является членом различных организаций, в том числе в качестве действующего главы общества \"Слуги Индии\". Теперь, когда индейцы больше не убивают своих соотечественников на полях сражений, а нацией руководят либералы, а не вредные Джинны или сторонники юнионистов, любящие землевладельцев, у него было много времени, чтобы поразмыслить о наследии партии и траектории ее будущего. Его любимый преемник, премьер-министр Сапру, ведет партию по более примирительной траектории и ведет нацию к единству, а не к завоеваниям и наказаниям. Шастри, последователь великого и дорого ушедшего из жизни Гопала Кришны Гокхале, искренне верит, что этот человек гордился бы Индией, которую они построили. Успех примирения и сотрудничества в борьбе с гандистами, тилакитами, босеистами и их кровавой революцией, которая просто расколола нацию на десятилетие и привела к катастрофе и бедствиям, является, по мнению Шастри, огромным достижением.\n\nТеперь, когда у власти находится хорошее и добросовестное индуистское правительство, способное повести паству к светлому будущему, Индия способна на все."
 dominion_of_india_events.48.a: "Ибо Индия наконец-то взялась за руки и устремилась к гармонии."

 dominion_of_india_events.49.t: "Фурор в Дакке"
 dominion_of_india_events.49.d: "С тех пор как Хинду Махасабха интегрировалась в систему нации, районы со значительным мусульманским населением с каждым месяцем становятся все более неспокойными. Спор между индусом и мусульманином на рынке в Дакке привел к тому, что последний поднял руку на герцога, а первый достал нож и зарезал другого. Индус, которого судили в суде, был признан невиновным в силу самообороны, а его адвокаты успешно доказали перед индусским судьей, что человек, которого он ударил ножом, представлял разумную угрозу для его жизни. Этот вердикт вызвал сильное возмущение мусульманской общины, особенно в городе, где он был вынесен. Массовые беспорядки стали проводиться еженедельно, несмотря на неуклонный рост жестокости репрессий.\n\nИндуистские предприятия в городе недавно подверглись серии вопиющих актов вандализма, а уровень насилия в обществе достиг небывало высокого уровня. Индуисты в регионе начали радикализироваться ускоренными темпами, и Хинду Махасабха отмечает значительное увеличение числа своих членов по всей Бенгалии. Бывший лидер либералов В.С. Шриниваса Шастри попытался возглавить миссию "Слуги Индии", направленную на содействие установлению мирных отношений, однако его выступление вчера утром было прервано ударом ножа (по иронии судьбы, нанесенным индусом), в результате чего он оказался в критическом состоянии, хотя ожидается, что он выживет. Сегодняшние беспорядки были окончательно прекращены благодаря жестоким репрессиям и бессрочному военному присутствию в городе, чтобы предотвратить дальнейшую агитацию мусульман в городе, поскольку в партии растет обеспокоенность тем, что, если они не будут жестко пресекать насилие в обществе, это может стоить нам благосклонности наших избирателей."
 dominion_of_india_events.49.a: "Чтобы управлять такой большой страной, как Индия, необходима сильная рука."

 ## AIHRP Events
 dominion_of_india_events.50.t: "Победа Всеиндийской партии самоуправления!"
 dominion_of_india_events.50.d: "После напряженной шестимесячной кампании между тремя основными партиями Доминиона Всеиндийская партия самоуправления одержала победу над юнионистами и Национал-либеральной федерацией Индии. Кампания основателя и лидера партии Мухаммеда Али Джинны за более автономное административное деление и более "справедливую" экономику, а также неустанное лоббирование его и его соратников завоевали сердца Индии.\n\nПока Джинна произносит свою победную речь в Карачи, своем родном городе, критики из Юнионистов и Либералов высмеивают его как мусульманского шовиниста в овечьей шкуре. Тем не менее, амбиции Джинны по реформированию Доминиона огромны, и многие, затаив дыхание, ждут, как изменится страна в последующие годы."
 dominion_of_india_events.50.a: "Победа за нами!"

 dominion_of_india_events.51.t: "Засорение движения"
 dominion_of_india_events.51.d: "Премьер-министр Джинна, будучи всегда идеалистом, в глубине души остается прагматиком. Реорганизация Индии - это не то, что можно осуществить без явной поддержки со стороны князей. Последний проект новой конституции конфедерации включал положения, предоставляющие принцам автономию в делах их королевств, к большому разочарованию прогрессивных союзников, таких как шейх Абдулла.\n\nАвторитарные княжеские государства, такие как Династия Догра в Джамму и Кашмире, теперь могут свободно управлять своими правительствами, не опасаясь вмешательства исполнительной власти в свои дела, что означает сохранение непосредственно назначаемых министров в отличие от всенародно избранных и незаконность критики индийского принца в их родном штате. Шейх Абдулла теперь настроил партию самопросвещения против своего бывшего союзника и перешел в полную оппозицию, пытаясь заняться национальной политикой вместо того, чтобы оставаться региональной силой."
 dominion_of_india_events.51.a: "Но такой маргинализированный человек, как он, вряд ли добьется успеха."

 dominion_of_india_events.52.t: "Новая Конфедерация"
 dominion_of_india_events.52.d: "С принятием последнего предложения конфедеративный проект премьер-министра Джинны наконец-то стал реальностью. Сократив власть исполнительной власти над федеральными штатами и провинциями Доминиона (с добавлением положений, гарантирующих, что его экономическая политика будет проходить относительно беспрепятственно), полностью объединенный Доминион теперь обладает несколькими отдельными провинциями и княжествами, каждое из которых обладает широкой автономией в управлении своими делами. Теперь, когда новое разделение властей закреплено в конституции, провинции с мусульманским меньшинством/большинством теперь свободны от угрозы потенциального притеснения со стороны исполнительной власти, в которой доминируют индуисты.\n\nЭто вызвало резкую критику со стороны Национальной либеральной федерации Индии, которая утверждает, что Джинна теперь безвозвратно разрушил единство Доминиона и утвердил культуру сектантской вражды и недоверия между индуистами и мусульманами. Бывший премьер-министр Хизар Хаят Тивана также осудил новую конституцию, несмотря на то, что ряд членов его собственной партии выступили в ее поддержку, заявив, что такие меры не способствуют борьбе с эпидемией межобщинного насилия, а лишь затрудняют посредничество исполнительной власти в будущих конфликтах."
 dominion_of_india_events.52.a: "Может быть, им стоит меньше ныть и больше думать о том, почему они проиграли выборы."

 dominion_of_india_events.53.t: "Мухаммад и Фатима"
 dominion_of_india_events.53.d: "После смерти второй жены Мухаммеда Али Джинны, Раттанбай \"Рутти\" Пети, решающая роль ближайшего доверенного лица премьер-министра и его самого сильного сторонника перешла к его сестре. Помогает растить его дочь Дину и проводит кампанию за его видение конфедеративной Индии. Теперь ее брат отплачивает за это, быстро реализуя улучшенные права женщин и расширяя избирательное право для женщин, модернизируя нацию и заботясь о будущем миллионов индийских женщин по всему субконтиненту.\n\nНекоторых членов АНКПЧ возмущает влияние Фатимы на лидера их партии, и распространилось мнение, что партия для джиннов - это нечто большее, чем средство распространения их собственных взглядов. Но, несмотря на все их ропот, вряд ли кто-то предпринимает какие-либо действия, чтобы критиковать братьев и сестер. Даже если бы у них было сильное желание свергнуть их, следующим по влиянию лидером является Лиакват Али Хан, верный союзник Мухаммеда, у которого нет намерений предавать своего друга. Таким образом, политическое положение Фатимы пока остается неприкосновенным. Даже несмотря на то, что партия завидует ей (и она сама осознает это), в настоящее время ее можно увидеть, как она топает по Индии, призывая женщин голосовать за Всеиндийскую партию самоуправления, потому что именно джинны возвысили их, а не либералы-шовинисты или консервативные юнионисты."
 dominion_of_india_events.53.a: "Хотя, когда придет время выбирать преемницу Мухаммеда, они наверняка предпочтут Лиакват ей."

 dominion_of_india_events.54.t: "Мятеж Хинду Махасабха"
 dominion_of_india_events.54.d: "Премьер-министр Джинна как личность и особенно его политика вызывают серьезные разногласия на индийской политической сцене. Индуисты, в частности, относятся к нему с недоверием, рассматривая его участие во Всеиндийской мусульманской лиге как свидетельство того, что его идеал - вернуть Индию к временам Великих Моголов, когда мусульмане доминировали над индусами. Эти заявления невероятно нелепы, они являются результатом политической неучтивости, которая создает карикатуру, а не точный портрет человека, но, тем не менее, они остаются в рядах радикальных правых индуистов. Хинду Махасабха рассказывает Джинне о самых острых темах своих собраний и дискуссий, ставя его в тупик на каждом возможном перекрестке.\n\nТем временем в Дели.\n\nПремьер-министр Джинна дал прямое указание полиции применить жесткие меры, как только поступили сообщения о повреждении мусульманской коммерческой недвижимости, и протест перерос в массовые беспорядки. В результате последовавших столкновений были перекрыты несколько улиц, конфликт продолжался два дня, а вскоре в городе было введено военное положение. После того, как число погибших достигло 367 человек, лидеры Хинду Махасабха были арестованы по всей стране, а сама организация объявлена террористической и запрещена."
 dominion_of_india_events.54.a: "Ужасный бунт, но теперь мы можем легко избавиться от них."

 dominion_of_india_events.55.t: "Попытка убийства премьера Джинны!"
 dominion_of_india_events.55.d: "Сегодняшняя Индия радикально отличается от той, которую Индия видела всего год назад. План реформ премьер-министра Джинны, призванный изменить статус-кво и превратить Доминион в государство равенства и социального развития, преобразовал институты и решительно модернизировал нацию. Такое развитие событий не помешало ему нажить много-много врагов. Премьер-министр Джинна превратился из противника индуистских националистов в их заклятого врага, уничтожив Хинду Махасабху и через чур помогая бедным мусульманским регионам в развитии. Но, тем не менее, культ личности среди мусульман (чью поддержку он много сделал, чтобы отвлечь от юнионистов) огромен, и премьер-министра Джинну теперь в народе называют \"Отцом нации\", даже среди множества индуистов, которые поддерживают его политику.\n\nВо время публичного выступления в городе Лакхнау с изложением своей экономической платформы премьер-министр Джинна был ранен двумя пулями в живот и левое плечо. Поскольку его быстро доставили в больницу, убийца скрывался от ареста в течение 36 часов, прежде чем его нашли спрятанным на складе в южной части города. Опознанный как Натурам Годсе, его приговор и повешение, как ожидается, будут вынесены в кратчайшие сроки. Премьер-министр Джинна выжил, хотя, как ожидается, потребуется несколько недель, чтобы оправиться от ран. Он, похоже, не потрясен случившимся, а просто укрепил свою решимость служить Индии и ее народу."
 dominion_of_india_events.55.a: "Пули сами по себе не могут убить надежду."

 ## Unionist Events

 dominion_of_india_events.60.t: "Победа юнионистов!"
 dominion_of_india_events.60.d: "После напряженной шестимесячной кампании между тремя основными партиями Доминиона юнионисты одержали победу над Национальной либеральной федерацией Индии и Всеиндийской партией за самоуправление! Премьер-министру Тиване приписывают руководство партией во время экономического спада, вызванного "черным понедельником", разрушительной забастовки докеров в Карачи и, наконец, воссоединения Индии. Такие достижения, а также эффективная предвыборная кампания, несомненно, помогли ему переизбраться. Ожидается, что премьер-министр Тивана будет придерживаться юнионистской платформы, направленной на сохранение союза фермеров и джентри и укрепление плюралистического подхода к управлению, а также на осуществление контроля за ценами и расширение возможностей системы панчаят.\n\nПосле своей потери НЛФИ и ВПС резко раскритиковали его правительство, назвав его всего лишь инструментом, с помощью которого князья и землевладельцы защищают свою власть и усиливают резкое неравенство в благосостоянии, существующее в индийском обществе. Несмотря на их протесты, успешное руководство премьер-министра Тиваны укрепило его огромный мандат вести Индию в будущее."
 dominion_of_india_events.60.a: "Победа за нами!"

 dominion_of_india_events.61.t: "Сикхская автономия"
 dominion_of_india_events.61.d: "На протяжении многих лет сикхкская партия Широмани Акали Дал была верным союзником нашей партии, поддерживая голоса сикхов и значительно укрепляя доверие к нам как к партии индусов всех вероисповеданий. Тара Сингх, лидер партии, долгое время выступал за создание \"автономного Сикхистана\" в регионах Восточного Пенджаба, включая сикхские княжества вокруг Патиалы. За его поддержкой последовали потрясения 1936 года и недавняя избирательная кампания, а также огромная храбрость. основанная сикхами на передовой войны, премьер-министр Тивана официально обозначил границы \"Автономной провинции Сикхистан\".\n\nСоздание этой провинции было встречено с большой насмешкой со стороны НЛФИ, но саркастические аплодисменты со стороны ВПС и, в частности, Джинны, которые заявили, что, хотя большая автономия была правильным шагом вперед, весьма сомнительно, что только сикхи были вознаграждены, а не мусульманские общины по всей Индии. Тем не менее, сикхи по всей Индии теперь надолго запомнят, какая именно партия окончательно вернула им родину."
 dominion_of_india_events.61.a: "По этой причине мы рассчитываем на их лояльность."

 dominion_of_india_events.62.t: "Победа стратегии юнионистов"
 dominion_of_india_events.62.d: "Лояльность индийских мусульман уже давно расколота из-за коварных действий Мухаммеда Али Джинны и двух его детищ - Всеиндийской мусульманской лиги и Всеиндийской партии самоуправления (на последней он сосредоточивает большую часть своих усилий). Но на самом деле, поскольку мир продолжает меняться, и после нашей победы на последних выборах многие мусульмане начали задаваться вопросом, действительно ли Джинна может защитить их от либералов-шовинистов и от безудержной межобщинной ненависти по всей стране. Снова и снова благожелательность профсоюзных активистов и плюралистическая стратегия оказывались главными оплотами в защите прав мусульман.\n\nВремена господства индуистов над мусульманами, или мусульманского господства над сикхами, или любой другой подобной фуфары прошли благодаря эффективному плюралистическому управлению и реформам. Теперь мусульмане Индии все меньше и меньше считают Джинну своим представителем, поскольку его неоднократные неудачи в осуществлении своих планов окончательно наложили отпечаток на его репутацию."
 dominion_of_india_events.62.a: "Такое откровение было просто неизбежным!"

 dominion_of_india_events.63.t: "Резкие полемика с Сапру"
 dominion_of_india_events.63.d: "В ответ на то, что премьер-министр Тивана выступил в защиту зарезервированных мест в палатах, влиятельный либерал Тадж Бахадур Сапру выступил с яростной полемикой, обвинив профсоюзных активистов в вопиющем антилиберализме и масштабной коррупции. В основном он утверждает, что премьер-министр Тивана преклоняется перед волей махараджей и заминдаров, отказываясь от реформ в западном стиле в пользу того же отсталого правления, которое действовало со времен империи Великих Моголов.\n\nПредложения Сапру получили широкую поддержку со стороны многих индийцев, настроенных на реформы (хотя и поколебали былую поддержку либералов, к большому огорчению других членов партии), хотя на самом деле большинство здравомыслящих людей приписывают его бахвальство лицемерию и политическому оппортунизму."
 dominion_of_india_events.63.a: "Разве они тоже не выступают против расширения избирательных прав?"

 dominion_of_india_events.64.t: "Заминдары возвращаются в Чхаттисгарх"
 dominion_of_india_events.64.d: "Режим ИНК привел к тому, что многие землевладельцы были изгнаны из своих поместий, вместо этого были приняты радикальные меры по земельной реформе, в результате чего многие заминдары остались без средств к существованию и были уничтожены. В то время как другие партии предпочитают уклоняться от ответа на вопрос о возвращении индусам их законной собственности, премьер-министр Тивана твердо намерен устранить ущерб, нанесенный Красным владычеством. В настоящее время тысячи землевладельцев вернулись в свои родные провинции и вновь получили свои земли.\n\nМногие бывшие заминдары были захвачены кооперативами и бывшими арендаторами, и их возвращение в Чхаттисгарх было затруднено их нынешними владельцами, особенно в окрестностях Джагдалпура. Не желая уступать свои земли или соглашаться на предложенные выкупы, индусы, выступавшие против возвращения заминдари, взялись за оружие и подняли восстание, которое было быстро подавлено армией. Теперь заминдары возвращаются при поддержке армии, обеспечивая надлежащую охрану своих владений и подавляя крестьянские волнения."
 dominion_of_india_events.64.a: "Можно было бы подумать, что эти \"кооперативы\" будут более сговорчивыми."

 dominion_of_india_events.65.t: "Мятеж Хинду Махасабха"
 dominion_of_india_events.65.d: "С тех пор как правительство пресекло подстрекательскую деятельность Хинду Махасабха, возбуждение в их рядах становилось все более и более сильным. Откровенные высказывания Б.С. Мунье и Бхаи Пармананда, фигур, которым удалось избежать судебных обвинений отчасти из-за их связей с либералами, только усилили напряженность. Падение Народной республики Бхаратия и последовавшие за этим многочисленные аресты и судебные процессы привели к заключению В.Д. Саваркара, духовного лидера Хинду Махасабха, который примкнул к повстанцам. Пармананд, который неустанно добивался своего освобождения, но безуспешно, мобилизовал огромную толпу индуистских националистов на демонстрацию в Дели.\n\nПремьер-министр Тивана дал прямое указание полиции применить жесткие меры, как только поступили сообщения о повреждении коммерческой недвижимости мусульман, и протест перерос в массовые беспорядки. В результате последовавших столкновений были перекрыты несколько улиц, конфликт продолжался два дня, а вскоре в городе было введено военное положение. После того, как число погибших достигло 367 человек, лидеры Хинду Махасабха были арестованы по всей стране, а сама организация объявлена террористической и запрещена."
 dominion_of_india_events.65.a: "Ужасный бунт, но теперь мы можем легко избавиться от них."

 dominion_of_india_events.66.t: "Тивана на торжественном приеме"
 dominion_of_india_events.66.d: "Премьер-министр Тивана устроил торжественный прием в своем обширном поместье в Лахоре, пригласив нескольких принцев, промышленников, политиков-юнионистов и других влиятельных индийцев на вечер отдыха и развлечений. Одна из таких целей этой встречи - продемонстрировать результаты речевых тренингов, которые он проходил в течение нескольких месяцев, пытаясь побороть свое заикание и улучшить свои навыки публичных выступлений по сравнению с их прежним плачевным состоянием. После продолжительных празднеств премьер-министр Тивана обратил внимание на беседку, в которой он стоял, освещенную теплыми газовыми лампами на фоне темной ночи. Провозглашая, что, несмотря на огромные трудности, те, кто строил Индию и руководил ею в течение многих лет, были защищены от злобных нападок ИНК, а также либералов и Партии самоуправления, и что именно благодаря их поддержке все они могут праздновать в такой прекрасный вечер, как тогда. Демонстрируя превосходное владение лексикой и плавность изложения, конец его речи был встречен бурными аплодисментами, особенно громкими со стороны членов его собственной семьи, которые проявляли живой интерес к тому, как он совершенствовал свое ораторское искусство.\n\nКогда он спустился с беседки, где продолжался гала-концерт, и направился на кухню, чтобы убедиться, что его повара в спешке готовят самый обильный ужин, одинокая слезинка скатилась с его глаз, когда он осознал, что его семья гордится им и что до сих пор он выполнял свою чрезвычайно напряженную работу с невероятной эффективностью."
 dominion_of_india_events.66.a: "Хороший конец для всех на этом празднике."

 ## Extra Events

 dominion_of_india_events.70.t: "Чайный туризм в Симле"
 dominion_of_india_events.70.d: "Благодаря нашим инвестициям в чайные плантации в долине Кангра, местная торговля в Симле значительно расширилась. Благодаря тому, что его сильный аромат производит столь же сильное впечатление на чайных фестивалях и конкурсах по всему миру, многие туристы-эклектики отправляются на север Доминиона, чтобы посетить плантации и попробовать чай Кангра, заваренный в свежем виде прямо из источника.n\nИмпорт чая неуклонно растет, и до тех пор, пока мировая экономика остается стабильной, мы можем рассчитывать на стабильный доход от этого урожая."
 dominion_of_india_events.70.a: "Наши инвестиции хорошо окупились."

 dominion_of_india_events.71.t: "Кашмирский шелк расходится по всему миру"
 dominion_of_india_events.71.d: "Благодаря нашим инвестициям в растущую шелковую промышленность Кашмира, Доминион стал одним из крупнейших экспортеров шелка в мире. Экспорт этого материала сократился после "черного понедельника", но, поскольку мировая экономика снова встала на ноги, мы обнаружили множество рынков, жаждущих приобрести желанный материал. Поскольку это экзотический товар, доходы от такого экспорта и наша эффективная монополия на мировом рынке шелка принесли нашей компании прибыль. значительный доход для правительства, не говоря уже о том, что он приносит огромную пользу жизни трудолюбивых индийцев в Кашмире.."
 dominion_of_india_events.71.a: "Мы заботимся о нашем шелководстве."

 dominion_of_india_events.72.t: "Всеиндийская федерация зарегистрированных каст"
 dominion_of_india_events.72.d: "На волне послевоенной политической структуры, способствующей расширению мелких партий, как новых, так и старых, мало что заслуживает большего внимания, чем Всеиндийская федерация зарегистрированных каст. Возглавляемая Намасиваямом Шивараджем, соратником Б.Р. Амбедкара, организация взяла на себя обязательства по возвышению угнетенных, защите далитов и ликвидации кастовой системы, которая, тем не менее, по-прежнему влияет на индийское общество изо дня в день, час за часом. В то время как репутация Амбедкара в политическом сообществе Доминиона была сильно подмочена после того, как он встал на сторону ИНК во время индийской революции, восхождение Шивараджа к известности стало \"оливковой ветвью\" для его бывшего политического товарища, и ходит множество слухов о том, что Амбедкар негласно контролирует ВФЗК.\n\nНесмотря ни на что, Шиварадж остается знаменосцем партии и уже добился успеха в налаживании контактов с Национальной либеральной федерацией Индии и Всеиндийской партией самоуправления. В зависимости от того, насколько восприимчивы те или иные партии к принятию прогрессивной, эгалитарной программы Шивараджа, зарегистрированные касты Индии еще могут увидеть политическую силу, которой будет не только наплевать на них, но и реально повлиять на их место в обществе."
 dominion_of_india_events.72.a: "Возможно, две федерации могли бы объединить свои усилия?"
 dominion_of_india_events.72.b: "У нас обоих в названии есть \"Всеиндийский\", так почему бы не объединить усилия?"

 dominion_of_india_events.110.t: "Британские офицеры покидают Индию"
 dominion_of_india_events.110.d: "С коллапсом Доминиона Индия начался массовый исход британских офицеров, спасавшихся от ужасов, которые, несомненно, учинили бы им завоеватели, если бы они остались.Многие из этих людей все еще годятся для службы, и многие жаждут вернуться в строй, надеясь однажды отомстить за свое великое поражение."
 dominion_of_india_events.110.a: "Однажды мы спасем драгоценный камень..."

 dominion_of_india_events.115.t: "Результаты выборов [GetYear] года"
 dominion_of_india_events.115.d: "Прошло четыре года с тех пор, как в нашем государстве состоялись последние демократические выборы. От устья Инда до вершин Гималаев наши доверенные лица и уполномоченные заняты установкой кабин для голосования для тех индийцев, которые получили право голоса и готовы отдать свой голос и решить, какое правительство будет руководить страной в ближайшие годы. Провинции Индии подсчитали свои бюллетени, и, наконец, результат таков...."
 dominion_of_india_events.115.a: "Юнионисты выходят с триумфом!"
 dominion_of_india_events.115.b: "Либералы получают миг славы!"
 dominion_of_india_events.115.c: "Победа ВПС!"

 dominion_of_india_events.152.t: "Уход Ганга Сингха"
 dominion_of_india_events.152.d: "Махараджа Ганга Сингх, возможно, величайший индус, живший со времен правления Раджи, скончался вчера поздно вечером в своем королевском дворце в штате Биканер. Сделав выдающуюся карьеру в британской и индийской армиях, Сингх был человеком, который создал стабильное законное правительство в безумном потоке социалистических мятежей и предательства монархов.\n\nТеперь, когда Индия сильнее, чем когда-либо, занять его место будет невероятно трудно."
 dominion_of_india_events.152.a: "Народ Индии погрузился в скорбь."
 dominion_of_india_events.152.b: "Дж.Р.Д. Тата, блестящий магнат, сменил его на посту вице-короля."
 dominion_of_india_events.152.c: "А.К. Чаттерджи, суровый дипломат, сменил его на посту вице-короля."

 dominion_of_india_events.155.t: "Death of Khengarji III of Kutch"
 dominion_of_india_events.155.d: "A progressive and venerable prince, Khengarji III of Cutch passed away this evening at his residence in Bhuj, Gujarat. Having ruled his state wisely for 67 years, the late prince will be mourned by many."
 dominion_of_india_events.155.a: "Fare thee well."

 dominion_of_india_events.156.t: "Passing of Sir Mian Fazl-i-Husain"
 dominion_of_india_events.156.d: "The architect of the gentry/peasant (kisan) political alliance that laid the groundwork for the powerful Unionist Party, Sir Mian Fazl-i-Husain has passed away after a prolonged period of illness.\n\nHaving been absent from the day to day running of the party for a prolonged period of time owing to his illness, Fazl-i-Husain will never the less be sorely missed within conservative circles."
 dominion_of_india_events.156.a: "The Unionist Party soldiers on!"

 dominion_of_india_events.162.t: "Aiding the New Indian Navy"
 dominion_of_india_events.162.d: "With cross-Empire trade picking up, the Indian government has decided to expand its naval assets to help protect the increased shipping.\n\nThe Indian ambassador to [Root.GetNameDef] has approached our government with a request for development aid regarding both engineers and naval officers. This could be a great way of strengthening the Empire's position in the Far East!"
 dominion_of_india_events.162.a: "Dispatch technical and development assistance!"
 dominion_of_india_events.162.b: "They're on their own."

 dominion_of_india_events.163.t: "Arrival of the [From.GetAdjective] Naval Mission"
 dominion_of_india_events.163.d: "After a vigorous sea journey the [From.GetAdjective] naval attachés and ship construction experts have debarked in Karachi. Should we set them up in Karachi itself or maybe expand the existing civilian naval hub in Bombay?"
 dominion_of_india_events.163.d.aust: "The naval delegates from the [From.GetAdjective] government have just arrived in Bombay. With their great experience of conducting operations in the Pacific the new Indian navy shall become a truly imposing sight on the high seas!"
 dominion_of_india_events.163.a: "Use them to expand the Karachi naval base!"
 dominion_of_india_events.163.b: "Set them up in Bombay, the beating heart of Indian commerce!"
 dominion_of_india_events.163.c: "We should name a ship HMIS Bruce!"

 dominion_of_india_events.300.t: "Судьба мятежных офицеров"
 dominion_of_india_events.300.d: "После того, как остатки повстанцев были быстро искоренены, законный контроль правительства над страной был полностью восстановлен. Наконец, полностью признав своё поражение, побеждённые офицеры повстанцев подали прошение об амнистии в обмен на службу Доминиону.\n\nХотя большее количество людей, безусловно, было бы преимуществом, особенно учитывая опыт, который наиболее опытные из них, возможно, приобрели на обоих этапах гражданской войны, их принятие, безусловно, вызвало бы недовольство и потенциально способствовало бы росту мятежных настроений. Необходимо решить, стоит ли вообще принимать эти предложения, вместо того чтобы просто заключить их в тюрьму вместе с другими предателями, и кого мы вообще должны принять, если это произойдёт."
 dominion_of_india_events.300.a: "Допустить только немногих опытных офицеров Республики."
 dominion_of_india_events.300.b: "Принять некоторых из тех, кто боролся с социалистами."
 dominion_of_india_events.300.c: "Впустите нейтральных офицеров из обоих мятежных правительств."
 dominion_of_india_events.300.e: "Этим людям нет искупления, изгоните их навсегда!"

 dominion_of_india_events.311.t: "Статус бывших французских колоний"
 dominion_of_india_events.311.d: "Франция была единственным серьёзным соперником британских колониальных амбиций в Индии, и, несмотря на её окончательный триумф, французы продолжали оккупировать несколько небольших анклавов. С включением территории бывшей Мадрасской республики мы теперь контролируем крупнейшее из этих бывших французских владений – Пондичерри.\n\nВысказывались предложения о восстановлении некоторой автономии города в качестве жеста доброй воли по отношению к нашим французским союзникам, хотя это можно было бы ошибочно принять за молчаливое одобрение иностранного колониализма."
 dominion_of_india_events.311.a: "Мы можем предоставить нашим французским друзьям некоторые особые права."
 dominion_of_india_events.311.b: "Объединить концессии в полноценные индейские штаты."
 dominion_of_india_events.311.c: "Запретите все французские учреждения и насаждайте индийские ценности!"

 dominion_of_india_events.99.t: "Будущее Бомбейского Пакта"
 dominion_of_india_events.99.d.start: "После полного разгрома полчищ социалистов Бомбейский пакт фактически распался, выполнив свою задачу по защите от мародеров из Калькутты. Однако сейчас у всех на уме насущный вопрос: что будет дальше?"
 dominion_of_india_events.99.d.raj: "$dominion_of_india_events.99.d.start$ Несмотря на конкурирующие претензии Федерации на то, что она является истинным правительством Индии, наше взаимное сотрудничество против Калькутты показало, что нам необязательно продолжать враждовать. Хотя почти наверняка потребуются переговоры, чтобы попытаться выяснить, что ждет нас в будущем, на данный момент с Хайдарабадом достигнута договоренность отложить любые переговоры как минимум на месяц, чтобы дать нам обоим время прийти в себя и перестроиться."
 dominion_of_india_events.99.d.prf: "$dominion_of_india_events.99.d.start$ Доминион, конечно, всегда отказывался признавать независимость Федерации, даже когда впервые велись переговоры по Бомбейскому пакту. Представляется маловероятным, что они уступят в этом вопросе на данном этапе, поскольку многие ожидают, что Лахор вскоре потребует нашего подчинения, включив наши государства в свой режим. Хотя на данный момент достигнута договоренность отложить любые переговоры как минимум на месяц, чтобы дать нам обоим время прийти в себя и перестроиться, мы должны начать готовиться к тому, что произойдет после этого перемирия."
 dominion_of_india_events.99.a: "Они уже должны начать готовиться к вступлению."
 dominion_of_india_events.99.b: "Если они думают, что мы присоединимся добровольно, то у нас есть много мостов для продажи..."

 dominion_of_india_events.100.t: "Переговорщики прибыли в Хайдарабад"
 dominion_of_india_events.100.d: "Прошло уже больше месяца с тех пор, как восстание на востоке было, наконец, подавлено, и этого времени было достаточно, чтобы первоначальный хаос как на наших территориях, так и на юге улегся. Не желая больше ждать ни минуты, чтобы наконец воссоединить нацию, в Хайдарабад были направлены переговорщики с явной целью потребовать их присоединения к доминиону.Хотя, конечно, мы готовы пойти на большие уступки, если это позволит избежать второй фазы войны, мы должны быть готовы к тому, что может произойти, если они не смогут действовать разумно."
 dominion_of_india_events.100.a: "Будем надеяться на их здравый смысл."

 dominion_of_india_events.101.t: "Доминион требует от нас присоединиться"
 dominion_of_india_events.101.d.default: "По истечении месячного льготного периода Доминион немедленно обратил свой взор на юг, в сторону Федерации, и направил группу переговорщиков, чтобы потребовать отказа от наших претензий к национальному правительству и присоединения к Доминиону.Несмотря на то, что возвращение под контроль британской короны после многих лет свободы - это тяжелая пилюля, [dominion_of_india_events.Capital.GetCapitalVictoryPointName] ясно дали понять, что они не примут "Нет" в качестве ответа, и в правительстве есть те, кто считает, что реинтеграция лучше, чем что-либо другое. война; при условии, конечно, что правительству Федерации будет предоставлено место в администрации Доминиона и на юге будет сохранена определенная степень автономии."
 dominion_of_india_events.101.d.osman: "По истечении месячного льготного периода Доминион немедленно обратил свой взор на юг, в сторону Федерации, и направил группу переговорщиков, чтобы потребовать отказа от наших претензий к национальному правительству и присоединения к Доминиону.Когда дипломаты предъявили свои требования Осману, он приказал их немедленно арестовать и сразу же начал готовить новый указ, провозглашающий власть Федерации над всем субконтинентом и дающий войскам [dominion_of_india_events.Capital.GetCapitalVictoryPointName] 24 часа на то, чтобы отступить, прежде чем с ними поступят как с террористами. оккупационные силы. Неудивительно, что Доминион до сих пор не согласился на это встречное требование."
 dominion_of_india_events.101.a: "Только через мой труп!"
 dominion_of_india_events.101.b: "Знамя Асафии будет высоко развеваться над Лахором!"
 dominion_of_india_events.101.c: "Потребовать автономии и места в правительстве"

 dominion_of_india_events.102.t: "Хайдарабад отвергает наше предложения"
 dominion_of_india_events.102.d.default: "В какой-то степени неудивительно, что федерация отказалась мирно воссоединять нацию, несмотря на наше сотрудничество в прошлом, и ясно дала понять, что они никогда не смирятся с правлением Доминиона до конца своих дней.Тогда становится ясно, какими должны быть наши следующие действия."
 dominion_of_india_events.102.d.osman: "Несмотря на наши мирные намерения, предатель Низам приказал арестовать наших дипломатов и зашел так далеко, что заявил, что у нас есть 24 часа, чтобы уйти в отставку и признать его правление над всей Индией или столкнуться с войной.\n\nКажется очевидным, что у нас нет другого выбора."
 dominion_of_india_events.102.a: "Пришло время показать этим предателям их место!"

 dominion_of_india_events.103.t: "Федерация требует уступок"
 dominion_of_india_events.103.d: "Как и ожидалось, в то время как Федерация предварительно согласилась присоединиться к Доминиону, их руководство потребовало места в управлении страной и значительной степени автономии для своих земель на юге.\n\nТакие грабительские требования трудно переваривать, но, похоже, если мы хотим, наконец, воссоединить нацию, то принять их - наш лучший вариант."
 dominion_of_india_events.103.a: "Мы принимаем их условия."
 dominion_of_india_events.103.b: "Кем они себя возомнили, чтобы выдвигать такие требования?"

 dominion_of_india_events.104.t: "Доминион соглашаетс принять требования"
 dominion_of_india_events.104.d: "[dominion_of_india_events.Capital.GetCapitalVictoryPointName] он согласился предоставить нам уступки, которых мы требовали, и в результате Осман, как глава государства Федерации, подписал свой окончательный указ о роспуске Федерации и присоединении всех ее членов к Доминиону."
 dominion_of_india_events.104.a: "Надеюсь, нам не придется отделяться во второй раз..."

