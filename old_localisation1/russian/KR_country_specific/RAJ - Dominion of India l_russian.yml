 RAJ_narasimha_chintaman_kelkar_advisor_desc: "§YРодился:§! §LAugust 24th, 1872, in Miraj, Miraj Senior State, Southern Maratha Country, India§!\n§YBackground:§! §LWhile once a close ally of Chittaranjan Das and a member of his Swaraj Party faction of the Indian National Congress, Narasimha Chintaman Kelkar refused to join his fellow Swarajists in rebellion against Britain. Instead, he would join Mukund Ramrao Jayakar in the Liberal Party, aiming to ensure the prioritisation of Hindu interests in the newly formed Dominion. Kelkar is not only a man of politics, however; he is an accomplished playwright, and his works have been responsible for igniting increased national identity and political consciousness among the people of India.§!"
