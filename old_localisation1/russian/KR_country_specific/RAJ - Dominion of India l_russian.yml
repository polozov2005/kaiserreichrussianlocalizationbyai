### Characters ###

 #Leaders

 RAJ_ganga_singh: "Ганга Сингх"
 RAJ_ganga_singh_leader_desc: "§YРодился:§! §L6 апреля, 1886, Биканер, штат Биканер, Индия§!\n§YПолитическая карьера:§! §LГанга Сингх, раджа Биканера, проявил себя способным военачальником во время Вельткрига, став в конечном счете единственным индийским членом британского Имперского военного кабинета. Однако Сингх оказался не только военным, но и проницательным политиком, завоевавшим значительную поддержку, выступив за радикальную, но постепенную реформу запутанной политической системы Индии. Однако в своем стремлении к реформам Сингх поддерживал сердечные отношения с британской администрацией и вызывал восхищение сочувствующих аристократов. Благодаря своей популярности Сингх оказал решающую поддержку тогдашнему вице-королю Руфусу Айзексу в превращении Индии из придатка Британской Империи в независимый Доминион.§!"
 RAJ_jehangir_ratanji_dadabhoy_tata: "Джахангир Тата"
 RAJ_jehangir_ratanji_dadabhoy_tata_advisor_desc: "§YРодился:§! §L29 июля, 1904, Париж, Сена, Французская Республика§!" #Old description was so inaccurate I just completely removed it, if someone wants to write a new one feel free
 RAJ_atul_chandra_chatterjee: "Атул Чандра Чаттерджи"
 RAJ_atul_chandra_chatterjee_leader_desc: "§YРодился:§! §L24 ноября, 1874, Калькутта, бенгальское президенство, Британская Индия§!\n§YПолитическая карьера:§! §LДипломат и умеренный рабочий активист, Чаттерджи усердно служил на \"индийской гражданской службе\" британского правительства; он был верховным комиссаром Великобритании в Индии, когда разразилась британская революция, перевернувшая политическую систему Индии. Его усилия сыграли ключевую роль в создании дипломатической службы Доминиона, и он даже лично руководил большинством дипломатов своей страны, когда возникали проблемы. После назначения вице-короля Ганги Сингха Чаттерджи стал еще более заметным в политике Индии и даже подружился с Сингхом. Чаттерджи был ярым сторонником государственной защиты прав индийских промышленных рабочих.§!"

