 #Seconds in Command

 RAJ_khizar_hayat_tiwana: "Хизар Хаят Тивана"
 RAJ_khizar_hayat_tiwana_sic_desc: "§YРодился:§! §L7 августа, 1900, Чак Музафаррабад, Пенджаб, Британская Индия§!\n§YПолитическая карьера:§! §LКак отпрыск великого клана Тивана, одной из самых могущественных семей, входящих в состав юнионистов, восхождение Хизара Хайята Тивана на вершину партии вряд ли стало неожиданностью. Несмотря на отсутствие у него собственного опыта, влияние его отца в сочетании с поддержкой клана Нун позволило ему стать лидером в преддверии выборов 1934 года и обеспечить победу партии на них. Хотя в партии, возможно, есть люди, особенно среди даултанов и хайятов, которые хотели бы, чтобы Тивана был заменен их собственным кандидатом, его пребывание на посту премьер-министра в целом было воспринято как позитивное.§!"
 RAJ_muhammad_ali_jinnah: "Мухаммад Али Джинна"
 RAJ_muhammad_ali_jinnah_sic_desc: "§YРодился:§! §L25 декабря, 1876, Карачи, Бомбейское президенство, Британская Индия§!\n§YПолитическая карьера:§! §LВпервые занявшись политикой, чтобы продвигать интересы мусульманского меньшинства Индии, Джинна в 1916 году организовал Лакхнауский пакт между враждующими мусульманскими и индуистскими лидерами за независимость, а во время Великой войны принял участие в создании Всеиндийской лиги самоуправления, выступавшей за самоопределение Индии. В то время Джинна также был членом Индийского национального конгресса, но возвышение Мохандаса Ганди и его доминирование в ИНК в годы, последовавшие за Вельткригом, привели к его выходу из партии и полному уходу из политики.\n\nВскоре Ганди был избран лидером Лиги самоуправления, фактически полностью объединив ее с ИНК, а несколько оставшихся ее членов обратились к радикализму. Тот же самый радикализм вскоре привел к тому, что Индия погрузилась в гражданскую войну и, в конечном счете, к созданию индийского доминиона на территориях, все еще лояльных Британии, хотя для многих это было слишком поздно. Однако для Джинны это новое владычество представляло собой прекрасную возможность, поскольку он не мог сидеть сложа руки, наблюдая, как по стране прокатывается хаос. Вскоре после этого он вернулся в политику, возродив название "Самоуправление" для своей новой партии, и решил создать новое политическое движение, призванное поднять настроение всем индийцам, независимо от вероисповедания или класса, то самое, которое он возглавляет и по сей день.§!"
 RAJ_mukund_ramrao_jayakar: "Мукунд Рамрао Джаякар"
 RAJ_mukund_ramrao_jayakar_sic_desc: "§YРодился:§! §L13 ноября, 1873, Бомбей, Бомбейское президенство, Британская Индия§!"
