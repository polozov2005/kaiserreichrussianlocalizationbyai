### Name and Description ###
 KR_history_title: "Предисловие"
 KR_scenario_name: "Наследие Вельткрига"
 KR_scenario_desc: "С наступлением 1936 года, наследие Вельткрига ложится тяжелым грузом на плечи нового поколения. Германия стоит в центре мира, не имея себе равных, но у ее ног лежат старые и новые враги: от поднимающегося синдикалистского Интернационала Франции до старой Антанты, до несокрушимой России и неприкаянного восходящего солнца. В то же время, обширное влияние Германии привело к опасному перенапряжению, ее союзники в Константинополе и Вене отдалились друг от друга, а через Атлантический океан американский колосс пошатнулся. Прошло семнадцать лет с момента окончания войны, и мало кто ожидает, что новый год принесет переломный момент, но вскоре одна искра может стать всем, что нужно, чтобы зажечь пороховую бочку заново..."

### Nation Selection Screen ###
 new_this_patch_title: "НОВОЕ В ЭТОМ ПАТЧЕ"
 new_this_patch_title_b: "§b$new_this_patch_title$§!"

 feature_highlight_icon_0_tt: "§YНовые портреты ученых§!\nЭто обновление добавляет §Y138 новых уникальных ученных§! которых можно распределить на исследовательские проекты, а также добавляет §Y134 новых генерируемых портретов§! для рекрутируемых ученых."
 feature_highlight_icon_1_tt: "§YПереработка контента для Индии§!\n§tДоминион Индия§!, §9Народная Республика Бхаратия§!, и §7Федерация Раджей§! получили §Yсовершенно новое древо нацфокусов§!, §Yсобытий§!, и §Yрешений§!, обеспечивая игровой процесс, более подходящий для современного Кайзеррайха."
 feature_highlight_icon_2_tt: "§YНовая Кайзер-Вики§!\nВики-сайт Кайзеррайха официально переехал в свой новый постоянный дом по адресу §4https://kaiserreich.wiki/§!.\n\nНовая вики-страница не содержит рекламы, загружается быстрее и отлично работает в игровом браузере и на мобильных устройствах.\n\nНайдите временные рамки, путеводители по странам и обновления для разработчиков в одном месте, которые поддерживает команда Kaiserreich.\n\nОбязательно обновите свои закладки!"

 highlight_major_0_tt: "Вы можете сыграть за §YРусскую Свободную Армию§! начав кампанию за §YРоссию§!, §YГерманию§!, или §YВосточных членов Рейхспакта§!. Ивент должен произойти вскоре после начала русско-германской войны.\n\n§RРоссией должен управлять Савинков или социалисты, что можно установить в правилах игры.§!"
 highlight_major_1_tt: "Вы можете сыграть за §YДальневосточную Армию§! начав кампанию за §YРоссию§!, §YЯпонию§!, или §YФэнтян§!. Ивент, позволяющий это сделать, произойдет вскоре после начала Дальневосточного восстания.\n\n§RРоссией должен управлять Савинков или социалисты, что можно установить в правилах игры.§!"

