 #RKMT Satellite Decisions
 RKT_challenge_the_RKMT_decision: "Оспорить лидерство в партии"
 RKT_challenge_the_RKMT_decision_desc: "Нынешнее руководство Национальной революции доказало, что недостойно наследовать мантию, оставленную доктором Сунем. Как верные последователи Трех принципов, мы продемонстрировали превосходное рвение в нашем общем деле. Таким образом, возможно, пришло время рассмотреть смену руководства..."

 RKT_eliminate_RKMT_pretenders_decision: "Устранить претендентов [RKT.GetNonIdeologyAdjective]"
 RKT_eliminate_RKMT_pretenders_decision_desc: "Соперник за лидерство в нашей революционной партии появился в [RKT.Capital.GetCapitalVictoryPointName], требуя лояльности верных кадров по всей стране. Хотя они могут носить Белое Солнце, они вряд ли являются верными товарищами или достойными преемниками доктора Суня. Таким образом, мы сбросим их с их высокой кафедры и спасем не только нашу партию, но и всю нашу нацию в процессе."

 RKT_revising_the_three_principles_decision: "Пересмотр Трех принципов"
 RKT_revising_the_three_principles_decision_desc: "Три народных принципа доктора Суня, хотя, безусловно, и проницательны, оставляют много места для дальнейшей интерпретации — гораздо больше, чем партийная ортодоксия хотела бы нас заставить поверить. Если мы хотим адаптировать эти принципы к нашей местной ситуации, мы должны быть готовы синкретизировать эти идеи с нашей существующей программой."

 RKT_implementing_the_three_principles_decision: "Внедрение Трех принципов"
 RKT_implementing_the_three_principles_decision_desc: "Три народных принципа доктора Суня равносильны священным в сфере Гоминьдана. Мы должны начать процесс «партизации» администрации, выполняя директивы центрального комитета и искореняя идеи, противоречащие правлению партийного государства."

 RKT_decision_cost_stb_05: "£GFX_stability_texticon §Y5%§!"
 RKT_decision_cost_stb_05_blocked: "£GFX_stability_texticon  §R5%§!"
 RKT_decision_cost_stb_05_tooltip: "Принятие решения стоит £GFX_stability_texticon  §Y5%§!"

 RKT_defend_our_autonomy_decision: "Защитить нашу автономию"
 RKT_defend_our_autonomy_decision_desc: "Наше подчинение центральному правительству Гоминьдана не дает им права доминировать над местными прерогативами [ROOT.GetAdjective]. И все же, несмотря на обещания позволить администрации [ROOT.GetLeader] свободу действий в осуществлении политической опеки над их провинцией, центральное правительство продолжает посылать шпионов и магистратов в [ROOT.Capital.GetCapitalVictoryPointName], чтобы подорвать наше правление и выкачивать ресурсы для своей революции. Их двуличию должен быть положен конец."

 RKT_express_our_loyalty_decision: "Выразить нашу лояльность"
 RKT_express_our_loyalty_decision_desc: "Наша преданность революции Гоминьдана сопряжена с определенными моральными обязанностями. Революции строятся на любви и жертвенности, и точно так же, как храбрые солдаты и мученики продолжают отдавать свои жизни за национальное дело, провинции также должны отдавать свои сокровища, энергию и ресурсы ради благополучия нации. Мы извлечем любые излишки, которые сможем себе позволить (и, возможно, больше), ради революции, чтобы однажды весь Китай мог разделить богатое будущее."

 RKT_decision_cost_ws_05: "£GFX_war_support_texticon §Y5%§!"
 RKT_decision_cost_ws_05_blocked: "£GFX_war_support_texticon  §R5%§!"
 RKT_decision_cost_ws_05_tooltip: "Принятие решения стоит £GFX_war_support_texticon  §Y5%§!"

 RKT_coopt_kuomintang_legitimacy_decision: "Присвоить легитимность Гоминьдана"
 RKT_coopt_kuomintang_legitimacy_decision_desc: "Популярность Гоминьдана доказала свою устойчивость на протяжении многих лет, выживая, несмотря на многочисленные оглушительные поражения. Возможно, послание доктора Суня действительно находит отклик у людей, давая им надежду среди беспорядков в Китае. Или, возможно, его послание легко истолковать так, чтобы оно означало все, что слушатель хочет услышать. Как бы то ни было, облечение нашего правления в атрибуты Гоминьдана помогает сгладить углы. В то время как Вечный премьер отбрасывает длинную тень на большинство, звезда [ROOT.GetLeader] сияет все ярче, стоя рядом с ним. Мы заявим о себе как об истинных наследниках его дела и сплотим народ вокруг себя."

 RKT_exhort_national_unity_decision: "Призывать к национальному единству"
 RKT_exhort_national_unity_decision_desc: "Гоминьдан выдержал великие испытания на протяжении десятилетий, потому что, сколько бы оружия ни было у его противников или сколько бы золота ни вливали внешние силы, чтобы противостоять им, их освободительные слова действительно завоевали сердца людей. Тем не менее, среди милитаризма и разобщенности всегда есть те, кто предпочтет преследовать эгоистичные интересы в ущерб потребностям нации. Мы должны обеспечить правление партийного государства против реакционеров, подавляя внутреннее инакомыслие. Только так мы сможем поднять нацию против ее врагов."

 RKT_secure_overseas_donations_decision: "Обеспечить зарубежные пожертвования"
 RKT_secure_overseas_donations_decision_desc: "После обреченного Северного похода сотни членов Гоминьдана отправились в изгнание, создав базы по всей Азии и за ее пределами. Хотя это и прискорбный результат наших предыдущих неудач, наши зарубежные товарищи сохранили свое богатство и связи. Даже во времена доктора Суня он черпал поддержку у зарубежных китайских общин. Теперь, когда Гоминьдан снова закрепился на материке, давайте призовем наших товарищей помочь в восстановлении промышленной мощи Китая."

 RKT_encourage_intellectuals_decision: "Поощрять интеллектуалов"
 RKT_encourage_intellectuals_decision_desc: "Наша революция не может быть выиграна одними солдатами и пулями, но достижениями наших исследовательских комитетов. Без их прогресса мы быстро отстанем от наших соперников, стремящихся контролировать Китай, и поэтому как никогда важно убедиться, что мы находимся на передовом крае военных технологий. Давайте искать помощи как у иностранных, так и у местных интеллектуалов, чтобы превратить нашу армию в самую современную силу в Китае."

 RKT_further_militarisation_decision: "Дальнейшая милитаризация"
 RKT_further_militarisation_decision_desc: "Неважно, сколько солдат в наших армиях, если они не оснащены надлежащим вооружением. Пока мы не получим полный контроль над материком, нашим высшим приоритетом является расширение нашего военно-промышленного комплекса. Мы должны перераспределить наши новые средства на дальнейшее строительство оружейных заводов."

 RKT_foster_regionalist_tendencies_decision: "Поощрять регионалистские тенденции"
 RKT_foster_regionalist_tendencies_decision_desc: "Хотим мы это признавать или нет, но факт остается фактом: Гоминьдан теперь разбросан по всему Китаю, сильно полагаясь на местных губернаторов с манией величия. Хотя это и печальная реальность, на данный момент мы, возможно, сможем превратить этот регионализм во временное преимущество. Поощряя эти регионалистские тенденции и временно заверяя местных офицеров, что они сохранят свои должности, мы сможем завоевать лояльность среди них."

 RKT_expand_national_reconstruction_decision: "Расширить Национальную реконструкцию"
 RKT_expand_national_reconstruction_decision_desc: "Хотя дело национального обновления, без сомнения, является праведным, давайте не будем пренебрегать провинциями, которые мы теперь контролируем. Бандитизм, милитаризм и коррупция опустошили некогда могущественную китайскую нацию, и ранее шумные фабрики теперь лежат в руинах и разрушены войной. Поскольку мы укрепили нашу власть над большей частью Китая, давайте обратимся внутрь и сосредоточимся на оживлении китайской промышленности."

 RKT_embrace_human_elan: "Принять силу человеческого духа"
 RKT_embrace_human_elan_desc: "Возможно, величайшая сила и добродетель человечества — это наш порыв. Наш добродетельный дух, наша энергия. Если мы хотим по-настоящему спасти состояние нации, мы должны использовать каждую унцию наших умственных и физических сил, мы должны быть готовы пролить кровь нашей жизни, сопротивляясь механической силе врага и преодолевая его превосходящее материальное оснащение."

 RKT_political_terror: "Царство политического террора"
 RKT_political_terror_desc: "Куда бы мы ни посмотрели, куда бы мы ни пошли, партия окружена врагами. Теми, кто угрожает Национальной революции, самому существованию спасения народа. Они сговариваются, чтобы свергнуть нас, и мы тоже можем. Охота на этих священных сторонников либерализма, этих противников Данго, вероломное «Китайское общество гражданских прав». Все станут жертвами натиска террора."

 RKT_mobilising_the_youth: "Мобилизация молодежи"
 RKT_mobilising_the_youth_desc: "Большинство правительственных органов в Китае пренебрегают бедной заблудшей молодежью. Бесцельные без руководства со стороны надлежащей власти, они обращаются к бродяжничеству, бандитизму или вынуждены вести жизнь вечной нищеты и рабства. Конечно, те немногие счастливчики, интеллектуалы, сыновья и дочери бюрократов, они могут сбежать. Но для тех, кто остался позади, партия и армия могут внушить им новую цель: нести факел своего будущего."

 RKT_reform_the_administration: "Реформировать администрацию"
 RKT_reform_the_administration_desc: "Партийный аппарат Гоминьдана — это громоздкий бегемот с разросшейся бюрократией ради бюрократии, погрязший в неэффективности и где доминируют технократы Центрального клуба и милитаристы Вампу. Эксперты в гражданской администрации и по-настоящему гражданские по натуре, мы можем работать над оптимизацией Партийного государства, ибо страна существует исключительно благодаря своей способности функционировать изо дня в день."

 RKT_shanghai_connections: "Наши связи в Шанхае"
 RKT_shanghai_connections_desc: "Осуждаемые большинством в партии, такие как Вампу и Политическая наука, относятся к процветающему китайскому подполью как к грязи и паразитам. Однако их близорукость в конечном счете является их гибелью. Поддерживая наши контакты с такими людьми, как Ду Юэшэн, поистине умным человеком с большими способностями, мы можем обеспечить дополнительные... менее чистые источники финансирования."

 RKT_spiritual_warfare: "Ведение духовной войны"
 RKT_spiritual_warfare_desc: "С помощью опубликованного «Очерка общего этического учения», предоставленного всем уровням школ в стране, мы предоставили средства, с помощью которых можно реконструировать китайский дух. Переоценивая четыре конфуцианские добродетели и объединяя их, мы можем выступать за самодисциплину и служение нации, применяя их для заработка на жизнь. «Верить в себя, веря в Дао; управлять собой, управляя вещами; обучать себя, обучая других, и защищать себя, защищая страну»."

 #GXC LKMT Decisions
 GXC_coax_the_reluctant_decision: "Уговорить несогласных"
 GXC_coax_the_reluctant_decision_desc: "У мелкой буржуазии всегда были непростые отношения с революцией. Действительно, они часто являются самыми упрямыми противниками социализма, однако многие социалистические лидеры вышли именно из этого класса. Необходимо внести некоторые поправки, и всегда хорошо иметь квалифицированную и интеллектуальную рабочую силу на нашей стороне."

 GXC_court_peasant_activists_decision: "Обхаживать крестьянских активистов"
 GXC_court_peasant_activists_decision_desc: "Ассоциации фермеров начали укреплять свою власть над сельской местностью, что является огромным подспорьем, пока мы можем сохранять их лояльность. А сохранить их лояльность — задача не из легких. Многострадальные крестьяне требуют перемен, экономических, политических и даже социальных — и мы должны спешить удовлетворить эти требования!"

 GXC_bolster_iron_army_decision: "Укрепить Железную армию"
 GXC_bolster_iron_army_decision_desc: "Четвертая армия — гордость Гуандуна, с гордой историей борьбы с милитаризмом и героической службой во время Северного похода. Поскольку многие кантонцы служили в различных формированиях, базирующихся в Гуандуне, на протяжении многих лет, у нас есть постоянный резерв солдат, из которого можно черпать как для прямой службы, так и для вспомогательных целей. Поддержание снабжения этой армии жизненно важно для дальнейших побед."

 GXC_win_over_unions_decision: "Завоевать профсоюзы"
 GXC_win_over_unions_decision_desc: "Профсоюзные активисты принимают разные формы в Лянгуане: от традиционных промышленных профсоюзов до доков и даже речников, которые трудятся вдоль Жемчужной реки. Хотя последствия Черного понедельника начали отступать, многие все еще нуждаются в помощи, особенно с учетом того, что иностранные инвестиции уходят из региона."

 GXC_reinvigorate_the_party_decision: "Оживить Партию"
 GXC_reinvigorate_the_party_decision_desc: "Возможно, самой ожидаемой частью платформы Революции является Национальная реконструкция, грандиозный, хотя и смутно определенный план экономического развития, который подкрепляет другие обещания длительных социальных и политических изменений. Аппаратчики жаждут возможности проявить себя в качестве партийных кадров, курируя крупномасштабные проекты, которые могут создать или разрушить карьеру."

 #YUN Satellite Decisions
 YUN_appease_the_radicals: "Умиротворить радикалов"
 YUN_appease_the_radicals_desc: "Осажденная как слева, так и справа нашими товарищами по партии, которые требуют более «революционной» формы правления, Третья армия идет по узкому канату. С нашими собственными обязательными левыми влияниями, сплачивающимися за немедленное облегчение бед и нужд крестьян и рабочих, наряду с остатками клик Вампу, настаивающими на своем превосходстве в руководстве Национальной революцией, правительство стало довольно напряженным. Чтобы предотвратить гражданскую войну, давайте обратимся к нашим товарищам по партии, чтобы найти общий язык ради нашего общего национализма."

 YUN_embrace_sanminism: "Принять саньминизм"
 YUN_embrace_sanminism_desc: "Для энергичных и преданных Три народных принципа являются теми самыми догматами, за которые ведется наша революционная борьба и проливается кровь. Однако по всей стране идеология, изложенная доктором Сунь Ятсеном и интерпретированная его верными последователями, подверглась кампании очернения. Хотя верно, что партия предыдущего десятилетия не смогла достичь своих грандиозных амбиций, партия нынешнего десятилетия движется вперед без такой неуверенности. Чистый в идеологии и чистый в мышлении, народ должен понимать, за что борется Партия."

 YUN_publicise_landlord_transgressions: "Предать огласке преступления землевладельцев"
 YUN_publicise_landlord_transgressions_desc: "Слишком долго различные мелкие «лорды» китайской деревни, будь то сами шэньши или просто землевладельцы, правили практически безнаказанно. Работники возделывают свои поля в условиях практического крепостного права, и Партия скорбит. Если мы хотим стать спасением пролетариата и угнетенных, мы должны начать кампанию праведности против тех, кто плохо обращается и злоупотребляет своим положением в нации."

 YUN_hold_mass_rallies: "Проводить массовые митинги"
 YUN_hold_mass_rallies_desc: "По всей китайской нации многочисленные крестьянские общины и организации продолжают эксплуатироваться своими хозяевами. В том же духе большая часть мелкой буржуазии городских центров, те, кто составляет большую часть костяка интеллектуального социализма Китая, остаются отчужденными от концепции Национальной революции. Чтобы отпраздновать провозглашение новой эры политических, экономических и социальных изменений, мы должны заняться массовым распространением послания Партии. Ибо милитаристы, империалисты, шэньши и злые хулиганы больше не имеют над вами власти!"

 YUN_rally_the_whampoa_cliques: "Сплотить клики Вампу"
 YUN_rally_the_whampoa_cliques_desc: "Несмотря на враждебность между умеренными из Третьей армии и кликами Вампу, произошедшими от Первой армии, наше общее революционное братство сохраняется. Отстаивая дело Национальной революции как никто другой, клики Вампу родились в колыбели революции, и их преданность абсолютна. Всегда амбициозные и коварные, они, тем не менее, разделены между собой. Давайте позвоним в колокол Национальной революции и породим единство между разрозненными кликами НРА."

 YUN_invigorate_the_youth_leagues: "Активизировать молодежные лиги"
 YUN_invigorate_the_youth_leagues_desc: "Постоянно изобилующий вихрь радикализма и революции внутри китайской нации, ее молодежь в конечном итоге игнорируется большинством правительственных органов в Китае. Бесцельные без руководства или направления, они либо развиваются, чтобы жить жизнью самоуспокоенности и капитуляции, либо даже обращаются к бандитизму. Конечно, остаются те из влиятельных семей, кто благословлен рождением, чтобы избежать судьбы столь многих своих товарищей. Но для тех, кто остался позади, остается всего одно спасение: молодежные лиги Партии."

 YUN_promoting_reformist_continuity: "Продвижение реформистской преемственности"
 YUN_promoting_reformist_continuity_desc: "Модернизации нации желают не только революционные партии, такие как Гоминьдан или Китайская синдикалистская партия. Всегда есть часто забываемая, но мудрая и осторожная рука стабильного модернизатора, сила, которая присутствует всегда. Ибо провинция Юньнань всегда была провинцией, рожденной из желания новой нации, современной нации, нации, построенной на добродетелях и ценностях республиканского правления. Давайте напомним населению, что оплот реформ лежит в преемниках героев Двойной Девяток."

 YUN_cultivate_business_ties: "Развивать деловые связи"
 YUN_cultivate_business_ties_desc: "Полагаться на идеализм — это все хорошо, но истинную военную мощь и цели можно извлечь только через материальную поддержку. Без экономического производства и растущих заводов нашим солдатам на полях сражений не хватало бы винтовок, пуль и снарядов, необходимых для достижения объединения. Давайте договоримся с китайскими производителями оружия и магнатами, чтобы добиться от них выгодного урегулирования, чего бы это ни стоило."

 YUN_harkening_back_to_our_legacy: "Возвращаясь к нашему наследию"
 YUN_harkening_back_to_our_legacy_desc: "Слишком долго Гоминьдан направлялся по пути пылкой, кровожадной и бешеной экстремистской идеологии. Изолировав себя в своих неудачах 1920-х годов, Партия растоптала жертвы героев предыдущих революций только для того, чтобы установить собственное царство чистого террора над населением. Мы должны работать, чтобы напомнить не только Партии, но и самому населению, что Гоминьдан родился из демократического участия в демократической революции, чтобы Китай не поддался тирании, вымощенной благими намерениями."

 YUN_rallying_the_veterans_of_revolution: "Созыв ветеранов революции"
 YUN_rallying_the_veterans_of_revolution_desc: "«Доверие зарабатывается многими делами, а теряется только одним».\nПартия может долго высмеивать влияние Политической науки в повседневных делах, но никто не может очернить приверженность отстаиванию истинных идеалов Синьхайской революции, которую воплощает клика. Укомплектованная ветеранами вечной борьбы против милитаристов и деспотов, Клика политической науки сохранилась на политической сцене Китая, пока основная Партия гнила в функциональном изгнании. Давайте возвестим о законном возвращении истинных идеалистов Гоминьдана, тех, кого авторитаризм не сбил с пути."

 #CHI Puppet Decisions
 LKT_challenge_the_LKMT_decision: "Бросить вызов Центральному комитету"
 LKT_challenge_the_LKMT_decision_desc: "Центральный комитет продемонстрировал свою неспособность возглавить Национальную революцию. Как верные партийные кадры, мы продемонстрировали более искреннюю приверженность Трем принципам, и мы должны подготовиться к возможности того, что наше нынешнее руководство должно уйти."

 LKT_eliminate_LKMT_pretenders_decision: "Устранить претендентов [LKT.GetNonIdeologyAdjective]"
 LKT_eliminate_LKMT_pretenders_decision_desc: "Старый Центральный комитет пал, и на пепелище поднялась новая группа потенциальных ревизионистов. Теперь миллионы китайцев снова рискуют быть сбитыми с истинного учения доктора Суня, чего мы не можем допустить как верные ученики китайского левого движения."

 LKT_promote_rca_chapters_decision: "Продвигать отделения АТР"
 LKT_promote_rca_chapters_decision_desc: "Ассоциация товарищей по реорганизации Гоминьдана — это тайное общество, первоначально основанное правительством партии в изгнании, призванное обеспечивать революционную дисциплину, тщательное изучение Трех принципов и, прежде всего, верно поддерживать лидерство Ван Цзинвэя в партии. Хотя в АТР на более высоких уровнях существует множество разногласий, на местном уровне их отделения известны своими сплоченными социалистическими ячейками и упрямой преданностью Председателю. Поощряя их налаживать связи с бюрократией и партийными кадрами [ROOT.GetAdjective], мы помогаем им в их стремлении предотвратить любой вызов правлению Вана."

 LKT_assist_pac_opposition_decision: "Помочь оппозиции ВКД"
 LKT_assist_pac_opposition_decision_desc: "Временный комитет действий Гоминьдана был основан в первые дни восстания Мин-Гань в попытке создать автономную структуру руководства от далекого правительства в изгнании. В союзе с различными гражданскими оппозиционными группами и Ассоциацией революционных одноклассников военной академии Вампу, ВКД бросил свой вес на поддержку заявки Сун Цинлин (вдовы основателя партии Сунь Ятсена) на лидерство в партии. Этот маловероятный союз искал нашей поддержки, чтобы предотвратить диктатуру Ван Цзинвэя, но как долго он сможет продержаться в случае победы — это другой вопрос."

 LKT_embrace_crs_fanaticism_decision: "Принять фанатизм КО-Р"
 LKT_embrace_crs_fanaticism_decision_desc: "Китайское общество реконструкции — это тайная клика ультранационалистических, тоталитарных военных офицеров, сплотившихся вокруг руководства генерала Ху Цзуннаня. Включая различные братские круги, построенные на товариществе военной академии Вампу, КО-Р является наиболее заметным проявлением революционного пыла, порожденного военным крылом Гоминьдана. Принятие этого духа в наши местные силы, конечно, будет иметь последствия, но это может означать разницу между жизнью и смертью революции."

 LKT_tolerate_lcs_agitation_decision: "Терпеть агитацию ЛКС"
 LKT_tolerate_lcs_agitation_decision_desc: "Лига китайских синдикалистов была основана социалистами, не входящими в Гоминьдан, в надежде создать левый противовес партийному государству. Возглавляемая Китайской синдикалистской партией, при неохотной помощи анархистского Общества (Нового) Мира и различных независимых, Лига является нестабильной структурой, склонной к внутренней борьбе между своими составными элементами. Тем не менее, учитывая глобальное доминирование синдикализма (или, по крайней мере, подражателей синдикализма) среди социалистических кругов, ЛКС сыграла важную роль в мобилизации поддержки среди простых людей делу революции. Позволив им обосноваться в [ROOT.Capital.GetCapitalVictoryPointName], мы уменьшим нашу поддержку со стороны местных властей, но поддержим надежды в [CHI.CapitalGetCapitalVictoryPointName] и других местах на то, что наступает новый, воинственный день."

 LKT_engage_rcf_dialogue_decision: "Вступить в диалог с ФР"
 LKT_engage_rcf_dialogue_decision_desc: "Фракция реконструкции была основана на Гавайях Сунь Фо и его оставшимися сторонниками в изгнании. Опираясь на поддержку старых сетей поддержки покойного отца Суня в диаспорах Юго-Восточной Азии, они использовали свои финансовые ресурсы, чтобы попытаться внедрить свои вдохновленные западом либеральные ценности в движение. Их склонность обхаживать аутсайдеров партии и либеральных диссидентов местного статус-кво, как правило, отталкивает как социалистов, так и милитаристов, но может способствовать созданию более позитивного имиджа партии на национальном и международном уровне."

#Liberation of Asia

 KMT_liberation_of_asia_category: "Освобождение Азии"
 KMT_liberation_of_asia_category_desc: "Китайцы были не единственными жертвами империализма. По всему континенту хищническая экспансия европейских империй поглощала свободные нации, подвергая миллионы людей жестокому колониальному правлению. На востоке к угнетателям присоединились японцы, спеша водрузить свой флаг на чужой земле.\n\nНаш долг как естественного защитника Азии — освободить все народы по всей земле. Своим духом, своей кровью и, если необходимо, своей хитростью мы разрушим хватку империалистических держав как дома, так и за рубежом. А пока мы поможем поднять национальное самосознание азиатских народов, помогая им разделить славу паназиатского социализма."

 KMT_found_our_faction_decision: "Заявить о своем месте в мире"
 KMT_found_our_faction_decision_desc: "Видение Китая доктором Сунь Ятсеном предусматривало, что нация займет свое законное место в Восточной Азии и мире, используя свои мощные ресурсы и народы для укрепления международной доброй воли и сотрудничества. С успехом Национальной революции вполне логично, что следующим шагом должно стать восстановление нашего влияния и распространение идеалов Национальной революции, чтобы Китай никогда больше не стал жертвой империализма."

 KMT_invite_countries_to_faction: "Пригласить [FROM.GetNameDef] в [ROOT.GetFactionName]"
 KMT_invite_countries_to_faction_desc: "Национальная революция, которую доктор Сунь задумал для Китая, должна стать образцом для подражания не только для китайцев — Три народных принципа могут стать руководящими принципами для свободного нового порядка в Азии. Давайте объединимся как товарищи, новые стремящиеся молодые страны, против тирании, которой является иностранный империализм, и давайте гарантируем, что мир и добрая воля продолжат длиться в Азии для грядущих поколений."

 KMT_invite_countries_to_faction_tt: "§YШансы на принятие зависят от мнения §Y[FROM.GetAdjective]§! о нас.§!"
 KMT_invite_countries_to_faction_peace_requirement_tt: "И мы, и страна, которую мы хотим пригласить, должны быть в мире или иметь общих врагов и не должны быть на грани потенциальной войны, за исключением Гавайев."

 KMT_invite_into_economic_sphere: "Пригласить [FROM.GetNameDef] в $KMT_minsheng_partnership_full_name$"
 KMT_invite_into_economic_sphere_desc: "Судьба Китайской национальной революции такова, что Китай как страна, проникнутая великими националистическими чувствами, находится в лучшем положении, чем любая другая нация на Востоке, для борьбы с империализмом. Экономическая ситуация и история угнетенных народов Востока схожи с таковыми в Китае. Как и Китай, они не должны развиваться в капиталистические или чисто синдикалистские системы — скорее, их целью должно быть подражание китайской модели и создание «Стран народного Миньшэн».\n\nПо этим причинам успех Китайской революции обязывает Китай открыть новую эру для народов Востока и вдохновить их на формирование прочного союза против империализма. Как штаб-квартира антиимпериалистического движения, Китай должен стремиться объединиться с народами востока для создания великого восточноазиатского расового и экономического сообщества."
 KMT_withdraws_from_sphere: "[THIS.GetNameDefCap] исключается из $KMT_minsheng_partnership_full_name$"

 KMT_liberation_war_decision: "Подготовить освободительную войну против [FROM.GetNameDef]"
 KMT_liberation_war_decision_desc: "Уникальное положение Китая в Азии обусловлено веками давнего культурного и политического господства в регионе. Именно Китай считается одной из величайших и старейших цивилизаций мира, и вполне уместно, что китайская нация — ныне возрожденная — должна быть способна осуществить мировую революцию. Используя огромную промышленную и военную мощь Китая, мы будем стремиться демонтировать реакционные режимы и освободить наших собратьев-азиатов, чтобы они тоже могли наконец обрести спасение."

 KMT_freed_core_tt: "Регионы, считающиеся наиболее важными для стратегических интересов Китая, находятся под властью дружественных (союзных или сателлитных) правительств, включая §YКорею§!, §YЯпонию§!, §YФилиппины§! и §Yстраны Индокитая§!\nПорты §Y[408.GetName]§! и §Y[336.GetName]§! должны удерживаться либо Китаем, либо союзником."
 LKT_freed_india_tt: "Весь Индийский субконтинент, включая §Y[321.GetName]§!, §Y[818.GetName]§!, §Y[422.GetName]§!, §Y[323.GetName]§!, §Y[324.GetName]§!, управляется §RСоциалистическими§! правительствами."
 LKT_freed_SEA_tt: "Вся Юго-Восточная Азия управляется §RСоциалистическими§! правительствами, а европейские колонии §Y[GEA.GetName]§!, §Y[DEI.GetName]§! и §Y[721.GetName]§! упразднены."
 LKT_freed_CEA_tt: "Вся Центральная Азия управляется §RСоциалистическими§! правительствами, включая §Y[AFG.GetName]§!."
 LKT_freed_AST_tt: "Вся Океания управляется §RСоциалистическими§! правительствами."
 LKT_freed_HAW_tt: "Свобода звенит по всему Тихому океану, и острова, даже такие далекие, как §YГавайи§!, находятся под властью ответственных §RСоциалистических§! правительств."
 RKT_freed_india_tt: "Весь Индийский субконтинент, включая §Y[321.GetName]§!, §Y[818.GetName]§!, §Y[422.GetName]§!, §Y[323.GetName]§!, §Y[324.GetName]§!, управляется §CСоюзными§! правительствами."
 RKT_freed_SEA_tt: "Вся Юго-Восточная Азия управляется §CСоюзными§! правительствами, а европейские колонии §Y[GEA.GetName]§!, §Y[DEI.GetName]§! и §Y[721.GetName]§! упразднены."
 RKT_freed_CEA_tt: "Вся Центральная Азия управляется §CСоюзными§! правительствами, включая §Y[AFG.GetName]§!."
 RKT_freed_AST_tt: "Вся Океания управляется §CСоюзными§! правительствами."
 RKT_freed_HAW_tt: "Свобода звенит по всему Тихому океану, и острова, даже такие далекие, как §YГавайи§!, находятся под властью ответственных §CСоюзных§! правительств."

#Afro-Asian Conference

 KMT_afro_asian_conference_category: "Афро-азиатская конференция"
 KMT_afro_asian_conference_category_desc: "С тех пор как Сун Цинлин провела свою Афро-азиатскую конференцию после объединения Китая под властью Гоминьдана, социалистические державы стали активнее инвестировать в развивающийся мир. Эти инвестиции — нечто большее, чем просто еще одно средство сбора доброй воли; планировщики конференции заявили о своих амбициях по созданию новой глобальной экономики, свободной от капиталистической эксплуатации."

 KMT_invest_in_third_world_decision: "Инвестировать в [FROM.GetNameDef]"
 KMT_invest_in_third_world_decision_desc: "Народ [FROM.GetNameDef] успешно сбросил оковы колониализма, и их молодому социалистическому правительству, вероятно, потребуется помощь извне, чтобы сгладить постколониальный переход. Это должно повлечь за собой комплексную программу развития городов, модернизации сельскохозяйственных практик, создания государственных институтов, инвестирования в образование и искоренения коррупции — процесс, длящийся десятилетиями. Во многих областях построение более процветающего будущего находится исключительно в руках местных жителей, но мы можем помочь начать прогресс, проявив некоторую щедрость с нашей стороны."

#People's Minsheng Cooperative Economic Partnership

