 GXC_rkmt_revolution: "Китайская национальная революция"
 GXC_rkmt_revolution_desc: "Подобно Инь и Ян, вселенная течет в равновесии, и именно так должно быть устроено общество. От нищего, плюющего на углу улицы, до гордого пехотинца НРА — весь Китай должен познать истинный путь порядка, чтобы реализовать идею Миньшэн."

 GXC_rkmt_revolution2: "Китайская национальная революция"
 GXC_rkmt_revolution2_desc: "Подобно Инь и Ян, вселенная течет в равновесии, и именно так должно быть устроено общество. От нищего, плюющего на углу улицы, до гордого пехотинца НРА — весь Китай должен познать истинный путь порядка, чтобы реализовать идею Миньшэн."

 GXC_rkmt_revolution3: "Движение за новую жизнь"
 GXC_rkmt_revolution3_desc: "Должны быть послушание, жертвенность, строгость, чистота, точность, скорость, усердие, секретность... и каждый должен твердо и смело жертвовать всем ради группы и ради нации. Мы тщательно милитаризируем жизнь граждан всей нации, чтобы они могли взрастить в себе мужество и быстроту, выносливость к страданиям и терпимость к тяжелому труду."

 GXC_kmt_demobilisation: "Национальная конференция по расформированию"
 GXC_kmt_demobilisation_desc: "Раздутая и дорогая, НРА после объединения, хоть и утомлена боями, все еще нуждается в реформе. Давайте предпримем шаги, чтобы смягчить ущерб от объединения и по-настоящему превратить НРА в истинную армию Китайской Республики."

#Decisions
 RKT_zeal_decision_category: "Революционное рвение Гоминьдана"
 RKT_zeal_decision_category_desc: "«Ключ к успеху — в действии, а суть действия — в настойчивости».\n— Доктор Сунь Ятсен\n\nРеволюция Гоминьдана поддерживается фанатичной преданностью его солдат и патриотическим пылом его кадров. Хотя прагматизм имеет свои преимущества, в долгосрочной перспективе руководство партии должно повышать свое §cРеволюционное рвение§!, иначе партия скатится обратно к мелкому фракционализму.\n\n§cРеволюционное рвение§! можно абстрактно представить как хранящееся на общем банковском счете по всему Китаю. Региональные игроки могут решить §Rснять§! или §Gвнести§! эту националистическую энергию, и в ответ центральное правительство может выбрать: §Gвосполнить дефицит§! или §Rприсвоить излишки§!. Это взаимодействие может позволить распределять ресурсы там, где это необходимо, но будьте осторожны: от этого рвения может зависеть окончательная судьба революции.\n\n§cРеволюционное рвение§! в настоящее время составляет [?global.RKT_revolutionary_zeal_var|c%] по всей стране."

 LKT_decision_category: "Интриги народной революции"
 LKT_decision_category_desc: "Левые силы Китая утверждают, что борются за народ и его освобождение, но даже в самый темный час единство между эклектичной смесью социалистов, националистов и революционеров, составляющих китайских левых, было мимолетным. Теперь, когда революция снова в самом разгаре, разногласия сохраняются.\n\nЛевое крыло Гоминьдана раскололось на две основные коалиции. §RАссоциация товарищей по реорганизации§! и их лидер §RВан Цзинвэй§! ведут ожесточенную борьбу за влияние с §SВременным комитетом действий Сун Цинлин§!.\n§YВ настоящее время ситуацию можно описать как:§! [CHI_bop_status_loc].\n\nРадикализация пошатнула власть истеблишмента над собственным движением, открыв политическую сферу для таких внешних фракций, как §lлиберальная ФР§!, §rповстанческая ЛКС§! и §oфанатичное КО-Р§!.\n§YВ настоящее время Революционный радикализм находится на уровне§! [?CHI.CHI_radicalism_var|o%]\n\nОжидается, что баланс сил и Революционный радикализм определят окончательный исход борьбы за власть в Гоминьдане. Местная борьба за власть также ожидается в отдаленных провинциях, что может сыграть роль в судьбе громоздкой китайской революции. И кто знает, может быть, у аутсайдера есть шанс на власть. Мы знаем одно: народ высказался, и он требует нового Китая!"

 #National Reconstruction
 KMT_national_reconstruction_category: "Национальная реконструкция Гоминьдана"
 KMT_national_reconstruction_category_desc: "Комиссия по национальной реконструкции — детище покойного доктора Сунь Ятсена, который писал, что на этапе политической опеки необходимо предпринять шаги для обеспечения успешной модернизации и демократизации страны. Если Китай хочет снова стать великой мировой державой, он должен быть построен с нуля при помощи китайского Гоминьдана.\n\nХотя усилия по национальной реконструкции были существенно сдержаны Первым и Вторым Северными походами, завершение Второго Северного похода наконец дало Партии шанс выполнить цель «цзяньшэ» (строительства) Синьхайской революции 1911 года. Поскольку теперь мы можем отойти от пропагандистского и военного этапа революции, в соответствии с принципами нашего великого вечного премьера мы должны теперь вступить в этап политической и экономической реконструкции Национальной революции. Шаг за шагом, завод за заводом, ферма за фермой — мы восстановим великие экономические и политические основы нашей страны, чтобы Китай мог вечно противостоять иностранному империализму и вернуть себе величие."

 KMT_national_reconstruction_mission: "£civ_factory_output  Завершить Национальную реконструкцию"
 KMT_national_reconstruction_mission_desc: "Грандиозный проект Партии был полностью запущен и поддерживается членами как Временного комитета действий, так и Ассоциации товарищей по реорганизации. Хотя между фракциями Партии существует единство в выполнении проекта Национальной реконструкции, неудача в этом может привести к потере политической власти для одной фракции и получению власти для другой."
 KMT_factory_goals_tt: "Более §Y[?KMT_factory_goals]§! фабрик всего"

 KMT_NRC_heavy_industry_decisions_tt: "§CВыбор этого фокуса предоставит нам больше решений по §YТяжелой промышленности§! в категории решений §Y$KMT_national_reconstruction_category$§!.§!"
 KMT_NRC_autarky_decisions_tt: "§CВыбор этого фокуса предоставит нам больше решений по §YТорговле и автаркии§! в категории решений §Y$KMT_national_reconstruction_category$§!.§!"
 KMT_NRC_resource_decisions_tt: "§CВыбор этого фокуса предоставит нам больше решений по §YРазведке ресурсов§! в категории решений §Y$KMT_national_reconstruction_category$§!.§!"
 KMT_NRC_railroad_decisions_flag: "§CВыбор этого фокуса предоставит нам больше решений по §YСтроительству железных дорог§! в категории решений §Y$KMT_national_reconstruction_category$§!.§!"

 KMT_delay_the_reconstruction_project: "Отложить проект реконструкции"
 KMT_delay_the_reconstruction_project_desc: "Несмотря на все наши усилия, наши инженеры и рабочие с трудом укладываются в сроки. Нам придется подать прошение в КНР о продлении сроков завершения проекта."

 KMT_nationalise_nanjing_electrical_works: "Национализировать Нанкинскую электростанцию"
 KMT_nationalise_nanjing_electrical_works_desc: "[KMT_nationalise_nanjing_electrical_works_desc_scripted_loc]"

 KMT_nationalise_nanjing_electrical_works_lkmt_desc_key: "Грандиозный план, вдохновленный разработками в Лондоне и Париже, Нанкинская электростанция стремится осветить великую столицу националистического Китая. Это националистическое агентство одним из первых столкнулось с неопределенностью экономических идей покойного доктора Суня относительно того, что должно подпадать под государственную и частную сферы экономики. Таким образом, национализация и реорганизация электросетей принесут электричество тысячам людей, живущим во тьме Нанкина."
 KMT_nationalise_nanjing_electrical_works_rkmt_desc_key: "Грандиозный план, вдохновленный разработками в Москве, Нанкинская электростанция стремится осветить великую столицу националистического Китая. Это националистическое агентство одним из первых столкнулось с неопределенностью экономических идей покойного доктора Суня относительно того, что должно подпадать под государственную и частную сферы экономики. Таким образом, национализация и реорганизация электросетей принесут электричество тысячам людей, живущим во тьме Нанкина."

 KMT_establish_the_yongli_chemical_plant: "Основать химический завод «Юнли»"
 KMT_establish_the_yongli_chemical_plant_desc: "[KMT_establish_the_yongli_chemical_plant_scripted_loc]"

 KMT_establish_the_yongli_chemical_plant_lkmt_desc_key: "Китай, как страна, зависящая от почвы, не имеет средств и отраслей для производства современных удобрений, чтобы улучшить и увеличить сельскохозяйственное производство. Проект в Юнли, возглавляемый Фань Сюйдуном, направлен на строительство первого в Китае завода по производству удобрений и, таким образом, на разработку отечественной серной кислоты, синтетического аммиака и азотной кислоты. Проект также возглавляют британские и французские советники, с целью производить тонны аммиака, кислоты и сульфата в день."

 KMT_establish_the_yongli_chemical_plant_rkmt_desc_key: "Китай, как страна, зависящая от почвы, не имеет средств и отраслей для производства современных удобрений, чтобы улучшить и увеличить сельскохозяйственное производство. Проект в Юнли, возглавляемый Фань Сюйдуном, направлен на строительство первого в Китае завода по производству удобрений и, таким образом, на разработку отечественной серной кислоты, синтетического аммиака и азотной кислоты. Проект также возглавляют российские советники, с целью производить тонны аммиака, кислоты и сульфата в день."

 KMT_renovate_shanghai_arsenal: "Обновить Шанхайский арсенал"
 KMT_renovate_shanghai_arsenal_desc: "[KMT_renovate_shanghai_arsenal_desc_scripted_loc]"

 KMT_renovate_shanghai_arsenal_lkmt_desc_key: "Наше время в Британии и Франции научило нас важности бронетанковой и механизированной войны. Хотя пройдет много времени, прежде чем мы сможем разработать сложные бронетанковые технологии, как на Западе, Шанхайский арсенал будет обновлен, чтобы облегчить производство бронеавтомобилей, подобных тем, что использовались Шанхайским добровольческим корпусом."
 KMT_renovate_shanghai_arsenal_rkmt_desc_key: "Наше время в России научило нас важности бронетанковой и механизированной войны. Хотя пройдет много времени, прежде чем мы сможем разработать сложные бронетанковые технологии, как на Западе, Шанхайский арсенал будет обновлен, чтобы облегчить производство бронеавтомобилей, подобных тем, что использовались Шанхайским добровольческим корпусом."

 KMT_create_nez_in_shanghai: "Создать новую экономическую зону в Шанхае"
 KMT_create_nez_in_guangzhou: "Создать новую экономическую зону в Гуанчжоу"
 KMT_create_nez_in_beijing: "Создать новую экономическую зону в Пекине"
 KMT_create_nez_in_hangzhou: "Создать новую экономическую зону в Ханчжоу"
 KMT_create_nez_in_xiamen: "Создать новую экономическую зону в Сямэне"

 KMT_state_capitalism_plan: "Зона новой экономической политики"

 KMT_state_capitalism_tt: "§YСледующие города: Нанкин, Ханчжоу, Сямэнь и Пекин§! получат модификатор §YЗона новой экономической политики§!, который дает\n      $MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!\n $MODIFIER_LOCAL_BUILDING_SLOTS$: §G+2§!\n\n"

 KMT_create_nez_in_shanghai_desc: "[KMT_create_nez_in_shanghai_desc_scripted_loc]"
 KMT_create_nez_in_shanghai_lkmt_desc_key: "И Чэнь Гунбо, и Сун Цзывэнь, два гиганта Национальной реконструкции, разделяют убеждение, что прибрежная промышленная экономика Китая составляет основу новой республики. Таким образом, специально отведенные зоны в прибрежных городах помогут генерировать национальный капитал под бдительным присмотром государства."
 KMT_create_nez_in_shanghai_rkmt_desc_key: "Все фракции в Правом Гоминьдане разделяют убеждение, что прибрежная промышленная экономика Китая составляет основу новой республики. Таким образом, специально отведенные зоны в прибрежных городах помогут генерировать национальный капитал под бдительным присмотром государства."

 KMT_create_nez_in_guangzhou_desc: "[KMT_create_nez_in_shanghai_desc_scripted_loc]"
 KMT_create_nez_in_beijing_desc: "[KMT_create_nez_in_shanghai_desc_scripted_loc]"
 KMT_create_nez_in_hangzhou_desc: "[KMT_create_nez_in_shanghai_desc_scripted_loc]"
 KMT_create_nez_in_xiamen_desc: "[KMT_create_nez_in_shanghai_desc_scripted_loc]"

 KMT_anhui_industrial_plan: "Аньхойский промышленный план"
 KMT_anhui_industrial_plan_desc: "Строительство центрального сталелитейного завода в Мааньшане, возглавляемое Ресурсным комитетом и Министерством промышленности в рамках более масштабного Плана национальной реконструкции, надеется развить производство стали и угля в Аньхое. Несмотря на то, что сталь имеется в изобилии по всей стране, ее производство остается чрезвычайно низким по всему Китаю, а крупнейший сталелитейный завод принадлежит японцам в Аньшане. Поэтому создание национализированного центрального сталелитейного предприятия уменьшит империалистическое влияние в нашей экономике, а также расширит производство стали до его истинного потенциала. Кроме того, нам придется развить местную инфраструктуру в регионе, чтобы обеспечить эффективный способ транспортировки нашего угля."

 KMT_mining_operations_in_five_provinces: "Горнодобывающие операции в пяти провинциях"
 KMT_mining_operations_in_five_provinces_desc: "Хотя богатые и изобильные Пять провинций Восточного Китая долгое время эксплуатировались коррумпированными милитаристами и землевладельцами, которые истощали землю и ресурсы, руководство Партии исправит это и будет стремиться к масштабной модернизации региона. Ресурсный комитет стремится воспользоваться местными ресурсами угля и вольфрама в бывшей Лиге восьми провинций, чтобы индустриализировать китайскую нацию."

 KMT_mine_yaogangxian_mining_area: "Поощрять добычу на месторождениях Яогансянь"
 KMT_mine_yaogangxian_mining_area_desc: "Самым ранним месторождением вольфрама в Хунани было месторождение Сичун, обнаруженное в уезде Таоцзян в 1901 году. С тех пор Национальное правительство планирует и дальше развивать промышленность Хунани, продолжая разработку горнодобывающего района Яогансянь. Это не только улучшит инфраструктуру Хунани, но и обеспечит множество рабочих мест и возможностей для преимущественно аграрной провинции."

 KMT_central_machinery_factory: "Основать Центральный машиностроительный завод"
 KMT_central_machinery_factory_desc: "Хунань остается одной из самых аграрных и сельских провинций на всем юге Китая. Национальное правительство надеется исправить это, создав Центральный машиностроительный завод с помощью Министерства внутренних дел. Этот завод надеется производить технику и гаджеты современного мира, такие как автомобили, паровые турбины и телефоны."

 KMT_xiangtan_steel_work: "Основать сталелитейный завод Сянтань"
 KMT_xiangtan_steel_work_desc: "[KMT_xiangtan_steel_work_scripted_loc]"

 KMT_xiangtan_steel_work_lkmt_desc_key: "Сянтань важен благодаря своей современной промышленности и удобству наземного и водного транспорта. Поскольку тяжелая угольная и металлургическая промышленность ограничена крайним северо-востоком, Ресурсный комитет Национального правительства стремится построить сталелитейный завод в Хунани с помощью французских советников."
 KMT_xiangtan_steel_work_rkmt_desc_key: "Сянтань важен благодаря своей современной промышленности и удобству наземного и водного транспорта. Поскольку тяжелая угольная и металлургическая промышленность ограничена крайним северо-востоком, Ресурсный комитет Национального правительства стремится построить сталелитейный завод в Хунани с помощью российских советников."

 KMT_developing_hunans_industrial_capacity: "Развивать промышленный потенциал Хунани"
 KMT_developing_hunans_industrial_capacity_desc: "Благодаря своему географическому положению, Хунань остается одной из житниц Китая и содержит одну из самых больших концентраций сельского и крестьянского населения Китая. Чтобы сплотить промышленную мощь этой страны, крайне важно, чтобы мы протянули руку и подготовили схему индустриализации в таких городах, как Чанша, чтобы подстегнуть модернизацию."

 KMT_construct_yuehan_railway: "Завершить железную дорогу Юэхань"
 KMT_construct_yuehan_railway_desc: "Строительство железной дороги Гуандун-Ханькоу началось в 1896 году во времена династии Цин, однако завершение строительства железной дороги оставалось труднодостижимой задачей. Большие разрушения были вызваны последовавшими гражданскими войнами по всему Китаю и бесхозяйственностью милитаристов, которые сильно затормозили прогресс. При Министерстве железных дорог Национальное правительство наняло Лин Хунсуня для завершения участка Чжушао."

 KMT_modernise_yellow_river_levees: "Модернизировать дамбы Хуанхэ"
 KMT_modernise_yellow_river_levees_desc: "Древняя Желтая река издавна давала жизнь ханьским народам на протяжении поколений. Проект дамб в нижнем течении Хуанхэ постепенно формировался еще в период Весны и Осени. Со времен династий Мин и Цин Хуанхэ постоянно укрощали, чтобы избежать потенциально катастрофических наводнений, но такие дамбы и водные пути становятся все более и более устаревшими. Поэтому Национальное правительство предпримет усилия по их модернизации, чтобы они соответствовали нашим потребностям XX века."

 KMT_nationalise_beijing_steel: "Национализировать Пекинскую сталь"
 KMT_nationalise_beijing_steel_desc: "Сталелитейные заводы Шицзиншань были совместно созданы владельцами бизнеса и Бэйянским правительством в 1919 году. Завод планировался у подножия горы Шицзиншань и был спроектирован американской компанией, хотя годами его строительство стагнировало из-за постоянных войн. Хотя правительство Чжили в конечном итоге закончило заводы с немецкой помощью, в конечном итоге они были проданы немецкой компании Siemens. С крахом власти Чжили Национальное правительство приступило к национализации и возвращению заводов Шицзиншань под китайский контроль."

 KMT_nationalise_german_mines_zibo: "Национализировать немецкие шахты в Цзыбо"
 KMT_nationalise_german_mines_zibo_desc: "[KMT_nationalise_german_mines_zibo_desc_scripted_loc]"

 KMT_nationalise_german_mines_zibo_lkmt_desc_key: "Регион Цзыбо на полуострове Шаньдун был желанным для западных империалистов из-за изобилия природного угля. Немцы оккупировали регион после договора 1898 года и сохранили контроль над ним как частью Немецкой Восточной Азии. Немцы продолжали эксплуатировать наш народ как дешевую рабочую силу, и у нас есть сильные связи с профсоюзами шахтеров, возглавляемыми сторонником ЛКС Ван Цзиньмэем. Поэтому, чтобы укрепить нашу отечественную промышленность и освободить наш народ от цепей империализма, мы должны стремиться национализировать оккупированные немцами шахты в Цзыбо."
 KMT_nationalise_german_mines_zibo_rkmt_desc_key: "Регион Цзыбо на полуострове Шаньдун был желанным для западных империалистов из-за изобилия природного угля. Немцы оккупировали регион после договора 1898 года и сохранили контроль над ним как частью Немецкой Восточной Азии. Немцы продолжали эксплуатировать наш народ как дешевую рабочую силу, и у нас есть сильные связи с рабочими в профсоюзах шахтеров. Поэтому, чтобы укрепить нашу отечественную промышленность и освободить наш народ от цепей империализма, мы должны стремиться национализировать оккупированные немцами шахты в Цзыбо."

 KMT_complete_the_tongpu_railway: "Завершить железную дорогу Тунпу"
 KMT_complete_the_tongpu_railway_desc: "Строительство железной дороги Тунпу началось в период реформ, инициированных императором Гуансюем. Железная дорога проходит через центральную часть Шаньси, проходя через Тайюань, чтобы соединиться со станцией Хуашань в Шэньси. Милитарист Янь Сишань начал строительство железных дорог, но прогресс застопорился из-за нестабильности Центральных равнин. В результате Министерство железных дорог заказало строительный проект в сотрудничестве с британскими железнодорожными консультантами, чтобы завершить железные дороги Тунпу и облегчить транспортировку через обе горные провинции."

 KMT_revive_jinan_arsenal: "Возродить арсенал Цзинань"
 KMT_revive_jinan_arsenal_desc: "Арсенал Цзинань берет свое начало от Шаньдунского машиностроительного бюро 1875 года, которое производило порох, легкие лекарства и предметы первой необходимости для выпечки. Машиностроительное бюро было расширено в 1894 году для производства легкого оружия с началом японо-китайской войны. При своих бывших полевых командирах арсенал помогал вооружать клику Шаньдун до ее приобретения силами НРА. Министерство военных дел Национального правительства надеется использовать современные мощности машиностроения для производства боеприпасов, гранат и взрывателей для авиабомб."

 KMT_refurbish_taiyuan_arsenal: "Обновить Тайюаньский арсенал"
 KMT_refurbish_taiyuan_arsenal_desc: "Арсенал в Тайюане был построен по приказу его полевого командира Янь Сишаня и оснащен оружием отечественного производства. Арсенал производит не только легкое оружие; реформы Яня позволили арсеналу производить тяжелое вооружение, такое как минометы и артиллерия. Качество арсенала высоко по китайским стандартам, множество копий его винтовок и артиллерии было продано клике Ма на Западе и Новой клике Гуанси на Юге. Министерство военных дел желает использовать его современное оборудование и сборочные линии для производства вооружения для Национально-революционной армии. Кроме того, мы также будем стремиться совместно модернизировать Хуаиньский арсенал в Шэньси, который известен производством минометов и легкой артиллерии."

 KMT_improve_han_river_infrastructure: "Улучшить инфраструктуру реки Хань"
 KMT_improve_han_river_infrastructure_desc: "Река Хань, протянувшаяся более чем на 400 километров в Гуандуне, является второй по величине рекой в Гуандуне (лишь немного уступая Жемчужной реке). Тем не менее, река известна своими частыми наводнениями, и многие из ее текущих инфраструктур либо безнадежно устарели, либо повреждены после многих лет войны. Национальное правительство решило предпринять проект по увеличению занятости в Гуандуне и обеспечению большего контроля над водами посредством амбициозного проекта плотины."

 KMT_wuzhou_vegetable_oil_company: "Обновить компанию растительного масла Учжоу"
 KMT_wuzhou_vegetable_oil_company_desc: "Тунговое масло или «китайское древесное масло» — это высыхающее масло, получаемое прессованием семян ореха тунгового дерева; его самое раннее использование было зафиксировано в трудах Конфуция, датируемых 400 г. до н. э. Оно наиболее важно для отделки и защиты древесины, что может быть использовано для укрепления отечественной промышленности Китая. В результате Национальное правительство выделило землю в Гуанси для переработки тунгового масла, и Учжоу идеально подходит благодаря своему географическому положению и уже созданной промышленной основе."

 KMT_nanning_grain_storage: "Построить зернохранилища в Наньнине"
 KMT_nanning_grain_storage_desc: "Зерно долгое время было центральным товаром в Гуанси, а провинция славилась своими высококачественными урожаями риса. Департамент охраны природы в Комиссии по национальной реконструкции решил сохранить наши ежегодные урожаи, построив зернохранилища в Наньнине, тем самым выделив резервное зерно для нуждающихся или провинций, пострадавших от голода."

 KMT_green_gold_in_qiongya: "Зеленое золото в Цюнъя"
 KMT_green_gold_in_qiongya_desc: "Каучук является ключом к снабжению и развертыванию любой современной армии, и, к счастью, Цюнъя — это сокровищница натурального каучука. Теплый тропический климат острова способствует процветанию производства каучука — фактически, местные жители называют каучук «зеленым золотом». Ресурсный комитет стремится превратить Цюнъя в каучуковую плантацию Китая, которая, несомненно, поможет в отечественном производстве и контролируемой внешней торговле."

 KMT_encourage_oil_extraction_in_yanchang: "Поощрять добычу нефти в Яньчане"
 KMT_encourage_oil_extraction_in_yanchang_desc: "Нефтяные месторождения Яньчан — одно из единственных естественных нефтяных месторождений, которые мы обнаружили в нашей стране. В 1907 году правительство Цин создало первую нефтяную скважину в Китае в Яньчане, а на следующий год был построен нефтеперерабатывающий завод. Ресурсный комитет надеется продолжить добычу нефти в регионе и, таким образом, заказал проект по продолжению добычи нефти на нефтяных месторождениях и потенциальному поиску новых источников нефти в регионе, если текущие месторождения иссякнут."

 KMT_chongqing_electric_steel_mill: "Оживить Чунцинский электросталелитейный завод"
 KMT_chongqing_electric_steel_mill_desc: "Основанный республиканским милитаристом Сюн Кэу в 1919 году, Чунцинский электросталелитейный завод изначально был спроектирован для удовлетворения желаний милитариста и его оружейной промышленности. Однако со временем заводы попали под господство различных других милитаристов, которые терзали Сычуань. Поскольку Национальное правительство стремится восстановить порядок, заводы теперь находятся в руках правительства. Таким образом, их промышленность будет расширена и модернизирована усилиями правительства в надежде, что люди теперь наконец смогут пожинать плоды, а не милитаристы."

 KMT_chongqing_weapon_plant: "Обновить Чунцинский оружейный завод"
 KMT_chongqing_weapon_plant_desc: "Чунцинский завод по ремонту оружия был изначально построен милитаристами Ян Сэнем и Лю Сяном. Хотя милитаристы ввергли провинцию Сычуань в хаос и голод, мы не можем отрицать их вклад в модернизацию завода. Тем не менее, завод все еще нуждается в улучшениях, особенно в отношении нехватки станков. Национальное правительство и Министерство внутренних дел предложили отремонтировать и обновить оружейный завод, чтобы он соответствовал современным стандартам."

 KMT_tap_into_sichuans_natural_reserves: "Использовать природные запасы Сычуани"
 KMT_tap_into_sichuans_natural_reserves_desc: "Простирающиеся на площади более 180 000 км газовые и нефтяные месторождения Сычуани относятся к регионам Сычуань, Юньнань, Гуйчжоу и Хубэй, которые содержат природный газ и нефть. Национальное правительство поручило Ресурсному комитету контролировать и управлять местными учреждениями, чтобы начать добычу и извлечение этих природных запасов для удовлетворения национальных потребностей в нефти и сокращения нашего импорта."

 KMT_bauxite_extraction_in_guizhou: "Добыча бокситов в Гуйчжоу"
 KMT_bauxite_extraction_in_guizhou_desc: "Гуйчжоу является домом для некоторых из крупнейших месторождений бокситов в Китае, и Национальное правительство надеется модернизировать юг, чтобы он соответствовал стандартам добычи бокситов на севере Китая. Ресурсный комитет будет контролировать и управлять местными органами власти в регионе для участия в добыче и извлечении бокситов."

 KMT_expand_tin_production_in_gejiu: "Расширить производство олова в Гэцзю"
 KMT_expand_tin_production_in_gejiu_desc: "Гэцзю славится по всей стране своим великолепным производством олова, наследие которого можно проследить до династии Хань. Переработка и добыча олова начались во времена поздней династии Цин, и оловянная промышленность в Юньнани в настоящее время обеспечивает почти 90% от общего производства олова в Гэцзю. Чтобы централизовать и поддерживать высокие стандарты качества переработки, Министерство финансов и Ресурсный комитет работают вместе с местными компаниями над их слиянием в единую Юньнаньскую оловянную промышленную компанию."

 KMT_refurbish_gongxian_arsenal: "Обновить арсенал Гунсянь"
 KMT_refurbish_gongxian_arsenal_desc: "Арсенал Гунсянь расположен в Хэнани, провинции, известной своими богатыми природными ресурсами и расположением по отношению к тогдашнему центральному правительству в период Бэйян. Арсенал служит оружейным заводом для стрелкового оружия, такого как пистолеты и винтовки, а также более тяжелого вооружения, такого как артиллерия. С тех пор он использовался подлыми милитаристами Чжили, хотя арсенал получил огромную выгоду от немецких инвестиций. Обезопасив Хэнань, мы переоборудуем этот арсенал под нужды Национально-революционной армии."

 KMT_kaifeng_mines: "Национализировать шахты Кайфэна"
 KMT_kaifeng_mines_desc: "Первые современные угольные шахты были спроектированы и принадлежали британским компаниям, которые действовали за счет эксплуатации китайской рабочей силы. После Британской революции эти отрасли остались в Китае, и милитаристы Чжили терпели их присутствие, в то время как угольные шахты Цзяоцзо вносили значительный вклад в добычу угля в стране. Таким образом, долгом Национального правительства в его войне против империализма является национализация таких отраслей и облегчение жестоких условий труда, которые иностранцы навязали нашим рабочим."

 KMT_revitalise_hanyang_industry: "Оживить промышленность Ханьяна"
 KMT_revitalise_hanyang_industry_desc: "Из-за своей близости к городу Ухань промышленность Ханьяна долгое время была относительно развитой по сравнению с остальной промышленной базой Китая. Регион может похвастаться как Ханьянским арсеналом, так и ныне устаревшим Ханьянским металлургическим заводом, который когда-то обеспечивал почти 90% производства стали во всем Китае. Ханьянская промышленность также имеет революционный характер, поскольку именно из ханьянской винтовки был сделан первый выстрел, который зажег Синьхайскую революцию."

 KMT_revive_gansu_machine_works: "Возродить Ганьсуский машиностроительный завод"
 KMT_revive_gansu_machine_works_desc: "Ранее известное как Ганьсуское машиностроительное бюро, бюро, основанное в 1872 году, было первой вестернизированной военной промышленностью на Северо-Западе Китая. Поскольку ситуация на западе в конечном итоге ухудшилась до состояния нестабильности, машиностроительные заводы остались заброшенными, а большая часть их оборудования была вывезена западными милитаристами. Национальное правительство стремится возродить машиностроительные заводы, чтобы способствовать занятости и модернизировать Северо-Запад."

 KMT_qinghai_cultivation_programme: "Инициировать программу культивации Цинхая"
 KMT_qinghai_cultivation_programme_desc: "Долгое время изолированный от революционных настроений Фуцзяни и Гуанчжоу, присутствие Гоминьдана в Цинхае минимально. По мере того, как мы распространяем свое влияние и власть на западные регионы Китая, Министерство внутренних дел настаивает на программе культивации для развития сельского хозяйства Цинхая. Этот план надеется внедрить современные сельскохозяйственные методы и современные удобрения, а также интегрировать партийные структуры и органы Гоминьдана в местные органы власти Цинхая."

 KMT_jinghui_irrigation_canal: "Построить оросительный канал Цзинхуэй"
 KMT_jinghui_irrigation_canal_desc: "Регион Шэньси печально известен своей сухостью и подверженностью засухам, что часто вызывает хаос в жизни его жителей. Инженер-гидротехник и уроженец Шэньси Ли Ичжи симпатизирует Национальному правительству (в частности, его Гавайской клике) и подал прошение в Департамент охраны природы о запуске программы по сохранению воды. После многочисленных обследований региона он предложил построить оросительный канал и плотину для управления и сохранения воды, чтобы улучшить условия жизни тех, кто живет в Шэньси."

 KMT_minsheng_irrigation_canal: "Построить оросительный канал Миньшэн"
 KMT_minsheng_irrigation_canal_desc: "Как писал покойный доктор Сунь, Миньшэн — это принцип повышения благосостояния китайцев, и поэтому Комиссия по национальной реконструкции жаждет начать свой новейший проект в северной провинции Суйюань. Эти регионы не проявляют особой симпатии к нашему делу. Поэтому Департамент водных ресурсов предложил финансирование для начала строительства 75-километрового канала для орошения ферм засушливого региона Суйюань. В честь Трех народных принципов канал будет назван «Миньшэн», демонстрируя нашу решимость помочь народу Китая."

 KMT_complete_the_longhai_railway: "Завершить железную дорогу Лунхай"
 KMT_complete_the_longhai_railway_desc: "Горные перевалы Шэньси часто делают транспортировку сложной и долгой для тех, кому нужно путешествовать через провинцию. Во времена династии Цин началось строительство железной дороги от Лояна до западной провинции Ганьсу. Из-за нестабильности милитаристов прогресс на железной дороге часто застопоривался. В связи с этим Министерство железных дорог Национального правительства заказало новый проект, чтобы наконец завершить железную дорогу. Конечная цель железной дороги — протяженность более 1700 километров, а руководить ею будет железнодорожный инженер Лин Хунсунь."

 KMT_create_the_lanxin_railway: "Создать железную дорогу Ланьсинь" #兰新铁路
 KMT_create_the_lanxin_railway_desc: "Чтобы улучшить связь, снабжение и общее расстояние поездки между Ланьчжоу в Ганьсу и самой дальней границей Синьцзяна, Министерство железных дорог Национального правительства официально одобрило новый строительный проект по созданию железной дороги Ланьчжоу-Синьцзян, соединяющей Ганьсу с коридором Хэси и вплоть до Дихуа — проект, который планируется протяженностью более 1904 км. Вторая линия также будет стремиться соединить Хами с Хотаном, тем самым улучшая связь в самых западных регионах Китая."

 KMT_appropriate_shenyang_arsenal: "Присвоить Шэньянский арсенал"
 KMT_appropriate_shenyang_arsenal_desc: "Шэньянский арсенал давно славится по всему Китаю своим качественным мастерством. Он был основан в 1921 году фэнтяньским милитаристом Чжан Цзолинем и производил пушки, пушки, пули, снаряды, взрывчатку и оборудование. В какой-то момент он стал крупнейшим арсеналом во всем Китае и часто посещался советниками и офицерами японской армии. После того, как контроль националистов над Северо-Востоком был окончательно закреплен, Министерство военных дел решило присвоить Шэньянский арсенал для оснащения Национально-революционной армии."

 KMT_finish_fengman_hydroelectric_dam: "Завершить гидроэлектростанцию Фэнмань"
 KMT_finish_fengman_hydroelectric_dam_desc: "Во время правления Фэнтяньской клики их Клика коммуникаций начала строительство гидроэлектростанции для выработки энергии для города Гирин (Цзилинь) с помощью японских советников. С нашей славной победой над Фэнтяньской кликой и возвращением Маньчжурии китайскому народу у нас теперь есть недостроенная гидроэлектростанция, которая, несомненно, может принести пользу жителям Гирина. Поэтому Министерство внутренних дел заказало проект по увеличению занятости и завершению строительства плотины Фэнмань."

 KMT_nationalising_manchurian_iron_industry: "Национализировать железную промышленность Маньчжурии"
 KMT_nationalising_manchurian_iron_industry_desc: "Железные рудники Аньшань и Угольно-железоделательная компания озера Бэньси когда-то находились в совместной собственности Фэнтяньской клики и японцев, ужасное напоминание о всепроникающем влиянии Японии через Мантэцу на наши земли. Из-за преобладания угля в регионе компания поставляла Японии дешевую сталь за счет эксплуатации китайской рабочей силы. На протяжении всей их оккупации с китайскими шахтерами компании обращались жестоко, и теперь у нас есть возможность освободить их. Теперь, когда наш контроль над Северо-Востоком надежно закреплен, у нас есть возможность полностью национализировать и владеть железными рудниками и Угольно-железоделательной компанией озера Бэньси, чтобы их ресурсы приносили пользу исключительно китайскому народу."

 KMT_add_research_slot_decision: "Усилить образовательные усилия"
 KMT_add_research_slot_decision_desc: "Несмотря на все наши усилия по продвижению национальной грамотности, наши исследовательские возможности и общенациональное образование все еще значительно отстают от наших конкурентов. Давайте поощрять быстрое развитие интеллектуальных и образовательных реформ, чтобы мы могли догнать остальной мир."

 RKT_is_interacting_with_zeal_flag: "Взаимодействует с другим решением §cРеволюционного рвения§!."

