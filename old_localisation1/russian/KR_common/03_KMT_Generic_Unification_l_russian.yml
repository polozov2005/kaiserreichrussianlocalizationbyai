### Other Stuff

 RKT_wang_jingwei_advisor_desc: "§YРодился:§! §g4 мая 1883 года в Саньшуй, провинция Гуандун, Великая Цин§!\n§YПринадлежность:§! §gАТР§!\n§YБиография:§! §L В юности Ван Цзинвэй был очарован жизнью Сайго Такамори и Кацу Кайсю, видя в них образцовых людей, которые превратили Японию из захолустья в промышленную нацию. Как может быть, что Китай так застаивается, удивлялся он, обращаясь к трудам Лян Цичао и Сунь Ятсена. В последнем он увидел любимого наставника, а в Тунмэнхое Сунь Ятсена он приобрел национальную известность, когда попытался убить регента Цзайфэна (отца императора Пу И), несмотря на неудачу и тюремное заключение.\n\nКогда разразилась Синьхайская революция, Ван был освобожден, но отказался принести клятву верности разочарованному Суню, который оказался отстранен от национальной политики и милитаристов. Вместо этого он отправился во Францию, но вернулся вскоре после триумфального возвращения Суня в Гуанчжоу в 1921 году, чтобы участвовать в недавно созданном революционном правительстве Гоминьдана. Ван присутствовал при реорганизации партии в 1924 году и постепенно начал представлять растущее левое крыло партии, хотя вряд ли считал себя социалистическим идеологом. Когда Сунь умер в 1925 году, Ван присутствовал у его смертного одра и помог написать его завещание.\n\nТриумвират Ху Ханьминя, Чан Кайши и Ван Цзинвэя быстро стал одной из самых спорных и ожесточенных борьбы за власть в Гоминьдане. Ван вышел победителем после изгнания Ху Ханьминя в Москву и убийства Чан Кайши после провала Северного похода, но крах экспедиции заставил его и его политических союзников бежать в Европу в надежде однажды вернуться, чтобы осуществить революцию Суня.\n\nВ изгнании он долго укреплял свои позиции лидера левого Центрального комитета Гоминьдана в соперничестве с правым комитетом Ху Ханьминя и при поддержке Интернационала и повстанческого движения в Минь-Гане надеялся претендовать на мантию председателя Гоминьдана.\n\nОднако судьба распорядилась иначе, и с крахом собственного движения Ван использовал свою способность к политическому выживанию, чтобы превратиться из представителя социализма в простого левого националиста, надеясь найти опору в Гоминьдане своего соперника.§!"

 CHI_song_qingling_advisor_desc: "§YРодилась:§! 27 января 1893 года в Шанхае, Шанхайский международный сеттльмент\n§YПринадлежность:§! §gВКД§!\n§YБиография:§! §L Бунтарка с юности, Сун Цинлин открыто бросила вызов своим родителям, выступавшим против ее брака с покойным и почтенным доктором Сунь Ятсеном, зайдя так далеко, что сбежала из дома, чтобы тайно выйти замуж за революционного государственного деятеля. Получившая западное образование, свободно владеющая английским и китайским, грациозная, элегантная и милосердная — она продемонстрировала свою предельную преданность революционному делу, когда велела Суню бежать перед бомбардировкой милитариста Чэнь Цзюнмина, несмотря на то, что, по сообщениям, у нее случился выкидыш и она больше никогда не сможет иметь детей.\n\nВерная его стороне, она была с Сунем, когда он согласился работать с Третьим Интернационалом, и присутствовала у его смертного одра, когда вслух зачитывалось его последнее завещание. А затем последовал Северный поход, в котором она участвовала, неприкасаемая и неоспоримая никем в Гоминьдане из-за ее статуса вдовы великого доктора Суня. Но когда поход провалился, она отказалась рассматривать это как провал революции. Вместо этого она и другие левые генералы Гоминьдана бежали в повстанческую зону Минь-Гань, где она проводила время, путешествуя между повстанческой зоной и Шанхаем, чтобы обеспечить помощь и поддержку партизанской войне против презренных милитаристов Чжили.\n\nВместе с ней служил не кто иной, как ее близкий друг — Дэн Яньда. Эти двое были вместе со счастливых дней Революционного правительства Гуанчжоу и оказались едины, брат и сестра в революционной борьбе. Вместе они сформировали Временный комитет действий с верой в то, что именно им предстоит полностью реализовать мечту покойного доктора Суня.\n\nИ все же не им суждено было исполнить волю ее покойного мужа. Несмотря на ее продолжающееся сопротивление таким людям, как Гоминьдан Ху Ханьминя, мольбы таких людей, как Чэнь Южэнь и ее собственного брата Сун Цзывэня, убедили Сун, по крайней мере неохотно, оказать поддержку новому правительству, и Дэн Яньда последовал ее примеру.§!"

 KMT_lead_the_liberation_of_asia: "Возглавить освобождение Азии"
 KMT_lead_the_liberation_of_asia_desc: "Это просто естественный прогресс, что Китайская националистическая революция охватит более масштабную революцию для угнетенных и обездоленных народов Азии против бича империализма. За последние несколько лет мы показали миру, что наши методы приносят свободу и освобождение — что Три принципа освободят всех, кто прислушается к их словам."

 KMT_demand_concessions_return: "Требовать возвращения концессий"
 KMT_demand_concessions_return_desc: "Как мы скорбели по поводу унижения, когда продавали наших собратьев-китайцев империалистам. Мы не забываем наших шанхайских братьев и сестер, которые годами вели дух революции против реакционных сил. Однако мы возглавляем Новый Китай, Китай, который наконец может противостоять унизительной системе, которой является мандат Посольского квартала. Мы освободим наших соотечественников, миром или силой."

 KMT_consolidate_the_frontiers: "Укрепить границы"
 KMT_consolidate_the_frontiers_desc: "Приоритетом является установление того факта, что пограничные регионы Тибета, Монголии и Синьцзяна по своей сути являются частью великой китайской нации. Слишком долго наши собратья китайские «Миньцзу» (народы) лежали под гнетом империалистов, но жаждали нашего руководства в Национальной революции. Как учил нас покойный доктор Сунь: когда мы объединим и направим их, наша страна и цивилизация снова станут великими."

 KMT_beyond_macmahon_line: "За линией Мак-Магона"
 KMT_beyond_macmahon_line_desc: "Линия Мак-Магона была несправедливо проведена британцами, насильственно передав регион Таванг отколовшемуся государству Тибет. Это национальное оскорбление, что это решение было принято без нашего одобрения, унижение нашей способности вмешиваться в наши собственные национальные дела, так как дела Тибета — это дела Китая. Когда наша нация снова сильна, мы будем продвигаться вперед и восстановим честь территориальной целостности Китая."

 KMT_secure_the_northern_frontier: "Обезопасить северную границу"
 KMT_secure_the_northern_frontier_desc: "Сочетание близости России и реакционных режимов всегда напоминало нам, что угроза империализма исходит не только с Запада, но и с Севера. Жадность России также нацелена на наши претензии на Монголию, и не будем забывать, что Внешняя Маньчжурия когда-то была частью великого китайского государства. Если мы хотим защитить наши границы, крайне важно, чтобы мы нанесли удар с элементом внезапности и большой силой по Русскому Медведю."

 KMT_liberate_southeast_asia: "Освободить Юго-Восточную Азию"
 KMT_liberate_southeast_asia_desc: "Наньхай (Южное море) долгое время был сферой культурного, социального, экономического и политического влияния Китая со времен Великой Мин. В Юго-Восточной Азии давно живут как товарищи, так и империалисты, а также наши собственные соотечественники-эмигранты, которые жаждали и поддерживали наше дело освобождения. Теперь мы наконец-то в состоянии отплатить им и использовать силу Китая, чтобы объединить нас в солидарности."

 KMT_we_will_liberate_taiwan: "Мы освободим Тайвань!"
 KMT_we_will_liberate_taiwan_desc: "Наша страна не сталкивалась с большей трагедией, чем продажа наших собратьев-китайцев японским империалистам, когда мы сдали остров Тайвань. Теперь, когда Китай снова силен, наш национальный долг как китайского народа — объединиться с нашими тайваньскими соотечественниками. Наши тайваньские братья и сестры жаждут освобождения, и мы освободим их от цепей, объединив нашу страну еще раз."

 KMT_two_suns_in_sky: "Два солнца в небе"
 KMT_two_suns_in_sky_desc: "Пожалуй, нет более варварской, империалистической нации, чем Япония. Наш народ перенес не что иное, как вопиющую несправедливость от рук японцев, которые всегда пытались воспользоваться цивилизацией Китая. Многие наши соотечественники до сих пор помнят опустошение, которое они причинили в Войне сопротивления. Теперь, когда наша нация возродилась, пришло время не дать им воспользоваться нами снова."

 KMT_strike_german_east_asia: "Ударить по Немецкой Восточной Азии"
 KMT_strike_german_east_asia_desc: "Реакционная и капиталистическая нация [GER.GetNameDef] не стремилась ни к чему иному, кроме как эксплуатировать китайский народ и нацию. В конце концов, именно в разгар Северного похода удар немцев нам в тыл привел к краху спасения нашей нации. Пока их империалистический режим существует в Азии, азиатский народ не может быть свободным. Наш долг — спасти их."

 KMT_secure_the_southern_seas: "Обезопасить южные моря"
 KMT_secure_the_southern_seas_desc: "Южно-Китайское море и за его пределами долгое время находились под морским контролем Китая, и именно под влиянием Китая эти регионы стали процветающими нациями. Пока существует реакционное государство [AST.GetNameDef], мира не будет, и ресурсы этих морей не могут быть разделены с Китаем и его союзниками. Мы должны взять инициативу в свои руки и обезопасить моря сами."

 KMT_ensure_pacific_security: "Обеспечить безопасность в Тихом океане"
 KMT_ensure_pacific_security_desc: "Некоторые в нашем правительстве сами родом с Гавайев, так как Гоминьдан может похвастаться замечательным присутствием в китайской общине острова. Они тоже стали свидетелями варварства империализма из первых рук, так как Гавайи были насильственно аннексированы Соединенными Штатами Америки. Китай должен гарантировать, что Тихий океан свободен от империалистических махинаций американцев, японцев и всех остальных, кто стремится контролировать его, и стать хранителем великого моря."

 KMT_imperialism_crushed_forevermore: "Империализм раздавлен навсегда"
 KMT_imperialism_crushed_forevermore_desc: "Наконец-то это свершилось. С естественной, славной силой нашей страны мы успешно изгнали каждый последний оплот иностранного империализма в Азии и на Тихом океане. Азиатские народы теперь могут наконец жить в гармонии и единстве, в мире и сотрудничестве — без вмешательства Запада или японцев. Больше никогда и ни за что иностранный империализм не будет угрожать китайскому народу."

#The Internationale of the East Focus Tree
 KMT_chinese_expeditionary_force: "Китайский экспедиционный корпус"
 KMT_chinese_expeditionary_force_desc: "Мы провели много времени с нашими дорогими европейскими товарищами и никогда не забудем их щедрость, когда они позволили Центральному комитету жить в изгнании в своих свободных синдикалистских странах. Теперь, в их час нужды, поистине уместно, чтобы мы отправили людей и ресурсы на помощь нашим дорогим братьям и сестрам-социалистам."

 KMT_extend_the_mmic: "[KMT_extend_mmic_loc]"
 KMT_extend_the_mmic_desc: "[KMT_extend_mmic_desc_loc]"
 KMT_extend_the_mmic_alive_desc: "Военная миссия Интернационала в Китае имела решающее значение для успеха Китайской национальной революции в течение последних нескольких лет. Несмотря на успех объединения и победу в Войне сопротивления, их помощь, безусловно, все еще будет оценена по достоинству в содействии развитию наших вооруженных сил. Давайте попробуем продлить их пребывание, чтобы продолжить модернизацию нашей армии."
 KMT_extend_the_mmic_dead_desc: "С крахом Третьего Интернационала, по иронии судьбы, тысячи беженцев из бывших столиц Парижа и Лондона теперь достигли берегов Китая в попытке сохранить дух революции живым. С реакционными силами, как никогда присутствующими и доминирующими в мире, мы должны объединить всех социалистов со всего мира в совместных взаимных усилиях по уничтожению капитализма раз и навсегда."
 KMT_extend_mmic_int_alive: "Продлить пребывание ВМИК"
 KMT_extend_mmic_int_dead: "Набрать изгнанников из Интернационала"

 KMT_reach_out_to_the_overseas_community: "Связаться с зарубежными сообществами"
 KMT_reach_out_to_the_overseas_community_desc: "Даже в Центральном комитете некоторые члены, такие как Чэнь Бицзюнь, происходят из общин эмигрантов в более широкой китайской диаспоре. Давайте используем сети и связи бывшей Комиссии по делам зарубежных китайцев, чтобы расширить влияние таких групп, как АТР, в более широком международном китайском сообществе, чтобы заручиться дальнейшей поддержкой нашего нынешнего режима."

 KMT_encourage_foreign_investment: "Поощрять иностранные инвестиции"
 KMT_encourage_foreign_investment_desc: "Китай — большая и обширная страна с сокровищницей национальных ресурсов и материалов, необходимых в современном мире. Чтобы генерировать капитал и помогать развивать нашу экономику, давайте поощрять иностранные компании переносить свой бизнес в Китай и инвестировать здесь, чтобы мы могли развивать нашу национальную экономику, одновременно налаживая отношения со странами по всему миру. Вместе мы можем достичь гораздо большего, если будем руководствоваться идеей мирного сотрудничества."

 KMT_the_dongfeng_project: "Проект «Дунфэн»"
 KMT_the_dongfeng_project_desc: "Веками Китай значительно отставал от остального мира в плане технологического развития, и только самые амбициозные ученые и инженеры в Китае могли мечтать об адекватной программе баллистических ракет. Вдохновленные проектом «Дамокл» Интернационала, мы будем стремиться воспроизвести и повторить их успех с нашим собственным проектом «Дунфэн» (Восточный ветер), чтобы наша национальная оборона была готова к будущему."

#The Asia-Pacific Friendship Association Focus Tree
 KMT_coordinate_the_afro_asian_conference: "Координировать Афро-азиатскую конференцию"
 KMT_coordinate_the_afro_asian_conference_desc: "Народы Африки и Азии долгое время угнетались презренным Западом. Успешная революция Китая против империализма вдохновляет их, и ресурсы Китая могут быть использованы только для того, чтобы помочь им расти и восстанавливаться после травмы колониализма. Мы созовем конференцию свободных стран развивающегося мира, чтобы совместно обсудить их будущее."

 KMT_joint_pan_asian_military_cooperation: "Совместное паназиатское военное сотрудничество"
 KMT_joint_pan_asian_military_cooperation_desc: "Офицеры-ветераны и генералы Национально-революционной армии, возможно, лучшие во всей Азии, благодаря их обширному опыту борьбы в поддержку революции. Давайте организуем совместные программы военной подготовки и направим наших военных, военно-морских и воздушных советников нашим собратьям-азиатам, чтобы они могли модернизировать и укрепить свои вооруженные силы."

 KMT_aid_the_developing_world: "Помощь развивающемуся миру"
 KMT_aid_the_developing_world_desc: "Восстановленная экономическая мощь Китая и его богатые природные ресурсы должны быть использованы для помощи и служения нашим революционным товарищам по всему развивающемуся миру. Эти люди долго страдали и голодали под сапогом империализма, и Китай должен взять на себя лидерство в помощи им развиваться, восстанавливаться и исцеляться от веков унижений, обрушенных на них."

 KMT_five_principles_of_peaceful_coexistence: "Пять принципов мирного сосуществования"
 KMT_five_principles_of_peaceful_coexistence_desc: "Многие наши товарищи из Гоминьдана признают собственную освободительную борьбу индийских народов против империалистической нации Британии. Лучше работать вместе, чем сражаться и ослаблять себя перед империалистами. Мы встретимся с индийским правительством, чтобы решить вопрос Аксайчина и Таванга и сражаться вместе как две молодые, революционные нации."

 KMT_coordinate_the_afro_asian_conference_tt: "§YМы проведем Афро-азиатскую конференцию, чтобы заручиться поддержкой инвестиционных проектов в развивающемся мире. Ведущие социалистические страны, решившие принять участие в этой инициативе, получат решения о предоставлении инвестиций постколониальным социалистическим странам в Восточной Азии, на Индийском субконтиненте, Ближнем Востоке, в Океании и Африке.§!"

 KMT_aid_the_developing_world_trigger_tt: "§YЧтобы взять этот фокус, мы должны инвестировать как минимум в 10 различных стран, доказав нашу приверженность руководству антиколониальным делом.§!"

 KMT_aid_the_developing_world_effect_tt: "§GДоказав нашу преданность улучшению жизни постколониальных государств, дальнейшие инвестиции будут стоить меньше политической власти.§!"

 KMT_five_principles_of_peaceful_coexistence_tt: "§RЛюбые оставшиеся претензии Китая на спорные территории [858.GetName] и [897.GetName] будут отозваны, что урегулирует вопросы с нашей стороны.§!\n§GЭто проложит нам путь для приглашения независимых социалистических индийских государств в наш альянс.§!"

#Asian Peoples' Anti-Imperialism League Focus Tree
 KMT_never_another_humiliation: "Никакого больше унижения"
 KMT_never_another_humiliation_desc: "Это мир выживания. Великие державы ищут только возможность поиграть мускулами и расширить свое Миньцзу (нацию) по всему земному шару, поэтому Китай должен подражать этой модели, если хочет выжить. Ибо мы видели, что иностранные империалисты сделали с их страной, и мы знаем, что их жадность снова приведет их в нашу страну — разделить и расколоть нашу великую нацию и унизить нашу расу. Давайте увеличим финансирование нашей армии и флота, чтобы подкрепить наши угрозы силой."

 KMT_summer_border_service_corps: "Летний пограничный корпус обслуживания"
 KMT_summer_border_service_corps_desc: "Наш долг — воспитывать национальное самосознание, в том числе на бедных и часто непокорных границах Китая. Летом мы направим молодых добровольцев помогать строить школы, дороги и санитарные сооружения, а также обучать их рабочим навыкам, современной культуре и тщательно тренировать их для защиты от вторжения. Таким образом, мы повысим качество их жизни и навсегда привяжем эти пограничные государства к китайской нации."

 KMT_fanatical_militarism: "Фанатичный милитаризм"
 KMT_fanatical_militarism_desc: "Личность — это всего лишь винтик в большем колесе национальной борьбы. Китайский мужчина и женщина должны стремиться стать новой личностью, то есть новой личностью, которая подчиняет свою личную волю и благополучие преданности армии. Смерть в бою будет рассматриваться как героическое мученичество, и мы будем поощрять всех граждан нашей страны готовиться отдать свои жизни за национальную оборону страны."

 KMT_entrenching_isolation: "Укрепление изоляции"
 KMT_entrenching_isolation_desc: "Мы не испытали ничего, кроме унижения от нашего взаимодействия с иностранцами на протяжении многих лет, и ясно, что мы и дальше ничего не получим от нашего взаимодействия с ними. Роль Китая с эпохи Великой Мин заключалась в поддержании мира, процветания и безопасности во всей Азии, и вполне справедливо, что мы возвращаемся на нашу позицию оплота и маяка культурного превосходства в регионе. Поэтому давайте стремиться сосредоточиться на том, что действительно должно быть только китайскими делами."

 KMT_repudiate_the_catastrophe: "Отвергнуть катастрофу 1927 года"
 KMT_repudiate_the_catastrophe_desc: "Каждый китаец должен помнить 1927 год как год, когда немецкие империалисты приплыли и уничтожили Национальную революцию, возведя на трон империалистического ханьцзяня (предателя) Пу И еще раз и погрузив нашу нацию в дальнейший милитаризм. Теперь, когда сила Китая вернулась, а ее мощь неоспорима — действительно пришло время для нас отвергнуть катастрофу 1927 года. Наконец-то Германия узнает, каково это — потерять все."

 KMT_building_infrastructure_in_northwest_tt: "Пограничные регионы будут развиваться для поддержки будущих военных операций!"

 KMT_repudiate_the_catastrophe_tt: "В нашем славном крестовом походе по возрождению величайших границ Китая мы сможем §Rпретендовать§! на территории во Внешней Маньчжурии, на Сахалине, Курильских островах, в Сингапуре и Бутане."

# The People's Internationale
 KMT_revolutionary_diplomacy: "Революционная дипломатия"
 KMT_revolutionary_diplomacy_desc: "Только Китай и китайский народ способны осуществить революцию в Восточной Азии. Особенное положение Китая и его статус культурного и политического маяка в регионе наряду с его собственной успешной революцией — вот причины, по которым Китай должен встать на новый дипломатический курс. Это направление революционной дипломатии, которое будет стремиться к тому, чтобы мы работали с собратьями-азиатами и работали над большим социалистическим паназиатизмом."

 KMT_establish_peoples_livelihood_countries: "Создать страны народного благосостояния"
 KMT_establish_peoples_livelihood_countries_desc: "Китай является самым важным рынком на Востоке, поэтому его ресурсы были так желанны в эпоху империализма. С обретением национальной независимости долг Китая — помочь другим колониальным нациям, стремящимся к экономической свободе, создать страны «Народного благосостояния», чтобы они не развивались ни в синдикалистские нации, ни в капиталистические нации, а работали с Китаем над установлением миньшэн в своих собственных странах."

 KMT_uniting_anticolonial_minds: "Объединение антиколониальных умов"
 KMT_uniting_anticolonial_minds_desc: "Так много людей по всему азиатскому континенту и Тихому океану взывают о свободе, их мечты подавлены гнетом империализма и его головорезов. Их труды подвергаются цензуре, а мысли — в тюрьме, они чахнут в изгнании или в пыльных классах. Если бы мы собрали их всех вместе под путеводным светом освобождения, эти светлые умы могли бы осветить новое будущее для всех народов, больше не обязанных цепям умирающих империй."

 KMT_the_inevitable_demise_of_capitalism: "Неизбежный крах капитализма"
 KMT_the_inevitable_demise_of_capitalism_desc: "Нет большего зла, чем Германская империя. Долгое время немецкое государство угнетало народы Восточной Европы, посмотрите, как они жаждут свободы и независимости от презренного института Миттельевропы. Мы не забыли участие Германии в Северном походе и их навязывание капиталистического милитаризма в нашей стране. Теперь, когда сила Китая возродилась, а наша мощь несомненна, пришло время уничтожить корень всего капитализма."

# New Asia Alliance
 KMT_promoting_pan_asian_solidarity: "Продвижение паназиатской солидарности"
 KMT_promoting_pan_asian_solidarity_desc: "Наш долг — объединить все свободные азиатские народы в их стремлении покончить с европейским империализмом. В отличие от японцев, которые построили свой паназиатизм на низком грабеже и «беспросветной расистской резне» западных империалистов, китайский паназиатизм будет построен на «Ван Дао» — благожелательной заботе о слабых и уязвимых. Сначала мы построим себя, а затем используем нашу силу, чтобы поднять наших «младших братьев» в Азии."

 KMT_build_a_first_rate_army: "Построить первоклассную армию"
 KMT_build_a_first_rate_army_desc: "Возможность перевооружения и экспансионизма Японии вызывает большую озабоченность. Чтобы предотвратить любую дальнейшую агрессию со стороны Японии или других держав, мы должны построить сильную и мощную армию, которая будет превосходить не только по численности, но и по качеству, подготовке и духу. Это будет сделано в течение следующих пяти лет, и если все будет сделано правильно, мы станем великой державой, даже если наши военно-воздушные силы и флот никогда не превзойдут японские, российские или немецкие."

 KMT_post_colonial_cultural_exchange: "Постколониальный культурный обмен"
 KMT_post_colonial_cultural_exchange_desc: "Колониализм не только грабит богатства наций, но и их идентичность. В отличие от марксистов и их интернационализма, Общество Новой Азии и его преемники работали над тем, чтобы отвергнуть мрачный материализм социализма и капитализма в пользу объединения азиатских умов и обмена их культурами, чтобы, когда их нации будут освобождены, у них было чего ждать, кроме как быть холодно принесенными в жертву в глобальной революции Парижа."

 KMT_balance_the_great_powers: "Балансировать великие державы"
 KMT_balance_the_great_powers_desc: "Прагматизм необходим в этом новом мире. Союзники, которые были у нас вчера, могут стать нашими врагами завтра. И точно так же заклятый враг вчерашнего дня может быть ситуативным союзником прямо сейчас. Великие державы по очереди разоряли Континент и с готовностью работали друг с другом для этого. Поэтому мы должны быть готовы объединиться и сдерживать иностранную экспансию и другие угрозы региональному миру."

# Events
 china_events.800.t: "Спасение страны через искусство"
 china_events.800.d: "Верно, что пропагандистские каналы Партии в основном возглавляются революционными идеологами, партийными аппаратчиками или иным образом офицерами спецслужб, однако одним из самых поразительно любопытных случаев участия интеллектуалов и художников в революционной пропаганде Гоминьдана должен быть случай Лян Динмина. Родился в Шанхае в 1898 году, поступил в Наньянскую школу геодезии и картографии в 1915 году, изучая методы перспективы на курсах и живопись в Шанхайской академии изящных искусств. Продавая портреты в Сямэне, он занял второе место на конкурсе плакатов-календарей местной компании, а затем поступил в рекламный отдел Шанхайской англо-американской табачной компании. Когда его старший брат Лян Дичжун отправился во Францию изучать курсы искусства, он присылал альбомы с картинами обратно в Китай, позволяя своим трем младшим братьям, включая Динмина, учиться и учиться по ним.\n\nУволившись с работы в 1925 году, Лян отправился в Гуандун, чтобы начать свою революционную карьеру, став главным редактором «Революционного иллюстрированного журнала» в 1926 году. В том же году он открыл художественную студию города Суйши в Дашитоу, закончил пропитанную кровью картину Шацзи и начал документировать борьбу революционного солдата через масштабные военные картины. С 1926 года он служил подполковником, начальником художественного отдела Политического управления Генерального штаба НРА и 8-й походной армии, наряду с Главным управлением политической войны.\n\nПутешествуя в Россию, Бельгию, Германию и Австрию по приказу Центрального исполнительного комитета в Москве, Лян изучал искусство и вернулся в 1930 году, чтобы создать Мемориальный зал НРА в Гуйчжоу, наряду со студией исторической живописи. В 1934 году он стал политическим инструктором Департамента политической подготовки Гуйчжоу, а в 1937 году стал деканом Академии изящных искусств. С объединением нации под знаменем Правого Гоминьдана многие работы Ляна оказались в центре внимания, отмечая их роль в повышении морального духа простых людей и солдат."
 china_events.800.a: "Современный маэстро!"

 china_events.801.t: "Одноглазый дракон"
 china_events.801.d: "С окончательным возобновлением Национальной революции после десятилетия подавления реакционной кликой Чжили, сердце Сычуани, Чунцин, было освобождено силами Белого Солнца. В эту эпоху потрясений из Сычуани вышло много героев. Чжу Дэ, великий стратег Военной академии Куньмина, который сражался с тиранической монархией Хунсянь Бэйян, и загадочный Дэн Сяопин, великий революционер, разжигающий пламя на Северо-Западе Китая, все родом из провинции Шу.\n\nОднако Сычуань может похвастаться еще одним революционным героем — Лю Бочэном. Рожденный в крестьянской семье недалеко от Чунцина, Лю присоединился к революционной борьбе против Юань Шикая. В последующие годы Лю победил многочисленных врагов, включая тогдашнего офицера-милитариста Чжу Дэ во время одной из многих кампаний Юньнани в Сычуани.\n\nИменно во время одной из этих войн Лю, к сожалению, потерял правый глаз, но получил прозвище «Одноглазый дракон», свидетельство его воинских способностей и железной решимости. Лю проявил большую симпатию к делу националистов во время Северного похода, но, к несчастью для него и революции, Чжили смогли не только отбить Национальную революцию, но и сам Гуанчжоу погрузился в хаос.\n\nОтрезанный от революции, Лю продолжал затяжную борьбу против всех оппортунистических милитаристов Сычуани, возглавляя небольшую группу революционеров в борьбе за освобождение крестьян. Теперь, когда Сычуань находится под властью Гоминьдана, Лю вышел из укрытия и предложил свои услуги партии. Хотя он явно связан с левым флангом Гоминьдана, Лю вряд ли попытается вовлечь себя в более крупные внутрипартийные фракционные споры, хотя он может ворчать из-за микроменеджмента военных дел со стороны ЦИК."
 china_events.801.a: "Наша Революция приветствует таких героев, как он!"
 china_events.801.b: "Известный смутьян, мы не можем терпеть его подрывное отношение."

 china_events.802.t: "Горящая древесина в Новой Сычуани"
 china_events.802.d: "С Национальной революцией, которой героические действия хунты Гуйчжоу дали новую жизнь, силы Гоминьдана торжествуют на улицах Чэнду, а бич отвратительной клики Чжили изгнан после десятилетия эксплуатации и ростовщичества. Сычуань, долгое время бывшая бьющимся сердцем нашей Национальной революции, наконец-то узнает мир и процветание под руководством Партии на пути к великому будущему. Лю Чао знает лучше любого другого сына Сычуани о крови, пролитой ради обеспечения Свободной Сычуани.\n\nВетеран революции, работавший с Чэнь Цимэем, Ли Шицзэном и Ван Цзинвэем во время Синьхайской революции, Лю Чао боролся против посягательств Бэйяна со времен Второй революции. Храбро сражался в Войне в защиту республики против монархических маний величия Юань Шикая вместе с Сюн Кэу. Когда старый товарищ Лю Сюн оказался регионалистом-оппортунистом с симпатиями к федералистам, Лю взял на себя задачу обеспечить Сычуань для Сунь Ятсена и Национальной революции, но, к сожалению, не смог сломить реакционеров Шу и бежал к Суню.\n\nЛю вернулся в Сычуань во время Северного похода, чтобы попытаться свергнуть Ян Сэня, и храбро оставался там, даже когда паразиты Центрального исполнительного комитета Ван Цзинвэя бежали во Францию. Будучи преданным сопротивлению Яну в течение последнего десятилетия, Лю упрямо оставался оплотом против угнетения милитаристов. Теперь, когда Сычуань находится в руках Гоминьдана, Лю Чао вышел из укрытия и предложил свои услуги партии. Хотя он очень близок к правому флангу Гоминьдана, фракционные симпатии Лю за его пределами остаются туманными, хотя ходят слухи, что он контактировал с Ли Цзунжэнем с самых ранних дней изгнания НРА в хунте Гуйчжоу."
 china_events.802.a: "Личное одобрение Гофу сдвигает горы!"
 china_events.802.b: "У Ли достаточно друзей. Спасибо, следующий."