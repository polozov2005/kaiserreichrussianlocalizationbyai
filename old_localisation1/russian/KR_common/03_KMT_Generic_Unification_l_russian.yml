 RKT_low_zeal_mechanic_warning_tt: "§RВ Гоминьдане растет Революционный реализм, олицетворяющий националистический фанатизм, революционную беспощадность и армейское товарищество. Это идет на пользу прежде всего военному крылу партии, хотя даже военным фракциям требуется определенное рвение для поддержания импульса революции. Однако будьте осторожны: чем больше он растет, тем труднее его остановить; если он вырастет слишком сильно, мы станем неотличимы от милитаристов.§!"

 RKT_high_zeal_mechanic_warning_tt: "§GВ Гоминьдане растет Революционный идеализм, олицетворяющий националистический энтузиазм, революционный дух и партийное товарищество. Это идет на пользу прежде всего гражданскому крылу партии, хотя все фракции ожидают определенного рвения для поддержания импульса партии. Однако будьте осторожны: чем больше он растет, тем труднее его контролировать, особенно когда низы начинают сопротивляться партийной иерархии.§!"

