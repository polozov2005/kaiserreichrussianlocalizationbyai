#Ideas
 KR_RKMT_popular_support_loc: "Поскольку мы не являемся Центральным комитетом Гоминьдана, который бежал за границу и добился международного признания, люди мира и Китая не признают нас законным Гоминьданом. Мы должны усердно работать, чтобы укрепить наш национальный имидж и усилить нашу легитимность как истинных наследников революции доктора Суня."
