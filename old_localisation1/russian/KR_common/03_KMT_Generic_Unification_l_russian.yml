 KR_minsheng_partnership_name_leader: "Лидер §H$KMT_minsheng_partnership_full_name$§!"
 KR_minsheng_partnership_name: "Участник §H$KMT_minsheng_partnership_full_name$§!"

 KR_minsheng_partnership_desc_CHI: "Судьба Китайской национальной революции такова, что Китай как страна, проникнутая великими националистическими чувствами, находится в лучшем положении, чем любая другая нация на Востоке, для борьбы с империализмом. Экономическая ситуация и история угнетенных народов Востока схожи с таковыми в Китае. Как и Китай, они не должны развиваться в капиталистические или чисто синдикалистские системы — скорее, их целью должно быть подражание китайской модели и создание «Стран народного благосостояния (Миньшэн)» через §H$KMT_minsheng_partnership_full_name$§!.\n\nПо этим причинам успех Китайской революции обязывает Китай открыть новую эру для народов Востока и вдохновить их на формирование прочного союза против империализма. Как штаб-квартира антиимпериалистического движения, Китай должен стремиться объединиться с народами востока для создания великого восточноазиатского расового и экономического сообщества. Следовательно, по мере того как Китай начинает восстанавливать свою гегемонию над Азиатско-Тихоокеанским регионом, он стал центром нового экономического порядка на Востоке и получил от этого значительные выгоды."

 KR_minsheng_partnership_desc: "Судьба Китайской национальной революции такова, что Китай как страна, проникнутая великими националистическими чувствами, находится в лучшем положении, чем любая другая нация на Востоке, для борьбы с империализмом. Экономическая ситуация и история угнетенных народов Востока схожи с таковыми в Китае. Как и Китай, они не должны развиваться в капиталистические или чисто синдикалистские системы — скорее, их целью должно быть подражание китайской модели и создание «Стран народного Миньшэн» через §H$KMT_minsheng_partnership_full_name$§!.\n\nБудучи государством-партнером в этом новом восточном экономическом порядке, по мере того как китайский дракон начинает восстанавливать свою гегемонию над Азиатско-Тихоокеанским регионом, наша экономика получила определенные выгоды благодаря росту региональной торговли, инвестиций и развития. Тем не менее, тот факт, что эта договоренность работала в первую очередь на благо китайцев, не остался незамеченным, поскольку экспорт в недавно освобожденных колониях был перенаправлен из их бывших метрополий в Гуанчжоу и Шанхай. Мы можем только надеяться, что наши «освободители» согласятся на более справедливую договоренность в будущем, ибо сейчас они чувствуют себя свободными вознаграждать себя как наших «учителей» во время нашего собственного периода национальной опеки."

 KR_minsheng_partnership_effects_CHI: "Эффективность добычи ресурсов: [?KMT_minsheng_local_resources_var|+=%]\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: [?KMT_minsheng_construction_var|+=%]\n$MODIFIER_CONSUMER_GOODS_FACTOR$: [?KMT_minsheng_consumer_goods_var|Y%]\nМнение от торговых сделок: [?KMT_minsheng_trade_opinion_var|Y%]\n$MODIFIER_RESEARCH_SPEED_FACTOR$: [?KMT_minsheng_research_speed_var|+=%]"
 KR_minsheng_partnership_effects: "Эффективность добычи ресурсов: [?0.1|+=%]\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: [?0.05|+=%]\n$MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-5.0%§!\nРесурсы на рынок: [?0.1|+=%Y]\n$MODIFIER_RESEARCH_SPEED_FACTOR$: [?CHI.minsheng_partnership_research_var|+=%]"

#Zeal Events
 RKT.zealmechanic.001.t: "Три принципа пересмотрены в [FROM.GetNameDef]!"
 RKT.zealmechanic.001.d: "Труды доктора Сунь Ятсена о национальном восстановлении, особенно его лекции о Трех народных принципах и Трех этапах революции, всегда занимали центральное место в идеологии Гоминьдана. Равносильные священному писанию для верующих в партию, отклонения от этой ортодоксии всегда встречались с большим подозрением, а преднамеренные попытки извратить ее ради личной выгоды — с глубоким презрением.\n\nИ все же, похоже, что чиновники в [FROM.GetNameDef] начали делать именно это, искажая слова Вечного премьера во имя «гармонизации» их с существующей политикой [FROM.GetAdjective]. Когда [FROM.GetLeader] сталкивается с этим фактом, он настаивает, что это практическая необходимость и что политическая традиция [FROM.GetAdjective] требует определенной степени пересмотра Трех принципов, чтобы впитать ее.\n\nОднако эти призывы к высшему благу, по-видимому, скрывают отсутствие веры в видение Гоминьдана и, возможно, более широкую нелояльность к [ROOT.GetLeader]. Тем не менее, что сделано, то сделано, и исправление ошибок провинциальной администрации не обойдется дешево. Но иногда приходится платить ужасную цену, чтобы сохранить чистоту видения покойного основателя партии."
 RKT.zealmechanic.001.a: "Мы должны обеспечить партийную ортодоксию!"
 RKT.zealmechanic.001.b: "Немного гибкости нам не повредит..."

 RKT.zealmechanic.002.t: "[FROM.GetAdjective] верность Трем принципам"
 RKT.zealmechanic.002.d: "Три народных принципа доктора Суня всегда оказывались проницательными, глубоко проникая в суть проблем, с которыми сталкивается Китай. Их слова имеют определенный вес даже там, где власть центрального правительства не может проникнуть. Несмотря на удаленность от [ROOT.Capital.GetCapitalVictoryPointName], власти в [FROM.GetNameDef] усердно работали, чтобы преодолеть этот разрыв, «партизируя» свою администрацию.\n\nИх недавнее послушание директивам центрального комитета и устранение конкурирующих идей с партийной доктриной порадовали [ROOT.GetLeader] и его сотрудников, что является признаком растущего подчинения [FROM.GetAdjective] нашему правлению. Было бы неразумно придавать слишком большое значение этим шагам, и действительно, они остаются упрямо автономными в управлении.\n\nТем не менее, решение о том, как лучше всего использовать эту тенденцию, остается в воздухе. Хотя намерением [FROM.GetLeader], вероятно, было повышение морального духа партии, мы также могли бы использовать это как шанс приблизить его к нам."
 RKT.zealmechanic.002.a: "Возможность привлечь их в наши ряды."
 RKT.zealmechanic.002.b: "Пример для всех верных!"

 RKT.zealmechanic.003.t: "Региональное неповиновение в [FROM.GetNameDef]!"
 RKT.zealmechanic.003.d: "Предполагаемое подчинение [FROM.GetLeader] нашему центральному правительству не помешало им настаивать на своих местных прерогативах. Хотя мы согласились предоставить им некоторую свободу действий в осуществлении политической опеки над их провинцией, в этом соглашении подразумевается, что магистраты [ROOT.GetAdjective] будут иметь право надзора за местными делами.\n\nТем не менее, наши усилия по осуществлению нашей законной власти были встречены лишь саботажем и недоверием со стороны чиновников [FROM.GetAdjective], и становится все более очевидным, что это преднамеренный шаг [FROM.GetLeader], чтобы заблокировать наш прогресс в объединении [FROM.GetNameDef] под нашим правлением.\n\nТакая наглость была бы нетерпимой в любой другой стране, однако в это время кризиса выбор не так прост. Принуждение к нашему правлению дестабилизирует наше политическое устройство в то время, когда единство является редкостью. Однако такая нелояльность порождает дальнейшую нелояльность, и допущение такого провинциализма вызывает вопросы о нашей способности контролировать милитаристов."
 RKT.zealmechanic.003.a: "Мы должны призвать их к порядку."
 RKT.zealmechanic.003.b: "В конце концов все подчинятся."

 RKT.zealmechanic.004.t: "[FROM.GetAdjective] поддержка национального дела!"
 RKT.zealmechanic.004.d: "Преданность нашему национальному делу сопряжена с определенными моральными обязанностями. Революции строятся на любви и жертвенности, и точно так же, как храбрые солдаты и мученики продолжают отдавать свои жизни за национальное дело, провинции также должны отдавать свои сокровища, энергию и ресурсы ради благополучия нации.\n\nПохоже, что [FROM.GetLeader] хорошо усвоил этот урок, о чем свидетельствует увеличение (хотя, вероятно, временное) потока дани из [FROM.GetNameDef] в поддержку центрального правительства. Редкий случай альтруизма эпохи милитаристов, эта вера в наше руководство является долгожданным событием.\n\nТем не менее, оказанное доверие требует доверия взамен. Но печальная реальность такова, что лидеры должны быть готовы принимать жесткие решения. Мы могли бы использовать этот приток ресурсов для укрепления нашей собственной позиции, стабилизации нашего правления, даже если это будет в ущерб более широкой революции. В качестве альтернативы, это увеличение доходов может быть использовано для поддержки всех фронтов дела, повышая энтузиазм в отношении национальной программы Гоминьдана."
 RKT.zealmechanic.004.a: "Реальность такова, что [ROOT.Capital.GetCapitalVictoryPointName] на первом месте."
 RKT.zealmechanic.004.b: "Их героизм помогает всем патриотам."

 RKT.zealmechanic.005.t: "Украденная партийная легитимность в [FROM.GetNameDef]!"
 RKT.zealmechanic.005.d: "Популярность Гоминьдана доказала свою устойчивость на протяжении многих лет, выживая, несмотря на многочисленные оглушительные поражения. Это потому, что послание доктора Суня действительно находит отклик у людей, давая им надежду среди беспорядков в Китае. Но, к сожалению, для многих милитаристов его правда — это то, что можно легко исказить, чтобы означать все, что служит их интересам, — преднамеренное и жестокое искажение того, что должно быть освободительным боевым кличем.\n\nХотя все милитаристы в той или иной степени делают это, [FROM.GetLeader] и его окружение в последнее время были особенно отвратительны, облекая свое правление в атрибуты Гоминьдана и утверждая себя как равных наследству нашей партии.\n\nЭта циничная кража легитимности Гоминьдана оставила горький привкус во рту многих идеалистов и вызвала более широкую критику революции в целом. Заверить их в нашей собственной верности и призвать [FROM.GetLeader] к порядку будет непросто, но это может быть необходимо, чтобы избежать более широкого спада энтузиазма."
 RKT.zealmechanic.005.a: "Мы должны заверить людей, что мы лучше их."
 RKT.zealmechanic.005.b: "Люди сами раскусят их фарс."

 RKT.zealmechanic.006.t: "[FROM.GetAdjective] патриоты объединяются!"
 RKT.zealmechanic.006.d: "Гоминьдан выдержал великие испытания на протяжении десятилетий, потому что, сколько бы оружия ни было у его противников или сколько бы золота ни вливали внешние силы, чтобы противостоять им, их освободительные слова действительно завоевали сердца людей.\n\nТем не менее, среди милитаризма и разобщенности всегда есть те, кто предпочтет преследовать эгоистичные интересы в ущерб потребностям нации. Поэтому редко можно увидеть, чтобы местные администрации ставили наши потребности выше своих, навязывая правление партийного государства реакционерам и подавляя внутреннее инакомыслие тех, кто предпочел бы коррупцию старого порядка.\n\nЭтот поступок вызвал значительную похвалу в адрес [FROM.GetLeader] и позволил нам поднять многих на борьбу. Но теперь встает вопрос, куда направить этот воинственный порыв — против врагов внутренних или внешних."
 RKT.zealmechanic.006.a: "Милитарист и реакционер дрожат при виде нас!"
 RKT.zealmechanic.006.b: "Иностранные империалисты будут бояться нашего гнева!"
###Focus
 KMT_white_sun: "Белое солнце над Китаем"
 KMT_white_sun_desc: "Хотя процесс был трудным, мы наконец укрепили нашу власть по всей стране и можем начать официальное формирование новой республики под Белым Солнцем. Теперь мы должны заложить основу для следующего этапа нашей революции, интегрируя все провинции Китая в органы нашего правительства."

 KMT_tridemism: "Учение Саньминь"
 KMT_tridemism_desc: "Три народных принципа, или учение Саньминь, являются основой политической философии Сунь Ятсена и Гоминьдана. Принципы направляют наше правительство в его политике и решениях, и их важность должна быть понята народом в предстоящей борьбе."

 KMT_organic_law: "Органический закон Республики"
 KMT_organic_law_desc: "Пока продолжается политическая опека и разрабатывается окончательная конституция, был провозглашен Органический закон Национального правительства. Этот акт реорганизовал Национальное правительство в пять ветвей, или Юаней, и закрепил осуществление Гоминьданом суверенной власти на время политической опеки."

 KMT_minzu_focus: "Миньцзу"
 KMT_minzu_focus_desc: "Миньцзу, или Национализм, является одним из Трех народных принципов Сунь Ятсена и вращается вокруг общего уклада жизни, языка, религии, обычаев и, что самое важное, общей родословной. Национальное единство имеет первостепенное значение для нашего успеха и позволит Китаю преуспеть против других наций в борьбе за превосходство."

 KMT_minquan_focus: "Миньцюань"
 KMT_minquan_focus_desc: "Миньцюань, или Демократия, является вторым из Трех народных принципов Сунь Ятсена. Создание демократических институтов и подготовка китайского народа к ним является одной из важнейших целей Национальной революции и в долгосрочной перспективе докажет, что Партия является лучшим выбором для Китая."

 KMT_legislature: "Законодательный Юань"
 KMT_legislature_desc: "Хотя Китай еще не готов к полноценным выборам, Национальное правительство должно начать формировать институты, через которые демократия однажды проявит свою волю. Законодательный Юань, укомплектованный представителями Гоминьдана как с контролируемых, так и с оспариваемых территорий, возьмет на себя законодательные обязанности Центрального комитета."

 KMT_land_reform: "Земельная реформа националистов"
 KMT_land_reform_desc: "Крестьяне составляют абсолютное большинство населения Китая, однако немногие из них владеют землей, которую они обрабатывают, что убивает любые шансы на социально-экономический прогресс. Земельная реформа необходима для улучшения их условий жизни и снижения социальной напряженности. Пока крестьяне Китая не будут владеть землей, а не арендовать ее у коррумпированных землевладельцев, они никогда не будут свободны."

 KMT_rent_control: "Налог на стоимость земли"
 KMT_rent_control_desc: "Сунь Ятсен настаивал на принятии налога на стоимость земли, чтобы улучшить финансы страны, помочь продвигать земельную реформу и создать более справедливую систему налогообложения и экономики. Мы должны реализовать его видение, чтобы помочь модернизировать страну и улучшить экономику."

 KMT_minsheng: "Миньшэн"
 KMT_minsheng_desc: "Миньшэн, обычно переводимое как «Народное благосостояние», является последним из Трех народных принципов Сунь Ятсена. После введения налога на стоимость земли будут созданы и расширены социальные программы, чтобы помочь крестьянам и рабочим улучшить качество жизни путем субсидирования потребления продуктов питания, одежды и расходов на жилье."

 KMT_revive_china: "Программа возрождения Китая"
 KMT_revive_china_desc: "Без Националистической партии не будет нового Китая. Обширная программа государственного планирования и инициатив необходима, чтобы вернуть Китай на тот же уровень, что и Запад, и восстановить поврежденную экономику."

 KMT_national_mausoleum: "Построить национальный мавзолей"
 KMT_national_mausoleum_desc: "Давно пора почтить память тех, кто пал на службе китайской демократии. За пределами [Root.Capital.GetCapitalVictoryPointName] будет построен национальный мавзолей для захоронения останков Сунь Ятсена и других видных революционеров."

 KMT_civil_service: "Расширить государственную службу"
 KMT_civil_service_desc: "Чтобы выжить в долгосрочной перспективе, Национальное правительство должно быть чем-то большим, чем клика милитаристов или партийное государство. Должно начаться формирование государственной службы, независимой как от партийного аппарата Гоминьдана, так и от армии."

 KMT_academia_sinica: "Академия Синика"
 KMT_academia_sinica_desc: "Чтобы лучше способствовать развитию наших собственных научных возможностей, Гоминьдан должен взять на себя обязательство создавать и спонсировать наши собственные академические исследовательские институты. Давно предложенная, но так и не созданная, полностью учрежденная Академия Синика станет центром этих усилий."

 KMT_national_reconstruction_commission: "Комиссия по национальной реконструкции"
 KMT_national_reconstruction_commission_desc: "Вдохновленная предложениями, разработанными Чжан Жэньцзе, централизованно управляемая Комиссия по национальной реконструкции должна быть сформирована Национальным правительством для планирования общенациональной программы капиталовложений и стандартизации. Эта программа будет включать множество независимо масштабируемых усилий, сосредоточенных вокруг нескольких крупных населенных пунктов."
 
 KMT_bopomofo: "Бо, По, Мо, Фо..."
 KMT_bopomofo_desc: "Нынешние методы романизации китайского языка и даже обучения китайской письменности крайне недостаточны для детей или простых людей. Новый стандарт фонетических символов, подобный слоговой азбуке хирагана, созданной для японского языка, должен быть создан и распространен по всей нашей системе образования, чтобы помочь стандартизировать китайские диалекты и открыть массовый разговор с Западом."

 KMT_triumphant_revolution: "Торжествующая революция"
 KMT_triumphant_revolution_desc: "Китай наконец-то воссоединился под Белым солнцем, Голубым небом и Совершенно красной землей Гоминьдана. Хотя предстоит еще долгий путь, прежде чем мы оправимся от Века унижений, мы осуществили мечту покойного доктора Суня."

 KMT_renovate_whampoa: "Расширить военную академию Вампу"
 KMT_renovate_whampoa_desc: "Военная академия Гоминьдана была впервые основана Сунь Ятсеном в 1924 году в Вампу недалеко от Гуанчжоу и создала кадры политически сознательных офицеров из тех, кто там обучался. Хотя простого восстановления было достаточно ранее, преобразование НРА в подлинно национальную армию требует расширения Вампу, чтобы удовлетворить потребность в политически надежных и способных офицерах."

 KMT_central_military_academy: "Основать Центральную военную академию"
 KMT_central_military_academy_desc: "Поскольку власть революции над Китаем надежно закреплена, больше нет необходимости оставлять Военную академию Вампу в Гуанчжоу. Выдающаяся военная школа будет переведена в нашу национальную столицу для создания централизованной военной академии. Это поможет нашей центральной командной структуре и побудит новобранцев со всей страны учиться у лучших офицеров, которых может предложить Китай."

 KMT_standardised_arsenals: "Стандартизировать арсеналы"
 KMT_standardised_arsenals_desc: "В течение нескольких десятилетий арсеналы Китая находились под контролем различных и в значительной степени независимых провинциальных и национальных правительств. Теперь, когда ряд этих арсеналов находится под нашим контролем, логистические проблемы, возникающие из-за того, что разные арсеналы производят разное оружие разного калибра для одной армии, значительны и должны быть устранены как можно скорее."

 KMT_small_arms_development: "Разработка стрелкового оружия"
 KMT_small_arms_development_desc: "Несмотря на попытки многочисленных национальных и провинциальных правительств модернизироваться, самой распространенной винтовкой на вооружении остается почтенная, но сильно устаревшая Модель 88. Превращение стандартизации на новую, современную винтовку в реальность, а не в проект на бумаге, является главным приоритетом для улучшения наших слабых военных возможностей по сравнению с другими современными армиями."

 KMT_artillery_modernisation: "Модернизация артиллерии"
 KMT_artillery_modernisation_desc: "Артиллерия — король поля боя, и современные орудия были роскошью в эпоху милитаристов. Используя возможности объединенного Китая, мы можем модернизировать наши орудия и приблизить нашу огневую мощь к мировому стандарту."

 KMT_tank_arsenal: "Бронетанковая война"
 KMT_tank_arsenal_desc: "Развитие бронетанковой войны, безусловно, было замечено в Китае, но разработка и использование ее здесь были лишь несбыточной мечтой. Теперь, когда мы едины и сильнее, чем когда-либо, настало время углубиться в эти передовые технологии как важную ступень в модернизации Китая."

 KMT_new_model_army: "Армия нового образца"
 KMT_new_model_army_desc: "Профессиональная добровольческая армия станет будущим китайской армии: меньшая армия, преданная Трем народным принципам и Национальной революции, ориентированная на качество, а не на количество. Это создаст больший корпоративный дух и дисциплину, создавая лучших солдат, способных выполнять сложные задачи и подчиняться трудным приказам."

 KMT_professionalisation: "Внедрить армейскую дисциплину"
 KMT_professionalisation_desc: "Новая китайская армия будет профессиональной, сосредоточенной на военной подготовке полный рабочий день, поощряющей высокий уровень дисциплины и мастерства. Пример Железной армии станет образцом для современных профессиональных армий, сопоставимых с любой западной державой."

 KMT_peoples_army: "Народная армия"
 KMT_peoples_army_desc: "Китайская армия должна использовать свою численность и размер для ведения войн. Она должна быть Народной армией: той, которая представляет народ и защищает его. Столпом национального объединения, а не угнетения или репрессий."

 KMT_conscription: "Единство через службу"
 KMT_conscription_desc: "Широкомасштабная военная служба объединяет людей из многих регионов, давая им общий опыт и помогая им видеть друг в друге братьев; конкретные и истинные примеры братства вместо туманных концепций нации. Национальное единство будет укреплено этим."

 KMT_NRA: "Возрожденная НРА"
 KMT_NRA_desc: "Несмотря на проблемы НРА после объединения, мы преуспели в наших реформах по модернизации и оснащению НРА для будущих конфликтов. Каждый день мы получаем новых и нетерпеливых новобранцев, готовых учиться у закаленных в боях ветеранов НРА. Как истинная армия Китайской Республики, наши вооруженные силы станут свидетельством успеха китайской модернизации для грядущих поколений. Да здравствует Национально-революционная армия, да здравствует Китайский Гоминьдан!"

 KMT_aviation_school: "Формализовать авиационные школы"
 KMT_aviation_school_desc: "Хотя в Китае действительно есть школы для пилотов, их мало, и они относительно дезорганизованы. Формализация этих школ и создание надлежащей учебной программы для пилотов и обслуживающего персонала поможет создать надлежащие военно-воздушные силы для Китая."

 KMT_new_aircraft_factories: "Новые авиационные заводы"
 KMT_new_aircraft_factories_desc: "На юге страны за последние десять или два десятилетия было создано несколько небольших авиационных мастерских, но они оставались довольно маленькими, способными ремонтировать лишь немногие имеющиеся самолеты. Создание надлежащих заводов — еще один шаг к развитию зарождающейся авиационной промышленности, неотъемлемой части современной эпохи."

 KMT_native_fighter_design: "Отечественный проект истребителя"
 KMT_native_fighter_design_desc: "Было предпринято несколько попыток создания китайского самолета, в основном на основе иностранных образцов. С помощью иностранных экспертов и растущего пула местных техников мы теперь более чем когда-либо способны разрабатывать собственные проекты в надежде создать современные военно-воздушные силы для защиты нашего неба."

 KMT_naval_bomber: "Проект морского бомбардировщика"
 KMT_naval_bomber_desc: "Хотя поначалу игнорируемые, морские бомбардировщики, вооруженные торпедами и бронебойными бомбами, быстро становятся серьезной угрозой даже для самых крупных военных кораблей, находящихся в море. Эта технология может быть именно тем, что нужно Китаю: экономически эффективный способ уничтожения значительно более крупного вражеского флота, угрожающего нашему побережью."

 KMT_medium_bomber: "Флот тактических бомбардировщиков"
 KMT_medium_bomber_desc: "Средние тактические бомбардировщики обеспечивают универсальность военно-воздушным силам благодаря способности выполнять различные типы задач. Конечно, проектирование такого большого самолета было неслыханным до сих пор и, безусловно, станет вызовом."

 KMT_light_bomber: "Армейская авиационная поддержка"
 KMT_light_bomber_desc: "Легкие бомбардировщики как своего рода летающая артиллерия — лучший способ, которым военно-воздушные силы могут поддерживать наземные операции. Вполне логично, что мы сосредоточимся на этих самолетах непосредственной авиационной поддержки, создавая современные военно-воздушные силы."

 KMT_expand_dockyard: "Расширить республиканские верфи"
 KMT_expand_dockyard_desc: "С завершением национального объединения и выполнением видения доктора Суня мы должны теперь предпринять шаги по преобразованию наших некогда молодых провинциальных военно-морских сил в новый национальный флот. Давайте возродим ВМС Китайской Республики под флагом Белого Солнца и поощрим строительство верфей по всему побережью Китая, чтобы удовлетворить нашу растущую потребность в кораблях."

 KMT_incorporate_beiyang_fleet: "Включить Бэйянский флот"
 KMT_incorporate_beiyang_fleet_desc: "В результате объединительных войн некоторые из лучших адмиралов и морских офицеров Китая остались без работы после Национального объединения. Мы предложим им полную правительственную амнистию, чтобы эти морские офицеры могли обучать и вести следующее поколение китайских моряков в открытом море в составе нового революционного флота Китая."

 KMT_destroyers: "Флотилия современных эсминцев"
 KMT_destroyers_desc: "Эсминцы — основа любого современного флота, особенно такого молодого, как китайский. Они будут защищать наши берега, судоходные пути и более крупные военные корабли от подводных лодок и малых ударных судов."

 KMT_submarines: "Развивать подводные лодки"
 KMT_submarines_desc: "Подводные лодки оказываются незаменимыми в современной морской войне. Для такого ограниченного флота, как наш, они могут оказаться спасением, позволяя нам атаковать гораздо более сильных врагов, совершая набеги на их судоходные пути и преследуя их более крупные флоты."

 KMT_cruisers: "Крейсеры для нашего флота"
 KMT_cruisers_desc: "Крейсеры важны для разведки и прикрытия и, реалистично говоря, могут быть самыми большими военными кораблями, которые мы способны построить в настоящее время."

 KMT_coastal_defence: "Сосредоточиться на береговой обороне"
 KMT_coastal_defence_desc: "Было бы безумием начинать планировать большой флот, способный соперничать с военно-морскими великими державами. Поэтому мы должны сосредоточиться на более гибком флоте, способном защитить наше протяженное побережье и интересы в Тихом океане."

 KMT_grand_fleet: "Гранд-Флит"
 KMT_grand_fleet_desc: "Если Китай хочет считаться Великой державой, какой он по праву должен быть, флот незаменим. Хотя это, безусловно, будет очень долгосрочный план, наш великий флот должен с чего-то начинаться, и он должен начаться сейчас."

