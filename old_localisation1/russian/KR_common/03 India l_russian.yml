### Tooltips ###
 india_will_seize_ceylon_if_germany_at_war: "Цейлон будет захвачен, если это решение будет принято в то время, когда Германия вовлечена в большую войну."
 india_activate_integration_decisions_tooltip: "§YСтанут доступны дополнительные решения,ускоряющие интеграцию отвовеванных земель.§!"
 india_demobilisation_tt: "Наша страна начнет демобилизовываться, возвращаясь к §YГражданской Экономике§! и политике призыва §YТолько добровольце§!."

### Shared Decisions ###

 india_invade_tawang_decision: "Потребовать [858.GetName]"
 india_invade_tawang_decision_desc: "Во время первоначального хаоса, приведшего к краху британского владычества над Индией, приграничная территория [858.GetName] оказалась под оккупацией местных правителей. Теперь, когда субконтинент вновь стал единым, настало время добиваться восстановления правильных границ государства."
 india_invade_aksai_chin_decision: "Потребовать [897.GetName]"
 india_invade_aksai_chin_decision_desc: "Весь Кашмир является частью Индии, независимо от любых китайских заявлений об обратном, и это, конечно, распространяется на самую северную часть региона, которая, к сожалению, оказалась под иностранной оккупацией. Поэтому следует отправить запрос государству [FROM.GetName] с требованием эвакуироваться из региона, чтобы он наконец полностью перешел под [ROOT.GetAdjective]ое управление."
 india_tackle_resistance_decision: "Разобраться с сопротивлением"
 india_tackle_resistance_decision_desc: "Даже после объединения Индии бесчисленное множество людей по-прежнему сожалеют о своем поражении и готовы снова погрузить страну в хаос, если им представится такая возможность. Мы должны выделить значительные ресурсы для того, чтобы разобраться с этими несогласными, используя как кнут, так и пряник, когда это необходимо."
 india_increase_integration_efforts_in_state_decision: "Усилия по интеграции в [FROM.GetName]"
 india_increase_integration_efforts_in_state_decision_desc: "Хотя, имея достаточно времени, наши люди на местах обеспечат надлежащую интеграцию [FROM.getName] в восстановленную нацию, было бы разумно направить им дополнительную помощь, чтобы ускорить эти усилия по интеграции, особенно в наиболее важные регионы страны."

 india_reintegration_category: "Реинтеграция Индии"
 
### Shared Events ###

 india_events.1.t: "Выбор столицы [ROOT.GetNameDef]"
 india_events.1.d.RAJ: "С окончательным объединением Индии настало время перестроить страну и решить, где мы хотим разместить её столицу. Хотя Лахор сослужил нам хорошую службу, возможно, было бы разумно перенести её в Дели, где до революции была проделана огромная работа по превращению его в достойную столицу страны. В качестве альтернативы мы можем вернуться в Калькутту, бывшую столицу Британской Индии, где период промышленного роста в эпоху Бхаратийской Народной Республики и её близость к побережью могли бы стать полезным активом для торговли Индии с остальным миром. Бомбей, в свою очередь, всегда был одним из самых промышленных городов на субконтиненте, и, в отличие от Дели или Калькутты, отсутствие революционных перемен при князьях могло бы привести к гораздо более плавному восстановлению старой администрации, если бы он был выбран в качестве столицы.\n\nОднако, в качестве альтернативы, мы могли бы просто остаться в Лахоре, который остаётся нашей временной столицей, пока мы постепенно интегрируем остальную часть страны и избавляемся от реакционных и радикальных элементов."
 india_events.1.d.HND: "Теперь, когда Индия окончательно объединена, пришло время перестроить страну и решить, где мы хотим видеть её столицу. Мы могли бы выбрать Дели, где прогресс, направленный на превращение его в административный центр Раджа с 1911 года, был прерван Британской революцией, хотя это и напоминает нам о нашем колониальном прошлом. Бомбей же всегда был одним из самых промышленных городов на субконтиненте, и социализм в нём может легко укорениться.\n\nХотя переезд в одно из этих мест мог бы помочь заручиться поддержкой народа, ему ещё предстоит осознать преимущества социализма под руководством нашего лидера, [ROOT.GetLeader]. Пребывание в Калькутте, колыбели революции, также было бы символичным для будущих поколений."
 india_events.1.d.PRF: "После окончательного объединения Индии пришло время перестроить страну и решить, где мы хотим видеть её столицу. Мы могли бы выбрать Дели, где прогресс, направленный на превращение его в центр администрации Раджа с 1911 года, был прерван Британской революцией, хотя это и напоминает нам о нашем колониальном прошлом, и [ROOT.GetLeader] всегда стремился к независимости от остальной Индии. В качестве альтернативы мы можем переехать в Лахор, бывшую временную столицу Британской Индии и многих великих империй прошлого субконтинента, если мы тоже хотим претендовать на наследие их великого наследия.\n\nОставаться в Хайдарабаде также может быть подходящим выбором, поскольку десятилетия инвестиций принесли с собой новые государственные услуги, образовательные и финансовые учреждения, а также современную инфраструктуру, необходимую для современной столицы. Потенциальное сопротивление, с которым могут столкнуться в Лахоре или Дели те, кто всё ещё отвергает будущее субконтинента, также делает Хайдарабад подходящим выбором, хотя в конечном счёте такое сопротивление вряд ли будет продолжительным."
 india_events.1.a: "Бывшая столица, Дели."
 india_events.1.b: "Давайте вернемся в старую бенгальскую столицу."
 india_events.1.c: "Пришло время Бомбею сиять."
 india_events.1.e: "Великий город Лахор послужит нам хорошую службу."
 india_events.1.d: "Давайте останемся там, где мы сейчас находимся."

 india_events.10.t: "Опустошение Индии"
 india_events.10.d: "Наконец, война, начавшаяся более десяти лет назад, подошла к концу, но эта победа далека от славы. Страна лежит в руинах: тысячи погибших, дома разрушены, а то немногое, что осталось от индийской экономики, лежит в руинах. Хуже того, боевые действия ещё не закончены: многие по-прежнему лояльны фальшивым правительствам и отказываются сложить оружие и принять новый статус-кво. Хотя одна великая битва осталась позади, очевидно, что началась новая великая борьба за восстановление после этого конфликта."
 india_events.10.a: "По крайней мере, страна снова цела, вернее, то, что от нее осталось."

 india_events.50.t: "Разобраться с Непалом"
 india_events.50.d: "После краха Раджа [NEP.GetNameDef] воспользовался хаосом, возникшим в стране, чтобы захватить несколько низинных районов у подножия Гималаев. После окончательного воссоединения Индии многие \"ястребы\" в кабинете министров требуют возвращения этой незаконно оккупированной территории. Некоторые даже призывают к включению Непала в более широкий таможенный союз, сочетающийся с военным договором."
 india_events.50.a: "Потребуйте возвращения оккупированных районов!"
 india_events.50.b: "Заявить права на оккупированные районы и требуйте создания дружественного правительства!"
 india_events.50.c: "Добиться создания дружественного правительства!"

 india_events.51.t: "Требования [From.GetNameDef]"
 india_events.51.d.return: "Мы находимся под давлением со стороны возрождающегося [From.GetAdjective]ого правительства, требующего отделить районы, которые мы завоевали после краха британского владычества."
 india_events.51.d.govt: "Мы находимся под давлением со стороны возрождающегося [From.GetAdjective]ого правительства, требующего отделения районов, завоёванных нами после падения британского владычества. Более того, они требуют, чтобы мы отказались от нашей фактической независимости."
 india_events.51.a: "У нас нет другого выбора, кроме как подчиниться."
 india_events.51.b: "Скажите им, что великий Непал защитит свои завоевания!"

 india_events.52.t: "Непал подчиняется"
 india_events.52.d.return: "Не имея другого выбора, правительство [From.GetAdjective] вернуло территорию под наш контроль."
 india_events.52.d.govt: "Не имея другого выбора, [From.GetAdjective]ое правительство передало нашу территорию и фактически подчинилось нашему контролю."
 india_events.52.a: "Были ли еще какие-то сомнения?"

 india_events.53.t: "Непал отклоняет наши требования!"
 india_events.53.d: "Удивительно, но [From.GetAdjective]ое правительство отклонило наше требование, заявив, что если мы хотим вернуть себе индейские низменности, то нам придется сделать это силой!"
 india_events.53.a: "Тогда это война!"
 india_events.53.b: "Возможно, в другой раз..."

 india_events.60.t: "[From.GetNameDefCap] оккупировали индийские земли!"
 india_events.60.d: "Пока мы были отвлечены войной, [From.GetAdjective]ие солдаты вторглись на наши территории в Индийском океане и захватили контроль над местными силами, прежде чем те успели пошевелить пальцем. [From.GetNameDefCap] заявляет, что эти территории принадлежат ему по праву, и на данный момент мы, похоже, мало что можем с этим поделать... кроме как открыто объявить войну."
 india_events.60.a: "Это не останется без ответа!"
 india_events.60.b: "Тогда, это война!"

 india_events.61.t: "[From.GetNameDefCap] and the Return of our Indian Colonies"
 india_events.61.d: "The [From.GetAdjective] government has just proposed a deal that would transfer some of the territories we snatched after the collapse of the British Raj back to [From.GetNameDef]. This could be a good way to improve relations with the national government, but could also set a dangerous precedent in our other colonies."
 india_events.61.a: "Hand over the isles to the Indians."
 india_events.61.b: "No, these naval bases are vital to the Kaiserliche Marine."

 india_events.62.t: "Передача немецких колоний"
 india_events.62.d: "Нам удалось убедить немцев вернуть часть колоний, захваченных Рейхом после падения Индийского колониального режима. Это не только великолепный знак индо-германской дружбы, но и доказательство того, что мы действительно получили мандат правопреемника Великобритании. Слава Индии!"
 india_events.62.a: "Вернем острова в нашу страну!"
 india_events.62.b: "Предоставить Цейлону широкую внутреннюю автономию и включить атоллы."

 india_events.63.t: "[From.GetNameDefCap] отклонили наши предложение"
 india_events.63.d: "[From.GetAdjective]ие солдаты сегодня утром вторглись в [seized_state.GetName] и захватили контроль над нашими местными силами безопасности, прежде чем те успели пошевелить пальцем. [From.GetNameDefCap] утверждает, что [seized_state.GetName] по праву принадлежит индейцам, и на данный момент мы мало что можем с этим поделать."
 india_events.63.a: "Понятно.."

 india_events.65.t: "[From.GetNameDefCap] оккупирует [seized_state.GetName]!"
 india_events.65.d: "[From.GetAdjective]ие солдаты сегодня утром вторглись в [seized_state.GetName] и захватили контроль над нашими местными силами безопасности, прежде чем те успели пошевелить пальцем. [From.GetNameDefCap] утверждает, что [seized_state.GetName] по праву принадлежит индейцам, и на данный момент мы мало что можем с этим поделать."
 india_events.65.a: "Стервятники!"
 india_events.65.b: "Это не останется без ответа!"

 india_events.70.t: "[FROM.GetNameDefCap] требует [858.GetName]"
 india_events.70.d: "После того, как Индийский субконтинент вновь объединился под эгидой [FROM.GetNameDef], они начали добиваться полного восстановления своих прежних границ и потребовали передачи им приграничной территории [858.GetName]. Хотя такое заявление, очевидно, совершенно ложно, маловероятно, что такая возрождающаяся держава просто откажется от этого в случае отказа и, скорее всего, попытается реализовать свои претензии военным путём. Необходимо решить, готова ли страна к такому развитию событий."
 india_events.70.a: "У нас нет другого выбора, кроме как подчиниться"
 india_events.70.b: "Мы ничего не уступим этим тиранам!"

 india_events.71.t: "[FROM.GetNameDefCap] соглашается вернуть [858.GetName]"
 india_events.71.d: "Получен ответ от [FROM.GetName], и они благоразумно решили мирно подчиниться и согласились вернуть оккупированную территорию [858.GetName] под [ROOT.GetAdjective]ое управление."
 india_events.71.a: "Хорошо, что они вразумились."

 india_events.72.t: "[FROM.GetNameDefCap] отклоняет требования вернуть [858.GetName]"
 india_events.72.d: "Нарушая суверенитет [ROOT.GetAdjective] над регионом, [FROM.GetName] отказались вернуть [858.GetName] и ясно заявили о своём намерении сохранить его под своей оккупацией. Похоже, пришло время либо подкрепить свои слова силой, либо передать регион под их постоянную оккупацию."
 india_events.72.a: "Похоже, что единственный оставшийся вариант — сила."
 india_events.72.b: "Не стоит начинать войну из-за такого незначительного спора."

 india_events.75.t: "[FROM.GetNameDefCap] требует [897.GetName]"
 india_events.75.d: "После того, как Индийский субконтинент вновь объединился под эгидой [FROM.GetNameDef], они начали добиваться полного восстановления своих прежних границ и потребовали передачи им приграничной территории [897.GetName]. Хотя такое заявление, очевидно, совершенно ложно, маловероятно, что такая возрождающаяся держава просто откажется от этого в случае отказа и, скорее всего, попытается реализовать свои претензии военным путём. Необходимо решить, готова ли страна к такому развитию событий."
 india_events.75.a: "У нас нет другого выбора, кроме как подчиниться"
 india_events.75.b: "Мы ничего не уступим этим тиранам!"

 india_events.76.t: "[FROM.GetNameDefCap] соглашается вернуть [897.GetName]"
 india_events.76.d: "Получен ответ от [FROM.GetName], и они благоразумно решили мирно подчиниться и согласились вернуть оккупированную территорию [897.GetName] под управление [ROOT.GetAdjective]."
 india_events.76.a: "Хорошо, что они образумились."

 india_events.77.t: "[FROM.GetNameDefCap] отклоняет требования вернуть [897.GetName]"
 india_events.77.d: "Нарушая суверенитет [ROOT.GetAdjective] над регионом, [FROM.GetName] отказались вернуть [897.GetName] и ясно заявили о своём намерении сохранить его под своей оккупацией. Похоже, пришло время либо подкрепить свои слова силой, либо передать регион под их постоянную оккупацию."
 india_events.77.a: "Похоже, что сила — единственный оставшийся вариант."
 india_events.77.b: "Не стоит начинать войну из-за такого незначительного спора."

 india_events.80.t: "[From.GetNameDefCap] требует наши бирманские округа"
 india_events.80.d: "Проклятое [From.GetAdjective]ое правительство требует вернуть бирманские территории, которые мы \"умиротворили\" во время краха Раджа. Это позорное проявление дурного тона!"
 india_events.80.a: "Нет смысла сражаться за эти бесполезные провинции."
 india_events.80.b: "Мы не знаем никаких \"бирманских\" округов, это Сиам — единый и неделимый!"
 india_events.80.c: "Соберите наших союзников на нашу защиту!"
 india_events.80.e: "Призовите нашего повелителя на нашу защиту!"

 india_events.81.t: "[From.GetNameDefCap] подчиняется"
 india_events.81.d: "[From.GetAdjective]ое правительство мудро уступило нашим требованиям и вернуло все оккупированные территории Бирмы."
 india_events.81.a: "Мудрое решение."

 india_events.82.t: "Наши требования по Бирме отклонены"
 india_events.82.d: "Весьма разумные требования, выдвинутые нашим посланником [From.GetAdjective]ому правительству, были полностью отвергнуты! Теперь нам предстоит выбрать: либо проталкивать наши требования военной силой, либо потерпеть дипломатическое поражение как внутри страны, так и на международной арене. Взоры всей страны устремлены на наш кабинет!"
 india_events.82.a: "Тогда мы силой освободим Малайский полуостров!"
 india_events.82.b: "Проглотим свою гордость и откажемся от своих притязаний."

 india_events.83.t: "[demand_country.GetNameDefCap] угрожает [From.GetNameDef]"
 india_events.83.d: "Возрождающееся [demand_country.GetAdjective]ое правительство настаивает на пересмотре границы между своими бирманскими провинциями и провинциями наших [From.GetAdjective]их союзников. Ситуация сложная, учитывая, что территории, оккупированные [From.GetNameDef], были взяты силой, но было бы нечестно бросить наших союзников в Индокитае..."
 india_events.83.a: "Выражаем солидарность с нашими союзниками в Бангкоке!"
 india_events.83.b: "Оказать давление на сиамцев, чтобы они уступили спорные районы."

 india_events.84.t: "[From.GetNameDefCap] встали на защиту [SIA.GetNameDef]"
 india_events.84.d: "Проклятия! Трусливые сиамцы спрятались под юбками своих [From.GetAdjective]их союзников. То, что мы считали простым пересмотром незаконной оккупации, превратилось в международный конфликт! Возможно, это немного больше, чем мы просили, но последствия отказа от наших претензий тоже были бы катастрофическими."
 india_events.84.a: "Тогда мы силой освободим Малайский полуостров!"
 india_events.84.b: "Такая война лишь принесет хаос во всю Азию..."

 india_events.85.t: "[From.GetNameDefCap] предали нас!"
 india_events.85.d: "[From.GetAdjective]ое правительство отправило сообщение, в котором говорится, что они не намерены защищать нас от требований [demand_country.GetNameDef], учитывая, что мы изначально получили эту территорию силой. Они настоятельно предлагают нам вернуть бирманские земли, как мы и просили."
 india_events.85.a: "Тогда мы будем бороться с этими агрессорами самостоятельно!"
 india_events.85.b: "Отдайте спорные территории."

### News Events ###
 india_events.100.RAJ_title: "Победа Доминиона"
 india_events.100.PRF_title: "Победа Федерации"
 india_events.100.HND_title: "Победа Бхаратии"
 india_events.100.Bombay_title: "[PRF.GetNameDefCap] присоединяется к доминиону"
 india_events.100.RAJ_desc: "После окончания Великой войны индийский субконтинент был расколот на три части: остатки лоялистов британского владычества, социалистов из Индийского национального конгресса и реакционных индийских князей, которые отвергли обе стороны.\n\nКогда пыль наконец улеглась, лоялисты одержали победу, и теперь Индия безраздельно правит регионом, готовясь стать выдающейся мировой державой, как только оправится от разрушений гражданской войны."
 india_events.100.PRF_desc: "После окончания Великой войны индийский субконтинент был расколот на три части: остатки лоялистов британского владычества, социалистов из Индийского национального конгресса и реакционных индийских князей, которые отвергли обе стороны.\n\nКогда пыль наконец улеглась, реакционеры одержали победу, и Всеиндийская федерация теперь беспрепятственно правит регионом, что позволяет стране стать выдающейся мировой державой, как только она оправится от разрушений гражданской войны."
 india_events.100.HND_desc: "После окончания Великой войны индийский субконтинент был расколот на три части: остатки лоялистов британского владычества, социалистов из Индийского национального конгресса и реакционных индийских князей, которые отвергли обе стороны.\n\nКогда пыль наконец улеглась, социалисты одержали победу, и Народная Республика Бхаратия теперь беспрепятственно правит регионом, готовясь стать выдающейся мировой державой, как только оправится от разрушений гражданской войны."
 india_events.100.Bombay_desc: "После окончания Великой войны индийский субконтинент был расколот на три части: остатки лоялистов британского владычества, социалистов из Индийского национального конгресса и реакционных индийских князей, которые отвергли обе стороны.\n\nС падением Социалистической Республики многие ожидали, что между двумя сторонами, подписавшими \"Бомбейский пакт\", разгорится дальнейший конфликт по поводу будущего субконтинента. Однако, при неожиданном повороте событий, [PRF.GetNameDef] согласилась мирно присоединиться к Доминиону, положив конец десятилетнему конфликту словами, а не пулями. В настоящее время Индия безраздельно правит регионом, готовясь стать ведущей мировой державой, как только оправится от разрушений гражданской войны."
 india_events.100.RAJ_option: "Опять Радж победил?"
 india_events.100.PRF_option: "Правление радж никогда не закончится."
 india_events.100.HND_option: "Освобождение снизу."
 india_events.100.Bombay_option: "Гражданская война и гражданский раскол - в Индии есть все это."

 india_events.101.t: "Кайсар-и-Хинд"
 india_events.101.d: "Правящий низам Всеиндийской федерации Осман Али Хан сегодня провозгласил себя истинным наследником титула Кайсар-и-Хинд - титула, который ранее носили только могольские и британские императоры субконтинента.\n\nПосле своей коронации на торжественной церемонии в Дели Новый император торжественно провозгласил, что нация наконец-то вернула себе принадлежащее ей по праву место в мире и что он поведет ее к великому новому будущему. Несмотря на поддержку со стороны его сторонников, многие видят в этом не более чем претенциозный поступок Османа, направленный на тешение собственного эго."
 india_events.101.a: "Такая претенциозность!"

 india_events.102.chairman: "В Бхаратии выбран Председатель"
 india_events.102.chairwoman: "В Бхаратии выбрана Председательница"
 india_events.102.intro: "После воссоединения председатель Бхаратии Абуль Касем Фазлул Хак объявил о своем уходе с этого поста, надеясь, что его сменит его заместитель Джавахарлал Неру. Вскоре после этого многолетняя фракционная политическая борьба в Индийском национальном конгрессе, наконец, достигла своего апогея, когда лидеры двух других основных фракций партии оспорили кандидатуру Неру."
 india_events.102.bose: "$india_events.102.intro$\n\nПосле нескольких недель напряженной избирательной кампании члены ИНК отклонили предложение Неру и вместо него выбрали своим новым председателем лидера максимистов Субхаса Чандру Бозе. Избрание Боуза было истолковано как четкий сигнал о том, что, несмотря на то, что нация теперь объединена, ИНК не намерена возвращаться к своему политическому милитаризму, и ожидается, что новое правительство значительно расширит его влияние."
 india_events.102.nehru: "$india_events.102.intro$\n\nПосле нескольких недель напряженной избирательной кампании Неру удалось победить своих соперников, и партия выбрала его своим новым председателем. Избрание Неру было истолковано как четкий сигнал о том, что республика подтвердит свою приверженность глобальному делу социализма и продолжит следовать ортодоксальному синдикалистскому курсу."
 india_events.102.naidu: "$india_events.102.intro$\n\nПосле нескольких недель напряженной избирательной кампании члены ИНК отклонили кандидатуру Неру и вместо этого выбрали своим новым председателем лидера аграрной партии Сароджини Найду. Избрание Найду было истолковано как ясный сигнал о желании ИНК вернуться к идеям Ганди и доморощенным идеологическим убеждениям, гармонизированным с социалистическими идеалами."
 india_events.102.a: "Интересненько."

 india_events.103.t: "Возобновление Гражданской войны в Индии"
 india_events.103.d: "Гражданская война в Индии, разразившаяся в 1925 году, когда распалась Британская империя, завершилась перемирием в 1927 году, которое поставило субконтинент в тупик. Теперь, похоже, перемирие, наконец, нарушено, и военные действия возобновляются между социалистической Народной Республикой Бхаратия и антисоциалистическими сторонами, подписавшими Бомбейский пакт, Доминионом Индия и [PRF.GetName].\n\nКонфликт охватывает сотни миллионов жителей Индии, и у каждого участника боевых действий есть иностранные покровители. Независимо от его исхода, гражданская война в Индии, несомненно, станет одной из самых смертоносных в двадцатом веке."
 india_events.103.a: "Еще одна война?" #General
 india_events.103.b: "Мы обяханы помочь Доминиону!" #Entente
 india_events.103.c: "Это будет смертельный удар по колониализму!" #Socialist