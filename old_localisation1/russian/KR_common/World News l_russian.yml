 worldnews.478.d.5: "Хотя [GER.GetNameDef] и [NFA.GetNameDef] вместе сражались против Коммунаров, они не смогли договориться о послевоенном урегулировании, оставив судьбу Франции неопределенной. Но поскольку Берлин не хотел проводить дорогостоящую оккупацию, а Алжир желал видеть Париж, оба встретились в Лионе, чтобы выработать соглашение. \n\nВ результате Лионский конгресс оказался успешным. Германские войска прекратят оккупацию, а [NFA.GetNameDef] согласилась на различные военные ограничения и выплату репараций. Многие считают, что эти результаты благоприятствуют Алжиру."
 worldnews.478.a: "Законное правительство вернулось!"
 worldnews.478.b: "Триумф дипломатии!"
 worldnews.478.c: "Почему они не смогли договориться раньше?"
 worldnews.478.e: "Неужели у Алжира нет достоинства!?"

 worldnews.479.t: "Реставрация Сёва"
 worldnews.479.d: "Сообщения из Токио в последние несколько недель были скудными, но теперь немногие могут сомневаться в том, что японская демократия мертва. После того как правительство не смогло принять меры против зарождающегося в стране движения синдикалистов, консервативные офицеры совершили государственный переворот, сместив премьер-министра и установив военную диктатуру. Но даже это оказалось временным - офицеры, принадлежащие к конкурирующей фракции реставраторов, начали контрпереворот. На улицах величайшего города Азии, залитого кровью, они объявили о Реставрации Сёва - восстановлении высшей власти Императора и возрождении Японии, свободной от развращающего влияния синдикализма, демократии и западного влияния."
 worldnews.479.a: "Сонно токан!"
 worldnews.479.b: "О нет..."

 worldnews.480.t: "Военный переворот в Японии"
 worldnews.480.d: "Сообщения из Токио за последние несколько недель были скудными, но сейчас кажется, что японская демократия мертва. После многих лет междоусобиц, скандалов и коррупции среди политических партий радикальные офицеры-реставраторы совершили государственный переворот, стремясь превратить страну в ультранационалистический режим. В конечном итоге, похоже, их усилия оказались напрасными - верные правительству войска смогли провести контрпереворот и успешно разгромить повстанцев. Тем не менее, этот эпизод, несомненно, показал слабость сторон. Япония фактически превратилась в военную диктатуру, руководящими принципами которой являются национализм, корпоративизм и милитаризм."
 worldnews.480.a: "Банзай!"
 worldnews.480.b: "О нет..."

 worldnews.481.t: "Полет [MAF.GetLeader]"
 worldnews.481.d: "ДАР-ЭС-САЛАМ. Ранним рассветом одинокий самолет совершил незапланированный взлет. Хотя административная столица немецкой Африки стала в некотором роде горячей точкой для авиации, отсутствие надлежащего разрешения на этот полет, а также время, в которое произошло это событие, не могли не вызвать тревоги.\n\nИстинное значение инцидента, однако, выяснилось только тогда, когда в штаб-квартире немецкой администрации начался рабочий день. Ни Штатгальтера, ни денежных резервов правительства обнаружить не удалось. Ведущая версия заключается в том, что Штатгальтер сам присвоил средства, прежде чем покинуть свой пост. Остается только догадываться, что это означает для немецкого колониального управления в регионе."
 worldnews.481.a: "Кто бы мог подумать, что свиньи могут летать?"
 worldnews.481.b: "Он сделал ЧТО?"

 worldnews.482.t: "Олимпийские игры 1936 года в Дублине"
 worldnews.482.d: "Одиннадцатые Олимпийские игры недавно прошли в Дублине, Ирландия.\n\nПоказав столицу молодой республики, игры стали для нее большим предметом гордости. В очередной раз французские и британские делегаты отсутствовали, синдикалистские силы не были признаны Международным олимпийским комитетом, а правительствам в изгнании не хватало людей.\n\nГерманские и американские спортсмены добились наибольшего успеха, завоевав 27 и 26 медалей, в то время как ирландские спортсмены показали результаты выше среднего, завоевав 9 медалей."
 worldnews.482.a: "Ирландия снова побеждает!"
 worldnews.482.b: "Будем надеяться, что мы сможем принять участие в следующих Олимпийских играх..."
 worldnews.482.c: "Элитарный бред."
 worldnews.482.e: "Мы сделали все возможное!"

 worldnews.483.t: "Олимпийские игры 1940 года в Токио"
 worldnews.483.d.war: "Двенадцатые Олимпийские игры планировалось провести в Токио, Япония, но обстоятельства привели к их отмене.\n\nПоскольку [JAP.GetNameDef] оказалась в состоянии войны, средства на проведение игр отсутствуют, а безопасность спортсменов вызывает опасения. Впервые после Великой войны Олимпийские игры отменены.\n\nЯпонское правительство попыталось пролоббировать в Международном олимпийском комитете проведение следующих игр, но неясно, смогут ли игры пережить кризис."
 worldnews.483.d.def: "Двенадцатые Олимпийские игры планировалось провести в Токио, Япония, но обстоятельства привели к их отмене.\n\nПока [JAP.GetNameDef] восстанавливает себя после поражения в войне, средства на проведение игр отсутствуют. Впервые после Великой войны Олимпийские игры отменены.\n\nЯпонское правительство попыталось пролоббировать в Международном олимпийском комитете проведение следующих игр, но неясно, смогут ли игры пережить кризис."
 worldnews.483.d.paz: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nЯвляясь первой незападной страной, принимающей соревнования, японское правительство вложило значительные средства в то, чтобы они прошли на высоком уровне. Хотя недавние международные беспорядки поставили под сомнение целесообразность проведения игр, они все же состоялись, хотя на них присутствовало значительно меньше стран, чем на прошлых играх.\n\nНаибольшего успеха добились немецкие и американские спортсмены, завоевавшие 32 и 21 медаль, в то время как японские спортсмены показали результаты выше среднего, завоевав 16 медалей."
 worldnews.483.d.ger: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nЯвляясь первой незападной страной, принимающей соревнования, японское правительство вложило значительные средства в то, чтобы они прошли на высоком уровне. Хотя недавние международные беспорядки поставили под сомнение целесообразность проведения игр, они все же состоялись, хотя на них присутствовало значительно меньше стран, чем на прошлых играх.\n\nНаибольшего успеха добились немецкие спортсмены, завоевавшие 34 медали, в то время как японские спортсмены показали результаты выше среднего, завоевав 16 медалей. Из-за продолжающейся Гражданской войны в США Соединенные Штаты не участвовали в играх."
 worldnews.483.d.usa: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nЯвляясь первой незападной страной, принимающей соревнования, японское правительство вложило значительные средства в то, чтобы они прошли на высоком уровне. Хотя недавние международные беспорядки поставили под сомнение целесообразность проведения игр, они все же состоялись, хотя на них присутствовало значительно меньше стран, чем на прошлых играх.\n\nАмериканские спортсмены добились наибольшего успеха, завоевав 34 медали, в то время как японские спортсмены показали результаты выше среднего, завоевав 16 медалей. Из-за продолжающейся войны [GER.GetNameDef] не приняла участие в соревнованиях."
 worldnews.483.d.jap: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nЯвляясь первой незападной страной, принимающей соревнования, японское правительство вложило значительные средства в то, чтобы они прошли на высоком уровне. Хотя недавние международные беспорядки поставили под сомнение целесообразность проведения игр, они все же состоялись, хотя на них присутствовало значительно меньше стран, чем на прошлых играх.\n\nИз-за отсутствия американских и немецких спортсменов, больше всего медалей завоевали команды России и Японии, получившие 26 и 22 медали соответственно."
 worldnews.483.a: "Так нечестно, это было наше!"
 worldnews.483.b: "Удачи в следующий раз..."
 worldnews.483.c: "Еще одно великолепное выступление!"

 worldnews.484.t: "Провозглашение Турецкой Республики"
 worldnews.484.d: "После поражения Османской Империи в Войне в пустыне турки страдали от внутренней борьбы и политических потрясений. Правительства были свергнуты, народ становился все более несчастным, а сама идентичность турецкой нации была поставлена под сомнение. Однако под руководством [TUR.GetLeader] новое правительство сумело завоевать доверие населения, и хаос начал утихать.\nСегодня [TUR.GetLeader] провозгласил рождение Турецкой Республики, предвещая новую эру для народа Анатолии. Тем самым он официально упразднил Османскую Империю, которая существовала сотни лет и когда-то считалась 'вечным государством'. Теперь на ее месте возникло более демократическое и в целом современное государство, которое обещает принести турецкому народу светлое будущее."
 worldnews.484.a: "Последний гвоздь в гроб империи..."

 worldnews.485.t: "Гражданская война в Италии возобновляется"
 worldnews.485.d.srioffensive: "С тех пор как двадцать лет назад в Италии было заключено перемирие, положившее конец Гражданской войне, в стране установился непростой мир. Однако после Черного Понедельника и вывода австрийских войск с итальянского полуострова мало кто полагал, что мир продлится долго. \n\nПосле роста напряженности в мире, Итальянская Социалистическая Республика взяла на себя инициативу и объявила войну противостоящему итальянскому режиму, осудив его как 'искусственное государство, поддерживаемое империалистическими державами', и поклявшись осуществить объединение Италии. Добровольцы и боеприпасы начали поступать из крупнейших мировых держав, надеющихся закрепить итальянский полуостров в своей сфере влияния, поскольку в стране вновь разгорелась спящая гражданская война."
 worldnews.485.d.sridefensive: "С тех пор как двадцать лет назад в Италии было заключено перемирие, положившее конец Гражданской войне, в стране установился непростой мир. Однако после Черного Понедельника и вывода австрийских войск с итальянского полуострова мало кто полагал, что мир продлится долго. \n\nК удивлению международных наблюдателей, антисиндикалистские режимы в Италии взяли на себя инициативу и объявили войну [SRI.GetNameDef], осудив их как марионеточное государство, управляемое из Парижа, и поклявшись осуществить объединение Италии. Добровольцы и грузы начали поступать из основных мировых блоков, надеясь закрепить итальянский полуостров в своей сфере влияния, поскольку в стране вновь разгорелась спящая гражданская война."
 worldnews.485.a: "Обретет ли Италия когда-нибудь мир?"
 worldnews.485.b: "Мы одержим победу!"

 worldnews.486.t: "Хаос в Аравии!"
 worldnews.486.d: "После победы Ихвана в недавнем восстании против предыдущего правительства Аравии, в стране начался террор и хаос. В попытках Фейсала аль-Дувайша закрепить власть в пустынях Аравии, различные фракции и племена подняли восстание против его правления.\n\nДувайш уже привлек на свою сторону верных соплеменников, в то время как другие фракции делают то же самое. Неизвестно, вмешаются ли османы в этот хаотичный конфликт, и как это повлияет на баланс сил на Ближнем Востоке. Однако только время покажет, чем обернется возобновление кровопролития в Аравии."
 worldnews.486.a: "Беспокойно..."
