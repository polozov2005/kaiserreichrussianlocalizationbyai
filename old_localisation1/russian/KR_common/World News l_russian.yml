 worldnews_wk2_neutral_USA: "Война - это ад."
 worldnews_wk2_neutral_other: "Война - это ад."

# Russia starts the war
 worldnews.1.t: "Россия вторгается в Рейхспакт"
 worldnews.1.d.starts_wk: "Вот уже два десятилетия Германия и Россия живут в мире. Несмотря на вражду, возникшую после поражения России в Великой войне, цена пяти лет внешней и гражданской войны была очень высокой - и ни одна из сторон не хотела повторить ее снова. Не все были уверены, что это надолго.\n\nСегодня скептики оказались правы: после многих лет военного перевооружения и реваншистских настроений Россия отказалась от Брест-Литовского договора и заявила о своем намерении силой отменить то, что она называет немецким господством над Восточной Европой. В то время как Германия и ее союзники мобилизуются против этой давно ожидаемой угрозы, поступают сообщения о российских артиллерийских ударах по немецким позициям по ту сторону российской границы - начало второй за последнее поколение большой войны, которая потрясет европейский континент."
 worldnews.1.d.joins_wk: "Хотя начало войны между Интернационалом и Германией давно ожидалось, оно стало настоящим потрясением - в последний раз война между великими державами Европы быстро охватила весь континент. Даже если бы они не стали действовать мгновенно, уже было очевидно, что Россия, давний враг Германии на востоке, в последние годы становится все более воинственной.\n\nПосле долгих ожиданий, [RUS.GetLeader] выступил сегодня рано утром с речью, в которой заявил, что в свете последних лет, гегемония Германии над миром никогда не была таким мифом. Хотя в речи лишь косвенно упоминалась война, в остальном речь была воинственной - и за ней последовали агрессивные армейские действия вдоль границы России. Германия снова вынуждена вести войну на два фронта."
 worldnews.1.d.sov: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на их идеологическое противостояние, ужасы Великой войны тяготили всех - и ни одна из сторон не была готова к их повторению. Не все были уверены, что это продлится долго.\n\nСегодня скептики оказались правы: после многих лет военного перевооружения и реваншистских настроений Россия отказалась от Брест-Литовского договора и заявила о своем намерении силой отменить то, что она называет немецким господством над Восточной Европой. В то время как Германия и ее союзники мобилизуются против этой долгожданной угрозы, остальной Интернационал издает собственные мобилизационные приказы в поддержку своего союзника - это начало Второй Великой войны за одно поколение, которая потрясет европейский континент."
 worldnews_rus_vs_ger_RUS: "Мы пройдем маршем через Бранденбургские ворота."
 worldnews_rus_vs_ger_GER: "Готовьте Оствалл."
 worldnews_rus_vs_ger_GER_allies: "Наши узы не будут разорваны."
 worldnews_rus_vs_ger_FRA: "Германия наконец-то показывает слабость..."
 worldnews_rus_vs_ger_ENG: "Полагаю, время почти пришло."
 worldnews_rus_vs_ger_INT_allies: "Война, которая подтолкнет народ к оружию."
 worldnews_rus_vs_ger_NFA: "Их битва бросает тень на Францию..."
 worldnews_rus_vs_ger_ENT: "Социалисты не могли упустить такой шанс, конечно..."
 worldnews_rus_vs_ger_ENT_allies: "И если Германия занята на востоке, то..."
 worldnews_rus_vs_ger_JAP: "Пусть дерутся..."

# France starts the war
 worldnews.2.t: "Война в Западной Европе"
 worldnews.2.d.starts_wk: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на их идеологическое противостояние, ужасы Великой войны тяготили всех - и ни одна из сторон не была готова к их повторению. Не все были уверены, что это продлится долго.\n\nСегодня скептики оказались правы: после многих лет растущего реваншизма и военной экспансии французское правительство в Париже официально заявило, что оно больше не связано Версальским договором, и объявило революционную войну, чтобы вернуть утраченные территории и освободить немецкий пролетариат, а Берлин в ответ осудил Францию как государство-изгой. Французские и немецкие войска уже обмениваются огнем вдоль Эльзас-Лотарингии - это начало второй за последнее поколение большой войны, которая потрясет европейский континент."
 worldnews.2.d.joins_wk: "Хотя начало войны между Россией и Германией давно ожидалось, оно стало драматическим потрясением - в последний раз война между великими державами Европы быстро охватила весь континент. Даже если бы они не стали действовать мгновенно, все могли видеть, что Третий Интернационал, соперник Германии на западе, в последние годы становится все более настойчивым.\n\nПосле нескольких напряженных недель, [FRA.GetLeader] выступил с речью сегодня рано утром, назвав войну 'искрой последнего конфликта' и заявив, что Франция обязана действовать в этот решающий момент. Хотя в речи не было прямого упоминания России, намерения в отношении Германии были очевидны, что подтверждается крупными перемещениями армии вдоль Эльзас-Лотарингии. Германия снова должна вести войну на два фронта."
 worldnews_int_vs_ger_FRA: "Встаньте, узники голода."
 worldnews_int_vs_ger_ENG: "И Британия будет там."
 worldnews_int_vs_ger_RUS_socialist: "Мы сделаем то, что не смог сделать Керенский."
 worldnews_int_vs_ger_INT_allies: "Финальный конфликт."
 worldnews_int_vs_ger_GER: "Германия, объединившись, никогда не была побеждена."
 worldnews_int_vs_ger_GER_allies: "Революция закончится здесь."
 worldnews_int_vs_ger_RUS: "Но если Германия отвлечется на запад..."
 worldnews_int_vs_ger_NFA: "Пусть коммунары подавятся своими амбициями."
 worldnews_int_vs_ger_ENT: "Вот оно. У нас никогда не будет лучшего шанса."
 worldnews_int_vs_ger_ENT_allies: "Их война, которая скоро станет нашей."
 worldnews_int_vs_ger_JAP: "Запад смотрит в сторону..."

# Germany starts the war, vs Russia
 worldnews.3.t: "Германия вторгается в Россию"
 worldnews.3.d.starts_wk: "Вот уже два десятилетия Германия и Россия живут в мире. Несмотря на враждебность, оставшуюся после поражения России в Великой войне, цена пяти лет внешней и гражданской войны была высокой - и ни одна из сторон не хотела вновь повторять ее. Не все были уверены, что это надолго.\n\nСегодня скептики оказались правы: после многих лет растущей милитаризации и вызовов немецкому мировому порядку, Германия заявила, что Россия неоднократно нарушала Брест-Литовский договор, и решила еще раз заставить Россию соблюдать его. Поскольку Россия отвергла немецкий ультиматум, немецкие войска были замечены в начале боевых действий по всей российской границе, от Балтики до Черного моря - начало второй за последнее поколение большой войны, которая потрясет европейский континент."
 worldnews.3.d.joins_wk: "Хотя начало войны между Интернационалом и Германией давно ожидалось, оно стало драматическим потрясением - в последний раз, когда между великими державами Европы была война, она быстро охватила весь континент. Даже если бы они не стали действовать мгновенно, уже было очевидно, что Россия, давний враг Германии на востоке, в последние годы становится все более воинственной.\n\nНикто не ожидал, что Германия выстрелит первой - только сегодня канцлер Германии обвинил Россию в систематическом подрыве Брест-Литовского договора и глобальной стабильности в целом наряду с Интернационалом в наглой попытке вновь установить свое господство над Восточной Европой - перед тем, как отдать приказ о нападении вдоль российской границы. И снова Германия вынуждена вести войну на два фронта."
 worldnews.3.d.sov: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на их идеологическое противостояние, ужасы Великой войны тяготили всех - и ни одна из сторон не была готова к их повторению. Не все были уверены, что это продлится долго.\n\nСегодня скептики оказались правы: после многих лет растущей милитаризации и вызовов немецкому мировому порядку Германия обвинила Россию в неоднократном нарушении Брест-Литовского договора, одобренного Третьим Интернационалом, и заявила о своем намерении обеспечить выполнение договора. Социалистические правительства в Европе и за ее пределами мобилизуют свои армии и клянутся выступить на защиту России - это начало Второй Великой войны за одно поколение, которая потрясет европейский континент."
 worldnews_ger_vs_rus_RUS: "Тогда они присоединятся к Наполеону."
 worldnews_ger_vs_rus_GER: "На этот раз мы не будем останавливаться на достигнутом."
 worldnews_ger_vs_rus_GER_allies: "Наши снова будут победившей стороной"
 worldnews_ger_vs_rus_FRA: "Враг моего врага..."
 worldnews_ger_vs_rus_ENG: "Неужели они серьезно!"
 worldnews_ger_vs_rus_INT_allies: "Долго им это с рук не сойдет"
 worldnews_ger_vs_rus_NFA: "Вы не думаете, что есть что-то более важное?"
 worldnews_ger_vs_rus_ENT: "Ужасное чувство приоритета!"
 worldnews_ger_vs_rus_ENT_allies: "Если Германия чертовски хочет отвлечься..."
 worldnews_ger_vs_rus_JAP: "Ха! Пусть они сотрут друг друга в порошок."

# Germany starts the war, vs Internationale
 worldnews.4.t: "Война в Западной Европе"
 worldnews.4.d.starts_wk: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на их идеологическое противостояние, ужасы Великой войны тяготили всех - и ни одна из сторон не была готова к их повторению. Не все были уверены, что это продлится долго.\n\nСегодня скептики оказались правы: после нескольких лет растущей милитаризации и вызовов немецкому мировому порядку, Берлин обвинил Интернационал в попытке подорвать мир и стабильность в Европе и за рубежом, и заявил о намерении силой свергнуть революционные правительства. В то время как Париж и его союзники клянутся отомстить реакции, французские позиции под Верденом, Нанси и другими городами снова подверглись обстрелу - начало второй за поколение большой войны, которая сотрясает европейский континент."
 worldnews.4.d.joins_wk: "Хотя начало войны между Россией и Германией давно ожидалось, оно стало драматическим потрясением - в последний раз, когда между великими державами Европы была война, она быстро охватила весь континент. Даже если бы они не действовали мгновенно, все могли видеть, что Третий Интернационал, соперник Германии на западе, в последние годы становится все более настойчивым.\n\nНо никто не ожидал, что Германия выстрелит первой - сегодня рано утром канцлер Германии обвинил Интернационал в организации дестабилизации во всем мире и помощи России в рамках 'лиги хаоса', предполагаемые действия были названы актами войны - и вслед за этим мобилизовал Хеер вдоль французской границы. И снова Германия должна вести войну на два фронта."
 worldnews_ger_vs_int_FRA: "Они не пройдут."
 worldnews_ger_vs_int_ENG: "Мы будем держать здесь красный флаг."
 worldnews_ger_vs_int_RUS_socialist: "Но это не 1917 год."
 worldnews_ger_vs_int_INT_allies: "Они не смогут избежать удара истории."
 worldnews_ger_vs_int_GER: "Эта революция будет подавлена."
 worldnews_ger_vs_int_GER_allies: "Другого выбора не было."
 worldnews_ger_vs_int_RUS: "Пусть они никогда не увидят Париж."
 worldnews_ger_vs_int_NFA: "Коммуна обрекает Францию на новые унижения."
 worldnews_ger_vs_int_ENT: "Это заняло у них достаточно много времени."
 worldnews_ger_vs_int_ENT_allies: "Германия наконец-то исправляет свою ошибку."
 worldnews_ger_vs_int_JAP: "Германия перенапрягается."
 
 worldnews.7.t: "Дунайский кризис"
 worldnews.7.d.pluralism: "Во время Австро-Венгерского Аусглейха 1937 года, австрийцы обещали автономным государствам своей империи, что меньшинства в Транслейтании также получат автономию. Венгры, однако, не желали принуждать к расформированию своего государства и упразднению привилегий в рамках монархии. В результате австрийцы объявили о своем намерении одновременно унизить Венгрию и силой освободить словаков, трансильванцев и русинов, а вдоль австро-венгерской границы уже начались стычки. Только время покажет судьбу бывшей дуальной монархии."
 worldnews.7.d.illyria: "Во время Австро-Венгерского Аусглейха 1937 года, австрийские делегаты пообещали своему венгерскому коллеге, что историческое королевство Хорватия - присоединенное к новосозданному десять лет назад королевству Иллирия - будет возвращено в транслейтанскую половину империи. Венгры вскоре попытались вторгнуться в Хорватию-Славонию, но на границе их встретили иллирийские войска, которые отказались впустить венгров на свою землю. Стычки между венграми и иллирийцами переросли в войну, которая развязала две державы Дуальной монархии в Австрии и Венгрии против прежних автономных составляющих, все из которых опасаются возрождения Дуализма. Галиция-Лодомерия, однако, находится под пристальным вниманием соседей..."
 worldnews.7.d.hungary: "Во время Австро-Венгерского Аусглейха 1937 года, австрийские делегаты пообещали своему венгерскому коллеге, что историческое королевство Хорватия - присоединенное к новосозданному десять лет назад королевству Иллирия - будет возвращено в транслейтанскую половину империи. Венгры вскоре потребовали, чтобы Вена выполнила свою часть сделки, но имперское правительство неожиданно отказалось. Разгневанные венгры попытались силой вернуть Хорватию-Славонию, но были отброшены иллирийскими войсками. Теперь Австрия вступила в конфликт на стороне иллирийцев, пообещав покончить с венгерскими заблуждениями о господстве над империей."
 worldnews.7.a: "Стабильность Центральной Европы находится под угрозой."
 worldnews.7.b: "Противоречия империализма очевидны."

 worldnews.10.t: "Австро-Венгерская федерализация"
 worldnews.10.d: "В течение последних нескольких десятилетий, Австро-Венгерская империя децентрализовала полномочия из Вены и Будапешта, наиболее заметным событием стало создание Иллирии в 1927 году. Теперь этот процесс совершил еще один большой скачок вперед с созданием [AUS.GetNameDef]. Монархия реорганизовала свои внутренние структуры, чтобы сделать их более представительными, одновременно институционно сблизив свои земли. С заменой децентрализованной, распадающейся империи - единым государством, баланс сил в Европе сместился в сторону всех противников статуса-кво и Габсбургов."
 worldnews.10.a: "Это действительно что-нибудь изменит?"
 worldnews.10.b: "Их консервативная "реформа" не сможет остановить революцию!"
  
 worldnews.13.t: " "Наш Звёздный Час""
 worldnews.13.d: "Известный британский лорд и член парламента, Уинстон Черчилль, написал новую книгу — первую крупную работу по альтернативной вселенной.\n\nЗахватывающая история рассказывает о ветеране Великой войны, который пытается выжить в разорванной войной Германии. В этой вселенной Теодор Рузвельт и его Прогрессивная партия одержали победу на президентских выборах в 1912 году, а позже вмешались в войну, тем самым определив победу Антанты. Униженная и побежденная Германия разрывается политическими, экономическими кризисами и иностранными интервенциями, что в конечном итоге приводит к власти радикального националиста Адама Дресслера и его Немецкую Рабочую Партию, идеологией которой является 'Валькизм', который подозрительно похож на нынешний национал-популизм.\n\nРоман кончается войной между 'Германским Рейхом' Дресслера, Континентальной Антантой и Советской Россией, возглавляемой Сергеем Кировым. Многие критикуют книгу за ее излишнюю фантастичность и отсутствие исторической логики, но Черчилль утверждает, что 'такое вполне могло произойти в другой вселенной'."
 worldnews.13.a: "Наивные фантазии."
 
 worldnews.16.t: "Война Аргентины и Чили!"
 worldnews.16.d: "Идеологические распри между двумя региональными лидерами Южной Америки зашли слишком далеко. Неспособность Аргентины побороть повстанцев в Патагонии привели к тому, что Армада была обстреляна чилийскими кораблями. Данный инцидент перерос в открытую войну, которая определит будущее Южной Америки."
 worldnews.16.a: "Ужасно."
 worldnews.16.b: "Аргентина будет единой!"
 
 worldnews.17.t: "Каирский конгресс"
 worldnews.17.d: "Многие лидеры Ближнего востока от Ирана до Триполитании собрались сегодня в Каире, чтобы обсудить вопрос с османами. Многие считают, что Египет станет главным в этом конгрессе: он намеревается построить Ближний Восток без турецкого влияния. Время покажет, что из этого всего выйдет."
 worldnews.17.a: "Звучит до странного знакомым."
 
 worldnews.18.t: "Учреждение Белградского Договора"
 worldnews.18.desc_rom_gre: "Сербия, Румыния и Греция — три балканских члена Антанты с реваншистскими взглядами, недавно собрались за столом переговоров и объявили о создании Белградского Договора. Основной задачей договора является сохранение культурной идентичности народов Балкан, но это также и военный союз, направленный против нынешних держателей 'земли предков'.\n\nЭто большой удар по болгарской гегемонии в регионе, но только реакция со стороны Центральных Держав определит будущее."
 worldnews.18.desc_only_romania: "Сербия и Румыния — два балканских члена Антанты с реваншистскими взглядами, недавно собрались за столом переговоров и объявили о создании Белградского Договора. Основной задачей договора является сохранение культурной идентичности народов Балкан, но это также и военный союз, направленный против нынешних держателей 'земли предков'.\n\nЭто большой удар по болгарской гегемонии в регионе, но только реакция со стороны Центральных Держав определит будущее."
 worldnews.18.desc_only_greece: "Сербия и Греция — два балканских члена Антанты с реваншистскими взглядами, недавно собрались за столом переговоров и объявили о создании Белградского Договора. Основной задачей договора является сохранение культурной идентичности народов Балкан, но это также и военный союз, направленный против нынешних держателей 'земли предков'.\n\nЭто большой удар по болгарской гегемонии в регионе, но только реакция со стороны Центральных Держав определит будущее."
 worldnews.18.a: "Надеюсь, Балканы не начнут очередную Великую Войну."
 worldnews.18.b: "Вместе против Болгарии!"
 worldnews.18.c: "Это нехорошо..."
 
 worldnews.19.t: "Пятая Англо-Афганская война"
 worldnews.19.d: "После Великой Войны Индийский Доминион оказался на грани катастрофы, и Королевство Афганистан воспользовалось моментом, аннексировав Пешавар и Кветту. Осознавая, что это лишь временная победа, король Аманула Хан пытался провести реформы, но все они натолкнулись на резкую оппозицию в стране. Теперь король Афганистана снова пытается воспользоваться кризисом, возникшим после смерти Георга V. Маленькой победоносной войной король надеется удовлетворить консервативную оппозицию и расширить свои владения. Но эксперты считают, что Афганистан не выдержит второй войны."
 worldnews.19.a: "Кому есть дело до Афганистана?"
 
 worldnews.24.t: "Освальд Мосли избран Председателем Конгресса"
 worldnews.24.d: "Конгресс Профсоюзов 1936 года стал решающим. Предыдущий председатель конгресса, Филипп Сноуден, объявил о своем уходе, вызвав тем самым борьбу между крупнейшими фракциями Союза: Максимистами, Автономистами, Федерационистами и Конгрегационистами.\n\n Как только осела пыль, Освальд Мосли, лидер Максимистов и идеолог Тотализма, был назначен новым Председателем. Партия Мосли выступает за усиление роли государства во всех сферах жизни, являясь самой радикальной, милитаристической и националистической партией Британии."
 worldnews.24.a: "Интересно"
 
 worldnews.25.t: "Николас Глейс избран Председателем Конгресса"
 worldnews.25.d: "Конгресс Профсоюзов 1936 года стал решающим. Предыдущий председатель конгресса, Филипп Сноуден, объявил о своем уходе, вызвав тем самым борьбу между крупнейшими фракциями Союза: Максимистами, Автономистами, Федерационистами и Конгрегационистами.\n\n Как только осела пыль, Уэльский поэт и лидер автономистов, Николас Глейс, был выбран Председателем. Автономисты выступают за дальнейшую децентрализацию Британии и даже большую автономию шотландцам и валлийцам, возможно, даже полную независимость."
 worldnews.25.a: "Британский синдикализм распадается сам собой..."
 
 worldnews.26.t: "Сильвия Панкхёрст избрана Председателем Конгресса"
 worldnews.26.d: "Конгресс Профсоюзов 1936 года стал решающим. Предыдущий председатель конгресса, Филипп Сноуден, объявил о своем уходе, вызвав тем самым борьбу между крупнейшими фракциями Союза: Максимистами, Автономистами, Федерационистами и Конгрегационистами. \n\nКак только осела пыль, Сильвия Панкхёрст, лидер Конгрегационистов, была избрана председателем, или председательницей в данном случае. Панкхёрст - одна из немногих женщин планеты, которые имеют власть. Её программа основана на радикальном феминизме и всеобщем равенстве."
 worldnews.26.a: "Радикальный феминизм? Это что вообще за идеология?"
 
 worldnews.27.t: "Артур Хорнер избран Председателем Конгресса"
 worldnews.27.d: "Конгресс Профсоюзов 1936 года стал решающим. Предыдущий председатель конгресса, Филипп Сноуден, объявил о своем уходе, вызвав тем самым борьбу между крупнейшими фракциями Союза: Максимистами, Автономистами, Федерационистами и Конгрегационистами.\n\n Как только осела пыль, Артур Хорнер, нынешний Генсек, был выбран преемником Филиппа Сноудена. Ему и его Федерационистам выгодно сохранить статус-кво, что становится все труднее в этом меняющемся мире."
 worldnews.27.a: "Ничего нового в синдикалистских землях."
 
 worldnews.28.t: "Эдуард VIII коронован Королем Британии"
 worldnews.28.d: "Георг V, последний король Великобритании и Ирландии, правивший Британскими островами, ушел из жизни в изгнании в Канаде. Правление первого короля из династии Виндзоров запомнится горечью и печалью из-за проигрыша Великой Войны и потери островов. Корона перешла Эдуарду, принцу Уэльскому, который провозгласил себя Эдуардом VIII. \n\n Король Эдуард, мстительный и амбициозный человек, находится в плохих отношениях с Премьер-Министром Макензи Кингом. Он живет одной мечтой вернуться на Британские острова, и поэтому крайне популярен среди английских изгнанников."
 worldnews.28.a: "Посмотрим, на что он способен"

 worldnews.37.t: "Четвертая Балканская война"
 worldnews.37.d: "Страна, возрожденная после Великой Войны, Великая Болгария, Атлант полуострова, объединившая всех болгар и не только. Болгарское Царство родилось через пот и кровь войны, через победу Сербии, Греции и Румынии в Великой Войне, о чем все прекрасно помнят и сейчас. \n\nЭта память и создала Белградский Договор, объявивший войну Болгарии и ввергнувший регион в хаос. Спасет ли Борис III свой народ, или его Царство снова разделят?"
 worldnews.37.a: "Что не так с этими Балканами?"
 worldnews.37.b: "Вместе к победе!"
 worldnews.37.c: "Борис защитит всех нас!"
 
 worldnews.43.t: "Вильнюсское восстание"
 worldnews.43.d: "В течение многих лет LAF бродит по лесам Литвы, ведя жестокую партизанскую войну против литовского правительства. Будучи крайне националистически настроенными, LAF проповедуют антигерманскую риторику, а также призывы к созданию истинно этнического литовского государства, что привлекает радикалов из ультраправых сил.\n Однако, похоже, что неспособность литовского правительства усмирить LAF привела к открытому восстанию в Литве. Во главе со своим лидером Аугустинасом Вольдемарасом, войска LAF гордо маршируют по улицам Вильнюса, официально отделяя Литву от немецкой нации. Хотя Литва может наслаждаться вновь обретенной полной независимостью, маловероятно, что Германская Империя будет терпеть такую угрозу на своих восточных границах. Наблюдатели отмечают, что конфликт неизбежен, и свобода Литвы может быть недолгой..."
 worldnews.43.a: "Посмотрим, как долго они продержатся."
 
 worldnews.50.t: "Война в пустыне"
 worldnews.50.d: "Арабский национализм и турецкий империализм, наконец, оказались в противоречии, так как переговоры по синайско-палестинскому вопросу потерпели крах после того, как Египет промаршировал свою армию через Синайскую пустыню. Номинально объединенные до 1914 года, две ведущие державы на Ближнем Востоке теперь взяли курс на решение судьбы Ближнего Востока. Несмотря на то, что египтяне могут рассчитывать на множество союзников в других арабских государствах, многие опасаются, что этого будет недостаточно, так как военный и экономический потенциал Турецкой империи до сих пор значительно превосходит потенциал ее соперника.\n\n Иностранные инвесторы смотрят на конфликт со страхом, так же как и на нефтяные резервуары Ближнего Востока, стали более важными, чем когда-либо, после падения власти в США."
 worldnews.50.a: "А как же нефть?"
 worldnews.50.b: "Мы не можем допустить падения империи"

 worldnews.58.t: "Победа демократии в Филиппинах"
 worldnews.58.d: "Только что добившись независимости от Соединенных Штатов, Филиппины столкнулись с одной из самых страшных проблем для новой страны. Вдохновленные примером Объединенных Синдикатов и Коммуны Бхарата, раздраженные офицеры пошли маршем на Манилу, чтобы поддержать бунтующих крестьян и рабочих.\n\n К счастью, их попытка переворота окончилась полным поражением, так как лоялисты в армии сумели заручиться поддержкой и выбив повстанцев из города, тем самым уничтожив всякую возможность синдикалистского переворота еще до ее появления."
 worldnews.58.a: "Однажды, они к нам вернутся."
 worldnews.58.b: "Уроки США не прошли даром."
 
 worldnews.59.t: "Военная хунта в Филиппинах"
 worldnews.59.d: "Только что добившись независимости от Соединенных Штатов, Филиппины столкнулись с одной из самых страшных проблем для новой страны. Вдохновленные примером Объединенных Синдикатов и Коммуны Бхарата, раздраженные офицеры пошли маршем на Манилу, чтобы поддержать бунтующих крестьян и рабочих.\n\n К счастью, их попытка переворота окончилась полным поражением, так как лоялисты в армии сумели заручиться поддержкой и выбив повстанцев из города. Но высшие армейские чины решили захватить власть в свои руки, чтобы сохранить стабильность в Филиппинах 'в ближайшем будущем'."
 worldnews.59.a: "Настораживает."
 
 worldnews.60.t: "Синдикализм в Филиппинах"
 worldnews.60.d: "Только что добившись независимости от Соединенных Штатов, Филиппины столкнулись с одной из самых страшных проблем для новой страны. Вдохновленные примером Объединенных Синдикатов и Коммуны Бхарата, раздраженные офицеры пошли маршем на Манилу, чтобы поддержать бунтующих крестьян и рабочих.\n\n К сожалению, синдикализм слишком глубоко засел в головах, и военные чиновники уже объявили о поддержке синдикалистского движения. Правительство, заручившись поддержкой лишь пары дивизий, не захотело провоцировать гражданскую войну и согласилось на все требования."
 worldnews.60.a: "Синдикализм даже в Азии!"
 
 worldnews.61.t: "Синдикализм в Бирме"
 worldnews.61.d: "После ряда неудачных решений бирманского правительства, кульминацией которых стало приказание Татмадо открыть огонь по протестующим студентам и рабочим, вся страна обратилась против республики У Ба Пе. Недавно созданный Национальный совет формирует новое синдикалистское правительство и, как сообщается, уже рассматривает возможность поиска внешних сильных союзников-единомышленников."
 worldnews.61.a: "Революция неостановима."
 
 worldnews.62.t: "Восстание Рэнда завершилось"
 worldnews.62.d: "Промышленная база Южной Африки, Ранд, уже давно является очагом синдикализма. До сих пор интересы белых рабочих никак не могли примириться с интересами коренного населения. Мало кто ожидал, что крупнейшая федерация профсоюзов Южной Африки, Южноафриканский Совет торговли и труда, Союз Промышленников и Коммерсантов и многорасовая Международная Социалистическая Лига преодолеют свои разногласия и свергнут доминионное правительство Южной Африки.\nУже сообщается о трениях между белыми и цветными социалистами в новой администрации, требующими права для старых расовых низших классов играть ведущую роль в новом правительстве. Неизвестно, сможет ли синдикализм выжить без ущерба для своей идентичности в этой враждебной политической среде."
 worldnews.62.a: "Красная Гидра достигла Черного континента?!"
 worldnews.62.b: "Интернационал объединяет человечество!"
 
 worldnews.63.t: "Принятие закона о предоставлении "цветных" избирательных прав"
 worldnews.63.d: "Удивительные новости из Южной Африки: их парламент, также известный как Фольксраад, одобрил продвигаемый правительством закон о предоставлении избирательных прав южноафриканцам смешанного происхождения, известным в стране как "цветные". \n\nОпасения, что сделка будет сорвана оппозицией и консервативными элементами в правительственных рядах, не оправдались. Либеральный министр-африканер и автор законопроекта Ян Хендрик Хофмейр прокомментировал, что это лишь первый шаг в постепенном переходе Южной Африки, которая будет действительно справедливой по отношению ко всем своим гражданам. Другие союзники в Фольксрааде поспешили добавить предостережение, что они не собираются ставить под угрозу интересы белого населения Южной Африки в этом процессе."
 worldnews.63.a: "Новый курс в ЮАР."
 
 worldnews.64.t: "Начало Третьей Англо-Бурской войны"
 worldnews.64.d: "Негодование между голландскими и британскими колонистами в Южной Африке, зреет под поверхностью с момента окончания Второй Англо-Бурской войны: первые в основном преследуют цель развода Южной Африки с Британской империей, а вторые стремятся держаться как можно ближе к ней. Возможно, возобновление конфликта было неизбежным с самого начала: используя свое большинство среди электората, африканеры объявили Южную Африку независимой республикой под руководством д-ра Д.Ф. Малана. Англоязычные провинции Южная Родезия и Натал, вскоре после этого заявили о своей лояльности Империи и отделении от республики. По мере прорисовки боевых действий, вступление в войну Антанты становится все более вероятным. Смогут ли британцы окончательно умиротворить Южную Африку навсегда, или буры вернут свободу и независимость, от которых они были вынуждены отказаться в 1902 году?"
 worldnews.64.a: "В третий раз по новой..."
 
 worldnews.66.t: "Эритрейское восстание!"
 worldnews.66.d: "Единственное территориальное приобретение Эфиопии после Вельткрига, Эритрея, объявило о открытом восстании! Слишком долго находившиеся под гнётом эфиопцев, мусульмане и христиане встали плечом к плечу, чтобы добиться независимости Эритреи. Император Абиссинии пришёл в ярость, услышав об этом! \n\nТеперь, когда ситуация в регионе пошатнулась, остаётся нерешённым вопрос: нападёт ли Сомалия на сражающуюся Абиссинию? Сможет ли Абиссиния подавить восстание, или повстанцы одержат победу?"
 worldnews.66.a: "Ох уж эти африканцы..."
 
 worldnews.67.t: "Смерть Пия XI"
 worldnews.67.d: "Весь итальянский народ оплакивает смерть Его Святейшества, Папы Римского Пия XI, который мирно ушел из жизни во сне после нескольких лет тяжелой болезни и ухудшающегося здоровья. Святой Отец скоро будет захоронен в гробнице, как и все его предшественники. До выборов следующего Папы управление государством возьмет на себя Коллегия Кардиналов в Риме. Преемнику придется позаботиться как об управлении страной, так и противостоянии синдикализму, который снова разделил страну и создал богопротивное синдикалистское государство на севере страны."
 worldnews.67.a: "Ужасно!"
 
 worldnews.70.t: "АИН побеждает на итальянских выборах"
 worldnews.70.d: "Итальянская Республика находилась под защитой Австрии с момента окончания гражданской войны в Италии, пятнадцать лет назад. Однако после Черного Понедельника, Австрия отказалась от своего влияния и военного присутствия в стране, почле чего покинула Итальянскую Республику, чтобы самостоятельно справиться со своими экономическими проблемами. Для того, чтобы получить больше поддержки в парламенте для решения проблем с Черным Понедельником, так как они считали нужным, правящие либеральные демократы с Иваноэ Бономи призвали к досрочным выборам. Эти выборы завершились победой и избранием антиавстрийской Ассоциация итальянских националистов во главе правительства. Сегодня в своей речи в Милане, новый премьер-министр [ITA.GetLeader] заявил, что ничто не может помешать величию Италии, а Черный Понедельник стал прямой причиной мерзкого австрийского вмешательства и колониализма, которые будут искоренены новыми легионами Италии."
 worldnews.70.a: "Интересно"
 worldnews.70.b: "Новый враг, по-видимому."
 worldnews.70.c: "Мы будем сильнее, чем когда-либо!"
 
 worldnews.72.t: "Победа Доминиона"
 worldnews.72.d: "С конца Вельткрига, Индостан был разделен на три государства: остатки лоялистов-сторонников Британии, социалисты Индийского Национального Конгресса и реакционные князья, пожелавшие остаться независимыми. Как только осела пыль, стало ясно, что победителями остались лоялисты, и Индийский Доминион установил контроль над всем регионом, тем самым заявив претензию на мировое господство, но только после тяжелого восстановления."
 worldnews.72.a: "Снова британцы?"
 
 worldnews.73.t: "Победа [PRF.GetName]"
 worldnews.73.d: "С конца Вельткрига, Индостан был разделен на три государства: остатки лоялистов-сторонников Британии, социалисты Индийского Национального Конгресса и реакционные князья, пожелавшие остаться независимыми. Как только осела пыль, стало ясно, что победителями остались реакционеры. [PRF.GetLeader] правит самодержавно как независимый монарх, тем самым заявив претензию на мировое господство, но только после тяжелого восстановления."
 worldnews.73.a: "Правление князей никогда не кончится."
 
 worldnews.74.t: "Кайзар-и-Хинд"
 worldnews.74.d: "Низам Декканской Федерации, Осман Али Хан, заявил о своих претензиях на Кайзар-и-Хинд - титул, принадлежавший только Моголам и британским императорам Индии. Заявление показывает, что низаму нет никакого дела до претензий других сил региона, и, кажется, война неизбежна."
 worldnews.74.a: "Претенциозно!"
 
 worldnews.75.t: "Победа Коммуны Бхарата"
 worldnews.75.d: "С конца Вельткрига Индостан был разделен на три государства: остатки лоялистов-сторонников Британии, социалисты Индийского Национального Конгресса и реакционные князья, пожелавшие остаться независимыми. Как только осела пыль, стало ясно, что победителями остались синдикалисты, и Коммуна установила контроль над всем регионом, тем самым заявив претензию на мировое господство, но только после тяжелого восстановления."
 worldnews.75.a: "Освобождение!"
 
 worldnews.76.t: "Тоталисты в Коммуне Бхарата"
 worldnews.76.d: "Лидер Максимистов Коммуны Бхарата и новоизбранный глава государства Субхас Чандра Бос произнес сегодня пламенную речь перед народом в Калькутте, пообещав, что тоталисты сделают все возможное, чтобы уничтожить как 'верных псов колониализма' на севере, так 'реакционных угнетателей' на западе. Он заявил, что Коммуна справится со всеми проблемами самостоятельно, без помощи иностранцев, и докажет, что с Индией нужно считаться."
 worldnews.76.a: "Интересно."
 
 worldnews.77.t: "Синдикалисты в Коммуне Бхарата"
 worldnews.77.d: "Лидер умеренной партии Коммуны Бхарата и новоизбранный глава государства, А.К. Фазлул Хук произнес сегодня пламенную речь перед народом в Калькутте, пообещав, что новое синдикалистское правительство построит промышленность и приведет страну к процветанию. Но он же заявил, что никакого послабления ни к колониалистам на севере, ни реакционерам на западе не будет, и Коммуна сделает все возможное, чтобы распространить Революцию на Индостан, а позже и весь мир. Такие приоритеты нового лидера Коммуны наталкивают на мысли об улучшении отношений с другими синдикалистскими странами и даже о возможном вступлении в Интернационал."
 worldnews.77.a: "Интересно."
 
 worldnews.78.t: "Ганди в Коммуне Бхарата"
 worldnews.78.d: "Лидер Аграрно-Социалистической партии Коммуны и новоизбранный глава государства, Мохандас Карамчанд Ганди - также иногда называемый Махатмой или 'Чистосердечным' его преданными соотечественниками - произнес сегодня пламенную речь перед народом в Калькутте, пообещав, что найдет 'мирный путь' объединения Индии. Он же заявил, что никакого послабления ни к колониалистам на севере, ни реакционерам на западе не будет, что Коммуна будет защищать свою страну любой ценой, и обратился к народу Индии с предложением Свараджа - или самоуправления - мирным путем, а не разрушительной войной, которая принесет только страдания. Ганди также пообещал, что сделает все возможное на этом тяжелом пути."
 worldnews.78.a: "Интересно."
 
 worldnews.80.t: "Мир в Индии?"
 worldnews.80.d: "Удивительные сообщения приходят из Индии. Представители Коммуны Бхарата и Индийского Доминиона анонсировали план по мирному объединению двух стран. План был предложен Махатмой, Мохандасом Карамчандом Ганди, сразу после победы его Аграрно-Социалистической партии, хотя для этого и требуется соглашение Юнионистов из Дели и долгие недели переговоров - которые также включают разрыв отношений с Британской Империей и легализацию социалистической партии перед следующими выборами, которые точно пройдут тяжело, потому что слишком много людей в Доминионе возмущены секретными встречами Юнионистов. Но большинство все же приветствуют возможность объединения полуострова без кровопролития, в чем заключается немалая заслуга и самого Ганди, который уже долгое время путешествует по стране, выступая с пламенными речами."
 worldnews.80.a: "Довольно неожиданный исход."
 
 worldnews.81.t: "Восстание Максимистов"
 worldnews.81.d: "Последнее время в Калькутте ходят слухи, что Махатма Ганди начал переговоры с Юнионистами в [RAJ.GetNameDef] о мирном объединении стран. Трудно сказать, существовала ли реальная возможность объединения или нет, но тоталисты в Индии восстали и Субхас Чандра Бос заявил о намерении бороться с Ганди и Аграрной партией, чтобы не допустить воссоединения. В Бенгале уже начались ожесточенные сражения на улицах, пока в остальной Индии могут только наблюдать за исходом событий."
 worldnews.81.a: "Опять Гражданская война? Господи!"
 
 worldnews.82.t: "Максимисты захватывают Калькутту"
 worldnews.82.d: "Силы максимистов под управлением Субхас Чандра Боса сегодня въехали в центр Калькутты, окружив здание Индийского Национального Конгресса и захватив лидеров Аграрной партии, включая Ганди. Местоположение Ганди неизвестно, но Бос и его Максимисты довольно быстро захватили полный контроль над правительством и установили порядок. Аграрная партия была объявлена вне закона, означая, что мечты Ганди о мирном объединении страны пали прахом."
 worldnews.82.a: "Тяжелые времена для Коммуны."
 
 worldnews.83.t: "Аграрное восстание"
 worldnews.83.d: "Каждый знает Махатму Ганди как человека в крайней мере миролюбивого, но миролюбие даже этого человека имеет свои пределы - после многочисленных обращений, направленных партии Максимистов, возглавляемой Субхасом Чандра Босом, с просьбами остановить чистки в армии, Мохандас Карамчанд Ганди призвал всех своих сторонников поднять оружие против тоталистического режима. Некоторые считают, что политика Боса, вынудила Ганди на такой поступок. Бос приказал арестовать и судить на военном трибунале как военного преступника Ганди, а всю Аграрно-Социалистическую партию распустить"
 worldnews.83.a: "Опять Гражданская война? Господи!"
 
 worldnews.84.t: "Аграрии захватывают Калькутту"
 worldnews.84.d: "Силы аграрной партии под руководством Махатмы Ганди въехали в центр Калькутты, окружив здание Индийского Национального Конгресса и заседавших в нем тоталистов. Местоположение председателя партии Максимистов, Субхас Чандра Боса, остается под покровом тайны, но Ганди и Аграрии довольно быстро захватили полный контроль над правительством и установили порядок. Максимистская партия была объявлена вне закона, означая, что военное присоединение Индии не предвидится."
 worldnews.84.a: "Это делает их сильнее или слабее?"
 
 worldnews.86.t: "Конец Испанской Гражданской войны"
 worldnews.86.d: "Испанская Гражданская война наконец окончена, и кажется, [SPA.GetNameDef] вышла единственным победителем. Большая часть страны лежит в руинах, и порядок восстановится еще не скоро, но правительство сообщает, что с анархистами и синдикалистами покончено, и скорее всего, навсегда. Настоящий триумф для короля Альфонсо XIII, хотя он явно не в курсе произошедших событий, так как находился в коме с начала войны."
 worldnews.86.a: "Всего лишь статус-кво?"
 
 worldnews.87.d: "Испанская Гражданская война наконец окончена, и кажется, [SWF.GetNameDef] вышла единственным победителем. Большая часть страны лежит в руинах, и порядок восстановится еще не скоро, но правительство сообщает, что со старым феодальным режимом навсегда покончено, а народ Испании только выиграет от перехода к новому социалистическому строю. Ликующие толпы собрались в Барселоне, чтобы чествовать возвращающиеся отряды милиции и помолиться о наступлении вечного мира в Испании."
 worldnews.87.a: "Еще одна Европейская страна пала перед Синдикализмом"
 
 worldnews.88.d: "Испанская Гражданская война наконец окончена, и кажется, карлисты вышли единственными победителями. Большая часть страны лежит в руинах, и порядок восстановится еще не скоро, но ликующие толпы уже собрались в Бургосе, чтобы поприветствовать нового короля, Хавьера I де Бурбон-Пармского. Король объявил день выходным и заявил, что справедливость наконец восторжествовала и карлисты теперь именно там, где и должны быть. Он пообещал восстановить нацию и вернуться к католическим корням Испании, что сразу же встретило поддержку Папы Римского, который предложил помолиться за вечный мир в Испании."
 worldnews.88.a: "Интересный исход войны."
 
 worldnews.90.t: "Избирательный тупик в Британии"
 worldnews.90.d: "Конгресс Профсоюзов 1936 года стал решающим. Предыдущий председатель конгресса, Филипп Сноуден, объявил о своем уходе, вызвав тем самым борьбу между крупнейшими фракциями Союза: Максимистов, Автономистов, Федерационистов и Конгрегационистов.\n\nПо мере того, как пыль улеглась, после сложных выборов не появилось ни одной четкой ведущей фракции. Поскольку беспорядки медленно нарастали, и все фракции требовали пересчета голосов или проведения новых выборов, было наконец решено избрать федералиста Тома Манна в качестве умеренной фигуры. Для многих это является признаком предстоящей политической инерции в Британском Союзе."
 worldnews.90.a: "Интересно."
 
 worldnews.91.t: "Индокитай объявляет о независимости"
 worldnews.91.d.a: "После Вельткрига, французские колонии в Индокитае перешли в руки немцев. Стабильность в регионе так и не восстанавливалась, пока в 1926 не были разбиты китайские революционеры.\n Сегодня, националисты и левые политики объявили о создании единого органа - Вьет Миня. Лидер Вьет Миня объявил о независимости Индокитайского союза. После слов приветствия Интернационалу и мировой революции, он заявил о чудовищной немецкой тирании, с которой будут сражаться простые рабочие Индокитая.\nГермания заявила, что их армия или даже полиция справится с этой голытьбой."
 worldnews.91.d.b: "После Вельткрига, французские колонии в Индокитае перешли в руки немцев. Стабильность в регионе так и не восстанавливалась, пока в 1926 не были разбиты китайские революционеры.\n Сегодня, националисты и левые политики объявили о создании единого органа - Вьет Миня. Лидер Вьет Миня объявил о независимости Индокитайского союза в Сайгоне. После слов почтения всем азиатским революционерам, он заявил о чудовищной немецкой тирании, с которой будут сражаться простые рабочие Азии.\nГермания заявила, что их армия или даже полиция справится с этой голытьбой. Мировая общественность поддержала это заявление."
 worldnews.91.d.c: "После Вельткрига, французские колонии в Индокитае перешли в руки немцев. Стабильность в регионе так и не восстанавливалась, пока в 1926 не были разбиты китайские революционеры.\n Сегодня, националисты и левые политики объявили о создании единого органа - Вьет Миня. Цитируя Французскую Декларацию прав человека и Американскую Декларацию Независимости, Лидер Вьет Миня объявил о независимости Индокитайского союза в Сайгоне.\nГермания заявила, что их армия или даже полиция справится с этой голытьбой. Мировая общественность поддержала это заявление..."
 worldnews.91.a: "'Великая' война Германии с босой голытьбой"
 worldnews.91.b: "Да, это явно не самая лучшая их колония."
 worldnews.91.c: "Где они научились объявлять независимость?"
 worldnews.91.g: "Неповиновение недопустимо."
 worldnews.91.i: "Независимость или смерть!"
 worldnews.91.j: "Мы будем следить за этим."

 worldnews.92.t: "Победа повстанцев в Индокитае"
 worldnews.92.d: "С яростью и стойкостью войска Вьетминя выдавили немцев со всех стратегических позиций на Индокитайском полуострове, МИД Германии наконец согласился встретиться с лидерами восстания и предложил полную независимость всех земель в регионе. \n\n И сегодня Вьетминем было подтверждено создание Индокитайского союза к большому удовольствию вьетнамского народа, пришедшего посмотреть на историческое событие. Будущее новой страны лежит под покровом тайны, но уже ходят слухи о влиянии Коммуны Бхарата, пока весь мир пытается заглушить эффект восстания."
 worldnews.92.a: "Серьезный удар для колониализма!"
 worldnews.92.b: "Наконец-то независимость!"
 worldnews.92.c: "Мы никогда не оправимся от этого."
 worldnews.92.j: "Немецкое влияние на Азию ослабевает."

 worldnews.93.t: "Поражение Индокитайского восстания"
 worldnews.93.d: "Несмотря на ожесточенную борьбу партизан Вьетминя, Германской армии удалось сокрушить повстанцев. Хо Ши Мин и большинство высокопоставленных чиновников Синдикалистского правительства Индокитая, предположительно мертвы после ковровых артиллерийских бомбардировок центра Вьетминя в Ханое. Но ходят слухи, что Хо Ши Мин бежал в Юннань с теми бойцами, что у него остались.\n\n Также поступают сообщения об опьяненных победой немцах, которые жестоко 'проверяют' окрестные деревни на предмет синдикалистской агитации."
 worldnews.93.a: "Как и ожидалось."
 worldnews.93.b: "Наши интересы в Азии защищены. Пока что."
 worldnews.93.c: "Еще одна нация, потерянная для империализма."
 worldnews.93.j: "Удача. Вот и все!"

 worldnews.105.t: "Революция в Сиаме"
 worldnews.105.d: "Сегодня, клика офицеров и интеллигенции, которые называют себя 'Khana Ratsadon'(Народная партия) успешно провели революцию в Сиаме. Наследник трона и глава полиции были помещены под арест, а сам король, который в это время не находился в Бангкоке, добровольно вернулся в столицу и принял свою судьбу.\n\nДанная революция является политическим ответом народа на нерешённый аграрный кризис. Люди желают перехода от абсолютизма к самоуправлению. После того, как новая Конституция была подписана, временное правительство начало свою работу. Время покажет, приведёт ли оно страну к успеху или к очередной диктатуре."
 worldnews.105.a: "Интересно"
 
 worldnews.106.t: "Сиам стал конституционной монархией"
 worldnews.106.d: "Король Прачадипок недавно закончил написание Конституции, которая сегодня вступила в полную силу, окончательно уничтожив абсолютизм в Сиаме. На пути к модернизации король подчинился воле народа, но будет ли он исполнять свои обязанности? Чтобы решить насущные вопросы, было создано временное правительство, возглавляемое премьером Пхрайя Манопакорном, который будет занимать пост до следующих выборов."
 worldnews.106.a: "Интересно"
 
 worldnews.109.t: "Революция Боворадета"
 worldnews.109.d: "И хотя Сиам захлестнула революция, в скором времени роялисты устроили контрреволюцию, воспользовавшись бездействием парламентаристов.\n\nПринц Боворадет поднял восстание на севере и северо-востоке страны и объявил о создании 'Союза Спасения Нации'. Правительство готово бороться с ним, а Сиам захлестнула очередная гражданская война."
 worldnews.109.a: "Захватывающе."
 worldnews.109.b: "Последние вздохи реакционеров."
 worldnews.109.c: "Может немного подкинем снаряжения роялистам?"
 worldnews.109.e: "Последние вздохи пронемецкой клики?"
 worldnews.109.f_gov: "Мы подавим этих мятежников!"
 worldnews.109.f_reb: "За короля и страну!"

 worldnews.110.t: "Восстание Тамронгнавасавата"
 worldnews.110.d: "Недавняя сиамская революция, несмотря на свой внешний успех, привела к резкому падению популярности. Воспользовавшись спорным 'Досье с желтой обложкой' - прозвищем для предложенного плана по перестройке национальных экономических систем и национализации многих отраслей промышленности - была запущена "красная паника".\n\nНачальник армии Луанг Пибунсонгкрам поклялся в верности королю. С другой стороны, Луанг Тхамронгнавасават и некоторые недовольные морские офицеры организовали вооруженный мятеж на юге страны. Объявив себя 'Хана Покпонг Прачатипатай' (Партия защиты Демократии), они прошли маршем по Бангкоку. Развал военного истеблишмента знаменует начало тотальной Гражданской войны в Сиаме."
 worldnews.110.a: "Этого нельзя было не заметить."
 worldnews.110.b: "Мы поддерживаем товарищей-социалистов!"
 worldnews.110.c: "Проинформируйте Сингапур об укреплении границы с Сиамом."
 worldnews.110.e: "Социалистическим повстанцам не место в Азии."
 worldnews.110.f_gov: "Синдикалисты показали свое истинное лицо!"
 worldnews.110.f_reb: "Мы раз и навсегда уничтожим старый порядок!"
 
 worldnews.111.t: "Путч Пибун Сонгкрама"
 worldnews.111.d: "И хотя Сиам захлестнула революция, в скором времени роялисты устроили контрреволюцию, воспользовавшись бездействием парламентаристов.\n\nГенерал Пибун Сонгкрам вовремя вмешался и не допустил гражданской войны, объявив военное положение по всей стране. Он будет управлять страной до тех пор, пока народ действительно не будет готов к демократии и всей её ответственности."
 worldnews.111.a: "И когда он будет готов?"
 
 worldnews.112.t: "37-ая Сиамо-Бирмская война"
 worldnews.112.d: "Новый популистический режим Пибун Сонгкрама объявил войну Бирме, посчитав анти-сиамскую пропаганду с её стороны поводом к действию.\n\nПо правде сказать, Сиам повёл себя как агрессор, нарушив подписанные договоры 1929 и оккупировав часть Бирмы. Сами Бирманцы видят войну как попытку Сиама утвердить свою гегемонию в регионе и побороться во влиянии с европейскими державами."
 worldnews.112.a: "Они точно ненавидят друг друга до мозга костей."
 
 worldnews.114.t: "Парламентаристы победили в Сиаме"
 worldnews.114.d: "Несмотря на численный перевес Роялистов - силы Парламентаристов смогли занять Бангкок, его окрестности и часть стратегических регионов, вынудив короля Раму VII бежать в Сингапур.\n\nВ тоже время, Приди Паномионг объявил себя премьер-министром и с одобрения парламента начал проводить политику 'Национального Возрождения'. Новое синдикалистское правительство, без сомнений, изменит баланс сил в Индокитайском регионе."
 worldnews.114.a: "Новая республика родилась из пепла"
 worldnews.114.b: "Наши новые товарищи в Азии"
 worldnews.114.c: "Еще один синдикалистский режим, скрывающийся за демократическим фасадом"
 worldnews.114.e: "Возможно, мы могли бы больше поддерживать роялистскую сторону..."
 worldnews.114.f: "Нас ждет новый рассвет!"

 worldnews.115.t: "Роялисты победили в Сиаме"
 worldnews.115.d: "Несмотря на численный перевес Парламентаристов - силы Роялистов смогли занять Бангкок, его окрестности и часть стратегических регионов, вынудив лидера революции, Приди Паномионга, бежать в Сингапур.\n\nИ хотя консерваторы остаются вне политики, они управляют королём из тени, который всё ещё не может оправиться от провала своих реформ. Рама VII и его потомки ещё на долгое время будут сторониться эту хаотичную 'демократию'."
 worldnews.115.a: "Шаг назад к абсолютизму?"
 worldnews.115.b: "Наши спасенные сиамские товарищи будут сражаться и дальше!"
 worldnews.115.c: "Еще один оплот в Азии обеспечен"
 worldnews.115.e: "Еще одна немецкая пешка в Азии, со временем мы их уничтожим"
 worldnews.115.f: "Старый порядок торжествует!"

 worldnews.116.t: "Восстановление порядка в Сиаме"
 worldnews.116.d: "Правительство Сиама побороло повстанцев. Правительственные войска заняли Бангкок и потихоньку зачищают последние очаги восстания. \n\nМногие заключённые отправлены на остров-тюрьму Тарутао. Старое правительство было распущено и новое уже начало восстанавливать страну."
 worldnews.116.a: "Они пришли к статусу-кво."
 worldnews.116.b_gov: "Прогерманский план остановлен на корню"
 worldnews.116.b_reb: "Наши спасенные сиамские товарищи будут сражаться еще сутки!"
 worldnews.116.c_gov: "Угроза со стороны синдикалистов нейтрализована"
 worldnews.116.c_reb: "Мы могли бы больше поддерживать наших союзников-роялистов..."
 worldnews.116.e: "Угрозы нашему потенциальному союзнику побеждены"
 worldnews.116.f: "Время восстанавливаться и оплакивать наши потери"
 
 worldnews.117.t: "Роялистский переворот в Сербии"
 worldnews.117.d: "Республика Сербия, провозглашенная в 1926 году, оказалась недолговечной, так как волнения и социалистическая агитация после выборов 1936 года подтолкнули королевскую армию дома Карагеоргиевичей к организации путча. Под руководством тайного военного общества, известного как 'Белая Рука', которым командовал Петр Живкович, армия свергла Социалистическую рабочую партию и объявила о восстановлении Королевства Сербия. Пока неясно, какая форма правления будет сформирована при следующем регентстве, но Республика, похоже, уничтожена окончательно."
 worldnews.117.a: "Это было неизбежно."
 worldnews.117.b: "Мы снова встретились, наследники Карагеоргий..."
 
 worldnews.119.t: "Сербия провозглашает Югославию"
 worldnews.119.d: "Сербское государство добилось немалых успехов за последнее время. Сегодня, из официального Белграда пришла новость о создании нового государства южных славян, что означает фактическое объединение всех Сербов, Хорватов и Словенцев в одно единое государство. Данный концепт получил название 'Югославия' и вскоре был принят как официальное название нового государства.\n\nРанее, подобные попытки проводились со стороны Иллирии, желающей объединить славян под главенством хорватов. Время покажет, насколько прочной окажется Югославия."
 worldnews.119.a: "Надеемся, это принесёт мир на Балканы."
 
 worldnews.120.t.MAF: "Распад Миттельафрики"
 worldnews.120.t.GEX: "Конец Германского правительства-в-изгнании"
 worldnews.120.d: "Ужасающие новости приходят из различных немецких колоний в Африке. Похоже, что весь немецкий административный состав рухнул в одночасье, неспособный решить поставленные проблемы! Всё ещё неясно, что же послужило причиной этого, но факт остаётся фактом - в немецких колониях просто некому следить за местными. Иерархия пошатнулась, и теперь каждый вождь, князёк или королёк де-факто независим от Кайзера. Теперь, когда центрального командования нет, племена возобновили вражду, а клики немецких ветеранов и остатков офицерского состава пытаются сохранять стабильность там, где они могут. Несомненно, для Африки вновь настали времена жестоких войн и насилия. Можно с уверенностью сказать, что немецкая колониальная империя рухнула."
 worldnews.120.a: "Германская власть над Африкой оказалась не такой уж и сильной..."
 worldnews.120.b: "Полная катастрофа!"
 worldnews.120.c: "Гунны получили по заслугами"
 worldnews.120.e: "Народы Африки теперь свободны от империалистов!"
 
 worldnews.121.t: "Война за Верхнюю Савойю!"
 worldnews.121.d: "Мир, затаив дыхание, наблюдал как Французская Коммуна агрессивно требовала Верхнюю Савойю у Швейцарии. Регион был оккупирован после Вельткрига. Швейцария отказывается вернуть Верхнюю Савойю Коммуне, что полностью разрушило отношения между двумя странами.\n\nСегодня, вместо очередной плеяды дипломатических дискуссий, раскаты артиллерии и топот французских сапог разбудил Швейцарию. Переговоры провалились - настало время войны."
 worldnews.121.enemies: "В ответ на восстание в регионе Романдия и Верхней Савойи, Швейцария направила войска на подавление протеста. Революционеры попросили помощи у Французской Коммуны, которая потребовала вывести войска из региона. Швейцария проигнорировала ультиматум, и теперь французы мобилизовали свои войска в помощь революционерам."
 worldnews.121.a: "Так закончились тихие деньки."
 worldnews.121.b: "Война за наше выживание."
 worldnews.121.c: "Победим империалистов!"
 worldnews.121.e: "Мы вновь разобьём французов."
 
 worldnews.122.t: "Синдикалистическая революция в Швейцарии"
 worldnews.122.d: "Урывистые новости доходят до нас о том, что маленькая горная республика Швейцария была захвачена синдикалистами. У Швейцарии всегда были проблемы с левыми радикалами, поддерживаемыми Французской Коммуной, но они до сих пор не выступали открыто против правительства.\n\nТакой быстрый переворот наводит на мысль, что здесь побывала рука французских коммунаров, которые агитировали левых в Романдии.\n\nИ хотя в некоторых частях Швейцарии идут бои, столица и основные города заняты синдикалистами."
 worldnews.122.enemies: "Урывистые новости доходят до нас о том, что запад Швейцарии был захвачена синдикалистами в ответ на попытку федералов подавить выступления. Французская Коммуна ввела свои войска в захваченные регионы, заставив правительство Швейцарии уступить их. Маленькая горная страна не готова вести открытые боевые действия с таким гегемоном. До сих пор неясно, что же делать Швейцарии."
 worldnews.122.a: "Как такое могло произойти?"
 worldnews.122.b: "Переломим оковы!"
 worldnews.122.c: "Чудесно!"
 worldnews.122.e: "Прямо у наших границ!"
 
 worldnews.123.t: "Синдикалисты завладели Австралазией"
 worldnews.123.d: "На прошедших выборах в Австралазии победила партия Лейбористов под руководством Джона Кёртина. Однако, вскоре после его инаугурации, радикалы из партии захватили власть в стране. Эти радикалы верны Конгрессу Профсоюзов, который находился вне закона со времён Мельбурнского восстания 1924 года. Народ Австралазии до сих пор в шоке, а радикалы уже выводят свои отряды на улицы, чтобы не допустить демонстраций и протестов против них самих."
 worldnews.123.a: "Ещё одна победа мировой революции!"
 worldnews.123.b: "Это очень опасно."
 worldnews.123.c: "Синдикализм вернулся на наше полушарие..."
 
 worldnews.124.t: "Австралазийская Гвардия"
 worldnews.124.d: "До нас дошли удивительные новости из [AST.GetNameDef] - Эрик Кэмпбелл и его Центристы вернулись со свалки истории в политику Австралазии. Центристы - политическое подразделение Новой Гвардии, милитаристической организации, состоящей из ветеранов Вельткрига. Эти правые радикалы винят правительство в том, что оно недостаточно активно борется с синдикализмом. Их популярность в народе только растёт в связи с тем, что они стали охранять покой на улицах и разгонять рабочие демонстрации. Ещё неизвестно, как такие авторитарные идеи повлияют на Австралазию, но Антанта не слишком-то и против, ведь Гвардия настроена про-монархически и всячески старается содействовать короне."
 worldnews.124.a: "Интересно."
 
 worldnews.125.t: "Австралазия Превыше Всего"
 worldnews.125.d: "До нас дошли удивительные новости из государства[AST.GetNameDef] - партия АПВ, ведомая Перси Стефенсоном, набрала большинство голосов в парламенте. Партия культивирует антибританскую риторику, обещая порвать все связи с Канадой и всей Антантой в целом. АПВ славится своими авторитарными порядками - Премьер Стефенсон уже начал потихоньку уничтожать демократические институты страны. По всей стране уже проходят протесты Новой Гвардии, и ещё не ясно, вмешается ли Антанта в происходящее."
 worldnews.125.a: "Интересно."
 
 worldnews.126.t: "Путч Гвардии в Австралазии"
 worldnews.126.d: "До нас дошли ужасающие новости из государства [AST.GetNameDef] - Новая Гвардия, ультраправые радикалы, которые винили правительство в недостаточном подавлении левых идей и которые проиграли на честных выборах, совершили вооружённый переворот. Ведомое фельдмаршалом Томасом Блейми, новое правительство [AST.GetNameDef] сделает всё возможное, чтобы очистить страну от синдикализма. Блейми также хочет сделать Австралазию самым надёжным и верным членом Антанты. По всей стране уже идут протесты, и будущее Австралазии кажется туманным."
 worldnews.126.d.nzl: "До нас дошли ужасающие новости из государства [AST.GetNameDef] - Новая Гвардия, ультраправые радикалы про-монархического толка, ворвались в здание парламента в Канберре и захватили власть. Ведомое фельдмаршалом Томасом Блейми, новое правительство [AST.GetNameDef] сделает всё возможное, чтобы восстановить порядок и связи с Антантой. Многие видят в этом восстановление статуса-кво, а, значит, и возвращение беспорядков и хаоса."
 worldnews.126.a: "Как неожиданно."
 
 worldnews.127.t: "[AST.GetNameDefCap] стала республикой"
 worldnews.127.d.permission: "После долгих дебатов в парламенте, которые грозили перерасти в беспорядки, правительство Австралазии ратифицировало так называемый 'Австарлазийский Конституционный Акт', которые объявил об отмене Вестминстерской системы и переходу к республике.\n\nЭто было сделано с позволения короля Эдуарда VIII, который надеется, что [AST.GetNameDef] останется верным союзником Антанте."
 worldnews.127.d.kicked: "После долгих дебатов в парламенте, которые грозили перерасти в беспорядки, правительство Австралазии ратифицировало так называемый 'Австарлазийский Конституционный Акт', которые объявил об отмене Вестминстерской системы и переходу к республике.\n\nЭто было сделано с позволения короля Эдуарда VIII, но это также значит, что [AST.GetNameDef] потеряет статус члена Антанты и Британского Содружества."
 worldnews.127.d.rebel: "После долгих дебатов в парламенте, которые грозили перерасти в беспорядки, правительство Австралазии ратифицировало так называемый 'Австарлазийский Конституционный Акт', которые объявил об отмене Вестминстерской системы и переходу к республике.\n\nЭто было сделано в обход воли короля Эдуарда VIII, который признал этот документ недействительным, а политиков, его подписавших, предателями. Пока что это означает, что [AST.GetNameDef] потеряет статус члена Антанты и Британского Содружества. Но ещё неясно, предпримет ли Канада что-нибудь, чтобы вернуть себе Австралазию."
 worldnews.127.a: "Ура!"
 
 worldnews.128.t: "Второе Мельбурнское восстание"
 worldnews.128.d: "Массовые беспорядки начались по всем [AST.GetAdjective]им штатам, которые позже переросли в так называемое Второе Мельбурнское восстание. Синдикалисты повторили своё восстание 1924, которое тогда было подавлено армией. В этот раз, непопулярное правительство Гвардии было вынуждено сложить свои полномочия и передать власть Конгрессу Профсоюзов, который пообещал восстановить порядок и провести ряд левых реформ в поддержку рабочего класса. Революция расползлась по всей стране, оставляя за собой протесты и демонстрации. Ещё неясно, как на это отреагирует Антанта."
 worldnews.128.a: "Ещё одна победа мировой революции!"
 worldnews.128.b: "Это опасно."
 
 worldnews.129.t: "Второе Мельбурнское восстание"
 worldnews.129.d: "Массовые беспорядки начались по всем [AST.GetAdjective]им штатам, которые позже переросли в так называемое Второе Мельбурнское восстание. Синдикалисты повторили своё восстание 1924, которое тогда было подавлено армией. В этот раз, непопулярное правительство Гвардии приказало солдатам расстрелять протестующих, что привело к огромным жертвам и анархии в Мельбурне. И хотя Гвардия утверждает, что всё под контролем, мировая общественность уже осудила такую жестокость с их стороны."
 worldnews.129.a: "Это опасно."
 
 worldnews.130.t: "Второе Мельбурнское восстание"
 worldnews.130.d: "Массовые беспорядки начались по всем [AST.GetAdjective]им штатам, которые позже переросли в так называемое Второе Мельбурнское восстание. Синдикалисты повторили своё восстание 1924, которое тогда было подавлено армией. В этот раз, армия перешла на сторону протестующих, что заставило Гвардию обратиться за помощью к Антанте. Как и в 1924, Канада ввела военное положение и Генерал-губернатор приказал правительству сложить полномочия. В конечно итоге, беспорядки утихли, но политическая ситуация вернулась к своему статусу-кво: авторитарное правление генерал-губернатора под мандатом английской короны."
 worldnews.130.a: "Это опасно."
 
 worldnews.131.t: "Новозеландский кризис"
 worldnews.131.d.synd: "В государстве [AST.GetNameDef] назревает кризис. По слухам, последнее время идут ожесточённые споры между австралазийскими и новозеландскими политиками. В Новой Зеландии никогда не любили синдикалистов, поэтому многие лидеры несостоявшегося путча из числа Новой Гвардии бежали туда. Часть флота и армии уже перешла на сторону новозеландцев, что ставит под вопрос мирное решение конфликта. Некоторые считают, что Антанте наконец-то пора вмешаться."
 worldnews.131.d.afm: "В государстве [AST.GetNameDef] назревает кризис. По слухам, последнее время идут ожесточённые споры между австралазийскими и новозеландскими политиками. В Новой Зеландии никогда не любили правящую партию АПВ, поэтому многие лидеры несостоявшегося путча из числа Новой Гвардии бежали туда. Часть флота и армии уже перешла на сторону новозеландцев, что ставит под вопрос мирное решение конфликта. Некоторые считают, что Антанте наконец-то пора вмешаться."
 worldnews.131.a: "Это опасно."
 
 worldnews.132.t: "Новая Зеландия голосует за независимость"
 worldnews.132.d: "После проведения референдума, австралазийский штат Новая Зеландия объявил о выходе из конфедерации. Новозеландцы предпринимали попытку обрести независимость с тех самых времён, когда их насильно присоединили к Австралии в 1924 году. Правительство в Канберре могло лишь пожелать удачи новообразовавшемуся государству."
 worldnews.132.a: "Интересно."
 
 worldnews.133.t: "Демократия вернулась в Австралазию"
 worldnews.133.d: "[AST.GetNameDefCap] находилась под авторитарным правлением генерал-губернатора, назначенным британцами во время военного положения, введённого в 1924 году во время Мельбурнского восстания. Губернатор Бирдвуд больше не мог откладывать выборы, на которых победил Стенли Брюс и партия Единая Австралазия. Брюса ждут непростые времена, ведь по всей стране идут рабочие демонстрации, которые требуют отправить Бирдвуда в отставку."
 worldnews.133.a: "Интересно"
 worldnews.134.d: "[AST.GetNameDefCap] находилась под авторитарным правлением генерал-губернатора, назначенным британцами во время военного положения, введённого в 1924 году во время Мельбурнского восстания. Губернатор Бирдвуд больше не мог откладывать выборы, на которых победил Эрл Пейдж и партия Народников. Пейджа ждут непростые времена, ведь по всей стране идут рабочие демонстрации, которые требуют отправить Бирдвуда в отставку."
 worldnews.135.d: "[AST.GetNameDefCap] находилась под авторитарным правлением генерал-губернатора, назначенным британцами во время военного положения, введённого в 1924 году во время Мельбурнского восстания. Губернатор Бирдвуд больше не мог откладывать выборы, на которых победил Джон Кёртин и партия Лейбористов. После того, как партийные радикалы не смогли сместить его с должности и были исключены из партии, Кёртина ждут рабочие восстания и давление со стороны крайне правых, которые требуют подавления синдикалистических настроений."
 
 worldnews.136.t: "Бельгийская Декларация Независимости"
 worldnews.136.d: "Устав от германской тирании и экономического кризиса, бельгийцы начали массово требовать независимости и устраивать партизанские вылазки на немецких солдат. Германия больше не может поддерживать Адальберта и вынуждена признать своё бессилие. Армия Освобождения завладела крупными городами и выбила немцев из страны, король был вынужден сдаться. Многие боятся, что независимая Бельгия вскоре станет очередной жертвой Французской Коммуны."
 worldnews.136.a: "Удачи, Бельгия!"
 worldnews.136.b: "Наш западный фланг обнажился." #Germany
 worldnews.136.c: "Смена власти или рассвет революции?" #Socialist
 worldnews.136.e: "Пошлите Брюсселю наши поздравления." #Entente

 worldnews.137.t: "Синдикалистический переворот в Валлонии"
 worldnews.137.d: "В Льеже группа валлонских синдикалистов объявили о независимости после того, как началась война Коммуны и Рейха. Они уверены, что вскоре французские армии войдут в город и помогут им освободить всю Бельгию. Коммуна открыта признала поддержку этим революционерам."
 worldnews.137.a: "Это серьёзный поворот."
 
 worldnews.145.t: "Крах Рейхспакта"
 worldnews.145.d.africa: "Похоже, произошло немыслимое! Распространились новости о том, что немецкий Кайзер, его кабинет и значительное число государственных чиновников и ключевых генералов отправились по воздуху и морю в Миттельафрику, где они установили правительство в изгнании. Немецкие территории и союзники в Европе были оставлены на произвол судьбы, а структура, предложенная альянсом Рейхспакта, теперь полностью испарилась. Ожидается, что немецкие войска в Европе предложат свою окончательную капитуляцию в течение нескольких дней, и хотя германское правительство все еще существует, ясно, что мировой порядок, существовавший с конца Первого Вельткрига, вот-вот придет к огненному концу."
 worldnews.145.d.collapse: "Похоже, произошло немыслимое! Сегодня немецкие войска, сражающиеся в Европе, окончательно рухнули под тяжестью армий вторжения. Когда стало понятно что бежать некуда, Кайзер и его кабинет встретились и согласились, что полная капитуляция в течение нескольких дней неминуема. Новость привела их союзников в полное замешательство, а структура, предложенная альянсом Рейхспакта, полностью испарилась. Очевидно, что мировой порядок, существовавший с конца Первого Вельткрига, вот-вот придет к огненному концу."
 #Generic:
 worldnews.145.a: "Кайзеррейх пал..."
 #Commune of France:
 worldnews.145.b: "L'Internationale sera bientôt le genre humain..."
 #Union of Britain:
 worldnews.145.c: "Поднимем же алые флаги!"
 #Austria:
 worldnews.145.e: "Теперь лишь мы - истинная Германия"
 #Russia:
 worldnews.145.f: "Это им за Брест-Литовск!"
 #Russia (socialist):
 worldnews.145.g: "Царь мог только мечтать о таком..."
 #Canada:
 worldnews.145.h: "Теперь Германия поймёт, что значит потерять всё"
 #Nat France:
 worldnews.145.i: "Жертвы Вельткрига отомщены"
  
 worldnews.160.t: "Мануэль Карлес захватил власть в Аргентине"
 worldnews.160.d: "После того, как Карлес устроил переворот в Рождество 1935 года в Аргентине не стихала борьба за пост президента. Оппозиция и флот ввели войска в столицу, но были остановлены армией, верной Карлесу.\n\n С падением Розарио, важного ж/д узла, Карлес заявил о своей полной победе. Его обещания очистить Патагонию от 'красной угрозы' привела людей в восторг."
 worldnews.160.a: "Аргентина вновь стабильна?"
 worldnews.160.b: "Очень печально!"
 
 worldnews.161.t: "Пэдро Пабло Рамирез принёс мир в Аргентину"
 worldnews.161.d: "После того, как Карлес устроил переворот в Рождество 1935 года в Аргентине не стихала борьба за пост президента. Оппозиция и флот ввели войска в столицу, но были остановлены армией, верной Карлесу.\n\nОднако положение Карлеса не улучшалось, а поражение под Розарио похоронило его планы. По слухам, он застрелился, но также ходят слухи о том, что он бежал в Уругвай с ближайшими сторонниками."
 worldnews.161.a: "Это победа демократии?" 
 
 worldnews.163.t: "Революция апристов в Перу"
 worldnews.163.d: "Из-за правительственных репрессий, направленных против социалистических и синдикалистских организаций и индивидуумов, оппозиция, которая сталкивалась с все большими трудностями и боялась худшего, сегодня предприняла отчаянную попытку переворота. Марш на столицу страны Лиму был необычайно успешным, и жалкие подразделения регулярной армии рассеялись перед красной милицией, которая быстро заняла ключевые точки в городе и по всей стране. Похоже, что Перу стала ещё одной жертвой идеологического конфликта, охватившего весь мир."
 worldnews.163.a: "Красный потоп достиг Анд."
 
 worldnews.164.t: "Восстановление Конфедерации Перу-Боливия"
 worldnews.164.d: "Похоже, что старая идея была воскрешена в Южной Америке. Первая конфедерация между Перу и Боливией была посчитана угрозой ее соседями, и она была разорвана Чили после его победы в сражении при Юнгае в 1839 году. Однако, эта новая Конфедерация может, в отличии от своей предшественницы выжить в эти нестабильные времена в Южной Америке и в мире вообще. Тем не менее, как заметили обозреватели и этой страны, и заграничные, Ла Пасу и Лиме нужно решить несколько проблем, чтобы это образование можно было бы в самом деле назвать единой нацией."
 worldnews.164.a: "Мечта Санта-Круса вновь воплощена."
 
 worldnews.165.t: "Националистический переворот в Боливии"
 worldnews.165.d: "Обозленные провалами предыдущей администрации, часть раздраженный армейских офицеров сегодня произвели в Боливии переворот, успешно смещая правительство в Ла-Пасе. После переворота представители Национальной боливийской партии призвали к возвращению к национальному величию, и, похоже, что новая администрация собирается вступить на путь реваншизма; он неизбежно приведет Боливию к столкновению с ее соседями. Уже слышен шепот некоторых фигур в НБП, которые думают о полном роспуске Парламента, и если эти сведения верны, то это означает радикальный поворот в политике высокогорной страны, а также и всего региона."
 worldnews.165.a: "Больше доказательств поляризации мира."
 
 worldnews.166.t: "Синдикалисты избраны в Боливии"
 worldnews.166.d: "Неожиданным ходом событий, Синдикалистская партия Боливии не только выиграла на выборах в Ла-Пасе, удивив всю элиту страны, но и многие реакционные деятели, такие как бывший национальный лидер Буш и НБП признали выборы честными и демократическими. Хотя риск интервенции был высок, ранние усилия по опротестование результатов уже провалились, и их легитимность теперь признается большинством лидеров Боливии. \n\n Хотя многие международные фигуры, особенно в монархистских и диктаторских странах предупредили, что такой результат только доказывает опасность допущения синдикалистов до законных выборов, кажется, что Боливия сохраняет относительную стабильность."
 worldnews.166.a: "Интересный результат."
 
 worldnews.167.t: "Восстание милитаристов в Парагвае"
 worldnews.167.d: "Ситуация в южноамериканской стране Парагвае достигла критической точки и правительство Хосе Феликса Эстигаррибии наконец-то пало после того, как предложенные им программы оказались неудачными. Заинтересованные в политике офицеры по всей стране подняли свои казармы в восстание как против администрации, так и против их синдикалистских соперников, и быстро смогли взять Президентский Дворец в Асунсьоне, покончив с боевыми действиями. \n\n Теперь страна находится под железной рукой генерала Игиньо Моринго Мартинеса и его войск, которые готовы, как они считают, восстановить утраченную славу Парагвая и уничтожить всех врагов как внутри, так и за границами страны."
 worldnews.167.a: "Больше переворотов? Да что такое."
 
 worldnews.168.t: "Парагвай вновь становится синдикалистским"
 worldnews.168.d: "Страна Парагвай несколько лет находилась в кризисе, частично из-за провальной политики администрации Хосе Феликса Эстигаррибии, который получил власть после антисиндикалистского контрпереворота 1934 года. После быстрой, но кровавой битвы на улицах Асунсьона между правительством, революционными и националистическими войсками, абрилисты заполучили победу, захватив Президентский Дворец и объявив о падении правительства Эстигаррибии. \n\nРадикализировавшись после своего трехмесячного правления в 1934 году, по сути тоталистская 'Парагвайская абрилистская партия' Рафаэля Франко собирается провести много новых перемен. Похоже, что Парагвай снова красный."
 worldnews.168.a: "Лево. Право. Они не могут определиться?"
 
 worldnews.169.t: "Галло получает контроль над Эквадором"
 worldnews.169.d: "Не желая смотреть на то, как относительно либеральное правительство ЛРПЭ Айоры рискует ослабить Эквадор, Альберто Энрике Галло провел в Кито успешный путч. Уже распустив администрацию и создав новый военный совет, армейский руководитель начал кампанию по очищению Эквадора от всех угроз и оппонентов. Хотя недавно считалось, что у страны позитивный климат для иностранных инвестиций, неизвестно, если новому режиму удастся сохранить это положение дел."
 worldnews.169.a: "Похоже, что либерализм Кито\nбыл краткосрочным."
 
 worldnews.170.t: "Декларация [FROM.GetName]"
 worldnews.170.d: "Силы Рабочего Фронта Патагонии недавно захвалили Буэнос-Айрес и заявили о полной победе. Вместе с этим, они заявили о рождении Аргентинской Коммуны и светлого социалистического будущего для всей Южной Америки. Часть высших чинов и сторонников прежнего режима в спешке покинула страну.\n\n И хотя народ всё ещё скептически настроен по отношению к синдикализму, такой поворот событий изменил баланс в регионе."
 worldnews.170.a: "Серьёзная победа социализма."
 
 worldnews.172.t: "Умеренные социалисты восстанавливают [FROM.GetName]"
 worldnews.172.d: "Когда бушевала война между Аргентиной Карлеса и поддерживаемой чилийцами Патагонией, никто и подумать не мог, что [FROM.GetName] переживет этот день. В поразительном повороте событий возглавляемая Паласиосом коалиция США, объявила [FROM.GetName] возрождением и возвращением приостановленной конституции.\n\nИнтегрируя многих членов других фракций, они начали внедрять более либеральную демократическую систему, чем их товарищи, либо режим Карлеса. Неизвестно, переживет ли Патагония турбулентность такой смены режима, но многие надеются на зарождающийся режим и свою изоляционистскую политику."
 worldnews.172.a: "Удачи им."
 
 worldnews.173.t: "Венесуэла избрала синдикалистов"
 worldnews.173.d: "Для многих это стало неожиданностью, но Венесуэла избрала левое синдикалистическое правительство на прошедших выборах. Никто и не думал, что левые, при всех их политических врагах и оппонентах, смогут добиться такого.\n\n Богатая на нефть, Венесуэла стратегически важна для всех крупных фракций мира. Ещё не известно, расцветёт ли сей красный цветок, или же сгинет под натиском иностранных интервентов."
 worldnews.173.a: "Социалистическая Венесуэла? Серьёзно?"
 
 worldnews.174.t: "Проамериканский переворот в Венесуэле"
 worldnews.174.d: "Снова приходят новости из Венесуэлы. Пришедшее к власти на выборах, синдикалистическое правительство было свергнуто военными под руководством генерала Маркоса Переза Хименеза. После городских боёв с полицией, солдаты заняли здание парламента и распустили правительство.\n\n  Никто не сомневается, что так или иначе, США ответственны за этот переворот, ведомые желанием заполучить крупного производителя нефти в свои руки. Никто не знает, каков будет их следующий шаг, но теперь Венесуэла больше не свободна."
 worldnews.174.a: "Орёл ещё не забыл, как клеваться!"
 
 worldnews.176.t: "Провал путча в Токио"
 worldnews.176.d: "Шокирующие новости из Японии: сегодня, группа ультрамонархистов  националистов попыталась свергнуть демократическое правительство в Токио. Несмотря на то, что ои заняли ключевые здания, император лично открестился от любо помощи путчистам, что привело к их развалу в течение пару часов.\n\n Часть высших армейских чинов из числа путчистов совершили ритуальное самоубийство, включая легендарного Тэраути Хисаити. Главный бастион демократии в Азии всё-таки не пал."
 worldnews.176.a: "Японская демократия выжила."
 
 worldnews.177.t: "Австрия вступила во Второй Вельткриг"
 worldnews.177.d: "Многие считали, что любая континентальная война в Европе закончится в течение пары месяцев из-за новых смертоносных технологий. Однако все эти наивные иллюзии развеялись с первыми выстрелами Второго Вельткрига и затяжного периода жестокости и насилия в Западной Европе.\n\n Вена тщательно следила за набирающими силу синдикалистами, и теперь, когда они угрожают сложившемуся балансу сил, Австрия открыто объявила им войну. Имперские войска уже начали движение в сторону долины реки По на границе с Итальянской Соц. Республикой."
 worldnews.177.a: "Какой же Вельткриг, да без Австрии."
 
 worldnews.180.t: "Война за Мозамбик"
 worldnews.180.d: "И хотя колониальные войны должны были кануть в историю, человеческая жажда наживы и битвы сполна может быть утолена на Чёрном континенте.\n\n Трения между немецкой Миттельафрикой и португальскими колониями переросла из мелких стычек и воровства скота с обеих сторон в полномасштабную войну. Немцы хотят поживиться Мозамбиком и Анголой, а местные гарнизоны ведут свою партизанскую войну силами герильи и местных племён."
 worldnews.180.a: "Надеюсь, оно того стоит..."
 
 worldnews.181.t: "Суверианисты пришли к власти в Миттельафрике"
 worldnews.181.d: "Заголовки берлинских газет разразила новость о смене колониальной администрации в Миттельфрике. И хотя многие считали, что ссылка Штатгальтера Гёринга на чёрный континент присмирит его пыл, политические амбиции этого человека только возросли, подогреваемые фракцией суверианистов в Дар-Эль-Саламе.\nВоспользовавшись правилом о неприкосновенности Штатгальтера на чёрном континенте, Гёринг и его люди получили практически безграничную власть над колониями Миттельафрики. Под руководством таких политиков, чёрный континент станет ещё более мрачным местом. Многие из новой свиты Гёринга, уже получили в персональное владение обширные феоды, установив на них свою власть."
 worldnews.181.a: "Странное стечение обстоятельств."
 
 worldnews.182.t: "Венецианская Революция"
 worldnews.182.d: "Приход к власти в Итальянской Республике правых антиавстрийских сил, привёл к открытому отделению региона Венето под властью умеренной оппозиции. Многие из этих революционеров грезят возродить Светлейшую Республику Венецию, государство давно забытых дней.\nВсё ещё не ясно, была ли замешана в этом Австрия или нет, но правительство в Милане теперь окружено врагами со всех сторон."
 worldnews.182.a: "Сможет ли королева Адриатики выжить?"
 
 worldnews.183.t: "Йеменское восстание"
 worldnews.183.d: "Вельткриг больно ударил по дряхлой Османской Империи. Несколько лет турки не имели контроля над Аравией из-за удачного восстания арабов. Версальский договор вернул Османам их владения и закрепил за ними право на управление Йеменом, по крайней мере, на бумаге.\nМногие года Йемен живёт своей жизнью, пока взгляд султана сосредоточен на внутренних проблемах. Война на Ближнем Востоке отрезала турецкие армии от их марионетки. Воспользовавшись этим, имам Йемена публично объявил о независимости государства."
 worldnews.183.a: "Ещё один удар в спину султану."

 worldnews.185.t: "Реставрация Соединённого Королевства"
 worldnews.185.d: "После недавних событий, правительство Британского Союза пало и роялисты под эгидой дома Виндзоров возвращаются на острова. Эдуард VIII был ещё раз коронован в Вестминстерском аббатстве; его мечта всей жизни исполнилась - он отомстил за изгнание отца и революцию, лишившую его трона.\nХодят слухи, что король лично дал добро на искоренение любых следов левого правительства. И хотя новый порядок пришёл на эту землю, менталитет людей не сможет измениться в одночасье, многие всё ещё верят в идеалы синдикализма. Многие, затаив дыхание, следят за тем, как Соединённое Королевство поведёт себя на мировой арене."
 worldnews.185.a: "Новый, а точнее, старый порядок..."

 worldnews.189.t: "Нидерландские выборы [GetYear] года"
 worldnews.189.d.CNAalone: "Нидерланды исторически были одной из самых стабильных европейских стран, в которой неприязнь всего радикального была закреплена на уровне менталитета. Но экономический кризис, который произошёл из-за тесных связей с Миттельевропой, пошатнул устои и возвысил леворадикальный Красный Фронт и националистические движения в глазах голландцев.\n Правящая консервативная коалиция сумела остаться у руля, пусть и потеряв в популярности. Не желая искать союзников среди либералов, правящие консерваторы остались совсем одни."
 worldnews.189.d.CNAandLSP: "Нидерланды исторически были одной из самых стабильных европейских стран, в которой неприязнь всего радикального была закреплена на уровне менталитета. Но экономический кризис, который произошёл из-за тесных связей с Миттельевропой, пошатнул устои и возвысил леворадикальный Красный Фронт и националистические движения в глазах голландцев.\n Правящая коалиция консервативных сил победила с минимальным отрывом. Понимая своё шаткое положение, они ввели в коалицию умеренных либералов. Прежнее центристское правительство теперь более открыто левым идеям и даже готово идти на переговоры с левыми."
 worldnews.189.d.rightallianceCNAwon: "Нидерланды исторически были одной из самых стабильных европейских стран, в которой неприязнь всего радикального была закреплена на уровне менталитета. Но экономический кризис, который произошёл из-за тесных связей с Миттельевропой, пошатнул устои и возвысил леворадикальный Красный Фронт и националистические движения в глазах голландцев.\n Правящая консервативная коалиция победила с минимальным отрывом. Опасаясь дальнейшего усиления левых, консерваторы заключили союз с националистами, грамотно используя их ненависть к левым и боевые отряды."
 worldnews.189.d.rightallianceVNHwon: "Нидерланды исторически были одной из самых стабильных европейских стран, в которой неприязнь всего радикального была закреплена на уровне менталитета. Но экономический кризис, который произошёл из-за тесных связей с Миттельевропой, пошатнул устои и возвысил леворадикальный Красный Фронт и националистические движения в глазах голландцев.\n Националисты победили с минимальным отрывом. Понимая, что в одиночку им не выжить, праворадикалы впустили в правительство часть прежней умеренной коалиции консерваторов. Националисты готовы бороться с левыми на уровне законов, что отлично показал данный союз."
 worldnews.189.d.moderateleft: "Нидерланды исторически были одной из самых стабильных европейских стран, в которой неприязнь всего радикального была закреплена на уровне менталитета. Но экономический кризис, который произошёл из-за тесных связей с Миттельевропой, пошатнул устои и возвысил леворадикальный Красный Фронт и националистические движения в глазах голландцев.\n На выборах победили окололевые силы, уничтожив тем самым традиционную консерваторскую коалицию, но левые так и не получили большинство. Теперь социал-демократы и умеренные либералы готовы искать компромиссы между разными партиями, всё для того, чтобы страна и дальше жила стабильно."
 worldnews.189.d.leftcoalition: "Нидерланды исторически были одной из самых стабильных европейских стран, в которой неприязнь всего радикального была закреплена на уровне менталитета. Но экономический кризис, который произошёл из-за тесных связей с Миттельевропой, пошатнул устои и возвысил леворадикальный Красный Фронт и националистические движения в глазах голландцев.\n На выборах победили окололевые силы, уничтожив тем самым традиционную консерваторскую коалицию, но левые так и не получили большинство. Пользуясь случаем, социал-демократы создали коалицию с левыми социалистами, чтобы остаться у руля и ограничить влияние правых сил."
 worldnews.189.a: "Голландцы любят выборы."
 
 worldnews.190.t: "Путч Рейндерса в Нидерландах"
 worldnews.190.d.junta: "Шокирующие известия из Нидерландов передают, что генерал Исаак Рейндерс совершил военный переворот против новоизбранного левого правительства и ввёл военное положение в стране. Консервативные части армии, ровно как и праворадикальные боевики присоединились к нему, ещё больше подорвав прочность правящей партии. Многие видят в этом перевороте руку Кайзера, хотя это всего лишь слухи. Военные организовали хунту, которая будет править во время военного положения. Неясно, как долго продлится это временное правление."
 worldnews.190.d.vnh: "Шокирующие известия из Нидерландов передают, что генерал Исаак Рейндерс совершил военный переворот против новоизбранного левого правительства и ввёл военное положение в стране. Консервативные части армии, ровно как и праворадикальные боевики присоединились к нему, ещё больше подорвав прочность правящей партии. Многие видят в этом перевороте руку Кайзера, хотя это всего лишь слухи. Военные позволили праворадикальным националистам создать временное правительство, которое на деле оказалось простой диктатурой."
 worldnews.190.a: "Это конец голландской демократии."
 
 worldnews.191.t: "Революция в Нидерландах"
 worldnews.191.d.RSAPelection: "И вот левые одержали очередную победу в Европе. Традиционно умеренные Нидерланды пали перед социализмом, что заметно сказалось на европейских интересах Германии. Эта новость повергла в шок многие реакционные режимы и монархии по всему миру.\n\n Прежде маргинальная Революционная социалистическая рабочая партия (РСРП) была избрана народом Нидерландов, что привело к окончанию застоя в политической системе этой страны. Увеличившееся политическое расслоение, вкупе с неспособностью правительства справиться с последствиями Чёрного Понедельника, привело к радикализации общества и к, по сути, социалистической революции через честные выборы. Сложившаяся ситуация может сильно ударить по гегемонии Рейха в Европе."
 worldnews.191.d.overthrowthesystem: "И вот левые одержали очередную победу в Европе. Традиционно умеренные Нидерланды пали перед социализмом, что заметно сказалось на европейских интересах Германии. Эта новость повергла в шок многие реакционные режимы и монархии по всему миру.\n\n Умеренная СДРП была вынуждена создать коалицию с Революционной социалистической рабочей партией (РСРП). Учитывая политическую природу коалиции, социалистический переворот может не заставить себя долго ждать. Возможно, данное событие послужит предупреждением демократическим режимам о том, чем может обернуться открытое участие социалистов в демократических процессах.\n\n Не смотря на опасения, истинная природа нового режима Нидерландов пока остаётся не ясной, поскольку она не является откровенно синдикалистской. Тем временем, международные наблюдатели находятся в ожидании ответа Германии на появившуюся потенциальную угрозу у своих границ."
 worldnews.191.d.mutiny: "И вот левые одержали очередную победу в Европе. Традиционно умеренные Нидерланды пали перед социализмом, что заметно сказалось на европейских интересах Германии. Эта новость повергла в шок многие реакционные режимы и монархии по всему миру.\n\n После того как синдикалист Маринус ван дер Люббе устроил в Гааге поджог Бинненхофа, страна погрузилась в хаос и правительство Нидерландов было вынуждено ввести чрезвычайное положение. После того как левые радикалы захватили небольшое судно и, сплавившись по нему в Гронинген, революционные настроения начали быстро распространяться, армия не справляется с ситуацией.\n\n С распадом политического истеблишмента Нидерландов, для Германии появилась новая угроза, которая находится у самых границ империи. Никакой реакции со стороны Германии пока не последовало, однако ответ наверняка не заставит себя долго ждать."
 worldnews.191.d.socialistputsch: "И вот левые одержали очередную победу в Европе. Традиционно умеренные Нидерланды пали перед социализмом, что заметно сказалось на европейских интересах Германии. Эта новость повергла в шок многие реакционные режимы и монархии по всему миру.\n\n То, что началось как небольшой мятеж в Де Пиле закончилось тем, что штурмовики Красного фронта и сочувствующие левым солдаты взяли контроль над всеми крупными городами по всей стране, в то время как большая часть правительства и королевская семья Нидерландов провели массовую эвакуацию.\n\n С завершением социалистического переворота и установлением нового временного революционного правительства можно с уверенностью сказать, что революция в Нидерландах оказалась успешной. Однако реакция Германской Империи на эти события наверняка не заставят себя долго ждать."
 worldnews.191.a: "Вновь зажёгся огонь революции."
 
 worldnews.192.t: "Националистический переворот в Нидерландах"
 worldnews.192.d.parliament: "Нидерланды давно рассматриваются как остров политического центризма в океане левых идеологов и махинаций империалистов. Однако все изменилось с появлением Вербондского национального герцогства 'ВНГ'. Так называемый 'Альянс за национальное возрождение' - это ультранационалистическое движение, призванное восстановить голландскую гордость и избавить страну от синдикалистского влияния после кризиса Черного Понедельника.\n Растущая популярность ВНГ привела к тому, что он стал самой большой партией в парламенте, однако им не удалось получить большинство на выборах. Чтобы не уступать своим соперникам, военизированные формирования Ландвахт сегодня вошли в Бинненхоф, чем навели ужас на остальную часть парламента, подчинив их, и тем самым создавая диктатуру."
 worldnews.192.d.finsterwolde: "Нидерланды давно рассматриваются как остров политического центризма в океане левых идеологов и махинаций империалистов. Однако все изменилось с появлением Вербондского национального герцогства 'ВНГ'. Так называемый 'Альянс за национальное возрождение' - это ультранационалистическое движение, призванное восстановить голландскую гордость и избавить страну от синдикалистского влияния после кризиса Черного Понедельника.\n Собрание партии ВНГ в Маастрихте, услышало зажигательную речь Корнелиса ван Гелкеркена, который открыто призывал к восстанию против правительства, которое по его словам, было свергнуто "злобными криптосиндикалистами". Это привело к тому, что по всей территории Нидерландов, военизированные формирования ВНГ подняли крупное восстание, несмотря на призывы умеренных во главе с королевой Вильгельминой, прекратить это безумие."
 worldnews.192.d.haguemarch: "Нидерланды давно рассматриваются как остров политического центризма в океане левых идеологов и махинаций империалистов. Однако все изменилось с появлением Вербондского национального герцогства 'ВНГ'. Так называемый 'Альянс за национальное возрождение' - это ультранационалистическое движение, призванное восстановить голландскую гордость и избавить страну от синдикалистского влияния после кризиса Черного Понедельника.\n Сегодня, завершилось массовое шествие сторонников ВНГ и военизированных формирований Ландвахт от Амстердама до столицы в Гааге, приведший к тому, что королева Вильгельмина отправила правительство в отставку и заменила его лидерами ВНГ, чтобы остановить насильственный путч сочувствующих армейских офицеров."
 worldnews.192.a: "Совсем не по-голландски."
 
 worldnews.193.t: "Нидерланды признали Французскую Коммуну"
 worldnews.193.d: "Многие европейские страны были смущены недавним поступком Нидерландов, которые послали дипломатическую миссию во Французскую Коммуну, чтобы обсудить вопросы прав человека. Подобный шаг идёт в разрез с традиционной голландской политикой, которая уже больше десятилетия была направлена на поддержку французского и английского правительств в изгнании.\nНидерланды всеми силами старались замять причины своего неоднозначного поступка, но на днях стало известно, что под давлением местных социалистов правящая коалиция ХНА-ПЛГ де-факто признала Французскую Коммуну, опасаясь за безопасность страны. Если это действительно так, то данная ситуация станет отличным примером того, на что готовы пойти центристы, лишь бы не допустить радикализации общества."
 worldnews.193.d.dejure: "Многие европейские страны были шокированы недавним заявлением Нидерландов, которые де-юре признали Французскую Коммуну легитимным правительством Франции. В нарушение всех сложившихся норм Вельтполитики, которые продвигала Германия, голландцы даже умудрились разорвать дипломатические отношения с Алжиром.\nНидерланды всеми силами старались замять причины своего неоднозначного поступка, однако недавно стало известно, что под давлением местных социалистов правящая коалиция ХНА-ПЛГ де-факто признала Французскую Коммуну, опасаясь за безопасность страны. Если это действительно так, то данная ситуация станет отличным примером того, на что готовы пойти центристы, лишь бы не допустить радикализации общества."
 worldnews.193.a: "Кто их поймёт, этих дипломатов?"
 
 worldnews.194.t: "Нидерланды национализировали немецкие предприятия"
 worldnews.194.d: "Правительство Нидерланд заявило об экспроприации средств производства местных немцев, что вызвало жуткую ярость Кайзера. Ослабевшие консерваторы в голландском правительстве были вынуждены войти в коалицию с либералам и начать диалог с крайне левым и правым спектрами политики.\n\n Пытаясь удержать ультранационалистов в узде, Нидерланды сделали реверанс в их сторону и объявили национализацию немецких предприятий. Многие в Берлине уже требуют покарать их за такую наглость. Как империя отреагирует на это - загадка."
 worldnews.194.a: "Очень странно"
 
 worldnews.195.t: "Вильгельмина отреклась от голландского престола"
 worldnews.195.d.republic: "После ошеломительной для голландской общественности череды событий, Вильгельмина, которая правила Нидерландами более полувека, отреклась от трона. Возрастающая популярность синдикалистов, распад умеренной коалиции и полный провал предыдущего правительства вынудили старую королеву сложить свои полномочия. Попытка короновать Юлиану новой королевой Нидерландов была бойкотирована левым парламентским большинством. Отречение Вильгельмины положило конец монархии в Нидерландах, которые стали новой социалистической республикой."
 worldnews.195.d.republicalbarda: "После ошеломительной для голландской общественности череды событий, Вильгельмина, которая правила Нидерландами более полувека, отреклась от трона. Ошарашенная победой около-левых сил, Вильгельмина однозначно заявила, что готова принять только кандидатуру умеренных, несмотря на честную победу социал-демократической СДРП. Подобные заявления заставили партию объединиться с леворадикалами из РСРП, и даже сами умеренные силы в парламенте были разгневаны Вильгельминой, которая своими действиями лишь усилила позиции левых. Чувствуя, что она теряет последние крупицы власти, Вильгельмина отреклась от трона, а Виллем Албарда, член СДРП, был избран новым президентом.\n\n Отречение Вильгельмины положило конец монархии в Нидерландах, которые отныне стали называться 'республикой, свободной от реакционной тирании монархов'."
 worldnews.195.d.juliana: "После ошеломительной для голландской общественности череды событий, Вильгельмина, которая правила Нидерландами более полувека, отреклась от трона. Ошарашенная победой около-левых сил, Вильгельмина однозначно заявила, что готова принять только кандидатуру умеренных, несмотря на честную победу социал-демократической СДРП. Подобные заявления заставили партию объединиться с леворадикалами из РСРП, и даже сами умеренные силы в парламенте были разгневаны на Вильгельмину, которая лишь усилила позиции левых. Чувствуя, что она теряет последние крупицы власти, Вильгельмина отреклась от трона, а Виллем Албарда, член СДРП, был избран новым главой парламента.\n\n Отречение Вильгельмины не смогло окончательно добить монархию в Нидерландах. Её дочь, Юлиана, стала новой королевой Нидерландов."
 worldnews.195.a: "Ещё одна монархия пала"
 
 worldnews.199.t: "Арлонский Конгресс"
 worldnews.199.d: "После освобождения Бельгии от Германских сил, встал вопрос о том, что делать дальше. Обе нации послали своих представителей на переговоры в местечко Арлон на границе с Германией, чтобы разрешить вопросы о месте Бельгии на мировой арене.\n\n По итогам переговоров с Кайзеррейхом, было постановлено, что Германия признает независимость Бельгии и передаст ей спорные земли в обмен на вступление той в Рейхспакт. Как оказалось, бельгийцы смогли приспособиться к новому положению дел."
 worldnews.199.d.failed: "После освобождения Бельгии от Германских сил, встал вопрос о том, что делать дальше. Обе нации послали своих представителей на переговоры в местечко Арлон на границе с Германией, чтобы разрешить вопросы о месте Бельгии на мировой арене.\n\n Переговоры с Кайзеррейхом зашли в тупик, так как ни одна из сторон не смогла прийти к соглашению с другой. На данный момент, Бельгия осталась сама по себе."
 worldnews.199.a: "Бельгия вернулась на мировую арену."
 
 worldnews.200.t: "Валлонский кризис"
 worldnews.200.d: "Восстание во Фландрии-Валлонии обернулось рождением Валлонской Коммуны, чей флаг уже реет во всём мятежном регионе. Немецкие отряды и ополчение из числа роялистов готовятся к контратаке. Молодой Коммуне не остаётся ничего, кроме как обратиться к французскому соседу.\nФранцузская Коммуна решила не втягивать себя в этот конфликт, сделав вид, что у их границ ничего не происходит. Судьба валлонских повстанцев неясна - многие уже морально готовы к реставрации монархии. Хорошая новость - сегодня мы избежали очередной Вельткриг."
 worldnews.200.d.germanybacksdown: "Восстание во Фландрии-Валлонии обернулось рождением Валлонской Коммуны, чей флаг уже реет во всём мятежном регионе. Немецкие отряды и ополчение из числа роялистов готовятся к контратаке. Молодой Коммуне не остаётся ничего, кроме как обратиться к французскому соседу.\nПосле успешного восстания, немцы оказались неспособны быстро подавить восстание, и при поддержке Интернационала, Валлонская Коммуна подписала белый мир с Германией в Льеже. Синдикализм шагает по Европе семимильными шагами, но, по крайней мере, очередного Вельткрига не будет."
 worldnews.200.d.francebacksdown: "Восстание во Фландрии-Валлонии обернулось рождением Валлонской Коммуны, чей флаг уже реет во всём мятежном регионе. Немецкие отряды и ополчение из числа роялистов готовятся к контратаке. Молодой Коммуне не остаётся ничего, кроме как обратиться к французскому соседу.\nНесмотря на всю поддержку Интернационала, немцы смогли быстро разбить войска повстанцев, и французы были вынуждены пойти на попятную. Без их помощи, у валлонских революционеров нет шансов. Хорошая новость - сегодня мы избежали очередной Вельткриг."
 worldnews.200.a: "Это было близко"
 
 worldnews.201.t: "Вторая Революция Махдистов"
 worldnews.201.d: "Судан всегда был землёй религиозных и храбрых людей, с которыми пришлось считаться даже Британской Империи. В очередной раз они восстают, на этот раз против Египта, ведомые своим Махди. Призывая народ на священный джихад против египетских оккупантов, их лидер набирает популярность. Ещё не ясно, что покажут эти племенные воины, но война обещает быть кровопролитной."
 worldnews.201.a: "Звучит неплохо."
 
 worldnews.210.t: "Восстановление Итальянской Федерации"
 worldnews.210.d.tuscwaus: "Приведенные к победе Австрией в их восстании против Итало Бальбо и радикального АИН, сегодня венецианские лидеры объявили о восстановлении Итальянской федерации - системы правления, введенной Австрией после окончания гражданской войны, но позволившей ей потерять силу в 1929 году. На этот раз Consiglio della Federazione Italiana, или Совет Федерации, не будет возглавляться республиканцами Милана. Говорят, что слишком многие потеряли веру в демократию, и поэтому Совет будет обладать всей полнотой власти и возглавляться лидером одного из государств, входящих в Федерацию. Главой Совета Федерации в очередной раз является Великий герцог Петер Фердинанд из Тосканы. Многие считают его возвращение к власти не случайным совпадением, учитывая, что он является Габсбургом, а австрийское влияние на севере Италии явно восстановлено."
 worldnews.210.d.lombwaus: "При поддержке Австрии в их успешном восстании против Итало Бальбо и радикального АИН, сегодня венецианские лидеры объявили о восстановлении Итальянской федерации - системы правления, введенной Австрией после окончания гражданской войны, но позволившей ей потерять силу в 1929 году. На этот раз Consiglio della Federazione Italiana, или Совет Федерации, не будет возглавляться республиканцами Милана. Говорят, что слишком многие потеряли веру в демократию, и поэтому Совет будет обладать всей полнотой власти и возглавляться лидером одного из государств, входящих в Федерацию. Главой Совета Федерации становится граф Адриано Висконти из Ломбардии, что является удивительным шагом, так как австрийские покровители предпочли бы Великого герцога Габсбургов Тосканского. Однако в стране сохраняется высокий уровень антиавстрийских настроений, и поэтому этот шаг считался более безопасным."
 worldnews.210.d.venwaus: "При поддержке Австрии в их успешном восстании против Итало Бальбо и радикального АИН, сегодня венецианские лидеры объявили о восстановлении Итальянской федерации - системы правления, введенной Австрией после окончания гражданской войны, но позволившей ей потерять силу в 1929 году. На этот раз Consiglio della Federazione Italiana, или Совет Федерации, не будет возглавляться республиканцами Милана. Говорят, что слишком многие потеряли веру в демократию, и поэтому Совет будет обладать всей полнотой власти и возглавляться лидером одного из государств, входящих в Федерацию. В то время как некоторые полагали, что главой Совета Федерации вновь станет Великий герцог Габсбургов Тосканский, венецианцы вместо этого решили поставить на такое место своего премьер-министра Джузеппе Вольпи. Учитывая его заметную роль в восстании против АИН, многие в Италии считают его национальным героем."
 worldnews.210.d.tuscnoaus: "Успешно проведя восстание против Итало Бальбо и радикального АИН, сегодня венецианские лидеры объявили о восстановлении Итальянской федерации - системы правления, введенной Австрией после окончания гражданской войны, но позволившей ей потерять силу в 1929 году. На этот раз Consiglio della Federazione Italiana, или Совет Федерации, не будет возглавляться республиканцами Милана. Говорят, что слишком многие потеряли веру в демократию, и поэтому Совет будет обладать всей полнотой власти и возглавляться лидером одного из государств, входящих в Федерацию. Главой Совета Федерации вновь стал Великий герцог Габсбургов Петер Фердинанд из Тосканы, и этот шаг наверняка понравится соседней Австрии."
 worldnews.210.d.lombnoaus: "Успешно проведя восстание против Итало Бальбо и радикального АИН, сегодня венецианские лидеры объявили о восстановлении Итальянской федерации - системы правления, введенной Австрией после окончания гражданской войны, но позволившей ей потерять силу в 1929 году. На этот раз Consiglio della Federazione Italiana, или Совет Федерации, не будет возглавляться белыми республиканцами. Говорят, что слишком многие потеряли веру в демократию, и поэтому Совет будет обладать всей полнотой власти и возглавляться лидером одного из государств, входящих в Федерацию. Главой Совета Федерации становится граф Адриано Висконти из Ломбардии. В то время как для некоторых это является неожиданным шагом, антиавстрийские настроения в стране остаются высокими, и правительство не желает вновь возвращаться к австрийскому влиянию."
 worldnews.210.d.vennoaus: "Успешно проведя восстание против Итало Бальбо и радикального АИН, сегодня венецианские лидеры объявили о восстановлении Итальянской федерации - системы правления, введенной Австрией после окончания гражданской войны, но позволившей ей потерять силу в 1929 году. На этот раз Consiglio della Federazione Italiana, или Совет Федерации, не будет возглавляться белыми республиканцами. Говорят, что слишком многие потеряли веру в демократию, и поэтому Совет будет обладать всей полнотой власти и возглавляться лидером одного из государств, входящих в Федерацию. В то время как некоторые полагали, что главой Совета Федерации вновь станет Великий герцог Габсбургов Тосканский, венецианцы вместо этого решили поставить на такое место своего премьер-министра Джузеппе Вольпи. Учитывая его заметную роль в восстании против АИН, многие в Италии считают его национальным героем."
 worldnews.210.a: "Посмотрим, как долго это продлится на этот раз."
 
 worldnews.211.t: "Роспуск Итальянской Республики"
 worldnews.211.d: "Успешные в своем восстании против Итало Бальбо и радикального АИН, сегодня венецианские лидеры объявили, что они не будут восстанавливать Итальянскую Республику, а вместо этого она, и новое государство Ломбардия, пойдут своими отдельными путями, как независимые государства. В настоящее время Ломбардия находится под военным управлением, хотя правительству помогает граф Адриано Висконти, и большинство ожидают, что он возьмет на себя бразды правления в качестве лидера страны. Это было неудивительно, учитывая, что вера в демократию была сильно подкошена, а военные обеспокоены тем, что поддержка АИН до сих пор не сломлена. Будет ли этот шаг означать новый статус-кво венецианского руководства в регионе или же оставит обе нации уязвимыми перед лицом внешних угроз, еще предстоит выяснить."
 worldnews.211.a: "Фрагменты старого порядка"
 
 worldnews.212.t: "Австрия заставляет Италию восстановить Федерацию"
 worldnews.212.d: "В то время как Consiglio della Federazione Italiana, руководящий орган Итальянской Федерации, истек в 1929 году, сегодня [AUS.GetAdjective]ое правительство объявило о своем восстановлении в качестве официального правительства Италии... хотя на этот раз без республиканцев, лидера которых австрийцы были вынуждены принять в качестве главы Федерации после гражданской войны. Хотя демонстрации по всей Италии говорят о том, что это непопулярный шаг, выборы были приостановлены, и вся власть была передана в руки Совета и его аристократических членов - новым главой Совета стал Великий герцог Тосканы Габсбург Петер Фердинанд. Хотя Австрия утверждает, что не считает Федерацию марионеточным правительством, это во многом означает восстановление австрийского влияния в стране, утраченной после событий Черного Понедельника в 1936 году."
 worldnews.212.a: "Посмотрим, как долго это продлится на этот раз"
 
 worldnews.213.t: "[ITA.GetNameDefCap] бросает вызов австрийскому Ультиматуму"
 worldnews.213.d: "В то время как Consiglio della Federazione Italiana, или Совет Федерации, истек в 1929 году, [AUS.GetNameDef] предъявила Милану ультиматум, настаивая на восстановлении власти Совета в [ITA.GetNameDef] - с республиканцами или без республиканцев во главе Совета, как это было до его роспуска. Ультиматум истек, и очевидно, что итальянцы хотят сохранить свою вновь обретенную свободу. Уже сейчас австрийские и итальянские войска начали стычку на границах, а премьер-министр Италии [ITA.GetLeader] выступил в Милане с речью, призвав всех истинных итальянцев к борьбе с 'вопиющим империализмом' империи Габсбургов."
 worldnews.213.a: "Опасный ход"
 
 worldnews.214.t: "[AUS.GetNameDefCap] выходит из Италии"
 worldnews.214.d: "Понятно, что Черный Понедельник сильно ударил по [AUS.GetNameDef]. Австро-Венгерский Рейхскригсминистер объявил сегодня, что отзывает подразделения, расположенные на [ITA.GetAdjective]ой территории, неспособных позволить себе финансовое бремя защиты их от [SRI.GetNameDef]. Хорошо это или плохо, но [ITA.GetNameDef] теперь фактически независима от австрийского господства, по крайней мере до тех пор, пока австрийцы не восстановят свои силы и не примут решение о том, стоит ли восстанавливать их интересы на итальянском полуострове. Многие в [ITA.GetNameDef] выражали беспокойство по поводу того, не оставит ли это их под угрозой нападения со стороны [SRI.GetNameDef] - шага, который вновь ввергнет Италию в гражданскую войну."
 worldnews.214.a: "Австрийское влияние продолжает ослабевать"
 worldnews.214.b: "Может быть, это возможность?"
 
 worldnews.215.t: "Итальянская демократия выживает"
 worldnews.215.d: "После многих месяцев террористических актов АИН, сотрясавших [ITA.GetNameDef] и заставивших многих в стране усомниться в способности правительства поддерживать порядок, сегодня в Милане был проведен вотум недоверия - в случае его принятия, многие боялись, что это стало бы сигналом о распаде Республики. В результате это ходатайство было отклонено, а премьер-министром [ITA.GetLeader] заявил со ступеней правительственного здания, что демократия в Италии пережила свой самый большой вызов и что Республика будет жить дальше."
 worldnews.215.a: "Посмотрим что из этого выйдет"
 
 worldnews.216.t: "Падение Итальянского правительства"
 worldnews.216.d.tusc: "После многих месяцев террористических актов, совершенных АИН, потрясших [ITA.GetNameDef] и заставивших многих в стране усомниться в способности правительства поддерживать порядок, отчего сегодня в Милане был проведен вотум недоверия... голосование, которое прошло с минимальным перевесом. Внимание теперь обратилось на Consiglio della Federazione Italiana, старое правительство Итальянской Федерации, которое прекратило свое существование после 1929 года, но все еще технически существующее, и оно вмешалось, чтобы заполнить пустоту, оставленную Республикой. Совет, состоящий из аристократов из государств Федерации и возглавляемый Габсбургским Великим герцогом Тосканским, Петером Фердинандо, приостановил выборы и объявил о восстановлении Итальянской Федерации в полном объеме."
 worldnews.216.d.lomb: "После многих месяцев террористических актов, совершенных АИН, потрясших [ITA.GetNameDef] и заставивших многих в стране усомниться в способности правительства поддерживать порядок, отчего сегодня в Милане был проведен вотум недоверия... голосование, которое прошло с минимальным перевесом. Внимание теперь обратилось на Consiglio della Federazione Italiana, старое правительство Итальянской Федерации, которое прекратило свое существование после 1929 года, но все еще технически существующее, и оно вмешалось, чтобы заполнить пустоту, оставленную Республикой. Совет, состоящий из аристократов из государств Федерации и возглавляемый Адриано Висконти, герцогом Ломбардийским, приостановил выборы и объявил о восстановлении Итальянской Федерации в полном объеме."
 worldnews.216.d.separate: "После многих месяцев террористических актов, совершенных АИН, потрясших [ITA.GetNameDef] и заставивших многих в стране усомниться в способности правительства поддерживать порядок, отчего сегодня в Милане был проведен вотум недоверия... голосование, которое прошло с минимальным перевесом. После долгих ожесточенных выступлений в палатах правительства стало ясно, что республика потерпела крах, и разногласия между политиками и народом не будут устранены. Похоже, что Венеция и Ломбардия решили пойти своими путями, каждый из которых руководил своими правительствами и отвечал за свои судьбы."
 worldnews.216.a: "Интересно"
 
 worldnews.217.t: "АИН свергает итальянское правительство"
 worldnews.217.d: "После неудачной попытки захвата власти на выборах 1937 года, Итало Бальбо и АИН сегодня свергли итальянское правительство, после нескольких месяцев восстаний и бомбардировок. Попытки республиканского правительства сохранить порядок потерпели неудачу настолько, что настроения народа обернулись против них, и АИН набросилось на эту слабость, получив значительную поддержку в итальянских вооруженных силах. Сегодня, с демонстрациями заполнившими улицы, особенно в Венеции, Итало Бальбо объявил, что АИН взяло государство под свой полный контроль и будет следить за тем, чтобы нация оставалась сильной перед лицом синдикалистской угрозы."
 worldnews.217.a: "Похоже на рецепт нестабильности"
 
 worldnews.218.t: "Италия Объединённая!"
 worldnews.218.d.ani: "Сегодня, лидер [ITA.GetNameDef], самозваный 'Дуче' [ITA.GetLeader], объявил о том, что Италия вновь стала единым целым и воссоединилась. 'Это Второе Рисорджименто произошло большой ценой,' - сказал он ликующей толпе в Риме, - 'но жертв будет еще больше, ибо Италия должна достичь того величия, которое она знала только в прошлые века. Позор Первого Вельткрига должен быть отброшен в сторону, и мир должен знать, что наша нация никогда больше не будет разорвана на части иностранными державами!' Силы так называемой 'зеленой рубашки' были заняты распространением по регионам Италии, где АИН только недавно достигло контроля, убедившись, что оппозиция новому режиму по-прежнему молчит."
 worldnews.218.d.fed: "Сегодня глава Consiglio della Federazione Italiana, или Совета Федерации, [ITA.GetLeader], заявил, что Италия наконец воссоединилась и стала единым целым. 'Наше воссоединение произошло большой ценой,' - сказал он ликующей толпе в Риме, - 'и мы должны помнить о жертвах, принесенных столькими людьми. Грехи прошлого должны быть отброшены в сторону, и мы должны быть благодарны за то, что наш народ прошел через такое беспокойное время и снова оказался в таком положении'. В стране до сих пор много недовольства по поводу объема полномочий, которыми обладает Совет, - и что во многом - Италия вернулась к своим аристократическим корням, вместо того чтобы принять демократию, но для большинства, это время единства принесло много радости."
 worldnews.218.d.rep: "Сегодня премьер-министр [ITA.GetNameDef], [ITA.GetLeader], заявил, что Италия вновь воссоединилась. 'Это Второе Рисорджименто произошло большой ценой,' - сказал он ликующей толпе в Риме, - 'и мы должны помнить о жертвах, принесенных столькими людьми. Грехи прошлого должны быть отброшены в сторону, и мы должны быть благодарны за то, что наша нация прошла через такое беспокойное время и снова оказалась в таком положении'. Правительство сейчас значительно стабильнее, чем было совсем недавно, когда оно проголосовало за вотум недоверия, но внутри страны много тех, кто опасается того, что сделает расширение прав голосования теперь, когда страна едина и в нее включены более социалистические части Северо-Запада."
 worldnews.218.a: "Возникает новая сила"
 
 worldnews.219.t: "Второе Рисорджименто завершено"
 worldnews.219.d: "Сегодня председатель [SRI.GetNameDef], [SRI.GetLeader], объявил о завершении Второго Рисорджименто Италии. Со времен гражданской войны мы мечтали о том, чтобы Италия была не только целой, но и по-настоящему свободной", - сказал он ликующей толпе в Риме. "Теперь эта мечта стала реальностью. Италия освободилась от своих иностранных хозяев, от своих капиталистических хозяев, от своих королей и аристократов... теперь, впервые, она действительно принадлежит итальянскому народу"! Синдикалистские силы были заняты, распространившись по всей территории страны, когда-то предназначенной для сопротивления синдикалистскому контролю, и неизвестно, действительно ли [SRI.GetNameDef] когда-нибудь достигнет той стабильности, которую обещало правительство."
 worldnews.219.a: "Отлично сработано!"
 worldnews.219.b: "Объединенная синдикалистская Италия? Мерси!"
 
 worldnews.220.t: "Королевство Италия восстановлена"
 worldnews.220.d: "Сегодня король [SRD.GetLeader] заявил, что Итальянское Королевство вновь было восстановлено и преобразовано в единое целое. Это Второе Рисорджименто произошло большой ценой", - сказал он ликующей толпе в Риме. Мы никогда не должны забывать о жертвах, которые привели нас сюда, а также об усилиях наших союзников, которые сделали это возможным... но мы также должны гордиться тем, что мы сделали". Мы преодолели позор нашей утраты в Первом Вельткриге и вернулись, чтобы занять свое законное место во главе восстановленной нации. Это победа для всех итальянцев! Не все итальянцы разделяют царский энтузиазм, но на данный момент, большинство кажется, радуется тому, что разногласия их народа теперь остались в прошлом."
 worldnews.220.a: "Старый порядок возвращается, кажется."
 
 worldnews.221.t: "Провозглашение Итальянской Империи"
 worldnews.221.d: "Сегодня Король [SIC.GetLeader] Королевства Двух Сицилий заявил, что поскольку большая часть Италии теперь объединена под его властью, его нация будет известна как Итальянская империя. В то время как некоторые считают титул амбициозным, огромная толпа в городе Неаполе с большим энтузиазмом приветствовала заявление короля. В сицилийском правительстве были и те, кто по-видимому, предлагали человеку, который воссоединил Италию, принять титул императора, но очевидно король отказался. На самом деле наша страна - это земля многих царей, - сказал он, - но все они объединены под властью империи, точно так же, как Италия - это земля многих людей, объединенных под одним устремлением"."
 worldnews.221.a: "Молодцы!"
 
 worldnews.222.t: "Провозглашение Итальянской Конфедерации"
 worldnews.222.d: "Сегодня король [uniter.GetLeader] из [uniter.GetNameDef] объявил о создании Итальянской конфедерации, в которой восстановленные государства Италии вновь обретут независимость, но будут работать сообща во имя общего дела. На вопрос некоторых чиновников, почему он просто не решил объединить Италию под единым флагом, король ответил: 'Потому что это не сработало в первый раз. В конце концов, Рисорджименто уничтожил нас. Мы итальянцы, один народ, и в то же время не один, и так было всегда'. Толпы людей в [uniter.GetAdjective]ой столице, и по всему итальянскому полуострову, казалось, одобрили заявление короля, и дико радовались, когда он начал свое первое путешествие по новым государствам."
 worldnews.222.a: "Отлично сработано!"
 
 worldnews.228.t: "Папа нашёл убежище в государстве [refuge.GetNameDef]"
 worldnews.228.d: "Папа [PAP.GetLeader] прибыл сегодня в [refuge.GetNameDef], искав там убежища после того, как о его изгнали из Рима было объявлено [SRI.GetNameDef] более недели назад. Будучи измотанным в своем путешествии, Папа обратился к огромной толпе доброжелателей и верующих, собравшихся возле его гостиницы, и призвал остальной мир искать стойкости и силы духа перед лицом угрозы синдикалистов."
 worldnews.228.a: "По крайней мере он в безопасности"
 worldnews.228.b: "Скатертью дорога"
 
 worldnews.229.t: "Маршал У Пейфу поддержал Аньцин"
 worldnews.229.d: "Смерть Маршала Суня Чуаньфана и стремительная потеря влияния Пекина на окраины своей империи заставило У Пейфу, реальную власть за спиной императорского трона, лично заняться военными делами. Этим утром, Пейфу и Цао Кунь, президент Ассамблеи, выразили свою поддержку мятежному губернатору Аньцина, Чэню Тяоюаню. Пейфу и Кунь долгое время искали предлог для того, чтобы выбить немцев из Пекина. Поддержка антиконцессиониста и националиста Тяоюаня дала понять западному миру, что им более не рады в Китае. И хотя Цин пока не может воевать на Юге в полную силу, вынужденная оборонять северные рубежи от Фэнтяня, ограниченный контингент имперских войск уже направляется на подмогу новому другу и союзнику Нефритового Маршала."
 worldnews.229.a: "Во имя императора!"
 worldnews.229.b: "Прежний баланс сил рухнул..."
 
 worldnews.230.t: "Маршал У Пейфу поддержал Нанкин"
 worldnews.230.d: "Смерть Маршала Суня Чуаньфана и стремительная потеря влияния Пекина на окраины своей империи заставило У Пейфу, реальную власть за спиной императорского трона, лично заняться военными делами. Этим утром, Пейфу и Цао Кунь, президент Ассамблеи, выразили свою поддержку легитимному правительству Нанкина, последнему оплоту распавшейся Лиги. Для немецких дипломатов эта новость стала поводом вздохнуть спокойно. Сколь напряжены не были бы отношения Германии и Цин, Нефритовому Маршалу нужна поддержка из вне, чтобы противостоять Фэнтяню и переметнувшимся к ним предателям из Аньцина."
 worldnews.230.a: "Во имя императора!"
 worldnews.230.b: "Длань Кайзера прочно вцепилась в Пекин"
 
 worldnews.231.t: "Имперский переворот"
 worldnews.231.d: "Детали пока неясны, но этим утром прошли слухи, что в Запретном Городе случился переворот против Чжилийской Клики. Слухи подтвердились в тот момент, когда из ворот дворца вышел император Пу И в сопровождении своего брата Пуцзе и Ли Бинчжи, переметнувшегося чжилийского генерала и убеждённого монархиста.\n\n'Наш дорогой император только что спасся от предательских заговорщиков из Чжили, которые посмели покуситься на него!' – пафосно заявлял принц, пока Пу И стоял в стороне, не выказывая никаких эмоций. Неясно, было ли это состояние полного умиротворения, либо состояние парализующего ужаса. 'У Пейфу и его немецкие прихвостни вот уже три десятка лет отравляли нашу страну своим коварством и алчностью' – как только речь завершилась, на улицу были вынесены изувеченные тела Пейфу и Цао Куня, которые тут же были окончательно истерзаны бушующей толпой, которая уже принялась сжигать все, на чём стояло клеймо Кайзера."
 worldnews.231.a: "Да здравствует император!"
 worldnews.231.b: "Ещё один переворот в Китае?"
 
 worldnews.232.t: "Неудачный переворот в Пекине!"
 worldnews.232.d_1: "Детали пока неясны, но этим утром прошли слухи, что в Запретном Городе случился переворот против Чжилийской Клики. Слухи подтвердились в тот момент, когда из ворот дворца вышел У Пейфу, немного подкошенный в ногах, но старающийся сохранить лицо. Сказав пару дежурных фраз набежавшим репортёрам, он приказал вывести Пу И, окружённого толпой охранников.\n\n'Цао Кунь, демократически избранный лидер Китая, был зверски атакован имперскими прихвостнями, которые, несомненно, спонсировались Кайзером.' – Пейфу уверенно врал, глядя прямо в объективы камер. 'Предельно понятно, что эти преступники собирались уничтожить всё то, чего мы достигли за эти годы, они предали Ассамблею и по праву мы нарекаем их изменниками. Китай вновь станет Республикой, свободной от иноземного влияния!' – толпа рукоплескала Нефритовому Маршалу, который смог даже в такой ситуации всё обставить так, как ему было нужно."
 worldnews.232.d_2: "В смраде китайской политики можно забыть о хрупком балансе сил, установившемся между кликой Чжили и ее маньчжурскими придворными коллегами. Однако, похоже, чаша весов была опрокинута, поскольку после предполагаемых планов попытки переворота в столице У Пейфу отважно вышел к неустрашимым толпам.\n\nПровозгласив себя 'Национальным защитником' после отставки Цао Куня, Нефритовый маршал объявил о полной отмене маньчжурской монархии, восстановлении Бэйянской республики и продолжении борьбы за добродетели, прославляемые Синьхаем. Как бы там ни было, Нефритовый маршал едва избежал смерти и воцарился как 'Первый среди равных'."
 worldnews.232.a: "Да здравствует Республика!"
 worldnews.232.b: "Ещё один переворот в Китае?"
 
 worldnews.233.t: "[FNG_zhifeng_war_name]"
 worldnews.233.d: "Немецкая интервенция в 1927 лишь на время заставила враждующие фракции и клики Китая прекратить свою вражду, но все эти годы напряжение лишь росло с новой силой. Последние десять лет Фэнтяньское правительство и Пекин собирали войска для финального противостояния. Настало время их последней битвы, в которой они окончательно решат, кто будет владеть Китаем.\n\n Кто бы не одержал победу, Япония и Германия не упустят возможность ещё больше усилить своё влияние в регионе. Империя Восходящего Солнца и Кайзеррейх ведут свою невидимую войну за рынки сбыта и островные колонии."
 worldnews.233.a: "Битва началась"
 
 worldnews.234.t: "Цин начинает 'Кампанию по Умиротворению'"
 worldnews.234.d: "После переворота, устроенного Пу И, мировая общественность ожидала, что имперская политика по отношению к различным фракциям Китая серьёзно изменится. И действительно, сегодня, Пу И выступил перед собранием военных офицеров, сопровождаемый маршалом Пуцзе, своим старшим братом. В своём обращении, Пу И объявил о начале 'Кампании по Умиротворению Нации', которая призвана покончить с 'левачеством, упадническим республиканством и мелким регионализмом милитаристов раз и навсегда'. В срочном порядке, региональные правительства и клики начали слать панические послания Фэнтяню с просьбой о защите, а немцы спешно эвакуируют своих людей и ценные бумаги из самых опасных районов."
 worldnews.234.a: "Так или иначе, Китай будет един."
 worldnews.234.b: "Разве они не усвоили урок в *первый* раз, когда их низложили?"
 
 worldnews.239.t: "Второй Северный Поход"
 worldnews.239.d1: "Гражданская война в Китае достигла своего апогея после того, как Гоминьдановская Республика Китая объявила войну Фэнтяню. Первый Северный Поход, который был предпринят десятилетие назад с целью 'объединить страну', провалился под давлением немецкого экспедиционного корпуса. Вновь собравшись с силами, Гоминьдан в очередной раз пытается пробиться на север, в надежде сделать то, чего когда-то не смог Чан Кайши. В этот раз Германия занята своими европейскими делами, так что их вторжение маловероятно. Будущее Китая туманно..."
 worldnews.239.d2: "Гражданская война в Китае достигла своего апогея после того, как Гоминьдановская Республика Китая объявила войну Пекину. Первый Северный Поход, который был предпринят десятилетие назад с целью 'объединить страну', провалился под давлением немецкого экспедиционного корпуса. Вновь собравшись с силами, Гоминьдан в очередной раз пытается пробиться на север, в надежде сделать то, чего когда-то не смог Чан Кайши. В этот раз Германия занята своими европейскими делами, так что их вторжение маловероятно. Будущее Китая туманно..."
 worldnews.239.d3: "Гражданская война в Китае достигла своего апогея после того, как Гоминьдановская Республика Китая объявила войну [608.Owner.GetName]. Первый Северный Поход, который был предпринят десятилетие назад с целью 'объединить страну', провалился под давлением немецкого экспедиционного корпуса. Вновь собравшись с силами, Гоминьдан в очередной раз пытается пробиться на север, в надежде сделать то, чего когда-то не смог Чан Кайши. В этот раз Германия занята своими европейскими делами, так что их вторжение маловероятно. Будущее Китая туманно..."
 worldnews.239.a: "История вновь повторяет саму себя..."
 worldnews.239.b: "Второй раз не зря..."
 
 worldnews.241.t: "Китайские федералисты заявили о себе"
 worldnews.241.d: "Закрепившись на Юге Китая, федералисты заявили о создании своего собственного правительства. Чэнь Цзюнмин, генерал-губернатор [From.GetCliqueShortName] и командир Национальной Оборонительной Армии, заявил о намерении объединить разрозненные провинции по всей стране, уничтожить милитаристов и возродить китайскую демократию, которую так бояться \"бандиты в погонах и партийные диктаторы\". Время покажет, что из этого выйдет, но стоит отдать Цзюнмину должное – Южный Китай стал настоящим плацдармом и опорой для северных экспедиций НОА."
 worldnews.241.a: "Ещё одно правительство? Это абсурд!"
 worldnews.241.b: "Да здравствует Федеральная Республика!"
 
 worldnews.243.t: "Конец неравноправных договоров"
 worldnews.243.d: "Министерство иностранных дел Объединенных провинций Китая, объявило об аннулировании всех неравноправных договоров с Китаем. Чэнь Цзюнмин и партия 'Общественный интерес' призывали к одностороннему прекращению действия этих договоров заключенных с 1920-х годов, и похоже, что ОПК выполнило это обещание. Это серьезный сдвиг в международной дипломатии, который может вызвать серьезный раскол между Китаем и европейскими колониальными державами. Однако, с учетом того, что власть Запада на Дальнем Востоке находится на рекордно низком уровне, новое китайское правительство воспользовалось шансом вновь заявить о себе на мировой арене, стремясь положить конец тому, что они называют \"Век унижения\", надеясь вести переговоры о заключении новых договоров с великими европейскими державами по мере того, как Китай с новой силой уверенно входит в современный мир."
 worldnews.243.a: "Китай вновь заявляет о себе."
 
 worldnews.245.t: "Судьба японской императорской семьи"
 worldnews.245.d.exile: "Following the regime change in the former Empire of Japan, the fate of the Yamato Imperial Family became uncertain - until yesterday. With the conclusion of the first Congress of the People's Republic of Japan, it has been decided that the Yamato family should not be allowed to stay in Japan. Today, the Yamato family departed from Tokyo in an ocean liner headed towards the Americas, toward a life of exile.\n\nThis move has sparked a strike at Tokyo Harbour, as well as protests in most major cities, but the situation is expected to normalise in a few months' time."
 worldnews.245.d.abolish: "Following the regime change in the former Empire of Japan, the fate of the Yamato Imperial Family became uncertain - until yesterday. With the conclusion of the first Congress of the People's Republic of Japan, it has been decided that the Imperial Family should have their titles and status abolished - as of today, the Yamato family holds citizen status, being no different than their former subjects.\n\nThis move has sparked a strike in the centre of Tokyo, as well as smaller protests in Osaka and Nagasaki, but the situation is expected to normalise in a month's time."
 worldnews.245.d.symbol: "Following the regime change in the former Empire of Japan, the fate of the Yamato Imperial Family became uncertain - until yesterday. With the conclusion of the special Diet session of the [JAP.GetName], it has been decided that the Emperor, as the symbol of the State and the Japanese people, and in wider sense, the Imperial Family could carry out public and official duties, but not have any role in the new government.\n\nTo emphasise this, in an extraordinary radio speech, Emperor [JAP.GetLeader] publicly renounced his own divinity, stressing that the ties between the Throne and the people have always stood upon mutual trust and affection, not upon mere myths or legends."
 worldnews.245.d.abdicate: "Following the regime change in the former Empire of Japan, the fate of the Yamato Imperial Family became uncertain - until yesterday. With the conclusion of the special Diet session of the [JAP.GetName], it has been decided that the Emperor, as the symbol of the State and the Japanese people, and in wider sense, the Imperial Family could carry out public and official duties, but not have any role in the new government.\n\nIn an interview given to international press, prince regent Takamatsu stressed that despite the nationwide stupor created by the late Emperor's abdication, it is a necessary step to ensure a long lasting period of peace, and renewed ties between Japan and its collaborators."
 worldnews.245.a: "Одна эра заканчивается, другая начинается."

### New Non-City-Capture
 worldnews.400.t: "Жетулиу Варгас провозглашает новое государство"
 worldnews.400.d: "За последние несколько лет, Жетулиу Варгас значительно укрепил свою власть над государственным аппаратом, поскольку нестабильность в Бразилии спадает, и он претендует на все заслуги в этом деле. Теперь же, делая смелый шаг по обеспечению мира и стабильности, он взял на себя полный контроль над законотворчеством и предоставил себе многочисленные чрезвычайные полномочия, 'пока не закончится эта эпоха хаоса в мире'. Хотя с тех пор, как Черный Понедельник обрушился на Берлинскую фондовую биржу, по всему миру, безусловно, разгорелось множество войн, что делает этот шаг не менее наглым захватом власти. Тем не менее, он пользуется большой поддержкой населения в различных штатах, а также поддержкой руководства во многих штатах. Время покажет, действительно ли такое развитие событий обеспечит мир в Бразилии."
 worldnews.400.a: "Варгас действительно взял на себя прямой контроль"
 worldnews.400.b: "По крайней мере, больше нет претензии на демократию"
 
 worldnews.401.t: "Конституционалистское восстание в Бразилии"
 worldnews.401.d: "Штат Сан-Паулу, пожалуй, самый могущественный в Бразилии, взялся за оружие против Жетулиу Варгаса и его Нового государства, утверждая, что его правление является абсолютно неконституционной диктатурой, после нескольких попыток влиятельного президента вмешиваться в дела штата, в том числе, пытаясь навязать штату президента, пользующегося его собственным доверием, вместо того, чтобы быть избранным. В настоящее время напряженность достигла своего апогея, и ничего кроме войны не может случиться между Сан-Паулу и другими штатами, которые были призваны ранее присоединиться к ним в их борьбе. Время покажет, будет ли этот призыв услышан, или восстание будет подавлено."
 worldnews.401.a: "Централизация никогда не бывает легкой"
 worldnews.401.b: "Шанс для людей?"
 
 worldnews.402.t: "Успех восстания конституционалистов в Бразилии!"
 worldnews.402.d: "Когда Жетулиу арестован и предстал перед судом, революционеры-конституционалисты, которые так тяжело боролись за этот момент, празднуют по всему Рио и Бразилии. Теперь прежние рамки республики будут восстановлены и будут тесно следовать политическим путям Второй республики, но с дополнительными гарантиями против амбициозных диктаторов и еще большей автономии для государств-членов Союза."
 worldnews.402.a: "У бразильской демократии есть второй шанс."
 worldnews.402.b: "Рабочие погибли без всяких перемен, к сожалению."
 
 worldnews.403.t: "Восстание конституционалистов в Бразилии провалилось!"
 worldnews.403.d: "Сан-Паулу мог быть сильным, но он не мог противостоять могуществу Бразилии. По мере того, как их капитуляция была признана, митинги про-Жетулиу распались по всей стране, и мало кто может сомневаться в том, что хватка человека за власть на самом деле стала сильнее, нежели она была когда-либо до этого. С большинством своих оппонентов, находящихся в изгнании или арестованных, Жетулиу может сосредоточиться на других вопросах, так как он определенно выиграл опасную игру в бразильской политике, и имеет определенную степень контроля, до сих пор беспрецедентную в руках одного человека, даже во времена существования монархии в стране."
 worldnews.403.a: "Новое государство сделало это демонстрацией силы"
 worldnews.403.b: "Рабочие погибли без всяких перемен, к сожалению."
 
 worldnews.404.t: "Реставрация Империи в Бразилии"
 worldnews.404.d: "Когда в 1889 году пала Бразильская Империя, Педру II смирился с этой судьбой и отказался сопротивляться. С тех пор республиканские Соединенные Штаты Бразилии страдают от экономических проблем, коррупции и даже гражданских войн. После победы интегралистов на выборах и общественных слушаниях по этому вопросу сегодня в Кафедральном соборе Канделарии в Рио, император Бразилии Педру III был коронован на необычайно пышной церемонии даже по монархическим меркам. Теперь интегралисты и новый император направят свои усилия на восстановление былой славы Бразилии и несомненно, изменят нацию, возможно, необратимым образом. Хотя во время церемонии проходили республиканские демонстрации, они были быстро разогнаны армией, и нация задается вопросом, принесет ли, наконец, эта империя мир в неспокойную южноамериканскую страну."
 worldnews.404.a: "Новая сила растет!"
 worldnews.404.b: "Рабочие погибли без всяких перемен, к сожалению."
 
 worldnews.405.t: "Рондонское восстание"
 worldnews.405.d: "Известный и уважаемый маршал Бразилии Кандиду Рондон, вернулся из одной из своих уже ставших привычными экспедиций вглубь джунглей Северной Бразилии. К его удивлению, новость о попытках интегралистов восстановить монархию продолжала поступать, и он открыто выразил свое недовольство как благочестивый республиканец. Обеспокоенное правительство Рио-де-Жанейро издало приказ о его аресте, однако верные ему военные отказали в исполнении этого приказа, и он поднялся в открытом восстании на севере страны. Хотя восстание имеет глубоко укоренившееся республиканское происхождение, его поддержка местных силовиков также предположительно исходит от традиционно влиятельных политиков, которые теряли власть в новом интегралистском устройстве дел. Похоже, что Бразилия сталкивается со вторым за столетие гражданским конфликтом, и нация затаила дыхание, поскольку открытая война теперь неизбежна."
 worldnews.405.a: "Как старик может быть таким упрямым?"
 worldnews.405.b: "Шанс для людей?"
 
 worldnews.406.t: "Разгром Рондонского восстания"
 worldnews.406.d: "Восстание Кандиду Рондона было подавлено, и его силы были полностью разбиты. В то время как лидера восстания найти не удалось, так как он сбежал в лес со своими самыми преданными военнослужащими, обратная сторона республиканского движения была разгромлена, ибо восстания, вдохновленные этим человеком, выявили истинную преданность многих из них, показывая предателями в народе. Теперь интегралисты могут полностью следовать своим планам."
 worldnews.406.a: "Империя нанесла ответный удар!"
 worldnews.406.b: "Рабочие погибли без всяких перемен, к сожалению."
 
 worldnews.407.t: "Триумф Рондонского восстания"
 worldnews.407.d: "Республика сильна и одержала победу в Бразилии, так как дерзкое восстание Кандиду Рондона против интегралистского правительства привело к крупномасштабному конфликту и поражению этого правительства, поскольку различные государства присоединились к республиканскому восстанию и раскололи и без того перегруженные вооруженные силы. Рондон, под одобрительные возгласы своих земляков-республиканцев, сейчас втянут в процесс президентства - роль, которую он, конечно никогда не хотел, но поклялся провести выборы в соответствии с графиком и не принимать никаких радикальных мер. Многие предполагают, что старик, наконец уйдет в отставку, великая Революция боролась по всей Бразилии, являясь его последним приключением."
 worldnews.407.a: "Бразильская демократия получает второй шанс."
 worldnews.407.b: "Рабочие погибли без всяких перемен, к сожалению."
 
 worldnews.408.t: "Провозглашение Бразильского Союза!"
 worldnews.408.d: "Повышение давления на дипломатические инициативы с синдикалистским Чили вызвало глубокий конституционный кризис и привело к перевороту со стороны военных, которые считали, что ED сползает в социализм. Однако переворот был недолгим, и армейские лоялисты арестовали или сослали большую часть своего руководства. Более того, эти офицеры провозгласили Бразильский Союз, синдикалистское правительство, поскольку, увидев масштабный прогресс, достигнутый Чили в своих вооруженных силах после революции, гораздо больше офицеров склонились к левой стороне. Теперь Союз проведет свой первый съезд профсоюзов и проведет собрание, чтобы выбрать путь, по которому пойдет бразильский социализм. После того, как поступила новость о провозглашении так называемого Бразильского Союза, многочисленные губернаторы штатов теперь открыто взбунтовались и будут стремиться вернуть Соединенные Штаты Бразилии к демократическому устройству."
 worldnews.408.a: "Синдикалистская угроза распространяется!"
 worldnews.408.b: "Сюрприз, конечно, но желанный."
 
 worldnews.409.t: "Реакционное восстание победило в Бразилии"
 worldnews.409.d: "Волеизъявление народа было услышано, провозглашенный сильнейшим, Жетулиу Варгас после победоносного шествия по Рио, символически привязал свою лошадь к обелиску на проспекте Рио-Бранку. Восставшие казармы были захвачены, а так называемый Конгресс профсоюзов ликвидирован. В надлежащее время будут восстановлены прежние рамки республики, а виновные в этом хаосе, особенно члены 'синдикалистских левых демократов', будут привлечены к суду. После провала этого короткого эксперимента, жители страны надеются наконец-то обрести покой, так как видимый ущерб, нанесенный многим главным зданиям столицы, является мрачным напоминанием о ныне называемой 'Коммуне Рио' и о судьбе тех, кто будет восставать против республики."
 worldnews.409.a: "Бедствие было предотвращено"
 worldnews.409.b: "Прискорбный шаг назад."
 
 worldnews.410.t: "Разгром реакционного восстания в Бразилии"
 worldnews.410.d: "С окончанием восстания и капитуляцией или изгнанием причастных к этому государств президентов, Бразильский Союз закрепил свои позиции у власти. Однако конфликт оставил свои шрамы, и уже сейчас крики об амнистии и предательстве раздаются по всей стране, так как сильное недовольство центральным правительством не угасает с окончанием вооруженного конфликта. Воистину, это только первый шаг на пути к тому, что несомненно станет эпохой огромных перемен в самой Бразилии."
 worldnews.410.a: "Катастрофа была предотвращена"
 worldnews.410.b: "Вы не можете идти против истории!"
 
 worldnews.411.t: "Клика Аньцин признает Фэнтянь"
 worldnews.411.d: "Чэнь Тяоюань, лидер Аньцинской Клики и в настоящее время хозяин Восточного Китая, официально признал правительство Фэнтяня законным национальным правительством Китая. Хотя это и не удивительно, учитывая открытую поддержку Фэнтяном, Аньцинской Клики во время войны в Лиге, она все же шокировала многих по всему Китаю, а также западных жителей, которые опасались расширения влияния Японии по всему Китаю. Эта декларация запомнится как важный день в истории Китая."
 worldnews.411.a: "Отличные новости!"
 worldnews.411.b: "Страшное развитие событий."
 
 worldnews.412.t: "Пекинская Конференция Воссоединения"
 worldnews.412.d.chinese: "Когда несколько недель назад в Пекине началась Конференция Воссоединению, Чжан Цзолиня, мало кто ожидал, что она увенчается успехом. Иностранные газеты высмеивали это, местные газеты сомневались в результатах, и даже те кто присутствовал на конференции, чувствовали некоторую неуверенность. Тем не менее Китай сейчас перешагнул новый порог в своей истории, поскольку бывшие враги собрались вместе, чтобы поставить страну на первое место, поместив большую часть страны под одно знамя впервые за многие десятилетия. \n\n Заглядывая вперед, можно сказать, что путь к подлинному объединению остается действительно долгим, но сейчас сделан большой шаг - надеюсь, за ним последуют многие другие."
 worldnews.412.d.foreign: "Когда несколько недель назад в Пекине началась Конференция Воссоединению, Чжан Цзолиня, мало кто ожидал, что она увенчается успехом. Китай долгое время был охвачен внутренними конфликтами, и наблюдатели в Шанхае ожидали, что эта последняя попытка воссоединения, станет жертвой обычных восточных склок. Однако, похоже, что Чжан обладает тонким инстинктом и политической ловкостью, присущими только высшему классу мандаринов, и теперь он объединил большую часть Китая с помощью дипломатии.\n\nТем не менее, страна еще не является по-настоящему единой, и позиция Чжана в отношении военного превосходства предполагает, что как и всегда, Китаю нужна сильная рука эффективной власти, чтобы сделать и сохранить все это в целости и сохранности."
 worldnews.412.a: "Отличное достижение!"
 worldnews.412.b: "Мы должны подготовиться"
 worldnews.412.c: "Интересно"
 
 worldnews.414.t: "Распад Объединённого Балтийского Герцогства"
 worldnews.414.d: "Объединенное Балтийское Герцогство, прибалтийское германское суб-государство Германской Империи, окончательно распалось после нескольких месяцев внутренних распрей и партизанского сопротивления со стороны движения Лесных братьев. Во всем герцогстве было утрачено всякое подобие порядка, и балтийские немцы массово покидают свои земли.\n\nНекоторые из них прибыли в Германию, а другие собрались в свободном городе Рига, последнем владении прибалтийских немцев. Конфликт в Прибалтике был заморожен и несомненно, возобновится в будущем, но пока Латвия и Эстония отстаивают свою независимость."
 worldnews.414.a: "Мы никогда не сдадимся!"
 worldnews.414.b: "Ура!"
 worldnews.414.c: "Эта часть карты устарела..."
 
 worldnews.415.t: "Падение Королевства Финляндии"
 worldnews.415.d.natpop: "Основанное на пепелище Российской Империи, Королевство Финляндия после окончания Великой войны оставалось государством, основательно укрепившимся в германской сфере. Однако, как теперь выясняется, этому не суждено было продлиться долго. После Черного Понедельника финское правительство оказалось в кризисе, поскольку политическое насилие вышло из-под контроля. Не в состоянии поддерживать порядок, режим окончательно рухнул.\n\nУльтранационалистическое движение Лапуа под руководством Курта Мартти Валлениуса, ныне лидера Финляндской Республики, двинулось на Хельсинки, захватив власть и развязав волну насилия против монархистов и социалистов. Авторитарное, корпоративистское и яростно антигерманское, это движение, без сомнения, представляет собой насильственный разрыв со старым порядком."
 worldnews.415.d.syndicalist: "Основанное на пепелище Российской Империи, Королевство Финляндия после окончания Великой войны оставалось государством, основательно укрепившимся в германской сфере. Однако, как теперь выясняется, этому не суждено было продлиться долго. После Черного Понедельника финское правительство оказалось в кризисе, поскольку политическое насилие вышло из-под контроля. Не в состоянии поддерживать порядок, режим окончательно рухнул.\n\nПосле нескольких дней напряженных боев в Хельсинки, синдикалистская Финская народная делегация и военизированная Красная гвардия смогли одержать победу над националистическими группами и правительственными войсками, захватить власть и провозгласить республику. Новый социалистический режим разорвал все связи с Миттельевропой и уже ищет нового благодетеля в Париже."
 worldnews.415.d.mannerheim: "Основанное на пепелище Российской Империи, Королевство Финляндия после окончания Великой войны оставалось государством, основательно укрепившимся в германской сфере. Однако, как теперь выясняется, этому не суждено было продлиться долго. После Черного Понедельника финское правительство оказалось в кризисе, поскольку политическое насилие вышло из-под контроля. Не в состоянии поддерживать порядок, режим окончательно рухнул.\n\nПод руководством уважаемого фельдмаршала Карла Густава Маннергейма была собрана Белая гвардия для свержения монархии и победы над социалистическими и ультранационалистическими ополчениями, в результате чего немецкое влияние было устранено. Теперь, когда маршал вышел победителем, он заявил о своем намерении удерживать власть до полной стабилизации Финляндии."
 worldnews.415.d.democracy: "Основанное на пепелище Российской Империи, Королевство Финляндия после окончания Великой войны оставалось государством, основательно укрепившимся в германской сфере. Однако, как теперь выясняется, этому не суждено было продлиться долго. После Черного Понедельника финское правительство оказалось в кризисе, поскольку политическое насилие вышло из-под контроля. Не в состоянии поддерживать порядок, режим окончательно рухнул.\n\nПод руководством уважаемого фельдмаршала Карла Густава Маннергейма была собрана Белая гвардия для свержения монархии и победы над социалистическими и ультранационалистическими ополчениями, в результате чего немецкое влияние было устранено. Теперь, после победы, маршал решил отдать власть политическим партиям, восстановив демократию."
 worldnews.415.a: "Вот дураки!"
 worldnews.415.b: "Реакционное препирательство"
 worldnews.415.c: "Еще один удар по немецкому влиянию"
 worldnews.415.d: "Наконец-то свобода!"
 worldnews.415.e: "Превосходно!"

 worldnews.416.t: "Реставрация монархии в Грузии"
 worldnews.416.d.giorgi: "Удивительные новости пришли из Грузии. С момента основания маленькой кавказской республики в стране доминировала левая Социал-демократическая партия Грузии, несмотря на постоянное снижение поддержки партии на выборах. Однако когда Черный Понедельник потряс страну, недовольство и растущие гражданские волнения вынудили партию назначить досрочные выборы, по результатам которых победу одержала консервативная Национал-демократическая партия. Новая правящая партия быстро приступила к выполнению своего предвыборного обещания провести референдум о восстановлении монархии. Результаты показали явную победу монархической стороны, в результате чего на трон взошел князь Георгий Багратион, ныне король Георгий XIII. Националистически настроенный и выступающий против зависимости своей страны от немцев, его восшествие на престол знаменует растущую независимость Грузии от Миттельевропы."
 worldnews.416.d.ioakhim: "Удивительные новости пришли из Грузии. С момента основания маленькой кавказской республики в стране доминировала левая Социал-демократическая партия Грузии, несмотря на постоянное снижение поддержки партии на выборах. Однако когда Черный Понедельник потряс страну, недовольство и растущие гражданские волнения вынудили партию назначить досрочные выборы, по результатам которых победу одержала консервативная Национал-демократическая партия. Новая правящая партия быстро приступила к выполнению своего предвыборного обещания провести референдум о восстановлении монархии. Результаты показали явную победу монархической стороны, в результате чего трон занял принц Иоахим Франц-Гумберт, ныне Иоахим I. Король, родившийся в Пруссии, невероятно прогермански настроен, и его восшествие на престол знаменует все более тесное сотрудничество Грузии с Миттельевропой."
 worldnews.416.a: "Как интересно"
 worldnews.416.b: "Шаг назад"
 worldnews.416.c: "Да здравствует король!"

 worldnews.418.t: "Появляется [CEN.GetNameDef]"
 worldnews.418.d.syndie: "Центральная Америка давно разделена, различные страны находятся под сильным американским влиянием с тех пор, как почти столетие назад распалась Федеративная Республика Центральной Америки. Однако с началом Второй американской гражданской войны регион охватили конфликты и беспорядки, различные идеологии боролись за то, чтобы утвердиться в этой буре. Теперь, когда пыль осела, кажется, что страна объединилась под властью социалистического правительства, которое уже смотрит в сторону Парижа за вдохновением. Какому именно направлению социалистической мысли будет следовать молодое государство, пока не решено, но одно можно сказать наверняка - в регионе произошел радикальный разрыв с прошлым."
 worldnews.418.d.liberal: "Центральная Америка давно разделена, различные страны находятся под сильным американским влиянием с тех пор, как почти столетие назад распалась Федеративная Республика Центральной Америки. Однако с началом Второй американской гражданской войны регион охватили конфликты и беспорядки, различные идеологии боролись за свое место в буре. Теперь, когда пыль осела, кажется, что страна объединилась под либеральной и демократической Конфедерацией Центральной Америки. Многое еще неясно относительно будущего страны - характер конституции, местоположение столицы и политические партии, которые будут управлять страной, не определены - но можно сказать, что это знаменует новый рассвет для региона."
 worldnews.418.d.military: "Центральная Америка давно разделена, различные страны находятся под сильным американским влиянием с тех пор, как почти столетие назад распалась Федеративная Республика Центральной Америки. Однако с началом Второй американской гражданской войны регион охватили конфликты и беспорядки, различные идеологии боролись за то, чтобы утвердить себя в буре. Теперь, когда пыль осела, кажется, что земля объединилась под бдительным оком вооруженных сил Центральной Америки. Проамериканская и решительно настроенная против того, что они считают подрывным синдикалистским влиянием, армия стала рассматривать себя как направляющую руку новой страны, защищающую ее от врагов как внутри, так и вне ее. Куда пойдет новая страна дальше, неизвестно, но похоже, что, несмотря ни на что, бастион старого порядка остается."
 worldnews.418.a: "Это не закончится хорошо"
 worldnews.418.b: "С Интернационалом воспрянет род людской!"
 worldnews.418.c: "Снова едины!"
 worldnews.418.d: "Прекрасное развитие!"
 worldnews.418.e: "Должна быть обеспечена стабильность"

 worldnews.419.t: "Кризис Панамского канала"
 worldnews.419.d.joincan: "Законченный в 1914 году, Панамский канал является одним из важнейших торговых проходов на американском континенте, который до сих пор контролируется Соединенными Штатами. С началом Второй американской гражданской войны федеральное правительство было вынуждено вывести морские силы канала, оставив его открытым для вторжения, и, к некоторому удивлению, панамские войска начали операцию по возвращению столь ценного района. Однако против этого шага выступила Канада, которая предъявила им ультиматум - суверенитет Панамы над каналом будет признан, но страна должна согласиться на военный союз или столкнуться с вторжением. Перед лицом давления Канады небольшая латиноамериканская страна отступила, разрядив кризис."
 worldnews.419.d.war: "Законченный в 1914 году, Панамский канал является одним из важнейших торговых проходов на американском континенте, который до сих пор контролируется Соединенными Штатами. С началом Второй американской гражданской войны федеральное правительство было вынуждено вывести морские силы канала, оставив его открытым для вторжения, и, к некоторому удивлению, панамские войска начали операцию по возвращению столь ценного района. Однако против этого шага выступила Канада, которая предъявила им ультиматум, требуя влияния на канал. Несмотря на значительное превосходство как в промышленности, так и в людях, Панама отказалась отступить, что вызвало войну в Центральной Америке."
 worldnews.419.d.canbackdown: "Законченный в 1914 году, Панамский канал является одним из самых важных торговых проходов на американском континенте, который до сих пор контролируется Соединенными Штатами. С началом Второй американской гражданской войны федеральное правительство было вынуждено вывести морские силы из канала, оставив его открытым для вторжения, и, к некоторому удивлению, панамские войска начали операцию по возвращению столь ценного района. Против этого шага, однако, выступила Канада, которая предъявила им ультиматум, пытаясь гарантировать дальнейшую безопасность и доступ через канал. Несмотря на значительное превосходство как в промышленности, так и в людях, Панама отказалась отступить, вызвав Канаду на блеф и к удивлению многих, добившись успеха. К смущению Антанты и гордости Панамы, кризис в Центральной Америке был предотвращен."
 worldnews.419.d.demandcanpeace: "Законченный в 1914 году, Панамский канал является одним из важнейших торговых проходов на американском континенте, который до сих пор контролируется Соединенными Штатами. С началом Второй американской гражданской войны федеральное правительство было вынуждено вывести морские силы канала, оставив его открытым для вторжения, и, к некоторому удивлению, панамские войска начали операцию по возвращению столь ценного района. Однако против этого шага выступила Канада, которая предъявила им ультиматум - Панама должна немедленно прекратить вторжение, а Антанта пока будет охранять канал. Перед лицом давления Канады небольшая латиноамериканская страна отступила, разрядив кризис."
 worldnews.419.a: "Баланс сил под угрозой"
 worldnews.419.b: "Канал наш!"
 worldnews.419.c: "Они сделали правильный выбор"
 worldnews.419.d: "Будь они прокляты!"

 worldnews.420.t: "Коммунисты захватывают власть в Аргентине"
 worldnews.420.d: "После победы социалистов в Аргентино-Чильской войне правительство, похоже, постепенно приспосабливалось к аргентинской нации. Тем не менее, результаты недавнего конгресса аргентинских профсоюзов, по-видимому, не были удовлетворительными для Comite de Unidad Sindical Clasista (CUSC), которая во главе с нынешним председатель Либорио Хусто, возглавила государственный переворот. В то время как они столкнулись с некоторым сопротивлением, силы молодого правительства не смогли остановить коммунистов, и Конгресс в настоящее время полностью контролирует CUSC. Положит ли это конец жестоким политическим спорам в Аргентине или еще больше обострит напряженность в отношениях с измученным войной населением, это еще предстоит выяснить..."
 worldnews.420.a: "Социалистические призывы к единству зашли так далеко, что кажется..."
 worldnews.420.b: "Товарищ против товарища, это действительно тот путь?"
 
 worldnews.421.t: "Радикальные анархисты захватывают власть в Аргентине"
 worldnews.421.d: "После победы социалистов в Аргентино-Чильской войне, правительство медленно приспосабливалось к аргентинскому народу. Однако результаты недавнего Конгресса профсоюзов Аргентины, похоже, не были успешными для Союза Синдикатов Аргентины (ССА). В то время как умеренные приняли этот результат, радикалы быстро организовали свое собственное наступление и во главе с Северино ди Джованни смогли победить правительственные силы в Буэнос-Айресе. После марша в президентском доме они продолжили процесс захвата власти в Конгрессе, где Северино был приведен к присяге в качестве Председателя, а конкурирующие союзы ССА были удалены из Конгресса. Положит ли это конец ожесточённым политическим спорам в Аргентине или ещё больше разожжёт напряжённость в отношениях с измученным войной населением, это ещё предстоит выяснить..."
 worldnews.421.a: "Социалистические призывы к единству зашли так далеко, что кажется..."
 worldnews.421.b: "Товарищ против товарища, это действительно тот путь?"
 
 worldnews.422.t: "[FOP.GetAdjective]ий председатель найден мертвым"
 worldnews.422.d: "После победы социалистов в Аргентино-Чильской войне, правительство медленно приспосабливалось к аргентинскому народу. С учетом того, что результаты указывали на явное большинство членов Союза Синдикатов Аргентины (ССА), многие ожидали, что новое правительство окончательно стабилизирует ситуацию. Однако, похоже, что этого не произошло, так как председатель Антонио Сото и его главный политический союзник Эмилио Лопес Аранго были найдены мертвыми. Умеренные в ССА, в настоящее время не имеющие лидера, быстро потеряли хватку в союзе с лидером радикалов Северино ди Джованни, который быстро раскрыл заговор других фракций Конгресса и оперативно осуществил поглощение. В то время как многие видят в раскрытии этого заговора поворотный момент в политической стабильности Аргентины, другие задаются вопросом, будет ли править Северино в соответствии со стандартами его предшественников."
 worldnews.422.a: "Как по-варварски!"
 worldnews.422.b: "Будем надеяться, что новый председатель справится с ситуацией"
 
 worldnews.423.t: "Председатель Бальдомеро отстранен от власти"
 worldnews.423.d: "После победы социалистов в Аргентино-Чильской войне, правительство медленно приспосабливалось к аргентинскому народу. С учетом того, что результаты указывают на явное большинство Аргентинской Региональной Федерации Рабочих (АРФР), многие ожидали, что новое правительство приступит к выполнению своих обязанностей и в конечном счете, стабилизирует ситуацию. Однако, к сожалению, этого так и не произошло, так как в столице произошло столкновение анархистских и коммунистических сил, а победившая сторона после стычки быстро пошла против сил председателя Бальдомеро. После того, как Бальдомеро ушел в отставку в президентском доме, силы [FOP.GetLeader] быстро захватили Конгресс, изгнали оппозицию и принесли присягу [FOP.GetLeader] в качестве нового председателя. Положит ли это конец ожесточенным политическим спорам в Аргентине или еще больше обострит напряженность в отношениях с измученным войной населением, это еще предстоит выяснить..."
 worldnews.423.a: "Социалистические призывы к единству зашли так далеко, что кажется..."
 worldnews.423.b: "Товарищ против товарища, это действительно тот путь?"
 
 worldnews.424.t: "Кипрское восстание"
 worldnews.424.d: "Возвращенный к турецкому правлению после британского краха, преимущественно греческий православный остров Кибрис или Кипр никогда не имел хороших отношений с Портой. Их сепаратистское движение, имеющее единственную цель - Энозис (воссоединение с Грецией), в течение последних нескольких лет неуклонно набирало силу и поддержку, пока не достигло своей кульминации в начале сегодняшнего дня с открытым нападением на офисы губернаторов Османской администрации.\n\n Во главе с архиепископом Леонтием II, остров был потрясен насилием и терроризмом, так как агенты греческого правительства начали проникать на остров, чтобы помочь мятежникам."
 worldnews.424.a: "Сколько еще могут выдержать османы?"
 worldnews.424.b: "Эти надоедливые греки"
 
 worldnews.425.t: "Второе Арабское восстание"
 worldnews.425.d: "Родина первого арабского восстания при Шарифе Хусейне бин Али, народ Хиджаза в очередной раз восстал против своих турецких владык. Однако, в отличие от аналогичных движений в Сирии, гораздо менее вероятно, что это восстание будет иметь большой успех, поскольку ястребы из арабских внутренних районов смотрят на то, что они считают легкой добычей.\n\n Начались переговоры с Египтом о возможном вступлении в Каирский Пакт, но вполне вероятно, что на их вступление наложат вето другие амбициозные арабские военачальники."
 worldnews.425.a: "Будем надеяться, что на этот раз они добьются большего успеха."
 worldnews.425.b: "Они будут раздавлены!"
 
 worldnews.426.t: "Великое Сирийское восстание"
 worldnews.426.d: "Находящийся под турецким владычеством, арабский народ Большой Сирии наконец-то решил сбросить иго и присоединился к своим арабским братьям в Каире. Борясь за освобождение Машрика и создание нового, арабского, ближневосточного государства, сирийцы, принадлежащие ко всем религиям и этническим группам, объединяются, чтобы избавиться от турецкого правления.\n\n Амбиции отдельных лидеров и разногласия между различными партнерами по Каирскому Пакту, однако, могут привести к проблемам, если будет устранена общая угроза, так как идеи 'Большой Сирии' не совместимы с замыслами фарукского арабского государства, управляемого из Каира."
 worldnews.426.a: "Еще один удар по Великой Порте"
 worldnews.426.b: "Их дело безнадежно"
 
 worldnews.427.t: "Османская контрреволюция"
 worldnews.427.d: "В ответ на жесткие меры, применяемые кемалистским режимом в [OTT.GetName], различные религиозные ордена при поддержке курдских шейхов и ахов объявили джихад на режим в Константинии. Взяв на себя обязательство освободить султана-халифа из его безбожного заключения, различные консервативные силы, разбросанные по всей империи, выразили свое уважение лидерам движения.\n\n Тем не менее, их шансы выглядят мрачными, так как турецкий арсенал более чем готов противостоять этой угрозе. Первоначальные бомбардировки турецких ВВС, как сообщается, были особенно успешными, так как курдские силы не имеют возможности противостоять этому оружию."
 worldnews.427.a: "Самое тревожное"
 
 worldnews.428.t: "Война за Хасаб"
 worldnews.428.d: "Являясь анклавом государства Муската, полуостров Хасаб - одно из важнейших мест на Ближнем Востоке. Будучи в одиночку способным полностью отрезать Ормузский пролив, отрезав тем самым Иран и Ирак от мировой экономики, он стал занозой в глазах как Константиния, так и Тегерана.\n\nМорские маневры персидского флота вокруг пролива привели к росту напряженности, кульминацией которой стала военная оккупация анклава Тегераном, вызвавшая ультиматум от Возвышенной Порты. Не получив ответа, османский флот рано утром открыл огонь по Хасабу, тем самым начав боевые действия между двумя региональными державами."
 worldnews.428.a: "Ближний Восток все больше погружается в хаос"
 
 worldnews.429.t: "Восстание Барзинджи"
 worldnews.429.d: "Вождь двух неудачных попыток в Сулеймании вырезать курдское царство, печально известный шейх Махмуд Барзинджи в очередной раз провозгласил независимость своего курдского государства, заручившись поддержкой различных племен в Сулеймании. Хотя между Тегераном и Константинией было заключено перемирие, ограничивающее поддержку курдских движений по обе стороны границы, похоже, что Иран вышел из соглашения.\n\n Несмотря на иностранную поддержку, кажется маловероятным, что восстание Махмуда увенчается успехом, так как даже среди курдских племен мало кто видит в нем законного правителя Курдистана."
 worldnews.429.a: "Удачи!"
 worldnews.429.b: "Без союзников они погибнут"
 
 worldnews.430.t: "Война за Шатт-эль-Араб"
 worldnews.430.d: "Подписанный в 1913 году под руководством британских и русских атташе Константиния и Тегерана, Шатт-аль-Арабский протокол должен был решить многовековой пограничный конфликт между Османской и Персидской империями путем разграничения дельты Тигра и Евфрата.\n\n Утверждая, что договор несправедлив и благоприятствует Османам, Иран предъявил туркам ультиматум с требованием большой полосы земли 'для обеспечения персидских интересов'. Константиниийе проигнорировал ультиматум, утверждая, что протоколы 1913 года были уже слишком щедрыми. Не получив ответа, персидские войска впоследствии начали бомбардировку крепости Фао, начав открытую войну против турок."
 worldnews.430.a: "Очередная Персидско-Османская война из-за книг по истории..."
 
 worldnews.431.t: "Падение Рашидского Эмирата"
 worldnews.431.d.OTT: "Несмотря на успех в их дуэли против угрозы ваххабизма, дом Рашида долго находился под давлением со стороны влиятельных городских знаменитостей и семей, настаивающих на отмене абсолютистского правления в Ха'иле. Недооценивая эту угрозу, теперь кажется, что семья аль-Сабхана совершила переворот, свергнув правителей Хаила и короновав себя новыми эмирами Аравии.\n\n Возвышенная Порта воздержалась таким образом от признания власти новых правителей, утверждая, что единственный законный эмир - это дом Ибн Рашида. Будут ли они непосредственно вмешиваться в арабскую политику, пока неясно, но это событие знаменует собой еще одно нарушение в Османской сети безопасности."
 worldnews.431.d.no_OTT: "Несмотря на успех в их дуэли против угрозы ваххабизма, дом Рашида долго находился под давлением со стороны влиятельных городских знаменитостей и семей, настаивающих на отмене абсолютистского правления в Ха'иле. Недооценивая эту угрозу, теперь кажется, что семья аль-Сабханов совершила переворот, свергнув правителей Хаила и короновав себя новыми эмирами Аравии."
 worldnews.431.a: "Так пал Дом Ибн Рашида..."
 
 worldnews.432.t: "Реставрация Рашидского Эмирата"
 worldnews.432.d: "После успешной борьбы за власть рода Субхани кажется, что бывшие князья Ибн Рашида вновь захватили свою исконную родину, разгромив коалицию Субхани в битве, которая, несомненно, будет закреплена в качестве одной из самых определяющих в арабской истории. Однако многие вопросы все еще остаются нерешенными, так как кажется маловероятным, что князья Рашидов были способны самостоятельно собрать необходимые силы, многие подозревают османскую причастность к этому событию. В связи с этим статус Аль-Хазы вновь был поставлен под сомнение, так как давно потерянная Османская провинция могла быть обещана в обмен на поддержку Османской империи в их стремлении к власти."
 worldnews.432.a: "Так пал Дом аль-Субхана..."
 
 worldnews.433.t: "Мустафа Кемаль захватывает власть"
 worldnews.433.d: "Сытый постоянными препирательствами в Османской палате депутатов и сдержанный консервативной и часто роялистской оппозицией, Великий визирь использовал недавние внутренние события, чтобы централизовать власть вокруг позиции Великого визиря. Указ 'О поддержании общественного порядка', изданный во времена великого кризиса, уже привел к созданию различных трибуналов для вынесения приговоров 'врагам государства' и 'охранять османское государство'.\n\n Хотя многие ставят под сомнение истинные мотивы человека, ясно, что он пользуется полной поддержкой военного аппарата, что значительно ограничивает шансы на успешный контр-перехват..."
 worldnews.433.a: "Это возвращение в 1913 год?"
 
 worldnews.434.t: "Мустафа Кемаль застрелен!"
 worldnews.434.d: "Великий визирь и знаменитый герой войны, лидер ОФВ Мустафа Кемаль-паша был застрелен ранее сегодня в Измире, когда он выступал перед огромной толпой людей, собравшихся, чтобы отпраздновать его недавние реформы. Одинокий стрелок, армянского происхождения, похоже, немедленно отомстил за потерю своей семьи во время армянской резни, но многие наблюдатели подозревают в заговоре руку бывших членов спецорганизации, скорее всего, стремящихся ослабить HIF и вернуть партию к ее прошлой линии исламизма и строгого национализма."
 worldnews.434.a: "Вся Османская Империя затаила дыхание перед будущим..."
 
 worldnews.435.t: "Февзи-паша захватывает власть"
 worldnews.435.d: "Герой войны и прославленный командующий Османской армией, Февзи-паша захватил власть в Константинии ранее сегодня, когда колонны османской пехоты прошли мимо дворца Долмабахче, арестовывая оппозиционных деятелей в попытке восстановить порядок в империи во имя 'демократии' и 'стабильности'.\n\n Хотя иностранные наблюдатели отмечают, что у маршала Османской империи нет долгосрочных политических амбиций, он просто хочет создать переходное правительство до тех пор, пока не будет восстановлена демократическая альтернатива, многие задаются вопросом, не создал ли он таким образом опасный прецедент для всего Ближнего Востока..."
 worldnews.435.a: "Что принесет будущее?"

 worldnews.436.t: "Принц Сабахаттин назначен Великим визирем"
 worldnews.436.d.kemal_dead: "После того, как Великий визирь Мустафа Кемаль был убит в Измире, [OTT.GetNameDef] был вынужден объявить чрезвычайные выборы, чтобы заполнить вакуум в руководстве - в настоящее время либеральная коалиция, потерпевшая поражение в 1935 г. от HIF Кемаля, получила абсолютное большинство и тем самым укрепила свою власть.\n\n После своей победы на выборах принц Сабахаттин, лидер HIF, сегодня же был назначен на должность Великого визиря халифом, пообещав выполнить свою программу по децентрализации и продвижению частной инициативы."
 worldnews.436.d.kemal_out: "Казалось бы, не в состоянии осуществить свои планы, несмотря на победу на выборах 1935 года, бывший Великий визирь Мустафа Кемаль всего несколько месяцев назад подал в отставку Османскому халифу. Ставя на досрочные выборы, принесшие ему абсолютное большинство и народный мандат, в котором он нуждался, похоже, бывший генерал серьезно ошибся, так как либеральная коалиция, потерпевшая поражение в 1935 году, только укрепила свою власть.\n\n После его победы на выборах, принц Сабахаттин (лидер HIF) был назначен ранее сегодня халифом, пообещав выполнить свою программу децентрализации и продвижения частной инициативы."
 worldnews.436.a: "Удачи!"
 
 worldnews.437.t: "Декларация Великой Османской Федерации"
 worldnews.437.d: "Сегодня в Константинии состоялись торжества, когда Османская палата депутатов официально провозгласила создание нового федерального государства на землях Османской Империи. Возвышенная Османская Федерация, чье имя было навеяно имперским величием старого, основана на идеях принца Сабахаттина и иностранном влиянии немецких, австрийских и американских моделей.\n\n Хотя новая конституция переносит обширные полномочия на уровень вилайетов (провинций), многие задаются вопросом, будет ли это действительно означать демократию или просто подтверждение старой аристократии в своих вековых позициях..."
 worldnews.437.a: "Османская Империя открывает новую страницу!"
 
 worldnews.438.t: "Армянское восстание"
 worldnews.438.d: "Находясь почти два десятилетия под османской военной оккупацией, армянское сопротивление использовало войну между Константинополем и Тегераном для восстановления независимости Армении, изгнав Османский гарнизон и подняв свой флаг в восстании.\n\nХотя многие сомневаются в жизнеспособности восстания, оказавшись между молотом и наковальней, их мужество и решимость не остались незамеченными за границей, поскольку многие страны социалистического блока немедленно признали их независимость."
 worldnews.438.a: "Удачи!"
 worldnews.438.b: "Ничего, кроме отвлечения внимания"
 
 worldnews.439.t: "Саудовско-Оманская война"
 worldnews.439.d: "Давно разделенный на два самостоятельных политических образования: имамат Омана в Низве и султанат Маската в Маскате, все возрастающая слабость бывшей талассокократии не осталась незамеченной эмиром Неджада, который планировал разделить и завоевать, вторгся в изолированный имамат из-за крайне сомнительного пограничного спора.\n\nХотя Султанату Маската, поддерживаемому иностранными союзниками, удалось избежать прямой угрозы своей независимости, он тем не менее, решил вмешаться в конфликт, объединившись вместе с имамом против общей саудовской угрозы."
 worldnews.439.a: "Может ли Маскат выдержать еще один удар?"
 
 worldnews.440.t: "Ихванское восстание"
 worldnews.440.d: "Открыто объявив о своем восстании за восстановление истинного исламского правления, как оно определено ваххабитскими проповедниками, коалиция различных арабских племенных вождей объединилась в оппозиции к своему сюзерену в надежде сломать центральную власть государства и восстановить децентрализованные вотчины старого. Хотя, как сообщается, было достигнуто соглашение относительно будущего владения различными арабскими провинциями, немногие ожидают, что хрупкий альянс переживет возможную победу в их джихаде."
 worldnews.440.a: "Прячьте своих женщин и детей, Ихван здесь!"
  
 worldnews.442.t: "Русско-Османская Конвенция"
 worldnews.442.d: "Ошеломляя наблюдателей со всего мира, сегодня вечером, когда российский медведь начал свою истребительную войну в Восточной Европе, была активизирована до сих пор совершенно секретная Русско-османская конвенция. Пакт, детали которого остаются в тайне и по сей день, как сообщается, включает в себя разделение Ближнего Востока, Центральной Азии и Кавказа на османскую и российскую сферы влияния и включает в себя пакт о ненападении между Москвой и Константинополем.\n\n Хотя временный союз между двумя державами удивляет, наблюдатели уже поспешили отметить, что он вряд ли продержится долго, так как многовековые соперники в конце концов неизбежно окажутся в состоянии войны."
 worldnews.442.a: "Самое шокирующее событие"
 
 worldnews.443.t: "Французские интегралисты восстанавливают монархию"
 worldnews.443.d: "'...Во имя блага Франции и ее народа, как подданного, я смиренно прошу monseigneur герцога де Гиз, наследника сорока королей, которые на протяжении тысячелетий делали Францию, чтобы захватить корону и направлять нас к воскресению, к обновлению Франции'. Простым обращением к парламенту Шарль де Голль призвал к восстановлению монархии. После нескольких месяцев политической нестабильности кажется, что французские интегралисты 'Аксьон Франсез' наконец-то получили свои пожелания. Но правда в том, что никто во Франции не был удивлен таким развитием событий: роялистские симпатии де Голля были открытой тайной, и его, казалось бы, неумолимое восхождение к власти обязательно должно было закончиться именно таким образом. Только время покажет, сможет ли новый режим сохранить себя, не говоря уже о том, чтобы покорить французскую метрополию."
 worldnews.443.a: "Реакционеры переходят в дальнейшую реакцию, типично"
 worldnews.443.b: "Франция и политическая нестабильность, что еще нового?"
 worldnews.443.c: "Эта республика всегда была на грани краха"
 
 worldnews.444.t: "Демократическая коалиция в Алжире"
 worldnews.444.d: "После неожиданного ухода в отставку маршала Филиппа Петена, лидера тонко замаскированной военной хунты на протяжении последнего десятилетия, и избрания генерала Анри Мордака главой государства, новый президент восстановил большую часть гражданских свобод, приостановленных при Петене, и решил довериться до сих пор довольно маргинализированным демократическим силам изгнанной Республики, чтобы сформировать правительство единства, новый 'Священный Союз', сам решив взять на себя более церемониальную роль. Эта коалиция, возглавляемая консервативной Французской Социальной Партией и ее лидером полковником Франсуа де ля Роком, поклялась сделать все, что в ее силах, чтобы продолжить усилия по захвату французского материка и 'свергнуть Революцию', хотя скептики не уверены, что эта широкая коалиция, объединяющая совершенно разные силы, продержится достаточно долго, чтобы исполнить эту клятву."
 worldnews.444.a: "Реакционеры с улыбкой"
 worldnews.444.b: "Республика выдержит!"
 worldnews.444.c: "Я даю им несколько месяцев, прежде чем они развалятся"
 
 worldnews.445.t: "Государственный переворот в Алжире"
 worldnews.445.d: "Тонко замаскированная военная хунта маршала Филиппа Петена провалилась в государственный переворот во главе с одним из своих бывших союзников, генералом Анри Мордаком. Легитимность правления маршала неуклонно подрывалась обвинениями в кумовстве и коррупции, попытка централизовать власть в его руках добавила обвинения в тирании к длинному списку претензий к нему, ускорив переворот. В настоящее время Петен находится под стражей, а главой государства избран генерал Мордак. Хотя он объявил, что гражданские свободы, приостановленные при прежнем режиме, будут восстановлены, и обещал в конечном итоге возвращение к полному демократическому правлению, генерал объявил, что на данный момент будет создан 'Комитет Национального Спасения', состоящий из военных, экспертов и парламентариев, с тем чтобы наилучшим образом осуществить реформы, которые, по его мнению, необходимы для возвращения французского материка."
 worldnews.445.a: "Реакционеры пожирают друг друга"
 worldnews.445.b: "Первый шаг к демократии"
 worldnews.445.c: "Он должен был это предвидеть"
 
 worldnews.446.t: "Маршал остался"
 worldnews.446.d: "Вопреки всему, после нескольких месяцев беспорядков, напряженных дебатов, протеста, кажется, что во Французской Республике в изгнании все вернулось на круги своя. Легитимность тонко замаскированной военной хунты маршала Филиппа Петена была подорвана обвинениями в кумовстве и коррупции, а попытка централизовать власть в его руках добавила обвинения в тирании к длинному списку претензий к нему. И все же 'Лев Вердена' держался, тщательно заручившись поддержкой высших слоев общества, возродив восхищение своего народа и успокоив беспорядки, охватившие Республику, и все это благодаря широкой поддержке, оказанной ему загадочной группой 'Французское Возрождение'. Охраняя тылы, Петен объявил, что будет проведен широкий круг реформ, чтобы наилучшим образом подготовить Францию к борьбе за завоевание Французской материковой части."
 worldnews.446.a: "Маска спадает"
 worldnews.446.b: "Разве хунта не была временной?"
 worldnews.446.c: "Франции всегда нужна была сильная рука"
 
 worldnews.447.t: "Триумф французских изгнанников"
 worldnews.447.d: "По прошествии двух десятилетий пожары революции раз и навсегда потушены. Несмотря на подавляющие шансы, французские изгнанники успешно вновь захватили Метрополию. Благодаря сотрудничеству союзников и невероятной национальной мобилизации они превзошли тех, кто стоял на их пути. Планируются грандиозные торжества, особенно в Париже, где пройдет парад на Елисейских полях для войск всей Антанты. Однако французский народ по-прежнему глубоко расколот: одни приветствуют изгнанников как освободителей, другие оплакивают падение коммуны, а большинство просто в шоке, измученном войной, их жизнь восстанавливается второй раз за поколение: эта гражданская война лишь номинально закончилась, раны, которые она открыла, затянутся на долгие годы."
 worldnews.447.a: "Трагедия"
 worldnews.447.b: "Наконец-то, всё кончено"
 worldnews.447.c: "У всех революционеров одна судьба"
 
 worldnews.448.t: "Возвращение французских изгнанников"
 worldnews.448.d: "По прошествии двух десятилетий пожары революции раз и навсегда потушены. Несмотря на подавляющие шансы, французские изгнанники, благодаря сотрудничеству союзников и невероятной национальной мобилизации, успешно вновь вошли в Метрополию. Планируются грандиозные торжества, особенно в Марселе, где пройдет парад войск всей Антанты. Однако французский народ по-прежнему глубоко расколот: одни приветствуют изгнанников как освободителей, другие оплакивают падение коммуны, а большинство просто в шоке, измученном войной, их жизнь восстанавливается второй раз за поколение: эта гражданская война лишь номинально закончилась, раны, которые она открыла, затянутся на долгие годы. Кроме того, национальная территория Франции остается разобщенной: уже посеяны семена будущего конфликта."
 worldnews.448.a: "Трагедия"
 worldnews.448.b: "Наконец-то, всё кончено"
 worldnews.448.c: "У всех революционеров одна судьба"
 
 worldnews.449.t: "Пятая Балканская война"
 worldnews.449.d: "Несмотря на то, что Сербия была разбита в Вельткриге и оккупирована Австрией почти десять лет, они не были раздавлены навсегда. Разбив своих врагов в Болгарии и вновь захватив Черногорию и Македонию, [SER.GetNameDef] посмотрела в сторону южных славянских земель Австро-Венгерской Империи. Вместе со своими союзниками в Румынии и Восточной Европе, сербы теперь предъявили Австро-Венгрии ультиматум о передаче им всех своих притязаний. Монархия, естественно, отказалась, поэтому австрийцы снова воюют с Сербией. Только время покажет, одержат ли они победу в очередной раз, или империя рухнет под тяжестью своих внутренних и внешних врагов."
 worldnews.449.a: "Пороховая бочка снова взорвалась"
 worldnews.449.b: "Свобода или смерть!"
 worldnews.449.c: "Мы что, должны бояться?"
 
 worldnews.450.t: "Шестая Балканская война"
 worldnews.450.d: "После поражения Австро-Венгрии от Белградского Договора, победители начали ссориться между собой, как после Первой Балканской войны. Есть много нерешенных вопросов - Западный Банат, Адриатическое побережье - и нестабильная цель балканского господства, разделяемая румынским и сербским правительствами. Вновь вспыхнула война на Балканах, и только время покажет, кто одержит победу, и нарисует карту региона на долгие годы вперед."
 worldnews.450.a: "Похоже она будет идти постоянно!"
 worldnews.450.b: "Наш народ будет единым!"
 
 worldnews.451.t: "Восхождение Северной Федерации"
 worldnews.451.d: "Сегодня на Севере поднимается новый гигант. После многих напряженных переговоров то, что раньше считалось недостижимым, теперь стало реальностью. За последние несколько лет большая часть мира дрейфовала, но северные страны действовали вопреки этой новой глобальной норме. Этот братский союз войдет в мир, который во многом находится на краю пропасти, но они знают, что вместе они намного сильнее, чем когда-либо могли быть порознь. Чтобы отпраздновать это знаменательное достижение, созывается совместная сессия парламента. Тройное ура за объединение, тройное ура за демократию!"
 worldnews.451.a: "Гип-гип-ура для Скандинавии!"
 
 worldnews.452.t: "Социалисты берут все под свой контроль в Норвегии!"
 worldnews.452.d: "После победы на выборах и принуждения короля Хокона VIII к отречению от престола, Социалистическая партия Норвегии ратифицировала новую конституцию, которая полностью превращает страну в синдикалистское государство, такое же, как Франция и Великобритания. С присоединением еще одной части шахматной доски к синдикализму, баланс сил в Европе вновь сдвинулся в великой шахматной игре между владениями Кайзера и французской революцией."
 worldnews.452.a: "Неужели они действительно так бесстыдно предали доверие короля Хокона?"
 worldnews.452.b: "Норвегия наконец разорвала оковы."
 
 worldnews.453.t: "[MEX.GetLeader] провозглашает Максимато"
 worldnews.453.d: "Мексиканский революционер Эмилиано Сапата скончался, и с его смертью Мексика вновь погрузилась в хаос. В то время как наиболее горячо преданные члены правительства все еще верили в скорое выздоровление, борец за свободу и до сегодняшнего дня лидер Мексики оставил после себя вакуум власти, который будет нелегко исцелить.\n\nПосле смертельного выстрела Сапаты на улицах Мехико, клика под руководством лидера [MEX.GetLeader] стремительно двинулась вперед и захватила правительственные объекты и учреждения, обещая поднять мексиканский социализм на новую высоту."
 worldnews.453.a: "Мексиканская демократия умерла, как и жила."
 worldnews.453.b: "Революция продвигается."

 worldnews.454.t: "Военные захватывают власть в Мексике"
 worldnews.454.d: "Мексиканский революционер Эмилиано Сапата скончался, и с его смертью Мексика вновь погрузилась в хаос. В то время как самые горячо преданные члены правительства все еще верили в скорое выздоровление, борец за свободу и до сегодняшнего дня лидер Мексики оставил после себя вакуум власти, который будет нелегко преодолеть.\n\nВ разгар смертельного расстрела Сапаты на улицах Мехико, правые элементы в армии воспользовались своим шансом. Находясь в оппозиции к мексиканским правительствам с момента прихода к власти Обрегона, они теперь полностью контролируют Мексику и стремятся восстановить законное правление, чтобы остановить разгул хаоса."
 worldnews.454.a: "Мексиканская демократия умерла, как и жила."
 worldnews.454.b: "Это, наконец, наведет порядок в Мексике."

 worldnews.455.t: "Создание демократической коалиции в Мексике"
 worldnews.455.d: "После недавней смерти мексиканского революционера Эмилиано Сапаты Мексика оказалась в вакууме власти с неясным руководством и неработающими правительственными структурами. Хотя самые горячо преданные члены правительства все еще верили в скорое выздоровление, смерть борца за свободу показала Мексике, что демократическое правительство, вдохновляемое синдикалистами, нуждается в серьезных реформах, чтобы продолжить свою деятельность.\n\nПосле смертельного выстрела Сапаты на улицах Мехико, коалиция демократических партий решила пойти на компромисс, в попытке обуздать насилие, которое терзает страну, и двигаться дальше к стабильности."
 worldnews.455.a: "¡Viva México!"

 worldnews.456.t: "Третий Вельткриг"
 worldnews.456.d.britain_no_france: "Объединенный союз, положивший конец синдикалистам, подошел к концу. После короткого, но непростого мира руководство Антанты решило, что оно просто не может существовать с Рейхспактом, который продолжает доминировать в Европе. Восстановленная Великобритания объединила различных членов Антанты, включая французских изгнанников из Алжира, чтобы начать еще одну глобальную войну в надежде окончательно отвоевать Метрополию. И снова в небе и на море происходит столкновение старых, избитых империй Европы. Граждане воюющих держав оказываются в опасности, как никогда прежде, - новое разрушительное оружие, более совершенное, чем то, с которым они только что сражались. Кажется, что мир снова движется к разрушительному Вельткригу."
 worldnews.456.d.no_britain_yes_france: "Объединенный альянс, положивший конец синдикалистам, подошел к концу. После короткого, но непростого мира руководство Антанты решило, что оно просто не может сосуществовать с Рейхспактом, который продолжает мечтать о доминировании в Европе. Все еще находящееся в изгнании правительство Канады объединило различных членов Антанты, включая французских союзников, которые вернулись в Метрополию после последней войны, чтобы начать еще одну глобальную войну в надежде окончательно вернуть себе Великобританию. И снова в небе и на море происходит столкновение старых, избитых империй Европы. Граждане воюющих держав оказываются в опасности, как никогда прежде, ведь в ход идет новое разрушительное оружие, более совершенное, чем то, которое только что использовалось в недавней войне. Кажется, что мир снова охвачен разрушительным Вельткригом."
 worldnews.456.d.no_britain_no_france: "Поражение Третьего Интернационала от рук Рейхспакта привело, по мнению наблюдателей, к продолжению мировой гегемонии Германии. Однако старый Альянс Антанты никогда не оставлял надежд вернуть свои родные земли, и теперь они прибегли к объявлению войны Германии. Обе стороны готовы поставить все на карту и требуют от другой стороны только безоговорочной капитуляции. Хотя группировки разделяют океаны, граждане этих враждующих стран оказались в опасности из-за появления нового смертоносного оружия, превосходящего то, которое использовалось во второй великой войне. Пока правительства всего мира надеются на мирное возвращение к мировому порядку довоенных времен, похоже, что в очередной раз разразится Вельткриг."
 worldnews.456.d.no_britain_no_france_yes_america: "Наблюдатели полагали, что крах Третьего Интернационала станет началом продолжения мировой гегемонии Германии. Однако Альянс Антанты уже не надеялся вернуть свои родины и объявил войну Германии. Хотя некоторые могут сомневаться в силе изгнанных великих европейских держав, их поддерживает вся промышленная и военная мощь восстановленной американской нации. Хотя великие державы разделяют океаны, граждане воюющих стран опасаются за свою жизнь, поскольку новое и более смертоносное оружие, превосходящее по мощности Второй Вельткриг, даст о себе знать. В то время как страны всего мира надеются на возвращение к мировому порядку довоенных времен, похоже, что в очередной раз разразится очередной Вельткриг."
 worldnews.456.d.britain_france: "Несмотря на объединенную коалицию, принесшую поражение синдикалистам, противники Первого Вельткрига вновь перешли к войне. Вновь немецкая и французская армии сражаются друг с другом на полях северной Франции, а королевский флот и Кайзерлихмарине ведут дуэль в открытом море, поскольку обе фракции стремятся добиться гегемонии над другой. Жители Европы, недавно пережившие большую войну, несомненно, будут вынуждены пережить потенциально более смертоносную войну, поскольку появляются новые виды оружия и технологии, превосходящие Второй Вельткриг. Пока страны всего мира надеются на возвращение к мировому порядку довоенных времен, похоже, что в очередной раз разразится очередной Вельткриг." 
 worldnews.456.d.britain_france_america: "Несмотря на объединенную коалицию, принесшую поражение синдикалистам, противники Первого Вельткрига вновь перешли к войне. Вновь немецкая и французская армии сражаются друг с другом на полях северной Франции, а королевский флот и Кайзерлихмарине ведут дуэль в открытом море, поскольку обе фракции стремятся добиться гегемонии над другой. Хотя наблюдатели не сомневаются в силе немецкой нации, воссоединенная и возрожденная промышленная мощь Соединенных Штатов может оказаться всем, что нужно Антанте для победы. Граждане Европы, недавно пережившие большую войну, несомненно, будут вынуждены пережить потенциально более смертоносную войну, поскольку появятся новые виды оружия и технологии, превосходящие Второй Вельткриг. Мир стоит на пороге еще одного Вельткрига, более страшного, чем предыдущие."
 worldnews.456.a: "Месть - сильная вещь."
 worldnews.456.b: "Какая у них еще есть надежда?"
 worldnews.456.c: "Мы победили их в 1919 году, мы можем победить их и сейчас."
 worldnews.456.e: "На этот раз мы победим!"

 worldnews.457.t: "Париж против Москвы"
 worldnews.457.d.entente_alive: "Второй Вельткриг не закончился с падением Германии, а продолжался, когда Антанта и Интернационал столкнулись в Северной Африке и Северной Атлантике. Теперь в кузницах русской военной машины зажглась новая надежда для Антанты - по всей границе между российской и французской сферами \"Сумеречная борьба\" сэра Уинстона Черчилля переросла в борьбу за мировой порядок, настолько кровавую, что кажется, она может посрамить борьбу 1939 года.\n\nЗа пределами фронтов граждане воюющих держав находятся в опасности, как никогда прежде, с появлением воздушных машин смерти, которые могут уничтожить целые города в течение нескольких часов после объявления войны. По мере того, как обе стороны мобилизуются, немногие остатки довоенного мира задаются вопросом - успокоится ли когда-нибудь Европа?"
 worldnews.457.d.entente_dead: "После поражения Германии, весь мир знал, что Европа спит неспокойно. После победы Третьего Интернационала над колониальными империями в Африке и Центральной Европе, только Россия могла встать на пути синдикалистского мирового господства. Теперь русская и французская идеологические системы, созданные из пепла поражения Германии, столкнутся в борьбе за мировой порядок, настолько кровавой, что кажется, она побьет Второй Вельткриг.\n\nЗа пределами фронта граждане воюющих держав находятся в опасности, как никогда прежде, с появлением воздушных машин смерти, которые могут уничтожить целые города в течение нескольких часов после объявления войны. По мере того, как обе стороны мобилизуются, немногие остатки довоенного мира задаются вопросом - успокоится ли когда-нибудь Европа?"
 worldnews.457.a: "Очевидно, нет."
 worldnews.457.b: "Мы подавим революцию, как в 1814 году!"
 worldnews.457.c: "Это последняя борьба!"
 worldnews.457.d: "С русскими на нашей стороне победа обеспечена!"

 worldnews.458.t: "Пуэрто-Рико провозглашает независимость"
 worldnews.458.d.nat: "Пуэрториканские националистические повстанцы, пополнившие свои ряды новобранцами, одним махом захватили столицу острова, Сан-Хуан, и ключевые военные объекты. Иностранные силы эвакуировались с острова перед лицом этого скоординированного нападения, и хотя спорадическое сопротивление полиции продолжается, остров окончательно перешел под контроль националистов.\n\nПедро Альбису Кампос был назначен президентом самопровозглашенной Республики Пуэрто-Рико, а новый законодательный орган был сформирован из представителей его партии. Пока националисты заняты укреплением своего правления, их политическая программа ясна. Они продолжают добиваться 'полной независимости' Пуэрто-Рико - любыми средствами и несмотря ни на что..."
 worldnews.458.d.dem: "С началом Второй американской гражданской войны в хаос был ввергнут не только огромный американский материк, но и многочисленные заморские владения нации. Сегодня маленький карибский остров Пуэрто-Рико, завоеванный в испано-американской войне, официально вырвался из рук дяди Сэма, поскольку новая нация подписала Пуэрто-Риканскую декларацию независимости, направленную против Соединенных Штатов. Для многих такой поворот событий был неизбежен. Националисты уже заставили Блэнтона К. Уиншипа, назначенного непопулярным на местном уровне губернатором, уйти в отставку в пользу широкой коалиции ведущих националистических деятелей и партий - Союза Пуэрто-Рико. Однако теперь, когда цель коалиции достигнута, похоже, что ее члены пошли своим путем и потребовали новых выборов, чтобы решить, кто возглавит самую молодую страну в мире."
 worldnews.458.a: "Свобода!"
 worldnews.458.b: "Мы должны следить за островом."
 worldnews.458.c: "Орёл падает дальше"

 worldnews.459.t: "Вторая Японо-Китайская война"
 worldnews.459.d.fengtian_losing: "Между Китаем и Японией уже давно нарастала напряженность: последняя поддерживала соперничающую клику Фэнтянь в Маньчжурии, чтобы защитить свои интересы в регионе. Когда Фэнтянь и [china.GetNameDef] развязали войну, ее преследовала перспектива японского вмешательства, если [FNG.GetLeader] не сможет добиться успеха.\n\nПо мере того, как война затягивалась, а правительство Фэнтяня обнаруживало, что победа все дальше и дальше ускользает, эти опасения оправдались, когда они были вынуждены обратиться за помощью к своему благодетелю в Токио. [china.GetLeader] уже осудил это, сказав, что [FNG.GetLeader] - японская шавка, и заявил, что иностранное вмешательство является доказательством его раболепия. Две древние цивилизации снова оказались в состоянии войны."
 worldnews.459.d.japan_and_fengtian: "Хотя Токио ясно дал понять, что не допустит посягательств Китая на свою сферу влияния в Маньчжурии, [china.GetNameDef] был неудержим, осуждая японский империализм и обещая, что не подчинится иностранным требованиям.\n\nПоэтому, когда [china.GetNameDef] и [FNG.GetNameDef] наконец столкнулись, Япония вступила в конфликт на стороне последних. За их действия [china.GetLeader] осудил, сказав, что [FNG.GetLeader] - предатель всей нации и японская шавка. Две древние цивилизации снова оказались в состоянии войны."
 worldnews.459.d.japan_versus_fengtian: "Японские интересы давно были связаны с Маньчжурией, Токио оказывал военную и экономическую помощь правящей клике Фэнтянь в обмен на обещание Чжан Цзолиня, ее лидера, уважать японские интересы. Однако эти отношения были сопряжены с трудностями, поскольку Цзолинь пытался держать японцев на расстоянии.\n\nНыне отказ [FNG.GetNameDef] удовлетворить дальнейшие требования Японии привел к разрыву отношений между двумя странами. Японская Империя поклялась сместить [FNG.GetLeader], объявив его нынешнюю администрацию 'вышедшей из-под контроля', а [FNG.GetNameDef] официально занял антиконцессионную позицию и пообещал изгнать японцев из Китая раз и навсегда."
 worldnews.459.d.default: "Переговоры между Японией и [china.GetNameDef] сорвались после того, как китайцы заявили, что больше не потерпят вторжения Японии на континент. По сообщениям из Японии, страна готова начать полномасштабное вторжение в Китай впервые за почти пятьдесят лет.\n\nПо мере того, как войска начинают сталкиваться, выживание Китая кажется мрачным, учитывая мощь и превосходство японской военной машины. Теперь нация сталкивается с самой большой опасностью в своей двухтысячелетней истории, поскольку вмешательство Запада кажется маловероятным, а эти державы борются со своими собственными кризисами. Битва за Китай докажет, осуществятся ли планы Японии по созданию 'Большой Восточной Азии' или китайский дракон наконец пробудится от своей дремоты."
 worldnews.459.a: "Ваньсуй!"
 worldnews.459.b: "Банзай"
 worldnews.459.c: "На кону судьба Китая"

 worldnews.462.t: "Демократия обстреливает Алжир"
 worldnews.462.d: "Резня. Кровавая бойня. Эти слова кажутся недостаточными для описания событий, произошедших в Алжире, где линкор \"Демократия\" открыл огонь по толпе. День начался с мирных протестов реформистских сил. Но где-то раздался выстрел, голос закричал, человек лежал мертвый: протестующие запаниковали, правительственные силы потеряли всякую сдержанность, и в считанные минуты партизанская война охватила столицу в изгнании. Когда наступила ночь, режим столкнулся с возможностью всеобщего восстания, как только новости распространятся: такая перспектива была бы невыносимой, и поэтому был отдан мрачный приказ. Рассказы о растерзанных телах, казнях без суда и следствия, размытые фотографии последствий просочились из Республики, но французская газета озаглавила \"КРАСНЫЙ ПЕРЕВОРОТ ХРАБРО УСТРАНЁН\". Лишь одно можно сказать наверняка: власть маршала теперь неоспорима."
 worldnews.462.a: "Реакционеры теперь разрывают своих!"
 worldnews.462.b: "Так закончилась Французская республика"
 worldnews.462.c: "Пусть Республика будет сметена"

 worldnews.463.t: "Литовско-Белорусская Федерация"
 worldnews.463.d.BLR: "Со времен Великой войны Восточная Европа пережила подъем и падение многих государств, но никто не мог предположить, что новым членом региона станет [BLR.GetNameDef]. Несмотря на различия между двумя странами, белорусское правительство неустанно работало над их объединением, обещая автономию и равноправие.\n\nВ конце концов, все было готово к тому, чтобы [BLR.GetLeader] объявил о создании государства [BLR.GetNameDef], союза между двумя странами, который, предположительно, может вести свое происхождение со времен Великого княжества Литовского. Будущее Федерации может быть неизвестно, но точно известно, что судьбы Беларуси и Литвы переплелись."
 worldnews.463.d.lit: "Со времен Великой войны Восточная Европа пережила подъем и падение многих государств, но никто не мог предположить, что новым членом региона станет [LIT.GetNameDef]. Несмотря на различия между двумя странами, литовское правительство неустанно работало над их объединением, обещая автономию и равноправие.\n\nВ конце концов, все было готово к тому, чтобы [LIT.GetLeader] объявил о создании государства [LIT.GetNameDef], союза между двумя странами, который, предположительно, может вести свое происхождение со времен Великого княжества Литовского. Будущее Федерации может быть неизвестно, но точно известно, что судьбы Беларуси и Литвы переплелись."
 worldnews.463.a: "Замечательно!"
 worldnews.463.b: "Как неожиданно"

 worldnews.464.t: "Миттельафрика восстановлена"
 worldnews.464.d: "Когда рухнула немецкая колония Миттельафрика, мир подумал, что немецкое владычество на темном континенте исчезло навсегда. То, что осталось от бывшей колониальной администрации, отступило в Намибию, потрясенное, опозоренное и дезорганизованное. Однако, похоже, этому не суждено было случиться. [NMB.GetLeader] бдительно руководил, чтобы немцы начали серию кампаний из Виндхука, решив, что имперское знамя снова будет развеваться от Занзибара до Берега Слоновой Кости. Эти планы наконец-то воплотились в жизнь: теперь немецкие войска контролируют всю территорию, которая когда-то была Миттельафрикой, объявив, что управление восстановлено. Вопреки всему, колониализм одержал победу."
 worldnews.464.a: "Как прекрасно!"
 worldnews.464.b: "Африка снова в цепях..."
 worldnews.464.c: "Кайзер вернулся"

 worldnews.465.t: "Инсулиндская национальная революция"
 worldnews.465.d: "Инсулиндия является одной из старейших европейских колоний, перешедшей под власть голландского правительства в 1800 году, а под власть голландской Ост-Индской компании - гораздо раньше. Однако такое положение дел может продлиться недолго, поскольку на фоне растущей нестабильности и гнева на голландских колониальных владык, [INS.GetLeader], один из самых влиятельных деятелей движения за независимость Инсулиндии, возглавил вооруженное восстание с целью изгнания колониальных войск и провозгласил начало Инсулиндийской национальной революции. Хотя повстанцы испытывают недостаток в снаряжении и подготовке по сравнению с голландцами, у них есть преимущество: они сражаются на своей родной местности против врага, который вынужден снабжать свои силы за тысячи миль. Кто бы ни победил, Инсулиндия изменится навсегда."
 worldnews.465.a: "Merdeka!"
 worldnews.465.b: "Еще один удар по европейской власти..."
 worldnews.465.c: "Бандиты и преступники!"

 worldnews.466.t: "Исландская независимость"
 worldnews.466.d: "Небольшой атлантический остров Исландия долгое время находился под властью датских королей, перейдя под их контроль более 400 лет назад, но недавние события поставили такое положение дел под угрозу. После Черного Понедельника и попыток датского правительства отреагировать на кризис, призывы к полной независимости становились все громче и громче, пока правительство не было вынуждено провести референдум о независимости, чтобы определить будущее острова. Теперь, когда результаты получены, кажется, что партия, выступающая за независимость, победила, сделав Исландию новейшей европейской республикой. Хотя многие празднуют этот день, другие опасаются, что вновь обретенная независимость страны может быть сметена Великобританией или Канадой, которые жадно смотрят на нее. Как бы то ни было, в Атлантике появился новый игрок."
 worldnews.466.a: "День, который нужно отметить!"
 worldnews.466.b: "Как интересно..."
 worldnews.466.c: "Как это может повлиять на Атлантику?"

 worldnews.468.t: "Центральная Рада захватывает власть в Белой Рутении"
 worldnews.468.d: "Когда экономика Германии пошатнулась из-за тяжелого экономического кризиса, последствия этого быстро сказались на восточных сателлитах европейского гегемона. Белая Рутения, маленькая и молодая страна у российской границы, вскоре была охвачена нестабильностью. После усиления волнения со стороны радикальных левых элементов в стране, армия вмешалась и свергла избранное социал-демократическое правительство. Временным президентом был назначен Радослав Островский, депутат законодательного собрания Белой Рутении. Сметая остатки старого правительства, Островский консолидировал власть вокруг нового института - Центральной Рады (Совета), председателем которой стал он сам. Белая Рутения, при молчаливой поддержке Германии, превратилась в авторитарный режим, а ее зарождающаяся демократия была пресечена в зародыше."
 worldnews.468.a: "Они должны оказаться более лояльными."
 worldnews.468.b: "Еще одно доказательство того, что реформизм обречен на провал."
 worldnews.468.c: "Теперь они в безопасности от революции."
 worldnews.468.e: "Еще одна демократия падает перед радикализмом."

 worldnews.469.t: "Кривичский путч"
 worldnews.469.d: "Когда экономика Германии пошатнулась из-за тяжелого экономического кризиса, последствия этого быстро сказались на восточных сателлитах европейского гегемона. Белая Рутения, маленькая и молодая страна, вскоре была охвачена нестабильностью. После растущей агитации со стороны радикальных левых элементов в стране, армия вмешалась и свергла избранное социал-демократическое правительство. После короткой борьбы за власть вакуум заполнил не кто иной, как Вацлав Ластовский, лидер популистской Крестьянской партии \"Зеленый дуб\". Историк и писатель, Ластовский принимал активное участие в борьбе Белой Рутении за независимость от России. Будучи глубоко русофобом, он надеется полностью очистить страну от русского влияния и перестроить национальную идентичность белорусов вокруг средневекового племени кривичей. В условиях возрождающейся России война за выживание кажется неизбежной."
 worldnews.469.a: "Идеальные союзники против российской угрозы."
 worldnews.469.b: "Еще одно доказательство того, что реформизм обречен на провал."
 worldnews.469.c: "Теперь им не грозит революция."
 worldnews.469.e: "Падение демократии порождает ужасную тиранию."
 worldnews.469.f: "'Чистые славяне'? Ха!"

 worldnews.470.t.wk2: "Французские изгнанники участвуют в Вельткриге"
 worldnews.470.t.before_wk2: "Гражданская война во Франции возобновляется"
 worldnews.470.d.wk2: "После двух десятилетий подготовки к возвращению на родину, французские изгнанники в Алжире решили захватить инициативу и воспользоваться продолжающимся Вельткригом, объявив войну силам Третьего Интернационала. Поскольку последний был занят борьбой с Германией, у сил Антанты появилась возможность вернуться домой и раз и навсегда подавить свергнувшую их революцию. Смогут ли они вернуться домой или нет - это, однако, совершенно другая история, в которой многие факторы могут способствовать их успеху или окончательной гибели."
 worldnews.470.d.before_wk2: "Хотя номинально после Британской революции 1925 года в мире в основном царит мир, на самом деле война замерла в ожидании. После Великой войны революции в Великобритании, Франции и Италии не уничтожили старые правительства, а лишь отправили их за границу, готовясь с тех пор к окончательной конфронтации.\n\nКажется, эта конфронтация уже близка. Всего несколько часов назад средиземноморские патрули Marine National внезапно изменили свои маршруты - прямо к водам Коммуны. Хотя морское противостояние между французскими правительствами не является чем-то неслыханным, приближающиеся суда не предпринимают никаких попыток изменить курс. Силы Коммуны уже приведены в состояние повышенной боевой готовности, понимая, что их война не заставит себя ждать."
 worldnews.470.a: "Мы вернемся домой!"
 worldnews.470.b: "Они могут оказаться полезными для нас..."
 worldnews.470.c: "Эти реакционеры - едва ли помеха, мы раздавим их с легкостью."
 worldnews.470.e: "Антанта не сдается, я полагаю?"

 worldnews.471.t.wk2: "Канада вмешивается в Вельткриг"
 worldnews.471.t.before_wk2: "Война в Северной Атлантике"
 worldnews.471.d.wk2: "После окончания Британской Революции, новое социалистическое правительство в Лондоне, оказалось перед лицом старого правительства в изгнании в Оттаве по другую сторону Атлантики, причем ни одна из сторон не хотела и не могла нарушить последовавший за этим напряженный мир. Сегодня этот странный статус-кво рухнул, поскольку правительство Канады заявило, что больше не будет ждать, чтобы \"продолжить борьбу\". Сообщения о крупных мобилизациях и агрессивных военно-морских действиях, а также слухи о координации действий с Рейхспактом, подтверждают, что Канада полностью включилась во Второй Вельткриг."
 worldnews.471.d.before_wk2: "Хотя номинально после Британской революции 1925 года в мире в основном царит мир, на самом деле война замерла в ожидании. После Великой войны революции в Британии, Франции и Италии не уничтожили старые правительства, а лишь отправили их за границу, готовясь с тех пор к окончательному противостоянию.\n\nКажется, что это противостояние уже близко. Сегодня канадские военные корабли начали принудительный захват ряда британских торговых судов, пересекающих Атлантику, что выглядит как скоординированный шаг. Хотя известно, что между двумя военно-морскими силами происходят провокации, на этот раз, похоже, Королевский флот не отступает, а с твердым намерением движется в сторону республиканских вод. Республиканский флот ответил тем же: война больше не является ожиданием."
 worldnews.471.a: "Это наш единственный шанс вернуться домой!"
 worldnews.471.b: "Похоже, не только мы будем вести войну на два фронта"
 worldnews.471.c: "Они не могут подавить революцию!\nМы победим их снова!"
 worldnews.471.e: "Будет ли Антанта снова побеждена, или революция даст трещину?"

 worldnews.473.t: "Война Мау-Мау"
 worldnews.473.d: "Новости из немецкой колонии [MAF.GetNameDef], как правило, описываются как спокойные и позитивные, колониальные администраторы рисуют картину проекта как мощного выражения немецкой мощи. Однако теперь само существование этой колонии, похоже, находится под угрозой, поскольку то, что немецкие власти ранее описывали как мелкий, предсмертный конфликт, жестоко переросло в войну. В Кении коалиция нескольких различных этнических групп объединилась в повстанческое движение, чтобы изгнать европейских поселенцев с этих земель. В ответ [MAF.GetLeader], глава колонии, поклялся \"восстановить порядок\", а [MAF.GetAdjective]ие подразделения отправились на войну."
 worldnews.473.a: "Мы легко раздавим этих дикарей."
 worldnews.473.b: "Мы не должны были допускать Риттера к управлению Миттельафрикой."
 worldnews.473.c: "Это был лишь вопрос времени, когда народы Африки разорвут свои цепи."
 worldnews.473.e: "Это доказывает, что немчура никогда не умела правильно управлять своими колониями."
 worldnews.473.f: "Чушь, еще одно восстание туземцев в Африке?"

 worldnews.474.t: "Война в восточных морях"
 worldnews.474.d.ger: "За последнее столетие Азия стала континентом, на котором в основном доминируют западные державы, и хотя эти державы сменили Лондон и Париж на Берлин, этот факт остался неизменным, к большому неудовольствию Токио. Однако теперь, когда [JAP.GetNameDef] и [GER.GetNameDef] вступают в войну, этот статус-кво грозит разрушиться. Несмотря на надежды на мир, многие считают такой поворот событий неизбежным. Японские планы по построению Азии вокруг себя всегда были несовместимы с доминированием Германии в регионе, а в условиях, когда Запад охвачен кризисом, лидеры Токио сомневаются, что может появиться еще один шанс реализовать эти амбиции. На чьей бы стороне ни была фортуна, одно можно сказать наверняка - будущее Азии висит на волоске."
 worldnews.474.d.noger: "За последнее столетие Азия стала континентом, на котором в основном доминируют западные державы, и хотя эти державы сменили Лондон и Париж на Берлин, этот факт остался неизменным, к большому неудовольствию Токио. Однако сейчас этот статус-кво, похоже, находится на грани разрушения. После падения Германской Империи было неизбежно, что Япония не заставит себя долго ждать и попытается реализовать свои давние амбиции по изгнанию колониальных держав из Азии. Сообщения из Токио подтверждают, что [JAP.GetNameDef] и [GEA.GetNameDef] вступили в войну, и хотя лидеры [GEA.Capital.GetName] уже спешно готовят оборону против ИЯП, с отрезанной головой змеи, вопрос для многих заключается не в том, 'если', а в том, 'когда' японский флаг будет развеваться над этим городом."
 worldnews.474.a: "Освобождение Азии приближается!"
 worldnews.474.b: "Сингапур никогда не падет!"
 worldnews.474.c: "Смогут ли немцы выстоять на этот раз?"
 
 worldnews.475.t: "Убийство Чжан Цзолиня"
 worldnews.475.d: "После завоевания Чжан Цзолинем Пекина, китайское правительство Фэнтяня казалось было готовым к воссоединению страны, но сегодня эти ожидания разбились вдребезги. 'Старый Маршал', как обычно называли Цзолиня, был убит киллером в Шэньяне. Через несколько часов после его смерти офицеры под командованием Ян Ютинга при поддержке Японии совершили государственный переворот и свергли войска, верные Чжан Сюэляну, сыну Старого Маршала. Новый режим Ютинга уже занял про-японскую позицию, предоставив корпорациям Токио практически неограниченный доступ к огромным ресурсам страны, а ИЯП - помощь в 'поддержании порядка'. Многим кажется, что Китай стал не более чем японским протекторатом."
 worldnews.475.a: "Сотрудничество с Японией - это будущее"
 worldnews.475.b: "Очень мудро"
 worldnews.475.c: "О нет..."

 worldnews.476.t.dem: "Дуглас МакАртур слагает с себя полномочия президента"
 worldnews.476.t.junta: "Дуглас МакАртур остается президентом"
 worldnews.476.d.dem: "В конце Второй Американской Гражданской войны правительство Дугласа МакАртура, военная хунта, которую ее глава назвал 'временной мерой', вышла из кризиса с триумфом. Однако с окончанием кризиса произошла потеря поддержки, поскольку демократы и сторонники жесткой линии спорили о том, должен ли президент уйти в отставку.\n\nСегодня эти споры были решительно разрешены, поскольку Дуглас МакАртур объявил о своем намерении сложить президентские полномочия и немедленно провести свободные выборы. В крупных городах страны уже прошли торжества, многие радуются возвращению американской демократии, но другие обеспокоены тем, какой прецедент могут создать действия генерала в будущем."
 worldnews.476.d.junta: "В конце Второй Американской Гражданской войны правительство Дугласа МакАртура, военная хунта, которую ее глава назвал 'временной мерой', вышла из кризиса с триумфом. Однако с окончанием кризиса произошла потеря поддержки, поскольку демократы и сторонники жесткой линии спорили о том, должен ли президент уйти в отставку.\n\nСегодня эти споры были окончательно разрешены, поскольку Дуглас МакАртур объявил о своем намерении оставаться президентом до тех пор, пока 'шрамы Гражданской войны полностью не заживут', и это время будет определено только самим генералом. В некоторых районах страны уже вспыхнули беспорядки, хотя большинство граждан просто слишком истощены, деморализованы или утомлены войной, чтобы протестовать."
 worldnews.476.a: "Да здравствует Республика!"
 worldnews.476.b: "Это конец американской демократии?"
 worldnews.476.c: "Как удивительно!"
 worldnews.476.e: "Ба!"
 
 worldnews.477.t: "Переворот в Цзинане"
 worldnews.477.d: "В течение 12 лет провинцией Шаньдун управлял Чжан Цзунчан, человек, которого однажды окрестили самым 'подлым' военачальником Китая за его коррупцию и расточительность, необычайно высокую даже по китайским меркам. Однако теперь этой ситуации пришел неожиданный конец. Рано утром отряд цинской пехоты, очевидно по просьбе [SQI.GetLeader], вошел в Цзинань и ворвался в дом Цзунчана, доставив его в Пекин в наручниках, чтобы предстать перед судом за его преступления. После этого [SQI.GetLeader] был назначен новым губернатором Шаньдуна. Набожный монархист и способный генерал, это ознаменовало втягивание провинции в орбиту Цин."
 worldnews.477.a: "Нехорошо, нехорошо"
 worldnews.477.b: "На одну угрозу меньше."
 worldnews.477.c: "Очаровательно"

 worldnews.478.t: "Лионский конгресс"
 worldnews.478.d.1.nobel: "Хотя [GER.GetNameDef] и [NFA.GetNameDef] вместе сражались против Коммунаров, они не смогли договориться о послевоенном урегулировании, оставив судьбу Франции неопределенной. Но поскольку Берлин не хотел проводить дорогостоящую оккупацию, а Алжир желал видеть Париж, оба встретились в Лионе, чтобы выработать соглашение. \n\nВ результате Лионский конгресс оказался успешным. Немецкие войска прекратят оккупацию, а [NFA.GetNameDef] согласилась на различные военные ограничения, выплату репараций, неограниченный доступ немецких войск на территорию Франции, вхождение в Миттельевропу, а также на потерю Бретани. Многие считают, что результаты складываются в пользу Берлина."
 worldnews.478.d.1: "Хотя [GER.GetNameDef] и [NFA.GetNameDef] вместе сражались против Коммунаров, они не смогли договориться о послевоенном урегулировании, оставив судьбу Франции неопределенной. Но поскольку Берлин не хотел проводить дорогостоящую оккупацию, а Алжир желал видеть Париж, оба встретились в Лионе, чтобы выработать соглашение. \n\nВ результате Лионский конгресс оказался успешным. Немецкие войска прекратят оккупацию, а [NFA.GetNameDef] согласилась на различные военные ограничения, выплату репараций, неограниченный доступ немецких войск на территорию Франции, вхождение в Миттельевропу, а также на потерю Па-де-Кале и Бретани. Многие считают, что результаты складываются в пользу Берлина."
 worldnews.478.d.2.nobel: "Хотя [GER.GetNameDef] и [NFA.GetNameDef] вместе сражались против Коммунаров, они не смогли договориться о послевоенном урегулировании, оставив судьбу Франции неопределенной. Но поскольку Берлин не хотел проводить дорогостоящую оккупацию, а Алжир желал видеть Париж, оба встретились в Лионе, чтобы выработать соглашение. \n\nВ результате Лионский конгресс оказался успешным. Немецкие войска прекратят оккупацию, а [NFA.GetNameDef] согласилась на различные военные ограничения, выплату репараций, разрешение немецким войскам неограниченного доступа на территорию Франции, а также на потерю Бретани. Многие считают, что результаты складываются в пользу Берлина."
 worldnews.478.d.2: "Хотя [GER.GetNameDef] и [NFA.GetNameDef] вместе сражались против Коммунаров, они не смогли договориться о послевоенном урегулировании, оставив судьбу Франции неопределенной. Но поскольку Берлин не хотел проводить дорогостоящую оккупацию, а Алжир желал видеть Париж, оба встретились в Лионе, чтобы выработать соглашение. \n\nВ результате Лионский конгресс оказался успешным. Немецкие войска прекратят оккупацию, а [NFA.GetNameDef] согласилась на различные военные ограничения, выплату репараций, разрешение немецким войскам неограниченного доступа на территорию Франции, а также на потерю Па-де-Кале и Бретани. Многие считают, что результаты складываются в пользу Берлина."
