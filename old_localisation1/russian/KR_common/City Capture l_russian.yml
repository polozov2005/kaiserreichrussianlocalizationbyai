l_russian:

### City Capture Events ###

 city_capture.251.t: "Падение Лондона"
 city_capture.251.d.generic: "Поступают сообщения, что столица государства [FROM.FROM.GetNameDef] была полностью захвачена [FROM.GetAdjective]ими войсками после тяжелых битв на реке Темза.[FROM.FROM.GetAdjective]ие войска пытались затормозить продвижение [FROM.GetAdjective]их войск, забаррикадировавшись в каждом доме, но, видимо, это не спасло их.\n\n Впервые со времен Вильгельма Завоевателя Британские острова пали перед ногами иностранного захватчика."
 city_capture.251.d.entente: "Поступают сообщения, что столица синдикалистского Британского Союза, была полностью захвачена канадскими войсками после тяжелых битв на реке Темза. Британские войска пытались затормозить продвижение роялистских войск, забаррикадировавшись в каждом доме, но, видимо, это не спасло их.\n\nПо мере того, как пыль оседает, становится ясно, что Лондон снова в руках правительства, которое бросило его в 1925 году. Атмосфера в городе все еще тяжелая, в ночи все еще слышны вспышки выстрелов, когда синдикалистская армия отступает, оставив только протестующих для борьбы с канадскими войсками."
 city_capture.251.d.ireland: "В шокирующем повороте событий сообщения из Лондона подтверждают, что город был захвачен наступающими [FROM.GetAdjective]ими войсками после яростных сражений на реке Темзе. Всего несколько десятилетий назад именно [FROM.FROM.GetAdjective]ие войска  захватывали [FROM.GetAdjective]ие города  в разгар Войны за независимость, но теперь, похоже, ситуация резко изменилась: [FROM.GetAdjective]ий флаг поднят над Лондоном.\n\nХотя войска остаются в целом дисциплинированными, несмотря на внутреннее стремление отомстить Британии, атмосфера в городе остается тяжелой. Улицы все еще периодически наполняются вспышками выстрелов на фоне того как отступают [FROM.FROM.GetAdjective]ие войска, оставляя протестующих и [FROM.GetAdjective]ую военную полицию сражаться на улицах."
 city_capture.251.a: "Это временно. Еще немного, и мы столкнем их обратно в Ла-Манш!"
 city_capture.251.b: "Это начало конца."
 city_capture.251.c: "Теперь, когда Лондон в [FROM.GetAdjective]их руках, [FROM.FROM.GetAdjective]ое поражение неизбежно."
 city_capture.251.e: "Похоже, король вернулся."
 city_capture.251.f: "Чинно над Тауэром повесили они флаг войны."

 city_capture.252.t: "Падение Парижа"
 city_capture.252.d.germany: "Приходят сообщения, что после тяжелых боев вдоль реки Сены Париж пал под натиском германской армии. Войска Коммуны сражались как львы, надеясь затормозить наступление немцев, но были в конечном итоге выдавлены из города.\n\n Парижане явно шокированы, но не удивлены — Германская Армия уже в третий раз прошла триумфальным маршем сквозь Елисейские поля к Эйфелевой Башне. Но праздник длился недолго, так как немцы натолкнулись на серьезное сопротивление парижан на узких улочках. Впрочем, сумрачные тевтонские танки окончательно поставили крест на сопротивлении."
 city_capture.252.d.other: "Приходят сообщения, что после тяжелых боев вдоль реки Сены Париж пал под натиском [FROM.GetAdjective]ой армии. [FROM.FROM.GetAdjective]ие солдаты сражались как львы, надеясь затормозить наступление [FROM.GetAdjective]их солдат, но были в конечном итоге выдавлены из города.\n\nШокированные парижане наблюдают за тем, как [FROM.GetAdjective]ая армия прошла триумфальным маршем сквозь Елисейские поля к Эйфелевой Башне. Но праздник длился недолго, так как [FROM.GetAdjective]ие войска натолкнулись на серьезное сопротивление парижан на узких улочках."
 city_capture.252.a.germany: "Немцы не победят! Франция не может пасть снова!"
 city_capture.252.a: "Нет! Мы не сдадим Париж снова!"
 city_capture.252.b: "Наша победа над страной [FROM.FROM.GetNameDef] теперь предопределена."
 city_capture.252.c.germany: "Второй Вельткриг сильно напоминает первый."
 city_capture.252.c: "Падение страны [FROM.FROM.GetNameDef] предопределено."

 city_capture.253.t: "Падение Берлина"
 city_capture.253.d.france: "Известия из Берлина подтвердили, что [FROM.FROM.GetAdjective]ая столица была захвачена войсками коммунаров после жестоких боёв на улицах величайшего города Рейхспакта. [FROM.FROM.GetAdjective]ие солдаты сражались как львы, надеясь затормозить наступление французских солдат, но были в конечном итоге выдавлены из города.\n\nОшарашенные берлинцы уже наблюдают как войска парадом прошли под центральной аркой Бранденбургских ворот, - акт, ранее ограничивавшийся только Кайзером и его семьей - что исполнить хором Интернационал пока знаменитый монумент взлетал на воздух, уничтоженный огромным количеством взрывчатки. Зверства коммунаров продолжились и после - [FROM.FROM.GetAdjective]ие солдаты и военнопленными вагонами отправились в концентрационные лагеря."
 city_capture.253.d.lkmt: "Сообщения из Берлина подтверждают, что [FROM.FROM.GetAdjective]ая столица была захвачена наступающими дивизиями Национально-Революционной Армии после долгих, беспощадных боев в столице Рейхспакта.[FROM.FROM.GetAdjective]ие войска оказывали упорное сопротивление, надеясь задержать войска НРА как можно дольше, но в итоге были отбиты.\n\nКогда шокированные берлинцы смотрели на происходящее, над сильно поврежденным Рейхстагом был поднят флаг Белого Солнца, Голубого Неба и Полностью Красной Земли - ироничная судьба для Германской Империи, ведь не так давно немецкая интервенция почти уничтожила Гоминьдан. Похоже, что Гоминьдан вернул унижение поражения."
 city_capture.253.d.other: "Известия из Берлина подтвердили, что [FROM.FROM.GetAdjective]ий город был захвачен [FROM.GetAdjective]ими войсками после жестоких боёв на улицах величайшего города Рейхспакта. [FROM.FROM.GetAdjective]ие солдаты сражались как львы, надеясь затормозить наступление [FROM.GetAdjective]их солдат, но были в конечном итоге выдавлены из города.\n\nОшарашенные берлинцы уже наблюдают как [FROM.GetAdjective]ие войска проходят парадом через Бранденбургские ворота, чтобы послушать как [FROM.GetLeader] толкает речь напротив знаменитого монумента. Стоит заметить, что самый запоминающимся моментом парада, стал [FROM.GetAdjective]ий солдат, водрузивший [FROM.GetAdjective]ий флаг на крыше полуразрушенного рейхстага. Данный снимок точно войдёт в историю."
 city_capture.253.a.france: "[FROM.FROM.GetNameDef] не падёт. Отбросим коммунаров назад!"
 city_capture.253.a.lkmt: "Как такое возможно? Этого не может быть!"
 city_capture.253.a: "Как жемчужина нашей империи могла так просто пасть?!"
 city_capture.253.b.france: "Верден, Сомма... Мы отомстили им сполна."
 city_capture.253.b.lkmt: "Северная Экспедиция была отомщена."
 city_capture.253.b: "Дни страны [FROM.FROM.GetNameDef] сочтены."
 city_capture.253.c: "Великая победа для [FROM.GetNameDef]."

 city_capture.254.t: "Падение Мадрида"
 city_capture.254.d.carlist: "Сообщения из Мадрида подтверждают, что [FROM.FROM.GetAdjective]ий город был захвачен наступающими [FROM.GetAdjective]ими войсками после долгих и беспощадных боев через холмистую местность и старый город. [FROM.FROM.GetAdjective]ие войска оказали жёсткое сопротивление, надеясь как можно дольше задержать [FROM.GetAdjective]ую армию, но в конце концов были повержены.\n\nОфициальные отчеты свидетельствуют о том, что несмотря на широкое распространение мародерства, памятники и заслуживающие внимания здания были полностью сохранены. С падением их столицы ожидается, что [FROM.FROM.GetNameDef] скоро сдастся, несмотря на призывы к оказанию безжалостного сопротивления со стороны [FROM.FROM.GetAdjective]их генералов."
 city_capture.254.d.other: "По поступающим данным из Мадрида подтвердилось, что [FROM.FROM.GetAdjective]ий город захвачен страной [FROM.GetNameDef] после тяжёлых боёв на холмистой местности старого города. Обороняющиеся пытались задержать наступление как могли, но в итоге пали под натиском.\n\nИз официальных источников стало ясно, что королевский дворец был разграблен и сожжён, а многие памятники королевского режима были взорваны. Падение такого города сулит только поражение его бывшим владельцам."
 city_capture.254.a: "Без Мадрида мы падём."
 city_capture.254.b: "Мадрид наконец-то наш!"
 city_capture.254.c: "Так пала столица [FROM.FROM.GetNameDef]."

 city_capture.255.t: "Падение Барселоны"
 city_capture.255.d: "По поступающим данным из Барселоны подтвердилось, что [FROM.FROM.GetAdjective]ий город захвачен страной [FROM.GetNameDef] после тяжёлых боёв в горах. Обороняющиеся пытались задержать наступление как могли, но в итоге пали под их натиском.\n\nНа улицах продолжаются уличные бои, особенно в старых готических районах. На главной площади уже проходит парад, а солдаты-победители уже отдыхают на пляжах Барселоны."
 city_capture.255.a: "Нехорошо..."
 city_capture.255.b: "Барселона наконец-то наша!"
 city_capture.255.c: "Звезда Каталонии пала."

 city_capture.256.t: "Падение Бургоса"
 city_capture.256.d.SPA: "Поступают сообщения, что временная столица карлистов, Бургос, была захвачена наступающими анархистами после небольших стычек в холмистой сельской местности. Войска карлистов сражались как львы за каждую улочку, надеясь затормозить наступление анархистов, но были в конечном итоге выдавлены из города.\n\n Кастильцы бежали на север, к Басконии, не желая видеть свою страну в огне и разрухе этой братоубийственной войны и даже зверства анархистов против своих собственных людей. Ходят слухи, что карлистская милиция вывела Хавьера вместе с потоком беженцев и его местонахождение неизвестно. Многие эксперты считают, что карлисты продолжат борьбу на Центрально-иберийском Плато, чтобы защитить Овьедо и Ла-Корунью."
 city_capture.256.d.SWF: "Поступают сообщения, что временная столица карлистов, Бургос, была захвачена наступающими анархистами после небольших стычек в холмистой сельской местности. Войска карлистов сражались как львы за каждую улочку, надеясь затормозить наступление анархистов, но были в конечном итоге выдавлены из города.\n\n Кастильцы бежали на север, к Басконии, не желая видеть свою страну в огне и разрухе этой братоубийственной войны и даже зверства анархистов против своих собственных людей. Ходят слухи, что карлистская милиция вывела Хавьера вместе с потоком беженцев и его местонахождение неизвестно. Многие эксперты считают, что карлисты продолжат борьбу на Центрально-иберийском Плато, чтобы защитить Овьедо и Ла-Корунью."
 city_capture.256.a: "Мы не сдадимся! За Хавьера!"
 city_capture.256.b: "Окончательное поражение для карлистов."
 city_capture.256.c: "Смогут ли карлисты оправиться от такого?"

 city_capture.257.t: "Падение Гибралтара"
 city_capture.257.d: "Известия из Гибралтара подтвердили, что крепость пала под натиском [FROM.GetAdjective]их войск после молниеносной высадки и битвы за Гибралтарский мыс. [FROM.FROM.GetAdjective]ие войска пытались задержать наступающих как могли, но пали под натиском врага.\n\nНесмотря на быструю победу на поверхности, бои в тоннелях продолжались до самого вечера пока [FROM.FROM.GetAdjective]ий гарнизон не признал окончательное поражение."
 city_capture.257.a: "Теперь у них есть выход в Средиземное море..."
 city_capture.257.b: "Врата в Средиземноморье наши!"
 city_capture.257.c: "Могучий Гибралтар пал?"

 city_capture.258.t: "Падение Лиссабона"
 city_capture.258.d: "Известия из Лиссабона подтвердили, что [FROM.FROM.GetAdjective]ий город пал под натиском [FROM.GetAdjective]их войск на узких улочках города. [FROM.FROM.GetAdjective]ие войска пытались задержать наступающих как могли, но пали под натиском [FROM.GetAdjective]их войск.\n\nЗащитники города были вынуждены взорвать все мосты, что заставило наступающих форсировать довольно широкую реку Тахо. Парад [FROM.GetAdjective]их войск состоялся на Праса-ду-Комерсиу - главной площади Лиссабона. Однако потребовалось ещё много времени чтобы утихомирить последних защитников, засевших в холмах в пригороде."
 city_capture.258.a: "Мы будем сражаться до последнего!"
 city_capture.258.b: "Лиссабон наконец-то наш!"
 city_capture.258.c: "Ясно..."
 
 city_capture.259.t: "Падение Чикаго"
 city_capture.259.d.apg: "Минитмены смогли завладеть временной столицей страны [FROM.FROM.GetNameDef]. Гарнизон массово сдаётся и дезертирует, боясь гнева Союза. Местоположение [FROM.FROM.GetLeader] неизвестно, однако считается, что [FROM.FROM.GetLeader.GetSheHe] бежал вместе со многими из горожан.\n\nЛюди в страхе шушукаются о том, что минитмены без суда и следствия расстреливают местное ополчение и видных деятелей ОСА. Многие районы полыхают, но никто не спешит их тушить. Вероятно, это конец синдикалистического эксперимента в Америке?"
 city_capture.259.d.usa: "Федеральные войска смогли завладеть временной столицей страны [FROM.FROM.GetNameDef]. Гарнизон массово сдаётся и дезертирует, боясь гнева США. Местоположение [FROM.FROM.GetLeader] неизвестно, однако считается, что [FROM.FROM.GetLeader.GetSheHe] бежал вместе со многими из горожан.\n\nВоенная полиция начала отлов агитаторов и видных синдикалистских деятелей. Многие районы полыхают, но никто не спешит их тушить. Вероятно, это конец синдикалистического эксперимента в Америке?"
 city_capture.259.d.other: "[FROM.GetAdjective]ие войска завладели временной столицей страны [FROM.FROM.GetNameDef]. Новости из Чикаго подтверждают сдачу в плен защитников города. Местоположение [FROM.FROM.GetLeader] неизвестно, однако считается, что [FROM.FROM.GetLeader.GetSheHe] бежал вместе со многими из горожан.\n\nВоенная полиция начала отлов агитаторов и видных синдикалистских деятелей. Улицы Чикаго пылают огнём - [FROM.GetAdjective]ие войска пытаются установить свой порядок в городе."
 city_capture.259.a: "Бой ещё не окончен!"
 city_capture.259.b: "Твердыня синдикализма в Америке пала!"
 city_capture.259.c: "Войска скоро закончится, не так ли?"
 
 city_capture.260.t: "Падение Батон-Руж"
 city_capture.260.d.wca: "Рабочее ополчение синдикалистов смогло завладеть временной столицей страны [FROM.FROM.GetNameDef]. Гарнизон массово сдаётся и дезертирует, боясь гнева ОСА. Местоположение [FROM.FROM.GetLeader] неизвестно, однако считается, что [FROM.FROM.GetLeader.GetSheHe] бежал вместе со многими из горожан.\n\nУжасные новости доходят до нас о том, что красное ополчение буквально линчует всех неугодных новому режиму, а сам город практически полностью выгорел. Возможно, это конец восстания реакционеров в Америке?"
 city_capture.260.d.usa: "Федеральные войска смогли завладеть временной столицей страны [FROM.FROM.GetNameDef]. Гарнизон массово сдаётся и дезертирует, боясь гнева США. Местоположение [FROM.FROM.GetLeader] неизвестно, однако считается, что [FROM.FROM.GetLeader.GetSheHe] бежал вместе со многими из горожан.\n\nВоенная полиция начала отлов минитменов и видных юнионистских деятелей. Улицы Атланты пылают огнём - федеральные войска пытаются установить свой порядок в городе. Возможно, это конец восстания реакционеров в Америке?"
 city_capture.260.d.other: "[FROM.GetAdjective]ие войска завладели временной столицей страны [FROM.FROM.GetNameDef]. Новости из Атланты подтверждают сдачу в плен защитников города. Местоположение [FROM.FROM.GetLeader] неизвестно, однако считается, что [FROM.FROM.GetLeader.GetSheHe] бежал вместе со многими из горожан.\n\nВоенная полиция начала отлов минитменов и видных юнионистских деятелей. Улицы Атланты пылают огнём - [FROM.GetAdjective]ие войска пытаются установить свой порядок в городе."
 city_capture.260.a: "Бой ещё не окончен!"
 city_capture.260.b: "Твердыня юнионистов пала!"
 city_capture.260.c: "Война скоро закончится, не так ли?"
 
 city_capture.261.t: "Падение Денвера"
 city_capture.261.d.wca: "Рабочее ополчение ведёт ожесточённые бои с федералами в Денвере - временной столице США. Новости сообщают, что королева Центральных Равнин и главная твердыня федералов, Денвер, пал после масштабного наступления войск ОСА.\n\nПотеря такого стратегически важного города не могла не ударить по морали федералов. Многие эксперты считают, что без контроля Центральных равнин остатки федеральных войск в скором времени потерпят поражение, и США заключит мир с ОСА."
 city_capture.261.d.acc: "[FROM.GetAdjective]ие ополченцы ведут ожесточённые бои с федералами о всем Скалистым Горам. Новости сообщают, что королева Центральных Равнин и главная твердыня федералов, Денвер, пал после масштабного наступления войск ТША.\n\nПотеря такого стратегически важного города не могла не ударить по морали федералов. Многие эксперты считают, что без контроля Центральных равнин остатки федеральных войск в скором времени потерпят поражение, и США заключит мир с ТША."
 city_capture.261.d.apg: "Минитмены ведут ожесточённые бои с федералами в Денвере - временной столице США. Новости сообщают, что королева Центральных Равнин и главная твердыня федералов, Денвер, пал после масштабного наступления войск Юнионистов.\n\nПотеря такого стратегически важного города не могла не ударить по морали федералов. Многие эксперты считают, что без контроля Центральных равнин остатки федеральных войск в скором времени потерпят поражение, и США заключит мир с Союзом."
 city_capture.261.d.other: "[FROM.GetAdjective]ие войска ведут ожесточённые бои с федералами о всем Скалистым Горам. Новости сообщают, что королева Центральных Равнин и главная твердыня федералов, Денвер, пал после масштабного наступления [FROM.GetAdjective]их войск.\n\nПотеря такого стратегически важного города не могла не ударить по морали федералов. Многие эксперты считают, что без контроля Центральных равнин остатки федеральных войск в скором времени потерпят поражение, и США заключит мир с [FROM.GetNameDef]."
 city_capture.261.a: "Бой ещё не окончен!"
 city_capture.261.b: "Твердыня федералистов пала!"
 city_capture.261.c: "Сколько ещё шишек США может получить на свою голову?"
 
 city_capture.262.t: "Падение Сакраменто"
 city_capture.262.d: "[FROM.GetAdjective]ие войска ведут ожесточённые бои с калифорнийские призывниками в районе Скалистых гор. Сегодня, до нас дошли известия, что после крупного наступления, Сакраменто - столица ТША пала.\n\nИ хотя стратегическая ценность города довольно мала, владение им даёт возможность [FROM.GetAdjective]им войскам контролировать Скалистые горы. Многие эксперты считают, что [FROM.FROM.GetNameDef] в скором времени заключит мир с [FROM.GetNameDef]."
 city_capture.262.a: "Бой ещё не окончен!"
 city_capture.262.b: "Твердыня сепаратистов пала!"
 city_capture.262.c: "Эта война хоть когда-нибудь закончится?"
 
 city_capture.263.t: "Падение Вашингтона"
 city_capture.263.d.wca: "Сегодня, ополченцы из ОСА захватили историческую столицу США - Вашингтон, округ Колумбия. Они встретили жестокое сопротивление, пытаясь взять штурмом здание Капитолия, но в итоге ОСА заняли эту символическую позицию, как бы захватив самое сердце Америки.\n\nДоходят слухи, что ополченцы и военная полиции уже ходит по домам и устраивает чистки недовольных. Местонахождение важных политических деятелей неизвестно, но можно предположить, что их предварительно эвакуировали."
 city_capture.263.d.apg: "Сегодня, минитмены Американского Союза захватили историческую столицу США - Вашингтон, округ Колумбия. Они встретили жестокое сопротивление, пытаясь взять штурмом здание Капитолия, но в итоге юнионисты заняли эту символическую позицию, как бы захватив самое сердце Америки.\n\nДоходят слухи, что минитмены и военная полиция уже ходит по домам и устраивает чистки недовольных, проверяя 'их лояльность новому режиму'. Местонахождение важных политических деятелей неизвестно, но можно предположить, что их предварительно эвакуировали."
 city_capture.263.d.acc_nee: "[FROM.GetAdjective]ие войска захватили историческую столицу США - Вашингтон, округ Колумбия. Они встретили жестокое сопротивление, пытаясь взять штурмом здание Капитолия, но в итоге калифорнийцы заняли эту символическую позицию, как бы захватив самое сердце Америки.\n\nПосле захвата города, дела пошли довольно мирно - [FROM.GetAdjective]ие представители встретились с местными властями. По не подтверждённым данным, важные политические деятели прежнего режима были эвакуированы заранее."
 city_capture.263.d.can: "[FROM.GetAdjective]ие войска захватили историческую столицу США - Вашингтон, округ Колумбия. Они встретили жестокое сопротивление, пытаясь взять штурмом здание Капитолия, но в итоге канадцы заняли эту символическую позицию, как бы захватив самое сердце Америки.\n\nВ отличие от 1812, не было массовых поджогов, но [FROM.FROM.GetAdjective]ие политики были арестованы, в 'целях предосторожности', как заявили канадские оккупационные войска. По не подтверждённым данным, части важных политических деятелей прежнего режима удалось эвакуироваться заранее и избежать ареста."
 city_capture.263.d.feds: "[FROM.GetAdjective]ие войска продвинулась к символической столице Соединенных Штатов, Вашингтону, и захватила ее. Они ворвались в здание Капитолия и встретили сильное сопротивление, но в конце концов прорвались, и флаг [FROM.GetNameDef] снова развевается над Капитолием США.\n\nПо слухам, ополченцы федералистов собирали всех политических представителей, которых могли найти в городе, чтобы 'отдать их под суд', хотя неподтвержденные источники утверждают, что большинство важных правительственных деятелей были эвакуированы во время битвы, и их нынешнее местонахождение неизвестно." 
 city_capture.263.d.other: "[FROM.GetAdjective]ие войска захватили историческую столицу США - Вашингтон, округ Колумбия. Они встретили жестокое сопротивление, пытаясь взять штурмом здание Капитолия, но в конечном итоге заняли эту символическую позицию, как бы захватив самое сердце Америки.\n\nПосле этого последовали массовые аресты политиков, а местами даже и их расстрел. По не подтверждённым данным, части важных политических деятелей прежнего режима удалось эвакуироваться заранее и избежать ареста."
 
