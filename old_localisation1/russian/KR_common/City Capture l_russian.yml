 city_capture.264.t: "Падение Сингапура" #Siam
 city_capture.264.d.japan: "Сингапур или 'Гибралтар Востока' был захвачен войсками Японии, хотя британцами и их немецкими преемниками считалось, что город неприступен.\n\n [JAP.GetAdjective]ая Военная Администрация Сингапура выбрала здание Фуллертер в качестве военного штаба, а город был переименован в Шоонанто, что можено примерно перевести как 'Южный остров, взятый в эпоху Шова'. Можно увидеть отряды Кемпентай, патрулирующих улицу, тем самым заявляя, что они здесь надолго."
 city_capture.264.d.siam: "Сингапур или 'Гибралтар Востока' был захвачен Королевскими [SIA.GetAdjective]ими войсками, хотя британцами и их немецкими преемниками считалось, что город неприступен.\n\n [SIA.GetAdjective]ая Военная Администрация Сингапура выбрала здание Фуллертер в качестве военного штаба, а город был переименован в Синганахон, что можено примерно перевести как 'Город Лев'. Можно увидеть Сарават Тахарн, патрулирующих улицу, тем самым заявляя, что они здесь надолго."
 city_capture.264.d.other: "Сингапур или 'Гибралтар Востока' был захвачен, хотя британцами и их немецкими преемниками считалось, что город неприступен.\n\nВоенная Администрация Сингапура выбрала здание Фуллертер в качестве военного штаба. Можно увидеть отряды военной полиции, патрулирующих улицу, тем самым заявляя, что они здесь надолго."
 city_capture.264.a.japan: "Во имя императора!"
 city_capture.264.a.siam: "Это - исконная земля Сиама!"
 city_capture.264.a.other: "Львиный город теперь наш!"
 city_capture.264.b.germany: "Они пожалеют об этом мелком колониальном воровстве, когда прибудет Кайзерлихмарин!"
 city_capture.264.b.other: "Сингапур пал? Как такое возможно!?"
 city_capture.264.c: "Сингапур должен быть британским."
 city_capture.264.a: "Серьезный удар по германскому влиянию в регионе."
 
 city_capture.265.t: "Падение Нью-Йорка"
 city_capture.265.d.wca: "[FROM.GetAdjective]ие ополченцы ведут разрозненные стычки с Красной гвардией внизу по реке Гудзон. Сегодня утром палисады, как природные, так и рукотворные, вышли из рук Синдиката. Вскоре после этого, остров Манхэттен был вынужден капитулировать, а не рисковать массовыми человеческими жертвами, которые принесет война в городах. Синдикаты приказали остальным красногвардейцам перевезти золото из здания Федерального резерва в безопасное место, оставив после себя многих финансовых работников, заключенных в тюрьму на острове Вспомоществования.\n\nВесь Нью-Йорк теперь находится под [FROM.GetNameDef] контролем, и в настоящее время предпринимаются массовые усилия по оказанию помощи, чтобы оценить весь масштаб ущерба, который Синдикаты причинили городу."
 city_capture.265.d.other: "Силы [FROM.GetAdjective]их войск, уже некоторое время оттесняют вниз по реке Гудзон. Сегодня их усилия подошли к концу, когда они, наконец напали на Нью-Йорк, после того как успешно окружили оставшихся защитников. К большому огорчению завоевателей, здание Федерального Резерва было основательно разграблено и перенесено в безопасное место. Политические заключенные были оставлены в своих тюремных камерах на острове Вспомоществования.\n\nПадение Нью-Йорка, нанесло серьезный удар по нашему делу, символам американской власти и тысячам сторонников, присутствовавших на наших митингах. По мере того, как боевые действия затихают в гавани Нью-Йорка, кажется практически бесспорным, что [FROM.GetNameDef] имеют несомненное преимущество."
 city_capture.265.a: "Нью-Йорк наш!"
 city_capture.265.b: "Леди Свобода вновь сияет!"
 city_capture.265.c: "Это неудача Революции!"
 city_capture.265.d: "Нью-Йорк не должен оставаться в руках врага!"
 city_capture.265.e: "Синдикаты теряют главный символ."
 city_capture.265.f: "И к победителям идет Статуя Свободы."
 
 city_capture.266.t: "Падение Гонконга" #Siam
 city_capture.266.d.asia: "[FROM.GetAdjective]ие войска захватили старую колонию Британской Империи — Гонконг. Сразу за прорывом сквозь Джиндринкерс Лайн следовала высадка на острове. Ситуация довольно скоро стала невозможной для защитников, и Губернатор сдался в отеле Пенинсула Гонконг, где установили военный штаб.\n\n После быстрой формальной церемонии был установлен новый губернатор, который представил 'Новый Гонконг, свободный от западного колониализма.'"
 city_capture.266.d.legat: "[FROM.GetAdjective]ие войска захватили старую колонию Британской Империи — Гонконг. Сразу за прорывом сквозь Джиндринкерс Лайн следовала высадка на острове. Ситуация довольно скоро стала невозможной для защитников, и Губернатор сдался в отеле Пенинсула Гонконг, где установили военный штаб.\n\n После быстрой формальной церемонии был установлен новый губернатор, который представил 'Старый Гонконг, зависимый от западного влияния.'"
 city_capture.266.d.other: "[FROM.GetAdjective]ие войска захватили старую колонию Британской Империи — Гонконг. Сразу за прорывом сквозь Джиндринкерс Лайн следовала высадка на острове. Ситуация довольно скоро стала невозможной для защитников, и Губернатор сдался в отеле Пенинсула Гонконг, где установили военный штаб.\n\n После быстрой формальной церемонии был установлен новый губернатор, который заявил о полном контроле над 'Жемчужиной Востока'."
 city_capture.266.a: "Захват Гонконга точно изменит ситуацию в [FROM.FROM.GetNameDef]."
 city_capture.266.b.asia: "Гонконг будет процветать и без Запада!"
 city_capture.266.b.legat: "Гонконг снова наш"
 city_capture.266.b.other: "Жемчужина Востока в наших руках"
 city_capture.266.c: "[FROM.FROM.GetNameDef] не оставят это просто так."
 city_capture.266.e: "Еще один удар по Британии."
 
 city_capture.267.t: "Падение Манилы"
 city_capture.267.d: "Столица Филиппин, Манила, пала под натиском [FROM.GetAdjective]их войск, выдавивших войска Филиппин и их союзников из города. Владение над входом в стратегически важную Манильскую бухту переходило из рук в руки после падения города из-за высокой концентрации Филиппинской береговой артиллерии на острове Коррегидор, но орудия в итоге затихли.\n\n Потеря столицы нанесла значительный урон престижу и боеспособности Филиппин, в скором времени ожидается капитуляция правительства. Серьезная потеря для [FROM.FROM.GetFactionName] в Азии и Океании."
 city_capture.267.a: "Падение Манилы обеспечивает захват [FROM.GetNameDef] в Ост-Индии."
 city_capture.267.b.japan: "Мы нанесли очередной удар западному империализму!"
 city_capture.267.b.china: "Будет восстановлен традиционный порядок в Азии."
 city_capture.267.b.other: "Скоро и остальные Филиппины будут наши."
 city_capture.267.c: "Отступить в джунгли! Мы не сдадимся!"

 city_capture.268.t: "Падение Хайдарабада"
 city_capture.268.d: "Наши источники подтвердили, что Хайдарабад, столица одно из самых богатых княжеств Южной Индии, пал под натиском [FROM.GetAdjective]их войск. Тяжёлые бои полностью уничтожили пригородный город Секундерабад, а в самой столице повисла тишина, прерываемая только редкими выстрелами, сопровождающими отступление [FROM.FROM.GetAdjective]ого гарнизона. Низам призвал обе стороны пощадить различные исторические монументы и культурные достопримечательности.\n\nДоходят слухи, что [FROM.GetAdjective]ие войска приступили к патрулированию города, но это не остановило местное мусульманское и индуистское население от взаимных стычек. Время покажет, смогут ли захватчики удержать город."
 city_capture.268.a: "Это ещё не конец."
 city_capture.268.b: "Жемчужный город наш!"
 city_capture.268.c: "Жемчужный город пал."

 city_capture.269.t: "Падение Лахора"
 city_capture.269.d: "Одна из величайших жемчужин могольской архитектуры и последний центр власти Британии в Индии, город Лахор пал под натиском [FROM.GetAdjective]ой военной машины, несмотря на все попытки [FROM.FROM.GetAdjective]ого гарнизона дать отчаянный отпор.\n\n[FROM.GetAdjective]ий флаг висит над вратами Аламгери, знаменуя собой восход солнца. Остатки [FROM.FROM.GetAdjective]их войск были вынуждены сдаться, не в силах больше выдержать продолжающуюся осаду.\n\nИ снова, город садов поменял своего владельца."
 city_capture.269.a: "Сейчас подойдут подкрепления и мы им покажем!"
 city_capture.269.b: "Сады моголов теперь наши!"
 city_capture.269.c: "Так пал последний осколок Британского Раджа"
 
 city_capture.270.t: "Падение Бангкока"
 city_capture.270.d.can: "Сегодня [FROM.GetAdjective]ие солдаты маршируют по улицам Бангкока после ожесточенных боев в течение дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским огнём, а Юнион Джек теперь поднят над тем, что осталось от старого тронного зала Ананда Самакхом, который использовался [FROM.FROM.GetAdjective]им правительство в качестве парламента.\n\n[FROM.FROM.GetAdjective]ое правительство собралось для обсуждения [FROM.GetAdjective]их требований, чтобы многие из членов движения Свободный Таиланд теперь занимали свои предварительные временные правительственные позиции, поскольку большинство старых членов кабинета министров теперь считаются мертвыми. Однако за пределами города борьба продолжается, хотя неизвестно, как долго она будет продолжаться."
 city_capture.270.d.jap: "После того как в Бангкоке закончилась бойня, флаг Японии уже возвышается из каждого здания Бангкока, теперь переименованного в Банкоку, и [FROM.GetAdjective]ие чиновники уже установили новое временное правительство, чтобы справиться с завоёванными землями.\n\nУже, несогласные были собраны и изгнаны посреди ночи, и [FROM.FROM.GetAdjective]ие армейские подразделения, которые сдались, начали марш в новые лагеря, построенные для них в сельской местности. Несколько местных [FROM.FROM.GetAdjective]их лидеров совершили харакири, чтобы искупить их неудачу и из-за возможности сопротивления, сплотившегося вокруг них. Большой дворец в Бангкоке уже начал ремонт, чтобы стать одним из новых сезонных резиденций Императора, хотя ещё борьба продолжается в округе."
 city_capture.270.d.gea: "Сегодня победоносные немецкие солдаты маршируют по улицам Бангкока после ожесточенных боев в течение большей части дня. Большинство зданий вдоль Ратчадамноен были разрушены артиллерийским огнём от военных кораблей Германской Остазии, бросивших якорь у Большого дворца, а над тронным залом Ананда Самакхом, который использовался [FROM.FROM.GetAdjective]им правительством в качестве своего парламента, теперь поднят флаг Рейхскригсфлага.\n\nПо слухам, многие прогерманские элементы в сиамском правительстве встречаются с [FROM.GetLeader]им адмиралом, обсуждая послевоенную позицию при новом немецком порядке, так как оставшиеся [FROM.FROM.GetAdjective]ие войска отступают в сторону сельской местности."
 city_capture.270.d.inc: "Сегодня [FROM.GetAdjective]ие солдаты маршируют по улицам Бангкока после ожесточенных боев в течение дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским огнём, и [FROM.GetAdjective]ий флаг теперь поднят над тем, что осталось от старого тронного зала Ананда Самакхом, который использовался [FROM.FROM.GetAdjective]им правительством в качестве парламента.\n\n[FROM.FROM.GetAdjective]ое правительство собралось для обсуждения [FROM.GetAdjective]их требований. Теперь, последние [FROM.FROM.GetAdjective]ие солдаты, были выбиты из города, похоже, что дальнейшее сопротивление в округе скоро закончится."
 city_capture.270.d.bur: "Сегодня [FROM.GetAdjective]ие солдаты маршируют по улицам Бангкока после ожесточенных боев в течение дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским огнём, и [FROM.GetAdjective]ий флаг теперь поднят над тем, что осталось от старого тронного зала Ананда Самакхом, который использовался [FROM.FROM.GetAdjective]им правительством в качестве парламента.\n\n[FROM.FROM.GetAdjective]ое правительство собралось для обсуждения [FROM.GetAdjective]их требований. Теперь, последние [FROM.FROM.GetAdjective]ие солдаты, были выбиты из города, похоже, что дальнейшее сопротивление в округе скоро закончится."
 city_capture.270.d.other: "Сегодня [FROM.GetAdjective]ие солдаты маршируют по улицам Бангкока после ожесточенных боев в течение дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским огнём, и [FROM.GetAdjective]ий флаг теперь поднят над тем, что осталось от старого тронного зала Ананда Самакхом, который использовался [FROM.FROM.GetAdjective]им правительством в качестве парламента.\n\n[FROM.FROM.GetAdjective]ое правительство собралось для обсуждения [FROM.GetAdjective]их требований. Теперь, последние [FROM.FROM.GetAdjective]ие солдаты, были выбиты из города, похоже, что дальнейшее сопротивление в округе скоро закончится."
 city_capture.270.a: "Мы будем бороться до последней капли крови!"
 city_capture.270.b: "Наконец, Бангкок наш!"
 city_capture.270.c: "Я вижу..."
 
 city_capture.271.t: "Падение Москвы"
 city_capture.271.d: "В последний раз, когда Москва была захвачена иностранной державой, огромный пожар уничтожил большую часть города. Не так как сегодня, когда [FROM.GetAdjective]ие силы прорвали осадные линии в нескольких местах и сблизились в Кремле. [FROM.FROM.GetAdjective]ие солдаты продолжают бежать от врагов, но главная оборона прорвана и отходит от пригородов в леса.\n\nКрасная площадь, главный центр жизни в городе, превратилась в импровизированный лагерь для военнопленных, и из кремлевских окон было видно, как сжигают мусор, без сомнения, последнее усилие для предотвращения [FROM.FROM.GetAdjective]ой интеллигенции от попадания в [FROM.GetAdjective]ие руки. Это темный день для страны [FROM.FROM.GetNameDef]."
 city_capture.271.a: "Мы будем сражаться до конца"
 city_capture.271.b: "Сердце страны [FROM.FROM.GetNameDef] теперь наше!"
 city_capture.271.c: "Ситуация в стране [FROM.FROM.GetNameDef] кажется ужасной, действительно"
 
 city_capture.272.t: "Падение Петрограда"
 city_capture.272.d: "Великий [FROM.FROM.GetAdjective]ий город, построенный Петром Великим, был захвачен сегодня. [FROM.FROM.GetAdjective]ие защитники сначала сдерживали [FROM.GetAdjective]ую армию на реке Нева, но несколько дней назад эти позиции, наконец, прорваны. Теперь постоянный пушечный огонь на Васильевском острове оставил последних защитников в нищете. Некоторые военные тактики говорят, что с надлежащей защитой город мог держаться годами, но [FROM.GetAdjective]ий рывок продвинул их городу намного быстрее, чем ожидалось.\n\n[FROM.GetAdjective]ие солдаты используют Дворцовую площадь в качестве площадки для перемещения по всей остальной части города, и ходят слухи о том, что [FROM.GetAdjective]ие солдаты, совершающие праздничные туры по великому Музею артиллерии, уверенные, что они поместятся в военную историю страны [FROM.FROM.GetNameDef]."
 city_capture.272.a: "Ужасно!"
 city_capture.272.b: "Этот удар по морали [FROM.FROM.GetAdjective]их солдат будет серьезным"
 city_capture.272.c: "Славная жемчужина севера пала."
 
 city_capture.273.t: "Падение Киева"
 city_capture.273.d: "Плохие новости для страны [FROM.FROM.GetNameDef] - сегодня, [FROM.GetAdjective]ая армия только что напала на древнюю столицу. Хотя в первоначальных докладах [FROM.FROM.GetAdjective]ие защитники могли бы удерживать их на мостах в затяжной осаде, но мостов оказалось слишком много. [FROM.GetAdjective]ие войска по обе стороны реки заставили разбросанных защитников сдаться, Киев пал.\n\nС процветающим центром в [FROM.GetAdjective]их руках, остальная часть [FROM.FROM.GetAdjective]их земель находятся под угрозой. В то время как представитель государства [FROM.GetNameDef] пообещали уважать 700-летнюю историю, сложившуюся после того, как монголы уничтожили его в 1204 году. Оккупанты никогда не были добры к местным жителям, поэтому жители ожидают худшего."
 city_capture.273.a: "Это не закончится здесь"
 city_capture.273.b: "Наконец Киев наш!"
 city_capture.273.c: "Ситуация в [FROM.FROM.GetAdjective]их рядах кажется ужасной"
 
 city_capture.274.t: "Падение Рио-де-Жанейро"
 city_capture.274.d: "Бои в Рио-де-Жанейро, похоже, уже прекратились, после нескольких дней ужасной атаки [FROM.GetAdjective]их сил. Несмотря на защищенную позицию города, [FROM.FROM.GetAdjective]ий гарнизон не смог предотвратить, чтобы Дворец Катете и большая часть самого города попали в [FROM.GetAdjective]ие руки. Во время борьбы задержавшейся на холмах, регулярная [FROM.FROM.GetAdjective]ая армия была выбита из города.\n\nБольшая часть Рио была повреждена в ходе боевых действий, [FROM.GetAdjective]ие снаряды, разрушающие купол церкви Канделария, и тоннель Гранде, разрушенный отчаянными [FROM.FROM.GetAdjective]ими солдатами, чтобы остановить вражеское продвижение. [FROM.GetAdjective]ие солдаты патрулируют почти каждую улицу, а колонны едут центре города, ясно, что [FROM.GetNameDef] совершила большой шаг к победе в войне против [FROM.FROM.GetNameDef]."
 city_capture.274.a: "Нет! Как это могло произойти?!"
 city_capture.274.b: "Наши командиры хорошо справились"
 city_capture.274.c: "Ситуация в [FROM.FROM.GetAdjective]их рядах кажется ужасной"
 city_capture.274.par: "Месть неизбежна! Вперед!"
 
 city_capture.275.t: "Падение Гаваны"
 city_capture.275.d: "[FROM.FROM.GetAdjective]ие солдаты и боевики были выбиты из Гаваны в деревни или в старые испанские форты в городе, где после долгих беспощадных бомбардировок они, наконец, сдались [FROM.GetAdjective]ой армии. С возвышением [FROM.GetAdjective]ого флага над замком Эль Морро, обычно изображаемый во многих открытках, вход в гавань Гаваны был взят захватчиками. [FROM.FROM.GetAdjective]ая армия, в то время как гарнизон города не так многочислен или хорошо экипирован, как их враг, сумел навязать жестокую борьбу армии [FROM.GetNameDef] за город так долго, как только могли. В конце концов, их доблестное сопротивление было лишь мимолетным, так как Гавана сейчас находится в руках иностранной державы."
 city_capture.275.a: "Скажите людям, чтобы они боролись за свою свободу..."
 city_capture.275.b: "Кажется, американцы снова повторяют историю."
 city_capture.275.c: "Их неповиновение никогда не поможет им."
 city_capture.275.e: "Кажется, что Куба выбрала неправильную сторону..."
 city_capture.275.f: "Вскоре остров будет наш."
 
 city_capture.276.t: "Падение Рима"
 city_capture.276.d: "[FROM.GetAdjective]ие генералы подтвердили падения Вечного города - Рима. [FROM.GetAdjective]ая армия встретила жестокое сопротивление, однако некоторые болотистые участки всё ещё под [FROM.FROM.GetAdjective]им контролем, важнейшие дороги, а также Ватикан пали. [FROM.FROM.GetAdjective]ие солдаты были отброшены к окраинам столицы некогда могущественной Римской империи.\n\nНовые власти [FROM.GetNameDef] тут же объявили о неприкосновенности памятников. Для обеспечения безопасности этих самых сооружений выделились отряды военной полиции. Обсуждается независимость Папства под [FROM.GetAdjective]ой оккупацией."
 city_capture.276.a: "Как мы такое допустили?!"
 city_capture.276.b: "Рим...наш!!!"
 city_capture.276.c: "Как страна [FROM.FROM.GetNameDef] ответит?"
 
 city_capture.277.t: "Падение Вены"
 city_capture.277.d: "Вена не сдавалась захватчикам уже на протяжении более чем пятисот лет, до данного момента... [FROM.GetAdjective]ая армия вытеснила остатки [FROM.FROM.GetAdjective]их солдат на берег Дуная. По слухам [FROM.FROM.GetAdjective]ая императорская семья уже давно покинула город. Сейчас город полностью захвачен оккупантами. Вопрос... будет ли культурная столица Европа разрушена?\n\n Политики государства [FROM.GetNameDef] планируют провести блистательный военный парад на Рингштрассе. Вскоре новый [FROM.GetAdjective]ий глава города выступил с речью к жителям с балкона здания Нойе Бург."
 city_capture.277.a: "Невозможно!!!"
 city_capture.277.b: "Наконец-то Вена пала!!"
 city_capture.277.c: "Их крах близок..."
 
 city_capture.278.t: "Падение Пекина"
 city_capture.278.d: "Победив в затяжных пригородных боях, [FROM.GetAdjective]ая армия наконец достигла стен Внешнего города, вынуждая защитников отступить из Пекина. Линии снабжения перерезаны, вследствие чего [FROM.FROM.GetAdjective]ие дезертиры вливаются в ряды гражданских.\n\n Над Вратами Небесного Спокойствия развиваются [FROM.GetAdjective]ие флаги. К сожалению, из-за интенсивных схваток между враждующими сторонами загорелись Ворота Цяньмэнь, очерняя небо огромным чёрным облаком пожарищ... Хочется верить, что очередные захватчики не проявят себя так же, как и всепоглощающий огонь..."
 city_capture.278.a: "Прискорбно..."
 city_capture.278.b: "Запретный город в наших руках!"
 city_capture.278.c: "В Пекине было много оккупантов, это всего лишь очередной"
 city_capture.278.d.japan: "В ходе молниеносного наступления, японские войска вчера утром преодолели внешнюю оборону Пекина, а сегодня прорвали его стены. Железнодорожные пути в город и из города были перерезаны, оставшиеся [FROM.FROM.GetAdjective]ие силы быстро поредели, а дезертировавшие солдаты растворились в городском населении.\n\nВ то время как восходящее солнце теперь проплывает над воротами Тяньнаньмэнь, пламя на Чжэнъянмэнь поднимает в небо столбы густого черного дыма, печальный символизм которого мало кому понятен. Древняя столица теперь потеряна, нация затаила дыхание. Возможно, это лишь вопрос времени, когда японцы, подобно грозовой буре, пронесутся по северной равнине, а оттуда - по всему остальному Китаю."
 city_capture.278.a.japan: "Защитники Пекина будут отомщены!"
 city_capture.278.b.japan: "Еще один шаг к поражению западного империализма!"
 city_capture.278.c.japan: "Похоже, [FROM.FROM.GetAdjective]ий конец близок."
 city_capture.278.d.fng: "После нескольких дней интенсивных боев в пригородах столицы, [FROM.GetAdjective]ие войска наконец-то преодолели стены Внешнего города, рассеяв защитников и сделав дальнейшую оборону столицы практически несостоятельной. Чжан Цзолинь прибыл к воротам Запретного города без лишней помпы, но его триумф должен быть отмечен одной отрезвляющей мыслью: он уже не в первый раз берет Пекин. Несмотря на все его усилия, впереди его ждет долгий путь.\n\nПока над воротами Тяньнаньмэнь развевается Пятицветный флаг, а город по-прежнему окутан дымом, Чжан уже начал готовить свою 'Конференцию национального воссоединения'. Сможет ли он объединить эту расколотую нацию и добиться успеха там, где многие другие потерпели неудачу?"
 city_capture.278.a.fng: "В свое время мы вернем Пекин!"
 city_capture.278.b.fng: "Мы не потеряем Пекин во второй раз."
 city_capture.278.c.fng: "Неужели Китай можно объединить только мечом?"
 city_capture.278.d.lep: "После нескольких дней интенсивных боев в пригородах столицы, [FROM.GetAdjective]ие войска наконец-то преодолели стены Внешнего города, рассеяв защитников и сделав дальнейшую оборону столицы практически невозможной. Появление Ци Сеюаня у ворот Запретного города стало еще одним шагом в его стремительном восхождении от провинциального военачальника к одной из самых выдающихся фигур Китая. Это также знаменует возможную смену власти: впервые со времен правления династии Мин юг утвердился над севером.\n\nГде бы Ци ни выбрал место для своего нового правительства, немцы, несомненно, будут наблюдать за ним с кнутом и пряником в руках."
 city_capture.278.a.lep: "Быстрее взлета Ци будет только его падение!"
 city_capture.278.b.lep: "Однажды они не посмеют жаловаться."
 city_capture.278.c.lep: "Править будет не Ци, а [GER.GetLeader]."
 
 city_capture.279.t: "Падение Шанхая"
 city_capture.279.d.interchina: "В рамках непрерывного конфликта, который сотрясает Китай последние несколько десятилетий, город Шанхай снова перешел из рук в руки. Завоеванный ранее армиями [FROM.FROM.GetLeader] и управляемый [FROM.FROM.GetNameDef], город надеялся, что последняя бойня осталась позади. К сожалению, конфликт охватил город снова, когда [FROM.GetAdjective]ие войска ворвались в город, подавляя местных защитников и подняв свой флаг на вершине Бунда.\n\n[FROM.GetAdjective]ие солдаты уже начали процесс разграбления территорий за пределами старого Международного поселения, в то время как большинство иностранцев пока остались невредимыми, но не без опасений, что они могут быть следующими."
 city_capture.279.d.china: "Несмотря на происходивший в Китае хаос, Шанхай оставался относительно стабильным, однако благодаря [FROM.GetAdjective]ие войскам, статус-кво нарушен, а вслед за ним и спущены флаги. Несмотря на, казалось бы, всесильную международную поддержку, полиция и наспех сформированное ополчение не может служить преградой для сколько-нибудь состоятельной армии. Моментально началась партизанская война, однако разрозненные, дезорганизованные налёты не несут в себе смысла.\n\nЭкономическое благополучие и процветание города, в первую очередь основанное на торговле и иностранных инвестициях, кануло в лету."
 city_capture.279.d.other: "Несмотря на международную поддержку, [FROM.GetAdjective]ие войска захватили Шанхай, легко сломив наспех сформированные части полиции и ополчения. Ещё вчера подобная агрессия была бы незамедлительно осуждена и наказана, однако сегодня обострившиеся мировые противоречия лишили защиты народ [FROM.FROM.GetNameDef].\n\nУже поступила информация о начале грабежей населения. Очевидно, дни безмятежности и процветания Шанхая закончились."
 city_capture.279.a: "С чего это вдруг?"
 city_capture.279.b: "Наконец Шанхай наш!"
 city_capture.279.c: "Этот китайский ад вообще закончится??"
 
 city_capture.280.t: "Падение Варшавы"
 city_capture.280.d: ""Париж Востока" в период Ренессанса, Варшава последнее время переживает не самые лучшие дни. После Вельткрига была надежда на возрождение польской нации, но всё обернулось прахом после того, как [FROM.FROM.GetAdjective]ая армия не смогла защитить свою столицу от [FROM.GetAdjective]их войск.\n\nКак в стародавние времена, королевский замок был разграблен [FROM.FROM.GetAdjective]ими солдатами до того, как город перешёл под власть [FROM.GetNameDef]. [FROM.FROM.GetNameDef] яростно это отрицают, приписывая мародёрство [FROM.GetAdjective]ие войскам. Так или иначе, с потерей столицы, будущее [FROM.FROM.GetNameDef] безрадостно."
 city_capture.280.a: "Только не Варшаву!"
 city_capture.280.b: "Наконец-то Варшава наша!"
 city_capture.280.c: "Ясно..."
 
 city_capture.281.t: "Падение Сиднея"
 city_capture.281.d.siam: "Продвигаясь всё дальше на юг, [FROM.GetAdjective]ие войска заняли Сидней. Местные защитники были вынуждены отступить за Сиднейский мост, предварительно подорвав его, но все попытки диверсии пресеклись [FROM.GetAdjective]ими войсками.\n\n[FROM.GetAdjective]ий флаг висит над городской ратушей Сиднея, которая стала штабом оккупационной администрации. Военная полиция жестоко подавляет любые попытки неповиновения."
 city_capture.281.d.other: "После захвата [FROM.GetAdjective]ой армией Голубых гор, падении города было лишь вопросом времени. После серии атак, [FROM.FROM.GetAdjective]ие силы были отброшены к докам, но после потери Сиднейского моста (Который не взорвали лишь из-за того, что он слишком дорог жителям), их командование попросило о перемирии.\n\nПервоначально, город английских каторжников, Сидней снова стал похож на тюрьму - военная полиция подавляет малейшие очаги неподчинения. Военные эксперты предсказывают падение [FROM.FROM.GetNameDef], так как потеря такого важного города - критическое поражение."
 city_capture.281.a: "Скоро мы вернёмся в Сидней"
 city_capture.281.b: "Наконец-то Сидней наш!"
 city_capture.281.c: "Скверное положение для [FROM.FROM.GetAdjective]ого правительства"
 
 city_capture.282.t: "Падение Мехико"
 city_capture.282.d: "Мехико, старейшая столица североамериканского континента и 5-ый по численности населения город, пал под натиском [FROM.GetAdjective]их войск. Они окружил город со всех сторон и начали штурмовать с запада, отрезав [FROM.FROM.GetAdjective]ий гарнизон от всех важных транспортных артерий и заперев на восточных холмах. Сегодня, после очередного [FROM.GetAdjective]ого наступления, оккупационные войска начали обсуждение сдачи города с мэром Мехико.\n\nСлухи доносят, что [FROM.GetAdjective]их солдаты мародёрствуют в старинных руинах ацтеков, пытаясь прихватить себе сувенир."
 city_capture.282.a: "Это нас не остановит"
 city_capture.282.b: "Сердце Мексики теперь наше!"
 city_capture.282.c: "Хм, ясно..."
 
 city_capture.283.t: "Падение Алжира"
 city_capture.283.d: "Доходят известия из Алжира, столицы Франции-в-изгнании с 1919 года. Город пал под натиском [FROM.GetAdjective]их войск. Медленно продвигаясь по старинным улочкам, войска [FROM.GetNameDef] встретили ожесточённое сопротивление местных защитников. Особо жестоко стычки проходили в европейском квартале Баб эль-Уэд и в районе знаменитой базилики Нотр Дам де Африк. Последние очаги сопротивления заняли старинную крепость Касбу, но всё равно были выбиты оттуда подавляющим огнём противника. Солнце восходит над заливом, освещая своими лучами каски новых владельцев города..."
 city_capture.283.a.commune: "Мы не дадим коммунарам уничтожить последний бастион Истинной Франции!"
 city_capture.283.a: "Это конец нашей мечте о возвращении?"
 city_capture.283.b: "Алжирский режим больше не причинит никому хлопот"
 city_capture.283.c.commune: "Похоже, революция Коммунаров наконец-то закончилась"
 city_capture.283.c: "[FROM.FROM.GetNameDef] медленно умирает"
 
 city_capture.284.t: "Падение Детройта"
 city_capture.284.d.wca: "Вчера вечером [FROM.GetAdjective]ие войска сделали свой ход, чтобы обезопасить Даунтаун Детройт, пересекающий реку в Джефферсонском коридоре на фоне мощного сопротивления Красной гвардии. К ночи, солдаты [FROM.GetNameDef] вели переговоры о сдаче в плен военнослужащих, спрятавшихся в Норт-Энде. Ист-Энд сдался, и лояльные солдаты синдиката были обнаружены, отступающими через Вест-Сайд. Ополченцы Синдиката оставили позади оболочку здания Фишер Билдинг, Дирборн, и великие труды Альберта Кана.\n\nНаблюдателям становится очевидно, что Детройт теперь принадлежит к территории [FROM.GetNameDef], однако не раньше, чем Красная гвардия уничтожила Мемориальное здание Эдселя Форда и оставила за собой массивное сооружение на Виадуке, подписанное известным художником Диего Ривера."
 city_capture.284.d.other: "[FROM.GetAdjective]ие войска устроили дерзкую гонку через Вест-Сайд Детройта, поймав своего врага врасплох. Сегодня их усилия принесли свои плоды, когда защитник Детройта отступил в Мидтаун. Для многих нападавших, последствия Дирборна ускорили темп продвижения к реке Детройт, обеспечив безопасность города.\n\nПадение Детройта было хорошо воспринято [FROM.GetNameDef], который в настоящее время располагает как стратегической, так и символической мощью американской тяжелой промышленности."
 city_capture.284.a: "Дорога в Мичиган теперь широко открыта."
 city_capture.284.b: "Мы должны восстановить Детройт, быстро!"
 city_capture.284.c: "Удар по Синдикатам, конечно."
 city_capture.284.d: "Эта война когда-нибудь закончится?"
 
 city_capture.285.t: "Падение Бостона"
 city_capture.285.d.nee: "Жители Бостона, вместе с Национальной гвардией Новой Англии произвели впечатление на [FROM.GetAdjective]ие войска. Вторгшиеся силы вошли в Третий тоннель под мощным противодействием, окружая Бостон через реку Чарльз. Национальная гвардия Новой Англии была вынуждена эвакуироваться через Кембридж, полностью утратив равнины Ямайки противника.\n\nИсторическое и символическое значение этой победы не было потеряно на [FROM.GetNameDef], которые приступили к использованию оставшихся символов американской независимости в городе, включая Олд-Норт-Черч, теперь украшенную уличными битвами по всему периметру."
 city_capture.285.d.other: "Осторожного применения силы, было достаточно для [FROM.GetAdjective]их сил, чтобы вытеснить защитников из Внутреннего пояса Бостона. После яростной схватки в порту, защитники города были вынуждены отступить через реку Чарльз по направлению к Эверетту, оказавшись в ошеломляющем разгроме. И солдаты, и мирные жители в замешательстве.\n\nИнтервью [FROM.GetAdjective]их мужчин на месте событий сообщают не только об экстазе от победы, но и о большой необходимости найти и сохранить символы свободы города, которым [FROM.GetNameDef] заявит о себе."
 city_capture.285.a: "С Бостоном в наших руках, Новая Англия под защитой."
 city_capture.285.b: "Свобода не будет потушена!"
 city_capture.285.c: "Афины Америки пали..."
 
 city_capture.286.t: "Падение Токио"
 city_capture.286.d.other: "Сегодня вся Япония была потрясена до основания, так как [FROM.GetAdjective]ие силы, в конце концов, после нескольких ожесточенных боев захватили столицу. Несмотря на надежды [FROM.GetAdjective]их командиров, похоже, что Императорский дворец был успешно эвакуирован, оставив местонахождение Императора и правительства неизвестным.\n\nВпервые в истории, японская столица находится в иностранных руках, настроения среди [FROM.FROM.GetAdjective]их войск можно описать только как мрачные. Японская общественность долгое время верила, что мощь их вооруженных сил и позиция нации сделают вторжение невозможным. Приход [FROM.GetAdjective]их войск обнажает лживость этого утверждения, и кажется, что [FROM.FROM.GetAdjective]ая гегемония над Восточной Азией была разрушена навсегда."
 
 city_capture.286.d.lkmt: "Сегодня, после кровавой и жестокой высадки на Японские острова, Национально-Революционная армия Гоминьдана заняла японскую столицу, город Токио. Несмотря на надежды военных схватить императора живьём, тот благополучно был эвакуирован вместе с семьёй. Его местонахождение пока неизвестно.\n\nВидя, как впервые за всю историю столица их государства пала в руки иноземцам, [FROM.FROM.GetAdjective]ие войска совсем пали духом. Чего нельзя сказать о ликующих китайцах. Такое позорный удар по японскому империализму подвёл заключительную черту столетия китайских унижений. Судя по всему, в Азии родилась новая могучая сила, с которой придётся считаться..."
 city_capture.286.a: "Великая победа!"
 city_capture.286.a.lkmt: "Век унижений отомщён"
 city_capture.286.b: "Мы не должны терять надежду."
 city_capture.286.c: "Жемчужина всей Азии пала."
 
 city_capture.287.t: "Падение Шэньяна"
 city_capture.287.d.chi: "После решительного наступления, [FROM.GetAdjective]ие солдаты наконец-то одержали победу над [FROM.FROM.GetAdjective]ими защитниками и обезопасили главный город Маньчжурии. [FROM.GetAdjective]ие войска быстро окружили обнесённый стеной Старый город и потребовали ареста [FROM.FROM.GetLeader], а когда им его так и не вывели, начали штурм, который уничтожил большую часть старого маньчжурского дворца, в ходе которого им так и не удалось разыскать его владельца.\n\nХодят слухи, что люди [FROM.FROM.GetLeader] сомневаются в его способности защитить свою землю, а тем более объединить весь Китай. [FROM.FROM.GetLeader] сам, похоже, понимает всю серьезность ситуации: город вскоре нужно вернуть себе, иначе [FROM.GetAdjective]ие солдаты могут найдут того, кого искали..."
 city_capture.287.d.other: "Несмотря на отчаянные попытки [FROM.FROM.GetAdjective]их защитников остановить атаку, маньчжурский город Шэньян сегодня пал после ожесточенных городских боев. Боевые действия наиболее интенсивно велись на железнодорожной станции Хуангутун и вокруг нее, которая оказалась мишенью нескольких [FROM.GetAdjective]их попыток захватить ее. [FROM.FROM.GetAdjective]ие войска были вытеснены, но не раньше, чем они снесли несколько рельсов, оставив по настоящее время станцию в основном непригодной для использования.\n\nНезависимо от этого, захват города - большая победа для [FROM.GetAdjective]ой кампании по завоеванию Китая. Путь к Пекину и центральному Китаю теперь чист, и многие военачальники, усеявшие страну, похоже, обращают свое внимание на такое развитие событий. Китайские наблюдатели опасаются, что это может означать для будущего страны."
 city_capture.287.a: "[FROM.FROM.GetNameDefCap] скоро падет!"
 city_capture.287.b: "Мы вернем его в ближайшее время!"
 city_capture.287.c: "У Маньчжурии будет новый хозяин?"
 
 city_capture.288.t: "Падение Владивостока"
 city_capture.288.d: "Сегодня город Владивосток, резиденция [FROM.FROM.GetNameDefCap] была захвачена [FROM.GetAdjective]ими войсками. Возвысившись до статуса родины Тихоокеанского флота России, во время Гражданской войны во Владивостоке город стал резиденцией адмирала-диссидента Александра Колчака. Хотя многое изменилось с тех пор, как Колчак впервые взял город во время той войны, государство, которое он создал из Владивостока, сохранилось до наших дней. Однако с захватом города позиция этого государства стала крайне шаткой."
 city_capture.288.a: "Урааа!"
 city_capture.288.b: "Наше состояние скоро улучшится."
 city_capture.288.c: "[FROM.FROM.GetNameDefCap] только что потеряла Тихоокеанскую Россию."
 
 city_capture.289.t: "Падение Дублина"
 city_capture.289.d: "Сегодня многочисленные сообщения из Ирландии подтверждают, что [FROM.FROM.GetAdjective]ая столица была захвачена [FROM.GetAdjective]ими войсками. По мере продвижения вражеских сил по центру города, отдельные части [FROM.FROM.GetAdjective]их сил предприняли тщетные попытки удержать ключевые здания в этом районе, кульминацией которых стала их последняя позиция на О'Коннелл-стрит, пытавшаяся удержать Главное почтовое отделение до тех пор, пока они в конечном итоге не были подавлены неоднократными нападениями со стороны [FROM.GetAdjective]их войск.\n\nПо мере того, как новые оккупационные силы располагаются в старой британской резиденции властей в Дублинском замке, на город обрушивается тишина, нарушенная периодическими выстрелами огнестрельного оружия, во время которых уничтожаются последние очаги сопротивления. В то время как большая часть [FROM.FROM.GetAdjective]ого гражданского и военного руководства сумела эвакуироваться в сельскую местность, клятвенно обещая продолжить борьбу против [FROM.GetNameDef], их делу был нанесен серьезный удар."
 city_capture.289.a: "Несвободная Ирландия никогда не будет в мире!"
 city_capture.289.b: "С наличием [FROM.FROM.GetAdjective]ой столицы, остальная часть острова находится в пределах нашей досягаемости."
 city_capture.289.c: "[FROM.FROM.GetAdjective]ое дело кажется отчаянным."
 
 city_capture.290.t: "Падение Батавии"
 city_capture.290.d.dei: "Сегодня было объявлено, что Батавия, центр [FROM.FROM.GetNameDefCap], пала. Город находился под контролем голландцев с 1619 г. и стал жемчужиной Голландской империи в регионе. В заявлении Дворца Конингсплейна [FROM.GetAdjective]ого генерала, отвечающий за оккупацию, он попытался успокоить местное население, пообещав, что никто из них не пострадает.\n\nС падением Батавии, способность [FROM.FROM.GetNameDef] сохранять контроль над Явой и другими островами получила тяжелый удар, возможно, навсегда. Только время покажет, смогут ли колониальные силы сплотиться и восстановить контроль."
 city_capture.290.d.ins: "[FROM.GetAdjective]ие военные депеши сегодня подтвердили, что Батавия, столица [FROM.FROM.GetNameDefCap], пала после штурма города. Став центром голландского владычества в Ост-Индии, город с тех пор стал столицей новой [FROM.FROM.GetAdjective]ой нации.\n\nНесмотря на [FROM.GetAdjective]ую декларацию, призывающую местных жителей подчиниться оккупации, население стремилось продемонстрировать новой оккупационной власти, что они не откажутся от своей вновь обретенной независимости так легко, как хотелось бы. Для остальной части [FROM.FROM.GetNameDefCap], падение Батавии, однако, является катастрофическим ударом по национальной гордости вдобавок к стратегической катастрофе. По мере того, как эвакуированное [FROM.FROM.GetAdjective]ое правительство начинает реорганизацию, еще предстоит выяснить, смогут ли они изгнать этого нового завоевателя со своих островов."
 city_capture.290.d.other: "Сегодня было объявлено, что Батавия, крупнейший город на Яве и ключевой город в регионе, попал в [FROM.GetAdjective]ие руки. [FROM.GetAdjective]ий флаг теперь развевается над дворцом старого генерал-губернатора, в то время как их войска продвигаются для обеспечения безопасности гавани и других ключевых районов города.\n\nПадение Батавии знаменует собой драматический сдвиг в расстановке сил в Ост-Индии и дает [FROM.GetAdjective]им военным твердую базу, с которой они могут осуществлять контроль над прибыльными островами архипелага. Перед лицом такого поражения еще предстоит выяснить, смогут ли [FROM.FROM.GetAdjective]ие силы стабилизировать ситуацию и вернуть контроль."
 city_capture.290.a: "Мы будем бороться."
 city_capture.290.b: "Непростой приз."
 city_capture.290.c: "У Ост-Индии будет новый хозяин."
 
 city_capture.291.t: "Падение Бухареста!"
 city_capture.291.d: "Прошло два десятилетия с тех пор, как Бухарест был оккупирован во время Вельткрига, и теперь он снова попал в руки врага. Несмотря на энергичную защиту [FROM.FROM.GetAdjective]ой армии ,[FROM.GetAdjective]ие войска прорвались через нее. Старые форты вокруг города были восстановлены, чтобы немного облегчить жизнь столице, но это было бесполезно. Армянский и еврейский кварталы и район Урана по-прежнему оказывают сопротивление, последнему способствовало присутствие Метрополии и Арсенал Хиллз. Тем не менее, после захвата основных артерий Калеа Виктории, бульвара Королевы Елизаветы и улицы Сербан Вода их падение почти наверняка будет. Жители опасаются того, что может принести оккупация, последняя из которых все еще остается в памяти, несмотря на попытки [FROM.GetAdjective]ого правительства унять опасения местных жителей. Хотя [FROM.FROM.GetLeader] пообещал бороться, будущее [FROM.FROM.GetNameDef] остается неопределенным."
 city_capture.291.a: "Мы вернёмся!"
 city_capture.291.b: "Наконец-то Бухарест наш!"
 city_capture.291.c: "Серьезный удар по [FROM.FROM.GetAdjective]им амбициям."        
 
 city_capture.292.t: "Падение Константинополя"
 city_capture.292.d.orthodox: "[FROM.GetAdjective]ий захват Константинополя был завершен сегодня, так как последние из [FROM.FROM.GetAdjective]их войск были вытолкнуты за берега Босфора. Захват города был относительно быстрым, и по сравнению с предыдущими разграблениями Константинополя милосердным. Однако многие исторические достопримечательности были все еще повреждены, в частности, Голубая мечеть, которая была разгромлена [FROM.GetAdjective]ими войсками при ликвидации последнего очага сопротивления в павшем городе. Правительство [FROM.GetNameDef] объявило захват формальным отвоеванием старой римской столицы для христианского мира, а посланник [FROM.GetLeader] был направлен для переоборудования Софийской мечети в Восточную Православную базилику."
 city_capture.292.d.other: "[FROM.GetAdjective]ий захват Константинополя был завершен сегодня, так как последние из [FROM.FROM.GetAdjective]их войск были вытолкнуты за берега Босфора. Захват города был относительно быстрым, и по сравнению с предыдущими разграблениями Константинополя милосердным. Однако многие исторические памятники были все еще повреждены, в частности, Долмабахче, который был сильно поврежден в ходе боевых действий во время финальной схватки [FROM.FROM.GetAdjective]их войск. [FROM.GetAdjective]ие войска сейчас патрулируют улицы древнего города, а правительство [FROM.GetNameDef] объявило о своем намерении осуществлять управление городом как можно более мягким способом."
 city_capture.292.a: "На данный момент мы потеряли проливы."
 city_capture.292.b: "Город Константина наш!"
 city_capture.292.c: "Царьград наш!"
 city_capture.292.e: "Константинополь возвращен Греции!"
 city_capture.292.f: "Турки окончательно изгнаны из\nЕвропы."
 city_capture.292.g: "У Босфора новый хозяин."
 
 city_capture.293.t: "Падение Сеуты"
 city_capture.293.d: "Сообщения из Сеуты подтверждают, что старый испанский укрепленный полуостров был захвачен [FROM.GetAdjective]ими войсками. После быстрой высадки и стычек на пляже вторгшиеся солдаты в конце концов преодолели последние оборонительные сооружения на крайней точке Обезьяней горы.[FROM.FROM.GetAdjective]ие войска оказывали упорное сопротивление, надеясь задержать захватчиков как можно дольше, но в конце концов были отбиты.\n\nБитва за Сеуту была кровавой баней, в которой сражались от дома к дому на узких центральных улицах города, что не давало возможности укрыться от артиллерии и морской поддержки окружающих войск."
 city_capture.293.a: "Один из столпов Геркулеса упал..."
 city_capture.293.b: "Теперь мы контролируем доступ к Средиземноморью!"
 city_capture.293.c: "Один за другим падают Геркулесовы столбы."

 city_capture.294.t: "Падение Амстердама"
 city_capture.294.d.other: "\"Северная Венеция\", Амстердам издавна восхищал своими прекрасными каналами и портом; возможно, \"золотой век\" финансов и торговли города давно прошел, но город остается вечным европейским сокровищем процветания и искусства. К сожалению, город превратился в поле боя с беженцами, бегущими со всех сторон, и было сообщено, что после ожесточенных боев [FROM.FROM.GetAdjective]ие объявили город открытым после успешной кампании [FROM.GetAdjective]их сил. Поскольку бои в городе прекратились, а [FROM.GetAdjective]ие силы начали марш по Мюнтплейну - будущее для жителей Амстердама мрачно."
 city_capture.294.d.holex: "Голландские силы в изгнании добились того, что сторонние наблюдатели считали несбыточной мечтой. Из ссылки в Голландской Ост-Индии голландское правительство в изгнании триумфально вернулось в Амстердам. После напряженной битвы, в результате которой большая часть города осталась в руинах, голландский триколор гордо развевается над Королевским дворцом, знаменуя возвращение королевы. Пока голландские войска начинают восстанавливать порядок на улицах, необходимо выделить время для оздоровления Амстердама. Голландский народ пережил революцию и гражданскую войну, и потребуется время, чтобы раны, нанесенные войной, полностью зажили."
 city_capture.294.a: "Темное время для голландского народа..."
 city_capture.294.b.other: "Северная Венеция наша!"
 city_capture.294.c.other: "С Амстердамом падение Голландии неминуемо..."
 city_capture.294.b.holex: "Хорошо вернуться домой."
 city_capture.294.c.holex: "Голландцы сделали невозможное!"

 city_capture.295.t: "Падение Мюнхена"
 city_capture.295.d: "Расположенный на берегу реки Изар к северу от Баварских Альп, город Мюнхен является резиденцией баварской администрации и центром искусства, науки, архитектуры и культуры. Во времена правления принца-регента Луитпольда город пережил взрыв художественной и культурной активности.\nОднако в ходе недавнего конфликта город оказался в осаде, и после изнурительной битвы [FROM.FROM.GetAdjective]ие войска эвакуировали город. Большая часть города лежит в руинах, Мариенплац лежит в обломках, а купола Фрауэнкирхе сильно повреждены в результате интенсивной бомбардировки. Последние остатки [FROM.FROM.GetAdjective]ого сопротивления в сердце города, в Новой ратуше, окончательно сдались победоносной [FROM.GetAdjective]ой армии. С падением Мюнхена, похоже, скоро наступит падение южной Германии."
 city_capture.295.d.france: "После напряженной кампании французские войска пересекли реку Изар и вошли в Мюнхен. В ходе боев большая часть города была разрушена, Маринплац лежала в руинах, а купола Фрауненкирхе были сильно повреждены в результате интенсивной бомбардировки. Сопротивление немцев было ожесточенным, и бои переросли в ближние бои между домами, но к вечеру стало известно, что триколор Коммуны теперь гордо развевается над башней ворот Тальбрук. После взятия Мюнхена Французская коммуна теперь готова захватить остальную часть Южной Германии. Сторонние наблюдатели считают, что падение Германской империи если не неизбежно, то близко к этому в течение ближайших нескольких недель."
 city_capture.295.a: "Падение Мюнхена означает, что Южная Германия принадлежит нам!"
 city_capture.295.b: "С потерей Мюнхена потеряна Южная Германия."
 city_capture.295.c: "Так падает сердце Баварии..."
 city_capture.295.a.france: "Славная победа Коммуны! Мы отомстим за наших братьев, вперед!"
 city_capture.295.b.france: "Ситуация тяжелая. Отечество стоит перед лицом величайшей опасности."
 city_capture.295.c.france: "После падения Мюнхена, Коммуна кажется неостановимой."

 city_capture.296.t: "Падение Дели"
 city_capture.296.d: "Один из старейших городов мира, древний город Дели много раз был завоеван, разграблен и отстроен заново. Самые ранние архитектурные реликвии датируются 300 годом до нашей эры, что свидетельствует о древней истории Дели и его жизнестойкости.\nНесмотря на это, город Дели пал перед вражескими войсками, и древние здания города снова находятся под угрозой разрушения. Вновь, после кровавой осады 1857 года, город Дели подвергся нападению, и [FROM.FROM.GetAdjective]ие защитники сломились под впечатляющим наступлением [FROM.GetAdjective]их сил. По сообщениям из города, [FROM.GetAdjective]ая армия начала сгонять пленных и выживших в Пурана Кила, древнюю крепость, которая теперь служит лагерем для интернированных."
 city_capture.296.a: "Неудача... но мы не сдадимся!"
 city_capture.296.b: "Сердце Северной Индии наше!"
 city_capture.296.c: "И снова у Дели появился новый хозяин..."

 city_capture.297.t: "Падение Риги"
 city_capture.297.d: "Рига, \"жемчужина Балтики\", с сегодняшнего дня находится под властью [FROM.GetAdjective]их сил. Этот оживленный торговый центр играет роль важнейшего экономического и финансового центра Балтийского моря. Хотя [FROM.GetAdjective]ая армия пообещала поддерживать мирную оккупацию, по всему городу бушуют пожары, а беженцы пытаются бежать по морю. Некоторые здания, такие как Дом черных голов, лежат в руинах после интенсивных бомбардировок [FROM.GetAdjective]ой армии.  Прижатые к морю, [FROM.FROM.GetAdjective]ие защитники не имели другого выбора, кроме как предложить безоговорочную капитуляцию победоносной [FROM.GetAdjective]ой армии, чтобы предотвратить дальнейшее разрушение своего города."
 city_capture.297.a: "Наша ситуация выглядит плачевно. Убедитесь, что порт остается открытым для эвакуации!"
 city_capture.297.b: "Наконец-то жемчужина Балтики принадлежит нам!"
 city_capture.297.c: "Ситуация для Риги выглядит мрачно."

 city_capture.298.t: "Падение Каира"
 city_capture.298.d: "Каир, город \"тысячи минаретов\", - один из старейших городов мира, служащий интеллектуальным и культурным центром арабского мира. Благодаря своей близости к великим городам фараонов, Каир также ассоциируется с пирамидами Гизы и древними столицами. Каир всегда был главным призом для завоевателей прошлых времен, таких как Саладин и Наполеон. Однако, подобно вечным пескам, окружающим город, похоже, что великий город снова перешел под власть нового оккупанта. После успешной кампании [FROM.GetAdjective]ой армии, оставшиеся [FROM.FROM.GetAdjective]ие защитники попытались отстоять Каирскую цитадель.\nПосле продолжительного сопротивления, последние [FROM.FROM.GetAdjective]ие силы в городе предложили безоговорочную капитуляцию. Несмотря на великую победу, [FROM.GetAdjective]ая армия пообещала пресечь возможное мародерство, чтобы сохранить этот исторический город."
 city_capture.298.a: "Каир, город фараонов - наш!"
 city_capture.298.b: "Мы потерпели серьезное поражение. Мы вернемся!"
 city_capture.298.c: "Древний город песков снова будет служить новому хозяину"
 city_capture.298.d.ottoman: "Каир, город \"тысячи минаретов\", один из старейших городов мира, служащий интеллектуальным и культурным центром арабского мира. Это также бьющееся сердце египетской нации, одной из нескольких арабских стран, объявивших войну Османской империи.\nПосле успешной османской кампании египетские войска предложили безоговорочную капитуляцию в городе, а некоторые египтяне оказали последнее сопротивление в Каирской цитадели. Король бежал из Каира, и капитуляция Египта должна быть неизбежной. Несмотря на турецкую победу, османская армия пообещала Каиру, что оккупация будет мирной и что исторические здания этого древнего города не пострадают."
 city_capture.298.a.ottoman: "Так называемый \"Каирский Пакт\" теперь рухнет. Славная победа османской нации!"
 city_capture.298.b.ottoman: "После падения Каира турки вторглись в Египет. Никогда больше они не будут править Египтом - мы должны контратаковать!"
 city_capture.298.c.ottoman: "После падения Каира будущее Каирского Пакта представляется мрачным"

 city_capture.299.t: "Падение Кейптауна"
 city_capture.299.d: "Один из крупнейших городов Южной Африки, расположенный в Западной Капской провинции, Кейптаун издавна восхищает своим прекрасным местоположением и ролью в экономике Южной Африки. За многие годы, прошедшие с тех пор, как исследователи впервые приплыли к мысу Доброй Надежды, Кейптаун перерос свое первоначальное предназначение далекого форпоста. Некогда процветающий и даже крупнейший город Южной Африки пережил поворот судьбы вспять, когда [FROM.GetAdjective]ие силы недавно ворвались в город в ходе успешной кампании. Отчаявшиеся [FROM.FROM.GetAdjective]ие защитники попытались организовать оборону в замке Доброй Надежды, но уже к ночи стало ясно, что битва окончена. Хотя порт Кейптауна получил повреждения во время сражения, он, несомненно, будет служить для удовлетворения стратегических потребностей [FROM.GetAdjective]ой армии, когда она начнет оккупацию города."
 city_capture.299.a: "Возможно, мы проиграли битву, но война еще не проиграна!"
 city_capture.299.b: "Крупный порт Кейптауна - наш!"
 city_capture.299.c: "Родной город был захвачен."

 city_capture.300.t: "Падение Буэнос-Айреса"
 city_capture.300.d: "Прозванный Парижем Южной Америки, Буэнос-Айрес является ведущим местом для иммигрантов из Европы, региональной столицей искусства и финансов.\n Главные проспекты города были недавно построены, наряду со строительством самых высоких зданий в Южной Америке и первой системы метро.\n Однако решительная кампания [FROM.GetAdjective]ой армии привела к тотальному сражению на улицах города. Тяжелые бои происходили на Авенида де Майо и Авенида де Хулио, когда [FROM.FROM.GetAdjective]ие защитники делали отчаянные последние шаги в основных зданиях по всему городу. Бои перешли в кровавые схватки между домами, но в конце концов [FROM.FROM.GetAdjective]ие защитники начали выходить из своих укрытий и сдаваться. Это действительно великая победа для [FROM.GetAdjective]ой нации."
 city_capture.300.a: "Великий город Южной Америки - наш!"
 city_capture.300.b: "После потери Буэнос-Айреса нам придется удвоить наши усилия."
 city_capture.300.c: "Королева Эль-Платы пала!"
 city_capture.300.d.patagonia: "Патагонским революционерам удалось одержать значительную победу: сегодня флаг патагонского движения гордо развевается над Каса Росада. Битва в Буэнос-Айресе была кровопролитной, бои быстро перешли от дома к дому на главных проспектах Авенида де Майо и Авенида 9 де Хулио. Однако к вечеру стало ясно, что патагонским революционерам удалось одержать победу, и столица аргентинского режима пала.\nНа фотографии запечатлен культовый момент, когда восторженные революционеры прошли по главному проспекту города верхом на танках и грузовиках бывшего аргентинского режима. Однако, хотя правительство Патагонии заверило мир, что революция будет максимально мирной, уже поступают сообщения о священниках и бывших \"врагах государства\", которых забирают под дулами автоматов."
 city_capture.300.a.patagonia: "Да здравствует Революция! Марш за свободу остальной Аргентины!"
 city_capture.300.b.patagonia: "Немедленно контратакуйте! Аргентина не должна пасть перед безбожными революционерами!"
 city_capture.300.c.patagonia: "Социалистическая революция пришла в Аргентину."
 
 city_capture.301.t: "Падение Сантьяго"
 city_capture.301.d: "Один из крупнейших и старейших городов Южной Америки, город Сантьяго расположен в центре котловины Сантьяго и окружен горами Анды. Горы Чили и его расположение на узкой западной стороне Южной Америки дают Сантьяго ощущение безопасности. Однако, несмотря на географическое преимущество, [FROM.GetAdjective]ие солдаты успешно вошли в город после напряженного боя с [FROM.FROM.GetAdjective]ими защитниками. В ходе завязавшегося сражения перестрелка велась вдоль знаменитого проспекта Аламеда. [FROM.GetAdjective]ие солдаты смогли прорваться через баррикады и [FROM.FROM.GetAdjective]ие укрепления на Пасео Ахумада. Дезорганизованные и искалеченные, [FROM.FROM.GetAdjective]ие войска не имели другого выбора, кроме как предложить безоговорочную капитуляцию."
 city_capture.301.a: "Город Святого Джеймса - наш!"
 city_capture.301.b: "Мы никогда не сдадимся! Контратакуйте, когда мы будем готовы!"
 city_capture.301.c: "Город островных холмов пал..."
 city_capture.301.d.argentina: "После долгой и изнурительной кампании, в ходе которой велись бои в горах Анд, аргентинский флаг гордо развевается над дворцом Ла Монеда. Бои велись на улицах города, на знаменитом проспекте Аламеда и Пасео Ахумада, чилийские войска оказывали интенсивное сопротивление. Однако аргентинцы смогли уничтожить чилийское сопротивление в городе, а те, кто остался в живых, охотно сдались победоносной аргентинской армии.\nПосле потери Сантьяго, кажется, что Аргентина теперь имеет преимущество в южноамериканском конфликте. Моральный дух чилийцев, несомненно, низок, и сторонние наблюдатели отмечают, что это лишь вопрос времени, когда начнутся волнения из-за отсутствия прогресса Чили в войне против Аргентины."
 city_capture.301.a.argentina: "Славная победа! Скоро Южная Америка будет очищена от социалистической угрозы."
 city_capture.301.b.argentina: "Мы не проиграем реакционерам! Собирайтесь, товарищи, мы вернемся!"
 city_capture.301.c.argentina: "Значительный удар по чилийским амбициям."

 city_capture.302.t: "Падение Минска"
 city_capture.302.d: "Возрождение Минска после Вельткрига ознаменовалось бурным развитием высшего образования, больниц, кинотеатров, Минск стал центром белорусского языка и культуры. \n Однако история повторяется, и Минск снова оказывается на фронте войны - только на этот раз он оккупирован [FROM.GetAdjective]ими силами. Большая часть города пострадала от интенсивных бомбардировок и обстрелов, и, по сообщениям, значительная часть беженцев бежит от хаоса. Несмотря на упорное сопротивление, [FROM.FROM.GetAdjective]ие защитники в конечном итоге предложили безоговорочную капитуляцию победоносным [FROM.GetAdjective]им силам, и только время покажет, насколько трудным будет восстановление Минска."
 city_capture.302.a: "Великий город Беларуси - наш!"
 city_capture.302.b: "Мы никогда не сдадимся!"
 city_capture.302.c: "Мрачный день для белорусского народа..."
 city_capture.302.d.russia: "Минск был частью России до Первого Вельткрига. После невероятного наступления российской армии - кажется, что история повторилась. После изнурительной и утомительной битвы, в которой большая часть города была превращена в руины, оставшиеся защитники сдались победоносным российским войскам. Фабрики, музеи и тысячи мирных жителей бежали на запад, спасаясь от захватчиков. Это поражение - верный удар по Рейхспакту, но только время покажет, будет ли русская оккупация временной или постоянной."
 city_capture.302.a.russia: "Это только начало. Скоро мы вернем наши земли!"
 city_capture.302.b.russia: "Мы никогда не сдадим нашу независимость! Сражайтесь!"
 city_capture.302.c.russia: "Нанеся существенный удар по будущему Беларуси, Русский медведь идет дальше..."

 city_capture.303.t: "Падение Вильнюса"
 city_capture.303.d: "Вильнюс известен, прежде всего, как \"старый город\", один из крупнейших сохранившихся средневековых городов Северной Европы - это место, где бок о бок соседствуют некоторые из самых замечательных архитектурных стилей Европы - готика, ренессанс, неоклассика и барокко.\nНо для жителей города наступили темные времена, поскольку город был охвачен Вильнюсской битвой. [FROM.GetAdjective]ие попытались окружить город, в то время как отчаянные [FROM.FROM.GetAdjective]ие предприняли отчаянный прорыв в надежде вырваться из осады. Завязались жестокие бои \"улица на улицу\", когда [FROM.GetAdjective]ие силы пытались ослабить оборону города. После мучительной битвы, когда большая часть города лежала в руинах и пламени, [FROM.FROM.GetAdjective]ие защитники сдались. Когда-то Вильнюс был культурной достопримечательностью Европы, но сейчас еще слишком рано говорить о том, восстановится ли он до своей довоенной славы."
 city_capture.303.a: "Мы будем сражаться до последнего!"
 city_capture.303.b: "Северный \"Иерусалим\" - наш!"
 city_capture.303.c: "Великий литовский город пал?"

 city_capture.304.t: "Падение Нанкина"
 city_capture.304.d: "После изнурительной многодневной бомбардировки с вершины Цзыцзиньшань, Фиолетовой горы, и многократных штурмов ее стен, Нанкин пал ранним вечером. Защитники у ворот Чжунхуа и Гуанхуа сражались до последнего человека, их трупы усеивали великие стены города, а их товарищи начали отступать по извилистым улицам. Поскольку облегчения не предвидится, а [FROM.FROM.GetAdjective]ие подразделения за пределами города не смогли восстановить контроль над батареями Цзыцзиньшаня, немногим подразделениям, оставшимся внутри, грозит только уничтожение. Потеря старой южной столицы, несомненно, станет ударом для [FROM.FROM.GetAdjective]их военных усилий, хотя [FROM.FROM.GetLeader] уже поклялся в своей окончательной победе."
 city_capture.304.a: "Южная столица - наша!"
 city_capture.304.b: "Мы скорее умрем, чем сдадимся! Мы вернемся!"
 city_capture.304.c: "Великий город Нанкин пал"
 city_capture.304.d.japan: "После изнурительной многодневной бомбардировки с вершины Цзыцзиньшань, 'Фиолетовой горы', и многократных штурмов ее стен, Нанкин пал ранним вечером. Защитники на стенах сражались до последнего человека, но остальная армия разбилась вскоре после того, как японские войска водрузили восходящее солнце над воротами Чжунхуа, начав хаотичное бегство, в результате которого на извилистых улицах города остались мундиры и винтовки. Хотя японцы заявили, что оккупация Нанкина будет мирной, повсюду лежат мертвые и умирающие, а в стенах города продолжают раздаваться спорадические выстрелы и полыхают неугасимые пожары. Рассвет, без сомнения, ознаменует начало новой мрачной реальности для старой южной столицы и ее оставшихся жителей."
 city_capture.304.a.japan: "Банзай! Славная победа Императора!"
 city_capture.304.b.japan: "Мы никогда не сдадимся японским собакам!"
 city_capture.304.c.japan: "Да смилуется Господь над жителями Нанкина..."

 city_capture.305.t: "Падение Уханя"
 city_capture.305.d: "Сегодня после упорной битвы район трех городов Ухань пал перед войсками государства [FROM.GetName]. [FROM.FROM.GetAdjective]ие защитники, возможно, надеялись повторить успешную оборону У Пэйфу в Учане в 1926 году и превратить битву в длительную осаду, но согласованный штурм и отсутствие помощи по реке полностью разрушили эти надежды. С [FROM.GetAdjective]им флагом, развевающимся над особняком губернатора и холмом Луоцзя, государство [FROM.GetName] нанесло значительный удар по государству [FROM.FROM.GetNameDef] и захватило один из крупнейших логистических центров Китая наряду с одним из его самых производительных арсеналов. Будет ли [GetDateapgt] однажды рассматриваться как поворотный момент или просто как очередная битва, похоже, что это событие будет преследовать умы [FROM.FROM.GetAdjective]их лидеров еще некоторое время."
 city_capture.305.a: "Ухань, город рек - наш!"
 city_capture.305.b: "Мы скорее умрем, чем сдадимся! Мы вернемся!"
 city_capture.305.c: "Серьезное поражение для [FROM.FROM.GetAdjective]их"
 city_capture.305.d.japan: "Сегодня после упорной битвы район трех городов Ухань перешел под контроль японских войск. [FROM.FROM.GetAdjective]ие защитники, возможно, надеялись повторить успешную оборону У Пейфу в Учане в 1926 году и превратить сражение в длительную осаду, но японский контроль над рекой и подавляющая огневая мощь сделали любые подобные усилия тщетными. С Хиномару, пролетающим над особняком губернатора и холмом Луоцзя, Япония нанесла серьезный удар по государству [FROM.FROM.GetNameDef], захватив один из крупнейших логистических центров Китая и один из его самых производительных арсеналов. Поскольку китайская внутренняя территория теперь лежит открытой, вряд ли она будет последней."
 city_capture.305.a.japan: "Скоро мы одержим победу над китайцами!"
 city_capture.305.b.japan: "Мы никогда не сдадимся японским собакам!"
 city_capture.305.c.japan: "Японское продвижение в Китай продолжается..."

 city_capture.306.t: "Падение Гуанчжоу"
 city_capture.306.d: "После ожесточенных боев между домами, [FROM.GetName]ие силы захватили Гуанчжоу сегодня рано утром. Этот портовый город, часто известный под международным названием 'Кантон', является крупнейшим промышленным и торговым центром южного Китая за пределами Гонконга, и его потеря станет серьезной неудачей для военных усилий государства [FROM.FROM.GetNameDef]. Хотя городские причалы и узкие переулки кажутся безопасными, слухи говорят об организации сопротивления в горах Байюнь на севере, и оттуда, возможно, будет предпринята попытка вернуть город.\n\nЮжный Китай и Гуандун, в частности, известны своим сопротивлением внешнему контролю, будь то из Пекина или откуда-то еще. Удержание города может оказаться сложнее, чем [FROM.GetLeader] рассчитывает."
 city_capture.306.a: "Порт Кантон взят!"
 city_capture.306.b: "Поражение, но мы обязательно вернемся!"
 city_capture.306.c: "Большая потеря для государства [FROM.FROM.GetName]"
 city_capture.306.d.japan: "После бомбардировки, слышимой в восьмидесяти милях от Гонконга, Гуанчжоу пал перед войсками государства [new_controlled.GetName] ранее сегодня. Город не видел такой осады со времен немецкого ответа на ноту Северна в октябре 1926 года, но в отличие от кайзерлихской морской пехоты, его оккупанты, похоже, намерены остаться. В офисе губернатора провинции уже создан военный штаб, а рядом на холме Юэсю строится лагерь.\n\nПо слухам, в горах Байюнь к северу организуется сопротивление, и оттуда, возможно, будет предпринята попытка захвата города. Южный Китай и Гуандун, в частности, известны своим сопротивлением внешнему контролю, будь то из Пекина или из других мест. Удержание этого региона может оказаться для Японии чем-то большим, чем она рассчитывала."
 city_capture.306.a.japan: "С захватом Гуанчжоу Южный Китай будет нашим!"
 city_capture.306.b.japan: "Мы никогда не сдадимся японским собакам!"
 city_capture.306.c.japan: "Японцы теперь контролируют Жемчужную реку..."

 city_capture.307.t: "Падение Чунцина"
 city_capture.307.d: "Когда-то улицы Чунцина, самого дальнего судоходного пункта на могучей Янцзы, были заполнены беженцами, как богатыми, так и бедными, спасавшимися от неудержимого наступления японцев. Это было несколько дней назад. Когда городские сирены завыли, а гром и грохот артиллерии ознаменовали последнее выступление защитников на восточном берегу реки, город снова опустел. Давка унесла почти столько же жизней, сколько и захватчики.\n\nСейчас на улицах тихо, только дым, обломки и трупы. С падением Чунцина мало что осталось между Японией и полным господством на юго-западе Китая." 
 city_capture.307.a: "Еще одна славная победа!"
 city_capture.307.b: "Серьезная потеря, но мы восстановимся!"
 city_capture.307.c: "Важный шаг на пути к реализации Японией своих амбиций."

 city_capture.308.t: "Падение Куньмина"
 city_capture.308.d: "Впервые после поражения Трех феодалов в 1681 году город Куньмин пал перед захватчиком из-за пределов провинции Юньнань. Потеряв аэродром Вуцзяба на юго-востоке, войска государства [FROM.FROM.GetNameDef] постепенно отступали вдоль озера Дянь, и только после того, как древние стены города были разрушены, они окончательно сломились. Пока войска государства [FROM.GetNameDef] маршируют под культовыми арками Цзиньма-Бицзи, их лидеры должны довольствоваться тем, что они контролируют не только плодовитый Куньминский арсенал, но и конечную станцию чрезвычайно прибыльной железной дороги Куньмин-Хайфон."
 city_capture.308.a: "Благодаря этой победе мы закрепили свои позиции на западе Китая."
 city_capture.308.b: "Мы будем стоять за горами!"
 city_capture.308.c: "У гор Юньнани появился новый хозяин..."
 city_capture.308.d.japan: "Впервые после поражения Трех феодалов в 1681 году город Куньмин пал перед иностранным захватчиком. После потери аэродрома Вуцзяба на юго-востоке, войска государства [FROM.FROM.GetNameDef] были постепенно отброшены назад вдоль озера Дянь, и только после того, как древние стены города были разрушены, они были окончательно разбиты.\n\nПока японские войска маршируют под культовыми арками Цзиньма-Бицзи, их лидеры должны сидеть довольные, зная, что они контролируют не только плодовитый Куньминский арсенал, но и конечную остановку стратегической железной дороги Куньмин-Хайфон. По Китаю нанесен еще один большой удар. Теперь, когда Япония проникла так далеко в глубь страны, сколько еще она сможет выдержать?"
 city_capture.308.a.japan: "Китайцы не смогут убежать от нашего наступления!"
 city_capture.308.b.japan: "За горы! Мы никогда не сдадимся им, никогда!"
 city_capture.308.c.japan: "Завоевание Китая вскоре может стать реальностью..."

 city_capture.309.t: "Чжан изгнан из Цзинаня!"
 city_capture.309.d_Zongchang: "С 1925 года город Цзинань стал зеркальным отражением своего хозяина: коррумпированный и тучный, полный порока и мерзости. Из своего 'двора' Чжан Цзунчан покровительствовал всем, от художников и писателей до плейбоев и проституток, казнил всех, кто перечил ему, раскалывая головы, как можно раскалывать дыни. Этому пришел конец, когда оборона Цзинаня рухнула.\n\nПо слухам, самого Чжана можно было услышать ревущим над грохотом, возможно, он руководил эвакуацией своих неисчислимых богатств. Теперь его нигде нет, его гарем заброшен, его обширный особняк поглощен пламенем. Некоторые говорят, что Чжан вернется, либо как победитель, либо в гробу, и это мнение не лишено прецедента. Однажды, несмотря на поражение, он прошел парадом по Цзинаню, сидя в гробу и куря большую сигару."
 city_capture.309.d_Tianran: "На горе Тай Чжан Тяньжань, возвышаясь над миром, казалось бы, отвергал пути мира, но на самом деле его влияние простиралось далеко за пределы Шаньдуна. Благодаря вере Игуаньдао, его глаза и уши были повсюду, а часто и острый конец ножа.\n\nКак бы то ни было, его последователи сейчас отступают, и даже сама гора Тай была потеряна в результате решительного наступления государства [FROM.FROM.GetnameDef]. Храм Голубого Рассвета, Храм Нефритового Короля и множество других священных мест теперь в руках непочтительных солдат, которые топчут священные места, разбрасывают статуи, подношения и благовония, грабят без разбора. Тайшань, возможно, не восстановится в течение жизни целого поколения, но судьба Тяньжаня не вызывает сомнений. Эта потеря, несомненно, взволнует его последователей, а он никогда не оставался без плана."
 city_capture.309.a: "В добрый путь!"
 city_capture.309.b: "Это не что иное, как тактическое отступление!"
 city_capture.309.c: "Конец самому жестокому милитаристу Китая?"
 city_capture.309.e: "Конец этой странной религии"

 city_capture.310.t: "Падение Александрии"
 city_capture.310.d: "Основанный легендарным завоевателем Александром, город Александрия был наиболее известен такими чудесами, как Александрийская библиотека и Некрополь.\n Однако история повторяется, так как древний город снова был завоеван иностранной державой. После сильной [FROM.FROM.GetAdjective]ой бомбардировки были вынуждены отступить в цитадель Кайтбай. Окруженные со всех сторон и имея единственное спасение - море, [FROM.FROM.GetAdjective]ие предприняли отчаянную оборону. Однако, поскольку их запасы были ограничены, а моральный дух был низким, у [FROM.FROM.GetAdjective]их защитников не было другого выбора, кроме как предложить безоговорочную капитуляцию победоносной [FROM.GetAdjective]ой армии. Несмотря на великую победу, [FROM.GetAdjective]ие войска обязались не причинять вреда историческим зданиям города."
 city_capture.310.a: "С этой победой город Александра наш!"
 city_capture.310.b: "Серьезное поражение! Мы не потерпим этого"
 city_capture.310.c: "Город Александра снова завоеван..."
 city_capture.310.d.ottomans: "Город Александрия имеет большое культурное значение и является гордостью египетской нации. Город, в котором находятся великие чудеса древности, такие как Александрийская библиотека, действительно является важным центром жизни, культуры и промышленности Египта.\n Однако османы добились огромного прогресса в своей войне с Египтом и его арабскими союзниками: сегодня утром османские войска захватили город, а вместе с ним и стратегический египетский порт. Египетский флот успел бежать до прибытия османских войск, но оставшиеся защитники не смогли оттеснить османов. Окруженные со всех сторон и столкнувшиеся с мощью османской армии, египтяне бежали из города - и османы снова стали контролировать древний город. Несмотря на славную победу османов над своими египетскими врагами, османы пообещали не разрушать древние здания города."
 city_capture.310.a.ottomans: "С этой победой мы продвигаемся дальше в Египет!"
 city_capture.310.b.ottomans: "Мы никогда не сдадимся туркам! Мы вернемся!"
 city_capture.310.c.ottomans: "Османы нанесли удар по Каирскому Пакту"

 city_capture.311.t: "Падение Царицына"
 city_capture.311.d: "Город Царицын на протяжении веков был важным центром транспортной и торговой деятельности благодаря своему расположению. Несмотря на взрывной рост населения, плохие условия жизни города превратили его в очаг революционной активности. Во время Гражданской войны в России город стал местом важного сражения и осады, и вот история повторяется снова, так как город снова стал полем боя.\n\nБольшие части города лежат в руинах, так как ожесточенные городские войны и воздушные бомбардировки превратили большую часть городских центров в руины. Несмотря на почти фанатичное сопротивление [FROM.FROM.GetAdjective]их сил, [FROM.GetAdjective]ая армия сегодня объявила, что город перешел в их руки."
 city_capture.311.a: "Ни шагу назад! Мы вернемся!"
 city_capture.311.b: "Славная победа, скоро Русский Медведь \nпадёт."
 city_capture.311.c: "Россия еще больше пошатнулась в своей войне."

 city_capture.312.t: "Падение Екатеринбурга"
 city_capture.312.d: "Екатеринбург, расположенный на восточной стороне Уральских гор и пересекаемый рекой Исеть, известен как великий город, соединяющий восточную и западную половины России. Город, названный в честь жены Петра Великого, также был местом заточения бывшей российской императорской семьи перед их злополучной казнью.\n\nТяжелые времена, похоже, снова наступили для города, так как [FROM.FROM.GetAdjective]ие войска оставили город перед приближением [FROM.GetAdjective]их армий. Военные [FROM.FROM.GetAdjective]ие усилия потерпели огромное поражение с потерей этого критического узла, соединяющего Европу и Азию, и ценных ресурсов Урала."
 city_capture.312.a: "Конец матушки России близок."
 city_capture.312.b: "Этой победой, российским военным усилиям был нанесен колоссальный удар."
 city_capture.312.c: "Похоже, конец для русских близок."

