 #Enthusiasm Events 
 UPC.enthusiasmmechanic.001.t: "Рост авторитаризма в [FROM.GetNameDef]"
 UPC.enthusiasmmechanic.001.d: "Движение федералистов всегда было раздробленным, и из-за децентрализованной природы движения разные местные лидеры придерживались множества различных интерпретаций. Хотя большинство участников движения верят в демократию и в то, что она идет рука об руку с федерализмом, есть и те, кто имеет более слабые убеждения в отношении внедрения демократии в своих администрациях, но все же в целом сохраняют приверженность федералистской системе в Китае.\n\nПохоже, губернатор [FROM.GetLeader] попал в эту категорию, поскольку ограниченные отчеты указывают на растущий авторитаризм в [FROM.GetNameDef]. Под предлогом поддержания порядка и стабильности провинциальное правительство в [FROM.Capital.GetCapitalVictoryPointName] перешло под более строгий контроль [FROM.GetLeader].\n\nХотя Федеральное правительство не имеет права вмешиваться в дела провинций и диктовать, как им управлять, многие умоляют [ROOT.GetLeader] призвать губернатора [FROM.GetLeader] к ответу за его вопиющий авторитаризм и жажду политической наживы."
 UPC.enthusiasmmechanic.001.a: "Мы должны призвать их к ответу и защитить гражданские права!"
 UPC.enthusiasmmechanic.001.b: "Власть провинций нельзя попирать..."
  
 UPC.enthusiasmmechanic.002.t: "Внедрение демократии в [FROM.GetNameDef]"
 UPC.enthusiasmmechanic.002.d: "Конституционная демократия долгое время мерцала в Китае, пока авторитарный милитаризм подавлял политическую волю народа к действию, направляя нацию к коррупции и вопиющему кумовству. Несмотря на это, движение федералистов упорно пыталось вернуть демократию и конституционализм в Китай и возродить идеализм Синьхайской революции, вдали от нелиберальной олигархической демократии Севера и революционной авангардной однопартийной диктатуры Гоминьдана.\n\nЭта миссия наиболее ярко проявляется в [FROM.GetNameDef], где губернатор [FROM.GetLeader] неуклонно проводит демократические реформы. Превратив [FROM.GetNameDef] в один из многих бастионов конституционной демократии в Китае, [FROM.GetLeader] заслужил доверие многих чиновников в [ROOT.Capital.GetCapitalVictoryPointName].\n\nПолучив высокую оценку от многих, движение федералистов обрело «Образцовую провинцию», показывающую остальному Китаю, как следует управлять провинцией в соответствии с пожеланиями народа и ради народного благосостояния."
 UPC.enthusiasmmechanic.002.a: "Гражданские права и верховенство закона торжествуют!"
 UPC.enthusiasmmechanic.002.b: "Образцовая провинция, которой должна следовать вся страна!"
  
 UPC.enthusiasmmechanic.003.t: "[FROM.GetNameDef] подтверждает права провинции!"
 UPC.enthusiasmmechanic.003.d: "Автономия провинций всегда была основным принципом идеологии федералистов в Китае, даже если многие спорят о характере ее реализации. По мере того как власть в Китае начала децентрализоваться и все больше смещаться на провинциальный уровень, провинциализм тоже становился все более распространенным, поскольку многие не доверяли неспособности Центрального правительства решать местные проблемы и вместо этого обращались к местным милитаристам.\n\nПохоже, что, несмотря на нашу общую приверженность делу федералистов, губернатор [FROM.GetLeader] заявил о своей приверженности сохранению автономии провинции [FROM.GetNameDef], подкрепляя это действиями: скрытым удержанием налогов, причитающихся Федеральному правительству, наряду с тихим саботажем и без того ограниченного федерального надзора за провинцией.\n\nЯсно, что это не что иное, как плохо завуалированный демарш, иллюстрирующий недовольство [FROM.Capital.GetCapitalVictoryPointName] Федеральным правительством. Хотя мы можем только промолчать об этом незначительном инциденте, чтобы не спровоцировать обвинения в предательстве дела федералистов, обязательства между федеральным и провинциальными правительствами также должны выполняться."
 UPC.enthusiasmmechanic.003.a: "Разве они не видят бремя правительства?"
 UPC.enthusiasmmechanic.003.b: "Они должны сначала выполнить свои обязательства перед [ROOT.Capital.GetCapitalVictoryPointName]."
  
 UPC.enthusiasmmechanic.004.t: "[FROM.GetNameDef] подтверждает поддержку федеральной политики!"
 UPC.enthusiasmmechanic.004.d: "Федеральная система полагается исключительно на взаимное доверие, поскольку политика, проводимая Федеральным правительством, может надеяться на исполнение провинциальными правительствами только в том случае, если она соответствует интересам провинции. В свою очередь, Федеральное правительство также должно доверять провинциальным правительствам в том, что они будут управлять в соответствии с федеральными пожеланиями, при этом не переходя границ и не нанося непоправимого ущерба доверию.\n\nГубернатор [FROM.GetLeader] выразил свое доверие политике Федерального правительства, укрепляя политическое единство между федеральным и провинциальными правительствами. Хотя [FROM.GetLeader] и сохраняет политическую автономию [FROM.GetNameDef] от [ROOT.Capital.GetCapitalVictoryPointName], он показал, что [FROM.GetNameDef] готова сотрудничать с Федеральным правительством.\n\nЭтот акт подчинения заслужил похвалу от чиновников [ROOT.GetAdjective], которые рассматривают это как шаг к укреплению решимости и единства движения федералистов. Для [ROOT.GetLeader] это политический заряд уверенности, поскольку признание его власти и власти его правительства на национальном уровне также повысило легитимность [ROOT.Capital.GetCapitalVictoryPointName] как истинного правительства Китая."
 UPC.enthusiasmmechanic.004.a: "Политическая воля [ROOT.Capital.GetCapitalVictoryPointName] крепнет."
 UPC.enthusiasmmechanic.004.b: "Только через политическое единство Китай может снова стать целым!"
  
 UPC.enthusiasmmechanic.005.t: "Растущий пацифизм в [FROM.GetNameDef]"
 UPC.enthusiasmmechanic.005.d: "Китай находится в состоянии постоянной войны со времен Синьхайской революции, и его народ страдает от суровых условий жизни: от грабительских налогов деспотичных местных губернаторов до разгула бандитизма, опустошающего земли. Поэтому пацифизм стал своего рода трендом среди людей, осуждающих разрушительный авантюризм милитаристов.\n\nВ [FROM.GetNameDef] эта тенденция проявилась отчетливо: [FROM.GetLeader] занял миротворческую позицию, умоляя Федеральное правительство сохранять мир и настаивая на «Объединении через переговоры». Опасения губернатора [FROM.GetLeader] имеют основания, так как многие не хотят снова ввергать Китай в гражданскую войну. Кроме того, движение федералистов исторически порвало с Гоминьданом именно по этому вопросу, когда Гоминьдан стремился объединить Китай с помощью Северного похода, который в итоге закончился катастрофически.\n\nХотя это может отсрочить любое решение об объединении Китая силой, поскольку мнения склоняются к пацифизму, [ROOT.GetLeader] должен решить: следовать требованию общественности или продолжать милитаризацию вопреки народным настроениям."
 UPC.enthusiasmmechanic.005.a: "Мы не будем искать войны и не будем навязывать ее другим."
 UPC.enthusiasmmechanic.005.b: "Их желания стоят ниже потребностей национального единства!"
  
 UPC.enthusiasmmechanic.006.t: "[FROM.GetNameDef] сплачивается ради национального объединения!"
 UPC.enthusiasmmechanic.006.d: "Со времен Войны в защиту республики Китай погрузился в постоянную гражданскую войну из-за распрей между различными военными кликами, а также соперничающими правительствами. Шли годы, многие правительства формировались и рушились, и конца этому не было видно, поскольку война постепенно становилась нормой, укоренившейся в умах людей.\n\nРанее предпринимались попытки объединить нацию, будь то дипломатическим путем или силой. Экспедиция Дуань Цижуя против Движения в защиту конституции во время Вельткрига закончилась неудачей и расколола Бэйянское правительство, в то время как Северный поход Гоминьдана с целью избавить Север от клик Бэйяна потерпел крах и почти разрушил партию.\n\nОднако времена изменились, и многие все еще жаждут Национального объединения. Губернатор [FROM.GetLeader] — один из них; он сплотил народ [FROM.GetNameDef] для поддержки Национального объединения под нашим правительством. Его поддержка — это демонстрация доверия к [ROOT.GetLeader], которому теперь [FROM.GetNameDef] доверяет и которого поддерживает в достижении Национального объединения и реализации мечты Синьхайской революции."
 UPC.enthusiasmmechanic.006.a: "Марш к Национальному объединению становится ближе!"
 UPC.enthusiasmmechanic.006.b: "Только вместе мы можем двигаться к Национальному объединению!"
  
 #Unification Tree Events 
 UPC.unificationtree.001.t: "Развилка на дороге"
 UPC.unificationtree.001.d: "Пока длилась Эра милитаристов, Китай был в значительной степени разделен по оси Север-Юг. Как метко заметил Сунь Чуаньфан: «Мы, северяне, едящие пшеницу, никогда не поладим с этими южанами, едящими рис».\n\nПосле Синьхайской революции и последующих деклараций независимости от южных губернаторов, власть Пекина была ограничена только теми лоялистами, которые находились на Юго-Западе. С реставрацией Юань Шикая и началом Войны в защиту республики из Юньнани Юго-Запад ненадолго объединился, чтобы сформировать собственное несостоявшееся правительство, по сути разъединив юг и север. Кроме того, Движение в защиту конституции закончилось провальными переговорами между Лу-Цэнем и Дуань Цижуем.\n\nИ снова переговоры провалились, когда Чэнь Цзюнмин попытался договориться с правительством Чжили в начале 1920-х годов, в то время как Сунь Ятсен пытался выслужиться перед кликой Аньхой. Впоследствии Чэнь снова попытался договориться с Севером, хотя в конечном итоге отверг конференцию по воссоединению Дуань Цижуя в 1925 году. В последней попытке Юг начал Северный поход, чтобы добиться объединения путем подчинения, но Чжили перевернули ситуацию против них.\n\nПоскольку победа Чжили подтвердила эффективность объединения путем подчинения, в конечном итоге возникает вопрос, сможет ли Юг возглавить собственное объединение и стоит ли оно непопулярной цены среди населения. Другой вариант, конечно, — вести переговоры с Пекином и надеяться, что они образумятся."
 UPC.unificationtree.001.a: "Мы были бы глупцами, если бы не попытались снова."
 UPC.unificationtree.001.b: "Только меч может заставить других образумиться."
  
 UPC.unificationtree.010.t: "Прибытие делегатов Гуанчжоу"
 UPC.unificationtree.010.d: "Пока длилась Эра милитаристов, Китай был в значительной степени разделен по оси Север-Юг. Как метко заметил Сунь Чуаньфан: «Мы, северяне, едящие пшеницу, никогда не поладим с этими южанами, едящими рис».\n\nПосле Синьхайской революции и последующих деклараций независимости от южных губернаторов, эти недоверчивые государственные деятели сочли нужным управлять своими личными владениями независимо от желаний Пекина. После безумия Юань Шикая и начала движений в защиту республики и конституции, Юг попытался форсировать вопрос воссоединения страны.\n\nЕстественно, их попытки провалились. Сначала из-за застывшего фронта и несостоявшегося правительства, затем из-за правительственной некомпетентности и проваленных дипломатических переговоров. В-третьих, из-за отказа Чэнь Цзюнмина от северных предложений. И, наконец, попытка форсировать вопрос с Северным походом. В результате нация была объединена, но не Югом.\n\nС объединением страны Чжили, «Подчинение» нашло свое подтверждение в умах государственных деятелей страны, что еще больше подкреплялось провальными мирными переговорами Чжили-Фэнтянь 30-х годов. Стремясь увидеть нацию единой, Гуанчжоу направил миссию в Пекин, чтобы выполнить обещания объединения так или иначе. Безусловно, «Переговоры» вновь обрели популярность среди населения, хотя военные лидеры Севера не видят проблемы в том, чтобы снова подавить Юг."
 UPC.unificationtree.010.a: "Мы станем героями, если преуспеем. Приветствуйте их предложения."
 UPC.unificationtree.010.b: "Они выдвигают требования... *нам*?"
  
 UPC.unificationtree.020.t: "Расплата по счетам"
 UPC.unificationtree.020.d: "Чтобы создать и содержать армию, способную вести полномасштабную войну, на этом пути требуются жертвы. Но милитаристам, прогрессистам и консерваторам обещали мир и стабильность, а не войну и страдания темных дней Эры милитаристов. Без военного освобождения правительство федералистов всегда будет в опасности со стороны своих соперников. Но компромиссы, необходимые для военных усилий, вполне могут поставить под угрозу драгоценные реформы федералистов, которые уже проводятся.\n\nЭто старая история для губернаторов-федералистов. Во время своих предыдущих сроков Чэнь Цзюнмин был известен своими попытками расправиться с торговлей опиумом, публично сжигая контрабандный опиум на сотни тысяч долларов и даже став президентом Гуандунского отделения Международного общества по борьбе с опиумом. Точно так же он расправлялся с азартными играми и другими социальными пороками, прежде чем военные неудачи (и жадность) заставили подчиненных, таких как Хун Чжаолинь, снять такие ограничения. Тан Цзияо также занимал жесткую позицию в отношении опиума в прошлом, но в конечном итоге был вынужден возобновить производство, когда военные расходы вдвое превысили доходы провинции.\n\nДругим способом обеспечить финансирование было бы сокращение гражданских расходов. Это всегда было спорным шагом — Конституция Гуандуна 1920-х годов пыталась оговорить, что не более 30% бюджета может использоваться на военные цели, и не менее 20% должно использоваться на образование в знак протеста против безудержных военных расходов предыдущих администраций. Предложение юньнаньских федералистов снести школы и правительственные здания и продать их стройматериалы вызвало столь сильные протесты, что от него пришлось отказаться.\n\nПоследней альтернативой был бы сбор денег посредством принудительного налогообложения шэньши и торговцев, наряду с обесцениванием местной валюты. Это рискует спровоцировать беспорядки среди элиты, гиперинфляцию и экономический спад. Но с быстрым ростом расходов и неизбежностью войны чем-то придется пожертвовать."
 UPC.unificationtree.020.a: "Опиум то приливает, то отливает, когда это нужно нации, несомненно."
 UPC.unificationtree.020.b: "Конституции — это всего лишь бумага..."
 UPC.unificationtree.020.c: "Экономические последствия блекнут по сравнению с национальными устремлениями."
  
 UPC.unificationtree.021.t: "Жилы войны"
 UPC.unificationtree.021.d: "Чтобы создать и содержать армию, способную вести полномасштабную войну, на этом пути требуются жертвы. Но милитаристам, прогрессистам и консерваторам обещали мир и стабильность, а не войну и страдания темных дней Эры милитаристов. Без военного освобождения правительство Национальной защиты всегда будет в опасности со стороны своих соперников. Но компромиссы, необходимые для военных усилий, вполне могут поставить под угрозу драгоценные реформы, которые уже проводятся.\n\nВряд ли это новая история для юга. Различные лидеры стремились расправиться с торговлей опиумом и другими социальными пороками, хотя многие другие были вполне готовы принять прибыльную торговлю. Точно так же закрытие глаз на организованную преступность, рэкет и даже прямой грабеж использовались южными милитаристами в их хищническом стремлении финансировать свои войны и декадентский образ жизни.\n\nЗалезание в фонды образования и социального обеспечения — еще одна потенциальная цель для быстрого получения средств, необходимых для войны. Хотя интеллигенция категорически против этого и предприняла несколько попыток защитить свои любимые проекты, особенно государственное школьное образование, когда разражается война, реальность такова, что молодые люди и школьные фонды нужны на фронте.\n\nПоследней альтернативой был бы сбор денег посредством принудительного налогообложения шэньши и торговцев, наряду с обесцениванием местной валюты. Это рискует спровоцировать беспорядки среди элиты, гиперинфляцию и экономический спад. Но с быстрым ростом расходов и неизбежностью войны чем-то придется пожертвовать."
 UPC.unificationtree.021.a: "Ученики школы Зеленого леса могут прокормиться подножным кормом."
 UPC.unificationtree.021.b: "Мы сможем позволить себе книги, когда закончатся войны и Китай станет свободным."
 UPC.unificationtree.021.c: "Вся экономика должна работать на победу!"
  
 UPC.unificationtree.030.t: "Образцовые провинции"
 UPC.unificationtree.030.d: "За редким исключением, лидеры федералистов последовательно отстаивали дело переговоров. Воздерживаясь от ненужного кровопролития и жестокого обращения с народом страны, [ROOT.GetLeader] счел нужным превратить подконтрольные регионы в современные провинции и образец для подражания для всей нации.\n\nПрогресс всегда давался с трудом. Чэнь Цзюнмин, Тан Цзияо, Чжао Хэнти и Сюн Кэу предпринимали различные дипломатические вылазки с соперничающими правительствами, особенно с кликой Чжили и кратким возрождением Аньхой в середине 1920-х годов. Либо из-за их собственного выбора, либо из-за нарушения обещаний их партнерами, либо из-за их собственного отстранения от власти, эти усилия проваливались, пока Чжили не принудили Хунань и Юньнань к подчинению на неравных условиях.\n\nНесмотря на это, вернувшись к власти на Юге, [UPC.GetLeader] в целом наметил знакомый курс, хотя и с учетом уроков прошлого. Раздутый военный бюджет был урезан, что позволило правительству возобновить расходы на социальные программы, особенно на образование. Пороки, такие как азартные игры, опиум и проституция, были сдержаны, если не полностью запрещены в провинциях, поскольку ресурсы могут быть направлены на восстановление общественного порядка. Финансовая ответственность и разумное принятие займов позволили правительству Гуанчжоу процветать при его сравнительно коротком сроке пребывания у власти.\n\nС дополнительным пространством для проведения местных реформ, пока мы ищем возможность для Пекина прийти в себя, возникла интересная дилемма. Что делает наше Образцовое общество особенным? Его ограничения пороков? Возможно, его усилия в области образования и сокращение раздутых военных расходов? Или, может быть, даже его финансовая стабильность среди моря хаоса?"
 UPC.unificationtree.030.a: "Троекратное ура [UPC.GetLeader]! Победителю опиума!"
 UPC.unificationtree.030.b: "Троекратное ура [UPC.GetLeader]! Победителю неграмотности!"
 UPC.unificationtree.030.c: "Троекратное ура [UPC.GetLeader]! Финансово компетентному!"
  
 UPC.unificationtree.031.t: "Дары мира"
 UPC.unificationtree.031.d: "За редким исключением, лидеры регионалистов последовательно отстаивали дело переговоров. Воздерживаясь от ненужного кровопролития и жестокого обращения с народом страны, [ROOT.GetLeader] и другие региональные лидеры могут позволить себе обратить свое внимание (по крайней мере временно) на продуктивные цели.\n\nЭто никогда не было легким процессом. Лу Жунстин, Цэнь Чуньсюань, Чэнь Цзюнмин, Тан Цзияо, Чжао Хэнти и другие южные лидеры пытались договориться с Бэйянским правительством и положить конец гражданской войне, но с ограниченным успехом. Тем не менее, с этой временной передышкой от боев силы безопасности могут быть развернуты для подавления бандитизма и мародерства, в том числе в своих собственных рядах. Это позволяет восстановить порядок, а людям — процветать в этом мире.\n\nОбразовательные усилия также могут выиграть от стабильности и большего доступа к финансированию. Застопорившиеся усилия по борьбе с неграмотностью и другие проекты по улучшению положения людей и возрождению китайской деревни могут взлететь.\n\nНаконец, этот мир позволил бизнесу расти, солдатам демобилизоваться, а людям участвовать в благотворительных усилиях. Этот мир не может длиться вечно, но пока он есть, мы должны извлечь из него максимум пользы."
 UPC.unificationtree.031.a: "Мир приносит закон и порядок на землю."
 UPC.unificationtree.031.b: "Мир приносит людям знания и понимание."
 UPC.unificationtree.031.c: "Мир приносит нации процветание и развитие."
  
 ##UPC Digesting Other Factions Events 
  
 UPC.digestionevents.001.t: "Чжэцзянские федералисты"
 UPC.digestionevents.001.d: "Движение федералистов 1920-х годов имело своих сторонников в пяти восточных провинциях, которые в конечном итоге сформировали ядро Лиги Сунь Чуаньфана. Действительно, маршал Сунь, по крайней мере, на словах поддерживал идею федерализма во время своего правления, хотя его бренд федерализма был гораздо более реакционным и авторитарным, чем ранние итерации движения. Обезопасив Нанкин и подчинив пять провинций, местные группы, симпатизирующие федералистам, получили больше свободы действий.\n\nВозможно, наиболее прямой аналогичной фракцией является Движение за автономию Чжэцзяна, которое теперь возглавляет Чу Фучэн. Состоящее из местных реформаторов Тунмэнхоя и различных интеллектуалов, они положительно отреагировали на Федералистскую конституцию Хунани и вместе с аналогичными группами в Цзянси и Фуцзяни попытались принять собственные провинциальные конституции. Хотя они и близко не достигли такого успеха, как Хунань и Гуандун, они оказываются готовыми к сотрудничеству.\n\nМа Сюйлунь — педагог, работавший в прошлом с Чжан Тайянем. Интеллектуал, родившийся в Чжэцзяне, он преследовался обвинениями в симпатиях к Гоминьдану во время Северного похода, но сумел вернуться в политику в короткий период либерализации Чжили. Его Ассоциация содействия развитию демократии в Китае была в основном загнана в подполье после 1932 года, но так же симпатизирует нашему движению.\n\nЗа ними пытаются следовать различные милитаристы, националисты и регионалисты, которые пользовались их покровительством во время правления Суня и ожидают защиты взамен. Большинство из них принадлежат к клике чжэцзянцев Чэнь И, хотя некоторые были бывшими членами Аньхойского правительства Чэнь Тяоюаня. Они, несомненно, будут ожидать видных постов в дополнение к провинциальной автономии, если присоединятся к нашему правительству."
 UPC.digestionevents.001.a: "Конечно, нам пригодится любая помощь, которую мы можем получить!"
 UPC.digestionevents.001.b: "Мы должны быть избирательны в том, кого допускаем в наше движение."
  
 UPC.digestionevents.002.t: "Оплот демократии"
 UPC.digestionevents.002.d: "Хунань, которую иногда называют демократическим островом Китая, недавно вошла в наш состав. Более десяти лет провинцией правил ее гражданский губернатор Чжао Хэнти. Вскоре после прихода к власти в конце 1920 года одним из его первых действий было содействие созданию и внедрению Конституции провинции Хунань. С момента ее введения 1 января 1922 года Чжао был заметной фигурой в движении федералистов. Даже будучи частью клики Чжили и не имея возможности напрямую присоединиться к Великому республиканскому альянсу, Чжао использовал свое положение, чтобы смягчить отношение Чжили к ВРА, действуя во многих отношениях как легальный фронт для нас.\n\nОднако он не единственное имя Хунани в движении. Самым известным является Хуан Яньпэй, который в 1932 году бежал из Шанхая и оказался в Чанша, откуда и действовал последние несколько лет. А на местном уровне ФДПК уникально способна стоять самостоятельно во главе с Чжоу Шичжао, суровым критиком Чжао, который хотел бы его смещения с поста губернатора. Десятилетие Хунани в качестве федералистского эксперимента привело к развитию довольно надежного гражданского аппарата, который мог бы нам помочь.\n\nНо это еще не вся история. Чжао оставался губернатором не только благодаря своему гражданскому аппарату, но и благодаря армии Сян. Будучи далеко не аполитичной или лишенной мнений, она смирилась с тем, что Чжао прежде всего гражданское лицо, и с растущим гражданским контролем над местной армией. Хотя лишь немногие командиры являются истинными федералистами, армия в целом стала бы отличным дополнением к нашим рядам, позволив нам меньше полагаться на наших более сомнительных генералов.\n\nОднако наши ресурсы ограничены, и мы не можем нанять всех, поэтому нам придется сделать выбор между гражданским аппаратом Хунани или командирами армии Сян."
 UPC.digestionevents.002.a: "Гражданский аппарат Хунани — ее величайшая сила, мы должны использовать его."
 UPC.digestionevents.002.b: "Хунань выжила так долго только благодаря армии Сян, мы должны отплатить им тем же."
  
 UPC.digestionevents.003.t: "Вступая во владения Короля"
 UPC.digestionevents.003.d: "Бастион Юго-Запада и королевство республиканцев наконец пало перед армиями [ROOT.GetNameDef]. А вместе с ним — наследие мутной политической структуры и динамики, готовой к эксплуатации или подрыву любого стабильного правления в провинции. С падением Тан Цзияо ящик Пандоры политики открылся перед [ROOT.GetLeader] и его администрацией, и крайне важно, чтобы была реализована стабильная провинциальная политика.\n\nПри всех своих недостатках Тан Цзияо представляет собой, пожалуй, неизбежную данность. В любых других амбициях федералистского проекта в Юньнани он был бы обречен на провал без Тана. Возможно, самый выдающийся лидер федералистов на национальном уровне, его более прагматичный взгляд на идеологию, написанный вместе с Чжан Тайянем, одним из ее интеллектуальных основателей, привел к тому, что его интерпретация стала консервативной, но прогрессивной. Несмотря на политическую карьеру, полную жертв, он все же слишком крупное имя, чтобы от него отказываться. Вместе с ним местные демократы нового стиля являются естественным дополнением, чтобы обезвредить некоторые авторитарные наклонности Тана.\n\nНастоящий вопрос заключается в том, расширять ли администрацию провинции, чтобы включить в нее некоторых недоброжелателей Тана или его врагов. Например, клика Лун Юня, состоящая из помощников и сотрудников Бэйяна, симпатизирующих Гоминьдану, или Ху Жоюй и его влияние среди классов шэньши. Хотя их включение создало бы более сильное национальное движение, это открыло бы политику Юньнани, превратив ее в очередную пороховую бочку нестабильности."
 UPC.digestionevents.003.a: "Федерализм Юньнани — это игра Тана, а не их."
 UPC.digestionevents.003.b: "Они действовали только ради своей провинции."
  
 UPC.digestionevents.004.t: "Отделение Цянь от Дянь"
 UPC.digestionevents.004.d: "Пожалуй, черное пятно Юго-Запада, внутренняя политика Гуйчжоу (Цянь) всегда была повенчана с политикой ее более сильных, богатых и влиятельных соседей: Хунани, Юньнани (Дянь), Сычуани и Гуанси. Когда-то давно здесь доминировал клан Лю, базировавшийся в Синъи и неустойчиво поддерживаемый кликой Юньнани, Гуйчжоу оказалась втянутой в хаотичную инерцию Эры милитаристов и до недавнего времени была де-факто расколота пополам.\n\nВвергнутая в хаос Синьхая, захваченная Тан Цзияо при помощи Лю Сяньши (и от имени Цай Э), последующее правление Лю привело к тому, что политическая сцена Гуйчжоу застыла на линиях фронта внутри клики Гуйчжоу. Старая клика Синъи, возглавляемая семьей Лю, и Новая клика Синъи, возглавляемая Юань Цзумином. Кроме того, есть клика Тунцзы, шэньши, конституционалисты, функционально мертвая Новая клика Гуйчжоу и другие.\n\nВ то время как Старая клика Гуйчжоу прислушивается к эре реформаторов Синьхая, по крайней мере по духу, в рамках мандата нынешней оккупации произошел раскол относительно того, какого местного игрока наделить властью. В настоящее время на поле существует эклектичная Новая клика Синъи Юань Цзумина с ее слабыми связями с Младокитайской партией и проектом федералистов, наряду с коварной кликой Тунцзы Чжоу Сичэна. Другой вариант — клан Лю под руководством Лю Сяньцяня, древнего старика с плохой кровью против Юаня, но от которого в конечном итоге не ожидают многого. Или срединный вариант — конституционалисты под руководством Жэнь Кэчэна, которые сидят на задворках политики со времен своего расцвета в Синьхае, но, вероятно, накалят местную политику до предела."
 UPC.digestionevents.004.a: "Патриот и Палач гарантируют прогресс."
 UPC.digestionevents.004.b: "Лю Сяньцянь и его клан податливы."
 UPC.digestionevents.004.c: "Конституционалисты обеспечат гражданское верховенство."
  
 UPC.digestionevents.005.t: "Кадры федералистов в бассейне Красной реки"
 UPC.digestionevents.005.d: "С падением Чунцина в последние несколько дней было рекомендовано отправить чиновников в Сычуань, чтобы начать закладывать основу для самоуправления. Захват этого узла привлек наше внимание ко многим группам интересов и прошлым сторонникам федерализма, главным из которых является клика офицеров Сюн Кэу, вышедшая из подполья.\n\nСюн, со своей стороны, отстаивал федерализм еще в 1920-х годах, хотя его влияние угасло до сих пор из-за особенно враждебного отношения к этому идеалу в промежуточные годы. С Сюном также приходит смесь прогрессивных мыслителей, открывшихся федеральной модели, во главе с Чжан Ланем. Естественно, их включение в качестве местных и национальных акторов является предрешенным выводом.\n\nБолее насущной проблемой является присутствие других политических фигур, менее преданных делу федерализма. Печально известная фрагментированная природа Сычуани привела к тому, что многие мелкие полевые командиры удерживают свои собственные юрисдикции; главными главами являются генералы Лю Вэньхуэй, Дэн Сихоу и Ли Цзяюй, которые все недавно стремились продвигать повестку дня, более открытую для цели федералистов, хотя подозрения в их преданности движению в целом остаются. Имея основную связь с Младокитайской партией, которая сама является старой силой, основанной в Сычуани, эти люди посвящены в дело федералистов, хотя в некоторых областях отклоняются от идеологии, оставляя много разногласий по поводу их принятия в правительство."
 UPC.digestionevents.005.a: "Надевание костюма не смывает твоих грехов."
 UPC.digestionevents.005.b: "Их переориентация, возможно, спасла их."
  
 UPC.digestionevents.006.t: "В стране рек и долин"
 UPC.digestionevents.006.d: "Возможно, сравнимая только с Хунанью по своей национальной репутации крайне милитаристской провинциальной культуры, ландшафт и люди Гуанси в равной степени олицетворяют ее истерзанную войной историю. Как гласит распространенная поговорка Гуанси: «В Гуанси нет места без гор; нет гор без пещер; нет пещеры без бандитов». Разорванная между глубокими речными долинами и парящими горными вершинами, с бандитами на каждом уровне между ними, Гуанси — ужасно бедная провинция, практически с единственным достойным внимания городом: столицей провинции Наньнином.\n\nТочно так же, из-за явного доминирования Старой и Новой клик Гуанси, федерализм вряд ли имел благоприятную среду, чтобы пустить корни в провинции. Конечно, это не значит, что попыток не было. Во время расцвета Эпохи героев Гуанси 1920-х годов выдвигалось много альтернатив, чтобы стать союзником либо Чэнь Цзюнмина, либо Тан Цзияо.\n\nНапример, Лю Чжэньхуань, хотя якобы связанный с Кликой старой политической науки и Демократической лигой Китая, подал прошение Тан Цзияо в 1920-х годах, чтобы помочь его вторжению накануне Северного похода в обмен на губернаторство Гуанси. Линь Ху, член фракции Молодой Гуанси Старой клики Гуанси, был потенциальным соперником и одновременно сильным союзником Чэнь Цзюнмина, и даже сам Ма Цзи имел связи с Чжао Хэнти в Хунани.\n\nВ нынешнем положении, с растущими национальными перспективами движения федералистов, крайне важно, чтобы [ROOT.GetLeader] обеспечил союз с любыми желающими в регионе. Но его выбор довольно ограничен; всегда существующий вариант — это Лю Чжэньхуань, чьи макиавеллиевские маневры позволили ему позиционировать себя как «демократа». Но также можно сбалансировать его амбиции, установив связь с Линь Ху и Ян Симинем; его собственными ненадежными старыми союзниками."
 UPC.digestionevents.006.a: "Вряд ли вы найдете здесь честного федералиста..."
 UPC.digestionevents.006.b: "Мы можем быть великодушными, хоть немного."
  
 UPC.digestionevents.007.t: "Старые союзники и Жемчужина короны"
 UPC.digestionevents.007.d: "И это было сделано, великая кампания армии выиграла, пожалуй, лучший город на Юго-Западе, за исключением, возможно, Гонконга. Сияющий свет в дельте Жемчужной реки, Гуанчжоу, долгое время был резиденцией всех крупных южных правительств в Эру милитаристов. Принимая в своих городских пределах всевозможных чиновников, таких как Сунь Ятсен, Цэнь Чуньсюань, Чэнь Цзюнмин, Тан Цзияо, Тан Шаои, Ху Ханьминь, Ван Цзинвэй и многих других. Считающийся южным эквивалентом Нанкина или Пекина с точки зрения проецирования национальной мощи, его захват [ROOT.GetLeader] полностью узаконил его власть на Юго-Западе.\n\nОднако, естественно, с включением Гуанчжоу и прилегающих территорий в его администрацию, [ROOT.GetLeader] остался с... тем, что некоторые сочли бы смесью ненадежных друзей и зияющих ран, снова знакомящихся друг с другом. На пути к федерализму, пожалуй, было немного таких же стойких защитников его ценностей или, точнее, Чэнь Цзюнмина, как армия Юэ.\n\nВозглавляемые Е Цзюем и укомплектованные людьми, близкими к их Старому Шефу, а именно кликой Хайфэн, они сумели сохраниться навсегда благодаря выдержке, решимости, немного удаче и нескольким не самым славным сделкам. Однако вполне естественно, что клика и армия Юэ должны быть включены в новую администрацию.\n\nСо своей стороны, Чэнь Цзюнмин дал понять, что не стремится к полевому командованию, предпочтя остаться в политике. На столе остался вопрос: насколько широко мы открываем для них дверь?"
 UPC.digestionevents.007.a: "Только чистых, проверьте их всех на... важность."
 UPC.digestionevents.007.b: "Вся клика Юэ — доблестные воины федерализма."
  
 ##UPC Federal Elections 
 UPC.federalelections.000.t: "Начало избирательной кампании"
 UPC.federalelections.000.d: "Прошло много времени с тех пор, как в Китае проводились общенациональные выборы. Через полгода (в некоторых провинциях раньше) китайский народ отправится на избирательные участки и отдаст свои голоса за местные собрания, которые затем выберут кандидатов на более высокие уровни власти. Политические активисты и функционеры уже спустились в провинции, агитируя за конкурентные округа, чтобы склонить их на сторону своих покровителей. Настроение кажется приподнятым, люди более энергичны — смеем ли мы надеяться, что это будут самые демократичные выборы?\n\nГонка будет в основном посвящена завоеванию местных собраний и политических машин, а не простых масс, но народный мандат не помешает. Ни у одной из двух основных сторон нет полностью развитой национальной инфраструктуры для проведения кампаний, и они будут полагаться на местные партии и гражданские группы, чтобы помочь им пересечь черту. Кандидаты в президенты, [UPC_GetGRAPartyLeader] от Великого республиканского альянса и [UPC_GetCDLPartyLeader] от Демократической лиги Китая, в отличие от своих предшественников в системе Бэйян, будут немного более активны в агитации — путешествуя по стране, чтобы обеспечить необходимые голоса.\n\nОднако они вряд ли одиноки в этой гонке. Различные третьи партии борются за местные места, и ожидается, что хорошо зарекомендовавшие себя [UPC_GetDCPPartyName_nocolour] и Младокитайцы (YCP) станут главными соперниками двухпартийной системы, как и опальные социалисты, которые будут вызывать сбои, несмотря на притеснения. Множество независимых «любимых сыновей» также может быть трудно сместить в их политических вотчинах. Над гонкой нависает возможность отката демократии, и наблюдатели внимательно следят за [UPC_GetSTAPartyName], чтобы увидеть, будут ли они уважать процесс.\n\nС таким большим притоком впервые участвующих в политических кампаниях, многие из которых студенты и интеллектуалы, политическое настроение в стране может быть трудно оценить. Медленно, но верно становится очевидным, что..."
 UPC.federalelections.000.a: "...инициатива на стороне ВРА!"
 UPC.federalelections.000.b: "...ДЛК перехватывает инициативу!"
  
 UPC.federalelections.001.t: "Инаугурация Национальной ассамблеи"
 UPC.federalelections.001.d: "Выборы в Национальную ассамблею прошли, как и планировалось, и, будучи далекой от совершенства, система, похоже, в значительной степени устояла. Местные собрания направили новую партию законодателей в [UPC.Capital.GetCapitalVictoryPointName], и, хотя некоторые голоса продолжают оспариваться в суде, они не нарушат ход разбирательства. Просто проведение выборов, воспринимаемых как достаточно честные, является победой движения федералистов, но впереди еще много работы.\n\nПосле завершения президентских выборов необходимо сформировать новое правительство и назначить премьер-министра при поддержке законодательного большинства. Это может быть не самой простой задачей, учитывая, насколько раздробленным стал Китай. Неспособность законодательного органа работать с президентом для выполнения его повестки дня в разумные сроки может привести к скатыванию к авторитаризму, как это неоднократно случалось в прошлом. И всегда найдутся те, кто усомнится в том, насколько подлинно представительским является правительство.\n\nВсе знают, что окончательный президент будет выбран из числа победителей войн за объединение Китая — источник ропота среди проигравших и опоздавших. И учитывая недавнюю историю Китая с автократией, может быть, это более важные выборы из двух?"
 UPC.federalelections.001.a: "И теперь пришло время начать закулисные сделки."
  
 UPC.federalelections.002.t: "Президентские выборы [GetYear] года"
 UPC.federalelections.002.intro: "Президентские выборы, возможно, были самой ожидаемой частью этого избирательного цикла. Хотя различные конституции и другие законы пытались превратить Китай в парламентскую систему, на практике Китай всегда был президентским по своей природе. И немногие президенты добровольно покидали свой пост."
 UPC.federalelections.002.closer: "Впоследствии от нового президента ожидается создание работающего правительства. Переговоры о коалиции уже ведутся между третьими партиями и двумя лагерями, поскольку кандидаты в президенты стремятся не только заручиться поддержкой для себя, но и для своего выбора премьер-министра."
 UPC.federalelections.002.d.indirect: "$UPC.federalelections.002.intro$\n\nПрезидент должен быть избран косвенным путем: Национальная ассамблея проголосует за следующего главу государства Китая. Хотя формальные политические партии в Китае разрослись за последнее десятилетие или около того, партийная лояльность остается ограниченной среди рядовых членов. Будет много возможностей для торга с партийными лидерами и привлечения удобных перебежчиков.\n\n$UPC.federalelections.002.closer$"
 UPC.federalelections.002.d.direct: "$UPC.federalelections.002.intro$\n\nПрезидент должен быть избран прямым голосованием: миллионы китайских избирателей отдадут голоса за своего предпочтительного кандидата. Поскольку лидеры более крупных политических партий мудро воздержались от гонки под давлением, победа достанется одному из двух человек. Подсчет голосов занял некоторое время, однако ожидается, что новый президент будет объявлен в ближайшее время.\n\n$UPC.federalelections.002.closer$"
 UPC.federalelections.002.a: "Поздравляем [UPC_GetGRAPartyLeader]!"
 UPC.federalelections.002.b: "[UPC_GetCDLPartyLeader] побеждает!"
  
 UPC.federalelections.003.t: "Выборы в Ассамблею отложены на неопределенный срок"
 UPC.federalelections.003.d: "После изнурительных первых федеральных выборов у китайского политического истеблишмента было мало желания проводить еще один раунд кампании. Прошло три года, и выборы обычно назначаются через несколько месяцев. Однако за последние несколько недель в этом направлении было мало движения: никаких открытых кампаний или крупных объявлений кандидатов.\n\nНаконец, лидеры страны осторожно нарушили молчание. [UPC_GetGRAPartyLeader], [UPC_GetCDLPartyLeader] и другие старшие лидеры крупных партий объявили о совместном решении отложить следующие выборы в Ассамблею до завершения объединения Китая — спорное, но, возможно, понятное решение. Были некоторые протесты по поводу задержки, противники указывали на приостановку выборов в Ассамблею 1933 года как на самый ясный признак отказа клики Чжили от своих либеральных обещаний после их первоначального объединения."
 UPC.federalelections.003.a: "Печальная реальность для нашей нации."
  
 #Post Unification Events 
  
 UPC.federalelections.030.t: "Меняющаяся политика в Китае"
 UPC.federalelections.030.d: "С объединением нации Китай претерпел колоссальные изменения. В военном, политическом, социальном и культурном отношении Вторая японо-китайская война и (надеемся, окончательное) завершение Эры милитаристов безвозвратно подтолкнули нацию в новую эру. Становится все более очевидным, что движение федералистов станет окончательным победителем в стремлении Китая к объединению.\n\nВ результате национальная политика была перестроена вокруг склонностей, ожидаемых от нового федералистского порядка. Великий республиканский альянс и Демократическая лига Китая превратились из громоздких избирательных блоков в партии с гораздо более сплоченной национальной идентичностью, укрепляя свою власть в новой республике.\n\nТем не менее, они не одиноки в своей эволюции. Различные партии, гражданские группы и отдельные политики начали искать свою опору в новой политической системе. Ассоциации порождают формальные политические партии, независимые отстаивают свои позиции или присоединяются к коалициям, а партии адаптируют свои программы к новой системе. На более высоком уровне целые движения начали приспосабливаться к новым реалиям на местах.\n\nПоскольку Китай переходит в новую эпоху, быстрые изменения становятся все труднее контролировать истеблишменту. Различные группы упрямо отказываются прогибаться, оставаясь верными своим идеалам прежней политической среды. Другие изменились так быстро, что стали совершенно неузнаваемыми — Цзуншэ, например, превратилась в партию дворян и прав маньчжуров. Как бы то ни было, мыслители и политики Китая не будут ждать, чтобы их голоса были услышаны."
 UPC.federalelections.030.a: "Мы идем рука об руку к светлому федеральному будущему!"
 UPC.federalelections.030.b: "И все же мы не можем приветствовать всех вас в этом путешествии."
  
 UPC.federalelections.031.t: "Левые реорганизуются"
 UPC.federalelections.031.d: "Лишенные своей революции, радикальные левые обнищали, пытаясь найти смысл своего существования в эту новую эру. Лишенное какого-либо значимого способа борьбы с буржуазным порядком, раздробленное движение теперь борется с распадом, поскольку их лидеры разбегаются в разные стороны.\n\nЛига китайских синдикалистов, один из символов левого сотрудничества, распалась — их анархистские, марксистские и синдикалистские компоненты рассеялись в небытие. Китайская синдикалистская партия оказалась единственной организацией, достаточно стойкой, чтобы выжить в значительных масштабах, борясь за то, чтобы избежать цензуры и подавления.\n\nГоминьдан также оказался в плохой форме, поскольку объединение разрывает партию на части. Умеренные и гибкие фигуры, такие как Ван Цзинвэй и Гу Мэнъюй слева и Сунь Фо, Ян Юнтай и Цзюй Чжэн справа, сделали предложения новому правительству, предложив отказаться от насильственной революции и участвовать в выборах, если Гоминьдан будет легализован. Сторонники жесткой линии, такие как Дэн Яньда, Сун Цинлин, Ху Ханьминь и Дай Цзитао, остались столь же энергичными в своих нападках на Федеративную республику либо посредством продолжающейся насильственной военной борьбы, либо многословными тирадами, деконструирующими каждый аспект нового Китая.\n\nНа пепелище сформировались различные осколочные группы, больше не обязанные старому центральному комитету. Народная производственная партия Чэнь Миншу, Китайская демократическая крестьянско-рабочая партия Тань Пиншаня и Чжан Боцзюня и маргинальная Революционная лига суньятсенизма попытались участвовать в политике без балласта Гоминьдана. Некоторые радикалы никогда не примут республику, а социалистические партизаны тщетно сражаются, надеясь, что неизбежный прилив истории скоро принесет мировую революцию в Китай.\n\nДни революции, возможно, прошли, но исчезнут ли ее принципы на обочине или станут умеренными в мейнстриме, может определиться в первые годы республики."
 UPC.federalelections.031.a: "Если они действительно популярны, они могут участвовать."
 UPC.federalelections.031.b: "Обмани меня раз — позор тебе..."
  
 UPC.federalelections.032.t: "Наследники Лян Цичао"
 UPC.federalelections.032.d: "Реформистское движение Лян Цичао и Кан Ювэя оказало длительное влияние на китайскую политику. Кан был старшим и более консервативным из двоих, выступая за конституционную монархию. Лян разошелся с Каном, выступая за конституционное централизованное государство, на основе которого нация была бы достаточно сильной, чтобы заявить о себе на мировой арене. Колеблясь между правыми и левыми, он настаивал на том, что авторитаризм и автократия должны использоваться только в ограниченных обстоятельствах для продвижения прогресса. Лян в конечном итоге остался столпом китайского реформизма и конституционализма.\n\nПосле своей смерти Лян оставил разрозненный набор политических потомков. Его союзник и коллега Сюй Цинь сменил Ляна на посту лидера Китайской конституционной партии в 1929 году и повел ее в более резко консервативном направлении. Это спровоцировало раскол в ККП, и его протеже Сюй Сяньцзы организовал клику младогвардейцев «Демократических конституционалистов» в новой республике, чтобы заставить старую гвардию мирно уйти в отставку. Тан Хуалун собрал в Хунани собственную клику, напоминающую времена старой Исследовательской клики движения.\n\nДва протеже Ляна времен его левого поворота в 1920-х годах, Чжан Цзюньмай и Чжан Дунсунь, сформировали Партию демократического социализма после инцидента с «Семью благородными мужами». Но властная личность Чжан Цзюньмая рискует привести к расколу его партии.\n\nЭкстремисты лянистского толка, Младокитайская партия, сохраняют свои собственные разногласия. Радикалы под руководством Цзэн Ци настаивают на революционном методе, в то время как умеренные под руководством Ли Хуана и Цзо Шуньшэна начали использовать электоральные средства. Связав себя с Чжили во время Эры милитаристов, их сила уменьшилась, но не исчезла.\n\nИдеи Ляна также были популярны как среди милитаристов-регионалистов, так и среди государственников. Его призывы к сильному, централизованному и даже демократическому Китаю, пропитанному катехизисом социального дарвинизма, вероятно, будут привлекать сторонников еще долгие годы."
 UPC.federalelections.032.a: "Чжан Цзюньмай был ближе всех к Ляну перед его смертью..."
 UPC.federalelections.032.b: "Конституционалисты были его прочным наследием!"
 UPC.federalelections.032.c: "Только Молодой Китай смог внедрить инновации за пределы прошлого."
  
 UPC.federalelections.033.t: "Китайский либерализм XX века"
 UPC.federalelections.033.d: "В интеллектуальных кругах китайский либерал должен был быть маяком решительных идеалов и непоколебимым в своей вере в демократию. Но они оказались либо бессильными против волны милитаризма, либо были вынуждены пойти на компромисс со своими убеждениями, чтобы увидеть прогресс.\n\nНаиболее ярко это проявилось в случае Ху Ши, культового «Одинокого идеалиста», который считал себя выше коррумпированной игры в политику. Но он быстро утратил эту юношескую наивность и переключился на попытку организовать «Движение хороших людей», обеспечив сотрудничество между милитаристами и интеллектуалами в рамках возрожденного общества «Стремление».\n\nХу также ранее был членом Общества полумесяца под руководством Сюй Чжимо. ОП под новым руководством Ло Лунцзи, Вэнь Идо и Лян Шицю направило консервативно-либеральный демократический активизм вокруг Юго-Западного университета в Юньнани.\n\nНа севере Бэйянская республика породила собственные гражданские ассоциации. Клика политической науки и Клика коммуникаций были сформированы из бывших революционеров Тунмэнхоя, отвергших радикальный поворот Сунь Ятсена. Они обнаружили, что их влияние то росло, то ослабевало во время существования старой республики. Беспартийные в лучшие времена, их ниша дала им удивительную власть в различных качествах.\n\nБолее поздним событием стало появление Лиги срединных партий из тех, кому было отказано или отклонено вступление в ВРА или ДЛК. Возглавляемая Китайской партией народовластия Хунмэнь, которая была сформирована тайными обществами Хунмэнь, несогласными с авторитаризмом ВРА и политизацией ДЛК, она объединяет Китайскую национал-либеральную партию, Китайскую демократическую партию, Общество самоусиления, Партию гармонии, Партию лояльности и справедливости и возрожденное Общество возрождения и стоит на шаткой золотой середине. В нашем демократическом переходе кажется, что китайский либерал не умер, но, возможно, будет вынужден снова эволюционировать во второй половине века."
 UPC.federalelections.033.a: "Прогрессизм находит свое место под крылом Либералов!"
 UPC.federalelections.033.b: "Бизнес-интересы и беспартийность взлетают высоко!"
 UPC.federalelections.033.c: "Ни ВРА, ни ДЛК нельзя доверить демократию!"
  
 UPC.federalelections.034.t: "Новая эпоха в провинциях"
 UPC.federalelections.034.d: "Наблюдатели, как международные, так и местные, естественно, сосредоточились на широких, масштабных изменениях в национальной политике Китая. Крупные партийные съезды, изменения в партийных доктринах, появление нового поколения харизматичных политиков и построение демократии в самой густонаселенной стране на планете. Но региональная политика в Китае остается критически важной — возможно, даже в большей степени теперь, когда Китай является федеративной республикой.\n\nЭтот новый федерализм принимает иную форму, чем в эпоху Высокого милитаризма. Крупные милитаристы были в значительной степени уничтожены или покорены; их власть и независимость ограничены Центральной армией и федеральными законами. Тем не менее, для тех милитаристов, которые остались — как тех великих милитаристов, которые умно выбрали правильную сторону, так и тех многих мелких и местных милитаристов, от которых зависело новое правительство для стабилизации своего правления — их институциональные связи и мягкая сила позволяют им выживать.\n\nВласть Центрального правительства, несмотря на усилия регионалистских и анархистских ветвей движения федералистов, не была сломлена. Этатизм сохраняется, наделенный полномочиями двойных рычагов бюрократии центрального правительства и центральной армии. Некоторые из его компонентов были построены самими федералистами, созданными из ядра, которое объединило страну. Другие были просто унаследованы от системы Бэйян, которую оно свергло.\n\nДревнее «перетягивание каната» между периферией и ядром продолжается, как и всегда. Этот напряженный баланс пока держит обе стороны под контролем, удерживаемый пониманием того, что один кризис может полностью перевернуть доску, поставив под угрозу хрупкую систему и потенциально даже спровоцировав гражданскую войну. Но кто знает, будет ли это длиться вечно..."
 UPC.federalelections.034.a: "Только военные могут защитить Республику!"
 UPC.federalelections.034.b: "Федерализм должен быть защищен своими регионалистами!"
  
  #Post Democratic Back Sliding Events (060-089): 
 UPC.federalelections.060.t: "Федеральные выборы [GETYear] года"
 UPC.federalelections.060.d: "Вчера по всему Китаю закрылись последние избирательные участки. Представители от округов со всей страны прибудут в [UPC.Capital.GetCapitalVictoryPointName] и будут приведены к присяге, поскольку в ближайшие недели вступит в должность новая национальная ассамблея.\n\nКак и ожидалось, президент [ROOT.GetLeader] и его союзники получили большинство, выиграв от институциональной инерции и заткнутой оппозиции. Другие партии и независимые кандидаты предприняли попытки выиграть несколько конкурентных мест, почти все за пределами оплотов [UPC.GetRulingParty], с разной степенью успеха и подавления.\n\nПоявились некоторые проблески надежды на политическую оттепель, и различные другие партии отпраздновали небольшие победы, которые они одержали. Но в некотором смысле это кажется хуже идеалистам, потому что это означает, что такая договоренность может продолжаться бесконечно, поскольку демократы подчиняются этой новой реальности."
 UPC.federalelections.060.a: "Оппозиция одерживает несколько символических побед."
 UPC.federalelections.060.b: "[UPC.GetRulingParty] продолжает утверждать свое господство."
  
 ##Campaigning Events 
 #Provincial Campaigning Events 
  #Super Yield (200-209) 
 UPC.federalelections.200.t: "Кампания прибывает в Сычуань"
 UPC.federalelections.200.d: "Входя в бассейн Красной реки, раздробленная политика местной сычуаньской диорамы отразилась в национальной политике. Считаясь главными прародителями Демократической лиги Китая в Сычуани, Чжан Лань и Сянь Ин привязали свою местную вариацию движения к местному Офицерскому департаменту под эгидой Ли Цзяюя и Ло Цзэчжо, чтобы иметь шанс против высоко милитаризированных фракций региона. Аналогично, Чжан и Сянь поддерживают связи с филиалами «Департамента ускорения» Яна Сэня и Лю Сяна, и во время перехода от регионального политиканства к Федеральной провинции даже Баодинский департамент оказался в рядах ДЛК — возможно, только назло старым федералистам.\n\nОднако центральным элементом движения федералистов является Сюн Кэу, его Банда девяти и Офис подготовки федеральной автономии провинции Сычуань. В прошлом Сюну приходилось договариваться с местными ячейками Гоминьдана и другими радикалами, чтобы остаться на плаву, и он сохраняет их слабую поддержку.\n\nТретьей крупной силой в политике Сычуани являются различные нефедералистские партии, наиболее насущной из которых является Партия молодого Китая. Их родная провинция, они обладают бесспорной силой в местном районе, захватив сильный альянс Чжили-YCP межвоенного периода. В период междуцарствия находится ряд местных крестьянских и аграрных партий, в основном Либеральная партия крестьян Китая во главе с Хэ Лу и Ху Вэньланем и Крестьянская партия Китая во главе с профессором Дун Шицзинем (ответвление его Китайской ассоциации сельскохозяйственных реформ). Ни одна из них не стремится к сотрудничеству: ЛПКК склоняется влево, а КПК — вправо.\n\nНаконец, сохраняется малоизвестное Китайское общество самоусиления, связанное с Китайской демократической партией, основанной чунцинским журналистом Хоу Ецзюнем. Стремясь присоединиться к ДЛК, они в конечном итоге потерпели неудачу. В значительной степени контролируемые тайными обществами, они настроены антибюрократически и сохраняют нишу благодаря своим уникальным предложениям по сельской и социальной реконструкции."
 UPC.federalelections.200.a: "Похоже, милитаристы действительно могут носить костюмы..."
 UPC.federalelections.200.b: "Сюн снова поднимает знамя федерализма!"
 UPC.federalelections.200.c: "Младокитайцы и малые партии вырывают победу!"
  
 UPC.federalelections.201.t: "Полуостровная политика в Шаньдуне"
 UPC.federalelections.201.d: "Долгое время находившаяся под властью деспотичных милитаристов, провинциальная политика провинции Шаньдун оказалась изолированной от более широкой политической сцены. С искоренением милитаристского влияния различные местные политические группы бросились заполнять пустоту в новой Федеративной Республике.\n\nФракция «Резиденция советника» под руководством Чжан Гунчжи является местным ответвлением Прогрессивной партии лянистской славы. Занимая своего рода центристскую позицию в политике Шаньдуна и в основном состоящая из бывших бюрократов и традиционных ученых-интеллектуалов, она постоянно работала против всех милитаристов Шаньдуна и, таким образом, с их устранением начала действовать. Выработав негласный союз с Великим республиканским альянсом, они считаются главными предвестниками любых выгод, которые они надеются получить в провинции, хотя их убежденность в федерализме близка к нулю.\n\nС фракцией Резиденции прагматично сотрудничал «Клуб советников» под руководством Ван Чаоцзюня. Первоначально являясь отделением Гоминьдана Шаньдуна, они практически потеряли связь с Гоминьданом в 1916 году. Состоящий из бывших революционеров и представителей широкой общественности, он также работал против милитаристов Шаньдуна, хотя его левые верительные грамоты неоднократно подвергались критике, будучи воспринятыми как оторванные от реальности. В конечном итоге им не удалось добиться принятия в Демократическую лигу Китая, и поэтому они в значительной степени выступают как независимые.\n\nНаконец, хотя и не столь значительная, как две вышеупомянутые группы, существует клуб «Тунжэнь» под руководством Ань Пэндуна. Якобы проправительственная, это была фракция Резиденции, которая отделилась от них в начале 1920-х годов, заняв прогубернаторскую позицию. Состоящая в основном из гражданской бюрократии истеблишмента и неактивного военного персонала, они в значительной степени основывали свою платформу на том, чтобы «не раскачивать лодку». Полагаясь на вражду между фракциями Клуба и Резиденции (теперь, когда их общий враг исчез), чтобы позиционировать себя как стабильный и надежный вариант в провинции."
 UPC.federalelections.201.a: "Резиденция и ВРА восстанавливают гармонию в Шаньдуне!"
 UPC.federalelections.201.b: "Клуб и ДЛК приносят прогресс для всех!"
 UPC.federalelections.201.c: "Клубу Тунжэнь удается сплотиться ради стабильности!"
  
 UPC.federalelections.202.t: "В доме Чжили"
 UPC.federalelections.202.d: "Поскольку выборы снова погружают резиденцию многих правительств Китая в пучину событий, федералисты Юга обнаружили, что они довольно отрезаны от жестокого мира политики [GetVictoryPointName_9843].\n\nС негласным политическим союзом, основанным на сохранении конфуцианской модели «Хороших людей» и государственного социализма, остатки гражданского крыла Лоянской группы У Пэйфу (Департаменты по политическим делам и Секретариата) вступили в политический союз с национальным отделением Младокитайской партии. Вместе с ведущей [UPC_GetDCPPartyName_nocolour_long], эта импровизированная группировка соединяет все сферы политической жизни [GetVictoryPointName_9843].\n\nДействуя в тревожной золотой середине «Республики джентльменов», различные независимые и другие республиканские группы объединились в санитарный кордон с Великим республиканским альянсом, чтобы попытаться вернуть беспартийную политику. Сформированный по соглашению общества «Стремление», Клики политической науки, Нового военно-морского общества, Ассоциации товарищей движения за автономию и последователей Ян Ду и Лю Шипэя, этот раздробленный союз опирается на поддержку беспартийной и номинально федералистской политики.\n\nПротивостоит обеим вышеупомянутым группировкам главный знаменосец Демократической лиги Китая на севере — Федерация национального спасения Шэнь Цзюньжу. Вместе с такими партиями, как Новая социал-демократическая партия Китая Цзян Канху, Форум демократии и науки, Китайское профессионально-образовательное общество, Ассоциация сельской реконструкции и Китайская синдикалистская партия Ли Дачжао, они представляют левый и популистский фронт против предполагаемой несправедливости, творимой над китайским народом.\n\nНаконец, по ветру развеяны остатки Ассоциации гармонии, Лиги процветания, Общества Цзинсин и Группы Цзиньбао. Поверженные, но, конечно, не сломленные, они сохраняют большую часть функционеров и бюрократии старого правительства и цепляются за укоренившуюся позицию в провинции Чжили. Естественно, их смещение дестабилизировало бы ситуацию в Чжили."
 UPC.federalelections.202.a: "Правительство достойных людей живет в коалиции Лоян-YCP-[UPC_GetDCPPartyName_nocolour]!"
 UPC.federalelections.202.b: "Хуан Фу и Ху Ши склоняются к беспартийности и ВРА!"
 UPC.federalelections.202.c: "Прогресс и демократия не умерли при ДЛК!"
 UPC.federalelections.202.e: "Истеблишмент обеспечивает стабильность и процветание!"
  
 UPC.federalelections.203.t: "Хэнань и двор Нефритового маршала"
 UPC.federalelections.203.d: "Долгое время являясь полем битвы между бандитами и армиями милитаристов, Хэнань знала лишь относительную стабильность и мир в Эру милитаристов. Управляемая как перекресток между Пекином и Уханем, она чаще разрывалась на части, чем оставалась единой. И все же в последнее время, при губернаторе Ли Цзичэне из Офицерской фракции Лоянской группы У Пэйфу, она стала свидетелем чувства стабильности, но не процветания.\n\nБудучи домом для базы операций У Пэйфу в Лояне, Хэнань сохранила чувство строгой и принудительной дисциплины даже в повседневной гражданской жизни. Прочно укоренившись в провинциальной политике, Офицерская фракция, Департамент по политическим делам и Фракция секретариата отложили в сторону свои разногласия, чтобы представить единый Лоянский фронт в провинциальной политике. Представляя себя знающими интересы народа и даже вспоминая расцвет правления «Хороших людей», Ли Цзичэнь сумел кооптировать политическое движение Чжили в свое собственное.\n\nВ офицерский корпус Чжили, академии и саму Лоянскую фракцию вплелась Младокитайская партия. Хотя и не такая сильная, как, возможно, в Цзянсу, Шаньси, Чжили или Сычуани, им удалось заключить натянутую сделку с [UPC_GetDCPPartyName_nocolour_long] и, что довольно любопытно, с Великим республиканским альянсом, чтобы создать довольно серьезную угрозу доминированию Лояна.\n\nПоскольку ВРА удалось политически прорваться на север, Демократической лиге Китая пришлось бороться за местные крестьянские и аграрные группы, с которыми можно было бы вести счет. Вместе собрались различные местные независимые, надеющиеся сохранить свое ограниченное влияние. Довольно странно, что возникли остатки оккупации Хэнани Народной армией (Гоминьцзюнь), а давнее повстанческое движение Чжан Готао в горах Дабе вышло из подполья. Представляя левый вариант для местной политики, любое приведение этих различных радикалов, теперь связанных с ДЛК, к власти привело бы к значительной дестабилизации местной политики."
 UPC.federalelections.203.a: "Ли Цзичэнь наследует мантию Нефритового маршала!"
 UPC.federalelections.203.b: "Младокитайцы, конституционалисты и ВРА приносят перемены!"
 UPC.federalelections.203.c: "Альянс ДЛК-КСП-ГМЦ встряхивает провинцию!"
  
 UPC.federalelections.204.t: "Выборы в Гуандунском побоище"
 UPC.federalelections.204.d: "Южное китайское предгорье, провинция Гуандун, долгое время была центром различных оппозиционных правительств, и поэтому ее местная политика неоднократно переворачивалась с ног на голову. Политически динамичная, она то приливала, то отливала по мере того, как волны революции, реформизма и милитаризма прокатывались по ней. Главное ядро движения федералистов, многие его бюрократы, набраны из этой провинции.\n\nВ основном являясь резиденцией власти Чэнь Цзюнмина и его движения, Партия общественных интересов, ориентированная на напряженные отношения крестьян и шэньши, оказалась в центре внимания новой Федеративной Республики. Связаны воедино левые и правые ПОИ, а также различные независимые милитаристы, ставшие государственными деятелями, такие как Дэн Бэньинь (с его мертвой хваткой на Цюнъя) и Хун Чжаолинь (удерживающий Чаомэй).\n\nПеребравшись в Гуандун в качестве своей базы операций после репрессий Сунь Чуаньфана против левых после 1932 года, Чжан Цзюньмай и его различные лево-лянистские конституционалисты оказались во главе местного отделения Демократической лиги Китая. Под эгидой регионального главы Сюй Фулиня это была в основном гонка двух лошадей между Великим республиканским альянсом под руководством ПОИ и ДЛК.\n\nОднако спойлером выступает контингент Гоминьдана в провинции. Всегда являясь главным очагом революционных настроений, они остаются проблемой для местных парламентских партий. С сельскими повстанцами, городским пролетариатом и анархистским движением в придачу, некоторые из Гоминьдана отделились от основного отделения, чтобы баллотироваться в местные органы власти, но другие настаивали на Данго.\n\nНаконец, кандидатами с одним вопросом выступает Клика политической науки в регионе, такая как Линь Чжэнсюань. Держась за надежду, что они могут действовать как серые кардиналы, к ним присоединяется возрождающаяся когорта Клики коммуникаций и доминирующая на местном уровне группа «Все классы для спасения Гуандуна» под руководством Чэнь Ляньбо. Опираясь на свои связи с Тан Шаои, первым премьер-министром, они заявили о своих притязаниях на наследие Старых революционеров и Республики прошлых лет."
 UPC.federalelections.204.a: "Общественный интерес ведет Гуандун к победе!"
 UPC.federalelections.204.b: "Новый Китай под властью ДЛК."
 UPC.federalelections.204.c: "Политическая наука и Чэнь Ляньбо захватывают свое право первородства..."
 UPC.federalelections.204.e: "Радикализм снова захватывает Гуандун!"
  
 UPC.federalelections.205.t: "Цзянсу: Логово тигра"
 UPC.federalelections.205.d: "Некогда резиденция Улыбающегося тигра, Нанкин был местом многих поворотных моментов в истории Китая, и как уважаемая Южная столица стал полем битвы для различных политических партий и ассоциаций в новой Федеративной Республике. Хотя когда-то он был довольно популярной горячей точкой для идеологии федералистов, наравне с Шанхаем и Чжэцзяном как своего рода интеллектуальный центр движения, его статус был значительно снижен после Шанхайского восстания.\n\nОднако это не обязательно означает, что движение мертво в регионе. Поскольку различные умеренные и независимые республиканцы благосклонно относятся к предложениям Великого республиканского альянса, старое Общество Су (ответвление гражданской местной автономии на основе шэньши) увидело своего рода прото-возрождение в договоренности с ВРА. Будучи внутренне не едиными и далекими от авангарда провинциальной политики, они стремятся сотрудничать со старыми федералистами.\n\nНа противоположном фланге стоят различные группы Демократической лиги Китая, объединенные под руководством некоторых из ее самых видных государственных деятелей. На местном уровне широко уважаемая Китайская ассоциация содействия развитию демократии Ма Сюйлуня стоит высоко, вместе с печально известным Чжан Цзюньмаем и его Партией демократического социализма, а также почитаемым Хуан Яньпэем и Китайской ассоциацией демократического национального строительства и Китайским профессионально-образовательным обществом. Привлекая Консорциум Цзяннань под руководством братьев Жун из-за их позиции в поддержку индустриализации и банковских связей Чжан Дунсуня, их список увидел редкий союз шэньши, банкиров, крестьян и пролетариата, мало чем отличающийся от собственного политического наследия Сунь Чуаньфана.\n\nНаконец, в качестве спойлеров выступают различные разрозненные группы независимых или иных относительно мелких политических игроков в провинции. Бывшие филиалы патронажной сети Чжили, такие как Ян Вэнькай, отколовшиеся от Консорциума Цзяннань, Общество Цзинсин под руководством Ли Линьсы, Младокитайская партия под руководством Ли Баочжана и даже [UPC_GetDCPPartyName_nocolour_long] — все выдвинули кандидатов."
 UPC.federalelections.205.a: "Общество Су и ВРА выполняют свои обещания."
 UPC.federalelections.205.b: "Деловые связи и идеализм продвигают ДЛК!"
 UPC.federalelections.205.c: "Цзинсин, Молодой Китай, конституционалисты и Чжили делят Цзянсу."
  
  #High Yield (210-219) 
  
 UPC.federalelections.210.t: "Хунань и федеральный пример"
 UPC.federalelections.210.d: "Кампания набирает обороты в провинции Хунань. У ВРА есть местная звезда в лице Чжао Хэнти и его Общества обновления народа. Чжао, будучи губернатором более десяти лет, имеет заметные связи среди шэньши и политического истеблишмента и мобилизует их, пытаясь заставить избирателей голосовать за кандидатов ВРА в Хунани.\n\nОднако его более консервативный уклон открыл его левый фланг для эксплуатации ДЛК. Чжоу Шичжао, который возглавлял ФДПК, а теперь возглавляет ДЛК в Хунани, использует свои левые верительные грамоты, чтобы заручиться поддержкой прогрессивных и ориентированных на труд избирателей. В то же время есть Хуан Яньпэй, хотя теперь он воспринимается как национальная фигура, который потратил несколько лет на строительство школ и Китайской ассоциации демократического национального строительства (теперь компонент ДЛК) в Хунани. Теперь он использует это накопление для мобилизации поддержки ДЛК, формируя твердую левую оппозицию ООН Чжао.\n\nХотя в основном в Хунани доминируют две основные партии, есть также три третьих партии. Во-первых, это Ассоциация автономии Сянси, в основном построенная вокруг Чэнь Цюйчжэня и Шэнь Цунвэня и ориентированная на партикуляризм Сянси. Во-вторых, это Младокитайцы, хунаньское отделение которых возглавляет Цзо Шуньшэн, который пытается перехватить голоса националистов и консерваторов, недовольных Чжао и Чэнем. Наконец, есть [UPC_GetDCPPartyName_nocolour], сосредоточенная вокруг Тан Хуалуна. Несмотря на ослабление из-за ухода Тан Сянмина, Тан Хуалун сумел выкроить собственную политическую нишу в Хунани, используя свои старые связи и личную популярность, став главной третьей партией провинции."
 UPC.federalelections.210.a: "ООН Чжао Хэнти выходит вперед, так как ДКП отбирает места у ДЛК."
 UPC.federalelections.210.b: "Чжоу Шичжао и ДЛК приходят первыми, поскольку YCP отъедает правое крыло Чжао."
 UPC.federalelections.210.c: "Тан Хуалун получает небольшое большинство благодаря союзам с Шэнем и Цзо."
  
 UPC.federalelections.211.t: "Вызов королю Хубэя"
 UPC.federalelections.211.d: "Первоначально являясь местом Учанского восстания и точкой возгорания Синьхайского восстания, провинциальная политика Хубэя оказалась далеко оторванной и удаленной от своего расцвета как спонтанного очага революции, изменившей нацию. Поскольку многие из Старой клики Хубэя рассеялись в Юэяне (вслед за Тан Сянмином и Хуалуном), они в значительной степени были низведены до неактуальности после назначения Сяо Яонаня губернатором.\n\nОпираясь на успехи Ван Чжаньюаня и его катастрофическое правление, Сяо показал себя стойким и решительным членом Чжили. Выступая посредником в конфликтах между У Пэйфу и Цао Кунем, он стал решающим звеном их южного фланга, даже если ненадолго переметнулся после Второй Чжили-Фэнтяньской войны. Под своим правлением он принял большие меры предосторожности, чтобы сотрудничать как с гражданскими, так и с военными элементами провинции, создав «Хубэйский генеральный корпус» с Ха Ханьчжаном, группировку ветеранов Учанского восстания. Работая с шэньши, он практически контролировал все сферы провинциальной политики Хубэя, закрывая большинство других игроков, и даже делал предложения как движению федералистов через Чжао Хэнти, так и Гоминьдану через Сунь Фо и Ван Цзинвэя.\n\nДоминируя как в военном, так и в гражданском секторах провинциальной политики, непостоянный характер Сяо, его интриги и обман создали фронт для нападок на него со стороны местной оппозиции. Один из самых известных милитаристов, его прохладное взаимодействие с Великим республиканским альянсом дало боеприпасы Демократической лиге Китая для осуждения их положения в провинции.\n\nВыставив собственных кандидатов, ДЛК сыграла незначительную роль в стимулировании импульса различных независимых в попытке свергнуть почти двадцатилетнее правление Сяо в провинции. Под совместным списком Младокитайской партии, [UPC_GetDCPPartyName_nocolour_long] и бывшей клики Аньхой они сделали гонку намного более напряженной, чем она должна была быть для Сяо, хотя немногие верят, что они представляют реальную угрозу для короля Хубэя."
 UPC.federalelections.211.a: "Сяо и Генеральный корпус подавляют инакомыслие."
 UPC.federalelections.211.b: "Долой короля Хубэя!"
  
 UPC.federalelections.212.t: "Аньхой и дела двух клик"
 UPC.federalelections.212.d: "Место резни в Уху и видная провинция Лиги восьми провинций, Аньхой видела рождение двух клик и является краеугольным камнем антиконцессионного движения под руководством Ши Лянцая. Это не говоря уже о премьерском статусе, который занимал в провинции Чэнь «Дурак» Тяоюань. Хотя он не обязательно является действующей силой, большое количество его бывших сторонников из Чжили вышли из тени. В сочетании с возрождением Аньцинской клики происходит возвращение [UPC_GetDCPPartyName_nocolour_long] и Младокитайской партии на политический авансцена. В значительной степени объединившись со своими различными модернистски настроенными товарищами из Аньцинской клики, они позиционируют себя как кандидаты истеблишмента в провинции.\n\nНекогда родина Дуань Цижуя и его адептов, клика Аньхой в значительной степени рассеялась по ветру, поскольку их расцвет 1910-х и 20-х годов уходит в историю. Однако Движение за автономию Чжэцзяна в значительной степени перекинулось на местную политику Аньхоя, несколько связывая провинции и клику Аньхой вместе. Чу Фучэн, номинальный лидер ДАЧ, в значительной степени превратил свою партию в Южное отделение Форума демократии и науки, работая вместе с Великим республиканским альянсом в оппозиции к сотрудничеству их Северного отделения с Демократической лигой Китая.\n\nОпираясь на Ма Сюйлуня и его Китайскую ассоциацию содействия развитию демократии, Демократическая лига Китая использовала КАСД в сочетании с ПДС Чжан Цзюньмая и ее местным охватом, чтобы представить популистский фронт. Вместе с Китайской ассоциацией демократического национального строительства и Китайским профессионально-образовательным обществом Хуан Яньпэя им удалось втянуть Консорциум Цзяннань в свой альянс, наряду с несколькими членами Китайской синдикалистской партии и Гоминьдана."
 UPC.federalelections.212.a: "Возрождение Аньцинской клики?"
 UPC.federalelections.212.b: "Может ли Аньхой жить дальше в ФДН?"
 UPC.federalelections.212.c: "К удивлению всех, гамбит ДЛК срабатывает!"
  
 UPC.federalelections.213.t: "Чжэцзян и столкновение серых кардиналов"
 UPC.federalelections.213.d: "Часть экономического центра Китая вдоль Янцзы, Чжэцзян управлялся кликой Чжили в 1930-х годах. Во время Гражданской войны Чжэцзян оставался оплотом социального порядка Южной Чжили, а Чу Фучэн возглавлял Движение за автономию Чжэцзяна. Влив свою организацию в Великий республиканский альянс, он создал ведущий избирательный блок в Чжэцзяне, вступив в союз с остатками бывшей Чжили бывшего губернатора Чэнь И, а также с Младокитайцами, которые сохраняют присутствие благодаря видным местным военным офицерам.\n\nНекоторые в ДАЧ решили не вставать на сторону ВРА, а немногие предпочли пригласить нескольких бывших офицеров клики Аньхой и Лигу возрождения к участию. Младогвардейцы ДАЧ также нарушили ряды, чтобы встать на сторону ПДС Чжан Цзюньмая. Он тоже бросил свою шляпу в гонку в Чжэ, причем друг Чжан Цзюньмая Чжан Дунсунь очень хочет завоевать свою родную провинцию. Консорциум Цзяннань также поддержал Чжан Цзюньмая из-за их общих стремлений к индустриализации, а также финансовых связей Чжан Дунсуня.\n\nПомимо ПДС, у ДЛК также есть организация Ма Сюйлуня Китайская ассоциация содействия развитию демократии, действующая в провинции. Помимо усилий Ма и Чжана, Хуан Яньпэй и Китайская ассоциация демократического национального строительства и Китайское профессионально-образовательное общество приложили значительные усилия в провинции. Вместе ДЛК надеется, что усилия Ма, Хуана и Чжана приведут к победе на выборах для них в такой ключевой провинции-поле битвы.\n\nНа краях политического мейнстрима находится Гоминьдан, который все еще имеет значительное влияние. Дай Цзитао, наряду с Обществом революционных товарищей Чжэцзяна, состоял из членов Гоминьдана из провинции, и многие из самых радикальных в партии называли Чжэцзян своей родиной. Хотя большинство их не любит, Дай и братья Чэнь пользуются поддержкой местных радикалов и некоторых банкиров через финансовые связи клики CC в регионе, а организованная преступность и остатки социалистов, по слухам, находятся в сговоре с Дай Чуньфэном."
 UPC.federalelections.213.a: "Победа Прогрессивного альянса!"
 UPC.federalelections.213.b: "Чэнь И и Чу Фучэн держат оборону!"
  
 UPC.federalelections.214.t: "Пепел Фэнтяньской клики"
 UPC.federalelections.214.d: "Центральная часть империи Старого маршала, провинция Фэнтянь несет на себе грехи его многолетнего правления в Дунбэе. Из-за вражды между кликой Чжан и ее обласканными подфракциями, такими как Шаошуай или Хэйлунцзян, наряду с кликой Сикан Ян Юйтина, Лигой возрождения и остатками Аньхой Ван Итана, Кликой коммуникаций Цао Жулиня, Ассоциацией согласия и всеми другими мелкими группировками внутри Фэнтяньской клики, она была поистине растерзана низложением всей установленной военной власти в провинции.\n\nОднако после этого политический фронт удалось сформировать не Великому республиканскому альянсу или Демократической лиге Китая, а остаткам старого порядка. А именно, Младокитайская партия вступила в действие, используя свои местные штаб-квартиры в различных военных академиях (в первую очередь в лекционном зале Фэнтяньской армии), чтобы повысить свою популярность среди бывших солдат и северной интеллигенции. Сотрудничая с бывшими милитаристами Фэнтяня, Кликами коммуникаций и Лигой возрождения, им удалось кооптировать большое количество политической легитимности Фэнтяня, делая лишь смутные аллегории на Великий республиканский альянс в лучшем случае.\n\nС в конечном итоге нестабильной оккупацией провинции, многие из самых откровенных милитаристов армии решили сохранить военную оккупацию. Хотя на первый взгляд такой шаг выглядит как рыцарская реконструкция истерзанного войной региона, многие идеалисты выступают против такого маневра, видя в нем просто игру, чтобы гарантировать, что Младокитайская партия и истеблишмент Фэнтяня не возместят свои потери.\n\nДовольно странным поворотом событий стало то, что один генерал Фэнтяня, человек по имени Чжоу Явэй, выделился, став своего рода «темной лошадкой». Воссоздав Общество возрождения эры Синьхай со своей женой Инь Жуйчжи, членом которого он был изначально, оно является смутно националистическим, республиканским и в конечном итоге неприсоединившимся."
 UPC.federalelections.214.a: "Коалиция Молодого Китая доминирует в провинции..."
 UPC.federalelections.214.b: "Продлить военную оккупацию!"
 UPC.federalelections.214.c: "Общество возрождения... побеждает?"
  
 UPC.federalelections.215.t: "Цзянси и радикальный остаток"
 UPC.federalelections.215.d: "Половина центра давнего социалистического мятежа, Цзянси никогда не была особо процветающей или стабильной провинцией после завершения Северного похода. Цзянси страдала и сетовала в свете Мин-Ганьского мятежа, и, несмотря на кампании окружения, ситуация так и не улучшилась вплоть до восстания. И все же с новой Федеративной Республикой политическая ситуация омолодилась глотком относительно свежего воздуха.\n\nПри губернаторе Чэнь Гуанъюане местное движение за автономию нашло твердую почву в Цзянси. Надеясь оживить истерзанную войной провинцию, оно попыталось разработать собственный Акт об автономии провинции и Конституцию. В конечном итоге, однако, Движение за автономию Цзянси было расколото и бессильно против военной силы, навязанной такими, как Чэнь и другие. Низложенный после первого Северного похода Сунь Ятсена, уход Чэня не привел к росту Движения за автономию, поскольку «Тигр Цай» Чэнсюнь принес провинции дальнейшие потрясения. И после его низложения правление Фан Бэньжэня привело к объединению различных уездов с номинальными выборами, и подобная сцена начала разыгрываться снова.\n\nПод влиянием успеха местного федерализма в Хунани и Гуандуне различные милитаристы Цзянси, наряду с шэньши, сделали большие предложения Великому республиканскому альянсу и, по сути, стали их лошадью в гонке.\n\nНа противоположном конце находится Провинциальный комитет Демократической лиги Китая в Цзянси. Проведя свой первый съезд в Наньчане, Сюй Дэюань, уважаемый профессор Пекинского университета, получивший образование в Германии, был избран его председателем. В сотрудничестве со своим другом Чжу Эдо, пионером китайского лесоводства, экспертом по чаю и членом как Китайской синдикалистской партии, так и Федерации национального спасения, дуэт сумел направить различных радикалов Гоминьдана и КСП на представление левого варианта против истеблишмента и ВРА.\n\nКак бы то ни было, природа Цзянси такова, что победа одной стороны в конечном итоге радикализирует другую."
 UPC.federalelections.215.a: "Чем больше все меняется, тем больше все остается по-прежнему."
 UPC.federalelections.215.b: "Сюй Дэюань и Левые ДЛК срывают куш!"
  
  #Medium Yield (220-229) 
  
 UPC.federalelections.220.t: "Гуанси и федеральный идеал"
 UPC.federalelections.220.d: "Провинция, охваченная бандитизмом и беспорядками с заката Цин, Гуанси отреагировала на такие распри равным количеством тяжелой милитаризации, и различные местные региональные клики очаровывали и использовали такую военную мощь, чтобы восполнить ее сравнительную нехватку богатства.\n\nМало того, Гуанси является домом для самого большого собрания меньшинства чжуан, являющихся коренным населением провинции. Выживая от Тан и до Цин, чжуаны видели свой взлет и падение с точки зрения региональной власти и милитаристской культуры. С наступлением последних дней Цин многие крестьяне-чжуаны приняли участие в Синьхайской революции в составе Тунмэнхоя и далее в Гоминьдане, включая таких, как Вэй Бацюнь. Точно так же они пользовались местной защитой и автономией, отчасти потому, что ключевые чиновники Старой Гуанси, такие как Лу Жунстин и Тань Хаомин, были этой этнической принадлежности, и даже Цэнь Чуньсюань и Лу Дао являются представителями этого меньшинства.\n\nХотя и Великий республиканский альянс, и Демократическая лига Китая имеют значительное присутствие из-за решающего характера Гуанси в истории федералистов, они в значительной степени полагаются на крупных милитаристов региона. Партию общественных интересов, со своей стороны, возглавляет Лэй Жунко в регионе, и она получила поддержку от Линь Ху из Старой Гуанси. На противоположном фланге ДЛК пользуется покровительством бывшего милитариста и члена КПН Лю Чжэньхуаня, а также независимых интеллектуалов, таких как Юй Сунху.\n\nИ несмотря на годы подавления, Гоминьдан остается в некоторой степени активным в провинции почти полностью из-за явной настойчивости Новой клики Гуанси, хотя символическое количество левых под руководством Вэй Бацюня и Юй Цзобая действует локально вокруг Байсэ. Обращаясь к угнетенным и отчаянно нуждающимся в переменах, они стали опасно мощными. Почти слишком мощными, так что некоторые в правительстве сигнализируют, что правительство должно вмешаться, чтобы не дать радикализму перевернуть провинцию."
 UPC.federalelections.220.a: "Пыл из Гуандуна захлестывает Гуанси!"
 UPC.federalelections.220.b: "Лю Чжэньхуань и ДЛК захватывают провинцию."
 UPC.federalelections.220.c: "Повстанцы Гоминьдана угрожают стабильности выборов."
  
 UPC.federalelections.221.t: "Юньнань и меч федералистов"
 UPC.federalelections.221.d: "Спасители Республики и Короли Юго-Запада, провинция Юньнань часто прыгала выше головы, на что ей давала право ее географическая номенклатура. Гористая, бедная, полная бандитов и опиума, она, тем не менее, представляла собой одну из самых значительных и славных военных сил всей Эры милитаристов. Родина одноименной клики Юньнань, которая практически синонимична движению федералистов региона, она является бастионом идеологии. Кроме того, в Юньнани проживает большое количество меньшинств, и все они в равной степени требуют права голоса: и, бай, лису, хани, маонань, тай, хуэй, ва, лаху, наси, тибетцы и другие. Некоторые из них обласканы, в то время как другие довольствуются своей изоляцией.\n\nС объявлением федеральных выборов Юньнань в значительной степени стала гонкой двух сторон между кликой Юньнань и местной оппозицией. Поскольку местные коммерческие интересы и шэньши играют большую роль в местной политике, они не всегда слепо поддерживали клику Юньнань, и некоторые отделились, чтобы вести переговоры с оппозицией в довольно любопытных договоренностях между крестьянами-популистами и их потенциальным угнетателем.\n\nТесно связана с кликой Юньнань Партия народного правительства Тан Цзияо. Вдохновленная буддизмом и консервативно-федералистская, они связывают свое идеологическое вдохновение с легендарным Чжан Тайянем. Совместимые с местными лянистами, они даже сумели переманить в свои ряды некоторых членов местной Младокитайской партии.\n\nОднако из-за своего прошлого, когда она предлагала защиту ряду интеллектуалов, подавляемых Центральным правительством, клика Юньнань непреднамеренно породила собственную оппозицию в рамках партийной политики провинции. Став основой Демократической лиги Китая в Юньнани, Ло Лунцзи и (отделение Цинхуа) Общества полумесяца, к которым присоединилось доморощенное умеренное руководство Су Хунгана и Цунь Шушэна, выставили леволиберальный демократический фронт для противодействия клике Юньнань. Хотя их присоединение запоздалых бывших социалистов, таких как Ян Ибо, вызывает много вопросов у властей."
 UPC.federalelections.221.a: "ПНП и союзники побеждают, как и ожидалось."
 UPC.federalelections.221.b: "Удивительно, но ДЛК побеждает оппозицию вопреки всему."
  
 UPC.federalelections.222.t: "Передача опеки над Гирином"
 UPC.federalelections.222.d: "Под эгидой «Стража Гирина» Чжан Цзосяна Гирин (Цзилинь) видел относительное процветание во время его правления. Поле битвы между Россией, Японией и Китаем, он, тем не менее, имеет один из самых промышленно развитых секторов Китая. Хотя военная администрация несколько омрачает ситуацию, недавно объявленные федеральные выборы привели в действие многих старых товарищей Цзосяна, лакеев Фэнтяньской клики и других.\n\nСтраж, больной и отошедший от дел, омолодил Гирин в свое время и в значительной степени почитается в провинции как герой, а в Фэнтяньской клике — как верный старейшина. Невероятно популярный, Цзосян реформировал администрацию по меритократическим принципам, сократил коррупцию, уничтожил бандитизм, исправил в остальном нестабильную фискальную политику и местное налогообложение и полностью запретил производство, транспортировку, продажу и потребление опиума. Используя дополнительные средства от своих усилий, он продвигал общественное благосостояние и инфраструктурные усилия, а также сосредоточил инвестиции в образование, основав Гиринский провинциальный университет и будучи его президентом до выхода на пенсию.\n\nЗа ним стоит внушительное провинциальное наследие, поскольку двое его родственников претендуют на роль наследников политического тяжеловеса Цзосяна. Фэн Чжаньхай, племянник Цзосяна, рассматривался как восходящая звезда в Фэнтяньской клике. Молодой, предприимчивый и яростно патриотичный, он стал точкой сбора для различных независимых, и даже Младокитайская партия вяло поддержала его, в основном чтобы служить оппозицией влиянию Китайской синдикалистской партии.\n\nЧжан Тиншу, сын и биологический наследник Цзосяна, также рассматривался как своего рода восходящая звезда в Фэнтяньской клике. Близкий друг Молодого маршала Чжан Сюэляна со школьных времен, он яростно анти-японски настроен, и благодаря контактам с Федерацией национального спасения и различными ячейками Гоминьдана на Северо-Востоке, он стал любопытным центром левой политики на Северо-Востоке и слабо поддерживается КСП."
 UPC.federalelections.222.a: "Фэн Чжаньхай и Младокитайцы приносят новую демократическую зарю!"
 UPC.federalelections.222.b: "Чжан Тиншу и КСП обеспечивают реальные перемены!"
  
 UPC.federalelections.223.t: "Фуцзянь и путь к федерализму"
 UPC.federalelections.223.d: "Одна из самых гордых и передовых прибрежных провинций Китая, Фуцзянь видела немало раздоров и хаоса во время Эры милитаристов. Запертая гористой внутренней частью, она обладает процветающей прибрежной культурой и является прародиной большинства зарубежных китайских потомков, все крутится вокруг крупного прибрежного города Фучжоу — захваченного посольскими кварталами — и его военно-морских традиций.\n\nСама Фуцзянь не была особенно отделена от движения федералистов, так как в начале 1920-х годов армия Юэ оккупировала регион вместе с Гоминьданом и другими революционными группами, участвуя в различных реформах под влиянием анархистов с тяжелым, но популярным успехом. В 1922 году Совет провинции Фуцзянь выпустил телеграмму, объявляющую о разработке провинциальной конституции, и в 1925 году ввел такую конституцию, однако из-за опровержения провинциальных усилий Дуань Цижуем, Чжоу Мэнжэнем и Са Чжэньбином движение федералистов было объявлено провальным, а совет был распущен в 1926 году.\n\nС мощной и основательной оккупационной властью Великий республиканский альянс начал кооптировать часть старого членства Движения за конституцию провинции Фуцзянь, а также бюрократию бывшего Чжили Чжоу Иньжэня. Демократическая лига Китая, со своей стороны, сформировала свой Фуцзяньский провинциальный комитет с довольно противоречивым Линь Чжифу в качестве председателя.\n\nБудучи связанным с Гоминьданом, Линь служил в Новой Четвертой армии вплоть до того, как федералисты двинулись на Пекин. Присоединившись к Демократической лиге Китая, он считается ядром крайне левых в группе. Из-за природы Фуцзяни как одного из основных регионов повстанческого движения Мин-Гань, она кишит сторонниками левого Гоминьдана и сочувствующими, многие из которых продолжают сражаться, однако Линю удалось привлечь многих из них, чтобы укрепить свою базу поддержки в регионе. Некоторые говорят, что они присоединяются к ДЛК, другие говорят, что они «просачиваются» в нее."
 UPC.federalelections.223.a: "ВРА и консерваторы предотвращают беспорядки."
 UPC.federalelections.223.b: "Мечта Сунь Ятсена живет в ДЛК!"
  
 UPC.federalelections.224.t: "Шаньси: Образцовая провинция"
 UPC.federalelections.224.d: "Эффективно исполняя обязанности губернатора с 1911 года, Янь Сишань контролировал Шаньси более 25 лет до краха Чжили, и вся политика была сосредоточена вокруг «Образцового губернатора». С тех пор многое, безусловно, изменилось, благодаря его грандиозным провинциальным проектам наряду с многогранной и прагматичной идеологией. Контролируя бюрократию, армию и имея то налаживающиеся, то разлаживающиеся отношения с шэньши и купеческим классом, «Клика Цзинь» Яня казалась первостепенной в Шаньси.\n\nС провозглашением новой Федеративной Республики остатки клики Цзинь реорганизовались в то, что называют (Новым) клубом Синьхай. В него входят старые военные лоялисты, участники неоконфуцианского Общества омовения сердца Яня и его националистической Лиги жертвенности. Младокитайская партия, у которой были небольшие отделения в Шаньси под прямым покровительством Цзинь, также разрослась, и к ней присоединились шэньши. Хотя все эти условия в значительной степени настраивали клуб Синьхай на прямую победу, они пострадали от многих крупных перебежчиков из-за того, что Лян Хуачжи принял мантию лидера, которого многие считают просто марионеткой его дяди, Яня.\n\nКлючевыми перебежчиками из клики Цзинь являются Шан Чжэнь, который всегда был своего рода изгоем и революционно настроенным человеком в рядах Цзинь; он присоединился к Великому республиканскому альянсу, баллотируясь в Шаньси как их кандидат. Привлекая коммерческие интересы, связанные с Пекином и, следовательно, с центральным правительством, наряду с другими политическими умеренными.\n\nПытается нарушить статус-кво Демократическая лига Китая. Поскольку Партии демократического социализма Чжан Цзюньмая позволили создать отделения при Яне, реальной силой местной операции является Студенческая ассоциация Шаньси. Наполненная либералами, прогрессистами и социалистами, Чжао Пилянь, еще один перебежчик из клики Цзинь и бывший директор Народной нормальной школы в Тайюане, стал их лидером — имея достаточно хорошие связи с истеблишментом, чтобы иметь шанс на победу."
 UPC.federalelections.224.a: "Лян Хуачжи и остатки Цзинь были предрешенным итогом."
 UPC.federalelections.224.b: "Шан Чжэнь приносит ВРА уверенную победу."
 UPC.federalelections.224.c: "Чжао Пилянь приносит ДЛК неожиданную победу."
  
 UPC.federalelections.225.t: "Семейная вражда Гуйчжоу"
 UPC.federalelections.225.d: "Гуйчжоу долгое время разрывалась между политической динамикой Юго-Запада, хотя чаще всего была прикована к делам Гуанси, Сычуани, Хунани или, что наиболее важно, Юньнани. Во время Синьхайской революции здесь доминировали две политические фракции — реформистское Общество подготовки конституции и революционное Общество изучения самоуправления — и с вторжением в Гуйчжоу Тан Цзияо (по приказу Цай Э) предпочтение было отдано конституционалистам, которые послужили основой для современной политической структуры Гуйчжоу.\n\nДолгое время укоренившись в Гуйчжоу, клан Лю сумел закрепить свою роль «защитников» Гуйчжоу в начале Эры милитаристов, обезвредив конституционалистов и эффективно создав союз шэньши-купцов-консерваторов в провинции. Эффективно прозванная (Старой) кликой Синъи, они были свергнуты из-за инцидента Минцзю, когда Ван Вэньхуа, Лу Дао, Хэ Инцинь и Гу Чжэнлунь (среди прочих) попытались совершить переворот против Лю Сяньши. Убийство Юань Цзумином по приказу Лю позволило убийце Вана подняться к известности в рамках Новой клики Синъи, позже предав клан Лю в 1920-х годах.\n\nВ Великом республиканском альянсе доминирует Старая клика Синъи под руководством древнего Лю Сяньцяня, которому решительно противостоит Новая клика Синъи под руководством Юаня, который взрастил местную Младокитайскую партию Гуйчжоу, чтобы она действовала как его идеологический орган. Демократическая лига Китая, со своей стороны, изо всех сил пыталась найти желающих союзников и довольно опасно связала свою судьбу с кликой Тунцзы Чжоу Сичэна. Невероятно гибкий человек, Чжоу даже начал использовать пепел Общества изучения самоуправления старого правительства Революционного комитета Гоминьдана для поддержания своей заявки на власть.\n\nКроме того, ходят слухи, что Жэнь Кэчэн, последний из старых конституционалистов, ведет переговоры с Чжоу о присоединении к его широкой коалиции, надеясь одержать последнюю победу в своей средней карьере."
 UPC.federalelections.225.a: "Старая клика Синъи возвращает лидерство в Гуйчжоу."
 UPC.federalelections.225.b: "Новая клика Синъи утверждает свое господство."
 UPC.federalelections.225.c: "Клика Тунцзы сплачивает разрозненную коалицию для перемен."
  
  #Low Yield (230-239) 
  
 UPC.federalelections.230.t: "Шэньси: Вотчина политической науки"
 UPC.federalelections.230.d: "Провинция Шэньси сохраняет одну из самых богатых историй во всем Китае. Родина Сианя, она считается одной из колыбелей китайской цивилизации: тринадцать феодальных династий основали свои столицы в провинции от династии Чжоу до династии Тан. Несмотря на свою историческую важность, она оставалась довольно бедной, как и большинство внутренних провинций с конца Цин.\n\nС момента объединения Чжили в 1920-х годах она фактически была разделена на две зоны влияния. Югом и столицей Сиань управлял робкий соратник Чжили губернатор Лю Чжэньхуа. Член Клики политической науки, он является их самым высокопоставленным должностным лицом в национальной политике. Севером управлял Фэн Юйсян и его разрозненная Народная армия (Гоминьцзюнь), сплотившаяся в отчаянном соглашении с Янь Сишанем из Шаньси.\n\nУ самого федерализма был короткий период в провинции, когда член клики Аньхой Чэнь Шуфань из Шэньси откликнулся на предложение своего коллеги по Аньхой Лу Юнсяна использовать знамя «объединенного управления» для борьбы против Бэйянского правительства. Потерпев поражение от Фэн Юйсяна в 1921 году, и после полного уничтожения его армии, он ушел из политики и сосредоточился на буддизме. Хотя он и не очень актуален, он сделал символическую поддержку Великому республиканскому альянсу в Шэньси.\n\nМестное отделение Демократической лиги Китая было сформировано из старых филиалов Гоминьцзюня и Гоминьдана, включая одного из «Красных священников» Фэн Юйсяна, Юй Синьцина. Впитав в свои ряды различных сочувствующих левым, они начали использовать популизм и аграризм для получения голосов.\n\nНекогда самый главный актер в провинции, Лю Чжэньхуа не тот, кто будет сидеть сложа руки. Даже несмотря на то, что его Чжэнсунцзюнь была побеждена, ему удалось накопить достаточно политического капитала — с помощью [UPC_GetDCPPartyName_nocolour] — чтобы почти закрыть большую часть политической оппозиции, и он сплотил КПН, чтобы сохранить свою провинцию."
 UPC.federalelections.230.a: "КПН использует свои связи для обеспечения Шэньси."
 UPC.federalelections.230.b: "Федералисты Шэньси воссоединяются для нового старта."
 UPC.federalelections.230.c: "Левые Шэньси объединяются в рабочую коалицию."
  
 UPC.federalelections.231.t: "Демократия в Сибэе?"
 UPC.federalelections.231.d: "Сибэй, означающий Северо-Запад Китая, в основном представляет три провинции Цинхай, Нинся и Ганьсу, из которых Цинхай и Нинся — одни из новых провинций в стране. Долгое время здесь доминировала клика Ма, группа хуэйских милитаристов; на самом деле исторически это были три семьи, но из-за вражды и другой динамики они в значительной степени объединились в клику Ма Цинхая, клику Ма Нинся и клику Ма Ганьсу. Будучи довольно регионалистскими, они остаются стойко китайскими и часто участвовали в национальной политике во вспомогательной роли, например, во время их пребывания в Гоминьцзюне.\n\nСам Сибэй — это регион, полный этнического, культурного и религиозного разнообразия и, как следствие, напряженности. Дом для тибетцев, хуэйцев, ханьцев и монголов, его политика гораздо менее идеологична и гораздо более личная, этническая или религиозная. Пропагандируя ислам Ихевани, Ма рассматривают его как более умеренную и патриотичную интерпретацию и регулярно подавляют Сайлайфэнъе и другие исламские секты, рассматриваемые как сепаратистские, особенно связанные с уйгурами в Синьцзяне. Подобное отношение можно наблюдать к тибетцам и монголам в Цинхае, хотя в Алашаньском аймаке Ма Хунбинь проявил довольно мягкую руку.\n\nВнезапные визиты ведущих кандидатов в Ланьчжоу привлекли новое внимание к довольно отдаленному району, но как таковой Сибэй полностью лишен какой-либо социалистической или либеральной идеологической базы. ФДПК прошлого смогла создать несколько небольших интеллектуальных групп, таких как Северо-Западная демократическая политическая группа и Северо-Западная молодежная антиимпериалистическая ассоциация содействия демократии, но многие считали их неудачными начинаниями.\n\nВ конечном счете, поскольку Сибэй в основном придерживается своей изолированной и племенной жизни, цветам демократии может потребоваться время, чтобы расцвести. Некоторые выступали за то, чтобы просто работать с местными старейшинами для обеспечения согласия и послушания, но другие идеалисты настаивали на закладке фундамента для будущей демократической структуры."
 UPC.federalelections.231.a: "Кандидаты сосредотачиваются на обеспечении продолжения сотрудничества лидеров хуэй."
 UPC.federalelections.231.b: "Кандидаты пытаются построить партийную инфраструктуру на будущее."
  
 UPC.federalelections.232.t: "Национализм Внутренней Монголии и федеральный проект"
 UPC.federalelections.232.d: "Внутренняя Монголия видела немало раздоров в эпоху милитаристов. Разорванный между своей китайской и монгольской идентичностью, революцией и традицией, федерализм — поздний гость в разделенной пастушеской степи.\n\nНа западе Гоминьдан первым сформировал организованную политическую партию. Бай Юньти, один из протеже князя Гуна и член Гоминьдана, объединился с Монгольской националистической партией, чтобы сформировать Националистическую партию Внутренней Монголии в Калгане для объединения различных революционеров Внутренней Монголии. Но НПВМ позже разделилась на три фракции: «Руководящий комитет» харачина Бая, «Новая» даура Фуминтая и «Молодежная» тумеда Уланьху.\n\nНа другой стороне прохода (но часто разделяя членство с фракцией Руководящего комитета) находятся «Молодые монголы» князя Дэ. Эклектичный союз монгольских националистов, студентов, знати и революционеров перешел от консервативного к относительно плюралистическому взгляду. Сэчин Джагчид (один из близких протеже Дэ) возглавляет движение за их участие в федеральной политике в рамках своего прогрессивного Монгольского молодежного альянса. ММА, ММ и НПВМ(РК) стремились сформировать панидеологическую коалицию. Не желая подчиняться ни ДЛК, ни ВРА, коалиция отказалась сотрудничать с любой из партий, выступая прежде всего за монгольскую автономию и национализм.\n\nСо своей стороны, политический наследник князя Гуна, У Хэлин, остался один со своей Группой консолидации и реабилитации Монголии, предполагая свою открытость для работы как с ДЛК, так и с ВРА.\n\nТем временем Восточный автономный кокус Внутренней Монголии сплотился под руководством Буянмандуху, Манибадары, Хафэнги и Асхана. Наиболее влиятельные в монгольских районах, ранее находившихся под властью Фэнтяньской клики, они возглавили усилия по реформированию, в которых доминировали хорчин-харачины, даже под эгидой Чимедсампила, лидера аймака Джерим. Сочувствуя прогрессивным усилиям, они в целом выступили против феодальной системы Монголии, ведя переговоры с ВРА."
 UPC.federalelections.232.a: "Левая НПВМ дестабилизирует регион."
 UPC.federalelections.232.b: "Монголия может выжить только при коалиции ММА-ММ-НПВМ(РК)!"
 UPC.federalelections.232.c: "У Хэлин и ГКРМ достигают неудачного компромисса."
 UPC.federalelections.232.e: "Альянс ВАКВМ-ВРА приносит надежду на будущее!"
  
 UPC.federalelections.233.t: "Хэйлунцзян: Ледяной рубеж"
 UPC.federalelections.233.d: "На окраинах северо-восточной границы Китая Хэйлунцзян — это ледяная и негостеприимная земля, которую лишь немногие называют домом. В Эру милитаристов Хэйлунцзян находился под властью Фэнтяньской клики Чжан Цзолиня, родина которой базировалась в Трех северо-восточных провинциях. Чжан отправил своего старого друга У Цзюньшэна управлять Хэйлунцзяном в качестве губернатора, который взял Вань Фулиня и Ма Чжаньшаня своими заместителями. У был в основном не заинтересован в управлении и оставил работу своим двум подчиненным.\n\nС падением Фэнтяньской клики и объединением Китая, предпринятым [ROOT.GetLeader] и федералистами, бывшая администрация Фэнтяня в значительной степени осталась нетронутой, поскольку Федеральное правительство все еще пытается консолидировать весь собственно Китай и обуздать бывшие администрации милитаристов. Провинциальное правительство Хэйлунцзяна в значительной степени симпатизировало кликам Возрождения и Коммуникаций, состоящим из бывших парламентариев и офицеров клики Аньхой.\n\nМестный военный гарнизон, который продолжает подавлять местных социалистических партизан, указал на свое предпочтение сильным усилиям по централизации по всей Республике, причем некоторые особенно любят Младокитайцев. Хэйлунцзян также является домом для значительного числа белых русских эмигрантов, которые бежали из-за гражданской войны в России и режима Савинкова и имели обширные связи с истеблишментом Фэнтяня, тем самым усиливая влияние Лиги возрождения.\n\nВРА [ROOT.GetLeader] имеет лишь небольшую связь с Дуань Цижуем и Лигой возрождения, но есть надежда, что их партнерство будет электорально плодотворным. Отдельно от титанов политики Хэйлунцзяна генерал Чжоу Явэй и его жена Инь Жуйчжи создали собственную небольшую партию, восстановленное Общество возрождения. Первоначально осколок Тунмэнхоя, Общество возрождения теперь является смутно республиканской и националистической партией, сосредоточенной вокруг самого Чжоу и не связанной ни с ВРА, ни с ДЛК."
 UPC.federalelections.233.a: "Старый порядок остается нетронутым."
 UPC.federalelections.233.b: "Победа выскочек!"
  
 UPC.federalelections.234.t: "Политические дуэли и будущее Тайваня"
 UPC.federalelections.234.d: "Будучи оккупированным Японией с момента окончания Первой японо-китайской войны, Тайвань пережил длительный период отделения от материкового Китая, однако этот период был полон сопротивления. Возникла серия движений, требующих, чтобы Тайвань воссоединился с Китаем или иным образом получил самоуправление, что в конечном итоге проявилось в формировании Тайваньской культурной ассоциации под руководством Линь Сяньтяня и Цзян Вэйшуя. Прогрессивная по взглядам, она постепенно радикализировалась, что привело к ее роспуску после японских арестов членов.\n\nС основанием близкой к Гоминьдану Тайваньской народной партии Цзяном после его сдвига влево, консерваторы в ТКА ушли, чтобы сформировать Тайваньский альянс за самоуправление под руководством Линь Сяньтяня, поклонника Лян Цичао. По сути, копируя борьбу материка между революцией и реформизмом.\n\nВ новую эру ТНП изо всех сил пыталась найти опору из-за политического радикализма и авторитаризма Цзяна, вступающих в противоречие со многими умеренными, такими как Цай Пэйхо, которые угрожали дезертирством. Их сотрудничество с маргинализированной Тайваньской синдикалистской партией также было подозрительным, поскольку китайские политические власти подавляли ее с тех пор, как прибыли на остров.\n\nТем временем многие из бывших шэньши и других элит острова, которые сотрудничали с японской оккупацией, попытались переключиться на работу с новым китайским режимом с переменным успехом — восприятие ТАС как непатриотичного в значительной степени повредило его репутации у оккупационных властей.\n\nИграя роль спойлера в качестве третьей партии в дополнение к двум основным партиям на острове, на сцену ворвалась Ассоциация товарищей по возрождению Тайваня, возглавляемая братьями Ляо Вэнькуем и Ляо Вэньи. Состоящая из получивших западное образование технократов и интеллектуалов, она является в целом либеральным движением, стремящимся обхаживать как ВРА, так и ДЛК одновременно, хотя и приняла более неоконфуцианскую интерпретацию во время дебатов Чжан Цзюньмая и Ху Ши о витализме и прагматизме."
 UPC.federalelections.234.a: "ТНП и левые побеждают на выборах!"
 UPC.federalelections.234.b: "ТАС опровергает обвинения и побеждает!"
 UPC.federalelections.234.c: "АТВТ несется к победе на либеральной волне!"
 UPC.federalelections.234.e: "Оккупационные власти материка продолжают диктовать выборы."
  
 UPC.federalelections.235.t: "Шанхай: городская горячая точка Китая"
 UPC.federalelections.235.d: "Париж Востока, Шанхай, пожалуй, самый достойный китайский город, чтобы получить этот титул. Крупнейший и самый процветающий, он, возможно, является настолько крупной политической единицей сам по себе, что заслуживает особого обращения, отличного от остальной части провинции Цзянсу. Возвращение Китаем городов-посольств стало крупным триумфом для [UPC.GetName], наконец завершив Век унижений и объединив страну в момент вечного национального единства. Но, конечно, политиканство должно продолжаться.\n\nШанхай также, конечно, был местом крупных китайских рабочих движений, несмотря на жестокое подавление Шанхайского восстания 1932 года. Он, естественно, также переполнен связями с триадами, которые часто поддавались революционному республиканизму и национализму — размывая границы между Триадой и Революционером. В дополнение к Гоминьдану, КСП, ДЛК и ВРА появилось много более мелких партий.\n\nАнь Жодин, редактор журнала «Одинокая звезда» и основатель Общества одинокой звезды, является сторонником «великого рыцарского духа», использующего самосовершенствование как инструмент классового освобождения, внедрения тридемизма и достижения Датун. Используя свое Ученое общество формирования духа, он надеялся положить конец правлению Чжили, использовать европейский национал-популизм для укрепления внутренней дисциплины и единства. Несмотря на это, он имеет связи как с правыми, так и с левыми из Гоминьдана.\n\nЗеленые банды спонсировали продвижение Чжу Сюэфэня через почтовые профсоюзы, что привело к созданию Общества решимости. Несмотря на обвинения в желтом юнионизме, он стал известным организатором труда и сформировал Китайскую рабочую партию. Несмотря на свое прошлое в КСП и криминале, он на удивление переметнулся к ДЛК. Со своей стороны, братья Чжан использовали свои элитные связи, чтобы привлечь голоса за ДЛК.\n\nВРА использовала Форум демократии и науки Чу Фучэна, чтобы пережить трудные времена в регионе Цзяннань, к которому присоединились различные другие интеллектуалы в Шанхае, вставшие на сторону ПОИ и ПНП."
 UPC.federalelections.235.a: "Радикальные левые выносят резкое порицание новому правительству."
 UPC.federalelections.235.b: "ДЛК собирает центристскую либерально-рабочую коалицию, чтобы одержать полную победу на выборах!"
 UPC.federalelections.235.c: "ВРА объединяет федералистов и интеллектуалов на фоне консервативных страхов."
  
  #Fringe Yield (240-249) 
  
 UPC.federalelections.240.t: "Ножи наголо в Синьцзяне"
 UPC.federalelections.240.d: "Синьцзян — отдаленная провинция от центров китайской власти на Центральных равнинах, но [ROOT.GetLeader], тем не менее, решил провести в регионе масштабную кампанию. СМИ, освещающие выборы, предположили, что истинной целью выборов было отпраздновать восстановление Республикой китайской власти от Востока до Запада, и что повышенное внимание побудило оппозицию также отправить участников кампании в Дихуа, вынудив [ROOT.GetLeader] действовать. Сказать, что избирательная кампания прошла не гладко, было бы преуменьшением: местные повстанцы чуть не застрелили президента.\n\nЕсли [ROOT.GetLeader] намеревался подчеркнуть восстановленную власть в Дихуа, главное послание, которое, похоже, было продвинуто, заключается в том, что большая часть Синьцзяна остается нестабильной, и истинная стабильность ускользает от провинции, несмотря на все усилия временного провинциального военного правительства. Этническая напряженность также не ослабла, поскольку коренные уйгуры и кумульцы по-прежнему скептически относятся к ханьскому господству в местном и центральном правительстве. Однако шокирующее количество местных лидеров выразили желание работать с правительством. Юлбарс-хан, последний канцлер Кумульского ханства, примирился с центральным правительством и заявил о своем сотрудничестве.\n\nМасуд Сабри и Иса Альптекин, ранее принимавшие участие в Восточно-Туркестанской республике, также являются умеренными консервативными уйгурскими лидерами, готовыми сотрудничать с китайским правлением в поисках автономии. Бурхан Шахиди, которого обычно считают сочувствующим Гоминьдану, но гибким в своей лояльности, также заявил о своей готовности сотрудничать с Федеральным правительством. Однако более радикальные уйгурские лидеры бывшей Восточно-Туркестанской республики — будь то из-за националистических, социалистических, исламистских или какой-то смеси между ними причин — отвергли призывы участвовать в выборах, поклявшись продолжать насильственную борьбу за полную независимость."
 UPC.federalelections.240.a: "Коллаборационисты формируют рабочую коалицию!"
 UPC.federalelections.240.b: "Страх будет держать местные системы в узде."
  
 UPC.federalelections.241.t: "Будущее тибетской сангхи"
 UPC.federalelections.241.d: "Тибет, как и Внешняя Монголия, веками был регионом, где господствовала буддийская сангха. Под почти автократической властью регентов и могущественных лам даже Далай-лама был убит или иным образом подчинен прихотям духовенства. Поскольку монастыри и дворяне контролируют большую часть материальных богатств, простые люди совершенно лишены какой-либо формы народного представительства — многие даже являются рабами монастырей.\n\nОднако не все так мрачно. По мере того как современная эпоха достигала Тибетского нагорья, период победы прореформаторских клик в тибетской борьбе за власть 1920-х годов привел к масштабной модернизации на плато. С их успехом и дальнейшим развитием были созданы такие организации, как Партия улучшения Тибета и Группа Кичо Кунтун.\n\nПартия улучшения Тибета, вдохновленная Индийским национальным конгрессом и основанная такими людьми, как Пандацанг Рапга, Тубтен Кунохека и Соланг Гьялпо, номинально придерживается социализма, проповедуемого Азад Хинд, поскольку большинство их рядов учились в Калькутте. Однако, как правило, они считаются несколько синофилами, яростно выступают против Далай-ламы и содержат радикальное крыло, возглавляемое Рапгой.\n\nКичо Кунтун — довольно загадочная группа, которая, как считается, была основана Ципоном Лунгшаром. Или, по крайней мере, так хотят, чтобы вы верили, его враги. Тем не менее, Лунгшар действительно обладает определенной политической поддержкой и тесной кликой относительно либеральных (по тибетским стандартам) умеренных, которые, похоже, посвящены в успехи Великого республиканского альянса и надежды на автономию для тибетского народа.\n\nХотя правительство может подтолкнуть местную политику в таком направлении, чтобы предпочтительные кандидаты, КК и ПУТ, одержали победу, всегда есть возможность уважать местный демократический процесс — какими бы ни были результаты."
 UPC.federalelections.241.a: "Мы контролируем выборы, и мы контролируем, за кого голосуют."
 UPC.federalelections.241.b: "Придерживаться наших принципов не повредит."
  
 UPC.federalelections.242.t: "Раскол Великого Монгольского Государства"
 UPC.federalelections.242.d: "Второй раз за столетие Великое Монгольское Государство было поставлено на колени китайской оккупацией. Включенные в состав Цин в 1691 году после смешанного периода сотрудничества и войны, земли Внешней Монголии получили относительную автономию по сравнению со своими собратьями из Внутренней Монголии, а после усилий Монгольской революции 1911 года — квазинезависимость и союз с Хулун-Буиром и Баргой на востоке. Дисфункциональная в лучшие времена, Монголия была подчинена кликой Аньхой в 1919 году.\n\nЭта вторая оккупация породила множество новых политических ассоциаций и партий для противодействия китайской оккупации. Восточное Хурэ, Консульский холм и Группа дворян. Объединившись в оппозиции против китайцев, они сотрудничали скупо, причем первые две группы объединились в Монгольскую народную партию (МНП) в середине 1920 года под руководством Догсомына Бодоо и Солийна Данзана. Сотрудничая с Гоминьданом — отправив Цэрэн-Очирына Дамбадоржа, Дамдина Сухэ-Батора и Ажваагийна Данзана на их Первый конгресс в 1924 году — раздробленные личности МНП привели к высококонкурентной внутренней среде с неоднократными отстранениями в межвоенный период.\n\nИз-за полного отсутствия избирательной инфраструктуры выборы во Внешней Монголии было решено проводить устно, и широкая коалиция МНП начала захватывать население, выдвигая грандиозные требования автономии, приглушенно поговаривая о демонтаже феодальной системы, едином панмонгольском административном регионе и отказе от ханьского империализма.\n\nПока МНП была в центре внимания, феодальная система Монголии в значительной степени осталась нетронутой. И ламы, и светская знать привыкли сохранять свои привилегии, не будучи уверенными в намерениях МНП, а такие фигуры, как ханы Внешних лиг, вполне готовы сотрудничать с [UPC.GetLeader], предполагая, что их права будут защищены. Хотя дворяне и ламы сами по себе оказываются столь же непостоянными, как и революционеры."
 UPC.federalelections.242.a: "Долой ханьский империализм! Монголия продвигается под МНП!"
 UPC.federalelections.242.b: "Заключите сделки с дворянством, обеспечьте их согласие."
 UPC.federalelections.242.c: "Отменить выборы, ссылаясь на нестабильность..."
  
 UPC.federalelections.243.t: "Выборы во Внешней Маньчжурии"
 UPC.federalelections.243.d: "В ходе того, что в значительной степени рассматривалось как неожиданный поворот в избирательной гонке, два основных претендента на федеральных выборах, Демократическая лига Китая и Великий республиканский альянс, направили различных агитаторов и кандидатов в недавно завоеванный регион Внешней Маньчжурии. Сосредоточившись в основном на Владивостоке (ныне Хайшэньвай, провинция Гирин), они сосредоточили свои кампании на подчеркивании целостности региона с китайской нацией.\n\nВ значительной степени это расстроило местное население, которое остается в основном русским. Несмотря на попытки националистов собрать вооруженные отряды поселенцев для интеграции и наводнения региона ханьскими китайцами, это в значительной степени не удалось реализовать. Частично из-за отсутствия экономических возможностей в Сибири, даже в Хайшэньвае.\n\nРоссийский Дальний Восток до его включения в состав китайского государства был весьма этнически разнообразным, включая японцев, корейцев, русских, якутов, бурят, китайцев и других в культурном плавильном котле. Естественно, большое количество с тех пор эмигрировало обратно на родину, либо опасаясь угнетения, либо отказываясь жить в китайском государстве. Несмотря на это, регион остается в основном русским, и с предстоящими местными выборами, которые, как предполагается, будут объявлены, есть уверенность, что они будут заполнены в основном партиями, возглавляемыми русскими, многие из которых требуют самоуправления, если не полной независимости — например, вновь появившиеся областники.\n\nКонечно, это исключает идею о том, что правительство надеется провести законные выборы на такой опасной территории в первую очередь. Поскольку большая часть кампании сосредоточена на присутствии международных новостей, многие начали опасаться, что различные пророссийские партии будут прямо запрещены, или выборы просто сфальсифицированы, гарантируя победу нужной партии."
 UPC.federalelections.243.a: "Конечно... выборы... точно."
 UPC.federalelections.243.b: "Выборы? Какие выборы?"
  
 UPC.federalelections.244.t: "Сингапур: разрушенная тихая гавань"
 UPC.federalelections.244.d: "Стратегически расположенный в самом сердце Юго-Восточной Азии вдоль Малаккского пролива, остров Сингапур имеет уникальную историю отношений с Китаем: более половины его населения этнически китайцы в результате вековой волны миграции. Несмотря на удаленность острова от Китая, местная китайская община тем не менее играла роль в политике страны, предоставляя убежище революционерам Тунмэнхоя, когда восстания против правительства Цин заканчивались неудачей, а также отправляя помощь революционерам во время Синьхайской революции.\n\nПосле успеха революции местная китайская община стала поддерживать Гоминьдан, с созданием местных отделений на острове наряду с Малайей. Сингапур вскоре стал рассадником левого революционного радикализма, приютив социалистические организации, стремящиеся не только помочь борьбе против Бэйянского правительства на материке, но и разжечь беспорядки против британского колониализма в Сингапуре. Несмотря на крах Северного похода и растущее немецкое присутствие в бывших колониях распадающейся Британской империи, поддержка Гоминьдана остается сильной и устойчивой в местной общине.\n\nОбстоятельства сильно изменились в последние годы, однако никто не мог предсказать оккупацию острова Китаем. Удивление многих усугубили неожиданные визиты ведущих кандидатов предстоящих выборов в Китае. Хотя значение их кампании на далеком острове с небольшим политическим вкладом было упущено всеми, некоторые предположили, что истинной причиной визитов стало получение покровительства местного делового сообщества, поскольку оно составляет большую часть помощи, отправляемой на материк китайской диаспорой.\n\nНезависимо от намерений визитов, кампания в Сингапуре остается неуправляемой, поскольку беспокойство по поводу растущей политической маргинализации некитайского населения острова подлило масла в огонь и без того раздробленной политической сцены."
 UPC.federalelections.244.a: "Социалистическая позиция ДЛК завоевывает местных левых."
 UPC.federalelections.244.b: "Умеренная позиция ВРА завоевывает местных бизнесменов."
 UPC.federalelections.244.c: "Ни одному из кандидатов не удается завоевать местную общину."
  
 UPC.federalelections.245.t: "Меняющаяся арена диаспоры"
 UPC.federalelections.245.d: "За пределами Китая живет значительная китайская диаспора, разбросанная по всему миру, наблюдающая из-за рубежа за хаотичной политикой, которая охватывает их родину. В то время как местные отделения материковых политических партий существуют в странах с диаспорой, эмигрантские группы сформировали свои собственные политические партии, действующие из города Гонконг, в безопасности от бандитского гнета материковых милитаристов, но все же достаточно близко, чтобы работать над достижением своих политических целей в Китае.\n\nВ городе существует множество эмигрантских партий, таких как Народно-демократический либеральный союз, Либеральная партия китайского народа и Демократическая прогрессивная партия, независимые от основных политических партий, которые стали доминировать в политике материка, и окутанные туманом неактуальности. Среди этих партий существуют тайные общества Хунмэнь, которые еще не присоединились к ВРА, самым крупным из которых является Китайская партия народовластия Хунмэнь.\n\nУтверждая, что представляет интересы трех миллионов эмигрантов на их родине, партия была заблокирована в борьбе за власть между двумя ее основателями: Ситу Мэйтаном и Чжао Юй. За пределами партии некоторые были против политизации Хунмэнь со стороны КПНХ, создав свои собственные ассоциации — Общество народовластия и национального строительства Хунмэнь под руководством Линь Юминя и Ассоциацию возрождения Хунмэнь, организованную Чжан Цзылянем, которая с тех пор трансформировалась в Партию народного благосостояния и прогресса.\n\nЭта меняющаяся политическая арена партий Хунмэнь увидела изменения в развитии с недавним объединением партий Хунмэнь под эгидой Лиги срединных партий, действующей как золотая середина между откровенно левой ДЛК и полуреакционным ВРА. Поскольку выборы в Китае становятся напряженными, а основные партии пытаются заручиться политической поддержкой, где только могут, обе ведущие партии прибегли к обхаживанию благосклонности ЛСП и, в свою очередь, зарубежной диаспоры."
 UPC.federalelections.245.a: "Удивительно, но левые тенденции ЛСП побеждают!"
 UPC.federalelections.245.b: "Партии Хунмэнь мобилизуют голоса в пользу ВРА."
 UPC.federalelections.245.c: "Эмигранты тоскуют по более сильному, традиционалистскому Китаю."
  
 #Interest Group Events 
 UPC.federalelections.250.t: "Рабочий человек в новом Китае"
 UPC.federalelections.250.d: "Отношения профсоюзов с правительствами в Китае долгое время были напряженными. С постоянно растущей волной самосознания рабочих, распространением рабочего движения и растущей индустриализацией китайское профсоюзное движение предпринимало все более активные и все более насильственные попытки добиться перемен для рабочих страны. Забастовка Гонконг-Кантон, забастовка Пекин-Ханькоу, Шанхайское восстание — лишь несколько примечательных примеров.\n\nПрирода движения в отношении федерализма, однако, более смешанная. Часть старых федералистов искренне верят, что профсоюзы должны существовать в принципе. Но они не должны быть политическими и должны сотрудничать с властью — никаких спонтанных забастовок. Другие сторонники жесткой линии желают абсолютного контроля над профсоюзным движением, предотвращая любые срывы производства.\n\nДемократическая лига Китая, будучи более интеллектуально ориентированной, открыта для того, чтобы профсоюзы играли открытую политическую роль, но не... слишком. Другие партии, такие как [UPC_GetDCPPartyName_nocolour] или Младокитайцы, и различные независимые, выразили интерес к профсоюзам и организованному труду. Но на практике их приверженность варьируется. Все они, включая ДЛК, склонны рассматривать экономику в корпоративистском смысле — необходимость совместной работы всех классов, как машины. Профсоюзам может быть разрешено представлять рабочих, пока они не являются повстанцами-социалистами; социальная роль, но не строгая политическая.\n\nКонечно, страхи все еще сильны по поводу привлекательности синдикализма, проникающего в рабочее движение. Социалисты, особенно экстремистских тенденций, считают профсоюзы главным краеугольным камнем в будущем революции и традиционно легче всего добивались успехов среди рабочих."
 UPC.federalelections.250.a: "Профсоюзы должны строго контролироваться и оставаться аполитичными."
 UPC.federalelections.250.b: "Профсоюзы — инструмент классовой гармонии и экономического возрождения."
 UPC.federalelections.250.c: "Профсоюзы должны сами разбираться в своей политике."
  
 UPC.federalelections.251.t: "Дисгармония в деревне"
 UPC.federalelections.251.d: "В сельской местности классовые отношения между буржуазией, «местными хулиганами и злыми шэньши» и аграрными крестьянами были, возможно, даже хуже, чем в рабочем движении. Фактически живя жизнью прославленного феодализма, многие крестьяне привязаны к своим хозяевам-шэньши и находятся во власти бродячих банд. В целом плохо образованные и подвергающиеся плохому обращению, они оказались легко мобилизуемыми социалистами и принуждаемыми шэньши. Несмотря на громкие заявления различных фигур, на самом деле очень немногие говорят от имени масс.\n\nТеперь, когда это стало мыслимой темой выборов, напряженность между крестьянами и арендаторами против крупных землевладельцев и шэньши усилилась, и ни одна из сторон на самом деле не предлагает идеального решения проблемы. И ВРА, и ДЛК говорили в принципе о том, что фермеры заслуживают лучшего обращения, но фундаментально они не из крестьянского класса — в основном состоящие из интеллектуалов или других элит — и поэтому на практике тяготеют к шэньши.\n\nВеликий республиканский альянс, будучи гораздо ближе к классу шэньши (наряду с другими лянистами, такими как Младокитайская партия), надеялся создать некую форму местной сельской аграрной гармонии. Медленно поднимать крестьян через шэньши, ограничивать излишества и злоупотребления, но сохранять давление на крестьянство для улучшения национальной бедности Китая.\n\nВозникнув как мотивированное интеллектуалами противоядие от проблемы в 30-х годах, Ассоциация сельской реконструкции, детище Лян Шумина и Джеймса Йена, приобрела известность при обсуждении этого вопроса. Направляя все вопросы на образование и местную китайскую деревню, АСР считает, что фундаментальный строительный блок (в конфуцианской интерпретации) Китая, скромная деревня, был забыт. Через их реанимацию и, по крайней мере, частично доказанное на примере, АСР настаивает на убеждении, что ситуация решится сама собой."
 UPC.federalelections.251.a: "Крестьяне должны знать свое место."
 UPC.federalelections.251.b: "Крестьяне нуждаются в нашем руководстве."
 UPC.federalelections.251.c: "Крестьяне не вызывают особого беспокойства."
  
 UPC.federalelections.252.t: "Контуры бюрократа"
 UPC.federalelections.252.d: "Пока существовали соперничающие династии и культуры на Севере и Юге страны, существовал этот эфемерный разрыв «Север-Юг», условно вдоль Янцзы. С наследованием владений Севера новая Федеративная Республика была обременена всеми его грехами: сетями патронажа, апатией, милитаризмом, коррупцией. Как было очевидно даже в недавней истории, Север и Юг боролись как географически, так и идеологически. Для Юга, долгое время подчиненного Северу, революция была лишь самым жизнеспособным проявлением политического действия, и она по крайней мере доказала свою успешность поначалу.\n\nС Синьхаем, разрушенным искажением Бэйянской республики, федерализм тоже увидел, как его суть колеблется среди северных политиков и интеллектуалов. Экспериментируя с такими понятиями, особенно под эгидой Дуань Цижуя, Цао Куня и У Пэйфу, заигрывания между кликами Аньхой и Чжили с различными федералистами как на Юге, так и на Севере в конечном итоге принесли очень мало плодов — возможно, единственными сохранившимися остатками являются Конституция Цао Куня или провинция Хунань.\n\nУнаследовав его бюрократию, нация также интегрировала большую часть сетей Гуаньси Севера. Бюрократия оказывается слишком ценной, но одновременно слишком сросшейся с существующими «семьями». Получение контроля над этими сетями дает правительству чрезмерную власть в отношении избирателя, особенно северных избирателей, которые боятся потери своих привилегий, и это, естественно, стало темой жарких, но приглушенных дебатов.\n\nЛюбое нарушение существующих сетей чревато последствиями: наверняка докажет возможность раскола действующего правительства, если оно окажется достаточно разрушительным, но другие настаивали на изгнании существующих сетей — хотя неофициально предлагая своим людям занять вакуум власти. Конечно, вариант оставить все как есть навсегда остается применимым — тревожить осиное гнездо укоренившейся динамики власти на севере может оказаться слишком обременительным."
 UPC.federalelections.252.a: "Закулисные сделки — вот как все сглаживается..."
 UPC.federalelections.252.b: "Замените их людей на наших."
 UPC.federalelections.252.c: "Лучше не ворошить осиное гнездо."
  
 UPC.federalelections.260.t: "Студенческий вихрь Китая"
 UPC.federalelections.260.d: "Студенты и молодежь долгое время были фундаментальной основой многих кардинальных политических изменений в Китае. Наследники и прародители политического наследия, студенты 1910-х и 20-х годов стали ведущими интеллектуалами и политическими фигурами современности. Многие из их дебатов прошлых лет имитируются в том же духе, на новые темы, но все в тех же старых институтах. Дебаты между Ху Ши и Ху Ханьминем, Лян Шицю и Лу Синем, Чэнь Дусю и Чжан Дунсунем — все они видели свои прожекторы и своих преемников.\n\nКонечно, не все это было политическим активизмом, многое было литературным. С бурным Движением за новую культуру, распространением разговорного китайского языка, стилями письменной поэзии и прозы, и всем прочим, что обсуждалось в залах Пекинского университета и в других местах. И все же со смелыми молодыми умами приходят организованные политические движения. Китайская синдикалистская партия, Младокитайская партия, общество «Стремление», Общество полумесяца, Партия демократического социализма и другие.\n\nВ настоящее время многие начали подражать Гоминьдану в их инициативе по привлечению поддержки молодежного движения в свою политическую деятельность. Спонсируя широкий спектр литературных обществ и молодежных организаций, Демократическая лига Китая и Великий республиканский альянс создали такие организации, как «Демократическая молодежь», позволяя предприимчивым членам считаться подготовительными членами.\n\nОрганизуя поэтические общества, танцевальные общества, образовательные общества и женские общества, они также создали такие организации, как Всекитайская ассоциация против гражданской войны, и множество партийных газет. Все с переменным успехом среди населения."
 UPC.federalelections.260.a: "Сделайте акцент на реконструкции нации."
 UPC.federalelections.260.b: "Сделайте акцент на патриотизме и национальном единстве."
 UPC.federalelections.260.c: "Приятно просто наблюдать за спорами ученых."
  
 UPC.federalelections.261.t: "Компрадоры, торговцы и бизнес-элита"
 UPC.federalelections.261.d: "Китайская промышленность добилась больших успехов с начала XX века. Благодаря культивации Цин, а затем целенаправленным усилиям по индустриализации различных милитаристов, иностранных держав, местных промышленников и множества торговцев и бизнесменов нация бросилась в современную эпоху. По крайней мере, в прибрежных и городских регионах; конечно, картина внутри страны гораздо менее процветающая и бурная.\n\nПоявились различные крупные предприятия, такие как Аньшаньская металлургическая компания, Пекинский синдикат, Krupp Steel, банк HSBC и Phelps-Dodge. Были также различные региональные предприятия: цемент «Зеленый остров», Чжэцзянский металлургический завод или Шанхайская мукомольная мельница. Организуясь в различные организации, такие как Консорциум Цзяннань, или объединяясь с кликами, такими как Клика коммуникаций, существовал тонкий, но выраженный спор между мнениями о торговле, протекционизме, экспорте и тарифах.\n\nСами федералисты разделились по этому вопросу. Многие являются крупными корпоративистами, благодаря своему лянистскому наследию, и считают, что экономика должна контролироваться правительством и работать в гармоничном служении людям. Как таковые, они являются крупными сторонниками протарифной политики.\n\nДругие оказались более склонны к свободной торговле, полагая, что патриотичным отечественным бизнесменам следует разрешить свободно торговать и что такая торговля позволяет свободно обмениваться идеями между предпринимателями. Они требуют только, чтобы это было справедливо и на равных условиях. Как правило, такой взгляд оправдывается природными материальными богатствами и сырьевыми ресурсами Китая, и многие политики, имеющие деловые связи, начали продвигать такой взгляд.\n\nДовольно любопытно, что существует группа людей, которые желают тотальной борьбы и экспроприации против всех иностранных предприятий и инвестиций, проводя кампании на основе радикального ультранационализма, ультрапротекционизма и рьяного искоренения концессий."
 UPC.federalelections.261.a: "Внешняя торговля, если она ведется на равных условиях, выгодна всем."
 UPC.federalelections.261.b: "Наш зарождающийся промышленный сектор требует государственной защиты и инвестиций."
 UPC.federalelections.261.c: "Выступления против иностранной и внутренней эксплуатации работают каждый раз."
  
 UPC.federalelections.262.t: "Военнослужащие в политике"
 UPC.federalelections.262.d: "Роль военных в политике была тесно переплетена с самых первых робких шагов Бэйянской республики. В настоящее время роль милитаризма и военных все еще закреплена, даже в новой республике. Политики со всех сторон посещают различные военные арсеналы и армейские базы, катаясь на волнах патриотизма. Кроме того, множество бывших офицеров и военных начали переносить свою карьеру в государственную деятельность, баллотируясь в местные органы власти и проводя кампании с большой долей национализма.\n\nЧестность военных, баллотирующихся на посты, была поставлена под сомнение. На философском уровне: в какой момент офицерам запрещается погружаться в политику — не является ли это просто милитаризмом в новой одежде? Неизбежно многие из них будут продвигать своих старых друзей в армии, а также сбивать предложения о демилитаризации.\n\nИ это даже не касается ситуаций, когда военные напрямую вовлечены в политику. Лица, баллотирующиеся на посты, находятся в «отставке» только на словах — если они проигрывают гонку, они просто возвращаются в армию. Во время объединения нации для военных было обычным делом назначать делегатов в недавно «освобожденные» регионы и иным образом влиять на местную политику — практика, которая неофициально продолжается в некоторых районах. Это происходит до такой степени, что многие из назначенных ими делегатов остаются на своих постах. И, конечно, постоянно присутствующая проблема запугивания армией народа остается актуальной, закрепляя ее как нечто несколько независимое от гражданского контроля.\n\nУвы, народ принес много жертв в последнее время, и в результате появилось большое количество ветеранов — молодых людей, искалеченных как физически, так и морально. Семьи этих солдат, мертвых и живых, также пострадали из-за недавних войн — и, несомненно, потребуют пенсий наряду с финансовой поддержкой. Для них продвижение их сослуживцев на гражданские роли является подтверждением значимости их службы."
 UPC.federalelections.262.a: "Конечно, Президента как главнокомандующего будут видеть с его людьми!"
 UPC.federalelections.262.b: "Оппозиция добивается определенного прогресса, призывая к переходу к мирному времени."
 UPC.federalelections.262.c: "Армия всегда будет патриотическим столпом нашего национального государства."
  
 UPC.federalelections.263.t: "Взлет влиятельных лиц в опросах!"
 UPC.federalelections.263.d: "Многочисленные ипостаси полевого командира (милитариста) многогранны и, в зависимости от личности, интерпретируются в разном диапазоне. Если говорить по существу, кто такой милитарист? Начальник полиции, который также является старейшиной деревни; уездный магистрат, который также является крупным землевладельцем; офицер, который также был избран сенатором — все они несут в себе элементы уважаемых джентльменов для одних и местных тиранов для других.\n\nВ рядах милитаристов существуют различные уровни значимости — мелкие и крупные. Наводненные своими подчиненными, различными местными милитаристами и оперативниками, а также фигурами власти, действующими под ними — шэньши и старостами деревень. Многие сравнивали это с извращенной формой феодализма, которая существовала в Европе или Японии, или с матрешками, или даже с паутиной, но клубок отношений избегает каких-либо четких иерархий.\n\nВ некотором смысле отношения, которые имеют милитаристы, важнее, чем их прямой контроль над оружием — эти полевые командиры имеют обширные связи не только с военными силами, но и одновременно с контактами в социальной, экономической и политической сферах.\n\nЖивучесть милитаризма привела к тому, что даже в новом федералистском правительстве, с его попытками внедрить демократию и обезвредить милитаристов, оно не совсем лишило их власти. Некоторые даже начали завоевывать подлинную местную популярность как «Защитники народа», или «Защитники от тиранического Центрального правительства», или даже просто как честная местная элита по сравнению с коррумпированными магистратами центрального правительства или равнодушными партийными чиновниками. Достаточно сказать, что благодаря своей популярности и связям они получили возможность выигрывать местные выборы на основе подлинной поддержки, а не махинаций.\n\nС их политическим возвращением интеллектуалы начали популяризировать наступление новой эры милитаризма и начали нападать на Президента и правительство за то, что они позволили этой «гнили» снова разрастись."
 UPC.federalelections.263.a: "Президент не потерпит возрождения милитаризма!"
 UPC.federalelections.263.b: "Оппозиция использует эту возможность, чтобы подорвать позиции Президента."
 UPC.federalelections.263.c: "Иногда демократия делает странные повороты."
  
 UPC.federalelections.270.t: "Будущее прекрасной половины"
 UPC.federalelections.270.d1: "С формализацией женского избирательного права в четко прописанном документе женщины Китая наконец получили всеобщее право голоса, что по большинству показателей является довольно популярной мерой. Хотя большинство женщин в стране практически вернулись к взглядам своей семьи на политику, партии уже начали адаптироваться, видя большую необходимость взывать к женским голосам.\n\n$UPC.federalelections.270.d_end$"
 UPC.federalelections.270.d2: "Хотя женщины в Китае не имеют повсеместного формального права голоса, некоторые прогрессивно настроенные провинции, такие как Гуандун и Хунань, тем не менее предоставили его в своих провинциальных конституциях, хотя другие отстали. Пока их право голоса не гарантировано на национальном уровне, женщины являются мощной социальной силой, и их нельзя полностью игнорировать.\n\n$UPC.federalelections.270.d_end$"
 UPC.federalelections.270.d_end: "В начале XX века начали появляться такие движения, как «Новая женщина». Призывая к продвижению прав женщин и свободе от ограничивающих конфуцианских практик, Синьхай увидел создание различных чисто женских повстанческих отрядов, а в 1912 году был основан Альянс за женское избирательное право для работы над включением равных прав женщин и избирательного права в новую конституцию.\n\nИ ВРА, и ДЛК попытались включить женские вопросы в свои платформы. ВРА сосредоточили свою кампанию на защите женщин и детей на рабочем месте. ДЛК потребовала защиты их прав и соблюдения возможностей в политике, образовании и трудоустройстве; гарантии женщинам-работницам права на отпуск во время беременности и после родов; должны быть предоставлены детские сады и ясли, чтобы освободить работниц от домашних обязанностей и повысить экономическую независимость.\n\nОбе партии призвали к представительству женщин в правительстве. Отдельные личности тоже не остались в стороне: лидер ДЛК Лян Шицю настаивал на различии между мужчинами и женщинами и на том, что равенство фундаментально отрицает эту реальность — образование должно быть адаптировано так, чтобы сделать из них «идеальную женщину»: добродетельных жен и хороших матерей. Ху Ши, со своей стороны, выступил против консервативного взгляда Шицю, требуя установления полного равенства; дело личности — распоряжаться своими правами так, как она пожелает. Младокитайская партия выступила с коллективным призывом о том, что гендерное равенство и все, что к нему относится, необходимо для прогресса и развития нации."
 UPC.federalelections.270.a: "Дамы, скажите своим мужьям голосовать за [UPC_players_candidate]!"
 UPC.federalelections.270.b: "Прогресс в женских вопросах — это прогресс в вопросах нации."
 UPC.federalelections.270.c: "Конфуцианские гендерные роли сохраняют порядок и гармонию в домах."
  
 UPC.federalelections.271.t: "Отдельные проблемы и партикуляристы"
 UPC.federalelections.271.d: "В закоулках и трещинах между основными политическими дебатами и проблемами современной республики скрывается множество мелочей; беспечного характера, вопросов довольно сомнительной важности. Одиночные проблемы, особые интересы, острые вопросы. Хотя обычно они не настолько важны, чтобы формировать целую кампанию, они, тем не менее, способны склонить голоса в пользу партий, как малых, так и крупных.\n\nРазличные христианские миссионерские группы, действующие в основном на Северо-Западе, но с несколькими контингентами в других местах страны, особенно в Шанхае, потребовали защиты своих миссий и гарантий права на свободу вероисповедания, получив необходимую поддержку среди различных других религиозных меньшинств. СМИ и пресса сплотились для защиты права на свободу слова, объединившись в довольно странном союзе с различными группами, такими как Хунмэнь.\n\nВыкраивая значительные ниши, любое отрицание или прямой отказ курировать эти сравнительно незначительные вопросы может привести к тому, что масса голосов уйдет в распростертые объятия радикалов, независимых или регионалистов. И в том же духе современные партии, участвующие в выборах, потенциально могут перетянуть часть электората на свою сторону — победа для всех, как могут сказать некоторые."
 UPC.federalelections.271.a: "Конечно, [UPC_players_candidate] держит руку на пульсе проблем."
 UPC.federalelections.271.b: "Иногда специфические политические вкусы проявляются в политическом партикуляризме."
 UPC.federalelections.271.c: "Каждая партия находит небольшие ниши, которые она может обслуживать."
  
 UPC.federalelections.272.t: "Пять рас в одном союзе?"
 UPC.federalelections.272.d1: "Хотя большая часть северо-запада страны и других регионов — родины многих меньшинств — остается вне контроля Китая, и поэтому их невозможно представить в Ассамблее или провести выборы, правительство все же сочло нужным заполнить различные места представителями этих регионов и их народов, главным образом по соображениям легитимности и для того, чтобы гарантировать, что их неизбежная будущая интеграция будет гладкой, эффективной и количественно репрезентативной.\n\nОднако вопрос решается на грани их назначения: должны ли они быть назначены непосредственно заочно самим правительством во время этих выборов? Или же правительство должно поручить различным изгнанникам и лоялистским группам провести выборы, соответствующие избирательным округам, от их имени? Фактически, должно ли правительство вообще потакать концепции наличия у этнических меньшинств местной автономии в будущем?"
 UPC.federalelections.272.d2: "С установлением прямого контроля над китайским пограничьем и объединением нации многие меньшинства за пределами ханьского пузыря теперь снова входят в число граждан китайского национального государства. После подавления групп независимости этнических меньшинств разной степени, многие из их граждан опасаются репрессий или дальнейшего ханьского шовинизма, характерного для предыдущих администраций.\n\nКонечно, история меньшинств в Китайской Республике сложна, так как на самом фундаментальном уровне она построена на уровне единства и равенства. Пять рас в одном союзе, символизирующие ханьцев, маньчжуров, тибетцев, хуэй и монголов, объединившихся в гармонии для продвижения вперед в новую эру процветания, какую бы форму она ни принимала. Несмотря на это, многие сторонники той же концепции, такие как доктор Сунь Ятсен, также несли идеал, что ханьцы должны «поднять» и «просветить» «меньшие» расы китайской нации, чтобы интегрировать их в республику.\n\nВ оппозиции различные сепаратистские группы восстали против Китая, иногда поддерживаемые имперскими державами. Во время Синьхая халха-монголы освободились при поддержке России и вели долгую войну против Китая до 1915 года в попытке освободить Внутреннюю Монголию и дауров/баргутов. Тибет освободился аналогичным образом, обеспечив свою независимость под британскими гарантиями и вступая в конфликты с китайскими милитаристскими образованиями в Эру милитаристов. Синьцзян тоже страдал от восстаний меньшинств, как и внутренние районы и юг страны.\n\nЧтобы залечить все раны и учесть цепи, сковывающие правительство, большая часть администрации предложила различные степени автономных регионов, рассматривая предложения различных представительных групп меньшинств. Однако остается вопрос, стоят ли такие усилия свеч."
 UPC.federalelections.272.a: "Единство китайской нации всегда будет в приоритете."
 UPC.federalelections.272.b: "Много рас составляют Китай, и у каждой есть свой голос."
  
 #Election Challenge Events 
  
 UPC.federalelections.280.t: "Гнилые местечки"
 UPC.federalelections.280.d: "Как и следовало ожидать, следствием чрезмерно нездоровой существующей демократической инфраструктуры Китая является состояние национальных избирательных округов во время выборов. Из-за нехватки времени или же гораздо более гнусных и коварных махинаций местных администраторов смесь джерримендеринга и плохо или политически мотивированно начерченных округов проявилась как серьезный вызов избирательному процессу.\n\nПрозванные так называемыми «карманными округами», по феномену в Соединенном Королевстве 1800-х годов, эти избирательные округа начерчены настолько грубо, чтобы охватить такой маленький электорат, но при этом предоставлять то же место, что и более крупные или иные электораты, что баланс сил становится несоразмерным. Предоставляя покровителям нерепрезентативное влияние в Ассамблее, различные действующие члены ассамблеи, избранные всего лишь горсткой избирателей, имеют сравнительно тот же голос, что и тот, кто представляет огромные массы людей.\n\nКроме того, низкая явка избирателей еще больше усугубила проблему. Из-за среднего процента грамотности, раболепия перед местными шэньши или избранными политиками большинство китайских граждан, как правило, политически неграмотны или безразличны. В результате подавляющее большинство округов, как правило, неконкурентны и стали легко контролируемыми небольшими кликами политических элит.\n\nПоскольку кампании уже идут, а выборы уже происходят, с начерченными округами ничего поделать нельзя. А все, что можно было бы сделать, наверняка должно было бы пройти через ассамблею. В настоящее время Президент может оказать давление на местных кандидатов, чтобы они играли честно, или же смириться."
 UPC.federalelections.280.a: "Центральное правительство должно вмешаться, чтобы обеспечить более честное голосование."
 UPC.federalelections.280.b: "К сожалению, это просто игра, в которую мы все должны играть."
  
 UPC.federalelections.281.t: "Агония революции"
 UPC.federalelections.281.d: "Взрывы, убийства, партизанские рейды, кампании террора, восстания. Пропаганда действием определенно не исчерпала себя в новом китайском «мире». На поверхности, конечно, изобилие цветов и голубей. Но на крайностях, на политических обочинах, очень немногие согласились просто жить с тем, как была написана история. Такие сломленные. Такие злые. Экстремисты продолжают наносить удары, и их ярость начала отбрасывать глубокую тень на выборы. И это не только Гоминьдан, нет, другие группы — радикалы из Младокитайской партии — борются с избирательной системой.\n\nИ все же именно Гоминьдан показывает себя наиболее строгим и успешным в своей кампании террора. Или, ну, это знамя, под которым они раньше выступали. Что наиболее тревожно, большая часть больше не обязана верностью Гоминьдану или Китайской синдикалистской партии — они просто независимые повстанцы без причины. Некоторые настолько разочаровались в переменах, что потеряли всякое присутствие идеологии, их кампании вызваны злобой против системы или иногда желанием выжить.\n\nВо многих округах ситуация стала настолько ужасной, что местные силы безопасности были полностью подавлены. Местные собрания начали предлагать ратифицировать военное положение, чтобы восстановить хотя бы какое-то подобие порядка. В прошлом, однако, военные фактически управляли целыми районами как «зонами подавления бандитизма», но были гораздо более известны суровыми репрессиями, которые злили и радикализировали людей, чем результатами — и даже начали накладывать вето на кандидатов на выборах, заменяя их своими.\n\nИ тем не менее, они сплачиваются ради некой «справедливости». Приостановка хабеас корпус, искоренение надлежащей правовой процедуры, комендантский час, произвольные аресты. Все, что потребуется для обеспечения искоренения бандитов."
 UPC.federalelections.281.a: "«Особые положения» будут применяться до разрешения этих локальных ситуаций."
 UPC.federalelections.281.b: "Мы не можем вернуться к дням произвольных арестов и насильственных исчезновений."
  
 UPC.federalelections.282.t: "Институт политических машин"
 UPC.federalelections.282.d: "С новой Республикой возникают новые вызовы, и хотя некоторые из них, безусловно, новы, другие — это, безусловно, старые демоны в новых обличьях. Общенациональная политическая инфраструктура для всех партий в значительной степени все еще находится в зачаточном состоянии — за исключением, может быть, конституционалистов и Младокитайской партии — из-за относительно недавней реинтеграции провинций и общего отсутствия конкурентных выборов в предыдущие годы, местные политические боссы часто превращали победу на выборах в своих округах в науку.\n\nЭти мощные политические машины используют как тайные закулисные сделки, так и открытый электоральный клиентелизм для поддержания своей системы политического патронажа, обещая ценные синекуры и принятие популистской политики для вознаграждения лоялистов и покупки голосов. Они также стали искусными в создании замкнутого поляризованного отношения в своем целевом электорате — массово сгоняя их на избирательные участки с помощью обширных обещаний в случае победы и разжигая страхи о том, что произойдет, если они проиграют.\n\nХотя это не обязательно является проблемой в умах некоторых деятелей, проблема такой системы в том, что она практически самоподдерживающаяся и ее трудно регулировать. Пока машина может продолжать выигрывать ключевые гонки и не банкротить местные правительства посредством политики, они могут продолжать почти бесконечно. Это также разожгло большой трайбализм и взяточничество, увеличивая восприятие среди бедных избирателей, что демократия сфальсифицирована, а среди богатых избирателей — что демократия является просто организованным разграблением государственной казны.\n\nНа самом деле, довольно трудно даже принудить к конкурентным гонкам — вы можете бить по самой коррупции, но для победы над политической машиной требуется более крупная машина, чтобы вытеснить их, самоисполняющийся цикл. И даже тогда в результате большая часть меньших машин просто присоединится к большему организму, а не будет вытеснена им."
 UPC.federalelections.282.a: "Нам действительно нужно встряхнуть систему, так или иначе!"
 UPC.federalelections.282.b: "Они всегда голосуют по зову своей партии и никогда не думают думать сами!"
  
 UPC.federalelections.290.t: "Неграмотность и отсутствие демократических традиций"
 UPC.federalelections.290.d: "Хотя это трудно оценить количественно без надежной переписи, неграмотность в Китае всегда была критической проблемой — большинство масс едва умеет читать, не говоря уже о том, чтобы писать. Доступ к государственному образованию также был далек от всеобщего, и разные провинции, а также даже уезды имели разные стандарты и степени финансирования или качества. Достаточно сказать, что для полного обучения нации может потребоваться много поколений.\n\nЭто не значит, что это новая проблема; борьба с неграмотностью и донесение образования до масс были огромным призывом реформаторов по всей стране и политическому спектру с незапамятных времен. Концепция, что Китай никогда не будет модернизирован, пока его народ не будет образован, естественно, весьма привлекательна для ученых-интеллектуалов, которые окружают бюрократию Китая.\n\nБыли испробованы различные усилия по реформированию: расширение доступа к обязательному государственному образованию для детей, предложение курсов обучения взрослых в вечернее время. Однако нехватка финансирования, война, разруха и кажущаяся сомнительной природа образования сверх определенного уровня (из-за неспособности более образованных найти работу) по сравнению с немедленным вступлением в ремесла, препятствовали усилиям.\n\nПомимо этого, политическая грамотность еще хуже. У Китая настойчиво никогда не было по-настоящему демократической политической традиции, несмотря на попытки различных интеллектуалов утверждать, что она всегда была. Выборы, начиная с 1912 года, всегда доминировались элитами (теми же классами, которые производят интеллигенцию), и хотя это, возможно, имеет место и в других местах, в Китае заметно отсутствие значимого политического участия простых людей. Большая часть масс не понимает силы голоса или значения кандидатов, просто голосуя, основываясь на желании своего землевладельца.\n\nОчевидно, что систематические изменения будут трудной задачей — можно инвестировать в подъём простых людей, как говорят реформаторы, но это будет лишь временной мерой. И чем больше времени тратится впустую, тем больше массы стекаются к Гоминьдану и их призывам к душе масс."
 UPC.federalelections.290.a: "Возможно, необходимо срочное «политическое просвещение» в последнюю минуту."
 UPC.federalelections.290.b: "Демократия для народа, но думать должен кто-то другой."
  
 UPC.federalelections.291.t: "Военизированные формирования и политическая игра"
 UPC.federalelections.291.d: "Среди политической элиты Китая стало неформальной традицией участвовать в создании и найме местных и региональных ополчений с момента упадка Цин. В отсутствие центральной власти местные власти, несомненно, встали на защиту своих интересов и, в оптимистичном свете, на защиту своих сограждан. Такое положение дел продолжалось в Эру милитаристов и перешло в новую республику.\n\nНекоторые батальоны исправно служат своим нуждам и законным целям, таким как охрана ценностей, деревенское ополчение для защиты от бандитов и, по сути, местные полицейские силы. Но большое количество вне этого ассортимента также выступает в качестве личных телохранителей для богатых, штрейкбрехеров против городских профсоюзов и сельских крестьянских ассоциаций, силовиков против должников. В результате демобилизации большое количество солдат теперь возвращаются домой, пытаясь найти работу из-за отсутствия навыков и травм; и поэтому их естественным призванием становится бандитизм или прославленный бандитизм на содержании у элиты.\n\nВ стране размером с Китай на самом деле довольно сложно бороться с этой проблемой законодательно. И, естественно, когда приходит время выборов, местные политики начинают с удовольствием использовать свои военизированные формирования в своих интересах — запугивая соперничающих политических активистов, совершая набеги на штаб-квартиры оппонентов и похищая людей под видом беззаконного бандитизма.\n\nЭто привело к бесконечному циклу насилия. Тем более тревожному в отношении зарождающейся демократии Китая, вредящему ее восприятию на международном уровне и дома."
 UPC.federalelections.291.a: "Закон должен вмешаться, чтобы защитить честность наших выборов!"
 UPC.federalelections.291.b: "Борьба с этими наемниками только ухудшит ситуацию."
  
 UPC.federalelections.292.t: "Коррупционные скандалы сотрясают выборы"
 UPC.federalelections.292.d: "С момента переговоров, которые привели к концу династии Цин и созданию Бэйянской республики, коррупция и кумовство шли рука об руку с китайской политикой. И, конечно, до этого Цинский двор и местные органы власти изобиловали своекорыстными сделками и авантюрами против прогресса и порядочности. Даже после печально известного вопиющего характера этого явления в Эпоху высокого милитаризма, и особенно «Подкупающего парламента» Цао Куня, китайский народ все еще ревет от возмущения по поводу различных скандалов, которые возникают — особенно когда федерализм позиционирует себя как отличный от старой Республики.\n\nУвы, грехи отца остаются вездесущими. Казнокрадство, или, скорее, недобросовестное использование политиком своих полномочий для личной выгоды, остается на свободе; инсайдерская торговля и использование своего политического положения для обслуживания частных интересов за счет общества. Откаты тоже маячат, когда члены ассамблеи и местные чиновники, как сообщается, брали взятки, чтобы предоставить различным фирмам доступ к дополнительным льготам. Хуже всего то, что лоббирование вошло в свой расцвет — совсем недавно множество «дядюшек» получали кучу красных конвертов от своих «племянников» на должностях.\n\nПолитические услуги выходят из-под контроля, должности стоят ровно столько, сколько их выгода для теневых интересов за кулисами, и общая политическая сцена превратилась в уместный идеализм и искренний интерес к общему благу среди моря политики «ты мне — я тебе»: почеши мне спину, и я почешу твою. Поскольку выборы идут полным ходом, любая серия громких коррупционных скандалов может поставить под угрозу восприятие и обоснованность зарождающейся демократии Китая."
 UPC.federalelections.292.a: "Мы сделаем из худших нарушителей пример для подражания."
 UPC.federalelections.292.b: "Иногда нам нужно принять, что такова политика."
  
 UPC.federalelections.293.t: "Лишение прав и разочарование"
 UPC.federalelections.293.d: "Хотя Республика придерживается идеалов всеобъемлющего избирательного права, ибо именно за это так многие проливали кровь и жертвовали собой, реальность далека от этого идеала. С последующими выборами стало до боли очевидно, что не каждому гражданину на практике позволено голосовать. Особенно в районах, где все еще сохраняется какая-то форма военного присутствия или которые отмечены как оплоты «врага».\n\nМногие бывшие ведущие политики побежденных фракций — Ван Цзинвэй, Чжан Сюэлян, Бай Цзяньу — подверглись цензуре своих публикаций и мнений или иным образом находятся под строгим домашним арестом, если не в изгнании. Более того, любая политическая деятельность побежденных фракций обычно ограничивается военной рукой, а некоторым даже прямо запрещено баллотироваться на посты в первую очередь. В особо крайних случаях целые районы систематически лишаются возможности голосовать или политически организовываться федералистскими властями.\n\nХотя это, вероятно, необходимо для сдерживания радикализма, если действительно подумать, кто обычно оказывается мишенью этих политических санкций (социалисты и милитаристы), многие из вышеупомянутых законно популярны среди населения. Некоторые в оппозиции начинают осуждать вопиющее превышение полномочий правительством для защиты фасада демократии."
 UPC.federalelections.293.a: "Мы можем предварительно снять некоторые из этих ограничений."
 UPC.federalelections.293.b: "Эти ограничения сохраняют политику делом джентльменов."
  
 UPC.federalelections.300.t: "Поливание грязью и пропаганда"
 UPC.federalelections.300.d: "Как это довольно мучительно очевидно, значительная часть китайского населения — неграмотные, скромные труженики и рабочие, которых возможности образования обошли стороной. Но это не значит, что информация не может распространяться как лесной пожар. Как было доказано в войнах за объединение, пропаганда, если ее правильно применять и курировать, является жестоко эффективным инструментом — визуальные плакаты, слухи и даже пьесы наряду с песнями и стихами могут быстро распространять политические идеи в массах.\n\nТочно так же среди более образованных классов редакционные статьи в газетах, журналах и других публикациях позволяют интеллектуалам высказываться о политике — с массовым распространением радиотехнологий эта грань игры по распространению информации стала еще более важной. Даже если она все еще сохраняет свой относительно небольшой статус по сравнению с популярностью.\n\nИ это подводит нас к насущному вопросу. Роль, которую мы должны играть в информационной войне. Если мы откажемся участвовать в кампании против нашего оппонента, неизбежно, что он перехватит инициативу и вырвется вперед. Однако, если мы будем клеветать на наших соперников, это послужит срыву демократической системы, которую мы так усердно защищали и создавали."
 UPC.federalelections.300.a: "Мы можем предварительно снять некоторые из этих ограничений." # (Note: Original key implies duplicated option text from 293.a, translating literally based on typical Paradox file patterns, but contextual translation would be "We must fight fire with fire!"
 UPC.federalelections.300.b: "Эти ограничения сохраняют политику делом джентльменов."
  
 UPC.federalelections.301.t: "Поданы иски о выборах"
 UPC.federalelections.301.d: "Кажется, мелочность не знает границ и продвигается так же непрестанно, как и демократическая система. Иногда люди, которые особенно недовольны и проиграли выборы, подают судебный иск, утверждая, что выборы были, по сути, проведены мошенническим образом. Такое дело не является непривычным даже в самых здоровых демократиях.\n\nНастаивая на том, что правила выборов не соблюдались честно, что другая сторона проводила сбор голосов, вброс бюллетеней, фальсификацию голосования, подтасовку бюллетеней и весь прочий ассортимент серьезных нарушений против демократической системы. В результате и без того перегруженная судебная ветвь Республики вынуждена продираться через мириады не совсем искренних отчетов о фальсификациях на выборах среди других искренних дел — и, как правило, округа сталкиваются с многократными перевыборами, пока это наконец не будет признано справедливым по закону.\n\nИ все же на этот раз люди начали подавать заявления о фальсификации выборов задолго до их проведения, что оказалось невероятно бесящим для всех вовлеченных чиновников. Расследовать до того, как голосование даже началось, неизбежно означало бы погружение в ожидаемый адский огонь, но не расследовать означало бы, что смутьяны смогут шествовать и митинговать против «несправедливости» системы."
 UPC.federalelections.301.a: "Избирательная комиссия отправлена для расследования."
 UPC.federalelections.301.b: "Эти ограничения сохраняют политику делом джентльменов."
  
 UPC.federalelections.302.t: "Грязные трюки"
 UPC.federalelections.302.d: "В дополнение к коррупции после выборов и крупномасштабному производству и распространению политических машин, мелкие политические кандидаты часто начинают использовать различные не самые идеальные тактики, когда глаза властей отвернуты. Шантаж политических соперников, подкуп местных лидеров для поддержки — это лишь верхушка всеобъемлющей горы грязных трюков, которые начали применять различные потенциальные политики.\n\nВ определенных случаях людей ловили буквально на подкупе избирателей, чтобы те явились на участки, или предложении транспорта для сторонников. Были даже случаи слежки за избирателями, когда они покидали кабинки для голосования, и единодушного распространения лжи и клеветы о политических оппонентах."
 UPC.federalelections.302.a: "Нам нужно строже соблюдать правила кампании!"
 UPC.federalelections.302.b: "В политике все средства хороши."
  
 #Warlord Campaign Events 
  
 UPC.federalelections.310.t: "[FROM.GetNameDefCap] поддерживает ВРА!"
 UPC.federalelections.310.d: "Объединение нации никогда не бывает особенно простой задачей для выполнения, и даже если оно функционально завершено, многие независимо мыслящие люди живут в нашей стране. Пользуясь своей автономией дома, они стали удивительно способными влиять на недавно объявленные в стране выборы. Как должностные лица в Федеративной республике или иным образом, они начали вкладывать весь свой политический вес в выбранного ими кандидата.\n\nНа недавнем мероприятии кампании Великого республиканского альянса [FROM.GetLeader] появился на сцене в качестве специального гостя. Выступив с энергичной речью, он публично объявил о своей полной поддержке ВРА. Настаивая на видении ВРА Федеративной республики как единственно жизнеспособном варианте, они предвидят, что большая часть электоральной поддержки качнется в сторону ВРА."
 UPC.federalelections.310.a: "Они выделяют себя из остальных!"
 UPC.federalelections.310.b: "Демократия или нет, мы не можем потворствовать лоббированию."
  
 UPC.federalelections.311.t: "[FROM.GetNameDefCap] поддерживает ДЛК!"
 UPC.federalelections.311.d: "Объединение нации никогда не бывает особенно простой задачей для выполнения, и даже если оно функционально завершено, многие независимо мыслящие люди живут в нашей стране. Пользуясь своей автономией дома, они стали удивительно способными влиять на недавно объявленные в стране выборы. Как должностные лица в Федеративной республике или иным образом, они начали вкладывать весь свой политический вес в выбранного ими кандидата.\n\nНа недавнем мероприятии кампании Демократической лиги Китая [FROM.GetLeader] появился на сцене в качестве специального гостя. Выступив с энергичной речью, он публично объявил о своей полной поддержке ДЛК. Настаивая на видении ДЛК Федеративной республики как единственно жизнеспособном варианте, они предвидят, что большая часть электоральной поддержки качнется в сторону ДЛК."
 UPC.federalelections.311.a: "Все вперед к новому будущему Китая!"
 UPC.federalelections.311.b: "Очевидно, они забываются. Давайте напомним им об их месте."
  
 UPC.federalelections.312.t: "[FROM.GetNameDefCap] поддерживает Либералов!"
 UPC.federalelections.312.d: "Объединение нации никогда не бывает особенно простой задачей для выполнения, и даже если оно функционально завершено, многие независимо мыслящие люди живут в нашей стране. Пользуясь своей автономией дома, они стали удивительно способными влиять на недавно объявленные в стране выборы. Как должностные лица в Федеративной республике или иным образом, они начали вкладывать весь свой политический вес в выбранных ими кандидатов.\n\nВ серии недавних мероприятий кампании [UPC_GetDCPPartyName_nocolour_long] и различных Независимых республиканцев [FROM.GetLeader] несколько раз появлялся на сцене в качестве специального гостя. Выступив с энергичными речами, он публично объявил о своей полной поддержке [UPC_GetDCPPartyName_nocolour], общества «Стремление», Политической науки и других фракций. Настаивая на видении различных либералов Федеративной республики как единственно жизнеспособном варианте, они предвидят, что большая часть электоральной поддержки качнется в сторону либералов."
 UPC.federalelections.312.a: "[FROM.GetLeader] стоит за демократию!"
 UPC.federalelections.312.b: "Противопоставим их усилиям наши собственные."
  
 UPC.federalelections.313.t: "[FROM.GetNameDefCap] поддерживает Регионализм!"
 UPC.federalelections.313.d: "Объединение нации никогда не бывает особенно простой задачей для выполнения, и даже если оно функционально завершено, многие независимо мыслящие люди живут в нашей стране. Пользуясь своей автономией дома, они стали удивительно способными влиять на недавно объявленные в стране выборы. Как должностные лица в Федеративной республике или иным образом, они начали вкладывать весь свой политический вес в защиту своей независимости.\n\nНа недавнем публичном мероприятии, проведенном в их родной провинции, [FROM.GetLeader] объявил о неудачах Федеративной Республики в удовлетворении потребностей жителей их провинции. Настаивая на независимости своей администрации для защиты федерализма, они предвидят сильный всплеск регионалистских настроений по всей стране."
 UPC.federalelections.313.a: "И вот они показывают свое истинное лицо..."
 UPC.federalelections.313.b: "Регионализм — это НЕ федерализм."
  
 UPC.federalelections.314.t: "[FROM.GetNameDefCap] поддерживает Радикалов!"
 UPC.federalelections.314.d: "Объединение нации никогда не бывает особенно простой задачей для выполнения, и даже если оно функционально завершено, многие независимо мыслящие люди живут в нашей стране. Пользуясь своей автономией дома, они стали удивительно способными влиять на недавно объявленные в стране выборы. Как должностные лица в Федеративной республике или иным образом, они начали вкладывать весь свой политический вес в поддержку различных радикалов и экстремистов.\n\nНа недавнем публичном мероприятии, проведенном в их родной провинции, [FROM.GetLeader] объявил о провалах реформистского взгляда Федеративной Республики. Настаивая на примате продолжения революции и радикальных перемен, они предвидят сильный всплеск революционных настроений по всей стране."
 UPC.federalelections.314.a: "Окружены и слева, и справа..."
 UPC.federalelections.314.b: "Они не могут этого делать! Остановите их или сделайте что-нибудь!"
  
 UPC.federalelections.315.t: "[UPC.GetDefNameCap] отвергает наши авансы!"
 UPC.federalelections.315.d: "Несмотря на оказание сильного политического давления на [UPC.GeNameDefCap] и попытки повлиять на национальную избирательную кампанию, похоже, что у Центрального правительства были другие представления о том, что будет означать их демократия. С помощью различных средств, как законных, так и не совсем идеальных, Центральное правительство пресекло наши попытки заручиться поддержкой выбранного нами кандидата. Настаивая на «недемократическом» характере, с помощью которого [ROOT.GetLeader] пытался повлиять на кампанию, они стали проявлять повышенную бдительность в отношении дальнейших авансов, по крайней мере, на какое-то время."
 UPC.federalelections.315.a: "Похоже, они отрицают собственную демократию!"
  
 UPC.federalelections.600.t: "Созыв Конституционного конвента"
 UPC.federalelections.600.d: "В последние дни Цин Китай предпринял первые попытки конституционализма через радикальные реформы Лян Цичао в рамках «Ста дней реформ». Лян призывал к конституционной монархии, принятию капитализма и выходу из феодализма, отмене системы имперских экзаменов и современным государственным институтам. Однако эти радикальные реформы были подавлены вдовствующей императрицей Цыси. Синьхайская революция 1911 года установила временную конституцию, которая была создана по образцу французской конституции. После неудачной имперской реставрации Юань Шикая и его смерти Гуанчжоу и Пекин оставались в ссоре, хотя оба изначально придерживались Конституции 1912 года.\n\nВ 1923 году Цао Кунь создал свою собственную Конституцию, которая широко считалась очень обширной и прогрессивной, хотя изначально ее придерживались только милитаристы Чжили. Конституция Цао попыталась протянуть оливковую ветвь Тан Цзияо, но отношения резко ухудшились, когда Цао сверг Ли Юаньхуна, чтобы самому стать президентом. На юге Чжэцзян и Хунань возглавили процесс провозглашения конституции, основывая их на американской конституции, пытаясь создать свои собственные варианты местной демократии. Поскольку Китай наконец-то был объединен впервые за десятилетия, [ROOT.GetLeader] созвал Конституционный конвент.\n\nОднако при наличии множества участников со всего Китая многие не согласны с тем, каким должен быть перспективный вид этой новой Конституции. Многие с Севера призывают использовать Конституции 1912 и 1923 годов в качестве руководства, ссылаясь на то, что их неудача коренится в милитаризме, а не в структурных проблемах. Многие из основных последователей [ROOT.GetLeader], а также другие южные федералисты призывают к новой Конституции, черпающей вдохновение в провинциальных конституциях, которые доказали свою способность защищать плюрализм в меньшем масштабе, ссылаясь на необходимость порвать с автократическими тенденциями Пекина. Хотя эти линии, проведенные на песке, и не являются неотъемлемой частью формирования новой Конституции, они служат неблагоприятным началом для того, что должно произойти."
 UPC.federalelections.600.a: "Именно свет Юга направит наше будущее!"
 UPC.federalelections.600.b: "Мы сражались, чтобы искупить обещания Синьхая."
  
 UPC.federalelections.601.t: "Переговоры о Китайской федерации"
 UPC.federalelections.601.d: "Самый важный вопрос, который обсуждается, — это отношения между федеральным правительством и его провинциями. Китайские династии исторически были централистскими по идеологии, хотя местные администрации пользовались различной степенью автономии. Все согласны с необходимостью расширения прав и возможностей местных уездов и районов, но роль провинций вызывает более жаркие споры. Конституция Цао Куня 1923 года якобы содержала положения о федеральном самоуправлении, но в то же время не смогла контролировать провинции или уважать их свободы.\n\nВ 1920-х годах общий консенсус заключался в том, что разные провинции должны разработать свои собственные конституции, а затем работать вместе над разработкой национальной. Это привело к децентрализованным предложениям, когда такие фигуры, как Чжан Тайянь, часто советовали конфедерацию, граничащую с анархизмом. Другие, такие как Тан Цзияо, ФДПК и большинство северных партий, предпочитают модель в стиле Цао Куня: сильное центральное правительство с некоторыми правами провинций. Многие, как Чэнь Цзюнмин, находятся посередине — ищут прагматичную модель разделения власти. Со времен расцвета федералистов многие изменили свои позиции.\n\nЭтот дискурс пронизывает практически все, задавая тон общему распределению полномочий между республикой и ее провинциями в конституции. Например, Бэйянская республика была двухпалатной. Сенат избирался провинциальными собраниями и представлял их, а Палата представителей — народ. Некоторые призывают к однопалатному законодательному органу, напоминая, что многие присоединились к Гуанчжоу ради его демократических обещаний и по-прежнему с подозрением относятся к регионализму.\n\nВ конечном счете, ответ на этот вопрос о провинциальной автономии направит составителей либо к установлению продолжения старой Китайской Республики, либо, возможно, к попытке создать совершенно новое правительство: Объединенные провинции Китая. В кульминационный момент движения федералистов делегаты со всего Китая окончательно определяют его идентичность."
 UPC.federalelections.601.a: "Мы всегда стремились построить Бэйян, которого никогда не было."
 UPC.federalelections.601.b: "Наше движение всегда было о чем-то большем!"
  
 UPC.federalelections.602.t: "Национальная ассамблея"
 UPC.federalelections.602.d: "На большей части Конституционного конвента многие приписывали необходимость сильного и дееспособного законодательного органа. Национальная ассамблея Бэйяна когда-то рассматривалась как прогрессивный орган, способный проводить широкие реформы, отчаянно необходимые для восстановления статуса Китая как великой державы в мире. К сожалению, слишком сильное вмешательство милитаристов в законодательный процесс привело к тому, что орган в значительной степени утратил легитимность и стал рассматриваться скорее как орган для штамповки решений. Эта новая Национальная ассамблея Республики будет укомплектована членами, избранными либо местными собраниями, либо избирательными органами в зависимости от местного законодательства, и будет помогать Президенту в работе на благо лучшего Китая.\n\nПоскольку Национальная ассамблея в основном определена, многие подняли вопросы о специальном представительстве для недопредставленных групп. Действительно, в Китае проживает разнообразный ассортимент этнических меньшинств: от уйгуров в Таримском бассейне до монголов в пустыне Гоби и тибетцев в Гималаях. Женское представительство также всплыло, поскольку, хотя женщины составляют половину Китая, Поднебесная традиционно была обществом патриархального доминирования и маргинализации женщин. Некоторые предложили выделить гарантированные места меньшинствам, а также женщинам, чтобы гарантировать, что их голоса будут услышаны в новой республике.\n\nНекоторые также подняли вопрос о профессиональных занятиях. В таком большом обществе, как китайское, каждая профессия необходима для функционирования страны. Многие призвали выделить определенное количество мест представителям различных профессий, чтобы голоса рабочей силы помогали направлять законодательный процесс нового правительства. Некоторые элементы, особенно партии, происходящие от лянистов, с особым энтузиазмом отнеслись к добавлению профессионального представительства, называя это вопросом национальной важности."
 UPC.federalelections.602.a: "Нет необходимости в дальнейшем представительстве меньшинств и профессий."
 UPC.federalelections.602.b: "Наша нация — составная, этнические меньшинства должны иметь право голоса!"
 UPC.federalelections.602.c: "Наша Республика держится на всех классах общества, они должны иметь право голоса!"
 UPC.federalelections.602.e: "Меньшинствам — места! Профессиям — места! Всем — места!"
  
 UPC.federalelections.603.t: "Избирательное право женщин в Китае"
 UPC.federalelections.603.d: "Китайская культура, хотя и в значительной степени развившаяся в период Весны и Осени династии Чжоу, в основном укрепилась ко времени Великой Хань. Вместе с этим пришло установление конфуцианского патриархального общества, которое установило такие нормы, как бинтование ног, которые теперь политическая элита Китая в значительной степени считает жестокостью Имперской эпохи. Однако китайское общество по-прежнему остается строго патриархальным, и женщинам не хватает политического равенства с мужчинами.\n\nНа Конституционном конвенте многие прогрессивные партии подняли вопрос об избирательном праве женщин как о праве, которое уже приняли большинство современных наций, и если Китай хочет достичь паритета с Западом, то китайские женщины также должны быть эмансипированы. Другие в Ассамблее предпочитают более осторожный подход, вместо этого призывая к тому, чтобы вопрос об избирательном праве женщин решался провинциями.\n\nКак национальный альянс избирательного права, так и их противники указывали на конституции Гуандуна и Хунани в качестве примеров, причем движение за избирательное право использовало провинциальные конституции как вдохновение для национальной, в то время как их противники указывают на них как на примеры того, что федерализация женского избирательного права работает так, как задумано. Действительно, многие в Китае уже считают, что женское избирательное право на национальном уровне будет установлено скорее раньше, чем позже, но такие настроения не обязательно полностью присутствовали в Конституционной ассамблее."
 UPC.federalelections.603.a: "Женщины смогут голосовать по всему Китаю!"
 UPC.federalelections.603.b: "Битва на другой день, оставьте это пока провинциям."
  
 UPC.federalelections.604.t: "Власть президента"
 UPC.federalelections.604.d: "Полномочия президента долгое время были источником споров и дебатов в истории Китайской Республики. Хотя главенство Национальной ассамблеи было установлено Временной конституцией 1912 года, Юань Шикай покончил с Ассамблеей в 1914 году. Даже несмотря на то, что Конституция была восстановлена в 1916 году президентом Ли Юаньхуном и премьером Дуань Цижуем, эти двое продолжали конфликтовать из-за власти, и Дуань в конечном итоге победил. Президентская власть была увеличена Конституцией Цао Куня 1923 года. В то время как правительство Чжан Цзолиня продолжало концентрировать исполнительную власть, кульминацией чего стало военное правительство, Конституция 1923 года была восстановлена возродившимся У Пэйфу.\n\nМногие на Конституционном конвенте жаждут покончить с президентской властью, вместо этого наделив властью премьер-министра. Хотя ясно, что никто не хочет диктатуры, определенные элементы в Конвенте продолжают выступать за сильное президентство, ссылаясь на повышение правительственной стабильности. Полномочия президента и премьер-министра будут четко разграничены, причем одобрение президента будет необходимо для подписания законодательства наряду с премьером, хотя последний все еще может протолкнуть законодательство большинством в 2/3 голосов. Президент будет представлять Китай на международном уровне и сможет заключать договоры при поддержке парламента.\n\nОбъявление военного положения также будет находиться в руках президента, хотя Парламент должен будет подтвердить решение президента, чтобы оно сохранялось. Они также упаковали свои предложения о полупрезидентской республике с прямыми выборами президента, вместо текущей модели непрямых выборов через Национальную ассамблею, которые были нормой. Парламентарии предпочли бы сделать президентство церемониальной ролью и влить все предлагаемые президентские полномочия в премьерство, которое, в свою очередь, наделяет этими полномочиями Ассамблею."
 UPC.federalelections.604.a: "Мы сохраним коллегию выборщиков и слабого президента."
 UPC.federalelections.604.b: "Нам нужно сильное президентство, а также всенародное голосование!"
  
 UPC.federalelections.605.t: "Судебная власть и гражданские права"
 UPC.federalelections.605.d: "С намеченными законодательными и президентскими полномочиями Конституционный конвент теперь обращается к судебным вопросам. Хотя восстановление Верховного суда поддерживается всеми, его точные полномочия остаются спорными. Некоторые призывали наделить судебную ветвь властью судебного надзора, позволяя им быть окончательными интерпретаторами Конституции.\n\nДругие отказались предоставить Верховному суду эти полномочия, обращаясь к Конституции Цао Куня за прецедентом. Также ведутся споры о том, должны ли судебные органы иметь право выбирать наказание для президента, подвергнутого импичменту по обвинению в государственной измене. Несколько делегатов также предложили разрешить судебной власти выступать арбитром в спорах между провинциальными правительствами и Центральным правительством, в то время как другие призывали наделить этими полномочиями либо президента, либо законодательный орган."
 UPC.federalelections.605.a: "Сильная судебная власть необходима для того, чтобы плюрализм сохранился!"
 UPC.federalelections.605.b: "Слабая судебная власть более способствует стабильности правительства."
  
 UPC.federalelections.606.t: "Конституция [GetYear] года"
 UPC.federalelections.606.d: "Конституционный конвент не обошелся без инцидентов и споров. Действительно, некоторые дебаты стали опасно жаркими. Не все увидели свои предложения кодифицированными, и многие сочли бы проект Конституции несовершенным юридическим документом. Однако компромисс стал окончательным победителем Конвента, и Конституция была принята. Слишком рано говорить, запомнится ли эта Конституция как стабилизирующая сила для нашей Федеративной Республики или это был лишь первый признак грядущих бед, но, тем не менее, долг правительства отныне — обеспечивать соблюдение этого документа как Верховного закона страны."
 UPC.federalelections.606.a: "Пусть наша Республика просуществует десять тысяч лет!"
  
 #Twin Dragons Taming the Water Events 
  
 UPC.twindragonevents.001.t: "Предложение от Маршала"
 UPC.twindragonevents.001.d: "С момента последствий Синьхайской революции Север и Юг страны постоянно предпринимали попытки преодолеть монументальную пропасть между их общими взглядами. В конце Синьхая Юань Шикай и Сунь Ятсен отправили своих представителей для провозглашения Бэйянской республики. В Эру милитаристов различные фигуры периодически встречались для проведения печально известных мирных переговоров Севера и Юга, но без особого успеха. В 1925 году Сунь Ятсен и Гоминьдан посетили Конференцию национального объединения Дуань Цижуя, которая снова превратилась в неуместные препирательства и послужила преамбулой для Северного похода. Только под принуждением силой оружия Север под властью Чжили смог подчинить Юг.\n\nНо глупость и утопизм продолжают маячить в умах многих ведущих деятелей Китая, смешиваясь с прагматизмом и оппортунизмом. К таким разнообразным предложениям относится и самый последний набор сообщений от [FNG.GetLeader], причем некоторые из его личных посланников даже проделали весь путь до [ROOT.Capital.GetCapitalVictoryPointName], прося аудиенции у [ROOT.GetLeader]. В тяжелых обстоятельствах войны за национальное сохранение, похоже, попытки возродить единство Севера и Юга возникли снова.\n\nУсловия, предложенные северными представителями и их сопроводительными сообщениями, довольно просты. Проще говоря, администрация [ROOT.GetLeader] и его союзники поместили бы себя под номинальную юрисдикцию Аньгоцзюнь (Армии национального успокоения), а взамен после национального объединения были бы реализованы различные обещанные реформы и политические поправки, наряду с гарантиями автономии.\n\nЕстественно, такое предложение заманчиво, ибо оно предотвратило бы еще одну кровавую вражду в нации, столь изуродованной вечным конфликтом. Но слова и обещания недобросовестного северянина вряд ли могут быть обязывающими, и нужно многое, чтобы доверять милитаристу, столь увлеченному своим самовозвеличиванием."
 UPC.twindragonevents.001.a: "Объединить нацию словами — дело благородное."
 UPC.twindragonevents.001.b: "Север и Юг никогда не смогут примириться."
  
 UPC.twindragonevents.002.t: "[FROM.GetLeader] принимает союз!"
 UPC.twindragonevents.002.d: "Чудесным образом, похоже, что лучшие умы и храбрейшие люди возобладали над политическими разногласиями и региональными настроениями. Пообещав [FROM.GetLeader] множество реформ в будущем и гарантировав их престиж и автономию в новой Республике, нам удалось в некоторой степени официально санкционировать их роль как составных частей Аньгоцзюнь. Хотя в данный момент это мало что значит, это означает как новую страницу для китайской дипломатии, так и гарантии их предполагаемой лояльности по прибытии Национального объединения. Однако все это поставлено на выполнение наших обещаний, чего [FROM.GetLeader] и его союзники, несомненно, будут требовать от [ROOT.GetLeader]."
 UPC.twindragonevents.002.a: "Так являемся ли мы людьми слова?"
  
 UPC.twindragonevents.003.t: "[FROM.GetLeader] отклоняет союз!"
 UPC.twindragonevents.003.d: "Похоже, что, как и все попытки до этого, любая перспектива мирного объединения Севера и Юга не может быть осуществлена силой одних только слов. Даже в таких тяжелых условиях, как возможное уничтожение руками Токио, личности и разногласия возобладали над национальным единством. Пока война продолжает бушевать, похоже, нам придется сражаться с одной рукой, связанной за спиной, готовясь к амбициям [ROOT.GetLeader] и его приспешников."
 UPC.twindragonevents.003.a: "Это их ошибка, которую они совершают."
  
 UPC.twindragonevents.004.t: "[FROM.GetLeader] подчиняется [FROM.FROM.Capital.GetCapitalVictoryPointName]"
 UPC.twindragonevents.004.d: "Объединение некогда довольно разрозненных провинциальных движений Китая было не чем иным, как геркулесовой задачей, и все же на удивление недавние усилия переросли в нечто вроде неформальной договоренности искренних намерений. [FROM.GetLeader], признанный национальным знаменосцем такого движения, сумел наладить сотрудничество с различными фигурами от губернаторов провинций до национальных личностей, чтобы увидеть завершение китайского объединения там, где оно потерпело неудачу в 1920-х годах. И со своей стороны, [ROOT.GetLeader] сыграл решающую роль во вливании импульса во второй виток китайского единства.\n\nИ, похоже, они не единственная сила, желающая договориться словами. Часто высмеиваемая как японские лакеи, предатели, изолированные функционеры или растратчики, Фэнтяньская клика Северо-Востока в последнее время снова стала заметной. Фактически пугало Пекина, им наконец удалось обеспечить город в третий раз в новейшей истории.\n\nСреди всех фанфар, принудительных или добровольных, был замечен любопытный шквал сообщений и посланников, спустившихся от северных милитаристов для встречи с представителями [FROM.GetLeader]. Хотя немногие в нашей собственной администрации думали, что из этого контакта выйдет что-то путное, возможно, просто протоколы военного времени против иностранных империалистов, похоже, это переросло во что-то большее. Обещая политические реформы в будущем, Аньгоцзюнь поставила себя номинальными сюзеренами не только [FROM.GetLeader], но и, как следствие, [ROOT.GetLeader], без особого права голоса в этом вопросе."
 UPC.twindragonevents.004.a: "Мы должны оставаться едиными..."
  
 UPC.twindragonevents.005.t: "Объединение на равных условиях"
 UPC.twindragonevents.005.d: "Объединение Китая было непростой задачей, и все же кажется, что постоянный, вездесущий соперник правительства Чжили наконец вышел победителем. Проживая в своем северо-восточном убежище и поддерживаемое японцами, Фэнтяньское правительство наконец, в третий раз, вернуло себе Пекин. Переживая последствия национального объединения, их правительство столкнулось с критическими экономическими недостатками и пустошью политической поддержки; немногие забыли репутацию поклонников Фэнтяня.\n\nБолее того, похоже, что, несмотря на все усилия маршала Чжана, раскалывающийся альянс Аньгоцзюнь начал разрывать себя на части. С примесью амбиций Токио под флагом Пяти полос возник стремительно разворачивающийся торнадо политического соперничества и внутренней борьбы. Клика Сикан, Клика коммуникаций, Лига возрождения, различные демократы и другие более мелкие клики начали враждовать из-за должностей и направления правительства.\n\nДостаточно сказать, что, будучи крупнейшим блоком неописуемых филиалов Аньгоцзюнь, на юге начало назревать растущее чувство обиды. Привязав себя под национальным давлением к Аньгоцзюнь, похоже, о них часто забывали в делах Пекина. С уникальной позицией слабости Фэнтяня на игровом поле многие в правительстве [ROOT.GetLeader] советовали своего рода восстание или бунт. Ибо Юг и Север никогда не могли быть по-настоящему объединены лишь легкомысленными мирными переговорами."
 UPC.twindragonevents.005.a: "Им вряд ли можно доверять!"
 UPC.twindragonevents.005.b: "Ждем своей очереди..."
 UPC.twindragonevents.005.c: "Давайте работать вместе ради лучшего будущего."
  
 UPC.twindragonevents.006.t: "Восстание [FROM.GetAdjective]"
 UPC.twindragonevents.006.d.start: "После осознания объединения Китая Аньгоцзюнем различные клики и властители в восстановленной республике Китая начали борьбу за власть и поддержку по всей стране. В регионалистских настроениях кроется страх перед растущей централизацией правительства, коррупцией в рядах правительства (слишком хорошо известной северо-восточным жителям) и страх перед доминированием политических клик Дунбэя. Поскольку сторонники [FROM.GetLeader] готовы подкрепить свои претензии оружием, вероятно, назревает гражданская война.\n\nЦентральное правительство, конечно, как ожидается, будет иметь большое преимущество, контролируя крупные города Китая и обладая международной легитимностью (по крайней мере, на данный момент), что дало им больший доступ к займам, а также большую налоговую и людскую базу для призыва армии. Однако централизованная Аньгоцзюнь по-прежнему удерживает в своих рядах много нелояльных регионалистов. Более того, [FROM.GetAdjective] регионалисты уверены в способностях своих сил и ожидают, что другие восстанут против тиранической диктатуры Центрального правительства. И Китаю не привыкать к потрясениям. Однако обе стороны могут согласиться в том, что они не потерпят еще одну эру милитаристов."
 UPC.twindragonevents.006.d.npa: "$UPC.twindragonevents.006.d.start$\n\nЧувствуя ярость из-за кажущегося предательства приоритетов Юга ради мелких распрей внутри северного политического истеблишмента, [FROM.GetLeader] и [FROM.GetRulingParty] сумели сплотить знамя, слишком похожее на многочисленные южные правительства, предшествовавшие им: южная оппозиция северному консерватизму и коррупции. Изначально объединившись на условиях Войны против иностранных империалистов, действительно кажется, что только глупцы поверили бы в возможность навести мосты между Севером и Югом одними словами."
 UPC.twindragonevents.006.d.upc: "$UPC.twindragonevents.006.d.start$\n\nРассматривая приверженность северо-восточных жителей демократии и федерализму как не более чем фарс, Южное федералистское правительство, первоначально вступившее в союз с Аньгоцзюнь из-за условий военного времени, заняло твердую позицию против Дунбэя и его желаний. Настаивая на принципах движения федералистов как единственном средстве прогресса и развития Китая, похоже, что Китай снова погрузился в открытый конфликт, и снова между Югом и Севером."
 UPC.twindragonevents.006.a: "Они не смогут предать нас, если мы предадим их первыми!"
 UPC.twindragonevents.006.b: "Это никогда не сработало бы."
 UPC.twindragonevents.006.c: "Моя верность была республике! Демократии!"
  
 UPC.twindragonevents.007.t: "Компромисс федералистов"
 UPC.twindragonevents.007.d: "Несмотря на все притворство об обратном, похоже, что мгновенный союз с Южным федералистским движением во время Войны национального сопротивления расцвел в новую возможность. Свет, сияющий во тьме, Федералистское правительство согласилось на формальные условия альянса Аньгоцзюнь. Надеясь, возможно, настаивая, на провозглашении нового движения для продвижения федерализма и демократии в Республике, правительства Фэнтяня и федералистов пришли к условиям взаимного признания и уважения; закрепленным назначением Чжан Цзюньмая, ведущего демократа, премьером Республики.\n\nХотя некоторые пессимистично рассматривают его назначение как страховку, а другие — как подлинное усилие идеалиста, Чжан уже начал бодаться с различными членами Северо-Восточного правительства, поскольку он настаивает на проведении различных реформ и назначений почти немедленно. Точно так же он оказался стеснен и ограничен изолирующими кликами Северо-Востока, где мало кто желает работать с тем, кого они считают радикалом или социалистом.\n\nТем не менее, нынешнее положение дел по-прежнему омрачено напряженностью, поскольку многие не верят, что [ROOT.GetLeader] должным образом выполнит свою часть соглашения. В связи с этим различные компоненты вооруженных сил федералистов сохраняют свою автономию в составе Аньгоцзюнь и находятся в состоянии повышенной готовности. Однако, если бы маршал сумел выполнить свои обязанности вопреки своему здравому смыслу, он был бы не чем иным, как героем."
 UPC.twindragonevents.007.a: "Тогда мы должны сдержать свое слово."
  
