 UPC_upcoming_federal_elections_timer: "Предстоящие федеральные выборы через [?UPC.campaign_timer_var|0] мес."
 UPC_upcoming_federal_elections_timer_desc: "Федеральные выборы запланированы на ближайшие несколько месяцев. В течение этого времени мы сможем проводить кампании в различных провинциях, а также заниматься другой предвыборной деятельностью. Наши противники на этих выборах тоже не будут пассивными — единственный способ остаться на месте — это продолжать двигаться!"
  
 UPC_elections_swap_sides_decision: "Сменить сторону"
 UPC_elections_swap_sides_decision_desc: "Все мы иногда совершаем ошибки. И в такие моменты мудрые политики могут предпочесть сменить курс и поддержать более сильную лошадь."
  
 UPC_expand_our_ground_game_decision: "Расширение работы на местах"
 UPC_expand_our_ground_game_decision_desc: "Традиционные китайские выборы были элитарным делом с минимальной агитацией со стороны ведущих политиков — грязная работа оставалась в руках различных посредников и других агентов. Однако времена меняются, и, если мы хотим победить на этих выборах, нам нужно будет влить дополнительные ресурсы в избирательную кампанию — добавить больше остановок, больше выступлений перед избирателями, больше активистов — все, что угодно, чтобы получить преимущество."
  
 UPC_leverage_presidential_powers_decision: "Использование президентских полномочий"
 UPC_leverage_presidential_powers_decision_desc: "Президент — могущественный человек, как бы различные законодательные органы ни пытались ограничить прерогативы исполнительной власти. Некоторые могут назвать это злоупотреблением или популизмом, но народ избирает своего Президента, чтобы он действовал. Несколько указов в последнюю минуту для улучшения качества жизни людей и обеспечения того, чтобы у них в карманах было немного больше монет, найм еще нескольких избранных лиц на ценные синекуры и отстранение нескольких надоедливых соперников — это не коррупция, это просто политика."
  
 UPC_lean_on_our_military_ties_decision: "Опора на военные связи"
 UPC_lean_on_our_military_ties_decision_desc: "У нашего президента уникально близкие отношения с военными, он набирал, обучал и вел их к победе. Хотя он якобы перешел на более гражданскую роль и отказался от повседневного контроля над операциями, он по-прежнему сохраняет обширную личную дружбу с ведущими офицерами, которые были бы более чем рады послужить, «повлияв» на предстоящее голосование."
  
 UPC_campaign_in_state_decision: "Кампания в [UPC_election_region_scripted_loc]"
 UPC_campaign_in_state_decision_desc: "Поскольку наше время и ресурсы ограничены, мы должны стратегически подходить к тому, где мы сосредотачиваем наши усилия по проведению кампании. Мы, вероятно, максимизируем наше влияние, проводя кампании в провинциях с высокой плотностью населения, таких как Сычуань, Шаньдун, Чжили, Хэнань, Гуандун и Цзянсу, однако мы также можем извлечь выгоду из кампаний в меньших, но более традиционных базах поддержки, таких как Чжэцзян, Хунань и Шанхай для ДЛК и Юньнань, Цзянси и Диаспора для ВРА."
  
