 UPC_the_warchest_of_national_unification_idea: "Сбор средств на национальное объединение"
 UPC_the_warchest_of_national_unification_idea_desc: "Чтобы начать грандиозную кампанию, необходим достаточный запас оружия, боеприпасов, людских ресурсов, материальной части и финансов. Без всего этого кампания просто обречена на провал. В конце концов, войну нельзя выиграть одними лишь надеждами и мечтами. Создание такого огромного запаса — дорогостоящее предприятие, однако в краткосрочной перспективе оно принесет огромную пользу. Ибо все наши рукопожатия, реквизиции, соглашения и сделки обеспечили правительство избытком всего, что ему может понадобиться. Остается лишь надеяться, что цена, которую придется заплатить в будущем, не окажется слишком высокой."
  
 UPC_the_third_constitutional_protection_movement_idea: "Третье движение в защиту конституции"
 UPC_the_third_constitutional_protection_movement_idea_desc: "Первое движение в защиту конституции возникло в атмосфере смерти Юань Шикая после успешной Войны в защиту республики. Герои войны с юга заложили основу для создания собственного Правительства национальной защиты, и их усилия стали предтечей Конституционного правительства, созданного в 1917 году доктором Сунь Ятсеном в Гуанчжоу. Пригласив первоначальных членов ассамблеи (которая к тому времени была распущена Дуань Цижуем), Сунь, Лу Жунстин, Тан Цзияо, Ху Ханьминь, У Тинфан, Чэнь Цзюнмин, Цэнь Чуньсюань, Ли Лецзюнь и многие другие создали Правительство защиты конституции. В конечном итоге это привело к смещению Суня и провалу мирных переговоров Севера и Юга под руководством клики Аньхой.\n\nВторое движение в защиту конституции возникло как оппозиция дальнейшим мирным переговорам под руководством клики Чжили, и в результате последовавших конфликтов в Юньнани и Лянгуане Сунь был переизбран генералиссимусом. Впоследствии произошел раскол между Сунем и Чэнь Цзюнмином по вопросу «Объединение через подчинение или переговоры». Хотя Сунь отверг путь переговоров, безумие Северного похода доказывает, что Юг должен выждать время и вновь вступить в мирные переговоры с Севером.\n\n$UPC_the_third_constitutional_protection_movement_idea_tt$"
  
 UPC_directorate_of_rehabliation_negotiation_idea: "Директорат реабилитации"
 UPC_directorate_of_rehabliation_negotiation_idea_desc: "Директорат реабилитации — это новый правительственный орган, созданный с целью решения вопросов, касающихся координации недавно занятых территорий. В его ведении находится поддержание военного положения, интеграция провинциальных и уездных администраций, а также национальное восстановление. Укомплектованный различными департаментами под руководством генерального директора и двух заместителей, Директорат функционирует подобно министерству и, в конечном счете, задуман как временный институт на тот срок, пока «реабилитация должна продолжаться»."
  
 UPC_a_modified_tutelage_idea: "Измененная опека"
 UPC_a_modified_tutelage_idea_desc: "Под неизгладимым впечатлением от доктора Сунь Ятсена Гоминьдан навсегда остался национально-революционным движением. Он должен был следовать трем этапам национальной революции, как предписывал Сунь: военное объединение, политическая опека и конституционное правление. И увы, кажется, что движение федералистов нарушило этот порядок, предпочтя не внедрять систему Данго (партийного государства). В то время как ортодоксы и сторонники жесткой линии осуждают это как обречение нации на провал или даже как создание коррумпированной демократии, построенной на оковах наследия Бэйяна, прагматики и умеренные смогли адаптироваться.\n\nГоминьдан всегда был партией Национальной революции Китая, какую бы форму она ни принимала. И хотя Опека в предписанном виде, возможно, не увидит свет, задача Гоминьдана по-прежнему состоит в просвещении народа, обучении его Четырем основным правам и взращивании китайской демократии, способной выдержать испытание временем."
  
 UPC_second_party_of_the_republic_idea: "Вторая партия республики"
 UPC_second_party_of_the_republic_idea_desc: "Демократическая лига Китая долгое время оставалась верной заветам и практике гражданской демократии. Непоколебимые в этой вере, партии-предшественницы ДЛК стояли вместе с нацией у истоков первых демократических практик, и раз за разом они выступали авангардом защиты добродетелей и ценностей нации, наставляя граждан на путь осуществления их избирательных прав. И с момента поднятия флага федералистского движения под эгидой Великого республиканского альянса, ДЛК была на их стороне с самого начала пути.\n\nВеликий республиканский альянс, возможно, инициировал и основал новую республику, но именно под покровительством и эгидой Демократической лиги Китая находится китайская демократия. Нет более достойной организации, чтобы быть Второй партией республики."
  
 UPC_stabilising_electoral_politics_GXC_idea: "Стабилизация электоральной политики"
 UPC_stabilising_electoral_politics_GXC_idea_desc: "Невероятно, по крайней мере, судя по прецедентам, но похоже, что китайская демократия пришла всерьез и надолго. По инициативе Великого республиканского альянса южные федералисты сумели привить нации настоящую демократию. Верные своей федералистской природе, они наблюдали за созданием избирательной инфраструктуры, объединением нации и, в конечном счете, мирной передачей власти другой партии.\n\nВыполнив множество своих политических обещаний, несмотря на потерю власти, Великий республиканский альянс добился настоящей стабилизации и нормализации парламентской демократии в Республике. В резком контрасте с Бэйянской республикой, электоральной политикой Китая теперь управляют не военные диктаторы, а гражданские политики."
  
 UPC_anti_partisan_ideal_idea: "Идеал беспартийности"
 UPC_anti_partisan_ideal_idea_desc: "Властные личности разорвали на части Бэйянскую республику и династию до нее. Под эгидой эгоизма, идеологической приверженности и слепого подчинения первая попытка нации установить демократию привела к дальнейшим революциям и многочисленным гражданским войнам, завершившимся увековечиванием Эры милитаристов. Идеология может дать людям основу для действий, но человек должен сохранять в себе способность к собственным мыслям. Как в роли ведущих политиков, так и в качестве участника электоральной политики.\n\nХотя противники из радикальных крыльев могут осуждать «Сциентистский» и «Моралистский» идеализм фракции Независимых республиканцев на китайской политической сцене, очевидно, что их ярость падает на глухие уши. Под руководством таких людей, как Ху Ши и Хуан Фу, Федеративная Республика будет придерживаться исключительно Идеала беспартийности. Мудрые действия без слепых идеологических догм, разрушающих их."
  
 UPC_the_liangist_dream_GXC_idea: "Мечта Ляна"
 UPC_the_liangist_dream_GXC_idea_desc: "Лян Цичао понимал, когда пришло время призывать к революции, а когда — к миру. Когда правительство Цин отказалось принять реформы Кан Ювэя, Лян был вынужден заключить союз по необходимости с революционными силами Сунь Ятсена, чтобы бороться за лучший Китай. Однако после 1912 года Лян отложил косу восстания, чтобы работать в Пекинском правительстве ради реальных перемен. В отличие от культистов партийного государства, мы продолжаем борьбу за сильный, демократический Китай. Мы упрямо отвергаем призывы тиранов и отстаиваем защиту свободы!"
  
 UPC_the_liangist_dream_left_idea: "$UPC_the_liangist_dream_GXC_idea$"
 UPC_the_liangist_dream_left_idea_desc: "Лян Цичао десятилетиями находился в авангарде реформизма в китайской политике. Суньятсенисты из Гуанчжоу не оставили Ляну выбора и продолжили попытки ввергнуть Китай в эпоху анархии. Постоянно пересматривая свои идеи, Лян пришел к осознанию того, что идеал, к которому нужно стремиться, лежит в реформистском социализме фабианского типа, а не в зараженной большевизмом чуши Гоминьдана. Теперь, когда долгожданный мир наконец обеспечен, мы можем воплотить видение Ляна в реальность."
  
 UPC_executive_camarilla_idea: "Исполнительная камарилья"
 UPC_executive_camarilla_idea_desc: "Нет лучшей гарантии демократии, чем правление меритократической элиты, и именно эта элита формирует внутренний круг вокруг Президента. Пока китайская нация не стабилизируется против полевых командиров, революционеров и всех тех, кто призывает уничтожить ее зарождающуюся демократию, Президент и его Камарилья будут оставаться готовыми к действию. Стражи демократии в «Республике заряженного ружья», лоялисты президента нанесут удар при любых признаках опасности. Превентивно или нет, но именно под их инициативой Китай будет направлен в правильное светлое будущее."
  
 UPC_regionalism_enshrined_idea: "Закрепленный регионализм"
 UPC_regionalism_enshrined_idea_desc: "Федерализм строится только на вкладе провинций в национальное целое — в этом, по сути, и заключается ядро движения. Чжан Тайянь, отец китайского федерализма, твердо верил, что нация должна принять форму, более похожую на Конфедерацию, где регионы могут осуществлять истинную автономию. Для демократии и федерализма важно, чтобы нация предоставила надлежащую власть своим провинциям, и при Регионалистах роль Провинции была культурно закреплена в Республике. Это уникальная китайская судьба — отвергнуть понятие национального государства, заменив его Национальной Конфедерацией."
  
 UPC_a_plebiscitarian_revolution_by_the_ballot_idea: "Плебисцитарная революция через бюллетень"
 UPC_a_plebiscitarian_revolution_by_the_ballot_idea_desc: "Цзэн Ци мечтал призвать к насильственной революции против милитаристов и Гоминьдана, чтобы создать национальную этатистскую республику и привести китайский народ к заслуженной эре восстановления, но наши мечты были умерены ветрами судьбы. Будущее Младокитайской партии (YCP) лежит не в силе оружия, а в силе электорализма. С каждым днем мы завоевываем сердца и умы нашей молодежи, и с каждым днем массы продолжают вознаграждать нашу благородную партию. Цзэн намеревался выковать новый Китай кровью и железом, но Цзо завершит его мечту мощью пера!"
  
 UPC_education_for_the_masses_idea: "Образование для масс"
 UPC_education_for_the_masses_idea_desc: "Как гласит манифест западной религии — Республики, все они находятся под влиянием тройственного идеала. Свержение древних социальных классов, отказ от автократического правления, всеобщее равенство всех людей перед законом, гарантия четырехчастной свободы совести, мысли, слова и печати, которая сформировала оплот революции, достижение всеобщего образования, освобождение женщин, феминистское движение, реализация политических прав женщин.\n\nВсе эти великие достижения могут быть реализованы только на базе образования народных масс. Если Китай хочет стоять на международной арене как равный или даже превосходящий своих современников, он не может прозябать в неграмотности. Когда средний крестьянин не умеет читать, как можно ожидать от него исполнения гражданского долга при отзыве депутатов? Будь что будет, давайте просвещать народ."
  
 UPC_the_anti_opium_campaign_idea: "Антиопиумная кампания"
 UPC_the_anti_opium_campaign_idea_desc: "Хотя местные усилия в Гуандуне под руководством адептов Великого республиканского альянса привели к значительному улучшению ситуации, курение опиума и контрабанда все еще остаются острой проблемой в масштабах всей страны. Особенно в провинциях с гораздо менее строгим контролем или иной моралью, нации пришлось смириться с притоком и постоянным присутствием этого мерзкого вещества в повседневной жизни. Используя Международное общество по борьбе с опиумом, массовое сжигание запасов и принудительную конфискацию, правительство надеется, что сможет окончательно отправить этот недуг на свалку истории."
  
 UPC_union_dissent_idea: "Недовольство профсоюзов"
 UPC_union_dissent_idea_desc: "Возможно, это непопулярная мера, но различные социалистические организации (легальные и не очень) начали различные спорадические попытки забастовок в ответ на требование Правительства о деполитизации профсоюзного движения. Как и прежде, Правительство сочло нужным вести переговоры с профсоюзами, призывая к компромиссу, взаимопомощи и взаимопониманию для достижения прогресса. Посредством улучшения условий труда, заработной платы и социального обеспечения Правительство сменит кнут на пряник, и все, что ожидается взамен — это осязаемая аполитичность профсоюзов, как бы сильно синдикалисты это ни осуждали."
  
 UPC_primacy_of_the_executive_state_idea: "Верховенство исполнительной власти"
 UPC_primacy_of_the_executive_state_idea_desc: "Автократия может восприниматься как антитеза демократии, но это правда лишь в том случае, если люди, в которых сосредоточена вся власть, не относятся к «Добрым людям». Просвещенная диктатура, если использовать ее в полной мере, может на самом деле работать лучше, чем элементарная демократия в краткосрочной перспективе. И в переводе на государственный уровень, только исполнительная власть может действовать в моменты кризиса, чтобы предотвратить разобщенность. Эра милитаристов была ничем иным, как катастрофой, с повсеместным регионализмом и провинциальными правительствами, не подчиняющимися Столице.\n\nСохраняя Федерализм как основную идеологию, Конституционалисты тем не менее подтолкнули Центральное правительство к более активному подходу в балансе между Провинцией и Нацией. Исполнительная власть должна сохранять влияние на жизнь каждой провинции, чтобы не допустить повторного проявления милитаризма."
  
 UPC_the_anti_vice_campaign_idea: "Кампания по борьбе с пороками"
 UPC_the_anti_vice_campaign_idea_desc: "Искоренение опиума долгое время было желанием Великой республиканской лиги с момента ее зарождения в умах Партии общественных интересов Чэнь Цзюнмина, Банды девяти Сюн Кэу, Партии народного правительства Тан Цзияо или Общества обновления народа Чжао Хэнти. Порок, наиболее остро ощущаемый в пограничных провинциях, составляющих ядро старого движения Федералистов, опиум был ничем иным, как чумой, поразившей китайскую землю и используемой для насилия над народом!\n\nНо Правительство должно пойти дальше, оно должно приступить к полному искоренению порока. Социальные болезни — опиум, бандитизм, азартные игры и гражданская война — со всем этим нужно покончить в кратчайшие сроки. С объединением нации и идущими кампаниями против бандитов остается только искоренение опиума, азартных игр, коррупции, проституции и всех других форм недугов."
  
 UPC_a_legacy_of_thousands_of_years_idea: "Тысячелетнее наследие"
 UPC_a_legacy_of_thousands_of_years_idea_desc: "Со времен Великой Хань в Китае существовал элитный класс ученых-чиновников, на который опиралось все китайское общество. Чтобы вести нацию вперед, выполнять повседневные бюрократические обязанности, их достоинства подтверждались сдачей императорских экзаменов. И хотя их слава померкла с отменой экзаменов, их присутствие все еще сильно ощущается. В нации существует сильная бюрократическая традиция, традиция эффективности и здоровой морали, и многие до сих пор несут это кредо. Ни одна бюрократия или администрация не будет эффективнее, чем у новой Республики!"
  
 UPC_the_rural_education_campaign: "Кампания сельского образования"
 UPC_the_rural_education_campaign_desc: "Прерогатива Правительства — обеспечивать благополучие своих граждан, и все же средний китайский крестьянин страдает от своей несправедливой неграмотности. Это не только калечит нацию и личную жизнь гражданина, это просто уничтожает все возможности для здоровой, функциональной и стабильной демократии. Хотя Правительство обычно следит за постепенным ростом грамотности в стране, под давлением фракции регионалистов сельское население — их главная база поддержки — должно увидеть жизненно важное просвещение, которое может дать современное образование."
  
 UPC_all_representative_governmental_organs_idea: "Всепредставительный правительственный орган"
 UPC_all_representative_governmental_organs_idea_desc: "В такой огромной стране, как Китай, федеративные организационные принципы — единственный способ создать правильное сочетание локализма и центральной власти. Создание местного самоуправления, синтезирующего корпоративизм и федерализм, будет способствовать национальному омоложению Китайской Республики и приведет нас к эпохе свободы и процветания!"
  
 ######################################## 
 ######- Section 05: Focus Tree - ####### 
 ######################################## 
  
 #Road to Unification Tree 
 UPC_the_road_to_unification: "Путь к объединению"
 UPC_the_road_to_unification_desc: "Китайское положение дел не может больше продолжаться! Если Центральное правительство перестанет действовать добросовестно и на надежных, стабильных условиях, то инициатива должна вновь перейти к южным центрам власти, чтобы возглавить усилия по национальному объединению. Мир перевернут с ног на голову, и Китай не может продолжать страдать или пребывать в своем несчастье. Пока сгущаются тучи, нация и конституция должны быть снова защищены."
  
 UPC_the_march_to_war: "Марш к войне"
 UPC_the_march_to_war_desc: "Объединение путем переговоров оказалось запятнанной попыткой идеализма и аппаратчиков мира, которые искренне не могут подкрепить свои слова хоть сколько-нибудь разумной демонстрацией силы. Дуань Цижуй однажды пытался объединить нацию силой, и ему совсем немного не хватило до успеха. Чжили пытались подражать ему, были побеждены, смогли вернуться и успешно объединили нацию огнем и войной. Теперь пришло время Югу завершить дело."
  
 UPC_balancing_freedom_and_authority: "Баланс свободы и власти"
 UPC_balancing_freedom_and_authority_desc: "Партия демократического социализма последовательно рассматривает и власть, и свободу как незаменимые компоненты нации, и поэтому они действуют в разных сферах деятельности правительства. В административных вопросах правительство должно обладать достаточными полномочиями для обеспечения эффективности, сохраняя при этом решительность действий. [ROOT.GetLeader], возможно, не обязательно согласен с таким мнением, но поддержка прогрессистов полезна."
  
 UPC_a_warchest_for_national_unification: "Военная казна для национального объединения"
 UPC_a_warchest_for_national_unification_desc: "Война — дорогостоящее предприятие, обычно финансируемое за счет налогов, принудительных реквизиций или займов у иностранных держав. Создание значительного запаса валюты и материальной части также неизбежно будет непростым делом. Однако объединение должно быть доведено до конца, чего бы это ни стоило. К черту будущих партнеров, Китай не может больше ждать."
  
 UPC_the_path_of_negotiation: "Путь переговоров"
 UPC_the_path_of_negotiation_desc: "Было бы глупо ввергать администрацию провинций в очередную дорогостоящую войну, вызывая гром и кровопролитие по всей стране в тщетной попытке самолюбивого объединения. Истинная государственная мудрость рождается из компромисса и дискуссии, а не из быстрой пули и холодной стали. [ROOT.GetLeader] не может признать себя великим китайским государственным деятелем, если он не испробовал другие варианты, прежде чем прибегнуть к мечу."
  
 UPC_leverage_through_solidarity: "Влияние через солидарность"
 UPC_leverage_through_solidarity_desc: "Север сам по себе может и не быть особо единым образованием, но на индивидуальной основе любое северное государство доказало свою способность быстро объединяться, чтобы предотвратить доминирование Юга. Благодаря тщательной дипломатии и развитию необходимых отношений Юг снова объединится в широкую коалицию единства, что сделает невозможным его завоевание силой. Естественно, Северу в результате придется сесть за стол переговоров."
  
 UPC_a_model_for_all_to_see: "Образец для всех"
 UPC_a_model_for_all_to_see_desc: "«Образцовые провинции» — распространенное выражение по всей стране, наиболее очевидное на примере Шаньси или Хунани. Если какое-либо южное правительство хочет создать ощущение легитимности, чтобы соперничать с Севером, оно должно доказать свою способность эффективно и в должном порядке управлять администрацией. Благодаря таким усилиям обязательно будет сформировано чувство национального долга и служения."
  
 UPC_a_new_directorate_of_rehabilitation: "Новый Директорат реабилитации"
 UPC_a_new_directorate_of_rehabilitation_desc: "Первоначально созданный Чэнь Цзюнмином по возвращении в Кантон в начале 1920-х годов, Директорат реабилитации должен был заниматься всеми вопросами, касающимися национального объединения. Намереваясь пригласить Тан Шаои на пост генерального директора вместе с коалицией южных провинций, это начинание в конечном итоге провалилось. В своей второй итерации он вместо этого сосредоточится на координации оккупированных территорий."
  
 UPC_fight_for_the_interior: "Битва за внутренние районы"
 UPC_fight_for_the_interior_desc: "Вся нация должна быть едина, и поэтому скромные внутренние районы Китая должны быть возвращены в лоно страны. Сама по себе земля разобщенности, где в основном доминируют Сычуань и его разрозненные клики, внутренние районы могут стать будущим плацдармом для чрезвычайного правительства, если прибрежные регионы падут под натиском иностранного вторжения. Точно так же их инкорпорация предотвратит потенциальный удар в спину во время марша на Север."
  
 UPC_topple_beiyang: "Свергнуть Бэйян"
 UPC_topple_beiyang_desc: "Бэйянское правительство с момента своего основания в 1912 году не делало ничего, кроме как доказывало свою глупость. Десятилетия политической карусели принесли ему очень мало стабильности или легитимности в глазах общественности. Расколотое между соперничающими северными милитаристскими кликами, оно в конечном счете потеряло себя в миазмах жадности и политиканства. Так же, как Бэйян растоптал все надежды на новый Китай, мы должны искоренить всю сущность старого Бэйяна."
  
 UPC_smash_the_league: "[UPC_smash_the_league_scripted_loc]"
 UPC_smash_the_league_desc: "Южная столица и жемчужина в глазах Сунь Ятсена, Нанкин, находится на территории Лиги и ее прибрежных провинций. Если какое-либо южное правительство хочет предотвратить господство северных политиков и милитаристов, которое породил бы Пекин, абсолютно необходимо обезопасить восточные провинции. Это дом большей части богатств Китая, и [ROOT.GetLeader] найдет им лучшее применение."
 UPC_smash_the_league_kmt: "Разграбить Партийное государство"
 UPC_smash_the_league_nokmt: "Разгромить Лигу"
  
 UPC_take_on_fengtian: "Бросить вызов Фэнтяню"
 UPC_take_on_fengtian_desc: "Укрывшись в Трех Северо-Восточных провинциях, Маньчжурия в значительной степени сумела избежать большей части ужасающего кровопролития Эры милитаристов. Конечно, не совсем невредимые, северо-восточные жители редко покидали свою базу в полном составе, даже в попытках править Бэйянским правительством. Когда Центральное правительство повержено, только Шэньян остается на пути к объединению."
  
 #Affairs of the Ruling Coalition Tree 
 UPC_affairs_of_the_ruling_coalition: "Дела правящей коалиции"
 UPC_affairs_of_the_ruling_coalition_desc: "В рамках новой Федеративной Республики по замыслу, по крайней мере, для сохранения демократической целостности при парламентской ассамблее, предполагается, что ни одна партия не может достичь истинного абсолютного большинства в Ассамблее без подлинной поддержки большинства. Таким образом, любые партнеры по коалиции, привлеченные для обеспечения большинства, будут ожидать свою, так сказать, десятину. Выполнение их политических требований, несомненно, купит их поддержку нашей повестки."
  
 UPC_KMT_coalition_focus_pol_1: "Гоминьдан: Адаптация Трех принципов"
 UPC_KMT_coalition_focus_pol_1_desc: "Это правда, что Гоминьдан есть и остается революционной партией. Рожденный в огне революции и восстановленный после того, как провал парламентских усилий Сун Цзяожэня обернулся репрессиями после Второй революции. Но настоящая революция должна знать, когда пришло время адаптироваться. А те сторонники жесткой линии, которые отказываются участвовать в новой демократии? Их нужно оставить позади."
  
 UPC_KMT_coalition_focus_eco_1: "Гоминьдан: На пути к Миньшэн"
 UPC_KMT_coalition_focus_eco_1_desc: "Важнейшей частью программы партии является основной принцип Миньшэн, или Народное благосостояние. И такое благосостояние не может быть обеспечено массам, если нынешняя ситуация с землей останется прежней. Крестьяне трудятся, но не процветают и не получают должного вознаграждения, и фактически прикованы к своим землевладельцам. Хотя парламентская система может ограничивать более радикальное решение проблемы, все же можно подтолкнуть ситуацию в правильном направлении."
  
 UPC_KMT_coalition_focus_soc_1: "Гоминьдан: Нация Революции"
 UPC_KMT_coalition_focus_soc_1_desc: "Очень редко путь реформ Ляна и Кана приносил подлинное улучшение китайской нации. Сто дней реформ были разорваны роялистами. Синьхайская революция была разрушена автократами. Партийное государство Исследовательской клики было лишь маскарадом для клуба Аньфу Дуань Цижуя. Однако ее величайшие успехи — Война в защиту республики, Синьхайская революция — были достигнуты благодаря жертвам ее мучеников и огню революции. Крайне важно укрепить это понятие."
  
 UPC_KMT_coalition_focus_flex_1: "Гоминьдан: Легализация сестринских партий"
 UPC_KMT_coalition_focus_flex_1_desc: "Какое несчастье, что Гоминьдан может быть легализован, а его сестринские революционные партии отброшены на обочину. Представители рабочих и крестьян не могут продуктивно работать на благо китайских масс, когда их называют «террористами», «предателями» и «опасными». Как член правящей коалиции, Гоминьдан не может сидеть сложа руки, пока они прозябают в таком статусе; крайне важно, чтобы они были легализованы."
  
 UPC_KMT_coalition_focus_pol_2: "Гоминьдан: Наследие доктора Суня"
 UPC_KMT_coalition_focus_pol_2_desc: "Отношения доктора Сунь Ятсена с движением федералистов были... мягко говоря, расколотыми. Конечно, когда-то эти движения были едины, гармоничны в своей совместной миссии разрушить гнилую структуру старого национального порядка и приблизить новое будущее. Увы, они разошлись. И у Федералистов, и у Гоминьдана есть свои объяснения этому, но одно можно сказать наверняка. Доктор Сунь Ятсен — революционер; без него нации здесь не было бы."
  
 UPC_KMT_coalition_focus_eco_2: "Гоминьдан: План национальной реконструкции"
 UPC_KMT_coalition_focus_eco_2_desc: "Великий экономический план партии — это Реконструкция нации. Он должен быть завершен на Третьем этапе Национальной революции, наряду с окончанием Опеки и провозглашением Народной демократии. Очевидно, что, хотя политические цели могут быть недостижимы в чистом виде, как того желал Отец нации (Гофу), экономические цели все еще применимы. Только через внутреннюю автаркию и период примирения мы сможем процветать в новую эру."
  
 UPC_KMT_coalition_focus_soc_2: "Гоминьдан: Переплетение идеологии и образования"
 UPC_KMT_coalition_focus_soc_2_desc: "Студенты китайской нации долгое время стимулировали огромные и важные изменения силой интеллектуальной инерции и решительной убежденности. Не может быть нового Китая без силы его молодежи, и именно благодаря этой силе они также представляют опасность. Соблазн радикальных движений, стремящихся к разрушению зарождающейся китайской демократии, должен быть подавлен в зародыше, и идеологическое образование является панацеей от этой проблемы."
  
 UPC_KMT_coalition_focus_flex_2: "Гоминьдан: Усиление народных коммун"
 UPC_KMT_coalition_focus_flex_2_desc: "Без китайского крестьянина и рабочего в стране не было бы давней революционной силы. Партия и народ могут быть обязаны своим освобождением и продолжающимся процветанием только таким храбрым борцам революционной борьбы: знаменосцам, строителям коммун. Автономные и самодостаточные, они являются примером для подражания по всей стране и должны служить организационной цели в рамках Федеральной системы."
  
 UPC_KMT_coalition_focus_final: "Гоминьдан: Измененная опека"
 UPC_KMT_coalition_focus_final_desc: "Хотя это и не совсем то, чего желал Гофу в Саньминьчжуи, Национальная революция тем не менее достигла некоторых своих целей, и народ всегда будет радоваться той роли, которую Гоминьдан сыграл в новой демократической республике. Возможно, не Данго, но измененная его форма, где Гоминьдан вечно служит стражем и защитником масс и их интересов от любой вероломной буржуазии, которая попытается причинить им вред."
  
 UPC_KMT_no_coalition_focus: "Гоминьдан: НЕ В КОАЛИЦИИ"
 UPC_KMT_no_coalition_focus_desc: "Гоминьдан не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_CDL_coalition_focus_pol_1: "ДЛК: Прогрессивный альянс"
 UPC_CDL_coalition_focus_pol_1_desc: "Хотя некоторые партии занимают видное место в Демократической лиге Китая, наша коалиция требует вклада всех прогрессивных партий для проведения рациональных и демократических реформ в новой республике. Вместе мы боремся за лучшее завтра, за возрождение Китайской Республики!"
  
 UPC_CDL_coalition_focus_eco_1: "ДЛК: Помощь рабочим и крестьянам"
 UPC_CDL_coalition_focus_eco_1_desc: "В Эру милитаристов, Войну сопротивления и Гражданскую войну в Китае больше всего пострадали, несомненно, рабочие и крестьяне Китая. Именно им должна быть направлена столь необходимая помощь, ибо счастливое население означает стабильное правительство."
  
 UPC_CDL_coalition_focus_soc_1: "ДЛК: Баланс традиционализма и современности"
 UPC_CDL_coalition_focus_soc_1_desc: "Хотя Запад может многому научить нас в плане современности, этики и экономического развития, мы должны быть осторожны, чтобы сбалансировать это с нашими собственными ценностями и принципами. Мы должны реинвестировать в традиционные практики Китая, продолжая изучать опыт Запада. Мы стремимся к золотой середине!"
  
 UPC_CDL_coalition_focus_flex_1: "ДЛК: Политизация профсоюзов"
 UPC_CDL_coalition_focus_flex_1_desc: "Чтобы способствовать столь необходимому прогрессу в китайском обществе и экономике, мы должны рассматривать юнионизм как метод идеологической обработки рабочего класса. В то время как крестьянство навсегда останется оплотом консерватизма, городской рабочий — идеальная аудитория для идей социализма и социал-демократии."
  
 UPC_CDL_coalition_focus_pol_2: "ДЛК: Правление лучших представителей общества"
 UPC_CDL_coalition_focus_pol_2_desc: "Хотя ДЛК основана на принципах свободы, демократии и вольности, мы не должны забывать, что массы Китая остаются неграмотными, лишенными здравого смысла в понимании добра и зла. Как и в старые времена, управлять страной должны ученые мужи (шэньши) и класс буржуазных джентльменов."
  
 UPC_CDL_coalition_focus_eco_2: "ДЛК: Основы государства всеобщего благосостояния"
 UPC_CDL_coalition_focus_eco_2_desc: "В то время как милитаризм оказался самой большой чумой для республики, повстанческий социализм занимает второе место. Чтобы подкосить социальную революцию, рабочим и крестьянам нужно дать надлежащие гарантии безопасности и достоинство в их труде. Без поддержки масс Гоминьдан и Китайская социалистическая партия наверняка рухнут."
  
 UPC_CDL_coalition_focus_soc_2: "ДЛК: Образование для масс"
 UPC_CDL_coalition_focus_soc_2_desc: "Как отец своим детям, дворянство и ученые классы не желают ничего, кроме лучшего для китайского народа, включая его образование. Как только люди узнают о современности, а также о своих традициях, они поймут платформу ДЛК. Просвещение масс восстановит статус Китая в мире!"
  
 UPC_CDL_coalition_focus_flex_2: "ДЛК: Гражданское доминирование над армией"
 UPC_CDL_coalition_focus_flex_2_desc: "В нашу позорную эпоху милитаристов мелкие вояки и амбициозные генералы сражались друг с другом за контроль. Такой хаос не должен повториться, и военные должны быть поставлены под тщательный надзор Федерального правительства. Современная республика требует гражданского контроля над армией."
  
 UPC_CDL_coalition_focus_final: "ДЛК: Вторая партия республики"
 UPC_CDL_coalition_focus_final_desc: "Когда Великий республиканский альянс начал свое движение за объединение страны по федералистскому образцу, именно предшественники Демократической лиги Китая стояли рядом с ними. С согласия народа и благодаря правоте нашего дела наша партия продолжит борьбу за людей и их заслуженное восстановление достоинства."
  
 UPC_CDL_no_coalition_focus: "ДЛК: НЕ В КОАЛИЦИИ"
 UPC_CDL_no_coalition_focus_desc: "Демократическая лига Китая не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_GRA_coalition_focus_pol_1: "ВРА: Призыв к республиканскому единству"
 UPC_GRA_coalition_focus_pol_1_desc: "Направляя нацию к демократическому будущему, демократический процесс пошел своим чередом. И неотъемлемой природой всех политических участников в новой Китайской Федеративной Республике является защита ее зарождающейся демократии. Республиканцы не могут ссориться между собой, чтобы не возникло насилие между братьями, и именно Великий республиканский альянс (ВРА) будет хранителем единства."
  
 UPC_GRA_coalition_focus_eco_1: "ВРА: Выкуп иностранных предприятий"
 UPC_GRA_coalition_focus_eco_1_desc: "Всегда спорный грех в рядах Чжили и Фэнтяня — приобретение различных деловых интересов или, по крайней мере, доли владения колониальными структурами не принесло ничего, кроме ужасных условий для рабочих нации. Хотя это правда, что инвестиции и капитал хлынули на китайские фабрики, это досталось ужасной ценой и должно быть отменено."
  
 UPC_GRA_coalition_focus_soc_1: "ВРА: Атака на торговлю опиумом"
 UPC_GRA_coalition_focus_soc_1_desc: "В китайской нации нет большего зла, чем тот коварный яд, который наводняет ее каналы и прорастает на ее полях. Он распространен по всей стране, культивируется как полевыми командирами, так и мелкими бандитами, распространяется негодяями, и вся прибыль оседает в карманах самых подлых отбросов нации. Такое положение дел не может продолжаться."
  
 UPC_GRA_coalition_focus_flex_1: "ВРА: Проведение демобилизации"
 UPC_GRA_coalition_focus_flex_1_desc: "Бэйянская республика показала безумие военных диктаторов, доминирующих в политической сфере нации. Сочетая силу оружия с силой закона, они сеяли лишь неудачу, коррупцию и ужасное недомогание среди первого китайского демократического эксперимента. Лишив их силы, мы можем обеспечить стабильность республики."
  
 UPC_GRA_coalition_focus_pol_2: "ВРА: Компромисс по всему спектру"
 UPC_GRA_coalition_focus_pol_2_desc: "Ни одна личность не может доминировать в нашей республике, мы — государственные служащие воли народа, а не своекорыстные и властные личности, стремящиеся к удовлетворению амбиций. Мы должны быть нацией компромисса и взаимопонимания, постоянного сотрудничества всех достойных партий, от Молодого Китая до избирателей Демократической лиги Китая."
 lngupc.5.tb_tooltip: "[ROOT.GetLeader] Соглашается"
  
 UPC_GRA_coalition_focus_eco_2: "ВРА: Обезвреживание ревностных профсоюзов"
 UPC_GRA_coalition_focus_eco_2_desc: "Профсоюзное движение — мощный зверь, и оно, безусловно, побуждало как к позитивным, так и к негативным действиям, но оно стало слишком коррумпированным коварным левым влиянием, до такой степени, что они берут идеал аполитичной профсоюзной организации и политизируют его. Профсоюзы должны работать с государством, а не против него."
  
 UPC_GRA_coalition_focus_soc_2: "ВРА: Внушение духа демократии"
 UPC_GRA_coalition_focus_soc_2_desc: "Демократия Китая драгоценна, и без надлежащего культивирования четырех основных прав народа наряду с его образованием этот самый дух, искреннее чувство демократического участия, может быть утрачен. Китайский народ должен научиться быть активным в новой системе и защищать ее как от милитаристов, так и от революционеров."
  
 UPC_GRA_coalition_focus_flex_2: "ВРА: Борьба с политической укорененностью"
 UPC_GRA_coalition_focus_flex_2_desc: "Мы не можем допустить, чтобы самодовольство или гниль укоренились в младенческих избирательных системах страны, ибо это нарушает сами права свободной и справедливой демократии. Политические машины и Данго ведут лишь к латентному авторитаризму и упадку нации. Мы должны работать над борьбой с коррупцией, где бы она ни укоренилась, и всегда быть бдительными против несправедливостей, совершаемых партиями."
  
 UPC_GRA_coalition_focus_final: "ВРА: Стабилизация электоральной политики"
 UPC_GRA_coalition_focus_final_desc: "Хотя это, безусловно, не гарантировано, Великий республиканский альянс тем не менее обеспечил стабильность хаотичного политического поля битвы Китая для центристского и умеренного будущего. Только партии, готовые участвовать честно, с искренними намерениями и чувством долга, могут быть избраны, и ВРА будет вечным стражем китайской демократии."
  
 UPC_GRA_no_coalition_focus: "ВРА: НЕ В КОАЛИЦИИ"
 UPC_GRA_no_coalition_focus_desc: "Великий республиканский альянс не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_REP_coalition_focus_pol_1: "Независимые: Избирательная реформа"
 UPC_REP_coalition_focus_pol_1_desc: "Возможно, слишком поспешные в своем близоруком стремлении к демократическому будущему, создатели новой китайской избирательной системы позволили ей погрязнуть в джерримендеринге и неравных избирательных округах. Это привело к абсолютно неприемлемой ситуации, когда в стране доминирует ассортимент партий, а не большинство. Создав новые округа, давайте разрешим эту беду."
  
 UPC_REP_coalition_focus_eco_1: "Независимые: Отмена репрессивных налогов"
 UPC_REP_coalition_focus_eco_1_desc: "Остаток администраций далекого прошлого, налоговая система Китая в значительной степени произвольна и противоречива. Душа бизнес в колыбели, она привела к скоплению крупных конгломератов предприятий под эгидой различных заранее созданных кланов, вместо истинного расцвета свободного предпринимательства. Упрощение и отмена различных налогов должны позволить изобретательности процветать."
  
 UPC_REP_coalition_focus_soc_1: "Независимые: Уроки Запада"
 UPC_REP_coalition_focus_soc_1_desc: "Западная цивилизация признает истинную важность материального благополучия; она стремится к новым разработкам и достижениям — к увеличению богатства, производства, промышленности и исследовательских возможностей. Фундаментальный дух Запада — это поиск «истины». Бесконечная природа знания сделала Восток самодовольным, и мы должны подражать нашим собратьям."
  
 UPC_REP_coalition_focus_flex_1: "Независимые: Равенство полов"
 UPC_REP_coalition_focus_flex_1_desc: "Наша традиционная китайская культура, наделенная добродетелями Конфуция, предусматривала крайне неравное общество — будь то избирательное право или нет, китайская женщина вряд ли имеет те же возможности, что и ее коллеги-мужчины. Демократия — это долгосрочное достижение, и китайское государство вряд ли сможет гарантировать ее процветание без подлинного равенства всех своих народов."
  
 UPC_REP_coalition_focus_pol_2: "Независимые: Прагматичная реконструкция"
 UPC_REP_coalition_focus_pol_2_desc: "Цепляние за овеществленные традиции конфуцианского прошлого привело к поколениям покорных ученых-чиновников, совершенно неспособных адаптироваться к переменам. В рамках «прагматичной реконструкции» неоконфуцианец может использовать историю для решения текущих проблем, продолжая развитие конфуцианства наряду с развитием человеческого общества."
  
 UPC_REP_coalition_focus_eco_2: "Независимые: Новая религия науки"
 UPC_REP_coalition_focus_eco_2_desc: "В последнее время в мировом порядке наметилось формирование «новой религии», полностью посвященной развитию научной цивилизации, грань которой сама по себе не полностью понятна, но характеристики очевидны: рационализм, вера в человечество и новая социальная этика, основанная на широком сострадании. Они должны стать неотъемлемой частью нового Китая."
  
 UPC_REP_coalition_focus_soc_2: "Независимые: Борьба за свободу"
 UPC_REP_coalition_focus_soc_2_desc: "Ху Ши предупреждал, что идеологическая борьба международного масштаба все чаще начинает проявляться, формируя и перекраивая мир в соответствии со своими прихотями и желаниями. Фундаментальное различие заключалось не в социализме или национал-народничестве, а между диктаторским тоталитаризмом и демократическими системами; демократия против тирании. Китай должен вести мир к свободному будущему!"
  
 UPC_REP_coalition_focus_flex_2: "Независимые: Отказ от милитаризма"
 UPC_REP_coalition_focus_flex_2_desc: "Нация, в которой доминируют военные, не может считаться истинно демократической; это не республика, а лишь ширма для стратократии. Бэйянская республика доказала, что без надлежащего настроя авангарда против явного края милитаризма идеалистическая мечта целой нации может рухнуть. У военных есть свое место, но милитаризм не найдет опоры в новом Китае."
  
 UPC_REP_coalition_focus_final: "Независимые: Республика без партийности"
 UPC_REP_coalition_focus_final_desc: "Политики не могут быть своекорыстными, все они должны проявлять форму «бескорыстного интереса». Идеология не должна быть всеобъемлющей и ядовитой, это просто концепция, обозначающая систему идей относительно жизни, общества и правительства. В новой китайской демократической республике Ассамблея не разрывает себя на части из-за идеологии, а движется вперед в общем союзе!"
  
 UPC_REP_no_coalition_focus: "Независимые: НЕ В КОАЛИЦИИ"
 UPC_REP_no_coalition_focus_desc: "Фракция Независимых республиканцев не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_DCP_coalition_focus_pol_1: "[UPC_GetDCPPartyName_nocolour]: Верховенство Конституции"
 UPC_DCP_coalition_focus_pol_1_desc: "Китайская Конституция должна быть священным документом. Ее нужно почитать. Все правительства должны быть полностью подотчетны такому документу, ибо если они не придерживаются писаных правил, они не лучше бандитов. Милитаристы и поклонники Партийного государства позаботились бы о том, чтобы вся тяжелая работа борцов за демократию рассеялась, и мы должны закрепить конституцию, чтобы предотвратить это."
  
 UPC_DCP_coalition_focus_eco_1: "[UPC_GetDCPPartyName_nocolour]: Принятие государственного социализма"
 UPC_DCP_coalition_focus_eco_1_desc: "Массы остро нуждаются в милостыне, чтобы облегчить свои беды, и вполне естественно, что они обращаются к тем, кто наиболее «пылко» нацелен на их нужды: Гоминьдан, китайские синдикалисты, новые социал-демократы и демократические социалисты. Как желает Лян, мы должны внедрить достаточно сильное государство всеобщего благосостояния, которое не только улучшит жизнь людей, но и подрубит левую поддержку на корню."
  
 UPC_DCP_coalition_focus_soc_1: "[UPC_GetDCPPartyName_nocolour]: Сохранение конфуцианской морали"
 UPC_DCP_coalition_focus_soc_1_desc: "Революционеры и бесчестные милитаристы вышли из-под контроля, разрушая традиционную конфуцианскую концепцию правления. Мораль является центром любого прочного правительства, и эта республика также должна продолжать придерживаться этого принципа. Конфуцианство, интегрированное с западными принципами, обеспечит как современность, так и гармонию в Китайской Республике."
  
 UPC_DCP_coalition_focus_flex_1: "[UPC_GetDCPPartyName_nocolour]: Развитие отношений с зарубежьем"
 UPC_DCP_coalition_focus_flex_1_desc: "В «Век унижений» многие китайцы покинули родину предков и отправились в неизвестные земли в поисках лучшей жизни. Однако они никогда не забывали свой настоящий дом, как и мы. Зарубежные китайцы доказали, что являются щедрыми спонсорами моральных партий, и мы должны протянуть им руку помощи."
  
 UPC_DCP_coalition_focus_pol_2: "[UPC_GetDCPPartyName_nocolour]: Правление исполнительной власти"
 UPC_DCP_coalition_focus_pol_2_desc: "Давно желаемое политической кликой Ляна — это верховенство исполнительной власти. Сильная исполнительная власть с более централизованным правительством, возможно, является антитезой Федеральной модели, и все же она является неотъемлемой частью выживания китайской демократии. Высокомерие и власть провинциальных милитаристов критически ослабили государство, и только сильная исполнительная власть может исправить это."
  
 UPC_DCP_coalition_focus_eco_2: "[UPC_GetDCPPartyName_nocolour]: Начало сельской реконструкции"
 UPC_DCP_coalition_focus_eco_2_desc: "Одной из самых трудных проблем страны является бедность, но не неравенство. Социалисты желают национализации собственности, но это не противоядие от вопиющих проблем Китая. Слишком долго истеблишмент и нынешние государственные деятели злоупотребляли сельскими массами, и слишком долго они прозябали. Совместными усилиями мы должны освободить крестьянина от его оков."
  
 UPC_DCP_coalition_focus_soc_2: "[UPC_GetDCPPartyName_nocolour]: Обеспечение правления хороших людей"
 UPC_DCP_coalition_focus_soc_2_desc: "Крайне важно, чтобы правительство было конституционным, публичным и скоординированным. И только через «Хороших людей» можно обеспечить такие качества правления. Выдающиеся члены общества, образованная элита, должны быть выдвинуты вперед, чтобы возглавить нацию и действовать. Только через этих людей демократические реформы переживут пагубное влияние."
  
 UPC_DCP_coalition_focus_flex_2: "[UPC_GetDCPPartyName_nocolour]: Учреждение интервенционистского государства"
 UPC_DCP_coalition_focus_flex_2_desc: "Синьхайская революция должна была стать лишь ступенькой к «политической революции», которая привела бы к созданию конфуцианского интервенционистского государства. В конечном счете мощное, оно в идеале должно быть способно позаботиться о социализации населения и заявить о себе на международной арене. Хотя Синьхай потерпел неудачу, нам был дарован второй шанс."
  
 UPC_DCP_coalition_focus_final: "[UPC_GetDCPPartyName_nocolour]: Реализация мечты Ляна"
 UPC_DCP_coalition_focus_final_desc: "Пока Лян Цичао занимался политикой, он постоянно ожесточенно боролся за конституционную демократию. Ученик Кан Ювэя, он отличался от поклонения насилию Сунь Ятсена подлинно реформистскими идеалами. Он умер до того, как его работа могла быть завершена, но эта Федеративная Республика — то, чего он жаждал."
  
 UPC_DCP_no_coalition_focus: "[UPC_GetDCPPartyName_nocolour]: НЕ В КОАЛИЦИИ"
 UPC_DCP_no_coalition_focus_desc: "[UPC_GetDCPPartyName_nocolour_long] не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_STA_coalition_focus_pol_1: "Государственники: Закрепление роли армии"
 UPC_STA_coalition_focus_pol_1_desc: "Китайская демократия многим обязана своей армии, ибо без храбрых жертв своих солдат она вряд ли смогла бы одолеть милитаристов и революционеров, противостоящих их надеждам и мечтам. Именно на этом условии военные должны играть неотъемлемую роль в китайской демократии; они — гаранты против тирании и защитники демократии."
  
 UPC_STA_coalition_focus_eco_1: "Государственники: Искоренение национального порока"
 UPC_STA_coalition_focus_eco_1_desc: "Слишком много излишеств создается в некой легкомысленной погоне за индивидуализмом внутри страны. Свобода важна, конечно, но какой ценой? Опиум и азартные игры? Два величайших греха нации! Конечно, запреты уже существуют в различных провинциях, но этого недостаточно. Благодаря тщательной правительственной кампании мы можем избавить нацию от этого зла."
  
 UPC_STA_coalition_focus_soc_1: "Государственники: Модернизация традиционного образования"
 UPC_STA_coalition_focus_soc_1_desc: "Хотя образование в современных учреждениях находится на равных или, по крайней мере, сродни их западным аналогам, различные регионы страны все еще участвуют в традиционной системе образования. Прекращение получения указанного образования после определенного уровня, вместо этого преследование ремесел, сильно затормозило интеллектуальный потенциал Китая. Даже в Цинхае должен быть интеллектуальный рог изобилия."
  
 UPC_STA_coalition_focus_flex_1: "Государственники: Увеличение военного бюджета"
 UPC_STA_coalition_focus_flex_1_desc: "Слишком долго различные члены предыдущих администраций, иногда даже союзники, одерживали победу в своем крестовом походе против воспринимаемого «милитаризма». Урезание военного бюджета и направление его на государственную службу или образование. Это действительно важно, конечно, но крайне важно, чтобы военные, защитники республики, не были ущемлены за свою службу."
  
 UPC_STA_coalition_focus_pol_2: "Государственники: Расширение федеральной власти"
 UPC_STA_coalition_focus_pol_2_desc: "Различные идеалисты — Чжан Тайянь, Чжан Шичжао, Чжао Хэнти — хотели бы, чтобы Федеративная республика сохранила значительную автономию в провинциях, конечно, как условие их конечного состояния для Федерального проекта. Но великие мыслители, такие как Лян Цичао или Тан Цзияо, предвидели безумие этих методов — экзистенциальный милитаризм. Центральное правительство должно иметь власть в провинциях."
  
 UPC_STA_coalition_focus_eco_2: "Государственники: Регулирование паразитов общества"
 UPC_STA_coalition_focus_eco_2_desc: "Компрадоры иностранных знакомств, те, кто ведет бесполезную революционную партизанскую кампанию, и те, кто бродит по стране как бандиты — все они просто паразиты, кормящиеся за счет службы Хороших людей. Вся нация должна вносить вклад в великое целое, ибо если сами люди — коррумпированные бездельники, нация обречена на провал."
  
 UPC_STA_coalition_focus_soc_2: "Государственники: Стремление к социальной гармонии"
 UPC_STA_coalition_focus_soc_2_desc: "Нация должна работать как машина, она должна быть эффективной, а население должно быть полностью преданным. Слишком долго люди теряли себя, вовлеченные в заманчивое отвращение социализма или сладкую ложь полевых командиров, слишком своекорыстных, чтобы полностью удовлетворить их потребности. Свобода и демократия могут преследоваться только гармоничным общественным порядком: нравственно образованным гражданским населением, возглавляемым просвещенной элитой."
  
 UPC_STA_coalition_focus_flex_2: "Государственники: Мощь бюрократии"
 UPC_STA_coalition_focus_flex_2_desc: "Некогда печально известная своей бюрократией и некомпетентностью, переплетенной с ее административной структурой, немногие видели истинную высвобожденную силу компетентных технократов и бюрократов Китая. Управляемое сосредоточенными усилиями правительства, и где коррупции нет места, новое китайское государство сохранит более строгую дисциплину и сильные коллективные действия."
  
 UPC_STA_coalition_focus_final: "Государственники: Республика заряженного ружья"
 UPC_STA_coalition_focus_final_desc: "Наши оппоненты будут кричать, что китайская демократия — это вообще не демократия! Что она просто падает в яму Бэйяна, где доминируют военные и их клики. Но они будут неправы, армия действует не в своих интересах, а только в интересах Федеральной демократии нации. Пока армия сохраняет бдительность, демократия защищена."
  
 UPC_STA_no_coalition_focus: "Государственники: НЕ В КОАЛИЦИИ"
 UPC_STA_no_coalition_focus_desc: "Фракция Государственников не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_REG_coalition_focus_pol_1: "Регионалисты: Снижение избирательного порога"
 UPC_REG_coalition_focus_pol_1_desc: "Мейнстримные политики предвидели систему, в которой доминируют их массовые партии, отказываясь терпеть настоящую парламентскую демократию; Независимые согласны с этим понятием. Под эгидой ВРА и ДЛК только те партии, у которых достаточно власти и влияния, могут добиться победы, и все же это лишает провинциальные проблемы их истинных поклонников. Давайте исправим такую ситуацию."
  
 UPC_REG_coalition_focus_eco_1: "Регионалисты: Умиротворение бандитизма в глубинке"
 UPC_REG_coalition_focus_eco_1_desc: "Центральное правительство не жалеет средств на искоренение бандитизма во внутренних районах, вокруг своих важных и неотъемлемых избирательных арен. Но как насчет границы? Как насчет окраин? Бандиты могут пересекать границы внутренних провинций без единой царапины! Такая несправедливость не может продолжаться и должна повлечь за собой немедленные действия Центрального правительства."
  
 UPC_REG_coalition_focus_soc_1: "Регионалисты: Приоритет сельского образования"
 UPC_REG_coalition_focus_soc_1_desc: "Что касается мейнстрима, деревни и им подобные видят мало или совсем не видят финансирования по сравнению с городскими центрами, такими как Шанхай, Пекин или Гуанчжоу. Они бы позволили сельскому крестьянину прозябать, лишь бы и дальше финансировать горожанина, и все же именно сельская деревня формирует фундамент китайской цивилизации, и для этого образование должно быть приоритетом."
  
 UPC_REG_coalition_focus_flex_1: "Регионалисты: «Уточнение» избирательных границ"
 UPC_REG_coalition_focus_flex_1_desc: "Поспешно начерченные и опирающиеся на уже существующие структуры, избирательные границы Федеративной Республики в значительной степени попадают в ловушки Бэйянской республики. Слишком полагаясь на «гнилые местечки» и джерримендеринг, они затормозили настоящую демократию, пренебрегая нуждами региональных избирателей. Перерисовав их, с некоторой свободой, естественно, мы можем обеспечить Федеральное будущее."
  
 UPC_REG_coalition_focus_pol_2: "Регионалисты: Отказ от политической централизации"
 UPC_REG_coalition_focus_pol_2_desc: "При идеальных обстоятельствах Центральное правительство, скорее всего, предпочло бы абсолютное превышение полномочий в отношении провинциальных вопросов. Хотя это, возможно, «ускоряет» действия правительства, это показывает как вопиющее недоверие к местным административным подразделениям, так и вопиющее злоупотребление правительственной властью. Разве это не Федералистский проект, в конце концов?"
  
 UPC_REG_coalition_focus_eco_2: "Регионалисты: Уравнивание провинций"
 UPC_REG_coalition_focus_eco_2_desc: "В нынешнем виде, чем крупнее промышленность и население провинции, и, конечно, чем более она «лояльна» к предпочтительному идеологическому составу Центрального правительства, тем больше институциональной власти она сохраняет. Гуандун, Юньнань, Хунань, Сычуань, Хубэй, Чжили, Шанхай — все они доминируют над «меньшими» провинциями. Мы должны подтолкнуть Ассамблею к исправлению этого провала."
  
 UPC_REG_coalition_focus_soc_2: "Регионалисты: Защита прав меньшинств"
 UPC_REG_coalition_focus_soc_2_desc: "Китай — это не просто нация Пяти Рас, это было бы неискренне и неправильно по отношению к его красочному этническому разнообразию внутри нации. И слишком долго различные группы меньшинств находились в тени различных полевых командиров и режимов. С всего лишь несколькими местными героями, пришло время Центральному правительству вмешаться, чтобы защитить их права и культуру."
  
 UPC_REG_coalition_focus_flex_2: "Регионалисты: Сокращение политических излишеств"
 UPC_REG_coalition_focus_flex_2_desc: "Раздутые зарплаты и бесполезные чрезмерные расходы считались призраками прошлого, оставшимися с гнилой структурой Бэйянской республики, и все же сейчас больше, чем раньше, они очевидны в их вопиющем нецелевом использовании государственных средств. Экстравагантные траты на политические кампании лишают нацию столь необходимых средств в других местах, и крайне важно, чтобы они были прекращены."
  
 UPC_REG_coalition_focus_final: "Регионалисты: Множество оттенков бегонии"
 UPC_REG_coalition_focus_final_desc: "Считается, что бегония приносит удачу, богатство и процветание. Также верно, что они означают мир и гармонию. И все эти качества, несомненно, очевидны в новой Китайской Федеративной Республике. Нация многих вероисповеданий, многих цветов, все объединенные под благоприятным облаком! Ибо много народов составляют китайское национальное государство, и все голоса должны быть услышаны!"
  
 UPC_REG_no_coalition_focus: "Регионалисты: НЕ В КОАЛИЦИИ"
 UPC_REG_no_coalition_focus_desc: "Фракция Регионалистов не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_YCP_coalition_focus_pol_1: "Младокитайцы: Республика, ведомая национальным этатизмом"
 UPC_YCP_coalition_focus_pol_1_desc: "Свобода и демократия отстаивались многими на Западе как основной компонент ценностей их страны, но это не то, что направляет нас. Душа Республики лежит в нашем Гоцзячжуи (Национал-этатизме), великой китайской национальности, состоящей из всех этносов в наших границах, и никакая другая сила больше не разорвет нас на части."
  
 UPC_YCP_coalition_focus_eco_1: "Младокитайцы: Бойкот западных стервятников"
 UPC_YCP_coalition_focus_eco_1_desc: "Свободная торговля была курсом, продиктованным Британской империей во время ее века возвышения, и навязанным нашей Нации во время нашего Века унижений. Мы достаточно умны, чтобы не попасться на такие уловки снова, ибо наша протекционистская экономика поможет индустриализировать нашу нацию, еще один шаг к современности."
  
 UPC_YCP_coalition_focus_soc_1: "Младокитайцы: Исправление ошибок ноября"
 UPC_YCP_coalition_focus_soc_1_desc: "Хотя Четвертое ноября следует хвалить за поощрение китайского национализма в молодежи нашей Республики, его антиконфуцианский уклон — грубая ошибка. Чтобы дотянуться до звезд, мы не должны забывать нашу национальную душу. Отныне мы празднуем только националистическую борьбу ноября и забываем о ее неприятных аспектах."
  
 UPC_YCP_coalition_focus_flex_1: "Младокитайцы: Учреждение представительных органов"
 UPC_YCP_coalition_focus_flex_1_desc: "Чтобы способствовать созданию истинно представительного правительства, принципы федерализма должны продолжать направлять нашу Республику. Местное самоуправление, основанное на воле народа, работающее в сочетании с центральным правительством, основанным на национальной воле, несомненно, будет способствовать столь необходимому местному и провинциальному строительству."
  
 UPC_YCP_coalition_focus_pol_2: "Младокитайцы: К электоральному корпоративизму"
 UPC_YCP_coalition_focus_pol_2_desc: "Хотя Запад может многому научить нас в плане индустриализации и процветания, концепция электорализма на основе регионов фундаментально несовместима со строительством сильного китайского государства. Установление корпоративистских выборов помогло бы восстановить порядок в нашей больной экономике, решить социальные проблемы и искоренить классовую борьбу."
  
 UPC_YCP_coalition_focus_eco_2: "Младокитайцы: Экономика, прикованная к государству"
 UPC_YCP_coalition_focus_eco_2_desc: "В Китае капитализм свободного рынка не видел ничего, кроме выкачивания богатств и ресурсов из нации в иностранные карманы и к местным компрадорам. Мелкая буржуазия, капиталисты и торговцы присвоили жертвы нации ради собственной личной выгоды. Только под государственным руководством экономика может действительно процветать."
  
 UPC_YCP_coalition_focus_soc_2: "Младокитайцы: Образование от класса ученых-шэньши"
 UPC_YCP_coalition_focus_soc_2_desc: "В золотой век китайской нации Император руководствовался бесценной мудростью своих конфуцианских ученых, чьи знания и праведная мораль помогали направлять нашу нацию к раю. Будет только правильно, если наш современный класс ученых-дворян снова возглавит движение к современности и вдохнет новую жизнь в Республику!"
  
 UPC_YCP_coalition_focus_flex_2: "Младокитайцы: Армия под патриотическим руководством"
 UPC_YCP_coalition_focus_flex_2_desc: "Милитаризм был болезнью старых феодальных нравов, однако многие, кто сочувствует таким идеям, остаются на переднем крае армейской политики. Если армия должна стать чистой в своей преданности китайской нации, то тех, у кого более «современные» симпатии, следует возвышать и поддерживать."
  
 UPC_YCP_coalition_focus_final: "Младокитайцы: Плебисцитарная революция бюллетенем"
 UPC_YCP_coalition_focus_final_desc: "Наша Республика родилась в 1911 году, однако Революция была предана феодальными милитаристами, слабовольными либералами и позорными марксистами. Этому больше не бывать, ибо Конституция будет изменена так, чтобы патриотическая молодежь могла вести нашу нацию к Национал-этатизму! Троекратное ура нашему рулевому Цзо Шуньшэну!"
  
 UPC_YCP_no_coalition_focus: "Младокитайцы: НЕ В КОАЛИЦИИ"
 UPC_YCP_no_coalition_focus_desc: "Младокитайская партия не входит в правящую коалицию Ассамблеи, и поэтому мы не можем преследовать их политику с разумными намерениями."
  
 UPC_calls_for_a_constitutional_convention: "Созыв Конституционного конвента"
 UPC_calls_for_a_constitutional_convention_desc: "С объединением нации и окончательным обеспечением некоего подобия мира раздалось много гулких призывов к [UPC.GetLeader] провести национальный конституционный конвент. Проходящий на фоне различных провинций, оформляющих свои собственные конституции, ожидается, что Федеративная Республика составит свою собственную в ближайшем будущем."
  
 UPC_normalise_political_discourse: "Нормализация политического дискурса"
 UPC_normalise_political_discourse_desc: "В условиях мер военного времени, а до этого под гнетом милитаристов, китайская свобода слова вряд ли была заботой мирового порядка истеблишмента. Оставаясь изолированной для тех немногих смелых интеллектуалов, готовых высказаться, или других революционных публикаций, наступивший мир принес с собой необходимость стабилизировать зарождающуюся демократическую систему Китая."
  
 UPC_eliminate_electoral_fraud: "Устранение фальсификаций на выборах"
 UPC_eliminate_electoral_fraud_desc: "Давно приукрашенная политическая традиция прошлых правительств и недавних зон военной оккупации, фальсификация выборов шла рука об руку с «законно» избранными должностными лицами Китая. Поскольку народное голосование не стоит ничего большего, чем воспринимаемый титул массовой поддержки, который оно даровало, система требует немедленных действий от Президента, чтобы не ставить под сомнение новую демократию."
  
 UPC_nationalise_the_military: "Национализация вооруженных сил"
 UPC_nationalise_the_military_desc: "Как провозглашали некоторые из наиболее критических мыслителей-федералистов страны, военные должны, в конечном счете, быть централизованы под началом национального правительства. Хотя ярые защитники провинциализма хотели бы, чтобы каждая провинция сохраняла свои собственные силы, это было бы просто подготовкой к будущему милитаризму, и вряд ли оставшиеся сторонники предпочтут восстание интеграции."
  
 UPC_new_national_elections: "Новые национальные выборы"
 UPC_new_national_elections_desc: "Наконец, монументальная миссия движения Федералистов достигает своего зенита. Хотя, возможно, не идеальная, возможно, омраченная пагубными недостатками и всевозможными несоответствиями, Объединенные провинции тем не менее продвинулись дальше, чем Бэйянская республика. Конечно, народ должен радоваться, поскольку нация проводит первые хоть сколько-нибудь конкурентные выборы с 1912 года."
  
 #Foreign Policy Tree 
 CHN_return_to_the_world_stage_focus: "Возвращение на мировую арену"
 CHN_return_to_the_world_stage_focus_desc: "Китай когда-то был великим гегемоном на Востоке, и королевства по всей суше и морю платили дань его Императорам. XIX век и последующие годы были разрушительными для нашей нации, но в конечном итоге это лишь крошечная точка в тысячелетиях китайского господства. Пришло время нам собрать нашу нацию воедино и вернуть себе место среди мировых держав."
  
 CHN_subjugating_the_frontiers_focus: "Покорение границ"
 CHN_subjugating_the_frontiers_focus_desc: "У Китая всегда были непростые отношения с его северными и западными границами, и династия Цин наконец привела большую часть Запада под свой сюзеренитет. Синьхайская революция дала поддерживаемым из-за рубежа сепаратистам в Монголии, Тибете и Синьцзяне возможность восстать, и давно пора восстановить порядок на Северо-Западе."
  
 CHN_end_the_century_of_humiliation_focus: "Конец Века унижений"
 CHN_end_the_century_of_humiliation_focus_desc: "Опиумные войны и их последствия привели к тому, что иностранные державы разделили Китай на сферы влияния и навязали ряд Неравноправных договоров, которые подорвали суверенитет Китая, пока иностранцы наживались. Железные дороги, городские кварталы и даже целые порты были сданы в аренду или захвачены иностранными державами. Пришло время покончить с иностранной оккупацией нашей земли и освободить народ и экономику Китая."
  
 CHN_the_liberation_of_taiwan_focus: "Освобождение Тайваня"
 CHN_the_liberation_of_taiwan_focus_desc: "Через несколько десятилетий после того, как лоялисты Мин под руководством Чжэн Чэнгуна (Коксинга) впервые заняли Тайвань, Цин вторглась и оккупировала остров в 1683 году и колонизировала его. Японцы, однако, вырвали острова из-под контроля Китая после своей победы в Первой японо-китайской войне и продолжили подавлять китайских повстанцев на острове. Японская угроза никогда не будет устранена по-настоящему, пока Тайвань не будет освобожден."
  
 CHN_the_dragon_awakens_focus: "Дракон пробуждается"
 CHN_the_dragon_awakens_focus_desc: "Мы восстановили территориальную целостность Китая, обратив вспять худшее из Века унижений. Другие великие державы теперь вынуждены снова признать нас равными, и мы будем работать над восстановлением нашей сферы в Восточной Азии. Наше благожелательное руководство обеспечит свободу всех угнетенных народов в Азии и на Тихом океане от западного империализма."
  
 CHN_pursuing_the_1911_borders_focus: "Стремление к границам 1911 года"
 CHN_pursuing_the_1911_borders_focus_desc: "Наибольшая территориальная протяженность Китая была во времена династии Цин, и возвращение к границам до 1911 года было приоритетом для всех патриотических лидеров в Эпоху милитаристов. Хотя многие отвергают это как маргинальные притязания, крайне важно, чтобы мы настаивали на них и использовали их при любой возможности по мере их возникновения."
  
 #Asia-Pacific Treaty Organisation Foreign Policy Focuses 
 CHN_responsibilities_of_the_eldest_sibling_focus: "Обязанности старшего брата"
 CHN_responsibilities_of_the_eldest_sibling_focus_desc: "Среди азиатской семьи народов должно быть чувство формального равенства в речи, но также должна быть градуированная ответственность в соответствии со способностями, силой и стратегическим положением. Китай должен быть готов взять на себя руководящую роль в регионе, защищая своих братьев и сестер от чужаков и дисциплинируя их по мере необходимости."
  
 CHN_an_international_peacekeeping_force_focus: "Международные миротворческие силы"
 CHN_an_international_peacekeeping_force_focus_desc: "Интеллектуальная элита в одиночку не может построить демократию — должны быть и военные сторонники. Хотя они и осторожны в вопросах ущемления национального суверенитета, они также верят, что автократия и диктатура — это «политическое недомогание», которое необходимо искоренить, и Китай должен быть достаточно сильным, чтобы вмешиваться за рубежом. Мир во всем мире может быть обеспечен только в том случае, если все страны станут демократическими, рациональными и моральными — до тех пор международная арена остается «борьбой за существование»."
  
 CHN_building_an_asian_superfederation_focus: "Построение Азиатской суперфедерации"
 CHN_building_an_asian_superfederation_focus_desc: "Китайские идеалисты мечтают о мировом правительстве, но до тех пор нации каждого континента должны работать вместе, чтобы создавать международные институты, которые будут способствовать справедливости и искоренять агрессию. Во время японо-китайской войны Китай был вынужден «горько держаться и ждать шанса». Теперь, когда у нас есть этот шанс, мы должны создать альянс демократических государств для активного обеспечения мира и свободы."
  
 #The Asian Federation Foreign Policy Focuses 
 CHN_cornerstone_of_the_federation_focus: "Краеугольный камень Федерации"
 CHN_cornerstone_of_the_federation_focus_desc: "Китайские утописты выступали за распространение принципов федерализма на реконструкцию Азии, и, действительно, в конечном итоге на сломленные народы Европы и Америки, чтобы построить мировую федерацию и позволить миру эволюционировать. Однако пока мы должны начать с построения китайской нации на принципах равенства в богатстве, правах и удовольствиях — возрождая человеческий дух."
  
 CHN_forging_a_great_commercial_circle_focus: "Великий торговый круг"
 CHN_forging_a_great_commercial_circle_focus_desc: "Европейские нации стали богатыми и сильными, потому что они построили свои государства на сельском хозяйстве, торговле и промышленности. Современное китайское государство должно следовать по тому же пути, создавая великий торговый круг на Востоке, чтобы конкурировать с Западом."
  
 CHN_unlock_east_asian_community_decisions_tt: "§YМы разблокируем решение пригласить союзные страны в Восточноазиатское сообщество.§!"
  
 CHN_for_the_evolution_of_humanity_focus: "За эволюцию человечества!"
 CHN_for_the_evolution_of_humanity_focus_desc: "Колониализм украл так много у угнетенных народов мира, и мы должны помочь им найти свою национальную сущность. Таким образом, мы можем отбросить пессимизм, который калечил эволюцию мира, и обеспечить здоровую эволюцию человечества к «социализму всего человечества»."
  
 CHN_a_world_in_harmony_focus: "Мир в гармонии"
 CHN_a_world_in_harmony_focus_desc: "Китайские мыслители давно мечтали о мире в гармонии (Датун), где люди отказались от национализма и бессмысленной резни в пользу мира и братской любви. Нации — это лишь преходящие институты, объединив земной шар, мы сможем по-настоящему эволюционировать как единая человеческая раса!"
  
 #Asia-Pacific Security Pact 
 CHN_enforcing_peace_in_asia_focus: "Принуждение к миру в Азии"
 CHN_enforcing_peace_in_asia_focus_desc: "Азия была опустошена войной из-за краха старой китайской гегемонии. Беспощадные завоевания европейских держав и японское предательство не принесли ничего, кроме смерти и насилия. Китай должен вернуться на свое место доброжелательного лидера континента, и это начинается с принятия ответственности за мир во всем Тихоокеанском регионе."
  
 CHN_building_a_security_zone_focus: "Создание зоны безопасности"
 CHN_building_a_security_zone_focus_desc: "Китай окружен империалистическими державами, которые никогда не стеснялись ослаблять и унижать его. Единственный способ действительно предотвратить еще один Век унижений — освободить, защитить и укрепить наших соседей. Мы должны построить кольцо союзных буферных государств под нашей защитой, способных отразить дальнейшую агрессию."
  
 CHN_a_chinese_expeditionary_force_focus: "Китайский экспедиционный корпус"
 CHN_a_chinese_expeditionary_force_focus_desc: "Китай провел последние несколько десятилетий, сражаясь друг с другом с помощью стрелкового оружия и артиллерии, не в силах позволить себе широкомасштабное развертывание современных военных достижений в механизированной и воздушной войне. Существуют серьезные сомнения в нашей способности проецировать наши силы за пределы наших границ — если мы хотим стать великой державой, это должно измениться."
  
 #GXC Region Specific Foreign Policy Tree 
 CHN_rule_the_south_china_sea_focus: "Правление Южно-Китайским морем"
 CHN_rule_the_south_china_sea_focus_desc: "Южно-Китайское море является домом для обширных торговых путей и долгое время находилось под защитой Китая. Если мы хотим, чтобы нас воспринимали всерьез как великую державу, мы должны быть способны защищать наши претензии вплоть до одиннадцатипунктирной линии. Для этого мы должны развивать наши военно-морские силы и морскую пехоту."
  
 CHN_leverage_ancient_ties_focus: "Использование древних связей"
 CHN_leverage_ancient_ties_focus_desc: "У Китая много исторических и родовых связей по всей Юго-Восточной Азии. Традиционная база нашего правительства в Лянгуане дала диаспорам огромный голос, и мы будем использовать эти партнерства в своих интересах."
  
 CHN_free_the_sinosphere_focus: "Освободить Синосферу"
 CHN_free_the_sinosphere_focus_desc: "Синосфера охватывает нации, которые разделяют обширные культурные и исторические связи с Китаем. Различные правительства Гуанчжоу доказали свое сочувствие вьетнамским революционерам и, в меньшей степени, корейским и японским. Мы должны быть готовы освободить наших братьев и помочь им подняться."
 CHN_free_the_sinosphere_focus_tt: "§YМы получим одну гражданскую фабрику за каждую из стран: Корея, Япония и Вьетнам, если они являются нашими союзниками. В противном случае мы получим цели войны против тех, кто удерживает Сеул, Токио и Ханой.§!"
  
 #YUN Region Specific Foreign Policy Tree 
 CHN_master_of_the_east_continent_focus: "Хозяин Восточного континента"
 CHN_master_of_the_east_continent_focus_desc: "Отсутствие значимых границ на границе с Юньнанью привело к многочисленным пограничным спорам с растущими националистическими и республиканскими настроениями в провинции после того, как Цин не смогла защитить интересы китайских горнодобывающих компаний от британцев в Бирме. Объединив Китай, правительство, в котором доминирует Юньнань, полно решимости отстаивать китайские претензии и строить модернизированную версию старой системы данничества."
  
 CHN_cultivating_sino_korean_ties_focus: "Развитие китайско-корейских связей"
 CHN_cultivating_sino_korean_ties_focus_desc: "Правительство Юньнани давно гордится поддержкой независимости Кореи, укрывая их активистов в Куньмине и продолжая спонсировать их после объединения. Построение тесных связей между двумя странами необходимо для выполнения нашей части сделки и предотвращения будущей японской агрессии."
 CHN_cultivating_sino_korean_ties_focus_tt: "§YЕсли Корея — наш союзник, мы получим гражданскую фабрику, стабильность и поддержку войны. В противном случае мы получим цели войны против тех, кто удерживает Сеул.§!"
  
 CHN_the_yellow_book_affair_focus: "Дело о «Желтой книге»"
 CHN_the_yellow_book_affair_focus_desc: "В 1930-х годах, когда возросла напряженность против концессий, правительство Юньнани заказало двухтомное «Исследование пограничных проблем Юньнани», которое в иностранных кругах получило название «Желтая книга». В ней содержались этнографические исследования, географические и политические трактаты, а также различные отчеты, которые претендовали почти на треть Бирмы и Вьетнама как на феодальные государства. Теперь, находясь у власти, пришло время нам выкроить свою сферу влияния."
  
 ######################################## 
 #######- Section 06: Decisions - ####### 
 ######################################## 
  
 UPC_road_to_unification_decision_category: "На пути к национальному объединению"
 UPC_road_to_unification_decision_category_desc: "Китай — это нация, которая долгое время следовала циклу раздробленности перед воссоединением под гнетом огромных национальных травм, давления или борьбы. Следуя этой схеме, Мандат Цин был сломлен, и последовала несвоевременная Эра милитаристов. Хотя нация была ненадолго «объединена» кликой Чжили в 1927 году, отказ Фэнтяньской клики участвовать в выборах с Чжили и продолжать мирные переговоры об объединении послужил трамплином для дальнейших распрей. Движение против концессий, антиимпериализм, сохраняющиеся революционные настроения, растущие призывы к демократии и непрерывная борьба с Фэнтянем привели к Шанхайскому восстанию 1932 года и, в конечном итоге, к абсолютному краху расколотого Центрального правительства Чжили в 1936 году.\n\nВ стремлении вновь возглавить дело национального объединения Север и Юг оказались на перепутье. Воскрешая историю Эры милитаристов об объединении или переговорах, любой выбранный метод потребует огромной цены от нации и ее народа. И этому народу необходим определенный дух бодрости и поддержки, чтобы снова вынести испытания и невзгоды войны. В гонке за поднятием военного импульса и мобилизацией людей появляется много вариантов, но стоит ли оно того?"
  
 UPC_building_the_unifying_army_mission: "Создание объединяющей армии"
 UPC_building_the_unifying_army_mission_desc: "Национальное объединение может быть достигнуто только холодной сталью, твердыми штыками и чистым упорством. Собрать такую армию — титаническая задача, и ни один простой призывник не сможет сражаться против элиты Центральной армии или даже японской военной машины на горизонте. Однако, если [ROOT.GetLeader] сможет собрать достаточно внушительную силу, и народ, и правительство почувствуют уверенность, что их путь — праведный, оправданный историей. Будет ли нация объединена путем подчинения или переговоров, большая армия обязательна как для оборонительной позиции, так и для пути войны."
  
 UPC_the_march_of_war_mission: "Марш к войне"
 UPC_the_march_of_war_mission_desc: "Переговоры доказали, что они — лишь глупость идеалиста! Последовательные мирные переговоры зашли в тупик, и история доказала, что решительные действия — единственный путь к кардинальным изменениям в стране. Это было доказано в Синьхае, в Войне в защиту республики, в Движении в защиту конституции и даже в Северном походе — с последующим объединением нации кликой Чжили. Все остальные претензии на мирное объединение — это, в конечном счете, игра дураков, и необходимо мобилизовать национальную промышленность на тропу войны, какую бы цену это ни стоило нации."
  
 UPC_exhaust_all_other_options_mission: "Исчерпать все остальные варианты"
 UPC_exhaust_all_other_options_mission_desc: "Хотя мы стремимся к добродетели нации, объединенной подписанием бумаг и тщательным обсуждением обещаний и гарантий, нет уверенности, что какая-либо из сторон стола увидит свет. Если это так, народ, администрация и военные наверняка решат, что война должна быть единственным путем к национальному объединению. Однако, если мы окажемся в осаде Пекина, станет ясно, что мир никогда не был вариантом, и люди ответят соответствующим образом."
  
 UPC_enter_negotiations_with_guangzhou: "Начать переговоры с Гуанчжоу"
 UPC_enter_negotiations_with_guangzhou_desc: "Гуанчжоу недавно объявил о своем намерении объединить нацию не силой, а путем переговоров. Поскольку перспектива мирного объединения, возможно, вполне достижима, мы должны добросовестно принять их предложение и вступить в переговоры с южанами. Однако, несмотря на их дипломатическую позицию, мы должны сохранять бдительность в отношении возможности еще одного Северного похода с юга, ибо некоторые все еще верят, что путь войны — единственный способ осуществить национальное объединение."
  
 UPC_manipulate_the_regionalists: "Манипулирование регионалистами"
 UPC_manipulate_the_regionalists_desc: "Этим буйным выскочкам начала приходить в голову мысль, что они могут бросить вызов авторитету Центрального правительства и вполне реально выйти сухими из воды. В конечном счете, они должны понять, что национальное объединение — это не игра для «рисолюбов-южан». Под их внешним лоском стабильности и единства скрывается лоскутная сеть «поддерживающих» полевых командиров. Либо из страха, либо по собственной воле они прагматично присоединились к своей местной власти. Однако это, возможно, представляется благом. С помощью подкупа, угроз или просто потакая им в полной мере, мы можем посеять раздор в южных правительствах и подчинить их."
  
 UPC_appeal_to_the_moderates: "Обращение к умеренным"
 UPC_appeal_to_the_moderates_desc: "Различные местные умеренные и консервативные интеллектуалы, шэньши и торговая элита на юге разделяют схожие чувства общей антипатии или даже прямого противодействия пути войны, который преследуют их правительства. В основном из-за массового нарушения торговли, финансов и банковского дела, наряду с общим беспорядком, нанесенным обществу, сельскому хозяйству и стабильности нации, большие массы заинтересованных групп полностью выступают против большой войны. Дополнительным подкреплением такой концепции является то, что финансистами и теми, кто в конечном итоге платит цену за войну, являются упомянутые шэньши и торговцы. Тщательное муссирование возможности мирного объединения перед этими группами, возможно, приведет к потере ими веры в путь войны."
  
 UPC_intimidate_the_defeatists: "Запугивание пораженцев"
 UPC_intimidate_the_defeatists_desc: "Первоначальный Северный поход 1922 года закончился провалом и изгнанием Сунь Ятсена из Гуандуна. Более того, Северный поход 1925 года привел к почти полному исчезновению его движения и рассеиванию его последователей в отчаянные партизанские движения, отстаивающие какую-то заоблачную мечту о Национальной революции. Бездельники в изгнании, прозябающие в Москве и Париже, наряду с прославленными бандитами. Такова судьба всех тех, кто преследует принудительное объединение страны с юга. Казалось бы, любая демонстрация нашей собственной силы легко заставит пессимистов на Юге дважды подумать о еще одном Северном походе."
  
 UPC_build_the_case_for_unification: "Обоснование объединения"
 UPC_build_the_case_for_unification_desc: "Большинство военачальников в Эру милитаристов нуждались в балансировании на тонком канате между Регионализмом и Национализмом. Провинция, управляемая провинциальными людьми, являясь частью более широкого национального китайского целого. Все остальное непатриотично и, возможно, равносильно сепаратизму. Тем не менее, нация из разрозненных провинций не может составить единое целое, если она не будет объединена какой-то центростремительной силой. И, конечно, такую силу должен возглавить [ROOT.GetLeader]. Так же, как Тан Цзияо, Ли Лецзюнь, Лян Цичао, Цай Э и другие пытались в Войне в защиту республики. Так же, как Сунь Ятсен, Тан Цзияо, Лу Жунстин, Цэнь Чуньсюань, Ли Лецзюнь и другие снова пытались в Войне в защиту конституции. Мы должны аналогичным образом следовать такому пути к объединению."
  
 UPC_strongarm_the_warlords: "Давление на милитаристов"
 UPC_strongarm_the_warlords_desc: "Каждая коалиция в Китае имела некоторый элемент сущности милитаристов. Такова природа Эры милитаристов, когда гражданские лица постоянно были вынуждены отходить на второй план из-за власти оружия. Тем не менее, будучи стандартным положением дел, это не означает, что полевые командиры, окружающие нас слева и справа, полностью преданы делу или правительству. Конечно, мы можем бороться с огнем огнем, и с помощью «осторожного» давления мы можем заставить их прекратить удерживать свои силы."
  
 UPC_silence_dissenters: "Заставить замолчать инакомыслящих"
 UPC_silence_dissenters_desc: "В правительстве и среди населения есть много тех, кто полностью выступает против курса, проводимого правительством. Попросту говоря, такое положение дел не годится. Ибо нация не может быть объединена пессимистами и скептиками, которые ставят свои собственные эгоистичные идеалы выше целого национального государства. Некоторые могут осудить такие действия как ненужные, но во времена кардинальных перемен мы не можем искренне терпеть любую форму инакомыслия."
  
 UPC_reassure_the_moderates: "Успокоить умеренных"
 UPC_reassure_the_moderates_desc: "Различные представители шэньши, интеллектуального и купеческого классов высказали свою озабоченность и несогласие с вступлением в потенциально дорогостоящую войну за национальное объединение. Понятно, что их опасения представляют финансовые интересы нации, и любая форма войны, несомненно, приведет к спаду в торговле, наряду с более высокими налогами для оплаты условий военного времени. Прислушиваясь к их опасениям, мы не можем избежать окончательного столкновения войны на горизонте. Однако мы можем представить компромисс. Все сыновья шэньши, купцов и других влиятельных членов общества будут демобилизованы и отправлены домой, впоследствии получив амнистию от призыва. Надеемся, это их успокоит."
  
 UPC_sabotage_peace_talks: "Саботаж мирных переговоров"
 UPC_sabotage_peace_talks_desc: "Стало совершенно очевидно, что мирные переговоры с Севером — это просто попытки выиграть время, по крайней мере, с их стороны. Южное правительство больше не должно заботиться о переговорах с неискренним северным правительством. Нас уже обманывали раньше, и, возможно, мы были дураками, поверив в их добрую волю еще раз. В таких условиях, возможно, удастся подтолкнуть мирные переговоры на путь непримиримых требований, подчеркнуть глупость севера и заставить решить вопрос на поле боя."
  
 UPC_promise_a_new_era: "Обещание новой эры"
 UPC_promise_a_new_era_desc: "Людей нельзя мотивировать смутными аспектами «национального объединения», ибо что это значит на индивидуальном уровне? Приведет ли это к лучшим свободам, распространению новой системы, улучшению их повседневной жизни? Для многих, кто пережил Эру милитаристов, различные великие люди с еще более великими амбициями проповедовали дело национального объединения. И как только их карты были выложены, это оказывалось лишь жалким захватом власти или неудачным предприятием. Тем не менее, [ROOT.GetLeader] приносит реальные, подлинные перемены. Новая Эра, Новая Республика, демократическая, диаметрально противоположная автократическому северу."
  
 UPC_enthusiasm_decision_category: "Демократический энтузиазм федералистов"
 UPC_enthusiasm_decision_category_desc: "«Принятие близко к сердцу ценности демократии требует настойчивости ранних христиан»\n— Цзэн Чжаолунь.\n\nФедералистское движение черпает вдохновение из множества влияний, не имея какого-либо центрального лидера или конкретной идеологической программы из-за своей по своей сути децентрализованной природы. Слияние регионалистских, конституционалистских и демократических политических течений; то, как развернется китайский федерализм, будет определяться §fДемократическим энтузиазмом§! или его отсутствием у его членов. Региональные игроки могут решить §Rизъять§! или §Gвнести§! этот демократический дух, и в ответ центральное правительство может выбрать: §Gпокрыть дефицит§! или §Rприсвоить излишки§!. Это взаимодействие может позволить распределять ресурсы там, где это необходимо, но будьте осторожны: на кону китайская демократия.\n\n§fДемократический энтузиазм§! в настоящее время составляет [?global.UPC_democratic_enthusiasm_var|c%] по всей стране."
  
 UPC_twin_dragons_united_by_chance: "Два дракона, объединенные волей случая"
 UPC_twin_dragons_united_by_chance_desc: "Китай не чужд странным стечениям обстоятельств и еще более странным союзникам, и поэтому, учитывая текущие политические реалии страны, возникла весьма интересная договоренность. Молчаливые союзники из-за больших трудностей с иностранными империалистами, Дунбэйское и Южное правительства в некоторой степени пришли к согласию со своими разногласиями и благодаря различным конференциям и соглашениям о сотрудничестве доказали, что они в некоторой степени способны отложить разногласия ради общего блага нации. Объединенные обстоятельствами, возможно, удастся еще больше закрепить эти рабочие отношения во что-то большее?"
  
  #GXC UPC Decisions 
 GXC_intellectual_reinvigoration_decision: "Интеллектуальное возрождение"
 GXC_intellectual_reinvigoration_decision_desc: "Сколько бы у нас ни было солдат, мы всегда будем отставать от наших соперников, разделяющих Китай, если не модернизируем должным образом саму структурную целостность нации. Слишком долго атрибуты конфуцианства неверно истолковывались, искажались, использовались как инструмент для сдерживания прогресса из-за некоторого приукрашивания «традиции». Крайне важно, чтобы мы поддерживали местный интеллектуализм, чтобы выиграть войну не только на земле, но и в цивилизации."
  
 GXC_develop_a_civilian_apparatus_decision: "Развитие гражданского аппарата"
 GXC_develop_a_civilian_apparatus_decision_desc: "Слишком долго народ Китая был порабощен прихотями капризных бандитов и полевых командиров, не заботящихся об их благополучии. Чтобы доказать, что мы — правительство, которое стремится бороться не за себя, а за весь народ Китая, необходимо предпринять шаги, чтобы поставить во главу угла гражданский аспект нашей администрации. Через трудности и опыт, пусть он разовьется, чтобы стать лучше, чем скелет, который оставил после себя Бэйян."
  
 GXC_harness_the_pearl_river_deltas_wealth_decision: "Использование богатств дельты Жемчужной реки"
 GXC_harness_the_pearl_river_deltas_wealth_decision_desc: "География дельты Жемчужной реки сделала ее идеальным торговым центром и способствовала появлению богатого класса кантонской торговой элиты. Они использовали и культивировали свой статус, чтобы по своей сути трансформировать кантонскую политическую культуру — деньги абсолютны и идут рука об руку с демократией. Содействие взаимовыгодным соглашениям и политике с этим купеческим классом, как это принято у них, может позволить нашему правительству пожинать плоды их богатства и щедрости. Не для немногих, а на благо всех."
  
 GXC_utilise_gentry_connections_decision: "Использование связей шэньши"
 GXC_utilise_gentry_connections_decision_desc: "Естественно, шэньши показывают себя вездесущим и всегда податливым инструментом, иногда препятствием, с которым нужно обращаться деликатно и осторожно. Любой неверный шаг в решении дел шэньши может привести к потере финансовой и общественной поддержки или даже к переходу местных шэньши на сторону врагов [ROOT.GetLeader]. К счастью, обширная сеть покровительства была создана задолго до настоящего момента, и, воспользовавшись определенными услугами, мы, возможно, сможем действовать гораздо динамичнее в окружающей нас политической среде."
  
 GXC_reward_the_armys_loyalty_decision: "Вознаграждение лояльности армии"
 GXC_reward_the_armys_loyalty_decision_desc: "Федералистское движение не зашло бы так далеко, если бы не всегда верная помощь его меча и щита. Будь то армия Дянь в Юньнани или армия Юэ дома в Гуандуне, военная мощь защищала и открывала новую эру для интеллектуальной борьбы. Под эгидой своего любимого лидера Е Цзюй, армия Юэ утвердила себя как фундамент для новой Федеративной республики, и, естественно, ожидает компенсации за кровь, пот и слезы, пролитые ради осуществления мечты Федералистов."
  
 GXC_unleash_regionalist_brawn_decision: "Использование силы регионализма"
 GXC_unleash_regionalist_brawn_decision_desc: "Повсюду изобилует неизменная сущность регионализма внутри федералистского движения. В конце концов, это национальная идеология, рожденная или, по крайней мере, истолкованная из структуры провинциализма. Юньнань для народа Юньнани, Хубэй для народа Хубэя, Гуандун для народа Гуандуна и так далее. С высоким чувством регионализма связано множество негативных моментов, но также и много благ. Использование местной гордости, которую люди сохраняют за своими местностями, позволит правительству лучше сосредоточиться на национальных делах."
  
  #YUN UPC Decisions 
 YUN_expand_rural_education_programmes_decision: "Расширение программ сельского образования"
 YUN_expand_rural_education_programmes_decision_desc: "Ситуация с образованием оставляет желать лучшего, особенно в сельской местности, где средства для получения образования трудно найти. Поскольку крайне важно, чтобы правительство помогало предоставлять образование своим гражданам, мы должны удвоить наши усилия по отправке большего количества учителей в эти сельские районы. Со временем деревня будет процветать наряду с городами, поскольку у сельских детей будет шанс подняться по социальной лестнице и улучшить не только положение своей семьи, но и свои родные города."
  
 YUN_forging_the_minds_of_tomorrow_decision: "Ковка умов завтрашнего дня"
 YUN_forging_the_minds_of_tomorrow_decision_desc: "В течение последних нескольких десятилетий университеты были центрами перемен в Китае, выпуская многих интеллектуалов, модернизаторов и революционеров, которые сформировали нацию такой, какая она есть сегодня. Если мы сможем собрать знания самых ярких умов этой страны, мы сможем модернизировать наше правительство политически, экономически и технологически. Поэтому правительство должно наращивать свои усилия по продвижению высшего образования среди населения, поскольку это позволит увеличить количество местных интеллектуалов в нашем правительстве."
  
 YUN_businesses_with_the_gentry_decision: "Бизнес с шэньши"
 YUN_businesses_with_the_gentry_decision_desc: "Как бы далеко мы ни хотели зайти с нашими реформами, влияние шэньши не позволяет нам продвигать что-либо слишком радикальное, заставляя нас сотрудничать с ними. Помимо политического влияния, их контроль над большей частью нашей промышленности поставил нас в зависимость от их поддержки в стремлении к экономическому развитию и индустриализации. Учитывая это, было бы глупо не заключить с ними сделку, поскольку их политическая и экономическая поддержка поможет нашему правительству развивать местные предприятия, которые вносят вклад в местную экономику."
  
 YUN_tutelage_for_local_self_governance_decision: "Опека местного самоуправления"
 YUN_tutelage_for_local_self_governance_decision_desc: "Местное самоуправление является одним из многих принципов, которых стремится достичь движение федералистов, и поэтому естественно, что то же самое должно применяться к уездам в меньшей степени. Однако такое начинание требует большого терпения и усилий для правильной реализации, поскольку отсутствие опыта и надлежащей подготовки неизбежно приведет к административному бесхозяйственности. Поэтому важно, чтобы местные администраторы обучались искусству ответственного управления, чтобы обеспечить плавный переход к местному самоуправлению."
  
 YUN_the_stewards_of_efficiency_decision: "Блюстители эффективности"
 YUN_the_stewards_of_efficiency_decision_desc: "Поскольку механизм управления становится все более сложным с ростом потребностей людей, необходимость в эффективной, профессиональной и лояльной бюрократии становится неоспоримой. Чтобы обеспечить максимальный эффект от нашей политики, расширение полномочий государственной службы и стандартизация административных процедур, несомненно, укрепят эффективность нашей бюрократии. Хотя некоторым может не нравиться наш жесткий подход, это просто необходимая мера для наведения порядка в эти трудные времена."
  
 YUN_blank_cheque_for_the_mines_decision: "Карт-бланш для шахт"
 YUN_blank_cheque_for_the_mines_decision_desc: "Наша экономическая отсталость мешает нам модернизировать и содержать наши армии. Однако у правительства есть основной источник дохода в виде добычи полезных ископаемых местными горнодобывающими компаниями, которые затем экспортируются в зарубежные страны за плату. Учитывая растущее напряжение наших расходов, пришло время предложить концессии этим горнодобывающим компаниям и дать им карт-бланш на их операции и расширение в обмен на их постоянный вклад в наш поток доходов."
  
 YUN_embrace_our_militarist_reputation_decision: "Принятие нашей милитаристской репутации"
 YUN_embrace_our_militarist_reputation_decision_desc: "Стыдиться нашей репутации милитаристов означало бы опорочить память и наследие Цай Э, который восстал против имперских амбиций Юань Шикая и защитил республиканские мечты Синьхайской революции. С тех пор Юньнань продолжала выпускать много блестящих военных умов, окончивших престижную Военную академию Юньнани в Куньмине. Поэтому мы не должны стыдиться того, как другие воспринимают нас за наше милитаристское отношение, а вместо этого принять его всем сердцем."
  
  #SZC UPC Decisions 
 SZC_educating_the_working_class_decision: "Образование рабочего класса"
 SZC_educating_the_working_class_decision_desc: "Только через образование нация может достичь своего спасения, и только через образование рабочий класс освободится. Именно поэтому правительство должно обеспечить образование своих рабочих, чтобы они могли практиковать демократию на рабочем месте и, таким образом, в конечном итоге участвовать в национальных выборах."
  
 SZC_empower_the_civil_administration_decision: "Усиление гражданской администрации"
 SZC_empower_the_civil_administration_decision_desc: "Китай долгое время боролся со своей собственной военной рукой, и это не может быть продемонстрировано лучше, чем на примере Эры милитаристов. Само правительство, имея благородные намерения, все еще сильно укомплектовано милитаристами и полевыми командирами; вероломными людьми, которые хранят верность только самим себе. Если правительство хочет бороться с деспотизмом, то именно люди слова, а не оружия, должны быть наделены властью."
  
 SZC_turn_a_blind_eye_to_excesses_decision: "Закрыть глаза на излишества"
 SZC_turn_a_blind_eye_to_excesses_decision_desc: "Как бы прискорбно это ни было, иногда правительственной администрации приходится идти на прагматичные договоренности. Значительная часть поддержки правительства основывается на местных милитаристах, регионалистах, шэньши, капиталистах и торговцах. Вряд ли можно ожидать, что они будут такими же бескорыстными, как идеалисты и революционеры. Допуская ограниченные закулисные сделки, правительство может обеспечить себе еще большие выгоды и поддержку."
  
 SZC_encourage_immediate_action_decision: "Поощрение немедленных действий"
 SZC_encourage_immediate_action_decision_desc: "Политики, интеллектуалы и слабовольные ничтожные люди, называющие себя «солдатами», предпочли бы методичные, тщательно спланированные достижения во всех формах модернизации: экономической, политической, военной. Они едва ли могут взглянуть в окно, чтобы стать свидетелями явных страданий простых масс. Только через людей смелого действия, немедленного действия правительство может позаботиться о массах, и именно эти люди должны давить на правительство, чтобы оно действовало!"
  
 SZC_ties_with_our_military_allies_decision: "Связи с нашими военными союзниками"
 SZC_ties_with_our_military_allies_decision_desc: "Ни одно государственное образование Китая не могло по праву оспаривать другое без какой-либо собственной военной силы. Каким бы смелым и идеалистичным ни был крестовый поход правительства, они вряд ли смогут протолкнуть последний оплот демократии Китая силой одних только слов. Для храбрых людей в вооруженных силах правительства, будь то Баодин, Офицеры или другие, их связи монументальны в борьбе правительства."
  
 SZC_coopt_the_nationalist_cause_decision: "Перехват националистической повестки"
 SZC_coopt_the_nationalist_cause_decision_desc: "Партия молодого Китая, пожалуй, одна из самых мощных политических организаций, существовавших в Национальном порядке Чжили. Тесно связанные с Нефритовым маршалом, Улыбающимся тигром и даже губернатором Ян Сэнем, они оказались в каждом уголке нации; через местных союзников-милитаристов или через те самые национальные институты, в которых они скрываются. Благодаря нынешним договоренностям правительства с Младокитайцами, оно может в достаточной мере перекачать часть их собственного националистического пыла для своих нужд."
  
  #UPC Satellite Decisions 
 UPC_challenge_the_UPC_decision: "Оспорить лидерство [UPC.GetLeader]"
 UPC_challenge_the_UPC_decision_desc: "Движение федералистов было введено в заблуждение относительно способности [UPC.GetLeader] возглавить движение. Как верные приверженцы конституционализма и демократии, мы продемонстрировали более искреннюю приверженность как факелоносцы дела федералистов. Таким образом, мы должны вернуть контроль и направить движение обратно с его сбившегося пути."
  
 UPC_eliminate_UPC_pretenders_decision: "Устранить претендентов [UPC.GetNonIdeologyAdjective]"
 UPC_eliminate_UPC_pretenders_decision_desc: "Оплот федерализма пал, и на его месте возникла извращенная альтернатива, требующая лояльности их делу. Действие, равносильное не более чем краже имени движения федералистов для их милитаристских амбиций; мы должны восстановить истинные столпы федерализма и спасти не только наше движение, но и всю нашу нацию."
  
 UPC_bolster_provincial_security_decision: "Укрепление безопасности провинции"
 UPC_bolster_provincial_security_decision_desc: "Стабильность в нашей провинции — это поток, так как небезопасная атмосфера сохраняется как в городах, так и в сельской местности. Будь то разгул бандитизма, вымогающего деньги у тех, кому не повезло стать жертвой, или обширные преступные сети, ведущие незаконный бизнес в темных подворотнях наших городов, мы больше не можем бездействовать, чтобы не впасть в полную анархию. В отличие от конституционалистских и демократических тенденций в движении, нам необходима более сильная рука для сохранения гармонии в наших собственных границах."
  
 UPC_implement_democratic_reforms_decision: "Проведение демократических реформ"
 UPC_implement_democratic_reforms_decision_desc: "Как движение, стремящееся направить нацию к децентрализованному будущему, где каждая провинция имеет возможность управлять собой в соответствии с местными потребностями, конституционализм и демократия, естественно, стали главными столпами федерализма. Защищая права людей путем соблюдения конституции и позволяя массовое участие в решении того, как все должно управляться, мы будем сиять по всей стране как пример «Образцовой провинции» и реализуем мечты о федералистском Китае."
  
 UPC_protect_provincial_rights_decision: "Защита прав провинций"
 UPC_protect_provincial_rights_decision_desc: "Автономия провинций всегда была главным столпом движения федералистов, которое обещало закрепить право провинции на самоуправление, независимо от того, чего хотело Центральное правительство. Однако этот аспект движения медленно, но верно отходил на второй план в пользу внедрения демократии и конституционализма, поскольку автономия провинций стала синонимом регионализма. Как бы они ни относились к этому, мы должны отстаивать свою автономию и напомнить Федеральному правительству, что [ROOT.GetNameDef] по-прежнему оставляет за собой право управлять собой любым способом, который сочтет нужным."
  
 UPC_follow_federal_policies_decision: "Следование федеральной политике"
 UPC_follow_federal_policies_decision_desc: "Иногда важно придерживаться политики Федерального правительства, особенно когда оба правительства согласны в одном и том же. Несмотря на наше право на самоуправление и автономию провинций, мы должны проявить солидарность с [UPC.Capital.GetCapitalVictoryPointName] в эти неспокойные времена, когда политическая неопределенность стала статус-кво, чтобы сотрудничество между нашими двумя правительствами углублялось, одновременно повышая легитимность обоих правительств по всей стране."
  
 UPC_stressing_our_neutrality_decision: "Подчеркивание нашего нейтралитета"
 UPC_stressing_our_neutrality_decision_desc: "Война нанесла тяжелый урон Китаю, оставив многих нищими и превратив центры процветания в ничто иное, как руины. Даже когда мы собираем осколки и пытаемся восстановить то, что осталось, угрозы вторжения все еще преследуют многих в [ROOT.GetNameDef]. Когда другие пытаются вовлечь нас в бессмысленные конфликты, которые не приносят пользы народу [ROOT.GetNameDef], мы должны найти в себе мужество сказать «хватит» и попросить их уважать наш провинциальный нейтралитет."
  
 UPC_support_for_unification_efforts_decision: "Поддержка усилий по объединению"
 UPC_support_for_unification_efforts_decision_desc: "Фрагментация слишком долго терзала нашу нацию. Много раз попытки объединить Китай терпели неудачу, так как оппортунисты выкраивали личные феодальные владения, чтобы удовлетворить свою жадность. Теперь наше Федеральное правительство просит нашей помощи в своих усилиях по воссоединению Китая любыми возможными средствами, будь то дипломатия или война. Мы ответим решительной поддержкой и готовы стоять плечом к плечу во имя объединения нации!"
  
  #UPC Election Decisions 
 UPC_elections_decision_category: "Китайская федеративная демократия"
 UPC_elections_decision_category_desc: "Под руководством движения федералистов Китай сделал первые шаги к либеральной демократии. Останется ли она такой, будет зависеть от того, насколько хорошо [UPC.GetLeader] сможет управлять этой хрупкой демократической системой.\n\n§fПолитические партии§! в законодательном органе получат §YМеста в Ассамблее§! пропорционально популярности их идеологии. Для формирования правительства необходимо простое большинство мест. При необходимости после выборов могут быть сформированы §fКоалиции§! с незапрещенными партиями в обмен на §YОбещания§!, пропорциональные занимаемым ими местам, которые могут быть выполнены путем завершения связанных с ними фокусов.\n\n[UPC_democratic_backsliding_threshold][UPC_election_coalition_seat]"
  
 UPC_democratic_backsliding_threshold_default: "§RОткат демократии§! может произойти, если §fДемократический энтузиазм§! упадет до §Y$UPC_bop_developing_realism$§! или ниже. Этот порог можно снизить, завершив фокус §Y$UPC_nationalise_the_military$§!."
 UPC_democratic_backsliding_threshold_military_depoliticised: "§RОткат демократии§! может произойти, если §fДемократический энтузиазм§! упадет до §Y$UPC_bop_bitter_realism$§!."
 UPC_democratic_backsliding_threshold_default_two_ends: "§RОткат демократии§! может произойти, если §fДемократический энтузиазм§! упадет до §Y$UPC_bop_developing_realism$§! или §Y$UPC_bop_growing_idealism$§!. Этот порог можно снизить, завершив фокус §Y$UPC_nationalise_the_military$§!."
 UPC_democratic_backsliding_threshold_military_depoliticised_two_ends: "§RОткат демократии§! может произойти, если §fДемократический энтузиазм§! упадет до §Y$UPC_bop_bitter_realism$§! или §Y$UPC_bop_romantic_idealism$§!."
  
 UPC_election_coalition_seat_text: "\n\nМеста правящей коалиции: [UPC_get_governing_coalition_seats]/§Y[?global.UPC_total_seats_var|0]§!\nВ настоящее время в законодательном органе имеется §Y[?global.UPC_total_seats_var|0]§! мест. [UPC_governing_situation]"
  
 UPC_governing_situation_majority_key: "В настоящее время у нас есть §Gдостаточно согласованных мест§! для формирования и поддержания правительства."
 UPC_governing_situation_minority_key: "В настоящее время нам нужно еще [UPC_get_governing_coalition_needed_seats], чтобы достичь необходимого порога [?global.UPC_majority_seats_var|0Y] для большинства."
  
