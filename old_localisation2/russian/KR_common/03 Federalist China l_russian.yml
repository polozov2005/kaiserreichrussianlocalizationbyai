 UPC_low_enthusiasm_mechanic_warning_tt: "§R$UPC_low_enthusiasm_side$ растет в движении федералистов, представляя регионализм, провинциальное самоуправство и интеллектуальный элитизм. Это идет на пользу прежде всего консервативному крылу движения, хотя даже консервативные фракции требуют некоторого энтузиазма для поддержания импульса движения. Однако будьте осторожны: чем больше он растет, тем труднее его остановить, если он вырастет слишком высоко, мы станем неотличимы от милитаристов.§!"
  
 UPC_high_enthusiasm_mechanic_warning_tt: "§G$UPC_high_enthusiasm_side$ растет в движении федералистов, представляя национальную солидарность, растущие демократические настроения и приверженность конституционализму. Это идет на пользу прежде всего прогрессивному крылу движения, хотя все фракции ожидают некоторого энтузиазма для поддержания импульса движения. Однако будьте осторожны: чем больше он растет, тем труднее его контролировать, особенно когда низы начинают сопротивляться статус-кво.§!"
