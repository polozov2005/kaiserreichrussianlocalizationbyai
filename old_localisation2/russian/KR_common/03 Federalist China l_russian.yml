 UPC_election_mobilisation_law_impact_tt: "§YВ мирное время избиратели будут склоняться к умеренности. При более высокой экономической мобилизации социалисты наберут обороты. При нашем текущем законе о мобилизации:§!"
 UPC_election_trade_law_impact_tt: "§YЭкспорт — чувствительный политический вопрос. Больший доступ к иностранным идеям и капиталу, как правило, благоприятствует либералам, а протекционизм — националистам. Отсутствие контроля над ним мобилизует и тех, и других.§!"
 UPC_election_conscription_impact_tt: "§YМеньшая (но не разоруженная) армия, как правило, принесет пользу государственникам. Более высокие уровни призыва заставляют нас полагаться на помощь регионалистов.§!"
  
 UPC_set_indirect_presidential_elections_effect_tt: "§YПрезиденты будут избираться законодательным органом, что позволит игроку определить результат, тратя политическую власть и Демократический энтузиазм.§!"
 UPC_set_direct_presidential_elections_effect_tt: "§YПрезиденты будут избираться прямым голосованием, что увеличит влияние агитации, но также сделает результаты выборов известными сразу в день выборов.§!"
 UPC_direct_presidential_elections_impact_tt: "§YПоскольку президенты избираются прямым голосованием, влияние агитации §Gувеличивается.§!§!"
 UPC_indirect_presidential_elections_options_tt: "§YПоскольку президенты избираются косвенным путем, мы можем свободно выбирать победителя — платя политической властью и Демократическим энтузиазмом пропорционально тому, сколько мест нам нужно для большинства.§!"
 UPC_direct_presidential_elections_options_tt: "§YПоскольку президенты избираются прямым голосованием, кандидат с большим количеством голосов будет избран президентом.§!"
  
 UPC_assembly_default_representation_effect_tt: "§YЗаконодательный орган будет состоять из 800 представителей, распределенных по провинциям пропорционально населению.§!"
 UPC_assembly_minority_representation_effect_tt: "§YЗаконодательный орган будет состоять из 900 представителей со специальным представительством для меньшинств и диаспоры. Это сделает агитацию в этих регионах более эффективной.§!"
 UPC_assembly_occupation_representation_effect_tt: "§YЗаконодательный орган будет состоять из 900 представителей со специальным представительством для различных профессий. Это усилит влияние некоторых событий групп интересов и сделает некоторые из них более частыми.§!"
 UPC_assembly_minority_and_occupation_representation_effect_tt: "§YЗаконодательный орган будет состоять из 1000 представителей со специальным представительством для меньшинств, диаспоры и различных профессий. Это усилит влияние и частоту связанных событий.§!"
 UPC_minority_rep_impact_tt: "§YПоскольку Конституция предусматривает специальное представительство для этнических меньшинств и диаспоры, влияние этого события было увеличено.§!"
 UPC_occupation_rep_impact_tt: "§YПоскольку Конституция предусматривает специальное представительство для различных профессий, влияние этого события было увеличено.§!"
  
 UPC_grant_womens_suffrage_effect_tt: "§YПредоставление общенационального избирательного права женщинам увеличит частоту и влияние связанных с ним событий.§!"
