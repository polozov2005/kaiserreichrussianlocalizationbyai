 UPC.chinademocraticleague.001.t: "Инцидент с «Семью благородными мужами»"
 UPC.chinademocraticleague.001.d: "Поскольку антиконцессионная истерия приняла радикальный оборот, консервативная реакция казалась неизбежной. Но многие были шокированы, когда семь видных членов Федерации национального спасения были внезапно задержаны властями Посольского квартала в Шанхае и экстрадированы в Пекин по обвинению в государственной измене, где они остаются в заключении в ожидании суда.\n\nХотя Федерация национального спасения в последние месяцы набрала популярность благодаря организации протестов против концессий, их арест также происходит на фоне более широкого китайского демократического движения. Воспользовавшись вакуумом власти среди левых после Северного похода в 1928 году, ФНС вместе с Китайской конституционной партией, Китайским профессионально-образовательным обществом, Альянсом сельской реконструкции и многими другими независимыми деятелями, от Ху Ши до социалистов вроде Чжан Боцзюня и Тань Пиншаня, сформировала Объединенную лигу национального строительства.\n\nПоявление многих фигур, близких к социалистам, вызвало значительные подозрения, заставив ОЛНС опубликовать «Символ веры» из 12 пунктов, который включал призывы к единству, мирным переговорам, реконструкции, провозглашению и соблюдению конституции, признанию политических партий, прекращению вмешательства военных в политику, борьбе с коррупцией и беспартийности. Власти Чжили терпели их в преддверии выборов 1929 года, но Шанхайское восстание 1932 года привело к жестоким репрессиям, которые загнали ОЛНС в подполье.\n\nПосле чисток Чжили многие либеральные и прогрессивные интеллектуалы бежали из Лиги на юго-запад, где нашли правительства милитаристов, готовые их терпеть. Была сформирована новая коалиция, известная как Федерация демократических партий Китая (ФДПК). ФДПК действовала тайно, хотя и очистила свои ряды от левых членов, привлекавших слишком много внимания, таких как Чжан и Тань. ФНС изначально не пригласили в ФДПК, но в итоге приняли обратно. 1936 год дал ФДПК толчок, но слабая реакция руководства ФДПК привела к расколу хрупкого движения."
 UPC.chinademocraticleague.001.a: "Кучка социалистических смутьянов получает по заслугам."
 UPC.chinademocraticleague.001.b: "Оскорбление гражданских прав в Китае!"
 UPC.chinademocraticleague.001.c: "Доказательство того, что буржуазный реформизм ведет в никуда."
 UPC.chinademocraticleague.001.e: "Бэйян скатывается обратно в авторитаризм."
  
 UPC.chinademocraticleague.002.t: "Партия демократического социализма Китая"
 UPC.chinademocraticleague.002.d: "Арест «Семи благородных мужей» вызвал шок по всему Китаю. Но всплеск гнева был направлен не только на [QIE.GetAdjective] власти. Федерация демократических партий Китая оказалась неэффективной в своей реакции на кризис: входящие в нее партии разделились во мнениях, а их лидеры в основном призывали к спокойствию.\n\nВ частности, Китайская конституционная партия, крупнейший компонент ФДПК и единственная официальная политическая партия, была обвинена в бесхребетности — из-за страха потерять свое влияние в Национальной ассамблее. Реакция ФДПК ограничилась запоздалым заявлением с осуждением арестов и финансированием адвокатов для обвиняемых.\n\nМногие недовольные интеллектуалы ФДПК на юге собрались в Гуанчжоу, где после недель дискуссий объявили о создании Партии демократического социализма Китая (ПДС). Партию возглавили бывшие члены Китайского общества национального возрождения, клики левых лянистов внутри ККП во главе с Чжан Цзюньмаем и Чжан Дунсунем. Другой крупной фракцией является (клика университета Цинхуа) Общества полумесяца во главе с Ло Лунцзи, Вэнь Идо и Лян Шицю.\n\nНовая партия заявляет, что выступает за парламентскую демократию западного образца, смешанную экономическую систему, сочетающую гильдейский социализм и социал-демократию, а также националистическое мировоззрение, которое возвышает расу как важнейший принцип в обществе. Помимо призыва к новой конституции, они также требуют неизменного Пятилетнего плана после объединения, с упором на единство, эффективность и стабильность.\n\nЛидеры ПДС имеют опыт работы с южными милитаристами, такими как Сунь Чуаньфан, федералистами, такими как Чжао Хэнти, Чэнь Цзюнмин и Тан Цзияо, а также интеллектуалами, такими как Ху Ши. У них также есть некоторые пересечения с Младокитайской партией, еще одним ответвлением лянизма. Хотя в начале у них насчитывалось всего около десяти тысяч последователей, газета «Еженедельник возрождения» заметила значительный рост числа подписчиков."
 UPC.chinademocraticleague.002.a: "Заря нового пути для Китая!"
 UPC.chinademocraticleague.002.b: "Доказательство того, что у Китая есть альтернатива!"
 UPC.chinademocraticleague.002.c: "Смогут ли они вдохнуть новую жизнь в демократию Юга?"
 UPC.chinademocraticleague.002.e: "Ревизионисты, буржуа и контрреволюционеры!"
 UPC.chinademocraticleague.002.f: "Очередной осколок социалистов? Серьезно?"
  
 UPC.chinademocraticleague.003.t: "Суд над «Семью благородными мужами»"
 UPC.chinademocraticleague.003.d.manchu: "Естественно, установление власти маньчжуров на пепле Бэйянской республики вызвало серьезное осуждение общественности и опасения по поводу нестабильности. Однако источником недавних споров стала не сама монархия, а арест разнородной группы левых интеллектуалов. Ввергнув и без того разгневанные демократические и интеллектуальные политические круги в ярость, они начали буквально осаждать правительство, требуя ответа. Мобилизованные в значительной степени ФНС, обществом «Стремление», ПОИ, АСР, Младокитайцами и даже членами довольно пассивной ККП, многие направили шквал осуждений в адрес правящего правительства.\n\nС момента создания ФНС общественность пристально наблюдала за поведением правительства в отношении концессий и демократии. Черный понедельник в сочетании с арестом «Семи благородных мужей» и беспорядками в Шанхае, Лиге и других местах привел к довольно плачевному положению дел.\n\nЭкстрадированные в Пекин, «Семь благородных мужей» содержались властями в довольно хороших условиях. Тем не менее, ведущие юристы, поддерживаемые семьей Айсин Гёро, представили свое обвинительное заключение. Обвинив Семерку в «организации группы с целью создания угрозы правительству Китая» и ссылаясь на многочисленные нарушения государственных законов Китая, они добились успешного предъявления обвинения.\n\nОднако после четырех месяцев заключения «Семь благородных мужей» породили растущее интеллектуальное движение, призывающее к их освобождению, что отчасти служит прикрытием для более широких призывов к демократии, мирному окончанию гражданской войны и единству против иностранной агрессии. За закрытыми дверями различные аристократы-реформисты и интеллектуалы из ближайшего окружения оказали давление на [QIE.GetSecondInCommand], чтобы тот предложил императору Сюаньтуну помиловать их.\n\nС другой стороны, сторонники жесткой линии в аристократии, такие как Сиця, Пуцзе, Пужэнь, Цзайчжэнь и Сянькуй, настаивают на том, что «Семь благородных мужей» — это социалистические террористы, просто политические агитаторы, близкие к Гоминьдану; любая уступка сейчас выставит Королевское правительство слабым."
 UPC.chinademocraticleague.003.d.zhili: "Вряд ли можно сказать, что правление Чжили в Китае было всенародно популярным. Недавний скандал вокруг ареста «Семи благородных мужей» вверг и без того разгневанные демократические и интеллектуальные политические круги в ярость, и они осаждают правительство, требуя ответа. Мобилизованные в значительной степени ФНС, обществом «Стремление», ПОИ, АСР, Младокитайцами и даже членами довольно пассивной ККП, многие видные деятели направили шквал осуждений в адрес правящего правительства.\n\nС момента создания ФНС общественность пристально наблюдала за поведением правительства в отношении концессий и демократии. Черный понедельник в сочетании с арестом «Семи благородных мужей» и беспорядками в Шанхае, Лиге и других местах привел к довольно плачевному положению дел.\n\nЭкстрадированные в Пекин, «Семь благородных мужей» содержались властями в довольно хороших условиях. Тем не менее, ведущие юристы Ассоциации гармонии во главе с Бянь Шоуцзином из группы Тяньцзинь-Баодин представили свое обвинительное заключение. Обвинив Семерку в «организации группы с целью создания угрозы правительству Китая» и ссылаясь на многочисленные нарушения государственных законов Китая, они организовали успешное предъявление обвинения.\n\nОднако после четырех месяцев заключения «Семь благородных мужей» породили растущее интеллектуальное движение, выступающее за их освобождение, хотя это всего лишь прикрытие для более широких призывов к демократии, мирному окончанию гражданской войны и единству против иностранной агрессии. За закрытыми дверями Бай Цзяньу, Сунь Даньлинь и их Департамент по политическим делам Лоянской фракции отвели Нефритового маршала в сторону, призывая его оказать давление на правительство, чтобы снять обвинения и освободить заключенных.\n\nС другой стороны, группа Тяньцзинь-Баодин и другие ветви Чжили заняли твердую позицию, настаивая на том, что «Семь благородных мужей» — это просто политические агитаторы, близкие к Гоминьдану, и что любая уступка сейчас выставит Чжили слабыми. Примечательно, что Фракция секретариата Чжан Цихуана и Цао Кунь остались в стороне от ссоры, решив поддержать то, что решит большинство."
 UPC.chinademocraticleague.003.a.zhili: "Бай Цзяньу и Сунь Даньлинь настаивают на их освобождении!"
 UPC.chinademocraticleague.003.b.zhili: "Группа Тяньцзинь-Баодин выступает за продолжение их содержания под стражей."
 UPC.chinademocraticleague.003.a.manchu: "Народное давление заставляет роялистов уступить."
 UPC.chinademocraticleague.003.b.manchu: "Вряд ли можно ожидать, что такие смутьяны будут держаться подальше от неприятностей."
  
 #GXC CDL Events (100-199): 
 UPC.chinademocraticleague.100.t: "Демократическая лига Китая"
 UPC.chinademocraticleague.100.d: "По мере того как войска [GXC.GetAdjective] приближались к Пекину, росли опасения по поводу демократического будущего движения федералистов. Хотя Чэнь Цзюнмин поклялся осуществить стабильный переход к демократической федеративной республике, это не удовлетворило многих его бывших прогрессивных союзников, которые беспокоятся о снижении своего влияния по мере приближения объединения.\n\nСтарая Федерация демократических партий Китая провела ребрендинг и стала Демократической лигой Китая под руководством Чжан Цзюньмая из Партии демократического социализма. Они организовали то, что называют мирной и патриотической оппозицией, требуя немедленного внедрения демократии. Теперь нация ждет ответа от президента Чэня."
 UPC.chinademocraticleague.100.a: "Посмотрим, такой ли Чэнь демократ, каким себя называет."
 UPC.chinademocraticleague.100.b: "Дураки спорят с другими дураками."
 UPC.chinademocraticleague.100.c: "[FROM.Capital.GetCapitalVictoryPointName] находится на перепутье."
  
 #YUN CDL Events (200-299): 
 UPC.chinademocraticleague.200.t: "Демократическая лига Китая"
 UPC.chinademocraticleague.200.d: "Собравшись в [UPC.Capital.GetCapitalVictoryPointName], лидеры нескольких партий и групп, составлявших Федерацию демократических партий Китая, собрались для ошеломляющего объявления: отныне они будут известны как Демократическая лига Китая. Эта объединенная партия, возглавляемая ныне интеллектуалом из Общества полумесяца Ло Лунцзи, опубликовала свой манифест, ища третий путь между революцией и постепенной эволюцией: сознательные реформы.\n\nПрезидент [ROOT.GetLeader] пока не сделал никаких заявлений по этому поводу, однако ясно, что напряженность между исполнительной властью и оппозицией будет продолжать расти. То, как это будет разрешено, задаст тон будущему движения федералистов."
 UPC.chinademocraticleague.200.a: "Мы будем внимательно следить за этим развитием событий."
 UPC.chinademocraticleague.200.b: "Новый день, новая порция чепухи."
 UPC.chinademocraticleague.200.c: "Похоже, Китай снова на перепутье."
  
