 UPC_warlord_supports_GRA_decision: "Поддержать Великий республиканский альянс"
 UPC_warlord_supports_GRA_decision_desc: "Было бы... возможно, разумно несколько повлиять на национальную избирательную кампанию в нашу пользу. В конце концов, наша позиция сильна лишь настолько, насколько сильны наши политические убеждения и союзы. Поддержав [UPC_GetGRAPartyLeader] и Великий республиканский альянс, мы можем как обеспечить свое положение в нации и правительстве, так и сохранить политический курс, который наиболее удовлетворителен для [ROOT.GetLeader]."
  
 UPC_warlord_supports_CDL_decision: "Поддержать Демократическую лигу Китая"
 UPC_warlord_supports_CDL_decision_desc: "Великий республиканский альянс не заботится о безопасности нации или ее зарождающейся демократии. Они бы увидели, как их собственный национальный проект раскололся из-за каких-то намеков на величие, основанных на золотом яйце Федерализма. Только оппозиция, Демократическая лига Китая, давнее наследие демократического реформизма в стране, может обеспечить сохранение, защиту и продвижение демократии Китая в светлое будущее."
  
 UPC_warlord_supports_liberals_decision: "Поддержать независимых и либералов"
 UPC_warlord_supports_liberals_decision_desc: "Ни один из главных претендентов на национальных выборах не имеет в сердце истинных интересов нации. Демократическая лига Китая увидит нацию расколотой радикализмом, извращением и искажением идеалов Лян Цичао, вращающихся вокруг безумия социализма. Великий республиканский альянс — это не что иное, как южная замена коррупции Бэйяна. Стервятники, кружащие вокруг ложного идола Федерализма как решения всех проблем. Только настоящие Независимые, эти истинные государственные служащие и те истинные демократы, которые отвергают трайбализм политики, могут принести новое будущее Китаю."
  
 UPC_warlord_supports_regionalism_decision: "Поддержать местный регионализм"
 UPC_warlord_supports_regionalism_decision_desc: "Выбросьте все это! Вот что сделает Центральное правительство с федералистским проектом страны, если они добьются своего! Они рассматривают [ROOT.GetLeader] не более чем как «полевого командира», в самом бесславном смысле. Не как государственного деятеля, нет, а как отрицание прогресса и развития Китая. И все же их ложь ясна как день. Без [ROOT.GetLeader] не было бы будущего для его народа, его провинции, ей пришлось бы отвечать перед какими-то вероломными людьми в столице и кабинете министров. Только через [ROOT.GetLeader] мы можем защитить нашу независимость, и нация должна знать этот факт."
  
 UPC_warlord_embrace_radicalism_decision: "Наслаждаться радикализмом"
 UPC_warlord_embrace_radicalism_decision_desc: "Нация может быть искуплена только через собственное самопожертвование и кровопролитие. Реформисты, их «демократия» — это ни готовое, ни правильное применение системы. Согласно их идеалу, нация упадет на собственный меч, как это было в 1912, в 1913, в 1917 и с 1920 по 1933 год. Если мы хотим быть лучше Бэйяна, то революция, и только революция, может вывести нацию из пепла. Партия молодого Китая и Гоминьдан, хотя, возможно, и противостоят друг другу в некотором смысле слова, являются единственными истинными знаменосцами процветания Китая."
  
 #Coalition Decisions 
 UPC_perils_of_a_minority_government_mission: "Опасности правительства меньшинства"
 UPC_perils_of_a_minority_government_mission_desc: "[ROOT.GetLeader], возможно, выиграл президентство, но это не значит, что он может править единолично (по крайней мере, пока жива наша демократия). Даже если [ROOT.GetRulingParty] получит абсолютное большинство мест (достижение само по себе), нам нужно будет продемонстрировать нашу способность командовать правящим большинством, сформировав кабинет. До тех пор будет править временное правительство с ограниченными полномочиями, коалиционные переговоры будут продолжаться, а опасения по поводу нестабильности сохранятся."
  
 UPC_form_a_government_decision: "Сформировать правительство"
 UPC_form_a_government_decision_desc: "Обеспечив голоса, необходимые для работающего большинства, мы теперь можем уверенно сформировать правительство, не беспокоясь о том, что ключевые голосования будут заблокированы в законодательном органе. Это во многом будет способствовать стабилизации нашего правления."
  
 UPC_annual_coalition_expectations_timer: "Ожидания коалиции"
 UPC_annual_coalition_expectations_timer_desc: "Каждый год наши партнеры по коалиции будут ожидать некоторого прогресса в выполнении обещаний, которые мы дали. Это потребует от нас тратить время на принятие законодательства, благоприятного для них, даже если они половинчатые. Успех укрепит веру в нашу демократию, неудача может поставить под угрозу не только наше правительство, но и нашу республику!"
  
 UPC_coalition_with_the_KMT_decision: "Коалиция с §RГоминьданом§!"
 UPC_coalition_with_the_KMT_decision_desc: "Гоминьдан, также известный как Китайская национальная партия, является революционной авангардной партией, основанной покойным Сунь Ятсеном. Ее основная идеология строится вокруг Трех народных принципов доктора Суня, его Трехэтапной революции и его Плана национальной реконструкции. Провал их революции привел определенные фракции их партии за стол переговоров, но не обманывайтесь — даже «умеренные» из этого движения находятся на самом краю китайской политики."
  
 UPC_coalition_with_the_CDL_decision: "Сформировать большую коалицию [UPC_GetGRAPartyName_nosub]-[UPC_GetCDLPartyName_nosub]"
 UPC_coalition_with_the_CDL_decision_desc: "Демократическая лига Китая является преемницей более старой Объединенной лиги национального строительства и Федерации демократических партий Китая, в основном левоцентристского альянса, в котором доминируют прогрессивные либеральные и интеллектуальные партии. ДЛК утверждает, что является самостоятельной партией, но на практике остается множеством более мелких партий, действующих как один избирательный блок. Большая коалиция между ВРА и ДЛК, вероятно, была бы естественным выбором."
  
 UPC_coalition_with_the_GRA_decision: "Сформировать большую коалицию [UPC_GetCDLPartyName_nosub]-[UPC_GetGRAPartyName_nosub]"
 UPC_coalition_with_the_GRA_decision_desc: "Великая республиканская лига была основана как союз между Чэнь Цзюнмином и Дуань Цижуем в изгнании, однако с тех пор она превратилась в более крупную коалицию в целом либеральных и консервативных федералистов по всей стране. ВРА часто связана с институтами истеблишмента, будь то губернаторы-милитаристы или провинциальные ассамблеи, особенно на юге, а также группы Хунмэнь среди диаспоры. Большая коалиция между ВРА и ДЛК, вероятно, была бы естественным выбором."
  
 UPC_coalition_with_the_REP_decision: "Собрать [UPC_GetREPPartyName]"
 UPC_coalition_with_the_REP_decision_desc: "Традиционная Бэйянская система включала много Независимых, которые часто гордились своим свободным духом. Это не помешало им собираться в собственные клубы или даже создавать небольшие партии, хотя многие неохотно отказываются от своей политической автономии. Однако времена меняются, и дни неформальных ассоциаций, доминирующих в политике, уже давно подходят к концу. Большинство из этих независимых уже поклялись работать с любым сформированным правительством (ВРА или ДЛК), и мы можем легко уговорить остальных голосовать с нами."
  
 UPC_coalition_with_the_DCP_decision: "Коалиция с [UPC_GetDCPPartyName_long]"
 UPC_coalition_with_the_DCP_decision_desc: "[UPC_GetDCPPartyName_nocolour_long] — крупнейший потомок реформистского движения Лян Цичао. Если Сунь был отцом правительства Гуанчжоу, то Лян во многих отношениях был отцом-основателем Бэйянской республики, и его идеи продолжают влиять на людей во всем политическом спектре. Его Конституционалисты особенно озабочены созданием и принуждением к исполнению одноименного дела, иногда ставя его выше самой демократии. В целом более консервативная партия (и, возможно, старейшая сохранившаяся в Китае), она питает особую любовь к сельской деревне."
  
 UPC_coalition_with_the_STA_decision: "Коалиция с §g[UPC_GetSTAPartyName_long]§!"
 UPC_coalition_with_the_STA_decision_desc: "Армия и бюрократия — две могучие руки Центрального правительства, которые иногда проявляются как самостоятельная политическая сила. Хотя движение федералистов стремилось нейтрализовать тиранию Центрального правительства, они никогда не могли полностью остановить появление этого централизма из своего собственного правительства на пути к национальному воссоединению. Некоторые лидеры естественно укоренились в этих силах, другим придется умолять и упрашивать их. Всем им придется быть осторожными, имея с ними дело, чтобы правительство не управляло Президентом, а не наоборот."
  
 UPC_coalition_with_the_REG_decision: "Сделки с §PНезависимыми регионалистами§!"
 UPC_coalition_with_the_REG_decision_desc: "Хотя Эра милитаристов подходит к концу, сами полевые командиры оказались достаточно умны, чтобы адаптироваться, а не вымереть. Используя новые возможности и используя свое влияние на местную политику, эти люди продолжают находить способы оставаться актуальными. Некоторые из них — бывшие члены великих клик милитаристов, таких как Чжили, Фэнтянь и Аньхой, в то время как другие являются клиентами местных политических машин, если не самими силовиками. Однако было бы ошибкой полагать, что все они невежественные и ненавистные местные тираны. Многие из них имеют популистский оттенок и хорошо образованы, а некоторые даже основали небольшие собственные партии для удовлетворения местных интересов. Хотя у некоторых есть собственные идеологии, большинство будет тяготеть к нашему центру власти."
  
 UPC_coalition_with_the_YCP_decision: "Коалиция с §nМладокитайской партией§!"
 UPC_coalition_with_the_YCP_decision_desc: "Партия молодого Китая была основана китайскими студентами, обучающимися за границей. Вдохновленные младотурками и учением Лян Цичао, они превратились в ультранационалистическую, милитаристскую организацию, которая имела тенденцию прививаться к существующим структурам полевых командиров — предлагая им легкую, покорную идеологическую программу, которую можно было бы использовать для вдохновения масс. Несмотря на это, их фактическое членство, как правило, составляют студенты, интеллектуалы и бизнесмены — и у них есть умеренная сторона, готовая работать с движением федералистов. Тем не менее, коалиция с ними может быть опасной перспективой для будущего нашей молодой демократии."
  
 UPC_appease_the_KMT_repeatable_decision: "Умиротворение §RГоминьдана§!"
 UPC_appease_the_KMT_repeatable_decision_desc: "Поскольку основная политическая повестка дня Гоминьдана была исчерпана годами участия в коалиционных правительствах, они стали неотъемлемой частью нашей Республики. Их платформа теперь встроена в саму основу федеральной китайской политики, и продолжение их умиротворения потребует сочетания патронажных должностей для их старших лидеров, финансирования различных местных программ, которые они предлагают, и поддержки их риторики в масштабах всей страны."
  
 UPC_appease_the_CDL_repeatable_decision: "Умиротворение [UPC_GetCDLPartyName_nosub]"
 UPC_appease_the_CDL_repeatable_decision_desc: "Поскольку основная политическая повестка дня Демократической лиги Китая была исчерпана годами участия в коалиционных правительствах, они стали неотъемлемой частью нашей Республики. Их платформа теперь встроена в саму основу федеральной китайской политики, и продолжение их умиротворения потребует сочетания патронажных должностей для их старших лидеров, финансирования различных местных программ, которые они предлагают, и поддержки их риторики в масштабах всей страны."
  
 UPC_appease_the_GRA_repeatable_decision: "Умиротворение [UPC_GetGRAPartyName_nosub]"
 UPC_appease_the_GRA_repeatable_decision_desc: "Поскольку основная политическая повестка дня Великой республиканской лиги была исчерпана годами участия в коалиционных правительствах, они стали неотъемлемой частью нашей Республики. Их платформа теперь встроена в саму основу федеральной китайской политики, и продолжение их умиротворения потребует сочетания патронажных должностей для их старших лидеров, финансирования различных местных программ, которые они предлагают, и поддержки их риторики в масштабах всей страны."
  
 UPC_appease_the_REP_repeatable_decision: "Умиротворение [UPC_GetREPPartyName]"
