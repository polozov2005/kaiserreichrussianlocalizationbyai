l_russian:
  
 ### World Tension ### 
 war_in_the_desert_threat: "Кризис в Леванте"
  
 ### Events ### 
 levant_crisis_events.1.t: "Конец эпохи"
 levant_crisis_events.1.d: "По мере того как арабские войска продвигаются через Таврские горы в Анатолию, мы должны признать, что золотые дни Блистательной Порты окончательно миновали. Отказываясь покидать свои дома, различные турецкие и курдские иррегулярные организации ведут войну сопротивления на юге Анатолии, но их попытки, скорее всего, будут тщетными. Поэтому султан призвал кабинет министров на свою сторону, чтобы обсудить условия перемирия, а затем и капитуляции.\n\nБеседуя в величественных залах дворца Долмабахче, собравшиеся могут только размышлять о будущем своей некогда огромной империи, в то время как возле Галатской башни звучат сигналы воздушной тревоги, а семьи со слезами на глазах прощаются с сыновьями и отцами, отправляющимися на Анатолийский фронт."
 levant_crisis_events.1.a: "Впереди нас ждут мрачные времена"
  
 levant_crisis_events.2.t: "Антальский мирный договор"
 levant_crisis_events.2.d: "То, что когда-то могло показаться невозможным, наконец-то произошло, поскольку остатки османской армии официально сдались сегодня в 16:15 армиям [EGY.GetLeader]. Однако с этой победой наступает новый этап сомнений и зависти, поскольку богатые земли Машрика теперь будут поделены между различными партнерами по нашему альянсу. Они будут ожидать, что мы выполним свои обещания, и, вероятно, плохо отреагируют на любые попытки помешать их самоопределению."
 levant_crisis_events.2.a: "Поддержать сирийский режим"
 levant_crisis_events.2.b: "Аш-Шам принадлежит Каиру!"
  
 levant_crisis_events.3.t: "Египет принимает капитуляцию Османов"
 levant_crisis_events.3.d: "Взяв на себя переговоры о капитуляции, режим в Каире подписал мир от нашего имени и разделил Османскую империю на части, как Турцию. В соответствии с нашими требованиями, они предоставили нам значительные уступки от Блистательной Порты и надеются поддерживать дружественные отношения в будущем."
 levant_crisis_events.3.a: "Время для залатывания ран"
 levant_crisis_events.3.b: "Мы заслужили больше земель!"
  
 levant_crisis_events.4.t: "Положение Сирии"
 levant_crisis_events.4.d: "Теперь, когда наша победа в Леванте обеспечена, пришло время определить будущее Сирии. В то время как местное население активно поддерживает республиканский режим, установленный на бывших османских землях, многие в Египте считают, что партнерство равных не отвечает их интересам, и вместо этого призывают к установлению марионеточного режима во главе с членом королевской семьи, что вполне подойдет. Лучше всего извлечь как можно больше пользы из новых земель на благо Каира."
 levant_crisis_events.4.a: "Сирия будет нашим партнером"
 levant_crisis_events.4.b: "Сирии не хватает руководства, и мы можем его предоставить!"
 levant_crisis_events.4.c: "Дамаск поведет за собой Арабский Мир! (Играть за Сирию)"
  
 levant_crisis_events.5.t: "Египет предал нас!"
 levant_crisis_events.5.d: "Если бы мы так ясно представляли себе предательство египтян до того, как согласились участвовать в их империалистических планах, мы, возможно, никогда бы не отправили тысячи наших отцов, сыновей и братьев на бессмысленную смерть.Египет не только лишил нас каких-либо существенных преимуществ в войне, но и предпринимает шаги для усиления наших врагов и соперников, предавая то доверие, которое мы им оказали. Это черный день для нашего народа."
 levant_crisis_events.5.a: "Разорвать все связи с Каиром!"
 levant_crisis_events.5.b: "У нас нет другого выбора, кроме как принять это"
  
 levant_crisis_events.6.t: "Наше участие в Новом Порядке"
 levant_crisis_events.6.d: "После решительного разгрома османской империи Египту потребовалось менее месяца, чтобы занять положение верховной власти в арабском мире. Йемен, на протяжении всей истории являвшийся частью своего собственного субрегиона, а не более грандиозного Машрика, никогда не стремился ни к объединению арабских народов, ни к созданию новой наднациональной структуры, которая определяла бы его политику и указы. Таким образом, как население, так и правящий класс активно сопротивляются выходу из Каирского пакта, прежде чем он перестанет быть временным союзом и превратится в федерацию, возглавляемую Каиром."
 levant_crisis_events.6.a: "Йемен стоит отдельно!"
 levant_crisis_events.6.b: "Мы будем вместе с нашими арабскими братьями"
  
 levant_crisis_events.7.t: "Провозглашение независимости Ирака"
 levant_crisis_events.7.d: "Удаленные от основных боевых действий в Леванте части османской шестой армии и иракские видные деятели с тех пор, как власть Османской Империи почти рухнула, планировали быструю и мирную передачу власти новому, иракскому государству. Союз северных суннитов и южных шиитов, главной целью которого является не формирование единого религиозного или этнического государства, а предотвращение иранской агрессии в Леванте и обеспечение того, чтобы арабоязычные земли Месопотамии оставались вне власти Тегерана.\n\nОфициальные лица в Египте поспешили признать новое государство, что, по мнению некоторых наблюдателей, вскоре может привести к войне между двумя региональными державами, заявив, что самоопределение арабских народов отвечает всеобщим интересам и что не персам решать вопросы арабов."
 levant_crisis_events.7.a: "Поздравляем!"
 levant_crisis_events.7.b: "Багдад будет вести арабский мир! (Играть за Ирак)"
  
 levant_crisis_events.9.t: "Наш звездный час"
 levant_crisis_events.9.d: "Момент, которого мы боялись годами, наконец настал. Наши многочисленные враги объединились и предприняли вылазку в попытке освободить Ближний Восток от нашего так называемого гнета. Однако мы не будем прятаться в темную ночь и бросим все, что у нас есть, на захватчиков, чтобы сохранить Дом Османа и империю, которая может просуществовать тысячу лет."
 levant_crisis_events.9.a: "К оружию!"
  
 levant_crisis_events.10.t: "Конец Империи"
 levant_crisis_events.10.d: "В условиях, когда в наших рядах царит хаос, а Ближний Восток захвачен иностранными захватчиками, турецкие националисты сплотились вокруг своего дела и свергли султана. Хотя неясно, что будет дальше с нашей ныне распавшейся империей, можно только предположить, что приятного в этом не будет."
 levant_crisis_events.10.a: "Да здравствует Турция!"
  
 levant_crisis_events.11.t: "Смерть Абасса Второго"
 levant_crisis_events.11.d: "Прошлой ночью в Королевском дворце в Каире были слышны крики, когда великий хедив Аббас II отошел в мир иной. Хедив, чья жизнь была потрясена первым плаванием в мутных водах британской оккупации, радикально изменился, когда во время Вельткрина он был свергнут британскими оккупантами и заменен своим братом.\n\nХотя Египет вскоре после этого восстановил бы свою независимость, в нем не нашлось бы места для бывшего хедива, которого правящие круги считали предателем Османской империи и который был гораздо менее сговорчивым, чем его преемник. Военная мощь османов изменила это положение, поскольку их громкая победа в Левантийской войне вернула изгнанному хедиву его трон.\n\nПосле его смерти трон перешел к его сыну Мухаммеду Абделю I, которого много лет готовили в качестве наследника и который, как мы надеемся, поведет Египет к лучшему будущему."
 levant_crisis_events.11.a: "С Богом!"
  
 levant_crisis_events.12.t: "Мустафа Кемаль принимает Командование"
 levant_crisis_events.12.d: "Хотя наш великий визирь покинул армию, чтобы сделать карьеру в политике, хорошо известно, что паша никогда по-настоящему не покидал армию и всегда поддерживал тесные отношения с вооруженными силами, даже лично руководил операциями в Ираке и Восточной Анатолии. Теперь, когда империя вновь оказалась втянутой в крупномасштабную войну с врагами со всех сторон, визирь заявил в османском парламенте, что он снова займет свое место в армии и поведет нас, как он это сделал во время Великой войны, к окончательной победе.\n\nНикто не сомневается в стратегическом гении этого человека, но некоторые поспешили указать, что это находится в прямом противоречии с османским законом, подписанным самим визирем, который запрещает иметь как политический, так и военный мандат. Кроме того, здоровье нашего визиря, подорванное сильным стрессом и вредными привычками, в последние годы резко ухудшилось, что заставило различных армейских деятелей усомниться в том, что визирь действительно может выносить спартанский образ жизни османской армии."
 levant_crisis_events.12.a: "Веди нас к победе, Гази!"
 levant_crisis_events.12.b: "Военные и политические вопросы должны оставаться раздельными"
  
 levant_crisis_events.13.t: "Формирование Армии обороны Эрец-Исраиля"
 levant_crisis_events.13.d: "Поскольку их поселения подвергаются нападениям, а все будущее сионистского проекта находится под угрозой, различные еврейские группы взяли на себя задачу сформировать армию ополчения и отражать нападения арабов. Находясь в значительном численном и вооруженном превосходстве, когда даже самые несгибаемые сионисты сомневались в своих силах, один из их главных лидеров, Давид Бен-Гурион, обратился к османской армии в Сирии с предложением о сотрудничестве.\n\nХотя османская армия обычно автоматически отказывалась от их предложения о поддержке, опасаясь, что это вызовет большие волнения среди ее мусульманских пехотинцев, постоянно обостряющийся кризис в Сирии заставил османское верховное командование серьезно пересмотреть свою позицию. Помимо сомнений османской империи относительно возможных рисков, связанных с сотрудничеством с сионистами, остается неясным, какой властью на самом деле обладает Бен-Гурион над своими войсками, поскольку экстремистские организации, такие как "Иргун", вряд ли когда-либо пойдут на компромисс с османскими властями."
 levant_crisis_events.13.a: "Одна борьба!"
 levant_crisis_events.13.b: "Мы не нуждаемся в их помощи!"
  
 levant_crisis_events.14.t: "Вопрос о Кипре"
 levant_crisis_events.14.d: "Несмотря на то, что наши армии одерживают победы над арабскими и персидскими ордами, греческий остров Кипр, населенный преимущественно греками, продолжает оставаться в наших глазах разрушенным после того, как они вытеснили османский гарнизон на ранних этапах войны. Поскольку наши армии не в состоянии пробить брешь на своих хорошо защищенных позициях, а успешное морское вторжение с каждым днем становится все более маловероятным, временное правительство Кипра предложило мир. Требуя, чтобы мы признали их независимость, они обещают выработать приемлемые условия для турецкого меньшинства на острове, возможно, предложив обмен населением, который включал бы некоторые из оставшихся греческих общин в Анатолии.\n\nОднако многие в армии с негодованием отнеслись к этому предложению, указывая на то, что, поскольку угроза на Востоке и Юге исчезла, они скоро расправятся с этими беспокойными выскочками. В конце концов, Кипр всегда был и останется турецким островом!"
 levant_crisis_events.14.a: "Давайте разбремся уже с этой помехой..."
 levant_crisis_events.14.b: "Соберите армии, подготовьте корабли и запустите все истребители, Кипр будет нашим через две недели.!"
  
 levant_crisis_events.15.t: "Наши отношения с Каиром"
 levant_crisis_events.15.d: "С падением Османской империи Египет занял новое видное положение, приняв на себя роль лидера арабского мира. Однако это вызвало серьезную обеспокоенность у нашего населения, поскольку многие опасаются, что такое развитие событий изменит наши фундаментальные отношения с каирским режимом с взаимного сотрудничества на отношения подчинения, и что дальнейшее членство в их альянсе поставит под угрозу автономию, ради завоевания которой мы пролили столько крови."
 levant_crisis_events.15.a: "Триполитания пойдет сама по себе!"
 levant_crisis_events.15.b: "Защита Египта необходима для нашего дальнейшего существования."
  
 levant_crisis_events.16.t: "[PER.GetNameDefCap] аннексирует Ирак"
 levant_crisis_events.16.d: "Демонстрируя вопиющую агрессию, наши бывшие "союзники" отказали мирному и добродушному населению Ирака в его праве на самоопределение и вместо этого полностью поглотили его в своей дешевой карикатуре на Древнюю Персидскую империю. Естественно, это привело к тому, что весь Машрик был охвачен протестами и политическими акциями, требующими от его правительств борьбы с шиитскими угнетателями. Молодые люди, часто вооруженные в лучшем случае винтовками своих предков 19-го века, объединяются в движения сопротивления и ополчения, пересекая иракскую границу в темноте ночи, чтобы помочь своим арабским братьям в их самом праведном деле."
 levant_crisis_events.16.a: "Они должныт немедленно покинуть регион!"
 levant_crisis_events.16.b: "Мы предпочитаем не вступать в сражение с персами..."
  
 levant_crisis_events.17.t: "[FROM.GetNameDefCap] требует освобождения Ирака"
 levant_crisis_events.17.d: "Возмущенное нашим, возможно, опрометчивым поступком, их правительство требует немедленного вывода наших войск из иракского региона и предоставления иракскому населению права на самоопределение, как это было согласовано на Третьем арабском конгрессе всего несколькими месяцами ранее."
 levant_crisis_events.17.a: "Если им нужен Ирак, они могут взять его только с боем."
 levant_crisis_events.17.b: "Мы не сможем вести с ними войну"
  
 levant_crisis_events.18.t: "[FROM.GetNameDefCap] отвергают наши требования"
 levant_crisis_events.18.d: "Еретики Востока, по-видимому, отвергли наши требования, заявив, что они имеют полное право оккупировать чужую территорию (указывая на аннексию Судана Египтом) и показали, что они готовы умереть, сражаясь за нее, если потребуется. И все же они предпочли бы мирное урегулирование, при котором они сохранили бы все свои цели, а мы пожертвовали бы своими."
 levant_crisis_events.18.a: "Тогда война."
 levant_crisis_events.18.b: "Оставим этот вопрос."
  
 levant_crisis_events.19.t: "[FROM.GetNameDefCap] отступают из Ирака"
 levant_crisis_events.19.d: "Как и ожидалось, трусливые иранские псы ушли из Ирака, столкнувшись со всей мощью нашего объединенного арабского потенциала. Пусть этот инцидент послужит предупреждением для всех, что арабский мир держится вместе и не позволит ни одной иностранной группировке, будь то турок или перс, решать его судьбу!"
 levant_crisis_events.19.a: "Замечательно!"
 levant_crisis_events.19.b: "(Играть за Ирак)"
  
 levant_crisis_events.20.t.victory: "Победа против [EGY.GetNameDef]"
 levant_crisis_events.20.d.victory: "С самого начала было очевидно, что египетские псы умеют лаять, но не способны кусаться, и, продемонстрировав нашу грозную силу, мы разбили им носы. Их армии разгромлены на поле боя, а наша власть над Ираком никогда не была такой сильной. Сейчас самое время усадить Египет за стол переговоров и раз и навсегда решить судьбу Ирака."
 levant_crisis_events.20.t.defeat: "Снижающиеся военные усилия!"
 levant_crisis_events.20.d.defeat: "Война против Египта началась с обещаний о решающей кампании, в ходе которой армия противника будет полностью уничтожена, политики и генералы заверяли общественность в скорой победе, но теперь все это все чаще оказывается не более чем ложными надеждами. Наши армии были вытеснены из Ирака, в то время как египетские войска с каждым днем приближаются к центру Ирана. Поскольку победа была уже не в наших руках, высшие военные и политические лидеры призвали [PER.GetLeader] провести переговоры об условной капитуляции, чтобы мы могли сохранить то, что у нас осталось."
 levant_crisis_events.20.a: "Требуем, чтобы Египет признал наши достижения."
 levant_crisis_events.20.b: "Нет, мы сокрушим их!"
 levant_crisis_events.20.c: "Мы должны положить конец этой войне."
 levant_crisis_events.20.d: "Мы все еще можем победить!"
  
 levant_crisis_events.21.t: "Мир с [FROM.GetNameDef]?"
 levant_crisis_events.21.d.victory: "Весь арабский мир плачет от радости, когда трусливые иранские подонки теряют свой контроль над Ираком перед нашими объединеннымы силами. Радиопередачи по всему региону наполнены патриотической музыкой и сообщениями о поддержке, в то время как на каждой городской площади от Триполи до Мосула люди празднуют великие победы наших армий."
 levant_crisis_events.21.d.defeat: "Хотя мы хорошо начали, похоже, персы смогли превзойти наши армии на поле боя. Терпя поражение за поражением, у нас теперь нет иного выбора, кроме как отдать Ирак в их лапы. Это поистине черный день для арабского мира."
 levant_crisis_events.21.a: "Мы принимаем их условия."
 levant_crisis_events.21.b: "Нет, мы их раздавим!"
  
 levant_crisis_events.22.t: "[FROM.GetNameDefCap] принимает соглашение"
 levant_crisis_events.22.d.victory: "Скрепя сердцем, египетские дипломаты были вынуждены подписать Багдадский мирный договор и признать наше правление в Ираке законным. В ответ на это по всему Ирану прошли праздничные мероприятия, в то время как в Каире царит мрачное настроение. Маловероятно, что на этом наши проблемы в регионе закончатся, но пока Иран одерживает победу."
 levant_crisis_events.22.d.defeat: "Скрепя сердцем, наши дипломаты были вынуждены подписать унизительный Багдадский договор, признающий независимость Ирака. В ответ на это по всему арабскому миру начались празднования, в то время как в Тегеране царит мрачное настроение. Возможно, пока они празднуют сегодня вечером, Иран отомстит..."
 levant_crisis_events.22.a: "Отлично."
 levant_crisis_events.22.b: "У нас нет выбора."
  
 levant_crisis_events.23.t: "[FROM.GetNameDefCap] отвергают соглашение"
 levant_crisis_events.23.d: "В своем безрассудстве египетские войска отказались принять наши условия и поклялись, что не остановятся, пока не добьются полного уничтожения Персии. Абсурдная идея, наши собственные генералы объявили, что они более чем готовы принять вызов и что в конце этой битвы будет гореть Каир."
 levant_crisis_events.23.a: "Значит, драка не на жизнь, а на смерть."
  
 levant_crisis_events.24.t: "Грузия оккупирует Батум"
 levant_crisis_events.24.d: "Воспользовавшись нашим временным ослаблением, грузинские крысы воспользовались этой возможностью, чтобы скорректировать границы в свою пользу. Важнейшая гавань Батума, крупнейшая к востоку от Трапезунда и главная гавань Западного Кавказа, была атакована грузинскими войсками в результате скоординированного удара, когда их военно-морской флот перекрыл доступ к ней с моря, а пехотные батальоны маршировали по улицам. Несмотря на то, что в городе находился османский гарнизон, который до сих пор не сдался, до сих пор не было произведено ни одной перестрелки, поскольку Блистательная Порта обсуждает, следует ли ей применить силу в ответ или уступить город грузинам."
 levant_crisis_events.24.a: "Похоже, Грузии пора усвоить урок!"
 levant_crisis_events.24.b: "Скоординированный вывод войск был бы в наших наилучших интересах"
  
 levant_crisis_events.25.t: "Османы покидают Батум"
 levant_crisis_events.25.d: "Без единого выстрела нашей армии удалось отвоевать исторически грузинский порт Батум, поскольку османский гарнизон в городе получил приказ Константиние отступить к Ризе. Несмотря на то, что это грандиозная победа Грузии, не все убеждены в правильности решения нанести удар туркам, пока они находятся в тяжелом положении. Указывая на темные тени на Севере, они опасаются, что, если турки переживут это испытание, суверенитет всей Грузии может быть поставлен под угрозу."
 levant_crisis_events.25.a: "Поистине великий день!"
  
 levant_crisis_events.26.t: "Османы остаются в Батуми"
 levant_crisis_events.26.d: "Удивительно, но, несмотря на тяжелые обстоятельства, в которых они находятся в настоящее время, Порта решила прочно закрепиться в Батуме и выдвинула ультиматум нашим войскам: либо они уйдут, либо вступят в войну. Если мы хотим вернуть порт Батум, у нас остается только один выход - официально объявить войну [FROM.GetNameDef], что, однако, скорее всего, вызовет гнев наших союзников."
 levant_crisis_events.26.a: "Что ж,значит война."
 levant_crisis_events.26.b: "Мы должны сдаться и вернуться на свою территорию."
  
 levant_crisis_events.27.t: "Вопрос о мобилизации"
 levant_crisis_events.27.d1: "Нынешняя война угрожает навсегда стереть Османскую Империю с карты мира. Ни один человек, называющий себя мужчиной, не может оставаться дома, когда его родине угрожает опасность. Если они не могут свободно передвигаться, пришло время изменить законы и дать им хоть какую-то мотивацию."
 levant_crisis_events.27.d2: "Наши враги многочисленны, и мы должны быть такими же. К счастью, воинская повинность уже введена по всей империи, что позволяет нам быть хорошо подготовленными к противостоянию на обоих фронтах этой войны. Имея численное превосходство и оснащение, мы легко справимся с выскочками, пытающимися уничтожить Дом Османа."
 levant_crisis_events.27.a: "Султан зовет."
 levant_crisis_events.27.b: "Мы должны быть хорошо подготовлены."
