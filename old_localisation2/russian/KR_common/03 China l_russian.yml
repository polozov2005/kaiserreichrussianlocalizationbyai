 CHN_begin_civil_war_preparation_tt: "§YМы начнем готовиться бросить вызов центральному правительству. Если мы окажемся в состоянии войны с нашим хозяином (либо во время кризиса после объединения, либо из-за неудачной попытки нас интегрировать), мы получим против них бонус атаки. Чем лучше мы подготовлены, тем дольше будет действовать наш первоначальный бонус атаки!§!" #NT!
 CHN_begin_civil_war_preparation_warning_tt: "§R[FROM.GetNameDefCap] власти готовятся бросить вызов нашему правлению. Мы должны быть готовы противостоять им. (Чем более они подготовлены, тем дольше будет действовать их первоначальный бонус атаки!)§!" #NT!
 CHN_add_to_civil_war_preparation_tt: "§GМы расширим подготовку, чтобы бросить вызов центральному правительству. (Чем лучше мы подготовлены, тем дольше будет действовать наш начальный бонус атаки!)§!" #NT!
 CHN_limited_civil_war_challenge_tt: "§RОбстоятельства сценария, с которым мы столкнулись, означают, что мы не сможем бросить вызов центральному правительству без предварительной подготовки нашего народа, исключая любое дальнейшее возмущение, вызванное центральным правительством.§!" #NT!
 CHN_fuel_to_civil_war_warning_tt: "§RЭто рискованное действие с нашей стороны может вызвать скандал и дать региональным игрокам повод бросить вызов нашей власти!§!" #NT!
