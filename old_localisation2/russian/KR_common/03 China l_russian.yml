 china_faction_alignment_name_independent: "§YНезависимые клики§!"
 china_faction_alignment_desc: "Лидер: §Y[?global.china_alignment_leaders^alignment_i.GetName]§!\nКлики, союзные §Y[?global.china_alignment_leaders^alignment_i.GetName]§!:"
 china_no_faction_desc: "Следующие клики являются независимыми. Наведите указатель мыши на флаги, чтобы увидеть их отношение к нам."
 china_alignment_faction_member_name: "§Y[THIS.GetName]§! §Yв коалиции §!\n[ChinaGetMemberAlignment]\n[ChinaGetMemberAlignmentCompatibilityStatus]"
