  #Save 18-21 for a hypothetical American faction 
  
 china_events.422.t: "Государство [FROM.GetName] стремится присоединиться к альянсу [ROOT.GetFactionName]"
 china_events.422.d: "После объединения Китая и провозглашения нашей миссии по освобождению Азии и Тихого океана от империализма мы быстро стали вдохновением для всех, кто надеется сбросить иго иностранного колониализма. Многие из них теперь с гордостью рисуют образцы своих партизан по примеру Мингана, обучают своих солдат духу Вампоа и, конечно же, с готовностью обращаются к нам за помощью и поддержкой. Поэтому неудивительно, что те, кто сверг своих старых хозяев, стремятся объединиться с нами, надеясь защитить себя от дальнейших нападений и, возможно, помочь в освобождении Азии. Тем не менее, стоит проявить должную осмотрительность - хотя мировая революция звучит красиво на бумаге, реалии геополитики и перекрывающиеся националистические претензии не стоит сбрасывать со счетов в эту новую для континента эпоху."
 china_events.422.a: "Конечно, мы будем приветствовать наших китайских братьев!"
 china_events.422.b: "К сожалению, мы вынуждены отклонить их заявку"
  
 china_events.423.t: "Китай присоединяется к альянсу [FROM.GetFactionName]!"
 china_events.423.d: "С объединением Китая и нашей провозглашенной миссией освободить Азию и Тихоокеанский регион от империализма, они быстро стали примером для всех, кто надеется сбросить иго иностранного колониализма. При этом наши собственные успешные усилия по самостоятельному освобождению нашего народа - это само по себе чудо и отличает нас от многих групп в Азии, которые борются за пробуждение национального и классового сознания своих народов. Борцы за свободу Азии нуждаются в надежде и вдохновении, а что может быть лучше, чем не один, а два маяка антиколониализма? Таким образом, мы были приняты в альянс [FROM.GetFactionName], чтобы стремиться к взаимной обороне, процветанию и свободе!"
 china_events.423.a: "Вооружимся ради свободы азиатских народов!"
  
 china_events.424.t: "Наша заявка отклонена"
 china_events.424.d: "Китайцы - древняя цивилизация, и они всегда были надменными. Император за императором, династия за династией, они имеют мало друзей, но ожидают много вассалов. Можно было бы надеяться, что гуманитарный, транснациональный призыв социализма побудит китайцев изменить свои взгляды и протянуть руку помощи в защите своих товарищей, но, похоже, это напрасно. Китайцы отказались подписывать с нами союз, будь то из-за опасений запутаться, националистических притязаний или, возможно, простой реальной политики"
 china_events.424.a: "Похоже, что, несмотря на революцию, китайцам еще предстоит по-настоящему измениться"
  
 china_events.425.t: "Приглашение присоединиться к альянсу [FROM.GetFactionName]"
 china_events.425.d: "Сегодня утром наш посол приветствовал китайскую делегацию из государства [FROM.GetNameDef]. [FROM.GetLeader], победитель недавних гражданских войн в Китае, заявляет, что воссоединенное китайское государство стремится проецировать силу за границу и восстановить историческую роль Китая как доминирующей державы в Восточной Азии. Хорошо это или нет, можно долго обсуждать.\n\nПосол искренне выразил надежду, что мы должны работать вместе с китайским правительством в духе солидарности для взаимной защиты от иностранного империализма. Наши ресурсы будут использоваться совместно, а наши вооруженные силы будут активно участвовать в совместных военных учениях, чтобы укрепить наше сотрудничество.\n\nНесмотря на то, что в нашем правительстве есть те, кто поддерживает такое решение, есть и те, кто с подозрением относится к намерениям Китая и беспокоится, что мы окажемся просто лакеями или марионетками в их новом порядке в Азии."
 china_events.425.a: "Вместе к прочному миру!"
 china_events.425.b: "Нет, мы ничего не выиграем от этого!"
  
 china_events.426.t: "Государство [FROM.GetNameDefCap] присоединяйтесь к нам!"
 china_events.426.d: "Похоже, что наш посол совершил замечательный дипломатический подвиг, поскольку ему удалось убедить государство [FROM.GetNameDef] работать с нами и принять участие в большой международной борьбе и революции против иностранного империализма. Будем надеяться, что эти отношения с государством [FROM.GetNameDef] будут длиться до скончания веков, поскольку мы решительно объявляем войну всем иностранным империалистам - за свободную Азию!"
 china_events.426.a: "Вместе мы сильны!"
  
 china_events.427.t: "[Государство FROM.GetNameDefCap] отклоняет наше приглашение"
 china_events.427.d: "К сожалению, несмотря на все его усилия, похоже, что нашему дипломатическому корпусу не удалось убедить государство [FROM.GetNameDef] принять участие в нашем новом порядке. Похоже, что жители государства [FROM.GetNameDef] либо предполагают худшие из наших намерений, либо просто не воспринимают нашу силу всерьез. Они решили остаться в одиночестве, без нашей защиты и руководства - риск, который они сами на себя навлекли"
 china_events.427.a: "Им же хуже"
  
 china_events.450.t: "Южное противостояние" #NT!
 china_events.450.d: "История и политика Южного Китая переплетаются, особенно после Синьхайской революции 1911 года. Вторая революция 1913 года, Война за национальную защиту 1915 года, Война за конституционную защиту 1917 года, а также подготовка и начало Северной экспедиции привели к тому, что различные провинции объединились друг с другом и предали друг друга в разных моментах.\n\nПосле объединения Чжили в 1928 году на юге остались три крупных региональных блока: клика Лянгуан, правящая Гуандуном и Гуанси, клика Хунань, в которую входили восточные регионы. Гуйчжоу в своей сфере и клику Юньнань, которая использовала западную часть Гуйчжоу в качестве буферной зоны. Все они сотрудничали друг с другом, чтобы сдерживать влияние Чжили, но при этом никогда полностью не доверяли друг другу.\n\nС крахом порядка Чжили все три столпа южного Китая страдают от потрясений, поскольку гоминьдановцы, федералисты и регионалисты борются за контроль над своими провинциями. Как только эти конфликты будут разрешены, вполне возможной станет война за лидерство в южном Китае. Если одна из этих фракций вторгнется в другую, это, скорее всего, привлечет и третью." #NT!
 china_events.450.a: "Будем надеяться, что нам удастся решить все мирным путем..." #NT!
 china_events.450_tt: "§RЕсли между нами и одним из наших независимых соседей начнется война, третий (если он независим) может вмешаться на одной из наших сторон или на обеих.§!" #NT!
  
 CHN_south_china_war_get_GXC_alignment_compatible_key: "[GXC.GetRulingParty] и [ROOT.GetRulingParty] считаются совместимыми, поскольку имеют много общих значений, даже если в прошлом они уже конфликтовали. [GXC.GetLeader] нельзя доверять безоговорочно, но с ним можно договориться. В любом случае, богатство Гуандуна и армии Гуанси делают его лидером, с которым нам лучше дружить, чем враги." #NT!
 CHN_south_china_war_get_GXC_alignment_incompatible_key: "[GXC.GetRulingParty] успешно перехитрили наших союзников в Лянгуане и захватили власть. Наши идеологии просто несовместимы, а наши различия непримиримы. Богатство Гуандуна огромно, а армии Гуанси сильны, но [GXC.GetLeader] нельзя доверять, и если мы хотим закрепиться на юге, мы должны освободить Гуанчжоу для нашего дела." #NT!
  
 CHN_south_china_war_get_HNN_alignment_compatible_key: "[HNN.GetLeader] и [ROOT.GetLeader], возможно, не всегда сходятся во взглядах, но доверие мимолетно в такое коварное время. Угрозы изобилуют со всех сторон, и союз между [HNN.Capital.GetCapitalVictoryPointName] и [ROOT.Capital.GetCapitalVictoryPointName] может быть единственным способом установить прочный мир на юге." #NT!
 CHN_south_china_war_get_HNN_alignment_incompatible_key: "[HNN.GetLeader] — коварный лидер [HNN.GetNameDef], который представляет для нас значительную угрозу со своей базы в [HNN.Capital.GetCapitalVictoryPointName]. Союз с ним невозможен при данных обстоятельствах. Противостояние ему может быть единственным способом установить прочный мир на юге." #NT!
  
 CHN_south_china_war_get_YUN_alignment_compatible_key: "[YUN.GetNameDefCap] правит [YUN.GetLeader], амбициозный военачальник, но с которым мы достаточно дружны. Управляя сильно милитаризованными Юньнанью и Западным Гуйчжоу, он командует могучей и закаленной армией. Возможно, было бы разумно сотрудничать (по крайней мере, на данный момент) с [YUN.Capital.GetCapitalVictoryPointName] ради взаимного выживания." #NT!
 CHN_south_china_war_get_YUN_alignment_incompatible_key: "[YUN.GetNameDefCap] правит [YUN.GetLeader], амбициозный военачальник, враждебно настроенный по отношению к нам. Управляя сильно милитаризованными Юньнанью и Западным Гуйчжоу, он командует могучей и закаленной армией. Его необходимо уничтожить (сейчас или позже) и [YUN.Capital.GetCapitalVictoryPointName] освободить, если мы хотим выжить." #NT!
  
 CHN_south_china_war_closing: "Наконец, всегда есть возможность сохранять нейтралитет, просто переждать конфликт и посмотреть, что произойдет дальше. Возможно, если мы будем чувствовать себя уверенно, мы сможем устранить ослабленного «победителя». Но время истекает, прежде чем одна из великих северных держав начнет двигаться на юг, и, возможно, лучший вариант действий — перехватить инициативу в свои руки?" #NT!
  
 CHN_penalty_for_greater_alignment_tt: "§RБудет применено дополнительное наказание, поскольку мы идеологически совместимы.§!" #NT!
  
 china_events.451.t: "Война за Юг?" #NT!
 china_events.451.d: "Между провинцией Хунань и Юньнань вспыхнула война, впервые за более чем десятилетие столкнувшая двух далеких соседей с прямым противостоянием. Отношения между двумя провинциями испортились отчасти из-за конкурирующих сфер влияния в Гуйчжоу, который расположен между двумя провинциями. Похоже, что силы, находящиеся в двух кликах военачальников, просто не могут сосуществовать.\n\n[CHN_south_china_war_get_HNN_alignment]\n\n[CHN_south_china_war_get_YUN_alignment]\n\n$CHN_south_china_war_closing$" #NT!
 china_events.451.a: "Мы объявим войну Хунани." #NT!
 china_events.451.b: "Мы объявим войну Юньнани." #NT!
 china_events.451.c: "Мы объявим войну обоим." #NT!
 china_events.451.e: "Мы заявим о своем нейтралитете в этом конфликте." #NT!
  
 china_events.452.t: "Война за Юг?" #NT!
 china_events.452.d: "Война разразилась между Юньнанью и Лянгуаном («Двумя Гуанами» Гуандуна и Гуанси), тремя из наиболее выдающихся провинций южного Китая в политике. Это лишь последний поворот в их отношениях после Синьхая, поскольку две фракции неоднократно объединялись друг с другом, чтобы противостоять влиянию Севера, но боролись за политическое доминирование. Похоже, что политические разногласия будут продолжать разделять их.\n\n[CHN_south_china_war_get_GXC_alignment]\n\n[CHN_south_china_war_get_YUN_alignment]\n\n$CHN_south_china_war_closing$" #NT!
 china_events.452.a: "Мы объявим войну Лянгуану." #NT!
 china_events.452.b: "Мы объявим войну Юньнани." #NT!
 china_events.452.c: "Мы объявим войну обоим." #NT!
 china_events.452.e: "Мы заявим о своем нейтралитете в этом конфликте." #NT!
  
 china_events.453.t: "Война за Юг?" #NT!
 china_events.453.d: "Война вспыхнула между Хунанью и Лянгуаном («Двумя Гуанами» Гуандуна и Гуанси), что снова поставило их на путь столкновения в пост-Синьхайскую эпоху. Хунань часто оказывалась зажатой между сферами Пекина и Гуанчжоу, и хотя некоторые фракции внутри провинции Хунань стремились к дружеским отношениям с вращающейся дверью правящих фракций в Лянгуане, кажется, что мира просто не может быть.\n\n[CHN_south_china_war_get_GXC_alignment]\n\n[CHN_south_china_war_get_YUN_alignment]\n\n$CHN_south_china_war_closing$" #NT!
 china_events.453.a: "Мы объявим войну Лянгуану." #NT!
 china_events.453.b: "Мы объявим войну Хунани." #NT!
 china_events.453.c: "Мы объявим войну обоим." #NT!
 china_events.453.e: "Мы заявим о своем нейтралитете в этом конфликте." #NT!
  
 china_events.460.t: "Южно-Китайская война" #NT!
 china_events.460.d: "Южный Китай превратился в зону свободы для всех после того, как [FROM.GetLeader] принял смелое решение вмешаться в качестве третьей стороны в существующий конфликт между своими соседями. Это добавляет еще одну морщину к и без того сложной политике региона, поскольку силы из Лянгуана, Хунани и Юньнани независимо борются за власть над всем регионом.\n\nВ предательстве и насилии нет ничего нового на юге, который претерпел огромные потрясения как в эпоху верховных военачальников, так и сейчас, во время краха после Чжили. Но увидит ли в этой войне хотя бы один победитель из их числа или же она просто ослабит их всех, прежде чем их победит внешняя сила, это другой вопрос." #NT!
 china_events.460.a: "Мы выйдем победителями." #NT!
 china_events.460.b: "Южный Китай погружается в анархию." #NT!
  
 china_events.461.t: "Южно-Китайская война" #NT!
 china_events.461.d: "Лянгуан находится в затруднительном положении после того, как конфликт с одним из его соседей привел к тому, что Юньнань и Хунань объединились, чтобы уничтожить их. Вероятно, самое сильное из трех южных военачальников, тем не менее, ожидается, что это будет трудный кризис для [GXC.GetLeader].\n\nПредательство и насилие не являются чем-то новым на юге, который претерпел огромные потрясения как во время Эры Верховных военачальников, так и сейчас, во время краха после Чжили. Но приведет ли эта война к формированию прочного единого фронта между ними или же она просто ослабит их всех, прежде чем их победит внешняя сила, это другой вопрос." #NT!
 china_events.461.a: "Мы выйдем победителями." #NT!
 china_events.461.b: "Южный Китай погружается в анархию." #NT!
  
 china_events.462.t: "Южно-Китайская война" #NT!
 china_events.462.d: "Хунань находится в затруднительном положении после того, как конфликт с одним из ее соседей привел к тому, что Лянгуан и Юньнань объединились, чтобы уничтожить их. Традиционно полагаясь на Чжилийскую защиту, кажется, что, по крайней мере, на данный момент [HNN.GetLeader] будет вынужден сражаться в этом конфликте без каких-либо союзников, кроме военачальников Гуйчжоу, которых они поддерживали на западе.\n\nПредательство и насилие не являются чем-то новым на юге, который претерпел огромные потрясения как во время Эры Верховных Полководцев, так и теперь, во время краха после Чжили. Но приведет ли эта война к формированию прочного единого фронта между ними или же она просто ослабит их всех, прежде чем их победит внешняя сила, это другой вопрос." #NT!
 china_events.462.a: "Мы выйдем победителями." #NT!
 china_events.462.b: "Южный Китай погружается в анархию." #NT!
  
 china_events.463.t: "Южно-Китайская война" #NT!
 china_events.463.d: "Юньнань находится в затруднительном положении после того, как конфликт с одним из его соседей привел к тому, что Лянгуан и Хунань объединились, чтобы уничтожить их. Могучему и сильно милитаризованному юго-западному военачальнику, [YUN.GetLeader] и его союзникам, тем не менее, будет трудно вести этот конфликт, поскольку у него нет союзников, кроме поддерживаемого Юньнань правительства в Гуйчжоу.\n\nПредательство и насилие не являются чем-то новым на юге, который претерпел огромные потрясения как во время эпохи верховных военачальников, так и теперь, во время краха после Чжили. Но приведет ли эта война к формированию прочного единого фронта между ними или же она просто ослабит их всех, прежде чем их победит внешняя сила, это другой вопрос." #NT!
 china_events.463.a: "Мы выйдем победителями." #NT!
 china_events.463.b: "Южный Китай погружается в анархию." #NT!
  
 ### Foreign Policy Events 
  
 #KMT Foreign Policy Events (000-199): 
 CHN.foreignpolicy.001.t: "Подъёмы [FROM.GetFactionName]" #NT!
 CHN.foreignpolicy.001.d.sinopacific_friendship_association: "Сегодня Министерство иностранных дел [FROM.GetName] объявило о новом направлении внешней политики Китая. Ссылаясь на успех и антиимпериализм Китайской национальной революции, [FROM.GetName] официально заявило о своем намерении работать с новыми независимыми странами Азии в рамках Ассоциации китайско-тихоокеанской дружбы.\n\nПланируемое направление ассоциации - работать с другими развивающимися и социалистическими странами в Азии и Африке, чтобы способствовать экономическому развитию и национальной самодостаточности в формирующемся новом мировом порядке, где страны сейчас стремятся дистанцироваться как от Рейхспакта, так и от Третьего Интернационала." #NT!
 CHN.foreignpolicy.001.d.internationale_of_the_east_standard: "Сегодня Министерство иностранных дел [FROM.GetName] объявило о новом направлении внешней политики Китая. Ссылаясь на успех и антиимпериализм Китайской национальной революции, [FROM.GetName] официально заявило о создании своего собственного «Интернационала» в Азии.\n\nЗапланированные цели и направления этого Интернационала заключаются в предоставлении экономической и политической помощи всем азиатским странам, независимо от идеологии и религии, чтобы азиатские страны могли принять участие в зарождающемся новом мировом порядке, в котором недавно освобожденные страны могут, наконец, бросить вызов гегемонии Антанты и Рейхспакта." #NT!
 CHN.foreignpolicy.001.d.internationale_of_the_east_and_minshengpartnership: "Сегодня Министерство иностранных дел [FROM.GetName] объявило о новом направлении внешней политики Китая. Ссылаясь на успех и антиимпериализм Китайской национальной революции, [FROM.GetName] официально объявил о создании своего собственного «Интернационала» в Азии.\n\nКроме того, председатель [FROM.GetLeader] также объявил о создании «Народного Кооперативного Экономического Партнерства Миншэн» для содействия экономическому сотрудничеству между странами Азии, а также продвижения Трех Народных Принципов. Создается впечатление, что азиатские страны принимают участие в зарождающемся новом мировом порядке, бросая решительный вызов гегемонии Запада." #NT!
 CHN.foreignpolicy.001.d.asian_peoples_antiimperialism_league: "Сегодня Министерство иностранных дел [FROM.GetName] объявило, что китайское правительство намерено проводить жесткую линию в международных делах, формально создавая Антиимпериалистическую лигу азиатских народов, чтобы укрепить себя и своих сателлитов против иностранного империализма.\n\nХотя провозглашается необходимость поддерживать принцип неделимой безопасности между ее членами, на практике это является расширением так называемой концепции «Синосферы», как выразился генералиссимус. [FROM.GetLeader] и Гоминьдан заявили, что они стремятся следовать этно- и ультранационалистическому направлению в отношении своего положения в мире. Многие задаются вопросом, означает ли это, что Китай будет насильственно охранять свои границы или теперь они повернутся к изоляции." #NT!
 CHN.foreignpolicy.001.d.asian_peoples_internationale: "Сегодня Министерство иностранных дел [FROM.GetName] объявило о новом направлении внешней политики Китая. Ссылаясь на успех и антиимпериализм Китайской национальной революции, [FROM.GetName] официально объявил о создании «Азиатского народного интернационала» для содействия паназиатскому сотрудничеству постколониальных государств.\n\n[FROM.GetLeader] выдвинул теорию, что мир является полем битвы между империализмом и контримпериализмом, и что как капиталистические державы, так и Третий Интернационал в конечном итоге рухнут. Он и другие националисты заявляют, что, в отличие от Японии, они будут продвигать взаимопомощь и помощь в целях развития, а не подчинение континента, поскольку они надеются достичь глобального «Датуна»." #NT!
 CHN.foreignpolicy.001.d.new_asia_alliance: "Сегодня Министерство иностранных дел [FROM.GetName] объявило о новом направлении внешней политики Китая. Ссылаясь на успех и антиимпериализм Китайской национальной революции, [FROM.GetName] официально объявил о создании «Нового Азиатского Альянса» для продвижения мирной деколонизации и сотрудничества в Азии.\n\n[FROM.GetLeader] и другие умеренные националистические лидеры уже давно ведут диалог с другими антиколониальными силами на континенте, надеясь на солидарность и культурный обмен между азиатскими народами, отвергая при этом социалистический интернационализм. Этот новый альянс, названный в честь Общества Новой Азии, стремится поставить новые государства в равные условия, но на практике в нем будет доминировать Китай." #NT!
 CHN.foreignpolicy.001.a: "Угроза на Востоке!" #NT!
 CHN.foreignpolicy.001.b: "Сила освобождения?" #NT!
 CHN.foreignpolicy.001.c: "Китай демонстрирует мускулы." #NT!
  
 CHN.foreignpolicy.002.t: "Приглашение присоединиться [FROM.GetFactionName]" #NT!
 CHN.foreignpolicy.002.d: "Сегодня утром наш посол приветствовал китайскую делегацию из [FROM.GetNameDef]. Китайский посол искренне выразил надежду, что мы должны работать вместе с китайским правительством в знак солидарности с международной антиколониальной революцией против иностранного империализма. Наши ресурсы будут разделены, и наши вооруженные силы будут активно работать вместе в совместных военных учениях, чтобы укрепить наше паназиатское сотрудничество.\n\nХотя в нашем правительстве наверняка есть те, кто поддерживает такое решение, есть и другие, кто с подозрением относится к намерениям Китая и беспокоится, что мы просто окажемся лакеями или марионетками в их новом порядке в Азии." #NT!
 CHN.foreignpolicy.002.a: "Вместе за паназиатство!" #NT!
 CHN.foreignpolicy.002.b: "Нет, нам от этого ничего не будет!" #NT!
  
 CHN.foreignpolicy.003.t: "[FROM.GetNameDefCap] Присоединяйтесь к нам!" #NT!
 CHN.foreignpolicy.003.d: "Похоже, что наше министерство иностранных дел в очередной раз совершило выдающийся подвиг дипломатического успеха, поскольку ему удалось убедить [FROM.GetNameDef] работать с нами и участвовать в более масштабной международной борьбе и революции против иностранного империализма. Будем надеяться, что эти отношения с [FROM.GetNameDef] продлятся до конца времен, поскольку мы решительно объявляем войну всем иностранным империалистам - за свободную Азию!" #NT!
 CHN.foreignpolicy.003.a: "Вместе мы сила!" #NT!
  
 CHN.foreignpolicy.004.t: "[FROM.GetNameDefCap] отклоняет наше приглашение" #NT!
 CHN.foreignpolicy.004.d: "К сожалению, несмотря на все его усилия, похоже, что нашему послу не удалось убедить [FROM.GetNameDef] принять участие в нашей общей антиимпериалистической борьбе. Похоже, жители [FROM.GetNameDef] либо предположили худшие из наших намерений, либо просто не воспринимают нашу силу всерьез. Они решили остаться в одиночестве, без нашей защиты и руководства, и это риск, который они навлекли на себя." #NT!
 CHN.foreignpolicy.004.a: "Их потеря." #NT!
  
 CHN.foreignpolicy.005.t: "Афро-Азиатская конференция" #NT!
 CHN.foreignpolicy.005.nomafcollapse.d: "Старый мировой порядок Кайзеррейха был брошен вызов после краха капиталистической глобальной экономики после «Черного понедельника». В Азии экономический коллапс [GER.GetNameDef] вызвал волну восстания в Индокитае в 1936 году, а также распад Лиги восьми провинций. Недавнее завершение Северной экспедиции, а также Войны Сопротивления укрепило позиции [CHI.GetNameDef] как первой нации в Азии, успешно победившей силы империализма.\n\nВ результате [CHI.GetLeader] и Министерство иностранных дел Гоминьдана решили организовать Афро-Азиатскую конференцию лидеров и послов развивающегося мира, чтобы собраться и обсудить новые растущие политические сдвиги. Хотя африканские страны еще не добились независимости от немцев, китайцы более чем рады приветствовать африканских революционеров в качестве революционных товарищей в великой международной войне против империализма.\n\nДелегаты конференции решили ратифицировать и признать ключевые принципы управления постколониальным афро-азиатским миром, которые включают установление доброй воли со всеми участниками конференции, изучение социальных и культурных проблем, а также повышение международной видимости развивающегося мира для международного сообщества. Новая эра наступает в Азии, и китайская нация под [CHI.GetLeader] более чем счастлива играть активную роль в продвижении общего будущего для развивающегося мира." #NT!
 CHN.foreignpolicy.005.mafcollapse.d: "Старый мировой порядок Кайзеррейха был брошен вызов после краха капиталистической глобальной экономики после «Черного понедельника». В Азии экономический коллапс [GER.GetNameDef] вызвал волну восстания в Индокитае в 1936 году, а также распад Лиги восьми провинций. Недавнее завершение Северной экспедиции, а также Войны Сопротивления укрепило позиции [CHI.GetNameDef] как первой нации в Азии, успешно победившей силы империализма.\n\nВ результате [CHI.GetLeader] и Министерство иностранных дел Гоминьдана решили организовать Афро-Азиатскую конференцию лидеров и послов развивающегося мира, чтобы собраться и обсудить новые растущие политические сдвиги. Драматический крах и раскол немецкой Миттелафрики привели к росту африканского национализма, и китайцы более чем счастливы приветствовать новые африканские государства в качестве революционных товарищей в великой международной войне против империализма.\n\nДелегаты конференции решили ратифицировать и признать ключевые принципы управления постколониальным афро-азиатским миром, которые включают установление доброй воли со всеми участниками конференции, изучение социальных и культурных проблем, а также повышение международной видимости развивающегося мира. международное сообщество. Новая эра наступает в Азии, и китайская нация под [CHI.GetLeader] более чем счастлива играть активную роль в продвижении общего будущего для развивающегося мира." #NT!
 CHN.foreignpolicy.005.a: "Привет Новой Эре!" #NT!
 CHN.foreignpolicy.005.b: "Похвальная инициатива!" #NT!
 CHN.foreignpolicy.005.c: "У нас есть свои планы." #NT!
  
 CHN.foreignpolicy.0050.t: "Саммит в Гуанчжоу" #NT!
 CHN.foreignpolicy.0050.nomafcollapse.d: "Старый мировой порядок Кайзеррейха был брошен вызов после краха капиталистической глобальной экономики после «Черного понедельника». В Азии экономический коллапс [GER.GetNameDef] вызвал волну восстания в Индокитае в 1936 году, а также распад Лиги восьми провинций. Недавняя победа в гражданской войне в Китае укрепила статус [GXC.GetNameDef] как первой нации в Азии, успешно победившей силы империализма.\n\nВ результате [GXC.GetLeader] и Министерство иностранных дел Китая решили организовать в Гуанчжоу саммит лидеров и послов развивающихся стран, чтобы собраться и обсудить новые растущие политические сдвиги. Хотя африканские страны еще не добились независимости от немцев, китайцы более чем счастливы приветствовать африканских революционеров в качестве революционных товарищей в великой международной войне против империализма.\n\nДелегаты конференции решили ратифицировать и признать ключевые принципы управления постколониальной международной мировой революцией, основанной на крестьянстве. Конференция включает в себя установление доброй воли со всеми участниками конференции, изучение социальных и культурных проблем, а также повышение международной видимости развивающегося мира для международного сообщества. Новая эра наступает в Азии, и китайская нация под [GXC.GetLeader] более чем счастлива играть активную роль в продвижении общего будущего для развивающегося мира." #NT!
 CHN.foreignpolicy.0050.mafcollapse.d: "Старый мировой порядок Кайзеррейха был брошен вызов после краха капиталистической глобальной экономики после «Черного понедельника». В Азии экономический коллапс [GER.GetNameDef] вызвал волну восстания в Индокитае в 1936 году, а также распад Лиги восьми провинций. Недавняя победа в гражданской войне в Китае укрепила статус [GXC.GetNameDef] как первой нации в Азии, успешно победившей силы империализма.\n\nВ результате [GXC.GetLeader] и Министерство иностранных дел Китая решили организовать в Гуанчжоу саммит лидеров и послов развивающихся стран, чтобы собраться и обсудить новые растущие политические сдвиги. Драматический крах и раскол немецкой Миттелафрики привели к росту африканского национализма, и китайцы более чем счастливы приветствовать новые африканские государства в качестве революционных товарищей в великой международной войне против империализма.\n\nДелегаты конференции решили ратифицировать и признать ключевые принципы управления постколониальной международной мировой революцией, основанной на крестьянстве. Конференция включает в себя установление доброй воли со всеми участниками конференции, изучение социальных и культурных проблем, а также повышение международной видимости развивающегося мира для международного сообщества. Новая эра наступает в Азии, и китайская нация под [GXC.GetLeader] более чем счастлива играть активную роль в продвижении общего будущего для развивающегося мира." #NT!
 CHN.foreignpolicy.0050.a: "Привет Новой Эре!" #NT!
 CHN.foreignpolicy.0050.b: "Похвальная инициатива!" #NT!
 CHN.foreignpolicy.0050.c: "У нас есть свои планы." #NT!
  
 CHN.foreignpolicy.006.t: "[FROM.GetNameDefCap] Предлагает инвестиции" #NT!
 CHN.foreignpolicy.006.d: "Сегодня утром мы получили новости от посла [FROM.GetNameDef] о том, что их страна стремится инвестировать в нашу новую молодую нацию. Мы совсем недавно завоевали и обеспечили свою независимость, однако наша промышленная и капитальная база недостаточна по сравнению с остальными индустриальными странами мира. [FROM.GetNameDefCap] предложил инвестировать в нашу страну, чтобы мы могли ускорить процесс индустриализации и как средство сопротивления капиталистическим тенденциям имперских стран. Однако в нашем правительстве есть люди, которые выступают против таких мер, поскольку это может создать нежелательное влияние [FROM.GetNameDef] и вполне может быть просто средством их страны, пытающейся воспользоваться нашей молодой нацией." #NT!
 CHN.foreignpolicy.006.a: "Мы любезно принимаем." #NT!
 CHN.foreignpolicy.006.b: "Мы вежливо отказываемся." #NT!
  
 CHN.foreignpolicy.007.t: "[FROM.GetNameDefCap] Принимает инвестиции" #NT!
 CHN.foreignpolicy.007.d: "Мы получили отличные новости от нашего посла в [FROM.GetNameDef] о том, что их страна приняла наши инвестиционные возможности. Вместе мы сможем нарастить экономическую мощь и помочь им превратиться в новую растущую державу, одновременно помогая нашим усилиям в области промышленности и восстановления. Пусть это станет началом долгой и плодотворной дружбы на долгие годы!." #NT!
 CHN.foreignpolicy.007.a: "Начало плодотворного сотрудничества." #NT!
  
 CHN.foreignpolicy.008.t: "[FROM.GetNameDefCap] Отказывается от инвестиций" #NT!
 CHN.foreignpolicy.008.d: "Мы получили неутешительные новости от нашего посла в [FROM.GetNameDef] о том, что они не желают принимать нашу инвестиционную возможность и отклонили наше любезное предложение. Возможно, они рассматривают нашу благодарность как внешнюю угрозу или просто не верят, что мы ищем взаимовыгодные отношения для обеих наших стран. Каковы бы ни были их причины, но это их потеря, что они отклонили наше щедрое предложение." #NT!
 CHN.foreignpolicy.008.a: "В любом случае, мы желаем им удачи. Им это понадобится." #NT!
  
  #Joining the INT has been moved to generic China decisions category 
  
 CHN.foreignpolicy.009.t: "Нас приглашают присоединиться к MCEP" #NT!
 CHN.foreignpolicy.009.d: "После объявления нового направления во внешней политике и международной торговле [FROM.GetNameDef] объявило о создании «Кооперативного экономического партнерства Миншэн». Посвященный борьбе с репрессивными режимами капитализма, а также предоставляющий молодым азиатским странам адекватные средства для модернизации в странах без достаточной индустриализации, MCEP стремится объединить народы Азии в экономическое сотрудничество под руководством китайской нации. Хотя в нашем правительстве многие поддерживают эту инициативу и считают, что это принесет огромную пользу нашей экономике, есть и те, кто рассматривает это так называемое сотрудничество как акт империализма со стороны Китая; поскольку, в конце концов, оно организовано и сосредоточено вокруг китайского руководства." #NT!
 CHN.foreignpolicy.009.a: "Тост за наших китайских товарищей!" #NT!
 CHN.foreignpolicy.009.b: "Как насчет, нет." #NT!
  
 CHN.foreignpolicy.010.t: "[FROM.GetNameDefCap] присоединяется к MCEP" #NT!
 CHN.foreignpolicy.010.d: "Мы получили известие от посла [FROM.GetNameDef] о том, что их страна рада объявить о своем решении присоединиться к Кооперативному экономическому партнерству Миншэн. Мы аплодируем им за их мудрое решение и надеемся работать рука об руку с нашими товарищами в создании антиимпериалистической системы." #NT!
 CHN.foreignpolicy.010.a: "Да здравствует антиимпериализм!" #NT!
  
 CHN.foreignpolicy.011.t: "[FROM.GetNameDefCap] отказывается от членства в MCEP" #NT!
 CHN.foreignpolicy.011.d: "Мы получили известие от посла [FROM.GetNameDef] о том, что их страна не желает присоединяться к Кооперативному экономическому партнерству Миншэн. Возможно, полагая, что у нас есть другие гнусные идеи относительно нашего общего сотрудничества или что мы не будем распределять ресурсы равномерно, они отказались участвовать в более масштабной антиколониальной борьбе. Конечно, неприятно это слышать, но они пожалеют об этом решении, поскольку станут жертвами капитализма и империализма. Только благодаря паназиатскому сотрудничеству угнетенные народы смогут работать вместе." #NT!
 CHN.foreignpolicy.011.a: "Позор." #NT!
  
 #UPC Foreign Policy Events (200-399): 
 CHN.foreignpolicy.200.t: "[FROM.GetFactionName] Формы" #NT!
 CHN.foreignpolicy.200.d.league_of_free_asian_states: "После многих лет гражданской войны Китай воссоединился под руководством [FROM.GetLeader], и вскоре Китай вернулся на мировую арену. Отражая усилия Китая снова стать великой державой и восстановить свою сферу влияния, министерство иностранных дел Китая объявило о создании Лиги свободных азиатских государств.\n\nОсновываясь на растущей силе за десятилетие гегемонии Чжили, Инициатива Лиги надеется предоставить альтернативу деколонизации азиатских государств японскому и европейскому империализму. Этот амбициозный проект также отражает амбиции Бэйяна по восстановлению традиционного азиатского политического порядка, вращающегося вокруг Китая." #NT!
 CHN.foreignpolicy.200.d.wuxing_protocol: "После многих лет гражданской войны Китай воссоединился под руководством [FROM.GetLeader], и вскоре Китай вернулся на мировую арену. Отражая усилия Китая снова стать великой державой и восстановить свою сферу влияния, министерство иностранных дел Китая объявило о заключении Усинского протокола.\n\nНазванный в честь древней фразы «Пять звезд, восходящих на Востоке, являются благоприятным знаком для Поднебесной», он отражает надежды нового китайского руководства на восстановление традиционного азиатского политического порядка, вращающегося вокруг Китая. Это также отражает их дистанцирование от своих традиционных союзников в Японии, поскольку Китай прокладывает независимый курс." #NT!
 CHN.foreignpolicy.200.d.SHX_yan_faction: "После многих лет гражданской войны Китай воссоединился под руководством [FROM.GetLeader], и вскоре Китай вернулся на мировую арену. Отражая усилия Китая снова стать великой державой и восстановить свою сферу влияния, министерство иностранных дел Китая объявило о создании Азиатско-Тихоокеанского движения неприсоединения.\n\nЭти усилия воплощают в себе амбиции президента Китая Яна Сишань по созданию нового азиатского политического порядка вокруг Китая и некоторые из его утопических размышлений о создании нового мира. В более практическом плане это также укрепляет статус Китая как восходящей державы и предлагает новым постколониальным азиатским государствам потенциальную альтернативу втягиванию в европейские войны." #NT!
 CHN.foreignpolicy.200.d.SHX_feng_faction: "После многих лет гражданской войны Китай воссоединился под руководством [FROM.GetLeader], и вскоре Китай вернулся на мировую арену. Отражая усилия Китая снова стать великой державой и восстановить свою сферу влияния, министерство иностранных дел Китая объявило о создании Фронта национального освобождения.\n\nВо главе которого стоит президент Китая Фэн Юйсян, он отражает заявленное желание его движения помочь освободить другие азиатские народы от западного и японского империализма. Но Фэн также известен своим прагматизмом, и еще неизвестно, будет ли это на практике оборонительный или наступательный союз." #NT!
 CHN.foreignpolicy.200.d.asian_federation: "После многих лет гражданской войны Китай воссоединился под руководством [FROM.GetLeader], и вскоре Китай вернулся на мировую арену. Отражая усилия Китая снова стать великой державой и восстановить свою сферу влияния, министерство иностранных дел Китая объявило о создании Азиатской федерации.\n\nЭта федерация отражает утопизм китайских интеллектуалов после Великой войны. Они стремились перестроить Азию в единую, гармоничную постколониальную цивилизацию, которая могла бы послужить краеугольным камнем мировой организации, состоящей из отдельных континентальных федераций, основанной на равенстве, демилитаризации и мирном сосуществовании." #NT!
 CHN.foreignpolicy.200.d.asia_pacific_treaty_organisation: "После многих лет гражданской войны Китай воссоединился под руководством [FROM.GetLeader], и вскоре Китай вернулся на мировую арену. Отражая усилия Китая снова стать великой державой и восстановить свою сферу влияния, министерство иностранных дел Китая объявило о создании Организации Азиатско-Тихоокеанского договора.\n\nПостроенный на основе международного сотрудничества, демократии и антиимпериализма, заявленная цель этого альянса состоит в том, чтобы создать суперфедерацию в Азии, которая могла бы обеспечивать соблюдение конституционного политического порядка и вмешиваться по мере необходимости для защиты молодых постколониальных демократий в регионе." #NT!
 CHN.foreignpolicy.200.d.asia_pacific_security_pact: "После многих лет гражданской войны Китай воссоединился под руководством [FROM.GetLeader], и вскоре Китай вернулся на мировую арену. Отражая усилия Китая снова стать великой державой и восстановить свою сферу влияния, министерство иностранных дел Китая объявило о заключении Пакта об Азиатско-Тихоокеанской безопасности.\n\nСозданный как расширение китайской военной мощи, он надеется предоставить альтернативу деколонизации азиатских государств японскому и европейскому империализму. В условиях вакуума власти, возникшего после Второй китайско-японской войны, и прогнозов об отступлении Европы из региона, Китай надеется найти свое место в грядущем мире." #NT!
 CHN.foreignpolicy.200.a: "Восточная опасность!" #NT!
 CHN.foreignpolicy.200.b: "Дракон ревет!" #NT!
 CHN.foreignpolicy.200.c: "На Востоке поднимается новая власть." #NT!
  
 CHN.foreignpolicy.201.t: "Восточноазиатское сообщество" #NT!
 CHN.foreignpolicy.201.d: "На протяжении тысячелетий корабли и караваны со всего мира путешествовали в Китай и обратно для торговли. Империи росли и падали благодаря своей способности контролировать эти ценные торговые пути, а Китай гордился тем, что находится в центре мира. Но в своем высокомерии императорский двор начал замыкаться в себе, начав столетия застоя и, в конечном итоге, упадка. Разрушительные потери иностранных империалистов, а затем и гражданская война стали жестоким звонком для пробуждения, напоминанием о том, что мир движется дальше.\n\nПо мере того, как Китай пробуждается от сна, под [CHN.GetLeader], он стремится вернуть себе место великой державы и восстановить не только свою военную гегемонию, но и свое прежнее экономическое доминирование. Восточноазиатское сообщество является первым крупным международным экономическим проектом недавно воссоединившегося Китая, который надеется построить торговый блок, который может послужить альтернативой блоку Европы и Японии. В основном это расширение их существующей сферы, но, тем не менее, оно привлекло интерес со стороны других молодых постколониальных стран." #NT!
 CHN.foreignpolicy.201.a: "Мы сближаем континент!" #NT!
 CHN.foreignpolicy.201.b: "Китай стремится восстановить свою торговую империю." #NT!
  
 CHN.foreignpolicy.202.t: "[FROM.GetNameDefCap] Предлагает инвестиции" #NT!
 CHN.foreignpolicy.202.d: "Недавно присоединившись к [FROM.GetFactionName], наши новые китайские союзники предложили нам присоединиться к Восточноазиатскому сообществу – торговому блоку с амбициями соединить Восточную и Южную Азию, а также Тихий океан. Принимая различные инициативы, начиная от экономического развития, инвестиций в инфраструктуру и даже академических и культурных обменов, блок обещает процветание и единство независимо от иностранного доминирования.\n\nОднако, хотя доступ к китайскому капиталу обещает улучшить нашу ограниченную промышленную базу, существуют опасения, что китайцы будут использовать свои рычаги влияния, чтобы доминировать в нашей экономике и вытеснять отечественную промышленность. Есть также опасения, что это также откроет нашу экономику для нежелательного китайского влияния, позволяя им воспользоваться нашим хрупким политическим государством." #NT!
 CHN.foreignpolicy.202.a: "Мы любезно принимаем." #NT!
 CHN.foreignpolicy.202.b: "Мы вежливо отказываемся." #NT!
  
 CHN.foreignpolicy.203.t: "[FROM.GetNameDefCap] Принимает инвестиции" #NT!
 CHN.foreignpolicy.203.d: "Мы получили отличные новости от нашего посла в [FROM.GetNameDef] о том, что их страна приняла наши инвестиционные возможности. Вместе мы сможем нарастить экономическую мощь и помочь им превратиться в новую растущую державу, одновременно помогая нашим усилиям в области промышленности и восстановления. Пусть это станет началом долгой и плодотворной дружбы на долгие годы!." #NT!
 CHN.foreignpolicy.203.a: "Начало плодотворного сотрудничества." #NT!
  
 CHN.foreignpolicy.204.t: "[FROM.GetNameDefCap] Отказывается от инвестиций" #NT!
 CHN.foreignpolicy.204.d: "Мы получили неутешительные новости от нашего посла в [FROM.GetNameDef] о том, что они не желают принимать нашу инвестиционную возможность и отклонили наше любезное предложение. Возможно, они рассматривают нашу благодарность как внешнюю угрозу или просто не верят, что мы ищем взаимовыгодные отношения для обеих наших стран. Каковы бы ни были их причины, но это их потеря, что они отклонили наше щедрое предложение." #NT!
 CHN.foreignpolicy.204.a: "В любом случае, мы желаем им удачи. Им это понадобится." #NT!
  
 #Frontier Annexation Events: 
 CHN.foreignpolicy.300.t: "Управление людьми серебряных стад" #NT!
 CHN.foreignpolicy.300.d_base: "Полностью подчинив монголов в 1691 году, династия Цин правила частями Степи более 200 лет, однако все это рухнуло в 1911 году после Монгольской революции. Происходя как культурная, так и социальная эволюция во время и с тех пор, как Занабазар был Первым Джебцундамба Хутухту, постепенное ослабление династии Цин и реализация Новой политики в степи привели к острой оппозиции со стороны монгольских князей и лам.\n\nПровозгласив свою независимость, короткая борьба за независимость со стороны Богдского ханства привела бы к появлению некоторых из величайших государственных деятелей Монголии, и его худшее. Государство без признания, оно в конечном итоге поддалось собственным распрям и некомпетентности, отделившись от правительства Аньхой в 1919 году. В это время возникло новое собрание монгольских революционеров, Монгольская националистическая партия, и их усилиями было установлено нынешнее положение дел в Монголии." #NT!
 CHN.foreignpolicy.300.d_end: "Тем не менее, административные вопросы Монголии обычно почти полностью решаются (официально) Комиссией по монголо-тибетским делам, в значительной степени бессильным органом, и поэтому может быть предпочтительнее поддерживать такое положение дел. Не менее заманчивым и поддерживаемым Генеральным штабом является продолжение военной оккупации, хотя такое решение вызывает в памяти образы неудачи Сюй Шучжэна десятилетия назад. Наконец, всегда есть возможность работать с местными влиятельными лицами из устоявшейся знати, будь то миряне или ламы, что является своего рода взаимовыгодной сделкой как для китайцев, так и для монголов." #NT!
 CHN.foreignpolicy.300.d_northzhili: "$CHN.foreignpolicy.300.d_base$\n\nВ усилиях по достижению монгольской автономии в 1920-х и 30-х годах были организованы различные группы под эгидой получения официальной поддержки центрального правительства для «представления» монголов. В такой обстановке такие деятели, как принц Де, Со, Ён и Сун, Тёгс-Очирын Намнансюрен и Церендондовин Навааннерен, оказались в заголовках международных новостей благодаря своему отстаиванию прав Монголии. Хотя самым настойчивым среди них и постоянно пытающимся позиционировать себя как «человека-Прометея монголов» является протеже принца Гуна, У Хэлин, и его Монгольская группа консолидации и реабилитации.\n\nПолучив управление Комиссией по монгольско-тибетским делам, его MCRG сохранил офисы в Пекине и Нанкине, и поэтому Ву неофициально присоединился к клике Чжили, чтобы лучше позиционировать себя в Китайско-монгольские дела. Нейтральный в реальной внутрисемейной политике, Хелинг заверил правительство в своих намерениях обеспечить лучшее решение как для китайцев, так и для монголов, и уже поспешил подготовить различные предложения и законы.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_southzhili: "$CHN.foreignpolicy.300.d_base$\n\nВ усилиях по достижению монгольской автономии в 1920-х и 30-х годах были организованы различные группы под эгидой получения официальной поддержки центрального правительства для «представления» монголов. В такой обстановке такие деятели, как принц Де, Со, Ён и Сун, Тёгс-Очирын Намнансюрен и Церендондовин Навааннерен, оказались в заголовках международных новостей благодаря своему отстаиванию прав Монголии. Хотя самым настойчивым среди них и постоянно пытающимся позиционировать себя как «человека-Прометея монголов» является протеже принца Гуна, У Хелинг, и его Монгольская группа консолидации и реабилитации.\n\nПолучив управление Комиссией по монгольско-тибетским делам, его MCRG сохранил офисы в Пекине и Нанкине. Неофициально присоединившись к Чжили, ближайшие соратники У на Юге получили возможность внимательно следить за делами Южного Чжили, в основном под эгидой У Юньпэна. Хотя сам Хелинг слишком тесно связан с Цао Куном и У Бэйфу, Юньпэн сохранил свои собственные амбиции, автономию и лояльность.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_fengtian: "$CHN.foreignpolicy.300.d_base$\n\nПоскольку в техническом отношении клика Фэнтянь является наиболее законным преемником китайской администрации Монголии, она уделяла мало внимания или заботы проблемам границы, вместо этого сосредотачивая свои усилия в пределах Рехе, Чахара, Барги, Хулунбуира и Силингола. Тем не менее, клика Фэнтянь сохраняет значительных местных монгольских деятелей, которые готовы сотрудничать с правительством, пока монголы сохраняют значительную автономию. Таким образом, они настояли на том, чтобы Лю Ифэй стал Верховным комиссаром - пост, который он уже однажды занимал, будучи близким соратником Чжан Сюэляна и человеком с реформистскими тенденциями.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_yan: "$CHN.foreignpolicy.300.d_base$\n\nЛюбопытно, что, получив полную власть над всем регионом Внешней Монголии, Ян Сишань, возможно, не в себе. Несмотря на то, что Янь в сотрудничестве с местными князьями отправил таких фигур, как Чжао Дайвэнь в Чахар и Сюй Юнчан в Суйюань, он вряд ли является другом монголов. Являясь одним из главных сторонников преобразования монгольских территорий в полноценные китайские провинции и обычно используя 7-й Чангкья Хутухту для блокирования вопросов монгольской автономии, у Яня было мало вариантов управления монгольскими территориями, однако Фу Цзои доказал свою способность и стойкость, хотя, возможно, нетерпим к самим монголам, и может быть жизнеспособным вариантом для сохранения контроля.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_gmj: "$CHN.foreignpolicy.300.d_base$\n\nГоминьцзюнь, или Гражданская армия, занимающая, возможно, одно из худших мест в глазах монголов, сея хаос, хаос и страдания среди монголов во время своего пребывания во Внутренней Монголии. Имея прохладные связи с Националистической партией Внутренней Монголии и столичной фракцией Монгольской националистической партии, Фэн, тем не менее, имеет множество потенциальных друзей и союзников, хотя и неохотно. Конечно, единственные офицеры GMJ, не внесенные в черный список, кроме самого Фэна, — это его близкий адъютант и правая рука Чжан Чжицзян и Ма Хэтянь, еще один сочувствующий ему офицер. Оба близки к таким фигурам, как Бай Юнти и Дамбадорж, и поэтому могут рассчитывать на благосклонность монгольских националистов, если потребуется.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_manchu: "$CHN.foreignpolicy.300.d_base$\n\nВозможно, к счастью для администрации Цин, атмосфера традиций между сюзеренами и их подданными остается сильной в умах многих представителей монгольской знати, и такие личности, как принц Де, принц Сун, принц А, принц Та и особенно Джодбаджаб, подтверждают свою лояльность Императору. Однако во Внешней Монголии ведущие деятели регентства 2-го Богд-хана, такие как Доржсюренхороджав, Тёгс-Очирын Намнансюрен и Цэрэндондовин Навааннерен, потребовали существенной автономии для монголов в обмен на поддержку Доржсуренхороджава как верного подданного Императора.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_rkmt: "$CHN.foreignpolicy.300.d_base$\n\nГоминьдан и Монгольская националистическая партия (наряду с Националистической партией Внутренней Монголии), считающиеся родственными партиями, по крайней мере, некоторыми деятелями в каждом лагере, долгое время были союзниками, даже во времена их интенсивного изгнания. Хотя такие деятели, как Данзан и Дамбадорж в MNP, сохраняют определенные элементы прокитайских симпатий, а IMNP был совместным проектом Гоминьдана и MNP, различные деятели внутри партии рекомендовали поставить во главе монгольских территорий тесно связанного монгола. Ссорясь между собой, ведущие претенденты на эту должность выдвинули Бай Юньти, предложенного деятелями старых правых, и Ли Юнсиня из новых правых.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_xsm: "$CHN.foreignpolicy.300.d_base$\n\nПоскольку недавно они вели войну с монголами за контроль над Внутренней Монголией, неудивительно, что у семей Ма очень мало союзников в регионе. Вместо того, чтобы полагаться на собственные силы, к счастью, в семье есть ведущая фигура, имеющая некоторое подобие монгольских связей: Ма Хункуй. Хотя большинство знамен в его владениях считают его крайне неприятным, Хункуй является одной из немногих фигур, которые активно занимались управлением монголами, и может даже рассчитывать на таких фигур, как Ван Ин и Кхандудорж, которые вместе известны как «три безрассудных маленьких лорда».\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.d_generic: "$CHN.foreignpolicy.300.d_base$\n\nДолгое время сохраняя обширную бюрократию комиссаров, ответственных за управление монгольскими территориями, Китай наполнен множеством квалифицированных бюрократов, которые сохраняют необходимые качества и опыт для решения монгольских дел. Такие фигуры, как Ван Иньтай, протеже Чэнь И, или такие люди, как Чэнь Лу. Ранее Чэнь Лу и его опыт были Верховными комиссарами монгольских территорий, и теперь это почти свершившийся факт, что они снова призваны действовать в качестве Верховного комиссара Монголии.\n\n$CHN.foreignpolicy.300.d_end$" #NT!
 CHN.foreignpolicy.300.a: "[CHN_mongolia_get_unique_governor]" #NT!
 CHN.foreignpolicy.300.b: "MTAC существует не просто так." #NT!
 CHN.foreignpolicy.300.c: "Поддерживать военное положение." #NT!
 CHN.foreignpolicy.300.e: "Играйте за дворян, это проверено и верно." #NT!
 CHN_mongolia_get_unique_governor_northzhili: "Нам было бы нехорошо без У Хелинга, дайте ему полномочия." #NT!
 CHN_mongolia_get_unique_governor_southzhili: "У Юньпэн должен был добиться успеха, если бы Хелин потерпел неудачу." #NT!
 CHN_mongolia_get_unique_governor_fengtian: "Лю Ифэй занимал этот пост раньше, и он наверняка не сможет потерпеть неудачу дважды." #NT!
 CHN_mongolia_get_unique_governor_yan: "Все под маршалом." #NT!
 CHN_mongolia_get_unique_governor_gmj: "Ма Хэтянь когда-то поддерживал теплые отношения." #NT!
 CHN_mongolia_get_unique_governor_xsm: "Ма Хункуй будет держать их в узде." #NT!
 CHN_mongolia_get_unique_governor_rkmt: "Бросьте кость Бай Юнти." #NT!
 CHN_mongolia_get_unique_governor_rkmt_yun: "Ли Юнсинь заверяет председателя в своих приоритетах." #NT!
 CHN_mongolia_get_unique_governor_manchu: "Вполне естественно, что Доржсюренхоролжав сохранит свою позицию." #NT!
  
 CHN.foreignpolicy.301.t: "Шагая на плато" #NT!
 CHN.foreignpolicy.301.d_base: "Установив плацдарм для контроля со времени китайской экспедиции в Тибет в 1720 году, китайская администрация в Тибете столкнулась с трудностями, как внутренними, так и внешними. Сохраняя значительную полуавтономию, постепенное вторжение китайцев на территорию Тибета оставалось лишь теоретическим, поскольку многочисленные конвенции, подписанные между британцами и китайцами, открыто выставлялись напоказ или игнорировались тибетскими властями до такой степени, что британцы вторглись в регион в 1903 году, чтобы подчинить тибетцев.\n\nПризнавая сюзеренитет Цин в 1907 году, тибетцы восстали во время Синьхайской революции. в 1911 году, открыв Тибет для настоящих интриг местной независимости, хотя и признанной монгольским правительством только в Хурээ. При таком положении дел Тибету будет трудно примириться с современностью, поскольку различные группы, включая Далай-лам и Панчен-лам, будут враждовать по множеству вопросов, начиная от простых налоговых обязательств и заканчивая военной и социальной модернизацией." #NT!
 CHN.foreignpolicy.301.d_end: "Как бы то ни было, тибетские политики не сидели сложа руки, ожидая, пока китайцы выберут своего повелителя. Партия улучшения Тибета и Группа Кийчо Кунтун начали сговор с целью продвижения своих видений будущего Тибета. Точно так же Сангха вновь подтвердила свою позицию, отдав приоритет роли Далай-ламы в тибетских делах. Тем временем различные военные деятели уверяли [ROOT.GetLeader], что горстка солдат сможет контролировать все плато." #NT!
 CHN.foreignpolicy.301.d_szc_liu: "$CHN.foreignpolicy.301.d_base$\n\nНоминально находящийся в ведении Совета по монголо-тибетским делам, современный китайский контроль и администрация стремятся не повторять полуавтономию Цин, а затем поспешно провели интервенцию в 1910 году. Для провинции Сычуань эта проблема является наиболее актуальной, и особенно для Лю Вэньхуэя, который в последнее время вел войну против тибетцев. Обладая наибольшими связями на Плато, он выдвинул свою кандидатуру на управление тибетскими территориями.\n\n$CHN.foreignpolicy.301.d_end$" #NT!
 CHN.foreignpolicy.301.d_rkmt: "$CHN.foreignpolicy.301.d_base$\n\nНоминально находящийся в ведении Совета по монголо-тибетским делам, современный китайский контроль и администрация стремятся не повторять полуавтономию Цин, а затем поспешно провели интервенцию в 1910 году. Хотя очень немногие в правительстве Гоминьдана имели какое-либо влияние или заинтересованность в управлении тибетскими территориями, один бесстрашный чиновник выдвинул себя: Хуан Мусун. Относительно нейтральный в партийных делах, он пообещал придерживаться свободного и справедливого подхода к тибетскому вопросу в соответствии с желаниями партии.\n\n$CHN.foreignpolicy.301.d_end$" #NT!
 CHN.foreignpolicy.301.d_manchu: "$CHN.foreignpolicy.301.d_base$\n\nНоминально находящийся в ведении Совета по монголо-тибетским делам, современный китайский контроль и администрация стремятся не повторять полуавтономию Цин, а затем поспешно провели интервенцию в 1910 году. Хотя маньчжуры несут с собой негативный оттенок в кликах тибетских модернизаторов, Император сохраняет значительное уважение и лояльность среди определенных фигур на Платеу. Близкий к Панчен-ламе и бывший сенатор правительства Бэйяна, уроженец Тибета Лобсанг Гьялцен выдвинул свою кандидатуру на пост Верховного комиссара. Возможно, ради сохранения тибетской автономии или по другим причинам, он оказался податливым к большинству усилий Маньчжурии по интеграции.\n\n$CHN.foreignpolicy.301.d_end$" #NT!
 CHN.foreignpolicy.301.d_generic: "$CHN.foreignpolicy.301.d_base$\n\nНоминально находящийся в ведении Совета по монголо-тибетским делам, современный китайский контроль и администрация стремятся не копировать полуавтономию Цин, а затем поспешно провели интервенцию в 1910 году. Занимая должность директора по тибетским делам в Комиссии по монголо-тибетским делам, Кун Цинцзон зарекомендовал себя как ханьский шовинист старой школы, хотя и увлечен тибетологией. Вместе с Вэнь Цунъяо, бывшим тибетским амбанем и человеком Бэйянского реформизма, они разработали свои собственные планы тибетской администрации.\n\n$CHN.foreignpolicy.301.d_end$" #NT!
 CHN.foreignpolicy.301.a: "[CHN_tibet_get_unique_governor]" #NT!
 CHN.foreignpolicy.301.b: "Тибет остро нуждается в настоящей современности." #NT!
 CHN.foreignpolicy.301.c: "Едва ли потребуется целая дивизия, чтобы контролировать Тибет..." #NT!
 CHN.foreignpolicy.301.e: "Сангха была здесь раньше нас, давайте работать с ними." #NT!
 CHN_tibet_get_unique_governor_szc_liu: "Я уверен, что Лю Вэньхуэй держит ситуацию под контролем." #NT!
 CHN_tibet_get_unique_governor_rkmt: "Хуан Мусонг прикладывает руку к делу." #NT!
 CHN_tibet_get_unique_governor_manchu: "Лобсанг Гьялцен будет работать как на Сангху, так и на Императора." #NT!
  
 CHN.foreignpolicy.302.t: "Глядя на границу" #NT!
 CHN.foreignpolicy.302.d_base: "Синьцзян пережил долгие и трудные времена в составе китайского государства. На протяжении большей части своей истории Синьцзян колеблется между китайским и кочевническим контролем, и император Цяньлун навсегда включил его в состав Китая. Исторически разделенная на два региона, Цин впоследствии сформировала особую региональную идентичность провинции Синьцзян. Когда династия Цин рухнула, Ян Цзэнсинь фактически управлял провинцией как своей вотчиной через свои дунганские войска. Губернаторство Яна продлилось десятилетия, но его преемник Цзинь Шурен спровоцировал нестабильность, положив конец Кумульскому ханству, побудив различные недовольные элементы погрузить провинцию в войну.\n\nНестабильность Синьцзяна в значительной степени закончилась с тех пор, как возрождающееся китайское государство напрямую вернуло своенравную провинцию обратно в свои ряды, но напряженность все еще сохраняется. Умеренные уйгурские реформисты решили протянуть властям оливковую ветвь, предложив свои услуги правительству. Напротив, тюркские националисты поклялись продолжать борьбу за республику Восточного Туркестана. Пожалуй, наиболее благосклонно к реинтеграции отнеслось местное население Синьцзяна хань и хуэй, у которого никогда не было лучших отношений с большинством уйгурского населения." #NT!
 CHN.foreignpolicy.302.d_end: "Независимо от того, кто станет губернатором, у них будут заняты дела. Масуд Сабри и Иса Альптекин из бывшей Восточно-Туркестанской Республики предложили занять должность губернатора Синьцзяна, если этот пост займет кто-то вроде Бурхана Шахиди или Юлбарса Хана, но более радикальные деятели движения, скорее всего, все равно выразят оппозицию. Пожары в Синьцзяне потушены, но провинция еще некоторое время будет тлеть." #NT!
 CHN.foreignpolicy.302.d_northzhili: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил администрации Чжили в Синьцзяне изрядную долю кандидатов на пост губернатора. Однако Пекин стремится сохранить более жесткий контроль над провинциями, чтобы не допустить возврата к эпохе военачальников. Пекин, возможно, мог бы возвысить Юлбарс-хана до губернатора из-за его прокитайской позиции, чтобы успокоить уйгурских националистов, или, возможно, такой гражданский администратор, как Фань Яонань, лучше справился бы с продвижением интересов Пекина.\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.d_southzhili: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил администрации Чжили в Синьцзяне изрядную долю кандидатов на пост губернатора. Шэн Шицай, несмотря на его предполагаемую симпатию к социализму, является главным кандидатом из-за его положительных отношений с маршалом Лиги Сунь, что может сделать его полезным лоялистом с местным опытом. Однако он также продемонстрировал некоторую амбициозность, что может сделать его менее податливым, чем такой бюрократ, как Фань Яонань. Другой вариант — оставить губернатора-лоялиста из сил Лиги, в то же время позволив местному жителю сохранить гражданское губернаторство.\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.d_fengtian: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил режиму Ангоцзюня изрядную долю кандидатов на пост губернатора Синьцзяна. Юлбарс Хан из Кумульского ханства — известный консерватор, который подавляет радикализм и имеет прокитайские взгляды, что может способствовать лояльности уйгуров Пекину. Генерал Ма Шаоу также является главным кандидатом, поскольку юньнаньский генерал Хуэй может побудить дунганских солдат присоединиться к вооруженным силам Ангоцзюня и усилить местное сопротивление потенциальному российскому вторжению.\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.d_yun: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил администрации Дянь в Синьцзяне изрядную долю кандидатов на пост губернатора. Синьцзян уже давно знает о правлении клики Юньнань, благодаря Ян Цзэнсиню и Ма Шаоу, и, возможно, последний продолжит сохранять главенство клики Дянь в регионе и будет поддерживать порядок в провинции. Возможно, его режим можно было бы укрепить, если бы под его командованием оказались юньнаньские солдаты Хуэй?\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.d_xsm: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил администрации Ма в Синьцзяне изрядную долю кандидатов на пост губернатора. Ма Хушань помогал своему зятю Ма Чжунъину сражаться за Синьцзян вместе с Юлбарс-ханом, и, возможно, было бы разумно предоставить ему вотчину, которую паршивая овца семьи Ма никогда не могла удержать. Мы также можем рассчитывать на то, что местное дунганское население будет приветствовать наше правление, как и мусульмане хуэй.\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.d_rkmt: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил гоминьдановской администрации в Синьцзяне изрядную долю кандидатов на пост губернатора. Синьцзян, возможно, и изобилует реакционерами и сепаратистами, но Бурхан Шахиди показал себя прогрессивной силой, борющейся за улучшение ситуации в провинции, в отличие от интриганов-дураков, сражавшихся за свои вотчины. Его идеалы совместимы с идеалами Национальной революции, и он может стать великой силой для местной поддержки.\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.d_manchu: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил императорской администрации в Синьцзяне изрядную долю кандидатов на пост губернатора. Юлбарс-хан доказал свою преданность своему Кумул-хану в Синьцзянских войнах и, безусловно, заслужил симпатию императора. Такой генерал, как Ма Шаоу, также является привлекательным выбором, поскольку он был верным солдатом Ян Цзэнсиня, известного роялиста. Ма также является ярым антироссийцем, и он усилит наше сопротивление гнусным планам Москвы.\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.d_generic: "$CHN.foreignpolicy.302.d_base$\n\nДействительно, похоже, что неожиданный приток местных коллаборационистов предоставил новой китайской администрации в Синьцзяне изрядную долю кандидатов на пост губернатора. Есть веские основания выбрать местного сотрудника для обслуживания этой должности, поскольку это обязательно увеличит поддержку на местном уровне. Однако некоторые в правительстве оказали давление на [ROOT.GetLeader], чтобы тот назначил губернатором лояльного генерала из центральных вооруженных сил, чтобы помешать такой амбициозной фигуре, как Цзинь Шурен, основать свою собственную местную вотчину с помощью России.\n\n$CHN.foreignpolicy.302.d_end$" #NT!
 CHN.foreignpolicy.302.a: "[CHN_xinjiang_get_unique_governor]" #NT!
 CHN.foreignpolicy.302.b: "Прогрессивные элементы Синьцзяна должны быть расширены!" #NT!
 CHN.foreignpolicy.302.c: "Один из наших генералов будет держать Синьцзян под контролем." #NT!
 CHN.foreignpolicy.302.e: "Синьцзян и впредь будет руководствоваться консервативными голосами!" #NT!
 CHN_xinjiang_get_unique_governor_northzhili: "Давайте поднимем Фань Яонань на этот пост." #NT!
 CHN_xinjiang_get_unique_governor_southzhili: "Шэн Шицай сослужит нам добрую службу." #NT!
 CHN_xinjiang_get_unique_governor_fengtian: "Юлбарс-хан сохранит традицию." #NT!
 CHN_xinjiang_get_unique_governor_yun: "Ма Шаоу — старый друг, у него есть наш голос." #NT!
 CHN_xinjiang_get_unique_governor_xsm: "Ма Хушань завершит то, что начал Ма Чжунъин." #NT!
 CHN_xinjiang_get_unique_governor_rkmt: "Искренность Бурхана Шахиди завоевала ему Синьцзян." #NT!
 CHN_xinjiang_get_unique_governor_manchu: "Юлбарс-хан хорошо послужит императору." #NT!
  
 CHN.foreignpolicy.303.t: "Дела на Тайване" #NT!
 CHN.foreignpolicy.303.d_base: "После того, как Тайвань был передан Японии, возникли различные движения за независимость и самоуправление. Этот энтузиазм проявился в создании Тайваньской культурной ассоциации, которую возглавляли Цзян Вэйшуй и Линь Сяньтянь. Цзян и Линь в конечном итоге раскололись: Цзян сформировал свою соседнюю с Гоминьданом Тайваньскую народную партию, а восхищающиеся Линь Цичао Линь и консервативные элементы сформировали Тайваньский альянс за самоуправление. После возвращения Тайваня ТТП оказался в затруднительном положении. Умеренные, такие как Цай Пэйхуо, столкнулись с радикализмом и авторитарным подходом Цзяна, угрожая расколоть партию.\n\nТайваньская синдикалистская партия также была подавлена ​​сразу же после прибытия властей материковой части страны. Тем временем бывшая элита и класс дворянства пытались заручиться поддержкой нового китайского режима, хотя восприятие TAHR как непатриотического государства нанесло ущерб их репутации в глазах оккупационных властей. В среде ТТП и TAHR возникла Ассоциация товарищей по восстановлению Тайваня, возглавляемая братьями Ляо Вэнькуй и Ляо Вэньи. Состоящее из технократов и интеллектуалов, получивших западное образование, это в целом либеральное движение, стремящееся заручиться либеральной поддержкой со стороны материка." #NT!
 CHN.foreignpolicy.303.d_end: "Хотя Тайвань отличается от приграничных регионов тем, что он почти полностью состоит из ханьцев, шаги, предпринимаемые администрацией для реинтеграции своенравной провинции, не менее важны. Население Тайваня было отделено от материка на протяжении полувека, и любому китайскому правительству, пытающемуся управлять провинцией, придется признать эти различия, иначе, возможно, Тайвань будет продолжать чувствовать беспокойство еще долгие годы." #NT!
 CHN.foreignpolicy.303.d_northzhili: "$CHN.foreignpolicy.303.d_base$\n\nАдминистрация Чжили, несмотря на свои антияпонские взгляды, благосклонно отнеслась к TAHR. Лян Цичао продолжает оказывать большое влияние на Пекин, и его мнение разделяет мнение Линь Сяньтяня. В то время как либеральные элементы в лагере Чжили выразили поддержку TRCA, Линь и его TAHR, безусловно, пользуются поддержкой консервативных руководителей в правительстве. Однако среди более централистских и милитаристских деятелей в правительстве, которые не доверяют местным партиям, прозвучал призыв ввести в провинции временное военное положение.\n\n$CHN.foreignpolicy.303.d_end$" #NT!
 CHN.foreignpolicy.303.d_southzhili: "$CHN.foreignpolicy.303.d_base$\n\nХотя Тайвань вернулся в свои ряды, несколько чуждые своим коллегам на материке, возможно, администрация [ROOT.GetLeader] уникально подходит для взаимодействия с островной провинцией. Первоначальная база власти Сунь Чуаньфана находилась в соседней провинции Фуцзянь, которая продолжала играть решающую роль в правительстве Лиги. Фуцзяньцы разделяют язык со своими островитянами, так что, возможно, восходящая звезда Фучжоу Са Шиджун сможет управлять провинцией, гарантируя, что местные жители останутся умиротворенными.\n\n$CHN.foreignpolicy.303.d_end$" #NT!
 CHN.foreignpolicy.303.d_fengtian: "$CHN.foreignpolicy.303.d_base$\n\nКак и Тайвань, Северо-Восток слишком хорошо знает японцев. Хотя многие благонамеренные китайские патриоты могут осуждать сотрудничество Японии с тайваньской элитой, правительство Ангоцзюня лучше понимает тайваньскую ситуацию. Таким образом, администрация [ROOT.GetLeader] рассматривала TAHR как потенциального партнера наряду с властями, чтобы заручиться местной поддержкой как в укреплении стабильности, так и в укреплении традиционализма в беспокойной островной провинции.\n\n$CHN.foreignpolicy.303.d_end$" #NT!
 CHN.foreignpolicy.303.d_rkmt: "$CHN.foreignpolicy.303.d_base$\n\nГоминьдан имеет на острове немало союзников на выбор. Цзян, несмотря на свой радикализм, является проверенным патриотом, который чтит Гофу так же, как и любого члена партии с материка. Линь Сяньтянь также является достойным выбором из-за его связей с тайваньской знатью и элитами, хотя, возможно, расширение прав и возможностей японских коллаборационистов не в лучших интересах Китая. Некоторые члены партии также предполагают, что Тайвань, возможно, еще не готов к местному правлению, и вместо лояльного офицера НРА является оптимальным выбором для поддержания порядка и подготовки пути к реализации видения Гофу на острове.\n\n$CHN.foreignpolicy.303.d_end$" #NT!
 CHN.foreignpolicy.303.d_manchu: "$CHN.foreignpolicy.303.d_base$\n\nПотеря Тайваня, возможно, стала настоящей точкой невозврата для сохранения династии Цин. Однако не только монархия вернулась, чтобы управлять Китаем, но даже островная провинция была возвращена роялистам. Местные организации Тайваня имели тенденцию быть республиканскими по своим взглядам, но их элиты всегда придерживались прагматических взглядов. Они нашли рабочие отношения с Токио, возможно, они смогут найти их и с Сыном Неба.\n\n$CHN.foreignpolicy.303.d_end$" #NT!
 CHN.foreignpolicy.303.d_generic: "$CHN.foreignpolicy.303.d_base$\n\nПосле того, как Фуцзянь управлялась как целая провинциальная единица, многие сторонники в правительстве выступают за простой возврат к этому положению дел; Фуцзяньцы лучше всего подходят для управления тайваньцами, учитывая их общие культурные корни. Однако некоторые в армии настаивают на роли военных в поддержании такого стратегического острова или на работе с местными группами, будь то TPP, TAHR или другие.\n\n$CHN.foreignpolicy.303.d_end$" #NT!
 CHN.foreignpolicy.303.a: "[CHN_taiwan_get_unique_governor]" #NT!
 CHN.foreignpolicy.303.b: "Работайте с различными местными прогрессивными группами." #NT!
 CHN.foreignpolicy.303.c: "На острове до сих пор сохраняется присутствие японцев." #NT!
 CHN.foreignpolicy.303.e: "Судите TAHR, даже с их репутацией." #NT!
 CHN_taiwan_get_unique_governor_northzhili: "Мы считаем партнерство с Линь Сяньтянем приемлемым." #NT!
 CHN_taiwan_get_unique_governor_southzhili: "Са Шиджун сможет поставить Тайвань под надлежащее управление." #NT!
 CHN_taiwan_get_unique_governor_fengtian: "ТАХР умеет танцевать с Восходящим Солнцем, как и мы." #NT!
 CHN_taiwan_get_unique_governor_rkmt: "Цзян грубоват, но он наш человек." #NT!
 CHN_taiwan_get_unique_governor_manchu: "Лин и его TAHR будут хорошо служить Императору." #NT!
  
