 ANQ_revolt_against_bonus_idea: "Марш против Аньцина" #NT!
 ANQ_revolt_against_bonus_idea_desc: "Начиная с рокового распада Лиги восьми провинций и заканчивая тем, что Пекин и Нанкин несли одно и то же знамя, Аньцин объединил Китай. Кровопролитная борьба за власть ради объединения Китая стоила дорого, но народы провинции Аньхой справились с ней, несмотря на невероятные шансы.\n\nНо они праздновали слишком рано. Опьяненные своей властью, они наткнулись на еще один ряд препятствий, поскольку региональные правительства на периферии разочаровались. Объединяя своих сторонников против предполагаемых злоупотреблений, эти претенденты разворачивают кампанию по свержению потенциальных правителей Китая. Их успех зависит от способности их армий противостоять новой центральной армии и с поднятыми знаменами они идут на войну." #NT!
  
 GXC_revolt_against_bonus_idea: "Марш против Лянгуана" #NT!
 GXC_revolt_against_bonus_idea_desc: "Несмотря на многочисленные неудачи и смену правительств, Лянгуан достиг своей давней цели – объединения Китая. Это был трудный подвиг, особенно редкий для китайского правительства, базирующегося на юге, но народы двух Гуан (Гуандун и Гуанси) справились с ним, несмотря на невероятные шансы.\n\nНо они праздновали слишком рано. Опьяненные своей властью, они наткнулись на еще один ряд препятствий, поскольку региональные правительства на периферии разочаровались. Объединяя своих сторонников против предполагаемых злоупотреблений, эти претенденты разворачивают кампанию по свержению потенциальных правителей Китая. Их успех зависит от способности их армий противостоять новой центральной армии и с поднятыми знаменами они идут на войну." #NT!
  
 CHI_revolt_against_bonus_idea: "Марш против Гоминьдана" #NT!
 CHI_revolt_against_bonus_idea_desc: "От гор Фуцзянь до голубого неба и белого солнца, пролетающего над большей частью Китая, Левый комитет Гоминьдана завершил свою национальную революцию. Это был трудный подвиг, особенно учитывая партизанское начало повстанческого движения Минган, но Национально-революционная армия справилась с ним, несмотря на невероятные шансы.\n\nНо они праздновали слишком рано. Опьяненные своей властью, они наткнулись на еще один ряд препятствий, поскольку региональные правительства на периферии разочаровались. Объединяя своих сторонников против предполагаемых злоупотреблений, эти претенденты разворачивают кампанию по свержению потенциальных правителей Китая. Их успех зависит от способности их армий противостоять новой центральной армии и с поднятыми знаменами они идут на войну." #NT!
  
