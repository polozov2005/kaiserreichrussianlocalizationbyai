 LEC_revolt_against_bonus_idea: "Марш против миссий" #NT!
 LEC_revolt_against_bonus_idea_desc: "К удивлению многих наблюдателей и ужасу многих китайцев, на всей территории Китая был установлен Международный мандат. Этот нестандартный поворот событий ошеломил практически всех в мире, в то время как Международный мандат собирает свою добычу.\n\nНо праздновали слишком рано. Опьяненные своей властью, они наткнулись на еще один ряд препятствий, поскольку региональные правительства на периферии разочаровались. Объединяя своих сторонников против предполагаемых злоупотреблений, эти претенденты разворачивают кампанию по свержению потенциальных правителей Китая. Их успех зависит от способности их армий противостоять новой центральной армии и с поднятыми знаменами они идут на войну." #NT!
  
