  #Land Reform 
 china_land_reform_decisions: "Национальная земельная реформа"
  #Generic Description, use scripted loc for tag specific descs 
 china_land_reform_decisions_desc: "Хотя наше правительство проделало значительную работу по улучшению положения китайского народа, реальность такова, что эпоха милитаристов нанесла значительный ущерб многим районам страны и затормозила рост в других. Некоторые из наиболее пострадавших регионов являются сельскими по своей природе и не получили практически никаких выгод от индустриализации, которую Китай мучительно переживал в течение последних нескольких десятилетий. После многих лет внутренних потрясений и пренебрежения со стороны правительства многие из них продолжают страдать под игом несправедливых законов об аренде, неадекватного оборудования, устаревших технологий, различных хищнических организаций и стихийных бедствий.\n\nТеперь, когда мы одержали победу на поле боя, нам предстоит встретить следующий фронт восстановления Китая и сделать эти победы значимыми. Пришло время оставить свой след в сельской местности Китая и облегчить страдания наших людей."
  
 china_generic_land_reform_decision: "Провести земельную реформу в [FROM.GetName]"
  #Generic Description, use scripted loc for tag specific descs 
 china_generic_land_reform_decision_desc: "Многие мыслители и теоретики предлагали потенциальные решения проблем, гноящихся в китайской глубинке на протяжении десятилетий. Успешно объединив нацию под одним знаменем, мы имеем достаточно ресурсов и стабильности для реализации комплексного плана по решению этих проблем. Все, что сейчас необходимо, - это политическая воля для осуществления таких усилий в широком масштабе."
  
 ### Ideas ### 
 unequal_treaties: "Неравноправные договоры"
 CHN_calls_for_a_united_front_idea: "Призывы к единому фронту" #NT!
 CHN_calls_for_a_united_front_idea_desc: "Начало войны между китайским правительством и иностранными угрозами привело к всплеску патриотических настроений по всей стране. Широко раздаются призывы к различным воюющим китайским правительствам отложить в сторону свои разногласия и сформировать Объединенный китайский фронт во имя национальной обороны. Для любых фракций, находящихся за пределами этого альянса, политические последствия могут быть ужасными.\n\n§RБорьба против Объединенного фронта приведет к тому, что этот штраф останется в силе на время войны.§!" #NT!
 unite_china_justification_idea: "Объединение Китая!"
 unite_china_justification_idea_desc: "Теперь, когда мы захватили столицу и сформировали новое китайское правительство, мы должны подчинить себе оставшихся военачальников."
 league_collapse_idea_1: "Революционный пыл"
 league_collapse_idea_1_desc: "Сейчас, когда Лига распалась и началась открытая война, силы Нанкина находятся в хаосе и вынуждены сражаться на нескольких фронтах против своих врагов. Настало время нанести удар и претендовать на то, что по праву принадлежит нам!"
 league_collapse_idea_2: "Нанкинская реорганизация"
 league_collapse_idea_2_desc: "Предатели не смогли сломить нас, несмотря на наши слабости, теперь пришло время нанести ответный удар и вернуть то, что принадлежит нам!"
 china_foreign_support: "Иностранная поддержка"
 china_foreign_support_desc: "В связи с нашими успехами в войне, была организована иностранная миссия, чтобы помочь нам довести до конца нашу победу."
 china_desertions_common: "Дезертирство - обычное дело"
 china_desertions_common_desc: "Череда поражений привела к тому, что все больше мужчин отказываются воевать, иногда вступая в армию, чтобы получить новую пару одежды и распродать ее на ближайшем рынке."
 china_morale_effects_tooltip: "§YБоевой дух Лиги§!\nПрирост политической власти: [?china_morale_dm_political_power_gain|+=%0]\nПоддержка войны: [?china_morale_dm_war_support_factor|+%=2]\nЛимит капитуляции: [?china_morale_dm_surrender_limit|+%=0]\nПрорыв: [?china_morale_dm_breakthrough_factor|+%=1]"
 china_anti_stalemate_idea_2: "Разрушение морального духа"
 china_anti_stalemate_idea_2_desc: "Неспособность [THIS.GetLeader] добиться решительного окончания войны привела к полному и окончательному упадку боевого духа в наших войсках. День за днем солдаты складывают оружие или занимаются бандитизмом, бросая наше дело на произвол судьбы."
 china_motivated_soldiers: "Мотивированные солдаты"
 defend_nanjing_ANQ: "Оборона Нанкина" #NT!
 defend_nanjing_ANQ_desc: "«Дурацкий» гамбит, похоже, оправдал себя! После того, как Чэню удалось захватить Южную столицу, реализация своих амбиций в качестве маршала Новой лиги — всего лишь вопрос времени. Люди больше не будут подчиняться иностранным интересам, и Ци Сеюань больше не будет вонзать свои зубы в Лигу.\nПока Нанкин находится в пределах досягаемости [ROOT.GetLeader], мы будем сохранять эффекты этого духа на время Войны Лиги. §RОднако если Нанкин падет от наших рук, мы потеряем этот дух!§!\n\nТем не менее, мы сохраняем преимущество. Фу Чжан!" #NT!
 defend_nanjing_CHI: "Оборона Нанкина" #NT!
 defend_nanjing_CHI_desc: "Это славный день для китайской нации! Мало того, что Белому Солнцу удалось продвинуться далеко за пределы зоны повстанцев Минган, гордая Национально-революционная армия успешно захватила избранную столицу Гофу, Доктора Сунь. Когда Южная столица будет захвачена, нация обязательно последует за ней.\nПока Нанкин находится в пределах досягаемости [ROOT.GetLeader], мы будем сохранять эффекты этого духа на время Войны Лиги. §RОднако если Нанкин падет от наших рук, мы потеряем этот дух!§!\n\nТем не менее, мы сохраняем преимущество. Фу Чжан!" #NT!
 defend_nanjing_LEP: "Оборона Нанкина" #NT!
 defend_nanjing_LEP_desc: "Осажденная со всех сторон и окруженная врагами как внутри, так и снаружи, Лига, однако, сохраняет две сильные стороны: контроль над Южной столицей и храбрый, современный и образцовый Ушэн Ляньцзюнь. Маршал Лиги не может позволить таким вероломным насмешникам перенять его законную мантию!\nПока Нанкин находится в пределах досягаемости [ROOT.GetLeader], мы будем сохранять эффекты этого духа на время Войны Лиги. §RОднако если Нанкин падет от наших рук, мы потеряем этот дух!§!\n\nТем не менее, мы сохраняем преимущество. Фу Чжан!" #NT!
 defend_nanjing_SHD: "Оборона Нанкина" #NT!
 defend_nanjing_SHD_desc: "При самом любопытном повороте событий оказалось, что ни Чэнь Тяоюань, маршал Лиги, ни подлые гоминьдановские радикалы сумели захватить южную столицу. Вместо этого это был [ROOT.GetLeader] и его верные сотрудники! Под его руководством возникнет новое восточное государство...\nПока Нанкин находится в пределах досягаемости [ROOT.GetLeader], мы будем сохранять влияние этого духа на время Войны Лиги. §RОднако если Нанкин падет от наших рук, мы потеряем этот дух!§!\n\nТем не менее, мы сохраняем преимущество. Фу Чжан!" #NT!
  
