 # Shared (600-619) 
 CHN.foreignpolicy.600.t: "Китайско-[ROOT.GetAdjective] Переговоры" #NT!
 CHN.foreignpolicy.600.d: "С 1911 года Китай сильно пострадал от политической разобщенности, революций и полевых командиров. Наш выход на континент делает нас лишь последними потенциальными завоевателями древнего общества, но если мы не хотим напрямую финансировать восстановление Китая и бороться с затянувшимися повстанцами, бандитизмом и военачальниками, нам было бы разумно сотрудничать с местными союзниками и/или коллаборационистами в регионе. Наши агенты на местах начали переговоры как с местными фракциями, так и с политическими изгнанниками в надежде способствовать такому диалогу. В конечном итоге [ROOT.Capital.GetCapitalVictoryPointName] будет решать, в каком направлении двигаться. В конечном итоге решено провести переговоры с..." #NT!
 CHN.foreignpolicy.600.monarchy: "...китайские монархисты." #NT!
 CHN.foreignpolicy.600.pro_japanese: "...наш пул прояпонских союзников." #NT!
 CHN.foreignpolicy.600.federalists: "...Китайское федералистское движение." #NT!
 CHN.foreignpolicy.600.revolutionaries: "...Китайские революционеры." #NT!
 CHN.foreignpolicy.600.republicans: "...другие китайские республиканцы." #NT!
 CHN.foreignpolicy.600.cancel: "Мы воздержимся от принятия решения." #NT!
  
 # Monarchy (620-639) 
 CHN.foreignpolicy.620.t: "Переговоры с китайскими монархистами" #NT!
 CHN.foreignpolicy.620.d: "В 1911 году китайские революционеры свергли императора Сюаньтуна, тогдашнего двухлетнего Пуи. Это было кульминацией десятилетий политического, экономического и военного упадка Цин. Синьхайская революция включала в себя слияние республиканизма, радикализма и этнонационализма, а попытка Юань Шикая (подстрекаемая западными советниками) короновать себя как императора несколько лет спустя погрузила нацию в десятилетнюю эпоху военачальников.\n\nПолитическая поддержка монархии ограничена, хотя мнения смягчились из-за хаоса республиканского правления в последующие годы. Тем не менее, многие опасаются попыток установить монархию силой, и «эксцентричность» будущего монарха (теперь уже взрослого Пуи) также заставляет многих задуматься. Другие кандидаты на данный момент имеют слишком мало легитимности, чтобы предложить значимую альтернативу. Тем не менее, многие считают, что восстановление старой монархии может быть единственным способом восстановить баланс и стабильность в Китае." #NT!
 CHN.foreignpolicy.620.QIE: "Мы восстановим императора Цин." #NT!
 CHN.foreignpolicy.620.cancel: "Мы пока продолжим." #NT!
  
 # Japan Aligned (640-659) 
 CHN.foreignpolicy.640.t: "Реформация Республики" #NT!
 CHN.foreignpolicy.640.d: "Япония уже давно культивирует влияние в Китае, просматривая различных союзников и коллаборационистов в надежде расширить свое влияние на своего более густонаселенного соседа. Различные китайские фракции сотрудничали с Японией, либо из-за подлинного паназиатского идеализма, либо из-за веры в то, что две державы могут работать вместе против европейского империализма, либо из-за прагматического желания избежать войны или полного доминирования Японии, либо просто потому, что они хотели или нуждались в помощи Японии.\n\nБольшинство прояпонских сил в конечном итоге объединились с кликой Фэнтянь или с более широкой Национальной армией умиротворения (Аньгоцзюнь), с фракцией Чжан Цзолиня, кликой Шикан, Лигой восстановления (Лига восстановления). преемники Аньхойской клики) и Клики новых коммуникаций, все они имеют разную степень прояпонских симпатий. Более непосредственным спонсором Токио были Ассоциация Конкордия и Новое народное общество.\n\nВ число второстепенных японских союзников входят Чэнь Ляньбо и его торговое правительство в Гуанчжоу (Кантон), которые стремились углубить свои связи с Японией, чтобы противодействовать влиянию Чжили и Старого Гуанси. Точно так же наши агенты также работали над тем, чтобы привлечь на нашу сторону губернатора провинции Шаньси Янь Сишань.\n\nПоскольку старая республика была разрушена, должна быть сформирована новая - слияние конкурирующих проектов высоко фракционированной японской армии, флота и гражданского правительства. Наконец, необходимо принять решение о том, кто возглавит это «реформированное правительство»." #NT!
 CHN.foreignpolicy.640.FNG: "Давайте опираться на наши развитые сети в Шеньяне." #NT!
 CHN.foreignpolicy.640.GXC: "Давайте посмотрим на юг, на кантонских торговцев." #NT!
 CHN.foreignpolicy.640.SHX: "Давайте посмотрим на север, на коварного Янь Сишань." #NT!
 CHN.foreignpolicy.640.cancel: "Мы пока продолжим." #NT!
  
 # Federalists (660-679) 
 CHN.foreignpolicy.660.t: "Федерализм в Китае?" #NT!
 CHN.foreignpolicy.660.d: "Федерализм в Китае имеет сложную историю: краткий пик пришелся на начало 1920-х годов, за которым в последующие годы последовал быстрый спад. Тем не менее, оно сохраняет свою популярность среди тех, кто опасается тирании и коррупции центрального правительства, а движение федералистов в последние годы также впитало в себя демократические, конституционалистские и регионалистские элементы.\n\nУстановление федералистского правительства в Китае, вероятно, будет рассматриваться с подозрением как средство разделения и завоевания, хотя местные политики, которые могут получить выгоду от такой системы, могут быстро принять ее. Федералистское движение в Китае по своей природе политически разнообразно и разбросано. Лянгуан, Юньнань, Хунань, Сычуань и Чжэцзян являются, пожалуй, наиболее заметными центрами китайского федералистского движения." #NT!
 CHN.foreignpolicy.660.GXC: "Федералисты Гуанчжоу кажутся многообещающими." #NT!
 CHN.foreignpolicy.660.YUN: "Юго-запад всегда был крепостью федералистов." #NT!
 CHN.foreignpolicy.660.cancel: "Это кажется слишком надуманным..." #NT!
  
 # Republic (680-699) 
 CHN.foreignpolicy.680.t: "Новая Республика?" #NT!
 CHN.foreignpolicy.680.d: "После Синьхайской революции 1911 года была провозглашена новая республика. Эта Китайская Республика переживала огромные потрясения на протяжении всей эпохи военачальников, поскольку в Пекине доминировали сменявшие друг друга авторитарные лидеры. Названная «Республикой Бэйян», она стала печально известна своей коррупцией и авторитаризмом, но, тем не менее, идеализм первоначальной революции выжил. Даже наиболее циничные лидеры правительства все еще пытались сформировать нацию по своему образу, привнося смесь западного либерализма, китайского конфуцианства и других синкретических идеологий, чтобы попытаться обеспечить хорошее управление для народа. Вполне естественно, что мы передаем власть продолжению этого старого правительства." #NT!
 CHN.foreignpolicy.680.QIE: "Республика Бэйян будет восстановлена." #NT!
 CHN.foreignpolicy.680.LEP: "Мы создадим временную республику в Нанкине." #NT!
 CHN.foreignpolicy.680.SHX: "Мы доверяем хитрому губернатору Яну." #NT!
 CHN.foreignpolicy.680.cancel: "Мы пока продолжим." #NT!
  
 # Revolutionaries (700-719) 
 CHN.foreignpolicy.700.t: "Новая революция в Китае?" #NT!
 CHN.foreignpolicy.700.d: "Синьхайская революция 1911 года стала катастрофическим событием в китайской истории и открыла двери для процветания радикальных политических, социальных и экономических идей в китайском дискурсе. Но претворение идей в жизнь было трудным и стимулировало дальнейший раскол среди нового поколения социалистов, националистов и революционных республиканцев.\n\nДоктор. Сунь Ятсен и его Гоминьдан стали ведущей революционной партией в эпоху военачальников, но они не были одиноки. На протяжении многих лет возникали Гоминьцзюнь, Китайская синдикалистская партия, Всемирное общество, а также различные отколовшиеся и независимые группы, борющиеся за шанс изменить Китай по своему образу. Насильно насаждать революцию в Китае будет сложно, но это может навсегда изменить ход истории древней цивилизации." #NT!
 CHN.foreignpolicy.700.CHI: "Социалистический истеблишмент, конечно." #NT!
 CHN.foreignpolicy.700.GXC: "В конце концов, Гуанчжоу был домом революции!" #NT!
 CHN.foreignpolicy.700.SHX: "Гоминьцзюнь предлагает свежий взгляд." #NT!
 CHN.foreignpolicy.700.YUN: "Гуйчжоу был последним оплотом старой НРА!" #NT!
 CHN.foreignpolicy.700.cancel: "Это заходит слишком далеко..." #NT!
  
