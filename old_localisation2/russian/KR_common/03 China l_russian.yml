 ### Party Descs ### 
 CHN_radicals_party: "Радикалы"
 CHN_radicals_party_long: "Независимые радикалы и революционеры\n§LРеволюционное радикализм в Китае имеет захватывающую историю, восходящую к вечной борьбе мучеников и героев против предполагаемой несправедливости. Мобилизуя ярость масс, различные революционеры приходили и уходили, мирным путем или через огонь и войну. В основном объединяясь в различные партии, такие как Гоминьдан, или Партия молодого Китая, революционное течение мысли в значительной степени конкурирует с реформистским.\n\nОднако привлекательность радикализма распространяется по всему Китаю, от степей Северо-Западной границы до шумных улиц Шанхая, многие придерживаются идеалов радикально преобразованного Китая, будь то социалистический эгалитарный идеал или сильный националистический оттенок. Действуя под эгидой радикальных элементов Гоминьдана, Партии молодого Китая или Китайской синдикалистской партии, экстремистские группы отказываются участвовать в китайской парламентской системе, рассматривая новопровозглашенное Центральное правительство как предательство социалистической революции.§!\n"
  
 CHN_KMT_party: "Гоминьдан"
 CHN_KMT_party_long: "Китайская националистическая партия (Zhongguo Guomindang)\n§LКитайская националистическая партия за свою омраченную историю принимала множество форм. Основанный как парламентская организация Тунмэнхуэя в 1912 году Сунь Ятсеном, Хуан Сином и Сун Цзяожэнем, Гоминьдан стремился добросовестно выполнять функции парламентской партии в ранней республике Бэйян. Однако после убийства Суна и последовавших за этим многочисленных изгнаний Сунь была реорганизована в китайский Геминган, а позже, 10 октября 1919 года, возрождена как Гоминьдан. Посвященная Трем народным принципам, провозглашенным доктором Дж. Сунь Ятсен, Гоминьдан стремится к созданию партийно-государственного устройства, или Данго, и осуществлению трехэтапной национальной революции. Руководствуясь тремя принципами - Миньцзу, Миньцюань и Миньшэн (национализм, демократия и благосостояние соответственно), они надеются увидеть новую революционную республику.\n\nПытаясь объединить нацию в 1927 году с помощью Северной экспедиции, Гоминьдан и его национально-революционная армия в конечном счете потерпели неудачу в своих усилиях и были вынуждены бежать в горы повстанческой зоны Минган, провинция Гуйчжоу, а затем в Париж и Москву. Партия, охваченная междоусобицами, в значительной степени расколота на правое и левое крыло. Провозглашенный Ху Ханьмином и оставшимися армейскими группировками в Гуйчжоу, \"Правый Гоминьдан\" стремится к реализации принципов доктора Хунну. Идеология Sun без какого-либо чужеродного влияния синдикалистов и Интернационала. С другой стороны, \"Левый Гоминьдан\" проповедует жесткую социалистическую интерпретацию Трех принципов и поддерживает единство Объединенного фронта с Синдикалистской партией Китая\.\n\nОднако Гоминьдан в значительной степени расколот на множество фракций с обеих сторон, и еще предстоит выяснить, сможет ли некогда великая националистическая партия вернуть себе статус партии масс.§!\n"
  
 CHN_CSP_party: "КСП"
 CHN_CSP_party_long: "Китайская синдикалистская партия (Zhongguo Gongtuandang)\n§LКитайская синдикалистская партия, в основном сосредоточенная в городских центрах или портовых городах, на протяжении многих лет оставалась лишь разрозненной младшей партией китайского Гоминьдана. Считаясь мягкотелыми радикалами, исповедующими чуждую идеологию в стране, не обладающей такой же широкой поддержкой рабочих, как в Европе или Америке, Китайская синдикалистская партия, тем не менее, добилась значительных успехов в своей политической истории. Китайская синдикалистская партия сыграла ключевую роль в таких исторических событиях, как забастовки в Гонконге и Кантоне в 1925 году, приведшие к созданию Лиги китайских синдикалистов, или Шанхайское восстание 1932 года, вызвавшее масштабные массовые протесты по всей стране. В силу своей плюралистической природы, партия оказалась раздробленной, разделившись на ряд разрозненных группировок, таких как ортодоксальная фракция Чэнь Дусю и Ли Лисаня, радикальная фракция Чэнь Шаоюя, а также другие синдикалисты, например, северные группировки Ли Дачжао, южные группировки Тань Пиншаня и Дэн Чжунся, и региональные группировки, такие как Цай Хэсэнь в Хунани или У Юйчжан в Сычуани. Однако, несмотря на всю свою помпезность и браваду, КСП вряд ли является крупной политической силой в Китае — её основная сила и влияние сосредоточены лишь среди радикально настроенных студентов и рабочих..§!\n"
  
 CHN_FCDP_party: "ФКДП"
 CHN_FCDP_party_long: "Федерация китайских демократических партий (Zhongguo Minzhu Zhengtuan Tongmeng)\n§LСозданная во время кратковременной либерализации Чжили после 1928 года, Объединенная национальная строительная лига в конечном итоге была запрещена, но заложила основу для формирования Федерации китайских демократических партий. ФДКП стремится объединить под своим знаменем все партии страны, стремящиеся к конституционной, гражданской демократии, включая Китайскую конституционалистскую партию, Национальную федерацию спасения, Политический научный альянс, Китайское общество профессионального образования/Китайскую национальную ассоциацию демократического строительства, Демократическую социалистическую партию, Общество Полумесяца и множество других партий. С объединением страны и укреплением политических блоков, громоздкая ФДКП потеряла значительную часть своей поддержки, которая перешла к региональным или иным образом гораздо более распространенным полноценным партиям. Однако в этом вакууме она включила в свои ряды различные другие небольшие партии для укрепления своих позиций. В основном возглавляемая северными демократическими партиями и группировками, она позиционирует себя как альтернатива доминирующему на юге Великому республиканскому альянсу, уравновешивая консервативное, реформистское руководство с более динамичными активистами низового уровня.§!\n"
  
 CHN_GRA_party: "ВРЛ"
 CHN_GRA_party_long: "Великая республиканская лига (Gonghe Datongmeng)\n§LВеликая республиканская Лига — это квазилегальная политическая коалиция, состоящая в основном из партий Южного Китая, действующих в оппозиции к сложившемуся Бэйянскому политическому порядку. Сформированный в 1931 году после всплеска антиконцессионистских настроений и националистической агитации, последовавших за провалом переговоров между Чжили и Фэнтянем, Великий республиканский альянс ненадолго вступил в союз с отставным Дуань Цижуем, а также к нему присоединились другие «старые» федералистские группы, такие как Народно-правительственная партия Тан Цзияо в Юньнани и Движение за автономию Чжэцзяна Чу Фучэна, сформировавшие блок несоблюдения в Национальном собрании. В значительной степени сочувствующие GRA, но независимые, — это организации «Общество народного обновления» Чжао Хэнти и «Подготовительное управление федеральной автономии провинций» Сюн Кэву.\n\nС объединением страны и укреплением политических блоков Великий республиканский альянс возник не просто как южный политический альянс разрозненных партий, а как самостоятельная структура. Объединив множество демократических партий «старого» образца в единый инструмент для отстаивания дела демократической государственности Китая, они сумели поглотить значительную часть центристской поддержки внутри страны, хотя и остаются в основном влиятельными на Юге.§!\n"
  
 CHN_republicans_party: "Республиканцы"
 CHN_republicans_party_long: "Независимые республиканцы и интеллектуалы\n§LИнтеллектуальная традиция в китайской политической сфере была долгой, гордой и, безусловно, громкой. Многие политики, участвовавшие в ней, категорически и искренне отказывались от участия в каких-либо политических партиях, считая их коррумпированными и ограничивающими. Придерживаясь собственных принципов и прагматизма, а не идеологии, они в значительной степени являются теми самыми «джентльменами», которые стоят за прозвищем «Господская Республика» — Бэйянская Республика. Основав различные «аполитические» клики, ассоциации и общества, господствующие над навязчивыми партиями, республиканское наследие включает в себя такие организации, как Исследовательская клика Лян Цичао, Старая и Новая коммуникационные клики, Клуб Аньфу, Клуб Цзивэй, Клика политических наук, Общество «Стремление», Форум демократии и науки и многие другие. Объединённые общим стремлением к конституционному будущему с гражданским управлением, республиканцы, не желая организовываться на более высоком уровне, ограничили свои возможности. Действительно, по тому или иному вопросу они редко голосуют единым блоком, поскольку законодателей либо склоняют на свою сторону, либо подкупают, либо угрожают им. Тем не менее, они по-прежнему представляют собой влиятельную силу истеблишмента и вселяют надежду на демократическое будущее. Смирившись с реалиями, в которых они оказались, многие рассматривают возможность голосования вместе с другими основными демократическими фракциями, хотя и воздерживаются от формального членства.§!\n"
  
 CHN_CCP_party: "ККП"
 CHN_CCP_party_long: "$CHN_CCP_party_long_tt$\n§LКонституционалистская партия Китая, возглавляемая одним из \"Десяти учеников\" Кан Ювэя Сюй Цинем, является одной из самых давних политических партий и организаций в политической сфере Китая. Претендуя на свое наследие от конституционалистских усилий Кана и Лян Цичао в законодательном органе империи Цин, современная версия партии заявляет о себе как о потомке как первоначальных конституционалистов династии Цин, так и их более поздних последователей: Прогрессивной партии, Исследовательской клики и всех других политических усилий лянгистов. Объединенные своим стремлением к конституционализму и функционирующей китайской демократии (либеральной или нет), они доказали свою стойкость в китайской политике.Сформированные из ядра антиреволюционных, но выступающих за реформы политиков, они все больше оттеснялись на второй план в правительстве Бэйяна. Недолго поддерживая Юань Шикая, они порвали с ним в 1915 году и вновь заняли видное положение как оппозиция и партнеры партии-государства Аньфу. Провозглашенные Лян Цичао, они собрали бы широкую аудиторию сторонников Ляна, за исключением тех, кто был из Молодого Китая или из других стран. После смерти Ляна Сюй Цинь, Цзилу Кана, принял на себя роль китайского конституционалиста. Продвигаясь вперед, они хотят создать моралистическую, конфуцианскую, антивоенную китайскую демократию, которая придерживалась бы Конституции, как Евангелия. Столкнувшись с расколом из-за своей робкой поддержки правительства Бэйяна, она, тем не менее, остается сплоченной и последовательной силой в китайской политике, выступающей против полевых командиров и Данго.§!\n"
 CHN_CCP_party_long_tt: "Китайская Конституционалистская Партия (Zhongguo Xianzhengdang)"
  
 CHN_DCP_party: "ДКП"
 CHN_DCP_party_long: "Демократическая конституционалистская партия (Minzhu Xianzhengdang)\n§LЕще одна партия в длинном ряду партий, прославляющих реформаторов поздней династии Цин, таких как Лян Цичао и Кан Ювэй, — Демократическая конституционалистская партия — может считаться преемницей Китайской конституционалистской партии, а также, по тому же принципу, Прогрессивной партии, Исследовательской клики и т. д. Объединенные стремлением к конституционализму и функционирующей демократии, Демократические конституционалисты приняли эстафету, когда политики «старой гвардии» Китайской конституционалистской партии ушли на пенсию в новом политическом порядке. После ухода Сюй Циня с поста лидера КПК, его протеже и лидер «молодой гвардии» У Сяньцзы занял его место. Вместе с Ли Дамином новые Демократические конституционалисты продолжают отстаивать реформистскую конституционалистскую демократию, мирно реформируя республику в противовес революционной борьбе или радикальным массовым действиям. Считающиеся «правой» альтернативой Демократической социалистической партии, демократы-конституционалисты надеются вырваться из рамок, оставленных им китайским конституционалистским наследием, и по-настоящему работать над демократией, свободной от военачальников.§!\n"
  
 CHN_regionalists_party: "Регионалисты"
 CHN_regionalists_party_long: "Independent Regionalists and Strongmen\n§LПоражения на поле боя не искоренили все пережитки военачальниц в Китае. По всей стране до сих пор сохранились многочисленные последствия уничтожения крупных военачальников: от мелких клик, подчинившихся новым хозяевам в нужный момент, до подчиненных низшего ранга, нанятых новой администрацией, и иногда новых сильных лидеров, возникших из образовавшегося вакуума власти и воспользовавшихся своей связью с победителями. Тот факт, что многие лишь притворяются верными национальному делу, чтобы запугивать и эксплуатировать народ, не означает, что другие не пользуются подлинной популярностью — даже самые алчные люди эпохи верховных военачальников тщательно создавали прочные сети «гуаньси», охватывающие военные, гражданские и социальные круги. Харизматичные, влиятельные и часто коррумпированные, те, кто пережил перемены, мастерски используют регионалистские настроения, а также недовольство существующим положением вещей, и полны решимости пережить попытки их искоренения. Только время покажет, сколько поколений потребуется, чтобы по-настоящему искоренить ужасное наследие эпохи военачальников.§!\n"
  
 CHN_YCP_party: "Младокитайцы"
 CHN_YCP_party_long: "Партия младокитайцев (Zhongguo Qingniandang)\n§LПартия младокитайцев, зародившаяся в студенческом \"Обществе молодого Китая\", стала одним из преемников этого общества, разделившись на «националистическую», «социалистическую» и «идеалистическую» фракции, возглавляемые соответственно Цзэн Ци и Ли Хуаном, Ли Дачжао и Ван Гуанци. Отправившись во Францию ​​на учёбу, Цзэн Ци и Ли Хуан, а также другие члены их националистической фракции, вступили в конфликты с другими студентами во Франции, такими как Чжоу Эньлай, Цай Юаньпэй и Ли Шицзэн.\n\nИногда перераставшие в насилие, события, в которых китайская синдикалистская партия набирала силу и получала поддержку французского правительства, привели к тому, что Цзэн и Ли создали свою собственную партию, объявив о создании партии «Молодой Китай» в 1923 году под Парижем. Быстро развиваясь среди китайских студенческих организаций, партия «Молодой Китай» заняла конкретную позицию противостояния китайской социалистическому движению и гоминьдану. В 1924 году партия вернулась в Шанхай, основав ряд политических обществ и газет, и стала союзником У Пэйфу и Сунь Чуаньфана из клики Чжили. Благодаря поддержке военачальников Чжили, партия «Молодой Китай» стала единственной массовой партией, пользовавшейся поддержкой после провала Северной экспедиции Гоминьдана, что позволило ей значительно расширить свое влияние на многих военных офицеров и учебные заведения. Под руководством Цзэн Ци Молодежная коммунистическая партия надеется осуществить плебисцитарскую революцию, призывая к корпоративистским принципам политической организации, федерализму, национализму и, прежде всего, к защите конфуцианского Китая.§!\n"
