 CHN_integrate_major_dockyard_decision_desc: "[CHN_integrate_major_dockyard_desc_scripted_loc]"
  
 CHN_integrate_major_dockyard_yingkou_key: "Интегрировать военно-морскую верфь Инкоу"
 CHN_integrate_major_dockyard_yingkou_desc_key: "Порт Инкоу расположен в стратегически важном месте в Желтом море, занимая контролирующую позицию вдоль реки Даляо и Ляодунского залива. После того как Далянь (Порт-Артур) перешел под контроль Японии, Инкоу стал фактически единственным портом, находящимся под прямым контролем клики Фэнтянь, и на его расширение было выделено значительное (хотя и недостаточное) финансирование, чтобы сделать его домом для своего флота. Очевидно, что они многому научились у своих японских партнеров, и мы должны быть в состоянии использовать этот набор навыков для развития собственного флота"
  
 CHN_integrate_major_dockyard_jiangnan_key: "Интегрировать верфи Цзяннаня"
 CHN_integrate_major_dockyard_jiangnan_desc_key: "Цзяннаньская верфь была основана в 1865 году для строительства, ремонта и прикрытия как военных, так и гражданских судов. Расположенный недалеко от Янцзы и в основном в пределах могущественного порта Шанхая, Цзяннань является одним из главных центров судостроения во всем Китае. Долгое время он находился под контролем правительства Бэйяна, но создание Городов-легионов существенно изменило динамику. Тем не менее, они извлекли выгоду из внешних инвестиций и опыта, которые мы должны взять под свой контроль для более равноправного будущего"
  
 CHN_integrate_major_dockyard_mawei_key: "Интегрировать Фучжоуский арсенал"
 CHN_integrate_major_dockyard_mawei_desc_key: "Арсенал Фучжоу, также известный как Арсенал Фучоу или Арсенал Мавэй, был создан по приказу лидеров поздней династии Цин Ли Хунчжана и Цзо Цзунтана в нескольких милях вверх по реке Мин. Используя гордое военно-морское наследие Фуцзяня и местные военно-морские академии, арсенал в Фучжоу дополнил регион, предоставив военно-морской док по западному проекту, металлообрабатывающую кузницу и дополнительные школы навигации и морской техники. Поврежденный в ходе последующих войн, он был восстановлен и остался выдающейся верфью, хотя и под контролем легации. Добившись его возвращения, мы должны использовать его по максимуму, чтобы помочь нам построить современный флот"
  
 CHN_integrate_major_dockyard_whampoa_key: "Интегрировать доковую компанию Вампоа"
 CHN_integrate_major_dockyard_whampoa_desc_key: "Доковая компания Гонконга и Вампоа была основана Дугласом Лапрайком и Томасом Сазерлендом в 1866 году. Часто сокращенно называемая Whampoa Dock или Kowloon Docks, она фактически монополизировала судостроение в дельте Жемчужной реки в 1870-х годах. Кантон традиционно был центром внешней торговли, а его расположение делало его одновременно и активом, и целью в Южно-Китайском море. Мы интегрируем эти вновь приобретенные объекты в наш военно-морской флот"
  
 CHN_integrate_major_dockyard_dagu_key: "Интеграция верфи Дагу" #NT!
 CHN_integrate_major_dockyard_dagu_desc_key: "Верфь Дагу, основанная в 1880 году Ли Хунчжаном в Дагу, изначально занималась ремонтом только кораблей для Бэйянского флота. Два года спустя она начала производить военные корабли, а в 1891 году даже производила огнестрельное оружие, например, морские пушки. Оккупированная в 1900 году державами и возвращенная Китаю два года спустя, верфь Дагу оставалась заметной в эпоху военачальников. Он также отличался производством пулеметов европейской разработки для Военно-морского министерства." #NT!
  
 CHN_integrate_major_dockyard_fallback_key: "Интегрировать верфи в регионе [FROM.GetName]"
 CHN_integrate_major_dockyard_fallback_desc_key: "[FROM.GetName] стал неплохим центром военно-морского строительства с мощной коллекцией сухих доков, верфей и центров подготовки военно-морского персонала. Став его новыми хозяевами, мы должны максимально использовать их опыт на благо нации"
  
 #Shared Industry Decisions 
 CHN_build_guangxi_arsenal: "Постройте арсенал Гуанси." #NT!
 CHN_build_guangxi_arsenal_desc: "Будучи одной из самых бедных провинций Китая, Гуанси вряд ли является подходящим местом для индустриализации. «Арсенал Гуанси» является детищем Ли Цзунжэня и Хуан Шаохуна для реорганизации существующих заводов по производству оружия в Гуанси, которые вплоть до прихода к власти «Новой клики Гуанси» просто производили «земляные ружья» низкого качества или другие почти архаичные винтовки. Вдохновленный образцами винтовок клики Юньнани, недавно открытый Гуансиский арсенал стремится производить винтовки, порох, бомбы, гранаты, пулеметы и даже копии немецких бомб и минометных снарядов." #NT!
  
 CHN_refurbish_the_shijing_arsenal: "Восстановить арсенал Шицзин" #NT!
 CHN_refurbish_the_shijing_arsenal_desc: "Основанное на 11-м году правления императора Гуансюй, первоначальное Машиностроительное бюро Гуанчжоу было объединено с Оружейным бюро Цзэнбу и стало Восточным производственным бюро. Продукт движения вестернизации, большая часть оборудования и машин завода управляется немецкими инженерами - наследие, которое еще не осталось неизменным, поскольку влияние Германии в Китае преобладало после победы Германии в Мировой войне. Тем не менее, арсенал начинает показывать свой возраст, и мы должны проявлять должную осмотрительность в обслуживании и обновлении арсенала, чтобы обеспечить производство более современного оружия, что позволит нам производить не только винтовки, но и ручные пулеметы." #NT!
  
 CHN_build_guangxi_aircraft_assembly_plant: "Построить авиасборочный завод в Гуанси." #NT!
 CHN_build_guangxi_aircraft_assembly_plant_desc: "В условиях, когда в сельской, бедной провинции Гуанси полным ходом идет индустриализация, многие из ведущих чиновников клики Нового Гуанси, а именно Бай Чунси и Хуан Сючу, стремились сделать Гуанси первым шагом в великой модернизации военного потенциала Китая. Наблюдая за строительством недавно получившего название «Завод по сборке самолетов в Гуанси», мы очень надеемся, что такое расширение нашего военного потенциала наконец даст Китаю возможность разместить современный воздушный флот, если не сейчас, то, по крайней мере, в будущем." #NT!
  
 CHN_evacuate_military_industry: "Эвакуация военной промышленности во внутренние районы" #NT!
 CHN_evacuate_military_industry_desc: "Поскольку большая часть предприятий тяжелой промышленности Китая расположена в прибрежных регионах страны, угроза войны, которая охватит наше побережье, подвергает нашу промышленность риску. В это время кризиса мы будем стремиться переместить оружейную промышленность во внутренние части страны, которые мы контролируем, чтобы сохранить ее использование для наших военных усилий." #NT!
  
 CHN_evacuate_civilian_industry: "Эвакуируйте гражданскую промышленность во внутренние районы" #NT!
 CHN_evacuate_civilian_industry_desc: "Поскольку большая часть предприятий тяжелой промышленности Китая расположена в прибрежных регионах страны, угроза войны, которая охватит наше побережье, подвергает нашу промышленность риску. В это время кризиса мы будем стремиться переместить гражданские предприятия во внутренние части страны, которые мы контролируем, чтобы сохранить их использование для наших военных усилий." #NT!
 CHN_war_time_relocation_tt: "§LЕсли уделять этому внимание, решения о §Yпереносе военной промышленности§! и §Yпереносе гражданской промышленности§! будут дешевле!§!" #NT!
  
