 MAN_revolt_against_bonus_idea: "Марш против Маньчжурии" #NT!
 MAN_revolt_against_bonus_idea_desc: "При непоколебимой поддержке своих повелителей маньчжурское государство прорвало сцену объединения Китая, захватив под свой контроль Поднебесную. Голоса как внутри страны, так и за рубежом находятся в замешательстве, споря о том, можно ли вообще считать эту версию Китая Китаем.\n\nВ любом случае, правительство Маньчжурии наткнулось на последний набор препятствий, поскольку региональные правительства на периферии разочаровались. Объединяя своих сторонников против предполагаемых злоупотреблений, эти претенденты разворачивают кампанию по свержению потенциальных правителей Китая. Их успех зависит от способности их армий противостоять новой центральной армии и с поднятыми знаменами они идут на войну." #NT!
  
 QIE_manchu_revolt_against_bonus_idea: "Марш против Цин" #NT!
 QIE_manchu_revolt_against_bonus_idea_desc: "Несмотря на многочисленные трудности и даже попытку государственного переворота со стороны их собственных спонсоров Чжили, династия Айсин Гиоро сохранила свой Небесный Мандат, а император снова объединил Китай под своим нефритовым троном после Синьхайской революции. Хотя Цин всегда были популярными претендентами на власть в Китае, они сталкивались и преодолевали каждое препятствие, пока, казалось, не осталось ни одного.\n\nНо они праздновали слишком рано. Опьяненные своей властью, они наткнулись на еще один ряд препятствий, поскольку региональные правительства на периферии разочаровались. Объединяя своих сторонников против предполагаемых злоупотреблений, эти претенденты разворачивают кампанию по свержению потенциальных правителей Китая. Их успех зависит от способности их армий противостоять новой центральной армии и с поднятыми знаменами они идут на войну." #NT!
  
