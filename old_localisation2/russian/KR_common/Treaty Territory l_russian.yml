 ### Tooltips ### 
 gitmo_ended_tt: "Удалить §YАренда Гуантанамо§!\n§WДействующие изменения:\n(§Y[820.owner.GetNameWithFlag]§!) Гражданская промышленность из выбранной страны: §R-5.00%§!§!"
 gitmo_ended2_tt: "Удалить §YАренда Гуантанамо§!\n§WДействующие изменения:\n(§Y[PREV.GetNameWithFlag]§!) Гражданская промышленность для выбранной страны: §G-5.00%§!§!"
  
 ### Events ### 
 treaty_territory_events.1.t: "Захват [treatyport_whichisit]" #NT!
 treaty_territory_events.1.d: "С началом войны наши силы немедленно двинулись, чтобы взять под свой контроль [treatyport_whichisit], и после непродолжительной борьбы вышли победителями." #NT!
 treaty_territory_events.1.a: "Нация снова едина!" #NT!
  
 treaty_territory_events.2.t: "Захват малых территорий" #NT!
 treaty_territory_events.2.d: "С началом войны наши мелкие территориальные владения были захвачены. Соответствующие договоры были разорваны, а наш персонал эвакуирован. После победы в этой войне, возможно, мы вернем их." #NT!
 treaty_territory_events.2.a: "Мы вернем их достаточно скоро." #NT!
  
 treaty_territory_events.3.t: "Захват [treatyport_whichisit2]" #NT!
 treaty_territory_events.3.d: "Наши силы взяли под контроль концессию в [treatyport_whichisit2]. Судьба территории будет решена с завершением войны." #NT!
 treaty_territory_events.3.a: "Маленькая победа." #NT!
  
 treaty_territory_events.4.t: "Захват [treatyport_whichisit2]" #NT!
 treaty_territory_events.4.d: "Войска [FROM.GetAdjective] захватили наши силы, дислоцированные в [treatyport_whichisit2]. По крайней мере, сейчас [treatyport_whichisit2] находится в руках врага." #NT!
 treaty_territory_events.4.a: "Мы вернем его достаточно скоро." #NT!
  
 treaty_territory_events.5.t: "Возвращение [treatyport_whichisit2]" #NT!
 treaty_territory_events.5.d: "После возвращения [treatyport_whichisit2] территория была возвращена под иностранный контроль." #NT!
 treaty_territory_events.5.a: "Горько-сладкий момент." #NT!
  
 treaty_territory_events.6.t: "Возвращение [treatyport_whichisit2]" #NT!
 treaty_territory_events.6.d: "[treatyport_whichisit2] вернулся под наш контроль и снова работает." #NT!
 treaty_territory_events.6.a: "Ура!" #NT!
  
 treaty_territory_events.7.t: "Отзыв [treatyport_whichisit2]" #NT!
 treaty_territory_events.7.d: "[treatyport_whichisit2] снова пойман. Однако, учитывая нынешнее состояние войны с повелителем территории, вместо того, чтобы вернуть территорию под иностранный контроль, территория была полностью реинкорпорирована." #NT!
 treaty_territory_events.7.a: "Пусть мы выиграем эту великую войну." #NT!
  
 treaty_territory_events.8.t: "Отзыв [treatyport_whichisit2]" #NT!
 treaty_territory_events.8.d: "[FROM.GetName] объявил об аннулировании договора аренды [treatyport_whichisit2]." #NT!
 treaty_territory_events.8.a: "Мы вернем его." #NT!
  
 treaty_territory_events.9.t: "Конец концессии [treatyport_whichisit2]" #NT!
 treaty_territory_events.9.d: "С захватом [FROM.GetNameDef] вражеских сил мы больше не обязаны идти на уступки – и наши силы уже двинулись вперед, чтобы захватить их." #NT!
 treaty_territory_events.9.a: "Маленькая победа." #NT!
