 world_news_events.478.a: "Законное правительство вернулось!" #NT!
 world_news_events.478.b: "Триумф дипломатии!" #NT!
 world_news_events.478.c: "Почему они не могли договориться раньше?" #NT!
 world_news_events.478.e: "Неужели у Алжира нет достоинства!?" #NT!
  
 world_news_events.482.t: "Олимпийские игры 1936 года в Дублине" #NT!
 world_news_events.482.d: "Одиннадцатые Олимпийские игры недавно прошли в Дублине, Ирландия.\n\nИгры, демонстрирующие столицу молодой республики, стали для нее большим источником гордости. И снова французские и британские делегаты отсутствовали, синдикалистские державы не были признаны Международным олимпийским комитетом, а правительствам изгнания не хватало людей для отправки.\n\nНаибольших успехов добились немецкие и американские спортсмены, завоевавшие 27 и 26 медалей, в то время как ирландские спортсмены выступили выше среднего, выиграв 9 медалей." #NT!
 world_news_events.482.a: "Ирландия снова побеждает!" #NT!
 world_news_events.482.b: "Будем надеяться, что мы сможем принять участие в следующих Олимпийских играх..." #NT!
 world_news_events.482.c: "Элитарная чушь." #NT!
 world_news_events.482.e: "Мы сделали все возможное!" #NT!
  
 world_news_events.483.t: "Олимпийские игры 1940 года в Токио" #NT!
 world_news_events.483.d.war: "Двенадцатые Олимпийские игры планировалось провести в Токио, Япония, но обстоятельства привели к их отмене.\n\nПоскольку [JAP.GetNameDef] оказалась в состоянии войны, средств на проведение игр не было, а были высказаны опасения по поводу безопасности спортсменов. Впервые со времен Великой войны Олимпийские игры отменяются.\n\nЯпонское правительство пыталось лоббировать в Международном олимпийском комитете проведение следующей серии игр, однако неясно, переживут ли эти игры кризис." #NT!
 world_news_events.483.d.def: "Двенадцатые Олимпийские игры планировалось провести в Токио, Япония, однако обстоятельства привели к их отмене.\n\nПоскольку [JAP.GetNameDef] восстанавливается после поражения в войне, средств на проведение игр не было. Впервые со времен Великой войны Олимпийские игры отменяются.\n\nЯпонское правительство пыталось лоббировать в Международном олимпийском комитете проведение следующей серии игр, однако неясно, переживут ли эти игры кризис." #NT!
 world_news_events.483.d.paz: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nБудучи первой незападной страной, принявшей это мероприятие, японское правительство вложило значительные ресурсы в обеспечение того, чтобы оно хорошо отразилось на них. Хотя недавние международные беспорядки поставили под вопрос возможность проведения игр, они, тем не менее, состоялись, хотя и с участием значительно меньшего количества стран по сравнению с прошлыми играми.\n\nНаибольших успехов добились немецкие и американские спортсмены, заработавшие 32 и 21 медали, в то время как японские спортсмены выступили выше среднего, выиграв 16 медалей." #NT!
 world_news_events.483.d.ger: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nБудучи первой незападной страной, принявшей это мероприятие, японское правительство вложило значительные ресурсы в обеспечение того, чтобы оно хорошо отразилось на них. Хотя недавние международные волнения поставили под вопрос возможность проведения игр, они, тем не менее, состоялись, хотя и с участием значительно меньшего количества стран по сравнению с прошлыми играми.\n\nНаибольших успехов добились немецкие спортсмены, заработавшие 34 медали, в то время как японские спортсмены выступили выше среднего, выиграв 16 медалей. Из-за продолжающейся Гражданской войны в США Соединенные Штаты не приняли в ней участия." #NT!
 world_news_events.483.d.usa: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nБудучи первой незападной страной, принявшей это мероприятие, японское правительство вложило значительные ресурсы в обеспечение того, чтобы оно хорошо отразилось на них. Хотя недавние международные беспорядки поставили под вопрос возможность проведения игр, они, тем не менее, состоялись, хотя и с участием значительно меньшего количества стран по сравнению с прошлыми играми.\n\nНаибольших успехов добились американские спортсмены, заработавшие 34 медали, в то время как японские спортсмены выступили выше среднего, выиграв 16 медалей. Из-за продолжающейся войны [GER.GetNameDef] не участвовал." #NT!
 world_news_events.483.d.jap: "Двенадцатые Олимпийские игры недавно прошли в Токио, Япония.\n\nБудучи первой незападной страной, принявшей это мероприятие, японское правительство вложило значительные ресурсы в обеспечение того, чтобы оно хорошо отразилось на них. Хотя недавние международные беспорядки поставили под вопрос возможность проведения игр, они, тем не менее, состоялись, хотя и с участием значительно меньшего количества стран по сравнению с прошлыми играми.\n\nВ отсутствие американских и немецких спортсменов, команды России и Японии завоевали наибольшее количество медалей, заработав 26 и 22 соответственно." #NT!
 world_news_events.483.a: "Это неправильно, это было наше!" #NT!
 world_news_events.483.b: "Удачи в следующий раз..." #NT!
 world_news_events.483.c: "Еще одно великолепное выступление!" #NT!
  
  # The New Internationale 
 world_news_events.484.t: "«Интернационал» реформируется" #NT!
 world_news_events.484.d: "Лондон и Париж, бьющиеся сердца Социалистического и Синдикалистского Интернационала, с тех пор пали от рук реакционных сил, что нанесло серьезный удар по всемирному делу социализма. С тех пор социалистические мыслители начали критиковать сам синдикализм, задаваясь вопросом, может ли он функционировать как эффективная революционная сила.\n\nНесмотря на это, кажется, что дело социализма еще не умерло - новый Интернационал возник из пепла старого. [INT.GetName] взяли на себя мантию революции, а [INT.GetLeader] заявляют, что они отомстят за своих павших товарищей в Западной Европе.\n\nВремя будет окончательным судьей, поскольку только послезавтрашние дни скажут нам, добьются ли они успеха или снова падут, как их предшественники..." #NT!
 world_news_events.484.a: "Отомстите за Вилле Люмьера!" #NT!
 world_news_events.484.b: "Заблуждения демагогов..." #NT!
 world_news_events.484.c: "Паразиты разбегаются!" #NT!
