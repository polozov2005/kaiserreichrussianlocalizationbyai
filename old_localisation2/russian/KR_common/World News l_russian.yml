  # Russia starts the war 
 world_news_events.1.t: "Россия вторгается в Рейхспакт" #NT!
 world_news_events.1.d.starts_wk: "В течение двух десятилетий Германия и Россия жили в мире. Несмотря на враждебность, вызванную поражением России в Великой войне, цена пяти лет внешней и гражданской войны была высока - и ни одна из сторон не хотела платить ее снова. Не все были уверены, что это продлится.\n\nСегодня скептики оказались правы: после многих лет военного перевооружения и реваншистских настроений Россия отказалась от Брест-Литовского договора и заявила о своем намерении силой отменить то, что они называют немецким господством над Восточной Европой. В то время как Германия и ее союзники мобилизуются против этой давно опасающейся угрозы, поступили сообщения о российских артиллерийских ударах по немецким позициям через российскую границу - это начало второй великой войны за поколение, которая потрясла европейский континент." #NT!
 world_news_events.1.d.joins_wk: "Начало войны между Интернационалом и Германией, хотя и долгожданное, стало драматическим шоком: в последний раз, когда шла война между великими державами Европы, она быстро распространилась по спирали и охватила весь континент. Даже если бы они не стали действовать немедленно, уже было очевидно, что Россия, давний восточный враг Германии, в последние годы становится все более воинственной.\n\nПосле долгих ожиданий, [RUS.GetLeader] сегодня рано утром произнес речь, заявив, что в свете последних лет немецкая гегемония в мире никогда не была более чем мифом. Хотя о войне речь шла лишь косвенно, в остальном речь была воинственной, за которой последовали агрессивные позиции армии вдоль границы с Россией. И снова Германии придется вести войну на два фронта." #NT!
 world_news_events.1.d.sov: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на идеологическую оппозицию друг другу, ужасы Великой войны тяготили всех – и ни одна из сторон не была готова повторить их. Не все были уверены, что это продлится.\n\nСегодня скептики оказались правы: после многих лет военного перевооружения и реваншистских настроений Россия отказалась от Брест-Литовского договора и заявила о своем намерении силой отменить то, что они называют немецким господством над Восточной Европой. В то время как Германия и ее союзники мобилизуются против этой давно опасающейся угрозы, остальные члены Интернационала издали собственные приказы о мобилизации в поддержку своего союзника - начало второй великой войны за поколение, которая потрясла европейский континент." #NT!
 worldnews_rus_vs_ger_RUS: "Мы пройдем маршем через Бранденбургские ворота."
 worldnews_rus_vs_ger_GER: "Готовьте Оствалл."
 worldnews_rus_vs_ger_GER_allies: "Наши узы не будут разорваны."
 worldnews_rus_vs_ger_FRA: "Германия наконец-то показывает слабость..."
 worldnews_rus_vs_ger_ENG: "Полагаю, время почти пришло."
 worldnews_rus_vs_ger_INT_allies: "Война, которая подтолкнет народ к оружию."
 worldnews_rus_vs_ger_NFA: "Их битва бросает тень на Францию..."
 worldnews_rus_vs_ger_ENT: "Социалисты не могли упустить такой шанс, конечно..."
 worldnews_rus_vs_ger_ENT_allies: "И если Германия занята на востоке, то..."
 worldnews_rus_vs_ger_JAP: "Пусть дерутся..."
  
  # France starts the war 
 world_news_events.2.t: "Война в Западной Европе" #NT!
 world_news_events.2.d.starts_wk: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на идеологическую оппозицию друг другу, ужасы Великой войны тяготили всех – и ни одна из сторон не была готова повторить их. Не все были убеждены, что это продлится.\n\nСегодня скептики оказались правы: после многих лет роста реваншизма и военной экспансии французское правительство в Париже официально заявило, что оно больше не связано Версальским договором, и объявило революционную войну, чтобы вернуть утраченные территории и освободить немецкий пролетариат, а Берлин в ответ объявил Францию ​​государством-изгоем. Французские и немецкие войска уже перестрелялись в Эльзасе-Лотарингии, что стало началом второй великой войны за поколение, которая потрясла европейский континент." #NT!
 world_news_events.2.d.joins_wk: "Начало войны между Россией и Германией, хотя и долгожданное, стало драматическим шоком: в последний раз, когда шла война между великими державами Европы, она быстро распространилась по спирали и охватила весь континент. Даже если бы они не начали действовать немедленно, все могли бы видеть, что Третий Интернационал, соперник Германии на западе, в последние годы становится все более напористым.\n\nПосле нескольких напряженных недель [FRA.GetLeader] сегодня рано утром произнес речь, назвав войну «искрой финального конфликта» и заявив, что Франция обязана действовать в этот решающий момент. Хотя это и не имело прямой ссылки на Россию, намерения в отношении Германии были ясны, что подтверждалось крупными перемещениями армии по Эльзасу-Лотарингии. И снова Германии придется вести войну на два фронта." #NT!
 worldnews_int_vs_ger_FRA: "Встаньте, узники голода."
 worldnews_int_vs_ger_ENG: "И Британия будет там."
 worldnews_int_vs_ger_RUS_socialist: "Мы сделаем то, что не смог сделать Керенский."
 worldnews_int_vs_ger_INT_allies: "Финальный конфликт."
 worldnews_int_vs_ger_GER: "Германия, объединившись, никогда не была побеждена."
 worldnews_int_vs_ger_GER_allies: "Революция закончится здесь."
 worldnews_int_vs_ger_RUS: "Но если Германия отвлечется на запад..."
 worldnews_int_vs_ger_NFA: "Пусть коммунары подавятся своими амбициями."
 worldnews_int_vs_ger_ENT: "Вот оно. У нас никогда не будет лучшего шанса."
 worldnews_int_vs_ger_ENT_allies: "Их война, которая скоро станет нашей."
 worldnews_int_vs_ger_JAP: "Запад смотрит в сторону..."
  
  # Germany starts the war, vs Russia 
 world_news_events.3.t: "Германия вторгается в Россию" #NT!
 world_news_events.3.d.starts_wk: "В течение двух десятилетий Германия и Россия жили в мире. Несмотря на враждебность, вызванную поражением России в Великой войне, цена пяти лет внешней и гражданской войны была высока – и ни одна из сторон не хотела платить ее снова. Не все были убеждены, что так будет продолжаться.\n\nСегодня скептики оказались правы: после многих лет растущей милитаризации и вызовов германскому мировому порядку Германия заявила, что Россия неоднократно нарушала Брест-Литовский договор, и решила еще раз заставить Россию соблюдать его. Поскольку Россия отвергла немецкий ультиматум, было замечено, что немецкие войска вступают в бой через российскую границу, от Балтики до Черного моря - начало второй великой войны за поколение, которая потрясла европейский континент." #NT!
 world_news_events.3.d.joins_wk: "Начало войны между Интернационалом и Германией, хотя и долгожданное, стало драматическим шоком: в последний раз, когда шла война между великими державами Европы, она быстро распространилась по спирали и охватила весь континент. Даже если бы они не стали действовать немедленно, уже было очевидно, что Россия, давний восточный враг Германии, в последние годы становится все более агрессивной.\n\nЧего никто не ожидал, так это того, что Германия будет первой стрелять - только сегодня канцлер Германии обвинила Россию в систематическом подрыве как Брест-Литовского договора, так и глобальной стабильности в целом вместе с Интернационалом в неприкрытой попытке восстановить свое господство над Восточной Европой - прежде чем отдать приказ атаковать Россию граница. И снова Германии придется вести войну на два фронта." #NT!
 world_news_events.3.d.sov: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на идеологическую оппозицию друг другу, ужасы Великой войны тяготили всех – и ни одна из сторон не была готова повторить их. Не все были уверены, что так будет продолжаться.\n\nСегодня скептики оказались правы: после многих лет растущей милитаризации и вызовов немецкому мировому порядку Германия обвинила Россию в неоднократном нарушении Брест-Литовского договора с одобрения Третьего Интернационала и заявила о своем намерении обеспечить соблюдение договора. Социалистические правительства в Европе и за ее пределами мобилизуют свои армии и обещают прийти на защиту России – это начало второй великой войны за поколение, которая потрясет европейский континент." #NT!
 worldnews_ger_vs_rus_RUS: "Тогда они присоединятся к Наполеону."
 worldnews_ger_vs_rus_GER: "На этот раз мы не будем останавливаться на достигнутом."
 worldnews_ger_vs_rus_GER_allies: "Наши снова будут победившей стороной"
 worldnews_ger_vs_rus_FRA: "Враг моего врага..."
 worldnews_ger_vs_rus_ENG: "Неужели они серьезно!"
 worldnews_ger_vs_rus_INT_allies: "Долго им это с рук не сойдет"
 worldnews_ger_vs_rus_NFA: "Вы не думаете, что есть что-то более важное?"
 worldnews_ger_vs_rus_ENT: "Ужасное чувство приоритета!"
 worldnews_ger_vs_rus_ENT_allies: "Если Германия чертовски хочет отвлечься..."
 worldnews_ger_vs_rus_JAP: "Ха! Пусть они сотрут друг друга в порошок."
  
  # Germany starts the war, vs Internationale 
 world_news_events.4.t: "Война в Западной Европе" #NT!
 world_news_events.4.d.starts_wk: "В течение двух десятилетий Германия и Третий Интернационал жили в мире. Несмотря на идеологическую оппозицию друг другу, ужасы Великой войны тяготили всех – и ни одна из сторон не была готова повторить их. Не все были уверены, что это продлится.\n\nСегодня скептики оказались правы: после многих лет растущей милитаризации и вызовов германскому мировому порядку Берлин обвинил Интернационал в попытке подорвать мир и стабильность в Европе и за рубежом и заявил о своем намерении свергнуть его революционные правительства силой. В то время как Париж и ее союзники клянутся отомстить реакции, французские позиции возле Вердена, Нанси и других городов снова оказались под огнем - это начало второй великой войны за поколение, которая потрясла европейский континент." #NT!
 world_news_events.4.d.joins_wk: "Начало войны между Россией и Германией, хотя и долгожданное, стало драматическим шоком: в последний раз, когда шла война между великими державами Европы, она быстро распространилась по спирали и охватила весь континент. Даже если бы они не начали действовать немедленно, все могли бы видеть, что Третий Интернационал, соперник Германии на западе, в последние годы становился все более напористым.\n\nЧего никто не ожидал, так это того, что Германия будет стрелять первой - сегодня рано утром канцлер Германии обвинил Интернационал в организации дестабилизации во всем мире и помощи России в рамках "лиги хаоса", предполагаемых действиях, описанных как военные действия - а затем мобилизовал Хеер вдоль французской границы. И снова Германии придется вести войну на два фронта." #NT!
 worldnews_ger_vs_int_FRA: "Они не пройдут."
 worldnews_ger_vs_int_ENG: "Мы будем держать здесь красный флаг."
 worldnews_ger_vs_int_RUS_socialist: "Но это не 1917 год."
 worldnews_ger_vs_int_INT_allies: "Они не смогут избежать удара истории."
 worldnews_ger_vs_int_GER: "Эта революция будет подавлена."
 worldnews_ger_vs_int_GER_allies: "Другого выбора не было."
 worldnews_ger_vs_int_RUS: "Пусть они никогда не увидят Париж."
 worldnews_ger_vs_int_NFA: "Коммуна обрекает Францию на новые унижения."
 worldnews_ger_vs_int_ENT: "Это заняло у них достаточно много времени."
 worldnews_ger_vs_int_ENT_allies: "Германия наконец-то исправляет свою ошибку."
 worldnews_ger_vs_int_JAP: "Германия перенапрягается."
  
 world_news_events.7.t: "Кризис на Дунае" #NT!
 world_news_events.7.d.pluralism: "Во время австро-венгерского Ausgleich в 1937 году австрийцы пообещали автономным государствам своей империи, что меньшинства в Транслейтании также получат автономию. Венгры, однако, не пожелали пойти на демонтаж своего государства и привилегий внутри монархии.\n\nВ результате австрийцы объявили о своем намерении как унизить Венгрию, так и освободить словаков, трансильванцев и русинов силой, и уже начались стычки вдоль австро-венгерской границы.\n\nТолько время покажет судьбу бывшей двойной монархии." #NT!
 world_news_events.7.d.illyria: "Во время австро-венгерского Ausgleich 1937 года австрийские делегаты пообещали своим венгерским коллегам, что историческое Королевство Хорватия, добавленное к недавно созданному Королевству Иллирия десять лет назад, будет возвращено транслейтанской половине Империи. Венгры вскоре попытались продвинуться в Хорватию-Славонию, но были встречены на границе иллирийскими войсками, которые отказались впустить венгров на свою землю.\n\nСтычки между венграми и иллирийцами теперь переросли в войну, в которой два мощных центра двойной монархии в Австрии и Венгрии противостоят бывшим автономным компонентам, все из которых опасаются возобновления дуализма. Однако на Галицию-Лодомерию присматриваются ее соседи..." #NT!
 world_news_events.7.d.hungary: "Во время австро-венгерского Ausgleich 1937 года австрийские делегаты пообещали своим венгерским коллегам, что историческое Королевство Хорватия, добавленное к недавно созданному Королевству Иллирия десять лет назад, будет возвращено транслейтанской половине Империи. Вскоре венгры потребовали, чтобы Вена выполнила свою часть сделки, но имперское правительство неожиданно отказалось. Разгневанные венгры попытались силой вернуть Хорватию-Славонию, но получили отпор со стороны иллирийских войск.\n\nТеперь Австрия вступила в конфликт в пользу иллирийцев, поклявшись положить конец иллюзиям Венгрии о господстве над Империей." #NT!
 world_news_events.7.a: "Стабильность Центральной Европы находится под угрозой." #NT!
 world_news_events.7.b: "Противоречия империализма очевидны." #NT!
  
 world_news_events.13.t: "«Наш звездный час»" #NT!
 world_news_events.13.d: "Британский политик и бывший лорд Адмиралтейства Уинстон Черчилль опубликовал новую книгу, относящуюся к развивающемуся жанру, известному как «альтернативная история», и посвященную Великой войне.\n\nВ этой истории рассказывается о молодом британском солдате, возвращающемся из победоносной кампании в Галлиполи в мире, радикально отличающемся от нашего. На этом временном графике Теодор Рузвельт и его партия Bull Moose побеждают на президентских выборах в США в 1912 году, что приводит к вступлению Америки в Вельткриг и победе Антанты. Побежденная и частично оккупированная Германия охвачена постоянными экономическими и политическими кризисами, является свидетелем поражения белых в Гражданской войне в России и находится под ударом озлобленного и крайне националистического Адама Дресслера. Он возглавляет Немецкую рабочую партию, которая следует идеологии «Народного социализма», крайней версии национал-популизма.\n\nРоман заканчивается началом трехсторонней войны между «Новым Рейхом» Дресслера, Западной Антантой во главе с доминирующей Британской империей и Советской Россией во главе с Сергеем Кировым. Книга разделила критиков: одни хвалят ее внимание к деталям, другие критикуют ее за серьезные недостатки в исторической логике. Черчилль заметил, что «нечто подобное могло произойти и в другой вселенной»." #NT!
 world_news_events.13.a: "Какая детская фантазия." #NT!
  
 world_news_events.16.t: "Чилийско-аргентинская война!" #NT!
 world_news_events.16.d: "Напряженность между двумя региональными державами нарастала уже много лет, поскольку идеологические разногласия отдаляли страны все дальше и дальше.\n\nПоддержка Чили ФОП в Патагонии и неспособность Аргентины подавить восстание наконец переросли в драку, когда совместное наступление аргентинской армии и Армады встретило сильное сопротивление на Рио-Негро, когда чилийские войска открыли огонь по наступающим аргентинским войскам." #NT!
 world_news_events.16.a: "Тревожное развитие событий." #NT!
 world_news_events.16.b: "Аргентина воссоединится!" #NT!
  
 world_news_events.18.t: "Основание Белградского пакта" #NT!
 world_news_events.18.desc_rom_gre: "Сербия, Румыния и Греция, три балканских члена Антанты, придерживающиеся собственных реваншистских взглядов, недавно собрались за общим столом переговоров и объявили о начале Белградского пакта. Хотя этот пакт уделяет большое внимание культурным дискуссиям и сохранению балканской идентичности, он также представляет собой военный союз между участниками, по-видимому, направленный на то, чтобы страна разделяла их и удерживала их «земли предков».\n\nЭто новое развитие событий является большой занозой в болгарском доминировании на Балканах, но только новая реакция других центральных держав может определить, принесет ли это какие-либо плоды." #NT!
 world_news_events.18.desc_only_romania: "Сербия, Румыния и Греция, три балканских члена Антанты, придерживающиеся собственных реваншистских взглядов, недавно собрались за общим столом переговоров. В то время как Греция дистанцировалась от создания военного союза, Сербия и Румыния объявили о начале Белградского пакта. В этом пакте большое внимание уделяется культурным дискуссиям и сохранению балканской идентичности, но он также, по-видимому, направлен против страны на их южной границе, удерживающей их «земли предков».\n\nЭто новое развитие событий является большой занозой в болгарском доминировании на Балканах, но только новая реакция других центральных держав может определить, принесет ли это какие-либо плоды." #NT!
 world_news_events.18.desc_only_greece: "Сербия, Румыния и Греция, три балканских члена Антанты, придерживающиеся собственных реваншистских взглядов, недавно собрались за общим столом переговоров. В то время как Румыния дистанцировалась от создания военного союза, Сербия и Греция объявили о начале Белградского пакта. В этом пакте большое внимание уделяется культурным дискуссиям и сохранению балканской идентичности, но он также, по-видимому, направлен на то, чтобы страна разделила их и удерживала свои «земли предков».\n\nЭто новое развитие событий является большой занозой в болгарском доминировании на Балканах, но только новая реакция других центральных держав может определить, принесет ли это какие-либо плоды." #NT!
 world_news_events.18.a: "Надеюсь, Балканы не начнут новую мировую войну." #NT!
 world_news_events.18.b: "Вместе против Болгарии!" #NT!
 world_news_events.18.c: "Это не может быть хорошо..." #NT!
  
 world_news_events.37.t: "Четвертая Балканская война" #NT!
 world_news_events.37.d: "На Балканах после Вельткрига возродилась страна - Великая Болгария, титан полуострова, объединявший все болгарские земли и за ее пределами. Однако это королевство для всех болгар родилось с кровопролитием и войной, победив Сербию, Грецию и Румынию в Вельткриге, шаг, о котором эти три страны до сих пор горько отзываются.\n\nЭта напряженность привела к формированию Белградского пакта, и этот союз балканских государств теперь объявил войну царству, снова ввергая регион в конфликт. Сможет ли [BUL.GetLeader] спасти свой народ от этой подавляющей силы, или его королевство снова будет разделено?" #NT!
 world_news_events.37.a: "Что с Балканами и все время войной?" #NT!
 world_news_events.37.b: "Вместе к победе!" #NT!
 world_news_events.37.c: "История повторится еще раз!" #NT!
  
 world_news_events.121.t: "Война за Верхнюю Савойю!" #NT!
 world_news_events.121.d: "Мир с нарастающим опасением наблюдал за тем, как Французская Коммуна выдвигала все более агрессивные требования контроля над оккупированным Швейцарией регионом Верхняя Савойя. Этот регион был оккупирован швейцарскими войсками после окончания Вельткрига, и отказ Берна признать правительство Коммуны в Париже в качестве законного владельца территории с тех пор обострил напряженность между двумя странами.\n\nОднако сегодня, вместо продолжения переговоров и дипломатических действий, следующим шагом в переговорах стал артиллерийский огонь, когда французские войска пересекли границу со Швейцарией. Переговоры провалились, и, похоже, французы готовы вернуть себе трофей силой, если понадобится." #NT!
 world_news_events.121.enemies: "В ответ на революционную активность в западношвейцарских регионах Романдия и Верхняя Савойя швейцарские вооруженные силы двинулись на подавление восстания.\n\nРеволюционеры обратились за помощью к соседней Французской Коммуне, которая предъявила ультиматум швейцарскому правительству в Берне с требованием прекратить подавление синдикалистских элементов в стране. Швейцарское правительство отказалось, и Французская Коммуна мобилизовала свои силы для поддержки швейцарских революционеров." #NT!
 world_news_events.121.a: "Так заканчивается мир." #NT!
 world_news_events.121.b: "Война за наше выживание." #NT!
 world_news_events.121.c: "Боритесь с империалистами!" #NT!
 world_news_events.121.e: "Французы будут уничтожены." #NT!
  
 world_news_events.122.t: "Синдикалистские революционеры в Швейцарии" #NT!
 world_news_events.122.d: "Из маленькой горной республики Швейцарии приходят хаотичные сообщения о том, что революционеры-синдикалисты вошли в столицу Берн. В Швейцарии уже давно существуют проблемы с синдикалистским активизмом в ее западных франкоязычных регионах Верхняя Савойя и Романдия, но никогда еще революционные силы в ней не действовали так открыто против правительства.\n\nС учетом скорости и эффективности революционных сил многие подозревают прямое участие Французской Коммуны, которая уже давно агитирует за уступку франкоязычных земель.\n\nХотя в других частях страны и вокруг нее идут бои, кажется, что Синдикалистские силы пока удерживают столицу." #NT!
 world_news_events.122.enemies: "Из маленькой горной республики Швейцарии поступают хаотичные сообщения о том, что революционеры-синдикалисты захватили западные регионы Романии и оккупировали Верхнюю Савойю после подавления швейцарскими военными в этом регионе. Поддерживая успешных швейцарских революционеров, французские войска быстро двинулись, чтобы оккупировать регион, а швейцарские военные заняли оборонительную позицию, не желая атаковать французские орудия.\n\nПохоже, что скорость революционных действий застала швейцарское правительство врасплох, и они не желают перерастать насилие в полноценную войну с Францией. Еще неизвестно, что швейцарцы будут делать дальше." #NT!
 world_news_events.122.a: "Как это могло произойти?" #NT!
 world_news_events.122.b: "Разорвите цепи!" #NT!
 world_news_events.122.c: "Замечательный!" #NT!
 world_news_events.122.e: "Это прямо на нашей границе!" #NT!
  
 world_news_events.145.t: "Крах Рейхспакта" #NT!
 world_news_events.145.d: "Кажется, произошло немыслимое! Сегодня немецкие войска, сражающиеся в Европе, окончательно рухнули под тяжестью вторгающихся армий. Поскольку бежать было некуда, кайзер и его кабинет встретились и согласились, что полная капитуляция неизбежна в течение нескольких дней.\n\nЭта новость привела их союзников в полное замешательство, а структура, предложенная альянсом Рейхспакта, полностью испарилась. Ясно, что мировой порядок, существовавший со времени окончания Первого Вельткрига, вот-вот придет к огненному концу." #NT!
  #Generic: 
 world_news_events.145.a: "Кайзеррейх вот-вот падет..." #NT!
  #Commune of France: 
 world_news_events.145.b: "L'Internationale кажется человеческим жанром..." #NT!
  #Union of Britain: 
 world_news_events.145.c: "Поднимите высоко алое знамя!" #NT!
  #Austria: 
 world_news_events.145.e: "Австрия теперь является единственной немецкой державой." #NT!
  #Russia: 
 world_news_events.145.f: "Унижение Брест-Литовска отомщено!" #NT!
  #Russia (socialist): 
 world_news_events.145.g: "Чего царь так и не смог добиться..." #NT!
  #Canada: 
 world_news_events.145.h: "Теперь Германия знает, каково это — потерять все." #NT!
  #Nat France: 
 world_news_events.145.i: "Резня Вельткрига отомщена" #NT!
  
 world_news_events.164.t: "Перу-Боливийская Конфедерация восстановлена" #NT!
 world_news_events.164.d: "Похоже, что старая идея возродилась в Южной Америке. Первоначальная Конфедерация между Перу и Боливией, которую многие региональные враги рассматривали как потенциальную угрозу, была разорвана на части победившим Чили после битвы при Юнгае в 1839 году. Тем не менее, эта новая Конфедерация, в отличие от своей предшественницы, смогла доказать свою способность поддерживать себя в эти нестабильные времена в Южной Америке и во всем мире.\n\nНаблюдатели как за рубежом, так и внутри страны отметили, однако, что существует ряд ключевых вопросов, которые необходимо решить между Ла-Пасом и Лимой до создания новой государство действительно можно назвать единой нацией." #NT!
 world_news_events.164.a: "Мечта о Санта-Крусе снова сбылась." #NT!
  
 world_news_events.177.t: "Австрия вмешивается во второй Вельткриг" #NT!
 world_news_events.177.d: "Некоторые военные умы в Европе полагали, что любая неизбежная континентальная война закончится в считанные месяцы благодаря мощным новым технологическим достижениям. Однако любые сохраняющиеся заблуждения о масштабах современной войны быстро исчезли перед лицом жарких рассказов о жестокости, исходящих из опустошенной конфликтами Западной Европы.\n\nВена с трепетом наблюдала за перевооружением синдикалистских держав в течение многих лет, но теперь, когда открытый конфликт угрожает нарушить баланс сил в Европе, они решили открыто вмешаться в борьбу против Интернационала. Имперские войска уже выступают против синдикалистских сил, создавая новую угрозу мировой революции." #NT!
 world_news_events.177.a: "Без них Вельткриг не был бы." #NT!
  
 world_news_events.442.t: "Русско-Османская конвенция" #NT!
 world_news_events.442.d: "Поразив наблюдателей со всего мира, сегодня вечером была активирована до сих пор совершенно секретная российско-османская конвенция, когда русский медведь начал свою освободительную войну в Восточной Европе. Пакт, детали которого до сих пор остаются в секрете, как сообщается, включает в себя раздел Ближнего Востока, Центральной Азии и Кавказа в сферах влияния Османской империи и России, а также пакт о ненападении между Москвой и [TUR.Capital.GetCapitalVictoryPointName].\n\nХотя временный союз между двумя державами стал неожиданностью, наблюдатели уже поспешили отметить, что он вряд ли продержится очень долго, поскольку многовековые соперники в конечном итоге неизбежно вступят в войну." #NT!
 world_news_events.442.a: "Самое шокирующее событие." #NT!
  
 world_news_events.449.t: "[pact_declares_war_on_aus_title]" #NT!
 world_news_events.449.t.afterbalkanwar: "Пятая Балканская война" #NT!
 world_news_events.449.t.duringbalkanwar: "Балканская война распространяется" #NT!
 world_news_events.449.t.beforebalkanwar: "Сербия объявляет войну [AUS.GetNameDef]" #NT!
 world_news_events.449.d: "[pact_declares_war_on_aus_desc]" #NT!
 world_news_events.449.d.afterbalkanwar: "Хотя Сербия потерпела поражение в Вельткриге и почти десять лет была оккупирована Австрией, она не была сокрушена навсегда.\n\nРазгромив своих врагов в Болгарии и отвоевав Черногорию и Македонию, [SER.GetNameDef] посмотрел в сторону южных славянских земель Австро-Венгерской империи. Вместе со своими союзниками в Румынии и Восточной Европе сербы предъявили Австро-Венгрии ультиматум о передаче им всех заявленных территорий. Монархия, естественно, отказалась, и поэтому австрийцы снова находятся в состоянии войны с Сербией. Только время покажет, одержат ли они победу снова или же Империя рухнет под тяжестью своих внутренних и внешних врагов." #NT!
 world_news_events.449.d.duringbalkanwar: "Хотя Сербия потерпела поражение в Вельткриге и почти десять лет была оккупирована Австрией, она не была сокрушена навсегда.\n\nСовместно со своими союзниками в Румынии и Греции [SER.GetNameDef] развязала войну против [BUL.GetNameDef] в надежде вернуть утраченные земли на юге. Но похоже, что ирредентизм [SER.GetAdjective] смотрит и на север, поскольку теперь страна предъявила [AUS.GetNameDef] ультиматум о передаче им всех заявленных территорий. Монархия, естественно, отказалась, и поэтому австрийцы снова находятся в состоянии войны с Сербией. Только время покажет, победят ли они снова, или же рухнет ли Империя под тяжестью своих внутренних и внешних врагов." #NT!
 world_news_events.449.d.beforebalkanwar: "Хотя Сербия потерпела поражение в Вельткриге и была оккупирована Австрией почти десять лет, она не была разгромлена навсегда.\n\nВ шокирующем повороте начала Вельткрига Королевство Сербия выдвинуло ультиматум Австро-Венгерской монархии с требованием вернуть южнославянские территории под власть Габсбургов. Монархия, естественно, отказалась от этих требований, и между сербами и австрийцами сейчас существует состояние войны. Только время покажет, выйдут ли сербы победителями или их постигнет та же участь, что и во время Вельткрига." #NT!
 world_news_events.449.a: "[pact_declares_war_on_aus_option]" #NT!
 world_news_events.449.a.afterbalkanwar: "Пороховая бочка снова взрывается." #NT!
 world_news_events.449.a.duringbalkanwar: "Война на Балканах продолжает расширяться." #NT!
 world_news_events.449.a.beforebalkanwar: "Станет ли это началом второго Вельткрига?" #NT!
 world_news_events.449.b: "Свобода или смерть!" #NT!
 world_news_events.449.c: "Нам стоит испугаться?" #NT!
  
 world_news_events.450.t: "Шестая Балканская война" #NT!
 world_news_events.450.d: "После поражения Австро-Венгрии в результате Белградского пакта победители начали ссориться между собой, как это было после Первой Балканской войны. Есть много нерешенных вопросов - Западный Банат, Адриатическое побережье - и негласная цель доминирования на Балканах, которую разделяют румынское и сербское правительства.\n\nВновь разразилась война на Балканах, и только время покажет, кто победит и нарисует карту региона на долгие годы." #NT!
 world_news_events.450.a: "Это просто продолжается!" #NT!
 world_news_events.450.b: "Наша нация будет едина!" #NT!
  
 world_news_events.456.t: "Третий Вельткриг" #NT!
 world_news_events.456.d.britain_no_france: "Объединенный союз, положивший конец синдикалистам, подошел к концу. После недолгого, но непростого мира руководство Антанты решило, что просто не может сосуществовать с рейхспактом, который продолжает мечтать о господстве в Европе. Восстановленное Соединенное Королевство сплотило различных членов Антанты, включая французских изгнанников из Алжира, чтобы начать еще одну глобальную войну в надежде окончательно вернуть себе Метрополь. И снова, в небе и на море, старые разбитые империи Европы снова сталкиваются.\nГраждане враждующих держав оказываются в опасности, как никогда раньше, с новым и разрушительным оружием, более совершенным, чем то, что только что использовалось во Втором Вельткриге. Кажется, мир снова охвачен разрушительным Вельткригом." #NT!
 world_news_events.456.d.no_britain_yes_france: "Объединенный союз, положивший конец синдикалистам, подошел к концу. После недолгого, но непростого мира руководство Антанты решило, что просто не может сосуществовать с рейхспактом, который продолжает мечтать о господстве в Европе. Правительство Канады, все еще находящееся в изгнании, сплотило различных членов Антанты, включая ее французских союзников, вернувшихся в Метрополь после последней войны, чтобы начать еще одну глобальную войну в надежде окончательно вернуть себе Великобританию.\nСнова в небе и на морях старые разбитые империи Европы снова сталкиваются. Граждане враждующих держав оказались в опасности, как никогда раньше, с новым и разрушительным оружием, более совершенным, чем то, которое использовалось совсем недавно. Кажется, мир снова охвачен разрушительным Вельткригом." #NT!
 world_news_events.456.d.no_britain_no_france: "Поражение Третьего Интернационала от рук Рейхспакта привело к тому, что наблюдатели считали продолжением мировой гегемонии Германии. Однако старый Союз Антанты никогда не оставлял надежд вернуть себе родину, и теперь они прибегли к объявлению войны Германии. Обе стороны готовы поставить на кон все и потребовать от другой не меньше, чем безоговорочную капитуляцию.\nХотя океаны могут разделить фракции, граждане этих враждующих стран оказываются в опасности из-за появления нового смертоносного оружия, превосходящего те, которые использовались во второй великой войне. Хотя правительства всего мира могут надеяться на мирное возвращение к довоенному мировому порядку, похоже, что снова разразится новый Вельткриг." #NT!
 world_news_events.456.d.no_britain_no_france_yes_america: "Наблюдатели полагали, что крах Третьего Интернационала ознаменует продолжение мировой гегемонии Германии. Однако Альянс Антанты никогда не оставлял надежд вернуть себе родину и объявил войну Германии. Хотя некоторые могут сомневаться в мощи изгнанных европейских держав, их поддерживает вся промышленная и военная мощь восстановленной американской нации, которая еще может склонить чашу весов против Берлина.\nХотя огромные океаны могут разделить воюющие державы, граждане воюющих стран все еще опасаются за свои жизни, поскольку появляется новое и более смертоносное оружие, превосходящее то, что использовалось во Втором Вельткриге. В то время как страны всего мира надеются на возвращение к довоенному мировому порядку, похоже, что новый Вельткриг охватит земной шар пламенем войны." #NT!
 world_news_events.456.d.britain_france: "Несмотря на формирование единой коалиции, приведшей к разгрому синдикалистов, противники Первого Вельткрига вновь перешли к войне. Вновь немецкая и французская армии сражаются друг с другом на полях северной Франции, а Королевский флот и Кайзерлишская морская пехота сражаются в открытом море, поскольку обе фракции стремятся обеспечить гегемонию над миром.\nГраждане Европы, недавно пережившие великую войну, будут вынуждены пережить потенциально еще более смертоносную войну, поскольку появится новое оружие и технологии, превосходящие те, которые использовались во Втором Вельткриге. В то время как страны всего мира надеются на возвращение к довоенному мировому порядку, кажется, что мир снова охватывает новый Вельткриг." #NT!
 world_news_events.456.d.britain_france_america: "Несмотря на формирование единой коалиции, приведшей к разгрому синдикалистов, противники Первого Вельткрига вновь перешли к войне. Еще раз немецкая и французская армии сражаются друг с другом на полях северной Франции, а Королевский флот и Кайзерлихская морская пехота сражаются в открытом море, поскольку обе фракции стремятся обеспечить гегемонию над миром.\nХотя наблюдатели не сомневаются в силе немецкой нации, недавно воссоединенная и обновленная промышленная мощь Соединенных Штатов может быть всем, что нужно Антанте для победы. Граждане Европы, недавно пережившие великую войну, будут вынуждены пережить потенциально еще более смертоносную войну по мере появления нового оружия и технологий, превосходящих Второй Вельткриг. Мир является свидетелем еще одного Вельткрига, еще более ужасающего, чем предыдущие." #NT!
 world_news_events.456.a: "Месть – сильная вещь." #NT!
 world_news_events.456.b: "Какая надежда у них еще может быть?" #NT!
 world_news_events.456.c: "Мы победили их в 1919 году, можем победить и сейчас." #NT!
 world_news_events.456.e: "На этот раз мы победим!" #NT!
  
 world_news_events.457.t: "Париж против Москвы" #NT!
 world_news_events.457.d.entente_alive: "Второй Вельткриг не закончился падением Германии, а продолжился, когда Антанта и Интернационал столкнулись в Северной Африке и Северной Атлантике. Теперь в кузницах русской военной машины загорается новая надежда на Антанту - на всем протяжении границы между российской и французской сферами «Сумеречная борьба» сэра Уинстона Черчилля переросла в борьбу за мировой порядок, настолько кровавую, что, кажется, она посрамила бы войну 1940 года.\n\nЗа линией фронта граждане воюющих держав находятся в опасности, как никогда прежде, с появлением воздушных машин смерти, которые угрожают уничтожать целые города в течение нескольких часов после объявления войны. По мере того, как обе стороны мобилизуются, немногие остатки довоенного мира задаются вопросом: успокоится ли когда-нибудь Европа?" #NT!
 world_news_events.457.d.entente_dead: "Мир знал, что Европа тревожно спала после поражения Германии. После победы Третьего Интернационала над колониальными империями в Африке и Центральной Европе только Россия могла встать на пути мирового господства синдикалистов. Теперь российская и французская идеологические системы, выкованные из пепла поражения от Германии, столкнутся в борьбе за мировой порядок, настолько кровавой, что, кажется, она посрамит Второй Вельткриг.\n\nЗа линией фронта граждане воюющих держав находятся в опасности, как никогда раньше, с появлением воздушных машин смерти, которые угрожают стереть с лица земли целые города в течение нескольких часов после объявления войны. По мере того, как обе стороны мобилизуются, немногие остатки довоенного мира задаются вопросом: успокоится ли когда-нибудь Европа?" #NT!
 world_news_events.457.a: "Очевидно, нет." #NT!
 world_news_events.457.b: "Мы раздавим революцию, как в 1814 году!" #NT!
 world_news_events.457.c: "Это последняя битва!" #NT!
 world_news_events.457.d: "Если русские на нашей стороне, победа обеспечена!" #NT!
  
 world_news_events.459.t: "Вторая китайско-японская война" #NT!
 world_news_events.459.d.northeastern_gambit: "Напряженность между Китаем и Японией уже давно росла, причем последняя поддерживала конкурирующую клику Фэнтянь в Маньчжурии, чтобы защитить свои интересы в регионе. Видя, что японцы отвлечены войной за немецкие колонии в Восточной Азии, [CUF.GetLeader] сделал смелый риск, объявив войну Японии и [716.owner.GetAdjective] союзникам.\n\nХотя все еще сильно разделены между собой, общественное давление вынудило многие правительства военачальников объединиться в Объединенный китайский фронт для борьбы с Японией в момент ее уязвимости. Объединенный фронт по-прежнему сталкивается с большими трудностями, но они надеются, что японцы будут перегружены. Еще неизвестно, совершили ли Токио или [CUF.Capital.GetCapitalVictoryPointName] большую ошибку." #NT!
 world_news_events.459.d.fengtian_losing: "Напряженность между Китаем и Японией уже давно росла, причем последняя поддерживала конкурирующую клику Фэнтянь в Маньчжурии, чтобы защитить свои интересы в регионе. Когда разразилась война между Фэнтянем и [china.GetNameDef], его преследовала перспектива японской интервенции, если [FNG.GetLeader] не сможет добиться успеха.\n\nПо мере того, как война затягивалась, а правительство Фэнтянь обнаруживало, что победа отодвигается всё дальше и дальше, эти опасения оправдались, когда они были вынуждены обратиться за помощью к своему благодетелю в Токио. [china.GetLeader] уже назвал [FNG.GetLeader] «японской болонкой» и заявил, что иностранное вмешательство является доказательством его подчинения. Две древние цивилизации снова оказались в состоянии войны." #NT!
 world_news_events.459.d.japan_and_fengtian: "Напряженность между Китаем и Японией уже давно росла, причем последняя поддерживала конкурирующую клику Фэнтянь в Маньчжурии, чтобы защитить свои интересы в регионе. Хотя Токио ясно дал понять, что не допустит никакого посягательства Китая на свою сферу влияния в Маньчжурии, [china.GetNameDef] не испугался, осудив «японский империализм» и пообещав, что не подчинится иностранным требованиям.\n\nПоэтому, когда [china.GetNameDef] и [FNG.GetNameDef] наконец столкнулись, Япония присоединилась к конфликту на стороне последнего. [china.GetLeader] назвал [FNG.GetLeader] предателем всей нации и «японской болонкой» за его действия. Две древние цивилизации снова оказались в состоянии войны." #NT!
 world_news_events.459.d.japan_versus_fengtian: "Интересы Японии уже давно связаны с Маньчжурией: Токио оказывает военную и экономическую помощь правящей клике Фэнтянь в обмен на то, что ее лидер Чжан Цзолинь обещает уважать японские интересы. Однако эти отношения были сопряжены с трудностями, поскольку маршал Цзолинь пытался держать японцев на расстоянии.\n\nТеперь отказ [FNG.GetNameDef] удовлетворить любые дальнейшие требования Японии привел к разрыву отношений между двумя странами. Японская империя поклялась убрать [FNG.GetLeader], объявив его нынешнюю администрацию «вышедшей из-под контроля», в то время как [FNG.GetNameDef] официально занял антиконцессионистскую позицию и пообещал раз и навсегда изгнать японцев из Китая." #NT!
 world_news_events.459.d.default: "Переговоры между Японией и [china.GetNameDef] прервались после того, как китайцы заявили, что больше не будут терпеть японское вторжение на континент. Сообщения из Японии показывают, что страна более чем готова начать полноценное вторжение в Китай впервые почти за пятьдесят лет.\n\nПо мере того, как войска начинают сталкиваться, выживание Китая кажется мрачным, учитывая мощь и превосходство японской военной машины. Страна сейчас сталкивается с величайшей опасностью за свою двухтысячелетнюю историю, поскольку вмешательство Запада кажется маловероятным, а эти державы изо всех сил пытаются бороться со своими собственными кризисами. Битва за Китай покажет, оживут ли планы Японии по созданию «Великой Восточной Азии» или же китайский дракон наконец пробудится от своего сна." #NT!
 world_news_events.459.a: "Вансуй!" #NT!
 world_news_events.459.b: "Банзай!" #NT!
 world_news_events.459.c: "На карту поставлена ​​судьба Китая" #NT!
  
 world_news_events.463.t: "Литовско-Белорусская Федерация" #NT!
 world_news_events.463.d.blr: "Восточная Европа пережила взлет и падение многих государств после Великой войны, но никто не мог предсказать, что новым членом региона будет [BLR.GetNameDef]. Несмотря на различия между двумя народами, белорусское правительство неустанно работало над их исправлением, обещая автономию и равенство.\n\nВ конце концов, все было готово к тому, чтобы [BLR.GetLeader] объявило о создании [BLR.GetNameDef], союза между двумя странами, который предположительно ведет свое начало со времен Великого княжества Литовского. Будущее Федерации, возможно, неизвестно, но несомненно, что судьбы Беларуси и Литвы переплелись." #NT!
 world_news_events.463.d.lit: "Восточная Европа пережила взлет и падение многих государств после Великой войны, но никто не мог предсказать, что новым членом региона будет [LIT.GetNameDef]. Несмотря на различия между двумя народами, литовское правительство неустанно работало над их сближением, обещая автономию и равенство.\n\nВ конце концов, все было готово к тому, чтобы [LIT.GetLeader] объявило о создании [LIT.GetNameDef], союза между двумя странами, который предположительно ведет свое начало со времен Великого княжества Литовского. Будущее Федерации, возможно, неизвестно, но несомненно, что судьбы Беларуси и Литвы переплелись." #NT!
 world_news_events.463.a: "Отличный!" #NT!
 world_news_events.463.b: "Как неожиданно." #NT!
  
 world_news_events.470.t.wk2: "Французские изгнанники вмешиваются в мировую войну" #NT!
 world_news_events.470.t.before_wk2: "Гражданская война во Франции возобновляется" #NT!
 world_news_events.470.d.wk2: "После двух десятилетий подготовки возвращения на родину французские изгнанники в Алжире решили перехватить инициативу и воспользоваться продолжающимся мировым кризисом, объявив войну странам-членам Третьего Интернационала.\n\nПоскольку революционный альянс занят борьбой с Германией, силы Антанты полагают, что теперь у них есть шанс вернуться домой и подавить революции, которые их вытеснили раз и навсегда. Несмотря на риторику Антанты, вопрос о том, смогут ли старые имперские державы высадиться на своей материковой территории, остается открытым и во многом зависит от удачи и щедрости их старого немецкого врага." #NT!
 world_news_events.470.d.before_wk2: "Хотя номинально после Британской революции 1925 года в мире в основном царил мир, правда в том, что войне пришлось подождать. После Великой войны революции в Британии, Франции и Италии не уничтожили их старые правительства, а просто отправили их за границу, готовясь с тех пор к окончательной конфронтации.\n\nЭта конфронтация кажется уже близкой. Всего несколько часов назад средиземноморские патрули Национальной морской пехоты внезапно изменили направление — прямо в сторону вод Коммунара. Хотя морское противостояние между французскими правительствами не является чем-то необычным, приближающиеся суда не пытаются изменить курс. Силы коммунаров уже приведены в состояние повышенной боевой готовности, понимая, что их война больше не ждет." #NT!
 world_news_events.470.a: "Мы вернемся домой!" #NT!
 world_news_events.470.b: "Они могут нам пригодиться..." #NT!
 world_news_events.470.c: "Эти реакционеры едва ли причинят нам неприятностей,\nмы легко раздавим их." #NT!
 world_news_events.470.e: "Антанта действительно не сдается." #NT!
  
 world_news_events.471.t.wk2: "Канада вмешивается в Вельткриг" #NT!
 world_news_events.471.t.before_wk2: "Война в Северной Атлантике" #NT!
 world_news_events.471.d.wk2: "После окончания британской революции новое синдикалистское правительство в Лондоне обнаружило, что в течение полутора десятилетий смотрело на старое правительство в изгнании в Оттаве по ту сторону Атлантики, причем ни одна из сторон не желала и не могла нарушить последовавший за этим напряженный мир.\n\nСегодня этот странный статус-кво окончательно рухнул, поскольку канадское правительство заявило, что они больше не будут ждать, чтобы «продолжить борьбу». Сообщения о крупных мобилизациях и агрессивных военно-морских действиях, а также слухи о координации действий с Рейхспактом, похоже, подтверждают, что Канада втянула себя и своих союзников во Второй Вельткриг." #NT!
 world_news_events.471.d.before_wk2: "Хотя номинально после Британской революции 1925 года в мире в основном царил мир, правда в том, что войне пришлось подождать. После Великой войны революции в Британии, Франции и Италии не уничтожили их старые правительства, а просто отправили их за границу, готовясь с тех пор к окончательной конфронтации.\n\nЭта конфронтация кажется уже близкой. Ранее сегодня канадские военные корабли начали насильственный захват ряда британских торговых судов, пересекающих Атлантику, что выглядит как скоординированный шаг. Хотя известно, что между двумя военно-морскими силами случаются разногласия, на этот раз кажется, что Королевский флот не отступает, а вместо этого с намерением движется к республиканским водам. Республиканский флот ответил тем же: их война больше не ждет." #NT!
 world_news_events.471.a: "Это наш единственный шанс вернуться домой!" #NT!
 world_news_events.471.b: "Похоже, что мы будем не единственными, кто\nуправляет войной на два фронта." #NT!
 world_news_events.471.c: "Они не смогут подавить революцию!\nМы их снова победим!" #NT!
 world_news_events.471.e: "Потерпит ли снова поражение Антанта и не даст ли революция революция?" #NT!
  
 world_news_events.474.t: "Война в восточных морях" #NT!
 world_news_events.474.d.ger: "За последнее столетие Азия превратилась в континент, на котором в значительной степени доминируют западные державы, и хотя именно эти державы сменились с Лондона и Парижа на Берлин, этот факт остался неизменным, к большому гневу Токио. Однако теперь этот статус-кво грозит разрушиться, поскольку [JAP.GetNameDef] и [GER.GetNameDef] начинают войну.\n\nНесмотря на надежды на мир, многие считают такой поворот событий неизбежным. Японские планы создания Азии, сосредоточенной вокруг самой себя, всегда были несовместимы с доминированием Германии в регионе, а в условиях кризиса, охватившего Запад, лидеры Токио сомневались, может ли появиться еще один шанс реализовать эти амбиции. Какую бы сторону ни благоволила судьба, одно можно сказать наверняка: будущее Азии висит на волоске." #NT!
 world_news_events.474.d.noger: "За последнее столетие Азия превратилась в континент, на котором в значительной степени доминируют западные державы, и хотя именно эти державы сменились с Лондона и Парижа на Берлин, этот факт остался неизменным, к большому гневу Токио. Однако теперь этот статус-кво, похоже, находится на грани разрушения. После падения Германской империи было неизбежно, что Япония не будет долго ждать, чтобы попытаться осуществить свои давние амбиции по изгнанию колониальных держав из Азии.\n\nСообщения из Токио подтверждают, что [JAP.GetNameDef] и [GEA.GetNameDef] вступили в войну, и хотя лидеры [GEA.Capital.GetCapitalVictoryPointName] уже пытаются подготовить оборону против IJA, отрубив голову змее, вопрос для многих заключается не в том, «если», а в том, «когда» японцы флаг будет развеваться над этим городом." #NT!
 world_news_events.474.a: "Освобождение Азии приближается!" #NT!
 world_news_events.474.b: "Сингапур никогда не падет!" #NT!
 world_news_events.474.c: "Смогут ли немцы продержаться на этот раз?" #NT!
  
 world_news_events.478.t: "Лионский конгресс" #NT!
 world_news_events.478.d.1.nobel: "Хотя [GER.GetNameDef] и [NFA.GetNameDef] вместе сражались против коммунаров, они не смогли договориться о послевоенном урегулировании, в результате чего судьба Франции оставалась неопределенной. Но поскольку Берлин не желал проводить дорогостоящую оккупацию, а Алжир желал увидеть Париж, оба встретились в Лионе, чтобы выработать соглашение.\n\nПолучившийся в результате Лионский конгресс оказался успешным. Немецкие войска прекратят оккупацию, в то время как [NFA.GetNameDef] согласился на различные военные ограничения, выплатил контрибуцию, разрешил немецким войскам неограниченный доступ к территории Франции, вошел в Миттельевропу, а также признал потерю Бретани. Многие считают, что результаты явно в пользу Берлина." #NT!
