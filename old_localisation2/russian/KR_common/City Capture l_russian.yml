l_russian:
  
 ### City Capture Events ### 
  
 city_capture_events.251.t: "Падение Лондона" #NT!
 city_capture_events.251.d.generic: "Сообщения из Лондона подтверждают, что столица [FROM.FROM.GetNameDef] была захвачена наступающими войсками [FROM.GetAdjective] после долгих и решительных сражений за Темзой. Войска [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы [FROM.GetAdjective] как можно дольше, но в конечном итоге были отброшены.\n\nВпервые с 1216 года Лондон пал перед иностранным захватчиком. Атмосфера в городе напряженная, ночами все еще раздается стрельба, силы [FROM.FROM.GetAdjective] отступают, оставляя на улицах столкновения протестующих и военной полиции [FROM.GetAdjective]." #NT!
 city_capture_events.251.d.entente: "Сообщения из Лондона подтверждают, что столица синдикалистского Британского Союза была захвачена наступающими канадскими солдатами после ожесточенных боев на берегу Темзы. Британские войска оказали упорное сопротивление, надеясь задержать своих коллег-роялистов как можно дольше, но в конечном итоге были отброшены.\n\nКогда пыль улеглась, кажется, что Лондон снова в руках правительства, которое покинуло его в 1925 году. Атмосфера в городе по-прежнему тяжелая, ночами все еще раздаются спазмы выстрелов, когда армия синдикалистов отступает, оставляя только протестующих сражаться с канадскими войсками." #NT!
 city_capture_events.251.d.ireland: "Шокирующий поворот событий: сообщения из Лондона подтверждают, что город был захвачен наступающими [FROM.GetAdjective] войсками после яростных сражений за Темзой. Всего несколько десятилетий назад именно [FROM.FROM.GetAdjective] захватили контроль над [FROM.GetAdjective] городами в разгар Войны за независимость, но, похоже, ситуация резко изменилась, когда над Лондоном теперь поднят флаг [FROM.GetAdjective].\n\nХотя войска [FROM.GetAdjective] в целом остаются дисциплинированными, несмотря на некоторую внутреннюю агитацию за месть Британии, атмосфера в городе по-прежнему тяжелая. Улицы по-прежнему время от времени заполняются спазмами стрельбы, когда силы [FROM.FROM.GetAdjective] отступают, оставляя протестующих и военную полицию [FROM.GetAdjective] сражаться на улицах." #NT!
 city_capture_events.251.a: "Это лишь временная неудача!" #NT!
 city_capture_events.251.b: "Это начало конца." #NT!
 city_capture_events.251.c: "Поскольку Лондон находится в [FROM.GetAdjective] руках,\n[FROM.FROM.GetAdjective] поражение неизбежно." #NT!
 city_capture_events.251.e: "Кажется, король вернулся." #NT!
 city_capture_events.251.f: "Гордо высоко над Лондон-Тауном они вывесили военный флаг." #NT!
  
 city_capture_events.252.t: "Падение Парижа" #NT!
 city_capture_events.252.d.germany: "Сообщения из Парижа подтверждают, что столица [FROM.FROM.GetAdjective] была захвачена наступающими немецкими войсками после ожесточенных боев на ее больших проспектах и ​​на берегу Сены. [FROM.FROM.GetAdjective] силы оказали упорное сопротивление, надеясь задержать немецкие войска как можно дольше, но в конечном итоге были отброшены.\n\nПока потрясенные парижане смотрели, немецкая армия снова прошла по тому же пути, что и во время Вельткрига, вниз по Елисейским полям и к Эйфелевой башне. Эта праздничная атмосфера в конечном итоге уступила место жестоким городским боям с сопротивлением [FROM.FROM.GetAdjective] глубокой ночью, когда танки [GER.GetAdjective] легко прорывались через неэффективные баррикады на больших парижских проспектах." #NT!
 city_capture_events.252.d.exiles: "Сообщения из Парижа подтверждают, что столица [FROM.FROM.GetAdjective] была захвачена наступающими войсками изгнанников после ожесточенных боев на ее больших проспектах и ​​на Сене. [FROM.FROM.GetAdjective] силы оказали упорное сопротивление, надеясь задержать силы изгнанников как можно дольше, но в конечном итоге были отброшены.\n\nПока потрясенные парижане смотрели, армия изгнанников маршировала через Елисейские поля и к Эйфелевой башне. Однако эта праздничная атмосфера в конечном итоге уступила место жестоким городским боям: сопротивление [FROM.FROM.GetAdjective] глубокой ночью и силы Изгнанников легко пробирались через неэффективные баррикады на больших парижских проспектах." #NT!
 city_capture_events.252.d.other: "Сообщения из Парижа подтверждают, что столица [FROM.FROM.GetAdjective] была захвачена наступающими войсками [FROM.GetAdjective] после ожесточенных боев на ее больших проспектах и ​​на Сене. Войска [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы [FROM.GetAdjective] как можно дольше, но в конечном итоге были отброшены.\n\nПока потрясенные парижане смотрели, армия [FROM.GetAdjective] маршировала через Елисейские поля и к Эйфелевой башне. Однако эта праздничная атмосфера в конечном итоге переросла в жестокие городские бои: [FROM.FROM.GetAdjective] сопротивления глубокой ночью и [FROM.GetAdjective] силы легко прорывались через неэффективные баррикады на больших парижских проспектах." #NT!
 city_capture_events.252.a.germany: "Немцы не победят! Франция не может снова пасть!" #NT!
 city_capture_events.252.a: "Нет! Мы не можем позволить Парижу снова пасть!" #NT!
 city_capture_events.252.b: "Наша победа над [FROM.FROM.GetNameDef] теперь практически гарантирована." #NT!
 city_capture_events.252.c.germany: "На этот раз конец должен был быть горьким." #NT!
 city_capture_events.252.c: "Кажется, падение [FROM.FROM.GetNameDef] теперь почти гарантировано." #NT!
  
 city_capture_events.253.t: "Падение Берлина" #NT!
 city_capture_events.253.d.france: "Сообщения из Берлина подтверждают, что столица [FROM.FROM.GetAdjective] была захвачена наступающими войсками коммунаров после долгих и беспощадных боев в крупнейшем городе Рейхспакта. Силы [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы коммунаров как можно дольше, но в конечном итоге были отброшены.\n\nПока потрясенные берлинцы смотрели, армия коммунаров прошла парадом по центральной арке Бранденбургских ворот - действие, которое раньше было доступно только кайзеру и его семье - прежде чем организовать хор для пения Интернационала, в то время как знаменитый памятник был задрапирован знаменами коммунаров на всеобщее обозрение. В последующие дни силы коммунаров собрали [FROM.FROM.GetAdjective] солдат и высокопоставленных лиц и увезли их в фургонах военной полиции." #NT!
 city_capture_events.253.d.lkmt: "Сообщения из Берлина подтверждают, что столица [FROM.FROM.GetAdjective] была захвачена наступающими дивизиями Национальной революционной армии после долгих и беспощадных боев через столицу Рейхспакта. Силы [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать войска НРА как можно дольше, но в конечном итоге были отброшены.\n\nПока потрясенные берлинцы смотрели, флаг Белого Солнца, Голубого Неба и Полностью Красной Земли был поднят над сильно поврежденным Рейхстагом - ироничная судьба для Германской Империи, поскольку не так давно немецкая интервенция почти уничтожила Гоминьдан. Казалось бы, Гоминдан ответил унижением поражения." #NT!
 city_capture_events.253.d.other: "Сообщения из Берлина подтверждают, что город [FROM.FROM.GetAdjective] был захвачен наступающими войсками [FROM.GetAdjective] после долгих и беспощадных боев через величайший город Рейхспакта. Войска [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы [FROM.GetAdjective] как можно дольше, но в конце концов были отброшены.\n\nПока потрясенные берлинцы смотрели, армия [FROM.GetAdjective] прошла маршем вдоль Бранденбургских ворот, а затем выслушала речь [FROM.GetLeader] перед знаменитым памятником. Однако, что в конечном итоге привлекло внимание и память всего мира, так это фотография солдата [FROM.GetAdjective], гордо держащего флаг [FROM.GetAdjective] на крыше сильно поврежденного Рейхстага, сделанная одним из его товарищей по отряду." #NT!
 city_capture_events.253.a.france: "[FROM.FROM.GetNameDefCap] не может закончиться так. Отбросьте коммунаров назад!" #NT!
 city_capture_events.253.a.lkmt: "Как это возможно? Этого не может быть!" #NT!
 city_capture_events.253.a: "Этого не может быть! Как мог пасть Берлин?!" #NT!
 city_capture_events.253.b.france: "Верден, Шемен-де-Дам, Сомма. Все они отомщены." #NT!
 city_capture_events.253.b.lkmt: "Северная экспедиция отомщена." #NT!
 city_capture_events.253.b: "Для [FROM.FROM.GetNameDef] все почти закончилось." #NT!
 city_capture_events.253.c: "Действительно, великая победа для [FROM.GetNameDef]." #NT!
  
 city_capture_events.254.t: "Падение Мадрида" #NT!
 city_capture_events.254.d.carlist: "Сообщения из Мадрида подтверждают, что город [FROM.FROM.GetAdjective] был захвачен наступающими войсками [FROM.GetAdjective] после долгих и беспощадных боев в холмистой местности и в старом городе. Силы [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы [FROM.GetAdjective] как можно дольше, но в конечном итоге были отброшены.\n\nОфициальные отчеты показывают, что, хотя грабежи были широко распространены, памятники и примечательные здания были полностью сохранены. Ожидается, что после падения столицы [FROM.FROM.GetNameDef] вскоре сдастся, несмотря на призывы к беспощадному сопротивлению со стороны генералов [FROM.FROM.GetAdjective]." #NT!
 city_capture_events.254.d.other: "Сообщения из Мадрида подтверждают, что город [FROM.FROM.GetAdjective] был захвачен наступающими войсками [FROM.GetAdjective] после долгих и беспощадных боев в холмистой местности и в старом городе. Силы [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы [FROM.GetAdjective] как можно дольше, но в конце концов были отброшены.\n\nОфициальные отчеты показывают, что Реал Мадридский дворец был тщательно разграблен солдатами [FROM.GetAdjective], в результате чего здание сгорело за ночь, а Пуэрта-де-Алькала была заложена взрывчаткой и разрушена вместе со многими другими, менее примечательными королевскими памятниками. Ожидается, что после падения столицы [FROM.FROM.GetNameDef] вскоре сдастся, несмотря на призывы к беспощадному сопротивлению со стороны генералов [FROM.FROM.GetAdjective]." #NT!
 city_capture_events.254.a: "Без Мадрида мы потеряны." #NT!
 city_capture_events.254.b: "Мадрид наконец-то наш!" #NT!
 city_capture_events.254.c: "Так падает сердце [FROM.FROM.GetNameDef]." #NT!
  
 city_capture_events.255.t: "Падение Барселоны" #NT!
 city_capture_events.255.d: "Сообщения из Барселоны подтверждают, что город [FROM.FROM.GetAdjective] был захвачен наступающими войсками [FROM.GetAdjective] после ожесточенных боев на горном хребте Серра-де-Кольсерола. Силы [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы [FROM.GetAdjective] как можно дольше, но в конечном итоге были отброшены.\n\nПоступали сообщения о длительных городских боях в Готическом квартале Барселоны и редких боях на Барселонской Ривьере. Эта же Ривьера стала местом длительного и роскошного парада солдат [FROM.GetAdjective], маршировавших по солнечным пляжам, что является явным символом того, что [FROM.GetNameDef] взял под свой контроль каталонский город." #NT!
 city_capture_events.255.a: "Это нехорошо..." #NT!
 city_capture_events.255.b: "Барселона наконец-то наша!" #NT!
 city_capture_events.255.c: "Так падает сердце старой Каталонии." #NT!
  
 city_capture_events.256.t: "Падение Бургоса" #NT!
 city_capture_events.256.d.SPA: "Сообщения из Бургоса подтверждают, что временная столица Карлистов была захвачена наступающими испанскими войсками после стычек в сельской местности. Силы карлистов оказали упорное сопротивление, надеясь задержать испанские войска как можно дольше, но в конечном итоге были отброшены.\n\nКастильцы, бежавшие на север, к баскскому побережью, со слезами на глазах рассказывали, как видели, как их родина горит и опустошается в этой братской войне, а испанские солдаты даже совершают зверства над собственным народом. Ходят слухи, что короля Хавьера вместе с потоком беженцев вывозила карлистская милиция, но место его назначения остается неизвестным. Многие надеются, что Карлистская Испания сможет продолжать сражаться на враждебном Центральном Пиренейском плато, чтобы защитить свои другие цитадели." #NT!
 city_capture_events.256.d.SWF: "Сообщения из Бургоса подтверждают, что временная столица Карлистов была захвачена наступающими анархо-испанскими войсками после стычек в холмистой местности. Войска карлистов оказали упорное сопротивление, надеясь задержать вражеские силы, но в конечном итоге были отброшены.\n\nКастильцы, бежавшие на север, к баскскому побережью, со слезами на глазах рассказывали, как видели, как горит их родина, а солдаты CNT-FAI даже совершали зверства над собственным народом. Ходят слухи, что короля Хавьера вместе с потоком беженцев вывозила карлистская милиция, но место его назначения остается неизвестным. Многие надеются, что Карлистская Испания сможет продолжать сражаться на центральном плато, чтобы защитить свои дома от сокрушительного вторжения синдикалистов." #NT!
 city_capture_events.256.a: "Мы не сдадимся! За Хавьера!" #NT!
 city_capture_events.256.b: "Сокрушительный удар по мечтам Карлистов о завоеваниях." #NT!
 city_capture_events.256.c: "Могут ли карлисты надеяться вернуться после этого?" #NT!
  
 city_capture_events.257.t: "Падение Гибралтара" #NT!
 city_capture_events.257.d: "Сообщения из Гибралтара подтверждают, что крепость была захвачена войсками [FROM.GetAdjective] после быстрой высадки и перестрелок вдоль побережья, при этом боевые действия продвигались к самой Гибралтарской скале. Войска [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать захватчиков [FROM.GetAdjective] как можно дольше, но в конечном итоге были отброшены.\n\nХотя сам Гибралтар был взят быстро, стычки в туннелях, проходящих через Скалу, продолжались до позднего вечера, когда окруженный и отчаявшийся гарнизон [FROM.FROM.GetAdjective] объявил о своей официальной капитуляции." #NT!
 city_capture_events.257.a: "Теперь они контролируют выход в Средиземное море..." #NT!
 city_capture_events.257.b: "Ворота в Средиземное море – наши!" #NT!
 city_capture_events.257.c: "Могучая Гибралтарская скала пала?" #NT!
  
 city_capture_events.258.t: "Падение Лиссабона" #NT!
 city_capture_events.258.d: "Сообщения из Лиссабона подтверждают, что город [FROM.FROM.GetAdjective] был захвачен наступающими войсками [FROM.GetAdjective] после перестрелок через Серра-де-Монсанто и быстрого продвижения к устью реки Тежу. Силы [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать силы [FROM.GetAdjective] как можно дольше, но в конечном итоге были отброшены.\n\nБитва за Лиссабон была сложной, поскольку защитники [FROM.FROM.GetAdjective] намеренно разрушили мосты Лиссабона, вынудив нападавших пересечь большую реку, чтобы полностью захватить город. На Торговой площади прошла церемония, на которой силы [FROM.GetAdjective] призвали к сдаче всех оставшихся [FROM.FROM.GetAdjective] солдат на склонах холмов." #NT!
 city_capture_events.258.a: "Мы будем бороться до последнего!" #NT!
 city_capture_events.258.b: "Наконец, Лиссабон под нашим контролем." #NT!
 city_capture_events.258.c: "Я понимаю..." #NT!
  
 city_capture_events.259.t: "Падение Чикаго" #NT!
 city_capture_events.259.d.apg: "Ополченцы Минитменов уже некоторое время продвигаются к временной столице [FROM.FROM.GetNameDef], Чикаго. Сейчас поступают сообщения о скором захвате города наступающими войсками Лонгистов. Текущее местонахождение [FROM.FROM.GetLeader] неизвестно, но считается, что [FROM.FROM.GetLeader.GetSheHe] покинул город вместе с отрядами ополчения.\n\nСообщается о широкомасштабных злодеяниях, когда Минитмены собирают захваченных членов ополчения и активистов WCA, чтобы расстрелять их, и многие пожары беспрепятственно распространяются по высотным районам города. Конец ли это социалистическому эксперименту в Америке?" #NT!
 city_capture_events.259.d.usa: "Федеральные силы уже некоторое время продвигаются к временной столице [FROM.FROM.GetNameDef], Чикаго. Сейчас поступают сообщения о скором захвате города наступающими войсками. Текущее местонахождение [FROM.FROM.GetLeader] неизвестно, но предполагается, что [FROM.FROM.GetLeader.GetSheHe] покинул город вместе с отрядами ополчения.\n\nСообщения показывают, что военная полиция начала облавы и аресты потенциальных агитаторов и важных деятелей синдикалистов, и что множество пожаров беспрепятственно распространяется по высотным районам города. Конец ли это социалистическому эксперименту в Америке?" #NT!
 city_capture_events.259.d.other: "Силы [FROM.GetAdjective] уже некоторое время продвигаются к временной столице [FROM.FROM.GetNameDef], Чикаго. Сейчас поступают сообщения о захвате города наступающими войсками. Текущее местонахождение [FROM.FROM.GetLeader] неизвестно, но предполагается, что [FROM.FROM.GetLeader.GetSheHe] покинул город вместе с отрядами ополчения.\n\nСообщения показывают, что военная полиция начала облавы и аресты потенциальных агитаторов и важных деятелей синдикалистов, и что множество пожаров беспрепятственно распространяется по высотным районам города, в то время как силы [FROM.GetAdjective] изо всех сил пытаются установить порядок." #NT!
 city_capture_events.259.a: "Бой еще не окончен!" #NT!
 city_capture_events.259.b: "Оплот синдикалистов пал!" #NT!
 city_capture_events.259.c: "Возможно, война скоро закончится?" #NT!
  
 city_capture_events.260.t: "Падение Батон-Руж" #NT!
 city_capture_events.260.d.wca: "Социалистические ополченцы уже некоторое время продвигаются к городу Батон-Руж. Сейчас поступают сообщения о скором захвате города наступающими ополченцами. Текущее местонахождение [FROM.FROM.GetLeader] неизвестно, но считается, что [FROM.FROM.GetLeader.GetSheHe] был быстро эвакуирован в сельскую местность.\n\nТревожные новости сообщают, что представителей Лонгистов и Минитменов линчевала толпа на улице, а город был полностью разграблен, а пожары распространились по центру города. Конец ли это реакционному восстанию в Америке?" #NT!
 city_capture_events.260.d.usa: "Федеральные силы уже некоторое время продвигаются к городу Батон-Руж. Сейчас поступают сообщения о скором захвате города наступающими войсками США. Текущее местонахождение [FROM.FROM.GetLeader] неизвестно, но считается, что [FROM.FROM.GetLeader.GetSheHe] был быстро эвакуирован в сельскую местность.\n\nСообщения показывают, что военная полиция начала массовые облавы на представителей лонгистов и минитменов, и что теперь пожары беспрепятственно распространяются по городу, поскольку Федеральная армия сосредоточена на восстановлении порядка. Конец ли это реакционному восстанию в Америке?" #NT!
 city_capture_events.260.d.other: "Войска [FROM.GetAdjective] уже некоторое время продвигаются к городу Батон-Руж. Сейчас поступают сообщения о скором захвате города наступающими войсками. Текущее местонахождение [FROM.FROM.GetLeader] неизвестно, но считается, что [FROM.FROM.GetLeader.GetSheHe] был быстро эвакуирован в сельскую местность.\n\nСообщения показывают, что военная полиция начала облавы и аресты минитменов и важных лидеров лонгистов, и что множество пожаров беспрепятственно распространяется по высотным районам города, в то время как силы [FROM.GetAdjective] изо всех сил пытаются установить порядок." #NT!
 city_capture_events.260.a: "Бой еще не окончен!" #NT!
 city_capture_events.260.b: "Крепость Лонгистов пала!" #NT!
 city_capture_events.260.c: "Возможно, война скоро закончится?" #NT!
  
 city_capture_events.261.t: "Падение Денвера" #NT!
 city_capture_events.261.d.wca: "Социалистические ополченцы ведут редкие стычки с федеральным правительством на Великих равнинах. Сегодня их усилия достигли кульминации, когда они, наконец, обрушились на Денвер после крупномасштабного нападения на долину Саут-Платт, город, являющийся столицей Колорадо и главным федеральным оплотом на Великих равнинах.\n\nПадение королевского города равнин действительно кажется серьезным расстройством для будущего Соединенных Штатов, и, поскольку боевые действия в долине Саут-Платт затихают, многие эксперты сходятся во мнении, что теперь федеральное правительство почти наверняка капитулирует перед Конгрессом рабочих." #NT!
 city_capture_events.261.d.acc: "[FROM.GetAdjective] призывников участвовали в долгих и трудных стычках с федеральным правительством в Скалистых горах. Сегодня их усилия подошли к концу, когда они, наконец, обрушились на Денвер после крупномасштабного нападения на реку Саут-Платт, город, являющийся столицей Колорадо и главным федеральным оплотом на Великих равнинах.\n\nПадение королевского города равнин действительно кажется серьезным расстройством для будущего Соединенных Штатов, и поскольку боевые действия в долине Саут-Платт затихают, многие эксперты сходятся во мнении, что теперь федеральное правительство почти наверняка придет к соглашению с [FROM.GetNameDef]." #NT!
 city_capture_events.261.d.apg: "Ополченцы-минитмены ведут редкие стычки с федеральным правительством на Великих равнинах. Сегодня их усилия подошли к концу, когда они, наконец, обрушились на Денвер после крупномасштабного нападения на долину Саут-Платт, город, являющийся столицей Колорадо и главным федеральным оплотом на Великих равнинах.\n\nПадение королевского города равнин действительно кажется серьезным расстройством для будущего Соединенных Штатов, и поскольку боевые действия в долине Саут-Платт затихают, многие эксперты сходятся во мнении, что теперь федеральное правительство почти наверняка капитулирует перед минитменами." #NT!
 city_capture_events.261.d.other: "Войска [FROM.GetAdjective] уже некоторое время продвигаются по Великим равнинам. Сегодня их усилия подошли к концу, когда они, наконец, обрушились на Денвер после крупномасштабного штурма долины Саут-Платт, города, являющегося столицей Колорадо и главным оставшимся оплотом федеральной власти.\n\nПадение королевского города равнин действительно кажется серьезным расстройством для будущего Соединенных Штатов, и, поскольку боевые действия в долине Саут-Платт затихают, кажется почти несомненным, что [FROM.GetNameDef] имеет определенное преимущество." #NT!
 city_capture_events.261.a: "Бой еще не окончен!" #NT!
 city_capture_events.261.b: "Федеральная крепость пала!" #NT!
 city_capture_events.261.c: "США не могут взять больше, не так ли?" #NT!
  
 city_capture_events.262.t: "Падение Сакраменто" #NT!
 city_capture_events.262.d: "Войска [FROM.GetAdjective] ведут долгие и трудные стычки с калифорнийскими призывниками в Скалистых горах. Сегодня их усилия подошли к концу, когда они, наконец, напали на город Сакраменто после крупномасштабного штурма через реку Американ, который является столицей Калифорнии и резиденцией Капитолия штата Калифорния.\n\nХотя он и не является стратегически важным городом, он означает надежную [FROM.GetAdjective] власть над Скалистыми горами, и поскольку вся Центральная долина теперь открыта для [FROM.GetAdjective] солдат, многие эксперты сходятся во мнении, что [FROM.FROM.GetNameDef] было бы разумно договориться с [FROM.GetNameDef]." #NT!
 city_capture_events.262.a: "Бой еще не окончен!" #NT!
 city_capture_events.262.b: "Калифорнийская крепость пала!" #NT!
 city_capture_events.262.c: "Закончится ли когда-нибудь эта гражданская война?" #NT!
  
 city_capture_events.263.t: "Падение Вашингтона" #NT!
 city_capture_events.263.d.wca: "Социалистические ополченцы продвинулись и захватили символическую столицу Соединенных Штатов, Вашингтон, округ Колумбия. Они штурмовали здание Капитолия и встретили сильное сопротивление, но, в конце концов, они прорвались, и флаг [FROM.GetNameDef] теперь развевается над Капитолием США.\n\nХодят слухи, что социалистические ополченцы собирали всех политических представителей, которых они могли найти в городе, чтобы «предать их суду», хотя неподтвержденные источники утверждают, что большинство важные правительственные деятели были эвакуированы во время боя, их нынешнее местонахождение неизвестно." #NT!
 city_capture_events.263.d.apg: "Ополченцы Минитменов продвинулись и захватили символическую столицу Соединенных Штатов, Вашингтон, округ Колумбия. Они штурмовали здание Капитолия и встретили сильное сопротивление, но, в конце концов, они прорвались, и флаг [FROM.GetNameDef] теперь развевается над Капитолием США.\n\nХодят слухи, что ополченцы Минитменов собирали в городе всех политических представителей, которых могли найти, чтобы «проверить их лояльность», хотя неподтвержденные источники утверждают, что большинство из важные правительственные деятели были эвакуированы во время боя, их нынешнее местонахождение неизвестно." #NT!
 city_capture_events.263.d.acc_nee: "[FROM.GetAdjective] призывников продвинулись к символической столице Соединенных Штатов, Вашингтону, округ Колумбия, и захватили ее. Они штурмовали здание Капитолия и встретили сильное сопротивление, но в конце концов прорвались, и флаг [FROM.GetNameDef] теперь реет над Капитолием США.\n\nПоследствия прошли относительно спокойно: представители [FROM.GetAdjective] встретились с генералом, ответственным за наступление, хотя неподтвержденные источники утверждают, что большая часть важного правительства Фигуры были эвакуированы во время боя, их нынешнее местонахождение неизвестно." #NT!
 city_capture_events.263.d.can: "Армия [FROM.GetAdjective] продвинулась к символической столице США, Вашингтону, округ Колумбия, и захватила ее. Они штурмовали здание Капитолия и встретили сильное сопротивление, но в конце концов прорвались, и флаг [FROM.GetNameDef] теперь реет над Капитолием США.\n\nВ отличие от 1812 года, массовых поджогов не было, но некоторые [FROM.FROM.GetAdjective] правительственные чиновники были арестованы [FROM.GetAdjective] монтёрами за то, что [FROM.GetAdjective] правительство утверждает, что это «меры предосторожности». Неподтвержденные источники утверждают, что большинство важных правительственных деятелей были эвакуированы во время боя, и их нынешнее местонахождение неизвестно." #NT!
 city_capture_events.263.d.feds: "Армия [FROM.GetAdjective] продвинулась к символической столице США, Вашингтону, округ Колумбия, и захватила ее. Они штурмовали здание Капитолия и встретили сильное сопротивление, но в конце концов прорвались, и флаг [FROM.GetNameDef] снова реет над Капитолием США.\n\nХодят слухи, что ополченцы-федералисты собирают в городе всех политических представителей, которых они могут найти, чтобы «предать их суду», хотя неподтвержденные источники утверждают, что большинство важных правительственных деятелей были эвакуированы во время боя, их нынешнее местонахождение неизвестно." #NT!
 city_capture_events.263.d.other: "Армия [FROM.GetAdjective] продвинулась к символической столице США, Вашингтону, округ Колумбия, и захватила ее. Они штурмовали здание Капитолия и встретили сильное сопротивление, но в конечном итоге прорвались, и флаг [FROM.GetNameDef] теперь реет над Капитолием США.\n\nЭто привело к серьезным репрессиям против правительственных чиновников, сообщалось о массовых арестах и даже слухах о суммарных казнях в самом Капитолии, хотя неподтвержденные источники утверждают, что большинство важные правительственные деятели были эвакуированы во время боя, их нынешнее местонахождение неизвестно." #NT!
  
  #Loser Responses 
 city_capture_events.263.a: "[THIS.USA_fall_of_washington_event_option_old_controller]" #NT!
 city_capture_events.263.a.wca: "Мы не можем позволить Риду и его банде-синдикалистам победить!" #NT!
 city_capture_events.263.a.apg: "Мы не можем позволить Лонгу и его головорезам Минитменам контролировать нацию." #NT!
 city_capture_events.263.a.acc_nee: "Конституционалисты захватили Вашингтон? Как такое может быть?!" #NT!
 city_capture_events.263.a.can: "Канада перенапряглась – это временная неудача." #NT!
 city_capture_events.263.a.other: "Война еще далека от завершения!" #NT!
  
  #Winner Responses 
 city_capture_events.263.b: "[THIS.USA_fall_of_washington_event_option_new_controller]" #NT!
 city_capture_events.263.b.wca: "Центральное правительство было свергнуто со своего золотого трона." #NT!
 city_capture_events.263.b.apg: "Мы будем гордиться отцами-основателями." #NT!
 city_capture_events.263.b.acc_nee: "Мы восстановим демократию в Вашингтоне!" #NT!
 city_capture_events.263.b.can: "Настало время нам спасти американцев от них самих." #NT!
 city_capture_events.263.b.other: "Вашингтон наш!" #NT!
  
  #Neutral Responses 
 city_capture_events.263.c: "[THIS.USA_fall_of_washington_event_option_neutral]" #NT!
 city_capture_events.263.c.can_wca: "Ситуация на юге становится крайне острой." #NT!
 city_capture_events.263.c.can_apg: "Ситуация на юге, похоже, выходит из-под контроля." #NT!
 city_capture_events.263.c.can_acc_nee: "Надеюсь, лидеры [FROM.GetAdjective] наконец наведут порядок." #NT!
 city_capture_events.263.c.american_wca: "Синдикалисты добрались до Вашингтона?" #NT!
 city_capture_events.263.c.american_apg: "Реакционеры добрались до Вашингтона?" #NT!
 city_capture_events.263.c.american_acc_nee: "У [FROM.GetAdjective] есть смелость, это точно." #NT!
 city_capture_events.263.c.american_can: "Канадцы смеют? Это невозможно вынести." #NT!
 city_capture_events.263.c.american_other: "Это нехорошо..." #NT!
 city_capture_events.263.c.non_american: "Тот, кто контролирует Вашингтон, контролирует Америку - пока..." #NT!
  
 city_capture_events.264.t: "Падение Сингапура" #NT!
 city_capture_events.264.d.japan: "Сингапур, «Гибралтар Востока», был захвачен императорскими японскими войсками, несмотря на то, что бывшие британские владельцы и новые немецкие повелители считали его неприступной крепостью.\n\nЯпонская военная администрация Сингапура выбрала здание Фуллертона своей штаб-квартирой, а город был переименован в Сионанто, что примерно переводится как «Южный остров, завоеванный в эпоху Сёва». Можно увидеть, как Кэмпэйтай массово патрулируют улицы, чтобы донести до населения сообщение о том, что японцы здесь останутся." #NT!
 city_capture_events.264.d.siam: "Сингапур, «Гибралтар Востока», был захвачен силами [SIA.GetSIAprefixEN] [SIA.GetAdjective], несмотря на то, что бывшие британские владельцы и новые немецкие повелители считали его неприступной крепостью.\n\nВоенная администрация [SIA.GetAdjective] Сингапура выбрала здание отеля Raffles в качестве своей штаб-квартиры, а город был переименован в Сингханакхон, что примерно переводится как «Город Льва». При этом Малаккский пролив находится более или менее под полным [SIA.GetAdjective] контролем." #NT!
 city_capture_events.264.d.other: "Сингапур, «Гибралтар Востока», был захвачен силами [FROM.GetAdjective], несмотря на то, что бывшие британские владельцы и новые немецкие повелители считали его неприступной крепостью.\n\nВоенная администрация [FROM.GetAdjective] Сингапура выбрала здание Фуллертон в качестве своей штаб-квартиры. Можно увидеть, как военная полиция массово патрулирует улицы, донося сообщение о том, что [FROM.GetAdjective] здесь, чтобы остаться." #NT!
 city_capture_events.264.a.japan: "За Императора!" #NT!
 city_capture_events.264.a.siam: "Сингханакхон и окружающие его регионы являются неотъемлемой частью Сиама!" #NT!
 city_capture_events.264.a.other: "Город Льва теперь в наших руках!" #NT!
 city_capture_events.264.b.germany: "Они пожалеют об этой мелкой колониальной краже, когда прибудет Kaiserliche Marine!" #NT!
 city_capture_events.264.b.other: "Сингапур пал? Как это возможно!?" #NT!
 city_capture_events.264.c: "Сингапур является законной британской колонией. Давайте внимательно следить за этим развитием." #NT!
 city_capture_events.264.d: "Немецкое господство в Ост-Индии сильно пошатнулось [FROM.GetNameDef]." #NT!
  
 city_capture_events.265.t: "Падение Нью-Йорка" #NT!
 city_capture_events.265.d.wca: "[FROM.GetAdjective] ополченцы ведут редкие стычки с Красной гвардией на реке Гудзон. Сегодня утром частоколы, как естественные, так и искусственные, выпали из рук социалистов. Вскоре после этого остров Манхэттен был вынужден капитулировать, чтобы не рисковать массовыми человеческими жертвами, которые принесет городская война. Защитники приказали оставшейся части Красной гвардии перевезти золото из здания Федеральной резервной системы в безопасное место, оставив многих финансовых работников заключёнными на Острове Благосостояния.\n\nВесь Нью-Йорк теперь находится под контролем [FROM.GetNameDef], и сейчас проводится масштабная операция по оказанию помощи, чтобы оценить весь масштаб ущерба, нанесенного городу в результате наступления." #NT!
 city_capture_events.265.d.other: "Силы [FROM.GetAdjective] уже некоторое время теснят реку Гудзон. Сегодня их усилия подошли к концу, когда они наконец обрушились на Нью-Йорк после успешного окружения оставшихся защитников. К великому разочарованию завоевателей, из здания Федеральной резервной системы было полностью разграблено золото, которое было перевезено в безопасное место. Политические заключенные остались в своих тюремных камерах на острове Благосостояния.\n\nПадение Нью-Йорка нанесло серьезный удар по делу [FROM.FROM.GetAdjective], поскольку один из величайших символов американского престижа пал силой. Поскольку бои в гавани Нью-Йорка затихают, кажется почти несомненным, что [FROM.GetNameDef] имеет преимущество в битве за Новую Англию." #NT!
 city_capture_events.265.a: "Нью-Йорк наш!" #NT!
 city_capture_events.265.b: "Леди Свобода снова сияет!" #NT!
 city_capture_events.265.c: "Это поражение Революции!" #NT!
 city_capture_events.265.d: "Нью-Йорк не должен оставаться в руках врага!" #NT!
 city_capture_events.265.e: "Социалисты теряют главный символ." #NT!
 city_capture_events.265.f: "И победителям достаётся Статуя Свободы." #NT!
  
 city_capture_events.266.t: "Падение Гонконга" #NT!
 city_capture_events.266.d.asia: "Войска [FROM.GetNameDef] захватили старую колонию британской короны Гонконг, прорвавшись через линию любителей джина и высадившись на самом острове Гонконг. Ситуация вскоре стала для защитников невыносимой, и губернатор лично сдался в отеле Peninsula Hong Kong, где [FROM.GetAdjective] разместил свою штаб-квартиру.\n\nПосле короткой церемонии был назначен новый губернатор [FROM.GetAdjective], который объявил миру о «Новом Гонконге», «свободном от западного колониализма»." #NT!
 city_capture_events.266.d.legat: "Войска [FROM.GetNameDef] захватили старую колонию британской короны Гонконг, прорвавшись через линию любителей джина и высадившись на самом острове Гонконг. Ситуация вскоре стала для защитников невыносимой, и губернатор лично сдался в отеле Peninsula Hong Kong, где [FROM.GetAdjective] разместил свою штаб-квартиру.\n\nПосле короткой церемонии был назначен новый губернатор [FROM.GetAdjective], который объявил миру о восстановлении «Старого Гонконга» с восстановлением контроля Запада над городом." #NT!
 city_capture_events.266.d.other: "Войска [FROM.GetNameDef] захватили старую колонию британской короны Гонконг, прорвавшись через линию любителей джина и высадившись на самом острове Гонконг. Ситуация вскоре стала для защитников невыносимой, и губернатор лично сдался в отеле Peninsula Hong Kong, где [FROM.GetAdjective] разместил свою штаб-квартиру.\n\nБлагодаря этому «Жемчужина Востока» наконец оказывается под контролем [FROM.GetAdjective]." #NT!
 city_capture_events.266.a: "Падение Гонконга стало серьезным ударом по [FROM.FROM.GetNameDef]." #NT!
 city_capture_events.266.b.asia: "Новый Гонконг будет процветать, свободный от западного империализма!" #NT!
 city_capture_events.266.b.legat: "Гонконг теперь снова под нашим контролем." #NT!
 city_capture_events.266.b.other: "Жемчужина Востока обеспечена." #NT!
 city_capture_events.266.c: "[FROM.FROM.GetNameDefCap] не потерпит такой агрессии." #NT!
 city_capture_events.266.e: "Еще один удар по бывшей британской колонии, надеюсь, не шаблонный." #NT!
  
 city_capture_events.267.t: "Падение Манилы" #NT!
 city_capture_events.267.d: "Манила, столица Филиппин, пала до [FROM.GetAdjective] после ухода филиппинских защитников и их союзников. Вход в стратегически важный Манильский залив оставался спорным в течение некоторого времени после падения города из-за сильной концентрации филиппинской береговой артиллерии на острове Коррегидор, но орудия в конечном итоге замолчали после согласованной атаки [FROM.GetAdjective].\n\nПоскольку Манила находится под контролем [FROM.GetAdjective], ожидается, что вскоре за ней последуют и остальные Филиппины. Это сокрушительное поражение для сил [FROM.FROM.GetFactionName] в Азиатско-Тихоокеанском регионе." #NT!
 city_capture_events.267.a: "Падение Манилы обеспечивает контроль [FROM.GetNameDef] над Ост-Индией." #NT!
 city_capture_events.267.b.japan: "Мы нанесли еще один удар по западному империализму!" #NT!
 city_capture_events.267.b.china: "Традиционный порядок в Азии будет восстановлен." #NT!
 city_capture_events.267.b.other: "Вскоре все Филиппины будут под нашим контролем." #NT!
 city_capture_events.267.c: "Отступите в джунгли, мы не дадим Филиппинам пасть!" #NT!
  
 city_capture_events.268.t: "Падение Хайдарабада" #NT!
 city_capture_events.268.d: "Теперь подтверждено, что город Хайдарабад на юге Индии, один из самых богатых княжеских штатов, пал перед наступающими [FROM.GetAdjective] силами. После тяжелых боев, опустошивших большую часть расположенного неподалеку военного городка Секундерабад, в городе снова воцарилась тишина; поскольку звуки выстрелов и артиллерии затихли из-за беспорядочного отступления последних защитников [FROM.FROM.GetAdjective], даже несмотря на заявление Низама об открытом городе с целью защитить различные исторические памятники и культурные центры города.\n\nПоявляются утверждения о том, что войска [FROM.GetAdjective] патрулируют улицы для поддержания порядка, а межконфессиональное насилие между местными мусульманами и индуистами вспыхивает по всему городу - теперь, когда статус-кво, который до сих пор сдерживал напряженность, был нарушен." #NT!
 city_capture_events.268.a: "На этом все не заканчивается." #NT!
 city_capture_events.268.b: "Город Жемчуга теперь в наших руках!" #NT!
 city_capture_events.268.c: "Город Жемчуга пал." #NT!
  
 city_capture_events.269.t: "Падение Лахора" #NT!
 city_capture_events.269.d: "Одна из величайших архитектурных жемчужин в короне Великих Моголов и последний оставшийся британский центр силы на Индийском субконтиненте, город Лахор теперь пал под натиском военной машины [FROM.GetAdjective], обрушившейся на город, несмотря на отчаянную попытку [FROM.FROM.GetNameDef] остановить эту волну.\n\nНа восходе солнца над воротами Аламгири можно увидеть флаг [FROM.GetAdjective], побуждая всех оставшихся [FROM.FROM.GetAdjective] удерживающиеся в Форте сдаются, измученные длительной осадой.\n\nГород Садов снова перешел под власть еще одного нового владельца." #NT!
 city_capture_events.269.a: "Освобождение скоро наступит, потому что прибыло наше подкрепление!" #NT!
 city_capture_events.269.b: "Сад Великих Моголов наш!" #NT!
 city_capture_events.269.c: "Так падает последний остаток британского владычества." #NT!
  
 city_capture_events.270.t: "Падение Бангкока" #NT!
 city_capture_events.270.d.can: "Ранее сегодня победившие солдаты [FROM.GetAdjective] маршировали по улицам Бангкока после ожесточенных боев, продолжавшихся большую часть дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским обстрелом, а Юнион Джек теперь возвышается над тем, что осталось от старого тронного зала Ананта Самакхом, который использовался правительством [FROM.FROM.GetAdjective] в качестве своего парламента.\n\nПравительство [FROM.FROM.GetAdjective] собралось, чтобы обсудить требования [FROM.GetAdjective], и многие члены движения Сери Тай теперь занимают свои заранее оговоренные временные правительственные должности, как теперь предполагается, что большинство старых членов кабинета министров быть мертвым. Однако за пределами города бои все еще продолжаются, хотя неизвестно, как долго они продлятся." #NT!
 city_capture_events.270.d.jap: "Когда боевые действия в Бангкоке затихают, Хиномару уже вылетает из каждого здания по всему Бангкоку, который теперь переименован в Банкоку, и чиновники [FROM.GetAdjective] уже создали новую переходную администрацию для управления их завоеванием.\n\nУже посреди ночи несогласные были собраны и изгнаны, а сдавшиеся армейские подразделения [FROM.FROM.GetAdjective] начали марш к новым лагерям, строящимся для них в сельской местности. Нескольким местным лидерам [FROM.FROM.GetAdjective] было предложено сэппуку, чтобы искупить свою неудачу и предотвратить сплочение сопротивления вокруг них. Большой дворец Бангкока уже начал реконструкцию, чтобы сделать его одной из новых сезонных резиденций императора, хотя боевые действия в сельской местности все еще продолжаются." #NT!
 city_capture_events.270.d.gea: "Ранее сегодня победившие немецкие солдаты маршировали по улицам Бангкока после ожесточенных боев, продолжавшихся большую часть дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским обстрелом немецких военных кораблей, стоявших на якоре возле Большого дворца, а флаг Рейхскригсфлагге теперь поднят над тронным залом Ананта Самахом, который использовался правительством [FROM.FROM.GetAdjective] в качестве своего парламента.\n\nМногие прогерманские элементы в сиамском правительстве, по слухам, видели с адмиралом [FROM.GetLeader], обсуждая для себя послевоенные позиции в соответствии с новым немецким порядком. пока оставшиеся войска [FROM.FROM.GetAdjective] отступают в сельскую местность." #NT!
 city_capture_events.270.d.inc: "Ранее сегодня победоносные индокитайские солдаты прошли маршем по улицам Бангкока после ожесточенных боев, продолжавшихся большую часть дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским обстрелом, а флаг Кодо Сао Ванга теперь поднят над тронным залом Ананта Самакхом, который использовался правительством [FROM.FROM.GetAdjective] в качестве своего парламента.\n\nБлагодаря этой победе над одной из самых больших угроз для недавно созданной нации судьба [INC.GetNameDef] наконец решена. Теперь, когда в городе уничтожены последние оборонительные сооружения [FROM.FROM.GetAdjective], кажется, что дальнейшее сопротивление в окружающих городах скоро прекратится." #NT!
 city_capture_events.270.d.bur: "Ранее сегодня победоносные бирманские солдаты прошли маршем по улицам Бангкока после ожесточенных боев, продолжавшихся большую часть дня. Как и Аюттхая, Бангкок легко завоевывает, казалось бы, неудержимая бирманская военная машина. Большой дворец был снесен с лица земли как символ силы, а несколько национальных сокровищ [FROM.FROM.GetAdjective] предположительно утеряны.\n\nБыли замечены большие группы беженцев, направляющихся в сельскую местность, в то время как большая часть войск [FROM.FROM.GetAdjective] продолжает сражаться до последнего человека в немногих оставшихся карманах города. Благодаря этой победе имя [FROM.GetLeader] прочно вошло в учебники истории наряду с Байиннаунгом и Алаунгпайей." #NT!
 city_capture_events.270.d.other: "Ранее сегодня победившие солдаты [FROM.GetAdjective] маршировали по улицам Бангкока после ожесточенных боев, продолжавшихся большую часть дня. Большинство зданий вдоль дороги Ратчадамноен были разрушены артиллерийским обстрелом, а флаг [FROM.GetAdjective] теперь поднят над тронным залом Ананта Самакхом, который использовался правительством [FROM.FROM.GetAdjective] в качестве своего парламента.\n\nПравительство [FROM.FROM.GetAdjective] согласилось встретиться и обсудить требования [FROM.GetAdjective]. Теперь, когда в городе уничтожены последние оборонительные сооружения [FROM.FROM.GetAdjective], кажется, что дальнейшее сопротивление в окружающих городах скоро прекратится." #NT!
 city_capture_events.270.a: "Мы будем сражаться до последнего!" #NT!
 city_capture_events.270.b: "Наконец-то Бангкок наш!" #NT!
 city_capture_events.270.c: "Я понимаю..." #NT!
  
 city_capture_events.271.t: "Падение Москвы" #NT!
 city_capture_events.271.d: "В последний раз, когда Москва была взята иностранной державой, огромный пожар уничтожил большую часть города. Не так сегодня, когда силы [FROM.GetAdjective] прорвали линии осады во многих местах и ​​подошли к Кремлю. Солдаты [FROM.FROM.GetAdjective] продолжают обстреливать врага с высотных зданий, но основная оборона прорвана и просачивается через пригороды в окружающий лес.\n\nКрасная площадь, долгое время являвшаяся центром [FROM.FROM.GetAdjective] жизни города, превратилась во временный лагерь для военнопленных, и из окон Кремля можно было увидеть горящие обломки, что, без сомнения, является последней отчаянной попыткой предотвратить попадание [FROM.FROM.GetAdjective] разведданных в руки [FROM.GetAdjective]. Это черный день для [FROM.FROM.GetNameDef]." #NT!
 city_capture_events.271.a: "Мы будем сражаться до победного конца." #NT!
 city_capture_events.271.b: "Сердце [FROM.FROM.GetNameDef] теперь наше!" #NT!
 city_capture_events.271.c: "Ситуация в [FROM.FROM.GetNameDef] действительно выглядит ужасной." #NT!
  
 city_capture_events.272.t: "Падение Петрограда" #NT!
 city_capture_events.272.d: "Сегодня был захвачен великий [FROM.FROM.GetAdjective] город, построенный Петром Великим. Защитники [FROM.FROM.GetAdjective] первоначально сдерживали армию [FROM.GetAdjective] через Неву, но несколько дней назад эти позиции пали. Теперь непрерывный артиллерийский огонь на Васильевском острове избавил последних защитников от страданий. Некоторые военные тактики говорят, что при правильной обороне город мог бы продержаться годами, но импульс [FROM.GetAdjective] пронес их через город быстрее.\n\nСолдаты армии [FROM.GetAdjective] используют Дворцовую площадь в качестве плацдарма для передвижения по остальной части города, и ходят слухи, что солдаты [FROM.GetAdjective] совершают экскурсии по Артиллерийскому музею, уверенные, что они оставят свой след в истории [FROM.FROM.GetNameDef]." #NT!
 city_capture_events.272.a: "Ужасный!" #NT!
 city_capture_events.272.b: "Удар по моральному духу [FROM.FROM.GetAdjective] будет серьёзным." #NT!
 city_capture_events.272.c: "Славная жемчужина севера пала." #NT!
  
 city_capture_events.273.t: "Падение Киева" #NT!
 city_capture_events.273.d: "Плохие новости для [FROM.FROM.GetNameDef] сегодня, поскольку армия [FROM.GetAdjective] только что завершила штурм древней столицы. Хотя первоначальные сообщения предполагали, что защитники [FROM.FROM.GetAdjective] смогут удерживать их у мостов в ходе длительной осады, многочисленные проспекты через реку оказались слишком многочисленными, чтобы их можно было удержать. С [FROM.GetAdjective] войсками по обе стороны реки и рассеянными защитниками, сдавшимися на островах, Киев пал перед захватчиками.\n\nПоскольку процветающий центр теперь находится в руках [FROM.GetAdjective], остальные [FROM.FROM.GetAdjective] земель находятся под угрозой. Хотя [FROM.GetNameDef] пообещал уважать 700-летнюю историю, сложившуюся с тех пор, как монголы разрушили его в 1240 году, память Киева длинна. Вторжения никогда не были к ним добры, и они опасаются худшего." #NT!
 city_capture_events.273.a: "На этом все не заканчивается." #NT!
 city_capture_events.273.b: "Наконец-то Киев наш!" #NT!
 city_capture_events.273.c: "Ситуация с [FROM.FROM.GetAdjective] кажется ужасной." #NT!
  
 city_capture_events.274.t: "Падение Рио-де-Жанейро" #NT!
 city_capture_events.274.d: "Битва за Рио-де-Жанейро, похоже, закончилась после нескольких дней жестокой атаки [FROM.GetAdjective] сил. Несмотря на обороноспособность города, гарнизон [FROM.FROM.GetAdjective] не смог предотвратить попадание дворца Катете и большей части города в руки [FROM.GetAdjective]. Бои на холмах продолжаются, но большая часть сил [FROM.FROM.GetAdjective] была изгнана.\n\nБольшая часть Рио была повреждена в результате боевых действий: [FROM.GetAdjective] снарядов разрушили купол церкви Канделария, а туннель Реал-Грандеза был разрушен отчаявшимися солдатами [FROM.FROM.GetAdjective], чтобы остановить продвижение врага. Поскольку солдаты [FROM.GetAdjective] контролируют большую часть города, становится ясно, что [FROM.GetNameDef] сделал важный шаг в войне против [FROM.FROM.GetNameDef]." #NT!
 city_capture_events.274.a: "Нет! Как такое может быть?!" #NT!
 city_capture_events.274.b: "Наши командиры поработали хорошо." #NT!
 city_capture_events.274.c: "Ситуация с [FROM.FROM.GetAdjective] кажется ужасной." #NT!
 city_capture_events.274.par: "Месть неизбежна! Толкайте вперед!" #NT!
  
 city_capture_events.275.t: "Падение Гаваны" #NT!
 city_capture_events.275.d: "[FROM.FROM.GetAdjective] солдат и боевиков были изгнаны из Гаваны в сельскую местность или в старые испанские форты в городе, где после нескольких часов беспощадной бомбардировки они наконец сдались [FROM.GetAdjective] силам. С поднятием флага [FROM.GetAdjective] над замком Эль-Морро, который обычно изображается на многих открытках, контроль над входом в гавань Гаваны был обеспечен захватчиками.\n\n[FROM.FROM.GetAdjective] силам, хотя и не столь многочисленным и хорошо оснащенным, как их противник, удалось начать жестокий бой, сражаясь блок за блоком с попытками сил [FROM.GetNameDef] захватить город так долго, как это было возможно. В конце концов, их доблестное сопротивление было лишь мимолетным, поскольку сейчас Гавана находится в руках иностранной державы." #NT!
 city_capture_events.275.a: "Скажите людям: пусть они борются за свою свободу..." #NT!
 city_capture_events.275.b: "Американцы, похоже, снова повторяют историю." #NT!
 city_capture_events.275.c: "Их неповиновение никогда не возобладает." #NT!
 city_capture_events.275.e: "Похоже, Куба выбрала не ту сторону..." #NT!
 city_capture_events.275.f: "Вскоре остров станет нашим." #NT!
  
 city_capture_events.276.t: "Падение Рима" #NT!
 city_capture_events.276.d: "Сегодня генерал, командующий силами [FROM.GetAdjective], добился сдачи Вечного города. За несколько дней до этого войска [FROM.GetAdjective] сражались в пригородах, и хотя некоторые болотистые районы все еще находились под контролем [FROM.FROM.GetAdjective], главная магистраль, проходящая через центр Рима и Ватикан, была полностью перекрыта. [FROM.FROM.GetAdjective] солдата были замечены рассредоточенными по низким предгорьям, окружающим древнюю столицу Римской империи.\n\n[FROM.GetNameDefCap] осторожно объявил, что в городе находится специальная военная полиция, чтобы предотвратить разграбление базилики Святого Петра и Пантеона, и они ведут переговоры с Папой, чтобы выяснить, какую автономию может сохранить Ватикан, пока находится под [FROM.GetAdjective] оккупацией." #NT!
 city_capture_events.276.a: "Рим потерян!" #NT!
 city_capture_events.276.b: "Наконец-то Рим наш!" #NT!
 city_capture_events.276.c: "Как [FROM.FROM.GetNameDef] оправится от этого?" #NT!
  
 city_capture_events.277.t: "Падение Вены" #NT!
 city_capture_events.277.d: "Столица Габсбургов потеряна. Несколько дней назад армия [FROM.GetAdjective] прижала оставшихся солдат [FROM.FROM.GetAdjective] на берегах Дуная, и ходят слухи, что королевская семья [FROM.FROM.GetAdjective] бежала, пока могла. Теперь город полностью контролируется [FROM.GetNameDef], его многочисленные художники и музыканты живут в ожидании того, что станет с этим культурным бастионом Европы.\n\n[FROM.GetNameDefCap] планирует большой военный парад вокруг Рингштрассе в честь этого огромного военного подвига, а генерал [FROM.GetAdjective], отвечающий за оккупацию, собирается обратиться к гражданам с балкона Нового Бурга, чтобы попытаться облегчить беспокойство населения, измученного неделями боев." #NT!
 city_capture_events.277.a: "Вена пала? Как такое может быть?!" #NT!
 city_capture_events.277.b: "Наконец-то Вена наша!" #NT!
 city_capture_events.277.c: "[FROM.FROM.GetNameDefCap], кажется, далеко упал..." #NT!
  
 city_capture_events.278.t: "Падение Пекина" #NT!
 city_capture_events.278.d: "После нескольких дней интенсивных боев в пригородах столицы войска [FROM.GetAdjective] наконец взошли на стены Внешнего города, рассеяв защитников и сделав дальнейшую оборону столицы практически несостоятельной. Поскольку железнодорожные линии, ведущие в город и выходящие из него, были полностью перерезаны, оставшиеся силы [FROM.FROM.GetAdjective] быстро редели, поскольку дезертировавшие солдаты растворились в городском населении.\n\nВ то время как цвета [FROM.GetAdjective] сейчас развеваются над воротами Тяньаньмэнь, пламя в Чжэнъянмэнь поднимает в небо высокие столбы густого черного дыма, и его печальный символизм утрачен для немногих из утомленного войной населения. Китаю остается только надеяться, что новые оккупанты города, одни из многих с начала века, наконец восстановят хотя бы капельку мира и порядка." #NT!
 city_capture_events.278.a: "Пекин пал? Как такое может быть?!" #NT!
 city_capture_events.278.b: "Запретный город наш!" #NT!
 city_capture_events.278.c: "В Пекине было много оккупантов, это всего лишь еще один." #NT!
 city_capture_events.278.d.japan: "Вчера утром в рамках молниеносного наступления японские войска сокрушили внешнюю оборону Пекина, а сегодня прорвали его стены. Из-за того, что железнодорожные пути, ведущие в город и из него, были полностью перерезаны, оставшиеся силы [FROM.FROM.GetAdjective] быстро редели, поскольку дезертировавшие солдаты растворились в городском населении.\n\nВ то время как восходящее солнце сейчас пролетает над воротами Тяньаньмэнь, пламя в Чжэнъянмэнь поднимает в небо высокие столбы густого черного дыма, и его печальный символизм мало кто упускает из виду. Ее древняя столица теперь потеряна, нация затаила дыхание. Возможно, это только вопрос времени, когда японцы, подобно грозовому шторму, пройдут через Северную равнину, а оттуда и через остальную часть Китая." #NT!
 city_capture_events.278.a.japan: "Защитники Пекина будут отомщены!" #NT!
 city_capture_events.278.b.japan: "Еще один шаг к поражению западного империализма!" #NT!
 city_capture_events.278.c.japan: "Кажется, ситуация с [FROM.FROM.GetAdjective] действительно стала ужасной." #NT!
 city_capture_events.278.d.fng: "После нескольких дней интенсивных боев в пригородах столицы войска [FROM.GetAdjective] наконец взошли на стены Внешнего города, рассеяв защитников и сделав дальнейшую оборону столицы практически несостоятельной. Прибытие Чжан Цзолиня к воротам Запретного города не обошлось без помпезности и церемоний, но его триумф отмечен одной отрезвляющей мыслью: это не первый раз, когда он берет Пекин. Несмотря на все его усилия, впереди лежит долгий путь.\n\nПока пятицветный флаг реет над воротами Тяньаньмэнь, а город по-прежнему окутан дымом, Чжан уже начал подготовку своей «Конференции по национальному воссоединению». Сможет ли он объединить эту раздробленную нацию и добиться успеха там, где многие другие потерпели неудачу?" #NT!
 city_capture_events.278.a.fng: "Со временем мы вернем Пекин!" #NT!
 city_capture_events.278.b.fng: "Мы не потеряем Пекин во второй раз." #NT!
 city_capture_events.278.c.fng: "Неужели Китай можно объединить только мечом?" #NT!
 city_capture_events.278.d.lep: "После нескольких дней интенсивных боев в пригородах столицы войска [FROM.GetAdjective] наконец взошли на стены Внешнего города, рассеяв защитников и сделав дальнейшую оборону столицы практически несостоятельной. Прибытие Ци Сеюаня к воротам Запретного города знаменует собой еще один шаг на пути его стремительного восхождения от провинциального военачальника к одной из выдающихся фигур Китая. Это также означает возможную смену власти; Юг утвердился над севером впервые со времен возвышения династии Мин.\n\nГде бы Ци ни решил стать резиденцией своего нового правительства, немцы наверняка будут наблюдать за ним с кнутом и пряником в руке." #NT!
 city_capture_events.278.a.lep: "Единственное, что будет быстрее подъема Ци, — это его падение!" #NT!
 city_capture_events.278.b.lep: "Однажды они не посмеют жаловаться." #NT!
 city_capture_events.278.c.lep: "Не Ци будет править, а [GER.GetLeader]." #NT!
  
 city_capture_events.279.t: "Падение Шанхая" #NT!
 city_capture_events.279.d.interchina: "В результате продолжающегося конфликта, который сотрясал Китай на протяжении последних нескольких десятилетий, город Шанхай снова перешел из рук в руки. Захваченный ранее армиями [FROM.FROM.GetLeader] и управляемый [FROM.FROM.GetNameDef], город надеялся, что последняя бойня осталась позади. К сожалению, конфликт снова охватит город, поскольку войска [FROM.GetAdjective] штурмуют город, подавляя местных защитников и поднимая свой флаг на вершине Бунда.\n\n[FROM.GetAdjective] солдаты уже начали процесс грабежа территорий за пределами старого Международного поселения, в то время как большинство иностранцев до сих пор остаются невредимыми, хотя и не без опасения, что они могут быть следующими." #NT!
 city_capture_events.279.d.china: "Прошло более семидесяти лет с тех пор, как китаец мог стоять на Бунде и по-настоящему называть его своим, но благодаря усилиям войск [FROM.GetAdjective] новый флаг гордо развевается на вершине здания таможни. Несмотря на международную защиту города, победа далась довольно легко, поскольку полиция Шанхая и ограниченный гарнизон не могли оказать большого сопротивления настоящей армии. Население в целом мало что сделало для сопротивления, и их отказ от сотрудничества не мог помочь и без того слабой обороне.\n\nБудущее международного города сейчас кажется неясным, поскольку его процветание всегда строилось на основе торговли и иностранных инвестиций. Царит неопределенность, под вопросом и будущее иностранных жителей города." #NT!
 city_capture_events.279.d.other: "Несмотря на номинальную международную защиту города, войска [FROM.GetAdjective] сегодня захватили Шанхай, быстро сокрушив местную полицию и силы гарнизона и подняв свои знамена через Бунд. Всего несколько лет назад подобная акция почти наверняка вызвала бы возмущение международного сообщества, но конфликт в других местах оставил мало кто способен обеспечить значимую защиту Международного Мандата.\n\n[FROM.GetAdjective] солдаты уже начали процесс грабежа территорий за пределами старого Международного поселения, в то время как большинство иностранцев до сих пор остаются невредимыми, но не без беспокойства." #NT!
 city_capture_events.279.a: "Мы вернем город, несмотря ни на что." #NT!
 city_capture_events.279.b: "Наконец-то Шанхай наш!" #NT!
 city_capture_events.279.c: "Неужели хаос в Китае никогда не закончится?" #NT!
  
 city_capture_events.280.t: "Падение Варшавы" #NT!
 city_capture_events.280.d: "Когда-то Варшаву в эпоху Возрождения называли «Парижем Востока», но в последнее время она переживает тяжелые времена. После Вельткрига была надежда на обновление, но, увы, судьба не была благосклонна: армия [FROM.FROM.GetAdjective] потерпела поражение, пытаясь защитить город по обе стороны реки Вислы от наступающих сил [FROM.GetAdjective].\n\nВ горьком искажении старых воспоминаний, Королевский замок в Варшаве снова был разграблен солдатами [FROM.FROM.GetAdjective], прежде чем они покинули город, согласно [FROM.GetNameDef]. [FROM.FROM.GetNameDefCap] горячо оспаривает это, утверждая, что войска [FROM.GetAdjective] разграбили Дворец после тяжелых боев. Тем не менее, с падением столицы будущее [FROM.FROM.GetNameDef] находится под угрозой." #NT!
 city_capture_events.280.a: "Не Варшава!" #NT!
 city_capture_events.280.b: "Наконец-то Варшава наша!" #NT!
 city_capture_events.280.c: "Я понимаю..." #NT!
  
 city_capture_events.281.t: "Падение Сиднея" #NT!
 city_capture_events.281.d.siam: "Продолжая расширять свои завоевания на юге, [FROM.GetNameDef] захватил Сидней в Австралазии. Местные защитники были вынуждены отступить через мост Харбор-Бридж в Сиднее и занять новые позиции на холме Обсерватории, но попытки снести мост были пресечены наступающими силами [FROM.GetAdjective].\n\nВоенный флаг [FROM.GetAdjective] теперь можно увидеть висящим на ратуше Сиднея, которая служит штаб-квартирой новой военной администрации города, а военная полиция Саравата Тахарна внимательно следит за улицами." #NT!
 city_capture_events.281.d.other: "Когда предгорья за пределами Голубых гор были потеряны для вторгшейся армии [FROM.GetAdjective], падение города стало лишь вопросом времени. В результате серии контролируемых боев силы [FROM.FROM.GetAdjective] медленно отступили и ко вчерашнему дню добрались до доков, но после захвата Сиднейского моста Харбор-Бридж, который защитники избежали разрушения из-за его важности для жителей города, их командующий договорился о прекращении огня.\n\nСидней, изначально основанный как исправительная колония для британских заключенных, испытывает горькую иронию, поскольку сам город теперь является тюрьмой. Хуже того, военные эксперты предсказывают, что это может стать началом конца [FROM.FROM.GetNameDef], поскольку потеря такого жизненно важного города — это тяжелый удар." #NT!
 city_capture_events.281.a: "Вскоре мы вернемся в Сидней." #NT!
 city_capture_events.281.b: "Наконец-то Сидней наш!" #NT!
 city_capture_events.281.c: "Ситуация с [FROM.FROM.GetAdjective] ужасна." #NT!
  
 city_capture_events.282.t: "Падение Мехико" #NT!
 city_capture_events.282.d: "Мехико, старейшая столица Северной Америки и пятая по величине столица Северной Америки, сегодня пала под ударом вторгшихся сил [FROM.GetAdjective], которые окружили город, а затем двинулись в бассейн с запада, перерезав основные транспортные артерии через нижние районы и вынудив [FROM.FROM.GetAdjective] защитников истекать кровью в предгорья на востоке. На сегодняшний день генерал, ответственный за оккупацию [FROM.GetAdjective], был замечен входящим в Национальный дворец для переговоров с губернатором о прекращении огня.\n\nСлухи утверждают, что войска [FROM.GetAdjective] осматривают старые ацтекские руины и собирают для себя «бесплатные» сувениры, и теперь похоже, что выжившие после испанской тирании научатся жить под гнетом контроля [FROM.GetAdjective]." #NT!
 city_capture_events.282.a: "На этом все не заканчивается." #NT!
 city_capture_events.282.b: "Сердце Мексики принадлежит нам!" #NT!
 city_capture_events.282.c: "Я понимаю..." #NT!
  
 city_capture_events.283.t: "Падение Алжира" #NT!
 city_capture_events.283.d: "Сообщения из старого города Алжира, столицы французского правительства в изгнании с 1920 года, рассказывают нам о его падении от наступающих [FROM.GetAdjective] войск. Несмотря на эффективное продвижение по великим колониальным проспектам вблизи побережья, силы [FROM.GetAdjective] встретили более сильное сопротивление, покидая вид на залив в наиболее популярных районах Алжирских высот.\n\nЖесткие бои произошли между солдатами [FROM.GetAdjective] и [FROM.FROM.GetAdjective], особенно в популярном европейском районе Баб-эль-Уэд и в знаменитой базилике Нотр-Дам-д'Африк, но, наконец, на рассвете большая часть город пал, и последние очаги сопротивления в Касбе были ликвидированы. Восходящее над заливом солнце открыло город под новым покровителем." #NT!
 city_capture_events.283.a.commune: "Мы не можем позволить коммунарам разрушить последний бастион Истинной Франции!" #NT!
 city_capture_events.283.a: "Это конец нашей мечты о завоевании?" #NT!
 city_capture_events.283.a.returned: "Наш приемный дом замучен." #NT!
 city_capture_events.283.b: "Алжирский режим никогда больше не создаст проблем." #NT!
 city_capture_events.283.c.commune: "Похоже, коммунары завершили свою революцию." #NT!
 city_capture_events.283.c: "[FROM.FROM.GetNameDefCap] умирает." #NT!
  
 city_capture_events.284.t: "Падение Детройта" #NT!
 city_capture_events.284.d.wca: "Вчера вечером силы [FROM.GetAdjective] предприняли попытку обезопасить центр Детройта, сражаясь вдоль реки Детройт на протяжении всего коридора Джефферсона, преодолевая сильное сопротивление Красной гвардии. К вечеру [FROM.GetNameDef] солдат вели переговоры о капитуляции солдат, спрятавшихся в Норт-Энде. Ист-Сайд сдался, и были замечены лоялисты-социалисты, отступающие через Вест-Сайд. Социалистические ополченцы оставили после себя руины Фишер-билдинг, Дирборна и великих произведений Альберта Кана.\n\nДля наблюдателей очевидно, что Детройт теперь является территорией [FROM.GetNameDef], но не раньше, чем Красная гвардия разрушила мемориальное здание Эдселя Форда и оставила на Виадуке массивное здание, подписанное известным художником Диего Риверой." #NT!
 city_capture_events.284.d.other: "Войска [FROM.GetAdjective] совершили дерзкую гонку по западной стороне Детройта, застигнув врага врасплох. Сегодня их усилия увенчались успехом: защитник Детройта отступил в Мидтаун. Для многих нападавших последствия Дирборна усилили рвение прорваться к реке Детройт, обеспечив безопасность города.\n\nПадение Детройта хорошо отпраздновали [FROM.GetNameDef], которые теперь обладают как стратегическим, так и символическим центром тяжелой промышленности Америки." #NT!
 city_capture_events.284.a: "Дорога в Мичиган теперь широко открыта." #NT!
 city_capture_events.284.b: "Мы должны быстро вернуть Детройт!" #NT!
 city_capture_events.284.c: "Удар по социалистам, конечно." #NT!
 city_capture_events.284.d: "Закончится ли когда-нибудь эта война?" #NT!
  
 city_capture_events.285.t: "Падение Бостона" #NT!
 city_capture_events.285.d.nee: "Жители Бостона вместе с Национальной гвардией Новой Англии выступили против [FROM.GetAdjective]. Силы вторжения вошли в Третий туннель под сильным сопротивлением, окружив Бостон через реку Чарльз. Национальная гвардия Новой Англии была вынуждена эвакуироваться через Кембридж, полностью отдав врагу Ямайку-Плейн.\n\nИсторическое и символическое значение этой победы не было потеряно для [FROM.GetNameDef], который начал извлекать выгоду из оставшихся в городе символов американской независимости, таких как Старая Северная церковь, которая теперь затмевается баррикадами вокруг него." #NT!
 city_capture_events.285.d.other: "Осторожного применения силы хватило, чтобы [FROM.GetAdjective] сил вытеснили защитников Внутреннего пояса Бостона. После ожесточенных боев в порту защитники города были вынуждены отступить через реку Чарльз в сторону Эверетта, потерпев унизительное поражение. И солдаты, и мирные жители находятся в замешательстве.\n\nИнтервью с [FROM.GetAdjective] мужчинами, присутствовавшими на месте происшествия, сообщают, что, хотя они, возможно, и одержали победу над своими врагами в [FROM.FROM.GetNameDef] только в жестокой битве, вторгшиеся войска по-прежнему отдают приоритет сохранению исторических памятников Бостона." #NT!
 city_capture_events.285.a: "Бостон в наших руках, и Новая Англия в безопасности." #NT!
 city_capture_events.285.b: "Свобода не будет погашена!" #NT!
 city_capture_events.285.c: "Американские Афины пали..." #NT!
  
 city_capture_events.286.t: "Падение Токио" #NT!
 city_capture_events.286.d.other: "Сегодня вся Япония была потрясена до глубины души, когда силы [FROM.GetAdjective] наконец захватили столицу после ожесточенных боев. Несмотря на надежды планировщиков [FROM.GetAdjective], похоже, что Императорский дворец был успешно эвакуирован, оставив местонахождение Императора и правительства неизвестным.\n\nПоскольку японская столица впервые в истории оказалась в руках иностранцев, настроение среди сил [FROM.FROM.GetAdjective] можно охарактеризовать только как мрачное. Японская общественность долгое время считала, что мощь их вооруженных сил и положение страны сделают вторжение невозможным. Прибытие войск [FROM.GetAdjective] обнажает ложность этого утверждения, и кажется, что гегемония [FROM.FROM.GetAdjective] над Восточной Азией разрушена навсегда." #NT!
 city_capture_events.286.d.lkmt: "Сегодня, после изнурительного и жестокого вторжения на японские острова, Национально-революционная армия китайского Гоминьдана официально объявила о полной капитуляции всех японских войск в Токио. Несмотря на надежды Комиссии по военным делам, похоже, что Императорский дворец был успешно эвакуирован, а император и его местонахождение неизвестны.\n\nПоскольку японская столица впервые в истории оказалась в руках иностранцев, настроение среди сил [FROM.FROM.GetAdjective] можно охарактеризовать только как мрачное. Для многих в Китае победа Китая знаменует окончательный конец Века унижения, поскольку он унижает своего империалистического соседа и соперника. Впервые за десятилетия кажется, что Китай отныне вновь заявляет о себе как о величайшей азиатской державе..." #NT!
 city_capture_events.286.a: "Великая победа!" #NT!
 city_capture_events.286.a.lkmt: "Век унижения стерт." #NT!
 city_capture_events.286.b: "Мы не должны терять надежду." #NT!
 city_capture_events.286.c: "Жемчужина всей Азии упала." #NT!
  
 city_capture_events.287.t: "Падение Шеньяна" #NT!
 city_capture_events.287.d.chi: "После решительного наступления сегодня солдаты [FROM.GetAdjective] наконец одолели защитников [FROM.FROM.GetAdjective] и захватили самый важный город Маньчжурии. Войска [FROM.GetAdjective] поспешили окружить обнесенный стеной Старый город и потребовать капитуляции [FROM.FROM.GetLeader], а когда он не явился, начали штурм, разрушивший большую часть старого маньчжурского дворца. [FROM.FROM.GetLeader] так и не был найден.\n\nПосле потери города распространились слухи, что подчиненные [FROM.FROM.GetLeader] начинают сомневаться в его способности защитить Маньчжурию, а тем более объединить весь Китай. [FROM.FROM.GetLeader] сам, кажется, осознает серьезность ситуации: город необходимо как можно скорее отбить." #NT!
 city_capture_events.287.d.other: "Несмотря на отчаянные усилия защитников Шэньяна [FROM.FROM.GetAdjective], город пал сегодня после битвы, отмеченной днями ожесточенных городских боев. Наиболее интенсивные бои шли на железнодорожной станции Хуангутун и вокруг нее, которая стала объектом нескольких последовательных атак [FROM.GetAdjective]. Силы [FROM.FROM.GetAdjective] в конечном итоге были вытеснены, но не раньше, чем порваны рельсы станции, в результате чего она на данный момент практически непригодна для использования.\n\nНесмотря на это, захват города — великая победа кампании [FROM.GetAdjective] по завоеванию Китая. Путь в Пекин и на Северо-Китайскую равнину теперь открыт, и многие полевые командиры, разбросанные по стране, должны осознать, что все это может означать." #NT!
 city_capture_events.287.a: "[FROM.FROM.GetNameDefCap] скоро падет!" #NT!
 city_capture_events.287.b: "Мы пересдадим его в ближайшее время!" #NT!
 city_capture_events.287.c: "Будет ли у Маньчжурии новый хозяин?" #NT!
  
 city_capture_events.288.t: "Падение Владивостока." #NT!
 city_capture_events.288.d: "Владивосток, так называемые «Ворота на Восток», пал. Тихоокеанский портовый город, дом российского Тихоокеанского флота и стержень давно ослабевших амбиций России на Дальнем Востоке, был захвачен сегодня силами [FROM.GetAdjective], которые преодолели обширные укрепления города, крупнейшие в России, и обеспечили безопасность его жизненно важной гавани. Положение города означает, что он долгое время был местом конфликта, имевшего решающее значение во время русско-японской войны и удерживаемого полевыми командирами во время Гражданской войны в России.\n\nСегодня контроль над городом снова изменился, а вместе с ним изменилась и судьба Дальнего Востока." #NT!
 city_capture_events.288.a: "Ура!" #NT!
 city_capture_events.288.b: "Наше состояние скоро улучшится." #NT!
 city_capture_events.288.c: "[FROM.FROM.GetNameDefCap] практически потерял Тихоокеанскую Россию." #NT!
  
 city_capture_events.289.t: "Падение Дублина" #NT!
 city_capture_events.289.d: "Сегодня многочисленные сообщения из Ирландии подтверждают, что город Дублин захвачен силами [FROM.GetAdjective]. По мере того как вражеские силы продвигались к центру города, части вооруженных сил [FROM.FROM.GetAdjective] предпринимали тщетные попытки удержать ключевые здания, кульминацией которых стала их последняя битва на О'Коннелл-стрит, когда они пытались удержать Главпочтамт, пока они не были подавлены неоднократными атаками войск [FROM.GetAdjective].\n\nХотя большая часть гражданского и военного руководства [FROM.FROM.GetAdjective] сумела эвакуироваться в сельскую местность, поклявшись продолжать борьбу против [FROM.GetNameDef], их дело потерпело неудачу. был нанесен серьезный удар." #NT!
 city_capture_events.289.a: "Несвободная Ирландия никогда не будет в мире!" #NT!
 city_capture_events.289.b: "Когда столица [FROM.FROM.GetAdjective] захвачена, остальная часть острова находится в наших руках." #NT!
 city_capture_events.289.c: "Причина [FROM.FROM.GetAdjective] кажется отчаянной." #NT!
  
 city_capture_events.290.t: "Падение Батавии" #NT!
 city_capture_events.290.d.dei: "Сегодня было объявлено, что Батавия, центр [FROM.FROM.GetNameDefCap], пала. Город находился под контролем голландцев с 1619 года и стал жемчужиной Голландской империи в регионе. В прокламации Палеис-те-Конингсплейн генерал [FROM.GetAdjective], ответственный за оккупацию, попытался успокоить местное население, пообещав, что оно не причинит никакого вреда.\n\nС падением Батавии способность [FROM.FROM.GetNameDef] сохранять контроль над Явой и другими островами оказалась под сильным ударом, возможно, навсегда. Только время покажет, смогут ли колониальные силы сплотиться и восстановить контроль." #NT!
 city_capture_events.290.d.ins: "Сегодняшние военные донесения [FROM.GetAdjective] подтвердили, что Батавия, столица [FROM.FROM.GetNameDefCap], пала в результате штурма города. Будучи центром голландского правления в Ост-Индии, город с тех пор стал столицей новой нации [FROM.FROM.GetAdjective].\n\nНесмотря на декларацию [FROM.GetAdjective], призывающую местных жителей подчиниться оккупации, население стремилось продемонстрировать новым оккупационным властям, что они не откажутся от вновь обретенной независимости так легко. Однако для остальной части [FROM.FROM.GetNameDefCap] падение Батавии — это разрушительный удар по национальной гордости, а также стратегическая катастрофа. Поскольку эвакуированное правительство [FROM.FROM.GetAdjective] начинает реорганизоваться, еще неизвестно, смогут ли они изгнать этого нового завоевателя со своих островов." #NT!
 city_capture_events.290.d.other: "Сегодня было объявлено, что Батавия, крупнейший город на Яве и ключевой город региона, пал до [FROM.GetAdjective] сил. Флаг [FROM.GetAdjective] теперь развевается над старым дворцом генерал-губернатора, когда их войска движутся для обеспечения безопасности гавани и других ключевых районов города.\n\nПадение Батавии знаменует собой резкий сдвиг в балансе сил в Ост-Индии и дает вооруженным силам [FROM.GetAdjective] прочную базу для осуществления контроля над прибыльными островами архипелага. Перед лицом такого поражения еще неизвестно, смогут ли силы [FROM.FROM.GetAdjective] стабилизировать ситуацию и восстановить контроль." #NT!
 city_capture_events.290.a: "Мы будем сражаться дальше." #NT!
 city_capture_events.290.b: "Тяжёлая награда." #NT!
 city_capture_events.290.c: "У Ост-Индии будет новый хозяин." #NT!
  
 city_capture_events.291.t: "Падение Бухареста" #NT!
 city_capture_events.291.d: "Прошло два десятилетия с тех пор, как Бухарест был оккупирован во время Вельткрига, и теперь он снова попал в руки врага. Несмотря на энергичную оборону армии [FROM.FROM.GetAdjective], войска [FROM.GetAdjective] прорвались. Стареющие форты вокруг города были восстановлены, чтобы оказать некоторую помощь столице, но это было бесполезно. Армянский и Еврейский кварталы, а также район Урана по-прежнему оказывают сопротивление, чему способствует присутствие Метрополии и Арсенальных холмов. Тем не менее, поскольку основные артерии Каля Виктория, бульвар Королевы Елизаветы и дорога Сербан-Вода захвачены, их падение почти неизбежно.\nЖители опасаются того, что может принести оккупация, последняя из которых все еще в памяти живых, несмотря на [FROM.GetAdjective] попытку успокоить местные опасения. Хотя [FROM.FROM.GetLeader] пообещал продолжать борьбу, будущее [FROM.FROM.GetNameDef] остается неопределенным." #NT!
 city_capture_events.291.a: "Мы вернемся!" #NT!
 city_capture_events.291.b: "Наконец-то Бухарест наш!" #NT!
 city_capture_events.291.c: "Серьезный удар по амбициям [FROM.FROM.GetAdjective]." #NT!
  
 city_capture_events.292.t: "Падение Константинополя" #NT!
 city_capture_events.292.d.orthodox: "Захват Константинополя [FROM.GetAdjective] завершился сегодня, поскольку последние силы [FROM.FROM.GetAdjective] были оттеснены за берега Босфора. Взятие города было относительно быстрым и по сравнению с предыдущими разграблениями Константинополя милосердным. Тем не менее, многие исторические объекты все еще были повреждены, в частности Голубая мечеть, которая была сровнена с землей войсками [FROM.GetAdjective], устраняя последний очаг сопротивления в павшем городе.\n\nПравительство [FROM.GetNameDef] объявило захват формальным возвращением старой римской столицы христианскому миру, и посланник [FROM.GetLeader] был отправлен для преобразования мечети Святой Софии в восточно-православную базилику." #NT!
 city_capture_events.292.d.other: "Захват Константинополя [FROM.GetAdjective] завершился сегодня, поскольку последние силы [FROM.FROM.GetAdjective] были оттеснены за берега Босфора. Взятие города было относительно быстрым и по сравнению с предыдущими разграблениями Константинополя милосердным. Тем не менее, многие исторические объекты все еще были повреждены, в частности Долмабахче, который был сильно поврежден в боях во время финального сражения войск [FROM.FROM.GetAdjective].\n\nВойска [FROM.GetAdjective] сейчас патрулируют улицы древнего города, а правительство [FROM.GetNameDef] заявило о своем намерении управлять городом как можно более легким прикосновением." #NT!
 city_capture_events.292.a: "На данный момент мы потеряли проливы." #NT!
 city_capture_events.292.b: "Город Константина наш!" #NT!
 city_capture_events.292.c: "Царьград наш!" #NT!
 city_capture_events.292.e: "Константинополь возвращен Греции!" #NT!
 city_capture_events.292.f: "Турки наконец изгнаны из Европы." #NT!
 city_capture_events.292.g: "У Босфора новый хозяин." #NT!
  
 city_capture_events.293.t: "Падение Сеуты" #NT!
 city_capture_events.293.d: "Сообщения из Сеуты подтверждают, что старый испанский укрепленный полуостров захвачен [FROM.GetAdjective] войсками. После быстрой высадки и перестрелок на пляже вторгшиеся солдаты в конце концов преодолели последнюю оборону на крайней точке Монте-Ачо. Войска [FROM.FROM.GetAdjective] оказали упорное сопротивление, надеясь задержать захватчиков [FROM.GetAdjective] как можно дольше, но в конце концов были отброшены.\n\nБитва за Сеуту была кровавой бойней, включавшей бои между домами на узких границах главных улиц города, которые не предлагали особых прикрытий от артиллерийской и морской поддержки со стороны окружающих сил." #NT!
 city_capture_events.293.a: "Один из Геркулесовых столбов упал..." #NT!
 city_capture_events.293.b: "Теперь мы контролируем доступ к Средиземному морю!" #NT!
 city_capture_events.293.c: "Один за другим падают Геркулесовы столбы." #NT!
  
 city_capture_events.294.t: "Падение Амстердама" #NT!
 city_capture_events.294.d.other: "Амстердам, как «Северная Венеция», издавна восхищал своими прекрасными каналами и портом; хотя «золотой век» финансов и торговли, возможно, уже давно прошел, город остается вечным европейским сокровищем процветания и искусства. К сожалению, Амстердам теперь превратился в поле битвы, беженцы бегут во всех направлениях, и сообщалось, что после ожесточенного боя защитники [FROM.FROM.GetAdjective] объявили Амстердам открытым городом после успешной кампании сил [FROM.GetAdjective].\n\nПоскольку боевые действия в городе прекращаются и силы [FROM.GetAdjective] начали маршировать по Мантплейну, будущее жителей Амстердама мрачно." #NT!
 city_capture_events.294.d.holex: "Изгнанные в изгнание голландские войска в изгнании достигли того, что сторонние наблюдатели назвали несбыточной мечтой. Из ссылки в Голландской Ост-Индии голландское правительство в изгнании с триумфом вернулось в Амстердам. После ожесточенной битвы, в результате которой большая часть города осталась в руинах, голландский триколор гордо реет над Королевским дворцом, сигнализируя о возвращении королевы.\n\nПоскольку голландские войска начинают восстанавливать порядок на улицах, необходимо выделить время для восстановления Амстердама. Голландский народ пережил революцию и гражданскую войну, и потребуется время, чтобы раны войны полностью зажили." #NT!
 city_capture_events.294.a: "Тёмные времена для голландского народа..." #NT!
 city_capture_events.294.b.other: "Северная Венеция наша!" #NT!
 city_capture_events.294.c.other: "С Амстердамом падение Нидерландов неизбежно..." #NT!
 city_capture_events.294.b.holex: "Хорошо вернуться домой." #NT!
 city_capture_events.294.c.holex: "Голландцы сделали невозможное!" #NT!
  
 city_capture_events.295.t: "Падение Мюнхена" #NT!
 city_capture_events.295.d: "Расположенный на берегах реки Изар к северу от Баварских Альп, город Мюнхен является резиденцией баварской администрации и центром искусства, науки, архитектуры и культуры. Во время правления принца-регента Луитпольда в городе произошел взрыв художественной и культурной деятельности.\nОднако в недавнем конфликте он оказался в осаде, и после изнурительной битвы силы [FROM.FROM.GetAdjective] эвакуировали город. Большая часть Мюнхена сейчас разрушена: Мариенплац лежит в руинах, а купола Фрауэнкирхе сильно повреждены в результате интенсивных бомбардировок. Последний из сопротивления [FROM.FROM.GetAdjective] в центре города у Новой Ратуши наконец сдался победоносной армии [FROM.GetAdjective]. Поскольку падение Мюнхена неизбежно, кажется, что скоро наступит падение южной Германии." #NT!
 city_capture_events.295.d.france: "После напряженной кампании французские войска переправились через реку Изар и вошли в город Мюнхен. В ходе последовавшего сражения большая часть города была разрушена, Мариенплац лежала в руинах, а купола Фрауэнкирхе были сильно повреждены в результате интенсивных бомбардировок. Немецкое сопротивление было ожесточенным, и бои переросли в ближний бой между домами, но к вечеру стало известно, что триколор Коммуны теперь гордо реет над надвратной башней Тальбрюка.\n\nПосле того, как Мюнхен обеспечен, Коммуна Франции теперь готова захватить остальную часть Южной Германии. Сторонние наблюдатели полагают, что падение Германской империи близко, если не неизбежно, в ближайшие несколько недель." #NT!
 city_capture_events.295.a: "Падение Мюнхена означает, что Южная Германия наша!" #NT!
 city_capture_events.295.b: "С потерей Мюнхена потеряна Южная Германия." #NT!
 city_capture_events.295.c: "Так падает сердце Баварии..." #NT!
 city_capture_events.295.a.france: "Славная победа Коммуны! Мы отомстим за наших братьев, вперед!" #NT!
 city_capture_events.295.b.france: "Ситуация ужасная. Отечеству грозит величайшая опасность." #NT!
 city_capture_events.295.c.france: "После падения Мюнхена Коммуну, кажется, уже невозможно остановить." #NT!
  
 city_capture_events.296.t: "Падение Дели" #NT!
 city_capture_events.296.d: "Один из старейших городов мира, древний город Дели много раз был завоеван, разграблен и перестроен. Самые ранние архитектурные реликвии датируются 300 г. до н.э. — свидетельство древней истории и устойчивости Дели.\n\nОднако город пал под натиском вражеских сил, и здания древнего города снова оказались под угрозой разрушения. После кровавой осады 1857 года Дели снова подвергся атаке: [FROM.FROM.GetAdjective] защитников прорвались под впечатляющим наступлением [FROM.GetAdjective] сил. Сообщения из города показали, что армия [FROM.GetAdjective] начала сгонять [FROM.FROM.GetAdjective] пленных и выживших в Пурана Кила, древнюю крепость, которая сейчас служит лагерем для интернированных." #NT!
 city_capture_events.296.a: "Неудача... но мы не сдадимся!" #NT!
 city_capture_events.296.b: "Сердце Северной Индии принадлежит нам!" #NT!
 city_capture_events.296.c: "И снова у Дели новый хозяин..." #NT!
  
 city_capture_events.297.t: "Падение Риги" #NT!
 city_capture_events.297.d: "Рига, «Жемчужина Балтики», на сегодняшний день пала до [FROM.GetAdjective] сил. Активный торговый центр играет роль важнейшего экономического и финансового центра Балтийского моря. Хотя армия [FROM.GetAdjective] пообещала поддерживать мирную оккупацию, по всему городу бушуют пожары, а беженцы пытаются бежать по морю. Некоторые здания, такие как Дом Черноголовых, лежат в руинах после интенсивных бомбардировок армии [FROM.GetAdjective].\n\nОтступив к морю, защитники [FROM.FROM.GetAdjective] не имели другого выбора, кроме как предложить безоговорочную капитуляцию победившей армии [FROM.GetAdjective], чтобы предотвратить дальнейшее разрушение своего города." #NT!
 city_capture_events.297.a: "Наша ситуация выглядит ужасной. Убедитесь, что порт открыт для эвакуации!" #NT!
 city_capture_events.297.b: "Наконец-то Жемчужина Балтики наша!" #NT!
 city_capture_events.297.c: "Ситуация для Риги выглядит мрачной." #NT!
  
 city_capture_events.298.t: "Падение Каира" #NT!
 city_capture_events.298.d: "Каир, город «тысячи минаретов», является одним из старейших городов мира, служащим культурным и интеллектуальным центром арабского мира. Город видел бесчисленное количество захватчиков как в древние, так и в современные времена. Более того, похоже, что, как и вечные пески, окружающие город, великий город снова захвачен новым оккупантом. После успешной кампании армии [FROM.GetAdjective] оставшиеся защитники [FROM.FROM.GetAdjective] попытались дать последний бой у Каирской Цитадели.\n\nПосле продолжительного сопротивления последние силы [FROM.FROM.GetAdjective] в городе предложили безоговорочную капитуляцию. Несмотря на грандиозную победу, армия [FROM.GetAdjective] пообещала расправиться с потенциальными грабителями, чтобы сохранить этот исторический город." #NT!
 city_capture_events.298.a: "Каир, город фараонов, наш!" #NT!
 city_capture_events.298.b: "Мы потерпели серьёзное поражение. Мы вернемся!" #NT!
 city_capture_events.298.c: "Древний город песков снова будет служить новому хозяину." #NT!
 city_capture_events.298.d.ottoman: "Каир, город «тысячи минаретов», является одним из старейших городов мира, служащим интеллектуальным и культурным центром арабского мира. Это также бьющееся сердце египетской нации, одной из нескольких арабских стран, объявивших войну Османской империи.\n\nОднако после успешной османской кампании египетские войска предложили свою безоговорочную капитуляцию в городе, а некоторые египтяне предприняли последнюю попытку сопротивления в Каирской Цитадели. Несмотря на победу Турции, Османская армия пообещала Каиру, что оккупация будет мирной и историческим зданиям этого древнего города не будет нанесен никакого вреда." #NT!
 city_capture_events.298.a.ottoman: "Так называемый «Каирский пакт» теперь рухнет. Славная победа Османской нации!" #NT!
 city_capture_events.298.b.ottoman: "После падения Каира турки двинулись в Египет. Никогда больше они не будут править Египтом – мы должны контратаковать!" #NT!
 city_capture_events.298.c.ottoman: "После падения Каира будущее Каирского пакта кажется мрачным." #NT!
  
 city_capture_events.299.t: "Падение Кейптауна" #NT!
 city_capture_events.299.d: "Кейптаун, один из крупнейших городов Южной Африки, расположенный на Западном Кейптауне, издавна восхищал своим прекрасным расположением и ролью в экономике Южной Африки. За многие годы, прошедшие с тех пор, как исследователи впервые прибыли на мыс Доброй Надежды, Кейптаун перерос свое первоначальное предназначение как далекий форпост. Некогда процветающий и даже самый крупный город Южной Африки пережил перемену судьбы: недавно войска [FROM.GetAdjective] штурмовали город в ходе успешной кампании.\nОтчаянные защитники [FROM.FROM.GetAdjective] попытались организовать оборону в Замке Доброй Надежды, но было ясно, что битва закончилась к наступлению темноты. Хотя порт Кейптауна и пострадал во время битвы, он, несомненно, послужит для удовлетворения стратегических потребностей армии [FROM.GetAdjective], когда она начнет оккупацию города." #NT!
 city_capture_events.299.a: "Возможно, мы проиграли битву, но война еще не проиграна!" #NT!
 city_capture_events.299.b: "Главный порт Кейптауна – наш!" #NT!
 city_capture_events.299.c: "Город-мать был оккупирован." #NT!
  
 city_capture_events.300.t: "Падение Буэнос-Айреса" #NT!
 city_capture_events.300.d: "Буэнос-Айрес, получивший прозвище «Париж Южной Америки», является ведущим местом назначения иммигрантов из Европы, региональной столицей искусств и финансов. Недавно были построены главные проспекты города, а также самые высокие здания Южной Америки и первая подземная система.\n\nОднако решительное наступление армии [FROM.GetAdjective] привело к тотальной битве на улицах города. Ожесточенные бои развернулись на Авенида-де-Майо и Авенида 9-го июля, когда защитники [FROM.FROM.GetAdjective] отчаянно оборонялись в главных зданиях по всему городу. Бои переросли в кровавые перестрелки между домами, но в конце концов защитники [FROM.FROM.GetAdjective] начали выходить из своих укрытий и сдаваться. Это поистине великая победа нации [FROM.GetAdjective]." #NT!
 city_capture_events.300.a: "Великий город Южной Америки – наш!" #NT!
 city_capture_events.300.b: "После потери Буэнос-Айреса нам придется удвоить наши усилия." #NT!
 city_capture_events.300.c: "Королева Эль-Платы пала!" #NT!
 city_capture_events.300.d.patagonia: "Патагонские революционеры сегодня одержали значительную победу: флаг патагонского движения гордо реет над Casa Rosada. Битва за Буэнос-Айрес была кровопролитной, поскольку бои быстро переросли в стычки между домами на главных проспектах Авенида де Майо и Авенида 9 де Хулио. Однако к вечеру стало ясно, что патагонские революционеры одержали победу, а столица аргентинского режима пала.\nБыла сделана фотография знакового момента, когда восторженные революционеры маршировали по главному проспекту города на танках и грузовиках бывшего аргентинского режима. Однако, хотя правительство Патагонии заверило мир, что революция будет максимально мирной, уже есть истории о священниках и бывших «врагах государства», которых гнали под дулами пистолетов." #NT!
 city_capture_events.300.a.patagonia: "Вива ла Революсьон! Товарищи, идите вперед, чтобы освободить остальную часть Аргентины!" #NT!
 city_capture_events.300.b.patagonia: "Немедленно контратакуйте! Аргентина не падет перед безбожными революционерами!" #NT!
 city_capture_events.300.c.patagonia: "Социалистическая революция пришла в Аргентину." #NT!
  
 city_capture_events.301.t: "Падение Сантьяго" #NT!
 city_capture_events.301.d: "Один из крупнейших и старейших городов Южной Америки, город Сантьяго расположен в центре бассейна Сантьяго и окружен горами Анд. Горы Чили и его расположение на узкой западной стороне Южной Америки создают в Сантьяго ощущение безопасности. Однако, похоже, это не так: несмотря на географическое преимущество, солдаты [FROM.GetAdjective] успешно вошли в город после интенсивного боя с защитниками [FROM.FROM.GetAdjective]. В ходе завязавшегося боя перестрелки велись вдоль знаменитого проспекта Аламеда.\n[FROM.GetAdjective] солдат смогли прорваться через [FROM.FROM.GetAdjective] баррикады и укрепления на Пасео Ахумада. Дезорганизованным и искалеченным силам [FROM.FROM.GetAdjective] не оставалось иного выбора, кроме как предложить безоговорочную капитуляцию." #NT!
 city_capture_events.301.a: "Город Сент-Джеймс наш!" #NT!
 city_capture_events.301.b: "Мы никогда не сдадимся! Контратакуйте, когда мы будем готовы!" #NT!
 city_capture_events.301.c: "Город Островных Холмов пал..." #NT!
 city_capture_events.301.d.argentina: "После долгой и изнурительной кампании, сражавшейся по всему Андам, аргентинский флаг гордо реет над дворцом Ла Монеда. Бои шли ожесточенные на улицах города, на знаменитом проспекте Аламеда и Пасео Ахумада, при этом чилийские войска демонстративно стояли на своем. Однако аргентинцам удалось подавить чилийское сопротивление в городе, и те, кто выжил, с радостью предложили свою капитуляцию победившей аргентинской армии.\nПосле потери Сантьяго кажется, что Аргентина теперь имеет преимущество в южноамериканском конфликте. Моральный дух чилийцев, несомненно, низок, и сторонние наблюдатели отмечают, что рост волнений из-за отсутствия прогресса в войне против Аргентины является лишь вопросом времени." #NT!
 city_capture_events.301.a.argentina: "Славная победа! Вскоре Южная Америка будет очищена от социалистической угрозы." #NT!
 city_capture_events.301.b.argentina: "Мы не проиграем реакции! Перегруппируйтесь, товарищи, мы вернемся!" #NT!
 city_capture_events.301.c.argentina: "Серьезный удар по чилийским амбициям." #NT!
  
 city_capture_events.302.t: "Падение Минска" #NT!
 city_capture_events.302.d: "Возрождение Минска после Вельткрига привело к быстрому развитию высшего образования, больниц, кинотеатров, а Минск стал центром белорусского языка и культуры. Однако история повторяется, и Минск снова оказывается на передовой линии войны, поскольку сейчас город оккупирован [FROM.GetAdjective] силами.\n\nБольшая часть города пострадала от интенсивных бомбардировок и обстрелов, и отчеты указывают на значительное количество беженцев, спасающихся от хаоса. Несмотря на стойкое сопротивление, защитники [FROM.FROM.GetAdjective] в конечном итоге предложили безоговорочную капитуляцию победившим силам [FROM.GetAdjective], и только время покажет, насколько трудным будет восстановление Минска." #NT!
 city_capture_events.302.a: "Великий город Беларуси – наш!" #NT!
 city_capture_events.302.b: "Мы никогда не сдадимся!" #NT!
 city_capture_events.302.c: "Чёрный день для белорусского народа..." #NT!
 city_capture_events.302.d.russia: "Минск был частью России до Первого Вельткрига. После невероятного наступления российской армии история словно отзеркала себя. Российская армия бомбардировала город с неба и с земли, а сопротивление белорусов становилось все более слабым по мере того, как натиск российской военной машины обрушивался на город.\n\nПосле изнурительного и изнурительного боя, в котором большая часть города была превращена в руины, оставшиеся защитники сдались победившим российским войскам. Фабрики, музеи и тысячи мирных жителей бежали на запад, спасаясь от захватчиков. Это поражение является определенным ударом по независимости Беларуси, но только время покажет, будет ли российская оккупация временной или постоянной." #NT!
 city_capture_events.302.a.russia: "Это только начало. Скоро мы вернем свои земли!" #NT!
 city_capture_events.302.b.russia: "Мы никогда не откажемся от своей независимости! Продолжайте сражаться!" #NT!
 city_capture_events.302.c.russia: "Серьезный удар по будущему Беларуси: «Русский Медведь» марширует..." #NT!
  
 city_capture_events.303.t: "Падение Вильнюса" #NT!
 city_capture_events.303.d: "Самый известный своим «старым городом», один из крупнейших сохранившихся средневековых городов Северной Европы, Вильнюс — это место, где одни из лучших европейских архитектурных стилей — готика, ренессанс, неоклассицизм и барокко — стоят бок о бок друг с другом.\nОднако для жителей города впереди темные времена, поскольку город был охвачен битвой за Вильнюс. [FROM.GetAdjective] попытались окружить город, в то время как защитники предприняли отчаянный прорыв в надежде избежать осады. Завязались жестокие уличные бои, когда силы [FROM.GetAdjective] попытались ослабить оборону города. После мучительной битвы, в которой большая часть города лежала в руинах и в огне, защитники [FROM.FROM.GetAdjective] сдались. Когда-то Вильнюс был культурной достопримечательностью Европы, но сейчас слишком рано говорить о том, вернется ли Вильнюс к своей довоенной славе." #NT!
 city_capture_events.303.a: "Мы будем сражаться до последнего!" #NT!
 city_capture_events.303.b: "«Иерусалим» Севера – наш!" #NT!
 city_capture_events.303.c: "Великий литовский город пал?" #NT!
  
 city_capture_events.304.t: "Падение Нанкина" #NT!
 city_capture_events.304.d: "После жестоких многодневных бомбардировок с вершины Цзыцзиньшань, «Пурпурной горы», и неоднократных штурмов ее стен ранним вечером Нанкин пал. Защитники ворот Чжунхуа и Гуанхуа сражались до последнего человека, их трупы были усеяны великими стенами города, в то время как их товарищи начали отступление с боями по его извилистым улицам.\n\nБез видимого облегчения и после того, как [FROM.FROM.GetAdjective] подразделений за пределами города не смогли восстановить контроль над батареями Цзыцзиньшань, немногим оставшимся внутри подразделениям грозит только уничтожение. Потеря старой южной столицы, без сомнения, станет ударом по военным усилиям [FROM.FROM.GetAdjective], хотя [FROM.FROM.GetLeader] уже поклялся [Prev.GetHerHis] в окончательной победе." #NT!
 city_capture_events.304.a: "«Южная» столица – наша!" #NT!
 city_capture_events.304.b: "Мы скорее умрем, чем сдадимся! Мы вернемся!" #NT!
 city_capture_events.304.c: "Великий город Нанкин пал." #NT!
 city_capture_events.304.d.japan: "После жестоких многодневных бомбардировок с вершины Цзыцзиньшань, «Пурпурной горы», и неоднократных штурмов ее стен ранним вечером Нанкин пал. Защитники стен сражались до последнего человека, но остальная часть армии сломалась вскоре после того, как японские войска подняли восходящее солнце над воротами Чжунхуа, начав хаотическое бегство, в результате которого на извилистых улицах города разбросаны униформы и винтовки.\n\nХотя японцы заявили, что оккупация Нанкина будет мирной, мертвые и умирающие лежат повсюду, а в стенах города продолжают раздаваться спорадические выстрелы, а бесконтрольно полыхают пожары. Рассвет, несомненно, ознаменует начало новой мрачной реальности для старой южной столицы и ее оставшихся жителей." #NT!
 city_capture_events.304.a.japan: "Банзай! Славная победа Императора!" #NT!
 city_capture_events.304.b.japan: "Мы никогда не сдадимся японским собакам!" #NT!
 city_capture_events.304.c.japan: "Да помилует Бог жителей Нанкина..." #NT!
  
 city_capture_events.305.t: "Падение Ухани" #NT!
 city_capture_events.305.d: "Сегодня после ожесточенного боя территория трех городов Ухань упала до [FROM.GetName] сил. Его защитники, возможно, надеялись повторить успешную оборону Учана У Пэйфу в 1926 году и превратить битву в длительную осаду, но согласованное нападение и отсутствие помощи со стороны реки полностью разрушили эти надежды.\n\nС флагом [FROM.GetAdjective], развевающимся на особняке губернатора и холме Луоцзя, [FROM.GetName] нанесли значительный удар по [FROM.FROM.GetNameDef] и захватили один из величайших городов Китая. логистические центры, а также один из самых продуктивных арсеналов. Независимо от того, будет ли [?global.date.GetDateStringNoHourLong] однажды рассматриваться как поворотный момент или просто как очередная битва, похоже, она будет преследовать умы лидеров [FROM.FROM.GetAdjective] еще какое-то время." #NT!
 city_capture_events.305.a: "Ухань, Город рек, наш!" #NT!
 city_capture_events.305.b: "Мы скорее умрем, чем сдадимся! Мы вернемся!" #NT!
 city_capture_events.305.c: "Серьезное поражение для [FROM.FROM.GetAdjective]." #NT!
 city_capture_events.305.d.japan: "Сегодня утром после ожесточенного боя район трех городов Ухань пал перед японскими войсками. Его защитники, возможно, надеялись повторить успешную защиту Учана У Пэйфу в 1926 году и превратить битву в длительную осаду, но японский контроль над рекой и подавляющая огневая мощь сделали любые такие усилия тщетными. С помощью «Хиномару», пролетающего над особняком губернатора и холмом Луоцзя, Япония нанесла серьезный удар по [FROM.FROM.GetNameDef], захватив один из крупнейших логистических центров Китая и один из его самых продуктивных арсеналов. Поскольку внутренние районы Китая теперь открыты, вряд ли они будут последними." #NT!
 city_capture_events.305.a.japan: "Скоро мы одержим победу над китайцами!" #NT!
 city_capture_events.305.b.japan: "Мы никогда не сдадимся японским собакам!" #NT!
 city_capture_events.305.c.japan: "Наступление Японии на Китай продолжается..." #NT!
  
 city_capture_events.306.t: "Падение Гуанчжоу" #NT!
 city_capture_events.306.d: "Сегодня утром после ожесточенных междомовых боев силы [FROM.GetName] захватили Гуанчжоу. Этот портовый город, часто известный на международном уровне под названием «Кантон», является крупнейшим промышленным и торговым центром южного Китая за пределами Гонконга, и его потеря станет серьезным препятствием для [FROM.FROM.GetNameDef] военных действий. Хотя городские доки и узкие переулки кажутся безопасными, слухи говорят о растущем организованном сопротивлении в горах Байюнь на севере и оттуда, возможно, о попытке вернуть город.\n\nЮжный Китай и Гуандун, в частности, известны своим сопротивлением внешнему контролю, будь то из Пекина или где-либо еще. Удержать город — это нечто большее, чем [FROM.GetLeader], на что рассчитывали." #NT!
 city_capture_events.306.a: "Порт Кантона взят!" #NT!
 city_capture_events.306.b: "Поражение, но из которого мы вернемся!" #NT!
 city_capture_events.306.c: "Большая потеря для [FROM.FROM.GetName]" #NT!
 city_capture_events.306.d.japan: "Сегодня утром после бомбардировки, слышимой в восьмидесяти милях от Гонконга, Гуанчжоу пал перед японскими войсками. Город не видел такой осады со времени ответа Германии на «ноту Северна» в октябре 1926 года, но, в отличие от морской пехоты «Кайзерлих», его оккупанты, похоже, склонны остаться. Военный штаб уже создан в офисе губернатора провинции, а рядом с холмом Юэсю строится лагерь.\n\nОднако ходят слухи об организации сопротивления в горах Байюнь на севере, а оттуда, возможно, о попытке вернуть город. Южный Китай и Гуандун, в частности, известны своим сопротивлением внешнему контролю, будь то со стороны Пекина или где-либо еще. Удержание региона может оказаться большим достижением, чем рассчитывала Япония." #NT!
 city_capture_events.306.a.japan: "Когда Гуанчжоу будет обеспечен, Южный Китай станет нашим!" #NT!
 city_capture_events.306.b.japan: "Мы никогда не сдадимся японским собакам!" #NT!
 city_capture_events.306.c.japan: "Японцы теперь контролируют Жемчужную реку..." #NT!
  
 city_capture_events.307.t: "Падение Чунцина" #NT!
 city_capture_events.307.d: "Улицы Чунцина, самого дальнего судоходного пункта могучей Янцзы, когда-то были переполнены беженцами; как богатые, так и бедные, все бегут от неостановимого наступления японцев. Это было несколько дней назад. Когда завыли городские сирены, а гром и вспышки артиллерии ознаменовали последнюю позицию защитников на восточном берегу реки, город снова опустел. Давка унесла почти столько же жизней, сколько и захватчики.\n\nСейчас на улицах тихо, заполнены только дымом, обломками и телами. После падения Чунцина между Японией и полным господством юго-западного Китая мало что осталось." #NT!
 city_capture_events.307.a: "Еще одна славная победа!" #NT!
 city_capture_events.307.b: "Серьезная потеря, но мы восстановимся!" #NT!
 city_capture_events.307.c: "Важный шаг на пути к реализации Японией своих амбиций." #NT!
  
 city_capture_events.308.t: "Падение Куньмина" #NT!
 city_capture_events.308.d: "Впервые после поражения Трех феодалов в 1681 году город Куньмин пал перед захватчиками из-за пределов провинции Юньнань. После потери аэродрома Уцзяба на юго-востоке силы [FROM.FROM.GetNameDef] были постепенно отброшены вдоль озера Дянь, но в конце концов прорвались, когда древние стены города были взяты.\n\nПока войска [FROM.GetNameDef] маршируют под знаменитыми арками Цзиньма-Биджи, их лидеры должны довольствоваться осознанием того, что они контролируют не только плодовитый арсенал Куньмина, но и конечную точку чрезвычайно прибыльного маршрута Куньмин-Хайфон. Железная дорога." #NT!
 city_capture_events.308.a: "Благодаря этой победе мы обеспечиваем свое влияние на западе Китая." #NT!
 city_capture_events.308.b: "Мы сделаем нашу позицию в горах за ними!" #NT!
 city_capture_events.308.c: "У гор Юньнани новый хозяин..." #NT!
 city_capture_events.308.d.japan: "Впервые после разгрома Трех феодалов в 1681 году город Куньмин пал перед иностранным захватчиком. Потеряв аэродром Уцзяба на юго-востоке, силы [FROM.FROM.GetNameDef] постепенно были отброшены вдоль озера Дянь, но в конце концов прорвались, когда древние стены города были захвачены.\n\nПока японские войска маршируют под знаменитыми арками Цзиньма-Биджи, их лидерам приходится довольствоваться осознанием того, что они контролируют не только богатый арсенал Куньмина, но и конечную станцию ​​стратегической железной дороги Куньмин-Хайфон. Еще один серьезный удар был нанесен Китаю. Теперь, когда Япония проникла так далеко во внутренние районы страны, сколько еще она сможет принять?" #NT!
 city_capture_events.308.a.japan: "Китайцы не могут убежать от нашего наступления!" #NT!
 city_capture_events.308.b.japan: "В горы! Мы никогда им не сдадимся, никогда!" #NT!
 city_capture_events.308.c.japan: "Завоевание Китая может вскоре стать реальностью..." #NT!
  
 city_capture_events.309.t: "[SHD.GetLeader] изгнан из Цзинаня!" #NT!
 city_capture_events.309.d_Zongchang: "С 1925 года город Цзинань стал зеркальным отражением своего хозяина: коррумпированный и тучный, полный порока и подлости. Из своего «двора» Чжан Цзунчан покровительствовал всем, от художников и писателей до плейбоев и проституток, казня любого, кто перешел ему дорогу, раскалывая головы, как раскалывают дыни. Все было кончено, когда сегодня утром оборона Цзинаня рухнула.\n\nСообщается, что сквозь шум можно было услышать, как сам Чжан ревёт, возможно, наблюдая за эвакуацией своего бесчисленного богатства. Теперь его нигде не найти, его гарем заброшен, его обширный особняк охвачен пламенем. Некоторые говорят, что Чжан вернется либо победителем, либо в гробу, и эта идея не является беспрецедентной. Однажды, несмотря на поражение, он прошел через Цзинань, сидя в гробу и куря большую сигару." #NT!
 city_capture_events.309.d_Tianran: "Высоко на горе Тай Чжан Тяньрань, казалось, избегал обычаев нижнего мира, но на самом деле его влияние простиралось далеко за пределы Шаньдуна. Благодаря вере Игуандао его глаза и уши были повсюду, и часто он был острым концом ножа.\n\nОднако его последователи сейчас отступают, и даже сама гора Тай была потеряна в результате решительного наступления [FROM.GetName]. Храм Голубой Зари, Храм Нефритового Короля и множество других священных мест теперь находятся в руках непочтительных солдат; топтание по священным местам, разбрасывание статуй, подношений и благовоний; грабят без разбора. Тайшань, возможно, не выздоровеет еще одно поколение, но судьба Чжана далеко не определенна. Эта потеря, несомненно, разозлит его последователей, и у него всегда был план." #NT!
 city_capture_events.309.d_Yingguang: "Цюй Ингуан родился в Чжэцзяне, но, как и многие государственные служащие в Китае, ему пришлось работать на должностях вдали от дома. Член Аньхойской клики, он, тем не менее, вступил в конфликт с Тянь Чжунюем за контроль над Шаньдуном. Однако эта борьба в конечном итоге оказалась напрасной, и уничтожение клики Аньхой вынудило Цюя покинуть страну.\n\nОн оказался более способным выживать, чем большинство его сверстников, и добился краткого возрождения, когда захватил контроль над Шаньдуном. Но даже этот успех в конечном итоге оказался мимолетным — Цзинань пал, и вместе с этим это может стать окончательным концом Аньхойской клики." #NT!
 city_capture_events.309.a: "Скатертью дорога!" #NT!
 city_capture_events.309.b: "Это не что иное, как тактическое отступление!" #NT!
 city_capture_events.309.c: "Конец самому подлому военачальнику Китая?" #NT!
 city_capture_events.309.e: "Ранний конец странной веры." #NT!
 city_capture_events.309.f: "Конец возрождению Аньхой?" #NT!
  
 city_capture_events.310.t: "Падение Александрии" #NT!
 city_capture_events.310.d: "Город Александрия, основанный самим легендарным завоевателем Александром, был наиболее известен такими чудесами, как Александрийская библиотека и Некрополь.\n\nОднако история повторяется: древний город снова был завоеван иностранной державой. После сильной бомбардировки [FROM.FROM.GetAdjective] были вынуждены отступить в Цитадель Кайтбей; Окруженные со всех сторон, и единственным спасением было море, [FROM.FROM.GetAdjective] отчаянно защищались. Но из-за ограниченности запасов и низкого морального духа у защитников [FROM.FROM.GetAdjective] не было другого выбора, кроме как предложить безоговорочную капитуляцию победившей армии [FROM.GetAdjective]. Несмотря на великую победу, силы [FROM.GetAdjective] пообещали не причинять вреда историческим зданиям города." #NT!
 city_capture_events.310.a: "С этой победой город Александр наш!" #NT!
 city_capture_events.310.b: "Серьезное поражение! Мы этого не потерпим!" #NT!
 city_capture_events.310.c: "Город Александр снова завоеван..." #NT!
 city_capture_events.310.d.ottomans: "Город Александрия имеет культурное значение и гордость египетской нации. Место великих древних чудес, таких как Александрийская библиотека, город действительно является важным центром жизни, культуры и промышленности Египта.\nОднако османы добились огромного прогресса в войне с Египтом и его арабскими союзниками, поскольку сегодня утром османские войска захватили город и его порт. Египетскому флоту удалось бежать до прибытия османских войск, но оставшиеся защитники не смогли отбросить османов. Окруженные со всех сторон и столкнувшиеся с мощью османской армии, египтяне покинули город - теперь османы снова контролируют древний город. Несмотря на славную победу Османской империи над своими египетскими врагами, османы пообещали не разрушать древние здания города." #NT!
 city_capture_events.310.a.ottomans: "С этой победой мы продвигаемся дальше в Египет!" #NT!
 city_capture_events.310.b.ottomans: "Мы никогда не сдадимся туркам! Мы вернемся!" #NT!
 city_capture_events.310.c.ottomans: "Османы нанесли удар по Каирскому пакту." #NT!
  
 city_capture_events.311.t: "Падение [217.Controller.GetVictoryPointName_3529]" #NT!
 city_capture_events.311.d: "Город [217.Controller.GetVictoryPointName_3529] на протяжении веков был важным центром транспорта и коммерческой деятельности благодаря своему расположению. Несмотря на взрывной рост населения, плохие условия в городе превратили его в очаг революционной активности. Во время Гражданской войны в России город стал местом важного сражения и осады, и аналогичным образом история повторяется еще раз, поскольку город снова стал полем битвы.\n\nБольшие части города лежат в руинах в результате ожесточенной городской войны, а воздушные бомбардировки превратили большую часть городских центров в руины. Несмотря на почти фанатичное сопротивление сил [FROM.FROM.GetAdjective], армия [FROM.GetAdjective] объявила сегодня, что город попал в их руки." #NT!
 city_capture_events.311.a: "Ни шагу назад! Мы вернемся!" #NT!
 city_capture_events.311.b: "Славная победа, скоро падет Русский Медведь." #NT!
 city_capture_events.311.c: "Россия продолжает шататься в своей войне." #NT!
  
 city_capture_events.312.t: "Падение [653.Controller.GetVictoryPointName_1821]" #NT!
 city_capture_events.312.d: "Расположенный на восточной стороне Уральских гор и разделенный пополам рекой Исеть, город [653.Controller.GetVictoryPointName_1821] примечателен тем, что является величественным городом, соединяющим восточную и западную половины России. В городе также находилась бывшая российская императорская семья перед своей злосчастной казнью.\n\nОднако, похоже, для города снова наступили тяжелые времена, поскольку войска [FROM.FROM.GetAdjective] покинули город вслед за приближающимися армиями [FROM.GetAdjective]. Военные усилия [FROM.FROM.GetAdjective] потерпели сокрушительное поражение из-за потери этого важного узла, соединяющего Европу и Азию, а также ценных ресурсов Урала." #NT!
 city_capture_events.312.a: "Конец матушки-России близок." #NT!
 city_capture_events.312.b: "Эта победа нанесла огромный удар по военным усилиям России." #NT!
 city_capture_events.312.c: "Конец для русских кажется близким." #NT!
  
