l_russian:
 models_warning_events.1: "ВНИМАНИЕ: отсутствуют DLC!" #NT!
 models_warning_events.1.master_event: "Вы используете субмод «Модели Kaiserreich» без необходимых DLC. Это может привести к поломке модели, мерцанию экрана и другим визуальным проблемам. Пожалуйста, отмените подписку на затронутый субмод или приобретите необходимый DLC.[ModelsSubmodsEasternFrontWarning][ModelsSubmodsAlliedArmorWarning][ModelsSubmodsAxisArmorWarning]" #NT!
 models_warning_events.1.missing_dlc: "Отсутствует DLC:\n\n" #NT!
 models_warning_events.1.axis_armor_pack: "$models_warning_events.1.missing_dlc$§oНабор брони Оси§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.aat: "$models_warning_events.1.missing_dlc$§oОружие против тирании§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.lar: "$models_warning_events.1.missing_dlc$§oСопротивление§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.bba: "$models_warning_events.1.missing_dlc$§oТолько кровью§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.gtd: "$models_warning_events.1.missing_dlc$§oGötterdämmerung§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.bftb: "$models_warning_events.1.missing_dlc$§oБитва за Босфор§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.nsb: "$models_warning_events.1.missing_dlc$§oНи шагу назад§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.toa: "$models_warning_events.1.missing_dlc$§oИспытание на верность§!\n\n$models_warning_events.1.master_event$" #NT!
 models_warning_events.1.dev_main: "Субмод для разработчиков — основная ветка\n\n$models_warning_events.1.master_event$\n\nЧтобы использовать основную ветку, убедитесь, что у вас есть следующие DLC: Axis Armor Pack, Allied Armor Pack, Eastern Front Planes Pack, AAT, LaR, BBA, GTD, BTFB, NSB, ToA." #NT!
 models_warning_events.1.a: "Понял." #NT!
 models_warning_events.2: "ВНИМАНИЕ - Отсутствует сабмод!" #NT!
 models_warning_events.2.desc: "Вы используете один или несколько субмодов моделей Кайзеррайха без включенного субмода §oМодели Кайзеррайха — базовая игра§!. Это может привести к поломке модели, мерцанию экрана и другим визуальным проблемам. Пожалуйста, включите сабмод или подпишитесь на него в Steam." #NT!
 models_warning_eastern_front_tt: "\n\nВы используете субмод §oПакет самолетов Восточного фронта§!. Пожалуйста, убедитесь, что у вас куплен DLC «Восточный фронт», или отмените подписку. Этот субмод может вызвать §oмерцание экрана§!, если использовать его без набора самолетов!" #NT!
 models_warning_allied_armor_tt: "\n\nВы используете субмод §oAllied Armor Pack§!. Пожалуйста, убедитесь, что у вас куплен DLC «Allied Armor Pack», или отпишитесь." #NT!
 models_warning_axis_armor_tt: "\n\nВы используете субмод §oAxis Armor Pack§!. Убедитесь, что у вас куплен DLC «Axis Armor Pack», или отпишитесь." #NT!
