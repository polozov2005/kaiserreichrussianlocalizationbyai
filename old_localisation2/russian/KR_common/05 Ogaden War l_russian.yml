l_russian:
  
 ### MISSIONS ### 
 ETH_ogaden_war_attack_phase: "Огаденская война: Фаза наступления"
 ETH_ogaden_war_defence_phase: "Огаденская война: Фаза обороны"
  
 ### EVENTS ### 
 ogaden_war_events.1.t: "Нападение на Огаден" #NT!
 ogaden_war_events.1.desc.ETH: "Настало время положить конец незаконной оккупации приграничных территорий и раз и навсегда освободить их от сомалийского господства. Наши войска сосредотачиваются на границе, и хотя сомалийские силы, вероятно, ожидают не более чем еще одного раунда легких перестрелок, на этот раз мы идем против них в полную силу." #NT!
 ogaden_war_events.1.desc.SOM: "В последней войне эфиопы вытеснили нас с наших позиций и, вероятно, обманывают себя, думая, что их победа будет длительной. Это совсем не так, и наши силы более чем готовы показать им, кто настоящий король Рога!" #NT!
 ogaden_war_events.1.a: "Вперед!" #NT!
  
 ogaden_war_events.2.t: "Тактическая победа в Огадене" #NT!
 ogaden_war_events.2.desc.ETH: "Пришли последние сводки с фронта, и они рассказывают о нашем триумфе! Сомалийские силы рассеяны и отступают, а наши силы начали закреплять свои позиции, чтобы гарантировать, что они навсегда останутся нашими. Мы восстановили контроль над Огаденом, и ближайшие месяцы докажут, что эта территория останется в наших руках." #NT!
 ogaden_war_events.2.desc.SOM: "Наше наступление вынудило эфиопов покинуть свои позиции, и наши войска освободили многие разрозненные города Огадена. Хотя противник, несомненно, сейчас готовит контратаку, наш долг — выстоять и продемонстрировать истинную сомалийскую решимость." #NT!
 ogaden_war_events.2.a: "Это свидетельство величия нашего народа!" #NT!
  
 ogaden_war_events.3.t: "Победа! Огаден [ROOT.GetAdjective]" #NT!
 ogaden_war_events.3.desc.ETH: "В прекрасной демонстрации мощи Эфиопии силы Империи победили сомалийских врагов. Мы раз и навсегда показали, что способны защитить наши границы так же, как и имперские державы Европы." #NT!
 ogaden_war_events.3.desc.SOM: "Эфиопские силы потерпели решающее поражение и отказались от дальнейших боевых действий из-за Огадена. Нет никаких сомнений в том, что на этом все закончится навсегда." #NT!
 ogaden_war_events.3.a: "Замечательный!" #NT!
 ogaden_war_events.3.b: "Зачем заканчивать это здесь?" #NT!
  
 ogaden_war_events.4.t: "Огаден под атакой" #NT!
 ogaden_war_events.4.desc.ETH: "Смелые сомалийцы совершили смелый шаг и напали на нас, пытаясь вернуть то, что они считают своей украденной землей. Мы победили их один раз, мы победим их еще раз!" #NT!
 ogaden_war_events.4.desc.SOM: "Эфиопы отправляют против нас очередную экспедицию! Они как будто пытаются пережить славные дни 1860-х годов!" #NT!
 ogaden_war_events.4.a: "Не вешайте трубку!" #NT!
  
 ogaden_war_events.5.t: "[ROOT.GetAdjective] Войска отступают" #NT!
 ogaden_war_events.5.desc.ETH: "Наши силы были вынуждены оставить свои позиции, но мы вполне способны оправиться от этой неудачи." #NT!
 ogaden_war_events.5.desc.SOM: "Эфиопы сделали смелый шаг, вытеснив нас со спорных территорий. Это не поражение, а стратегическое отступление. Понятно, что в итоге победителем одержим именно мы." #NT!
 ogaden_war_events.5.a: "Соберите контратаку!" #NT!
  
 ogaden_war_events.6.t: "Огаден под контролем [FROM.GetAdjective]" #NT!
 ogaden_war_events.6.desc.ETH: "Становится все более очевидным, что мы недооценили готовность Сомали защитить Огаден. Наше плохо подготовленное и дорогостоящее наступление должно закончиться, а его цели не достигнуты. Пусть будущие попытки окажутся более успешными." #NT!
 ogaden_war_events.6.desc.SOM: "Эфиопы держатся стойко, и попытки вытеснить их оказались безуспешными. Пришло время признать себе, что эта война проиграна." #NT!
 ogaden_war_events.6.desc.war: "Мы не только не смогли остановить вражеские силы, они решительно настроены продвигаться глубже в нашу территорию." #NT!
 ogaden_war_events.6.a: "Мы вернемся!" #NT!
 ogaden_war_events.6.b: "Защищайтесь любой ценой!" #NT!
