 #LEP_Constrained_Budget_desc: "Наши усилия по возобновлению производства вынудили нас урезать траты всё прочее. Это временно свяжет нам руки."

 #LEP_Active_War_Machine: "Активная машина войны"
 #LEP_Active_War_Machine_desc: "Мы решили не использовать нашу машину войны для гражданских  целей, даже не смотря на то, что нам ничто напрямую не угрожает. Это позволит нам легче расширять военную промышленность, но в ущерб другим сферам экономики."

 #LEP_Return_To_Peacetime: "Возвращение к мирной экономике"
 #LEP_Return_To_Peacetimee_desc: "Мы решили использовать наши военные ресурсы для мирных целей. Это позволит нам расширить нашу гражданскую промышленность быстрее, но в ущерб военным заводам."
 
